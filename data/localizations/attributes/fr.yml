    hair_oil_effect:
      name: Effet de l’huile capillaire
      description: Indique les principaux avantages ou résultats fournis par l’huile
        capillaire
    hair_shear_type:
      name: Type de ciseaux de coiffeur
      description: Définit le style de ciseaux de coiffure utilisé dans les soins
        capillaires, par exemple texturants ou amincissants
    hair_styling_benefits:
      name: Avantages pour le coiffage
      description: Met en évidence les principaux avantages ou effets du produit sur
        les cheveux
    hair_styling_items_included:
      name: Articles de coiffure inclus
      description: Identifie les outils de coiffure inclus dans un kit, tels qu’un
        fer à friser ou une brosse à cheveux
    hair_styling_tool_features:
      name: Caractéristiques de l’outil de coiffure
      description: Identifie les caractéristiques spéciales des outils de coiffure,
        par exemple, thermostat réglable ou mise hors tension automatique
    hair_treatment_effect:
      name: Effet du traitement capillaire
      description: Spécifie le ou les principaux bénéfices offerts par le sérum capillaire
    hair_type:
      name: Type de cheveux
      description: Classifie les produits en fonction de types ou d’état de cheveux
        spécifiques, bouclés ou secs par exemple
    hammer_head_material:
      name: Matériau de la tête du marteau
      description: Identifie la composition de la tête d’un marteau, par exemple,
        acier ou fibre de verre
    hand_side:
      name: Côté
      description: Précise le type de manipulation pour lequel un produit est conçu,
        par exemple à gauche, des deux côtés
    hand_soap_features:
      name: Caractéristiques du savon pour les mains
      description: Met en évidence les caractéristiques ou avantages particuliers
        du savon pour les mains en poudre
    hand_warmer_type:
      name: Type de chauffe-mains
      description: Identifie le type de chauffe-mains, par exemple, activé par air
        ou alimenté par batterie
    handcuff_lock_type:
      name: Type de verrouillage des menottes
      description: Identifie le mécanisme de verrouillage des menottes, par exemple,
        clé ou double verrouillage
    handle_color:
      name: Couleur de la poignée
      description: Spécifie la couleur de la poignée d’un produit, par exemple, noir
        ou bleu
    handle_design:
      name: Design de la poignée
      description: Décrit le style de la poignée d’un outil, par exemple, droit ou
        en forme de pistolet
    handle_grip_texture:
      name: Texture de la poignée
      description: Définit la sensation de surface de la poignée d’un produit, nervurée
        ou lisse par exemple
    handle_material:
      name: Matériau du manche
      description: Précise le matériau utilisé pour la poignée du produit, comme le
        bambou ou le plastique
    handle_pattern:
      name: Modèle de poignée
      description: Décrit l’imprimé ou le motif de la poignée d’un produit, comme
        à fleurs ou géométrique
    handle_style:
      name: Style de poignée
      description: Définit le conception ou la forme de la poignée de la canne, influant
        sur le confort de prise en main, l’ergonomie et l’esthétique
    handle_type:
      name: Type de poignée
      description: Précise la longueur ou la présence d’une poignée sur un produit,
        par exemple courte, sans poignée
    handset_type:
      name: Type de combiné
      description: Définit le combiné pour les téléphones, comme les téléphones filaires
        ou sans fil
    handwear_features:
      name: Caractéristiques des gants
      description: Décrit les caractéristiques particulières des gants ou des moufles,
        par exemple, fermeture réglable ou adhérence améliorée
    handwear_material:
      name: Matériau des gants
      description: Décrit le type de matériau utilisé dans les gants ou les moufles,
        par exemple, fausse fourrure ou laine
    handwear_type:
      name: Type de gants
      description: Classifie le type de gants, par exemple des mitaines ou des moufles
    hanging_chair_design:
      name: Design de chaise suspendue
      description: Précise si un fauteuil suspendu est livré avec un support ou non
    haptic_feedback_type:
      name: Type de retour haptique
      description: Décrit le type de retour tactile ou de mouvement fourni par la
        manette
    hard_cider_variety:
      name: Variété de cidre dur
      description: Précise le profil aromatique du cidre, par exemple piquant, doux
    hard_drive_features:
      name: Caractéristiques du disque dur
      description: Identifie les capacités spéciales d’un disque dur, par exemple,
        doté d’une IA ou résistant aux chocs
    hard_drive_form_factor:
      name: Facteur de forme du disque dur
      description: Spécifie la taille physique d’un disque dur, par exemple 2,5 ou
        3,5 pouces
    hard_drive_installation:
      name: Installation du disque dur
      description: Identifie l’emplacement d’un disque dur dans l’électronique, comme
        interne ou externe
    hardhat_class:
      name: Classe de casque de sécurité
      description: Identifie la classification de sécurité des casques de protection,
        par exemple, C (conducteur) ou E (électrique)
    hardness:
      name: Rigidité
      description: Indique la fermeté d’un produit, par exemple, mou, moyen ou dur
    hardness_rating_pencil_scale:
      name: Indice de dureté (échelle du crayon)
      description: Spécifie la dureté du verre trempé en fonction de l’échelle de
        dureté des crayons
    hardware_finish:
      name: Finition du matériel
      description: Décrit le traitement de surface ou le revêtement d’articles de
        quincaillerie, par exemple, laiton ou chrome
    hardware_material:
      name: Matériau du matériel
      description: Spécifie la composition des articles de quincaillerie, par exemple,
        métal ou acier inoxydable
    hardware_mounting_type:
      name: Type de montage matériel
      description: Identifie le mode de montage d’un produit matériel, par exemple,
        au mur ou sur pied
    hardwood_lumber_grade:
      name: Qualité du bois de feuillus
      description: Classifie le grade du bois d’œuvre feuillu, par exemple, No. 2A
        commun
    harness_closure_type:
      name: Type de fermeture du harnais
      description: Précise le type de fermeture utilisé dans les harnais, comme une
        boucle d’ouverture ou une fermeture éclair
    harp_size:
      name: Taille de la harpe
      description: Spécifie la catégorie de taille d’une harpe, par exemple, petite
        ou de concert
    hatch_suitable_location:
      name: Emplacement approprié pour la trappe
      description: Identifie l’emplacement idéal pour les trappes, par exemple, sol
        ou mur
    hazmat_suit_design:
      name: Design de combinaison pour manipulation de matières dangereuses
      description: Décrit le style des combinaisons de protection chimique, par exemple,
        encapsulé ou pour matières dangereuses
    hdmi_version_supported:
      name: Version HDMI prise en charge
      description: Spécifie la version HDMI la plus récente prise en charge par l’appareil
        (par exemple, HDMI 2.1 pour contenus 4K 120 Hz)
    hdr_format:
      name: Format HDR
      description: Précise la plage dynamique élevée (HDR) pour les téléviseurs, par
        exemple HDR10, Dolby Vision
    headjoint_cut:
      name: Embouchure
      description: Spécifie la coupe de l’embouchure des flûtes, par exemple, vague
        ou coupe en Z
    headphone_cushion_shape:
      name: Forme des coussinets du casque
      description: Décrit le contour physique des coussinets pour aider les clients
        à trouver la forme qui leur convient
    headphone_driver_technology:
      name: Technologie du transducteur du casque
      description: Définit le type de transducteur utilisé pour créer du son dans
        le casque
    headphone_jack_type:
      name: Type de prise du casque
      description: Précise le type de taille de prise casque, par exemple 3,5 mm,
        USB type-C
    headphone_style:
      name: Style de casque
      description: Définit la conception des écouteurs, par exemple derrière le cou,
        auriculaires
    headset_connection_type:
      name: Type de connexion du casque
      description: Spécifie la ou les interfaces disponibles pour connecter des casques
        externes au téléphone
    headwear_features:
      name: Caractéristiques du couvre-chef
      description: Met en avant les caractéristiques uniques du couvre-chef, par exemple,
        pliable ou polyvalent
    hearing_aid_compatibility:
      name: Compatibilité avec les appareils auditifs
      description: Spécifie si le téléphone est compatible avec les appareils auditifs
        (HAC) et, le cas échéant, le niveau de compatibilité
    hearing_aid_ear_side:
      name: Côté de l’appareil auditif
      description: Spécifie si l’appareil auditif est conçu pour l’oreille gauche,
        l’oreille droite ou les deux oreilles
    hearing_aid_features:
      name: Caractéristiques de l’aide auditive
      description: Met en avant les caractéristiques particulières des aides auditives,
        par exemple, batterie rechargeable ou numérique
    hearing_aid_material:
      name: Matériau de l’aide auditive
      description: Identifie le principal matériau utilisé dans la fabrication des
        aides auditives, par exemple, plastique ou silicone
    hearing_loss_level:
      name: Niveau de perte auditive
      description: Spécifie le degré de perte auditive pour lequel l’appareil auditif
        est conçu
    hearing_protection_class:
      name: Classe de protection auditive
      description: Spécifie la classe de certification locale qui indique les performances
        d’atténuation conformément aux normes régionales
    heat_function:
      name: Fonction de chaleur
      description: Indique si un produit est doté d’une fonction de chauffage, généralement
        pour les articles de soins d’hygiène personnelle
    heat_level:
      name: Niveau de piquant
      description: Indique le niveau de piquant des aliments et des boissons, par
        exemple doux ou très piquant
    heat_settings:
      name: Paramètres de chaleur
      description: Précise les niveaux de contrôle de température d’un produit, par
        exemple faible, moyen, élevé
    heat_source:
      name: Source de chaleur
      description: Spécifie le type de source de chaleur dans les coussins chauffants,
        par exemple, micro-ondes ou gel thermique
    heat_therapy_type:
      name: Type de thermothérapie
      description: Indique si le produit diffuse une chaleur humide, une chaleur sèche
        ou les deux
    heating_instructions:
      name: Instructions de réchauffement
      description: Précise comment chauffer correctement le produit, par exemple avec
        un four, une cuisinière
    heating_method:
      name: Méthode de réchauffement
      description: Précise la technique de réchauffage, généralement pour les chauffe-biberons ;
        par exemple vapeur, bain-marie
    heating_pad_design:
      name: Conception du coussin chauffant
      description: Spécifie le style physique ou le facteur de forme du coussin chauffant
    heating_pad_features:
      name: Caractéristiques du coussin chauffant
      description: Met en évidence les fonctionnalités spéciales ou pratiques intégrées
        au coussin chauffant
    heating_speed:
      name: Vitesse de chauffage
      description: Indique la vitesse à laquelle un produit chauffe, par exemple rapide,
        lent
    heel_height_type:
      name: Type de hauteur du talon
      description: Définit la hauteur du talon d’une chaussure, par exemple plat ou
        haut
    heel_shoe_type:
      name: Type de chaussure à talon
      description: Identifie le style de talon d’une chaussure, comme les talons plateforme
        ou compensés
    height_adjustment:
      name: Réglage de la hauteur
      description: Spécifie si la hauteur d’un produit peut être modifiée, par exemple,
        hauteur fixe ou hauteur réglable
    helicobacter_pylori_detection_method:
      name: Méthode de détection de Helicobacter pylori
      description: Identifie le principe biologique ou l’approche utilisée par le
        kit pour détecter l’infection à Helicobacter pylori
    helmet_shade_design:
      name: Design de l’ombre du casque
      description: Décrit le type de mécanisme d’obscurcissement des casques de soudure,
        par exemple, fixe ou automatique
    herbal_supplement_health_goal:
      name: Objectif santé des compléments alimentaires à base de plantes
      description: Indique l’objectif de bien-être principal, le système corporel
        ou le domaine physiologique que le complément alimentaire à base de plantes
        est censé soutenir (par exemple, soutien immunitaire, soulagement du stress,
        soutien au foie et détoxification)
    hitch_class:
      name: Classe d’attelage
      description: Identifie la capacité de remorquage de l’attelage d’un véhicule,
        par exemple, Classe I ou Classe II
    hitch_type:
      name: Type d’attelage
      description: Précise la méthode de montage pour les remorques de vélo, par exemple
        sur essieu ou sur tige de selle
    hiv_test_generation:
      name: Génération de test VIH
      description: Indique la génération de test de diagnostic du VIH, reflétant les
        améliorations en matière de sensibilité et de fenêtre de détection
    hockey_equipment_included:
      name: Équipement de hockey inclus
      description: Spécifie les articles d’un ensemble d’équipement de crosse, par
        exemple, bâton ou épaulettes
    hold_level:
      name: Niveau de maintien
      description: Définit la force des gels, mousses et sprays coiffants, par exemple
        léger, fort
    hole_plating_type:
      name: Type de placage des trous
      description: Indique si les trous de la carte sont non plaqués, plaqués ou présentent
        des barillets, influant sur la soudure et la connectivité entre les couches
    hook_design:
      name: Conception de crochet
      description: Identifie la conception des crochets, des boucles et des attaches,
        par exemple, à ressort ou à double extrémité
    hook_grip_design:
      name: Conception de poignée à crochet
      description: Décrit le style de prise des crochets, par exemple, antidérapant
        ou ergonomique
    hook_size:
      name: Taille du crochet
      description: Identifie la taille des crochets, par exemple, B, G ou I
    hook_type:
      name: Type de crochet
      description: Identifie le type de crochets de bateau, par exemple, fixe ou télescopique
    hoop_shape:
      name: Forme du cerceau
      description: Décrit la forme d’un objet basé sur un cerceau, généralement des
        filets de pêche ; par exemple en forme de D
    horse_category:
      name: Catégorie du cheval
      description: Classifie le matériel de harnachement en fonction de la taille
        et de la race du cheval, par exemple poney, standard
    horse_grooming_accessories_included:
      name: Accessoires de toilettage pour chevaux inclus
      description: Identifie les articles supplémentaires inclus avec les produits
        de toilettage pour chevaux, par exemple, brosses ou étui de transport
    hose_material:
      name: Matériau du tuyau
      description: Spécifie le type de matériau utilisé dans les tuyaux, par exemple,
        PVC ou aluminium
    host_interface:
      name: Interface hôte
      description: Précise la méthode utilisée pour se connecter aux disques durs,
        comme Thunderbolt 3 ou SATA
    housing_color:
      name: Couleur du boîtier
      description: Identifie la couleur de l’enveloppe extérieure d’un produit, par
        exemple, beige ou transparent
    housing_material:
      name: Matériau de la structure
      description: Précise le matériau utilisé dans la couche externe du produit,
        par exemple l’acier inoxydable, le bois
    housing_pattern:
      name: Modèle de logement
      description: Décrit l’imprimé ou le motif de l’extérieur d’un produit, comme
        abstrait ou à logos
    hub/switch_storage_options:
      name: Options de stockage du hub/commutateur
      description: Identifie les capacités de stockage de hubs ou de commutateurs,
        comme empilables ou non empilables
    humidification_system:
      name: Système d’humidification
      description: Décrit le type d’option d’humidification inclus avec ou pris en
        charge par l’appareil PAP
    humidifier_design:
      name: Conception de l’humidificateur
      description: Décrit le style d'un humidificateur, comme amovible ou portable
    humidity_control:
      name: Contrôle de l’humidité
      description: Indique la capacité du produit à réguler les niveaux d’humidité,
        généralement pour les caves à cigares ; par exemple 0,65
    humidity_control_method:
      name: Méthode de contrôle de l’humidité
      description: Spécifie le type de régulation de l’humidité d’appareils, par exemple
        manuel ou semi-automatique
    hunting/survival_knife_design:
      name: Conception de couteau de chasse/survie
      description: Identifie la conception d’un couteau de chasse/de survie, par exemple,
        pointe de lance ou pointe tanto
    hunting_blind_design:
      name: Conception de l’affût de chasse
      description: Spécifie le type de modèle d’un store de chasse, par exemple sans
        écran ou transparent à sens unique
    hvac_control_type:
      name: Type de contrôle HVAC
      description: Identifie le type de commande de climatisation, par exemple, numérique
        ou manuel
    ice_pack_type:
      name: Type de poche de glace
      description: Précise le matériau ou la technologie utilisé(e) dans un sac de
        glace, par exemple une poche thermique de froid, un pack mousse
    icon_type:
      name: Type d’icône
      description: Spécifie le type d’icône d’ordinateur, par exemple, dossier ou
        réseaux sociaux
    identity_verification_requirement:
      name: Exigence de vérification d’identité
      description: Spécifie si l’enregistrement sous le vrai nom ou la vérification
        d’identité eKYC est requis avant que la carte SIM ou eSIM puisse être utilisée
    ignition_system:
      name: Allumage
      description: Identifie le type de système d’allumage dans les générateurs, par
        exemple, manuel ou électronique
    illumination_technique:
      name: Technique d’éclairage
      description: Identifie la méthode d’éclairage utilisée dans les microscopes,
        par exemple, fond clair ou fond noir
    image_formats_supported:
      name: Formats d’images pris en charge
      description: Identifie les types de fichiers image qu’un appareil photo peut
        produire, par exemple, JPEG ou RAW
    image_sensor_size:
      name: Taille du capteur d’image
      description: Indique la taille du capteur d’image dans les appareils photo,
        par exemple, 1/1,7 ou plein cadre
    immobilizer_type:
      name: Type de système antidémarrage
      description: Spécifie le type de dispositif utilisé pour empêcher le vol du
        véhicule, par exemple, un antivol de pneu ou un antivol de volant
    incense_fragrance:
      name: Parfum d’encens
      description: Identifie l’odeur d’un produit d’encens, par exemple, lavande ou
        bois de santal
    incense_kit_items_included:
      name: Articles du kit d’encens inclus
      description: Identifie les éléments contenus dans un kit de fabrication d’encens,
        par exemple, bâtons de bambou ou moules
    incense_type:
      name: Type d’encens
      description: Identifie la forme de l’encens, par exemple, cône ou bâton
    incontinence_aid_features:
      name: Caractéristiques de l’aide à l’incontinence
      description: Décrit les caractéristiques particulières des aides à l’incontinence,
        par exemple, étanches ou hypoallergéniques
    incontinence_pad_type:
      name: Type de protection pour incontinence
      description: Définit le style ou la forme spécifique de la protection (par exemple,
        protège-slip, serviette, couche)
    inductance_tolerance:
      name: Tolérance d’inductance
      description: Définit le pourcentage d’écart admissible par rapport à la valeur
        d’inductance nominale
    industry_focus:
      name: Focus sur l’industrie
      description: Met en avant les secteurs cibles d’un produit, par exemple, éducation
        ou industrie manufacturière
    infant_age_group:
      name: Tranche d’âge du bébé
      description: Classe les produits adaptés à des tranches d’âge spécifiques pour
        les nourrissons, par exemple nouveau-né, 0 à 6 mois
    inflation_method:
      name: Méthode de gonflage
      description: Identifie la façon dont un produit est gonflé, tel qu’automatique
        ou hydrostatique
    ingredient_category:
      name: Catégorie de l’ingrédient
      description: Classifie le type d’ingrédients dans les vitamines et les suppléments,
        par exemple les fibres, les herbes
    ingredient_origin:
      name: Origine des ingrédients
      description: Spécifie la source des ingrédients du produit, par exemple, naturelle
        ou synthétique
    ingredient_pathway:
      name: Parcours des ingrédients
      description: Indique si les ingrédients de parfumerie sont obtenus naturellement
        par séparation physique de la biomasse sans altération chimique, ou s’ils
        sont synthétisés par d’autres méthodes
    ingredients:
      name: Ingrédients
      description: Précise les composants utilisés dans la formulation d’un produit,
        par exemple l’oxyde de zinc, l’aloe vera
    ingress_protection_ip_rating:
      name: Indice de protection (IP)
      description: Fournit l’indice IP officiel de résistance à l’eau et à la poussière
        auquel le boîtier est conforme (par exemple, IP68)
    ink_application_technique:
      name: Technique d’application de l’encre
      description: Décrit la méthode utilisée pour appliquer l’encre dans les arts
        et les loisirs créatifs, par exemple, sérigraphie
    ink_color:
      name: Couleur de l’encre
      description: Identifie la couleur de l’encre, généralement pour les fournitures
        de bureau, par exemple, noir ou argent
    ink_form:
      name: Forme d’encre
      description: Décrit le mode d’emballage ou de distribution de l’encre artistique,
        par exemple, stylo ou bouteille
    ink_pattern:
      name: Modèle d’encre
      description: Identifie le thème visuel de stylos ou de tampons, par exemple
        géométrique ou Noël
    ink_type:
      name: Type d’encre
      description: Identifie le type d’encre utilisée dans un produit, par exemple,
        encre à base de solvant ou colorant
    inline_skating_style:
      name: Style de patinage en ligne
      description: Définit le style spécifique de patinage en ligne pour lequel le
        produit est conçu, comme le patinage en ligne récréatif ou de vitesse
    input/output_ports:
      name: Ports d’entrée/sortie
      description: Identifie les types de ports disponibles sur un appareil, par exemple,
        USB ou prise de sortie
    input_connection:
      name: Connexion d’entrée
      description: Précise le type de connexion d’entrée pour les câbles audio, comme
        3,5 mm ou RCA
    input_connection_type:
      name: Type de connexion d’entrée
      description: Spécifie le connecteur ou la norme d’interface acceptée par le
        convertisseur du côté entrée
    input_signal_interface:
      name: Interface de signal d’entrée
      description: Spécifie le ou les types de connexions d’entrée acceptés par le
        convertisseur audio
    input_video_interface:
      name: Interface vidéo d’entrée
      description: Spécifie le ou les types de connecteur vidéo acceptés comme entrée
        par le convertisseur de balayage
    insole_length_type:
      name: Type de longueur de semelle
      description: Définit le style de couverture ou de longueur de l’insert
    installation_accessories_included:
      name: Accessoires d’installation inclus
      description: Identifie tous les outils ou matériels d’instruction fournis avec
        la batterie pour faciliter l’installation
    installation_tools_included:
      name: Outils d’installation inclus
      description: Répertorie tous les outils ou consommables fournis avec la pièce
        pour faciliter l’installation
    instruction_set_architecture:
      name: Architecture de l’ensemble des instructions
      description: Définit l’architecture informatique qu’un processeur peut comprendre,
        par exemple 32 bits
    instrument/accessory_finish:
      name: Finition instrument/accessoire
      description: Décrit le traitement de surface ou la couleur d’un instrument de
        musique ou d’un accessoire, par exemple, plaqué or ou laqué
    instrument_accessory_material:
      name: Matériau de l’accessoire pour instrument
      description: Identifie le matériau utilisé dans les accessoires d’instruments
        de musique, par exemple, bois ou laiton
    instrument_bow_material:
      name: Matériau de l’archet de l’instrument
      description: Identifie le matériau utilisé dans la construction de l’archet
        d’un instrument de musique, par exemple, fibre de carbone ou bois-brésil
    instrument_color:
      name: Couleur de l’instrument
      description: Identifie la couleur d’un instrument de musique, comme le noir
        ou l’argent
    instrument_controller_type:
      name: Type de contrôleur d’instrument
      description: Identifie l’instrument de musique simulé par un contrôleur de jeu,
        comme une guitare ou un microphone
    instrument_material:
      name: Matériau de l’instrument
      description: Identifie le principal matériau utilisé dans la fabrication d’un
        instrument de musique, par exemple, bois d’érable ou laiton
    instrument_part_material:
      name: Matériau de la pièce de l’instrument
      description: Spécifie le type de matériau utilisé dans les parties de l’instrument,
        par exemple, bois d’ébène ou plaqué or
    instrument_pattern:
      name: Modèle d’instrument
      description: Décrit la composition visuelle ou le motif d’un instrument de musique,
        par exemple uni ou texturé
    instrument_string_color:
      name: Couleur des cordes de l’instrument
      description: Identifie la couleur de cordes d’instruments de musique, comme
        l’or ou l’argent
    instrument_string_material:
      name: Matériau des cordes de l’instrument
      description: Spécifie la composition des cordes d’instruments de musique, par
        exemple, bronze ou fluorocarbone
    instrument_string_pattern:
      name: Modèle des cordes de l’instrument
      description: Indique le motif de cordes de guitare, par exemple uni ou géométrique
    instrument_support_type:
      name: Type de support de l’instrument
      description: Identifie le type de support utilisé pour un instrument de musique,
        comme un tour de cou ou un pupitre
    insulation_material:
      name: Matériau isolant
      description: Spécifie la composition de l’isolant, par exemple, laine minérale
        ou polyuréthane (PU)
    integrated_led_lighting:
      name: Éclairage LED intégré
      description: Indique si le haut-parleur intègre un éclairage LED ou RVB et son
        type
    integrated_power/charging_options:
      name: Options d’alimentation/de charge intégrées
      description: Spécifie si le support comprend des prises électriques et/ou des
        ports de charge USB intégrés, améliorant l’utilité des appareils connectés
    integrated_stand_type:
      name: Type de support intégré
      description: Décrit le style de support intégré ou le mécanisme de support sur
        le boîtier
    intended_application:
      name: Application prévue
      description: Identifie l’utilisation spécifique des peintures et des teintures,
        par exemple, portes, terrasses ou clôtures
    intended_effect:
      name: Effet recherché
      description: Décrit le principal bienfait pour la santé que le complément alimentaire
        à base de CBD est censé apporter
    intended_jewelry_type:
      name: Type de bijoux concernés
      description: Indique les types de bijoux que le support est conçu pour contenir
        ou exposer
    intended_surface:
      name: Surface prévue
      description: Identifie la principale surface que l’alèse est conçue pour protéger
    intercom_communication_type:
      name: Type de communication de l’intercom
      description: Classe le format de communication fondamental pris en charge par
        l’unité
    intercom_wiring_type:
      name: Type de câblage de l’intercom
      description: Spécifie le schéma de câblage ou de communication pour lequel un
        haut-parleur d’intercom est conçu
    interface_type:
      name: Type d’interface
      description: Identifie le type de connexion qu’un produit utilise, par exemple,
        Bluetooth ou USB
    interior_lining_material:
      name: Matériau de doublure intérieure
      description: Identifie le matériau principal qui tapisse l’intérieur de la boîte
        à bijoux, protégeant les bijoux des rayures et de l’usure
    interior_texture:
      name: Texture intérieure
      description: Définit le motif de surface interne qui aide à créer de la mousse
        à l’intérieur du bol ou de la tasse
    internal_drive_form_factor_supported:
      name: Facteur de forme du disque interne pris en charge
      description: Indique les tailles de disque dur compatibles pour un périphérique,
        par exemple 2,5 pouces
    internet_radio_form_factor:
      name: Facteur de forme de la radio Internet
      description: Définit le style physique ou l’orientation de montage de la radio
        Internet
    intimate_apparel_features:
      name: Caractéristiques du vêtement intime
      description: Décrit les caractéristiques particulières des vêtements intimes,
        par exemple, design respirant ou coupe confortable
    inverter_type:
      name: Type d’onduleur
      description: Identifie le type d’onduleur dans les pièces de véhicules électriques,
        par exemple, onde sinusoïdale pure ou onde carrée
    invitation_personalization_design:
      name: Conception de la personnalisation d’invitation
      description: Définit les caractéristiques de conception d’une invitation, par
        exemple, RSVP inclus ou personnalisable
    ironing_features:
      name: Caractéristiques de repassage
      description: Spécifie les caractéristiques spéciales d’un fer ou d’un système
        de repassage, par exemple, mise hors tension automatique ou coup de vapeur
    item_condition:
      name: État de l’objet
      description: Indique la qualité d’un article, généralement des véhicules ou
        des pièces de véhicules, par exemple, occasion certifiée ou remis à neuf
    item_material:
      name: Matériau de l’article
      description: Spécifie la substance principale d’un article, généralement pour
        les pièces et accessoires de véhicules, par exemple, cuivre ou fibre de verre
    item_style:
      name: Style d’article
      description: Décrit le thème esthétique ou de conception d’un produit, par exemple,
        moderne ou rustique
    j_cup_type:
      name: Type de J-Cup
      description: Définit le style des J-Cups sur les équipements d’haltérophilie,
        par exemple plat, sandwich
    jaw_advancement_adjustability:
      name: Ajustabilité de l’orthèse d’avancée mandibulaire
      description: Indique si et comment la position de la mâchoire inférieure fournie
        par l’orthèse peut être ajustée par l’utilisateur
    jaw_material:
      name: Matériau du mors
      description: Identifie le matériau utilisé dans la mâchoire d’un outil, par
        exemple, acier ou titane
    jewelry_cleaning_accessories_included:
      name: Accessoires de nettoyage des bijoux inclus
      description: Répertorie tous les outils ou accessoires supplémentaires fournis
        avec le nettoyant (par exemple, brosses, plateaux, chiffons de polissage)
    jewelry_cleaning_purpose:
      name: Objectif du nettoyage des bijoux
      description: Indique la fonction principale prévue du produit (par exemple,
        élimination du ternissement, polissage, revêtement protecteur)
    jewelry_finding_type:
      name: Type d’identification de bijou
      description: Identifie le composant spécifique utilisé dans la confection de
        bijoux, comme un capuchon de perle ou un anneau ouvert
    jewelry_material:
      name: Matériau du bijou
      description: Identifie le matériau principal utilisé dans les bijoux, par exemple,
        or ou émail
    jewelry_project_type:
      name: Type de projet de bijoux
      description: Spécifie le type de projet de joaillerie, par exemple, fabrication
        de colliers ou travail du fil
    jewelry_set_type:
      name: Type de parure de bijoux
      description: Identifie le type de bijoux dans un kit de fabrication de bijoux,
        par exemple, bague ou collier
    jewelry_steam_cleaner_features:
      name: Caractéristiques du nettoyeur à vapeur pour bijoux
      description: Répertorie les caractéristiques intégrées ou les fonctions de sécurité
        notables qui différencient les modèles
    jewelry_type:
      name: Type de bijoux
      description: Fait la distinction entre les types de bijoux, joaillerie fine
        ou bijoux fantaisie par exemple
    joint_connection:
      name: Connexion commune
      description: Spécifie la connexion commune dans les queues de billard, par exemple,
        composite ou sans joint
    joint_face_type:
      name: Type de surface de joint
      description: Spécifie le type de face de joint sur les queues de billard, par
        exemple, complet ou piloté
    joint_style:
      name: Style de joint
      description: Définit le type de joint utilisé pour les queues de billard, comme
        uni-loc ou radial
    journey_type:
      name: Type de trajet
      description: Spécifie le type de trajet couvert par le titre de transport en
        fonction du nombre de trajets et du sens du trajet
    joystick_mounting_style:
      name: Style de montage du joystick
      description: Indique comment le joystick est fixé à un panneau de contrôle ou
        à une armoire
    joystick_sensor_technology:
      name: Technologie de capteur du joystick
      description: Identifie la principale technologie de détection utilisée pour
        détecter le mouvement ou la position
    jump_rope_design:
      name: Conception de la corde à sauter
      description: Décrit le type de corde à sauter, tel que classique ou connecté
    jumping_surface_color:
      name: Couleur de la surface de saut
      description: Identifie la couleur d’une surface de saut d’un trampoline, comme
        le bleu ou le noir
    jumping_surface_material:
      name: Matériau de la surface de saut
      description: Spécifie le tissu de la zone de saut du trampoline, par exemple,
        synthétique ou polypropylène
    jumping_surface_pattern:
      name: Modèle de surface de saut
      description: Identifie le motif ou l’imprimé de la surface de saut d’un trampoline,
        comme des étoiles ou des rayures
    karaoke_modes:
      name: Modes de karaoké
      description: Précise le type de performance karaoké, comme simple ou duo
    kerosene_application:
      name: Application de kérosène
      description: Identifie l’utilisation spécifique du kérosène, par exemple, appareils
        de chauffage ou carburéacteur
    key_purpose:
      name: Objectif clé
      description: Spécifie l’endroit où une clé ou une clé brute est destinée à être
        utilisée, par exemple, porte ou cadenas
    keyboard_action:
      name: Action du clavier
      description: Spécifie la sensation des touches du piano, par exemple, action
        du marteau ou touches pondérées
    keyboard_assembly_type:
      name: Type d’assemblage du clavier
      description: Définit l’assemblage physique fourni (par exemple, clavier autonome,
        repose-poignet avec clavier, jeu de touches individuelles)
    keyboard_backlight_type:
      name: Type de rétroéclairage du clavier
      description: Détaille la technologie ou le style d’éclairage utilisé pour les
        touches ou le boîtier du clavier
    keyboard_format:
      name: Format du clavier
      description: Définit la taille et la disposition d’un clavier, par exemple pleine
        taille ou compact
    keyboard_key_type:
      name: Type de touche du clavier
      description: Décrit la réponse ou la sensation des touches des claviers musicaux,
        par exemple, lestée ou semi-lestée
    keyboard_language:
      name: Langue du clavier
      description: Précise la disposition de la langue d’un clavier, comme ENG (anglais)
        ou DEU (allemand)
    keyboard_layout:
      name: Disposition du clavier
      description: Précise la disposition des touches sur un clavier, par exemple
        QWERTY, Workman
    keyboard_mounting_style:
      name: Style de montage du clavier
      description: Définit la méthode d’assemblage des plaques internes, influant
        sur le son et le toucher des claviers mécaniques
    keyboard_port_type:
      name: Type de port du clavier
      description: Précise le type de port pour la connectivité du clavier, comme
        USB Type-C
    keyboard_specialized_features:
      name: Fonctionnalités spécialisées du clavier
      description: Identifie les caractéristiques uniques d’un clavier, par exemple,
        angle réglable ou rétroéclairage
    keyboard_switch_type:
      name: Type de commutateur du clavier
      description: Précise le style de retour du clavier, comme tactile ou clic
    keyboard_type:
      name: Type de clavier
      description: Précise la conception et la fonctionnalité d’un clavier, par exemple
        standard, rétroéclairé
    keycap_legend_printing_method:
      name: Méthode d’impression des inscriptions sur les touches
      description: Décrit comment les inscriptions sont appliquées sur les touches,
        influant sur la longévité et l’apparence
    keycap_material:
      name: Matériau des touches
      description: Indique le matériau principal ou le processus de fabrication des
        touches, influant sur la durabilité, la texture et les inscriptions
    keycap_profile:
      name: Profil des touches
      description: Spécifie la forme ou la famille de formes de l’ensemble des touches,
        influant sur le confort de frappe et l’esthétique
    keypad_style:
      name: Style de clavier
      description: Définit la méthode de saisie pour les claviers, numérique ou alphanumérique
        par exemple
    keystone_correction_type:
      name: Type de correction trapézoïdale
      description: Décrit le type de correction trapézoïdale ou géométrique pris en
        charge par le projecteur pour éliminer la distorsion trapézoïdale (par exemple,
        verticale manuelle, quatre points automatique)
    kiln_features:
      name: Caractéristiques du four
      description: Spécifie les capacités fonctionnelles et les caractéristiques de
        conception du four
    kiln_loading_style:
      name: Mode de chargement du four
      description: Spécifie la méthode utilisée pour placer les articles dans la chambre
        du four et les en retirer
    kit_construction_type:
      name: Type de construction en kit
      description: Spécifie le tissu de la zone de saut d’un trampoline, par exemple,
        synthétique ou polypropylène
    kitchen/dining_furniture_items_included:
      name: Meubles de cuisine/salle à manger inclus
      description: Identifie les meubles spécifiques inclus dans un ensemble, comme
        des chaises de salle à manger ou un îlot de cuisine
    kitchen_utensil_items_included:
      name: Ustensiles de cuisine inclus
      description: Identifie les outils inclus dans un ensemble d’ustensiles de cuisine,
        comme un fouet ou des pinces
    kitesurfing_style:
      name: Style de kitesurf
      description: Définit le style spécifique de kitesurf pour lequel le produit
        est conçu, comme le surf sur les vagues
    knee_brace_style:
      name: Style d’orthèse de genou
      description: Définit la conception structurelle de l’orthèse, reflétant la façon
        dont elle est portée et le niveau de soutien fourni
    kneeboard_features:
      name: Caractéristiques du kneeboard
      description: Décrit les caractéristiques spécifiques d’un kneeboard, par exemple,
        sangle réglable ou antidérapant
    knife_type:
      name: Type de couteau
      description: Classifie les couteaux en fonction de leur utilisation ou de leur
        conception prévue, comme le multi-outil ou EDC
    knitting/padding_project_type:
      name: Type de projet de tricot/rembourrage
      description: Identifie l'utilisation prévue des matériaux de tricot ou de rembourrage,
        tels que le matelassage ou la fabrication d'oreillers
    knitting_project_type:
      name: Type de projet de tricot
      description: Spécifie le type de projet de tricot, par exemple, fabrication
        d’oreiller ou fabrication de peluche
    knob/handle_design:
      name: Conception de bouton/poignée
      description: Décrit le style de la quincaillerie d’une armoire, par exemple,
        bouton rond ou poignée à barre
    knob_function:
      name: Fonction du bouton
      description: Spécifie la fonction des boutons de l’amplificateur, par exemple,
        gain ou présence
    knob_style:
      name: Style de bouton
      description: Décrit la conception des boutons sur les amplificateurs d’instruments
        de musique, par exemple, standard ou rétro/vintage
    knot_shape:
      name: Forme du nœud
      description: Spécifie la forme ou le profil général du nœud ou de la tête du
        blaireau
    labeling_project_type:
      name: Type de projet d’étiquetage
      description: Spécifie le but de fabrication des étiquettes cousues, par exemple,
        textiles pour la maison ou cadeaux personnalisés
    laboratory_freezer_design:
      name: Conception d’un congélateur de laboratoire
      description: Décrit la configuration d’un congélateur de laboratoire, par exemple,
        vertical ou coffre
    lacrosse_equipment_included:
      name: Équipement de crosse inclus
      description: Spécifie les articles d’un ensemble d’équipement de crosse, par
        exemple, bâton ou épaulettes
    ladder_type:
      name: Type d’échelle
      description: Identifie le style d’échelle de bateau, par exemple, fixe ou télescopique
    lamination_mode:
      name: Mode de plastification
      description: Identifie le type de processus de laminage utilisé, comme le laminage
        à froid ou à chaud
    lamination_type:
      name: Type de pelliculage
      description: Identifie si la surface du tableau ou du modèle est pelliculée
        et, le cas échéant, s’il s’agit d’un pelliculage simple ou double face
    lamp_assembly_type:
      name: Type d’assemblage de lampe
      description: Spécifie si le produit est une ampoule nue, une lampe avec boîtier,
        un pack double ou une autre configuration d’assemblage
    lamp_quality_grade:
      name: Niveau de qualité de la lampe
      description: Indique si la lampe est d’origine OEM, utilise une ampoule OEM
        dans un boîtier compatible ou est entièrement du marché secondaire/compatible
    lamp_type:
      name: Type de lampe
      description: Spécifie la source de lumière dans les agrandisseurs photographiques,
        par exemple, lumière froide ou dichroïque
    lancet_mechanism_type:
      name: Type de mécanisme de lancette
      description: Définit le mécanisme de fonctionnement ou la conception de sécurité
        des lancettes (par exemple, rétractable, activé par pression)
    language:
      name: Langue
      description: Précise la langue utilisée ou la langue compatible, par exemple
        anglais, multilingue
    language_version:
      name: Version linguistique
      description: Spécifie la version linguistique d’un produit multimédia, par exemple,
        ENG-US ou ARA-arabe
    laptop_cable_type:
      name: Type de câble d’ordinateur portable
      description: Identifie l’objectif fonctionnel du câble dans l’ordinateur portable
    laptop_housing_part_type:
      name: Type de boîtier d’ordinateur portable
      description: Spécifie le composant extérieur fourni (par exemple, base inférieure,
        repose-poignet, cadre)
    laser_color:
      name: Couleur du laser
      description: Identifie la couleur d’un pointeur laser, par exemple, rouge ou
        vert
    laser_light_source:
      name: Source de lumière laser
      description: Spécifie la technologie lumineuse utilisée dans les pointeurs laser,
        par exemple, LED
    laser_pattern:
      name: Motif au laser
      description: Identifie le dessin ou le motif produit par un laser, comme des
        étoiles ou un animal
    lathe_application:
      name: Application du tour
      description: Spécifie le type de travail pour lequel un tour est conçu, par
        exemple, filage de l’acrylique ou travail du verre
    laundry_detergent_features:
      name: Caractéristiques du détergent à lessive
      description: Décrit les caractéristiques particulières d’un détergent à lessive,
        par exemple, protection des couleurs ou élimination des taches
    lead_grade:
      name: Qualité de la mine
      description: Spécifie la qualité du plomb dans les instruments d’écriture, par
        exemple, H ou 9B
    leash_design:
      name: Conception de la laisse
      description: Décrit la fonctionnalité de laisses pour animaux de compagnie,
        telle que détachable ou rétractable
    leather/vinyl_texture:
      name: Texture cuir/vinyle
      description: Décrit la texture de surface des produits en cuir ou en vinyle,
        par exemple, lisse ou granuleuse
    leather_type:
      name: Type de cuir
      description: Spécifie l'origine animale ou le type de cuir utilisé dans le produit
        (par exemple, cuir de vachette, cuir de veau, cuir de crocodile, cuir de python,
        cuir synthétique)
    lectern_mounting_type:
      name: Type de montage du pupitre
      description: Spécifie le style d’installation d’un pupitre, par exemple, table
        ou sol
    led_light_mode:
      name: Mode de lumière LED
      description: Répertorie les modes de fonctionnement sélectionnables qui combinent
        différents spectres ou intensités (par exemple, bleu, rouge, bleu et rouge)
    leg_color:
      name: Couleur des pieds
      description: Définit la teinte des pieds d’un produit, par exemple blanc, marron
    leg_lock_type:
      name: Type de verrouillage du trépied
      description: Identifie le type de verrouillage sur pieds des accessoires électroniques,
        généralement des bâtons à selfie ; comme le verrouillage rotatif
    leg_material:
      name: Matériau des pieds
      description: Précise le matériau utilisé pour les pieds d’un produit, comme
        le bois de cerisier ou le bambou
    leg_pattern:
      name: Modèle de pieds
      description: 'Définit le motif ou l’impression sur les pieds du produit, comme
        des animaux ou des formes géométriques '
    leg_sections:
      name: Sections du trépied
      description: Indique le nombre de sections du trépied pour les accessoires électroniques,
        généralement des bâtons à selfie ; par exemple plus de 5
    legend_type:
      name: Type de légende
      description: Indique si le marqueur est vierge ou pré-imprimé avec des nombres,
        lettres, symboles ou autres marquages
    length_adjustability:
      name: Ajustabilité de la longueur
      description: Indique si la longueur du cordon ou de la chaîne peut être modifiée
        par l’utilisateur ou si elle est fixe
    lens/slide_material:
      name: Matériau de la lentille/lame
      description: Précise le matériau utilisé dans la fabrication des lentilles ou
        des diapositives, comme le plastique ou le verre
    lens_cap_compatible_device:
      name: Appareil compatible avec le capuchon d’objectif
      description: Spécifie l’équipement compatible avec les bouchons d’objectif,
        par exemple, monoculaire ou appareil photo numérique
    lens_case_accessories_included:
      name: Accessoires inclus avec l’étui à lentilles de contact
      description: Répertorie les articles additionnels fournis avec l’étui (par exemple,
        pinces, flacon de solution)
    lens_characteristic:
      name: Caractéristique des lunettes
      description: Répertorie les caractéristiques fonctionnelles spéciales appliquées
        aux verres (par exemple, anti-lumière bleue, UV400)
    lens_coating:
      name: Revêtement de la lentille
      description: Précise le type de revêtement sur les verres de lunettes, par exemple
        antireflet, résistant aux rayures
    lens_color:
      name: Couleur de lentille
      description: Spécifie la couleur des verres de lunettes, par exemple, jaune
        ou noir
    lens_color_combination:
      name: Combinaison de couleurs des verres
      description: Spécifie la combinaison de couleurs des verres utilisée pour les
        lunettes 3D anaglyphes
    lens_configuration:
      name: Configuration de l’objectif
      description: Spécifie la structure des lentilles dans des articles tels que
        les loupes, par exemple, une ou plusieurs lentilles
    lens_filter_category:
      name: Catégorie de filtre des verres
      description: Spécifie la catégorie de filtre standard européenne (0-4) qui classe
        les verres selon leur densité de teinte et les conditions d’éclairage auxquelles
        ils sont adaptés
    lens_filter_effects:
      name: Effets de filtre d’objectif
      description: Décrit les effets spécifiques d’un filtre d’objectif, par exemple,
        correction de couleur ou macro
    lens_filter_type:
      name: Type de filtre d’objectif
      description: Spécifie la catégorie de filtre pour les objectifs d’appareil photo,
        par exemple, dégradé ou densité neutre
    lens_kit_accessories_included:
      name: Accessoires du kit d’objectifs inclus
      description: Répertorie les éléments supplémentaires fournis avec l’objectif
        ou le kit de filtres du téléphone afin que les acheteurs sachent exactement
        ce qu’ils obtiennent et puissent comparer les lots
    lens_material:
      name: Matériau de la lentille
      description: Identifie le matériau principal utilisé pour les éléments optiques
        ou le boîtier de la lentille, tel que le verre optique, le plastique ou l’alliage
        d’aluminium
    lens_pattern:
      name: Modèle de lentille
      description: Décrit le design ou l’apparence visuelle de verres de lunettes,
        comme uni ou texturé
    lens_polarization:
      name: Polarisation des verres
      description: Indique le type de polarisation des verres des lunettes, photo
        polarisés par exemple
    lens_protector_coverage_style:
      name: Style de couverture du protecteur d’objectif
      description: Définit le facteur de forme physique ou la conception de couverture
        d’un protecteur d’objectif de téléphone portable
    lens_protector_features:
      name: Caractéristiques du protecteur d’objectif
      description: Répertorie les fonctionnalités spéciales offertes par le protecteur
    lens_refractive_index:
      name: Indice de réfraction des verres
      description: Spécifie l’indice de réfraction numérique (par exemple, 1,50, 1,60,
        1,67) qui est directement lié à l’épaisseur et au poids des verres
    lens_storage_type:
      name: Type de stockage de la lentille
      description: Décrit le type de rangement pour des objectifs d’appareil photo,
        comme un étui ou une pochette
    lens_tint_type:
      name: Type de teinte de lentille
      description: Décrit la teinte appliquée à la lentille à des fins esthétiques
        ou pour améliorer la visibilité
    lens_type:
      name: Type de verres
      description: Précise le type de verre de lunettes, comme polarisé ou progressif
    license_type:
      name: Type de licence
      description: Spécifie le type de licence logicielle, par exemple, open source
        ou achat unique
    lid_material:
      name: Matériau du couvercle
      description: Identifie le type de matériau utilisé dans le couvercle du produit,
        par exemple, verre ou acier inoxydable
    lid_type:
      name: Type de couvercle
      description: Précise le type de couvercle utilisé, ouverture par le haut ou
        encliquetable par exemple
    life_jacket_features:
      name: Caractéristiques du gilet de sauvetage
      description: Met en avant les caractéristiques uniques des gilets de sauvetage,
        par exemple, réfléchissant ou flottant
    light_attachment_type:
      name: Type de fixation légère
      description: Décrit le mode de fixation de la liseuse, par exemple, flexible
        ou fixe
    light_color:
      name: Couleur claire
      description: Définit la couleur ou la teinte de la lumière, comme le blanc ou
        le multicolore
    light_control:
      name: Contrôle de la lumière
      description: Définit le niveau de blocage de la lumière par les habillages de
        fenêtre, par exemple occultant, transparent
    light_design:
      name: Conception de la lumière
      description: Décrit le type de conception d’éclairage dans les accessoires d’appareil
        photo, par exemple, LED ou anneau de lumière
    light_exposure_modes:
      name: Modes d’exposition à la lumière
      description: Spécifie les options de réglage de la lumière dans les appareils
        photo, par exemple, priorité à la vitesse AE ou priorité à l’ouverture AE
    light_filtering:
      name: Filtre à lumière
      description: Spécifie les capacités de filtrage de la lumière d’un produit,
        par exemple, diffusion ou occultation
    light_options:
      name: Options d’éclairage
      description: Précise les caractéristiques d’éclairage d’un produit, comme une
        lumière douce ou un changement de couleur
    light_pattern:
      name: Motif lumineux
      description: Définit le thème visuel de produits d’éclairage, par exemple géométrique
        ou arc-en-ciel
    light_rejection_type:
      name: Type de rejet de la lumière
      description: Indique si et comment l’écran rejette la lumière ambiante ou celle
        provenant du plafond, améliorant ainsi le contraste de l’image dans des environnements
        lumineux
    light_source:
      name: Source de lumière
      description: Identifie le type d’ampoule utilisé dans un produit, comme une
        LED ou une ampoule fluorescente
    light_spectrum:
      name: Spectre lumineux
      description: Définit la gamme de longueurs d’onde lumineuses qu’un produit peut
        produire, par exemple la lumière bleue, la lumière infrarouge
    light_temperature:
      name: Température de la lumière
      description: Définit les caractéristiques de la couleur des sources lumineuses,
        comme le blanc chaud ou la lumière du jour
    light_therapy_device_form_factor:
      name: Facteur de forme de l’appareil de luminothérapie
      description: Décrit le style physique ou la configuration de l’appareil (par
        exemple, panneau, masque, portable)
    light_type:
      name: Type d’éclairage
      description: Identifie le type spécifique de lumière utilisé dans les embarcations,
        par exemple, navigation ou sous l’eau
    lighting_features:
      name: Caractéristiques d’éclairage
      description: Décrit les caractéristiques particulières de l’éclairage, par exemple,
        luminosité réglable ou éclairage LED
    lighting_options:
      name: Options d’éclairage
      description: Spécifie le type d’éclairage pour la signalétique, par exemple,
        illuminé ou non
    lighting_type:
      name: Type d’éclairage
      description: Décrit toutes les fonctionnalités d’éclairage intégrées au casque
    line/rope_type:
      name: Type de ligne et de corde
      description: Identifie le style de fabrication des lignes ou des cordes d’ancrage,
        par exemple, à trois brins ou à double tresse
    line_spacing_options:
      name: Options d’espacement des lignes
      description: Identifie les options d’espacement des lignes, généralement pour
        les machines à écrire, par exemple, double ou réglable
    liner_features:
      name: Caractéristiques du revêtement
      description: Décrit les caractéristiques spécifiques des doublures, par exemple,
        étanches ou biodégradables
    lip_balm_tint_level:
      name: Niveau de teinte du baume à lèvres
      description: Classe le niveau de teinte ou de rendu de couleur que fournit le
        baume
    lip_gloss_applicator_type:
      name: Type d’applicateur du brillant à lèvres
      description: Identifie le style d’applicateur inclus avec le brillant à lèvres,
        influant sur la facilité d’application et les préférences de l’utilisateur
    lip_gloss_effect:
      name: Effet gloss
      description: Décrit l’effet ou la finition que procure un brillant à lèvres,
        par exemple lissant, repulpant
    lip_gloss_formulation:
      name: Formulation du brillant à lèvres
      description: Définit la texture ou le format principal du brillant à lèvres
    lip_liner_design:
      name: Conception du crayon à lèvres
      description: Identifie le type de crayon à lèvres, tel que rétractable ou figé
    lip_makeup_opacity:
      name: Couvrance du maquillage pour les lèvres
      description: Indique le niveau de couvrance ou d’opacité du produit une fois
        appliqué
    lip_plate_material:
      name: Matériau du labret
      description: Identifie le matériau utilisé pour la plaque à lèvres d’une flûte,
        par exemple, argent ou bois
    lipstick_coverage:
      name: Couvrance du rouge à lèvres
      description: Décrit le niveau d’opacité de la couleur du rouge à lèvres (par
        exemple, léger, moyen, total)
    lipstick_effect:
      name: Effet rouge à lèvres
      description: Décrit l’effet ou la finition que procure un rouge à lèvres, par
        exemple lissant, repulpant
    liqueur_variety:
      name: Variété de liqueur
      description: Classe les liqueurs selon leurs profils aromatiques principaux,
        par exemple noix, crème
    livestock_food_ingredients:
      name: Ingrédients alimentaires pour le bétail
      description: Spécifie les principaux ingrédients des aliments pour animaux,
        par exemple, orge ou tourteau de soja
    lnb_output:
      name: Sortie LNB
      description: Précise le nombre de connexions de récepteur satellite, comme unique
        ou quadruple
    lnb_technology:
      name: Technologie LNB
      description: Classe le type de technologie dans les blocs-convertisseurs à faible
        bruit, comme universel ou à faible bruit
    load_capacity:
      name: Capacité de chargement
      description: Spécifie la limite de poids qu’un produit peut supporter, par exemple,
        travaux légers ou à toute épreuve
    loading_ramp_type:
      name: Type de rampe de chargement
      description: Identifie le style de rampe de chargement pour les véhicules, par
        exemple, simple ou triple
    loading_type:
      name: Type de chargement
      description: Précise le mode de chargement des appareils de blanchisserie, par
        exemple frontal ou par le haut
    lock_placement:
      name: Emplacement du verrou
      description: Identifie l’emplacement du verrou sur les pièces d’un moteur de
        bateau, par exemple, extérieur ou intérieur
    lock_type:
      name: Type de verrou
      description: Précise le mécanisme de verrouillage utilisé par un produit, comme
        une clé ou un code
    locking_mechanism:
      name: Mécanisme de verrouillage
      description: Précise le type de fermeture utilisé, généralement pour les produits
        de sécurité ; par exemple fermeture automatique, à glissière
    logic_family:
      name: Famille logique
      description: Identifie la famille logique ou la technologie des semi-conducteurs
        du circuit intégré
    lovibond:
      name: Lovibond
      description: Indique l’intensité de la couleur des grains et des malts de brasserie,
        par exemple, claire ou foncée
    lubricant_application:
      name: Application de lubrifiant
      description: Définit les zones d’application appropriées pour le lubrifiant
        personnel, comme le massage ou le vagin
    lubricant_composition:
      name: Composition du lubrifiant
      description: Définit l’ingrédient de base des lubrifiants personnels, à base
        d’eau ou de silicone par exemple
    lubricant_dispenser_type:
      name: Type de distributeur de lubrifiant
      description: Identifie le type d’emballage ou de contenant des lubrifiants,
        par exemple, bidon ou bouteille
    lubricant_effect:
      name: Effet lubrifiant
      description: Indique tout effet fonctionnel ou style fourni par la lubrification
        du préservatif
    lubricant_form:
      name: Forme de lubrifiant
      description: Décrit la consistance d’un lubrifiant, par exemple, gel ou pâte
    luggage/bag_closure:
      name: Fermeture du bagage/sac
      description: Identifie le type de fermeture utilisé sur les bagages ou les sacs,
        par exemple, fermeture éclair ou bouton-pression
    lumber/wood_type:
      name: Type de bois
      description: Identifie le type spécifique de bois utilisé dans un produit, par
        exemple, chêne ou pin
    lyre/flip_folder_attachment_type:
      name: Type de pièce jointe au dossier Lyre/Flip
      description: Spécifie le type d’attache pour les lyres musicales et les dossiers
        à rabat, par exemple, sangle ou pince lyre
    m_2_drive_length_supported:
      name: Longueur de SSD M.2 prise en charge
      description: Spécifie les longueurs de SSD M.2 acceptées par le boîtier ou l’adaptateur
    magnet_type:
      name: Type d’aimant
      description: Identifie le type d’aimant utilisé dans un produit, par exemple
        en céramique, en titane
    magnification:
      name: Grossissement
      description: Spécifie la force d’agrandissement d’un produit, par exemple, 1x
        ou 100x
    magsafe_compatibility:
      name: Compatibilité MagSafe
      description: Indique si l’accessoire prend en charge la fixation magnétique
        MagSafe ou l’écosystème de charge d’Apple
    makeup_brush_application:
      name: Application du pinceau de maquillage
      description: Spécifie l’utilisation cosmétique principale ou la zone pour laquelle
        le pinceau est conçu (par exemple, teint, paupières, contours du visage)
    makeup_features:
      name: Caractéristiques du maquillage
      description: Met en avant les caractéristiques clés des cosmétiques, par exemple,
        forte pigmentation ou sans parfum
    makeup_shade:
      name: Teinte du maquillage
      description: Décrit la teinte de produits cosmétiques, comme le rose moyen ou
        le marron foncé
    mallet_material:
      name: Matériau du maillet
      description: Identifie le type de matériau utilisé dans les maillets à percussion,
        par exemple, laiton ou caoutchouc
    management_type:
      name: Type de gestion
      description: Décrit le niveau de gestion de l’appareil (par exemple, entièrement
        géré, géré intelligent, non géré), afin que les acheteurs puissent faire correspondre
        les capacités du produit aux exigences du réseau
    mandibular_device_fitting_method:
      name: Méthode d’ajustement du dispositif mandibulaire
      description: Décrit comment l’appareil est ajusté ou moulé aux dents de l’utilisateur
    mandolin_back_shape:
      name: Forme du dos de la mandoline
      description: Spécifie la courbure et la conception du dos de la mandoline, comme
        un dos plat ou archtop
    manufacturer_type:
      name: Type de fabricant
      description: Spécifie la source des pièces ou accessoires de véhicule, par exemple,
        pièces d’origine ou de tiers
    map_update_policy:
      name: Politique de mise à jour des cartes
      description: Indique comment les mises à jour des cartes sont fournies ou facturées
        pour l’appareil
    marine_navigator_features:
      name: Fonctionnalités du navigateur maritime
      description: Spécifie les capacités des outils de navigation maritime, par exemple,
        écran tactile ou étanche
    marker_format:
      name: Format de marqueur
      description: Définit le style physique ou la construction du marqueur
    marker_text_color:
      name: Couleur du texte du marqueur
      description: Spécifie la couleur de l’inscription imprimée ou du texte sur la
        surface du marqueur (distincte de la couleur du corps du marqueur)
    marker_tip_design:
      name: Conception de la pointe du marqueur
      description: Décrit la forme de la pointe d’un marqueur, par exemple, ogive
        ou biseautée
    marquee_substrate:
      name: Substrat du bandeau défilant
      description: Spécifie le support physique sur lequel l’œuvre est imprimée ou
        fournie (par exemple, film translucide, acrylique imprimé au verso, autocollant
        en vinyle)
    mascara_brush_shape:
      name: Forme de la brosse du mascara
      description: Spécifie la forme ou le conception de la brosse ou du goupillon
        intégré(e), influant fortement sur l’application et les résultats
    mascara_effect:
      name: Effet mascara
      description: Décrit le résultat ou la caractéristique attendu(e) du mascara,
        par exemple recourbant, allongeant
    mascara_formulation:
      name: Formulation du mascara
      description: Indique la composition de base du produit ou la technologie spéciale
        (par exemple, liquide, imprégné de fibres, tubulaire) influant sur la texture,
        la tenue et le retrait
    mask_cushion_material:
      name: Matériau du coussin du masque
      description: Détaille le matériau spécifique utilisé pour le coussin ou le joint
        du masque
    mask_size:
      name: Taille du masque
      description: Spécifie la désignation de taille fournie par le fabricant
    mask_type:
      name: Type de masque
      description: Précise la conception des masques, généralement destinés aux soins
        respiratoires ; par exemple oral, nasal
    masonry_material:
      name: Matériau de maçonnerie
      description: Spécifie la composition des matériaux de maçonnerie, par exemple,
        ciment ou calcaire
    masonry_product_form:
      name: Forme de produit de maçonnerie
      description: Spécifie la forme des produits de maçonnerie, par exemple, pâte
        ou poudre
    massage_area:
      name: Zone de massage
      description: Précise la partie du corps que le produit est conçu pour masser,
        comme les pieds ou le cou
    massage_mechanism_dimensionality:
      name: Dimensionnalité du mécanisme de massage
      description: Spécifie le nombre d’axes de mouvement dans lesquels les rouleaux
        de massage fonctionnent (par exemple, 2D, 3D, 4D, 5D)
    massage_stone_texture:
      name: Texture de la pierre de massage
      description: Décrit la texture de surface des pierres de massage, par exemple,
        lisse ou rugueuse
    massage_technique:
      name: Technique de massage
      description: Définit les méthodes de massage proposées par un produit, par exemple
        par percussion, tissus profonds
    mat/rug_shape:
      name: Forme du tapis
      description: Décrit la forme des tapis ou moquettes, par exemple, ronde ou carrée
    mat_base_material:
      name: Matériau de base du tapis
      description: Précise le type de matériau utilisé pour la base des tapis, c'est-à-dire
        liège ou mousse à mémoire de forme
    mat_features:
      name: Caractéristiques du tapis
      description: Décrit les caractéristiques spécifiques des tapis de maison ou
        de bureau, par exemple, base antidérapante ou imperméable
    material:
      name: Matériel
      description: Définit la matière principale d’un produit, comme le coton ou la
        laine
    material_firmness:
      name: Fermeté du matériau
      description: Décrit la fermeté ou la souplesse d’un produit, par exemple, rigide
        ou flexible
    material_hardness:
      name: Dureté du matériau
      description: Définit la fermeté du produit, généralement pour les équipements
        de sport ou de fitness ; extra doux ou haute résistance par exemple
    material_origin:
      name: Origine du matériau
      description: Indique la forme ou l'état sous lequel la matière précieuse est
        fournie (par exemple, en vrac/non montés, bijoux finis, carte cadeau imprimée/numérique)
    material_treatment:
      name: Traitement des matériaux
      description: Spécifie les traitements chimiques ou physiques appliqués aux matériaux
        à des fins de conservation ou de sécurité (par exemple, traitement thermique,
        fumigation, traitement chimique)
    maternity_clothing_features:
      name: Caractéristiques du vêtement de maternité
      description: Décrit les caractéristiques uniques des vêtements de maternité,
        par exemple, espace pour la croissance du ventre ou bonnets de soutien
    maternity_sleepwear_style:
      name: Style de vêtement de nuit de maternité
      description: Spécifie le style de vêtements de nuit de maternité, comme une
        combinaison ou une chemise de nuit
    mattress_features:
      name: Caractéristiques du matelas
      description: Met en avant les caractéristiques particulières d’un matelas, par
        exemple, hypoallergénique ou fonction de refroidissement
    maximum_bit_depth:
      name: Profondeur de bits maximale
      description: Définit la longueur de mot numérique maximale (en bits) prise en
        charge par le convertisseur, ce influant sur la plage dynamique et la résolution
    maximum_magnification:
      name: Grossissement maximal
      description: Indique le facteur d’agrandissement le plus élevé qu’un microscope
        peut atteindre, par exemple, 10x ou 100x
    maximum_reel_diameter_supported:
      name: Diamètre maximal de bobine pris en charge
      description: Spécifie le diamètre maximal de bobine que le lecteur peut accueillir
    measured_parameters:
      name: Paramètres mesurés
      description: Répertorie les métriques électriques ou les paramètres de batterie
        que l’appareil peut mesurer ou afficher
    measuring_method:
      name: Méthode de mesure
      description: Définit la technique utilisée pour quantifier la graisse corporelle,
        par exemple optique, étriers
    measuring_tool_features:
      name: Caractéristiques de l’outil de mesure
      description: Décrit les caractéristiques particulières des outils de mesure,
        par exemple, caméra intégrée ou portable
    measuring_type:
      name: Type de mesure
      description: Précise la méthode de mesure pour les appareils de santé, par exemple
        le front, le doigt
    meat_cut:
      name: Coupe de la viande
      description: Aide à identifier la coupe ou le style spécifique de la viande,
        par exemple un hamburger, des ailes
    meat_type:
      name: Type de viande
      description: Identifie la source des produits à base de viande, par exemple
        à base de plantes, de poulet
    media_access:
      name: Accès aux médias
      description: Définit comment les clients peuvent accéder aux supports multimédias,
        par exemple, abonnement numérique, imprimé ou en ligne
    media_content_type:
      name: Type de support multimédia
      description: Identifie le genre ou la catégorie de contenu multimédia, par exemple,
        télé-réalité ou sprectacle de stand-up
    media_format:
      name: Format du média
      description: Définit les formats de médias compatibles pour un appareil, comme
        le vinyle ou le VHS
    media_physical_size:
      name: Taille physique du support
      description: Spécifie la taille physique standardisée ou le facteur de forme
        du support vierge
    media_player_form_factor:
      name: Facteur de forme du lecteur multimédia
      description: Décrit le style physique de l’appareil, permettant aux acheteurs
        de choisir entre des clés compactes et des boîtiers décodeurs plus volumineux
    media_section:
      name: Section du média
      description: Identifie la catégorie spécifique d’un journal ou d’un magazine,
        par exemple, sport ou politique
    media_theme:
      name: Thème médiatique
      description: Classe le contenu multimédia en fonction de son objectif principal,
        comme les voyages ou les jeux
    medical_alarm_features:
      name: Fonctionnalités de l’alarme médicale
      description: Décrit les capacités d’un système d’alarme médicale, par exemple,
        batterie à longue durée ou communication bidirectionnelle
    medical_device_certification:
      name: Certification de dispositif médical
      description: Répertorie les homologations réglementaires ou les normes auxquelles
        le moniteur biométrique se conforme (par exemple, CE, FDA 510(k))
    medical_identification_type:
      name: Type d’identification médicale
      description: Identifie la forme d’ID médicale, tel qu’un bracelet ou un collier
    medical_symbol:
      name: Symbole médical
      description: Spécifie le symbole affiché sur le bijou ou l’étiquette, facilitant
        la reconnaissance rapide par les premiers intervenants
    medical_syringe_purpose:
      name: Objectif de la seringue médicale
      description: Identifie l’utilisation prévue d’une seringue médicale, par exemple,
        injection ou irrigation
    medical_tape_material:
      name: Matériau du ruban médical
      description: Identifie la composition du ruban médical, par exemple, plastique
        ou latex
    medicine/drug_form:
      name: Forme de médicament
      description: Identifie la forme physique d’un médicament ou d’un traitement,
        par exemple, comprimés ou liquide
    medicine/supplement_form:
      name: Forme de médicament/supplément
      description: Identifie la forme physique d’un médicament ou d’un complément,
        par exemple en gélules ou liquide
    medium:
      name: Moyen
      description: Identifie le type d’objet de collection, par exemple, un souvenir
        ou une carte à collectionner
    melodica_style:
      name: Style mélodica
      description: Spécifie le style de disposition d’un instrument mélodica, par
        exemple, piano ou clavier
    memory_channels:
      name: Canaux de mémoire
      description: Définit la capacité de transmission de données des processeurs
        informatiques, comme les processeurs doubles ou quadruples.
    memory_form_factor:
      name: Facteur de forme de mémoire
      description: Précise la disposition physique des modules de mémoire, comme DIMM
        ou micro-DIMM
    memory_rank:
      name: Rang de mémoire
      description: Indique la disposition du module (comment les puces sont organisées),
        ce influant sur la compatibilité et l’optimisation des performances
    memory_storage_type:
      name: Type de stockage mémoire
      description: Identifie le type de mémoire utilisé dans les appareils photo,
        par exemple carte Micro SD ou mémoire intégrée
    memory_technology:
      name: Technologie de mémoire
      description: Précise le type de mémoire utilisé dans les appareils électroniques,
        comme DDR ou SDRAM
    menstrual_cup_shape:
      name: Forme de la coupe menstruelle
      description: Décrit la forme des coupes menstruelles, par exemple en cloche,
        en forme de V
    menstrual_cup_size:
      name: Taille de la coupe menstruelle
      description: Indique la catégorie de taille fournie par le fabricant (par exemple,
        small, taille 1)
    menstrual_cup_stem_type:
      name: Type de tige de la coupe menstruelle
      description: Spécifie la conception de la tige ou de la poignée pour retirer
        la coupe menstruelle
    mesh_networking_technology:
      name: Technologie de réseau maillé
      description: Spécifie si le point d’accès prend en charge la capacité de maillage
        et la norme ou le protocole utilisé
    mesh_type:
      name: Type de maillage
      description: Spécifie le style ou la structure du tissu maillé, indiquant son
        utilisation prévue ou ses caractéristiques, par exemple, athlétique ou brossé
    metal_detector_features:
      name: Caractéristiques du détecteur de métaux
      description: Met en avant les caractéristiques uniques des détecteurs de métaux,
        par exemple, étui ou étanche
    metal_molding_application:
      name: Application de moulage de métal
      description: Identifie l’utilisation prévue des moules de fonderie de métaux,
        par exemple, bijoux ou figurines
    meter_type:
      name: Type de compteur
      description: Identifie le type de compteur utilisé dans les systèmes de carburation
        des véhicules nautiques, par exemple, numérique ou analogique
    metrics_supported:
      name: Métriques prises en charge
      description: Précise les types de mesures biométriques fournies par un produit,
        par exemple la masse osseuse, la masse musculaire
    micrometer_type:
      name: Type de micromètre
      description: Identifie l’application ou le design spécifique d’un micromètre,
        par exemple, lame ou alésage
    microphone_design:
      name: Design de microphone
      description: Définit la catégorie de design des microphones, par exemple, à
        condenseur ou dynamique
    microphone_preamp_form_factor:
      name: Facteur de forme du préampli micro
      description: Identifie le style physique ou le format de boîtier du préampli
        micro pour l’installation ou l’utilisation
    microphone_thread:
      name: Câble du microphone
      description: Précise la taille du fil pour les microphones, par exemple 1/4"-20,
        M6
    microphone_type:
      name: Type de microphone
      description: Définit la technologie de microphone utilisée, condenseur ou dynamique
        par exemple
    microphone_windshield_type:
      name: Type de bonnette anti-vent pour microphone
      description: Spécifie le style de construction de la bonnette (par exemple,
        mousse enfilable, fourrure, armée, cage), afin que les utilisateurs puissent
        rapidement sélectionner la solution appropriée contre le bruit du vent
    microscope_features:
      name: Caractéristiques du microscope
      description: Met en avant les aspects uniques des microscopes, par exemple,
        portabilité ou fonction de mémoire
    microscope_slide_material:
      name: Matériau de la lame de microscope
      description: Spécifie le type de matériau utilisé dans les lames de microscope,
        par exemple, verre ou plastique
    midi_connectivity:
      name: Connectivité MIDI
      description: Identifie le type de connexion MIDI sur les instruments de musique,
        par exemple, MIDI in ou USB midi
    mimo_technology:
      name: Technologie MIMO
      description: Indique la technologie sans fil à entrées et sorties multiples
        prise en charge par le routeur
    mineral_class:
      name: Classe minérale
      description: Identifie la catégorie spécifique d’un minéral, par exemple, oxydes
        ou silicates
    mineral_compound_form:
      name: Forme du composé minéral
      description: Spécifie la forme chimique ou le chélate du minéral (par exemple,
        citrate, glycinate) influant sur l’absorption
    minimum_magnification:
      name: Grossissement minimal
      description: Indique le niveau de grossissement le plus faible de la lentille
        d’un microscope, par exemple, 1x ou 0,5x
    mirror_handle_design:
      name: Conception de poignée de miroir
      description: Décrit le style de poignée des miroirs dentaires, par exemple,
        double ou simple
    mirror_sides:
      name: Côtés du miroir
      description: Indique le nombre ou la configuration des surfaces réfléchissantes
        d’un miroir (par exemple, une seule face, double face, à trois volets)
    mist_application_area:
      name: Zone d’application de la brume
      description: Indique la ou les zones d’utilisation prévues pour la brume (par
        exemple, corps, cheveux, pièce, linge)
    mixer_type:
      name: Type de mixeur
      description: Classe les mélangeurs DJ en fonction de leur conception, comme
        numériques ou scratch
    mobile_mounting_type:
      name: Type de montage mobile
      description: Précise où un mobile pour bébé peut être attaché, par exemple un
        berceau, une poussette
    mobile_movement:
      name: Mouvement mobile
      description: Décrit le mécanisme des mobiles pour bébé, sur batterie ou à enroulement
        par exemple
    mobile_phone_accessories_included:
      name: Accessoires pour téléphone mobile inclus
      description: Répertorie les articles supplémentaires fournis dans le kit d’accessoires
        pour téléphone mobile afin que les acheteurs sachent exactement quels composants
        sont inclus
    mobile_phone_case_features:
      name: Caractéristiques de l’étui pour téléphone portable
      description: Décrit les caractéristiques uniques d’une coque de téléphone portable,
        par exemple, antichocs ou forme ajustée
    mobile_phone_connector_type:
      name: Type de connecteur de téléphone portable
      description: Identifie la norme d’interface d’un module de remplacement du port
        de charge ou de données
    mobile_phone_form_factor:
      name: Facteur de forme du téléphone portable
      description: Style de conception physique du combiné
    mobility/accessibility_equipment_features:
      name: Caractéristiques des équipements de mobilité/accessibilité
      description: Décrit les caractéristiques uniques des aides à l’accessibilité,
        par exemple, longue durée de vie de la batterie ou arrêt d’urgence
    mobility_scooter_type:
      name: Type de scooter de mobilité
      description: Fait la distinction entre les différents types de scooters de mobilité,
        par exemple portables, à 3 roues
    mobility_type:
      name: Type de mobilité
      description: Indique le style de base influant sur la mobilité, en distinguant
        les pieds fixes, les roulettes ou les options interchangeables
    model_control_technology:
      name: Technologie de contrôle des modèles
      description: Spécifie le type de système de commande pour le modélisme ferroviaire,
        par exemple, sans fil ou numérique
    model_gender_representation:
      name: Représentation du sexe du modèle
      description: Spécifie si le modèle humain représente une anatomie masculine,
        féminine ou unisexe
    model_train_accessory_type:
      name: Type d’accessoire pour modèle de train
      description: Classe les accessoires de modélisme ferroviaire, par exemple, éclairage
        ou décor
    model_train_theme:
      name: Thème du train miniature
      description: Identifie le décor ou l’époque d’un train miniature, par exemple,
        moderne ou science-fiction
    modem_form_factor:
      name: Facteur de forme du modem
      description: Décrit le style de conception physique du modem (par exemple, clé
        USB, unité de bureau, module M.2)
    modem_technology:
      name: Technologie du modem
      description: Spécifie le principal moyen de transmission ou la technologie réseau
        utilisé par le modem pour accéder au réseau du fournisseur d’accès (par exemple,
        câble/DOCSIS, DSL, cellulaire)
    modulation_method:
      name: Méthode de modulation
      description: Précise la technique utilisée pour modifier un signal dans les
        appareils électroniques, comme AM ou PCM
    moisturizer_type:
      name: Type de crème hydratante
      description: Identifie la période d’application d’une crème hydratante, comme
        un soin de jour ou de nuit
    mold/cut_shape:
      name: Forme de moule/découpe
      description: Décrit la forme ou le motif d'un moule ou d'un emporte-pièce, comme
        une étoile ou un animal
    mold_shape:
      name: Forme du moule
      description: Décrit la forme ou le motif d’un moule de loisirs créatifs, par
        exemple, rond ou lettre
    molding_application:
      name: Application de moulage
      description: Spécifie le type de moulure utilisée dans la construction, par
        exemple, caisson ou cimaise
    molding_shape:
      name: Forme de moulage
      description: Décrit la forme ou le motif d’un moule en béton, par exemple, bloc
        ou colonne
    monitor/screen_specialized_features:
      name: Fonctionnalités spécialisées du moniteur/de l’écran
      description: Détaille les fonctionnalités spécifiques d'un écran, telles que
        les haut-parleurs intégrés ou adapté au gaming
    monitor_mounting_type:
      name: Type de fixation du moniteur
      description: Identifie le mode d’installation d’un moniteur de sécurité, par
        exemple, au mur ou sur pied
    monitor_shape:
      name: Forme du moniteur
      description: Spécifie le contour de l’écran d’un moniteur, par exemple, écran
        plat ou incurvé
    monitor_specialized_features:
      name: Fonctionnalités spécialisées du moniteur
      description: Met en avant les caractéristiques uniques d’un écran d’ordinateur,
        par exemple, prise en charge 3D ou angle de vision réglable
    monitor_type:
      name: Type d’écran
      description: Spécifie le type d’affichage sur l’appareil photo, par exemple,
        écran tactile ou HDR
    monitoring_method:
      name: Méthode de suivi
      description: Identifie la technique physiologique que l’appareil utilise pour
        obtenir les mesures de glycémie
    monitoring_service_type:
      name: Type de service de surveillance
      description: Indique si le système est surveillé par des professionnels 24 h/24,
        7 j/7, auto-surveillé ou non surveillé
    monocular_design:
      name: Conception monoculaire
      description: Identifie la fonctionnalité d’un monoculaire, par exemple, zoom
        ou vision nocturne
    motherboard_chipset_family:
      name: Famille de puces de carte mère
      description: Précise le type de chipset d’une carte mère, comme Intel ou NVIDIA
    motherboard_form_factor:
      name: Facteur de forme de la carte mère
      description: Précise les dimensions physiques et les normes de la carte mère,
        par exemple ATX, Mini-ITX
    motherboard_memory_features:
      name: Fonctionnalités de mémoire de la carte mère
      description: Décrit les caractéristiques de la mémoire d’une carte mère, par
        exemple, ECC ou sans tampon
    motion:
      name: Mouvement
      description: Définit le type de mouvement de l’équipement pour bébé, comme vibrant
        ou rebondissant
    motion_sensor_type:
      name: Type de capteur de mouvement
      description: Identifie la technologie utilisée dans les capteurs de mouvement,
        par exemple, infrarouge ou laser
    motor_starting_method:
      name: Méthode de démarrage du moteur
      description: Identifie la méthode de démarrage d’un moteur, par exemple, DOL
        ou autotransformateur
    motor_type:
      name: Type de moteur
      description: Spécifie si la ponceuse utilise un moteur à balais ou sans balais,
        ce influant sur le bruit, la longévité et le prix
    motor_vehicle_placement:
      name: Placement de véhicules à moteur
      description: Identifie la partie du véhicule pour laquelle la pièce est conçue,
        par exemple, avant ou arrière
    motor_vehicle_type:
      name: Type de moteur du véhicule
      description: Spécifie la catégorie de véhicule à moteur, par exemple, voiture
        ou SUV
    motorcycle/scooter_type:
      name: Type de moto/scooter
      description: Classifie le type de moto ou de scooter, par exemple, tout-terrain
        ou vélomoteur
    motorcycle_drive_type:
      name: Type de conduite de moto
      description: Spécifie le mécanisme de transmission de la moto, par exemple,
        arbre ou chaîne
    motorcycle_glove_purpose:
      name: Objectif du gant de moto
      description: Identifie l’utilisation prévue des gants de moto, par exemple,
        tout-terrain ou tourisme
    motorcycle_tire_type:
      name: Type de pneu de moto
      description: Classifie le pneu de moto selon son utilisation, par exemple, course
        ou scooter
    mount/stand_features:
      name: Caractéristiques du support
      description: Détaille les caractéristiques spécifiques du montage ou du support
        d’un produit, par exemple, angle réglable ou pliable
    mount_installation_point:
      name: Point d’installation du support
      description: Indique l’emplacement du support sur le véhicule ou l’équipement
    mount_interface_system:
      name: Système d’interface du support
      description: Identifie la plateforme de connexion propriétaire ou standard intégrée
        au support (par exemple, modèle RAM AMPS, Quad Lock)
    mount_material:
      name: Matériau du support
      description: Spécifie la composition du support d’un produit, par exemple, acier
        inoxydable ou plastique
    mounting_hardware:
      name: Matériau du montage
      description: Identifie le type de matériel utilisé pour installer ou monter
        un produit, par exemple, vis ou ventouse
    mounting_interface_pattern:
      name: Modèle d’interface du support
      description: Identifie l’interface mécanique ou le modèle de trous utilisé pour
        connecter le support à un socle, une fixation ou un système à rotule pour
        radio
    mounting_interface_standard:
      name: Norme d’interface de montage
      description: Spécifie le modèle ou l’interface de montage que le support ou
        le socle supporte (par exemple, AMPS, VESA 75, RAM B ball)
    mounting_mechanism:
      name: Mécanisme de montage
      description: Définit la manière dont le téléphone ou l’appareil photo se fixe
        à la perche ou au support
    mounting_style:
      name: Style de montage
      description: Spécifie comment le bouton-poussoir est fixé à un panneau de contrôle,
        influant sur la méthode d’installation et la compatibilité avec l’épaisseur
        du panneau
    mounting_technology:
      name: Technologie de montage
      description: Indique si le circuit intégré est conçu pour un assemblage traversant
        ou en surface
    mounting_thread_size:
      name: Taille du filetage de montage
      description: Indique la taille standard du filetage du trépied ou de l’accessoire
        fourni sur le produit (par exemple, 1/4"-20)
    mounting_type:
      name: Type de montage
      description: Précise la manière dont un produit est installé ou fixé, à clipser
        ou à ventouse par exemple
    mouse/trackball_features:
      name: Fonctionnalités de la souris/du trackball
      description: Décrit les caractéristiques particulières des souris/trackballs,
        par exemple, conception ergonomique ou poids réglable
    mouse_pad_features:
      name: Caractéristiques du tapis de souris
      description: Décrit les caractéristiques uniques d’un tapis de souris, par exemple,
        éclairé ou bords cousus
    mouse_port_type:
      name: Type de port de la souris
      description: Précise le type de connexion pour une souris d’ordinateur, par
        exemple UBS sans fil, Bluetooth
    mouse_technology:
      name: Technologie de la souris
      description: Précise la fonctionnalité ou la conception d’une souris d’ordinateur,
        comme une souris sans fil ou de jeu
    mouthgard_design:
      name: Conception de protège-dents
      description: Identifie la structure de protège-dents pour le sport, telle que
        simple ou double
    mouthpiece:
      name: Embouchure
      description: Identifie le type d’embouchure pour les instruments de musique,
        par exemple, A ou basse
    moving/shipping_box_material:
      name: Matériau de l’emballage de déménagement/d’expédition
      description: Identifie le matériau utilisé dans les boîtes de déménagement ou
        d’expédition, par exemple, carton ou plastique
    mp3_player_accessories_included:
      name: Accessoires pour lecteur MP3 inclus
      description: Identifie les accessoires supplémentaires fournis avec un lecteur
        MP3, comme un étui ou un chargeur de voiture
    mpaa_rating:
      name: Classification MPAA
      description: Identifie la catégorie d’âge MPAA (Motion Picture Association of
        America) pour les supports multimédias, par exemple, G ou PG-13
    multi_gpu_technology:
      name: Technologie multi-GPU
      description: 'Indique la capacité d’une carte mère à prendre en charge plusieurs
        GPU, par exemple non pris en charge, CrossFireX '
    multiplexer_technology:
      name: Technologie du multiplexeur
      description: Spécifie la technologie de transmission ou de longueur d’onde sous-jacente
        utilisée par le multiplexeur (par exemple, CWDM, DWDM)
    muscle_stimulator_design:
      name: Conception de stimulateur musculaire
      description: Identifie le type de stimulateur musculaire, par exemple, bande
        de jambe ou plaque autocollante
    music_genre:
      name: Genre de musique
      description: Classe les produits selon leur genre musical spécifique, comme
        Noël ou pop rock
    music_stand_design:
      name: Conception de pupitre de musique
      description: Décrit le type de pupitre, par exemple, posé au sol ou mural
    musical_key:
      name: Clé musicale
      description: Spécifie la tonalité musicale d’un instrument, par exemple, do
        majeur ou fa#
    nail_art_items_included:
      name: Articles de nail art inclus
      description: Identifie les accessoires spécifiques de nail art dans un kit,
        tels que des décalcomanies ou un stylo de pointage
    nail_art_medium_type:
      name: Type de support pour nail art
      description: Spécifie le médium principal ou le format de matériau des fourniture
        de nail art
    nail_care_features:
      name: Caractéristiques du soin des ongles
      description: Décrit les qualités spécifiques des produits de soin des ongles,
        par exemple, résistance aux éclats ou séchage rapide
    nail_design:
      name: Design de l’ongle
      description: Définit le motif esthétique ou la finition des articles pour les
        ongles, par exemple bout French tip, ombre
    nail_polish_drying_form:
      name: Forme de séchage du vernis à ongles
      description: Identifie la méthode d’application de sèche-vernis à ongles, tels
        qu’en gouttes ou en spray
    nail_shape:
      name: Forme des ongles
      description: Décrit le style des bouts d’ongles pour les produits cosmétiques,
        par exemple en amande, carré
    national/regional_rating:
      name: Notation nationale/régionale
      description: Spécifie la classification nationale ou régionale d’un jeu vidéo,
        par exemple, MA 15+ ou tous âges
    native_aspect_ratio:
      name: Format d’image natif
      description: Précise le format d’image d’un écran, généralement pour les projecteurs ;
        par exemple 16:8
    nebulizer_design:
      name: Conception du nébuliseur
      description: Définit la conception et la portabilité d’un nébuliseur, par exemple
        portable, de table
    nebulizer_technology:
      name: Technologie de nébulisation
      description: Précise la technologie utilisée dans les nébuliseurs, par exemple
        maille, jet
    neck_color:
      name: Couleur du cou
      description: Identifie la couleur d’un manche de guitare, comme le blanc ou
        le multicolore
    neck_material:
      name: Matériau du col
      description: Identifie le matériau utilisé pour le manche des instruments à
        cordes, par exemple, érable ou palissandre
    neck_pattern:
      name: Modèle de cou
      description: Identifie le motif ou l’imprimé sur le manche d’une guitare, comme
        à fleurs ou à rayures
    necklace_design:
      name: Conception du collier
      description: Décrit le style d’un collier, tel qu’un pendentif ou un tour de
        cou
    neckline:
      name: Décolleté
      description: Utilisé pour décrire la forme du col d’un vêtement, comme un col
        en V ou bateau
    needle_coating_type:
      name: Type de revêtement d’aiguille
      description: Spécifie tout revêtement de surface appliqué à la tige de l’aiguille
        pour améliorer le glissement ou les propriétés thérapeutiques
    needle_eye_type:
      name: Type de chas d’aiguille
      description: Décrit la taille et le style du chas de l’aiguille, par exemple,
        grand ou fendu
    needle_gauge:
      name: Jauge à aiguille
      description: Indique l’épaisseur des aiguilles utilisées dans les cabinets médicaux
        ou dans le domaine du tatouage, par exemple, 18 ou 22
    needle_housing_material:
      name: Matériau du boîtier de l’aiguille
      description: Identifie le matériau du boîtier de l’aiguille, par exemple, plastique
        ou acier inoxydable
    needle_material:
      name: Matériau de l’aiguille
      description: Précise la composition des aiguilles, généralement en acupuncture ;
        par exemple en acier inoxydable, plaqué or
    needle_size:
      name: Taille de l’aiguille
      description: Décrit la taille des aiguilles d’art et de loisirs créatifs, par
        exemple 14 ou 100/16
    needlecraft_kit_type:
      name: Type de kit de travaux d’aiguille
      description: Identifie le type de kit de loisirs créatifs, par exemple crochet
        ou point de croix
    negative/slide_storage_type:
      name: Type de stockage des négatifs/diapositives
      description: Spécifie la méthode de stockage des négatifs photographiques ou
        des diapositives, par exemple, boîte de stockage d’archives ou carrousel de
        diapositives
    nema_enclosure_rating:
      name: Classification NEMA
      description: Spécifie la classificationNEMA qui définit la protection contre
        les dangers environnementaux (par exemple, Type 4X, Type 12)
    net_material:
      name: Matériau du filet
      description: Identifie le type de matériau utilisé dans les produits en filet,
        par exemple, nylon ou polyester
    net_mounting_type:
      name: Type de montage du filet
      description: Identifie le mode de fixation d’un filet de tennis, par exemple,
        support à pince ou trépied
    network_cable_interface:
      name: Interface de câble réseau
      description: Précise le type de connecteur sur un câble réseau, par exemple
        BNC, MPO/MTP
    network_layer_support:
      name: Prise en charge de la couche réseau
      description: Indique les fonctionnalités de commutation ou de routage de couche
        OSI les plus élevées fournies par le commutateur
    network_protocols_supported:
      name: Protocoles réseau pris en charge
      description: Définit les normes de réseau prises en charge par un appareil,
        par exemple TCP/IP, DNS
    networking_standards:
      name: Normes de mise en réseau
      description: 'Précise les protocoles pris en charge par un périphérique réseau,
        par exemple IEEE 802.3 '
    neutral_density_rating:
      name: Indice de densité neutre
      description: Définit la densité optique ou la force d’un filtre ND, exprimée
        par des facteurs ND courants ou des réductions de diaphragme
    nightgown_style:
      name: Style de chemise de nuit
      description: Précise le style de chemise de nuit, par exemple nuisette, chemise
    nipple_material:
      name: Matériau du mamelon
      description: Précise le matériau utilisé pour la tétine du biberon, par exemple
        latex, caoutchouc
    nipple_shape:
      name: Forme du mamelon
      description: Définit la forme des tétines pour biberon, plates ou angulaires
        par exemple
    nipple_type:
      name: Type de tétine
      description: Précise le type de tétine sur les biberons, par exemple à col large
        ou standard
    nock_material:
      name: Matériau de l’encoche
      description: Spécifie le type de matériau utilisé pour les encoches de flèche,
        par exemple, aluminium ou plastique
    noise_cancellation_technology:
      name: Technologie de suppression du bruit
      description: Spécifie le type de système de réduction de bruit utilisé dans
        les casques audio, permettant aux acheteurs d’identifier les modèles avec
        contrôle actif, passif ou adaptatif du bruit
    noise_intensity:
      name: Intensité du bruit
      description: Décrit le niveau sonore généré par un produit, généralement un
        feu d’artifice, par exemple, faible ou élevé
    noise_reduction_system:
      name: Système de réduction du bruit
      description: Spécifie la ou les normes de réduction du bruit analogique intégrées
        et prises en charge par le lecteur
    notepad_cover_type:
      name: Type de couverture du bloc-notes
      description: Identifie le type de couverture d’un carnet, par exemple rigide
        ou brochée
    notepad_design:
      name: Conception du bloc-notes
      description: Décrit la reliure ou la mise en page d’un carnet, telle qu’une
        reliure à spirale ou à disque
    nozzle_coating:
      name: Revêtement de buse
      description: Spécifie tout traitement de surface appliqué à la buse pour améliorer
        la résistance à l’usure ou réduire l’adhérence des filaments
    nozzle_thread_type:
      name: Type de filetage de buse
      description: Définit le filetage mécanique ou la norme de montage utilisée pour
        fixer la buse (par exemple, M6, MK8, E3D V6, Volcano)
    nozzle_type:
      name: Type d’embout
      description: Précise le type de buse pour les hydropulseurs, par exemple orthodontique,
        nettoie-langue
    nursery_theme:
      name: Thème de la chambre de bébé
      description: Définit le design ou le motif des produits de puériculture, comme
        la jungle ou le dinosaure
    nursing_cover_coverage:
      name: Protection d’allaitement
      description: Définit la couverture procurée par une couverture d’allaitement,
        comme une couverture totale ou partielle
    nursing_pad_design:
      name: Conception de coussinets d’allaitement
      description: Décrit les caractéristiques physiques des coussinets d’allaitement,
        comme épais ou ronds
    nursing_pillow_shape:
      name: Forme du coussin d’allaitement
      description: Identifie le contour des coussins d’allaitement, par exemple, en
        forme de C ou en forme de U
    nut/seed_type:
      name: Type de noix/graine
      description: Identifie le type spécifique de noix ou de graines dans un produit,
        par exemple, amandes ou graines de chia
    nut_butter_variety:
      name: Variété de beurre de noix
      description: Identifie la variété de noix dans les tartinades à base de noix,
        par exemple cacahuète, amande
    nut_form:
      name: Forme d’écrou
      description: Décrit la forme des écrous de quincaillerie, par exemple, carrée
        ou à oreilles
    nut_processing_method:
      name: Méthode de traitement des noix
      description: Définit le mode de préparation des noix ou des graines, par exemple
        confites, crues
    nutrient_content:
      name: Contenu nutritif
      description: Spécifié les éléments nutritionnels présents, généralement pour
        les engrais ; par exemple l’azote, le phosphore
    oboe_key_system:
      name: Système de clé pour hautbois
      description: Identifie le système de touches d’un hautbois, par exemple, français
        ou conservatoire
    ocarina_style:
      name: Style ocarina
      description: Décrit le style des ocarinas, par exemple, transversal ou pendentif
    occasion:
      name: Occasion
      description: Précise l’événement ou le cadre approprié pour un produit, par
        exemple décontracté, formel
    occasion_style:
      name: Style d’occasion
      description: Permet de catégoriser les produits en fonction de l’occasion, par
        exemple décontracté, habillé, occasionnel.
    odor_remover_application_area:
      name: Zone d’application du produit anti-odeurs
      description: Spécifie où le produit doit être appliqué pour éliminer les odeurs
    office_cart_features:
      name: Caractéristiques du chariot de bureau
      description: Décrit les caractéristiques spécifiques d’un chariot de bureau,
        par exemple, étagères réglables ou roues verrouillables
    office_instrument_material:
      name: Matériau de l’instrument de bureau
      description: Spécifie la composition des outils de bureau, par exemple, bois
        ou acrylique
    office_supply_material:
      name: Matériau des fournitures de bureau
      description: Identifie le matériau principal des fournitures de bureau, par
        exemple, cuir ou papier carton
    oil_extraction_method:
      name: Mode d’extraction de l’huile
      description: Spécifie comment l’huile principale a été traitée ou extraite (par
        exemple, pressée à froid, raffinée)
    oil_type:
      name: Type d’huile
      description: Précise le type d’huile utilisé dans un produit, par exemple paraffine,
        kérosène
    olfactory_family:
      name: Famille olfactive
      description: Définit la catégorie olfactive globale à laquelle appartient un
        parfum, par exemple aldéhydique ou animal
    one_piece_style:
      name: Style une pièce
      description: Identifie le style spécifique d’un vêtement une pièce, comme une
        combinaison ou une salopette
    open/closed_sign_design:
      name: Conception de panneau ouvert/fermé
      description: Spécifie le style d’un écriteau ouvert/fermé, par exemple, heures
        d’ouverture ou personnalisé
    opening_direction:
      name: Sens d’ouverture
      description: Précise la direction dans laquelle un produit s’ouvre, généralement
        pour les portails ; par exemple, balançoire à sens unique
    opening_mechanism:
      name: Mécanisme d’ouverture
      description: Précise le mode d’ouverture d’un produit, généralement pour les
        barrières pour bébés ou pour animaux de compagnie ; par exemple levier, pédale
    operating_mode:
      name: Mode de fonctionnement
      description: Définit la méthode de fonctionnement, généralement pour les équipements
        médicaux, par exemple, semi-automatique
    operating_system:
      name: Système d’exploitation
      description: Définit le logiciel système utilisé par un appareil, comme iOS
        ou ChromeOS
    operating_system_compatibility:
      name: Compatibilité du système d’exploitation
      description: Identifie les systèmes d’exploitation directement pris en charge
        par le déclencheur à distance
    operation_mechanism:
      name: Mécanisme de fonctionnement
      description: Décrit comment l’outil applique la tension et coupe l’attache (par
        exemple, manuel, pneumatique, automatique)
    operation_method:
      name: Méthode opérationnelle
      description: Définit le mode d’utilisation d’un produit, généralement pour les
        systèmes d’ouverture pour portes de garage ; par exemple entraînement par
        courroie, hydraulique
    optical_disc_recordability:
      name: Capacité d’enregistrement des disques optiques
      description: Définit si un disque optique est à écriture unique ou réinscriptible,
        et s’il est simple ou double couche
    optical_drive_form_factor:
      name: Facteur de forme de lecteur optique
      description: Définit la taille physique et le style d’installation du lecteur
    optical_drive_loading_mechanism:
      name: Mécanisme de chargement de lecteur optique
      description: Indique comment les disques sont insérés dans le lecteur (par exemple,
        chargement par tiroir, par fente, par le dessus)
    optical_drive_type:
      name: Type de lecteur optique
      description: Identifie les formats multimédias que le lecteur optique d’un périphérique
        peut lire et écrire, par exemple CD-ROM, DVD-ROM
    optical_frame_design:
      name: Design de la monture optique
      description: Définit si les lunettes de vue ont une monture ou pas, par exemple
        sans monture, monture complète
    optical_zoom:
      name: Zoom optique
      description: Indique la capacité de zoom d’une caméra, par exemple, pas de zoom
        ou plus de 30x
    oral_care_function:
      name: Objectif de soins bucco-dentaires
      description: Met en évidence le principal avantage du produit en matière de
        santé dentaire ou bucco-dentaire (par exemple, blanchiment, soulagement de
        la sensibilité, santé des gencives)
    oral_care_items_included:
      name: Articles de soin bucco-dentaire inclus
      description: Répertorie les types de produits de soin bucco-dentaire contenus
        dans l’ensemble
    organizer_type:
      name: Type d’organisateur
      description: Spécifie la catégorie de rangement du véhicule, par exemple, porte-gobelet
        ou boîte à gants
    orientation:
      name: Orientation
      description: Précise le positionnement prévu du produit, par exemple horizontal,
        vertical
    orthotic_coverage_length:
      name: Longueur de l’orthèse
      description: Définit la partie de semelle couverte par le dispositif de soutien
        de la voûte plantaire (par exemple, totale, 3/4, talon)
    outdoor_equipment_features:
      name: Caractéristiques de l’équipement extérieur
      description: Identifie les caractéristiques uniques des équipements d’extérieur,
        par exemple, résistants aux intempéries ou la portables
    outdoor_furniture_items_included:
      name: Articles de mobilier d’extérieur inclus
      description: Identifie les éléments spécifiques inclus dans un ensemble de mobilier
        d’extérieur, tels que des chaises ou une table
    outdoor_power_accessories_included:
      name: Accessoires d’alimentation extérieure inclus
      description: Précise les éléments supplémentaires fournis avec l’équipement
        électrique d’extérieur, par exemple une tronçonneuse, des boules Quies
    outdoor_walking_activity:
      name: Activité de marche en plein air
      description: Classifie les produits en fonction de l’activité de marche en plein
        air prévue, par exemple le trekking, la course en sentier
    outerwear_clothing_features:
      name: Caractéristiques des vêtements d’extérieur
      description: Identifie les caractéristiques spéciales des vêtements d’extérieur,
        par exemple, isolés ou imperméables
    outlet_type:
      name: Type de prise
      description: Précise le type de connecteur pour les appareils électroniques,
        par exemple type A, type L
    output_connection:
      name: Connexion de sortie
      description: Précise le type de connexion de sortie pour les câbles audio, comme
        3,5 mm ou RCA
    output_connection_type:
      name: Type de connexion de sortie
      description: Spécifie le connecteur ou la norme d’interface fournie par le convertisseur
        du côté sortie
    output_level:
      name: Niveau de sortie
      description: Décrit le niveau de sortie des accessoires d’instruments de musique,
        par exemple, faible ou élevé
    output_signal_interface:
      name: Interface de signal de sortie
      description: Spécifie le ou les types de connexions de sortie fournis par le
        convertisseur
    output_video_interface:
      name: Interface vidéo de sortie
      description: Spécifie le ou les types de connecteur vidéo fournis comme sortie
        par le convertisseur de balayage
    output_waveform:
      name: Forme d’onde de sortie
      description: Précise le type de signal généré par un oscillateur électronique,
        en dents de scie ou sinusoïdal par exemple
    oven_accessories_included:
      name: Accessoires de four inclus
      description: Détaille les composants supplémentaires du four inclus, comme une
        rôtissoire ou une grille
    overclock_profile_support:
      name: Prise en charge des profils d’overclocking
      description: Identifie les profils d’overclocking standardisés stockés dans
        le module (par exemple, Intel XMP, AMD EXPO)
    oxygen_cylinder_outlet_standard:
      name: Norme relative aux sorties des bouteilles d’oxygène
      description: Spécifie la norme de raccord de sortie CGA de la valve de la bouteille
    oxygen_tank_valve_type:
      name: Type de valve du réservoir d’oxygène
      description: Précise la valve utilisée dans les réservoirs d’oxygène, par exemple
        à bascule, post-valve
    pa_rating:
      name: Indice PA
      description: Spécifie le grade de protection UVA de la crème solaire (par exemple,
        PA+, PA+++, PA++++) basé sur la méthode de pigmentation immédiate persistante
        (PPD)
