    cat_litter_formula:
      name: Formule litière pour chat
      description: Définit la composition de la litière pour chat, comme les granulés
        ou l’argile
    cbd_ingredients:
      name: Ingrédients du CBD
      description: Identifie les composants spécifiques liés au CBD dans un produit,
