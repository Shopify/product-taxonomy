    brandy_variety:
      name: Variété de brandy
      description: Fait la distinction entre les différents styles de brandy, par
        exemple le cognac, la grappa
    breadboard_type:
      name: Type de platine de prototypage
      description: Classe la platine de prototypage selon sa structure fondamentale
        ou sa taille
    breath_spray_benefit:
      name: Avantages du spray pour l’haleine
      description: Identifie le principal avantage en matière de santé bucco-dentaire
