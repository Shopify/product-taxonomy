    hair_care_technology:
      name: Technologie de soins capillaires
      description: Définit la technologie utilisée dans les produits de soins des
        cheveux, par exemple la vapeur, la thermolyse
    hair_color:
      name: Coloration des cheveux
      description: Identifie la couleur ou la nuance des produits de soins capillaires,
        comme le blond ou le châtain foncé
    hair_color_formulation:
      name: Formulation de la coloration capillaire
      description: Indique la longévité ou le type fonctionnel de l’effet de couleur
        du produit (par exemple, coloration permanente, toner, retouche des racines)
    hair_concealer_fiber_material:
      name: Matériau des fibres du correcteur capillaire
      description: Spécifie le matériau principal des fibres ou poudres contenues
        dans le produit
    hair_dryer_motor_type:
      name: Type de moteur du sèche-cheveux
      description: Spécifie le type de moteur utilisé dans le sèche-cheveux, influant
        sur la durabilité, le niveau sonore et la puissance du flux d’air
    hair_dye_type_removed:
      name: Type de teinture capillaire éliminée
      description: Spécifie les types de teinture capillaire que le produit est conçu
        pour éliminer (par exemple, permanente, henné)
    hair_loss_type:
      name: Type de perte de cheveux
      description: Organise les produits en fonction du type de perte de cheveux,
        par exemple alopecia areata, calvitie masculine
    hair_oil_application:
      name: Application de l’huile capillaire
      description: Spécifie comment l’huile capillaire est destinée à être utilisée
