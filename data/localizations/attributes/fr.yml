    compatible_player:
      name: Lecteur compatible
      description: Identifie les appareils pouvant être utilisés avec un adaptateur
        de cassette, par exemple, iPad ou ordinateur portable
    compatible_polish_thinner_type:
      name: Type de diluant pour vernis compatible
      description: Indique les produits pour ongles avec lesquels le diluant est conçu
