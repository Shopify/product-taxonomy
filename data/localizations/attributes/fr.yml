    screen_protector_features:
      name: Caractéristiques du protège-écran
      description: Met en évidence les caractéristiques fonctionnelles spéciales du
        protège-écran au-delà de la prévention basique des rayures
    screen_protector_finish:
      name: Finition du protège-écran
      description: Identifie la finition de surface optique du protecteur (par exemple,
