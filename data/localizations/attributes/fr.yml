    compatible_instrument:
      name: Instrument compatible
      description: Identifie l’instrument de musique pour lequel le produit est conçu,
        par exemple, guitare ou piano
    compatible_keyboard_configuration:
      name: Configuration du clavier compatible
      description: Identifie la disposition du clavier compatible avec un produit,
