    closure_type:
      name: Type de fermeture
      description: Définit la méthode utilisée pour attacher ou fixer un produit,
        comme une fermeture éclair ou des boucles
    cloth_treatment:
      name: Traitement du chiffon
      description: Identifie si le chiffon est prétraité et, si oui, la nature du
        traitement
    clothing_accessory_material:
      name: Matériau de l’accessoire vestimentaire
      description: Identifie la principale matière utilisée dans les accessoires vestimentaires,
        par exemple, cuir ou lin
    clothing_features:
      name: Caractéristiques des vêtements
      description: Décrit les propriétés uniques des vêtements, par exemple, résistance
        à l’eau ou au froissement
    club_subset:
      name: Sous-ensemble de clubs
      description: 'Classe les clubs de golf en sous-catégories spécifiques, par exemple
        sand-wedge, fer droit '
    club_type:
      name: Type de clubs
      description: Classifie les clubs de golf en fonction de leur utilisation spécifique,
        par exemple driver, fer
    coating/sealant_application:
      name: Application de revêtement/scellant
      description: Décrit la fonction des revêtements de protection et des produits
        d’étanchéité, par exemple, étanchéité aux intempéries et prévention de la
        rouille
    coaxial_cable_series:
      name: Série du câble coaxial
      description: Identifie la série ou la désignation standard de l’industrie du
        câble (par exemple, RG-6, RG-58, LMR-400), qui détermine les dimensions physiques
        et les performances électriques
    cockpit_type:
      name: Type de cockpit
      description: Spécifie la conception et la technologie utilisées dans le cockpit
        d’un avion, comme analogique ou hybride
    cocktail_decoration_design:
      name: Conception de décoration de cocktail
      description: Identifie le motif ou le style des fournitures de cocktail, par
        exemple, pois ou formes fantaisie
    cocktail_decoration_material:
      name: Matériau de décoration de cocktail
      description: Spécifie la substance à partir de laquelle les décorations de cocktails
        sont fabriquées, par exemple, plastique ou papier
    coffee/tea_set_pieces_included:
      name: Service à café/thé inclus
      description: Détaille les éléments individuels d’un service à café ou à thé,
        comme les tasses et les soucoupes
    coffee_creamer_variety:
      name: Variété de crème pour café
      description: Fait la distinction entre les différents types de dosettes de lait,
        par exemple en poudre, sans lactose
    coffee_input_type:
      name: Type d’insertion de café
      description: Identifie le format du café, par exemple en dosettes, en grains
    coffee_product_form:
      name: Forme du produit à base de café
      description: Précise le type de café, par exemple moulu ou en grains
    coffee_roast:
      name: Torréfaction du café
      description: Définit le niveau de torréfaction des produits à base de café,
        par exemple clair, moyen, foncé
    coil_connection:
      name: Connexion de bobine
      description: Définit la remplaçabilité de la bobine dans les appareils de vapotage,
        par exemple fixée, changeable
    coin_material:
      name: Matériau de pièce de monnaie
      description: Spécifie le type de matériau dont est constituée une pièce de collection,
        par exemple, bronze ou cuivre
    collagen_source:
      name: Source de collagène
      description: Identifie l’origine principale du collagène utilisé dans le complément
        (par exemple, bovine, marine, végétale)
    collagen_type:
      name: Type de collagène
      description: Spécifie le ou les types moléculaires de collagène fournis par
        le produit (par exemple, Type I, II, III)
    collar/mount_compatible_device:
      name: Appareil compatible collier/monture
      description: Spécifie le dispositif compatible avec les colliers ou supports
        de trépied, par exemple, objectif ou appareil photo
    collar/mount_design:
      name: Conception de collier/monture
      description: Décrit la conception des colliers ou supports de trépied, par exemple,
        dégagement rapide ou anneaux
    collar_lock_type:
      name: Type de fermeture du collier
      description: Spécifie le type de verrouillage du collier sur l’équipement d’haltérophilie,
        par exemple, verrou rotatif ou pince à ressort
    color:
      name: Couleur
      description: Définit la couleur ou le motif principal, comme le bleu ou les
        rayures
    color_accuracy_standards:
      name: Normes de précision des couleurs
      description: Définit les normes d’étalonnage des couleurs, généralement pour
        les moniteurs ; par exemple sRGB, Adobe RGB
    color_depth:
      name: Profondeur de couleur
      description: Indique la profondeur de bits optique/de sortie du scanner (nombre
        de bits par pixel), qui détermine la précision des couleurs, la gradation
        et la latitude d’édition
    color_saturation:
      name: Saturation des couleurs
      description: Indique l’intensité de la couleur dans le film de l’appareil photo,
        par exemple, élevée ou faible
    comb/brush_size:
      name: Taille de peigne/brosse
      description: Classe la taille physique globale de la brosse ou du peigne
    comb_features:
      name: Caractéristiques du peigne
      description: Répertorie les caractéristiques notables du peigne en termes de
        performance ou de conception
    comb_tooth_spacing:
      name: Espacement des dents du peigne
      description: Décrit l’espacement ou la densité des dents du peigne
    comic_edition:
      name: Édition de bande dessinée
      description: Indique la version ou l’édition spécifique d’une bande dessinée,
        ce qui peut influencer sa rareté et sa valeur de collection, par exemple,
        première édition ou variante de la couverture
    comic_tradition:
      name: Tradition de bande dessinée
      description: Indique la tradition culturelle ou régionale dont la bande dessinée
        est issue, par exemple, bandes dessinées chinoises ou mangas
    commode_opening_type:
      name: Type d’ouverture de la chaise percée
      description: Identifie la présence et le style de toute découpe pour la chaise
        percée ou la compatibilité avec un seau dans le siège
    communication_device_features:
      name: Caractéristiques du dispositif de communication
      description: Identifie les fonctionnalités uniques des appareils de communication,
        par exemple, écran tactile ou commande vocale
    communication_protocols:
      name: Protocoles de communication
      description: Spécifie le protocole réseau utilisé, par exemple, Modbus ou Profibus
    compass_style:
      name: Style boussole
      description: Spécifie le style des compas de navigation, par exemple, de plongée
        ou gyrocompas
    compatible_accessibility_equipment_type:
      name: Type de matériel d’accessibilité compatible
      description: Spécifie le type de matériel d’accessibilité ou de mobilité avec
        lequel l’accessoire est conçu pour fonctionner
    compatible_aircraft_type:
      name: Type d’avion compatible
      description: Identifie le type d’aéronef pour lequel le produit convient, par
        exemple avion ou hélicoptère
    compatible_amplifier:
      name: Amplificateur compatible
      description: Identifie le type d’amplificateur avec lequel un produit est compatible,
        par exemple, basse ou clavier
    compatible_aquarium:
      name: Aquarium compatible
      description: Précise à quels types d’aquariums un produit est adapté, par exemple
        tous les aquariums, aquariums d’eau salée
    compatible_baby_bottle_design:
      name: Modèle de biberon compatible
      description: Indique les styles de biberons avec lesquels le produit est compatible,
        comme les biberons à col large
    compatible_baby_carrier_type:
      name: Type de porte-bébé compatible
      description: Précise le type de porte-bébé avec lequel le produit est compatible,
        enveloppant ou sac à dos par exemple
    compatible_baby_chair_type:
      name: Type de chaise bébé compatible
      description: Précise le type de chaise bébé auquel le produit s’adapte, caddy
        ou restaurant par exemple
    compatible_baby_transport_type:
      name: Type de transport pour bébé compatible
      description: Identifie les articles de transport pour bébé compatibles, comme
        une poussette ou un siège auto
    compatible_ball_type:
      name: Type de balle compatible
      description: Identifie les types de balles adaptés à une utilisation avec le
        produit, par exemple tennis, wiffle
    compatible_battery_size:
      name: Capacité de la batterie compatible
      description: Identifie les capacités de batterie avec lesquelles un produit
        est compatible, par exemple AAA, CR2032
    compatible_battery_technology:
      name: Technologie de batterie compatible
      description: Précise le type de technologie de batterie avec laquelle un produit
        est compatible, comme le lithium-ion ou l’alcaline
    compatible_bench_positions:
      name: Positions de banc compatibles
      description: Précise la plage de positions, généralement pour un banc d’entraînement ;
        par exemple plat ou incliné
    compatible_bike_type:
      name: Type de vélo compatible
      description: Précise le type de vélo pour lequel le produit est conçu, comme
        électrique ou de route
    compatible_brass_instrument:
      name: Instrument de cuivre compatible
      description: Spécifie l’instrument de cuivre avec lequel le produit peut être
        utilisé, par exemple, trompette ou tuba
    compatible_cable_tie_material:
      name: Matériau de serre-câbles compatible
      description: Identifie le type de serre-câbles (par exemple, acier inoxydable,
        nylon) que le pistolet permet d’installer ou de retirer
    compatible_chemical_treatment_strength_level:
      name: Niveau de concentration compatible pour le traitement chimique
      description: Indique la concentration ou la puissance recommandée par le fabricant
        (par exemple, douce, normale, forte) pour le traitement chimique
    compatible_clarinet_type:
      name: Type de clarinette compatible
      description: Identifie le type de clarinette avec lequel un produit est compatible,
        par exemple, clarinette en la ou universelle
    compatible_contact_lens_type:
      name: Type de lentilles de contact compatibles
      description: Identifie les catégories de lentilles de contact pouvant être stockées
        ou nettoyées dans l’étui
    compatible_contact_lenses:
      name: Type de lentilles de contact compatibles
      description: Indique les types ou les matières de lentilles de contact avec
        lesquels la solution peut être utilisée en toute sécurité
    compatible_cosmetic_tools:
      name: Outils cosmétiques compatibles
      description: Précise avec quels outils de beauté le produit peut être utilisé,
        par exemple des éponges, des pinces à épiler
    compatible_device:
      name: Appareil compatible
      description: Précise quels appareils fonctionnent avec un appareil électronique,
        comme une smartwatch ou des écouteurs sans fil
    compatible_drum_configuration:
      name: Configuration de tambour compatible
      description: Identifie la configuration de batterie pour laquelle le produit
        est conçu, par exemple, grosse caisse ou charleston
    compatible_electric/acoustic_instrument:
      name: Instrument électrique/acoustique compatible
      description: Identifie l’instrument électrique ou acoustique pour lequel le
        produit est conçu, par exemple, guitare électrique ou synthétiseur
    compatible_electronic_card_type:
      name: Type de carte électronique compatible
      description: Précise les types de cartes électroniques avec lesquelles le produit
        peut interagir, à bande magnétique ou bibliothèque par exemple
    compatible_equipment_type:
      name: Type d’équipement compatible
      description: Spécifie la catégorie d’équipement de piscine ou de spa pour laquelle
        la carte de circuit est conçue (par exemple, chauffe-eau, pompe, chlorinateur)
    compatible_exercise_machine_type:
      name: Type de machine de sport compatible
      description: Identifie le type de machine de sport pour lequel la carte est
        conçue (par exemple, tapis roulant, elliptique)
    compatible_exercises:
      name: Exercices compatibles
      description: Précise les exercices qui peuvent être effectués avec le produit,
