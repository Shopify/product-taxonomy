    bracelet_design:
      name: Conception du bracelet
      description: Spécifie le modèle d’un bracelet, tel qu’à breloque ou manchette
    bracket/brace_design:
      name: Conception de support/entretoise
      description: Décrit le style des supports ou des entretoises, par exemple, équerre
        ou renfort d’angle
    bracket_profile:
      name: Profil de support
      description: Indique le style de support physique fourni avec la carte, déterminant
