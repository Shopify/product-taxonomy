    canopy_color:
      name: Couleur du auvent
      description: Spécifie la teinte d’une toile de parapluie ou de parasol, par
        exemple noire
    canopy_material:
      name: Matériau de l’auvent
      description: Précise le matériau utilisé pour les parapluies ou les auvents
        pare-soleil, comme le coton ou le vinyle
    canopy_pattern:
      name: Modèle de auvent
      description: Identifie le motif visuel d’auvents de parapluie ou de parasol,
        comme à damiers ou artistique
    cantilever_material:
      name: Matériau du cantilever
      description: Indique le matériau du cantilever qui maintient le stylet, influençant
        la capacité de suivi et la signature sonore
    canvas_finish:
      name: Finition de la toile
      description: Indique si une toile est prête à être peinte, par exemple, apprêtée
        ou non
    canvas_material:
      name: Matériau de la toile
      description: Identifie le type de tissu utilisé dans la fabrication de toiles
        pour loisirs créatifs, par exemple, coton ou lin
    canvas_texture:
      name: Texture de la toile
      description: Décrit la texture de la surface d’une toile, par exemple, grain
        lisse ou moyen
    capacitance_tolerance:
      name: Tolérance du condensateur
      description: Indique l’écart admissible entre la capacité réelle et sa valeur
        nominale, exprimé en pourcentage
    capacitor_application:
      name: Application du condensateur
      description: Indique l’utilisation principale prévue ou la classe d’application
