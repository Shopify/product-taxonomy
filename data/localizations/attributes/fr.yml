    compatible_makeup:
      name: Maquillage compatible
      description: Précise les produits de maquillage compatibles, par exemple rouge
        à lèvres, fard à paupières
    compatible_mattress_size:
      name: Taille de matelas compatible
      description: Précise la taille du matelas qui correspond au produit ; par exemple
        king size, jumeau
    compatible_memory_cards:
      name: Cartes de mémoire compatibles
      description: Identifie les types de cartes mémoire qu’un produit peut utiliser,
        généralement pour les appareils photo, par exemple, SD ou microSDHC
    compatible_microphone_thread:
      name: Câble de microphone compatible
      description: Précise la taille de fil compatible pour les microphones, par exemple
        5/8"-27
    compatible_motherboard_form_factor:
      name: Facteur de forme de la carte mère compatible
      description: Précise les tailles de carte mère que le produit peut prendre en
        charge, comme ATX
    compatible_oboe_type:
      name: Type de hautbois compatible
      description: Identifie le type de hautbois pour lequel un produit est conçu,
        par exemple, cor universel ou cor anglais
    compatible_operating_system:
      name: Système d’exploitation compatible
      description: Définit la compatibilité logicielle d’un produit, par exemple Windows,
        MacOS
    compatible_orchestral_string_instrument:
      name: Instrument à cordes d’orchestre compatible
      description: Identifie l’instrument à cordes orchestral spécifique pour lequel
        le produit est conçu, par exemple, violon ou violoncelle
    compatible_paper_size:
      name: Format du papier compatible
      description: Précise les formats de papier qu’un périphérique peut prendre en
        charge, généralement pour les imprimantes ; par exemple A4, carte postale
    compatible_patient_profile:
      name: Profil patient compatible
      description: Identifie le groupe de patients approprié pour un produit médical,
        par exemple, pédiatrique ou gériatrique
    compatible_percussion_instrument:
      name: Instrument à percussion compatible
      description: Identifie les instruments de percussion avec lesquels un produit
        peut être utilisé, par exemple, tambour ou bongo
    compatible_pinball_machine_edition:
      name: Édition de flipper compatible
      description: Spécifie l’édition ou la version du flipper à laquelle l’accessoire
        est adapté (par exemple, Pro, Premium, LE)
    compatible_play_vehicle_type:
      name: Type de véhicule de jeu compatible
      description: Identifie le type de véhicule de jeu auquel le produit convient,
