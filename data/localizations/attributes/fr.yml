    case_pattern:
      name: Modèle de boîtier
      description: Décrit le thème ou le motif de l’étui d’un produit, par exemple
        floral ou géométrique
    case_transparency_level:
      name: Niveau de transparence du boîtier
      description: Indique dans quelle mesure il est possible de voir à travers le
        boîtier
    case_type:
      name: Type de housse
      description: Précise le type d’étui pour les appareils électroniques et les
        accessoires, comme le style portefeuille ou livre
    cassette_adapter_type:
      name: Type d’adaptateur de cassette
      description: Identifie le type d’adaptateur de cassette, par exemple, 3,5 mm
