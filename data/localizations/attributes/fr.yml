    candle_shape:
      name: Forme de la bougie
      description: Décrit la forme d’une bougie, par exemple, cylindrique ou carrée
    candle_type:
      name: Type de bougie
      description: Spécifie la conception des bougies, par exemple, chandelles ou
        bougies chauffe-plat
    cane_base_design:
      name: Conception de la base de la canne
      description: Identifie la configuration de la base de support de la canne
    canned_meat_variety:
      name: Variété de viande en conserve
      description: Fait la distinction entre les variétés de viandes en conserve,
