      description: Présente les caractéristiques fonctionnelles ou protectrices propres
        aux protège-matelas, permettant aux acheteurs de filtrer les produits selon
        des critères tels que l’imperméabilité ou les matériaux hypoallergéniques.
    measuring_spoon_features:
      name: Caractéristiques de la cuillère doseuse
      description: Présente les caractéristiques de conception ou les fonctionnalités
        propres aux cuillères doseuses.
    meat_tenderizer_face_type:
      name: Texture de la tête de l’attendrisseur de viande
      description: Décrit la nature de la surface utilisée pour attendrir la viande.
    meat_tenderizer_mechanism:
      name: Type de mécanisme de l’attendrisseur de viande
      description: Classe l’attendrisseur de viande selon son mécanisme de fonctionnement
        principal.
    medical_specialty:
      name: Spécialité médicale
      description: Indique la spécialité médicale ou la discipline de santé pour laquelle
        le matériel a été conçu
    merv_rating:
      name: Classification MERV
      description: Définit la valeur MERV (valeur de rapport d'efficacité minimale)
        indiquant la capacité du filtre à piéger des particules de différentes tailles.
    microwave_compatibility:
      name: Compatibilité avec le micro-ondes
      description: Précise si l’article peut être utilisé en toute sécurité dans un
        four à micro-ondes.
    microwave_oven_functions:
      name: Fonctions du four à micro-ondes
      description: Liste les modes de cuisson prédéfinis ou avancés disponibles, permettant
        aux clients d’identifier les modèles dotés de fonctions spécifiques, notamment
        convection, gril ou cuisson par capteur.
    milk_frother_type:
      name: Type de mousseur à lait
      description: Classe le produit selon son principe de fonctionnement ou son format.
    milk_frothing_method:
      name: Méthode de moussage du lait
      description: Précise la technologie ou le mécanisme utilisé pour produire la
        mousse de lait.
    milk_frothing_system:
      name: Système de moussage du lait
      description: Précise le type de mécanisme de moussage ou de production de vapeur
        intégré à la machine.
    mirror_curvature:
      name: Courbure du miroir
      description: Précise la courbure de la surface réfléchissante, influant sur
        l’angle de vision et la restitution visuelle.
    mirror_type:
      name: Type de miroir
      description: Classe le miroir selon son style général ou sa catégorie fonctionnelle.
    mist_output_mode:
      name: Mode de diffusion de la brume
      description: Indique les modes de diffusion ou les niveaux d’intensité sélectionnables
        sur le diffuseur.
    mixing_bowl_features:
      name: Caractéristiques du bol mélangeur
      description: Présente les caractéristiques fonctionnelles spécifiques du bol
        influant sur son utilisation et son entretien.
    mixing_mechanism:
      name: Mécanisme de mélange
      description: Décrit le mécanisme interne utilisé pour mélanger les ingrédients
        de la vinaigrette.
    mochi_maker_functions:
      name: Fonctions de la machine à mochi
      description: Liste les modes de fonctionnement ou programmes pris en charge
        par l’appareil.
    mode_of_action:
      name: Mode d’action
      description: Indique le fonctionnement du fongicide, en distinguant les produits
        de contact, systémiques ou translaminaires.
    moisture_absorber_form:
      name: Format de l’absorbeur d’humidité
      description: Décrit le format physique du produit, facilitant la sélection entre
        différents types de contenants (sacs suspendus, bacs, paquets, etc.).
    money_retrieval_method:
      name: Système de récupération de l’argent
      description: Décrit le mécanisme permettant de retirer l’argent de la tirelire.
    mop_head_type:
      name: Type de tête de la serpillière
      description: Indique la catégorie de tête ou de recharge afin de faciliter la
        sélection du modèle approprié selon les différents usages de nettoyage.
    mop_wringing_mechanism:
      name: Mécanisme d’essorage de la serpillière
      description: Indique le procédé utilisé pour retirer l’excès de liquide de la
        serpillière, aidant ainsi l’acheteur à choisir son style d’essorage préféré.
    mounting_bolt_pattern:
      name: Configuration des trous de fixation
      description: Précise le nombre et la disposition des trous de fixation sur le
        boîtier de broche (par exemple, triangulaire à 3 boulons, carré à 4 boulons).
    mouthpiece_shape:
      name: Forme de l’embout du porte-cigarette
      description: Précise la forme de l’embout situé à l’extrémité du porte-cigarette.
    mower_deck_material:
      name: Matériau du carter de tondeuse
      description: Indique le matériau de construction du carter de tondeuse, influant
        sur sa durabilité et son poids.
    mulch_form:
      name: Forme du paillis
      description: Décrit la forme ou la consistance physique du paillis.
    nap_mat_items_included:
      name: Articles inclus avec le tapis de sieste
      description: Détaille les composants ou accessoires spécifiques fournis avec
        le tapis de sieste.
    napkin_edge_finish:
      name: Finition du bord de la serviette
      description: Précise le type de couture ou de finition décorative appliqué au
        bord ou à l’ourlet de la serviette.
    noodle_core_design:
      name: Conception interne des nouilles
      description: Indique si les nouilles sont pleines ou creuses.
    nozzle_adjustability:
      name: Réglage de la buse
      description: Indique si la buse est réglable afin de modifier la forme du jet
        ou l’intensité du débit.
    nozzle_material:
      name: Matériau des buses
      description: Précise le matériau des buses de brumisation, déterminant leur
        durabilité et leur résistance à l’encrassement.
    nozzle_style:
      name: Style de buse
      description: Précise la forme fonctionnelle ou le style de l’extrémité de la
        buse.
    nozzle_types_included:
      name: Types de buses incluses
      description: Liste les formes ou styles de buses fournis avec le pistolet à
        viande séchée, afin de préciser les types de produits pouvant être réalisés.
    number_of_compartments:
      name: Nombre de compartiments
      description: Indique le nombre de compartiments distincts du conteneur destinés
        au tri des déchets ou des recyclables.
    numeral_style:
      name: Style des chiffres
      description: Définit le style visuel ou la présence des chiffres sur le cadran
        de l’horloge.
    oil_dispenser_spout_design:
      name: Conception du bec verseur du distributeur d’huile
      description: Décrit la conception du bec ou de la buse, influant sur le contrôle
        du débit et la prévention des écoulements.
    organizer_application:
      name: Usage prévu de l’organiseur
      description: Précise la catégorie d’objets pour lesquels l’organiseur est conçu.
    ornament_hook_style:
      name: Style du crochet d’ornement
      description: Indique le style ou la forme du crochet utilisé pour suspendre
        les décorations.
    oscillation_mode:
      name: Mode d’oscillation
      description: Décrit si le ventilateur oscille afin de diffuser l’air et selon
        quel mode.
    oscillation_type:
      name: Type d’oscillation
      description: Précise si le ventilateur oscille et selon quel mécanisme, afin
        de répondre aux besoins des acheteurs ayant besoin d’une circulation d’air
        étendue.
    outdoor_grill_rack_type:
      name: Type de grille de barbecue
      description: Précise le style fonctionnel de la grille en fonction de son rôle
        dans la préparation des aliments.
    oxygen_indicator_type:
      name: Type d’indicateur d’oxygène
      description: Indique si un indicateur visuel est présent pour signaler si l’absorbeur
        est encore actif et en précise la forme.
    pad_cleaning_action:
      name: Action de nettoyage du tampon
      description: Décrit la fonction principale du tampon et le résultat obtenu après
        utilisation.
    pan_bottom_type:
      name: Type de fond du moule
      description: Indique si le moule est doté d’un fond amovible ou d’un fond plein
        et fixe.
    pan_perforation_type:
      name: Type de perforation du moule
      description: Indique si le fond ou les parois du moule sont pleins ou perforés
        afin de permettre l’évacuation des liquides.
    parasol_opening_mechanism:
      name: Mécanisme d’ouverture du parasol
      description: Décrit le système de fonctionnement assurant l’ouverture et la
        fermeture du parasol.
    parchment_paper_coating:
      name: Revêtement du papier cuisson
      description: Identifie le traitement appliqué au papier cuisson afin d’assurer
        l’effet antiadhérent.
    particle_size_grade:
      name: Taille des particules
      description: Décrit la catégorie de granulométrie de la vermiculite, et son
        impact sur l’aération et la rétention d’eau.
    patio_heater_safety_features:
      name: Caractéristiques de sécurité du chauffage extérieur
      description: Présente les mécanismes de sécurité intégrés destinés à prévenir
        les accidents et à garantir une utilisation sécurisée.
    pattern_match_type:
      name: Type de raccord du motif
      description: Précise le type de raccord à respecter pour assurer la continuité
        du motif entre les lés lors de la pose.
    pendulum_compatibility:
      name: Fonctionnement avec balancier
      description: Indique si le mécanisme d’horloge peut entraîner un balancier et
        si celui-ci est fourni.
    perch_design:
      name: Conception du perchoir
      description: Décrit la conception et le format du perchoir.
    perch_surface_texture:
      name: Texture de la surface du perchoir
      description: Définit la texture ou la finition de la surface du perchoir, influant
        sur l’adhérence et l’usure des griffes.
    pet_safety:
      name: Sécurité pour les animaux domestiques
      description: Indique si la plante est toxique ou non toxique pour les animaux
        domestiques courants.
    pet_toxicity:
      name: Toxicité pour les animaux domestiques
      description: Indique si la plante présente une toxicité pour les animaux domestiques
        courants.
    ph_adjustment_direction:
      name: Correction du pH
      description: Indique si le produit est formulé pour augmenter ou diminuer le
        niveau de pH de la solution.
    pie_pan_edge_style:
      name: Style du bord du moule à tarte
      description: Décrit la conception du rebord du moule, influant sur l’aspect
        de la croûte et sur la facilité de démoulage.
    pin_shape:
      name: Forme de l’épingle
      description: Décrit la forme générale de l’épingle servant à fixer le tissu.
    pipe_connection_method:
      name: Méthode de raccordement du tuyau
      description: Précise le type de raccordement présent aux extrémités du coude
        du tuyau (par exemple, mâle, femelle, à emboîtement, à filetage) afin d’assurer
        la compatibilité de l’installation.
    piping_tip_shape:
      name: Forme de la douille de pâtisserie
      description: Définit la forme ou la conception de la douille utilisée pour la
        décoration.
    pitcher_spout_style:
      name: Style du bec verseur du pichet
      description: Définit la conception du bec verseur, influant sur la précision
        du latte art et le contrôle du flux.
    pizza_cutter_design:
      name: Conception du coupe-pizza
      description: Identifie le style structurel du coupe-pizza, aidant ainsi les
        clients à distinguer les différents mécanismes de coupe.
    pizza_pan_style:
      name: Style de moule à pizza
      description: Indique la conception du moule à pizza, indiquant son mode de cuisson
        de la pâte et le type de pizza auquel il est destiné.
    plant_care_difficulty:
      name: Niveau d’entretien de la plante
      description: Indique le niveau de soin requis pour l’entretien de la plante,
        afin d’aider les débutants comme les jardiniers expérimentés à faire un choix
        adapté.
    plant_container_type:
      name: Type de contenant de plantation
      description: Indique le type de contenant fourni avec l’arbuste artificiel,
        le cas échéant.
    plant_life_cycle:
      name: Cycle de vie de la plante
      description: Indique la catégorie de cycle végétatif à laquelle la plante appartient.
    planter_material:
      name: Matériau du pot
      description: Indique le matériau du pot ou du bac fourni avec le produit, le
        cas échéant.
    plate_coupling_pattern:
      name: Configuration de l’entraînement du plateau
      description: Précise la configuration du système d’accouplement situé sous le
        plateau, permettant son raccordement au coupleur du moteur rotatif.
    plate_purpose:
      name: Fonction de la plaque
      description: Définit le rôle fonctionnel de la plaque au sein du système de
        tondeuse.
    plate_style:
      name: Style d’assiette
      description: Indique la catégorie d’assiette en fonction de son utilisation.
    pole_construction_type:
      name: Type de construction du mât
      description: Définit le style structurel du mât, ce qui influe sur son installation
        et sa facilité de transport.
    pool_chemical_type:
      name: Type de traitement chimique pour piscine
      description: Classe la fonction principale ou la nature chimique du produit
        de traitement pour piscine.
    pool_filter_type:
      name: Type de filtre pour piscine
      description: Identifie la technologie de filtration ou le type de conception
        utilisé par le filtre de piscine ou de spa.
    pool_game_type:
      name: Type de jeu de piscine
      description: Identifie le type précis de jeu ou de sport que le produit permet
        de pratiquer dans la piscine.
    pool_ladder_design:
      name: Conception de l’échelle de piscine
      description: Classe la conception structurelle générale de l’échelle de piscine.
    pool_liner_installation_style:
      name: Système de pose du liner de piscine
      description: Identifie la méthode de fixation utilisée pour maintenir le liner
        contre la paroi de la piscine.
    pool_lounge_style:
      name: Type de transat de piscine
      description: Classe la conception structurelle du transat de piscine afin de
        faciliter le tri visuel ou fonctionnel.
    pool_lounger_features:
      name: Caractéristiques du transat de piscine
      description: Présente les caractéristiques spécifiques apportant un avantage
        fonctionnel ou un confort supplémentaire.
    pool_skimmer_type:
      name: Type de skimmer de piscine
      description: Classe la conception du skimmer, afin de permettre aux acheteurs
        de comparer les modèles manuels aux versions automatiques ou flottantes.
    pool_toy_features:
      name: Caractéristiques des jouets de piscine
      description: Présente les caractéristiques fonctionnelles ou de conception propres
        aux jouets de piscine.
    pool_type:
      name: Type de piscine
      description: Classe la conception structurelle de la piscine.
    pool_vacuum_type:
      name: Type d’aspirateur de piscine
      description: Indique le mode de fonctionnement ou le mécanisme d’entraînement
        de l’aspirateur de piscine.
    popcorn_kernel_variety:
      name: Variété de grain de maïs à popcorn
      description: Précise la variété naturelle ou la forme du grain de maïs à popcorn.
    portafilter_type:
      name: Type de porte-filtre
      description: Identifie la conception structurelle du porte-filtre, influant
        sur le procédé d’extraction et l’ergonomie d’utilisation.
    post_installation_method:
      name: Méthode d’installation du poteau
      description: Définit le procédé utilisé pour installer ou fixer le poteau de
        boîte aux lettres.
    pour_spout_design:
      name: Conception du bec verseur
      description: Précise les caractéristiques ou la conception du bec verseur qui
        influencent le contrôle du débit.
    pour_spout_style:
      name: Style du bec verseur
      description: Décrit la conception du bec verseur du distributeur, influant sur
        le contrôle du débit et la prévention des écoulements.
    power_equipment_hitch_type:
      name: Type d’attelage pour équipement motorisé
      description: Identifie l’interface de connexion utilisée pour fixer l’accessoire
        sur un tracteur ou un équipement motorisé.
    predator_guard_style:
      name: Type de dispositif anti-prédateurs
      description: Indique le type de structure du dispositif de protection, facilitant
        la recherche de solutions en forme de cône, de disque, de cage ou de plaque
        à trous.
    preferred_soil_type:
      name: Type de sol recommandé
      description: Indique la composition de sol dans laquelle la plante se développe
        de manière optimale.
    preparation_type:
      name: Type de préparation
      description: Décrit le procédé à suivre pour préparer le produit avant consommation.
    preservation_method:
      name: Méthode de conservation
      description: Détaille la technique employée pour sécher ou conserver les fleurs.
    pressure_cooker_handle_type:
      name: Type de poignée de l’autocuiseur
      description: Indique le type ou l’emplacement de la poignée de l’autocuiseur
        concernée par le remplacement.
    pressure_cooker_safety_features:
      name: Caractéristiques de sécurité de l’autocuiseur
      description: Liste les mécanismes de sécurité intégrés destinés à prévenir les
        accidents, comme le verrouillage du couvercle ou les soupapes de décompression.
    pressure_settings:
      name: Réglages de pression
      description: Précise le nombre de niveaux de pression différents disponibles
        sur l’autocuiseur.
    pressure_washer_outlet_connector_type:
      name: Type de raccord de sortie pour nettoyeur haute pression
      description: Précise le type de raccord présent à l’extrémité du pistolet permettant
        l’installation de lances ou de buses.
    pressure_washer_spray_pattern:
      name: Type de jet du nettoyeur haute pression
      description: Définit le type de jet ou l’angle de pulvérisation délivré par
        la buse haute pression.
    print_edition_type:
      name: Type d’édition de l’œuvre imprimée
      description: Indique la catégorie d’édition de l’impression, reflétant sa rareté
        et sa valeur.
    printed_sides:
      name: Impression recto ou recto-verso
      description: Précise si l’impression est réalisée en recto uniquement ou en
        recto-verso.
    procedure:
      name: Procédure
      description: Indique le type de procédure médicale ou de formation pour lequel
        le matériel a été conçu
    protected_item_type:
      name: Type d’article protégé
      description: Précise le type de document ou d’objet que l’étui de protection
        RFID est destiné à protéger.
    pulley_groove_profile:
      name: Type de rainure de la poulie
      description: Définit le type d’interface avec la courroie sur la poulie de renvoi.
    pulp_ejection_type:
      name: Type d’éjection de la pulpe
      description: Indique la manière dont la pulpe est évacuée hors de la machine.
    pump_type:
      name: Type de pompe
      description: Précise la conception du mécanisme de pompe du nettoyeur haute
        pression.
    punch_bowl_components_included:
      name: Éléments inclus avec le bol à punch
      description: Liste les éléments supplémentaires fournis avec le bol à punch
        afin de permettre aux acheteurs d’identifier rapidement le contenu du set.
    quilt_construction_type:
      name: Mode de fabrication de la courtepointe
      description: Décrit le type de piquage ou de compartimentage utilisé dans la
        courtepointe, influant sur la répartition de la chaleur et la durabilité.
    radiator_design_type:
      name: Type de conception du radiateur
      description: Précise la conception générale du radiateur.
    rain_barrel_design:
      name: Conception du récupérateur d’eau de pluie
      description: Classe le type de conception structurelle du récupérateur d’eau
        de pluie.
    rain_chain_style:
      name: Style de chaîne de pluie
      description: Spécifie la conception structurelle de la chaîne de pluie afin
        que les clients puissent filtrer selon leurs préférences esthétiques et les
        performances d’écoulement.
    range_hood_filter_type:
      name: Type de filtre de hotte aspirante
      description: Classe le type de filtre de remplacement afin d’assurer une compatibilité
        adéquate et des performances optimales.
    range_installation_type:
      name: Type d’installation de la cuisinière
      description: Décrit le type d’installation de la cuisinière selon sa position
        dans l’espace cuisine.
    recorder_type:
      name: Type d’enregistreur
      description: Identifie la technologie d’enregistrement utilisée (par exemple
        DVR ou NVR) afin de comparer les solutions analogiques et IP.
    refrigerator_configuration:
      name: Configuration du réfrigérateur
      description: Identifie la configuration générale des portes et des compartiments
        du réfrigérateur.
    release_type:
      name: Type de libération
      description: Indique la vitesse de libération des nutriments contenus dans l’engrais.
    relief_style:
      name: Style de relief
      description: Indique si les reliefs de surface du globe sont en relief, creux
        ou plats.
    repellent_mechanism:
      name: Type de dispositif répulsif
      description: Indique le mécanisme répulsif principal utilisé par le produit,
        par exemple diffusion d’odeur, émission d’ultrasons ou signal lumineux clignotant.
    replaceable_brush_head:
      name: Tête de brosse remplaçable
      description: Précise si la tête de brosse peut être retirée et remplacée lorsqu’elle
        est usée.
    rib_material:
      name: Matériau des baleines de parapluie
      description: Précise la composition des baleines du parapluie, comme la fibre
        de verre ou l’aluminium.
    rice_cooker_functions:
      name: Fonctions du cuiseur à riz
      description: Liste les programmes ou modes de cuisson prédéfinis disponibles
        sur le cuiseur à riz, permettant aux acheteurs d’apprécier ses niveaux de
        polyvalence.
    roaster_oven_functions:
      name: Fonctions de la rôtissoire
      description: Liste les fonctions de cuisson prédéfinies ou prises en charge
        par la rôtissoire.
    roasting_rack_shape:
      name: Configuration de la grille de cuisson
      description: Précise la forme ou la conception structurelle de la grille, influant
        sur sa compatibilité et les performances de cuisson.
    rockwool_form:
      name: Forme de la laine de roche
      description: Indique le format sous lequel la laine de roche est proposée.
    roof_style:
      name: Style de toiture
      description: Définit le style architectural ou la forme de la toiture.
    rose_attachment:
      name: Type de pomme d’arrosage
      description: Indique si l’arrosoir est équipé d’une pomme d’arrosage amovible,
        fixe ou s’il en est dépourvu.
    safety_mirror_features:
      name: Caractéristiques du rétroviseur de sécurité
      description: Présente les atouts fonctionnels contribuant à une meilleure longévité
        ou à une visibilité accrue.
    salad_spinner_mechanism:
      name: Mécanisme de l’essoreuse à salade
      description: Indique le système d’essorage intégré afin d’aider les acheteurs
        à sélectionner leur mode de fonctionnement préféré.
    sand_color:
      name: Couleur du sable
      description: Indique la couleur du sable ou du matériau granulaire contenu dans
        le sablier, différente de la couleur de la structure extérieure.
    sand_type:
      name: Type de sable
      description: Définit la nature du sable d’après sa composition ou son emploi
        principal.
    saucer_functionality:
      name: Fonctionnalité de la soucoupe
      description: Indique la configuration fonctionnelle de la soucoupe ou du plateau,
        notamment avec réservoir intégré ou dispositif d’arrosage automatique.
    sauna_form_factor:
      name: Configuration du sauna
      description: Précise la forme et la conception générale du sauna.
    sauna_heater_type:
      name: Type de poêle pour sauna
      description: Indique le type de poêle inclus ou compatible avec le kit de sauna.
    scoop_release_mechanism:
      name: Mécanisme d’éjection de la cuillère à glace
      description: Décrit le type de mécanisme intégré à la cuillère à glace permettant
        l’éjection du contenu.
    scoop_surface_design:
      name: Conception de la surface de la pelle à frites
      description: Indique si la surface de la pelle à frites est pleine ou perforée
        afin de permettre l’écoulement de l’huile.
    scoop_wall_design:
      name: Conception des parois de la pelle à frites
      description: Indique si la surface de la pelle à frites est pleine, perforée
        ou ajourée afin de permettre l’écoulement de l’huile ou le passage de petits
        éléments.
    scrubber_head_type:
      name: Type de tête de la brosse
      description: Décrit le type de mouvement ou la conception mécanique de la tête
        de la brosse.
    scrubbing_strength:
      name: Puissance de nettoyage
      description: Précise le degré d’intensité de nettoyage du produit.
    seafood_utensil_items_included:
      name: Ustensiles pour fruits de mer inclus
      description: Indique les accessoires complémentaires inclus avec la pince à
        crustacés, facilitant la comparaison entre article individuel et kit complet.
    sealing_modes:
      name: Modes de scellage
      description: Indique les modes de fonctionnement dédiés à la fermeture hermétique.
    security_sensor_subtype:
      name: Sous-type de capteur de sécurité
      description: Définit la fonction ou le type précis du capteur de sécurité.
    seed_treatment:
      name: Traitement des graines
      description: Précise tout procédé spécifique appliqué aux graines.
    self_cleaning_method:
      name: Méthode d’auto-nettoyage
      description: Précise la technologie d’auto-nettoyage utilisée par le four.
    serveware_pieces_included:
      name: Pièces incluses dans le service de table
      description: Liste les différents éléments de service contenus dans un ensemble
        multi-pièces.
    shaker_set_pieces_included:
      name: Pièces incluses dans le set
      description: Liste les éléments individuels inclus dans l’ensemble, en plus
        de la salière et de la poivrière.
    sheath_material:
      name: Composition de la gaine
      description: Précise la composition de la gaine protectrice de la sonde à thermocouple,
        influant sur la résistance à la corrosion et aux hautes températures.
    shelf_location_in_appliance:
      name: Emplacement de l’étagère dans l’appareil
      description: Indique l’emplacement prévu pour l’installation de l’étagère à
        l’intérieur de l’appareil.
    shoe_brush_type:
      name: Type de brosse à chaussures
      description: Classe la brosse à chaussures selon son usage fonctionnel, facilitant
        la sélection en fonction du besoin d’entretien.
    shoe_dryer_technology:
      name: Technologie de séchage des chaussures
      description: Précise la technologie principale utilisée par l’appareil pour
        assurer le séchage des chaussures.
    shoe_organizer_design:
      name: Conception du range-chaussures
      description: Identifie le style ou le format général du range-chaussures afin
        d’aider les acheteurs à comparer les modèles disponibles.
    shoe_polish_form:
      name: Format du produit de cirage
      description: Identifie la forme physique ou le mode d’application du produit
        de cirage.
    shoe_treatment_purpose:
      name: Fonction du produit d’entretien pour chaussures
      description: Identifie la fonction principale ou l’avantage du produit de traitement
        pour chaussures.
    shoe_tree_design:
      name: Conception de l’embauchoir
      description: Identifie la conception ou le mécanisme de l’embauchoir, influant
        sur son ajustabilité, sa compatibilité avec différents modèles de chaussures
        et sa facilité d’utilisation.
    shot_glass_style:
      name: Style de verre à shot
      description: Classe le type ou le format spécifique du verre à shot.
    shovel_handle_grip_type:
      name: Type de poignée du manche de la pelle
      description: Précise la forme de la poignée à l’extrémité du manche.
    shovel_head_type:
      name: Forme de la tête de la pelle
      description: Classe la tête de la pelle ou de la bêche selon sa forme ou sa
        fonction.
    shower_curtain_ring_type:
      name: Type d’anneau du rideau de douche
      description: Identifie le type fonctionnel de l’anneau de rideau de douche.
    shrub_shape:
      name: Forme de l’arbuste
      description: Décrit la forme sculptée ou topiaire générale de l’arbuste artificiel.
    signature_presence:
      name: Présence de signature
      description: Précise si l’œuvre est signée par l’artiste et sous quelle forme.
    sink_caddy_features:
      name: Caractéristiques de l’organiseur d’évier
      description: Présente les caractéristiques fonctionnelles spécifiques de l’organiseur
        d’évier.
    size_adjustability:
      name: Réglage de la taille
      description: Définit la possibilité d’ajuster les dimensions du produit pour
        correspondre à diverses pointures.
    skewer_tip_type:
      name: Type de pointe de brochette
      description: Définit le type de pointe de la brochette, influant sur la facilité
        de perforation des aliments et la présentation générale.
    sleeping_position_suitability:
      name: Positions de sommeil compatibles
      description: Précise les positions de couchage adaptées à l’utilisation de l’oreiller.
    sleeve_insulation:
      name: Isolation thermique du manchon
      description: Indique si le manchon assure une isolation thermique permettant
        de conserver les boissons chaudes ou froides.
    slice_style:
      name: Type de découpe
      description: Précise le principal style de coupe produit par l’appareil, par
        exemple en julienne ou gaufré.
    slipcover_stretch_type:
      name: Type d’élasticité de la housse
      description: Définit les caractéristiques d’élasticité du tissu, notamment son
        niveau d’extensibilité et son sens d’étirement.
    smoker_type:
      name: Type de fumoir
      description: Classe le fumoir selon sa conception structurelle ou sa méthode
        de fumage.
    smoking_chip_size:
      name: Taille des copeaux de fumage
      description: Indique la taille/le format des copeaux de bois de fumage, influant
        sur la vitesse de combustion et la compatibilité avec différents appareils.
    snow_blower_stage_type:
      name: Type de souffleuse à neige
      description: Indique le nombre d’étages mécaniques constitués de la tarière
        et de la turbine utilisés pour ramasser, acheminer et éjecter la neige, critère
        principal distinguant les modèles à une, deux ou trois étapes.
    soap_dispenser_operation_type:
      name: Type de mécanisme du distributeur de savon
      description: Précise le mécanisme d’activation utilisé pour distribuer le savon
        ou la lotion.
    soil_texture:
      name: Texture du sol
      description: Précise la composition granulométrique du sol influant sur sa capacité
        de drainage et d’aération.
    spa_installation_type:
      name: Type d’installation du spa
      description: Classe le spa en fonction de son installation ou de son intégration
        sur place.
    space_heater_safety_features:
      name: Caractéristiques de sécurité du chauffage d’appoint
      description: Présente les mécanismes de sécurité intégrés destinés à prévenir
        les risques pour les personnes et l’environnement.
    spice_organizer_features:
      name: Caractéristiques de l’étagère à épices
      description: Présente les caractéristiques fonctionnelles spécifiques des étagères
        à épices.
    spray_pattern:
      name: Forme du jet
      description: Précise la méthode utilisée pour générer la pression nécessaire
        à la distribution de l’huile.
    sprayer_operation_mechanism:
      name: Mécanisme de fonctionnement du pulvérisateur
      description: Spécifie comment la pression est générée pour distribuer l’huile
        du pulvérisateur.
    spring_type:
      name: Type de ressort
      description: Identifie le type de ressort utilisé dans le mécanisme du coupe-bordures.
    sprinkle_opening_style:
      name: Type d’ouverture pour le saupoudrage
      description: Définit la finesse ou le type des perforations ou du tamis utilisé
        pour répartir le cacao, par exemple maille fine ou trous larges.
    sprinkler_orientation:
      name: Orientation du gicleur
      description: Indique l’orientation et le type d’installation de la tête du gicleur.
    sprinkler_response_type:
      name: Type de réponse thermique du gicleur
      description: Précise la caractéristique de réponse thermique de la tête du gicleur.
    sprinkler_type:
      name: Type d’arroseur
      description: Définit le type d’arroseur selon son mécanisme d’arrosage.
    sprinkler_valve_type:
      name: Type de vanne de gicleur
      description: Définit le type fonctionnel ou le mode d’actionnement de la vanne
        du gicleur.
    squirrel_feed_type:
      name: Type d’aliment pour écureuils
      description: Indique les types d’aliments que le dispositif est conçu pour distribuer,
        assurant ainsi sa compatibilité avec les préférences alimentaires des écureuils.
    squirrel_resistance:
      name: Protection contre les écureuils
      description: Indique si la mangeoire comporte des caractéristiques conçues pour
        empêcher les écureuils d’accéder au bloc de graisse.
    stackability:
      name: Possibilité d’empilement
      description: Indique si plusieurs unités peuvent être empilées en toute sécurité
        afin d’optimiser le stockage.
    stackable_design:
      name: Conception empilable
      description: Indique si le conteneur est conçu pour être empilé en toute sécurité,
        qu’il soit plein ou vide.
    stacking_capability:
      name: Capacité d’empilage
      description: Précise si le conteneur peut être empilé, emboîté, replié ou s’il
        ne permet aucun empilage.
    stainless_steel_cleaner_features:
      name: Caractéristiques du nettoyant pour acier inoxydable
      description: Indique les caractéristiques de performance spécifiques particulièrement
        adaptées à l’entretien de l’acier inoxydable.
    staple/pin_shape:
      name: Forme de l’agrafe ou de la pointe
      description: Définit la forme générale de l’élément de fixation, permettant
        aux clients de distinguer les agrafes en U, les pointes à tête ronde, etc.
    staple_coating:
      name: Revêtement de l’agrafe
      description: Décrit le revêtement protecteur appliqué à l’agrafe ou à la pointe
        afin de prévenir la corrosion ou d’en améliorer la durabilité.
    steam_nozzle_type:
      name: Type de buse vapeur
      description: Identifie le type fonctionnel de l’accessoire de buse du nettoyeur
        vapeur.
    steam_table_pan_cover_features:
      name: Caractéristiques du couvercle du bac gastronorme
      description: Présente les caractéristiques fonctionnelles spécifiques des couvercles
        de bacs facilitant les opérations de restauration.
    steam_table_pan_size:
      name: Taille du bac gastronorme
      description: Indique la fraction normalisée Gastronorme compatible, telle que
        plein format, 1/2 ou 1/3, à laquelle le couvercle ou le bac correspond.
    steam_table_pan_size_compatibility:
      name: Tailles des bacs gastronormes compatibles
      description: Indique les dimensions normalisées de bacs gastronormes prises
        en charge par l’équipement.
    steam_table_pan_type:
      name: Type de bac gastronorme
      description: Précise la conception structurelle du bac, influant sur l’écoulement
        et la performance thermique.
    stemware_design:
      name: Conception du verre à pied
      description: Précise si le verre comporte un pied traditionnel ou s’il en est
        dépourvu.
    stick_tip_style:
      name: Forme de l’embout du bâtonnet
      description: Définit la conception de l’extrémité du bâtonnet, influant sur
        sa capacité à percer ou à maintenir les aliments.
    stocking_toe_orientation:
      name: Orientation de la chaussette de Noël
      description: Précise la direction dans laquelle la chaussette est orientée une
        fois suspendue, afin d’assurer une disposition harmonieuse lorsque plusieurs
        chaussettes sont exposées.
    stopper_type:
      name: Type de bouchon
      description: Précise le type de bouchon fourni avec la carafe, le cas échéant.
    strainer_style:
      name: Style de passoire
      description: Classe la passoire ou le chinois selon sa conception structurelle.
    strainer_type:
      name: Type de passoire
      description: Précise le style ou la conception de la passoire, indiquant son
        usage culinaire prévu ainsi que le type de maillage.
    strap_end_fitting_type:
      name: Type d’embout de sangle
      description: Spécifie l’élément de fixation situé à l’extrémité de la sangle
        de traction, facilitant le raccordement, la fixation ou le réglage.
    straw_dispensing_mechanism:
      name: Système de distribution des pailles
      description: Précise la manière dont les pailles sont distribuées, pour orienter
        le choix des acheteurs selon des critères de commodité ou d’hygiène.
    sugar_dispenser_mechanism:
      name: Système de distribution du sucre
      description: Décrit la manière dont le sucre est distribué, aidant les acheteurs
        à choisir le mode de versement souhaité.
    suitable_for_pool_shape:
      name: Compatible avec la forme de la piscine
      description: Indique les formes de piscine avec lesquelles l’accessoire peut
        être utilisé, afin d’en garantir la compatibilité.
    suitable_pool_surface_type:
      name: Type de surface de piscine compatible
      description: Identifie les matériaux de revêtement pour lesquels la brosse ou
        le balai est conçu, afin d’éviter toute détérioration et d’assurer un nettoyage
        optimal.
    suitable_spread_material:
      name: Matériaux d’épandage compatibles
      description: Identifie les matériaux que l’épandeur est conçu pour distribuer.
    sundial_type:
      name: Type de cadran solaire
      description: Identifie le style de conception ou la configuration scientifique
        du cadran solaire.
    supplement_function:
      name: Fonction du complément
      description: Classe les compléments selon leur objectif principal, afin d’aider
        les cultivateurs à sélectionner l’additif approprié aux besoins des plantes.
    surface_reflectivity:
      name: Réflectivité de surface
      description: Indique si la surface du panneau est conçue pour réfléchir la lumière
        afin d’améliorer la visibilité nocturne.
    sweetener_type:
      name: Type d’édulcorant
      description: Identifie l’agent sucrant principal du sirop.
    table_skirt_pleat_style:
      name: Style de plissage de jupe de table
      description: Définit le type de plis ou de fronces décoratives de la jupe, afin
        d’orienter le choix décoratif des acheteurs.
    tablecloth_clip_design:
      name: Type de fixation pour nappe
      description: Décrit le mécanisme ou le style du dispositif de fixation de la
        nappe.
    tablecloth_features:
      name: Caractéristiques de la nappe
      description: Présente les particularités techniques ou esthétiques de la nappe.
    tamper_evident_feature:
      name: Dispositif d’inviolabilité
      description: Indique la présence et le type de dispositif d’inviolabilité intégré
        au bouchon.
    tang_type:
      name: Type de soie du couteau
      description: Indique la conception de la soie du couteau, précisant l’extension
        de la lame dans le manche.
    teapot_spout_style:
      name: Style de bec de la théière
      description: Décrit la conception du bec verseur, influençant la précision du
        service et l’esthétique.
    temperature_zones:
      name: Zones de température
      description: Indique le nombre de zones disposant d’un contrôle thermique distinct
        dans la cave à vin.
    thermocouple_junction_type:
      name: Type de jonction de thermocouple
      description: Indique la construction de la jonction de mesure, influençant le
        temps de réponse et l’isolation électrique.
    thermometer_design:
      name: Conception du thermomètre
      description: Spécifie le principe de fonctionnement du thermomètre domestique
        ou la technologie employée.
    thermos_handle_type:
      name: Type de poignée de thermos
      description: Décrit le style ou le dispositif de transport intégré au thermos.
    thread_standard:
      name: Norme de filetage
      description: Identifie la spécification du filetage utilisée pour le raccordement
        de l’accessoire afin d’assurer la compatibilité avec les éléments de plomberie.
    tilt_mechanism:
      name: Mécanisme d’inclinaison
      description: Spécifie le système permettant d’ajuster l’angle de l’auvent pour
        optimiser l’ombrage.
    time_format:
      name: Mode d’affichage de l’heure
      description: Précise le système de présentation de l’heure, format 12 heures,
        24 heures ou les deux.
    timer_mechanism:
      name: Mécanisme de minuterie
      description: Identifie le système interne utilisé pour mesurer le temps.
    tine_position:
      name: Position des dents
      description: Décrit la configuration des dents par rapport aux roues ou au moteur,
        ce qui influence la maniabilité et la pénétration dans le sol.
    tire_construction:
      name: Construction du pneu
      description: Identifie la méthode de fabrication interne de la carcasse du pneu.
    tire_construction_type:
      name: Type de construction du pneu
      description: Indique si le pneu est de type diagonal ou radial, ce qui influe
        sur la flexibilité, la capacité de charge et la qualité de roulement.
    tire_tread_pattern:
      name: Motif de la bande de roulement du pneu
      description: Décrit la sculpture du pneu, indiquant l’adaptation aux conditions
        de terrain et aux besoins d’adhérence.
    tissue_lotion_content:
      name: Présence de lotion dans les mouchoirs
      description: Indique si les mouchoirs sont imprégnés de lotion ou d’autres agents
        apaisants.
    toaster_features:
      name: Caractéristiques du grille-pain
      description: Liste les fonctions spécifiques et éléments de conception disponibles
        sur le grille-pain.
    tong_type:
      name: Type de pince
      description: Précise le style principal ou l’usage prévu des pinces.
    toothbrush_holder_features:
      name: Caractéristiques du porte-brosse à dents
      description: Présente les particularités de conception ou d’utilisation.
    toothpick_dispensing_mechanism:
      name: Mécanisme de distribution des cure-dents
      description: Identifie le système de mise à disposition des cure-dents.
    topographical_relief:
      name: Relief topographique
      description: Précise si les variations d’altitude sont matérialisées physiquement
        sur le globe.
    towel_holder_design:
      name: Conception du porte-serviettes
      description: Décrit le style structurel du porte-serviettes, comme une barre
        ou un anneau.
    towel_weave:
      name: Tissage de serviette
      description: Décrit la construction ou le style de tissage du tissu de la serviette,
        ce qui influe sur sa texture, son pouvoir absorbant et son temps de séchage.
    track_lighting_rail_type:
      name: Type de rail d’éclairage
      description: Définit la norme mécanique et électrique déterminant la compatibilité
        des luminaires.
    track_lighting_system_compatibility:
      name: Compatibilité avec le système de rail d’éclairage
      description: Spécifie la norme électrique et mécanique du dispositif ou accessoire
        pour lequel il est conçu.
    track_rail_circuit_configuration:
      name: Configuration des circuits du rail
      description: Précise la répartition ou le nombre de circuits pris en charge
        par le rail, permettant un pilotage distinct des groupes de luminaires.
    track_system_standard:
      name: Norme du système de rail
      description: Identifie la norme physique du rail compatible avec l’alimentation,
        permettant d’associer correctement les composants, par exemple en H, J ou
        L.
    tractor_tire_application:
      name: Utilisation prévue du pneu de tracteur
      description: Indique l’usage principal ou l’environnement pour lequel le pneu
        est conçu.
    tractor_tire_tread_classification:
      name: Classification de la bande de roulement du pneu de tracteur
      description: Classe le motif de la bande de roulement du pneu de tracteur selon
        les standards agricoles et industriels.
    tree_shape:
      name: Forme de l’arbre
      description: Décrit la silhouette ou l’aspect général de l’arbre artificiel.
    trigger_type:
      name: Type de gâchette
      description: Précise le mécanisme utilisé pour contrôler le débit d’eau au niveau
        de la buse.
    trimmer_line_feed_system:
      name: Système d’avance du fil de coupe
      description: Indique comment le fil de coupe est avancé depuis la tête pendant
        l’utilisation.
    trimmer_line_shape:
      name: Forme du fil de coupe
      description: Décrit la section transversale du fil, influençant la performance
        de coupe et le niveau sonore.
    turntable_type:
      name: Type de plateau tournant
      description: Identifie le style de surface de cuisson, distinguant les plateaux
        en verre rotatifs des modèles plats non rotatifs.
    ultrasonic_cleaner_accessories_included:
      name: Accessoires inclus avec le nettoyeur à ultrasons
      description: Liste les composants supplémentaires fournis, permettant aux acheteurs
        d’identifier précisément le contenu du coffret.
    umbrella_base_type:
      name: Type de pied du parasol
      description: Définit le style structurel ou le mode de fixation du pied du parasol.
    umbrella_opening_mechanism:
      name: Mécanisme d’ouverture du parasol
      description: Décrit la méthode de déploiement et de repli du parasol.
    umbrella_type:
      name: Type de parasol
      description: Spécifie la conception générale ou le format du parasol.
    upf_rating:
      name: Indice UPF
      description: Indique le facteur de protection contre les ultraviolets (UPF)
        de la toile du parasol, quantifiant son efficacité à bloquer les rayons UV
        nocifs.
    utensil_flexibility:
      name: Flexibilité de l’ustensile
      description: Indique le degré de rigidité ou de souplesse du corps de la spatule,
        influençant l’adaptation aux bols incurvés ou aux pâtes fermes.
    utensil_holder_features:
      name: Caractéristiques du porte-ustensiles
      description: Décrit les particularités fonctionnelles du support d’ustensiles
        de cuisine.
    utensil_tray_features:
      name: Caractéristiques du plateau à ustensiles
      description: Présente les caractéristiques distinctives qui améliorent la fonctionnalité
        du plateau.
    vacuum_hose_connection_type:
      name: Type de raccord du tuyau d’aspirateur
      description: Décrit le style de raccord situé aux extrémités du tuyau afin d’assurer
        un ajustement mécanique adapté.
    valance_style:
      name: Style de cantonnière
      description: Identifie le design décoratif de la cantonnière afin d’aider les
        acheteurs à choisir selon leur décoration.
    valet_organizer_features:
      name: Caractéristiques de l’organisateur de charge
      description: Présente les fonctionnalités organisationnelles intégrées au valet
        de charge.
    valve_configuration:
      name: Configuration de la vanne
      description: Définit le style fonctionnel de la vanne du tuyau d’arrosage, aidant
        les acheteurs à sélectionner le modèle adapté à leur installation.
    valve_stem_angle:
      name: Angle de la tige de la valve
      description: Précise l’orientation ou l’angle de la tige de la valve par rapport
        à la chambre à air, influant sur la facilité de gonflage et l’ajustement à
        la jante.
    vase_filler_type:
      name: Type de matériau de remplissage pour vase
      description: Classe le produit selon la nature spécifique du matériau ou de
        la forme.
    vent_pipe_type:
      name: Type de conduit de ventilation
      description: Classe le style de construction du conduit ou du tuyau d’évacuation.
    vent_style:
      name: Style de ventilation
      description: Classe la forme structurelle ou la fonction de l’élément de ventilation.
    waffle_style:
      name: Style de gaufre
      description: Identifie le motif produit par les plaques de cuisson.
    wallpaper_removal_type:
      name: Type de dépose du papier peint
      description: Indique la facilité de retrait lors de la rénovation.
    wallpaper_washability_rating:
      name: Indice de lavabilité du papier peint
      description: Indique comment nettoyer la surface du papier peint une fois posé.
    warmer_type:
      name: Type de dispositif de chauffe
      description: Précise le mécanisme de chauffe principal ou l’usage prévu du chauffe-bougie
        ou du chauffe-huile.
    warmth_level:
      name: Niveau de chaleur
      description: Classe l’intensité thermique globale ou l’adéquation saisonnière
        de la couette ou de la couverture.
    warmth_rating:
      name: Indice thermique
      description: Indique le niveau d’isolation d’une couverture, comparable aux
        indices TOG utilisés en literie.
    waste_container_lid_features:
      name: Caractéristiques du couvercle du conteneur à déchets
      description: Présente les fonctionnalités spécifiques ou les améliorations intégrées
        au couvercle.
    waste_container_sign_message:
      name: Signalétique du conteneur à déchets
      description: Précise le texte visible sur l’étiquette ou la signalétique du
        conteneur (avertissement ou instructions de tri).
    water_filtration_technology:
      name: Technologie de filtration de l’eau
      description: Décrit la technologie ou le mécanisme principal utilisé pour purifier
        l’eau.
    water_heater_element_connection_type:
      name: Type de raccordement de l’élément pour chauffe-eau
      description: Identifie le mode de fixation de l’élément, distinguant les versions
        à visser ou à bride.
    water_sensor_design:
      name: Conception du capteur d’eau
      description: Précise la forme ou le style de l’élément de détection d’eau.
    water_supply_type:
      name: Type d’alimentation en eau
      description: Indique si l’appareil fonctionne avec un réservoir manuel ou un
        raccordement au réseau.
    watering_needs:
      name: Besoins en arrosage
      description: Décrit les besoins typiques en eau de la plante.
    wax_paper_form:
      name: Format du papier ciré
      description: Précise si le papier ciré est proposé en rouleau ou en feuilles
        prédécoupées.
    weather_guard_mounting_method:
      name: Méthode de fixation du dispositif de protection contre les intempéries
      description: Précise la manière dont le dispositif se fixe à la mangeoire ou
        à la structure de support.
    wheel_bearing_type:
      name: Type de roulement de roue
      description: Identifie la construction interne du roulement ou de la bague de
        la roue, influant sur la fluidité de rotation et les exigences d’entretien.
    wheel_tread_style:
      name: Style de la bande de roulement de roue
      description: Précise le motif de la bande de roulement de roue, influant sur
        l’adhérence, le niveau sonore et les éventuelles marques au sol.
    whistling:
      name: Fonction sifflet
      description: Indique si la bouilloire émet un sifflement lorsque l’eau atteint
        le point d’ébullition.
    wick_material:
      name: Matériau de la mèche
      description: Identifie la composition de la mèche utilisée, par exemple, coton
        ou fibre de verre.
    window_film_installation_surface:
      name: Surface de pose du film pour fenêtre
      description: Précise si le film est conçu pour une application intérieure, extérieure
        ou les deux.
    window_film_type:
      name: Type de film pour fenêtre
      description: Classe le style fonctionnel du film, par exemple, occultation ou
        protection.
    window_rod_type:
      name: Type de tringle à rideaux
      description: Classe le style fonctionnel de la tringle.
    window_screen_type:
      name: Type de moustiquaire
      description: Définit le style structurel ou le mode de fonctionnement de la
        moustiquaire.
    window_treatment_lining_type:
      name: Type de doublure pour habillage de fenêtre
      description: Indique si la cantonnière ou le lambrequin est doublé et précise
        le type de doublure utilisé.
    wine_aerator_type:
      name: Type d’aérateur de vin
      description: Précise le format ou le mode de fonctionnement de l’aérateur à
        vin.
    wine_glass_style:
      name: Style de verre à vin
      description: Précise le type de vin ou le modèle de verre afin d’optimiser les
        arômes et les saveurs.
    wok_bottom_type:
      name: Type de fond du wok
      description: Indique la forme du fond du wok, déterminant sa compatibilité avec
        différents types de plaques de cuisson et supports pour wok.
    wood_grain_orientation:
      name: Sens du grain du bois
      description: Spécifie le sens du grain du bois dans le produit, par exemple,
        bois de bout, fil sur chant ou fil sur face. Ce sens a un impact sur la résistance
        et la compatibilité avec la découpe.
    wood_seasoning_method:
      name: Méthode de séchage du bois
      description: Indique comment le bois de chauffage a été séché ou conditionné,
        influençant son taux d’humidité et la qualité de sa combustion.
    wrap_format:
      name: Format du film alimentaire
      description: Précise la forme physique sous laquelle le film est fourni, par
        exemple en rouleaux ou en feuilles prédécoupées.
    abacus_bead_material:
      name: Matériau des perles de boulier
      description: Indique le matériau principal des perles de boulier.
    abec_rating:
      name: Indice ABEC
      description: Spécifie le niveau de précision des roulements selon les normes
        ABEC, indiquant la fluidité et les tolérances.
    abrasive_level:
      name: Niveau d’abrasivité
      description: Indique la force de correction d’un polish ou d’un produit abrasif
        sur les surfaces automobiles.
    absinthe_accessories_included:
      name: Accessoires inclus avec l’absinthe
      description: Détaille les accessoires fournis avec le produit, par exemple les
        cuillères, les verres ou les morceaux de sucre.
    ac_compressor_mounting_style:
      name: Type de fixation du compresseur de climatisation
      description: Décrit le type de montage mécanique, de fixation ou d’interface
        de support qui relie le compresseur au moteur ou au système d’entraînement
        des accessoires.
    ac_compressor_oil_type:
      name: Type d’huile pour compresseur de climatisation
      description: Indique la composition chimique de l’huile lubrifiante requise
        ou utilisée par le compresseur de climatisation, par exemple les huiles PAG
        et POE.
    accent_modes:
      name: Modes d’accentuation
      description: Spécifie la façon dont le métronome peut marquer certains temps
        dans une mesure (au-delà du clic standard).
    access_mechanism:
      name: Mécanisme d’accès
      description: Décrit comment l’utilisateur accède à l’espace de couchage en hauteur.
    accessibility_features:
      name: Fonctionnalités d’accessibilité
      description: Spécifie les dispositifs et aménagements facilitant l’accessibilité
        dans le minibus.
    accessories_included:
      name: Accessoires inclus
      description: Répertorie les articles complémentaires fournis avec le fauteuil,
        comme un repose-pieds ou un coussin lombaire, pour que les acheteurs perçoivent
        clairement la valeur ajoutée.
    accessory_pieces_included:
      name: Accessoires inclus
      description: Répertorie les accessoires inclus dans un coffret cadeau ou un
        lot d’accessoires vestimentaires composé de plusieurs pièces.
    acoustic_amplifier_feedback_control_features:
      name: Fonctionnalités anti-larsen de l’amplificateur acoustique
      description: Indique les outils anti-larsen intégrés pour instruments acoustiques
        (par ex. filtre coupe-bande, commutateur de phase, suppression automatique
        du larsen).
    acoustic_drum_kit_components_included:
      name: Composants inclus dans le kit de batterie acoustique
      description: Indique les principaux éléments inclus dans le kit, par exemple
        fûts seuls ou kit complet, avec cymbales et matériel.
    acoustic_guitar_body_shape:
      name: Forme du corps de la guitare acoustique
      description: Décrit la forme générale du corps de la guitare acoustique, qui
        a un impact sur le son, l’ergonomie et l’utilisation.
    acoustic_guitar_string_core_design:
      name: Conception du noyau des cordes de guitare acoustique
      description: La conception interne du noyau des cordes filées.
    acoustic_piano_key_material:
      name: Matériau des touches de piano acoustique
      description: Précise le matériau principal utilisé pour les revêtements des
        touches du piano.
    acoustic_piano_lid_type:
      name: Type de couvercle de piano acoustique
      description: Spécifie le type de mécanisme de couvercle utilisé sur le piano
        acoustique (pour distinguer le couvercle du clavier selon qu’il s’agisse d’un
        piano à queue ou d’un piano droit).
    acoustic_piano_plate_frame_material:
      name: Matériau du cadre ou de la plaque du piano acoustique
      description: Spécifie le matériau principal de la plaque/du cadre du piano (harpe),
        généralement en fonte.
    acoustic_piano_soundboard_material:
      name: Matériau de la table d’harmonie du piano acoustique
      description: Précise le matériau principal utilisé pour la table d’harmonie
        du piano.
    action_figure_scale:
      name: Échelle de la figurine articulée
      description: Indique le rapport d’échelle de collection, par exemple 1:12, auquel
        l’accessoire est destiné.
    action_type:
      name: Type d’action
      description: Décrit le mécanisme de tir ou d’armement de l’arme (par ex. à verrou,
        à bascule, à levier).
    actuation_mechanism:
      name: Mécanisme d’actionnement
      description: 'Indique la manière dont le levier actionne le système de freinage :
        câble mécanique, hydraulique pur, hydraulique à câble ou électronique/sans
        fil.'
    actuation_method:
      name: Méthode d’actionnement
      description: Mode d’activation ou de déclenchement du système d’extinction.
    adapter_orientation:
      name: Orientation de l’adaptateur
      description: Décrit l’angle ou la configuration d’un adaptateur de valve de
        vélo, impactant l’accessibilité de la pompe (par ex. droit, 90°).
    additive_application_stage:
      name: Phase d’application de l’additif
      description: Indique à quel moment du processus le produit doit être appliqué.
    adhesive_backing:
      name: Support adhésif
      description: Si la soie imprimable possède un support adhésif pour une application
        facile et rapide.
    adhesive_formulation:
      name: Composition de l’adhésif
      description: Précise la composition chimique ou la formulation de l’adhésif,
        par ex. cyanoacrylate ou résine époxy.
    adhesive_sides:
      name: Faces adhésives
      description: Indique si l’adhésif thermocollant est présent sur une seule face
        ou sur les deux faces du ruban/de la bande.
    adjunct_grain_processing_form:
      name: Forme de transformation des céréales d’appoint
      description: Indique le mode de traitement des céréales complémentaires vendues
        pour le brassage (par ex. en flocons, torréfiées, maltées, non transformées).
    adjustability_type:
      name: Type de réglage
      description: Indique le type de réglage pris en charge par la jambe de force,
        le cas échéant.
    adjustable_cup_mutes:
      name: Sourdines à bol réglable
      description: Indique si la sourdine bol est réglable ou amovible, ainsi que
        son type de réglage.
    adjustable_zones:
      name: Zones réglables
      description: Indique les parties de la base pouvant être réglées séparément.
    adjustment_type:
      name: Type de réglage
      description: Indique si le régulateur est réglable et précise le mode de réglage.
    administration_method:
      name: Mode d’administration
      description: Indique la manière dont le vermifuge est administré au cheval (par
        ex. par voie orale ou par injection), afin de respecter les recommandations
        vétérinaires et de faciliter l’application.
    advice_card_prompt_type:
      name: Type de message sur la carte conseil
      description: Type de consigne imprimée sur la carte, ou absence de consigne.
    aeration_method:
      name: Type d’aération
      description: Décrit le type d’aération du contenant, garantissant un niveau
        d’oxygène adéquat pour les appâts vivants.
    aero_package_components:
      name: Composants du pack aérodynamique
      description: Indique les principaux composants aérodynamiques installés sur
        le véhicule, avec sélection multiple possible.
    aerodynamic_elements_included:
      name: Éléments aérodynamiques inclus
      description: Précise les composants aérodynamiques présents sur la voiture de
        Formule 1 (sélection multiple possible, le cas échéant).
    aftertouch_support:
      name: Prise en charge de l’aftertouch
      description: Indique si le contrôleur prend en charge l’aftertouch (canal ou
        polyphonique) sur les touches/pads.
    agave_content_classification:
      name: Classification de la teneur en agave
      description: Indique si la tequila est élaborée à partir de 100  % d’agave bleu
        Weber ou d’un mélange contenant au moins 51 % de sucres d’agave.
    aida_cloth_count:
      name: Nombre de points de la toile Aïda
      description: Indique le nombre de carrés ou de points par pouce sur la toile
        Aïda, qui détermine la taille des points et l’échelle du motif.
    aida_cloth_pre_cut_format:
      name: Format de découpe de la toile Aïda
      description: 'Indique le format de vente de la toile Aïda : prédécoupé, en coupe
        au mètre ou en rouleau.'
    air_bag_material:
      name: Matériau du réservoir d’air
      description: Indique le matériau de la poche/du réservoir d’air utilisé(e) avec
        la cornemuse irlandaise.
    air_bed_internal_construction:
      name: Technologie interne du matelas gonflable
      description: Précise la technologie ou la structure interne du matelas gonflable
        contribuant au confort et à la stabilité.
    air_dry_clay_color_form:
      name: Type de couleur de l’argile autodurcissante
      description: 'Décrit le mode de présentation de la couleur de l’argile : précolorée,
        blanche/neutre ou en assortiment.'
    air_hockey_items_included:
      name: Accessoires de air hockey inclus
      description: Répertorie les accessoires spécifiques inclus dans un ensemble,
        afin que les clients sachent exactement ce qu’ils reçoivent (par ex. 2 poussoirs,
        4 palets, 2 coussinets en feutre).
    air_intake_temperature_sensor_mounting_style:
      name: Style de fixation du capteur de température d’air d’admission
      description: Style de fixation physique du capteur de température d’air d’admission
        dans le système d’admission.
    air_integration_capability:
      name: Compatibilité avec l’intégration d’air
      description: Indique si l’ordinateur de plongée prend en charge les transmetteurs
        de pression sans fil et de quelle manière.
    air_mattress_valve_type:
      name: Type de valve de matelas gonflable
      description: Précise le type de valve que l’accessoire reçoit ou intègre, afin
        de déterminer la compatibilité entre les pompes, les valves et les pièces
        de réparation.
    air_water_rocket_kit_items_included:
      name: Éléments inclus dans le kit de fusée à air et à eau
      description: Indique les principaux composants inclus avec le kit de fusée (lanceur,
        pompe, ailettes, pièces de rechange).
    air_water_rocket_launch_method:
      name: Système de lancement de la fusée à air et à eau
      description: Précise la méthode de mise sous pression et de lancement de la
        fusée (interaction utilisateur et type d’équipement).
    airbag_position:
      name: Emplacement de l’airbag
      description: Indique la position ou la zone de retenue prise en charge par le
        composant d’airbag.
    aircraft_ads_b_capability:
      name: Fonctionnalité ADS-B de l’aéronef
      description: Indique si l’aéronef est équipé pour être conforme à l’ADS-B Out.
    aircraft_airframe_material:
      name: Matériau de la structure de l’aéronef
      description: Matériau ou matériaux principaux utilisés dans la construction
        de la cellule de l’aéronef.
    aircraft_cabin_configuration:
      name: Aménagement de la cabine de l’aéronef
      description: Indique l’aménagement de la cabine de l’aéronef, par exemple espace
        de réunion, banquette ou cabine à quatre zones.
    aircraft_documentation_included:
      name: Documentation fournie pour l’avion
      description: Liste les documents inclus avec la pièce (par ex. 8130-3).
    aircraft_galley_configuration:
      name: Aménagement de l’office de bord de l’aéronef
      description: Décrit les équipements d’office ou de restauration présents dans
        la cabine.
    aircraft_installation_location:
      name: Emplacement d’installation sur l’avion
      description: Indique l’emplacement sur l’avion où la pièce ou l’accessoire est
        installé ou utilisé.
    aircraft_internet_connection:
      name: Connexion Internet de l’avion
      description: Indique la présence et le type de connexion Internet disponible
        en cabine.
    aircraft_landing_gear_type:
      name: Type de train d’atterrissage de l’avion
      description: Indique la configuration du train d’atterrissage de l’autogire.
    aircraft_lavatory_configuration:
      name: Aménagement des sanitaires de l’avion
      description: Précise l’aménagement des toilettes présentes à bord.
    aircraft_maintenance_program_enrollment:
      name: Inscription à un programme de maintenance aéronautique
      description: Indique si l'avion bénéficie d’un programme de maintenance pour
        le moteur et/ou la cellule, ainsi que le type de couverture concerné (moteur,
        cellule ou les deux).
    aircraft_operational_certification:
      name: Certification d’exploitation de l’avion
      description: Précise le cadre réglementaire ou opérationnel applicable à l’exploitation
        de l’aéronef (selon la juridiction, par ex. FAA Part 91/135/121, AOC EASA).
    aircraft_protective_gear_certification:
      name: Norme de certification des équipements de protection aéronautiques
      description: Indique la norme aéronautique, réglementaire ou industrielle à
        laquelle l’équipement de protection est certifié conforme.
    aircraft_system_application:
      name: Système aéronautique concerné
      description: Identifie le système ou la zone de l’aéronef auquel appartient
        la pièce/l’accessoire (utilisé pour la navigation et le filtrage parmi différentes
        pièces aéronautiques).
    airflow_resistance_level:
      name: Niveau de résistance au passage de l’air
      description: Indique la résistance ressentie avec la sourdine, en fonction de
        la contre-pression et du passage de l’air.
    airship_envelope_material:
      name: Matériau de la toile du dirigeable
      description: Matériau principal de l’enveloppe du dirigeable, c’est-à-dire de
        son revêtement extérieur.
    airsoft_part_type:
      name: Type de pièce d’airsoft
      description: Identifie le type de pièce ou d’accessoire destiné aux armes d’airsoft
        (par ex. chargeur, canon, garde-main).
    airworthiness_approval_basis:
      name: Type d’homologation de navigabilité
      description: Indique la base d’homologation ou de certification applicable à
        la pièce, le cas échéant, par exemple PMA, TSO ou STC.
    alarm_volume_adjustability:
      name: Réglage du volume de l’alarme
      description: Précise si l’utilisateur peut ajuster le niveau sonore de l’alarme
        et comment.
    alcohol_ink_finish_effect:
      name: Effet de finition de l’encre à alcool
      description: Décrit l’effet visuel ou la finition produite par la formulation
        de l’encre à alcool, par ex. un effet métallique ou nacré (indépendamment
        de la couleur).
    alignment_aid_style:
      name: Type d’aide à l’alignement
      description: Indique le type de guides d’alignement imprimés ou intégrés sur
        la surface du tapis (par ex. lignes droites, repères de distance).
    alternator_cooling_type:
      name: Type de refroidissement de l’alternateur
      description: Décrit le mode de refroidissement et de ventilation de l’alternateur.
    alternator_marine_ignition_protection_rating:
      name: Indice de protection des alternateurs marins contre l’inflammation
      description: Indique si l’alternateur bénéficie d’une protection contre l’inflammation
        pour compartiments moteurs marins (par ex. conforme SAE J1171 / ISO 8846).
    alternator_mounting_configuration:
      name: Type de fixation de l’alternateur
      description: Indique le type de fixation utilisé pour fixer l’alternateur au
        support moteur.
    alternator_pulley_type:
      name: Type de poulie de l’alternateur
      description: Décrit le type de poulie ou de dispositif d’embrayage monté sur
        l’alternateur, ou précise qu’aucune poulie n’est incluse.
    alternator_regulator_type:
      name: Type de régulateur d’alternateur
      description: Indique si le régulateur de tension est intégré à l’alternateur
        ou externe, et s’il est contrôlé par le système OEM/PCM.
    alternator_terminal_connection_type:
      name: Type de raccordement des bornes de l’alternateur
      description: Type principal de raccordement électrique des bornes de sortie
        et d’excitation de l’alternateur, pour faciliter la vérification de la compatibilité
        avec le faisceau électrique.
    altitude_suitability:
      name: Utilisation selon l’altitude
      description: Précise si le ballon est adapté à des conditions d’altitude particulières
        ayant un impact sur la vitesse et le rebond.
    ambulance_stretcher_mount_type:
      name: Type de fixation du brancard d’ambulance
      description: Décrit le type de dispositif de fixation ou de chargement de brancard
        utilisé dans l’ambulance.
    american_football_safety_certification:
      name: Certification de sécurité pour le football américain
      description: Décrit les certifications de sécurité dédiées au football américain
        auxquelles le produit répond.
    amplifier_tube_function:
      name: Fonction du tube d’amplificateur
      description: Indique le rôle fonctionnel du tube dans le circuit de l’amplificateur
        d’instrument (par ex. préamplification ou puissance).
    analog_synthesizer_cv_gate_i_o:
      name: Entrées/sorties CV/Gate pour synthétiseur analogique
      description: Indique les types de connexions CV et Gate prises en charge pour
        l’intégration à du matériel modulaire ou analogique.
    analog_synthesizer_keybed_configuration:
      name: Configuration du clavier du synthétiseur analogique
      description: Indique si le synthétiseur comprend un clavier intégré et, le cas
        échéant, le nombre de touches.
    anchor_configuration:
      name: Configuration d’ancrage
      description: Précise si le système de suspension repose sur un point d’ancrage
        unique ou sur plusieurs points indépendants, influençant la variété des exercices
        et la complexité d’installation.
    animal_raising_method:
      name: Mode d’élevage des animaux
      description: Décrit les pratiques d’élevage ou d’agriculture utilisées pour
        l’animal concerné.
    animal_species:
      name: Espèces animales
      description: Précise l’espèce animale représentée par le jouet en peluche (par
        ex. ours, lapin, dinosaure).
    animal_trap_jaw_style:
      name: Configuration des mâchoires du piège à animaux
      description: Configuration des mâchoires du piège, avec une incidence sur l’efficacité
        de maintien et le bien-être de l’animal.
    animal_trap_type:
      name: Type de piège à animaux
      description: Classe les pièges selon leur conception mécanique, afin d’aider
        les acheteurs à trouver le mode de capture adapté à leurs besoins ou autorisé
        par la réglementation applicable.
    ankle_collar_style:
      name: Style de maintien de la cheville
      description: Précise le type de finition de la chaussure au niveau de la cheville
        (basse, mi-haute, haute, type chaussette ou sans lacets), influençant le maintien
        et l’esthétique.
    ankle_guard_protection_level:
      name: Niveau de protection de la chevillère
      description: Évalue le niveau global de protection contre les chocs fourni par
        la chevillère.
    ankle_strap_padding_type:
      name: Type de rembourrage de la sangle de cheville
      description: Décrit le matériau ou la conception du rembourrage à l’intérieur
        de la sangle, avec une incidence sur le confort.
    ankle_strap_type:
      name: Type de sangle de cheville
      description: Précise la nature du rembourrage utilisé dans la sangle de cheville
        pour améliorer le confort.
    ant_farm_habitat_medium_type:
      name: Type de substrat de la ferme à fourmis
      description: Précise le substrat principal utilisé pour les tunnels et l’observation
        dans la ferme à fourmis.
    ant_farm_kit_contents:
      name: Contenu du kit de la ferme à fourmis
      description: Indique les composants inclus dans le kit de fourmilière, par exemple
        le contenant pour l’habitat, le sable ou le gel, le bon d’obtention de fourmis
        et les accessoires d’alimentation.
    ant_farm_lighting_type:
      name: Type d’éclairage de la ferme à fourmis
      description: Indique le type d’éclairage intégré (le cas échéant) utilisé pour
        observer la ferme à fourmis.
    antenna_fit_type:
      name: Type de montage de l’antenne
      description: Format d’antenne compatible avec la boule d’antenne.
    anti_caking_agent:
      name: Agent anti-agglomérant
      description: Indique le type d’agent anti-agglomérant ajouté pour éviter la
        formation de grumeaux, information importante pour les allergies et la précision
        des recettes.
    anti_g_suit_bladder_material:
      name: Matériau des poches gonflables de la combinaison anti-G
      description: Matériau des poches gonflables internes de la combinaison anti-G ;
        sélectionner tous les matériaux applicables si plusieurs matériaux sont utilisés.
    anti_g_suit_connector_type:
      name: Type de connecteur de la combinaison anti-G
      description: Indique le type ou la norme du connecteur de flexible d’air ou
        de pression utilisé pour le raccordement à l’aéronef ou au régulateur.
    anti_g_suit_inflation_method:
      name: Mode de gonflage de la combinaison anti-G
      description: Indique le mode de mise sous pression des poches gonflables de
        la combinaison pour assurer la protection contre les forces G.
    anti_g_suit_size_system:
      name: Système de taille de la combinaison anti-G
      description: Indique la norme de taille utilisée pour définir le système d’ajustement
        de la combinaison.
    anti_reverse_type:
      name: Type de mécanisme anti-retour
      description: Indique le type de mécanisme anti-retour utilisé, qui influence
        le ferrage et le jeu arrière.
    anti_theft_feature:
      name: Fonction antivol
      description: Précise si le support intègre des dispositifs antivol tels que
        des fixations verrouillables ou une conception inviolable.
    antique_gun_ignition_system:
      name: Système de mise à feu d’arme ancienne
      description: Indique le système historique de mise à feu utilisé par l’arme
        à feu ancienne.
    apple_variety:
      name: Variété de pommes
      description: Indique le cultivar ou la variété de pomme, par exemple Gala, Fuji
        ou Granny Smith, pour faciliter le choix selon le goût, la texture et l’usage
        culinaire recherchés.
    applique_edge_finish:
      name: Finition des bords de l’appliqué
      description: Décrit la finition des bords, qui influence l’esthétique et la
        résistance à l’effilochage.
    arbor_type:
      name: Type d’arbor
      description: Classe le moulinet selon la conception du moyeu de bobine, qui
        détermine la vitesse de récupération de la ligne, la capacité de backing et
        la mémoire de ligne.
    archery_accessory_type:
      name: Type d’accessoire pour le tir à l’arc
      description: Décrit le type d’accessoire pour le tir à l’arc afin d’aider les
        acheteurs à filtrer rapidement les produits.
    archery_part_type:
      name: Type de pièce de tir à l’arc
      description: Identifie la pièce ou le composant de remplacement vendu (par ex.
        poignée, branche, corde d’arc), afin de permettre un filtrage précis sans
        multiplier les catégories.
    archery_range_accessory_type:
      name: Type d’accessoire pour stand de tir à l’arc
      description: Indique la catégorie précise d’accessoire destiné au stand de tir
        à l’arc afin de faciliter la recherche du produit adapté.
    archery_target_features:
      name: Caractéristiques des cibles de tir à l’arc
      description: Répertorie les caractéristiques particulières de performance ou
        de praticité qui ne relèvent d’aucun autre attribut, par exemple la mousse
        autoréparante ou la poignée de transport.
    archery_tool_type:
      name: Type d’outil pour le tir à l’arc
      description: Classe le type d’outil ou d’équipement de tir à l’arc.
    armband_features:
      name: Caractéristiques du brassard
      description: Répertorie les caractéristiques fonctionnelles ou visuelles particulières
        qui améliorent le brassard.
    armguard_style:
      name: Style de protège-bras
      description: Définit le style de construction ou le format du protège-bras,
        en précisant l’étendue de protection et l’aspect traditionnel ou moderne du
        modèle.
    armor_protection_type:
      name: Type de protection du blindage
      description: Type de protection assuré par le système de blindage du véhicule.
    armrest_adjustability:
      name: Réglage des accoudoirs
      description: Définit les possibilités de réglage et la configuration des accoudoirs
        de la chaise (par ex. fixes, 2D, 3D, relevables).
    armrest_type:
      name: Type d'accoudoir
      description: Décrit la présence et la possibilité de réglage des accoudoirs
        de la chaise (par exemple, sans accoudoirs, fixes, réglables, amovibles).
    arrow_bolt_point_type:
      name: Type d’embout de flèche/trait
      description: Définit le style de pointe ou d’embout installé sur une flèche
        ou un carreau.
    arrow_component_type:
      name: Type de composant de flèche
      description: Classe la pièce ou l’accessoire spécifique pour une flèche (insert,
        wrap, busher, colle, etc.) afin de permettre un filtrage précis sans multiplier
        les sous-catégories.
    arrow_containment_level:
      name: Niveau de retenue de la flèche
      description: Indique si le repose-flèche enveloppe entièrement, partiellement
        ou pas la flèche.
    arrow_fletching_orientation:
      name: Orientation de l’empennage de flèche
      description: Indique l’orientation des plumes/vanes (par ex. gauche, droite,
        hélicoïdal) déterminant la rotation de la flèche.
    arrow_nock_groove_size:
      name: Taille de la rainure d’encoche de flèche
      description: Indique la classe de taille de la gorge de corde de l’encoche,
        qui détermine la compatibilité avec différents diamètres de corde d’arc.
    arrow_nock_type:
      name: Type d’encoche de flèche
      description: Indique le design de l’encoche de flèche en contact avec la corde.
    arrow_rest_style:
      name: Style de repose-flèche
      description: Indique le style ou mécanisme du repose-flèche (drop-away, lame,
        whisker biscuit). Le style détermine la manière dont le repose-flèche soutient,
        maintient et libère la flèche et constitue un critère principal de différenciation
        produit pour les acheteurs.
    arrow_shaft_compatibility:
      name: Compatibilité des fûts de flèche
      description: Décrit la compatibilité de l’encoche lumineuse avec les standards
        de tube/bushing de flèche (par ex. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Style de pointe d’outil d’art ou de loisirs créatifs
      description: Décrit la forme/profil de la pointe active (par ex. pointue ou
        arrondie) afin d’indiquer le type de marquage en relief produit.
    art_ink_lightfastness_rating:
      name: Indice de résistance à la lumière des encres artistiques
      description: Indique la résistance de l’encre à la décoloration à la lumière,
        généralement exprimée selon des normes.
    art_ink_opacity:
      name: Opacité de l’encre artistique
      description: Précise le pouvoir couvrant de l’encre après application.
    art_security_rating:
      name: Niveau de sécurité ART
      description: Indique la note ART néerlandaise, exprimée en étoiles de 1 à 5,
        attribuée à l’antivol.
    artichoke_cut:
      name: Coupe de l’artichaut
      description: Précise la portion ou la coupe de l’artichaut (par ex. entier,
        cœur, fond), pour faciliter le choix selon l’usage culinaire.
    artichoke_variety:
      name: Variété d’artichaut
      description: Indique le cultivar ou la variété botanique de l’artichaut pour
        distinguer les tailles, les couleurs, les saveurs et les usages culinaires.
    articulation_features:
      name: Fonctionnalités d’articulation
      description: Indique si le modèle de dinosaure possède des parties mobiles (mâchoire,
        membres, queue articulés) et sa mobilité générale.
    artificial_bait_form:
      name: Forme d'appât artificiel
      description: Indique la forme physique ou le mode de présentation de l’appât
        ou du leurre de pêche.
    asa_mounting_type:
      name: Type de montage ASA
      description: Indique le type d’interface ou de standard de montage ASA (Air
        Source Adapter) utilisé par le drop forward (par ex. queue d’aronde, rail,
        montage direct).
    ascender_descender_type:
      name: Type d’aspiration/suralimentation
      description: Classe le type de bloqueur ou de descendeur d’escalade pour un
        filtrage plus précis.
    aspiration_type:
      name: Type d'aspiration
      description: Précise le mode d’aspiration ou de suralimentation du moteur.
    assembly_state:
      name: Niveau d’assemblage
      description: Indique si le meuble est livré à monter, préassemblé ou sous une
        autre forme.
    assistance_mechanism:
      name: Mécanisme d’assistance
      description: Précise le mécanisme d’assistance ou de résistance intégré à la
        barre de traction pour les exercices (tractions, dips, etc.).
    atemoya_cultivar:
      name: Cultivar d’atemoya
      description: Indique le cultivar ou la variété de l’atemoya, pour orienter le
        choix selon le goût, la taille ou les caractéristiques des graines.
    athletic_cup_size:
      name: Taille de la coquille de protection sportive
      description: Indique la taille définie par le fabricant pour la coquille de
        protection, afin d’assurer un bon maintien pour l’athlète.
    attachment_position:
      name: Position de fixation
      description: Indique l’emplacement de fixation prévu du sac, au niveau de la
        selle ou du cavalier.
    attractant_scent_profile:
      name: Profil olfactif de l’attractif
      description: Indique l’odeur ou le parfum utilisé pour attirer la faune ou dissimuler
        l’odeur humaine.
    atv_utv_intended_use:
      name: Usage prévu du VTT/UTV
      description: Indique l’usage principal ou le type d’utilisation du VTT/UTV.
    audio_channel_configuration:
      name: Configuration des canaux audio
      description: Indique le nombre de canaux audio distincts pris en charge par
        l’égaliseur/DSP (par ex. stéréo 2 canaux, 4 canaux avant/arrière, 6 canaux).
    audio_inputs:
      name: Entrées audio
      description: Indique les types d’entrées audio disponibles pour l’échantillonnage/l’enregistrement
        (par ex. 1/4 ligne, XLR, 3,5 mm, préampli micro, phono).
    audio_output:
      name: Sortie audio
      description: Indique si le jouet produit du son et comment le son est diffusé.
    audio_outputs:
      name: Sorties audio
      description: Indique les sorties audio (principales et auxiliaires) disponibles.
    audio_playback_source:
      name: Source de lecture audio
      description: Décrit les supports audio compatibles pour la lecture de musique
        sur le système karaoké.
    autograph_authentication:
      name: Authentification des autographes
      description: Précise le type ou le niveau d’authentification d’un autographe
        présent sur la carte.
    autograph_format:
      name: Format de l’autographe
      description: Indique si la signature est une signature autographe originale,
        un fac-similé tamponné ou imprimé, ou une inscription ou un ajout.
    autogyro_cockpit_enclosure:
      name: Enceinte de cockpit d’autogire
      description: Indique si le cockpit est ouvert ou fermé.
    available_firing_modes:
      name: Modes de tir disponibles
      description: Répertorie les modes de tir que le marqueur permet de sélectionner
        d’origine.
    avocado_variety:
      name: Variété d’avocat
      description: Indique le cultivar ou la variété d’avocat, pour aider à distinguer
        ses caractéristiques (goût, texture, taille, teneur en huile).
    award_customization_included:
      name: Options de personnalisation incluses avec le trophée
      description: Décrit les personnalisations incluses avec le trophée lors de l’achat.
    award_material:
      name: Matériau du trophée
      description: Identifie le ou les principaux matériaux de l’article de récompense
        (trophée, plaque, médaille, pin’s, ruban).
    award_mounting_display_type:
      name: Type de montage ou de présentation du trophée
      description: Indique comment le trophée est destiné à être exposé ou fixé (mur,
        bureau, à porter).
    award_plaque_plate_material:
      name: Matériau de la plaque de trophée
      description: Décrit le matériau de la plaque de gravure fixée sur le trophée,
        distincte du support principal.
    award_ribbon_attachment_type:
      name: Type de fixation du ruban de récompense
      description: Précise le mode de fixation ou de port du ruban.
    award_ribbon_imprint_method:
      name: Méthode d’impression du ruban de récompense
      description: Décrit la méthode d’application du texte ou des graphismes sur
        le ruban.
    award_ribbon_material:
      name: Matière du ruban de récompense
      description: Matière principale du ruban textile, par exemple le satin ou le
        polyester.
    award_ribbon_placement_title:
      name: Emplacement ou titre du ruban de récompense
      description: Le classement ou le titre indiqué par le ruban (par ex. 1re place,
        participant).
    axle_compatibility:
      name: Compatibilité des axes
      description: Indique le standard d’axe accepté par la roue, pour assurer la
        compatibilité avec le cadre et la fourche du vélo.
    back_beam_type:
      name: Type de support dorsal
      description: Type de traverse arrière et possibilités de réglage, par exemple
        simple ou réglable en hauteur.
    back_design:
      name: Design du dos
      description: Précise les caractéristiques de conception du dos des vêtements
        ayant un impact sur l’esthétique et le soutien.
    back_panel_type:
      name: Type de panneau arrière
      description: Indique le style ou le matériau du panneau arrière du meuble, influençant
        la présentation et l’esthétique de l’ensemble.
    back_sides_material:
      name: Matériau du dos et des éclisses
      description: Indique le matériau utilisé pour le dos et les éclisses du corps
        de la guitare classique.
    backing_type:
      name: Type de support
      description: Décrit le type de dos ou de fixation de la pièce en strass vendue,
        pour les produits autocollants.
    backup_camera_mounting_location:
      name: Position de montage de la caméra de recul
      description: Décrit l’emplacement destiné au montage de la caméra de recul sur
        le véhicule.
    backup_camera_video_interface:
      name: Interface vidéo de la caméra de recul
      description: Indique la sortie vidéo, l’interface ou le connecteur utilisé par
        la caméra de recul pour se connecter à un écran, un DVR ou un autoradio (par
        ex .RCA, LVDS, Ethernet IP).
    badminton_set_components_included:
      name: Composants inclus dans le kit de badminton
      description: Indique les éléments inclus dans le kit de badminton.
    bag_attachment_method:
      name: Méthode de fixation d'un sac
      description: Indique la méthode principale utilisée pour fixer la poche ou le
        support d’hydratation à d’autres équipements (par ex. système MOLLE, passant,
        mousqueton).
    bag_case_carrying_style:
      name: Style de port du sac ou de la housse
      description: Indique le mode de port principal du sac ou de l’étui, c’est-à-dire
        la manière dont il est conçu pour être transporté.
    bag_cover_material:
      name: Matériau de la housse
      description: Indique la matière de l’enveloppe extérieure du sac, dont dépendent
        la durabilité, la prise en main et l’aspect.
    bag_embellishment:
      name: Ornement de sac
      description: Décrit les principaux éléments décoratifs appliqués à l’extérieur
        du sac, par exemple les pompons, les clous ou le matelassage.
    bag_fill_medium:
      name: Substance de remplissage du sac
      description: Identifie la substance utilisée pour remplir ou mettre sous pression
        le sac (par ex. air, eau, sable).
    bag_material:
      name: Matériau du sac
      description: Matériau du sac gonflable/de la poche d’air.
    bag_padding_level:
      name: Niveau de rembourrage du sac
      description: Indique le niveau ou le type de rembourrage intégré au sac ou à
        la housse.
    bag_size_descriptor:
      name: Indicateur de taille du sac
      description: Classe de taille commerciale du sac seau, par exemple mini ou grand,
        en complément des dimensions exactes.
    bagel_size:
      name: Taille du bagel
      description: Précise le format du bagel, par ex. mini, fin, standard, grand,
        très grand ou géant.
    bagpipe_accessories_included:
      name: Accessoires pour cornemuse inclus
      description: Liste les principaux composants et accessoires fournis avec la
        cornemuse (en plus de l’instrument), par ex. étui, chanter d’entraînement,
        housse, cordons, système de contrôle de l’humidité.
    bagpipes_playing_mode:
      name: Mode de jeu de la cornemuse
      description: Indique la manière dont l’instrument est alimenté en air pendant
        le jeu.
    bait_compatibility:
      name: Compatibilité des appâts
      description: Répertorie les types d’appâts compatibles avec l’accessoire pour
        pellets, afin que les pêcheurs puissent vérifier l’adéquation avec leur appât
        de prédilection.
    bait_species:
      name: Espèces d’appât
      description: Indique le principal organisme proposé comme appât, afin que les
        pêcheurs puissent vérifier sa conformité réglementaire et son efficacité selon
        l’espèce ciblée.
    baking_chip_form:
      name: Format des pépites de cuisson
      description: Décrit la taille ou la forme des pépites de cuisson, dont dépendent
        leur comportement à la fonte et l’aspect de la recette.
    balance_board_style:
      name: Type de planche d’équilibre
      description: Indique le type de planche d’équilibre selon sa construction ou
        son mécanisme, afin d’indiquer son mode de mouvement et le niveau de difficulté
        d’entraînement.
    balance_cushion_accessories_included:
      name: Accessoires inclus avec le coussin d’équilibre
      description: Répertorie les accessoires fournis avec le coussin, pour permettre
        aux acheteurs de comparer la valeur des ensembles proposés.
    balance_type:
      name: Type d’équilibre
      description: Décrit l’état d’équilibrage de l’arbre de transmission tel que
        fourni (par ex. équilibré en usine, équilibré haute vitesse, non équilibré).
    ball_bladder_material:
      name: Matériau de la vessie du ballon
      description: Indique le matériau de la vessie interne du ballon de handball,
        avec une incidence sur la rétention d’air, le rebond et la durabilité globale.
    ball_certification:
      name: Certification du ballon
      description: Indique les certifications ou homologations officielles de performance
        obtenues par le ballon.
    ball_construction:
      name: Fabrication de balles
      description: Indique la méthode de fabrication utilisée pour assembler les panneaux
        du ballon, dont dépendent la durabilité, le toucher, l’absorption d’eau et
        le prix.
    ball_core_construction:
      name: Construction à noyau sphérique
      description: Décrit la structure interne du ballon et son effet sur le rebond
        et les sensations de jeu.
    ball_core_type:
      name: Type à noyau sphérique
      description: Indique la construction interne du ballon, influençant le rebond
        et la répartition du poids.
    ball_cup_game_included_pieces:
      name: Contenu du jeu de bilboquet
      description: Indique les composants fournis avec le jeu de bilboquet.
    ball_drilling_state:
      name: État de perçage de la boule
      description: Indique si des trous pour les doigts sont percés dans la boule
        et, le cas échéant, dans quelle mesure.
    ball_holder_type:
      name: Type de support de balle
      description: Indique le style de construction ou le format du support de balle.
    ball_pit_ball_surface_finish:
      name: Finition de surface des balles de la piscine à balles
      description: Décrit la finition tactile et visuelle de la surface du ballon,
        dont dépendent l’adhérence, les sensations de jeu et la facilité de nettoyage.
    ball_pit_safety_features:
      name: Dispositifs de sécurité de la piscine à balles
      description: Caractéristiques de conception liées à la sécurité des piscines
        à balles.
    ball_pump_accessory_type:
      name: Type d’accessoire pour pompe à ballon
      description: Définit le type d’accessoire pour pompe à ballon, afin que les
        marchands puissent classer les manomètres, les tuyaux, les lubrifiants et
        les autres accessoires dans une même catégorie parent.
    ball_return_mechanism:
      name: Mécanisme de retour de la balle
      description: Décrit le dispositif de retour de balle intégré au tapis, le cas
        échéant.
    ball_return_type:
      name: Type de retour de balle
      description: Système de récupération des balles (poche ou dispositif de retour)
        utilisé pendant le jeu.
    ball_speed_rating:
      name: Indice de vitesse du ballon
      description: Catégorie de vitesse définie par le fabricant, qui indique la rapidité
        de jeu de la balle dans des conditions standard.
    ball_surface_texture:
      name: Texture de la surface de la balle
      description: Décrit la texture extérieure ou le motif strié des balles, pouvant
        influencer l’adhérence et l’esthétique.
    ball_surface_type:
      name: Type de surface de la balle
      description: Décrit la finition extérieure ou le rembourrage du ballon, influençant
        la sensation à l’impact et l’adhérence.
    ballonet_configuration:
      name: Configuration en ballonnet
      description: Type ou configuration du système de ballonnets utilisé pour le
        contrôle de l’équilibre et de la pression (pour dirigeables non rigides ou
        semi-rigides).
    balloon_closure_valve_type:
      name: Type de fermeture ou de valve du ballon
      description: Décrit le système de fermeture ou de valve utilisé pour sceller
        le ballon après gonflage.
    balloon_kit_finish:
      name: Finition des ballons du kit
      description: Décrit la finition de surface ou l’aspect visuel des ballons inclus
        dans le kit.
    balloon_kit_material:
      name: Matériau du kit de ballons
      description: Indique le matériau principal des ballons inclus dans le kit.
    banana_variety:
      name: Variété de banane
      description: Précise la variété ou le type de banane proposé.
    banjo_head_type:
      name: Type de peau de banjo
      description: Type ou matériau de la peau de banjo, avec une incidence sur la
        brillance, le volume et le toucher.
    banjo_neck_material:
      name: Matériau du manche du banjo
      description: Matériau du manche, déterminant pour la sensation de jeu, la stabilité
        et la sonorité.
    banjo_pickup_configuration:
      name: Configuration des micros de banjo
      description: Indique si le banjo est équipé d’un micro intégré et la technologie
        de captation utilisée.
    banjo_rim_material:
      name: Matériau du cerclage de banjo
      description: Indique le matériau du cerclage (ou pot) du banjo, qui influence
        fortement le son et le poids.
    banjo_tone_ring_type:
      name: Type de tone ring du banjo
      description: Précise la conception ou la famille de matériaux du tone ring de
        banjo, déterminante pour le timbre et le volume.
    banjo_tuning_machine_type:
      name: Type de mécaniques d’accordage du banjo
      description: Indique le type de mécaniques d’accordage utilisées sur le banjo.
    banknote_authentication_grading:
      name: Authentification et classement des billets
      description: Service tiers, le cas échéant, qui a authentifié ou gradé le billet
        de banque.
    banknote_grade:
      name: Grade du billet de banque
      description: Grade normalisé du billet de banque selon une échelle de collection
        spécialisée.
    banknote_holder_type:
      name: Type d’étui pour billet de banque
      description: Indique la présentation matérielle du billet de banque, par exemple
        libre ou placé dans un étui certifié.
    banknote_material:
      name: Matériau du billet de banque
      description: Matériau principal du billet de banque.
    banknote_security_features:
      name: Éléments de sécurité des billets de banque
      description: Dispositifs de sécurité ou éléments de conception notables présents
        sur le billet de banque.
    banknote_serial_number_type:
      name: Type de numéro de série du billet de banque
      description: Précise si le billet comporte un numéro de série et s’il présente
        un intérêt particulier pour les collectionneurs.
    banner_display_location:
      name: Emplacement d’affichage de la bannière
      description: Indique l’emplacement prévu de la bannière, par exemple une porte,
        un mur ou un fond de table.
    banner_hanging_hardware_type:
      name: Type de matériel de suspension de la bannière
      description: Indique le principal matériel de suspension ou de fixation intégré
        à la bannière ou fourni avec celle-ci, par exemple les œillets, le fourreau
        pour mât ou la corde.
    banner_message_type:
      name: Type de message de la bannière
      description: Indique si le texte ou le message de la bannière est préimprimé,
        fixe, vierge ou personnalisable.
    banner_shape:
      name: Forme de la bannière
      description: Indique la forme générale ou la découpe de la banderole de supporters.
    banquette_configuration:
      name: Configuration de la banquette
      description: Précise la configuration ou l’orientation de la banquette.
    bar_coating:
      name: Enrobage de barres
      description: Indique l’enrobage alimentaire extérieur de la barre, s’il y en
        a un.
    bar_pad_style:
      name: Style de protection de guidon
      description: Précise le design du rembourrage de guidon et de sa housse.
    bar_texture:
      name: Texture de la barre
      description: Décrit la texture générale ou la sensation en bouche de la barre.
    barb_type:
      name: Type de barbillon
      description: Indique si l’hameçon comporte un ardillon et précise son type.
    barbell_finish:
      name: Finition de l'haltère
      description: Décrit le traitement ou revêtement de surface appliqué à la barre
        et/ou aux manchons, ayant un impact sur la résistance à la corrosion, la prise
        en main et le coût.
    barbell_knurling_pattern:
      name: Motif de moletage de la barre d’haltères
      description: Décrit le style et l’intensité du moletage de la zone de prise
        de la barre de musculation, y compris les repères spécifiques pour le powerlifting
        ou l’haltérophilie.
    barista_suitability:
      name: Adaptation à un usage de barista
      description: Indique si le produit est formulé pour la préparation du café et
        la réalisation de mousse de lait.
    barre_rail_configuration:
      name: Configuration des barres de ballet
      description: Indique le nombre de barres horizontales fournies avec la barre
        de ballet.
    barrel_or_cask_type:
      name: Type de fût ou de tonneau
      description: Spécifie le type de fût utilisé pour le vieillissement ou la finition
        de la tequila, par exemple chêne américain, fût ayant contenu du bourbon ou
        fût de sherry.
    barrel_profile:
      name: Profil du fût
      description: Décrit la forme générale ou l’équilibre du corps de la fléchette.
    barrel_thread_standard:
      name: Type de filetage du canon
      description: Indique le filetage du canon utilisé sur le marqueur pour assurer
        la compatibilité avec les canons de rechange.
    base_anchoring_method:
      name: Système de fixation de la base
      description: Indique comment la base est fixée au sol, afin d’évaluer sa compatibilité
        avec différents types de surfaces et conditions de jeu.
    base_ballast_method:
      name: Méthode de lestage de la base
      description: Indique comment la base de l’équipement d’entraînement est lestée
        pour assurer sa stabilité (par ex. remplissage d’eau ou de sable).
    base_configuration:
      name: Configuration de base
      description: Indique la configuration structurelle de la base du panneau.
    base_fill_material:
      name: Matériau de remplissage de la base
      description: Indique la substance utilisée pour remplir ou lester la base du
        mannequin de basket, ce qui influence la stabilité et son installation.
    base_ingredient:
      name: Ingrédient de base
      description: Identifie la matière première agricole à partir de laquelle le
        shochu ou le soju est distillé.
    base_oil_type:
      name: Type d’huile de base
      description: Précise la formulation de l’huile de base du fluide de transmission,
        par exemple entièrement synthétique, semi-synthétique ou conventionnelle.
    base_storage_type:
      name: Type de stockage de base
      description: Indique si la base comprend un rangement intégré et précise le
        mécanisme utilisé.
    baseball_glove_type:
      name: Type de gant de baseball
      description: Indique la catégorie du gant ou de la mitaine de baseball selon
        la position du joueur ou de l’usage prévu.
    baseball_softball_league_certification:
      name: Certification des ligues de baseball et de softball
      description: Indique l’organisme de gouvernance ou les normes de ligue auxquelles
        le produit est conforme.
    baseball_softball_usage_role:
      name: Position de jeu en baseball/softball
      description: Précise la position ou la fonction du joueur de baseball/softball
        pour laquelle la protection de jambe est conçue (receveur, batteur, arbitre
        ou joueur de champ).
    baseball_toy_set_components_included:
      name: Composants de coffret de jouets de baseball inclus
      description: Indique les éléments de jeu de baseball inclus dans le produit,
        par exemple la batte, la balle, le tee ou les bases.
    baseplate_construction:
      name: Construction de la plaque de base
      description: Indique la méthode de fabrication de la plaque de base du camion,
        qui influence la solidité et le poids.
    basketball_hoop_accessory_type:
      name: Type d’accessoire pour panier de basket-ball
      description: Précise la catégorie d’accessoire ou de composant de panier de
        basket afin de faciliter le filtrage et la comparaison.
    basketball_padding_location:
      name: Zone de protection du système de basket
      description: Précise la zone du système de basket que le pad est conçu pour
        protéger.
    basketball_rim_type:
      name: Type d’arceau de basket-ball
      description: Indique le type d’arceau de basket-ball, selon sa conception et
        ses caractéristiques de jeu, afin d’aider les acheteurs à choisir le modèle
        adapté à leur niveau et à leurs besoins d’installation.
    basketball_toy_features:
      name: Caractéristiques du jouet de basket-ball
      description: Indique les principales fonctions et caractéristiques ludiques
        des jouets de basket, au-delà des dimensions de base.
    bass_clarinet_body_material:
      name: Matériau du corps de la clarinette basse
      description: Matériau principal du corps de la clarinette basse, hors clés,
        supports et autres éléments métalliques.
    bass_clarinet_lowest_written_note:
      name: Note écrite la plus grave de la clarinette basse
      description: Note la plus grave que peut produire la clarinette basse (souvent
        décrite comme un mi♭, ré, do ou si grave).
    bass_drum_beater_head_shape:
      name: Profil de la tête de batteur de la grosse caisse
      description: Décrit la forme géométrique ou le profil de la surface de frappe
        de la batte de grosse caisse, c’est-à-dire la face en contact avec la peau.
    bass_drum_beater_shaft_material:
      name: Matériau de la tige du batteur de grosse caisse
      description: Précise la matière de la tige/l’axe du batteur de grosse caisse,
        hors tête de frappe.
    bass_drum_head_built_in_muffling:
      name: Peau de grosse caisse avec système d’atténuation intégré
      description: Type d’amortissement ou d’atténuation intégré à la conception de
        la peau.
    bass_drum_head_configuration:
      name: Configuration des peaux de la grosse caisse
      description: Indique les peaux montées ou incluses sur la grosse caisse lors
        de l’achat.
    bass_drum_head_surface_finish:
      name: Finition de surface de la peau de la grosse caisse
      description: Décrit la texture ou la finition de surface de la peau de grosse
        caisse.
    bass_drum_head_type:
      name: Type de peau de grosse caisse
      description: Type de conception ou construction particulière de la peau de grosse
        caisse.
    bass_drum_hoop_material:
      name: Matériau du cerclage de la grosse caisse
      description: Précise la matière des cerclages de la grosse caisse, celle-ci
        influençant la durabilité, l’esthétique et le poids.
    bass_drum_mounting_style:
      name: Système de fixation de la grosse caisse
      description: Décrit le système de fixation ou de support de la grosse caisse
        (pieds, support, harnais, etc.).
    bass_harmonica_comb_material:
      name: Matériau du peigne de l'harmonica basse
      description: Décrit le matériau constituant le peigne, ou bloc d’air, de l’harmonica
        basse.
    bass_harmonica_mouthpiece_style:
      name: Style d’embouchure d’harmonica basse
      description: Indique la configuration de l’embouchure de l’harmonica basse.
    bass_harmonica_reed_material:
      name: Matériau des anches de l’harmonica basse
      description: Indique le matériau des anches utilisées dans l’harmonica basse.
    bass_harmonica_tuning_system:
      name: Système d’accordage de l’harmonica basse
      description: Précise le type d’accordage (tempérament) de l’harmonica basse.
    bass_recorder_bocal_type:
      name: Type de bocal de la flûte à bec basse
      description: Précise la configuration du bocal (canal d’air) menant à l’embouchure
        de la flûte à bec basse.
    bass_recorder_included_accessories:
      name: Accessoires inclus avec la flûte à bec basse
      description: Liste les accessoires inclus avec la flûte à bec basse.
    bass_recorder_keywork_material:
      name: Matériau des clés de la flûte à bec basse
      description: Indique le matériau des clés de la flûte à bec basse (le cas échéant).
    bass_trombone_slide_material:
      name: Matériau de la coulisse de trombone basse
      description: Précise le matériau ou le placage principal des tubes extérieurs
        de la coulisse, ou de l’ensemble de coulisse, du trombone basse.
    bass_trombone_valve_wrap_style:
      name: Configuration des tubes de valve du trombone basse
      description: Précise la configuration de la tubulure de valve utilisée sur l’instrument.
    bass_ukulele_string_type:
      name: Type de cordes du ukulélé basse
      description: Indique le type général de cordes utilisées sur le ukulélé basse.
    bassinet_cradle_accessory_features:
      name: Caractéristiques des accessoires pour berceaux et couffins
      description: Met en avant les caractéristiques fonctionnelles des accessoires
        de berceau et de couffin (par ex. imperméable, certifié biologique, hypoallergénique).
    bassoon_bell_material:
      name: Matériau du pavillon de basson
      description: Spécifie le matériau du pavillon du basson.
    bassoon_bocal_system:
      name: Système de bocal du basson
      description: Variante ou type de bocal utilisé selon les systèmes de basson
        et les usages prévus.
    bassoon_case_shell_type:
      name: Type de coque pour étui de basson
      description: Indique si la structure de protection de l’étui est souple, rigide
        ou hybride.
    bassoon_keywork_material:
      name: Matériau des clés du basson
      description: Indique le matériau et/ou le placage utilisés pour la mécanique
        du basson (clés et mécanismes).
    bassoon_model_level:
      name: Niveau du modèle de basson
      description: Indique le niveau de pratique auquel le basson est destiné.
    bassoon_performance_level:
      name: Niveau de performance du basson
      description: Indique le niveau de jeu prévu pour ce modèle de basson.
    bassoon_reed_scrape_style:
      name: Style de grattage de l’anche de basson
      description: Précise le type de grattage ou de profil de l’anche de basson.
    bassoon_reed_thread_color:
      name: Couleur du fil de ligature de l’anche de basson
      description: Couleur du fil de ligature utilisé sur l’anche.
    bassoon_reed_type:
      name: Type d’anche de basson
      description: Indique le sous-type d’anche de basson compatible avec le produit
        (le cas échéant).
    bassoon_system:
      name: Système de basson
      description: Identifie le système de clés / la tradition de conception du basson
        utilisé par l’instrument.
    bat_construction:
      name: Fabrication de battes
      description: Indique le nombre de pièces ou de sections assemblées composant
        le corps de la batte (une pièce, deux pièces, hybride), influençant la flexibilité,
        la gestion des vibrations et les performances globales.
    bat_handle_size_compatibility:
      name: Compatibilité de la taille du manche de la batte
      description: Précise la ou les tailles de manche de batte de cricket avec lesquelles
        le grip est compatible.
    bath_book_interactive_features:
      name: Caractéristiques interactives du livre de bain
      description: Fonctions ludiques et éducatives intégrées au livre de bain.
    bath_bubble_machine_features:
      name: Caractéristiques de l’appareil à bulles pour le bain
      description: Principales caractéristiques fonctionnelles de l’appareil à bulles
        pour le bain, au-delà de la simple production de bulles.
    bath_crayon_features:
      name: Caractéristiques des crayons de bain
      description: Principales caractéristiques fonctionnelles et de sécurité des
        crayons de bain.
    bath_squirter_spray_pattern:
      name: Type de jet du jouet de bain
      description: Décrit la manière dont le jouet de bain projette l’eau (forme du
        jet) lorsqu’il est pressé ou activé.
    bath_toy_molded_drain_design:
      name: Structure de drainage moulée du jouet de bain
      description: Précise si le jouet de bain intègre une conception favorisant l’écoulement
        et le séchage.
    bath_toy_water_play_function:
      name: Fonction de jeu dans l’eau du jouet de bain
      description: Identifie le principal mécanisme de jeu ou d’interaction avec l’eau
        du jouet.
    baton_size_standard:
      name: Taille standard du témoin
      description: Précise le standard de taille du témoin utilisé en compétition
        (junior ou senior).
    battery_case_certification_standard:
      name: Normes et certifications du boîtier de batterie
      description: Indique les normes de test et certifications applicables au boîtier
        de batterie pour le transport et le stockage.
    battery_case_interior_padding_material:
      name: Matériau de protection intérieure du boîtier de batterie
      description: Précise la matière de protection et de capitonnage à l’intérieur
        du boîtier de batterie.
    battery_configuration:
      name: Configuration de la batterie
      description: Indique la configuration physique ou le format du bloc-batterie,
        pour que les utilisateurs puissent l’adapter à l’espace limité du compartiment
        de certaines répliques d’airsoft.
    battery_group_size:
      name: Taille de groupe de batterie
      description: Taille normalisée du boîtier de batterie (par ex. BCI Group 24F,
        H6) utilisée pour l’installation dans différents véhicules.
    battery_polarity:
      name: Polarité de la batterie
      description: Décrit la polarité des bornes et l’emplacement de la borne positive,
        déterminants pour l’ajustement de la batterie.
    battery_standards_supported:
      name: Normes de batterie prises en charge
      description: Indique les normes de batterie prises en charge par le testeur
        lors des tests de démarrage ou de diagnostic.
    battery_voltage_class:
      name: Classe de tension de la batterie
      description: Classe de tension courante du bloc-batterie de véhicule électrique,
        utilisée pour un filtrage rapide, par exemple systèmes 400 V ou 800 V.
    batting_cage_components_included:
      name: Composants de la cage de frappe inclus
      description: Liste les pièces détachées fournies avec le produit afin que l’acheteur
        puisse vérifier s’il s’agit d’un système complet ou de pièces de rechange.
    batting_helmet_accessories_included:
      name: Accessoires inclus avec le casque de frappeur
      description: Liste les accessoires de protection ou esthétiques fournis avec
        le casque de baseball.
    batting_stuffing_form_factor:
      name: Format du rembourrage et du matériau de garnissage
      description: Indique si le produit est vendu en vrac, en feuilles, en rouleaux,
        en pièces prédécoupées ou en formes moulées.
    batting_stuffing_loft_level:
      name: Niveau de gonflant du molleton et du rembourrage
      description: Indique le niveau de gonflant du molleton ou du rembourrage, c’est-à-dire
        son épaisseur relative, généralement prise en compte pour le matelassage et
        le choix du rembourrage.
    batting_stuffing_thermal_insulation_level:
      name: Niveau d’isolation thermique du rembourrage et du matériau de garnissage
      description: Indique le niveau relatif de chaleur et d’isolation du rembourrage
        utilisé dans les quilts, vestes et couvertures.
    batting_tee_base_design:
      name: Conception de la base du tee de frappe
      description: Décrit le style ou la construction de la base du tee, qui détermine
        sa stabilité et les surfaces adaptées.
    battle_top_arena_stadium_compatibility:
      name: Compatibilité avec les arènes ou stades de toupie de combat
      description: Précise le système d’arène ou de stade avec lequel le produit s’utilise,
        notamment pour les ensembles ou les formes d’arène particulières.
    battle_top_items_included:
      name: Éléments de toupie de combat inclus
      description: Indique les éléments de toupie de combat inclus dans l’emballage,
        par exemple la toupie, le lanceur, l’arène, la corde de lancement ou les pièces
        de rechange.
    battle_top_performance_type:
      name: Type de performance de la toupie de combat
      description: Décrit le style de performance général de la toupie de combat,
        selon son comportement en arène (offensif ou endurance, etc.).
    bayan_included_accessories:
      name: Accessoires inclus avec le bayan
      description: Accessoires fournis avec le bayan dans la boîte.
    bayan_tuning_system_type:
      name: Type de système d’accordage du bayan
      description: Décrit comment le bayan est tendu ou accordé, selon son type de
        construction, et les effets sur la portabilité et la facilité d’accordage.
    bb_gun_action_type:
      name: Type de mécanisme du pistolet à billes
      description: Indique le mécanisme de chargement ou de fonctionnement du pistolet
        à billes (levier, pompe, canon basculant, etc.).
    bb_gun_caliber:
      name: Calibre du pistolet à billes
      description: Définit le diamètre des billes que le pistolet est conçu pour tirer,
        pour assurer la compatibilité avec les munitions.
    bb_gun_part_type:
      name: Type de pièce pour pistolet à billes
      description: Classe les composants ou accessoires conçus pour les pistolets
        à billes afin d’aider les acheteurs à trouver rapidement la pièce exacte à
        remplacer, à améliorer ou à ajouter, par exemple le canon, le joint de piston
        ou le chargeur rapide.
    beach_ball_features:
      name: Caractéristiques du ballon de plage
      description: Caractéristiques fonctionnelles spécifiques aux ballons de plage.
    beach_bucket_features:
      name: Caractéristiques du seau de plage
      description: Caractéristiques fonctionnelles du seau de plage qui ont une incidence
        sur son utilisation, sa durabilité et sa praticité.
    beach_sand_toy_items_included:
      name: Articles inclus avec les jouets de plage et de sable
      description: Accessoires de jeu de plage et de sable fournis avec le kit (le
        cas échéant).
    bead_breaker_type:
      name: Type de séparateur de perles
      description: Type/conception du mécanisme de séparateurs de perles.
    bead_hole_style:
      name: Style du trou de perle
      description: Indique la configuration de l’orifice ou de la fente de la perle,
        influençant sa position sur l’hameçon ou le fil.
    bead_type:
      name: Type de perles
      description: Décrit le type de perles utilisé pour le modèle.
    bead_type_patch_embellishment:
      name: Type de perle pour ornement d’écusson
      description: Type principal de perles utilisées sur la surface du patch.
    beaded_accessory_project_type:
      name: Type de projet d’accessoire en perles
      description: Type de création réalisée par le modèle
    beading_needle_flexibility:
      name: Souplesse de l’aiguille à perler
      description: Degré de souplesse de la tige de l’aiguille pour passer dans les
        passages étroits des ouvrages en perles.
    beading_pattern_bead_size:
      name: Taille des perles du modèle
      description: Taille ou tailles de perles recommandées par le modèle, généralement
        selon le calibrage des perles de rocaille, par exemple 11/0 ou 8/0.
    beading_pattern_chart_format:
      name: Format du diagramme de perlage
      description: Format de représentation du modèle (graphiques ou instructions
        illustrées).
    beading_pattern_stitch_technique:
      name: Point ou technique de perlage
      description: Technique principale de tissage de perles utilisée dans le modèle.
    beading_technique_stitch:
      name: Technique ou point de perlage
      description: Indique la technique ou le point de perlage principal utilisé dans
        le modèle (par ex. Peyote, Brick Stitch).
    beading_thread_fiber_type:
      name: Type de fibre du fil de perlage
      description: Précise le sous-type de fibre ou de matériau du fil de perlage,
        plus précis que le matériau générique et déterminant pour ses propriétés techniques
    beading_thread_size:
      name: Calibre du fil à perler
      description: Indique le libellé de taille utilisé pour le fil de perlage par
        le fabricant ou le secteur, selon la marque ou la gamme, par exemple la taille D
        ou 00.
    beading_thread_use_case:
      name: Usage du fil de perlage
      description: Indique l’usage principal recommandé pour le fil de perlage, afin
        d’aider à choisir le bon produit pour le projet.
    beading_wire_coating_material:
      name: Matériau du revêtement du fil de perlage
      description: Indique le matériau du revêtement extérieur du fil métallique de
        perlage, le cas échéant, qui détermine en partie le toucher, la durabilité
        et la résistance aux pliures.
    beading_wire_strand_count:
      name: Nombre de brins du fil métallique de perlage
      description: Indique le nombre de brins du fil de perlage multibrins (7, 19,
        49 brins, etc.), qui influence la la flexibilité et la tenue.
    beadlock_type:
      name: Type de beadlock
      description: Précise si la roue est équipée d’un système beadlock et son type
        (utile pour les acheteurs de véhicules tout-terrain/UTV).
    beam_material:
      name: Matériau de la poutre
      description: Matériau principal de la barre ou de la tige, souvent différent
        de celui des têtes ou des fixations.
    beam_pattern:
      name: Forme du faisceau
      description: Schéma de répartition du faisceau lumineux pour l’éclairage routier
        ou tout-terrain.
    bean_bag_fabric_material:
      name: Matière du tissu du pouf
      description: Précise la matière de revêtement des sacs de jeu inclus dans l’ensemble.
    bean_paste_variety:
      name: Variété de pâte de haricots
      description: Indique la catégorie de pâte de haricot selon sa recette ou son
        procédé de production.
    bean_preparation:
      name: Préparation des haricots
      description: Indique comment les haricots sont préparés ou transformés avant
        la vente, par exemple en gousses entières, écossés, hachés ou germés.
    bean_variety:
      name: Variété de haricots
      description: Précise la variété botanique ou commerciale des haricots, par exemple
        les haricots verts, les edamames ou les haricots kilomètre.
    beanie_style:
      name: Style de bonnet
      description: Précise la conception générale, la construction ou la silhouette
        du bonnet pour aider les acheteurs à choisir rapidement parmi les variantes
        courantes.
    bearing_clearance:
      name: Jeu de roulement
      description: Indique la classe de jeu radial interne du roulement, c’est-à-dire
        le jeu interne ; la classe C0 est également appelée CN ou jeu normal.
    bearing_construction_type:
      name: Type de construction du roulement
      description: Identifie le type de roulement ou sa conception utilisé dans le
        moyeu (par ex. cartouche, billes libres).
    bearing_edge_type:
      name: Type de chanfrein de fût
      description: Indique le profil du chanfrein de la coque, qui influence l’attaque
        et la résonance.
    bearing_lubrication:
      name: Lubrification du roulement
      description: Indique le type de lubrifiant appliqué au roulement lors de la
        fabrication (graisse ou huile, par exemple).
    bearing_material:
      name: Matériau des roulements
      description: Indique le matériau de fabrication des roulements (acier, céramique
        hybride, etc.), permettant de choisir entre durabilité, coût et performance.
    bearing_rating:
      name: Capacité de charge
      description: Indique la classe de tolérance ou de performance des roulements
        utilisés dans les rollers (ABEC 7, ILQ 9, Swiss, etc.).
    bearing_seal_code:
      name: Code du joint de roulement
      description: Indique le type d'étanchéité du roulement, ce qui influe sur sa
        durabilité et sa résistance aux frottements.
    bearing_seal_type:
      name: Type de joint de roulement
      description: Précise le type de joint ou de flasque qui protège l’intérieur
        du roulement contre les contaminants et agit sur la résistance au roulement,
        par exemple 2RS, ZZ, LLU ou ouvert.
    bearing_shield_type:
      name: Type de protection du roulement
      description: Type de protection ou de scellement qui protège les composants
        internes du roulement.
    bearing_size_code:
      name: Code de taille du roulement
      description: Code standardisé du roulement indiquant ses dimensions (par ex.
        608, 688) combinant diamètre intérieur, extérieur et largeur.
    bearing_type:
      name: Type de roulement
      description: Précise le type de construction des roulements utilisés dans le
        jeu de direction.
    beater_head_material:
      name: Matériau de la tête du batteur
      description: Précise la matière de contact du batteur de grosse caisse (feutre,
        bois, caoutchouc, etc.).
    beaters_included:
      name: Nombre de batteurs inclus
      description: Indique le nombre de batteurs inclus ou installés sur la pédale
        de grosse caisse (simple, double ou aucun).
    bed_base_type:
      name: Type de sommier
      description: Définit le type de structure du sommier ou de la base du divan
        (plateforme, lattes, réglable, etc.).
    bed_storage_type:
      name: Type de rangement sous le lit
      description: Définit le système de rangement intégré du cadre de lit.
    bedroom_furniture_items_included:
      name: Articles mobiliers de salle de bain inclus
      description: Précise les meubles inclus dans l’ensemble de chambre, par exemple
        le lit, la commode ou les tables de chevet, pour que les acheteurs voient
        rapidement ce qui est fourni sans lire de longues descriptions.
    bedroom_vanity_items_included:
      name: Articles de coiffeuse inclus
      description: Répertorie les éléments fournis avec la coiffeuse de chambre, par
        exemple le miroir, le tabouret ou le kit d’éclairage, pour que les clients
        sachent précisément ce qui est livré.
    beer_based_cocktail_variety:
      name: Variété de cocktail à base de bière
      description: Classe les cocktails à base de bière selon leur variété, par exemple
        Radler, Shandy ou Michelada.
    beet_variety:
      name: Variété de betterave
      description: Précise le cultivar ou la variété de betterave pour aider les acheteurs
        à distinguer le goût, la couleur et les usages culinaires, par exemple betterave
        rouge, Golden ou Chioggia.
    bell_actuation_mechanism:
      name: Mécanisme d'actionnement de la cloche
      description: Décrit l’action à effectuer pour déclencher la sonnette, selon
        les préférences d’usage.
    bell_guard_coverage_area:
      name: Zone couverte par le protège-pavillon
      description: Décrit la partie de la cloche protégée par le dispositif de protection.
    bell_material:
      name: Matériau de la cloche
      description: Matériau du pavillon, s’il est indiqué séparément du matériau général
        de l’instrument.
    bellhousing_bolt_pattern:
      name: Configuration des points de fixation du carter de cloche
      description: Précise la norme ou la famille d’entraxes de boulonnage côté cloche
        d’embrayage ou côté moteur utilisée par le carter de transmission.
    bellows_material:
      name: Matériau du soufflet
      description: Indique le matériau du corps ou du revêtement du soufflet (le cas
        échéant).
    bellows_orientation:
      name: Orientation du soufflet
      description: Indique la configuration du soufflet utilisé pour alimenter les
        tuyaux en air.
    belly_panel_style:
      name: Style de panneau ventral
      description: Décrit la construction de la ceinture ou du panneau abdominal conçu
        pour accompagner l’évolution du ventre.
    belt_buckle_type:
      name: Type de boucle de ceinture
      description: Décrit le mécanisme ou la conception de la boucle utilisée sur
        la ceinture.
    beret_style:
      name: Style de béret
      description: Indique le type de béret selon son design ou son origine culturelle.
    berry_species:
      name: Espèce de baie
      description: Indique l’espèce de baie contenue dans le produit pour aider à
        la sélection.
    beta_casein_variant:
      name: Variante de bêta-caséine
      description: Indique la variante de bêta-caséine présente dans le lait (par
        ex. A2), utile pour les personnes ayant des sensibilités digestives.
    beverage_sweetness_level:
      name: Niveau de douceur de la boisson
      description: Classe la boisson selon son niveau de sucrosité ou de sucre ajouté.
    bezel_graduation_units:
      name: Unités de graduation de la lunette
      description: Précise les unités inscrites sur la lunette tournante (degrés,
        millièmes ou double échelle).
    bicycle_brake_set_components_included:
      name: Composants inclus dans le kit de freins de vélo
      description: Liste les pièces individuelles fournies dans le kit afin de connaître
        précisément le contenu et comparer les offres.
    bicycle_cage_mounting_position:
      name: Position de montage du porte-bidon sur vélo
      description: Précise l’emplacement du vélo prévu pour l’installation du porte-bidon.
    bicycle_computer_mount_placement:
      name: Emplacement du support de compteur de vélo
      description: Identifie l’emplacement d’installation du support de compteur sur
        le vélo, par exemple à l’avant du guidon ou sur le capot supérieur de la potence.
    bicycle_folding_mechanism:
      name: Mécanisme de pliage du vélo
      description: Indique le système de pliage du cadre de vélo (demi-pliage, pliage
        vertical, etc.).
    bicycle_frame_design:
      name: Conception du cadre de vélo
      description: Indique le type de cadre de vélo, influençant l’accessibilité,
        la capacité de charge et le rangement.
    bicycle_frame_style:
      name: Style de cadre de vélo
      description: Décrit le type de structure du cadre de vélo, par exemple cadre
        ouvert, lowrider ou chopper allongé, qui détermine la posture du cycliste
        et la ligne du vélo.
    bicycle_handlebar_type:
      name: Type de guidon de vélo
      description: Identifie le style ou la géométrie du guidon, aidant à choisir
        un modèle selon la posture et l’usage du cycliste.
    bicycle_headset_configuration:
      name: Configuration du jeu de direction de vélo
      description: Indique le type de jeu de direction selon la configuration des
        cuvettes (External Cup, ZeroStack, Integrated, Threaded, etc.).
    bicycle_hub_type:
      name: Type de moyeu de vélo
      description: Décrit le mécanisme de moyeu fourni avec la roue, influençant la
        compatibilité de la transmission et le style de conduite.
    bicycle_lock_security_certification:
      name: Certification de sécurité des antivols de vélo
      description: Certification indépendante délivrée par un tiers attestant les
        performances antivol, par exemple Sold Secure, ART ou Varefakta.
    bicycle_pedal_type:
      name: Type de pédale de vélo
      description: Indique le type de pédale (plateforme, automatique, hybride, etc.),
        afin de choisir l’interface adaptée au style de pratique.
    bicycle_propulsion_type:
      name: Type de propulsion du tricycle
      description: Indique le mode de propulsion du vélo (pédalage manuel, assistance
        électrique ou moteur thermique).
    bicycle_pump_type:
      name: Type de pompe à vélo
      description: Identifie le type de structure de la pompe, afin de choisir le
        modèle adapté au transport ou à l’usage.
    bicycle_rack_mounting_type:
      name: Type de fixation du porte-vélo
      description: Décrit la méthode ou l’emplacement principal de fixation du porte-bagages
        au vélo, pour aider les utilisateurs à vérifier la compatibilité avec le cadre
        et les éléments de montage.
    bicycle_suspension_type:
      name: Type de suspension de vélo
      description: Identifie la présence et la configuration de la suspension du vélo.
    bicycle_tire_tread_pattern:
      name: Motif de la bande de roulement du pneu de vélo
      description: Indique le type de sculpture du pneu, influençant l’adhérence et
        la résistance au roulement selon les surfaces.
    bidirectional_charging_capability:
      name: Capacité de charge bidirectionnelle
      description: Indique si le véhicule électrique prend en charge la charge bidirectionnelle
        (V2G et/ou V2H).
    bike_rack_mounting_style:
      name: Type de fixation du porte-vélos
      description: Indique la manière dont le vélo est maintenu ou fixé sur le porte-vélo.
    bike_rack_tilt_function:
      name: Fonction d’inclinaison du porte-vélos
      description: Indique la présence et le type de fonction d’inclinaison permettant
        d’accéder au coffre avec le porte-vélo installé.
    bikini_top_style:
      name: Style de haut de bikini
      description: Indique le modèle ou la coupe du haut de bikini afin de faciliter
        la recherche de la forme et de la silhouette souhaitées.
    billiard_brush_type:
      name: Type de brosse de billard
      description: Définit le type d’outil de nettoyage pour table de billard, par
        exemple brosse de table, brosse de bande ou bloc d’entretien du tapis.
    billiard_glove_finger_coverage:
      name: Couverture des doigts du gant de billard
      description: Identifie les doigts couverts par le gant, pour filtrer précisément
        les modèles de gants propres au billard.
    billiard_pocket_style:
      name: Style « poches de billard »
      description: Précise le style structurel ou esthétique de la poche, avec un
        effet sur la compatibilité et l’aspect de la table.
    billiard_rack_style:
      name: Style de triangle de billard
      description: Décrit le style physique ou le mécanisme du triangle de billard,
        par exemple cadre traditionnel, gabarit ou modèle pliable.
    billiard_table_type:
      name: Type de table de billard
      description: Indique la discipline de billard ou le type de jeu auquel la table
        est destinée (pool, snooker, carambole, etc.).
    billiards_discipline:
      name: Discipline de billard
      description: Indique la variante de billard à laquelle le produit est destiné
        ou compatible.
    binding_compatibility_standard:
      name: Norme de compatibilité des fixations
      description: Identifie la norme de semelle des fixations de ski avec laquelle
        la chaussure est compatible, garantissant un montage sûr.
    binding_inclusion:
      name: Fixations incluses
      description: Indique si les skis sont vendus nus, avec système intégré ou avec
        fixations incluses.
    binding_interface:
      name: Interface de fixation
      description: Indique la plaque de fixation prémontée sur les skis ou la norme
        d’interface compatible, pour assurer la compatibilité entre les chaussures
        et les fixations.
    binding_liner_type:
      name: Type de doublure de fixation
      description: Indique le style de doublure intérieure de la fixation/chaussure
        (amovible, thermoformable, compatible marche, etc.).
    binding_mounting_system:
      name: Système de montage des fixations
      description: Identifie l’interface utilisée pour fixer la fixation au ski, par
        exemple le montage plat, le rail, la glissière ou la plaque.
    binding_position:
      name: Position de reliure
      description: Indique la position ou la configuration de montage prévue pour
        la fixation (par ex. avant, arrière, ARTP).
    binding_strap_position:
      name: Position de la sangle de fixation
      description: Précise l’emplacement de la fixation prévu pour installer la sangle.
    bingo_components_included:
      name: Composants du bingo inclus
      description: Liste les éléments inclus dans le coffret de bingo, tels que les
        boules, cartons et marqueurs.
    bingo_number_range:
      name: Série de numéros du bingo
      description: Identifie la plage de numéros de bingo ou la variante prise en
        charge par l’ensemble.
    bingo_set_features:
      name: Caractéristiques du jeu de bingo
      description: Indique le format principal du jeu de bingo (traditionnel ou électronique/interactif).
    bipod_mounting_interface:
      name: Interface de fixation du bipied
      description: Précise le type de montage permettant de fixer le bipied sur l’arme
        ou le rail.
    bit_attachment_type:
      name: Type de fixation de la mèche
      description: Indique la manière dont la têtière se fixe au mors (extrémités
        à nouer, à boucle, à vis Chicago, etc.).
    bit_mouthpiece_design:
      name: Conception de l’embouchure du mors
      description: Identifie le style de construction ou la configuration articulée
        de l’embouchure, qui détermine la répartition de la pression, le dégagement
        au niveau du palais et la sévérité globale.
    bit_ring_style:
      name: Conception de l’anneau du mors
      description: Définit le style de branche ou d’anneau du mors qui se fixe à la
        bride et détermine l’action du mors, le guidage latéral et la sensation aux
        rênes.
    bladder_material:
      name: Matériau de la vessie
      description: Indique le matériau de la chambre à air interne qui retient l’air.
    blade_attachment_type:
      name: Type de fixation de la lame
      description: Précise le type de montage de la lame (charnière clap ou fixation
        rigide).
    blade_finish_coating:
      name: Finition / revêtement de la lame
      description: Traitement de surface appliqué à la lame à des fins esthétiques
        ou de protection contre la corrosion.
    blade_hosel_type:
      name: Type de hosel de lame
      description: Indique le type de connexion du hosel de la lame qui s’insère dans
        le manche, ce qui influence la compatibilité (standard ou conique, par exemple).
    blade_length_type:
      name: Type de longueur de lame
      description: Classe la longueur de la palme (courte, moyenne ou longue), influençant
        la cadence de battement et les objectifs d’entraînement.
    blade_lie:
      name: Lie de la palette de crosse
      description: Indique le numéro de lie de la lame du bâton de hockey, qui précise
        l’angle de la lame sur la glace par rapport au manche.
    blade_sharpness:
      name: Tranchant de la lame
      description: Indique si le tranchant de l’arme est affûté ou émoussé pour l’entraînement.
    blade_size_category:
      name: Catégorie de taille de lame
      description: Code international normalisé de taille de lame de sabre, de 0 à 5,
        utilisé pour distinguer les lames destinées aux jeunes des lames pour adultes.
    blade_size_class:
      name: Classe de taille de lame
      description: Classe la lame selon les catégories de taille joueur (Jeunesse,
        Junior, Intermédiaire ou Senior), en fonction du manche.
    blade_size_number:
      name: Numéro de taille de lame
      description: Code numérique normalisé de taille de lame, de 0 à 5, défini par
        la réglementation de l’escrime, qui détermine la longueur de la lame et les
        catégories d’âge autorisées.
    blaster_mechanism:
      name: Mécanisme du blaster
      description: Définit le mécanisme interne de fonctionnement du gel blaster (GBB,
        AEG, ressort, etc.).
    block_edge_style:
      name: Style des bords du bloc
      description: Décrit la finition des bords et des angles des blocs pour le confort
        et la sécurité.
    blocking_mat_features:
      name: Caractéristiques du tapis de blocage
      description: Décrit les caractéristiques fonctionnelles des tapis de blocage
        (rangement, portabilité, utilisation).
    blocking_mat_grid_unit:
      name: Unité de quadrillage du tapis de blocage
      description: Système d’unités utilisé sur la grille imprimée, pour faire correspondre
        les motifs et les mesures.
    blocking_mat_surface_markings:
      name: Repères de surface du tapis de blocage
      description: Indique les marquages de mesure ou guides présents sur la surface
        du tapis de blocage.
    blocking_wire_coating:
      name: Revêtement du fil de blocage
      description: Précise le traitement appliqué au fil de blocage pour améliorer
        la résistance à la corrosion et au risque d’accrochage.
    blocking_wire_end_cap_type:
      name: Type d’embout de fil de blocage
      description: Indique le type d’embout de protection utilisé aux extrémités du
        fil de blocage pour la sécurité et la protection du tissu.
    blocking_wire_set_includes:
      name: Contenu du kit de fil de blocage
      description: Indique les composants inclus avec le fil de blocage (par ex. épingles
        en T, étui).
    blocking_wire_usage:
      name: Usage du fil de blocage
      description: Décrit l’utilisation principale du fil de blocage flexible.
    bloom_stage:
      name: Stade de floraison
      description: Indique le degré d’ouverture des marguerite au moment de la livraison
        ou de l’expédition.
    blower_motor_bearing_type:
      name: Type de roulement du moteur de soufflerie
      description: Indique le type de roulement utilisé dans le moteur de soufflerie.
    blower_motor_mounting_position:
      name: Position de montage du moteur de soufflerie
      description: Emplacement du moteur de soufflerie dans le module CVC ou le véhicule,
        par exemple à l’avant ou à l’arrière.
    blowpipe_valve_type:
      name: Type de valve du tuyau d’insufflation
      description: Indique le type de valve du tuyau d’insufflation inclus, le cas
        échéant.
    bo_staff_style:
      name: Style de bō
      description: Définit le style ou la construction du bâton bō (droit, conique,
        rembourré, télescopique, etc.).
    board_game_theme:
      name: Thème du jeu de société
      description: Indique l’univers ou la thématique du jeu de société pour faciliter
        la recherche.
    board_rail_shape:
      name: Profil du rail de la planche
      description: Indique le profil des rails de la planche, par exemple souple,
        dur ou 50/50, qui influe sur l’accroche et la relance sur la vague.
    board_size_classification:
      name: Classification de la taille de la planche
      description: Classe la planche ou le jeu de cornhole selon les formats normalisés
        courants.
    board_type_compatibility:
      name: Type de planche compatible
      description: Indique le type de planche auquel le leash est destiné.
    boat_construction_type:
      name: Type de construction du bateau
      description: Décrit la construction ou le format de la barque, par exemple gonflable
        ou rigide.
    boat_hook_flotation:
      name: Flottabilité de la gaffe
      description: Indique si le crochet de bateau est conçu pour flotter en cas d’immersion
        accidentelle.
    boat_ladder_stowage_style:
      name: Mode de rangement de l’échelle de bateau
      description: Décrit le mode de rangement de l’échelle lorsqu’elle n’est pas
        utilisée, par exemple pliable, rétractable ou amovible.
    boat_trailer_construction_type:
      name: Type de support de la remorque de bateau
      description: Précise le type de support utilisé par la remorque de bateau (berceaux,
        rouleaux ou hybride).
    boat_weaving_shuttle_weft_exit_type:
      name: Type de sortie de la trame de la navette de tissage
      description: Mode de sortie du fil de trame de la navette pendant le tissage.
    bobbin_loading_type:
      name: Mode de chargement de la canette
      description: Précise le mode d’insertion ou de chargement de la canette dans
        la machine à coudre.
    bobbin_system:
      name: Système de canette
      description: Indique le système de canette utilisé par la machine à coudre.
    bobbin_type:
      name: Type de canette
      description: Indique le format de support de fil compatible avec la navette
        de tissage, déterminant la compatibilité et l’usage (ex. canettes pour navettes
        bateau, ou navettes ouvertes pour bandes).
    bobbin_winder_winding_direction:
      name: Sens d’enroulement du bobineur de canette
      description: Indique le sens d’enroulement ou de rotation du bobineur de canette.
    bobble_mechanism:
      name: Mécanisme de bascule
      description: Précise le type de mécanisme de bascule, qui détermine le mouvement
        et la durabilité.
    bocal_material:
      name: Matériau du bocal
      description: Précise le matériau du ou des bocaux inclus.
    bodhr_n_head_material:
      name: Matériau de la peau du bodhrán
      description: Indique le matériau de la peau de jeu (membrane), qui influence
        fortement le son et l’entretien.
    bodhr_n_tuning_system_type:
      name: Type de système d'accordage du bodhrán
      description: Indique le type de mécanisme de tension intégré permettant d’ajuster
        la tension de la peau (si réglable).
    body_armor_coverage_area:
      name: Zone couverte par la protection corporelle
      description: Indique les zones du corps protégées par le produit.
    body_armor_intended_use:
      name: Utilisation prévue de l’armure de protection
      description: Indique le type d’utilisation principale pour lequel l’équipement
        de protection ATV/UTV est conçu.
    body_cord_connector_style:
      name: Type de connecteur du fils de corps
      description: Décrit la configuration des connecteurs aux extrémités du cordon,
        par exemple le nombre de broches ou le système à baïonnette, qui détermine
        la compatibilité avec les armes et les boîtiers de pointage.
    body_panel_finish_state:
      name: État de finition du panneau de carrosserie
      description: Indique l’état de finition du panneau de carrosserie au moment
        de la vente (prêt à peindre ou pré-fini).
    body_shape:
      name: Forme du corps
      description: Indique la forme générale de la guitare électrique.
    bodysuit_bottom_coverage:
      name: Couvrance du bas du body
      description: Définit la coupe et la couvrance de la partie basse du body, influençant
        le confort et la compatibilité avec les tenues.
    boilie_shape:
      name: Forme des bouillettes
      description: Indique la forme des bouillettes produites par la table de roulage
        pour permettre aux pêcheurs de choisir entre différents profils d’appâts.
    boilie_stop_buoyancy:
      name: Flottabilité du stop pour bouillettes
      description: Précise la flottabilité du stop pour bouillettes (flottant, coulant
        ou neutre) et son effet sur sa présentation dans l’eau.
    bok_choy_variety:
      name: Variété de bok choy
      description: Indique le cultivar, le nom commercial ou la variété du pakchoï
        (Baby, Shanghai, Nai Bai, Tatsoi, Purple Lady, etc.), permettant de choisir
        le goût, la taille et l’apparence.
    bolt_drive_style:
      name: Style d’empreinte de boulon
      description: Précise le style de tête des boulons de fixation de skateboard
        (Allen, cruciforme, etc.).
    bone_content:
      name: Présence d’os
      description: Précise la présence ou non d’os dans la viande.
    bongo_center_block_material:
      name: Matériau du bloc central des bongos
      description: Indique le matériau du bloc central reliant les deux tambours de
        bongos (le cas échéant).
    bongo_shell_material:
      name: Matériau du fût de bongo
      description: Matériau des fûts de bongo, c’est-à-dire des corps de tambour,
        hors peaux et accastillage.
    bongo_tuning_system:
      name: Système d’accordage du bongo
      description: Indique le système d’accordage des bongos (cosses traditionnelles
        ou accordage à cordes), influençant l’entretien et l’authenticité.
    boning_type:
      name: Type de désossage
      description: Identifie le système de renfort structurel du corset, combinant
        matériau et forme des baleines, déterminant le maintien, la souplesse et la
        durabilité.
    boot_liner_type:
      name: Type de doublure de chaussure
      description: Décrit la construction du chausson intérieur de la botte de snowboard
        ou ses possibilités de personnalisation, par exemple thermoformable ou amovible.
    boot_sole_compatibility:
      name: Compatibilité des semelles de bottes
      description: Liste les normes de semelle ou systèmes d’interface compatibles
        avec la fixation.
    boot_support_level:
      name: Niveau de maintien de la botte
      description: Décrit le niveau global de rigidité ou de maintien de la chaussure
        de skate au niveau de la cheville.
    boot_width_code:
      name: Code de largeur de botte
      description: Indique la largeur de chaussure en patinage artistique selon un
        code alphabétique (par ex. AAA, AA, B, C, D).
    booth_configuration:
      name: Configuration du stand
      description: Identifie la configuration générale de l’assise de la banquette,
        par exemple simple face, d’angle ou modulaire.
    bootie_toe_design:
      name: Conception de l’avant-pied des chaussons
      description: Indique le type de construction de l’avant-pied des chaussons de
        surf et des chaussons pour récifs.
    border_type:
      name: Type de bordure
      description: Style de finition des bords du patch brodé, influençant l’apparence
        et la durabilité.
    bore_cleaner_format:
      name: Format du nettoyant pour canon
      description: Indique la forme du produit de nettoyage de canon, selon qu’il
        s’agit d’un outil ou d’un consommable.
    bore_cleaner_safe_for_finish:
      name: Nettoyant canon compatible avec la finition
      description: Indique les finitions courantes des instruments de la famille des
        cuivres avec lesquelles le nettoyant pour perce peut être utilisé sans risque.
    bottle_cage_loading_direction:
      name: Sens d’insertion dans le porte-bidon
      description: Décrit le sens d’insertion ou de retrait de la bouteille du porte-bidon.
    bottle_neck_finish_closure_size:
      name: Finition du goulot/taille de la fermeture
      description: Taille normalisée de l’ouverture ou de la finition du goulot, qui
        assure la compatibilité avec les capsules, les bouchons et les capsuleuses,
        par exemple une finition couronne de 26 mm.
    bottle_style:
      name: Style de bouteille
      description: Types de bouteilles utilisés en embouteillage artisanal (brassage/vinification).
    bottom_bracket_interface:
      name: Interface de boîtier de pédalier
      description: Identifie le standard d’axe/boîtier de pédalier compatible avec
        le pédalier, assurant la compatibilité avec le cadre.
    bottom_bracket_standard:
      name: Standard de boîtier de pédalier
      description: Indique le type de boîtier de pédalier supporté par le cadre, déterminant
        la compatibilité du pédalier.
    bottom_type_suitability:
      name: Compatibilité selon le type de fond
      description: Indique les types de fonds sur lesquels l’ancre offre la meilleure
        tenue, par exemple les fonds marins ou lacustres.
    bounce_level:
      name: Niveau de rebond
      description: Indique le niveau de rebond du ballon lorsqu’il est lâché ou lancé,
        pour aider les utilisateurs à choisir le modèle adapté aux lancers contre
        un mur ou aux lancers au sol.
    bouncy_ball_surface_finish:
      name: Finition de la surface d'une balle rebondissante
      description: Précise la finition tactile ou visuelle de la surface d’une balle
        rebondissante, par exemple lisse, à picots ou à paillettes.
    boundary_marker_type:
      name: Type de marqueur de limite
      description: Définit la forme du marqueur ou du produit de délimitation d’un
        terrain, par exemple cône, ruban, peinture, pochoir ou machine de marquage.
    bouquet_size_tier:
      name: Catégorie de taille du bouquet
      description: Indique une catégorie de taille standardisée du bouquet, indépendamment
        du nombre de tiges.
    bow_and_yo_yo_edge_finish:
      name: Finition du bord du nœud ou du yo-yo
      description: Décrit la finition des bords ou des ornements du nœud/yo-yo (notamment
        pour les nœuds en ruban).
    bow_case_shell_type:
      name: Étui pour archet de type coque
      description: Décrit la structure extérieure de l’étui d’arc (rigide ou souple).
    bow_compatibility:
      name: Compatibilité avec les arcs
      description: Indique le type d’arc pour lequel la pointe de chasse est conçue
        ou compatible.
    bow_hair_color:
      name: Couleur de la mèche de l’archet
      description: Indique la couleur ou l’aspect du crin utilisé sur un archet (blanc,
        blanchi, noir, etc.).
    bow_stick_material:
      name: Matériau de la barre d'étrave
      description: Identifie le matériau utilisé pour la baguette de l’archet, c’est-à-dire
        sa tige principale, qui détermine fortement le poids, la sensation de jeu
        et le prix.
    bow_type:
      name: Type d’archet
      description: Indique le type de conception de l’arc junior (compound, recurve,
        longbow, etc.) influençant le style de tir et l’équipement requis.
    bow_winding_material:
      name: Matériau de la garniture d’archet
      description: Précise le matériau utilisé pour la garniture ou l’enroulement
        de l’archet, qui joue sur la prise en main et l’équilibre.
    bow_yo_yo_embellishment_style:
      name: Style d’ornement du nœud ou du yo-yo
      description: Identifie le style de construction de l’ornement (nœud ou yo-yo
        en tissu).
    bowling_ball_core_type:
      name: Type de noyau d'une boule de bowling
      description: Indique la conception ou la symétrie du noyau interne de la boule
        de bowling, qui détermine sa trajectoire et son potentiel d’effet.
    bowling_ball_coverstock_type:
      name: Type de revêtement de la boule de bowling
      description: Indique le matériau ou la technologie du revêtement extérieur de
        la boule de bowling, qui influence son adhérence et son potentiel d’effet.
    bowling_set_style:
      name: Style du kit de bowling
      description: Indique le type de kit de bowling selon son usage.
    box_lid_type:
      name: Type de couvercle de boîte
      description: Indique le type de couvercle ou de mécanisme d’ouverture de la
        boîte ou du coffret.
    box_spring_profile:
      name: Profil de sommier tapissier
      description: Classe la hauteur globale du sommier tapissier en catégories de
        profil adaptées aux consommateurs (ex. profil bas, standard, profil haut),
        afin de permettre un filtrage rapide sans connaître les dimensions exactes.
    box_spring_requirement:
      name: Sommier requis
      description: Indique si un sommier ou une base supplémentaire est nécessaire
        pour le matelas.
    boxing_ring_style:
      name: Style ring de boxe
      description: Classe le style de construction global ou le scénario d’utilisation
        prévu du ring (compétition ou entraînement, surélevé ou au sol).
    bra_length_type:
      name: Type de soutien-gorge
      description: Définit la classification de longueur des soutiens-gorge en fonction
        de leur couverture verticale (standard, longline, midi, cropped, etc.).
    bra_padding_type:
      name: Type de rembourrage du soutien-gorge
      description: Décrit le niveau de rembourrage des bonnets ou sa présence éventuelle.
    braces_compatibility:
      name: Compatibilité avec les appareils dentaires
      description: Indique si le protège-dents peut être porté avec un appareil orthodontique
        et dans quelle mesure.
    brake_band_form:
      name: Forme de la bande de frein
      description: Indique si la bande de frein est fournie en boucle continue, dite
        sans fin, ou en longueur coupée à fixer.
    brake_band_material_type:
      name: Type de matériau de la bande de frein
      description: Précise le matériau fonctionnel de la bande de frein, par exemple
        cordon en coton, fil nylon ou acier à ressort, qui détermine la durabilité,
        l’adhérence, l’élasticité et le niveau sonore.
    brake_band_style:
      name: Style de bande de frein
      description: Précise le système ou le type de tension de la bande de frein utilisé
        sur un rouet pour régler la tension de l’épinglier ou de la bobine.
    brake_bleeding_method:
      name: Méthode de purge des freins
      description: Indique la méthode de purge prise en charge par le kit.
    brake_booster_assist_type:
      name: Type d’assistance du servofrein
      description: Indique le mécanisme d’assistance du servofrein.
    brake_booster_diaphragm_configuration:
      name: Configuration des membranes du servofrein
      description: Indique le nombre ou le type de membranes utilisées dans le servofrein.
    brake_caliper_bleeder_screw_position:
      name: Position de la vis de purge de l’étrier de frein
      description: Précise la position de la vis de purge sur l’étrier installé, afin
        de vérifier qu’elle se trouve au point le plus haut et que la purge peut s’effectuer
        correctement.
    brake_caliper_finish:
      name: Finition de l’étrier de frein
      description: Indique la finition de surface ou le revêtement protecteur appliqué
        au corps de l’étrier de frein (peinture, placage, anodisation, etc.).
    brake_caliper_included_hardware:
      name: Matériel de montage inclus avec l’étrier de frein
      description: Indique les éléments inclus dans le kit d’étrier de frein.
    brake_caliper_mount_type:
      name: Type de montage de l’étrier de frein
      description: Type d’interface de montage utilisé pour fixer l’étrier à la fusée
        ou au support.
    brake_caliper_paint_base_chemistry:
      name: Composition chimique de base de la peinture de l’étrier de frein
      description: Système de peinture ou de résine, ou famille chimique utilisée.
    brake_caliper_paint_kit_contents:
      name: Contenu du kit de peinture pour étriers de frein
      description: Indique les éléments inclus dans le kit de peinture, en plus de
        celle-ci.
    brake_circuit_type:
      name: Type de circuit de freinage
      description: Indique la configuration du circuit hydraulique de freinage compatible
        avec le maître-cylindre.
    brake_clutch_fluid_base_chemistry:
      name: Composition chimique de base du liquide de frein et d'embrayage
      description: Base chimique principale du liquide hydraulique de frein/embrayage,
        déterminant la compatibilité avec d’autres fluides.
    brake_clutch_fluid_dot_specification:
      name: Spécification DOT du liquide de frein/embrayage
      description: Classification de performance DOT des liquides hydrauliques de
        frein/embrayage (DOT 3, DOT 4, etc.).
    brake_drum_finish_coating:
      name: Finition ou revêtement du tambour de frein
      description: Indique la finition de surface ou le revêtement protecteur du tambour
        de frein (e-coat, peinture, zinc, etc.).
    brake_drum_type:
      name: Type de tambour de frein
      description: Indique le type de conception du tambour de frein (avec ou sans
        moyeu/roulement intégré).
    brake_fluid_base:
      name: Base de liquide de frein
      description: Indique la formulation du liquide hydraulique de frein nécessaire
        ou fourni.
    brake_fluid_base_chemistry:
      name: Composition de base du liquide de frein
      description: Définit la base chimique du liquide de frein, qui régit les règles
        de compatibilité et de mélange.
    brake_fluid_dot_specification:
      name: Spécifications DOT pour le liquide de frein
      description: Indique la classification ou la spécification DOT du liquide de
        frein, par exemple DOT 3 ou DOT 4, pour les produits de liquide de frein.
    brake_fluid_standards_compliance:
      name: Conformité aux normes relatives au liquide de frein
      description: Indique les normes industrielles auxquelles le liquide de frein
        est conforme, en plus de la classification DOT.
    brake_fluid_type:
      name: Type de liquide de frein
      description: Indique le liquide de frein requis pour les étriers de frein hydrauliques
        de vélo.
    brake_hose_end_fitting_type:
      name: Type de raccord d’extrémité du flexible de frein
      description: Style de raccord à chaque extrémité du flexible de frein (banjo,
        évasé, filetage mâle/femelle, etc.), assurant la compatibilité avec les étriers
        et conduites.
    brake_lever_pull_type:
      name: Type de tirage du levier de frein
      description: Définit le rapport ou le mécanisme de tirage de câble prévu pour
        le levier, afin d’assurer la compatibilité avec certains étriers de frein,
        par exemple les freins sur jante à tirage court ou les freins V-Brake à tirage
        long.
    brake_light_switch_actuation_type:
      name: Type d'actionnement du contacteur de feux stop
      description: Identifie l’événement physique qui actionne l’interrupteur (pédale/plongeur
        ou pression hydraulique, etc.).
    brake_light_switch_connector_type:
      name: Type de connecteur du contacteur de feux stop
      description: Indique le type de connecteur électrique utilisé par le contacteur
        de feu stop pour se brancher au faisceau du véhicule.
    brake_light_switch_contact_type:
      name: Type de contact du contacteur de feux stop
      description: Configuration ou comportement des contacts électriques du contacteur
        de feu stop, par exemple normalement ouvert, normalement fermé, inverseur
        ou multicircuit.
    brake_light_switch_mounting_style:
      name: Style de montage du contacteur de feu stop
      description: Indique le type de fixation du contacteur de feu stop sur le système
        de freinage (fileté, clipsé, sur support, banjo, etc.).
    brake_master_cylinder_mounting_type:
      name: Type de montage du maître-cylindre de frein
      description: Mode de fixation du maître-cylindre au véhicule ou au servofrein,
        selon l’entraxe des boulons ou le type de bride.
    brake_master_cylinder_reservoir_type:
      name: Type de réservoir du maître-cylindre de frein
      description: Type ou configuration du réservoir de liquide de frein fourni avec
        le maître-cylindre ou requis par celui-ci.
    brake_mount_type:
      name: Type de fixation du frein
      description: Identifie l’interface de freinage intégrée à la fourche pour permettre
        aux cyclistes de vérifier la compatibilité avec le système de freinage.
    brake_mounting_flange_bolt_pattern:
      name: Entraxe des boulons de la bride de montage du frein
      description: Précise la configuration des trous ou des boulons de la bride de
        montage utilisée pour fixer la plaque de support du frein ou le support d’étrier
        à l’essieu de la remorque, par exemple à 4 boulons.
    brake_pad_backing_plate_material:
      name: Matériau de la plaque support de plaquette de frein
      description: Précise le matériau de la plaque support de la plaquette de frein,
        avec un effet sur la dissipation thermique et le poids.
    brake_pad_compatible_rotor_type:
      name: Type de disque compatible avec les plaquettes de frein
      description: Précise le type de surface de rotor ou de disque compatible avec
        la plaquette.
    brake_pad_compound:
      name: Composition des plaquettes de frein
      description: Identifie la composition du matériau de friction de la plaquette
        de frein.
    brake_pad_form_factor:
      name: Forme de la plaquette de frein
      description: Indique le type de système de freinage pour lequel la plaquette
        est conçue (disque, tambour, frein de stationnement, etc.).
    brake_pad_material:
      name: Matériau de la plaquette de frein
      description: Précise le composé de friction ou la famille de matériaux utilisés
        dans la garniture des plaquettes de frein.
    brake_pad_shim_included:
      name: Cale de plaquette de frein incluse
      description: Indique si des cales antibruit sont incluses ou préinstallées.
    brake_pad_wear_indicator_type:
      name: Type d’indicateur d’usure des plaquettes de frein
      description: Indique le type d’indicateur d’usure inclus avec les plaquettes
        de frein, par exemple un témoin mécanique sonore ou un capteur électronique.
    brake_position:
      name: Position du frein
      description: Indique l’emplacement prévu pour installer le composant de freinage
        sur le véhicule.
    brake_rotor_mount_type:
      name: Type de fixation du disque de frein
      description: Définit l’interface utilisée pour fixer le disque de frein au moyeu,
        le cas échéant.
    brake_service_kit_components_included:
      name: Composants inclus dans le kit d’entretien des freins
      description: Liste des outils, adaptateurs et consommables inclus dans le kit
        de service de freinage.
    brake_shoe_friction_material:
      name: Matériau de friction des mâchoires de frein
      description: Composé de friction ou de garniture utilisé sur la mâchoire de
        frein, c’est-à-dire le matériau en contact avec le tambour.
    brake_shoe_set_contents:
      name: Contenu du jeu de mâchoires de frein
      description: Éléments inclus dans l’emballage, par exemple les mâchoires seules
        ou les mâchoires avec le matériel de montage et les ressorts.
    brake_system_type:
      name: Type de système de freinage
      description: Précise la technologie du mécanisme de freinage utilisée pour contrôler
        la rotation de la bobine pendant le lancer.
    brake_type:
      name: Type de frein
      description: Type de mécanisme de freinage ou de tension de l’ensouple de chaîne.
    brandy_age_classification:
      name: Classification des brandies en fonction de leur âge
      description: Classe le brandy selon des désignations de qualité et d’âge standard
        (VS, VSOP, XO, etc.), reflétant les exigences minimales de vieillissement.
    brass_cleaning_tool_type:
      name: Type d’outil de nettoyage pour cuivres
      description: Indique le type d’outil utilisé pour nettoyer ou entretenir les
        instruments à vent en laiton.
    brass_instrument_application_area:
      name: Zone d’application pour instruments de la famille des cuivres
      description: Partie ou parties de l’instrument de la famille des cuivres sur
        lesquelles le spray désinfectant est destiné à être utilisé.
    brass_instrument_care_kit_purpose:
      name: Usage du kit d’entretien pour cuivres
      description: Décrit le scénario d’utilisation prévu pour le kit (entretien courant,
        nettoyage en profondeur, déplacement/urgence, kit étudiant, etc.).
    brass_instrument_case_shell_material:
      name: Matériau de la coque d’étui pour instrument de la famille des cuivres
      description: Matériau principal de la coque rigide ou du cadre, le cas échéant,
        distinct du matériau général du sac ou de l’étui.
    brass_instrument_lubricant_additives_features:
      name: Additifs et caractéristiques du lubrifiant pour cuivres
      description: Indique les caractéristiques fonctionnelles principales de la formulation
        du lubrifiant.
    brass_instrument_lubricant_base_composition:
      name: Composition de base du lubrifiant pour instruments en laiton
      description: Indique la base chimique principale utilisée pour les lubrifiants
        d’instruments en laiton.
    brass_instrument_lubricant_viscosity_grade:
      name: Grade de viscosité du lubrifiant pour cuivres
      description: Épaisseur relative et fluidité du lubrifiant destiné aux instruments
        de la famille des cuivres.
    brass_instrument_replacement_part_type:
      name: Type de pièce de rechange pour instrument à vent en cuivre
      description: Indique le type de pièce de rechange pour instruments en laiton
        (pistons, coulisses, clés d’eau, liège, feutres, protections, etc.).
    brass_instrument_valve_configuration:
      name: Configuration des pistons d’instrument de la famille des cuivres
      description: Mode de variation de la hauteur du son de l’instrument, par mécanisme
        à pistons ou à coulisse.
    brass_lubricant_application_area:
      name: Zone d'application du lubrifiant pour laiton
      description: Mécanisme d’instrument de la famille des cuivres auquel le lubrifiant
        est destiné.
    brass_mouthpiece_backbore:
      name: Perce arrière de l’embouchure en laiton
      description: Indique le profil de la perce arrière de l’embouchure (forme et
        taille), influençant le timbre et l’intonation.
    brass_mouthpiece_cup_depth:
      name: Profondeur de cuvette d’embouchure pour cuivre
      description: Indique la classification de profondeur de la cuvette de l’embouchure,
        influençant le son et le timbre.
    brass_polishing_cloth_abrasiveness_level:
      name: Niveau d’abrasivité du chiffon de polissage pour laiton
      description: Précise le degré d’abrasivité du chiffon entre nettoyage intensif
        et polissage doux.
    bread_crumb_base_ingredient:
      name: Ingrédient de base de la chapelure
      description: Indique l’ingrédient principal utilisé pour produire chapelure
        (blé, riz, couenne de porc, amande, etc.).
    bread_variety:
      name: Variété de pain
      description: Indique le style ou la variété de pain ou de petits pains (brioche,
        baguette, naan, etc.) afin de faciliter la recherche.
    breadstick_style:
      name: Style de gressin
      description: Identifie le style ou le format traditionnel du gressin.
    bridge_head_material:
      name: Matériau de la tête de pont
      description: Matériau utilisé pour la tête de chevalet, impactant le poids,
        le toucher et la durabilité.
    bridge_head_type:
      name: Type de tête de chevalet
      description: Identifie le style de la tête de chevalet, aidant à choisir la
        forme de repose-queue préférée.
    bridle_part_type:
      name: Type de pièce de bride
      description: Indique le composant du bridon auquel correspond la pièce de rechange,
        pour que les clients trouvent précisément la pièce dont ils ont besoin.
    bridle_style:
      name: Style de bridon
      description: Classe le type général ou la construction du bridon, pour aider
        les cavaliers à trouver rapidement un équipement adapté à leurs besoins ou
        à la discipline pratiquée.
    broadhead_field_point_attachment_style:
      name: Style de fixation de la pointe de chasse/terrain
      description: Précise le mode de fixation de la pointe de chasse ou de la pointe
        d’entraînement sur le fût de la flèche.
    broadhead_thread_size:
      name: Taille du filetage de la pointe de chasse
      description: Répertorie les spécifications de filetage utilisées pour fixer
        la pointe de chasse ou la pointe d’entraînement à l’insert ou au fût de la
        flèche.
    broadhead_tip_type:
      name: Type de pointe de la pointe de chasse
      description: Définit le style de pointe ou de virole de la lame de chasse, qui
        amorce la pénétration et influe sur les performances selon le gibier.
    broccoli_cut:
      name: Coupe du brocoli
      description: Indique comment le brocoli a été coupé ou préparé avant l’emballage,
        par exemple entier, en fleurettes ou finement haché.
    broccoli_variety:
      name: Variété de brocoli
      description: Indique le cultivar ou la variété commerciale du brocoli, par exemple
        Tenderstem ou Romanesco.
    broom_head_material:
      name: Matériau de la tête du balai
      description: Indique la composition de la tête du balai, dont dépendent sa durabilité
        et ses caractéristiques de jeu.
    brush_format:
      name: Format du pinceau
      description: Indique le format physique de la brosse de ski ou snowboard, distinguant
        les blocs manuels et les formats rotatifs pour perceuse (roto wool, feutre,
        etc.).
    brush_shape:
      name: Forme du pinceau
      description: Précise la forme ou le profil du corps ou de la tête du pinceau,
        dont dépendent la surface de contact et la prise en main.
    brussel_sprout_preparation:
      name: Préparation des choux de Bruxelles
      description: Décrit la préparation physique ou le type de coupe des choux de
        Bruxelles.
    brussels_sprout_variety:
      name: Variété de choux de Bruxelles
      description: Précise le cultivar ou la variété de choux de Bruxelles, en tenant
        compte des variétés actuelles et à venir.
    bubble_blower_features:
      name: Caractéristiques de l’appareil à bulles
      description: Répertorie les caractéristiques fonctionnelles courantes des appareils
        à bulles.
    bubble_gun_bubble_output_modes:
      name: Modes de production de bulles du pistolet à bulles
      description: Indique les modes de fonctionnement du pistolet à bulles (simple,
        continu, multi-vitesse, etc.).
    bubble_machine_features:
      name: Caractéristiques de la machine à bulles
      description: Met en avant les fonctionnalités courantes des machines à bulles
        au-delà du fonctionnement de base.
    bubble_machine_items_included:
      name: Éléments inclus avec la machine à bulles
      description: Répertorie les principaux éléments fournis, par exemple la solution
        à bulles, les baguettes supplémentaires, la bandoulière ou la télécommande.
    bubble_output_rate:
      name: Débit de production de bulles
      description: Indique le débit approximatif ou qualitatif de production de bulles
        de l’appareil à bulles, par exemple faible, moyen ou élevé, et précise si
        ce débit est variable.
    bubble_solution_container_type:
      name: Type de contenant de solution à bulles
      description: Précise le mode d’alimentation ou d’utilisation de la solution
        à bulles avec le pistolet à bulles, par exemple avec réservoir interne, bouteille
        fixée ou bac de trempage séparé.
    bubble_toy_included_accessories:
      name: Accessoires inclus avec le jouet à bulles
      description: Liste les éléments couramment inclus avec le jouet à bulles (solution,
        plateau, baguettes de rechange, etc.).
    buckwheat_processing_method:
      name: Méthode de transformation du sarrasin
      description: Décrit le traitement appliqué au sarrasin avant la vente, par exemple
        grillé, germé ou soufflé.
    buckwheat_product_form:
      name: Format du produit à base de sarrasin
      description: Présentation physique spécifique du sarrasin couvrant les formes
        non incluses dans la liste générique (flocons, soufflés, sachets instantanés,
        etc.).
    bug_collecting_kit_items_included:
      name: Articles inclus dans le kit de collecte d'insectes
      description: Outils et supports pédagogiques inclus dans un kit de collecte
        d’insectes.
    built_in_storage_type:
      name: Type de rangement intégré
      description: Identifie les types de rangement intégrés au cadre du lit superposé
        (tiroirs, étagères, rangements dans l’escalier, etc.).
    bumper_finish:
      name: Finition du pare-chocs
      description: Précise le traitement de surface ou la finition du pare-chocs.
    bumper_sensor_cutouts:
      name: Découpes pour capteurs de pare-chocs
      description: Indique les ouvertures ou découpes d’assistance OEM incluses ou
        prises en charge par le pare-chocs.
    bunk_bed_configuration:
      name: Configuration du lit superposé
      description: Précise la configuration du lit superposé et les dimensions de
        matelas associées.
    buoyancy:
      name: Flottabilité
      description: Indique le comportement de flottabilité de l’appât ou du leurre
        dans l’eau (flottant, coulant, suspendu, etc.).
    burkini_pieces_included:
      name: Pièces de burkini incluses
      description: Répertorie les pièces fournies dans l’ensemble de burkini pour
        que les clientes sachent précisément ce qu’elles achètent.
    burn_rate:
      name: Vitesse de combustion
      description: Décrit la vitesse de combustion du papier à rouler une fois allumé.
    bus_model_type:
      name: Type de bus miniature
      description: Identifie la configuration ou le type réel de bus représenté par
        la maquette (carrosserie, catégorie d’usage, etc.).
    bust_design:
      name: Conception du buste
      description: Indique la conception de la partie buste du body et le niveau de
        couvrance du décolleté (open-bust, soutien-gorge intégré, plongeant, etc.).
    butter_variety:
      name: Variété de beurre
      description: Indique le mode de fabrication ou le type distinctif du beurre,
        par exemple beurre fermenté, beurre doux, beurre de style européen, beurre
        clarifié (ghee) ou beurre de lactosérum.
    buttermilk_variety:
      name: Variété au babeurre
      description: Indique le type ou la forme du babeurre vendu, par exemple fermenté,
        traditionnel ou en poudre.
    button_application:
      name: Mode de fixation du bouton
      description: Précise l’usage prévu pour le bouton, par exemple pour les vêtements
        ou l’ameublement.
    button_attachment_type:
      name: Type de fixation par bouton
      description: Précise la construction du bouton prévue pour sa fixation au tissu,
        par exemple à trous traversants ou à queue, et non le type de fermeture.
    button_finish:
      name: Finition du bouton
      description: Décrit la finition ou l’aspect de la surface du bouton, par exemple
        mat ou brillant.
    buttonhole_elastic_application:
      name: Usage de l’élastique à boutonnières
      description: Usage principal prévu de l’élastique décoratif à rabattre.
    cab_type:
      name: Type de cabine
      description: Précise la configuration de la cabine du camion.
    cabasa_construction_type:
      name: Type de construction Cabasa
      description: Indique la construction ou le style du corps de la cabasa et de
        son assemblage de chaînes et de perles.
    cabbage_variety:
      name: Variété de chou
      description: Indique le cultivar ou le type de chou, par exemple chou vert,
        chou napa ou chou de Savoie, selon la saveur, la texture et l’usage culinaire
        recherchés.
    cabinet_door_style:
      name: Style de porte d’armoire
      description: Décrit le design du panneau de porte de meuble (type Shaker, panneau
        surélevé, etc.) pour correspondre au style de cuisine recherché.
    cabinet_overlay_type:
      name: Type de recouvrement du meuble
      description: Précise le positionnement des portes par rapport à la structure
        du meuble.
    cable_end_type:
      name: Cable end type
      description: Décrit la forme ou le type d’embout ou de raccord d’extrémité du
        câble qui se connecte aux leviers de frein ou de changement de vitesse.
    cable_housing_construction:
      name: Construction de la gaine de câble
      description: Décrit la conception structurelle de la gaine (en spirale, sans
        compression, à maillons segmentés, etc.), influençant la résistance à la compression,
        la flexibilité et les sensations de conduite.
    cable_housing_liner_type:
      name: Type de revêtement interne de la gaine de câble
      description: Indique si la gaine comprend un revêtement interne, un traitement
        de lubrification ou les deux, ainsi que le matériau ou la technologie utilisés
        pour réduire les frottements et améliorer la résistance aux intempéries.
    cable_management_type:
      name: Type de gestion des câbles
      description: Indique les fonctionnalités intégrées de gestion des câbles ou
        de l’alimentation proposées par la table de conférence.
    cable_surface_treatment:
      name: Traitement de surface du câble
      description: Identifie tout revêtement ou traitement spécial appliqué au câble
        pour limiter l’usure ou la corrosion.
    cabochon_back_type:
      name: Type de dos de cabochon
      description: Indique le profil ou la finition du dos du cabochon, qui détermine
        les méthodes de sertissage ou de collage compatibles.
    cacao_bean_variety:
      name: Variété de fèves de cacao
      description: Indique la variété botanique ou le cultivar de la fève de cacao
        utilisée.
    cacao_roast_level:
      name: Niveau de torréfaction du cacao
      description: Décrit le degré de torréfaction du cacao avant le broyage.
    cage_package_type:
      name: Type d’emballage de la cage
      description: Définit les composants inclus à l’achat, par exemple le filet seul,
        le kit de cadre ou l’ensemble complet.
    cajon_body_shell_material:
      name: Matériau du corps/de la caisse du cajón
      description: Identifie le matériau du corps/de la caisse du cajón, hors plaque
        de frappe (tapa).
    cajon_corner_control_system:
      name: Système de réglage des angles du cajón
      description: Indique si le cajón permet un réglage sonore des coins (par ex.
        via des vis d’angle) afin de modifier la réponse des slaps.
    cajon_corner_edge_design:
      name: Conception des angles ou des bords du cajón
      description: Décrit la construction des angles ou des bords, qui joue sur le
        confort et la jouabilité.
    cajon_feet_type:
      name: Type de pieds du cajón
      description: Indique le type de pieds du cajón et leur impact sur la stabilité
        et le son.
    cajon_snare_adjustability:
      name: Réglage du timbre du cajón
      description: Indique si l’effet de timbre peut être réglé et selon quels paramètres,
        tension, enclenchement ou les deux.
    cajon_snare_system_type:
      name: Type de système de timbre du cajón
      description: Indique le mécanisme interne de timbre utilisé pour produire l’effet
        de caisse claire.
    cake_shape:
      name: Forme du gâteau
      description: Décrit le format de cuisson du gâteau au café.
    cake_topping:
      name: Garniture pour gâteau
      description: Identifie la garniture ou finition principale appliquée au gâteau
        au café.
    cake_type:
      name: Type de gâteau
      description: Décrit le style ou la variété de gâteau (quatre-quarts, génoise,
        cheesecake, etc.).
    caliper_mount_type:
      name: Type de montage de l’étrier
      description: Définit la norme d’interface du cadre ou de la fourche compatible
        avec l’étrier de frein, par exemple Post Mount ou Flat Mount.
    caliper_mounting_standard:
      name: Norme de montage de l’étrier
      description: Indique l’interface ou le standard de montage (Flat Mount, Post
        Mount, IS, etc.) utilisé pour fixer l’étrier de frein au cadre ou à la fourche
        du vélo.
    camera_mounting_location_vehicle_exterior:
      name: Emplacement de montage de la caméra à l’extérieur du véhicule
      description: Indique l’emplacement prévu des caméras sur le véhicule (calandre
        avant, arrière, rétroviseurs latéraux, etc.).
    camouflage_environment_type:
      name: Type d’environnement de camouflage
      description: Indique l’environnement principal auquel le motif de camouflage
        est destiné, par exemple le milieu boisé, le désert ou les marais.
    camping_oil_application:
      name: Utilisation de l'huile de camping
      description: Indique l’usage principal prévu de l’huile pour le camping, par
        exemple combustible pour lanterne ou pour réchaud.
    camshaft_construction:
      name: Construction de l’arbre à cames
      description: Type de fabrication ou d’ébauche de l’arbre à cames.
    camshaft_material:
      name: Matériau de l’arbre à cames
      description: Matériau principal du noyau ou du corps de l’arbre à cames, c’est-à-dire
        le matériau de base.
    camshaft_position:
      name: Position de l’arbre à cames
      description: Précise l’emplacement ou le type prévu de l’arbre à cames dans
        le moteur, par exemple l’admission, l’échappement, une rangée de cylindres
        ou une position précise.
    candle_container_type_included:
      name: Type de récipient de bougie inclus
      description: Indique le type de récipient(s) pour bougie inclus avec le kit,
        le cas échéant.
    candle_dye_form:
      name: Forme du colorant pour bougie
      description: Indique la forme physique du colorant utilisé pour la fabrication
        de bougies.
    candle_fragrance_form:
      name: Forme du parfum pour bougie
      description: Indique le type ou la forme de parfum destiné à la fabrication
        de bougies.
    candle_making_tool_type:
      name: Type d’outil de fabrication de bougies
      description: Identifie le type d’outil de fabrication de bougies proposé (pot
        de coulée, outil de centrage de mèche, thermomètre, etc.).
    candy_texture:
      name: Texture du bonbon
      description: Décrit la sensation en bouche ou la consistance du bonbon, indépendamment
        de son goût ou de sa forme.
    candying_method:
      name: Méthode de confisage
      description: Décrit le mode de confisage ou de conservation du fruit dans le
        sucre, par exemple cristallisé, glacé ou au sirop.
    canned_meat_form:
      name: Forme de la viande en conserve
      description: Classe la forme transformée ou la présentation de la viande dans
        l’emballage.
    canoe_construction_type:
      name: Type de construction du canoë
      description: Indique le type de construction de la coque du canoë (rigide, gonflable,
        pliable, etc.).
    canoe_hull_shape:
      name: Forme de coque du canoë
      description: Définit la section transversale principale ou le profil du fond
        de coque, influençant la stabilité et la maniabilité.
    canoe_stern_design:
      name: Conception de la poupe du canoë
      description: Définit le type de poupe de la coque, déterminant pour la compatibilité
        avec le moteur et la maniabilité.
    canopy_type:
      name: Type de canopée
      description: Décrit le style de baldaquin ou de couverture supérieure inclus
        avec le lit cabana.
    canvas_compatible_media:
      name: Support compatibles avec la toile
      description: Précise les techniques artistiques compatibles avec la toile.
    canvas_format:
      name: Format de la toile
      description: Indique si la toile imprimable est vendue en feuilles, en rouleaux
        ou en panneaux prédécoupés.
    canvas_mounting_format:
      name: Montage/format de la toile
      description: Indique le format physique ou le type de montage de la toile à
        peindre.
    canvas_stretcher_assembly_type:
      name: Type d’assemblage du châssis de toile
      description: Indique si le châssis est vendu assemblé, sous forme de cadre,
        ou en barres ou kit à assembler.
    canvas_stretcher_corner_joint_type:
      name: Type d’assemblage des coins du châssis de toile
      description: Indique la manière dont les coins du châssis sont assemblés (tenon-mortaise,
        joint à entures, agrafé, à clés, etc.).
    canvas_surface_tone:
      name: Teinte de la surface de la toile
      description: Indique la couleur de base de la surface apprêtée de la toile (fond),
        et non le motif imprimé (blanc, noir, teinté, etc.).
    canvas_weave_type:
      name: Type de tissage de la toile
      description: Décrit la structure du tissage de la toile et son impact sur l’application
        de la peinture.
    cap_attachment_style:
      name: Type de fixation du bouchon
      description: Indique le style de construction ou de fixation du couvre-bec de
        saxophone, influençant la protection et l’ajustement dans l’étui.
    cap_construction:
      name: Construction du bouchon
      description: Indique la manière dont la base de la perruque est construite (lace
        front, full lace, hand-tied, etc.), ce qui influence le réalisme, le confort
        et la polyvalence de coiffage.
    cap_crown_structure:
      name: Structure de la calotte du casque
      description: Indique si la calotte du casque est structurée (rigide) ou non
        structurée (souple).
    cap_fit_type:
      name: Type d’ajustement du capodastre
      description: Définit le mode d’ajustement de la casquette sur la tête, par exemple
        ajustée ou réglable.
    cap_seal_type:
      name: Type de joint de bouchon
      description: Indique le composant d’étanchéité utilisé pour empêcher les fuites
        d’huile et de vapeur (joint torique, joint plat, etc.).
    cap_size:
      name: Taille de la casquette
      description: Libellés de taille standard indiquant le tour de tête compatible
        avec le bonnet de perruque.
    cap_type:
      name: Type de bouchon
      description: Type d’interface de bouchon ou de fermeture utilisée sur le réservoir
        de trop-plein.
    caper_size_grade:
      name: Classification de taille des câpres
      description: Catégorise les câpres selon des standards de calibre liés au diamètre
        des bourgeons.
    capo_clamping_mechanism:
      name: Mécanisme de serrage du capodastre
      description: Indique le type de mécanisme de serrage/d’actionnement utilisé
        pour appliquer la pression sur les cordes (mode d’utilisation du capodastre).
    capo_finish:
      name: Finition du capodastre
      description: Finition de surface du corps du capodastre, visuelle ou tactile,
        indépendamment de la couleur, par exemple mate ou brillante.
    capo_fit_type:
      name: Type d’ajustement du capodastre
      description: Indique le profil de manche pour lequel le capodastre est conçu
        (courbure, plat, etc.) pour assurer un serrage sans buzz et une bonne justesse.
    capo_pad_material:
      name: Matériau du coussinet du capodastre
      description: Précise le matériau du patin de contact en appui sur les cordes
        ou la touche, dont dépendent l’adhérence, la stabilité de l’accordage et le
        risque de marques sur la finition.
    capo_tension_mechanism:
      name: Mécanisme de tension du capodastre
      description: Précise le mode d’application et de réglage de la pression ou de
        la tension exercée sur les cordes par le capodastre coulissant.
    capture_method:
      name: Méthode de capture
      description: Indique si le piège est conçu pour une capture vivante ou une élimination
        létale.
    car_ev_conversion_kit_motor_type:
      name: Type de moteur du kit de conversion EV pour voiture
      description: Indique la technologie du moteur de traction incluse ou requise
        par le kit de conversion (induction AC, aimant permanent, etc.).
    car_playset_items_included:
      name: Éléments inclus dans le coffret de jeu de voitures
      description: Répertorie les principaux composants fournis avec le coffret de
        jeu de voitures, en plus de la structure de base, par exemple les voitures,
        les figurines ou les panneaux.
    car_shampoo_application_method:
      name: Méthode d’application du shampooing pour voiture
      description: Mode d’application du shampooing pendant le lavage.
    car_wash_solution_form:
      name: Formulaire de demande de solution pour lavage de voiture
      description: Précise la forme de la solution de lavage automobile, par exemple
        le liquide, la mousse ou les lingettes.
    car_wash_solution_scent:
      name: Parfum de la solution de lavage automobile
      description: Indique le parfum ou la senteur du produit de lavage automobile
        (si parfumé).
    carbonated_water_variety:
      name: Variété d’eau gazeuse
      description: Classe les eaux gazeuses selon les catégories du marché (tonic,
        seltzer, eau pétillante fonctionnelle, etc.).
    carbonation:
      name: Gazéification
      description: Décrit le niveau ou le style de gazéification de la boisson (plat,
        légèrement pétillant, pétillant, nitro, etc.).
    carburetor_barrel_count:
      name: Nombre de corps de carburateur
      description: Indique le nombre de corps ou d’alésages d’admission du carburateur.
    carburetor_choke_type:
      name: Type de starter de carburateur
      description: Indique le type de commande du starter utilisé par le carburateur.
    carburetor_mounting_flange_type:
      name: Type de bride de montage du carburateur
      description: Précise le type d’interface de montage du carburateur, pour assurer
        la compatibilité avec l’admission ou le collecteur, par exemple l’emboîtement,
        la bride ou l’entraxe de boulonnage.
    card_binder_page_type:
      name: Type de pages de classeur à cartes
      description: 'Pour les classeurs/portfolios : type de pages utilisées pour le
        rangement des cartes.'
    card_box_holder_type:
      name: Type de boîte ou support à cartes
      description: Indique le format fonctionnel du produit destiné à collecter ou
        contenir des cartes lors d’un événement (boîte, urne, panier, support, etc.).
    card_game_accessory_features:
      name: Caractéristiques des accessoires de jeu de cartes
      description: Caractéristiques fonctionnelles des accessoires de jeux de cartes
    card_lot_type:
      name: Type de lot de cartes
      description: Indique si le produit est une carte unique ou un lot/assortiment
        de cartes.
    card_sleeve_size_format_compatibility:
      name: Compatibilité des pochettes avec les tailles et formats de cartes
      description: Précise les formats de cartes compatibles avec les pochettes, les
        pages de rangement ou les boîtes pour decks.
    carding_surface_pin_material:
      name: Matière des picots de la surface de cardage
      description: Matériau des pointes ou des dents utilisées pour démêler et ouvrir
        la fibre.
    care_durability:
      name: Durabilité au lavage et à la chaleur
      description: Indique la résistance attendue de l’étiquette après application
        aux lavages et à la chaleur.
    care_label_attachment_type:
      name: Type de fixation de l’étiquette d’entretien
      description: Indique le mode d’application de l’étiquette d’entretien (cousue,
        thermocollée, adhésive, etc.).
    care_label_format:
      name: Format de l’étiquette d’entretien
      description: Format physique ou imprimé de l’étiquette d’entretien.
    care_label_symbol_system:
      name: Système de symboles d’entretien
      description: Normes ou jeu de symboles utilisés sur l’étiquette, par exemple
        les symboles d’entretien ISO ou les symboles ASTM/US.
    cargo_area_configuration:
      name: Configuration de l’espace de chargement
      description: Précise la configuration ou l’emplacement de la zone de chargement
        sur un vélo cargo, par exemple longtail, chargement avant ou tricycle.
    cargo_net_adjustability:
      name: Réglage du filet de chargement
      description: Indique si le filet de chargement peut être réglé et selon quelles
        modalités, pour ajuster sa tension ou son maintien.
    cargo_net_position:
      name: Position du filet de chargement
      description: Indique l’emplacement dans le coffre ou la zone de chargement où
        le filet est destiné à être installé ou utilisé.
    cargo_net_stretch_type:
      name: Type d’élasticité du filet de chargement
      description: Indique si le filet de coffre est élastique/extensible ou fixe/non
        extensible.
    cargo_net_style:
      name: Style de filet de chargement
      description: Spécifie le type de construction ou le format du filet de chargement,
        par exemple le cordon élastique, la sangle, la barrière ou le hamac.
    cargo_rack_finish:
      name: Finition du porte-bagages
      description: Finition ou revêtement extérieur du porte-bagages cargo.
    carpet_cleaner_application_method:
      name: Méthode d’application du nettoyant pour tapis
      description: Indique le mode d’application du produit sur la moquette et sa
        mise en œuvre.
    carrier_style:
      name: Type de support de transport
      description: Précise le type de support servant à transporter le bateau sur
        véhicule.
    carrot_size:
      name: Taille des carottes
      description: Classe le format général du produit à base de carottes.
    carrot_variety:
      name: Variété de carottes
      description: Identifie la variété ou le cultivar spécifique de la carotte.
    carrying_capacity_pairs_boards:
      name: Capacité de transport, en paires ou en planches
      description: Indique le nombre de skis (paires) ou de snowboards que l’accessoire
        permet de transporter ou de soutenir lorsqu’il est utilisé avec le rayonnage
        (par ex. kits d’extension).
    cartridge_thread_compatibility:
      name: Compatibilité du filetage des cartouches
      description: Indique le type de filetage pris en charge par le vaporisateur
        ou la batterie, garantissant la compatibilité entre les cartouches et les
        batteries.
    case_capacity_butts_shafts:
      name: Capacité de l’étui (talons et flèches)
      description: Définit le nombre de talons et de flèches de queue de billard que
        l’étui peut contenir, au format talons x flèches, par exemple 2 x 4 pour 2 talons
        et 4 flèches.
    case_features:
      name: Caractéristiques du boîtier
      description: Décrit les caractéristiques fonctionnelles de l’étui pour cymbale/batterie
        liées à la protection et au transport.
    case_humidifier_refill_type:
      name: Type de recharge d’humidificateur d’étui
      description: Indique si l’humidificateur fonctionne avec des recharges réutilisables
        (réhumidifiables/régénérables) ou jetables.
    case_lining_material:
      name: Matériau de revêtement de la coque
      description: Identifie le matériau principal de la doublure intérieure de l’étui
        ou de la housse, en contact avec l’instrument ou son contenu pour le protéger.
    case_material:
      name: Matériau du boîtier
      description: Identifie le matériau principal du boîtier de la montre, qui influence
        sa durabilité, son poids et son esthétique.
    case_mounting_method:
      name: Méthode de montage de l’étui
      description: Mode de positionnement ou de fixation de l’humidificateur à l’intérieur
        de l’étui de l’instrument.
    case_structure:
      name: Structure de l’étui
      description: Indique la rigidité de construction de l’étui.
    case_style_cymbal_drum:
      name: Style d’étui, cymbale/tambour
      description: Précise si le produit est une housse souple, un étui rigide ou
        un modèle hybride destiné au transport de cymbales ou de batteries.
    casing_material:
      name: Matériau du boîtier
      description: Identifie le tissu principal utilisé dans la carcasse du pneu,
        dont dépendent le poids, les sensations de roulage et la protection contre
        les crevaisons.
    casino_set_chip_material:
      name: Matériau des jetons du coffret de casino
      description: Matériau principal des jetons inclus, le cas échéant.
    casino_set_layout_included:
      name: Tapis de jeu inclus dans le coffret de casino
      description: Indique le type de surface ou tapis de jeu inclus avec le coffret.
    cask_finish:
      name: Finition en fût
      description: Indique le type de fût ou tonneau utilisé pour le vieillissement
        ou la finition du spiritueux (fût de bourbon, de sherry, etc.).
    cassava_variety:
      name: Variété de manioc
      description: Identifie le cultivar ou la variété spécifique de manioc proposé(e),
        influençant le goût, la couleur et les propriétés culinaires.
    cassette_body_type:
      name: Type de boîtier de cassette
      description: Norme de corps de roue libre ou de driver acceptée par le moyeu
        arrière ou la roue, par exemple HG 11, XDR ou Microspline.
    cassette_deck_feature_set:
      name: Fonctions du lecteur de cassettes
      description: Précise les fonctions de lecture et de défilement des lecteurs
        de cassettes pour autoradio.
    cassette_speed_compatibility:
      name: Vitesses de cassette compatible
      description: Indique le nombre de vitesses, par exemple 7 ou 12, pour lequel
        la cassette ou la roue libre est conçue, afin d’assurer la compatibilité avec
        la chaîne, la manette de changement de vitesse et le dérailleur.
    castanet_shell_size_class:
      name: Classe de taille des coques de castagnettes
      description: Indique la catégorie de taille standard des castagnettes couramment
        utilisée par les joueurs et enseignants pour choisir l’ajustement et la sonorité.
    castanets_included_pieces:
      name: Éléments inclus avec les castagnettes
      description: Indique les éléments inclus dans l’offre, par exemple une paire,
        une unité seule ou des accessoires supplémentaires.
    castanets_pitch:
      name: Hauteur des castagnettes
      description: Indique la désignation courante de hauteur ou de taille utilisée
        par les fabricants pour décrire la plage sonore.
    castanets_type:
      name: Type de castagnettes
      description: Indique le style ou la catégorie d’usage prévue des castagnettes.
    caster_type:
      name: Type de roulette
      description: Identifie le type de roulettes montées sur le chariot (pivotantes,
        verrouillables, etc.), influençant la maniabilité et la stabilité.
    castle_playset_included_items:
      name: Éléments inclus dans le coffret de jeu de château
      description: Présente les principaux éléments inclus dans le coffret de jeu
        de château afin que l’acheteur puisse comparer les coffrets (figurines, mobilier,
        véhicules, accessoires, etc.).
    catcher_equipment_included:
      name: Équipement de receveur inclus
      description: Précise les composants inclus dans le kit d’équipement de receveur,
        comme un casque ou un plastron de receveur.
    catcher_helmet_style:
      name: Style de casque de receveur
      description: Indique le style général du casque de protection du receveur.
    cattle_breed:
      name: Race bovine
      description: Indique la race bovine dont provient le bœuf, par exemple Angus,
        Wagyu ou Hereford.
    cauliflower_variety:
      name: Variété de chou-fleur
      description: Indique le cultivar, la couleur ou la variété particulière du chou-fleur
        vendu.
    celery_form:
      name: Forme du céleri
      description: Indique la forme physique ou le type de découpe sous lequel le
        céleri est vendu.
    celery_variety:
      name: Variété de céleri
      description: Indique le cultivar ou la variété de céleri, pour que les acheteurs
        puissent sélectionner les produits selon leur goût, leur couleur ou leur usage
        culinaire.
    cereal_bar_texture:
      name: Texture de la barre de céréales
      description: Décrit la sensation en bouche et la consistance de la barre de
        céréales (moelleuse, croquante, etc.).
    cereal_type:
      name: Type de céréales
      description: Catégorise la forme ou le format des céréales ou du granola (flocons,
        soufflés, amas de granola, muesli, etc.) afin d’aider l’acheteur à trouver
        la texture ou la méthode de préparation préférée.
    certificate_border_style:
      name: Style de bordure du certificat
      description: Décrit le traitement décoratif de la bordure utilisée sur le certificat.
    certificate_personalization_type:
      name: Type de personnalisation du certificat
      description: Précise le mode de personnalisation du certificat, par exemple
        vierge pour une inscription manuscrite, modèle imprimable ou préimprimé avec
        champs variables.
    certification_service:
      name: Service de certification
      description: Société tierce de notation ou de certification, le cas échéant.
    certification_standard:
      name: Norme de certification
      description: Indique la certification ou la norme de conformité en matière de
        sécurité et de résistance au feu applicable à la cagoule.
    chain_coating_finish:
      name: Revêtement/finition de la chaîne
      description: Précise le traitement de surface ou la finition appliqués à la
        chaîne pour améliorer sa durabilité, réduire les frottements, prévenir la
        corrosion ou modifier son aspect, par exemple le nitrure de titane, le DLC,
        le nickel ou l’EPT antirouille.
    chain_connection_type:
      name: Type de raccord de chaîne
      description: Précise le mode de fermeture fourni ou requis pour joindre les
        extrémités de la chaîne.
    chain_tier_configuration:
      name: Configuration des rangs de chaîne
      description: Spécifie le nombre/l’agencement des rangs de chaîne dans le dispositif
        de capture (simple, double ou triple).
    chain_tool_type:
      name: Type d’outil pour chaîne
      description: Catégorise les différents types d’outils pour chaîne de vélo afin
        d’aider les acheteurs à trouver rapidement l’outil adéquat.
    chainring_shape:
      name: Forme du plateau
      description: Indique la forme du plateau, par exemple ronde, ovale ou elliptique.
    chair_accessories_included:
      name: Accessoires pour chaises inclus
      description: Liste les accessoires intégrés ou inclus qui améliorent la fonctionnalité
        de la chaise.
    chair_sash_care_instructions:
      name: Instructions d’entretien de la housse décorative de chaise
      description: Décrit la méthode de nettoyage/d’entretien recommandée pour la
        housse de chaise.
    chair_sash_finish:
      name: Finition de la housse de chaise
      description: Décrit l’aspect/la finition de surface de la housse de chaise.
    chair_storage_design:
      name: Conception du rangement de la chaise
      description: Indique la manière dont la chaise longue est conçue pour être rangée
        (pliable, empilable, non pliable) afin d’évaluer son encombrement et son transport.
    chaise_or_sectional_orientation:
      name: Orientation de la méridienne
      description: Indique le côté sur lequel se trouve la méridienne intégrée ou
        la section étendue lorsque le canapé est vu de face.
    chamber_size:
      name: Taille de la chambre
      description: Indique la taille ou le volume de la chambre de l’embouchure, qui
        joue sur la résistance et le timbre.
    chanter_finger_spacing:
      name: Espacement des trous de la chanterelle
      description: Indique le profil de taille ou l’espacement des trous de la chanterelle
        (standard, petites mains ou grandes mains).
    chanter_type:
      name: Sing-along version
      description: Style ou configuration du tuyau mélodique fourni avec l’instrument
        ou utilisé par celui-ci, par exemple à extrémité ouverte, à extrémité fermée,
        d’entraînement ou à clés.
    chard_variety:
      name: Variété de blettes
      description: Identifie le cultivar ou la variété colorée spécifique de blettes
        commercialisée.
    charging_port_location:
      name: Emplacement du port de charge
      description: Emplacement physique du port de recharge externe principal du véhicule.
    chassis_construction_type:
      name: Type de construction du châssis
      description: Décrit la méthode principale de construction du châssis utilisée
        pour le véhicule.
    checkbook_loading_orientation:
      name: Orientation de chargement du chéquier
      description: Indique si la couverture du chéquier est compatible avec les formats
        de chèques à chargement par le haut, à chargement latéral ou universel.
    cheekpiece_style:
      name: Style de branches de mors
      description: Définit le type de configuration des branches/anneaux du mors simple,
        qui détermine l’action des rênes et la stabilité latérale.
    cheese_alternative_form:
      name: Forme du substitut de fromage
      description: Indique la forme physique ou le type de découpe sous lequel le
        substitut de fromage est commercialisé.
    cheese_form:
      name: Forme du fromage
      description: Décrit la présentation du fromage, par exemple en meule, en bloc,
        en tranches ou râpé.
    cheese_texture:
      name: Texture du fromage
      description: Catégorise le fromage selon sa texture générale ou sa fermeté.
    cheese_variety:
      name: Variété de fromage
      description: Indique le type de fromage utilisé comme saveur principale de l’en-cas.
    cherimoya_variety:
      name: Variété de chérimole
      description: Indique le cultivar ou la variété de chérimole, par exemple Fino
        de Jete ou El Bumpo.
    cherry_variety:
      name: Variété de cerise
      description: Indique le cultivar ou la variété des cerises afin d’aider les
        acheteurs à choisir des types spécifiques selon leur saveur, couleur, taille
        ou usage culinaire prévu.
    chest_pocket_style:
      name: Style de poche poitrine
      description: Indique la présence et la configuration des poches poitrine sur
        la chemise.
    chewing_tobacco_form:
      name: Forme du tabac à chiquer
      description: Identifie la forme, le type de coupe ou le format du sachet du
        tabac à mâcher, par exemple en feuilles libres, à coupe longue ou en sachet
        fin.
    chicory_variety:
      name: Variété de chicorée
      description: Identifie la variété ou le cultivar spécifique de chicorée commercialisé
        (radicchio, endive belge, scarole, etc.).
    chiffon_recommended_use:
      name: Usage recommandé du chiffon
      description: Applications principales recommandées du tissu en mousseline pour
        la couture ou le loisir créatif.
    child_seat_accessory_type:
      name: Catégorie d’accessoire de siège enfant
      description: Définit le type précis d’accessoire ou de pièce de rechange pour
        siège enfant, par exemple le coussin d’assise, le repose-pieds ou l’adaptateur
        de montage, afin de cibler rapidement l’article recherché sans multiplier
        les microcatégories.
    child_seat_mounting_type:
      name: Type de montage du siège enfant
      description: Spécifie le mode de fixation du siège enfant pour vélo au cadre,
        au porte-bagages ou à la zone du poste de pilotage.
    chime_sound_character:
      name: Caractère sonore du carillon
      description: Décrit le caractère sonore ou le timbre recherché pour les carillons.
    chin_cup_type:
      name: Type de coque mentonnière
      description: Indique le style ou la construction de la mentonnière, influençant
        le confort et la protection contre les impacts.
    chin_strap_type:
      name: Chin strap type
      description: Spécifie le type de sangle mentonnière d’un chapeau (aucune, fixe,
        réglable ou amovible) afin d’aider les acheteurs à choisir un modèle qui reste
        bien en place par temps venteux ou lors d’activités physiques.
    china_cymbal_edge_shape:
      name: Forme du bord de la cymbale china
      description: Décrit le profil du bord/rebord typique des cymbales de type china
        (degré de relevé du rebord), influençant la sensation et le son.
    china_cymbal_sound_character:
      name: Caractère sonore de la cymbale china
      description: Principaux descripteurs du caractère sonore/de la tonalité d’une
        cymbale china utilisés pour la recherche et le filtrage (par ex. trash, sombre,
        brillant). Plusieurs valeurs peuvent s’appliquer.
    chinstrap_type:
      name: Type de sangle mentonnière
      description: Style de sangle mentonnière équipée sur le casque.
    chip_cut_style:
      name: Type de coupe des chips
      description: Indique le type de coupe ou la texture des chips (par ex. ondulées,
        cuites au chaudron, soufflées).
    chip_denomination:
      name: Valeurs faciales des jetons
      description: Indique les valeurs faciales des jetons inclus dans le coffret
        (imprimées ou attribuées).
    chocolate_form:
      name: Forme du chocolat
      description: Décrit la forme physique sous laquelle le chocolat pâtissier est
        commercialisé.
    choy_sum_variety:
      name: Variété de choy sum
      description: Identifie la variété botanique ou commerciale du choy sum proposée
        à la vente.
    cigar_wrapper_color:
      name: Couleur de la cape du cigare
      description: Indique la catégorie de couleur normalisée de la feuille de cape
        du cigare.
    cigarette_filter_type:
      name: Type de filtre de cigarette
      description: Indique si la cigarette possède un filtre et, le cas échéant, la
        construction ou la caractéristique particulière de ce filtre.
    cigarette_size:
      name: Taille de cigarette
      description: Catégorise les cigarettes selon la terminologie normalisée de longueur
        ou de format (par ex. king size, 100s, slim).
    cigarette_strength_descriptor:
      name: Descripteur d’intensité de la cigarette
      description: Désignation commerciale d’intensité traditionnellement utilisée
        par les marques pour indiquer la teneur en goudron ou en nicotine, par exemple
        Light, Bold ou Silver.
    cinch_liner_material:
      name: Matériau de la doublure de sangle
      description: Indique le matériau utilisé pour la doublure ou le rembourrage
        en contact avec le cheval.
    circular_knitting_needle_cable_type:
      name: Type de câble d’aiguilles à tricoter circulaires
      description: Matériau/comportement et construction du câble (par ex. acier revêtu,
        nylon) influençant la mémoire de forme, les torsions et comportement en pliage/rotation.
    circular_knitting_needles_tip_material:
      name: Matériau des pointes d’aiguilles à tricoter circulaires
      description: Matériau des deux pointes d’aiguille, distinct du matériau du câble.
    circumference_adjustment_mechanism:
      name: Mécanisme de réglage de la circonférence
      description: Mécanisme utilisé pour régler ou bloquer la circonférence de l’écheveau.
    clamp_design:
      name: Conception de la pince
      description: Décrit la conception ou le mécanisme de la pince.
    clamp_sheet_music_clip_features:
      name: Caractéristiques des clips de maintien pour partitions
      description: Fonctions de protection et de maintien des clips de maintien pour
        partitions (par ex. rembourrage, antidérapant, pivotant).
    clamping_closure_type:
      name: Type de serrage/fermeture
      description: Indique le mécanisme utilisé pour serrer ou fixer le cercle à broder
        sur le tissu.
    clarinet_bell_acoustic_design:
      name: Conception acoustique du pavillon de clarinette
      description: Décrit la conception acoustique et l’aération du pavillon, prévues
        pour agir sur la réponse et l’intonation.
    clarinet_bell_adjustment_mechanism:
      name: Mécanisme de réglage du pavillon de clarinette
      description: Décrit la manière dont la longueur ou la géométrie du pavillon
        est ajustée.
    clarinet_bell_ring_material:
      name: Matériau de l’anneau de pavillon de clarinette
      description: Indique le matériau de l’anneau/la bague de protection situé(e)
        sur le bord du pavillon de la clarinette, le cas échéant.
    clarinet_bell_tuning_effect:
      name: Effet d’accord du pavillon de clarinette
      description: Indique comment le pavillon influe sur la justesse ou l’intonation,
        notamment pour les notes de gorge et le registre grave, par rapport à un pavillon
        standard.
    clarinet_body_type:
      name: Type de corps de clarinette
      description: Indique le principal type de construction du corps de la clarinette
        en la.
    clarinet_bore_type:
      name: Type de perce de clarinette
      description: Décrit la conception de la perce de la clarinette alto.
    clarinet_cap_style:
      name: Style de couvre-bec de clarinette
      description: Style de conception du couvre-bec fourni avec une ligature de clarinette
        ou un couvre-bec, par exemple inversé ou ventilé.
    clarinet_care_kit_intended_use:
      name: Utilisation recommandée du kit d’entretien pour clarinette
      description: Contexte d’utilisation principal du kit, par exemple le séchage
        quotidien rapide ou le nettoyage et l’entretien en profondeur.
    clarinet_included_accessories:
      name: Accessoires fournis avec la clarinette
      description: Indique le contenu fourni avec la clarinette en si bémol.
    clarinet_keywork_material:
      name: Matériau des clés de clarinette
      description: Précise le matériau du mécanisme de clés de la clarinette, par
        exemple le laiton, le maillechort ou le métal plaqué argent.
    clarinet_keywork_plating:
      name: Galvanisation des clés de clarinette
      description: Précise le placage ou la finition des clés de la clarinette.
    clarinet_mouthpiece_baffle_profile:
      name: Profil du déflecteur du bec de clarinette
      description: Décrit le profil interne du déflecteur/toit du bec de clarinette
        qui influence la clarté et la puissance du son.
    clarinet_mouthpiece_beak_shape:
      name: Forme du bec de clarinette
      description: Indique le profil ou l’angle extérieur du bec pour le confort de
        jeu et la sensation au niveau de l’embouchure.
    clarinet_mouthpiece_chamber_size:
      name: Volume de la chambre d'un bec de clarinette
      description: Décrit la taille relative de la chambre du bec de clarinette, telle
        qu’elle est indiquée par le fabricant, avec une incidence possible sur le
        timbre et la résistance de jeu.
    clarinet_mouthpiece_intended_tone:
      name: Sonorité prévue du bec de clarinette
      description: Décrit l’orientation sonore générale mise en avant pour le bec.
    clarinet_mouthpiece_player_level:
      name: Niveau de joueur du bec de clarinette
      description: Indique le niveau de pratique généralement visé pour le bec.
    clarinet_reed_cut:
      name: Coupe de l’anche de clarinette
      description: Précise la coupe ou le profil de l’anche, par exemple limée ou
        non limée, ainsi que les autres coupes commercialisées, qui jouent sur la
        réponse et le timbre.
    clarinet_reed_material_type:
      name: Type de matériau des anches de clarinette
      description: Indique le matériau de fabrication de l’anche (roseau naturel ou
        synthétique et principaux sous-types synthétiques).
    clarinet_thumb_rest_type:
      name: Type de repose-pouce de clarinette
      description: Type ou caractéristique du repose-pouce pour la main droite.
    classical_guitar_string_3rd_string_type:
      name: Type de troisième corde de guitare classique
      description: Précise si la corde G (3e corde) est lisse (monofilament) ou filée.
    classical_guitar_string_bass_winding_material:
      name: Matériau du filage des cordes graves de guitare classique
      description: Matériau de filage ou d’enroulement utilisé sur les cordes basses,
        généralement les cordes 4 à 6.
    classical_guitar_string_set_configuration:
      name: Configuration du jeu de cordes de guitare classique
      description: Indique si le produit correspond à un jeu complet ou à certaines
        cordes de guitare classique, généralement côté aigus ou côté basses.
    clay_modeling_dough_base_material:
      name: Matériau de base de l’argile et de la pâte à modeler
      description: Formulation principale ou type de base du matériau de modelage.
    clay_modeling_dough_curing_method:
      name: Méthode de durcissement de l’argile et de la pâte à modeler
      description: Mode de prise ou de durcissement du matériau, ou capacité à rester
        réutilisable, dont dépendent les outils nécessaires et les usages habituels.
    clay_paintability:
      name: Possibilité de peindre l’argile
      description: Indique si la surface d’argile durcie peut être peinte ainsi que
        les types de peinture recommandés.
    clay_primary_composition:
      name: Composition principale de l’argile
      description: Matériau de base ou liant principal de l’argile autodurcissante,
        par exemple à base de papier ou de minéraux.
    clay_shooting_discipline:
      name: Discipline de tir aux plateaux
      description: Indique la discipline ou l’épreuve de tir aux plateaux à laquelle
        le produit est destiné.
    cleaner_format:
      name: Format du nettoyant
      description: Le conditionnement/format du produit nettoyant pour coulisse.
    cleaner_sanitizer_intended_area:
      name: Zone d’utilisation prévue du nettoyant/désinfectant
      description: Partie principale de l’instrument à cuivre que le produit est destiné
        à nettoyer/désinfecter.
    cleaning_formula:
      name: Formule de nettoyage
      description: Précise la principale famille chimique de nettoyage ou de désinfection
        du produit, et non la marque, pour filtrer les produits selon la sécurité,
        la compatibilité et l’usage.
    cleaning_task_focus:
      name: Type de tâche de nettoyage
      description: Identifie les principaux problèmes de nettoyage que le lavage sans
        eau est censé résoudre.
    cleanup_method:
      name: Méthode de nettoyage
      description: Précise la méthode recommandée pour retirer la colle fraîche des
        mains, surfaces et outils.
    clear_glue_application_method:
      name: Méthode d’application de la colle transparente
      description: Indique le type de distributeur/applicateur inclus avec l’emballage
        de la colle transparente.
    clear_glue_finish_after_drying:
      name: Finition de la colle transparente (après séchage)
      description: Décrit l’aspect de la colle une fois sèche ou durcie, par exemple
        parfaitement transparente ou translucide, brillante ou mate.
    cleat_bolt_pattern:
      name: Entraxe des boulons de crampon
      description: Indique la configuration de fixation des cales, déterminant la
        compatibilité avec les pédales et chaussures (2 trous VTT, 3 trous route,
        etc.).
    cleat_compatibility:
      name: Compatibilité avec les crampons
      description: Indique les systèmes de pédales ou de cales compatibles avec la
        protection de chaussures.
    cleat_finish:
      name: Finition de la bitte d’amarrage
      description: Indique la finition ou le revêtement de la bitte d’amarrage, influençant
        la résistance à la corrosion et l’apparence.
    cleat_receptacle_system:
      name: Système de logement des crampons
      description: Identifie l’interface de fixation compatible des pointes ou des
        crampons des chaussures de golf à crampons.
    cleat_release_mechanism:
      name: Mécanisme de déverrouillage des crampons
      description: Indique la manière dont la cale de vélo se déclipse de la pédale
        (déclenchement simple ou multidirectionnel, etc.).
    cleat_stud_type:
      name: Type de crampon
      description: Indique le type de construction ou de fixation des crampons sur
        la semelle des chaussures de football américain.
    climate_control_module_function:
      name: Fonction du module de climatisation
      description: Indique le rôle principal du module dans le système de climatisation
        du véhicule.
    climbing_hold_mounting_type:
      name: Système de fixation de la prise d’escalade
      description: Précise le mode de fixation de la prise au mur ou au panneau d’entraînement.
    climbing_hold_type:
      name: Type de prise d'escalade
      description: Classe la forme ou le type de prise, qui détermine la préhension.
    climbing_protection_device_type:
      name: Type de dispositif d'assurage
      description: Indique le type de dispositif de protection (cam, nut, piton, etc.),
        afin d’aider les grimpeurs à choisir rapidement l’équipement adapté à un type
        de roche ou de grimpe.
    climbing_rope_middle_marking:
      name: Repère central de la corde d’escalade
      description: Indique le système de repérage du milieu (et/ou des extrémités)
        de la corde afin de faciliter les descentes et rappels en toute sécurité.
    climbing_rope_treatment:
      name: Finition de la corde d’escalade
      description: Précise les traitements de protection ou d’imperméabilisation appliqués
        à la corde.
    climbing_rope_type:
      name: Type de corde d’escalade
      description: Classe la corde selon sa certification UIAA et son usage prévu,
        par exemple corde à simple dynamique, corde à double, corde jumelée, corde
        statique ou cordelette, afin que les acheteurs trouvent rapidement la corde
        adaptée à leur activité.
    climbing_safety_certifications:
      name: Certifications de sécurité en escalade
      description: Liste les normes de sécurité pour l’escalade et l’industrie auxquelles
        le dispositif est conforme.
    clip_color:
      name: Couleur de la pince
      description: Couleur principale de la pince de maintien pour partitions.
    clip_mechanism_type:
      name: Type de mécanisme à clip
      description: Définit le mécanisme de fermeture utilisé par une pince à billets
        ou un portefeuille à pince à billets, pour distinguer les modèles magnétiques,
        à ressort, à levier et autres.
    clip_style:
      name: Style de pince
      description: Identifie le type de pince utilisé pour fixer le support et fournit
        les informations de compatibilité correspondantes, par exemple pince crocodile
        ou mousqueton.
    clipper_motor_technology:
      name: Technologie du moteur de la tondeuse
      description: Identifie la conception du moteur utilisé dans la tondeuse, influençant
        la puissance, le niveau sonore, la durabilité et l’entretien.
    closet_configuration:
      name: Aménagement de placard
      description: Définit la forme ou la configuration générale du dressing (par
        exemple, en forme de L, en forme de U, avec îlot).
    closing_mechanism:
      name: Mécanisme de fermeture
      description: Précise le mode de fermeture du tiroir, par exemple la fermeture
        standard, amortie, automatique ou par pression.
    cloth_construction:
      name: Fabrication en tissu
      description: Indique le tissage ou la finition du drap de billard, qui affecte
        la vitesse de jeu et la durabilité (peigné ou laineux).
    cloth_thickness:
      name: Épaisseur du tissu
      description: Indique la classe d’épaisseur ou de grammage du chiffon de polissage.
    club_head_material:
      name: Matériau de la tête de club
      description: Indique le matériau principal utilisé pour la fabrication de la
        tête du club.
    clutch_hydraulic_system_type:
      name: Type de système hydraulique d’embrayage
      description: Indique la compatibilité avec le système de commande d’embrayage
        ou le circuit hydraulique, par exemple l’embrayage hydraulique ou la conversion
        par câble.
    clutch_line_connection_type:
      name: Type de raccordement de conduite d’embrayage
      description: Précise l’interface de raccordement d’extrémité utilisée par la
        conduite d’embrayage, importante pour la compatibilité avec le maître-cylindre,
        le cylindre récepteur et les conduites rigides.
    clutch_pressure_plate_actuation_type:
      name: Type d'actionnement du plateau de pression d'embrayage
      description: Indique si l’embrayage est commandé par un mécanisme de débrayage
        poussé ou tiré (actionnement du ressort diaphragme).
    clutch_pressure_plate_release_mechanism_type:
      name: Type de mécanisme de débrayage du plateau de pression d’embrayage
      description: Type d’interface de débrayage/actionnement utilisé par le plateau
        de pression.
    clutch_pressure_plate_surface_type:
      name: Type de surface du plateau de pression d’embrayage
      description: Type de face de contact par friction du plateau de pression.
    clutch_slave_cylinder_connection_type:
      name: Type de raccordement du cylindre récepteur d'embrayage
      description: Interface de raccordement hydraulique sur le cylindre récepteur
        (port fileté, raccord rapide, banjo, etc.).
    clutch_slave_cylinder_mounting_type:
      name: Type de montage du cylindre récepteur d’embrayage
      description: Indique le mode de fixation du cylindre récepteur sur la transmission/cloche
        d’embrayage (boulonné, clipsé, concentrique intégré, etc.).
    coating_type:
      name: Type de revêtement
      description: Indique le revêtement extérieur, le filet ou le glaçage appliqué
        à la barre de céréales, par exemple le chocolat ou le yaourt.
    cocking_mechanism:
      name: Mécanisme d'armement
      description: Indique la méthode ou le dispositif principal utilisé pour armer
        ou désarmer la corde de l’arbalète.
    cocktail_garnish_form:
      name: Présentation de la garniture de cocktail
      description: Décrit la manière dont la garniture est présentée ou préparée pour
        l’utilisation (fraîche, déshydratée, etc.).
    cocktail_mix_variety:
      name: Variété de mélange à cocktail
      description: Indique le cocktail spécifique que le mélange permet de préparer,
        par exemple Margarita, Mojito ou Piña Colada.
    cocktail_napkin_features:
      name: Caractéristiques des serviettes à cocktail
      description: Met en avant les caractéristiques fonctionnelles, pratiques et
        écologiques des serviettes à cocktail.
    cocktail_pick_tip_style:
      name: Type de pointe du pic à cocktail
      description: Décrit la forme ou la caractéristique de la pointe utilisée pour
        percer ou maintenir les garnitures de cocktail.
    cocktail_pick_top_handle_style:
      name: Style de tête ou de poignée du pic à cocktail
      description: Décrit la forme de la partie supérieure décorative ou de la poignée
        utilisée pour la prise en main ou la présentation.
    cocktail_type:
      name: Type de cocktail
      description: Indique la recette ou le style de cocktail correspondant au mélange
        prêt à servir, par exemple Margarita, Negroni ou Piña Colada.
    cocktail_umbrella_handle_pick_material:
      name: Matériau de la poignée ou du pique d’ombrelle à cocktail
      description: Matériau de la tige/du pic du parasol à cocktail (hors ombrelle).
    cocoa_processing_method:
      name: Procédé de transformation du cacao
      description: Indique le procédé de transformation de la poudre de cacao (naturel,
        procédé hollandais, cacao noir, etc.).
    cocoa_product_form:
      name: Forme du produit à base de cacao
      description: Définit la forme sous laquelle le produit à base de cacao est vendu.
    coconut_husk_status:
      name: État de décorticage de la noix de coco
      description: Indique le degré de retrait de l’enveloppe ou de la coque externe
        de la noix de coco, influençant la facilité d’utilisation, le stockage et
        la quantité de déchets.
    coconut_maturity_stage:
      name: Stade de maturité de la noix de coco
      description: Indique le stade de développement de la noix de coco au moment
        de la récolte, déterminant pour la saveur, la teneur en eau et l’usage culinaire,
        par exemple pour boire ou pour cuisiner.
    coconut_oil_refinement_type:
      name: Type de raffinage de l’huile de coco
      description: Précise le degré de raffinage ou la qualité de l’huile de coco,
        par exemple vierge, raffinée, TCM ou fractionnée.
    coconut_preparation_form:
      name: Forme de préparation de la noix de coco
      description: Précise le mode de préparation ou de découpe de la noix de coco,
        par exemple entière, tranchée, râpée ou en purée, pour orienter rapidement
        les acheteurs vers le format adapté aux recettes ou aux en-cas.
    coffee_bean_species:
      name: Espèces de grains de café
      description: Indique l’espèce de grains de café utilisés dans le produit.
    coffee_beverage_variety:
      name: Variété de boisson à base de café
      description: Classe les boissons à base de café prêtes à consommer ou à mélanger
        selon leur style.
    coffee_processing_method:
      name: Procédé de traitement du café
      description: Indique la technique de traitement post-récolte utilisée sur les
        grains de café.
    coil_material:
      name: Matériau de la bobine
      description: Spécifie le matériau principal ou le type de maille utilisé dans
        la résistance chauffante, influençant la saveur, la longévité et la compatibilité
        avec le contrôle de température.
    coil_spring_design:
      name: Conception du ressort hélicoïdal
      description: Spécifie la raideur ou la forme du ressort hélicoïdal, dont dépend
        le comportement dynamique du véhicule.
    coil_spring_finish_coating:
      name: Finition ou revêtement du ressort hélicoïdal
      description: Finition de surface ou revêtement appliqué contre la corrosion.
    coil_spring_material:
      name: Matériau du ressort hélicoïdal
      description: Matériau principal ou composition principale du ressort hélicoïdal.
    coil_system_type:
      name: Type de système de ressorts
      description: Détaille le système de ressorts utilisé dans les matelas concernés,
        comme les ressorts ensachés ou Bonnell.
    coil_type:
      name: Type de bobine
      description: Décrit la construction ou la technologie de la bobine utilisée,
        ce qui influence la production de vapeur et la saveur.
    coin_grade_numismatic:
      name: Grade de la pièce (numismatique)
      description: Grade normalisé de la pièce, par exemple selon l’échelle de Sheldon
        ou un grade adjectival.
    coin_strike_or_finish:
      name: Frappe ou finition de la pièce
      description: Type de frappe ou finition de la pièce (ex. circulation, proof).
    coin_strike_type:
      name: Type de frappe de la pièce
      description: Décrit le type de frappe/finition de la pièce (par ex. proof, circulation).
    collar_style:
      name: Style de col
      description: Définit la forme du col ou de l’encolure du vêtement.
    collectible_gun_accessories_included:
      name: Accessoires inclus avec l’arme de collection
      description: Liste les accessoires et documents inclus avec l’arme de collection
        (étui, holster, baïonnette, documents, etc.).
    collectible_gun_firing_mechanism:
      name: Mécanisme de tir de l’arme de collection
      description: Spécifie le type de mécanisme de tir ou d’allumage de l’arme de
        collection (notamment armes anciennes et historiques).
    collectible_knife_blade_finish:
      name: Finition de lame du couteau de collection
      description: Décrit la finition ou le traitement de surface de la lame pour
        son aspect visuel et, dans certains cas, sa résistance à la corrosion.
    color_code_system:
      name: Système de code couleur
      description: Identifie le système de code couleur utilisé pour la référence
        numérique des fils (ex. DMC, Anchor), le cas échéant.
    color_coding_standard:
      name: Système de codification des couleurs
      description: Indique si la plaque respecte un système de code couleur international
        (IWF, IPF) ou un autre schéma.
    color_effect:
      name: Effets de couleur
      description: Spécifie les techniques ou effets de couleur appliqués aux extensions
        de cheveux.
    color_family:
      name: Famille de couleurs
      description: Famille de couleur de haut niveau pour l’encre sumi (utile lorsque
        la couleur est trop précise, ex. noir chaud vs noir bleuté).
    color_finish:
      name: Finition couleur
      description: Spécifie la finition des composants visibles du garde-main (par
        exemple, mat ou brillant) lorsque la couleur seule est insuffisante.
    coloring_finish:
      name: Finition de coloration
      description: Précise le rendu visuel ou l’effet spécial produit par la coloration,
        par exemple métallique ou néon.
    comb_material:
      name: Matériau du peigne
      description: Matériau du peigne de l’harmonica (corps formant les chambres d’air).
    comb_type:
      name: Type de peigne
      description: Classe les brosses de pansage pour chevaux selon leur fonction
        principale (étrille, brosse à crinière, peigne de toilettage), afin de faciliter
        la recherche.
    combat_shorts_cut_style:
      name: Coupe des shorts de combat
      description: Indique le style de coupe ou de coupe ajustée spécifique aux shorts
        de sports de combat (ex. coupe haute, coupe rétro, compression).
    comic_creator_role:
      name: Rôle du créateur de bande dessinée
      description: Spécifie le rôle du créateur crédité dans l’annonce (ex. auteur,
        artiste).
    commemorative_coin_finish:
      name: Finition des pièces commémoratives
      description: Décrit le type de frappe ou de finition d’une pièce commémorative.
    commemorative_coin_mint_mark:
      name: Marque de l’atelier de frappe de la pièce commémorative
      description: Indique la présence (ou absence) de la marque d’atelier sur la
        pièce.
    commemorative_subject:
      name: Sujet commémoratif
      description: Sujet principal commémoré, par exemple un événement, une personne,
        un lieu, un anniversaire ou une organisation.
    commercial_vehicle_class:
      name: Catégorie de véhicules utilitaires
      description: Classe réglementaire ou sectorielle fondée sur le PTAC, utilisée
        pour décrire la catégorie de poids d’un véhicule utilitaire à des fins de
        navigation et de filtrage.
    compass_damping_medium:
      name: Milieu d’amortissement de la boussole
      description: Spécifie le milieu utilisé pour stabiliser le mouvement de l’aiguille
        dans la capsule de la boussole.
    compass_illumination_type:
      name: Type d’éclairage de la boussole
      description: Spécifie comment les marquages de la boussole sont rendus visibles
        en faible luminosité (ex. peinture luminescente, tritium, rétroéclairage LED).
    compass_mounting_style:
      name: Type de fixation de la boussole
      description: Indique le mode de port, de transport ou d’installation de la boussole.
    compass_scale_units:
      name: Unités de l’échelle de la boussole
      description: Indique les unités de mesure inscrites sur le boîtier de la boussole,
        en degrés, en millièmes ou les deux.
    compatible_abs_system:
      name: Système de freinage ABS compatible
      description: Indique si le maître-cylindre est destiné aux véhicules équipés
        de l’ABS.
    compatible_adapter_brand:
      name: Marque d’adaptateur compatible
      description: Indique la marque de tête de club de golf dont le manche est préconfiguré
        pour recevoir l’adaptateur.
    compatible_airbag_system_type:
      name: Type de système d'airbag compatible
      description: Indique la génération ou les fonctionnalités du système d’airbag
        avec lesquelles la pièce est compatible (ex. monoétage ou biétage).
    compatible_amplifier_fit_method:
      name: Méthode de compatibilité de montage de l’amplificateur
      description: Indique comment la compatibilité de la housse ou de l’étui est
        définie, par exemple selon un ajustement universel, un modèle spécifique ou
        les dimensions.
    compatible_apparatus:
      name: Équipement compatible
      description: Spécifie l’appareil de gymnastique ou l’activité pour laquelle
        les poignées sont conçues.
    compatible_archery_tool:
      name: Outil de tir à l’arc compatible
      description: Indique l’outil ou l’équipement principal de tir à l’arc avec lequel
        l’accessoire est compatible.
    compatible_axle_size:
      name: Dimensions d'essieu compatibles
      description: Précise le diamètre de moyeu ou d’axe, ou la norme de filetage,
        avec lequel le repose-pied est compatible, par exemple 10 mm/3⁄8 po, 14 mm
        ou 3/8 po 26 TPI.
    compatible_axle_type:
      name: Type d'essieu compatible
      description: Identifie les standards de fixation d’axe arrière compatibles avec
        le home-trainer (ex. blocage rapide ou axes traversants).
    compatible_axle_weight_rating:
      name: Charge nominale par essieu compatible
      description: Spécifie la capacité de charge par essieu (poids maximal par essieu)
        pour laquelle le système de frein de remorque est conçu.
    compatible_bait_type:
      name: Type d'appât compatible
      description: Identifie les types d’appâts de pêche compatibles avec l’outil
        de perçage d’appâts, permettant de choisir un outil adapté.
    compatible_bass_scale_length:
      name: Longueur de diapason de basse compatible
      description: Indique la ou les longueurs d’échelle de basse pour lesquelles
        le jeu de cordes est conçu (important pour la longueur d’enroulement et l’ajustement).
    compatible_battle_top_system:
      name: Système de toupie de combat compatible
      description: Identifie l’écosystème ou la série de toupies de combat pour laquelle
        la toupie est conçue (pour garantir la compatibilité des pièces et de l’arène).
    compatible_bb_size:
      name: Taille de boîtier compatible
      description: Indique le diamètre des billes d’airsoft compatibles avec le produit.
    compatible_bed_frame_style:
      name: Style de cadre de lit compatible
      description: Spécifie le style de lit ou de cadre pour lequel l’accessoire est
        conçu.
    compatible_bicycle_tire_type:
      name: Type de pneu de vélo compatible
      description: Spécifie les types de pneus de vélo que le produit peut réparer
        ou étanchéifier.
    compatible_bike_component:
      name: Composant de vélo compatible
      description: Précise le composant du vélo que l’outil ou le produit est destiné
        à entretenir.
    compatible_billiard_game:
      name: Jeu de billard compatible
      description: Identifie le ou les formats de jeu de billard pour lesquels le
        triangle est conçu, afin de garantir la compatibilité avec le jeu.
    compatible_billiard_table_size:
      name: Taille de table de billard compatible
      description: Spécifie la ou les longueurs standard de table pour lesquelles
        la housse est conçue, afin de garantir un bon ajustement.
    compatible_bit_type:
      name: Type de mèche compatible
      description: Types de mors avec lesquels la protection peut être utilisée.
    compatible_blade_hosel:
      name: Emboîture de lame compatible
      description: Indique le type de manchon ou de conicité de lame accepté par le
        manche, pour assurer un bon ajustement entre le manche et la lame.
    compatible_blade_system:
      name: Système de lames compatibles
      description: 'Indique le système ou format de lame de remplacement compatible
        avec le couteau (ex. lame hobby #11, lame sécable).'
    compatible_boat_weaving_shuttle_loom:
      name: Métier à tisser compatible avec la navette bateau
      description: Types de métiers à tisser compatibles avec la navette bateau.
    compatible_bobbin_type:
      name: Type de bobine compatible
      description: Indique le type de canette ou de bobine prévu pour la navette bateau.
    compatible_bottle_mouth:
      name: Goulot de bouteille compatible
      description: Type ou diamètre de goulot de bouteille compatible avec la paille
        ou le bouchon.
    compatible_bow_attachment_system:
      name: Système de fixation d’arc compatible
      description: Indique le système de connexion des branches ou accessoires d’arc
        compatible (ILF, vis, démontage rapide).
    compatible_bow_crossbow_type:
      name: Type d’arc/arbalète compatible
      description: Indique le type d’arc ou d’arbalète auquel l’accessoire est destiné.
    compatible_brake_fluid:
      name: Liquide de frein compatible
      description: Spécifications DOT du liquide de frein avec lesquelles les joints
        ou les matériaux du maître-cylindre sont compatibles.
    compatible_brake_pad:
      name: Plaquette de frein compatible
      description: Indique les compositions de plaquettes de frein pour lesquelles
        le disque est homologué, garantissant la sécurité et une usure optimale.
    compatible_brake_service_system:
      name: Système de service de frein compatible
      description: Précise si la pièce est destinée aux freins à disque, aux freins
        à tambour ou aux deux.
    compatible_brake_system:
      name: Système de freinage compatible
      description: Spécifie les informations clés de compatibilité du système pour
        l’utilisation du liquide de frein.
    compatible_brake_type:
      name: Type de frein compatible
      description: Précise le type de frein avec lequel le porte-bagages est compatible,
        par exemple à disque ou sur jante.
    compatible_brass_instrument_finish:
      name: Finition compatible avec les instruments en laiton
      description: Indique les types de finitions d’instruments à cuivre compatibles
        avec le nettoyant sans risque d’endommagement.
    compatible_building_toy_system:
      name: Système de jeu de construction compatible
      description: Indique le système ou standard de construction avec lequel le jouet
        est compatible (ex. compatible LEGO ou système propriétaire).
    compatible_capo_fretboard_radius:
      name: Rayon de touche compatible avec le capodastre
      description: Spécifie le rayon de touche du manche pour lequel le capodastre
        est conçu afin d’assurer un contact optimal et une bonne stabilité d’accordage.
    compatible_capo_number_of_strings:
      name: Nombre de cordes compatible avec le capodastre
      description: Indique le nombre de cordes que le capodastre peut serrer (6, 7,
        8, 12 cordes et instruments spécifiques).
    compatible_cardio_machine_type:
      name: Type d'appareil de cardio compatible
      description: Indique le type d’appareil de cardio avec lequel l’accessoire ou
        la pièce est compatible.
    compatible_chain_link_type:
      name: Type de maillon de chaîne compatible
      description: Identifie le type de maillon de chaîne pris en charge par l’outil
        (standard, demi-maillon, attache rapide, etc.).
    compatible_chain_size:
      name: Format de canette compatible
      description: Précise les normes de largeur ou de pas de chaîne prises en charge
        par l’outil, par exemple 1/8 po ou 3/32 po.
    compatible_chain_width:
      name: Largeur de chaîne compatible
      description: Indique les tailles de chaîne compatibles avec la roue libre.
    compatible_chip_denomination:
      name: Dénominations de jetons compatibles
      description: Indique les valeurs de jetons pour lesquelles le plateau ou l’étui
        dispose d’emplacements dédiés ou étiquetés (ou qu’il est conçu pour organiser).
    compatible_clarinet_mouthpiece_ligature:
      name: Ligature compatible pour bec de clarinette
      description: Indique la norme d’ajustement de la ligature ou les remarques de
        compatibilité pour le bec.
    compatible_classical_guitar_string_scale_length:
      name: Longueur de diapason des cordes de guitare classique compatible
      description: Compatibilité du jeu avec le diapason ou la longueur de corde de
        la guitare.
    compatible_clay_target_size:
      name: Taille de cible en argile compatible
      description: Répertorie les tailles ou formes de plateaux d’argile que le lanceur
        accepte pour un ajustement et des performances adéquats.
    compatible_cleat_system:
      name: Système de crampons compatible
      description: Indique le standard de fixation des cales compatible avec la pédale
        pour assurer la compatibilité chaussures/pédales.
    compatible_clipless_pedal_system:
      name: Système de pédales automatiques compatible
      description: Identifie le standard de cales/pédales automatiques auquel le produit
        est destiné.
    compatible_clutch_type:
      name: Type d’embrayage compatible
      description: Compatibilité de l’interface d’embrayage du volant moteur, le cas
        échéant.
    compatible_coffee_pod_system:
      name: Système de dosettes de café compatible
      description: Spécifie la machine à café ou le système d’infusion pour lequel
        les dosettes ou capsules sont conçues.
    compatible_construction_set_system:
      name: Système de jeu de construction compatible
      description: Indique le système ou l’écosystème de construction avec lequel
        l’ensemble est compatible (ex. LEGO, DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Pique ou support compatible pour clarinette contrebasse
      description: Indique l’interface de support ou de fixation sur pied/cheville
        requise.
    compatible_coolant_chemistry:
      name: Composition chimique compatible du liquide de refroidissement
      description: Spécifie les familles de liquides de refroidissement avec lesquelles
        l’additif est formulé pour être compatible.
    compatible_cooling_system_material:
      name: Matériau compatible du système de refroidissement
      description: Spécifie les systèmes ou matériaux de refroidissement pour lesquels
        le rinçage radiateur est sûr (ex. radiateurs aluminium, systèmes mixtes).
    compatible_crib_format:
      name: Format compatible avec les berceaux
      description: Définit la catégorie générale de taille ou de forme du matelas
        ou du drap pour lequel l’accessoire est conçu.
    compatible_cross_stitch_fabric_count:
      name: Nombre de fils de tissu compatible pour le point de croix
      description: Nombre de fils de tissu recommandé pour broder le motif.
    compatible_cross_stitch_frame:
      name: Cadre pour point de croix compatible
      description: Indique l’usage pour lequel le cadre est conçu (tenue à la main,
        support de table, support au sol ou universel).
    compatible_crossbar:
      name: Barre transversale compatible
      description: Indique la compatibilité avec les barres transversales de toit,
        incluant leurs profils et formes standard.
    compatible_cycling_cleat:
      name: Cale de pédale de vélo compatible
      description: Spécifie le système de cales ou de pédales avec lequel les chaussures
        de cyclisme sont conçues pour fonctionner.
    compatible_cymbal_size:
      name: Dimensions compatibles des cymbales
      description: Spécifie le diamètre de cymbale prévu (ou maximum) pour lequel
        l’étui est conçu, sans inclure le diamètre extérieur de l’étui.
    compatible_device_type:
      name: Type d'appareil compatible
      description: Indique le type d’appareil que le support est destiné à recevoir,
        par exemple un moniteur ou un téléviseur, une tablette, un smartphone ou un
        lecteur DVD portable.
    compatible_dock_structure_type:
      name: Type de structure de quai compatible
      description: Structure de quai sur laquelle les marches sont destinées à être
        montées.
    compatible_dough_type:
      name: Type de pâte compatible
      description: Spécifie les types ou marques de pâte avec lesquels les outils
        sont conçus pour fonctionner (pâte à modeler standard, pâte de modélisation,
        etc.).
    compatible_drawing_ink_surface:
      name: Surface compatible avec l’encre à dessin
      description: Indique les surfaces ou substrats recommandés pour de meilleures
        performances.
    compatible_drivetrain_brand:
      name: Marque de transmission compatible
      description: Répertorie les marques de systèmes de transmission ou de freinage
        avec lesquelles le câble est compatible.
    compatible_drivetrain_speeds:
      name: Vitesses de transmission compatibles
      description: Spécifie le nombre de vitesses de transmission (ex. 10 vitesses)
        pris en charge par le pédalier ou le plateau.
    compatible_equipment:
      name: Compatible equipment
      description: Spécifie le type d’équipement de sports d’hiver que l’étau est
        conçu pour maintenir.
    compatible_evap_system:
      name: Système EVAP compatible
      description: Indique si le bouchon de carburant respecte les exigences du système
        EVAP (ex. joint conforme OEM) afin de limiter les voyants moteur.
    compatible_exercise_bike_style:
      name: Style de vélo d’exercice compatible
      description: Indique les types de vélos d’appartement auxquels l’accessoire
        ou la pièce de rechange est adapté.
    compatible_fencing_weapon:
      name: Arme d’escrime compatible
      description: Précise l’arme ou la discipline d’escrime à laquelle la veste ou
        le lamé est destiné.
    compatible_fiber_type:
      name: Type de fibre compatible
      description: Types de fibres que la cardeuse à tambour est destinée à traiter
        efficacement.
    compatible_fin_box_system:
      name: Système de boîtier d'aileron compatible
      description: Identifie le système de boîtier ou de fixation compatible avec
        l’aileron afin d’assurer la compatibilité avec la planche de surf (ex. FCS
        II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Compatible fingerboard radius
      description: Indique le profil de radius de touche compatible avec le capodastre
        (plat, arrondi ou composé) afin d’assurer une pression uniforme et une réduction
        des buzz.
    compatible_finish_type:
      name: Type de finition compatible
      description: Indique les types de finition d’instrument sur lesquels le spray
        est présenté comme sûr.
    compatible_fishing_reel_type:
      name: Type de moulinet de pêche compatible
      description: Précise le type de moulinet de pêche avec lequel l’accessoire est
        compatible, par exemple un moulinet spinning, baitcasting ou de pêche à la
        mouche.
    compatible_fly_line_weight:
      name: Poids de soie compatible
      description: Indique les poids de soie AFTMA que la bobine peut recevoir.
    compatible_flywheel_type:
      name: Type de volant d'inertie compatible
      description: Indique le type de volant moteur compatible avec le plateau de
        pression d’embrayage.
    compatible_football_kick_type:
      name: Type de coup de pied de football compatible
      description: Identifie les situations de frappe pour lesquelles le produit est
        conçu (ex. kickoff, field goal), afin d’aider les athlètes à trouver l’équipement
        adapté.
    compatible_fuel_system_type:
      name: Type de système d'alimentation compatible
      description: Indique le système d’alimentation carburant compatible avec le
        nettoyant.
    compatible_gas_type:
      name: Type de gaz compatible
      description: Indique le type de gaz comprimé que le réservoir d’air de paintball
        peut contenir.
    compatible_gel_wax_additives:
      name: Additifs de cire en gel compatibles
      description: Indique les types d’additifs compatibles avec cette cire en gel
        (type de colorant, inclusions, etc.).
    compatible_glaze_layering:
      name: Compatibilité de superposition d’émail
      description: Indique si l’émail est prévu pour être superposé à d’autres émaux
        afin de produire des effets.
    compatible_golf_bag_type:
      name: Type de sac de golf compatible
      description: Indique les formats de sacs de golf auxquels la housse ou l’étui
        est adapté.
    compatible_ground_polarity:
      name: Polarité de mise à la masse compatible
      description: Indique si le régulateur de tension est destiné aux systèmes électriques
        de véhicules à masse négative ou à masse positive, ou s’il est insensible
        à la polarité.
    compatible_guitar_body_shape:
      name: Forme de corps de guitare compatible
      description: Indique le type de corps ou la forme de guitare auquel l’étui est
        adapté.
    compatible_guitar_case:
      name: Étui de guitare compatible
      description: Indique les types d’étuis de guitare compatibles avec l’humidificateur
        afin d’assurer un bon fonctionnement.
    compatible_guitar_scale_length:
      name: Longueur de manche compatible
      description: Indique les longueurs de diapason compatibles avec le jeu de cordes,
        en fonction de la longueur de filage et de la longueur totale.
    compatible_gun_platform:
      name: Plateforme compatible pour arme
      description: Indique la plateforme ou le système d’alimentation compatible avec
        le produit (AEG, GBB, HPA, etc.).
    compatible_hair_length:
      name: Longueur de cheveux compatible
      description: Précise la longueur ou le volume maximal de cheveux avec lequel
        l’article reste confortable à porter.
    compatible_head_and_neck_restraint_system:
      name: Compatibilité avec système de retenue de tête et de cou
      description: Indique si le casque comporte des ancrages et/ou est compatible
        avec les systèmes de retenue de tête et de cou (HANS, etc.), ainsi que le
        statut des points d’ancrage.
    compatible_helmet_certification_standard:
      name: Norme de certification de casque compatible
      description: Indique les normes de sécurité ou certifications de casque que
        l’accessoire est conçu pour respecter ou prendre en charge (ex. les tear-offs
        de compétition font souvent référence à des règlements spécifiques).
    compatible_helmet_shell_size:
      name: Taille de coque de casque compatible
      description: Indique la ou les tailles de coque de casque avec lesquelles une
        pièce intérieure de remplacement est compatible (les tailles de coque correspondent
        souvent à des plages comme XS–S, M, L–XL).
    compatible_helmet_size:
      name: Taille de casque compatible
      description: Indique les tailles de casque avec lesquelles le masque facial
        est compatible.
    compatible_helmet_type:
      name: Type de casque compatible
      description: Catégorie de casque compatible avec le support cervical.
    compatible_hitch_receiver_size:
      name: Taille de support d’attelage compatible
      description: Taille de l’ouverture du récepteur d’attelage avec laquelle l’accessoire
        est conçu pour être compatible (pour accessoires de porte-bagages montés sur
        attelage).
    compatible_hook_size:
      name: Taille d'hameçon compatible
      description: Système(s) de tailles de crochets et/ou plage de tailles compatibles
        avec l’organiseur (ex. tailles US lettres/chiffres, plage métrique en mm).
    compatible_horse_coat_type:
      name: Type de robe de cheval compatible
      description: Spécifie les caractéristiques du pelage de cheval pour lesquelles
        l’outil de débourrage est le plus adapté (ex. pelage d’hiver épais ou pelage
        sensible).
    compatible_host_platform:
      name: Plateforme hôte compatible
      description: Spécifie les plateformes hôtes ou types d’appareils avec lesquels
        le contrôleur à pads est compatible (ex. Windows, macOS, iOS, Android) ou
        s’il peut fonctionner de manière autonome sans ordinateur.
    compatible_inflation_gas:
      name: Gaz de gonflage compatible
      description: Précise si le ballon est prévu pour être gonflé à l’air, à l’hélium
        ou avec les deux.
    compatible_injection_type:
      name: Type d’injection compatible
      description: Indique le système d’injection de carburant que le produit est
        destiné à nettoyer.
    compatible_instrument_surface_material:
      name: Surface ou matériau d’instrument compatible
      description: Indique les surfaces ou matériaux d’instruments sur lesquels le
        produit de polissage est destiné à être utilisé.
    compatible_intercom_system:
      name: Système d'interphone compatible
      description: Indique la compatibilité ou la prédisposition du casque pour le
        montage ou l’installation d’un système d’intercom/de communication.
    compatible_interior_material:
      name: Matériau intérieur compatible
      description: Indique les matériaux de l’habitacle sur lesquels le détachant
        peut être utilisé sans risque ou avec efficacité, par exemple la moquette,
        la sellerie textile, le cuir ou le vinyle.
    compatible_kayak_type:
      name: Type de kayak compatible
      description: Répertorie les grands types de kayaks sur lesquels le kit de voile
        est destiné à être monté.
    compatible_license_plate_hole_pattern:
      name: Entraxe de fixation de plaque d’immatriculation compatible
      description: Indique la configuration des trous de fixation compatible avec
        le support ou porte-plaque (côté véhicule et/ou plaque).
    compatible_license_plate_size:
      name: Taille de plaque d’immatriculation compatible
      description: Indique les formats de plaque d’immatriculation, selon la région
        ou les dimensions, auxquels le support ou porte-plaque est adapté.
    compatible_loom:
      name: Métier à tisser compatible
      description: Précise les types de métiers à tisser avec lesquels le peigne de
        tissage plat est destiné à être utilisé.
    compatible_loom_type:
      name: Type de faisceau compatible
      description: Indique la configuration de tissage avec laquelle le peigne est
        destiné à être utilisé, par exemple un métier à peigne rigide ou un métier
        à tapisserie.
    compatible_machine_type:
      name: Type de machine compatible
      description: Indique le type de configuration de matelassage avec lequel le
        cadre est compatible, par exemple le matelassage à la main uniquement, une
        machine à coudre domestique ou une machine à matelasser à bras long.
    compatible_mast_type:
      name: Type de mât compatible
      description: Précise si la voile est conçue pour un mât à diamètre réduit (RDM),
        à diamètre standard (SDM) ou pour les deux.
    compatible_model_system_train_scale:
      name: Système de modélisme compatible (échelle de train)
      description: Précise, le cas échéant, l’échelle ou le système de train miniature
        auquel l’accessoire est adapté, par exemple HO, N ou O.
    compatible_mounting_surface:
      name: Surface de montage compatible
      description: Surface ou objet auquel la pince est destinée à se fixer.
    compatible_mouthpiece_patch:
      name: Protection de bec compatible
      description: Indique si le bec est conçu pour être utilisé avec des protège-becs,
        ainsi que la plage d’épaisseurs recommandée.
    compatible_mouthpiece_type:
      name: Type d'embout compatible
      description: Indique le type de bec/queue compatible avec le mellophone (cor
        français ou trompette selon les modèles).
    compatible_neck_profile_width:
      name: Profil ou largeur de manche compatible
      description: Indique la catégorie de profil ou de largeur de manche de guitare
        à laquelle le capodastre est adapté, par exemple un manche étroit de guitare
        électrique ou un manche large de guitare classique.
    compatible_needle_size:
      name: Taille d'aiguille compatible
      description: Indique les tailles ou types d’aiguilles auxquels l’étui est adapté,
        par exemple les aiguilles à broder, à tapisserie ou à coudre à la main, selon
        leur longueur.
    compatible_needle_system:
      name: Système d'aiguilles compatible
      description: Systèmes d’aiguilles compatibles avec la machine, par exemple 130/705H.
    compatible_parking_brake_mechanism:
      name: Compatibilité de mécanisme de frein de stationnement
      description: Indique si l’étrier est conçu pour fonctionner avec un mécanisme
        de frein de stationnement intégré.
    compatible_pedal_instrument_type:
      name: Type d’instrument à pédale compatible
      description: Spécifie avec quel type d’appareil la pédale est destinée à être
        utilisée (ex. piano numérique, clavier/synthétiseur, contrôleur MIDI).
    compatible_pedal_type:
      name: Type de pédale compatible
      description: Indique le style ou système de pédale avec lequel la sangle ou
        le clip est conçu pour être compatible (ex. plateforme, SPD, Look Keo).
    compatible_pin_type:
      name: Type de broche compatible
      description: Indique les types d’épingles que le tapis accepte, ou s’il peut
        être épinglé.
    compatible_pipe_filter_size:
      name: Dimension de filtre de pipe compatible
      description: Indique le format ou le type de filtre compatible avec la pipe
        (ou l’absence de filtre requis).
    compatible_plate_size:
      name: Dimensions de plaque compatibles
      description: Dimensions de plaques balistiques ou tailles normalisées que le
        gilet peut recevoir.
    compatible_play_vehicle_scale:
      name: Échelle des véhicules de jeu compatibles
      description: Indique l’échelle de miniature compatible avec l’accessoire (1:64,
        etc.) pour assurer la compatibilité avec les collections et circuits.
    compatible_playing_surface:
      name: Surface de jeu compatible
      description: Indique le type de terrain ou de surface pour lequel les chaussures
        de football américain sont conçues.
    compatible_pole_dimensions:
      name: Dimensions de poteau compatibles
      description: Précise la taille de section du poteau à laquelle l’accessoire
        est adapté.
    compatible_pole_shape:
      name: Forme de poteau compatible
      description: Indique la forme de section du poteau ou de la colonne compatible
        avec le rembourrage.
    compatible_power_steering_system:
      name: Système de direction assistée compatible
      description: Indique les systèmes de direction compatibles avec le fluide.
    compatible_powerplant_type:
      name: Type de motorisation compatible
      description: Indique le système de propulsion du pistolet à billes auquel la
        pièce est destinée (par exemple, piston à ressort, CO2 ou PCP).
    compatible_presser_foot:
      name: Pied presseur compatible
      description: Précise le système de fixation ou de compatibilité du pied-de-biche
        pris en charge par la machine à coudre (par exemple, à clipser ou à visser ;
        à tige basse, haute ou inclinée). Utilisez l’option « Universal/Multiple »
        si plusieurs systèmes sont pris en charge ou si des adaptateurs sont inclus.
    compatible_protective_gear:
      name: Équipement de protection compatible
      description: Indique les équipements de protection compatibles avec la minerve.
    compatible_protective_gear_integration:
      name: Intégration compatible avec équipement de protection
      description: Décrit comment la protection doit être portée ou utilisée avec
        d’autres équipements de protection (poche intégrée, fixation autonome, etc.).
    compatible_punching_bag_type:
      name: Type de sac de frappe compatible
      description: Indique les types de sacs de frappe ou d’entraînement compatibles
        avec le produit.
    compatible_racing_discipline:
      name: Discipline de course compatible
      description: Discipline(s) de sport automobile auxquelles le casque est destiné
        ou pour lesquelles il est certifié.
    compatible_rc_scale:
      name: Échelle RC compatible
      description: Indique le rapport d’échelle RC (ex. 1:10) avec lequel l’accessoire
        ou la pièce est conçu pour être compatible.
    compatible_recorder_size:
      name: Taille d'enregistreur compatible
      description: Précise les tailles de flûte à bec auxquelles l’étui est adapté.
    compatible_recorder_type:
      name: Type d'enregistreur compatible
      description: Spécifie le type de flûte à bec (famille/taille) avec lequel l'accessoire
        est compatible (par exemple, soprano, alto).
    compatible_reed_cut:
      name: Coupe de lamelles compatible
      description: Précise le style de coupe d’anche avec lequel la ligature est compatible
        (par exemple, coupe limée/française ou coupe non limée/américaine).
    compatible_reed_type:
      name: Type de lamelle compatible
      description: Indique la coupe ou le type d’anche pour lequel le bec est conçu.
    compatible_reel_type:
      name: Type de combustible compatible
      description: Spécifie le style de moulinet de pêche pour lequel le sac, l’étui
        ou la housse est conçu.
    compatible_refrigerant_type:
      name: Type de réfrigérant compatible
      description: Indique le type réfrigérant avec lequel l’évaporateur de climatisation
        est conçu pour être utilisé.
    compatible_ride_equipment:
      name: Équipement de glisse compatible
      description: Types d’équipements de sports à roues auxquels la rampe est destinée.
    compatible_roof_height:
      name: Hauteur de toit compatible
      description: Indique le profil de toit pour lequel la housse est conçue (standard
        vs toit allongé/surélevé).
    compatible_roof_rail_type:
      name: Type de barres de toit compatible
      description: Indique le type de configuration de toit compatible avec le système
        de galerie de base.
    compatible_rope_count:
      name: Nombre de cordes compatible
      description: Indique le type de configuration de cordes de ring compatible avec
        la pièce (3 cordes, 4 cordes ou universel).
    compatible_rope_type:
      name: Type de corde compatible
      description: Détermine les constructions de corde utilisables avec l’appareil.
    compatible_saddle_type:
      name: Type de selle compatible
      description: Indique à quel style de selle ou à quelle discipline équestre l’accessoire
        est adapté, afin d’établir sa compatibilité avec les selles anglaises, western
        et autres.
    compatible_saxophone_size:
      name: Taille de saxophone compatible
      description: Indique la taille de saxophone avec laquelle le produit est compatible
        (par ex., soprano, alto, ténor).
    compatible_saxophone_type:
      name: Type de saxophone compatible
      description: Indique le type de saxophone compatible avec la ligature/le couvre-bec.
    compatible_scale_length:
      name: Longueur de diapason compatible
      description: Indique les longueurs de diapason de guitare compatibles avec les
        cordes (court, standard, baryton, etc.).
    compatible_seat_airbag:
      name: Airbag de siège compatible
      description: Indique si le siège prend en charge ou intègre des airbags latéraux,
        ou s’il est compatible avec les véhicules équipés d’airbags montés dans les
        sièges.
    compatible_seating_capacity:
      name: Nombre de places compatible
      description: Spécifie le nombre de sièges ou la configuration pour lesquels
        l’accessoire est conçu.
    compatible_sensor_port_type:
      name: Type de port de capteur compatible
      description: Indique si le carter d’huile peut recevoir des capteurs de niveau
        d’huile et/ou de température d’huile et, le cas échéant, le type d’orifice.
    compatible_shifter_type:
      name: Type de levier de vitesses compatible
      description: Indique à quel type ou à quelle configuration de levier de vitesses
        le soufflet est adapté.
    compatible_shis:
      name: Compatibilité SHIS
      description: Répertorie les codes du Standardized Headset Identification System
        (SHIS) compatibles avec la pièce (ex. IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Discipline de patinage compatible
      description: Indique la ou les disciplines de patinage compatibles avec la pièce
        ou l’accessoire.
    compatible_snowshoe_deck_type:
      name: Type de structure de raquette compatible
      description: Indique le type de structure ou de plateau de raquette compatible
        avec la fixation.
    compatible_special_effects_lighting_features:
      name: Compatibilité des fonctionnalités d’éclairage à effets spéciaux
      description: Met en avant les fonctionnalités courantes qui influencent les
        décisions d’achat pour les éclairages à effets (en dehors des couleurs/motifs),
        comme la liaison entre unités ou la réaction au son.
    compatible_spinning_wheel_drive_system:
      name: Système d’entraînement de rouet compatible
      description: Indique les systèmes d’entraînement de rouet avec lesquels l’accessoire
        est compatible.
    compatible_spoke_gauge:
      name: Calibre de rayon compatible
      description: Indique les calibres de fil de rayon compatibles avec les filetages
        des écrous de rayon, afin que les acheteurs puissent associer correctement
        les rayons et les écrous.
    compatible_steering_wheel_airbag:
      name: Airbag de volant compatible
      description: Indique si le volant permet de conserver un module d’airbag OEM
        (ou s’il est destiné à des applications sans airbag).
    compatible_steering_wheel_control_button:
      name: Bouton de commande au volant compatible
      description: Indique la compatibilité avec les commandes au volant d’origine
        (audio/régulateur de vitesse/téléphone) et le câblage associé.
    compatible_stencil_material:
      name: Matériau compatible pour pochoirs
      description: Matériaux que la machine peut transformer en pochoirs ou traiter
        (par exemple, papier, film plastique, mylar).
    compatible_stencil_media_format:
      name: Format de support pour pochoir compatible
      description: Indique les types de formats de supports de pochoirs compatibles
        avec la machine (feuilles, rouleaux ou les deux).
    compatible_strap_retractor:
      name: Rétracteur de sangle compatible
      description: Indique si la sangle est compatible avec des systèmes rétractables
        ou conçue pour des ceintures non rétractables (fixes).
    compatible_string_instrument_finish:
      name: Finition adaptée aux instruments à cordes
      description: Spécifie les types de finition d’instruments sur lesquels le polish
        peut être utilisé sans risque.
    compatible_substrate_material:
      name: Matériau de substrat compatible
      description: Les matériaux de surface sur lesquels la peinture est conçue pour
        adhérer.
    compatible_surface:
      name: Surface compatible
      description: Spécifie la surface/le matériau auquel l’adhésif autoagrippant
        est destiné à adhérer.
    compatible_surface_material:
      name: Matériau de surface compatible
      description: Types de surfaces de véhicule compatibles avec le produit.
    compatible_tear_off_system:
      name: Compatible tear-off system
      description: Indique si les lunettes sont compatibles avec les films détachables
        et/ou les films à enroulement, y compris si elles possèdent des ergots de
        fixation pour films détachables.
    compatible_thermostat_type:
      name: Type de thermostat compatible
      description: Indique si le boîtier de sortie d’eau est compatible avec un thermostat
        et, si oui, avec quel type ou quelle taille.
    compatible_thread:
      name: Fil compatible
      description: Indique les types de fils que l’enfile-aiguille est conçu pour
        enfiler, selon leur épaisseur ou leur nature.
    compatible_thread_spool_format:
      name: Format de fil/bobine compatible
      description: Indique les formats de fil que la boîte est conçue pour ranger
        (bobines, canettes, cartonnettes de fil à broder, cônes, etc.).
    compatible_thread_yarn_tool:
      name: Outil compatible pour fil et laine
      description: Compatibilité machine/système pour les outils qui se montent ou
        s’utilisent avec d’autres équipements (ex. machine à coudre, surjeteuse, métier
        à tisser, rouet).
    compatible_tire_application:
      name: Usage de pneu compatible
      description: Indique le type de roue/pneu pour lequel le démonte-pneu est conçu
        (et non le modèle de véhicule).
    compatible_tom_pad_mounting:
      name: Fixation compatible de tom électronique
      description: Spécifie le système de fixation du tom électronique (pince, tige,
        support, etc.) et sa compatibilité avec les systèmes existants.
    compatible_toy_vehicle_scale:
      name: Échelle compatible pour véhicules miniatures
      description: Indique l’échelle du véhicule miniature ou la taille approximative
        de véhicule avec laquelle le coffret de jeu est compatible.
    compatible_tpms_sensor_type:
      name: Type de capteur TPMS compatible
      description: Précise si la roue peut recevoir des capteurs TPMS et/ou tout type
        de valve ou de capteur requis.
    compatible_training_equipment:
      name: Matériel d'entraînement compatible
      description: Répertorie les types d’équipements d’entraînement ou de fitness
        qui peuvent être fixés au support.
    compatible_treadmill_design:
      name: Type de tapis de course compatible
      description: Précise le type de conception de tapis de course avec lequel l’accessoire
        est compatible, par exemple un modèle pliable ou non pliable.
    compatible_tube:
      name: Tube compatible
      description: Indique le type de chambre à air ou la construction de pneu auxquels
        la rustine est destinée, par exemple butyle, latex, TPU ou sans chambre à
        air.
    compatible_valve_type:
      name: Type de vanne compatible
      description: Indique les types de valves d’instruments à cuivre compatibles
        avec le lubrifiant.
    compatible_vaporizing_material:
      name: Type de matériau vaporisable compatible
      description: Spécifie les matériaux que l’appareil peut vaporiser.
    compatible_vehicle_windshield_fluid:
      name: Type de liquide de lave-glace compatible
      description: Indique la compatibilité avec les équipements de véhicule ou traitements
        de vitrage (hydrofuge, lave-phares, etc.).
    compatible_visor_system:
      name: Système de visière compatible
      description: Indique les systèmes de visière ou d’écran compatibles avec le
        casque moto.
    compatible_water_board_type:
      name: Type de planche aquatique compatible
      description: Indique les types de planches de sports nautiques compatibles avec
        le support.
    compatible_water_sport_board_type:
      name: Type de planche de sports nautiques compatible
      description: Liste les types de planches de sports nautiques compatibles avec
        le support.
    compatible_watercraft_communication_standard:
      name: Norme de communication compatible avec l’embarcation
      description: Indique les normes de communication marine ou protocoles d’intégration
        compatibles avec les systèmes électroniques embarqués.
    compatible_watercraft_engine_type:
      name: Type de moteur d’embarcation compatible
      description: Indique la configuration de propulsion pour laquelle la pièce est
        conçue (hors-bord, inboard, sterndrive, jet drive).
    compatible_weight_plate_diameter:
      name: Diamètre de disque de poids compatible
      description: Précise les diamètres de disques de musculation que la machine
        peut recevoir.
    compatible_wheel_finish:
      name: Finition de jante compatible
      description: Spécifie les finitions ou matériaux de jante sur lesquels le nettoyant
        peut être utilisé en toute sécurité (selon le fabricant).
    compatible_whorl_drive_band_type:
      name: Type de courroie d’entraînement de poulie compatible
      description: Précise le type de courroie d’entraînement avec lequel la poulie
        est prévue pour fonctionner.
    compatible_wick_series:
      name: Série de mèches compatible
      description: Indique les séries ou types courants de mèches auxquels la languette
        est adaptée, selon les désignations du secteur, si le vendeur les précise.
    compatible_winder_head_bit:
      name: Tête ou embout d’enrouleur compatible
      description: Spécifie le type d’interface de clé de réglage que l’enrouleur
        prend en charge (ex. tête fendue, embouts interchangeables, tête universelle).
    compatible_windlass_rode:
      name: Ligne de mouillage compatible avec guindeau
      description: Indique le type de mouillage compatible avec le guindeau (chaîne,
        cordage, combiné).
    compatible_windshield_type:
      name: Type de pare-brise compatible
      description: Précise la configuration de pare-brise avec laquelle l’enceinte
        est conçue pour fonctionner.
    compatible_wood:
      name: Bois compatible
      description: Spécifie les bois de touche pour lesquels le polish peut être utilisé
        en toute sécurité.
    compatible_writing_surface:
      name: Surface d'écriture compatible
      description: Indique les surfaces ou papiers sur lesquels l’encre est censée
        donner les meilleurs résultats.
    compatible_zipper_size:
      name: Taille de fermeture à glissière compatible
      description: 'Indique la taille de fermeture à glissière à laquelle la tirette
        est adaptée (souvent exprimée sous la forme #3, #5, #8 ou #10), afin d’améliorer
        le filtrage par compatibilité.'
    compliance_certification:
      name: Certifications de conformité
      description: Normes de conformité/approbation respectées par la rampe lumineuse
        pour un usage routier et la compatibilité électromagnétique.
    component_position:
      name: Position du composant
      description: Précise la position relative de la pièce dans l’ensemble de distribution
        du moteur (par exemple, couvercle avant ou arrière, partie supérieure ou inférieure).
        Ne désigne pas l’emplacement avant/arrière du véhicule.
    concentration_level:
      name: Niveau de concentration
      description: Indique le niveau de concentration du concentré de tomate (simple,
        double, triple), utile pour adapter les recettes.
    concentration_type:
      name: Type de concentration
      description: Indique si le produit est prêt à l’emploi ou concentré, et (si
        concentré) les indications de dilution typiques.
    concert_bass_drum_mounting_stand_type:
      name: Type de support de montage pour grosse caisse de concert
      description: Décrit le système de support ou de montage utilisé pour la grosse
        caisse de concert.
    concert_pitch_standard:
      name: Référence de diapason de concert
      description: Précise la référence du diapason de concert (A4) sur laquelle le
        piano est accordé au moment de la vente (par exemple, A440, A442, A444).
    condiment_form:
      name: Forme de condiment
      description: Indique la forme physique ou la consistance du produit à base de
        raifort (par exemple, sous forme de pâte, de poudre ou de crème).
    condiment_texture:
      name: Consistance du condiment
      description: Décrit la consistance physique du relish ou du chutney (ex. avec
        morceaux, lisse).
    confetti_format:
      name: Format des confettis
      description: Précise le format du produit de confettis selon la façon dont les
        confettis sont conditionnés ou projetés (par exemple, confettis en vrac à
        disperser ou poppers/canons à confettis).
    conga_head_tensioning_system:
      name: Système de tension de la peau de conga
      description: Type de mécanisme utilisé pour tendre ou accorder la peau de conga
        (par exemple, tirants d’accordage traditionnels ou mécanismes modernes d’accordage
        rapide).
    conga_set_included_drum_types:
      name: Types de tambours inclus dans l’ensemble de congas
      description: Indique les types de congas présents dans l’ensemble de congas
        (quinto, conga, tumba, etc.).
    connector_case_style:
      name: Style de boîtier de connecteur
      description: Classe le style de construction du boîtier de connecteurs (ex.
        rigide ou souple) pour refléter le niveau de protection et la portabilité.
    console_cover_installation_method:
      name: Méthode d’installation du cache de console
      description: Précise comment la housse de console se fixe à la console ou à
        l’accoudoir (par exemple, housse à enfiler, sangles élastiques, bande autoagrippante,
        adhésif, fixation à clipser).
    console_display_type:
      name: Type d'affichage de la console
      description: Indique le type d’interface d’affichage de la machine (LCD, LED,
        tactile, etc.).
    construction_design:
      name: Conception de bâtiments
      description: Indique le nombre de pièces articulées qui composent la protection,
        avec une incidence sur la mobilité (par exemple, 1 pièce ou 3 pièces).
    contact_angle:
      name: Angle de contact
      description: Spécifie l’angle de contact des portées de roulement, exprimé comme
        un angle unique ou une paire d’angles (ex. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Type de garnissage de la balle de jonglage de contact
      description: Indique si la balle est pleine ou remplie (et, dans ce cas, le
        type de garnissage), car cette caractéristique influe sur la répartition du
        poids et la durabilité.
    contact_juggling_ball_transparency:
      name: Transparence de la balle de jonglage de contact
      description: Indique le niveau de transparence de la balle (aspect optique).
    contact_surface_material:
      name: Matériau de la surface de contact
      description: Indique le matériau utilisé aux points de contact avec l’instrument
        (par exemple, le liège ou le caoutchouc), afin d’éviter les rayures et d’améliorer
        l’adhérence.
    container_material:
      name: Matériau du conteneur
      description: Précise le matériau principal du contenant de vente au détail du
        produit (par exemple, le verre, le plastique PET ou l’aluminium).
    contaminant_removal:
      name: Élimination des contaminants
      description: Indique les catégories de contaminants que le produit peut éliminer
        ou réduire.
    contra_alto_clarinet_body_configuration:
      name: Type de configuration de clarinette contra-alto
      description: Décrit le format de construction physique de la clarinette contra-alto
        (ex. modèle droit ou replié).
    contra_alto_clarinet_lowest_note_extension:
      name: Extension de la note la plus grave de la clarinette contra-alto
      description: Précise l’extension de note la plus grave de l’instrument, c’est-à-dire
        la note la plus grave permise par le mécanisme de clés, couramment utilisée
        pour distinguer les modèles descendant au mi bémol grave, au ré grave ou au
        do grave.
    contra_bass_clarinet_bell_type:
      name: Type de pavillon de la clarinette contrebasse
      description: Configuration du pavillon utilisée sur la clarinette contrebasse.
    contra_bass_clarinet_bore_type:
      name: Type de perce de la clarinette contrebasse
      description: Conception de la perce de l’instrument.
    contra_bass_clarinet_lowest_written_note:
      name: Note la plus grave écrite pour la clarinette contrebasse
      description: Note écrite la plus grave que l’instrument peut jouer (dépend souvent
        de l’extension au do grave ou au mi bémol grave).
    control_arm_bushing_material:
      name: Matériau des bagues de bras de suspension
      description: Précise le matériau des bagues incluses ou installées, le cas échéant.
    control_arm_bushings_included:
      name: Bagues de bras de suspension incluses
      description: Indique si le bras de suspension est livré avec des bagues installées.
    control_arm_finish:
      name: Finition du bras de suspension
      description: Spécifie la finition protectrice appliquée au bras de suspension
        (protection anticorrosion et aspect esthétique).
    control_arm_grease_fitting_type:
      name: Type de graisseur du bras de suspension
      description: Indique si l’ensemble bras de suspension/rotule comprend un graisseur
        (zerk) et sa possibilité d’entretien.
    control_arm_material:
      name: Matériau du bras de suspension
      description: Spécifie le matériau principal et la construction de fabrication
        du corps du bras de suspension.
    control_arm_position:
      name: Position du bras de suspension
      description: Spécifie la position dans la suspension pour laquelle le bras de
        suspension est conçu (ex. supérieur/inférieur, avant/arrière, gauche/droite).
    control_arm_style:
      name: Style de bras de suspension
      description: Identifie la conception géométrique du bras de suspension dans
        la configuration de suspension.
    control_cable_connector_type:
      name: Type de connecteur de câble de commande
      description: Indique le type d’embout/connexion utilisé par le ou les câbles
        de commande pour l’interface avec la commande et le moteur (ex. raccords spécifiques
        OEM).
    control_voltage_or_gate_connectivity:
      name: Type de tension ou connectivité de commande
      description: Spécifie la prise en charge de la connexion tension de commande/grille
        pour l'intégration avec du matériel modulaire ou analogique.
    controller_function:
      name: Fonction de contrôleur
      description: Définit la fonction principale de la carte de commande du tapis
        de course, par exemple la commande du moteur, l’alimentation électrique ou
        le pilotage par variateur.
    controller_type:
      name: Type de contrôleur
      description: Précise le contrôleur moteur ou le système de commande inclus avec
        le kit de conversion électrique pour scooter, ou requis pour l’utiliser, en
        tenant compte des caractéristiques du contrôleur pertinentes pour la compatibilité
        et les performances.
    conversion_kit_cooling_method:
      name: Système de refroidissement du kit de conversion
      description: Méthode principale de gestion thermique pour moteur, onduleur et
        batterie.
    conversion_kit_installation_complexity:
      name: Complexité d’installation du kit de conversion
      description: Niveau de difficulté d’installation estimé selon les outils et
        compétences requis.
    converted_bed_size:
      name: Dimension du lit converti
      description: Indique la taille ou la configuration de lit que le lit bébé permet
        d’obtenir une fois le kit installé.
    convertible_configuration:
      name: Modes de conversion
      description: Indique les différentes configurations de lit possibles (ex. berceau
        → lit enfant → lit banquette).
    convertible_high_chair_modes:
      name: Modalités de la chaise haute convertible
      description: Indique les différentes positions ou configurations de siège possibles
        pour la chaise.
    cookie_decorating_kit_items_included:
      name: Éléments inclus dans le kit de décoration de biscuits
      description: Répertorie les différents éléments de décoration fournis, afin
        que les clients sachent exactement ce que contient la boîte (par exemple,
        des tubes de glaçage, des vermicelles ou des emporte-pièces).
    cookie_variety:
      name: Variété de biscuit
      description: Identifie le style ou la variété de biscuit, pour faciliter le
        choix du consommateur.
    cooking_state:
      name: État de cuisson
      description: Indique l’état de préparation du poulet vendu (cru, cuit, mariné,
        etc.).
    coolant_additive_purpose:
      name: Usage de l’additif de liquide de refroidissement
      description: Fonction principale prévue de l’additif pour liquide de refroidissement
        (hors produits de rinçage de radiateur ou produits d’étanchéité dédiés).
    coolant_base_fluid:
      name: Fluide de base du liquide de refroidissement
      description: Identifie le type de base glycol utilisé dans la formulation de
        l’antigel/liquide de refroidissement.
    coolant_outlet_connection_style:
      name: Type de raccordement de la sortie du liquide de refroidissement
      description: Type de raccordement de sortie permettant de fixer une durite de
        radiateur ou une conduite de refroidissement.
    coolant_outlet_neck_angle:
      name: Angle du col de sortie du liquide de refroidissement
      description: Indique l’angle du col de sortie d’eau par rapport au moteur ou
        à la bride de montage (pour le passage de la durite).
    coolant_technology:
      name: Technologie de refroidissement
      description: Indique la technologie ou famille chimique du liquide de refroidissement
        (telle qu’indiquée sur l’emballage).
    coolant_temperature_sensor_port:
      name: Orifice du capteur de température du liquide de refroidissement
      description: Indique la présence d’un port de capteur de température sur le
        col d’eau et son type d’interface.
    coolant_temperature_sensor_seal_type:
      name: Capteur de température du liquide de refroidissement à joint d'étanchéité
      description: Indique le type de joint ou méthode d’étanchéité du capteur dans
        le circuit de refroidissement.
    cooling_system_component_included:
      name: Composant du système de refroidissement inclus
      description: Répertorie les composants supplémentaires du système de refroidissement
        inclus avec la pompe à eau.
    cooling_system_flush_application_step:
      name: Étape d’utilisation du produit de rinçage du circuit de refroidissement
      description: Indique à quelle étape du service le produit intervient (ex. nettoyant
        de prérinçage ou rinçage final/neutralisation).
    cooling_system_type:
      name: Type de système de refroidissement
      description: Indique le type de configuration du circuit de refroidissement
        d’un moteur marin inboard (eau brute, circuit fermé, refroidissement par quille,
        etc.).
    cord_material:
      name: Matériau du cordon
      description: Précise le matériau du cordon utilisé pour faire passer l’écouvillon
        dans le saxophone.
    core_type_bass_strings:
      name: Type de noyau (cordes de basse)
      description: Indique la forme du noyau de la corde, influençant le toucher et
        la souplesse.
    cork_grease_base_material:
      name: Matériau de base de la graisse à liège
      description: Indique la base de formulation de la graisse à liège (lanoline,
        etc.).
    cork_grease_form:
      name: Forme de la graisse pour liège
      description: Le format physique du produit de graisse à liège.
    corn_presentation:
      name: Présentation du maïs
      description: Précise la présentation physique ou la forme du produit à base
        de maïs (par exemple, entier dans son enveloppe, en grains ou en poudre).
    corn_syrup_variety:
      name: Variété de sirop de maïs
      description: Indique la variété ou le procédé de fabrication du sirop de maïs.
    corn_variety:
      name: Variété de maïs
      description: Identifie la variété botanique ou commerciale spécifique du maïs
        commercialisé, permettant aux acheteurs de distinguer les types qui diffèrent
        par le goût, la texture, la couleur et l’usage culinaire.
    corner_compatibility:
      name: Compatibilité avec les angles
      description: Précise la forme des angles de table pour lesquels la housse est
        conçue (carrés ou arrondis).
    corner_flag_features:
      name: Caractéristiques du drapeau d’angle
      description: Met en avant les caractéristiques fonctionnelles spéciales ou améliorations
        du drapeau d’angle (ex. mât pliable, matériau réfléchissant).
    cornet_mouthpiece_shank_type:
      name: Type de queue d’embouchure de cornet
      description: Spécifie la norme de récepteur ou de queue d’embouchure prise en
        charge par le cornet pour établir la compatibilité.
    cornhole_league_certification:
      name: Certification de ligue de cornhole
      description: Indique les certifications officielles ou homologations de ligues
        auxquelles le produit répond.
    corrosion_resistance:
      name: Résistant à la corrosion
      description: Précise le traitement anticorrosion ou l’indice de résistance à
        la corrosion du support ou porte-accessoire pour une exposition en extérieur.
    corrosion_resistance_level:
      name: Niveau de résistance à la corrosion
      description: Indique la protection anticorrosion adaptée aux environnements
        d’eau douce ou d’eau salée.
    costume_components_included:
      name: Éléments inclus dans le costume
      description: Énumère les vêtements et les accessoires fournis avec le costume,
        afin de préciser quels éléments font partie de l’ensemble.
    cotton_weave_type:
      name: Type de tissage en coton
      description: Décrit la construction tissée ou tricotée de la surface en coton
        imprimable, qui joue sur la texture et la netteté de l’impression.
    counter_type:
      name: Type de comptoir
      description: Indique si le produit inclut un suivi intégré des répétitions ou
        de la force, ainsi que son type.
    counterweight_fill_material:
      name: Matériau de remplissage du contrepoids
      description: Indique la substance qui peut être utilisée pour lester ou préremplir
        le contrepoids.
    counterweight_type:
      name: Type de contrepoids
      description: Précise le type de conception ou de construction du contrepoids,
        par exemple un sac de sable ou une plaque d’acier, afin de faciliter la compatibilité
        et l’installation.
    coupler_system:
      name: Système de raccordement
      description: Type/système d’attelage installé sur la locomotive miniature pour
        assurer la compatibilité avec les wagons et voitures.
    court_surface_suitability:
      name: Surface de terrain adaptée
      description: Indique la surface de terrain de basket pour laquelle la semelle
        extérieure de la chaussure est conçue, afin d’aider les acheteurs à choisir
        l’adhérence et la durabilité adaptées aux parquets intérieurs, aux surfaces
        extérieures en asphalte ou en béton, ou aux deux.
    cover_fit_style:
      name: Style ajusté
      description: Décrit la manière dont la housse recouvre la table, avec un effet
        sur l’apparence et le niveau de protection.
    cover_fit_type:
      name: Type d’ajustement de la housse
      description: Indique si la housse est ajustée, sur mesure ou semi-sur mesure,
        ou universelle, et si elle est prévue pour l’amarrage dans l’eau ou pour le
        stockage/le transport sur remorque.
    cowbell_beater_type:
      name: Type d’accessoire de frappe pour sonnaille
      description: Type d’accessoire de frappe recommandé pour le son/la finition
        de la sonnaille (si spécifié par le produit).
    cowbell_mounting_method:
      name: Méthode de fixation de la cloche
      description: Décrit comment la sonnaille est destinée à être montée/utilisée
        (tenue à la main ou montée sur support).
    cowbell_sound_character:
      name: Caractéristiques sonores de la cloche
      description: Caractère sonore général utilisé dans les fiches produit (au-delà
        du critère de taille).
    cradle_capacity:
      name: Capacité du berceau
      description: Indique si le berceau est conçu pour accueillir un seul nourrisson
        ou des jumeaux.
    craft_cutter_embosser_machine_operation:
      name: Fonctionnement de la machine de découpe et d’embossage pour loisirs créatifs
      description: Spécifie le mode de fonctionnement de la machine de découpe/d’embossage
        du point de vue de l’utilisation (ex. manivelle manuelle, bouton électrique,
        contrôle via application).
    craft_decoration_maker_accessories_included:
      name: Accessoires inclus pour machine de décoration créative
      description: Liste les principaux accessoires inclus avec la machine de décoration
        créative (ex. ruban/film de démarrage, recharges d’autocollants, cartouches
        de paillettes, outils de nettoyage).
    craft_foil_application_method:
      name: Méthode d’application de feuille métallisée pour loisirs créatifs
      description: Identifie la manière dont la feuille de loisirs créatifs est destinée
        à être appliquée/activée (adhésive, chaleur, toner/réactive, etc.).
    craft_foil_format:
      name: Format de feuille créative
      description: Indique le format physique de la feuille créative telle qu’elle
        est commercialisée (ex. rouleau ou feuilles).
    craft_glue_finish:
      name: Fini de la colle pour loisirs créatifs
      description: Décrit l’aspect de la colle après séchage (par exemple, transparente,
        blanche/opaque, translucide, brillante/mate).
    craft_magnet_application:
      name: Application de l’aimant créatif
      description: Indique l’utilisation principale ou la surface de montage prévue
        pour l’aimant créatif.
    craft_magnet_holding_strength_level:
      name: Niveau de puissance de maintien de l’aimant créatif
      description: Catégorie de puissance relative des aimants pour loisirs créatifs,
        afin d’aider les acheteurs à choisir la force de maintien adaptée à leur projet.
    craft_organizer_storage_features:
      name: Caractéristiques de rangement de l’organiseur pour loisirs créatifs
      description: Décrit les caractéristiques de rangement de l’organiseur pour loisirs
        créatifs (ex. séparateurs réglables, tiroirs, poches transparentes).
    craft_scoring_board_included_accessories:
      name: Accessoires inclus avec la plaque de rainurage pour loisirs créatifs
      description: Accessoires inclus avec la plaque de rainurage (par exemple, outil
        de rainurage/plioir, triangle, outil pour enveloppes).
    craft_scoring_board_measurement_system:
      name: Système de mesure de la plaque de rainurage pour loisirs créatifs
      description: Indique le système de mesure affiché sur la planche de rainurage
        (métrique, impérial, double, etc.).
    craft_wire_finish_coating:
      name: Fini ou revêtement du fil métallique pour loisirs créatifs
      description: Précise le fini de surface ou le revêtement appliqué au fil métallique
        pour lui donner une couleur, résister au ternissement ou le protéger.
    craft_wood_surface_preparation:
      name: Préparation de surface du bois pour loisirs créatifs
      description: Indique si la surface en bois est prête pour la finition/la peinture
        ou nécessite une préparation (ex. ponçage/apprêt).
    crank_spindle_interface:
      name: Interface de l’axe de pédalier
      description: Précise le système d’axe de pédalier pris en charge par le boîtier
        de pédalier (par exemple, SRAM DUB ou axe carré), afin d’établir la compatibilité
        entre le pédalier et le boîtier de pédalier.
    crankshaft_balance_type:
      name: Type d’équilibrage du vilebrequin
      description: Indique si le vilebrequin est équilibré en interne (neutre) ou
        en externe (nécessite un amortisseur harmonique/des masses sur le volant moteur).
    crankshaft_bolt_pattern:
      name: Configuration des boulons du vilebrequin
      description: Configuration des boulons sur la bride arrière pour la fixation
        du volant moteur/de la flexplate.
    crankshaft_sensor_reluctor_type:
      name: Type de reluctor du capteur de vilebrequin
      description: Configuration de la roue de déclenchement du capteur de vilebrequin
        (le cas échéant).
    craps_accessories_included:
      name: Accessoires de craps inclus
      description: Indique les accessoires propres au craps inclus en plus des dés,
        des jetons et du tapis de jeu.
    crash_cymbal_profile:
      name: Profil de cymbale crash
      description: Courbure/profil général de la cymbale (intensité de la courbure),
        qui affecte la tonalité et la réactivité.
    crash_cymbal_sound_character:
      name: Caractéristiques sonores des cymbales crash
      description: Principaux qualificatifs du caractère sonore de la cymbale crash.
    crash_pad_size_class:
      name: Catégorie de taille du crash pad
      description: Indique le format général du crash pad afin d’estimer rapidement
        la surface de réception.
    crate_engine_assembly_level:
      name: Niveau d’assemblage du moteur prêt à installer
      description: Degré de complétude du moteur prêt à installer tel qu’il est livré
        (principaux composants inclus).
    cream_base_ingredient:
      name: Ingrédient de base de la crème
      description: Identifie la source principale de la crème, incluant les espèces
        laitières et les alternatives végétales.
    cream_cheese_base:
      name: Base du fromage frais à tartiner
      description: Indique la principale source laitière ou végétale utilisée pour
        fabriquer le fromage frais à tartiner, afin d’aider les acheteurs à tenir
        compte de leur régime alimentaire, des allergènes et de leurs préférences
        gustatives.
    cream_cheese_form:
      name: Moule à fromage à la crème
      description: Décrit la forme physique ou le style de texture du fromage à la
        crème (ex. bloc, fouetté, à tartiner), influençant l’étalement et l’usage
        prévu.
    cream_variety:
      name: Variété de crème
      description: Identifie le style spécifique de crème selon la teneur en matières
        grasses, le mode de transformation ou l’usage culinaire prévu (ex. crème légère,
        crème double, crème de cuisson).
    crib_accessory_features:
      name: Caractéristiques des accessoires pour lit bébé
      description: Énumère les caractéristiques fonctionnelles ou de confort propres
        aux accessoires pour lits bébé et lits pour tout-petits, par exemple la respirabilité
        ou les bords élastiques.
    crib_bumper_features:
      name: Caractéristiques du tour de lit
      description: Mets en avant les caractéristiques fonctionnelles particulières
        d'un tour de lit.
    crib_conversion_kit_components:
      name: Composants du kit de transformation en lit d'enfant
      description: Liste les principaux éléments inclus dans le kit afin que les acheteurs
        puissent vérifier qu’ils disposent de tout le nécessaire pour l’installation.
    cricket_ball_grade:
      name: Niveau de qualité de la balle de cricket
      description: Indique le niveau de qualité ou l’usage prévu de la balle.
    cricket_ball_piece_construction:
      name: Nombre de pièces de construction de la balle de cricket
      description: Indique le nombre de pièces extérieures ou de sections moulées
        utilisées pour fabriquer l’enveloppe de la balle, un indicateur clé de qualité
        et de prix.
    cricket_ball_type:
      name: Type de balle de cricket
      description: Spécifie le type de balle de cricket fourni avec le produit ou
        indique si aucune balle n’est incluse.
    cricket_bat_accessory_type:
      name: Type d’accessoire pour batte de cricket
      description: Spécifie le type d’accessoire ou d’article d’entretien pour batte
        de cricket afin que les acheteurs puissent filtrer rapidement le produit recherché.
    cricket_bat_size:
      name: Taille de batte de cricket
      description: Indique la classification normalisée des tailles de battes de cricket
        (0 à 6, Harrow, SH, LH), généralement choisie en fonction de l’âge et de la
        taille du joueur.
    cricket_bat_size_compatibility:
      name: Compatibilité avec les tailles de battes de cricket
      description: Énumère les tailles de battes auxquelles l’accessoire est adapté,
        afin de garantir une compatibilité correcte.
    cricket_helmet_role:
      name: Rôle du casque de cricket
      description: Indique le poste de jeu visé par le casque, par exemple batteur
        ou gardien de guichet.
    cricket_leg_guard_type:
      name: Style de protection des jambes pour le cricket
      description: Désigne le style précis de protection des jambes pour le cricket.
    cricket_player_role:
      name: Rôle du joueur de cricket
      description: Spécifie le rôle de jeu principal pour lequel la chaussure est
        conçue.
    cricket_protection_grade:
      name: Niveau de protection pour le cricket
      description: Spécifie la classification du niveau de protection attribuée par
        les fabricants d’équipement de cricket.
    cricket_stump_base_type:
      name: Type de socle de piquet de cricket
      description: Indique le style ou le matériau de base fourni avec les piquets,
        influençant la stabilité et l’adaptation à la surface de jeu.
    cricket_stump_target_features:
      name: Caractéristiques des cibles de cricket
      description: Met en avant les caractéristiques fonctionnelles distinctives qui
        améliorent l’usage à l’entraînement, la visibilité, la durabilité ou la stabilité.
    cricket_stump_type:
      name: Type de piquet de cricket
      description: Classe les piquets selon leur style ou leur construction, afin
        d’aider les acheteurs à choisir entre des piquets de match traditionnels,
        des variantes d’entraînement ou des modèles modernes lumineux.
    cricket_training_focus:
      name: Les points forts de l'entraînement au cricket
      description: Compétence ou aspect principal du jeu de cricket que l’aide à l’entraînement
        est conçue pour améliorer.
    croquet_set_components_included:
      name: Éléments compris dans le jeu de croquet
      description: Énumère tous les principaux éléments fournis dans l’ensemble (par
        exemple, des arceaux, des piquets ou un sac de transport), afin que les clients
        sachent exactement ce qu’ils achètent.
    cross_country_binding_system:
      name: Système de fixation de ski de fond
      description: Spécifie le standard de fixation de ski de fond pour lequel le
        produit est percé ou compatible.
    cross_stitch_chart_symbol_type:
      name: Type de symbole de diagramme de point de croix
      description: Indique comment le diagramme est représenté (symboles, couleurs
        ou les deux).
    cross_stitch_finishing_type:
      name: Type de finition de point de croix
      description: Type de finition/de présentation prévu pour le projet brodé.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mécanisme de maintien du tissu du cadre à point de croix
      description: Décrit le système de fixation/tension du tissu dans le cadre (par
        ex. pinces, agrafes, punaises) et son impact sur l’utilisation et la compatibilité
        textile.
    cross_stitch_frame_included_components:
      name: Éléments inclus avec le cadre de point de croix
      description: Indique les éléments inclus dans l’emballage (cadre, support, pinces,
        etc.) pour limiter les retours produit.
    cross_stitch_frame_type:
      name: Type de cadre pour point de croix
      description: Précise la construction ou le type de cadre pour point de croix,
        selon le mode de maintien du tissu, avec un effet sur la facilité d’utilisation
        et la compatibilité avec l’ouvrage.
    cross_stitch_pattern_technique:
      name: Technique de point de croix du diagramme
      description: Technique ou style de point de croix requis par le diagramme.
    crossbar_shape_profile:
      name: Forme ou profil de la barre transversale
      description: Spécifie la forme aérodynamique ou le profil de la barre transversale.
    crossbar_style:
      name: Style de barre transversale
      description: Identifie le style de construction de la barre transversale, distinguant
        les barres rigides de compétition des barres souples ou hybrides d’entraînement.
    crossbow_type:
      name: Type d’arbalète
      description: Indique le style de conception fondamental de l’arbalète, par exemple
        à poulies, recourbée ou pistolet. Le style de construction détermine les performances,
        la taille et les usages possibles, et les acheteurs utilisent donc fréquemment
        ce critère pour filtrer les produits.
    crossover_component_type:
      name: Type de composant du filtre passif
      description: Indique la topologie du composant principal utilisée dans le réseau
        de filtrage passif.
    crossover_configuration:
      name: Configuration en crossover
      description: Indique si le filtre utilise un seul point de coupure ou plusieurs
        points, par exemple une conception à 2 voies ou à 3 voies.
    crossover_type:
      name: Type de filtre répartiteur
      description: Spécifie le type de filtre répartiteur inclus dans l’ensemble.
    crown_profile:
      name: Profil de la calotte
      description: Spécifie la hauteur/le profil de la calotte de la casquette au-dessus
        de la visière.
    crown_style:
      name: Style de la calotte
      description: Décrit la forme générale de la calotte du chapeau melon.
    crust_taste_profile:
      name: Profil gustatif de la croûte
      description: Indique si l’orientation gustative naturelle de la croûte est sucrée,
        salée ou neutre.
    crystal_finish:
      name: Type de finition du cristal
      description: Décrit la finition de surface, le revêtement ou l’état de transformation
        du cristal non monté (par exemple, brut, poli, roulé, facetté, dépoli, traité
        aura, teinté, traité thermiquement).
    crystal_material:
      name: Matériau du cristal
      description: Précise le matériau utilisé pour le verre de montre qui protège
        le cadran.
    crystalline_finish_style:
      name: Type de fini cristallin
      description: Aspect cristallin ou effet plume caractéristique que la cire de
        palme produit dans les bougies finies.
    cucumber_variety:
      name: Variété de concombre
      description: Spécifie le cultivar ou la variété commerciale du concombre (ex.
        anglais, persan, Kirby).
    cue_compatibility:
      name: Compatibilité avec les queues
      description: Indique le type d’assemblage de queue auquel l’étui est adapté,
        par exemple des queues monoblocs ou à assemblage 3/4.
    cue_construction:
      name: Construction de la queue
      description: 'Indique la construction de la queue : nombre de pièces ou composant
        partiel tel que talon seul ou flèche seule, influençant la portabilité et
        la compatibilité.'
    cue_head_material:
      name: Matériau de la tête de la queue
      description: Identifie le matériau de la tête de queue (la partie qui entre
        en contact avec le palet), influençant la durabilité et la protection de la
        surface.
    cue_sport_compatibility:
      name: Compatibilité avec les sports de billard
      description: Indique à quel sport de billard l’accessoire est destiné.
    cue_thread_size:
      name: Dimension du filetage de queue
      description: Indique les spécifications de filetage des rallonges, protections
        de joint, boulons de poids et autres accessoires pour garantir la compatibilité.
    cue_tip_hardness:
      name: Dureté du procédé de queue
      description: Évalue la dureté du procédé de queue, déterminante pour le contrôle
        de la bille blanche et le retour de sensation.
    cuff_height:
      name: Hauteur de la tige
      description: Indique la hauteur de la tige de la botte (basse, moyenne, haute,
        amovible ou réglable), qui influe sur le maintien et la souplesse.
    cuff_position:
      name: Position du poignet
      description: Indique la partie du corps du pratiquant à laquelle s’attache le
        leash.
    cultivation_method:
      name: Méthode de culture
      description: Spécifie la manière dont les légumes verts ont été cultivés, y
        compris les techniques de culture et les pratiques agricoles.
    cup_type:
      name: Type de coupe
      description: Indique le profil de surface du sequin (plat ou creux) ainsi que
        la profondeur de la coupe, ce qui peut affecter la brillance, la texture et
        le rendu une fois cousu ou collé.
    cupcake_size:
      name: Taille du cupcake
      description: Spécifie la catégorie de taille des cupcakes commercialisés (ex.
        mini, standard, jumbo).
    curd_size:
      name: Taille de caillé
      description: Indique la taille ou la texture des caillés du cottage cheese.
    cure_method:
      name: Méthode de durcissement
      description: Indique le mode de prise ou de durcissement de l’adhésif (UV, humidité,
        chaleur, etc.).
    curing_or_preparation_method:
      name: Mode de traitement ou de préparation
      description: Indique le mode de préparation ou de conservation des olives (saumurées,
        confites dans l’huile, grillées, etc.).
    curling_broom_head_material:
      name: Matériau du patin de balai de curling
      description: Indique le matériau principal composant la tête ou le tampon du
        balai.
    curling_broom_head_type:
      name: Type de patin de balai de curling
      description: Spécifie le style ou la construction de la tête/du patin de curling.
    curling_shoe_slider_material:
      name: Matériau de glisseur de chaussure de curling
      description: Indique le matériau principal de la semelle de glisse des chaussures
        de curling.
    curling_training_aid_type:
      name: type d'aide à l'entraînement au curling
      description: Indique le type d’accessoire d’entraînement pour le curling.
    curry_variety:
      name: Variété de curry
      description: Classe les sauces curry selon le style ou la recette de curry qu’elles
        permettent de réaliser, par exemple Tikka Masala, Massaman ou curry vert thaï,
        pour un filtrage précis par saveur ou par style.
    cushion_rubber_profile:
      name: Profil du caoutchouc de bande
      description: Forme ou code de profil des éléments en caoutchouc des bandes.
    cushioning_level:
      name: Niveau de rembourrage
      description: Indique le niveau de rembourrage sous le pied offert par la chaussette
        pour le confort et l’absorption des chocs.
    custom_label_content_type:
      name: Type de contenu d’étiquette personnalisée
      description: Spécifie les informations personnalisées sur l’étiquette à coudre
        (par exemple, le nom, le logo, le message, la taille, les symboles d’entretien
        ou les coordonnées).
    customization_type:
      name: Type de personnalisation
      description: Indique si le maillot est vierge, attribué à un joueur ou personnalisé
        avec un nom et un numéro.
    cut_or_preparation_style:
      name: Style de coupe ou de préparation
      description: Précise le mode de coupe ou de préparation des morceaux de légumes
        dans la boîte ou le bocal (par exemple, entiers, en dés ou en bâtonnets).
    cut_resistance_rating:
      name: Indice de résistance à la coupure
      description: Spécifie le niveau de résistance à la coupure officiellement testé
        de l’article.
    cut_type:
      name: Type de coupe
      description: Indique si le tissu est vendu au mètre, prédécoupé ou en rouleau.
    cutting_application:
      name: Application de découpe
      description: Usage principal de coupe prévu pour les ciseaux.
    cutting_mat_grid_style:
      name: Style de grille du tapis de découpe
      description: Style de guide imprimé sur la surface du tapis.
    cutting_mat_intended_use:
      name: Usage prévu du tapis de découpe
      description: Usage principal auquel le tapis de découpe est destiné, comme surface
        pour loisirs créatifs ou comme surface de travail.
    cv_boot_clamp_type:
      name: Style de collier de soufflet de cardan
      description: Spécifie le type de collier ou de bande utilisé pour fixer le soufflet
        de cardan.
    cv_boot_kit_contents:
      name: Contenu du kit de soufflet de cardan
      description: Énumère les éléments fournis avec le soufflet de cardan (par exemple,
        des colliers, un sachet de graisse ou des bandes de retenue).
    cv_boot_material:
      name: Matériau du soufflet de cardan
      description: Spécifie la matière principale du soufflet de cardan.
    cv_boot_position:
      name: Emplacement du soufflet de cardan
      description: 'Spécifie la position de montage du soufflet de cardan : intérieure
        ou extérieure.'
    cycling_apparel_fit:
      name: Coupe des vêtements de cyclisme
      description: Décrit la coupe du vêtement, en indiquant le degré d’ajustement
        et l’aérodynamisme recherchés (par exemple, course, décontractée).
    cylinder_head_assembly:
      name: Niveau d’assemblage de la culasse
      description: Précise le niveau de complétude de la culasse telle qu’elle est
        vendue (par exemple, entièrement assemblée avec les composants de distribution
        installés ou pièce moulée nue/non assemblée).
    cylinder_head_material_grade:
      name: Qualité du matériau de culasse
      description: Indique le matériau et la qualité utilisés pour le moulage de la
        culasse.
    cylinder_head_position:
      name: Emplacement de la culasse
      description: Indique la position de montage de la culasse sur les moteurs multibancs
        (gauche/droite, banc 1/banc 2).
    cymbal_alloy:
      name: Alliage de la cymbale
      description: Alliage/composition de la ou des cymbales du kit.
    cymbal_application:
      name: Usage de la cymbale
      description: Application de jeu principale pour laquelle la cymbale est conçue/commercialisée.
    cymbal_arm_mounting_interface:
      name: Interface de montage du bras de cymbale
      description: Indique le mode de fixation du bras de cymbale au hardware de batterie
        (pince, rack, support, etc.).
    cymbal_arm_rotation_positioning_features:
      name: Fonctionnalités de rotation et de positionnement du bras de cymbale
      description: Précise les caractéristiques de positionnement qui conditionnent
        l’inclinaison, la rotation et le verrouillage du bras.
    cymbal_arm_style:
      name: Type de bras de cymbale
      description: Indique si le bras de cymbale est droit ou de type perche pour
        le positionnement souhaité.
    cymbal_drum_case_wheel_configuration:
      name: Configuration des roues de l’étui de cymbales et batterie
      description: Indique si la caisse est munie de roulettes et, le cas échéant,
        la configuration de ces roulettes pour le transport.
    cymbal_hammering_style:
      name: Type de martelage de cymbale
      description: Décrit le martelage et son impact sur le son et le toucher de la
        cymbale.
    cymbal_kit_components_included:
      name: Composants du kit de cymbales inclus
      description: Précise les types de cymbales inclus dans le kit/pack de cymbale
        ride, en plus de la cymbale ride elle-même.
    cymbal_kit_items_included:
      name: Éléments compris dans le kit de cymbales
      description: Indique les cymbales incluses dans l’ensemble (selon leur type).
    cymbal_lathing:
      name: Tournage de la cymbale
      description: Spécifie si et dans quelle mesure la surface de la cymbale est
        tournée/rainurée ou laissée brute/non tournée.
    cymbal_playing_style_genre:
      name: Style ou genre d’utilisation des cymbales
      description: Identifie le contexte de performance typique pour lequel les cymbales
        sont conçues (danse orientale, marche, orchestre, etc.).
    cymbal_set_configuration:
      name: Configuration du jeu de cymbales
      description: Indique si le produit est vendu comme cymbale unique, paire assortie
        ou ensemble de plusieurs paires (ex. pour l’enseignement en groupe).
    cymbal_sound_character:
      name: Caractéristiques sonores des cymbales
      description: Décrit le profil sonore global de la cymbale afin de faciliter
        la recherche par type de son (par exemple, brillant ou sombre).
    cymbal_sustain:
      name: Durée de résonance de la cymbale
      description: Durée pendant laquelle la cymbale résonne après avoir été frappée.
    cymbal_type:
      name: Type de cymbale
      description: Spécifie la fonction de cymbale reproduite par le pad électronique.
    cymbal_volume_level:
      name: Niveau de volume de la cymbale
      description: Catégorie de volume/perception sonore de la cymbale.
    cymbal_weight_class:
      name: Catégorie de poids de la cymbale
      description: Indique la catégorie de poids de la cymbale, qui influe sur le
        timbre, le volume et la réponse.
    dairy_heat_treatment:
      name: Traitement thermique du produit laitier.
      description: Identifie le niveau de transformation ou de pasteurisation appliqué
        à la crème (ex. crue, pasteurisée, UHT), qui affecte la durée de conservation,
        la saveur et les performances de fouettage.
    damage_type:
      name: Type de dommage
      description: Précise les types de dommages au pare-brise réparables avec le
        kit.
    damper_pedal_style:
      name: Style de pédale damper
      description: Décrit le type physique de pédale damper utilisée avec les claviers
        et pianos numériques.
    damping_adjustability:
      name: Réglage de l’amortissement
      description: Indique les paramètres d’amortissement et/ou de hauteur de caisse
        réglables sur l’amortisseur.
    damping_level:
      name: Niveau d'amortissement
      description: Indique l’importance de la réduction du volume et de la résonance
        apportée par la sourdine.
    dance_occasion:
      name: Contexte d’utilisation en danse
      description: Indique le contexte d’utilisation prévu du vêtement dans la pratique
        de la danse ou lors d’une représentation.
    darbuka_accessories_included:
      name: Accessoires pour darbouka inclus
      description: Indique les accessoires généralement fournis avec la darbouka.
    darbuka_body_finish_type:
      name: Type de finition du corps de la darbuka
      description: Décrit la finition extérieure, le revêtement ou le traitement décoratif
        du corps de la darbuka.
    darbuka_head_material:
      name: Matériau de peau de la darbouka
      description: Indique le matériau composant la peau de la darbouka.
    dart_barrel_material:
      name: Matériau du corps de fléchette
      description: Indique le matériau principal du corps de fléchette, avec impact
        sur l’équilibre, la résistance et le coût.
    dart_shaft_design:
      name: Type de tige de fléchette
      description: Classe la tige de fléchette selon sa conception mécanique, par
        exemple fixe, rotative, télescopique ou à ailette intégrée, car cette conception
        influe sur les performances et le prix.
    dart_shaft_thread_type:
      name: Type de filetage de tige de fléchette
      description: Indique la taille ou le type de filetage servant à visser la tige
        dans le corps de la fléchette, afin d’établir la compatibilité entre les tiges
        et les corps.
    dart_thread_size:
      name: Calibre de fléchette
      description: Indique le standard de filetage compatible pour assurer la compatibilité
        entre tiges, pointes et fûts.
    dart_tip_compatibility:
      name: Compatibilité des pointes de fléchette
      description: Indique si la pièce de fléchette est destinée aux fléchettes à
        pointe acier, pointe souple ou aux deux types.
    dart_tip_connection_type:
      name: Type de fixation de pointe de fléchette
      description: Indique le type de filetage ou de fixation utilisé pour attacher
        la pointe au fût ou à la tige de la fléchette.
    dartboard_tournament_approval:
      name: Certification tournoi de cible de fléchettes
      description: Indique si la cible de fléchettes est officiellement homologuée
        par certaines fédérations ou ligues de fléchettes.
    dartboard_type:
      name: Style de cible de fléchettes
      description: Classe la cible de fléchettes selon sa technologie de fabrication
        et le type de fléchettes compatible (par exemple, à poils, électronique ou
        magnétique).
    dash_cover_construction_type:
      name: Type de construction du cache-tableau de bord
      description: Décrit la manière dont le couvre-tableau de bord est formé/structuré
        (ex. moulé ou cousu), ce qui influence la précision de l’ajustement et l’apparence.
    dash_cover_cutout_configuration:
      name: Configuration des découpes du couvre-tableau de bord
      description: Indique les ouvertures/capteurs OEM du tableau de bord pour lesquels
        la housse est prédécoupée ou formée.
    dashboard_accessory_position:
      name: Emplacement de l’accessoire sur le tableau de bord
      description: Indique où l’accessoire doit être installé ou positionné sur le
        tableau de bord.
    date_variety:
      name: Variété de dattes
      description: Spécifie le cultivar/la variété des dattes (ex. Medjool, Deglet
        Noor, Ajwa). La variété influence fortement la saveur, la taille et la texture,
        et figure dans la plupart des titres et descriptions de produits ; la renseigner
        améliore donc le filtrage et la recherche.
    dayan_head_material:
      name: Matériau de la tête Dayan
      description: Matériau utilisé pour la surface de jeu (pudi), par exemple peau
        naturelle ou synthétique.
    dayan_strap_material:
      name: Matériau de la sangle Dayan
      description: Matériau des sangles de tension (baddhi) servant au laçage du dayan.
    dayan_syahi_type:
      name: Type de syahi pour dayan
      description: Indique le type de syahi appliqué sur la tête du dayan (pâte noire
        d’accordage).
    decaffeination_method:
      name: Méthode de décaféination
      description: Indique le procédé de décaféination utilisé pour le café.
    decal_installation_method:
      name: Méthode de pose de l’autocollant
      description: Décrit comment l’autocollant est appliqué sur la surface du véhicule
        (ex. pose à sec, pose humide). Les détails relatifs aux outils/exigences (ex.
        film de transfert ou pistolet thermique) doivent être renseignés dans les
        instructions ou attributs d’outils associés, le cas échéant.
    decal_orientation:
      name: Orientation de l’autocollant
      description: Indique si l’autocollant est prévu pour une pose à l’intérieur
        d’une vitre ou sur une surface extérieure.
    decal_placement_type:
      name: Type de positionnement de l’autocollant
      description: Indique la partie du véhicule sur laquelle l’autocollant est prévu
        pour être posé (par exemple, un panneau de carrosserie, un pare-chocs ou un
        capot).
    decal_visibility_property:
      name: Propriété de visibilité de l’autocollant
      description: Propriétés optiques ou de visibilité d’un autocollant destinées
        à améliorer sa visibilité ou sa réponse à la lumière (par exemple, caractéristiques
        réfléchissantes, fluorescentes, phosphorescentes ou de transparence)
    deck_concave_level:
      name: Niveau de concavité du plateau
      description: Indique la profondeur ou l’intensité du concave de la planche (ex.
        léger, moyen, prononcé).
    deck_flex_rating:
      name: Niveau de flexibilité du plateau
      description: Évaluation qualitative de la flexibilité/rigidité du plateau.
    deck_material:
      name: Matériau de la terrasse
      description: Indique le matériau de construction principal du plateau de skateboard.
    decoder_interface_socket_type:
      name: Type d’interface ou de prise du décodeur
      description: Type d’interface de décodeur numérique ou configuration du décodeur
        embarqué pour le modèle de locomotive.
    decoration_technique:
      name: Technique de décoration
      description: Indique la technique principale utilisée pour ajouter des motifs
        ou décorations au T-shirt.
    decorative_stamp_form_factor:
      name: Type de format de tampon décoratif
      description: Indique le type de tampon décoratif et son mode d’impression du
        motif (tampon unique, set, rouleau, fond, etc.).
    decorative_tape_application:
      name: Application du ruban décoratif
      description: Indique l’usage principal en loisirs créatifs pour lequel le ruban
        décoratif est conçu ou commercialisé.
    decorative_tape_format:
      name: Format du ruban décoratif
      description: Spécifie la manière dont le ruban décoratif est fourni/conditionné
        pour l’utilisation.
    decoy_buoyancy:
      name: Flottabilité du leurre
      description: Décrit le comportement du leurre dans la colonne d’eau (flottant,
        suspendu ou coulant).
    decoy_joint_type:
      name: Type de joint du leurre
      description: Indique si le corps du leurre est monobloc ou articulé, car cette
        caractéristique modifie son action de nage.
    decoy_motion_mechanism:
      name: Mécanisme d’animation du leurre
      description: Indique de quelle manière le leurre génère du mouvement ou des
        remous pour attirer le gibier.
    decoy_posture:
      name: Posture du leurre
      description: Indique la position ou le comportement de l’animal reproduit par
        le leurre (alimentation, repos, vigilance, etc.).
    decoy_size_class:
      name: Classe de taille du leurre
      description: Catégorise l’échelle relative du leurre par rapport à l’animal
        réel (ex. Standard, Magnum, Oversize).
    decoy_style:
      name: Type de leurre
      description: Définit la forme physique ou la catégorie de conception du leurre
        afin d’aider les chasseurs à choisir la configuration adaptée.
    deli_meat_variety:
      name: Variété de charcuterie
      description: Classe la charcuterie selon son type précis (par exemple, salami,
        mortadelle, prosciutto ou rôti de bœuf).
    delivery_form:
      name: Formulaire de livraison
      description: Forme de présentation du nettoyant pour injecteurs.
    denim_composition:
      name: Composition du denim
      description: Composition en fibres principales du denim, hors teintures et finitions.
    denim_finish:
      name: Finition du denim
      description: Finition de surface ou traitement appliqué au tissu denim.
    denim_intended_use:
      name: Usage prévu du denim
      description: Type de projet ou d’usage pour lequel le denim est commercialisé.
    denim_stretch_type:
      name: Type d’élasticité du denim
      description: Indique le type d’élasticité du denim (mécanique, élasthanne ou
        absence de stretch).
    denim_wash:
      name: Délavage du denim
      description: Indique la teinte ou le traitement de lavage appliqué au tissu
        denim (par exemple, clair, foncé, brut ou délavé à l’acide).
    derailleur_cage_length:
      name: Longueur de chape du dérailleur
      description: Indique la longueur de chape du dérailleur, qui détermine la capacité
        de chaîne, principalement pour les dérailleurs arrière.
    derailleur_mounting_style:
      name: Style de fixation du dérailleur
      description: Précise le mode de fixation du dérailleur au cadre du vélo ou à
        la patte de dérailleur (par exemple, fixation à braser, à collier, à montage
        direct ou UDH).
    derailleur_type:
      name: Type de dérailleur
      description: Indique si le produit est un dérailleur avant ou arrière.
    deshedder_tool_type:
      name: Type d’outil de débourrage
      description: Classe l’outil de débourrage selon sa conception, afin que les
        acheteurs puissent choisir la méthode de toilettage qui leur convient (par
        exemple, lame, bloc, étrille ou gant).
    diabolo_axle_system:
      name: Système d’axe de diabolo
      description: Spécifie le système/configuration d’axe du diabolo et son impact
        sur les performances (grinds, stabilité, usure de la corde).
    diagnostic_functions_supported:
      name: Fonctions de diagnostic prises en charge
      description: Précise les fonctions de diagnostic ou de maintenance que le scanner
        peut exécuter.
    diagnostic_interface_type:
      name: Type d’interface de diagnostic
      description: Mode de connexion ou interface de communication avec le véhicule
        ou l’appareil (par exemple, OBD-II, Bluetooth, Wi–Fi, USB).
    diamond_color_grade:
      name: Grade de couleur du diamant
      description: Indique l’échelle de graduation des teintes de couleur des diamants,
        de D (incolore) à Z (teinte légère), ou les diamants de couleur fantaisie.
    diaper_cover_style:
      name: Style de housse de couche
      description: Définit la silhouette ou le style décoratif du couvre-couche pour
        la navigation et le filtrage par style.
    diastatic_power_unit:
      name: Unité de pouvoir diastasique
      description: Spécifie le système d’unités utilisé pour exprimer la puissance
        diastasique (ex. degré Lintner ou Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Système d'accordage de l'harmonica diatonique
      description: Spécifie la disposition des notes ou le système d’accordage utilisé
        par l’harmonica diatonique.
    dice_sides:
      name: Faces du dé
      description: Nombre de faces par dé pour les dés inclus dans le produit (par
        exemple, d6, d20). Pour les ensembles mixtes, utilisez la valeur dominante
        ou indiquez plusieurs valeurs lorsque cette option est prise en charge.
    didgeridoo_construction_type:
      name: Type de construction du didgeridoo
      description: Décrit la manière dont le didgeridoo est construit ou fabriqué
        (approche traditionnelle ou moderne).
    dietary_formulation_claim:
      name: Allégation relative à la formulation alimentaire
      description: Indique les caractéristiques de formulation importantes pour la
        nutrition des chevaux (sans céréales, faible en amidon, biologique).
    dinosaur_playset_scale_figure_size_class:
      name: Taille ou échelle des figurines de l’ensemble de dinosaures
      description: Décrit l’échelle générale des dinosaures ou figurines inclus afin
        de déterminer leur compatibilité avec d’autres ensembles.
    dinosaur_species_included:
      name: Espèces de dinosaures incluses
      description: Indique les espèces de dinosaures représentées dans l’ensemble
        de jeu, sous forme de figurines ou de dinosaures moulés.
    dipsy_diver_size_designation:
      name: Désignation de taille du Dipsy Diver
      description: Indique le code de taille défini par le fabricant du Dipsy Diver,
        corrélé au poids et à la profondeur de plongée.
    disc_brake_rotor_mount_type:
      name: Type de fixation du disque de frein
      description: Indique le mode de fixation du disque de frein sur le moyeu (par
        exemple, 6 boulons ou Center Lock).
    disc_lock_accessories_included:
      name: Accessoires inclus avec l’antivol de disque
      description: Indique les accessoires inclus avec l’antivol de disque pour vélo
        (câble de rappel, pochette, support de montage, piles, etc.).
    disco_ball_mirror_tile_material:
      name: Matériau des carreaux de miroir « boule disco »
      description: Matériau des facettes réfléchissantes de la boule à facettes (le
        cas échéant).
    disco_ball_mirror_tile_size:
      name: Taille des facettes de la boule à facettes
      description: Taille approximative des carreaux ou carrés miroir individuels
        de la boule disco.
    display_backlight_color:
      name: Couleur du rétroéclairage de l’affichage
      description: Couleur du rétroéclairage ou de l’éclairage de l’affichage ou du
        cadran du compteur.
    disposable_compostable_claim:
      name: Allégation relative au caractère jetable ou compostable
      description: Indique si le produit est compostable, biodégradable, recyclable
        ou rien de tout cela (le cas échéant).
    distillation_method:
      name: Méthode de distillation
      description: Indique le procédé de distillation ou le type d’alambic utilisé
        pour la production du spiritueux.
    distilled_water_intended_use:
      name: Utilisation prévue de l’eau distillée
      description: Définit l’usage principal de l’eau distillée (par exemple, boisson,
        appareil CPAP, humidificateur, fer à vapeur).
    distress_transmission_frequency:
      name: Fréquence de transmission de détresse
      description: Fréquence(s) radio principale(s) utilisée(s) pour les alertes de
        détresse.
    distressing_level:
      name: Niveau d’usure artificielle
      description: Spécifie le degré d’usure volontaire, de déchirures ou d’effilochage
        appliqué au tissu.
    distressing_style:
      name: Style d’usure volontaire
      description: Indique le type ou le degré d’usure volontaire appliqué au jean,
        par exemple des effets déchirés ou de moustaches.
    distributor_advance_mechanism:
      name: Mécanisme d’avance de l’allumeur
      description: Précise le type de mécanisme d’avance à l’allumage utilisé par
        l’allumeur.
    distributor_cap_terminal_type:
      name: Type de borne de tête d’allumeur
      description: Précise le type de bornes de la tête d’allumeur.
    distributor_gear_material:
      name: Matériau du pignon d’entraînement de l’allumeur
      description: Spécifie le matériau de l’engrenage d’entraînement de l’allumeur.
    distributor_ignition_type:
      name: Type d’allumage de l’allumeur
      description: Indique le type d’allumage (rupteurs, électronique ou HEI) du distributeur.
    distributor_kit_contents:
      name: Contenu du kit d’allumeur
      description: Indique les composants fournis avec l’allumeur (par exemple, tête,
        rotor, module d’allumage, joint/joint torique, pignon d’entraînement, câblage/connecteur).
    dive_computer_form_factor:
      name: Format de l’ordinateur de plongée
      description: Précise la conception physique ou le mode de montage de l’ordinateur
        de plongée, par exemple sur console ou au format montre.
    diving_mask_design:
      name: Conception du masque de plongée
      description: Définit le style structurel général du masque de plongée, influençant
        l’ajustement, le champ de vision et l’usage.
    divot_tool_prong_configuration:
      name: Configuration des dents du relève-pitch
      description: Spécifie le nombre et la disposition des dents du relève-pitch
        utilisées pour réparer les dégâts sur le gazon.
    divot_tool_style:
      name: Style de relève-pitch
      description: Définit le style structurel ou de déploiement du relève-pitch (fixe,
        pliant, multioutil, clip pour casquette ou club, etc.).
    djembe_shell_construction:
      name: Construction de la coque du djembé
      description: Décrit la méthode de fabrication du corps du djembé.
    djembe_tuning_system:
      name: Système d’accordage du djembé
      description: Précise le mode de tension ou d’accordage du djembé.
    dmx_output_connector_type:
      name: Type de connecteur de sortie DMX
      description: Format physique du connecteur utilisé pour les ports de sortie
        DMX du contrôleur.
    doctor_playset_items_included:
      name: Éléments du coffret de jeu « Le petit médecin » inclus
      description: Énumère les instruments médicaux factices et les accessoires de
        jeu de rôle inclus dans le jeu de docteur (par exemple, un stéthoscope, une
        seringue ou un marteau à réflexes).
    doctor_playset_role_play_setting:
      name: Contexte de jeu de rôle du coffret docteur
      description: Indique le principal contexte de jeu de rôle représenté par le
        jeu de docteur.
    doctor_playset_wearable_items_included:
      name: 'Ensemble de jeu « Le petit médecin » : accessoires à porter inclus'
      description: Indique les éléments de costume portables inclus dans le jeu.
    doll_accessory_type:
      name: Type d’accessoire pour poupée
      description: Définit le type d’accessoire pour poupée ou figurine (vêtements,
        chaussures, mobilier, présentoirs, etc.), permettant de filtrer et parcourir
        cette catégorie.
    doll_eye_type:
      name: Type d’yeux de la poupée
      description: Précise le mode de réalisation des yeux de la poupée (par exemple,
        en acrylique incrusté, peints ou lumineux à LED).
    doll_hair_fiber_type:
      name: Type de fibre des cheveux de la poupée
      description: Type de cheveux/fibres (ou absence de cheveux) utilisés pour la
        poupée, influençant réalisme, coiffage et entretien.
    doll_making_kit_components_included:
      name: Composants inclus dans le kit de fabrication de poupées
      description: Liste les principaux matériaux et outils inclus dans le kit de
        fabrication de poupée afin de comparer les ensembles et identifier ce qui
        doit être fourni séparément.
    dollhouse_installation_placement_type:
      name: Type de pose ou d’installation de la maison de poupée
      description: Indique si la maison de poupée est destinée à être posée sur une
        table, installée au sol ou fixée au mur.
    dollhouse_items_included:
      name: Éléments inclus dans la maison de poupée
      description: Indique le contenu de la maison de poupée (mobilier, figurines,
        accessoires).
    dollhouse_lighting_type:
      name: Type d’éclairage de la maison de poupée
      description: Indique le type d’éclairage de la maison de poupée (fourni ou compatible).
    dollhouse_room_type:
      name: Type de pièce dans la maison de poupée
      description: Précise la pièce ou la partie de la maison de poupée à laquelle
        l’accessoire est généralement destiné.
    dollhouse_scale:
      name: Échelle de la maison de poupée
      description: Indique le rapport d’échelle d’une maison de poupée ou de ses accessoires
        (par exemple, 1:12), pour assurer la compatibilité entre les maisons, les
        meubles et les figurines.
    dollhouse_style_theme:
      name: Style ou thème de la maison de poupée
      description: Style ou thème général de la maison de poupée pour la recherche
        et les cadeaux (ex. moderne ou victorien).
    donnos_playing_technique:
      name: Technique de jeu du Donnos
      description: Indique si le Donnos se joue ou s’actionne uniquement à la main
        ou avec une baguette/un percuteur, afin que l’acheteur puisse vérifier l’usage
        prévu et les accessoires inclus.
    donnos_tuning_system:
      name: Système de réglage Donnos
      description: Principal mode utilisé pour accorder l’instrument ou en modifier
        la hauteur (par exemple, cordes de tension ou mécanisme de compression).
    door_assembly_type:
      name: Type de montage de porte
      description: 'Indique ce qui est inclus : coque de porte uniquement, habillage
        de porte ou porte complète.'
    door_closure_mechanism:
      name: Mécanisme de fermeture de porte
      description: Définit le mécanisme de fermeture de la porte (ex. fermeture douce,
        loquet magnétique).
    door_handle_components_included:
      name: Composants de poignée de porte inclus
      description: Indique les pièces principales fournies avec la poignée de porte
        (par exemple, un barillet, un joint, un cache de finition, des éléments de
        fixation, un faisceau de raccordement, un loquet ou un actionneur).
    door_handle_operation:
      name: Fonctionnement de la poignée de porte
      description: Spécifie le mode d’actionnement principal de la poignée de porte
        du véhicule (liaison mécanique, cylindre de clé, tactile sans clé, poignée
        escamotable électrique).
    door_lock_knob_attachment_method:
      name: Méthode de fixation du bouton de verrouillage de porte
      description: Indique le type de fixation du bouton de verrouillage sur la tige
        de serrure (fileté, à pression, etc.).
    door_lock_position:
      name: Emplacement du verrou de porte
      description: Précise l’emplacement de porte ou d’ouverture du véhicule auquel
        la serrure ou la pièce de serrure est adaptée.
    door_seal_feature_set:
      name: Ensemble de caractéristiques du joint de porte
      description: Indique les caractéristiques fonctionnelles du joint de porte.
    door_seal_material_type:
      name: Type de matériau du joint de porte
      description: Famille principale d’élastomère ou de matériau du joint de porte,
        au-delà de la matière générique.
    door_seal_product_form:
      name: Forme de vente du joint de porte
      description: Précise le format de commercialisation/conditionnement du joint
        de porte.
    door_window_operation:
      name: Fonctionnement de la vitre de la porte
      description: Précise si le système de vitre de la porte est prévu pour une commande
        manuelle ou motorisée, ou si la porte ne comporte pas de vitre.
    double_decker_bus_deck_configuration:
      name: Configuration des ponts du bus à deux étages
      description: Indique la configuration des niveaux et du toit d’un bus à deux
        étages.
    double_drum_pedal_linkage_medium:
      name: Système de transmission de la double pédale de grosse caisse
      description: Précise l’élément de liaison entre la pédale secondaire et la pédale
        principale (par exemple, un arbre de transmission, une chaîne ou une courroie).
    double_end_bag_core_type:
      name: Type de noyau du sac de frappe double extrémité
      description: Identifie la structure interne du noyau de frappe, qui détermine
        la vitesse de rebond, le ressenti et les exigences d’entretien.
    double_pointed_needle_point_style:
      name: Type de pointe des aiguilles à double pointe
      description: Décrit la finesse ou la forme de la pointe prévue pour différents
        fils et styles de tricot.
    dough_extruder_accessories_included:
      name: Accessoires fournis avec l’extrudeuse à pâte
      description: Composants supplémentaires inclus avec l’extrudeuse de pâte.
    dough_extruder_operation_type:
      name: Type de fonctionnement de l’extrudeuse de pâte
      description: Indique comment la pâte est extrudée pour créer des formes.
    dough_extruder_shape_disc_included:
      name: Plaque de forme incluse pour extrudeuse de pâte
      description: Formes que l’extrudeuse peut produire au moyen des disques ou buses
        inclus.
    dough_format:
      name: Type de pâte
      description: Indique la présentation physique ou la forme de la pâte dans l’emballage
        (par exemple, boule, feuille, disque ou filaments effilochés).
    doumbek_accessories_included:
      name: Accessoires pour doumbek inclus
      description: Accessoires fournis avec le doumbek (par exemple, clé d’accordage
        ou étui).
    doumbek_head_material:
      name: Matériau de la peau du doumbek
      description: Matériau de la peau (membrane) du doumbek.
    doumbek_head_type:
      name: Type de peau du doumbek
      description: Construction ou type de peau du doumbek (mode de fabrication ou
        de montage de la membrane).
    doumbek_playing_style_technique:
      name: Style ou technique de jeu du doumbek
      description: Contexte ou style de jeu généralement associé au doumbek.
    doumbek_tuning_system:
      name: Système d'accordage du doumbek
      description: Mode de tension ou d’accordage du doumbek, ou indication qu’il
        n’est pas accordable.
    dowel_end_style:
      name: Type d’extrémité de cheville
      description: Décrit la forme des extrémités des chevilles, influençant l’insertion,
        la sécurité et l’usage artisanal.
    dowel_surface_texture:
      name: Texture de la surface de la cheville
      description: Décrit l’état de surface de la cheville (lisse, cannelée, etc.),
        influençant l’apparence et l’adhérence de la colle.
    drafting_compass_adjustment_mechanism:
      name: Mécanisme de réglage du compas
      description: Mécanisme principal de réglage fin utilisé pour définir précisément
        le rayon.
    drafting_compass_fine_adjustment_mechanism:
      name: Mécanisme de réglage fin d'un compas de dessin
      description: Type de réglage fin utilisé pour définir précisément le rayon (le
        cas échéant).
    drafting_compass_lead_holder_type:
      name: Type de porte-mine de compas
      description: Indique le type de porte-mine ou support de mine du compas.
    drag_system_material:
      name: Matériau du système de frein
      description: Identifie le matériau ou la technologie du système de frein, influençant
        la résistance à la chaleur et la fluidité.
    drag_system_type:
      name: Type de système de traction
      description: Identifie le type de mécanisme de frein utilisé dans le moulinet
        (avant, arrière, levier, étoile, magnétique, disque).
    drag_type:
      name: Type de frein
      description: Précise le type de mécanisme de frein du moulinet (emplacement
        ou mode d’actionnement).
    drawer_features:
      name: Caractéristiques du tiroir
      description: Détaille les éléments de construction ou les fonctionnalités propres
        au tiroir (par exemple, fermeture amortie, doublure en feutre).
    drawer_slide_type:
      name: Type de glissière de tiroir
      description: Précise le mode de montage et le type d’extension des glissières
        de tiroir (par exemple, montage sous tiroir, extension complète).
    drawing_ink_compatible_tools:
      name: Outils compatibles avec l’encre à dessin
      description: Spécifie les outils d’application de l’encre (ex. plume, pinceau).
    drawing_ink_permanence:
      name: Permanence de l’encre à dessin
      description: Précise la tenue dans le temps de l’encre pour l’art et la reproduction.
    dress_embellishment:
      name: Ornements de robe
      description: Indique les ornements décoratifs de la robe.
    dress_train_type:
      name: Type de traîne de robe
      description: Indique si la robe comporte une traîne, ainsi que la longueur ou
        le style de celle-ci, car ces informations renseignent le degré de formalité
        et l’adéquation au lieu de l’événement.
    dried_surface_finish:
      name: Dried surface finish
      description: Décrit l’aspect de surface après séchage (brillance/texture).
    drink_tube_insulation:
      name: Isolation du tube à boisson
      description: Indique si le tube pour boisson comporte une isolation ou une gaine
        thermique destinée à empêcher le liquide de chauffer ou de geler.
    drive_band_cross_section_shape:
      name: Profil de section de la courroie d’entraînement
      description: Indique la forme de section de la courroie d’entraînement (ronde,
        plate, etc.).
    drive_band_join_type:
      name: Type de jonction de la courroie d’entraînement
      description: Mode de jonction ou de construction de la courroie d’entraînement
        (sans fin, à nouer, etc.).
    drive_band_material_type:
      name: Type de matériau de la courroie d'entraînement
      description: Spécifie le matériau/type de courroie utilisé sur les rouets.
    drive_location:
      name: Emplacement de l’entraînement
      description: Indique l’emplacement du volant d’inertie ou du mécanisme d’entraînement
        sur le vélo elliptique, car cette position modifie l’encombrement au sol et
        la sensation de mouvement.
    drive_mechanism:
      name: Mécanisme d’entraînement
      description: Identifie le type de système d’entraînement utilisé pour transmettre
        la puissance des pédales au volant d’inertie.
    drive_shaft_material:
      name: Matière de l’arbre de transmission
      description: Précise le matériau principal utilisé pour fabriquer le tube d’arbre
        de transmission ou l’ensemble complet.
    drive_system:
      name: Système d’entraînement
      description: Spécifie le mécanisme qui transmet la force de pédalage au système
        de résistance.
    drivetrain_configuration:
      name: Configuration de la transmission
      description: Indique la configuration de la transmission du vélo (fixe, roue
        libre monovitesse ou flip-flop).
    drivetrain_speed_compatibility:
      name: Compatibilité des vitesses de la transmission
      description: Énumère les vitesses de cassette avec lesquelles le plateau est
        conçu pour fonctionner, afin de garantir un profil de dents et un espacement
        appropriés.
    drone_positioning_system:
      name: Système de positionnement du drone
      description: Technologie de positionnement et de maintien embarquée prise en
        charge par le drone pour la navigation et le vol stationnaire stable.
    drone_transmission_type:
      name: Type de transmission du drone
      description: Méthode principale utilisée pour le contrôle et/ou la liaison vidéo
        entre le drone et la télécommande/appareil.
    drop_spindle_whorl_position:
      name: Position de la fusaïole sur fuseau suspendu
      description: Position de la fusaïole sur la tige.
    drum_carder_accessories_included:
      name: Accessoires pour cardeuse à tambour inclus
      description: Éléments couramment fournis avec un kit de cardeuse à tambour.
    drum_clamp_locking_mechanism:
      name: Mécanisme de verrouillage de la pince de batterie
      description: Spécifie la manière dont la pince se verrouille sur le tube/cerclage
        (ex. vis papillon, clé de batterie, attache rapide).
    drum_clamp_mount_interface:
      name: Interface de montage de la pince de tambour
      description: Indique le type de fixation proposé par la pince (support L-rod,
        rotule, inclinaison de cymbale, etc.).
    drum_clamp_type:
      name: Type de pince de batterie
      description: Spécifie le type fonctionnel de pince utilisé dans le matériel
        de montage de batterie (cerclage ou rack/tube).
    drum_head_application_batter_resonant:
      name: Application de peau de batterie (battante/résonante)
      description: Indique si la peau est destinée à la frappe ou à la résonance.
    drum_head_collar_type:
      name: Type de collerette de peau de batterie
      description: Spécifie si la peau possède une collerette standard, basse ou spéciale
        adaptée aux fûts.
    drum_head_damping_control:
      name: Contrôle d’amortissement de peau de batterie
      description: Fonction intégrée de contrôle des harmoniques ou d’amortissement
        dans la conception de la peau.
    drum_head_film_material:
      name: Matériau du film de la peau de batterie
      description: Matériau principal du film de peau, généralement en PET/Mylar,
        mais pouvant aussi inclure des matériaux spécialisés.
    drum_head_hoop_collar_type:
      name: Type de cerclage/collier de peau de tambour
      description: Indique la construction du cercle et du collet de la peau de tambour
        (par exemple, le profil du collet et le matériau du cercle), car cette construction
        peut influer sur l’ajustement et la stabilité de l’accordage sur certains
        fûts et cercles.
    drum_head_hoop_rim_material:
      name: Matériau du cerclage de peau de batterie
      description: Matériau du cerclage interne de la peau de batterie (flesh hoop),
        affectant la durabilité et la tenue de l’accord.
    drum_head_included:
      name: Peau de tambour incluse
      description: Indique si des peaux de frappe et/ou de résonance sont incluses
        avec la batterie.
    drum_head_muffling_feature:
      name: Fonction d'atténuation du son de la peau de tambour
      description: Fonction de contrôle des harmoniques intégrée à la peau de batterie.
    drum_head_muffling_type:
      name: Type d’atténuation de la peau de tambour
      description: Indique si la peau de batterie intègre des éléments d’amortissement
        ou de contrôle des harmoniques.
    drum_head_ply_count:
      name: Nombre de plis de la peau de batterie
      description: Nombre de plis ou de couches de film utilisés dans la construction
        de la peau de tambour (par exemple, 1 pli, 2 plis).
    drum_head_position:
      name: Position de la peau de tambour
      description: Indique si la peau est destinée à la frappe (fonction battante),
        à la résonance (fonction résonante), au côté caisse claire ou à un usage polyvalent.
    drum_head_reinforcement_type:
      name: Type de renfort de peau de batterie
      description: Indique si la peau de caisse claire comporte des renforts, comme
        un point central ou un anneau de contrôle, pour accroître sa durabilité et
        recentrer le son.
    drum_head_surface_finish:
      name: Finition de la surface de la peau de tambour
      description: Texture ou finition de surface de la peau, déterminante pour l’attaque
        et la réponse aux balais.
    drum_head_type:
      name: Type de peau de tambour
      description: Spécifie la construction/type de peau de batterie fournie (battante
        ou résonante).
    drum_key_design_type:
      name: Type de conception de la clé de tambour
      description: Décrit la conception fonctionnelle de la clé de batterie (standard,
        à cliquet, poignée en T).
    drum_key_drive_type:
      name: Type d’entraînement de clé de batterie
      description: Spécifie le type d’empreinte de la clé de batterie utilisée pour
        engager les tirants ou fixations.
    drum_key_handle_style:
      name: Style de poignée de clé de batterie
      description: Décrit le style ergonomique de la poignée de la clé de batterie,
        influençant confort et levier.
    drum_kit_included_items:
      name: Éléments fournis avec le kit de batterie
      description: Liste les principaux éléments inclus dans le kit de batterie au-delà
        des fûts/pads (support, cymbales, siège, etc.).
    drum_kit_portability:
      name: Portabilité du kit de batterie
      description: Indique si le kit est conçu pour être rangé ou transporté de façon
        compacte (par exemple, voyage, compact ou pliant).
    drum_kit_shell_construction_features:
      name: Caractéristiques de construction des fûts du kit de batterie
      description: Indique la structure des fûts de batterie (nombre/type de plis)
        influençant le son et la durabilité.
    drum_mount_clamp_type:
      name: Type à pince de fixation sur tambour
      description: Décrit le format de pince utilisé dans le matériel de montage de
        batterie.
    drum_multi_clamp_clamp_type:
      name: Type de pince de la multipince de batterie
      description: Décrit le style fonctionnel de la multipince (comment elle serre
        et ce qu’elle connecte).
    drum_mute_material:
      name: Matériau de la sourdine de batterie
      description: Précise le matériau principal de la sourdine qui entre en contact
        avec la peau de tambour et/ou atténue les vibrations.
    drum_pad_triggering_zones:
      name: Zones de déclenchement du pad de batterie
      description: Indique le nombre et le type de zones de déclenchement prises en
        charge par le pad de tom (par exemple, peau seule ou peau+bord), car ces zones
        déterminent l’expressivité et la compatibilité avec les modules.
    drum_pedal_accessories_included:
      name: Accessoires pour pédale de batterie inclus
      description: Énumère les principaux accessoires et composants fournis avec la
        pédale de batterie.
    drum_pedal_baseplate_type:
      name: Type de plaque de base de pédale de batterie
      description: Indique si la pédale comporte une plaque de base ou adopte une
        conception flottante/sans cadre.
    drum_pedal_bearing_type:
      name: Type de roulement de pédale de batterie
      description: Indique le type de roulement au niveau des articulations principales
        de la pédale (rocker, talon, came).
    drum_pedal_cam_type:
      name: Type de pince de pédale de batterie
      description: Spécifie la forme/géométrie de la came de la pédale, influençant
        le toucher et la réponse (linéaire, accélérateur, etc.).
    drum_pedal_chain_configuration:
      name: Configuration de chaîne de pédale de batterie
      description: Spécifie l’agencement de la chaîne sur une pédale de batterie (simple,
        double ou décalée).
    drum_pedal_chain_type:
      name: Pédale de batterie à chaîne
      description: Indique le type de chaîne utilisé dans la transmission (rouleaux,
        type vélo, etc.), influençant fluidité et durabilité.
    drum_pedal_clamp_type:
      name: Type de pince de pédale de batterie
      description: Précise le mode de fixation de la pédale au cercle de grosse caisse.
    drum_pedal_intended_use:
      name: Usage prévu de la pédale de batterie
      description: Précise le contexte d’utilisation principal de la pédale à courroie
        (jeu et performance).
    drum_pedal_spring_adjustment_method:
      name: Mode de réglage du ressort de la pédale de batterie
      description: Indique le mode de réglage de la tension du ressort sur la pédale.
    drum_pedal_spring_type:
      name: Type de ressort de pédale de batterie
      description: Définit le mécanisme à ressort qui assure le rappel de la pédale.
    drum_shell_material:
      name: Matériau du fût
      description: Précise le matériau principal utilisé pour fabriquer le fût des
        tambours acoustiques (par exemple, érable, bouleau, acrylique).
    drum_shell_wood_species:
      name: Essence de bois du fût de tambour
      description: Désigne l’essence de bois utilisée pour le fût du tambour, qui
        conditionne le timbre et la résonance.
    drumhead_type:
      name: Type de peau de tambour
      description: Configuration ou type de peau utilisé sur l’octoban.
    drumstick_model:
      name: Modèle de baguette de batterie
      description: Désignation normalisée du modèle ou de la taille des baguettes,
        utilisée par de nombreuses marques (par exemple, 5A, 7A).
    drumstick_taper:
      name: Effilement de la baguette
      description: Décrit le profil d’effilement de la baguette, de la tige à la pointe,
        car il modifie le rebond et l’équilibre.
    drysuit_footwear_style:
      name: Type de chaussant de combinaison étanche
      description: Décrit la finition intégrée du bas des jambes de la combinaison
        étanche (p. ex., bottes intégrées, chaussons en néoprène, chaussons souples
        ou manchons de cheville nus).
    dumbbell_style:
      name: Style d’haltère
      description: Indique la conception fondamentale de l’haltère, selon qu’il s’agit
        d’un modèle fixe, d’un système réglable ou d’une poignée pouvant recevoir
        des charges, car elle conditionne fortement le choix d’achat et les usages
        d’entraînement.
    dundun_playing_position:
      name: Position de jeu du dundun
      description: Position prévue pour jouer du tambour ou pour le porter.
    dye_status:
      name: État de teinture
      description: Indique si la nappe est teinte, non teinte ou naturelle, ou si
        elle comprend plusieurs couleurs ou mélanges.
    dye_style:
      name: Style de teinture
      description: Spécifie si la couleur du fil est unie, panachée ou obtenue par
        une teinture spéciale.
    dye_technique:
      name: Technique de teinture
      description: Méthode utilisée pour colorer la fibre (p. ex., teinture à la main,
        teinture en cuve, teinture spatiale).
    dye_type_needlecraft_fabric:
      name: Type de teinture (tissu pour ouvrage à l’aiguille)
      description: Indique si le tissu de lin est uni, teint à la main ou teint selon
        une technique spéciale.
    dyeing_color_processing:
      name: Teinture ou procédé de coloration
      description: Décrit si la fibre a été colorée et, le cas échéant, par quel procédé
        (par exemple, non teinte, blanchie, blanche ou traitée selon une technique
        de teinture précise).
    e_bike_certification_class:
      name: Classe de certification du vélo électrique
      description: Définit l’indice de vitesse officiel du pneu pour vélos électriques
        (p. ex., E-25 ou E-50).
    e_bike_speed_rating:
      name: Catégorie de vitesse du vélo électrique
      description: Indique le niveau officiel de certification du pneu pour vélos
        électriques (p. ex., E25 pour ≤ 25 km/h ou E50 pour ≤ 50 km/h).
    e_scooter_connector_type:
      name: Type de connecteur de trottinette électrique
      description: Indique le type de connecteur électrique ou de fiche utilisé par
        le composant pour les connexions d’alimentation ou de signal.
    e_scooter_throttle_type:
      name: Type d’accélérateur de trottinette électrique
      description: Définit le type d’accélérateur utilisé pour contrôler l’accélération
        d’une trottinette électrique.
    ear_coverage:
      name: Protection des oreilles
      description: Précise si le casque comprend une protection des oreilles et si
        celle-ci est amovible.
    ear_coverage_style:
      name: Modèle couvrant les oreilles
      description: Décrit si le masque anti-mouches couvre les oreilles et de quelle
        manière.
    ear_coverage_type:
      name: Type de protection des oreilles
      description: Précise la manière dont le chapeau couvre ou protège les oreilles,
        en indiquant notamment s’il comporte des rabats d’oreilles et de quel type.
    ear_guard_type:
      name: Type de protège-oreille
      description: Décrit le type de protection des oreilles intégré à la casquette,
        par exemple des protections rigides en plastique, rembourrées ou amovibles.
    earmuff_style:
      name: Type de cache-oreilles
      description: Indique le mode de port du cache-oreilles, par exemple avec un
        arceau passant sur la tête ou derrière la tête.
    earring_closure_type:
      name: Type de fermoir de boucle d'oreille
      description: Définit le mécanisme utilisé pour fixer la boucle d’oreille à l’oreille
        (p. ex., poussette, dormeuse ou clip).
    easel_art_desk_features:
      name: Caractéristiques du chevalet et du bureau d’art
      description: Met en avant les caractéristiques fonctionnelles courantes incluses
        avec le chevalet ou la table d’activités artistiques.
    easel_art_desk_surface_type:
      name: Type de surface du chevalet ou de la table d’activités artistiques
      description: Indique les surfaces fournies pour dessiner ou écrire (par exemple,
        un tableau noir, un tableau blanc, un rouleau de papier ou un tableau magnétique).
    eb_clarinet_body_type:
      name: Type de corps de clarinette en mi bémol
      description: Indique si la clarinette en mi bémol est une variante soprano ou
        alto.
    eco_material_type:
      name: Type de matériau écologique
      description: Présente la technologie écoresponsable de mousse ou de matériau
        utilisée dans le coussin.
    edge_construction:
      name: Construction des bords
      description: Indique si le ski comporte une carre métallique sur tout ou partie
        de sa longueur, ou s’il n’en comporte pas.
    edge_tuner_type:
      name: Type d’affûteur de carres
      description: Classe les affûteurs de carres pour skis ou snowboards selon leur
        conception, par exemple un guide-lime ou une machine électrique.
    edible_plant_part:
      name: Partie comestible de la plante
      description: Indique quelle partie de la plante est vendue pour la consommation.
    educational_guide_included:
      name: Guide pédagogique inclus
      description: Indique les supports pédagogiques inclus avec le modèle.
    educational_topic:
      name: Thème pédagogique
      description: Thème d’apprentissage principal abordé dans le contenu pédagogique
        de la fourmilière.
    egg_component:
      name: Partie de l’œuf
      description: Indique quelle partie de l’œuf le produit contient, par exemple
        l’œuf entier, les blancs seuls, les jaunes, des mélanges ou des substituts.
    egg_component_replaced:
      name: Partie de l’œuf remplacée
      description: Indique quelle partie de l’œuf le produit est destiné à remplacer
        (p. ex., l’œuf entier ou le blanc d’œuf).
    egg_enrichment:
      name: Enrichissement des œufs
      description: Indique les enrichissements nutritionnels ajoutés aux œufs, par
        exemple en oméga-3 ou en vitamine D.
    egg_farming_method:
      name: Mode d’élevage des poules pondeuses
      description: Indique la méthode de production ou d’élevage utilisée pour les
        œufs (p. ex., hors cage, en plein air ou biologique).
    egg_grade:
      name: Catégorie de qualité des œufs
      description: Indique la catégorie de qualité attribuée par les organismes réglementaires
        ou professionnels.
    egg_processing_state:
      name: État de transformation des œufs
      description: Indique les traitements éventuels appliqués aux œufs avant la vente
        (p. ex., frais, salés ou œufs de cent ans).
    egg_production_method:
      name: Mode de production des œufs
      description: Précise le mode d’élevage ou d’hébergement utilisé pour produire
        les œufs (par exemple, sans cage, élevé en plein air ou biologique).
    egg_replacer_main_ingredient:
      name: Ingrédient principal du substitut d’œuf
      description: Indique l’ingrédient de base principal à partir duquel le substitut
        d’œuf est fabriqué, pour aider les utilisateurs à choisir selon leurs besoins
        alimentaires ou les propriétés recherchées en pâtisserie.
    egg_size:
      name: Taille des œufs
      description: Classe les œufs selon les désignations de taille standard du marché.
    egg_source_animal:
      name: Espèce d’origine des œufs
      description: Indique l’espèce animale dont proviennent les œufs.
    egg_white_processing_method:
      name: Méthode de traitement des blancs d’œufs
      description: Indique le traitement appliqué aux blancs d’œufs après collecte
        (par exemple, pasteurisés ou séchés par atomisation), car ce traitement influe
        sur la sécurité alimentaire, la durée de conservation et les usages prévus.
    eggplant_variety:
      name: variété d'aubergines
      description: Définit le cultivar ou la variété commerciale de l’aubergine, afin
        de distinguer les types selon leur taille, leur goût, leur couleur et leur
        usage culinaire.
    eggshell_color:
      name: Couleur de la coquille des œufs
      description: Précise la couleur dominante de la coquille des œufs.
    elastic_edge_finish_type:
      name: Type de finition du bord élastique
      description: Précise la façon dont le bord de l’élastique tissé est réalisé,
        car elle influe sur le confort et l’usage auquel il se destine.
    elastic_intended_use:
      name: Usage prévu de l’élastique
      description: Usage principal pour lequel l’élastique est conçu, afin de faciliter
        la recherche et de réduire les erreurs d’association.
    elastic_recovery_performance:
      name: Performance de reprise de l’élastique
      description: Décrit dans quelle mesure l’élastique tissé retrouve sa longueur
        initiale après étirement.
    elastic_recovery_quality:
      name: Qualité de reprise de l’élastique
      description: Indique la reprise de l’élastique après étirement, c’est-à-dire
        sa capacité à retrouver sa longueur initiale.
    elastic_stretch_level:
      name: Niveau d’extensibilité de l’élastique
      description: Degré auquel l’élastique peut s’allonger sous tension, souvent
        exprimé en niveaux relatifs lorsque le pourcentage exact n’est pas fourni.
    elastic_structure:
      name: Structure de l’élastique
      description: Définit la structure de l’élastique à boutonnières (p. ex., tricoté,
        tissé ou tressé), qui peut modifier l’extensibilité, la reprise et le comportement
        à la couture.
    elastic_type:
      name: Type élastique
      description: Définit le type de construction de l’élastique (p. ex., élastique
        préplié [FOE], tressé, tricoté ou tissé).
    electric_assist_type:
      name: Type d’assistance électrique
      description: Indique si le vélo dispose d’une assistance motorisée et précise
        le type d’assistance fourni.
    electric_bicycle_motor_position:
      name: Position du moteur du vélo électrique
      description: Emplacement du moteur d’entraînement sur le vélo électrique, par
        exemple moteur central, moyeu avant, moyeu arrière ou double moyeu.
    electric_bike_class:
      name: Classe de vélo électrique
      description: Classe le vélo électrique selon les catégories réglementaires qui
        définissent les limites de vitesse et l’assistance par accélérateur.
    electric_guitar_bridge_type:
      name: Type de chevalet de guitare électrique
      description: Définit le type de système de chevalet ou de vibrato de la guitare
        électrique.
    electric_instrument_output_connection_type:
      name: Type de connexion de sortie de l’instrument électrique
      description: Définit le ou les types de connexions physiques de sortie audio
        présents sur le violoncelle électrique.
    electric_riding_vehicle_control_options:
      name: Options de commande du véhicule électrique à chevaucher
      description: Options de commande ou d’utilisation accessibles au conducteur
        ou au parent (par exemple, pédale, volant ou prise de contrôle à distance).
    electric_spinning_wheel_speed_control_type:
      name: Type de commande de vitesse du rouet électrique
      description: Décrit la manière dont l’utilisateur règle la vitesse de rotation
        de la roue électrique.
    electric_ukulele_output_jack_type:
      name: Type de prise de sortie de l’ukulélé électrique
      description: Précise le connecteur physique de sortie utilisé par l’ukulélé
        électrique.
    electric_van_body_length_class:
      name: Catégorie de longueur de carrosserie des fourgons électriques
      description: Classe courante de taille de fourgon, fondée sur l’empattement
        ou la longueur et utilisée dans les fiches produit.
    electric_van_roof_height_class:
      name: Classe de hauteur de toit du fourgon électrique
      description: Classification courante de la hauteur de toit des fourgons, en
        particulier des fourgons utilitaires.
    electric_vehicle_drivetrain_layout:
      name: Agencement de la chaîne cinématique du véhicule électrique
      description: Configuration des moteurs et des essieux qui indique le nombre
        de moteurs et leur emplacement, au-delà des simples catégories de transmission
        intégrale, de traction ou de propulsion.
    electric_winder_accessories_included:
      name: Accessoires fournis avec l’enrouleur électrique
      description: Énumère les accessoires inclus avec l’enrouleur électrique (p.
        ex., pinces ou adaptateurs).
    electrical_connector_type:
      name: Type de connecteur électrique
      description: Définit le type de connecteur utilisé par le verrou ou le système
        de verrouillage de porte pour l’intégration électrique, le cas échéant.
    electrical_system_voltage:
      name: Tension du système électrique
      description: Indique la tension nominale du système électrique du véhicule pour
        laquelle le régulateur est conçu.
    electronic_cymbal_trigger_zones:
      name: Zones de déclenchement de la cymbale électronique
      description: Indique le nombre de zones de déclenchement indépendantes présentes
        sur le pad de cymbale (par exemple, corps, bord ou cloche).
    electronic_drum_module_audio_interface_functionality:
      name: Fonctions d’interface audio du module de batterie électronique
      description: Indique si le module peut servir d’interface audio USB pour l’enregistrement
        et la lecture, en plus du MIDI.
    electronic_drum_module_metronome_features:
      name: Fonctions de métronome du module de batterie électronique
      description: Définit les fonctions intégrées d’entraînement ou de métronome.
    electronic_drum_module_power_source:
      name: Source d’alimentation du module de batterie électronique
      description: Indique la source d’alimentation requise ou compatible avec le
        module de commande.
    electronic_drum_module_sample_import_support:
      name: Importation d’échantillons par le module de batterie électronique
      description: Indique si le module peut importer des échantillons utilisateur
        et par quel moyen.
    electronic_drum_pad_playing_surface_type:
      name: Type de surface de jeu du pad de batterie électronique
      description: Décrit la conception de la surface de jeu du pad de tom (par exemple,
        peau maillée ou caoutchouc), car elle conditionne le rebond, le niveau sonore
        et les sensations de jeu.
    electronic_features:
      name: Fonctions électroniques
      description: Indique les fonctions électroniques ou interactives incluses dans
        l’article de jeu bancaire, le cas échéant.
    electronic_lights_and_sound:
      name: Lumières et sons électroniques
      description: Indique si le coffret de maison de poupée comprend des lumières
        électroniques, des fonctions sonores ou les deux (p. ex., lumières, carillon
        de porte, musique ou effets sonores).
    electronics_power_source:
      name: Source d’alimentation des composants électroniques
      description: Indique le mode d’alimentation de l’électronique active, le cas
        échéant.
    eligible_race_series:
      name: Séries de course admissibles
      description: Série de course ou organisme de réglementation pour lequel la voiture
        est admissible en compétition.
    elliptical_trainer_part_type:
      name: Type de pièce pour vélo elliptique
      description: Classe les accessoires ou pièces de rechange pour vélo elliptique
        selon leur type précis (par exemple, courroie, console ou pédale), afin que
        les acheteurs trouvent rapidement l’article recherché sans parcourir de nombreuses
        microcatégories.
    embellishment_technique:
      name: Technique d’ornementation
      description: Détaille la principale technique d’ornementation ou de travail
        de surface appliquée au vêtement, par exemple la broderie, l’impression ou
        le perlage.
    embellishment_type:
      name: Type d’ornement
      description: Indique le type d’élément décoratif appliqué à la jarretière, par
        exemple de la dentelle, des nœuds ou des perles.
    embossing_pen_ink_color:
      name: Couleur de l’encre du stylo d’embossage
      description: Indique la couleur de l’encre déposée par le stylo d’embossage,
        qui peut être transparente, collante ou pigmentée. À distinguer de la couleur
        du stylo ou de son corps.
    embossing_stylus_tip_shape:
      name: Forme de la pointe du stylet d’embossage
      description: Décrit la géométrie de la pointe d’embossage utilisée pour créer
        différents effets (p. ex., pointe boule ou pointe effilée).
    embroidered_coverage_level:
      name: Étendue de la broderie
      description: Taux approximatif de couverture de la face de l’écusson par le
        fil brodé.
    embroidered_patch_backing_type:
      name: Type de support d'écusson brodé
      description: Couche de support au verso de l’écusson brodé, qui influe sur sa
        durabilité et son mode de pose.
    embroidery_hoop_type:
      name: Type de tambour à broder
      description: Désigne le style de construction du tambour à broder et son principal
        mécanisme de tension.
    embroidery_machine_bobbin_type:
      name: Type de canette de machine à broder
      description: Type ou mode de chargement du système de canette.
    emergency_lighting_configuration:
      name: Configuration de l’éclairage d’urgence
      description: Décrit la configuration principale des feux d’avertissement d’urgence
        installés sur le véhicule (par exemple, rampe de toit ou feux de calandre).
    emergency_lighting_package:
      name: Ensemble d’éclairage d’urgence
      description: Précise les types de feux d’avertissement d’urgence installés.
    emissions_compliance_standard:
      name: Norme de conformité des émissions
      description: Mentionne la certification ou la conformité des émissions du moteur,
        le cas échéant.
    emissions_standard:
      name: Norme d'émissions
      description: Norme de conformité des émissions du véhicule, qui varie selon
        la région et l’année.
    enclosure_panel_configuration:
      name: Configuration des panneaux de l’enceinte
      description: Énumère les panneaux ou côtés inclus dans l’enceinte, selon la
        couverture prévue, par exemple une enceinte complète, des rideaux latéraux
        seuls ou trois côtés avec ouverture à l’avant ou à l’arrière.
    enclosure_window_material:
      name: Matériau des fenêtres de l’enceinte
      description: Désigne le matériau des panneaux transparents de l’enceinte.
    end_fitting_type:
      name: Type de raccord d’extrémité
      description: Type de raccord utilisé à chaque extrémité du vérin, côté véhicule
        et côté couvercle, qui détermine la compatibilité de montage.
    end_type:
      name: Type d’extrémité
      description: Décrit le type de terminaison ou de fixation aux extrémités de
        la sangle de remorquage, pour le raccordement aux points d’ancrage de récupération.
    ends_style_blocking_wires:
      name: Style d’extrémité des tiges de blocage
      description: Décrit la finition des extrémités des tiges de blocage, pour sécuriser
        l’usage et faciliter leur passage dans les bordures en dentelle.
    enduro_bike_suspension_adjustability:
      name: Réglages de suspension du vélo d’enduro
      description: Répertorie les réglages de suspension disponibles, généralement
        pour la fourche avant et l’amortisseur arrière.
    engine_bay_mounting_location:
      name: Emplacement de montage dans le compartiment moteur
      description: Position relative de montage du vase d’expansion dans le compartiment
        moteur.
    engine_bearing_coating:
      name: Revêtement des paliers de moteur
      description: Décrit le revêtement de surface éventuel du coussinet, destiné
        à améliorer la résistance à l’usure, la capacité d’incrustation ou la réduction
        du frottement.
    engine_bearing_position:
      name: Position du coussinet dans le moteur
      description: Définit l’emplacement et la fonction du coussinet dans le moteur.
    engine_bearing_size:
      name: Cote du coussinet moteur
      description: Définit la cote du coussinet, standard, en sous-cote ou en surcote,
        généralement en fonction du rectifiage du vilebrequin et du jeu de fonctionnement.
    engine_configuration:
      name: Configuration du moteur
      description: Décrit l’architecture des cylindres du moteur (par exemple, en
        ligne, en V, à plat/boxer).
    engine_cooling_type:
      name: Type de refroidissement du moteur
      description: Définit le mode de refroidissement du moteur.
    engine_degreaser_form:
      name: Forme du dégraissant moteur
      description: Forme physique ou présentation du dégraissant moteur.
    engine_degreaser_rinse_requirement:
      name: Rinçage requis du dégraissant moteur
      description: Détermine si le dégraissant doit être rincé à l’eau après application.
    engine_mount_type:
      name: Type de support moteur
      description: Définit la conception fonctionnelle du support moteur, par exemple
        hydraulique, rigide ou à biellette anticouple.
    engine_oil_formulation:
      name: Formulation de l’huile moteur
      description: Caractérise la formulation de l’huile moteur selon l’usage visé,
        par exemple une utilisation standard, les moteurs à kilométrage élevé, des
        intervalles de vidange prolongés, ou une utilisation en flotte ou intensive.
    engine_oil_specification:
      name: Spécification de l’huile moteur
      description: Spécification ou norme à laquelle l’huile est conforme (par exemple,
        API SP, API SN Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Contenu du kit de réfection moteur
      description: Énumère les principaux composants inclus dans le kit de réfection
        moteur.
    engine_rotation_direction:
      name: Sens de rotation du moteur
      description: Définit le sens de rotation du moteur dans les applications marines.
    engine_timing_system_drive_type:
      name: Type d’entraînement du système de distribution du moteur
      description: Indique si le système de distribution du moteur est entraîné par
        une courroie, une chaîne ou des engrenages, afin d’établir la compatibilité.
    engine_valve_coating:
      name: Revêtement des soupapes de moteur
      description: Désigne tout traitement de surface ou revêtement appliqué à la
        soupape pour améliorer sa résistance à l’usure ou à la chaleur.
    engine_valve_position:
      name: Position de la soupape moteur
      description: Détermine si la soupape moteur est destinée au côté admission ou
        au côté échappement du moteur.
    engine_valve_stem_tip_type:
      name: Type d’extrémité de tige de soupape moteur
      description: Décrit le type ou la construction de l’extrémité de tige de soupape
        au niveau du contact avec le culbuteur ou le dispositif de réglage.
    engine_valvetrain_type:
      name: Type de distribution du moteur
      description: Agencement de la distribution et de l’arbre à cames.
    enhancement_level:
      name: Niveau d’augmentation
      description: 'Augmentation approximative du volume procurée par l’insert, exprimée
        en tailles de bonnet : légère (jusqu’à 1 bonnet), modérée (1 à 2 bonnets),
        importante (plus de 2 bonnets).'
    entry_zipper_location:
      name: Emplacement de la fermeture éclair d’entrée
      description: Situe la fermeture éclair ou l’ouverture principale de la combinaison
        (par exemple, à l’avant, dans le dos, à l’épaule ou en diagonale).
    epee_point_type:
      name: Type de pointe d’épée
      description: Désigne la marque ou le standard de la pointe installée sur la
        lame, dont dépendent la compatibilité et l’entretien.
    equestrian_discipline:
      name: Discipline équestre
      description: Détermine la discipline d’équitation à laquelle l’éperon est destiné
        ou pour laquelle il convient le mieux.
    equestrian_helmet_safety_certification:
      name: Certification de sécurité du casque d’équitation
      description: Énonce les normes ou certifications de sécurité auxquelles le casque
        est conforme.
    equine_application_area:
      name: Domaine d'application équin
      description: Détermine la zone du corps ou le matériel d’équitation auquel le
        produit est destiné (par exemple, les sabots, la crinière ou le harnachement).
    equipment_contact_material_brew_wine:
      name: Matériau en contact avec le liquide pour le brassage ou la vinification
      description: Matériau principal de l’élément en contact avec le liquide (par
        exemple, du verre, de l’acier inoxydable ou du plastique).
    eu_children_clothing_size:
      name: Taille EU des vêtements pour enfants
      description: Définit la taille européenne des vêtements pour enfants selon la
        stature, par exemple 104 ou 140.
    eu_clothing_size:
      name: Taille EU des vêtements
      description: Indique la taille de vêtement européenne, par exemple 38 ou 46
    eu_cup_size:
      name: Taille de bonnet EU
      description: Définit la taille de bonnet européenne du soutien-gorge, par exemple
        C ou E
    eu_ring_size:
      name: Taille de bague EU
      description: Définit la taille de bague européenne selon la circonférence, par
        exemple 52 ou 63
    eu_shoe_size:
      name: Pointure EU
      description: Définit la pointure européenne, par exemple 42 ou 42 large
    euphonium_included_accessories:
      name: Accessoires fournis avec l’euphonium
      description: Énumère les éléments couramment fournis avec un euphonium, par
        exemple une embouchure ou un étui.
    euphonium_valve_configuration:
      name: Configuration des pistons de l’euphonium
      description: Définit le nombre de pistons et précise si le quatrième piston
        est actionné à la main ou par un mécanisme latéral.
    european_sword_historical_period:
      name: Période historique de l’épée européenne
      description: Période historique principale dont s’inspire le modèle ou la réplique
        d’épée, ou époque de l’original.
    european_sword_pattern_type:
      name: Modèle ou type d’épée européenne
      description: Modèle ou type précis d’épée européenne représenté par l’épée de
        collection.
    ev_connector_adapter_direction:
      name: Sens de conversion du connecteur ou de l’adaptateur pour véhicule électrique
      description: Définit le sens de conversion de l’adaptateur, entre la prise du
        véhicule et le chargeur ou le câble, afin de filtrer précisément les compatibilités.
    ev_conversion_kit_completeness_level:
      name: Niveau de complétude du kit de conversion pour véhicule électrique
      description: Détermine si le produit est un kit de conversion complet ou un
        kit partiel, par exemple avec seulement le moteur et le contrôleur.
    ev_conversion_kit_drivetrain_configuration:
      name: Configuration de la transmission du kit de conversion pour véhicule électrique
      description: Décrit l’architecture de transmission du kit de conversion pour
        véhicule électrique, notamment l’emplacement du moteur, l’agencement de l’entraînement
        et la conservation éventuelle de la transmission existante.
    ev_conversion_kit_voltage_class:
      name: Classe de tension du kit de conversion pour véhicule électrique
      description: Classe de tension nominale sur laquelle repose la conception du
        kit de conversion pour véhicule électrique. Utilisez cet attribut pour filtrer
        les produits par classes de tension courantes, en plus de la mesure exacte
        de la tension.
    evaporator_core_type:
      name: Type d’évaporateur de climatisation
      description: Définit la conception de l’évaporateur de climatisation automobile.
    evenweave_fabric_finish_treatment:
      name: Finition ou traitement du tissu Evenweave
      description: Signale tout apprêt préalable ou traitement appliqué au tissu qui
        modifie sa tenue ou son aspect.
    evenweave_fabric_package_format:
      name: Format de vente du tissu Evenweave
      description: Décrit le mode de vente du tissu, en coupon ou en continu au mètre.
    exercise_bike_accessory_part_type:
      name: Type d’accessoire ou de pièce pour vélo d’appartement
      description: Caractérise l’article par sa fonction principale ou son type de
        composant, par exemple une pédale, une courroie d’entraînement, un porte-bidon,
        un cache-écran ou une manivelle.
    exercise_bike_cushion_component:
      name: Composant d’assise pour vélo d’appartement
      description: Désigne le composant d’assise fourni, par exemple un coussin de
        selle, une selle ou une housse de selle.
    exercise_bike_metrics_tracked:
      name: Mesures d’entraînement suivies par le vélo d’appartement
      description: Énumère les champs de données d’entraînement que la console peut
        mesurer et afficher en temps réel.
    exercise_mat_accessories_included:
      name: Accessoires fournis avec le tapis d’exercice
      description: Énumère les composants supplémentaires fournis avec le tapis, par
        exemple des sangles ou des genouillères.
    exhaust_cooling_type:
      name: Type de refroidissement de l’échappement
      description: Détermine si le composant d’échappement est destiné à un système
        d’échappement humide, refroidi ou injecté à l’eau, ou à un système d’échappement
        sec.
    exhaust_installation_position:
      name: Position d’installation de l’échappement
      description: Situe la pièce sur le véhicule.
    exhaust_outlet_configuration:
      name: Configuration des sorties d’échappement
      description: Décrit l’agencement des sorties d’échappement à l’arrière du véhicule.
    expansion_tank_cap_connection_type:
      name: Type de raccordement du bouchon de vase d’expansion
      description: Type de raccordement mécanique utilisé pour fixer le bouchon au
        col du vase d’expansion et assurer l’étanchéité.
    expansion_tank_cap_pressure_relief_feature:
      name: Fonction de décharge de pression du bouchon de vase d’expansion
      description: Détermine si le bouchon assure une décharge de pression ou de dépression,
        et par quel mécanisme.
    expansion_tank_cap_seal_material:
      name: Matériau du joint de bouchon de vase d’expansion
      description: Matériau du joint en contact avec le col du vase d’expansion.
    extension_attachment_method:
      name: Mode de fixation du prolongateur
      description: Décrit la façon dont le prolongateur se fixe au poste de pilotage
        ou au cintre du vélo, afin que le cycliste puisse vérifier sa compatibilité
        avec l’équipement existant.
    extension_bend_type:
      name: Type de courbure du prolongateur
      description: Décrit la géométrie ou la courbure du prolongateur de cintre, car
        elle influe sur la position du cycliste et l’aérodynamisme.
    extension_mechanism:
      name: Mécanisme de rallonge
      description: Décrit comment la table s’agrandit, en longueur ou en surface,
        le cas échéant.
    extension_table_features:
      name: Caractéristiques de la table d’extension
      description: Met en avant les caractéristiques fonctionnelles propres aux tables
        d’extension pour machines à coudre.
    eyelet_grommet_installation_method:
      name: Méthode de pose des œillets et rondelles d’œillets
      description: Définit le mode de pose et de fixation de l’œillet ou de la rondelle
        d’œillet dans le matériau.
    eyewear_lens_shape:
      name: Forme des verres
      description: Détermine la forme géométrique du verre, par exemple cylindrique
        ou sphérique, car elle influe sur le champ de vision, la distorsion et le
        style.
    eyewear_strap_material:
      name: Matériau de la sangle de lunettes
      description: Désigne le matériau de la sangle réglable qui maintient le masque
        ou les lunettes sur la tête de l’utilisateur.
    fabric_backing_type:
      name: Type de support du tissu
      description: Détermine si le coton imprimable comporte un support papier stabilisateur
        et, le cas échéant, de quel type, car ce support conditionne son passage dans
        les imprimantes standard.
    fabric_cut_format:
      name: Format de découpe du tissu
      description: Définit la coupe ou le format de la toile pour ouvrages à l’aiguille.
    fabric_end_use:
      name: Usage prévu du tissu
      description: Détermine l’usage principal du tissu, c’est-à-dire l’emploi auquel
        il se prête le mieux.
    fabric_finish:
      name: Finition du tissu
      description: Finition de surface ou traitement appliqué au tissu en soie, qui
        influe sur le lustre, le toucher et les propriétés d’usage.
    fabric_intended_use:
      name: Utilisation prévue du tissu
      description: Usages ou projets principalement recommandés pour le tissu en lin.
    fabric_opacity_level:
      name: Niveau d’opacité du tissu
      description: Évalue le degré de transparence du tissu, car il influe sur les
        besoins de superposition et de doublure.
    fabric_patch_shape:
      name: Forme des pièces de tissu
      description: Décrit la forme des pièces de tissu incluses dans le kit.
    fabric_repair_kit_application_method:
      name: Mode d’application du kit de réparation pour tissu
      description: Définit le mode d’application de la réparation sur le tissu, par
        exemple par thermocollage, par couture ou par adhésif.
    fabric_repair_kit_components_included:
      name: Composants fournis dans le kit de réparation pour tissu
      description: Énumère les composants précis fournis dans le kit, par exemple
        des pièces de tissu, du fil, une aiguille ou de l’adhésif.
    fabric_repair_kit_intended_use:
      name: Usage prévu du kit de réparation pour tissu
      description: Définit la tâche de réparation courante à laquelle le kit est destiné,
        par exemple réparer des déchirures ou des trous, ou réaliser des ourlets.
    fabric_selling_format:
      name: Mode de vente du tissu
      description: Définit le mode de vente du tissu, par exemple au mètre en continu,
        en coupon, en rouleau ou sous forme d’échantillon.
    fabric_stretch_level:
      name: Degré d'élasticité du tissu
      description: Décrit le degré d’élasticité du tissu, afin de choisir un tissu
        adapté aux vêtements ajustés ou aux projets structurés.
    fabric_stretch_type:
      name: Type de tissu extensible
      description: Caractérise l’élasticité du tissu du boardshort, déterminante pour
        la liberté de mouvement en surf ou en natation.
    fabric_texture:
      name: Texture du tissu
      description: Décrit le toucher ou la structure de maille du tissu utilisé pour
        le haut de détente.
    fabric_use_case:
      name: Usage prévu du tissu
      description: Usage principal prévu pour le coupon ou le rouleau de satin.
    fabric_weight_class:
      name: Catégorie de poids du tissu
      description: Classe la flanelle par plages de poids courantes, afin que les
        acheteurs puissent filtrer les produits sans connaître le grammage exact en
        g/m² ou en oz.
    face_mask_material:
      name: Matériau du masque facial
      description: Composition du masque facial fourni avec le casque ou compatible
        avec celui-ci.
    face_mask_style:
      name: Style de masque
      description: Définit la forme générale ou la conception du masque en tissu,
        afin que les acheteurs trouvent l’ajustement et l’esthétique recherchés.
    face_mask_style_code:
      name: Code de style du masque facial
      description: Définit le style de barre structurelle ou la famille de codes sectorielle
        du masque facial, par exemple ROPO, OPO ou RJOP.
    face_protection_type:
      name: Type de protection faciale
      description: Désigne le type de protection faciale fourni avec le casque ou
        intégré à celui-ci, par exemple une grille ou une visière.
    faceplate_security_features:
      name: Caractéristiques de sécurité de la façade
      description: Recense les fonctions antivol et d’accès liées à la façade, au-delà
        de sa conception de base.
    facing_length:
      name: Longueur de courbure du bec
      description: Définit la longueur de courbure du bec, qui conditionne la réponse
        et le choix de l’anche.
    fan_shroud_type:
      name: Type de carénage de ventilateur
      description: Définit le type de couverture ou la géométrie du carénage de ventilateur,
        par exemple carénage complet, demi-carénage ou anneau.
    farming_method:
      name: Méthode de culture
      description: Met en avant les pratiques de bien-être animal ou d’élevage selon
        lesquelles les animaux sont élevés, par exemple en plein air ou selon un mode
        biologique.
    farming_practice:
      name: Pratique agricole
      description: Détermine la principale méthode de culture utilisée pour le produit,
        par exemple la culture conventionnelle, la culture biologique ou la culture
        hydroponique.
    fascinator_style:
      name: Style de bibi
      description: Décrit la structure ou la forme du bibi, afin que les acheteurs
        filtrent rapidement les produits selon les styles de chapellerie les plus
        courants.
    fastener_grade:
      name: Classe de résistance de la fixation
      description: Détermine le grade ou la classe de résistance du boulon, par exemple
        le grade 8 ou la classe 10.9, dont dépend la capacité de charge.
    fat_rendering_state:
      name: État de fonte de la graisse
      description: Définit si la graisse est fondue, crue ou partiellement fondue,
        car cet état conditionne la durée de conservation et les usages culinaires.
    fat_source:
      name: Source de matière grasse
      description: Détermine l’origine principale de la matière grasse utilisée pour
        produire le beurre, le ghee ou la margarine, animale ou végétale, afin de
        faciliter le filtrage par allergènes et contraintes alimentaires.
    faucet_hole_configuration:
      name: Configuration des trous de robinetterie
      description: Précise le nombre et l’emplacement des trous de robinetterie prépercés
        sur le plan de vasque.
    feather_application:
      name: Usage prévu des plumes
      description: Usage principal prévu des plumes de dinde pour les loisirs créatifs
        ou la fabrication.
    feather_attachment_format:
      name: Format de présentation des plumes
      description: Décrit le format dans lequel les plumes synthétiques sont préparées
        ou vendues, par exemple en vrac, sur fil ou sur ruban.
    feather_coloration_style:
      name: Mode de coloration des plumes
      description: Décrit le mode d’application ou l’aspect de la couleur sur les
        plumes, par exemple couleur unie, extrémité teinte ou dégradé, indépendamment
        de la couleur de base.
    feather_component:
      name: Partie de plume
      description: Détermine la partie ou le type de plume de paon vendu, par exemple
        une plume à œil ou des barbes de paon.
    feather_curvature:
      name: Courbure de la plume
      description: Forme générale ou profil de courbure de la plume.
    feather_finish:
      name: Finition de la plume
      description: Détermine si les plumes d’autruche sont naturelles ou traitées
        pour un usage décoratif, par exemple teintes ou blanchies.
    feather_form:
      name: Forme de la plume
      description: Définit la forme physique des éléments de plume d’oie vendus.
    feather_grade:
      name: Grade de plume
      description: Grade global de qualité ou de sélection de la plume, selon qu’elle
        est destinée aux loisirs créatifs ou à la présentation décorative.
    feather_part:
      name: Partie en plumes
      description: Partie ou structure de la plume de dinde vendue, courante dans
        les annonces de fournitures pour loisirs créatifs et montage de mouches.
    feather_processing_type:
      name: Type de traitement de la plume
      description: Mode de traitement des plumes pour les loisirs créatifs, par exemple
        teintes, blanchies, naturelles ou non teintes.
    feather_product_form:
      name: Forme de vente du produit en plume
      description: Forme physique ou coupe du produit en plume tel qu’il est vendu,
        par exemple en plumes en vrac, en boa ou en frange.
    feather_quantity_unit:
      name: Unité de quantité des plumes
      description: Définit l’unité de vente du produit, par exemple à la pièce, au
        poids ou par botte, afin de comparer précisément les annonces.
    feather_source:
      name: Origine des plumes
      description: Désigne l’origine animale des plumes utilisées dans les volants
        de badminton.
    feather_stiffness:
      name: Rigidité de la plume
      description: Rigidité relative des barbes ou de la structure de la plume.
    feed_mechanism:
      name: Mécanisme d’alimentation
      description: Décrit comment les balles sont introduites dans la machine à lancer.
    feed_purpose:
      name: Objectif de l’aliment
      description: Définit l’objectif principal, nutritionnel ou fonctionnel, de l’aliment
        ou du complément.
    feeder_mechanism_type:
      name: Type de mécanisme d'alimentation
      description: Détermine le mécanisme par lequel le distributeur délivre l’aliment.
    feijoa_cultivar:
      name: Cultivar de feijoa
      description: Détermine le cultivar ou la variété de feijoa, car les différents
        cultivars se distinguent par leur saveur, leur calibre et leur période de
        récolte.
    felt_duty:
      name: Catégorie de feutre
      description: Définit la catégorie de feutre de la balle de tennis, par exemple
        le feutre renforcé ou le feutre standard, dont dépend sa durée de vie sur
        les différentes surfaces.
    felting_mold_intended_use:
      name: Utilisation prévue du moule à feutrer
      description: Objet ou forme que le moule sert à réaliser dans les projets de
        feutrage.
    felting_pad_surface_material:
      name: Matériau de surface du support de feutrage
      description: Matériau de la surface de travail du support de feutrage, en contact
        avec la fibre et l’aiguille.
    fencing_certification:
      name: Certification d’escrime
      description: Énumère les homologations officielles auxquelles l’arme d’escrime
        satisfait, par exemple FIE ou USFA, afin d’établir son admissibilité en compétition
        et sa conformité aux standards de qualité.
    fencing_connector_type:
      name: Type de connecteur d’escrime
      description: Définit la configuration de connecteur utilisée pour raccorder
        les cordons, prises ou enrouleurs d’escrime, par exemple à 2 broches, à 3 broches
        ou à baïonnette, afin d’assurer la compatibilité des composants.
    fencing_discipline:
      name: Discipline d’escrime
      description: Définit l’arme ou la discipline d’escrime pour laquelle le produit
        est conçu ou avec laquelle il est compatible.
    fencing_weapon_type:
      name: Type d’arme d’escrime
      description: Définit le type d’arme d’escrime ou d’arme d’entraînement avec
        lequel l’aide à l’entraînement est compatible ou qu’elle représente, afin
        d’aider les utilisateurs à trouver le matériel adapté.
    fender_finish_state:
      name: État de finition de l’aile
      description: Détermine l’état de surface ou de finition dans lequel l’aile est
        fournie, afin de savoir si elle est prête à peindre et à installer.
    fender_pieces_included:
      name: Pièces de protection incluses
      description: Énumère les composants fournis avec le produit, afin de distinguer
        une aile seule d’un jeu complet avec accessoires.
    fender_type:
      name: Type d’aile
      description: Classe l’aile selon sa conception générale ou son style.
    fennel_trimming:
      name: Parage du fenouil
      description: Détermine les parties de la plante fournies avec le bulbe de fenouil,
        par exemple avec les fanes, ou avec le sommet et la racine parés.
    fennel_variety:
      name: Variété de fenouil
      description: Définit le cultivar ou la variété commerciale des bulbes de fenouil
        vendus.
    fermentation_application:
      name: Application de fermentation
      description: Détermine le principal aliment ou la principale boisson que la
        culture de fermentation est conçue pour faire fermenter, par exemple du fromage,
        du yaourt, du kéfir de lait ou du levain.
    fermentation_method:
      name: Méthode de fermentation
      description: Définit le mode de production ou de fermentation de la sauce soja,
        par exemple brassée naturellement ou hydrolysée chimiquement.
    fermentation_vessel_material:
      name: Matériau du récipient de fermentation
      description: Matériau principal du récipient de fermentation inclus dans le
        kit, le cas échéant.
    ferrule_material:
      name: Matériau de la virole
      description: Définit le matériau utilisé pour la virole du fût, par exemple
        Juma, Phenolic, Polycarbonate, XTC ou aucune virole, car ce choix conditionne
        la durabilité et la sensation de frappe.
    fia_homologation_certification:
      name: Homologation ou certification FIA
      description: Détermine si la voiture ou la cellule de sécurité est certifiée
        ou homologuée, ainsi que la norme applicable.
    fiber_animal_source_type:
      name: Origine animale ou source de la fibre
      description: Origine principale du ruban de fibre, animale, végétale ou synthétique,
        par exemple laine mérinos, alpaga ou fibres végétales.
    fiber_luster_level:
      name: Niveau de lustre de la fibre
      description: Éclat visuel de la fibre, de mat à très lustré.
    fiber_preparation_processing_stage:
      name: Stade de préparation ou de traitement de la fibre
      description: Caractérise la préparation ou le traitement du ruban de fibre avant
        utilisation, par exemple cardé, peigné, mélangé ou traité superwash.
    fiber_preparation_type:
      name: Type de préparation de la fibre
      description: Détermine la forme de préparation de la fibre pour les loisirs
        créatifs, par exemple une nappe cardée, une fibre cardée au tambour ou une
        feuille de préfeutre.
    field_hockey_ball_playing_surface:
      name: Surface de jeu de la balle de hockey sur gazon
      description: Détermine la surface ou l’environnement de jeu pour lequel la balle
        est conçue.
    field_hockey_ball_type:
      name: Type de balle de hockey sur gazon
      description: Classe la balle de hockey sur gazon selon son usage prévu ou sa
        spécificité.
    field_hockey_goal_size_standard:
      name: Norme de dimension du but de hockey sur gazon
      description: Classe le but selon les normes courantes du hockey sur gazon ou
        les formats d’entraînement, par exemple le format réglementaire extérieur
        FIH, le format jeune ou le format mini.
    field_hockey_training_objective:
      name: Objectif d’entraînement au hockey sur gazon
      description: Définit la compétence principale ou l’axe de travail que l’aide
        à l’entraînement vise à améliorer.
    field_point_attachment_method:
      name: Mode de fixation de la pointe field
      description: Décrit la façon dont la pointe field se fixe au fût de la flèche
        ou à l’insert, par exemple par vissage ou par collage.
    field_point_tip_style:
      name: Profil d’extrémité de la pointe field
      description: Définit la géométrie ou le profil fonctionnel de l’extrémité de
        la pointe field, dont dépendent la pénétration, l’effort de retrait et la
        conformité réglementaire.
    fielding_glove_position:
      name: Position du gant de défense
      description: Détermine la position défensive ou l’usage pour lequel le gant
        est conçu au baseball ou au softball.
    fielding_training_focus:
      name: Axe d’entraînement défensif
      description: Définit la compétence principale ciblée par l’aide pendant les
        séances d’entraînement.
    fig_variety:
      name: Variété de figue
      description: Indique le cultivar ou la variété spécifique de figue vendue.
    figure_8_device_design:
      name: Conception du descendeur en huit
      description: Détermine la configuration précise du descendeur en huit, dont
        dépendent la prise en main et l’usage prévu.
    figure_finish_type:
      name: Type de finition de la figurine
      description: Caractérise la finition de la figurine de cheval, en ce qui concerne
        son rendu visuel et tactile comme objet de collection.
    figurine_scale:
      name: Échelle de la figurine
      description: Rapport d’échelle de la figurine par rapport au sujet réel, le
        cas échéant, par exemple 1:6.
    fill_status:
      name: État de remplissage
      description: Détermine l’état de remplissage du mannequin de grappling à la
        vente, selon qu’il est prérempli, vide ou partiellement rempli, afin d’évaluer
        le coût d’expédition et la préparation à prévoir pour l’acheteur.
    filling_consistency:
      name: Consistance de la garniture
      description: Décrit la texture ou la viscosité de la garniture fournie, par
        exemple une crème lisse, des fruits en morceaux ou une pâte.
    filling_type:
      name: Type de garniture
      description: Définit la garniture ou la crème principale contenue dans le biscuit,
        le cas échéant.
    filtration_and_mother_status:
      name: État de filtration et présence de la mère
      description: Précise si le vinaigre est filtré ou non, brut ou contenant la
        mère, pour aider les consommateurs à trouver un vinaigre brut ou probiotique.
    filtration_method:
      name: Procédé de filtration
      description: Matière ou technique utilisée pour filtrer et purifier la vodka
        après distillation.
    fin_box_system:
      name: Système de boîtier d’aileron
      description: Définit le boîtier d’aileron ou l’interface de montage utilisé
        par la planche, dont dépend la compatibilité avec les ailerons de rechange.
    fin_buoyancy:
      name: Flottabilité de l’aileron
      description: Détermine si l’aileron présente une flottabilité positive, neutre
        ou négative dans l’eau, avec une incidence sur l’assiette en plongée et l’équilibre
        de l’équipement.
    fin_flex_rating:
      name: Indice de flexibilité de la pointe
      description: Caractérise la rigidité relative ou le degré de flexibilité de
        l’aileron, qui conditionne ses performances globales.
    fin_mounting_system:
      name: Système de fixation des ailettes
      description: Définit l’interface ou la norme de fixation de l’aileron au kiteboard,
        par exemple FCS II, un montage vissé ou une fixation à 4 trous, afin d’assurer
        la compatibilité entre les ailerons et les planches.
    fin_position:
      name: Position de l’aileron
      description: Définit la position de montage prévue de l’aileron sur la planche.
    fin_strap_type:
      name: Type de sangle d'aileron
      description: Définit le type de sangle ou de système de retenue utilisé pour
        fixer l’aileron au talon ou au pied.
    fin_template:
      name: Gabarit de l’aileron
      description: Classe l’aileron de planche de surf selon son gabarit hydrodynamique
        ou son contour, dont dépendent le style de virage, la vitesse et les sensations
        générales de la planche.
    finger_count:
      name: Nombre de doigts
      description: Détermine le nombre de doigts auquel le gant, la palette ou le
        décocheur est adapté.
    finger_coverage:
      name: Couverture des doigts
      description: Évalue la portion des doigts qui est couverte.
    finger_grip_adjustability:
      name: Réglage de la prise pour les doigts
      description: Décrit la façon dont la prise pour les doigts se fixe ou se règle
        afin de s’adapter à différentes tailles de main.
    finger_hole_configuration:
      name: Disposition des trous pour les doigts
      description: Définit l’orientation des trous de doigts, pour droitier, gaucher
        ou utilisateur ambidextre.
    finger_hole_count:
      name: Nombre de trous de doigts
      description: Énonce le nombre de trous de doigts dans le cuir de préhension,
        critère de style important entre les modèles sans trou, à 2 trous, à 3 trous
        ou à 4 trous.
    finger_pick_band_style:
      name: Style de bande de l’onglet
      description: Style de la bande ou de l’anneau qui fixe l’onglet au doigt, dont
        dépendent le confort et les possibilités de réglage.
    finger_pick_blade_length:
      name: Longueur de la lame de l’onglet
      description: Longueur de la lame d’attaque qui dépasse de la bande.
    finger_pick_blade_shape:
      name: Forme de la lame du pince-doigt
      description: Forme ou profil de la surface d’attaque de la lame en contact avec
        les cordes.
    finger_pick_size:
      name: Taille de l’onglet
      description: Taille de la bande ou de l’anneau de l’onglet de doigt, adaptée
        à différents tours de doigt ou de pouce, et non à la taille de l’instrument.
    finger_pick_wear_location:
      name: Emplacement de port de l’onglet
      description: Détermine le doigt auquel l’onglet est destiné, ou précise s’il
        s’agit d’un ensemble pour le pouce et les doigts.
    finger_protection:
      name: Protection des doigts
      description: Indique si le gant comprend une protection des arêtes des doigts
        et si ces arêtes sont amovibles.
    fingerboard_bearing_type:
      name: Type de roulement de fingerboard
      description: Définit le type de roulement utilisé dans les roues de fingerboard.
    fingerboard_grip_type:
      name: Type de prise sur la touche
      description: Définit le matériau ou le type de surface antidérapante utilisé
        sur le plateau du fingerboard.
    fining_agent_active_ingredient:
      name: Ingrédient actif de l’agent de clarification
      description: Agent principal de clarification utilisé dans le produit.
    fining_agent_type:
      name: Type d’agent de clarification
      description: Définit la nature chimique ou le matériau de l’agent de clarification
        utilisé dans les produits destinés à clarifier le vin rouge.
    finish_after_baking:
      name: Finition après cuisson
      description: Décrit l’aspect de surface habituel après durcissement ou cuisson.
    finish_effect:
      name: Effet de finition
      description: Décrit les effets particuliers, de surface ou optiques, appliqués
        au strass.
    finish_type:
      name: Type de finition
      description: Finition de surface appliquée au corps de l’ukulélé.
    finished_product_format:
      name: Format du produit fini
      description: Définit le type de produit parfumé que le kit est conçu pour fabriquer.
    fire_pit_accessories_included:
      name: Accessoires pour foyer d'extérieur inclus
      description: Énumère les accessoires notables fournis avec le brasero, par exemple
        un pare-étincelles ou des pierres de lave, afin de préciser le contenu de
        la boîte.
    firework_assortment_launch_type:
      name: Mode d’allumage de l’assortiment de feux d’artifice
      description: Décrit comment les feux d’artifice inclus sont généralement allumés
        ou lancés.
    firework_assortment_types_included:
      name: Types de feux d’artifice inclus dans l’assortiment
      description: Désigne les principaux types de feux d’artifice inclus dans l’assortiment,
        afin d’aider les acheteurs à comparer le contenu des lots, par exemple des
        fontaines, des chandelles romaines ou des pétards.
    firework_effect_types:
      name: Types d’effets de feux d’artifice
      description: Principales familles d’effets visuels ou sensoriels produites par
        l’assortiment. Sélectionnez toutes les valeurs applicables.
    firework_ignition_method:
      name: Méthode d’allumage du feu d’artifice
      description: Définit le mode de mise à feu du feu d’artifice, par exemple par
        mèche ou par allumeur électrique.
    firework_visual_intensity_level:
      name: Niveau d’intensité visuelle du feu d’artifice
      description: Intensité visuelle globale ou volume d’étincelles de l’effet de
        fontaine.
    firing_mode:
      name: Mode de tir
      description: Énumère les modes de tir disponibles ou principaux de la réplique
        d’airsoft.
    first_day_cover_cachet_type:
      name: Type de cachet pour enveloppe premier jour
      description: Type de cachet de l’enveloppe premier jour, par exemple imprimé
        ou peint à la main.
    first_day_cover_cancellation_type:
      name: Type d’oblitération de l’enveloppe premier jour
      description: Type ou style d’oblitération postale appliquée à l’enveloppe premier
        jour, par exemple une oblitération mécanique ou une oblitération manuelle.
    first_day_cover_set_type:
      name: Type d’ensemble d’enveloppes premier jour
      description: Indique si l’enveloppe représente une émission unique, une série
        complète ou une combinaison partielle.
    fishing_hook_size:
      name: Taille de l’hameçon
      description: Définit la désignation normalisée de la taille de l’hameçon, par
        exemple nº 4, 1/0 ou 10/0, afin d’adapter ses dimensions à l’espèce recherchée
        et à l’appât utilisé.
    fishing_hook_style:
      name: Style d'hameçon
      description: Caractérise la conception ou la courbure précise de l’hameçon simple,
        dont dépendent la présentation, l’efficacité du ferrage et les usages prévus.
    fishing_hook_type:
      name: Type d'hameçon
      description: Décrit la configuration d’hameçon fournie avec la cuiller de pêche,
        le cas échéant.
    fishing_line_application:
      name: Usage prévu du fil de pêche
      description: Détermine l’usage prévu du fil de pêche ou du matériau de bas de
        ligne, par exemple comme bas de ligne, ligne principale ou pointe.
    fishing_line_buoyancy_type:
      name: Type de flottabilité du fil de pêche
      description: Classe le fil selon son comportement dans la colonne d’eau, par
        exemple flottant, intermédiaire ou coulant, afin de choisir une présentation
        adaptée à la profondeur recherchée.
    fishing_needle_purpose:
      name: Usage prévu de l’aiguille de pêche
      description: Détermine l’usage principal de l’aiguille dans les opérations de
        montage de pêche.
    fishing_needle_types_included:
      name: Types d’aiguilles de pêche inclus
      description: Énumère les types précis d’aiguilles ou d’outils de montage fournis
        dans le kit, afin que les clients en repèrent rapidement le contenu.
    fit_profile:
      name: Profil de coupe
      description: Décrit la coupe et la silhouette générales de la protection, dont
        dépendent la liberté de mouvement et la couverture.
    fit_volume_classification:
      name: Classe de volume du chaussant
      description: Classe le volume intérieur global de la botte selon les catégories
        utilisées par les marques, par exemple LV pour faible volume.
    fitting_angle:
      name: Angle du raccord
      description: Définit l’angle du corps du raccord, par exemple raccord droit,
        45° ou 90°. Sélectionnez « Pivot réglable » pour un raccord à angle variable
        et « Autre » pour un angle peu courant.
    flag_base_type:
      name: Type de base du drapeau de coin
      description: Définit le mode d’ancrage ou le type de base utilisé pour maintenir
        le drapeau de coin sur différentes surfaces de jeu.
    flag_design_theme:
      name: Thème du drapeau
      description: Décrit le thème principal représenté sur le drapeau, par exemple
        un pays, une équipe sportive ou une fête, afin de faciliter la recherche et
        le filtrage selon l’intention d’achat.
    flag_mounting_method:
      name: Méthode de fixation d'un drapeau
      description: Définit le mode de fixation du drapeau au véhicule, par exemple
        sur support d’antenne, sur support d’attelage ou par fixation magnétique.
    flag_type:
      name: Type de drapeau
      description: Classe le drapeau de golf selon son usage ou son style précis,
        par exemple un drapeau de trou, un drapeau de voiturette ou un drapeau d’entraînement.
    flame_resistance_standard:
      name: Norme de résistance aux flammes
      description: Désigne la norme ou certification de résistance aux flammes ou
        aux arcs électriques à laquelle le vêtement est conforme.
    flamenco_cajon_snare_system:
      name: Système de timbre du cajón flamenco
      description: Définit le mécanisme de timbre interne utilisé pour produire le
        son caractéristique du cajón flamenco, ou précise l’absence de timbre.
    flammability_compliance:
      name: Conformité aux normes d’inflammabilité
      description: Spécifie la ou les normes d’inflammabilité auxquelles le tissu
        est conforme pour une utilisation dans les habitacles de véhicules.
    flannel_brushing_finish:
      name: Finition de grattage de la flanelle
      description: Indique si la flanelle est grattée, et sur quelle face, car ce
        traitement modifie sa douceur, sa chaleur et son aspect.
    flannel_use_type:
      name: Usage prévu de la flanelle
      description: Usage principal prévu pour le coupon ou le rouleau de flanelle.
    flap_configuration:
      name: Configuration des volets
      description: Définit le type de quartier de la selle, par exemple monoquartier
        ou à double quartier.
    flare_color:
      name: Couleur du signal de détresse
      description: Couleur de la lumière ou de la flamme émise, ou de la lentille
        pour les signaux de détresse à LED.
    flash_card_included_features:
      name: Fonctionnalités incluses avec les cartes d’apprentissage
      description: Met en avant les fonctionnalités d’apprentissage ou d’utilisation
        incluses avec les cartes d’apprentissage.
    flavor_intensity:
      name: Intensité de l’arôme
      description: Évalue la concentration du produit aromatisant, afin de déterminer
        le dosage approprié, par exemple une concentration standard ou une concentration
        très élevée.
    flavor_solvent_base:
      name: Support ou solvant de l’arôme
      description: Désigne le principal support ou solvant utilisé dans l’arôme, par
        exemple de l’alcool, du propylène glycol ou de la glycérine.
    fleece_fiber_animal_type:
      name: Espèce animale de la fibre de toison
      description: Espèce animale dont provient la fibre de toison.
    fleece_finish_surface:
      name: Finition ou surface de la polaire
      description: Décrit la surface ou la finition de la polaire, par exemple anti-boulochage
        ou grattée, car elle conditionne la résistance au boulochage, la douceur et
        l’aspect.
    fleece_preparation_method:
      name: Méthode de préparation de la toison
      description: Mode de préparation ou de traitement de la toison pour les loisirs
        créatifs et le filage, selon l’état de la fibre.
    flesh_color:
      name: Couleur de la chair
      description: Précise la couleur de la chair du melon.
    fletching_orientation:
      name: Orientation de l’empennage
      description: Définit la pose de l’empennage sur le fût de la flèche, par exemple
        droite, décalée ou hélicoïdale, car cette orientation conditionne la rotation
        et le vol de la flèche.
    fletching_profile:
      name: Profil de l’empennage
      description: Définit la forme géométrique ou la découpe de l’empennage, dont
        dépendent la traînée, le dégagement, le bruit et les caractéristiques générales
        du vol de la flèche.
    flight_system_type:
      name: Type de système d’ailette
      description: Caractérise la construction de l’ailette, en distinguant les ailettes
        pliables, les ailettes moulées et les systèmes intégrés associant l’ailette
        et la tige.
    float_attachment_method:
      name: Méthode de fixation par flotteur
      description: Décrit le mode de fixation du flotteur sur la ligne, par exemple
        coulissant ou fixe, afin que les pêcheurs filtrent les produits selon le type
        de montage.
    float_design:
      name: Type de flotteur
      description: Classe le flotteur de pêche selon son type général, par exemple
        bouchon, flotteur waggler ou flotteur crayon, afin que les pêcheurs choisissent
        rapidement un modèle adapté à leur technique et aux conditions de pêche.
    float_raft_use_environment:
      name: Environnement d’utilisation du flotteur ou du radeau gonflable
      description: Milieu aquatique principal prévu pour l’équipement gonflable, par
        exemple la piscine, l’eau libre calme ou le surf, selon les exigences de durabilité
        et de conception.
    floatation:
      name: Flottabilité
      description: Précise si la balise est conçue pour flotter dans l’eau.
    floor_construction_type:
      name: Type de construction du sol
      description: Définit la conception du plancher du radeau, par exemple autovideur
        ou Dropstitch, dont dépendent l’évacuation de l’eau, la rigidité et les performances.
    floor_design:
      name: Conception du sol
      description: Type de revêtement de sol fourni avec l’enceinte.
    floor_inclusion:
      name: Plancher inclus
      description: Établit si le vestibule comprend un plancher et si celui-ci est
        amovible.
    floor_mat_cleaning_method:
      name: Méthode de nettoyage du tapis de sol
      description: Désigne la méthode de nettoyage principale préconisée par le fabricant
        pour le tapis de sol.
    floor_mat_edge_style:
      name: Style de bord du tapis de sol
      description: Décrit si le tapis comporte des bords relevés destinés à retenir
        les liquides renversés et les débris.
    floor_mat_format:
      name: Format du tapis de sol
      description: Définit le format physique ou le style du produit de protection
        de sol, par exemple un tapis unique, une dalle emboîtable ou un rouleau.
    floor_mat_retention_system:
      name: Système de retenue du tapis de sol
      description: Définit le système utilisé pour maintenir le tapis en place.
    floor_mat_set_configuration:
      name: Configuration du jeu de tapis de sol
      description: Énumère les positions incluses dans l’ensemble fourni, par exemple
        la paire avant seulement ou le jeu complet.
    floss_sugar_granulation_grade:
      name: Granulométrie du sucre pour barbe à papa
      description: Décrit la taille des cristaux du mélange de sucre, fine, moyenne
        ou grossière, qui peut modifier le fonctionnement de la machine et la texture
        finale.
    floss_sugar_product_form:
      name: Forme du produit pour barbe à papa
      description: Distingue le sucre pour barbe à papa prêt à l’emploi, le concentré
        aromatique à mélanger avec du sucre de base et le sucre de base incolore.
    flour_grind_texture:
      name: Texture de mouture de la farine
      description: Décrit la finesse ou la texture de mouture de la farine, par exemple
        une mouture extra-fine, moyenne, grossière ou sur pierre, car elle peut influer
        sur le résultat des recettes.
    flour_processing_method:
      name: Procédé de traitement de la farine
      description: Recense les principaux procédés ou traitements appliqués à la farine,
        par exemple la mouture sur pierre, le blanchiment, la germination ou l’enrichissement,
        qui influent sur le goût, la couleur ou les qualités nutritionnelles.
    flower_care_instructions:
      name: Consignes d’entretien des fleurs
      description: Fournit les gestes d’entretien recommandés pour les fleurs fraîchement
        coupées, par exemple recouper les tiges ou renouveler l’eau à la fréquence
        indiquée.
    flugelhorn_leadpipe_material:
      name: Matériau de la branche d’embouchure du bugle
      description: Matériau du pavillon, s’il est indiqué séparément du matériau général
        de l’instrument.
    flugelhorn_trigger_type:
      name: Type de trigger du bugle
      description: Précise si le bugle comporte un trigger d’accord et quelle coulisse
        ou valve celui-ci actionne.
    fluorescence_grade:
      name: Grade de fluorescence
      description: Renseigne l’intensité de fluorescence du diamant sous lumière ultraviolette.
    fluorescence_under_uv:
      name: Fluorescence sous UV
      description: Précise si le spécimen présente une fluorescence sous lumière ultraviolette
        et, le cas échéant, de quel type.
    fluorocarbon_content:
      name: Teneur en fluorocarbone
      description: Indique si la cire contient des additifs fluorocarbonés et à quelle
        teneur.
    flute_case_capacity:
      name: Capacité de l’étui de flûte
      description: Désigne ce que l’étui peut contenir en plus du corps principal
        de la flûte, par exemple une flûte avec un piccolo ou une tête supplémentaire.
    flute_cleaning_rod_tip_type:
      name: Type d’embout de tige de nettoyage pour flûte
      description: Décrit la conception de l’embout de la tige qui maintient le chiffon
        ou l’écouvillon, ou entre en contact avec l’instrument, par exemple fendu,
        fileté ou à œillet.
    flute_footjoint_type:
      name: Type de pied de flûte
      description: Définit la configuration du pied de la flûte.
    flute_headjoint_cork_type:
      name: Type de bouchon en liège de tête de flûte
      description: Définit le matériau ou le type de bouchon en liège fourni avec
        la tête de flûte.
    flute_key_system:
      name: Système de clés de la flûte
      description: Désigne le système mécanique ou le système de clés utilisé par
        la flûte, par exemple le système Boehm, le cas échéant.
    flute_keywork_material:
      name: Matériau des clés de flûte
      description: Matériau ou placage des clés, lorsqu’il est indiqué séparément
        du matériau du corps.
    flute_offset_g:
      name: Sol décalé de la flûte
      description: Établit si la flûte présente un sol décalé.
    flute_wall_thickness:
      name: Épaisseur de paroi de la flûte
      description: Catégorie d’épaisseur de paroi du tube de la flûte, selon qu’elle
        est fine, standard ou épaisse.
    fly_pattern_type:
      name: Type de mouche
      description: Classe la mouche artificielle selon le style de pêche ou l’imitation
        d’insecte ou de proie, pour que les pêcheurs trouvent rapidement le type de
        mouche adapté.
    fly_rod_style:
      name: Style de canne à mouche
      description: Classe la canne selon la discipline de lancer ou l’usage prévu,
        par exemple à une main, Switch ou Spey.
    fly_style:
      name: Style de mouche
      description: Définit le type de braguette ou d’ouverture avant du bas de sous-vêtement
        long.
    fly_tying_tools_included:
      name: Outils de montage de mouches inclus
      description: Énumère les outils précis de montage de mouches fournis dans le
        kit, afin d’en identifier clairement le contenu et de comparer les lots.
    fly_type:
      name: Type de mouche
      description: Établit si le bas de sous-vêtement long comporte une braguette
        fonctionnelle et en précise le type, le cas échéant.
    flyer_hook_mounting_method:
      name: Mode de fixation du crochet sur l’épinglier
      description: Mode de fixation du crochet à l’épinglier, par vissage ou par emmanchement
        à force, qui conditionne la facilité de montage et la compatibilité.
    flyer_hook_orientation:
      name: Orientation du crochet de l’épinglier
      description: Côté de montage prévu du crochet sur l’épinglier, à gauche ou à
        droite, ou modèle réversible ou universel.
    flyer_kit_finish_coating:
      name: Finition ou revêtement du kit d’épinglier
      description: Finition de surface appliquée aux pièces du kit d’épinglier.
    flyer_kit_included_components:
      name: Pièces incluses dans le kit d’épinglier
      description: Indique les pièces incluses dans le kit.
    flyer_orifice_type:
      name: Type d’orifice de l’épinglier
      description: Définit le type d’orifice utilisé sur l’épinglier.
    flying_disc_feature_set:
      name: Fonctionnalités du disque volant
      description: Fonctionnalités notables du disque volant.
    flysheet_material:
      name: Matériau du double-toit
      description: Désigne le tissu principal utilisé pour la toile extérieure ou
        le double-toit, ce qui conditionne le poids, la durabilité et la résistance
        aux intempéries.
    flywheel_balance_type:
      name: Type d’équilibrage du volant d’inertie
      description: Établit si le volant d’inertie présente un équilibrage neutre ou
        utilise une masse de déséquilibrage externe.
    foam_blocks_size_class:
      name: Catégorie de taille des blocs de mousse
      description: Renseigne la catégorie générale de taille des blocs fournis dans
        l’ensemble.
    foam_blocks_surface_texture:
      name: Texture de surface des blocs de mousse
      description: Décrit le toucher ou la finition extérieure des blocs de mousse.
    foam_surface_effect:
      name: Effet de surface de la mousse
      description: Décrit les effets décoratifs courants appliqués à la mousse de
        loisirs créatifs ou au polystyrène, par exemple une finition pailletée, métallisée
        ou holographique.
    foil_color:
      name: Couleur de l’accent métallisé
      description: Définit la couleur de l’accent métallisé utilisé sur le certificat,
        le cas échéant.
    foil_curtain_mounting_method:
      name: Mode de montage du rideau métallisé
      description: Mode prévu pour installer ou suspendre le rideau métallisé, par
        exemple avec une bande adhésive ou des œillets.
    foil_discipline:
      name: Discipline de pratique du foil
      description: Détermine le style de pratique ou la discipline principale pour
        lequel le foil est conçu.
    foil_mast_board_mounting_type:
      name: Type de montage du mât de foil sur la planche
      description: Définit l’interface située en haut du mât, par laquelle celui-ci
        se fixe à la planche ou au rail de foil.
    foil_mast_fuselage_connection_type:
      name: Type de liaison entre le mât et le fuselage du foil
      description: Définit le mode de raccordement du mât au fuselage ou à l’aile
        avant.
    foil_mounting_interface:
      name: Interface de montage de feuille
      description: Désigne le standard de connexion qui permet de fixer la pièce à
        la planche ou à d’autres composants du foil.
    foil_mounting_system:
      name: Système de fixation de feuilles
      description: Définit l’interface de montage des foils ou des ailerons sur la
        planche, afin d’assurer la compatibilité avec le matériel dont dispose déjà
        le pratiquant.
    foil_mounting_type:
      name: Type à fixation par feuille
      description: Désigne le système d’interface qui fixe le foil à la planche et
        assure la compatibilité entre les composants.
    fold_over_elastic_application:
      name: Usage prévu de l’élastique de bordure à rabattre
      description: Usage principal prévu pour l’élastique à boutonnières.
    foldability:
      name: Capacité de repliage
      description: Décrit si le séparateur peut se replier ou s’escamoter pour le
        rangement ou la reconfiguration, et selon quel mécanisme.
    foldability_stow:
      name: Repliage hors utilisation
      description: Possibilité de replier ou de ranger le porte-vélos lorsqu’il n’est
        pas utilisé, par exemple contre le véhicule.
    folding_style:
      name: Mode de pliage
      description: Décrit le mode de pliage du tapis de réception pour le transport
        et le rangement, car ce pliage modifie l’uniformité de la surface de réception
        et l’encombrement une fois plié.
    food_basket_items_included:
      name: Aliments inclus dans le panier garni
      description: Énumère les principaux types d’aliments inclus dans le panier,
        afin de choisir un panier adapté aux goûts du destinataire ou à ses contraintes
        alimentaires.
    food_coloring_form:
      name: Forme du colorant alimentaire
      description: Définit la forme sous laquelle le colorant alimentaire est fourni,
        par exemple sous forme de gel, de liquide, de poudre ou de spray.
    food_contact_material:
      name: Matériau au contact des aliments
      description: Matériau principal des équipements de vinification utilisés avec
        le moût ou le vin, comme les fermenteurs, les siphons ou les entonnoirs.
    food_packing_medium:
      name: Milieu de conditionnement des aliments
      description: Définit le milieu dans lequel les fruits ou légumes sont conditionnés,
        par exemple de l’eau, de la saumure, du sirop ou de l’huile.
    foosball_rod_type:
      name: Type de barre de baby-foot
      description: Caractérise la configuration mécanique de la barre, qui modifie
        les sensations de jeu et la sécurité.
    foot_arch_type_compatibility:
      name: Compatibilité avec le type de voûte plantaire
      description: Désigne le profil de voûte plantaire auquel la semelle est destinée.
    foot_arch_type_suitability:
      name: Adaptation au type de voûte plantaire
      description: Désigne le profil de voûte plantaire que la semelle est conçue
        pour soutenir.
    foot_coverage:
      name: Couverture du pied
      description: Distingue les modèles avec pied, sans pied, à étrier ou à talon
        ouvert.
    foot_guard_type:
      name: Type de protection du pied
      description: Indique si la jambière comprend une coquille de protection des
        orteils ou du pied, fixe ou amovible.
    foot_support_level:
      name: Niveau de soutien des pieds
      description: Caractérise le niveau de soutien structurel ou de fermeté offert
        par la semelle, par exemple faible, moyen, élevé ou très élevé.
    footbag_play_style:
      name: Style de jeu du footbag
      description: Style de jeu principal prévu pour le footbag.
    football_ball_type:
      name: Type de ballon de football
      description: Définit l’usage ou le contexte principal prévu pour le ballon de
        football, par exemple les matchs, l’entraînement ou l’exposition comme objet
        de collection.
    football_dummy_type:
      name: Type de mannequin d’entraînement de football
      description: Classe le mannequin selon son style ou sa conception fonctionnelle,
        en fonction de l’objectif d’entraînement visé.
    football_glove_certification:
      name: Certification des gants de football
      description: Désigne la certification ou la conformité aux normes exigée pour
        le jeu en compétition, par exemple SFIA, NFHS ou NCAA.
    footboard_mounting_type:
      name: Type de fixation par marchepied
      description: Définit le mode de fixation du pied de lit au cadre du lit ou au
        sol, afin de choisir les pièces de fixation et la méthode d’installation compatibles.
    footboard_style:
      name: Style de marchepied
      description: Définit le style structurel ou esthétique du pied de lit.
    footrest_adjustability:
      name: Réglage du repose-pieds
      description: Établit si les repose-pieds peuvent se régler, et de quelle manière,
        pour s’adapter à différentes longueurs de jambes d’enfant.
    footrest_type:
      name: Type de repose-pieds
      description: Indique la présence d’un repose-pieds sur le tabouret et en décrit
        la conception.
    footstrap_configuration:
      name: Configuration des sangles de pied
      description: Définit la disposition des inserts de sangles de pied sur la planche.
    footswitch_action_style:
      name: Type d’action du commutateur au pied
      description: Indique si l’action du commutateur est momentanée ou à verrouillage,
        ou si les deux modes sont pris en charge.
    footswitch_power_source:
      name: Source d’alimentation du commutateur au pied
      description: Définit le mode d’alimentation du commutateur au pied, le cas échéant,
        par exemple un fonctionnement passif depuis la prise de l’ampli, une pile,
        un adaptateur externe ou une connexion USB.
    footwear_construction_method:
      name: Procédé de fabrication de chaussures
      description: Définit la technique utilisée pour fixer la tige à la semelle,
        car elle influe sur la durabilité, les possibilités de ressemelage et le prix.
    footwear_cut:
      name: Coupe de la chaussure
      description: Décrit la hauteur de tige de la chaussure, basse, mi-haute ou haute,
        selon le compromis recherché entre mobilité et maintien.
    footwear_size_system:
      name: Système de pointures
      description: Désigne le système régional utilisé pour la pointure indiquée,
        par exemple US, EU ou UK.
    footwear_support_type:
      name: Type de soutien de la chaussure
      description: Définit le soutien biomécanique ou le niveau de contrôle de la
        pronation offert par la chaussure, par exemple un profil neutre, de stabilité
        ou de contrôle du mouvement.
    fork_material:
      name: Matériau de la fourche
      description: Définit le matériau de la fourche avant du vélo, qui conditionne
        sa rigidité, son poids et son comportement de conduite.
    form_factor:
      name: Format matériel
      description: Format matériel principal du contrôleur DMX.
    formula_car_series_class:
      name: Série ou classe de monoplace
      description: Définit la série ou la classe de course dans laquelle la monoplace
        est conçue pour concourir.
    formulation_style:
      name: Style de rédaction
      description: Met en avant les formulations spécialisées conçues pour des usages
        ou des préférences particulières, par exemple Barista ou Extra Creamy.
    formulation_type:
      name: Type de formulation
      description: Type de formulation du spray désinfectant.
    fossil_preparation_level:
      name: Niveau de préparation du fossile
      description: Degré de préparation ou de nettoyage réalisé sur le spécimen, par
        exemple non préparé dans sa gangue ou entièrement préparé.
    fossil_preservation_type:
      name: Type de conservation du fossile
      description: Type de conservation du fossile, par exemple par perminéralisation,
        moule ou moulage, ou par empreinte.
    fossil_restoration_status:
      name: État de restauration du fossile
      description: Établit si le spécimen a été réparé ou restauré et, le cas échéant,
        selon quel procédé, par exemple collage, reconstruction ou assemblage composite.
    foundation_configuration:
      name: Configuration du sommier
      description: Définit si le sommier est fabriqué d’un seul tenant ou sous forme
        d’ensemble en deux pièces pour les matelas de grande taille.
    foundation_profile:
      name: Profil de hauteur du sommier
      description: Classe le sommier selon sa catégorie de hauteur globale, par exemple
        très basse, basse, standard ou haute, afin d’associer rapidement la hauteur
        du matelas recherchée à l’ajustement des draps.
    frame_adjustability:
      name: Réglage du cadre
      description: Établit si le cadre peut être réglé et de quelle manière, par exemple
        en largeur, en hauteur, en rotation ou en inclinaison, car ces réglages influent
        sur l’ergonomie et l’adaptation au projet.
    frame_drum_jingle_configuration:
      name: Configuration des cymbalettes du tambour sur cadre
      description: Établit si le tambour sur cadre comporte des cymbalettes et, le
        cas échéant, selon quelle configuration générale.
    frame_drum_tuning_system:
      name: Système d’accordage du tambour sur cadre
      description: Mode d’accordage du tambour sur cadre, ou indication de sa capacité
        à être accordé.
    frame_finish:
      name: Finition du cadre
      description: Définit le revêtement protecteur ou la finition du matériau appliqué
        au cadre, car cette finition influe sur la durabilité et l’esthétique.
    frame_mounting_standard:
      name: Norme de fixation du cadre
      description: Définit la spécification d’interface entre la chaussure et le châssis,
        par exemple 195 mm à 2 points ou Trinity à 3 points, car elle est déterminante
        pour la compatibilité du châssis.
    frame_steel_gauge:
      name: Épaisseur de l’acier du cadre
      description: Désigne l’épaisseur du tube d’acier utilisé pour les montants du
        rayonnage, qui constitue un indicateur déterminant de résistance et de stabilité.
    frame_suspension_type:
      name: Type de suspension du cadre
      description: Décrit la conception de suspension du cadre de vélo, par exemple
        un cadre rigide, semi-rigide ou tout suspendu, pour orienter le choix vers
        un cadre adapté au montage prévu.
    free_reed_instrument_orientation:
      name: Orientation de l’instrument à anches libres
      description: Définit la manière de tenir ou de jouer l’instrument, par exemple
        à la main avec soufflet ou en bandoulière, selon l’ergonomie et le contexte
        d’utilisation.
    free_weight_rack_type:
      name: Type de rack pour poids libres
      description: Classe le rack selon sa structure ou sa fonction, par exemple rack
        pour barres, rack pour kettlebells ou arbre à disques.
    freehub_body_type:
      name: Type de corps de roue libre
      description: Définit le standard de corps de roue libre ou de corps de cassette
        compatible avec le moyeu arrière du vélo.
    freehub_driver_standard:
      name: Standard de corps de cassette
      description: Désigne l’interface de cassette ou de corps de cassette compatible
        avec la pièce de moyeu, par exemple Shimano HG ou SRAM XD.
    freewheel_thread_standard:
      name: Standard de filetage de la roue libre
      description: Définit le standard ou la taille de filetage du moyeu avec lequel
        la roue libre est compatible.
    french_horn_bell_construction:
      name: Construction du pavillon du cor d’harmonie
      description: Définit la construction du pavillon et précise s’il peut être retiré
        pour le transport ou l’entretien.
    french_horn_bell_material:
      name: Matériau du pavillon du cor français
      description: Définit le matériau ou l’alliage du pavillon du cor d’harmonie,
        et souvent de son évasement.
    french_horn_bell_type:
      name: Type de pavillon du cor d’harmonie
      description: Style de construction du pavillon.
    french_horn_finish:
      name: Finition du cor d’harmonie
      description: Finition extérieure ou placage de l’instrument.
    french_horn_included_accessories:
      name: Accessoires inclus avec le cor d’harmonie
      description: Accessoires inclus avec le cor d’harmonie, par exemple un étui
        ou une embouchure.
    french_horn_leadpipe_material:
      name: Matériau du tube d'embouchure du cor français
      description: Définit le matériau ou l’alliage de la branche d’embouchure.
    french_horn_wrap_type:
      name: Type à enroulement pour cor français
      description: Configuration générale de l’enroulement ou de la forme du cor d’harmonie.
    fretboard_radius_fit:
      name: Compatibilité avec le radius de la touche
      description: Établit si la courbure du patin du capodastre convient à une touche
        plate ou à une touche avec radius, ou si elle se règle pour s’adapter à plusieurs
        radius de touche.
    friction_surface_included:
      name: Surface de friction incluse
      description: Établit si le volant d’inertie comprend une surface de friction
        remplaçable ou rapportée, par exemple un insert ou une bague, ou s’il présente
        une face de friction d’un seul tenant.
    fringe_curtain_finish:
      name: Finition du rideau à franges
      description: Décrit la finition visuelle des franges, notamment l’éclat et la
        texture.
    fringe_curtain_material:
      name: Matériau du rideau à franges
      description: Définit le matériau principal des bandes du rideau, par exemple
        du film polyéthylène téréphtalate, du plastique, du papier ou du tissu.
    fringe_curtain_use_location:
      name: Emplacement du rideau à franges
      description: Indique si le rideau à franges est destiné à une utilisation en
        intérieur, en extérieur ou dans les deux environnements.
    fringe_trim_style:
      name: Style de garniture à franges
      description: Décrit la construction de la garniture à franges, selon la manière
        dont les brins ou les boucles sont formés et présentés.
    front_axle_standard:
      name: Standard d’axe avant
      description: Énumère le diamètre de l’axe et l’entraxe que la fourche est conçue
        pour recevoir, par exemple 15 x 110 mm Boost, pour établir la compatibilité
        avec le moyeu.
    front_button_configuration:
      name: Configuration des boutons avant
      description: Indique le type de boutonnage avant d’une veste, simple ou croisé,
        ainsi que le nombre de boutons à l’avant.
    front_closure_style:
      name: Style de fermeture avant
      description: Décrit la construction du devant du trench-coat, par exemple droit,
        croisé, ouvert, portefeuille ou zippé.
    front_decoration_type:
      name: Type d’ornement à l’avant
      description: Désigne le type d’ornement ou d’écusson présent à l’avant du chapeau,
        par exemple un écusson brodé ou un écusson en cuir.
    front_point_configuration:
      name: Configuration de la pointe avant
      description: Définit la conception des pointes avant, selon qu’elles sont à
        pointe unique, à double pointe, modulaires ou remplaçables, car cette conception
        influe sur la pénétration dans la glace et en terrain mixte.
    front_seat_position:
      name: Position du siège avant
      description: Emplacement prévu du siège dans la rangée avant.
    front_style:
      name: Style du devant
      description: Décrit la construction du devant du chino, selon que le pantalon
        présente un devant plat, des plis ou d’autres détails.
    frosting_or_icing_type:
      name: Type de glaçage
      description: Spécifie le type de glaçage dont le gâteau ou la barre de dessert
        est recouvert.
    fruit_cultivar_or_variety:
      name: Cultivar ou variété du fruit
      description: Spécifie le cultivar ou le nom de variété du fruit, par exemple
        Gala, Granny Smith, Monthong ou Cavendish.
    fruit_cut_style:
      name: Type de découpe du fruit
      description: Décrit la manière dont le fruit est préparé ou coupé, selon qu’il
        est entier, tranché ou coupé en cubes.
    fruit_mix_variety:
      name: Variété du mélange de fruits
      description: Désigne le mélange thématique ou la variété générale du mélange
        de fruits, par exemple Mélange tropical ou Mélange de baies.
    fruit_piece_form:
      name: Forme des morceaux de fruits
      description: Décrit la découpe ou la présentation des morceaux de fruits secs,
        selon qu’ils sont entiers, tranchés ou réduits en poudre.
    fruit_snack_form:
      name: Sous forme de friandise aux fruits
      description: Classe la collation aux fruits selon sa forme ou son style de présentation.
    fruit_topping_format:
      name: Format du nappage aux fruits
      description: Décrit la forme, la texture ou le style du nappage, afin de choisir
        entre des sauces, des sirops, des morceaux de fruits, des compotes, etc.
    fruit_variety:
      name: Variété de fruits
      description: Désigne le fruit principal utilisé dans une recette, un kit ou
        des ingrédients pour vin de fruits, par exemple la pomme, la cerise ou la
        mûre.
    fuel_cap_gasket_seal_material:
      name: Matériau du joint du bouchon de carburant
      description: Spécifie le matériau du joint d’étanchéité ou du joint torique
        du bouchon de carburant.
    fuel_cap_locking_mechanism:
      name: Mécanisme de verrouillage du bouchon du réservoir
      description: Indique le mode de verrouillage d’un bouchon de carburant verrouillable.
    fuel_cap_type:
      name: Type de bouchon de réservoir
      description: Spécifie le type fonctionnel ou la conception du bouchon de carburant
        destiné au goulot de remplissage d’un véhicule.
    fuel_cap_venting:
      name: Ventilation du bouchon de carburant
      description: Indique si le bouchon de carburant comporte un évent et, le cas
        échéant, le type de ventilation.
    fuel_filter_features:
      name: Fonctionnalités du filtre à carburant
      description: Énumère les fonctionnalités notables du filtre à carburant, par
        exemple la séparation de l’eau, une vanne de vidange ou un port de capteur.
    fuel_filter_media_material:
      name: Matériau du média filtrant du filtre à carburant
      description: Spécifie le média filtrant principal utilisé dans l’élément du
        filtre à carburant.
    fuel_filter_mounting_connection_type:
      name: Type de montage ou de raccordement du filtre à carburant
      description: Spécifie le mode de raccordement ou d’installation du filtre à
        carburant, par exemple fileté, à visser, à raccord rapide, à embout cannelé
        ou à banjo.
    fuel_injection_cleaning_method:
      name: Méthode de nettoyage de l’injection de carburant
      description: Indique comment le kit s’utilise pour nettoyer le système d’injection
        de carburant.
    fuel_injector_electrical_connector_type:
      name: Type de connecteur électrique de l’injecteur de carburant
      description: Spécifie le standard ou la forme du connecteur électrique de l’injecteur.
    fuel_injector_seat_type:
      name: Type de siège de l’injecteur de carburant
      description: Spécifie le type d’interface entre l’embout ou le siège de l’injecteur
        et la zone d’étanchéité, au niveau de l’admission ou de la rampe de carburant.
    fuel_injector_spray_pattern:
      name: Schéma de pulvérisation de l’injecteur de carburant
      description: Désigne le schéma de pulvérisation ou de distribution du carburant
        par l’injecteur, selon la terminologie du fabricant ou du secteur, par exemple
        en cône, en éventail, en jet fin ou à plusieurs orifices.
    fuel_level_sensor_mounting_type:
      name: Type de montage du capteur de niveau de carburant
      description: Spécifie l’interface de montage utilisée pour fixer le capteur
        ou transmetteur de niveau de carburant au réservoir de carburant ou au module
        de pompe.
    fuel_level_sensor_sensing_mechanism:
      name: Mécanisme de détection du capteur de niveau de carburant
      description: Spécifie le mécanisme ou la technologie qui mesure le niveau de
        carburant dans un capteur ou un transmetteur.
    fuel_line_compliance_standard:
      name: Norme de conformité de la conduite de carburant
      description: Désigne la norme réglementaire ou sectorielle à laquelle la conduite
        de carburant est conforme, cas fréquent dans les applications marines.
    fuel_line_connector_interface_type:
      name: Type d’interface de raccordement de la conduite de carburant
      description: Spécifie le type de connexion ou d’interface aux extrémités de
        la conduite de carburant ou du raccord.
    fuel_pressure_regulator_body_material:
      name: Matériau du corps du régulateur de pression de carburant
      description: Spécifie le matériau du boîtier ou du corps du régulateur, choisi
        pour sa durabilité et sa résistance à la corrosion.
    fuel_pressure_regulator_mounting_type:
      name: Type de montage du régulateur de pression de carburant
      description: Spécifie le mode de montage ou d’installation du régulateur de
        pression de carburant, qui conditionne l’ajustement et la compatibilité.
    fuel_pump_inlet_type:
      name: Type de montage du régulateur de pression de carburant
      description: Type de raccordement à l’entrée de la pompe.
    fuel_pump_mounting_location:
      name: Emplacement de montage de la pompe à carburant
      description: Emplacement d’installation de la pompe à carburant dans le circuit
        de carburant du véhicule.
    fuel_pump_outlet_connection_type:
      name: Raccordement de sortie de la pompe à carburant
      description: Spécifie le type de raccordement à la sortie de la pompe à carburant,
        afin d’assurer la compatibilité du montage et de l’installation.
    fuel_system_application:
      name: Application du système de carburant
      description: Architecture du système d’alimentation en carburant que la pompe
        est conçue pour prendre en charge, par exemple à carburateur, EFI, GDI ou
        à pompe diesel de relevage ou de transfert.
    fuel_system_connection_type:
      name: Type de connexion du système de carburant
      description: Spécifie les standards de connexion du système de carburant ou
        les interfaces d’adaptateur que le kit prend en charge.
    fuel_system_type:
      name: Type de système d'alimentation
      description: Spécifie le système d’alimentation en carburant du moteur, par
        exemple une alimentation par carburateur ou une architecture d’injection.
    fuel_tank_installation_position:
      name: Position d’installation du réservoir de carburant
      description: Spécifie la position habituelle d’installation du réservoir de
        carburant sur le véhicule.
    fuel_tank_orientation:
      name: Orientation du réservoir de carburant
      description: Spécifie si le réservoir de carburant est destiné à être installé
        à l’horizontale ou à la verticale.
    fuel_tank_shape:
      name: Forme du réservoir de carburant
      description: Décrit la forme générale du réservoir de carburant, qui permet
        d’évaluer son adaptation physique et sa correspondance lors d’un remplacement.
    fur_type:
      name: Type de fourrure
      description: Désigne l’espèce animale ou la matière synthétique de la fourrure
        présente à l’extérieur du manchon, de la pochette ou du sac.
    furniture_finish:
      name: Finition du meuble
      description: Décrit le traitement de surface ou la finition du meuble, qui influent
        sur son aspect et ses exigences d’entretien.
    fuse_form_factor:
      name: Format de fusible
      description: Spécifie le format du fusible, afin de garantir sa compatibilité
        avec le porte-fusible ou le bloc-fusibles prévu, par exemple un fusible à
        lame ou à cartouche.
    fuse_terminal_or_mount_style:
      name: Type de borne ou de montage du fusible
      description: Spécifie le mode de connexion mécanique ou électrique du fusible,
        selon qu’il est enfichable, fixé par boulon ou monté en ligne.
    fusible_application_method:
      name: Méthode d'application par thermocollage
      description: Spécifie le mode d’activation ou d’application de l’adhésif thermocollant,
        par exemple au fer, à la presse ou avec renfort par couture.
    fusible_hem_tape_application_method:
      name: Méthode d’application du ruban d’ourlet thermocollant
      description: Décrit le mode d’activation ou d’application du ruban, par exemple
        au fer ou à la presse à chaud.
    fusible_seam_tape_activation_method:
      name: Méthode d'activation d'un ruban thermocollant
      description: Indique comment l’adhésif est activé lors de la pose.
    fusible_seam_tape_application:
      name: Application du ruban thermocollant pour coutures
      description: Spécifie l’usage principal prévu du ruban thermocollant pour coutures.
    fusible_seam_tape_material:
      name: Matériau du ruban thermocollant pour coutures
      description: Matériau ou composition du ruban, du voile ou du support, et non
        du tissu auquel il adhère.
    fusible_seam_tape_washability:
      name: Tenue au lavage du ruban thermocollant pour coutures
      description: Indique si la couture thermocollée reste intacte après le lavage
        ou le nettoyage.
    fusible_seam_tape_waterproof_rating:
      name: Niveau d’imperméabilité du ruban thermocollant pour coutures
      description: Indique si le ruban thermocollant pour coutures est destiné à créer
        une couture imperméable ou résistante à l’eau après la pose.
    fusible_tape_backing_type:
      name: Type de support protecteur du ruban thermocollant
      description: Spécifie si le ruban comporte un papier ou un film antiadhésif,
        ainsi que la forme de ce support, qui influe sur la manipulation et la pose.
    futon_frame_conversion_mechanism:
      name: Mécanisme de conversion du cadre de futon
      description: Définit le mécanisme ou le type de structure qui permet de faire
        passer le cadre de la configuration canapé à la configuration méridienne ou
        lit.
    gaiter_height_type:
      name: Hauteur de couverture des guêtres
      description: Classe les guêtres selon la hauteur de jambe couverte, par exemple
        jusqu’à la cheville, à mi-mollet, au genou ou à la cuisse.
    game_variation:
      name: Variante de jeu
      description: Spécifie le style de jeu auquel l’ensemble est destiné, par exemple
        le tetherball classique, le tennis avec balle attachée à un fil ou le speedball.
    garlic_preparation_style:
      name: Préparation à l'ail
      description: Spécifie la manière dont l’ail est préparé ou transformé avant
        la vente, selon qu’il est entier, haché ou en poudre.
    garlic_variety:
      name: Variété d’ail
      description: Désigne la variété botanique ou commerciale de l’ail proposé, ou
        son cultivar.
    garment_back_style:
      name: Style du dos du vêtement
      description: Désigne la conception ou la construction du dos du vêtement, par
        exemple un dos ouvert, un dos nageur ou un dos croisé.
    garment_pattern_type:
      name: Type de patron de vêtement
      description: Spécifie le type de vêtement que le patron de couture permet de
        réaliser.
    garnish_type:
      name: Type de garniture
      description: Désigne la garniture utilisée pour compléter la présentation du
        cocktail, qu’il s’agisse d’un ingrédient ou d’un style de garniture.
    gas_lift_class:
      name: Classe du vérin à gaz
      description: Spécifie l’indice de sécurité et de résistance du vérin à gaz utilisé
        pour régler la hauteur du siège.
    gas_propellant_type:
      name: Type de gaz propulseur
      description: Spécifie le type de gaz propulseur recommandé ou compatible lorsque
        le blaster fonctionne au gaz.
    gatta_tabla_tuning_block_material:
      name: Matériau des blocs d’accordage du tabla
      description: Matériau des blocs d’accordage, appelés gatta, placés entre la
        sangle d’accordage et la caisse.
    gauge_mounting_type:
      name: Type de montage du manomètre
      description: Mode de montage ou d’installation de l’indicateur de carburant
        sur l’embarcation.
    gauge_style:
      name: Style de jauge
      description: Spécifie le type de manomètre utilisé par la pompe, par exemple
        un cadran analogique, un affichage numérique ou aucun manomètre.
    gear_oil_api_classification:
      name: Classification API des huiles pour engrenages
      description: Classification API GL des huiles pour engrenages utilisées dans
        les différentiels et les boîtes de vitesses manuelles.
    gel_wax_density_grade:
      name: Grade de densité de la cire gel
      description: Indique le grade de densité de la cire gel, qui influe sur la transparence,
        la charge parfumante et la compatibilité avec les inclusions.
    gel_wax_transparency_level:
      name: Niveau de transparence de la cire gel
      description: Décrit le degré de transparence ou d’opacité de la cire gel dans
        son usage prévu.
    gelatin_form:
      name: Forme de la gélatine
      description: Décrit la présentation de la gélatine, pour choisir le format adapté
        aux recettes et aux applications industrielles.
    gelatin_or_gelling_agent_source:
      name: Origine de la gélatine ou de l’agent gélifiant
      description: Indique l’origine ou le type d’agent gélifiant utilisé dans le
        produit, information importante pour les exigences alimentaires et religieuses.
    gelatin_source:
      name: Origine de la gélatine
      description: Indique si la gélatine est d’origine animale, végétale ou synthétique,
        afin de vérifier sa compatibilité avec des exigences alimentaires, éthiques
        ou religieuses.
    gelling_agent:
      name: Agent gélifiant
      description: Désigne la substance principale utilisée pour faire prendre ou
        épaissir le dessert, avec un effet sur son adéquation alimentaire et sa texture.
    gemstone_clarity_grade:
      name: Grade de pureté de la pierre gemme
      description: Grade de pureté de la pierre gemme, lorsqu’un grade est attribué.
    gemstone_creation_method:
      name: Mode d’obtention de la pierre gemme
      description: Indique si la pierre gemme est naturelle, créée en laboratoire,
        ou constitue une imitation ou une contrefaçon.
    gemstone_cut_style:
      name: Style de taille de la pierre gemme
      description: Décrit le style ou la finition de taille du spécimen de pierre
        gemme.
    gemstone_treatment_status:
      name: État de traitement de la pierre gemme
      description: Indique si la pierre gemme a été traitée ou améliorée et, le cas
        échéant, selon quel procédé.
    geological_period:
      name: Période géologique
      description: Période géologique du fossile, avec l’époque le cas échéant, si
        ces informations sont connues, par exemple Jurassique, Crétacé ou Éocène.
    gift_box_tin_insert_type:
      name: Type d’insert pour boîte cadeau ou boîte métallique
      description: Configuration de l’insert intérieur destiné à organiser ou à protéger
        les articles dans la boîte cadeau ou la boîte métallique.
    gift_box_tin_sustainability_features:
      name: Caractéristiques de durabilité de la boîte cadeau ou de la boîte métallique
      description: Caractéristiques de l’emballage de la boîte cadeau ou de la boîte
        métallique liées à la durabilité.
    gift_box_tin_window_type:
      name: Boîte cadeau / boîte métallique à fenêtre
      description: Indique si la boîte cadeau comporte une fenêtre de présentation
        et, le cas échéant, le style de cette fenêtre.
    gift_message_option:
      name: Option de message cadeau
      description: Spécifie si le cadeau peut inclure un message ou une note, et selon
        quelle modalité (aucun message, message inclus ou message personnalisable).
    ginger_maturity:
      name: Maturité du gingembre
      description: Indique le stade de récolte du gingembre, jeune ou mûr, ce qui
        influe sur l'intensité de sa saveur et son utilisation culinaire privilégiée.
    ginger_variety:
      name: Variété de gingembre
      description: Spécifie le cultivar, le type ou le rhizome apparenté de la famille
        du gingembre, pour distinguer les profils aromatiques et les usages culinaires.
    glass_kiln_controller_type:
      name: Type de contrôleur du four à verre
      description: Type de contrôleur de température ou de cuisson inclus avec le
        four.
    glass_kiln_firing_application:
      name: Application de cuisson du verre au four
      description: Applications principales de travail du verre auxquelles le four
        est destiné.
    glass_stone_application_method:
      name: Méthode d’application des pierres de verre
      description: Spécifie comment les pierres de verre doivent être fixées ou appliquées
        dans les projets, par collage, par thermocollage ou par couture.
    glass_tint:
      name: Teinte du verre
      description: Teinte du verre ou du plastique de la bouteille utilisée pour maîtriser
        l’exposition à la lumière, notamment dans le brassage et la vinification.
    glaze_firing_atmosphere:
      name: Atmosphère de cuisson de l’émail
      description: Atmosphère ou atmosphères de cuisson prévues pour l’émail.
    glaze_opacity:
      name: Opacité de l’émail
      description: Degré de transparence de l’émail après la cuisson.
    glaze_product_form:
      name: Formulaire de commande de produits de glaçage
      description: Forme sous laquelle le produit d’émail est fourni, par exemple
        liquide, en poudre sèche, concentré ou en spray.
    glider_avionics_package:
      name: Ensemble avionique du planeur
      description: Indique le niveau global des instruments de navigation et de vol
        installés dans le planeur.
    glider_certification_rating:
      name: Classe de certification du planeur
      description: Classe de certification officielle qui indique le niveau de sécurité
        et de performance du planeur, par exemple EN-A ou EN-B.
    glider_landing_gear_configuration:
      name: Configuration du train d’atterrissage du planeur
      description: Spécifie la configuration du train d’atterrissage du planeur.
    glider_launch_method:
      name: Méthode de lancement du planeur
      description: Spécifie le mode de lancement habituel du planeur, y compris l’autolancement
        le cas échéant.
    glider_performance_class:
      name: Classe de performance du planeur
      description: Classe ou catégorie de compétition ou de performance couramment
        utilisée pour les planeurs.
    glitter_application_method:
      name: Méthode d'application des paillettes
      description: Indique la technique prévue pour appliquer ou utiliser les paillettes
        de loisirs créatifs, par exemple par saupoudrage, avec un saupoudreur, par
        incorporation, par frottement, sur adhésif, au pinceau, par pulvérisation,
        par thermofixation ou par gaufrage.
    glitter_eco_friendly_claim:
      name: Allégation environnementale des paillettes
      description: Allégations environnementales propres aux formulations de paillettes
        libres.
    glitter_effect_type:
      name: Type d’effet des paillettes
      description: Décrit l’effet visuel des paillettes ou des sequins au-delà de
        la couleur de base, par exemple holographique ou irisé.
    glitter_glue_base_solvent_type:
      name: Type de base ou de solvant de la colle à paillettes
      description: Décrit la base principale de la colle à paillettes, un critère
        souvent important pour les acheteurs en matière de nettoyage et de compatibilité
        avec les matériaux.
    glitter_opacity_coverage:
      name: Opacité ou couvrance des paillettes
      description: Indique le degré d’opacité de l’effet pailleté après l’application.
    glitter_use_suitability:
      name: Adéquation des paillettes à l’usage prévu
      description: Indique le contexte d’utilisation principal, prévu ou approuvé,
        de la poudre pailletée, par exemple un usage réservé aux loisirs créatifs,
        une qualité cosmétique sûre pour le corps ou une compatibilité alimentaire.
    glove_armor_placement:
      name: Emplacement des protections du gant
      description: Indique l’emplacement des protections sur le gant.
    glove_cuff_length:
      name: Longueur de la manchette du gant
      description: Indique la longueur de manchette d’un gant de course, selon la
        couverture assurée au poignet ou à l’avant-bras.
    glove_finger_coverage:
      name: Couverture des doigts du gant
      description: Décrit le niveau de couverture des doigts assuré par le gant, du
        modèle à doigts entièrement couverts au modèle sans doigts.
    glove_finger_design:
      name: Configuration des doigts du gant
      description: Spécifie la configuration des doigts du gant, par exemple à cinq
        doigts ou en moufle.
    glove_fit_profile:
      name: Profil d'ajustement du gant
      description: Décrit la forme intérieure et la silhouette générale du gant, afin
        que les joueurs choisissent les sensations recherchées.
    glove_insulation:
      name: Isolation du gant
      description: Spécifie l’isolation, la construction thermique ou le système chauffant
        du gant, par exemple le niveau d’isolation, la technologie de doublure ou
        d’isolation, ou le type de chauffage.
    glove_palm_material:
      name: Matériau de la paume du gant
      description: Spécifie le matériau principal de la paume du gant, qui constitue
        la principale surface de contact et de préhension, et peut différer de celui
        du dos de la main.
    glove_size:
      name: Taille du gant
      description: Indique la taille générale de main à laquelle les gants de sac
        sont adaptés, souvent exprimée au moyen de codes de taille vestimentaire ou
        d’un système de tailles pour enfants.
    glove_webbing_style:
      name: Style de toile du gant
      description: Définit la conception de la toile ou de la poche du gant, dont
        dépendent le contrôle de la balle, l’adéquation au poste de jeu et les préférences
        du joueur.
    glow_effect:
      name: Effet lumineux
      description: Indique si les billes en gel sont phosphorescentes ou compatibles
        avec un traceur pour les parties en faible luminosité.
    glow_plug_connector_type:
      name: Type de connecteur de la bougie de préchauffage
      description: Type de borne ou de connecteur électrique de la bougie de préchauffage
        servant au raccordement au faisceau électrique du véhicule.
    glow_plug_heating_element_type:
      name: Type d’élément chauffant de la bougie de préchauffage
      description: Type ou technologie de l’élément chauffant de la bougie de préchauffage.
    glue_application_format:
      name: Format d’application de la colle
      description: Spécifie le format de l’applicateur ou du dispositif de distribution
        utilisé pour appliquer la colle scolaire.
    glue_applicator_type:
      name: Type d’applicateur de colle
      description: Spécifie le type d’applicateur intégré ou d’embout distributeur
        utilisé pour appliquer la colle liquide.
    glue_base_formulation:
      name: Formulation de base de la colle
      description: Désigne la formulation chimique principale de la colle liquide
        de loisirs créatifs, qui détermine les performances, la sécurité d’utilisation
        et les conditions de nettoyage attendues.
    glue_gun_nozzle_style:
      name: Type de buse du pistolet à colle
      description: Spécifie la forme de l’embout de buse du pistolet à colle, qui
        détermine la précision d’application et la répartition de la colle.
    glue_safety_standard:
      name: Norme de sécurité de la colle
      description: Indique si la colle est non toxique ou sans danger pour les enfants,
        selon l’étiquetage et les normes courantes.
    goal_frame_material:
      name: Matériau du cadre du but
      description: Désigne le matériau des poteaux ou du cadre du but, qui détermine
        son poids, sa facilité de transport et sa résistance aux intempéries.
    goal_size:
      name: Taille du but
      description: Classe un but de football selon les tailles courantes, réglementaires
        ou d’entraînement, pour faciliter le choix sans s’appuyer uniquement sur les
        dimensions brutes.
    goal_size_classification:
      name: Classification par taille des buts
      description: Désigne la classe de taille standardisée du but, par exemple réglementaire,
        jeune ou mini, afin de sélectionner rapidement un équipement adapté au niveau
        de jeu.
    goal_size_standard:
      name: Standard de taille du but
      description: Indique le standard officiel ou la catégorie d’âge auxquels le
        but est conforme, par exemple la réglementation World Aquatics ou la catégorie 12U.
    goalie_configuration:
      name: Configuration du gardien de but
      description: Désigne le nombre de gardiens par camp sur la table, selon le style
        américain à trois gardiens ou le style européen à un gardien.
    goalie_playing_surface:
      name: Surface de jeu du gardien de but
      description: Spécifie la surface ou l’environnement de jeu principal pour lequel
        l’ensemble d’équipement de gardien de hockey est conçu.
    goalkeeper_glove_cut:
      name: Coupe de gants de gardien de but
      description: Indique la coupe de la paume et des doigts des gants de gardien,
        qui détermine l’ajustement, le toucher de balle et le contrôle.
    goalkeeper_training_aid_type:
      name: Type d'accessoire d'entraînement pour gardien de but
      description: Désigne le type d’accessoire d’entraînement pour gardien, afin
        de filtrer les produits avec précision.
    goblet_drum_playing_style:
      name: Style de jeu du tambour en gobelet
      description: Indique si l’instrument est principalement conçu pour être joué
        à la main ou avec des baguettes ou des mailloches.
    gobo_format:
      name: Format du gobo
      description: Spécifie le format ou le standard de gobo accepté par le projecteur,
        selon le diamètre et la famille d’épaisseur, afin de garantir la compatibilité
        avec les gobos de remplacement ou personnalisés.
    gobo_root_variety:
      name: Variété de racine de gobo
      description: Désigne le cultivar ou la variété de racine de gobo, c’est-à-dire
        de bardane.
    gobo_rotation:
      name: Rotation du gobo
      description: Spécifie si le gobo est rotatif et dans quels sens il peut tourner.
    goggle_accessory_type:
      name: Type d'accessoire pour lunettes de protection
      description: Classe l’accessoire par type, par exemple housse, étui ou sangle,
        pour filtrer plus facilement les produits variés de cette catégorie large.
    goggle_features:
      name: Caractéristiques des lunettes de protection
      description: Énumère les caractéristiques particulières des lunettes de protection,
        qu’elles soient fonctionnelles ou liées à la conception.
    goggle_fit_design:
      name: Conception de l’ajustement des lunettes de protection
      description: Décrit l’ajustement et le mode de port prévus pour les lunettes
        de protection, y compris la compatibilité OTG avec le port de lunettes de
        vue.
    goggle_gasket_material:
      name: Matériau du joint des lunettes de protection
      description: Matériau du joint en contact avec le visage, qui conditionne le
        confort, le risque d’allergie et l’étanchéité.
    goggle_integration:
      name: Intégration avec les lunettes de protection
      description: Indique si le casque est conçu pour être utilisé avec des lunettes
        de protection, s’il comporte des dispositifs intégrés pour les maintenir en
        place, ou les deux.
    goggle_lens_shape:
      name: Forme du verre des lunettes de protection
      description: Définit le profil de courbure du verre de remplacement, qui détermine
        la distorsion et l’étendue du champ de vision, par exemple cylindrique, sphérique
        ou torique.
    goggle_lens_tint:
      name: Teinte du verre des lunettes de protection
      description: Définit la teinte ou la finition du verre, qui détermine la transmission
        de la lumière, la perception des couleurs et le rendu esthétique.
    goggle_strap_material:
      name: Matériau de la sangle des lunettes de protection
      description: Matériau principal de la sangle de maintien, déterminant pour la
        durabilité et le confort.
    golf_accessory_set_purpose:
      name: Usage prévu du jeu d’accessoires de golf
      description: Désigne l’usage prévu ou le thème principal du jeu d’accessoires
        de golf.
    golf_bag_style:
      name: Style de sac de golf
      description: Indique le style principal du sac de golf, selon sa conception
        ou son usage, par exemple un sac trépied, un sac chariot ou un sac tour.
    golf_ball_alignment_design:
      name: Conception de l’aide à l’alignement de la balle de golf
      description: Spécifie toute aide visuelle à l’alignement intégrée à la balle,
        imprimée ou moulée à sa surface.
    golf_ball_construction:
      name: Construction de la balle de golf
      description: Spécifie le nombre de couches ou de pièces qui composent la balle
        de golf, dont dépendent l’effet, les sensations de jeu et la distance.
    golf_ball_cover_material:
      name: Matériau de l’enveloppe de la balle de golf
      description: Désigne le matériau de l’enveloppe extérieure de la balle de golf,
        qui détermine l’effet, la durabilité et les sensations de jeu.
    golf_cart_cover_climate_use:
      name: Conditions d’utilisation de la housse de voiturette de golf
      description: Indique les principales conditions climatiques ou saisonnières
        auxquelles la housse de rangement est conçue pour résister.
    golf_cart_enclosure_fit_type:
      name: Type d’ajustement de l’habillage de voiturette de golf
      description: Spécifie si l’habillage est conçu pour un nombre de places ou un
        format précis, ou s’il offre un ajustement universel ou réglable.
    golf_cart_intended_use:
      name: Usage prévu de la voiturette de golf
      description: Usage principal pour lequel la voiturette de golf est conçue ou
        configurée.
    golf_club_number:
      name: Numéro du club de golf
      description: Désigne le numéro précis ou la désignation du wedge imprimés sur
        le club, par exemple 5, PW ou GW.
    golf_club_part_type:
      name: Type de pièce de club de golf
      description: Classe l’accessoire ou la pièce de club de golf selon des sous-types
        courants, par exemple un manchon d’adaptation, une ferrule ou un poids.
    golf_grip_size:
      name: Taille du grip de golf
      description: Spécifie la catégorie de taille extérieure du grip de golf, qui
        correspond à son épaisseur ressentie en main.
    golf_shoe_spike_type:
      name: Type de crampons de la chaussure de golf
      description: Désigne le type de système d’adhérence utilisé sur la semelle extérieure
        des chaussures de golf, selon qu’elles sont à crampons ou sans crampons.
    golf_tee_style:
      name: Style tee de golf
      description: Décrit la conception structurelle ou fonctionnelle du tee de golf,
        qui détermine la hauteur de la balle, la durabilité du tee ou la réduction
        de l’effet.
    golf_training_focus:
      name: Axe d’entraînement au golf
      description: Classe le produit selon la compétence ou l’aspect principal qu’il
        vise à améliorer.
    golf_training_objective:
      name: Objectif d’entraînement au golf
      description: Indique la compétence ou l'aspect principal du golf que cet accessoire
        d'entraînement est destiné à améliorer.
    gong_profile_type:
      name: Type de profil du gong
      description: Décrit la forme du gong d’opéra, en distinguant notamment les modèles
        à centre plat ou surélevé, car cette forme conditionne fortement le timbre
        et le style de jeu.
    grading_scale:
      name: Échelle de notation
      description: Échelle de notation utilisée pour une pièce d’investissement certifiée,
        par exemple Sheldon 1–70.
    grading_service:
      name: Service de notation
      description: Service tiers de notation ou de certification de la pièce ou du
        billet de banque, par exemple PCGS ou NGC.
    graduation_increment:
      name: Intervalle de graduation
      description: Spécifie la plus petite division imprimée ou gravée sur l’échelle
        de la jauge de couture, qui correspond à la résolution des graduations.
    grain_processing_method:
      name: Procédé de traitement des céréales
      description: Désigne le principal procédé appliqué à la céréale, par exemple
        l’étuvage, le floconnage ou la germination, car ce procédé modifie le temps
        de cuisson, la texture et les qualités nutritionnelles.
    grand_piano_soundboard_material:
      name: Matériau de la table d'harmonie d'un piano à queue
      description: Matériau principal de la table d’harmonie du piano, c’est-à-dire
        la pièce résonante qui conditionne le timbre et la durabilité.
    grappling_dummy_pose:
      name: Posture du mannequin de grappling
      description: Décrit la posture par défaut du mannequin, qui détermine les exercices
        et les techniques qu’il permet de travailler.
    grease_application:
      name: Application de la graisse
      description: Spécifie le composant principal du véhicule ou l’usage auquel la
        graisse est destinée.
    grease_consistency_grade_nlgi:
      name: Grade de consistance de la graisse (NLGI)
      description: Spécifie le numéro de consistance NLGI, qui indique la fermeté
        de la graisse, par exemple NLGI 2 pour une graisse polyvalente courante.
    grease_thickener_type:
      name: Type d’épaississant de la graisse
      description: Désigne le système d’épaississant ou de savon utilisé dans la formulation
        de la graisse.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Type de clapet antiretour du porte-vent de la grande cornemuse écossaise
      description: Spécifie le système de clapet antiretour utilisé dans le porte-vent.
    great_highland_bagpipes_drone_configuration:
      name: Configuration des bourdons de la grande cornemuse écossaise
      description: Spécifie les types de bourdons inclus dans l’ensemble.
    great_highland_bagpipes_mounting_material:
      name: Matériau des montures de la grande cornemuse écossaise
      description: Spécifie le matériau des montures décoratives de la cornemuse,
        par exemple le maillechort ou l’imitation ivoire.
    greens_maturity_stage:
      name: Stade de maturité des légumes verts
      description: Indique le stade de développement des légumes verts au moment de
        la récolte.
    greens_preparation_state:
      name: État de préparation des légumes à feuilles
      description: Décrit la manière dont les légumes à feuilles sont préparés ou
        conditionnés, selon qu’ils sont prélavés, coupés ou prêts à consommer.
    grenade_effect_type:
      name: Type d’effet de grenade
      description: Indique l’effet fonctionnel principal produit par la grenade de
        paintball après son activation, par exemple de la fumée, de la peinture ou
        un effet assourdissant.
    grid_unit:
      name: Unité de mesure de la grille
      description: Système de mesure principal imprimé sur le tapis, si celui-ci comporte
        une grille ou une échelle.
    grille_emblem_provision:
      name: Prédisposition pour emblème de calandre
      description: Indique si la calandre supporte un emblème/badge d'origine et de
        quelle manière.
    grille_mounting_method:
      name: Méthode de fixation d'une grille
      description: Décrit le mode d’installation de la calandre sur le véhicule, par
        exemple par remplacement direct, par pièce rapportée ou par superposition,
        par boulonnage, par clipsage ou par encliquetage, avec ou sans perçage.
    grille_style:
      name: Style de grille
      description: Définit le style visuel ou la conception de la calandre du véhicule.
    grip_chalk_form:
      name: Forme de la magnésie
      description: Désigne la forme de la magnésie fournie ou utilisée avec le sac.
    grip_coverage:
      name: Zones d’adhérence
      description: Indique si la chaussette comporte des éléments d’adhérence en silicone
        ou caoutchoutés, et précise leur emplacement.
    grip_design:
      name: Conception des prises
      description: Décrit la configuration des poignées ou des ouvertures de la plaque,
        qui facilite le transport et permet une plus grande variété d’exercices.
    grip_enhancer_effect:
      name: Effet du produit d’aide à la préhension
      description: Décrit la principale caractéristique de performance du produit,
        par exemple l’absorption de l’humidité ou un fini à base de résine adhérente.
    grip_enhancer_form:
      name: Formulaire pour l'amélioration de la prise
      description: Désigne la forme ou le format du produit d’aide à la préhension,
        afin que les sportifs choisissent le mode d’application adapté.
    grip_features:
      name: Caractéristiques de la prise
      description: Indique les éléments de prise ou les poignées intégrés destinés
        à améliorer la tenue, le confort ou le contrôle pendant le jeu.
    grip_material:
      name: Matériau de la surface d’adhérence
      description: Désigne le matériau de la surface d’adhérence du pantalon.
    grip_shape:
      name: Forme du grip
      description: Décrit la forme en coupe ou le style du grip, un critère particulièrement
        pertinent pour les grips de putter.
    grip_surface_type:
      name: Type de surface de prise
      description: Décrit le relief ou la surface d’adhérence de la pédale, qui détermine
        l’accroche et les sensations.
    grip_tackiness_level:
      name: Niveau d’adhérence du grip
      description: Évalue le caractère plus ou moins collant de la surface du grip,
        afin de choisir entre un toucher sec et un contrôle très adhérent.
    grip_tape_form:
      name: Formulaire pour le ruban antidérapant
      description: Indique la forme de présentation du ruban d’adhérence, par exemple
        une feuille, un rouleau ou un kit à pulvériser.
    grip_wax_form:
      name: Forme de la cire d’adhérence
      description: Classe la cire d’adhérence selon la forme sous laquelle elle est
        vendue.
    gripper_coverage:
      name: Couverture des pinces
      description: Spécifie le type d’élément antidérapant présent sur la chaussure,
        en indiquant l’étendue de la surface couverte et si cet élément est amovible.
    grommet_application_material:
      name: Matériau de pose des œillets
      description: Désigne les principaux matériaux dans lesquels les œillets sont
        destinés à être posés, par exemple du tissu, du cuir, du vinyle, une bâche
        ou de la toile.
    grommet_duty_rating:
      name: Classe d’usage des œillets
      description: Indique la classe de résistance ou d’usage prévue pour l’œillet.
    grommet_style:
      name: Style d’œillet
      description: Style de construction du jeu d’œillets, selon son mode d’assemblage
        et d’utilisation.
    grooming_glove_texture_type:
      name: Type de texture du gant de toilettage
      description: Désigne la texture de surface principale utilisée pour le toilettage,
        selon l’usage prévu, par exemple le frottage, le lustrage ou le lavage.
    groove_orientation:
      name: Orientation des rainures
      description: Décrit la direction ou la disposition des rainures ou des reliefs
        sur l’instrument.
    groove_sampler_onboard_effects:
      name: Effets intégrés de l’échantillonneur de groove
      description: Indique les catégories de traitement d’effets intégrées disponibles
        sur l’échantillonneur de groove (insertion ou master), par exemple la réverbération,
        le délai, la compression, la distorsion, l’égalisation ou le filtrage.
    groove_sampler_storage_expansion_type:
      name: Type d’extension de stockage de l’échantillonneur de groove
      description: Spécifie les options de stockage amovible ou extensible compatibles
        avec l’échantillonneur de groove.
    ground_attachment_method:
      name: Méthode de fixation au sol
      description: Décrit le mode de fixation de l’arceau de passe à la surface de
        jeu, qui conditionne la stabilité et la compatibilité avec cette surface.
    groupset_components_included:
      name: Groupset components included
      description: Énumère les composants de transmission inclus dans le groupe, afin
        que les clients comprennent le contenu du lot.
    gt_racing_class:
      name: Classe de course GT
      description: Spécifie la catégorie ou la classe GT pour laquelle la voiture
        est construite ou homologuée.
    guard_construction_type:
      name: Type de construction de la protection
      description: Indique si la protection est une coque rigide, un insert de protection
        souple ou un modèle de type manchon ou sangle.
    guard_size_measurement_basis:
      name: Mesure de référence pour la taille de la protection
      description: Mesure sur laquelle repose le choix de la taille, par exemple le
        tour du coude, le tour du poignet ou le tour de l’avant-bras.
    guard_style:
      name: Style de protection
      description: Classe les protège-lames de patin selon leur construction ou leur
        type, pour distinguer rapidement les modèles rigides de marche, les housses
        souples, les modèles à ressort et les autres conceptions.
    guava_flesh_color:
      name: Couleur de la chair de la goyave
      description: Indique la couleur de la chair de la goyave.
    guava_variety:
      name: Variété de goyave
      description: Désigne le cultivar précis ou la variété commerciale de la goyave
        vendue, par exemple la goyave-pomme, la Mexican Cream, la goyave thaïe, rose,
        sans pépins ou blanche.
    guide_material:
      name: Matériel de référence
      description: Matériau utilisé pour les anneaux de ligne ou les inserts de la
        canne.
    guide_type:
      name: Type de guide
      description: Spécifie le type d’anneaux installés sur une canne à pêche, par
        exemple des anneaux monopattes, à rouleaux ou serpentiformes.
    guideline_markings:
      name: Repères d’alignement
      description: Type de repères visuels d’alignement imprimés ou incrustés sur
        la surface du tapis de lancer pour faciliter les exercices.
    guiro_scraper_material:
      name: Matériau du grattoir de güiro
      description: Matériau du grattoir ou du battoir fourni ou recommandé avec le
        güiro.
    guiro_surface_style:
      name: Style de surface du güiro
      description: Décrit le motif ou la géométrie de la surface de jeu que l’on gratte
        pour produire le son.
    guitar_body_finish_type:
      name: Type de finition du corps de guitare
      description: Spécifie la finition utilisée sur le corps de la guitare.
    guitar_bridge_system_type:
      name: Type de système de chevalet de guitare
      description: Famille de conception du système chevalet-cordier, utilisée pour
        la compatibilité et la navigation.
    guitar_case_style:
      name: Style d’étui de guitare
      description: Spécifie le style général de protection ou de structure de l’étui
        ou de la housse souple de guitare.
    guitar_humidifier_placement:
      name: Emplacement de l’humidificateur de guitare
      description: Indique où l’humidificateur doit être utilisé ou placé par rapport
        à l’instrument ou à son environnement.
    guitar_pedal_i_o_configuration:
      name: Configuration des entrées et sorties de la pédale de guitare
      description: Indique si la pédale prend en charge un routage mono ou stéréo
        des entrées et des sorties.
    guitar_pedal_output_connector_type:
      name: Type de connecteur de sortie de la pédale de guitare
      description: Définit le type de connecteur de sortie audio utilisé par la pédale.
    guitar_slide_finish:
      name: Finition du bottleneck de guitare
      description: Finition du bottleneck au contact des cordes, avec un effet sur
        le toucher et le frottement.
    guitar_slide_style:
      name: Style de slide pour guitare
      description: Décrit le format du bottleneck de guitare ou de la barre de jeu,
        ainsi que la manière de le porter ou de l’utiliser.
    guitar_stand_type:
      name: Type de support de guitare
      description: Décrit le format principal du support de guitare, selon la manière
        dont il soutient ou range l’instrument.
    guitar_strap_attachment_type:
      name: Type de fixation de la sangle de guitare
      description: Décrit la manière dont la sangle se fixe à la guitare ou aux boutons
        de sangle, selon qu’elle utilise des embouts traditionnels ou un système à
        dégagement rapide.
    guitar_strap_end_material:
      name: Matériau des extrémités de la sangle de guitare
      description: Matériau utilisé pour les extrémités ou les pattes de la sangle,
        c’est-à-dire les parties qui se fixent aux boutons de sangle ou aux systèmes
        de verrouillage.
    guitar_strap_features:
      name: Caractéristiques de la sangle de guitare
      description: Caractéristiques fonctionnelles notables de la sangle de guitare,
        au-delà de la taille et du matériau de base, avec sélection multiple.
    guitar_string_coating:
      name: Revêtement des cordes de guitare
      description: Indique si les cordes possèdent un revêtement protecteur et, le
        cas échéant, le type de revêtement.
    guitar_string_gauge_type:
      name: Type de tirant des cordes de guitare
      description: Catégorie commerciale de tirant d’un jeu de cordes de guitare acoustique,
        par exemple très léger, léger ou moyen. Cette catégorie est souvent estimée
        d’après l’épaisseur de la corde de mi aigu ; les plages exactes de tirants
        peuvent varier selon les fabricants.
    guitar_string_set_gauge_category:
      name: Catégorie de tirant du jeu de cordes de guitare
      description: Familles commerciales courantes de tirants pour un jeu de cordes
        de guitare, généralement établies à partir de la corde de mi aigu, c’est-à-dire
        la première corde.
    guitar_string_winding_type:
      name: Type de filet des cordes de guitare
      description: Décrit le type de filet extérieur des cordes filées du jeu.
    guitar_tuning_peg_button_shape:
      name: Forme du bouton de mécanique de guitare
      description: Forme ou style du bouton de mécanique.
    guitar_tuning_peg_configuration:
      name: Configuration des mécaniques de guitare
      description: Disposition du jeu de mécaniques sur la tête.
    guitar_tuning_peg_mounting_style:
      name: Guitar tuning peg mounting style
      description: Mode de montage d’une mécanique sur la tête, avec le type de bague
        et le dispositif antirotation.
    guitar_tuning_peg_shaft_type:
      name: Type d’axe de mécanique de guitare
      description: Indique si le poteau de corde est plein ou fendu, ainsi que le
        mode de fixation de la corde.
    guitar_tuning_peg_style:
      name: Type de chevilles d'accordage de guitare
      description: Style de mécanique et format de montage utilisés sur la tête de
        l’instrument, par exemple une mécanique à engrenage fermé ou ouvert, à blocage
        ou à poteau fendu.
    gum_condition:
      name: État de la gomme
      description: État de la gomme au verso du timbre, par exemple sans charnière,
        avec charnière ou sans gomme.
    gun_action_type:
      name: Type de mécanisme de la carabine
      description: Type d’action mécanique utilisé pour le chargement et le tir, par
        exemple à verrou ou à levier.
    gun_operational_status:
      name: État de fonctionnement de l’arme à feu
      description: Indique si l’arme à feu de collection est neutralisée ou non apte
        au tir, ainsi que son mode de présentation.
    gun_type:
      name: Type d’arme à feu
      description: Désigne la forme générale de l’arme à feu ancienne.
    gusset_material:
      name: Matériau du gousset
      description: Précise le matériau de la doublure de l’entrejambe ou du gousset,
        qui conditionne la respirabilité, l’hygiène et le confort.
    gymnastics_discipline:
      name: Discipline de gymnastique
      description: Précise la discipline de gymnastique à laquelle le produit est
        destiné, par exemple la gymnastique artistique, rythmique ou acrobatique.
    hair_extension_texture:
      name: Texture des extensions capillaires
      description: Décrit le motif des boucles, des ondulations ou de la texture des
        mèches d’extension.
    hair_net_style:
      name: Style de filet à cheveux
      description: Désigne le style de conception ou de construction du filet à cheveux,
        par exemple une charlotte bouffante, une résille ou un couvre-chignon.
    hair_quality_grade:
      name: Catégorie de qualité des cheveux
      description: Désigne les appellations de qualité ou d’origine des cheveux utilisées
        dans le secteur.
    halter_style:
      name: Style de licol
      description: Désigne le style fonctionnel ou la conception du licol, par exemple
        en corde, de sécurité ou de présentation, pour choisir un modèle adapté à
        l’usage prévu.
    hammock_style:
      name: Style de hamac
      description: Décrit le style structurel ou la construction du hamac.
    hand_and_foot_coverage:
      name: Couverture des mains et des pieds
      description: Décrit les moufles et les chaussons intégrés ou amovibles qui couvrent
        les mains, les pieds ou les deux.
    hand_cymbal_set_configuration:
      name: Configuration d'un ensemble de cymbales à main
      description: Indique si le produit est vendu en paire assortie, comme une cymbale
        seule ou comme un ensemble plus large.
    hand_drum_head_material:
      name: Matériau de la peau du tambour à main
      description: Matériau de la peau du tambour (membrane) utilisée sur la darbouka.
    hand_exerciser_style:
      name: Style d’appareil d’exercice pour la main
      description: Classe l’appareil d’exercice pour la main selon son style général
        ou son mécanisme.
    hand_guard_backbone_material:
      name: Matériau de l’armature du protège-main
      description: Matériau de l’armature, lorsqu’elle est présente, qui détermine
        la résistance et le niveau de protection.
    hand_guard_coverage_style:
      name: Profil de couverture du protège-main
      description: Décrit l’étendue ou le profil du protège-main, qui détermine la
        protection contre le vent et contre les impacts.
    hand_guard_mounting_type:
      name: Type de montage des protège-mains
      description: Décrit le mode de fixation des protège-mains sur la moto, par exemple
        en bout de guidon avec collier intérieur ou uniquement par collier de serrage.
    hand_guard_set_configuration:
      name: Configuration du kit de protège-mains
      description: Indique si le produit est vendu en paire gauche-droite ou pour
        un seul côté.
    hand_guard_style:
      name: Style de protège-main
      description: Décrit le style ou le dessin de protection du protège-main, selon
        qu’il est fermé, ouvert, intégral, léger ou standard.
    hand_guard_weather_protection:
      name: Protection des protège-mains contre les intempéries
      description: Indique le niveau de protection contre les intempéries prévu pour
        les protège-mains.
    hand_paddle_strap_type:
      name: Type de sangle de la plaquette de natation
      description: Indique le type de sangle utilisé pour maintenir la plaquette sur
        la main, ou l’absence de sangle.
    hand_percussion_mount_attachment_mechanism:
      name: Mécanisme de fixation du support pour percussion à main
      description: Décrit le mode de fixation du support sur un pied, un rayonnage
        ou un autre élément matériel, par exemple par pince ou sur tige.
    hand_percussion_mounting_handling:
      name: Montage ou manipulation de la percussion à main
      description: Indique si l’instrument est généralement tenu en main, porté, monté,
        posé sur une table ou posé au sol.
    hand_percussion_pitch_type:
      name: Type de hauteur sonore de la percussion à main
      description: Indique si l’instrument produit une hauteur définie, accordable
        ou associée à des notes, ou une hauteur indéfinie.
    hand_percussion_playing_method:
      name: Méthode de jeu de la percussion à main
      description: Manière dont l’instrument est généralement joué pour produire le
        son, par exemple en le secouant ou en le grattant.
    hand_percussion_set_configuration:
      name: Configuration de l’ensemble de percussions à main
      description: Indique si le produit est un instrument seul, une paire assortie
        ou un ensemble de plusieurs pièces.
    hand_percussion_size_class:
      name: Classe de taille de la percussion à main
      description: Catégorie générale de taille de l’instrument, utilisée lorsqu’aucune
        mesure précise n’est fournie ou pour simplifier le filtrage.
    hand_sewing_needle_point_type:
      name: Type de pointe d’aiguille à coudre à la main
      description: Forme ou style de la pointe d’une aiguille à coudre à la main,
        utilisée pour traverser différents matériaux (par exemple des tissus tissés,
        des mailles, du cuir) ou des fils.
    hand_support_level:
      name: Niveau de soutien de la main
      description: Précise le degré de soutien ou de compression assuré par le gant,
        la bande ou la sangle.
    hand_support_size:
      name: Dimensions du repose-main
      description: Taille du gant, de la sangle ou de la bande déclarée par le fabricant
        (XS à XXL ou taille unique).
    handball_ball_type:
      name: Type de ballon de handball
      description: Indique la catégorie d’utilisation prévue du ballon de handball,
        par exemple le match, l’entraînement ou le handball de plage.
    handball_playing_surface:
      name: Surface de jeu du handball
      description: Indique la ou les surfaces de jeu pour lesquelles le ballon de
        handball est optimisé.
    handball_target_type:
      name: Type de cible de handball
      description: Définit le style ou la conception de la cible de tir destinée à
        l’entraînement au handball.
    handbrake_actuation_type:
      name: Type d’actionnement du frein à main
      description: Précise le mode d’actionnement du frein de stationnement.
    handbrake_orientation:
      name: Orientation du frein à main
      description: Indique si le frein à main est conçu pour la conduite à gauche,
        la conduite à droite ou une configuration universelle.
    handgun_grip_material:
      name: Matériau de la poignée de l’arme de poing
      description: Matériau principal de la poignée ou des plaquettes de l’arme de
        poing.
    handle_configuration:
      name: Configuration des poignées
      description: Décrit le style structurel de la poignée de wakeboard, par exemple
        simple, double, Deep-V ou T-wrap, selon le niveau du rider, les figures pratiquées
        ou le type de planche.
    handle_ergonomics:
      name: Ergonomie de la poignée
      description: Décrit les caractéristiques ergonomiques de la poignée prévues
        pour améliorer le confort et la maîtrise.
    handle_grip_material:
      name: Matériau de la poignée
      description: Précise le matériau de la surface de prise de la poignée, qui conditionne
        le confort et l’adhérence, notamment sur surface mouillée.
    handle_grip_type:
      name: Type de poignée
      description: Décrit le revêtement, le matériau ou le style de surface de la
        prise de poignée prévu pour améliorer le confort et la maîtrise.
    handle_shape:
      name: Forme de la poignée
      description: Forme en coupe ou profil de la poignée.
    handlebar_design:
      name: Conception du guidon
      description: Indique le type de guidon du stepper, par exemple aucun, fixe,
        réglable en hauteur, pliable ou avec poignées à bandes de résistance.
    handlebar_type:
      name: Type de guidon
      description: Désigne le style de guidon monté sur le vélo, qui conditionne la
        posture de conduite, la maîtrise et le confort.
    handslide_bore_type:
      name: Type de perce de la coulisse
      description: Indique si le trombone basse utilise une coulisse à perce simple
        ou à double perce.
    handwear_cuff_style:
      name: Style de poignet des articles pour les mains
      description: Décrit le style de construction du poignet ou de la manchette des
        gants ou des moufles, qui détermine la couvrance et l’ajustement.
    handwear_insulation_material:
      name: Matériau isolant pour les mains
      description: Désigne le matériau isolant ou le matériau de doublure utilisé
        à l’intérieur des gants ou des moufles.
    handwear_size:
      name: Taille des gants
      description: Indique la taille des gants ou des autres articles portés aux mains
        afin d’assurer un bon ajustement.
    hang_glider_design:
      name: Conception du deltaplane
      description: Classe le deltaplane selon son style structurel, par exemple à
        aile souple, à aile rigide ou à moteur.
    hanger_thread_size:
      name: Taille du filetage du support
      description: Indique la taille ou le standard du filetage utilisé pour fixer
        le support à des piques de pêche ou à des détecteurs de touche compatibles.
    hanging_suspension_method:
      name: Méthode de suspension
      description: Définit le matériel ou le système principal utilisé pour suspendre
        la balançoire, par exemple une corde, une chaîne ou un cadre de support.
    hardtop_finish_type:
      name: Type de finition du toit rigide
      description: Définit l’état de finition extérieure du toit rigide, par exemple
        apprêté ou peint, qui détermine s’il est prêt à être installé et son aspect.
    hardtop_shell_material:
      name: Matériau de la coque du toit rigide
      description: Définit le matériau principal de la coque rigide du toit rigide
        d’un véhicule, et non celui d’une éventuelle housse textile, par exemple la
        fibre de verre ou l’aluminium.
    hardtop_window_configuration:
      name: Configuration des fenêtres du toit rigide
      description: Décrit les fenêtres incluses avec le toit rigide et leur configuration.
    harmonica_comb_material:
      name: Matériau du peigne d'harmonica
      description: Matériau utilisé pour le peigne de l’harmonica (corps des chambres
        d’air).
    harmonica_cover_plate_finish:
      name: Finition des capots de l’harmonica
      description: Définit la finition ou le revêtement des capots de l’harmonica.
    harmonica_cover_plate_material:
      name: Matériau de la plaque de recouvrement de l'harmonica
      description: Matériau utilisé pour les capots extérieurs.
    harmonica_finish:
      name: Finition harmonica
      description: Finition de surface des capots ou du corps de l’harmonica.
    harmonica_included_accessories:
      name: Accessoires fournis avec l'harmonica
      description: Indique les accessoires inclus avec l’harmonica.
    harmonica_note_range:
      name: Registre de l’harmonica
      description: Classification du registre de l’instrument utilisée en contexte
        orchestral, par exemple basse, baryton ou ténor.
    harmonica_reed_plate_material:
      name: Matériau des plaques à anches de l’harmonica
      description: Matériau utilisé pour les plaques à anches, par exemple le laiton,
        l’acier inoxydable ou l’aluminium.
    harmonica_system_type:
      name: Système ou type d’harmonica
      description: Désigne le système ou le format d’harmonica orchestral, par exemple
        un harmonica d’accords, un harmonica basse, un harmonica baryton ou un Polyphonia.
    harmonica_tuning_system:
      name: Système d'accordage d'harmonica
      description: Définit la disposition ou le système d’accordage de l’harmonica,
        par exemple Richter, Solo ou l’accordage Orchestra.
    harness_shell_type:
      name: Type de coque du harnais
      description: Décrit la rigidité de la coque du harnais, par exemple souple,
        rigide ou hybride.
    harness_style:
      name: Style de harnais
      description: Définit le style structurel ou la conception du harnais, par exemple
        un modèle ceinture, culotte, de poitrine, gilet, ceinture de wing, boardshort
        ou hybride.
    harness_type:
      name: Type de mécanisme de harpe
      description: Classe le harnais d’escalade selon son style structurel, par exemple
        un cuissard, un harnais intégral ou un harnais de poitrine.
    harp_action_type:
      name: Harp action type
      description: Mécanisme principal utilisé sur la harpe pour modifier la hauteur
        des notes ou produire les altérations.
    harp_finish:
      name: Finition de la harpe
      description: Finition de surface du corps de la harpe, par exemple naturelle,
        teintée, peinte ou laquée..
    harp_included_accessories:
      name: Harpes et accessoires
      description: Énumère les accessoires inclus à l’achat de la harpe à pédales.
    harvest_method:
      name: Méthode de récolte
      description: Indique si le produit de la mer est issu de la pêche sauvage, de
        l’élevage ou d’une autre méthode.
    harvest_stage:
      name: Stade de récolte
      description: Précise le stade de croissance auquel la roquette a été récoltée,
        par exemple jeune pousse, petite feuille ou botte mature.
    hat_style:
      name: Style de chapeau
      description: Construction ou style du chapeau de fête, par exemple un chapeau
        conique, une couronne, un haut-de-forme ou une visière, pour rendre compte
        de son apparence générale.
    hazard_signal_mode:
      name: Mode de signalisation de détresse
      description: Motifs ou modes d’éclairage sélectionnables pour les signaux de
        détresse routiers à LED ou électroniques.
    head_configuration:
      name: Configuration de la tête
      description: Indique si la tête du piolet comporte une herminette, un marteau,
        les deux ou aucun des deux, car cette configuration détermine directement
        son usage sur glace et en terrain mixte.
    head_material:
      name: Matériau de la peau
      description: Matériau de la peau de frappe fournie avec le quinto.
    head_movement_type:
      name: Type de mouvement de la tête
      description: Possibilités de mouvement directionnel de la tête du bipied ou
        du bâton, par exemple une rotation panoramique, une inclinaison ou un dévers.
    head_side:
      name: Côté de la peau
      description: Indique si la peau de tambour est destinée au côté de frappe, au
        côté de résonance ou aux deux côtés.
    head_weight_style:
      name: Style de lestage de la tête
      description: Désigne la configuration du lestage à la tête de la mouche, qui
        détermine sa vitesse de descente et sa présentation.
    headband_embellishment:
      name: Éléments décoratifs du bandeau
      description: Désigne les éléments décoratifs fixés au bandeau, par exemple des
        nœuds, des perles, des cristaux ou des oreilles d’animal.
    headboard_style:
      name: Style de tête de lit
      description: Décrit le style ou la construction de la tête de lit fournie avec
        le lit.
    headgear_strap_configuration:
      name: Configuration des sangles du casque
      description: Indique le nombre de sangles utilisées pour maintenir le casque
        de lutte.
    headjoint_crown_style:
      name: Style de couronne de tête de flûte
      description: Définit le style ou la conception de la couronne de tête de flûte
        (bouchon d’extrémité), qui peut modifier l’esthétique, le poids et l’équilibre.
    headjoint_pitch_standard:
      name: Standard de diapason de la tête de flûte
      description: Indique le diapason prévu à la conception de la tête de flûte,
        par exemple A=440 ou A=442.
    headliner_product_form:
      name: Formulaire de produit phare
      description: Indique si le produit est un ensemble complet de garniture de pavillon
        moulée, un tissu de remplacement ou une pièce de réparation ou d’habillage.
    headrest_mount_attachment_method:
      name: Méthode de fixation du support d’appuie-tête
      description: Décrit la manière dont le support se fixe aux tiges de l’appuie-tête
        ou du siège.
    headrest_provision:
      name: Prédisposition pour appuie-tête
      description: Indique si des appuie-têtes sont inclus, si des points de montage
        pour appuie-tête sont présents, ou les deux.
    headset_standard:
      name: Standard du jeu de direction
      description: Type d’interface entre la douille de direction et le jeu de direction
        utilisée par le cadre.
    headstall_style:
      name: Style de têtière
      description: Classe la têtière selon sa conception structurelle ou sa configuration
        à oreille ou à frontal.
    headwear_intended_use:
      name: Usage prévu du couvre-chef
      description: Indique l’usage principal ou le contexte de port du turban, par
        exemple la perte de cheveux liée à une chimiothérapie, la natation ou une
        pratique religieuse.
    hearing_enhancer_style:
      name: Style d’amplificateur auditif
      description: Décrit le format de l’appareil, pour choisir un modèle supra-auriculaire,
        intra-auriculaire, serre-nuque ou d’un autre type.
    heart_rate_monitoring_method:
      name: Méthode de suivi de la fréquence cardiaque
      description: Désigne la manière dont l’appareil capte les données de fréquence
        cardiaque pendant l’entraînement.
    heart_rate_sensing_technology:
      name: Technologie de détection de la fréquence cardiaque
      description: Définit la méthode de mesure physiologique utilisée par le moniteur
        pour détecter la fréquence cardiaque, par exemple un ECG électrique ou une
        PPG optique.
    heart_rate_sensor_placement:
      name: Emplacement du capteur de fréquence cardiaque
      description: Indique où le capteur est porté ou positionné, sur le corps ou
        sur le vélo, car cet emplacement conditionne le confort et la précision de
        la mesure.
    heat_retention_technology:
      name: Technologie de rétention de chaleur
      description: Décrit toute technologie, tout revêtement ou tout matériau qui
        favorise la transpiration ou l’activité thermique des gaines d’entraînement,
        par exemple l’effet sauna du néoprène.
    heated_glass_feature:
      name: Fonction de vitrage chauffant
      description: Indique si le vitrage comporte des éléments électriques intégrés,
        comme une grille de dégivrage arrière, une antenne intégrée au verre, ou les
        deux.
    heater_control_actuation_method:
      name: Mode d’actionnement de la commande de chauffage
      description: Décrit la manière dont la commande de chauffage ou de CVC actionne
        le boîtier CVC du véhicule, par exemple par câble, par dépression ou par signal
        électronique.
    heater_control_electrical_connector_type:
      name: Type de connecteur électrique de la commande de chauffage
      description: Définit le type ou l’interface du connecteur électrique de l’ensemble
        de commande de chauffage, par exemple un faisceau court ou un connecteur enfichable.
    heating_technology:
      name: Technologie de chauffage
      description: Désigne le mécanisme principal de chauffage utilisé par le vaporisateur
        pour transformer la matière en vapeur.
    heel_shape:
      name: Forme du talon
      description: Définit le style géométrique ou la silhouette du talon, afin de
        filtrer les produits selon l’aspect structurel recherché et les préférences
        de stabilité (p. ex., talon aiguille ou talon bloc).
    helicopter_mission_type:
      name: Type de mission de l’hélicoptère
      description: Usage ou rôle principal prévu pour l’hélicoptère.
    helicopter_rotor_configuration:
      name: Configuration des rotors de l’hélicoptère
      description: Décrit l’agencement du système de rotors de l’hélicoptère (rotor
        principal et rotor de queue), par exemple un rotor principal avec rotor de
        queue, des rotors coaxiaux, des rotors en tandem ou des rotors entrecroisés.
    helmet_accessory_type:
      name: Type d'accessoire pour casque
      description: Désigne le type précis de pièce ou d’accessoire de casque de vélo
        pour que les acheteurs trouvent immédiatement l’article adapté.
    helmet_audio_connector_type:
      name: Type de connecteur audio du casque
      description: Définit le type de connecteur audio aéronautique utilisé par le
        câble de communication du casque, s’il est présent.
    helmet_communication_system_readiness:
      name: Prédisposition du casque pour système de communication
      description: Indique si le casque est prévu pour recevoir un système de communication
        intercom ou Bluetooth.
    helmet_construction_type:
      name: Type de construction du casque
      description: Décrit le style de construction de la coque et de la doublure du
        casque (p. ex., mousse, coque rigide ou hybride).
    helmet_fit_head_shape:
      name: Ajustement du casque (forme de la tête)
      description: Profil d’ajustement interne prévu pour différentes formes de tête.
    helmet_interior_liner_type:
      name: Type de doublure intérieure du casque
      description: Type de doublure de confort, avec indication de son caractère amovible
        ou lavable.
    helmet_liner_material:
      name: Matériau de la doublure du casque
      description: Définit le matériau de la doublure intérieure ou du rembourrage
        qui apporte du confort et absorbe les chocs.
    helmet_retention_closure_type:
      name: Type de fermeture du système de maintien du casque
      description: Définit le mécanisme de fermeture ou de maintien de la jugulaire
        du casque (p. ex., double anneau en D ou boucle micrométrique à cliquet).
    helmet_safety_certification:
      name: Certification de sécurité du casque
      description: Énumère les normes ou les certifications de sécurité auxquelles
        le casque est conforme.
    helmet_safety_certification_standard:
      name: Norme de certification de sécurité des casques
      description: Normes de sécurité ou d’homologation auxquelles le casque de moto
        est certifié conforme.
    helmet_shell_material:
      name: Matériau de la coque du casque
      description: Matériau principal ou type de construction de la coque extérieure
        du casque.
    helmet_size_system:
      name: Système de taille du casque
      description: Système de tailles utilisé pour exprimer la taille du casque.
    helmet_sun_visor_type:
      name: Type de visière solaire du casque
      description: Indique si le casque comprend une visière solaire interne rabattable,
        un écran extérieur teinté, les deux ou aucun des deux.
    helmet_vehicle_fit:
      name: Adéquation du casque au véhicule
      description: Type de véhicule ou d’usage de conduite auquel le casque est destiné.
    helmet_ventilation_adjustability:
      name: Réglage de la ventilation du casque
      description: Décrit la manière dont le pilote peut régler la ventilation du
        casque.
    helmet_ventilation_configuration:
      name: Configuration de la ventilation du casque
      description: Décrit l’agencement et les possibilités de réglage des aérations
        du casque (p. ex., aération de mentonnière, aérations frontales ou d’admission,
        aérations refermables).
    helmet_visor_peak_adjustability:
      name: Réglage de la visière ou du pic du casque
      description: Indique si la visière tout-terrain du casque est réglable, amovible
        ou les deux.
    helmet_visor_shield_optical_features:
      name: Caractéristiques optiques de la visière du casque (écran)
      description: Caractéristiques optiques et de compatibilité de l’écran facial
        principal ou de la visière principale.
    helmet_visor_shield_type:
      name: Type de visière ou d’écran du casque
      description: Configuration principale de l’écran facial ou de la visière qui
        accompagne le casque.
    hem_style:
      name: Style d'ourlet
      description: Désigne le style de finition du bas de jambe, qui marque fortement
        l’aspect du vêtement (p. ex., net, roulé ou brut).
    hemisphere_compatibility:
      name: Compatibilité avec l’hémisphère
      description: Indique l’hémisphère pour lequel la carte du ciel est conçue, selon
        les constellations visibles.
    hemline_style:
      name: Style d’ourlet
      description: Définit la coupe ou la conception du bord inférieur de la robe.
    herbal_infusion_function:
      name: Fonction de l’infusion aux plantes
      description: Indique le principal bénéfice fonctionnel ou de bien-être mis en
        avant pour l’infusion.
    hex_size:
      name: Taille hexagonale
      description: Taille hexagonale de clé requise pour installer ou retirer la bougie
        de préchauffage.
    hi_hat_pair_type:
      name: Type de paire de charleston
      description: Indique si la fiche concerne une paire assortie supérieure et inférieure
        ou un composant de cymbale individuel.
    hi_hat_sound_character:
      name: Caractéristiques sonores du charleston
      description: Décrit le profil sonore global pour permettre aux acheteurs de
        filtrer les produits selon le son recherché.
    high_visibility_class:
      name: Cours de haute visibilité
      description: Définit le niveau de classification de visibilité ANSI/ISEA 107
        du vêtement.
    highback_style:
      name: Style de highback
      description: Décrit le style ou la conception structurelle du highback, qui
        conditionne les caractéristiques de glisse.
    hitch_ball_diameter:
      name: Diamètre de la boule d’attelage
      description: Diamètre de la tête de la boule d’attelage (sphère) qui s’accouple
        avec un coupleur de remorque (p. ex., 1 7/8 po, 2 po, 2 5/16 po ou 50 mm).
    hitch_ball_mounting_style:
      name: Style de montage de la boule d’attelage
      description: Indique si la boule d’attelage est un modèle standard monté par
        écrou, un modèle fixe ou pressé pour certaines têtes d’attelage, ou un modèle
        avec quincaillerie intégrée.
    hobby_horse_handle_type:
      name: Type de poignée du cheval-bâton
      description: Décrit la construction de la prise ou de la poignée utilisée pour
        tenir ou diriger le cheval-bâton.
    hobby_horse_sound_features:
      name: Fonctions sonores du cheval-bâton
      description: Indique si le cheval-bâton comporte des effets sonores et, le cas
        échéant, de quel type.
    hockey_goal_type:
      name: Type de but de hockey
      description: Définit le style ou l’usage prévu du but de hockey (p. ex., réglementaire
        sur glace, de rue ou mini).
    hockey_size_category:
      name: Catégorie de taille au hockey
      description: Désigne le segment de taille standardisé de l’équipement auquel
        la pièce est adaptée (Jeune, Junior, Intermédiaire ou Senior).
    hockey_size_segment:
      name: Catégorie de taille pour le hockey
      description: Définit la catégorie de taille standardisée de l’équipement de
        hockey, qui détermine les dimensions générales des protections et leur ajustement.
    hold_surface_texture:
      name: Texture de la surface de préhension
      description: Décrit la rugosité ou la texture au toucher de la surface de prise.
    home_decor_sewing_pattern_project_type:
      name: Type de projet de patron de couture pour la décoration intérieure
      description: Désigne le type d’article de décoration intérieure que le patron
        de couture permet de réaliser (p. ex., une housse de coussin, un rideau ou
        un chemin de table).
    homologation_rule_set:
      name: Homologation ou règlement applicable
      description: Indique l’organisme d’homologation ou le règlement auquel la voiture
        est conforme, le cas échéant.
    honey_form:
      name: Forme du miel
      description: Décrit la forme ou la présentation du miel.
    honey_processing_method:
      name: Procédé de transformation du miel
      description: Indique le traitement ou le procédé de transformation appliqué
        au miel avant le conditionnement.
    honey_variety:
      name: Variété de miel
      description: Désigne l’origine botanique ou florale du miel, monoflorale ou
        polyflorale, qui détermine directement son goût, sa couleur et son prix.
    hood_configuration:
      name: Configuration du capot
      description: Décrit la conception de la capuche et ses possibilités de réglage.
    hood_design:
      name: Conception du capot
      description: Indique la présence et le style de la capuche sur le vêtement.
    hood_style:
      name: Style de capuche
      description: Indique si le vêtement comporte une capuche et, le cas échéant,
        son style.
    hood_type:
      name: Type de capuche
      description: Indique les caractéristiques particulières de conception de la
        capuche du vêtement.
    hook_and_eye_size_hook_number:
      name: Taille du crochet et de l’œillet (numéro de crochet)
      description: Système normalisé de taille ou de numérotation du crochet et de
        l’œillet, indiqué sur l’emballage le cas échéant pour en préciser la taille
        globale.
    hook_and_loop_fastener_duty_rating:
      name: Classe d’usage de la fermeture autoagrippante
      description: Indique le niveau de résistance ou d’usage prévu de la fermeture
        autoagrippante.
    hook_and_loop_fastener_format:
      name: Format de la fermeture autoagrippante
      description: Décrit la forme ou le format de conditionnement du produit autoagrippant
        (p. ex., rouleau ou ruban, pastilles ou bandes).
    hook_and_loop_fastener_side:
      name: Côté velcro
      description: Indique si le produit comprend uniquement le côté crochet, uniquement
        le côté boucle ou les deux côtés.
    hook_coating_finish:
      name: Revêtement/finition des crochets
      description: Traitement de surface ou placage appliqué à l’hameçon pour résister
        à la corrosion, le rendre plus discret ou lui donner une couleur (p. ex.,
        nickel noir ou étain brillant).
    hook_configuration:
      name: Configuration des crochets
      description: Décrit la présence et le style des crochets fournis avec le leurre.
    hook_eye_style:
      name: Style d'œillet
      description: Définit la forme ou l’orientation de l’œillet de l’hameçon, qui
        détermine la manière de l’attacher.
    hook_eye_type:
      name: Type d'œillet
      description: Définit la conception de l’œillet de l’hameçon, qui oriente le
        choix du nœud et du montage.
    hook_loop_format:
      name: Format de la fermeture autoagrippante
      description: Décrit la forme de présentation de la fermeture autoagrippante
        à coudre.
    hook_loop_side:
      name: Côté velcro
      description: Indique si le produit correspond au côté crochet, au côté boucle
        ou à un ensemble autoagrippant assorti.
    hook_material:
      name: Matériau du crochet
      description: Désigne le matériau utilisé pour le crochet ou la tête de la gaffe,
        déterminant pour la solidité et la résistance à la corrosion en eau salée.
    hook_organizer_style:
      name: Style d’organiseur de crochets
      description: Style ou format de l’organiseur de crochets, utilisé pour parcourir
        et filtrer les produits par type d’organiseur (p. ex., étui, rouleau ou pochette).
    hook_point_configuration:
      name: Configuration de la pointe de l'hameçon
      description: Indique si l’hameçon comporte deux pointes (double) ou trois pointes
        (triple).
    hook_point_type:
      name: Type de pointe d’hameçon
      description: Décrit l’affûtage ou la forme de la pointe d’un hameçon de pêche,
        qui détermine la pénétration et la tenue.
    hook_shank_length:
      name: Longueur de la hampe d’hameçon
      description: Indique la classification relative de la longueur de la hampe d’hameçon
        pour faciliter la comparaison visuelle et fonctionnelle (p. ex., courte ou
        longue).
    hooks_eyes_attachment_method:
      name: Méthode de fixation des crochets et des œillets
      description: Manière dont les crochets et les œillets sont fixés au vêtement
        ou au projet.
    hop_up_type:
      name: Type de hop-up
      description: Définit le système hop-up utilisé pour imprimer une rotation arrière
        aux billes BB et améliorer leur portée et leur précision.
    horse_blanket_type:
      name: Type de couverture pour cheval
      description: Définit le style principal ou l’usage prévu de la couverture ou
        de la chemise pour cheval.
    horse_brush_type:
      name: Type de brosse pour chevaux
      description: Classe la brosse selon le type de pansage ou l’usage prévu, afin
        que les clients puissent filtrer les produits sans fragmenter la hiérarchie
        des catégories.
    horse_care_purpose:
      name: Finalité des soins pour cheval
      description: Fonction principale du produit dans le soin du cheval, pour les
        besoins liés à la santé, au pansage ou à l’entretien courant.
    horse_feed_stage:
      name: Stade nutritionnel du cheval
      description: Indique le stade de vie ou l’état physiologique du cheval pour
        lequel l’aliment est formulé.
    horse_groomer_type:
      name: Type d’outil de pansage pour cheval
      description: Classe l’outil de pansage selon son style, afin que les acheteurs
        trouvent rapidement l’outil précis dont ils ont besoin.
    horse_leg_protection_type:
      name: Type de protection des membres du cheval
      description: Classe la guêtre, la bande ou le bandage pour cheval selon son
        style précis ou sa fonction.
    horse_model_breed:
      name: Race du modèle de cheval
      description: Indique la race de cheval représentée par le modèle réduit, le
        cas échéant.
    hosiery_toe_style:
      name: Style de pointe de l’article de bonneterie
      description: Définit la construction de la pointe de l’article de bonneterie,
        dont dépendent la durabilité et la compatibilité avec les chaussures ouvertes.
    hot_air_balloon_basket_type:
      name: Type de nacelle de montgolfière
      description: Définit la configuration ou le style principal de la nacelle utilisée
        pour l’embarquement et l’exploitation prévue (p. ex., sportive standard, commerciale
        haute capacité, compartimentée ou accessible par porte).
    hot_air_balloon_burner_type:
      name: Type de brûleur pour montgolfière
      description: Type ou configuration du système de brûleur installé sur la montgolfière.
    hot_air_balloon_envelope_material:
      name: Matériau de l’enveloppe de la montgolfière
      description: Tissu ou matériau principal utilisé pour l’enveloppe de la montgolfière
        (voilure).
    hotfix_application_tool:
      name: Outil d’application thermocollante
      description: Outil ou source de chaleur recommandé pour poser des strass thermocollants.
    hub_axle_type:
      name: Type d’axe de moyeu
      description: Désigne l’interface d’axe ou le système de maintien pour lequel
        le moyeu est conçu (p. ex., blocage rapide, axe traversant, etc.).
    hub_motor_type:
      name: Type de moteur de moyeu
      description: Décrit le style de construction du moteur de moyeu (p. ex., à engrenages,
        à entraînement direct, à balais ou sans balais), afin d’informer les acheteurs
        sur le couple, le poids et le rendement.
    hula_hoop_construction_type:
      name: Type de construction du cerceau de hula hoop
      description: Décrit la manière dont le cerceau est construit ou assemblé.
    hula_hoop_features:
      name: Caractéristiques du hula hoop
      description: Met en avant les caractéristiques fonctionnelles ou esthétiques
        notables du cerceau.
    hull_design:
      name: Conception de la coque
      description: Décrit la forme de la coque, qui conditionne les performances et
        la maniabilité.
    hull_type:
      name: Type de coque
      description: Décrit la forme de la coque, qui détermine les performances et
        la stabilité.
    humidifier_refill_medium_type:
      name: Type de support de recharge de l’humidificateur
      description: Désigne le support de recharge qui retient l’humidité dans l’humidificateur
        d’étui, c’est-à-dire l’élément à humidifier ou à remplacer.
    humidifier_refill_method:
      name: Méthode de recharge de l’humidificateur
      description: Décrit la manière dont l’humidificateur est réhumidifié ou remplacé.
    humidifying_medium:
      name: Support humidifiant
      description: Désigne l’élément ou le support humidifiant utilisé par le produit,
        c’est-à-dire ce qui est humidifié ou activé.
    hummus_base_ingredient:
      name: Ingrédient de base du houmous
      description: Désigne la légumineuse ou le légume principal utilisé comme base
        du houmous.
    hunting_call_type:
      name: Type d’appeau de chasse
      description: Classe l’appeau selon son style de fonctionnement ou son mécanisme
        principal, afin que les chasseurs choisissent rapidement le format adapté
        à leurs besoins et à leur niveau (p. ex., à bouche, électronique ou à boîte).
    hunting_dog_collar_function:
      name: Fonction du collier pour chien de chasse
      description: Classe le collier selon son style fonctionnel ou son usage principal,
        afin de filtrer les produits par fonction (p. ex., suivi, dressage, visibilité
        ou usage standard).
    hvac_control_functions:
      name: Fonctions de commande des systèmes CVC
      description: Indique les fonctions de CVC, de dégivrage ou de débit d’air commandées
        par l’unité (mécaniques ou électroniques).
    hybrid_drivetrain_configuration:
      name: Configuration de la chaîne cinématique hybride
      description: Indique l’architecture du système hybride rechargeable qui décrit
        comment les moteurs électriques et le moteur thermique assurent la propulsion.
    hybrid_system_type:
      name: Type de système hybride
      description: Classe l’architecture d’hybridation utilisée par le véhicule.
    hybrid_truck_cab_type:
      name: Type de cabine du camion hybride
      description: Définit la configuration de la cabine du camion, qui détermine
        le nombre de places assises et l’espace intérieur.
    hydration_bag_features:
      name: Caractéristiques du sac d’hydratation
      description: Met en évidence les caractéristiques notables de conception ou
        de fonction propres aux sacs d’hydratation.
    hydration_belt_features:
      name: Caractéristiques de la ceinture d'hydratation
      description: Énumère les fonctionnalités intégrées notables qui améliorent l’utilisation,
        la sécurité ou le confort pratique de la ceinture d’hydratation.
    hydration_bladder_compatibility:
      name: Compatibilité avec une poche d’hydratation
      description: Indique si le gilet comprend un système de poche d’hydratation
        ou s’il est compatible avec celui-ci.
    hydration_mouthpiece_style:
      name: Style d’embout buccal d’hydratation
      description: Définit la conception ou le style fonctionnel de l’embout buccal
        ou de la valve d’un système d’hydratation, afin de choisir l’interface de
        boisson souhaitée et de vérifier la compatibilité.
    hydration_pack_style:
      name: Style de sac d’hydratation
      description: Définit le style structurel du sac d’hydratation, afin de filtrer
        les produits selon l’ajustement et l’usage prévu (p. ex., sac à dos ou gilet).
    hydration_system_insulation:
      name: Isolation du système d’hydratation
      description: Indique si le réservoir, le tube d’hydratation ou les deux sont
        isolés afin de maintenir la température du liquide par temps chaud ou froid.
    hydration_valve_type:
      name: Type de valve d’hydratation
      description: Désigne le style de valve ou d’embout fourni avec le système d’hydratation
        ou la bouteille, notamment les modèles à mordre et les embouts à haut débit.
    hydraulic_fluid_type:
      name: Type de liquide hydraulique
      description: Définit le type de liquide de frein que le levier de frein hydraulique
        de vélo est conçu pour utiliser. Cette information est essentielle pour l’entretien
        et la sécurité.
    hydrogenation_level:
      name: Degré d’hydrogénation
      description: Indique si la matière grasse est non hydrogénée, partiellement
        hydrogénée ou entièrement hydrogénée, ce qui modifie sa teneur en gras trans
        et ses performances en pâtisserie.
    hydrophobicity_level:
      name: Niveau d'hydrophobie
      description: Indique le niveau de performance annoncé par le produit pour l’effet
        perlant ou l’écoulement de l’eau en nappe.
    ice_cream_format:
      name: Format de crème glacée
      description: Décrit la forme ou la présentation du produit de crème glacée (p.
        ex., pot, barre ou mochi).
    ice_skate_sharpener_type:
      name: Type d’aiguiseur pour patins à glace
      description: Classe l’aiguiseur selon sa conception ou son format général (p.
        ex., pierre à main, machine électrique, gabarit, etc.).
    ice_temperature_suitability:
      name: Adéquation à la température de la glace
      description: Indique la plage de température de glace pour laquelle la cire
        de crosse de hockey est formulée, ce qui conditionne les performances et les
        propriétés antineige.
    icing_sugar_variety:
      name: Variété de sucre glace
      description: Classe le sucre glace selon sa formulation ou son type fonctionnel
        (p. ex., fondant, neige décor non fondante, coloré ou aromatisé).
    ignition_coil_configuration:
      name: Configuration de la bobine d’allumage
      description: Définit le format de la bobine d’allumage (p. ex., bobine simple
        ou bobine crayon, bloc de bobines multitours selon le nombre de cylindres,
        rail ou cassette de bobines, ou modèle de type distributeur).
    ignition_lead_compliance_standard:
      name: Standard de conformité du fil d’allumage
      description: Norme ou certification officielle du secteur à laquelle le ou les
        fils d’allumage sont conformes selon le fabricant (p. ex., SAE J2031 ou ISO
        3808).
    ignition_lead_insulation_material:
      name: Matériau isolant du fil d’allumage
      description: Matériau principal de l’isolant ou de la gaine du fil d’allumage
        (isolation extérieure du câble).
    ignition_lead_set_type:
      name: Type de fil d’allumage
      description: Indique si le produit est un fil d’allumage seul ou un jeu complet,
        ainsi que l’usage prévu du jeu.
    ignition_lead_terminal_type:
      name: Type de borne du fil d’allumage
      description: Style de borne ou de connecteur utilisé aux extrémités du fil d’allumage
        (p. ex., borne de bougie et borne de bobine ou de distributeur).
    illumination_type:
      name: Type d’éclairage
      description: Indique si la balle est éclairée pour le jeu de nuit et de quelle
        manière (p. ex., lueur phosphorescente ou LED activée par l’impact).
    immobilizer_installation_type:
      name: Type d'installation de l'antidémarrage
      description: Indique comment l’antidémarrage est installé ou connecté au véhicule.
    immobilizer_unlock_method:
      name: Mode de déverrouillage de l’antidémarrage
      description: Définit la manière dont l’antidémarrage est activé, désactivé ou
        déverrouillé.
    impact_protection_certifications:
      name: Certifications de protection contre les impacts
      description: Nomme les normes de sécurité précises auxquelles la protection
        répond ou qu’elle dépasse.
    impact_protection_level:
      name: Niveau de protection contre les chocs
      description: Définit le niveau ou la technologie de protection contre les impacts
        assurée par la coquille de sport.
    impact_protection_rating:
      name: Classement de protection contre les impacts
      description: Définit le niveau certifié de protection contre les impacts selon
        les normes (p. ex., EN 1621-1 niveau 1 ou EN 14120 niveau 2), pour aider les
        motards à choisir une protection de niveau supérieur.
    impact_surface_material:
      name: Matériau de la surface d'impact
      description: Décrit le matériau principal de la surface d’impact ou de frappe,
        déterminant pour la sécurité et les sensations (p. ex., mousse ou plastique).
    incense_base_material:
      name: Matière de base de l’encens
      description: Matériau principal utilisé comme base ou liant pour fabriquer l’encens
        du kit (base en poudre).
    incense_making_method:
      name: Méthode de fabrication de l’encens
      description: Procédé de fabrication artisanale prévu par le kit.
    incense_tool_type:
      name: Type d’outil pour encens
      description: Définit le type d’outil de fabrication de l’encens que constitue
        ce produit (utilisé pour façonner, mesurer, presser, mélanger ou sécher l’encens).
    incline_adjustment_type:
      name: Type de réglage de l’inclinaison
      description: Décrit si l’inclinaison peut être modifiée pendant les entraînements
        et, le cas échéant, de quelle manière.
    included_accessories:
      name: Accessoires inclus
      description: Énumère les accessoires inclus, comme des têtes ou embouts de rechange,
        un étui de rangement, un câble de recharge ou un adaptateur secteur.
    included_case_type:
      name: Type de boîtier inclus
      description: Type d’étui de transport ou de rangement inclus avec le saxophone
        basse, le cas échéant.
    included_components:
      name: Composants inclus
      description: Énumère les éléments inclus dans l’emballage (utile pour les jeux
        d’outils et les lots).
    included_fastener_components:
      name: Composants de fixation inclus
      description: Indique si le produit comprend un ensemble de crochets et d’œillets,
        uniquement des crochets, uniquement des œillets ou un autre type de fermeture
        pour vêtement.
    included_hydration_vessel_type:
      name: Type de contenant d’hydratation inclus
      description: Désigne le style de contenant d’hydratation fourni avec la ceinture
        ou compatible avec celle-ci.
    included_items_woodwind_instrument:
      name: Éléments inclus (instrument à vent en bois)
      description: Énumère les éléments couramment inclus dans l’ensemble fourni avec
        le saxophone basse.
    included_materials:
      name: Matériel inclus
      description: Indique les composants inclus avec l’achat du patron (patron seul
        ou patron avec matériel).
    included_mounting_accessories:
      name: Accessoires de montage inclus
      description: Énumère les accessoires de montage ou de fixation inclus avec le
        haut-parleur.
    included_pump_type:
      name: Type de pompe incluse
      description: Désigne le type de pompe fournie avec le matelas gonflable ou intégrée
        à celui-ci.
    included_scraper_implement_type:
      name: Type d’accessoire de jeu inclus
      description: Indique les accessoires de jeu inclus avec l’instrument à racler
        (p. ex., bâton ou tige de grattage, brosse métallique).
    indicator_design:
      name: Forme de l’indicateur
      description: Classe l’indicateur de touche pour la pêche selon sa forme ou son
        style.
    indicator_functions_tracked:
      name: Éléments suivis par l’indicateur
      description: Énumère les métriques de jeu précises suivies par l’indicateur,
        comme les balles, les prises, les retraits, les manches, le nombre de lancers,
        les overs, les wickets, le score ou les downs.
    indoor_outdoor_use:
      name: Usage intérieur ou extérieur
      description: Indique si le jouet de bowling est destiné à une utilisation en
        intérieur, en extérieur ou les deux.
    inflatable_decoration_items_included:
      name: Éléments inclus avec la décoration gonflable
      description: Énumère les principaux accessoires inclus avec la décoration gonflable
        (p. ex., ventilateur de gonflage, piquets ou cordes d’arrimage).
    inflatable_decoration_type:
      name: Type de décoration gonflable
      description: Définit le type de décoration de fête gonflable, selon sa forme
        ou son format, pour faciliter la navigation et le filtrage.
    inflatable_raft_float_features:
      name: Caractéristiques du radeau ou de l’article flottant gonflable
      description: Caractéristiques fonctionnelles présentes sur le radeau ou l’article
        flottant gonflable.
    inflation_method_included:
      name: Mode de gonflage inclus
      description: Définit le type de solution de gonflage des pneus incluse avec
        le kit de réparation, le cas échéant.
    infused_scent:
      name: Parfum infusé
      description: Désigne les additifs parfumés ou aromatisants imprégnés dans la
        matière de l’appât.
    ingredient_base_type:
      name: Type de base d’ingrédient
      description: Désigne la base principale fournie pour la fermentation (p. ex.,
        concentré de jus de raisin, jus frais ou concentré de fruits).
    ingredient_physical_form:
      name: Forme de l’ingrédient
      description: Définit la forme sous laquelle l’ingrédient de parfum est fourni
        (pour la manipulation, le dosage et la formulation).
    ingredient_processing_method:
      name: Méthode de traitement des ingrédients
      description: Définit la principale technique de transformation appliquée à l’ingrédient
        (p. ex., lyophilisé, torréfié ou fermenté).
    ink_colors_included:
      name: Couleurs d’encre incluses
      description: Définit les couleurs d’encre incluses dans le ou les tampons encreurs
        du jeu.
    ink_pad_application_method:
      name: Mode d’application de l’encre du tampon
      description: Manière dont l’encre est distribuée ou utilisée à partir du tampon
        (p. ex., tampon encreur traditionnel, tampon applicateur ou tampon à pointe
        pinceau).
    ink_pad_permanence:
      name: Durabilité de l'encre
      description: Indique si l’encre imprimée au tampon est permanente, adaptée à
        une conservation durable, ou les deux (résistance à la décoloration et à l’eau
        après séchage).
    ink_pad_size:
      name: Taille du tampon encreur
      description: Taille ou format standardisé de la surface ou du boîtier du tampon
        encreur.
    ink_pad_special_effects:
      name: Effets spéciaux du tampon encreur
      description: Effets visuels ou fonctionnels spéciaux de l’encre lors de l’impression
        au tampon (p. ex., effet métallique ou pailleté).
    ink_permanence:
      name: Permanence de l’encre
      description: Indique si l’encre sumi sèche est destinée à être permanente ou
        adaptée à une conservation durable, ou au contraire lavable ou non permanente.
    ink_preparation_required:
      name: Préparation requise de l’encre
      description: Indique si l’encre sumi est prête à l’emploi ou si elle doit être
        diluée avec de l’eau ou broyée avant utilisation.
    inline_skate_brake_type:
      name: Type de frein des patins en ligne
      description: Définit la configuration du frein fourni avec les patins en ligne
        (p. ex., frein de talon amovible ou absence de frein).
    inner_tent_configuration:
      name: Configuration de la tente intérieure
      description: Définit la configuration ou le style de la tente intérieure (p.
        ex., insert complet, insert en maille ou doublure thermique).
    innerspring_coil_type:
      name: Type de ressort intérieur
      description: Définit le style de construction du système de ressorts intérieurs
        du matelas, qui détermine le soutien, l’isolation des mouvements et le prix.
    input_connector_type:
      name: Type de connecteur d'entrée
      description: Définit le type de connecteur d’entrée audio utilisé par la pédale
        (généralement jack TS 6,35 mm).
    input_valve_type:
      name: Type de valve d’entrée
      description: Indique le standard de valve présent sur la chambre à air ou la
        roue de vélo, à partir duquel l’adaptateur se connecte.
    insecticide_treatment:
      name: Traitement insecticide
      description: Indique si le filet a reçu un traitement insecticide en usine et,
        le cas échéant, le type de traitement utilisé pour renforcer la protection.
    insert_coverage_area:
      name: Étendue couverte par l’insert
      description: Définit la partie du pied que la semelle est conçue pour couvrir
        (p. ex., toute la longueur ou le talon uniquement).
    insert_length_type:
      name: Type de longueur d'insertion
      description: Indique la portion de la semelle intérieure couverte par le soutien
        de voûte plantaire.
    inside_message_type:
      name: Type de message intérieur
      description: Indique si la carte comporte un message préimprimé à l’intérieur
        et si ce message est personnalisable.
    insole_attachment_method:
      name: Méthode de fixation de la semelle intérieure
      description: Définit la manière dont le soutien de voûte plantaire reste en
        place dans la chaussure (p. ex., simplement inséré, adhésif, autoagrippant,
        etc.).
    insole_material:
      name: Matériau de la semelle intérieure
      description: Décrit le matériau de l’assise plantaire ou de la semelle intérieure
        sur laquelle repose le pied, qui détermine l’amorti et le maintien.
    installation_fabrication_level:
      name: Niveau d’adaptation requis pour l’installation
      description: Indique l’ampleur habituelle des travaux de fabrication sur mesure
        ou de modification requis pour installer le kit.
    installation_location:
      name: Emplacement d’installation
      description: Définit le point d’installation habituel du capteur de pression
        d’huile dans le circuit d’huile moteur (p. ex., orifice de galerie d’huile
        du bloc, boîtier de filtre, plaque sandwich ou montage sur conduite déportée).
    installation_method:
      name: Méthode d'installation
      description: Définit la manière dont le tapis ou la dalle est fixé ou posé au
        sol.
    instant_coffee_form:
      name: Forme du café instantané
      description: Décrit la forme sous laquelle le café instantané est fourni, qui
        peut modifier le mode de préparation et la durée de conservation.
    instep_coverage:
      name: Protection du cou-de-pied
      description: Indique si le produit protège uniquement le tibia ou à la fois
        le tibia et le cou-de-pied ou le pied.
    instruction_format:
      name: Format des instructions
      description: Format des instructions incluses avec le kit.
    instrument_cleaning_swab_form_factor:
      name: Format de l’écouvillon de nettoyage d’instrument
      description: Définit le style de l’écouvillon (p. ex., chiffon à tirer dans
        l’instrument ou système à tige et brosse), selon les préférences du musicien
        et les contraintes de l’instrument.
    instrument_dimensions_unit_context:
      name: Contexte des dimensions de l’instrument
      description: Précise à quoi correspondent les mesures de hauteur, de largeur
        et de longueur fournies (p. ex., instrument complet, longueur d’un seul tube
        ou hauteur du support).
    instrument_electronics_type:
      name: Type d’électronique de l’instrument
      description: Indique si le système de micro et de préampli de l’instrument est
        actif ou passif.
    instrument_key:
      name: Légende des instruments
      description: Définit la désignation de tonalité employée dans les catalogues
        pour les flûtes à bec (généralement do ou fa pour les modèles de grande taille).
    instrument_level:
      name: Niveau de l’instrument
      description: Niveau de musicien visé par l’offre d’instrument.
    instrument_part_mounting_method:
      name: Mode de montage d’une pièce d’instrument
      description: Définit la manière dont la pièce se fixe ou s’installe (p. ex.,
        par serrage, par adhésif ou par vissage).
    instrument_parts_included:
      name: Pièces d’instrument incluses
      description: Énumère les principaux composants ou pièces inclus dans la boîte
        d’une clarinette en la.
    instrument_playing_technique:
      name: Technique de jeu de l’instrument
      description: Manière dont l’instrument est généralement joué ou actionné (p.
        ex., secoué, frappé ou entrechoqué).
    instrument_size_class:
      name: Classe de taille de l’instrument
      description: Taille générale de l’instrument, exprimée sous forme de catégorie
        facile à comprendre plutôt qu’en dimensions exactes.
    insulation_fill_material:
      name: Matériau de remplissage isolant
      description: Désigne le matériau principal utilisé pour isoler la veste ou le
        gilet.
    integrated_bottom_type:
      name: Type à fond intégré
      description: Indique si le vêtement intègre une culotte, un short, un justaucorps
        ou un élément similaire, pour assurer la couvrance pendant les mouvements.
    integrated_charging_options:
      name: Options de recharge intégrées
      description: Énumère les interfaces intégrées d’alimentation ou de recharge
        disponibles sur la table de chevet.
    integrated_furniture_function:
      name: Fonction de mobilier intégrée
      description: Désigne les éléments de mobilier supplémentaires intégrés au lit
        mural ou au cadre (p. ex., bureau, canapé ou étagères).
    integrated_locking:
      name: Verrouillage intégré
      description: Indique si le porte-vélos comprend un antivol intégré pour le verrouiller
        au véhicule, pour y verrouiller le vélo, ou les deux.
    integrated_power_options:
      name: Options d’alimentation intégrées
      description: Indique le type de fonctions d’alimentation ou de recharge intégrées
        que propose la coiffeuse.
    integrated_storage_features:
      name: Caractéristiques de rangement intégrées
      description: Désigne les rangements ou accessoires supplémentaires que le râtelier
        à queues de billard comporte en plus des emplacements pour les queues.
    integrated_tool_functions:
      name: Fonctions d’outil intégrées
      description: Fonctions d’outil supplémentaires intégrées au levier (p. ex.,
        crochet à rayon, démonte-obus de valve ou pousse-talon).
    intended_board_type:
      name: Type de planche prévu
      description: Définit le style de kiteboard pour lequel l’aileron est conçu (p.
        ex., twin tip, surf directionnel ou hydrofoil).
    intended_consumption:
      name: Mode de consommation prévu
      description: Précise le mode de consommation prévu du produit, en indiquant
        s’il peut être mangé cru, s’il doit être cuit au four ou s’il est partiellement
        cuit.
    intended_craft:
      name: Activité artisanale prévue
      description: Contexte principal d’activité artisanale pour lequel le guide-fil
        est conçu.
    intended_culinary_use:
      name: Usage culinaire prévu
      description: Indique l’application culinaire principale de la sauce (p. ex.,
        trempage, cuisson ou glaçage).
    intended_handlebar_style:
      name: Type de guidon prévu
      description: Décrit le style de guidon ou d’usage auquel le levier est destiné
        (p. ex., cintre plat, cintre route ou aéro). Cette information précise rapidement
        la compatibilité sans imposer de sous-catégories supplémentaires.
    intended_player_role:
      name: Rôle prévu du joueur
      description: Définit le rôle sur le terrain auquel le casque est destiné (p.
        ex., receveur ou arbitre).
    intended_playing_surface:
      name: Surface de jeu prévue
      description: Surface prévue pour l’utilisation du palet, de la balle ou de l’anneau
        (p. ex., glace, asphalte, sol de gymnase ou glace synthétique).
    intended_repair_location:
      name: Emplacement de réparation prévu
      description: Indique la partie du pneu que le kit permet de réparer.
    intended_seating_position:
      name: Position d’assise prévue
      description: Définit la position d’assise du véhicule où la sangle de ceinture
        est destinée à être installée ou utilisée.
    intended_sewing_application:
      name: Usage de couture prévu
      description: Usage de couture auquel le fil est destiné (p. ex., couture générale
        de vêtements, matelassage ou ameublement).
    intended_technique:
      name: Technique prévue
      description: Technique de feutrage principale pour laquelle le support est conçu.
    intended_use:
      name: Usage prévu
      description: Contexte principal d’utilisation de l’instrument.
    intended_use_fleece_fabric:
      name: Usage prévu (tissu polaire)
      description: Projet ou application mis en avant pour le tissu polaire.
    intended_user:
      name: Utilisateur visé
      description: Indique à qui l’équipement de protection aéronautique est destiné.
    intended_yarn_form:
      name: Forme prévue du fil
      description: Définit la présentation du fil la mieux adaptée au bol à laine.
    interaction_mode:
      name: Mode d’interaction
      description: Méthode principale d’interaction qui déclenche les sons ou les
        activités.
    interactive_effects:
      name: Effets interactifs
      description: Désigne les effets interactifs électroniques ou mécaniques inclus
        avec un ensemble de jeu de cuisine.
    interfacing_application_area:
      name: Zone d’application de l’entoilage
      description: Désigne les zones courantes de couture ou d’ouvrage que l’entoilage
        est destiné à renforcer.
    interfacing_color_family:
      name: Famille de couleur de l’entoilage
      description: Indique la couleur de base généralement utilisée pour l’entoilage
        placé sous un tissu clair ou foncé.
    interfacing_selling_format:
      name: Format de vente de l’entoilage
      description: Décrit le format de vente de l’entoilage (p. ex., à la coupe, en
        pièces prédécoupées, en rouleaux ou en échantillons).
    interfacing_stiffness_level:
      name: Degré de rigidité de l’entoilage
      description: Décrit le degré de rigidité ou de tenue apporté par l’entoilage.
    interior_padding_type:
      name: Type de rembourrage intérieur
      description: Type de rembourrage intérieur ou d’éléments de calage utilisés
        dans l’étui pour protéger et organiser le contenu.
    interior_stall_configuration:
      name: Configuration intérieure des stalles
      description: Définit l’agencement intérieur prévu pour le transport d’animaux
        (orientation des stalles et type de compartiments).
    invitation_printing_coverage:
      name: Étendue d’impression de l’invitation
      description: Côté ou côtés imprimés de l’invitation (recto seul ou recto verso).
    iodization:
      name: Iodation
      description: Indique si de l’iode a été ajouté au sel et dans quelle mesure.
    iridescence_level:
      name: Degré d’iridescence
      description: Décrit l’intensité du reflet irisé, naturel ou traité, caractéristique
        des plumes de paon.
    irish_warpipe_set_configuration:
      name: Configuration de l’ensemble de cornemuse irlandaise
      description: Indique la configuration vendue pour la cornemuse irlandaise (instrument
        complet, pièces ou ensemble partiel).
    iron_on_applique_application_method:
      name: Mode d’application de l’appliqué thermocollant
      description: Définit la manière dont l’appliqué thermocollant doit être posé
        sur le support.
    ironing_center_features:
      name: Caractéristiques de la centrale de repassage
      description: Énumère les fonctions propres aux centrales de repassage qui les
        rendent plus faciles et plus pratiques à utiliser.
    jacket_breast_style:
      name: Type de boutonnage de la veste
      description: Indique si la veste de costume est droite ou croisée.
    jacket_vent_style:
      name: Style de fente de veste
      description: Indique le type de fente au dos de la veste de costume.
    jam_and_jelly_consistency:
      name: Consistance de la confiture ou de la gelée
      description: Décrit la texture de la préparation à tartiner et indique si elle
        contient des morceaux de fruit ou des graines.
    jaw_shape:
      name: Forme des mâchoires
      description: Décrit la géométrie des mâchoires ou de la pointe, qui détermine
        la précision et l’accès aux zones difficiles (p. ex., droites, coudées ou
        à bec long).
    jerky_form:
      name: Forme de la viande séchée
      description: Décrit la forme ou la découpe des morceaux de viande séchée (p.
        ex., lanières, bâtonnets ou bouchées).
    jersey_style:
      name: Type de maillot
      description: Spécifie le format ou le style de port des maillots de supporter.
    jew_harp_accessories_included:
      name: Accessoires pour guimbarde inclus
      description: Énumère les éléments fournis avec la guimbarde (p. ex., étui, pochette
        ou notice).
    jew_s_harp_frame_style:
      name: Type de cadre de la guimbarde
      description: Décrit le style de construction du cadre ou du corps de la guimbarde,
        qui détermine les sensations, la durabilité et l’ergonomie de jeu.
    jew_s_harp_tongue_profile:
      name: Profil de la languette de la guimbarde
      description: Décrit le profil ou la géométrie de la languette de la guimbarde
        (anche), qui conditionne la réponse de l’instrument et son timbre.
    jewelry_pieces_included:
      name: Bijoux inclus
      description: Énumère les pièces de bijouterie précises incluses dans l’ensemble,
        afin que les acheteurs sachent exactement quelles pièces ils achètent.
    jigsaw_puzzle_piece_shape:
      name: Forme des pièces de puzzle
      description: Style général de découpe ou de forme des pièces, avec le profil
        de leurs bords.
    jockstrap_design_features:
      name: Caractéristiques du suspensoir
      description: Recense les éléments de conception propres aux suspensoirs qui
        jouent sur leur fonction ou leur esthétique.
    juggling_club_construction_type:
      name: Type de construction de la massue de jonglage
      description: Définit le type général de construction d’une massue de jonglage
        (p. ex., moulée d’une seule pièce ou assemblée en plusieurs pièces), qui peut
        jouer sur la durabilité, les sensations et l’entretien.
    juggling_club_core_material:
      name: Matériau de l’âme de la massue de jonglage
      description: Matériau principal utilisé dans l’âme de la massue, distinct de
        l’enveloppe extérieure ou du ruban.
    juggling_prop_set_size:
      name: Taille de l’ensemble d’agrès de jonglage
      description: Nombre d’agrès principaux inclus dans l’ensemble (p. ex., ensemble
        de trois balles ou paire de poi).
    juggling_ring_edge_style:
      name: Profil du bord de l’anneau de jonglage
      description: Profil du bord de l’anneau, déterminant pour le confort de manipulation
        et la qualité du rattrapage.
    juice_form:
      name: Forme du jus
      description: Précise la forme ou le stade de transformation du produit (p. ex.,
        liquide non concentré, concentré ou poudre).
    juice_processing_method:
      name: Procédé de traitement du jus
      description: Précise la principale technique de transformation appliquée au
        jus ou à la boisson, qui a une incidence sur le goût, la conservation des
        nutriments et la durée de conservation.
    jump_rope_style:
      name: Type de corde à sauter
      description: Classe la corde ou le câble selon son style de construction, qui
        a une forte incidence sur l’usage prévu et les performances (p. ex., corde
        à perles, corde en tissu ou câble de vitesse).
    kale_variety:
      name: Variété de chou frisé
      description: Identifie le cultivar ou la variété précise de chou kale (p. ex.,
        frisé, Lacinato/Dinosaur ou rouge de Russie). Cette information aide les acheteurs
        à choisir selon le goût, la texture et l’usage culinaire.
    kaleidoscope_viewing_type:
      name: Type d’observation au kaléidoscope
      description: Indique le format d’observation ou le mode de fonctionnement du
        kaléidoscope (p. ex., tube classique à oculaire, téléidoscope à lentille,
        modèle à roue ou projection).
    kayak_construction_type:
      name: Type de construction du kayak
      description: Précise le mode de construction principal du kayak, par exemple
        à coque rigide ou gonflable.
    kayak_design_type:
      name: Type de kayak
      description: Classe le kayak selon l’usage principal visé par sa conception
        (p. ex., surfski, kayak freestyle ou kayak de randonnée).
    kayak_hull_design:
      name: Forme de la coque du kayak
      description: Identifie la forme principale de la coque, qui a une incidence
        sur le comportement du kayak en conditions de surf, notamment sur sa stabilité
        et sa maniabilité.
    kayak_storage_bag_type:
      name: Type de sac de rangement pour kayak
      description: Identifie le style ou le format du sac de rangement pour kayak,
        par exemple un sac étanche ou un sac pour pagaie.
    kayak_style:
      name: Type de kayak
      description: Précise le style principal de conception ou d’usage du kayak (p.
        ex., récréatif, de randonnée ou gonflable).
    keel_type:
      name: Type de quille
      description: Identifie la configuration de la quille du voilier.
    kettlebell_style:
      name: Type de kettlebell
      description: Identifie la variante de construction ou de style de la kettlebell
        (p. ex., de compétition, réglable ou souple), afin d’aider les acheteurs à
        choisir le modèle adapté à leurs besoins d’entraînement.
    key_attachment_mechanism:
      name: Mécanisme d’attache des clés
      description: Précise les pièces d’attache utilisées pour maintenir les clés
        à l’intérieur de l’étui, par exemple des anneaux, des clips ou des attaches
        à vis.
    key_retention_when_unlocked:
      name: Rétention de la clé en position déverrouillée
      description: Indique si la clé peut être retirée du verrou lorsqu’il est en
        position déverrouillée.
    keyboard_amplifier_inputs:
      name: Entrées de l’amplificateur pour clavier
      description: Énumère les connexions d’entrée prises en charge par l’amplificateur
        pour clavier (p. ex., jack TRS 6,35 mm, entrée MIDI ou Bluetooth).
    keyboard_amplifier_output_types:
      name: Types de sorties de l’amplificateur pour clavier
      description: Précise les principaux types de connecteurs de sortie pris en charge
        par l’amplificateur pour clavier pour acheminer le signal audio vers d’autres
        systèmes.
    keyboard_case_handle_type:
      name: Type de poignée de l’étui pour clavier
      description: Dispositif principal de poignée utilisé pour déplacer ou transporter
        l’étui pour clavier (en plus des sangles).
    keyboard_case_interior_padding_type:
      name: Type de rembourrage intérieur de l’étui pour clavier
      description: Précise la solution principale de rembourrage ou de doublure utilisée
        à l’intérieur de l’étui rigide.
    keyboard_case_protection_level:
      name: Niveau de protection de l’étui pour clavier
      description: Classe générale de protection ou de rigidité de l’étui rigide,
        qui distingue les étuis à coque rigide moulée des étuis de transport renforcés
        de type ATA.
    keyboard_case_wheel_type:
      name: Étui pour clavier à roulettes
      description: Configuration des roulettes des étuis rigides qui en sont équipés.
    keyboard_pedal_connector_type:
      name: Type de connecteur de la pédale de clavier
      description: Précise le type de connecteur ou de fiche utilisé pour raccorder
        la pédale de maintien à un clavier ou à un piano numérique.
    keyboard_power_supply_type:
      name: Type d’alimentation du clavier
      description: Mode d’alimentation principal du clavier (batterie, adaptateur
        secteur ou alimentation USB).
    keyboard_stand_tier_type:
      name: Nombre de niveaux du support de clavier
      description: Indique si le support est vendu uniquement comme support de base
        ou s’il comprend un accessoire de second niveau, ou permet d’en ajouter un.
    keyboard_stand_tiers:
      name: Niveaux de support pour clavier
      description: Nombre de niveaux pour clavier pris en charge par le support en Z
        (p. ex., un ou deux niveaux).
    keychain_attachment_type:
      name: Type d’attache du porte-clés
      description: Précise l’élément d’attache principal utilisé pour fixer le porte-clés
        à des clés, à un sac ou à une ceinture.
    keychain_style:
      name: Forme du porte-clés
      description: Décrit la forme générale de l’article porte-clés, c’est-à-dire
        sa présentation physique.
    keywork_finish:
      name: Finition du clétage
      description: Décrit la finition ou le placage appliqué aux clés du clétage,
        distinct de la finition du corps.
    kick_point:
      name: Point de flexion
      description: Précise l’emplacement du point de flexion sur le manche d’une crosse
        de hockey, dont dépendent la vitesse de déclenchement du tir et les sensations.
    kick_zone_grip_system:
      name: Système d’adhérence de la zone de poussée
      description: Identifie la technologie utilisée dans la zone de poussée du ski
        pour assurer l’accroche.
    kickboard_features:
      name: Caractéristiques de la planche de natation
      description: Présente les caractéristiques particulières de la planche de natation
        qui améliorent l’entraînement ou le confort, notamment la texture de la surface
        et les options de prise en main.
    kickboard_handle_style:
      name: Type de poignée de la planche de natation
      description: Indique si la planche de natation comporte des poignées ou des
        traitements de surface, et précise la manière dont ces éléments agissent sur
        la prise en main et le confort.
    kickstand_mounting_position:
      name: Emplacement de montage de la béquille
      description: Identifie le point du cadre du vélo où la béquille se fixe (p.
        ex., montage central, montage sur la base arrière ou montage sur l’axe arrière).
    kickstand_type:
      name: Type de béquille
      description: Décrit la conception ou le mécanisme de la béquille (p. ex., béquille
        latérale à un pied, béquille centrale à deux pieds ou modèle télescopique).
    kidney_belt_support_level:
      name: Niveau de soutien de la ceinture lombaire
      description: Niveau global de soutien attribué par le fabricant à la ceinture
        lombaire pour stabiliser le bas du dos et l’abdomen.
    kiln_firing_atmosphere:
      name: Atmosphère de cuisson dans le four
      description: Précise les atmosphères de cuisson possibles dans le four pendant
        son fonctionnement (p. ex., oxydation ou réduction).
    kiln_heating_element_type:
      name: Type d’élément chauffant du four
      description: Type ou matériau des éléments chauffants utilisés dans le four.
    kingpin_design:
      name: Type de construction de l’axe de pivot
      description: Décrit le type de construction de l’axe de pivot lui-même, qui
        a une incidence sur le poids et sur le dégagement nécessaire aux figures de
        grind.
    kingpin_orientation:
      name: Orientation de l’axe de pivot
      description: Identifie l’orientation de l’axe de pivot de l’essieu de skateboard,
        qui a une incidence sur le comportement de la planche et sur la compatibilité
        avec le plateau.
    kit_components_included:
      name: Composants du kit inclus
      description: Énumère les pièces de fixation distinctes fournies dans le kit
        (p. ex., piquets d’ancrage, boulons, sangles ou outil d’installation), afin
        que les acheteurs sachent exactement ce qu’ils achètent.
    kit_format:
      name: Format du kit
      description: Précise la manière dont le kit est conditionné et transporté (p.
        ex., pochette, étui ou boîte).
    kit_items_included:
      name: Éléments inclus dans le kit
      description: Énumère les principaux équipements et fournitures inclus dans le
        kit de vinification, afin que les acheteurs puissent distinguer les kits de
        démarrage des recharges composées uniquement d’ingrédients.
    kit_pouch_case_type:
      name: Type de pochette ou d’étui du kit
      description: Précise le type de rangement inclus avec le kit de soins, le cas
        échéant.
    kit_tools_included:
      name: Outils inclus dans le kit
      description: Énumère les principaux outils fournis dans le kit, le cas échéant,
        pour réaliser le projet.
    kite_inflation_system:
      name: Système de gonflage du cerf-volant
      description: Indique comment le bord d’attaque et les lattes du cerf-volant
        sont gonflés.
    kite_line_configuration:
      name: Configuration des lignes du cerf-volant
      description: Indique le nombre de lignes de vol ou de contrôle prévu pour la
        voile du cerf-volant, une spécification courante pour associer correctement
        les barres et les lignes.
    kite_type:
      name: Type de cerf-volant
      description: Définit la catégorie de conception structurelle du cerf-volant
        (forme et style de bridage).
    kiteboard_bag_style:
      name: Type de sac pour planche de kitesurf
      description: Précise le type ou le sous-type d’étui pour planche de kitesurf
        (p. ex., Boardbag, Golf bag, Travel bag, Foil bag).
    kiwifruit_variety:
      name: Variété de kiwi
      description: Identifie le cultivar précis ou la variété de kiwi selon sa couleur
        (vert, jaune, rouge, etc.).
    knee_pad_pocket_type:
      name: Type de poche pour genouillères
      description: Indique si le vêtement est conçu pour recevoir des genouillères
        de protection et, le cas échéant, de quelle manière.
    knee_pad_style:
      name: Modèle de genouillère
      description: Décrit le type de construction ou la forme de la protection de
        genou (p. ex., manchon, orthèse, protège-genou).
    knee_protection_design:
      name: Structure de la protection de genou
      description: Indique le nombre de sections articulées intégrées à la protection
        de jambe.
    kneeboard_construction:
      name: Construction du kneeboard
      description: Identifie la principale technique de fabrication ou la construction
        composite de la planche (p. ex., plastique rotomoulé, moulage par compression,
        fibre de carbone).
    kneeboard_strap_type:
      name: Type de sangle de kneeboard
      description: Décrit le type de système de sangle qui maintient les genoux de
        l’utilisateur sur la planche.
    knife_lock_mechanism:
      name: Mécanisme de verrouillage du couteau
      description: Précise le mécanisme utilisé pour maintenir la lame d’un couteau
        pliant en position ouverte, ou indique les modèles sans verrouillage.
    knife_locking_mechanism:
      name: Mécanisme de verrouillage du couteau
      description: Spécifie le type de mécanisme qui maintient la lame en position
        ouverte et détermine directement la sécurité, la solidité et la facilité d’utilisation
        des couteaux à lame verrouillable.
    knife_opening_mechanism:
      name: Mécanisme d'ouverture du couteau
      description: Décrit le mode d’ouverture de la lame depuis le manche, en distinguant
        les ouvertures manuelle, assistée, automatique et spécialisées.
    knife_system:
      name: Système de couteaux
      description: Indique si la lame de coupe fonctionne sur la surjeteuse et, le
        cas échéant, selon quel mode.
    knit_elastic_application:
      name: Usage de l’élastique tricoté
      description: Précise l’usage prévu de la garniture élastique tricotée pour les
        travaux de couture ou de loisirs créatifs.
    knit_pattern:
      name: Motif de tricot
      description: Identifie le point ou la texture de tricot principal du cardigan,
        comme les torsades, les côtes ou le point gaufré, afin d’aider les acheteurs
        à trouver des textures et des propriétés thermiques précises.
    knit_style:
      name: Type de tricot
      description: Précise la construction principale du tricot, sa texture ou le
        motif décoratif présent sur le pull.
    knitting_marker_counter_type:
      name: Type de marqueur ou de compteur de tricot
      description: Définit le type fonctionnel de produit parmi les marqueurs et les
        compteurs de tricot.
    knitting_needle_tip_style:
      name: Forme de la pointe d’aiguille à tricoter
      description: Finesse ou forme de la pointe, optimisée pour différents fils et
        différentes techniques.
    knock_sensor_technology:
      name: Technologie des capteurs de cliquetis
      description: Technologie de détection utilisée dans le capteur de cliquetis.
    knurl_aggressiveness:
      name: Agressivité du moletage
      description: Décrit le relief ou la texture du moletage sur la barre, qui contribue
        au confort et à la sûreté de la prise.
    knurl_marking_standard:
      name: Norme des repères de moletage
      description: Précise la position des anneaux de repère du moletage utilisés
        pour placer les mains (p. ex., repères IPF ou IWF).
    kohlrabi_variety:
      name: Variété de chou-rave
      description: Spécifie le cultivar ou la variété commerciale du bulbe de chou-rave,
        afin d’aider les clients à choisir selon le profil aromatique, la taille ou
        la couleur.
    koji_mold_type:
      name: Type de moisissure koji
      description: Indique le type ou la souche de moisissure koji utilisée pendant
        la fermentation, qui influence l’arôme et le goût.
    kumquat_variety:
      name: Variété de kumquat
      description: Identifie le cultivar ou la variété de kumquats proposés, afin
        d’aider les acheteurs à choisir les fruits selon le profil aromatique, le
        calibre ou l’usage culinaire.
    label_edge_type:
      name: Type de bord de l’étiquette
      description: Définit le type de finition des bords utilisé pour empêcher l’effilochage
        et donner son aspect à l’étiquette.
    label_finish:
      name: Finition de l'étiquette
      description: Recense la finition de surface, la texture ou le traitement protecteur
        appliqué à l’étiquette.
    label_finish_edge_style:
      name: Finition ou type de bord de l’étiquette
      description: Mode de finition des bords, qui contribue au confort et à la durabilité
        (p. ex., bord tissé ou découpe au laser).
    label_fold_type:
      name: Type de pli de l’étiquette
      description: Définit la manière dont l’étiquette à coudre est conçue pour être
        cousue sur un article (p. ex., pli d’extrémité ou pli central), ce qui conditionne
        sa pose et son positionnement.
    label_text_type:
      name: Type de texte de l'étiquette
      description: Définit si l’étiquette est vierge, préimprimée ou destinée à être
        personnalisée.
    lace_area_size:
      name: Taille de la zone en dentelle
      description: Définit la taille ou la configuration de la section en dentelle
        (p. ex., fermeture 4×4, frontal 13×6), ce qui détermine l’espace disponible
        pour tracer une raie.
    lace_tightener_style:
      name: Type de serre-lacets
      description: Identifie la conception mécanique ou la forme du dispositif de
        serrage des lacets.
    lace_type:
      name: Type de dentelle
      description: Décrit la matière ou la finition de la dentelle au niveau de la
        ligne d’implantation ou du bonnet, avec une incidence sur le rendu naturel
        et l’adaptation à la carnation.
    lacrosse_ball_certification:
      name: Certification de la balle de crosse
      description: Établit les homologations ou les normes d’instances sportives auxquelles
        la balle de crosse est conforme.
    lacrosse_goal_regulation_certification:
      name: Certification réglementaire du but de crosse
      description: Indique si le but ou le filet de crosse respecte une spécification
        d’une instance donnée (p. ex., NCAA ou NFHS).
    lacrosse_pocket_type:
      name: Type de poche de crosse
      description: Identifie le style général de poche ou de maillage monté dans la
        tête de crosse, qui contribue au contrôle et à la sortie de balle.
    lacrosse_string_type:
      name: Type de cordage ou de maillage pour crosse
      description: Classe la forme exacte ou l’usage prévu de l’article de cordage
        ou de maillage, afin d’aider les clients à distinguer les pièces de maillage,
        les kits et les rôles précis des cordages dans une poche.
    ladder_position:
      name: Position de l’échelle
      description: Identifie l’emplacement de l’échelle ou de l’escalier d’accès sur
        le lit mezzanine pour tout-petit.
    lanyard_attachment_hardware:
      name: Éléments d’attache du cordon
      description: Indique le type de pièce d’attache située à l’extrémité du cordon,
        à laquelle se fixent les clés, les badges, les téléphones ou d’autres accessoires.
    lanyard_style:
      name: Modèle à cordon
      description: Précise la manière dont le cordon se porte ou se transporte.
    lanyard_type:
      name: Type de cordon
      description: Décrit le type de cordon fourni avec le sifflet ou compatible avec
        celui-ci.
    lap_hand_loom_accessories_included:
      name: Accessoires inclus avec le métier à tisser à main
      description: Accessoires inclus dans l’ensemble du métier à tisser à main.
    lapel_style:
      name: Style de revers
      description: Précise la forme du revers de la veste de costume (p. ex., revers
        cranté, revers en pointe, col châle).
    laser_safety_class:
      name: Classe de sécurité laser
      description: Classification de sécurité laser du produit (p. ex., classe 2,
        3R, 3B, 4), telle qu’elle figure dans la documentation ou sur l’étiquetage
        de l’appareil.
    latex_processing_method:
      name: Procédé de traitement du latex
      description: Précise le procédé de fabrication utilisé pour produire la mousse
        de latex — généralement Dunlop ou Talalay —, avec une incidence sur le toucher,
        la capacité de reprise et le prix.
    latex_type:
      name: Type de latex
      description: Indique l’origine et la composition du latex utilisé dans le matelas
        (naturel, biologique, synthétique ou mixte), afin de renseigner les acheteurs
        sur sa durabilité, son impact environnemental et les risques d’allergènes.
    launch_profile:
      name: Profil de lancement
      description: Indique la trajectoire de lancement habituelle qu’un manche de
        club de golf est conçu pour produire (basse, moyenne, haute).
    launcher_mounting_configuration:
      name: Configuration de montage du lanceur
      description: Identifie le mode de montage ou de configuration du lanceur, afin
        d’aider les acheteurs à choisir entre une option autonome, montée sous le
        canon ou montée sur rail.
    layer_construction:
      name: Structure en couches
      description: Précise la construction du tissu laminé (p. ex., 2 couches, 2,5 couches,
        3 couches), qui a une incidence sur le poids, la facilité de rangement et
        la durabilité.
    layer_design:
      name: Structure des couches
      description: Décrit la construction du filet à cheveux selon ses couches ou
        son caractère réversible.
    lazy_kate_tension_control_type:
      name: Mode de réglage de la tension du cantre
      description: Mode d’application de la résistance ou de la tension aux bobines
        pendant le retors ou le bobinage.
    lead_hardware_type:
      name: Type de pièce d’attache de la laisse
      description: Définit le type d’attache ou de fixation situé à l’extrémité de
        la laisse (mousqueton, pince, boucle, chaîne, etc.), avec une incidence sur
        la facilité d’utilisation, la sécurité et l’adaptation à la discipline pratiquée.
    leaf_gelatin_grade:
      name: Grade de gélatine en feuilles
      description: Spécifie le degré de pouvoir gélifiant normalisé des feuilles de
        gélatine.
    leaf_preparation:
      name: Préparation des feuilles
      description: Décrit la manière dont les feuilles sont préparées avant d’être
        conditionnées, par exemple hachées, effilochées ou coupées en julienne.
    leaf_spring_material:
      name: Matériau des ressorts à lames
      description: Matériau principal de l’ensemble de ressorts à lames.
    leak_protection_layer:
      name: Couche de protection contre les fuites
      description: Indique si le système de couche intégré au maillot de bain comprend
        une ou deux couches anti-fuites.
    leash_clip_type:
      name: Type d’attache de laisse
      description: Définit le type d’attache utilisé pour fixer la laisse à un collier
        ou à un harnais (p. ex., mousqueton à tirette, mousqueton, attache pivotante).
    leash_style:
      name: Type de leash
      description: Décrit la configuration du cordon ou le mode d’enroulement de la
        laisse.
    leash_type:
      name: Type de laisse
      description: Classe la laisse selon son style général ou selon la configuration
        adaptée à son usage, pour faciliter le filtrage par usage prévu.
    leavening_action_type:
      name: Type d’action levante
      description: Identifie la formulation chimique ou le mode d’action de la levure
        chimique (p. ex., à simple action, à double action, sans aluminium). Cette
        caractéristique a une incidence directe sur le résultat à la cuisson et l’adéquation
        aux recettes.
    leavening_agent:
      name: Agent levant
      description: Définit le principal mécanisme par lequel la pâte lève.
    led_color_options:
      name: Options de couleur des LED
      description: Énumère les couleurs de LED sélectionnables sur l’alarme pour signaler
        visuellement les touches.
    led_indicator_color:
      name: Couleur du voyant LED
      description: Identifie la couleur du voyant LED du produit, afin d’aider les
        pêcheurs à la ligne à coordonner plusieurs alarmes ou à choisir selon leurs
        préférences.
    led_light_color:
      name: Couleur de l’éclairage LED
      description: Précise la couleur de l’éclairage LED intégré.
    leek_variety:
      name: Variété de poireau
      description: Précise le cultivar ou la variété du poireau, afin de distinguer
        les produits selon leur goût, leur calibre et leur saison de culture.
    leg_coverage:
      name: Couverture des jambes
      description: Précise la longueur de jambe couverte par la pièce de combinaison
        (p. ex., shorty ou longueur intégrale).
    leg_cuff_style:
      name: Finition du bas de jambe
      description: Définit la finition de l’ouverture du pantalon au niveau de la
        cheville.
    leg_cut_height:
      name: Hauteur d’échancrure de la jambe
      description: Indique la hauteur d’échancrure de l’ouverture de jambe sur le
        bas de bikini.
    leg_cut_style:
      name: Coupe au niveau de la jambe
      description: Décrit la forme de l’ouverture de jambe, qui modifie l’apparence,
        le confort et les marques de bronzage.
    leg_length:
      name: Longueur de jambe
      description: Classe les shorts selon leur longueur de jambe relative (courte,
        moyenne ou longue), afin que les acheteurs puissent choisir le niveau de couvrance
        souhaité sans diviser la catégorie.
    leg_loop_type:
      name: Type de sangle de jambe
      description: Décrit la conception des tours de cuisse.
    leg_opening_style:
      name: Finition de l’ouverture de jambe
      description: Définit la finition des ouvertures de jambe des pantalons de jogging,
        par exemple des bords élastiqués, des bas zippés ou des bas ouverts.
    leg_style:
      name: Style de jambe
      description: Définit la forme ou le type de construction des pieds ou de la
        base du banc.
    legging_foot_design:
      name: Type de pied des leggings
      description: Indique si les leggings laissent les pieds découverts, couvrent
        les pieds ou peuvent se porter des deux façons.
    leggings_waistband_style:
      name: Type de ceinture des leggings
      description: Définit la structure de la ceinture des leggings, qui conditionne
        le confort, le maintien et l’esthétique.
    lei_closure_style:
      name: Mode de fermeture du collier de fleurs
      description: Décrit si le collier de fleurs forme une boucle continue ou s’il
        présente des extrémités ouvertes, à nouer directement ou à fermer par un ruban.
    lemon_variety:
      name: Variété de citron
      description: Identifie le cultivar ou la variété précise des citrons (p. ex.,
        Eureka, Meyer, Amalfi).
    length_adjustment_method:
      name: Mode de réglage de la longueur
      description: Indique si la longueur de la corde à sauter peut être réglée et,
        le cas échéant, de quelle manière elle s’adapte à l’utilisateur.
    lens_color_tint:
      name: Couleur ou teinte des verres
      description: Couleur ou teinte des verres de protection fournis avec le produit.
    lens_construction:
      name: Conception de l'objectif
      description: Précise la construction du verre (p. ex., écran simple, double
        écran thermique) afin d’indiquer sa résistance à la buée et ses performances
        optiques.
    lens_tint_category:
      name: Catégorie de teinte des verres
      description: Classe l’intensité de teinte des verres selon les catégories internationales,
        afin d’aider les clients à choisir des verres adaptés aux différentes conditions
        de luminosité.
    lettuce_variety:
      name: Variété de laitue
      description: Identifie la variété horticole précise de laitue (p. ex., iceberg,
        romaine, laitue beurre), afin de permettre un filtrage et une comparaison
        précis.
    level_of_play:
      name: Niveau de jeu
      description: Niveau de performance indiqué par le fabricant, adapté au degré
        de compétitivité du joueur et à son budget.
    lever_configuration:
      name: Configuration des leviers
      description: Indique la configuration du levier ou de la poignée de commande
        du moteur de l’embarcation (p. ex., levier simple ou double levier).
    lever_type:
      name: Type de levier
      description: Type ou mécanisme des leviers de changement de hauteur installés
        sur les cordes de la harpe.
    license_plate_cover_style:
      name: Type de protection pour plaque d’immatriculation
      description: Définit le type de construction de la protection pour plaque d’immatriculation
        (p. ex., protection complète ou cache-vis).
    license_plate_personalization_type:
      name: Type de personnalisation de la plaque d’immatriculation
      description: Indique si la plaque d’immatriculation est vierge, préimprimée
        ou personnalisable à partir d’éléments fournis par l’acheteur (texte et/ou
        graphismes).
    license_usage_terms:
      name: Conditions de licence ou d’utilisation
      description: Droits d’utilisation du patron (p. ex., usage personnel seulement
        ou usage commercial limité).
    licensed_sports_property:
      name: Propriété sportive sous licence
      description: Indique si le produit bénéficie d’une licence officielle accordée
        par une ligue, une équipe ou une organisation.
    lid_hinge_mechanism:
      name: Mécanisme de charnière du couvercle
      description: Définit le mécanisme de charnière utilisé pour le couvercle, qui
        conditionne la sécurité et la facilité d’utilisation.
    lid_support_positions:
      name: Positions de soutien du couvercle
      description: Précise les positions possibles de la béquille du couvercle d’un
        piano à queue, c’est-à-dire l’amplitude d’ouverture du couvercle.
    lie_angle_color_code:
      name: Code couleur de l’angle de lie
      description: Désigne le système de codage couleur de l’angle de lie utilisé
        par le fabricant sur certains clubs (p. ex., point noir, point vert).
    life_jacket_certification_standard:
      name: Norme de certification des gilets de sauvetage
      description: Classification ou norme officielle de sécurité à laquelle le produit
        est conforme, comme le type USCG ou les niveaux ISO/AS.
    life_raft_certification_standard:
      name: Norme de certification des radeaux de sauvetage
      description: Norme ou certification de sécurité selon laquelle le radeau est
        fabriqué et entretenu.
    life_raft_container_type:
      name: Type de conditionnement du radeau de survie
      description: Mode de conditionnement du radeau de survie pour le stockage et
        le déploiement.
    life_vest_approval_standard:
      name: Norme d'homologation des gilets de sauvetage
      description: Définit la norme de certification ou d’homologation à laquelle
        le gilet de sauvetage est conforme.
    life_vest_intended_user:
      name: Catégorie d’utilisateur prévue pour le gilet de sauvetage
      description: Indique la catégorie de porteur prévue, afin de déterminer l’ajustement
        et le choix du gilet.
    lifebuoy_approval_standard:
      name: Norme d’homologation de la bouée de sauvetage
      description: Homologation ou norme de sécurité à laquelle la bouée de sauvetage
        est conforme (p. ex., USCG/SOLAS).
    lifebuoy_features:
      name: Caractéristiques de la bouée de sauvetage
      description: Caractéristiques de sécurité fonctionnelle, de montage, de manipulation
        et d’accessoires inclus pour les bouées de sauvetage.
    lift_mechanism_type:
      name: Type de mécanisme de levage
      description: Définit le mécanisme qui facilite le relevage, l’abaissement, l’ouverture
        ou la fermeture du lit escamotable.
    lift_stand_support_point:
      name: Point d’appui du pont élévateur ou du support
      description: Emplacement où le pont élévateur ou le support prend appui sur
        le véhicule.
    lifting_gas_type:
      name: Type de gaz porteur
      description: Indique le gaz porteur principal ou le fluide de flottabilité utilisé
        par le dirigeable.
    lifting_support_type:
      name: Mode de levage
      description: Indique si le véhicule monte sur le pont par des chemins de roulement
        ou s’il est soulevé par des bras ou des patins en contact avec le châssis
        ou les points de levage.
    ligature_and_cap_component_type:
      name: Type de composant de ligature et de couvre-bec
      description: Indique si le produit est une ligature, un couvre-bec ou un ensemble
        contenant ces deux éléments.
    ligature_material:
      name: Matériau de la ligature
      description: Matériau principal du corps de la ligature, qui entre en contact
        avec l’anche et en assure le maintien (p. ex., métal, cuir, tissu).
    ligature_plating_or_finish:
      name: Placage ou finition de la ligature
      description: Précise le placage ou la finition de surface appliqué à une ligature
        ou à un couvre-bec de clarinette en métal.
    ligature_reed_contact_style:
      name: Type de contact entre la ligature et l’anche
      description: Précise la manière dont la ligature entre en contact avec l’anche
        (p. ex., contact minimal, contact multipoint, contact enveloppant).
    ligature_screw_position_relative_to_reed:
      name: Position de la vis de ligature (par rapport à l’anche)
      description: Indique la position de la ou des vis de serrage de la ligature
        par rapport à l’anche ou au côté tourné vers le musicien, une fois la ligature
        installée sur le bec.
    ligature_tension_adjustment_mechanism:
      name: Mécanisme de réglage de la tension de la ligature
      description: Décrit la manière dont la ligature exerce et ajuste la pression
        sur l’anche (conception du système de fixation).
    ligature_tightening_mechanism_type:
      name: Type de mécanisme de serrage de la ligature
      description: Précise le mécanisme de serrage de la ligature autour du bec et
        de l’anche (p. ex., vis simple, double vis, levier ou ouverture rapide).
    light_bar_housing_material:
      name: Matériau du boîtier de la barre lumineuse
      description: Matériau principal du boîtier ou du corps de la barre lumineuse,
        qui détermine sa durabilité et sa capacité à évacuer la chaleur.
    light_bar_lens_material:
      name: Matériau d'objectif de barre lumineuse
      description: Matériau principal de la lentille ou de la protection de la barre
        lumineuse, qui peut modifier la résistance aux chocs et la qualité optique.
    light_bar_mounting_location:
      name: Emplacement de montage de la rampe lumineuse
      description: Emplacement de montage principal prévu sur le véhicule.
    light_stand_style:
      name: Type de pied d’éclairage
      description: Définit la structure ou la forme du pied destiné à soutenir des
        éclairages d’effets spéciaux (p. ex., trépied, barre en T, pied à treuil),
        et non la surface d’installation (mur ou plafond), qui relève du type de montage.
    light_switch_function:
      name: Fonction de l’interrupteur d’éclairage
      description: Identifie les circuits d’éclairage ou les fonctions commandés par
        l’interrupteur.
    lighting_control_protocols_supported:
      name: Protocoles de commande d’éclairage pris en charge
      description: Protocoles de commande ou de réseau pris en charge par le contrôleur
        en complément ou en remplacement du DMX512.
    lighting_effects:
      name: Effets lumineux
      description: Indique les fonctions lumineuses intégrées qui améliorent l’expérience
        de jeu ou l’esthétique.
    lighting_mode:
      name: Mode d’éclairage
      description: Énumère les modes d’éclairage disponibles, comme l’éclairage fixe,
        le clignotement, le mode stroboscopique ou le signal SOS.
    lily_variety:
      name: Variété de lys
      description: Spécifie la variété commerciale ou botanique du lys vendu comme
        fleur coupée fraîche (p. ex., asiatique, oriental).
    limb_articulation:
      name: Articulation des membres
      description: Indique le degré de souplesse ou d’articulation des membres du
        mannequin (aucune articulation, articulation fixe, semi-flexible ou complète).
    limb_material:
      name: Matériau des branches
      description: Matériau principal des branches d’un arc ou d’une arbalète, qui
        détermine le poids, la durabilité, les vibrations et les performances globales.
    lime_variety:
      name: Variété de citron vert
      description: Identifie la variété botanique ou commerciale précise du citron
        vert vendu.
    line_buoyancy:
      name: Flottabilité de la ligne
      description: Décrit si la tresse flotte ou coule naturellement, et à quelle
        vitesse, ce qui influe sur la présentation du leurre et la gestion de la ligne.
    line_purpose:
      name: Objet de la ligne
      description: Définit la fonction prévue de la ligne dans le système du cerf-volant
        (p. ex., ligne avant, ligne de contrôle de la puissance, ligne de bride).
    linen_finish_treatment:
      name: Finition ou traitement du lin
      description: Procédé de finition appliqué au tissu en lin et modifiant son toucher,
        son aspect ou ses performances.
    linen_weave_type:
      name: Type d’armure du lin
      description: Précise l’armure du tissu en lin, qui détermine sa texture, sa
        respirabilité et son tombé.
    liner_padding_type:
      name: Type de rembourrage de la doublure
      description: Indique la construction ou le type de rembourrage de la doublure
        (p. ex., en maille, légèrement rembourrée, matelassée).
    liner_shape:
      name: Forme du drap de sac
      description: Décrit la forme générale du drap de sac afin d’aider les clients
        à choisir un modèle adapté à leur sac de couchage et à leurs préférences de
        confort.
    liner_type:
      name: Type de doublure intérieure
      description: Indique si le short comporte une doublure intérieure et, le cas
        échéant, de quel type.
    lining:
      name: Doublure
      description: Indique si le slip de bain est doublé et, le cas échéant, quelle
        partie intérieure du vêtement est doublée.
    lining_material:
      name: Matériau de revêtement
      description: Précise le matériau utilisé pour la doublure intérieure de la chaussure,
        qui détermine le confort, la respirabilité et l’isolation thermique.
    lining_type:
      name: Type de doublure
      description: Indique si le vêtement de bain est doublé et dans quelle mesure.
    link_connection_style:
      name: Mode de raccordement du maillon
      description: Classe le maillon selon son mode de raccordement à la chaîne (p.
        ex., attache rapide, axe de raccordement), afin d’aider les cyclistes à choisir
        la bonne méthode de montage ou la pièce de rechange appropriée.
    live_bait_form:
      name: Forme de l’appât vivant
      description: Définit la forme physique ou l’état de conservation de l’appât,
        par exemple vivant, congelé ou séché.
    living_room_furniture_items_included:
      name: Meubles de salon inclus
      description: Énumère les différents meubles qui composent l’ensemble de salon,
        afin que les acheteurs sachent rapidement ce qu’il comprend exactement (p.
        ex., canapé, canapé deux places, table basse).
    load_mechanism:
      name: Mécanisme de chargement
      description: Spécifie le principal mode de production ou d’ajout de la résistance
        sur la machine (p. ex., colonne de poids sélectionnable, chargement par disques,
        résistance par bandes).
    lock_cylinder_type:
      name: Type de cylindre de serrure
      description: Spécifie le type de cylindre ou de barillet utilisé (pertinent
        pour la résistance au crochetage et les clés de remplacement).
    lock_security_level:
      name: Niveau de sécurité de la serrure
      description: Décrit les caractéristiques de résistance de la serrure ou du cylindre
        au crochetage et au perçage.
    lock_system:
      name: Système de verrouillage
      description: Type de système de verrouillage de sécurité utilisé pour maintenir
        le pont élévateur en position haute.
    locker_bench_configuration:
      name: Configuration du banc de vestiaire
      description: Décrit l’orientation ou la configuration du banc de vestiaire (p.
        ex., simple face, îlot double face, fixation murale).
    locomotive_prototype_power_type:
      name: Type de motorisation du prototype de locomotive
      description: Spécifie le type de propulsion de la locomotive réelle reproduite
        par le modèle.
    locomotive_wheel_arrangement_whyte_notation:
      name: Disposition des essieux de la locomotive (notation Whyte)
      description: Disposition des essieux du prototype de locomotive (p. ex., 4-6-2
        Pacific).
    loft_bed_height_classification:
      name: Classement du lit mezzanine selon la hauteur
      description: Indique la hauteur générale du lit mezzanine (bas, moyen, haut,
        très haut), afin d’aider les acheteurs à tenir compte de la hauteur sous plafond
        et de l’espace nécessaire sous le lit.
    logo_application_method:
      name: Méthode d'application du logo
      description: Décrit la manière dont l’écusson ou le logo de l’établissement
        scolaire est appliqué sur le vêtement (p. ex., brodé ou imprimé).
    logo_label_compatible_fabric_weight:
      name: Grammage de tissu compatible avec l’étiquette à logo
      description: Catégorie de grammage recommandée pour fixer l’étiquette sans déformation
        ni surépaisseur.
    logo_label_edge_finish:
      name: Finition du bord de l’étiquette à logo
      description: Définit la construction ou la finition du bord de l’étiquette,
        qui détermine la résistance à l’effilochage et le confort au contact de la
        peau.
    logo_label_print_production_method:
      name: Mode d’impression ou de production de l’étiquette à logo
      description: Mode d’application ou de réalisation du logo sur la surface de
        l’étiquette.
    long_block_completeness:
      name: Composition de l’ensemble bloc-moteur
      description: Recense les principaux composants inclus dans l’ensemble bloc-moteur.
    long_john_pieces_included:
      name: Pièces de sous-vêtement long incluses
      description: Indique si le produit comprend seulement le bas, seulement le haut,
        ou les deux pièces d’un ensemble de sous-vêtements longs.
    longan_variety:
      name: Variété de longane
      description: Spécifie le cultivar ou la variété commerciale du longane (p. ex.,
        Kohala, Biew Kiew), afin d’aider les acheteurs à repérer le goût, le calibre
        et le degré de sucre recherchés.
    loom_accessories_included:
      name: Accessoires pour métier à tisser inclus
      description: Principaux accessoires fournis avec le métier à tisser dans son
        conditionnement.
    loom_finish:
      name: Finition du métier à tisser
      description: Finition de surface du métier à tisser (principalement pour les
        modèles en bois).
    loom_folding_portability_design_type:
      name: Mode de pliage ou de transport du métier à tisser
      description: Indique si le métier à tisser peut se plier ou se replier et, le
        cas échéant, de quelle manière, pour le transport ou un rangement compact.
    loom_frame_folding_design:
      name: Mode de pliage du cadre du métier à tisser
      description: Indique si le cadre du métier à tisser de table peut se plier,
        se replier ou se démonter et, le cas échéant, de quelle manière, pour le rangement
        ou le transport.
    loom_tension_adjustment_method:
      name: Mode de réglage de la tension du métier à tisser
      description: Mode principal de réglage de la tension de la chaîne sur le métier
        à tisser.
    loom_tie_up_system:
      name: Système d’attache du métier à tisser
      description: Type de système d’attache ou de liaison utilisé entre les pédales,
        les contremarches et les cadres (p. ex., Texsolv ou chaîne métallique).
    loquat_variety:
      name: Variété de nèfle du Japon
      description: Spécifie le cultivar ou la variété de nèfle du Japon, dont la taille,
        le goût, la période de maturation et l’aspect peuvent varier.
    lubricant_features:
      name: Caractéristiques du lubrifiant
      description: Présente les propriétés particulières du lubrifiant, ses additifs
        ou ses avantages.
    lubrication_requirement:
      name: Exigences en matière de lubrification
      description: Indique si la bande du tapis de course est prétraitée et sans entretien,
        ou si elle nécessite une lubrification ou un traitement régulier à la cire.
    lubrication_type:
      name: Type de lubrification
      description: Spécifie le mode de lubrification de la bague et indique si elle
        est conçue pour être graissée lors de l’entretien (p. ex., rainures ou graisseur
        Zerk).
    lug_nut_seat_profile:
      name: Profil du siège d’écrou de roue
      description: Spécifie le profil de siège d’écrou requis par la roue pour garantir
        la compatibilité de l’écrou et la sécurité du montage.
    lumbar_support_type:
      name: Type de soutien lombaire
      description: Décrit le type de soutien lombaire fourni avec la chaise (p. ex.,
        coussin amovible, mécanisme réglable, fonction de massage).
    lunge_trainer_style:
      name: Type d’appareil d’entraînement aux fentes
      description: Définit la structure d’un appareil d’entraînement aux fentes.
    lure_buoyancy:
      name: Flottabilité du leurre
      description: Indique le comportement du leurre dans la colonne d’eau, au repos
        ou pendant la récupération (p. ex., flottant en surface, en suspension entre
        deux eaux ou coulant).
    luster:
      name: Lustré
      description: Décrit la façon dont la lumière se réfléchit sur la surface du
        spécimen (p. ex., éclat vitreux ou métallique).
    lychee_cultivar:
      name: Cultivar de litchi
      description: Identifie la variété ou le cultivar précis de litchi, comme Brewster,
        Hak Ip ou Mauritius, qui peut se distinguer par le goût, la taille du noyau,
        la saison de récolte et le prix.
    lyre_flip_folder_mounting_location:
      name: Emplacement de fixation de la lyre ou du porte-partitions
      description: Emplacement prévu pour fixer la lyre ou le porte-partitions sur
        l’instrument ou l’accessoire (p. ex., pavillon, branche d’embouchure, pied).
    lyrics_display_type:
      name: Type d’affichage des paroles
      description: Mode d’affichage des paroles pendant le karaoké, lorsque cette
        fonction est prise en charge.
    magazine_compatibility:
      name: Compatibilité avec les chargeurs
      description: Identifie les principaux calibres ou types de chargeurs que les
        pochettes intégrées du gilet sont conçues pour recevoir.
    magnet_requirement:
      name: Aimant requis
      description: Indique si le capteur nécessite un aimant externe pour fonctionner.
    magnet_toy_storage_included:
      name: Rangement inclus avec le jouet magnétique
      description: Type de rangement ou d’étui fourni avec le jouet magnétique pour
        l’organisation sur un bureau et le transport.
    malanga_variety:
      name: Variété de malanga
      description: Identifie la variété précise de malanga ou de racine de taro vendue,
        afin d’aider les acheteurs à choisir le goût, la couleur ou l’usage culinaire
        recherchés.
    malt_color_rating_system:
      name: Système d’évaluation de la couleur du malt
      description: Spécifie l’échelle à laquelle se rapporte la couleur indiquée (Lovibond,
        SRM ou EBC).
    malt_crush:
      name: Concassage du malt
      description: Indique si le malt de base est vendu entier, non moulu ou préconcassé
        et, dans ce dernier cas, le type de concassage.
    malt_form:
      name: Forme du malt
      description: Indique si le produit est vendu en grains entiers ou transformé
        pour l’empâtage (p. ex., concassé).
    malt_intended_use:
      name: Utilisation prévue du malt
      description: Usage principal prévu du malt (brassage, distillation ou double
        usage).
    malt_treatment:
      name: Traitement du malt
      description: Décrit la manière dont le grain ou le malt a été traité au-delà
        du touraillage standard (procédés spécialisés courants).
    malt_usage_purpose:
      name: Usage prévu du malt
      description: Décrit l’apport fonctionnel principal d’un malt de spécialité dans
        une recette de bière.
    man_overboard_system_type:
      name: Type de système homme à la mer
      description: Spécifie la principale catégorie de solution homme à la mer (MOB)
        fournie par le produit.
    mandolin_back_sides_wood:
      name: Bois du fond et des éclisses de la mandoline
      description: Spécifie l’essence de bois utilisée pour le fond et les éclisses
        de la mandoline.
    mandolin_body_top_wood:
      name: Bois de la table d’harmonie de la mandoline
      description: Bois ou matériau principal de la table d’harmonie de la mandoline.
    mandolin_bridge_type:
      name: Type de chevalet de mandoline
      description: Indique le type de chevalet utilisé sur la mandoline.
    mandolin_pickup_configuration:
      name: Configuration des micros d'une mandoline
      description: Indique si la mandoline comporte une électronique et, le cas échéant,
        le type de système de captation installé.
    mandolin_string_configuration:
      name: Configuration des cordes de la mandoline
      description: Spécifie la configuration des cordes de la mandoline selon le nombre
        total de cordes et le nombre de chœurs (p. ex., 8 cordes / 4 chœurs).
    mangosteen_variety:
      name: Variété de mangoustan
      description: Identifie l’espèce ou le cultivar précis du fruit vendu, qu’il
        s’agisse de mangoustan ou d’un fruit Garcinia étroitement apparenté.
    mannequin_style:
      name: Type de mannequin
      description: Décrit la structure ou le type de construction du mannequin d’entraînement.
    manufacturing_process:
      name: Procédé de fabrication
      description: Principal procédé de fabrication du corps ou de la bobine du moulinet
        (p. ex., usinage CNC, moulage sous pression).
    map_coverage_sky_planet_body:
      name: Sujet de la carte (ciel/corps planétaire)
      description: 'Indique le sujet représenté par la carte : ciel nocturne (constellations)
        ou corps planétaire précis.'
    map_format:
      name: Format de carte
      description: Définit le mode de présentation physique ou numérique des cartes
        et guides de chasse.
    map_sensor_output_signal_type:
      name: Type de signal de sortie du capteur MAP
      description: Spécifie le type de signal de sortie fourni par le capteur MAP
        au calculateur moteur (ECU).
    map_size_sheet:
      name: Dimensions de la carte (feuille)
      description: Spécifie les dimensions finales de la feuille de carte, de l’affiche
        ou du planisphère, afin d’aider à prévoir l’affichage, le format du cadre
        et l’espace mural nécessaire.
    marabou_feather_form:
      name: Forme des plumes de marabout
      description: Forme sous laquelle le produit en plumes de marabout est vendu.
    marabou_feather_treatment:
      name: Traitement des plumes de marabout
      description: Décrit le mode de traitement ou de finition des plumes de marabout
        pour les loisirs créatifs.
    marble_track_set_feature_modules:
      name: Modules fonctionnels du circuit à billes
      description: Présente les modules fonctionnels particuliers inclus dans l’ensemble
        (p. ex., élévateur, lanceur, aiguillages).
    marine_flare_certification_standard:
      name: Certification ou norme du feu de détresse maritime
      description: Indique les certifications ou normes de sécurité maritime que le
        feu de détresse déclare respecter.
    marine_safety_standard_compliance:
      name: Conformité aux normes de sécurité maritime
      description: Indique les normes ou homologations officielles de sécurité nautique
        que respecte l’accessoire.
    marine_transmission_type:
      name: Type de transmission marine
      description: Spécifie le type de transmission marine associé au moteur in-bord
        (p. ex., transmission directe ou transmission en V).
    marker_action_type:
      name: Type d'action du marqueur
      description: Décrit le principe de tir ou de fonctionnement du marqueur.
    marker_caliber:
      name: Calibre du marqueur
      description: Spécifie le diamètre des billes de peinture prévues pour le marqueur.
    marking_durability:
      name: Durabilité du marquage
      description: Indique la durée pendant laquelle la ligne peinte est censée rester
        visible dans des conditions normales, par exemple temporaire (jusqu’à 3 semaines),
        semi-permanente (jusqu’à 6 mois) ou permanente (plus de 6 mois).
    marking_tip_type:
      name: Type de pointe de marquage
      description: Type d’insert de marquage utilisé par le compas pour tracer (p.
        ex., porte-mine, encre ou pointe à tracer).
    marshmallow_processing_method:
      name: Procédé de transformation des guimauves
      description: Décrit les procédés particuliers appliqués aux guimauves, qui modifient
        leur texture, leur durée de conservation ou leur goût.
    marshmallow_size:
      name: Taille de la guimauve
      description: Classe les morceaux de guimauve selon leur taille relative.
    martial_arts_belt_rank:
      name: Rang de ceinture d’arts martiaux
      description: Indique le niveau représenté par la couleur de la ceinture ou par
        une combinaison particulière de couleurs.
    mask_bib_type:
      name: Type de bavette du masque
      description: Spécifie le type de bavette du masque d’escrime, par exemple en
        tissu standard, conductrice, amovible ou absente.
    mask_cage_material:
      name: Matériau de la grille du masque
      description: Matériau utilisé pour la grille faciale ou l’armature du masque.
    mask_goggle_design:
      name: Type de masque ou de lunettes de protection
      description: Définit la structure générale ou le degré de protection couvrante
        de l’équipement.
    mask_skirt_material:
      name: Matériau de la jupe du masque
      description: Identifie le matériau de la jupe souple qui assure l’étanchéité
        entre le masque et le visage.
    mask_strap_material:
      name: Matériau de la sangle du masque
      description: Spécifie le matériau de la sangle qui maintient le masque sur la
        tête.
    mass_air_flow_sensor_measurement_type:
      name: Type de mesure du débitmètre d'air massique
      description: Spécifie la technologie de détection ou le type de sortie du capteur
        MAF.
    mass_air_flow_sensor_mounting_type:
      name: Type de montage du capteur de débit d’air massique
      description: Mode de montage ou d’installation du capteur MAF ou de l’ensemble
        capteur dans le système d’admission.
    massage_feature:
      name: Fonction de massage
      description: Indique si la base réglable comprend une fonction de massage intégrée
        et, le cas échéant, le nombre de zones de massage qu’elle propose.
    mast_attachment_interface:
      name: Interface de fixation du mât
      description: Spécifie la norme de raccordement entre le fuselage et le mât,
        afin d’aider les acheteurs à vérifier l’ajustement des composants.
    mast_base_type:
      name: Type de base de mât
      description: Identifie l’interface de montage qui relie le mât à la planche
        ou à l’adaptateur.
    mast_bend_curve:
      name: Courbe de flexion du mât
      description: Profil de flexion du mât, qui détermine la compatibilité avec la
        voile et la maniabilité.
    mast_diameter_type:
      name: Catégorie de diamètre du mât
      description: Classification normalisée du diamètre du mât de planche à voile
        (p. ex., RDM, SDM, MDM), utilisée pour vérifier la compatibilité.
    mat_backing_type:
      name: Type d’envers du tapis
      description: Spécifie le type d’envers situé sous le tapis, conçu pour le maintenir
        en place sur différentes surfaces.
    mat_installation_method:
      name: Méthode de pose du tapis
      description: Indique comment le tapis s’installe ou se fixe.
    mat_style:
      name: Type de tapis
      description: Définit la structure ou la forme du tapis (p. ex., tapis pliant,
        dalle emboîtable, tapis de réception).
    maternity_panel_type:
      name: Type d’empiècement de maternité
      description: Indique le type d’empiècement extensible ou de ceinture conçu pour
        s’adapter au ventre pendant la grossesse.
    maternity_waistband_style:
      name: Type de ceinture de maternité
      description: Indique la conception et l’emplacement de la ceinture ou de l’empiècement
        ventral des pantalons de maternité, ainsi que le soutien du ventre assuré
        par le vêtement pendant la grossesse.
    mattress_top_type:
      name: Type de dessus de matelas
      description: Spécifie le style de la couche supérieure ou de la surface du matelas,
        par exemple dessus coussiné ou dessus tendu.
    maturation_vessel_material:
      name: Matériau de la cuve de maturation
      description: Spécifie le matériau principal du récipient ou du fût utilisé pour
        faire vieillir le shochu.
    maximum_quilt_size_supported:
      name: Taille maximale de quilt prise en charge
      description: Taille maximale de quilt ou d’ouvrage que le cadre peut recevoir,
        généralement exprimée en taille de lit ou en largeur maximale.
    meal_course:
      name: Moment du repas
      description: Identifie le moment du repas auquel le produit est généralement
        destiné.
    meal_preparation_state:
      name: État d'avancement de la préparation des repas
      description: Indique le niveau de préparation requis avant consommation (p.
        ex., prêt à consommer, kit repas).
    meat_processing_state:
      name: État de la transformation de la viande
      description: Indique le degré de cuisson ou de salaison appliqué au produit
        carné avant la vente.
    meat_quality_grade:
      name: Catégorie de qualité de la viande
      description: Indique le grade de qualité ou la classification attribués à la
        viande par un organisme de classement reconnu (p. ex., USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Allégation sur le mode d’élevage
      description: Présente les allégations courantes relatives au bien-être animal
        ou aux pratiques d’élevage associées à la viande (p. ex., nourri à l’herbe,
        élevé en plein air).
    mechanical_loom_assembly_status:
      name: État d’assemblage du métier à tisser mécanique
      description: État dans lequel le métier à tisser est expédié ou livré, selon
        l’assemblage requis.
    mechanical_loom_weaving_type:
      name: Type de tissage du métier mécanique
      description: Mécanisme ou type de tissage principal pris en charge par le métier.
    mechanical_puzzle_primary_mechanism:
      name: Mécanisme principal du casse-tête mécanique
      description: Interaction ou mécanisme principal utilisé pour résoudre le casse-tête
        mécanique.
    mechanical_puzzle_solution_format:
      name: Format de solution du casse-tête mécanique
      description: Format dans lequel les indices ou les solutions sont fournis lorsqu’ils
        sont inclus.
    medal_attachment_style:
      name: Type de fixation de la médaille
      description: Spécifie la manière dont la médaille est destinée à être portée
        ou présentée (p. ex., ruban de cou, attache à épingle).
    medal_award_level:
      name: Niveau de récompense de la médaille
      description: Spécifie le niveau de récompense représenté par la médaille (p.
        ex., 1re place, participant).
    medal_finish:
      name: Finition de la médaille
      description: Spécifie la finition de surface de la médaille, c’est-à-dire son
        éclat ou sa texture, indépendamment du matériau.
    medal_packaging:
      name: Emballage de la médaille
      description: Indique le type d’emballage de présentation fourni avec la médaille.
    melodica_accessory_set_included:
      name: Accessoires inclus avec le mélodica
      description: Accessoires courants inclus dans l’ensemble fourni avec le mélodica.
    melodica_air_chamber_material:
      name: Matériau de la chambre à air du mélodica
      description: Matériau de la chambre à air ou du corps du mélodica (ABS, bois,
        etc.), lorsque les vendeurs distinguent cette partie des autres composants.
    melodica_included_accessories:
      name: Accessoires fournis avec la mélodica
      description: Accessoires fournis avec la mélodica dans la boîte.
    melodica_key_color_scheme:
      name: Agencement des couleurs des touches du mélodica
      description: Agencement des couleurs des touches, et non du corps de l’instrument,
        qui améliore la lisibilité, en particulier pour les enfants et les débutants.
    melodica_mouthpiece_configuration:
      name: Configuration de l’embouchure du mélodica
      description: Indique quels éléments de souffle sont inclus ou utilisés pour
        jouer du mélodica.
    melodica_mouthpiece_type:
      name: Type d’embouchure du mélodica
      description: Type d’élément de souffle fourni avec le mélodica (embouchure et/ou
        tuyau flexible).
    melodica_reed_plate_material:
      name: Matériau de la plaque d'anche de la mélodica
      description: Matériau de la plaque d’anches, distinct du matériau du corps de
        l’instrument, et pouvant modifier la durabilité et la sonorité.
    melodica_size_class:
      name: Catégorie de taille du mélodica
      description: Catégorie générale de taille ou de portabilité d’un mélodica, généralement
        fondée sur le nombre de touches et le format de l’instrument (p. ex., mini
        ou élève, standard, ou modèle à tessiture étendue).
    melon_variety:
      name: Variété de melon
      description: Spécifie le type précis de melon présent dans le produit, afin
        d’aider les acheteurs à repérer rapidement la variété recherchée.
    memory_foam_infusion_material:
      name: Substance infusée dans la mousse à mémoire de forme
      description: Identifie les substances particulières intégrées à la mousse à
        mémoire de forme pour rafraîchir, limiter les odeurs ou exercer une action
        antimicrobienne.
    memory_wire_gauge:
      name: Calibre du fil à mémoire de forme
      description: Spécifie le calibre American Wire Gauge (AWG) du fil à mémoire
        de forme.
    memory_wire_project_size:
      name: Format de bijou prévu pour le fil à mémoire de forme
      description: Spécifie la forme de bijou ou le diamètre de spirale prévu pour
        le fil à mémoire de forme (p. ex., bracelet, collier, bague).
    metal_purity:
      name: Pureté du métal
      description: Indique le titre ou le degré de pureté du métal utilisé dans le
        bijou, généralement exprimé en carats (K) ou en millièmes.
    metrics_counted:
      name: Mesures comptabilisées
      description: Énumère les statistiques ou les événements que le compteur est
        conçu pour suivre.
    metronome_display_style:
      name: Mode d’affichage du métronome
      description: Spécifie la manière dont le tempo est affiché ou indiqué à l’utilisateur
        (aiguille ou balancier, affichage numérique LED/LCD ou témoin lumineux clignotant).
    metronome_output_method:
      name: Mode de sortie du métronome
      description: Spécifie les modes de sortie disponibles pour le son ou le signal
        rythmique du métronome.
    microphone_toy_feature_set:
      name: Fonctions du microphone jouet
      description: Principales fonctionnalités ludiques des microphones jouets (effets
        vocaux, amplification, enregistrement, etc.).
    midi_output_type:
      name: Type de sortie MIDI
      description: Spécifie le ou les types de sortie MIDI fournis par le module de
        déclenchement.
    military_branch:
      name: Force armée
      description: Identifie la force armée pour laquelle l’uniforme est fourni ou
        dont il s’inspire.
    milk_base_type:
      name: Type de base lactée
      description: Spécifie le lait ou le substitut de lait principal utilisé dans
        la boisson, le cas échéant.
    milk_feeding_method:
      name: Méthode d'alimentation au lait
      description: Indique le mode d’alimentation des animaux d’origine (p. ex., nourris
        à l’herbe ou aux céréales), qui peut modifier le goût et le profil nutritionnel.
    milk_processing_method:
      name: Procédé de transformation du lait
      description: Spécifie le traitement ou le procédé de transformation appliqué
        au lait, qui détermine sa sécurité sanitaire, sa durée de conservation et
        ses propriétés nutritionnelles.
    milk_source_animal:
      name: Animal producteur de lait
      description: Identifie l’animal dont provient le lait, afin d’aider les consommateurs
        à choisir entre lait de vache, de chèvre, de bufflonne ou d’une autre espèce.
    millet_processing_method:
      name: Procédé de transformation du millet
      description: Indique le principal mode de transformation ou l’état du grain
        de millet (p. ex., non poli, décortiqué, germé).
    millet_variety:
      name: Variété de millet
      description: Identifie le type précis de millet contenu dans le produit (p.
        ex., millet perlé, millet des oiseaux, millet à doigts).
    milling_process:
      name: Procédé de mouture
      description: Indique la méthode de production utilisée pour moudre la farine
        ou la semoule, qui peut modifier le goût, l’exposition à la chaleur et le
        profil nutritionnel.
    mint_mark:
      name: Marque d’atelier
      description: Marque d’atelier telle qu’elle apparaît sur la pièce, le cas échéant.
    mirror_configuration:
      name: Configuration des miroirs
      description: Spécifie le style ou la structure du miroir inclus dans l’ensemble
        de coiffeuse.
    mirror_coverage:
      name: Étendue des miroirs
      description: Décrit l’étendue des panneaux de miroir sur les portes coulissantes.
    mirror_curvature_type:
      name: Type de courbure du miroir
      description: Spécifie si la surface du miroir est convexe, plane ou concave,
        ce qui modifie le champ de vision.
    mirror_mounting_location:
      name: Emplacement de fixation du miroir
      description: Spécifie l’emplacement prévu pour fixer le miroir sur le vélo ou
        sur le cycliste.
    mirror_shape:
      name: Forme du miroir
      description: Indique la forme géométrique ou le style du miroir principal inclus
        dans l’ensemble de coiffeuse.
    mix_ratio:
      name: Rapport de mélange
      description: Spécifie le rapport de dilution recommandé entre le liquide de
        refroidissement et l’eau pour les concentrés, ou confirme le rapport de prémélange
        fixe des produits prédilués.
    mma_glove_type:
      name: Type de gant de MMA
      description: Indique l’usage principal prévu ou le style du gant pour l’entraînement
        ou la compétition de MMA.
    mobility_features:
      name: Fonctions de mobilité
      description: Indique les éléments intégrés qui facilitent le déplacement ou
        la portabilité, comme les roulettes ou les pieds pliables.
    model_aircraft_assembly_level:
      name: Niveau d’assemblage du modèle réduit d’avion
      description: Indique le niveau d’assemblage requis avant que le modèle réduit
        d’avion puisse être utilisé.
    model_making_kit_items_included:
      name: Éléments inclus dans le kit de modélisme
      description: Énumère les éléments inclus dans un kit ou un ensemble de modélisme
        (p. ex., peinture, colle, pinceau).
    model_making_product_type:
      name: Type de produit de modélisme
      description: Identifie la nature fondamentale de l’article dans le modélisme
        (kit, accessoire, outil ou fourniture), afin d’améliorer la navigation et
        le filtrage parmi des types de produits variés.
    model_rocket_kit_contents:
      name: Contenu du kit de fusée miniature
      description: Indique si le produit est un kit complet de fusée miniature à plusieurs
        étages ou un kit complémentaire, de module ou de pièces (p. ex., composants
        d’étage d’appoint ou d’étage principal).
    model_rocket_kit_format:
      name: Format de kit de fusée miniature
      description: Indique si la fusée est vendue en kit et précise son niveau de
        préparation à l’assemblage.
    model_rocket_motor_impulse_class:
      name: Classe d’impulsion du moteur de fusée miniature
      description: Indique la classe normalisée d’impulsion totale du moteur de fusée
        miniature (p. ex., A, B, C…).
    model_rocket_motor_mount_size:
      name: Taille du support moteur de fusée miniature
      description: Spécifie le diamètre de moteur compatible avec le support moteur
        de la fusée.
    model_rocket_power_source_required:
      name: Source d’énergie requise pour la fusée miniature
      description: Indique si le produit nécessite des piles ou une source d’énergie
        externe et, le cas échéant, de quel type.
    model_rocket_propellant_type:
      name: Type de propergol de fusée miniature
      description: Identifie le système de propergol ou de moteur utilisé pour propulser
        les fusées miniatures.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Taille recommandée de la tige ou du rail de lancement
      description: Spécifie le diamètre de la tige de lancement ou le format du rail
        pour lequel la fusée est conçue (p. ex., tige de 1/8 po, rail de lancement 1010).
    model_rocket_recovery_method:
      name: Mode de récupération de la fusée miniature
      description: Système de récupération principal utilisé pour ramener la fusée
        en toute sécurité après son vol.
    model_rocket_recovery_system_type:
      name: Type de système de récupération de la fusée miniature
      description: Spécifie la principale méthode de récupération utilisée pour assurer
        le retour sécurisé de la fusée après le vol.
    model_rocket_staging:
      name: Étages de la fusée miniature
      description: Indique le nombre d’étages propulsés prévus pour le vol de la fusée
        miniature.
    model_train_accessory_electrical_connection_type:
      name: Type de connexion électrique de l’accessoire de train miniature
      description: Spécifie le type de connecteur ou de borne utilisé pour raccorder
        des accessoires de train miniature alimentés au réseau, le cas échéant.
    model_train_coupler_type:
      name: Type d’attelage de train miniature
      description: Spécifie la norme d’attelage installée sur le matériel roulant
        ou la locomotive de train miniature.
    model_train_gauge:
      name: Échelle de modélisme ferroviaire
      description: Spécifie l’écartement ou le système de voie auquel l’accessoire
        est destiné, le cas échéant, afin d’aider les utilisateurs à vérifier sa compatibilité
        avec leur voie et leur réseau.
    model_train_lighting_features:
      name: Caractéristiques de l'éclairage des trains miniatures
      description: Spécifie la fonction d’éclairage incluse sur le train miniature
        ou la locomotive.
    model_train_power_pickup_method:
      name: Mode de captation de l’énergie du train miniature
      description: Spécifie la manière dont le modèle reçoit l’énergie nécessaire
        à son fonctionnement (p. ex., alimentation par la voie, piles, etc.).
    model_train_scale:
      name: Échelle des trains miniatures
      description: Spécifie l’échelle ou la norme de taille du train miniature, c’est-à-dire
        le rapport entre le modèle et le train réel.
    model_train_sound_features:
      name: Fonctions sonores du train miniature
      description: Indique si le modèle comporte des effets sonores intégrés et, le
        cas échéant, le type de fonctions sonores proposées.
    model_train_track_gauge:
      name: Écartement de voie du train miniature
      description: Spécifie l’écartement ou la norme du système de voie sur lequel
        le modèle est conçu pour circuler (p. ex., écartement standard, variantes
        à voie étroite ou écartements propres à une marque ou à un système, le cas
        échéant).
    modeling_dough_base_material:
      name: Composition de base de la pâte à modeler
      description: Base ou composition principale de la pâte à modeler (p. ex., à
        base de blé ou de farine, ou à base de polymères).
    modeling_dough_features:
      name: Caractéristiques de la pâte à modeler
      description: Principales caractéristiques fonctionnelles de la pâte à modeler
        que les acheteurs utilisent couramment pour filtrer les produits.
    modification_level:
      name: Degré de modification
      description: Indique le degré de modification du malt, c’est-à-dire dans quelle
        mesure l’endosperme et les protéines de l’orge ont été dégradés, généralement
        selon les niveaux sous-modifié, modifié ou surmodifié.
    molasses_base_ingredient:
      name: Ingrédient de base de la mélasse
      description: Identifie la plante ou le fruit dont la mélasse est principalement
        issue.
    molasses_grade:
      name: Grade de mélasse
      description: Classe la mélasse selon son stade d’extraction ou de raffinage,
        qui détermine directement l’intensité aromatique, la couleur et le profil
        nutritionnel.
    mold_material:
      name: Matériau du moule
      description: Matériau principal du moule lui-même (p. ex., silicone, plastique,
        métal).
    molle_compatibility:
      name: Compatibilité MOLLE
      description: Indique si le gilet comporte des sangles MOLLE/PALS pour fixer
        des pochettes et accessoires modulaires.
    motor_belt_type:
      name: Type de courroie du moteur
      description: Définit le profil de la courroie utilisée dans le système d’entraînement
        du tapis de course.
    motor_configuration:
      name: Configuration du moteur
      description: Indique le nombre de moteurs d’entraînement indépendants utilisés
        par le scooter.
    motor_mounting_configuration:
      name: Configuration de montage du moteur
      description: Décrit le mode de montage ou d’intégration du moteur dans le kit
        de conversion pour scooter.
    motor_mounting_position:
      name: Position de montage du moteur
      description: Indique l’emplacement du moteur sur la trottinette électrique,
        par exemple dans le moyeu avant, dans le moyeu arrière, dans les deux moyeux
        ou en position centrale.
    motor_position:
      name: Position du moteur
      description: Indique l’emplacement du moteur sur le vélo électrique, qui conditionne
        la maniabilité et l’entretien.
    motor_vehicle_a_v_integration_features:
      name: Fonctions d’intégration audio/vidéo embarquées
      description: Fonctions d’intégration avec smartphone et véhicule prises en charge
        par l’unité multimédia (p. ex., Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Position ou fonction de l’ampoule dans le véhicule
      description: Spécifie la position ou la fonction d’éclairage du véhicule à laquelle
        l’ampoule est destinée (p. ex., feu de croisement, feu stop).
    motor_vehicle_bulb_approval_standard:
      name: Norme d’homologation de l’ampoule du véhicule
      description: Indique le marquage de conformité ou d’homologation réglementaire
        pour un usage routier sur le marché visé.
    motor_vehicle_oxygen_sensor_bank:
      name: Ensemble de sondes à oxygène pour véhicules à moteur
      description: Indique le banc de cylindres sur lequel se monte le capteur d’oxygène
        (p. ex., banc 1 ou banc 2) pour les moteurs en V ou à plat ; utiliser Sans
        objet pour les moteurs en ligne.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Nombre de fils du capteur d’oxygène du véhicule
      description: Nombre de fils du faisceau du capteur d’oxygène.
    motor_vehicle_oxygen_sensor_position:
      name: Position du capteur d’oxygène du véhicule
      description: Spécifie l’emplacement du capteur d’oxygène (O2) dans le système
        d’échappement, par rapport au catalyseur.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Numéro du capteur d’oxygène du véhicule
      description: Indique le numéro du capteur (p. ex., capteur 1 ou capteur 2) dans
        une désignation donnée de banc ou de position.
    motor_vehicle_oxygen_sensor_type:
      name: Type de capteur d'oxygène pour véhicules à moteur
      description: Spécifie la conception ou la technologie du capteur d’oxygène.
    motor_vehicle_paint_application_method:
      name: Mode d’application de la peinture automobile
      description: Mode d’application prévu de la peinture sur la surface du véhicule.
    motor_vehicle_paint_system_step:
      name: Étape du système de peinture automobile
      description: Indique l’étape ou le composant du système de peinture de réparation
        automobile auquel le produit est destiné (p. ex., apprêt, couche de base,
        vernis transparent).
    motor_vehicle_speaker_mounting_type:
      name: Type de montage du haut-parleur du véhicule
      description: Mode d’installation prévu du haut-parleur dans le véhicule (format
        de montage).
    motor_vehicle_subwoofer_size:
      name: Dimensions des subwoofers pour véhicules
      description: Diamètre nominal du haut-parleur de grave (p. ex., 8 po, 10 po,
        12 po), utilisé pour vérifier l’espace disponible dans le véhicule et la compatibilité
        avec le caisson.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Configuration de la bobine mobile du haut-parleur de grave du véhicule
      description: Nombre ou configuration de bobines mobiles permettant d’adapter
        les options de câblage de l’amplificateur (p. ex., SVC ou DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impédance de la bobine mobile du haut-parleur de grave du véhicule (par
        bobine)
      description: Impédance nominale de chaque bobine mobile, et non impédance finale
        résultant du câblage, utilisée pour les calculs de câblage.
    motor_vehicle_voltage_regulator_type:
      name: Type de régulateur de tension du véhicule
      description: Indique la technologie ou la forme du régulateur utilisé dans les
        véhicules.
    motorcycle_armor_certification_standard:
      name: Norme de certification des équipements de protection pour motocyclistes
      description: Indique les normes officielles de sécurité auxquelles le protecteur
        est certifié conforme (p. ex., EN 1621-2 pour les protections dorsales, EN
        1621-3 pour les protections thoraciques).
    motorcycle_cover_size_class:
      name: Classe de taille de la housse de moto
      description: Classe de taille normalisée pour les housses de protection de moto,
        fondée sur la catégorie habituelle ou la plage de longueur de moto compatible.
    motorcycle_glove_certification_standard:
      name: Norme de certification des gants de moto
      description: Spécifie la certification ou la norme de protection à laquelle
        les gants sont conformes (p. ex., niveaux EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Type d’imperméabilisation des gants de moto
      description: Spécifie le procédé d’imperméabilisation utilisé dans le gant,
        le cas échéant.
    motorcycle_guard_coverage_area:
      name: Zone couverte par la protection de moto
      description: Zone principale couverte par le produit (coude, poignet, avant-bras,
        zones combinées).
    motorcycle_kidney_belt_construction_type:
      name: Type de construction de la ceinture lombaire de moto
      description: Type de construction de la ceinture lombaire, qui détermine la
        rigidité, la ventilation et le niveau de protection.
    motorcycle_kidney_belt_purpose:
      name: Usage de la ceinture lombaire de moto
      description: Identifie le style de conduite ou le contexte d’utilisation principal
        auquel la ceinture lombaire de moto est destinée.
    motorcycle_luggage_capacity_class:
      name: Classe de capacité du bagage de moto
      description: Indique la capacité volumique du bagage de moto, exprimée sous
        forme de plage en litres.
    motorcycle_luggage_mounting_system:
      name: Système de fixation du bagage de moto
      description: Système d’attache ou de fixation utilisé pour fixer le sac ou la
        sacoche à la moto (p. ex., sangles cavalières, fixation rapide sur porte-bagages).
    motorcycle_luggage_side:
      name: Côté du bagage de moto
      description: Pour les sacoches latérales, indique si l’article est destiné au
        côté gauche, au côté droit ou à une paire.
    motorcycle_protective_gear_size_system:
      name: Système de tailles de l’équipement de protection moto
      description: Indique le système de tailles utilisé pour le produit (p. ex.,
        tailles alphabétiques, tailles numériques, taille unique).
    motorcycle_rack_carrier_style:
      name: Type de support de transport pour moto
      description: Décrit le type fonctionnel de support utilisé pour transporter
        une moto ou un scooter (p. ex., à plate-forme, à rail, avec assistance au
        levage).
    motorcycle_riding_discipline:
      name: Discipline de pratique moto
      description: Indique la discipline principale pour laquelle la minerve a été
        conçue.
    motorcycle_tire_speed_rating:
      name: Indice de vitesse du pneu de moto
      description: Identifie la vitesse maximale continue pour laquelle le pneu est
        homologué, au moyen du code alphabétique standard (p. ex., H, V, W).
    motorsport_window_net_certification:
      name: Certification du filet de fenêtre pour sport automobile
      description: Certification ou homologation de sécurité en course à laquelle
        le filet de fenêtre est conforme (p. ex., SFI ou FIA), avec le numéro de spécification
        le cas échéant.
    mound_usage_type:
      name: Type d’usage du monticule de lancer
      description: Identifie le contexte d’utilisation prévu du monticule de lancer,
        par exemple l’entraînement, un match, l’aire d’échauffement des lanceurs ou
        un usage polyvalent.
    mount_attachment_method:
      name: Méthode de fixation
      description: Spécifie le mode de fixation du support à la surface ou à la structure
        du véhicule.
    mountainboard_truck_type:
      name: Type d’essieu du mountainboard
      description: Classe les essieux fournis avec la planche selon leur type, qui
        détermine la réponse en virage et la durabilité.
    mounting_attachment_method:
      name: Mode de montage ou de fixation
      description: Mode de fixation prévu du support ou du sac sur un tambour, un
        pied, une ceinture ou toute autre surface.
    mounting_attachment_type:
      name: Type de fixation
      description: Mode de fixation ou de raccordement de l’accessoire de rapport
        au rouet.
    mounting_hardware_included_for_installation:
      name: Matériel de fixation inclus (pour l’installation)
      description: Indique si le matériel de fixation nécessaire à l’installation
        du siège arrière est inclus avec le produit (p. ex., supports, boulons, rails).
    mounting_location:
      name: Emplacement de fixation
      description: Spécifie l’emplacement prévu de la lampe ou du réflecteur sur l’équipement
        ou sur le corps (p. ex., la fourche avant, le casque, les rayons de roue).
    mounting_method:
      name: Mode de montage
      description: Mode de montage ou de fixation d’un porte-baguettes ou porte-balais
        (p. ex., à pince, à sangle ou adhésif).
    mounting_position:
      name: Position de montage
      description: Spécifie l’emplacement prévu pour installer la commande de frein
        à main dans l’habitacle du véhicule.
    mounting_rail_type:
      name: Type de rail de montage
      description: Spécifie la norme de rail ou d’interface sur laquelle se fixe l’accessoire,
        par exemple Picatinny ou M-LOK.
    mounting_receiver_size:
      name: Taille du récepteur d’attelage
      description: Taille de récepteur d’attelage requise pour les porte-charges montés
        sur attelage.
    mounting_storage_type:
      name: Type de montage ou de rangement
      description: Mode de montage ou de rangement prévu du dispositif sur l’embarcation
        ou sur l’utilisateur.
    mouth_grip_type:
      name: Type de prise buccale
      description: Décrit le type de prise ou de protection buccale du sifflet, conçu
        pour le confort et l’hygiène.
    mouthguard_mold_type:
      name: Mode d’ajustement du protège-dents
      description: Décrit la manière dont le protège-dents s’ajuste aux dents du sportif
        (p. ex., thermoformable à mordre, ajustement dentaire sur mesure).
    mouthpiece_facing_length:
      name: Longueur de table de l’embouchure
      description: Indique la catégorie de longueur de la courbe de table de l’embouchure,
        distincte de la longueur totale, qui conditionne la réponse, la résistance
        et la compatibilité avec l’anche.
    mouthpiece_material:
      name: Matériau de l’embout buccal
      description: Spécifie le matériau de l’embout buccal d’un sans-gêne, qui peut
        différer du matériau du corps principal.
    mouthpiece_shank_receiver_size:
      name: Taille de la tige ou du récepteur de l’embouchure
      description: Spécifie la norme de tige ou de récepteur d’embouchure compatible
        avec le bugle.
    mouthpiece_shank_size:
      name: Taille de la tige d’embouchure
      description: Spécifie la norme d’ajustement de la tige ou du récepteur d’embouchure
        afin d’assurer la compatibilité avec l’instrument de la famille des cuivres
        visé.
    mouthpiece_shank_type:
      name: Type de tige d'embouchure
      description: Spécifie la norme de tige ou de récepteur d’embouchure applicable,
        le cas échéant.
    mouthpiece_style:
      name: Style d'embouchure
      description: Classe la forme ou la conception du canon du mors de bride, qui
        détermine les points de pression, la sévérité du mors et les préférences du
        cheval.
    mouthpiece_type:
      name: Type d'embouchure
      description: Type d’embout à l’extrémité de soufflage (intégré, amovible ou
        ajouté).
    movement_mechanism:
      name: Mécanisme de mouvement
      description: Définit le mouvement du banc pendant l’utilisation (p. ex., balancement,
        glissement ou bascule).
    muffin_size:
      name: Taille du muffin
      description: Classe le muffin selon son format de taille (p. ex., mini, standard
        ou géant).
    mushroom_variety:
      name: Variété de champignon
      description: Identifie l’espèce ou la variété précise de champignon ou de truffe
        contenue dans le produit (p. ex., shiitaké, pleurote du panicaut, truffe noire).
    music_stand_desk_tilt_adjustment:
      name: Réglage de l’inclinaison du plateau du pupitre
      description: Indique si et comment l'inclinaison du bureau peut être réglée.
    music_stand_intended_use:
      name: Usage prévu du pupitre de musique
      description: Indique le contexte ou l’usage principal auquel le pupitre est
        destiné.
    musical_block_pitch_type:
      name: Type de hauteur du bloc musical
      description: Décrit si le bloc musical produit une hauteur définie (accordée)
        ou une hauteur indéfinie.
    musical_box_mechanism_type:
      name: Type de mécanisme de boîte à musique
      description: Mode de production ou de restitution du son par la boîte à musique
        (p. ex., mécanisme à remontoir ou lecture électronique).
    musical_keyboard_case_fit_type:
      name: Type d’ajustement de l’étui pour clavier musical
      description: Décrit la manière dont l’étui est dimensionné pour l’instrument
        (p. ex., plage de tailles universelle ou générique, ajustement propre à un
        modèle ou ajustement sur mesure).
    musical_ratchet_sound_character:
      name: Caractère sonore de la crécelle musicale
      description: Description générale du timbre et de l’intensité sonore de la crécelle.
    musical_scraper_groove_surface_material:
      name: Matériau de la surface rainurée du racleur musical
      description: Spécifie le matériau de la surface striée ou rainurée du racleur,
        qui peut différer du matériau du corps.
    musical_scraper_type:
      name: Type de racleur musical
      description: Spécifie le style ou la conception du racleur musical (p. ex.,
        güiro ou reco-reco), qui conditionne le son et la technique de jeu.
    mute_attachment_method:
      name: Méthode de fixation silencieuse
      description: Spécifie le mode de fixation ou de maintien d’une sourdine sur
        la cymbale (p. ex., gel, adhérence électrostatique, aimant ou pince).
    mute_attenuation_level:
      name: Niveau d’atténuation de la sourdine
      description: Indique dans quelle mesure la sourdine réduit le volume perçu,
        en particulier pour les sourdines d’entraînement.
    mute_cork_padding_material:
      name: Matériau du liège ou du rembourrage de la sourdine
      description: Spécifie le matériau de la garniture de contact de la sourdine
        (p. ex., bande ou coussinets de liège), utilisée pour l’adhérence, l’ajustement
        et la protection du pavillon.
    mute_coverage_type:
      name: Type de couverture « Mute »
      description: Indique le style ou l’étendue de contact de la sourdine sur la
        surface de jeu, des petits atténuateurs localisés aux sourdines d’entraînement
        couvrant toute la surface.
    mute_finish:
      name: Finition de la sourdine
      description: Finition de surface de la sourdine pouvant modifier la durabilité
        et l’aspect (p. ex., polie ou satinée).
    name_label_text_template:
      name: Modèle de texte de l’étiquette nominative
      description: Spécifie le texte ou le modèle prédéfini imprimé sur l’étiquette
        nominative (p. ex., « Appartient à », « Fabriqué par »).
    napkin_ply:
      name: Nombre de plis de la serviette
      description: Indique l’épaisseur de la serviette à cocktail selon le nombre
        de couches.
    neck_brace_fit_system:
      name: Système d’ajustement de la minerve de protection
      description: Indique la principale méthode utilisée pour ajuster la minerve
        de protection et la maintenir sur le pilote.
    neck_brace_size_basis:
      name: Critère de taille de la minerve de protection
      description: Indique le critère de dimensionnement utilisé pour choisir la taille
        appropriée de la minerve de protection.
    neck_configuration:
      name: Configuration du cou
      description: Spécifie le style ou la configuration du bocal fourni avec le saxophone,
        avec une incidence sur l’ergonomie et la facilité de jeu.
    neck_coverage_type:
      name: Type de protection du cou
      description: Spécifie le type de protection du cou fourni avec la couverture.
    neck_support_size_system:
      name: Système de tailles du support cervical
      description: Indique le système de tailles utilisé pour le support cervical
        de course (p. ex., adulte, jeune ou taille unique).
    necklace_length_type:
      name: Type de longueur de collier
      description: Spécifie la catégorie conventionnelle de longueur du collier, par
        exemple ras-du-cou ou collier opéra, afin de faciliter le choix par style.
    needle_balance_zone:
      name: Zone d’équilibrage de l’aiguille
      description: Indique la zone d’équilibrage magnétique ou l’hémisphère pour lequel
        l’aiguille de la boussole est réglée, afin d’assurer des relevés précis dans
        le monde entier.
    needle_case_format:
      name: Format de l’étui à aiguilles
      description: Format général de rangement de l’étui à aiguilles.
    needle_damping_type:
      name: Type d'amortissement de l'aiguille
      description: Décrit la manière dont l’aiguille de la boussole est stabilisée
        (p. ex., par liquide, à sec ou par stabilisation électronique), ce qui modifie
        le temps de stabilisation et la durabilité.
    needle_felting_needle_profile:
      name: Profil de l’aiguille de feutrage
      description: Section ou profil de l’aiguille de feutrage, qui détermine le déplacement
        des fibres et le rendu obtenu.
    needle_holder_features:
      name: Caractéristiques du porte-aiguilles
      description: Caractéristiques fonctionnelles notables du porte-aiguille.
    needle_holder_mounting_attachment_method:
      name: Mode de fixation du porte-aiguilles
      description: Mode de fixation ou d’utilisation du porte-aiguilles pendant le
        rangement (p. ex., magnétique, à pince ou à sangle).
    needle_holder_style:
      name: Type de porte-aiguille
      description: Style ou conception matérielle du porte-aiguilles pour le rangement
        ou le transport.
    needle_pushing_surface_type:
      name: Type de surface d’appui pour aiguille
      description: Type ou conception de la surface d’appui de la paumelle de couture
        destinée à pousser l’aiguille (p. ex., creux métallique, disque ou pièce renforcée).
    needle_requirement_beading_pattern:
      name: Aiguille requise (modèle de perlage)
      description: Type ou taille d’aiguille recommandés par le modèle.
    needle_size_system:
      name: Système de tailles des aiguilles
      description: Norme de taille utilisée pour l’étiquetage des aiguilles.
    needle_threader_compatible_needle_type:
      name: Type d’aiguille compatible avec l’enfile-aiguille
      description: Spécifie les types d’aiguilles compatibles avec l’enfile-aiguille,
        selon la catégorie ou l’usage de l’aiguille.
    needle_threader_mechanism_type:
      name: Type de mécanisme d'enfilage d'aiguille
      description: Décrit la manière dont l’enfile-aiguille saisit le fil et le fait
        passer dans le chas de l’aiguille.
    needle_threader_packaging_type:
      name: Type de conditionnement de l’enfile-aiguille
      description: Mode de vente ou de conditionnement du produit (p. ex., à l’unité,
        en lot multiple ou en ensemble).
    needlecraft_fabric_color_family:
      name: Famille de couleurs du tissu pour ouvrages à l’aiguille
      description: Famille de couleurs normalisée du tissu à armure régulière, utilisée
        avec la couleur pour le facettage.
    needlecraft_fabric_composition:
      name: Composition du tissu pour ouvrages à l’aiguille
      description: Spécifie la composition en fibres ou le mélange de fibres du tissu
        pour ouvrages à l’aiguille (p. ex., 100 % coton, mélange lin-coton).
    needlecraft_fabric_weave_type:
      name: Type d’armure du tissu pour ouvrages à l’aiguille
      description: Spécifie l’armure ou la construction du lin pour ouvrages à l’aiguille
        (p. ex., armure régulière ou lin traditionnel), qui détermine le comportement
        des points et l’aspect du travail.
    needlecraft_kit_items_included:
      name: Éléments inclus dans le kit d’ouvrages à l’aiguille
      description: Énumère les principaux composants inclus dans le kit d’ouvrages
        à l’aiguille, notamment les outils et les consommables.
    needlecraft_kit_project_type:
      name: Type de projet du kit d’ouvrages à l’aiguille
      description: Identifie l’ouvrage fini obtenu avec le kit, c’est-à-dire le résultat
        du projet.
    needlecraft_stitching_coverage:
      name: Étendue des points sur le tissu pour ouvrages à l’aiguille
      description: Indique si les points sont réalisés sur un fil ou un carré, ou
        sur deux fils, distinction courante pour les tissus à armure régulière et
        le lin.
    needlepoint_canvas_mesh_count:
      name: Nombre de fils par pouce de la toile à tapisserie
      description: Nombre de fils par pouce prévu pour la toile à tapisserie du diagramme,
        couramment appelé densité de toile.
    needlepoint_frame_canvas_attachment_method:
      name: Mode de fixation de la toile au cadre à tapisserie
      description: Décrit la manière dont la toile à tapisserie est fixée au cadre
        à tapisserie.
    needlepoint_frame_compatible_stand_type:
      name: Type de support compatible avec le cadre à tapisserie
      description: Si le cadre est conçu pour être monté sur un support, spécifie
        le ou les types de supports compatibles.
    needlepoint_frame_contents:
      name: Contenu du cadre à tapisserie
      description: Énumère les composants et accessoires inclus avec le cadre à tapisserie
        (p. ex., cadre, barres ou tiges supplémentaires, clous ou épingles, bandes
        de maintien, sac de transport).
    needlepoint_frame_tension_adjustment_type:
      name: Type de réglage de la tension du cadre à tapisserie
      description: Indique si la tension du cadre peut être réglée pendant l’utilisation
        et, le cas échéant, de quelle manière.
    needlepoint_pattern_chart_format:
      name: Format de diagramme pour la broderie
      description: Mode de représentation du motif à broder pour l’exécution des points
        (diagramme ou guide imprimé/peint).
    needlepoint_project_type:
      name: Type de projet de tapisserie à l’aiguille
      description: Objet fini ou catégorie de projet auxquels le motif de tapisserie
        à l’aiguille est destiné.
    net_design:
      name: Type de construction du filet
      description: Identifie le type de construction du filet et indique s’il peut
        se rétracter ou se plier pour faciliter le transport.
    net_mesh_pattern:
      name: Motif des mailles du filet
      description: Spécifie la forme géométrique des ouvertures du filet, qui peut
        modifier la visibilité et la résistance du filet.
    net_twine_gauge:
      name: Calibre du fil de filet
      description: Indique l’épaisseur ou la résistance du fil du filet, traditionnellement
        exprimée par un numéro de jauge (p. ex., 18, 36).
    nicotine_source:
      name: Source de nicotine
      description: Indique si la nicotine du produit est issue du tabac, si elle est
        synthétique ou si le produit ne contient pas de nicotine.
    nipple_drive_interface:
      name: Interface d’entraînement de l’écrou de rayon
      description: Identifie le style ou la norme de l’interface d’entraînement ou
        de la tête de l’écrou de rayon, externe ou interne, qui détermine l’outil
        requis et la méthode de montage de la roue.
    nock_activation_method:
      name: Mode d’activation de l’encoche
      description: Spécifie le mécanisme d’activation ou de désactivation de la DEL
        de l’encoche lumineuse de la flèche (p. ex., pression exercée par la corde,
        capteur de mouvement ou interrupteur manuel).
    nock_fitment_code:
      name: Code d’ajustement de l’encoche
      description: Code du fabricant ou du secteur qui identifie la famille ou la
        série à laquelle appartient l’encoche.
    nock_throat_size:
      name: Taille de la gorge de l’encoche
      description: Spécifie la taille de la gorge de l’encoche qui s’enclenche sur
        la corde d’arc.
    nock_transparency_level:
      name: Niveau de transparence de l'encoche
      description: Décrit le degré de transparence du matériau de l’encoche, selon
        qu’il est transparent, translucide, opaque ou phosphorescent, avec une incidence
        sur la visibilité et l’aspect.
    nock_type:
      name: Type d’encoche
      description: Spécifie le type d’encoche utilisé sur une flèche ou un carreau,
        par exemple à goupille, demi-lune ou lumineuse.
    noise_reduction_type:
      name: Type de réduction du bruit
      description: Spécifie la technologie de réduction du bruit utilisée, le cas
        échéant, dans le casque audio intégré au casque de protection, ou indique
        qu’aucune technologie de ce type n’est utilisée.
    noise_suppression_technology:
      name: Technologie de réduction du bruit
      description: Spécifie si le produit utilise un amortissement passif ou un circuit
        électronique actif qui atténue les sons forts et/ou amplifie les sons ambiants.
    non_slip_base_features:
      name: Caractéristiques antidérapantes de la base
      description: Indique les éléments antidérapants inclus pour maintenir la pédale
        en place pendant l’utilisation.
    nose_bridge_type:
      name: Type de pont nasal
      description: Indique la conception du pont nasal, qui détermine l’ajustement
        à différentes tailles de visage.
    nose_clip_accessories_included:
      name: Accessoires inclus avec le pince-nez
      description: Énumère les accessoires supplémentaires fournis avec le pince-nez
        de natation (p. ex., des bouchons d’oreilles et un étui de rangement).
    nose_clip_features:
      name: Caractéristiques du pince-nez
      description: Présente les caractéristiques générales du pince-nez relatives
        à la fonction ou au confort.
    nose_coverage_style:
      name: Type de protection du nez
      description: Indique la présence et le type de panneau de protection du nez
        ou du museau sur le masque anti-mouches.
    noseband_type:
      name: Type de muserolle
      description: Spécifie la conception de la muserolle fournie avec le bridon,
        le cas échéant.
    number_of_canvas_meshes:
      name: Nombre de mailles de la toile
      description: Taille des mailles de la feuille de toile plastique, dont la valeur,
        exprimée en trous par pouce (HPI) ou en nombre de mailles, détermine la taille
        des points et le niveau de détail de l’ouvrage.
    number_of_chainrings:
      name: Nombre de plateaux
      description: Indique le nombre de plateaux que le pédalier peut recevoir ou
        avec lesquels il est fourni.
    number_of_control_stations:
      name: Nombre de postes de commande
      description: Indique le nombre de postes de barre ou de commande pris en charge
        par l’ensemble de commandes (p. ex., un seul poste ou deux postes).
    number_of_digits:
      name: Nombre de chiffres
      description: Nombre de chiffres affichés par le compteur (p. ex., 1 chiffre,
        2 chiffres, 3 chiffres).
    number_of_guitar_slots:
      name: Nombre d’emplacements pour guitares
      description: Spécifie le nombre de guitares que l’étui ou la housse peut accueillir.
    number_of_needlecraft_fabrics:
      name: Densité du tissu pour ouvrages à l’aiguille
      description: Spécifie la densité du canevas ou du tissu pour ouvrages à l’aiguille,
        généralement exprimée en nombre de carrés ou de fils par pouce (p. ex., densité 14).
    number_of_plastic_canvas_meshes:
      name: Nombre de mailles de la toile plastique
      description: Spécifie la densité de la toile plastique, exprimée en nombre de
        trous par pouce, dont dépendent la taille des points et le niveau de détail
        de l’ouvrage.
    number_of_quilting_frame_rails:
      name: Nombre de rails du cadre de quilting
      description: Nombre de rails ou de rouleaux inclus sur le cadre de quilting
        (p. ex., un système à deux rails ou un système à trois rails).
    number_of_rope_slots:
      name: Nombre de passages pour corde
      description: Indique si le dispositif d’assurage est prévu pour une utilisation
        avec une corde simple ou avec deux cordes.
    number_of_switch_poles:
      name: Nombre de pôles du commutateur
      description: Nombre de circuits distincts, ou pôles, commandés par l’interrupteur
        (p. ex., SPST, DPST).
    number_of_switch_throws:
      name: Nombre de voies de commutation
      description: Nombre de voies de sortie, ou voies de commutation, par pôle (p.
        ex., SPDT).
    number_of_timing_chain_rows:
      name: Nombre de rangées de chaîne de distribution
      description: Indique si la chaîne de distribution comporte une seule rangée
        ou plusieurs rangées.
    number_of_trailer_axles:
      name: Nombre d’essieux de remorque
      description: Nombre d’essieux de la remorque.
    number_of_wheel_pieces:
      name: Nombre de pièces de la roue
      description: Spécifie si la roue présente une construction en une pièce, en
        deux pièces ou en trois pièces.
    numbering_style:
      name: Mode de numérotation
      description: Indique si les dossards sont prénumérotés pour identifier les équipes
        et, le cas échéant, selon quelle méthode (p. ex., sans numéro, 1 à 10, personnalisé).
    nunchuck_connector_type:
      name: Type de liaison du nunchaku
      description: Décrit le mode de liaison entre les deux poignées du nunchaku (p.
        ex., corde, chaîne, chaîne avec émerillon).
    nursing_access:
      name: Accès pour l’allaitement
      description: Indique, le cas échéant, le dispositif prévu dans le maillot de
        bain pour l’allaitement.
    nursing_access_type:
      name: Type d’accès pour l’allaitement
      description: Précise le dispositif prévu dans le vêtement pour allaiter ou tirer
        son lait.
    nut_butter_texture:
      name: Texture du beurre de fruits à coque
      description: Décrit la consistance du beurre de fruits à coque afin que les
        acheteurs puissent choisir facilement entre différentes textures (p. ex.,
        lisse, avec morceaux).
    nutrient_fortification:
      name: Enrichissement nutritionnel
      description: Identifie les principaux nutriments dont la boisson ou le produit
        alimentaire est enrichi.
    oak_product_form:
      name: Formulaire de commande de produits en chêne
      description: Identifie la forme sous laquelle le chêne est utilisé pour le vieillissement
        ou l’aromatisation des produits.
    oak_toast_level:
      name: Niveau de chauffe du chêne
      description: Précise le niveau de chauffe des produits à base de chêne.
    oboe_case_capacity:
      name: Capacité de l'étui à hautbois
      description: Indique le ou les instruments ainsi que les principaux éléments
        que l’étui peut contenir.
    oboe_case_carry_configuration:
      name: Mode de port de l’étui de hautbois
      description: Indique la principale façon de porter l’étui ou la housse.
    oboe_case_design:
      name: Type d’étui de hautbois
      description: Classe les étuis et les housses de hautbois selon leur structure
        et leur rigidité afin d’indiquer le niveau de protection (p. ex., rigide,
        semi-rigide, souple).
    oboe_case_internal_fit_type:
      name: Type d’aménagement intérieur de l’étui de hautbois
      description: Indique si l’intérieur est moulé pour une configuration précise
        de l’instrument ou s’il comporte des compartiments réglables.
    oboe_keywork_plating:
      name: Placage du clétage du hautbois
      description: Précise le placage ou la finition des clés du hautbois, indépendamment
        du matériau du corps de l’instrument.
    oboe_strap_padding:
      name: Rembourrage de la sangle de hautbois
      description: Décrit si la zone de contact de la sangle ou du support comporte
        un rembourrage et, le cas échéant, en précise le type pour le confort (p.
        ex., zone rembourrée à l’épaule ou au cou).
    oboe_swab_style:
      name: Type d’écouvillon pour hautbois
      description: Précise le type fonctionnel et la conception d’un écouvillon de
        nettoyage pour hautbois (p. ex., à tirer, en soie lestée).
    observation_window_material:
      name: Matériau de la fenêtre d’observation
      description: Précise le matériau des panneaux ou de la fenêtre d’observation,
        qui influe souvent sur la netteté et la durabilité.
    ocarina_accessories_included:
      name: Accessoires pour Ocarina inclus
      description: Énumère les accessoires fournis avec l’ocarina, comme un étui,
        une courroie de cou ou un tableau de doigtés.
    ocarina_chamber_count:
      name: Nombre de chambres de l’ocarina
      description: Indique le nombre de chambres de l’ocarina en ligne, ce qui détermine
        son étendue et la complexité de jeu (p. ex., simple, double, triple).
    ocarina_fingering_system:
      name: Système de doigté de l'ocarina
      description: Précise, le cas échéant, le système ou la norme de doigté de l’ocarina
        pendentif.
    ocarina_finish_type:
      name: Finition de l’ocarina
      description: Finition de surface du corps de l’ocarina, qui a une incidence
        sur le toucher et l’esthétique.
    occupant_classification_sensor_support:
      name: Prise en charge du capteur de classification de l’occupant
      description: Indique si le siège comprend un capteur de classification ou de
        poids de l’occupant, ou s’il est prévu pour transférer ou installer le capteur
        d’origine, notamment sur les sièges passagers avant.
    octave_harmonica_cover_plate_material:
      name: Matériau de la plaque de recouvrement de l'harmonica Octave
      description: Matériau des plaques de recouvrement extérieures de l’harmonica
        octave.
    octave_harmonica_tuning_system:
      name: Système d'accordage de l'harmonica à octave
      description: Accordage ou tempérament utilisé pour l’harmonica octave.
    octoban_mounting_system_type:
      name: Type de système de montage de l’octoban
      description: Manière dont l’octoban est fixé ou positionné pendant le jeu (p.
        ex., support de fixation, bride, pied).
    odor_control_features:
      name: Fonctions de contrôle des odeurs
      description: Indique si le produit neutralise les odeurs ou exerce une action
        désodorisante, et selon quelle méthode.
    office_furniture_items_included:
      name: Mobilier de bureau compris
      description: Identifie les meubles de bureau compris dans l’ensemble, comme
        un bureau ou un classeur.
    oil_cooler_core_type:
      name: Type de cœur du refroidisseur d’huile
      description: Spécifie la structure interne du cœur du refroidisseur d’huile,
        qui a une incidence sur l’efficacité du refroidissement, la perte de pression
        et la durabilité.
    oil_cooler_mounting_style:
      name: Mode de montage du refroidisseur d’huile
      description: Décrit la façon dont le refroidisseur d’huile est prévu pour être
        monté ou installé sur le véhicule.
    oil_dipstick_component_type:
      name: Type de composant de jauge d’huile
      description: Spécifie le composant de mesure du niveau d’huile vendu (p. ex.,
        lame ou tige de jauge seule, poignée seule, ensemble complet, tube de jauge).
    oil_dipstick_measurement_markings:
      name: Repères de niveau de la jauge d’huile
      description: Spécifie les repères ou l’échelle qui figurent sur la jauge pour
        lire le niveau d’huile.
    oil_dipstick_tube_mounting_type:
      name: Type de montage du tube de jauge d’huile
      description: Spécifie comment le tube de jauge d’huile est maintenu ou fixé
        sur le moteur ou le bloc moteur.
    oil_drain_plug_head_drive_type:
      name: Type d’empreinte de la tête du bouchon de vidange d’huile
      description: Spécifie l’empreinte de la tête du bouchon de vidange d’huile utilisée
        pour la pose et la dépose.
    oil_drain_plug_magnet_type:
      name: Type d’aimant du bouchon de vidange d’huile
      description: Indique si le bouchon de vidange est magnétique et, le cas échéant,
        de quel type.
    oil_fill_cap_type:
      name: Type de bouchon de remplissage d’huile
      description: Style ou type d’interface du bouchon de remplissage d’huile du
        cache-culbuteurs, le cas échéant.
    oil_filler_cap_attachment_type:
      name: Type de fixation du bouchon de remplissage d’huile
      description: Définit le mode de fixation du bouchon de remplissage d’huile sur
        le moteur ou le col de remplissage (p. ex., filetage, baïonnette ou quart
        de tour, emmanchement).
    oil_filler_cap_installation_position:
      name: Emplacement de montage du bouchon de remplissage d’huile
      description: Détermine le point de remplissage correspondant au bouchon lorsqu’il
        en existe plusieurs (p. ex., cache-culbuteurs, tube de remplissage déporté).
    oil_filler_cap_locking_type:
      name: Bouchon de remplissage d'huile à verrouillage
      description: Classe le bouchon de remplissage d’huile selon qu’il est sans verrouillage
        ou qu’il s’ouvre au moyen d’un dispositif verrouillé ou sécurisé (p. ex.,
        à clé ou avec outil obligatoire), afin de prévenir les manipulations non autorisées,
        le vol ou l’ouverture accidentelle.
    oil_filler_cap_tether_type:
      name: Bouchon de remplissage d'huile à cordon
      description: Indique si le bouchon de remplissage d’huile est attaché ou maintenu
        par un dispositif de retenue afin d’éviter toute perte, ainsi que le type
        d’attache utilisé.
    oil_filler_cap_venting_type:
      name: Type de mise à l’air du bouchon de remplissage d’huile
      description: Spécifie si le bouchon est muni d’une mise à l’air et, le cas échéant,
        le mécanisme correspondant.
    oil_filter_style:
      name: Type de filtre à huile
      description: Définit le format du filtre à huile ainsi que son mode de montage
        ou d’installation, afin d’assurer sa compatibilité avec le support de filtre
        du moteur.
    oil_pan_baffle_windage_features:
      name: Chicanes et dispositifs anti-barbotage du carter d’huile
      description: Indique les dispositifs internes de gestion de l’huile présents
        dans le carter.
    oil_pan_finish_coating:
      name: Finition/revêtement du carter d'huile
      description: Décrit l’état de surface ou le revêtement du carter d’huile (p.
        ex., peint, thermolaqué, plaqué, brut).
    oil_pressure_sensor_function_type:
      name: Fonction du capteur de pression d’huile
      description: Détermine si la pièce est un transmetteur de pression d’huile à
        sortie variable destiné à un indicateur ou au calculateur, ou un contacteur
        de pression d’huile tout ou rien déclenchant un témoin d’alerte.
    oil_pressure_sensor_signal_output_type:
      name: Type de signal de sortie du capteur de pression d’huile
      description: Définit le type de sortie ou de signal électrique produit par le
        capteur ou le transmetteur de pression d’huile.
    oil_processing_method:
      name: Procédé de traitement de l'huile
      description: Précise le mode de production ou de raffinage de l’huile (p. ex.,
        pressée à froid, vierge, raffinée), qui détermine le goût, les apports nutritionnels
        et les usages culinaires adaptés.
    oil_pump_drive_method:
      name: Mode d’entraînement de la pompe à huile
      description: Identifie l’élément qui entraîne la pompe à huile dans le moteur.
    oil_pump_mounting_style:
      name: Type de fixation de la pompe à huile
      description: Précise l’emplacement et le mode de montage de la pompe à huile
        dans le moteur (p. ex., montage interne, externe ou déporté, sur le couvercle
        ou sur le carter d’huile).
    oil_system_connection_thread_standard:
      name: Norme de filetage ou de raccordement du circuit d’huile
      description: Spécifie la norme de filetage ou de raccordement utilisée par l’interface
        du circuit d’huile de la pièce pour l’installation et la compatibilité (p.
        ex., M12x1,5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Grade de viscosité de l’huile
      description: Décrit la viscosité relative de l’huile de filage utilisée avec
        du matériel d’artisanat, hors grades SAE automobiles.
    okra_variety:
      name: Variété de gombo
      description: Identifie le cultivar ou la variété commerciale de gombo proposée,
        comme Clemson Spineless, Red Burgundy ou Baby Okra.
    olfactory_arts_material_form:
      name: Formulaire de matériel pour les arts olfactifs
      description: Précise la forme sous laquelle la matière est vendue.
    olfactory_arts_tool_kit_content:
      name: Contenu du kit d’arts olfactifs
      description: Recense les composants inclus lorsque le produit est vendu comme
        kit ou ensemble de fabrication de bougies, d’encens ou de parfums.
    olive_variety:
      name: Variété d’olive
      description: Précise le cultivar d’olive utilisé, qui a une incidence sur le
        goût, la texture, la couleur et l’authenticité régionale.
    onion_variety:
      name: Variété d'oignon
      description: Spécifie le type d’oignon afin que les acheteurs trouvent rapidement
        les profils de couleur, de saveur et d’utilisation qu’ils recherchent, et
        que les marchands puissent référencer leurs produits avec exactitude.
    opacity_level:
      name: Niveau d’opacité
      description: Indique le degré de transparence ou d’opacité du tissu.
    operating_modes:
      name: Mode de fonctionnement
      description: Principaux effets intégrés et modes de mouvement du projecteur
        laser.
    operating_voltage:
      name: Tension de fonctionnement
      description: Spécifie la tension nominale du système pour laquelle l’injecteur
        est conçu.
    optical_toy_features:
      name: Caractéristiques du jouet optique
      description: Présente le principal effet visuel ou optique produit par le jouet.
    orchestral_string_core_material:
      name: Matériau de l’âme de la corde d’orchestre
      description: Précise le matériau de l’âme de la corde, qui a une forte incidence
        sur la sensation de jeu, la réponse et le timbre.
    orchestral_string_end_type:
      name: Type d’extrémité de la corde d’orchestre
      description: Définit le mode d’attache de la corde côté cordier.
    orchestral_string_included_strings:
      name: Cordes d'orchestre incluses
      description: Recense les cordes exactes incluses dans le jeu, selon l’instrument
        concerné.
    orchestral_string_instrument_fitting_part_type:
      name: Type de pièce ou d’accessoire pour instrument à cordes d’orchestre
      description: Identifie le type de pièce ou d’accessoire du produit (p. ex.,
        chevalet, cordier, mentonnière).
    orchestral_string_instrument_mute_type:
      name: Type de sourdine pour instrument à cordes d'orchestre
      description: Classe la sourdine pour instrument à cordes d’orchestre selon l’usage
        prévu (p. ex., entraînement ou hôtel, jeu ou concert) et, le cas échéant,
        selon son style de conception courant.
    orchestral_string_instrument_part_position:
      name: Position de la pièce sur l’instrument à cordes d’orchestre
      description: Indique où la pièce se place sur l’instrument, notamment lorsqu’elle
        existe en variantes haute ou basse, gauche ou droite.
    orchestral_string_winding_material:
      name: Matériel pour l'enroulement des cordes d'orchestre
      description: Indique le matériau du filage extérieur de la corde.
    organza_finish_sheen:
      name: Finition ou brillance de l’organza
      description: Décrit l’aspect de surface de l’organza (effet mat ou brillant,
        effets irisés).
    organza_ribbon_transparency_level:
      name: Niveau de transparence du ruban en organza
      description: Décrit le degré de transparence du ruban en organza.
    organza_transparency_level:
      name: Degré de transparence de l'organza
      description: Décrit le degré de transparence de l’organza en une seule couche.
    origami_paper_shape:
      name: Forme du papier pour origami
      description: Définit la forme de la feuille utilisée pour le pliage.
    origami_paper_sidedness:
      name: Aspect des faces du papier pour origami
      description: Indique si les deux faces du papier pour origami présentent la
        même couleur ou le même motif, ou si elles sont contrastées.
    ostrich_feather_part:
      name: Partie de plume d’autruche
      description: Identifie le type ou la partie de plume d’autruche utilisé (p.
        ex., plume ou drab), qui a une incidence sur la douceur, la densité et les
        usages artisanaux courants.
    outboard_motor_shaft_type:
      name: Type d'arbre de moteur hors-bord
      description: Classe normalisée de longueur d’arbre utilisée pour les moteurs
        hors-bord (forme de libellé utilisée dans le secteur maritime).
    outboard_motor_steering_type:
      name: Type de direction du moteur hors-bord
      description: Définit l’interface ou le mécanisme de direction utilisé par le
        moteur hors-bord (p. ex., barre franche ou système de direction à distance).
    outdoor_table_functionality:
      name: Fonctions de la table d’extérieur
      description: Identifie les fonctions intégrées spécialisées qui dépassent la
        simple surface de table (p. ex., compartiment isotherme, tablette de rangement,
        cache-bouteille de gaz, base de parasol, raccord pour chaise, conception pliante,
        utilisable dans une piscine, hauteur réglable, roulettes intégrées, éclairage
        à DEL).
    outerwear_length_type:
      name: Type de longueur du vêtement d’extérieur
      description: Classe la longueur totale d’un vêtement d’extérieur selon des plages
        descriptives normalisées.
    outerwear_pieces_included:
      name: Vêtements d'extérieur inclus
      description: Recense les pièces de vêtement fournies lorsque le produit est
        vendu en ensemble.
    outfit_attachment_mechanism:
      name: Mécanisme de fixation d'un équipement
      description: Indique comment les pièces de tenue ou les accessoires se fixent
        à la poupée (p. ex., languettes, adhésif, aimants).
    outfit_items_included:
      name: Articles de la tenue inclus
      description: Recense les articles vestimentaires inclus dans l’ensemble (p.
        ex., body, short, bandeau).
    outlet_thread_type:
      name: Type de filetage de sortie
      description: Norme de filetage utilisée aux orifices de sortie des conduites
        de frein du maître-cylindre (p. ex., évasement métrique de type bubble flare
        ou évasement inversé SAE).
    output_jack_type_instrument:
      name: Type de prise de sortie (instrument)
      description: Définit le type de prise de sortie audio de la mandoline électrique.
    output_signal_type:
      name: Type de signal de sortie
      description: Comportement ou type de sortie électrique produit par le capteur
        (p. ex., résistance analogique de thermistance CTN).
    outsole_marking_type:
      name: Type de traces laissées par la semelle extérieure
      description: Indique si la semelle extérieure de la chaussure laisse des traces
        sur les terrains, critère essentiel pour les sports de raquette en salle.
    outsole_material:
      name: Matériau de la semelle extérieure
      description: Indique le matériau de la partie de la semelle extérieure en contact
        avec le sol, qui a une incidence sur l’adhérence, la souplesse et la durabilité.
    outsole_stud_type:
      name: Type de crampons de la semelle extérieure
      description: Décrit la disposition des éléments d’accroche de la semelle extérieure
        qui assurent l’adhérence sur la surface de jeu choisie (p. ex., crampons moulés,
        ergots en caoutchouc, picots pour gazon synthétique).
    oven_bake_clay_formulation:
      name: Formulation de l’argile à cuire au four
      description: Identifie la famille de formulation de l’argile à cuire au four
        (p. ex., argile polymère ou argile à base de résine), qui a une incidence
        sur la manipulation, le comportement au durcissement et les propriétés finales.
    oven_housing_configuration:
      name: Configuration du meuble pour four
      description: Définit la configuration d’appareils que le meuble est prévu pour
        recevoir (p. ex., four simple, four double ou ensemble four et micro-ondes).
    overhead_mount_installation_method:
      name: Mode d’installation du support supérieur
      description: Mode de fixation du support supérieur au véhicule (éléments de
        fixation ou type d’attache).
    oversize_or_undersize_grade:
      name: Grade de taille majorée ou minorée
      description: Précise le grade de taille du kit par rapport à la taille standard
        d’origine (p. ex., pistons ou segments majorés et/ou coussinets minorés).
    p_tex_application_method:
      name: Méthode d'application du P-Tex
      description: Décrit le mode d’application du matériau P-Tex sur la semelle du
        ski ou du snowboard.
    p_tex_form:
      name: Forme du P-Tex
      description: Identifie la forme sous laquelle le matériau de réparation est
        fourni.
    packability:
      name: Capacité de rangement
      description: Indique si le gilet peut être compacté ou rangé lorsqu’il n’est
        pas utilisé, et de quelle manière.
    packaging_format:
      name: Format de conditionnement
      description: Mode de conditionnement ou de vente des cordes (pochettes individuelles,
        vrac, etc.).
    packaging_material:
      name: Matériau du conditionnement
      description: Indique le matériau principal de la bouteille ou du contenant de
        l’eau.
    packaging_type:
      name: Type d'emballage
      description: Décrit le conditionnement de la figurine à tête oscillante pour
        la vente au détail, la présentation ou la conservation par un collectionneur.
    packing_medium:
      name: Milieu de conservation
      description: Indique le liquide ou le milieu utilisé pour conserver les fruits
        dans le contenant (p. ex., eau, sirops divers, jus ou saumure).
    pad_components_included:
      name: Composants du tapis inclus
      description: Recense les pièces incluses lorsque le produit est vendu sous forme
        d’ensemble (p. ex., genouillères et coudières, protège-poignets seuls).
    pad_controller_additional_control:
      name: Commandes supplémentaires du contrôleur de pads
      description: Types de commandes physiques présentes sur l’appareil en plus des
        pads (potentiomètres, faders, boutons).
    pad_controller_performance_features:
      name: Fonctions de jeu des pads du contrôleur
      description: Principales fonctions de jeu des pads, pour jouer et nuancer l’expression
        musicale.
    pad_coverage_area:
      name: Zones protégées
      description: Indique les zones du corps protégées par les éléments de protection
        intégrés à la gaine.
    pad_material_or_technology:
      name: Matière ou technologie de la protection
      description: Précise la technologie exclusive d’absorption des chocs ou la matière
        de marque utilisée dans la protection.
    pad_mounting_or_holding_style:
      name: Mode de fixation ou de maintien du pad
      description: Indique comment le pad est maintenu, porté ou installé pendant
        l’utilisation.
    pad_saver_style:
      name: Type de dispositif de séchage des tampons
      description: Indique la forme ou la conception du dispositif de séchage des
        tampons utilisé pour sécher les tampons et la perce.
    pad_shape:
      name: Forme du tampon
      description: Définit la forme géométrique ou la courbure de la surface de frappe,
        ou de l’ensemble de la cible (p. ex., ronde, courbée, rectangulaire, plate),
        afin d’aider les utilisateurs à choisir le modèle adapté à leurs objectifs
        d’entraînement et au type de frappe recherché.
    pad_shell_type:
      name: Type de structure de la protection
      description: Classe la protection selon la structure de sa surface extérieure
        (p. ex., coque rigide, coque souple, insert interne).
    pad_style:
      name: Type de coussin de frappe
      description: Indique le type ou la conception du coussin de frappe fourni avec
        le traîneau.
    padding_layers:
      name: Couches de rembourrage
      description: Indique le nombre de couches de mousse utilisées pour absorber
        les chocs.
    padding_level:
      name: Niveau de rembourrage
      description: Indique la quantité de rembourrage intégrée aux zones de contact
        de la sangle ou du support (cou, épaule, dos).
    padding_material:
      name: Matière de remplissage ou de rembourrage
      description: Précise la matière interne de remplissage ou de rembourrage qui
        absorbe les chocs dans les sacs, les boucliers, les gants et les mannequins.
    paddle_ball_attachment_type:
      name: Type d’attache de la balle de paddle ball
      description: Indique comment la balle est reliée à la raquette, ou si elle n’est
        pas attachée.
    paddle_leash_style:
      name: Type de cordon d’attache de pagaie
      description: Identifie le type ou la conception du cordon d’attache de pagaie.
    paddle_shape:
      name: Forme de la pagaie
      description: Définit la silhouette générale de la tête ou du corps de la raquette
        (p. ex., standard, allongée, large), qui a une incidence sur l’allonge, la
        taille de la zone de frappe optimale et la maniabilité.
    paddleboard_intended_use:
      name: Usage prévu du paddleboard
      description: Classe la planche selon sa finalité de conception principale ou
        l’activité pour laquelle elle est conçue (p. ex., randonnée, yoga, course).
    paint_application_method:
      name: Méthode d'application de la peinture
      description: Principal mode d’application du produit sur l’étrier.
    paint_by_number_surface_type:
      name: Type de support de peinture par numéros
      description: Support sur lequel le motif numéroté est imprimé (p. ex., toile,
        papier, panneau de bois).
    paint_medium_application_method:
      name: Mode d’application du médium de peinture
      description: Indique la méthode recommandée pour appliquer le médium.
    paint_medium_intended_effect:
      name: Effet recherché du médium de peinture
      description: Définit le principal effet que le médium est destiné à produire
        (p. ex., texture, brillance, glacis, fluidité).
    paint_safe_bristles:
      name: Poils sans risque pour la peinture
      description: Indique si les poils de la brosse sont présentés comme sans risque
        pour la peinture automobile ou le vernis transparent (sans rayures).
    paintable_surface:
      name: Surface peignable
      description: Indique si la forme en papier mâché est prête à peindre telle quelle
        (p. ex., apprêtée ou traitée) ou si elle nécessite une préparation.
    paintball_caliber:
      name: Calibre de paintball
      description: Précise le diamètre ou le calibre des billes de paintball ou de
        l’équipement compatible.
    paintball_feed_system:
      name: Système d’alimentation en billes de paintball
      description: Définit le mode d’alimentation du marqueur en billes de paintball.
    paintball_fill_color:
      name: Couleur du produit de marquage
      description: Indique la couleur du produit de marquage contenu dans la bille,
        qui peut différer de celle de la coque extérieure et détermine la couleur
        laissée à l’impact.
    paintball_fill_type:
      name: Type de remplissage des billes de paintball
      description: Décrit les formulations ou caractéristiques particulières du produit
        de marquage (p. ex., lavable, phosphorescent, en poudre).
    paintball_grade:
      name: Qualité paintball
      description: Décrit la classe de performance ou le niveau d’usage prévu (p.
        ex., débutant, jeu sur terrain, compétition, hiver).
    paintball_mask_coverage_level:
      name: Étendue de protection du masque de paintball
      description: Indique les parties du visage ou de la tête protégées par les lunettes
        ou le masque de paintball (lunettes seules, demi-visage, visage entier ou
        tête entière).
    paintball_tank_valve_type:
      name: Type de valve du réservoir de paintball
      description: Décrit l’interface de valve ou de régulateur présente sur le réservoir.
    painting_surface_priming_type:
      name: Type d’apprêt de la surface à peindre
      description: Précise le type d’apprêt ou de revêtement de la surface à peindre,
        au-delà de la simple distinction entre surface apprêtée et non apprêtée, avec
        une incidence sur l’adhérence de la peinture et les techniques compatibles.
    palette_knife_blade_edge_profile:
      name: Profil du bord de la lame du couteau à palette
      description: Décrit le profil du bord de travail de la lame du couteau à palette,
        et non son tranchant, avec une incidence sur les traces produites et le mélange.
    palette_knife_flexibility:
      name: Souplesse de la lame du couteau à palette
      description: Décrit la rigidité ou la souplesse de la lame du couteau à palette.
    palette_surface_finish:
      name: Finition de surface de la palette
      description: Décrit la finition ou le revêtement de la surface de mélange, qui
        a une incidence sur la résistance aux taches et la facilité de nettoyage.
    palm_padding_level:
      name: Niveau de rembourrage de la paume
      description: Décrit le niveau de rembourrage dans la paume du gant ou du coussinet
        de préhension.
    palm_padding_type:
      name: Type de rembourrage de la paume
      description: Indique la matière ou la structure utilisée pour rembourrer la
        paume (p. ex., gel, mousse, double couche).
    palm_wax_blend_readiness:
      name: État du mélange de cire de palme
      description: Cire de palme pure ou formulation prémélangée destinée à offrir
        des propriétés particulières.
    palm_wax_form:
      name: Forme de la cire de palme
      description: Forme sous laquelle la cire de palme est vendue, avec une incidence
        sur la facilité de dosage, la vitesse de fusion et la manipulation.
    pan_flute_tuning_standard:
      name: Norme d’accordage de la flûte de Pan
      description: Fréquence de référence utilisée pour l’accordage (p. ex., la4 =
        440 Hz), importante pour jouer avec d’autres instruments.
    pannier_configuration:
      name: Configuration des sacoches
      description: Indique si le produit est vendu sous forme de sacoche seule, de
        sacoche double solidaire, de paire ou d’ensemble de trois sacoches.
    pannier_mounting_system:
      name: Système de fixation pour sacoches
      description: Définit le mécanisme d’attache de la sacoche au porte-bagages ou
        au cadre du vélo, afin d’assurer la compatibilité avec différentes configurations.
    pant_cuff_style:
      name: Finition du bas de jambe du pantalon
      description: Indique la finition ou l’ajustement du pantalon au niveau de la
        cheville (p. ex., bas élastiqués, zips aux chevilles, ourlet ouvert).
    pant_leg_conversion_type:
      name: Modularité des jambes de pantalon
      description: Indique si les jambes du pantalon peuvent être transformées ou
        ajustées à différentes longueurs, et de quelle manière.
    pantyhose_crotch_style:
      name: Type d’entrejambe du collant
      description: Définit la conception de l’entrejambe du collant, en distinguant
        les versions fermées standard, sans entrejambe ou à gousset renforcé.
    papaya_variety:
      name: Variété de papaye
      description: Identifie le cultivar ou la variété commerciale de la papaye (p.
        ex., Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Format de poupée en papier ou magnétique
      description: Indique si le produit est un ensemble traditionnel de poupées en
        papier, un ensemble de poupées magnétiques ou un format hybride.
    paper_color_family:
      name: Famille de couleurs du papier
      description: Indique si le paquet est unicolore, composé de couleurs assorties
        ou constitué de mélanges spéciaux (utile lorsque la couleur est définie par
        article, mais que les paquets contiennent plusieurs couleurs).
    paper_magnetic_doll_set_contents:
      name: Contenu de l’ensemble de poupées en papier ou magnétiques
      description: Recense les principaux composants fournis avec l’ensemble.
    paper_opacity:
      name: Opacité du papier
      description: Indique le degré de transparence ou d’opacité du papier, du très
        transparent à l’opaque (utile pour le décalquage).
    paraglider_certification_rating:
      name: Niveau de certification en parapente
      description: Indique la classification officielle d’aptitude au vol attribuée
        à une aile de parapente (p. ex., classes EN ou LTF).
    parasite_types_controlled:
      name: Types de parasites ciblés
      description: Énumère les parasites internes contre lesquels le produit est efficace,
        afin que les acheteurs puissent adapter les programmes de vermifugation aux
        infestations visées.
    parking_camera_mounting_location:
      name: Emplacement de montage de la caméra de stationnement
      description: Emplacement prévu de la caméra sur le véhicule (p. ex., zone de
        la plaque d’immatriculation, montage en surface à l’arrière, montage affleurant).
    parking_camera_night_vision_technology:
      name: Mode de vision nocturne de la caméra de stationnement
      description: Méthode d’assistance en faible luminosité utilisée par la caméra.
    parking_camera_orientation:
      name: Orientation de la caméra de stationnement
      description: Caméra conçue pour la vue arrière, la vue avant ou une image sélectionnable
        ou miroir.
    parking_sensor_finish:
      name: Finition du capteur de stationnement
      description: Indique la finition de surface de la face ou du capuchon du capteur
        de stationnement (p. ex., à peindre ou apprêté, mat, brillant), afin de l’harmoniser
        avec l’aspect du pare-chocs.
    parking_sensor_type:
      name: Type de capteur de stationnement
      description: Précise la technologie de détection utilisée par le capteur de
        stationnement (p. ex., ultrasons, électromagnétique, radar, optique).
    parsley_root_variety:
      name: Variété de persil tubéreux
      description: Identifie le cultivar ou la variété de persil tubéreux lorsque
        le fournisseur fournit cette information.
    parsnip_variety:
      name: Variété de panais
      description: Identifie la variété ou le cultivar précis de panais, comme Hollow
        Crown ou White Gem, afin que les acheteurs puissent choisir selon les différences
        de goût, de douceur ou de taille.
    part_condition:
      name: État de la pièce
      description: Indique si la pièce est neuve, d’occasion, révisée, etc.
    part_placement:
      name: Emplacement de la pièce
      description: Indique où la pièce est installée sur la machine (p. ex., appareil
        de montée d’escaliers ou stepper), notamment à gauche, à droite, à l’avant
        ou à l’arrière.
    partial_capo_covered_strings:
      name: Cordes concernées par le capodastre partiel
      description: Indique la plage de cordes concernée par le capodastre partiel
        selon la numérotation standard d’une guitare à six cordes (1 = mi aigu, 6 =
        mi grave).
    parting_style:
      name: Type de raie
      description: Indique le type de raie de la perruque, fixe ou modulable (p. ex.,
        raie au milieu, raie sur le côté, raie libre), ce qui permet de varier les
        coiffures.
    party_favor_type:
      name: Type de cadeau de fête
      description: Indique le type de petit cadeau de fête (p. ex., autocollants,
        mini-jouets, flacons à bulles), afin d’en faciliter la recherche et le filtrage
        dans la catégorie correspondante.
    party_game_format:
      name: Format du jeu d’animation
      description: Format matériel principal du jeu d’animation.
    party_horn_mouthpiece_type:
      name: Type d’embout du cotillon sonore
      description: Définit la conception de l’embout, qui a une incidence sur l’hygiène
        et le confort.
    party_horn_style:
      name: Type de bruiteur de fête
      description: Décrit la conception ou le mode de fonctionnement du bruiteur de
        fête, notamment la façon dont il se déroule ou produit le son.
    passenger_car_type:
      name: Type de voiture de voyageurs
      description: Identifie le type précis de voiture voyageurs du modèle (p. ex.,
        voiture à places assises, voiture-lits), utilisé pour la navigation et la
        composition de rames.
    passion_fruit_variety:
      name: Variété de fruit de la passion
      description: Identifie ou précise la variété botanique ou commerciale du fruit
        de la passion proposé (p. ex., violet, jaune, granadilla).
    pasta_sauce_texture:
      name: Texture de la sauce pour pâtes
      description: Décrit la consistance de la sauce (p. ex., lisse, avec morceaux,
        crémeuse) afin de correspondre aux préférences de sensation en bouche.
    pasta_sauce_variety:
      name: Variété de sauce pour pâtes
      description: Classe les sauces pour pâtes selon la recette ou le style afin
        que les acheteurs trouvent rapidement les classiques, comme la marinara, ou
        les spécialités, comme la sauce vodka ou le pesto.
    pastry_crust_state:
      name: État de la pâte ou du fond de pâtisserie
      description: Décrit l’état de préparation ou de cuisson de la pâte ou du fond
        de pâtisserie au moment de l’achat.
    pastry_crust_style:
      name: À la manière d'une pâte brisée
      description: Identifie le style de pâtisserie ou le type de pâte du fond.
    pastry_filling_type:
      name: Type de garniture pâtissière
      description: Indique la principale garniture de la pâtisserie ou du scone.
    patch_adhesion_method:
      name: Mode d’adhésion de la rustine
      description: Indique le mode d’adhésion de la rustine à la chambre à air ou
        au pneu (p. ex., autoadhésif, avec colle de vulcanisation ou activé à chaud).
    patch_backing_material:
      name: Support de patch
      description: Matière du dos ou de la base de l’écusson en contact avec l’article
        décoré (p. ex., feutre, sergé).
    patch_backing_type:
      name: Type de support du patch
      description: Dos de fixation de l’écusson (p. ex., thermocollant, adhésif à
        pellicule détachable, fermeture autoagrippante, aucun).
    patch_base_material:
      name: Matériau de base du patch
      description: Matière textile principale de la base ou du dos de l’écusson à
        motif, hors ornements décoratifs.
    patch_border_edge_finish:
      name: Finition de la bordure de l’écusson
      description: Méthode de finition de la bordure de l’écusson (p. ex., bord surjeté,
        bord découpé au laser), avec une incidence sur la durabilité et l’aspect.
    patch_placement_area:
      name: Emplacement de l’écusson
      description: Emplacement habituel prévu pour l’écusson sur les vêtements ou
        les accessoires.
    pathogen_removal_capability:
      name: Capacité d’élimination des agents pathogènes
      description: Indique les classes de micro-organismes que la pompe est certifiée
        éliminer (bactéries, protozoaires, virus).
    pattern_sizing_system:
      name: Système de tailles du patron
      description: Indique le système ou la norme de tailles utilisé dans la région
        pour le tableau des tailles du patron (p. ex., US, UK, UE).
    peak_style:
      name: Type de visière
      description: Indique le type de visière ou de bec du casque, avec une incidence
        sur la zone couverte, l’esthétique et les règles de la discipline.
    pear_variety:
      name: Variété de poire
      description: Identifie le cultivar ou la variété de poires (p. ex., Bartlett,
        Bosc, Conference), afin que les acheteurs choisissent selon le goût, la texture
        et l’usage culinaire recherchés.
    pearl_luster_grade:
      name: Grade de lustre de la perle
      description: Grade qualitatif du lustre ou de l’éclat de la surface de la perle.
    pearl_matching_level:
      name: Niveau d’assortiment des perles
      description: Indique dans quelle mesure les perles sont assorties dans un lot
        ou une enfilade (p. ex., par couleur, taille et lustre).
    pearl_shape:
      name: Forme de la perle
      description: Catégorie générale de forme de la perle.
    pearl_surface_condition:
      name: État de surface de la perle
      description: Indique l’état visible de la surface d’une perle selon la présence
        et l’importance des défauts ou des taches.
    pearl_treatment:
      name: Traitement de la perle
      description: Mentionne tout traitement appliqué à la perle qui modifie sa couleur
        ou son apparence.
    pearl_type:
      name: Type de perle
      description: Indique la variété ou l’origine des perles vendues en vrac (p.
        ex., eau douce, Akoya, perle de Tahiti, mer du Sud).
    peat_level:
      name: Intensité des notes tourbées
      description: Décrit l’intensité des notes fumées de tourbe dans le whisky, de
        non tourbé à très tourbé.
    pedal_and_cleat_system_compatibility:
      name: Compatibilité avec les systèmes de pédales et de cales
      description: Indique les normes de pédales ou de cales avec lesquelles la cale
        d’épaisseur ou la cale angulaire est compatible, afin que les acheteurs choisissent
        un produit adapté à leurs pédales et à leurs chaussures.
    pedal_configuration:
      name: Configuration des pédales
      description: Indique si la chaise comporte une pédale unique, des pédales séparées
        ou indépendantes, ou une configuration convertible entre pédale unique et
        pédales séparées.
    pedal_mounting_style:
      name: Type de fixation de la pédale
      description: Indique comment la pédale, le couvre-pédale ou le revêtement de
        pédale se fixe au véhicule (méthode d’installation ou de fixation).
    pedal_set_components:
      name: Éléments du jeu de pédales
      description: Indique les pédales incluses dans le jeu.
    pedal_spindle_material:
      name: Matériau de l’axe de pédale
      description: Matériau utilisé pour l’axe de pédale, avec une incidence sur la
        solidité, le poids et la tenue à la corrosion.
    pedal_spindle_thread_size:
      name: Taille du filetage de l’axe de pédale
      description: Indique la norme de filetage de l’axe de pédale qui se visse dans
        la manivelle.
    pedal_type:
      name: Type de pédales
      description: Décrit le type de pédales fournies avec le vélo, en indiquant la
        compatibilité avec les chaussures et le type de pratique.
    pellet_accessory_type:
      name: Type d'accessoire pour granulés
      description: Identifie le type précis d’accessoire pour pellets afin que les
        pêcheurs trouvent rapidement forets, applicateurs d’élastiques ou stops selon
        leurs besoins de montage de ligne.
    pellet_grade:
      name: Grade des billes d’airsoft
      description: Indique le degré de précision de fabrication ou le niveau de performance
        des billes d’airsoft.
    pen_ink_color:
      name: Couleur de l’encre du stylo
      description: Indique la couleur réelle de l’encre produite par le stylo, qui
        peut différer de la couleur extérieure du corps.
    penalty_card_accessories_included:
      name: Accessoires inclus avec les cartons d’arbitrage
      description: Recense les accessoires d’arbitrage supplémentaires fournis avec
        les cartons, comme un étui, un carnet de score, un crayon, une pièce, un sifflet
        ou une pochette.
    penalty_card_colors_included:
      name: Couleurs des cartons de pénalité incluses
      description: Recense les couleurs des cartons d’arbitrage inclus dans l’ensemble.
    penalty_flag_throw_distance:
      name: Distance de lancer du drapeau de pénalité
      description: Classe le drapeau selon sa portée de lancer prévue.
    pendant_cutter_safety_features:
      name: Dispositifs de sécurité du coupe-fil pendentif
      description: Identifie les dispositifs de sécurité intégrés qui limitent les
        coupures accidentelles lorsque le coupe-fil est transporté ou porté.
    pendant_cutter_wear_method:
      name: Mode de port du coupe-fil pendentif
      description: Indique comment le coupe-fil est prévu pour être porté ou transporté.
    pepper_variety:
      name: Variété de poivre
      description: Indique la variété ou l’espèce de poivre utilisée dans le produit,
        afin que les acheteurs distinguent les profils aromatiques et les degrés de
        piquant.
    percussion_case_style:
      name: Type d’étui ou de housse pour percussion
      description: Classe l’étui ou la housse selon sa construction générale (housse
        souple, étui rigide ou construction hybride).
    percussion_instruments_included:
      name: Instruments à percussion inclus
      description: Recense les types d’instruments de percussion inclus lorsque le
        produit est un ensemble de jouets comprenant plusieurs instruments.
    percussion_mallet_handle_grip_style:
      name: Type de revêtement de prise du manche de mailloche de percussion
      description: Identifie le type de traitement appliqué à la zone de prise du
        manche, au-delà de la texture (p. ex., bois nu, finition laquée, prise caoutchoutée
        ou ruban).
    percussion_mallet_head_construction:
      name: Construction de la tête de mailloche de percussion
      description: Décrit la construction de la tête de la mailloche (p. ex., entourée
        de fil, garnie de feutre, en caoutchouc, en bois brut), avec une incidence
        sur le son et la durabilité.
    perfumery_base_carrier_type:
      name: Type de support de la base de parfumerie
      description: Détermine le système de support ou de solvant d’une base de parfumerie,
        c’est-à-dire sa composition principale pour la dilution et les propriétés
        d’usage.
    perfumery_base_intended_application:
      name: Usage prévu de la base de parfumerie
      description: Indique le format d’usage final pour lequel la base est conçue
        (p. ex., vaporisateur de parfumerie fine ou roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Support ou solvant de l’ingrédient de parfumerie
      description: Identifie le support ou le solvant dans lequel l’ingrédient est
        fourni lorsqu’il est dilué (p. ex., éthanol, DPG, huile de jojoba).
    perfumery_ingredient_form:
      name: Formulaire relatif aux ingrédients de parfumerie
      description: Détermine la forme ou l’état de l’ingrédient de parfumerie tel
        qu’il est fourni.
    perfumery_ingredient_type:
      name: Type d'ingrédient de parfumerie
      description: Classe l’ingrédient de parfumerie selon sa nature en parfumerie
        (p. ex., huile essentielle, molécule aromatique).
    perfumery_ingredient_usage_note:
      name: Note d’usage de l’ingrédient de parfumerie
      description: Indique le rôle habituel de l’ingrédient dans la structure d’un
        parfum (tête, cœur, fond), en tenant compte du fait qu’une matière peut couvrir
        plusieurs notes.
    perfumery_ingredients:
      name: Ingrédients de parfumerie
      description: Recense les types de matières premières de parfumerie incluses
        dans le kit (p. ex., huiles essentielles, huiles parfumées, base alcoolique).
    perfumery_note_position:
      name: Position de la note de parfumerie
      description: Indique le rôle typique de l’ingrédient dans la structure d’un
        parfum (tête, cœur, fond).
    persimmon_variety:
      name: Variété de kaki
      description: Identifie le cultivar ou la variété de kaki, car les variétés comme
        Fuyu ou Hachiya se distinguent par leur texture, leur goût, leur astringence
        et leurs usages culinaires.
    personalization_type:
      name: Type de personnalisation
      description: Indique si le produit peut être personnalisé pour un événement
        et selon quelle méthode (p. ex., monogramme, nom ou date, photo insérée).
    phonics_focus:
      name: Correspondance sons-lettres ciblée
      description: Indique les compétences de correspondance sons-lettres et de lecture
        de mots que le jouet de lecture fait travailler.
    physalis_variety:
      name: Variété de physalis
      description: Identifie l’espèce botanique, le cultivar ou la variété usuelle
        de physalis vendu.
    pi_ata_filler_type_included:
      name: Type de garniture incluse pour la piñata
      description: Type de contenu fourni lorsqu’une garniture est incluse.
    pi_ata_hanging_method:
      name: Mode de suspension de la piñata
      description: Mode prévu pour suspendre ou soutenir la piñata (boucle, crochet,
        ficelle incluse, etc.).
    pi_ata_opening_type:
      name: Type d’ouverture de remplissage de la piñata
      description: Mode d’accès et de fermeture de l’ouverture de remplissage (rabat,
        Velcro, fermeture éclair, déjà scellée, etc.).
    piccolo_key_system:
      name: Système de clés du piccolo
      description: Identifie le système de clés utilisé sur le piccolo, généralement
        le système Boehm pour les piccolos modernes.
    piccolo_keywork_features:
      name: Caractéristiques du mécanisme de clés du piccolo
      description: Recense les mécanismes et options particuliers du système de clés
        du piccolo.
    pick_grip_aid:
      name: Dispositif de préhension du médiator
      description: Indique le principal dispositif de préhension intégré au médiator,
        au-delà de la simple sensation ou texture de surface (p. ex., trous de préhension,
        logo en relief, insert en caoutchouc).
    pickleball_construction_type:
      name: Type de construction pour le pickleball
      description: Construction de la balle, par exemple monobloc sans joint ou en
        deux pièces soudées, avec une incidence sur la durabilité et la régularité
        de la trajectoire.
    pickling_method:
      name: Méthode de saumurage
      description: Indique le milieu ou le procédé de conservation utilisé pour le
        marinage, par exemple une saumure vinaigrée ou la lactofermentation.
    pickup_and_preamp_configuration:
      name: Configuration du micro et du préampli
      description: Indique si l’alto comporte un micro embarqué et, ou, un préampli
        actif pour l’interprétation amplifiée ou l’enregistrement.
    pickup_configuration:
      name: Configuration de la prise
      description: Décrit la disposition générale des micros d’une guitare électrique
        au moyen d’abréviations courantes (p. ex., SSS, HSS, HH).
    pickup_cover_material:
      name: Matériau de la housse de protection
      description: Indique le matériau principal du capot de micro, le cas échéant,
        y compris les finitions plaquées lorsque le fabricant les présente ainsi.
    pickup_cover_type:
      name: Type de capot de micro
      description: Indique si un micro de guitare électrique possède un capot, ainsi
        que la matière ou le type de capot (p. ex., métal ou plastique).
    pickup_string_spacing:
      name: Espacement cordes/plots du micro
      description: Norme d’espacement cordes/plots pour laquelle le micro est conçu
        (p. ex., Fender ou F-spaced, Gibson ou standard), avec une incidence sur l’alignement
        des guitares équipées d’un vibrato.
    pie_crust_type:
      name: Type de pâte à tarte
      description: Indique le style ou le type de pâte utilisé pour la tourte ou la
        tarte, comme une pâte feuilletée, une croûte de biscuits Graham ou une pâte
        sans gluten.
    piece_configuration:
      name: Configuration des pièces
      description: Indique le nombre de pièces distinctes qui composent la queue,
        le fût ou le chevalet, et détermine ainsi la facilité de transport et le style
        de jeu.
    pillow_form_size:
      name: Taille de l’insert de coussin
      description: Désignation normalisée de la taille finie des inserts de coussin
        (p. ex., 18 po x 18 po).
    pilot_helmet_communications_integration:
      name: Intégration des communications au casque de pilote
      description: Indique si le casque intègre un système de communication aéronautique
        ou s’il est prévu pour en recevoir un.
    pilot_helmet_visor_configuration:
      name: Configuration de la visière du casque de pilote
      description: Indique la configuration de la visière ou de l’écran facial inclus
        avec le casque de pilote.
    pin_attachment_type:
      name: Fixation par goupille
      description: Indique le système d’attache au dos de l’épinglette permettant
        de la fixer à un vêtement ou à une surface (p. ex., fermoir papillon, dos
        magnétique).
    pin_backing_type:
      name: Type de fixation par épingle
      description: Indique le système d’attache au dos de l’épinglette permettant
        de la fixer à un vêtement ou à un accessoire.
    pin_cushion_attachment_style:
      name: Mode d’attache du pique-épingles
      description: Manière dont le pique-épingles est porté, fixé ou placé pendant
        l’utilisation.
    pin_cushion_features:
      name: Fonctions du pique-épingles
      description: Fonctions allant au-delà du simple maintien des épingles.
    pin_face_customization_method:
      name: Méthode de réalisation de la face de l’épinglette
      description: Indique la méthode de réalisation du motif de la face de l’épinglette
        (p. ex., émail dur, émail souple, impression).
    pin_type:
      name: Type d’épinglette
      description: Indique le style ou le format d’épinglette utilisé pour les objets
        de collection destinés aux supporters de sport.
    ping_pong_certification:
      name: Certification de ping-pong
      description: Indique la norme officielle applicable au produit ou l’homologation
        délivrée par l’organisme compétent.
    ping_pong_competition_certification:
      name: Homologation de compétition de ping-pong
      description: Indique si la balle de ping-pong est officiellement homologuée
        pour la compétition (p. ex., approuvée par l’ITTF).
    ping_pong_paddle_handle_style:
      name: Type de manche de raquette de ping-pong
      description: Définit la forme ou le type de manche de la raquette, qui modifie
        le confort de prise en main et la technique de jeu.
    ping_pong_robot_accessory_type:
      name: Type d’accessoire de robot de ping-pong
      description: Identifie le sous-type fonctionnel de l’accessoire afin que les
        acheteurs puissent affiner rapidement les résultats (p. ex., filets ou adaptateurs
        secteur).
    ping_pong_rubber_surface_type:
      name: Type de surface du revêtement de ping-pong
      description: Identifie le type ou la texture de la surface du revêtement appliqué
        à la raquette, qui détermine l’effet imprimé à la balle et la vitesse de jeu.
    ping_pong_rubber_type:
      name: Type de revêtement de ping-pong
      description: Précise la structure de surface d’une plaque de revêtement de ping-pong,
        qui détermine les caractéristiques de jeu.
    ping_pong_table_type:
      name: Type de table de ping-pong
      description: Classe la table selon son type ou son format afin d’en faciliter
        la comparaison (p. ex., compétition, plateau de conversion, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Mode de production sonore de l’instrument
      description: Précise comment l’instrument produit le son, selon le mécanisme
        de circulation de l’air, afin de distinguer les flûtes de Pan, les tuyaux
        à anche et les tuyaux d’orgue dans les filtres.
    piston_application_type:
      name: Type d’usage du piston
      description: Usage prévu du piston (remplacement, performance ou course, usage
        renforcé).
    piston_crown_dish_style:
      name: Profil du dessus du piston
      description: Forme du dessus du piston, qui modifie le volume de la chambre
        de combustion et le taux de compression (p. ex., dessus plat, bombé ou creusé).
    piston_pin_retention_type:
      name: Type de retenue de l’axe de piston
      description: Indique le mode de retenue de l’axe de piston dans l’ensemble piston-bielle.
    pit_configuration:
      name: Configuration des stands
      description: Définit la structure de la zone de réception (d’un seul tenant
        ou en plusieurs modules), ainsi que le nombre de sections ou de modules fournis.
    pit_cover_type:
      name: Type de couvercle de regard
      description: Précise la surface ou la bâche de protection fournie avec la zone
        de réception, dont dépendent la résistance aux pointes, la protection contre
        les intempéries et les préférences des athlètes.
    pitahaya_flesh_color:
      name: Couleur de la chair du pitahaya
      description: Précise la couleur de la chair du pitahaya, ou fruit du dragon
        (p. ex., blanche, rouge, magenta), un critère important pour distinguer le
        goût, l’aspect et la perception nutritionnelle.
    pitch_mat_coverage_length:
      name: Longueur couverte par le tapis de cricket
      description: Classe le tapis de cricket selon la portion du terrain qu’il couvre
        (p. ex., terrain complet ou demi-terrain).
    pitch_range:
      name: Plage de hauteur sonore
      description: Décrit la plage de hauteur perçue et la brillance du son du shaker.
    pitch_standard:
      name: Référence d’accordage
      description: Précise la référence d’accordage pour laquelle la flûte à bec est
        conçue (p. ex., la = 440, la = 442, la = 415).
    pitching_rubber_size_designation:
      name: Désignation de taille de la plaque de lanceur
      description: Indique la classification standard de la plaque de lanceur afin
        de faciliter le choix sans obliger les acheteurs à connaître les dimensions
        exactes.
    pitching_screen_style:
      name: Type d’écran de lancer
      description: Définit la structure de l’écran afin que les acheteurs choisissent
        rapidement le dispositif de protection adapté à leur entraînement.
    pitching_target_design:
      name: Type de cible de lancer
      description: Classe la cible de lancer selon son type ou sa configuration générale.
    pitching_wheel_count:
      name: Nombre de roues de la machine de lancer
      description: Indique le nombre de roues de propulsion utilisées par la machine
        de lancer.
    pivot_adjustability:
      name: Pivot réglable
      description: Indique si les ciseaux comportent une vis de pivot permettant d’ajuster
        la tension de coupe.
    pivot_piece_type:
      name: Type de pièce du pivot
      description: Distingue les différentes formes d’interface du pivot fournies,
        comme les coupelles traditionnelles ou les modèles tubulaires.
    place_card_holder_closure_mechanism:
      name: Mécanisme de fermeture du support de marque-place
      description: Précise comment le support maintient le marque-place.
    place_card_orientation:
      name: Orientation du marque-place
      description: Précise l’orientation du marque-place lorsqu’il est utilisé ou
        exposé.
    place_card_printing_status:
      name: État d’impression du marque-place
      description: Indique si le marque-place est vierge et destiné à être rempli
        à la main ou imprimé, préimprimé sans personnalisation des noms, ou imprimé
        avec personnalisation.
    placket_type:
      name: Type de patte d’ouverture
      description: Précise le type de patte d’ouverture à l’avant du polo, y compris
        le nombre de boutons ou les fermetures alternatives.
    planetarium_content_theme:
      name: Thème du contenu de planétarium
      description: Contenu principal projeté par le projecteur de planétarium.
    planetarium_projection_content_format:
      name: Format du contenu de projection du planétarium
      description: Précise le support ou la technologie de projection utilisés par
        le planétarium (disques ou diapositives physiques, effet numérique ou DEL).
    plant_fiber_type:
      name: Type de fibre végétale
      description: Type précis de fibre d’origine végétale lorsque la fibre discontinue
        provient d’une plante.
    plaster_gauze_finish:
      name: Fini de la gaze plâtrée
      description: Tendance du fini de surface après application et lissage.
    plaster_gauze_grade:
      name: Grade de gaze plâtrée
      description: Grade d’usage prévu de la gaze plâtrée (p. ex., loisirs créatifs
        ou usage étudiant, usage professionnel).
    plaster_gauze_weave_density:
      name: Densité de tissage de la gaze plâtrée
      description: Degré d’ouverture ou de serrage du tissage de la gaze, qui détermine
        la solidité et la prise de plâtre.
    plastic_canvas_finish:
      name: Fini de la toile plastique
      description: Traitement de surface ou fini du rouleau de toile plastique.
    plastic_canvas_sheet_finish:
      name: Finition de la toile en plastique
      description: Traitement de la surface et des bords de la feuille de toile plastique.
    plastic_canvas_transparency:
      name: Transparence de la toile plastique
      description: Degré de transparence ou d’opacité de la toile plastique.
    plate_bottom_design:
      name: Type de face inférieure de la plaque
      description: Décrit la construction de la face inférieure de la plaque, qui
        conditionne l’adhérence et la stabilité sur les différentes surfaces de jeu,
        ainsi que la sécurité d’utilisation.
    plate_compatibility_standard:
      name: Norme de compatibilité des plaques
      description: Indique la norme de disque pour laquelle la barre est conçue (p.
        ex., olympique 50 mm, standard 25 mm).
    plate_installation_type:
      name: Type d’installation de la plaque
      description: Précise comment la plaque est fixée ou placée sur le terrain (p.
        ex., enterrée, à pointes, à poser), afin que les acheteurs puissent choisir
        entre une installation permanente et une solution amovible.
    plate_size_category:
      name: Catégorie de taille de plaque
      description: Classe la plaque selon le niveau de jeu ou la norme réglementaire
        applicable, afin que les acheteurs trouvent rapidement du matériel conforme
        aux exigences de leur ligue.
    play_dough_putty_kit_contents:
      name: Contenu du kit de pâte à modeler et de pâte malléable
      description: Identifie les principaux éléments inclus en plus de la pâte elle-même
        (p. ex., outils, moules, extrudeuse, contenant de rangement).
    play_dough_tool_set_items_included:
      name: Articles inclus dans l’ensemble d’outils pour pâte à modeler
      description: Identifie les types d’outils et d’accessoires inclus dans l’ensemble
        d’outils pour pâte à modeler (p. ex., rouleaux, emporte-pièces, moules).
    play_environment_suitability:
      name: Environnement de jeu adapté
      description: Identifie l’environnement de jeu prévu pour l’ensemble (p. ex.,
        intérieur, extérieur, eau).
    play_food_features:
      name: Caractéristiques des aliments factices
      description: Fonctions particulières ou détails réalistes des aliments factices.
    play_food_items_included:
      name: Aliments factices inclus
      description: Indique les types d’aliments factices inclus avec la cuisine pour
        enfant.
    play_food_size_scale:
      name: Échelle de taille des aliments factices
      description: Indique l’échelle approximative des aliments factices afin de vérifier
        leur compatibilité avec les cuisines pour enfants, les poupées et les ensembles
        de jeu.
    play_money_set_components_included:
      name: Éléments compris dans le kit de jeu
      description: Précise les types de composants inclus dans l’ensemble de monnaie
        factice ou de jeu de banque.
    play_pattern:
      name: Schéma de jeu
      description: Utilisation principale prévue du jouet (p. ex., manipulation antistress,
        sculpture ou objet d’art de bureau, construction ou assemblage, casse-tête).
    play_sprinkler_mounting_type:
      name: Mode d’installation du jeu d’arrosage
      description: Mode de positionnement ou de fixation du jeu d’arrosage pendant
        l’utilisation.
    play_vehicle_lights_and_sounds:
      name: Effets lumineux et sonores du véhicule miniature
      description: Indique si le véhicule miniature comporte des effets électroniques,
        comme des lumières ou des sons.
    play_vehicle_scale:
      name: Échelle du véhicule miniature
      description: Indique le rapport d’échelle du véhicule miniature, couramment
        utilisé pour les véhicules miniatures en métal moulé et les véhicules jouets
        de type modèle réduit.
    player_size_category:
      name: Catégorie de taille des joueurs
      description: Définit le gabarit ou la tranche d’âge du joueur visé par l’ensemble
        d’équipement de receveur (p. ex., Tee Ball, jeune, intermédiaire, adulte).
    player_size_range:
      name: Gabarit du joueur
      description: Indique le gabarit d’utilisateur prévu pour la sangle ou le support
        (p. ex., enfant, adulte, universel).
    playing_environment:
      name: Environnement de jeu
      description: Précise la surface ou l’environnement de jeu principal pour lequel
        la balle de hockey est conçue.
    playing_method:
      name: Mode de jeu
      description: Mode principal prévu pour jouer de l’instrument ou l’actionner.
    playing_surface_material:
      name: Matériau de la surface de jeu
      description: Identifie le matériau de la face de frappe du cajón, ou tapa, qui
        détermine fortement le son et le toucher.
    playing_surface_type:
      name: Type de surface de jeu
      description: Décrit la construction et le toucher de la surface de jeu de l’accessoire
        d’entraînement pour percussion.
    playset_activities_included:
      name: Activités incluses dans la structure de jeu
      description: Identifie les principales activités et les principaux équipements
        intégrés au portique ou à la structure de jeu, afin que les acheteurs puissent
        filtrer les produits selon les activités proposées aux enfants.
    playset_installation_type:
      name: Type d'installation de l'aire de jeux
      description: Précise comment le portique ou la structure de jeu est installé
        ou fixé.
    playset_items_included:
      name: Éléments du coffret inclus
      description: Identifie les types d’éléments de jeu d’imitation inclus dans l’ensemble
        de pique-nique (aliments factices, vaisselle, couverture, panier, etc.).
    pliers_jaw_style:
      name: Type de mâchoires de la pince
      description: Décrit la configuration principale des mâchoires de la pince ou
        leur fonction dominante.
    plum_variety:
      name: Variété de prune
      description: Identifie le cultivar ou la variété précise de prune, afin que
        les acheteurs puissent choisir selon le goût, la couleur et l’usage culinaire
        prévu.
    plumcot_variety:
      name: Variété de plumcot
      description: Identifie le cultivar ou la variété commerciale précise de plumcot
        (p. ex., Flavor King, Dapple Dandy), qui peut varier par le goût, la couleur
        et la saison.
    plunger_mute_handle_type:
      name: Type de poignée de la sourdine à ventouse
      description: Précise le type de poignée ou de prise utilisé pour tenir et manipuler
        une sourdine à ventouse afin de produire des effets wa-wa.
    pocket_closure_type:
      name: Type de fermeture de poche
      description: Définit le mode de fermeture de chaque poche afin que les utilisateurs
        trouvent un pantalon dans lequel les objets restent bien maintenus pendant
        l’activité.
    pocket_knife_opening_mechanism:
      name: Mécanisme d’ouverture du couteau de poche
      description: Mode d’ouverture de la lame (encoche pour l’ongle, ergot de pouce,
        flipper, ouverture assistée, automatique, etc.).
    pocket_style:
      name: Type de poche
      description: Précise le principal type de poche du pantalon.
    pocket_type:
      name: Type de poche
      description: Indique le type de poches ou leur présence sur le vêtement.
    pod_retention_system:
      name: Système de maintien des tubes de billes
      description: Décrit comment les tubes de billes de paintball sont maintenus
        en place et libérés du harnais ou du porte-équipement.
    pogo_stick_footrest_type:
      name: Type de repose-pieds du bâton sauteur
      description: Décrit la conception des appuis de pieds sur lesquels l’utilisateur
        se tient debout sur le bâton sauteur.
    pogo_stick_suspension_type:
      name: Type de suspension du bâton sauteur
      description: Précise le mécanisme de rebond du bâton sauteur, qui détermine
        le confort d’utilisation, la durabilité et l’entretien.
    poi_handle_type:
      name: Type de manche de poi
      description: Précise le type de prise ou d’attache utilisé pour tenir le poi.
    poi_light_source:
      name: Source lumineuse du poi
      description: Pour les poi lumineux, précise la technologie d’éclairage utilisée.
    poi_tether_type:
      name: Type de lien du poi
      description: Indique le type de lien qui relie la tête du poi à la poignée,
        au bouton ou à la dragonne (p. ex., cordon, corde, chaîne).
    poi_type:
      name: Type de poi
      description: Spécifie le type de poi selon sa construction ou son usage principal
        (p. ex., entraînement, LED, feu).
    point_type:
      name: Type de pointe
      description: Forme ou type de pointe utilisée sur l’aiguille à broder.
    pointe_shoe_shank_length:
      name: Longueur de la tige des pointes
      description: Partie de la longueur de la chaussure soutenue par le cambrion,
        par exemple toute la longueur ou les trois quarts.
    pointe_shoe_shank_strength:
      name: Rigidité du cambrion du chausson de pointe
      description: Niveau de rigidité du cambrion d’un chausson de pointe, qui détermine
        le soutien offert et le temps nécessaire à l’assouplissement.
    poker_accessory_storage_included:
      name: Rangement inclus pour le matériel de poker
      description: Indique les articles de poker supplémentaires pour lesquels l’accessoire
        prévoit un rangement dédié.
    poker_chip_tray_rack_configuration:
      name: Configuration du plateau ou support à jetons de poker
      description: Décrit la disposition interne du plateau ou support à jetons, notamment
        le nombre de rangées et la capacité de chacune.
    pole_anchoring_method:
      name: Méthode d'ancrage de poteaux
      description: Définit le mode de fixation du poteau au sol ou à la surface de
        jeu.
    pole_basket_type:
      name: Type de panier sur poteau
      description: Classe la rondelle située près de la pointe du bâton de ski selon
        son type ou sa taille, en fonction des conditions de neige prévues.
    pole_connection_system:
      name: Système de connexion du mât
      description: Indique le mécanisme d’assemblage des sections du mât, par cordon
        élastique, filetage ou moyeu, afin d’aider l’utilisateur à évaluer la rapidité
        de montage et la compatibilité.
    pole_system_type:
      name: Type de système de poteaux
      description: Décrit la structure porteuse ou le mode de montage de la tente
        (p. ex., arceaux en aluminium, tubes gonflables, montage avec bâtons de randonnée).
    police_equipment_fitment:
      name: Compatibilité avec l’équipement de police
      description: Présente les équipements de police que le véhicule peut recevoir
        grâce à sa configuration ou à son précâblage.
    police_vehicle_equipment_package:
      name: Ensemble d’équipement du véhicule de police
      description: Décrit les aménagements et équipements de police fournis avec le
        véhicule à la vente.
    police_vehicle_light_siren_equipment:
      name: Équipement lumineux et sonore du véhicule de police
      description: Détaille les avertisseurs d’urgence installés sur la voiture de
        police.
    police_vehicle_upfit_level:
      name: Niveau d’aménagement du véhicule de police
      description: Décrit l’équipement et les aménagements de police installés sur
        le camion.
    polish_formulation:
      name: Formulation du produit d’entretien
      description: Indique la base ou la formulation du produit d’entretien de la
        touche, et non sa méthode d’application.
    polish_purpose:
      name: Fonction du produit d’entretien
      description: Résultat principal attendu du produit d’entretien sur la surface
        de l’instrument.
    pollen_level:
      name: Niveau de pollen
      description: Indique la quantité de pollen produite par la variété de lys ou
        le risque de taches associé.
    polymer_clay_firmness_level:
      name: Degré de fermeté de la pâte polymère
      description: Degré de fermeté ou de souplesse de la pâte polymère avant cuisson,
        selon sa facilité à être modelée.
    polymer_clay_translucency:
      name: Translucidité de la pâte polymère
      description: Degré d’opacité ou de transparence de la pâte polymère après cuisson.
    pom_pom_handle_style:
      name: Modèle avec poignée à pompon
      description: Décrit le type ou la construction de la poignée utilisée pour tenir
        le pompon.
    pom_pom_trim_backing_tape_material:
      name: Matière du ruban support du galon à pompons
      description: Indique la matière du ruban ou du galon cousu auquel les pompons
        sont fixés.
    pom_pom_type:
      name: Type de pompon
      description: Indique la présence et le type précis du pompon sur le bonnet.
    pomegranate_product_form:
      name: Forme de la grenade
      description: Décrit la forme physique sous laquelle la grenade est proposée,
        qu’il s’agisse du fruit entier, d’arilles pelées, de graines ou d’arilles
        surgelées.
    pomegranate_variety:
      name: Variété de grenade
      description: Identifie le cultivar ou la variété précise des grenades (p. ex.,
        Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Type d’attache pour queue de cheval
      description: Décrit le modèle d’attache pour queue de cheval afin que les acheteurs
        puissent choisir celui qu’ils préfèrent.
    popcorn_form:
      name: Forme du pop-corn
      description: Indique sous quelle forme le pop-corn est proposé, par exemple
        prêt à consommer, en grains, en sachet pour micro-ondes, en kit d’assaisonnement
        ou en boîte cadeau.
    pork_rind_form:
      name: Forme des grattons de porc
      description: Classe les grattons de porc selon leur forme ou leur présentation
        (p. ex., couenne, gratton, bouchée soufflée, pastille).
    portability_features:
      name: Fonctionnalités de portabilité
      description: Présente les dispositifs intégrés qui facilitent le déplacement,
        le transport ou le rangement de la chaise longue.
    portability_frame_type:
      name: Portabilité ou type de châssis
      description: Indique si les carillons d’orchestre sont transportables, avec
        un châssis mobile, ou fixes, avec un châssis de concert.
    portable_electronic_game_features:
      name: Fonctions du jeu électronique portable
      description: Fonctions principales de jeu et fonctions matérielles offertes
        par l’appareil.
    post_surgery_stage_suitability:
      name: Adaptation au stade de récupération post-opératoire
      description: Indique le stade de récupération auquel la combinaison est destinée,
        le cas échéant, pour aider les acheteurs de vêtements gainants à usage médical.
    postage_stamp_format:
      name: Format du timbre-poste
      description: Mode de présentation ou de conditionnement du timbre d’usage courant
        (à l’unité, par paire, en bande, en bloc, en feuille, en feuillet de carnet,
        en rouleau, etc.).
    postmark_type:
      name: Type d’oblitération
      description: Type d’oblitération présent sur les timbres d’usage courant oblitérés.
    potato_cut_style:
      name: Type de découpe des pommes de terre
      description: Renseigne le mode de découpe ou de préparation des pommes de terre
        lorsqu’elles ne sont pas vendues entières.
    potato_intended_use:
      name: Usage prévu des pommes de terre
      description: Distingue les pommes de terre destinées à une consommation immédiate
        de celles vendues comme plants ou comme produits transformés surgelés.
    potato_variety:
      name: Variété de pomme de terre
      description: Correspond au cultivar ou à la variété des pommes de terre, afin
        que les acheteurs puissent trouver des types précis, comme « Yukon Gold »,
        « Maris Piper » ou « Purple Majesty ».
    pottery_clay_firing_required:
      name: Cuisson requise pour l’argile de poterie
      description: Indique si le matériau doit être cuit au four pour atteindre la
        dureté ou le fini prévu.
    pottery_slip_application_method:
      name: Méthode d’application de la barbotine
      description: Indique la technique prévue pour appliquer la barbotine.
    pottery_slip_compatible_clay_body:
      name: Pâte céramique compatible avec la barbotine
      description: Indique les types de pâte céramique avec lesquels la barbotine
        est compatible.
    pottery_slip_form:
      name: Forme de la barbotine
      description: Indique si la barbotine est vendue prête à l’emploi, sous forme
        liquide, ou sous forme de mélange sec ou de poudre à préparer.
    pouch_design:
      name: Forme de la poche avant
      description: Décrit la forme de la poche avant ou les éléments conçus pour la
        renforcer ou la mettre en valeur.
    pouch_style:
      name: Type de poche avant
      description: Précise le type de poche avant, en tenant compte du confort, du
        maintien et de l’esthétique recherchés.
    powdered_beverage_variety:
      name: Assortiment de boissons en poudre
      description: Classe le produit selon le type de boisson préparée, comme une
        limonade, une boisson pour sportifs ou une boisson protéinée.
    power_rack_style:
      name: Type de rack de musculation
      description: Présente la structure générale du rack de musculation afin de distinguer
        les cages complètes, les demi-racks et les modèles compacts.
    power_steering_fluid_formulation:
      name: Formulation du liquide de direction assistée
      description: Famille de formulation du liquide, par exemple à base d’ATF, hydraulique
        dédiée ou universelle, utilisée pour un premier filtrage de compatibilité.
    practice_mute_audio_output:
      name: Sortie audio de la sourdine d’étude
      description: Indique le type de sortie audio disponible sur la sourdine d’étude
        pour l’écoute ou l’enregistrement, comme c’est souvent le cas sur les sourdines
        d’étude silencieuses ou électroniques.
    practice_mute_intonation_impact:
      name: Effet de la sourdine d’étude sur l’intonation
      description: Décrit l’effet attendu de la sourdine d’étude sur la justesse ou
        l’intonation.
    practice_mute_venting_valve_type:
      name: Type d’évent ou de valve de la sourdine d’étude
      description: Indique si la sourdine d’étude comporte un évent ou une valve réglable,
        ainsi que l’effet de ce dispositif sur la résistance ou le volume sonore.
    practice_pad_features:
      name: Caractéristiques du tapis d'entraînement
      description: Présente les fonctions du tampon d’entraînement autres que la taille
        ou la matière.
    practice_pad_mounting_style:
      name: Mode d’installation du tampon d’entraînement
      description: Indique comment le tampon d’entraînement doit être positionné ou
        fixé pendant l’utilisation.
    practice_pad_rebound_level:
      name: Rebond du tampon d’entraînement
      description: Indique le rebond ou la réponse du tampon d’entraînement par rapport
        à une peau de batterie standard.
    practice_pad_surface_configuration:
      name: Agencement de la surface du tampon d’entraînement
      description: Indique si le tampon comporte une ou plusieurs surfaces de jeu
        et si leur toucher diffère.
    pregnancy_stage_suitability:
      name: Adaptation au stade de grossesse
      description: Indique le ou les stades de grossesse ou de post-partum auxquels
        le vêtement est destiné.
    preparation_state:
      name: État de préparation
      description: Indique le degré de préparation ou de cuisson nécessaire avant
        consommation.
    preparation_style:
      name: Mode de préparation
      description: Définit l’état des châtaignes d’eau à la vente, selon leur découpe
        ou leur préparation (p. ex., entières, tranchées, rôties, surgelées).
    preservation_medium:
      name: Milieu de conservation
      description: Indique le principal liquide ou milieu utilisé pour conserver les
        olives ou les câpres (p. ex., saumure, huile d’olive, vinaigre).
    presser_foot_attachment_method:
      name: Mode de fixation du pied-de-biche
      description: Décrit le mode de fixation du pied-de-biche à son support ou à
        sa tige (p. ex., par encliquetage ou par vissage), ce qui conditionne sa compatibilité.
    pressure_gauge_type:
      name: Type de manomètre
      description: Indique le type de manomètre fourni avec la pompe à vélo, le cas
        échéant.
    pressure_measurement_unit:
      name: Unité de mesure de la pression
      description: Indique l’unité utilisée pour la lecture ou l’étalonnage du capteur
        de pression, afin de comparer les produits et de vérifier la compatibilité
        avec le manomètre ou le calculateur.
    pressure_plate_balance_type:
      name: Type d’équilibrage du plateau de pression
      description: Indique si le plateau de pression est équilibré en interne ou s’il
        requiert un équilibrage externe correspondant à la configuration du moteur
        et du volant moteur.
    pressure_plate_components_included:
      name: Composants fournis avec le plateau de pression
      description: Éléments inclus dans l’offre du plateau de pression.
    pressure_sensor_application:
      name: Usage du capteur de pression
      description: Indique le système du véhicule ou le point de mesure auquel le
        capteur de pression est destiné.
    pressure_sensor_port_thread_standard:
      name: Norme d’orifice ou de filetage du capteur de pression
      description: Indique la norme mécanique de l’orifice ou du filetage utilisée
        pour installer le capteur dans le système du véhicule.
    pressurization_method:
      name: Mode de pressurisation
      description: Indique par quel procédé la pression est générée ou maintenue à
        l’intérieur du dispositif.
    pretend_housekeeping_set_items_included:
      name: Accessoires inclus dans le jeu d’imitation de ménage
      description: Dresse la liste des accessoires de ménage inclus dans le jeu d’imitation,
        comme la serpillière, le balai, la pelle à poussière ou le vaporisateur.
    pretend_play_electronic_features:
      name: Fonctions électroniques du jeu d’imitation
      description: Fonctions électroniques ou interactives incluses dans le jeu d’imitation.
    pretend_play_set_pieces_included:
      name: Éléments inclus dans le jeu d’imitation
      description: Principaux accessoires ou éléments inclus dans le jeu d’imitation
        (p. ex., caisse enregistreuse, aliments factices, outils).
    pretend_play_set_theme:
      name: Thème principal du jeu d’imitation
      description: Scénario ou univers principal représenté par le produit (p. ex.,
        cuisine, docteur, école, boutique, garage, poupée, etc.), pour faciliter la
        recherche dans toute la catégorie des jeux d’imitation.
    pretzel_coating:
      name: Enrobage du bretzel
      description: Indique l’assaisonnement ou l’enrobage appliqué au bretzel, qu’il
        soit salé (p. ex., sel, mélange d’épices) ou sucré (p. ex., chocolat, yaourt,
        caramel).
    pretzel_shape:
      name: Forme du bretzel
      description: Indique la forme du bretzel (p. ex., torsade, bâtonnet, bouchée),
        un critère important pour la recherche et le filtrage.
    primary_component_material:
      name: Matériau principal du composant
      description: Matériau principal du bloc moteur.
    primary_dish_application:
      name: Plat ou préparation principale
      description: Indique le plat ou la préparation principale auxquels la pâte est
        destinée.
    primary_plant_base:
      name: Base végétale principale
      description: Indique les principaux ingrédients non laitiers utilisés pour fabriquer
        le substitut de fromage.
    primary_plant_protein_source:
      name: Source principale de protéines végétales
      description: Indique l’ingrédient végétal qui apporte l’essentiel des protéines
        du produit.
    primary_sweetener_source:
      name: Source sucrante principale
      description: Indique la plante ou la matière première dont le sirop est issu.
    print_placement:
      name: Emplacement de l'impression
      description: Indique l’emplacement du visuel principal ou du logo sur le t-shirt.
    print_technique:
      name: Technique de marquage
      description: Indique la technique de marquage ou de décoration utilisée pour
        le visuel du t-shirt.
    printable_canvas_intended_use:
      name: Usage prévu de la toile imprimable
      description: Usage principal pour lequel la toile imprimable est conçue.
    printable_fabric_format:
      name: Format du tissu imprimable
      description: Indique si le coton imprimable est fourni en feuilles individuelles
        ou en rouleau continu, afin de vérifier son passage dans l’imprimante et son
        adaptation au projet.
    prism_material:
      name: Matériau du prisme
      description: Indique la matière de l’élément optique, c’est-à-dire du prisme
        lui-même, dont dépendent la netteté, la durabilité et la résistance aux rayures.
    prisoner_transport_configuration:
      name: Configuration pour le transport de détenus
      description: Indique si le fourgon est aménagé pour le transport de détenus
        et selon quelle configuration.
    prisoner_transport_partition_type:
      name: Type de cloison pour le transport de détenus
      description: Type de cloison ou de cage intérieure séparant les compartiments
        avant et arrière.
    privacy_or_acoustic_feature:
      name: Fonction d’intimité ou d’isolation acoustique
      description: Indique les éléments intégrés qui préservent l’intimité ou améliorent
        l’isolation acoustique, comme les cloisons, les écrans acoustiques ou les
        cabines fermées.
    processing_state:
      name: État du traitement
      description: Indique si les plumes sont stérilisées, lavées ou préparées d’une
        autre façon pour les loisirs créatifs.
    produce_grade:
      name: Classe de qualité
      description: Classe le kiwi selon sa classe de qualité, déterminée d’après son
        calibre, son aspect et son état.
    produce_growth_stage:
      name: Stade de croissance
      description: Indique le stade de croissance auquel le produit est vendu (p.
        ex., micropousse, jeune feuille, feuille mature, plant vivant, graine).
    produce_washing_state:
      name: État de lavage
      description: Indique si les légumes verts sont vendus lavés et prêts à consommer.
    profile_shape:
      name: Profil ou forme
      description: Courbure ou profil général de la cymbale, selon l’inclinaison entre
        le bord et le dôme.
    projectile_ammunition_type:
      name: Type de projectile ou de munition
      description: Indique le type de projectiles ou de consommables utilisés par
        l’arme factice, le cas échéant.
    projectile_finish:
      name: Finition du projectile
      description: Indique le revêtement appliqué à la bille BB pour améliorer sa
        résistance à la corrosion ou sa visibilité (p. ex., cuivrée, zinguée, peinte).
    projectile_type:
      name: Type de projectile
      description: Indique le type de projectile que le produit utilise ou pour lequel
        il est prévu.
    pronation_support:
      name: Soutien de la pronation
      description: Indique le type de foulée ou de pronation auquel la chaussure de
        sport est adaptée.
    propellant_type:
      name: Type d’agent propulseur
      description: Indique l’agent propulseur pour lequel la pièce ou l’accessoire
        est conçu.
    propeller_blade_cup:
      name: Courbure des pales d’hélice
      description: Indique l’importance de la courbure du bord de fuite des pales.
    propeller_hub_type:
      name: Type de moyeu d’hélice
      description: Indique le système de moyeu ou de bague d’adaptation utilisé par
        l’hélice, selon qu’il s’agit d’un kit de moyeu remplaçable ou d’un montage
        emmanché.
    propeller_rotation:
      name: Rotation de l’hélice
      description: Indique le sens de rotation de l’hélice.
    protectant_formula_base:
      name: Base de la formule du protecteur
      description: Indique la base de formulation du protecteur, qui conditionne le
        brillant, le toucher et le nettoyage (p. ex., à base d’eau ou de solvant).
    protection_coverage_area:
      name: Étendue de la protection
      description: Indique les parties de la montre couvertes par l’accessoire de
        protection.
    protection_level:
      name: Niveau de protection
      description: Indique le niveau de protection que l’étui offre pour le transport
        et le rangement de l’instrument.
    protective_case_interior_protection_type:
      name: Type de protection intérieure de l’étui
      description: Décrit le principal dispositif de protection intérieure qui maintient
        le contenu en place et amortit les chocs.
    protective_case_shell_type:
      name: Type de coque de l’étui de protection
      description: Indique le type de coque extérieure de l’étui et son degré de rigidité,
        deux critères qui déterminent la protection contre l’écrasement et la facilité
        de transport.
    protective_contact_padding_material:
      name: Matériau de rembourrage des points de contact
      description: Matériau utilisé aux points de contact avec l’instrument, notamment
        sur le support ou l’insert de pavillon, pour éviter les rayures (p. ex., feutre,
        caoutchouc).
    protective_cup_configuration:
      name: Configuration de la coquille de protection
      description: Indique si une coquille de protection est incluse, si elle est
        amovible ou si le vêtement comporte seulement une poche pour coquille.
    protective_eyewear_standard_compliance:
      name: Conformité des lunettes de protection aux normes
      description: Précise les normes ou certifications de sécurité ou de résistance
        aux chocs que les lunettes respectent ou dépassent pour un usage sportif.
    protective_gear_certification_standard:
      name: Norme de certification de l’équipement de protection
      description: Indique la norme de sécurité ou de certification à laquelle l’équipement
        est conforme, selon le type d’article (normes applicables aux casques, aux
        combinaisons ou aux protections antichoc).
    protective_gear_items_included:
      name: Articles de protection inclus
      description: Liste les pièces comprises dans un ensemble de protection composé
        de plusieurs articles.
    protective_gear_padding_type:
      name: Type de rembourrage de l’équipement de protection
      description: Précise le type de rembourrage utilisé dans l’équipement de protection
        contre les chocs.
    protective_gear_safety_certifications:
      name: Certifications de sécurité de l’équipement de protection
      description: Liste les normes reconnues de sécurité ou de performance propres
        au sport auxquelles le produit est conforme, comme les normes NOCSAE ou ASTM
        applicables aux casques de hockey sur gazon.
    protective_pad_components_included:
      name: Protections incluses
      description: Précise les protections incluses dans un ensemble composé de plusieurs
        articles, afin que les acheteurs sachent exactement quelles parties du corps
        elles couvrent.
    protective_shorts_intended_use:
      name: Usage prévu du short de protection
      description: Indique la discipline principale, pratique ou compétition, pour
        laquelle le short de protection est conçu.
    protective_shorts_padding_type:
      name: Type de rembourrage pour short de protection
      description: Précise la structure ou le format des protections intégrées au
        short.
    protective_shorts_padding_zones:
      name: Zones de rembourrage des shorts de protection
      description: Indique les parties du corps dotées de rembourrages ou de coques
        intégrés au short de protection.
    protective_treatment:
      name: Traitement protecteur
      description: Précise la finition ou le traitement protecteur appliqué contre
        les taches, l’eau ou les UV (p. ex., Teflon).
    protector_coverage_area:
      name: Étendue de la protection
      description: Précise les zones du torse que la protection est conçue pour couvrir
        (p. ex., poitrine, dos, côtés).
    puck_bottom_style:
      name: Type de fond de palet
      description: Décrit le profil du fond du palet, qui modifie la vitesse et le
        contrôle selon les surfaces de shuffleboard.
    puck_type:
      name: Type de palet
      description: Classe le palet de hockey selon son type fonctionnel ou son usage
        prévu, du jeu officiel à l’objet de collection.
    pull_buoy_style:
      name: Type de pull-buoy
      description: Indique le type fonctionnel ou la configuration du pull-buoy, par
        exemple standard, pour chevilles ou combiné pullkick.
    pull_through_weight_material:
      name: Matériau du poids de guidage
      description: Pour les écouvillons à tirer, indique la matière du poids utilisé
        pour guider l’écouvillon dans l’instrument.
    pulp_content:
      name: Teneur en pulpe
      description: Indique la quantité de pulpe de fruit ou de légume présente dans
        la boisson.
    pump_accessories_included:
      name: Accessoires de pompe inclus
      description: Énumère les articles supplémentaires fournis avec la pompe à ballon
        afin que les acheteurs comprennent ce que comprend l’ensemble.
    pumping_compatibility:
      name: Compatibilité avec le tire-lait
      description: Indique si le soutien-gorge d’allaitement est compatible avec un
        tire-lait mains libres, en plus de permettre l’allaitement.
    punch_pad_type:
      name: Type de cible de frappe
      description: Précise la conception ou le style d’une cible de frappe ou d’entraînement
        afin d’aider les acheteurs à choisir le modèle adapté à leurs besoins d’entraînement.
    punching_training_bag_shape:
      name: Forme du sac de frappe ou d’entraînement
      description: Définit la forme du sac de frappe afin d’aider les acheteurs à
        choisir un modèle adapté à des exercices précis, comme les uppercuts ou les
        coups au corps.
    puncture_protection_technology:
      name: Technologie de protection contre les crevaisons
      description: Énumère les couches anticrevaison ou les technologies de renfort
        des flancs ou de la carcasse, propriétaires ou génériques, intégrées au pneu
        (p. ex., EXO, SnakeSkin, bande en Kevlar).
    puppet_features:
      name: Caractéristiques de la marionnette
      description: Présente les caractéristiques fonctionnelles ou les possibilités
        de jeu de la marionnette (p. ex., bouche mobile, effets sonores, modèle réversible).
    puppet_puppet_theater_accessory_type:
      name: Type de marionnette et d'accessoire de théâtre de marionnettes
      description: Définit le type d’accessoire dont il s’agit (p. ex., accessoire
        de scène, costume de marionnette, barre de contrôle, fil de rechange).
    purity_unit:
      name: Unité de pureté
      description: Mode d’expression de la pureté de la pièce, en titre ou en carats.
    push_up_bar_design:
      name: Type de barres de pompes
      description: Décrit la conception fonctionnelle des barres de pompes (p. ex.,
        fixes, rotatives, parallettes).
    pushrod_end_type:
      name: Type d’extrémité de tige de poussée
      description: Définit le type d’extrémité ou de fixation de la tige de poussée
        utilisée à l’interface avec la pédale ou le maître-cylindre.
    putty_glow_activation_method:
      name: Mode d’activation de la pâte phosphorescente
      description: Mode de charge ou d’activation de la pâte pour la faire briller
        dans l’obscurité (p. ex., lumière du soleil, UV, lumière noire).
    putty_glow_color:
      name: Couleur phosphorescente de la pâte
      description: Correspond à la couleur que la pâte émet lorsqu’elle brille dans
        l’obscurité.
    putty_inclusions:
      name: Éléments inclus dans la pâte
      description: Éléments remarquables inclus dans la pâte (p. ex., paillettes,
        confettis, billes de mousse).
    putty_texture:
      name: Texture de la pâte
      description: Principale réaction de la pâte lorsqu’elle est manipulée (p. ex.,
        rebondissante, extensible, presque liquide).
    puzzle_accessory_features:
      name: Caractéristiques des accessoires pour puzzles
      description: Caractéristiques fonctionnelles et éléments de conception des accessoires
        pour casse-têtes (variables selon le type d’accessoire).
    pyrometric_cone_range:
      name: Plage de cônes pyrométriques
      description: Cône pyrométrique ou plage de cônes pyrométriques auxquels l’émail
        est formulé pour être cuit (p. ex., cône 06 à 04, cône 5 à 6).
    quarter_panel_coverage_type:
      name: Étendue du panneau de custode
      description: Définit la partie du panneau de custode que le produit remplace
        ou permet de réparer.
    quarter_panel_set_contents:
      name: Contenu de l’ensemble de panneaux de custode
      description: Définit la composition de l’ensemble de panneaux de custode proposé
        dans l’annonce (p. ex., un seul côté, paire, sections de réparation supplémentaires).
    quilting_ruler_markings:
      name: Repères de règle de patchwork
      description: Définit les types de repères imprimés sur une règle de patchwork
        pour guider la coupe et l’alignement.
    quilting_ruler_non_slip_feature:
      name: Dispositif antidérapant de la règle de patchwork
      description: Indique si la règle comporte un dos antidérapant ou un traitement
        de surface qui limite les déplacements sur le tissu.
    quilting_ruler_transparency:
      name: Transparence de la règle de patchwork
      description: Indique le degré de transparence du matériau de la règle, afin
        de voir le tissu et les repères placés dessous.
    quilting_thread_usage:
      name: Usage du fil à quilter
      description: Indique l’usage prévu du fil à quilter selon le type de travail
        auquel il est destiné.
    quilting_thread_weight_system:
      name: Système de titrage du fil à quilter
      description: Définit le système de titrage servant à exprimer la grosseur du
        fil à quilter, afin d’interpréter correctement la valeur numérique (p. ex.,
        wt, Tex, denier).
    quince_variety:
      name: Variété de coing
      description: Indique le cultivar ou la variété de coing, car la saveur, l’arôme
        et les usages culinaires peuvent varier selon la variété.
    quinoa_variety:
      name: Variété de quinoa
      description: Correspond à la couleur ou à la variété de quinoa, car les saveurs,
        les textures et les temps de cuisson varient selon la variété.
    quinto_tuning_system:
      name: Système d'accordage Quinto
      description: Mode d’accordage ou de tension du quinto.
    race_car_class:
      name: Classe de voiture de course
      description: Classe ou catégorie de compétition pour laquelle la voiture est
        construite, selon le règlement ou le groupe d’homologation.
    racing_balaclava_face_opening_style:
      name: Forme de l’ouverture du visage de la cagoule de course
      description: Configuration de l’ouverture du visage de la cagoule, qui agit
        sur l’ajustement du casque, l’étanchéité et le confort.
    racing_balaclava_neck_coverage_length:
      name: Longueur de la protection du cou de la cagoule de course
      description: Longueur du rabat de cou prévu pour se glisser dans la combinaison
        ou le dispositif de retenue cervicale, afin d’assurer l’étanchéité et la protection.
    racing_balaclava_ventilation_zones:
      name: Zones de ventilation de la cagoule de course
      description: Emplacement des zones respirantes, en maille ou ventilées, prévues
        pour améliorer la circulation de l’air sous le casque.
    racing_chest_guard_intended_use:
      name: Usage prévu du plastron de course
      description: Discipline ou contexte de sport automobile pour lequel le plastron
        est principalement conçu.
    racing_chest_guard_size_type:
      name: Type de taille du plastron de course
      description: Indique si le produit est proposé en taille enfant, en taille adulte,
        en taille universelle ou en version réglable.
    racing_glove_certification_standard:
      name: Norme de certification des gants de course
      description: Indique la certification ou la norme de sécurité à laquelle les
        gants de course sont conformes, ainsi que l’indice ou le niveau applicable,
        le cas échéant (p. ex., FIA, SFI, CE).
    racing_goggles_lens_system:
      name: Système d’écran du masque de course
      description: Définit le système compatible avec le masque pour remplacer l’écran
        ou utiliser des films détachables de type tear-off ou roll-off.
    racing_helmet_certification_standard:
      name: Norme de certification des casques de course
      description: Certification ou certifications de sécurité auxquelles le casque
        de course est conforme.
    racing_kart_brake_type:
      name: Type de freinage du kart de course
      description: Type du système de freinage principal monté sur le kart.
    racing_kart_class:
      name: Catégorie de kart de course
      description: Catégorie de compétition ou règlement auquel le kart de course
        doit être conforme.
    racing_kart_frame_material:
      name: Matériau du cadre du kart de course
      description: Matériau principal du cadre ou du châssis du kart de course.
    racing_kart_seat_size:
      name: Taille du siège de kart de course
      description: Désignation de taille du siège de kart de course utilisée pour
        vérifier la compatibilité.
    racing_neck_support_style:
      name: Type de support cervical de course
      description: Type de structure du support cervical de course et mode d’appui
        sur le torse et le casque du pilote.
    racing_suit_certification_standard:
      name: Norme de certification des combinaisons de course
      description: Indique la certification ou l’homologation de sécurité en course
        à laquelle la combinaison est conforme (p. ex., normes FIA ou SFI).
    racing_suit_cuff_design:
      name: Finition des bords de la combinaison de course
      description: Type de finition aux poignets ou aux bas de jambe, prévu pour assurer
        la jonction avec les gants ou les bottines et améliorer l’étanchéité et le
        confort.
    racing_suit_size_system:
      name: Système de tailles des combinaisons de course
      description: Système de tailles utilisé pour la combinaison (p. ex., tailles
        alphabétiques S à XXL, tailles numériques UE ou US, tailles enfant).
    racing_truck_discipline:
      name: Discipline de camion de course
      description: Définit la discipline ou le format de course pour lequel le camion
        est principalement conçu.
    rack_side_configuration:
      name: Configuration latérale du rack
      description: Indique si le support range les tapis d’un seul côté ou des deux
        côtés, ce qui modifie l’encombrement et l’accès aux tapis.
    rack_system_configuration:
      name: Configuration du système de rack
      description: Décrit l’agencement ou la forme générale du système de rack de
        batterie.
    racket_dampener_type:
      name: Type d’amortisseur de raquette
      description: Définit le mode de pose ou le type fonctionnel de l’amortisseur
        de vibrations pour raquette.
    racket_grip_size:
      name: Taille du manche de la raquette
      description: Définit la taille du manche de la raquette selon sa circonférence,
        afin d’assurer une prise en main confortable et adaptée (p. ex., G1 à G6).
    racket_sport_shoe_court_surface:
      name: Surface de court des chaussures de tennis
      description: Définit la surface de court pour laquelle la chaussure de tennis
        est conçue ou optimisée, afin d’aider les joueurs à choisir un modèle dont
        le dessin de semelle extérieure et la gomme sont adaptés à leur surface de
        jeu habituelle.
    racket_string_pattern:
      name: Disposition des cordes d'une raquette
      description: Correspond au nombre de cordes montantes et traverses du plan de
        cordage, qui influe sur le contrôle, la prise d’effet et la durabilité (p.
        ex., 16 x 18).
    racket_stringing_status:
      name: État de cordage de la raquette
      description: Indique si la raquette est vendue cordée, non cordée ou avec un
        cordage d’origine.
    racket_weight_class:
      name: Catégorie de poids de la raquette
      description: Présente les catégories de poids « U » propres au badminton, afin
        d’aider les joueurs à choisir une raquette dans la plage de masse souhaitée.
    racquet_toy_set_equipment_included:
      name: Accessoires inclus dans le jeu de raquettes
      description: Énumère les éléments fournis avec le jouet ou le jeu (p. ex., filet,
        balles, raquettes ou raquettes plates).
    racquetball_squash_training_aid_type:
      name: Type d'accessoire d'entraînement pour le racquetball et le squash
      description: Classe l’aide à l’entraînement ou l’accessoire selon son type précis,
        afin d’aider les acheteurs à trouver rapidement l’article recherché.
    radiator_cap_gasket_material:
      name: Matériau du joint du bouchon de radiateur
      description: Matériau du ou des joints d’étanchéité du bouchon de radiateur.
    radiator_cap_pressure_relief_style:
      name: Type de décharge de pression du bouchon de radiateur
      description: Définit le type de décharge de pression, de mise à l’air ou d’actionnement
        du bouchon de radiateur, avec des effets possibles sur la manipulation, la
        sécurité et l’usage prévu.
    radiator_expansion_tank_cap_application:
      name: Destination du bouchon de radiateur ou de vase d’expansion
      description: Indique si le bouchon est destiné au col de remplissage du radiateur,
        au vase d’expansion ou au réservoir de récupération du liquide de refroidissement.
    radiator_fan_control_type:
      name: Type de commande du ventilateur de radiateur
      description: Définit le mode de commande ou de déclenchement du ventilateur
        de radiateur.
    radiator_fan_mounting_pattern:
      name: Configuration de montage du ventilateur de radiateur
      description: Définit le type ou la configuration de montage servant à fixer
        le ventilateur ou l’ensemble ventilateur.
    radiator_fan_type:
      name: Type de ventilateur de radiateur
      description: Correspond au type fonctionnel ou à la configuration du ventilateur
        de radiateur ou de son ensemble.
    radiator_hose_end_type:
      name: Type d’extrémité de durite de radiateur
      description: Précise le principal type de raccordement ou d’étanchéité aux extrémités
        de la durite de radiateur pour assurer la liaison avec les orifices du radiateur
        ou du moteur.
    radiator_hose_position:
      name: Position de la durite de radiateur
      description: Position fonctionnelle ou type de durite de radiateur dans le circuit
        de refroidissement.
    radiator_hose_shape:
      name: Forme de la durite de radiateur
      description: Géométrie ou forme générale de la durite, prévue pour son cheminement
        et son ajustement lors de l’installation.
    radiator_overflow_tank_level_sensor_provision:
      name: Prédisposition du réservoir de trop-plein pour capteur de niveau
      description: Indique si le réservoir comprend un capteur de niveau du liquide
        de refroidissement ou s’il comporte l’emplacement nécessaire pour en recevoir
        un.
    radiator_overflow_tank_shape:
      name: Forme du vase d'expansion du radiateur
      description: Forme générale du corps du réservoir de trop-plein.
    radish_variety:
      name: Variété de radis
      description: Précise le cultivar ou le type de radis afin d’aider les acheteurs
        à choisir des caractéristiques particulières de saveur, de couleur ou de calibre
        (p. ex., daikon, radis pastèque, radis Petit Déjeuner Français).
    radius_of_hollow:
      name: Rayon du creux
      description: Précise le profil de creux que l’affûteuse produit sur la lame,
        exprimé en tailles standard distinctes ou en profil plat.
    rail_coverage_configuration:
      name: Configuration des barrières de protection
      description: Indique quelles parties du lit bébé l’ensemble de protections couvre,
        en précisant si l’article acheté correspond à un panneau avant seul ou à un
        ensemble de plusieurs pièces couvrant le pourtour du lit.
    rail_mount_standard:
      name: Norme de fixation sur rail
      description: Indique la norme de rail ou d’interface de fixation utilisée pour
        monter un accessoire sur un pistolet à billes (p. ex., viseur, lampe).
    rail_side:
      name: Côté du rail
      description: Indique si le rail de rechange correspond au côté gauche, au côté
        droit ou à une paire.
    rail_style:
      name: Forme du rail
      description: Sert à distinguer la forme ou la configuration générale du rail,
        dont dépendent les figures réalisables et l’espace nécessaire (p. ex., en
        A, en arc, coudé).
    rail_system:
      name: Système de rail
      description: Correspond à l’interface de fixation d’accessoires dont la réplique
        d’airsoft est équipée (p. ex., Picatinny, M-LOK).
    rain_sensor_technology:
      name: Technologie des capteurs de pluie
      description: Principe de détection utilisé pour détecter la présence d’eau sur
        le pare-brise.
    rain_suit_configuration:
      name: Composition de l’ensemble de pluie
      description: Indique si le produit se présente sous forme de combinaison une
        pièce, d’ensemble en plusieurs pièces ou d’une autre configuration.
    rainstick_construction_type:
      name: Type de construction du bâton de pluie
      description: Décrit le mode de construction du bâton de pluie, selon qu’il s’agit
        d’un tube traditionnel en cactus ou en bois, ou d’une variante moderne.
    rainstick_fill_material:
      name: Matériau de remplissage du bâton de pluie
      description: Précise le matériau placé à l’intérieur du bâton de pluie pour
        produire le son de cascade (p. ex., graines, perles).
    rainstick_playing_technique:
      name: Technique de jeu du bâton de pluie
      description: Indique les techniques de jeu ou la manière de manipuler le bâton
        de pluie recommandées pour produire l’effet recherché.
    rainstick_sound_character:
      name: Caractère sonore du bâton de pluie
      description: Présente le caractère sonore général du bâton de pluie.
    raising_method:
      name: Mode d’élevage
      description: Présente les conditions d’élevage et d’engraissement des animaux
        avant transformation (p. ex., nourris à l’herbe, élevés au pâturage, finis
        aux céréales).
    rally_competition_class:
      name: Catégorie de compétition de rallye
      description: Catégorie de l’organisme d’homologation ou du règlement selon laquelle
        la voiture de rallye est construite, lorsqu’elle est connue.
    rally_surface_setup:
      name: Réglage de surface pour voiture de rallye
      description: Surface ou terrain principalement visé par le réglage ou la préparation
        de la voiture de rallye.
    ramp_surface_texture:
      name: Texture de la surface de la rampe
      description: Présente la finition ou le niveau d’adhérence de la surface de
        roulement de la rampe.
    ratchet_mounting_style:
      name: Fixation à cliquet
      description: Mode de tenue ou de fixation de la crécelle musicale pendant le
        jeu ou l’installation.
    rattle_element_material:
      name: Matériau des éléments sonores
      description: Matériau des éléments sonores qui produisent le bourdonnement ou
        le bruit de crécelle caractéristique (p. ex., dents, grelots, perles).
    rattle_type:
      name: Type de bruiteur
      description: Indique si le leurre contient un bruiteur interne ou une chambre
        sonore et, le cas échéant, le type de bruiteur présent.
    rc_airship_lifting_gas_type:
      name: Type de gaz de sustentation du dirigeable radiocommandé
      description: Indique le gaz prévu pour remplir l’enveloppe du dirigeable radiocommandé,
        le cas échéant.
    rc_helicopter_control_frequency:
      name: Fréquence de commande de l’hélicoptère radiocommandé
      description: Bande de radiofréquences utilisée entre la radiocommande et l’hélicoptère,
        avec des effets possibles sur la résistance aux interférences et la compatibilité
        (p. ex., 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Fonctions de stabilisation de l’hélicoptère radiocommandé
      description: Présente les fonctions d’aide à la stabilisation ou au pilotage
        qui facilitent le vol ou offrent des possibilités supplémentaires.
    rc_motorcycle_controller_type:
      name: Type de contrôleur pour moto RC
      description: Format de la radiocommande incluse.
    rc_plane_takeoff_launch_method:
      name: Mode de décollage ou de lancement de l’avion radiocommandé
      description: Mode habituel de lancement ou de décollage de l’avion, qui détermine
        les lieux et les conditions dans lesquels il peut être utilisé.
    rc_vehicle_controller_type:
      name: Type de dispositif de commande du véhicule radiocommandé
      description: Renvoie au format du dispositif de commande utilisé pour piloter
        le véhicule radiocommandé.
    rc_vehicle_scale:
      name: Échelle des véhicules RC
      description: Présente le rapport d’échelle de la voiture ou du camion télécommandé,
        c’est-à-dire sa catégorie de taille (p. ex., 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Type de terrain du véhicule radiocommandé
      description: Indique le terrain principal pour lequel la voiture ou le camion
        télécommandé est conçu.
    reach_adjustment_type:
      name: Type de réglage de la portée
      description: Indique si la distance entre le levier et le guidon est réglable
        et, le cas échéant, si le réglage s’effectue sans outil ou nécessite un outil.
    rear_axle_spacing:
      name: Espacement de l’axe arrière
      description: Taille de patte ou d’axe que l’arrière du cadre est prévu pour
        recevoir, ce qui conditionne la compatibilité de la roue.
    rear_axle_standard:
      name: Standard d’axe arrière
      description: Correspond à l’interface ou au format d’axe utilisé par la roue
        arrière (p. ex., blocage rapide, différents formats d’axe traversant).
    rear_axle_type:
      name: Type d’axe arrière
      description: Correspond au système d’attache et au diamètre d’axe qui maintiennent
        la roue arrière sur le cadre.
    rear_coverage:
      name: Couverture arrière
      description: Indique dans quelle mesure le bas de bikini couvre les fesses (p.
        ex., échancré, couvrant).
    rear_opening_type:
      name: Type d’ouverture arrière
      description: Présente le type d’accès arrière ou de rabat d’aisance prévu pour
        faciliter le passage aux toilettes, par exemple un rabat ouvrant ou une fermeture
        éclair arrière intégrale.
    rear_seat_configuration:
      name: Configuration du siège arrière
      description: Correspond à la configuration de l’ensemble de siège arrière utilisée
        pour vérifier l’ajustement et choisir l’aménagement intérieur approprié.
    rear_view_mirror_ornament_attachment_type:
      name: Type de fixation de l’ornement de rétroviseur
      description: Précise comment l’ornement se fixe sur la tige ou le boîtier du
        rétroviseur (p. ex., boucle en cordon, pince, crochet).
    rearview_mirror_mount_attachment_type:
      name: Fixation de type support pour rétroviseur
      description: Détermine comment le support se fixe physiquement sur l’ensemble
        du rétroviseur, c’est-à-dire sur le boîtier ou la tige (p. ex., collier, pince,
        sangle, tampon adhésif, patte vissée).
    rebound_board_face_type:
      name: Type de face du panneau de rebond
      description: Présente la configuration de la surface qui détermine le comportement
        du rebond, par exemple une face plate, inclinée ou à plusieurs faces.
    rebound_level:
      name: Niveau de rebond
      description: Indique dans quelle mesure le wall ball rebondit après l’impact,
        afin d’aider les utilisateurs à choisir entre un modèle sans rebond et un
        modèle à rebond modéré.
    rebound_surface_configuration:
      name: Configuration des surfaces de rebond
      description: Présente l’agencement des surfaces de rebond et la prévisibilité
        des rebonds, selon une configuration à une, deux ou plusieurs faces, avec
        des rebonds prévisibles ou imprévisibles.
    rebounder_design:
      name: Conception du trampoline
      description: Détermine le type de structure du produit ou la configuration de
        sa surface de rebond.
    rebounder_design_type:
      name: Type de mécanisme du rebondisseur
      description: Correspond au mécanisme de rebond principal ou au type de construction
        du dispositif d’entraînement (p. ex., base à cordon élastique, filet avec
        cadre, cible déployable).
    rebounder_sides:
      name: Faces du rebondisseur
      description: Indique si le rebondisseur peut renvoyer les ballons d’une seule
        face, de deux faces ou de plusieurs faces.
    rebounding_mechanism_type:
      name: Type de mécanisme de rebond
      description: Correspond à la technologie utilisée pour renvoyer le palet ou
        la balle (p. ex., butoir en caoutchouc, cordon élastique).
    recipient_relationship:
      name: Lien avec le destinataire
      description: Lien du destinataire auquel s’adresse la carte de vœux (p. ex.,
        maman, papa, ami).
    recliner_control_type:
      name: Type de commande du fauteuil inclinable
      description: Correspond au mode d’actionnement du mécanisme d’inclinaison (p.
        ex., levier manuel, panneau à boutons électriques, télécommande).
    recliner_motion_type:
      name: Type de mécanisme du fauteuil inclinable
      description: Détermine le principal type de mouvement du fauteuil inclinable
        (p. ex., bascule, glissement, pivotement, positionnement près du mur, aide
        au relevage).
    reclining_mechanism:
      name: Mécanisme d’inclinaison
      description: Précise le mécanisme qui permet d’incliner le canapé.
    recommended_candle_format:
      name: Format de bougie recommandé
      description: Indique pour quels formats de bougie ces pastilles adhésives pour
        mèches sont recommandées.
    recommended_container_type:
      name: Type de contenant recommandé
      description: Matériaux recommandés ou sûrs pour les contenants de bougies en
        cire gel.
    recommended_fabric_type:
      name: Type de tissu recommandé
      description: Tissus recommandés pour obtenir le meilleur résultat avec le patron
        de couture.
    recommended_fabric_weight:
      name: Poids recommandé du tissu
      description: Indique la catégorie de poids recommandée pour le tissu du patron.
    recommended_food_pairing:
      name: Accords culinaires recommandés
      description: Indique les principales protéines ou les principaux mets avec lesquels
        la sauce est recommandée (p. ex., poulet, porc, bœuf, poisson, légumes).
    recommended_lane_condition:
      name: État de piste recommandé
      description: Indique le profil d’huilage ou l’état de piste pour lequel la boule
        est conçue.
    recommended_motor_impulse_class:
      name: Classe d’impulsion recommandée du moteur
      description: Précise la classe d’impulsion totale recommandée pour le moteur
        de fusée de modélisme afin d’assurer un vol sûr et optimal.
    recommended_reading_level:
      name: Niveau de lecture recommandé
      description: Indique le stade ou le niveau de lecture recommandé pour le produit,
        afin d’aider les acheteurs à choisir un article adapté au développement actuel
        de l’enfant en lecture.
    recommended_sleep_position:
      name: Position de sommeil recommandée
      description: Indique les positions de sommeil dans lesquelles le matelas est
        conçu pour offrir un soutien confortable (p. ex., sur le côté, sur le dos).
    recommended_storage:
      name: Conservation recommandée
      description: Explique comment conserver le produit pour préserver sa fraîcheur.
    recommended_surfaces:
      name: Surfaces recommandées
      description: Précise les surfaces ou les catégories de matériaux auxquelles
        la colle est destinée, au-delà d’un usage général en loisirs créatifs (p.
        ex., papier seulement ou surfaces multiples).
    recommended_use_case:
      name: Cas d'utilisation recommandé
      description: Type de réparation prévu pour le produit d’étanchéité (réparation
        temporaire ou d’urgence, ou réparation plus durable).
    recommended_use_location:
      name: Lieu d’utilisation recommandé
      description: Type de lieu recommandé pour installer ou utiliser la balançoire
        à bascule (jardin privé, aire de jeux commerciale, etc.).
    recommended_vehicle_surfaces:
      name: Surfaces de véhicule recommandées
      description: Précise les surfaces ou finitions du véhicule sur lesquelles la
        brosse peut être utilisée sans risque d’abîmer le revêtement (p. ex., peinture
        vernie, peinture mate ou satinée, film vinyle ou film de protection de peinture,
        vitres, roues).
    recorder_accessories_included:
      name: Accessoires d’enregistrement inclus
      description: Liste les accessoires fournis avec la flûte à bec grande basse.
    recorder_bore_design:
      name: Forme de la perce de la flûte à bec
      description: Forme de la perce à l’intérieur du corps de la flûte à bec.
    recorder_bore_type:
      name: Type de perce de la flûte à bec
      description: Précise le type de perce de la flûte à bec.
    recorder_case_shell_type:
      name: Type de coque de l’étui pour flûte à bec
      description: Décrit le degré de rigidité de l’étui.
    recorder_finish:
      name: Finition de la flûte à bec
      description: Finition ou traitement appliqué à la surface du corps de la flûte
        à bec (particulièrement pertinent pour les flûtes à bec alto en bois).
    recorder_hole_type:
      name: Type de trous de la flûte à bec
      description: Indique si les trous de jeu sont simples (sans trous doubles) ou
        comprennent des trous doubles pour faciliter les doigtés chromatiques.
    recorder_joint_configuration:
      name: Nombre de sections de la flûte à bec
      description: Décrit le nombre de sections qui composent la flûte à bec, ce qui
        facilite ou limite le transport, le nettoyage et le remplacement des pièces.
    recorder_joint_style:
      name: Type de jonction de la flûte à bec
      description: Type de jonction entre les sections de la flûte à bec, le cas échéant.
    recorder_keywork:
      name: Clétage de la flûte à bec
      description: Indique si la flûte à bec comporte une ou plusieurs clés, c’est-à-dire
        des mécanismes en métal ou en plastique pour les notes graves, fréquents sur
        les flûtes à bec ténor, basse et de grande taille.
    recorder_mouthpiece_type:
      name: Type d'embouchure de flûte à bec
      description: Décrit si l’embouchure ou la tête de la flûte à bec est intégrée
        à l’instrument, en une seule pièce, ou si elle est amovible et interchangeable.
    recorder_pitch_standard_a4:
      name: Diapason de la flûte à bec (la4)
      description: Indique le diapason pour lequel la flûte à bec est fabriquée (p.
        ex., la = 440 Hz pour le diapason moderne ou la = 415 Hz pour le diapason
        baroque).
    recorder_thumb_hole_type:
      name: Flûte à bec à trou pour le pouce
      description: Précise si la flûte à bec comporte un trou de pouce simple ou un
        trou de pouce double.
    recreational_vehicle_holding_tank_type:
      name: Indique les réservoirs d’eaux usées dont le camping-car est équipé.
      description: Indique les réservoirs d’eaux usées dont le véhicule de loisirs
        est équipé.
    recreational_vehicle_leveling_system:
      name: Système de mise à niveau du camping-car
      description: Type de système installé pour mettre le camping-car de niveau ou
        le stabiliser.
    recycled_material_content:
      name: Teneur en matières recyclées
      description: Indique la part du vêtement composée de fibres ou de fils recyclés..
    reed_dent_material:
      name: Matériau des dents du peigne
      description: Matière des dents du peigne, qui séparent les fils de chaîne et
        dont dépendent la durabilité de l’outil et l’abrasion des fils.
    reed_type:
      name: Type d’anche
      description: Précise le type de construction des anches utilisées par le chalumeau
        et les bourdons de la cornemuse.
    reeds_included:
      name: Anches incluses
      description: Précise les anches fournies avec l’ensemble de la grande cornemuse
        écossaise, selon qu’elles sont destinées au chalumeau ou aux bourdons, et
        selon qu’elles sont en roseau ou synthétiques.
    reefing_method:
      name: Méthode de réduction de la voilure
      description: Indique le mécanisme prévu, le cas échéant, pour réduire ou ranger
        la voile pendant la navigation.
    reel_profile:
      name: Profil du moulinet
      description: Classe la forme générale du corps du moulinet à lancer lourd.
    reel_seat_material:
      name: Matériau du porte-moulinet
      description: Précise le matériau de fabrication du porte-moulinet, dont dépendent
        le poids, la sensibilité et la résistance à la corrosion.
    reel_seat_type:
      name: Type de porte-moulinet
      description: Précise le type de mécanisme qui maintient le moulinet à mouche
        sur la canne.
    reel_size_class:
      name: Catégorie de taille de moulinet
      description: Taille attribuée par le fabricant (p. ex., 1000, 3000, 5000), qui
        renseigne sur la capacité de la bobine et la construction générale du moulinet.
    referee_wallet_accessories_included:
      name: Accessoires inclus avec le portefeuille d’arbitrage
      description: Dresse la liste des articles supplémentaires fournis avec le portefeuille
        d’arbitrage, comme les cartons rouges et jaunes, les fiches de score ou les
        accessoires d’écriture, afin que les acheteurs sachent si le portefeuille
        est vendu comme un kit complet.
    refinement_level:
      name: Degré de raffinage
      description: Indique le degré de raffinage de l’huile, dont dépendent le goût,
        la couleur, les qualités nutritionnelles et le point de fumée.
    reflective_finish:
      name: Finition réfléchissante
      description: Précise le traitement réfléchissant appliqué à la surface d’une
        boule disco (p. ex., facettes miroir ou effets holographiques ou irisés).
    reflective_or_glow_effect:
      name: Effet réfléchissant ou lumineux
      description: Indique si la boule d’antenne présente des effets de visibilité,
        comme une matière réfléchissante, un effet phosphorescent ou des éléments
        lumineux à LED.
    reflective_tape_pattern:
      name: Motif des bandes réfléchissantes
      description: Décrit la disposition des bandes réfléchissantes sur le vêtement,
        utilisées pour répondre aux exigences de visibilité.
    regulation_standard:
      name: Norme de conformité
      description: Précise la norme officielle, les dimensions imposées par l’organisme
        compétent ou la certification auxquelles le filet est conforme.
    regulator_diaphragm_material:
      name: Matériau de la membrane du régulateur
      description: Précise la matière de la membrane, dont dépendent la compatibilité
        avec les carburants ou l’éthanol (p. ex., E85), ainsi que la durabilité.
    regulator_port_thread_standard:
      name: Norme de filetage des orifices du régulateur
      description: Précise la norme de filetage ou de raccordement utilisée sur le
        corps du régulateur pour les orifices d’entrée, de sortie ou de retour.
    rein_features:
      name: Caractéristiques de Rein
      description: Présente les caractéristiques fonctionnelles ou de sécurité particulières
        des rênes.
    rein_style:
      name: Type de rênes
      description: Détermine la conception ou la configuration des rênes, afin que
        les cavaliers choisissent le type adapté à leur discipline et à leurs préférences.
    reinforced_areas:
      name: Zones renforcées
      description: Indique les parties du vêtement renforcées pour mieux résister
        à l’abrasion.
    reinforcement_type:
      name: Type de renfort
      description: Renfort intégré à la durite de radiateur pour renforcer sa solidité
        et sa résistance à la température ou à la pression.
    release_activation_method:
      name: Mode de déclenchement du décocheur
      description: Précise la façon dont l’archer déclenche le décocheur.
    release_bearing_material:
      name: Matériau de la butée d’embrayage
      description: Matière principale du roulement ou des surfaces d’appui, lorsqu’elle
        est indiquée par le fabricant.
    release_jaw_style:
      name: Type de mâchoires du décocheur
      description: Décrit la forme des mâchoires ou du crochet de la tête du décocheur.
    release_strap_type:
      name: Type de sangle du décocheur
      description: Désigne la sangle ou le système de fixation fourni avec le décocheur.
    remote_control_airship_envelope_material:
      name: Matière de l’enveloppe du dirigeable radiocommandé
      description: Précise la matière principale de l’enveloppe du dirigeable radiocommandé,
        c’est-à-dire de la poche de gaz, distincte de la matière générale du jouet.
    remote_control_motorcycle_scale:
      name: Balance pour motos télécommandées
      description: Échelle de la moto radiocommandée par rapport à une moto réelle,
        lorsqu’il s’agit d’un modèle réduit.
    remote_control_motorcycle_terrain_suitability:
      name: Terrain adapté à la moto radiocommandée
      description: Terrain principal sur lequel la moto radiocommandée est conçue
        pour rouler.
    remote_control_motorcycle_water_resistance:
      name: Résistance à l’eau de la moto radiocommandée
      description: Niveau de protection contre l’eau des composants électroniques
        de la moto radiocommandée.
    remote_control_plane_kit_completion_level:
      name: Niveau de complétude du kit d’avion radiocommandé
      description: Indique les éléments inclus et le degré de complétude du kit (p.
        ex., prêt à voler ou nécessitant un émetteur, un récepteur ou une batterie
        distincts).
    remote_control_plane_landing_gear_type:
      name: Type de train d’atterrissage de l’avion radiocommandé
      description: Indique la configuration du train d’atterrissage, dont dépendent
        la durabilité de l’avion et les surfaces adaptées au décollage et à l’atterrissage.
    remote_control_plane_power_type:
      name: Type de propulsion de l’avion radiocommandé
      description: Précise le mode de propulsion de l’avion radiocommandé (électrique,
        à moteur thermique, au nitrométhane, etc.), dont dépendent l’entretien, le
        niveau sonore et les lieux où il peut voler.
    remote_control_watercraft_features:
      name: Caractéristiques du bateau radiocommandé
      description: Présente les principales caractéristiques propres aux bateaux radiocommandés,
        qui concernent leur facilité d’utilisation et leur durabilité.
    remote_control_watercraft_propulsion_drive_type:
      name: Type de propulsion du bateau radiocommandé
      description: Explique comment le bateau radiocommandé se déplace dans l’eau.
    remote_control_watercraft_water_environment:
      name: Milieu aquatique recommandé pour le bateau radiocommandé
      description: Indique les conditions aquatiques dans lesquelles le bateau radiocommandé
        offre les meilleures performances.
    remote_keyless_system_programming_method:
      name: Méthode de programmation du système d’accès sans clé à distance
      description: Mode de programmation ou d’appairage de la télécommande ou du système
        avec le véhicule (p. ex., procédure embarquée ou outil professionnel).
    repair_compound_type:
      name: Type de produit de réparation
      description: Type ou formulation du produit consommable de réparation inclus
        (p. ex., type de mastic de carrosserie, type de résine pour pare-brise, type
        de colle ou de produit d’étanchéité pour mèche de pneu).
    repair_kit_components:
      name: Composants du kit de réparation
      description: Présente les éléments précis inclus dans le kit de réparation,
        afin que les acheteurs puissent en connaître le contenu et comparer les ensembles.
    repair_method:
      name: Méthode de réparation
      description: Définit la principale méthode de réparation utilisée par le kit,
        par exemple l’application de rustines adhésives prêtes à coller ou le remplacement
        de la valve.
    replacement_part_purpose:
      name: Fonction de la pièce de rechange
      description: Indique si l’article est une pièce de rechange d’origine, une pièce
        d’amélioration ou de performance, ou un accessoire complémentaire.
    replacement_part_type:
      name: Type de pièce de rechange
      description: Désigne la catégorie fonctionnelle de la pièce de vélo elliptique,
        afin que les acheteurs puissent filtrer les résultats selon le composant recherché.
    replacement_parts_availability:
      name: Disponibilité des pièces de rechange
      description: Indique si l’enfile-aiguille peut recevoir des pièces consommables
        ou remplaçables (p. ex., crochets ou fils de rechange).
    replica_gun_action_type:
      name: Type de mécanisme de la réplique d’arme
      description: Définit le type de fonctionnement ou de mécanisme représenté par
        la réplique d’arme, par exemple un mécanisme à verrou ou à levier.
    replica_gun_firing_mechanism:
      name: Mécanisme de tir de la réplique d’arme
      description: Indique si la réplique simule un tir ou un fonctionnement non létal
        et, le cas échéant, selon quel procédé, par exemple avec des amorces ou sans
        tir.
    replica_gun_moving_parts:
      name: Pièces mobiles de la réplique d’arme
      description: Indique les pièces de la réplique qui sont fonctionnelles ou mobiles.
    reservoir_orientation:
      name: Orientation du réservoir
      description: Définit l’orientation ou le profil de la poche à eau à l’intérieur
        du sac.
    reservoir_type:
      name: Type de réservoir
      description: Type de configuration du réservoir du maître-cylindre d’embrayage.
    resin_suitability:
      name: Compatibilité avec la résine
      description: Indique si le ballon de handball est conçu pour être utilisé avec
        de la résine ou s’il s’utilise sans résine.
    resistance_adjustability:
      name: Réglage de la résistance
      description: Indique si l’utilisateur peut modifier la résistance respiratoire.
    resistance_band_design:
      name: Forme de la bande de résistance
      description: Décrit la forme physique ou le modèle de la bande de résistance
        (p. ex., boucle, tube avec poignées, forme en 8), afin d’aider les acheteurs
        à choisir le modèle adapté à leur programme d’exercice.
    resistance_loading_type:
      name: Type de charge de résistance
      description: Indique comment la résistance ou la charge est appliquée à la barre
        guidée (p. ex., par disques ou par pile de poids sélectionnable).
    response_fields_included:
      name: Champs de réponse inclus
      description: Précise les champs ou options de réponse standard présents sur
        la carte-réponse (p. ex., acceptation ou refus, choix du repas).
    restoration_status:
      name: État de restauration
      description: Indique si le van est d’origine, restauré, restauré et modifié,
        ou à restaurer.
    rhinestone_base_color_family:
      name: Famille de couleurs de la base du strass
      description: Désigne la famille de couleurs de la base du strass (p. ex., transparent
        ou cristal, doré ou jaune, bleu).
    rhinestone_facet_style:
      name: Type de facettes du strass
      description: Correspond au motif de la face ou des facettes du strass, qui modifie
        son éclat et son aspect (p. ex., Xilion Rose, taille brillant, facetté ou
        lisse).
    rhinestone_hole_reinforcement_material:
      name: Matériau du renfort des trous du strass
      description: Correspond à la matière présente autour ou au niveau des trous
        (p. ex., œillet métallique, plastique moulé), dont dépend la résistance du
        strass pendant la couture.
    rhinestone_setting_type:
      name: Type de sertissage du strass
      description: Décrit la manière dont le strass est monté ou bordé pour la couture
        (p. ex., sertissage à griffes, sertissage clos, sertissage avec bordure).
    rhubarb_product_cut_type:
      name: Type de découpe de la rhubarbe
      description: Décrit la préparation physique ou la découpe du produit à base
        de rhubarbe.
    ribbon_construction:
      name: Fabrication du ruban
      description: Décrit les principales caractéristiques de fabrication du ruban
        gros-grain, par exemple la présence d’un fil de maintien ou d’une matière
        élastique, qui modifient son usage (p. ex., nœuds ou couture).
    ribbon_packaging_type:
      name: Type de conditionnement du ruban
      description: Indique sous quelle forme le ruban est fourni ou vendu.
    ribbon_pattern_style:
      name: Type de motif du ruban
      description: Classe le ruban selon la méthode d’application du motif couramment
        utilisée sur les rubans gros-grain.
    ribbon_sheen_level:
      name: Niveau de brillance du ruban
      description: Indique le degré de brillance visible à la surface du ruban de
        satin.
    ribbon_style:
      name: Style du ruban
      description: Définit l’aspect visuel ou le motif du ruban (p. ex., uni, rayé,
        tricolore).
    ribbon_trim_backing_type:
      name: Type de support au dos du ruban ou de la garniture
      description: Indique si le ruban ou la garniture comporte un support au dos,
        et de quel type, pour faciliter l’application.
    ribbon_trim_edge_finish:
      name: Finition du bord du ruban ou de la garniture
      description: Décrit la structure ou la finition du bord du ruban ou de la garniture,
        utiles pour évaluer le risque d’effilochage et l’usage prévu.
    ric_rac_wave_size:
      name: Taille des ondulations du croquet
      description: Décrit l’amplitude des ondulations du croquet, c’est-à-dire la
        taille du zigzag ou des vagues.
    rice_grain_length:
      name: Longueur du grain de riz
      description: Classe les produits à base de riz selon la longueur des grains,
        par exemple les riz à grains courts, moyens ou longs, dont dépendent les caractéristiques
        de cuisson et l’usage culinaire.
    rice_processing_method:
      name: Procédé de transformation du riz
      description: Décrit le mode de traitement ou de préparation du riz (p. ex.,
        étuvé, germé, en flocons), qui modifie le temps de cuisson, les qualités nutritionnelles
        et l’usage.
    rice_variety:
      name: Variété de riz
      description: Désigne la variété ou le cultivar précis du riz, afin que les acheteurs
        puissent choisir des grains selon le goût, l’arôme, la texture et l’usage
        culinaire recherchés.
    riding_toy_features:
      name: Caractéristiques du jouet à enfourcher
      description: Présente les caractéristiques fonctionnelles ou de sécurité courantes
        propres aux jouets à enfourcher.
    rifle_action_type:
      name: Type de mécanisme du fusil
      description: Mécanisme de fonctionnement du fusil, c’est-à-dire la manière dont
        il charge, tire et éjecte, information importante pour l’identification et
        pour l’intérêt des collectionneurs.
    rifle_finish:
      name: Finition du fusil
      description: Finition ou revêtement extérieur principal des parties métalliques.
    rifle_magazine_type:
      name: Type de chargeur du fusil
      description: Type de système d’alimentation du fusil.
    rifle_stock_material:
      name: Matériau de la crosse du fusil
      description: Matière principale utilisée pour la crosse ou les garnitures du
        fusil (p. ex., noyer, polymère).
    rim_clamping_method:
      name: Mode de serrage de la jante
      description: Décrit la manière dont la machine maintient la roue ou la jante
        pendant le montage et le démontage.
    rim_strip_type:
      name: Type de fond de jante
      description: Classe le fond de jante ou le ruban de jante selon son style, sa
        fabrication ou son usage précis (p. ex., ruban de jante tubeless ou bande
        de protection en caoutchouc).
    rim_tubeless_compatibility:
      name: Compatibilité sans chambre à air de la jante
      description: Indique si la jante, le ruban ou la roue est conçu pour un montage
        sans chambre à air.
    ripeness_stage:
      name: Stade de maturité
      description: Indique le degré de maturité du fruit au moment de la vente (p.
        ex., non mûr, mûr, prêt à consommer).
    riser_pad_type:
      name: Type de cale de rehausse
      description: Classe la cale selon sa fonction (p. ex., entretoise standard,
        cale amortissante, cale inclinée).
    roasted_malt_processing_type:
      name: Type de traitement du malt torréfié
      description: Procédé ou variante de traitement utilisé pour obtenir le malt
        torréfié ou la céréale torréfiée (p. ex., orge torréfiée non maltée, malt
        noir, variantes désamérisées ou décortiquées).
    robotic_toy_interaction_mode:
      name: Mode d’interaction du jouet robotisé
      description: Décrit la principale manière dont le robot interagit ou se déplace
        pendant le jeu.
    robotic_toy_light_features:
      name: Caractéristiques des lampes jouets robotisées
      description: Indique si le jouet utilise des lumières pendant le jeu et, le
        cas échéant, de quelle manière (p. ex., LED, projection).
    robotic_toy_programming_supported:
      name: Programmation prise en charge par le jouet robotisé
      description: Indique le mode de programmation que le jouet prend en charge,
        le cas échéant.
    robotic_toy_skill_level:
      name: Niveau de compétence pour le jouet robotisé
      description: Indique le niveau de complexité attendu de l’utilisateur pour utiliser
        ou programmer le jouet.
    robotic_toy_sound_features:
      name: Fonctions sonores du jouet robotisé
      description: Indique les capacités sonores du jouet robotisé.
    rod_butt_style:
      name: Type de talon de canne
      description: Définit la configuration du talon de la canne utilisée pour la
        pêche à la traîne.
    rod_construction_type:
      name: Type de construction de la canne
      description: Indique la conception générale de la canne selon le nombre de brins
        et son caractère pliable ou télescopique.
    rod_guide_material:
      name: Matériau des anneaux de canne
      description: Indique la matière utilisée pour les anneaux ou les inserts de
        la canne à pêche, dont dépendent la durabilité, le poids et le frottement
        du fil.
    rod_guide_type:
      name: Type d’anneaux de canne
      description: Définit le principal type d’anneaux montés sur la canne.
    rod_handle_type:
      name: Type de poignée de canne
      description: Définit la configuration de la poignée de la canne à pêche, ce
        qui aide les acheteurs à choisir selon le confort recherché et la technique
        utilisée.
    roll_cage_tubing_material:
      name: Matériau des tubes de l’arceau de sécurité
      description: Définit la matière ou l’alliage des tubes utilisés pour l’arceau
        de sécurité ou la barre antiretournement (p. ex., acier DOM ou chromoly 4130).
    roller_skate_brake_shape:
      name: Forme du frein de patin à roulettes
      description: Décrit la forme géométrique ou le profil de la tête du frein, selon
        les performances recherchées ou les préférences esthétiques.
    roller_skate_brake_type:
      name: Type de frein pour patins à roulettes
      description: Définit le système de freinage utilisé sur les patins à roulettes.
    roller_ski_technique:
      name: Technique de ski à roulettes
      description: Désigne la technique de ski de fond pour laquelle les skis à roulettes
        sont conçus.
    roller_technology:
      name: Technologie du rouleau
      description: Indique la technologie intégrée qui améliore l’efficacité du massage,
        comme les vibrations ou la chaleur.
    rolling_case_wheel_configuration:
      name: Configuration des roues de l’étui à roulettes
      description: Définit la configuration des roues utilisées sur les étuis à roulettes
        pour clavier musical.
    rolling_paper_format:
      name: Format du papier à rouler
      description: Désigne la présentation physique du produit (p. ex., feuilles plates,
        cônes préroulés, feuilles d’enrobage).
    rolling_paper_gum_type:
      name: Type de gomme du papier à rouler
      description: Définit la gomme appliquée sur le bord du papier pour le fermer,
        ce qui peut modifier le goût et l’utilisation.
    rolling_paper_size:
      name: Taille du papier à rouler
      description: Désigne la taille standard du papier à rouler ou du cône, afin
        que les acheteurs puissent choisir rapidement la largeur ou la longueur adaptée
        à leurs besoins.
    rolling_stock_type:
      name: Type de matériel roulant
      description: Définit le type de train ou de véhicule ferroviaire représenté
        par le modèle (locomotive, voiture de voyageurs, wagon de fret ou sous-type
        courant).
    roof_cargo_net_hook_fastener_style:
      name: Type de crochet ou de fixation du filet de toit
      description: Définit le type de fixation d’extrémité utilisé pour attacher le
        filet aux points d’ancrage (p. ex., crochet en S, mousqueton, crochet en J).
    roof_height_class:
      name: Classe de hauteur de toit
      description: Classe les hauteurs de toit couramment utilisées pour les fourgons,
        en particulier dans le cadre d’aménagements ou de transformations en vans
        aménagés.
    roof_type:
      name: Type de toit
      description: Configuration du toit ou de la partie supérieure de l’abri.
    root_variety:
      name: Variété de racine
      description: Désigne la variété ou le type courant de racine (p. ex., raifort
        ou variétés de wasabi véritable).
    rope_buoyancy:
      name: Flottabilité de la corde
      description: Indique si la corde est conçue pour flotter à la surface de l’eau,
        afin d’aider les pratiquants à éviter les enchevêtrements et de faciliter
        la récupération.
    rope_construction:
      name: Structure de la corde
      description: Définit les caractéristiques de construction des fibres au-delà
        du type de tressage, par exemple selon que l’âme ou la gaine est torsadée
        ou tressée, ou que la corde est de type âme-gaine.
    rope_material:
      name: Matière de la corde
      description: Désigne la matière de la corde ou du cordon d’accordage.
    rope_strand_compatibility:
      name: Compatibilité avec les configurations de corde
      description: Indique les configurations de corde que le dispositif d’assurage
        peut accepter (corde à simple, demi-corde, corde jumelée ou combinaisons de
        ces configurations).
    rope_stretch_type:
      name: Type d’élasticité de la corde
      description: Décrit les caractéristiques d’élasticité de la corde, en distinguant
        les modèles sans élasticité, à faible élasticité, standard ou élastiques.
    rose_bloom_stage:
      name: Stade d’ouverture des roses
      description: Indique le degré d’ouverture des roses au moment de la livraison
        ou de la réception (du bouton à la fleur entièrement ouverte).
    rose_grade:
      name: Grade des roses
      description: Grade de qualité commerciale des roses coupées.
    rosette_center_type:
      name: Type de centre de la cocarde
      description: Définit le type d’élément central ou d’insert placé sur le devant
        de la cocarde.
    rosin_dust_level:
      name: Niveau de poussière de colophane
      description: Indique la quantité attendue de poussière de colophane produite
        lors d’une utilisation normale.
    rosin_formula_additives:
      name: Formule ou additifs de la colophane
      description: Désigne les caractéristiques notables de la formule, par exemple
        les mélanges hypoallergéniques, à faible dégagement de poussière ou enrichis
        en métal.
    rosin_hardness:
      name: Dureté de la colophane
      description: Indique le degré relatif de dureté ou de souplesse de la colophane
        utilisée sur l’archet, qui peut modifier l’adhérence et le dégagement de poussière
        selon le climat et le style de jeu.
    rotation_mechanism_type:
      name: Type de mécanisme de rotation
      description: Décrit le mécanisme de rotation de la corde, qui détermine la fluidité
        du mouvement et la vitesse possible (p. ex., roulements à billes ou bagues).
    rotation_motion_features:
      name: Fonction de rotation ou de mouvement
      description: Indique si les planètes ou les orbites du modèle tournent ou se
        déplacent, et de quelle manière.
    rotor_configuration_type:
      name: Type de configuration du rotor
      description: Désigne la configuration du rotor et le mode de pilotage de l’hélicoptère
        radiocommandé (p. ex., coaxial, monorotor à pas fixe ou à pas collectif, multirotor),
        deux éléments qui influent directement sur les caractéristiques de vol et
        sur le niveau de compétence requis.
    rotor_construction_type:
      name: Type de construction du rotor
      description: Décrit la construction du disque de frein, qui détermine son poids,
        sa rigidité et sa capacité à dissiper la chaleur.
    rotor_mounting_interface:
      name: Interface de fixation du rotor
      description: Définit le standard de fixation au moyeu utilisé pour monter le
        disque de frein sur la roue.
    rotor_mounting_standard:
      name: Norme de fixation du rotor
      description: Définit le standard de fixation du disque de frein au moyeu (p.
        ex., six boulons ou Center Lock).
    roulette_set_components_included:
      name: Composants du kit de roulette inclus
      description: Principaux éléments de roulette fournis avec la roue ou le jeu.
    roulette_wheel_ball_track_type:
      name: Type de piste de bille de la roulette
      description: Décrit la piste sur laquelle la bille circule dans la roulette,
        et qui contribue au réalisme ainsi qu’aux sensations de jeu.
    roulette_wheel_numbering_system:
      name: Système de numérotation de la roulette
      description: Indique la numérotation de la roulette ainsi que la présence d’un
        ou de plusieurs zéros, afin d’assurer la compatibilité avec les règles de
        jeu et les probabilités.
    rounders_equipment_included:
      name: Équipement de rounders inclus
      description: Présente les articles ou accessoires de rounders fournis avec l’ensemble
        ou le lot d’entraînement, afin que les acheteurs sachent exactement ce que
        contient la boîte.
    rounders_governing_body_approval:
      name: Homologation par un organisme de rounders
      description: Indique si le produit est certifié ou homologué par un organisme
        officiel de rounders ou par une autre instance sportive.
    row_counter_format:
      name: Format du compte-rangs
      description: Définit le format ou le style du compte-rangs de tricot (p. ex.,
        bague, chaînette, compteur à clic ou numérique).
    row_counter_mechanism:
      name: Mécanisme du compte-rangs
      description: Décrit la manière dont l’outil avance ou enregistre le nombre de
        rangs.
    row_counter_mounting_method:
      name: Mode de fixation du compte-rangs
      description: Mode de fixation du compte-rangs ou du marqueur pendant l’utilisation
        (sur l’aiguille, au doigt, sur l’ouvrage, etc.).
    rowel_type:
      name: Type de molette d’éperon
      description: Décrit la forme ou le profil du bord de la molette, selon les préférences
        du cavalier et la sensibilité du cheval.
    rowing_machine_part_type:
      name: Type de pièce pour rameur
      description: Désigne le composant précis que le produit doit remplacer sur un
        rameur, afin que les acheteurs trouvent rapidement la pièce exacte dont ils
        ont besoin sans multiplier les microcatégories.
    rubber_ducky_character_theme:
      name: Personnage ou thème du canard de bain
      description: Thème ou style de personnage du canard de bain, utile pour les
        modèles fantaisie ou de collection.
    rubber_ducky_features:
      name: Caractéristiques du canard de bain
      description: Caractéristiques fonctionnelles ou de conception propres aux canards
        de bain.
    rubber_ducky_size_class:
      name: Catégorie de taille du canard de bain
      description: Regroupement des canards de bain par taille, selon une classification
        claire pour les acheteurs et fondée sur l’usage courant (jouet de bain, décoration
        de gâteau ou modèle géant).
    ruffle_style:
      name: Style de volant
      description: Décrit la construction ou l’aspect visuel du volant sur l’écharpe
        de chaise.
    rugby_headgear_safety_certification:
      name: Certification de sécurité du casque de rugby
      description: Indique si le casque répond aux normes officielles de sécurité
        applicables au rugby ou au sport en général.
    rugby_size:
      name: Taille de rugby
      description: Classe l’équipement selon les désignations de taille courantes
        dans les titres de produits de rugby.
    rugby_variant:
      name: Variante de rugby
      description: Définit la variante de rugby, selon le code ou le format auquel
        le produit est destiné.
    ruler_edge_type:
      name: Type de bord de la règle
      description: Désigne le profil ou la fonction du bord utilisé pour mesurer ou
        tracer des repères (p. ex., bord droit, bord biseauté ou rebord).
    ruler_marking_style:
      name: Type de repères de la règle
      description: Décrit l’agencement des repères ou des guides imprimés sur la règle,
        au-delà des graduations de base.
    runner_configuration:
      name: Configuration du programme d'exécution
      description: Décrit le nombre de patins de la luge et leur disposition.
    runner_material:
      name: Matériau des patins
      description: Indique la matière utilisée pour les patins ou les bandes de glisse
        de la luge.
    saddle_cover_style:
      name: Type de housse de selle
      description: Classe le produit selon sa conception générale ou son usage (p.
        ex., housse de rangement, couvre-selle d’utilisation ou sac de transport).
    saddle_design:
      name: Type de selle
      description: Classe la selle selon sa conception ergonomique générale ou son
        type d’évidement (p. ex., selle ajourée, sans bec, à bec fendu ou à ressorts).
    saddle_discipline:
      name: Discipline de la selle
      description: Désigne la principale discipline équestre ou l’usage auquel la
        selle est destinée.
    saddle_mounting_type:
      name: Type à fixation par selle
      description: Décrit le système de fixation entre la selle et la tige de selle,
        afin de vérifier leur compatibilité (p. ex., rails, fixation à pivot ou I-Beam).
    saddle_pad_shape:
      name: Forme du tapis de selle
      description: Décrit la découpe ou le contour du tapis, deux éléments qui déterminent
        sa compatibilité avec la selle et répondent aux préférences esthétiques.
    saddle_pad_style:
      name: Style de tapis de selle
      description: Désigne le style fonctionnel du tapis ou la discipline à laquelle
        il est destiné, afin que les cavaliers choisissent le modèle adapté à leur
        pratique ou à leur type de selle.
    saddle_padding_material:
      name: Matière du rembourrage de la selle
      description: Indique la principale matière de rembourrage ou technologie d’amorti
        utilisée dans la selle, qui détermine le confort et les sensations en selle.
    saddle_rail_material:
      name: Matériau des rails de selle
      description: Indique la matière des rails situés sous la selle de vélo, dont
        dépendent la solidité, le confort, le poids et le prix.
    saddle_tree_material:
      name: Matériau de l'arçon
      description: Indique la matière de l’arçon, la structure interne de la selle.
    saddle_tree_width:
      name: Largeur de l’arçon
      description: Décrit la catégorie de largeur de l’arçon, qui détermine l’ajustement
        de la selle au garrot du cheval.
    safety_documentation_available:
      name: Documentation de sécurité disponible
      description: Indique les documents de conformité ou de sécurité fournis avec
        l’ingrédient (p. ex., fiche de données de sécurité, certificat ou déclaration
        IFRA, déclaration relative aux allergènes).
    safety_equipment_included:
      name: Équipement de sécurité inclus
      description: Articles de sécurité ou de protection inclus dans le kit.
    safety_features:
      name: Fonctions de sécurité
      description: Indique les dispositifs de sécurité intégrés qui limitent les risques
        de coupure accidentelle ou protègent la lame pendant le rangement.
    safety_harness_type:
      name: Type de harnais de sécurité
      description: Indique le type et la configuration du harnais de retenue pour
        enfant fourni avec le siège.
    safety_mechanism_type:
      name: Type de mécanisme de sécurité
      description: Décrit le type de système de sécurité intégré qui retient la barre
        lorsqu’un mouvement échoue.
    safety_restraint_type:
      name: Type de dispositif de retenue
      description: Type de dispositif de retenue pour enfant intégré au siège de balançoire,
        le cas échéant.
    safety_warning:
      name: Avertissement de sécurité
      description: Indique si le produit comporte les avertissements de sécurité courants
        applicables aux billes jouets (p. ex., risque d’étouffement).
    sail_shape:
      name: Forme de la voile
      description: Décrit la forme géométrique de la voile de kayak, qui détermine
        son efficacité, sa maniabilité et son montage.
    salad_dressing_type:
      name: Type d’assaisonnement pour salade
      description: Désigne le style ou la texture de base de l’assaisonnement (p.
        ex., crémeux, vinaigrette, à base de yogourt), afin d’aider les acheteurs
        à distinguer les différentes bases et consistances.
    salad_topping_base_ingredient:
      name: Base de la garniture pour salade
      description: Désigne la principale famille d’ingrédients qui compose la garniture,
        afin d’aider les clients à filtrer les produits selon leurs préférences nutritionnelles,
        leurs contraintes liées aux allergènes ou la texture recherchée.
    salt_level:
      name: Teneur en sel
      description: Indique la quantité de sel ou de sodium ajoutée aux noix ou aux
        graines.
    sand_cup_features:
      name: Caractéristiques des gobelets à sable
      description: Caractéristiques fonctionnelles ou physiques des gobelets à sable,
        qui ont un effet sur le jeu et l’utilisation.
    sand_shovel_handle_style:
      name: Type de poignée de la pelle à sable
      description: Décrit la forme de la poignée située à l’extrémité du manche de
        la pelle.
    sand_toy_set_pieces_included:
      name: Pièces du set de jouets pour le sable incluses
      description: Présente les types d’éléments de jouet de sable inclus dans l’ensemble
        (p. ex., seau, pelle, moules), afin d’aider les acheteurs à comparer le contenu
        des kits.
    sand_water_mill_items_included:
      name: Éléments inclus avec le moulin à sable et à eau
      description: Présente les principaux accessoires fournis avec le moulin jouet
        (seaux, pelles, moules, etc.).
    sandbag_style:
      name: Type de sac d’entraînement lesté
      description: Désigne la conception particulière du sac d’entraînement lesté
        et l’usage prévu pour l’entraînement (p. ex., bulgare, Strongman, Power),
        afin d’aider les acheteurs à choisir entre différents types d’exercices.
    sandbox_bottom_type:
      name: Type de fond du bac à sable
      description: Type de base ou de fond placé sous le sable.
    sandbox_drainage_type:
      name: Type d’évacuation de l’eau du bac à sable
      description: Indique comment le bac à sable évacue l’eau, le cas échéant, par
        exemple au moyen de trous d’évacuation ou d’un bouchon amovible.
    sandbox_seating_type:
      name: Type de sièges « Sandbox »
      description: Indique si le bac à sable comprend une assise intégrée et, le cas
        échéant, de quel type.
    sapodillo_variety:
      name: Variété de sapotille
      description: Désigne le cultivar ou la variété précise de sapotille ou de chikoo
        (p. ex., « Alano », « Prolific »), afin que les amateurs puissent choisir
        les profils aromatiques et les caractéristiques recherchés.
    sapote_variety:
      name: Variété de sapote
      description: Désigne l’espèce ou le type de sapote proposé (p. ex., noire, blanche,
        mamey), afin que les acheteurs puissent distinguer les différentes sortes.
    satin_ribbon_face_type:
      name: Type de face du ruban de satin
      description: Indique si le ruban présente une finition satinée sur une seule
        face ou sur les deux faces.
    sauce_consistency:
      name: Consistance de la sauce
      description: Décrit la texture ou l’épaisseur de la sauce à pizza.
    sauce_product_form:
      name: Forme du produit (sauce)
      description: Indique sous quelle forme se présente la sauce, par exemple liquide,
        huile, pâte, poudre, flocons ou sirop.
    sauce_variety:
      name: Variété de sauce
      description: Désigne le type précis ou la famille de recettes de la sauce blanche
        ou de la sauce à la crème (p. ex., Alfredo, béchamel, hollandaise).
    saxophone_body_finish:
      name: Finition du corps du saxophone
      description: Décrit la finition ou le placage principal appliqué au corps du
        saxophone, indépendamment du clétage.
    saxophone_body_type:
      name: Type de corps de saxophone
      description: Décrit la configuration physique générale du corps du saxophone
        basse ainsi que l’orientation de son pavillon.
    saxophone_construction_style:
      name: Type de construction du saxophone
      description: Présente les caractéristiques de construction courantes du saxophone,
        qui conditionnent sa durabilité, sa résonance et son entretien.
    saxophone_included_accessories:
      name: Accessoires fournis avec le saxophone
      description: Présente les accessoires généralement fournis avec un ensemble
        de saxophone alto.
    saxophone_key_system:
      name: Système de clés du saxophone
      description: Désigne le système de clétage du saxophone, selon la disposition
        ou le standard mécanique utilisé sur l’instrument.
    saxophone_key_touch_material:
      name: Matériau des touches du saxophone
      description: Indique la matière utilisée pour les touches du saxophone (p. ex.,
        touches en nacre).
    saxophone_mouthpiece_baffle_type:
      name: Type de déflecteur du bec de saxophone
      description: Décrit la forme du déflecteur, qui façonne le flux d’air et la
        brillance du son.
    saxophone_neck_type:
      name: Type de bocal du saxophone
      description: Décrit la configuration du bocal fourni avec le saxophone basse.
    saxophone_package_contents:
      name: Contenu de l’ensemble de saxophone
      description: Présente les principaux accessoires fournis avec le saxophone (p.
        ex., étui, bec, ligature, cordon, kit de nettoyage).
    saxophone_reed_cut:
      name: Coupe de l’anche de saxophone
      description: Décrit la coupe ou le style de l’anche de saxophone, qui jouent
        sur la réponse, la sonorité et les sensations de jeu.
    saxophone_reed_material_type:
      name: Type de matière de l’anche de saxophone
      description: Indique la catégorie de matière de l’anche (p. ex., roseau ou matière
        synthétique).
    saxophone_reed_strength_scale:
      name: Échelle de force de l’anche de saxophone
      description: Indique l’échelle ou le système de numérotation utilisé pour la
        force de l’anche, souvent propre à la marque, afin de faciliter la comparaison
        entre les annonces.
    saxophone_small_part_thread_size:
      name: Taille du filetage des petites pièces de saxophone
      description: Indique la taille ou le standard de filetage des petites pièces
        filetées du saxophone, principalement les vis, afin de faciliter le choix
        de pièces compatibles.
    saxophone_swab_application_area:
      name: Zone d’utilisation de l’écouvillon pour saxophone
      description: Indique la partie du saxophone que l’écouvillon est destiné à nettoyer
        ou à sécher.
    scabbard_material:
      name: Matériau du fourreau
      description: Indique le matériau principal du fourreau fourni (le cas échéant).
    scale_model_assembly_status:
      name: État d’assemblage de la maquette
      description: Indique si la maquette est prête à être exposée ou si elle doit
        être assemblée ou peinte.
    scale_model_car_features:
      name: Caractéristiques de la voiture miniature
      description: Caractéristiques notables de la voiture miniature, comme les portes
        ou le capot ouvrants, les roues directionnelles, la suspension, etc.
    scale_model_kit_assembly_requirements:
      name: Exigences d’assemblage du kit de maquette
      description: Indique les étapes d’assemblage ou les fournitures supplémentaires
        généralement nécessaires au-delà d’un simple assemblage par encliquetage.
    scale_model_kit_components_included:
      name: Éléments inclus avec le kit de maquette
      description: Présente les éléments fournis avec la maquette ou le kit de char
        (p. ex., décalcomanies, figurines, pièces photodécoupées).
    scale_model_paint_status:
      name: État de peinture de la maquette
      description: Indique si la maquette d’hélicoptère est déjà peinte ou finie,
        ou si elle doit être peinte.
    scale_model_pose:
      name: Pose d'une maquette
      description: Décrit la pose représentée par le modèle de cheval, afin de l’intégrer
        à une exposition ou à un diorama.
    scale_model_rotor_configuration:
      name: Configuration du rotor de la maquette
      description: Décrit la configuration du rotor de l’hélicoptère représenté par
        la maquette.
    scale_model_truck_era:
      name: Époque du camion miniature
      description: Indique l’époque ou la période du camion réel représenté par le
        modèle, information utile aux collectionneurs qui recherchent des camions
        anciens ou modernes.
    scale_model_truck_propulsion_type:
      name: Type de propulsion du camion miniature
      description: Indique si le camion représenté fonctionne au diesel, à l’essence,
        à l’électricité, en mode hybride ou avec un autre type de propulsion, tel
        qu’il est représenté ou présenté par le modèle.
    scale_units:
      name: Unités de mesure
      description: Unités de mesure imprimées ou gravées sur la barre pour régler
        le rayon ou le diamètre.
    scent_function:
      name: Fonction olfactive
      description: Définit la fonction principale du produit olfactif, afin que les
        chasseurs puissent trouver rapidement le produit adapté (p. ex., attractif
        ou neutralisant d’odeurs).
    scent_source:
      name: Source olfactive
      description: Présente la principale source biologique ou aromatique utilisée
        dans la formule du produit, qu’il s’agisse de types d’urine, d’odeurs alimentaires,
        d’arômes végétaux, etc.
    school_bus_body_type:
      name: Type de carrosserie du bus scolaire
      description: Classe le bus scolaire selon les formats de carrosserie ou les
        catégories couramment utilisés sur le marché (p. ex., types A à D).
    school_bus_safety_feature:
      name: Dispositif de sécurité du bus scolaire
      description: Équipement de sécurité notable installé sur le bus scolaire.
    school_glue_washability:
      name: Lavabilité de la colle scolaire
      description: Indique la facilité avec laquelle la colle, sèche ou humide, se
        nettoie sur la peau, les vêtements ou les surfaces.
    scissors_application:
      name: Usage des ciseaux
      description: Usage principal des ciseaux, selon le type de coupe ou la matière
        à couper.
    scooter_brake_pad_material:
      name: Matériau des plaquettes de frein de trottinette
      description: Indique la composition des plaquettes de frein, dont dépendent
        les performances, le bruit et la durée de vie.
    scoring_method:
      name: Mode de comptage des points
      description: Décrit le mode de comptage des points sur le baby-foot, par exemple
        par compteur manuel à perles ou par affichage électronique.
    scoring_pattern:
      name: Disposition des zones de points
      description: Disposition des zones de points imprimées sur la surface de jeu.
    scoring_system_type:
      name: Type de système de notation
      description: Décrit le dispositif de comptage des points fourni avec la table,
        par exemple à curseurs manuels ou à affichage électronique.
    scottish_smallpipes_bag_material:
      name: Matière de la poche de la petite cornemuse écossaise
      description: Indique la matière de la poche fournie avec la petite cornemuse
        écossaise, qui sert de réservoir d’air.
    scottish_smallpipes_drone_tuning_configuration:
      name: Configuration d’accord des bourdons de la petite cornemuse écossaise
      description: Décrit l’accord des bourdons fourni avec l’instrument, c’est-à-dire
        leur hauteur et leur rôle par rapport à la tonique.
    scottish_smallpipes_reed_type:
      name: Type d’anche de la petite cornemuse écossaise
      description: Désigne le type d’anche utilisé pour le chalumeau et, le cas échéant,
        précise si les anches sont synthétiques ou en roseau.
    scraping_surface_type:
      name: Type de surface à gratter
      description: Décrit la forme de la surface raclée qui produit le son (p. ex.,
        rainurée, à peigne ou dentée, ondulée).
    screw_drive_type:
      name: Type d’empreinte de vis
      description: Indique l’empreinte de la tête de vis ou de boulon et l’outil nécessaire
        pour la serrer ou la retirer (p. ex., hexagonale, Allen, Torx).
    screw_thread_size:
      name: Dimensions du filetage
      description: Indique le filetage standard des vis incluses ou compatibles (p.
        ex., M4, M5, M6).
    sculpting_clay_base_type:
      name: Type de base de l’argile à sculpter
      description: Décrit la base de formulation de l’argile à sculpter.
    seafood_cut:
      name: Découpe du produit de la mer
      description: Décrit la découpe ou la présentation du produit de la mer (p. ex.,
        entier, en filet, en darne).
    seafood_processing_method:
      name: Procédé de transformation des produits de la mer
      description: Décrit la principale technique de conservation ou de transformation
        appliquée au produit de la mer, comme le fumage, le salage ou la lyophilisation.
    seafood_source:
      name: Origine du produit de la mer
      description: Indique si le produit de la mer provient de la pêche sauvage, de
        l’élevage, d’une source végétale ou d’une autre source, afin d’aider les acheteurs
        à en évaluer la durabilité et la qualité.
    seal_material:
      name: Matériau des joints d’étanchéité
      description: Matière des joints au cou, aux poignets et aux chevilles, qui assurent
        l’étanchéité de la combinaison.
    seal_type:
      name: Type d’étanchéité
      description: Décrit le procédé d’étanchéité utilisé par le raccord pour éviter
        les fuites de liquide de refroidissement.
    sealant_formulation:
      name: Formulation du produit d’étanchéité
      description: Indique la formulation chimique principale ou la technologie des
        additifs du produit d’étanchéité pour pneu de vélo (p. ex., à base de latex,
        renforcé de fibres, acrylique).
    seals_leak_type:
      name: Type de fuite à colmater
      description: Type ou emplacement de la fuite du circuit de refroidissement que
        le produit est conçu pour colmater.
    seam_construction:
      name: Construction de la couture
      description: Décrit la façon dont la couture de la balle est réalisée, ce qui
        détermine l’effet, la durabilité et les sensations.
    seam_design:
      name: Conception des coutures
      description: Décrit la construction des coutures ou les coutures décoratives
        des bas.
    seam_gauge_scale_type:
      name: Type d’échelle de la jauge de couture
      description: Indique les échelles ou les repères présents sur la jauge de couture
        en plus de l’échelle de base.
    seam_gauge_slider_material:
      name: Matériau du curseur de la jauge de couture
      description: Désigne la matière du curseur ou du repère réglable, le cas échéant.
    seam_ripper_tip_style:
      name: Type de pointe du découseur
      description: Décrit la forme de la pointe conçue pour se glisser sous les points
        et couper le fil en toute sécurité.
    seam_sealing_type:
      name: Type d’étanchéité des coutures
      description: Décrit la méthode utilisée pour empêcher l’eau de pénétrer par
        les coutures de la combinaison de pluie (p. ex., coutures entièrement recouvertes
        d’un ruban d’étanchéité ou soudées).
    seam_type:
      name: Type de couture
      description: Décrit le style de couture de la balle de baseball, qui détermine
        la prise en main, l’aérodynamisme et le niveau de jeu prévu.
    season_condition_protection:
      name: Protection contre les conditions saisonnières
      description: Indique les principales conditions météorologiques ou saisonnières
        contre lesquelles la protection de pare-brise est conçue.
    season_rating:
      name: Classement saisonnier
      description: Indique le classement saisonnier de la tente, qui précise les conditions
        météorologiques auxquelles elle est adaptée (p. ex., 3 saisons, 4 saisons
        ou expédition).
    seasoning_variety:
      name: Variété d’assaisonnement
      description: Classe l’assaisonnement selon son mode de préparation ou son usage
        culinaire traditionnel.
    seat_adjustment_power_type:
      name: Type de réglage électrique du siège
      description: Décrit le mode de réglage du siège, manuel ou électrique, qui peut
        avoir une incidence sur le câblage et la compatibilité.
    seat_belt_attachment_type:
      name: Type de fixation de la ceinture de sécurité
      description: Décrit le mode de fixation de la sangle au véhicule ou aux éléments
        de la ceinture.
    seat_belt_buckle_electrical_connector_type:
      name: Type de connecteur électrique de la boucle de ceinture
      description: Décrit le connecteur utilisé pour le câblage du contacteur de boucle
        ou du prétensionneur, le cas échéant.
    seat_belt_buckle_mounting_type:
      name: Type de fixation de la boucle de ceinture
      description: Décrit le mode de fixation de la boucle ou du réceptacle au véhicule,
        au siège ou à la tige de ceinture (p. ex., fixation par boulon ou par encliquetage).
    seat_belt_buckle_release_button_color:
      name: Couleur du bouton de déverrouillage de la boucle de ceinture
      description: Correspond à la couleur du bouton qui permet de déverrouiller la
        boucle.
    seat_belt_cover_placement:
      name: Emplacement du passage de la ceinture
      description: Indique à quel endroit de la ceinture de sécurité le revêtement
        est destiné à être utilisé.
    seat_belt_integration:
      name: Intégration de la ceinture de sécurité
      description: Précise si le siège comprend une ceinture de sécurité intégrée
        ou un réceptacle de boucle intégré, ou si le réceptacle de boucle d’origine
        du véhicule doit être transféré lors de l’installation.
    seat_belt_provision:
      name: Ceintures de sécurité fournies
      description: Précise si les ceintures de sécurité ou les éléments associés,
        comme les boucles, sont fournis avec l’ensemble de siège arrière ou doivent
        être transférés depuis le siège d’origine.
    seat_belt_strap_installation_location:
      name: Emplacement d’installation de la sangle de ceinture
      description: Précise l’emplacement de la sangle dans le système de ceinture
    seat_cover_placement:
      name: Positionnement des housses de siège
      description: Désigne les places du véhicule auxquelles la housse est destinée.
    seat_cover_securement_method:
      name: Mode de fixation de la housse de siège
      description: Décrit le mode principal de fixation de la housse sur le siège.
        Lorsque plusieurs modes de fixation sont utilisés, sélectionnez le mode principal.
    seat_cover_set_contents:
      name: Contenu de l’ensemble de housses de siège
      description: Décrit les pièces incluses dans l’emballage (p. ex., assises seulement
        ou siège complet avec appuie-têtes).
    seat_fabric:
      name: Tissu du siège
      description: Tissu principal utilisé pour l’assise et le dossier suspendu de
        la chaise.
    seat_height_category:
      name: Catégorie de hauteur d’assise
      description: Classe le tabouret selon les hauteurs d’assise courantes (p. ex.,
        hauteur de comptoir ou hauteur de bar), afin de faciliter le choix.
    seat_material:
      name: Matière de l’assise
      description: Désigne la matière principale de l’assise du banc.
    seat_mounting_type:
      name: Type de fixation du siège
      description: Configuration de fixation ou de rails utilisée pour fixer le siège
        au plancher du véhicule.
    seating_surface_material:
      name: Matériau de l'assise
      description: Indique la matière de la surface d’appui (p. ex., maille Textilene,
        toile suspendue, osier, revêtement rembourré).
    seatpost_clamp_mechanism:
      name: Mécanisme du collier de tige de selle
      description: Type de système de serrage ou de fermeture qui maintient la tige
        de selle.
    section_orientation_compatibility:
      name: Compatibilité avec l’orientation de l’élément
      description: Indique si l’accessoire convient à un élément avec accoudoir à
        gauche, avec accoudoir à droite ou d’orientation universelle.
    sectional_configuration:
      name: Configuration du canapé modulable
      description: Définit le module ou l’orientation précise de l’élément de canapé
        modulable (p. ex., angle, extrémité avec accoudoir à gauche, méridienne),
        afin que les acheteurs puissent composer l’agencement recherché.
    sectional_shape:
      name: Forme du canapé modulable
      description: Définit la forme générale du canapé modulable et son agencement.
    secured_components:
      name: Composants sécurisés
      description: Présente les pièces du vélo protégées par l’axe antivol ou les
        écrous de sécurité (p. ex., roue avant, roue arrière, tige de selle).
    seed_content:
      name: Présence de pépins
      description: Indique si l’agrume est sans pépins, contient peu de pépins ou
        en contient beaucoup.
    seed_size_classification:
      name: Classification des graines en fonction de leur taille
      description: Indique la taille du noyau non comestible du litchi, qui détermine
        la quantité de chair comestible.
    self_adhesive_backing_format:
      name: Format à dos autocollant
      description: Format du support adhésif fourni avec la pastille de fixation de
        la mèche (pastille préappliquée, autocollants séparés, etc.).
    self_adhesive_hook_loop_backing_type:
      name: Type de dos de la bande autoagrippante autocollante
      description: Décrit la structure du dos ou du film protecteur, ainsi que le
        système adhésif utilisé sur la face autocollante.
    self_adhesive_hook_loop_fastener_shape:
      name: Forme de fermeture auto-adhésive à boucles et crochets
      description: Décrit la découpe ou la forme des pièces de fixation fournies.
    self_hardening_clay_finish:
      name: Finition de l’argile autodurcissante
      description: Décrit l’aspect de surface ou le degré de brillance après durcissement
        complet (utile pour choisir entre un rendu naturel mat, satiné, etc.).
    self_hardening_clay_water_resistance_after_curing:
      name: Résistance à l’eau de l’argile autodurcissante après durcissement
      description: Indique dans quelle mesure l’argile résiste à l’eau après durcissement
        complet, sans produit d’étanchéité supplémentaire.
    sensor_functions:
      name: Fonctions du capteur
      description: Indique les données de cyclisme que le capteur mesure.
    sensor_measurement_mode:
      name: Mode de mesure du capteur
      description: Indique les données que le capteur peut relever (p. ex., cadence
        uniquement, vitesse uniquement, ou vitesse et cadence).
    sensor_mounting_position:
      name: Position de montage du capteur
      description: Décrit l’emplacement où le capteur se fixe sur le vélo ou l’équipement
        du cycliste, par exemple sur le bras de manivelle, le moyeu de roue ou la
        chaussure. Cet emplacement conditionne la compatibilité avec les différentes
        configurations de vélo.
    sensor_mounting_type:
      name: Type de fixation du capteur
      description: Décrit le mode de fixation du capteur MAP sur le collecteur d’admission
        ou le moteur (p. ex., bride boulonnée ou montage emboîté dans un joint).
    sensor_or_gauge_mounting_location:
      name: Emplacement de montage du capteur ou de la jauge
      description: Décrit l’emplacement prévu pour installer le capteur ou la jauge
        sur le véhicule, au niveau du système ou de la zone, sans distinction gauche-droite.
    sensory_modality:
      name: Modalité sensorielle
      description: Expérience sensorielle principale proposée par le jouet, ou combinaison
        d’expériences lorsqu’il est multisensoriel.
    sensory_toy_fidget_mechanism:
      name: Mécanisme de manipulation du jouet sensoriel
      description: Interaction ou mécanisme principal utilisé pour manipuler le jouet
        et favoriser l’autorégulation.
    sensory_toy_light_features:
      name: Fonctions lumineuses du jouet sensoriel
      description: Comportements ou effets lumineux produits par le jouet.
    sensory_toy_texture_type:
      name: Type de texture du jouet sensoriel
      description: Texture dominante ou caractéristiques de surface utilisées pour
        la stimulation tactile.
    sequin_application_method:
      name: Méthode d'application de paillettes
      description: Mode d’application ou d’utilisation prévu de la paillette (à coudre,
        à coller, thermocollante, etc.).
    sequin_finish:
      name: Finition des paillettes
      description: Décrit la finition de surface, l’aspect visuel et l’effet réfléchissant
        des paillettes utilisées sur l’écusson (p. ex., mat, métallisé, holographique),
        et non le support de l’écusson ni son mode de fixation.
    serger_stitch_functions:
      name: Fonctions de couture de la surjeteuse
      description: Fonctions de point prises en charge par la surjeteuse (variantes
        de surjet ou de surfilage et points spéciaux de surjeteuse).
    serger_thread_count:
      name: Nombre de fils de la surjeteuse
      description: Nombre de fils que la surjeteuse peut utiliser pour coudre (p.
        ex., capacité à 2, 3, 4 ou 5 fils).
    service_interval:
      name: Intervalle d’entretien
      description: Délai maximal recommandé entre deux inspections ou interventions
        d’entretien obligatoires effectuées par un centre agréé.
    serving_temperature:
      name: Température de service
      description: Indique la température ou l’état prévu du produit au moment de
        la consommation.
    sesame_seed_hull_status:
      name: Présence de l’enveloppe des graines de sésame
      description: Précise si le tahin est fabriqué à partir de graines de sésame
        décortiquées ou non décortiquées, ce qui modifie sa couleur, son goût et ses
        qualités nutritionnelles.
    sesame_seed_roast_level:
      name: Degré de torréfaction des graines de sésame
      description: Indique le degré de torréfaction des graines de sésame avant broyage,
        afin d’aider les acheteurs à choisir l’intensité aromatique souhaitée.
    sesame_seed_variety:
      name: Variété de graines de sésame
      description: Désigne la couleur ou la variété des graines de sésame utilisées
        pour fabriquer l’huile.
    set_classification:
      name: Classification du jeu
      description: Définit le niveau ou le style de jeu auquel l’ensemble de croquet
        est destiné (p. ex., tournoi, loisir, voyage).
    set_components:
      name: Composants de l’ensemble
      description: Indique les éléments inclus avec le produit (p. ex., piquet central
        seul ou ensemble complet).
    set_items_included:
      name: Articles inclus dans le lot
      description: Précise les vêtements ou les accessoires inclus dans l’ensemble,
        comme le tissu de sari, la dupatta ou la ceinture.
    setup_mechanism:
      name: Mécanisme de déploiement
      description: Décrit le mode principal de déploiement de la tente (p. ex., pop-up,
        structure gonflable à arceaux pneumatiques, coque de toit ouvrante).
    setup_type:
      name: Type d’installation
      description: Mode d’assemblage ou de déploiement de la tente ou du tunnel de
        jeu.
    sew_in_interfacing_elasticity:
      name: Élasticité de l’entoilage à coudre
      description: Précise si l’entoilage à coudre est extensible et, le cas échéant,
        selon quel axe ou quels axes, pour correspondre aux projets en maille ou en
        tissu chaîne et trame.
    sew_in_label_placement:
      name: Emplacement de l’étiquette à coudre
      description: Indique l’emplacement prévu de l’étiquette sur l’article fini.
    sew_on_edge_finish:
      name: Finition des bords à coudre
      description: Indique si les bords de la bande autoagrippante à coudre sont bruts,
        découpés ou finis pour résister à l’effilochage.
    sew_on_rhinestone_hole_orientation:
      name: Orientation des trous du strass à coudre
      description: Disposition ou orientation des trous par rapport au strass (p.
        ex., côte à côte, opposés, en croix), pour permettre différents types de points.
    sewing_kit_components_included:
      name: Composants du kit de couture inclus
      description: Présente les fournitures et outils de couture inclus dans un kit
        de couture, afin que les acheteurs puissent comparer le contenu de chaque
        kit.
    sewing_machine_bobbin_class:
      name: Classe de canette de la machine à coudre
      description: Précise la classe ou le système de canette compatible avec la machine
        à coudre, pour les canettes et les boîtiers de canette.
    sewing_machine_buttonhole_type:
      name: Type de boutonnière de la machine à coudre
      description: Méthode de réalisation des boutonnières prise en charge par la
        machine.
    sewing_machine_display_type:
      name: Type d’affichage de la machine à coudre
      description: Type d’interface de commande ou d’affichage de la machine à coudre.
    sewing_machine_needle_point_type:
      name: Type de pointe d’aiguille de machine à coudre
      description: Définit la forme ou la famille de pointe de l’aiguille, qui détermine
        la manière dont elle pénètre les différents tissus (p. ex., pointe aiguë,
        pointe boule ou pointe triangulaire).
    sewing_machine_needle_system:
      name: Système d'aiguille pour machine à coudre
      description: Système normalisé ou numéro de modèle de l’aiguille qui détermine
        sa compatibilité avec la machine (souvent noté 130/705 H, HAx1, DBx1, 15x1,
        etc.).
    sewing_machine_needle_type:
      name: Type d'aiguille de machine à coudre
      description: Définit l’usage prévu ou le type de l’aiguille (p. ex., universelle,
        pointe boule, jeans ou denim), deux critères qui déterminent la qualité du
        point et la compatibilité avec le tissu.
    sewing_machine_shank_type:
      name: Type de tige de machine à coudre
      description: Décrit le type de tige ou d’attache auquel le pied-de-biche est
        adapté pour garantir sa compatibilité avec la machine à coudre (p. ex., tige
        basse, tige haute, tige inclinée).
    sewing_pattern_accessory_type:
      name: Type d’accessoire du patron de couture
      description: Correspond à l’accessoire que le patron de couture sert à réaliser.
    sewing_pattern_notions_required:
      name: Fournitures nécessaires pour le patron de couture
      description: Présente les fournitures ou les articles de mercerie supplémentaires
        nécessaires à la réalisation du projet, en plus du tissu et du fil.
    sewing_pattern_recommended_fabric:
      name: Tissu recommandé pour le patron de couture
      description: Présente les types ou grammages de tissu recommandés pour le patron
        de couture, tels qu’ils sont fournis par son créateur.
    sewing_pattern_size_range:
      name: Gamme de tailles du patron de couture
      description: Définit la plage de tailles prévue pour le patron (p. ex., du bébé
        à l’adulte, grandes tailles).
    sewing_thread_size_system:
      name: Système de numérotation du fil à coudre
      description: Standard de numérotation utilisé pour indiquer la grosseur du fil
        (p. ex., Tex, Denier, Ticket, numéro de grosseur, taille V).
    shaft_curvature:
      name: Courbure du manche
      description: Décrit la forme générale du manche, qui détermine le dégagement,
        le mouvement et l’ergonomie.
    shaft_kick_point:
      name: Point de flexion du manche
      description: Désigne le point du manche où la flexion est la plus marquée pendant
        le mouvement, ce qui influe sur la trajectoire de la balle.
    shaft_length_type:
      name: Type de longueur d'arbre
      description: Désignation de taille utilisée dans le secteur pour les tiges de
        fléchettes (p. ex., courte, moyenne), lorsque les dimensions exactes en millimètres
        ne sont pas fournies.
    shaft_shape:
      name: Forme de la tige
      description: Définit le profil en coupe de la tige du tonfa (p. ex., rond, carré,
        octogonal).
    shaker_fill_material:
      name: Matériau de remplissage pour shaker
      description: Décrit le remplissage interne principal qui produit le son du shaker,
        le cas échéant, comme des perles, des graines ou de la grenaille.
    shaker_shell_material:
      name: Matériau de la coque du Shaker
      description: Indique la matière principale de la coque extérieure du shaker
        en forme d’œuf.
    shallot_variety:
      name: Variété d’échalote
      description: Désigne le cultivar, le type commercial ou la variété de l’échalote
        proposée.
    shank_style:
      name: Type de branches du mors
      description: Décrit la forme générale des branches du mors à levier (p. ex.,
        branches droites, courbées ou de style grazing).
    shapewear_enhancement_feature:
      name: Fonction principale du vêtement gainant
      description: Présente la principale fonction apportée par le vêtement (p. ex.,
        maintien du ventre, effet rehausseur, doublure antifuite).
    sheath_type:
      name: Type d’étui
      description: Type d’étui ou de fourreau fourni avec le couteau de collection.
    sheet_music_clip_padding_material:
      name: Matière des patins de la pince à partition
      description: Matière des patins placés sur les mâchoires ou les zones de prise
        en contact avec le papier ou le rebord du pupitre, afin d’éviter les déchirures
        et les glissements.
    sheet_music_clip_spring_tension_level:
      name: Niveau de tension du ressort de la pince à partition
      description: Force relative du ressort de la pince ou force de serrage.
    sheet_music_clip_use_environment:
      name: Cadre d’utilisation de la pince à partition
      description: Cadre principal dans lequel la pince est conçue pour fonctionner
        au mieux.
    shell_construction:
      name: Construction du fût
      description: Décrit la construction du fût de la grosse caisse, qui influe fortement
        sur le son et le poids.
    shell_finish:
      name: Finition du fût
      description: Traitement de finition extérieure du fût du doumbek.
    shell_hull_status:
      name: Présence de coque ou d’enveloppe
      description: Précise si les noix ou les graines sont vendues avec leur coque
        ou leur enveloppe intacte, ou si elles en sont dépourvues.
    shift_boot_attachment_method:
      name: Mode de fixation du soufflet de levier de vitesses
      description: Décrit le mode de fixation du soufflet sur la console du véhicule
        ou sur la garniture du levier de vitesses (p. ex., cadre de finition encliquetable,
        bague de maintien, adhésif).
    shift_boot_installation_hardware_included:
      name: Éléments de montage inclus avec le soufflet de levier de vitesses
      description: Présente les éléments de montage et les composants fournis avec
        le soufflet de levier de vitesses.
    shift_knob_illumination:
      name: Éclairage du pommeau de levier de vitesses
      description: Indique si le pommeau de levier de vitesses est éclairé et, le
        cas échéant, le type d’éclairage utilisé (p. ex., photoluminescent, à LED,
        à fibre optique ou à motif rétroéclairé).
    shift_knob_installation_method:
      name: Mode de fixation du pommeau de levier de vitesses
      description: Décrit le mode de fixation du pommeau sur le levier de vitesses.
    shift_knob_shape:
      name: Forme du pommeau de levier de vitesses
      description: Décrit la forme ergonomique générale du pommeau de levier de vitesses.
    shift_pattern_type:
      name: Type de marquage des vitesses
      description: Décrit le style de marquage des vitesses sur le pommeau, le cas
        échéant.
    shifter_compatibility:
      name: Compatibilité avec les manettes de vitesses
      description: Indique si le prolongateur de cintre est compatible avec les commandes
        de vitesses électroniques, les commandes mécaniques, les deux, ou aucune commande
        de vitesses.
    shifter_mounting_interface:
      name: Interface de fixation du levier de vitesses
      description: Décrit le mode de fixation de la commande de vitesses sur le vélo
        (p. ex., diamètre de collier spécifique, I-Spec, MatchMaker, embout de cintre,
        tube diagonal, sans fil).
    shifting_actuation_type:
      name: Type d’actionnement du passage des vitesses
      description: Désigne le mécanisme utilisé pour passer les vitesses dans le groupe
        (mécanique, électronique filaire, électronique sans fil, hydraulique).
    shifting_mechanism:
      name: Mécanisme de passage des vitesses
      description: Indique si la commande de vitesses fonctionne mécaniquement ou
        électroniquement, et si elle est indexée ou à friction.
    shim_purpose:
      name: Fonction de la cale
      description: Définit le type fonctionnel du produit (p. ex., cale, coin, entretoise),
        afin que les cyclistes trouvent rapidement la solution de réglage adaptée
        sans recourir à des sous-catégories distinctes.
    shin_guard_attachment_method:
      name: Mode de maintien du protège-tibia
      description: Classe le protège-tibia selon sa conception générale, notamment
        la présence d’un protège-cheville intégré ou d’une structure de type chaussette.
    shirt_cuff_style:
      name: Style de poignets de chemise
      description: Désigne la construction du poignet, qui détermine le niveau de
        formalité, la compatibilité avec les boutons de manchette et le confort.
    shochu_base_ingredient:
      name: Ingrédient de base du shochu
      description: Désigne la principale source d’amidon ou de sucre utilisée pour
        produire le shochu.
    shochu_soju_variety:
      name: Variété de shochu ou de soju
      description: Classe le produit selon le style reconnu ou le type de production
        dont il relève.
    shock_absorber_bushing_material:
      name: Matériau des bagues d’amortisseur
      description: Matière des bagues de montage ou des isolateurs fournis avec l’amortisseur
        ou intégrés à celui-ci.
    shock_absorber_charge_type:
      name: Type de charge de l’amortisseur
      description: Décrit la technologie de charge ou d’amortissement de l’amortisseur
        (p. ex., hydraulique ou à huile, à gaz, à air) et, le cas échéant, la conception
        de tube associée.
    shock_absorber_mount_type_lower:
      name: Type de fixation supérieure de l’amortisseur
      description: Type de fixation inférieure de l’amortisseur pour vérifier la compatibilité
        de montage.
    shock_absorber_mount_type_upper:
      name: Type de fixation supérieure de l’amortisseur
      description: Décrit le type de fixation supérieure d’un amortisseur de véhicule
        automobile pour vérifier la compatibilité de montage.
    shock_absorber_position:
      name: Position de l’amortisseur
      description: Indique si l’amortisseur est destiné à l’avant, à l’arrière, au
        côté gauche ou au côté droit du véhicule, avec plus de précision qu’un simple
        positionnement par essieu.
    shock_absorption_system:
      name: Système d’amortissement
      description: Définit le mécanisme qui réduit les vibrations et le bruit au rebond.
    shoe_collar_height:
      name: Hauteur de tige de la chaussure
      description: Classe les chaussures selon la hauteur de tige ou de coupe (basse,
        mi-haute, haute), afin d’indiquer le niveau de couverture et de maintien de
        la cheville.
    shoe_cover_height:
      name: Hauteur des couvre-chaussures
      description: Décrit le niveau de protection offert par la surchaussure de vélo,
        en distinguant les couvre-pointes des surchaussures hautes intégrales.
    shoe_sizing_system:
      name: Système de pointure
      description: Désigne le système de pointure utilisé pour la taille indiquée
        (US, UK, EU, JP, Mondopoint, etc.).
    shoelace_aglet_material:
      name: Matériau des embouts de lacets
      description: Désigne la matière des embouts situés aux extrémités des lacets,
        qui influe sur leur durabilité et leur aspect.
    shooting_rest_design:
      name: Type de support de tir
      description: Classe le support selon sa structure (sac de tir, support à glissière,
        trépied, étau de tir, etc.).
    shooting_stick_yoke_design:
      name: Type de fourche du bâton de tir
      description: Décrit le type de berceau ou de fourche en contact avec l’arme
        à feu ou l’optique.
    shooting_target_style:
      name: Type de cible de tir
      description: Classe les cibles de tir pour le patinage artistique et le hockey
        selon leur type ou leur conception, afin que les clients choisissent l’objectif
        d’entraînement recherché.
    shooting_target_type:
      name: Type de cible de tir
      description: Classe les cibles de tir selon leur structure, leur matière ou
        leur conception (p. ex., gong, silhouette, cible papier à visuel circulaire,
        cible rotative), afin que les tireurs trouvent rapidement la cible adaptée
        à leur discipline et à leur type d’arme à feu.
    short_block_assembly_balance_type:
      name: Type d’équilibrage du bloc embiellé
      description: Indique si l’équipage mobile présente un équilibrage interne, externe
        ou neutre.
    short_block_intended_use:
      name: Usage prévu du bloc embiellé
      description: Usage principal auquel le bloc embiellé est destiné.
    short_block_rotating_assembly_included:
      name: Équipage mobile inclus avec le bloc embiellé
      description: Détaille les principaux composants de l’équipage mobile fournis
        avec le bloc embiellé.
    shot_size:
      name: Taille des projectiles
      description: Indique la désignation de taille des projectiles pour les billes
        en vrac ou les composants de munition.
    shotgun_action_type:
      name: Type de mécanisme du fusil de chasse
      description: Décrit le mécanisme de fonctionnement du fusil de chasse.
    shotgun_choke_type:
      name: Type de choke du fusil de chasse
      description: Décrit la configuration du choke du ou des canons du fusil de chasse.
    shotgun_gauge:
      name: Calibre du fusil de chasse
      description: Indique le calibre de l’âme du fusil de chasse, y compris le .410
        le cas échéant, pour l’identification et le filtrage dans les annonces d’objets
        de collection.
    shotgun_stock_material:
      name: Matériau de la crosse et du devant du fusil de chasse
      description: Désigne la matière principale de la crosse et du devant du fusil.
    shuffleboard_speed_rating:
      name: Indice de vitesse du shuffleboard
      description: Indique la vitesse de glisse relative obtenue sur la table avec
        la poudre de shuffleboard ou un autre produit d’entretien, afin que les joueurs
        choisissent une vitesse adaptée à leur niveau et à la longueur de la table.
    shuffleboard_table_length_compatibility:
      name: Compatibilité avec la longueur de la table de shuffleboard
      description: Longueur standard de table de shuffleboard avec laquelle le produit
        est compatible ou qu’il est destiné à compléter.
    shuttlecock_base_material:
      name: Matériau de base du volant
      description: Désigne la matière du bouchon du volant, qui détermine la durabilité,
        les sensations et le rebond.
    shuttlecock_feather_material:
      name: Matière des plumes du volant
      description: Désigne l’origine principale des plumes ou le type de construction
        de la jupe du volant, qui déterminent la durabilité, la régularité et le prix.
    shuttlecock_grade:
      name: Catégorie du volant
      description: Indique le niveau de jeu prévu ou la catégorie de qualité du volant
        (p. ex., entraînement, club, compétition).
    shuttlecock_speed_rating:
      name: Indice de vitesse du volant
      description: Indique la vitesse ou le classement attribué au volant par le fabricant,
        afin que les joueurs choisissent la vitesse de vol adaptée aux conditions
        de jeu, à la température et à l’altitude.
    side_panel_installation_state:
      name: État de préparation du panneau latéral
      description: Indique si le panneau latéral est fourni brut, apprêté, peint,
        ou autrement revêtu ou préparé pour l’installation.
    side_wall_mechanism:
      name: Mécanisme de la paroi latérale
      description: Décrit le mode d’ouverture ou d’abaissement de la paroi côté lit
        du berceau, qui facilite l’accès au bébé.
    signal_source:
      name: Source du signal
      description: Indique le mode de réception ou de calcul des données de distance
        ou de temps par l’odomètre.
    silk_fiber_type:
      name: Type de fibre de soie
      description: Type ou origine de la fibre de soie utilisée pour fabriquer le
        tissu (p. ex., mûrier ou tussah), avec une incidence sur la texture, la régularité
        et le prix.
    simulated_game_species:
      name: Espèce de gibier reproduite
      description: Indique l’espèce de gibier que le leurre d’entraînement reproduit
        pour rendre l’exercice plus réaliste.
    singlet_cut_style:
      name: Coupe du maillot de lutte
      description: Décrit la coupe ou le style du maillot de lutte, en tenant compte
        de la hauteur des bretelles, du type de dos et des variantes pour hommes,
        femmes ou jeunes.
    sink_material:
      name: Matériau de l'évier
      description: Indique la matière de la ou des vasques intégrées fournies avec
        le meuble-lavabo.
    sinker_attachment_style:
      name: Type d’attache du plomb de pêche
      description: Décrit le dispositif d’attache prévu sur le plomb de pêche pour
        le raccorder à la ligne ou au montage.
    sinker_finish:
      name: Finition du plomb de pêche
      description: Décrit le revêtement extérieur ou le traitement de surface du plomb
        de pêche.
    sinker_shape:
      name: Forme du plomb de pêche
      description: Définit la forme géométrique du plomb de pêche (p. ex., balle,
        cylindre, goutte), afin que les pêcheurs puissent choisir la présentation
        la mieux adaptée et réduire les risques d’accrochage.
    siren_system_included:
      name: Système de sirène inclus
      description: Indique si un système de sirène ou de sonorisation est installé,
        ainsi que son type.
    siren_system_type:
      name: Type de système d'alarme
      description: Décrit la configuration du système de sirène ou de sonorisation
        installé sur le fourgon de police
    size_designation:
      name: Désignation de la taille
      description: Désignation normalisée de la taille du triangle.
    size_system:
      name: Système de tailles
      description: Indique le système de tailles ou la norme régionale correspondant
        à la désignation de la taille (p. ex., US, UK, EU, lettres internationales).
    sizzle_mechanism:
      name: Mécanisme de grésillement
      description: Décrit le mécanisme par lequel la cymbale produit l’effet de grésillement
        (p. ex., rivets intégrés à la cymbale, chaînette ou sizzler amovible, aucun
        accessoire inclus).
    skate_blade_discipline:
      name: Discipline de la lame de patin
      description: Désigne la discipline ou l’usage de patinage auquel la lame est
        destinée, par exemple le hockey ou le patinage artistique, afin que les acheteurs
        puissent filtrer les lames pertinentes.
    skate_brake_type:
      name: Type de frein de patin
      description: Désigne le type de frein fourni avec les patins.
    skateboard_nut_thread_size:
      name: Taille du filetage de l’écrou de skateboard
      description: Indique la taille du filetage de l’écrou, c’est-à-dire son diamètre
        et son pas, afin d’assurer sa compatibilité avec les axes, les kingpins ou
        les éléments de fixation du skateboard.
    skein_winder_bearing_bushing_type:
      name: Type de roulement ou de bague du dévidoir à écheveaux
      description: Décrit le type de roulement ou de bague utilisé dans l’ensemble
        rotatif du dévidoir à écheveaux.
    skein_winder_drive_type:
      name: Type d’entraînement du dévidoir à écheveaux
      description: Mode d’entraînement ou de rotation du dévidoir à écheveaux pendant
        l’utilisation.
    ski_binding_mechanism:
      name: Mécanisme de la fixation des skis
      description: Définit le principe mécanique ou la discipline de la fixation (p.
        ex., alpine, tech à inserts, télémark).
    ski_binding_part_type:
      name: Type de pièce de fixation de ski
      description: Désigne le composant ou l’accessoire de fixation de ski concerné,
        afin de filtrer rapidement les nombreux types de pièces.
    ski_boot_sole_standard:
      name: Norme de semelle de chaussure de ski
      description: Désigne la norme de semelle ou le standard de compatibilité avec
        les fixations pour lequel la chaussure de ski est certifiée.
    skill_focus:
      name: Compétence travaillée
      description: Désigne la principale compétence de basket-ball que l’accessoire
        d’entraînement est destiné à développer.
    skimboard_construction:
      name: Fabrication d'un skimboard
      description: Décrit la construction principale de la planche, en particulier
        le noyau et la technique de stratification utilisés (p. ex., noyau en mousse,
        noyau en bois).
    skin_presence:
      name: Présence de la peau
      description: Indique si le poulet est vendu avec la peau, sans peau ou partiellement
        sans peau.
    slapstick_handle_type:
      name: Type de poignée de la claquette
      description: Décrit le type de prise ou de poignée intégrée à la claquette,
        qui détermine l’ergonomie et le confort de jeu.
    slapstick_playing_surface_material:
      name: Matériau des surfaces de frappe de la claquette
      description: Indique la matière des éléments qui se frappent l’un l’autre pour
        produire le son.
    sled_brake_type:
      name: Type de frein à patin
      description: Décrit le mécanisme de freinage dont la luge est équipée, le cas
        échéant.
    sled_towing_method:
      name: Mode de traction de la luge
      description: Décrit le principal mode de traction de la luge.
    sleep_position_suitability:
      name: Adaptation de la position de sommeil
      description: Indique les positions de sommeil auxquelles le matelas offre le
        soutien le plus adapté.
    sleeping_bag_shape:
      name: Forme du sac de couchage
      description: Coupe générale du sac de couchage, avec une incidence sur la chaleur,
        le poids et l’espace intérieur.
    sleeping_pad_type:
      name: Type de matelas de camping
      description: Désigne le type de construction du matelas, par exemple en mousse
        à cellules fermées ou gonflable, qui détermine directement le confort, le
        poids et l’isolation;
    sleepwear_set_pieces_included:
      name: Ensemble de vêtements de nuit inclus
      description: Présente les pièces fournies dans un ensemble de nuit ou de détente
        composé de plusieurs éléments.
    sleeve_bearing_type:
      name: Type de palier lisse
      description: Désigne la technologie qui permet aux manchons de tourner et conditionne
        la fluidité de rotation dans les mouvements d’haltérophilie olympique.
    sleeve_style:
      name: Style de manche
      description: Décrit le type de manche, indépendamment de sa longueur (p. ex.,
        raglan).
    slide_board_accessories_included:
      name: Accessoires inclus avec la planche de glisse
      description: Présente les accessoires fournis avec la planche de glisse, afin
        que les acheteurs sachent exactement ce qui est inclus et puissent comparer
        les ensembles.
    slide_installation_type:
      name: Type d'installation par glissement
      description: Mode d’installation ou de montage prévu pour le toboggan (indépendant,
        fixé à une structure de jeu, etc.).
    slide_intended_finger:
      name: Doigt qui porte le slide
      description: Indique le doigt sur lequel le slide est destiné à être porté,
        ou si cette information ne s’applique pas (p. ex., barre de tonalité).
    slide_safety_features:
      name: Éléments de sécurité du toboggan
      description: Éléments de conception liés à la sécurité du toboggan.
    slide_type:
      name: Type de coulisse
      description: Décrit le ou les types de coulisses d’instruments à cuivres que
        le produit est destiné à nettoyer.
    slide_water_use_capability:
      name: Compatibilité du toboggan avec l’eau
      description: Utilisation prévue du toboggan avec de l’eau, le cas échéant, et
        mode d’alimentation correspondant (p. ex., raccordement à un tuyau).
    slime_putty_kit_components_included:
      name: Composants inclus dans le kit de slime et de pâte malléable
      description: Présente les outils et les éléments à incorporer fournis avec le
        slime ou la pâte malléable, en particulier lorsqu’il s’agit d’un kit ou d’un
        ensemble.
    sling_material:
      name: Matériau de la sangle
      description: Désigne la matière textile utilisée pour la sangle de la dégaine.
    smith_machine_bar_path:
      name: Trajectoire de la barre guidée
      description: Décrit la trajectoire fixe de la barre, avec les indications utiles
        sur la biomécanique du mouvement et l’espace nécessaire.
    smoke_color:
      name: Couleur de la fumée
      description: Couleur de la fumée produite par la fusée ou le signal fumigène,
        distincte de la couleur du corps du produit.
    smoked_malt_smoking_material:
      name: Matériau de fumage du malt fumé
      description: Désigne le matériau utilisé pour fumer le malt (p. ex., essence
        de bois particulière ou tourbe).
    snack_mix_variety:
      name: Variété de mélange pour collation
      description: Classe le produit selon le type de mélange (p. ex., mélange montagnard,
        mélange de noix, namkeen, sev).
    snack_processing_method:
      name: Procédé de fabrication de snacks
      description: Indique la principale technique de transformation ou de conservation
        utilisée pour préparer l’en-cas (p. ex., lyophilisé, cuit au four, rôti).
    snack_texture:
      name: Texture de l’en-cas
      description: Indique la texture et la sensation en bouche des bâtonnets de sésame.
    snap_installation_method:
      name: Méthode d'installation par encliquetage
      description: Mode de pose ou de fixation du bouton-pression sur le support.
    snare_drum_bearing_edge_profile:
      name: Profil du chanfrein de caisse claire
      description: Coupe ou profil du chanfrein du fût de la caisse claire.
    snare_drum_finish_type:
      name: Type de finition de la caisse claire
      description: Type de finition générale du fût de la caisse claire.
    snare_drum_hoop_type:
      name: Type de cerclage de caisse claire
      description: Type de cercles utilisés sur la caisse claire.
    snare_drum_mounting_type:
      name: Type de fixation de la caisse claire
      description: Mode de montage ou d’utilisation prévu de la caisse claire.
    snare_drum_shell_material:
      name: Matériau du fût de la caisse claire
      description: Indique le métal ou l’alliage utilisé pour le fût de la caisse
        claire, qui détermine fortement le timbre, le poids et la durabilité.
    snare_drum_strainer_mechanism:
      name: Mécanisme de déclencheur de caisse claire
      description: Type de mécanisme de déclenchement utilisé pour enclencher ou relâcher
        le timbre de la caisse claire.
    snare_drum_strainer_type:
      name: Type de déclencheur de caisse claire
      description: Type de mécanisme de déclenchement utilisé pour enclencher ou relâcher
        le timbre de la caisse claire.
    snare_hoop_type:
      name: Type de cerclage de caisse claire
      description: Type de cerclage monté sur la caisse claire.
    snare_throw_off_type:
      name: Type de déclencheur de timbre
      description: Type de mécanisme de déclenchement utilisé pour enclencher ou relâcher
        le timbre de la caisse claire.
    snip_cutter_spring_mechanism:
      name: Mécanisme à ressort du coupe-fil
      description: Précise si le coupe-fil comporte un mécanisme à ressort ou de rappel,
        ainsi que le type de mécanisme utilisé.
    snorkel_mount_position:
      name: Position du tuba
      description: Décrit la position du tuba sur la tête de l’utilisateur pendant
        l’utilisation.
    snorkel_top_type:
      name: Type de partie supérieure du tuba
      description: Décrit le dispositif de protection contre l’entrée d’eau situé
        en haut du tuba inclus dans l’ensemble.
    snow_condition_suitability:
      name: Compatibilité avec les conditions de neige
      description: Décrit les principales conditions de neige auxquelles le fart est
        destiné.
    snow_sports_helmet_safety_certification:
      name: Certification de sécurité du casque de ski ou de snowboard
      description: Désigne les normes de sécurité auxquelles le casque répond pour
        la pratique du ski ou du snowboard.
    snowboard_base_material:
      name: Matériau de la semelle du snowboard
      description: Désigne la composition ou la finition de la semelle, par exemple
        extrudée, frittée ou issue d’une formulation propriétaire, qui détermine la
        vitesse, la durabilité et l’entretien.
    snowboard_width_class:
      name: Catégorie de largeur du snowboard
      description: Classe la largeur générale du snowboard par rapport à la pointure
        des bottes (p. ex., standard, large).
    soccer_ball_compartment_type:
      name: Type de compartiment pour ballon de football
      description: Décrit la façon dont le sac à dos accueille un ballon de football,
        le cas échéant.
    soccer_ball_type:
      name: Type de ballon de football
      description: Désigne l’usage prévu ou le type du ballon de football (p. ex.,
        match, entraînement, futsal), afin que les acheteurs trouvent rapidement le
        modèle adapté sans multiplier les sous-catégories.
    soccer_dummy_base_type:
      name: Type de base du mannequin de football
      description: Décrit le type de base ou de mécanisme d’ancrage du mannequin.
    soccer_dummy_design:
      name: Type de construction du mannequin de football
      description: Décrit le type de construction du mannequin de football, par exemple
        rigide ou gonflable.
    soccer_goal_target_style:
      name: Type de cible d’entraînement de football
      description: Définit la forme ou la conception de la cible d’entraînement, afin
        que les acheteurs choisissent le modèle le mieux adapté à leurs exercices.
    soccer_goal_type:
      name: Type de but de football
      description: Indique la structure ou l’usage prévu du but (p. ex., pop-up, but
        de rebond, street).
    sock_cushioning:
      name: Amorti de la chaussette
      description: Indique le niveau et le type d’amorti ou de rembourrage sous le
        pied dans la chaussette.
    sock_cushioning_level:
      name: Niveau d’amorti de la chaussette
      description: Indique le niveau d’amorti sous le pied dans la chaussette.
    sock_grip_type:
      name: Type d’adhérence de la chaussette
      description: Décrit les éléments d’adhérence ou antidérapants appliqués sous
        la chaussette.
    sock_toe_style:
      name: Type de pointe de la chaussette
      description: Décrit la façon dont la pointe de la chaussette est construite.
    soft_bait_style:
      name: Forme du leurre souple
      description: Classe le leurre souple selon la forme ou le profil de son corps
        (p. ex., ver, swimbait, grub).
    soft_top_attachment_type:
      name: Type de fixation de la capote
      description: Décrit le mode de fixation de la capote souple sur le véhicule
        (glissières, boutons-pression, bandes autoagrippantes, etc.).
    soft_top_includes_frame_hardware:
      name: Armature et matériel de montage inclus avec la capote souple
      description: Indique si le produit comprend l’armature, les arceaux ou le matériel
        de montage de la capote souple.
    soft_top_installation_type:
      name: Type d’installation de la capote souple
      description: Décrit le mode d’installation ou de fixation de la capote souple
        du véhicule, ainsi que l’effort requis.
    soft_top_window_configuration:
      name: Configuration des vitres de la capote
      description: Indique le nombre de fenêtres de la capote souple et leur emplacement.
    softball_certification:
      name: Certification de softball
      description: Présente les marquages ou homologations d’instances officielles
        imprimés sur le ballon, qui déterminent s’il peut être utilisé dans une ligue
        ou un match donné.
    softness_level:
      name: Niveau de souplesse
      description: Indique le niveau de souplesse ou de finesse de la face à boucles,
        un critère important pour le confort au contact de la peau et les usages peu
        volumineux.
    solar_system_model_included_bodies:
      name: Corps célestes inclus dans le modèle du système solaire
      description: Indique les corps célestes représentés dans le modèle.
    solar_system_model_scaling:
      name: Mise à l’échelle du modèle du système solaire
      description: Indique si le modèle du système solaire respecte l’échelle des
        tailles planétaires, des distances ou des orbites, des deux, ou s’il s’agit
        d’une représentation schématique non à l’échelle.
    sold_secure_certification_level:
      name: Niveau de certification Sold Secure
      description: Indique le classement Sold Secure attribué à l’antivol par l’organisme
        indépendant britannique de contrôle (Bronze, Silver, Gold, Diamond).
    sold_secure_rating:
      name: Classement Sold Secure
      description: Indique le niveau de certification Sold Secure attribué à l’antivol.
    sole_construction:
      name: Construction de la semelle
      description: Décrit la construction de la semelle de la chaussure (complète,
        fendue, en deux parties, etc.), qui détermine directement la souplesse, le
        contact avec le sol et l’adaptation à certaines techniques de danse.
    sole_type:
      name: Type de semelle
      description: Décrit la structure de la semelle, en lien avec sa souplesse et
        son usage prévu.
    soprano_saxophone_body_style:
      name: Forme du corps du saxophone soprano
      description: Décrit la configuration physique du corps du saxophone soprano.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Type de chicane pour bec de saxophone soprano
      description: Décrit la conception du déflecteur ou du plafond du bec (le contour
        situé derrière la pointe), qui détermine la brillance, la projection et la
        réponse.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Volume de la chambre d'un bec de saxophone soprano
      description: Décrit la taille de la chambre interne du bec de saxophone soprano,
        qui modifie la résistance et le timbre.
    soprano_saxophone_mouthpiece_finish:
      name: Finition d'un bec de saxophone soprano
      description: Finition de surface ou placage appliqué au bec, le cas échéant.
    soprano_saxophone_mouthpiece_included_accessories:
      name: Accessoires inclus avec le bec de saxophone soprano
      description: Désigne les accessoires fournis avec le bec.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Caractère sonore du bec de saxophone soprano
      description: Profil sonore général associé à la conception du bec.
    sound_character:
      name: Caractère sonore
      description: Décrit le timbre général produit par la claquette.
    sound_expansion_method:
      name: Mode d’extension des sons
      description: Décrit la manière dont le module peut enrichir sa bibliothèque
        de sons interne au-delà des sons d’usine (p. ex., packs de contenu, importation
        d’échantillons, cartes d’extension).
    sound_module_sound_library_focus:
      name: Orientation de la bibliothèque de sons du module
      description: Dominante principale de la banque de sons d’usine, destinée à aider
        les acheteurs à choisir le module adapté à leur style ou à leur usage.
    sound_port_type:
      name: Type de prise audio
      description: Décrit la conception de l’évent sonore à l’arrière du cajón, qui
        détermine la projection et la réponse dans les graves.
    sound_sensitivity_control:
      name: Réglage de la sensibilité au son
      description: Indique si la sensibilité au son est réglable et selon quel mode.
    sound_synthesizer_patch_memory:
      name: Mémoire de patchs du synthétiseur
      description: Indique si le synthétiseur peut enregistrer et rappeler des préréglages
        (patchs).
    sound_type:
      name: Type de son
      description: Type ou types de sons principaux produits par le tapis (p. ex.,
        instruments, chansons, consignes vocales) pour guider le jeu.
    soundboard_material:
      name: Matériau de la table d’harmonie
      description: Matériau utilisé pour la table d’harmonie de la harpe, qui détermine
        la résonance et le timbre.
    soup_or_broth_variety:
      name: Variété de soupe ou de bouillon
      description: Indique le style, la recette ou la préparation culinaire de la
        soupe ou du bouillon, afin que les acheteurs trouvent rapidement le type recherché.
    sour_cream_variety:
      name: Variété de crème acidulée
      description: Classe les crèmes acidulées selon leur variété ou leur style culinaire
        particulier, par exemple la crème fraîche ou la crema mexicaine.
    soy_sauce_variety:
      name: Variétés de sauce soja
      description: Désigne le style ou la formulation de la sauce soja (p. ex., claire,
        foncée, tamari, ponzu), afin que les acheteurs filtrent rapidement les produits
        selon leur profil aromatique et leur usage culinaire.
    spark_plug_electrode_material:
      name: Matériau de l’électrode de bougie d’allumage
      description: Matériau ou technologie des pointes d’électrode côté allumage de
        la bougie, qu’il s’agisse de l’électrode centrale ou de l’électrode de masse,
        selon la présentation commerciale du produit (p. ex., cuivre, platine, iridium).
    spark_plug_seat_type:
      name: Type de siège de bougie d’allumage
      description: Type de portée ou de siège qui assure l’étanchéité de la bougie
        d’allumage au niveau de la culasse.
    spark_plug_terminal_type:
      name: Type de borne de bougie
      description: Type de borne supérieure utilisée pour raccorder le câble ou le
        capuchon d’allumage.
    sparkler_shape:
      name: Forme du cierge magique
      description: Forme fantaisie générale du cierge magique.
    speaker_cone_material:
      name: Matériau du cône de haut-parleur
      description: Matériau principal du cône de haut-parleur, pour haut-parleur de
        grave ou de médium.
    speaker_size:
      name: Taille du haut-parleur
      description: Taille nominale du transducteur ou taille de montage du haut-parleur
        séparé (p. ex., 6,5 po, 6 x 9 po), utilisée pour l’adapter aux emplacements
        d’origine et aux adaptateurs de haut-parleur.
    special_effects_output_interface:
      name: Interface de sortie des effets spéciaux
      description: Décrit la sortie utilisée pour commander les appareils d’effets
        spéciaux.
    special_effects_stand_stability_features:
      name: Dispositifs de stabilité du pied pour effets spéciaux
      description: Décrit les dispositifs intégrés de stabilité et de sécurité destinés
        à empêcher le basculement ou le glissement pendant les événements.
    specialty_malt_name_type:
      name: Nom ou type du malt de spécialité
      description: Correspond au nom ou au type précis du malt de spécialité, souvent
        utilisé comme appellation commerciale.
    specimen_presentation:
      name: Présentation du spécimen
      description: Indique le mode de préparation ou de présentation du spécimen de
        collection (p. ex., brut ou non préparé, poli, taillé ou monté).
    speed_bag_accessories_included:
      name: Accessoires inclus avec la poire de vitesse
      description: Présente les accessoires supplémentaires fournis avec la poire
        de vitesse, comme les gants, les pompes à air, les émerillons, les chaînes
        ou les supports.
    speed_rating:
      name: Indice de vitesse
      description: Indique la vitesse de jeu offerte par le tapis de la table de billard
        (p. ex., lente, moyenne ou rapide).
    speedometer_backlight_type:
      name: Type de rétroéclairage du compteur de vitesse
      description: Indique si le compteur de vitesse est rétroéclairé pour la visibilité
        de nuit et selon quel mode.
    speedometer_display_type:
      name: Type d’affichage du compteur de vitesse
      description: 'Indique le mode d’affichage de la vitesse sur le compteur : aiguille
        ou cadran analogique, affichage numérique, ou combinaison d’éléments analogiques
        et numériques.'
    speedometer_unit_of_measure:
      name: Unité de mesure de la vitesse
      description: Indique les unités de vitesse affichées sur le cadran ou l’écran.
    spike_replaceability:
      name: Remplaçabilité des pointes
      description: Indique si les pointes de la chaussure sont remplaçables ou fixes,
        ou si la chaussure est sans pointes.
    spike_shape:
      name: Forme des pointes
      description: Désigne la forme géométrique de l’extrémité des pointes, qui détermine
        l’adhérence et l’adaptation aux différentes surfaces de piste.
    spike_thread_size:
      name: Calibre des crampons
      description: Indique la taille ou le standard du filetage de la base qui se
        visse dans la chaussure (p. ex., 1/4-20).
    spin_classification:
      name: Classification par spin
      description: Indique le profil de rotation pour lequel le disque est conçu (faible,
        moyen, élevé ou très élevé).
    spin_profile:
      name: Profil de spin
      description: Indique les caractéristiques de rotation favorisées par la tige.
    spin_types_supported:
      name: Types d’effets pris en charge
      description: Présente les types d’effets que la machine peut imprimer aux balles,
        afin que les joueurs s’entraînent face à différents styles de frappe.
    spinach_preparation_style:
      name: Mode de préparation des épinards
      description: Décrit le mode de préparation des feuilles d’épinards ou le format
        du produit (p. ex., feuilles entières, hachées, en cubes).
    spinach_variety:
      name: Variété d’épinards
      description: Désigne la variété botanique ou commerciale des épinards (p. ex.,
        jeunes pousses, épinards de Savoie, épinards d’eau, épinards rouges), afin
        que les acheteurs choisissent le type exact recherché.
    spindle_bearing_surface_material:
      name: Matériau de la surface d’appui du fuseau
      description: Matière de la pointe ou de la surface d’appui des fuseaux soutenus,
        qui détermine la fluidité de rotation et l’usure.
    spindle_bearing_type:
      name: Type de roulement de broche
      description: Type de pointe ou de surface d’appui du fuseau qui réduit le frottement
        contre le bol ou la coupelle de support.
    spindle_finish:
      name: Finition du fuseau
      description: Finition ou revêtement de surface du fuseau, avec une incidence
        sur le toucher, la durabilité et l’aspect.
    spindle_hook_type:
      name: Type de crochet du fuseau
      description: Mécanisme d’accrochage situé en haut du fuseau, utilisé pour retenir
        le fil d’amorce ou le fil.
    spindle_support_method:
      name: Mode de soutien du fuseau
      description: Mode de soutien prévu pour le fuseau pendant le filage.
    spindle_tip_style:
      name: Type de pointe du fuseau
      description: Forme ou conception de la pointe qui repose dans le bol ou la coupelle,
        c’est-à-dire sur la surface d’appui, avec une incidence sur le frottement
        et la fluidité de rotation.
    spindle_whorl_position:
      name: Position du fuseau
      description: Position de la fusaïole sur la tige du fuseau.
    spinner_blade_shape:
      name: Forme de la palette du spinner
      description: Désigne la forme principale de la palette utilisée sur le spinner,
        qui détermine les vibrations, les reflets et la profondeur de nage.
    spinner_control_card_design_type:
      name: Type de carte de contrôle pour rouet
      description: Décrit le type de carte de contrôle pour rouet selon la manière
        dont elle présente les informations de réglage (p. ex., référence de rapport,
        référence de tension, tableau de conversion).
    spinner_subtype:
      name: Sous-type Spinner
      description: Classe la conception générale ou la famille du spinner (p. ex.,
        spinner en ligne, spinnerbait).
    spinning_oil_application_area:
      name: Points d’application de l’huile pour rouet
      description: Indique le ou les points d’application prévus de l’huile sur le
        rouet.
    spinning_oil_application_tool:
      name: Outil d'application d'huile à rotation
      description: Indique le type d’embout applicateur ou de conditionnement utilisé
        pour appliquer l’huile sur les pièces du rouet avec un dosage maîtrisé.
    spinning_oil_features:
      name: Propriétés de l’huile pour rouet
      description: Présente les propriétés fonctionnelles importantes pour les huiles
        de rouet, notamment la formation de résidus, les taches, l’oxydation et la
        lavabilité.
    spinning_top_features:
      name: Caractéristiques de la toupie
      description: Fonctions de jeu spéciales incluses dans la toupie, au-delà de
        la rotation simple.
    spinning_top_launch_mechanism:
      name: Mécanisme de lancement de la toupie
      description: Mode de lancement ou de propulsion de la toupie pour la mettre
        en rotation.
    spinning_wheel_brake_tension_system_type:
      name: Type de système de freinage ou de tension du rouet
      description: Indique le système de freinage ou de tension de l’embobinement
        utilisé pour contrôler l’enroulement du fil.
    spinning_wheel_drive_system:
      name: Système d'entraînement d'un rouet
      description: Indique le système d’entraînement auquel la bobine est destinée.
    spinning_wheel_hook_system:
      name: Système de crochets du rouet
      description: Indique le mode de guidage du fil le long des bras de l’épinglier.
    spinning_wheel_part_application:
      name: Pièces du rouet concernées
      description: Indique les pièces du rouet auxquelles l’huile est destinée.
    spinning_wheel_portability_foldability:
      name: Portabilité et pliage du rouet
      description: Indique si le rouet est conçu pour être plié en vue du transport.
    spinning_wheel_tension_adjustment_type:
      name: Type de réglage de la tension du rouet
      description: Mode de réglage de la tension du rouet pour contrôler l’enroulement
        du fil.
    splice_termination_type:
      name: Type d’épissure ou de terminaison
      description: Précise la terminaison fournie à l’extrémité de la ligne d’ancrage
        (p. ex., œil épissé, cosse, crochet de chaîne).
    split_shot_cut_type:
      name: Type de fente du plomb fendu
      description: Distingue le type de rainure ou d’ouverture qui permet de fixer
        le plomb à la ligne.
    split_shot_shape:
      name: Forme du plomb fendu
      description: Décrit la forme du plomb fendu, qui détermine son comportement
        dans l’eau et sa résistance aux accrochages.
    split_shot_size:
      name: Taille du plomb fendu
      description: Code de taille alphanumérique normalisé (p. ex., SSG, AAA, BB,
        1) utilisé par les fabricants et les pêcheurs pour classer les plombs fendus.
        Complète les mesures de poids exactes.
    spoiler_adjustability:
      name: Réglage de l’aileron
      description: Précise si l’angle ou la hauteur de l’aileron est réglable.
    spoke_accessory_function:
      name: Fonction de l’accessoire de rayon
      description: Classe l’accessoire selon sa fonction principale sur la roue, par
        exemple décorative, réfléchissante ou lumineuse.
    spoke_butting_profile:
      name: Profil d’amincissement du rayon
      description: Décrit la variation du diamètre du rayon sur sa longueur (constant,
        simple, double, triple ou quadruple amincissement), qui détermine le poids
        et la résistance.
    spoke_gauge:
      name: Calibre du rayon
      description: Précise le calibre des rayons, c’est-à-dire l’épaisseur de fil,
        avec lesquels l’écrou de rayon est compatible.
    spoke_interface_type:
      name: Type d'interface à rayons
      description: Précise le type de tête de rayon pour lequel le moyeu est conçu
        (coudée en J, droite, en T).
    spoke_shape:
      name: Forme du rayon
      description: Décrit la section extérieure du fil du rayon, qui détermine l’aérodynamisme
        et l’aspect.
    spool_form_factor:
      name: Format de la bobine
      description: Forme du corps de la bobine et mode de maintien du fil (p. ex.,
        bobine à joues ou cône).
    spoon_style:
      name: Type de cuiller
      description: Distingue le sous-type fonctionnel ou le style de la cuiller, par
        exemple la cuiller de lancer, la cuiller flutter ou la cuiller de pêche à
        la traîne.
    sports_bra_padding_type:
      name: Type de rembourrage de la brassière de sport
      description: Précise le type de rembourrage présent dans la brassière de sport.
    sports_cap_style:
      name: Type de casquette de sport
      description: Désigne la construction ou le style général de la casquette (p.
        ex., casquette de baseball, snapback), indépendamment du marquage d’équipe.
    sports_governing_body_certification:
      name: Certification d’une instance sportive
      description: Présente les certifications ou homologations officielles délivrées
        par des instances sportives reconnues, qui confirment la conformité du produit
        aux normes de compétition.
    sports_surface_compatibility:
      name: Compatibilité avec les revêtements sportifs
      description: Répertorie les types de terrains ou de surfaces sur lesquels la
        peinture peut être appliquée en toute sécurité.
    sports_toy_set_contents:
      name: Contenu de l’ensemble de jouets de sport
      description: Présente les éléments inclus dans l’ensemble de jouets de sport
        (p. ex., balle, batte, filet, cibles).
    spray_string_cleanup_method:
      name: Méthode de nettoyage de la bombe à serpentins
      description: Méthode recommandée pour retirer les résidus après utilisation.
    spray_string_finish_effect:
      name: Finition ou effet de la bombe à serpentins
      description: Effet visuel obtenu après pulvérisation, notamment la brillance,
        les reflets et les effets spéciaux.
    spray_string_formulation_type:
      name: Type de formulation de la bombe à serpentins
      description: Comportement du produit pendant et après la pulvérisation (p. ex.,
        lavable ou à effet permanent).
    spray_string_recommended_surface:
      name: Surface recommandée pour la bombe à serpentins
      description: Types de surfaces sur lesquels la bombe à serpentins est destinée
        à être utilisée et dont elle devrait pouvoir être nettoyée.
    spray_string_scent:
      name: Parfum de la bombe à serpentins
      description: Parfum ou profil olfactif de la bombe à serpentins, le cas échéant.
    spray_string_suitable_age_group:
      name: Groupe d’âge recommandé pour la bombe à serpentins
      description: Âge minimal ou groupe d’âge recommandé pour utiliser la bombe à
        serpentins en toute sécurité.
    spread_consistency:
      name: Consistance de la préparation
      description: Décrit la texture ou la consistance de la préparation à tremper
        ou à tartiner, afin d’indiquer la sensation en bouche et l’usage attendu (p.
        ex., lisse, avec morceaux, fouettée).
    spread_variety:
      name: Type de préparation à tartiner
      description: Distingue les types de préparations aux fruits à tartiner (p. ex.,
        confiture, gelée, marmelade, crème de fruits), afin que les acheteurs différencient
        les modes de préparation et les textures.
    spreader_bar_type:
      name: Type de barre d'écartement
      description: Indique le type de barre d’écartement ou de système de crochets
        fourni avec le harnais ou compatible avec celui-ci.
    sprint_canoe_class:
      name: Classe de canoë de sprint
      description: Précise la désignation officielle de la classe de course du canoë
        de sprint.
    sprout_presentation:
      name: Présentation des pousses
      description: Distingue le mode de présentation du produit (p. ex., pousses fraîches,
        micropousses, pot de pousses vivantes, poudre).
    squash_and_gourd_variety:
      name: Variété de courge ou de calebasse
      description: Désigne le cultivar ou la variété commerciale de la courge ou de
        la calebasse, afin que les acheteurs trouvent rapidement le type recherché.
    stability_class:
      name: Classe de stabilité
      description: Catégorie générale de stabilité établie d’après les indices de
        vol ou les caractéristiques mises en avant par le fabricant.
    stabilizer_thread_size:
      name: Taille du filetage du stabilisateur
      description: Spécification du filetage utilisé pour fixer un stabilisateur ou
        un accessoire à un arc ou à une arbalète.
    stabilizer_type:
      name: Type de stabilisateur
      description: Désigne le style ou la catégorie de positionnement du stabilisateur
        de l’arc ou de l’arbalète.
    stages_supported:
      name: Étages compatibles
      description: Indique le nombre d’étages avec lesquels la fusée ou le kit est
        conçu pour voler.
    stain_remover_format:
      name: Format du détachant
      description: Distingue le format du produit utilisé pour traiter les taches
        sur les véhicules (p. ex., pulvérisateur, aérosol, mousse, gel, poudre, lingettes,
        stylo ou marqueur).
    stake_shape:
      name: Forme du piquet
      description: Définit la section ou le type de conception du piquet de tente,
        qui détermine sa tenue dans différents types de sols.
    stamp_block_features:
      name: Caractéristiques du bloc pour tampons
      description: Présente les caractéristiques fonctionnelles du bloc pour tampons,
        comme les grilles de mesure, les poignées ou les surfaces antidérapantes.
    stamp_block_type:
      name: Type de bloc pour tampons
      description: Décrit la construction ou le style du bloc utilisé pour monter
        les tampons avant l’estampage (p. ex., bloc en acrylique transparent, bloc
        monté sur bois ou bloc de positionnement).
    stamp_set_pieces_included:
      name: Pièces du set de tampons incluses
      description: Indique les composants inclus dans l’ensemble de tampons et d’encreurs
        (p. ex., tampons, encreurs, marqueurs).
    stand_padding_material:
      name: Matériau de rembourrage pour le socle
      description: Matière utilisée sur les points de contact pour protéger la finition
        de l’instrument (p. ex., mousse, caoutchouc, silicone).
    staple_fiber_animal_fiber_type:
      name: Type de fibre animale discontinue
      description: Type spécifique de fibre d'origine animale lorsque le type de source
        de fibre discontinue est « Animal ».
    staple_fiber_crimp_level:
      name: Degré de frisure de la fibre discontinue
      description: Degré de frisure ou d’ondulation naturelle de la fibre.
    staple_fiber_preparation_type:
      name: Type de préparation de la fibre discontinue
      description: État de préparation ou de traitement de la fibre au moment de la
        vente, notamment son alignement et sa présentation, qui détermine fortement
        la méthode de filage, la facilité d’étirage et le résultat final.
    staple_fiber_source_type:
      name: Type d’origine de la fibre discontinue
      description: Catégorie générale d’origine de la fibre.
    starch_processing_type:
      name: Type de transformation de l’amidon
      description: Indique si l’amidon est natif ou s’il a été modifié par un procédé
        physique ou chimique (p. ex., instantané, prégélatinisé) pour obtenir des
        propriétés fonctionnelles particulières, comme un épaississement plus rapide
        ou une meilleure tolérance à la température.
    starch_source:
      name: Source de l’amidon
      description: Précise la source botanique dont provient l’amidon de cuisine ou
        l’épaississant (p. ex., maïs, pomme de terre, tapioca). Cette source constitue
        le principal critère de différenciation des amidons de cuisine et détermine
        directement leur compatibilité avec les recettes, les considérations liées
        aux allergènes et les critères de recherche des consommateurs.
    starfruit_variety:
      name: Variété de carambole
      description: Correspond au cultivar ou à la variété de carambole concernés (p.
        ex., Arkin, Fwang Tung).
    starter_drive_type:
      name: Type d'entraînement du démarreur
      description: Type de mécanisme d’entraînement ou d’engagement du démarreur utilisé
        pour engrener le pignon avec la couronne dentée.
    starter_pistol_action_type:
      name: Type de mécanisme du pistolet de départ
      description: Désigne le mécanisme de mise à feu du pistolet de départ (p. ex.,
        simple action, double action, semi-automatique).
    starter_pistol_caliber:
      name: Calibre du pistolet de départ
      description: Correspond au calibre des munitions à blanc ou des cartouches pour
        lesquelles le pistolet de départ est chambré.
    starter_terminal_type:
      name: Type de borne de démarrage
      description: Désigne le type de borne ou de connecteur utilisé pour les raccordements
        électriques du démarreur ou du solénoïde de démarreur (p. ex., goujon, cosse
        plate, connecteur enfichable).
    starting_block_anchoring_method:
      name: Mode d’ancrage des blocs de départ
      description: Décrit le mode de fixation des blocs à la piste (p. ex., pointes,
        ventouses, patins en caoutchouc).
    steerer_tube_design:
      name: Conception du pivot de fourche
      description: Décrit la conception structurelle du pivot de fourche, par exemple
        droit, conique ou fileté, qui détermine la compatibilité avec le jeu de direction
        et le cadre.
    steering_cable_end_fitting_type:
      name: Type d’embout du câble de direction
      description: Désigne le type de terminaison ou de fixation aux extrémités du
        câble de direction d’une embarcation, côté poste de barre et côté moteur ou
        barre franche, afin d’assurer la compatibilité avec le poste de commande et
        les points de raccordement du moteur. Utilisez la désignation normalisée ou
        celle du fabricant, le cas échéant.
    steering_column_adjustability_features:
      name: Fonctions de réglage de la colonne de direction
      description: Indique les fonctions de réglage intégrées à la colonne de direction.
    steering_column_ignition_provision:
      name: Prédisposition d’allumage de la colonne de direction
      description: Indique si la colonne de direction est conçue pour recevoir un
        barillet ou un contacteur d’allumage, ainsi qu’un antivol de direction, le
        cas échéant.
    steering_column_shaft_end_interface_type:
      name: Type d’interface à l’extrémité de l’arbre de la colonne de direction
      description: Désigne le type d’interface situé à l’extrémité de l’arbre de la
        colonne de direction (p. ex., cannelée, double D, clavetée).
    steering_column_shift_type:
      name: Type de commande de vitesses sur la colonne de direction
      description: Indique si la colonne de direction comporte une commande de vitesses
        montée sur colonne, ainsi que le type de transmission associé.
    steering_component_drive_type:
      name: Type d’entraînement ou d’assistance de direction
      description: Décrit le mécanisme d’entraînement ou d’assistance applicable aux
        composants de direction, en particulier aux pompes et aux systèmes de direction
        assistée électrique.
    steering_position:
      name: Position de conduite
      description: Indique si le véhicule utilitaire est à conduite à gauche ou à
        conduite à droite.
    steering_pump_pulley_type:
      name: Type de poulie de la pompe de direction
      description: Correspond au type d’entraînement ou d’interface de la poulie utilisée
        avec la pompe de direction.
    steering_rack_finish_coating:
      name: Finition ou revêtement de la crémaillère de direction
      description: Désigne la finition extérieure ou le revêtement anticorrosion de
        la crémaillère de direction.
    steering_rack_position:
      name: Position de la crémaillère de direction
      description: Indique l’emplacement de montage ou d’utilisation de la crémaillère
        dans le système de direction du véhicule.
    steering_wheel_cover_installation_type:
      name: Type d’installation du couvre-volant
      description: Mode d’installation ou de fixation du couvre-volant sur le volant.
    steering_wheel_grip_material:
      name: Matériau de la zone de préhension du volant
      description: Désigne la matière de la partie du volant en contact avec les mains,
        qui peut différer de celle du noyau ou des branches.
    steering_wheel_mounting_pattern:
      name: Configuration de fixation du volant
      description: Désigne la configuration des boulons ou des trous de montage utilisée
        pour fixer le volant à un moyeu ou à un adaptateur (p. ex., 3 boulons, 5 boulons).
    steering_wheel_rim_material_grip_surface:
      name: Matériau de la couronne du volant (surface de préhension)
      description: Désigne la matière principale du revêtement de la couronne ou de
        la surface de préhension du volant, distincte de la matière de construction
        générale.
    stem_material:
      name: Matériau du tuyau
      description: Correspond à la matière utilisée pour le tuyau ou l’embout de la
        pipe (p. ex., acrylique, ébonite, lucite).
    stencil_machine_consumable_type:
      name: Type de consommable de la machine à pochoirs
      description: Désigne les consommables nécessaires au fonctionnement de la machine,
        le cas échéant.
    step_surface_texture:
      name: Texture de la surface des marches
      description: Décrit la conception ou la matière de la surface de marche prévue
        pour améliorer l’adhérence et le confort lorsqu’elle est mouillée.
    stepper_motion_type:
      name: Type de mouvement du stepper
      description: Définit le principal mouvement de marche proposé par l’appareil.
    stick_bow_profile:
      name: Profil de courbure du bâton
      description: Décrit le profil de courbure, ou type de courbure, du manche de
        la crosse de hockey sur gazon, un critère déterminant pour le contrôle de
        la balle, l’efficacité du drag-flick et le style de jeu.
    stick_construction:
      name: Construction à lattes
      description: Décrit le type de construction de la crosse de hockey, par exemple
        en composite monobloc, en composite deux pièces ou en bois.
    stick_curvature_type:
      name: Type de courbure du bâton
      description: Décrit le profil de courbure du bâton de lancer, qui détermine
        la distance et la précision du lancer.
    stick_head_shape:
      name: Forme de la tête du bâton
      description: Définit la forme de la tête de crosse, qui détermine le contrôle
        de la balle, le style de frappe et le jeu rapproché.
    stick_size_compatibility:
      name: Compatibilité des tailles de bâtons
      description: Désigne le groupe de tailles de crosses de hockey avec lequel le
        produit est compatible (p. ex., jeune, junior, intermédiaire, senior, gardien,
        universel).
    sticker_decal_features:
      name: Caractéristiques des autocollants et décalcomanies
      description: Présente les caractéristiques d’application et de performance propres
        aux autocollants et aux décalcomanies (p. ex., sans bulles, repositionnables).
    sticker_finish:
      name: Finition autocollante
      description: Décrit la finition de surface ou l’effet visuel des autocollants.
    sticker_format:
      name: Format des autocollants
      description: Désigne le format de vente des autocollants décoratifs (p. ex.,
        feuille, rouleau, autocollant individuel, carnet).
    sticker_material_type:
      name: Type de matériau du support de l’autocollant
      description: Désigne le support ou la matière principale de l’autocollant décoratif,
        à l’exclusion des ornements.
    stilt_foot_attachment_type:
      name: Type de fixation du pied
      description: Décrit le mode de fixation du pied de l’utilisateur sur l’échasse
        (p. ex., sangle à boucle, bande autoagrippante, laçage).
    stirrup_style:
      name: Type d’étrier
      description: Classe les étriers selon leur style de conception ou leur discipline
        d’usage, en tenant compte des variations liées à la sécurité, à la discipline
        pratiquée et à la construction.
    stirrup_tread_material:
      name: Matériau du plancher d’étrier
      description: Désigne la matière utilisée pour le plancher ou la surface d’appui
        de l’étrier, qui détermine l’adhérence, le confort et l’usure.
    stitch_marker_and_counter_style:
      name: Type de marqueur de mailles ou de compteur
      description: Désigne le style ou le format du marqueur de mailles, du compteur
        de mailles ou du compte-rangs (p. ex., marqueur verrouillable, anneau marqueur
        ouvert, compteur en anneau, compteur numérique).
    stitch_types:
      name: Types de points
      description: Types de points fonctionnels ou décoratifs que la machine peut
        réaliser.
    stitching_method:
      name: Mode de couture
      description: Indique comment les panneaux du ballon sont assemblés.
    stitching_state:
      name: État de confection
      description: Indique si les pièces du vêtement sont fournies non cousues, partiellement
        cousues, cousues ou prêtes à porter.
    stock_car_race_series:
      name: Série de course de stock-car
      description: Désigne l’organisme d’homologation, la série de course ou la classe
        pour laquelle le stock-car est conçu.
    stone_adhesion:
      name: Adhérence du noyau
      description: Distingue les pêches ou nectarines à noyau libre, adhérent ou semi-libre.
    stone_creation_method:
      name: Méthode de fabrication de la pierre
      description: Indique si la pierre est naturelle, créée en laboratoire, d’imitation
        ou recyclée.
    stone_cut_grade:
      name: Qualité de la taille de la pierre
      description: Correspond à l’évaluation globale de la qualité de la taille de
        la pierre.
    stone_cut_style:
      name: Style « pierre taillée »
      description: Style de taille ou de facettage de la pierre en verre (p. ex.,
        facettée ou cabochon).
    stone_fruit_cultivar:
      name: Cultivar de fruit à noyau
      description: Désigne le cultivar ou la variété de pêche ou de nectarine concernés.
    stone_fruit_variety:
      name: Variété de fruit à noyau
      description: Distingue le sous-type au sein de la catégorie (p. ex., pêche,
        nectarine, pêche plate).
    stone_setting_type:
      name: Type de sertissage de la pierre
      description: Décrit le mode de fixation de la pierre dans la pièce (serti clos,
        serti à griffes, pavé, etc.).
    stone_transparency:
      name: Transparence de la pierre
      description: Transparence ou opacité de la pierre en verre.
    storage_case_type:
      name: Type d’étui de rangement
      description: Indique le type de contenant fourni avec l’ensemble pour le rangement
        et le transport (p. ex., boîte, étui, sac).
    storage_compartment_type:
      name: Type de compartiment de rangement
      description: Désigne le type de compartiment de rangement prévu dans la bouée
        de nage pour les effets personnels.
    storage_media_and_transfer_methods_supported:
      name: Supports de stockage et modes de transfert compatibles
      description: Supports ou modes de connexion compatibles pour importer ou exporter
        des échantillons, ainsi que pour enregistrer ou charger des projets.
    storage_requirements:
      name: Conditions de conservation
      description: Indique les conditions dans lesquelles le produit doit être conservé
        avant ou après ouverture pour préserver sa qualité et sa sécurité.
    stove_jack_compatibility:
      name: Compatibilité avec un passage pour tuyau de poêle
      description: Indique si la tente comporte une ouverture résistante au feu pour
        un tuyau de poêle.
    straight_pin_application:
      name: Usage des épingles droites
      description: Désigne l’usage prévu des épingles droites.
    straight_pin_finish:
      name: Finition de l’épingle droite
      description: Décrit la finition de surface ou le revêtement de l’épingle (p.
        ex., nickelée), qui détermine la résistance à la corrosion et la glisse.
    straight_pin_head_material:
      name: Matériau de la tête de l’épingle droite
      description: Désigne la matière de la tête de l’épingle, le cas échéant, par
        exemple en plastique ou en verre.
    straight_pin_head_shape:
      name: Forme de la tête de l’épingle droite
      description: Décrit la forme ou le style de la tête de l’épingle, pour faciliter
        l’utilisation et la visibilité.
    strand_configuration:
      name: Configuration des brins
      description: Indique le nombre de rangs ou de brins distincts qui composent
        la chaîne de portefeuille (simple, double, triple).
    strand_material:
      name: Matériau des brins
      description: Désigne la matière utilisée pour chaque brin ou ruban.
    strap_attachment_hardware:
      name: Accessoires de fixation pour sangles
      description: Décrit le type ou la conception de la pièce de fixation utilisée
        pour attacher la sangle à l’instrument ou au point d’appui.
    strap_configuration:
      name: Configuration de la sangle
      description: Indique le nombre de points de fixation de la sangle au casque
        (p. ex., 2 points, 4 points), un critère essentiel pour l’ajustement, la sécurité
        et les exigences des ligues.
    strap_functionality:
      name: Fonction de la sangle
      description: Indique l’usage principal prévu ou le type de conception de la
        sangle du tapis de yoga.
    strap_padding:
      name: Rembourrage de la sangle
      description: Indique le niveau de rembourrage intégré à la sangle pour améliorer
        le confort et répartir le poids.
    strap_side:
      name: Côté de la sangle
      description: Indique si la sangle est prévue pour la fixation gauche ou droite,
        ou si elle est vendue par paire.
    strap_width:
      name: Largeur de la sangle
      description: Indique la largeur relative des bretelles (fines, moyennes ou larges),
        afin d’aider les acheteurs à choisir la couvrance ou le maintien recherchés.
    strength_classification:
      name: Classification selon la résistance
      description: Libellé commercial de résistance couramment utilisé par les marques
        (p. ex., Léger, Fort, Très fort).
    strength_grade:
      name: Classe de résistance
      description: Décrit la force de maintien prévue de la fermeture autoagrippante
        et le niveau de sollicitation auquel elle est destinée.
    stretch_level:
      name: Degré d’extensibilité
      description: Précise l’ampleur de l’étirement du textile à l’usage.
    stretch_type:
      name: Type d’extensibilité
      description: Indique si le tissu présente une extensibilité mécanique ou élastique,
        ainsi que le ou les sens d’étirement.
    stretcher_bar_material:
      name: Matériau des barres de châssis
      description: Matière utilisée pour les barres de châssis ou le châssis (p. ex.,
        pin, sapin, peuplier, bouleau, MDF ou bois reconstitué).
    strike_shield_shape:
      name: Forme du bouclier de frappe
      description: Décrit la forme générale de la surface de frappe du bouclier.
    string_core_shape:
      name: Forme de l’âme de la corde
      description: Décrit la forme de l’âme des cordes filées, qui détermine le toucher
        et la stabilité.
    string_coverage:
      name: Cordes concernées
      description: Indique les cordes sur lesquelles le capodastre partiel est conçu
        pour agir, selon leur nombre ou un jeu courant.
    string_end_type:
      name: Type d’extrémité de la corde
      description: Décrit le type d’extrémité de la corde au niveau du chevalet ou
        du cordier, afin d’assurer la compatibilité, notamment avec les instruments
        acoustiques, électriques et certaines basses.
    string_set_type:
      name: Type de chaîne
      description: Indique si le produit est un jeu complet ou des cordes de remplacement
        vendues à l’unité.
    strung_status:
      name: État de cordage
      description: Indique si la tête de crosse est livrée précordée avec une poche
        ou vendue non cordée.
    strut_placement:
      name: Emplacement des entretoises
      description: Précise la position d’installation prévue de la jambe de force
        sur le véhicule, à l’avant ou à l’arrière, à gauche ou à droite.
    stud_attachment_type:
      name: Type de fixation par goujon
      description: Décrit la fixation ou la configuration des crampons sur la semelle
        extérieure, qui déterminent l’adhérence, l’entretien et la conformité aux
        règlements des ligues.
    stud_configuration:
      name: Disposition des goujons
      description: Définit la forme et la disposition des crampons sur la semelle
        extérieure, qui déterminent l’adhérence et les performances sur différentes
        surfaces.
    stud_material:
      name: Matériau des goujons
      description: Désigne la matière principale des crampons, dont dépendent la durabilité,
        le poids et la conformité aux règles de sécurité.
    stuffed_animal_features:
      name: Caractéristiques de la peluche
      description: Présente les caractéristiques de jeu et de confort intégrées à
        la peluche.
    stump_base_type:
      name: Type de base du piquet
      description: Définit le type de base ou de système de montage du piquet de cricket
        (p. ex., pointe, retour à ressort, caoutchouc lesté).
    stump_mechanism:
      name: Mécanisme de souche
      description: Précise le mécanisme de retour ou de montage des piquets de cricket
        (p. ex., retour à ressort, fixe).
    stump_size:
      name: Taille du piquet
      description: Libellé de taille utilisé pour les piquets de cricket, qui indique
        généralement la hauteur et l’âge des joueurs auxquels ils conviennent.
    subwoofer_installation_type:
      name: Type d’installation du caisson de basses
      description: Mode d’installation prévu du caisson de basses dans le système
        audio d’un véhicule.
    sugar_cane_variety:
      name: Variété de canne à sucre
      description: Désigne le cultivar ou la variété commerciale de canne à sucre,
        qui peut influer sur la couleur, la sucrosité et la teneur en fibres.
    sugar_content_level:
      name: Teneur en sucre
      description: Classe le concentré de boisson selon sa teneur globale en sucre
        ou sa formulation, afin que les acheteurs trouvent rapidement les produits
        classiques, réduits en sucre ou sans sucre.
    sugar_refinement_level:
      name: Degré de raffinage du sucre
      description: Indique le degré ou le type de raffinage, selon la couleur, la
        teneur en mélasse ou le niveau de transformation.
    sugar_source:
      name: Source de sucre
      description: Désigne l’origine botanique ou la matière première dont provient
        le sucre.
    suit_fit:
      name: Coupe du costume
      description: Coupe générale du costume, plus ou moins ajustée au corps.
    suit_pieces:
      name: Pièces d'un ensemble
      description: Indique le nombre de vêtements coordonnés inclus dans l’ensemble
        de costume (p. ex., 2 pièces, 3 pièces, 4 pièces).
    suitable_for_anchoring_use:
      name: Usage d’ancrage compatible
      description: Indique l’usage d’ancrage prévu pour la ligne ou le cordage.
    suitable_for_craft_type:
      name: Convient pour les activités manuelles
      description: Utilisation principale des tiges de blocage pour les travaux d’aiguille.
    suitable_for_paint_type:
      name: Convient pour ce type de peinture
      description: Indique les types de peinture avec lesquels la toile peut être
        utilisée sans risque.
    suitable_for_swim_stroke:
      name: Style de nage adapté
      description: Indique les styles de nage pour lesquels la plaquette de natation
        est conçue ou optimisée.
    suitable_mounting_surface_material:
      name: Matériau de la surface de pose compatible
      description: Précise la surface de pose sur laquelle l’adhésif doit tenir ou
        le matériau auquel il doit adhérer.
    suitable_play_location:
      name: Un endroit adapté pour jouer
      description: Environnements de jeu auxquels le moulin à sable et à eau est principalement
        destiné.
    suitable_riding_conditions:
      name: Conditions de conduite favorables
      description: Indique les conditions d’utilisation auxquelles le lubrifiant ou
        le nettoyant pour vélo est adapté (p. ex., temps sec, temps humide ou conditions
        hivernales).
    suitable_snow_conditions:
      name: Conditions de neige compatibles
      description: Indique les principales conditions de neige pour lesquelles le
        fart d’accroche est formulé.
    suitable_surface_type:
      name: Type de surface adapté
      description: Précise les surfaces de marche auxquelles le dispositif d’adhérence
        est destiné.
    suitable_table_size:
      name: Taille de table compatible
      description: Indique les longueurs de table de billard américain ou de snooker
        adaptées à l’éclairage fourni par la lampe.
    sun_protection_rating_upf:
      name: Indice de protection solaire (UPF)
      description: Correspond au niveau de protection solaire UPF certifié du vêtement.
    sun_shade_attachment_method:
      name: Méthode de fixation d'un pare-soleil
      description: Mode de fixation du pare-soleil sur la vitre ou le pare-brise.
    sun_shade_style:
      name: Format de pare-soleil
      description: Format ou conception du pare-soleil, selon son mode de déploiement
        et de rangement.
    sunchoke_variety:
      name: Variété de topinambour
      description: Désigne le cultivar ou la variété de topinambour, aussi connu sous
        le nom d’artichaut de Jérusalem, afin d’informer précisément les jardiniers,
        les chefs et les acheteurs avertis.
    sunflower_oil_variety:
      name: Variété d'huile de tournesol
      description: Classe l’huile de tournesol selon son profil en acides gras ou
        son cultivar (p. ex., riche en acide oléique, à teneur moyenne en acide oléique,
        riche en acide linoléique).
    sunflower_variety:
      name: Variété de tournesol
      description: Cultivar ou variété de tournesol couramment commercialisé pour
        les fleurs coupées.
    support_brace_features:
      name: Caractéristiques de l’attelle
      description: Répertorie les caractéristiques fonctionnelles notables de l’attelle
        de poignet, comme le tissu respirant, l’éclisse amovible ou la plaque métallique
        réglable.
    support_leg_count:
      name: Nombre de pieds du support
      description: Nombre de pieds reposant au sol lorsque le bâton de tir est utilisé
        (p. ex., monopode, bipied, trépied).
    support_padding:
      name: Rembourrage du support
      description: Indique si la sangle ou le support comporte un rembourrage aux
        points de contact avec le cou, l’épaule ou le pouce.
    support_structure_type:
      name: Type de structure de support
      description: Décrit la structure qui permet de maintenir le pare-vent à la verticale.
    supported_bowling_delivery_types:
      name: Types de lancers pris en charge
      description: Indique les variantes de lancer au cricket que la machine peut
        reproduire, comme l’inswing, l’outswing et les effets.
    supported_dive_modes:
      name: Modes de plongée pris en charge
      description: Indique les modes de fonctionnement proposés par l’ordinateur de
        plongée, comme Air, Nitrox ou Gauge.
    supported_equipment_type:
      name: Type d’équipement pris en charge
      description: Désigne les équipements de sports d’hiver que le support de rangement
        peut accueillir (p. ex., skis, snowboards ou bâtons de ski).
    supported_spin_types:
      name: Types d’effets pris en charge
      description: Définit les effets que le lanceur peut donner au ballon.
    supported_spool_bobbin_types:
      name: Bobines et canettes prises en charge
      description: Définit les formats de bobines et de canettes acceptés par l’enrouleur
        électrique.
    surf_wax_temperature_rating:
      name: Plage de température de la cire de surf
      description: Correspond à la plage de température de l’eau pour laquelle la
        cire est formulée, afin de garantir une adhérence optimale sous différents
        climats.
    surface_coating_or_finish:
      name: Revêtement ou finition de surface
      description: Présente le traitement de surface appliqué à la pince, qu’il vise
        à la protéger ou à en améliorer les performances.
    surface_coating_or_wrap:
      name: Revêtement ou gainage de surface
      description: Traitement extérieur destiné à améliorer la prise en main et la
        maîtrise du bâton central, et parfois des baguettes.
    surface_finish:
      name: Finition de la surface
      description: Décrit le toucher ou la texture de la surface de la balle, qui
        déterminent l’adhérence et les mouvements en jonglage de contact.
    surface_finish_prep:
      name: Finition ou préparation de la surface
      description: État de la surface de friction au moment de la vente (p. ex., remise
        en état, usinée ou brute de fonderie).
    surface_types_included:
      name: Types de supports inclus
      description: Indique les supports inclus dans le kit pour le dessin ou la peinture,
        le cas échéant, par exemple une toile, un bloc de papier, des panneaux de
        bois ou aucun.
    surfboard_construction:
      name: Fabrication de planches de surf
      description: Précise le principal mode de fabrication ou de stratification de
        la planche de surf.
    surfboard_tail_shape:
      name: Forme de l’arrière de la planche de surf
      description: Décrit la forme de l’arrière de la planche, qui influe sur la maniabilité
        et l’accroche.
    suspension_bushing_type:
      name: Type de silentbloc de suspension
      description: Précise le type de silentbloc de suspension selon sa fonction ou
        son mode de montage.
    suspension_configuration:
      name: Configuration de la suspension
      description: Indique si le tricycle est équipé d’une suspension et précise son
        emplacement.
    suspension_material:
      name: Matériau des éléments de suspension
      description: Précise le matériau des chaînes, des cordes ou des câbles qui servent
        à suspendre la balançoire.
    suspension_trainer_accessories_included:
      name: Accessoires inclus avec le système d’entraînement en suspension
      description: Énumère les accessoires supplémentaires fournis avec le kit d’entraînement
        (p. ex., fixation de porte, sangle d’extension ou sac de rangement), afin
        d’aider les acheteurs à comprendre le contenu de la boîte et à comparer la
        valeur des lots.
    suspension_trainer_anchor_type:
      name: Type d’ancrage du système d’entraînement en suspension
      description: Définit le mode de fixation ou le point d’ancrage prévu pour les
        sangles (p. ex., porte, plafond ou arbre), afin d’indiquer où elles peuvent
        être utilisées.
    suspension_type:
      name: Suspension type
      description: Indique si la fourche est rigide ou dotée d’un système de suspension
        à air, à ressort, hybride ou à élastomère, afin d’aider les cyclistes à choisir
        une fourche adaptée à leur pratique.
    sustain_pedal_form_factor:
      name: Format de la pédale de sustain
      description: Décrit le format de la pédale de sustain, qui détermine les sensations
        et l’usage prévu (p. ex., pédale de type piano ou commutateur au pied compact).
    sustain_pedal_switch_type:
      name: Type de commutateur de la pédale de sustain
      description: Indique si la pédale envoie un signal momentané, avec maintien
        du sustain pendant l’appui, ou un signal à verrouillage de type bascule.
    sustainability_certification:
      name: Certification de durabilité
      description: Certification environnementale ou d’approvisionnement responsable
        relative au bois.
    swab_intended_bassoon_section:
      name: Partie du basson à nettoyer avec l’écouvillon
      description: Indique la partie du basson que l’écouvillon est conçu pour nettoyer
        (les différentes perces ou pièces nécessitent des formes et des tailles d’écouvillons
        différentes).
    swab_style:
      name: Type d’écouvillon
      description: Décrit la forme de l’écouvillon utilisé pour traverser les différentes
        parties du saxophone ou les atteindre.
    swab_weight_material:
      name: Matériau du poids de l’écouvillon
      description: Matériau du poids ou du guide de traction, le cas échéant, qui
        peut augmenter le risque de rayure et conditionner la durabilité.
    swab_weight_style:
      name: Poids du tampon
      description: Précise le mode de lestage de l’écouvillon qui lui permet de traverser
        la perce du basson.
    sway_bar_adjustability:
      name: Réglage de la barre antiroulis
      description: Indique si la rigidité de la barre antiroulis est réglable et,
        le cas échéant, de quelle manière (généralement au moyen de plusieurs trous
        de fixation pour les biellettes d’extrémité).
    sway_bar_coating:
      name: Revêtement de la barre antiroulis
      description: Traitement de surface ou revêtement appliqué à la barre antiroulis
        pour la protéger contre la corrosion et améliorer son aspect.
    sway_bar_fitment_front_rear_kit:
      name: Configuration de la barre antiroulis (avant/arrière/kit)
      description: Indique si la barre antiroulis est destinée à l’essieu avant, à
        l’essieu arrière ou vendue sous forme de kit avant/arrière.
    sweatshirt_pocket_type:
      name: Type de poche du sweat-shirt
      description: Décrit le type de poches présentes sur le sweat-shirt.
    sweet_potato_variety:
      name: Variété de patate douce
      description: Indique le cultivar précis ou la variété commerciale de la patate
        douce.
    sweet_spot_position:
      name: Position de la zone de frappe optimale
      description: Indique l’emplacement de la zone de frappe optimale sur la palette
        de la batte, qui conditionne le style de jeu et l’adaptation aux conditions
        du terrain.
    sweetener_presence:
      name: Présence d’édulcorants
      description: Indique si le beurre de fruits à coque contient des édulcorants
        ajoutés et dans quelle proportion.
    sweetening_type:
      name: Type d'édulcorant
      description: Décrit le mode d’édulcoration du produit ou son degré de sucrosité.
    swim_armband_construction_type:
      name: Type de construction des brassards de natation
      description: Définit la structure ou le mécanisme de flottaison des brassards
        (p. ex., gonflables, en mousse pleine, hybrides).
    swim_belt_purpose:
      name: Usage de la ceinture de natation
      description: Classe la ceinture de natation selon son usage (p. ex., aide à
        la flottaison, aquajogging, entraînement en résistance, attache fixe, fixation
        de parachute de résistance, lestage, sécurité en eau peu profonde).
    swim_board_features:
      name: Caractéristiques de la planche de natation
      description: Présente les caractéristiques ou améliorations particulières de
        la planche de natation qui facilitent son utilisation ou renforcent la sécurité.
    swim_bottom_length:
      name: Longueur du bas de maillot de bain
      description: Classe les boxers de bain selon la longueur de jambe qu’ils couvrent
        (p. ex., short court ou longueur genou).
    swim_buoy_features:
      name: Caractéristiques de la bouée de nage
      description: Recense les caractéristiques ou éléments supplémentaires qui améliorent
        la visibilité, la sécurité ou l’utilité de la bouée de nage.
    swim_cap_style:
      name: Type de bonnet de bain
      description: Définit la construction ou le type de bonnet de bain (p. ex., pour
        cheveux longs, de compétition à forme dôme, à bulles ou turban).
    swim_diaper_feature:
      name: Caractéristiques des couches de bain
      description: Indique si le slip de bain intègre une couche antifuite, nécessite
        une couche de bain séparée ou s’utilise sans couche de bain.
    swim_trainer_features:
      name: Caractéristiques du matériel d’apprentissage de la natation
      description: Présente les caractéristiques fonctionnelles ou de confort supplémentaires
        du matériel d’apprentissage de la natation.
    swim_trainer_type:
      name: Type d'entraîneur de natation
      description: Définit la structure ou le format du matériel d’apprentissage de
        la natation afin de faciliter le filtrage selon le type de conception et l’objectif
        d’entraînement.
    swim_training_focus:
      name: Points forts de l'entraînement de natation
      description: Indique l’objectif d’entraînement principal visé par la plaquette
        de natation (p. ex., technique, force, travail musculaire ciblé).
    swim_weight_style:
      name: Style « poids de natation »
      description: Classe les poids de natation selon leur forme, afin d’aider les
        acheteurs à distinguer les principaux types de produits au sein d’une même
        catégorie.
    swimbait_buoyancy:
      name: Flottabilité du swimbait
      description: Indique le comportement du swimbait dans la colonne d’eau (p. ex.,
        flottant, en suspension, coulant), afin d’aider les pêcheurs à choisir le
        leurre adapté à la profondeur ciblée et à leur style d’animation.
    swimbait_style:
      name: Type de swimbait
      description: Classe le swimbait selon sa construction ou son type de nage, par
        exemple un leurre à queue en forme de pagaie ou un leurre planant.
    swimwear_pieces_included:
      name: Maillots de bain inclus
      description: Énumère les différentes pièces vestimentaires fournies dans l’ensemble
        de burkini, afin que les acheteurs sachent exactement ce qu’il contient.
    swimwear_set_pieces_included:
      name: Ensemble de maillots de bain inclus
      description: Énumère les pièces vestimentaires fournies dans l’ensemble de burkini,
        afin que les acheteurs sachent exactement ce qu’ils recevront (p. ex., haut,
        legging, hijab ou bonnet).
    swing_attachment_connection_type:
      name: Type d’attache ou de liaison de la balançoire
      description: Type de liaison utilisé pour suspendre la balançoire à son support
        (p. ex., corde, chaîne, sangles).
    swing_trainer_type:
      name: Type d'entraîneur de swing
      description: Classe l’appareil d’entraînement au swing selon son type ou son
        mécanisme, afin d’aider les acheteurs à trouver rapidement les dispositifs
        adaptés à leurs objectifs d’entraînement.
    swing_training_objective:
      name: Objectif de l'entraînement au swing
      description: Classe l’appareil d’entraînement au swing selon l’axe d’entraînement
        principal, le mécanisme ou l’objectif visé (p. ex., tempo, vitesse, prise).
    switch_electrical_positions:
      name: Positions électriques de l’interrupteur
      description: Précise le nombre de positions électriques de l’interrupteur et
        leur fonctionnement (p. ex., trois positions, contact momentané).
    swivel_type:
      name: Type d’émerillon
      description: Précise le type d’émerillon utilisé pour limiter le vrillage du
        leash.
    sword_scabbard_material:
      name: Matériau du fourreau d’épée
      description: Indique le matériau principal du fourreau fourni (le cas échéant).
    synthesizer_form_factor:
      name: Format du synthétiseur
      description: Décrit le format du synthétiseur et de son interface de jeu.r.
    synthetic_feather_style:
      name: Type de plume synthétique
      description: Type ou découpe de la plume synthétique, selon l’effet recherché
        et la technique de loisirs créatifs utilisée.
    synthetic_formulation_type:
      name: Type de formulation synthétique
      description: Précise le type d’huile de base ou de formulation synthétique (p.
        ex., PAO, ester, groupe III hydrocraqué).
    syrup_base_ingredient:
      name: Ingrédient de base pour sirop
      description: Indique la principale source végétale ou sucrière dont le sirop
        ou le nectar est issu (p. ex., érable, agave, sucre de canne).
    syrup_variety:
      name: Variété de sirop
      description: Définit le type ou la catégorie générale de sirop selon sa formulation
        ou son usage traditionnel (p. ex., érable, pour café, fruit, usage médicinal).
    t_shirt_fit:
      name: Coupe du t-shirt
      description: Décrit la coupe générale du t-shirt.
    tabla_included_components:
      name: Composants inclus avec le tabla
      description: Indique les principaux éléments inclus avec le tabla vendu, qu’il
        s’agisse d’un tambour seul ou d’un ensemble, de housses ou d’étuis, d’un marteau
        d’accordage, etc.
    tabla_set_pieces_included:
      name: Comprend un ensemble de tabla
      description: Indique les composants inclus dans l’ensemble de tabla (p. ex.,
        dayan, bayan, anneaux, housses, outils d’accordage, sac).
    tabla_tonal_pitch_range_bayan:
      name: Registre tonal du tabla (bayan)
      description: Décrit le type de registre habituel des tambours bayan (graves),
        selon leur taille et leur construction.
    table_base_material:
      name: Table base material
      description: Indique le matériau principal du piètement ou du socle de la table,
        distinct des pieds ou du plateau, afin de faciliter le filtrage par matière.
    table_base_type:
      name: Type de piètement de table
      description: Indique la structure qui soutient le plateau de table (p. ex.,
        socle central, tréteau, piètement en X).
    table_coverage_position:
      name: Position de la table couverte
      description: 'Indique la ou les positions de la table de ping-pong auxquelles
        la housse est adaptée : pliée, déployée pour le jeu, ou les deux.'
    table_hockey_part_type:
      name: Type de pièce pour hockey sur table
      description: Indique le type de composant précis utilisé dans les systèmes de
        hockey sur table, de hockey à air, de hockey à tiges ou de hockey sous dôme.
    table_leg_design:
      name: Forme des pieds de table
      description: Indique le style de structure ou la géométrie des pieds, afin d’aider
        les acheteurs à trouver l’esthétique et le support recherchés.
    table_size:
      name: Taille de la table
      description: Format commercial de la table de billard, exprimé en pieds, afin
        d’aider les acheteurs à choisir rapidement parmi les formats courants, comme
        les tables de bar de 7 pieds ou les tables de tournoi de 9 pieds.
    table_size_category:
      name: Catégorie de taille de table
      description: Classe la table de baby-foot selon son encombrement global, afin
        d’aider les acheteurs à choisir un modèle adapté à l’espace disponible sans
        calculer les dimensions.
    table_tennis_certification:
      name: Certification de tennis de table
      description: Énumère les normes officielles ou les homologations d’instances
        sportives auxquelles le produit est conforme (p. ex., ITTF, classes EN 14468-2).
    tabletop_tilt_function:
      name: Fonction d’inclinaison du plateau
      description: Indique si le plateau peut s’incliner, basculer ou pivoter selon
        différents angles.
    tackle_components_included:
      name: Pièces de montage incluses
      description: Énumère les composants de matériel de pêche inclus dans le kit,
        afin que les acheteurs sachent exactement ce qui est fourni.
    talking_drum_accessories_included:
      name: Accessoires inclus avec le tambour parlant
      description: Énumère les accessoires inclus avec le tambour parlant dans l’emballage.
    talking_drum_cord_material:
      name: Matériau des cordes du tambour parlant
      description: Matériau utilisé pour les cordes de tension qui relient les peaux
        du tambour.
    talking_drum_tuning_mechanism:
      name: Mécanisme d’accordage du tambour parlant
      description: Indique comment la hauteur du tambour est modifiée ou comment la
        tension est appliquée pendant le jeu ou lors du réglage.
    tam_tam_construction_style:
      name: Type de construction du tam-tam
      description: Type de construction ou de martelage du tam-tam.
    tam_tam_items_included:
      name: Éléments inclus avec le tam-tam
      description: Accessoires inclus avec le tam-tam (p. ex., mailloche, pied, housse).
    tamarillo_variety:
      name: Variété de tamarillo
      description: Indique le cultivar précis ou la variante de couleur du tamarillo.
    tamarind_variety:
      name: Variété de tamarin
      description: Précise la variété botanique ou commerciale du tamarin, qui peut
        modifier son goût, sa texture et son usage culinaire.
    tambourine_frame_style:
      name: Type de cadre du tambourin
      description: Décrit la configuration du cadre tenu à la main pour tenir le tambourin
        et en jouer.
    tambourine_head_material:
      name: Matériau de la peau du tambourin
      description: Précise le matériau de la peau de jeu (membrane) des tambourins
        à peau.
    tambourine_jingle_configuration:
      name: Configuration des cymbalettes du tambourin
      description: Indique la disposition ou la construction des cymbalettes sur le
        tambourin.
    tambourine_jingle_material:
      name: Matériau des cymbalettes du tambourin
      description: Précise le matériau des cymbalettes du tambourin (disques métalliques),
        qui détermine le timbre et la durabilité.
    tambourine_mounting_type:
      name: Mode de fixation du tambourin
      description: Indique comment le tambourin se tient ou se fixe pendant le jeu.
    tambourine_tuning_mechanism:
      name: Mécanisme d’accordage du tambourin
      description: Précise le système d’accordage utilisé sur les tambourins accordables
        tenus à la main, le cas échéant.
    tank_model_scale:
      name: Échelle du modèle réduit de char
      description: Précise le rapport d’échelle du modèle réduit de char (p. ex.,
        1:35, 1:72).
    tank_top_back_style:
      name: Forme du dos du débardeur
      description: Précise la forme ou la coupe du dos du débardeur, qui conditionne
        le maintien, la liberté de mouvement et l’esthétique.
    tape_application_area:
      name: Zone d'application du ruban
      description: Précise la partie de l’équipement ou du joueur sur laquelle le
        ruban doit être appliqué, afin d’aider les acheteurs à choisir le type adapté.
    tape_finish:
      name: Finition du ruban
      description: Finition de surface ou aspect visuel du ruban (brillance ou texture).
    tape_purpose:
      name: Utilisation du ruban adhésif
      description: Précise l’usage fonctionnel principal du ruban pour l’entretien
        ou la personnalisation de la raquette.
    tape_type:
      name: Type de ruban
      description: Classe le ruban de hockey selon son usage ou sa construction, par
        exemple ruban en tissu, ruban en polyéthylène transparent, ruban d’adhérence,
        ruban cohésif extensible, ruban pour protège-tibia ou ruban chamoisé.
    tapenade_main_ingredients:
      name: Ingrédients principaux de la tapenade
      description: Précise l’ingrédient principal qui caractérise la tapenade (p.
        ex., olive, tomate, aubergine, poivron), afin d’aider les acheteurs qui ont
        des préférences ou des restrictions liées aux ingrédients.
    tapestry_loom_loom_format:
      name: Format du métier à tapisserie
      description: Forme générale du métier à tapisserie à main et type de support
        associé.
    tapestry_loom_shedding_method:
      name: Méthode d’ouverture de foule du métier à tapisserie
      description: Indique comment le métier forme la foule, c’est-à-dire sépare les
        fils de chaîne pour permettre le passage de la trame.
    tapestry_loom_tensioning_system:
      name: Système de tension du métier à tapisserie
      description: Méthode utilisée pour tendre et maintenir la chaîne sur le métier
        à tapisserie.
    tar_head_material:
      name: Matériau de la tête de goudron
      description: Indique le matériau de la peau du tar (membrane), qui conditionne
        fortement le toucher, la durabilité et le timbre.
    tar_playing_style:
      name: Style de jeu du tar
      description: Précise la position ou la technique de jeu principale prévue pour
        le tar.
    tar_tuning_system:
      name: Système d’accordage du tar
      description: Précise le mode d’accordage du tar, c’est-à-dire la manière dont
        la tension de la peau est réglée.
    target_components:
      name: Composants ciblés
      description: Précise les composants du circuit de carburant ou d’admission d’air
        que le produit est destiné à nettoyer.
    target_relative_humidity_rh:
      name: Humidité relative cible (HR)
      description: Niveau d’humidité relative que le produit est conçu pour maintenir
        dans l’instrument ou son étui.
    target_resetting_mechanism:
      name: Mécanisme de réarmement de la cible
      description: Décrit si la cible reprend sa position initiale après l’impact
        et, le cas échéant, de quelle manière.
    target_trainer_type:
      name: Type d'entraîneur cible
      description: Classe la cible d’entraînement pour racquetball ou squash selon
        son type ou son format général.
    targeted_contaminants:
      name: Contaminants ciblés
      description: Types de microbes ou de parasites ciblés par la certification d’élimination
        du produit.
    targeted_muscle_group:
      name: Groupe musculaire ciblé
      description: Principal groupe musculaire travaillé ou soutenu par l’accessoire.
    taro_variety:
      name: Variété de taro
      description: Précise le cultivar, l’espèce ou le nom commercial de la racine
        de taro proposée (p. ex., taro violet, eddoe, dasheen).
    tassel_trim_header_type:
      name: Type de bande de fixation de la frange à pompons
      description: Précise la structure de la bande supérieure qui sert à fixer la
        frange à pompons à une surface (p. ex., ruban, galon, cordon).
    tassel_trim_use_case:
      name: Usage de la frange à pompons
      description: Emplacement d’application principal prévu pour la frange à pompons.
    taste_profile:
      name: Profil gustatif
      description: Décrit les caractéristiques gustatives dominantes de la variété
        de pomme.
    tea_variety:
      name: Variété de thé
      description: Classe le thé ou l’infusion selon son type ou son style précis
        (p. ex., noir, vert, matcha, rooibos), afin que les acheteurs puissent filtrer
        les variétés qu’ils préfèrent.
    teasing_tool_style:
      name: Type d’outil d’ouverture des fibres
      description: Forme de l’outil d’ouverture des fibres utilisé pour ouvrir et
        mélanger les fibres (p. ex., brosse, râteau, peigne).
    tee_base_style:
      name: Type de base du tee
      description: Indique la structure de la base du tee de rugby qui soutient le
        ballon.
    temper_hardness:
      name: Trempe/dureté
      description: Indique le degré de souplesse ou de dureté du fil, c’est-à-dire
        sa capacité à conserver sa forme.
    temperature_control_type:
      name: Type de régulation de la température
      description: Indique comment la température de l’outil est contrôlée ou réglée.
    tenkara_action_ratio:
      name: Ratio de flexion tenkara
      description: Indique le ratio de flexion traditionnel du tenkara, qui décrit
        le point de flexion de la canne sous charge (p. ex., 6:4).
    tennis_ball_court_surface:
      name: Surface de court pour balle de tennis
      description: Précise les surfaces de court adaptées à la balle afin d’assurer
        des performances et une durabilité optimales.
    tennis_ball_pressure_type:
      name: Type de pression de la balle de tennis
      description: Indique la pression interne ou la construction de la balle (pressurisée,
        sans pression, à faible compression, en mousse), dont dépendent le rebond
        et la durabilité.
    tennis_racket_grip_size:
      name: Taille du grip de la raquette de tennis
      description: Précise la circonférence normalisée du manche de la raquette (L0
        à L5 ou équivalents en pouces), afin d’assurer une prise en main correcte
        et confortable.
    tenor_flutophone_fingering_system:
      name: Système de doigté du flûtophone ténor
      description: Précise le système de doigté utilisé par le flûtophone ténor (convention
        pédagogique ou de notation).
    tenor_recorder_joint_type:
      name: Type d’assemblage de la flûte à bec ténor
      description: Précise le type d’assemblage ou de raccordement entre les sections
        de la flûte à bec ténor.
    tenor_saxophone_key_system:
      name: Système de clés du saxophone ténor
      description: Précise le système ou le standard de clétage utilisé (souvent désigné,
        pour les saxophones, comme système français ou Boehm).
    tenor_saxophone_pad_material:
      name: Matériau des tampons du saxophone ténor
      description: Indique le matériau principal utilisé pour les coussinets de l'instrument.
    tenor_trombone_slide_type:
      name: Type de coulisse du trombone ténor
      description: Type de coulisse utilisé sur le trombone ténor (p. ex., standard
        ou droite, à détente ou à flux axial).
    tenor_trombone_valve_configuration:
      name: Configuration de la valve du trombone ténor
      description: Indique si le trombone ténor comporte une valve ou un rotor, ainsi
        que la configuration utilisée.
    tension_control_type:
      name: Type de contrôle de tension
      description: Indique si la navette exerce une résistance ou une tension réglable
        sur la bobine ou la canette pendant le déroulement du fil et, le cas échéant,
        de quelle manière.
    tension_mechanism:
      name: Mécanisme de tension
      description: Mode de tension utilisé pour contrôler le déroulement de la trame
        depuis la bobine ou la canette pendant le tissage.
    tension_pitch_modulation_system:
      name: Système de modulation de la tension et de la hauteur
      description: Indique comment le tambour parlant modifie la hauteur ou la tension
        pendant le jeu, par exemple par pression sur les cordes de tension.
    tension_system:
      name: Système de tension
      description: Système d’entraînement ou de tension du rouet auquel le kit d’épinglier
        est destiné.
    tent_fabric_material:
      name: Tissu de tente
      description: Indique le tissu principal utilisé pour le double-toit ou le corps
        de tente, qui détermine le poids, la respirabilité et la résistance aux intempéries.
    tent_season_rating:
      name: Indice de saisonnalité de la tente
      description: Classe la tente selon le nombre de saisons ou les conditions météorologiques
        pour lesquelles elle est conçue (p. ex., 3 saisons, 4 saisons, expédition).
    tent_setup_type:
      name: Type de montage de la tente
      description: Indique le mode de montage de la tente, par exemple autoportante,
        semi-autoportante, non autoportante, à armature pneumatique ou à déploiement
        instantané.
    tent_style:
      name: Type de tente
      description: Décrit la structure de la tente (p. ex., dôme, tunnel, canadienne).
    test_result_output_method:
      name: Mode de restitution des résultats du test
      description: Précise la manière dont le testeur de batterie de véhicule affiche
        ou fournit les résultats du test à l’utilisateur (p. ex., voyant, écran, impression,
        application ou rapport logiciel).
    tether_strap_system:
      name: Système d’attache ou de sangles
      description: Type de système d’attache ou de sangles utilisé pour relier le
        support cervical au casque ou au harnais, le cas échéant.
    text_color:
      name: Couleur du texte
      description: Couleur du texte imprimé ou brodé sur l’étiquette, distincte de
        la couleur de fond de l’étiquette.
    textile_craft_machine_operation_type:
      name: Mode d’actionnement de la machine textile artisanale
      description: Indique comment la machine est actionnée (à la main, au pied ou
        par moteur électrique).
    textile_finish_treatment:
      name: Finition / traitement du textile
      description: Précise les traitements de surface appliqués au textile.
    texture_inclusions:
      name: Inclusions de texture
      description: Précise les éléments de texture ajoutés, par exemple la pulpe d’aloès,
        les graines de basilic, la nata de coco, les perles de boba éclatantes ou
        les morceaux de fruits.
    therapeutic_technology:
      name: Technologie thérapeutique
      description: Précise toute fonction thérapeutique intégrée, par exemple un gel
        rafraîchissant, des bandes magnétiques ou une céramique infrarouge.
    thermal_set_components:
      name: Composants thermodurcissables
      description: Indique si le produit comprend uniquement le bas, uniquement le
        haut ou les deux pièces dans un ensemble.
    thermal_weight:
      name: Niveau de chaleur
      description: Indique le niveau de chaleur du tissu de la cagoule.
    thermostat_type:
      name: Type de thermostat
      description: Type de conception ou mode de commande du thermostat du système
        de refroidissement d’un véhicule automobile.
    thimble_guide_size:
      name: Taille du guide de dé
      description: Taille du guide de dé, exprimée selon l’ajustement ou la partie
        couverte, généralement sous forme de tailles petit, moyen ou grand plutôt
        qu’en dimensions mesurées.
    thread_connection_size:
      name: Taille du filetage de raccordement
      description: Définit la spécification du filetage qui relie les tiges, les pointes
        et les adaptateurs (p. ex., 6 mm, 5/16"-24).
    thread_construction:
      name: Construction du fil
      description: Indique comment le fil est fabriqué ou traité (p. ex., fil à broder
        divisible ou fil collé).
    thread_cord_type_beading_pattern:
      name: Type de fil ou de cordon (modèle de perlage)
      description: Type de fil ou de cordon recommandé pour réaliser le modèle.
    thread_cutter_form_factor:
      name: Format du coupe-fil
      description: Indique le format du coupe-fil, par exemple un modèle manuel, pendentif
        ou en anneau.
    thread_cutter_mechanism:
      name: Mécanisme du coupe-fil
      description: Décrit l’action ou le mécanisme de coupe du coupe-fil.
    thread_cutter_safety_features:
      name: Dispositifs de sécurité des tarauds
      description: Indique les dispositifs de sécurité intégrés qui réduisent le risque
        de coupures accidentelles ou protègent les lames pendant le rangement.
    thread_cutter_usage_application:
      name: Usage du coupe-fil
      description: Indique l’usage principal du coupe-fil dans les loisirs créatifs.
    thread_finish_treatment:
      name: Finition / traitement du filetage
      description: Finition ou traitement de surface appliqué au fil, qui modifie
        sa manipulation et ses performances (p. ex., ciré, collé, mercerisé).
    thread_material:
      name: Matière du fil
      description: Principale fibre ou matière du fil ou du fil à broder, distincte
        du tissu.
    thread_material_fiber:
      name: Matière du fil (fibre)
      description: Précise la principale fibre ou matière du fil lui-même, distincte
        du tissu.
    thread_package_format:
      name: Format de conditionnement du fil
      description: Format de conditionnement du fil à coudre (p. ex., bobine, cône,
        canette).
    thread_rack_compatible_spool_type:
      name: Type de bobine compatible avec le porte-bobines
      description: Type de conditionnement du fil que le porte-bobines est conçu pour
        recevoir (bobines, cônes, etc.).
    thread_standard_size:
      name: Taille standard du filetage
      description: Indique la norme de grosseur ou de titrage du fil utilisée sur
        l’étiquette du produit (p. ex., wt, Tex, denier).
    thread_type:
      name: Type de fil
      description: Précise la construction ou le type de fil pour point de croix ou
        de fil à broder.
    thread_weight_system:
      name: Système de grosseur du fil
      description: Norme utilisée pour exprimer l’épaisseur ou la grosseur du fil.
    thread_yarn_guide_mounting_attachment_style:
      name: Mode de fixation ou de port du guide-fil
      description: Décrit la manière dont le guide-fil se porte ou se fixe pendant
        l’utilisation.
    thread_yarn_guide_tension_control:
      name: Réglage de la tension du fil dans le guide-fil
      description: Indique si le guide-fil permet de régler la tension ou la résistance
        appliquée au fil ou à la laine et, le cas échéant, de quelle manière.
    thread_yarn_organizer_features:
      name: Caractéristiques de l’organisateur de fils
      description: Présente les caractéristiques d’organisation et de transport propres
        au rangement du fil et de la laine.
    threader_intended_use:
      name: Utilisation prévue du passe-fil
      description: Indique le principal contexte de loisirs créatifs auquel l’enfile-aiguille
        tenu à la main est destiné.
    threading_system:
      name: Système d’enfilage
      description: Indique la méthode et les aides utilisées pour enfiler la surjeteuse
        (p. ex., enfilage manuel, par codes couleur, guidé ou pneumatique).
    threading_type:
      name: Type de filetage
      description: Indique si le bijou utilise un filetage interne, un filetage externe,
        un système sans filetage ou si le filetage ne s’applique pas.
    throttle_type_scooter_conversion:
      name: Type d’accélérateur (conversion de scooter)
      description: Précise le type d’interface d’accélérateur inclus avec le kit de
        conversion ou requis par celui-ci.
    throw_rope_end_attachment:
      name: Attache d’extrémité de la corde de sauvetage
      description: Élément d’attache ou boucle fourni à l’extrémité utile de la corde
        de sauvetage.
    throw_rope_storage_packaging_type:
      name: Type de rangement ou de conditionnement de la corde de sauvetage
      description: Indique comment la corde de sauvetage est rangée ou déployée (p.
        ex., sac ou dévidoir).
    throw_rope_visibility_features:
      name: Caractéristiques de visibilité de la corde de sauvetage
      description: Caractéristiques de visibilité et d’identification destinées à
        rendre la corde plus visible dans l’eau ou dans une faible luminosité.
    thrower_operation_type:
      name: Type de fonctionnement du lanceur
      description: Classe le lanceur selon son mécanisme ou son mode de fonctionnement,
        afin de filtrer rapidement les modèles manuels et automatiques.
    thumb_design:
      name: Conception du pouce
      description: Décrit l’intégration du pouce dans le gant, qui conditionne la
        sécurité et la prise.
    tiara_design:
      name: Forme de la tiare
      description: Précise la structure générale ou la silhouette de la tiare.
    tie_down_points_straps_included:
      name: Points d’arrimage ou sangles inclus
      description: Indique si le support comprend des points d’arrimage intégrés ou
        des sangles pour fixer la moto ou le scooter.
    tiling_format:
      name: Format de mosaïque
      description: Précise la disposition du PDF pour l’assemblage des pages imprimées.
    time_current_characteristic:
      name: Caractéristique temps-courant
      description: Indique le comportement temps-courant du fusible (p. ex., rapide
        ou temporisé), qui détermine son adéquation aux circuits soumis à des courants
        d’appel.
    timer_count_mode:
      name: Mode de comptage du minuteur
      description: Précise le mode de comptage du minuteur, par exemple le compte
        à rebours, le comptage progressif (chronomètre), les deux modes, ou le comptage
        par intervalles répétés.
    timer_display_type:
      name: Type d’affichage du minuteur
      description: Indique la manière dont le minuteur de jeu affiche le temps restant
        (p. ex., écran numérique, cadran analogique, sablier ou absence d’affichage
        visuel).
    timer_operating_modes:
      name: Modes de fonctionnement de la minuterie
      description: Comportements du minuteur pris en charge pour déclencher des effets.
    timing_belt_construction_material_rubber_compound:
      name: Matériau de la courroie de distribution (composé de caoutchouc)
      description: Principal composé de caoutchouc utilisé pour la courroie (p. ex.,
        HNBR), qui conditionne la résistance à la chaleur et à l’huile ainsi que la
        longévité.
    timing_belt_profile:
      name: Profil de courroie de distribution
      description: Profil ou forme standard des dents de la courroie de distribution
        (p. ex., trapézoïdal ou curviligne).
    timing_belt_reinforcement_cord_material:
      name: Matériau du câble de renfort de la courroie de distribution
      description: Précise le matériau du câble de renfort interne de la courroie
        de distribution (p. ex., fibre de verre, aramide), qui conditionne la résistance
        et l’étirement.
    timing_component_material:
      name: Matériau des composants de distribution
      description: Matériau principal du composant de distribution (composé de la
        courroie, métal de la chaîne ou de l’engrenage, matière du couvercle).
    tin_whistle_body_material:
      name: Matériau du corps de la flûte irlandaise
      description: Recense les matériaux courants du corps de la flûte irlandaise
        avec plus de précision que la liste générale des matériaux d’instruments,
        lorsque nécessaire.
    tin_whistle_bore_type:
      name: Type de perce de la flûte irlandaise
      description: Précise la conception de la perce de la flûte irlandaise.
    tin_whistle_included_accessories:
      name: Accessoires inclus avec la flûte irlandaise
      description: Accessoires inclus avec la flûte irlandaise (p. ex., étui, écouvillon).
    tip_finish_coating:
      name: Finition/revêtement de la pointe
      description: Précise le traitement de surface appliqué à l’extrémité active
        (p. ex., chromage, thermolaquage), qui influe sur la résistance à la corrosion
        et le risque de marquer la jante.
    tip_shape:
      name: Forme de la pointe
      description: Décrit la forme ou le caractère plus ou moins pointu de la pointe
        du médiator de guitare, qui conditionne l’articulation et les sensations de
        jeu.
    tippet_rating:
      name: Classement du bas de ligne
      description: Résistance maximale recommandée du bas de ligne, exprimée selon
        les désignations X utilisées pour la pêche à la mouche (p. ex., 4X).
    tire_changer_operation_type:
      name: Mode d’actionnement du démonte-pneu
      description: Précise le mode d’actionnement ou de fonctionnement du démonte-pneu
        (p. ex., manuel, pneumatique, hydraulique). Attribut distinct de l’attribut
        général « Source d’alimentation » ; à utiliser pour décrire le mode d’actionnement
        de la machine.
    tire_changer_type:
      name: Type de démonte-pneu
      description: Type de fonctionnement, conception générale ou niveau d’automatisation
        du démonte-pneu.
    tire_compound_type:
      name: Type de gomme
      description: Précise la classification du composé de caoutchouc utilisé dans
        les pneus (p. ex., tendre, pluie, slick), qui influe sur l’adhérence et la
        durabilité dans différentes conditions.
    tire_load_range:
      name: Plage de charge du pneu
      description: Indique la désignation de la plage de charge ou du nombre de plis
        du pneu, généralement utilisée pour les pneus LT et représentative de la charge
        admissible.
    tire_position:
      name: Position du pneu
      description: Position de montage recommandée sur le véhicule.
    tire_repair_kit_components:
      name: Composants d'un kit de réparation de pneus
      description: Précise les articles inclus dans le kit, afin que les clients puissent
        comparer le contenu des ensembles.
    tire_sidewall_type:
      name: Type de flanc du pneu
      description: Précise le style ou les caractéristiques de construction du flanc.
    tire_speed_rating:
      name: Indice de vitesse des pneus
      description: Lettre d’indice de vitesse du pneu (p. ex., H, V, W), indiquant
        la vitesse maximale soutenue.
    tire_spoon_type:
      name: Type de démonte-pneu cuillère
      description: Classe le démonte-pneu cuillère selon la forme de son extrémité
        et son usage.
    tire_system_compatibility:
      name: Compatibilité du montage de pneu
      description: Indique si le produit d’étanchéité est destiné aux montages sans
        chambre à air, aux pneus avec chambre à air ou aux deux.
    tire_temperature_rating_utqg:
      name: Indice de température du pneu (UTQG)
      description: Classe de résistance à la température UTQG pour les pneus automobiles
        (p. ex., A, B, C).
    tire_traction_rating_utqg:
      name: Indice d’adhérence du pneu (UTQG)
      description: Classe d’adhérence UTQG pour les performances de freinage sur chaussée
        mouillée.
    tire_tread_style:
      name: Motif de la bande de roulement
      description: Décrit le motif général de la bande de roulement du pneu tubulaire,
        adapté au terrain prévu et aux caractéristiques d’adhérence recherchées.
    tire_tube_type:
      name: Type de chambre à air du pneu
      description: Indique si le pneu est prévu pour un montage sans chambre à air
        ou avec chambre à air.
    title_status:
      name: Statut du titre
      description: Statut légal ou administratif du titre d’immatriculation du véhicule.
    tobacco_application:
      name: Usage du tabac
      description: Indique le mode de consommation ou le dispositif auquel le tabac
        en vrac est destiné.
    tobacco_cut_type:
      name: Type de coupe du tabac
      description: Précise la coupe ou le mode de préparation du tabac en vrac, qui
        modifie la vitesse de combustion, la méthode de bourrage et l’expérience de
        consommation.
    tobacco_strength:
      name: Force du tabac
      description: Indique l’intensité perçue du tabac et son effet nicotinique à
        la consommation, afin d’aider les acheteurs à choisir la force qui leur convient.
    toe_construction:
      name: Construction au niveau des orteils
      description: Précise la configuration de la zone des orteils des chaussons de
        combinaison, dont dépendent l’équilibre, les sensations sur la planche et
        la chaleur.
    toe_coverage:
      name: Couverture des orteils
      description: Indique la partie des orteils couverte par la chaussette.
    toe_pick_style:
      name: Type de pointe dentée
      description: Décrit la conception de la pointe dentée des lames de patins artistiques.
    toe_protection_type:
      name: Type de protection des orteils
      description: Indique si la zone des orteils est renforcée pour des raisons de
        sécurité et, le cas échéant, de quelle manière (p. ex., embout en acier, embout
        souple).
    toe_reinforcement_type:
      name: Type de renfort au niveau des orteils
      description: Décrit la construction de la zone des orteils, qui conditionne
        la durabilité et la compatibilité avec les chaussures.
    toe_stop_stem_thread_size:
      name: Taille du filetage de la tige de frein
      description: Précise la taille du filetage des tiges de frein afin d’assurer
        leur compatibilité avec la platine.
    tofu_preparation_style:
      name: Mode de préparation du tofu
      description: Classe le tofu selon son type ou sous-type traditionnel, au-delà
        de sa fermeté (p. ex., soyeux, en bloc, soufflé, en peau, en nœud, fermenté).
    tom_mount_adjustment_features:
      name: Réglages du support de tom
      description: Précise les réglages offerts par le support de tom pour positionner
        le tambour (p. ex., inclinaison, rotation, hauteur).
    tom_mount_components_included:
      name: Composants de fixation Tom inclus
      description: Précise les pièces incluses avec le support de tom (récepteur,
        bras, rotule, colliers de serrage, bagues mémoire, etc.).
    tom_mount_mounting_position:
      name: Position de fixation du support de tom
      description: Précise l’emplacement de fixation prévu pour le support de tom
        (p. ex., grosse caisse, pied de cymbale, rack).
    tonneau_cover_mounting_style:
      name: Type de fixation du couvre-benne
      description: Indique comment le couvre-caisse s’installe ou se fixe aux rails
        de la benne du camion.
    tool_case_form_factor:
      name: Format de la mallette à outils
      description: Indique le format de la mallette à outils, qui conditionne son
        transport et son rangement (p. ex., valise, coque rigide).
    tool_functions_included:
      name: Fonctions incluses
      description: Énumère les fonctions précises de réparation ou d’entretien qu’un
        outil multifonction ou un jeu d’outils permet d’effectuer.
    top_bunk_access_method:
      name: Mode d’accès au lit supérieur
      description: Indique comment les utilisateurs accèdent au lit supérieur, afin
        de tenir compte de la sécurité et de l’espace disponible.
    top_fit:
      name: Coupe du haut
      description: Précise la silhouette générale du haut ou la manière dont il tombe
        sur le corps (p. ex., ajusté ou surdimensionné).
    top_hat_style:
      name: Style de haut-de-forme
      description: Indique la variante de style précise du haut-de-forme.
    top_soundboard_material:
      name: Matériau de la table d’harmonie
      description: Précise le matériau de la table d’harmonie de la guitare, c’est-à-dire
        la principale plaque qui produit le son.
    topping_form:
      name: Forme de la garniture
      description: Définit la forme ou la consistance de la garniture de dessert,
        afin d’aider les acheteurs à trouver rapidement l’usage recherché.
    topping_type:
      name: Type de garniture
      description: Indique la principale garniture ou couche de finition appliquée
        sur le donut.
    tow_hook_type:
      name: Type de crochet de traction
      description: Indique si le kneeboard comprend un crochet de traction intégré
        et en précise le type de mécanisme.
    tow_point_configuration:
      name: Configuration du point d'attelage
      description: Précise la configuration des points de traction de la bouée tractée
        (un, deux ou plusieurs), selon les différentes positions d’utilisation.
    tow_strap_protective_features:
      name: Caractéristiques de protection de la sangle de remorquage
      description: Caractéristiques de construction notables intégrées à la sangle
        de remorquage pour la sécurité et la durabilité.
    tow_strap_type:
      name: Type de sangle de remorquage
      description: Indique la construction fonctionnelle de la sangle de remorquage,
        par exemple sangle statique ou sangle de récupération cinétique.
    towable_tube_style:
      name: Type de bouée tractée
      description: Indique la forme générale ou le format de la bouée tractée, qui
        détermine la position du pratiquant et les sensations de glisse.
    towed_water_sport_discipline:
      name: Discipline de sport nautique tracté
      description: Précise la principale activité nautique tractée à laquelle le gant
        est destiné.
    towel_features:
      name: Caractéristiques de la serviette
      description: Énumère les caractéristiques particulières ou les accessoires inclus
        avec la serviette.
    towel_style:
      name: Type de serviette
      description: Classe la serviette de golf selon sa conception fonctionnelle ou
        son format.
    toy_airplane_control_type:
      name: Type de commande de l’avion jouet
      description: Précise la manière dont l’utilisateur commande l’avion jouet.
    toy_airplane_features:
      name: Caractéristiques de l’avion jouet
      description: Présente les caractéristiques de jeu particulières de l’avion jouet.
    toy_airplane_flight_capability:
      name: Capacité de vol de l’avion jouet
      description: Indique si l’avion jouet est conçu pour voler ou planer réellement,
        ou s’il est principalement destiné au jeu au sol ou à l’exposition.
    toy_audio_features:
      name: Caractéristiques audio du jouet
      description: Énumère les capacités audio et les effets sonores intégrés au jouet.
    toy_boat_play_features:
      name: Caractéristiques de jeu du bateau jouet
      description: Présente les caractéristiques interactives particulières des bateaux
        jouets afin d’en faciliter la recherche et le filtrage.
    toy_boat_recommended_play_environment:
      name: Environnement de jeu recommandé pour le bateau jouet
      description: Précise l’environnement de jeu prévu pour le bateau jouet, afin
        de répondre aux attentes des acheteurs et aux considérations de sécurité (p.
        ex., baignoire ou eau libre).
    toy_bowling_equipment_included:
      name: Équipement inclus avec le jeu de quilles jouet
      description: Précise les éléments de bowling inclus dans le jeu de quilles jouet
        (p. ex., quilles, boule, piste ou tapis, sac de transport).
    toy_car_features:
      name: Caractéristiques de la voiture jouet
      description: Présente les caractéristiques de jeu intégrées à la voiture jouet,
        distinctes du mode de propulsion, par exemple les lumières, les sons ou les
        pièces ouvrantes.
    toy_drawing_tablet_accessories_included:
      name: Accessoires pour tablette graphique inclus
      description: Accessoires supplémentaires inclus en plus de la tablette elle-même
        (p. ex., stylet supplémentaire, tampons).
    toy_drawing_tablet_erase_method:
      name: Mode d’effacement de la tablette à dessin jouet
      description: Indique comment la surface de dessin est effacée.
    toy_drawing_tablet_screen_type:
      name: Type d’écran de la tablette à dessin jouet
      description: Type de surface de dessin ou d’affichage utilisée (p. ex., surface
        LCD ou magnétique).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Instrument d’écriture ou de dessin de la tablette à dessin jouet
      description: Principal outil utilisé pour dessiner sur la tablette (type de
        stylet).
    toy_figure_sound_feature:
      name: Fonction sonore de la figurine jouet
      description: Indique si la figurine animale émet des sons et de quel type (p.
        ex., rugissement, son réaliste d’animal).
    toy_game_features:
      name: Caractéristiques du jouet/jeu
      description: Présente les caractéristiques de jeu ou de construction particulières
        liées aux jouets de plage et de sable.
    toy_gift_basket_items_included:
      name: Contenu du panier cadeau de jouets
      description: Énumère les principaux types de jouets inclus dans le panier-cadeau,
        par exemple une peluche, un jeu de construction ou un casse-tête.
    toy_glider_launch_method:
      name: Méthode de lancement d'un planeur-jouet
      description: Précise la manière dont le planeur jouet est lancé, ce qui oriente
        le type de jeu et les attentes des acheteurs.
    toy_helicopter_control_type:
      name: Type de commande de l’hélicoptère jouet
      description: Indique comment l’hélicoptère jouet est commandé ou piloté, indépendamment
        de son mode de propulsion, par exemple au moyen d’une télécommande, d’une
        application ou sans commande (vol libre).
    toy_helicopter_features:
      name: Caractéristiques de l’hélicoptère jouet
      description: Principales caractéristiques fonctionnelles d’un hélicoptère jouet,
        notamment des modèles télécommandés, qui influent sur la facilité d’utilisation
        et l’intérêt ludique.
    toy_jacks_set_items_included:
      name: Éléments inclus dans le jeu d’osselets
      description: Précise les principaux éléments inclus dans le jeu d’osselets (p.
        ex., osselets, balle, sac).
    toy_keyboard_learning_mode:
      name: Mode d’apprentissage du clavier jouet
      description: Indique l’approche pédagogique prise en charge par le clavier jouet
        (p. ex., touches lumineuses, chansons à suivre, leçons guidées, apprentissage
        assisté par application).
    toy_keyboard_sound_theme:
      name: Thème sonore du clavier jouet
      description: Types de sons d’instruments ou de thèmes sonores intégrés proposés,
        au-delà du simple son de piano.
    toy_kitchen_appliances_included:
      name: Appareils de cuisine inclus dans la cuisine jouet
      description: Précise les appareils de cuisine représentés dans le jeu lorsque
        le produit est un appareil ou un ensemble centré sur ce type d’appareils.
    toy_kitchen_assembly_requirement:
      name: Assemblage requis pour la cuisine jouet
      description: Indique si un assemblage est nécessaire et en précise le niveau
        approximatif de complexité.
    toy_kitchen_interactive_features:
      name: Caractéristiques interactives de la cuisine jouet
      description: Présente les éléments interactifs courants des cuisines jouets
        et des accessoires connexes.
    toy_motorcycle_feature_set:
      name: Caractéristiques de la moto jouet
      description: Principales caractéristiques de jeu de la moto jouet (sélectionner
        toutes les réponses qui s’appliquent).
    toy_motorcycle_scale:
      name: Échelle de la moto jouet
      description: Rapport d’échelle des motos jouets ou de collection (p. ex., 1:12).
    toy_parachute_launch_method:
      name: Mode de lancement du parachute jouet
      description: Indique comment le jouet est prévu pour être lancé ou déployé en
        vol.
    toy_piano_and_keyboard_accessories_included:
      name: Accessoires inclus avec le piano ou le clavier jouet
      description: Accessoires inclus avec le piano jouet ou le clavier jouet.
    toy_playset_assembly_required:
      name: Assemblage requis pour l’ensemble de jeu
      description: Indique si un adulte doit assembler le produit avant le jeu, au-delà
        d’un simple emboîtement.
    toy_playset_items_included:
      name: Éléments du coffret de jeu inclus
      description: Énumère les principaux composants inclus dans l’ensemble de jeu,
        c’est-à-dire le contenu de la boîte.
    toy_safety_certification:
      name: Certification de sécurité des jouets
      description: Normes et marquages de sécurité et de conformité applicables aux
        jouets sur le marché de l’acheteur (p. ex., EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Caractéristiques du vaisseau spatial jouet
      description: Indique les caractéristiques interactives ou de jeu courantes intégrées
        au vaisseau spatial jouet.
    toy_spaceship_size_class:
      name: Classe de taille du vaisseau spatial jouet
      description: Indique une classe de taille générale pour le vaisseau spatial
        jouet, afin de faciliter le filtrage rapide, distincte des dimensions exactes
        (longueur, largeur et hauteur) et d’un rapport d’échelle numérique de modèle
        (p. ex., 1:72).
    toy_tableware_pieces_included:
      name: Vaisselle miniature incluse
      description: Précise les éléments de vaisselle jouet inclus (assiettes, tasses,
        couverts, pièces de service).
    toy_tool_electronic_features:
      name: Caractéristiques électroniques de l’outil jouet
      description: Décrit les fonctions interactives ou électroniques de l’outil jouet
        (lumières, sons, mouvement rotatif, etc.).
    toy_tool_set_components_included:
      name: Pièces comprises dans le coffret d'outils pour enfants
      description: Énumère les outils de jeu d’imitation précis inclus dans le produit,
        en particulier dans les jeux d’outils.
    toy_train_scale:
      name: Échelle des trains miniatures
      description: Précise l’échelle standard du train jouet ou du train miniature,
        ou le format du système de rails, afin d’assurer la compatibilité avec les
        trains et rails déjà possédés.
    toy_train_track_layout_type:
      name: Type de circuit de rails du train jouet
      description: Décrit la configuration ou la forme du circuit de rails inclus
        dans un ensemble de train ou un kit d’extension de rails.
    toy_weapon_gadget_features:
      name: Caractéristiques des armes et gadgets jouets
      description: Présente les caractéristiques interactives et fonctionnelles courantes
        propres aux armes jouets et aux gadgets d’espionnage.
    tpms_sensor_frequency_band:
      name: Bande de fréquence du capteur TPMS
      description: Bande de fréquence radio prise en charge par les accessoires liés
        au TPMS, le cas échéant.
    track_and_field_discipline:
      name: Discipline d’athlétisme
      description: Associe le produit à l’épreuve ou à la discipline d’athlétisme
        précise visée (p. ex., lancer du poids, saut à la perche, sprint).
    track_event_specialization:
      name: Spécialisation par épreuve d’athlétisme
      description: Indique le type d’épreuve pour lequel la chaussure à pointes est
        optimisée.
    track_field_event_suitability:
      name: Épreuves d’athlétisme visées
      description: Indique les épreuves d’athlétisme précises visées par l’aide à
        l’entraînement.
    track_set_special_features:
      name: Caractéristiques particulières du circuit
      description: Présente les caractéristiques de jeu particulières incluses avec
        le circuit, au-delà des rails et des voitures de base.
    track_surface_compatibility:
      name: Compatibilité avec le revêtement de la piste
      description: Indique les surfaces de course auxquelles le modèle à pointes ou
        la chaussure est destiné.
    tracking_aid_type:
      name: Type d’aide à la tenue de cap
      description: Indique si le kayak comprend des dispositifs qui améliorent la
        tenue de cap en ligne droite.
    traction_pattern_type:
      name: Type de motif d’adhérence
      description: Décrit le motif principal de rainures ou de reliefs de surface
        qui assure l’adhérence du pad.
    trading_card_league:
      name: Ligue des cartes à collectionner
      description: Associe la série de cartes ou le sujet représenté à la ligue sportive
        correspondante, le cas échéant.
    trailer_construction:
      name: Construction de la remorque
      description: Décrit le principal type de construction du châssis ou de la caisse
        de la remorque (p. ex., aluminium, acier ou construction mixte).
    trailer_coupler_size:
      name: Taille de la tête d’attelage de la remorque
      description: Précise la taille de boule d’attelage requise pour la tête d’attelage
        de la remorque.
    trailer_hitch_mounting_location_method:
      name: Emplacement ou méthode de fixation de l’attelage de remorque
      description: Précise l’emplacement et la méthode de fixation de l’attelage de
        remorque sur le véhicule (p. ex., récepteur arrière, récepteur avant, fixation
        au châssis, au pare-chocs ou à la benne).
    trailer_light_function:
      name: Fonction du feu de remorque
      description: Fonction ou position principale du feu de remorque.
    trailer_suspension_type:
      name: Type de suspension de la remorque
      description: Précise le type de système de suspension utilisé dans la remorque
        pour vélo, par exemple à ressort hélicoïdal ou à ressort à lames, afin d’améliorer
        le confort de roulement et la protection du chargement.
    trailer_wiring_circuit:
      name: Circuit du câblage de remorque
      description: Énumère les circuits ou signaux d’éclairage, de freinage et auxiliaires
        transmis par le câblage de remorque, c’est-à-dire les lignes d’alimentation,
        de masse et de signal présentes.
    trailer_wiring_connector_type:
      name: Type de connecteur du câblage de remorque
      description: Précise la norme de prise côté remorque ou côté véhicule utilisée
        pour les faisceaux et les adaptateurs de câblage de remorque.
    train_whistle_intended_use:
      name: Usage prévu du sifflet de train
      description: Contexte d’utilisation principal prévu pour le sifflet.
    train_whistle_sound_character:
      name: Caractère sonore du sifflet de train
      description: Décrit le timbre perçu du son du sifflet.
    trainer_mounting_type:
      name: Type de fixation du rouleau d'entraînement
      description: Décrit la manière dont le vélo se fixe au home trainer (p. ex.,
        sur roue ou à entraînement direct).
    training_dummy_shape:
      name: Forme du dummy d’entraînement
      description: Précise la forme générale ou la silhouette du dummy, dont dépendent
        la prise du chien et le réalisme de l’entraînement.
    training_focus:
      name: Axe d’entraînement
      description: Décrit l’axe principal travaillé par l’aide d’entraînement (p.
        ex., réflexes, jeu de jambes, coordination œil-main).
    training_focus_area:
      name: Compétence travaillée
      description: Précise la principale compétence au lacrosse que l’aide d’entraînement
        vise à développer.
    training_objective:
      name: Objectif d’entraînement
      description: Indique la principale compétence ou technique que le produit vise
        à améliorer.
    training_surface_suitability:
      name: Surfaces d’entraînement compatibles
      description: Indique les surfaces sur lesquelles le dispositif d’entraînement
        peut être utilisé.
    training_surface_usage:
      name: Usage de la surface d’entraînement
      description: Distingue les principales activités compatibles avec la surface
        d’entraînement, des panneaux de glace synthétique patinables aux tapis pour
        entraînement hors glace ou multisport.
    training_usage_type:
      name: Type d’utilisation pour l’apprentissage
      description: Indique la période ou le contexte d’utilisation principal des culottes
        d’apprentissage, par exemple le jour ou la nuit.
    trampoline_enclosure_type:
      name: Type d’enceinte de protection du trampoline
      description: Décrit la configuration de l’enceinte de protection du trampoline,
        notamment le mode et l’emplacement de fixation du filet.
    trampoline_safety_certifications:
      name: Certifications de sécurité pour les trampolines
      description: Indique les normes ou certifications de sécurité applicables aux
        trampolines auxquelles le produit déclare être conforme.
    transfer_application_method:
      name: Procédure de demande de transfert
      description: Décrit le mode d’application du transfert sur le tissu (p. ex.,
        au fer ou à la presse à chaud).
    transfer_method:
      name: Méthode de transfert
      description: Indique la méthode prévue pour transférer le motif sur le tissu.
    transfer_peel_temperature:
      name: Température de retrait du support
      description: Indique si la feuille de support doit être retirée chaude, tiède
        ou froide après le pressage.
    transmission_cooler_construction:
      name: Construction du refroidisseur de transmission
      description: Décrit le type de construction du faisceau du refroidisseur de
        transmission.
    transmission_fluid_specification:
      name: Spécification du liquide de transmission
      description: Norme constructeur ou spécification respectée par le liquide de
        transmission (p. ex., familles Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Matériau du silentbloc du support de transmission
      description: Précise le matériau de l’élastomère ou de l’isolateur utilisé dans
        le silentbloc du support, c’est-à-dire l’élément qui amortit les vibrations.
    transmission_mount_type:
      name: Type de support de transmission
      description: Décrit la construction du support de transmission (p. ex., hydraulique
        ou plein), afin d’aider à déterminer la compatibilité, les caractéristiques
        NVH et l’usage prévu.
    transparency_level:
      name: Niveau de transparence
      description: Décrit le degré de transparence des parois du bac, afin d’aider
        les acheteurs à choisir entre la visibilité du contenu et un rangement dissimulé.
    transport_case_type:
      name: Type de housse de transport
      description: Classe la solution de transport selon sa structure et sa rigidité,
        en fonction du niveau de protection et du mode de rangement.
    transposition_modes:
      name: Modes de transposition
      description: Indique les modes de transposition ou de diapason de concert pris
        en charge par l’accordeur (p. ex., diapason de concert et tonalités de transposition
        comme si bémol ou mi bémol).
    trap_design:
      name: Trap design
      description: Décrit la structure ou le mécanisme du piège, qui détermine son
        mode de mise en place ainsi que les espèces ou les environnements auxquels
        il convient le mieux.
    trap_spring_configuration:
      name: Configuration des ressorts du piège
      description: Indique le nombre ou la disposition des ressorts qui actionnent
        le piège et peuvent modifier sa puissance ainsi que sa conformité réglementaire.
    travel_bassinet_accessories_included:
      name: Accessoires inclus avec le berceau de voyage
      description: Énumère les articles supplémentaires fournis avec le berceau de
        voyage.
    travel_spinning_wheel_assembly_required:
      name: Assemblage requis du rouet de voyage
      description: Indique si le rouet nécessite un assemblage ou une mise en place
        au-delà du simple dépliage avant utilisation (p. ex., fixation de l’épinglier,
        réglage de la tension, installation des pédales).
    travel_spinning_wheel_portability_features:
      name: Caractéristiques de transport du rouet de voyage
      description: Éléments de conception favorisant le transport des rouets de voyage,
        par exemple une structure pliable et des accessoires de transport inclus.
    travel_trailer_appliances_fuel_type:
      name: Type d’alimentation des appareils de la caravane
      description: Type d’alimentation principal des appareils, du chauffage ou de
        la cuisson à bord, hors véhicule tracteur.
    travel_trailer_holding_tank_type:
      name: Type de réservoir de la caravane
      description: Indique les types de réservoirs présents dans la caravane (sélectionnez
        toutes les réponses qui s’appliquent).
    travel_trailer_power_hookup_shore_power:
      name: Branchement électrique de la caravane (alimentation externe)
      description: Norme ou normes de branchement électrique prises en charge pour
        l’alimentation externe.
    tread_pattern_type:
      name: Type de sculpture
      description: Classe le pneu selon la conception générale de sa bande de roulement,
        par exemple slick, semi-slick ou à crampons, dont dépendent l’adhérence, la
        résistance au roulement et les surfaces d’utilisation prévues.
    treadmill_key_type:
      name: Type de clé du tapis de course
      description: Décrit la forme de la clé de sécurité ou son mode de fonctionnement
        ou de connexion (p. ex., magnétique ronde, insert en plastique, à clipser).
    treadmill_part_type:
      name: Type de pièce pour tapis de course
      description: Indique le composant précis du tapis de course remplacé par le
        produit, afin d’aider les acheteurs à confirmer rapidement la compatibilité
        (p. ex., courroie ou moteur).
    treadmill_position:
      name: Position sur le tapis de course
      description: Indique la position d’installation de la pièce sur le tapis de
        course (à l’avant, à l’arrière, en haut, en bas ou au centre).
    triangle_striker_material:
      name: Matériau de la baguette de triangle
      description: Matériau de la baguette fournie.
    trigger_input_connector:
      name: Connecteur d’entrée de trigger
      description: Specifies the physical connector standard used for trigger inputs.
    trigger_input_connector_type:
      name: Type de connecteur d'entrée de déclenchement
      description: Précise le type de connecteur utilisé pour les entrées de trigger.
    trigger_input_zone_support:
      name: Prise en charge des zones de trigger
      description: Indique si les entrées de trigger prennent en charge les pads à
        une ou deux zones (p. ex., peau ou cercle) ainsi que les configurations multizones
        similaires.
    trim_application_method:
      name: Méthode d'application des moulures
      description: Indique le mode de fixation prévu du galon sur un ouvrage (p. ex.,
        à coudre, thermocollant, adhésif).
    trim_detail:
      name: Détail du galon
      description: Indique les bordures ou finitions décoratives visibles du vêtement
        (p. ex., galon à pampilles, frange, galon de dentelle).
    trim_elasticity:
      name: Élasticité du galon croquet
      description: Indique si le galon croquet est extensible pour une utilisation
        sur des tricots ou des vêtements de sport.
    trim_finish:
      name: Finition des moulures
      description: Traitement de surface appliqué au galon (p. ex., métallique, pailleté,
        réfléchissant).
    trim_tilt_type:
      name: Type de trim et d’inclinaison
      description: Indique si le moteur prend en charge le réglage du trim et de l’inclinaison,
        et selon quel mode.
    trolleybus_power_supply_type:
      name: Type d’alimentation du trolleybus
      description: Décrit le mode d’alimentation par lequel le trolleybus reçoit l’énergie
        de traction du réseau électrique.
    truck_bed_body_type:
      name: Type de benne ou de carrosserie du camion
      description: Configuration de la benne ou de la carrosserie située derrière
        la cabine.
    truck_bed_length_class:
      name: Classe de longueur de la benne du camion
      description: Indique la classe de longueur de benne avec laquelle le filet de
        chargement est compatible, généralement benne courte, standard ou longue.
    truck_mounting_hole_pattern:
      name: Schéma de perçage pour la fixation des trucks
      description: Précise la disposition des trous utilisée pour fixer les trucks
        au plateau (p. ex., Old school, New school, Universal).
    truck_mounting_style:
      name: Type de montage sur camion
      description: Mode de fixation des trucks au plateau (top mount, drop-through,
        etc.), dont dépendent la hauteur par rapport au sol et la stabilité.
    truck_profile:
      name: Profil du truck
      description: Indique la classe de hauteur du truck de skateboard par rapport
        au plateau, ce qui modifie le dégagement des roues et les sensations sur la
        planche.
    trumpet_bell_material:
      name: Matériau du pavillon de trompette
      description: Matériau utilisé pour le pavillon, parfois différent de celui du
        reste de l’instrument.
    trumpet_leadpipe_material:
      name: Matériau du tube d'embouchure de la trompette
      description: Matériau ou traitement utilisé pour la branche d’embouchure, c’est-à-dire
        le tube principal qui relie l’embouchure aux pistons.
    trundle_mechanism:
      name: Mécanisme du lit gigogne
      description: Décrit la manière dont le couchage secondaire se déploie à partir
        du cadre principal.
    trunk_part_type:
      name: Type de pièce de coffre
      description: Précise le composant de carrosserie lié au coffre proposé à la
        vente (p. ex., couvercle de coffre, charnière, loquet).
    tuba_leadpipe_material:
      name: Matériau de la branche d’embouchure du tuba
      description: Indique le matériau utilisé pour la branche d’embouchure du tuba.
    tube_base_type:
      name: Type à socle tubulaire
      description: Précise la famille de culot ou de support de la lampe, utilisée
        pour assurer la compatibilité mécanique et électrique (p. ex., octal, noval
        à 9 broches).
    tube_matching_grade:
      name: Niveau d’appairage des lampes
      description: Indique si les lampes sont testées ou appairées par jeu, ainsi
        que le type d’appairage fourni.
    tube_weight_category:
      name: Catégorie de poids des tubes
      description: Classe la chambre à air selon sa construction ou son poids (p.
        ex., ultralégère, standard, renforcée), afin de comparer rapidement la durabilité
        et les performances.
    tubeless_compatible:
      name: Compatibilité avec un montage sans chambre à air
      description: Indique si la roue est conçue pour être utilisée sans chambre à
        air avec des pneus tubeless.
    tubing_shape:
      name: Forme des tubes
      description: Précise la forme de la section transversale des tubes de support
        du pied.
    tubular_construction_type:
      name: Type de construction tubulaire
      description: Décrit le type de construction des boyaux de vélo, en distinguant
        les boyaux traditionnels collés des variantes plus récentes.
    tulip_type_flower_form:
      name: Type de tulipe (forme de la fleur)
      description: Précise le type horticole ou la forme de la fleur des tulipes du
        bouquet (p. ex., simple, double, perroquet).
    tuner_input_method:
      name: Mode d’entrée de l’accordeur
      description: Décrit la manière dont l’accordeur détecte la hauteur (microphone,
        capteur de vibration à pince, entrée par câble d’instrument, capteur de contact).
    tuning_mechanism:
      name: Mécanisme d’accordage
      description: Mode de tension et d’accordage des peaux de bongo.
    tuning_system:
      name: Système de réglage
      description: Mode d’accordage du tambour sur cadre, ou indication de sa capacité
        à être accordé.
    turn_signal_lens_color:
      name: Couleur du cabochon de clignotant
      description: Couleur du cabochon visible sur le boîtier de clignotant, et non
        de la lumière émise.
    turn_signal_lighting_style:
      name: Style d’éclairage du clignotant
      description: Style visuel ou animation de signalisation du clignotant.
    turnip_and_rutabaga_variety:
      name: Variété de navet ou de rutabaga
      description: Indique le cultivar ou la variété précise du navet ou du rutabaga.
    tweeter_crossover_type:
      name: Type de filtre du haut-parleur d’aigus
      description: Indique le type de filtre passe-haut ou de composant de protection
        inclus avec le haut-parleur d’aigus, le cas échéant.
    tweeter_material:
      name: Matériau du haut-parleur d’aigus
      description: Matériau principal du diaphragme ou du dôme du haut-parleur d’aigus.
    tweeter_mount_type:
      name: Type de montage du haut-parleur d’aigus
      description: Précise le mode d’installation du haut-parleur d’aigus dans le
        véhicule, c’est-à-dire la méthode ou le matériel de montage.
    twill_direction:
      name: Sens du sergé
      description: Indique le sens des lignes de sergé dans le tissage du denim.
    twist_direction:
      name: Sens de torsion
      description: Sens de torsion des brins du fil (torsion en S ou en Z).
    u_joint_series_size:
      name: Série ou taille du croisillon
      description: Précise la série ou la norme de taille du croisillon utilisé (p.
        ex., série 1310).
    uilleann_pipes_bag_material:
      name: Matériau de la poche d’air des cornemuses irlandaises Uilleann
      description: Matériau de la poche d’air, lorsqu’elle est incluse, déterminant
        les sensations de jeu, la durabilité et l’entretien.
    uilleann_pipes_handedness:
      name: Latéralité des cornemuses irlandaises Uilleann
      description: Indique si l’ensemble est configuré pour un jeu de droitier ou
        de gaucher.
    uilleann_pipes_set_configuration:
      name: Configuration de l’ensemble de cornemuses irlandaises Uilleann
      description: Précise la configuration de l’ensemble d’uilleann pipes inclus,
        selon la présence de régulateurs et de bourdons.
    uk_childrens_shoe_size:
      name: Pointure UK pour enfant
      description: Indique la pointure britannique pour enfants, par exemple 4 ou
        4 Large
    uk_clothing_size:
      name: Tailles de vêtements au Royaume-Uni
      description: Indique la taille de vêtement britannique, par exemple 12 ou 18
    uk_cup_size:
      name: Taille de bonnet britannique
      description: Définit la taille de bonnet européenne du soutien-gorge, par exemple
        C ou E
    uk_mens_shoe_size:
      name: Pointure UK pour femme
      description: Précise la pointure UK pour femme, par exemple 6 ou 6 Wide.
    uk_womens_shoe_size:
      name: Pointure UK pour femme
      description: Précise la pointure UK pour femme, par exemple 6 ou 6 Wide.
    ukulele_back_and_sides_wood:
      name: Bois du fond et des éclisses de l’ukulélé
      description: Indique le bois ou le matériau utilisé pour le fond et les éclisses
        de l’ukulélé.
    ukulele_body_cutaway:
      name: Pan coupé du corps de l’ukulélé
      description: Indique si le corps de l’ukulélé concert comporte un pan coupé
        pour faciliter l’accès aux frettes aiguës.
    ukulele_body_shape:
      name: Forme du corps de l’ukulélé
      description: Forme ou style général du corps de l’ukulélé.
    ukulele_bridge_material:
      name: Matériau du chevalet de l’ukulélé
      description: Précise le matériau utilisé pour le chevalet de l’ukulélé.
    ukulele_construction_type:
      name: Type de fabrication de l'ukulélé
      description: Indique si la table, le fond et les éclisses de l’instrument sont
        en bois massif ou laminé.
    ukulele_electronics_configuration:
      name: Configuration électronique de l’ukulélé
      description: Indique si l’ukulélé est uniquement acoustique ou s’il intègre
        une électronique, avec micro ou préampli, ou les deux, pour l’amplification.
    ukulele_string_re_entrant_tuning:
      name: Accordage réentrant des cordes de l’ukulélé
      description: Indique si l’ukulélé est réglé en accordage réentrant avec sol
        aigu ou en accordage linéaire avec sol grave, choix courant chez les acheteurs
        et déterminant pour le son.
    ukulele_top_wood:
      name: Bois de la table de l’ukulélé
      description: Indique le bois ou le matériau utilisé pour la table de l’ukulélé..
    ukulele_tuner_mechanism:
      name: Mécanisme d’accordage de l’ukulélé
      description: Précise le type ou le mécanisme d’accordage utilisé sur l’ukulélé.
    ukulele_tuner_type:
      name: Type de mécanique de l’ukulélé
      description: Type de mécanique utilisée sur la tête de l’ukulélé.
    ukulele_tuning:
      name: Accordage de l’ukulélé
      description: Précise l’accordage standard prévu pour l’ukulélé de poche.
    ultralight_aircraft_wing_configuration:
      name: Configuration de l’aile de l’ULM
      description: Emplacement et configuration de l’aile principale par rapport au
        fuselage ou à la structure.
    under_bed_features:
      name: Caractéristiques du rangement sous le lit
      description: Indique le principal élément fonctionnel situé sous le sommier.
    underfoot_strap_type:
      name: Type de sangle passant sous la chaussure
      description: Indique la matière ou la forme de la sangle qui passe sous la chaussure.
    underwear_fit:
      name: Coupe du sous-vêtement
      description: Indique la coupe générale du boxer (p. ex., ajustée, ample ou compressive).
    underwear_pieces_included:
      name: Sous-vêtements inclus
      description: Indique les pièces du vêtement fournies (le haut, le bas, les deux
        ou une combinaison en une pièce), afin que les clients sachent s’ils achètent
        un ensemble complet ou un article individuel.
    uniform_pieces_included:
      name: Pièces d’uniforme incluses
      description: Indique les pièces d’uniforme fournies (p. ex., une chemise, un
        pantalon ou un gilet), afin de clarifier le contenu des ensembles pour les
        achats en gros ou en kit.
    uniform_role:
      name: Fonction de l’uniforme
      description: Précise la fonction professionnelle ou l’organisme auquel l’article
        d’uniforme est destiné (p. ex., police, shérif, services médicaux d’urgence).
    update_method:
      name: Mode de mise à jour
      description: Mode de diffusion des mises à jour du micrologiciel ou du logiciel
        du scanner.
    upholstery_fabric_backing_type:
      name: Type d’envers du tissu d’ameublement
      description: Précise l’envers ou le contrecollage du tissu d’ameublement, dont
        dépendent la pose et le toucher.
    upholstery_fabric_water_resistance:
      name: Résistance à l’eau du tissu d’ameublement
      description: Indique la résistance de la surface du tissu d’ameublement à l’eau
        et aux liquides renversés.
    upper_material:
      name: Matériau de la tige
      description: Précise la matière principale de la tige de la basket, qui contribue
        à la respirabilité, à la durabilité et à l’esthétique.
    upright_bass_pickup_system:
      name: Système de micro de la contrebasse
      description: Indique si la contrebasse comprend un système installé pour l’amplification,
        avec micro, préampli ou les deux.
    upright_piano_power_source:
      name: Source d’alimentation du piano droit
      description: Mode d’alimentation du piano droit, applicable aux pianos droits
        acoustiques sans alimentation électrique comme aux pianos droits équipés d’un
        système silencieux ou hybride nécessitant de l’électricité.
    urination_device_features:
      name: Caractéristiques du dispositif pour uriner
      description: Présente les caractéristiques de conception particulières qui améliorent
        le fonctionnement ou facilitent l’utilisation.
    us_childrens_shoe_size:
      name: Pointure UK pour enfant
      description: Indique la pointure américaine pour enfants, par exemple 5 ou 5
        Large
    us_clothing_size:
      name: Tailles de vêtements aux États-Unis
      description: Indique la taille de vêtement américaine, par exemple 8 ou 14
    us_cup_size:
      name: Taille de bonnet américaine
      description: Indique la taille de bonnet américain, par exemple C ou DDD
    us_mens_shoe_size:
      name: Pointures de chaussures pour hommes aux États-Unis
      description: Indique la pointure américaine pour homme, par exemple 10 ou 10
        Large
    us_ring_size:
      name: Taille de bague américaine
      description: Indique la taille de bague américaine, par exemple 7 ou 9,5
    us_womens_shoe_size:
      name: Pointure UK pour femme
      description: Précise la pointure UK pour femme, par exemple 6 ou 6 Wide.
    usage:
      name: Usage
      description: Décrit l’usage prévu ou le réglage de l’arbre à cames.
    usda_honey_grade:
      name: Classe USDA du miel
      description: Indique la classe officielle attribuée au miel par le ministère
        de l’Agriculture des États-Unis (USDA).
    user_control_method:
      name: Méthode de contrôle de l'utilisateur
      description: Indique le mode d’interaction de l’utilisateur avec la machine
        (p. ex., panneau de commande intégré, télécommande, application, commande
        vocale), pour éclairer l’évaluation de la facilité d’utilisation.
    vacuum_boost_reference_port:
      name: Port de référence de dépression ou de suralimentation
      description: Indique si le régulateur comprend un port de référence au collecteur
        pour la dépression ou la suralimentation, ainsi que le type de port utilisé.
    valve_base_shape:
      name: Forme de la base de valve
      description: Définit la géométrie de contact entre la base de valve et la jante
        (ronde, conique, avec orifice latéral, en T, etc.), qui conditionne l’étanchéité
        et la compatibilité avec les inserts en mousse.
    valve_core_type:
      name: Type de noyau de soupape
      description: Indique si l’obus de valve est amovible, fixe ou si la valve est
        sans obus, information qui détermine les procédures d’entretien et la compatibilité
        avec les outils d’injection de liquide préventif.
    valve_cover_gasket_material:
      name: Matériau du joint de couvre-culasse
      description: Précise le matériau du joint de couvre-culasse inclus avec le couvre-culasse
        ou, lorsque celui-ci est vendu sans joint, le matériau recommandé pour le
        joint, le cas échéant.
    valve_cover_material:
      name: Matériau du couvercle de soupape
      description: Matériau principal utilisé pour fabriquer le couvre-culasse.
    valve_design:
      name: Conception de la soupape
      description: Décrit la conception de la soupape du moteur.
    valve_guard_coverage_area:
      name: Zone couverte par le protège-soupape
      description: Indique les parties de la section de valve protégées par la protection.
    valvetrain_configuration:
      name: Configuration du système de distribution
      description: Précise la configuration de l’arbre à cames et de la distribution.
    varnish_formulation_base:
      name: Base de la formulation du vernis
      description: Précise la formulation principale ou la composition chimique du
        vernis pour instruments à cordes, qui détermine son aspect, sa réversibilité
        et sa compatibilité avec les finitions existantes.
    varnish_transparency_tint:
      name: Transparence ou teinte du vernis
      description: Indique si le vernis est transparent ou teinté et, dans ce dernier
        cas, la famille générale de teintes.
    vegetable_matter_vm_content:
      name: Teneur en matières végétales (VM)
      description: Quantité de débris végétaux ou d’impuretés présents dans la fibre.
    vegetable_preparation_style:
      name: Mode de préparation du légume
      description: Décrit la manière dont le légume est présenté, coupé ou préparé
        d’une autre façon avant la vente (p. ex., entier, coupé en dés, en fleurettes).
    vehicle_audio_dsp_form_factor:
      name: Format du processeur DSP audio automobile
      description: Précise le format de l’unité DSP ou son mode d’installation.
    vehicle_battery_charger_features:
      name: Fonctionnalités du chargeur de batterie de véhicule
      description: Énumère les modes de fonctionnement et les fonctionnalités intégrées
        du chargeur de batterie pour véhicule (p. ex., mode de maintien de charge,
        désulfatation).
    vehicle_body_filler_form:
      name: Forme du mastic de carrosserie
      description: Forme ou conditionnement du mastic de carrosserie.
    vehicle_coaxial_speaker_nominal_size:
      name: Dimension nominale du haut-parleur coaxial automobile
      description: Dimension nominale du haut-parleur utilisée pour vérifier la compatibilité
        de montage (p. ex., 6,5 po, 6 x 9 po).
    vehicle_cover_size_class:
      name: Catégorie de taille de la housse de véhicule
      description: Catégorie générale indiquant la taille de véhicule à laquelle la
        housse est adaptée.
    vehicle_decor_set_items_included:
      name: Éléments inclus dans l’ensemble de décoration automobile
      description: Énumère les types d’éléments de décoration inclus dans l’ensemble
        d’accessoires, afin que les acheteurs en voient le contenu détaillé.
    vehicle_door_lock_actuation_method:
      name: Mode d’actionnement de la serrure de porte de véhicule
      description: Indique comment la serrure de porte du véhicule est actionnée ou
        commandée.
    vehicle_door_lock_actuator_kit_contents:
      name: Contenu du kit d’actionneur de serrure de porte du véhicule
      description: Indique les éléments fournis avec l’actionneur (actionneur seul
        ou avec pièces de fixation, tiges, supports ou faisceau).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Configuration du câblage de l’actionneur de serrure de porte du véhicule
      description: Précise le type de câblage nécessaire à l’installation (nombre
        de fils et fonction).
    vehicle_door_lock_included_components:
      name: Composants inclus avec la serrure de porte du véhicule
      description: Énumère les composants inclus dans l’emballage, notamment pour
        les kits et les ensembles.
    vehicle_electrical_connector_type:
      name: Type de connecteur électrique de l’alternateur
      description: Précise le type de connecteur ou de prise du régulateur ou du circuit
        d’excitation de l’alternateur, hors goujon de sortie principal B+.
    vehicle_equipment_fit_out_level:
      name: Niveau d’équipement du véhicule
      description: Indique le niveau d’aménagement policier inclus avec le fourgon.
    vehicle_glass_cleaner_form:
      name: Format du nettoyant pour vitres de véhicule
      description: Format physique du nettoyant pour vitres de véhicule (p. ex., vaporisateur,
        mousse, lingettes, gel, concentré).
    vehicle_hitch_cover_illumination_type:
      name: Type d’éclairage du cache d’attelage
      description: Précise si le cache d’attelage est éclairé et, le cas échéant,
        le type d’éclairage.
    vehicle_hitch_cover_mounting_type:
      name: Type de fixation du cache-attelage
      description: Indique le mode de retenue ou de fixation du cache d’attelage dans
        le récepteur d’attelage.
    vehicle_license_plate_finish:
      name: Finition de la plaque d’immatriculation
      description: Finition de la surface de la plaque.
    vehicle_license_plate_frame_anti_theft_design:
      name: Conception antivol du cadre de plaque d’immatriculation
      description: Éléments de conception liés à la sécurité, destinés à dissuader
        le démontage ou toute manipulation frauduleuse.
    vehicle_license_plate_frame_plate_standard:
      name: Norme de plaque compatible avec le cadre de plaque d’immatriculation
      description: Norme ou région de plaque d’immatriculation avec laquelle le cadre
        est compatible.
    vehicle_license_plate_frame_profile:
      name: Profil du cadre de plaque d’immatriculation
      description: Manière dont le cadre entoure la plaque, selon l’étendue du recouvrement
        et la forme, ce qui conditionne la lisibilité et la conformité.
    vehicle_license_plate_mounting_hole_count:
      name: Nombre de trous de montage de la plaque d’immatriculation
      description: Nombre de trous de montage sur la plaque.
    vehicle_license_plate_mounting_hole_pattern:
      name: Disposition des trous de fixation de la plaque d'immatriculation
      description: Disposition des trous de montage sur la plaque.
    vehicle_license_plate_reflectivity:
      name: Réflectivité de la plaque d’immatriculation
      description: Indique si la surface de la plaque réfléchit la lumière et de quelle
        manière, information importante pour la visibilité et la conformité de certaines
        plaques décoratives.
    vehicle_license_plate_size_standard:
      name: Normes relatives aux dimensions des plaques d'immatriculation
      description: Indique la norme régionale ou la norme propre au véhicule pour
        laquelle la plaque est dimensionnée (espacement des trous de montage et dimensions
        hors tout).
    vehicle_license_plate_text_style:
      name: Style de police des plaques d'immatriculation
      description: Style des caractères de la plaque, le cas échéant, notamment leur
        relief ou leur impression.
    vehicle_license_plate_theme:
      name: Thème des plaques d'immatriculation
      description: Thème général du décor de la plaque.
    vehicle_lift_actuation_method:
      name: Procédé d'actionnement d'un élévateur de véhicule
      description: Mode d’alimentation ou d’actionnement du pont élévateur ou du cric
        pour soulever le véhicule.
    vehicle_lift_mounting_type:
      name: Mode de montage du pont élévateur pour véhicules
      description: Indique comment le pont élévateur est installé ou ancré dans l’espace
        de travail.
    vehicle_lift_type:
      name: Type de pont élévateur
      description: Précise la structure du pont élévateur utilisé pour l’entretien
        ou le stationnement de véhicules (p. ex., à deux colonnes, à quatre colonnes,
        à ciseaux).
    vehicle_magnet_attachment_type:
      name: Type de fixation de l’aimant pour véhicule
      description: Précise le principal mode de fixation ou de montage des produits
        vendus comme aimants pour véhicule, par exemple une fixation uniquement magnétique
        ou une fixation magnétique avec renfort adhésif.
    vehicle_magnet_intended_use:
      name: Usage prévu de l’aimant pour véhicule
      description: Indique l’usage principal prévu de l’aimant pour véhicule.
    vehicle_mirror_adjustment_type:
      name: Type de réglage du rétroviseur
      description: Précise le mode de réglage ou de commande du rétroviseur.
    vehicle_mirror_glass_type:
      name: Type de verre pour rétroviseurs de véhicule
      description: Précise le type optique ou la forme de la glace du rétroviseur.
    vehicle_organizer_features:
      name: Caractéristiques de l'organiseur pour voiture
      description: Principales caractéristiques fonctionnelles des rangements pour
        véhicule, par exemple un format pliable, une doublure imperméable, des poches
        isothermes ou une base antidérapante.
    vehicle_paint_chemistry_base:
      name: Base ou composition chimique de la peinture automobile
      description: Indique la formulation ou la composition chimique utilisée dans
        la peinture automobile.
    vehicle_polish_application_method:
      name: Mode d’application du polish automobile
      description: Précise la méthode ou l’outil recommandé pour appliquer le polish
        automobile.
    vehicle_pursuit_package:
      name: Ensemble de performances pour poursuite
      description: Indique si le véhicule est équipé d’un ensemble de performances
        destiné aux poursuites policières, par exemple avec des améliorations apportées
        au refroidissement, aux freins, à la suspension et à l’étalonnage.
    vehicle_safety_equipment_position:
      name: Emplacement de l’équipement de sécurité du véhicule
      description: Précise où l’équipement de sécurité doit être utilisé ou installé
        sur le véhicule ou à l’intérieur de celui-ci.
    vehicle_safety_equipment_visibility_features:
      name: Caractéristiques de visibilité de l’équipement de sécurité du véhicule
      description: Indique les caractéristiques destinées à améliorer la visibilité
        et à rendre l’équipement plus repérable.
    vehicle_seat_row:
      name: Rangée du siège dans le véhicule
      description: Indique à quelle rangée arrière le siège correspond (deuxième ou
        troisième rangée), y compris pour les strapontins arrière.
    vehicle_steering_assist_type:
      name: Type d’assistance de direction
      description: Précise le système d’assistance de direction avec lequel le composant
        est compatible.
    vehicle_steering_wheel_lock_form_factor:
      name: Format du bloque-volant
      description: Décrit la forme de l’antivol et son mode de prise sur le volant
        et, le cas échéant, sur d’autres commandes.
    vehicle_wax_polish_product_form:
      name: Forme de la cire ou du polish automobile
      description: Forme ou conditionnement de la cire, du polish, du produit de protection
        ou du scellant.
    vehicle_wheel_valve_stem_type:
      name: Type de tige de valve pour roue de véhicule
      description: Précise le type de tige de valve compatible ou fourni.
    vehicle_windshield_fluid_formula:
      name: Formule du liquide lave-glace
      description: Principale fonction de nettoyage ou d’élimination ciblée par la
        formule du liquide lave-glace.
    veil_length_type:
      name: Type de longueur de voile
      description: Classe un voile selon la terminologie standard des longueurs, plutôt
        que selon une mesure numérique.
    vellum_opacity_level:
      name: Niveau d’opacité du papier vélin
      description: Indique le degré de translucidité ou d’opacité de la feuille de
        papier vélin.
    ventilation_configuration:
      name: Configuration de la ventilation
      description: Configuration principale de la ventilation du casque, avec admission
        et évacuation de l’air.
    ventilation_control_type:
      name: Type de commande de ventilation
      description: Précise le mode de gestion du flux d’air intégré au casque.
    ventilation_level:
      name: Niveau de ventilation
      description: Indique la conception de l’équipement de protection selon son niveau
        de circulation d’air et d’aération.
    venting_design:
      name: Conception de l’aération
      description: Précise si la housse est aérée et de quelle manière, afin de limiter
        la condensation et les moisissures pendant le stockage.
    vestibule_type:
      name: Type d’abside
      description: Classe l’abside selon sa disposition par rapport à la tente.
    vibraphone_bar_material:
      name: Matériau des lames du vibraphone
      description: Matériau des lames du vibraphone, c’est-à-dire des éléments qui
        produisent le son.
    vibraphone_motor_type:
      name: Type de moteur du vibraphone
      description: Type de moteur utilisé, lorsque l’instrument en est équipé, pour
        entraîner les ailettes rotatives des résonateurs et produire le vibrato.
    vibraphone_range_octaves:
      name: Étendue du vibraphone (octaves)
      description: Étendue tonale du vibraphone exprimée en octaves (p. ex., 3 octaves,
        3,5 octaves).
    vibraphone_resonator_tube_material:
      name: Matériau des tubes résonateurs du vibraphone
      description: Matériau des tubes résonateurs du vibraphone situés sous les lames.
    vibraphone_tuning_standard:
      name: Diapason de référence du vibraphone
      description: Diapason de référence utilisé pour l’accordage (la = 440 Hz, etc.).
    viewing_sides:
      name: Faces d’affichage
      description: Précise le nombre de faces d’affichage du tableau de score (une
        face, deux faces, quatre faces, etc.).
    vintage_advertisement_decade:
      name: Décennie de la publicité ancienne
      description: Précise la décennie d’impression ou de production initiale de la
        publicité, de façon approximative si l’année exacte est inconnue.
    vintage_advertisement_format:
      name: Format de publicité vintage
      description: Indique le format physique ou le support de la publicité ancienne
        de collection.
    vintage_advertisement_subject_category:
      name: Catégorie thématique de la publicité ancienne
      description: Classe la publicité selon la catégorie du produit ou du service
        annoncé.
    vintage_classic_truck_cab_type:
      name: Type de cabine de camion ancien ou de collection
      description: Configuration ou type de carrosserie de la cabine du camion.
    virginia_tech_helmet_star_rating:
      name: Note en étoiles du casque selon Virginia Tech
      description: Note de sécurité attribuée par le Virginia Tech Helmet Lab (0 à
        5 étoiles).
    virtual_analog_synthesizer_form_factor:
      name: Format du synthétiseur analogique virtuel
      description: Précise le format du châssis du synthétiseur (clavier, module ou
        rack).
    viscosity_thickness:
      name: Viscosité ou épaisseur
      description: Décrit l’épaisseur ou la fluidité de la barbotine telle qu’elle
        est vendue ou à la consistance de travail recommandée.
    vise_configuration:
      name: Configuration de l'étau
      description: Précise la structure ou le nombre de pièces de l’ensemble d’étaux,
        ce qui conditionne sa portabilité et la complexité de sa mise en place.
    visibility_features:
      name: Fonctions de visibilité
      description: Présente les éléments de conception qui rendent l’utilisateur plus
        visible dans la circulation.
    visor_brim_type:
      name: Type de visière ou de rebord
      description: Indique la présence et le type de visière ou de bord sur le casque.
    visor_configuration:
      name: Configuration de la visière
      description: Décrit la présence et le type de visière ou d’écran facial intégré,
        le cas échéant.
    visor_lens_finish:
      name: Finition de l’écran de la visière
      description: Précise la teinte, la finition optique ou le graphisme appliqué
        à l’écran de la visière.
    visor_style:
      name: Style de visière
      description: Indique si la capuche comprend un rebord ou une visière, ainsi
        que sa configuration.
    voc_compliance_standard:
      name: Norme de conformité aux COV
      description: Mention réglementaire de conformité du produit relative aux COV,
        le cas échéant.
    voc_regulatory_class:
      name: Classe réglementaire relative aux COV
      description: Classe réglementaire ou de conformité relative aux COV déclarée
        pour le produit (d’après l’étiquette ou la FDS), utilisée pour les restrictions
        réglementaires et environnementales régionales.
    vodka_base_ingredient:
      name: Ingrédient de base de la vodka
      description: Matière première agricole principale à partir de laquelle la vodka
        est distillée (p. ex., blé, pomme de terre ou maïs).
    voice_coil_configuration:
      name: Configuration des bobines mobiles
      description: Nombre et disposition des bobines mobiles, qui déterminent les
        possibilités de câblage et les options d’impédance.
    voice_effects:
      name: Effets vocaux
      description: Types d’effets vocaux intégrés proposés par l’ensemble de karaoké.
    voltage_rating_type:
      name: Type de tension nominale
      description: Indique si la tension nominale du fusible s’applique au courant
        alternatif, au courant continu ou aux deux.
    voltage_regulator_connector_type:
      name: Type de connecteur du régulateur de tension
      description: Indique le type de connecteur ou de borne utilisé pour raccorder
        le régulateur au faisceau électrique, à l’alternateur ou à la génératrice
        du véhicule.
    wader_foot_type:
      name: Type de pied des échassiers
      description: Indique si les cuissardes de pêche sont dotées de bottes intégrées
        ou de chaussons séparés.
    wader_sole_type:
      name: Type de semelle de cuissardes de pêche
      description: Précise le matériau de la semelle extérieure ou le type d’adhérence
        des chaussures de wading ou des cuissardes de pêche à bottes intégrées.
    waistband_style:
      name: Type de taille
      description: Décrit la conception de la taille ainsi que son mode de fermeture
        ou d’ajustement pour assurer la tenue et le confort.
    wakeboard_binding_mounting_pattern:
      name: Configuration de montage des chausses de wakeboard
      description: Indique la configuration des inserts ou de la platine du wakeboard
        avec laquelle les chausses sont compatibles.
    wakeboard_riding_style:
      name: Style de pratique du wakeboard
      description: Classe le wakeboard selon l’environnement ou le style de pratique
        prévu.
    wall_decal_style:
      name: Type d’autocollant mural
      description: Indique le mode de fabrication ou d’application de l’autocollant
        mural (p. ex., découpe à la forme, transfert ou planche d’autocollants).
    wallyball_equipment_included:
      name: Équipement de wallyball inclus
      description: Énumère les éléments précis fournis dans l’ensemble de wallyball,
        afin que les acheteurs sachent exactement ce qu’ils achètent et puissent comparer
        les lots.
    warp_beam_type:
      name: Type de ensouple
      description: Précise la configuration de l’ensouple de chaîne fournie ou installée
        avec le métier à tisser (l’agencement fourni avec le métier).
    washability:
      name: Lavabilité
      description: Indique si la colle se nettoie à l’eau, si elle est lavable après
        application ou si elle présente ces deux propriétés.
    watch_band_design:
      name: Type de bracelet de montre
      description: Décrit la construction ou le style du bracelet de montre (p. ex.,
        NATO, maille milanaise ou bracelet à maillons).
    watch_movement:
      name: Mouvement de la montre
      description: Précise le type de mouvement de la montre, un critère important
        pour distinguer les modèles.
    water_activation:
      name: Activation par l’eau
      description: Indique si la balise peut s’activer automatiquement en cas d’immersion
        (fonction courante sur les EPIRB de catégorie I/II).
    water_chamber_configuration:
      name: Configuration des chambres à eau
      description: Décrit la disposition interne des poches d’eau du matelas, par
        exemple avec une ou deux chambres, ce qui conditionne le soutien, la régulation
        de la température et la transmission des mouvements entre partenaires.
    water_dispensing_mechanism:
      name: Mécanisme de distribution d'eau
      description: Définit le mode de sortie de l’eau de l’appareil, par exemple par
        un robinet, des buses de pulvérisation ou un écoulement par gravité.
    water_exposure_protection_level:
      name: Niveau de protection contre l’eau
      description: Indique le degré de protection du produit en cas d’exposition à
        l’eau (p. ex., éclaboussures ou immersion temporaire). Utilisez l’indice de
        protection (IP) lorsqu’un code IP officiel est disponible.
    water_fed_design:
      name: Type d’alimentation en eau
      description: Indique si la brosse est conçue pour être utilisée avec de l’eau
        courante, au moyen d’un manche à circulation d’eau ou d’un raccord de tuyau.
    water_gun_features:
      name: Caractéristiques du pistolet à eau
      description: Fonctionnalités intégrées notables du pistolet à eau.
    water_gun_operating_mechanism:
      name: Mécanisme de fonctionnement du pistolet à eau
      description: Mode de mise sous pression et d’expulsion de l’eau pendant l’utilisation
        du pistolet à eau.
    water_gun_spray_pattern:
      name: Type de jet du pistolet à eau
      description: Type de jet d’eau produit par la buse lors du tir.
    water_heating_method:
      name: Mode de chauffage de l’eau
      description: Décrit le mode de chauffage éventuel de l’eau avant utilisation,
        par exemple par l’absorption solaire, un brûleur au propane, un élément chauffant
        électrique, un système de chauffage sur batterie ou une isolation retenant
        la chaleur, ou indique l’absence de chauffage.
    water_mattress_construction:
      name: Type de construction du matelas à eau
      description: Précise le type de construction du matelas à eau (p. ex., à structure
        rigide ou souple), qui détermine la compatibilité avec le cadre et le ressenti
        général.
    water_play_features:
      name: Jeux aquatiques
      description: Éléments de jeux d’eau inclus avec le parc aquatique ou le toboggan.
    water_polo_competition_approval:
      name: Homologation en compétition de water-polo
      description: Indique l’instance qui a homologué ou certifié officiellement le
        ballon, ou le niveau de compétition auquel cette homologation ou certification
        s’applique.
    water_polo_goal_type:
      name: Type de but de water-polo
      description: Classe le but selon sa structure ou son mode d’installation (p.
        ex., flottant, fixé au bord du bassin ou transportable).
    water_pump_drive_type:
      name: Type d’entraînement de la pompe à eau
      description: Indique le mode d’entraînement ou d’actionnement de la pompe à
        eau dans le circuit de refroidissement du véhicule.
    water_pump_housing_material:
      name: Matériau du corps de la pompe à eau
      description: Matériau du corps ou du carter de la pompe à eau.
    water_pump_impeller_material:
      name: Matériau de la turbine de la pompe à eau
      description: Précise le matériau de la turbine de la pompe à eau (rotor interne
        à ailettes qui déplace le liquide de refroidissement).
    water_pump_mounting_type:
      name: Type de montage de la pompe à eau
      description: Précise le type de montage de la pompe à eau pour l’adaptation
        au moteur (p. ex., corps boulonné ou cartouche/insert).
    water_purification_method:
      name: Procédé de purification de l'eau
      description: Indique le principal mécanisme utilisé par le produit pour rendre
        l’eau potable hors réseau (p. ex., pompe, alimentation par gravité ou lumière
        UV).
    water_resistance:
      name: Résistance à l’eau
      description: Indique le degré de protection contre les intempéries, comme la
        résistance à l’eau ou l’imperméabilité.
    water_resistance_level:
      name: Niveau de résistance à l’eau
      description: Indique si le textile repousse l’eau et dans quelle mesure.
    water_resistance_rating_case_protection_level:
      name: Indice de résistance à l’eau (niveau de protection de l’étui)
      description: Indique le niveau de protection contre l’eau offert par l’étui
        à roulettes (mention marketing, et non indice d’étanchéité IP applicable aux
        appareils électroniques), comme la résistance à l’eau ou l’imperméabilité.
    water_rocket_kit_items_included:
      name: Éléments inclus dans le kit de fusée à eau
      description: Principaux éléments fournis avec le produit.
    water_rocket_propulsion_type:
      name: Type de propulsion des fusées à eau
      description: Source principale de propulsion ou d’énergie utilisée pour lancer
        la fusée.
    water_rocket_recovery_system:
      name: Système de récupération de la fusée à eau
      description: Méthode de récupération de la fusée après le lancement.
    water_ski_base_design:
      name: Profil inférieur des skis nautiques
      description: Précise le profil inférieur des skis nautiques, qui conditionne
        leur conduite et leur maniabilité.
    water_ski_fin_type:
      name: Type d’aileron de ski nautique
      description: Précise le type et la disposition de l’aileron du ski nautique,
        qui déterminent la tenue de cap et la maniabilité.
    water_source:
      name: Source d'eau
      description: Indique l’origine de l’eau avant la gazéification.
    water_sports_safety_standard:
      name: Norme de sécurité pour les sports nautiques
      description: Énumère les normes officielles de sécurité ou de flottabilité auxquelles
        le produit est conforme (p. ex., CE EN 1385 pour les casques, ISO 12402-5
        pour les aides à la flottabilité ou USCG Type III).
    water_table_feature_set:
      name: Fonctionnalités de la table à eau
      description: Présente les éléments de jeu intégrés à la table à eau, par exemple
        les cascades, les asperseurs, les pompes ou les bassins à plusieurs niveaux.
    water_table_items_included:
      name: Éléments inclus avec la table à eau
      description: Indique les accessoires fournis avec la table à eau (p. ex., des
        bateaux, des gobelets, des entonnoirs ou des figurines).
    water_table_water_source_type:
      name: Type d’alimentation en eau de la table à eau
      description: Indique le mode de remplissage ou d’alimentation en eau de la table
        à eau.
    waterbed_stabilization_level:
      name: Niveau de stabilisation du matelas à eau
      description: Indique le degré d’atténuation des ondulations ou de contrôle des
        mouvements assuré par le matelas à eau.
    watercolor_ink_water_resistance_after_drying:
      name: Résistance à l’eau de l’encre pour aquarelle (après séchage)
      description: Indique si l’encre pour aquarelle devient résistante à l’eau ou
        imperméable après séchage (selon les indications du fabricant).
    watercraft_care_application_area:
      name: Zone à traiter sur l’embarcation
      description: Indique la principale zone ou pièce d’une embarcation à traiter
        avec le produit.
    watercraft_drive_mechanism:
      name: Mécanisme de propulsion de l’embarcation
      description: Décrit le mécanisme de propulsion installé à bord ou compatible
        avec l’embarcation.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Schéma de fixation de la sonde de niveau du réservoir d’embarcation
      description: Précise le schéma ou la norme de fixation applicable aux sondes
        de niveau de réservoir de carburant et aux jauges compatibles (p. ex., schémas
        de boulonnage courants dans le domaine nautique).
    watercraft_fuel_tank_shape:
      name: Forme du réservoir de carburant d’embarcation
      description: Décrit la forme générale du réservoir de carburant afin d’évaluer
        l’encombrement et l’ajustement dans l’espace disponible.
    watercraft_hull_material:
      name: Matériau de la coque de l’embarcation
      description: Précise le matériau principal de construction de la coque.
    watercraft_ignition_part_voltage:
      name: Tension de la pièce d’allumage d’embarcation
      description: Tension nominale ou requise pour la pièce d’allumage, le cas échéant,
        par exemple pour les systèmes 12 V.
    watercraft_impeller_material_grade:
      name: Type de matériau de la turbine d’embarcation
      description: Précise le matériau de la turbine d’embarcation (p. ex., caoutchouc
        néoprène, nitrile ou bronze).
    watercraft_lighting_certification_compliance:
      name: Certification ou conformité de l’éclairage d’embarcation
      description: Indique la conformité réglementaire ou normative selon laquelle
        le feu est certifié pour un usage nautique (p. ex., conformité USCG, ABYC
        ou COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Caractéristiques de réglage du support de moteur d’embarcation
      description: Possibilités de réglage du support (p. ex., inclinaison, relevage
        ou coulissement) qui conditionnent la facilité d’utilisation et l’ajustement.
    watercraft_piston_part_type:
      name: Type de pièce de piston d’embarcation
      description: Indique le composant associé au piston représenté par la fiche
        produit.
    watercraft_propeller_blade_rake:
      name: Inclinaison des pales de l’hélice d’embarcation
      description: Précise l’inclinaison des pales (angle des pales par rapport au
        moyeu), qui conditionne le relèvement de l’étrave et les performances.
    watercraft_propeller_rotation_direction:
      name: Sens de rotation de l’hélice d’embarcation
      description: Indique le sens de rotation requis de l’hélice pour assurer la
        compatibilité avec la transmission (p. ex., rotation à droite standard ou
        rotation à gauche contrarotative).
    watercraft_pump_stage_impeller_role:
      name: Étage de pompe ou rôle de la turbine d’embarcation
      description: Indique si la turbine remplit un rôle de pompe particulier (p.
        ex., pompe à eau brute ou pompe à eau de mer, circulation du liquide de refroidissement
        ou pompe à jet).
    watercraft_registration_status:
      name: Statut d’immatriculation de l’embarcation
      description: Indique si le voilier est fourni avec un titre de propriété, des
        documents d’immatriculation ou les deux.
    watercraft_safety_equipment_activation_type:
      name: Mode d’activation de l’équipement de sécurité nautique
      description: Mode principal d’activation du dispositif de sécurité (balises,
        alarmes MOB ou balises PLB), distinct du gonflage.
    watercraft_steering_cable_core_material:
      name: Matériau de l’âme du câble de direction d’embarcation
      description: Précise le matériau de l’âme du câble de direction, qui transmet
        l’effort.
    watercraft_steering_cable_hardware_included:
      name: Matériel de montage inclus avec le câble de direction d’embarcation
      description: Indique le matériel de montage et les accessoires inclus avec le
        câble de direction.
    watercraft_steering_cable_system_type:
      name: Type de système de direction par câble d’embarcation
      description: Précise l’architecture du système de direction auquel le câble
        est adapté (p. ex., à commande rotative ou à crémaillère).
    watercraft_steering_wheel_hub_bore_type:
      name: Type de moyeu/alésage du volant de direction pour bateaux
      description: Précise le type d’interface centrale de montage ou d’alésage par
        laquelle le volant se fixe sur un moyeu ou un adaptateur (p. ex., conique
        ou cannelée).
    watercress_variety:
      name: Variété de cresson
      description: Indique la variété ou le type de cresson vendu.
    waterproof_level:
      name: Niveau d’imperméabilité
      description: Indique le niveau de protection contre l’eau des chaussures, y
        compris toute mention d’imperméabilité garantie.
    wax_blend_composition:
      name: Composition du mélange de cires
      description: Énumère les cires mélangées dans le produit et, le cas échéant,
        le type de mélange commercialisé.
    wax_coat_type:
      name: Type de couche de fart
      description: Indique si le fart s’utilise en sous-couche, en couche de finition
        ou en monocouche polyvalente.
    wax_hardness:
      name: Dureté du fart
      description: Indique la dureté relative du fart, qui détermine sa tenue et sa
        glisse selon le type de neige.
    wax_physical_form:
      name: Forme de la cire à bougie
      description: Indique la forme sous laquelle la cire à bougie brute est fournie.
    wax_recommended_candle_application:
      name: Usage recommandé de la cire à bougie
      description: Indique les types de bougies pour lesquels la cire est principalement
        formulée.
    wax_tackiness_level:
      name: Niveau d'adhérence de la cire
      description: Décrit le degré d’adhérence que la cire procure sur la palette.
    weapon_system_integration:
      name: Intégration des systèmes d'armes
      description: Indique si le véhicule comprend des systèmes d’armes intégrés ou
        des supports d’armes.
    weather_suitability:
      name: Conditions météorologiques d’utilisation
      description: Indique les conditions environnementales auxquelles les gants sont
        adaptés, par exemple le froid ou l’humidité pendant la pratique.
    weave_finish:
      name: Tissage ou finition
      description: Décrit le tissage principal du tissu ou la finition de surface
        qui conditionne la texture et le lustre de la cravate.
    weave_style:
      name: Style de tissage
      description: Précise le motif de tissage traditionnel utilisé pour confectionner
        le chapeau panama, qui contribue à déterminer son aération, sa souplesse,
        son aspect et son prix.
    weave_type:
      name: Type de tissage
      description: Indique le type de tissage ou de construction du tissu, selon l’appellation
        de tissage utilisée, avec des effets sur sa texture, son lustre et son tombé.
    weaving_beater_edge_type:
      name: Type de bord du battoir plat utilisé pour le tissage
      description: Décrit le profil du bord actif du battoir plat qui entre en contact
        avec la trame (p. ex., droit ou dentelé).
    weaving_beater_style:
      name: Style « batteur »
      description: Indique le type ou le format fonctionnel du battoir plat utilisé
        pour le tissage.
    weaving_shuttle_tip_style:
      name: Forme de la pointe de la navette de tissage
      description: Précise la forme de la pointe avant de la navette, qui conditionne
        son passage à travers la foule et le risque d’accrocher les fils de chaîne.
    weaving_shuttle_use_case:
      name: Usage de la navette de tissage
      description: Précise, dans le cadre du tissage, l’usage auquel la navette est
        destinée ou pour lequel elle est optimisée.
    webbing_construction_type:
      name: Type de construction en sangle
      description: Décrit le type de tissage ou de tressage de la sangle, qui influe
        sur sa prise en main, sa résistance et son usage prévu.
    webbing_design:
      name: Structure de la palmure
      description: Décrit la structure de la palmure des gants, qui conditionne l’entraînement
        en résistance et la propulsion.
    weight_adjustability:
      name: Réglage du poids
      description: Indique si l’utilisateur peut régler la résistance du produit (p.
        ex., au moyen d’un sélecteur de charge ou par ajout de charges) ou si le produit
        offre une seule charge fixe.
    weight_integration_system:
      name: Système d’intégration des poids
      description: Indique si le gilet stabilisateur intègre des poids de lestage
        et selon quel système (p. ex., poches à plombs détachables, aucun ou accessoire
        facultatif).
    weight_plate_compatibility:
      name: Compatibilité avec les disques de musculation
      description: Définit les formats de disques de musculation acceptés par la machine
        (olympique, standard ou les deux).
    weight_plate_style:
      name: Type de disque de musculation
      description: Classe les disques de musculation par type (p. ex., olympique,
        bumper ou à charge sélectionnable) afin de faciliter le filtrage par compatibilité.
    weightlifting_belt_style:
      name: Type de ceinture d’haltérophilie
      description: Classe la ceinture selon sa conception générale ou sa fonction
        principale (p. ex., ceinture à levier, ceinture de lest ou ceinture effilée).
    weightlifting_federation_certification:
      name: Certification par une fédération de sports de force
      description: Indique si le produit bénéficie d’une homologation officielle ou
        répond aux exigences d’une fédération de sports de force, comme l’IPF ou l’IWF.
    wetsuit_boot_height:
      name: Hauteur des bottillons de combinaison
      description: Classe les bottillons selon leur hauteur ou leur coupe sur la jambe,
        ce qui détermine la zone protégée, la liberté de mouvement et les entrées
        d’eau.
    wetsuit_entry_system:
      name: Système d’enfilage de la combinaison
      description: Décrit le type et l’emplacement de l’ouverture ou de la fermeture
        à glissière utilisée pour enfiler la combinaison.
    wetsuit_seam_construction:
      name: Construction des coutures de la combinaison
      description: Précise comment les coutures sont assemblées et rendues étanches,
        ce qui agit sur le maintien de la chaleur, la souplesse et la durabilité.
    wheat_product_form:
      name: Forme du produit à base de blé
      description: Précise la forme brute ou transformée du produit à base de blé.
    wheel_arrangement:
      name: Configuration des essieux
      description: Précise la configuration des essieux d’une locomotive à vapeur
        selon la notation Whyte, une caractéristique distinctive souvent utilisée
        comme terme de recherche par les collectionneurs.
    wheel_brake_type:
      name: Type de frein de roue
      description: Détaille le dispositif de freinage équipant les roues ou les roulettes
        du chariot.
    wheel_chock_grip_features:
      name: Caractéristiques d’adhérence de la cale de roue
      description: Caractéristiques de traction et d’adhérence qui améliorent la tenue
        de la cale sur les surfaces et contre les pneus.
    wheel_cleaner_acidity_ph_category:
      name: Catégorie d’acidité ou de pH du nettoyant pour jantes
      description: Indique si le nettoyant pour jantes est acide, neutre ou alcalin
        et, le cas échéant, s’il est présenté comme ayant un pH équilibré.
    wheel_cleaner_formula_type:
      name: Type de formule du nettoyant pour jantes
      description: Pour les nettoyants pour jantes et les solutions de lavage associées,
        indique le type de formule employé (p. ex., à base d’acide, sans acide, à
        pH neutre ou équilibré, ou réactive au fer).
    wheel_construction_type:
      name: Type de construction de la roue
      description: Précise le mode de fabrication de la roue.
    wheel_contaminant_target:
      name: Type de contaminant sur les roues
      description: Précise les principaux types de contaminants visés par le nettoyant.
    wheel_core_type:
      name: Type de moyeu de roue
      description: Décrit la structure du noyau de la roue, qui conditionne son poids,
        sa rigidité et le transfert d’énergie.
    wheel_cylinder_inlet_port_thread_standard:
      name: Norme de filetage de l’orifice d’entrée du cylindre de roue
      description: Précise la norme de filetage de l’orifice d’entrée de la conduite
        de frein sur le cylindre de roue (p. ex., collet battu métrique ou collet
        évasé inversé SAE).
    wheel_fastener_seat_type:
      name: Type de siège de fixation de roue
      description: Précise le type de siège par lequel l’écrou ou le boulon de roue
        prend appui sur la roue (p. ex., conique, sphérique, plat ou à portée cylindrique).
    wheel_illumination:
      name: Éclairage des roues
      description: Indique si la roue comporte un éclairage intégré ou des éléments
        phosphorescents.
    wheel_material:
      name: Matériau des roues
      description: Indique le matériau principal des roues, qui détermine leur durabilité,
        leur adhérence et l’amortissement des vibrations.
    wheel_profile:
      name: Profil de roue
      description: Décrit le profil transversal de la roue, dont dépendent la vitesse,
        l’adhérence et la maniabilité.
    wheel_setup_type:
      name: Type de configuration des roues
      description: Définit la configuration des roues montées sur les patins.
    wheel_system_finish:
      name: Finition du système de roues
      description: Finition ou revêtement de surface des jantes, des roues et de certaines
        pièces ou accessoires de roue.
    whip_style:
      name: Type de fouet d’équitation
      description: Classe le produit selon le type précis de fouet ou de cravache
        d’équitation, ou selon sa discipline d’utilisation.
    whipped_cream_base:
      name: Base à la crème fouettée
      description: Indique la base principale utilisée pour préparer la crème fouettée,
        par exemple de la crème laitière ou de la noix de coco.
    whipped_cream_form:
      name: Forme de la crème fouettée
      description: Indique la forme sous laquelle la crème fouettée est vendue.
    whistle_head_material:
      name: Matériau de la tête du sifflet
      description: Précise le matériau de la tête ou de l’embouchure du sifflet (bloc
        ou tête de biseau).
    whistle_light_features:
      name: Fonctions lumineuses du sifflet
      description: Indique si le sifflet intègre des effets lumineux pour les fêtes
        (p. ex., LED).
    whistle_purpose:
      name: Usage du sifflet
      description: Indique l’usage principal du sifflet (entraînement sportif, sécurité
        en mer, dressage canin, etc.)
    whistle_sound_style:
      name: Sonorité du sifflet
      description: Décrit le caractère du son émis par le sifflet (p. ex., à tonalité
        unique ou multiple).
    white_glue_finish_appearance_when_dry:
      name: Aspect de la colle blanche après séchage
      description: Précise, dans le cadre des loisirs créatifs ou des travaux de bureau,
        l’aspect de la colle blanche après séchage (p. ex., transparente ou opaque).
    white_glue_washability:
      name: Lavabilité de la colle blanche
      description: Indique si la colle sèche s’élimine des tissus au lavage ou se
        nettoie sur la peau.
    whitewater_kayak_style:
      name: Type de kayak d’eau vive
      description: Type de pratique visé en eau vive (p. ex., kayak de creek, kayak
        de descente de rivière ou kayak freestyle).
    whitewater_rating_class:
      name: Cotation en eau vive (classe)
      description: Classe maximale de l’échelle internationale de difficulté des rivières
        pour laquelle le raft est homologué.
    whorl_mounting_interface:
      name: Interface de montage en spirale
      description: Mode de fixation de la poulie au rouet (type d’axe ou de connexion).
    wick_construction_type:
      name: Type de mèche
      description: Structure ou forme de la mèche (tressée, plate, à tresse carrée,
        à âme, en bois, etc.).
    wick_core_type:
      name: Type d’âme de la mèche
      description: Indique si la mèche est sans âme ou contient une âme, dont le matériau
        (p. ex., papier ou zinc) détermine la rigidité et les caractéristiques de
        combustion.
    wick_tab_crimp_type:
      name: Type de sertissage du support de mèche
      description: Mode de maintien de la mèche par le support (par structure ou par
        sertissage).
    wick_tab_material:
      name: Matériau de la languette de mèche
      description: Matériau de la languette ou du support de mèche (généralement en
        fer-blanc), à prendre en compte pour la résistance à la corrosion et les exigences
        réglementaires (p. ex., absence de plomb).
    wick_tab_shape:
      name: Forme du support de mèche
      description: Forme ou configuration de la plaquette du support de mèche.
    wick_type_included:
      name: Type de mèche inclus
      description: Indique la matière ou le type de mèche fourni dans le kit.
    wig_fiber_material:
      name: Matière des fibres de la perruque
      description: Indique la fibre principale utilisée pour les cheveux de la perruque,
        afin d’aider les acheteurs à choisir entre différentes variétés de cheveux
        humains et des fibres synthétiques aux caractéristiques de coiffage et de
        tenue dans le temps distinctes.
    wildlife_attractant_scent:
      name: Parfum attractif pour la faune sauvage
      description: Indique l’odeur principale utilisée pour attirer les animaux sauvages,
        qu’il s’agisse d’odeurs alimentaires naturelles ou d’odeurs de type phéromonal.
    willow_grade:
      name: Qualité du saule
      description: Précise la classe de qualité du saule utilisé, qui reflète la structure
        du grain et le niveau de performance général.
    willow_type:
      name: Type de saule
      description: Indique le type de saule ou l’autre matériau utilisé pour la lame
        de la batte, qui détermine en grande partie les performances, la durabilité
        et le prix.
    wind_up_mechanism_type:
      name: Type de mécanisme à remontage manuel
      description: Précise le mode de remontage ou d’activation du jouet.
    wind_up_toy_movement_pattern:
      name: Mouvement du jouet à remontoir
      description: Décrit le mouvement principal produit une fois le jouet remonté.
    windbreak_purpose:
      name: Usage du brise-vent
      description: Précise l’usage principal du brise-vent.
    windfoil_board_mounting_system:
      name: Système de montage sur la planche de windfoil
      description: Précise le boîtier de foil ou l’interface de fixation intégrés
        à la planche de windfoil.
    windfoil_sail_style:
      name: Type de voile de windfoil
      description: Classe la voile selon le type de pratique recherché ou la discipline
        visée.
    winding_direction:
      name: Sens de rotation
      description: Indique le sens de rotation pris en charge par le remontoir de
        montre (horaire, antihoraire ou bidirectionnel).
    winding_method:
      name: Mode d’enroulement
      description: Mode d’enroulement ou de chargement de la trame dans la navette.
    winding_speed_control_type:
      name: Mode de réglage de la vitesse d’enroulement
      description: Indique comment la vitesse d’enroulement se règle pendant l’utilisation.
    winding_type:
      name: Type d’enroulement
      description: Précise le type d’enroulement des cordes de basse (profil du fil
        extérieur).
    windlass_control_station_type:
      name: Type de poste de commande du guindeau
      description: Type d’interface de commande incluse ou prise en charge pour actionner
        le guindeau.
    windlass_mount_type:
      name: Type de montage du guindeau
      description: Emplacement ou mode de montage du guindeau sur le bateau.
    window_component_location:
      name: Emplacement du composant de vitrage
      description: Précise la vitre ou l’ouverture du véhicule concernée par la pièce
        (p. ex., pare-brise, vitre de portière, lunette arrière ou vitre de custode).
    window_configuration:
      name: Configuration de la fenêtre
      description: Indique si l’aile de wingfoil comporte des fenêtres transparentes
        et en précise la taille relative.
    window_glass_construction:
      name: Construction du vitrage
      description: Précise le type de construction de sécurité ou de feuilletage du
        vitrage automobile.
    window_glass_features:
      name: Fonctions du vitrage
      description: Indique si le vitrage permet l’intégration de technologies du véhicule
        (p. ex., support de capteur de pluie ou support de caméra).
    window_glass_finish:
      name: Finition du vitrage
      description: Précise la finition, la teinte ou le traitement d’occultation du
        vitrage automobile.
    window_glass_tint_color:
      name: Couleur de la teinte des vitres
      description: Précise la nuance de la teinte présente dans le vitrage, et non
        la couleur générale du produit.
    window_glass_tint_level:
      name: Niveau de teinte du vitrage
      description: Indique le degré approximatif d’assombrissement du vitrage teinté
        d’origine ou du vitrage d’intimité, et non celui d’un film teinté de seconde
        monte. Utilisez des niveaux descriptifs lorsque la valeur VLT exacte n’est
        pas connue.
    window_net_latch_mechanism:
      name: Mécanisme de verrouillage du filet de fenêtre
      description: Précise le mécanisme de verrouillage ou de déverrouillage utilisé
        pour le filet de fenêtre (p. ex., bouton-poussoir, levier ou boucle de type
        ceinture de sécurité).
    window_net_mounting_hardware:
      name: Matériel de fixation du filet de fenêtre
      description: Indique le type de matériel ou le mode de fixation utilisé pour
        installer le filet de fenêtre (p. ex., clips, vis ou système à crochet et
        tige), ou précise si le matériel de fixation est inclus.
    window_net_opening_direction:
      name: Sens d’ouverture du filet de fenêtre
      description: Précise le sens dans lequel le filet de fenêtre s’ouvre ou se dégage
        par rapport à l’occupant, afin de permettre la sortie et de respecter les
        règles.
    window_regulator_operation:
      name: Mode d’actionnement du lève-vitre
      description: Précise le mode d’actionnement du lève-vitre (par manivelle ou
        électrique).
    windshield_coverage_area:
      name: Étendue de la protection de pare-brise
      description: Précise les parties extérieures avant du véhicule protégées par
        la protection de pare-brise (p. ex., pare-brise seul, ou pare-brise avec essuie-glaces,
        rétroviseurs, vitres latérales ou bord du capot).
    windshield_mount_attachment_method:
      name: Méthode de fixation sur le pare-brise
      description: Précise comment le support adhère à la surface du pare-brise ou
        s’y fixe par serrage.
    windshield_washer_fluid_seasonality:
      name: Saisonnalité du liquide lave-glace
      description: Indique la saison, le climat ou l’usage principal visé par la formule
        du liquide lave-glace (p. ex., formule dégivrante d’hiver, formule anti-insectes
        d’été ou formule toutes saisons).
    windsurf_fin_style:
      name: Type d’aileron de planche à voile
      description: Classe l’aileron selon la discipline de navigation visée ou le
        type d’usage prévu (p. ex., vague, slalom ou anti-algues).
    windsurfing_connection_standard:
      name: Norme de connexion en planche à voile
      description: Interface mécanique ou type de boîtier utilisé pour fixer la pièce
        à la planche ou au gréement.
    windsurfing_sail_style:
      name: Style de voile de planche à voile
      description: Classe la voile selon la discipline visée ou le type de pratique
        prévu, par exemple vague, freeride ou foil.
    wine_additive_type:
      name: Type d’additif œnologique
      description: Précise le type de produit destiné à l’élaboration du vin rouge
        (ingrédient, additif, levure, agent de collage, kit, etc.).
    wine_body:
      name: Corps du vin
      description: Décrit le poids perçu du vin et sa sensation en bouche.
    wine_carbonation:
      name: Effervescence du vin
      description: Indique si le vin est tranquille, perlant ou mousseux et, s’il
        y a lieu, l’intensité de l’effervescence.
    wine_making_ingredient_type:
      name: Type d’ingrédient de vinification
      description: Précise la catégorie fonctionnelle des ingrédients et additifs
        consommables utilisés en vinification.
    wine_making_stage:
      name: Étape de vinification
      description: Indique l’étape du processus de vinification à laquelle se rapporte
        le produit.
    wine_style:
      name: Style de vin
      description: Classe le vin selon son style de production général, au-delà de
        sa couleur, par exemple un vin tranquille, un vin effervescent ou un vin fortifié.
    winemaking_process_stage:
      name: Étape du processus de vinification
      description: Indique l’étape principale du processus de vinification à laquelle
        se rapporte le produit de vinification.
    wing_count:
      name: Nombre d'ailes
      description: Nombre d’ailes ou de bras du boomerang.
    wing_handle_type:
      name: Type à poignée papillon
      description: Précise le type de système de prise en main de l’aile de wingfoil.
    wing_part_type:
      name: Type de pièce d’aile
      description: Indique le composant précis ou la pièce de rechange d’une aile
        de wingfoil.
    wingfoiling_style:
      name: Type de pratique du wingfoil
      description: Indique la discipline ou le type de pratique du wingfoil visé par
        le produit.
    wiper_arm_finish:
      name: Finition du bras d’essuie-glace
      description: Finition de surface ou revêtement de protection appliqué au bras
        d’essuie-glace, dont dépendent la résistance à la corrosion et l’aspect.
    wiper_arm_pivot_mount_type:
      name: Type de fixation du bras d’essuie-glace sur pivot
      description: Précise le mode de montage du bras d’essuie-glace sur la tringlerie
        ou le pivot du système d’essuie-glace du véhicule.
    wiper_blade_attachment_type:
      name: Type de fixation du balai d’essuie-glace
      description: Précise le type de connecteur ou de fixation utilisé pour monter
        le balai d’essuie-glace sur le bras.
    wiper_blade_rubber_material:
      name: Matériau de l’élément en caoutchouc du balai d’essuie-glace
      description: Matériau de l’élément d’essuyage en contact avec le vitrage (lame
        ou recharge).
    wiper_system_position:
      name: Position du système d’essuie-glace
      description: Indique la position de montage du système d’essuie-glace sur le
        véhicule.
    wire_coating_material:
      name: Matériau de revêtement pour fils métalliques
      description: Précise le matériau qui enveloppe le fil, sous forme de gaine ou
        de revêtement extérieur, et non le matériau de l’âme, car il conditionne la
        résistance à l’abrasion et la facilité de passage dans les trous des perles.
    wire_coating_type:
      name: Type de revêtement du fil
      description: Précise si le fil reçoit un revêtement ou une gaine, et de quelle
        manière, pour en modifier la couleur, le protéger ou lui donner une texture.
    wire_construction_type:
      name: Type de construction en fil métallique
      description: Précise la structure physique du fil pour perles, par exemple s’il
        est multibrin ou plein et s’il comporte un revêtement.
    wire_finish:
      name: Finition du fil
      description: Précise la finition de surface, le revêtement ou le placage appliqué
        au fil (p. ex., poli, émaillé, galvanisé ou plaqué), qui conditionne l’aspect
        et la résistance au ternissement ou à la corrosion.
    wire_gauge_awg:
      name: Calibre du fil (AWG)
      description: Calibre American Wire Gauge (AWG) des conducteurs utilisés dans
        le faisceau de câbles.
    wire_insulation_material:
      name: Matériau d'isolation pour fils
      description: Matériau de l’isolant ou de la gaine du fil dans le faisceau, qui
        conditionne la résistance à la chaleur et aux agents chimiques.
    wire_packaging_type:
      name: Type d'emballage en fil métallique
      description: Précise le mode de vente ou de conditionnement du fil.
    wire_shape_profile:
      name: Forme ou profil du fil
      description: Décrit la forme de la section transversale du fil.
    wiring_configuration:
      name: Configuration du câblage
      description: Indique si l’épée d’escrime est fournie précâblée pour l’enregistrement
        électrique des touches, non câblée, sans fil ou prévue pour une pratique non
        électrique.
    wobbler_style:
      name: Type de poisson nageur
      description: Définit le type de conception ou de nage du poisson nageur, par
        exemple un crankbait ou un jerkbait.
    wood_block_surface_preparation:
      name: Préparation de la surface du bloc de bois
      description: Indique l’état prêt à l’emploi de la surface du bloc de bois pour
        la finition et les travaux créatifs.
    wood_grain_direction:
      name: Sens du fil du bois
      description: Sens du fil du bois par rapport à la plus grande dimension du produit,
        facteur déterminant pour la solidité, le comportement à la coupe et l’aspect.
    wood_slice_edge_style:
      name: Type de bord de la tranche de bois
      description: État du bord de la tranche, par exemple un bord naturel avec écorce
        ou un bord lisse et poncé.
    wooden_block_special_features:
      name: Caractéristiques particulières des blocs de bois
      description: Caractéristiques fonctionnelles notables présentes dans le jeu
        de blocs de bois.
    woodwind_body_construction:
      name: Construction du corps de l’instrument de la famille des bois
      description: Indique si l’instrument est fabriqué d’une seule pièce ou en plusieurs
        sections (p. ex., en 2 ou 3 pièces), ce qui conditionne le nettoyage, le rangement
        et le transport.
    woodwind_polishing_cloth_intended_use:
      name: Usage prévu du chiffon de polissage pour instrument de la famille des
        bois
      description: Précise la partie de l’instrument de la famille des bois que le
        chiffon sert principalement à nettoyer ou à polir.
    woodwind_small_part_type:
      name: Type de petite pièce pour instrument de la famille des bois
      description: Précise le type de petite pièce de rechange pour clarinette dont
        il s’agit (p. ex., éléments de clétage, tampons, lièges, feutres ou anneaux).
    woofer_mounting_type:
      name: Type de fixation du haut-parleur de graves
      description: Mode de montage ou d’utilisation prévu du haut-parleur de graves
        (en air libre ou en caisson), avec les formes de montage courantes dans l’automobile.
    woofer_surround_material:
      name: Matériau de la suspension périphérique du haut-parleur de graves
      description: Matériau utilisé pour la suspension périphérique du haut-parleur
        de graves (anneau de suspension extérieur).
    worn_on_finger:
      name: Doigt de port
      description: Précise le doigt prévu pour le port du guide de dé.
    wrap_style:
      name: Style d’enroulement
      description: Indique le nombre de tours formés par la ceinture autour de la
        taille.
    wrapping_occasion:
      name: Occasion d’emballage cadeau
      description: Occasion principale de cadeau ou de célébration à laquelle le papier
        cadeau est destiné.
    wrapping_paper_features:
      name: Caractéristiques du papier cadeau
      description: Propriétés fonctionnelles et durables du papier cadeau, par exemple
        sa résistance à la déchirure, sa teneur en matières recyclées ou son format
        en feuilles prédécoupées.
    wrestling_dummy_design:
      name: Forme du mannequin de lutte
      description: Forme générale du corps ou posture du mannequin, par exemple une
        silhouette humaine debout ou un sac de projection, qui détermine les exercices
        d’entraînement possibles.
    wrestling_mat_safety_certifications:
      name: Certifications de sécurité du tapis de lutte
      description: Énumère les certifications ou normes de sécurité du secteur ou
        d’organismes sportifs auxquelles le tapis est conforme.
    wrist_strap_style:
      name: Modèle à bracelet
      description: Décrit le type de sangle de poignet, ou l’absence de sangle, qui
        conditionne le maintien et l’ajustement.
    wrist_support_style:
      name: Type de support de poignet
      description: Indique la forme ou la conception du support de poignet, par exemple
        une orthèse, un gant, une bande adhésive ou une bande de maintien, afin d’aider
        l’utilisateur à choisir selon ses préférences et l’usage recherché.
    xylophone_range_octaves:
      name: Gamme du xylophone (octaves)
      description: Étendue totale du xylophone exprimée en octaves (p. ex., 2,5 octaves,
        3 octaves, 4 octaves).
    xylophone_resonator_type:
      name: Type de résonateur du xylophone
      description: Type de système de résonateurs utilisé pour amplifier la sonorité,
        le cas échéant.
    yam_variety:
      name: Variété d'igname
      description: Précise le cultivar ou la variété courante d’igname vendue (p.
        ex., violette, jaune ou pied d’éléphant).
    yarn_cutter_physical_style:
      name: Forme du coupe-fil pour laine
      description: Indique la forme du coupe-fil pour laine (p. ex., pendentif, bague
        ou ciseaux coupe-fil), afin de faciliter la navigation et le filtrage dans
        cette catégorie.
    yarn_finish_or_effect:
      name: Finition ou effet du fil
      description: Présente les traitements visuels ou fonctionnels particuliers appliqués
        au fil, par exemple la fluorescence ou les reflets métalliques.
    yarn_guide_style:
      name: Type de guide-fil
      description: Forme du composant de guidage du fil.
    yarn_swift_adjustability:
      name: Possibilités de réglage du dévidoir à laine
      description: Indique si le dévidoir à laine est réglable et de quelle manière
        (extensible, repliable ou pliable), ce qui conditionne le rangement et les
        tailles d’écheveaux compatibles.
    yarn_swift_bearing_type:
      name: Type de roulement du dévidoir à laine
      description: Décrit le système d’appui de rotation (p. ex., roulement à billes),
        qui conditionne la fluidité et la vitesse d’enroulement.
    yeast_application:
      name: Utilisation de la levure
      description: Indique l’usage principal prévu du produit à base de levure, en
        cuisine ou en fermentation.
    yo_yo_accessory_part_type:
      name: Type d’accessoire ou de pièce de yo-yo
      description: Indique le type de pièce de rechange ou d’accessoire du yo-yo (p.
        ex., une corde, un roulement ou des tampons de réponse).
    yo_yo_axle_system_type:
      name: Type d’axe du yo-yo
      description: Type de construction de l’axe du yo-yo (p. ex., axe fixe ou transaxe),
        qui conditionne les sensations de jeu et l’entretien.
    yo_yo_bearing_size_class:
      name: Format de roulement du yo-yo
      description: Format standard du roulement utilisé par le yo-yo, le cas échéant.
    yo_yo_bearing_type:
      name: Type de roulement du yo-yo
      description: Configuration du roulement qui conditionne la réactivité du yo-yo
        et son comportement en rotation.
    yo_yo_play_style:
      name: Style de jeu du yo-yo
      description: Style de jeu principal prévu pour le yo-yo, selon le type de figures
        ou de jeu à la corde pour lequel le produit est conçu.
    yo_yo_response_system:
      name: Mécanisme de réponse du yo-yo
      description: Précise le mécanisme de réponse du yo-yo avec lequel cette pièce
        est compatible.
    yo_yo_responsiveness:
      name: Réactivité du yo-yo
      description: Indique si le yo-yo remonte après une traction sur la corde (réactif)
        ou s’il nécessite une technique de bind (non réactif).
    yo_yo_string_material:
      name: Matière de la corde de yo-yo
      description: Composition de la corde de yo-yo.
    yogurt_base_ingredient:
      name: Ingrédient de base du yaourt
      description: Indique la base principale, laitière ou végétale, utilisée pour
        fabriquer le yaourt, afin de tenir compte des préférences alimentaires et
        des allergènes.
    yoke_type:
      name: Type de fourche
      description: Indique le type de berceau ou de fourche servant à maintenir l’arme
        à feu sur le monopode.
    zill_playing_style:
      name: Le style de jeu de Zill
      description: Contexte ou style de jeu prévu (généralement danse orientale, jeu
        orchestral ou variantes culturelles).
    zill_strap_material:
      name: Matériau de la sangle Zill
      description: Matière de la sangle de doigt ou de l’élastique de maintien des
        sagattes, le cas échéant, qui conditionne le confort, la durabilité et l’adhérence.
    zills_strap_adjustability:
      name: Réglage de la sangle des sagattes
      description: Indique si la sangle ou l’élastique inclus est réglable et de quelle
        manière, afin d’ajuster le maintien aux doigts.
    zipper_application:
      name: Usage de la fermeture éclair
      description: Définit l’ouvrage ou l’usage auquel la fermeture éclair est destinée.
    zipper_chain_type:
      name: Type de chaîne de la fermeture éclair
      description: Décrit le type de chaîne ou de denture de la fermeture éclair.
    zipper_end_type:
      name: Type d’extrémité de la fermeture éclair
      description: Indique comment se termine la fermeture éclair, selon qu’elle est
        séparable à extrémité ouverte ou non séparable à extrémité fermée, ainsi que
        les éléments de séparation courants des fermetures éclair de loisirs créatifs.
    zipper_gauge:
      name: Calibre de la fermeture éclair
      description: 'Définit le calibre ou la désignation de taille de la chaîne de
        la fermeture éclair, généralement exprimé par un nombre précédé du signe #
        (par exemple, #3 ou #5), qui correspond à la largeur des dents ou de la spirale
        et à l’usage prévu.'
    zipper_opening_length:
      name: Longueur d’ouverture de la fermeture éclair
      description: Définit la portion de l’ouverture avant munie d’une fermeture éclair,
        afin de distinguer les modèles à fermeture intégrale, demi-zip ou quart de
        zip.
    zipper_pull_material:
      name: Matériau de la tirette de la fermeture éclair
      description: Identifie le matériau de la tirette ou de la languette de la fermeture
        éclair, c’est-à-dire la partie que l’on saisit, distincte des dents, de la
        chaîne et du ruban.
    zipper_pull_side:
      name: Côté de la tirette de la fermeture éclair
      description: Détermine le ou les côtés de la fermeture éclair depuis lesquels
        la tirette est accessible.
    zipper_pull_strap_cord_tab_material:
      name: Matériau de la sangle, du cordon ou de la languette de tirette
      description: Matériau du composant fixé à la tirette, lorsqu’il est présent,
        comme une sangle, un cordon, une languette ou un pompon, à l’exclusion du
        corps principal de la tirette.
    zipper_reversibility_mechanism:
      name: Mécanisme de réversibilité de la fermeture éclair
      description: Décrit le mode de réversibilité de la fermeture éclair (p. ex.,
        curseur double face ou curseur rabattable à verrouillage automatique conçu
        pour les vêtements réversibles).
    zipper_separating_type:
      name: Type de séparation de la fermeture éclair
      description: Distingue les fermetures éclair qui se séparent en bas ou en haut
        de celles qui possèdent une extrémité fermée, pour des produits comme les
        vestes, les sacs de couchage ou les sacs.
    zipper_side:
      name: Côté de la fermeture éclair
      description: Situe la fermeture éclair principale à gauche ou à droite lorsque
        le sac de couchage est posé face vers le haut.
    zipper_slider_material:
      name: Matériau du curseur de la fermeture éclair
      description: Identifie le matériau du curseur de la fermeture éclair, c’est-à-dire
        le mécanisme mobile, qui peut conditionner la résistance mécanique et la résistance
        à la corrosion.
    zipper_slider_pull_configuration:
      name: Configuration du curseur et de la tirette
      description: Décrit si la fermeture éclair comporte un ou deux ensembles curseur-tirette,
        et si les tirettes se trouvent d’un seul côté ou des deux côtés du curseur.
    zipper_style:
      name: Modèle à fermeture éclair
      description: Décrit la présence ou la longueur de la fermeture éclair sur le
        vêtement (p. ex., sans fermeture éclair, quart de zip, demi-zip ou fermeture
        intégrale).
    zipper_tape_material:
      name: Matériau de la bande de fermeture à glissière
      description: Identifie le matériau principal du ruban de la fermeture éclair,
        c’est-à-dire les bandes de tissu cousues dans l’ouvrage.
    zipper_teeth_type:
      name: Type de dents de fermeture éclair
      description: Distingue le type de construction de la chaîne ou des dents de
        la fermeture éclair (p. ex., spirale, plastique moulé, métal ou invisible),
        qui conditionne la souplesse, la résistance et les usages habituels.
    assembly_required:
      name: Assemblage requis
      description: Indique si le produit nécessite un assemblage avant utilisation
    organic_certification:
      name: Certification biologique
      description: Identifie la certification biologique ou de durabilité détenue
        par le produit
