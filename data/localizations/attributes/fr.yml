      description: Identifie le type d’animal pour lequel le produit est conçu, par
        exemple, cheval ou chèvre
    suitable_for_art_technique:
      name: Convient à la technique artistique
      description: Spécifie les méthodes artistiques pour lesquelles un produit en
        papier est adapté, par exemple, peinture à l’aquarelle
    suitable_for_bird_type:
      name: Convient au type d’oiseau
      description: Associe les produits à des espèces d’oiseaux spécifiques, par exemple
        canari, perroquet
    suitable_for_boat_type:
      name: Convient au type de bateau
      description: Identifie le type de bateau pour lequel un produit est conçu, comme
        un kayak ou un canot
    suitable_for_body/facial_hair:
      name: Convient aux poils du corps/visage
      description: Identifie si un produit convient à la pilosité corporelle ou faciale
    suitable_for_breed_size:
      name: Convient à la taille de la race
      description: Identifie la taille de race appropriée pour les produits pour animaux
        de compagnie, comme grande ou moyenne
    suitable_for_bug_type:
      name: Convient au type de bug
      description: Précise quels insectes le produit repousse, par exemple les moustiques,
        les tiques
    suitable_for_camera/optics_device:
      name: Convient aux appareils de caméras et d’optiques
      description: Identifie l’appareil photo ou le dispositif optique spécifique
        avec lequel le produit est compatible, par exemple, appareil photo numérique
        ou perche à selfie
    suitable_for_camera_type:
      name: Convient au type de caméra
      description: Identifie les modèles d’appareil photo avec lesquels le produit
        est compatible, par exemple, reflex ou caméscope
    suitable_for_camping_activity:
      name: Convient pour le camping
      description: Précise la compatibilité avec des activités de camping spécifiques,
        généralement pour les tentes ; par exemple plage, randonnée
    suitable_for_chair_type:
      name: Convient au type de chaise
      description: Précise les types d’assises pour lesquels le produit est conçu,
        comme un banc ou un tabouret
    suitable_for_container_type:
      name: Convient au type de conteneur
      description: Identifie le type de contenant pour lequel le produit est conçu,
        par exemple, bouteille ou canette
    suitable_for_crafting_material:
      name: Convient pour le matériel de fabrication
      description: Spécifie les matériaux de fabrication compatibles avec un produit,
        par exemple, métal ou verre
    suitable_for_door_type:
      name: Convient au type de porte
      description: Identifie le type de porte pour lequel le produit est conçu, par
        exemple, à simple ou double battant
    suitable_for_egg_type:
      name: Convient au type d’œuf
      description: Identifie le type d’œufs qu'un incubateur peut accueillir, comme
        de poulet ou de canard
    suitable_for_fabric_type:
      name: Convient au type de tissu
      description: Identifie le type de tissu pour lequel un produit est adapté, par
        exemple, tissu synthétique ou naturel
    suitable_for_fire_class:
      name: Convient à la classe incendie
      description: Indique les classes de feu que le produit peut éteindre, par exemple
        A, D
    suitable_for_fish_type:
      name: Convient au type de poisson
      description: Précise le type de poisson auquel un produit est destiné, par exemple
        poissons d’étang, poissons tropicaux
    suitable_for_food_processor_type:
      name: Convient au type de robot culinaire
      description: Identifie le type de robot culinaire pour lequel le produit est
        conçu, comme un mixeur
    suitable_for_furniture_type:
      name: Convient au type de meuble
      description: Identifie le type de meuble pour lequel le produit est conçu, généralement
        pour les housses ; par exemple universel, chaise longue
    suitable_for_gas_type:
      name: Convient au type de gaz
      description: Identifie le type de gaz avec lequel un produit est compatible,
        par exemple, propane ou éthanol
    suitable_for_hair_type:
      name: Convient au type de cheveux
      description: Précise les besoins des cheveux pour lesquels un produit est conçu,
        par exemple bouclés, fins
    suitable_for_material_type:
      name: Convient au type de matériau
      description: Identifie le matériau pour lequel un produit est adapté, généralement
        pour les outils, par exemple, céramique ou pierre
    suitable_for_pest_type:
      name: Convient au type de ravageur
      description: Identifie les espèces nuisibles ciblées par le produit, par exemple
        souris, virus
    suitable_for_pipe_type:
      name: Convient au type de tuyau
      description: Identifie le type de tuyau avec lequel un outil peut être utilisé,
        par exemple, PVC ou cuivre
    suitable_for_pool_type:
      name: Convient au type de piscine
      description: Précise le type de piscine pour laquelle le produit est conçu,
        par exemple gonflable, hors sol
    suitable_for_power_equipment_type:
      name: Convient au type d’équipement électrique
      description: Identifie le type d’équipement électrique extérieur pour lequel
        le produit est conçu, par exemple, tondeuse à gazon ou souffleur de feuilles
    suitable_for_precious_material:
      name: Convient aux matériaux précieux
      description: Identifie si un produit est approprié pour une utilisation avec
        des matériaux précieux, par exemple, or ou argent
    suitable_for_printer_type:
      name: Convient au type d’imprimante
      description: Précise le type d’imprimante avec lequel le produit est compatible,
        par exemple une imprimante d’étiquettes, un télécopieur
    suitable_for_skin_tone:
      name: Convient au teint
      description: Adapte les produits à des teints spécifiques, par exemple teint
        pâle, peau foncée
    suitable_for_skin_type:
      name: Convient au type de peau
      description: Précise les produits destinés à des affections cutanées spécifiques,
        comme la peau sèche, vieillissante ou sensible
    suitable_for_snowshoeing_activity:
      name: Convient à la pratique de raquette
      description: Préciser la compatibilité avec différents types de raquette à neige,
        comme la course ou le travail
    suitable_for_storage_type:
      name: Convient au type de stockage
      description: Précise les éléments que le produit peut stocker, par exemple les
        déchets, les outils de jardinage
    suitable_for_toothbrush:
      name: Convient à la brosse à dents
      description: Précise les types de brosses à dents avec lesquels le produit est
        compatible, comme les têtes de brosse à dents électriques
    suitable_for_user_sensitivity_level:
      name: Adéquation avec la sensibilité de l’utilisateur
      description: Indique si la formule convient aux utilisateurs ayant les dents
        sensibles
    suitable_for_vehicle_type:
      name: Convient au type de véhicule
      description: Identifie le type de véhicule avec lequel un produit est compatible,
        par exemple une voiture ou un camion
    suitable_for_water_feature_type:
      name: Convient au type de caractéristique de l’eau
      description: Identifie le type d’élément aquatique pour lequel le produit est
        adapté, par exemple, étang ou fontaine
    suitable_for_water_type:
      name: Convient au type d’eau
      description: Précise si un produit convient à l’eau douce, à l’eau salée ou
        aux deux
    suitable_for_weapon_type:
      name: Convient au type d’arme
      description: Identifie le type d’arme pour lequel une lunette ou un viseur est
        conçu, par exemple, pistolet ou fusil de chasse
    suitable_installation:
      name: Installation adaptée
      description: Identifie la méthode d’installation appropriée d’un produit, par
        exemple, au-dessus du sol ou sous le sol
    suitable_location:
      name: Emplacement approprié
      description: 'Indique l’emplacement idéal du produit dans la maison, par exemple
        une chambre, une terrasse '
    suitable_space:
      name: Espace approprié
      description: Définit l’emplacement idéal pour l’utilisation du produit, par
        exemple à l’intérieur, au-dessus du sol
    suitcase_handle_type:
      name: Type de poignée de valise
      description: Spécifie le style de poignée de valise, par exemple, portage latéral
        ou portage par le haut
    sulfur_content:
      name: Contient du soufre
      description: Spécifie la concentration de soufre dans le mazout de chauffage
        résidentiel, par exemple, ultra-faible ou élevée
    sunlight:
      name: Lumière du soleil
      description: Précise la quantité de lumière solaire nécessaire aux plantes,
        comme l’ombre ou le plein soleil
    sunscreen_filter_type:
      name: Type de filtre solaire
      description: Identifie le type de filtres UV utilisés dans la formule (chimique,
        minéral ou hybride)
    supplement_health_focus:
      name: Objectif santé du complément alimentaire
      description: Définit le principal aspect bien-être que le complément alimentaire
        est destiné à soutenir
    support/brace_material:
      name: Matériau du support/de l’attache
      description: Identifie le matériau utilisé dans les soutiens ou les orthèses,
        par exemple, néoprène ou mousse
    support_cushion_features:
      name: Caractéristiques du coussin de soutien
      description: Met en évidence les fonctionnalités supplémentaires ou les améliorations
        offertes par le coussin
    support_level:
      name: Niveau de support
      description: Indique le niveau global de stabilité ou de soutien offert par
        l’orthèse pour différentes gravités de blessures ou niveaux d’activité
    support_rigidity_level:
      name: Niveau de rigidité du soutien
      description: Décrit la fermeté globale ou le support structurel fourni par la
        semelle, du rembourrage souple au support rigide
    supported_audio_sources:
      name: Sources audio prises en charge
      description: Répertorie les sources de lecture ou d’entrée que l’unité peut
        prendre en charge
    supported_countries:
      name: Pays pris en charge
      description: Répertorie les pays ou territoires spécifiques où fonctionne la
        carte SIM/eSIM ou le forfait prépayé
    supported_display_technologies:
      name: Technologies d’affichage prises en charge
      description: Répertorie les types d’écrans ou de technologies d’écran que le
        calibrateur peut profiler ou mesurer
    supported_dvi_link_type:
      name: Type de liaison DVI pris en charge
      description: Indique si l’appareil prend en charge les normes de signal DVI
        à liaison simple, double ou les deux
    supported_erase_modes:
      name: Modes d’effacement pris en charge
      description: Répertorie les normes d’effacement sécurisé qu’un duplicateur peut
        appliquer aux disques cibles
    supported_input_types:
      name: Types d’entrées pris en charge
      description: Répertorie les types d’entrées audio que la tranche de console
        accepte (par exemple, Mic, Ligne, Instrument Hi-Z)
    supported_language:
      name: Langue prise en charge
      description: Spécifie les langues prises en charge par un produit logiciel,
        par exemple, anglais ou espagnol
    supported_media_sources:
      name: Sources multimédia prises en charge
      description: Définit les entrées multimédia physiques ou numériques à partir
        desquelles l’unité peut lire de la musique
    supported_raid_levels:
      name: Niveaux RAID pris en charge
      description: Répertorie les configurations de baies de disques que le contrôleur
        de stockage intégré peut utiliser
    supported_scan_media_type:
      name: Type de support de numérisation pris en charge
      description: Répertorie les types d’originaux que le scanner peut traiter (par
        exemple, différents types de films, impressions réfléchissantes)
    supported_sdi_standards:
      name: Normes SDI prises en charge
      description: Indique les débits/normes SDI (SD-SDI, HD-SDI, 3G-SDI, etc.) que
        l’appareil prend en charge pour la transmission du signal
    supported_usb_device_types:
      name: Types de périphériques USB pris en charge
      description: Spécifie les types de périphériques de stockage USB que le duplicateur
        peut gérer
    surface_sides:
      name: Côtés de surface
      description: Indique si le plateau d’impression peut être utilisé sur un ou
        deux côtés
    surface_texture:
      name: Texture de surface
      description: Décrit la texture ou le motif sur la surface d’un produit, généralement
        pour les préservatifs, par exemple, lisse ou nervuré
    surfboard_features:
      name: Caractéristiques de la planche de surf
      description: Spécifie les caractéristiques uniques d’une planche de surf, par
        exemple, gonflable ou rigide
    surveillance_camera_design:
      name: Conception de caméra de surveillance
      description: Identifie le type de conception des caméras de sécurité, par exemple,
        thermique ou panoramique
    surveillance_camera_mounting_type:
      name: Type de montage de caméra de surveillance
      description: Identifie le mode d’installation d’une caméra de surveillance,
        par exemple, au mur ou au plafond
    surverying_accessories_included:
      name: Accessoires d’arpentage inclus
      description: Spécifie les composants supplémentaires fournis avec des outils
        d’arpentage, tels qu’une pince ou une tige de nivellement
    suspender_style:
      name: Style de bretelles
      description: 'Définit le style de bretelles, par exemple en X, en Y '
    sustainability:
      name: Durabilité
      description: Met en avant les produits qui soutiennent des pratiques durables,
        par exemple le commerce équitable, l’approvisionnement responsable
    swab_end_configuration:
      name: Type d’extrémité du coton-tige
      description: Indique si le coton-tige a une ou deux extrémités utilisables,
        et si les extrémités sont différentes
    swab_material:
      name: Matériau de l’écouvillon
      description: Spécifie le tissu de l’écouvillon de nettoyage d’un instrument
        de musique, par exemple, soie ou feutre
    swimwear_features:
      name: Caractéristiques du maillot de bain
      description: Identifie les caractéristiques spéciales d’un maillot de bain,
        par exemple, séchage rapide ou protection solaire FPS
    swing_style:
      name: Style de basculement
      description: Classement basé sur la technique de swing, généralement pour les
        raquettes de tennis ; par exemple des coups longs
    swing_weighting:
      name: Poids d’oscillation
      description: Indique la répartition du poids d’une batte de baseball ou de softball,
        par exemple équilibrée, charge finale
    switch_control_type:
      name: Type de contrôle de commutation
      description: Décrit la manière dont un interrupteur est commandé, par exemple,
        par un bouton ou un capteur
    switch_management_type:
      name: Type de gestion de commutation
      description: Classe le niveau ou le style de gestion et de configuration pris
        en charge par le commutateur (par exemple, non géré, intelligent, géré par
        le Web, entièrement géré)
    switch_mechanism:
      name: Mécanisme de commutation
      description: Identifie la technologie d’actionnement interne du bouton (par
        exemple, microcommutateur, optique), influant sur le toucher, la durée de
        vie et la réactivité
    switch_stem_compatibility:
      name: Compatibilité des tiges de commutation
      description: Identifie les styles mécaniques ou autres de tiges de commutation
        auxquels la touche ou l’ensemble de touches est adapté
    switching_layer:
      name: Couche de commutation
      description: Indique la couche OSI la plus élevée à laquelle le commutateur
        fonctionne en mode natif (par exemple, couche 2, couche 3, hybrides)
    switching_method:
      name: Méthode de commutation
      description: Définit la méthode utilisée pour basculer entre les différentes
        entrées dans les produits électroniques ; télécommande par exemple
    synthesis_method:
      name: Méthode de synthèse
      description: Spécifie la méthode de synthèse sonore dans les instruments électroniques,
        par exemple, instruments virtuels analogiques ou modulaires
    system/power_cable_connector_type_end_a:
      name: Type de connecteur de câble système/alimentation (extrémité A)
      description: Identifie la norme exacte de connecteur présent sur la première
        extrémité du câble (par exemple, IEC C14, NEMA 5-15P, USB-C)
    system/power_cable_connector_type_end_b:
      name: Type de connecteur de câble système/alimentation (extrémité B)
      description: Identifie la norme exacte de connecteur présent sur la deuxième
        extrémité du câble (par exemple, IEC C13, DC 5,5 × 2,1 mm, fiche banane)
    system_components_included:
      name: Composants du système inclus
      description: Répertorie les principales pièces matérielles livrées avec le système
        afin que les acheteurs comprennent ce qui fait partie ou non du lot
    system_of_measurement:
      name: Système de mesure
      description: Identifie l’unité de mesure utilisée dans un produit, par exemple,
        impériale ou métrique
    system_range:
      name: Étendue du système
      description: Définit la zone opérationnelle des systèmes d’alarme médicale,
        par exemple à domicile, GPS
    systems_supported:
      name: Systèmes pris en charge
      description: Précise les plateformes de jeu avec lesquelles un produit est compatible ;
        par exemple Xbox, Nintendo Switch
    tab_style:
      name: Style de séparateur
      description: Spécifie le style des onglets sur les accessoires pour classeurs,
        par exemple, pré-imprimés ou numérotés
    tablet_case_functional_features:
      name: Caractéristiques fonctionnelles de la coque pour tablette
      description: Met en évidence les principales fonctionnalités supplémentaires
        incluses avec la coque pour tablette
    tabletop_color:
      name: Couleur du plateau de table
      description: Précise la couleur de la surface supérieure d’une table, comme
        le noir ou le blanc
    tabletop_material:
      name: Matériau du plateau de table
      description: Identifie la composition de la surface de la table, par exemple
        contreplaqué, béton
    tabletop_pattern:
      name: Modèle du plateau de table
      description: Définit le motif ou l’impression sur une surface de table, comme
        Noël ou solide
    tabletop_shape:
      name: Forme du plateau de table
      description: Décrit la forme géométrique du dessus de table, par exemple carré,
        en forme de rein
    tableware_material:
      name: Matériau de la vaisselle
      description: Précise la composition de la vaisselle, par exemple, porcelaine
        ou faïence
    tack/pushpin_head_design:
      name: Conception de tête de l’épingle à nourrice
      description: Décrit la forme d’une punaise ou d’une tête de punaise, par exemple,
        ronde ou décorative
    tag_fastening:
      name: Fixation par étiquette
      description: Décrit la méthode utilisée pour fixer une étiquette sur un bagage,
        par exemple, boucles ou passants
    talc_content:
      name: Teneur en talc
      description: Indique si la formulation contient du talc, est sans talc ou utilise
        des niveaux réduits de talc
    tampon_absorbency_level:
      name: Degré d’absorption du tampon
      description: Identifie la capacité d’absorption de tampons, telle que légère
        ou abondante
    tampon_features:
      name: Caractéristiques du tampon
      description: Décrit les caractéristiques spécifiques des tampons, par exemple,
        conception confortable ou étanches
    tan_type:
      name: Type de bronzage
      description: Définit l’intensité de la couleur et le processus d’application
        des articles de bronzage, par exemple foncé, instantané
    tank_color:
      name: Couleur du réservoir
      description: Identifie la couleur d’un produit, généralement les réservoirs
        des toilettes, par exemple, noir ou blanc
    tank_material:
      name: Matériau du réservoir
      description: Précise le matériau du réservoir d’un produit, généralement destiné
        aux outils de jardinage ; par exemple le métal, le plastique
    tank_pattern:
      name: Modèle de réservoir
      description: Identifie le motif visuel sur des réservoirs de toilettes, tel
        qu’uni ou abstrait
    tape_cartridge_format:
      name: Format de bande magnétique
      description: Spécifie les technologies de bande magnétique (par exemple, LTO,
        DAT, DLT) que le lecteur peut lire ou sur lesquelles il peut écrire
    tape_cartridge_generation:
      name: Génération de bande magnétique
      description: Indique la génération ou version spécifique dans une famille de
        technologie de bande (généralement les générations LTO) que le lecteur prend
        en charge
    tape_material:
      name: Matériau du ruban
      description: Spécifie le type de matériau utilisé dans les produits de ruban,
        par exemple, vinyle ou plastique
    tape_speed_supported:
      name: Vitesse de bande prise en charge
      description: Répertorie les vitesses de lecture et d’enregistrement (pouces
        par seconde) auxquelles l’unité bobine à bobine peut fonctionner
    target_audience:
      name: Audience cible
      description: Spécifie à quelle catégorie de personnes un produit convient, par
        exemple, enfants ou tous âges
    target_facial_zone:
      name: Zone cible du visage
      description: Spécifie la zone du visage pour laquelle la bandelette pour les
        pores est conçue (par exemple, nez, menton, zone T)
    target_gender:
      name: Sexe cible
      description: Identifie le sexe prévu pour un produit, comme féminin, masculin
        ou unisexe
    targeted_pests:
      name: Ravageurs ciblés
      description: Identifie le type de nuisibles contre lesquels un produit est efficace,
        par exemple les moisissures, les algues
    targeted_skin_concern:
      name: Préoccupation de peau cible
      description: Indique la lésion ou l’affection cutanée spécifique que le produit
        est formulé pour traiter
    targeted_stains:
      name: Taches ciblées
      description: Identifie les types de taches qu’un produit est conçu pour traiter,
        comme la nourriture ou la boue
    tea_input_type:
      name: Type d’insertion du thé
      description: Précise le style de préparation du thé, par exemple en sachets,
        K-cups
    technology_level:
      name: Niveau technologique
      description: Indique la complexité de la technologie d’un produit, par exemple
        basique, avancé
    teeth_material:
      name: Matériau des dents
      description: Identifie le matériau utilisé dans les dents, généralement pour
        les outils de jardinage ; par exemple le plastique, le métal
    telephone_cable_interface:
      name: Interface du câble téléphonique
      description: Définit le type de fiche utilisé dans les câbles téléphoniques,
        comme RJ-10
    telephone_cable_second_interface:
      name: Deuxième interface du câble téléphonique
      description: Définit le type de connecteur sur l’extrémité opposée du câble
        quand il diffère de l’interface principale (par exemple, RJ45 vers RJ11)
    telephone_cord_style:
      name: Style de cordon de téléphone
      description: Spécifie la forme physique du cordon de téléphone afin d’aider
        les clients qui ont besoin d’un cordon droit, en spirale ou spécial pour les
        combinés de remplacement et les supports muraux
    telephone_style:
      name: Style de téléphone
      description: Définit le design ou l’esthétique d’un téléphone, par exemple vintage,
        nouveauté
    telescope_level:
      name: Niveau du télescope
      description: Indique la complexité ou le niveau de compétence requis pour un
        télescope, par exemple débutant ou avancé
    telescope_tracking_system:
      name: Système de suivi du télescope
      description: Identifie le type de système de suivi de télescopes, par exemple
        manuel ou motorisé
    television_circuit_board_type:
      name: Type de circuit imprimé pour TV
      description: Identifie le rôle fonctionnel du circuit imprimé dans un téléviseur
        (par exemple, carte mère, carte d’alimentation, carte T-Con)
    television_shape:
      name: Forme de la télévision
      description: Définit le contour physique de l’écran de télévision, par exemple
        incurvé ou plat
    television_speaker_position:
      name: Position du haut-parleur sur la télévision
      description: Identifie l’emplacement physique ou le rôle du haut-parleur dans
        l’assemblage du téléviseur (par exemple, gauche, droite, centre, caisson de
        basses)
    television_specialized_features:
      name: Fonctionnalités spécialisées de la télévision
      description: Identifie les capacités uniques d’un téléviseur, par exemple, commande
        vocale ou barre de son intégrée
    temperature:
