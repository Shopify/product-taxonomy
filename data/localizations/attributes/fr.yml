    compatible_power_supply_form_factor:
      name: Facteur de forme d’alimentation compatible
      description: Spécifie la taille ou la norme du bloc d’alimentation (PSU) pour
        laquelle le boîtier est conçu
    compatible_printer:
      name: Imprimante compatible
      description: Identifie le type d’imprimante avec lequel un produit est compatible,
        par exemple, laser ou jet d’encre
    compatible_processor_series:
      name: Série de processeur compatible
      description: Précise la série de processeurs avec laquelle le produit est compatible,
        comme AMD Ryzen ou Intel core solo
    compatible_programming_languages:
      name: Langage de programmation compatible
      description: Identifie les langages de programmation avec lesquels un produit
        logiciel peut fonctionner, par exemple, Python ou Java
    compatible_recipes:
      name: Recettes compatibles
      description: Précise les recettes adaptées au produit, généralement destinées
        aux sorbetières et turbines à glace ; par exemple sorbet, glace
    compatible_resin_type:
      name: Type de résine compatible
      description: Spécifie les catégories de résine UV qu’une imprimante SLA/MSLA
        peut utiliser
    compatible_resolution:
      name: Résolution compatible
      description: Définit la résolution d’affichage prise en charge, par exemple
        1080p, full HD
    compatible_satellite_radio_service:
      name: Service de radio satellite compatible
      description: Identifie le ou les services de radio satellite avec lesquels le
        récepteur est conçu pour fonctionner, garantissant la compatibilité avec les
        abonnements existants ou prévus
    compatible_seat_type:
      name: Type de siège compatible
      description: Précise le type de siège auto pour enfant auquel le produit s’adapte,
        comme un rehausseur ou un siège auto pour bébé
    compatible_shoe_size:
      name: Pointure compatible
      description: Fait correspondre des produits à des pointures spécifiques, par
        exemple 12, 42
    compatible_software_platform:
      name: Plateforme logicielle compatible
      description: Identifie les plates-formes logicielles avec lesquelles un produit
        est compatible, par exemple, Adobe Creative ou Canva
    compatible_special_effects_device:
      name: Appareil à effets spéciaux compatible
      description: Identifie les dispositifs d’effets spéciaux avec lesquels un produit
        peut fonctionner, par exemple, lumières LED ou machines fumigènes
    compatible_stove_top_type:
      name: Type de cuisinière compatible
      description: Identifie le type de cuisinière avec lequel le produit peut être
        utilisé, par exemple, gaz ou induction
    compatible_string_instrument:
      name: Instrument à cordes compatible
      description: Identifie l’instrument à cordes pour lequel le produit est conçu,
        par exemple, ukulélé ou guitare basse
    compatible_stroller_type:
      name: Type de poussette compatible
      description: Précise le type de poussette auquel le produit s’adapte, parapluie
        ou jogging par exemple
    compatible_vacuum_type:
      name: Type d’aspirateur compatible
      description: Précise le type d’aspirateur avec lequel le produit est compatible,
        comme un aspirateur portatif ou à vapeur
    compatible_vehicle:
      name: Véhicule compatible
      description: Précise le type de véhicule pour lequel un produit est conçu, comme
        une voiture ou un SUV
    compatible_voice_assistant:
      name: Assistant vocal compatible
      description: Identifie les plateformes de contrôle vocal qui peuvent faire fonctionner
