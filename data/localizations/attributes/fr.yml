    trophy_design:
      name: Conception du trophée
      description: Décrit le style ou la forme spécifique d’un trophée, par exemple,
        coupe ou étoile
    truck_type:
      name: Type de camion
      description: Classifie le type de camion, par exemple, à benne ou à plateau
    tube_component:
      name: Composant du tube
      description: Spécifie le type de tube dans les amplificateurs de musique, par
        exemple, boîtier ou support
    tube_configuration:
      name: Configuration du tube
      description: Décrit la disposition des tubes dans un amplificateur d’instrument
        de musique, par exemple, tube unique ou paire appariée
    tuner_design:
      name: Conception de l’accordeur
      description: Décrit le style d’accordeurs électroniques pour instruments de
        musique, comme à pince ou à pédale
    tuner_type:
      name: Type d’accordeur
      description: Définit le type de fréquence radio reçue, comme AM/FM ou radio
        satellite
    tuning_fork_design:
      name: Conception du diapason
      description: Décrit la conception spécifique d’un diapason, par exemple, lestée
        ou non lestée
    tuning_fork_frequency:
      name: Fréquence du diapason
      description: Spécifie la fréquence d’un diapason, par exemple, 128 Hz ou 256 Hz
    tuning_modes:
      name: Modes de réglage
      description: Identifie les paramètres d’instrument spécifiques pour les accordeurs
        électroniques, par exemple, guitare ou violon
    tuning_pitch:
      name: Hauteur d’accord
      description: Spécifie la hauteur d’accordage d’un instrument, par exemple, do#
        ou lab
    tuning_range:
      name: Étendue de réglage
      description: Spécifie la gamme d’options d’accordage disponibles, par exemple,
        standard ou ouvert
    tv_broadcast_standards_supported:
      name: Normes de diffusion TV prises en charge
      description: Répertorie les normes spécifiques de diffusion télévisuelle ou
        câble/satellite que la carte ou l’adaptateur peut décoder ou recevoir
    uc_platform_certification:
      name: Certification de plateforme UC
      description: Identifie les plateformes de communications unifiées (UC) ou de
        réunion pour lesquelles l’appareil est officiellement certifié
    ultrasound_probe_type:
      name: Type de sonde à ultrasons
      description: Identifie les caractéristiques de conception de la sonde fournie
        avec le moniteur (par exemple, étanche, interne)
    undershirt_style:
      name: Style maillot de corps
      description: Décrit le style ou la coupe d’un maillot de corps, comme à col
        rond ou en V
    underwear_style:
      name: Style de sous-vêtements
      description: Définit le design et la coupe des sous-vêtements, comme les bikinis
        ou les culottes gainantes
    units_of_measurement:
      name: Unités de mesure
      description: Précise le système de mesure utilisé pour le produit, par exemple
        millimètres (mm), Fahrenheit (°F)
    update_frequency:
      name: Fréquence de mise à jour
      description: Indique la régularité des mises à jour des logiciels ou des données,
        par exemple, en temps réel ou annuellement
    upholstery_color:
      name: Couleur du revêtement
      description: Identifie la couleur du revêtement d’un produit, par exemple, rouge
        ou beige
    upholstery_material:
      name: Matériau du revêtement
      description: Identifie le tissu utilisé pour le revêtement, par exemple, cuir
        ou velours
    upholstery_pattern:
      name: Motif du revêtement
      description: Décrit le design visuel d’un tissu d’ameublement, par exemple à
        rayures ou à carreaux
    uplink_port_type:
      name: Type de port de liaison montante
      description: Définit le connecteur de liaison montante à la vitesse la plus
        élevée présent sur le commutateur (par exemple, SFP+, QSFP28, 10GBase-T)
    ups_topology:
      name: Topologie UPS
      description: Indique l’approche de conception interne qu’un onduleur utilise
        pour conditionner et fournir l’alimentation (par exemple, veille, interactive,
        en ligne)
    urinal_mounting_type:
      name: Type de montage d’urinoir
      description: Spécifie le mode d’installation d’un urinoir, par exemple, au mur
        ou au sol
    usage_conditions:
      name: Conditions d’utilisation
      description: Précise si le produit est adapté à une utilisation dans des conditions
        sèches ou humides, généralement pour les rasoirs
    usage_environment:
      name: Environnement d’utilisation
      description: Spécifie où le produit bronzant est destiné à être utilisé
    usage_frequency:
      name: Fréquence d’utilisation
      description: Précise la fréquence recommandée d’utilisation du produit, quotidienne
        ou hebdomadaire par exemple
    usage_type:
      name: Type d’utilisation
      description: Précise le cycle d’utilisation prévu du produit, par exemple réutilisable,
        rechargeable
    usb_connector_type:
      name: Type de connecteur USB
      description: Identifie le ou les connecteurs USB physiques fournis sur l’appareil
        pour les données et/ou l’alimentation
    usb_standard:
      name: Norme USB
      description: Précise la version USB pour les appareils électroniques, comme
        USB 2.0 ou USB 3.1 génération 1
    user_type:
      name: Type d’utilisateur
      description: Identifie l’utilisateur prévu d’un produit logiciel, par exemple,
        particulier ou petite entreprise
    utility/maintenance_task_type:
      name: Type de tâche utilitaire/maintenance
      description: Classe la tâche effectuée par un logiciel, par exemple, nettoyage
        de disque de disque ou optimisation du système
    uv_blocking_class:
      name: Classe de protection contre les UV
      description: Indique le niveau de protection contre les UV intégré à la lentille
        de contact tel que défini par les normes ISO
    uv_protection:
      name: Protection contre les UV
      description: Précise la capacité du produit à bloquer les rayons UV, généralement
        pour les lunettes de soleil ; par exemple UV400
    uva_protection_grade:
      name: Indice de protection UVA
      description: Indique le niveau de protection UVA du produit, communément exprimée
        en indices PA
    vacuum_air_filtering_technology:
      name: Technologie de filtration de l’air de l’aspirateur
      description: Précise le type de filtration de l’air utilisé dans les aspirateurs,
        comme HEPA ou PET
    valve_type:
      name: Type de vanne
      description: Précise le type de valve dans les pièces détachées de vélo, par
        exemple Presta, Schrader
    van_type:
      name: Type de fourgon
      description: Distingue les différents types de fourgonnettes, par exemple, de
        tourisme ou transformées
    vaping_style:
      name: Style de vapotage
      description: 'Précise la technique de vapotage pour les cigarettes électroniques,
        par exemple directement dans les poumons, de la bouche aux poumons '
    varnish/finish_application:
      name: Application de vernis/finition
      description: Spécifie les zones d’application appropriées pour un vernis ou
        une finition, par exemple, mur ou porte
    vase_shape:
      name: Forme du vase
      description: Décrit la forme géométrique ou organique d’un vase, rond ou en
        bouteille par exemple
    vcr_configuration:
      name: Configuration du magnétoscope
      description: Identifie si l’unité est un magnétoscope autonome ou un appareil
        combiné avec des lecteurs ou tuners supplémentaires
    vdi_protocol_support:
      name: Prise en charge du protocole VDI
      description: Précise les protocoles Virtual Desktop Infrastructure (VDI) pris
        en charge, par exemple PCoIP, RDP
    vehicle_alarm/lock_features:
      name: Fonctions d’alarme/verrouillage du véhicule
      description: Spécifie les caractéristiques uniques des systèmes de sécurité
        des véhicules, par exemple, démarrage à distance ou résistance aux intempéries
    vehicle_application_area:
      name: Domaine d’application des véhicules
      description: Spécifie la partie d’un véhicule à laquelle le produit s’applique,
        par exemple, sellerie ou extérieur
    vehicle_audio_system_features:
      name: Caractéristiques du système audio du véhicule
      description: Identifie les caractéristiques spéciales du système audio d’un
        véhicule, par exemple, amplification des basses ou affichage LED
    vehicle_braking_features:
      name: Caractéristiques de freinage du véhicule
      description: Décrit les caractéristiques spécifiques des pièces de freinage
        du véhicule, par exemple, résistantes à la corrosion ou perforées
    vehicle_cleaning_item_features:
      name: Caractéristiques de l’article de nettoyage de véhicule
      description: Met en avant les avantages des produits de nettoyage pour véhicules,
        par exemple, meilleure efficacité énergétique ou haute brillance
    vehicle_decor_features:
      name: Caractéristiques de la décoration de véhicule
      description: Décrit les caractéristiques des éléments de décoration du véhicule,
        par exemple, résistance aux UV ou imperméabilité
    vehicle_drive/handling_features:
      name: Fonctionnalités de conduite/maniabilité du véhicule
      description: Décrit les caractéristiques des pièces de véhicules à moteur, généralement
        dans les systèmes de transmission, d’entraînement, de remorquage et de roues,
        par exemple, haute performance ou résistance à la chaleur
    vehicle_engine/part_features:
      name: Caractéristiques du moteur/de la pièce de véhicule
      description: Indique les caractéristiques uniques des pièces du moteur d’un
        véhicule automobile, par exemple efficacité énergétique ou amélioration des
        performances
    vehicle_engine_features:
      name: Caractéristiques du moteur du véhicule
      description: Décrit les caractéristiques spécifiques du moteur d’un véhicule,
        par exemple, haute performance ou économie de carburant
    vehicle_exhaust_type:
      name: Type d’échappement du véhicule
      description: Identifie le type de système d’échappement d’un véhicule, tel que
        l’essieu ou le turbo arrière
    vehicle_features:
      name: Caractéristiques du véhicule
      description: Décrit les caractéristiques ou les équipements spéciaux d’un véhicule,
        par exemple, sièges chauffants ou système de navigation
    vehicle_floor_configuration:
      name: Configuration du plancher du véhicule
      description: Spécifie la conception et la disposition du plancher d’un véhicule
        de transport en commun, comme un plancher surbaissé ou un plancher semi-surbaissé
    vehicle_fluid_features:
      name: Caractéristiques du fluide de véhicule
      description: Décrit les propriétés particulières des fluides pour véhicules,
        par exemple, antigel ou biodégradable
    vehicle_fluid_type:
      name: Type de fluide de véhicule
      description: Identifie le type de fluide à utiliser pour l’entretien d’un véhicule,
        comme concentré ou prédilué
    vehicle_frame/body_features:
      name: Caractéristiques du châssis/de la carrosserie du véhicule
      description: Décrit les caractéristiques particulières des pièces de carrosserie
        d’un véhicule, par exemple, finition peinte ou chromée
    vehicle_mirror_design:
      name: Conception du rétroviseur de véhicule
      description: Spécifie les éléments de conception de rétroviseurs de véhicules
        motorisés, comme extensibles ou pliables
    vehicle_mirror_features:
      name: Caractéristiques du rétroviseur de véhicule
      description: Décrit les caractéristiques spéciales des rétroviseurs pour véhicules,
        par exemple, atténuation automatique ou chauffage
    vehicle_mirror_type:
      name: Type de rétroviseur de véhicule
      description: Identifie le type spécifique de rétroviseur sur un véhicule, tel
        qu’à vue arrière ou latérale
    vehicle_mounting_location:
      name: Emplacement de montage dans le véhicule
      description: Spécifie la zone dans un véhicule où le support est destiné à être
        installé
    vehicle_oil_features:
      name: Caractéristiques de l’huile pour véhicule
      description: Décrit les propriétés uniques de l’huile moteur, par exemple, protection
        contre l’usure ou haute efficacité de filtration
    vehicle_paint_type:
      name: Type de peinture du véhicule
      description: Spécifie la catégorie de peinture pour véhicules, par exemple,
        kit de peinture ou peinture pour carrosseries de véhicules à moteur
    vehicle_placement:
      name: Placement du véhicule
      description: Précise l’endroit où le produit peut être placé sur un vélo, par
        exemple cadre, avant
    vehicle_seating_features:
      name: Caractéristiques des sièges de véhicule
      description: Décrit les caractéristiques particulières des sièges de véhicule,
        par exemple, chauffants ou inclinables
    vehicle_suspension_features:
      name: Caractéristiques de la suspension du véhicule
      description: Spécifie les caractéristiques uniques des pièces de suspension
        pour véhicules, par exemple, réglables ou hydrauliques
    vehicle_tire_type:
      name: Type de pneu de véhicule
      description: Spécifie l’adéquation des pneus de véhicule à la saison ou au terrain,
        par exemple, hiver ou tout-terrain
    vehicle_type:
      name: Type de véhicule
      description: Classifie le type de véhicule, par exemple, SUV ou voilier
    ventilation_type:
      name: Type de ventilation
      description: Décrit le style de ventilation principal ou les caractéristiques
        de flux d’air du boîtier qui gèrent la température interne
    verification_technology:
      name: Technologie de vérification
      description: Identifie la technologie utilisée dans les détecteurs de faux billets,
        par exemple, magnétique ou infrarouge
    vesa_mounting_pattern:
      name: Modèle de montage VESA
      description: Définit l’espacement des trous VESA à l’arrière du moniteur pour
        la compatibilité avec les supports, bras et pieds
    vg/pg_ratio:
      name: Rapport VG/PG
      description: Indique le ratio glycérine végétale/propylène glycol dans les e-liquides,
        par exemple 30:70
    video_codecs/formats_supported:
      name: Codecs/formats vidéo pris en charge
      description: Définit les codecs vidéo et les formats pris en charge par un appareil,
        comme MP4 ou H.264
    video_game_content_features:
      name: Caractéristiques du contenu du jeu vidéo
      description: Identifie les fonctionnalités spéciales des logiciels de jeux vidéo,
        par exemple, contenu téléchargeable (DLC) ou accès anticipé
    video_game_format:
      name: Format de jeu vidéo
      description: Spécifie la méthode de livraison et le type de support pour les
        jeux vidéo, par exemple numérique ou physique
    video_game_genre:
      name: Genre de jeu vidéo
      description: Classifie le type de jeu vidéo, par exemple, familial ou de survie
    video_game_platform:
      name: Plateforme du jeu vidéo
      description: Spécifie le support avec lequel un jeu vidéo est compatible, comme
        un PC ou la PlayStation 5
    video_game_sub_genre:
      name: Sous-genre de jeu vidéo
      description: Identifie la sous-catégorie spécifique d’un jeu vidéo, par exemple,
        MMORPG ou Battle Royale
    video_port_type:
      name: Type de port vidéo
      description: Précise le type de port vidéo pris en charge par un produit, par
        exemple HDMI, port d’affichage
    video_recorder_type:
      name: Type d’enregistreur vidéo
      description: Spécifie la technologie d’enregistrement fondamentale de l’appareil
        (par exemple, DVR, NVR, XVR)
    video_region_code:
      name: Code de région vidéo
      description: Définit la compatibilité régionale des lecteurs DVD et Blu-Ray,
        par exemple sans région ou région 1
    video_resolution_supported:
      name: Résolution vidéo prise en charge
      description: Définit la clarté ou la qualité vidéo prise en charge par un appareil,
        comme 1080p ou ultra HD
    video_signal_standard:
      name: Norme de signal vidéo
      description: Spécifie la ou les normes de diffusion vidéo analogique prises
        en charge par l’appareil (par exemple, NTSC, PAL, SECAM)
    viewing_area_height:
      name: Hauteur de la zone de visualisation
      description: Spécifie la hauteur de la zone de visualisation dans des produits
        tels que les casques de soudure, par exemple, moyenne ou grande
    viewing_area_width:
      name: Largeur de la zone de visualisation
      description: Spécifie la hauteur de la zone de visualisation dans des produits
        tels que les casques de soudure, par exemple, moyenne ou grande
    vinegar_drink_variety:
      name: Variété de boisson au vinaigre
      description: Précise le type de boisson à base de vinaigre, par exemple kombucha,
        shrub
    vinegar_variety:
      name: Variété de vinaigre
      description: Fait la distinction entre les différents types de vinaigre, par
        exemple de fruits, balsamique
    viscosity:
      name: Viscosité
      description: Spécifie la résistance à l’écoulement des huiles moteur, par exemple,
        10W-40 ou 15W-50
    vision_correction_type:
      name: Type de correction de la vision
      description: Indique la conception optique destinée à corriger des troubles
        de la vision spécifiques
    visual_effect:
      name: Effet visuel
      description: Définit les caractéristiques visuelles d’un produit, généralement
        pour les émaux artistiques, par exemple, moucheté ou texturé
    voice_recorder_form_factor:
      name: Facteur de forme de l’enregistreur vocal
      description: Décrit le style physique ou l’apparence de l’enregistreur afin
        que les acheteurs puissent choisir le modèle qui correspond à leur utilisation
    voip_protocol_support:
      name: Prise en charge du protocole VoIP
      description: Précise les protocoles Voice over Internet Protocol (VoIP) qu’un
        appareil peut prendre en charge, comme SIP ou IAX
    wader_type:
      name: Type de cuissardes
      description: Définit le style spécifique des cuissardes de pêche ou de chasse,
        comme la hanche ou la taille
    waist_rise:
      name: Taille
      description: Indique le niveau de la taille, par exemple basse, moyenne ou haute
    walker_brake_type:
      name: Type de frein de déambulateur
      description: Décrit le mécanisme de freinage intégré au déambulateur
    walker_seat_type:
      name: Type de siège de déambulateur
      description: Identifie si le déambulateur comprend un siège et le style du siège
    walker_type:
      name: Type de déambulateur
      description: Classe le style structurel et l’utilisation prévue du déambulateur
    walking_aid_tip_type:
      name: Type d’embout d’aide à la marche
      description: Spécifie le style ou la technologie de l’embout au sol de la canne
    wall_material:
      name: Matériau du mur
      description: Identifie le matériau utilisé pour le mur du produit, généralement
        dans les saunas ; par exemple le cèdre
    wall_patching_application:
      name: Application de réparation de murs
      description: Identifie la surface appropriée pour un produit de ragréage, par
        exemple, bois ou plâtre
    wall_plate_style:
      name: Style de plaque murale
      description: Décrit la conception de plaques murales ou de revêtements, par
        exemple, conventionnelle ou sans vis
    wallet_features:
      name: Caractéristiques du portefeuille
      description: Décrit les caractéristiques particulières des portefeuilles, par
        exemple, protection RFID ou design compact
    wallpaper_application_method:
      name: Méthode d’application du papier peint
      description: Définit la méthode d’application du papier peint, par exemple décoller
        et coller ou nécessite de coller
    wallpaper_theme:
      name: Thème du fond d’écran
      description: Identifie le sujet ou le style principal d’un fond d’écran, par
        exemple, nature ou abstrait
    wan_interface_type:
      name: Type d’interface WAN
      description: Spécifie le type de connexion physique utilisé pour la liaison
        montante WAN/Internet du routeur (par exemple, Ethernet, fibre, DSL, cellulaire)
    warning_category:
      name: Catégorie d’avertissement
      description: Classifie la catégorie des panneaux de sécurité ou de sûreté, par
        exemple, interdiction ou avertissement
    washer/dryer_features:
      name: Caractéristiques de la laveuse/sécheuse
      description: Met en évidence les caractéristiques uniques des appareils de blanchisserie,
        par exemple la sécurité enfants, l'autonettoyage
    washer_form:
      name: Forme de rondelle
      description: Décrit le type spécifique de rondelle dans les accessoires de quincaillerie,
        par exemple, plat ou à ressort
    washing_machine_features:
      name: Caractéristiques du lave-linge
      description: Identifie les fonctions spéciales d’une machine à laver, par exemple,
        sécurité enfants ou minuterie de démarrage différé
    washing_method:
      name: Méthode de lavage
      description: 'Précise le processus de nettoyage recommandé pour un produit,
        par exemple lavage à la main, lavage en machine '
    washing_programs:
      name: Programmes de lavage
      description: Définit les différents cycles de lavage proposés par une machine
        à laver, comme le lavage à froid ou délicat
    waste_bag_features:
      name: Caractéristiques du sac à déchets
      description: Décrit les caractéristiques particulières des sachets ramasse-crottes
        pour animaux de compagnie, par exemple, biodégradables ou étanches
    waste_bag_material:
      name: Matériau du sac à déchets
      description: Identifie le matériau des sacs à déchets, par exemple, plastique
        ou biodégradable
    watch/band_material:
      name: Matériau de la montre/du bracelet
      description: Précise le type de matériau pour les bracelets de montre, tel que
        le nylon ou le silicone
    watch_accessory_style:
      name: Style de l’accessoire de montre
      description: Définit le style des accessoires de montres, par exemple sportif,
        moderne
    watch_display:
      name: Affichage de la montre
      description: Fait la distinction entre les écrans de montre, comme numériques
        ou analogiques
    watch_features:
      name: Fonctionnalités de la montre
      description: Identifie les caractéristiques particulières d’une montre, par
        exemple, mouvement automatique ou les aiguilles lumineuses
    watch_material:
      name: Matériau de la montre
      description: Spécifie le type de matériau utilisé pour la montre, par exemple,
        titane ou silicone
    water_filter_application:
      name: Application du filtre à eau
      description: Identifie l’utilisation prévue d’un filtre à eau, généralement
        pour les appareils électroménagers ; par exemple une machine à café, une machine
        à glace
    water_flosser_modes:
      name: Modes de l’hydropulseur
      description: Répertorie les modes de nettoyage disponibles que l’appareil peut
        utiliser
    water_sport:
      name: Sports nautiques
      description: Précise le sport nautique pour lequel le produit est conçu, comme
        la plongée sous-marine ou le kayak.
    watercraft_engine_control_type:
      name: Type de commande de moteur de motomarine
      description: Identifie le type de système de commande d’une embarcation, par
        exemple, accélérateur ou levier de vitesse
    watercraft_features:
      name: Caractéristiques de l’embarcation
      description: Décrit les équipements ou les systèmes d’une embarcation, par exemple,
        cuisine ou système de freinage
    watercraft_motor_mounting_type:
      name: Type de montage de moteur de motomarine
      description: Identifie l’endroit où le moteur est monté sur une embarcation,
        par exemple, proue ou poupe
    watercraft_propulsion_type:
      name: Type de propulsion de l’embarcation
      description: Précise le mode de propulsion d’une embarcation, par exemple, manuel
        ou motorisé
    watercraft_steering_wheel_type:
      name: Type de volant de bateau
      description: Spécifie le type de volant de l’embarcation, par exemple, assisté
        ou standard
    watercraft_type:
      name: Type d’embarcation
      description: Identifie la catégorie de l’embarcation, par exemple, sport ou
        luxe
    waveski_features:
      name: Caractéristiques du waveski
      description: Décrit les caractéristiques uniques d’un waveski, par exemple,
        sangle réglable ou antidérapant
    wax_application_method:
      name: Méthode d’application de la cire
      description: Précise la technique utilisée pour appliquer le fart sur les équipements
        de sports d’hiver, par exemple, à froid ou à chaud
    wax_type:
      name: Type de cire
      description: Spécifie le type de cire dans des articles comme les bougies, par
        exemple, soja ou paraffine
    wear_schedule:
      name: Programme de port
      description: Spécifie la durée maximale d’utilisation consécutive approuvée
        pour la lentille avant son retrait
    weather_alert_technology:
      name: Technologie d’alerte météo
      description: Spécifie la norme d’alerte ou la certification prise en charge
        par la radio pour les avertissements d’urgence automatisés
    weather_strip_design:
      name: Conception de coupe-froid
      description: Décrit la forme des matériaux de calfeutrage, par exemple, ronde
        ou plate
    weather_supply_application_method:
      name: Méthode d’application des prévisions météorologiques
      description: Décrit l’application de produits d’étanchéisation, comme autocollante
        ou non adhésive
    weatherization_application:
      name: Application de météorisation
      description: Identifie l’endroit où un produit de protection contre les intempéries
        est appliqué, par exemple, fenêtre ou porte
    webcam_design:
      name: Conception de webcam
      description: Identifie le type de webcam, par exemple, conférence, ordinateur
        portable ou plug-and-play
    weight_bar_activity:
      name: Activité de barre de poids
      description: Précise l’utilisation prévue des barres de musculation, par exemple
        l’haltérophilie, l’entraînement technique
    weight_bar_type:
      name: Type de barre de poids
      description: Précise la conception des barres de musculation, hexagonale ou
        curl par exemple
    weight_loss_mechanism:
      name: Mécanisme de perte de poids
      description: Identifie l’approche physiologique principale utilisée par le complément
        alimentaire pour favoriser la perte de poids
    weight_type:
      name: Type de poids
      description: Décrit le poids des articles, par exemple, léger, moyen ou lourd
    weight_unit_supported:
      name: Unité de poids prise en charge
      description: Définit les unités de poids qu’un produit utilise pour la mesure,
        par exemple les livres, les stones
    welding_helmet_features:
      name: Caractéristiques du casque de soudure
      description: Identifie les caractéristiques particulières des casques de soudure,
        par exemple, couleur réelle ou mode de meulage
    wet_bag_features:
      name: Caractéristiques du sac imperméable
      description: Décrit les caractéristiques spécifiques des sacs à couches, par
        exemple, étanches ou respectueux de l’environnement
    wheel_hardness:
      name: Rigidité de la roue
      description: Précise le niveau de dureté des roues de skateboard, par exemple
        75A
    wheel_hub_placement:
      name: Emplacement du moyeu de roue
      description: Précise la position du moyeu de roue dans les skateboards, centrée
        ou décalée par exemple
    wheel_part_type:
      name: Type de pièce de roue
      description: Identifie le composant spécifique du système de roue d’un véhicule,
        par exemple, roulement ou moyeu
    wheel_style:
      name: Style de roue
      description: Décrit la forme physique de la jante ou le style de conduite
    wheel_type:
      name: Type de roue
      description: Précise le type de roue pour les produits de cyclisme, gonflable
        ou solide par exemple
    wheelchair_type:
      name: Type de fauteuil roulant
      description: Fait la distinction entre les différents types de fauteuils roulants,
        par exemple électriques, manuels
    whiskey_style:
      name: Style de whisky
      description: Définit le type spécifique de whisky, par exemple malt unique,
        malt mélangé
    whiskey_variety:
      name: Variété de whisky
      description: Classe le whisky en fonction du type ou du style de céréale, par
        exemple maïs, seigle
    wi_fi_band:
      name: Bande Wi-Fi
      description: Précise la plage de fréquences sans fil d’un appareil, comme 2,4
        GHz
    wi_fi_standard:
      name: Norme Wi-Fi
      description: Précise le protocole de réseau sans fil, comme 802.11ac
    width_adjustment:
      name: Ajustement de la largeur
      description: Indique si la largeur de l’équipement peut être modifiée pour s’adapter
        à différents appareils, lits ou utilisateurs
    winder_features:
      name: Caractéristiques de l’enrouleur
      description: Décrit les caractéristiques particulières des enrouleurs de cordes
        de guitare, par exemple, extracteur de goupille de pont ou pince coupante
        intégrée
    windlass_design:
      name: Conception du guindeau
      description: Décrit l’orientation d’un guindeau d’ancre, par exemple, horizontale
        ou verticale
    window_treatment_material:
      name: Matériau de traitement de fenêtre
      description: Spécifie la composition des volets ou des stores de fenêtre, par
        exemple, aluminium ou plastique
    windsurfing_board_style:
      name: Style de planche à voile
      description: Spécifie le type de planche à voile, par exemple, freestyle ou
        slalom
    wine_rack_design:
      name: Design du casier à vin
      description: Définit le style ou l’esthétique d’un casier à vin, par exemple
        moderne, traditionnel
    wine_sweetness:
      name: Douceur du vin
      description: Aide à classer les vins par niveau de douceur, par exemple sec,
        doux
    wine_variety:
      name: Variété de vin
      description: Aide à distinguer les différents types de vins, par exemple blanc,
        rosé
    wing_style:
      name: Style d’ailettes
      description: Indique si la protection comprend des ailettes stabilisatrices
        et, le cas échéant, quel style
    wipe_dispenser/warmer_features:
      name: Caractéristiques du distributeur/réchauffeur de lingettes
      description: Décrit les caractéristiques spéciales des distributeurs et des
        chauffe-lingettes, par exemple adaptés aux voyages
    wipe_dispenser_features:
      name: Caractéristiques du distributeur de lingettes
      description: Décrit les caractéristiques particulières des distributeurs de
        lingettes, par exemple, mécanisme de distribution ou indicateur LED
    wipe_fragrance:
      name: Parfum des lingettes
      description: Identifie l’arôme des produits de lingettes, comme les produits
        non parfumés ou la lavande
    wipe_packaging:
      name: Emballage de lingettes
      description: Définit le style de contenant ou d’emballage pour lingettes, par
        exemple une recharge, au format voyage
    wipe_purpose:
      name: Objectif des lingettes
      description: Identifie l’utilisation ou l’avantage principal prévu des lingettes
    wipe_warmer_features:
      name: Fonctionnalités du chauffe-lingettes
      description: Détaille les caractéristiques spécifiques d’un chauffe-lingettes,
        par exemple, facilité de transport ou rétention d’humidité
    wire/rope_material:
      name: Matériau du fil/câble
      description: Spécifie le matériau utilisé dans les produits en fil ou en câble,
        par exemple, cuivre ou polyester
    wire_thickness:
      name: Épaisseur du fil
      description: Spécifie l’épaisseur des fils, par exemple, épais ou fin
    wireless_charging_standard:
      name: Norme de chargement sans fil
      description: Identifie le ou les protocoles de chargement par induction pris
        en charge par le téléphone
    wireless_multi_room_platform:
      name: Plateforme multi-pièces sans fil
      description: Définit l’écosystème propriétaire ou tiers utilisé pour la diffusion
        audio multi-pièces
    wireless_streaming_protocols_supported:
      name: Protocoles de diffusion sans fil pris en charge
      description: Identifie les normes de diffusion sans fil ou les services que
        la chaîne stéréo peut recevoir en natif
    wood_finish:
      name: Finition du bois
      description: Décrit le traitement de finition ou la méthode de construction
        appliqués aux produits en bois (par exemple, bois massif, plaqué, contrecollé,
        huilé, laqué, peint)
    woodwind_care_items_included:
      name: Articles d’entretien des bois inclus
      description: Identifie les articles d’entretien inclus avec un instrument à
        vent, par exemple, brosse de nettoyage ou graisse à liège
    work_capacity:
      name: Capacité de travail
      description: Décrit le niveau de performance d’un produit, tel que robuste ou
        léger
    wreath_design:
      name: Conception de couronne
      description: Identifie le matériau principal ou la forme d’une couronne, par
        exemple, métal ou cerceau
    wrist_rest_features:
      name: Caractéristiques du repose-poignet
      description: Répertorie les caractéristiques fonctionnelles ou esthétiques spéciales
        qui ajoutent de la valeur
    wrist_rest_type:
      name: Type de repose-poignet
      description: Identifie le couplage prévu des périphériques ou la configuration
        définie du repose-poignet (par exemple, clavier uniquement, souris uniquement,
        ensembles combinés)
    xlr_pin_count:
      name: Nombre de broches du câble XLR
      description: Indique la configuration spécifique de broches (nombre de broches)
        des connecteurs XLR
    yacht_type:
      name: Type de yacht
      description: Classifie le type de yacht, par exemple, à moteur ou d’exploration
    yarn_weight_category:
      name: Catégorie de poids du fil
      description: Identifie l’épaisseur du fil à tricoter, par exemple, super volumineux
        ou pour loisirs créatifs
    zipper_pull_style:
      name: Style de fermeture éclair
      description: Décrit la conception ou la finition d’une tirette de fermeture
        éclair, par exemple, texturée ou gaufrée
    zoom_type:
      name: Type de zoom
      description: Spécifie le type de fonction de zoom dans les vidéo-visualiseurs
        numériques, par exemple numérique ou optique
    air_fryer_accessory_type:
      name: Type d’accessoire pour friteuse à air
      description: Identifie la nature exacte de l’accessoire vendu.
    air_purifier_filter_technology:
      name: Technologie de filtration du purificateur d’air
      description: Identifie la méthode de filtration ou de purification principale
        utilisée par l’appareil.
    air_purifier_filtration_rating:
      name: Indice de filtration du purificateur d’air
      description: Indique la classe d’efficacité certifiée du support filtrant.
    animal_care_set_components_included:
      name: Éléments inclus dans le kit de soins pour animaux
      description: Liste les accessoires et éléments de toilettage ou de nettoyage
        fournis dans le kit afin que les acheteurs sachent exactement ce qui est inclus.
    apron_features:
      name: Caractéristiques du tablier
      description: Présente les caractéristiques fonctionnelles spécifiques du tablier.
    apron_style:
      name: Style du tablier
      description: Définit le type de coupe et de fabrication du tablier.
    aquatic_plant_growth_habit:
      name: Mode de croissance des plantes aquatiques
      description: Classe les plantes aquatiques selon leur placement habituel et
        leur style de développement dans l’eau.
    arbor_top_design:
      name: Conception de la partie supérieure de la tonnelle
      description: Précise la forme ou le style de la partie supérieure de la tonnelle
        afin d’aider les clients à faire un choix cohérent avec leur environnement
        architectural.
    ashtray_type:
      name: Type de cendrier
      description: Classe le cendrier selon son usage principal ou son contexte d’utilisation.
    attractant_type:
      name: Type d’appât
      description: Précise le mécanisme d’appât intégré à la colle, le cas échéant,
        afin d’aider les clients à choisir le piège le plus efficace selon leur situation.
    awning_operation_type:
      name: Type de fonctionnement du store
      description: Décrit le mécanisme utilisé pour ouvrir et refermer le store.
    bag_clip_style:
      name: Style de clip de fermeture du sac
      description: Décrit le type de mécanisme de fermeture du clip.
    bag_configuration:
      name: Configuration des sacs
      description: Décrit le nombre et le type de sacs inclus dans le système de collecte
        de l’herbe.
    bag_insulation:
      name: Isolation du sac
      description: Indique si le sac de transport pour vin est doté d’une isolation
        thermique contribuant au maintien de la température des bouteilles.
    baking_liner_size:
      name: Taille des caissettes de cuisson
      description: Décrit le système de classement des tailles employé par les boulangers
        afin de définir la capacité des caissettes par rapport aux tailles standard
        de cupcakes.
    baking_sheet_style:
      name: Style de plaque de cuisson
      description: Indique le type de fabrication de la plaque, par exemple avec rebords
        ou perforée.
    ballast_material:
      name: Matériau de lestage
      description: Liste les matériaux pouvant être utilisés pour lester (remplir)
        le tambour du rouleau, afin d’aider les acheteurs à choisir des modèles compatibles
        avec leur matériau de lestage préféré.
    base_features:
      name: Caractéristiques de la base
      description: Présente les caractéristiques de stabilité ou d’adhérence de la
        base, afin d’aider les utilisateurs ayant besoin de fonctionnalités antidérapantes
        ou à ventouse sur les surfaces de travail.
    baster_tip_type:
      name: Type d’embout de la poire à jus
      description: Classe le type d’embout ou de fixation de la poire à jus, afin
        d’aider les acheteurs à distinguer les modèles entre poires à jus classiques,
        seringues alimentaires et embouts brosse.
    bathroom_accessories_included:
      name: Contenu du kit d’accessoires de salle de bains
      description: Liste les éléments inclus dans le kit d’accessoires de salle de
        bains afin que les acheteurs puissent identifier clairement ce que contient
        le kit.
    bathroom_accessory_compatibility:
      name: Compatibilité des accessoires de salle de bains
      description: Indique l’accessoire ou l’élément de salle de bains pour lequel
        le support est prévu.
    battery_backup_support:
      name: Prise en charge de la batterie de secours
      description: Indique si une batterie de secours est incluse, proposée en option
        ou non prise en charge.
    bedskirt_corner_style:
      name: Finition des angles de la jupe de lit
      description: Précise le type de finition des coins de la jupe de lit, ce qui
        influe sur l’ajustement aux lits dotés de pieds ou de montants.
    bedskirt_style:
      name: Style de la jupe de lit
      description: Définit la structure et l’aspect visuel de la jupe de lit, afin
        d’aider les acheteurs à choisir entre différents styles, tels que les modèles
        froncés ou ajustés.
    beer_glass_type:
      name: Type de verre à bière
      description: 'Identifie le style ou la forme spécifique du verre à bière, afin
        d’aider les acheteurs à trouver le verre idéal pour leur bière préférée (ex. :
        pinte, pilsner, weizen).'
    belt_profile:
      name: Profil de la courroie
      description: Identifie la section transversale ou le profil de la courroie afin
        d’assurer une adaptation conforme à la conception de la poulie.
    beverage_tub_features:
      name: Caractéristiques du bac à boissons
      description: Présente les caractéristiques de conception notables ou les composants
        fournis permettant d’améliorer la praticité ou l’usage du bac à boissons.
    blade_construction_method:
      name: Méthode de fabrication de la lame
      description: Précise le procédé utilisé pour la fabrication de la lame.
    blade_finish:
      name: Finition de la lame
      description: Traitement de surface ou finition esthétique appliqué à la lame.
    blade_shape:
      name: Forme de la lame
      description: Décrit la forme ou le profil géométrique de la lame de la pelle.
    blade_sidedness:
      name: Latéralité de la lame
      description: Indique si la lame du taille-haie est équipée de dents de coupe
        sur un côté uniquement ou sur les deux côtés.
    bleach_formulation:
      name: Formulation du produit blanchissant
      description: Indique la base chimique du produit blanchissant (par exemple,
        à base de chlore ou d’oxygène).
    bleach_type:
      name: Type de produit blanchissant
      description: Indique la présence et le type d’agent blanchissant ou d’agent
        de blanchiment utilisé dans le détachant.
    blender_jar_material:
      name: Matériau du récipient du blender
      description: Précise le matériau utilisé pour le récipient/contenant principal
        du blender.
    blooming_season:
      name: Période de floraison
      description: Indique la ou les saisons durant lesquelles la plante fleurit habituellement.
    booster_pump_requirement:
      name: Nécessité d’une pompe de surpression
      description: Précise si une pompe de surpression distincte est nécessaire au
        fonctionnement du balai.
    bore_type:
      name: Type d’alésage
      description: Définit le type d’alésage ou l’interface utilisée pour monter la
        poulie sur l’arbre.
    bottle_cap_gasket_material:
      name: Matériau du joint d’étanchéité du bouchon
      description: Identifie le matériau du joint d’étanchéité en contact avec le
        bord de la bouteille.
    bottle_cap_liner_type:
      name: Type de joint intérieur du bouchon
      description: Précise le type ou le matériau du joint d’étanchéité à l’intérieur
        du bouchon, ce qui influe sur l’étanchéité et la compatibilité du produit.
    bottle_fill_state:
      name: État de remplissage de la bouteille
      description: Indique si la bouteille est vendue vide ou préremplie avec de l’eau
        potable.
    bottle_stopper_mechanism:
      name: Mécanisme du bouchon de bouteille
      description: Définit le mécanisme d’étanchéité ou le type de fermeture utilisé
        par le bouchon ou le dispositif de conservation.
    bowl_type:
      name: Type de bol
      description: Classe le bol selon son usage principal ou son style de conception.
    bread_storage_ventilation:
      name: Système d’aération pour le stockage du pain
      description: Indique si et comment le contenant permet la circulation de l’air,
        contribuant à la conservation du pain.
    brew_strength_options:
      name: Réglages d’intensité du café
      description: Liste les niveaux d’intensité d’infusion disponibles permettant
        de modifier la durée d’extraction ou le débit pour varier l’intensité du café.
    bridge_railing_style:
      name: Style des garde-corps du pont
      description: Précise la présence et le style des garde-corps du pont, qui ont
        une influence sur la sécurité et l’esthétique.
    briquette_ignition_type:
      name: Type d’allumage des briquettes
      description: Indique la présence ou non de dispositifs facilitant l’allumage
        des briquettes, permettant aux utilisateurs de comprendre le niveau de praticité
        lors de l’allumage.
    bristle_stiffness:
      name: Rigidité des poils
      description: Indique le degré de rigidité des poils de la brosse et son impact
        sur l’efficacité du nettoyage et la compatibilité avec différents revêtements
        de cuvette.
    bristle_tip_type:
      name: Forme de l’extrémité des poils
      description: Indique si les extrémités des poils sont fendues (divisées) pour
        une collecte plus fine de la poussière ou non fendues pour le nettoyage des
        saletés épaisses.
    bucket_features:
      name: Caractéristiques du seau
      description: Présente les caractéristiques particulières ou les améliorations
        fonctionnelles du seau afin que les acheteurs puissent identifier rapidement
        les produits offrant les fonctionnalités recherchées.
    bulb_finish:
      name: Finition du verre de l’ampoule
      description: Décrit le revêtement ou la finition extérieure du verre de l’ampoule,
        influençant le rendu lumineux et le style.
    burner_shape:
      name: Forme du brûleur
      description: Décrit la conception géométrique du brûleur et son impact sur l’ajustement
        et la diffusion de la chaleur dans le barbecue.
    burr_shape:
      name: Forme des meules
      description: Précise le type et la forme des meules des broyeurs, ce qui a un
        impact sur l’homogénéité de la mouture et l’échauffement.
    butterfly_feeder_food_type:
      name: Type de nourriture pour mangeoire à papillons
      description: Indique le type d’aliment ou d’appât destiné à être placé dans
        la mangeoire.
    cabinet_light_fixture_style:
      name: Style du luminaire pour placard
      description: Décrit la forme ou la conception du luminaire destiné à l’éclairage
        de placard.
    candle_container_material:
      name: Matériau du contenant de la bougie
      description: Identifie le matériau du récipient ou du contenant (pot/boîte métallique)
        de la bougie.
    canner_type:
      name: Type de dispositif de conservation
      description: Précise le procédé de mise en conserve auquel l’appareil est destiné.
    canopy_shape:
      name: Forme de l’auvent
      description: Précise la forme géométrique de l’auvent lorsqu’il est ouvert.
    canopy_venting:
      name: Ventilation de l’auvent
      description: Indique le mode de ventilation de l’auvent et son impact sur la
        résistance au vent et l’évacuation de la chaleur.
    car_cleaning_kit_items_included:
      name: Contenu du kit de nettoyage automobile
      description: Liste les outils et accessoires spécifiques fournis dans le kit
        afin que les acheteurs sachent exactement ce qu’ils obtiennent et puissent
        comparer les différents kits.
    carbonation_level_adjustment:
      name: Réglage du niveau de gazéification
      description: Indique si la machine à soda propose un niveau de gazéification
        prédéfini ou réglable.
    catalytic_combustor_type:
      name: Type de système de combustion catalytique
      description: Indique le type de technologie de combustion employée par le poêle,
        catalytique, non catalytique ou hybride, ce qui influe sur l’efficacité et
        les émissions.
    ceiling_light_fixture_style:
      name: Style du luminaire de plafond
      description: Définit le style ou la configuration structurelle principale du
        luminaire de plafond.
    center_hole_shape:
      name: Forme du trou central
      description: Décrit la forme du trou central de fixation de la lame, ce qui
        détermine sa compatibilité avec les axes de tondeuse spécifiques.
    chainsaw_bar_mount_type:
      name: Type de fixation du guide-chaîne de la tronçonneuse
      description: Précise le type de fixation ou le style de rainure du guide-chaîne
        afin de garantir sa compatibilité avec le bloc moteur de la tronçonneuse.
    chainsaw_bar_nose_type:
      name: Type d’extrémité du guide-chaîne
      description: Identifie le style de l’extrémité du guide-chaîne, avec un impact
        sur la qualité de la coupe et la facilité d’entretien.
    chainsaw_bar_type:
      name: Type de guide-chaîne
      description: Classe le guide-chaîne selon sa construction ou son usage principal.
    chainsaw_cutter_type:
      name: Type de dents de la tronçonneuse
      description: Identifie le profil et la conception des dents de la chaîne, déterminant
        la vitesse de coupe, la résistance à l’usure et le recul.
    champagne_glass_type:
      name: Type de verre à champagne
      description: Précise le design et la forme du verre à champagne afin d’aider
        les acheteurs à identifier le modèle le plus adapté au type de dégustation
        recherché.
    chandelier_shape:
      name: Forme du lustre
      description: Définit la forme générale de la structure du lustre.
    charcoal_chimney_features:
      name: Caractéristiques de la cheminée d’allumage
      description: Liste les principales caractéristiques fonctionnelles de la cheminée
        d’allumage à charbon.
    charcoal_ignition_type:
      name: Type d’allumage du charbon
      description: Indique si le charbon a été traité ou conçu afin de faciliter l’allumage
        ou d’assurer une combustion plus propre.
    chopstick_style:
      name: Style de baguettes
      description: Précise le style régional ou culturel des baguettes, ce qui peut
        influer sur leur longueur, leur forme et leur décoration.
    chopstick_trainer_design:
      name: Conception du guide d’apprentissage pour baguettes
      description: Décrit le mécanisme ou le mode d’assistance intégré au dispositif
        d’apprentissage des baguettes.
    cigar_cutter_type:
      name: Type de coupe-cigare
      description: Précise le mécanisme ou le style de coupe utilisé pour retirer
        la tête du cigare.
    cigar_punch_type:
      name: Type de coupe-cigare
      description: Identifie le mode de fonctionnement ou la conception du coupe-cigare.
    clay_pot_material:
      name: Composition du pot en argile
      description: Identifie la composition ou le style de l’argile employée pour
