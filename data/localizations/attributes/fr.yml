    compatible_filament:
      name: Filament compatible
      description: Précise les types de filament qu’une imprimante 3D peut utiliser,
        comme l’acide polylactique (PLA) ou le nylon
    compatible_film_type:
      name: Type de film compatible
      description: Identifie le type de film qu’un appareil photo peut utiliser, par
        exemple, noir et blanc ou couleur
    compatible_flute_type:
      name: Type de flûte compatible
      description: Identifie le type de flûte avec lequel un produit est compatible,
        par exemple, universel ou piccolo
    compatible_game_format:
      name: Format de jeu compatible
      description: Précise le type de format de jeu pris en charge, comme le téléchargement
        numérique uniquement ou le disque physique
    compatible_gardening_tool:
      name: Outil de jardinage compatible
      description: Précise les outils de jardinage avec lesquels un produit peut être
        utilisé, comme un râteau ou une pelle
    compatible_hair_color:
      name: Couleur de cheveux compatible
      description: Adapte les produits à des couleurs de cheveux spécifiques, par
