    bow_features:
      name: Caractéristiques de l’arc
      description: Identifie les caractéristiques uniques des arcs de tir à l’arc,
        par exemple, tirage réglable ou lunette éclairée
    bow_hair_material:
      name: Matériau du nœud pour cheveux
      description: Spécifie la composition du crin d’arc dans les instruments à cordes,
