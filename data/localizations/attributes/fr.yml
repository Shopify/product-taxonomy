    breath_sprays_certifications:
      name: Certifications des rafraîchisseurs d’haleine
      description: Précise les normes auxquelles répond un spray pour l’haleine, comme
        le commerce équitable ou sans gluten
    bridge/router_advanced_features:
      name: Fonctionnalités avancées du pont/routeur
      description: Met en avant les fonctionnalités avancées des ponts/routeurs, par
        exemple, doté d’une IA ou prise en charge d’un VPN
    brightness_levels:
      name: Niveaux d’intensité
      description: Spécifie la puissance lumineuse des produits, par exemple, moyenne
        ou élevée
    bristle_grade:
      name: Grade de poils
      description: Identifie la qualité ou la classification des poils d’origine animale
        ou synthétique utilisés (par exemple, blaireau Pur Argenté, fibres synthétiques)
    bristle_hardness:
      name: Dureté des poils
      description: Indique la fermeté des poils de la brosse à dents
    bristle_material:
      name: Matériau des poils
      description: Identifie la composition des poils de brosses, comme le nylon ou
        le crin de cheval
    bristle_shape:
      name: Forme des poils
      description: Définit la forme des poils de la brosse, par exemple plats, angulaires
    broadcast_video_standard:
      name: Norme de diffusion vidéo
      description: Indique la ou les normes de diffusion analogique avec lesquelles
        le magnétoscope est compatible
    broadcasting_standard_supported:
      name: Norme de diffusion prise en charge
      description: Spécifie les normes de diffusion télévisuelle ou de modulation
        (satellite, câble, terrestre) que le produit peut décoder ou gérer
    broadhead/field_point_material:
      name: Matériau des pointes de chasse/cible
      description: Identifie le matériau utilisé dans les pointes de chasse ou de
        tir sur cible, par exemple, acier inoxydable ou acier au carbone
    broadhead_design:
      name: Conception de la pointe de chasse
      description: Indique le type de design de la pointe de chasse utilisée pour
        le tir à l’arc, par exemple, lame verrouillable ou mécanique
    brush_application:
      name: Application au pinceau
      description: Décrit l’usage prévu de pinceaux artistiques, tels que l’acrylique
        ou l’aquarelle
    brush_end_type:
      name: Type de pinceau
      description: Décrit le format structurel des extrémités du pinceau (par exemple,
        extrémité simple, double extrémité, rétractable)
    brush_head_shape:
      name: Forme du pinceau
      description: Définit la forme globale du pinceau, influant sur l’accessibilité
        et la compatibilité pour différents utilisateurs
    brush_head_usage:
      name: Utilisation de la tête de brosse
      description: Précise l’utilisation prévue des têtes de brosse, généralement
        pour les cosmétiques ; par exemple nettoyage en profondeur, exfoliation
    brush_material:
      name: Matériau de la brosse
      description: Spécifie le type de matériau utilisé dans la fabrication des brosses,
        par exemple, silicone ou plastique
    brush_size:
      name: Taille du pinceau
      description: Spécifie la taille d’un pinceau artistique, par exemple, 0 ou 12
    brush_type:
      name: Type de pinceau
      description: Précise le matériau utilisé dans un blaireau, comme des poils synthétiques
        ou de blaireau
    brushing_mode:
      name: Mode de brossage
      description: Répertorie les programmes de nettoyage prédéfinis que la brosse
        à dents peut effectuer (par exemple, nettoyage, sensible, blanchiment)
    bug_type:
      name: Type d’insecte
      description: Précise les espèces d’insectes ciblées par le produit, comme les
        fourmis ou les frelons
    building_board_material:
      name: Matériau du panneau de construction
      description: Spécifie le type de matériau utilisé dans les panneaux de construction,
        par exemple, contreplaqué ou ciment
    building_consumable_form:
      name: Forme de consommable de construction
      description: Spécifie la forme des produits de colmatage des murs, par exemple,
        liquide ou en poudre
    building_toy_type:
      name: Type de jouet de construction
      description: Spécifie la catégorie d’un jouet de construction, par exemple les
        jeux de construction STEM ou les tuiles magnétiques
    bulb_cap_type:
      name: Type de culot d’ampoule
      description: Précise le type de culot d’une ampoule ou d’un luminaire, par exemple
        E12, GU10
    bulb_shape:
      name: Forme de l’ampoule
      description: Décrit la forme des produits d’éclairage, par exemple en tube,
        en spirale
    bulb_size:
      name: Taille de l’ampoule
      description: Précise la taille des ampoules, par exemple A19, C7
    bulb_type:
      name: Type d’ampoule
      description: Précise le type d’ampoule utilisé dans les produits d’éclairage,
        par exemple LED, halogène
    bulldozer_blade_type:
      name: Type de pelle bulldozer
      description: Identifie le style de lame d’un bulldozer, par exemple, en angle
        ou droit (lame en S)
    bullet_protection_level:
      name: Niveau de protection contre les balles
      description: Indique le niveau de protection contre les balles dans les gilets,
        par exemple, IIA ou IV
    bullhorn_features:
      name: Caractéristiques du porte-voix
      description: Met en avant les fonctionnalités uniques d’un porte-voix, par exemple,
        enregistrement vocal ou fonction sirène
    bullion_form:
      name: Forme du lingot
      description: Spécifie le type de lingots, par exemple, ronds ou en barres
    bungee_arm_mechanism:
      name: Mécanisme du support de câble
      description: Définit la technologie utilisée pour suspendre et guider le câble
        de la souris (par exemple, bras à ressort, cordon élastique, suspension magnétique)
    burner_material:
      name: Matériau du brûleur
      description: Identifie le matériau utilisé dans la fabrication d’un brûleur
        de poêle ou de gril, par exemple, fonte ou acier inoxydable
    butt_cap_color:
      name: Couleur de l’embout
      description: Spécifie la couleur de capuchon de cannes à pêche, comme noire
        ou bleue
    butt_cap_material:
      name: Matériau du capuchon
      description: Définit la composition de l’extrémité inférieure de la poignée
        des articles de sport, par exemple EVA (éthylène-acétate de vinyle), liège
    butt_cap_pattern:
      name: Modèle de l’embout
      description: Décrit le thème ou le motif sur l’embout d’une canne à pêche, comme
        du camouflage ou à fleurs
    button/snap_closure_type:
      name: Type de fermeture à bouton/pression
      description: Décrit le style du mécanisme de fermeture, par exemple, magnétique
        ou invisible
    button_surface_profile:
      name: Profil de la surface du bouton
      description: Décrit le contour physique de la surface du bouton-poussoir, influant
        sur l’ergonomie et le style visuel
    cabinet_type:
      name: Type de borne
      description: Précise la conception et le facteur de forme des jeux d’arcade,
        comme bartop ou mini-arcade
    cable_form_factor:
      name: Facteur de forme du câble
      description: Décrit le style de conception physique ou la forme du câble
    cable_housing_material:
      name: Matériau du boîtier du câble
      description: Identifie le matériau utilisé pour le boîtier du câble, par exemple,
        nylon ou PVC
    cable_jacket_rating:
      name: Classification de la gaine du câble
      description: Spécifie la classification environnementale ou de sécurité de la
        gaine extérieure du câble (par exemple, plénum, enfouissement direct, résistant
        aux UV)
    cable_shielding:
      name: Revêtement du câble
      description: Précise le type de protection utilisé dans les câbles, par exemple
        tressé (STP), feuille (FTP)
    cable_style:
      name: Style de câble
      description: Décrit le conception physique du câble (par exemple, tressé, plat,
        spiralé, rétractable)
    cable_tie_type:
      name: Type de serre-câbles
      description: Spécifie le style de construction ou le mécanisme de fixation du
        serre-câbles
    cable_tray_style:
      name: Chemin de câbles
      description: Décrit le style structurel de la section du chemin de câbles qui
        détermine la ventilation et la méthode de support des câbles
    cable_type:
      name: Type de câble
      description: Classifie la variété de câble, généralement utilisée dans les équipements
        de cyclisme ; par exemple frein, engrenage
    cache_level:
      name: Niveau de cache
      description: Indique la position dans la hiérarchie du cache (par exemple, L1,
        L2, L3), influant sur la taille, la latence et la proximité des cœurs du processeur
    caffeine_content:
      name: Teneur en caféine
      description: Indique la quantité de caféine présente dans un produit, par exemple,
        décaféiné ou à faible teneur en caféine
    cage_type:
      name: Type de cage
      description: Identifie le style de cage de sécurité dans les véhicules, par
        exemple, cage complète ou demi-cage
    calculator_accessory_type:
      name: Type d’accessoire pour calculatrice
      description: Spécifie le type d’accessoire de calculatrice, tel qu’un rouleau
        de papier ou un adaptateur d’imprimante
    calculator_features:
      name: Fonctionnalités de la calculatrice
      description: Décrit les fonctions qu’une calculatrice peut exécuter, par exemple,
        calcul d’un prêt ou analyse statistique
    calendar/organizer_features:
      name: Fonctionnalités du calendrier/organisateur
      description: Décrit les caractéristiques spéciales des calendriers ou des organisateurs,
        par exemple, créneaux de rendez-vous ou jours fériés marqués
    calendar_format:
      name: Format du calendrier
      description: Spécifie la période d’un article de calendrier, par exemple, quotidienne
        ou mensuelle
    calibration_sensor_type:
      name: Type de capteur de calibrage
      description: Spécifie la technologie matérielle sous-jacente ou le facteur de
        forme du calibrateur
    call_blocking_method:
      name: Méthode de blocage d’appels
      description: Identifie comment l’appareil identifie et bloque les appels indésirables
    caller_id_compatibility:
      name: Compatibilité avec l’identification du correspondant
      description: Indique si le téléphone prend en charge les services d’identification
        du correspondant fournis par le réseau téléphonique
    caller_id_standard_compatibility:
      name: Compatibilité avec les standards d’identification du correspondant
      description: Indique les formats de signalisation d’identification du correspondant
        que l’appareil peut décoder
    cam_system:
      name: Système de came
      description: Spécifie le système de came utilisé dans un équipement de tir à
        l’arc, par exemple simple ou hybride
    camera_attachment:
      name: Fixation de l’appareil photo
      description: Spécifie la pièce ou l’accessoire de l’appareil photo, par exemple,
        viseur d’angle ou adaptateur d’oculaire
    camera_button/knob_type:
      name: Type de bouton/poignée d’appareil photo
      description: Identifie le bouton ou la molette d’un appareil photo, par exemple,
        déclencheur ou molette du sélecteur de mode
    camera_control_type:
      name: Type de contrôle de la caméra
      description: Spécifie le type de télécommande de l’appareil photo, par exemple,
        interrupteur à distance ou déclencheur
    camera_display_technology:
      name: Technologie d’affichage d’appareil photo
      description: Spécifie la technologie d’écran d’un appareil photo, par exemple,
        OLED ou Super AMOLED
    camera_features:
      name: Caractéristiques de l’appareil photo
      description: Identifie les capacités spéciales d’un appareil photo, par exemple,
        stabilisation d’image ou détection de visage
    camera_gear_type:
      name: Type d’appareil photo
      description: Identifie le type spécifique de matériel de prise de vue, par exemple,
        motorisation de la caméra ou suivi de la mise au point
    camera_hd_type:
      name: Type de caméra HD
      description: Spécifie la qualité vidéo de l’appareil photo, par exemple, Quad
        HD ou 8K ultra HD
    camera_lens_material:
      name: Matériau de l’objectif de l’appareil photo
      description: Spécifie la composition des lentilles d’un appareil photo ou d’une
        caméra vidéo, par exemple, en verre ou en plastique
    camera_lens_type:
      name: Type d’objectif d’appareil photo
      description: Identifie le type d’objectif de l’appareil photo, par exemple,
        macro ou téléobjectif
    camera_mounting_type:
      name: Type de montage d’appareil photo
      description: Spécifie la méthode de fixation de l’appareil photo, par exemple,
        trépied ou pince
    camera_sensor_type:
      name: Type de capteur de caméra
      description: Identifie le type de capteur dans les caméras ou les optiques,
        par exemple, CMOS ou CCD
    camera_shape:
      name: Forme de la caméra
      description: Décrit le style de conception des caméras de sécurité, à tourelle
