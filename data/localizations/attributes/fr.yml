    bow_material:
      name: Matériau de l’arc
      description: Précise le type de matériau utilisé dans les arcs de tir à l'arc,
        par exemple aluminium, fibre de verre
    box_type:
      name: Type de boîte
      description: Identifie le style des boîtes de rangement ou des organisateurs
        pour véhicules, par exemple, coffre ou crossover
    bra_closure_type:
      name: Type de fermeture du soutien-gorge
      description: Identifie le mode de fermeture et d’ouverture des soutiens-gorge,
        par exemple sur le devant, à enfiler (pas de fermeture)
    bra_coverage:
      name: Couverture du soutien-gorge
      description: Précise le niveau de couverture procuré par un soutien-gorge, totale
