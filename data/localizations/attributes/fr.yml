    dry_bean_variety:
      name: Variété d’haricot sec
      description: Identifie la variété de haricots secs utilisés, par exemple pois
        chiches, haricots noirs
    dryer_features:
      name: Caractéristiques du sèche-linge
      description: Spécifie les caractéristiques uniques d’un sèche-linge, par exemple,
        autonettoyage ou technologie d’inverseur
    dryer_technology:
      name: Technologie de séchage
      description: Spécifie la technologie de séchage dans les systèmes de climatisation,
        par exemple, déshydratant ou réfrigéré
    drying_method:
      name: Méthode de séchage
      description: Spécifie comment l’appareil sèche les brosses à dents après la
        stérilisation, le cas échéant
    drying_speed:
      name: Vitesse de séchage
      description: Définit la vitesse à laquelle un produit sèche ou prend, comme
        le séchage rapide ou le séchage normal
    dsl_standard_compatibility:
      name: Compatibilité avec la norme DSL
      description: Identifie les normes DSL prises en charge par un filtre ou un accessoire
        pour garantir une suppression du bruit et une qualité de connexion appropriées
    duct_design:
      name: Conception du conduit
      description: Identifie la forme de conduits d’air dans les systèmes CVC, par
        exemple flexibles ou solides
    duct_shape:
      name: Forme du conduit
      description: Décrit la forme des conduits d’air dans les systèmes de climatisation,
        par exemple, ronde ou plate
    duplex_component_type:
      name: Type de composant duplex
      description: Définit la forme spécifique de l’unité duplex fournie (par exemple,
        assemblage, bac, engrenage)
    duplexer_installation_type:
      name: Type d’installation de l’unité duplex
      description: Clarifie comment l’unité duplex se fixe à l’imprimante (par exemple,
        fente interne, fixation externe arrière)
    duplexing_technology:
      name: Technologie de duplexage
      description: Précise si une imprimante prend en charge l’impression duplex,
        par exemple non prise en charge, duplex automatique
    duplication_operation_mode:
      name: Mode de fonctionnement de la duplication
      description: Indique si le duplicateur fonctionne de manière indépendante, nécessite
        une connexion à un ordinateur ou prend en charge les deux modes
    durability_features:
      name: Caractéristiques de durabilité
      description: Met en avant la capacité d’un produit à résister à diverses conditions,
        par exemple, antirouille ou antichoc
    dust_container_type:
      name: Type de conteneur à poussière
      description: Précise le type de système de collecte de poussière dans les aspirateurs
        et les appareils électroménagers, par exemple sans sac, avec sac
    dust_mask_type:
      name: Type de masque anti-poussière
      description: Spécifie le facteur de forme des masques de protection contre la
        poussière, par exemple, godet ou pli à plat
    dvi_connection_type:
      name: Type de connexion DVI
      description: Identifie le connecteur DVI spécifique et le format de liaison
        supporté (par exemple, DVI-D simple liaison, DVI-I double liaison, Mini-DVI)
    dye_form:
      name: Forme de colorant
      description: Décrit l’état physique des teintures pour loisirs créatifs, par
        exemple, gel ou poudre
    dynamic_level:
      name: Niveau dynamique
      description: Catégorise les balles de racquetball et de squash en fonction de
        leur vitesse et de leur rebond, point vert ou point rouge par exemple
    dynamics_processing_function:
      name: Fonction de traitement dynamique
      description: Identifie les principales tâches dynamiques effectuées par l’appareil
        (par exemple, compresseur, limiteur, noise gate, déesseur)
    e_book_formats_supported:
      name: Formats de livres électroniques pris en charge
      description: Identifie la gamme de formats de livres électroniques compatibles
        avec l’appareil, comme PDF ou EPUB
    e_book_reader_part_location:
      name: Emplacement de la pièce pour liseuse numérique
      description: Spécifie où la pièce est installée ou située sur l’appareil
    e_cigarette/vaporizer_style:
      name: Style de cigarette électronique/vaporisateur
      description: Classe les cigarettes électroniques et les vaporisateurs selon
        leur facteur de forme, par exemple jetable, stylo
    e_liquid_flavor:
      name: Arôme liquide électronique
      description: Précise le goût des e-liquides pour vaporisateurs et cigarettes
        électroniques, par exemple café, fraise
    e_liquid_variety:
      name: Variété de liquide électronique
      description: Fait la distinction entre les différentes options d’e-liquide,
        par exemple remplissage court, shot de nicotine
    e_reader_display_technology:
      name: Technologie d’affichage de la liseuse électronique
      description: Identifie le type de technologie d’écran utilisé dans les liseuses
        électroniques, par exemple, écran LCD ou encre électronique
    ear_care_application_method:
      name: Méthode d’application du soin d’oreille
      description: Spécifie la méthode d’application des produits de soins des oreilles,
        par exemple, embout ou compte-gouttes
    ear_dryer_technology:
      name: Technologie de séchage des oreilles
      description: Identifie le mécanisme de séchage principal utilisé par le produit
    ear_orientation:
      name: Orientation de l’oreille
      description: Spécifie si l’écouteur est conçu pour l’oreille gauche, l’oreille
        droite ou s’il peut être porté des deux côtés
    ear_pick_tip_style:
      name: Style de pointe du cure-oreille
      description: Définit la forme ou la conception de l’embout qui élimine le cérumen
    ear_side:
      name: Côté de l’oreille
      description: Spécifie si la prothèse est destinée à l’oreille gauche, à l’oreille
        droite ou à une utilisation bilatérale
    ear_tip_size:
      name: Taille de l’embout auriculaire
      description: Fournit l’étiquette de taille générique couramment utilisée pour
        les embouts intra-auriculaires lorsque les tailles exactes en millimètres
        ne sont pas fournies
    ear_tip_style:
      name: Style de l’embout auriculaire
      description: Définit la forme géométrique de l’embout auriculaire influant sur
        l’ajustement et l’isolation acoustique
    earphone_features:
      name: Caractéristiques des écouteurs
      description: Met en avant les fonctionnalités uniques des écouteurs, par exemple,
        microphone intégré ou contrôle du volume
    earplug_cord_style:
      name: Style de cordon des bouchons d’oreilles
      description: Indique si les bouchons d’oreilles sont reliés par un cordon, ce
        qui permet d’éviter de les perdre et facilite leur retrait
    earplug_shape:
      name: Forme de bouchon d’oreille
      description: Décrit le profil physique du bouchon d’oreille, influant sur le
        confort et l’ajustement dans différents conduits auditifs
    earplug_type:
      name: Type de bouchons d’oreilles
      description: Classe le style de construction des bouchons d’oreilles distribués
        (par exemple, en mousse, moulés, filtrés)
    earplug_use:
      name: Utilisation des bouchons d’oreilles
      description: Définit l’activité ou le but spécifique des boules Quies, comme
        la natation ou le sommeil
    earring_design:
      name: Conception de boucle d’oreille
      description: Décrit le style ou la structure de boucles d’oreilles, telles que
        des créoles ou des clous
    edge_style:
      name: Style de contour
      description: Spécifie la forme des bords sur les éléments tels que les comptoirs,
        par exemple, arrondis ou biseautés
    edge_type:
      name: Type de bord
      description: Identifie le style de bord des outils ou des ustensiles, par exemple,
        micro-dentelé ou cranté
    education_level:
      name: Niveau de formation
      description: Spécifie le niveau d’enseignement pour lequel le logiciel est destiné,
        par exemple, école primaire ou école supérieure
    effects_processor_form_factor:
      name: Facteur de forme du processeur d’effets
      description: Décrit le format physique ou de livraison du processeur
    egg_decorating_items_included:
      name: Articles de décoration d’œufs inclus
      description: Précise les accessoires fournis dans les kits de décoration d’œufs,
        par exemple des colorants, des trempettes à œufs
    egg_turning:
      name: Retournement des œufs
      description: Décrit la méthode de rotation d’œufs dans des incubateurs, telle
        qu’automatique ou manuelle
    electric_scooter_motor_type:
      name: Type de moteur de scooter électrique
      description: Spécifie le type et la configuration des moteurs de scooter, tels
        que le courant continu à balais ou le courant continu sans balais
    electrode_connector_type:
      name: Type de connecteur d’électrode
      description: Décrit l’interface physique utilisée pour fixer les électrodes
        ou les coussinets
    electronic_drum_components:
      name: Composants de batterie électronique
      description: Spécifie les éléments d’une batterie électronique, par exemple,
        module ou pads
    electronic_game_genre:
      name: Genre de jeu électronique
      description: Identifie la catégorie d’un jeu électronique, par exemple, fitness
        ou puzzle
    electrotherapy_modality:
      name: Modalité d’électrothérapie
      description: Spécifie les types de technologies de stimulation pris en charge
        par l’appareil (par exemple, TENS, EMS, IFC)
    embellishment/trim_material:
      name: Matériau d’embellissement/garniture
      description: Identifie le matériau utilisé pour les détails décoratifs ou les
        finitions, par exemple, paillettes ou perles
    embellishments:
      name: Décorations
      description: Identifie les éléments décoratifs ajoutés sur un produit, par exemple,
        paillettes ou boutons
    embossing_project_type:
      name: Type de projet de gaufrage
      description: Identifie le type de projet de gaufrage, par exemple, scrapbooking
        ou fabrication de cartes
    embouchure_hole_shape:
      name: Forme du trou d’embouchure
      description: Décrit la forme de l’embouchure sur une tête de flûte, par exemple
        ronde ou ovale
    emergency/safety_sign_design:
      name: Conception de panneaux d’urgence/sécurité
      description: Identifie le type de message de sécurité ou d’urgence sur un panneau,
        par exemple, sortie de secours ou chien de garde
    emergency_items_included:
      name: Articles d’urgence inclus
      description: Précise les articles inclus dans les kits d’urgence, comme une
        radio ou des piles
    enclosure_type:
      name: Type de boîtier
      description: Précise le type de boîtier ou de couvercle pour les imprimantes
        3D, comme un cadre ouvert ou un boîtier bricolé
    end_design:
      name: Conception des extrémités
      description: Spécifie le nombre d’extrémités fonctionnelles et si elles sont
        remplaçables ou interchangeables
    enema_device_type:
      name: Type de dispositif de lavement
      description: Classe le système de conception ou de livraison principal du produit
    enema_nozzle_type:
      name: Type de buse de lavement
      description: Spécifie le style ou le matériau de la buse ou de la pointe fournie
        avec le kit (par exemple, pointe fine, pointe pédiatrique, buse en acier inoxydable)
    energy_efficiency_class:
      name: Classe d’efficacité énergétique
      description: Définit la note d’efficacité énergétique d’un produit, par exemple
        A+++
    energy_efficiency_class_hdr:
      name: Classe d’efficacité énergétique (HDR)
      description: Précise l’efficacité énergétique des appareils compatibles HDR,
        généralement les téléviseurs ; par exemple A+++
    energy_efficiency_class_sdr:
      name: Classe d’efficacité énergétique (SDR)
      description: Précise l’efficacité énergétique des appareils compatibles SDR,
        généralement les téléviseurs ; par exemple A+++
    engine_design:
      name: Conception du moteur
      description: Décrit la configuration du moteur d’un véhicule, par exemple, deux
        temps
    engine_purpose:
      name: Objectif du moteur
      description: Identifie l’utilisation prévue d’un petit moteur, par exemple,
        tondeuse à gazon ou tronçonneuse
    engine_type:
      name: Type de moteur
      description: Identifie le type de moteur dans un véhicule ou une pièce, par
        exemple, électrique ou diesel
    engraving:
      name: Gravure
      description: Précise le type de gravure sur un produit, par exemple, texte personnalisé
        ou logo
    entry_orientation:
      name: Orientation d’entrée
      description: Décrit la direction dans laquelle les pièces sont insérées dans
        le mécanisme (par exemple, avant, haut, côté, bas)
    envelope_features:
      name: Caractéristiques de l’enveloppe
      description: Décrit les caractéristiques particulières des enveloppes, par exemple,
        à fermoir ou doublées
    envelope_seal_design:
      name: Conception du sceau d’enveloppe
      description: Décrit l’esthétique ou le style des cachets d’enveloppe, par exemple,
        floral ou monogramme
    equalizer_type:
      name: Type d’égaliseur
      description: Classe la topologie d’égalisation ou le style de traitement fourni
        par l’unité
    equipment_operation:
      name: Fonctionnement de l’équipement
      description: Décrit le fonctionnement d’un équipement médical, par exemple,
        manuel ou motorisé
    era:
      name: Ère
      description: Utilisé pour classer les objets de collection ou les antiquités
        selon leur époque, par exemple, Far West ou Seconde Guerre mondiale
    error_correction_type:
      name: Type de correction d’erreur
      description: Indique si le module de mémoire comprend une fonction de correction
        d’erreurs et, le cas échéant, la technologie ECC spécifique ou le type de
        mise en mémoire tampon utilisé
    esrb_rating:
      name: Notation CERS
      description: Identifie l’âge auquel les jeux vidéo sont adaptés, par exemple,
        E (Tout le monde) ou T (Ados)
    ethernet_cable_category:
      name: Catégorie de câble Ethernet
      description: Indique la catégorie TIA/EIA des câbles Ethernet à paires torsadées,
        définissant la bande passante et les performances
    ethernet_lan_interface_type:
      name: Type d’interface réseau Ethernet
      description: Précise le type de connexion Ethernet pris en charge par un produit,
        comme LAN ou rapide
    ev_battery_features:
      name: Caractéristiques de la batterie de VE
      description: Met en avant les caractéristiques des batteries des véhicules électriques,
        par exemple, longue durée de vie ou système intelligent de gestion de la batterie
    ev_battery_type:
      name: Type de batterie de VE
      description: Identifie le type de batterie utilisé dans les véhicules électriques,
        par exemple, lithium-ion ou plomb-acide
    ev_connector/adapter_type:
      name: Type de connecteur/adaptateur de VE
      description: Identifie le type de connecteur ou d’adaptateur pour les véhicules
        électriques, par exemple, CCS ou Tesla
    ev_conversion_kit_components:
      name: Composants du kit de conversion de VE
      description: Identifie les pièces incluses dans un kit de conversion en véhicule
        électrique, par exemple, moteur ou batterie
    evaporation_technology:
      name: Technologie d’évaporation
      description: Définit le système d’évaporation dans les appareils de chauffage
        et climatisation, comme les systèmes naturels ou à ultrasons
    event_type:
      name: Type d’événement
      description: Classifie la nature d’un événement, par exemple, concert, séminaire
        ou festival
    exercise_equipment_included:
      name: Équipement d’exercice inclus
      description: Identifie les équipements d’exercice spécifiques inclus dans un
        ensemble, par exemple, tapis de yoga ou haltères
    exercise_equipment_material:
      name: Matériau de l’équipement d’exercice
      description: Identifie le principal matériau utilisé dans les équipements de
        fitness, par exemple, acier ou caoutchouc
    exercise_machine_board_function:
      name: Fonction de la carte de la machine de sport
      description: Décrit la fonction principale ou l’emplacement de la carte dans
        la machine (par exemple, contrôle du moteur, affichage)
    exercise_machine_features:
      name: Caractéristiques de l’appareil d’exercice
      description: Décrit les caractéristiques particulières des équipements d’exercice,
        par exemple, vitesse réglable ou affichage intégré
    exercise_mat_material:
      name: Matériau du tapis d’exercice
      description: Spécifie le type de matériau entrant dans la composition dans les
        tapis d’exercice, par exemple, PVC ou liège
    exfoliating_agent_type:
      name: Type d’agent exfoliant
      description: Identifie le principal agent gommant ou exfoliant chimique utilisé
    exfoliation_level:
      name: Niveau d’exfoliation
      description: Indique le degré de douceur ou de force de l’action exfoliante
        de l’éponge
    exfoliation_method:
      name: Méthode d’exfoliation
      description: Indique si et comment le nettoyant exfolie la peau (par exemple,
        physique, chimique, enzymatique)
    expansion_slots:
      name: Emplacements d’extension
      description: Précise les emplacements prévus pour ajouter du matériel dans les
        ordinateurs ou les serveurs, par exemple PCIe, M.2
    exposure_control:
      name: Contrôle de l’exposition
      description: Définit la méthode de réglage de la quantité de lumière dans une
        photo, par exemple, priorité à l’obturation ou priorité à l’ouverture
    extended_saxophone_range:
      name: Gamme de saxophones étendue
      description: Spécifie la plage de notes étendue d’un saxophone, par exemple,
        touche fa# aiguë ou touche la grave
    external_antenna_connector_type:
      name: Type de connecteur d’antenne externe
      description: Définit le connecteur physique utilisé pour brancher des antennes
        externes
    external_defibrillator_features:
      name: Caractéristiques du défibrillateur externe
      description: Met en avant les principales caractéristiques des défibrillateurs
        médicaux, par exemple, fonction pédiatrique ou ECG à l’écran
    extinguisher_rating:
      name: Évaluation de l’extincteur
      description: Indique la classification des extincteurs, par exemple Classe A,
        Classe B
    extinguishing_agent_type:
      name: Type d’agent extincteur
      description: Précise le type de substance extinctrice présente dans les produits
        de sécurité incendie, comme l’eau ou la mousse
    extraction_method:
      name: Méthode d’extraction
      description: Identifie la technique utilisée pour extraire les cannabinoïdes
        du matériel végétal de chanvre
    extraction_technology:
      name: Technologie d’extraction
      description: Décrit le mécanisme principal que le produit utilise pour extraire
        les impuretés
    extraction_type:
      name: Type d’extraction
      description: Précise la méthode d’évacuation de l’air dans les hottes aspirantes,
        comme les hottes sans conduit ou convertibles
    extractor_items_included:
      name: Articles d’extraction inclus
      description: Répertorie les différents outils extracteurs ou accessoires inclus
        dans un lot
    extractor_tip_style:
      name: Style de pointe d’extracteur
      description: Définit la conception de l’embout sur les outils d’extraction,
        par exemple cuillère, aiguille
    eye_care_applicator_type:
      name: Type d’applicateur de soin pour les yeux
      description: Définit le style de l’applicateur intégré ou de l’embout distributeur
        fourni avec le produit de soins pour les yeux
    eye_condition_treated:
      name: Problème oculaire traité
      description: Indique le principal problème oculaire que le produit vise à soulager
        ou traiter
    eye_pillow_shape:
      name: Forme du coussin pour les yeux
      description: Définit la forme physique d’un coussin pour les yeux, profilé ou
        rectangulaire par exemple
    eye_shadow_effect:
      name: Effet ombre à paupières
      description: Définit l’impact visuel du fard à paupières, par exemple smoky,
        pailleté
    eye_shadow_palette_size:
      name: Taille de la palette de fards à paupières
      description: Classe les produits par formats courants de palettes pour une navigation
        rapide
    eyebrow_applicator_type:
      name: Type d’applicateur pour sourcils
      description: Décrit l’applicateur ou l’embout utilisé pour appliquer le produit
        à sourcils
    eyebrow_enhancer_color:
      name: Couleur du rehausseur de sourcil
      description: Spécifie la couleur de produits rehausseurs de sourcils, telle
        que noir ou blond clair
    eyebrow_stencil_shape:
      name: Forme de pochoir à sourcils
      description: Décrit la forme principale du sourcil ou le style de courbe que
        le pochoir est destiné à créer
    eyelash_applicator_design:
      name: Conception de l’applicateur de cils
      description: Définit le style des applicateurs de faux cils, par exemple droit,
        incurvé
    eyelash_curl_type:
      name: Type de courbure des cils
      description: Spécifie la classification de courbure (par exemple, courbure C,
        boucle D) des fibres de cils
    eyelash_curler_type:
      name: Type de recourbe-cils
      description: Spécifie la conception ou le mécanisme du recourbe-cils
    eyelash_material:
      name: Matériau du cil
      description: Identifie le type de matériau utilisé dans les faux cils, par exemple,
        soie ou synthétique
    eyelash_remover_formulation:
      name: Formulation du dissolvant à faux-cils
      description: Identifie le type de formule principal du dissolvant
    eyelash_style:
      name: Style de cils
      description: Décrit l’effet visuel ou le design global des cils (par exemple,
        naturel, œil de chat, spectaculaire)
    eyelash_type:
      name: Type de cil
      description: Spécifie le type de faux cils, par exemple en bande ou en extension
    eyepiece/adapter_material:
      name: Matériau de l’oculaire/adaptateur
      description: Identifie le matériau utilisé dans les oculaires ou les adaptateurs
        de microscope, par exemple, verre ou métal
    eyewear_compatibility:
      name: Compatibilité avec les lunettes
      description: Indique le type de lunettes pour lequel le cordon est prévu
    eyewear_frame_color:
      name: Couleur de la monture des lunettes
      description: Identifie la couleur d’une monture de lunettes, par exemple noire
        ou dorée
    eyewear_frame_design:
      name: Conception de la monture des lunettes
      description: Décrit le style de lunettes de soleil, telles qu’aviateur ou yeux
        de chat
    eyewear_frame_material:
      name: Matériau de la monture des lunettes
      description: Spécifie le type de matériau utilisé pour les montures de lunettes,
        par exemple, bambou ou fibre de carbone
    eyewear_frame_pattern:
      name: Modèle de monture des lunettes
      description: Identifie le motif de montures de lunettes, par exemple à rayures
        ou à carreaux
    eyewear_frame_shape:
      name: Forme de la monture des lunettes
      description: Décrit la forme de lunettes, comme ronde ou carrée
    eyewear_hinge_type:
      name: Type de charnière des lunettes
      description: Décrit le mécanisme de charnière utilisé sur les branches, influant
        sur la durabilité et la flexibilité
    eyewear_lens_color:
      name: Couleur des verres des lunettes
      description: Identifie la couleur de verres de lunettes, par exemple claire
        ou orange
    eyewear_lens_material:
      name: Matériau des verres des lunettes
      description: Spécifie le type de matériau utilisé pour les verres de lunettes,
        par exemple, verre ou plastique à indice élevé
    eyewear_lens_pattern:
      name: Modèle de verres des lunettes
      description: Décrit le motif ou l’imprimé de verres de lunettes, comme à cœurs
        ou imprimé cachemire
    eyewear_strap_features:
      name: Caractéristiques du cordon des lunettes
      description: Met en évidence les caractéristiques fonctionnelles notables du
        cordon ou de la chaîne (par exemple, flottant, réfléchissant, à détachement
        rapide)
    eyewear_strap_or_chain_style:
      name: Style de cordon ou de chaîne des lunettes
      description: Spécifie le style de construction principal ou le facteur de forme
        du cordon ou de la chaîne de lunettes (par exemple, cordon en corde, chaîne
        à maillons métalliques, cordon en néoprène)
    fabric:
      name: Tissu
      description: Identifie le type de tissu utilisé dans un produit, par exemple,
