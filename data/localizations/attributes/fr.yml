    compatible_hammock_design:
      name: Design de hamac compatible
      description: Précise le type de hamac avec lequel un produit est compatible,
        par exemple suspendu, avec cadre
    compatible_harmonica_type:
      name: Type d’harmonica compatible
      description: Identifie le type d’harmonica pour lequel un produit est conçu,
