    gutter_style:
      name: Style gouttière
      description: Spécifie le type de gouttière, par exemple, à débit profond ou
        industriel
    habitat_material:
      name: Matériau de l’habitat
      description: Identifie le matériau principal de l’habitat pour animaux de compagnie,
        par exemple, acrylique ou bois
    hair_care_effect:
      name: Effet soin des cheveux
      description: Définit les principaux avantages ou résultats que le shampooing
