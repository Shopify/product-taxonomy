    tampon_absorbency_level:
      name: Nivel absorbție tampon
      description: Identifică capacitatea de absorbție a tampoanelor, cum ar fi redusă
        sau ridicată
    tampon_features:
      name: Caracteristici tampon
      description: Descrie caracteristicile specifice ale tampoanelor, cum ar fi designul
        confortabil sau etanșeitatea
    tan_type:
      name: Tip bronz
      description: Definește intensitatea culorii și procesul de aplicare a articolelor
        de bronzat, de exemplu, întunecat, instant
    tank_color:
      name: Culoare rezervor
      description: Identifică culoarea unui produs, de obicei rezervoarele de toaletă;
