    exercise_equipment_included:
      name: Echipament de sport inclus
      description: Identifică obiectele specifice pentru sport incluse într-un set,
        cum ar fi un salteaua de yoga sau gantere
    exercise_equipment_material:
      name: Material echipament de sport
      description: Identifică materialul principal utilizat pentru echipamentele de
        fitness, cum ar fi oțelul sau cauciucul
    exercise_machine_board_function:
      name: Funcție placă aparat de exerciții
