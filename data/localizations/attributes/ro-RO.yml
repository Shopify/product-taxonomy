    earring_design:
      name: Design cercel
      description: Descrie stilul sau structura cerceilor, cum ar fi tip verigă sau
        tip șurub
    edge_style:
      name: Stil margine
      description: Specifică forma marginilor pentru articole cum ar fi blaturile,
        de ex. rotunjită, cu colțuri rotunjite
    edge_type:
      name: Tip margine
      description: Identifică stilul muchiei pentru unelte sau ustensile, cum ar fi
        zimțate sau crestate
    education_level:
      name: Nivel studii
      description: Specifică nivelul de studii pentru care este proiectat software-ul,
        cum ar fi școala elementară sau studii postuniversitare
    effects_processor_form_factor:
      name: Factor de formă procesor efecte
      description: Descrie formatul fizic sau de livrare al procesorului
    egg_decorating_items_included:
      name: Articole pentru decorarea ouălor incluse
      description: Specifică accesoriile furnizate în trusele pentru decorarea ouălor,
