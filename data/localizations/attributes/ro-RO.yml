---
ro-RO:
  attributes:
    3d_glasses_fit_design:
      name: Design potrivire ochelari 3D
      description: Indică modul în care ochelarii sunt purtați sau atașați (de exemplu,
        atașați peste ochelari, cu protecție laterală, suprapuşi peste ochelari)
    3d_glasses_material:
      name: Material ochelari 3D
      description: Specifică materialul folosit pentru ochelarii 3D, cum ar fi bambusul
        sau oțelul inoxidabil
    3d_glasses_technology:
      name: Tehnologie ochelari 3D
      description: Specifică tehnologia de imagine/sincronizare 3D pentru care ochelarii
        sunt proiectați, determinând compatibilitatea cu afișaje sau proiectoare specifice
    3d_printer_case_style:
      name: Stil carcasă imprimantă 3D
      description: Clasifică tipul general de produs pentru ca cumpărătorii să poată
        diferenția între genți moi de transport, huse rigide, carcase fixe și protecții
        simple împotriva prafului
    3d_printer_cleaning_kit_components_included:
      name: Componente incluse în kitul de curățare pentru imprimantă 3D
      description: Enumeră instrumentele individuale și consumabilele incluse în kit
        pentru ca cumpărătorii să știe exact ce achiziționează
    3d_printing_resin_type:
      name: Tip de rășină pentru imprimare 3D
      description: Specifică formularea sau aplicația prevăzută a rășinii, ajutând
        cumpărătorii să identifice rapid dacă rășina este standard, de calitate inginerească,
        turnabilă sau de alte tipuri specializate
    80_plus_efficiency_rating:
      name: Rating de eficiență 80 Plus
      description: Denotă nivelul oficial de certificare de eficiență energetică 80
        Plus pe care PSU-ul l-a obținut
    abrasive_material:
      name: Material abraziv
      description: Identifică tipul de abraziv folosit pentru instrumente de șlefuit,
        cum ar fi diamantul sau carbura de siliciu
    absinthe_style:
      name: Tip absint
      description: Definește tipul de absint, de exemplu, mixt, distilat
    absinthe_variety:
      name: Varietate absint
      description: Diferențiază produsele care conțin absint în funcție de varietățile
        unice, de exemplu, rouge (roșu), verte (verde)
    absorbency_level:
      name: Nivel absorbție
      description: Definește capacitatea de absorbție, de obicei pentru articolele
        de îngrijire personală; de exemplu, în timpul nopții, pentru flux puțin abundent
    absorbent_hygiene_product_features:
      name: Caracteristicile produsului sanitar absorbant
      description: Identifică caracteristicile speciale ale produselor sanitare, cum
        ar fi prevenirea scurgerilor sau proprietățile hipoalergenice
    academic_level:
      name: Nivel studii
      description: Specifică nivelul de studii asociat conținutului media, cum ar
        fi licență sau doctorat
    accessibility_design_features:
      name: Caracteristici de design pentru accesibilitate
      description: Listează elemente speciale de design care îi ajută pe utilizatorii
        cu deficiențe de auz, vedere sau dexteritate
    accessory_material:
      name: Material accesoriu
      description: Specifică tipul de material utilizat pentru accesorii, de obicei
        pentru consumabilele pentru livrări, de exemplu, plastic, carton
    accessory_size:
      name: Dimensiune accesoriu
      description: Definește dimensiunea unui accesoriu, cum ar fi dimensiune unică
        sau compactă
    accordion_tuning:
      name: Acordare acordeon
      description: Specifică tipul de acordare utilizat pentru un acordeon, cum ar
        fi acordarea uniformă sau pentru concert
    activation_mechanism:
      name: Mecanism de activare
      description: Specifică metoda principală care declanșează alarma
    activation_method:
      name: Metodă de activare
      description: Descrie modul în care utilizatorul activează creditul preplătit
        sau cartela SIM
    active_ingredient:
      name: Ingredient activ
      description: Identifică substanțele principale din articolele de îngrijire personală,
        de exemplu vitamina A, retinol
    activewear_clothing_features:
      name: Caracteristici articole de îmbrăcăminte sport
      description: Identifică funcțiile unice ale articolelor de îmbrăcăminte pentru
        sport, cum ar fi elasticitatea în patru direcții sau designul care lasă pielea
        să respire
    activity:
      name: Activitate
      description: Indică sportul sau activitatea pentru care este conceput produsul,
        cum ar fi tenisul sau pilates
    activity_tracker_design:
      name: Design tracker pentru activitate
      description: Specifică modul în care este purtat trackerul de activitate, de
        exemplu, cu clemă, pe o bandă pe braț
    acupuncture_model_format:
      name: Format model pentru acupunctură
      description: Definește dimensiunea și scara modelelor de acupunctură, de exemplu
        în mărime naturală, în miniatură
    acupuncture_model_type:
      name: Tip model pentru acupunctură
      description: 'Specifică partea corpului sau specia pe care o reprezintă modelul
        pentru acupunctură, de exemplu, cap, mână, animal '
    adapter_directionality:
      name: Direcționalitate adaptor
      description: Indică dacă adaptorul suportă fluxul de semnal în ambele direcții
        sau doar într-o direcție specificată
    adapter_operating_modes:
      name: Moduri de operare adaptor
      description: Specifică dacă adaptorul funcționează ca receptor Bluetooth, transmițător
        sau ambele
    adaptive_sync_technology:
      name: Tehnologie de sincronizare adaptivă
      description: Specifică tehnologia de rată de reîmprospătare variabilă (VRR)
        suportată de monitor pentru imagini fără întreruperi
    adc_resolution:
      name: Rezoluție ADC
      description: Specifică rezoluția (în biți) a convertorului analog-digital integrat,
        definind precizia măsurătorilor
    additional_animation_software_features:
      name: Funcții suplimentare software pentru animație
      description: Specifică caracteristicile unice ale software-ului de editare de
        animații, cum ar fi animația personajelor sau efectele vizuale
    additional_cleaning_technology:
      name: Tehnologie de curățare suplimentară
      description: Enumeră orice tehnologii de curățare incluse în afară de abur (de
        exemplu, ultrasonică, UV, ozon)
    additional_design_software_type:
      name: Tip suplimentar software de proiectare
      description: Specifică capacitățile suplimentare ale software-ului de proiectare,
        cum ar fi turul virtual sau designul peisajului
    additional_financial_software_features:
      name: Funcții suplimentare software financiar
      description: Identifică capabilitățile suplimentare ale software-ului financiar,
        cum ar fi managementul activelor sau auditul și conformitatea
    additional_graphic_software_features:
      name: Funcții suplimentare software de editare grafică
      description: Evidențiază capacitățile suplimentare ale software-ului grafic,
        cum ar fi ilustrația digitală sau designul aspectului
    additional_publishing_software_features:
      name: Funcții suplimentare software publicare de conținut
      description: Evidențiază funcționalitățile suplimentare ale software-ul pentru
        publicarea de conținut, cum ar fi print sau digital
    additional_security_software_features:
      name: Funcții suplimentare software de securitate
      description: Identifică capabilitățile suplimentare ale software-ului de securitate,
        de exemplu criptarea discului, detectarea intruziunilor
    adhesive_application_type:
      name: Tipul de aplicare a adezivului
      description: Definește serviciul de aplicare gene false sau scopul de utilizare
        a adezivului
    adhesive_features:
      name: Caracteristicile adezivului
      description: Evidențiază proprietăți speciale ale adezivului folosit pe plasturi
        sau benzi
    adhesive_format:
      name: Formatul adezivului
      description: Indică forma fizică în care adezivul este furnizat pentru utilizare
        la reparații
    adhesive_strength:
      name: Aderența adezivului
      description: 'Specifică nivelul de aderență sau forța de ridicare a adezivului
        benzii nazale (de ex.: standard, extra aderență)'
    adhesive_type:
      name: Tip adeziv
      description: Identifică tipul de adeziv utilizat într-un produs, cum ar fi adeziv
        care poate fi îndepărtat sau adeziv permanent
    aftershave_product_form:
      name: Formă produs aftershave
      description: Identifică consistența unui produs aftershave, cum ar fi sub formă
        de balsam sau cremă
    age_group:
      name: Grup de vârstă
      description: Definește intervalul de vârstă vizat pentru un produs, cum ar fi
        adulți sau copii
    age_restrictions:
      name: Restricții legate de vârstă
      description: Indică vârsta minimă necesară pentru un produs sau eveniment, cum
        ar fi minimum 18 ani
    ai_application:
      name: Aplicație bazată pe IA
      description: Specifică funcția IA în software, cum ar fi analiza predictivă
        sau recunoașterea vorbirii
    air_freshener_form:
      name: Formă odorizant
      description: Definește tipul de odorizant auto, de exemplu sub formă de ulei,
        clemă montată pe gura de aerisire
    air_fryer_functions:
      name: Funcții friteuză cu aer cald
      description: Enumeră diferitele modalități de gătit disponibile pentru o friteuză
        cu aer sau un aparat similar, de exemplu, prăjire cu curent de aer, coacere
    air_mattress_features:
      name: Caracteristici saltea pneumatică
      description: Descrie caracteristicile unice ale unei saltele pneumatice, cum
        ar fi ușor de umflat sau rezistentă la perforare
    air_tube_configuration:
      name: Configurație tub de aer
      description: Indică numărul sau tipul tuburilor de umflare cu aer integrate
        în manșetă
    airbrush_feed_type:
      name: Tip alimentare aerograf
      description: Identifică metoda de furnizare a vopselei în aerografe, cum ar
        fi gravitațională sau cu sifon
    airbrush_operation_method:
      name: Modalitate de utilizare aerograf
      description: Indică stilul de funcționare al aerografelor, de exemplu, acțiune
        dublă sau o singură acțiune
    aircraft_engine_configuration:
      name: Configurație motor aeronavă
      description: 'Specifică numărul de motoare cu care este prevăzută aeronava:
        unul sau două'
    aircraft_engine_type:
      name: Tip motor avion
      description: Specifică tipul de motor cu care este prevăzută aeronava, cum ar
        fi jet sau turbopropulsor
    airflow_opening_design:
      name: Design orificii de ventilație
      description: Descrie configurația de respirație sau ventilație încorporată în
        piesa bucală
    airsoft_equipment_included:
      name: Echipament airsoft inclus
      description: Specifică echipamentul suplimentar furnizat cu produse airsoft,
        cum ar fi ochelari de protecție sau vestă tactică
    album_type:
      name: Tip album
      description: Descrie stilul de legare al setului de albume decorate sau al setului
        de ștanțare, de exemplu legat cu spirală, album decorat
    alcohol/solvent_content:
      name: Conținut de alcool/solvent
      description: Clasifică produsul în funcție de conținutul de alcool sau solvenți
        în scopuri de transport și de reglementare (de ex., alcool ≤24%, alcool >24%,
        recipient mic cu solvent)
    alcohol_content:
      name: Conținut de alcool
      description: Indică dacă tonerul este fără alcool sau, în cazul în care acesta
        este prezent, ce cantitate aproximativă se regăsește în formulă
    alert_type:
      name: Tip alertă
      description: Specifică tipul de alertă oferit de un produs, cum ar fi alarmele
        sonore sau notificările pentru smartphone
    allergen_information:
      name: Informații alergeni
      description: Indică alergenii potențiali prezenți în alimente sau băuturi, cum
        ar fi grâul sau alunele
    allergen_test_type:
      name: Tip test alergeni
      description: Specifică tipul de alergen detectat de kitul de testare, cum ar
        fi alimentar sau de mediu
    allergens:
      name: Alergeni
      description: Indică potențialii alergeni din produsele de îngrijire a sănătății
        și din produsele cosmetice, de exemplu linalol sau limonen
    allergy_friendly_features:
      name: Caracteristici antialergice
      description: Identifică dacă un produs are proprietăți antialergice, cum ar
        fi fără latex sau rezistent la mucegai
    amino_acid_subtype:
      name: Subtip de aminoacid
      description: Specifică tipul principal sau profilul de aminoacizi conținuți
        în supliment
    amplifier/booster_suitable_location:
      name: Locația adecvată a amplificatorului
      description: Indică locațiile cele mai potrivite pentru amplificatorul de semnal,
        cum ar fi vehiculul sau locația de mari dimensiuni
    amplifier_class:
      name: Clasă amplificator
      description: Definește tipul de amplificator, cum ar fi AB sau D
    amplifier_configuration:
      name: Configurație amplificator
      description: Specifică configurația amplificatoarelor pentru autovehicule, cum
        ar fi cu două sau cu patru canale
    amputation_level:
      name: Nivel de amputație
      description: Indică nivelul de amputație pentru care este conceput compresorul
    analyte_measured:
      name: Analit măsurat
      description: Identifică biomarkerul (biomarkerii) pentru care soluția de control
        oferă calibrare
    anamorphic_squeeze_ratio:
      name: Raport de compresie anamorfă
      description: Indică factorul de compresie pe orizontală al unui obiectiv anamorf,
        permițându-le utilizatorilor să potrivească obiectivele cu rezultatul de decompresie
        dorit
    anatomical_detail_displayed:
      name: Detaliu anatomic afișat
      description: Indică ce caracteristici anatomice sau meridiane sunt evidențiate
        pe model
    anchor_type:
      name: Tip ancoră
      description: Definește ancora utilizată în echipamentele de sporturi nautice
        cu remorcare, cum ar fi de tip vârf de harpon sau plug
    anemometer_application:
      name: Aplicații anemometru
      description: Identifică utilizarea prevăzută a unui anemometru, cum ar fi industrial
        sau meteorologic
    angles_supported:
      name: Unghiuri acceptate
      description: Specifică gama de unghiuri posibile cu un produs, de obicei pentru
        profuse electronice; de exemplu, reglabil, de la 0° la 180°
    angling_style:
      name: Stil de pescuit
      description: Definește tehnica de pescuit pentru care este proiectat produsul,
        cum ar fi surfcasting sau pescuitul la muscă
    animal_feed_form:
      name: Formă hrană pentru animale
      description: Specifică forma hranei pentru animale, cum ar fi lichidă sau sub
        formă de granule
    animal_type:
      name: Tip animal
      description: Specifică tipul de animal pentru care este destinat un produs,
        cum ar fi rațele, căprioarele sau câinii
    answering_machine_type:
      name: Tip robot telefonic
      description: Specifică prezența și tehnologia unui robot telefonic integrat
    antenna_connector_type:
      name: Tip conector antenă
      description: Specifică conectorul RF folosit pentru a atașa antene externe
    antenna_rf_connector_type:
      name: Tip de conector RF pentru antenă
      description: Identifică conectorul RF utilizat de antenă
    antenna_type:
      name: Tip antenă
      description: Specifică tipul de antenă pentru dispozitive electronice, de exemplu,
        omnidirecțională, grilă
    anti_agin_skin_care_type:
      name: Tip produs de îngrijire anti-îmbătrânire
      description: Clasifică tipul de produs de îngrijire anti-îmbătrânire pentru
        piele, de exemplu mască, toner
    anti_perspirant_strength_level:
      name: Nivelul de eficacitate al antiperspirantului
      description: 'Indică nivelul de eficacitate al antiperspirantului (de ex.: eficacitate
        clinică, eficacitate pentru sport)'
    antibody_class_tested:
      name: Clasă de anticorpi testată
      description: Specifică imunoglobulina sau biomarkerul pe care kitul îl detectează
        (de exemplu, IgE, IgG4)
    antifreeze_type:
      name: Tip antigel
      description: Specifică tipul de antigel pentru întreținerea vehiculului, de
        exemplu concentrat, diluat în prealabil
    antique_car_design:
      name: Design mașini de epocă
      description: Descrie stilul principal de design al unei mașini de epocă, cum
        ar fi T-Bucket sau Grand Tourer
    antique_vehicle_era:
      name: Epoca vehiculului vechi
      description: Descrie perioada istorică în care a fost fabricat vehiculul de
        epocă, cum ar fi Epoca Bronzului (Brass Era) sau Epoca Vintage
    appliance_board_function:
      name: Funcție placă dispozitiv
      description: Specifică rolul funcțional al plăcii în cadrul dispozitivului
    appliance_unit_location:
      name: Locație unitate dispozitiv
      description: Indică secțiunea fizică a dispozitivului pentru care este destinată
        placa (de exemplu, unitate interioară sau exterioară)
    application_area:
      name: Zonă de aplicare
      description: Specifică partea sau zona corpului în care se aplică produsul,
        de exemplu buze, întregul corp
    application_method:
      name: Metodă de aplicare
      description: Definește modul în care este aplicat sau utilizat un produs, de
        exemplu gel, lichid, spray
    application_type:
      name: Tip de aplicare
      description: Indică dacă tratamentul se lasă în păr sau se clătește, precum
        și orice mod special de utilizare
    applicator_format:
      name: Forma aplicatorului
      description: Descrie forma fizică sau tipul aplicatorului pentru loțiune sau
        crema de protecție solară
    applicator_material:
      name: Material aplicator
      description: Specifică materialul folosit pentru aplicator, de obicei pentru
        tampoane; de exemplu plastic, carton
    applicator_type:
      name: Tip aplicator
      description: Identifică tipul de aplicator inclus cu tampoanele, de exemplu
        cu aplicator, fără aplicator
    applique/patch_shape:
      name: Formă inserție/petic
      description: Descrie forma inserției sau a peticelui, cum ar fi animale sau
        geometrice
    applique_shape:
      name: Formă inserție
      description: Descrie forma inserțiilor, cum ar fi florale sau animale
    aquarium_filter_features:
      name: Caracteristici filtru pentru acvariu
      description: Descrie caracteristicile speciale ale filtrelor pentru acvarii,
        de exemplu schimbarea rapidă a cartușului, filtrarea în mai multe etape
    aquarium_light_spectrum:
      name: Spectru de lumină acvariu
      description: Specifică tipul de spectru de lumină utilizat pentru iluminarea
        acvariului, de exemplu albastru, lumină naturală
    aquarium_overflow_box_design:
      name: Proiectare recipient de preaplin pentru acvariu
      description: Descrie configurația unui recipient de preaplin pentru un acvariu,
        cum ar fi extern sau suspendat
    archery_activity:
      name: Activitate de tir cu arcul
      description: Specifică tipul de activitate de tir cu arcul, de exemplu vânătoare
        în aer liber, exersat cu ținte
    archery_equipment_included:
      name: Echipament de tir cu arcul inclus
      description: Specifică accesoriile incluse pentru tirul cu arcul, de exemplu
        suport de stabilizare, săgeți de siguranță
    archery_style:
      name: Stil de tir cu arcul
      description: Definește tipul specific de tir cu arcul pentru care este conceput
        produsul, de exemplu tir cu arcul 3D, vânătoare cu arcul
    archery_target_type:
      name: Tip de țintă pentru tir cu arcul
      description: Specifică tipul de țintă pentru tir cu arcul, conceput pentru diferite
        exerciții, de exemplu, țintă 3D, țintă de tip sac
    aromatherapy:
      name: Aromaterapie
      description: Specifică parfumul sau uleiul esențial folosit, de exemplu eucalipt,
        lavandă
    arrangement:
      name: Aranjament
      description: Specifică modul în care sunt aranjate sau prezentate florile, de
        exemplu, în vază, în coș
    arrow/bolt_material:
      name: Material săgeată/proiectil
      description: Specifică materialul din care sunt realizate săgețile sau al proiectilele,
        cum ar fi aluminiul sau bambusul.
    arrow_fletching_material:
      name: Material pentru aripile săgeților
      description: Identifică materialul folosit pentru aripile săgeților, cum ar
        fi material sintetic sau plastic
    arrow_material:
      name: Material săgeată
      description: Identifică materialul folosit pentru structura săgeților, cum ar
        fi bambusul sau fibra de sticlă
    art/crafting_tool_material:
      name: Material pentru instrumente folosite pentru artă/artizanat
      description: Identifică materialul principal din care sunt confecționate instrumentele
        folosite pentru artă sau artizanat, cum ar fi lemnul sau metalul
    art_fixative_application_method:
      name: Metoda de aplicare agent de fixare desene
      description: Descrie modul în care se aplică un agent de fixare pentru desene,
        cum ar fi aerosol sau cu pensula
    art_movement:
      name: Mișcare artistică
      description: Definește abordarea stilistică sau mișcarea artistică di care face
        parte o pictură, de exemplu, impresionism, expresionism
    art_style:
      name: Stil artistic
      description: Descrie stilul estetic al unui produs, cum ar fi Art Nouveau sau
        artă tipografică
    artwork_authenticity:
      name: Autenticitate operă de artă
      description: Indică autenticitatea operei de artă, specificând dacă este o creație
        originală sau o reproducere
    artwork_frame_material:
      name: Material pentru rama operei de artă
      description: Identifică materialul folosit pentru ramele operelor de artă, cum
        ar fi lemnul sau placarea cu aur
    artwork_type:
      name: Tip operă de artă
      description: Specifică stilul operei de artă digitală, cum ar fi artă tipografică
        sau pictură digitală
    assisted_braking_technology:
      name: Tehnologie de frânare asistată
      description: Indică tipul de frânare asistată a dispozitivelor de asigurare,
        de exemplu activ, pasiv
    attachment_method:
      name: Metodă de prindere
      description: Definește metoda utilizată pentru prinderea sau fixarea produsului,
        de exemplu cu bandă scai, cu clemă (clip-on)
    attachment_options:
      name: Opțiuni de prindere
      description: Specifică metodele de prindere sau fixare a unui produs, de exemplu,
        un șnur
    attachment_type:
      name: Tip de prindere
      description: Definește modalitatea de prindere a produsului, cum ar fi de tip
        capsă sau cu „scai”
    atv/off_road_tire_type:
      name: Tip anvelopă ATV/Off-road
      description: Identifică utilizarea specifică a anvelopelor pentru ATV-uri sau
        vehicule off-road, cum ar fi pe sol cu nisip sau noroi
    audio/scan_converter_features:
      name: Caracteristici convertor audio/scanare
      description: Descrie funcțiile unui convertor audio/scanare, cum ar fi conversia
        automată sau controlul de la distanță
    audio/video_cable_connector_type_end_a:
      name: Tip conector cablu audio/video (capăt A)
      description: Specifică conectorul exact sau interfața prezentă la primul capăt
        (capătul A) al cablului
    audio/video_cable_connector_type_end_b:
      name: Tip conector cablu audio/video (capăt B)
      description: Specifică conectorul exact sau interfața prezentă la al doilea
        capăt (capătul B) al cablului
    audio_bypass_type:
      name: Tip bypass audio
      description: Specifică modul în care semnalul audio este direcționat când efectul
        este dezactivat (de exemplu, true bypass, buffered, relay)
    audio_cassette_tape_type:
      name: Tip de bandă casetă audio
      description: Specifică formularea de bandă IEC (bias) pentru casetele audio
    audio_codecs/formats_supported:
      name: Codecuri/formate audio acceptate
      description: Specifică tipurile de fișiere audio pe care le poate reda un produs,
        cum ar fi WAVE sau MP3
    audio_component_form_factor:
      name: Factor de formă componentă audio
      description: Definește stilul fizic sau formatul de instalare al componentei
    audio_connectivity:
      name: Conectivitate audio
