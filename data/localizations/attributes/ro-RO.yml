    plan_service_type:
      name: Tip de serviciu abonament
      description: Definește dacă abonamentul SIM este doar pentru date sau include
        servicii de voce și/sau SMS
    plant_characteristics:
      name: Caracteristicile plantelor
      description: Definește trăsăturile specifice ale plantelor, de exemplu înflorire,
