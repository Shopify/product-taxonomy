    dietary_preferences:
      name: Preferințe alimentare
      description: Ajută la identificarea produselor potrivite pentru anumite regimuri
        alimentare, de exemplu, vegan, fără fructe cu coajă lemnoasă
    dietary_supplements:
      name: Suplimente alimentare
      description: Identifică substanțele nutritive adăugate la un produs, cum ar
        fi calciul sau probioticele
    dietary_use:
      name: Utilizare în regimul alimentar
      description: Clasifică produsele pe baza beneficiilor includerii în regimul
