    exfoliating_agent_type:
      name: Tip agent exfoliant
      description: Identifică exfoliantul abraziv sau chimic principal utilizat
    exfoliation_level:
      name: Nivelul de exfoliere
      description: Indică cât de blândă sau fermă este acțiunea de exfoliere a buretelui
    exfoliation_method:
      name: Metoda de exfoliere
      description: Indică dacă și cum produsul de curățare exfoliază pielea (de exemplu,
        fizic, chimic, enzimatic)
    expansion_slots:
      name: Sloturi extindere
      description: Specifică sloturile pentru adăugarea de echipamente hardware la
