        sunt specificate
    ear_tip_style:
      name: Tip dop auricular
      description: Definește forma geometrică a dopului auricular, care influențează
        potrivirea și etanșeitatea acustică
    earphone_features:
      name: Caracteristici căști
      description: Evidențiază caracteristicile unice ale căștilor, cum ar fi microfonul
        încorporat sau controlul volumului
    earplug_cord_style:
      name: Tip cablu dopuri auriculare
      description: Indică dacă dopurile de urechi sunt conectate cu un cablu, ceea
        ce ajută la prevenirea pierderii și facilitează îndepărtarea
    earplug_shape:
      name: Forma dopurilor auricular
      description: Descrie profilul fizic al dopului auricular, afectând confortul
        și potrivirea în diferite canale auditive
    earplug_type:
      name: Tipul dopurilor auriculare
      description: Clasifică stilul de construcție al dopurilor auriculare distribuite
        (de exemplu, spumă, turnat, filtrat)
    earplug_use:
      name: Utilizare dopuri de urechi
      description: Definește activitatea sau scopul specific pentru dopurile de urechi,
