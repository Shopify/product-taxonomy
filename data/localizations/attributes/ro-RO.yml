    vehicle_fluid_features:
      name: Caracteristicile fluidelor vehiculelor
      description: Descrie proprietățile speciale ale fluidelor vehiculelor, cum ar
        fi antigel sau biodegradabile
    vehicle_fluid_type:
      name: Tipul fluidelor vehiculelor
      description: Identifică tipul de fluid utilizat la întreținerea vehiculelor,
        cum ar fi concentrat sau diluat în prealabil
    vehicle_frame/body_features:
      name: Caracteristicile șasiului/caroseriei vehiculului
      description: Descrie caracteristicile speciale ale părților caroseriei vehiculului,
