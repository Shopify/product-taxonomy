    egg_turning:
      name: Întoarcere ouă
      description: Descrie metoda prin care ouăle sunt întoarse în incubatoare, cum
        ar fi automată sau manuală
    electric_scooter_motor_type:
      name: Tip motor trotinete electrice
      description: Specifică tipul și configurația motoarelor trotinetelor, cum ar
        fi DC cu perii sau DC fără perii
    electrode_connector_type:
      name: Tip conector electrod
      description: Descrie interfața fizică utilizată pentru a atașa electrozi sau
