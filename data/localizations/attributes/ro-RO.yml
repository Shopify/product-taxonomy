    eyelash_type:
      name: Tip gene
      description: Specifică tipul de gene false, de ex. gene tip fâșie, extensie
    eyepiece/adapter_material:
      name: Material ocular/adaptor
      description: Identifică materialul utilizat pentru ocularele sau adaptoarele
        microscopului, cum ar fi sticla sau metalul
    eyewear_compatibility:
      name: Compatibilitatea cu ochelarii
      description: Indică tipul de ochelari pentru care este destinată cureaua
    eyewear_frame_color:
      name: Culoare ramă ochelari
      description: Identifică culoarea ramei ochelarilor, cum ar fi negru sau auriu
    eyewear_frame_design:
      name: Design ramă ochelari
      description: Descrie stilul ochelarilor de soare, cum ar fi aviator sau cat-eye
