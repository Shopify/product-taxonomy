      description: Tehnica de extragere a canabinoizilor din planta de cânepă
    extraction_technology:
      name: Tehnologie de extracție
      description: Descrie mecanismul principal pe care produsul îl folosește pentru
        a extrage impuritățile
    extraction_type:
      name: Tip extracție
      description: Specifică metoda de îndepărtare a aerului folosită în hote, cum
        ar fi fără conducte sau convertibilă
    extractor_items_included:
      name: Articole incluse pentru extracție
      description: Enumeră diferitele unelte sau accesorii pentru extracție incluse
