        și montări pe perete
    telephone_style:
      name: Tip telefon
      description: Definește designul sau estetica unui telefon, de exemplu vintage,
        inovator
    telescope_level:
      name: Nivel telescop
      description: Indică complexitatea sau nivelul de calificare necesar pentru a
        utiliza un telescop, cum ar fi începător sau avansat
    telescope_tracking_system:
      name: Sistem de urmărire destinat telescopului
      description: Identifică tipul de sistem de urmărire destinat telescoapelor,
        de exemplu manual, motorizat
    television_circuit_board_type:
      name: Tip placă circuit televizor
      description: Identifică rolul funcțional al plăcii de circuit într-un televizor
