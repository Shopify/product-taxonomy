    tracker_form_factor:
      name: Factorul de formă al trackerului
      description: Definește stilul fizic și forma hardware-ului tracker-ului
    tracking_metrics:
      name: Indicatori de monitorizare
      description: Specifică datele de sănătate și fitness monitorizate de produs,
