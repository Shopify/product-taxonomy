        Mondial
    error_correction_type:
      name: Tip corectare erori
      description: Indică dacă modulul de memorie include capacitate de corectare
        a erorilor și, dacă da, tehnologia ECC specifică sau stilul de buffer utilizat
    esrb_rating:
      name: Rating ESRB
      description: Identifică caracterul adecvat al jocurilor video în funcție de
