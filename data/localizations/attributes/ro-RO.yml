    vehicle_exhaust_type:
      name: Tipul de evacuare al vehiculului
      description: Identifică tipul de sistem de evacuare al unui vehicul, cum ar
        fi axle-back sau turbo-back
    vehicle_features:
      name: Caracteristici vehicul
      description: Descrie caracteristicile sau echipamentele speciale ale unui vehicul,
