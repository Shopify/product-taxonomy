    ethernet_cable_category:
      name: Categorie cablu ethernet
      description: Indică ratingul de categorie TIA/EIA al cablurilor Ethernet cu
        pereche răsucită, definind lățimea de bandă și performanța
    ethernet_lan_interface_type:
      name: Tipul de interfață Ethernet LAN
      description: Specifică tipul de conexiune Ethernet cu care este compatibil un
        produs, cum ar fi LAN sau rapidă
    ev_battery_features:
      name: Caracteristici baterie EV
      description: Evidențiază caracteristicile bateriilor EV, cum ar fi ciclul de
        viață lung sau sistemul inteligent de gestionare a bateriilor
    ev_battery_type:
      name: Tip baterie EV
      description: Identifică tipul de baterie utilizată în vehiculele electrice,
        cum ar fi litiu-ion sau plumb-acid
    ev_connector/adapter_type:
      name: Tip conector/adaptor EV
      description: Identifică tipul de conector sau adaptor pentru vehiculele electrice,
        cum ar fi CCS sau Tesla
    ev_conversion_kit_components:
      name: Componente kit de conversie EV
      description: Identifică piesele incluse într-un kit de conversie EV, cum ar
        fi motorul sau acumulatorul
    evaporation_technology:
      name: Tehnologie de evaporare
      description: Definește sistemul de evaporare din dispozitivele de climatizare,
        cum ar fi naturală sau ultrasonică
    event_type:
      name: Tip eveniment
      description: Clasifică natura unui eveniment, cum ar fi un concert, seminar
