    temperature_measurement:
      name: Măsurarea temperaturii
      description: Indică dacă produsul măsoară temperatura în Fahrenheit sau Celsius
    template_type:
      name: Tip șablon
      description: Specifică categoria de șabloane de documente, de exemplu carte
