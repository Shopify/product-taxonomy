    termination_method:
      name: Metodă de terminare
      description: Specifică tehnica utilizată pentru atașarea conductoarelor la contactele
        conectorului (de exemplu, crimp, lipit, IDC)
    terrain:
      name: Teren
      description: Specifică tipul de teren pentru care este proiectat un produs,
        de obicei pentru echipamente de exterior; de exemplu, montan, deluros
    test_format:
      name: Format de testare
      description: Definește tipul de test pentru produsele de sănătate și frumusețe,
        de exemplu digital, bandă de testare
    test_method:
      name: Metoda de testare
      description: Definește procedura pentru efectuarea unui test medical, de exemplu,
        test la domiciliu, analiză de laborator
    test_sample:
      name: Probe pentru analize
      description: Specifică tipul de probă necesară pentru testele medicale și de
        sănătate, de exemplu, recoltor, salivă
    tetherball_equipment_included:
      name: Echipament de tetherball inclus
      description: Indică includerea elementelor esențiale într-un set de tetherball,
