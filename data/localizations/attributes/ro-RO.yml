    external_antenna_connector_type:
      name: Tip conector antenă externă
      description: Definește conectorul fizic folosit pentru a atașa antene externe
    external_defibrillator_features:
      name: Caracteristici defibrilator extern
      description: Evidențiază caracteristicile cheie ale defibrilatoarelor medicale,
