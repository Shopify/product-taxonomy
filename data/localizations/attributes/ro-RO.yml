    plumbing_trap_design:
      name: Design sifon pentru instalații sanitare
      description: Specifică tipul de sifon, cum ar fi cilindric sau butelie
    plunger_shape:
      name: Forma pistonului
      description: Specifică forma unui cap de piston, cum ar fi cupă sau acordeon
    plywood_grade:
      name: Calitatea placajului
      description: Specifică clasificarea placajului pentru construcții, cum ar fi
        clasa C sau D
    pneumatic_conveyor_operation:
      name: Funcționarea transportorului pneumatic
      description: Identifică modul de funcționare a transportoarelor pneumatice,
