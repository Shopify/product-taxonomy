    video_game_format:
      name: Format jocuri video
      description: Specifică modalitatea de livrare și tipul de suport media pentru
        jocuri video, cum ar fi digital sau fizic
    video_game_genre:
      name: Genul jocurilor video
      description: Clasifică tipul de joc video, cum ar fi familie sau supraviețuire
    video_game_platform:
      name: Platformă de jocuri video
      description: Specifică platforma cu care este compatibil un joc video, cum ar
        fi PC sau PlayStation 5
    video_game_sub_genre:
      name: Subgenul jocurilor video
      description: Identifică subcategoria specifică a unui joc video, cum ar fi MMORPG
        sau battle royale
    video_port_type:
      name: Tipul portului video
      description: Specifică tipul de port video pe care îl acceptă un produs, de
        exemplu, HDMI, port de afișare
    video_recorder_type:
      name: Tip înregistrator video
      description: Specifică tehnologia fundamentală de înregistrare a dispozitivului
        (de exemplu, DVR, NVR, XVR)
    video_region_code:
      name: Cod video regional
      description: Definește compatibilitatea regională a playerelor DVD și Blu-ray,
        cum ar fi fără regiune sau regiune 1
    video_resolution_supported:
      name: Rezoluție video acceptată
      description: Definește claritatea sau calitatea video pe care o acceptă un dispozitiv,
        cum ar fi 1080p sau ultra HD
    video_signal_standard:
      name: Standard semnal video
      description: Specifică standardele de difuzare video analogice suportate de
        dispozitiv (de exemplu, NTSC, PAL, SECAM)
    viewing_area_height:
      name: Înălțimea zonei de vizualizare
      description: Specifică înălțimea zonei de vizualizare în cazul produselor precum
        căștile de sudură, de exemplu medie, mare
    viewing_area_width:
      name: Lățimea zonei de vizualizare
      description: Specifică lățimea zonei de vizualizare în cazul produselor precum
        căștile de sudură, de exemplu medie, mare
    vinegar_drink_variety:
      name: Sortiment de băuturi cu oțet
      description: Specifică tipul de băutură pe bază de oțet, de exemplu kombucha,
        shrub
    vinegar_variety:
      name: Sortiment de oțet
      description: Distinge între diferite tipuri de oțet, de exemplu de fructe, balsamic
    viscosity:
      name: Viscozitate
      description: Specifică rezistența la curgere a uleiurilor de motor, cum ar fi
        10W-40 sau 15W-50
    vision_correction_type:
      name: Tipul de corecție a vederii
      description: Indică designul optic destinat să corecteze condiții specifice
        de vedere
    visual_effect:
      name: Efect vizual
      description: Definește caracteristicile vizuale ale unui produs, de obicei pentru
        articole ceramice smălțuite; de ex. pătat, texturat
    voice_recorder_form_factor:
      name: Factor de formă înregistrator vocal
      description: Descrie stilul fizic sau deghizarea recorderului pentru ca cumpărătorii
        să poată alege designul care se potrivește cazului lor de utilizare
    voip_protocol_support:
      name: Acceptare protocol VoIP
      description: Specifică protocoalele Voice over Internet Protocol (VoIP) pe care
        un dispozitiv le poate accepta, cum ar fi SIP sau IAX
    wader_type:
      name: Tip cizme-pantalon
      description: Definește tipul specific al cizmelor-pantalon de pescuit sau vânătoare,
        cum ar fi până la șold sau talie
    waist_rise:
      name: Tipul de talie
      description: Indică tipul de talie a unui articol de îmbrăcăminte, cum ar fi
        joasă, medie sau înaltă
    walker_brake_type:
      name: Tip frână pentru cadrul de mers
      description: Descrie mecanismul de frânare încorporat în cadrul de mers
    walker_seat_type:
      name: Tip de scaun pentru cadru de mers
      description: Identifică dacă cadrul de mers include un scaun și tipul scaunului
    walker_type:
      name: Tip de cadru de mers
      description: Clasifică stilul structural și utilizarea intenționată a cadrului
        de mers
    walking_aid_tip_type:
      name: Tip vârf pentru dispozitiv de mers
      description: Specifică stilul sau tehnologia vârfului de contact cu solul al
        bastonului
    wall_material:
      name: Material perete
