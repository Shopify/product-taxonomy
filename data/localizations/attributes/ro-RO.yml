    player_specialized_features:
      name: Caracteristici specializate ale dispozitivului de redare
      description: Identifică capacitățile unice ale dispozitivelor de redare video,
        cum ar fi suport 4K sau HDR
    playhouse_design:
      name: Design căsuță de joacă
      description: Specifică tipul de căsuță de joacă, cum ar fi căsuță în copac sau
