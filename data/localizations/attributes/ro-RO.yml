      description: Clarifică dacă hotspot-ul mobil sau tethering-ul este permis în
        termenii planului eSIM
    text_plate_material:
      name: Material plăcuță text
      description: Identifică materialul plăcuței de text de pe ștampilele de birou,
        cum ar fi metal sau cauciuc
    textile_craft_machine_features:
      name: Caracteristicile mașinii de artizanat textil
      description: Descrie caracteristicile speciale ale mașinilor de artizanat textil,
