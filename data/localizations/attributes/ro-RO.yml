    tensioning_system:
      name: Sistem de tensionare
      description: Indică sistemul folosit pentru a păstra ecranul neted și fără pliuri
    tent_setup_style:
      name: Stilul de montare a cortului
      description: Indică modul în care cortul este desfășurat sau asamblat
    tequila_variety:
      name: Sortiment de tequila
      description: Specifică tipul de tequila, de exemplu aurie, învechită
    terminal_operation:
      name: Mod de funcționare terminal de plată
      description: Specifică tipul de funcționare a caselor de marcat, cum ar fi manuale
