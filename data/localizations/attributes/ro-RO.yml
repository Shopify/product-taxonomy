    television_shape:
      name: Forma televizorului
      description: Definește conturul fizic al ecranului televizorului, cum ar fi
        curbat sau plat
    television_speaker_position:
      name: Poziție difuzor televizor
      description: Identifică locația fizică sau rolul difuzorului în ansamblul TV
