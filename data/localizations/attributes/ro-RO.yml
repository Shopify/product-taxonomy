    preservation_type:
      name: Tipul de conservare
      description: Identifică metoda utilizată pentru conservarea probelor de laborator,
        cum ar fi fixarea sau uscarea
    pretend_electronics_toy_type:
      name: Tipul electronicelor de jucărie
      description: Specifică categoria de electronice de jucărie, de exemplu, cameră,
