    diaper_features:
      name: Caracteristici scutec
      description: Descrie caracteristicile specifice ale scutecelor, cum ar fi fără
        scurgeri sau hipoalergenice
    diaper_kit_components:
      name: Componente trusă scutece
      description: Specifică articolele incluse într-o trusă cu scutece, cum ar fi
        șervețelele sau pătura pentru schimbarea scutecelor
    diaper_organizer_features:
