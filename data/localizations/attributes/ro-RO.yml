    television_specialized_features:
      name: Caracteristici specializate ale televizorului
      description: Identifică capabilitățile unice ale unui televizor, cum ar fi controlul
        vocal sau bara de sunet integrată
    temperature:
      name: Temperatură
      description: Specifică setările de încălzire pentru dispozitive precum pistoalele
