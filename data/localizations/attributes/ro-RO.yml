    transfer_boards_surface_type:
      name: Tipul suprafeței plăcilor de transfer
      description: Specifică textura suprafeței plăcilor de transfer pentru persoanele
        cu mobilitate fizică redusă, de exemplu căptușite, netede
    transfer_paper_technique:
      name: Tehnica hârtiei de transfer
      description: Identifică metoda utilizată pentru hârtia de transfer, cum ar fi
        jet de cerneală sau călcat
    transmission_type:
      name: Tip transmisie
      description: Identifică tipul de transmisie utilizată pentru vehicule sau piese,
        cum ar fi manuală sau automată
    transmitter_form_factor:
      name: Factor de formă transmițător
      description: Clasifică tipul fizic sau carcasa unității transmițătorului pentru
        a ajuta cumpărătorii să găsească rapid forma potrivită aplicației lor
    transport_type:
      name: Tip de transport
      description: Specifică modul de transport public pentru care biletul sau abonamentul
        este valabil
    trash_can_features:
      name: Caracteristici coș de gunoi
      description: Descrie caracteristici speciale ale coșurilor de gunoi, cum ar
        fi controlul mirosurilor sau pedală
    travel_pillow_features:
      name: Caracteristicile pernei de călătorie
      description: Prezintă caracteristicile funcționale speciale, accesoriile sau
        îmbunătățirile de design ale pernei de călătorie
    travel_pillow_shape:
      name: Forma pernelor de voiaj
      description: 'Descrie conturul fizic al pernelor de voiaj, cum ar fi în formă
