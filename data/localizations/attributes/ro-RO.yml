    texture:
      name: Textură
      description: Definește senzația tactilă sau consistența unui produs, cum ar
        fi cremos, mat sau absorbant
    texture_level:
      name: Nivelul texturii
      description: Indică finețea sau granulozitatea unui produs, de obicei pentru
        piureurile alimentare nutritive; de exemplu, nivelul 1 (piure), nivelul 2
