        o acceptă
    tape_material:
      name: Material bandă
      description: Specifică tipul de material utilizat în produsele tip bandă, cum
        ar fi vinilul sau plasticul
    tape_speed_supported:
      name: Viteză bandă suportată
      description: Enumeră vitezele de redare și înregistrare ale benzii (inch pe
        secundă) la care unitatea reel-to-reel poate funcționa
    target_audience:
      name: Publicul țintă
      description: Specifică pentru cine este potrivit un produs, cum ar fi copii
        sau toate vârstele
    target_facial_zone:
      name: Zonă facială țintă
      description: Specifică zona facială pe care banda pentru desfundarea porilor
        este proiectată să o trateze (de exemplu, nas, bărbie, zona T)
    target_gender:
      name: Sexul vizat
      description: Identifică sexul cui îi este destinat un produs, cum ar fi feminin,
        masculin sau unisex
    targeted_pests:
      name: Dăunători vizați
      description: Identifică tipul de dăunători împotriva cărora un produs este eficient,
        de exemplu, mucegai, alge
    targeted_skin_concern:
      name: Preocupare țintă a pielii
      description: Indică leziunea sau afecțiunea specifică a pielii pentru care este
        conceput produsul
    targeted_stains:
      name: Pete vizate
      description: Identifică tipurile de pete pentru care este conceput un produs,
        cum ar fi alimentare sau de noroi
    tea_input_type:
      name: Tip de ceai
      description: Specifică modul de preparare a ceaiului, de exemplu pliculețe,
        capsule
    technology_level:
      name: Nivel tehnologic
      description: Indică complexitatea tehnologică unui produs, de exemplu de bază,
        avansat
    teeth_material:
      name: Material dinți
      description: Identifică materialul folosit pentru fabricarea dinților, de obicei
        pentru unelte de grădinărit; de exemplu plastic, metal
    telephone_cable_interface:
      name: Interfață cablu de telefon
      description: Definește tipul de fișă utilizat în cablurile telefonice, cum ar
        fi RJ-10
    telephone_cable_second_interface:
      name: A doua interfață a cablului telefonic
      description: Definește tipul de conector la capătul opus al cablului când diferă
        de interfața principală (de exemplu, RJ45 la RJ11)
    telephone_cord_style:
      name: Tipul de cablu telefonic
      description: Specifică forma fizică a cablului telefonic, ajutând clienții care
