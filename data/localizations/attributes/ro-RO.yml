    toilet_shape:
      name: Formă vas de toaletă
      description: Descrie forma unui vas de toaletă, cum ar fi rotund sau dreptunghiular
    tom_tom_design:
      name: Design tom-tom
      description: Descrie tipul de tom-tom, cum ar fi podea sau pe stativ
    tonearm_type:
      name: Tip braț
      description: Descrie geometria brațului, care afectează performanța de urmărire
