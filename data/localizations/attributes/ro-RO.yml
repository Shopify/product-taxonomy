    engine_type:
      name: Tip motor
      description: Identifică tipul de motor dintr-un vehicul sau dintr-o piesă, cum
        ar fi electric sau pe motorină
    engraving:
      name: Gravare
      description: Descrie în detaliu tipul de gravare de pe un produs, cum ar fi
        textul personalizat sau gravarea siglei
    entry_orientation:
      name: Orientarea intrării
      description: Descrie direcția în care sunt introduse monedele în mecanism (de
