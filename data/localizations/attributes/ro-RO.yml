    enema_device_type:
      name: Tip dispozitiv pentru clismă
      description: Clasifică designul principal sau sistemul de livrare al produsului
    enema_nozzle_type:
      name: Tip duză pentru clismă
      description: Specifică stilul sau materialul duzei sau vârfului furnizat cu
        kitul (de exemplu, vârf subțire, vârf pediatric, duză din oțel inoxidabil)
    energy_efficiency_class:
      name: Clasă de eficiență energetică
      description: Definește nivelul de eficiență energetică a unui produs, de exemplu
