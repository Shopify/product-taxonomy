      description: Indică designul fizic al serverului de imprimare (de exemplu, cutie
        externă, placă internă, dongle USB)
    print_technology:
      name: Tehnologie de imprimare
      description: Specifică procesul utilizat de o imprimantă, cum ar fi cu jet de
        cerneală sau laser
    printer/copier_specialized_features:
      name: Caracteristici specializate ale imprimantei/copiatorului
      description: Evidențiază caracteristicile specifice ale imprimantelor/copiatoarelor,
