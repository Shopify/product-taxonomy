    embellishments:
      name: Ornamente
      description: Identifică elemente decorative adăugate unui produs, cum ar fi
        paiete sau nasturi
    embossing_project_type:
      name: Tip proiect imprimat în relief
      description: Identifică tipul de proiect de imprimare în relief, cum ar fi crearea
        de albume sau de felicitări
    embouchure_hole_shape:
      name: Forma găurii muștiucului
      description: Descrie forma găurii pentru capul de flaut, cum ar fi rotundă sau
