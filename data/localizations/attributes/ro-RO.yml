    eyelash_curler_type:
      name: Tip ondulator de gene
      description: Specifică designul sau mecanismul ondulatorului de gene
    eyelash_material:
      name: Material gene
      description: Identifică tipul de material folosit pentru genele false, cum ar
        fi mătase sau material sintetic
    eyelash_remover_formulation:
      name: Formularea soluției de îndepărtare a genelor
      description: Identifică tipul principal de formulă al dizolvantului
    eyelash_style:
      name: Stil gene
      description: Descrie efectul vizual general sau designul setului de gene (de
