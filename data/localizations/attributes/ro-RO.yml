    play_slide_design:
      name: Design tobogan de joacă
      description: Descrie designul unui tobogan de joacă, cum ar fi spirală sau tub
    play_vehicle_propulsion:
      name: Propulsia vehiculului de jucărie
      description: Identifică modul în care este alimentat un vehicul de jucărie,
