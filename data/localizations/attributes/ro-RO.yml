    dental_mouthguard_certifications:
      name: Certificări protecție dentară
      description: Indică certificările de siguranță și calitate pentru protecțiile
        dentare, cum ar fi fără BPA sau certificare CE
    dental_paste_flavor:
      name: Aromă pastă de dinți
      description: Identifică aroma pastei de dinți, de exemplu, fără aromă sau gumă
