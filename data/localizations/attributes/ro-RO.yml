    e_book_reader_part_location:
      name: Locație piesă cititor de cărți electronice
      description: Specifică unde pe dispozitiv este instalată sau localizată piesa
    e_cigarette/vaporizer_style:
      name: Stil țigară electronică/vaporizator
      description: Clasifică țigările electronice și vaporizatoarele în funcție de
        formă, de exemplu, de unică folosință, tip stilou
    e_liquid_flavor:
      name: Aromă e-lichid
      description: Specifică gustul e-lichidelor pentru vaporizatoare și țigări electronice,
        de exemplu cu cafea, cu căpșuni
    e_liquid_variety:
      name: Varietate e-lichid
      description: Diferențiază între diferite opțiuni de e-lichid, de exemplu, pentru
        umplere cu cantitate mică, adaos de lichid cu nicotină
    e_reader_display_technology:
      name: Tehnologie afișaj e-reader
      description: Identifică tipul de tehnologie a afișajului utilizată pentru e-readere,
        cum ar fi LCD sau cerneală electronică
    ear_care_application_method:
      name: Metodă de aplicare îngrijire urechi
      description: Specifică metoda de aplicare pentru articolele de îngrijire a urechilor,
        cum ar fi cu duză sau picurător
    ear_dryer_technology:
      name: Tehnologia uscătorului de urechi
      description: Identifică mecanismul principal de uscare folosit de produs
    ear_orientation:
      name: Orientare ureche
      description: Specifică dacă casca este proiectată pentru urechea stângă, urechea
        dreaptă sau poate fi purtată pe oricare ureche
    ear_pick_tip_style:
      name: Stilul vârfului pentru curățarea urechilor
      description: Definește forma sau designul vârfului de lucru care îndepărtează
        ceara din urechi
    ear_side:
      name: Partea urechii
      description: Specifică dacă dispozitivul de ajutor este destinat pentru urechea
        stângă, urechea dreaptă, sau pentru utilizare ca pereche bilaterală
    ear_tip_size:
      name: Mărime dop auricular
      description: Furnizează eticheta de mărime generică utilizată în mod obișnuit
