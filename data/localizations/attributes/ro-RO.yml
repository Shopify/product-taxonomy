    vehicle_suspension_features:
      name: Caracteristicile suspensiei vehiculului
      description: Specifică caracteristicile unice ale pieselor suspensiei vehiculului,
        cum ar fi reglabile sau hidraulice
    vehicle_tire_type:
      name: Tipul anvelopelor pentru vehicule
      description: Specifică caracterul sezonier sau adaptabil la teren al anvelopelor
