    tank_material:
      name: Material ladă
      description: Specifică materialul din care este fabricată o ladă pentru produse,
        de obicei pentru unelte de grădinărit; de exemplu metal, plastic
    tank_pattern:
      name: Model rezervor
      description: Identifică motivul vizual de pe rezervoarele de toaletă, cum ar
        fi uni sau abstract
    tape_cartridge_format:
      name: Format cartuș bandă
      description: Specifică tehnologiile de cartuș de bandă (de exemplu, LTO, DAT,
