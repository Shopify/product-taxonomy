        siguranța și aspectul.
    briquette_ignition_type:
      name: Tipul de aprindere a brichetelor
      description: Indică dacă brichetele includ dispozitive de aprindere sau sunt
        standard, ajutând utilizatorii să înțeleagă confortul iluminării.
    bristle_stiffness:
      name: Rigiditatea perilor
      description: Indică rigiditatea perilor de pe perie, care afectează puterea
        de frecare și adecvarea pentru diferite materiale din care este realizat vasul
        de toaletă.
    bristle_tip_type:
      name: Tip de vârf al perilor
      description: Indică dacă vârfurile perilor sunt despicați pentru colectarea
        prafului mai fin sau rămân compacți, pentru resturi dense.
    bucket_features:
      name: Caracteristicile găleții
      description: Highlight caracteristicile speciale sau îmbunătățirile funcționale
        ale unei găleți, astfel încât cumpărătorii să poată găsi rapid produse cu
        facilitățile necesare.
    bulb_finish:
      name: Finisajul becului
      description: Descrie stratul exterior sau finisajul sticlei becului, care afectează
        difuzia luminii și stilul.
    burner_shape:
      name: Formă arzător
      description: Descrie designul geometric al arzătorului grătarului, care determină
        amplasarea și distribuția căldurii în interiorul acestuia.
    burr_shape:
      name: Forma piesei de măcinare
      description: Specifică geometria piesei de măcinare pentru râșnițele cu disc,
        ceea ce influențează consistența măcinării și generarea de căldură.
    butterfly_feeder_food_type:
      name: Tip de hrană pentru hrănitoare de fluturi
      description: Identifică tipul de hrană sau atractant pe care hrănitoarea este
        concepută să îl conțină.
    cabinet_light_fixture_style:
      name: Stilul corpului de iluminat pentru dulap
      description: Descrie stilul fizic sau factorul de formă al lămpii pentru dulap.
    candle_container_material:
      name: Materialul recipientului pentru lumânări
      description: Identifică materialul vasului sau al recipientului lumânării (pentru
        lumânări amplasate în borcan/recipiente metalice).
    canner_type:
      name: Tipul sterilizator pentru conserve
      description: Specifică metoda sau tipul de conservare pentru care este proiectat
        sterilizatorul pentru conserve.
    canopy_shape:
      name: Forma copertinei
      description: Specifică forma geometrică a copertinei atunci când este deschisă.
    canopy_venting:
      name: Ventilația copertinei
      description: Indică configurația de ventilație a copertinei care afectează rezistența
        la vânt și disiparea căldurii.
    car_cleaning_kit_items_included:
      name: Articole din setul de curățare auto incluse
      description: Enumeră uneltele și accesoriile specifice furnizate în set, astfel
        încât cumpărătorul să știe exact ce primește și să poată compara pachetele.
    carbonation_level_adjustment:
      name: Reglarea nivelului de carbonatare
      description: Indică dacă aparatul de preparat suc oferă un nivel de carbonatare
        fix sau reglabil.
    catalytic_combustor_type:
      name: Tipul de combustor catalitic
      description: Indică dacă soba utilizează un sistem de ardere catalitic, necatalitic
        sau hibrid, care afectează eficiența și emisiile.
    ceiling_light_fixture_style:
      name: Stil de corp de iluminat de tavan
      description: Definește stilul/configurația structurală principală a corpului
        de iluminat de tavan.
    center_hole_shape:
      name: Forma orificiului central
      description: Descrie forma geometrică a orificiului de montare/central al lamei,
        care determină compatibilitatea cu anumite axuri ale mașinii de tuns iarba.
    chainsaw_bar_mount_type:
      name: Tip de prindere a lamei de drujbă
      description: Specifică modelul de montare sau stilul fantei unei lame de drujbă
        pentru a asigura faptul că se potrivește cu blocul motor al drujbei.
    chainsaw_bar_nose_type:
      name: Tip de vârf al lamei de drujbă
      description: Identifică stilul vârfului barei, aspect care influențează performanța
        la tăiere și întreținerea.
    chainsaw_bar_type:
      name: Tip de lamă de drujbă
      description: Clasifică construcția sau scopul barei.
    chainsaw_cutter_type:
      name: Tip de drujbă cu lanț
      description: Identifică profilul/proiectarea dinților lanțului, aspect care
        influențează viteza de tăiere, durabilitatea și caracteristicile de recul.
    champagne_glass_type:
      name: Tip de pahar de șampanie
      description: Specifică designul particular al unui pahar de șampanie, permițând
        cumpărătorului să distingă între forme optimizate pentru diferite experiențe
        de băut.
    chandelier_shape:
      name: Forma candelabrului
      description: Definește forma structurală generală a candelabrului.
    charcoal_chimney_features:
      name: Caracteristicile coșului pentru brichete de cărbune
      description: Enumeră caracteristicile funcționale notabile ale coșului pentru
        brichete de cărbune.
    charcoal_ignition_type:
      name: Tip de aprindere cu cărbune
      description: Indică dacă cărbunele a fost tratat sau modificat pentru o aprindere
        mai ușoară sau o ardere mai curată.
    chopstick_style:
      name: Stil bețișoare
      description: Specifică stilul regional sau cultural al bețișoarelor, care poate
        afecta lungimea, forma și decorațiunile acestora.
    chopstick_trainer_design:
      name: Designul unui antrenor pentru bețișoare
      description: Descrie proiectarea mecanică sau metoda de asistență utilizată
        de antrenor.
    cigar_cutter_type:
      name: Tip de foarfece de trabuc
      description: Specifică mecanismul sau stilul de tăiere utilizat pentru a îndepărta
        capătul trabucului.
    cigar_punch_type:
      name: Tip perforator de trabucuri
      description: Identifică mecanismul sau stilul perforatorului de trabucuri.
    clay_pot_material:
      name: Material pentru oale de lut
      description: Identifică compoziția sau stilul argilei folosite pentru oală,
        cum ar fi ceramica poroasă sau ceramica densă.
    cleaner_concentration:
      name: Concentrație produsului de curățare
      description: Indică dacă produsul de curățare este vândut gata de utilizare
        sau sub formă de concentrat care trebuie diluat înainte de utilizare.
    cleaning_cloth_features:
      name: Caracteristicile lavetei de curățare
      description: Evidențiază caracteristicile speciale de performanță ale lavetelor.
    cleaning_solution_concentration:
      name: Concentrația soluției de curățare
      description: Indică dacă produsul este vândut gata de utilizare, concentrat
        sau în alte formate de diluție.
    clock_chime_melody:
      name: Melodia clopoțelului de ceas
      description: Specifică melodia sau modelul de bătaie redat de ceas la ora fixă
        sau la sfertul de oră.
    clock_display_type:
      name: Tip de afișaj al ceasului
      description: Specifică modul în care este prezentată ora, este util pentru clienții
        care preferă formatul digital, analogic, inversat etc.
    clock_hand_mounting_type:
      name: Tip de montare a limbii de ceas
      description: Definește stilul de interfață utilizat pentru a atașa limbile de
        ceas la mecanism.
    clock_hand_style:
      name: Stilul limbii de ceas
      description: Specifică designul vizual al limbilor, permițând cumpărătorului
        să găsească limbi care se potrivesc cu estetica ceasului său.
    clock_movement_type:
      name: Tipul de mișcare a ceasului
      description: Identifică mecanismul intern de măsurare a timpului al ceasului.
    clothespin_type:
      name: Tipul de cârlig de rufe
      description: Identifică designul/stilul structural al cârligului de rufe.
    co2_cylinder_compatibility:
      name: Compatibilitatea buteliilor de CO2
      description: Definește tipul sau dimensiunea buteliei de CO2 pe care o acceptă
        aparatul de băuturi gazoase, asigurând faptul că cumpărătorul poate găsi cartușe
        de reumplere compatibile.
    co2_supplementation_requirement:
      name: Necesarul de suplimentare cu CO2
      description: Indică nivelul de suplimentare cu dioxid de carbon necesar pentru
        o sănătate optimă a plantelor în acvarii.
    coaster_features:
      name: Caracteristici ale suportului de pahare
      description: Identifică caracteristicile unice ale suporturilor de pahare, cum
        ar fi baza absorbantă sau antiderapantă.
    cocktail_strainer_type:
      name: Tip de strecurătoare pentru cocktailuri
      description: Specifică designul strecurătorii pentru cocktailuri, care afectează
        compatibilitatea cu shakerele și stilul de utilizare.
    code_technology:
      name: Tehnologia codului
      description: Identifică codul sau tehnologia de securitate pe care telecomanda
        o folosește pentru a comunica cu dispozitivul de deschidere a ușii de la garaj.
    coffee_decanter_warmer_features:
      name: Caracteristicile încălzitorului pentru decantorul de cafea
      description: Evidențiază principalele caracteristici funcționale sau de siguranță
        specifice încălzitoarelor pentru decantoare de cafea.
    coffee_filter_basket_size:
      name: Dimensiunea coșului pentru filtrul de cafea
      description: Specifică denumirea dimensiunii standardizate pe care o acceptă
        coșul, asigurând compatibilitatea cu filtrele și mașinile.
    coffee_filter_shape:
      name: Forma filtrului de cafea
      description: Specifică forma geometrică a filtrului de cafea pentru a asigura
        compatibilitatea cu diferite cafetiere.
    coffee_filter_type:
      name: Tip de filtru de cafea
      description: Specifică stilul de filtru pe care îl acceptă sau îl include o
        cafetieră cu picurare, care poate afecta aroma și costul consumabilelor.
    coffee_grinder_accessory_type:
      name: Tip de accesoriu pentru râșnița de cafea
      description: Clasifică tipul specific de accesoriu pentru a facilita filtrarea
        și căutarea.
    colander_style:
      name: Stilul strecurătorii
      description: Clasifică designul structural al strecurătorii, de exemplu, bol
        cu picioare sau amplasare peste chiuvetă.
    compatible_air_conditioner_type:
      name: Tip de aparat de aer condiționat compatibil
      description: Identifică stilul de aparat de aer condiționat pentru care este
        proiectat accesoriul.
    compatible_awning_rail_type:
      name: Tip de șină de copertină compatibilă
      description: Specifică șina sau sistemul de țevi pentru copertină pentru care
        este proiectată clema de prindere.
    compatible_beverage_type:
      name: Tip de băutură compatibil
      description: Specifică tipul de băutură pe care dopul este conceput să o rețină.
    compatible_can_size:
      name: Dimensiune a dozei compatibilă
      description: Enumeră dimensiunile dozelor de băutură pe care le poate accepta
        dispozitivul de compactare.
    compatible_cigarette_size:
      name: Dimensiune compatibilă a țigării
      description: Enumeră lungimile sau formatele standard ale țigărilor care se
        potrivesc cu suportul.
    compatible_coffee_capsule_system:
      name: Sistem de capsule de cafea compatibile
      description: Specifică sistemul de capsule pe care adaptorul este conceput să
        îl accepte, asigurând faptul că cumpărătorul alege un adaptor care se potrivește
        formatului de cafea preferat.
    compatible_coffee_maker_type:
      name: Tip de cafetieră compatibilă
      description: Indică stilul de cafetieră sau espressor pentru care este conceput
        accesoriul.
    compatible_cooking_thermometer_type:
      name: Tip de termometru de gătit compatibil
      description: Specifică tipurile de termometre de gătit pe care acest instrument
        de calibrare este conceput să le ajusteze sau să le verifice.
    compatible_coupler_size:
      name: Dimensiune a cuplajului compatibilă
      description: Specifică dimensiunea adaptorului cu care este compatibilă punga
        de decorat fără a necesita ajustare prin tăiere.
    compatible_dehumidifier_technology:
      name: Tehnologie de dezumidificare compatibilă
      description: Indică tehnologia dezumidificatorului cu care este compatibil filtrul,
        cum ar fi compresorul sau desicantul.
    compatible_feeder_type:
      name: Tip de hrănitoare compatibil
      description: Identifică stilurile de dispozitive de hrănire pentru care este
        proiectată tava.
    compatible_footwear_material:
      name: Material compatibil pentru încălțăminte
      description: Enumeră tipurile de materiale pentru încălțăminte pentru care este
        potrivit luciul sau ceara.
    compatible_fuel_type:
      name: Tip de combustibil compatibil
      description: Specifică tipul de combustibil cu care accesoriul este proiectat
        să fie compatibil, asigurând potrivirea corectă cu încălzitoarele de terasă
        alimentate cu propan, gaz natural, electricitate sau alți combustibili.
    compatible_garment_steamer_design:
      name: Design compatibil cu aparatul de călcat cu aburi
      description: Specifică modelele de aparate de călcat cu aburi cu care este conceput
        să funcționeze suportul pentru cablu.
    compatible_grill_type:
      name: Tip de grătar compatibil
      description: Specifică tipurile de grătare cu care este destinat să funcționeze
        accesoriul.
    compatible_hazardous_waste_type:
      name: Tip de deșeuri periculoase compatibile
      description: Specifică tipul de deșeuri periculoase pe care este proiectat să
        le conțină recipientul.
    compatible_ironing_board_type:
      name: Tip de masă de călcat compatibilă
      description: Indică modelul de masă de călcat căreia i se potrivește piesa,
        ajutând cumpărătorul să determine compatibilitatea.
    compatible_lawn_mower_type:
      name: Tip de mașină de tuns iarba compatibilă
      description: Indică tipul de mașină de tuns gazonul pentru care este proiectat
        kitul de marcare a dungilor.
    compatible_leaf_blower_style:
      name: Model compatibil de suflantă de frunze
      description: Specifică forma suflantei de frunze cu care este compatibil accesoriul.
    compatible_mailbox_size:
      name: Dimensiune a cutiei poștale compatibilă
      description: Indică dimensiunile cutiei poștale pentru care este proiectat accesoriul,
        conform clasificărilor comune USPS/din domeniu.
    compatible_mailbox_type:
      name: Tip de cutie poștală compatibilă
      description: Specifică modelul de cutie poștală care se potrivește în interior
        sau cu incinta, ajutând cumpărătorul să confirme potrivirea corectă.
    compatible_napkin_size:
      name: Dimensiune a șervețelului compatibilă
      description: Specifică dimensiunea sau formatul șervețelelor pentru care este
        proiectat suportul/dozatorul.
    compatible_outdoor_grill_style:
      name: Model de grătar de exterior compatibil
      description: Specifică modelul sau configurația grătarului de exterior pentru
        care este proiectat capacul.
    compatible_radiator_style:
      name: Model de calorifer compatibil
      description: Enumeră modelele de calorifere pentru care este conceput accesoriul,
        cum ar fi calorifer tip panou, calorifer tip coloană, calorifer tip suport
        de prosoape sau calorifer de parchet.
    compatible_refrigerator_compartment:
      name: Compartiment de frigider compatibil
      description: Specifică locul din frigider care este destinat utilizării accesoriului.
    compatible_stove_fuel_type:
      name: Tip combustibil pentru sobă compatibil
      description: Identifică tipurile de combustibil cu care este compatibil un accesoriu
        portabil pentru aragaz, ajutând clientul să potrivească articolul cu aragazul
        său (de exemplu, gaz de butelie sau alcool).
    compatible_stove_type:
      name: Tip de sobă compatibil
      description: Identifică tipurile de sobe portabile cu care această bază este
        proiectată să funcționeze.
    compatible_tissue_box_type:
      name: Tip de cutie de șervețele compatibilă
      description: Identifică modelul/dimensiunea cutiei de șervețele pentru care
        este proiectat suportul.
    compatible_tractor_type:
      name: Tip de tractor compatibil
      description: Specifică categoria de tractor pentru care este proiectată piesa/accesoriul.
    compatible_umbrella_type:
      name: Tip de umbrelă compatibil
      description: Specifică modelul de umbrelă de exterior pentru care este proiectată
        husa.
    compatible_washing_machine_type:
      name: Tip de mașină de spălat compatibil
      description: Specifică pentru ce modele de mașini de spălat este potrivit produsul
        de curățat (de exemplu, cu încărcare frontală, cu încărcare în partea superioară,
        de înaltă eficiență).
    compatible_waste_container_type:
      name: Tip de recipient de deșeuri compatibil
      description: Specifică tipul de recipient pentru deșeuri cu care este compatibil
        accesoriul.
    compatible_water_cooler_type:
      name: Tip de răcitor de apă compatibil
      description: Indică modelele de răcitoare de apă cu care este compatibil accesoriul,
        ajutând clientul să aleagă piesele potrivite pentru unitatea sa.
    compatible_water_heater_type:
      name: Tip de încălzitor de apă compatibil
      description: Specifică tipul de încălzitor de apă cu care este compatibil produsul.
    compatible_wrap_material:
      name: Material de învelire compatibil
      description: Listează tipurile de folie alimentară pe care este proiectat să
        le conțină dozatorul.
    compost_aerator_design:
      name: Proiectarea aeratorului de compost
      description: Identifică designul mecanic sau modelul aeratorului, descriind
        modul în care acesta agită compostul.
    compost_form:
      name: Forma compostului
      description: Descrie prezentarea fizică sau modelul de ambalaj al produsului
        de tip compost.
    compost_source_material:
      name: Material sursă pentru compost
      description: Identifică materia/materiile organice principale din care este
        obținut compostul.
    compression_method:
      name: Metodă de comprimare
      description: Indică tehnica utilizată pentru a expulza aerul sau a economisi
        spațiu în sac.
    cooking_gel_fuel_base:
      name: Bază combustibilă pentru gelul de gătit
      description: Identifică baza chimică principală a combustibilului gel, permițând
        utilizatorilor să aleagă între formule de combustibil pe bază de etanol, metanol,
        glicol și alte tipuri de combustibil care diferă în ceea ce privește mirosul,
        puterea de încălzire și compatibilitatea cu spațiile interioare/exterioare.
    cooking_surface_texture:
      name: Textura suprafeței de gătit
      description: Specifică textura suprafeței de gătit, cum ar fi plată, striată
        sau cu dublă utilizare.
    cooking_thermometer_design:
      name: Designul termometrului de gătit
      description: Identifică modul de funcționare a unui termometru de gătit, de
        ex., analogic sau digital.
    cookware_coating_material:
      name: Material de acoperire pentru vase de gătit
      description: Identifică tipul de acoperire interioară sau exterioară aplicată
        vasului de gătit, oferind o analiză a performanței antiaderente, a durabilității
        și a cerințelor de îngrijire.
    cookware_coating_type:
      name: Tipul de acoperire a vaselor de gătit
      description: Specifică stratul de acoperire interior sau de suprafață al vaselor
        de gătit.
    cookware_lid_style:
      name: Modelul capacului vasului de gătit
      description: Descrie modelul general sau construcția funcțională a capacului.
    cooler_style:
      name: Model de lădiță frigorifică
      description: Identifică designul structural al lădiței frigorifice portabile,
        ajutând clienții să aleagă între containere rigide, genți flexibile, rucsacuri
        etc.
    corkscrew_accessories_included:
      name: Accesorii pentru tirbușon incluse
      description: Specifică componentele suplimentare ambalate împreună cu tirbușonul.
    corkscrew_hinge_type:
      name: Tip de pârghie pentru tirbușon
      description: Specifică dacă tirbușonul utilizează un mecanism cu pârghie simplă
        sau dublă.
    corkscrew_tools_included:
      name: Instrumente pentru tirbușon incluse
      description: Enumeră instrumentele și accesoriile incluse în pachetul tirbușonului
        (de exemplu, tăietor de folie, desfăcător de sticle, lamă de cuțit) astfel
        încât cumpărătorii să poată vedea ce este inclus.
    crushing_method:
      name: Metodă de zdrobire
      description: Descrie mecanismul folosit pentru a comprima doza.
    crust_browning_level:
      name: Nivelul de rumenire a crustei
      description: Specifică gradele de prăjire/rumenire a cojii configurabile pe
        care le oferă mașina de pâine.
    cultivar_type:
      name: Tipul soiului
      description: Specifică tipul de ameliorare al soiului, indicând dacă este varietate
        tradițională, hibrid, cu polenizare liberă sau modificat genetic.
    cultivator_type:
      name: Tipul de cultivator
      description: Clasifică designul structural al cultivatorului, cum ar fi cu dinți
        pe față sau cu dinți pe spate.
    cup_warmer_features:
      name: Caracteristici pentru încălzitor de căni
      description: Evidențiază caracteristicile speciale de design sau confort specifice
        încălzitoarelor de cești.
    curtain_heading_style:
      name: Stilul de rejansă al perdelei
      description: Specifică stilul rejansei utilizate pentru suspendarea perdelei
        sau a draperiei, care determină feroneria necesară și aspectul general.
    curtain_lining_type:
      name: Tipul de căptușeală a perdelei
      description: Indică dacă perdeaua este căptușită și tipul de căptușeală utilizat,
        ceea ce afectează izolația, intimitatea și căderea.
    curtain_rod_type:
      name: Tipul de galerie
      description: Clasifică modelul structural al galeriei, ajutând cumpărătorii
        să găsească rapid galeriile potrivite nevoilor lor de instalare.
    cutting_disc_function:
      name: Funcția discului de tăiere
      description: Definește acțiunea specifică de procesare a alimentelor efectuată
        de disc.
    cutting_head_type:
      name: Tipul capului de tăiere
      description: Specifică stilul elementului de tăiere utilizat de accesoriu.
    cutting_mechanism_type:
      name: Tipul mecanismului de tăiere
      description: Descrie modelul de cuțit integrat în dozator.
    cylinder_connector_type:
      name: Tip de conector cilindric
      description: Specifică conexiunea sau interfața de înfiletare a cilindrului,
        determinând compatibilitatea cu modele specifice de aparate de băuturi carbogazoase.
    decorating_bag_features:
      name: Caracteristicile pungii decorative
      description: Evidențiază designul special sau caracteristicile funcționale ale
        pungii decorative.
    dehumidifier_refill_form:
      name: Forma rezervei pentru dezumidificator
      description: Definește forma/formatul fizic al rezervei, astfel încât clientul
        să poată selecta modele compatibile.
    desiccant_material:
      name: Material desicant
      description: Specifică substanța utilizată pentru absorbția umezelii, importantă
        pentru performanță, reutilizare și considerații privind siguranța.
    dial_finish:
      name: Finisajul cadranului
      description: Descrie finisajul suprafeței cadranului, influențând strălucirea
        și stilul.
    dinnerware_features:
      name: Caracteristici ale tacâmurilor
      description: Evidențiază caracteristicile funcționale speciale ale tacâmului.
    dish_detergent_features:
      name: Caracteristicile detergentului de vase
      description: Enumeră proprietățile esențiale de formulare sau ecologice care
        ajută cumpărătorii să filtreze și să compare produsele.
    dishwasher_accessory_type:
      name: Tip de accesoriu pentru mașina de spălat vase
      description: Clasifică tipul specific de accesoriu, permițând cumpărătorilor
        să filtreze rapid.
    dishwasher_wash_programs:
      name: Programe de spălare pentru mașina de spălat vase
      description: Enumeră ciclurile de spălare presetate disponibile pe mașina de
        spălat vase, permițând clienților să filtreze după versatilitatea programelor.
    dispensing_mechanism:
      name: Mecanism de distribuire
      description: Descrie modul în care băutura este eliberată din termosul cu pompă,
        influențând ușurința de utilizare în diferite contexte.
    dispensing_temperature_options:
      name: Opțiuni privind temperatura de distribuire
      description: Indică opțiunile de temperatură pe care le poate oferi răcitorul
        de apă.
    displayed_character:
      name: Caracter afișat
      description: Identifică caracterul alfanumeric reprezentat de piesa individuală.
    diving_board_surface_texture:
      name: Textura suprafeței trambulinei
      description: Descrie textura suprafeței superioare a trambulinei, care afectează
        aderența și rezistența la alunecare.
    door_configuration:
      name: Configurația ușii
      description: Indică câte uși de acces are capcana
    door_hinge_orientation:
      name: Orientarea balamalelor ușii
      description: Specifică poziția balamalei sau direcția de deschidere a ușii sau
        a capacului congelatorului.
    door_hinge_position:
      name: Poziția balamalei ușii
      description: Specifică partea ușii pe care se află balamaua sau, dacă este reversibilă,
        care afectează instalarea și planificarea spațiului.
    draft_gas_type:
      name: Tipul de gaz de presiune
      description: Specifică tipul de sistem de gaz utilizat pentru distribuire, important
        pentru carbonatare și stilul băuturii.
    drainage_design:
      name: Proiectarea scurgerii
      description: Indică modul în care savoniera gestionează scurgerea apei pentru
        a menține săpunul uscat.
    drainage_method:
      name: Metoda de scurgere
      description: Descrie modul în care este evacuată apa colectată, indicând dacă
        este necesară golirea manuală.
    drawer_organizer_features:
      name: Caracteristici ale organizatorului de sertare
      description: Evidențiază caracteristicile funcționale notabile ale unui organizator
        de sertare.
    drinkware_crystal_composition:
      name: Compoziția cristalului recipientelor de băut
      description: Identifică formula specifică a sticlei/cristalului utilizat, evidențiind
        conținutul de plumb și caracteristicile privind claritatea.
    drinkware_holder_style:
      name: Model de suport pentru băuturi
      description: Clasifică designul sau configurația generală a unui suport pentru
        recipiente de băut.
    drinkware_insulation:
      name: Izolație pentru recipiente de băut
      description: Identifică construcția izolației recipientelor de băut, care afectează
        menținerea temperaturii.
    dripper_design:
      name: Designul picurătorului
      description: Specifică forma generală a picurătorului sau tipul de scurgere,
        care afectează caracteristicile infuziei.
    drum_grating_styles_included:
      name: Tipuri de grătar pentru tambur incluse
      description: Enumeră diferitele stiluri de tambure de răzuire sau feliere oferite
        în set, astfel încât utilizatorii să poată vedea rapid funcțiile oferite.
    dryer_drum_material:
      name: Materialul tamburului uscătorului
      description: Indică materialul din care este construit tamburul interior, care
        afectează durabilitatea, acumularea de electricitate statică și zgomotul.
    dryer_sheet_features:
      name: Caracteristicile foilor antistatice
      description: Evidențiază caracteristicile sau beneficiile speciale ale foilor
        antistatice.
    dryer_venting_type:
      name: Tipul de ventilație a uscătorului
      description: Clasifică metoda de ventilație utilizată de un uscător, care afectează
        cerințele de instalare și eficiența energetică.
    drying_system:
      name: Sistem de uscare
      description: Indică tehnologia utilizată de mașina de spălat vase pentru a usca
        vasele la sfârșitul ciclului de spălare.
    duster_head_material:
      name: Materialul capului periei de praf
      description: Specifică materialul capului de colectare a prafului din motive
        legate de performanță și alergii.
    dustpan_type:
      name: Tip de făraș
      description: Clasifică modelul/forma generală a fărașului.
    edge_finish:
      name: Finisajul marginii
      description: Descrie tehnica de finisare utilizată pe marginile feței de masă,
        care afectează estetica și durabilitatea.
    egg_cooker_functions:
      name: Funcțiile aparatului de gătit ouă
      description: Enumeră modurile de gătit acceptate de aparatul de gătit ouă.
    egg_cup_design:
      name: Designul cupei de ouă
      description: Specifică stilul structural al cupei de ouă, cum ar fi cu picior
        sau cu piedestal.
    electric_kettle_features:
      name: Caracteristici ale fierbătorului electric
      description: Enumeră caracteristicile esențiale de confort sau siguranță oferite
        de fierbător.
    emergency_blanket_features:
      name: Caracteristici ale păturii de urgență
      description: Evidențiază caracteristicile funcționale speciale ale păturii.
    emergency_lighting_operating_mode:
      name: Modul de funcționare a iluminatului de urgență
      description: Specifică modul în care se comportă corpul de iluminat de urgență
        în timpul condițiilor normale de alimentare cu energie electrică și al penelor
        de curent.
    entrance_slot_design:
      name: Designul fantei de intrare
      description: Descrie modelul deschiderilor care permit fluturilor să intre în
        casă.
    espresso_boiler_type:
      name: Tipul de boiler pentru espresso
      description: Descrie configurația sistemului de încălzire utilizat pentru producerea
        de cafea și abur.
    fabric_care_product_form:
      name: Forma produsului de îngrijire a țesăturilor
      description: Specifică forma fizică a unui produs de îngrijire a țesăturilor,
        cum ar fi un balsam de rufe sau un aditiv pentru uscător.
    fabric_softener_features:
      name: Caracteristicile balsamului de rufe
      description: Evidențiază caracteristicile sau beneficiile speciale ale balsamurilor
        de rufe.
    fabric_stiffness_level:
      name: Nivelul de rigiditate al țesăturii
      description: Indică nivelul de rigiditate conferit țesăturii de către amidon
        după călcare.
    fabric_weave:
      name: Țesătură textilă
      description: Indică construcția specifică a țesăturii materialului, care afectează
        senzația și aspectul.
    feeder_design:
      name: Proiectarea alimentatorului
      description: Specifică modelul structural al alimentatorului.
    fermentation_crock_type:
      name: Tip de oală pentru fermentare
      description: Identifică designul fundamental al oalei.
    filament_style:
      name: Stil de filament
      description: Definește configurația filamentului intern care Influence estetica
        și distribuția luminii.
    film_reusability:
      name: Capacitatea de reutilizare a foliei
      description: Precizează dacă folia este concepută pentru o singură utilizare
        sau poate fi îndepărtată, depozitată și reaplicată.
    filter_bleaching_method:
      name: Metoda de albire a filtrului
      description: Identifică starea de albire și procesul utilizat pentru filtru,
        oferind informații pentru preferințele în materie de gust și durabilitate.
    filter_technology:
      name: Tehnologie de filtrare
      description: Identifică tehnologia de control al mirosurilor sau de filtrare
        utilizată.
    fire_alarm_panel_type:
      name: Tipul panoului de alarmă de incendiu
      description: Identifică arhitectura sistemului panoului.
    fire_protection_class:
      name: Clasă de protecție la incendiu
      description: Indică clasa de certificare care definește temperatura internă
        maximă admisă în timpul testării la foc (de exemplu, Clasa UL 350).
    fire_starter_type:
      name: Tipul aprinzătorului
      description: Specifică forma sau mecanismul principal al produsului de aprindere,
        ajutând cumpărătorii să găsească exact stilul de aprindere de care au nevoie.
    fireplace_fuel_form:
      name: Forma combustibilului pentru șemineu
      description: Specifică forma fizică sau prezentarea combustibilului, permițând
        cumpărătorilor să aleagă între lemne, peleți, brichete, doze de gel și alte
        opțiuni potrivite pentru aparatul lor.
    fireplace_tool_items_included:
      name: Accesorii pentru șemineu incluse
      description: Enumeră uneltele sau accesoriile specifice pentru șemineu furnizate
        cu produsul, astfel încât cumpărătorii să știe exact ce primesc și să poată
        compara pachetele cu ușurință.
    firewood_seasoning:
      name: Gradul de uscare a lemnelor de foc
      description: Indică starea de uscare a lemnelor de foc, care afectează conținutul
        de umiditate, ușurința aprinderii și eficiența termică.
    flag_attachment_style:
      name: Stilul de atașare a steagului
      description: Descrie modul în care steagul sau manșeta de vânt este fixată pe
        un stâlp sau pe un punct de montare.
    flame_adjustment:
      name: Reglarea flăcării
      description: Indică dacă și cum poate fi reglată intensitatea flăcării.
    flask_insulation_type:
      name: Tipul de izolație al termosului
      description: Indică construcția izolației termice a termosului, care afectează
        păstrarea temperaturii.
    flatware_finish:
      name: Finisajul tacâmurilor
      description: Descrie tratamentul suprafeței sau luciul tacâmurilor, care afectează
        estetica și vizibilitatea zgârieturilor.
    floor_protection_transparency_level:
      name: Nivel de transparență a protecției podelei
      description: Indică cât de transparentă este folia sau fața de masă, variind
        de la transparentă la opacă.
    floor_scrubber_brush_type:
      name: Tip de perie de frecat podele
      description: Definește configurația periei sau a discului principal utilizată
        de peria de frecat.
    floor_surface_compatibility:
      name: Compatibilitatea suprafeței podelei
      description: Specifică materialele suprafeței podelei pentru care produsul de
        protecție este sigur și conceput să le protejeze.
    flow_control_type:
      name: Tip de control al debitului
      description: Descrie dacă vârful include un mecanism reglabil pentru ajustarea
        debitului de apă.
    flue_outlet_position:
      name: Poziția evacuării de fum
      description: Specifică unde iese evacuarea de fum din corpul sobei, influențând
        configurația de instalare și racordarea la coșul de fum.
    flue_pipe_connection_type:
      name: Tipul de racordare a tubului de evacuare
      description: Descrie sistemul de racordare utilizat pentru conectarea prelungirii
        la celelalte elemente ale sistemului de evacuare.
    fluorescent_tube_output_type:
      name: Tip de ieșire a tubului fluorescent
      description: Specifică subtipul de ieșire a tubului fluorescent, important pentru
        compatibilitatea balastului și luminozitate.
    fly_swatter_type:
      name: Tipul de plici
      description: Indică modelul operațional sau mecanismul pliciului.
    foil_duty_rating:
      name: Indicele de rezistență a foliei
      description: Clasifică rezistența sau gradul foliei pentru utilizarea prevăzută.
    foliage_color:
      name: Culoarea frunzișului
      description: Specifică culoarea dominantă a frunzelor plantei, susținând selecția
        ornamentală pe lângă culoarea florilor.
    fondue_pot_type:
      name: Tipul de oală pentru fondue
      description: Clasifică tipul de încălzire sau utilizarea preconizată a setului
        de fondue.
    fondue_set_pieces_included:
      name: Piese pentru setul de fondue incluse
      description: Identifică componentele incluse într-un set de fondue, cum ar fi
        un vas de fondue sau furculițe.
    food_carrier_insulation_type:
      name: Tipul de izolație pentru transportul alimentelor
      description: Identifică dacă produsul este izolat și tehnologia de izolație
        utilizată.
    food_dehydrator_surface_type:
      name: Tipul de suprafață a deshidratorului de alimente
      description: Descrie tipul suprafeței foilor/tăvilor, care afectează fluxul
        de aer și eliberarea alimentelor.
    food_dehydrator_tray_type:
      name: Tip de tavă pentru deshidrator de alimente
      description: Identifică stilul specific sau designul funcțional al tăvii.
    food_grater_type:
      name: Tipul de răzătoare alimentară
      description: Identifică stilul structural al răzătoarei.
    food_processor_attachments_included:
      name: Accesoriile pentru robotul de bucătărie incluse
      description: Enumeră tipurile specifice de accesorii furnizate în set, astfel
        încât clienții să știe exact ce funcții obțin prin achiziția acestuia.
    food_storage_bag_features:
      name: Caracteristicile pungii pentru depozitarea alimentelor
      description: Evidențiază caracteristicile funcționale notabile ale pungii.
    food_storage_bag_type:
      name: Tip de pungă pentru depozitarea alimentelor
      description: Specifică tipul principal sau clasificarea utilizării preconizate
        a pungii pentru depozitarea alimentelor.
    food_storage_features:
      name: Caracteristici de depozitare a alimentelor
      description: Evidențiază caracteristicile speciale care adaugă funcționalitate
        sau confort produsului de depozitare a alimentelor.
    food_wrap_features:
      name: Caracteristici ale foliei alimentare
      description: Evidențiază caracteristicile speciale care influențează utilizarea
        și durabilitatea.
    footwear_type_compatibility:
      name: Compatibilitatea tipului de încălțăminte
      description: Identifică tipul de încălțăminte pentru care este destinat șanul.
    formulation_concentration:
      name: Concentrația formulării
      description: Identifică dacă produsul are o formulă concentrată sau gata de
        utilizare.
    fountain_design:
      name: Designul fântânii
      description: Clasifică tipul structural sau forma fântânii.
    fragrance_oil_application:
      name: Aplicarea uleiului parfumat
      description: Specifică utilizarea recomandată sau obișnuită pentru ulei, ajutând
        clienții pasionați de bricolaj și hobby să selecteze formula potrivită.
    fragrance_oil_composition:
      name: Compoziția uleiului parfumat
      description: Indică dacă formula este ulei esențial pur natural, ulei parfumat
        sintetic sau un amestec al ambelor.
    fragrance_refill_type:
      name: Tip de rezervă de parfum
      description: Definește formatul rezervelor de parfum acceptate de difuzor.
    freezer_configuration:
      name: Configurația congelatorului
      description: Identifică orientarea fizică/tipul de design al congelatorului.
    freezing_method:
      name: Metoda de congelare
      description: Specifică tehnologia utilizată pentru congelarea amestecului dintr-un
        aparat de înghețată, ajutând cumpărătorii să distingă între modelele cu compresor,
        modelele cu bol de precongelare, tipurile cu manivelă și gheață cu sare și
        alte modele.
    fuel_compatibility:
      name: Compatibilitatea combustibilului
      description: Specifică tipurile de combustibil pe care grătarul este proiectat
        să le conțină în siguranță.
    funnel_type:
      name: Tip de pâlnie
      description: Clasifică pâlnia în funcție de designul sau utilizarea preconizată.
    furnace_configuration:
      name: Configurația cuptorului
      description: Specifică orientarea fizică a fluxului de aer a incintei cuptorului
        pentru instalare.
    furniture_anchor_type:
      name: Tipul de ancoră pentru mobilă
      description: Specifică stilul structural al unui set de ancorare pentru mobilă,
        indicând mecanismul său de acțiune.
    garage_floor_mat_style:
      name: Modelul covorașului pentru garaj
      description: Identifică formatul sau modelul covorașului pentru garaj.
    garbage_disposal_feed_type:
      name: Tipul de alimentare a tocătorului de deșeuri
      description: Identifică modul în care deșeurile alimentare sunt introduse în
        tocător, fie continuu, în timp ce funcționează, fie în loturi mici.
    garbage_disposal_stopper_style:
      name: Model de dop pentru tocătorul de deșeuri alimentare
      description: Indică modelul funcțional al dopului.
    garden_hose_design:
      name: Proiectarea furtunului de grădină
      description: Identifică stilul structural al furtunului, care determină utilizarea
        preconizată și caracteristicile de manevrare.
    garden_hose_fitting_type:
      name: Tipul de racord al furtunului de grădină
      description: Identifică stilul sau funcția unui racord de furtun de grădină,
        cum ar fi adaptorul sau distribuitorul în Y, pentru a facilita navigarea și
        filtrarea.
    gardening_fork_type:
      name: Tip de furcă de grădinărit
      description: Clasifică stilul specific sau utilizarea avută în vedere a furculiței.
    garland_style:
      name: Tipul ghirlandei
      description: Clasifică construcția sau tipul decorativ al ghirlandei.
    gas_type:
      name: Tip de gaz
      description: Identifică tipul de gaz comprimat inclus în cilindrul încărcătorului.
    gasket_profile_type:
      name: Tipul profilului garniturii
      description: Specifică profilul standard industrial sau stilul secțiunii transversale
        a garniturii.
    gazebo_roof_material:
      name: Materialul acoperișului foișorului
      description: Specifică materialul panourilor folosite la acoperișul foișorului
        sau al învelișului superior rigid.
    glass_and_surface_cleaner_features:
      name: Caracteristici ale soluției de curățare a geamurilor și a suprafețelor
      description: Evidențiază caracteristicile sau beneficiile speciale ale soluției
        de curățare a geamurilor și suprafețelor.
    glass_cleaner_features:
      name: Caracteristicile soluției de curățare a geamurilor
      description: Evidențiază performanțele speciale sau trăsăturile de formulare
        specifice soluțiilor de curățare a geamurilor.
    glazing_material:
      name: Material de protecție
      description: Identifică materialul care acoperă zona fotografiei (de exemplu,
        sticlă, acrilic sau niciunul).
    globe_map_content:
      name: Conținutul hărții globului
      description: Descrie principalul conținut cartografic afișat pe glob.
    glue_trap_design:
      name: Designul capcanei cu adeziv
      description: Identifică stilul fizic sau formatul capcanei, ajutând la compatibilitatea
        cu zonele de poziționare și tipul de dăunător.
    grab_bar_shape:
      name: Forma barei de sprijin
      description: Definește designul structural al barei de sprijin, afectând amplasarea
        la instalare și stilul de susținere pentru utilizator.
    grass_discharge_type:
      name: Tip de descărcare a ierbii
      description: Specifică modul în care mașina de tuns iarba elimină resturile
        de iarbă tăiată (de exemplu, descărcare laterală, colectare în spate).
    grate_design:
      name: Designul grătarului
      description: Identifică stilul structural al grătarului.
    grater_design:
      name: Designul răzătoarei
      description: Clasifică designul fizic sau mecanismul răzătorii sau al răzuitorului
        de coajă.
    grating_surface_coarseness:
      name: Asperitatea suprafeței de ras
      description: Indică dimensiunea/textura găurilor de tăiere sau a crestelor de
        pe suprafața răzătorii.
    grill_grate_material:
      name: Materialul grilajului grătarului
      description: Specifică materialul sau învelișul grătarului principal de gătit.
    grill_thermometer_type:
      name: Tip termometru de grătar
      description: Indică designul sau tehnologia principală a termometrului pentru
        grătar, ajutând cumpărătorii să găsească rapid modelul care se potrivește
        configurației grătarului lor.
    grinding_mechanism_material:
      name: Materialul mecanismului de măcinare
      description: Specifică din ce material sunt fabricate mecanismul intern sau
        lamelele de măcinare care mărunțesc condimentele.
    grinding_mechanism_type:
      name: Tipul de mecanism de măcinare
      description: Specifică mecanismul intern responsabil pentru șlefuire sau frezare.
    growing_media_buffering:
      name: Tratarea fibrelor de cocos
      description: Specifică dacă substratul a fost tratat pentru îndepărtarea sărurilor
        în exces, influențând administrarea nutrienților.
    growing_media_form:
      name: Forma substratului de cultură
      description: Specifică forma fizică de prezentare a fibrelor de cocos, ajutând
        cultivatorii să înțeleagă necesitățile de manipulare și hidratare.
    growing_medium_type:
      name: Tipul de mediu de creștere
      description: Identifică substratul furnizat pentru germinarea și creșterea semințelor.
    growth_habit:
      name: Obicei de creștere
      description: Descrie forma generală a plantei, ajutând clienții să aleagă spațierea
        și recipientul.
    hand_dryer_accessory_type:
      name: Tip de accesoriu pentru uscător de mâini
      description: Identifică tipul specific de accesoriu pentru uscătorul de mâini,
        astfel încât cumpărătorii să poată înțelege rapid ce este produsul.
    handle_connection_type:
      name: Tip de conexiune a mânerului
      description: Specifică mecanismul utilizat pentru atașarea mânerului la mătură,
        mop sau alte capete de curățare pentru a asigura compatibilitatea.
    handle_grip_style:
      name: Stil de prindere a mânerului
      description: Definește forma sau ergonomia mânerului furcii.
    handle_length_adjustability:
      name: Reglarea lungimii mânerului
      description: Descrie dacă și cum poate fi ajustată lungimea mânerului, permițând
        cumpărătorilor să filtreze între opțiunile fixe și cele telescopice.
    handle_position:
      name: Poziția mânerului
      description: Descrie poziționarea sau tipul mânerului stropitorii, care influențează
        ergonomia la turnare și depozitarea.
    handrail_configuration:
      name: Configurația balustradei
      description: Indică dacă produsul include balustrade și amplasarea acestora.
    hanging_attachment_type:
      name: Tip de atașament suspendat
      description: Specifică accesoriile sau metoda furnizată pentru suspendarea captatorului
        de soare.
    hardiness_zone:
      name: Zona de rezistență
      description: Specifică zona climatică USDA (sau similară) în care planta poate
        supraviețui în aer liber.
    hazards_detected:
      name: Pericole detectate
      description: Enumeră pericolele specifice pe care această unitate este proiectată
        să le detecteze.
    heating_stages:
      name: Trepte de încălzire
      description: Specifică numărul de trepte de încălzire sau nivelul de modulație
        pe care îl acceptă unitatea.
    home_alarm_features:
      name: Funcțiile alarmei pentru locuință
      description: Identifică funcțiile speciale ale unui sistem de alarmă pentru
        locuință, cum ar fi rezerva pentru baterie sau monitorizarea profesională.
    hook_style:
      name: Tipul de cârlig
      description: Clasifică designul/funcția cârligului pentru o potrivire vizuală
        și funcțională mai ușoară.
    humidifier_features:
      name: Caracteristicile umidificatorului
      description: Evidențiază funcțiile sau opțiunile suplimentare principale care
        disting modelele de umidificatoare și ajută la filtrare.
    humidifier_filter_type:
      name: Tipul filtrului umidificatorului
      description: Identifică tipul sau construcția filtrului, astfel încât clientul
        să poată găsi înlocuitorul corect pentru umidificatorul său.
    humidor_accessory_type:
      name: Tip de accesoriu pentru umidificator
      description: Clasifică tipul specific de accesoriu, permițând cumpărătorului
        să filtreze rapid în cadrul categoriei umbrelă.
    hydroponic_nutrient_system:
      name: Sistem de nutrienți hidroponici
      description: Indică numărul de părți din sistemul de nutrienți hidroponici (de
        exemplu, o parte, două părți) care trebuie combinate înainte de utilizare.
    hygrometer_type:
      name: Tipul higrometrului
      description: Identifică stilul higrometrului inclus în humidor, dacă este cazul.
    ice_bucket_accessories_included:
      name: Accesorii pentru găleata de gheață incluse
      description: Enumeră articolele suplimentare de bar furnizate împreună cu găleata
        de gheață.
    ice_bucket_insulation:
      name: Izolație pentru găleata de gheață
      description: Indică construcția peretelui sau nivelul de izolație al găleții
        de gheață, care afectează perioada în care gheața rămâne înghețată.
    ice_cream_maker_accessories_included:
      name: Accesorii incluse pentru mașina de înghețată
      description: Identifică pachetul suplimentar de articole dintr-un set de accesorii
        cu mai multe piese, astfel încât clienții să știe exact ce vor primi.
    ice_shape:
      name: Formă de gheață
      description: Descrie forma gheții produse de aparat, ajutând utilizatorii să
        selecteze aparate care să creeze stilul lor preferat de gheață.
    incense_holder_style:
      name: Stilul suportului de tămâie
      description: Identifică designul structural al suportului, ajutând cumpărătorii
        să aleagă între diferite formate funcționale și estetice.
    infuser_type:
      name: Tipul infuzorului
      description: Indică dacă este inclus un infuzor de fructe sau de ceai și modelul
        acestuia.
    inner_pot_coating:
      name: Acoperire interioară a vasului
      description: Identifică tipul de înveliș al suprafeței vasului interior, indicând
        proprietățile antiaderente și ușurința curățării.
    insulation_capability:
      name: Capacitate de izolare
      description: Indică dacă și cum manșonul izolează băuturile, diferențiind manșoanele
        pur decorative de cele care controlează temperatura.
    insulation_status:
      name: Starea izolației
      description: Precizează dacă recipientul este izolat pentru a păstra temperatura
        băuturii.
    insulation_technology:
      name: Tehnologia de izolare
      description: Identifică construcția izolației utilizate pentru menținerea temperaturii.
    insulation_type:
      name: Tipul de izolație
      description: Specifică dacă și cum este izolat recipientul sau răcitorul de
        băuturi, afectând performanța menținerii gheții și controlul condensului.
    intended_beverage_type:
      name: Tipul de băutură dorit
      description: Indică băutura principală pentru care este proiectat decantorul
        sau cu care este utilizat cel mai frecvent.
    internal_membrane_type:
      name: Tipul de membrană internă
      description: Identifică designul separării interne care menține apa și aerul
        separate în interiorul rezervorului.
    iron_cleaner_purpose:
      name: Scopul produsului de curățare a fierului de călcat
      description: Specifică aplicația principală prevăzută a produsului de curățare.
    ironing_board_form_factor:
      name: Forma mesei de călcat
      description: Clasifică stilul/instalarea generală a mesei de călcat pentru a
        ajuta cumpărătorii să găsească tipul corect.
    ironing_board_pad_shape:
      name: Forma perniței pentru masa de călcat
      description: Indică forma/profilul general al perniței pentru a asigura faptul
        că se potrivește cu diferite modele de mese de călcat.
    jar_shape:
      name: Forma borcanului
      description: Descrie forma geometrică sau tradițională generală a borcanului
        decorativ.
    juicer_type:
      name: Tipul de storcător
      description: Clasifică mecanismul folosit de storcător pentru a extrage suc.
    key_blade_type:
      name: Tipul lamei cheii
      description: Clasifică stilul lamei cheii, cum ar fi plată/cu vârf, tubulară
        sau cu adâncituri.
    kitchen_layout:
      name: Aspectul bucătăriei
      description: Definește configurația generală a bucătăriei prefabricate (de exemplu,
        cu un singur perete sau în formă de L) pentru a ajuta cumpărătorii să găsească
        seturi care se potrivesc cu forma camerei lor și cu preferințele privind fluxul
        de lucru.
    kitchen_linen_items_included:
      name: Articole textile pentru bucătărie incluse
      description: Enumeră componentele specifice ale prosoapelor de bucătărie incluse
        în set, ajutând cumpărătorii să înțeleagă exact ce articole achiziționează.
    label_content_type:
      name: Tipul conținutului etichetei
      description: Descrie dacă suprafața etichetei este goală, preimprimată cu modele
        sau formatată în alt mod.
    lamp_arm_style:
      name: Stilul brațului lămpii
      description: Descrie designul brațului/gâtului lămpii, care afectează posibilitatea
        de reglare și poziționarea (de exemplu, gât de lebădă sau braț oscilant).
    lamp_post_base_mounting_type:
      name: Tip de montare a bazei lămpii
      description: Specifică modul în care baza este instalată sau fixată pe sol sau
        pe suprafață.
    lamp_shade_fitter_type:
      name: Tipul de montaj al abajurului
      description: Definește mecanismul de atașare dintre abajur și lampă, asigurând
        compatibilitatea fără incertitudini.
    lamp_shade_shape:
      name: Forma abajurului
      description: Specifică forma geometrică a abajurului, permițând clienților să
        găsească rapid siluetele dorite.
    lamp_shade_translucency:
      name: Transluciditatea abajurului lămpii
      description: Descrie câtă lumină trece prin abajur, ajutând utilizatorii să
        aleagă ambianța dorită.
    lampshade_shape:
      name: Forma abajurului
      description: Descrie forma geometrică sau forma abajurului lămpii.
    laundry_ball_texture:
      name: Textura bilei de rufe
      description: Descrie tipul suprafeței bilei, care influențează agitarea țesăturii
        și îndepărtarea scamelor.
    laundry_wash_accessory_type:
      name: Tip accesoriu pentru spălarea rufelor
      description: Identifică tipul specific de sac de spălat rufe sau ramă.
    lawn_aerator_type:
      name: Tipul de aerator de gazon
      description: Clasifică aeratoarele de gazon în funcție de principiul de funcționare
        de bază sau de formă.
    lawn_mower_belt_type:
      name: Tip de curea pentru mașina de tuns iarba
      description: Clasifică designul structural sau profilul curelei.
    lawn_mower_blade_type:
      name: Tipul lamei de tuns iarba
      description: Specifică designul de tăiere sau ridicare a lamei mașinii de tuns
        iarba și utilizarea preconizată.
    lawn_spreader_type:
      name: Tipul de împrăștietor pentru gazon
      description: 'Specifică tipul de împrăștiere a semințelor/îngrășământului: cu
        distribuție circulară sau cu cădere verticală.'
    lawn_tractor_tread_type:
      name: Tipul benzii de rulare a tractorului de tuns iarba
      description: Descrie modelul benzii de rulare destinat suprafețelor sau nevoilor
        de tracțiune specifice.
    lid_features:
      name: Caracteristicile capacului
      description: Evidențiază orice elemente funcționale speciale ale capacului care
        facilitează gătitul sau curățarea.
    lid_vent_type:
      name: Tip de orificiu de ventilație pentru capac
      description: Indică dacă și cum permite capacul să iasă abur.
    lift_mechanism:
      name: Mecanism de ridicare
      description: Indică mecanismul de operare utilizat pentru a ridica, a coborî
        sau a înclina jaluzelele sau storurile.
    light_exposure_requirement:
      name: Cerința de expunere la lumină
      description: Specifică nivelul de lumină de care ecosfera are nevoie pentru
        a rămâne sănătoasă fără a supraîncălzi sau stresa organismele.
    liner_installation_method:
      name: Metoda de instalare a căptușelii
      description: Descrie modul în care căptușeala rămâne fixată pe suprafață.
    lint_roller_type:
      name: Tip de rolă de scame
      description: Clasifică mecanismul sau designul de curățare a rolei de scame.
    live_trap_design:
      name: Design al capcanei vii
      description: Clasifică modelul structural general al capcanei
    lock_keying_option:
      name: Opțiune de blocare cu cheie
      description: Specifică modul de activare a încuietorii, ajutând cumpărătorii
        care au nevoie de mai multe încuietori acționate de o singură cheie sau de
        chei unice per încuietoare.
    lubricant_requirement:
      name: Necesarul de lubrifiant
      description: Specifică tipul de lubrifiant recomandat sau necesar în timpul
        ascuțirii.
    lunch_set_items_included:
      name: Articole din setul de prânz incluse
      description: Enumeră componentele individuale aflate în setul cutiei de prânz.
    machete_blade_style:
      name: Stilul lamei de macetă
      description: Specifică stilul tradițional regional sau funcțional al lamei de
        macetă.
    map_style:
      name: Stilul hărții
      description: Definește stilul cartografic sau accentul tematic prezentat pe
        glob.
    masher_head_design:
      name: Design al capului de pasator
      description: Clasifică designul suprafeței de zdrobire, care afectează textura
        și efortul necesar.
    mattress_protector_features:
      name: Caracteristici ale protecției pentru saltea
      description: Evidențiază caracteristicile funcționale sau de protecție specifice
        protecțiilor pentru saltele, permițând cumpărătorilor să filtreze în funcție
        de calități precum impermeabilitatea sau materialele hipoalergenice.
    measuring_spoon_features:
      name: Caracteristicile lingurii de măsurat
      description: Evidențiază caracteristicile speciale de design sau caracteristicile
        funcționale ale linguriței/lingurițelor de măsurat.
    meat_tenderizer_face_type:
      name: Tipul de suprafață al ciocănelului pentru carne
      description: Descrie textura suprafeței de lucru a ciocănelului pentru carne.
    meat_tenderizer_mechanism:
      name: Mecanismul ciocănelului pentru carne
      description: Clasifică mecanismul principal de funcționare al ciocănelului pentru
        carne.
    medical_specialty:
      name: Specialitate medicală
      description: Indică specialitatea medicală sau disciplina medicală pentru care
        este conceput echipamentul
    merv_rating:
      name: Clasificare MERV
      description: Specifică valoarea raportului minim de eficiență (MERV) care arată
        capacitatea filtrului de a capta particule de diferite dimensiuni.
    microwave_compatibility:
      name: Compatibilitatea cu cuptorul cu microunde
      description: Specifică dacă articolul poate fi utilizat în siguranță într-un
        cuptor cu microunde.
    microwave_oven_functions:
      name: Funcțiile cuptorului cu microunde
      description: Listează modurile de gătit presetate sau avansate disponibile,
        permițând clienților să găsească modele cu convecție, grătar, gătit cu senzor
        etc.
    milk_frother_type:
      name: Tipul aparatului de spumat lapte
      description: Clasifică produsul după mecanismul său de spumare sau formă.
    milk_frothing_method:
      name: Metoda de spumare a laptelui
      description: Specifică tehnologia sau mecanismul utilizat pentru spumarea laptelui.
    milk_frothing_system:
      name: Sistem de spumare a laptelui
      description: Specifică tipul de mecanism de spumare a laptelui sau de generare
        de abur oferit de aparat.
    mirror_curvature:
      name: Curbura oglinzii
      description: Specifică curbura suprafeței reflectorizante, care afectează unghiul
        de vizualizare și distorsiunea.
    mirror_type:
      name: Tipul oglinzii
      description: Clasifică stilul general sau categoria funcțională a oglinzii.
    mist_output_mode:
      name: Mode de emitere a ceții
      description: Indică modelele de ceață selectabile sau setările de intensitate
        disponibile pe difuzor.
    mixing_bowl_features:
      name: Caracteristicile bolului de amestecare
      description: Evidențiază caracteristicile funcționale speciale ale bolului care
        influențează capacitatea de utilizare și îngrijirea.
    mixing_mechanism:
      name: Mecanismul de amestecare
      description: Descrie mecanismul intern folosit pentru amestecarea ingredientelor
        dressingului.
    mochi_maker_functions:
      name: Funcțiile aparatului de mochi
      description: Enumeră modurile de funcționare încorporate sau programele pe care
        le oferă aparatul.
    mode_of_action:
      name: Mod de acțiune
      description: Indică modul în care funcționează fungicidul, distingând între
        produsele de protecție la contact și cele sistemice sau translaminare.
    moisture_absorber_form:
      name: Formă de absorbție a umidității
      description: Descrie formatul fizic al produsului, permițând cumpărătorilor
        să selecteze pungi, tuburi, pachete etc.
    money_retrieval_method:
      name: Metoda de recuperare a banilor
      description: Descrie cum se pot scoate banii economisiți din pușculiță.
    mop_head_type:
      name: Tipul capului de mop
      description: Indică designul structural al capului sau al rezervei de mop, ajutând
        cumpărătorii să găsească stilul corect pentru nevoile lor de curățare.
    mop_wringing_mechanism:
      name: Mecanism de stoarcere a mopului
      description: Indică modul în care excesul de lichid este îndepărtat de pe mop,
        ajutând cumpărătorii să aleagă stilul de stoarcere preferat.
    mounting_bolt_pattern:
      name: Modelul șuruburilor de montare
      description: Specifică numărul și aspectul orificiilor pentru șuruburile de
        montare de pe carcasa axului (de exemplu, triunghiular cu 3 șuruburi, pătrat
        cu 4 șuruburi).
    mouthpiece_shape:
      name: Forma muștiucului
      description: Specifică forma muștiucului suportului de țigară.
    mower_deck_material:
      name: Materialul platformei de tăiere
      description: Indică materialul de construcție al platformei de tăiere, care
        influențează durabilitatea și greutatea.
    mulch_form:
      name: Formă de mulci
      description: Descrie forma fizică sau consistența mulciului.
    nap_mat_items_included:
      name: Articole incluse în saltea
      description: Detaliază componentele sau accesoriile specifice incluse în setul
        de saltea.
    napkin_edge_finish:
      name: Finisaj marginii șervețelului
      description: Specifică cusătura sau finisajul decorativ de-a lungul marginii
        sau a tivului șervețelului.
    noodle_core_design:
      name: Designul centrului tăiețeilor
      description: Descrie dacă tăiețeii au un centru solid sau gol.
    nozzle_adjustability:
      name: Reglarea duzei
      description: Indică dacă duza poate fi reglată pentru a modifica modelul de
        pulverizare sau debitul.
    nozzle_material:
      name: Materialul duzei
      description: Specifică materialul duzelor de pulverizare din motive de durabilitate
        și rezistență la înfundare.
    nozzle_style:
      name: Stil de duză
      description: Specifică forma funcțională sau modelul capătului duzei tubului.
    nozzle_types_included:
      name: Tipuri de duze incluse
      description: Enumeră formele/modelele duzelor furnizate cu pistolul de jerky,
        ajutând cumpărătorii să știe ce forme de produs pot crea.
    number_of_compartments:
      name: Numărul de compartimente
      description: Indică câte secțiuni separate are recipientul de deșeuri pentru
        sortarea deșeurilor sau a materialelor reciclabile.
    numeral_style:
      name: Stilul cifrelor
      description: Definește stilul vizual sau prezența cifrelor pe cadranul ceasului.
    oil_dispenser_spout_design:
      name: Designul gurii de scurgere a dozatorului de ulei
      description: Descrie stilul gurii de scurgere sau a duzei, care afectează controlul
        fluxului și prevenirea picurării.
    organizer_application:
      name: Aplicație organizator
      description: Specifică tipul principal de articole pentru care este conceput
        insertul.
    ornament_hook_style:
      name: Stil de cârlig ornamental
      description: Identifică stilul sau forma cârligelor ornamentale folosite pentru
        agățarea decorațiunilor.
    oscillation_mode:
      name: Mod de oscilație
      description: Descrie dacă și cum oscilează ventilatorul pentru a distribui aerul.
    oscillation_type:
      name: Tip de oscilație
      description: Specifică dacă și cum oscilează ventilatorul, ajutând cumpărătorii
        care au nevoie de o circulație extinsă a aerului.
    outdoor_grill_rack_type:
      name: Grătar de grilaj pentru grătarul în aer liber
      description: Specifică stilul funcțional al grilajului pentru a clarifica utilizarea
        sa preconizată în gătit.
    oxygen_indicator_type:
      name: Tipul indicatorului de oxigen
      description: Specifică dacă este inclus un indicator vizual pentru a arăta dacă
        pachetul de absorbție este încă activ și ce formă ia acesta.
    pad_cleaning_action:
      name: Acțiune de curățare a discului
      description: Descrie funcția principală de curățare a discului sau rezultatul
        final.
    pan_bottom_type:
      name: Tip de fund de tigaie
      description: Indică dacă tigaia are fund detașabil sau fund solid, fix.
    pan_perforation_type:
      name: Tipul de perforație a tigăii
      description: Indică dacă fundul/părțile laterale ale tigăii sunt solide sau
        perforate pentru a permite scurgerea lichidului.
    parasol_opening_mechanism:
      name: Mecanism de deschidere a umbrelei de soare
      description: Descrie modul în care se deschide/închide baldachinul umbrelei
        de soare.
    parchment_paper_coating:
      name: Acoperirea pergamentului
      description: Identifică tratamentul de suprafață aplicat pergamentului pentru
        a-i oferi proprietăți antiaderente.
    particle_size_grade:
      name: Gradul dimensional al particulelor
      description: Descrie clasificarea dimensiunii granulei de vermiculită, afectând
        caracteristicile de aerare si de reținere a apei.
    patio_heater_safety_features:
      name: Caracteristici de siguranță pentru încălzitorul de terasă
      description: Evidențiază mecanismele de siguranță încorporate, concepute pentru
        a preveni accidentele și a asigura funcționarea în siguranță.
    pattern_match_type:
      name: Tipul de potrivire a modelului
      description: Specifică modul în care modelul trebuie aliniat între benzi în
        timpul instalării.
    pendulum_compatibility:
      name: Compatibilitatea pendulului
      description: Indică dacă mișcarea poate acționa un pendul și dacă este inclus
        un pendul.
    perch_design:
      name: Designul prăjinii
      description: Descrie stilul structural sau forma prăjinii.
    perch_surface_texture:
      name: Textura suprafeței prăjinii
      description: Definește senzația/finisajul suprafeței prăjinii care afectează
        aderența și uzura cuielor.
    pet_safety:
      name: Siguranța animalelor de companie
      description: Indică dacă planta este toxică sau netoxică pentru animalele de
        companie comune.
    pet_toxicity:
      name: Toxicitatea pentru animalele de companie
      description: Indică dacă planta este toxică pentru animalele de companie comune,
        asigurând siguranța clienților care dețin un animal de companie.
    ph_adjustment_direction:
      name: Direcția de ajustare a pH-ului
      description: Indică dacă produsul este formulat pentru a crește sau a scădea
        nivelul pH-ului soluției.
    pie_pan_edge_style:
      name: Stilul marginii formei de plăcintă
      description: Descrie designul marginii, care afectează aspectul crustei și ușurința
        desprinderii.
    pin_shape:
      name: Forma elementului de fixare
      description: Descrie forma generală a elementului de fixare care ancorează țesătura.
    pipe_connection_method:
      name: Metoda de conectare a țevilor
      description: Specifică stilul conexiunilor de la capetele cotului țevii (de
        exemplu, tată, mamă, îmbinare prin împingere, filetată) pentru a asigura compatibilitatea
        instalării.
    piping_tip_shape:
      name: Forma vârfului de decorare
      description: Definește forma sau modelul vârfului de decorare pentru cofetărie.
    pitcher_spout_style:
      name: Stilul ciocului de ulcior
      description: Definește designul ciocului de scurgere, care afectează precizia
        latte art și controlul turnării.
    pizza_cutter_design:
      name: Designul cuțitului de pizza
      description: Identifică stilul structural al cuțitului de pizza, ajutând clienții
        să aleagă între diferite mecanisme de tăiere.
    pizza_pan_style:
      name: Stilul unei tăvi de pizza
      description: Identifică stilul de construcție/design al tăvii de pizza, indicând
        modul în care se coace crusta și varietatea de pizza vizată.
    plant_care_difficulty:
      name: Dificultatea îngrijirii plantelor
      description: Indică nivelul de îngrijire necesar pentru întreținerea plantei,
        ajutând începătorii și experții să aleagă în mod corespunzător.
    plant_container_type:
      name: Tip de ghiveci
      description: Identifică tipul de recipient inclus cu arbustul artificial, dacă
        există.
    plant_life_cycle:
      name: Ciclul de viață al plantei
      description: Indică dacă planta este anuală, bianuală sau perenă.
    planter_material:
      name: Materialul jardinierei
      description: Indică materialul ghiveciului/jardinierei incluse, dacă este furnizat.
    plate_coupling_pattern:
      name: Model de cuplare a plăcilor
      description: Specifică configurația butucului inferior care se potrivește cu
        cuplajul motorului platanului cuptorului cu microunde, asigurând rotația corectă.
    plate_purpose:
      name: Scopul plăcii
      description: Definește rolul funcțional al plăcii în cadrul sistemului cositoarei.
    plate_style:
      name: Stil de farfurie
      description: Identifică stilul specific sau utilizarea preconizată a farfuriilor
