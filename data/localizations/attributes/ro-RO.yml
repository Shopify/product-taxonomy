    trailer_type:
      name: Tip remorcă
      description: Identifică designul sau tipul unei remorci de autovehicul, cum
        ar fi deschisă sau închisă
    training_data_requirements:
      name: Cerințe privind datele de instruire
      description: Identifică tipul și calitatea datelor necesare pentru instruirea
        eficientă a AI sau a software-ului de învățare automată, de exemplu, date
        etichetate
    trampoline_design:
      name: Design trambulină
      description: Descrie construcția trambulinei, cum ar fi fără arc sau arc elicoidal
    transceiver_form_factor:
      name: Factorul de formă al transceiver-ului
      description: Definește standardul modulului fizic al transceiver-ului de rețea
        (de exemplu, SFP, QSFP28)
    transcriber/dictation_system_features:
      name: Caracteristicile sistemului de transcriere/dictare
      description: Identifică caracteristici speciale ale sistemelor de transcriere
        sau de dictare, cum ar fi AI sau reducerea zgomotului
    transfer_aid_type:
      name: Tip de ajutor pentru transfer
      description: Clasifică tipul de ajutor, făcând distincția între plăcile rigide
