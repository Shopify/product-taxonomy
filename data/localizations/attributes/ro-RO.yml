    deployment_type:
      name: Tip de implementare
      description: Descrie modul în care este implementat software-ul AI, cum ar fi
        hibrid sau în cloud
    desk_organizer_features:
      name: Caracteristici organizator de birou
      description: Descrie caracteristicile specifice ale unui organizator de birou,
        cum ar fi separatoarele reglabile sau compartimentele încorporate
    desk_size:
      name: Dimensiune birou
      description: Indică categoria de mărime a unui birou, cum ar fi mic (S) sau
        mare (L)
    detailed_ingredients:
      name: Ingrediente detaliate
      description: Enumeră componentele specifice utilizate în sănătate și frumusețe,
