    vehicle_mirror_features:
      name: Caracteristici oglindă vehicul
      description: Descrie caracteristicile speciale ale oglinzilor vehiculului, cum
        ar fi reglarea automată a luminii sau încălzirea
    vehicle_mirror_type:
      name: Tip oglindă vehicul
      description: Identifică tipul specific de oglindă a unui vehicul, cum ar fi
        retrovizoare sau vedere laterală
    vehicle_mounting_location:
      name: Locație de montare în vehicul
      description: Specifică zona dintr-un vehicul unde suportul este destinat să
        fie instalat
    vehicle_oil_features:
      name: Caracteristicile uleiului vehiculului
      description: Descrie proprietățile unice ale uleiului de motor, cum ar fi protecția
