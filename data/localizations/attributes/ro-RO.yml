      description: Definește textura sau formatul principal al luciului de buze
    lip_liner_design:
      name: Designul creionului de buze
      description: Identifică tipul de creion de buze, cum ar fi retractabil sau fix
    lip_makeup_opacity:
      name: Opacitatea produsului de machiaj al buzelor
      description: Indică nivelul de acoperire sau opacitate al produsului odată aplicat
    lip_plate_material:
      name: Material placă pentru buze
      description: Identifică materialul folosit pentru placa de buze a unui flaut,
        cum ar fi argintul sau lemnul
    lipstick_coverage:
      name: Acoperirea rujului
      description: Descrie nivelul de opacitate a culorii oferit de ruj (de exemplu,
        transparent, mediu, complet)
    lipstick_effect:
      name: Efect ruj
      description: Descrie efectul sau finisajul pe care îl oferă un ruj, de exemplu,
        netezire, umplere
    liqueur_variety:
      name: Sortimente de lichior
      description: Clasifică lichiorurile în funcție de profilurile lor principale
        de aromă, de exemplu, nuci, cremă
    livestock_food_ingredients:
      name: Ingrediente pentru hrana animalelor
      description: Specifică ingredientele principale din hrana pentru animale, cum
        ar fi orzul sau șrotul de soia
    lnb_output:
      name: Ieșire LNB
      description: Specifică numărul de conexiuni ale receptorului de satelit, cum
        ar fi unic sau cvadruplu
    lnb_technology:
      name: Tehnologie LNGB
      description: Clasifică tipul de tehnologie din LNB-urile de satelit, cum ar
        fi zgomot universal sau redus
    load_capacity:
      name: Capacitate de încărcare
      description: Specifică limita de greutate pe care o poate suporta un produs,
        cum ar fi sarcini ușoare sau sarcini grele
    loading_ramp_type:
      name: Tip rampă de încărcare
      description: Identifică tipul rampei de încărcare pentru vehicule, cum ar fi
        individuală sau din trei secțiuni
    loading_type:
      name: Tipul de încărcare
      description: Specifică modul în care sunt încărcate mașinile de spălat rufe,
        cum ar fi încărcarea frontală sau superioară
    lock_placement:
      name: Amplasarea mecanismului de blocare
      description: Identifică locul în care este poziționat mecanismul de blocare
        pe piesele motorului ambarcațiunii, cum ar fi exterior sau interior
    lock_type:
      name: Tipul mecanismului de blocare
      description: Specifică mecanismul de blocare utilizat de un produs, cum ar fi
        cheia sau codul
    locking_mechanism:
      name: Mecanism de blocare
      description: Specifică tipul de mecanism de blocare utilizat, de obicei pentru
        produsele de siguranță; de ex. închidere automată, glisare
    logic_family:
      name: Familie logică
      description: Identifică familia logică semiconductoare sau tehnologia CI-ului
    lovibond:
      name: Lovibond
      description: Indică intensitatea culorii cerealelor și a malțului de bere, cum
        ar fi deschisă sau închisă
    lubricant_application:
      name: Aplicarea lubrifiantului
      description: Definește zonele adecvate pentru aplicarea lubrifiantului personal,
        cum ar fi masaj sau vaginal
    lubricant_composition:
      name: Compoziția lubrifiantului
      description: Definește ingredientul de bază al lubrifianților personali, cum
        ar fi pe bază de apă sau pe bază de silicon
    lubricant_dispenser_type:
      name: Tip dozator de lubrifiant
      description: Identifică tipul de ambalaj sau recipient pentru lubrifianți, cum
        ar fi tub sau sticlă
    lubricant_effect:
      name: Efect lubrifiant
      description: Indică orice efect funcțional sau stil furnizat de lubrifierea
        prezervativului
    lubricant_form:
      name: Forma lubrifiantului
      description: Descrie consistența unui lubrifiant, cum ar fi gel sau pastă
    luggage/bag_closure:
      name: Închidere valiză/geantă
      description: Identifică tipul de închidere folosit pentru valize sau genți,
        cum ar fi fermoar sau capse
    lumber/wood_type:
      name: Tip de cherestea/lemn
      description: Identifică tipul specific de lemn sau cherestea utilizat la fabricarea
        unui produs, cum ar fi stejar sau pin
    lyre/flip_folder_attachment_type:
      name: Tip fixare suport sub formă de liră/cu clemă pentru partituri
      description: Specifică tipul de fixare pentru suporturile de partituri sub formă
        de liră cu clemă, cum ar fi cureaua sau clema
    m_2_drive_length_supported:
      name: Lungime unitate M.2 suportată
      description: Specifică ce lungimi de card M.2 poate accepta carcasa sau adaptorul
    magnet_type:
      name: Tip de magnet
      description: Identifică tipul de magnet utilizat într-un produs, de exemplu
        ceramică, titan
    magnification:
      name: Mărire
      description: Specifică puterea de mărire a unui produs, cum ar fi 1x sau 100x
    magsafe_compatibility:
      name: Compatibilitate MagSafe
      description: Indică dacă accesoriul este compatibil cu atașamentul magnetic
        MagSafe de la Apple sau cu ecosistemul de încărcare
    makeup_brush_application:
      name: Aplicarea pensulei de machiaj
      description: Specifică utilizarea cosmetică principală sau zona pentru care
        este proiectată pensula (de exemplu, fond de ten, fard de pleoape, contur)
    makeup_features:
      name: Caracteristicile produselor de machiaj
      description: Evidențiază caracteristicile cheie ale produselor cosmetice, cum
        ar fi pigmentarea ridicată sau lipsa parfumului
    makeup_shade:
      name: Nuanță machiaj
      description: Descrie nuanța produselor cosmetice, cum ar fi roz deschis sau
        maro intens
    mallet_material:
      name: Materialul ciocănelelor de percuție
      description: Identifică tipul de material folosit la fabricarea ciocănelelor
        de percuție, cum ar fi alama sau cauciucul
    management_type:
      name: Tipul de management
      description: Descrie nivelul de gestionare al dispozitivului (de exemplu, complet
        gestionat, gestionat inteligent, negestionat), astfel încât cumpărătorii să
        poată potrivi capacitățile produsului cu cerințele rețelei
    mandibular_device_fitting_method:
      name: Metoda de ajustare a dispozitivului mandibular
      description: Descrie cum este ajustat sau turnat dispozitivul pe dinții utilizatorului
    mandolin_back_shape:
      name: Forma spatelui mandolinei
      description: Specifică curbura și designul spatelui mandolinei, cum ar fi cu
        spate plat sau bombat
    manufacturer_type:
      name: Tipul de producător
      description: Specifică sursa pieselor sau accesoriilor vehiculului, cum ar fi
        originale sau terțe
    map_update_policy:
      name: Politică de actualizare hărți
      description: Declară modul în care sunt furnizate sau tarifate actualizările
        de hărți pentru dispozitiv
    marine_navigator_features:
      name: Caracteristicile navigatorului marin
      description: Specifică capabilitățile instrumentelor de navigație marină, cum
        ar fi ecranul tactil sau rezistența la apă
    marker_format:
      name: Format marcator
      description: Definește stilul fizic sau construcția marcatorului
    marker_text_color:
      name: Culoare text marcator
      description: Specifică culoarea legendei sau textului tipărit pe suprafața marcatorului
        (distinctă de culoarea corpului marcatorului)
    marker_tip_design:
      name: Design vârf marker
      description: Descrie forma vârfului unui marker, cum ar fi glonț sau daltă
    marquee_substrate:
      name: Substratul siglei
      description: Specifică mediul fizic pe care este tipărită sau furnizată grafica
        (de exemplu, film translucid, acril tipărit invers, decal din vinil)
    mascara_brush_shape:
      name: Formă perie de rimel
      description: Specifică forma sau designul bețișorului sau periei primerului
        încorporat, care influențează puternic aplicarea și rezultatele obținute
    mascara_effect:
      name: Efectul rimelului
      description: Descrie rezultatul urmărit sau caracteristica rimelului, de exemplu,
        ondulare, alungire
    mascara_formulation:
      name: Formularea rimelului
      description: Indică compoziția de bază a produsului sau tehnologia specială
        (de exemplu, lichid, infuzat cu fibre, tubing) care afectează textura, purtarea
        și îndepărtarea
    mask_cushion_material:
      name: Materialul perniței măștii
      description: Detaliază materialul specific folosit pentru perna de etanșare/sigilare
        a măștii
    mask_size:
      name: Mărime mască
      description: Specifică desemnarea mărimii furnizată de producător
    mask_type:
      name: Tipul de mască
      description: Specifică modul de proiectare a măștilor, de obicei pentru asistență
        respiratorie; de exemplu, orale, nazale
    masonry_material:
      name: Material de zidărie
      description: Specifică compoziția elementelor de zidărie, cum ar fi cimentul
        sau varul
    masonry_product_form:
      name: Forma produsului de zidărie
      description: Specifică forma produselor de zidărie, cum ar fi pastă sau pulbere
    massage_area:
      name: Zona de masaj
      description: Specifică partea corpului pe care produsul este proiectat să o
        maseze, cum ar fi picioarele sau gâtul
    massage_mechanism_dimensionality:
      name: Dimensionalitate mecanism de masaj
      description: Specifică numărul de axe de mișcare în care operează rolele de
        masaj (de exemplu, 2D, 3D, 4D, 5D)
    massage_stone_texture:
      name: Textura pietrei de masaj
      description: Descrie senzația tactilă dată de suprafața pietrelor de masaj,
        cum ar fi netede sau aspre
    massage_technique:
      name: Tehnica de masaj
      description: Definește metodele de masaj oferite de un produs, de exemplu percuție,
        masaj profund al țesuturilor
    mat/rug_shape:
      name: Forma preșului/covorului
      description: Descrie forma sau designul preșurilor sau covoarelor, cum ar fi
        rotunde sau pătrate
    mat_base_material:
      name: Material de bază preș
      description: Specifică tipul de materialul de bază folosit pentru preșuri, adică
        plută, spumă cu memorie
    mat_features:
      name: Caracteristici preș
      description: Descrie caracteristicile specifice ale preșurilor de acasă sau
        de la birou, cum ar fi baza anti-alunecare sau impermeabilă
    material:
      name: Material
      description: Definește materialul principal din care este fabricat un produs,
        cum ar fi bumbac sau lână
    material_firmness:
      name: Fermitatea materialului
      description: Descrie cât de dur sau moale este un produs, de exemplu rigid,
        flexibil
    material_hardness:
      name: Duritatea materialului
      description: Definește fermitatea produsului, de obicei pentru echipamente sportive
        sau de fitness; de exemplu, foarte moale, rezistență ridicată
    material_origin:
      name: Originea materialului
      description: Indică forma sau starea în care sunt furnizate materialele prețioase
        (de exemplu, neîncastrate/nemontate, bijuterii finisate, card cadou imprimat/digital)
    material_treatment:
      name: Tratarea materialului
      description: Specifică tratamentele chimice sau fizice aplicate materialelor
        pentru conservare sau siguranță (de exemplu, tratat termic, fumigat, tratat
        chimic)
    maternity_clothing_features:
      name: Caracteristici îmbrăcăminte pentru gravide
      description: Descrie caracteristicile unice ale îmbrăcămintei pentru gravide,
        de exemplu spațiu pentru creșterea burticii, cupe de susținere
    maternity_sleepwear_style:
      name: Tipul de pijamale pentru gravide
      description: Specifică tipul articolelor de dormit pentru gravide, cum ar fi
        salopetă sau cămașă de dormit
    mattress_features:
      name: Caracteristici saltea
      description: Evidențiază caracteristicile speciale ale unei saltele, cum ar
        fi funcția hipoalergenică sau cu funcție de răcire
    maximum_bit_depth:
      name: Adâncime maximă de biți
      description: Definește lungimea maximă a cuvântului digital (în biți) pe care
        o suportă convertorul, afectând gama dinamică și rezoluția
    maximum_magnification:
      name: Mărire maximă
      description: Indică cel mai mare factor de mărire pe care îl poate atinge un
        microscop, cum ar fi 10x sau 100x
    maximum_reel_diameter_supported:
      name: Diametru maxim rolă acceptat
      description: Specifică cel mai mare diametru al rolei pe care platforma de lemn
        îl poate acomoda
    measured_parameters:
      name: Parametri măsurați
      description: Enumeră valorile electrice sau de baterie pe care dispozitivul
        le poate măsura sau afișa
    measuring_method:
      name: Metoda de măsurare
      description: Definește tehnica utilizată pentru cuantificarea grăsimii corporale,
        de exemplu, optică, plicometru
    measuring_tool_features:
      name: Caracteristicile instrumentului de măsurare
      description: Descrie caracteristici speciale ale instrumentelor de măsurare,
        cum cameră integrată sau portabilitate
    measuring_type:
      name: Tipul de măsurare
      description: Specifică metoda de măsurare pentru dispozitivele medicale, de
        exemplu frunte, deget
    meat_cut:
      name: Tăiere carne
      description: Ajută la identificarea tăieturii sau tipului specific de carne,
        de ex. burger, aripioare
    meat_type:
      name: Tip carne
      description: Identifică sursa produselor din carne, de exemplu, pe bază de plante,
        pui
    media_access:
      name: Acces conținut media
      description: Definește modul în care clienții pot accesa conținutul media, de
        exemplu, abonamentul digital, tipărirea și online
    media_content_type:
      name: Tipul de conținut media
      description: Identifică genul sau categoria de conținut media, cum ar fi reality
        TV sau stand-up comedy
    media_format:
      name: Format conținut media
      description: Definește formatele media compatibile pentru un dispozitiv, cum
        ar fi vinil sau VHS
    media_physical_size:
      name: Dimensiune fizică media
      description: Specifică dimensiunea fizică standardizată sau factorul de formă
        al mediului de stocare neînregistrat
    media_player_form_factor:
      name: Factor de formă media player
      description: Descrie stilul fizic al dispozitivului, ajutând cumpărătorii să
        aleagă între stick-uri compacte și cutii set-top mai mari
    media_section:
      name: Secțiunea media
      description: Identifică categoria specifică a unui ziar sau a unei reviste,
        cum ar fi sport sau politică
    media_theme:
      name: Tema media
      description: Clasifică conținutul media în funcție de obiectivul său principal,
        cum ar fi călătorii sau jocuri
    medical_alarm_features:
      name: Caracteristici alarmă medicală
      description: Descrie capacitățile unui sistem de alarmă medical, cum ar fi durata
        lungă de viață a bateriei sau comunicarea bidirecțională
    medical_device_certification:
      name: Certificare dispozitiv medical
      description: Enumeră aprobările de reglementare sau standardele respectate de
        monitorul biometric (de exemplu, CE, FDA 510(k))
    medical_identification_type:
      name: Tipul de identificare medicală
      description: Identifică forma de identificare medicală, cum ar fi brățară sau
        colier
    medical_symbol:
      name: Simbol medical
      description: Specifică simbolul afișat pe bijuterie sau etichetă, ajutând la
        recunoașterea rapidă de către personalul de prim ajutor
    medical_syringe_purpose:
      name: Scopul seringii medicale
      description: Identifică utilizarea prevăzută a unei seringi medicale, cum ar
        fi pentru injecție sau irigare
    medical_tape_material:
      name: Material leucoplast
      description: Identifică compoziția leucoplastului, cum ar fi plastic sau latex
    medicine/drug_form:
      name: Formă medicamentului
      description: Identifică forma fizică a unui medicament, cum ar fi tablete sau
        lichid
    medicine/supplement_form:
      name: Formă medicament/supliment
      description: Identifică forma fizică a unui medicament sau supliment, cum ar
        fi capsule sau lichid
    medium:
      name: Tipul de obiect de colecție
      description: Identifică tipul de obiect de colecție, cum ar fi memorabilia sau
        cartonașe de colecție pentru schimburi
    melodica_style:
      name: Tip clavietă
      description: Specifică tipul unui instrument stil clavietă cum ar fi tip pian
        sau tip claviatură
    memory_channels:
      name: Canale de memorie
      description: Definește capacitatea procesoarelor de transmitere a datelor, cum
        ar fi cu două sau patru nuclee
    memory_form_factor:
      name: Factor de formă a memoriei
      description: Specifică structura fizică a modulelor de memorie, cum ar fi DIMM
        sau micro-DIMM
    memory_rank:
      name: Rang de memorie
      description: Indică dispunerea rangului modulului (modul în care sunt organizate
        cipurile), afectând compatibilitatea și reglarea performanței
    memory_storage_type:
      name: Tipul de memorie de stocare
      description: Identifică tipul de memorie de stocare utilizat pentru camere,
        cum ar fi card Micro SD sau memoria integrată
    memory_technology:
      name: Tehnologie de memorie
      description: Specifică tipul de memorie utilizat în dispozitivele electronice,
        cum ar fi DDR sau SDRAM
    menstrual_cup_shape:
      name: Forma cupei menstruale
      description: Descrie forma cupelor menstruale, de ex. clopot, în formă de V
    menstrual_cup_size:
      name: Dimensiunea cupă menstruală
      description: Indică categoria de dimensiune etichetată de producător (de exemplu,
        mică, Dimensiunea 1).
    menstrual_cup_stem_type:
      name: Tipul tijei cupei menstruale
      description: Specifică designul tijei sau mânerului de îndepărtare al cupei
    mesh_networking_technology:
      name: Tehnologia de rețea mesh
      description: Specifică dacă punctul de acces acceptă capabilitate mesh și standardul
        sau protocolul utilizat
    mesh_type:
      name: Tip plasă
      description: Specifică tipul sau construcția materialului tip plasă, indicând
        utilizarea sau caracteristicile prevăzute, de exemplu sport, periat
    metal_detector_features:
      name: Caracteristicile detectorului de metale
      description: Evidențiază caracteristicile unice ale detectoarelor de metale,
        de ex., husă pentru curea, rezistent la apă
    metal_molding_application:
      name: Mod de utilizare matriță de turnare a metalelor
      description: Identifică utilizarea prevăzută a matrițelor de turnare a metalelor,
        cum ar fi bijuterii sau figurine
    meter_type:
      name: Tip contor
      description: Identifică tipul de contor utilizat în sistemele de alimentare
        cu combustibil ale ambarcațiunilor, cum ar fi digital sau analogic
    metrics_supported:
      name: Măsurători acceptate
      description: Specifică tipurile de măsurători biometrice furnizate de un produs,
        de exemplu, masa osoasă, masa musculară
    micrometer_type:
      name: Tip micrometru
      description: Identifică modul de utilizare sau designul specific al unui micrometru,
        cum ar fi lamă sau alezaj
    microphone_design:
      name: Design microfon
      description: Definește categoria de design pentru microfoane, de exemplu, cu
        condensator, dinamic
    microphone_preamp_form_factor:
      name: Factor de formă preamplificator microfon
      description: Identifică stilul fizic sau formatul de incintă al preamplificatorului
        de microfon pentru instalare sau utilizare
    microphone_thread:
      name: Filet microfon
      description: Specifică dimensiunea filetului pentru microfoane, de exemplu 1/4"-20,
        M6
    microphone_type:
      name: Tip microfon
      description: Definește tehnologia utilizată pentru microfon, cum ar fi cu condensator
        sau dinamic
    microphone_windshield_type:
      name: Tip protecției fonice al microfonului
      description: Specifică stilul de construcție al protecției fonice (de ex., burete
        slip-on, blană deadcat, blimp, coș), astfel încât utilizatorii să poată alege
        rapid soluția potrivită pentru reducerea zgomotului de vânt
    microscope_features:
      name: Caracteristicile microscopului
      description: Evidențiază aspectele unice ale microscoapelor, cum ar fi portabilitatea
        sau funcția de memorie
    microscope_slide_material:
      name: Material pentru lame de microscop
      description: Specifică tipul de material utilizat în lamele de microscop, cum
        ar fi sticlă sau plastic
    midi_connectivity:
      name: Conectivitate MIDI
      description: Identifică tipul de conexiune MIDI pentru instrumente muzicale,
        cum ar fi MIDI in sau USB midi
    mimo_technology:
      name: Tehnologia MIMO
      description: Indică tehnologia wireless Multiple-Input Multiple-Output acceptată
        de router
    mineral_class:
      name: Clasa de minerale
      description: Identifică categoria specifică a unui mineral, cum ar fi oxizi
        sau silicați
    mineral_compound_form:
      name: Forma compusului mineral
      description: Specifică forma chimică sau chelatul mineralului (de exemplu, citrat,
        glicinat) care afectează absorbția
    minimum_magnification:
      name: Mărire minimă
      description: Indică cel mai mic nivel de mărire al unei lentile de microscop,
        cum ar fi 1x sau 0,5x
    mirror_handle_design:
      name: Design mâner oglindă
      description: Descrie tipul mânerului oglinzilor dentare, cum ar fi cu două capete
        sau cu un singur capăt
    mirror_sides:
      name: Laturile oglinzii
      description: Indică numărul sau configurația suprafețelor reflectorizante ale
        unei oglinzi (de ex., cu o față, cu două fețe, pliabilă în trei)
    mist_application_area:
      name: Zona de aplicare al spray-ului
      description: Indică zona (zonele) de utilizare destinată (de exemplu, corp,
        păr, cameră, lenjerie de pat)
    mixer_type:
      name: Tip mixer
      description: Clasifică mixerele DJ în funcție de design, cum ar fi digitale
        sau scratch
    mobile_mounting_type:
      name: Tip de montare carusel
      description: Specifică locul unde se poate fixa un carusel pentru bebeluși,
        de exemplu pătuț, cărucior
    mobile_movement:
      name: Mecanism carusel
      description: Descrie mecanismul caruselului pentru bebeluși, cum ar fi pe bază
        de baterie sau manual
    mobile_phone_accessories_included:
      name: Accesorii pentru telefon mobil incluse
      description: Enumeră articolele suplimentare furnizate în setul de accesorii
        pentru telefon mobil pentru ca cumpărătorii să știe exact ce componente sunt
        incluse
    mobile_phone_case_features:
      name: Caracteristici husă pentru telefonul mobil
      description: Descrie caracteristicile unice ale unei huse pentru telefonul mobil,
        cum ar fi rezistența la șocuri sau potrivirea perfectă
    mobile_phone_connector_type:
      name: Tip de conector pentru telefonul mobil
      description: Identifică standardul de interfață al unui modul de înlocuire pentru
        port de încărcare sau date
    mobile_phone_form_factor:
      name: Factor de formă pentru telefonul mobil
      description: Stilul de design fizic al telefonului
    mobility/accessibility_equipment_features:
      name: Caracteristici echipamente de mobilitate/accesibilitate
      description: Descrie caracteristicile unice ale echipamentelor pentru accesibilitate,
        cum ar fi durata lungă de viață a bateriei sau oprirea de urgență
    mobility_scooter_type:
      name: Tip scuter pentru mobilitate
      description: Distinge între diferite tipuri de scutere pentru mobilitate, de
        exemplu portabile, cu 3 roți
    mobility_type:
      name: Tip mobilitate
      description: Indică stilul bazei care afectează mobilitatea, distingând între
        picioare staționare, roți pivotante sau opțiuni interschimbabile
    model_control_technology:
      name: Tehnologia de control al modelului
      description: Specifică tipul de sistem de control pentru trenuri în miniatură,
        cum ar fi wireless sau digital
    model_gender_representation:
