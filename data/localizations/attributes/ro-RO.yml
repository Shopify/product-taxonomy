      name: Model brațe
      description: Descrie designul sau motivul de pe brațele ochelarilor, cum ar
        fi cu logo sau în carouri
    tension:
      name: Tensiune
      description: Descrie nivelul de tensiune a coardelor pentru instrumente muzicale,
