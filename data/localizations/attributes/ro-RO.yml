    denture_coverage:
      name: Acoperire proteză
      description: Identifică gradul de acoperire a protezelor dentare, cum ar fi
        totală sau parțială
    denture_design:
      name: Design proteză
      description: Descrie tipul de proteză, de exemplu, flexibilă, pentru utilizare
        imediată
    denture_retention_mechanism:
      name: Mecanism de retenție proteză
      description: Specifică cum proteza rămâne pe loc pe dinți sau gingii
    denture_teeth_color:
      name: Culoare dinți proteză
      description: Specifică nuanța dinților protezei, cum ar fi alb gălbui sau galben
