    dentistry_items_included:
      name: Produse stomatologice incluse
      description: Identifică instrumentele dentare incluse într-un set, cum ar fi
        oglinda dentară sau instrumentul de îndepărtare a tartrului
    denture_arch_coverage:
      name: Acoperire arcadă proteză
      description: Identifică arcada dentară pe care proteza (sau fațetele detașabile)
