    truck_type:
      name: Tip camion
      description: Clasifică tipul de camion, cum ar fi autobasculantă sau autoplatformă
    tube_component:
      name: Componentă tub
      description: Specifică tipul de tub utilizat la fabricarea amplificatoarelor
        muzicale, de exemplu, carcasă, suport
    tube_configuration:
      name: Configurație tub
      description: Descrie aranjamentul tuburilor într-un amplificator pentru instrumente
        muzicale, cum ar fi tub unic sau în pereche
    tuner_design:
      name: Design tuner electronic
      description: Descrie tipul tunerelor electronice pentru instrumente muzicale,
        cum ar fi cu clemă sau pedală
    tuner_type:
      name: Tip tuner
      description: Definește tipul de frecvență radio recepționată, cum ar fi AM/FM
        sau radio prin satelit
    tuning_fork_design:
      name: Design diapazon
      description: Descrie designul specific al unui diapazon, cum ar fi ponderat
        sau neponderat
    tuning_fork_frequency:
      name: Frecvența diapazonului
      description: Specifică frecvența unui diapazon, cum ar fi 128 Hz sau 256 Hz
    tuning_modes:
      name: Moduri tuner
      description: Identifică setările specifice instrumentului pentru tunerele electronice,
        cum ar fi chitară sau vioară
    tuning_pitch:
      name: Înălțimea de acordaj
      description: Specifică înălțimea de acordaj a unui instrument, cum ar fi fa
        diez sau la bemol
    tuning_range:
      name: Gama de acordaj
      description: Specifică gama de opțiuni de acordaj disponibile, cum ar fi standard
        sau deschisă
    tv_broadcast_standards_supported:
      name: Standarde de difuzare TV suportate
      description: Enumeră standardele specifice de difuzare televiziune sau cablu/satelit
        pe care cardul sau adaptorul le poate decoda sau recepționa
    uc_platform_certification:
      name: Certificare platformă UC
      description: Identifică platformele de comunicații unificate sau de întâlniri
        pentru care dispozitivul este certificat oficial
    ultrasound_probe_type:
      name: Tip de sondă ultrasunete
      description: Identifică caracteristicile de design ale sondei furnizate cu monitorul
        (de exemplu, impermeabilă, internă)
    undershirt_style:
      name: Tip cămașă de corp
      description: Descrie designul sau croiala unei cămașă de corp, cum ar fi decolteu
        la baza gâtului sau decolteu în V
    underwear_style:
      name: Tip lenjerie de corp
      description: Definește designul și croiala lenjeriei de corp, cum ar fi bikini
        sau lenjerie modelatoare
    units_of_measurement:
      name: Unități de măsurare
      description: Specifică sistemul de măsurare utilizat pentru produs, de exemplu
        milimetri (mm), Fahrenheit (°F)
    update_frequency:
      name: Frecvența actualizării
      description: Indică periodicitatea actualizărilor pentru software sau date,
        de exemplu, în timp real, anual
    upholstery_color:
      name: Culoare tapițerie
      description: Specifică culoarea tapițeriei unui produs, cum ar fi roșie sau
        bej
    upholstery_material:
      name: Material tapițerie
      description: Identifică materialul folosit pentru tapițerie, cum ar fi pielea
        sau catifea
    upholstery_pattern:
      name: Model tapițerie
      description: Descrie designul vizual de pe materialul folosit la tapițarea mobilierului,
        de exemplu, dungi sau carouri
    uplink_port_type:
      name: Tipul portului de uplink
      description: Indică conectorul de uplink de cea mai mare viteză prezent pe switch
        (de exemplu, SFP+, QSFP28, 10GBase-T)
    ups_topology:
      name: Topologie UPS
      description: Indică abordarea de design intern pe care un UPS o folosește pentru
        a condiționa și a furniza energie (de exemplu, standby, line-interactive,
        online)
    urinal_mounting_type:
      name: Tip de montare pisoar
      description: Specifică modul în care este instalat pisoarul, cum ar fi montat
        pe perete sau pe podea
    usage_conditions:
      name: Condiții de utilizare
      description: Specifică dacă produsul este adecvat pentru utilizare în condiții
        uscate sau umede, de obicei pentru aparate de ras
    usage_environment:
      name: Mediu de utilizare
      description: Specifică aona de aplicare a produsului de bronzare
    usage_frequency:
      name: Frecvența de utilizare
      description: Specifică frecvența recomandată de utilizare a produsului, cum
        ar fi zilnic sau săptămânal
    usage_type:
      name: Tip de utilizare
      description: Specifică ciclul de utilizare prevăzut al produsului, de exemplu,
        reutilizabil, reîncărcabil
    usb_connector_type:
      name: Tipul conectorului USB
      description: Identifică conectorul (conectorii) USB fizici furnizați pe dispozitiv
        pentru date și/sau alimentare
    usb_standard:
      name: Standardul USB
      description: Specifică versiunea USB pentru dispozitivele electronice, cum ar
        fi USB 2.0 sau USB 3.1 Gen 1
    user_type:
      name: Tip de utilizator
      description: Identifică utilizatorul vizat al unui produs software, cum ar fi
        persoană fizică sau întreprindere mică
    utility/maintenance_task_type:
      name: Tip de sarcină utilitară/întreținere
      description: Categorizează sarcina efectuată de un software, cum ar fi curățarea
        discului sau optimizarea sistemului
    uv_blocking_class:
      name: Clasa de blocare UV
      description: Indică nivelul de protecție UV încorporat în lentila de contact,
        așa cum este definit de standardele ISO
    uv_protection:
      name: Protecție UV
      description: Specifică capacitatea produsului de a bloca razele UV, de obicei
        pentru ochelarii de soare; de exemplu UV400
    uva_protection_grade:
      name: Gradul de protecție UVA
      description: Indică gradul de protecție UVA al produsului, exprimat în mod obișnuit
        ca grade PA
    vacuum_air_filtering_technology:
      name: Tehnologia de filtrare a aerului pentru aspiratoare
      description: Specifică tipul de filtrare a aerului utilizat în aspiratoare,
        cum ar fi HEPA sau animale de companie
    valve_type:
      name: Tip supapă
      description: Specifică tipul de supapă în piesele de bicicletă, de exemplu Presta,
