    tray_compatibility:
      name: Compatibilitate tavă
      description: Precizează tipul tăvii de albire sau al aparatului de respirat
        compatibil cu suportul
    treatment_area:
      name: Zona de tratament
      description: Specifică partea corpului vizată de un produs, de obicei pentru
        articole de masaj; ex. spate, gât
    treatment_method:
      name: Metoda de tratament
      description: Descrie mecanismul sau tehnologia de livrare pe care produsul o
        folosește pentru a elimina leziunea (de exemplu, crioterapie, acid chimic,
        plasture cu microace)
    treatment_modes:
      name: Moduri de tratament
      description: Enumeră modurile funcționale pe care dispozitivul le acceptă (de
        exemplu, HR, SHR, SR)
    treatment_objective:
      name: Scopul tratamentului
      description: Definește problema pe care o tratează produsul, de obicei pentru
        articolele de îngrijire personală; ex. sforăit, febră
    treatment_target_area:
      name: Zona țintă de tratament
      description: Indică dacă produsul este conceput pentru gene, sprâncene sau ambele
    treatment_texture:
      name: Textura tratamentului
      description: Definește consistența produselor de tratament, cum ar fi crema
        pentru erupții cutanate; de exemplu, densă, pudră
    treatment_type:
      name: Tipul de tratament
      description: Precizează metoda de tratament, de obicei pentru tratamentele împotriva
        căderii părului; de exemplu laser, topic
    tree_stand_material:
      name: Material suport pentru brad
      description: Specifică din ce este fabricat un suport pentru brad, cum ar fi
        plastic sau metal
    trellis_design:
      name: Design grilaj
      description: Identifică modelul de grilaj pentru garduri sau bariere, de exemplu
        pătrat, romboidal
    tricycle_design:
      name: Design tricicletă
      description: Descrie tipul unei triciclete, cum ar fi cu scaun vertical sau
        înclinat
    tricycle_propulsion_type:
      name: Tipul de propulsie tricicletă
      description: Specifică modul în care este condusă o tricicletă, cum ar fi prin
        împingere sau tracțiune față
    trip_type:
      name: Tip declanșare
      description: Specifică tipul de declanșare a unui întrerupător, de exemplu,
        neinterschimbabil
    tripod/monopod_attachment_type:
      name: Tip de fixare trepied/monopied
      description: Specifică tipul de conexiune pentru accesoriile de trepied sau
        monopied, cum ar fi 3/8 sau universal
    tripod/monopod_head_type:
      name: Tip cap trepied/monopied
      description: Specifică mecanismul capetelor de trepied/monopied, cum ar fi cu
        roți dințate sau cardanic
    tripod_handle_type:
      name: Tip mâner trepied
      description: Specifică funcționalitatea mânerelor trepiedului, de exemplu multifuncțional,
        tip pistol
    trophy_design:
      name: Design trofeu
      description: Descrie tipul sau forma specifică a unui trofeu, cum ar fi cupă
