    van_type:
      name: Tip furgonetă
      description: Face distincția între diferitele tipuri de furgonete, cum ar fi
        furgoneta de pasageri sau furgoneta transformată
    vaping_style:
      name: Tipul de vaping
      description: 'Specifică tehnica de vaporizare pentru țigările electronice, de
        exemplu, direct la plămâni, gură la plămâni '
