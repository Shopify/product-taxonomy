    piano_size:
      name: Dimensiunea pianului
      description: Definește tipul și dimensiunea unui pian, cum ar fi pian mic cu
        coadă sau pianină
    pick_design:
      name: Design pană pentru chitară
      description: Identifică designul penei pentru chitară, de exemplu tip lacrimă,
