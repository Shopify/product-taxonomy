    pinball_machine_format:
      name: Formatul aparatului de pinball
      description: Specifică formatul fizic sau digital al produsului (de exemplu,
        mecanic, virtual, de masă, kit)
    ping_pong_equipment_included:
      name: Echipament de ping pong inclus
      description: Specifică tipul de echipament de ping-pong inclus în set, cum ar
        fi plasă sau palete de ping-pong
    ping_pong_robot_features:
      name: Caracteristicile robotului de ping-pong
      description: Descrie funcționalitățile unui robot de ping-pong, cum ar fi gruparea
