        exemplu curbat sau conic
    drive_form_factor:
      name: Factor de formă unitate
      description: Specifică înălțimea sau clasa de dimensiune a mecanismului unității
        (de exemplu, înălțime completă, jumătate de înălțime, slimline)
    drive_size:
      name: Dimensiune unitate de acționare
      description: Descrie dimensiunea de acționare a cheilor dinamometrice și duble,
        de exemplu, 1 inch
    drive_type:
      name: Tip propulsie
      description: Identifică tipul de sistem de propulsie pentru vehicule sau mașini
        grele, cum ar fi 2WD sau 4WD
    driver_configuration:
      name: Configurația difuzoarelor
      description: Specifică numărul de căi discrete ale difuzoarelor în sistemul
        de boxe (de exemplu, 2 căi, 3 căi)
    driver_technology:
      name: Tehnologie driver
      description: Specifică tipul traductorului utilizat pentru a produce sunetul
        (de ex., dynamic, balanced armature, planar magnetic, hybrid)
    drone_board_function:
      name: Funcție placă dronă
      description: Descrie scopul principal al plăcii de circuit în sistemul dronei
    drone_features:
      name: Caracteristici dronă
      description: Specifică caracteristicile funcționale și de design ale unei drone,
        cum ar fi navigarea cu GPS sau evitarea obstacolelor
    drum_configuration:
      name: Configurație tobe
      description: Se folosește pentru a indica configurația unui set de tobe, cum
        ar fi un set din 7 piese sau un pachet de bază
    drum_hardware_adjustability:
      name: Posibilitate de reglare a elementelor tobei
      description: Descrie în detaliu caracteristicile reglabile ale accesoriilor
        pentru tobe și percuție, de exemplu unghiul reglabil al măciucii pentru tobă
    drum_hardware_material:
      name: Material elemente tobă
      description: Identifică materialul utilizat pentru elementele tobei, cum ar
        fi oțelul sau aluminiul
    dry/wet_cleaning:
      name: Curățare chimică/umedă
      description: Specifică dacă produsele sunt potrivite pentru curățarea chimică
        sau umedă
    dry_bean_variety:
      name: Soi de boabe uscate
      description: Identifică varietatea de boabe uscate utilizată, de exemplu năut,
        fasole neagră
    dryer_features:
      name: Caracteristici uscător
      description: Specifică caracteristicile unice ale unui uscător de rufe, cum
        ar fi tehnologia de autocurățare sau cu invertor
    dryer_technology:
      name: Tehnologie uscător
      description: Indică tehnologia de uscare în sisteme HVAC, de ex. cu agent de
        desicare, agent de refrigerare
    drying_method:
      name: Metodă de uscare
      description: Specifică cum dispozitivul usucă periuțele de dinți după sterilizare,
        dacă este cazul
    drying_speed:
      name: Viteză de uscare
      description: Definește viteza cu care un produs se usucă sau se întărește, cum
        ar fi cu uscare rapidă sau obișnuită
    dsl_standard_compatibility:
      name: Compatibilitate standard DSL
      description: Identifică standardele DSL pe care le acceptă un filtru sau un
        accesoriu pentru a asigura suprimarea adecvată a zgomotului și calitatea conexiunii
    duct_design:
      name: Design conductă
      description: Identifică forma conductelor de aer în sistemele HVAC, de exemplu
        solide, flexibile
    duct_shape:
      name: Formă conductă
      description: Descrie forma conductelor de aer în sistemele HVAC, cum ar fi circulare
        sau plate
    duplex_component_type:
      name: Tip componentă duplex
      description: Definește forma specifică a piesei duplex furnizate (de exemplu,
        ansamblu, tavă, angrenaj)
    duplexer_installation_type:
      name: Tip instalare duplexer
      description: Clarifică modul în care duplexerul se atașează la imprimantă (de
        exemplu, slot intern, atașare externă posterioară)
    duplexing_technology:
      name: Tehnologie duplex
      description: Specifică dacă o imprimantă este compatibilă cu imprimarea față-verso,
        de exemplu, nu este compatibilă, funcție duplex automată
    duplication_operation_mode:
      name: Mod de operare duplicare
      description: Indică dacă duplicatorul funcționează independent, necesită conectare
        la un computer sau suportă ambele moduri
    durability_features:
      name: Caracteristici de durabilitate
      description: Evidențiază capacitatea unui produs de a rezista la diferite condiții,
        de exemplu rezistent la rugină, rezistent la șocuri
    dust_container_type:
      name: Tip recipient pentru praf
      description: Specifică tipul de sistem de colectare a prafului în aspiratoare
        și aparate, de exemplu fără sac, cu sac pentru praf
    dust_mask_type:
      name: Tip mască praf
      description: Specifică forma măștilor de protecție împotriva prafului, cum ar
        fi cu cupă sau plată cu pliuri
    dvi_connection_type:
      name: Tip de conexiune DVI
      description: Identifică conectorul DVI specific și formatul de legătură suportat
        (de exemplu, DVI-D single-link, DVI-I dual-link, Mini-DVI)
    dye_form:
      name: Formă colorant
      description: Descrie starea fizică a coloranților pentru proiecte de artizanat,
        cum ar fi gel sau pulbere
    dynamic_level:
      name: Nivel dinamic
      description: Clasifică mingile de racquetball și de squash în funcție de viteză
        și de ricoșeu, de exemplu, punct verde, punct roșu
    dynamics_processing_function:
      name: Funcție de procesare a dinamicii
      description: Identifică principalele sarcini de procesare a dinamicii pe care
        le realizează unitatea (de ex., compresor, limiter, noise gate, de-esser)
    e_book_formats_supported:
      name: Formate de cărți electronice acceptate
      description: Identifică gama de formate de cărți electronice compatibile cu
