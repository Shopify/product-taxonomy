    pickup_design:
      name: Design doză
      description: Identifică designul dozei pentru instrumentele cu coarde, cum ar
        fi cele permanente sau temporare
    pickup_mounting_type:
      name: Tip de montare doză
      description: Specifică metoda de montare a unei doze pentru chitară, cum ar
        fi prin lipire cu adeziv sau cu clemă
    pickup_position:
      name: Poziția dozei
      description: Indică locul în care doza este poziționată pe o chitară electrică,
