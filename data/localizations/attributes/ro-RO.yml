      name: Tipul de strecurătoare
      description: Specifică stilul sau designul strecurătorii, indicând utilizarea
        culinară destinată și construcția sitei.
    strap_end_fitting_type:
      name: Tipul de fixare al capătului curelei
      description: Specifică elementele sau accesoriile situate la capătul curelei
        de tragere care facilitează conectarea, ancorarea sau ajustarea.
    straw_dispensing_mechanism:
      name: Mecanismul de eliberare a paielor
      description: Descrie metoda prin care sunt eliberate paiele, ajutând cumpărătorii
        care caută caracteristici specifice de igienă sau confort.
    sugar_dispenser_mechanism:
      name: Mecanism al dozatorului de zahăr
      description: Detaliază modul în care zahărul este dozat din recipient, ajutând
        cumpărătorii să aleagă stilul de turnare preferat.
    suitable_for_pool_shape:
      name: Compatibil cu forma piscinei
      description: Indică cu ce forme de piscină poate fi utilizat accesoriul, ajutând
        utilizatorii să asigure potrivirea corectă.
    suitable_pool_surface_type:
      name: Tipul de suprafață de piscină adecvată
      description: Identifică materialele de suprafață ale piscinei pentru care este
        concepută peria/mătura, prevenind deteriorarea suprafeței și asigurând curățarea
        optimă.
    suitable_spread_material:
      name: Material de împrăștiere adecvat
      description: Identifică tipurile de materiale pe care împrăștietorul este conceput
        să le elibereze.
    sundial_type:
      name: Tipul de ceas solar
      description: Identifică stilul de design sau configurația științifică a ceasului
        solar.
    supplement_function:
      name: Funcția suplimentului
      description: Clasifică suplimentele după scopul lor principal, ajutând cultivatorii
        să aleagă aditivul potrivit pentru nevoile specifice ale plantelor.
    surface_reflectivity:
      name: Reflectivitatea suprafeței
      description: Arată dacă suprafața indicatorului este concepută să reflecte lumina
        pentru vizibilitate îmbunătățită pe timpul nopții.
    sweetener_type:
      name: Tipul de îndulcitor
      description: Identifică agentul principal de îndulcire utilizat în sirop.
    table_skirt_pleat_style:
      name: Stilul pliurilor fustei de masă
      description: Definește stilul decorativ de plisare sau cută al fustei, ajutând
        cumpărătorii să armonizeze temele estetice.
    tablecloth_clip_design:
      name: Designul cârligului pentru fața de masă
      description: Descrie mecanismul sau stilul cârligului pentru fața de masă.
    tablecloth_features:
      name: Caracteristici ale feței de masă
      description: Evidențiază caracteristicile speciale de performanță sau design
        ale feței de masă.
    tamper_evident_feature:
      name: Caracteristica de evidențiere a deschiderii
      description: Indică prezența și stilul funcționalității de evidențiere a deschiderii
        încorporată în capac.
    tang_type:
      name: Tip de coadă
      description: Indică designul cozii unui cuțit, specificând cât de departe se
        extinde metalul lamei în mâner.
    teapot_spout_style:
      name: Stilul ciocului ceainicului
      description: Descrie designul ciocului de turnare al ceainicului, influențând
        controlul turnării și estetica.
    temperature_zones:
      name: Zone de temperatură
      description: Identifică câte zone de temperatură controlabile independent oferă
        frigiderul de vin.
    thermocouple_junction_type:
      name: Tipul joncțiunii termocuplului
      description: Indică construcția joncțiunii de detecție, influențând timpul de
        răspuns și izolarea electrică.
    thermometer_design:
      name: Design al termometrului
      description: Specifică stilul fundamental de operare sau tehnologia termometrului
        casnic.
    thermos_handle_type:
      name: Tipul de mâner al termosului
      description: Descrie stilul de mâner sau sistem de transport integrat în termos.
    thread_standard:
      name: Standardul de filet
      description: Identifică specificația de filet utilizată la conexiunile accesoriului
        pentru a asigura compatibilitatea încrucișată cu componentele de instalație
        sanitară.
    tilt_mechanism:
      name: Mecanism de înclinare
      description: Specifică mecanismul care permite înclinarea baldachinului pentru
        poziționarea optimă a umbrei.
    time_format:
      name: Formatul orei
      description: Indică dacă ceasul poate afișa ora în format de 12 ore, 24 de ore
        sau în ambele formate.
    timer_mechanism:
      name: Mecanism de temporizare
      description: Identifică mecanismul de bază utilizat pentru măsurarea timpului.
    tine_position:
      name: Poziția dinților
      description: Descrie configurația dinților în raport cu roțile/motorul, care
        influențează manevrabilitatea și penetrarea solului.
    tire_construction:
      name: Construcția anvelopei
      description: Identifică metoda de construcție internă a carcasei anvelopei.
    tire_construction_type:
      name: Tip de construcție a anvelopei
      description: Identifică dacă anvelopa este de construcție diagonală sau radială,
        ceea ce influențează flexibilitatea, capacitatea de încărcare și calitatea
        mersului.
    tire_tread_pattern:
      name: Modelul benzii de rulare a anvelopei
      description: Descrie stilul benzii de rulare a anvelopei, indicând adecvarea
        pentru diferite condiții de teren și nevoi de tracțiune.
    tissue_lotion_content:
      name: Conținutul de loțiune al batistelor
      description: Indică dacă batistele sunt impregnate cu loțiune sau alți aditivi
        calmanți.
    toaster_features:
      name: Caracteristici ale prăjitorului de pâine
      description: Enumeră funcțiile speciale și elementele de design disponibile
        pe prăjitorul de pâine.
    tong_type:
      name: Tipul cleștelui
      description: Specifică stilul principal sau utilizarea destinată a cleștelui.
    toothbrush_holder_features:
      name: Caracteristicile suportului pentru periuțe de dinți
      description: Evidențiază funcțiile speciale sau elementele de design care diferențiază
        suportul.
    toothpick_dispensing_mechanism:
      name: Mecanism de distribuire a scobitorilor
      description: Identifică mecanismul prin care sunt distribuite scobitorile.
    topographical_relief:
      name: Relieful topografic
      description: Indică dacă suprafața globului prezintă topografie ridicată.
    towel_holder_design:
      name: Designul suportului de prosoape
      description: Descrie stilul structural al suportului de prosoape, cum ar fi
        bară sau inel.
    towel_weave:
      name: Țesătura prosopului
      description: Descrie construcția sau stilul de țesătură al materialului prosopului,
        care influențează textura, absorbția și timpul de uscare.
    track_lighting_rail_type:
      name: Tipul șinei de iluminat
      description: Definește standardul mecanic/electric al șinei, determinând ce
        corpuri de iluminat și conectori sunt compatibili.
    track_lighting_system_compatibility:
      name: Compatibilitatea cu sistemul de iluminat pe șină
      description: Specifică standardul electric și mecanic al șinei pentru care este
        conceput corpul de iluminat sau accesoriul.
    track_rail_circuit_configuration:
      name: Configurația circuitului șinei
      description: Indică numărul sau stilul de circuite electrice pe care șina le
        acceptă, influențând controlul independent al grupurilor de corpuri.
    track_system_standard:
      name: Standardul sistemului de șină
      description: Identifică standardul fizic de șină căruia îi corespunde alimentarea
        electrică, permițând cumpărătorilor să potrivească componentele la șina lor
        (de ex. șină H, J sau L).
    tractor_tire_application:
      name: Aplicația anvelopei de tractor
      description: Indică aplicația sau mediul principal pentru care este concepută
        anvelopa.
    tractor_tire_tread_classification:
      name: Clasificarea benzii de rulare a anvelopei de tractor
      description: Clasifică modelul benzii de rulare a anvelopei de tractor conform
        standardelor agricole și industriale.
    tree_shape:
      name: Forma copacului
      description: Descrie silueta sau profilul general al unui copac artificial.
    trigger_type:
      name: Tip de declanșator
      description: Specifică mecanismul declanșator utilizat pentru a controla fluxul
        de apă la duză.
    trimmer_line_feed_system:
      name: Sistemul de alimentare a firului motocoasei
      description: Identifică modul în care firul de tăiere avansează din zona capului
        în timpul funcționării.
    trimmer_line_shape:
      name: Forma firului motocoasei
      description: Descrie forma secțiunii transversale a firului motocoasei, care
        influențează performanța de tăiere și zgomotul.
    turntable_type:
      name: Tipul de platan
      description: Identifică stilul suprafeței de gătit, făcând distincția între
        platanele tradiționale din sticlă și designurile plate sau nerotative.
    ultrasonic_cleaner_accessories_included:
      name: Accesoriile incluse ale dispozitivului de curățare cu ultrasunete
      description: Enumeră componentele suplimentare furnizate cu dispozitivul de
        curățare, astfel încât cumpărătorii să știe exact ce se află în cutie.
    umbrella_base_type:
      name: Tipul de bază al umbrelei
      description: Definește stilul structural sau designul de montare al bazei.
    umbrella_opening_mechanism:
      name: Mecanismul de deschidere a umbrelei
      description: Definește modul în care baldachinul umbrelei este desfăcut și retras.
    umbrella_type:
      name: Tipul umbrelei
      description: Specifică designul general sau forma umbrelei.
    upf_rating:
      name: Valori nominale UPF
      description: Indică factorul de protecție ultravioletă (UPF) al materialului
        baldachinului umbrelei de soare, cuantificând eficacitatea sa la blocarea
        razelor UV nocive.
    utensil_flexibility:
      name: Flexibilitatea ustensilei
      description: Indică cât de rigid sau flexibil este corpul racletei, influențând
        adecvarea pentru boluri curbe sau aluat ferm.
    utensil_holder_features:
      name: Caracteristicile suportului de ustensile
      description: Descrie caracteristicile funcționale speciale ale unui suport de
        ustensile de bucătărie.
    utensil_tray_features:
      name: Caracteristicile tăvii de ustensile
      description: Evidențiază caracteristicile speciale care îmbunătățesc funcționalitatea
        tăvii.
    vacuum_hose_connection_type:
      name: Tipul de conectare a furtunului de aspirator
      description: Descrie stilul de conector de la capetele furtunului, asigurând
        potrivirea mecanică corectă cu aspiratoarele sau accesoriile.
    valance_style:
      name: Stilul perdelei scurte
      description: Identifică designul decorativ al perdelei scurte, ajutând clienții
        să aleagă un stil care se potrivește cu decorul lor.
    valet_organizer_features:
      name: Caracteristici ale organizatorului valet
      description: Evidențiază caracteristicile specifice de organizare integrate
        în valetul de încărcare.
    valve_configuration:
      name: Configurația supapei
      description: Definește stilul funcțional al supapei furtunului de grădină, ajutând
        cumpărătorii să selecteze rapid soluția corectă pentru sistemul lor de udare.
    valve_stem_angle:
      name: Unghiul tijei supapei
      description: Specifică orientarea/unghiul tijei supapei în raport cu camera,
        influențând ușurința umflării și potrivirea pe jantă.
    vase_filler_type:
      name: Tipul de umplutură pentru vază
      description: Categorizează produsul după tipul specific de material sau formă
        de umplutură.
    vent_pipe_type:
      name: Tipul de țeavă de ventilație
      description: Clasifică stilul de construcție al coșului sau țevii de ventilație.
    vent_style:
      name: Stil de ventilație
      description: Clasifică stilul structural sau scopul componentei de ventilație.
    waffle_style:
      name: Stilul vafei
      description: Identifică grila vafă sau modelul produs de plăci.
    wallpaper_removal_type:
      name: Tipul de îndepărtare a tapetului
      description: Indică ușurința de îndepărtare la redecorare.
    wallpaper_washability_rating:
      name: Evaluarea lavabilității tapetului
      description: Definește modul în care suprafața tapetului poate fi curățată după
        instalare.
    warmer_type:
      name: Tip de încălzitor
      description: Specifică mecanismul principal de încălzire sau utilizarea preconizată
        a încălzitorului de lumânări sau ulei.
    warmth_level:
      name: Nivel de căldură
      description: Clasifică nivelul general de căldură sau adecvarea sezonieră a
        cuverturii sau pilotei.
    warmth_rating:
      name: Clasificarea căldurii
      description: Indică nivelul de izolare al unei pături, similar cu clasificările
        TOG în lenjeria de pat.
    waste_container_lid_features:
      name: Caracteristicile capacului coșului de gunoi
      description: Evidențiază funcționalitățile speciale sau îmbunătățirile încorporate
        în capac.
    waste_container_sign_message:
      name: Mesajul indicatorului de coș de gunoi
      description: Definește fluxul specific de deșeuri sau textul de avertizare tipărit
        pe etichetă sau indicator.
    water_filtration_technology:
      name: Tehnologia de filtrare a apei
      description: Descrie tehnologia de bază sau mecanismul utilizat pentru purificarea
        apei.
    water_heater_element_connection_type:
      name: Tipul de conectare a elementului de încălzire a apei
      description: Identifică stilul de montare al elementului, făcând distincția
        între tipul cu filet și diferitele stiluri de flanșă.
    water_sensor_design:
      name: Proiectarea senzorului de apă
      description: Specifică stilul fizic al elementului de detectare a apei.
    water_supply_type:
      name: Tip de alimentare cu apă
      description: Identifică modul în care aparatul primește apă, făcând distincția
        între rezervoarele cu umplere manuală și conductele de apă racordate.
    watering_needs:
      name: Necesitățile de udare
      description: Descrie necesarul tipic de apă al plantei.
    wax_paper_form:
      name: Forma hârtiei cerate
      description: Specifică dacă hârtia cerată este vândută ca rolă continuă sau
        ca foi tăiate în prealabil.
    weather_guard_mounting_method:
      name: Metoda de montare a protecției meteorologice
      description: Specifică modul în care protecția se atașează la hrănitoare sau
        structura de susținere.
    wheel_bearing_type:
      name: Tipul de rulment al roții
      description: Identifică construcția rulmentului sau bucșei interne ale roții,
        influențând regularitatea rulării și cerințele de întreținere.
    wheel_tread_style:
      name: Stilul benzii de rulare a roții
      description: Specifică designul benzii de rulare al roții, care influențează
        tracțiunea, nivelul de zgomot și posibilele urme pe podea.
    whistling:
      name: Fluieratul
      description: Specifică dacă ceainicul produce un sunet de fluierat când apa
        ajunge la punctul de fierbere.
    wick_material:
      name: Material al fitilului
      description: Identifică compoziția fitilului utilizat (de ex., bumbac, fibră
        de sticlă).
    window_film_installation_surface:
      name: Suprafața de instalare a foliei de geam
      description: Specifică dacă folia este concepută pentru aplicare interioară,
        exterioară sau pe ambele suprafețe.
    window_film_type:
      name: Tipul de folie de geam
      description: Clasifică stilul funcțional al foliei (de ex., intimitate sau securitate).
    window_rod_type:
      name: Tip de baghetă pentru perdea
      description: Clasifică stilul funcțional al baghetei de geam.
    window_screen_type:
      name: Tipul de plasă de geam
      description: Definește stilul structural sau metoda de operare a plasei.
    window_treatment_lining_type:
      name: Tipul de acoperire a tratamentului de geam
      description: Indică dacă perdeaua scurtă sau cornișa este căptușită și ce tip
        de căptușeală este utilizat.
    wine_aerator_type:
      name: Tip de aerator pentru vin
      description: Specifică forma sau stilul de operare al aeratorului de vin.
    wine_glass_style:
      name: Stil de pahar pentru vin
      description: Specifică tipul de vin avut în vedere sau designul paharului pentru
        optimizarea aromei și a gustului.
    wok_bottom_type:
      name: Tip de fund al wokului
      description: Definește forma bazei wokului, determinând compatibilitatea cu
        diferite plite și inele pentru wok.
    wood_grain_orientation:
      name: Orientarea fibrei lemnului
      description: Specifică orientarea fibrei lemnului în produs, cum ar fi fibra
        de capăt, fibra de margine sau fibra de față. Orientarea fibrei influențează
        durabilitatea și ușurința tăierii cu cuțitul.
    wood_seasoning_method:
      name: Metoda de condiționare a lemnului
      description: Indică modul în care combustibilul de lemn a fost uscat sau condiționat,
        influențând conținutul de umiditate și calitatea arderii.
    wrap_format:
      name: Formatul foliei
      description: Specifică forma fizică în care este furnizată folia alimentară,
        cum ar fi role sau foi tăiate în prealabil.
    abacus_bead_material:
      name: Material pentru bilele de abac
      description: Materialul principal al bilelor de abac.
    abec_rating:
      name: Clasificarea ABEC
      description: Specifică gradul de precizie al rulmenților pe baza clasificărilor
        ABEC, indicând nivelurile de finețe și toleranță.
    abrasive_level:
      name: Gradul de abraziune
      description: Puterea relativă de lustruire a unui produs de lustruire/pastă
        pentru finisajele auto.
    absinthe_accessories_included:
      name: Accesorii pentru absint incluse
      description: Detaliază orice accesorii care sunt ambalate împreună cu produsul,
        precum linguri, pahare sau cuburi de zahăr.
    ac_compressor_mounting_style:
      name: Tipul de montare al compresorului de aer condiționat
      description: Descrie tipul de montare/fixare mecanică sau interfața suportului
        compresorului cu motorul/sistemul de antrenare a accesoriilor.
    ac_compressor_oil_type:
      name: Tipul de ulei al compresorului de aer condiționat
      description: Precizează compoziția chimică a uleiului lubrifiant necesar/utilizat
        de compresorul de aer condiționat (printre tipurile obișnuite se numără PAG
        și POE).
    accent_modes:
      name: Moduri accentuate
      description: Specifică modul în care metronomul poate accentua bătăile dintr-o
        măsură (dincolo de bătăile obișnuite).
    access_mechanism:
      name: Mecanismul de acces
      description: Descrie modul în care utilizatorul ajunge la platforma de dormit
        suspendată.
    accessibility_features:
      name: Funcții de accesibilitate
      description: Specifică echipamentele și configurațiile legate de accesibilitate
        ale microbuzului.
    accessories_included:
      name: Accesorii incluse
      description: Listează articolele suplimentare care vin în pachet cu scaunul
        (de exemplu, taburet, pernă lombară), oferind cumpărătorului o imagine clară
        asupra valorii adăugate.
    accessory_pieces_included:
      name: Elemente de accesorizare incluse
      description: Enumeră articolele accesorii incluse într-un set-cadou sau pachet
        de accesorii vestimentare cu mai multe piese.
    acoustic_amplifier_feedback_control_features:
      name: Funcții de control al feedbackului amplificatorului acustic
      description: Indică funcțiile integrate de control al feedbackului pentru instrumente
        acustice (de exemplu, filtru notch, comutator de fază, suprimare automată
        a feedbackului).
    acoustic_drum_kit_components_included:
      name: Componente incluse în kitul de tobe acustice
      description: Indică componentele principale incluse în kit (doar set de carcase
        pentru tobe vs. kit complet; cimbale/hardware incluse).
    acoustic_guitar_body_shape:
      name: Forma corpului chitarei acustice
      description: Descrie forma/conturul corpului chitarei acustice, care influențează
        tonul, confortul și utilizarea tipică.
    acoustic_guitar_string_core_design:
      name: Designul miezului corzilor pentru chitară acustică
      description: Structura miezului corzilor înfășurate.
    acoustic_piano_key_material:
      name: Materialul clapelor pianului acustic
      description: Specifică materialul principal utilizat pentru clapele/fildeșul
        pianului.
    acoustic_piano_lid_type:
      name: Tip capac pentru pian acustic
      description: Specifică tipul mecanismului capacului utilizat la pianul acustic
        (pentru a face distincție dintre pianul cu coadă/pian vertical și capacul
        claviaturii/capacul superior).
    acoustic_piano_plate_frame_material:
      name: Materialul plăcii/cadrului pianului acustic
      description: Specifică materialul principal al plăcii/cadrului pianului (harpa),
        de obicei fontă.
    acoustic_piano_soundboard_material:
      name: Material pentru placa de rezonanță a pianului acustic
      description: Specifică materialul principal utilizat pentru placa de rezonanță
        a pianului.
    action_figure_scale:
      name: Figurină de acțiune la scală
      description: Indică raportul de scală al colecției (de exemplu, 1:12) pentru
        care este destinat accesoriul.
    action_type:
      name: Tipul de acțiune
      description: Descrie mecanismul de tragere sau de armare al armei (de exemplu,
        cu culisare, cu basculare, cu pârghie).
    actuation_mechanism:
      name: Mecanismul de acționare
      description: 'Indică modul în care maneta acționează sistemul de frânare: cu
        cablu pur mecanic, complet hidraulic, hidraulic acționat prin cablu sau electronic/fără
        fir.'
    actuation_method:
      name: Metodă de acționare
      description: Cum este activat sau descărcat sistemul de suprimare.
    adapter_orientation:
      name: Orientarea adaptorului
      description: Specifică unghiul sau configurația unui adaptor pentru supapa unei
        anvelope de bicicletă, ceea ce influențează accesibilitatea pompei (de exemplu,
        drept, la 90°).
    additive_application_stage:
      name: Etapa de aplicare a aditivului
      description: Indică etapa din proces în care se intenționează utilizarea produsului.
    adhesive_backing:
      name: Strat adeziv
      description: Dacă mătasea imprimabilă are suport adeziv pentru aplicare autoadezivă.
    adhesive_formulation:
      name: Formula adezivă
      description: Indică baza chimică sau formula adezivului, de exemplu, cianoacrilat
        sau epoxid.
    adhesive_sides:
      name: Laturi adezive
      description: Indică dacă adezivul fuzibil se găsește pe o latură sau pe ambele
        laturi ale benzii/țesăturii.
    adjunct_grain_processing_form:
      name: Formular auxiliar de prelucrare a cerealelor adjuvante
      description: Indică forma fizică/de procesare pentru cerealele adjuvante comercializate
        pentru fabricarea berii (de exemplu, fulgi, tratat termic, malțificate, brute).
    adjustability_type:
      name: Tip de ajustabilitate
      description: Specifică tipul de ajustare acceptat de către lonjeron, dacă este
        cazul.
    adjustable_cup_mutes:
      name: Surdine reglabile în formă de cupă
      description: Indică dacă este reglabilă/detașabilă cupa și care este stilul
        de reglare
    adjustable_zones:
      name: Zone reglabile
      description: Identifică secțiunile bazei care pot fi ajustate în mod independent.
    adjustment_type:
      name: Tip de reglare
      description: Indică dacă regulatorul este reglabil și cum se efectuează reglarea.
    administration_method:
      name: Metoda de administrare
      description: Indică modul în care este administrat calului agentul de deparazitare
        (de exemplu, oral sau prin injectare), ajutând cumpărătorul să respecte instrucțiunile
        din domeniul veterinar și să aleagă o metodă de aplicare gestionabilă.
    advice_card_prompt_type:
      name: Tipul de prompt cartonaș cu sfaturi
      description: Tip de prompt imprimat pe cartonaș (sau lipsa prompt).
    aeration_method:
      name: Metodă de aerisire
      description: Descrie tipul de aerare furnizat sau acceptat de către container,
        asigurând un nivel adecvat de oxigen pentru momeala vie.
    aero_package_components:
      name: Componente ale pachetului aero
      description: Precizează componentele aerodinamice cheie care sunt instalate
        pe vehicul (selectați toate variantele aplicabile).
    aerodynamic_elements_included:
      name: Elemente aerodinamice incluse
      description: Specifică ce componente aerodinamice sunt incluse în mașina de
        curse (selectați toate variantele aplicabile, dacă este cazul).
    aftertouch_support:
      name: Asistență pentru aftertouch
      description: Dacă controllerul acceptă aftertouch-ul (pe un canal sau polifonic)
        pe clape/paduri.
    agave_content_classification:
      name: Clasificare conținut de agave
      description: Specifică dacă tequila este produsă integral din agave Blue Weber
        sau este un amestec care conține minimum 51% zaharuri din agave.
    aida_cloth_count:
      name: Număr pânză Aida
      description: Specifică numărul pentru pânza Aida (numărul de pătrate/cusături
        pe inch), care determină dimensiunea cusăturii și scara modelului.
    aida_cloth_pre_cut_format:
      name: Format pretăiat pentru pânza Aida
      description: Indică dacă pânza Aida se vinde ca bucată pre-tăiată, bucată continuă
        tăiată din sul sau pe rolă.
    air_bag_material:
      name: Material air bag
      description: Specifică materialul utilizat pentru punga de aer/rezervorul cimpoiului
        irlandez.
    air_bed_internal_construction:
      name: Construcție internă a saltelei pneumatice
      description: Descrie structura sau tehnologia de asistență internă utilizată
        în interiorul saltelei pneumatice, pentru confort și stabilitate.
    air_dry_clay_color_form:
      name: Formă de culoare a argilei uscate la aer
      description: Indică dacă argila este comercializată precolorată, albă/neutră
        spre vopsire sau ca amestec/sortiment.
    air_hockey_items_included:
      name: Articol air hockey incluse
      description: Listează accesoriile specifice conținute într-un set, astfel încât
        clientul să știe exact ce primește (de exemplu, 2 crose, 4 pucuri, 2 pernițe
        de pâslă).
    air_intake_temperature_sensor_mounting_style:
      name: Stil de montare pentru senzorul de temperatură al admisiei de aer
      description: Stilul de montare fizică pentru senzorului IAT din sistemul de
        admisie.
    air_integration_capability:
      name: Capacitate de integrare a aerului
      description: Indică dacă și cum acceptă computerul pentru scufundări emițătoarele
        fără fir pentru presiunea din rezervor.
    air_mattress_valve_type:
      name: Tipul de supapă al saltelei pneumatice
      description: Specifică stilul de supapă cu care un accesoriu se potrivește sau
        pe care îl poate conține, asigurând compatibilitatea între pompe, supape și
        piese de schimb.
    air_water_rocket_kit_items_included:
      name: Articole incluse în kitul de rachete cu aer și apă
      description: Componente cheie incluse în setul de rachete (lansator, pompă,
        aripioare, piese de rezervă).
    air_water_rocket_launch_method:
      name: Metoda de lansare a rachetelor cu aer și apă
      description: Cum este presurizată/lansată racheta (interacțiunea cu utilizatorul
        și stilul echipamentului).
    airbag_position:
      name: Poziția airbagului
      description: Specifică poziția/zona de reținere prevăzută pe care o suportă
        componenta airbagului.
    aircraft_ads_b_capability:
      name: Capacitatea ADS B a aeronavei
      description: Specifică dacă aeronava este echipată pentru conformitatea cu ADS-B
        Out.
    aircraft_airframe_material:
      name: Materialul fuselajului aeronavei
      description: Materialele principale utilizate în construcția fuselajului aeronavei.
    aircraft_cabin_configuration:
      name: Configurația cabinei aeronavei
      description: Specifică aspectul cabinei aeronavei (de exemplu, grup de conferință,
        divan, cabină cu patru zone).
    aircraft_documentation_included:
      name: Documentație a aeronavei inclusă
      description: Listează documentele furnizate împreună cu piesa (de exemplu, 8130-3).
    aircraft_galley_configuration:
      name: Configurație bucătăriei aeronavei
      description: Prezența și tipul de facilități de bucătărie/catering din cabină.
    aircraft_installation_location:
      name: Locație de instalare în aeronavă
      description: Unde în aeronavă este instalată sau utilizată piesa sau accesoriul.
    aircraft_internet_connection:
      name: Conexiune la internet a aeronavei
      description: Indică prezența/tipul de conectivitate la internet în cabină.
    aircraft_landing_gear_type:
      name: Tipul trenului de aterizare al aeronavei
      description: Specifică configurația trenului de aterizare al girocopterului.
    aircraft_lavatory_configuration:
      name: Configurația toaletei aeronavei
      description: Tipul de configurație pentru toaleta de la bord.
    aircraft_maintenance_program_enrollment:
      name: Înscrierea aeronavei în programul de întreținere
      description: Indică dacă aeronava este înscrisă într-un program de întreținere
        pentru motor și/sau fuselajul aeronavei și, dacă da, ce tip de acoperire se
        aplică (motor, fuselaj sau ambele).
    aircraft_operational_certification:
      name: Certificarea operațională a aeronavei
      description: Specifică baza de certificare reglementară sau operațională în
        baza căreia este operată aeronava (în funcție de jurisdicție, de exemplu,
        FAA Partea 91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Certificarea echipamentului de protecție al aeronavei
      description: Specifică standardul aeronautic/de reglementare sau industrial
        pe care echipamentul de protecție este certificat să îl îndeplinească.
    aircraft_system_application:
      name: Aplicare în sistemul aeronavei
      description: Identifică sistemul sau zona aeronavei căreia îi aparține piesa/accesoriul
        (informație folosită pentru răsfoirea și filtrarea diverselor piese de aeronavă).
    airflow_resistance_level:
      name: Nivelul de rezistență la fluxul de aer
      description: Indică cât de restrictivă este percepută surdina în ceea ce privește
        contrapresiunea/rezistența la aer.
    airship_envelope_material:
      name: Materialul învelișului zepelinului
      description: Materialul principal al învelișului (pielii) zepelinului.
    airsoft_part_type:
      name: Tipul piesei cu aer comprimat
      description: Identifică tipul funcțional de componentă sau accesoriu pentru
        armele cu aer comprimat de exemplu, încărcător, țeavă, mâner).
    airworthiness_approval_basis:
      name: Bază pentru aprobarea privind navigabilitatea
      description: Specifică baza de aprobare/certificare pentru piesă, acolo unde
        este cazul (de exemplu, PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Reglarea volumului alarmei
      description: Indică dacă și cum poate fi ajustată intensitatea alarmei de către
        utilizator.
    alcohol_ink_finish_effect:
      name: Efect de finisaj cu cerneală pe bază de alcool
      description: Descrie efectul vizual/finisajul produs de formula de cerneală
        pe bază de alcool (nu doar culoare), cum ar fi metalic sau sidefat.
    alignment_aid_style:
      name: Stilul de ajutor pentru aliniere
      description: Descrie tipul de ghidaje de aliniere imprimate sau integrate pe
        suprafața saltelei (de exemplu, linie dreaptă, marcaje de distanță).
    alternator_cooling_type:
      name: Tipul de răcire al alternatorului
      description: Descrie modul în care este răcit și ventilat alternatorul.
    alternator_marine_ignition_protection_rating:
      name: Gradul de protecție al alternatorului la aprinderea în mediul marin
      description: Indică dacă alternatorul este protejat la aprindere pentru compartimentele
        motorului marin (de exemplu, conform cu SAE J1171/ISO 8846).
    alternator_mounting_configuration:
      name: Configurația de montare a alternatorului
      description: Specifică configurația de montare fizică utilizată pentru atașarea
        alternatorului la o consolă pentru motor.
    alternator_pulley_type:
      name: Tipul de scripete al alternatorului
      description: Specifică designul scripetelui/ambreiajului de pe alternator (sau
        indică faptul că nu este inclusă niciun scripete).
    alternator_regulator_type:
      name: Tipul regulatorului alternatorului
      description: Indică dacă regulatorul de tensiune este intern sau extern alternatorului
        și dacă este controlat prin OEM (controlat prin computer/PCM).
    alternator_terminal_connection_type:
      name: Tip de conexiune terminal alternator
      description: Stilul de conexiune electrică principală pentru terminalele de
        ieșire ale alternatorului/excitatorului, pentru asigurarea compatibilității
        cablajului.
    altitude_suitability:
      name: Adecvare la altitudine
      description: Indică dacă mingea este fabricată pentru condiții specifice privind
        altitudinea, care afectează viteza și săritura.
    ambulance_stretcher_mount_type:
      name: Tipul de montare pentru targa de ambulanță
      description: Specifică tipul de sistem de încărcare/montare a tărgii acceptat
        de către ambulanță.
    american_football_safety_certification:
      name: Certificare de siguranță pentru fotbalul american
      description: Indică certificările sau standardele de siguranță specifice fotbalului
        american pe care le îndeplinește produsul.
    amplifier_tube_function:
      name: Funcția tubului amplificator
      description: Specifică rolul funcțional al tubului în cadrul unui circuit de
        amplificare a instrumentului (de exemplu, preamplificator vs. putere).
    analog_synthesizer_cv_gate_i_o:
      name: Intrări/ieșiri tensiune de control/poartă pentru sintetizatoarele analogice
      description: Indică tipurile de conexiuni pentru tensiunile de control și pentru
        porți acceptate pentru integrarea cu echipamentele modulare/analogice.
    analog_synthesizer_keybed_configuration:
      name: Configurația claviaturii sintetizatorului analogic
      description: Descrie dacă sintetizatorul include o claviatură încorporată și,
        dacă da, numărul de clape.
    anchor_configuration:
      name: Configurația ancorei
      description: Indică dacă sistemul de suspensie utilizează un singur punct de
        ancorare centralizat sau mai multe puncte de ancorare independente, ceea ce
        influențează varietatea exercițiilor și complexitatea configurării.
    animal_raising_method:
      name: Metoda de creștere a animalelor
      description: Descrie practicile agricole sau de creștere a animalelor utilizate
        pentru animalul sursă.
    animal_species:
      name: Specii de animale
      description: Specifică animalul sau creatura reprezentată de animalul de pluș
        (de exemplu, urs, iepuraș, dinozaur).
    animal_trap_jaw_style:
      name: Stilul fălcii capcanei pentru animale
      description: Configurația fălcilor capcanei, care influențează puterea de prindere
        și bunăstarea animalelor.
    animal_trap_type:
      name: Tipul de capcană pentru animale
      description: Clasifică stilul/designul mecanic al capcanei, permițând cumpărătorilor
        să localizeze rapid metoda exactă de capturare de care are nevoie sau pe care
        o permit reglementările.
    ankle_collar_style:
      name: Stilul gulerului gleznei
      description: Descrie stilul sau construcția gulerului gleznei unui pantof, cum
        ar fi jos, mediu, înalt, guler tip șosetă sau fără șireturi, care influențează
        sprijinul, potrivirea și estetica.
    ankle_guard_protection_level:
      name: Nivel de protecție al protecției pentru glezne
      description: Evaluează nivelul total de protecție la impact oferit de protecția
        pentru glezne.
    ankle_strap_padding_type:
      name: Tip de căptușeală curea pentru glezne
      description: Descrie abordarea pentru materialul de amortizare sau căptușeală
        utilizată în interiorul curelei, care afectează confortul.
    ankle_strap_type:
      name: Tip curea de gleznă
      description: Clasifică construcția sau designul unei curele pentru glezne pentru
        legături de snowboard.
    ant_farm_habitat_medium_type:
      name: Tip de mediu habitat pentru ferme de furnici
      description: Specifică mediul principal de tunelare/observare furnizat sau necesar
        pentru ferma de furnici.
    ant_farm_kit_contents:
      name: Conținut kit pentru ferme de furnici
      description: Identifică componentele incluse în kitul pentru ferme de furnici
        (de exemplu, container habitat, nisip/gel, voucher pentru furnici, instrumente
        de hrănire).
    ant_farm_lighting_type:
      name: Tip de iluminare pentru ferme de furnici
      description: Specifică iluminatul/tipul de iluminare încorporat (dacă există)
        utilizat pentru observare.
    antenna_fit_type:
      name: Tip de potrivire a antenei
      description: Ce factor de formă pentru antenă este conceput să se potrivească
        cu antena sferică.
    anti_caking_agent:
      name: Agent antiaglomerant
      description: Specifică tipul de agent antiaglomerant adăugat pentru a preveni
        aglomerarea, informație care este importantă pentru aspecte care țin de alergii
        și precizia rețetei.
    anti_g_suit_bladder_material:
      name: Materialul camerei de aer pentru costumul anti-G
      description: Materialul utilizat pentru camerele de aer interioare gonflabile
        din interiorul costumului anti-G; listați toate variantele aplicabile dacă
        se folosesc mai multe materiale.
    anti_g_suit_connector_type:
      name: Tip de conector costum anti-G
      description: Specifică stilul/standardul conectorului furtunului de aer/presiune
        utilizat pentru interfațarea cu aeronava sau cu regulatorul.
    anti_g_suit_inflation_method:
      name: Metoda de umflare a costumului anti-G
      description: Indică modul în care sunt presurizate camerele de aer ale costumului,
        pentru a oferi protecție G.
    anti_g_suit_size_system:
      name: Sistem de dimensiuni pentru costumul anti-G
      description: Standardul de dimensiuni utilizat pentru a specifica mărimea/sistemul
        de potrivire al costumului.
    anti_reverse_type:
      name: Tip anti-marșarier
      description: Specifică tipul de mecanism anti-marșarier furnizat, care influențează
        configurarea cârligelor și derularea.
    anti_theft_feature:
      name: Funcție antifurt
      description: Indică dacă montarea/suportul oferă măsuri antifurt, cum ar fi
        elemente de fixare cu blocare sau un design rezistent la manipulare.
    antique_gun_ignition_system:
      name: Sistem de aprindere pentru arme vechi
      description: Specifică sistemul istoric de aprindere/tragere utilizat de armele
        de foc vechi
    apple_variety:
      name: Soi de mere
      description: Specifică soiul sau varietatea de măr (de exemplu, Gala, Fuji,
        Granny Smith), ajutând clientul să aleagă în funcție de gust, textură și utilizare
        culinară.
    applique_edge_finish:
      name: Finisajul marginii aplicației
      description: Descrie modul de finisare a marginilor, care influențează aspectul
        și rezistența la uzură.
    arbor_type:
      name: Tipul arborelui
      description: Clasifică bobina în funcție de designul arborelui bobinei, care
        influențează viteza de recuperare a firului, capacitatea de susținere și memoria
        firului.
    archery_accessory_type:
      name: Tip de accesoriu tir cu arcul
      description: Specifică tipul de accesoriu destinat instrumentelor pentru tir
        cu arcul, astfel încât cumpărătorul să poată filtra rapid produsele.
    archery_part_type:
      name: Tip de componentă pentru tir cu arcul
      description: Identifică componente hardware specifice sau piesa de schimb vândută
        (de exemplu, coloană, braț, coardă de arc), permițând o filtrare precisă fără
        a extinde arborele de categorii.
    archery_range_accessory_type:
      name: Tip de accesoriu de teren pentru tir cu arcul
      description: Clasifică tipul specific de accesoriu utilizat pe un poligon de
        tir cu arcul, permițând cumpărătorului să filtreze rapid în căutarea articolului
        precis de care are nevoie.
    archery_target_features:
      name: Caracteristici ale țintei de tir cu arcul
      description: Listează caracteristici specializate de performanță sau confort
        care nu sunt acoperite de alte atribute (de exemplu, spumă auto-reparatoare,
        mâner de transport).
    archery_tool_type:
      name: Tip de instrument tir cu arcul
      description: Clasifică tipul specific de instrument sau piesă de echipament
        pentru tirul cu arcul.
    armband_features:
      name: Caracteristici ale banderolei
      description: Enumeră caracteristicile funcționale sau vizuale speciale care
        îmbunătățesc banderola.
    armguard_style:
      name: Stilul apărătorii de braț
      description: Definește stilul de construcție sau factorul de formă al apărătorii
        de braț, oferind informații precum acoperirea designului și aspect tradițional
        sau modern.
    armor_protection_type:
      name: Tip de protecție al armurii
      description: Tipul de protecție oferit de sistemul de blindaj al vehiculului.
    armrest_adjustability:
      name: Reglarea cotierei
      description: Definește reglabilitatea dimensională și configurația cotierelor
        scaunului (de exemplu, fixe, 2D, 3D, rabatabile).
    armrest_type:
      name: Tipul cotierei
      description: Descrie prezența și reglabilitatea cotierelor pe scaun (de exemplu,
        fără cotiere, fixe, reglabile, detașabile).
    arrow_bolt_point_type:
      name: Tip vârf săgeată/proiectil
      description: Definește stilul punctului sau al vârfului instalat pe o săgeată
        sau pe un proiectil
    arrow_component_type:
      name: Tip de componentă a săgeții
      description: Clasifică piesa sau accesoriul specific pentru o săgeată (inserție,
        înfășurătoare, bucșă, lipici etc.), astfel încât clientul să poată filtra
        articolele fără a fi nevoie de zeci de subcategorii suplimentare.
    arrow_containment_level:
      name: Nivel de izolare a săgeții
      description: Descrie dacă suportul conține complet săgeata, conține parțial
        săgeata sau nu o conține deloc.
    arrow_fletching_orientation:
      name: Orientarea aripilor săgeții
      description: Specifică orientarea sau decalajul aripilor (de exemplu, aripă
        stângă, aripă dreaptă, elicoidală) care determină direcția de rotire a săgeții.
    arrow_nock_groove_size:
      name: Dimensiunea canelurii crestăturii săgeții
      description: Specifică clasificarea dimensională a canelurii/gâtului corzii
        crestăturii, stabilind compatibilitatea cu diferite diametre ale corzii arcului.
    arrow_nock_type:
      name: Tipul crestăturii săgeții
      description: Designul/stilul crestăturii săgeții care interacționează cu coarda
        arcului.
    arrow_rest_style:
      name: Stilul suportului pentru săgeți
      description: Specifică stilul/mecanismul funcțional al suportului pentru săgeți
        (de exemplu, elongat, lamă, biscuite). Stilul determină modul în care suportul
        sprijină, conține și eliberează săgeata și este modalitatea principală prin
        care cumpărătorii diferențiază produsele.
    arrow_shaft_compatibility:
      name: Compatibilitatea tijei pentru săgeți
      description: Indică standardul tijei/bucșei săgeții la care se potrivește crestătura
        ușoară (de exemplu, X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Stilul vârfului instrumentului pentru artă/meșteșug
      description: Descrie forma/profilul vârfului de lucru (de exemplu, ascuțit sau
        rotunjit), pentru a indica tipul marcajelor în relief pe care le produce.
    art_ink_lightfastness_rating:
      name: Evaluarea rezistenței la lumină a cernelii artistice
      description: Indică rezistența cernelii la decolorare atunci când este expusă
        la lumină, exprimată de obicei prin evaluări standard.
    art_ink_opacity:
      name: Opacitatea cernelii artistice
      description: Specifică nivelul de acoperire al cernelii după aplicare.
    art_security_rating:
      name: Evaluarea securității ART
      description: Specifică evaluarea cu stele ART olandeză (de la 1 la 5) primită
        de încuietoare.
    artichoke_cut:
      name: Anghinare tăiată
      description: Indică ce parte sau preparat al anghinarei este oferit (de exemplu,
        anghinare întreagă, inimă, spate), astfel încât clientul să înțeleagă randamentul
        și aplicațiile culinare preconizate.
    artichoke_variety:
      name: Soi de anghinare
      description: Specifică soiul sau varietatea botanică de anghinare pentru a-i
        ajuta pe cumpărători să distingă între dimensiuni, culori, arome și utilizări
        culinare.
    articulation_features:
      name: Caracteristici de articulare
      description: Indică dacă modelul de dinozaur are părți mobile (maxilă, membre,
        coadă poziționabile) și pozabilitatea generală.
    artificial_bait_form:
      name: Formă de momeală artificială
      description: Indică forma fizică sau stilul de prezentare al momelii sau nadei
        pentru pescuit.
    asa_mounting_type:
      name: Tip de montare ASA
      description: Indică stilul de interfață sau standardul de montare al adaptorului
        pentru sursa de aer (ASA) utilizat de sistemul de avansare (de exemplu, coadă
        de rândunică, șină, montare directă).
    ascender_descender_type:
      name: Tipul de ascendent/descendent
      description: Clasifică stilul de urcare, fie pe pantă ascendentă, fie pe pantă
        descendentă, pentru o filtrare mai precisă.
    aspiration_type:
      name: Tip de aspirare
      description: Indică modul în care motorul este aspirat/amplificat.
    assembly_state:
      name: Starea asamblării
      description: Indică dacă dulapul este gata de asamblare, preasamblat sau sub
        o altă formă.
    assistance_mechanism:
      name: Mecanism de asistență
      description: Specifică orice sistem încorporat de asistență sau de rezistență
        pe care îl oferă turnul de putere pentru tracțiuni, flotări sau alte exerciții.
    atemoya_cultivar:
      name: Soiul Atemoya
      description: Specifică soiul/varietatea denumită a fructului de atemoya, permițând
        cumpărătorului să aleagă fructe cu caracteristicile preferate în ceea ce privește
        aroma, dimensiunile sau semințele.
    athletic_cup_size:
      name: Dimensiunea cupei atletice
      description: Indică dimensiunea desemnată de producător a cupei de protecție
        pentru a asigura o potrivire corectă pentru atlet.
    attachment_position:
      name: Poziție de prindere
      description: Specifică locul în care este proiectată să se atașeze geanta pe
        șa sau pe călăreț.
    attractant_scent_profile:
      name: Profil de parfum atractiv
      description: Descrie mirosul sau aroma specifică folosită pentru a atrage animalele
        sălbatice sau pentru a masca mirosul uman.
    atv_utv_intended_use:
      name: Utilizarea preconizată a ATV-ului/UTV-ului
      description: Utilizarea/stilul principal prevăzut pentru ATV/UTV.
    audio_channel_configuration:
      name: Configurația canalului audio
      description: Numărul de canale audio distincte pe care le acceptă egalizatorul/DSP
        (de exemplu, stereo pe 2 canale, față/spate pe 4 canale, 6 canale).
    audio_inputs:
      name: Intrări audio
      description: Specifică tipurile de conexiuni de intrare audio disponibile pentru
        eșantionare/înregistrare (de exemplu, mufă jack 1/4 în linie, XLR, 3,5 mm,
        preamplificator de microfon, phono).
    audio_output:
      name: Ieșire audio
      description: Indică dacă jucăria oferă sunet și cum este redat sunetul.
    audio_outputs:
      name: Ieșiri audio
      description: Specifică conexiunile de ieșire audio disponibile, inclusiv ieșirile
        principale și orice ieșire atribuibilă/auxiliară.
    audio_playback_source:
      name: Sursă de redare audio
      description: Surse media primare din care setul de karaoke poate reda muzică.
    autograph_authentication:
      name: Autentificare autografă
      description: Indică starea/tipul de autentificare pentru un autograf de pe cartonaș.
    autograph_format:
      name: Formatul autografului
      description: Descrie dacă semnătura este un autograf original semnat de mână,
        un facsimil ștampilat/imprimat sau o inscripție/adăugare.
    autogyro_cockpit_enclosure:
      name: Carcasa cabinei girocopterului
      description: Specifică dacă este deschisă sau închisă cabina.
    available_firing_modes:
      name: Moduri de declanșare disponibile
      description: Listează modurile de declanșare selectabile pe care markerul le
        acceptă în mod implicit.
    avocado_variety:
      name: Soi de avocado
      description: Specifică soiul sau varietatea de avocado, ajutând cumpărătorul
        să distingă între diferențele de gust, textură, dimensiune și conținut de
        ulei.
    award_customization_included:
      name: Personalizare certificat inclusă
      description: Indică ce personalizare/customizare este inclusă la achiziția certificatului.
    award_material:
      name: Material certificat
      description: Identifică materialele principale ale articolului certificat (trofeu,
        placă, medalie, ac, panglică).
    award_mounting_display_type:
      name: Tip de montare/afișare a certificatului
      description: Specifică modul în care certificatul este destinat afișării sau
        montării (pe perete, pe birou, purtabil).
    award_plaque_plate_material:
      name: Materialul etichetei pentru plăcuța certificatului
      description: Specifică materialul din care este confecționată eticheta/gravura
        atașate plăcuței (diferit de materialul de suport).
    award_ribbon_attachment_type:
      name: Tipul de atașare a panglicii certificatului
      description: Specifică modul în care poate fi atașată sau purtată panglica.
    award_ribbon_imprint_method:
      name: Metodă de imprimare pentru panglica certificatului
      description: Specifică modul în care textul/graficele sunt aplicate pe panglică.
    award_ribbon_material:
      name: Materialul panglicii certificatului
      description: Materialul principal al țesăturii panglicii (de exemplu, satin,
        poliester).
    award_ribbon_placement_title:
      name: Poziționarea/titlul panglicii certificatului
      description: Poziționarea sau titlul standard de pe panglică (de exemplu, locul
        1, participant).
    axle_compatibility:
      name: Compatibilitatea axelor
      description: Indică standardul de axă la care se potrivește roata, asigurând
        compatibilitatea cu cadrul și furca bicicletei.
    back_beam_type:
      name: Tipul cadrului spate
      description: Tipul/reglabilitatea cadrului spate (de exemplu, simplu sau reglabil
        pe înălțime).
    back_design:
      name: Designul spatelui
      description: Specifică construcțiile notabile ale spatelui la articolele de
        îmbrăcăminte care influențează stilul și asistența.
    back_panel_type:
      name: Tipul panoului spate
      description: Specifică stilul sau materialul panoului spate al dulapului, care
        influențează vizibilitatea afișajului și potrivirea decorului.
    back_sides_material:
      name: Material pentru spate și laturi
      description: Specifică materialul folosit pentru spatele și laturile corpului
        chitarei clasice.
    backing_type:
      name: Tip de căptușeală
      description: Descrie stilul de suport/atașare al piesei stras vândute (pentru
        produse autoadezive).
    backup_camera_mounting_location:
      name: Locație de montare pentru camera de rezervă
      description: Indică locația de instalare prevăzută pe vehicul pentru camera
        de rezervă.
    backup_camera_video_interface:
      name: Interfață video pentru camera de rezervă
      description: Specifică ieșirea/interfața/conectorul video utilizat de camera
        de rezervă pentru conectarea la un monitor, DVR sau unitate principală (de
        exemplu, RCA compozit, LVDS OEM, IP prin Ethernet).
    badminton_set_components_included:
      name: Componente incluse în setul de badminton
      description: Listează articolele individuale furnizate într-un set de badminton.
    bag_attachment_method:
      name: Metodă de prindere a genții
      description: Indică metoda principală utilizată pentru atașarea sacului/suportului
        de hidratare la alte echipamente (de exemplu, chingă MOLLE, buclă pentru curea,
        carabină).
    bag_case_carrying_style:
      name: Stil de purtare pentru geantă/carcasă
      description: Specifică factorul de formă principal general de transport pentru
        carcasă/cutie de transport (cum este construit pentru transport).
    bag_cover_material:
      name: Materialul husei genții
      description: Specifică materialul capacului husei (capacul exterior), care influențează
        durabilitatea, aderența și aspectul.
    bag_embellishment:
      name: Ornamente pentru geantă
      description: Descrie elementele decorative proeminente aplicate pe exteriorul
        genții, cum ar fi ciucuri, ținte sau matlasare.
    bag_fill_medium:
      name: Umplere medie a sacului
      description: Identifică substanța utilizată pentru umplerea sau presurizarea
        sacului (de exemplu, aer, apă, nisip).
    bag_material:
      name: Materialul sacului
      description: Materialul airbagului/camerei de aer.
    bag_padding_level:
      name: Nivel de căptușire sac
      description: Specifică gradul sau stilul de căptușire pentru sac sau husă.
    bag_size_descriptor:
      name: Descriptor pentru mărimea sacului
      description: Clasa de dimensiuni marketing pentru geanta bucket (de exemplu,
        mini, mare) care completează dimensiunile exacte.
    bagel_size:
      name: Dimensiunea covrigului
      description: Specifică dimensiunea generală a covrigului, de ex. mini, subțire,
        standard, mare, extra mare sau jumbo.
    bagpipe_accessories_included:
      name: Accesorii pentru cimpoi incluse
      description: Enumeră componentele/accesoriile principale incluse în cimpoaie
        (dincolo de țevile principale), de exemplu, carcasă, cântec de exersare, husă,
        corzi, controlul umidității.
    bagpipes_playing_mode:
      name: Mod de cântat la cimpoi
      description: Cum este alimentat instrumentul cu aer în timpul cântatului.
    bait_compatibility:
      name: Compatibilitatea momelii
      description: Listează tipurile de momeli cu care este conceput să lucreze accesoriul
        pentru pelete, ajutându-i pe pescari să se asigure că instrumentul ales se
        potrivește cu momeala preferată.
    bait_species:
      name: Specii de momeală
      description: Identifică organismul principal oferit ca momeală, ajutându-i pe
        pescari să asigure legalitatea și eficacitatea speciilor țintă.
    baking_chip_form:
      name: Formă chipsuri pentru copt
      description: Descrie dimensiunile fizice sau forma chipsurilor pentru copt,
        care influențează comportamentul la topire și aspectul rețetei.
    balance_board_style:
      name: Stil placă pentru echilibru
      description: Clasifică plăcile pentru echilibru după mecanismul sau stilul lor
        de construcție, pentru a indica modul în care se mișcă placa și provocarea
        de antrenament oferită.
    balance_cushion_accessories_included:
      name: Accesorii incluse pernițe pentru echilibru
      description: Listează toate accesoriile ambalate împreună cu pernița, permițând
        cumpărătorului să compare valoarea pachetului.
    balance_type:
      name: Tipul de echilibru
      description: Indică starea/gradul de echilibru al arborelui de transmisie așa
        cum este vândut (de exemplu, echilibrat din fabrică, echilibrat pentru viteză
        mare, neechilibrat).
    ball_bladder_material:
      name: Materialul camerei mingii
      description: Identifică materialul folosit pentru camera interioară a mingii
        de handbal, care afectează reținerea aerului, săritura și durabilitatea generală.
    ball_certification:
      name: Certificarea mingii
      description: Indică certificările oficiale de performanță sau aprobare obținute
        de minge.
    ball_construction:
      name: Construcția mingii
      description: Indică metoda de fabricație utilizată pentru îmbinarea panourilor
        mingii, care influențează durabilitatea, atingerea, absorbția apei și prețul.
    ball_core_construction:
      name: Construcția miezului mingii
      description: Detaliază construcția internă a mingii, care influențează ricoșeul
        și senzația la atingere.
    ball_core_type:
      name: Tip de miez al mingii
      description: Indică construcția internă a mingii, care influențează săritura
        și distribuția greutății.
    ball_cup_game_included_pieces:
      name: Piese incluse pentru jocuri cu mingi și pahare
      description: Identifică componentele incluse în pachetul produsului pentru un
        joc cu mingi și pahare.
    ball_drilling_state:
      name: Stare de găurire a mingii
      description: Indică dacă în minge sunt perforate orificii pentru degete și,
        dacă da, în ce măsură.
    ball_holder_type:
      name: Tipul suportului pentru minge
      description: Identifică stilul structural sau factorul de formă al suportului
        pentru minge.
    ball_pit_ball_surface_finish:
      name: Finisajul suprafeței bilei pentru groapa cu bile
      description: Descrie finisajul tactil/vizual al suprafeței mingii, care influențează
        aderența, senzația în joc și curățarea.
    ball_pit_safety_features:
      name: Caracteristici de siguranță pentru groapa cu bile
      description: Caracteristici de proiectare legate de siguranță care sunt relevante
        pentru gropile cu bile.
    ball_pump_accessory_type:
      name: Tipul accesoriului pompei pentru mingi
      description: Definește tipul specific de accesoriu al pompei pentru mingi, astfel
        încât comerciantul să poată eticheta manometre, furtunuri, lubrifianți și
        alte accesorii într-o singură categorie părinte.
    ball_return_mechanism:
      name: Mecanism de returnare a bilei
      description: Specifică stilul de returnare a mingii încorporat în saltea, dacă
        există.
    ball_return_type:
      name: Tipul de retur al mingii
      description: Tipul de sistem de returnare/introducere în buzunar care colectează
        mingile în timpul jocului.
    ball_speed_rating:
      name: Clasificarea vitezei mingii
      description: Categorie de viteză desemnată de producător care indică cât de
        repede se joacă mingea în condiții standard.
    ball_surface_texture:
      name: Textura suprafeței mingii
      description: Descrie textura exterioară sau modelul de striații al mingilor,
        care poate influența aderența și estetica.
    ball_surface_type:
      name: Tipul suprafeței mingii
      description: Descrie finisajul exterior sau amortizarea mingii pentru a indica
        senzația la impact și aderența.
    ballonet_configuration:
      name: Configurația balonetului
      description: Tipul/configurația sistemului balonet utilizat pentru gestionarea
        garniturii și a presiunii (pentru zepeline nerigide/semirigide).
    balloon_closure_valve_type:
      name: Tip de închidere/supapă pentru balon
      description: Identifică modul în care este etanșat balonul după umflare (de
        exemplu, legare, supapă autoetanșă).
    balloon_kit_finish:
      name: Finisaj kit balon
      description: Descrie suprafața/finisajul vizual al baloanelor incluse în kit.
    balloon_kit_material:
      name: Material kit de baloane
      description: Specifică materialul principal al baloanelor incluse în kit.
    banana_variety:
      name: Soi de banane
      description: Specifică soiul sau tipul de banană oferit.
    banjo_head_type:
      name: Tipul capului banjoului
      description: Tipul/materialul capului banjoului, care influențează luminozitatea,
        volumul și senzația la atingere.
    banjo_neck_material:
      name: Materialul gâtului de banjo
      description: Materialul din care este realizat gâtul, care influențează senzația
        la atingere, stabilitatea și tonul.
    banjo_pickup_configuration:
      name: Configurația pickupului banjoului
      description: Dacă banjoul include un pickup intern și ce tehnologie generală
        folosește pickupul.
    banjo_rim_material:
      name: Materialul marginii banjoului
      description: Materialul marginii/carcasei (corpul circular), care influențează
        puternic tonul și greutatea.
    banjo_tone_ring_type:
      name: Tipul de sonerie pentru tonul banjoului
      description: Specifică familia de design/materiale pentru inelul de ton pentru
        banjo, care influențează timbrul și volumul.
    banjo_tuning_machine_type:
      name: Tip de mașină de acordat pentru banjo
      description: Tipul de cheițe de acordaj folosite la banjo.
    banknote_authentication_grading:
      name: Autentificarea/clasificarea bancnotelor
      description: Serviciul extern (dacă există) care a autentificat/clasificat bancnota.
    banknote_grade:
      name: Clasificarea bancnotei
      description: Grad standardizat al bancnotelor pe o scală de colectare a bancnotelor.
    banknote_holder_type:
      name: Tipul suportului bancnotei
      description: Indică contextul stării fizică a bancnotei (de exemplu, suport
        liber sau suport gradat).
    banknote_material:
      name: Materialul bancnotei
      description: Substratul/materialul principal al bancnotei.
    banknote_security_features:
      name: Caracteristici de securitate ale bancnotelor
      description: Caracteristici deosebite de securitate/design care sunt prezente
        pe bancnotă.
    banknote_serial_number_type:
      name: Tipul numărului de serie al bancnotei
      description: Indică dacă numărul de serie este prezent și/sau are caracteristici
        speciale de colecționare (nu numărul efectiv).
    banner_display_location:
      name: Locația pentru afișarea bannerelor
      description: Specifică contextul de poziționare dorit pentru banner (de exemplu,
        hol, perete, fundal masă).
    banner_hanging_hardware_type:
      name: Tipul de hardware folosit pentru agățarea bannerului
      description: Specifică principalele componente hardware folosite pentru agățare/atașare
        care sunt încorporate în sau incluse cu bannerul (de exemplu, capse, manșon
        pentru stâlp, frânghie).
    banner_message_type:
      name: Tipul mesajului banner
      description: Indică dacă textul/mesajul bannerului este preimprimat (fix) sau
        gol/personalizabil.
    banner_shape:
      name: Forma bannerului
      description: Specifică forma/aspectul general al bannerului pentru fanii sportului.
    banquette_configuration:
      name: Configurația banchetei
      description: Forma sau orientarea generală a banchetei.
    bar_coating:
      name: Acoperirea barei
      description: Identifică învelișul exterior comestibil aplicat pe baton, dacă
        există.
    bar_pad_style:
      name: Stilul suportului de bar
      description: Stilul de design al suportului de bar și construcția spatelui.
    bar_texture:
      name: Textură batonului
      description: Descrie textura sau gustul general al batonului.
    barb_type:
      name: Tipul țepului
      description: Indică dacă cârligul are un țep și care este stilul acestuia.
    barbell_finish:
      name: Finisajul halterei
      description: Detaliază tratamentul/acoperirea protectoare sau estetică a suprafeței
        aplicate barei și/sau manșoanelor, care influențează rezistența la coroziune,
        senzația la prindere și prețul.
    barbell_knurling_pattern:
      name: Model de zimți al halterei
      description: Detaliază stilul și agresivitatea secțiunii de prindere zimțate
        a unei haltere, inclusiv marcajele specifice pentru powerlifting sau ridicarea
        greutăților.
    barista_suitability:
      name: Adecvat pentru barista
      description: Descrie dacă produsul este formulat pentru prepararea și spumarea
        cafelei.
    barre_rail_configuration:
      name: Configurația șinei barei de balet
      description: Indică numărul de bare orizontale furnizate împreună cu bara de
        balet.
    barrel_or_cask_type:
      name: Tip de putină sau butoi
      description: Specifică tipul de putină sau butoi folosit pentru învechirea sau
        finisarea tequilei (de exemplu, stejar american, ex-bourbon, butoi de sherry).
    barrel_profile:
      name: Profilul săgeții
      description: Descrie forma generală sau echilibrul corpului pentru săgeți de
        darts.
    barrel_thread_standard:
      name: Standardul filetului săgeții
      description: Identifică filetul săgeții utilizat pe marker pentru compatibilitate
        cu săgețile aftermarket.
    base_anchoring_method:
      name: Metoda de ancorare a bazei
      description: Identifică modul în care baza este fixată pe sol, indicând adecvarea
        sa pentru diferite suprafețe și condiții de joacă.
    base_ballast_method:
      name: Metodă folosită pentru balastul bazei
      description: Indică modul în care (dacă există) baza instrumentului este echilibrată
        pentru stabilitate (de exemplu, umplere cu apă, umplere cu nisip).
    base_configuration:
      name: Configurația bazei
      description: Indică configurația structurală a bazei panoului.
    base_fill_material:
      name: Material de umplere a bazei
      description: Specifică substanța folosită pentru a umple sau a echilibra baza
        manechinului de baschet, ceea ce influențează stabilitatea și efortul necesar
        pentru instalare.
    base_ingredient:
      name: Ingredient bază
      description: Identifică ingredientul agricol principal din care se distilează
        shochu sau soju.
    base_oil_type:
      name: Tipul de ulei de bază
      description: Specifică formula uleiului de bază din lichidul de transmisie (de
        exemplu, complet sintetic vs. amestec sintetic vs. convențional).
    base_storage_type:
      name: Tipul de depozitare al bazei
      description: Specifică dacă baza oferă spațiu de stocare integrat și care este
        mecanismul utilizat.
    baseball_glove_type:
      name: Tipul mănușii de baseball
      description: Clasifică mănușa sau mănușa de baseball în funcție de poziția jucătorului
        sau de scopul funcțional.
    baseball_softball_league_certification:
      name: Certificare pentru liga de baseball și softball
      description: Specifică standardele organismului sau ligii de reglementare pe
        care le îndeplinește produsul.
    baseball_softball_usage_role:
      name: Rol de utilizare pentru baseball/softball
      description: Specifică rolul pe teren sau tipul de participant pentru care este
        destinată apărătoarea de picior (de exemplu, prinzător, batter, arbitru, jucător
        de câmp).
    baseball_toy_set_components_included:
      name: Componente din setul de jucării de baseball incluse
      description: Specifică ce componente de joc de baseball sunt incluse în produs
        (de exemplu, bâtă, minge, teu, baze).
    baseplate_construction:
      name: Construcția plăcii de bază
      description: Indică metoda de fabricație a plăcii de bază a camionului, care
        influențează rezistența și greutatea.
    basketball_hoop_accessory_type:
      name: Tip de accesoriu pentru inelul de baschet
      description: Clasifică tipul specific de componentă sau accesoriu pentru inelul
        de baschet, pentru filtrare și comparare.
    basketball_padding_location:
      name: Locații căptușeală baschet
      description: Identifică partea sistemului de baschet pe care căptușeala este
        destinată să o acopere.
    basketball_rim_type:
      name: Tipul de bordură pentru coșul de baschet
      description: Specifică stilul structural sau de performanță al bordurii coșului
        de baschet, astfel încât cumpărătorii să poată alege designul care se potrivește
        nivelului lor de joc și nevoilor de instalare.
    basketball_toy_features:
      name: Caracteristicile jucăriei de baschet
      description: Evidențiază caracteristicile funcționale/de joc notabile ale jucăriilor
        de baschet, dincolo de dimensiunile de bază.
    bass_clarinet_body_material:
      name: Materialul corpului clarinetului bas
      description: Materialul principal al corpului clarinetului bas (excluzând clapele,
        stâlpii și alte componente hardware metalice).
    bass_clarinet_lowest_written_note:
      name: Cea mai joasă notă scrisă pentru clarinetul bas
      description: Cea mai joasă notă pe care o poate reda clarinetul bas (adesea
        descrisă de instrumentiști ca Mi♭ jos, Re jos, Do jos sau extensie Si jos).
    bass_drum_beater_head_shape:
      name: Forma capului bețelor de tobă bas
      description: Descrie forma geometrică/profilul suprafeței de lovire a capului
        bețelor de tobă bas (fața care intră în contact cu capul rezonant al tobei).
    bass_drum_beater_shaft_material:
      name: Materialul tijei bețelor de tobă bas
      description: Specifică materialul axului/tijei bețelor de tobă (nu al capului
        rezonant).
    bass_drum_head_built_in_muffling:
      name: Amortizor încorporat pentru capul de tobă bas
      description: Tip de amortizare/anulare integrat inclusă în designul capului.
    bass_drum_head_configuration:
      name: Configurația capului tobei bas
      description: Descrie ce capete sunt incluse/instalate pe toba bas la achiziție.
    bass_drum_head_surface_finish:
      name: Finisajul suprafeței capului tobei bas
      description: Textura/finisajul suprafeței capului tobei bas.
    bass_drum_head_type:
      name: Tipul capului tobei mari
      description: Tipul de design sau construcția specială a capului tobei bas.
    bass_drum_hoop_material:
      name: Materialul cercului tobei bas
      description: Identifică materialul din care sunt fabricate inelele (contra-inelele)
        tobei bas, care influențează durabilitatea, estetica și greutatea.
    bass_drum_mounting_style:
      name: Stil de montare a tobei bas
      description: Indică modul în care este proiectată să fie sprijinită/utilizată
        toba bas (pinteni pentru set, suport/leagăn, transportor de marș etc.).
    bass_harmonica_comb_material:
      name: Material pieptene pentru muzicuță bas
      description: Materialul pieptenelui/corpului (blocul camerei de aer) al muzicuței
        bas.
    bass_harmonica_mouthpiece_style:
      name: Stilul muștiucului muzicuței bas
      description: Indică configurația muștiucului muzicuței bas.
    bass_harmonica_reed_material:
      name: Materialul anciei muzicuței bas
      description: Materialul din care sunt confecționate anciile folosite la muzicuța
        bas.
    bass_harmonica_tuning_system:
      name: Sistem de acordare a muzicuței bas
      description: Specifică sistemul de acordare/temperamentul utilizat pentru muzicuța
        bas.
    bass_recorder_bocal_type:
      name: Tipul de muștiuc pentru fluierul bas
      description: Specifică tipul de muștiuc/canal de aer utilizat pentru a ajunge
        la muștiucul unui flaut bas.
    bass_recorder_included_accessories:
      name: Accesorii incluse pentru flautul bas
      description: Listează accesoriile incluse în ambalajul flautului bas.
    bass_recorder_keywork_material:
      name: Materialul clapelor flautului bas
      description: Specifică materialul clapelor flautului (dacă există).
    bass_trombone_slide_material:
      name: Material glisiere trombon bas
      description: Specifică materialul principal/placa tuburilor glisante externe
        (și/sau a ansamblului glisant) pentru trombonul bas.
    bass_trombone_valve_wrap_style:
      name: Stil de înfășurare a supapei trombonului bas
      description: Specifică designul înfășurării supapei utilizat pe instrument.
    bass_ukulele_string_type:
      name: Tip corzi ukulele bas
      description: Indică tipul general de corzi folosit de ukulele bas.
    bassinet_cradle_accessory_features:
      name: Caracteristici accesorii pentru coșulețe și leagăne
      description: Evidențiază caracteristici funcționale sau calități notabile ale
        accesoriilor pentru pătuț și leagăn (de exemplu, impermeabil, certificat organic,
        hipoalergenic).
    bassoon_bell_material:
      name: Materialul clopotului fagot
      description: Specifică materialul clopotului fagotului.
    bassoon_bocal_system:
      name: Sistemul muștiucului fagotului
      description: Varianta/tipul de muștiuc utilizat pentru diferite sisteme de fagot
        și scenarii de utilizare.
    bassoon_case_shell_type:
      name: Tipul caroseriei carcasei pentru fagot
      description: Indică structura de protecție a carcasei (moale, dură sau hibridă).
    bassoon_keywork_material:
      name: Materialul mecanismului de clape al fagotului
      description: Materialul și/sau placa utilizată pentru clapele fagotului (clape
        și componente hardware mecanice).
    bassoon_model_level:
      name: Nivelul modelului de fagot
      description: Indică nivelul dorit al interpretului la fagot.
    bassoon_performance_level:
      name: Nivel de performanță fagot
      description: Indică nivelul vizat al interpretului pentru modelul de fagot.
    bassoon_reed_scrape_style:
      name: Stilul de răzuire al anciei fagotului
      description: Indică stilul de răzuire/profil al anciei fagotului.
    bassoon_reed_thread_color:
      name: Culoarea firului anciei fagotului
      description: Culoarea firului de legătură folosit în ancie.
    bassoon_reed_type:
      name: Tip de ancie de fagot
      description: Specifică subtipul de ancie de fagot căruia i se potrivește produsul
        (unde este cazul).
    bassoon_system:
      name: Sistem de fagot
      description: Identifică sistemul de clape/tradiția de design pentru fagot utilizată
        de instrument.
    bat_construction:
      name: Construcția crosei/bâtei
      description: Indică numărul de piese distincte sau secțiuni lipite din care
        este alcătuit corpul bâtei (de exemplu, dintr-o singură piesă, din două piese,
        hibrid), ceea ce influențează flexibilitatea, controlul vibrațiilor și performanța
        generală.
    bat_handle_size_compatibility:
      name: Compatibilitate cu dimensiunea mânerului bâtei
      description: Indică dimensiunile mânerului bâtei de cricket pentru care este
        proiectată să se potrivească sistemul de prindere.
    bath_book_interactive_features:
      name: Funcții interactive ale cărții pentru baie
      description: Funcții de joacă/învățare încorporate în cartea pentru baie.
    bath_bubble_machine_features:
      name: Caracteristicile aparatului cu bule pentru baie
      description: Caracteristici funcționale cheie ale aparatului cu bule pentru
        baie, dincolo de simpla emitere a bulelor.
    bath_crayon_features:
      name: Caracteristicile creioanelor pentru baie
      description: Caracteristici funcționale/de siguranță cheie ale creioanelor pentru
        baie.
    bath_squirter_spray_pattern:
      name: Model de pulverizare al jucăriei pentru baie
      description: Descrie modul în care pulverizatorul de baie eliberează apa (modelul
        la ieșire) atunci când este apăsat sau activat.
    bath_toy_molded_drain_design:
      name: Design turnat de scurgere pentru jucăria de baie
      description: Indică dacă jucăria este concepută să se scurgă/să se usuce pentru
        a reduce retenția de apă.
    bath_toy_water_play_function:
      name: Funcția de joc cu apă pentru jucăriile de baie
      description: Identifică mecanismul principal de interacțiune/joacă cu apa al
        jucăriei.
    baton_size_standard:
      name: Standardul dimensiunilor batonului
      description: Clasificarea pe dimensiuni de competiție pentru baronul de ștafetă
        (junior sau senior).
    battery_case_certification_standard:
      name: Certificare/standard pentru carcasa bateriei
      description: Enumeră certificările relevante de transport/siguranță sau standardele
        de testare pe care le respectă carcasa pentru transportul/depozitarea bateriei.
    battery_case_interior_padding_material:
      name: Material de căptușire internă pentru carcasa bateriei
      description: Specifică materialul principal de amortizare/căptușeală utilizat
        în interiorul carcasei (dacă este cazul).
    battery_configuration:
      name: Configurația bateriei
      description: Indică aspectul fizic al pachetului/forma (factorul de formă),
        astfel încât utilizatorii să poată potrivi bateria cu spațiul limitat al compartimentului
        din anumite replici de arme cu aer comprimat.
    battery_group_size:
      name: Dimensiunile grupului de baterii
      description: Dimensiuni standardizate ale carcasei bateriei (de exemplu, BCI
        Group 24F, H6) utilizate pentru potrivirea pe mai multe vehicule.
    battery_polarity:
      name: Polaritatea bateriei
      description: Specifică polaritatea/orientarea terminalului (poziția plus pentru
        terminal), care reprezintă o condiție esențială de montare pentru multe baterii
        auto și pentru sporturi cu motor.
    battery_standards_supported:
      name: Standarde de baterii acceptate
      description: Specifică standardele de clasificare a bateriei pe care testerul
        le acceptă la testarea performanței sau a stării de funcționare.
    battery_voltage_class:
      name: Clasa de tensiune a bateriei
      description: Clasa comună a sistemului de tensiune pentru pachetul de baterii
        EV, utilizată pentru filtrare rapidă (de exemplu, sisteme de 400 V vs. 800
        V).
    batting_cage_components_included:
      name: Componente incluse pentru cușca de bătut
      description: Enumeră piesele individuale furnizate împreună cu produsul, astfel
        încât cumpărătorii să poată confirma dacă sunt incluse un sistem complet sau
        anumite piese de schimb.
    batting_helmet_accessories_included:
      name: Accesorii incluse pentru casca batterului
      description: Listează pachetul de accesorii de protecție sau cosmetice care
        însoțește casca batterului.
    batting_stuffing_form_factor:
      name: Factor de formă pentru vată și umplutură
      description: Identifică dacă produsul este vândut sub formă de umplutură vrac,
        foi, rulouri, bucăți pretăiate sau forme modelate.
    batting_stuffing_loft_level:
      name: Nivel de rezistență pentru vată și umplutură
      description: Indică rezistența/nivelul de rezistență pentru vată și umplutură
        (umflarea/înălțimea relativă), utilizată de obicei pentru selectarea matlasărilor
        și căptușelilor.
    batting_stuffing_thermal_insulation_level:
      name: Nivelul de izolație termică al vatei și umpluturii
      description: Performanța relativă la căldură/izolație a vatei utilizate în pilote,
        jachete și pături.
    batting_tee_base_design:
      name: Designul de bază al teului de batting
      description: Descrie stilul sau construcția bazei teului, care influențează
        stabilitatea și tipurile de suprafețe de joc pentru care se potrivește.
    battle_top_arena_stadium_compatibility:
      name: Compatibilitate cu arenă/stadion de top pentru luptă
      description: Indică sistemul de arenă/stadion cu care este proiectat produsul
        să fie utilizat (în special pentru seturi sau forme speciale de arenă).
    battle_top_items_included:
      name: Articol incluse cu masa de joc
      description: Specifică ce articole ale mesei de joc sunt incluse în pachet (de
        exemplu, masă, lansator, stadion/arenă, cablu de lansare, piese de schimb).
    battle_top_performance_type:
      name: Tipul de performanță pentru masa de joc
      description: Descrie stilul general de performanță al mesei de joc, reflectând
        de obicei modul în care se comportă în arenă (agresiv vs. axat pe rezistență
        etc.).
    bayan_included_accessories:
      name: Accesorii incluse cu bayanul
      description: Accesorii incluse cu bayanul (în cutie).
    bayan_tuning_system_type:
      name: Tipul sistemului de acordare a bayanului
      description: Cum este tensionat/acordat bayanul (stilul de construcție), influențând
        portabilitatea și ușurința acordării.
    bb_gun_action_type:
      name: Tip de acționare pentru pistolul BB
      description: Indică mecanismul de încărcare sau de ciclare mecanică al pistolului
        BB (de exemplu, acționare cu pârghie, pompă, basculare).
    bb_gun_caliber:
      name: Calibru pistol BB
      description: Definește diametrul bilelor cu care pistolul este proiectat să
        tragă, asigurând compatibilitatea muniției.
    bb_gun_part_type:
      name: Tipul piesei pentru pistolul BB
      description: Clasifică componenta sau accesoriul specific conceput pentru pistoalele
        BB, permițând cumpărătorilor să localizeze rapid piesa de schimb, de upgrade
        sau de completare potrivită (de exemplu, țeavă, garnitură de piston, încărcător
        rapid).
    beach_ball_features:
      name: Caracteristici ale mingii de plajă
      description: Caracteristici funcționale notabile specifice mingilor de plajă.
    beach_bucket_features:
      name: Caracteristicile găleții de plajă
      description: Caracteristici funcționale ale găleții de plajă care afectează
        utilizarea, durabilitatea și confortul.
    beach_sand_toy_items_included:
      name: Articole jucării pentru plajă și nisip incluse
      description: Componente suplimentare de joacă pentru plajă/nisip incluse împreună
        cu găleata (dacă este vândută ca set).
    bead_breaker_type:
      name: Tipul de separator de anvelope
      description: Tipul/designul mecanismului separatorului de anvelope.
    bead_hole_style:
      name: Stilul orificiului din mărgele
      description: Specifică stilul sau configurația găurii/orificiului din mărgele,
        care influențează modul în care aceasta se așează pe cârlig sau pe fir.
    bead_type:
      name: Tip de mărgele
      description: Tipurile principale de mărgele necesare modelului.
    bead_type_patch_embellishment:
      name: Tip de mărgele (ornament petic)
      description: Tipul principal de mărgele utilizate pe suprafața peticului.
    beaded_accessory_project_type:
      name: Tip de proiect pentru accesorii cu mărgele
      description: Din ce accesoriu este realizat modelul.
    beading_needle_flexibility:
      name: Flexibilitatea acului de mărgele
      description: Flexibilitate relativă a tijei acului pentru accesul la căi înguste
        de broderie cu mărgele.
    beading_pattern_bead_size:
      name: Dimensiunea mărgelei pentru modelul de broderie
      description: Dimensiunile recomandate pentru mărgele specificate de model (de
        obicei, dimensiunea mărgelei de rocadă, de exemplu, 11/0, 8/0).
    beading_pattern_chart_format:
      name: Formatul diagramei de modele de mărgele
      description: Cum este reprezentat vizual modelul (de exemplu, grafic vs. fotografii
        pas cu pas).
    beading_pattern_stitch_technique:
      name: Cusătură/tehnică pentru modelul de mărgele
      description: Cusătura sau tehnica principală de broderie utilizată în model.
    beading_technique_stitch:
      name: Tehnică/cusătură de broderie
      description: Identifică tehnica sau cusătura principală de broderie utilizată
        în model (de exemplu, cusătură peyote, cusătură cărămidă).
    beading_thread_fiber_type:
      name: Tip de fibră pentru firul de broderie
      description: Specifică subtipul de fibră/material al firului de broderie (mai
        specific decât materialul generic), care este relevant pentru performanță.
    beading_thread_size:
      name: Dimensiunea firului pentru mărgele
      description: Indică eticheta de dimensiune a producătorului/industriei utilizată
        pentru firul de broderie (specifică mărcii/liniei), cum ar fi dimensiunea
        D sau 00.
    beading_thread_use_case:
      name: Scenariu de utilizare pentru firul de broderie
      description: Identifică utilizarea principală recomandată pentru firul de broderie,
        ajutând cumpărătorii să aleagă produsul potrivit pentru proiectele lor.
    beading_wire_coating_material:
      name: Material de acoperire pentru firul de broderie
      description: Specifică materialul de acoperire exterioară de pe firul de broderie
        (dacă este prezent), care afectează senzația la atingere, durabilitatea și
        rezistența la îndoire.
    beading_wire_strand_count:
      name: Numărul de fire din firul de broderie
      description: Indică numărul de fire din firul de broderie multifilar (de exemplu,
        7 fire, 19 fire, 49 de fire), care influențează flexibilitatea și drapajul.
    beadlock_type:
      name: Tipul de blocare a mărgelei
      description: Indică dacă roata are mărgeaua blocată și în ce stil (îi ajută
        pe cei care achiziționează vehicule off-road/UTV).
    beam_material:
      name: Materialul grinzii
      description: Materialul principal al mărgelei/tijei (adesea diferit de capete/atașamente).
    beam_pattern:
      name: Modelul de fascicul
      description: Model de distribuție a fluxului luminos utilizat pentru iluminarea
        la volan/off-road.
    bean_bag_fabric_material:
      name: Materialul stofei săculețului
      description: Identifică materialul exterior folosit pentru săculeții furnizați
        împreună cu setul.
    bean_paste_variety:
      name: Varietate de pastă de fasole
      description: Clasifică tipul specific de pastă de fasole în funcție de stilul
        de producție sau de ingredientul principal.
    bean_preparation:
      name: Prepararea fasolei
      description: Indică modul în care sunt preparate sau procesate boabele de fasole
        înainte de promovare (de exemplu, păstăi întregi, decojite, tocate, încolțite).
    bean_variety:
      name: Soiul de fasole
      description: Specifică varietatea botanică sau de piață a boabelor de fasole
        (de exemplu, fasole verde, edamame, fasole întreagă lungă).
    beanie_style:
      name: Stilul căciulii
      description: Specifică designul general, construcția sau silueta căciulii, astfel
        încât cumpărătorii să poată alege rapid dintre variantele comune.
    bearing_clearance:
      name: Degajare rulment
      description: Indică clasa de degajare radială internă a rulmentului (jocul intern);
        clasa C0 este denumită și CN sau degajare normală.
    bearing_construction_type:
      name: Tipul de construcție al rulmentului
      description: Identifică designul sau stilul de construcție al rulmentului utilizat
        în butuc (de exemplu, cartuș, bilă liberă).
    bearing_edge_type:
      name: Tipul marginii portante
      description: Tipul/profilul muchiei care poartă coca, care influențează atacul
        și susținerea.
    bearing_lubrication:
      name: Lubrifierea rulmentului
      description: Indică tipul de lubrifiant aplicat rulmentului în timpul fabricației,
        cum ar fi vaselină sau ulei.
    bearing_material:
      name: Materialul rulmentului
      description: Identifică materialul de construcție al rulmentului (de exemplu,
        oțel, hibrid ceramic), ajutând cicliștii să aleagă între opțiunile de durabilitate,
        cost și performanță.
    bearing_rating:
      name: Clasificarea rulmentului
      description: Specifică toleranța la rulment sau clasa de performanță utilizată
        la patine (de exemplu, ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Codul garniturii de etanșare a rulmentului
      description: Indică stilul de etanșare utilizat de rulment, care afectează durabilitatea
        și rezistența la rulare.
    bearing_seal_type:
      name: Tipul garniturii de etanșare a rulmentului
      description: Specifică designul etanșării sau al ecranării care protejează componentele
        interne ale rulmentului de contaminanți și afectează rezistența la înaintare
        (de exemplu, 2RS, ZZ, LLU, deschis).
    bearing_shield_type:
      name: Tipul protecției rulmentului
      description: Stil de ecranare sau etanșare care protejează componentele interne
        ale rulmentului.
    bearing_size_code:
      name: Codul dimensiunii rulmentului
      description: Denumirea standardizată a rulmenților (de exemplu, 608, 688) care
        combină diametrul interior, diametrul exterior și lățimea.
    bearing_type:
      name: Tipul rulmentului
      description: Specifică stilul de construcție al rulmenților utilizați în căști.
    beater_head_material:
      name: Materialul capului ciocan
      description: Specifică materialul de contact/membrană al unui băț de tobă bas
        de exemplu, fetru, lemn, cauciuc).
    beaters_included:
      name: Bețe incluse
      description: Specifică câte bețe sunt incluse/instalate cu pedala de tobă (de
        exemplu, bețe simple sau duble) sau dacă nu este inclus niciun băț.
    bed_base_type:
      name: Tipul bazei patului
      description: Definește stilul structural al bazei patului sau divanului (de
        exemplu, platformă, cu șipci, reglabilă).
    bed_storage_type:
      name: Tipul de depozitare al patului
      description: Definește mecanismul de depozitare integrat al cadrului patului.
    bedroom_furniture_items_included:
      name: Articole de mobilier pentru dormitor incluse
      description: Specifică piesele de mobilier individuale incluse în setul de dormitor
        (de exemplu, pat, comodă, noptiere), permițând cumpărătorilor să vadă rapid
        ce este inclus, fără a citi descrieri lungi.
    bedroom_vanity_items_included:
      name: Articole de toaletă pentru dormitor incluse
      description: Listează articole individuale furnizate împreună cu un set de toaletă
        pentru dormitor, astfel încât clienții să știe exact ce este livrat (de exemplu,
        oglindă, taburet, kit de iluminat).
    beer_based_cocktail_variety:
      name: Varietate de cocktailuri pe bază de bere
      description: Clasifică cocktailurile pe bază de bere după varietatea lor specifică,
        de exemplu, Radler, Shandy, Michelada.
    beet_variety:
      name: Soiul de sfeclă
      description: Specifică soiul sau varietatea de sfeclă roșie, ajutând cumpărătorii
        să identifice aroma, culoarea și utilizările culinare (de exemplu, roșie,
        aurie, Chioggia).
    bell_actuation_mechanism:
      name: Soiul de sfeclă
      description: Specifică acțiunea necesară din partea utilizatorului pentru ca
        soneria să sune, ajutând cumpărătorii să aleagă ergonomia preferată.
    bell_guard_coverage_area:
      name: Zona de acoperire a dispozitivului de protecție pentru clopote
      description: Indică ce porțiune din clopot este conceput să protejeze dispozitivul
        de protecție pentru clopote.
    bell_material:
      name: Materialul clopotului
      description: Materialul componentei clopotului (dacă este specificat separat
        de materialul general al instrumentului).
    bellhousing_bolt_pattern:
      name: Modelul șuruburilor carcasei clopotului
      description: Specifică standardul pentru modelul de șuruburi ale carcasei clopotului/motorului
        sau familia de modele utilizată de carcasa de transmisie.
    bellows_material:
      name: Materialul burdufului
      description: Materialul corpului/învelișului burdufului (dacă este inclus).
    bellows_orientation:
      name: Orientarea burdufului
      description: Indică configurația burdufului utilizată pentru a alimenta cu aer
        țevile.
    belly_panel_style:
      name: Stilul panoului de burtă
      description: Descrie construcția centurii sau a panoului abdominal care se potrivește
        unei talii variabile.
    belt_buckle_type:
      name: Tipul cataramei curelei
      description: Descrie mecanismul sau designul specific al cataramei utilizat
        la curea.
    beret_style:
      name: Stilul beretei
      description: Identifică designul specific de beretă sau varianta culturală.
    berry_species:
      name: Specii de fructe de pădure
      description: Indică specia de fructe de pădure conținută în produs, astfel încât
        cumpărătorii să poată filtra rapid pentru a găsi fructul dorit.
    beta_casein_variant:
      name: Variantă de beta-cazeină
      description: Specifică ce variantă de proteină beta-cazeină (de exemplu, A2)
        este prezentă în lapte, pentru consumatorii cu probleme de digestibilitate.
    beverage_sweetness_level:
      name: Nivelul de îndulcire al băuturii
      description: Clasifică băutura după gradul de dulceață sau de zahăr adăugat.
    bezel_graduation_units:
      name: Unități de gradare a ramei
      description: Specifică marcajele unitare de pe luneta rotativă (grade, mils
        sau scală duală).
    bicycle_brake_set_components_included:
      name: Componente incluse în setul de frâne pentru bicicletă
      description: Listează piesele individuale livrate în kit , astfel încât cumpărătorii
        să știe exact ce este inclus și să poată compara diferite configurații de
        pachete.
    bicycle_cage_mounting_position:
      name: Poziția de montare a cuștii pentru biciclete
      description: Specifică unde anume pe bicicletă este proiectată să fie instalată
        cușca.
    bicycle_computer_mount_placement:
      name: Poziționarea suportului pentru computer pe bicicletă
      description: Identifică locul de pe bicicletă unde se instalează suportul pentru
        computer, cum ar fi în față, pe ghidon, sau pe capacul superior al pipei.
    bicycle_folding_mechanism:
      name: Mecanism de pliere a bicicletei
      description: Specifică sistemul mecanic de pliere utilizat pe cadrul bicicletei
        (de exemplu, pliere pe jumătate, pliere pe verticală).
    bicycle_frame_design:
      name: Designul cadrului bicicletei
      description: Specifică stilul general al unui cadru de bicicletă, influențând
        accesibilitatea, capacitatea de încărcare și spațiul de depozitare.
    bicycle_frame_style:
      name: Stilul cadrului bicicletei
      description: Descrie stilul structural al cadrului bicicletei (step-through,
        lowrider, chopper stretch etc.) care influențează postura și estetica ciclistului.
    bicycle_handlebar_type:
      name: Tipul ghidonului pentru bicicletă
      description: Identifică stilul sau geometria specifică a ghidonului, ajutându-i
        pe cicliști să selecteze ghidonul potrivit poziției și disciplinei lor de
        ciclism.
    bicycle_headset_configuration:
      name: Configurația căștilor pentru bicicletă
      description: Indică stilul structural sau standardul căștilor pentru bicicletă
        în funcție de aranjamentul cupei (de exemplu, cupă externă, ZeroStack, integrată,
        filară).
    bicycle_hub_type:
      name: Tipul butucului de bicicletă
      description: Descrie mecanismul butucului furnizat împreună cu roata, influențând
        compatibilitatea transmisiei și stilul de condus.
    bicycle_lock_security_certification:
      name: Certificarea de securitate a antifurtului pentru biciclete
      description: Certificare externă independentă care validează performanța antifurtului
        (de exemplu, Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Tipul de pedală pentru bicicletă
      description: Specifică stilul general de operare sau designul pedalei, cum ar
        fi platformă, variantă fără clipsuri sau hibride, ajutându-i pe cicliști să
        aleagă interfața potrivită pentru stilul lor de mers.
    bicycle_propulsion_type:
      name: Tipul de propulsie al bicicletei
      description: Specifică modul în care este propulsată bicicleta, cum ar fi pedalarea
        manuală, asistența electrică sau motor cu combustie internă.
    bicycle_pump_type:
      name: Tipul pompei de bicicletă
      description: Identifică stilul structural al pompei, ajutându-i pe cumpărători
        să aleagă designul cel mai potrivit nevoilor lor de utilizare, depozitare
        sau urgență.
    bicycle_rack_mounting_type:
      name: Tip de montare pentru suportul de biciclete
      description: Descrie metoda sau locația principală utilizată pentru atașarea
        suportului la bicicletă, ajutându-i pe utilizatori să confirme compatibilitatea
        cu cadrul lor și cu celelalte componente hardware.
    bicycle_suspension_type:
      name: Tipul suspensiei de bicicletă
      description: Identifică prezența și configurația suspensiei de pe bicicletă.
    bicycle_tire_tread_pattern:
      name: Modelul benzii de rulare a anvelopei de bicicletă
      description: Specifică stilul benzii de rulare a anvelopei, influențând tracțiunea
        și rezistența la rulare pe diferite suprafețe.
    bidirectional_charging_capability:
      name: Abilitate de încărcare bidirecțională
      description: Indică dacă EV acceptă moduri de încărcare bidirecțională, cum
        ar fi V2G și/sau V2H.
    bike_rack_mounting_style:
      name: Stilul de montare al suportului pentru biciclete
      description: Cum este susținută/fixată bicicleta de suport.
    bike_rack_tilt_function:
      name: Funcție de înclinare a suportului pentru biciclete
      description: Indică dacă și ce funcție de înclinare există pentru accesul la
        zona de marfă din spate în timp ce suportul este instalat.
    bikini_top_style:
      name: Stilul topului de bikini
      description: Specifică designul sau croiala porțiunii de sus a bikiniului, ajutându-i
        pe cumpărători să găsească croiurile și siluetele preferate.
    billiard_brush_type:
      name: Tip de perie de biliard
      description: Definește stilul specific al instrumentului de curățare a mesei
        de biliard (de exemplu, perie de masă, perie de șină, covoraș de curățare).
    billiard_glove_finger_coverage:
      name: Acoperire deget mănușă de biliard
      description: Identifică degetele care sunt acoperite de designul mănușii, oferind
        o filtrare precisă pentru stilurile de mănuși specifice jocului de biliard.
    billiard_pocket_style:
      name: Stilul coșului de biliard
      description: Specifică stilul structural sau estetic al buzunarului, care influențează
        compatibilitatea și decorul mesei.
    billiard_rack_style:
      name: Stil suport de biliard
      description: Descrie stilul fizic sau mecanismul suportului (de exemplu, cadru
        tradițional, tablă de șablon, pliabil).
    billiard_table_type:
      name: Tipul mesei de biliard
      description: Specifică disciplina sau stilul de utilizare a tacului pentru care
        este concepută masa (de exemplu, biliard, snooker, carambol).
    billiards_discipline:
      name: Disciplina de biliard
      description: Indică varianta specifică a sportului cu tac (tipul de joc) pentru
        care este destinat produsul sau cu care este compatibil.
    binding_compatibility_standard:
      name: Standard de compatibilitate a legăturilor
      description: Identifică interfața legăturilor (norma tălpii) pentru care este
        certificată gheata de schi, asigurând o potrivire sigură și corectă cu legăturile
        de schi.
    binding_inclusion:
      name: Includerea legăturilor
      description: Specifică dacă schiurile sunt vândute plate, cu un sistem integrat
        sau cu legături separate incluse.
    binding_interface:
      name: Interfață de legare
      description: Indică placa de legare sau standardul de interfață cu care sunt
        premontate schiurile sau cu care sunt compatibile, asigurând compatibilitatea
        dintre bocanc și legătură.
    binding_liner_type:
      name: Tipul de căptușeală pentru legătură
      description: Descrie stilul căptușelii interioare utilizate în legături/ghete
        (de exemplu, detașabilă, pentru mers, termoformabilă).
    binding_mounting_system:
      name: Sistem de montare a legăturilor
      description: Identifică interfața utilizată pentru atașarea legăturii la schi
        (suport plat, șină/pistă, placă etc.).
    binding_position:
      name: Poziția legăturii
      description: Indică poziția sau configurația de montare prevăzută pentru legătură
        (de exemplu, cizmă față, cizmă spate, ARTP).
    binding_strap_position:
      name: Poziția curelei de legare
      description: Specifică locul de pe legătură unde trebuie instalată cureaua.
    bingo_components_included:
      name: Componente de bingo incluse
      description: Listează componentele ambalate în setul de bingo, cum ar fi bilele
        de bingo, cartonașele și markerele.
    bingo_number_range:
      name: Intervalul de numere de bingo
      description: Identifică intervalul/varianta de numere de bingo acceptate de
        set.
    bingo_set_features:
      name: Funcțiile setului de bingo
      description: Identifică formatul produsului principal din setul de bingo (fizic/manual
        vs. electronic/interactiv).
    bipod_mounting_interface:
      name: Interfață de montare a suportului cu două picioare
      description: Specifică interfața de atașare utilizată pentru conectarea suportului
        cu două picioare la arma de foc sau la sistemul de șine.
    bit_attachment_type:
      name: Tip de prindere a burghiului
      description: Specifică modul în care se conectează capătul la bielă (de exemplu,
        capete de legătură, capete cu cataramă, capete cu șurub Chicago).
    bit_mouthpiece_design:
      name: Designul zăbalei de mușcare
      description: Identifică stilul structural sau configurația comună pentru zăbală,
        care guvernează distribuția presiunii, distanța palatină și severitatea generală.
    bit_ring_style:
      name: Stil inel de mușcare
      description: Definește stilul obrazului sau inelului care se atașează de căpăstru,
        influențând acțiunea, ghidarea laterală și senzația frâului.
    bladder_material:
      name: Materialul camerei de aer
      description: Identifică materialul folosit pentru camera de aer internă care
        reține aerul.
    blade_attachment_type:
      name: Tipul de fixare al lamei
      description: Identifică dacă patina folosește un mecanism cu clapă (articulat)
        sau un suport fix pentru lamă.
    blade_finish_coating:
      name: Finisaj/acoperire lamă
      description: Tratament de suprafață aplicat lamei pentru estetică sau protecție
        împotriva coroziunii.
    blade_hosel_type:
      name: Tip furtun lamă
      description: Specifică stilul de conexiune al furtunului lamei care se potrivește
        în ax, afectând compatibilitatea (de exemplu, standard sau conic).
    blade_length_type:
      name: Tipul lungimii lamei
      description: Clasifică lungimea lamei aripioarei ca fiind scurtă, medie sau
        lungă, fiecare influențând cadența de lovire și obiectivele de antrenament.
    blade_lie:
      name: Straturile lamei
      description: Specifică numărul de straturi ale lamei crosei de hochei, indicând
        modul în care lama se așează pe gheață în raport cu tija.
    blade_sharpness:
      name: Ascuțimea lamei
      description: Indică dacă lama armei este ascuțită sau tocită pentru antrenament.
    blade_size_category:
      name: Categoria de dimensiuni ale lamei
      description: Cod dimensional internațional standardizat pentru lamele de sabie
        (0–5) utilizat pentru a distinge lamele pentru tineri și adulți.
    blade_size_class:
      name: Clasa dimensională a lamei
      description: Clasifică lama în funcție de convenția de dimensionare a jucătorului,
        corespunzând unor dimensiuni ale axului, cum ar fi Tineret, Junior, Intermediar
        sau Senior.
    blade_size_number:
      name: Numărul dimensiunii lamei
      description: Cod dimensional numeric standard (0–5) definit de regulamentele
        privind scrima, care determină lungimea lamei și eligibilitatea pentru grupa
        de vârstă.
    blaster_mechanism:
      name: Mecanismul blasterului
      description: Definește mecanismul intern de funcționare al armelor cu gel (de
        exemplu, GBB, AEG, arc).
    block_edge_style:
      name: Stilul marginii blocului
      description: Descrie modul în care sunt finisate marginile/colțurile blocurilor
        de lemn, pentru o senzație plăcută la atingere și siguranță.
    blocking_mat_features:
      name: Caracteristicile covorașului de blocare
      description: Caracteristici funcționale specifice covorașelor blocante (depozitare,
        portabilitate, ușurință în utilizare).
    blocking_mat_grid_unit:
      name: Unitate grilă pentru covorașul pentru întindere
      description: Sistemul de unități utilizat pe grila imprimată, care îi ajută
        pe utilizatori să potrivească modele și măsurători.
    blocking_mat_surface_markings:
      name: Marcaje de suprafață pentru covorașul pentru întindere
      description: Tipul de măsurare/marcaje imprimate sau turnate pe suprafața covorașului.
    blocking_wire_coating:
      name: Acoperișul firelor pentru întindere
      description: Tratament de suprafață/acoperire asupra firelor pentru întindere
        care afectează rezistența la rugină, netezimea și riscul de agățare.
    blocking_wire_end_cap_type:
      name: Tipul capacului de capăt al firelor pentru întindere
      description: Specifică tipul de protecție/finisaj utilizat la capetele firelor
        pentru întindere, pentru siguranță și protecția materialului.
    blocking_wire_set_includes:
      name: Setul de fire pentru întindere include
      description: Specifică ce componente sunt incluse în produsul denumit fir pentru
        întindere (de exemplu, T fix, tub de depozitare).
    blocking_wire_usage:
      name: Utilizarea firelor pentru întindere
      description: Scenariul principal de utilizare pentru care este conceput firul
        flexibil pentru întindere.
    bloom_stage:
      name: Etapa de înflorire
      description: Indică cât de deschise sunt florile de margarete la livrare/expediere.
    blower_motor_bearing_type:
      name: Tipul rulmentului motorului suflantei
      description: Specifică designul rulmentului utilizat în motorul suflantei.
    blower_motor_mounting_position:
      name: Poziția de montare a motorului suflantei
      description: Unde este instalat motorul suflantei în modulul HVAC/vehicul (de
        exemplu, față, spate).
    blowpipe_valve_type:
      name: Tipul supapei de suflare
      description: Specifică tipul de supapă de suflare inclus (dacă există).
    bo_staff_style:
      name: Stilul bastonului Bo
      description: Definește stilul structural sau construcția bastonului (de exemplu,
        drept, conic, căptușit cu spumă, pliabil).
    board_game_theme:
      name: Tema jocului de societate
      description: Tema narativă/de configurare a jocului de societate (folosită pentru
        descoperire și navigare).
    board_rail_shape:
      name: Forma șinei plăcii
      description: Specifică conturul șinelor plăcii (de exemplu, moale, tare, 50/50)
        care influențează prinderea și înaintarea pe val.
    board_size_classification:
      name: Clasificarea dimensiunii plăcii
      description: Clasifică placa sau setul pentru cornhole în dimensiuni standardizate
        comune.
    board_type_compatibility:
      name: Compatibilitatea tipului de placă
      description: Specifică tipul de placă pentru care este proiectată lesa.
    boat_construction_type:
      name: Tipul de construcție al ambarcațiunii
      description: Descrie stilul structural sau formatul bărcii cu vâsle (de exemplu,
        gonflabilă, rigidă).
    boat_hook_flotation:
      name: Flotarea cârligului bărcii
      description: Indică dacă cârligul bărcii este proiectat să floteze dacă este
        aruncat în apă.
    boat_ladder_stowage_style:
      name: Stil de depozitare a scărilor pentru bărci
      description: Descrie cum se depozitează scara atunci când nu este utilizată
        (de exemplu, pliabilă, retractabilă, detașabilă).
    boat_trailer_construction_type:
      name: Tipul de construcție al remorcii de ambarcațiuni
      description: Indică dacă remorca acceptă bărci cu paturi supraetajate, role
        sau un sistem hibrid.
    boat_weaving_shuttle_weft_exit_type:
      name: Tip de ieșire a firului din suveica tip barcă pentru țesut
      description: Cum iese firul din suveică în timpul țeserii.
    bobbin_loading_type:
      name: Tipul de încărcare a bobinei
      description: Specifică modul în care bobina este introdusă/încărcată în mașina
        de cusut.
    bobbin_system:
      name: Sistem de bobine
      description: Sistemul/tipul de încărcare a bobinei utilizat de mașina de cusut.
    bobbin_type:
      name: Tipul bobinei
      description: Specifică formatul transportorului de fire pe care suveica este
        proiectată să îl utilizeze (sau pe care îl include), ceea ce determină compatibilitatea
        și utilizarea tipică (de exemplu, suveicile tip barcă folosesc adesea bobine;
        suveicile pânză pentru țesut pot fi deschise pentru benzi).
    bobbin_winder_winding_direction:
      name: Direcția de înfășurare a bobinatorului mosor
      description: Specifică direcția de înfășurare/rotație acceptată de către bobinatorul
        mosor.
    bobble_mechanism:
      name: Mecanism bobble
      description: Specifică stilul mecanismului bobble, care influențează mișcarea
        și durabilitatea.
    bocal_material:
      name: Materialul bocalului
      description: Specifică materialul pentru muștiucurile incluse.
    bodhr_n_head_material:
      name: Material pentru capul Bodhrán
      description: Materialul capului de redare (al membranei), care influențează
        puternic tonul și cerințele de întreținere.
    bodhr_n_tuning_system_type:
      name: Tipul sistemului de acordare al bodhránului
      description: Stilul mecanismului de acordare încorporat folosit pentru a regla
        tensiunea capului (dacă aceasta poate fi reglată).
    body_armor_coverage_area:
      name: Zona de acoperire pentru armura de corp
      description: Indică zonele corpului pe care le protejează produsul.
    body_armor_intended_use:
      name: Utilizarea preconizată a armurii de corp
      description: Specifică scenariul principal de condus sau de utilizare pentru
        care este proiectată armura de corp pentru ATV/UTV.
    body_cord_connector_style:
      name: Stil conector cablu corp
      description: Descrie configurația conectorului pentru capetele cablului (de
        exemplu, numărul de fișe sau stilul pentru baionetă) care determină compatibilitatea
        cu armele și cutiile de punctaj.
    body_panel_finish_state:
      name: Starea finisajului panoului caroseriei
      description: Descrie starea de pregătire/finisare a suprafeței aripii spate
        așa cum este ea comercializată, pentru vopsire/instalare.
    body_shape:
      name: Forma corpului
      description: Specifică forma/stilul general al corpului chitarei electrice.
    bodysuit_bottom_coverage:
      name: Acoperirea părții inferioare a costumului
      description: Definește croiala și acoperirea porțiunii inferioare a consumului,
        care influențează confortul și compatibilitatea ținutei.
    boilie_shape:
      name: Formă boilie
      description: Identifică forma boilie-urilor produse de masa pentru rulat, permițând
        pescarilor să aleagă între diferite profileuri de momeală.
    boilie_stop_buoyancy:
      name: Flotabilitate opritor boilie
      description: Specifică dacă opritorul de boilie este proiectat să plutească,
        să se scufunde sau să rămână neutru în flotabilitate, influențând prezentarea
        momelii în coloana de apă.
    bok_choy_variety:
      name: Soiul de bok choy
      description: Specifică soiul, numele comercial sau soiul de bok choy (de ex.,
        Baby, Shanghai, Nai Bai, Tatsoi, Purple Lady), permițând cumpărătorilor să
        selecteze aroma, dimensiunea și aspectul dorit.
    bolt_drive_style:
      name: Stil de acționare șurub
      description: Specifică stilul de acționare al șuruburilor de montare a skateboard-ului,
        distingând între tipurile comune de cap/driver, cum ar fi Allen sau Phillips.
    bone_content:
      name: Conținut osos
      description: Specifică dacă carnea conține oase.
    bongo_center_block_material:
      name: Materialul blocului central al bongoului
      description: Materialul blocului central care leagă cele două cartușe de bongo
        (dacă este cazul).
    bongo_shell_material:
      name: Materialul cartușului de bongo
      description: Materialul cartușelor de bongo (corpuri de tobă), excluzând capetele
        și componentele hardware.
    bongo_tuning_system:
      name: Sistem de acordare a bongoului
      description: Cum sunt acordate bongourile sau cum sunt ele construite pentru
        acordare (de exemplu, acordare tradițională cu ureche vs. acordare cu frânghie),
        influențând întreținerea și autenticitatea.
    boning_type:
      name: Tipul de balene
      description: Identifică sistemul de asistență structurală din interiorul lenjeriei
        modelatoare, combinând atât materialul, cât și stilul/forma de osatură utilizată,
        care influențează direct nivelul de asistență, flexibilitatea și durabilitatea.
    boot_liner_type:
      name: Tipul căptușelii pentru încălțăminte
      description: Descrie construcția sau capacitatea de personalizare a căptușelii
        interioare din interiorul ghetei de snowboard (de exemplu, termoformabilă,
        detașabilă).
    boot_sole_compatibility:
      name: Compatibilitatea tălpii cizmei
      description: Listează normele de talpă pentru ghete sau sistemele de interfață
        pe care le acceptă legătura.
    boot_support_level:
      name: Nivel de asistență pentru încălțăminte
      description: Descrie rigiditatea/asistența generală pentru gleznă sau pentru
        încălțăminte oferită de patină.
    boot_width_code:
      name: Codul lățimii cizmei
      description: Desemnarea producătorului pentru lățime, bazată pe litere și utilizată
        în special în dimensionarea patinelor artistice (de exemplu, AAA, AA, B, C,
        D).
    booth_configuration:
      name: Configurația cabinei
      description: Identifică configurația generală a locurilor din cabină (de exemplu,
        pe o latură, pe colț, modular).
    bootie_toe_design:
      name: Design pentru vârful botinei
      description: Identifică stilul de construcție a degetelor de la botinele de
        surf și încălțămintea acvatică.
    border_type:
      name: Tip de bordură
      description: Finisajul marginii/stilul bordurii etichetei brodate (afectează
        aspectul, rezistența la dezlipire și calitatea percepută).
    bore_cleaner_format:
      name: Formatul curățitorului de alezaj
      description: Indică factorul de formă fizică al produsului de curățare a alezajului
        (instrument vs. consumabil).
    bore_cleaner_safe_for_finish:
      name: Curățitor de alezaj sigur pentru finisare
      description: Indică finisajele comune ale instrumentelor de alamă cu care poate
        fi utilizat în siguranță curățitorul de alezaj.
    bottle_cage_loading_direction:
      name: Direcția de încărcare a suportului pentru sticle
      description: Descrie direcția din care o sticlă este introdusă sau scoasă din
        suport.
    bottle_neck_finish_closure_size:
      name: Finisaj gât sticlă/dimensiuni închidere
      description: Dimensiunile standard ale deschiderii/finisajului sticlei pentru
        a asigura compatibilitatea cu capace, dopuri și alte închizători (de exemplu,
        finisaj tip coroană de 26 mm).
    bottle_style:
      name: Stilul sticlei
      description: Factori de formă obișnuiți pentru sticlele de îmbuteliere utilizate
        în fabricarea acasă a berii și în vinificație.
    bottom_bracket_interface:
      name: Interfața butucului de pedalier
      description: Identifică standardul axului/butucului de pedalier pentru care
        este proiectată manivela, asigurând compatibilitatea cu cadrul și cu butucul
        de pedalier.
    bottom_bracket_standard:
      name: Standard pentru butucul de pedalier
      description: Carcasa/interfața pentru butucul de pedalier care este acceptată
        de cadru, determinând compatibilitatea angrenajului.
    bottom_type_suitability:
      name: Adecvare pentru tipuri de fund de mare
      description: Specifică direcția fundului mării în care ancora este proiectată
        să se fixeze cel mai bine.
    bounce_level:
      name: Nivel de săritură
      description: Indică cât de mult ricoșează mingea atunci când este scăpată sau
        aruncată, ajutându-i pe utilizatori să aleagă mingea corectă pentru exerciții
        precum aruncări la perete sau aruncări de sus.
    bouncy_ball_surface_finish:
      name: Finisajul suprafeței mingii elastice
      description: Specifică finisajul tactil și/sau vizual al suprafeței unei mingi
        elastice (de exemplu, netedă, cu țepi, sclipitoare).
    boundary_marker_type:
      name: Tipul marcajului de delimitare
      description: Definește forma fizică a marcajului sau a produsului de marcare
        a limitei terenului sau a terenului (de exemplu, con, bandă, vopsea, șablon,
        mașină).
    bouquet_size_tier:
      name: Nivel de dimensiuni buchet
      description: Nivel dimensional standard pentru buchet/ciorchine, independent
        de numărul de tulpini (util în cazul tulpinilor mixte).
    bow_and_yo_yo_edge_finish:
      name: Finisaj pe margine arc și yo-yo
      description: Descrie finisajul marginii/ornamentelor folosit la arc/yo-yo (în
        special pentru arcușurile pe bază de panglică).
    bow_case_shell_type:
      name: Tipul caroseriei cutiei pentru arcuș
      description: Descrie construcția structurală a exteriorului unei carcase pentru
        arc (de exemplu, cutie tare vs. cutie moale).
    bow_compatibility:
      name: Compatibilitatea arcușului
      description: Specifică tipul de arc pentru care este destinat sau evaluat capul
        de săgeată.
    bow_hair_color:
      name: Culoare păr arcuș
      description: Identifică culoarea/aspectul părului folosit pe un arcuș pentru
        instrumente de orchestră (de exemplu, alb/decolorat, alb natural, negru).
    bow_stick_material:
      name: Materialul baghetei arcușului
      description: Identifică materialul folosit pentru bățul arcului (axul principal),
        care influențează puternic greutatea, senzația la atingere și prețul.
    bow_type:
      name: Tipul arcului
      description: Specifică designul structural al arcului pentru tineri (de exemplu,
        compound, recurve, longbow), care influențează puternic stilul de tragere,
        accesoriile necesare și programele de antrenament.
    bow_winding_material:
      name: Material de înfășurare a arcului
      description: Specifică materialul utilizat pentru înfășurarea arcului, influențând
        prinderea și echilibrul.
    bow_yo_yo_embellishment_style:
      name: Stil de decorare pentru arc/yo-yo
      description: Identifică stilul de construcție al ornamentului (arc sau construcție
        yo-yo din material textil).
    bowling_ball_core_type:
      name: Tipul miezului mingii de bowling
      description: Identifică designul miezului intern sau simetria bilei de bowling,
        care influențează mișcarea bilei și potențialul de cârlig.
    bowling_ball_coverstock_type:
      name: Tip de capac pentru bila de bowling
      description: Specifică materialul sau tehnologia de acoperire exterioară a bilei
        de bowling, care dictează tracțiunea și potențialul de cârlig.
    bowling_set_style:
      name: Stilul setului de bowling
      description: Definește stilul general sau scenariul de utilizare a setului de
        bowling.
    box_lid_type:
      name: Tipul capacului cutiei
      description: Tipul mecanismului de capac/deschidere folosit de cutia cadou sau
        tablă.
    box_spring_profile:
      name: Profil suport pentru saltele
      description: Clasifică înălțimea totală a suportului pentru saltele în categorii
        de profil prietenoase cu cumpărătorul (de exemplu, profil redus, standard,
        profil înalt), astfel încât clienții să poată filtra rapid, fără a cunoaște
        măsurile exacte.
    box_spring_requirement:
      name: Cerință suport pentru saltele
      description: Indică dacă este nevoie de un suport pentru saltele suplimentar
        sau sau o fundație suplimentară pentru saltea.
    boxing_ring_style:
      name: Stilul ringului de box
      description: Clasifică stilul general de construcție sau scenariul de utilizare
        preconizat al inelului (de exemplu, competiție vs. antrenament, supraînălțat
        vs. podea).
    bra_length_type:
      name: Tipul lungimii sutienului
      description: Definește clasificarea lungimii sutienelor în funcție de acoperirea
        verticală, cum ar fi standard, lung, midi sau scurt.
    bra_padding_type:
      name: Tip căptușeală sutien
      description: Descrie nivelul sau prezența căptușelii în cupe.
    braces_compatibility:
      name: Compatibilitatea aparatului dentar
      description: Specifică dacă gutiera poate fi purtată cu aparate dentare ortodontice
        și în ce măsură.
    brake_band_form:
      name: Forma benzii de frână
      description: Indică dacă banda de frână este furnizată ca o buclă continuă (fără
        sfârșit) sau ca o bucată tăiată care trebuie fixată.
    brake_band_material_type:
      name: Tipul materialului benzii de frână
      description: Specifică materialul funcțional al benzii de frână (de exemplu,
        cablu de bumbac vs. fir de nailon vs. oțel pentru arcuri), care influențează
        durabilitatea, aderența, întinderea și zgomotul.
    brake_band_style:
      name: Stilul benzii de frână
      description: Specifică sistemul/stilul de tensionare a benzii de frână utilizat
        pe o roată de filat pentru a aplica tensiunea pe semitort/bobină.
    brake_bleeding_method:
      name: Metoda de aerisire a frânelor
      description: Abordarea pentru aerisire acceptată de kit.
    brake_booster_assist_type:
      name: Tip de asistență servofrână
      description: Indică mecanismul de asistență utilizat de servofrână.
    brake_booster_diaphragm_configuration:
      name: Configurația diafragmei servofrânei
      description: Indică numărul/tipul de diafragme utilizate în servofrână.
    brake_caliper_bleeder_screw_position:
      name: Poziția șurubului de aerisire a etrierului de frână
      description: Specifică poziția șurubului de aerisire pe etrier atunci când este
        instalat (folosit pentru a verifica dacă aerisirea este orientată în cel mai
        înalt punct, pentru o aerisire corectă).
    brake_caliper_finish:
      name: Finisaj etrier de frână
      description: Specifică finisajul de suprafață sau stratul protector aplicat
        corpului etrierului de frână (de exemplu, vopsea, placare, anodizare).
    brake_caliper_included_hardware:
      name: Componente hardware incluse în etrierul de frână
      description: Specifică ce este inclus în ansamblul etrierului.
    brake_caliper_mount_type:
      name: Tipul de montare a etrierului de frână
      description: Stilul interfeței de montare utilizat pentru atașarea etrierului
        la articulație/suport.
    brake_caliper_paint_base_chemistry:
      name: Chimia de bază a vopselei etrierului de frână
      description: Sistemul de vopsea/rășină sau familia de substanțe chimice utilizate.
    brake_caliper_paint_kit_contents:
      name: Conținutul kitului de vopsea pentru etrierul de frână
      description: Indică ce este inclus în pachet, în afară de vopseaua în sine.
    brake_circuit_type:
      name: Tipul circuitului de frânare
      description: Configurația circuitului hidraulic acceptat de cilindrul principal.
    brake_clutch_fluid_base_chemistry:
      name: Chimia de bază a lichidului de frână/ambreiaj
      description: Baza chimică principală a fluidului hidraulic de frână/ambreiaj,
        care afectează compatibilitatea și miscibilitatea.
    brake_clutch_fluid_dot_specification:
      name: Specificație DOT pentru lichidul de frână/ambreiaj
      description: Clasificarea performanței DOT pentru fluidele hidraulice de frână/ambreiaj
        (de exemplu, DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Finisaj/acoperire tambur de frână
      description: Finisaj de suprafață sau strat protector aplicat tamburului de
        frână (de exemplu, strat electrostatic, vopsit, zincat).
    brake_drum_type:
      name: Tipul tamburului de frână
      description: Tipul de design pentru tamburul de frână (cu sau fără butuc/rulment
        integrat).
    brake_fluid_base:
      name: Baza lichidului de frână
      description: Specifică formula lichidului de frână hidraulic necesar sau inclus.
    brake_fluid_base_chemistry:
      name: Chimia de bază a lichidului de frână
      description: Definește baza chimică a lichidului de frână, care determină compatibilitatea
        și regulile de amestecare.
    brake_fluid_dot_specification:
      name: Specificație DOT pentru lichidul de frână
      description: Indică clasificarea/specificația DOT pentru lichidul de frână (de
        exemplu, DOT 3, DOT 4) pentru produsele de tip lichid de frână.
    brake_fluid_standards_compliance:
      name: Respectarea standardelor pentru lichide de frână
      description: Standardele industriale pe care lichidul de frână afirmă că le
        îndeplinește (dincolo de clasificarea DOT).
    brake_fluid_type:
      name: Tipul de lichid de frână
      description: Specifică lichidul de frână necesar pentru etrierele de frână hidraulice
        pentru biciclete.
    brake_hose_end_fitting_type:
      name: Tipul de racord al capătului furtunului de frână
      description: Stilul de conectare la fiecare capăt al furtunului de frână (de
        exemplu, banjo, evazat, racord mamă/tată), utilizat pentru a asigura compatibilitatea
        cu etrierele/conductele.
    brake_lever_pull_type:
      name: Tipul manetei de frână cu tragere
      description: Definește raportul/mecanica de tracțiune a cablului pentru care
        este proiectată maneta, asigurând compatibilitatea cu etriere de frână specifice
        (de exemplu, frâne pe jantă cu tracțiune scurtă versus frâne V-brake cu tracțiune
        lungă).
    brake_light_switch_actuation_type:
      name: Tipul de acționare al întrerupătorului luminii de frână
      description: Identifică evenimentul fizic care acționează comutatorul (pedala/pistonul
        vs. presiunea hidraulică etc.).
    brake_light_switch_connector_type:
      name: Tipul conectorului întrerupătorului luminii de frână
      description: Specifică stilul/formatul conectorului electric utilizat de comutatorul
        luminii de frână pentru conectarea la cablajul vehiculului.
    brake_light_switch_contact_type:
      name: Tipul contactului întrerupătorului luminii de frână
      description: Configurația/comportamentul contactului electric al comutatorului
        luminii de frână (de exemplu, normal deschis/închis, comutator sau multicircuit).
    brake_light_switch_mounting_style:
      name: Stil de montare a comutatorului luminii de frână
      description: Modul în care este montat/instalat comutatorul luminii de frână
        pe vehicul sau pe sistemul de frânare (de exemplu, înfiletare, cu clemă, montare
        pe suport, șurub banjo).
    brake_master_cylinder_mounting_type:
      name: Tipul de montare pentru cilindrul principal de frână
      description: Cum se montează cilindrul principal de frână pe vehicul/servofrână
        (model șurub/stil flanșă).
    brake_master_cylinder_reservoir_type:
      name: Tipul rezervorului pompei centrale de frână
      description: Tipul/configurația rezervorului de lichid de frână furnizat sau
        necesar pentru pompa principală de frână.
    brake_mount_type:
      name: Tipul de montare al frânei
      description: Identifică interfața de frânare încorporată în furcă, astfel încât
        cicliștii să poată confirma compatibilitatea sistemului de frânare.
    brake_mounting_flange_bolt_pattern:
      name: Modelul șuruburilor flanșei de montare a frânei
      description: Specifică modelul de orificii/șuruburi ale flanșei de montare utilizat
        pentru a atașa placa de susținere a frânei sau suportul etrierului la axa
        remorcii (de exemplu, 4 șuruburi).
    brake_pad_backing_plate_material:
      name: Materialul plăcuței de susținere a plăcuțelor de frână
      description: Specifică materialul plăcuței de susținere a plăcuțelor de frână,
        care influențează disiparea căldurii și greutatea.
    brake_pad_compatible_rotor_type:
      name: Tipul de rotor compatibil cu plăcuțele de frână
      description: Specifică tipul de suprafață a rotorului/discului pentru care este
        proiectată plăcuța.
    brake_pad_compound:
      name: Materialul plăcuțelor de frână
      description: Identifică formula materialului de fricțiune al unei plăcuțe de
        frână.
    brake_pad_form_factor:
      name: Factor de formă al plăcuțelor de frână
      description: Specifică sistemul/factorul de formă de frânare pentru care este
        proiectată plăcuța (de exemplu, disc, tambur, frână de mână).
    brake_pad_material:
      name: Materialul plăcuțelor de frână
      description: Specifică familia de compuși/materiale de frecare utilizate în
        garnitura plăcuțelor de frână.
    brake_pad_shim_included:
      name: Șaibă pentru plăcuța de frână inclusă
      description: Indică dacă șaibele pentru reducerea zgomotului sunt incluse sau
        preatașate.
    brake_pad_wear_indicator_type:
      name: Tip de indicator de uzură pentru plăcuțele de frână
      description: Indică ce tip de indicator de uzură este inclus cu plăcuțele de
        frână (de exemplu, senzor mecanic cu scârțâitor sau senzor electronic).
    brake_position:
      name: Poziția frânei
      description: Indică unde pe vehicul va fi instalată componenta de frânare.
    brake_rotor_mount_type:
      name: Tipul de montare al rotorului de frână
      description: Definește interfața utilizată pentru atașarea unui disc de frână
        la butuc (dacă este cazul).
    brake_service_kit_components_included:
      name: Componentele kitului de service pentru frâne incluse
      description: Lista sculelor/adaptoarelor/consumabilelor incluse în kitul de
        service pentru frâne.
    brake_shoe_friction_material:
      name: Material de fricțiune pentru saboții de frână
      description: Compusul de fricțiune/garnitură utilizat pe sabotul de frână (materialul
        care intră în contact cu tamburul).
    brake_shoe_set_contents:
      name: Conținutul setului de saboți de frână
      description: Ce este inclus în pachet (de exemplu, doar saboții vs. saboți plus
        hardware/arcuri).
    brake_system_type:
      name: Tipul sistemului de frânare
      description: Specifică tehnologia mecanismului de frânare utilizată pentru a
        controla rotația bobinei în timpul lansării.
    brake_type:
      name: Tip de frână
      description: Tipul mecanismului de frânare/tensionare a firului de urzeală.
    brandy_age_classification:
      name: Clasificarea pe vârstă a brandyului
      description: Clasifică brandy-ul folosind denumiri de calitate/vârstă standard
        din industrie (de exemplu, VS, VSOP, XO) care reflectă cerințele minime de
        învechire.
    brass_cleaning_tool_type:
      name: Tip de instrument de curățare a alamei
      description: Specifică tipul de instrument utilizat pentru curățarea sau întreținerea
        instrumentelor din alamă.
    brass_instrument_application_area:
      name: Zona de aplicare pe instrumentele din alamă
      description: Părțile instrumentului de alamă pe care este destinat să fie utilizat
        spray-ul dezinfectant.
    brass_instrument_care_kit_purpose:
      name: Scopul kitului de îngrijire a instrumentelor din alamă
      description: Descrie scenariul de utilizare preconizat pentru kit (întreținere
        de rutină, curățare profundă, călătorii/urgențe, kit starter pentru studenți
        etc.).
    brass_instrument_case_shell_material:
      name: Material ul carcasei pentru instrumente din alamă
      description: Materialul principal al carcasei rigide/cadrului (dacă este cazul),
        separat de materialul general al genții/cutiei.
    brass_instrument_lubricant_additives_features:
      name: Aditivi/caracteristici pentru lubrifianți pentru instrumentele din alamă
      description: Caracteristici funcționale notabile ale formulării lubrifiantului.
    brass_instrument_lubricant_base_composition:
      name: Compoziția de bază a lubrifiantului pentru instrumente din alamă
      description: Baza/componenta chimică principală a lubrifiantului utilizată pentru
        lubrifianții instrumentelor din alamă.
    brass_instrument_lubricant_viscosity_grade:
      name: Grad de vâscozitate al lubrifiantului pentru instrumente din alamă
      description: Grosimea/curgerea relativă a lubrifiantului destinat instrumentelor
        din alamă.
    brass_instrument_replacement_part_type:
      name: Tipul piesei de schimb pentru instrumente de suflat din alamă
      description: Specifică ce tip de piesă de schimb este pentru instrumentele din
        alamă (componente cheie pentru supapă/culisă/apă, dopuri/pâsle, protecții
        etc.).
    brass_instrument_valve_configuration:
      name: Configurația valvei pentru instrumente din alamă
      description: Cum își schimbă instrumentul înălțimea sunetului (mecanismul valvei/glisierei).
    brass_lubricant_application_area:
      name: Zona de aplicare a lubrifiantului pentru alamă
      description: Mecanismul instrumentului de alamă pentru care este destinat lubrifiantul.
    brass_mouthpiece_backbore:
      name: Muștiuc din alamă
      description: Profilul găurii posterioare/categoria muștiucului (forma/dimensiunea
        muștiucului), influențând tonul și intonația.
    brass_mouthpiece_cup_depth:
      name: Adâncimea cupei muștiucului din alamă
      description: Clasificarea adâncimii cupei muștiucului (cât de adâncă este cupa),
        care influențează tonul și răspunsul.
    brass_polishing_cloth_abrasiveness_level:
      name: Nivelul de abrazivitate al pânzei de lustruit alamă
      description: Arată cât de agresivă este laveta în îndepărtarea petelor, în comparație
        cu oferirea unei străluciri delicate.
    bread_crumb_base_ingredient:
      name: Ingredientul de bază al pesmetului
      description: Indică ingredientul principal din care sunt făcute firimiturile,
        cum ar fi grâul, orezul, șoriciul de porc sau migdalele.
    bread_variety:
      name: Tipul de pâine
      description: Specifică stilul sau varietatea de pâine sau chifle, ajutându-i
        pe cumpărători să localizeze tipuri specifice (de exemplu, brioșe, baghetă,
        naan).
    breadstick_style:
      name: Stil grisină
      description: Identifică stilul sau formatul tradițional specific al grisinei.
    bridge_head_material:
      name: Materialul capului podului
      description: Material folosit exclusiv pentru capul punții, influențând greutatea,
        senzația la atingere și durabilitatea.
    bridge_head_type:
      name: Tipul capului de pod
      description: Identifică stilul capului de pod, ajutându-i pe cumpărători să
        aleagă formele preferate pentru suportul tacului.
    bridle_part_type:
      name: Tipul piesei de căpăstru
      description: Identifică componenta specifică a căpăstrului pe care o reprezintă
        articolul de schimb, ajutându-i pe clienți să găsească exact piesa de care
        au nevoie.
    bridle_style:
      name: Stilul căpăstrului
      description: Clasifică stilul sau construcția generală a căpăstrului, astfel
        încât călăreții să poată localiza rapid echipamentul potrivit nevoilor sau
        disciplinei lor.
    broadhead_field_point_attachment_style:
      name: Stil de atașare cu vârf lat/punct de câmp
      description: Specifică modul în care vârful lat sau vârful de câmp se atașează
        la tija săgeții.
    broadhead_thread_size:
      name: Dimensiuni fir cu vârf lat
      description: Listează specificațiile pentru fir utilizate pentru atașarea vârfului
        lat sau a vârfului de câmp la inserția sau tija săgeții.
    broadhead_tip_type:
      name: Tip de vârf cu vârf lat
      description: Definește stilul vârfului/ferulei cu vârf lat care inițiază penetrarea,
        influențând performanța în diferite jocuri.
    broccoli_cut:
      name: Tăietură broccoli
      description: Specifică modul în care a fost tăiat sau preparat broccoli înainte
        de ambalare (de exemplu, cap întreg, buchețele, fideluță).
    broccoli_variety:
      name: Varietate de broccoli
      description: Identifică soiul specific sau varietatea de broccoli disponibilă
        pe piață (de exemplu, Tenderstem, Romanesco).
    broom_head_material:
      name: Materialul capului măturii
      description: Specifică compoziția materialului capului măturii, care influențează
        durabilitatea și caracteristicile de joc.
    brush_format:
      name: Format perie
      description: Indică formatul fizic al unei perii de schi sau snowboard, distingând
        între blocurile manuale și formatele rotative acționate de burghiu, cum ar
        fi cilindri din lână rotativă sau din pâslă rotativă.
    brush_shape:
      name: Formă perie
      description: Specifică forma fizică sau profilul corpului sau capului periei,
        care influențează zona de contact și manevrabilitatea.
    brussel_sprout_preparation:
      name: Preparare varză de Bruxelles
      description: Descrie prepararea fizică sau stilul de tăiere pentru varza de
        Bruxelles furnizată.
    brussels_sprout_variety:
      name: Varietate de varză de Bruxelles
      description: Specifică soiul sau varietatea de varză de Bruxelles, incluzând
        soiurile actuale și viitoare.
    bubble_blower_features:
      name: Caracteristicile instrumentului pentru suflat bule
      description: Enumeră caracteristicile funcționale comune ale instrumentelor
        pentru suflat bule.
    bubble_gun_bubble_output_modes:
      name: Moduri de ieșire a bulelor din pistolul cu bule
      description: Specifică modurile de funcționare pentru pistolul cu bule, cum
        ar fi o singură bulă, continuu sau setări cu mai multe viteze.
    bubble_machine_features:
      name: Caracteristicile mașinii de baloane de săpun
      description: Highlight caracteristicile funcționale comune ale mașinilor cu
        bule, dincolo de funcționarea de bază.
    bubble_machine_items_included:
      name: Articole incluse pentru mașina de bule
      description: Listează articolele cheie incluse în cutie (de exemplu, soluție
        pentru bule, baghete suplimentare, curea de transport, telecomandă).
    bubble_output_rate:
      name: Rata de ieșire a bulelor
      description: Indică rata aproximativă/calitativă de producție a bulelor pentru
        un instrument pentru suflat bule (de exemplu, mică/medie/mare), inclusiv dacă
        debitul este variabil.
    bubble_solution_container_type:
      name: Tip de container pentru soluția pentru bule
      description: Specifică modul în care soluția pentru bule este furnizată/utilizată
        împreună cu pistolul cu bule (de exemplu, rezervor intern, sticlă atașată,
        tavă/imersie separată).
    bubble_toy_included_accessories:
      name: Accesorii incluse cu jucăria cu bule
      description: Listează articolele comune incluse cu jucăria cu bule (de exemplu,
        sticlă pentru soluție, tavă, baghete de schimb).
    buckwheat_processing_method:
      name: Metoda de procesare a hriștii
      description: Descrie procesarea aplicată hriștii înainte de vânzare (de exemplu,
        prăjire, încolțire, expandare).
    buckwheat_product_form:
      name: Formă produs din hrișcă
      description: Prezentare fizică specifică hriștii, care cuprinde forme care nu
        sunt acoperite de lista generică (de exemplu, fulgi, pufuleți, pliculețe instant).
    bug_collecting_kit_items_included:
      name: Articole incluse în kitul de colectare a insectelor
      description: Instrumente și materiale educaționale incluse într-un kit de colectare
        a insectelor.
    built_in_storage_type:
      name: Tip de depozitare încorporat
      description: Identifică tipurile de depozitare încorporate în cadrul patului
        supraetajat (de exemplu, sertare, rafturi, spațiu de depozitare pentru scară).
    bumper_finish:
      name: Finisaj bara de protecție
      description: Specifică stratul de acoperire sau finisajul aplicat barei de protecție.
    bumper_sensor_cutouts:
      name: Decupaje senzori bară de protecție
      description: Indică deschiderile/decupările pentru asistență dispozitive OEM
        pe care le include sau pe care le acceptă bara de protecție.
    bunk_bed_configuration:
      name: Configurația patului supraetajat
      description: Indică aspectul structural și combinația de dimensiuni ale saltelei
        pentru patul supraetajat.
    buoyancy:
      name: Flotabilitate
      description: Indică comportamentul de flotabilitate al momelii sau nălucii în
        coloana de apă, cum ar fi plutire, scufundare sau suspendare.
    burkini_pieces_included:
      name: Piese de burkini incluse
      description: Enumeră componentele vestimentare furnizate în setul burkini, astfel
        încât clienții să știe exact ce cumpără.
    burn_rate:
      name: Viteză de ardere
      description: Descrie cât de repede arde hârtia de rulat după aprindere.
    bus_model_type:
      name: Tipul modelului de autobuz
      description: Identifică configurația/tipul de autobuz din lumea reală reprezentat
        de modelul la scară (corp/clasa de utilizare).
    bust_design:
      name: Designul bustului
      description: Descrie configurația zonei bustului și acoperirea decolteului costumului
        (de exemplu, bust deschis, sutien încorporat, decolteu adânc).
    butter_variety:
      name: Varietate de unt
      description: Specifică stilul de producție sau tipul distinctiv de unt, cum
        ar fi unt cultivat, unt dulce, stil european, unt clarificat (ghee) sau unt
        din zer.
    buttermilk_variety:
      name: Tipul de lapte bătut
      description: Identifică stilul sau forma specifică de lapte bătut vândut (de
        exemplu, fermentat, tradițional, pudră).
    button_application:
      name: Aplicație pentru buton
      description: Indică aplicația dorită sau tipul de proiect pentru buton (de exemplu,
        îmbrăcăminte, tapițerie).
    button_attachment_type:
      name: Tipul de fixare al nasturelui
      description: Specifică construcția butonului pentru atașarea acestuia la material
        (de exemplu, găuri de cusut vs. tijă), nu stilul de închidere.
    button_finish:
      name: Finisaj buton
      description: Descrie finisajul/aspectul suprafeței butonului (de exemplu, mat
        vs. lucios).
    buttonhole_elastic_application:
      name: Aplicație elastică pentru butonieră
      description: Utilizarea/aplicația principală prevăzută pentru elasticul pliabil
        pentru ornamente.
    cab_type:
      name: Tipul cabinei
      description: Specifică configurația cabinei camionului.
    cabasa_construction_type:
      name: Tipul de construcție al cabasei
      description: Specifică construcția fizică/stilul corpului cabasei și al ansamblului
        lanț/mărgele.
    cabbage_variety:
      name: Varietate de varză
      description: Identifică soiul sau tipul de varză (de exemplu, verde, napa, creață),
        astfel încât cumpărătorii să poată filtra după aromă, textură și utilizare
        culinară.
    cabinet_door_style:
      name: Stilul ușii de dulap
      description: Identifică designul vizual al panoului ușii dulapului, cum ar fi
        panou Shaker sau în relief, pentru a ajuta la potrivirea cu estetica bucătăriei.
    cabinet_overlay_type:
      name: Tipul de suprapunere a dulapului
      description: Specifică modul în care ușile se suprapun sau se așează în raport
        cu cadrul dulapului.
    cable_end_type:
      name: Tip de capăt de cablu
      description: Descrie forma sau stilul niplului sau fitingului final al cablului
        care interfațează cu manetele de frână sau schimbător de viteze.
    cable_housing_construction:
      name: Construcția carcasei cablului
      description: Descrie designul structural al carcasei - cum ar fi înfășurarea
        spiralată, fără compresie sau legătura segmentată - care influențează rezistența,
        flexibilitatea și senzația în cursă.
    cable_housing_liner_type:
      name: Tip de căptușeală pentru carcasă cablului
      description: Indică dacă carcasa include o căptușeală internă și/sau un tratament
        de lubrifiere, precum și materialul sau tehnologia utilizată, care afectează
        reducerea frecării și rezistența la intemperii.
    cable_management_type:
      name: Tip de gestionare a cablurilor
      description: Specifică tipul de cablu încorporat sau funcțiile de gestionare
        a energiei oferite de masa de conferințe.
    cable_surface_treatment:
      name: Tratamentul suprafeței cablului
      description: Identifică orice acoperire sau finisaj special aplicat cablului
        pentru reducerea frecării sau protecție împotriva coroziunii.
    cabochon_back_type:
      name: Tip spate caboșon
      description: Indică profilul/finisajul spatelui caboșonului, care afectează
        metodele de setare/lipire și compatibilitatea.
    cacao_bean_variety:
      name: Varietate de boabe de cacao
      description: Specifică varietatea botanică sau soiul boabelor de cacao utilizate.
    cacao_roast_level:
      name: Nivelul de prăjire pentru boabele de cacao
      description: Descrie gradul în care boabele de cacao au fost prăjite înainte
        de măcinare.
    cage_package_type:
      name: Tip pachet colivie
      description: Definește ce componente sunt incluse la achiziție (de exemplu,
        doar plasă, kit cadru, pachet complet).
    cajon_body_shell_material:
      name: Materialul corpului/carcasei cajonului
      description: Identifică materialul corpului/carcasei cajonului (excluzând tapa).
    cajon_corner_control_system:
      name: Sistem de control al colțurilor cajonului
      description: Specifică dacă cajonul acceptă ajustarea sunetului în colț (de
        exemplu, folosind șuruburi de colț), pentru a varia răspunsul la lovire.
    cajon_corner_edge_design:
      name: Design colț/margine cajon
      description: Descrie construcția colțurilor/marginilor care afectează confortul
        și interpretarea.
    cajon_feet_type:
      name: Tipul picioarelor cajonului
      description: Specifică tipul de picioare de pe cajon, influențând stabilitatea
        și rezonanța.
    cajon_snare_adjustability:
      name: Reglarea efectului snare al cajonului
      description: Indică dacă și cum poate fi ajustat efectul snare (tensiune, angrenare
        sau ambele).
    cajon_snare_system_type:
      name: Tip de sistem pentru efectul snare al cajonului
      description: Specifică mecanismul intern folosit pentru a crea efectul snare.
    cake_shape:
      name: Formă prăjitură
      description: Descrie forma fizică în care este pregătită prăjitura cu cafea.
    cake_topping:
      name: Topping prăjitură
      description: Identifică toppingul sau finisajul principal aplicat prăjiturii
        cu cafea.
    cake_type:
      name: Tip de prăjitură
      description: Descrie stilul sau varietatea de prăjitură (de exemplu, chec, pandișpan,
        prăjitură cu brânză).
    caliper_mount_type:
      name: Tipul de montare a etrierului
      description: Definește standardul de interfață pentru cadru sau furcă utilizat
        de etrierul de frână (de exemplu, montare pe stâlp, montare plată).
    caliper_mounting_standard:
      name: Standard de montare a etrierului
      description: Specifică interfața/standardul de montare (de exemplu, montare
        plată, montare pe stâlp, IS etc.) utilizat pentru atașarea etrierului de frână
        la cadrul sau furca bicicletei.
    camera_mounting_location_vehicle_exterior:
      name: Locație de montare a camerei (exterior vehicul)
      description: Unde trebuie să fie montate camerele pe vehicul (de exemplu, grila
        frontală, oglinzile spate, oglinzile laterale).
    camouflage_environment_type:
      name: Tipul de mediu de camuflaj
      description: Indică mediul principal pentru care este conceput modelul de camuflaj,
        cum ar fi pădure, deșert sau mlaștină.
    camping_oil_application:
      name: Aplicarea uleiului de camping
      description: Specifică utilizarea principală preconizată a uleiului în contexte
        legate de camping (de exemplu, combustibil pentru felinare versus combustibil
        pentru aragaz).
    camshaft_construction:
      name: Construcția arborelui cu came
      description: Stil de fabricație/semifabricat al arborelui cu came.
    camshaft_material:
      name: Materialul arborelui cu came
      description: Materialul principal al miezului/axului arborelui cu came (materialul
        de bază).
    camshaft_position:
      name: Poziția arborelui cu came
      description: Specifică locația/tipul prevăzut pentru arborele cu came în motor
        (de exemplu, admisie sau evacuare sau o anumită bancă/poziție în motor).
    candle_container_type_included:
      name: Tip de container pentru lumânare inclus
      description: Specifică tipul de recipiente pentru lumânări incluse în kit, dacă
        există.
    candle_dye_form:
      name: Formă vopsea lumânare
      description: Specifică forma fizică a vopselei/colorantului pentru lumânări
        utilizat în fabricarea lumânărilor.
    candle_fragrance_form:
      name: Formă parfum de lumânare
      description: Specifică tipul/forma ingredientului parfumat destinat fabricării
        lumânărilor.
    candle_making_tool_type:
      name: Tip de instrument pentru fabricarea lumânărilor
      description: Identifică ce tip de instrument de fabricare a lumânărilor reprezintă
        produsul (de exemplu, vas de turnat, instrument de centrare a fitilului, termometru).
    candy_texture:
      name: Textură bomboană
      description: Descrie senzația în gură sau consistența bomboanelor, independent
        de aromă sau formă.
    candying_method:
      name: Metodă de confiere
      description: Descrie modul în care fructul a fost confiat sau conservat cu zahăr
        (de exemplu, cristalizat, glazurat, în sirop).
    canned_meat_form:
      name: Formă carne în conservă
      description: Clasifică forma procesată sau prezentarea cărnii în cadrul ambalajului.
    canoe_construction_type:
      name: Tipul de construcție al canoei
      description: Diferențiază între stilurile de construcție a carenei de canoe,
        cum ar fi carcasa rigidă, gonflabilă și pliabilă.
    canoe_hull_shape:
      name: Formă carenă de canoe
      description: Definește secțiunea transversală principală a carenei sau profilul
        fundului, care afectează stabilitatea și manevrabilitatea.
    canoe_stern_design:
      name: Designul pupei canoei
      description: Definește stilul pupei carenei, care afectează compatibilitatea
        motorului și manevrabilitatea.
    canopy_type:
      name: Tipul copertinei
      description: Descrie stilul copertinei sau al învelișului de deasupra inclus
        în patul de exterior cu baldachin.
    canvas_compatible_media:
      name: Medii compatibile cu pânza
      description: Indică cu ce mediu de artă/meșteșug poate fi folosită pânza.
    canvas_format:
      name: Format pânză
      description: Indică dacă pânza imprimabilă este vândută sub formă de foi, role
        sau panouri pre-tăiate.
    canvas_mounting_format:
      name: Montare/format pânză
      description: Formatul fizic/stilul de montare al produsului pânză de pictat.
    canvas_stretcher_assembly_type:
      name: Tip de asamblare a dispozitivului pentru întins pânza
      description: Indică dacă dispozitivul pentru întins pânza este vândut asamblat
        ca un cadru sau ca bare/kit care necesită asamblare.
    canvas_stretcher_corner_joint_type:
      name: Tip de îmbinare la colț a dispozitivului pentru întins pânza
      description: Cum sunt îmbinate/construite colțurile dispozitivului pentru întins
        pânza (de exemplu, mortezare și îmbinare, îmbinare tip deget, capsare, cu
        cheie).
    canvas_surface_tone:
      name: Tonul suprafeței pânzei
      description: Tonul/culoarea de bază a suprafeței pânzei amorsate (grund), nu
        însă pentru designul sau model imprimat (de exemplu, alb, negru, nuanțat).
    canvas_weave_type:
      name: Tip de țesătură de pânză
      description: Descrie construcția țesăturii suprafeței pânzei, care afectează
        textura și gestionarea vopselei.
    cap_attachment_style:
      name: Stilul de fixare al capacului
      description: Specifică stilul de construcție/atașare al unui capac pentru muștiuc
        de saxofon, care poate afecta protecția și potrivirea în carcasă.
    cap_construction:
      name: Construcția capacului
      description: Specifică modul în care este construită boneta perucii (de exemplu,
        dantelă frontală, dantelă completă, legată manual), ceea ce afectează realismul,
        confortul și versatilitatea stilului.
    cap_crown_structure:
      name: Structura capacului tip coroană
      description: Indică dacă capacul tip coroană este structurat (rigidizat) sau
        nestructurat (moale).
    cap_fit_type:
      name: Tipul de potrivire al capacului
      description: Definește modul în care capacul se potrivește sau se ajustează
        pe capul purtătorului (de exemplu, ajustată vs. reglabilă).
    cap_seal_type:
      name: Tip de etanșare a capacului
      description: Specifică componenta de etanșare utilizată pentru a preveni scurgerile
        de ulei și scăpările de vapori (de exemplu, garnitură inelară, garnitură).
    cap_size:
      name: Dimensiunea capacului
      description: Etichete de dimensiune standard care indică dimensiunea totală
        a capului pentru capacul perucii.
    cap_type:
      name: Tipul de capac
      description: Tipul de interfață pentru capac/închidere utilizat la rezervorul
        de preaplin.
    caper_size_grade:
      name: Gradul dimensiunii caperului
      description: Clasifică caperele după denumirile standard din industrie care
        corespund diametrului mugurelui.
    capo_clamping_mechanism:
      name: Mecanism de prindere a capodastrului
      description: Specifică stilul de clemă/acționare utilizat pentru a aplica presiune
        asupra corzilor (modul în care este acționat capodastrul).
    capo_finish:
      name: Finisaj capodastru
      description: Finisajul suprafeței corpului capodastrului (vizual/senzațional),
        independent de culoare (de exemplu, mat vs. lucios).
    capo_fit_type:
      name: Tipul de potrivire capodastru
      description: Specifică profilul gâtului pentru care este proiectat capodastrul
        (inclusiv raza/planeitatea), ceea ce afectează prinderea și intonarea fără
        rezonanță.
    capo_pad_material:
      name: Materialul pernuței capodastrului
      description: Specifică materialul plăcuței de contact care atinge corzile/tastiera
        (afectează aderența, stabilitatea acordării și potențialul marcaj de finisare).
    capo_tension_mechanism:
      name: Mecanismul de tensionare a capodastrului
      description: Specifică modul în care se aplică și se ajustează presiunea/tensiunea
        asupra corzilor pentru capodastrul glisant.
    capture_method:
      name: Metoda de capturare
      description: Indică dacă capcana este destinată capturării de animale vii sau
        eliminării letale.
    car_ev_conversion_kit_motor_type:
      name: Tip motor kit de conversie auto EV
      description: Specifică tehnologia motorului de tracțiune inclusă sau necesară
        pentru kitul de conversie (de exemplu, inducție CA vs. magnet permanent).
    car_playset_items_included:
      name: Articole incluse în setul de joacă cu mașini
      description: Listează componentele principale incluse în setul de joacă cu mașini,
        dincolo de structura de bază (de exemplu, mașini, figurine, semne).
    car_shampoo_application_method:
      name: Metoda de aplicare a șamponului auto
      description: Cum este destinat să fie aplicat șamponul în timpul spălării.
    car_wash_solution_form:
      name: Forma soluției de spălare auto
      description: Specifică forma fizică a soluției de spălare auto (de exemplu,
        lichid, spumă, șervețele umede).
    car_wash_solution_scent:
      name: Parfum de soluție pentru spălare auto
      description: Specifică parfumul/mirosul soluției de spălare auto (dacă este
        parfumată).
    carbonated_water_variety:
      name: Varietate de apă carbogazoasă
      description: Clasifică apa carbogazoasă pe baza varietăților și formulei comune
        de pe piață (de exemplu, apă tonică, apă minerală, apă minerală carbogazoasă
        funcțională).
    carbonation:
      name: Carbonatare
      description: Descrie nivelul sau stilul de carbonatare din băutură (de exemplu,
        plată, ușor carbogazoasă, carbogazoasă, nitro).
    carburetor_barrel_count:
      name: Numărul de jgheaburi din carburator
      description: Indică numărul de alezaje/jgheaburi de accelerare din carburator.
    carburetor_choke_type:
      name: Tipul de șoc pentru carburator
      description: Indică stilul de acționare a șocului utilizat de carburator.
    carburetor_mounting_flange_type:
      name: Tipul flanșei de montare a carburatorului
      description: Specifică stilul interfeței de montare a carburatorului, pentru
        a asigura potrivirea cu admisia/colectorul (de exemplu, model cu cep vs. flanșă/șurub).
    card_binder_page_type:
      name: Tip de pagină pentru bibliorafturi de carduri
      description: 'Pentru bibliorafturi/portofolii: stilul paginilor folosit pentru
        stocarea cardurilor.'
    card_box_holder_type:
      name: Tip cutie/suport pentru carduri
      description: Specifică factorul de formă funcțional al produsului pentru colectarea
        sau păstrarea cărților de vizită la un eveniment (de exemplu, cutie, cutie
        poștală, coș, suport).
    card_game_accessory_features:
      name: Caracteristici ale accesoriilor pentru jocuri de cărți
      description: Caracteristici funcționale notabile ale accesoriilor pentru jocuri
        de cărți.
    card_lot_type:
      name: Tip lot de cărți
      description: Indică dacă produsul este un lot/sortiment cu o singură carte sau
        cu mai multe cărți.
    card_sleeve_size_format_compatibility:
      name: Compatibilitate dimensiune/format manșetă carte
      description: Specifică dimensiunile de carte pentru care sunt proiectate să
        se potrivească mânecile/paginile/cutiile de cărți.
    carding_surface_pin_material:
      name: Material de fixare a suprafeței de cardare
      description: Materialul pinilor/dinților folosiți pentru a tăia și a deschide
        fibra.
    care_durability:
      name: Durabilitate în îngrijire
      description: Indică așteptările de durabilitate pentru spălare/căldură pentru
        etichetă după aplicare.
    care_label_attachment_type:
      name: Tipul de atașament a etichetei de îngrijire
      description: Cum este concepută eticheta de îngrijire să fie aplicată pe articol
        (de exemplu, coasere, termoadeziv/transfer termic, adeziv).
    care_label_format:
      name: Formatul etichetei de îngrijire
      description: Formatul fizic/tipărit al produsului etichetă de îngrijire.
    care_label_symbol_system:
      name: Sistemul de simboluri pentru eticheta de îngrijire
      description: Setul de standarde/simboluri utilizate pe etichetă (de exemplu,
        simboluri de îngrijire ISO, simboluri ASTM/US).
    cargo_area_configuration:
      name: Configurația zonei de marfă
      description: Specifică stilul structural sau amplasarea zonei de încărcare pe
        o bicicletă de marfă (de exemplu, cu coadă lungă, cu încărcător frontal, tricicletă).
    cargo_net_adjustability:
      name: Reglarea plasei de marfă
      description: Indică dacă și cum poate fi ajustată tensiunea/ajustarea plasei
        de marfă.
    cargo_net_position:
      name: Poziția plasei de marfă
      description: Unde în portbagaj/zona bagajelor trebuie să fie montată sau să
        funcționeze plasa.
    cargo_net_stretch_type:
      name: Tip de întindere plasă de marfă
      description: Dacă plasa de marfă din portbagaj este elastică/extensibilă sau
        fixă/neextensibilă.
    cargo_net_style:
      name: Stilul plasei de marfă
      description: Specifică stilul de construcție sau factorul de formă al plasei
        de marfă (de exemplu, coardă elastică, chingă, barieră, hamac).
    cargo_rack_finish:
      name: Finisaj raft de marfă
      description: Finisajul/acoperirea suprafeței exterioare a raftului de marfă.
    carpet_cleaner_application_method:
      name: Metoda de aplicare a produsului de curățat covoare
      description: Specifică modul preconizat în care produsul este aplicat și funcționează
        pe covor (dincolo de forma generală).
    carrier_style:
      name: Stil transportator
      description: Mecanismul/stilul de transport folosit pentru a sprijini barca
        pe vehicul.
    carrot_size:
      name: Dimensiunea morcovului
      description: Clasifică dimensiunile generale ale produsului  morcov.
    carrot_variety:
      name: Varietate de morcov
      description: Identifică varietatea sau soiul specific de morcov.
    carrying_capacity_pairs_boards:
      name: Capacitate de transport (perechi/plăci)
      description: Indică câte schiuri (perechi) sau plăci de snowboard permite sau
        este destinat să susțină un accesoriu atunci când este utilizat împreună cu
        suportul (de exemplu, kituri de extensie).
    cartridge_thread_compatibility:
      name: Compatibilitate fir cartuș
      description: Indică standardul acceptat pentru fir de către un vaporizator sau
        o baterie, asigurând compatibilitatea fizică a cartușelor și bateriilor.
    case_capacity_butts_shafts:
      name: Capacitate carcasă (butt-uri × arbori)
      description: Definește câte butt-uri și câți arbori pot intra în carcasă, exprimate
        în formatul butt x arbori (de exemplu, 2x4 = 2 butt-uri și 4 arbori).
    case_features:
      name: Caracteristicile husei
      description: Evidențiază caracteristicile funcționale ale setului de cinele/tobe
        în ceea ce privește protecția și transportul.
    case_humidifier_refill_type:
      name: Tip de reumplere umidificator cutie
      description: Indică dacă umidificatorul folosește medii reutilizabile (care
        pot fi reumezite/regenerabile) sau rezerve de unică folosință care trebuie
        să fie înlocuibile.
    case_lining_material:
      name: Materialul căptușelii husei
      description: Identifică materialul principal care căptușește interiorul unei
        carcase sau al unei genți care intră în contact cu și protejează instrumentul
        sau conținutul.
    case_material:
      name: Materialul husei
      description: Identifică materialul principal al carcasei ceasului, influențând
        durabilitatea, greutatea și estetica.
    case_mounting_method:
      name: Metoda de montare a carcasei
      description: Modul în care umidificatorul este destinat a fi poziționat sau
        atașat în interiorul carcasei instrumentului.
    case_structure:
      name: Structura carcasei
      description: Indică rigiditatea construcției carcasei.
    case_style_cymbal_drum:
      name: Stilul carcasei (cimbal/tobă)
      description: Specifică dacă produsul este o geantă moale, o carcasă rigidă sau
        un design hibrid pentru transportul cimbalelor sau al setului de tobe.
    casing_material:
      name: Materialul carcasei
      description: Identifică materialul principal utilizat în carcasa anvelopei,
        care afectează greutatea, senzația la rulare și protecția la perforare.
    casino_set_chip_material:
      name: Material cipurilor din setul de cazinou
      description: Materialul principal al cipurilor incluse (dacă este cazul).
    casino_set_layout_included:
      name: Aspectul setului de cazino inclus
      description: Specifică ce tip de suprafață/aspect de joc este inclus în set.
    cask_finish:
      name: Finisare în butoi
      description: Specifică putina sau butoiul folosit pentru finisarea sau maturarea
        băuturii spirtoase, cum ar fi un butoi de bourbon sau de sherry.
    cassava_variety:
      name: Soi de manioc
      description: Identifică soiul sau varietatea specifică de yuca/manioc oferită,
        care afectează gustul, culoarea și proprietățile culinare.
    cassette_body_type:
      name: Tipul corpului casetei
      description: Standardul de freehub sau driver pe care îl acceptă butucul sau
        roata spate (de exemplu, HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Set de funcții pentru casete audio
      description: Indică funcțiile de transport și redare a casetelor comune casetofoanelor
        încorporate.
    cassette_speed_compatibility:
      name: Compatibilitate cu viteza casetei
      description: Indică numărul de viteze (de exemplu, 7 viteze, 12 viteze) cu care
        este proiectată caseta sau roata liberă, asigurând compatibilitatea lanțului,
        a schimbătorului de viteze și a schimbătorului de foi.
    castanet_shell_size_class:
      name: Clasa dimensiune cochilii castanet
      description: Clasă dimensională standardizată pentru scoici de castaniete, utilizată
        în mod obișnuit de către instrumentiști/profesori pentru o potrivire și un
        ton selecționați.
    castanets_included_pieces:
      name: Castaniete incluse piese
      description: Indică ce este inclus în oferta produsului (a împerechea vs single,
        extra-uri Shopify Plus ).
    castanets_pitch:
      name: teren de castaniete
      description: Indică Label comună de înălțime/dimensiune utilizată de Maker pentru
        a descrie gama sunetului.
    castanets_type:
      name: Tipul de castaniete
      description: Specifică stilul castanietelor sau categoria de utilizare preconizată.
    caster_type:
      name: Tipul roții
      description: Identifică stilul roților sau roților montate pe coș (de exemplu,
        pivotante, blocabile), informând asupra manevrabilității și stabilității.
    castle_playset_included_items:
      name: Set de joacă Castel inclus articol
      description: Surprinde componentele principale incluse în setul de joacă castel,
        astfel încât cumpărătorul să poată compara seturile (de exemplu, figurine,
        mobilier, vehicule, accesorii).
    catcher_equipment_included:
      name: Echipament de catcher inclus
      description: Specifică componentele incluse într-un set de echipament pentru
        catcher, cum ar fi casca sau apărătoarea de piept pentru catcher.
    catcher_helmet_style:
      name: Stilul căștii pentru catcher
      description: Indică stilul general de design al echipamentului de protecție
        pentru catcher.
    cattle_breed:
      name: Rasă de bovine
      description: Identifică rasa de bovine de la care provine carnea de vită (de
        exemplu, Angus, Wagyu, Hereford).
    cauliflower_variety:
      name: Varietate de conopidă
      description: Identifică soiul, culoarea sau varietatea specială a conopidei
        vândute.
    celery_form:
      name: Formă de țelină
      description: Specifică forma fizică sau stilul de tăiere în care se vinde țelina.
    celery_variety:
      name: Soi de țelină
      description: Înregistrează soiul sau varietatea specifică de țelină, permițând
        cumpărătorului să selecteze după profilul de aromă, culoare sau utilizare
        culinară.
    cereal_bar_texture:
      name: Textură de baton de cereale
      description: Descrie senzația în gură și consistența batonului de cereale (de
        exemplu, moale, crocant).
    cereal_type:
      name: Tip de cereală
      description: Clasifică forma sau formatul cerealelor sau granolelor (fulgi,
        pufuleți, grămăjoare de granola, muesli etc.) pentru a-i ajuta pe cumpărători
        să găsească textura sau metoda de preparare preferată.
    certificate_border_style:
      name: Stilul chenarului certificatului
      description: Descrie tratamentul decorativ al chenarului utilizat pe certificat.
    certificate_personalization_type:
      name: Tipul de personalizare a certificatului
      description: Specifică modul în care certificatul poate fi personalizat (gol
        pentru a fi scris de mână, șablon imprimabil, preimprimat cu câmpuri variabile
        etc.).
    certification_service:
      name: Serviciu de certificare
      description: Societate terță de clasificare/certificare (dacă este cazul).
    certification_standard:
      name: Standard de certificare
      description: Specifică certificarea de siguranță și rezistență la foc sau standardul
        de conformitate pe care baclavaua este clasificată să îl îndeplinească.
    chain_coating_finish:
      name: Acoperire/finisaj lanț
      description: Specifică orice tratament de suprafață sau finisaj aplicat lanțului
        pentru a îmbunătăți durabilitatea, a reduce frecarea, a preveni coroziunea
        sau a modifica aspectul (de exemplu, nitrură de tinium, DLC, nichel, EPT rezistent
        la rugină).
    chain_connection_type:
      name: Tipul de conexiune pentru lanț
      description: Specifică metoda de închidere furnizată sau necesară pentru a uni
        capetele lanțului.
    chain_tier_configuration:
      name: Configurația nivelurilor lanțului
      description: Specifică numărul/aranjamentul nivelurilor lanțului în ansamblul
        de prindere (nivel simplu, dublu sau triplu).
    chain_tool_type:
      name: Tipul sculei cu lanț
      description: Clasifică tipul specific de sculă pentru lanțul de bicicletă, astfel
        încât cumpărătorul să poată găsi rapid dispozitivul corect.
    chainring_shape:
      name: Formă angrenaj
      description: Indică forma angrenajului, cum ar fi rotundă sau ovală/eliptică.
    chair_accessories_included:
      name: Accesorii pentru scaun incluse
      description: Listează accesoriile încorporate sau incluse care îmbunătățesc
        funcționalitatea unui scaun.
    chair_sash_care_instructions:
      name: Instrucțiuni de îngrijire a canatului scaunului
      description: Descrie metoda de curățare/întreținere recomandată pentru canatul
        scaunului.
    chair_sash_finish:
      name: Finisaj pentru canatul scaunului
      description: Descrie luciul/finisajul suprafeței țesăturii canatului.
    chair_storage_design:
      name: Designul de depozitare a scaunelor
      description: Indică modul în care scaunele pentru terasă sunt concepute să fie
        depozitate (de exemplu, pliabil, stivuibil, nepliabil) pentru a ajuta clientul
        să evalueze depozitarea și portabilitatea.
    chaise_or_sectional_orientation:
      name: Orientare șezlong sau secțiune
      description: Specifică partea pe care se află un șezlong integrat sau o secțiune
        extinsă atunci când este orientată spre canapea.
    chamber_size:
      name: Dimensiunea camerei
      description: Indică dimensiunea/volumul camerei muștiucului, care afectează
        rezistența și culoarea tonală.
    chanter_finger_spacing:
      name: Spațierea degetelor pe caraba cimpoiului
      description: Indică profilul de spațiere/dimensiune pentru degete pe caraba
        cimpoiului (adesea descris ca standard, pentru mâini mici sau mâini mari).
    chanter_type:
      name: Tip de flaut de cimpoi
      description: Stilul/configurația pentru caraba cimpoiului inclusă cu instrumentul
        (sau utilizată de instrument), cum ar fi deschis, închis, de practică sau
        cu cheie.
    chard_variety:
      name: Soi de mangold
      description: Identifică soiul specific sau varietatea de culoare a mangoldului
        comercializat.
    charging_port_location:
      name: Locația portului de încărcare
      description: Locația fizică a intrării principale de încărcare externă a vehiculului
        (portul de încărcare).
    chassis_construction_type:
      name: Tipul de construcție al șasiului
      description: Descrie metoda principală de construcție a șasiului utilizată pentru
        vehicul.
    checkbook_loading_orientation:
      name: Orientare pentru încărcarea carnetului de cecuri
      description: Indică dacă coperta carnetului de cecuri este compatibilă cu formatele
        de încărcare de sus, de jos sau universală.
    cheekpiece_style:
      name: Stilul zăbalei
      description: Definește tipul de configurație pentru obraz/inel de pe căpăstru,
        care determină acțiunea frâului și stabilitatea laterală.
    cheese_alternative_form:
      name: Formă alternativă de brânză
      description: Specifică forma fizică sau tăierea în care se vinde varianta de
        brânză.
    cheese_form:
      name: Formă de brânză
      description: Descrie prezentarea fizică a produsului din brânză (de exemplu,
        roată, bloc, feliat, mărunțit).
    cheese_texture:
      name: Textură de brânză
      description: Clasifică brânza după textura sa generală sau după fermitate.
    cheese_variety:
      name: Varietate de brânză
      description: Identifică tipul de brânză folosit ca aromă principală în gustare.
    cherimoya_variety:
      name: Soiul de cherimoya
      description: Identifică soiul/varietatea specifică de cherimoya (de exemplu,
        Fino de Jete, El Bumpo).
    cherry_variety:
      name: Soiul de cireșe
      description: Specifică soiul sau soiul de cireșe, ajutând cumpărătorul să aleagă
        tipuri specifice cunoscute pentru aroma, culoarea, dimensiunile sau utilizarea
        culinară preconizată.
    chest_pocket_style:
      name: Stilul buzunarului de la piept
      description: Specifică prezența și configurația buzunarelor de la piept de pe
        cămașă.
    chewing_tobacco_form:
      name: Forma tutunului de mestecat
      description: Identifică forma fizică, stilul de tăiere sau dimensiunile pungii
        produsului de tutun de mestecat (de exemplu, foi detașabile, tăietură lungă,
        pungă subțire).
    chicory_variety:
      name: Soi de cicoare
      description: Identifică varietatea sau soiul specific de cicoare vândut (de
        exemplu, Radicchio, andive belgiene, escarolă).
    chiffon_recommended_use:
      name: Utilizare recomandată pentru șifon
      description: Aplicațiile principale recomandate pentru cusut/meșteșug pentru
        materialul de șifon.
    child_seat_accessory_type:
      name: Tipul de accesoriu pentru scaunul pentru copii
      description: Definește tipul specific de accesoriu sau piesă de schimb pentru
        scaunul pentru copii (de exemplu, pernă de scaun, suport pentru picioare,
        adaptor de montare), permițând cumpărătorilor să se orienteze rapid către
        articolul de care au nevoie, fără a crea multe micro-categorii.
    child_seat_mounting_type:
      name: Tip de montare a scaunului pentru copii
      description: Specifică modul în care scaunul pentru copii de bicicletă se atașează
        la cadrul bicicletei, la suport sau la zona carlingii.
    chime_sound_character:
      name: Caracterul sunetului clopoțelului
      description: Descrie caracterul sonor/timbrul dorit al clopoțeilor.
    chin_cup_type:
      name: Tip protecție pentru bărbie
      description: Specifică stilul sau construcția protecției pentru bărbie, care
        afectează confortul și protecția la impact.
    chin_strap_type:
      name: Tipul curelei pentru bărbie
      description: Specifică tipul de curea de bărbie pentru o pălărie — fără curea,
        fixă, reglabilă sau detașabilă — pentru a ajuta cumpărătorul să aleagă stiluri
        care să fie sigure în condiții de vânt sau în condiții active.
    china_cymbal_edge_shape:
      name: Formă margine pentru cinele chinezești
      description: Descrie profilul muchiei/flanșei tipic pentru cinelele chinezești
        (cât de răsturnată este marginea), care afectează senzația și sunetul.
    china_cymbal_sound_character:
      name: Caracterul sunetului cinelului chinezesc
      description: Descriptor principal al sunetului/caracterelor tonale pentru un
        cinel chinezesc folosit pentru descoperire și filtrare (de exemplu, gros,
        întunecat, luminos). Se pot aplica mai multe valori.
    chinstrap_type:
      name: Tip curea de bărbie
      description: Stilul curelei de bărbie furnizate împreună cu casca.
    chip_cut_style:
      name: Stil de tăiere pentru cipsuri
      description: Specifică tăierea fizică sau stilul de textură pentru cipsuri (de
        exemplu, striate, gătite la foc mic, sparte).
    chip_denomination:
      name: Denominație cip
      description: Ce valori (denominații) de cipuri sunt incluse în set (imprimate
        sau atribuite).
    chocolate_form:
      name: Formă de ciocolată
      description: Descrie forma fizică în care se vinde ciocolata de gătit.
    choy_sum_variety:
      name: Varietatea de Choy sum
      description: Identifică varietatea specifică de piață sau botanică de choy sum
        comercializată.
    cigar_wrapper_color:
      name: Culoare învelitoare de trabuc
      description: Clasificarea standard a culorii frunzei învelitoare a trabucului.
    cigarette_filter_type:
      name: Tipul de filtru de țigară
      description: Specifică dacă țigara are filtru și, dacă da, construcția sau caracteristica
        specială a filtrului respectiv.
    cigarette_size:
      name: Dimensiunea țigării
      description: Clasifică țigările după lungimea standard din industrie sau terminologia
        de format (de exemplu, dimensiuni mari, 100, subțiri).
    cigarette_strength_descriptor:
      name: Descriptor pentru intensitatea țigării
      description: Etichetă de marketing utilizată în mod tradițional pentru a indica
        intensitatea gudronului/nicotinei (de exemplu, Light, Bold, Silver).
    cinch_liner_material:
      name: Materialul căptușelii chingii
      description: Identifică materialul folosit pentru căptușeala sau umplutura care
        se așează pe cal.
    circular_knitting_needle_cable_type:
      name: Tip de cablu pentru andrele circulare de tricotat
      description: Material/comportament și construcție a cablului (de exemplu, oțel
        acoperit, nailon) care afectează memoria/comportamentul la îndoire și pivotare.
    circular_knitting_needles_tip_material:
      name: Material pentru vârfurile andrelelor circulare de tricotat
      description: Materialul celor două vârfuri de ac (diferit de materialul cablului).
    circumference_adjustment_mechanism:
      name: Mecanism de ajustare a circumferinței
      description: Mecanism folosit pentru ajustarea sau blocarea circumferinței sculului.
    clamp_design:
      name: Designul clemei
      description: Descrie stilul structural sau mecanismul clemei.
    clamp_sheet_music_clip_features:
      name: Caracteristici ale clemei pentru partituri muzicale
      description: Caracteristici funcționale și de protecție ale clemelor pentru
        partituri muzicale (de exemplu, umplutură, antiderapante, pivotante).
    clamping_closure_type:
      name: Tip de prindere/închidere
      description: Specifică mecanismul utilizat pentru a strânge sau a fixa inelul
        de brodat în jurul materialului.
    clarinet_bell_acoustic_design:
      name: Design acustic al pâlniei de clarinet
      description: Descrie designul pentru sunet/ventilație al pâlniei, conceput să
        influențeze răspunsul și intonația.
    clarinet_bell_adjustment_mechanism:
      name: Mecanismul de reglare a pâlniei de clarinet
      description: Descrie modul în care se ajustează lungimea/geometria pâlniei.
    clarinet_bell_ring_material:
      name: Material pentru inelul pâlniei clarinetului
      description: Specifică materialul inelului/benzii de protecție de pe marginea
        pâlniei clarinetului, dacă există.
    clarinet_bell_tuning_effect:
      name: Efect de acordare a pâlniei de clarinet
      description: Indică modul în care pâlnia este concepută să afecteze acordarea/intonația
        (în special tonurile din gât și registrul grav) în comparație cu o pâlnie
        standard.
    clarinet_body_type:
      name: Tipul corpului clarinetului
      description: Indică tipul principal de construcție a corpului pentru clarinetul
        A.
    clarinet_bore_type:
      name: Tipul de alezaj al clarinetului
      description: Descrie designul alezajul clarinetului alto.
    clarinet_cap_style:
      name: Stilul pâlniei de clarinet
      description: Stilul de design al capacului inclus în ligatura și/sau produsul
        capacul pentru muștiuc de clarinet (de exemplu, inversat sau ventilat).
    clarinet_care_kit_intended_use:
      name: Utilizarea prevăzută a kitului de îngrijire a clarinetului
      description: Context principal de utilizare pentru care este conceput kitul
        (de exemplu, uscare zilnică rapidă vs. curățare/întreținere profundă).
    clarinet_included_accessories:
      name: Accesorii incluse pentru clarinet
      description: Identifică ce se află în cutia clarinetului Sib.
    clarinet_keywork_material:
      name: Material pentru clapele de clarinet
      description: Specifică materialul mecanismului clapelor clarinetului (de exemplu,
        alamă, argint nichelat, placat cu argint).
    clarinet_keywork_plating:
      name: Placarea mecanismului de clape al clarinetului
      description: Specifică finisajul/placarea clapelor (tastelor) clarinetului.
    clarinet_mouthpiece_baffle_profile:
      name: Profilul deflectorului pentru muștiucul de clarinet
      description: Descrie profilul intern al deflectorului/acoperișului muștiucului
        de clarinet care influențează luminozitatea și proiecția.
    clarinet_mouthpiece_beak_shape:
      name: Forma ciocului muștiucului de clarinet
      description: Specifică profilul/unghiul exterior al ciocului pentru confortul
        jucătorului și senzația la mușcătură.
    clarinet_mouthpiece_chamber_size:
      name: Dimensiunea camerei muștiucului de clarinet
      description: Descrie dimensiunile relative ale camerei unui muștiuc de clarinet
        (așa cum sunt specificate de producător), care pot influența culoarea tonului
        și rezistența la interpretare.
    clarinet_mouthpiece_intended_tone:
      name: Tonul dorit al muștiucului de clarinet
      description: Descrie scopul tonal general promovat pentru muștiuc.
    clarinet_mouthpiece_player_level:
      name: Nivel interpretului la muștiucul clarinetului
      description: Indică nivelul tipic al utilizatorului țintă pentru muștiuc.
    clarinet_reed_cut:
      name: Tăietura anciei de clarinet
      description: Specifică tăietura/profilul anciei (de exemplu, filat sau nefilat
        și alte stiluri de tăiere promovate), care influențează răspunsul și tonul.
    clarinet_reed_material_type:
      name: Tipul de material al anciei clarinetului
      description: Indică din ce este fabricată ancia (trestie vs. sintetică și subtipuri
        sintetice comune).
    clarinet_thumb_rest_type:
      name: Tip de suportul pentru degetul mare pe clarinet
      description: Tipul/caracteristica suportului pentru degetul mare al mâinii drepte.
    classical_guitar_string_3rd_string_type:
      name: Tipul celei de a 3-a corzi de chitară clasică
      description: Indiferent dacă coarda sol (a treia) este simplă (monofilament)
        sau înfășurată.
    classical_guitar_string_bass_winding_material:
      name: Material de înfășurare pentru basul corzilor de chitară clasică
      description: Materialul de petrecere/înfășurare folosit la corzile de bas (de
        obicei corzile 4-6).
    classical_guitar_string_set_configuration:
      name: Configurația setului de corzi ale chitarei clasice
      description: Specifică dacă produsul este un set complet sau corzi specifice
        (de obicei, pentru partea de înalte sau de bas) pentru o chitară clasică.
    clay_modeling_dough_base_material:
      name: Materialul bazei de lut și aluat de modelat
      description: Formula principală/tipul de bază pentru materialul de modelare.
    clay_modeling_dough_curing_method:
      name: Metodă de întărire pentru lut și aluatul de modelat
      description: Cum se fixează/se întărește materialul (sau rămâne reutilizabil),
        ceea ce determină uneltele necesare și cazurile de utilizare tipică.
    clay_paintability:
      name: Vopsibilitatea argilei
      description: Indică dacă suprafața de lut întărit poate fi vopsită și tipurile
        de vopsea recomandate.
    clay_primary_composition:
      name: Compoziția principală a argilei
      description: Material de bază/liant principal al cleiului uscat la aer (de exemplu,
        pe bază de hârtie, pe bază de minerale).
    clay_shooting_discipline:
      name: Disciplina de tir sportiv
      description: Identifică disciplina sau evenimentul de tir sportiv pentru care
        este destinat produsul.
    cleaner_format:
      name: Format mai curat
      description: Ambalajul/formatul produsului de curățat lamele.
    cleaner_sanitizer_intended_area:
      name: Zona destinată curățării/dezinfectantului
      description: Partea principală a instrumentului de alamă pe care produsul trebuie
        să-l curețe/dezinfecteze.
    cleaning_formula:
      name: Formulă de curățare
      description: Specifică familia principală de substanțe chimice de curățare/dezinfectare
        pentru produs (nu pentru marcă), pentru a asista siguranța, compatibilitatea
        și filtrarea utilizării.
    cleaning_task_focus:
      name: Concentrarea pe activitatea de curățenie
      description: Identifică principalele probleme de curățare pe care spălarea fără
        apă este destinată să le rezolve.
    cleanup_method:
      name: Metoda de curățare
      description: Specifică modul în care se intenționează curățarea adezivului (cât
        timp este ud) de pe mâini/scule/suprafețe.
    clear_glue_application_method:
      name: Metoda de aplicare a adezivului transparent
      description: Specifică stilul de dozare/aplicare inclus în ambalajul de adeziv
        transparent.
    clear_glue_finish_after_drying:
      name: Finisajul adezivului transparent (după uscare)
      description: Descrie aspectul adezivului după uscare/întărire (de exemplu, transparent
        vs. translucid, lucios vs. mat).
    cleat_bolt_pattern:
      name: Modelul șuruburilor plăcuței
      description: Specifică configurația crampoanelor pantofului utilizată pentru
        atașarea plăcuței, care determină compatibilitatea pedalei și a pantofului
        (de exemplu, MTB cu 2 șuruburi vs. șosea cu 3 șuruburi).
    cleat_compatibility:
      name: Compatibilitatea crampoanelor
      description: Specifică cu ce sisteme de pedale sau crampoane se potrivește husa
        de încălțăminte.
    cleat_finish:
      name: Finisajul plăcuței
      description: Specifică finisajul/acoperirea suprafeței plăcuței de susținere,
        care afectează rezistența la coroziune și aspectul.
    cleat_receptacle_system:
      name: Sistem de recepție pentru plăcuță
      description: Identifică interfața compatibilă de atașare a crampoanelor/plăcuțelor
        utilizată la pantofii de golf cu crampoane.
    cleat_release_mechanism:
      name: Mecanismul de eliberare a cramponului
      description: Specifică modul în care o plăcuță de bicicletă se decuplează de
        pedală (de exemplu, eliberare simplă sau eliberare multidirecțională).
    cleat_stud_type:
      name: Tip de crampon plăcuță
      description: Specifică construcția sau stilul de atașare a crampoanelor/plăcuțelor
        de pe talpa exterioară a pantofilor de fotbal american.
    climate_control_module_function:
      name: Funcția modulului de control al climei
      description: Specifică rolul principal al modulului în sistemul HVAC al vehiculului.
    climbing_hold_mounting_type:
      name: Tip de montare a prizei de cățărare
      description: Specifică modul în care se fixează suportul pe perete sau pe placa
        de antrenament.
    climbing_hold_type:
      name: Tipul de priză pentru escaladă
      description: Categorizează forma sau stilul de prindere care definește modul
        în care este strânsă.
    climbing_protection_device_type:
      name: Tipul dispozitivului de protecție pentru escaladă
      description: Specifică stilul dispozitivului de protecție (de exemplu, camă,
        nucă, piton), ajutând alpiniștii să aleagă rapid echipamentul corect pentru
        o anumită stâncă sau un anumit stil de cățărare.
    climbing_rope_middle_marking:
      name: Marcaj la mijlocul coardei pentru alpinism
      description: Descrie modul în care sunt identificate punctul de mijloc (și/sau
        capetele) corzii pentru a ajuta la coborârea în rapel și la coborârea în siguranță.
    climbing_rope_treatment:
      name: Tratament pentru coarda pentru alpinism
      description: Indică orice finisaj hidrofug, uscat sau protector aplicat tecii
        și/sau miezului coardei.
    climbing_rope_type:
      name: Tip de coardă de alpinism
      description: Clasifică coarda în funcție de certificarea UIAA și de utilizarea
        preconizată (de exemplu, dinamică simplă, semi-dublă, dublă, statică, coardă
        accesorie), permițând cumpărătorului să localizeze rapid coarda corectă pentru
        activitatea sa.
    climbing_safety_certifications:
      name: Certificări de siguranță la escaladă
      description: Listează standardele de siguranță la cățărare și industrială îndeplinite
        de dispozitiv.
    clip_color:
      name: Culoare clemă
      description: Culoarea principală a clemei pentru partituri muzicale.
    clip_mechanism_type:
      name: Tipul mecanismului clemei
      description: Definește mecanismul de fixare utilizat de o agrafă sau de un portofel
        de bani, ajutând cumpărătorul să aleagă între magnetic, cu arc, cu pârghie
        și alte stiluri.
    clip_style:
      name: Stilul clemei
      description: Identifică mecanismul specific de fixare a clemei utilizat pentru
        atașarea suportului, oferind informații de compatibilitate (de exemplu, clemă
        crocodil, carabină).
    clipper_motor_technology:
      name: Tehnologia motorului mașinii de tuns
      description: Identifică designul de motor utilizat în mașina de tuns, afectând
        puterea, zgomotul, durabilitatea și întreținerea.
    closet_configuration:
      name: Configurația dulapului
      description: Definește forma sau aspectul general al sistemului dressingului
        tip cameră (de exemplu, în formă de L, în formă de U, insulă).
    closing_mechanism:
      name: Mecanism de închidere
      description: Specifică acțiunea de închidere a sertarului, cum ar fi standard,
        închidere ușoară, închidere automată sau deschidere prin apăsare.
    cloth_construction:
      name: Construcția țesăturii
      description: Indică țesătura sau finisajul țesăturii care afectează viteza și
        durabilitatea (de exemplu, lână pieptănată vs. lână).
    cloth_thickness:
      name: Grosimea țesăturii
      description: Indică clasa de grosime/greutate a lavetei de lustruit.
    club_head_material:
      name: Materialul capului de crosă
      description: Specifică materialul principal utilizat în construcția capului
        crosei.
    clutch_hydraulic_system_type:
      name: Tipul sistemului hidraulic al ambreiajului
      description: Indică compatibilitatea acționării ambreiajului/sistemului hidraulic
        (de exemplu, ambreiaj hidraulic vs. aplicații cu cablu de conversie).
    clutch_line_connection_type:
      name: Tipul de conexiune pentru conducta ambreiajului
      description: Specifică interfața de conectare/montare utilizată de conducta
        ambreiajului (importantă pentru compatibilitatea cu cilindrii principali/secundari
        și conductele fixe).
    clutch_pressure_plate_actuation_type:
      name: Tipul de acționare a discului de presiune al ambreiajului
      description: Indică dacă ambreiajul este eliberat printr-un mecanism de eliberare
        de tip împingere sau de tip tragere (acționare prin arc cu diafragmă).
    clutch_pressure_plate_release_mechanism_type:
      name: Tipul mecanismului de eliberare a plăcii de presiune a ambreiajului
      description: Stilul interfeței de eliberare/acționare utilizat de placa de presiune.
    clutch_pressure_plate_surface_type:
      name: Tipul suprafeței plăcii de presiune a ambreiajului
      description: Stilul suprafeței de contact cu frecare a plăcii de presiune.
    clutch_slave_cylinder_connection_type:
      name: Tipul de conexiune a cilindrului receptor al ambreiajului
      description: Interfață de conectare a liniei hidraulice pe cilindrul secundar
        (port filetat, racord rapid, banjo etc.).
    clutch_slave_cylinder_mounting_type:
      name: Tipul de montare al cilindrului secundar al ambreiajului
      description: Cum se montează cilindrul secundar pe transmisie/carcasa pistonului
        (de exemplu, prin înșurubare, prin clipsare, prin fixare concentrică integrată).
    coating_type:
      name: Tipul de acoperire
      description: Identifică orice înveliș exterior, stropire sau glazură aplicată
        pe batonul de cereale (de exemplu, ciocolată, iaurt).
    cocking_mechanism:
      name: Mecanism de armare
      description: Specifică metoda sau dispozitivul principal utilizat pentru armarea
        sau dezarmarea coardei arbaletei.
    cocktail_garnish_form:
      name: Formă garnitură pentru cocktailuri
      description: Descrie modul în care garnitura este prezentată/procesată pentru
        utilizare (de exemplu, proaspătă vs. deshidratată).
    cocktail_mix_variety:
      name: Varietate de mixuri de cocktailuri
      description: Indică cocktailul specific pe care mixul este destinat să îl creeze
        (de exemplu, Margarita, Mojito, Piña Colada).
    cocktail_napkin_features:
      name: Caracteristici ale șervețelelor de cocktail
      description: Evidențiază caracteristicile funcționale, practice și ecologice
        ale șervețelelor de cocktail.
    cocktail_pick_tip_style:
      name: Stilul vârfului bețișorului pentru cocktailuri
      description: Descrie forma vârfului/caracteristicile folosite pentru a perfora
        sau a ține garnituri.
    cocktail_pick_top_handle_style:
      name: Stil parte superioară/mâner al bețișorului de cocktail
      description: Descrie partea superioară decorativă sau forma mânerului folosită
        pentru prindere sau prezentare.
    cocktail_type:
      name: Tipul de cocktail
      description: Indică rețeta sau stilul specific de cocktail reprezentat de produsul
        premixat (de exemplu, Margarita, Negroni, Piña Colada).
    cocktail_umbrella_handle_pick_material:
      name: Material pentru mâner/bețișor umbrelă cocktail
      description: Materialul porțiunii de băț/bețișor (cu excepția copertinei) a
        umbrelei de cocktail.
    cocoa_processing_method:
      name: Metoda de procesare a cacauei
      description: Specifică modul în care a fost procesată pudra de cacao (de exemplu,
        naturală, olandeză procesată, cacao neagră).
    cocoa_product_form:
      name: Forma produsului din cacao
      description: Definește forma fizică în care este vândut produsul de cacao.
    coconut_husk_status:
      name: Starea cojii de nucă de cocos
      description: Indică măsura în care coaja sau învelișul exterior al nucii de
        cocos a fost îndepărtat, afectând ușurința în utilizare, depozitare și deșeuri.
    coconut_maturity_stage:
      name: Stadiu de maturitate pentru nucile de cocos
      description: Identifică stadiul de dezvoltare al nucilor de cocos la momentul
        recoltării, care influențează puternic aroma, conținutul de apă și utilizarea
        culinară (de exemplu, băut vs. gătit).
    coconut_oil_refinement_type:
      name: Tipul de rafinare a uleiului de cocos
      description: Specifică rafinarea sau gradul uleiului de cocos, de exemplu, virgin,
        rafinat, MCT, fracționat.
    coconut_preparation_form:
      name: Formă de preparare a nucii de cocos
      description: Specifică modul în care nuca de cocos este preparată fizic sau
        tăiată (întreagă, feliată, mărunțită, pasată etc.), ajutând cumpărătorul să
        găsească rapid formatul necesar pentru rețete sau gustări.
    coffee_bean_species:
      name: Specii de boabe de cafea
      description: Specifică speciile de boabe de cafea utilizate în produs.
    coffee_beverage_variety:
      name: Varietate de băuturi de cafea
      description: Clasifică băuturile de cafea gata de consum sau mixate în funcție
        de stil.
    coffee_processing_method:
      name: Metoda de procesare a cafelei
      description: Indică tehnica de procesare post-recoltare utilizată pentru boabele
        de cafea.
    coil_material:
      name: Materialul bobinei
      description: Specifică materialul principal sau tipul de plasă utilizat în bobina
        de încălzire, influențând aroma, longevitatea și compatibilitatea cu controlul
        temperaturii.
    coil_spring_design:
      name: Designul arcului elicoidal
      description: Specifică designul pentru rată/formă al arcului elicoidal care
        afectează caracteristicile în cursă.
    coil_spring_finish_coating:
      name: Finisaj/acoperire arc elicoidal
      description: Finisaj de suprafață sau acoperire aplicată pentru protecție împotriva
        coroziunii.
    coil_spring_material:
      name: Materialul arcului elicoidal
      description: Materialul/compoziția principală a arcului elicoidal.
    coil_system_type:
      name: Tipul sistemului de bobine
      description: Detaliază sistemul specific de bobine sau arcuri utilizat în saltelele
        aplicabile, cum ar fi arcuri încapsulate sau arcuri Bonnell.
    coil_type:
      name: Tipul bobinei
      description: Descrie construcția rezistenței sau tehnologia utilizată, afectând
        producția de vapori și aroma.
    coin_grade_numismatic:
      name: Gradul monedei (numismatic)
      description: Gradul standardizat al monedei (de exemplu, scala Sheldon sau grad
        adjectival).
    coin_strike_or_finish:
      name: Turnarea sau finisarea monedei
      description: Tipul de turnare sau de finisare a monedei (de exemplu, turnare
        comercială, proof).
    coin_strike_type:
      name: Tipul de turnare a monedei
      description: Descrie tipul de turnare/finisare a monedei (de exemplu, proof,
        turnare comercială).
    collar_style:
      name: Stilul gulerului
      description: Definește designul gulerului sau al decolteului de pe articolul
        de îmbrăcăminte.
    collectible_gun_accessories_included:
      name: Accesorii de colecție pentru arme incluse
      description: Listează accesoriile și documentația incluse odată cu arma de colecție
        (de exemplu, toc, carcasă, baionetă, documente).
    collectible_gun_firing_mechanism:
      name: Mecanism de tragere pentru arma de colecție
      description: Specifică tipul mecanismului de aprindere/declanșare al armei de
        foc de colecție (în special pentru piese antice și istorice).
    collectible_knife_blade_finish:
      name: Finisaj de lamă de cuțit de colecție
      description: Descrie finisajul/tratamentul suprafeței lamei pentru aspect (și
        uneori pentru rezistență la coroziune).
    color_code_system:
      name: Sistem de coduri de culori
      description: Identifică sistemul de coduri de culori utilizat pentru referința
        numerică culori a firului (de exemplu, DMC, Anchor), dacă este cazul.
    color_coding_standard:
      name: Standard de codificare color
      description: Indică dacă placa respectă un cod internațional de culori (de exemplu,
        IWF sau IPF) sau o altă schemă.
    color_effect:
      name: Efect de culoare
      description: Specifică tehnici sau efecte colorate speciale aplicate extensiilor
        de păr.
    color_family:
      name: Familie de culori
      description: Familie de culori de nivel înalt pentru cerneala Sumi (utilă atunci
        când culoarea este prea granulară, de exemplu, negru cald vs. negru-albăstrui).
    color_finish:
      name: Finisaj de culoare
      description: Specifică finisajul componentelor vizibile ale apărătorii de mână
        (de exemplu, mat vs. lucios) atunci când doar culoarea este insuficientă.
    coloring_finish:
      name: Finisaj de colorare
      description: Specifică finisajul vizual sau efectul special produs prin colorare,
        cum ar fi metalic sau neon.
    comb_material:
      name: Materialul pieptenului
      description: Materialul pieptenului pentru muzicuță (corpul care formează camerele
        de aer).
    comb_type:
      name: Tipul pieptenului
      description: Clasifică pieptenii pentru îngrijirea cailor după stilul lor funcțional
        principal (de exemplu, țesală, pieptene pentru coamă, pieptene de tras), ajutând
        cumpărătorul să găsească rapid instrumentul potrivit pentru nevoile specifice
        de îngrijire.
    combat_shorts_cut_style:
      name: Stil de croială pentru pantaloni scurți de luptă
      description: Indică stilul de croială sau de potrivire specific pantalonilor
        scurți de luptă (de exemplu, talie înaltă, croială retro, compresie).
    comic_creator_role:
      name: Rolul de creator de benzi desenate
      description: Specifică rolul de creator acreditat relevant pentru listare (de
        exemplu, scriitor, artist).
    commemorative_coin_finish:
      name: Finisajul monedei comemorative
      description: Descrie tipul de turnare/finisare a unei monede comemorative.
    commemorative_coin_mint_mark:
      name: Marcaj de turnare monedă comemorativă
      description: Indică marcajul de turnare (sau absența sa) de pe monedă.
    commemorative_subject:
      name: Subiect comemorativ
      description: Subiect comemorat principal (eveniment, persoană, loc, aniversare,
        organizație etc.).
    commercial_vehicle_class:
      name: Clasa vehiculului comercial
      description: Clasa de reglementare/industrie bazată pe GVWR utilizată pentru
        a descrie clasa de greutate a unui vehicul comercial, pentru navigare și filtrare.
    compass_damping_medium:
      name: Mediu de estompare busolă
      description: Specifică mediul utilizat pentru stabilizarea mișcării acului în
        interiorul capsulei busolei.
    compass_illumination_type:
      name: Tip de iluminare busolă
      description: Specifică modul în care marcajele busolei sunt vizibile în lumină
        slabă (de exemplu, vopsea luminescentă, tritiu, iluminare de fundal cu LED).
    compass_mounting_style:
      name: Stilul de montare a busolei
      description: Descrie modul în care este transportată, purtată sau instalată
        busola.
    compass_scale_units:
      name: Unități de măsură busolă
      description: Identifică unitățile de măsură (grade, mils sau ambele) marcate
        pe carcasa busolei.
    compatible_abs_system:
      name: Sistem ABS compatibil
      description: Indică dacă pompa principală de frână este destinată vehiculelor
        echipate cu ABS.
    compatible_adapter_brand:
      name: Marcă adaptor compatibil
      description: Identifică marca capului crosei de golf al cărei adaptor este preconfigurat
        să se potrivească tija.
    compatible_airbag_system_type:
      name: Tipul de sistem airbag compatibil
      description: Indică generația/setul de caracteristici ale sistemului airbag
        cu care este compatibilă piesa (de exemplu, cu o singură treaptă vs. cu două
        trepte).
    compatible_amplifier_fit_method:
      name: Metodă de montare a amplificatorului compatibilă
      description: Indică modul în care este definită compatibilitatea pentru cutie/carcasă
        (potrivire universală vs. potrivire specifică modelului vs. potrivire în funcție
        de dimensiuni).
    compatible_apparatus:
      name: Aparat compatibil
      description: Specifică aparatul sau activitatea de gimnastică pentru care sunt
        proiectate prizele.
    compatible_archery_tool:
      name: Instrument de tir cu arcul compatibil
      description: Indică unealta sau echipamentul principal de tir cu arcul cu care
        este proiectat să funcționeze accesoriul.
    compatible_axle_size:
      name: Dimensiune axă compatibilă
      description: Specifică diametrul butucului/axei sau standardul pentru fir la
        care este proiectată să se potrivească puntea pentru pedale (de exemplu, 10
        mm/3⁄8 in, 14 mm, 3/8 in 26 TPI).
    compatible_axle_type:
      name: Tip de axă compatibilă
      description: Identifică standardele de atașare a punții spate pe care le acceptă
        dispozitivul de antrenament, cum ar fi cu eliberare rapidă sau dimensiune
        între axe.
    compatible_axle_weight_rating:
      name: Clasificare greutate pe axă compatibilă
      description: Specifică greutatea nominală pe axul remorcii (capacitatea per
        axă) pentru care este proiectat ansamblul de frânare al remorcii.
    compatible_bait_type:
      name: Tip de momeală compatibilă
      description: Identifică tipurile de momeală pentru pescuit cu care este compatibil
        burghiul pentru momeală, astfel încât pescarii să poată alege un instrument
        care se potrivește cu momeala lor preferată.
    compatible_bass_scale_length:
      name: Lungimea scalei de bas compatibile
      description: Indică lungimile scalei de bas pentru care este destinat setul
        de corzi (important pentru lungimea și potrivirea corectă a înfășurării).
    compatible_battle_top_system:
      name: Sistem de top de luptă compatibil
      description: Identifică ecosistemul sau seria de produse pentru topuri de luptă
        pentru care este proiectat topul (folosit pentru a asigura compatibilitatea
        cu piese și arene).
    compatible_bb_size:
      name: Dimensiune BB compatibilă
      description: Indică diametrul gloanțelor de airsoft pe care le acceptă produsul.
    compatible_bed_frame_style:
      name: Stil cadru de pat compatibil
      description: Specifică stilul de pat sau cadru pentru care este conceput accesoriul.
    compatible_bicycle_tire_type:
      name: Tip de anvelopă de bicicletă compatibilă
      description: Specifică ce tipuri de anvelope de bicicletă poate repara sau sigila
        produsul.
    compatible_bike_component:
      name: Componentă de bicicletă compatibilă
      description: Specifică componenta bicicletei pe care unealta sau produsul este
        proiectat să o depaneze.
    compatible_billiard_game:
      name: Joc de biliard compatibil
      description: Identifică formatele de joc de biliard pentru care este proiectat
        stativul, asigurându-i clientului posibilitatea de a selecta un stativ care
        se potrivește jocului său.
    compatible_billiard_table_size:
      name: Dimensiunea mesei de biliard compatibile
      description: Specifică lungimile standard ale mesei pentru care este proiectată
        husa, ajutându-i pe cumpărători să aleagă o husă de dimensiunea potrivită
        pentru masa lor de biliard.
    compatible_bit_type:
      name: Tip de burghiu compatibil
      description: Tipuri de biți cu care poate fi utilizată apărătoarea.
    compatible_blade_hosel:
      name: Hosel de lamă compatibil
      description: Indică tipul de hosel/con de lamă pe care îl acceptă axul, asigurând
        că axul și lama se potrivesc corect.
    compatible_blade_system:
      name: Sistem de lamă compatibil
      description: 'Indică sistemul/formatul de lame de schimb pe care îl acceptă
        cuțitul (de exemplu, lame standard hobby #11, lame cu segmente detașabile).'
    compatible_boat_weaving_shuttle_loom:
      name: Război de țesut compatibil cu suveica tip barcă
      description: Cu ce tipuri de război de țesut funcționează suveica tip barcă.
    compatible_bobbin_type:
      name: Tip de bobină compatibil
      description: Indică ce tip de bobină/rolă este proiectată să utilizeze suveica
        tip barcă.
    compatible_bottle_mouth:
      name: Gura de sticlă compatibilă
      description: Tipul sau diametrul gurii de sticlă pentru care este proiectat
        paiul sau capacul.
    compatible_bow_attachment_system:
      name: Sistem compatibil atașament arc
      description: Indică interfața membrului sau a accesoriului pentru care este
        proiectată piesa (de exemplu, ILF, fixare cu șurub, detașare rapidă).
    compatible_bow_crossbow_type:
      name: Tip de arc/arbaletă compatibil
      description: Indică stilul de arc sau arbaletă căruia i se potrivește accesoriul.
    compatible_brake_fluid:
      name: Lichid de frână compatibil
      description: Specificațiile DOT ale lichidului de frână cu care sunt proiectate
        să fie compatibile garniturile/materialele cilindrului principal de frână.
    compatible_brake_pad:
      name: Plăcuțe de frână compatibile
      description: Indică pentru ce tipuri de plăcuțe de frână este aprobat discul,
        asigurând siguranța și uzura optimă.
    compatible_brake_service_system:
      name: Sistem de service pentru frâne compatibil
      description: Specifică dacă piesa este destinată pentru frâne cu disc, frâne
        cu tambur sau ambele.
    compatible_brake_system:
      name: Sistem de frânare compatibil
      description: Specifică note cheie de compatibilitate a sistemului pentru utilizarea
        lichidului de frână.
    compatible_brake_type:
      name: Tip de frână compatibil
      description: Specifică tipul de frână cu care este compatibil raftul, cum ar
        fi disc sau jantă.
    compatible_brass_instrument_finish:
      name: Finisaj compatibil pentru instrument de alamă
      description: Specifică finisajele instrumentelor de suflat pe care se poate
        utiliza dispozitivul de curățare în siguranță fără a deteriora finisajul.
    compatible_building_toy_system:
      name: Sistem de jucării de construcție compatibil
      description: Indică cu ce sistem/standard de construcție este compatibilă jucăria
        (sau o dimensiune echivalentă), cum ar fi compatibil cu LEGO sau un sistem
        proprietar.
    compatible_capo_fretboard_radius:
      name: Raza compatibilă tastieră capodastru
      description: Specifică raza/profilul tastierei pentru care este proiectat capodastrul,
        pentru contact optim și stabilitate a acordării.
    compatible_capo_number_of_strings:
      name: Număr de corzi cu care este compatibil capodastrul
      description: Indică numărul de corzi pe care este proiectat să le prindă capo-ul
        (util pentru instrumente cu 6, 7, 8, 12 corzi și pentru instrumente speciale).
    compatible_cardio_machine_type:
      name: Tip de aparat cardio compatibil
      description: Identifică tipul de aparat cardio pentru care este proiectat accesoriul
        sau piesa.
    compatible_chain_link_type:
      name: Tip de zale compatibil
      description: Identifică stilul zalei lanțului pe care îl acceptă unealta (standard,
        semi-zale, zale rapide etc.).
    compatible_chain_size:
      name: Dimensiune lanț compatibil
      description: Specifică lățimea lanțului sau standardele de pas (de exemplu,
        1/8 inch, 3/32 inch) pe care le acceptă unealta.
    compatible_chain_width:
      name: Lățime compatibilă a lanțului
      description: Indică dimensiunea lanțului cu care este proiectată roata liberă
        să funcționeze.
    compatible_chip_denomination:
      name: Denumire cip compatibilă
      description: Indică denumirile cipurilor pentru care tava/cutie include poziții
        etichetate sau dedicate (sau pe care trebuie să le organizeze).
    compatible_clarinet_mouthpiece_ligature:
      name: Ligatură compatibilă pentru muștiuc de clarinet
      description: Identifică standardul de potrivire a ligaturii sau notele de compatibilitate
        pentru muștiuc.
    compatible_classical_guitar_string_scale_length:
      name: Lungimea de scală corzi cu care este compatibilă chitara clasica
      description: Compatibilitatea dorită a lungimii scalei chitarei/corzilor pentru
        set.
    compatible_clay_target_size:
      name: Dimensiune țintă de lut compatibilă
      description: Listează dimensiunile sau formele țintei de lut pe care aruncătorul
        le poate accepta, pentru o potrivire și performanță corespunzătoare.
    compatible_cleat_system:
      name: Sistem de crampoane compatibil
      description: Specifică interfața crampoanelor sau modelul de șuruburi pe care
        le acceptă pedala, astfel încât cicliștii să își poată potrivi pantofii cu
        sistemul corect.
    compatible_clipless_pedal_system:
      name: Sistem de pedale fără clipuri compatibil
      description: Identifică standardul specific pentru pedale/crampoane fără clipuri
        cu care produsul este proiectat să se interacționeze.
    compatible_clutch_type:
      name: Tip de ambreiaj compatibil
      description: Compatibilitatea interfeței ambreiajului pentru volantă (unde este
        cazul).
    compatible_coffee_pod_system:
      name: Sistem de capsule de cafea compatibil
      description: Specifică aparatul de cafea sau sistemul de preparare pentru care
        sunt proiectate padurile sau capsulele.
    compatible_construction_set_system:
      name: Sistem de set de construcție compatibil
      description: Indică cu ce sistem de construcție/ecosistem de marcă este compatibil
        setul (de exemplu, compatibil cu LEGO, compatibil cu DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Stativ/cuier compatibil pentru clarinet contrabas
      description: Indică interfața stativ/cuier sau stilul de sprijin necesar.
    compatible_coolant_chemistry:
      name: Compoziție chimică agent de răcire compatibilă
      description: Specifică cu ce familii chimice de agenți de răcire este formulat
        aditivul să fie compatibil.
    compatible_cooling_system_material:
      name: Material compatibil pentru sistemul de răcire
      description: Specifică pentru ce sisteme/materiale de răcire este sigură spălarea
        radiatorului (de exemplu, radiatoare din aluminiu, sisteme cu metale mixte).
    compatible_crib_format:
      name: Format de pătuț compatibil
      description: Definește dimensiunea generală sau categoria de formă a saltelei
        sau cearșafului pentru care este conceput accesoriul.
    compatible_cross_stitch_fabric_count:
      name: Număr de materiale compatibile pentru cusături în cruce
      description: Numere de materiale recomandate pentru coaserea modelului.
    compatible_cross_stitch_frame:
      name: Cadru compatibil de cusături în cruce
      description: Precizează cu ce este conceput cadrul să fie utilizat (utilizare
        manuală, suport de masă, suport de podea sau universal).
    compatible_crossbar:
      name: Bară transversală compatibilă
      description: Compatibilitatea stativului cu barele transversale ale acoperișului
        vehiculului (dacă este montată pe acoperiș), inclusiv forma barei transversale/standardele
        de profil ale barei transversale.
    compatible_cycling_cleat:
      name: Crampoane de ciclism compatibile
      description: Specifică sistemul de crampoane sau pedale cu care sunt proiectați
        să funcționeze pantofii de ciclism.
    compatible_cymbal_size:
      name: Dimensiune cimbale compatibilă
      description: Specifică diametrul cinelului dorit (sau maxim) pentru care este
        proiectat modelul; aceasta reprezintă compatibilitatea pentru dimensiunile
        cinelului, nu diametrul exterior al carcasei.
    compatible_device_type:
      name: Tip de dispozitiv compatibil
      description: Indică tipul de dispozitiv pentru care este destinat suportul (de
        exemplu, monitor/televizor, tabletă, smartphone, player DVD portabil).
    compatible_dock_structure_type:
      name: Tip de structură de andocare compatibilă
      description: Construcția de andocare pe care sunt proiectate să se monteze treptele.
    compatible_dough_type:
      name: Tip de dispozitiv compatibil
      description: Specifică tipurile/mărcile de aluat cu care sunt proiectate să
        funcționeze uneltele (de exemplu, plastilină standard, lut de modelat).
    compatible_drawing_ink_surface:
      name: Suprafață de cerneală de desen compatibilă
      description: Indică suprafețele/substraturile recomandate pentru cele mai bune
        performanțe.
    compatible_drivetrain_brand:
      name: Marcă de transmisie compatibilă
      description: Enumeră sistemul de transmisie sau de frânare cu care este proiectat
        să funcționeze cablul.
    compatible_drivetrain_speeds:
      name: Viteze sistem de transmisie compatibil
      description: Specifică numărul de viteze ale sistemului de transmisie (de exemplu,
        10 viteze) pentru care funcționează pedalierul sau angrenajul.
    compatible_equipment:
      name: Echipament compatibil
      description: Specifică tipul de echipament pentru sporturi de iarnă pe care
        este proiectată menghina să îl susțină.
    compatible_evap_system:
      name: Sistem EVAP compatibil
      description: Indică dacă capacul rezervorului de combustibil este proiectat
        pentru a îndeplini cerințele sistemului EVAP (de exemplu, etanșare conform
        specificațiilor OEM) și pentru a rata de mesaje pentru verificarea motorului.
    compatible_exercise_bike_style:
      name: Stil de bicicletă de fitness compatibilă
      description: Indică stilurile de biciclete de fitness pentru care este proiectat
        accesoriul sau piesa de schimb.
    compatible_fencing_weapon:
      name: Armă de scrimă compatibilă
      description: Specifică pentru ce armă sau disciplină de scrimă este destinată
        jacheta sau lameul.
    compatible_fiber_type:
      name: Tip de fibră compatibil
      description: Tipuri principale de fibre pe care daracele cu tambur trebuie să
        le proceseze eficient.
    compatible_fin_box_system:
      name: Sistem de cutie pentru înotătoare compatibil
      description: Identifică cutia pentru labe sau sistemul de montare pentru care
        laba este proiectată, ajutând surferii să achiziționeze labe compatibile cu
        placa lor de surf (de exemplu, FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Raza tastaturii compatibile
      description: Specifică raza grifului (plată, curbată sau compusă) pe care este
        proiectat să se potrivească capodastrul, pentru o presiune uniformă și un
        zgomot redus.
    compatible_finish_type:
      name: Tip de finisaj compatibil
      description: Indică tipurile de finisaje ale instrumentelor pentru care spray-ul
        este declarat sigur.
    compatible_fishing_reel_type:
      name: Tip de mulinetă de pescuit compatibilă
      description: Specifică stilul de mulinetă pentru care accesoriul este conceput
        să se potrivească sau cu care funcționează (de exemplu, rotativă, aruncare
        momeală, muscă).
    compatible_fly_line_weight:
      name: Greutate compatibilă a firului de pescuit la muscă
      description: Indică greutățile firului de pescuit la muscă AFTMA pe care bobina
        este proiectată să le suporte.
    compatible_flywheel_type:
      name: Tip de volant compatibil
      description: Specifică tipul de volantă cu care va fi folosită placa de presiune
        a ambreiajului.
    compatible_football_kick_type:
      name: Tip de lovitură de fotbal compatibilă
      description: Identifică situațiile de lovire pe care produsul este conceput
        să le accepte (de exemplu, lovitura de începere, lovitură liberă), ajutând
        sportivii să găsească rapid echipamentul adecvat.
    compatible_fuel_system_type:
      name: Tip de sistem de alimentare compatibil
      description: Specifică sistemul de alimentare cu combustibil pentru care este
        proiectat aparatul de curățat.
    compatible_gas_type:
      name: Tip de gaz compatibil
      description: Identifică tipul de gaz comprimat pentru stocarea căruia este proiectat
        rezervorul de aer pentru paintball.
    compatible_gel_wax_additives:
      name: Aditivi compatibili pentru ceară gel
      description: Specifică tipurile de aditivi compatibili cu această ceară gel
        (de exemplu, tip vopsea, integrat).
    compatible_glaze_layering:
      name: Stratificare a glazurii compatibilă
      description: Dacă glazura este destinată a fi stratificată cu alte glazuri,
        pentru a obține diverse efecte.
    compatible_golf_bag_type:
      name: Tip de geantă de golf compatibil
      description: Indică în ce format de sac de golf se potrivește carcasa sau husa.
    compatible_ground_polarity:
      name: Polaritate compatibilă la masă
      description: Indică dacă regulatorul de tensiune este destinat sistemelor electrice
        de vehicul cu masă negativă sau pozitivă (sau dacă nu este sensibil la polaritate).
    compatible_guitar_body_shape:
      name: Formă compatibilă a corpului de chitară
      description: Indică ce corp/formă de chitară este concepută să se potrivească
        cu carcasa.
    compatible_guitar_case:
      name: Carcasă de chitară compatibilă
      description: Specifică în ce stiluri de carcase de chitară este proiectat umidificatorul
        să se potrivească și să funcționeze corect.
    compatible_guitar_scale_length:
      name: Lungimea diapazonului de chitară compatibilă
      description: Indică lungimile scalei de chitară pentru care se potrivește setul
        de corzi (pe baza lungimii de înfășurare/lungimii totale).
    compatible_gun_platform:
      name: Platformă de arme compatibilă
      description: Specifică platforma de operare sau sursa de alimentare cu care
        este compatibil produsul (de exemplu, AEG, GBB, HPA).
    compatible_hair_length:
      name: Lungime a părului compatibilă
      description: Specifică lungimea sau volumul maxim al părului pe care îl poate
        acomoda confortabil articolul pentru cap.
    compatible_head_and_neck_restraint_system:
      name: Sistem compatibil de reținere a capului și gâtului
      description: Indică dacă casca include puncte de ancorare și/sau este compatibilă
        cu sistemele de reținere a capului și gâtului (de exemplu, HANS), inclusiv
        starea includere/instalare a stâlpului de ancorare.
    compatible_helmet_certification_standard:
      name: Standard de certificare pentru cască compatibil
      description: Indică orice standard sau context de certificare de siguranță pentru
        cască pe care accesoriul este conceput să îl accepte (de exemplu, foile adezive
        pentru curse fac adesea referire la reguli specifice de sancționare).
    compatible_helmet_shell_size:
      name: Dimensiunea carcasei de cască compatibilă
      description: Indică dimensiunile carcasei căștii pentru care se potrivește o
        piesă interioară de schimb (dimensiunile carcasei se potrivesc adesea cu intervale
        de dimensiuni precum XS-S, M, L-XL).
    compatible_helmet_size:
      name: Dimensiune de cască compatibilă
      description: Indică dimensiunea căștii cu care este compatibilă masca de față.
    compatible_helmet_type:
      name: Tip de cască compatibil
      description: Categoria de cască cu care este conceput suportul de gât.
    compatible_hitch_receiver_size:
      name: Dimensiune receptor cuplaj compatibil
      description: Dimensiunile orificiului receptor de cuplare pentru care este proiectat
        accesoriul (pentru accesoriile pentru suport montate prin cuplare).
    compatible_hook_size:
      name: Dimensiune de croșetă compatibilă
      description: Sistemele de dimensiuni ale croșetei și/sau intervalul de dimensiuni
        pentru care este proiectat organizatorul (de exemplu, dimensiuni în litere/cifre
        americane, interval în mm).
    compatible_horse_coat_type:
      name: Tip de blană de cal compatibilă
      description: Specifică caracteristicile blănii calului pentru care este cel
        mai potrivit aparatul pentru îndepărtarea părului în exces (de exemplu, blană
        groasă de iarnă sau blană sensibilă).
    compatible_host_platform:
      name: Platformă găzduită compatibilă
      description: Specifică cu ce platformă gazdă sau tipuri de dispozitive este
        compatibil controlerul tip pad (de exemplu, Windows, macOS, iOS, Android)
        sau dacă poate funcționa independent, fără un computer.
    compatible_inflation_gas:
      name: Gaz de umflare compatibil
      description: Specifică cu ce este destinat să fie umflat balonul (aer, heliu
        sau oricare dintre acestea).
    compatible_injection_type:
      name: Tip de injecție compatibil
      description: Indică sistemul de injecție a combustibilului pentru care este
        proiectat produsul.
    compatible_instrument_surface_material:
      name: Suprafață/material compatibil cu instrumentul
      description: Indică suprafețele/materialele instrumentului pe care este destinată
        utilizarea soluției de lustruit.
    compatible_intercom_system:
      name: Sistem de interfon compatibil
      description: Indică disponibilitatea/compatibilitatea căștii pentru montarea
        sau instalarea unui sistem de interfon/comunicare pentru cască.
    compatible_interior_material:
      name: Material interior compatibil
      description: Indică materialele din interiorul vehiculului pentru care soluția
        de îndepărtare a petelor este sigură/eficientă (de exemplu, covor, tapițerie
        din material textil, piele, vinil).
    compatible_kayak_type:
      name: Tip de caiac compatibil
      description: Listează stilurile generale de caiace pe care este proiectat să
        se monteze kitul de vele.
    compatible_license_plate_hole_pattern:
      name: Model compatibil de orificiu pentru placa de identificare
      description: Specifică configurația orificiului de montare acceptat de suport/montură
        (pe partea vehiculului și/sau pe partea plăcii).
    compatible_license_plate_size:
      name: Dimensiune compatibilă pentru placa de identificare
      description: Indică mărimea/dimensiunile regionale ale plăcii de identificare
        pentru care se potrivește montura/suportul.
    compatible_loom:
      name: Război de țesut compatibil
      description: Specifică tipurile de război de țesut cu care este destinată să
        fie utilizată melița pentru țesut plat.
    compatible_loom_type:
      name: Tip de război de țesut compatibil
      description: Indică configurația de țesut cu care este destinată utilizarea
        meliței (de exemplu, războaie de țesut rigide cu pasetă vs. războaie de tapiserie).
    compatible_machine_type:
      name: Tip de mașinărie compatibil
      description: Indică tipul de configurație de matlasare cu care este proiectat
        să lucreze cadrul (matlasare manuală, mașină de cusut internă, mașină de matlasat
        cu braț lung).
    compatible_mast_type:
      name: Tip de catarg compatibil
      description: 'Specifică diametrele catargului pentru care este proiectată vela:
        diametru redus (RDM), diametru standard (SDM) sau ambele.'
    compatible_model_system_train_scale:
      name: Sistem model compatibil (scală de tren)
      description: Specifică scara/sistemul de model de tren la care se potrivește
        accesoriul, atunci când este cazul (de exemplu, HO, N, O).
    compatible_mounting_surface:
      name: Suprafață de montare compatibilă
      description: Suprafața sau obiectul pe care este concepută clema să se fixeze.
    compatible_mouthpiece_patch:
      name: Petic compatibil pentru muștiuc
      description: Indică dacă muștiucul este conceput pentru utilizare cu pernuțe/petice
        pentru muștiuc și intervalul de grosimi sugerat pentru petice.
    compatible_mouthpiece_type:
      name: Tip de catarg compatibil
      description: Indică tipul/tija muștiucului pe care este proiectat să îl utilizeze
        melofonul (de obicei, receptoare de tip corn francez sau trompetă, în funcție
        de model).
    compatible_neck_profile_width:
      name: Profil/lățime compatibilă a gâtului
      description: Indică profilul/clasa de lățime a gâtului chitarei pentru care
        este proiectat capodastrul (de exemplu, electrică îngustă vs. clasică lată).
    compatible_needle_size:
      name: Dimensiune de ac compatibilă
      description: Indică tipurile/dimensiunile de ac pentru care este destinată carcasa
        (de exemplu, broderie, tapiserie, lungimi de ace de cusut manual).
    compatible_needle_system:
      name: Sistem de ace compatibil
      description: Sistemele de ace cu care mașina este compatibilă (de exemplu, 130/705H).
    compatible_parking_brake_mechanism:
      name: Mecanism de frână de parcare compatibil
      description: Indică dacă etrierul este proiectat să funcționeze cu un mecanism
        integrat de frână de parcare.
    compatible_pedal_instrument_type:
      name: Tip de instrument cu pedală compatibil
      description: Specifică cu ce este destinată utilizarea pedalei (de exemplu,
        pian digital, claviatură/sintetizator, controler MIDI).
    compatible_pedal_type:
      name: Tip de pedală compatibil
      description: Indică stilul sau sistemul de pedale pentru care este concepută
        cureaua sau clema (de exemplu, platformă, SPD, Look Keo).
    compatible_pin_type:
      name: Tip de știft compatibil
      description: Cu ce tip de pini este conceput să fie folosit covorașul (sau dacă
        este compatibil cu pini).
    compatible_pipe_filter_size:
      name: Dimensiune filtru conductă compatibil
      description: Indică dimensiunea sau stilul filtrului pe care conducta este proiectată
        să îl accepte (sau indică faptul că nu este necesar niciun filtru).
    compatible_plate_size:
      name: Dimensiune de placă compatibilă
      description: Dimensiuni ale plăcii balistice sau dimensiuni standard pe care
        le poate accepta vesta.
    compatible_play_vehicle_scale:
      name: Scara vehiculului de jucărie compatibilă
      description: Indică scara jucăriei pentru care este proiectat accesoriul (de
        exemplu, 1:64), îmbunătățind potrivirea/compatibilitatea pentru colecționari
        și sisteme de urmărire.
    compatible_playing_surface:
      name: Suprafață de joc compatibilă
      description: Indică tipul de teren sau suprafață de joc pentru care sunt proiectați
        pantofii de fotbal american.
    compatible_pole_dimensions:
      name: Dimensiuni compatibile ale stâlpului
      description: Specifică dimensiunea secțiunii transversale a stâlpului la care
        se potrivește accesoriul.
    compatible_pole_shape:
      name: Formă de stâlp compatibilă
      description: Specifică forma secțiunii transversale a stâlpului sau coloanei
        la care este proiectată să se potrivească căptușeala.
    compatible_power_steering_system:
      name: Sistem de direcție asistată compatibil
      description: Indică tipurile de sistem de direcție pentru care este destinat
        fluidul.
    compatible_powerplant_type:
      name: Tip de acționare compatibil
      description: Indică sistemul de propulsie al armei BB pentru care este destinată
        piesa (de exemplu, piston cu arc, CO2, PCP).
    compatible_presser_foot:
      name: Picioruș presor compatibil
      description: Specifică sistemul de montare/compatibilitate a piciorușului presor
        acceptat de mașina de cusut (de exemplu, prindere cu clic vs. prindere cu
        șuruburi; tijă joasă/înaltă/înclinată). Folosiți „Universal/Multiple” dacă
        sunt acceptate mai multe sisteme sau dacă sunt incluse adaptoare.
    compatible_protective_gear:
      name: Echipament de protecție compatibil
      description: Specifică cu ce alte echipamente de protecție este proiectată să
        funcționeze protecția pentru gât.
    compatible_protective_gear_integration:
      name: Integrare compatibilă a echipamentului de protecție
      description: Descrie modul în care trebuie integrat cu alte echipamente sau
        purtat dispozitivul de protecție (de exemplu, în buzunar, prindere independentă
        cu curea).
    compatible_punching_bag_type:
      name: Tip de sac de box compatibil
      description: Specifică cu ce modele de sac de box sau de antrenament este compatibil
        produsul.
    compatible_racing_discipline:
      name: Disciplină de curse compatibilă
      description: Disciplinele de motorsport pentru care este destinată/certificată
        casca.
    compatible_rc_scale:
      name: Scală RC compatibilă
      description: Indică raportul scalei RC (de exemplu, 1:10) la care accesoriul
        sau piesa este proiectată să se potrivească.
    compatible_recorder_size:
      name: Dimensiune compatibilă pentru flaut drept
      description: Specifică dimensiunile înregistratorului pentru care este proiectată
        carcasa.
    compatible_recorder_type:
      name: Tip compatibil de flaut drept
      description: Specifică tipul de înregistrator (familie/dimensiune) cu care este
        compatibil accesoriul (de exemplu, soprană, alto).
    compatible_reed_cut:
      name: Tip de tăietură compatibil al anciei
      description: Specifică stilul de tăiere a anciei cu care ligatura este concepută
        să fie compatibilă (de exemplu, plin/tăietură franceză vs. neplin/tăietură
        americană).
    compatible_reed_type:
      name: Tip de ancie compatibilă
      description: Specifică tăietura/tipul de ancie pentru care este proiectat muștiucul.
    compatible_reel_type:
      name: Tip de mulinetă compatibilă
      description: Specifică stilul de mulinetă pentru care este proiectat sacul,
        carcasa sau husa.
    compatible_refrigerant_type:
      name: Tip de agent frigorific compatibil
      description: Indică agentul frigorific cu care este destinat să fie utilizat
        evaporatorul de aer condiționat.
    compatible_ride_equipment:
      name: Echipament de călărie compatibil
      description: Tipuri de echipamente sportive cu roți pentru care este destinată
        rampa.
    compatible_roof_height:
      name: Înălțimea compatibilă a acoperișului
      description: Indică profilul de acoperiș pentru care este proiectată învelitoarea
        (acoperiș standard vs. acoperiș extins/înalt).
    compatible_roof_rail_type:
      name: Tip de șină de plafon compatibilă
      description: Specifică configurația acoperișului la care este proiectat să se
        atașeze sistemul de stativ de bază.
    compatible_rope_count:
      name: Număr compatibil de frânghii
      description: Specifică configurația de corzi pentru ringul de box pentru care
        este proiectată piesa, cum ar fi inele cu 3 corzi, inele cu 4 corzi sau potrivire
        universală.
    compatible_rope_type:
      name: Tip de frânghie compatibilă
      description: Specifică ce construcții de frânghie pot fi utilizate cu dispozitivul.
    compatible_saddle_type:
      name: Tip de șa compatibilă
      description: Specifică stilul de șa sau disciplina de călărie pentru care este
        conceput accesoriul, asigurând compatibilitatea corectă între șeile englezești,
        occidentale și alte tipuri de șei.
    compatible_saxophone_size:
      name: Dimensiune saxofon compatibilă
      description: Indică dimensiunile saxofonului cu care este compatibil produsul
        (de exemplu, soprano, alto, tenor).
    compatible_saxophone_type:
      name: Tip de saxofon compatibil
      description: Specifică pentru ce saxofon este proiectată ligatura/capacul.
    compatible_scale_length:
      name: Lungime compatibilă a scalei
      description: Identifică intervalul de lungime a scalei de chitară pentru care
        sunt destinate corzile (de exemplu, scală scurtă, standard, bariton).
    compatible_seat_airbag:
      name: Airbag compatibil pentru scaun
      description: Indică dacă scaunul acceptă/conține airbaguri laterale sau este
        compatibil cu vehiculele echipate cu airbaguri montate în scaun.
    compatible_seating_capacity:
      name: Capacitate de locuri compatibilă
      description: Specifică numărul de locuri sau configurația pentru care este proiectat
        accesoriul.
    compatible_sensor_port_type:
      name: Tip de port senzor compatibil
      description: Specifică dacă baia de ulei acceptă senzori de nivel al uleiului
        și/sau de temperatură a uleiului și stilul orificiului, dacă este cazul.
    compatible_shifter_type:
      name: Tip de schimbător compatibil
      description: Identifică tipul sau configurația schimbătorului de viteze pentru
        care este proiectat să se potrivească manșonul schimbătorului de viteze.
    compatible_shis:
      name: SHIS compatibil
      description: Listează codurile Sistemului standardizat de identificare a căștilor
        (SHIS) la care se potrivește piesa (de exemplu, IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Disciplină de patinaj compatibilă
      description: Indică disciplinele de patinaj pentru care este concepută piesa
        sau accesoriul.
    compatible_snowshoe_deck_type:
      name: Tip de punte compatibilă pentru rachete de zăpadă
      description: Specifică cadrul sau stilul de platformă pentru rachete de zăpadă
        cu care este compatibilă legătura.
    compatible_special_effects_lighting_features:
      name: Funcții de iluminare compatibile cu efecte speciale
      description: Evidențiază semnalizatoarele comune de abilități care determină
        decizii de cumpărare pentru lumini de efect (dincolo de culoare/model), cum
        ar fi unități conectate sau reacționarea la sunet.
    compatible_spinning_wheel_drive_system:
      name: Sistem de antrenare compatibil cu roțile rotative
      description: Specifică sistemele de antrenare a roților rotative pe care accesoriul
        le acceptă.
    compatible_spoke_gauge:
      name: Ecartament spițe compatibil
      description: Indică dimensiunile grosimii spiței și niplul pentru potrivire,
        permițând cumpărătorului să potrivească corect spițele și niplurile.
    compatible_steering_wheel_airbag:
      name: Airbag volan compatibil
      description: Indică dacă volanul acceptă menținerea unui modul de airbag OEM
        (sau este destinat aplicațiilor non-airbag).
    compatible_steering_wheel_control_button:
      name: Buton de control al volanului compatibil
      description: Indică compatibilitatea cu comenzile montate din fabrică pe volan
        (audio/croazieră/telefon) și cablajul aferent.
    compatible_stencil_material:
      name: Material compatibil pentru șabloane
      description: Materiale din care mașina poate crea șabloane sau le poate procesa
        (de exemplu, hârtie, film de plastic, mylar).
    compatible_stencil_media_format:
      name: Format media de șablon compatibil
      description: 'Indică factorii de formă pentru șablon pe care îi utilizează mașina:
        foi, role sau ambele.'
    compatible_strap_retractor:
      name: Retractor de curea compatibil
      description: Indică dacă cureaua este compatibilă cu sistemele retractabile
        sau este concepută pentru curele neretractabile (statice).
    compatible_string_instrument_finish:
      name: Finisaj compatibil pentru instrumente cu corzi
      description: Specifică tipurile de finisaj ale instrumentelor pe care se poate
        utiliza în siguranță soluția de lustruire.
    compatible_substrate_material:
      name: Material de substrat compatibil
      description: Materialele de suprafață la care aderă vopseaua.
    compatible_surface:
      name: Suprafață compatibilă
      description: Specifică suprafața/materialul pe care este destinat să se lipească
        adezivul cu sistem de tip arici.
    compatible_surface_material:
      name: Material de suprafață compatibil
      description: Materiale de pe suprafața vehiculului pe care este proiectat să
        fie utilizat produsul.
    compatible_tear_off_system:
      name: Sistem compatibil de folii de protecție detașabile
      description: Indică dacă ochelarii acceptă desprinderea sau îndepărtarea protecțiilor,
        inclusiv dacă au montate pentru desprindere stâlpi de motnare.
    compatible_thermostat_type:
      name: Tip de termostat compatibil
      description: Dacă manșonul de etanșare/carcasa este proiectată să accepte un
        termostat și, dacă da, de ce tip/dimensiune.
    compatible_thread:
      name: Fir compatibil
      description: Indică tipurile de fir/urzeală pe care este proiectat să le gestioneze
        lira de înfilat (după grosime/tip).
    compatible_thread_spool_format:
      name: Format compatibil fir/bobină
      description: Indică formatele pentru care este concepută cutia (role, bobine,
        bobine/carton pentru ață, conuri etc.).
    compatible_thread_yarn_tool:
      name: Instrument compatibil pentru urzeală și fire
      description: Compatibilitatea mașinii/sistemului cu unelte care se montează
        pe sau sunt utilizate cu alte echipamente (de exemplu, mașină de cusut, surfilatoare/mașină
        de surfilat, război de țesut, roată de filat).
    compatible_tire_application:
      name: Aplicații compatibile pentru anvelope
      description: Indică segmentul de aplicație pentru anvelopă/roată pentru care
        este proiectat separatorul de anvelope (în funcție de anvelopa/roata care
        este depanată, nu de modelul vehiculului).
    compatible_tom_pad_mounting:
      name: Montare compatibilă cu pad de tom
      description: Specifică pe ce se montează sistemul tom-tom electronic (de exemplu,
        suport cu clemă/tijă, tijă în L, suport cu stativ), afectând compatibilitatea
        acestuia cu sistemele de suporturi existente.
    compatible_toy_vehicle_scale:
      name: Scară compatibilă pentru vehicule de jucărie
      description: Indică scara vehiculului de jucărie sau dimensiunile aproximative
        ale vehiculului cu care este compatibil setul de joacă.
    compatible_tpms_sensor_type:
      name: Tip de senzor TPMS compatibil
      description: Specifică dacă roata are senzori TPMS și/sau orice tip de supapă/senzor
        necesar.
    compatible_training_equipment:
      name: Echipament de antrenament compatibil
      description: Listează tipurile de echipamente de antrenament sau fitness care
        pot fi atașate la suport.
    compatible_treadmill_design:
      name: Design compatibil al benzii de alergare
      description: Specifică designul benzii de alergare cu care este compatibil accesoriul,
        cum ar fi modele pliabile sau nepliabile.
    compatible_tube:
      name: Tub compatibil
      description: Indică construcția camerei sau a anvelopei pentru care este proiectat
        peticul, cum ar fi butil, latex, TPU sau tubeless.
    compatible_valve_type:
      name: Tip de valvă compatibilă
      description: Specifică cu ce tip de valvă din alamă este compatibil lubrifiantul.
    compatible_vaporizing_material:
      name: Material de vaporizare compatibil
      description: Indică tipurile de materiale pe care dispozitivul este proiectat
        să le vaporizeze.
    compatible_vehicle_windshield_fluid:
      name: Lichid de parbriz compatibil pentru vehicul
      description: Declarații de compatibilitate referitoare la echipamentul vehiculului
        sau la tratamentele pentru sticlă (de exemplu, sigur pentru acoperiri rezistente
        la ploaie, sigur pentru spălătoarele farurilor).
    compatible_visor_system:
      name: Sistem de viziere compatibil
      description: Indică tipurile de sisteme de vizieră/inserție cu care este compatibilă
        casca de motocicletă.
    compatible_water_board_type:
      name: Tip de placă nautică compatibilă
      description: Ce plăci pentru sporturi nautice este destinat să transporte suportul.
    compatible_water_sport_board_type:
      name: Tip de placă pentru sporturi nautice compatibilă
      description: Enumeră tipurile de plăci pe care suportul este proiectat să le
        transporte.
    compatible_watercraft_communication_standard:
      name: Standard de comunicare pentru ambarcațiuni compatibil
      description: Specifică standardele de comunicații/rețea maritimă sau protocoalele
        de integrare acceptate pentru interoperabilitate cu dispozitivele electronice
        aflate la bord.
    compatible_watercraft_engine_type:
      name: Tip de motor pentru ambarcațiuni compatibil
      description: Indică configurația țintă a grupului motopropulsor la care se potrivește
        piesa (motor suspendat/la bord/la pupa/cu jet).
    compatible_weight_plate_diameter:
      name: Diametrul discului de greutate compatibil
      description: Specifică diametrele discurilor de greutate acceptate de aparat.
    compatible_wheel_finish:
      name: Finisaj compatibil al roților
      description: Specifică finisajele/materialele roților pentru care este sigură
        utilizarea soluției de curățare (conform declarațiilor producătorului).
    compatible_whorl_drive_band_type:
      name: Tip de bandă de acționare cu spirală compatibilă
      description: Specifică cu ce stil de bandă de acționare este destinată să funcționeze
        spirala.
    compatible_wick_series:
      name: Serii compatibile de fitiluri
      description: Indică seriile/tipurile comune de fitil pentru care este proiectată
        fila (denumirea din domeniu), dacă este specificat de vânzător.
    compatible_winder_head_bit:
      name: Cap/bit de bobinator compatibil
      description: Specifică stilul de interfață pentru cheia/capul tunerului pe care
        îl acceptă bobinatorul (de exemplu, cap cu fante, biți interschimbabili, cap
        universal).
    compatible_windlass_rode:
      name: Cordon de vinci compatibil
      description: Specifică tipul de cordon de ancoră cu care este proiectat să funcționeze
        vinciul.
    compatible_windshield_type:
      name: Tip de parbriz compatibil
      description: Specifică configurația de parbriz cu care este proiectată carcasa
        să funcționeze.
    compatible_wood:
      name: Lemn compatibil
      description: Specifică tipurile de lemn pentru tastieră pentru care este recomandată/sigură
        lustruirea.
    compatible_writing_surface:
      name: Suprafață de scris compatibilă
      description: Specifică suprafețele/hârtiile pe care cerneala este destinată
        să funcționeze cel mai bine.
    compatible_zipper_size:
      name: Dimensiune fermoar compatibilă
      description: 'Indică dimensiunea fermoarului la care este destinat trăgaciul
        (adesea exprimată ca #3, #5, #8, #10), îmbunătățind filtrarea compatibilității.'
    compliance_certification:
      name: Certificare de conformitate
      description: Standarde de conformitate/aprobare îndeplinite de bara luminoasă
        pentru utilizare rutieră și compatibilitate electromagnetică.
    component_position:
      name: Poziția componentei
      description: Specifică poziția relativă a piesei în cadrul ansamblului de distribuție
        a motorului (de exemplu, capac față vs. capac spate, superior vs. inferior).
        Nu poziționarea în fața/spatele vehiculului.
    concentration_level:
      name: Nivelul de concentrare
      description: Indicație calitativă a concentrației pastei de tomate (simplă,
        dublă, triplă), utilă pentru potrivirea cerințelor rețetei.
    concentration_type:
      name: Tipul de concentrație
      description: Indică dacă produsul este gata de utilizare sau concentrat și care
        sunt instrucțiunile tipice de diluție (dacă produsul este concentrat).
    concert_bass_drum_mounting_stand_type:
      name: Tip suport de montare pentru tobă bas de concert
      description: Cum este susținută sau montată toba bas de concert pentru interpretare.
    concert_pitch_standard:
      name: Standardul tonalității concertului
      description: Specifică referința la tonalitatea de concert (A4) la care este
        acordat pianul în momentul vânzării (de exemplu, A440, A442, A444).
    condiment_form:
      name: Formă de condiment
      description: Indică forma fizică sau consistența produsului din hrean (de exemplu,
        pastă, pudră, cremă).
    condiment_texture:
      name: Textura condimentului
      description: Descrie consistența fizică a murăturilor sau chutney-ului (de exemplu,
        grosieră, fină).
    confetti_format:
      name: Format de confetti
      description: Specifică formatul produsului confetti în funcție de modul în care
        este ambalat sau lansat confetti-ul (de exemplu, împrăștiere liberă vs. explozibili/tunuri).
    conga_head_tensioning_system:
      name: Sistem de tensionare a capului de conga
      description: Tipul de hardware folosit pentru tensionarea/acordarea capului
        de conga (de exemplu, acordarea tradițională cu lug vs. mecanisme moderne
        de acordare rapidă).
    conga_set_included_drum_types:
      name: Tipuri de tobe incluse în setul de conga
      description: Ce tipuri de conga sunt incluse într-un set de conga (de exemplu,
        quinto + conga + tumba).
    connector_case_style:
      name: Stil carcasă conector
      description: Clasifică stilul general de construcție al carcasei conectorilor
        (de exemplu, carcasă rigidă vs. husă moale), pentru a reflecta nivelul de
        protecție și portabilitatea.
    console_cover_installation_method:
      name: Metoda de instalare a capacului consolei
      description: Specifică modul în care se atașează husa consolei la consolă/cotieră
        (de exemplu, alunecare, curele elastice, velcro, adeziv, prin clipsare).
    console_display_type:
      name: Tipul de afișare al consolei
      description: Identifică stilul de afișare pentru utilizator furnizat de mașină
        (de exemplu, LCD, LED, ecran tactil).
    construction_design:
      name: Design constructiv
      description: Indică câte piese articulate alcătuiesc perna, afectând mobilitatea
        (de exemplu, o singură piesă vs. trei piese).
    contact_angle:
      name: Unghiul de contact
      description: Specifică unghiul de contact al căilor de rulment, exprimat ca
        un singur unghi sau ca un set de unghiuri pereche (de exemplu, 36°/45°).
    contact_juggling_ball_fill_type:
      name: Tip de umplere cu minge de jonglerie de contact
      description: Identifică dacă mingea este solidă sau umplută (și dacă este umplută,
        ce fel de umplutură este), ceea ce afectează distribuția greutății și durabilitatea.
    contact_juggling_ball_transparency:
      name: Transparență minge de jonglerie de contact
      description: Specifică transparența/aspectul optic al mingii.
    contact_surface_material:
      name: Materialul suprafeței de contact
      description: Identifică materialul utilizat în punctele de contact care ating
        instrumentul (de exemplu, plută/cauciuc), pentru a preveni zgârieturile și
        a îmbunătăți aderența.
    container_material:
      name: Materialul containerului
      description: Specifică materialul principal al containerului de retail al produsului
        (de exemplu, sticlă, plastic PET, aluminiu).
    contaminant_removal:
      name: Îndepărtarea contaminanților
      description: Enumeră clasele de contaminanți pe care produsul este certificat
        să le elimine sau să le reducă.
    contra_alto_clarinet_body_configuration:
      name: Configurația corpului clarinetului contra-alto
      description: Descrie factorul de formă al construcției fizice a clarinetului
        contra-alto (de exemplu, modele drepte vs. pliate).
    contra_alto_clarinet_lowest_note_extension:
      name: Extensie a celei mai joase note pentru clarinetul contra-alto
      description: Specifică extensia celei mai joase note care poate fi interpretată
        la instrument (cea mai joasă notă permisă de claviatură), utilizată în mod
        obișnuit pentru a distinge modelele Mi♭ jos de cele Re jos și de cele Do jos.
    contra_bass_clarinet_bell_type:
      name: Tip pâlnie pentru clarinet contra-bas
      description: Configurația pâlniei utilizate la clarinetul contra-bas.
    contra_bass_clarinet_bore_type:
      name: Tip de alezaj pentru clarinet contrabas
      description: Designul alezajului instrumentului.
    contra_bass_clarinet_lowest_written_note:
      name: Cea mai joasă notă scrisă pentru clarinet contrabas
      description: Cea mai joasă notă scrisă pe care instrumentul o poate interpreta
        (adesea depinde de extensia Do jos față de Mi bemol jos).
    control_arm_bushing_material:
      name: Materialul bucșei brațului de control
      description: Specifică materialul bucșelor incluse/instalate, dacă sunt prezente.
    control_arm_bushings_included:
      name: Bucșe braț de control incluse
      description: Indică dacă brațul de control este livrat cu bucșe instalate.
    control_arm_finish:
      name: Finisajul brațului de control
      description: Specifică finisajul protector aplicat brațului de control (protecție
        împotriva coroziunii și aspect).
    control_arm_grease_fitting_type:
      name: Tipul de racord de ungere al brațului de control
      description: Specifică dacă ansamblul braț de control/articulație sferică include
        un racord de ungere (Zerk) și dacă acesta poate fi depanat.
    control_arm_material:
      name: Materialul brațului de control
      description: Specifică materialul principal și construcția de fabricație a corpului
        brațului de control.
    control_arm_position:
      name: Poziția brațului de control
      description: Specifică poziția suspensiei pentru care este proiectat brațul
        de control în contextul colț/lateral axă (de exemplu, superior/inferior, față/spate,
        stânga/dreapta).
    control_arm_style:
      name: Stilul brațului de control
      description: Identifică stilul geometric/de design al brațului de control utilizat
        în aspectul de suspensie.
    control_cable_connector_type:
      name: Tipul conectorului cablului de control
      description: Specifică stilul capătului/conectorului utilizat de cablurile de
        control pentru interfațarea cu controlul și motorul (de exemplu, fitinguri
        terminale specifice OEM).
    control_voltage_or_gate_connectivity:
      name: Tensiune de control sau conectivitate la poartă
      description: Specifică suportul de conexiune la tensiunea de control/gate pentru
        integrare cu echipamente modulare/analogice.
    controller_function:
      name: Funcția controlerului
      description: Definește rolul principal al plăcii de control a benzii de alergare,
        cum ar fi controlul motorului, sursa de alimentare sau acționarea prin invertor.
    controller_type:
      name: Tipul controlerului
      description: Specifică sistemul de controler/control al motorului inclus în
        kitul de conversie EV pentru scuter (sau necesar pentru utilizare), concentrându-se
        pe caracteristicile controlerului care sunt relevante pentru compatibilitate
        și performanță.
    conversion_kit_cooling_method:
      name: Metoda de răcire a kitului de conversie
      description: Abordarea principală de gestionare termică utilizată pentru integrarea
        motor/invertor/baterie.
    conversion_kit_installation_complexity:
      name: Complexitatea instalării kitului de conversie
      description: Nivelul de efort așteptat la instalare, bazat pe aptitudinile/uneltele
        tipice necesare clientului.
    converted_bed_size:
      name: Dimensiuni pat transformat
      description: Indică dimensiunile sau configurația patului în care se va converti
        pătuțul atunci când este instalat acest kit.
    convertible_configuration:
      name: Configurație convertibilă
      description: Indică numărul de configurații diferite de pat în care se poate
        converti produsul (de exemplu, pătuț 3 în 1 → pat pentru copii mici → pat
        de zi).
    convertible_high_chair_modes:
      name: Moduri ale scaunului înalt convertibil
      description: Specifică configurațiile de ședere în care scaunul poate fi convertit.
    cookie_decorating_kit_items_included:
      name: Articole incluse în kitul de decorare a fursecurilor
      description: Listează componentele decorative fizice individuale furnizate,
        astfel încât clientul să știe exact ce anume se află în cutie (de exemplu,
        tuburi de glazură, decoruri, forme de biscuiți).
    cookie_variety:
      name: Varietate de fursecuri
      description: Identifică stilul sau varietatea specifică a fursecurilor, ajutând
        cumpărătorul să găsească rapid tipul preferat.
    cooking_state:
      name: Stare de gătire
      description: Indică nivelul de preparare pentru produsul din pui la vânzare
        (crud, gătit complet, marinat etc.).
    coolant_additive_purpose:
      name: Scopul aditivului pentru lichidul de răcire
      description: Funcția principală prevăzută a aditivului pentru lichidul de răcire
        (nu este vorba de spălarea radiatorului sau de produse dedicate de tip agent
        de etanșare).
    coolant_base_fluid:
      name: Lichid de bază pentru răcire
      description: Identifică baza principală de glicol utilizată în formularea antigelului/lichidului
        de răcire.
    coolant_outlet_connection_style:
      name: Stil conexiune ieșire lichid de răcire
      description: Stilul de interfață de conectare la ieșire utilizată pentru a atașa
        un furtun de radiator sau o conductă de răcire.
    coolant_outlet_neck_angle:
      name: Unghiul manșonului de etanșare a lichidului de răcire
      description: Unghiul/orientarea ieșirii manșonului de etanșare față de flanșa
        de montare/motor (util pentru rutarea furtunului superior al radiatorului).
    coolant_technology:
      name: Tehnologia lichidului de răcire
      description: Specifică familia de substanțe chimice/tehnologii de răcire utilizată
        de antigel/lichid de răcire (etichetată în mod obișnuit pe ambalaj).
    coolant_temperature_sensor_port:
      name: Portul senzorului de temperatură al lichidului de răcire
      description: Dacă manșonul de etanșare include un port pentru un senzor sau
        un comutator de temperatură a lichidului de răcire și ce interfață utilizează.
    coolant_temperature_sensor_seal_type:
      name: Tipul de etanșare a senzorului de temperatură al lichidului de răcire
      description: Tipul de metodă de etanșare utilizată între senzor și canalul motor/lichid
        de răcire.
    cooling_system_component_included:
      name: Componentă a sistemului de răcire inclusă
      description: Listează componentele suplimentare ale sistemului de răcire incluse
        cu pompa de apă.
    cooling_system_flush_application_step:
      name: Pasul de aplicare a spălării sistemului de răcire
      description: Indică locul în care produsul se încadrează în procesul de depanare
        (de exemplu, detergent pre-spălare vs. clătire finală/neutralizare).
    cooling_system_type:
      name: Tipul sistemului de răcire
      description: Specifică configurația sistemului de răcire utilizat de un motor
        marin la bord (de exemplu, apă brută/buclă deschisă, buclă închisă/apă dulce
        cu schimbător de căldură, răcit cu chilă).
    cord_material:
      name: Materialul cablului
      description: Specifică materialul șnurului/șirului folosit pentru a trage bețișorul
        prin saxofon.
    core_type_bass_strings:
      name: Tip de miez (corzi bas)
      description: Specifică forma miezului corzilor, care influențează senzația și
        flexibilitatea.
    cork_grease_base_material:
      name: Material de bază pentru unsoare de plută
      description: Baza principală a formulării unsorii de plută (de exemplu, pe bază
        de lanolină).
    cork_grease_form:
      name: Formă grăsime de plută
      description: Factor de formă fizică al produsului unsoare de plută.
    corn_presentation:
      name: Prezentare a porumbului
      description: Specifică prezentarea fizică sau forma produsului porumb (de exemplu,
        întreg în coajă, boabe, pulbere).
    corn_syrup_variety:
      name: Varietate de sirop de porumb
      description: Specifică stilul particular sau varianta de procesare a siropului.
    corn_variety:
      name: Soiul de porumb
      description: Identifică varietatea botanică specifică sau cea comercială de
        porumb vândut, permițând cumpărătorului să distingă între tipurile care diferă
        prin gust, textură, culoare și utilizare culinară.
    corner_compatibility:
      name: Compatibilitate colțuri
      description: Specifică forma colțurilor mesei (pătrate sau rotunde) pentru care
        este proiectată acoperitoarea.
    corner_flag_features:
      name: Caracteristicile marcajului de colț
      description: Evidențiază caracteristicile funcționale speciale sau îmbunătățirile
        marcajului de colț (de exemplu, stâlp pliabil, material reflectorizant).
    cornet_mouthpiece_shank_type:
      name: Tipul de tijă pentru muștiuc de cornet
      description: Specifică standardul receptorului/tijei muștiucului acceptat de
        cornet pentru compatibilitate.
    cornhole_league_certification:
      name: Certificare în liga cornhole
      description: Indică certificări oficiale sau aprobări de ligi pe care le îndeplinește
        produsul.
    corrosion_resistance:
      name: Rezistență la coroziune
      description: Specifică tratamentul de rezistență la coroziune sau clasificarea
        monturii/suportului pentru expunere în aer liber.
    corrosion_resistance_level:
      name: Nivelul de rezistență la coroziune
      description: Indică o protecție împotriva coroziunii potrivită pentru medii
        cu apă dulce/sărată.
    costume_components_included:
      name: Componente incluse în costumație
      description: Enumeră piesele de îmbrăcăminte și accesoriile incluse în costum,
        clarificând ce face parte din setul respectiv.
    cotton_weave_type:
      name: Tip de țesătură din bumbac
      description: Descrie construcția țesăturii/tricotării suprafeței de bumbac imprimabile
        care afectează textura și claritatea imprimării.
    counter_type:
      name: Tipul de tejghea
      description: Indică prezența și stilul repetiției încorporate sau al urmăririi
        forței.
    counterweight_fill_material:
      name: Material de umplutură contragreutate
      description: Indică substanța care poate fi utilizată pentru a adăuga balast
        sau a preumple contragreutatea.
    counterweight_type:
      name: Tip contragreutate
      description: Specifică stilul de design sau construcție al contragreutății,
        cum ar fi un sac de nisip sau o placă de oțel, pentru a facilita compatibilitatea
        și instalarea.
    coupler_system:
      name: Sistem de cuplare
      description: Tipul/sistemul de cuplare montat pe locomotiva model pentru compatibilitatea
        materialului rulant.
    court_surface_suitability:
      name: Adecvarea suprafeței terenului
      description: Indică suprafața terenului de baschet pentru care este proiectată
        talpa exterioară a pantofului, ajutând cumpărătorii să aleagă tracțiunea și
        durabilitatea potrivite pentru terenurile interioare din lemn, pentru terenurile
        exterioare din asfalt/beton sau pentru ambele.
    cover_fit_style:
      name: Stilul de potrivire al husei
      description: Descrie modul în care capacul se potrivește peste masă, afectând
        aspectul și nivelul de protecție.
    cover_fit_type:
      name: Tipul de potrivire a prelatei
      description: Indică dacă prelata este personalizată (customizată/semi-customizată)
        sau universală și dacă este destinată acostării în apă sau utilizării pentru
        depozitare/remorcare.
    cowbell_beater_type:
      name: Tip bătător pentru talangă
      description: Tipul de instrument de lovire recomandat pentru sunetul/finisajul
        tălăngii (dacă este specificat de produs).
    cowbell_mounting_method:
      name: Metoda de montare a tălăngii
      description: Cum va fi montată/utilizată talanga (manual vs. montat pe hardware).
    cowbell_sound_character:
      name: Caracterul sunetului tălăngii
      description: Caracter tonal general utilizat în listări (acceptă descoperirea,
        dincolo de dimensiune).
    cradle_capacity:
      name: Capacitatea leagănului
      description: Indică dacă leagănul este conceput să țină un singur bebeluș sau
        gemeni.
    craft_cutter_embosser_machine_operation:
      name: Funcționarea mașinii de tăiat/embosat pentru meșteșuguri
      description: Specifică modul în care funcționează mașina de tăiat/embosat din
        perspectiva fluxului de lucru al utilizatorului (de exemplu, manivelă manuală,
        buton electric, controlat prin aplicație).
    craft_decoration_maker_accessories_included:
      name: Accesorii incluse cu realizatorul de decorațiuni artizanale
      description: Listează accesoriile cheie incluse cu realizatorul de decorațiuni
        artizanale (de exemplu, bandă/folie de început, rezerve de autocolante, cartușe
        cu sclipici, instrumente de curățare).
    craft_foil_application_method:
      name: Metoda de aplicare a foliei pentru proiecte de artizanat
      description: Identifică modul în care este destinată a fi aplicată/activată
        folia pentru proiecte de artizanat (adeziv, căldură, toner/reactiv etc.).
    craft_foil_format:
      name: Format folie pentru proiecte de artizanat
      description: Indică formatul fizic al foliei pentru proiecte de artizanat așa
        cum este vândută (de exemplu, rolă vs. foi).
    craft_glue_finish:
      name: Finisaj adeziv pentru proiecte de artizanat
      description: Descrie aspectul adezivului după uscare (de exemplu, transparent,
        alb/opac, translucid, lucios/mat).
    craft_magnet_application:
      name: Aplicație magnet pentru proiecte de artizanat
      description: Scenariu de utilizare pentru proiecte de artizanat principală prevăzută
        sau suprafață de montare pentru produsul magnet.
    craft_magnet_holding_strength_level:
      name: Nivelul de rezistență al magnetului pentru proiecte de artizanat
      description: Categorie de rezistență relativă pentru magneții pentru proiecte
        de artizanat, pentru a ajuta cumpărătorul să aleagă puterea de prindere potrivită
        pentru proiectul său.
    craft_organizer_storage_features:
      name: Caracteristici de depozitare a organizatorului pentru proiecte de artizanat
      description: Descrie caracteristicile de organizare și elementele de depozitare
        internă ale organizatoarelor pentru proiecte de artizanat (de exemplu, separatoare
        reglabile, sertare, buzunare transparente).
    craft_scoring_board_included_accessories:
      name: Accesorii incluse cu tabela de scor pentru proiecte de artizanat
      description: Accesorii incluse cu tabela de scor (de exemplu, stilou de notare/folder,
        triunghi, plicuri).
    craft_scoring_board_measurement_system:
      name: Sistem de măsurare a tabelei de scor pentru proiecte de artizanat
      description: Specifică sistemul de măsurare marcat pe tabela de scor (imperial,
        metric, dual sau nemarcat).
    craft_wire_finish_coating:
      name: Finisaj/acoperire fir pentru proiecte de artizanat
      description: Specifică finisajul suprafeței sau acoperirea aplicată firului
        pentru culoare, rezistență la pătare sau protecție.
    craft_wood_surface_preparation:
      name: Pregătirea suprafeței din lemn pentru proiecte de artizanat
      description: Indică dacă suprafața de lemn este pregătiră pentru finisare/vopsire
        sau dacă necesită pregătire (de exemplu, șlefuire/amorsare).
    crank_spindle_interface:
      name: Interfața axului manivelei
      description: Specifică sistemul axului manivelei pe care îl acceptă suportul
        pedalier (de exemplu, SRAM DUB, Square Taper), asigurând compatibilitatea
        dintre angrenaj și suportul pedalier.
    crankshaft_balance_type:
      name: Tip de echilibru pentru arborele cotit
      description: Indică dacă arborele cotit este echilibrat intern (neutru) sau
        echilibrat extern (necesită greutăți pentru echilibratorul armonic/volant).
    crankshaft_bolt_pattern:
      name: Model șuruburi arbore cotit
      description: Model de șuruburi pe flanșa spate pentru atașarea volantei/plăcii
        flexibile.
    crankshaft_sensor_reluctor_type:
      name: Tipul reluctorului senzorului arborelui cotit
      description: Configurația utilizată a roții declanșatoare/reluctorului senzorului
        de poziție a arborelui cotit (unde este cazul).
    craps_accessories_included:
      name: Accesorii pentru craps incluse
      description: Identifică accesorii suplimentare specifice jocului de zaruri,
        incluse dincolo de zaruri/jetoane/aspect.
    crash_cymbal_profile:
      name: Profilul cinelului „crash”
      description: Curbura/profilul general al cimbalului (cât de pronunțat este arcușul),
        afectând înălțimea și răspunsul.
    crash_cymbal_sound_character:
      name: Caracterul sonor al cinelului crash
      description: Descriptorul principal al caracterului tonal pentru sunetul de
        cimbal „crash”.
    crash_pad_size_class:
      name: Clasa dimensională a saltelei de protecție la căzături
      description: Precizează categoria dimensională generală a unei saltele de protecție
        la căzături pentru alpinism, oferind cumpărătorului o imagine rapidă despre
        acoperirea suprafeței, fără a fi nevoie de dimensiuni exacte.
    crate_engine_assembly_level:
      name: Nivelul de asamblare a motorului în cutie
      description: Cât de complet este motorul în cutie la expediere (ce componente
        majore sunt incluse).
    cream_base_ingredient:
      name: Ingredientul de bază al smântânii
      description: Identifică sursa principală a smântânii, acoperind atât speciile
        lactate, cât și alternativele pe bază de plante.
    cream_cheese_base:
      name: Bază pentru crema de brânză
      description: Identifică principala sursă de lactate sau vegetale utilizată pentru
        a face crema de brânză, ajutând cumpărătorul să ia în considerare aspecte
        legate de dietă, alergeni și gust.
    cream_cheese_form:
      name: Forma brânzei cremă
      description: Descrie forma fizică sau stilul de textură al cremei de brânză
        (de exemplu, bloc, spumă, dip), care Influence tartinabilitatea și utilizarea
        preconizată.
    cream_variety:
      name: Varietate de smântână
      description: Identifică stilul specific de smântână pe baza conținutului de
        grăsime, a stilului de procesare sau a utilizării culinare preconizate (de
        exemplu, jumătate-jumătate, smântână groasă, smântână de gătit).
    crib_accessory_features:
      name: Caracteristici accesorii pentru pătuț
      description: Enumeră caracteristicile funcționale sau orientate spre confort
        specifice accesoriilor pentru pătuțuri și paturi pentru copii mici, cum ar
        fi respirabilitatea sau marginile elastice.
    crib_bumper_features:
      name: Caracteristici ale barei de protecție pentru pătuț
      description: Evidențiază caracteristici funcționale speciale ale apărătorii
        de pătuț.
    crib_conversion_kit_components:
      name: Componentele kitului de conversie al pătuțului
      description: Listează principalele piese incluse în kit, astfel încât cumpărătorii
        să poată verifica dacă au tot ce este necesar pentru instalare.
    cricket_ball_grade:
      name: Calitatea mingii de cricket
      description: Specifică nivelul de calitate sau standardul de joc prevăzut pentru
        minge.
    cricket_ball_piece_construction:
      name: Construcția din piese a mingii de cricket
      description: Indică numărul de piese exterioare sau secțiuni turnate utilizate
        pentru a construi carcasa mingii, un indicator cheie al calității și prețului.
    cricket_ball_type:
      name: Tipul de minge de cricket
      description: Specifică tipul de minge de cricket furnizată cu produsul sau indică
        dacă nu este inclusă nicio minge.
    cricket_bat_accessory_type:
      name: Tip de accesoriu pentru bâta de cricket
      description: Specifică tipul de accesoriu sau articolul de întreținere pentru
        bâta de cricket, astfel încât cumpărătorii să poată filtra rapid către produsul
        de care au nevoie.
    cricket_bat_size:
      name: Dimensiune bâtă de cricket
      description: Indică clasificarea standardizată a dimensiunilor bâtei de cricket
        (0–6, Harrow, SH, LH), de obicei aleasă în funcție de vârsta și înălțimea
        jucătorului.
    cricket_bat_size_compatibility:
      name: Compatibilitate dimensiune bâtă de cricket
      description: Enumeră dimensiunile bâtei pentru care este proiectat accesoriul,
        asigurând compatibilitatea corespunzătoare.
    cricket_helmet_role:
      name: Rol caschetă de cricket
      description: Indică rolul de joc pentru care este proiectată cascheta, cum ar
        fi aruncare sau apărarea wicketului.
    cricket_leg_guard_type:
      name: Tipul de protecție pentru picior la cricket
      description: Indică stilul specific de protecție pentru picior la cricket.
    cricket_player_role:
      name: Rolul jucătorului la cricket
      description: Specifică rolul principal de joc pentru care este conceput pantoful.
    cricket_protection_grade:
      name: Grad de protecție pentru cricket
      description: Specifică clasificarea gradului de protecție atribuită de producătorii
        de echipamente de cricket.
    cricket_stump_base_type:
      name: Tipul bazei țărușului de cricket
      description: Indică stilul sau materialul de bază furnizat împreună cu porțile,
        afectând stabilitatea și adecvarea suprafeței de joc.
    cricket_stump_target_features:
      name: Caracteristicile țintei pentru porțile de cricket
      description: Evidențiază caracteristici funcționale distincte care îmbunătățesc
        utilizabilitatea, vizibilitatea, durabilitatea sau stabilitatea.
    cricket_stump_type:
      name: Tipul de poartă de cricket
      description: Clasifică stilul sau construcția porților pentru a-i ajuta pe cumpărători
        să aleagă între porți tradiționale pentru meciuri, variante de antrenament
        sau modele moderne iluminate.
    cricket_training_focus:
      name: Obiectivul antrenamentului de cricket
      description: Aptitudinea sau disciplina principală din cricket pe care o va
        îmbunătăți acest instrument ajutător.
    croquet_set_components_included:
      name: Componente incluse în setul de crochet
      description: Listează toate componentele cheie furnizate împreună cu setul (de
        exemplu, porți, țăruși, geantă de transport), astfel încât clienții să înțeleagă
        exact ce cumpără.
    cross_country_binding_system:
      name: Sistem de legare cross-country
      description: Specifică standardul de legare pentru schiuri cross-country pentru
        care este conceput produsul sau cu care este compatibil.
    cross_stitch_chart_symbol_type:
      name: Tipul de simbol al diagramei de cusături în cruce
      description: Cum este reprezentată diagrama (simboluri, culori sau ambele).
    cross_stitch_finishing_type:
      name: Tip de finisare cusătură în cruce
      description: Tipul de finisare/afișare prevăzut pentru proiectul cusut.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mecanism de fixare a materialului cadru pentru cusătură în cruce
      description: Indică modul în care materialul este fixat/tensionat în cadru (de
        exemplu, clipsuri, cleme, cuie), ceea ce afectează ușurința în utilizare și
        compatibilitatea materialului.
    cross_stitch_frame_included_components:
      name: Componente incluse cadrul de cusătură în cruce
      description: Listează ce se află în cutie (de exemplu, doar cadru vs. cadru
        + cleme + suport), reducând ambiguitatea și returnările.
    cross_stitch_frame_type:
      name: Tip de cadru pentru cusătură în cruce
      description: Specifică construcția/tipul cadrului pentru cusătură în cruce (modul
        în care este ținut materialul), afectând utilizabilitatea și compatibilitatea
        proiectului.
    cross_stitch_pattern_technique:
      name: Tehnica modelului de cusătură în cruce
      description: Tehnica/stilul de cusătură în cruce cerut de diagramă.
    crossbar_shape_profile:
      name: Forma/profilul barei transversale
      description: Specifică forma aerodinamică/profilul barei transversale.
    crossbar_style:
      name: Stilul barei transversale
      description: Identifică stilul de construcție al barei transversale, diferențiind
        între barele rigide de competiție și barele de antrenament flexibile sau hibride.
    crossbow_type:
      name: Tip de arbaletă
      description: Identifică stilul fundamental de design al arbaletei, cum ar fi
        arcul compus, curbat sau pistol. Stilul de construcție influențează performanța,
        dimensiunea și scenariile de utilizare, așadar cumpărătorii filtrează frecvent
        după el.
    crossover_component_type:
      name: Tipul componentei crossover
      description: Identifică topologia componentei principale utilizate în rețeaua
        crossover pasivă.
    crossover_configuration:
      name: Configurație crossover
      description: Indică dacă crossover-ul utilizează un singur punct de crossover
        sau mai multe puncte (de exemplu, modele cu 2 căi vs. cu 3 căi).
    crossover_type:
      name: Tip crossover
      description: Tipul de rețea crossover inclusă în setul de componente.
    crown_profile:
      name: Profilul coroanei
      description: Specifică înălțimea/profilul coroanei șepcii deasupra cozorocului.
    crown_style:
      name: Stilul coroanei
      description: Definește silueta sau profilul general al coroanei unei pălării
        melon.
    crust_taste_profile:
      name: Profilul de gust al crustei
      description: Indică dacă aroma inerentă a crustei este dulce, sărată sau neutră.
    crystal_finish:
      name: Finisaj cristal
      description: Descrie finisajul suprafeței, acoperirea sau starea de prelucrare
        a cristalului liber (de exemplu, brut, lustruit, cioplit, fațetat, mat, acoperit
        cu aură, vopsit, tratat termic).
    crystal_material:
      name: Material cristal
      description: Specifică materialul folosit pentru geamul de cristal al ceasului
        care protejează cadranul.
    crystalline_finish_style:
      name: Stil finisaj cristalin
      description: Aspectul cristalin/caracteristic produs de ceara de palmier în
        lumânările finite.
    cucumber_variety:
      name: Varietate de castravete
      description: Specifică soiul sau varietatea de piață a castravetelui (de exemplu,
        englezesc, persan, Kirby).
    cue_compatibility:
      name: Compatibilitatea tacului
      description: Indică configurația îmbinării tacului pe care este proiectat să
        îl protejeze carcasa, cum ar fi tacuri dintr-o singură bucată sau cu îmbinare
        la 3/4.
    cue_construction:
      name: Construcția tacului
      description: Indică modul în care este construit tacul - numărul de piese sau
        dacă este o componentă parțială, cum ar fi doar un butt sau doar un arbore
        - afectând portabilitatea și compatibilitatea.
    cue_head_material:
      name: Materialul capului de tac
      description: Identifică materialul capului tacului (porțiunea care intră în
        contact cu discul), care afectează durabilitatea și protecția suprafeței.
    cue_sport_compatibility:
      name: Compatibilitate cu sportul cu tac
      description: Identifică sportul cu tac pentru care este conceput accesoriul.
    cue_thread_size:
      name: Dimensiunea fir tac
      description: Specifică specificațiile firului utilizat pentru extensii, protecții
        pentru articulații, șuruburi de greutate și alte accesorii pentru tacuri de
        golf, pentru a asigura o potrivire corectă.
    cue_tip_hardness:
      name: Duritatea vârfului tacului
      description: Evaluează fermitatea vârfului tacului, care Influence controlul
        bilei și feedbackul.
    cuff_height:
      name: Înălțimea manșetei
      description: Indică înălțimea manșetei cizmei (joasă, medie, înaltă, detașabilă/reglabilă),
        afectând sprijinul și flexibilitatea.
    cuff_position:
      name: Poziția manșetei
      description: Indică locul de pe corpul călărețului unde este concepută să se
        atașeze manșeta lesei.
    cultivation_method:
      name: Metoda de cultivare
      description: Specifică modul în care au fost cultivate verdețurile, acoperind
        tehnicile de creștere și practicile agricole.
    cup_type:
      name: Tipul cupei
      description: Indică profilul suprafeței paietei (plat vs. cupă) și adâncimea
        cupei, care pot afecta strălucirea, textura și modul în care aceasta se așează
        atunci când este cusută sau lipită.
    cupcake_size:
      name: Dimensiunea brioșei
      description: Precizează categoria de dimensiuni fizice a brioșelor vândute (de
        exemplu, mini, standard, jumbo).
    curd_size:
      name: Dimensiunea cremei
      description: Specifică dimensiunea sau textura cremelor cu brânză cottage.
    cure_method:
      name: Metoda de maturare
      description: Descrie procesul necesar pentru ca adezivul să se întărească (de
        exemplu, lumină UV, umiditate a aerului, căldură).
    curing_or_preparation_method:
      name: Metoda de întărire sau preparare
      description: Specifică modul în care măslinele au fost conservate sau preparate
        în alt mod (de exemplu, conservate în saramură, conservate în ulei, preparate
        la grătar).
    curling_broom_head_material:
      name: Material pentru capul măturii ondulate
      description: Identifică compoziția principală a capului sau a discului de mătură.
    curling_broom_head_type:
      name: Tip cap de mătură ondulată
      description: Specifică stilul sau construcția capului/pernei de măturat.
    curling_shoe_slider_material:
      name: Material pentru glisarea pantofilor de curling
      description: Identifică materialul principal al tălpii glisante utilizate la
        pantofii de curling.
    curling_training_aid_type:
      name: Tip de ajutor pentru antrenamentul de curling
      description: Identifică tipul de dispozitiv auxiliar pentru antrenamentul de
        curling.
    curry_variety:
      name: Soiul de curry
      description: Clasifică produsele sos de curry în funcție de stilul specific
        de curry sau rețeta pentru care sunt folosite, cum ar fi Tikka Masala, Massaman
        sau verde thailandez, pentru a permite o filtrare precisă a aromei/stilului.
    cushion_rubber_profile:
      name: Profil cauciuc pernă
      description: Forma sau codul de profil al pieselor de cauciuc ale umpluturii
        șinei.
    cushioning_level:
      name: Nivel de amortizare
      description: Indică cantitatea de umplutură de sub picior oferită de șosetă
        pentru protecție la impact și confort.
    custom_label_content_type:
      name: Tip conținut etichetă personalizată
      description: Specifică ce informații sunt personalizate pe eticheta cusută (de
        exemplu, nume, siglă, mesaj, dimensiune, simboluri de îngrijire, informații
        de contact).
    customization_type:
      name: Tip de personalizare
      description: Specifică dacă tricoul este gol, are un nume de jucător sau este
        personalizat cu un nume/număr personalizat.
    cut_or_preparation_style:
      name: Stil de tăiere sau preparare
      description: Specifică modul în care sunt tăiate sau preparate bucățile de legume
        în interiorul conservei sau borcanului (de exemplu, întregi, tăiate cubulețe,
        sulițe).
    cut_resistance_rating:
      name: Clasificarea rezistenței la tăiere
      description: Specifică nivelul de rezistență la tăiere testat formal al articolului.
    cut_type:
      name: Tip de tăiere
      description: Indică dacă materialul este vândut la metru, pretăiat sau sul/rolă.
    cutting_application:
      name: Aplicație de tăiere
      description: Scenariul de utilizare principal prevăzut ca tăiere pentru foarfece.
    cutting_mat_grid_style:
      name: Stil grilă caroiaj de tăiere
      description: Stilul de ghidaj imprimat pe suprafața caroiajului.
    cutting_mat_intended_use:
      name: Utilizarea preconizată a caroiajului de tăiere
      description: Suprafața principală de lucru/artizanală pentru care este conceput
        covorașul pentru tăiere.
    cv_boot_clamp_type:
      name: Tip clemă pentru protecție CV
      description: Specifică stilul clemei/benzii utilizate pentru fixarea protecției
        CV.
    cv_boot_kit_contents:
      name: Conținut kit protecție CV
      description: Enumeră ce este inclus în protecția CV (de exemplu, cleme, pachet
        de vaselină, benzi de fixare).
    cv_boot_material:
      name: Materialul protecției CV
      description: Specifică materialul principal de construcție al protecției CV.
    cv_boot_position:
      name: Poziția protecției CV
      description: Specifică dacă protecția CV se potrivește poziției interioare (înăuntru)
        sau exterioare (la exterior) a articulației CV de pe axă.
    cycling_apparel_fit:
      name: Potrivire îmbrăcăminte pentru ciclism
      description: Descrie croiala hainei, indicând strâmtețea și aerodinamica dorite
        (de exemplu, Race, Relaxed).
    cylinder_head_assembly:
      name: Ansamblul chiulasei
      description: Specifică nivelul de completitudine al chiulasei așa cum este vândută
        (de exemplu, complet asamblată cu componentele sistemului de supape instalate
        vs. turnată neasamblată/nemontată).
    cylinder_head_material_grade:
      name: Gradul materialului chiulasei
      description: Specifică materialul și gradul utilizate pentru turnarea chiulasei.
    cylinder_head_position:
      name: Poziția chiulasei
      description: Identifică banca/partea sau orientarea chiulasei pe motoarele cu
        mai multe bănci (de exemplu, partea stângă/dreapta sau banca 1/banca 2).
    cymbal_alloy:
      name: Aliaj de cinele
      description: Aliajul/compoziția cinelului (cinelelor) din kit.
    cymbal_application:
      name: Aplicație pentru cinel
      description: Aplicația principală de interpretare pentru care este proiectat/promovat
        cinelul.
    cymbal_arm_mounting_interface:
      name: Interfață de montare a brațului cinelului
      description: Specifică modul în care se atașează brațul cinelului la suportul
        hardware-ului tobei (de exemplu, clemă, stativ, suport).
    cymbal_arm_rotation_positioning_features:
      name: Funcții de rotație/poziționare a brațului cinelului
      description: Precizează caracteristicile de poziționare care afectează modul
        în care brațul poate fi înclinat/rotit și blocat.
    cymbal_arm_style:
      name: Stilul brațului cinelului
      description: Specifică dacă brațul unui cinel este drept sau telescopic, pentru
        preferințe privind acoperirea și poziționarea.
    cymbal_drum_case_wheel_configuration:
      name: Configurația roților carcasei pentru cinele și tobe
      description: Indică dacă are roți carcasa și (dacă este cazul) care este configurația
        roților pentru transportul pe roți.
    cymbal_hammering_style:
      name: Stilul de ciocănire a cinelelor
      description: Procesul/aspectul de ciocănire care afectează complexitatea și
        senzația.
    cymbal_kit_components_included:
      name: Componente incluse în kitul cinelului
      description: Specifică tipurile de cinele incluse în kit/pachet de cinele „ride”
        (pe lângă cinelul „ride” în sine).
    cymbal_kit_items_included:
      name: Articole incluse în kitul cinelului
      description: Identifică cinelele incluse în kit/pachet (după tipul de cinel).
    cymbal_lathing:
      name: Strunjire cinel
      description: Specifică dacă/cât de mult din suprafața cinelului este strunjită
        (canelată) vs. nestrunjită/brută.
    cymbal_playing_style_genre:
      name: Stil/gen de interpretare la cinel
      description: Identifică contextul tipic de interpretare pentru care sunt concepute
        cinelele (de exemplu, cinele de dans oriental vs. cinele de mână pentru marș/orchestral).
    cymbal_set_configuration:
      name: Configurația setului de cinele
      description: Indică dacă produsul este vândut ca un singur cinel, ca pereche
        sau ca set cu mai multe perechi (de exemplu, pentru instruire în grup).
    cymbal_sound_character:
      name: Caracterul sonor al cinelului
      description: Descrie profilul tonal/vocea generală a cinelului folosit pentru
        descoperire (de exemplu, deschis vs. închis).
    cymbal_sustain:
      name: Sustain cinel
      description: Cât timp sună cinelul după ce este lovit.
    cymbal_type:
      name: Tip de cinel
      description: Specifică rolul funcțional al cinelului pe care pad-ul electronic
        de cinel este destinat să îl emuleze.
    cymbal_volume_level:
      name: Nivelul volumului cinelelor
      description: Categoria de intensitatea/ieșire percepută a cinelului.
    cymbal_weight_class:
      name: Clasa de greutate a cinelelor
      description: Indică clasa de greutate a cinelului, care afectează tonul, volumul
        și răspunsul.
    dairy_heat_treatment:
      name: Tratament termic pentru lactate.
      description: Identifică nivelul de procesare sau pasteurizare aplicat smântânii
        (de exemplu, crudă, pasteurizată, UHT), care afectează durata de viață a smântânii,
        aroma și performanța la batere.
    damage_type:
      name: Tipul de daună
      description: Specifică tipurile de daune ale parbrizului pe care kitul este
        destinat să le repare.
    damper_pedal_style:
      name: Stil pedală de amortizor
      description: Descrie stilul fizic al pedalei de amortizor utilizată la claviaturi/piane
        digitale.
    damping_adjustability:
      name: Reglarea amortizării
      description: Indică ce parametri de amortizare și/sau înălțime sunt ajustabili
        pe amortizor.
    damping_level:
      name: Nivel de amortizare
      description: Indică cantitatea relativă de reducere a volumului și de sustain
        oferită de surdină.
    dance_occasion:
      name: Ocazie de dans
      description: Indică contextul dorit pentru utilizarea articolului de îmbrăcăminte
        în cadrul antrenamentelor sau spectacolului de dans.
    darbuka_accessories_included:
      name: Accesorii pentru darbuka incluse
      description: Listează accesoriile comune incluse cu darbuka.
    darbuka_body_finish_type:
      name: Tipul de finisaj al corpului de darbuka
      description: Descrie finisajul exterior, învelișul sau tratamentul decorativ
        al corpului de darbuka.
    darbuka_head_material:
      name: Material pentru capul de darbuka
      description: Specifică materialul membranei membranei de tobă pentru darbuka.
    dart_barrel_material:
      name: Materialul țevii dartului
      description: Specifică materialul principal al țevii dartului, care afectează
        distribuția greutății, durabilitatea și prețul.
    dart_shaft_design:
      name: Designul ax dart
      description: Clasifică designul mecanic al axului, cum ar fi dacă este fix,
        rotativ, telescopic sau integrează traiectoria, ceea ce afectează performanța
        și prețul.
    dart_shaft_thread_type:
      name: Tip de fir ax dart
      description: Indică dimensiunea/tipul firului folosit pentru înșurubarea axului
        în țeava dartului, asigurând compatibilitatea dintre axuri și țevi.
    dart_thread_size:
      name: Dimensiunea filetului de darts
      description: Specifică dimensiunea/standardul firului cu care este compatibilă
        piesa, asigurând potrivirea dintre axuri, vârfuri și țevi.
    dart_tip_compatibility:
      name: Compatibilitate cu vârful de săgeți
      description: Indică dacă piesa de dart este destinată pentru vârf de oțel, vârf
        moale sau ambele stiluri de dartsuri.
    dart_tip_connection_type:
      name: Tip de conexiune vârf dart
      description: Descrie specificația firului sau sistemul de montare pe care vârful
        îl folosește pentru a se atașa la o țeavă sau la un ax de dart, asigurând
        compatibilitatea.
    dartboard_tournament_approval:
      name: Aprobare plăci pentru darts pentru turnee
      description: Indică dacă placa pentru darts este aprobată oficial de anumite
        federații sau ligi de darts.
    dartboard_type:
      name: Tipul de placă pentru darts
      description: Clasifică placa pentru darts în funcție de tehnologia de construcție
        și compatibilitatea dartsurilor (de exemplu, cu peri, electronică, magnetică).
    dash_cover_construction_type:
      name: Tipul de construcție al husei de bord
      description: Descrie modul în care este formată/structurată husa de bord (de
        exemplu, turnată vs. cusută), ceea ce afectează precizia potrivirii și aspectul.
    dash_cover_cutout_configuration:
      name: Configurația decupajului husei de bord
      description: Indică pentru ce orificii/senzori dintr-un bord OEM este pre-tăiată
        sau formată husa.
    dashboard_accessory_position:
      name: Poziția accesoriului pe panoul de bord
      description: Specifică locul pe/în jurul panoului de bord unde va fi amplasat
        sau montat accesoriul.
    date_variety:
      name: Soi de curmale
      description: Specifică soiul/varietatea de curmale (de exemplu, Medjool, Deglet
        Noor, Ajwa). Varietatea influențează puternic aroma, dimensiunile, textura
        și este prezentată în majoritatea titlurilor, produselor și descrierilor,
        așadar captarea ei îmbunătățește filtrarea și descoperirea.
    dayan_head_material:
      name: Materialul membranei dayanului
      description: Materialul suprafeței de joc (pudi), cum ar fi natural sau sintetic.
    dayan_strap_material:
      name: Materialul curelei dayanului
      description: Materialul curelelor de tensiune (baddhi) folosite pentru a lega
        dayanul.
    dayan_syahi_type:
      name: Tipul de syahi dayan
      description: Tip de syahi (pastă neagră de acordaj) aplicată pe capul dayanului.
    decaffeination_method:
      name: Metoda de decofeinizare
      description: Identifică procesul utilizat pentru eliminarea cofeinei din cafeaua
        decofeinizată.
    decal_installation_method:
      name: Metoda de instalare a autocolantelor
      description: Cum se aplică autocolantul pe suprafața vehiculului (de exemplu,
        aplicare uscată, aplicare umedă). Detaliile despre unelte/cerințe (de exemplu,
        bandă Transferuri sau pistol termic) trebuie incluse în instrucțiuni sau în
        atributele aferente uneltei, atunci când este cazul.
    decal_orientation:
      name: Orientarea autocolantului
      description: Dacă autocolantul este destinat aplicării pe interiorul sticlei
        sau pe suprafața exterioară.
    decal_placement_type:
      name: Tip de poziționare a autocolantului
      description: Indică locul de pe vehicul unde va fi aplicat autocolantul (de
        exemplu, panoul caroseriei, bara de protecție, capota).
    decal_visibility_property:
      name: Proprietatea de vizibilitate a autocolantului
      description: Proprietățile optice/de vizibilitate ale unui autocolant destinate
        îmbunătățirii vizibilității sau a răspunsului la lumină (de exemplu, caracteristici
        reflectorizante, fluorescente, de strălucire în întuneric sau de transparență).
    deck_concave_level:
      name: Nivel concavitate a punții
      description: Indică adâncimea sau intensitatea concavității punții (de exemplu,
        mică, medie, profundă).
    deck_flex_rating:
      name: Indicele de flexibilitate al punții
      description: Evaluare calitativă a flexibilității/rigidității punții.
    deck_material:
      name: Materialul punții
      description: Identifică materialul principal de construcție al plăcii de skateboard.
    decoder_interface_socket_type:
      name: Interfață decodor/tip soclu
      description: Tipul de interfață a decodorului digital sau configurația decodorului
        de la bord pentru modelul de locomotivă.
    decoration_technique:
      name: Tehnica de decorare
      description: Identifică metoda principală utilizată pentru aplicarea graficii
        sau a ornamentelor pe tricou.
    decorative_stamp_form_factor:
      name: Factor de formă al ștampilei decorative
      description: Identifică formatul fizic al ștampilei și modul în care se imprimă
        un model (ștampilă individuală, set, rolă, fundal etc.).
    decorative_tape_application:
      name: Aplicare bandă decorativă
      description: Scenariu de utilizare principal în artizanat pentru care banda
        decorativă este concepută sau promovată.
    decorative_tape_format:
      name: Format bandă decorativă
      description: Specifică modul în care este furnizată/ambalată pentru utilizare
        banda decorativă.
    decoy_buoyancy:
      name: Flotabilitate momeală
      description: Descrie cum se comportă momeala în coloana de apă (plutește, suspensie
        sau scufundare).
    decoy_joint_type:
      name: Tip de articulație momeală
      description: Indică dacă corpul momelii este solid sau articulat, afectând acțiunea
        de înot.
    decoy_motion_mechanism:
      name: Mecanismul de mișcare a momelii
      description: Descrie cum, dacă este cazul, momeala produce mișcare sau perturbă
        apa pentru a atrage prada.
    decoy_posture:
      name: Postura momeală
      description: Indică poziția sau activitatea animalului modelat de momeală (de
        exemplu, hrănire, odihnă, alertă).
    decoy_size_class:
      name: Clasa de dimensiuni pentru momeală
      description: Clasifică scara relativă a momelii în comparație cu animalul real
        (de exemplu, Standard, Magnum, Supradimensionat).
    decoy_style:
      name: Stilul de momeală
      description: Definește factorul de formă fizică sau clasa de design a momelii
        pentru a-i ajuta pe vânători să aleagă configurația corectă.
    deli_meat_variety:
      name: Varietate de mezeluri
      description: Clasifică stilul specific de mezeluri (de exemplu, salam, bologna,
        prosciutto, friptură de vită).
    delivery_form:
      name: Forma de livrare
      description: Formă de livrare rapidă pentru produsul de curățare a injectorului.
    denim_composition:
      name: Compoziție denim
      description: Compoziția fibrelor principale ale denimului (fibrele de bază,
        excluzând coloranții/finisajele).
    denim_finish:
      name: Finisaj denim
      description: Finisaj de suprafață/prelucrare aplicat țesăturii din denim.
    denim_intended_use:
      name: Utilizarea preconizată a denimului
      description: Proiectul/utilizarea tipică pentru care este promovat denimul.
    denim_stretch_type:
      name: Tip elasticitate denim
      description: Dacă denimul are elasticitate mecanică, are adaos de elastan/spandex
        sau nu este elastic.
    denim_wash:
      name: Spălare denim
      description: Indică nuanța sau tratamentul de spălare aplicat țesăturii din
        denim (de exemplu, deschis, închis, brut, acid).
    derailleur_cage_length:
      name: Lungimea coliviei schimbătorului de foi
      description: Indică lungimea coliviei schimbătorului de viteze, care determină
        capacitatea lanțului (în principal pentru schimbătoarele spate).
    derailleur_mounting_style:
      name: Stilul de montare al schimbătorului de foi
      description: Specifică modul în care se atașează schimbătorul de foi la cadrul
        sau la suportul bicicletei (de exemplu, prin lipire, cu clemă, prin montare
        directă, UDH).
    derailleur_type:
      name: Tipul schimbătorului de foi
      description: Indică dacă produsul este un schimbător față sau spate.
    deshedder_tool_type:
      name: Tipul sculei pentru îndepărtarea părului în exces
      description: Clasifică stilul structural al articolului pentru îndepărtarea
        părului în exces, astfel încât cumpărătorul să își poată alege metoda de îngrijire
        preferată (de exemplu, lamă, bloc, curry sau mănușă).
    diabolo_axle_system:
      name: Sistem de axe Diabolo
      description: Specifică sistemul/configurația axei diabolo care afectează șlefuirea,
        stabilitatea și uzura corzii.
    diagnostic_functions_supported:
      name: Funcții de diagnosticare acceptate
      description: Specifică funcțiile de diagnosticare/întreținere pe care le poate
        efectua scanerul.
    diagnostic_interface_type:
      name: Tipul de interfață de diagnosticare
      description: Conexiune/interfață utilizată pentru comunicarea cu vehiculul sau
        dispozitivul (de exemplu, OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Clasele de culoare ale diamantului
      description: Indică clasele de culoare ale diamantelor, de la D (incolor) la
        Z (culoare deschisă) sau desemnează diamante de culoare neobișnuită.
    diaper_cover_style:
      name: Tipul chiloțelului de acoperire pentru scutec
      description: Definește silueta sau stilul decorativ al chiloțelului de acoperire
        a scutecului, pentru a facilita căutarea și filtrarea în funcție de model.
    diastatic_power_unit:
      name: Unitate de alimentare diastatică
      description: Precizează sistemul de unități utilizat pentru raportarea valorii
        puterii diastatice a unui produs (de exemplu, °Lintner față de Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Sistemul de acordare al armonicii diatonice
      description: Specifică dispunerea notelor/sistemul de acordaj utilizat de armonica
        diatonică.
    dice_sides:
      name: Fețe zaruri
      description: Numărul de fețe ale fiecărui zar inclus în produs (de ex., d6,
        d20). În cazul seturilor mixte, folosește valoarea predominantă sau enumeră
        mai multe valori, dacă această opțiune este disponibilă.
    didgeridoo_construction_type:
      name: Tipul de construcție al didgeridoo
      description: Cum este construit sau format un didgeridoo (abordare tradițională
        sau modernă de construcție).
    dietary_formulation_claim:
      name: Declarație privind compoziția nutrițională
      description: Evidențiază caracteristicile cheie ale compoziției sau ingredientele
        excluse, relevante pentru nutriția cailor (de exemplu, fără cereale, conținut
        redus de amidon, organic).
    dinosaur_playset_scale_figure_size_class:
      name: Dimensiunea setului de joc cu dinozauri/clasa de dimensiuni a figurinelor
      description: Prezintă dimensiunile generale a dinozaurilor/figurinelor incluse,
        pentru a facilita compatibilitatea cu alte seturi.
    dinosaur_species_included:
      name: Specii de dinozauri incluse
      description: Identifică speciile de dinozauri reprezentate în setul de joc (figurine
        sau dinozauri modelați).
    dipsy_diver_size_designation:
      name: Clasificare dimensiune pentru scufundător dipsey
      description: Indică codul dimensional definit de producător al scufundătorului
        dipsey pentru pescuit, care se corelează cu greutatea și cu adâncimea scufundării.
    disc_brake_rotor_mount_type:
      name: Tipul de montare al rotorului frânei cu disc
      description: Identifică modul în care un disc de frână se atașează la butuc
        (de exemplu, cu 6 șuruburi, Center Lock).
    disc_lock_accessories_included:
      name: Accesorii incluse pentru blocarea discului
      description: Precizează articolul suplimentar ambalat împreună cu un blocator
        de disc pentru bicicletă, precum un cablu de siguranță, o husă de transport,
        un suport de montare sau baterii.
    disco_ball_mirror_tile_material:
      name: Materialul oglinzilor bilei disco
      description: Materialul plăcuțelor reflectorizante de pe globul disco (dacă
        este cazul).
    disco_ball_mirror_tile_size:
      name: Dimensiunea aproximativă a plăcuțelor de oglindă de pe globul disco
      description: Dimensiunea aproximativă a plăcuțelor oglindă individuale/pătratelor
        de pe globul disco.
    display_backlight_color:
      name: Culoarea iluminării de fundal a afișajului
      description: Culoarea iluminării/fundalului afișajului/cadranului contorului.
    disposable_compostable_claim:
      name: Declarație privind caracterul de unică folosință/compostabil
      description: Indică dacă produsul este compostabil, biodegradabil, reciclabil
        sau nu este compostabil (unde este cazul).
    distillation_method:
      name: Metoda de distilare
      description: Identifică metoda de distilare sau tipul de alambic utilizat pentru
        producerea băuturii spirtoase.
    distilled_water_intended_use:
      name: Utilizarea prevăzută a apei distilate
      description: Definește destinația principală a apei distilate (de exemplu, consumul
        uman, aparatul CPAP, umidificatorul, fierul de călcat cu abur).
    distress_transmission_frequency:
      name: Frecvența de transmisie a semnalului de urgență
      description: Frecvența/frecvențele radio principale utilizate pentru alertarea
        în caz de urgență.
    distressing_level:
      name: Nivel de uzură
      description: Specifică gradul de uzură intenționată, rupturi sau dezlipiri aplicate
        materialului.
    distressing_style:
      name: Stil uzat
      description: Indică tipul sau nivelul de uzură al blugilor, cum ar fi rupturi
        sau fire.
    distributor_advance_mechanism:
      name: Mecanismul de avans al distribuitorului
      description: Specifică tipul de mecanism de avansare a sincronizării aprinderii
        utilizat de distribuitor.
    distributor_cap_terminal_type:
      name: Tip de terminal al capacului distribuitorului
      description: Specifică stilul terminalelor capacului distribuitorului.
    distributor_gear_material:
      name: Materialul angrenajului distribuitorului
      description: Specifică materialul roții dințate de antrenare a distribuitorului.
    distributor_ignition_type:
      name: Tipul de aprindere distribuitor
      description: Specifică dacă distribuitorul este proiectat pentru aprindere cu
        puncte, aprindere electronică sau sisteme de tip HEI.
    distributor_kit_contents:
      name: Conținut kit distribuitor
      description: Indică componentele incluse cu distribuitorul (de exemplu, capac,
        rotor, modul de aprindere, garnitură/garnitură inelară, angrenaj de acționare,
        cablaj/conector).
    dive_computer_form_factor:
      name: Factor de formă al computerului de scufundări
      description: Specifică designul fizic sau metoda de montare a computerului de
        scufundări, cum ar fi montare pe consolă sau pe ceas.
    diving_mask_design:
      name: Designul măștii de scufundare
      description: Definește stilul structural general al măștii de scufundare, influențând
        potrivirea, câmpul vizual și utilizarea preconizată.
    divot_tool_prong_configuration:
      name: Configurația vârfului sculei Divot
      description: Specifică numărul și dispunerea dinților de pe unealta divot utilizată
        pentru repararea daunelor la gazon.
    divot_tool_style:
      name: Stilul uneltei Divot
      description: Definește stilul general structural sau de utilizare a sculei divot,
        cum ar fi fixă, cu lamă retractabilă/pliabilă, multifuncțională sau accesorii
        care se fixează pe o pălărie sau o crosă.
    djembe_shell_construction:
      name: Construcția carcasei Djembe
      description: Descrie metoda de construcție a corpului/carcasei djembe-ului.
    djembe_tuning_system:
      name: Sistem de acordare pentru djembe
      description: Specifică modul în care este tensionat/acordat djembe-ul.
    dmx_output_connector_type:
      name: Tip conector de ieșire DMX
      description: Formatul conectorului fizic utilizat pentru porturile de ieșire
        DMX ale controlerului.
    doctor_playset_items_included:
      name: Articole incluse în setul de joacă de-a doctorul
      description: Specifică instrumentele medicale simulate și accesoriile pentru
        jocuri de rol incluse în setul de joacă cu doctori (de exemplu, stetoscop,
        seringă, ciocan de reflexe).
    doctor_playset_role_play_setting:
      name: Setare joc de rol pentru setul de joacă cu doctori
      description: Identifică context principal de joc de rol pe care îl reprezintă
        setul de joc cu doctori.
    doctor_playset_wearable_items_included:
      name: Articole purtabile incluse în setul de joacă de-a doctorul
      description: Indică componentele costumului purtabile incluse în setul de joacă.
    doll_accessory_type:
      name: Tip de accesoriu pentru păpușă
      description: Definește ce tip de păpușă sau accesoriu pentru figurină este produsul
        (de exemplu, îmbrăcăminte, încălțăminte, mobilier, standuri de prezentare),
        permițând cumpărătorului să răsfoiască și să filtreze în cadrul acestei categorii
        de accesorii.
    doll_eye_type:
      name: Tip ochi de păpușă
      description: Specifică stilul de construcție pentru ochii păpușii (de exemplu,
        acrilic încrustat, pictat, iluminat cu LED).
    doll_hair_fiber_type:
      name: Tip de fibră al părului păpușii
      description: Tipul de păr/fibră folosit la păpușă (sau deloc), care afectează
        realismul, stilul și îngrijirea.
    doll_making_kit_components_included:
      name: Componente incluse în kitul de fabricare a păpușilor
      description: Listează materialele și uneltele cheie incluse în kitul de confecționare
        a păpușilor, astfel încât cumpărătorul să poată compara pachetul și să știe
        de ce are nevoie pentru a-l furniza singur.
    dollhouse_installation_placement_type:
      name: Tip de instalare/poziționare casă de păpuși
      description: Cum va fi utilizată sau amplasată casa de păpuși (de exemplu, pe
        masă vs. pe podea vs. montată pe perete).
    dollhouse_items_included:
      name: Articole incluse pentru casa de păpuși
      description: Identifică ce se află în cutia care conține casa de păpuși (mobilă,
        păpuși, accesorii).
    dollhouse_lighting_type:
      name: Tip de iluminare pentru casa de păpuși
      description: Tipul de iluminat inclus în sau acceptat de casa de păpuși.
    dollhouse_room_type:
      name: Tipul camerei din casa de păpuși
      description: Precizează camera/zona preconizată dintr-o casă de păpuși unde
        este utilizat de obicei accesoriul.
    dollhouse_scale:
      name: Scală pentru casa de păpuși
      description: Raportul de scară al unei case de păpuși sau al accesoriilor acesteia
        (de exemplu, 1:12), pentru a asigura compatibilitatea între case, mobilier
        și figurine.
    dollhouse_style_theme:
      name: Stil/temă casă de păpuși
      description: Stilul general sau tema casei de păpuși, pentru răsfoire și oferire
        de cadouri (ex., modern vs victorian).
    donnos_playing_technique:
      name: Tehnica de joc pentru donno
      description: Cum se joacă/se acționează donnosul (doar cu mâna vs. cu băț/percutor),
        pentru a se potrivi așteptărilor cumpărătorului și accesoriilor incluse.
    donnos_tuning_system:
      name: Sistemul de acordare a donnosului
      description: Metodă principală utilizată pentru acordarea sau schimbarea tonalității
        (de exemplu, corzi de tensiune/mecanism de compresie).
    door_assembly_type:
      name: Tipul de ansamblu al ușii
      description: 'Indică ce este inclus: doar carcasa ușii, învelișul ușii sau ansamblul
        complet al ușii.'
    door_closure_mechanism:
      name: Mecanismul de închidere a ușii
      description: Definește mecanismul care controlează acțiunea de închidere a ușii
        (de exemplu, închidere silențioasă, zăvor magnetic).
    door_handle_components_included:
      name: Componente incluse pentru mânerul ușii
      description: Indică piesele cheie incluse cu mânerul ușii (de exemplu, cilindrul
        încuietorii, garnitura/etanșarea, capacul decorativ, componente hardware de
        montare, conectorul pentru cabluri, zăvor/actuator).
    door_handle_operation:
      name: Funcționarea mânerului ușii
      description: Specifică stilul principal de acționare/funcționare a ansamblului
        mânerului ușii vehiculului (de exemplu, legătură mecanică, cilindru cheie,
        buton/atingere fără cheie, extragere electrică).
    door_lock_knob_attachment_method:
      name: Metoda de fixare a butonului de blocare a ușii
      description: Specifică modul în care se fixează butonul de blocare a ușii pe
        tija de blocare (de exemplu, prin înfiletare, prin apăsare).
    door_lock_position:
      name: Poziția încuietorii ușii
      description: Precizează pe ce poziție a ușii/deschiderii este proiectată să
        se monteze încuietoarea ușii sau componenta acesteia pe un vehicul.
    door_seal_feature_set:
      name: Set de caracteristici ale garniturii ușii
      description: Caracteristici funcționale ale garniturii ușii.
    door_seal_material_type:
      name: Tipul de material al garniturii ușii
      description: Familiile principale de elastomeri/materiale utilizate pentru garnitura
        ușii (în afară de materialele generice).
    door_seal_product_form:
      name: Formular de produs pentru garnitura ușii
      description: Indică forma de comercializare/ambalare a garniturii pentru ușă.
    door_window_operation:
      name: Funcționarea geamului ușii
      description: Precizează dacă sistemul de ferestre al ușii este este prevăzut
        pentru acționare manuală sau electrică sau dacă ușa nu are ferestre.
    double_decker_bus_deck_configuration:
      name: Configurația etajelor autobuzului supraetajat
      description: Precizează configurația accesului la etaj/pe acoperișul unui autobuz
        supraetajat.
    double_drum_pedal_linkage_medium:
      name: Mecanism de transmisie pentru pedală dublă de tobe
      description: Precizează mecanismul utilizat pentru a conecta pedala secundară
        la pedala principală (de exemplu, arbore de transmisie, lanț, curea).
    double_end_bag_core_type:
      name: Tip de miez de sac cu două capete
      description: Identifică structura internă a miezului de lovire, care determină
        viteza de revenire, senzația la impact și cerințele de întreținere.
    double_pointed_needle_point_style:
      name: Tipul vârfului acului cu două capete
      description: Descrie ascuțimea/forma vârfului, în funcție de tipurile de fire
        și stilurile de tricotat.
    dough_extruder_accessories_included:
      name: Accesorii incluse pentru extruderul de aluat
      description: Componente suplimentare incluse cu extruderul de aluat.
    dough_extruder_operation_type:
      name: Modul de funcționare al extruderului de aluat
      description: Modul în care aluatul este împins prin extruder pentru a obține
        diferite forme
    dough_extruder_shape_disc_included:
      name: Disc de modelare pentru extruderul de aluat – inclus
      description: Formele pe care extruderul le poate produce cu ajutorul discurilor/duzelor
        incluse.
    dough_format:
      name: Formatul aluatului
      description: Descrie aspectul fizic/forma aluatului din interiorul ambalajului
        (de exemplu, bilă, foaie, disc, fâșii).
    doumbek_accessories_included:
      name: Accesorii incluse pentru doumbek
      description: Accesorii incluse cu doumbek-ul (de exemplu, cheie de acordaj,
        husă).
    doumbek_head_material:
      name: Materialul membranei doumbek-ului
      description: Materialul din care este confecționată membrana tamburului doumbek.
    doumbek_head_type:
      name: Tipul membranei de doumbek
      description: Construcția/tipul membranei doumbek (modul în care este fabricată
        sau montată membrana).
    doumbek_playing_style_technique:
      name: Stilul/tehnica de interpretare la doumbek
      description: Contextul/stilul de interpretare pentru care este destinat doumbek‑ul.
    doumbek_tuning_system:
      name: Sistemul de acordare a doumbek-ului
      description: Cum este tensionat/acordat doumbek‑ul (sau dacă nu este acordabil).
    dowel_end_style:
      name: Forma capătului diblului
      description: Descrie forma capetelor diblurilor, care influențează ușurința
        introducerii, siguranța și utilizarea în proiectele de bricolaj.
    dowel_surface_texture:
      name: Textura suprafeței diblului
      description: Descrie aspectul suprafeței diblului, cum ar fi netedă sau canelată,
        care influențează aspectul și aderența adezivului.
    drafting_compass_adjustment_mechanism:
      name: Mecanismul de reglaj al compasului de desen tehnic
      description: Mecanismul principal de reglare fină utilizat pentru a stabili
        raze cu precizie.
    drafting_compass_fine_adjustment_mechanism:
      name: Mecanismul de reglaj fin al compasului de desen tehnic
      description: Tipul de ajustare fină utilizat pentru setarea precisă a razei
        (dacă este disponibil).
    drafting_compass_lead_holder_type:
      name: Tipul mecanismului de fixare a minei în compasul de desen tehnic
      description: Tipul de inserție/suport de desen inclus sau compatibil cu compasul.
    drag_system_material:
      name: Materialul sistemului de frânare
      description: Identifică materialul sau tehnologia utilizată în ansamblul de
        frânare, care influențează rezistența la căldură și fluiditatea mișcării.
    drag_system_type:
      name: Tipul sistemului de frânare
      description: Identifică tipul de sistem de frânare utilizat la mulinetă, cum
        ar fi frânarea frontală, posterioară, cu manetă, în stea, magnetică sau cu
        disc.
    drag_type:
      name: Tipul de frânare
      description: Specifică stilul mecanismului de frânare utilizat de tambur (poziția
        sau metoda de acționare).
    drawer_features:
      name: Caracteristici ale sertarului
      description: Detalii despre elementele de construcție sau funcționalitățile
        speciale ale sertarelor (de exemplu, închidere lentă, căptușite cu pâslă).
    drawer_slide_type:
      name: Tipul glisierei sertarului
      description: Specifică modul de montare și de extindere a glisierelor pentru
        sertare (de exemplu, sub blat, extensie completă).
    drawing_ink_compatible_tools:
      name: Instrumente compatibile cu cerneala de desen
      description: Indică instrumentele cu care se aplică cerneala (de exemplu, peniță
        vs. pensulă etc.).
    drawing_ink_permanence:
      name: Persistența cernelii de desen
      description: Indică caracteristicile de persistență importante pentru lucrările
        de artă finite și reproduceri.
    dress_embellishment:
      name: Elemente decorative ale rochiei
      description: Evidențiază elementele decorative proeminente integrate în designul
        rochiei.
    dress_train_type:
      name: Tipul trenei rochiei
      description: Indică prezența și lungimea/stilul trenei rochiei, aspecte care
        influențează nivelul de formalitate și adecvarea la locație.
    dried_surface_finish:
      name: Finisajul suprafeței uscate
      description: Descrie aspectul tipic al suprafeței după uscare (luciu/textură).
    drink_tube_insulation:
      name: Izolația tubului pentru băut
      description: Indică dacă tubul pentru băut include izolație sau un manșon termic
        pentru a împiedica încălzirea sau înghețarea lichidelor.
    drive_band_cross_section_shape:
      name: Forma secțiunii transversale a curelei de transmisie
      description: Forma profilului curelei de transmisie (rotundă, plată etc.).
    drive_band_join_type:
      name: Tip de îmbinare al curelei de transmisie
      description: Cum este îmbinată/construită cureaua de transmisie (fără capete
        vs. care necesită legare etc.).
    drive_band_material_type:
      name: Tipul materialului benzii de transmisie
      description: Specifică materialul/tipul curelei de transmisie utilizată la roțile
        de filare.
    drive_location:
      name: Amplasarea mecanismului de acționare
      description: Identifică locul în care este poziționat volantul/mecanismul de
        acționare pe bicicleta eliptică, amprenta la sol și senzația de mișcare.
    drive_mechanism:
      name: Mecanismul de acționare
      description: Identifică tipul de transmisie utilizat pentru a transfera puterea
        de la pedale la volant.
    drive_shaft_material:
      name: Materialul arborelui de transmisie
      description: Specifică materialul principal de fabricație al tubului arborelui
        de transmisie sau al ansamblului complet.
    drive_system:
      name: Sistem de acționare
      description: Specifică mecanismul prin care forța exercitată asupra pedalei
        este transferată către sistemul de rezistență.
    drivetrain_configuration:
      name: Configurația transmisiei
      description: Specifică configurația transmisiei bicicletei, indicând dacă butucul
        spate este fix, cu roată liberă, cu o singură viteză sau basculant.
    drivetrain_speed_compatibility:
      name: Compatibilitatea vitezei transmisiei
      description: Listează vitezele casetei cu care este proiectată foaia de angrenaj,
        asigurând profiluri și spațiere adecvate ale dinților.
    drone_positioning_system:
      name: Sistem de poziționare pentru drone
      description: Indică tehnologia de poziționare/menținere integrată în dronă pentru
        navigare și planare stabilă.
    drone_transmission_type:
      name: Tipul de transmisie al dronei
      description: Metoda principală utilizată pentru controlul și/sau legătura video
        dintre dronă și unitatea de control/dispozitiv.
    drop_spindle_whorl_position:
      name: Poziția rotiței de fus
      description: Poziția rotiței de fus pe ax.
    drum_carder_accessories_included:
      name: Accesorii incluse pentru cardator de tambur
      description: Articol inclus în mod obișnuit cu un kit de cardare a tamburului.
    drum_clamp_locking_mechanism:
      name: Mecanism de blocare a clemei tobei
      description: Specifică modul în care clema se blochează/se strânge pe tub/cerc
        (de exemplu, șurub cu fluture, șurub pentru cheie de tobă, sistem de eliberare
        rapidă).
    drum_clamp_mount_interface:
      name: Interfață de montare a clemei pentru tobă
      description: Specifică ce oferă clema pentru atașarea accesoriilor (de exemplu,
        receptor cu tijă în L, articulație sferică, dispozitiv de înclinare a cimbalului).
    drum_clamp_type:
      name: Tipul de clemă pentru tobă
      description: Specifică tipul de clemă funcțională utilizată în sistemul de fixare
        al kitului de tobe (de exemplu, clemă pentru inel vs. clemă cu șină/tub).
    drum_head_application_batter_resonant:
      name: Utilizarea membranei tobei (pentru lovire/pentru rezonanță)
      description: Specifică pentru ce parte/rol este proiectat membrana la o tobă
        ((suprafața superioară de lovire vs. partea inferioară de rezonanță/partea
        „snare”).
    drum_head_collar_type:
      name: Tipul de colier al membranei de tobă
      description: Specifică dacă capul are un profil de colier standard, colier jos
        sau colier special pentru a se potrivi anumitor muchii de reazem/tipuri de
        calapod.
    drum_head_damping_control:
      name: Controlul amortizării membranei de tobă
      description: Descrie funcțiile integrate de control al armonicelor sau tipul
        de amortizare inclus în designul membranei.
    drum_head_film_material:
      name: Materialul foliei membranei de tobă
      description: Materialul principal al foliei de acoperire (de obicei PET/Mylar,
        dar poate include și materiale speciale).
    drum_head_hoop_collar_type:
      name: Tip de ramă/guler pentru membrana de tobă
      description: Identifică construcția inelului și a colierului membranei de tobă
        (de exemplu, profilul colierului și materialul inelului), care pot afecta
        potrivirea și stabilitatea acordării la anumite corpuri și rame.
    drum_head_hoop_rim_material:
      name: Materialul inelului/marginii membranei de tobă
      description: Materialul inelului/marginii (inelul integrat în interiorul membranei),
        care poate afecta durabilitatea și stabilitatea acordării.
    drum_head_included:
      name: Membrană de tobă inclusă
      description: Indică dacă toba este dotată cu membrane de percuție și/sau membrane
        rezonante.
    drum_head_muffling_feature:
      name: Caracteristică de surdină pentru membrana de tobă
      description: Caracteristici integrate de control al armonicelor, incorporate
        în membrana tobei.
    drum_head_muffling_type:
      name: Tip de amortizor capete de tobe
      description: Indică dacă membrana de tobă include elemente încorporate de control/atenuare
        a armonicelor.
    drum_head_ply_count:
      name: Numărul de pliuri al capetelor de tobe
      description: Numărul de pliuri/straturi utilizate în construcția membranei de
        tobă (de exemplu, 1 pliu, 2 pliuri).
    drum_head_position:
      name: Poziția membranei de tobă
      description: Indică dacă membrana de tobă este destinată ca membrană de batere
        (sus/strike), membrană rezonantă (jos), membrană de tip snare-side (jos) sau
        poate fi utilizată în ambele moduri.
    drum_head_reinforcement_type:
      name: Tip de întărire a membranei de tobă
      description: Specifică dacă membrana capsei include caracteristici de întărire,
        cum ar fi un punct central sau un inel de control, pentru a crește durabilitatea
        și tonul focalizării.
    drum_head_surface_finish:
      name: Finisajul suprafeței pentru membrana de tobă
      description: Textura/finisajul suprafeței capului care influențează atacul și
        reacția periei.
    drum_head_type:
      name: Tipul membranei de tobă
      description: Precizează structura/tipul membranei utilizate pe tobă (în special
        pentru membranele de percuție și cele de rezonanță, așa cum sunt livrate).
    drum_key_design_type:
      name: Tipul de design al cheii de tobă
      description: Descrie designul funcțional al cheii tensionare tobe (de exemplu,
        standard, cu clichet, cu mâner în formă de T).
    drum_key_drive_type:
      name: Tipul de acționare a cheilor tobe
      description: Specifică stilul de acționare/interfață al cheii tobe utilizată
        pentru a cupla tija de tensiune sau hardware-ul de montare.
    drum_key_handle_style:
      name: Stilul cu mâner al cheii tobă
      description: Descrie mânerul/stilul ergonomic al cheii tobă, care afectează
        confortul și forța de apăsare în timpul acordării.
    drum_kit_included_items:
      name: Articole incluse în setul de tobe
      description: Enumeră articolele principale incluse în setul de tobe, pe lângă
        carcase și paduri (de exemplu, accesorii, cimbale, scaunul).
    drum_kit_portability:
      name: Portabilitatea setului de tobe
      description: Indică dacă kitul este conceput pentru depozitare/transport compact
        (de exemplu, pentru călătorii/compact/pliabil).
    drum_kit_shell_construction_features:
      name: Caracteristici ale construcției carcasei kitului de tobe
      description: Modul în care sunt construite carcasele (numărul/tipul de straturi),
        ceea ce afectează tonul și durabilitatea.
    drum_mount_clamp_type:
      name: Tipul clemei de montare a tobei
      description: Descrie tipul (forma) clemei utilizate în sistemul de montare al
        hardware-ului pentru tobe.
    drum_multi_clamp_clamp_type:
      name: Tipul de clemă cu cleme multiple pentru tobe.
      description: Stilul/configurația funcțională a clemei multiple (cum se fixează
        și ce conectează).
    drum_mute_material:
      name: Material pentru surdină pentru tobă
      description: Specifică materialul principal al surdinei pentru tobă care intră
        în contact cu membrana de tobă și/sau amortizează vibrațiile.
    drum_pad_triggering_zones:
      name: Zone de declanșare a pad-urilor de exersare tobă
      description: 'Indică numărul/tipul de zone de declanșare suportate de pad-ul
        de tom (de exemplu: doar membrană sau membrană + cerc), ceea ce influențează
        expresivitatea și compatibilitatea cu modulul.'
    drum_pedal_accessories_included:
      name: Accesorii incluse pentru pedala tobei
      description: Listează accesoriile și componentele cheie incluse în pachetul
        pedalei de tobe.
    drum_pedal_baseplate_type:
      name: Tip placă de bază pentru pedală de tobă
      description: Indică dacă pedala folosește o placă de bază sau un design plutitor/fără
        cadru.
    drum_pedal_bearing_type:
      name: Tipul rulmentului pedalei de tobă
      description: Specifică mecanismul de rulment utilizat la punctele principale
        de pivotare (de exemplu, basculă, călcâi, camă).
    drum_pedal_cam_type:
      name: Tipul camei pedalei de tobă
      description: 'Specifică forma/geometria camei unei pedale de tobă, care influențează
        senzația și răspunsul acesteia (de exemplu: liniară sau accelerator).'
    drum_pedal_chain_configuration:
      name: Configurația lanțului de pedale de tobă
      description: Specifică aranjamentul lanțurilor utilizat de o pedală de tobă
        cu acționare prin lanț (de exemplu, lanț simplu, lanț dublu sau lanț offset).
    drum_pedal_chain_type:
      name: Tipul lanțului pedalei de tobă
      description: Indică tipul de lanț utilizat în transmisie (de exemplu, lanț cu
        role vs. lanț tip bicicletă), care poate afecta fluiditatea și durabilitatea.
    drum_pedal_clamp_type:
      name: Tipul cu clemă pentru pedală de tobă
      description: Specifică modul în care pedala se atașează la cercul tobei bas
    drum_pedal_intended_use:
      name: Utilizarea prevăzută a pedalei de tobe
      description: Indică context principal de interpretare pentru care este proiectată
        pedala cu curea.
    drum_pedal_spring_adjustment_method:
      name: Metoda de reglare a arcului pedalei de tobă
      description: Indică modul în care se reglează tensiunea arcului pedalei.
    drum_pedal_spring_type:
      name: Tipul arcului pedalei de tobă
      description: Specifică mecanismul cu arc utilizat pentru acțiunea de revenire
        a pedalei.
    drum_shell_material:
      name: Materialul carcasei tobei
      description: Specifică materialul principal de construcție a carcasei pentru
        tobe acustice (de exemplu, arțar, mesteacăn, acril).
    drum_shell_wood_species:
      name: Specii de lemn utilizată pentru carcasele de tobă
      description: Identifică speciile de lemn folosite pentru carcasa tobei, ceea
        ce influențează timbrul și rezonanța.
    drumhead_type:
      name: Tip membrană de tobă
      description: Configurația/tipul membranei utilizate pe octoban.
    drumstick_model:
      name: Modelul bețelor de tobă
      description: Model/dimensiune standardizată a bețelor de tobă utilizată de multe
        mărci (de exemplu, 5A, 7A).
    drumstick_taper:
      name: Conicitatea bețelor de tobă
      description: Descrie profilul conic de la corpul bățului către vârf, influențând
        rebound-ul și echilibrul.
    drysuit_footwear_style:
      name: Stilul de încălțăminte impermeabile
      description: Descrie finisajul integrat al părții inferioare a gleznei a încălțămintei
        etanșe (de exemplu,bocanci integrați, șosete din neopren, șosete cu picior,
        manșete etanșe la nivelul gleznei).
    dumbbell_style:
      name: Stil haltere
      description: Identifică designul fundamental al halterei - fie că este o unitate
        fixă, un sistem reglabil sau cu mâner încărcabil- aspect care influențează
        semnificativ deciziile de achiziție și scenariile de utilizare în antrenamente.
    dundun_playing_position:
      name: Poziția de joc Dundun
      description: Poziția prevăzută pentru cântat/transportare a tobei.
    dye_status:
      name: Stare colorant
      description: Indică dacă stratul de vatelină este vopsit, nevopsit/natural sau
        include mai multe culori/amestecuri.
    dye_style:
      name: Stilul de vopsire
      description: Specifică dacă culoarea firului este vopsită uniform, pestriță
        sau vopsită prin tehnici speciale.
    dye_technique:
      name: Tehnica de vopsire
      description: Metoda utilizată pentru colorarea fibrei (de exemplu, vopsită manual,
        vopsită în cazan, vopsită secvențial).
    dye_type_needlecraft_fabric:
      name: Tip de vopsea (material textil pentru lucrări realizate manual cu acul)
      description: Indică dacă țesătura de in este vopsită uniform, vopsită manual
        sau vopsită prin tehnici speciale.
    dyeing_color_processing:
      name: Vopsire/prelucrare culori
      description: Descrie dacă și cum a fost colorată fibra (de exemplu, nevopsită,
        decolorată/albă sau tehnici specifice de vopsire).
    e_bike_certification_class:
      name: Curs de certificare pentru biciclete electrice
      description: Specifică indicele oficial de viteză al anvelopei pentru bicicletele
        electrice (de exemplu, E-25, E-50).
    e_bike_speed_rating:
      name: Indicele de viteză al bicicletelor electrice
      description: Indică nivelul oficial de certificare pentru biciclete electrice
        al anvelopei (de exemplu, E25 pentru ≤25 km/h, E50 pentru ≤50 km/h).
    e_scooter_connector_type:
      name: Tip conector trotinetă electrică
      description: Identifică tipul de conector sau ștecher electric utilizat de componentă
        pentru alimentare sau conectare semnal.
    e_scooter_throttle_type:
      name: Tipul de accelerație al trotinetei electrice
      description: Specifică tipul de accelerație utilizat pentru a controla accelerația
        pe o trotinetă electrică.
    ear_coverage:
      name: Acoperirea urechilor
      description: Specifică dacă casca include protecție pentru urechi și dacă aceasta
        este detașabilă.
    ear_coverage_style:
      name: Stilul de acoperire a urechilor
      description: Descrie cum sau dacă urechile sunt acoperite de masca anti-muște.
    ear_coverage_type:
      name: Tipul de acoperire a urechii
      description: Specifică modul în care pălăria acoperă sau protejează urechile,
        inclusiv prezența și stilul clapelor pentru urechi.
    ear_guard_type:
      name: Tipul de protecție pentru urechi
      description: Descrie stilul de protecție pentru urechi integrată în cască, cum
        ar fi cea din plastic dur, căptușită sau detașabilă.
    earmuff_style:
      name: Stilul căștilor pentru urechi
      description: Identifică modul în care se poartă căștile sau stilul lor structural
        (de exemplu, peste cap sau înfășurate în spatele capului).
    earring_closure_type:
      name: Tipul de închidere a cercelului
      description: Specifică mecanismul utilizat pentru fixarea cercelului pe ureche
        (de exemplu, prindere cu împingere înapoi, prindere cu pârghie, fixare cu
        clemă).
    easel_art_desk_features:
      name: Caracteristici ale șevaletului și biroului de artă
      description: Prezintă caracteristicile funcționale comune incluse ale șevaletului
        sau biroului de artă.
    easel_art_desk_surface_type:
      name: Tip de suprafață pentru șevalet și birou de artă
      description: Identifică suprafața/suprafețele utilizabilă(e) pentru desen/scris
        (de exemplu, tablă cu cretă, tablă albă, rolă de hârtie, tablă magnetică).
    eb_clarinet_body_type:
      name: Tip de corp al clarinetului în Mi bemol
      description: Specifică dacă clarinete Eb este o variantă soprană sau alto.
    eco_material_type:
      name: Tip de material ecologic
      description: Prezintă tehnologia spumei sau a materialelor ecologice utilizate
        în cadrul saltelei.
    edge_construction:
      name: Construcția marginii
      description: Indică dacă schiul are o muchie metalică pe toată lungimea, pe
        o parte din lungime sau deloc.
    edge_tuner_type:
      name: Tip de tuner de margine
      description: Clasifică stilul de reglare a marginilor schiurilor sau snowboard-urilor,
        cum ar fi ghidaj cu pilă sau o mașină electrică.
    edible_plant_part:
      name: Partea comestibilă a plantei
      description: Indică ce parte a plantei este vândută pentru consum.
    educational_guide_included:
      name: Ghid educațional inclus
      description: Indică ce materiale didactice sunt incluse în model.
    educational_topic:
      name: Subiect educațional
      description: Subiect de învățare principal susținut de conținutul educațional
        al fermei de furnici.
    egg_component:
      name: Componentă de ou
      description: Identifică ce parte a oului conține produsul, cum ar fi ou întreg,
        doar albușuri, gălbenușuri sau amestecuri/înlocuitori.
    egg_component_replaced:
      name: Componenta de ou înlocuită
      description: Indică ce parte a oului este destinată să înlocuiască produsul
        (de exemplu, ou întreg, albuș de ou).
    egg_enrichment:
      name: Îmbogățirea cu ouă
      description: Indică orice fortificare nutrițională adăugată ouălor, cum ar fi
        îmbogățirea cu Omega-3 sau vitamina D.
    egg_farming_method:
      name: Metoda de creștere a ouălor
      description: Indică metoda de producție sau de creștere utilizată pentru ouă
        (de exemplu, fără cuști, crescute în aer liber, organic).
    egg_grade:
      name: Calitatea ouălor
      description: Indică gradul de calitate atribuit de către organismele de reglementare
        sau industriale.
    egg_processing_state:
      name: Starea de procesare a ouălor
      description: 'Indică orice tip de procesare aplicată ouălor înainte de vânzare
        (de exemplu: proaspete, sărate, ouă „century”).'
    egg_production_method:
      name: Metoda de producere a ouălor
      description: Specifică sistemul de creștere sau de adăpostire utilizat pentru
        producerea ouălor (de exemplu, fără cuști, crescute pe pășune, organic).
    egg_replacer_main_ingredient:
      name: Ingredientul principal al înlocuitorului de ouă
      description: Indică ingredientul principal de bază din care este fabricat înlocuitorul
        de ou, ajutând utilizatorii cu nevoile dietetice sau proprietățile de copt
        dorite.
    egg_size:
      name: Dimensiunea ouălor
      description: Clasifică ouăle în funcție de categoriile standard de mărime comercială.
    egg_source_animal:
      name: Animalul de origine al ouălor
      description: Identifică specia animală care a produs ouăle.
    egg_white_processing_method:
      name: Metoda de procesare a albușului de ou
      description: 'Indică modul de procesare al albușului de ou după colectare (de
        exemplu: pasteurizat, uscat prin pulverizare), influențând siguranța alimentară,
        durata de valabilitate și utilizările.'
    eggplant_variety:
      name: Soi de vinete
      description: Specifică soiul sau varietatea comercială de vinete, permițând
        alegerea tipurilor care diferă ca mărime, gust, culoare și utilizare culinară.
    eggshell_color:
      name: Culoare cojii de ou
      description: Specifică culoarea predominantă a cojii ouălor.
    elastic_edge_finish_type:
      name: Finisaj/tip margine elastică
      description: Specifică tipul de construcție al marginii elasticului țesut, care
        influențează confortul și modul de utilizare.
    elastic_intended_use:
      name: Utilizarea prevăzută a elasticului
      description: Aplicația principală pentru care este conceput elasticul (ajută
        la descoperire și reduce nepotrivirile).
    elastic_recovery_performance:
      name: Performanța de recuperare elastică
      description: Descrie cât de bine își revine elasticul țesut la lungimea inițială
        după întindere.
    elastic_recovery_quality:
      name: Calitatea recuperării elastice
      description: Indică recuperarea întinderii elasticului - cât de bine revine
        la lungimea inițială după ce a fost întins.
    elastic_stretch_level:
      name: Nivel de întindere elastică
      description: Cât de mult se poate extinde elasticul sub tensiune (adesea exprimat
        ca niveluri relative atunci când nu este furnizat procentul exact).
    elastic_structure:
      name: Structură elastică
      description: Specifică construcția structurală a elasticului pentru butoniere
        (de exemplu, tricotat, țesut, împletit), care poate afecta elasticitatea,
        recuperarea și performanța de coasere.
    elastic_type:
      name: Tipul de elastic
      description: Specifică tipul de construcție al elasticului (de exemplu, elastic
        pliabil (FOE), împletit, tricotat, țesut).
    electric_assist_type:
      name: Tip de asistență electrică
      description: Indică dacă bicicleta are asistență motorie și tipul de asistență
        oferită.
    electric_bicycle_motor_position:
      name: Poziția motorului bicicletei electrice
      description: 'Locația motorului de acționare pe bicicleta electrică, de exemplu:
        motor central, butuc față, butuc spate sau butuc dublu.'
    electric_bike_class:
      name: Curs de biciclete electrice
      description: Clasifică bicicleta electrică în funcție de clasele de reglementare
        care definesc limitele de viteză și asistența limitată.
    electric_guitar_bridge_type:
      name: Chitară electrică tip punte
      description: Specifică tipul de sistem Bridge/vibrato pe chitara electrică.
    electric_instrument_output_connection_type:
      name: Ieșire instrument electric tip conexiune
      description: Specifică conexiunea (conexiunile) de ieșire audio fizică furnizată(e)
        de violoncelul electric.
    electric_riding_vehicle_control_options:
      name: Opțiuni de control al vehiculelor electrice
      description: Opțiuni de control/comandă disponibile pentru utilizator/părinte
        (de exemplu, pedală, volan, comandă de urgență de la distanță).
    electric_spinning_wheel_speed_control_type:
      name: Tip de control electric al vitezei roții de tors
      description: Descrie modul în care utilizatorul ajustează viteza de rotație
        a roții electrice.
    electric_ukulele_output_jack_type:
      name: Tip mufă de ieșire pentru ukulele electrice
      description: Specifică conectorul fizic de ieșire utilizat de ukulele electrice.
    electric_van_body_length_class:
      name: Clasa lungimii caroseriei furgonetei electrice
      description: Clasa de dimensionare a furgonetelor bazată pe ampatament/lungime
        utilizată în listare.
    electric_van_roof_height_class:
      name: Clasa de înălțime a acoperișului pentru furgonete electrice
      description: Clasificarea obișnuită a înălțimii acoperișului utilizată pentru
        furgonete (în special furgonete de marfă).
    electric_vehicle_drivetrain_layout:
      name: Aspectul sistemului de propulsie al vehiculului electric
      description: Configurația motorului/axei care descrie câte motoare și unde sunt
        amplasate acestea (dincolo de simpla tracțiune, tracțiune integrală/tracțiune
        față/tracțiune spate).
    electric_winder_accessories_included:
      name: Accesorii incluse pentru bobinatorul electric
      description: Listează accesoriile incluse cu bobinatorul electric (de exemplu,
        cleme, adaptoare).
    electrical_connector_type:
      name: Tipul conectorului electric
      description: Specifică stilul conectorului utilizat de sistemul de blocare/încuiere
        a ușii pentru integrarea electrică (dacă este cazul).
    electrical_system_voltage:
      name: Tensiunea sistemului electric
      description: Indică tensiunea nominală a sistemului electric al vehiculului
        pentru care este proiectat regulatorul.
    electronic_cymbal_trigger_zones:
      name: Zone de declanșator de chimbal electronic
      description: Specifică câte zone de declanșator independente oferă pad-ul de
        cinbal (de exemplu, arc/margine/clopot).
    electronic_drum_module_audio_interface_functionality:
      name: Funcționalitatea de interfață audio a modulului de tobe electronice
      description: Indică dacă modulele pot acționa ca o interfață audio USB pentru
        înregistrare/redare (pe lângă MIDI).
    electronic_drum_module_metronome_features:
      name: Funcțiile de metronom ale modulului de tobe electronice
      description: Specifică funcțiile integrate de exersare/metronom.
    electronic_drum_module_power_source:
      name: Sursa de alimentare a modulului de tobe electronice
      description: Specifică sursa de alimentare necesară sau acceptată pentru modulul
        de control.
    electronic_drum_module_sample_import_support:
      name: Asistență pentru import de mostre a modulului de tobe electronice
      description: Indică dacă modulul poate importa mostre ale utilizatorului și
        prin ce metodă.
    electronic_drum_pad_playing_surface_type:
      name: Tipul suprafeței de joc a pad-ului de tobă electronică.
      description: Descrie construcția suprafeței de joc a pad-ului de tom (de exemplu,
        membrană din plasă vs. cauciuc), care afectează rebound-ul, zgomotul și senzația
        la atingere.
    electronic_features:
      name: Caracteristici electronice
      description: Indică caracteristicile electronice/interactive incluse în articolul
        despre serviciile bancare online (dacă există).
    electronic_lights_and_sound:
      name: Lumini și sunet electronice
      description: Indică dacă setul de joacă pentru casă de păpuși include lumini
        electronice și/sau funcții sonore (de exemplu, lumini, clopoțel, muzică, efecte
        sonore).
    electronics_power_source:
      name: Sursă de alimentare electronică
      description: Specifică modul în care sunt alimentate electronicele active (dacă
        este cazul).
    eligible_race_series:
      name: Serii de curse eligibile
      description: Seria de curse sau organismul de sancționare la care mașina este
        eligibilă să concureze.
    elliptical_trainer_part_type:
      name: Tipul de componentă al antrenorului eliptic
      description: Clasifică tipul specific de accesoriu sau piesă de schimb pentru
        o bicicletă eliptică (de exemplu, curea, consolă, pedală), astfel încât cumpărătorul
        să poată filtra rapid către articolul de care are nevoie fără a naviga prin
        multe micro-categorii.
    embellishment_technique:
      name: Tehnica de înfrumusețare
      description: Detaliază principala lucrare decorativă sau de suprafață aplicată
        hainei, cum ar fi broderia, imprimeul sau broderia cu mărgele.
    embellishment_type:
      name: Tip de înfrumusețare
      description: Identifică tipul de element decorativ aplicat pe jartieră, cum
        ar fi dantela, fundițele sau perlele.
    embossing_pen_ink_color:
      name: Culoarea cernelii stiloului pentru gofrare
      description: Specifică culoarea cernelii depozitate de stiloul pentru gofrare
        (poate fi transparentă/lipicioasă sau pigmentată). Diferită de culoarea corpului
        stiloului.
    embossing_stylus_tip_shape:
      name: Forma vârfului stylusului pentru gofrare
      description: Descrie geometria vârfului pentru gofrare folosit pentru a crea
        diferite efecte (de exemplu, sferică vs. ascuțită).
    embroidered_coverage_level:
      name: Nivel de acoperire brodat
      description: Cantitatea aproximativă de acoperire cu fir brodat pe fața etichetei.
    embroidered_patch_backing_type:
      name: Tipul de căptușeală a etichetei brodată
      description: Stratul de suport de pe verso-ul etichetei brodate care afectează
        durabilitatea și modul în care poate fi aplicat.
    embroidery_hoop_type:
      name: Tipul de cerc pentru brodat
      description: Identifică stilul de construcție al cercului pentru brodat și mecanismul
        său principal de tensionare.
    embroidery_machine_bobbin_type:
      name: Tip bobină mașină de brodat
      description: Tipul/stilul de încărcare al sistemului de bobine.
    emergency_lighting_configuration:
      name: Configurația iluminatului de urgență
      description: Specifică configurația principală a iluminării de avertizare de
        urgență instalată pe vehicul (de exemplu, bara luminoasă de pe plafon, luminile
        grilei).
    emergency_lighting_package:
      name: Pachet de iluminat de urgență
      description: Specifică tipurile de lumini de avertizare de urgență instalate.
    emissions_compliance_standard:
      name: Standard de conformitate privind emisiile
      description: Indică certificarea/conformitatea privind emisiile pentru motor,
        acolo unde este aplicabil.
    emissions_standard:
      name: Standardul de emisii
      description: Standardul de conformitate cu emisiile pentru vehicul (variază
        în funcție de regiune și an).
    enclosure_panel_configuration:
      name: Configurația panoului de carcasă
      description: Specifică ce panouri sau părți laterale ale carcasei sunt incluse
        (configurație de acoperire), cum ar fi incintă completă, doar cortine laterale
        sau 3 laturi (deschis față/spate).
    enclosure_window_material:
      name: Materialul ferestrei de carcasei
      description: Identifică materialul utilizat pentru panourile transparente ale
        ferestrelor carcasei.
    end_fitting_type:
      name: Tipul de fiting de capăt
      description: Tipul de conector utilizat la fiecare capăt al amortizorului (partea
        vehiculului și partea capacului), care determină compatibilitatea la montare.
    end_type:
      name: Tipul de capăt
      description: Specifică stilul de atașare/încetare la capetele curelei de remorcare
        pentru conectarea la punctele de recuperare.
    ends_style_blocking_wires:
      name: Stilul capetelor (blocarea firelor)
      description: Modul în care sunt finisate capetele sârmei de blocare pentru siguranță
        și ușurință la trecerea prin marginile dantelei.
    enduro_bike_suspension_adjustability:
      name: Reglarea suspensiei bicicletei Enduro
      description: Indică ce reglaje ale suspensiei sunt disponibile (de obicei pentru
        furca față și amortizorul spate).
    engine_bay_mounting_location:
      name: Locație de montare compartiment motor
      description: Locul în care rezervorul de expansiune este destinat să fie montat
        în compartimentul motor (poziția relativă).
    engine_bearing_coating:
      name: Acoperirea lagărelor motorului
      description: Specifică orice strat de acoperire al suprafeței rulmentului (pentru
        rezistență la uzură, încastrare, frecare redusă).
    engine_bearing_position:
      name: Poziția rulmentului motorului
      description: Specifică poziția/funcția rulmentului în cadrul motorului.
    engine_bearing_size:
      name: Dimensiunile rulmentului motorului
      description: Specifică dacă rulmentul are dimensiuni standard sau o variantă
        subdimensionată/supradimensionată (legată în mod obișnuit de rectificarea
        și lipirea cu manivelă).
    engine_configuration:
      name: Configurația motorului
      description: Descrie aspectul/configurația cilindrilor motorului (de exemplu,
        în linie, în V, plat/boxer).
    engine_cooling_type:
      name: Tipul de răcire a motorului
      description: Specifică metoda de răcire a motorului.
    engine_degreaser_form:
      name: Formă de degresant pentru motor
      description: Formatul fizic/forma expediere a degresantului pentru motor.
    engine_degreaser_rinse_requirement:
      name: Necesarul de clătire cu degresant pentru motor
      description: Dacă degresantul este destinat a fi clătit cu apă după aplicare.
    engine_mount_type:
      name: Tipul de montare a motorului
      description: Specifică designul funcțional al suportului motorului (de exemplu,
        hidraulic, solid, amortizor de cuplu).
    engine_oil_formulation:
      name: Formularea uleiului de motor
      description: Indică concentrarea pe formularea uleiului de motor, cum ar fi
        utilizarea standard, condiționarea pentru kilometraj mare, intervalele de
        schimb extinse sau aplicarea pe flote/vehicule cu taxe mari.
    engine_oil_specification:
      name: Specificațiile uleiului de motor
      description: Specificațiile/standardele pe care le îndeplinește uleiul (de exemplu,
        API SP, API SN Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Conținutul kitului de reconstruire a motorului
      description: Identifică componentele principale incluse în kit de reconstruirea
        a motorului.
    engine_rotation_direction:
      name: Direcția de rotație a motorului
      description: Specifică direcția de rotație a motorului utilizată în aplicațiile
        marine.
    engine_timing_system_drive_type:
      name: Tipul de propulsie a sistemului de distribuție a motorului
      description: Indică dacă sistemul de distribuție al motorului este acționat
        prin curea, prin lanț sau prin angrenaj, pentru compatibilitate.
    engine_valve_coating:
      name: Acoperirea supapelor motorului
      description: Identifică orice tratament de suprafață sau acoperire aplicată
        valvei pentru rezistență la uzură/căldură.
    engine_valve_position:
      name: Poziția supapelor motorului
      description: Specifică dacă supapa motorului este destinată pentru partea de
        admisie sau partea de evacuare a motorului.
    engine_valve_stem_tip_type:
      name: Tipul vârfului tijei supapei motorului
      description: Specifică stilul sau construcția vârfului tijei supapei la punctul
        de contact cu basculantul sau regulatorul.
    engine_valvetrain_type:
      name: Tipul sistemului de distribuție al motorului
      description: Configurația sistemului de distribuție/arbore cu came.
    enhancement_level:
      name: Nivel de îmbunătățire
      description: 'Creșterea aproximativă a volumului asigurată de insert, exprimată
        în dimensiunile ceștii: Subtilă (până la 1 cană), Moderată (1–2 căni), Semnificativă
        (2+ căni).'
    entry_zipper_location:
      name: Locația fermoarului de intrare
      description: Specifică locul în care se află fermoarul sau deschiderea principală
        de intrare a costumului (de exemplu, față, spate, umăr, diagonală).
    epee_point_type:
      name: Tipul vârfului de spadă
      description: Specifică marca sau standardul vârfului instalat pe lamă, care
        afectează compatibilitatea și întreținerea.
    equestrian_discipline:
      name: Disciplina ecvestră
      description: Precizează disciplina ecvestră pentru care este destinat sau pentru
        care este cel mai potrivit pintenul.
    equestrian_helmet_safety_certification:
      name: Certificare de siguranță pentru casca ecvestră
      description: Specifică standardul (standardele) de siguranță sau certificările
        la care se conformează casca.
    equine_application_area:
      name: Zona de aplicare pentru ecvine
      description: Specifică regiunea corpului sau materialul pentru care este destinat
        produsul (de exemplu, copită, coamă, harnașament).
    equipment_contact_material_brew_wine:
      name: Material de contact cu echipamentul (bere/vin)
      description: Materialul principal al articolului care intră în contact cu lichidul
        (de exemplu, sticlă, oțel inoxidabil, plastic).
    eu_children_clothing_size:
      name: Dimensiunea hainelor UE pentru copii
      description: Specifică dimensiunile îmbrăcămintei pentru copii din UE în funcție
        de înălțime, cum ar fi 104 sau 140
    eu_clothing_size:
      name: Dimensiunea îmbrăcămintei UE
      description: Specifică mărimea vestimentară în UE, cum ar fi 38 sau 46
    eu_cup_size:
      name: Dimensiunea cupei UE
      description: Specifică dimensiunea cupei de sutien UE, cum ar fi C sau E
    eu_ring_size:
      name: Dimensiunea inelului UE
      description: Specifică dimensiunea inelului UE prin circumferință, cum ar fi
        52 sau 63
    eu_shoe_size:
      name: Dimensiuni încălțăminte UE
      description: Specifică dimensiunea pantofului din UE, cum ar fi 42 sau 42 lățime
    euphonium_included_accessories:
      name: Accesorii incluse pentru eufoniu
      description: Listele includeau articole, de obicei pachete cu un eufoniu (de
        exemplu, muștiuc, cutie).
    euphonium_valve_configuration:
      name: Configurația valvei eufoniu
      description: Specifică numărul de valve și dacă a patra valvă este acționată
        manual sau cu un mecanism cu acțiune laterală.
    european_sword_historical_period:
      name: Perioada istorică a sabiei europene
      description: Perioada istorică principală pe care se bazează modelul/replica
        sabiei (sau epoca originalului).
    european_sword_pattern_type:
      name: Model/tip de sabie europeană
      description: Model/tip specific de sabie europeană reprezentat de sabia de colecție.
    ev_connector_adapter_direction:
      name: Direcția conectorului/adaptorului EV
      description: Precizează de la ce și în ce convertește adaptorul (partea de intrare
        a vehiculului față de partea încărcătorului/cablului), permițând o filtrare
        precisă a compatibilității.
    ev_conversion_kit_completeness_level:
      name: Gradul de completitudine al kitului de conversie la VE
      description: Indică dacă produsul este un kit complet de conversie sau un kit
        parțial/pachet (de exemplu, doar motor + controler).
    ev_conversion_kit_drivetrain_configuration:
      name: Configurația sistemului de transmisie al kitului de conversie la VE
      description: Specifică arhitectura sistemului de propulsie a unui kit de conversie
        pentru VE, inclusiv poziționarea motorului/aspectul de acționare și dacă păstrează
        transmisia existentă.
    ev_conversion_kit_voltage_class:
      name: Clasa de tensiune a kitului de conversie la VE
      description: Clasa de tensiune nominală a sistemului (interval) pe care se bazează
        proiectarea kitului de conversie pentru VE. Folosiți această opțiune pentru
        filtrarea după clasele comune de tensiune ale sistemului, pe lângă măsurarea
        exactă a tensiunii.
    evaporator_core_type:
      name: Tipul miezului evaporatorului
      description: Specifică proiectarea constructivă a unui miez de evaporator pentru
        un sistem de aer condiționat auto.
    evenweave_fabric_finish_treatment:
      name: Finisaj/tratament al țesăturii cu ochiuri egale
      description: Indică orice pre-finisare sau tratament aplicat materialului care
        afectează gestionarea sau aspectul.
    evenweave_fabric_package_format:
      name: Formatul pachetului de țesătură cu ochiuri egale
      description: Cum se vinde materialul (bucată tăiată vs. bucată continuă la metru/yard).
    exercise_bike_accessory_part_type:
      name: Tip accesoriu/piesă pentru bicicletă de exerciții
      description: Descrie funcția principală sau tipul componentei articolului (de
        exemplu, pedală, curea de transmisie, suport pentru sticlă, capac pentru parbriz,
        braț de pedală).
    exercise_bike_cushion_component:
      name: Componentă pernă bicicletă de exerciții
      description: Precizează componenta furnizată pentru scaun, cum ar fi o pernă
        pentru scaun, o șa sau o husă pentru scaun.
    exercise_bike_metrics_tracked:
      name: Parametrii monitorizați ai bicicletei de exerciții
      description: Listează câmpurile de date de antrenament pe care computerul le
        poate măsura și afișa în timp real.
    exercise_mat_accessories_included:
      name: Accesorii pentru saltea de exerciții incluse
      description: Enumeră componentele suplimentare furnizate împreună cu salteaua,
        cum ar fi curelele sau genunchierele.
    exhaust_cooling_type:
      name: Tip de răcire prin evacuare
      description: Indică dacă componenta de evacuare este destinată sistemelor de
        evacuare umedă (răcită cu apă/injecție de apă) sau uscată.
    exhaust_installation_position:
      name: Poziția de instalare a evacuării
      description: Indică locul în care este instalată piesa pe vehicul.
    exhaust_outlet_configuration:
      name: Configurația ieșirii de evacuare
      description: Specifică aspectul ieșirii de evacuare în partea din spate a vehiculului.
    expansion_tank_cap_connection_type:
      name: Capac rezervor expansiune tip conexiune
      description: Stilul de conexiune mecanică utilizat pentru atașarea și etanșarea
        capacului la gâtul vasului de expansiune.
    expansion_tank_cap_pressure_relief_feature:
      name: Funcție de eliberare a presiunii în capacul vasului de expansiune
      description: Dacă și cum oferă capacul funcționalitate de eliberare a presiunii/vidului.
    expansion_tank_cap_seal_material:
      name: Materialul de etanșare al capacului vasului de expansiune
      description: Materialul garniturii/etanșării care intră în contact cu gâtul
        vasului de expansiune.
    extension_attachment_method:
      name: Metoda de atașare a extensiei
      description: Indică modul în care extensia se fixează pe cockpit-ul/ghidonul
        bicicletei, ajutând cicliștii să confirme compatibilitatea cu configurația
        existentă.
    extension_bend_type:
      name: Tip de îndoire extensibilă
      description: Descrie stilul geometric sau curbura extensiei ghidonului, care
        afectează ergonomia și aerodinamica ciclistului.
    extension_mechanism:
      name: Mecanism de extensie
      description: Descrie metoda utilizată de o masă pentru a-și extinde lungimea
        sau suprafața, dacă este cazul.
    extension_table_features:
      name: Caracteristici ale mesei extensibile
      description: Descrie caracteristicile funcționale specifice meselor extensibile
        ale mașinilor de cusut.
    eyelet_grommet_installation_method:
      name: Metoda de instalare a inelelor și capse de fixare
      description: Precizează modul în care ochiul/capsa de fixare este montat(ă)/fixat(ă)
        în material.
    eyewear_lens_shape:
      name: Forma lentilelor de ochelari
      description: Indică forma geometrică a lentilei, cum ar fi cilindrică sau sferică,
        care influențează câmpul vizual, distorsiunea și stilul.
    eyewear_strap_material:
      name: Materialul curelei ochelarilor
      description: Specifică materialul curelei reglabile care fixează ochelarii de
        protecție sau ochelarii de capul utilizatorului.
    fabric_backing_type:
      name: Tipul de suport din material textil
      description: Precizează dacă bumbacul imprimabil are un strat de hârtie de stabilizare
        pe spate (și de ce tip), ceea ce determină dacă poate fi introdus în imprimantele
        standard.
    fabric_cut_format:
      name: Formatul tăiat al materialului textil
      description: Specifică tăierea/formatul piesei de pânză pentru lucru manual.
    fabric_end_use:
      name: Utilizarea finală a țesăturii
      description: Identifică principala aplicație prevăzută a materialului (pentru
        ce este cel mai bine utilizat).
    fabric_finish:
      name: Finisajul materialului
      description: Finisaj/tratament de suprafață aplicat țesăturii de mătase care
        afectează luciul, senzația la atingere și performanța.
    fabric_intended_use:
      name: Utilizarea prevăzută a țesăturii
      description: Principalele aplicații/proiecte recomandate pentru țesătura de
        in.
    fabric_opacity_level:
      name: Nivelul de opacitate al materialului textil
      description: Indică gradul de transparență al țesăturii, ceea ce influențează
        necesitatea suprapunerii straturilor și a căptușelii.
    fabric_patch_shape:
      name: Forma peticului din material textil
      description: Descrie forma plasturilor incluși în trusă.
    fabric_repair_kit_application_method:
      name: Metoda de aplicare kit de reparare a țesăturilor
      description: Precizează modul în care se aplică reparația pe material (de exemplu,
        prin călcare, prin cusut, cu adeziv).
    fabric_repair_kit_components_included:
      name: Componentele kitului de reparare a țesăturilor sunt incluse
      description: Enumeră componentele specifice furnizate în kit (de exemplu, plasturi,
        brad, ac, adeziv).
    fabric_repair_kit_intended_use:
      name: Utilizarea prevăzută a kitului de reparație a țesăturilor
      description: Specifică sarcina de reparare obișnuită pentru care este conceput
        kitul (de exemplu, rupturi, găuri, tivuri).
    fabric_selling_format:
      name: Formatul de vânzare a țesăturilor
      description: Specifică modul în care este vândut materialul textil (lungime
        continuă, bucată pre-tăiată, sul/rulou sau mostră).
    fabric_stretch_level:
      name: Nivelul de elasticitate al țesăturii
      description: Descrie gradul de elasticitate al țesăturii, ajutând cumpărătorul
        să aleagă materialele potrivite pentru haine mulate sau proiecte structurate.
    fabric_stretch_type:
      name: Tipul de elasticitate al țesăturii
      description: Indică performanța de elasticitate a materialului pentru boardshort,
        importantă pentru mobilitate în timpul surfingului sau înotului.
    fabric_texture:
      name: Textura țesăturii
      description: Descrie textura suprafeței sau structura tricotului materialului
        utilizat pentru bluza de casă.
    fabric_use_case:
      name: Scopul de utilizare al materialului
      description: Utilizarea principală prevăzută pentru piesa/șurubul de material
        satinat.
    fabric_weight_class:
      name: Clasa de greutate a țesăturii
      description: Clasifică flanelul în funcție de intervalele tipice de greutate
        pentru a ajuta cumpărătorul să filtreze fără a cunoaște exact GSM/oz.
    face_mask_material:
      name: Materialul măștii de față
      description: Compoziția materialului măștii de față incluse cu casca sau compatibile
        cu aceasta.
    face_mask_style:
      name: Stilul măștii de față
      description: Definește forma generală sau stilul de construcție al măștii faciale
        de modă, ajutând cumpărătorii să își aleagă potrivirea și estetica preferată.
    face_mask_style_code:
      name: Cod de stil pentru măști faciale
      description: Definește stilul de bare structurale sau familia de coduri industriale
        a măștii faciale (de exemplu, ROPO, OPO, RJOP).
    face_protection_type:
      name: Tipul de protecție facială
      description: Indică tipul de protecție facială inclus cu sau integrat în casca
        de protecție, cum ar fi grile sau viziere.
    faceplate_security_features:
      name: Caracteristici de securitate ale panoului frontal
      description: Descrie funcțiile de descurajare a furtului și de control al accesului
        asociate plăcii frontale, dincolo de designul de bază.
    facing_length:
      name: Lungimea feței
      description: Specifică lungimea orientată (lungimea curburii) a muștiucului,
        care afectează răspunsul și alegerea anciei.
    fan_shroud_type:
      name: Tipul de carcasă a ventilatorului
      description: Specifică stilul de acoperire/geometrie al carcasei ventilatorului
        (de exemplu, completă vs. pe jumătate vs. inelară).
    farming_method:
      name: Metoda de cultivare
      description: Evidențiază practicile de bunăstare animală sau de creștere a animalelor,
        cum ar fi creșterea în aer liber (free-range) sau sistemul ecologic/organic.
    farming_practice:
      name: Practică agricolă
      description: Identifică metoda principală de cultivare utilizată pentru produs
        (de exemplu, convențională, organică, hidroponică).
    fascinator_style:
      name: Stilul fascinatorului
      description: Descrie designul structural sau forma fascinatorului, permițând
        filtrarea rapidă a stilurilor populare de confecționare a de pălăriilor.
    fastener_grade:
      name: Gradul elementului de fixare
      description: Indică gradul/clasa de rezistență a șurubului, cum ar fi Gradul
        8 sau Clasa 10.9, care determină o capacitate de încărcare.
    fat_rendering_state:
      name: Stare de redare a grăsimilor
      description: Specifică dacă grăsimea este topită, netoarsă (crudă) sau parțial
        topită, afectând durata de viață a plutei și aplicațiile culinare.
    fat_source:
      name: Sursă de grăsime
      description: Identifică sursa principală de grăsime utilizată pentru producerea
        untului, ghee-ului sau margarinei (animală sau vegetală), sprijinind filtrarea
        pentru alergii și diete.
    faucet_hole_configuration:
      name: Configurația orificiului pentru robinet
      description: Indică numărul și pozițiile găurilor pre-găurite pentru baterii
        de pe blatul de lavoar.
    feather_application:
      name: Aplicație cu pene
      description: Utilizarea sau aplicația principală a penelor de curcan în activități
        de artizanat sau fabricație.
    feather_attachment_format:
      name: Atașament/format de pene
      description: Cum sunt pregătite/vândute penele sintetice pentru utilizare (vrac,
        pe șir, pe bandă etc.).
    feather_coloration_style:
      name: Stilul de colorare a penelor
      description: Descrie modul în care culoarea este aplicată/apare pe pană(e) (de
        exemplu, solidă, vopsită la vârfuri, gradient), independent de valoarea de
        bază a culorii.
    feather_component:
      name: Componentă de pene
      description: Specifică ce parte/stil de pană de păun este vândut (de exemplu,
        pană de păun vs. pană de păun).
    feather_curvature:
      name: Curbura penei
      description: Forma generală/profilul de curbură al penei.
    feather_finish:
      name: Finisaj de pene
      description: Indică dacă penele de struț sunt naturale sau au fost prelucrate
        (de exemplu, vopsite sau albite) în scop decorativ.
    feather_form:
      name: Formă de pană
      description: Specifică forma fizică a bucăților de pene de gâscă vândute.
    feather_grade:
      name: Grad de pene
      description: Calitatea generală/gradul de selecție al penei, pentru utilizare
        în artizanat sau pentru expunere (decorativă).
    feather_part:
      name: Partea de pană
      description: Porțiunea/structura penei de curcan vândute (uzual în listele de
        produse pentru artizanat și confecționarea muștelor artificiale pentru pescuit).
    feather_processing_type:
      name: Tipul de procesare a penelor
      description: 'Modul în care penele au fost procesate/tratate pentru utilizare
        în artizanat (de exemplu: vopsite, albite sau naturale/nevopsite).'
    feather_product_form:
      name: Formă de produs cu pene
      description: Forma fizică/croiala produsului din pene, așa cum este vândut (de
        exemplu, pene libere vs. boa vs. franjuri).
    feather_quantity_unit:
      name: Unitate de cantitate a penelor
      description: Definește modul în care este vândut produsul (de exemplu, la bucată,
        la greutate, la legături) pentru a ajuta la o comparație precisă pe întreaga
        listă.
    feather_source:
      name: Sursă de pene
      description: Specifică sursa animală a penelor utilizate în volanele din pene.
    feather_stiffness:
      name: Rigiditatea penei
      description: Gradul de fermitate/rigiditatea relativă a ghimpilor/structurii
        penei.
    feed_mechanism:
      name: Mecanismul de alimentare
      description: Indică modul în care mingile sunt introduse în mașina de aruncare.
    feed_purpose:
      name: Scopul furajului
      description: Descrie obiectivul nutrițional sau funcțional principal al furajului
        sau al suplimentului.
    feeder_mechanism_type:
      name: Tipul mecanismului de alimentare
      description: Identifică mecanismul de distribuire utilizat de alimentator pentru
        a elibera furajul.
    feijoa_cultivar:
      name: Soiul de Feijoa
      description: Identifică soiul sau varietatea specifică de feijoa, întrucât diferitele
        soiuri au arome, dimensiuni și perioade de recoltare distincte.
    felt_duty:
      name: Tipul de pâslă al mingii de tenis
      description: 'Specifică tipul de pâslă al mingii de tenis (de exemplu: extra
        duty, regular duty), care influențează durabilitatea pe diferite suprafețe
        de joc.'
    felting_mold_intended_use:
      name: Utilizarea prevăzută a matriței de împâslire
      description: Scopul pentru care este utilizată forma (matrița) în proiectele
        de împâslire.
    felting_pad_surface_material:
      name: Material de suprafață pentru suportul de împâslire
      description: Material utilizat pe suprafața de lucru a plăcuței/covorașului
        de împâslire care intră în contact cu fibra/acul.
    fencing_certification:
      name: Certificare în domeniul gardurilor
      description: Listează organismele oficiale de conducere care aprobă arma de
        scrimă (de exemplu, FIE, USFA), indicând legalitatea competiției și standardele
        de calitate.
    fencing_connector_type:
      name: Tipul conectorului pentru gard
      description: Specifică configurația conectorului utilizată pentru atașarea corzilor
        de gard, a prizelor sau a rolelor (de exemplu, cu 2 fixații, cu 3 fixații,
        cu baionetă), asigurând compatibilitatea componentelor.
    fencing_discipline:
      name: Disciplina scrimei
      description: Specifică arma sau disciplina de scrimă pentru care este proiectat
        produsul sau cu care este compatibil.
    fencing_weapon_type:
      name: Tipul de armă de scrimă
      description: Specifică stilul de armă de scrimă sau de antrenament cu care este
        compatibil sau pe care îl reprezintă instrumentul de antrenament, ajutând
        utilizatorii să găsească echipamentul potrivit.
    fender_finish_state:
      name: Starea finisajului apărătoarelor
      description: Indică starea suprafeței/finisajului apărătoarei la livrare, în
        vederea pregătirii pentru vopsire și instalare.
    fender_pieces_included:
      name: Piese incluse pentru apărătoare
      description: Listează componentele incluse în pachetul produsului, pentru a
        clarifica dacă este vorba de o singură apărătoare sau de un set complet cu
        accesorii.
    fender_type:
      name: Tipul de apărătoare
      description: Clasifică designul sau stilul general al apărătorii.
    fennel_trimming:
      name: Tăierea feniculului
      description: Indică ce părți ale plantei sunt incluse în bulbul de fenicul (de
        exemplu, cu frunze, vârful și rădăcina tăiate).
    fennel_variety:
      name: Soi de fenicul
      description: Specifică soiul sau varietatea comercială a bulbilor de fenicul
        vânduți.
    fermentation_application:
      name: Aplicație de fermentație
      description: Identifică alimentul sau băutura principală pentru care cultura
        este concepută să fermenteze (de exemplu, brânză, iaurt, chefir de lapte,
        maia).
    fermentation_method:
      name: Metoda de fermentare
      description: Specifică modul în care a fost produs sau fermentat sosul de soia
        (de exemplu, preparat natural, hidrolizat chimic).
    fermentation_vessel_material:
      name: Materialul vasului de fermentație
      description: Materialul principal al vasului de fermentare inclus în kit (dacă
        există).
    ferrule_material:
      name: Materialul ferulei
      description: 'Specifică materialul utilizat pentru ferula tijei (de exemplu:
        Juma, fenolic, policarbonat, XTC sau absența acesteia), influențând durabilitatea
        și senzația la lovire.'
    fia_homologation_certification:
      name: Omologare/certificare FIA
      description: Indică dacă mașina (sau celula de siguranță) este certificată/omologată
        și conform cărui standard.
    fiber_animal_source_type:
      name: Tipul de fibră animală/sursa
      description: Animalul sau sursa primară din care provin firele (sau materialul
        sintetic), cum ar fi lâna merino, alpaca sau fibrele vegetale.
    fiber_luster_level:
      name: Nivelul de luciu al fibrelor
      description: Luciul vizual al fibrei, variind de la mat la luciu intens.
    fiber_preparation_processing_stage:
      name: Etapa de preparare/procesare a fibrelor
      description: Indică modul în care a fost pregătită/procesată așchia pentru utilizare
        (de exemplu, cardată vs. pieptănată, amestecată, superspălare).
    fiber_preparation_type:
      name: Tipul de preparare a fibrelor
      description: 'Precizează modul în care fibra a fost pregătită pentru artizanat
        (de exemplu: vatelină cardată, fibră cardată la tambur, foaie de prefelt).'
    field_hockey_ball_playing_surface:
      name: Suprafață de joc cu mingea de hochei pe iarbă
      description: Identifică suprafața sau mediul de joc pentru care este proiectată
        mingea.
    field_hockey_ball_type:
      name: Tipul de minge de hochei pe iarbă
      description: Clasifică mingea de hochei pe iarbă în funcție de utilizarea preconizată
        sau de caracteristica specială.
    field_hockey_goal_size_standard:
      name: Hochei pe gazon dimensiune standard
      description: Clasifică obiectivul conform standardelor comune de hochei pe iarbă
        sau dimensiunilor de antrenament (de exemplu, regulamentul FIH pentru activități
        în aer liber, juniori, mini).
    field_hockey_training_objective:
      name: Obiectiv de antrenament pentru hochei pe iarbă
      description: Definește aptitudinea principală sau domeniul de concentrare pe
        care instrumentul de instruire este conceput să îl îmbunătățească.
    field_point_attachment_method:
      name: Metoda de atașare a punctului de câmp
      description: Indică modul în care punctul de câmp este fixat pe tija săgeții
        sau pe inserție (de exemplu, prin înșurubare, prin lipire).
    field_point_tip_style:
      name: Stilul vârfului de câmp
      description: Definește stilul geometric sau profilul funcțional al vârfului
        punctului de teren, afectând penetrarea, efortul de îndepărtare și legalitatea.
    fielding_glove_position:
      name: Poziția mănușii de câmp
      description: Identifică poziția defensivă sau utilizarea pentru care este concepută
        mănușa în jocurile de baseball sau softball.
    fielding_training_focus:
      name: Concentrarea pe antrenamentul de teren
      description: Specifică domeniul de aptitudini principale pe care ajutorul îl
        vizează în timpul sesiunii de practică.
    fig_variety:
      name: Soiul de smochine
      description: Identifică varietatea sau soiul specific de smochine comercializat.
    figure_8_device_design:
      name: Designul dispozitivului în figura 8
      description: Identifică configurația specifică a dispozitivului în formă de
        8, care afectează caracteristicile de gestionare și utilizarea preconizată.
    figure_finish_type:
      name: Tipul de finisaj al figurii
      description: Indică finisajul suprafeței/vopselei figurinei model de cal (cum
        arată/se simte ca obiect de colecție).
    figurine_scale:
      name: Figurină scală
      description: Scara/raportul figurinei față de subiectul real (atunci când este
        cazul), de ex. 1:6.
    fill_status:
      name: Stare de completare
      description: Indică dacă manechinul de grappling este vândut preumplut, neumplut
        sau parțial umplut, influențând costul de livrare și efortul cumpărătorului.
    filling_consistency:
      name: Consistența umplerii
      description: 'Descrie textura sau vâscozitatea umpluturii așa cum este furnizată
        (de exemplu: cremă fină, bucăți de fructe, pastă).'
    filling_type:
      name: Tipul de umplere
      description: Specifică umplutura principală sau crema din interiorul biscuiților,
        dacă există.
    filtration_and_mother_status:
      name: Filtrarea și starea mamei
      description: Indică dacă oțetul este filtrat, nefiltrat, crud sau conține „substanța
        mamă”, adresându-se consumatorilor care caută opțiuni probiotice sau crude.
    filtration_method:
      name: Metoda de filtrare
      description: Material sau tehnică utilizată pentru filtrarea și purificarea
        vodcii după distilare.
    fin_box_system:
      name: Sistem cu cutii cu aripioare
      description: Specifică tipul de cutie pentru aripioare sau interfața de montare
        utilizată de placă, determinând compatibilitatea aripioarelor disponibile
        pe piața pieselor de schimb.
    fin_buoyancy:
      name: Flotabilitatea aripioarelor
      description: Indică dacă înotătoarea are flotabilitate pozitivă, neutră sau
        negativă în apă, ceea ce influențează echilibrul scafandrului și echilibrul
        echipamentului.
    fin_flex_rating:
      name: Indicele de flexibilitate al înotătoarei
      description: Indică rigiditatea relativă sau nivelul de flexibilitate al aripioarei,
        care afectează performanța generală.
    fin_mounting_system:
      name: Sistemul de montare a înotătoarei
      description: Definește interfața de atașare sau standardul utilizat pentru fixarea
        aripioarei pe placă (de exemplu, FCS II, prindere cu șuruburi, cu 4 găuri),
        asigurând compatibilitatea dintre aripioare și placă.
    fin_position:
      name: Poziția aripioarei
      description: Specifică poziția de montare prevăzută a aripioarei pe placă.
    fin_strap_type:
      name: Tipul curelei înotătoarei
      description: Specifică stilul de curea sau sistemul de fidelizare a clienților
        utilizat pentru fixarea înotătoarei de călcâi/picior.
    fin_template:
      name: Șablon aripioare
      description: Clasifică profilul hidrodinamic al aripioarei de surf, influențând
        stilul de viraj, viteza și senzația generală pe care o oferă placa.
    finger_count:
      name: Numărul de degete
      description: Indică numărul de degete pentru care a fost concepută mănușa, clapeta
        sau mânerul de eliberare.
    finger_coverage:
      name: Acoperirea degetelor
      description: Indică cât de mult din degete sunt acoperite.
    finger_grip_adjustability:
      name: Reglarea mânerului
      description: Indică modul în care mânerul degetului se atașează sau se ajustează
        pentru a se potrivi diferitelor dimensiuni ale mâinii.
    finger_hole_configuration:
      name: Configurația orificiilor pentru degete
      description: Specifică orientarea orificiilor pentru degete (dreptaci, stângaci
        sau ambidextri).
    finger_hole_count:
      name: Numărul de găuri pentru degete
      description: Indică numărul de găuri pentru degete din pielea mânerului, o diferență
        cheie de stil între modelele fără degete, cu 2 găuri, cu 3 găuri și cu 4 găuri.
    finger_pick_band_style:
      name: Stil de bandă pentru pene pentru deget
      description: Stilul benzii/buclei care se atașează de deget, afectând confortul
        și ajustabilitatea.
    finger_pick_blade_length:
      name: Lungimea lamei penei de deget
      description: Lungimea lamei penei care se extinde din bandă.
    finger_pick_blade_shape:
      name: Formă a lamei penei de deget
      description: Forma/profilul suprafeței de penetrare (lamă) care intră în contact
        cu corzile.
    finger_pick_size:
      name: Dimensiunea penei de deget
      description: Mărimea benzii/penei pentru deget, pentru a se potrivi diferitelor
        circumferințe ale degetelor sau policelui (nu dimensiunea instrumentului).
    finger_pick_wear_location:
      name: Locații pentru uzura penei de deget
      description: Indică pe ce deget este destinată purtarea penei sau dacă produsul
        este un set pentru degetul mare și cel mare.
    finger_protection:
      name: Protecție pentru degete
      description: Indică dacă mănușa include protecție pentru degete de tip „spine”
        și dacă aceste elemente sunt detașabile.
    fingerboard_bearing_type:
      name: Tipul rulmentului fingerboardului.
      description: Specifică tipul de rulment utilizat la roțile fingerboardului
    fingerboard_grip_type:
      name: Tipul de aderență al tastaturii
      description: Specifică materialul/tipul suprafeței de aderență utilizate pe
        placa fingerboardului.
    fining_agent_active_ingredient:
      name: Ingredient activ al agentului de finisare
      description: Agent principal de limpezire sau clarificare utilizat în produs.
    fining_agent_type:
      name: Tipul agentului de limpezire
      description: Specifică substanța chimică sau materialul agentului de limpezire/clarificare
        pentru produse care clarifică vinul roșu.
    finish_after_baking:
      name: Finalizați după coacere
      description: Descrie aspectul tipic al suprafeței după întărire/coacere.
    finish_effect:
      name: Efect de finisare
      description: Descrie efectele speciale de suprafață/optice aplicate pietrelor
        de Rin.
    finish_type:
      name: Tipul de finisaj
      description: Finisaj de suprafață aplicat corpului ukulelei.
    finished_product_format:
      name: Formatul produsului finit
      description: Specifică tipul de produs parfumat pe care kitul este destinat
        să îl realizeze.
    fire_pit_accessories_included:
      name: Accesorii incluse pentru vatra de foc
      description: Listează accesoriile importante incluse cu vatra de foc, cum ar
        fi plase de protecție împotriva scânteilor sau pietre de lavă, oferind claritate
        asupra conținutului pachetului.
    firework_assortment_launch_type:
      name: Tipul de lansare al asortimentului de artificii
      description: Descrie modul în care sunt de obicei aprinse/lansate artificiile
        incluse.
    firework_assortment_types_included:
      name: Tipuri de sortimente de artificii incluse
      description: 'Identifică principalele tipuri de artificii incluse în asortiment,
        pentru a ajuta cumpărătorii să compare conținutul pachetelor (de exemplu:
        vulcani/fântâni, lumânări romane, petarde).'
    firework_effect_types:
      name: Tipuri de efecte de focuri de artificii
      description: Principalele categorii de efecte vizuale și/sau senzoriale produse
        de asortiment (selectați toate variantele aplicabile).
    firework_ignition_method:
      name: Metoda de aprindere a focuri de artificii
      description: Specifică modul în care se aprinde sau se inițiază focurile de
        artificii (de exemplu, cu fitil sau chibrit electric).
    firework_visual_intensity_level:
      name: Nivelul intensității vizuale a focului de artificii
      description: Intensitatea vizuală generală/volumul scânteilor pentru efectul
        de tip fântână.
    firing_mode:
      name: Modul de tragere
      description: Prezintă modurile de tragere selectabile sau principale pe care
        le suportă arma cu aer comprimat.
    first_day_cover_cachet_type:
      name: Tip de ștampilă pentru plic de prima zi
      description: 'Tipul de ștampilă de pe plicul de prima zi (de exemplu: tipărită,
        pictată manual).'
    first_day_cover_cancellation_type:
      name: Tipul de anulare a primei zile de acoperire
      description: 'Tipul/stilul anulării poștale aplicate pe plicul de prima zi (de
        exemplu: anulare mecanică, anulare manuală).'
    first_day_cover_set_type:
      name: Tipul setului de plicuri de prima zi
      description: Indică dacă coperta reprezintă un singur număr, un set complet
        sau un subset/o combinație.
    fishing_hook_size:
      name: Dimensiunea cârligului de pescuit
      description: 'Specifică denumirea standardizată a dimensiunilor cârligului de
        pescuit (de exemplu, #4, 1/0, 10/0), ajutând pescarii să potrivească dimensiunile
        cârligului cu speciile și momeala țintă.'
    fishing_hook_style:
      name: Stilul cârligului de pescuit
      description: Identifică designul specific sau modelul de îndoire al unui singur
        cârlig, care afectează prezentarea, eficiența agățării și aplicația preconizată.
    fishing_hook_type:
      name: Tipul cârligului de pescuit
      description: Descrie configurația cârligului furnizat împreună cu lingurița
        de pescuit (dacă există).
    fishing_line_application:
      name: Aplicație de linie de pescuit
      description: Identifică utilizarea preconizată a firului de pescuit sau a materialului
        pentru firul de pescuit (de exemplu, fir principal, fir principal, fir de
        vârf).
    fishing_line_buoyancy_type:
      name: Tipul de flotabilitate al firului de pescuit
      description: 'Clasifică modul în care firul se comportă în coloana de apă (de
        exemplu: plutitor, intermediar, scufundător), ajutând pescarii să aleagă adâncimea
        de prezentare adecvată.'
    fishing_needle_purpose:
      name: Scopul acului de pescuit
      description: Identifică principala aplicație a acului în cadrul sarcinilor de
        montaj al undițelor de pescuit.
    fishing_needle_types_included:
      name: Tipuri de ace de pescuit incluse
      description: Enumeră tipurile specifice de ace sau unelte de montură incluse
        în set, astfel încât clienții să poată vedea rapid conținutul kitului.
    fit_profile:
      name: Profil de potrivire
      description: Descrie croiala și silueta generală a pernei care afectează mobilitatea
        și acoperirea.
    fit_volume_classification:
      name: Clasificarea volumului de potrivire
      description: 'Categorisează volumul intern general al cizmei, așa cum este definit
        de producători (de exemplu: LV pentru volum redus).'
    fitting_angle:
      name: Unghiul de montare
      description: Specifică unghiul de îndoire al corpului fitingului (de exemplu,
        drept, 45°, 90°). Folosiți „reglabil/pivotant” pentru fitinguri cu unghi variabil
        și „Altele” pentru unghiuri mai puțin frecvente.
    flag_base_type:
      name: Tipul de bază al steagului
      description: Definește stilul de ancorare sau de bază utilizat pentru fixarea
        steagului de colț pe diferite suprafețe de joc.
    flag_design_theme:
      name: Temă de design de steag
      description: Descrie tema principală de design reprezentată pe steag (de exemplu,
        țară/națională, echipă sportivă, sărbătoarea), facilitând descoperirea și
        filtrarea pentru cumpărături bazate pe intenție.
    flag_mounting_method:
      name: Metoda de montare a steagului
      description: Specifică modul în care se atașează steagul la vehicul (de exemplu,
        prindere antenă, prindere cârlig, magnetic).
    flag_type:
      name: Tipul de steag
      description: Clasifică scopul sau stilul specific al steagului de golf, cum
        ar fi steagul fixat, steagul coș sau steagul de antrenament.
    flame_resistance_standard:
      name: Standard de rezistență la flacără
      description: Indică standardul/certificarea specifică de rezistență la flacără
        sau la arc electric pe care o îndeplinește articolul de îmbrăcăminte.
    flamenco_cajon_snare_system:
      name: Sistem de cajon snare flamenco
      description: Specifică mecanismul intern de tip snare folosit pentru a crea
        zumzetul caracteristic flamenco (absența acestuia).
    flammability_compliance:
      name: Conformitate privind inflamabilitatea
      description: Specifică standardul (standardele) cu privire la inflamabilitate
        aplicabil(e) pe care materialul textil le îndeplinește pentru interiorul vehiculelor.
    flannel_brushing_finish:
      name: Finisaj periere flanelă
      description: Indică dacă flanela este periată și pe ce parte (părți), ceea ce
        influențează finețe la atingere, căldura și aspectul.
    flannel_use_type:
      name: Tipul de utilizare a flanelei
      description: Utilizarea principală intenționată a bucății/rolei de flanelă.
    flap_configuration:
      name: Configurația clapetei
      description: Specifică stilul clapetei șeii, cum ar fi clapetă monobloc sau
        clapetă dublă.
    flare_color:
      name: Culoarea semnalizatoarelor luminoase
      description: Culoarea luminii/flacării emise (sau culoarea lentilei pentru semnalizatoare
        LED).
    flash_card_included_features:
      name: Caracteristicile incluse ale cardului de memorie
      description: Highlight caracteristicile funcționale de învățare/utilizare incluse
        în cardul de memorie.
    flavor_intensity:
      name: Intensitatea aromei
      description: Indică cât de concentrat este produsul aromatizant, ajutând utilizatorii
        să determine dozajul adecvat (de exemplu, concentrație standard, concentrație
        super).
    flavor_solvent_base:
      name: Bază de solvent pentru aromă
      description: Identifică principalul transportor sau solvent utilizat în aromă
        (de exemplu, alcool, propilen glicol, glicerină).
    fleece_fiber_animal_type:
      name: Tipul de animal sursă pentru fibra de lână
      description: Sursă de origine animală a fibrei de lână (specie).
    fleece_finish_surface:
      name: Finisaj/suprafață de lână
      description: 'Descrie suprafața/finisajul lânii (de exemplu: anti-scămoșare,
        periat), ceea ce influențâează formarea scamelor, moliciunea și aspectul.'
    fleece_preparation_method:
      name: Metoda de preparare a lânii
      description: Cum este pregătită/prelucrată lâna pentru artizanat și filare (starea
        fibrei).
    flesh_color:
      name: Culoarea pulpei (miezului).
      description: Specifică culoarea pulpei (miezului) pepenelui.
    fletching_orientation:
      name: Orientarea aripilor
      description: 'Specifică modul în care penele stabilizatoare (fletching) sunt
        montate pe tijă (de exemplu: drept, decalaj/offset, helicoidal), ceea ce influențeqază
        rotația și traiectoria săgeții.'
    fletching_profile:
      name: Profil aripilor
      description: Definește forma geometrică sau tipul de tăietură al penelor stabilizatoare
        (fletching), care influențează rezistența aerului, spațiul de trecere, zgomotul
        și caracteristicile generale ale zborului săgeții.
    flight_system_type:
      name: Tipul sistemului de zbor
      description: Identifică stilul de construcție al aripii, făcând distincția între
        sistemele pliabile, turnate și cele integrate cu aripi și tijă.
    float_attachment_method:
      name: Metoda de fixare a plutitorului
      description: Descrie modul în care plutitorul este atașat la fir (de exemplu,
        alunecător sau fix), permițând pescarilor să filtreze după stilul de montare.
    float_design:
      name: Designul plutei
      description: Clasifică stilul sau tipul general al plutei de pescuit (de exemplu,
        bobber, waggler, creion), astfel încât pescarii să poată alege rapid un model
        potrivit tehnicii și stilului lor de pescuit.
    float_raft_use_environment:
      name: Mediul de utilizare pentru plute/jucării plutitoare gonflabile
      description: 'Mediul principal de utilizare pe apă pentru produsul gonflabil
        (de exemplu: piscină, ape deschise liniștite sau valuri/surf), reflectând
        durabilitatea și cerințele de design.'
    floatation:
      name: Plutire
      description: Dacă baliza este proiectată să plutească în apă.
    floor_construction_type:
      name: Tipul de construcție al podelei
      description: 'Specifică designul podelei plutei (de exemplu: auto-evacuare a
        apei sau construcție tip drop-stitch), influențând drenajul, rigiditatea și
        performanța.'
    floor_design:
      name: Designul podelei
      description: Stilul acoperirii de sol furnizate împreună cu carcasa.
    floor_inclusion:
      name: Incluziunea podelei
      description: Precizează dacă vestibulul include o podea și dacă acea podea este
        detașabilă.
    floor_mat_cleaning_method:
      name: Metoda de curățare a covorașelor
      description: Indică metoda principală de curățare recomandată de producător
        pentru covoraș.
    floor_mat_edge_style:
      name: Stilul marginii covorașului
      description: Descrie dacă covorașul are margini/borduri ridicate pentru a reține
        scurgerile și resturile.
    floor_mat_format:
      name: Formatul covorașului
      description: Definește formatul fizic sau stilul produsului de protecție a pardoselii
        (de exemplu, covoraș simplu, dală interblocantă, rolă).
    floor_mat_retention_system:
      name: Sistem de fixare a covorașului de podea
      description: Specifică metoda utilizată pentru a menține covorașul fixat la
        locul său.
    floor_mat_set_configuration:
      name: Configurația setului de covorașe
      description: Indică ce poziții sunt incluse în pachet (de exemplu, doar față
        în față, set complet).
    floss_sugar_granulation_grade:
      name: Gradul de granulație al zahărului pentru vată de zahăr.
      description: Descrie dimensiunea cristalină a amestecului de zahăr (fină, medie,
        grosieră), care poate afecta performanța mașinii și textura finală.
    floss_sugar_product_form:
      name: Forma de prezentare a zahărului pentru vată de zahăr
      description: Indică dacă zahărul pentru vată de zahăr este gata de utilizare,
        un concentrat de aromă care trebuie amestecat cu zahărul de bază sau un zahăr
        de bază incolor.
    flour_grind_texture:
      name: Textura făinii măcinate
      description: Indică dimensiunea de măcinare sau textura făinii, cum ar fi superfină,
        medie, grosieră sau măcinată cu piatră, care poate afecta performanța rețetei.
    flour_processing_method:
      name: Metoda de procesare a făinii
      description: Surprinde metodele notabile de procesare sau tratare aplicate făinii
        (de exemplu, măcinată pe piatră, albită, încolțită, îmbogățită) care Influence
        aroma, culoarea sau valorile nutriționale.
    flower_care_instructions:
      name: Instrucțiuni de îngrijire a florilor
      description: Oferă pașii de îngrijire recomandați specifici pentru florile prospăt
        tăiate (de exemplu, tăierea tulpinilor, schimbarea frecvenței de udare).
    flugelhorn_leadpipe_material:
      name: Materialul tubului de fligorn
      description: Materialul componentei tubului principal (dacă este specificat
        separat de materialul general al instrumentului).
    flugelhorn_trigger_type:
      name: Tipul declanșator al fligornului
      description: Indică dacă fligornul include un declanșator de acordaj și asupra
        cărei culise/valve acționează acesta.
    fluorescence_grade:
      name: Grad de fluorescență
      description: Indică intensitatea fluorescenței diamantului atunci când este
        expus la lumină UV.
    fluorescence_under_uv:
      name: Fluorescență sub UV
      description: Indică dacă/ce fel de fluorescență prezintă specimenul în lumină
        ultravioletă.
    fluorocarbon_content:
      name: Conținut de fluorocarbon
      description: Indică dacă ceara conține aditivi fluorocarbonici și în ce nivel.
    flute_case_capacity:
      name: Capacitatea husei de flaut
      description: 'Indică ce este proiectat să conțină husa, în afară de corpul principal
        al flautului (de exemplu: flaut + piccolo, cap suplimentar).'
    flute_cleaning_rod_tip_type:
      name: Tip de vârf tijă de curățare a flautului
      description: Descrie designul capătului tijei care susține pânza/bețișorul sau
        intră în contact cu instrumentul (de exemplu, cu crestătură, din lemn de brad,
        cu ochi).
    flute_footjoint_type:
      name: Tipul articulației piciorului flautului (footjoint).
      description: Specifică configurația articulației piciorului flautului.
    flute_headjoint_cork_type:
      name: Tip plută pentru articulația cap
      description: Specifică materialul/tipul ansamblului de articulația cap din plută/dop
        furnizat împreună cu articulația cap.
    flute_key_system:
      name: Sistem de clape pentru flaut
      description: Identifică sistemul mecanic/de claviatură utilizat de flaut (de
        exemplu, sistemul Boehm), acolo unde este cazul.
    flute_keywork_material:
      name: Materialul mecanismului de clape pentru flaut
      description: Materialul și/sau placarea tastelor (elementele tastelor), atunci
        când sunt specificate separat de materialul carcasei.
    flute_offset_g:
      name: Flaut clapă Sol decalată (offset G)
      description: Specifică dacă flautul are configurație cu clapă Sol decalată (offset
        G).
    flute_wall_thickness:
      name: Grosimea peretelui flautului
      description: Categoria grosimii peretelui țevii flautului (perete subțire, standard,
        perete gros).
    fly_pattern_type:
      name: Tip de model de muscă
      description: Clasifică musca artificială după stilul său de pescuit sau imitația
        insectelor/furaje pentru a ajuta pescarii să filtreze rapid în funcție de
        stilul corect de muscă.
    fly_rod_style:
      name: Stilul lansetei de muscă
      description: 'Clasifică lanseta în funcție de disciplina de aruncare sau aplicația
        pentru care este destinată (de exemplu: mână simplă, switch, spey).'
    fly_style:
      name: Stil de muscă artificială
      description: Specifică tipul de deschidere frontală a pantalonilor „long john”
    fly_tying_tools_included:
      name: Instrumente de legat muște incluse
      description: Listează uneltele specifice de legat muște incluse în set, astfel
        încât cumpărătorul să știe exact ce este inclus și să poată compara pachetul.
    fly_type:
      name: Tipul de deschidere frontală
      description: Specifică dacă pantalonii scurți tip „long john” includ o deschidere
        frontală funcțională și stilul acelei deschideri.
    flyer_hook_mounting_method:
      name: Metoda de montare a cârligului de tip flyer
      description: Modul în care se atașează cârligului de tip flyer (de exemplu,
        prin înșurubare vs. prin presare), ceea ce afectează instalabilitatea și compatibilitatea.
    flyer_hook_orientation:
      name: Orientarea cârligului tip flyer
      description: Indiferent dacă cârligul este destinat părții stângi sau drepte
        a flyerului sau este reversibil/universal.
    flyer_kit_finish_coating:
      name: Finisaj/acoperire kit pliant
      description: Finisaj de suprafață aplicat componentelor kitului de pliante
    flyer_kit_included_components:
      name: Componente incluse kitul de pliante
      description: Identifică ce piese sunt incluse în kit.
    flyer_orifice_type:
      name: Tipul orificiului (duzei) de tip flyer
      description: Specifică tipul/stilul orificiului utilizat pe flyer
    flying_disc_feature_set:
      name: Set de caracteristici ale discului zburător
      description: Caracteristici funcționale notabile ale discului zburător.
    flysheet_material:
      name: Materialul foliei de protecție
      description: Identifică materialul principal utilizat pentru stratul exterior
        al cortului (flysheet), ceea ce influențează greutatea, durabilitatea și rezistența
        la intemperii.
    flywheel_balance_type:
      name: Tipul de echilibrare al volantului
      description: Indică dacă volantul este echilibrat neutru sau utilizează o contragreutate
        externă de dezechilibrare.
    foam_blocks_size_class:
      name: Clasa dimensională a blocurilor de spumă
      description: Indică clasa generală de dimensiune a blocurilor din set.
    foam_blocks_surface_texture:
      name: Spuma blochează textura suprafeței
      description: Descrie senzația/finisajul suprafeței exterioare a blocurilor de
        spumă.
    foam_surface_effect:
      name: Efect de suprafață din spumă
      description: Descrie efectele decorative de suprafață aplicate spumei artizanale
        sau polistirenului, cum ar fi finisaje cu sclipici, metalice sau holografice.
    foil_color:
      name: Folie culori
      description: Specifică culoarea foliei decorative utilizate pe certificat (dacă
        este cazul).
    foil_curtain_mounting_method:
      name: Metoda de montare a perdelei de folie
      description: Modul în care perdeaua din folie este destinată să fie instalată
        sau agățată (de ex., bandă adezivă, inele de etanșare).
    foil_discipline:
      name: Disciplină de floretă
      description: Identifică stilul principal de utilizare sau disciplina pentru
        care este proiectată folia.
    foil_mast_board_mounting_type:
      name: Tipul de montare a catargului pe placă pentru foil
      description: Definește interfața din vârful catargului care se atașează de placă
        sau folie a unei urmări.
    foil_mast_fuselage_connection_type:
      name: Tipul de conexiune dintre catarg și fuzelajul pentru folie
      description: Specifică modul în care se conectează catargul la fuzelaj sau la
        ansamblul aripii din față.
    foil_mounting_interface:
      name: Interfața de montare a foliei
      description: Identifică standardul de conexiune pe care piesa îl folosește pentru
        a se atașa la placă sau la alte componente din folie.
    foil_mounting_system:
      name: Sistemul de montare a foliei
      description: Specifică interfața de montare a aripioarelor sau a aripilor pe
        placă, asigurând compatibilitatea cu echipamentul existent al utilizatorului.
    foil_mounting_type:
      name: Tipul de montare a foliei
      description: Identifică sistemul de interfață utilizat pentru atașarea foliei
        la placă, asigurând compatibilitatea dintre componente.
    fold_over_elastic_application:
      name: Aplicație elastică pliabilă
      description: Utilizare principală prevăzută/aplicație pentru elasticul pentru
        butoniere.
    foldability:
      name: Pliabilitate
      description: Descrie dacă și cum se pliază sau se restrânge separatorul pentru
        depozitare sau reconfigurare.
    foldability_stow:
      name: Pliabilitate (strângere)
      description: Dacă pluta se pliază/se depozitează atunci când nu este utilizată
        (de exemplu, se pliază lângă vehicul).
    folding_style:
      name: Stil pliabil
      description: Indică modul în care se pliază salteaua de protecție pentru transport
        și depozitare, ceea ce influențează uniformitatea suprafeței de aterizare
        și capacitatea de împachetare.
    food_basket_items_included:
      name: Coș alimentar inclus
      description: Prezintă principalele categorii de produse alimentare incluse în
        coș, pentru a ajuta cumpărătorii să aleagă coșuri care să corespundă gusturilor
        sau nevoilor alimentare ale destinatarilor.
    food_coloring_form:
      name: Formă colorant alimentar
      description: Precizează forma fizică sau formatul de livrare în care se comercializează
        colorantul alimentar (de exemplu, gel, lichid, pulbere, spray).
    food_contact_material:
      name: Material pentru contactul cu alimentele
      description: Materia primară a echipamentelor de vinificație (fermentoare, sifoane,
        parcuri) utilizate cu must/vin.
    food_packing_medium:
      name: Mediu de ambalare alimentară
      description: Specifică mediul în care sunt ambalate fructele sau legumele (de
        exemplu, apă, saramură, sirop, ulei).
    foosball_rod_type:
      name: Tipul de tijă de fotbal de fotbal
      description: Indică configurația mecanică a lansetei care afectează senzația
        de joc și siguranța.
    foot_arch_type_compatibility:
      name: Compatibilitatea tipului de arc plantar
      description: Identifică profilul arcului plantar pentru care este proiectată
        inserția.
    foot_arch_type_suitability:
      name: Potrivire pentru tipul de boltă plantară
      description: Identifică profilul arcadei plantare pe care insertul este destinat
        să îl asiste.
    foot_coverage:
      name: Acoperire pentru picioare
      description: Indică dacă articolul de îmbrăcăminte pentru picioare are picior,
        nu are picior, este de tip „stirrup” sau are călcâiul deschis.
    foot_guard_type:
      name: Tipul de protecție pentru picior
      description: Indică dacă o protecție pentru picior include un vârf de protecție
        pentru degetele de la picioare și precizează dacă acesta este fix sau detașabil.
    foot_support_level:
      name: Nivelul de susținere a piciorului
      description: Indică nivelul de asistență structurală sau fermitate pe care îl
        oferă o inserție de încălțăminte, cum ar fi scăzut, mediu, ridicat sau extra
        ridicat.
    footbag_play_style:
      name: Stilul de joc cu sacul de fotbal
      description: Stilul de joc principal destinat pentru punga de fotbal.
    football_ball_type:
      name: Tipul de minge de fotbal
      description: Precizează destinația principală sau contextul de utilizare al
        mingii de fotbal, cum ar fi jocul propriu-zis, antrenamentul sau expunerea
        ca obiect de colecție.
    football_dummy_type:
      name: Tip de manechin pentru fotbal
      description: Clasifică stilul sau designul funcțional al manechinului pentru
        a reflecta scopul său specific de antrenament.
    football_glove_certification:
      name: Certificare mănuși de fotbal
      description: Indică certificarea sau conformitatea cu standardele necesare pentru
        jocul competitiv (de exemplu, SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Tipul de montare a tălpii pedalei
      description: Specifică modul în care se atașează piciorul patului la cadrul
        patului sau la podea, ajutând cumpărătorul să selecteze hardware și metodele
        de instalare compatibile.
    footboard_style:
      name: Stilul tălpii pedalei
      description: Definește stilul de design structural sau estetic al tăbliei pentru
        picior.
    footrest_adjustability:
      name: Posibilitatea de reglare a suportului pentru picioare
      description: Specifică dacă și cum pot fi ajustate suporturile pentru picioare
        pentru a se adapta diferitelor lungimi ale picioarelor copiilor.
    footrest_type:
      name: Tip suport pentru picioare
      description: Identifică prezența și designul unui suport pentru picioare pe
        scaun.
    footstrap_configuration:
      name: Configurația curelei de picior
      description: Specifică dispunerea inserțiilor pentru curele de picior pe suprafața
        de navigare a plăcii.
    footswitch_action_style:
      name: Stil de acțiune al pedalei
      description: Indică dacă acțiunea comutatorului este momentană sau cu blocare
        și dacă asistă ambele.
    footswitch_power_source:
      name: Sursă de alimentare cu pedală
      description: Specifică modul în care este alimentată pedala, dacă este cazul
        (pasiv prin mufă amplificator, baterie, adaptor extern, USB etc.).
    footwear_construction_method:
      name: Metoda de fabricare a încălțămintei
      description: Definește tehnica utilizată pentru fixarea feței superioare de
        talpă, influențând durabilitatea, posibilitățile de înlocuire a tălpii și
        prețul.
    footwear_cut:
      name: Croială de încălțăminte
      description: Indică înălțimea gulerului gleznei (tăiere joasă, tăiere medie,
        tăiere înaltă), mobilitatea soldului și asistența.
    footwear_size_system:
      name: Sistemul de dimensiuni al încălțămintei
      description: Identifică standardul regional de dimensionare utilizat pentru
        dimensiunea declarată a încălțămintei (de exemplu, SUA, UE, Marea Britanie).
    footwear_support_type:
      name: Tip de asistență pentru încălțăminte
      description: Precizează nivelul de susținere biomecanică sau de control al pronației
        oferit de pantof (de exemplu, neutru, stabilitate, control al mișcării).
    fork_material:
      name: Material furcă
      description: Precizează materialul din care este fabricată furca frontală a
        bicicletei, care influențează rigiditatea, greutatea și confortul la condus.
    form_factor:
      name: Factor de formă
      description: Forma fizică principală a controlerului DMX.
    formula_car_series_class:
      name: Serie/clasă de mașini de curse
      description: Specifică seria sau clasa de curse în care este construită mașina
        de curse.
    formulation_style:
      name: Stilul de formulare
      description: Prezintă formule specializate, concepute pentru utilizări sau preferințe
        specifice (de exemplu, Barista, Extra Creamy).
    formulation_type:
      name: Tipul de formulare
      description: Stilul de formulare al spray-ului dezinfectant.
    fossil_preparation_level:
      name: Nivelul de pregătire a fosilelor
      description: Gradul de pregătire/curățare efectuat asupra specimenului (de exemplu,
        nepreparat în matrice vs. complet preparat).
    fossil_preservation_type:
      name: Tipul de conservare a fosilelor
      description: Tipul de conservare fosilă (de exemplu, permineralizată, turnată,
        mucegai, afișare).
    fossil_restoration_status:
      name: Starea restaurării fosilelor
      description: Dacă și cum a fost reparat/restaurat exemplarul (de exemplu, lipit,
        reconstruit, refăcut din materiale compozite).
    foundation_configuration:
      name: Configurarea fundației
      description: Precizează dacă baza este fabricată dintr-o singură bucată sau
        sub formă de set divizat/din două părți pentru saltele de dimensiuni mai mari.
    foundation_profile:
      name: Profilul fundației
      description: Clasifică categoria generală de înălțime a bazei fundației, de
        ex. ultra-joasă, joasă, standard sau înaltă, pentru a ajuta utilizatorii să
        aleagă rapid în funcție de preferințele privind înălțimea saltelei și compatibilitatea
        lenjeriei.
    frame_adjustability:
      name: Posibilitatea de reglare a cadrului
      description: Indică dacă și cum poate fi ajustat cadrul (de ex., ajustarea lățimii/înălțimii,
        rotație sau înclinare), influențând ergonomia și potrivirea pentru proiect.
    frame_drum_jingle_configuration:
      name: Configurația elementelor de zăngănit ale tobei tip cadru
      description: Indică dacă toba tip cadru include elemente de zăngănit și, dacă
        da, configurația generală a acestora.
    frame_drum_tuning_system:
      name: Sistem de acordare a tobelor cu cadru
      description: Modul de acordare a tobei tip cadru sau dacă aceasta este acordabilă.
    frame_finish:
      name: Finisajul cadrului
      description: Specifică stratul protector sau finisajul aplicat cadrului, ceea
        ce influențează durabilitatea și aspectul estetic.
    frame_mounting_standard:
      name: Standardul de montare a cadrului
      description: Definește specificația interfeței dintre boot-to-frame (de ex.,
        195 mm în 2 puncte, Trinity în 3 puncte), esențială pentru compatibilitatea
        cadrului
    frame_steel_gauge:
      name: Cadru din oțel
      description: Identifică grosimea (gabaritul) țevilor de oțel utilizate în montanțiile
        suportului, un indicator critic al rezistenței și stabilității.
    frame_suspension_type:
      name: Tipul de suspensie cadru
      description: Indică tipul de suspensie al cadrului bicicletei, cum ar fi rigid,
        hardtail sau cu suspensie integrală, pentru a ajuta cumpărătorii să aleagă
        cadrele potrivite pentru configurația dorită.
    free_reed_instrument_orientation:
      name: Orientarea instrumentului cu ancii libere
      description: Specifică modul în care se ține/se cântă instrumentul (ținut în
        mână cu burduf, curea de umăr etc.) pentru ergonomie și filtrare în funcție
        de preferințe.
    free_weight_rack_type:
      name: Tipul suportului pentru greutăți libere
      description: Clasifică stilul structural sau funcțional al suportului (de ex.,
        suport pentru haltere, suport pentru kettlebell-uri, suport tip arbore pentru
        discuri)
    freehub_body_type:
      name: Tipul corpului freehub-ului
      description: Specifică standardul corpului freehub sau al driverului casetei
        acceptat de butucul posterioar al bicicletei.
    freehub_driver_standard:
      name: Standardul driverului freehub
      description: Identifică interfața casetei/driverul compatibil(ă) de piesa de
        butuc (de ex., Shimano HG, SRAM XD)
    freewheel_thread_standard:
      name: Standardul filetului roții libere
      description: Specifică standardul sau dimensiunea butucului cu care este compatibilă
        roata liberă.
    french_horn_bell_construction:
      name: Construcția clopotului de corn francez
      description: Specifică modul în care este construit clopotul și dacă acesta
        poate fi demontat pentru transport/serviciu.
    french_horn_bell_material:
      name: Materialul pavilionului cornului francez
      description: Specifică materialul/aliajul clopotului (și adesea al flansei clopotului)
        folosit la cornul francez.
    french_horn_bell_type:
      name: Tipul pavilionului cornului francez
      description: Stilul de construcție al cornului.
    french_horn_finish:
      name: Finisaj corn francez
      description: Finisajul exterior/placarea instrumentului.
    french_horn_included_accessories:
      name: Accesorii incluse pentru corn francez
      description: Accesorii incluse cu cornul francez (cutie, muștiuc etc.).
    french_horn_leadpipe_material:
      name: Materialul tubului principal pentru corn francez
      description: Specifică materialul/aliajul țevii de plumb.
    french_horn_wrap_type:
      name: Tipul de înfășurare a cornului francez
      description: Configurația generală a formei cornului francez.
    fretboard_radius_fit:
      name: Ajustarea spațiul ladurilor
      description: Indică dacă curbura plăcuței capodastrului este concepută pentru
        spațiul ladurilor plate sau cu rază de curbură, sau dacă este reglabilă pentru
        a se adapta la mai multe raze de curbură.
    friction_surface_included:
      name: Suprafață de frecare inclusă
      description: Indică dacă volantul include o suprafață de fricțiune înlocuibilă/instalată
        (de ex., inserție, inel) sau dacă are o suprafață de fricțiune dintr-o singură
        piesă
    fringe_curtain_finish:
      name: Finisaj perdea cu franjuri
      description: Descrie finisajul vizual al suprafeței franjurilor (strălucire/textură).
    fringe_curtain_material:
      name: Materialul perdelei cu franjuri
      description: Specifică materialul principal al fâșiilor de perdea (de ex., folie
        PET, plastic, hârtie, material textil).
    fringe_curtain_use_location:
      name: Locația de utilizare a perdelei cu franjuri
      description: Indică dacă perdeaua cu franjuri este destinată utilizării în interior,
        în exterior sau în ambele.
    fringe_trim_style:
      name: Stil de bordură cu franjuri
      description: Specifică construcția/stilul bordurii cu franjuri (modul în care
        sunt formate și prezentate șuvițele sau buclele).
    front_axle_standard:
      name: Standardul axului roții față
      description: Listează diametrul axului și spațierea pe care furca este proiectată
        să le accepte (de exemplu, 15 x 110 mm Boost), asigurând compatibilitatea
        hubului.
    front_button_configuration:
      name: Configurația butonului frontal
      description: Indică stilul de închidere frontală al sacoului, specificând dacă
        este cu un rând sau două rânduri de nasturi și numărul de nasturi frontali.
    front_closure_style:
      name: Stil de închidere frontală
      description: Indică stilul de construcție în față al trench-ului, cum ar fi
        cu un singur rând de nasturi sau două nasturi, deschis, înfășurat sau cod
        poștal.
    front_decoration_type:
      name: Tipul de decorațiune frontală
      description: Identifică tipul de ornament sau etichetă prezentă pe partea din
        față a pălăriei (de exemplu, etichetă brodată, etichetă de piele).
    front_point_configuration:
      name: Configurația vârfului frontal
      description: Specifică designul vârfurilor frontale (mono-point, dual-point,
        modular, înlocuibile), influențând precizia penetrării pe gheață și pe teren
        mixt
    front_seat_position:
      name: Poziția scaunului din față
      description: Pentru ce parte/poziție din rândul din față este destinat scaunul.
    front_style:
      name: Stil frontal
      description: Descrie construcția din față a pantalonilor chino, indicând dacă
        sunt cu față plată, plisați sau cu alte detalii.
    frosting_or_icing_type:
      name: Tipul de glazurare sau acoperire cu glazură
      description: Specifică tipul de glazură aplicată pe tort sau pe barul de deserturi.
    fruit_cultivar_or_variety:
      name: Soiul sau varietatea de fruct
      description: Specifică denumirea cultivării sau a varietății de fruct (de ex.,
        Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Stilul tăiat al fructelor
      description: Descrie modul în care fructul este preparat sau tăiat (de exemplu,
        întreg, feliat, cubulețe).
    fruit_mix_variety:
      name: Varietate de mixuri de fructe
      description: Denumirea amestecului tematic sau a varietății generale a mixului
        de fructe (de ex., mix tropical, amestec de fructe de pădure).
    fruit_piece_form:
      name: Formă de bucată de fruct
      description: Descrie tăierea fizică sau prezentarea bucăților de fructe uscate,
        de exemplu, întregi, feliate, pulverizate.
    fruit_snack_form:
      name: Forma gustării din fructe
      description: Clasifică forma fizică sau stilul în care este prezentată gustarea
        cu fructe.
    fruit_topping_format:
      name: Formatul toppingului cu fructe
      description: Descrie forma fizică, textura sau stilul toppingului, astfel încât
        cumpărătorul poate alege între sosuri, siropuri, bucăți mari de fructe, perle
        de sticlă etc.
    fruit_variety:
      name: Soiul de fructe
      description: Identifică fructul principal utilizat pentru rețeta/kitul/suportul
        de vin de fructe (de ex., măr, cireș, mure).
    fuel_cap_gasket_seal_material:
      name: Materialul garniturii/etanșării capacului rezervorului de combustibil
      description: Specifică materialul utilizat pentru garnitura de etanșare (O-ring)
        a capacului de combustibil.
    fuel_cap_locking_mechanism:
      name: Mecanismul de blocare a capacului rezervorului de combustibil
      description: Indică metoda de blocare utilizată de un capac de combustibil cu
        blocare.
    fuel_cap_type:
      name: Tipul capacului rezervorului de combustibil
      description: Specifică tipul funcțional/designul capacului de combustibil utilizat
        pentru gâtul de alimentare al vehiculului.
    fuel_cap_venting:
      name: Aerisirea capacului de combustibil
      description: Indică dacă capacul de combustibil este ventilat și, dacă este
        cazul, tipul de ventilație
    fuel_filter_features:
      name: Caracteristicile filtrului de combustibil
      description: Enumeră caracteristicile funcționale notabile ale filtrului de
        combustibil (separarea apei, supapa de golire, orificiul senzorului etc.).
    fuel_filter_media_material:
      name: Material media pentru filtrul de combustibil
      description: Specifică mediul principal de filtrare utilizat în interiorul elementului
        filtrant de combustibil.
    fuel_filter_mounting_connection_type:
      name: Tip de montare/conectare a filtrului de combustibil
      description: Specifică modul de conectare/montare al filtrului de combustibil
        (de ex., filet/înșurubare tip spin-on, conectare rapidă, racord tip furtun,
        banjo etc.)
    fuel_injection_cleaning_method:
      name: Metoda de curățare a injecției de combustibil
      description: Indică modul în care se utilizează kit pentru curățarea sistemului
        de injecție a combustibilului.
    fuel_injector_electrical_connector_type:
      name: Tipul conectorului electric al injectorului de combustibil
      description: Specifică standardul sau forma conectorului electric al injectorului.
    fuel_injector_seat_type:
      name: Tipul scaunului injectorului de combustibil
      description: Specifică tipul de interfață al vârfului/sediului injectorului
        utilizat pentru etanșare la galeria de admisie/șina de combustibil.
    fuel_injector_spray_pattern:
      name: Modelul de pulverizare al injectorului de combustibil
      description: Identifică modelul de pulverizare/distribuție a combustibilului
        al injectorului, utilizând terminologia producătorului sau a industriei (de
        ex., conic, evantai, jet tip creion, multi-orificii)
    fuel_level_sensor_mounting_type:
      name: Tipul de montare al senzorului de nivel al combustibilului
      description: Specifică interfața fizică de montare utilizată pentru fixarea
        senzorului de nivel de combustibil la rezervor sau la modulul pompei de combustibil.
    fuel_level_sensor_sensing_mechanism:
      name: Mecanismul de detectare a nivelului de combustibil
      description: Specifică mecanismul/tehnologia de detectare utilizată pentru măsurarea
        nivelului de combustibil într-un senzor sau o unitate transmițătoare a nivelului
        de combustibil.
    fuel_line_compliance_standard:
      name: Standard de conformitate cu conducta de combustibil
      description: Identifică standardul de reglementare sau standardul industrial
        pe care îl îndeplinește conducta de combustibil (comun în aplicațiile marine).
    fuel_line_connector_interface_type:
      name: Tipul de interfață al conectorului conductei de combustibil
      description: Specifică stilul conexiunii/interfeței la capetele conductei sau
        fitingului de combustibil.
    fuel_pressure_regulator_body_material:
      name: Materialul corpului regulatorului de presiune a combustibilului
      description: Specifică materialul carcasei/corpului regulatorului pentru durabilitate
        și rezistență la coroziune.
    fuel_pressure_regulator_mounting_type:
      name: Tipul de montare al regulatorului de presiune a combustibilului
      description: Specifică modul în care se montează sau se instalează regulatorul
        de presiune a combustibilului, ceea ce afectează montarea și compatibilitatea.
    fuel_pump_inlet_type:
      name: Tipul de admisie a pompei de combustibil
      description: Stilul de conectare la intrarea pompei.
    fuel_pump_mounting_location:
      name: Locația de montare a pompei de combustibil
      description: Unde este instalată pompa de combustibil pe/în sistemul de alimentare
        al vehiculului.
    fuel_pump_outlet_connection_type:
      name: Tipul de conexiune la ieșirea pompei de combustibil
      description: Specifică stilul conexiunii fizice la ieșirea pompei de combustibil
        pentru compatibilitatea montării/instalării.
    fuel_system_application:
      name: Aplicație pentru sistemul de alimentare cu combustibil
      description: Arhitectura sistemului de alimentare cu combustibil pe care pompa
        de combustibil este proiectată să o susțină (de exemplu, cu carburator, EFI,
        GDI, sistem de ridicare/transfer pentru motoare diesel).
    fuel_system_connection_type:
      name: Tipul de conexiune al sistemului de alimentare
      description: Specifică standardul (standardele) de conectare a sistemului de
        alimentare sau interfețele adaptorului acceptate de kit.
    fuel_system_type:
      name: Tipul sistemului de alimentare cu combustibil
      description: Specifică sistemul de alimentare cu combustibil al motorului (de
        exemplu, carburatorul sau arhitectura injecției de combustibil).
    fuel_tank_installation_position:
      name: Poziția de instalare a rezervorului de combustibil
      description: Specifică poziția tipică de instalare a rezervorului de combustibil
        pe vehicul.
    fuel_tank_orientation:
      name: Orientarea rezervorului de combustibil
      description: Specifică dacă rezervorul de combustibil este destinat instalării
        orizontale sau verticale.
    fuel_tank_shape:
      name: Forma rezervorului de combustibil
      description: Descrie forma generală a rezervorului de combustibil pentru a facilita
        montarea și înlocuirea acestuia.
    fur_type:
      name: Tipul de blană
      description: Precizează specia sau materialul sintetic din care este confecționată
        blana de pe exteriorul poșetei-mănușă sau a genții.
    furniture_finish:
      name: Finisajul mobilierului
      description: Descrie tratamentul de suprafață sau finisajul aplicat articolului
        de mobilier, care afectează aspectul și cerințele de întreținere ale acestuia.
    fuse_form_factor:
      name: Factorul de formă al siguranței fuzibile
      description: Specifică stilul/amprenta siguranței fizice pentru a se asigura
        că se potrivește cu suportul sau blocul de siguranțe prevăzut (de exemplu,
        lamă vs. cartuș).
    fuse_terminal_or_mount_style:
      name: Tipul bornei de siguranță sau al suportului
      description: Specifică modul în care se conectează siguranța mecanic/electric
        (plug-in , cu șuruburi sau în linie).
    fusible_application_method:
      name: Metoda de aplicare a materialului fuzibil
      description: Specifică modul în care este activat/aplicat un adeziv fuzibil
        (de exemplu, termoadeziv, presare, coasere de armare).
    fusible_hem_tape_application_method:
      name: Metoda de aplicare a benzii fuzibile
      description: Descrie modul în care banda este activată/aplicată (de exemplu,
        prin lipire cu fier, prin presare termică).
    fusible_seam_tape_activation_method:
      name: Metodă de activare a benzii fuzibile pentru cusături
      description: Indică modul în care adezivul este activat în timpul aplicării.
    fusible_seam_tape_application:
      name: Aplicare bandă termoizolantă pentru cusături
      description: Specifică utilizarea principală prevăzută pentru banda de cusătură
        fuzibilă.
    fusible_seam_tape_material:
      name: Material de bandă de cusătură fuzibilă
      description: Materialul sau compoziția benzii/țesăturii/transportatorului (nu
        materialul de care se lipește).
    fusible_seam_tape_washability:
      name: Lavabilitatea benzii de cusătură termofuzibilă
      description: Indică dacă cusătura topită rămâne intactă după spălare sau curățare.
    fusible_seam_tape_waterproof_rating:
      name: Bandă de cusătură termoizolantă cu grad de impermeabilitate
      description: Indică dacă banda de cusătură este destinată creării unei cusături
        impermeabile sau rezistente la apă după aplicare.
    fusible_tape_backing_type:
      name: Tip de bandă adezivă cu suport termofuzibil
      description: Precizează dacă banda are o hârtie de protecție/un strat de protecție
        și ce formă are aceasta, aspecte care influențează manipularea și aplicarea.
    futon_frame_conversion_mechanism:
      name: Mecanism de transformare a cadrului futonului
      description: Definește mecanismul sau stilul structural utilizat pentru transformarea
        canapelei între pozițiile de canapea, fotoliu și pat.
    gaiter_height_type:
      name: Tipul de înălțime al manșetei
      description: Clasifică ghetrele după înălțimea de acoperire pe picior, cum ar
        fi gleznă, mijlocul gambei, până la genunchi sau până la coapsă.
    game_variation:
      name: Variație de joc
      description: Specifică stilul de joc pentru care este conceput setul (de exemplu,
        tetherball clasic, tether tennis, speedball).
    garlic_preparation_style:
      name: Stil de preparare a usturoiului
      description: Specifică modul în care este preparat sau procesat usturoiul înainte
        de a fi promovat (de exemplu, întreg, tocat, pulverizat).
    garlic_variety:
      name: Soi de usturoi
      description: Precizează soiul botanic sau comercial al usturoiului oferit.
    garment_back_style:
      name: Stilul spatelui hainei
      description: Descrie modelul sau croiala spatelui articolului vestimentar (de
        exemplu, spate deschis, spate în stil „racerback”, spate încrucișat).
    garment_pattern_type:
      name: Tipul de model al hainei
      description: Specifică tipul de articol de îmbrăcăminte pentru care este destinat
        modelul de cusut.
    garnish_type:
      name: Tip de garnitură
      description: Identifică tipul de garnitură (ingredient sau stil de garnitură)
        folosit pentru a completa un cocktail.
    gas_lift_class:
      name: Clasa de ridicare a gazului
      description: Specifică gradul de siguranță și rezistență al cilindrului de ridicare
        cu gaz utilizat pentru reglarea înălțimii scaunului.
    gas_propellant_type:
      name: Tipul de propulsor pe gaz
      description: Specifică tipul de gaz propulsor recomandat sau compatibil atunci
        când pistolul de ardere este alimentat cu gaz.
    gatta_tabla_tuning_block_material:
      name: Materialul Gatta (tabla tuning block)
      description: Materialul blocurilor de acordare (gatta) folosite între curea
        de acordare și carcasă.
    gauge_mounting_type:
      name: Tip de montare a manometrului
      description: Cum se montează/instalează contorul de combustibil pe ambarcațiune.
    gauge_style:
      name: Stil al manometrului
      description: Specifică tipul de manometru utilizat de pompă, cum ar fi un cadran
        analogic, un afișaj digital sau niciunul.
    gear_oil_api_classification:
      name: Clasificarea API a uleiului de transmisie
      description: Clasificarea API GL pentru uleiurile de transmisie utilizate în
        diferențiale/transmisii manuale.
    gel_wax_density_grade:
      name: Grad de densitate a cerii de gel
      description: Indică gradul de densitate al cerii gel, care afectează claritatea,
        parfumul și adecvarea pentru integrare.
    gel_wax_transparency_level:
      name: Nivelul de transparență al cerii gel
      description: Descrie claritatea/opacitatea cerii gel atunci când este utilizată
        conform destinației.
    gelatin_form:
      name: Formă gelatină
      description: Detaliază forma fizică de prezentare a gelatinei, pentru a permite
        alegerea formatului corect în rețete și aplicații industriale
    gelatin_or_gelling_agent_source:
      name: Gelatină sau sursă de agent gelifiant
      description: Indică originea sau tipul agentului de gelifiant utilizat în produs,
        informație importantă din punct de vedere alimentar și religios.
    gelatin_source:
      name: Sursă de gelatină
      description: Indică originea animală, vegetală sau sintetică a gelatinei, astfel
        încât cumpărătorii să poată verifica dacă aceasta respectă cerințele alimentare,
        etice sau religioase.
    gelling_agent:
      name: Agent gelifiant
      description: Identifică substanța principală utilizată pentru a întări sau a
        îngroșa desertul, importantă pentru adecvarea la dietă și textura acestuia.
    gemstone_clarity_grade:
      name: Gradul de claritate al pietrelor prețioase
      description: Gradul de claritate al pietrei prețioase (atunci când este clasificată).
    gemstone_creation_method:
      name: Metoda de creare a pietrelor prețioase
      description: Indică dacă piatra prețioasă este naturală, creată în laborator
        sau o imitație/simulant.
    gemstone_cut_style:
      name: Stilul de tăiere a pietrelor prețioase
      description: Descrie stilul de tăiere/finisajul specimenului de piatră prețioasă.
    gemstone_treatment_status:
      name: Starea tratamentului cu pietre prețioase
      description: Indică dacă și cum a fost tratată/îmbunătățită piatra prețioasă.
    geological_period:
      name: Perioadă geologică
      description: Perioada geologică (și opțional epoca) a fosilei atunci când este
        cunoscută (de exemplu, Jurasic, Cretacic, Eocen).
    gift_box_tin_insert_type:
      name: Tip de inserție pentru cutie/cutie metalică de cadou
      description: Configurația separatoarelor interioare pentru organizarea și protejarea
        obiectelor din interiorul cutiei/cutiei metalice.
    gift_box_tin_sustainability_features:
      name: Caracteristici de sustenabilitate ale cutiei/cutiei metalice pentru cadouri
      description: Caracteristicile legate de sustenabilitate ale ambalajului tip
        cutie cadou/cutie metalică.
    gift_box_tin_window_type:
      name: Tipul de fereastră al cutiei cadou/cutiei metalice
      description: Dacă cutia cu oferte de cadouri are o fereastră de afișare și în
        ce stil este.
    gift_message_option:
      name: Opțiunea „Mesaj de cadou”
      description: Specifică dacă un mesaj/o notă de tip „oferire de cadouri” poate
        fi inclusă și cum (niciuna, inclusă, personalizabilă).
    ginger_maturity:
      name: Maturitatea ghimbirului
      description: Indică stadiul de recoltare al ghimbirului, cum ar fi tânăr sau
        matur, care afectează intensitatea aromei și aplicațiile culinare preferate.
    ginger_variety:
      name: Soiul de ghimbir
      description: Precizează soiul, tipul sau rizomul aferent din familia ghimbirului,
        pentru a diferenția profilurile aromatice și utilizările culinare.
    glass_kiln_controller_type:
      name: Tipul controlerului pentru cuptorul de sticlă
      description: Tipul de regulator de temperatură/ardere inclus în pachetul cuptorului.
    glass_kiln_firing_application:
      name: Aplicație pentru arderea în cuptor a sticlei
      description: Aplicația (aplicațiile) principală(e) de prelucrare a sticlei pentru
        care este proiectat cuptorul.
    glass_stone_application_method:
      name: Metoda de aplicare a pietrei de sticlă
      description: Specifică modul în care pietrele de sticlă sunt destinate a fi
        atașate/aplicate în proiecte (de exemplu, prin lipire, prin fixare la cald,
        prin cusut).
    glass_tint:
      name: Nuanță sticlă
      description: Nuanța de sticlă/plastic utilizată pentru sticlă pentru a gestiona
        expunerea la lumină (obișnuită în fabricarea berii/vinificației).
    glaze_firing_atmosphere:
      name: Atmosferă de ardere a glazurii
      description: Atmosfera (atmosferele) de ardere pentru care este proiectată glazura.
    glaze_opacity:
      name: Opacitatea glazurii
      description: Cât de transparentă devine glazura după ardere.
    glaze_product_form:
      name: Forma produsului de glazură
      description: Forma fizică în care este furnizat produsul de glazură (de ex.,
        lichid, pulbere uscată, concentrat, spray).
    glider_avionics_package:
      name: Pachetul de avionică al planorului.
      description: Indică nivelul general al instrumentației de navigație și zbor
        instalate pe planor.
    glider_certification_rating:
      name: Clasificarea certificării planorului
      description: Clasa oficială de certificare care indică nivelul de siguranță
        și performanță al planorului (de exemplu, EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Configurația trenului de aterizare al planorului
      description: Specifică configurația trenului de aterizare utilizat de planor.
    glider_launch_method:
      name: Metoda de lansare a planorului
      description: Specifică modul în care planorul este lansat sau se lansează autonom
    glider_performance_class:
      name: Clasa de performanță a planorului
      description: Clasa sau categoria de competiție/performanță utilizată în mod
        obișnuit pentru planoare.
    glitter_application_method:
      name: Metoda de aplicare a sclipiciului
      description: Indică tehnica de aplicare/utilizare a sclipiciului pentru hobby
        (de ex., presărare, amestecare, aplicare prin frecare, aplicare peste adeziv,
        aplicare cu pensula, pulverizare, fixare la cald/embosare).
    glitter_eco_friendly_claim:
      name: Declarație privind caracterul ecologic al sclipiciului.
      description: Declarații ecologice/de mediu specifice formulelor cu sclipici
        liber.
    glitter_effect_type:
      name: Tip efect sclipici
      description: Descrie efectul vizual al sclipiciului/paietelor dincolo de culoarea
        de bază (de ex., holografic, iridescent).
    glitter_glue_base_solvent_type:
      name: Bază de adeziv cu sclipici/tip solvent
      description: Descrie baza principală a adezivului cu sclipici (preocuparea cumpărătorului
        obișnuit pentru curățare și compatibilitatea materialelor).
    glitter_opacity_coverage:
      name: Opacitate/acoperire sclipici
      description: Indică cât de opac apare efectul de sclipici atunci când este aplicat.
    glitter_use_suitability:
      name: Potrivit pentru utilizarea sclipiciului
      description: Indică utilizarea principală intenționată sau aprobată a pudrei
        de sclipici (de ex., utilizare doar pentru hobby, calitate cosmetică/sigură
        pentru piele sau sigură pentru alimente).
    glove_armor_placement:
      name: Poziționarea armurii de mănuși
      description: Identifică locul în care se află armura de protecție pe mănușă.
    glove_cuff_length:
      name: Lungimea manșetei mănușii
      description: Indică lungimea și stilul de acoperire a manșetei/mănușii unei
        mănuși de curse la încheietura mâinii/antebraț.
    glove_finger_coverage:
      name: Acoperirea degetelor cu mănușă
      description: Descrie nivelul de acoperire a degetelor oferit de mănușă, de la
        modele pentru deget întreg la modele fără degete.
    glove_finger_design:
      name: Designul degetelor de mănușă
      description: Specifică configurația degetelor mănușii, cum ar fi cu cinci degete
        sau cu o mănușă.
    glove_fit_profile:
      name: Profilul de potrivire a mănușii
      description: Descrie forma internă și silueta generală a mănușii, astfel încât
        jucătorii să poată alege senzația pe care o preferă.
    glove_insulation:
      name: Izolația mănușilor
      description: Specifică izolația/construcția termică sau încălzirea mănușii (de
        exemplu, nivelul de izolație, tehnologia căptușelii/izolației sau tipul de
        încălzire).
    glove_palm_material:
      name: Materialul palmei mănușii
      description: Specifică materialul principal utilizat pentru palma mănușii (suprafața
        principală de contact/de prindere), care poate diferi de cea a dosului mâinii.
    glove_size:
      name: Dimensiunea mănușii
      description: Indică dimensiunea generală a mâinii pentru care sunt proiectate
        să se potrivească mănușile de geantă, adesea exprimate prin coduri de dimensiuni
        în stil îmbrăcăminte sau mărimi pentru tineri.
    glove_webbing_style:
      name: Model cu bandă elastică pentru mănuși
      description: Definește designul pânzei sau buzunarului mănușii, care afectează
        controlul mingii, adecvarea poziției și preferințele jucătorului.
    glow_effect:
      name: Efect de luminescență
      description: Indică dacă bilele de gel au proprietăți de strălucire în întuneric
        sau de trasare pentru jocuri în lumină slabă.
    glow_plug_connector_type:
      name: Tipul conectorului bujiei incandescente
      description: Tipul de bornă electrică/conector de pe bujia incandescentă utilizată
        pentru conectarea la cablajul vehiculului.
    glow_plug_heating_element_type:
      name: Tipul elementului de încălzire al bujiei incandescente
      description: Tipul/tehnologia elementului de încălzire utilizat de bujia incandescentă.
    glue_application_format:
      name: Modul de aplicare a adezivului
      description: Precizează tipul de aplicator/dispozitiv de dozare utilizat pentru
        aplicarea lipiciului de școală.
    glue_applicator_type:
      name: Tipul aplicatorului de lipici
      description: Specifică stilul aplicatorului/vârfului de dozare încorporat utilizat
        pentru aplicarea lipiciului lichid.
    glue_base_formulation:
      name: Formularea bazei de adeziv
      description: Identifică compoziția chimică principală/baza adezivului lichid
        pentru artizanat (în ceea ce privește performanța, siguranța și ușurința curățării).
    glue_gun_nozzle_style:
      name: Stilul duzei pistolului de lipit
      description: Specifică tipul vârfului fizic al duzei unui pistol de lipit, care
        influențează precizia aplicării și acoperirea cu adeziv.
    glue_safety_standard:
      name: Standard de siguranță pentru lipici
      description: Indică dacă adezivul este netoxic/sigur pentru copii, conform etichetei
        și standardelor în vigoare.
    goal_frame_material:
      name: Material cadru al porții
      description: Precizează materialul din care sunt confecționate stâlpii/cadrul
        porții, care influențează greutatea, portabilitatea și rezistența la intemperii.
    goal_size:
      name: Dimensiunea porții
      description: Clasifică o poartă de fotbal în dimensiuni de regulament sau de
        antrenament comune pentru o selecție mai rapidă decât în dimensiunile brute.
    goal_size_classification:
      name: Clasificarea dimensiunii porții
      description: Indică categoria de mărime standardizată a porții (de exemplu,
        dimensiuni standard, pentru juniori, mini), astfel încât utilizatorii să poată
        selecta rapid echipamentul adecvat nivelului lor de joc.
    goal_size_standard:
      name: Standardul pentru dimensiunea porții
      description: Indică standardul oficial sau pe categorii de vârstă pe care îl
        îndeplinește obiectivul (de exemplu, regulamentul World Aquatics, 12U).
    goalie_configuration:
      name: Configurația portarului
      description: Indică numărul de portari pe echipă configurat în tabel (stilul
        american cu 3 portari vs stilul european cu 1 portar).
    goalie_playing_surface:
      name: Suprafața de joc a portarului
      description: Precizează suprafața de joc principală sau mediul pentru care a
        fost conceput setul de echipament pentru portarul de hochei.
    goalkeeper_glove_cut:
      name: Croială pentru mănuși de portar
      description: Indică stilul de construcție (croiala) palmei/degetelor mănușilor
        de portar, care Influence potrivirea, senzația la minge și controlul.
    goalkeeper_training_aid_type:
      name: Tipul de accesoriu de antrenament pentru portar
      description: Identifică tipul de echipament de antrenament pentru portari, permițând
        o filtrare precisă.
    goblet_drum_playing_style:
      name: Stilul de interpretare pe tobe goblet
      description: Indiferent dacă instrumentul este conceput în principal pentru
        cântatul manual sau pentru utilizarea cu bețe/ciocane.
    gobo_format:
      name: Formatul Gobo
      description: Specifică dimensiunea/standardul gobo-ului acceptat de proiector
        (diametru și grosime), asigurând compatibilitatea cu gobo-urile de schimb
        sau personalizate.
    gobo_root_variety:
      name: Varietatea de rădăcină Gobo
      description: Identifică soiul specific de rădăcină de gobo (brusture).
    gobo_rotation:
      name: Rotația gobo-urilor
      description: Precizează dacă goboul se poate roti și ce orientare este acceptată.
    goggle_accessory_type:
      name: Tipul de accesoriu pentru ochelari de protecție
      description: Clasifică tipul de accesoriu (de exemplu, husă, accesoriu drăguț,
        curea), astfel încât cumpărătorul să poată filtra setul divers de produse
        din cadrul acestei categorii generale.
    goggle_features:
      name: Caracteristici ale ochelarilor de protecție
      description: Enumeră caracteristicile funcționale sau de design speciale oferite
        de ochelarii de protecție.
    goggle_fit_design:
      name: Design cu potrivire de tip ochelari de protecție
      description: Descrie modul în care ochelarii de protecție sunt concepuți să
        se potrivească sau să fie purtați, inclusiv compatibilitatea cu ochelarii
        de vedere (OTG).
    goggle_gasket_material:
      name: Materialul garniturii ochelarilor de protecție
      description: Materialul garniturii care vine în contact cu fața, având un impact
        asupra confortului, asupra riscurilor de alergie și asupra prevenirii scurgerilor.
    goggle_integration:
      name: Integrarea cu ochelarii de protecție
      description: Dacă casca este concepută pentru a fi utilizată împreună cu ochelari
        de protecție și/sau include elemente integrate pentru fixarea ochelarilor
        de protecție.
    goggle_lens_shape:
      name: Forma lentilelor ochelarilor de protecție
      description: Definește profilul de curbură al lentilei de înlocuire, afectând
        distorsiunea și câmpul vizual (de exemplu, cilindrică, sferică, torică).
    goggle_lens_tint:
      name: Nuanța lentilelor ochelarilor de protecție
      description: Definește nuanța sau finisajul lentilei, care afectează transmisia
        luminii, percepția culorii și aspectul estetic.
    goggle_strap_material:
      name: Materialul curelei ochelarilor de protecție
      description: Materialul principal utilizat pentru cureaua de cap Iinfluențează
        durabilitatea și confortul.
    golf_accessory_set_purpose:
      name: Scopul setului de accesorii de golf
      description: Identifică utilizarea principală preconizată sau tema setului de
        accesorii de golf.
    golf_bag_style:
      name: Stilul sacului de golf
      description: Indică stilul principal de design sau utilizare al sacului de golf
        (de ex., stand, cart, staff).
    golf_ball_alignment_design:
      name: Designul alinierii mingii de golf
      description: Specifică orice dispozitiv vizual de aliniere încorporat, imprimat
        sau turnat pe suprafața bilei.
    golf_ball_construction:
      name: Construcția mingii de golf
      description: Specifică numărul de straturi/piese utilizate în construcția mingii
        de golf, care afectează rotirea, senzația și distanța.
    golf_ball_cover_material:
      name: Material pentru acoperirea mingii de golf
      description: Identifică materialul din care este învelită mingea de golf, care
        afectează rotirea, durabilitatea și senzația la atingere.
    golf_cart_cover_climate_use:
      name: Husa de golf pentru utilizare climatică
      description: Indică clima/sezonul principal la care este proiectată husa de
        depozitare.
    golf_cart_enclosure_fit_type:
      name: Tip de carcasă pentru golf
      description: Specifică dacă carcasa este proiectată pentru un anumit număr de
        locuri/factor de formă sau oferă o potrivire universală/reglabilă.
    golf_cart_intended_use:
      name: Utilizarea preconizată a coșului de golf
      description: Utilizarea principală prevăzută - pentru care este proiectat sau
        configurat coșul de golf.
    golf_club_number:
      name: Numărul clubului de golf
      description: Identifică numărul sau denumirea wedge-ului inscripționat pe crosă
        (de exemplu, 5, PW, GW).
    golf_club_part_type:
      name: Tipul piesei pentru crosa de golf
      description: Clasifică accesoriul sau componenta crosei de golf în subtipuri
        comune (de exemplu, manșon adaptor, ferulă, greutate).
    golf_grip_size:
      name: Mărimea mânerului pentru crose de golf
      description: Specifică categoria generală de dimensionare externă a mânerelor
        pentru crose de golf, indicând cât de gros se simte mânerul în mână.
    golf_shoe_spike_type:
      name: Tipul de crampoane pentru pantofi de golf
      description: Identifică tipul de sistem de tracțiune utilizat pe talpa exterioară
        a pantofilor de golf (de exemplu, modele cu crampoane sau fără crampoane).
    golf_tee_style:
      name: Stil de suport pentru golf
      description: Descrie stilul/designul structural sau funcțional al tee-ului de
        golf, care afectează înălțimea mingii, durabilitatea sau reducerea spinului.
    golf_training_focus:
      name: Concentrare pe antrenamentul de golf
      description: Clasifică aptitudinea sau aspectul principal pe care produsul este
        destinat să îl îmbunătățească.
    golf_training_objective:
      name: Obiectiv de antrenament pentru golf
      description: Identifică abilitatea de golf principală sau aspectul pe care accesoriul
        de antrenament este conceput să îl îmbunătățească.
    gong_profile_type:
      name: Tipul de profil Gong
      description: Descrie profilul fizic al gongului de operă (de ex., plat sau cu
        centru ridicat), care influențează puternic timbrul și stilul de interpretare.
    grading_scale:
      name: Scală de notare
      description: Scara de gradare utilizată pentru o monedă de lingou gradată (de
        ex., scala Sheldon 1–70).
    grading_service:
      name: Serviciu de notare
      description: Serviciu extern de clasificare/certificare pentru monedă sau bancnotă
        (de exemplu, PCGS, NGC).
    graduation_increment:
      name: Incrementul de gradație
      description: Specifică cea mai mică diviziune imprimată/gravată pe scala riglei
        de cusut (rezoluția marcajelor).
    grain_processing_method:
      name: Metoda de procesare a cerealelor
      description: Identifică metoda principală de procesare aplicată cerealelor (de
        exemplu, prefierte, laminate, germinate), care afectează timpul de gătire,
        textura și valorile nutriționale.
    grand_piano_soundboard_material:
      name: Materialul tablei de rezonanță a pianului cu coadă
      description: Material principal utilizat pentru placa de rezonanță a pianului
        (placa rezonantă), ton Impact și durabilitate.
    grappling_dummy_pose:
      name: Poziția manechinului de luptă
      description: Descrie poziția/postura implicită a corpului manechinului, determinând
        exercițiile și tehnicile la care asistă.
    grease_application:
      name: Aplicarea unsorii
      description: Specifică componenta principală a vehiculului sau utilizarea pentru
        care este destinată unsoarea.
    grease_consistency_grade_nlgi:
      name: Gradul de consistență al unsorii (NLGI)
      description: Specifică numărul de consistență NLGI care indică fermitatea unsorii
        (de exemplu, NLGI 2 este un produs multifuncțional obișnuit).
    grease_thickener_type:
      name: Tipul de agent de îngroșare al unsorii
      description: Identifică sistemul de îngroșare/săpun utilizat în formularea unsorii.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Tipul supapei tubului de suflat al cimpoiului Great Highland
      description: Specifică sistemul de supapă de sens unic utilizat în țeava de
        suflat.
    great_highland_bagpipes_drone_configuration:
      name: Configurația dronelor pentru cimpoiul Great Highland.
      description: Specifică tipurile de drone incluse în set.
    great_highland_bagpipes_mounting_material:
      name: Material de montare pentru cimpoiurile din Great Highland
      description: Specifică materialul monturii decorative de pe cimpoi (de exemplu,
        argint nichelat, imitație de fildeș).
    greens_maturity_stage:
      name: Stadiul de maturitate al verdețurilor
      description: Indică stadiul de dezvoltare al frunzelor la recoltare.
    greens_preparation_state:
      name: Starea de pregătire a verdețurilor
      description: Descrie modul în care sunt procesate sau ambalate legumele cu frunze
        (de exemplu, pre-spălate, tocate, gata de consum).
    grenade_effect_type:
      name: Tipul efectului de grenadă
      description: Indică efectul funcțional principal produs de grenada de paintball
        odată activată (de exemplu, fum, vopsea, explozie de flacără).
    grid_unit:
      name: Unitatea de grilă
      description: "„Sistemul principal de măsurare imprimat pe saltea (dacă este
        prezentă o grilă/scală)"
    grille_emblem_provision:
      name: Prevedere emblemă grilă
      description: Specifică dacă grila suportă un emblema/badge OEM și modul de montare
        al acestuia.
    grille_mounting_method:
      name: Metoda de montare a grătarului
      description: Specifică modul în care se instalează grila pe vehicul (de exemplu,
        înlocuire directă vs. inserare/suprapunere; prindere cu șuruburi vs. clipsare/blocare;
        necesită găurire vs. nu necesită găurire).
    grille_style:
      name: Stilul grătarului
      description: Specifică stilul vizual/de design al grilei vehiculului.
    grip_chalk_form:
      name: Forma produsului de cretă pentru aderență
      description: Identifică forma fizică a cretei furnizate sau utilizate cu sacul.
    grip_coverage:
      name: Acoperire a aderenței
      description: Identifică prezența și locația elementelor de aderență din silicon
        sau cauciuc pe șosetă.
    grip_design:
      name: Design prindere
      description: Specifică configurația mânerului sau a orificiilor discului pentru
        transport mai ușor și versatilitate în exerciții.
    grip_enhancer_effect:
      name: Efect de îmbunătățire a aderenței
      description: Descrie principala caracteristică de performanță oferită de produs
        (de exemplu, absorbția umezelii sau finisajul lipicios din rășină).
    grip_enhancer_form:
      name: Forma agentului de îmbunătățire a prinderii
      description: Identifică forma fizică sau formatul produsului pentru îmbunătățirea
        aderenței, astfel încât sportivii să poată selecta metoda de aplicare adecvată.
    grip_features:
      name: Caracteristici de prindere
      description: Indică funcțiile integrate de prindere/mâner menite să îmbunătățească
        aderența, confortul sau controlul în timpul jocului.
    grip_material:
      name: Material de prindere
      description: Identifică materialul folosit pentru suprafața de prindere a pantalonilor.
    grip_shape:
      name: Forma mânerului de prindere
      description: Descrie forma sau stilul secțiunii transversale a mânerului, aspect
        deosebit de relevant în cazul mânerelor de putter.
    grip_surface_type:
      name: Tipul suprafeței de prindere
      description: Descrie designul suprafeței de tracțiune/a benzii de rulare a pedalei
        care afectează aderența și senzația.
    grip_tackiness_level:
      name: Nivelul de aderență al aderenței
      description: Evaluează cât de aderentă sau lipicioasă este suprafața de prindere,
        ajutând jucătorii să aleagă între o senzație de uscăciune și un control extrem
        de aderent.
    grip_tape_form:
      name: Forma benzii de prindere
      description: Indică forma rapidă a produsului cu bandă adezivă (de exemplu,
        foaie, rolă, kit de pulverizare).
    grip_wax_form:
      name: Formă ceară de prindere.
      description: Clasifică forma fizică în care este vândută ceara de prindere.
    gripper_coverage:
      name: Acoperirea suprafeței de prindere
      description: Specifică tipul de prindere al pantofului antiderapant, indicând
        gradul de acoperire a suprafeței și posibilitatea de a fi îndepărtat.
    grommet_application_material:
      name: Material pentru aplicarea garniturilor de etanșare
      description: Materialul(ele) principal(e) în care sunt destinate a fi instalate
        inelele de etanșare (de exemplu, material textil, piele, vinil, prelată/pânză).
    grommet_duty_rating:
      name: Capacitatea de încărcare a garniturii
      description: Indică clasa de rezistență/utilizare prevăzută a inelului de etanșare.
    grommet_style:
      name: Stil inel de prindere
      description: Stilul de construcție al setului de inele de etanșare (cum este
        asamblat/utilizat).
    grooming_glove_texture_type:
      name: Tipul de textură al mănușilor de îngrijire
      description: Identifică textura principală a suprafeței utilizată pentru îngrijire,
        indicând scopul preconizat, cum ar fi frecarea, lustruirea sau spălarea.
    groove_orientation:
      name: Orientarea canelurilor
      description: Descrie direcția/aspectul canelurilor sau crestelor de pe instrument.
    groove_sampler_onboard_effects:
      name: Efecte integrate în samplerul de groove
      description: Indică categoriile de efecte integrate disponibile pe samplerul
        de groove (insert/master), precum reverb, delay, compresie, distorsiune, egalizator
        și filtrare.
    groove_sampler_storage_expansion_type:
      name: Tip de extensie pentru stocarea samplerului de groove
      description: Specifică opțiunile de stocare detașabile/extensibile acceptate
        de samplerul de groove.
    ground_attachment_method:
      name: Metoda de ancorare la sol
      description: Descrie modul în care arcul de pasă este fixat pe suprafața de
        joc, afectând stabilitatea și compatibilitatea suprafeței.
    groupset_components_included:
      name: Componente incluse în grupul de transmisie
      description: Enumeră componentele specifice ale sistemului de transmisie incluse
        în set, pentru ca clienții să înțeleagă conținutul pachetului.
    gt_racing_class:
      name: Clasa de curse GT
      description: Specifică categoria/clasa GT pentru care este construită sau omologată
        mașina.
    guard_construction_type:
      name: Tip de construcție a protecției
      description: Indiferent dacă protecția este de tip carcasă rigidă, inserție
        de protecție moale sau model cu manșon/curea.
    guard_size_measurement_basis:
      name: Baza de măsurare a dimensiunii protecției
      description: Pe ce măsurătoare se bazează dimensionarea (de exemplu, circumferința
        cotului, circumferința încheieturii mâinii, circumferința antebrațului).
    guard_style:
      name: Stilul de protecție
      description: Clasifică construcția sau tipul de protecție pentru lamele patinelor
        pentru a ajuta cumpărătorul să diferențieze rapid între apărătorile rigide,
        apărătorile moi, apărătorile cu arc și alte modele.
    guava_flesh_color:
      name: Culoarea pulpei de guava
      description: Indică culoarea pulpei interne a fructului de guava.
    guava_variety:
      name: Soi de guava
      description: Identifică soiul specific sau varietatea comercială de guava comercializată
        (de exemplu, guava „Apple”, „Mexican Cream”, „Thai”, „Pink”, „Seedless”, „White”).
    guide_material:
      name: Materialul inelului de ghidaj
      description: Material utilizat pentru inelele de ghidaj ale lansetei sau pentru
        inserțiile acestora.
    guide_type:
      name: Tipul de ghidaj
      description: Specifică tipul de inele de ghidaj montate pe o lansetă de pescuit,
        cum ar fi cu un singur picior, cu role sau tip șarpe.
    guideline_markings:
      name: Marcaje de ghidare
      description: Tip de marcaje vizuale de aliniere imprimate sau încrustate pe
        suprafața covorașului de lansare pentru a ajuta exercițiile de lansare.
    guiro_scraper_material:
      name: Material pentru răzuitor Guiro
      description: Materialul răzuitorului/percutorului inclus sau recomandat utilizat
        cu guiro-ul.
    guiro_surface_style:
      name: Stilul de suprafață Guiro
      description: Descrie modelul/geometria suprafeței de joc care este răzuită pentru
        a produce sunet.
    guitar_body_finish_type:
      name: Tipul de finisaj al corpului chitarei
      description: Specifică finisajul folosit pe corpul chitarei.
    guitar_bridge_system_type:
      name: Tipul sistemului de punte pentru chitară
      description: Familia de design a sistemului de bridge/tailpiece pentru compatibilitate
        și navigare
    guitar_case_style:
      name: Tipul/ stilul husei sau al casei pentru chitară
      description: Specifică stilul general de protecție/structură al husei sau al
        casei pentru chitară.
    guitar_humidifier_placement:
      name: Amplasarea umidificatorului pentru chitară
      description: Specifică locul în care este destinat utilizării/amplasării umidificatorului
        în raport cu instrumentul sau mediul înconjurător.
    guitar_pedal_i_o_configuration:
      name: Configurația intrărilor/ieșirilor a pedalelor de chitară
      description: Indică dacă pedala suportă rutare mono sau stereo pentru intrare/ieșire.
    guitar_pedal_output_connector_type:
      name: Tip conector de ieșire pentru pedală de chitară
      description: Specifică tipul de conector de ieșire audio utilizat de pedală.
    guitar_slide_finish:
      name: Finisaj slide pentru chitară
      description: Finisajul suprafeței slide-ului, care influențează senzația la
        utilizare și frecarea cu corzile.
    guitar_slide_style:
      name: Stil de slide pentru chitară
      description: Specifică forma și dimensiunea slide-ului sau a barei de ton pentru
        chitară și modul în care este purtat/utilizat
    guitar_stand_type:
      name: Tip stativ de chitară
      description: Specifică forma principală a suportului pentru chitară (modul în
        care susține sau depozitează chitara).
    guitar_strap_attachment_type:
      name: Tip de atașare a curei de chitară
      description: Specifică modul în care se atașează cureaua la chitară (sau la
        butonul curelei), inclusiv dacă folosește capete tradiționale sau sisteme
        cu eliberare rapidă.
    guitar_strap_end_material:
      name: Materialul capătului curelei de chitară
      description: Material folosit la capetele curelei/filă (părțile care se atașează
        de nasturii curelei sau de sistemele de blocare a curelei).
    guitar_strap_features:
      name: Caracteristici ale curelei pentru chitară
      description: Caracteristici funcționale notabile ale curelei de chitară, dincolo
        de dimensiune sau material (selectare multiplă).
    guitar_string_coating:
      name: Strat de acoperire al corzilor de chitară
      description: Indică dacă corzile au un strat de protecție și, dacă este cazul,
        tipul acestuia.
    guitar_string_gauge_type:
      name: Tipul de calibru al chitarei
      description: Categoria de calibru a unei chitare acustice și a unui set (de
        exemplu, extra ușoară, ușoară, medie). Este adesea aproximată prin grosimea
        corzii Mi (E) subțire; intervalele exacte ale calibrelor pot varia în funcție
        de producător.
    guitar_string_set_gauge_category:
      name: Categorie de calibru chitară și set
      description: Familii comune de calibru comercial pentru seturile de corzi de
        chitară (de obicei derivate din grosimea corzii Mi (E) subțire/prima coardă)
    guitar_string_winding_type:
      name: Tipul de înfășurare a chitarei și a firului
      description: Specifică tipul de înfășurare exterioară al corzilor înfășurate
        din set.
    guitar_tuning_peg_button_shape:
      name: Forma butonului cheiței de acordare a chitarei.
      description: Forma/stilul cheiței/butonului de acordare.
    guitar_tuning_peg_configuration:
      name: Configurația cheii de acordare a chitarei
      description: Aspectul setului de tuner pentru capul chitarei.
    guitar_tuning_peg_mounting_style:
      name: Stil de montare a cheilor de acordare pentru chitară
      description: Cum se montează o mașină de acordaj pe capul chitarei (tip bucșă
        și metodă anti-rotație).
    guitar_tuning_peg_shaft_type:
      name: Tipul axului cheiței de acordaj a chitarei
      description: Indică dacă axul corzii este plin sau despicat și modul în care
        coarda este fixată.
    guitar_tuning_peg_style:
      name: Stil al cheilor de acordare pentru chitară
      description: Stilul fizic al cheiței de acordare și formatul de montare utilizat
        pe capul chitarei (de exemplu, mecanism închis vs mecanism deschis, blocant,
        ax despicat)
    gum_condition:
      name: Stare adeziv
      description: Starea/condiția adezivului de pe spatele timbrului (de exemplu,
        (de exemplu, fără urme de agățare, cu urme de agățare, fără adeziv).
    gun_action_type:
      name: Tip de mecanism al armei
      description: Tip de acțiune mecanică utilizată pentru a începe/trage (de exemplu,
        acțiune cu șurub, acțiune cu pârghie).
    gun_operational_status:
      name: Starea operațională a armei
      description: Indică dacă arma de colecție este dezactivată/nu trage (și cum
        este prezentată).
    gun_type:
      name: Tipul de armă
      description: Identifică factorul de formă general al armei de foc pentru arma
        antică.
    gusset_material:
      name: Materialul clinului
      description: Precizează materialul utilizat pentru căptușeala din zona dintre
        picioare, care influențează respirabilitatea, igiena și confortul.
    gymnastics_discipline:
      name: Disciplina gimnastică
      description: Precizează disciplina de gimnastică pentru care este destinat produsul
        (de exemplu, gimnastică artistică, ritmică, acrobatică).
    hair_extension_texture:
      name: Textura extensiilor de păr
      description: Descrie modelul de ondulări, ondulații sau textură al șuvițelor
        de extensie.
    hair_net_style:
      name: Stilul plasei de păr
      description: Identifică stilul de design sau construcție al plasei de păr (de
        exemplu, bufant, snood, acoperitor de coc).
    hair_quality_grade:
      name: Grad de calitate a părului
      description: Indică denumirile de calitate sau de origine ale părului utilizate
        în industrie.
    halter_style:
      name: Stil căpăstru
      description: Identifică stilul funcțional sau de design al căpăstrului (de exemplu,
        frânghie, rupt, spectacol), ajutând cumpărătorul să aleagă un căpăstru potrivit
        utilizării preconizate.
    hammock_style:
      name: Stil hamac
      description: Descrie stilul structural sau construcția hamacului.
    hand_and_foot_coverage:
      name: Acoperire pentru mâini și picioare
      description: Descrie mănuși și ghete integrate sau detașabile care acoperă mâinile
        și/sau picioarele.
    hand_cymbal_set_configuration:
      name: Configurație a setului de cinele manuale
      description: Indică dacă produsul se vinde ca pereche asortată, ca o singură
        taleră sau ca un set mai mare.
    hand_drum_head_material:
      name: Materialul membranei tobei de mână
      description: Materialul din care este confecționată membrana folosită la tobe
        goblet.
    hand_exerciser_style:
      name: Stilul exercițiilor pentru mâini
      description: Clasifică stilul sau mecanismul general al aparatului de exerciții
        pentru mâini.
    hand_guard_backbone_material:
      name: Materialul structurii de bază a protecției pentru mâini
      description: Materialul din care este realizată coloana structurală (dacă există),
        care determină rezistența și protecția.
    hand_guard_coverage_style:
      name: Stilul de acoperire al apărătoarei de mână
      description: Descrie acoperirea/profilul apărătoarei pentru mâini, care influențează
        protecția împotriva vântului și a loviturilor.
    hand_guard_mounting_type:
      name: Tip de montare apărătoare de mână
      description: Specifică modul în care se atașează apărătoarele de mână la motocicletă
        (de exemplu, capăt de ghidon cu clemă interioară vs. doar cu clemă).
    hand_guard_set_configuration:
      name: Configurația setului de apărători pentru mâini
      description: Indiferent dacă produsul se vinde ca pereche stânga/dreapta sau
        ca piesă individuală.
    hand_guard_style:
      name: Stilul apărătoarei de mână
      description: Descrie modelul sau stilul de acoperire al protecției (de exemplu,
        închis, deschis, complet, simplificat, standard).
    hand_guard_weather_protection:
      name: Apărătoare de mână pentru protecție împotriva intemperiilor
      description: Indică protecția împotriva intemperiilor prevăzută de apărătorile
        de mână.
    hand_paddle_strap_type:
      name: Tipul curelei pentru paletă manuală
      description: Specifică tipul de curea sau absența acesteia, utilizată pentru
        fixarea paletei manuale pe mâna utilizatorului.
    hand_percussion_mount_attachment_mechanism:
      name: Mecanismul de prindere pentru montarea instrumentului de percuție manuală
      description: Specifică modul în care suportul se atașează la un stativ, suport
        sau alt hardware (de exemplu, prindere tip clemă sau montare pe tijă)
    hand_percussion_mounting_handling:
      name: Montare/gestionare prin percuție manuală
      description: Indiferent dacă instrumentul este portabil, purtat, montat sau
        plasat pe masă/podea în timpul utilizării tipice.
    hand_percussion_pitch_type:
      name: Tip de tonalitate a percuției manuale
      description: Indică dacă instrumentul produce o înălțime definită (acordabilă/note)
        sau o înălțime nedefinită.
    hand_percussion_playing_method:
      name: Metoda de percuție manuală
      description: Cum se cântă de obicei la instrument pentru a produce sunet (de
        exemplu, scuturat vs. răzuit).
    hand_percussion_set_configuration:
      name: Configurația setului de percuție manuală
      description: Indiferent dacă produsul este un singur instrument, asortat cu
        o împerechea sau un set din mai multe piese.
    hand_percussion_size_class:
      name: Clasa dimensiune percuție manuală
      description: Categorie dimensională generală a instrumentului atunci când nu
        este furnizată o măsurătoare precisă sau pentru o filtrare ușoară.
    hand_sewing_needle_point_type:
      name: Tipul cu vârf de ac pentru cusut manual
      description: Forma/tipul vârfului acului de cusut manual utilizat pentru a penetra
        diferite materiale (de exemplu, țesături, tricotaje, piele) sau fire.
    hand_support_level:
      name: Nivel de susținere a mâinii
      description: Precizează gradul de susținere sau compresie oferit de mănușă,
        bandaj sau curea.
    hand_support_size:
      name: Dimensiune a suportului pentru mână
      description: Mărimea declarată de producător pentru mănușă, curea sau bandaj
        (XS-XXL sau mărime universală).
    handball_ball_type:
      name: Tip de minge de handbal
      description: Indică categoria de utilizare prevăzută pentru mingea de handbal,
        cum ar fi meci, antrenament sau handbal pe nisip.
    handball_playing_surface:
      name: Suprafață de joc de handbal
      description: Indică suprafața (suprafețele) de joc pentru care este optimizat
        handbalul.
    handball_target_type:
      name: Tip de țintă de handbal
      description: Specifică stilul sau designul țintei de tragere destinate antrenamentului
        de handbal în echipă.
    handbrake_actuation_type:
      name: Tipul de acționare a frânei de mână
      description: Specifică modul în care este acționată frâna de parcare.
    handbrake_orientation:
      name: Orientarea frânei de mână
      description: Specifică dacă frâna de mână este proiectată pentru vehicule cu
        volan pe stânga sau pe dreapta sau este universală.
    handgun_grip_material:
      name: Material pentru mânerul pistolului
      description: Materialul principal al mânerelor/panourilor de pistol.
    handle_configuration:
      name: Configurația mânerului
      description: Descrie stilul structural al mânerului de wakeboard (de exemplu,
        simplu, dublu, Deep-V, T-wrap), ajutând utilizatorii să îl aleagă în funcție
        de nivelul de abilitate, trucuri sau tipul de placă.
    handle_ergonomics:
      name: Ergonomia mânerului
      description: Descrie caracteristicile ergonomice ale mânerului menite să îmbunătățească
        confortul și controlul.
    handle_grip_material:
      name: Material pentru manșonul mânerului
      description: Specifică materialul folosit pe suprafața de prindere a mânerului,
        care afectează confortul și tracțiunea, în special atunci când este ud.
    handle_grip_type:
      name: Tipul de prindere al mânerului
      description: Specifică învelișul/materialul sau stilul suprafeței mânerului
        destinat îmbunătățirii confortului și controlului.
    handle_shape:
      name: Forma mânerului
      description: Forma sau profilul secțiunii transversale a mânerului.
    handlebar_design:
      name: Designul ghidonului
      description: 'Specifică tipul de ghidon al stepperului, cum ar fi: fără ghidon,
        fix, reglabil pe înălțime, pliabil sau cu mânere pentru benzi de rezistență.'
    handlebar_type:
      name: Tip ghidon
      description: Identifică stilul ghidonului montat pe bicicletă, ceea ce influențează
        postura de mers, controlul și confortul.
    handslide_bore_type:
      name: Tipul de alezaj al handslide-ului
      description: Specifică dacă trombonul bas utilizează un alezaj unic sau alezaj
        dublu.
    handwear_cuff_style:
      name: Stilul manșetei mănușilor
      description: Descrie stilul de construcție a manșetei sau încheieturii mănușilor
        sau mitenelor, care afectează acoperirea și potrivirea.
    handwear_insulation_material:
      name: Material izolator pentru îmbrăcăminte
      description: Identifică materialul izolator sau de căptușeală utilizat în interiorul
        mănușilor sau mitenelor.
    handwear_size:
      name: Mărime pentru mănuși
      description: Specifică dimensiunile mănușilor sau ale altor articole de îmbrăcăminte
        pentru a asigura o potrivire corectă.
    hang_glider_design:
      name: Designul deltaplanului
      description: 'Clasifică stilul structural al deltaplanului (de exemplu: aripă
        flexibilă, aripă rigidă, motorizat).'
    hanger_thread_size:
      name: Dimensiunea filetului umerașului
      description: Indică dimensiunea/standardul filetului utilizat pentru montarea
        suportului (hangerului) pe țăruși de pescuit sau avertizoare de mușcătură,
        asigurând compatibilitatea.
    hanging_suspension_method:
      name: Metoda de suspendare prin agățare
      description: 'Definește sistemul sau echipamentul principal utilizat pentru
        suspendarea leagănului (de exemplu: frânghie, lanț, cadru de suport).'
    hardtop_finish_type:
      name: Tip finisaj hardtop
      description: 'Specifică starea finisajului exterior al hardtopului (de exemplu:
        grunduit sau vopsit), influențând pregătirea pentru montaj și aspectul estetic.'
    hardtop_shell_material:
      name: Materialul carcasei hardtop
      description: Specifică materialul principal al carcasei rigide a hardtopului
        auto (nu materialul textil al husei), cum ar fi fibră de sticlă sau aluminiu.
    hardtop_window_configuration:
      name: Configurația ferestrelor hardtop
      description: Descrie tipul de ferestre incluse cu hardtopul și configurația
        acestora.
    harmonica_comb_material:
      name: Materialul pieptenelui pentru muzicuță
      description: Materialul utilizat pentru corpul (pieptenele) armonicii (camerele
        de aer).
    harmonica_cover_plate_finish:
      name: Finisaj placă acoperire armonică
      description: Specifică finisajul sau acoperirea plăcilor de acoperire pentru
        armonică.
    harmonica_cover_plate_material:
      name: Materialul plăcii de acoperire pentru muzicuță
      description: Materialul folosit pentru plăcile de acoperire exterioare.
    harmonica_finish:
      name: Finisaj pentru armonică
      description: Finisajul suprafeței plăcilor/corpului armonicii.
    harmonica_included_accessories:
      name: Accesorii incluse pentru muzicuță
      description: Indică ce accesorii sunt incluse cu muzicuța.
    harmonica_note_range:
      name: Gama de note a armonicii
      description: Clasificarea gamei instrumentale utilizată în context orchestral
        (de exemplu, bas, bariton, tenor).
    harmonica_reed_plate_material:
      name: Materialul plăcilor cu limbi (reed plates) ale armonicii.
      description: 'Materialul utilizat pentru plăcile cu limbi (reed plates), de
        exemplu: alamă, oțel inoxidabil sau aluminiu.'
    harmonica_system_type:
      name: Sistem/tip de armonică
      description: 'Identifică sistemul sau forma armonicii orchestrale (de exemplu:
        acorduri, bas, bariton, polifonie).'
    harmonica_tuning_system:
      name: Sistem de acordare pentru muzicuță
      description: 'Specifică sistemul de acordaj utilizat de armonică (de exemplu:
        Richter, Solo, acordaj orchestral).'
    harness_shell_type:
      name: Tipul carcasei hamului
      description: Descrie rigiditatea construcției carcasei hamului (de exemplu,
        Softshell, Hardshell, Hybrid).
    harness_style:
      name: Stilul hamului
      description: Definește stilul/designul structural al hamului, de exemplu, talie,
        șezut, piept/vestă, curea tip aripă, pantaloni scurți de surf sau hibrid.
    harness_type:
      name: Tip de ham
      description: Clasifică stilul structural al hamului de cățărat, cum ar fi așezat,
        pentru tot corpul sau pentru piept.
    harp_action_type:
      name: Tip de mecanism pentru harpă
      description: Mecanismul principal utilizat pentru modificarea înălțimii sunetului
        și a alterațiilor la harpă.
    harp_finish:
      name: Finisaj de harpă
      description: Finisajul suprafeței corpului harpei (de exemplu, natural, colorat,
        vopsit, lăcuit).
    harp_included_accessories:
      name: Accesorii incluse pentru harpă
      description: Listează accesoriile incluse cu achiziția harpei cu pedale.
    harvest_method:
      name: Metoda de recoltare
      description: Indică dacă fructele de mare au fost capturate în mediul natural,
        crescute în fermă sau obținute printr-o altă metodă.
    harvest_stage:
      name: Etapa de recoltare
      description: Precizează stadiul de dezvoltare în care a fost recoltată rucola,
        de exemplu microverde, frunze tinere sau ciorchine mature.
    hat_style:
      name: Stil de pălărie
      description: Construcția/stilul pălăriei de petrecere (de exemplu, pălărie conică,
        coroană, joben, vizieră) pentru a reflecta aspectul fundamental al articolului.
    hazard_signal_mode:
      name: Modul de semnalizare a pericolului
      description: Modele/Mode de iluminare selectabile pentru semnalizatoare rutiere
        LED/electronice.
    head_configuration:
      name: Configurația capului
      description: Precizează dacă capul toporului este prevăzut cu o lamă, un ciocan,
        ambele sau niciuna, ceea ce influențează în mod direct funcționalitatea pe
        gheață și pe teren mixt.
    head_material:
      name: Materialul capului
      description: Materialul capului de joc livrat cu quinto.
    head_movement_type:
      name: Tipul de mișcare a capului
      description: Capacitatea de mișcare direcțională a capului bipodului sau a tijei
        (de exemplu, rotire, înclinare, basculare).
    head_side:
      name: Partea capului
      description: Precizează dacă membrana tobei este destinată părții de percuție
        (bater), părții rezonante (față) sau ambelor.
    head_weight_style:
      name: Stilul greutății pentru cap
      description: Identifică distribuția greutății la capul mustei, care influențează
        viteza de scufundare și modul de prezentare.
    headband_embellishment:
      name: Înfrumusețare cu bentiță
      description: Identifică elemente decorative atașate bentiței (de exemplu, fundițe,
        perle, cristale, urechi de animale).
    headboard_style:
      name: Stilul tăbliei patului
      description: Descrie stilul de design sau construcție al tăbliei patului furnizată
        cu patul.
    headgear_strap_configuration:
      name: Configurația curelei pentru cască
      description: Indică numărul de curele folosite pentru fixarea coifului de lupte.
    headjoint_crown_style:
      name: Model coroană pentru capul de flaut
      description: Specifică stilul sau designul coroanei capul de flaut (capacul
        de capăt), care poate afecta estetica și greutatea/prețul vândut.
    headjoint_pitch_standard:
      name: Standardul de acordaj al capul de flaut
      description: Indică standardul de acordaj al capului de flaut (headjoint), de
        exemplu A=440 sau A=442.
    headliner_product_form:
      name: Forma produsului pentru plafon auto
      description: Specifică dacă produsul este un ansamblu complet de plafon turnat,
        o husă/material de înlocuire sau o componentă de reparație/finisare.
    headrest_mount_attachment_method:
      name: Metoda de fixare a suportului pentru tetieră
      description: Specifică modul în care se atașează suportul la tetieră/tijele
        scaunului.
    headrest_provision:
      name: Tetieră
      description: Indică dacă sunt incluse tetiere și/sau dacă sunt prezente puncte
        de montare a tetierelor.
    headset_standard:
      name: Standardul căștilor
      description: Tipul de interfață head-tube/căști utilizată de cadru.
    headstall_style:
      name: Stilul căpăstrului
      description: Clasifică designul structural sau configurația urechi/sprâncene
        a căpăstrului.
    headwear_intended_use:
      name: Utilizarea preconizată a accesoriilor pentru cap
      description: Indică scopul principal sau context purtării turbanului (de exemplu,
        chimioterapie, căderea părului, înot, practici religioase).
    hearing_enhancer_style:
      name: Stilul amplificatorului auditiv
      description: Descrie forma constructivă a dispozitivului, astfel încât utilizatorii
        să poată alege între modele supraauriculare, intraauriculare, retroauriculare
        și alte modele.
    heart_rate_monitoring_method:
      name: Metoda de monitorizare a ritmului cardiac
      description: Identifică modul în care aparatul înregistrează datele privind
        ritmul cardiac în timpul antrenamentelor.
    heart_rate_sensing_technology:
      name: Tehnologie de detectare a ritmului cardiac
      description: Specifică metoda de măsurare fiziologică utilizată de monitor pentru
        detectarea ritmului cardiac (de exemplu, ECG electric vs. PPG optic).
    heart_rate_sensor_placement:
      name: Senzor de ritm cardiac poziționare
      description: Indică locul în care este purtat sau poziționat senzorul (pe corp
        sau pe bicicletă), afectând confortul și precizia măsurării.
    heat_retention_technology:
      name: Tehnologie de retenție a căldurii
      description: Descrie orice tehnologie, acoperire sau material care îmbunătățește
        transpirația sau activitatea termică pentru lenjeriei modelatoare axate pe
        antrenament (de exemplu, efectul de saună din neopren).
    heated_glass_feature:
      name: Funcție de sticlă încălzită
      description: Indică dacă sticla geamului include elemente electrice integrate,
        cum ar fi o grilă de dezghețare posteriaoră și/sau o antenă integrată în geam.
    heater_control_actuation_method:
      name: Metoda de acționare a comenzii încălzitorului
      description: Specifică modul în care sistemul de încălzire/HVAC acționează cutia
        HVAC a vehiculului (de exemplu, acționată prin cablu, acționată prin vacuum
        sau prin semnalizare electronică).
    heater_control_electrical_connector_type:
      name: Tip conector electric pentru controlul încălzitorului
      description: Specifică stilul/interfața conectorului electric utilizată de ansamblul
        de control al încălzitorului (de exemplu, tip pigtail vs. tip ștecher).
    heating_technology:
      name: Tehnologie de încălzire
      description: Identifică mecanismul principal de încălzire utilizat de vaporizator
        pentru a converti materialul în vapori.
    heel_shape:
      name: Forme de pantofi cu toc
      description: Specifică stilul geometric sau silueta tocului în sine, ajutând
        cumpărătorul să filtreze în funcție de aspectul structural și preferințe de
        stabilitate (de exemplu, stiletto vs. bloc).
    helicopter_mission_type:
      name: Tipul misiunii elicopter
      description: Utilizarea/rolul principal prevăzut al elicopterului.
    helicopter_rotor_configuration:
      name: Configurația rotorului elicopterului
      description: Specifică aspectul sistemului rotorului elicopterului (aranjamentul
        rotorului principal/rotorului de coadă), cum ar fi un rotor principal simplu
        + rotor de coadă, coaxial, tandem sau angrenare.
    helmet_accessory_type:
      name: Tipul de accesoriu pentru cască
      description: Identifică tipul specific de piesă sau accesoriu pentru casca de
        bicicletă, astfel încât cumpărătorul să poată localiza imediat articolul potrivit.
    helmet_audio_connector_type:
      name: Tip conector audio pentru cască
      description: Specifică tipul de conector audio al aeronavei utilizat de potențialul
        client de comunicații al căștii, dacă este prezent.
    helmet_communication_system_readiness:
      name: Pregătire sistem de comunicare cu cască
      description: Dacă casca este proiectată să accepte un sistem de comunicare interfon/Bluetooth.
    helmet_construction_type:
      name: Tipul de construcție al căștii
      description: Descrie stilul de construcție al carcasei și căptușelii căștii
        (de exemplu, spumă, carcasă rigidă, hibridă).
    helmet_fit_head_shape:
      name: Compatibilitatea căștii cu forma capului (forma capului)
      description: Profilul intern de potrivire este destinat diferitelor forme ale
        capului.
    helmet_interior_liner_type:
      name: Tipul de căptușeală interioară a căștii
      description: Tipul de căptușeală de confort și dacă aceasta este detașabilă/lavabilă.
    helmet_liner_material:
      name: Materialul căptușelii căștii
      description: Specifică materialul căptușelii sau al stratului interior care
        oferă confort și absorbția impactului.
    helmet_retention_closure_type:
      name: Tipul sistemului de închidere și fixare al căștii
      description: Specifică mecanismul de închidere/fixare al curelei de bărbie a
        căștii (de ex., inel dublu D, cataramă micrometrică).
    helmet_safety_certification:
      name: Certificare de siguranță pentru cască
      description: Enumeră standardele de siguranță sau certificările pe care le respectă
        casca.
    helmet_safety_certification_standard:
      name: Standardul de certificare de siguranță al căștii
      description: Standardele de siguranță/omologare pe care casca de motocicletă
        este certificată să le îndeplinească.
    helmet_shell_material:
      name: Materialul carcasei căștii
      description: Materialul principal al carcasei exterioare sau construcția utilizată
        pentru cască.
    helmet_size_system:
      name: Sistem de dimensiuni al căștii
      description: Schema de dimensionare utilizată pentru a exprima dimensiunile
        căștii.
    helmet_sun_visor_type:
      name: Tipul de vizieră solară pentru cască
      description: Specifică dacă casca include un vizor solar intern retractabil,
        o vizieră externă fumurie, ambele sau niciunul dintre acestea
    helmet_vehicle_fit:
      name: Potrivirea căștii în vehicul
      description: Tipul de vehicul/utilizare pentru care este destinată casca.
    helmet_ventilation_adjustability:
      name: Reglarea ventilației căștii
      description: Specifică modul în care ventilația căștii poate fi controlată de
        către ciclist.
    helmet_ventilation_configuration:
      name: Configurația de ventilație a căștii
      description: Descrie aspectul ventilației și ajustabilitatea căștii (de exemplu,
        orificii de ventilație pentru bărbie, orificii de admisie/la nivelul frunții,
        orificii de ventilație care se pot închide).
    helmet_visor_peak_adjustability:
      name: Reglarea vizierei/cozocului căștii
      description: Dacă vizorul/viziera off-road a căștii este reglabilă și/sau detașabilă.
    helmet_visor_shield_optical_features:
      name: Caracteristici optice ale vizierei (ecranului) căștii
      description: Caracteristici optice și de compatibilitate ale vizierei principale.
    helmet_visor_shield_type:
      name: Tipul de vizieră pentru cască
      description: Configurația principală a vizierei este inclusă cu casca.
    hem_style:
      name: Stilul tivului
      description: Identifică stilul de finisare al deschiderii piciorului (manșetei),
        cum ar fi finisaj curat, rulat sau tăiat nefinit, care influențează semnificativ
        aspectul articolului vestimentar
    hemisphere_compatibility:
      name: Compatibilitatea emisferelor
      description: Specifică emisfera pentru care este proiectată harta stelară, pe
        baza constelațiilor vizibile.
    hemline_style:
      name: Stilul tivului
      description: Definește croiala sau designul marginii de jos a rochiei.
    herbal_infusion_function:
      name: Funcție de infuzare a plantelor
      description: Indică principalul beneficiu pentru bunăstare sau funcțional pentru
        care este folosită infuzia.
    hex_size:
      name: Dimensiune hexagonală
      description: Dimensiunea cheii hexagonale necesară pentru instalarea/demontarea
        bujiei incandescente.
    hi_hat_pair_type:
      name: Tipul setului de hi-hat
      description: Indică dacă oferta este pentru o pereche potrivită (top și bottom)
        sau pentru un singur element de chimval.
    hi_hat_sound_character:
      name: Caracterul sunetului de fus-cinel
      description: Descrie profilul tonal general pentru a ajuta cumpărătorul să filtreze
        în funcție de sunetul dorit.
    high_visibility_class:
      name: Clasă de înaltă vizibilitate
      description: Specifică nivelul de clasificare a vizibilității ANSI/ISEA 107
        al articolului de îmbrăcăminte.
    highback_style:
      name: Stil cu spătar înalt
      description: Descrie stilul/designul structural al spătarului înalt care influențează
        caracteristicile călătoriei.
    hitch_ball_diameter:
      name: Diametrul bilei de remorcare
      description: Diametrul sferei (capului sferic) de cuplare care se conectează
        cu cupla remorcii (de exemplu, 1 7/8 in, 2 in, 2 5/16 in, 50 mm).
    hitch_ball_mounting_style:
      name: Stil de montare cu bilă de remorcare
      description: Indiferent dacă bila de cuplare este o bilă standard montată cu
        piuliță, un model fix/presat pentru anumite capete de cuplare sau include
        hardware integrat.
    hobby_horse_handle_type:
      name: Tipul mânerului jucăriei hobby horse
      description: Specifică construcția mânerului utilizată pentru a ține sau a conduce
        jucăria hobby horse.
    hobby_horse_sound_features:
      name: Caracteristici sonore pentru jucăria calul de hobby
      description: Indică dacă jocul include efecte sonore și de ce fel.
    hockey_goal_type:
      name: Tipul de poartă de hochei
      description: Specifică stilul sau utilizarea preconizată a porții de hochei
        (de exemplu, gheață regulamentară, stradă, Shop Mini).
    hockey_size_category:
      name: Categorie de mărime pentru hochei
      description: Indică segmentul de dimensiune standardizat al echipamentului la
        care se potrivește piesa (Tineret, Junior, Intermediar, Senior).
    hockey_size_segment:
      name: Segmentul dimensional al hocheiului
      description: Specifică segmentul de dimensiuni standardizate al echipamentului
        de hochei care determină dimensiunile și potrivirea generală a plăcuței.
    hold_surface_texture:
      name: Textură a suprafeței prizei
      description: Descrie gradul de rugozitate sau finisajul tactil al suprafeței
        de prindere a mânerului.
    home_decor_sewing_pattern_project_type:
      name: Tip de proiect de model de cusut pentru decorațiuni interioare
      description: Identifică tipul de articol decorativ pentru casă realizat prin
        modelul de cusut (de exemplu, față de pernă, perdea, șervețel de masă).
    homologation_rule_set:
      name: Omologare/set de reguli
      description: Specifică organismul de sancționare sau setul de reguli cu care
        se conformează mașina (unde este cazul).
    honey_form:
      name: Formă mierii
      description: Specifică forma fizică sau prezentarea produsului de miere.
    honey_processing_method:
      name: Metodă de procesare a mierii
      description: Indică modul în care mierea a fost tratată sau procesată înainte
        de ambalaj.
    honey_variety:
      name: Varietate de miere
      description: Identifică sursa botanică sau florală a mierii, fie ea monoflorală
        sau polifloră — care afectează direct aroma, culoarea și prețul.
    hood_configuration:
      name: Configurația glugii
      description: Descrie designul hotei și caracteristicile de reglare.
    hood_design:
      name: Designul glugii
      description: Identifică prezența și stilul glugii pe articolul de îmbrăcăminte.
    hood_style:
      name: Stil de glugă
      description: Indică prezența și stilul unei glugi pe haină.
    hood_type:
      name: Tipul hotei
      description: Indică caracteristici speciale de design ale porțiunii glugii a
        articolului de îmbrăcăminte.
    hook_and_eye_size_hook_number:
      name: Dimensiunea cârligului și a ochiului (numărul cârligului)
      description: Dimensionarea/numerotarea standardizată a cârligelor și ochiurilor
        (unde este cazul) utilizată pe ambalaj pentru a indica dimensiunile generale
        ale cârligelor/ochilor.
    hook_and_loop_fastener_duty_rating:
      name: Gradul de rezistență al sistemului de prindere cu arici
      description: Indică nivelul de rezistență/solicitare pentru care este destinat
        sistemul de prindere cu arici
    hook_and_loop_fastener_format:
      name: Formatul sistemului de fixare cu arici
      description: Specifică forma fizică sau formatul ambalaj al produsului de fixare
        cu arici (de exemplu, rolă/bandă, puncte, benzi).
    hook_and_loop_fastener_side:
      name: Partea sistemului de prindere cu velcro
      description: Specifică dacă produsul include doar partea cu cârligul, doar partea
        cu bucla sau un set care conține ambele părți.
    hook_coating_finish:
      name: Finisaj/înveliș al cârligului
      description: Tratamentul de suprafață sau placarea aplicată cârligului pentru
        rezistență la coroziune, aspect discret sau culoare (de ex., nichel negru,
        staniu lucios)
    hook_configuration:
      name: Configurația cârligului
      description: Descrie prezența și tipul cârligelor furnizate împreună cu momelile.
    hook_eye_style:
      name: Stil al ochetului cârligului
      description: Specifică forma sau orientarea inelului cârligului, care influențează
        modul de legare sau atașare a acestuia.
    hook_eye_type:
      name: Tip de ochet de cârlig
      description: Specifică designul inelului cârligului, care influențează alegerea
        nodului și montajul.
    hook_loop_format:
      name: Format cu cârlig și buclă
      description: Specifică factorul de formă fizic al elementului de fixare cu arici
        și buclă, care se poate coase.
    hook_loop_side:
      name: Partea sistemului cu velcro
      description: Specifică dacă produsul este partea cu cârlig, partea cu buclă
        sau un set de cârlige și buclă potrivit.
    hook_material:
      name: Materialul cârligului
      description: Identifică materialul utilizat special pentru cârligul/capul de
        undă, un factor cheie pentru rezistență și rezistență la coroziune în utilizarea
        în apă sărată.
    hook_organizer_style:
      name: Organizator tip cârlig
      description: Stilul fizic sau factorul de formă al organizatorului cu cârlige
        (de exemplu, drăguț, rolă sau pungă), utilizat pentru a ajuta la răsfoirea
        și filtrarea după tipul de organizator.
    hook_point_configuration:
      name: Configurația vârfului cârligului
      description: Precizează dacă cârligul are două vârfuri (dublu) sau trei vârfuri
        (triplu).
    hook_point_type:
      name: Tipul punctului de cârlig
      description: Descrie tipul de ascuțire sau forma vârfului cârligului de pescuit,
        care influențează penetrarea și capacitatea de fixare.
    hook_shank_length:
      name: Lungimea tijei cârligului
      description: Indică clasificarea lungimii relative a tijei cârligului (de exemplu,
        scurtă, lungă) pentru o comparație vizuală și funcțională rapidă.
    hooks_eyes_attachment_method:
      name: Metoda de atașare cu cârlige și ochiuri
      description: Modul în care cârligele și inelele sunt fixate pe articolul vestimentar.
    hop_up_type:
      name: Tip hop-up
      description: Definește sistemul hop-up utilizat pentru a imprima rotație inversă
        BB-urilor, pentru a crește distanța și precizia.
    horse_blanket_type:
      name: Tip de pătură pentru cal
      description: Specifică stilul principal sau utilizarea preconizată a păturii
        sau cearșafului pentru cal.
    horse_brush_type:
      name: Tip de țesală
      description: Clasifică peria după stilul specific de îngrijire sau scopul propus,
        permițând clientului să filtreze fără a fragmenta ierarhia categoriilor.
    horse_care_purpose:
      name: Scopul îngrijirii cailor
      description: Scopul funcțional principal al produsului în îngrijirea cailor,
        acoperind nevoile de sănătate, îngrijire și management.
    horse_feed_stage:
      name: Etapa de hrănire a cailor
      description: Indică etapa de viață a calului sau starea fiziologică pentru care
        este formulată hrana.
    horse_groomer_type:
      name: Tip de îngrijitor de cai
      description: Clasifică tipul de aparat de îngrijire (groomer), astfel încât
        utilizatorii să poată identifica rapid unealta specifică de care au nevoie.
    horse_leg_protection_type:
      name: Tip de protecție pentru picioarele de cal
      description: Clasifică tipul sau funcția specifică a cizmei, bandajului sau
        înfășurătorii pentru cai.
    horse_model_breed:
      name: Rasa modelului de cai
      description: Specifică rasa de cal reprezentată de modelul scală (dacă este
        cazul).
    hosiery_toe_style:
      name: Tipul de finisare al vârfului ciorapului
      description: Definește construcția zonei vârfului ciorapilor, importantă pentru
        durabilitate și compatibilitate cu încălțămintea cu vârful deschis.
    hot_air_balloon_basket_type:
      name: Tip coș cu balon cu aer cald
      description: Specifică configurația/stilul principal al coșului (de exemplu,
        sport standard, comercial de mare capacitate, compartimentat, accesibil/cu
        ușă) utilizat pentru îmbarcare și operarea preconizată.
    hot_air_balloon_burner_type:
      name: Tipul de arzător al balonului cu aer cald
      description: Tipul/configurația sistemului de ardere instalat pe balon.
    hot_air_balloon_envelope_material:
      name: Materialul învelișului balonului cu aer cald
      description: Materialul principal al țesăturii utilizate pentru învelișul (canopy-ul)
        balonului.
    hotfix_application_tool:
      name: Instrument de aplicare Hotfix
      description: Instrumentul sau sursa de căldură recomandată pentru aplicarea
        strasurilor hotfix.
    hub_axle_type:
      name: Tipul axului butucului
      description: Identifică tipul de interfață/sistem de fixare al axului pentru
        care este proiectat butucul (de ex., quick-release, thru-axle etc.)
    hub_motor_type:
      name: Tipul motorului integrat în butuc
      description: Descrie tipul constructiv al motorului din butuc (cu reductor,
        cu acționare directă, cu perii sau fără perii), oferind informații despre
        cuplu, greutate și eficiență.
    hula_hoop_construction_type:
      name: Tipul de construcție al cercurilor hula
      description: Descrie modul în care este construit/asamblat cercul.
    hula_hoop_features:
      name: Caracteristicile cercului hula
      description: Evidențiază caracteristici funcționale sau de design notabile ale
        cercului de hula hoop.
    hull_design:
      name: Designul corpului
      description: Descrie forma carenei, care influențează performanța și caracteristicile
        de manevrare.
    hull_type:
      name: Tipul corpului
      description: Descrie forma carenei care influențează performanța și stabilitatea.
    humidifier_refill_medium_type:
      name: Reumplere umidificator tip mediu
      description: Identifică mediul de reținere/reumplere utilizat de umidificatorul
        cutie (ce se udă sau se înlocuiește).
    humidifier_refill_method:
      name: Metoda de reumplere a umidificatorului
      description: Descrie modul în care umidificatorul este reîncărcat cu umiditate
        sau înlocuit.
    humidifying_medium:
      name: Mediu de umidificare
      description: Identifică elementul/mediul de umidificare utilizat de produs (ce
        se udă/se activează).
    hummus_base_ingredient:
      name: Ingredientul de bază pentru humus
      description: Identifică principala leguminoasă sau baza de legume utilizată
        pentru prepararea hummusului.
    hunting_call_type:
      name: Tipul de apel de vânătoare
      description: Clasifică stilul principal de operare sau mecanismul de chemare
        (de exemplu, suflat cu gură, electronic, cu cutie), astfel încât vânătorii
        să poată alege rapid formatul care se potrivește cel mai bine nevoilor și
        nivelului lor de aptitudini.
    hunting_dog_collar_function:
      name: Funcția zgărzii pentru câine de vânătoare
      description: Clasifică stilul funcțional sau scopul principal al zgărzii, ajutând
        utilizatorii să filtreze produsele în funcție de utilizare, cum ar fi urmărire,
        dresaj, vizibilitate sau utilizare standard.
    hvac_control_functions:
      name: Funcții de control HVAC
      description: Indică funcțiile HVAC/dezaburire/flux de aer controlate de unitate
        (mecanic sau electronic).
    hybrid_drivetrain_configuration:
      name: Configurația sistemului de propulsie hibrid
      description: Indică arhitectura sistemului PHEV care descrie modul în care motorul
        (motoarele) electric(e) și motorul cu ardere internă asigură propulsia.
    hybrid_system_type:
      name: Tipul de sistem hibrid
      description: Clasifică arhitectura de hibridizare utilizată de vehicul.
    hybrid_truck_cab_type:
      name: Tipul de cabină al camionului hibrid
      description: Specifică configurația cabinei camionului, care afectează capacitatea
        locurilor și spațiul interior.
    hydration_bag_features:
      name: Caracteristicile sacului de hidratare
      description: Highlight caracteristicile notabile de design sau funcționale specifice
        genților de hidratare.
    hydration_belt_features:
      name: Caracteristicile centurii de hidratare
      description: Listează funcționalitățile notabile încorporate care îmbunătățesc
        utilizabilitatea, siguranța sau confortul centurii de hidratare.
    hydration_bladder_compatibility:
      name: Compatibilitatea pungii de hidratare
      description: Indică dacă vesta include sau asistă un sistem de pungă de hidratare.
    hydration_mouthpiece_style:
      name: Stilul piesei bucale de hidratare
      description: Specifică designul sau stilul funcțional al unui muștiuc sau al
        unei valve pentru un sistem de hidratare, ajutând cumpărătorul să aleagă interfața
        de băut preferată și să asigure compatibilitatea.
    hydration_pack_style:
      name: Model de pachet de hidratare
      description: Specifică stilul structural al pachetului de hidratare, cum ar
        fi un rucsac sau o vestă, pentru a facilita potrivirea și filtrarea în funcție
        de utilizare.
    hydration_system_insulation:
      name: Izolația sistemului de hidratare
      description: Indică dacă rezervorul și/sau tubul de adăpare sunt izolate pentru
        a ajuta la menținerea temperaturii lichidului în condiții calde sau reci.
    hydration_valve_type:
      name: Tipul de valvă de hidratare
      description: Identifică tipul supapei de băut sau al muștiucului furnizat cu
        sistemul sau sticla, incluzând designuri uzuale cu supapă de mușcare și duze
        cu debit ridicat.
    hydraulic_fluid_type:
      name: Tipul de fluid hidraulic
      description: Specifică tipul de lichid de frână pe care este proiectată să îl
        utilizeze o manetă de frână hidraulică pentru bicicletă. Aceste informații
        sunt esențiale pentru întreținere și siguranță.
    hydrogenation_level:
      name: Nivelul de hidrogenare
      description: Indică dacă grăsimea este nehidrogenată, parțial hidrogenată sau
        complet hidrogenată, ceea ce influențează conținutul de grăsimi trans și performanța
        la coacere
    hydrophobicity_level:
      name: Nivelul de hidrofobicitate
      description: Indică nivelul performanței de respingere a apei (formarea picăturilor
        sau scurgerea în peliculă) promovat de produs
    ice_cream_format:
      name: Formatul înghețatei
      description: Descrie forma fizică sau prezentarea produsului de înghețată (de
        exemplu, halbă, baton, mochi).
    ice_skate_sharpener_type:
      name: Tipul de ascuțitor pentru patine de gheață
      description: Clasifică designul sau formatul general al ascuțitorului (piatră
        portabilă, mașină electrică, dispozitiv de ascuțit etc.).
    ice_temperature_suitability:
      name: Temperatura de gheață adecvată
      description: Indică intervalul de temperatură al gheții pentru care este formulată
        ceara pentru crosele de hochei, influențând performanța și proprietățile de
        respingere a zăpezii.
    icing_sugar_variety:
      name: Varietate de zahăr pudră
      description: Clasifică formula sau tipul funcțional de zahăr pudră (de exemplu,
        fondant, pudră de zăpadă care nu se topește, colorat, aromatizat).
    ignition_coil_configuration:
      name: Configurația bobinei de aprindere
      description: Specifică tipul constructiv al bobinei de aprindere (bobină simplă
        / coil-on-plug, pachet de bobine cu mai multe ieșiri în funcție de numărul
        cilindrilor, rampă/casetă de bobine sau tip distribuitor)
    ignition_lead_compliance_standard:
      name: Standardul de conformitate pentru cablurile de aprindere
      description: Standardul oficial din domeniu sau certificarea pe care o îndeplinesc
        cablurile de aprindere, conform declarațiilor producătorului (de exemplu,
        SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Material de izolare pentru cablurile de aprindere
      description: Materialul de izolație primară/înveliș utilizat la cablul de aprindere
        (izolația exterioară a cablului).
    ignition_lead_set_type:
      name: Tip set de potențial cablului de aprindere
      description: Indiferent dacă produsul este un singur cablu de aprindere sau
        un set complet, precum și scopul pentru care este destinat setul.
    ignition_lead_terminal_type:
      name: Tipul bornei cablului de aprindere
      description: Tipul de bornă/conector utilizat la capetele cablului de aprindere
        (de exemplu, tipul bornei bujiei și al bobinei/distribuitorului).
    illumination_type:
      name: Tip de iluminare
      description: Precizează dacă și cum este iluminată mingea pentru jocul pe timp
        de noapte (de exemplu, strălucire fosforescentă, LED activat la impact).
    immobilizer_installation_type:
      name: Tipul de instalare al imobilizatorului
      description: Indică modul în care imobilizatorul este instalat sau conectat
        la vehicul.
    immobilizer_unlock_method:
      name: Metoda de deblocare a imobilizatorului
      description: Specifică modul în care imobilizatorul este armat/dezarmat sau
        deblocat.
    impact_protection_certifications:
      name: Certificări privind protecția împotriva impactului
      description: Numește standardul (standardele) specific(e) de siguranță pe care
        le îndeplinește sau le depășește tamponul de protecție.
    impact_protection_level:
      name: Nivelul de protecție la impact
      description: Precizează nivelul de protecție împotriva loviturilor sau tehnologia
        oferită de protecția genitală pentru sportivi.
    impact_protection_rating:
      name: Clasa de protecție împotriva impactului
      description: Precizează nivelul certificat de protecție împotriva impacturilor
        în conformitate cu standardele (de exemplu, EN 1621-1 Nivelul 1, EN 14120
        Nivelul 2), ajutând utilizatorii să selecteze produse cu un nivel mai ridicat
        de protecție.
    impact_surface_material:
      name: Materialul suprafeței de impact
      description: Descrie materialul principal al suprafeței de impact/contact, din
        motive de siguranță și confort (de exemplu, spumă, plastic).
    incense_base_material:
      name: Materialul de bază pentru tămâie
      description: Baza principală/materialul de liant folosit pentru a face tămâia
        (bază de pudră) din kit.
    incense_making_method:
      name: Metoda de fabricare a tămâiei
      description: Procesul de asamblare prevăzut, pentru care este conceput kitul.
    incense_tool_type:
      name: Tipul de instrument pentru tămâie
      description: Precizează ce tip de instrument pentru fabricarea tămâiei este
        acest produs (utilizat pentru modelare, măsurare, presare, amestecare sau
        uscare).
    incline_adjustment_type:
      name: Tip de ajustare a înclinării
      description: Descrie cum (sau dacă) se poate modifica înclinația în timpul antrenamentelor.
    included_accessories:
      name: Accesorii incluse
      description: Listele includeau accesorii precum capete/biți de schimb, cutie
        de depozitare, cablu de încărcare sau adaptor de curent alternativ.
    included_case_type:
      name: Tip de husă inclusă
      description: Tipul de element de transport/depozitare inclus odată cu saxofonul
        bas (dacă există).
    included_components:
      name: Componente incluse
      description: Listează ce este inclus în pachet (util pentru seturi de unelte
        și pachete).
    included_fastener_components:
      name: Componente de fixare incluse
      description: Specifică dacă produsul este un set cu cârlige și ochiuri, doar
        cârlige, doar ochiuri sau o variantă de închidere a articolului de îmbrăcăminte
        similară.
    included_hydration_vessel_type:
      name: Tipul vasului de hidratare inclus
      description: Identifică tipul recipientului pentru apă furnizat sau compatibil
        cu centura.
    included_items_woodwind_instrument:
      name: Articol inclus (instrument de suflat)
      description: Lista articolelor incluse de obicei în pachetul pentru saxofon
        bas.
    included_materials:
      name: Materiale incluse
      description: Indică ce componente sunt incluse în achiziția tiparului (doar
        tipar vs tipar + materiale).
    included_mounting_accessories:
      name: Accesorii de montare incluse
      description: Listează accesoriile de montare/atașare incluse cu difuzorul.
    included_pump_type:
      name: Tipul de pompă inclus
      description: Identifică tipul de pompă. Supply sau integrată cu salteaua gonflabilă.
    included_scraper_implement_type:
      name: Tip de unelte de răzuire incluse
      description: Indică ce instrument(e) de cântat sunt incluse odată cu răzuitorul
        muzical (de exemplu, băț/tijă răzuitoare, perie de sârmă).
    indicator_design:
      name: Proiectarea indicatorilor
      description: Clasifică forma fizică sau stilul indicatorului de mușcătură pentru
        pescuit.
    indicator_functions_tracked:
      name: Functions ale indicatorilor urmărite
      description: Listează metricile specifice ale jocului pe care indicatorul le
        urmărește, cum ar fi mingi, strike-uri, eliminări, reprize (innings), numărul
        de aruncări, over-uri, wicket-uri, scor sau down-uri.
    indoor_outdoor_use:
      name: Utilizare în interior/exterior
      description: Indică dacă jucăria de bowling este destinată utilizării în interior,
        în exterior sau ambele.
    inflatable_decoration_items_included:
      name: Articol decorativ gonflabil inclus
      description: Listează accesoriile principale incluse cu decorațiunea gonflabilă
        (de exemplu, ventilator, țăruși, frânghii de ancorare).
    inflatable_decoration_type:
      name: Tip de decorațiuni gonflabile
      description: Specifică tipul de decorațiuni gonflabile pentru petrecere (Shapes/factor
        de formă) pentru a asista navigarea și filtrarea.
    inflatable_raft_float_features:
      name: Caracteristici ale plutei/saltelei gonflabile
      description: Caracteristici funcționale prezente pe pluta/salteaua gonflabilă
    inflation_method_included:
      name: Metoda de umflare inclusă
      description: Specifică tipul de soluție de umflare a anvelopelor inclusă în
        kit de reparații, dacă există.
    infused_scent:
      name: Parfum infuzat
      description: Identifică aditivii de parfum sau aromă impregnați în materialul
        momeală.
    ingredient_base_type:
      name: Tipul de bază al ingredientului
      description: Identifică baza principală utilizată pentru fermentație (de exemplu,
        concentrat de suc de struguri vs. suc Fresh vs. concentrat de fructe).
    ingredient_physical_form:
      name: Forma fizică a ingredientului
      description: Specifică forma fizică în care este furnizată ingredientul de parfum
        (utilizată pentru manipulare, dozare și formulare).
    ingredient_processing_method:
      name: Metodă de procesare a ingredientelor
      description: Specifică tehnica principală de procesare aplicată ingredientului
        (de exemplu, liofilizat, prăjit, fermentat).
    ink_colors_included:
      name: Culori de cerneală incluse
      description: Precizează culorile de cerneală incluse în tamponul (tampoanele)
        de ștampilă din set.
    ink_pad_application_method:
      name: Metoda de aplicare a tamponului de cerneală
      description: Modul în care cerneala este eliberată/utilizată din tampon (tampon
        tradițional pentru ștampile vs. aplicator cu vârf rotund vs. tampon cu vârf
        de pensulă).
    ink_pad_permanence:
      name: Persistență a tușierei
      description: Dacă cerneala ștampilată este permanentă și/sau rezistentă la arhivă
        (rezistență la decolorare și apă după uscare).
    ink_pad_size:
      name: Dimensiunea tamponului de cerneală
      description: Dimensiuni/factor de formă standardizate ale suprafeței/carcasei
        tamponului de cerneală.
    ink_pad_special_effects:
      name: Efecte speciale cu tampon de cerneală
      description: Efecte vizuale/funcționale speciale ale cernelii la ștanțare (de
        exemplu, metalice, cu sclipici).
    ink_permanence:
      name: Permanența cernelii
      description: Indică dacă cerneala sumi uscată este destinată a fi permanentă/arhivistică
        vs. lavabilă/nepermanentă.
    ink_preparation_required:
      name: Pregătirea cernelii este necesară
      description: Indică dacă cerneala sumi este gata de utilizare sau necesită diluare
        cu apă sau măcinare înainte de utilizare.
    inline_skate_brake_type:
      name: Tipul frânei la rolele în linie
      description: Specifică configurația frânelor inclusă la patinele inline, cum
        ar fi o frână de călcâi detașabilă sau fără frână.
    inner_tent_configuration:
      name: Configurația cortului interior
      description: Specifică configurația sau stilul cortului interior, de exemplu,
        inserție completă, inserție de plasă sau căptușeală termică.
    innerspring_coil_type:
      name: Tipul de arc interior cu spirală
      description: Precizează tipul de construcție al sistemului de arcuri din interiorul
        saltelei, care influențează nivelul de susținere, izolarea mișcărilor și prețul.
    input_connector_type:
      name: Tip de conector de intrare
      description: Specifică tipul de conector de intrare audio utilizat de pedală
        (de obicei jack TS de 1/4 inch).
    input_valve_type:
      name: Tipul supapei de intrare
      description: Indică standardul supapei prezente pe camera/roata de bicicletă
        la care se conectează adaptorul FROM.
    insecticide_treatment:
      name: Tratament insecticid
      description: Indică dacă plasa a fost tratată în fabrică cu insecticid și, dacă
        da, tipul de tratament utilizat pentru protecție suplimentară.
    insert_coverage_area:
      name: Introduceți zona de acoperire
      description: Specifică ce parte a piciorului este concepută să acopere inserția
        (de exemplu, pe toată lungimea, doar la călcâi).
    insert_length_type:
      name: Tip de lungime a inserției
      description: Indică câtă parte din talpă interioară acoperă bolta plantară.
    inside_message_type:
      name: Tipul mesajului intern
      description: Indică dacă felicitarea conține un mesaj pretipărit pe interior
        și dacă acesta este personalizabil.
    insole_attachment_method:
      name: Metodă de fixare a branțului
      description: Specifică modul în care susținerea boltei plantare este fixată
        în interiorul pantofului (liberă, cu adeziv, tip scai etc.
    insole_material:
      name: Materialul branțului
      description: Descrie materialul branțului sau al tălpii interioare pe care se
        sprijină piciorul, influențând amortizarea și susținerea.
    installation_fabrication_level:
      name: Nivelul de fabricație al instalației
      description: Indică cantitatea tipică de fabricație personalizată sau modificări
        necesare pentru instalarea kitului.
    installation_location:
      name: Locația de instalare
      description: Specifică punctul tipic de instalare pentru senzorul de presiune
        a uleiului în sistemul de ulei al motorului (de exemplu, orificiul galeriei
        de ulei a blocului, carcasa filtrului, placa sandwich sau montarea la distanță
        a conductei).
    installation_method:
      name: Metodă de instalare
      description: Specifică modul în care covorașul sau dala este fixat(ă) sau instalat(ă)
        pe podea.
    instant_coffee_form:
      name: Forma cafelei instant
      description: Descrie forma fizică în care este furnizată cafeaua instant, influențând
        modul de preparare și durata de păstrare.
    instep_coverage:
      name: Acoperire la nivelul piciorului
      description: Specifică dacă produsul protejează doar tibia sau atât tibia, cât
        și laba piciorului/piciorul.
    instruction_format:
      name: Formatul instrucțiunilor
      description: Formatul instrucțiunilor incluse în kit.
    instrument_cleaning_swab_form_factor:
      name: Factor de formă al bețișorului de curățare a instrumentelor
      description: Specifică tipul fizic al ștergătorului (de ex., material textil
        tip pull-through vs sistem cu tijă/perie), pentru a se potrivi preferințelor
        utilizatorului și constrângerilor instrumentului.
    instrument_dimensions_unit_context:
      name: Contextul unităților de măsură pentru dimensiunile instrumentelor
      description: Clarifică la ce se referă măsurătorile de înălțime/lățime/lungime
        furnizate (de exemplu, lungimea totală a instrumentului, lungimea unui singur
        tub, înălțimea stativului).
    instrument_electronics_type:
      name: Tipul instrumentului electronic
      description: Indică dacă sistemul de preluare/preamplificare al instrumentului
        este activ sau pasiv.
    instrument_key:
      name: Tonalitatea instrumentului
      description: Precizează tonalitatea instrumentului folosită în cataloage (de
        obicei Do sau Fa pentru flautele de dimensiuni mai mari).
    instrument_level:
      name: Nivelul instrumentului
      description: Nivelul țintă al jucătorului pentru oferta de instrumente.
    instrument_part_mounting_method:
      name: Metoda de montare a piesei instrumentului
      description: Specifică modul în care piesa se atașează sau este instalată (de
        exemplu, prin fixare cu cleme vs. prin lipire vs. prin înșurubare).
    instrument_parts_included:
      name: Piese de instrument incluse
      description: Enumeră principalele componente/piese incluse în cutie pentru un
        clarinet în La.
    instrument_playing_technique:
      name: Tehnica de cântat la instrumente
      description: Modul în care este cântat/acționat de obicei instrumentul (de exemplu,
        agitat, lovit, clătinat).
    instrument_size_class:
      name: Clasa dimensională a instrumentului
      description: Dimensiunea generală a instrumentului exprimată ca o clasă prietenoasă
        cu cumpărătorul, mai degrabă decât dimensiunea exactă.
    insulation_fill_material:
      name: Material de umplutură pentru izolație
      description: Identifică materialul principal utilizat pentru izolarea jachetei
        sau vestei.
    integrated_bottom_type:
      name: Tip de bază integrată
      description: Indică dacă articolul de îmbrăcăminte include dosar încorporat,
        pantaloni scurți, leotard sau straturi interioare similare pentru acoperire
        în timpul mișcării.
    integrated_charging_options:
      name: Opțiuni de încărcare integrate
      description: Prezintă interfețele de alimentare sau de încărcare integrate disponibile
        pe noptieră.
    integrated_furniture_function:
      name: Funcție integrate ale mobilierului
      description: Identifică elementele suplimentare de mobilier încorporate incluse
        în patul suspendat sau în cadru (de exemplu, birou, canapea, rafturi).
    integrated_locking:
      name: Blocare integrată
      description: Indică dacă suportul include un sistem de blocare integrat pentru
        fixarea pe vehicul și/sau pentru securizarea bicicletei pe suport.
    integrated_power_options:
      name: Opțiuni de alimentare integrate
      description: Indică tipul de funcții de alimentare sau încărcare integrate pe
        care le oferă oglinda de toaletă (vanity-ul).
    integrated_storage_features:
      name: Funcții de stocare integrate
      description: Identifică funcțiile suplimentare de depozitare sau accesoriile
        incluse de suportul pentru tacuri de biliard, dincolo de sloturile pentru
        tacuri.
    integrated_tool_functions:
      name: Funcții integrate ale instrumentului
      description: Caracteristici suplimentare ale sculelor integrate în manetă (de
        exemplu, cârlig pentru spițe, dispozitiv de îndepărtare a miezului supapei,
        dispozitiv de preluare a talonului).
    intended_board_type:
      name: Tipul de placă dorit
      description: Precizează tipul de placă de kiteboard pentru care a fost concepută
        aripa (de exemplu, twin tip, surf direcțional, hidrofoil).
    intended_consumption:
      name: Consumul preconizat
      description: Precizează modul în care se recomandă consumarea produsului, indicând
        dacă acesta poate fi consumat în siguranță în stare crudă, dacă trebuie copt
        sau dacă este parțial copt.
    intended_craft:
      name: Ambarcațiunea vizată
      description: Contextul principal pentru care a fost conceput ghidajul de fir
    intended_culinary_use:
      name: Utilizare culinară preconizată
      description: Indică principala aplicație culinară a sosului, cum ar fi înmuierea,
        gătitul sau glazurarea.
    intended_handlebar_style:
      name: Stilul ghidonului pentru care este destinat
      description: Descrie tipul de ghidon sau stilul de utilizare pentru care este
        proiectată maneta (de ex., ghidon drept, ghidon de șosea tip drop-bar, aero).
        Acest lucru restrânge rapid compatibilitatea fără a impune subcategorii suplimentare.
    intended_player_role:
      name: Rolul jucătorului pentru care este destinat produsul
      description: Specifică rolul pe teren pentru care este destinat echipamentul
        de protecție (de exemplu, receptor, arbitru).
    intended_playing_surface:
      name: Suprafața de joc prevăzută
      description: Suprafața pentru care este proiectat pucul, mingea sau inelul,
        cum ar fi gheață, asfalt, podele de sală sau gheață sintetică.
    intended_repair_location:
      name: Locația de reparații prevăzută
      description: Zona anvelopei pe care kitul este destinat să o repare.
    intended_seating_position:
      name: Poziția de ședere dorită
      description: Specifică poziția de ședere a vehiculului în care este destinată
        instalarea sau utilizarea centurii de siguranță.
    intended_sewing_application:
      name: Aplicația de cusut prevăzută
      description: Aplicația de cusut pentru care este destinat firul (de ex., cusut
        îmbrăcăminte generală, quilting, tapițerie).
    intended_technique:
      name: Tehnica intenționată
      description: Tehnica principală de împâslire pentru care este concepută plăcuța/covorașul.
    intended_use:
      name: Utilizare preconizată
      description: Context principal de utilizare a instrumentului.
    intended_use_fleece_fabric:
      name: Utilizare prevăzută (țesătură fleece)
      description: Proiectul sau aplicația principală pentru care este comercializat
        materialul fleece.
    intended_user:
      name: Utilizatorul țintă
      description: Indică cine este destinat să utilizeze echipamentul de protecție
        al aeronavei.
    intended_yarn_form:
      name: Forma dorită a firului
      description: Specifică tipul de prezentare a firelor de tricotat pe care îl
        suportă cel mai bine bolul pentru fire.
    interaction_mode:
      name: Modede interacțiune
      description: Metodă principală de interacțiune utilizată pentru declanșarea
        sunetelor sau a activităților.
    interactive_effects:
      name: Efecte interactive
      description: Identifică efectele electronice sau mecanice interactive incluse
        într-un set de joacă pentru bucătărie.
    interfacing_application_area:
      name: Interfațarea zonei de aplicații
      description: Identifică zonele obișnuite de cusut/artizanat pentru care este
        destinată întăritura.
    interfacing_color_family:
      name: Gama de culori pentru interfață
      description: Indică culoarea de bază tipică pentru interfață utilizată sub țesături
        deschise sau închise la culoare.
    interfacing_selling_format:
      name: Format de vânzare de interfață
      description: Descrie formatul de vânzare al interfațării (de exemplu, vândut
        de lungime tăiat continuu, bucăți pre-tăiate, role sau eșantioane).
    interfacing_stiffness_level:
      name: Nivelul de rigiditate al interfeței
      description: Descrie gradul de rigiditate/fermitate asigurat de interfață.
    interior_padding_type:
      name: Tipul de spațiu interior
      description: Tipul de căptușeală interioară sau de sistem de compartimentare
        utilizat în interiorul valizei pentru a proteja și a organiza conținutul.
    interior_stall_configuration:
      name: Configurația cabinei interioare
      description: Specifică aspectul/configurația interioară pentru transportul animalelor
        (orientarea boxei și stilul compartimentului).
    invitation_printing_coverage:
      name: Acoperire tipărire invitații
      description: Ce față/fețe ale invitației sunt imprimate (doar față vs. față-verso).
    iodization:
      name: Iodizare
      description: Indică dacă și în ce măsură a fost adăugat iod în sare.
    iridescence_level:
      name: Nivelul de iridescență
      description: Descrie intensitatea luciului iridescent natural/tratat, tipic
        penelor de păun.
    irish_warpipe_set_configuration:
      name: Configurația setului de cimpoi irlandez
      description: Indică ce configurație este vândută (instrument complet vs. piese/set
        parțial) special pentru țevile de război irlandeze.
    iron_on_applique_application_method:
      name: Mod de aplicare a aplicației termocolante (prin călcare)
      description: Specifică modul în care aplicația termocolantă (prin călcare) este
        destinată să fie aplicată pe materialul suport.
    ironing_center_features:
      name: Caracteristici ale sistemului de călcat
      description: Enumeră caracteristicile specializate ale stațiilor de călcat care
        îmbunătățesc ușurința în utilizare și confortul.
    jacket_breast_style:
      name: Modelul pieptului sacoului
      description: Precizează dacă sacoul este cu un rând de nasturi sau cu două rânduri
        de nasturi.
    jacket_vent_style:
      name: Stilul fantei jachetei
      description: Indică tipul de șliț (deschizătură) de pe partea din spate a sacoului.
    jam_and_jelly_consistency:
      name: Consistența gemului și a jeleului
      description: Descrie textura cremei tartinabile, indicând prezența bucăților
        de fructe sau a semințelor.
    jaw_shape:
      name: Forma fălcii
      description: Geometria fălcilor sau a vârfului (de exemplu, drept, curbat, cu
        vârf lung), care influențează precizia și accesul.
    jerky_form:
      name: Formă sacadată
      description: Descrie forma fizică sau tăierea bucăților de carne uscată (de
        exemplu, fâșii, bețișoare, bucățele mici).
    jersey_style:
      name: Stil de tricou
      description: Specifică factorul de formă al tricoului sau stilul de purtare
        pentru tricouri de fani.
    jew_harp_accessories_included:
      name: Accesorii pentru drâmbă incluse
      description: Enumeră articolele incluse în ambalajul harpei de gură (de exemplu,
        cutie, săculeț, instrucțiuni).
    jew_s_harp_frame_style:
      name: Stilul cadrului harpei de gură
      description: Descrie stilul de construcție al cadrului/corpului harpei de gură,
        care influențează senzația în utilizare, durabilitatea și ergonomia în timpul
        cântatului.
    jew_s_harp_tongue_profile:
      name: Profilul limbii harpei de gură
      description: Descrie profilul/geometria limbii (lamela) harpei de gură, care
        influențează sensibilitatea și timbrul sunetului.
    jewelry_pieces_included:
      name: Piese de bijuterie incluse
      description: Enumeră bijuteriile specifice incluse în set, astfel încât cumpărătorii
        să știe exact ce piese achiziționează.
    jigsaw_puzzle_piece_shape:
      name: Forma pieselor de puzzle (jigsaw)
      description: Descrie forma generală a pieselor și profilul marginilor.
    jockstrap_design_features:
      name: Caracteristicile de design ale jockstrapului
      description: Capturează elementele de design speciale, specifice jockstrapurilor,
        care influențează funcționalitatea sau aspectul estetic.
    juggling_club_construction_type:
      name: Tipul de construcție al măciucilor de jonglerie
      description: Tipul general de construcție al măciucii de jonglerie (de exemplu,
        turnată dintr-o singură piesă sau asamblată din mai multe piese), care poate
        influența durabilitatea, senzația în utilizare și întreținerea.
    juggling_club_core_material:
      name: Materialul de bază al măciucii de jonglerie
      description: Materialul principal din interiorul măciucii de jonglerie (diferit
        de învelișul exterior sau banda adezivă).
    juggling_prop_set_size:
      name: Dimensiuni set recuzită jonglerie
      description: Numărul de obiecte principale incluse în set (de exemplu, set de
        3 mingi, pereche de poi).
    juggling_ring_edge_style:
      name: Stilul marginii inelului de jonglerie
      description: Profilul marginii inelului, care influențează confortul și prinderea.
    juice_form:
      name: Forma sucului
      description: Specifică forma fizică sau stadiul de procesare al produsului (de
        exemplu, lichid cu concentrație unică, concentrat, pulbere).
    juice_processing_method:
      name: Metodă de procesare a sucului
      description: Specifică tehnica principală de procesare aplicată sucului sau
        băuturii, care influențează gustul, retenția nutrienților și durata de valabilitate.
    jump_rope_style:
      name: Stilul coardei de sărit
      description: Clasifică stilul de construcție al frânghiei/cablului (de exemplu,
        cu mărgele, din pânză, cablu de viteză), care afectează puternic utilizarea
        preconizată și performanța.
    kale_variety:
      name: Soi de varză kale
      description: Identifică soiul sau varietatea specifică de kale (de exemplu,
        creț, Lacinato/Dinosaur, Red Russian). Acest lucru ajută cumpărătorul să aleagă
        în funcție de aromă, textură și utilizare culinară.
    kaleidoscope_viewing_type:
      name: Tipul de vizualizare al caleidoscopului
      description: Identifică formatul de vizualizare sau modul de funcționare al
        caleidoscopului (de exemplu, tub clasic cu ocular, teleidoscop bazat pe lentilă,
        cu roată rotativă, proiecție).
    kayak_construction_type:
      name: Tip de construcție a caiacului
      description: Specifică stilul principal de construcție al caiacului, cum ar
        fi carcasă rigidă sau gonflabilă.
    kayak_design_type:
      name: Tipul de design al caiacului
      description: Clasifică intenția principală de design a caiacului (de exemplu,
        surfski, playboat, touring).
    kayak_hull_design:
      name: Designul corpului caiacului
      description: Identifică forma principală a carenei, care influențează caracteristicile
        de manevrare, cum ar fi stabilitatea și manevrabilitatea în condiții de surf.
    kayak_storage_bag_type:
      name: Tip de geantă de depozitare pentru caiac
      description: Identifică stilul sau formatul unei genți de depozitare pentru
        caiac, cum ar fi sac impermeabil sau husă pentru padele.
    kayak_style:
      name: Stil caiac
      description: Specifică stilul principal de design sau utilizare al caiacului
        (de exemplu, recreațional, de tură, gonflabil).
    keel_type:
      name: Tipul chilei (chilă)
      description: Identifică configurația chilei velierului.
    kettlebell_style:
      name: Stilul ganterei kettlebell
      description: Identifică varianta de construcție sau stil a ganterei kettlebell
        (de exemplu, de competiție, reglabil, moale), ajutând cumpărătorii să aleagă
        gantera kettlebell potrivită nevoilor lor de antrenament.
    key_attachment_mechanism:
      name: Mecanismul de atașare a cheii
      description: Specifică feroneria utilizată pentru fixarea cheilor în interiorul
        carcasei, cum ar fi inele, cleme sau șuruburi de prindere.
    key_retention_when_unlocked:
      name: Menținerea cheii atunci când este deblocată
      description: Indică dacă cheia poate fi scoasă din încuietoare atunci când aceasta
        este în poziția deblocată.
    keyboard_amplifier_inputs:
      name: Intrări de amplificator pentru claviatură
      description: Enumeră conexiunile de intrare acceptate de amplificatorul de claviatură
        (de exemplu, intrare TRS 1/4, intrare MIDI, Bluetooth).
    keyboard_amplifier_output_types:
      name: Tipuri de ieșiri pentru amplificatorul de claviatură
      description: Specifică tipurile de conectori de ieșire principali acceptați
        de amplificatorul de tastatură pentru rutarea audio către alte sisteme.
    keyboard_case_handle_type:
      name: Tipul mânerului carcasei pentru claviatură
      description: Sistemul principal de mâner utilizat pentru transportul carcasei
        pentru claviatură (pe lângă curele).
    keyboard_case_interior_padding_type:
      name: Tipul de căptușeală interioară a carcasei pentru claviatură
      description: Tipul principal de amortizare/căptușeală interioară utilizat în
        interiorul carcasei rigide.
    keyboard_case_protection_level:
      name: Nivelul de protecție al carcasei pentru claviatură
      description: Clasa generală de protecție/rigiditate a carcasei rigide, care
        diferențiază între carcasele turnate tip hard-shell și carcasele robuste tip
        flight/ATA.
    keyboard_case_wheel_type:
      name: Tip de roți pentru husa de claviatură
      description: Configurația roților pentru carcasele rigide care includ roți.
    keyboard_pedal_connector_type:
      name: Tip conector pedală claviatură
      description: Specifică tipul de conector/fișă utilizat pentru conectarea pedalei
        de sustain la o claviatură sau pian digital.
    keyboard_power_supply_type:
      name: Tipul de alimentare al claviaturii
      description: Metoda principală de alimentare a claviaturii (baterii, adaptor
        c.a., alimentare prin USB).
    keyboard_stand_tier_type:
      name: Tipul de nivel (etaj) al stativului pentru claviatură
      description: Indică dacă suportul este vândut doar ca suport de bază sau include/adaugă
        un accesoriu de nivel secundar.
    keyboard_stand_tiers:
      name: Număr de niveluri pentru suportul de claviatură
      description: Numărul de niveluri de susținere pentru cântat pe stativul tip
        Z (de exemplu, cu un singur nivel sau cu două niveluri).
    keychain_attachment_type:
      name: Tip de atașare pentru breloc
      description: Specifică tipul principal de sistem de prindere utilizat pentru
        a fixa brelocul de chei, genți sau curele.
    keychain_style:
      name: Stil breloc
      description: Descrie factorul de formă general al articolului breloc (ceea ce
        este fizic).
    keywork_finish:
      name: Finisaj clape
      description: Descrie finisajul/placarea specifică a mecanismului de clape (cheilor),
        separat de finisajul corpului.
    kick_point:
      name: Punct de flexie
      description: Specifică poziția punctului de împingere (kick point) pe coada
        croselor de hochei, care influențează viteza de eliberare a șutului și senzația
        în timpul loviturii.
    kick_zone_grip_system:
      name: Sistemul de prindere în zona de împingere (kick zone)
      description: Identifică tehnologia utilizată în zona de împingere a schiului
        pentru aderență.
    kickboard_features:
      name: Caracteristici ale plutei de înot (kickboardului)
      description: Evidențiază caracteristicile speciale ale plutei de înot (kickboardului)
        care îmbunătățesc antrenamentul sau confortul, inclusiv textura suprafeței
        și opțiunile de prindere pentru mâini.
    kickboard_handle_style:
      name: Stilul mânerului plutei de înot (kickboardului)
      description: Indică dacă și în ce mod pluta de înot (kickboardul) are mânere
        sau tratamente ale suprafeței care influențează prinderea și confortul.
    kickstand_mounting_position:
      name: Poziția de montare a cricului lateral (kickstand)
      description: Identifică locul de pe cadrul bicicletei unde se montează cricul
        lateral (de exemplu, montare centrală, pe chainstay sau pe axul spate).
    kickstand_type:
      name: Tipul cricului lateral (pentru bicicletă)
      description: Descrie stilul structural sau mecanismul cricului lateral (de exemplu,
        cric lateral cu un singur picior, cric central cu două picioare, telescopic).
    kidney_belt_support_level:
      name: Nivelul de susținere al centurii lombare (pentru rinichi)
      description: Nivelul general de susținere specificat de producător oferit de
        o centură lombară (pentru rinichi), pentru stabilizarea zonei lombare și abdominale.
    kiln_firing_atmosphere:
      name: Atmosferă de ardere în cuptor
      description: Specifică atmosfera de ardere pe care o poate susține cuptorul
        ceramic în timpul funcționării (de exemplu, oxidare sau reducere).
    kiln_heating_element_type:
      name: Tipul elementului de încălzire al cuptorului ceramic
      description: Tipul/materialul elementelor de încălzire utilizate în cuptor.
    kingpin_design:
      name: Designul șurubului pivot (kingpin)
      description: Descrie stilul de construcție al șurubului pivot (kingpin), influențând
        greutatea și alunecarea pe obstacole (grind).
    kingpin_orientation:
      name: Orientarea șurubului pivot
      description: Identifică orientarea șurubului pivot al axului de skateboard,
        care influențează caracteristicile de rulare și compatibilitatea cu placa.
    kit_components_included:
      name: Componente incluse în kit
      description: Enumeră piesele individuale de feronerie incluse în kit (de exemplu,
        țăruși de fixare, șuruburi, curele, unealtă de instalare), astfel încât cumpărătorii
        să știe exact ce achiziționează.
    kit_format:
      name: Formatul kitului
      description: Specifică modul în care este ambalat și transportat kit-ul (de
        exemplu, pungă, geantă, cutie).
    kit_items_included:
      name: Articole incluse în kit
      description: Enumeră echipamentele și consumabilele principale incluse în kitul
        de vinificație, astfel încât cumpărătorii să poată diferenția kiturile de
        pornire de rezervele doar cu ingrediente.
    kit_pouch_case_type:
      name: Tipul de husă/cutie a kitului
      description: Specifică tipul de soluție de depozitare inclusă în kitul de îngrijire
        (dacă există).
    kit_tools_included:
      name: Unelte incluse în kit
      description: Enumeră uneltele principale furnizate în kit (dacă există) pentru
        finalizarea proiectului.
    kite_inflation_system:
      name: Sistem de umflare a zmeului
      description: Indică modul în care sunt umflate marginea de atac și structurile
        gonflabile ale kite-ului.
    kite_line_configuration:
      name: Configurația liniei de zmeu
      description: Indică numărul de linii de zbor/control pe care este proiectată
        să le utilizeze vela de zmeu, o specificație comună pentru împerecherea corectă
        a barelor și liniilor.
    kite_type:
      name: Tip de zmeu
      description: Definește categoria de design structural a kite-ului (forma și
        tipul bridei).
    kiteboard_bag_style:
      name: Stilul genții pentru kiteboard
      description: Stilul sau subtipul genții pentru kiteboard (de exemplu, husă pentru
        placă, husă tip „golf”, geantă de călătorie, husă pentru hidrofoil).
    kiwifruit_variety:
      name: Varietate de kiwi
      description: Identifică soiul sau varietatea de culoare a fructului kiwi (verde,
        auriu, roșu etc.).
    knee_pad_pocket_type:
      name: Tip buzunar pentru genunchieră
      description: Indică dacă și cum este prevăzută îmbrăcămintea cu genunchiere
        de protecție.
    knee_pad_style:
      name: Stil de genunchieră
      description: Descrie stilul de construcție sau forma protecției pentru genunchi
        (de exemplu, manșon, orteză, protecție/apărătoare).
    knee_protection_design:
      name: Designul genunchierei
      description: Indică numărul de secțiuni articulate pentru genunchi încorporate
        în apărătoarea de picior.
    kneeboard_construction:
      name: Construcția plăcii de kneeboard
      description: Identifică tehnica principală de construcție sau structura compozită
        a plăcii (de exemplu, plastic turnat prin rotație, turnat prin comprimare,
        fibră de carbon).
    kneeboard_strap_type:
      name: Tip curea pentru genunchieră
      description: Descrie stilul sistemului de curele pentru genunchi utilizat pentru
        fixarea utilizatorului de placă.
    knife_lock_mechanism:
      name: Mecanism de blocare a cuțitului
      description: Specifică mecanismul utilizat pentru fixarea unei lame de cuțit
        pliabil în poziția deschisă sau indică modelele fără blocare.
    knife_locking_mechanism:
      name: Mecanism de blocare a cuțitului
      description: Specifică tipul de mecanism care fixează lama în poziția deschisă,
        definind în mod direct siguranța, rezistența și ușurința în utilizare pentru
        cuțitele cu lamă blocabilă.
    knife_opening_mechanism:
      name: Mecanism de deschidere a cuțitului
      description: Descrie modul în care lama este desfășurată din mâner, diferențiind
        între deschidere manuală, asistată, automată și stiluri speciale de deschidere.
    knife_system:
      name: Sistem al cuțitului
      description: Dacă și cum funcționează cuțitul de tăiere pe surfilatoare.
    knit_elastic_application:
      name: Aplicație elastică tricotată
      description: Specifică utilizarea intenționată în cusut/handmade pentru banda
        elastică tricotată de finisare.
    knit_pattern:
      name: Model de tricotat
      description: Identifică tipul principal de tricot sau textura folosită în materialul
        cardiganului, cum ar fi torsade, rib sau waffle, permițând cumpărătorilor
        să găsească texturi și proprietăți termice specifice.
    knit_style:
      name: Stil tricot
      description: Specifică structura principală de tricot, textura sau modelul decorativ
        al materialului puloverului.
    knitting_marker_counter_type:
      name: Tip marcator/contor de tricotat
      description: Specifică tipul funcțional de produs din categoria marcatoarelor
        și contoarelor pentru tricotat.
    knitting_needle_tip_style:
      name: Stilul vârfului acului de tricotat
      description: Forma/ascuțimea vârfului, optimizată pentru diferite fire și tehnici.
    knock_sensor_technology:
      name: Tehnologia senzorului de detonație
      description: Tehnologia de detecție utilizată în senzorul de detonație (knock
        sensor).
    knurl_aggressiveness:
      name: Gradul de agresivitate al striațiilor (knurling)
      description: Descrie gradul de ascuțire sau textura modelului de striații (knurling)
        de pe bara de haltere, influențând confortul și siguranța prinderii.
    knurl_marking_standard:
      name: Standard de marcare cu zimțare
      description: Specifică poziția inelelor de referință pentru zimțare utilizate
        pentru poziționarea manuală (de exemplu, marcaje IPF sau IWF).
    kohlrabi_variety:
      name: Varietatea de gulie
      description: Specifică soiul sau varietatea comercială a guliilor, permițând
        clienților să aleagă între diferite profiluri de gust, dimensiuni și culori.
    koji_mold_type:
      name: Tipul de mucegai koji
      description: Indică tipul sau tulpina de mucegai koji utilizată în timpul fermentării,
        care afectează aroma și gustul.
    kumquat_variety:
      name: Varietatea de kumquat
      description: Identifică soiul sau varietatea de kumquat, permițând cumpărătorilor
        să aleagă fructe în funcție de profilul de gust, dimensiune sau utilizare
        culinară.
    label_edge_type:
      name: Tipul marginii de etichetă
      description: Specifică stilul de finisare a marginii utilizat pentru a preveni
        uzura și a defini estetica.
    label_finish:
      name: Finisajul etichetei
      description: Specifică finisajul suprafeței, textura sau stratul/tratamentul
        protector aplicat etichetei.
    label_finish_edge_style:
      name: Finisajul etichetei/stilul marginilor
      description: Modul în care sunt finisate marginile, ceea ce influențează confortul
        și durabilitatea (de exemplu, margine țesută vs. tăiere laser).
    label_fold_type:
      name: Tipul de pliere al etichetei
      description: Se referă la modul în care sunt realizate capetele etichetei cusute
        (sew-in label) pentru a fi aplicată pe un produs (de exemplu, pliere la capăt
        sau pliere centrală), influențând modul de montare și poziționarea acesteia.
    label_text_type:
      name: Tip de text pe etichetă
      description: Indică dacă eticheta este goală, preimprimată sau destinată personalizării/customizării.
    lace_area_size:
      name: Dimensiunea zonei șiretului
      description: Definește dimensiunea sau configurația secțiunii de șiret (de exemplu,
        închidere 4×4, frontală 13×6), care determină spațiul de separare disponibil.
    lace_tightener_style:
      name: Stilul dispozitivului de strângere a șireturilor
      description: Identifică designul mecanic sau factorul de formă al dispozitivului
        de strângere a șireturilor.
    lace_type:
      name: Tip de șiret
      description: Descrie materialul sau finisajul șiretului/benzii de dantelă de
        la linia părului/căciulă, care influențează realismul și potrivirea cu nuanța
        pielii.
    lacrosse_ball_certification:
      name: Certificare minge de lacrosse
      description: Specifică organismul sportiv care guvernează standardele aprobate
        pentru mingea de lacrosse.
    lacrosse_goal_regulation_certification:
      name: Certificarea de conformitate cu regulamentul pentru poarta de lacrosse
      description: Indică dacă poarta sau plasa de lacrosse respectă specificațiile
        unei organizații de reglementare (de exemplu, NCAA sau NFHS).
    lacrosse_pocket_type:
      name: Tip buzunar pentru lacrosse
      description: Identifică stilul general al buzunarului sau al plasei întinse
        în capul crosei, influențând controlul mingii și eliberarea acesteia.
    lacrosse_string_type:
      name: Tipul de coardă pentru stringing la lacrosse
      description: Clasifică forma exactă sau utilizarea intenționată a corzii sau
        a plasei, astfel încât clienții să poată diferenția între bucăți de plasă,
        kituri și roluri specifice ale corzilor în cadrul buzunarului crosei.
    ladder_position:
      name: Poziția scării
      description: Identifică locul în care se află scara sau accesul la scări pe
        patul pentru copii mici Loft .
    lanyard_attachment_hardware:
      name: Element de fixare al șnurului de prindere
      description: Indică tipul de element de prindere de la capătul șnurului (lanyard-ului)
        care se conectează la chei, ecusoane, telefoane sau alte accesorii.
    lanyard_style:
      name: Stil de șnur
      description: Specifică modul în care se poartă sau se transportă șnurul.
    lanyard_type:
      name: Tip de șnur
      description: Descrie stilul șnurului (lanyard-ului) furnizat împreună cu sau
        compatibil cu fluierul.
    lap_hand_loom_accessories_included:
      name: Accesorii incluse pentru războiul de țesut manual
      description: Accesorii incluse în pachetul războiului de țesut manual pentru
        poală.
    lapel_style:
      name: Stil cu rever
      description: Specifică designul reverului sacoului (de exemplu, crestat, ascuțit,
        șal).
    laser_safety_class:
      name: Clasa de siguranță laser
      description: Clasificarea de siguranță laser a produsului (de exemplu, Clasa
        2, 3R, 3B, 4), conform documentației sau etichetării dispozitivului.
    latex_processing_method:
      name: Metodă de procesare a latexului
      description: Specifică procesul de fabricație utilizat pentru spuma de latex
        — de obicei Dunlop sau Talalay — care influențează senzația, reacția și prețul.
    latex_type:
      name: Tip de latex
      description: Indică originea și compoziția latexului utilizat în saltea (natural,
        organic, sintetic sau amestec), oferind cumpărătorilor informații despre durabilitate,
        impact ecologic și posibili alergeni.
    launch_profile:
      name: Profil de lansare
      description: Indică traiectoria tipică de lansare (joasă, medie sau înaltă)
        pe care este proiectat să o producă shaft-ul unui club de golf.
    launcher_mounting_configuration:
      name: Configurație de montare a lansatorului
      description: Identifică modul de montare sau configurare al lansatorului în
        utilizare, ajutând cumpărătorii care au nevoie de opțiuni independente, montate
        sub țeavă sau pe șină.
    layer_construction:
      name: Construcție pe straturi
      description: Specifică structura laminată a materialului (de exemplu, 2 straturi,
        2,5 straturi, 3 straturi), care influențează greutatea, compresibilitatea
        și durabilitatea.
    layer_design:
      name: Designul stratului
      description: Descrie construcția plasei de păr în ceea ce privește numărul de
        straturi sau reversibilitatea.
    lazy_kate_tension_control_type:
      name: Tipul de control al tensiunii pentru suportul de bobine (lazy kate)
      description: Modul în care „lazy kate” aplică fricțiune/rezistență bobinelor
        în timpul răsucirii sau înfășurării firelor.
    lead_hardware_type:
      name: Tipul de feronerie pentru lesă (plumb)
      description: Definește tipul de prindere sau element de fixare de la capătul
        lesei (de exemplu, carabină, clemă, buclă, lanț etc.), influențând ușurința
        în utilizare, siguranța și compatibilitatea cu disciplina.
    leaf_gelatin_grade:
      name: Gradul foilor de gelatină
      description: Specifică gradul standardizat de tărie al foilor de gelatină.
    leaf_preparation:
      name: Preparare a frunzelor
      description: Descrie modul în care sunt preparate foile înainte de ambalare,
        cum ar fi modul în care sunt tocate, mărunțite sau tăiate julienne.
    leaf_spring_material:
      name: Material pentru arc lamelar
      description: Materialul principal de construcție al pachetului de arcuri lamelare.
    leak_protection_layer:
      name: Strat de protecție împotriva scurgerilor
      description: Indică dacă sistemul de scutece încorporat al costumului de baie
        utilizează un design cu unul sau două straturi pentru protecția împotriva
        scurgerilor.
    leash_clip_type:
      name: Tipul de clemă pentru lesă
      description: Specifică tipul de clemă sau element de prindere utilizat pentru
        atașarea lesei la zgardă sau ham (de exemplu, carabină cu arc, carabină, clemă
        rotativă).
    leash_style:
      name: Stil lesă
      description: Descrie configurația cordonului sau stilul de înfășurare al lesei.
    leash_type:
      name: Tip de lesă
      description: Clasifică stilul general sau configurația lesei în funcție de scop
        pentru o filtrare rapidă în funcție de utilizarea preconizată.
    leavening_action_type:
      name: Tipul de acțiune al agentului de dospire
      description: Identifică formularea chimică sau tipul de dospire al prafului
        de copt (de exemplu, cu acțiune simplă, cu acțiune dublă, fără aluminiu).
        Acest lucru afectează direct performanța de coacere și adecvarea rețetelor.
    leavening_agent:
      name: Agent de dospire
      description: Specifică mecanismul principal de dospire utilizat în aluat.
    led_color_options:
      name: Opțiuni de culoare LED
      description: Enumeră culorile LED selectabile disponibile pe alarmă pentru indicarea
        vizuală a mușcăturii.
    led_indicator_color:
      name: Indicator LED colorat
      description: Identifică culoarea indicatorului LED al produsului, ajutând pescarii
        să potrivească mai multe alarme sau să se potrivească preferințelor personale.
    led_light_color:
      name: Lumină LED colorată
      description: Specifică culoarea oricărui sistem de iluminare LED integrat.
    leek_variety:
      name: Soi de praz
      description: Specifică soiul sau varietatea de praz, permițând diferențierea
        după gust, dimensiune și sezon de cultivare.
    leg_coverage:
      name: Acoperire a picioarelor
      description: Specifică cât de mult din picior acoperă costumul de neopren (de
        exemplu, pantaloni scurți, lungime completă).
    leg_cuff_style:
      name: Stilul manșetei de la picior.
      description: Specifică stilul de finisare la deschizătura pantalonilor la gleznă.
    leg_cut_height:
      name: Înălțimea croielii la picior
      description: Indică cât de sus este decupată deschiderea pentru picior la partea
        inferioară a costumului de baie.
    leg_cut_style:
      name: Stil de croială pe picior
      description: Descrie forma deschiderii pentru picior, care influențează aspectul,
        confortul și liniile de bronzare.
    leg_length:
      name: Lungimea piciorului
      description: Clasifică pantalonii scurți în funcție de lungimea relativă a cracului
        (scurtă, medie, lungă), permițând cumpărătorilor să își aleagă nivelul preferat
        de acoperire fără a separa categoria.
    leg_loop_type:
      name: Tip de buclă pentru picior
      description: Descrie designul buclelor pentru picioare.
    leg_opening_style:
      name: Stilul deschiderii pentru picior
      description: Specifică modul în care sunt finisate deschiderile pentru picior
        la pantalonii de trening (joggers), de exemplu manșete elastice, tiv cu fermoar
        sau tiv drept deschis.
    leg_style:
      name: Stilul piciorului
      description: Definește stilul de design sau construcție al picioarelor sau bazei
        băncii.
    legging_foot_design:
      name: Designul terminației pentru picior la colanți
      description: Specifică dacă colanții sunt fără talpă, cu talpă sau convertibili
        între cele două stiluri.
    leggings_waistband_style:
      name: Stilul taliei colanților
      description: Specifică designul structural al taliei colanților, influențând
        confortul, susținerea și aspectul estetic.
    lei_closure_style:
      name: Stilul de închidere la nivelul cracului colanților
      description: Descrie dacă ghirlanda este un cerc continuu sau are capete deschise
        care se leagă ori se prind cu panglică.
    lemon_variety:
      name: Varietate de lămâie
      description: Identifică soiul sau varietatea de lămâi (de exemplu, Eureka, Meyer,
        Amalfi).
    length_adjustment_method:
      name: Metoda de ajustare a lungimii
      description: Indică dacă și cum poate fi ajustată lungimea coardei de sărit
        pentru a se potrivi utilizatorului.
    lens_color_tint:
      name: Culoarea / nuanța lentilei
      description: Culoarea sau nuanța lentilelor ochelarilor de protecție furnizați
        împreună cu produsul.
    lens_construction:
      name: Construcția lentilei
      description: Specifică structura constructivă a lentilei (de exemplu, lentilă
        simplă sau dublă cu strat termic), indicând rezistența la aburire și performanța
        optică.
    lens_tint_category:
      name: Categorie de nuanță a lentilei
      description: Clasifică nivelul de întunecare al lentilei conform categoriilor
        internaționale de nuanțare, ajutând clienții să aleagă lentile potrivite pentru
        diferite condiții de lumină.
    lettuce_variety:
      name: Varietate de salată verde
      description: Identifică varietatea horticolă specifică de salată (de exemplu,
        Iceberg, Romaine, Butterhead), permițând filtrarea și compararea precisă.
    level_of_play:
      name: Nivelul de joc
      description: Nivelul de performanță declarat de producător, corelat cu nivelul
        de competitivitate al jucătorului și bugetul acestuia.
    lever_configuration:
      name: Configurația manetei
      description: Indică configurația manetei/mânerului de control al motorului ambarcațiunii
        (de exemplu, cu o singură manetă sau cu două manete).
    lever_type:
      name: Tip de pârghie
      description: Tipul/mecanismul manetelor de schimbare a acordajului instalate
        pe corzile harpei.
    license_plate_cover_style:
      name: Stilul capacului pentru plăcii de identificare
      description: Specifică stilul de construcție al capacului plăcii de identificare
        (de exemplu, acoperire completă vs. capace cu șuruburi).
    license_plate_personalization_type:
      name: Tipul de personalizare a plăcii de identificare
      description: Specifică dacă plăcuța de identificare este goală, preimprimată
        sau permite personalizarea de către cumpărător (text și/sau grafică).
    license_usage_terms:
      name: Termeni de licență/utilizare
      description: Drepturi de utilizare pentru model (de exemplu, uz personal vs.
        uz comercial limitat).
    licensed_sports_property:
      name: Proprietate sportivă autorizată
      description: Indică dacă produsul este licențiat oficial de o ligă/echipă/organizație.
    lid_hinge_mechanism:
      name: Mecanismul balamalei capacului
      description: Specifică mecanismul de balamale utilizat pentru capac, siguranța
        la impact și ușurința în utilizare.
    lid_support_positions:
      name: Pozițiile de susținere ale capacului
      description: Specifică pozițiile de susținere ale capacului la pianul cu coadă
        (cât de mult poate fi deschis capacul).
    lie_angle_color_code:
      name: Codul de culoare al unghiului de înclinare
      description: Indică sistemul de codificare pe culori al unghiului de înclinare
        utilizat de producător pentru unele crose (de exemplu, punct negru, punct
        verde).
    life_jacket_certification_standard:
      name: Standard de certificare a vestei de salvare
      description: Clasificarea oficială de siguranță sau standardul pe care îl îndeplinește
        produsul, cum ar fi tipul USCG sau nivelurile ISO/AS .
    life_raft_certification_standard:
      name: Standard de certificare a plutei de salvare
      description: Standardul/certificarea de siguranță pentru care este construită
        și întreținută pluta.
    life_raft_container_type:
      name: Tip de container pentru pluta de salvare
      description: Cum este ambalată pluta de salvare pentru depozitare și desfășurare.
    life_vest_approval_standard:
      name: Standard de omologare a vestei de salvare
      description: Specifică standardul de certificare/aprobare pe care îl respectă
        vesta de salvare.
    life_vest_intended_user:
      name: Utilizatorul prevăzut pentru vesta de salvare
      description: Indică categoria de purtător prevăzută în ceea ce privește potrivirea
        și asigurarea echipamentului.
    lifebuoy_approval_standard:
      name: Standard de aprobare a colacului de salvare
      description: Standardul de siguranță sau aprobarea la care respectă colacul
        de salvare (de exemplu, USCG/SOLAS).
    lifebuoy_features:
      name: Caracteristici ale colacului de salvare
      description: Siguranță funcțională, montare/gestionare și accesorii incluse
        pentru colacii de salvare.
    lift_mechanism_type:
      name: Tip de mecanism de ridicare
      description: Specifică mecanismul care ajută la ridicarea/coborârea sau deschiderea/închiderea
        patului suspendat.
    lift_stand_support_point:
      name: Punct de asistență pentru ridicare/staționare
      description: Punctul în care elevatorul/suportul intră în contact cu vehiculul
        sau îl susține.
    lifting_gas_type:
      name: Tipul de gaz de ridicare
      description: Specifică gazul principal de ridicare sau mediul de flotabilitate
        utilizat de dirijabil.
    lifting_support_type:
      name: Tipul de suport de ridicare
      description: Indică dacă elevatorul este acționat prin intermediul unor piste
        sau prin intermediul unor brațe/pernuțe care intră în contact cu cadrul/punctele
        de ridicare.
    ligature_and_cap_component_type:
      name: Tipul componentei ligaturii și ale capacului
      description: Indică dacă produsul este o ligatură, un capac sau un set care
        le include pe ambele.
    ligature_material:
      name: Material de ligatură
      description: Materialul principal al corpului ligaturii care intră în contact
        cu ancia și o fixează (de exemplu, metal, piele, material textil).
    ligature_plating_or_finish:
      name: Placare sau finisaj ligatură
      description: Specifică placarea și/sau finisajul de suprafață aplicat unei ligaturi
        și/sau capac metalic pentru clarinet.
    ligature_reed_contact_style:
      name: Stilul de contact al ligaturii cu ancia
      description: Specifică modul în care ligatura intră în contact cu ancia (de
        exemplu, contact minim, punct multiplu, înfășurare).
    ligature_screw_position_relative_to_reed:
      name: Poziția șurubului ligaturii (față de ancie)
      description: Indică poziția șurubului (șuruburilor) de strângere a ligaturii
        față de partea orientată spre ancie/instrumentist atunci când este instalat
        pe muștiuc.
    ligature_tension_adjustment_mechanism:
      name: Mecanism de reglare a tensiunii ligaturii
      description: Descrie modul în care ligatura aplică/ajustează presiunea asupra
        anciei (modelul de fixare).
    ligature_tightening_mechanism_type:
      name: Tipul mecanismului de strângere a ligaturii
      description: Specifică mecanismul prin care ligatura se strânge în jurul muștiucului
        și a anciei (de exemplu, șurub simplu, șurub dublu, pârghie/eliberare rapidă).
    light_bar_housing_material:
      name: Materialul carcasei barei luminoase
      description: Materialul principal al carcasei/corpului barei luminoase, durabilitate
        la impact și disipare a căldurii.
    light_bar_lens_material:
      name: Materialul lentilei barei de lumini
      description: Materialul principal al lentilei/capacului barei luminoase, care
        poate afecta rezistența la impact și claritatea optică.
    light_bar_mounting_location:
      name: Locația de montare a barei de lumini
      description: Poziția principală de montare prevăzută pe vehicul.
    light_stand_style:
      name: Stilul suportului de lumină
      description: Specifică stilul structural sau factorul de formă al suportului
        utilizat pentru a asista luminile cu efecte speciale (de exemplu, trepied,
        bară în T, manivelă), nu suprafața de instalare (perete/tavan), care este
        reprezentată de tipul de montare.
    light_switch_function:
      name: Funcția întrerupătorului de lumină
      description: Identifică circuitul (circuitele) de iluminare sau funcția(funcțiile)
        pe care le controlează comutatorul.
    lighting_control_protocols_supported:
      name: Protocoale de control al iluminatului acceptate
      description: Protocoalele de control/rețea pe care controlerul le acceptă, în
        plus sau în locul DMX512.
    lighting_effects:
      name: Efecte de iluminare
      description: Specifică orice caracteristici de iluminare integrate care îmbunătățesc
        jocul sau estetica.
    lighting_mode:
      name: Mod de iluminare
      description: Enumeră modelele de lumină operaționale disponibile, cum ar fi
        constantă, intermitentă, stroboscopică sau SOS.
    lily_variety:
      name: Soi de crin
      description: Specifică varietatea comercială/botanică a crinului vândut ca floare
        tăiată (de exemplu, asiatic, oriental).
    limb_articulation:
      name: Articulația membrelor
      description: Indică gradul de flexibilitate sau articulație a membrelor la manechin
        (fără flexibilitate, fix, semiflexibil, complet articulat).
    limb_material:
      name: Materialul membrelor
      description: Materialul principal utilizat în membrele unui arc sau arbalete
        influențează greutatea, durabilitatea, vibrațiile și performanța generală.
    lime_variety:
      name: Soi de lămâie verde
      description: Identifică varietatea botanică sau comercială specifică de lime
        comercializată.
    line_buoyancy:
      name: Flotabilitatea firului
      description: Descrie dacă împletitura (firul textil) plutește sau se scufundă
        în mod natural și cu ce viteză, influențând prezentarea nălucii și gestionarea
        firului.
    line_purpose:
      name: Scopul firului
      description: Definește funcția preconizată a firului în cadrul sistemului de
        zmeu (de exemplu, fir principal de zbor, fir de depower, bridă).
    linen_finish_treatment:
      name: Finisaj/tratament in
      description: Orice proces de finisare aplicat țesăturii de in care modifică
        senzația la atingere, aspectul sau performanța.
    linen_weave_type:
      name: Tip de țesătură de in
      description: Specifică construcția țesăturii țesăturii de in, care afectează
        textura, respirabilitatea și drapajul.
    liner_padding_type:
      name: Tipul căptușelii interioare
      description: Indică tipul de construcție sau de amortizare al căptușelii interioare
        (de exemplu, plasă, ușor căptușită, matlasată).
    liner_shape:
      name: Forma căptușelii interioare
      description: Descrie forma generală a căptușelii pentru sacul de dormit, ajutând
        clienții să o asocieze cu sacul de dormit și preferințele de confort.
    liner_type:
      name: Tip de căptușeală
      description: Indică dacă pantalonii scurți includ o căptușeală interioară și,
        dacă da, ce model este.
    lining:
      name: Căptuşeală
      description: Indică dacă și cum este căptușit costumul de baie, inclusiv gradul
        de acoperire a căptușelii în interiorul articolului de îmbrăcăminte.
    lining_material:
      name: Material căptușeală
      description: Specifică materialul folosit pentru căptușeala interioară a încălțămintei,
        care afectează confortul, respirabilitatea și căldura.
    lining_type:
      name: Tipul de căptușeală
      description: Specifică dacă articolul de îmbrăcăminte este căptușit și în ce
        măsură.
    link_connection_style:
      name: Stilul de conectare al verigii
      description: Clasifică modul în care veriga se îmbină cu lanțul (de exemplu,
        verigă rapidă, fixare de conectare), permițând călăreților să aleagă metoda
        corectă de instalare sau piesa de schimb.
    live_bait_form:
      name: Formă momeală vie
      description: Specifică forma fizică sau starea de conservare a momelii, cum
        ar fi vie, congelată sau uscată.
    living_room_furniture_items_included:
      name: Piese de mobilier pentru living incluse
      description: Specifică piesele individuale de mobilier care fac parte din setul
        de living, ajutând cumpărătorii să înțeleagă rapid ce componente (de exemplu,
        canapea, fotoliu dublu, măsuță de cafea) sunt incluse.
    load_mechanism:
      name: Mecanism de încărcare
      description: Specifică metoda principală prin care este generată sau adăugată
        rezistența la aparat (de exemplu, stivă de greutăți selectabilă, încărcare
        cu discuri, încărcare cu benzi elastice).
    lock_cylinder_type:
      name: Tipul cilindrului de blocare
      description: Specifică tipul de cilindru/miez de cheie utilizat (relevant pentru
        rezistența la spargere și cheile de schimb).
    lock_security_level:
      name: Nivel de securitate al blocării
      description: Descrie nivelul de rezistență la efracție al încuietorii/cilindrului
        împotriva forțării prin picking sau găurire.
    lock_system:
      name: Sistem de blocare
      description: Tipul sistemului de blocare de siguranță utilizat pentru menținerea
        elevatorului la înălțime.
    locker_bench_configuration:
      name: Configurația băncii cu dulapuri
      description: Descrie orientarea sau configurația structurală a băncii cu dulapuri
        (de exemplu, cu o singură față, insulă cu două fețe, montată pe perete).
    locomotive_prototype_power_type:
      name: Tip de putere pentru prototipul locomotivei
      description: Specifică tipul de propulsie a locomotivei din lumea reală reprezentat
        de model.
    locomotive_wheel_arrangement_whyte_notation:
      name: Aranjamentul roților locomotivei (notația Whyte)
      description: Dispunerea roților prototipului locomotivei (de exemplu, 4-6-2
        Pacific).
    loft_bed_height_classification:
      name: Clasificarea înălțimii patului Loft
      description: Indică înălțimea totală a patului Loft (jos, mediu, înalt, extra-înalt),
        ajutând cumpărătorul să potrivească înălțimea tavanului cu cerințele de spațiu
        de sub pat.
    logo_application_method:
      name: Metodă de aplicare a logoului
      description: Descrie modul în care stema sau sigla școlii este aplicată pe îmbrăcăminte
        (de exemplu, brodată sau imprimată).
    logo_label_compatible_fabric_weight:
      name: Greutatea materialului compatibil pentru eticheta cu logo
      description: Categoria de greutate recomandată a materialului pentru atașarea
        etichetei fără distorsiuni sau volum.
    logo_label_edge_finish:
      name: Finisajul marginilor etichetei cu logo
      description: Specifică tipul de construcție/finisare a marginilor etichetei,
        influențând rezistența la destrămare și confortul la contactul cu pielea.
    logo_label_print_production_method:
      name: Metoda de imprimare/producție a etichetei cu logo
      description: Cum se aplică/se formează sigla pe suprafața etichetei.
    long_block_completeness:
      name: Completitudinea blocului lung
      description: Specifică componentele principale incluse în ansamblul blocului
        lung.
    long_john_pieces_included:
      name: Piese incluse pentru lenjeria termică lungă (tip „long john”)
      description: Clarifică dacă produsul include doar partea de jos, doar partea
        de sus sau ambele piese ale setului de lenjerie termică lungă.
    longan_variety:
      name: Varietatea de longan
      description: Specifică soiul sau varietatea comercială a fructului longan (de
        exemplu, Kohala, Biew Kiew), ajutând cumpărătorii să identifice gustul, dimensiunea
        și nivelul de dulceață dorite.
    loom_accessories_included:
      name: Accesorii pentru războiul de țesut incluse
      description: Accesorii cheie incluse în cutie/pachet cu războiul de țesut.
    loom_finish:
      name: Finisajul războiului de țesut
      description: Finisajul suprafeței războiului de țesut (în principal pentru războaiele
        de țesut din lemn).
    loom_folding_portability_design_type:
      name: Tipul de design al plierii și portabilității războiului de țesut
      description: Indică dacă și cum războiul de țesut se pliază sau se restrânge
        pentru transport ori depozitare compactă.
    loom_frame_folding_design:
      name: Designul de pliere al cadrului războiului de țesut
      description: Specifică dacă și cum se pliază, se restrânge sau se dezasamblează
        cadrul războiului de țesut pentru depozitare sau transport.
    loom_tension_adjustment_method:
      name: Metoda de reglare a tensiunii războiului de țesut
      description: Metoda principală utilizată pentru reglarea tensiunii urzelii pe
        războiul de țesut.
    loom_tie_up_system:
      name: Sistem de legare a războiului de țesut
      description: Tipul sistemului de legare/conexiune utilizat între pedale/lămpi/arbori
        (de exemplu, Texsolv sau lanț metalic).
    loquat_variety:
      name: Varietatea de moșmon
      description: Specifică soiul sau varietatea de moșmon, reflectând diferențe
        de dimensiune, gust, sezon de coacere și aspect.
    lubricant_features:
      name: Caracteristicile lubrifiantului
      description: Evidențiază caracteristicile speciale de performanță, aditivii
        sau beneficiile lubrifiantului.
    lubrication_requirement:
      name: Cerința de lubrifiere
      description: Indică dacă banda de alergare este pre-tratată/fără întreținere
        sau necesită lubrifiere ori ceruire periodică.
    lubrication_type:
      name: Tip de lubrifiere
      description: Specifică dacă bucșa poate fi lubrifiată și dacă este proiectată
        pentru ungere cu vaselină (de exemplu, are caneluri sau niplu de gresare).
    lug_nut_seat_profile:
      name: Profilul de așezare al piuliței de roată
      description: Specifică profilul de așezare al piuliței de roată necesar pentru
        jantă, pentru a asigura compatibilitatea corectă și montarea în siguranță.
    lumbar_support_type:
      name: Tipul de suport lombar
      description: Descrie tipul de suport lombar oferit de scaun (de exemplu, pernă
        detașabilă, mecanism ajustabil, funcție de masaj).
    lunge_trainer_style:
      name: Stilul aparatului de antrenament pentru fandări
      description: Definește designul structural al unui aparat de antrenament pentru
        fandări.
    lure_buoyancy:
      name: Flotabilitatea nălucii
      description: Specifică modul în care momeala artificială se comportă în coloana
        de apă atunci când este în repaus sau în timpul recuperării (de exemplu, plutește
        la suprafață, se menține suspendată la mijlocul apei sau se scufundă).
    luster:
      name: Luciu
      description: Descrie modul în care lumina interacționează cu suprafața specimenului
        (de exemplu, vitroasă, metalică).
    lychee_cultivar:
      name: Soi de litchi
      description: Identifică varietatea sau soiul de litchi — cum ar fi Brewster,
        Hak Ip sau Mauritius — care poate varia după aromă, dimensiunea sâmburelui,
        sezonul de recoltare și preț.
    lyre_flip_folder_mounting_location:
      name: Locația de montare a suportului metalic pentru partituri sau a suportului
        tip flip folder
      description: Locul de montare pe instrument sau accesoriu al suportului metalic
        pentru partituri sau al suportului tip flip folder (de exemplu, pe pavilion,
        tubul de emisie sau stativ).
    lyrics_display_type:
      name: Tipul de afișare a versurilor
      description: Cum sunt afișate versurile (dacă sunt acceptate) în timpul karaoke-ului.
    magazine_compatibility:
      name: Compatibilitate cu reviste
      description: Identifică calibrele principale ale încărcătorului sau tipurile
        de încărcătoare pe care sunt proiectate să le conțină în compartimentele încorporate
        ale vestei.
    magnet_requirement:
      name: Cerința magnetului
      description: Indică dacă senzorul necesită un magnet extern pentru a funcționa.
    magnet_toy_storage_included:
      name: Depozitare magnetică pentru jucării inclusă
      description: Tipul de cutie sau husă inclusă pentru jucăria magnetică destinată
        organizării biroului și transportului.
    malanga_variety:
      name: Varietate de malanga
      description: Identifică varietatea specifică de malanga/taro vândută, pentru
        a ajuta cumpărătorii să aleagă gustul, culoarea sau utilizarea culinară dorită.
    malt_color_rating_system:
      name: Sistem de clasificare a culorii malțului
      description: Specifică scara de culoare la care se referă culoarea menționată
        (Lovibond, SRM sau EBC).
    malt_crush:
      name: Gradul de măcinare a malțului
      description: Indică dacă malțul de bază este vândut întreg/nemăcinat sau pre-zdrobit
        și, în caz afirmativ, stilul de zdrobire.
    malt_form:
      name: Forma malțului
      description: Indică dacă produsul este vândut sub formă de boabe întregi sau
        este prelucrat pentru pasare (de exemplu, zdrobit).
    malt_intended_use:
      name: Utilizarea prevăzută a malțului
      description: Utilizarea principală prevăzută pentru malț (fabricarea berii,
        distilarea sau utilizarea dublă).
    malt_treatment:
      name: Tratament malț
      description: Descrie modul în care cerealele/malțul au fost procesate dincolo
        de uscarea standard (kilning), incluzând procese speciale comune.
    malt_usage_purpose:
      name: Scopul utilizării malțului
      description: Descrie contribuția funcțională principală a unui malț special
        într-o rețetă de bere.
    man_overboard_system_type:
      name: Tipul sistemului „Om la apă”
      description: Specifică categoria principală a soluției de tip om la apă (MOB)
        oferită de produs.
    mandolin_back_sides_wood:
      name: Lemnul utilizat pentru spatele și lateralele mandolinei
      description: Specifică specia de lemn utilizată pentru spatele și lateralele
        mandolinei.
    mandolin_body_top_wood:
      name: Corp de mandolină din lemn
      description: Lemn/material principal folosit pentru placa de rezonanță a mandolinei
        (sus).
    mandolin_bridge_type:
      name: Tip punte de mandolină
      description: Specifică stilul de căluș utilizat pe mandolină.
    mandolin_pickup_configuration:
      name: Configurația pick-upului de mandolină
      description: Indică dacă mandolina include electronică și ce tip de sistem de
        ridicare este instalat.
    mandolin_string_configuration:
      name: Configurația corzilor mandolinei
      description: Specifică configurația corzilor mandolinei, indicând numărul total
        de corzi și numărul de coruri (de exemplu, 8 corzi / 4 coruri).
    mangosteen_variety:
      name: Varietate de mangosteen
      description: Identifică specia sau varietatea specifică de mangostan sau de
        fructe Garcinia înrudite, comercializate.
    mannequin_style:
      name: Stil manechin
      description: Descrie designul structural sau stilul de construcție al manechinului
        de antrenament.
    manufacturing_process:
      name: Procesul de fabricație
      description: Metoda principală de producție a corpului mulinetei sau a tamburului
        (de exemplu, prelucrat CNC, turnat sub presiune).
    map_coverage_sky_planet_body:
      name: Acoperirea hărții (cer/corp planetar)
      description: 'Indică ce reprezintă harta: cerul nopții (constelații) sau un
        anumit corp planetar.'
    map_format:
      name: Formatul hărții
      description: Definește prezentarea fizică sau digitală a hărților de vânătoare
        și a ghidurilor.
    map_sensor_output_signal_type:
      name: Tipul semnalului de ieșire al senzorului MAP
      description: Specifică tipul semnalului de ieșire pe care senzorul MAP îl furnizează
        unității de control al motorului (ECU).
    map_size_sheet:
      name: Dimensiuni hartă (foaie)
      description: Specifică dimensiunile finale ale foii de hartă/posterului/planisferei
        pentru a facilita afișarea și compatibilitatea (dimensiunile cadrului, spațiul
        pe perete).
    marabou_feather_form:
      name: Forma penei de marabu
      description: Factorul de formă al produsului din pene de marabu, așa cum este
        vândut.
    marabou_feather_treatment:
      name: Tratament cu pene de marabu
      description: Modul în care pana de marabu a fost procesată sau finisată pentru
        utilizare în creație.
    marble_track_set_feature_modules:
      name: Module de funcționalitate ale setului de piste pentru bile
      description: Evidențiază modulele funcționale speciale incluse în set (de exemplu,
        lift, lansator, comutatoare).
    marine_flare_certification_standard:
      name: Standardul/certificarea rachetelor de semnalizare maritime
      description: Indică ce certificări sau standarde de siguranță maritimă respectă
        racheta de semnalizare.
    marine_safety_standard_compliance:
      name: Respectarea standardelor de siguranță maritimă
      description: Indică standardele oficiale de siguranță a apei sau aprobarea pe
        care o îndeplinește accesoriul.
    marine_transmission_type:
      name: Tipul de transmisie marină
      description: Specifică tipul de transmisie marină asociată motorului inboard
        (de exemplu, transmisie directă sau V-drive).
    marker_action_type:
      name: Tipul de acțiune al markerului
      description: Descrie mecanismul fundamental de declanșare/funcționare a markerului.
    marker_caliber:
      name: Calibru marker
      description: Specifică diametrul bilelor de vopsea pe care markerul este proiectat
        să le tragă.
    marking_durability:
      name: Durabilitatea marcajului
      description: Indică durata de timp estimată pentru ca linia pictată să rămână
        vizibilă în condiții de privire normală, cum ar fi temporară (până la 3 săptămâni),
        semipermanentă (până la 6 luni) sau permanentă (mai mult de 6 luni).
    marking_tip_type:
      name: Tipul vârfului de marcare
      description: Tipul de inserție de marcaj folosită de compas pentru desen (de
        exemplu, potențial client suport vs. cerneală vs. punct de trasare).
    marshmallow_processing_method:
      name: Metoda de procesare a bezelei
      description: Descrie orice procesare specială aplicată bezelelor care influențează
        textura, durata de valabilitate sau gustul.
    marshmallow_size:
      name: Dimensiunea marshmallow-ului
      description: Clasifică dimensiunea relativă a bucăților de bezea pentru persoane
        fizice.
    martial_arts_belt_rank:
      name: Gradul centurii de arte marțiale
      description: Indică nivelul de aptitudine/rang reprezentat de culoarea sau combinația
        specială de culori a centurii.
    mask_bib_type:
      name: Tipul de bavetă pentru mască
      description: Specifică tipul de bavete de pe o mască de scrimă, cum ar fi material
        textil standard, conductiv, detașabil sau fără.
    mask_cage_material:
      name: Materialul cuștii măștii
      description: Material folosit special pentru cadrul cuștii faciale sau al măștii.
    mask_goggle_design:
      name: Design mască/ochelari de protecție
      description: Definește designul structural general sau stilul de acoperire al
        echipamentului de protecție.
    mask_skirt_material:
      name: Materialul membranei măștii
      description: Identifică materialul fustei moi care asigură etanșeitatea dintre
        mască și față.
    mask_strap_material:
      name: Materialul curelei măștii
      description: Specifică materialul curelei care fixează masca pe cap.
    mass_air_flow_sensor_measurement_type:
      name: Tip de măsurare a senzorului debitmetrului de aer
      description: Specifică tehnologia de detectare/stilul de ieșire utilizat de
        senzorul MAF.
    mass_air_flow_sensor_mounting_type:
      name: Tipul de montare al senzorului de masă de aer
      description: Cum se montează/instalează senzorul sau ansamblul senzorilor MAF
        în sistemul de admisie.
    massage_feature:
      name: Funcție de masaj
      description: Indică dacă baza reglabilă include funcția de masaj integrate și,
        dacă da, câte zone de masaj oferă.
    mast_attachment_interface:
      name: Interfață de atașare a catargului
      description: Specifică standardul de conexiune dintre fuselaj și catarg, ajutând
        cumpărătorul să asigure potrivirea componentelor.
    mast_base_type:
      name: Tipul bazei catargului
      description: Identifică interfața de montare care conectează catargul la placă
        sau adaptor.
    mast_bend_curve:
      name: Curba de îndoire a catargului
      description: Modelul de flexie a catargului care determină compatibilitatea
        și gestionarea velelor.
    mast_diameter_type:
      name: Tipul diametrului catargului
      description: Clasificarea standardizată a diametrului catargului de windsurfing
        (de exemplu, RDM, SDM, MDM) utilizată pentru verificările de compatibilitate.
    mat_backing_type:
      name: Tipul de suport pentru covoraș
      description: Specifică tipul de suport de pe partea inferioară a covorașului
        care ajută la menținerea acestuia la locul său pe diverse suprafețe.
    mat_installation_method:
      name: Metodă de instalare a covorașului
      description: Indică modul în care este instalat sau fixat covorașul.
    mat_style:
      name: Stilul covorașului
      description: Definește stilul structural sau forma saltelei (de exemplu, saltea
        pliabilă, plăci interconectate, saltea de protecție).
    maternity_panel_type:
      name: Tipul panoului pentru sarcină
      description: Indică stilul panoului elastic sau al taliei concepute pentru a
        se adapta creșterii sarcinii.
    maternity_waistband_style:
      name: Model cu talie elastică pentru sarcină
      description: Indică designul și poziționarea taliei sau a panoului de pe burtă
        specific pantalonilor pentru sarcină, descriind modul în care articolul de
        îmbrăcăminte susține o burtă în creștere.
    mattress_top_type:
      name: Tip de saltea superioară
      description: Specifică stilul stratului superior sau al suprafeței saltelei,
        cum ar fi strat tip pernă sau suprafață întinsă.
    maturation_vessel_material:
      name: Materialul vasului de maturare
      description: Specifică materialul principal al vasului sau butoiului folosit
        pentru învechirea shochu-ului.
    maximum_quilt_size_supported:
      name: Dimensiunea maximă a pilotei suportate
      description: Dimensiunea maximă a pilotei/proiectului pe care cadrul o poate
        susține (de obicei exprimată prin dimensiuni de pat sau lățime maximă).
    meal_course:
      name: Meniu
      description: Identifică ocazia tipică de masă pentru produs.
    meal_preparation_state:
      name: Stadiu de pregătire a mesei
      description: Indică cât de multă pregătire este necesară înainte de consum (de
        exemplu, Gata de consum, kit de masă).
    meat_processing_state:
      name: Stadiu de procesare a cărnii
      description: Indică gradul de gătire sau conservare aplicat produsului din carne
        înainte de promovare.
    meat_quality_grade:
      name: Grad de calitate a cărnii
      description: Indică gradul de calitate sau clasificarea atribuită cărnii de
        către o autoritate de clasificare recunoscută (de exemplu, USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Afirmație privind creșterea cărnii
      description: Evidențiază afirmațiile comune privind bunăstarea animalelor sau
        practicile agricole asociate cu carnea (de exemplu, hrănire cu iarbă, creștere
        liberă).
    mechanical_loom_assembly_status:
      name: Starea asamblării războiului de țesut mecanic
      description: Modul în care războiul de țesut este livrat, în funcție de nivelul
        de asamblare necesar.
    mechanical_loom_weaving_type:
      name: Tipul de țesut mecanic la război
      description: Mecanismul/tipul principal de țesut suportat de războiul de țesut.
    mechanical_puzzle_primary_mechanism:
      name: Mecanismul principal al puzzle-ului mecanic
      description: Interacțiunea/mecanismul principal utilizat pentru rezolvarea puzzle-ului
        mecanic.
    mechanical_puzzle_solution_format:
      name: Formatul soluției puzzle-ului mecanic
      description: Formatul în care sunt furnizate sugestiile/soluțiile atunci când
        sunt incluse.
    medal_attachment_style:
      name: Stil de prindere a medaliei
      description: Specifică modul în care este destinată purtarea sau afișarea medaliei
        (de exemplu, panglică la gât, spate fixat).
    medal_award_level:
      name: Nivelul de premiere a medaliei
      description: Specifică nivelul de premiere reprezentat de medalie (de exemplu,
        locul 1, participant).
    medal_finish:
      name: Finisaj medalie
      description: Specifică finisajul suprafeței medaliei (luciu vizual/textură),
        independent de material.
    medal_packaging:
      name: Ambalaj medalie
      description: Indică tipul de ambalaj de prezentare inclus odată cu medalia.
    melodica_accessory_set_included:
      name: Set de accesorii inclus pentru melodică
      description: Ce accesorii comune sunt incluse în pachetul melodică.
    melodica_air_chamber_material:
      name: Materialul camerei de aer a melodicăi
      description: Materialul camerei de aer/corpului melodicii (ABS, lemn etc.) atunci
        când vânzătorii o disting de alte componente.
    melodica_included_accessories:
      name: Accesorii incluse pentru melodică
      description: Accesorii incluse în cutia melodicii.
    melodica_key_color_scheme:
      name: Schema de culori a clapelor melodicii
      description: Schema de culori a tastelor (nu a corpului), ceea ce afectează
        lizibilitatea (în special pentru copii/începători).
    melodica_mouthpiece_configuration:
      name: Configurația muștiucului melodicii
      description: Indică ce interfață(e) de suflare sunt incluse/utilizate pentru
        redarea melodicii.
    melodica_mouthpiece_type:
      name: Tipul muștiucului melodicii
      description: Interfață de suflare inclusă în melodică (muștiuc și/sau tub flexibil).
    melodica_reed_plate_material:
      name: Materialul plăcii cu ancii pentru melodică
      description: Materialul plăcii anciei (distins de materialul general al corpului
        instrumentului), care poate afecta durabilitatea și tonul.
    melodica_size_class:
      name: Clasa dimensională a melodicii
      description: Clasa generală de dimensiune și portabilitate pentru o melodică,
        de obicei stabilită în funcție de numărul de clape și forma constructivă (de
        exemplu, mini/educațional, standard sau modele cu registru extins).
    melon_variety:
      name: Soi de pepene
      description: Specifică tipul specific de pepene din produs pentru a ajuta cumpărătorul
        să identifice rapid varietatea preferată.
    memory_foam_infusion_material:
      name: Material de infuzie din spumă cu memorie
      description: Identifică substanțele speciale infuzate în spuma cu memorie pentru
        răcorire, controlul mirosurilor sau scopuri antimicrobiene.
    memory_wire_gauge:
      name: Calibru de sârmă cu memorie
      description: Specifică dimensiunea American Wire Gauge (AWG) a firului de memorie.
    memory_wire_project_size:
      name: Dimensiunea proiectului de fir de memorie
      description: Specifică forma/dimensiunea bobinei pentru care este modelată bijuteria
        cu memorie (de exemplu, brățară, colier, inel).
    metal_purity:
      name: Puritatea metalului
      description: Indică finețea sau gradul de puritate al metalului utilizat în
        bijuterii, exprimat de obicei în karate (K) sau părți la mie.
    metrics_counted:
      name: Număr de măsurători
      description: Enumeră statisticile sau evenimentele individuale pe care contorul
        este proiectat să le urmărească.
    metronome_display_style:
      name: Stilul de afișare al metronomului
      description: Specifică modul în care tempo-ul este afișat/indicat utilizatorului
        (ac/pendul vs. LED/LCD numeric vs. lumină intermitentă).
    metronome_output_method:
      name: Metoda de ieșire a metronomului
      description: Specifică metodele de ieșire disponibile pentru semnalul sonor/ritm
        al metronomului.
    microphone_toy_feature_set:
      name: Set de caracteristici ale jucăriei microfon
      description: Microfon cu funcții cheie pentru joacă, potrivit pentru microfoane
        de jucărie (efecte vocale, amplificare, înregistrare etc.).
    midi_output_type:
      name: Tip de ieșire MIDI
      description: Specifică tipul (tipurile) de ieșire MIDI furnizate de modulul
        declanșator.
    military_branch:
      name: Sucursală militară
      description: Identifică sucursala militară pentru care este emisă uniforma sau
        din care este inspirată.
    milk_base_type:
      name: Tipul de bază din lapte
      description: Specifică laptele principal sau alternativa la lapte utilizată
        în băutură, dacă există.
    milk_feeding_method:
      name: Metoda de hrănire cu lapte
      description: Indică modul în care au fost hrănite animalele sursă (de exemplu,
        hrănite cu iarbă sau cu cereale), ceea ce poate Influence aroma și profilul
        nutrițional.
    milk_processing_method:
      name: Metodă de procesare a laptelui
      description: Specifică tratamentul sau tehnica de procesare la care a fost supus
        laptele, care afectează siguranța, durata de viață a plutei și proprietățile
        nutriționale.
    milk_source_animal:
      name: Animalul sursă al laptelui
      description: Identifică animalul de la care a fost obținut laptele, ajutând
        consumatorii să selecteze lactate de vacă, capră, bivoliță sau alte produse
        lactate de origine animală.
    millet_processing_method:
      name: Metoda de procesare a meiului
      description: Indică metoda principală de prelucrare sau starea bobului de mei
        (de exemplu, neșlefuit, decorticat, încolțit).
    millet_variety:
      name: Varietate de mei
      description: Identifică tipul specific de mei conținut în produs (de exemplu,
        mei perlat, mei coada-șoricelului, mei degetar).
    milling_process:
      name: Procesul de măcinare
      description: Indică metoda de producție utilizată pentru măcinarea făinii, care
        poate Influence aroma, expunerea la căldură și profilul nutrițional.
    mint_mark:
      name: Semnul monetăriei
      description: Semnul monetăriei așa cum este afișat pe monedă (dacă este cazul).
    mirror_configuration:
      name: Configurația oglinzii
      description: Specifică stilul sau structura oglinzii incluse în setul de toaletă.
    mirror_coverage:
      name: Acoperire oglindă
      description: Descrie întinderea panourilor de oglindă de pe ușile glisante.
    mirror_curvature_type:
      name: Tipul de curbură a oglinzii
      description: Specifică dacă suprafața oglinzii este convexă, plană sau concavă,
        influențând câmpul vizual.
    mirror_mounting_location:
      name: Locație de montare a oglinzii
      description: Specifică locul pe bicicletă sau pe ciclist unde este destinată
        montarea oglinzii.
    mirror_shape:
      name: Forma oglinzii
      description: Indică forma geometrică sau stilul oglinzii principale incluse
        în setul de măsuță de toaletă.
    mix_ratio:
      name: Raportul de amestec
      description: Specifică raportul de diluție recomandat agent de răcire-apă (pentru
        concentrate) sau confirmă raportul fix de preamestec pentru produse prediluate.
    mma_glove_type:
      name: Tipul de mănușă MMA
      description: Indică utilizarea principală sau stilul mănușii în cadrul antrenamentului
        sau competiției MMA.
    mobility_features:
      name: Caracteristici de mobilitate
      description: Indică elemente încorporate de mișcare sau portabilitate, cum ar
        fi rotile sau picioare pliabile.
    model_aircraft_assembly_level:
      name: Nivelul de asamblare al modelului de aeronavă
      description: Indică cât de multă construcție este necesară înainte ca aeronava
        să poată fi utilizată.
    model_making_kit_items_included:
      name: Kit de modelism inclus
      description: Enumeră ce este inclus într-un kit sau pachet de modelare (de exemplu,
        vopsea, lipici, pensulă).
    model_making_product_type:
      name: Sfaturi de produs pentru realizarea de modele
      description: Identifică ce este în esență articolul în modelism (kit, accesoriu,
        unealtă sau consumabil), pentru a îmbunătăți navigarea și filtrarea între
        tipuri de produse din modelism.
    model_rocket_kit_contents:
      name: Conținutul kitului de rachetă de modelism
      description: Indică dacă produsul este un kit complet de rachetă de modelism
        cu mai multe trepte sau un set de extensie/modul/piese (de exemplu, componente
        pentru treapta de propulsie sau treapta de susținere).
    model_rocket_kit_format:
      name: Format al kitului pentru rachetomodelism
      description: Specifică dacă racheta este vândută ca kit și nivelul de pregătire
        pentru asamblare.
    model_rocket_motor_impulse_class:
      name: Clasa de impuls a motorului pentru rachete de modelism
      description: Indică clasa standardizată de impuls total a motorului pentru rachete
        de modelism (de exemplu, A, B, C etc.).
    model_rocket_motor_mount_size:
      name: Dimensiunea suportului pentru motorul rachetei de modelism
      description: Specifică diametrul carcasei motorului pe care este proiectat să
        îl accepte suportul motorului rachetei.
    model_rocket_power_source_required:
      name: Necesită o sursă de energie pentru modelul de rachetă
      description: Indică dacă produsul necesită baterii/alimentare externă și de
        ce tip.
    model_rocket_propellant_type:
      name: Tip de propulsor pentru rachetă model
      description: Identifică sistemul de propulsie sau tipul de motor utilizat pentru
        propulsia produselor de rachete de modelism.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Dimensiunea recomandată a tijei sau șinei de lansare pentru racheta de
        modelism
      description: Specifică diametrul tijei de lansare sau dimensiunea șinei de lansare
        pentru care este proiectată racheta (de exemplu, tijă de 1/8 in, șină de lansare
        1010).
    model_rocket_recovery_method:
      name: Metoda de recuperare a modelului de rachetă
      description: Sistemul principal de recuperare utilizat pentru a readuce racheta
        în siguranță după zbor.
    model_rocket_recovery_system_type:
      name: Tipul sistemului de recuperare a rachetelor model
      description: Specifică metoda principală de recuperare utilizată pentru returnarea
        rachetei în siguranță după zbor.
    model_rocket_staging:
      name: Numărul de etape al rachetei de modelism
      description: Indică numărul de etape motorizate cu care este proiectat să zboare
        racheta de modelism.
    model_train_accessory_electrical_connection_type:
      name: Tipul de conexiune electrică a accesoriului pentru trenulețe
      description: Specifică tipul de conector sau terminal utilizat pentru conectarea
        accesoriilor alimentate ale trenurilor de modelism la rețea (acolo unde este
        aplicabil).
    model_train_coupler_type:
      name: Tipul cuplei pentru trenuri de modelism
      description: Specifică standardul de cuplare instalat pe materialul rulant sau
        pe locomotivă pentru trenul de modelism.
    model_train_gauge:
      name: Ecartament pentru trenulețe de modelism
      description: Specifică ecartamentul sistemului de cale ferată de modelism pentru
        care este destinat accesoriul (acolo unde este aplicabil), ajutând la asigurarea
        compatibilității fizice cu șinele și diorama utilizatorului.
    model_train_lighting_features:
      name: Caracteristici de iluminare pentru trenulețe de modelism
      description: Specifică funcționalitatea de iluminare inclusă pe locomotivă sau
        trenul de modelism.
    model_train_power_pickup_method:
      name: Metoda de ridicare a puterii trenului de modelism
      description: Specifică modul în care modelul primește energie pentru funcționare
        (alimentare, baterie etc.).
    model_train_scale:
      name: Scară pentru trenulețe de modelism
      description: Specifică scara/dimensiunea standard a trenului de modelism (relația
        dintre model și trenul real).
    model_train_sound_features:
      name: Caracteristici sonore ale trenului de modelism
      description: Indică dacă modelul include efecte sonore integrate și ce tip de
        sunet oferă.
    model_train_track_gauge:
      name: Ecartamentul șinelor pentru trenuri de modelism
      description: Specifică ecartamentul sau sistemul de cale ferată pentru care
        este proiectat modelul (de exemplu, ecartament standard, variante de ecartament
        îngust sau sisteme/ecartamente specifice anumitor mărci).
    modeling_dough_base_material:
      name: Materialul de bază al plastilinei pentru modelaj
      description: Compoziția de bază a plastilinei pentru modelaj (de exemplu, pe
        bază de făină/grâu sau pe bază de polimeri).
    modeling_dough_features:
      name: Caracteristicile plastilinei pentru modelaj
      description: Caracteristicile funcționale principale ale plastilinei pentru
        modelaj pe care cumpărătorii le folosesc frecvent pentru filtrare.
    modification_level:
      name: Nivel de modificare
      description: Indică gradul de modificare a malțului (cât de complet sunt descompuse
        endospermul/proteinele orzului), adesea rezumat ca submodificat/modificat/supramodificat.
    molasses_base_ingredient:
      name: Ingredientul de bază al melasei
      description: Identifică sursa principală de plantă sau fruct din care se produce
        melasa.
    molasses_grade:
      name: Grad melasă
      description: Clasifică melasa în funcție de etapa de extracție/rafinare, care
        afectează direct intensitatea aromei, culoarea și profilul nutrițional.
    mold_material:
      name: Materialul matriței
      description: Compoziția materialului principal al matriței în sine (de exemplu,
        silicon, plastic, metal).
    molle_compatibility:
      name: Compatibilitate MOLLE
      description: Indică dacă vesta este prevăzută cu chingi MOLLE/PALS pentru atașarea
        pungilor și accesoriilor modulare.
    motor_belt_type:
      name: Tipul curelei motorului
      description: Definește designul/profilul curelei utilizate în sistemul de acționare
        al benzii de alergare.
    motor_configuration:
      name: Configurația motorului
      description: Indică câte motoare de acționare independente folosește scuterul.
    motor_mounting_configuration:
      name: Configurație de montare a motorului
      description: Descrie modul în care motorul este montat sau integrat în kitul
        de conversie pentru scuter.
    motor_mounting_position:
      name: Poziție de montare a motorului
      description: Indică locul de montare al motorului pe scuterul electric, cum
        ar fi butucul roții față, butucul roții spate, butucii ambelor roți sau transmisia
        centrală.
    motor_position:
      name: Poziția motorului
      description: Indică locul în care este amplasat motorul pe bicicleta electrică,
        influențând manevrabilitatea și întreținerea.
    motor_vehicle_a_v_integration_features:
      name: Funcții de integrare A/V pentru vehicule cu motor
      description: Funcții de integrare a smartphone-urilor și a vehiculului acceptate
        de unitatea principală (de exemplu, Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Aplicație/poziție bec autovehicul
      description: Specifică poziția de iluminare prevăzută a vehiculului sau Functions
        pentru care este proiectat becul (de exemplu, fază scurtă, lumină de frână).
    motor_vehicle_bulb_approval_standard:
      name: Becul autovehicul aprobat standard
      description: Indică conformitatea normativă/marcajul aprobare pentru utilizarea
        drumului în piață țintă.
    motor_vehicle_oxygen_sensor_bank:
      name: Banc de senzor de oxigen pentru autovehicule
      description: Indică banca de cilindri a motorului pe care se potrivește senzorul
        de oxigen (de exemplu, Banca 1 vs. Banca 2) pentru motoarele de tip V/boxer;
        utilizarea Nu se aplică pentru motoarele în linie.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Numărul de fire al senzorului de oxigen pentru vehicule
      description: Numărul de fire din cablajul senzorului de oxigen.
    motor_vehicle_oxygen_sensor_position:
      name: Poziția senzorului de oxigen pentru vehicule
      description: Specifică locul în care este instalat senzorul de oxigen (O2) în
        sistemul de evacuare în raport cu convertorul catalitic.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Numărul senzorului de oxigen al vehiculului
      description: Indică numărul senzorului (de exemplu, Senzor 1 sau Senzor 2) dintr-o
        anumită bancă/poziție.
    motor_vehicle_oxygen_sensor_type:
      name: Banc senzor de oxigen pentru autovehicule
      description: Specifică designul/tehnologia senzorului de oxigen.
    motor_vehicle_paint_application_method:
      name: Metoda de aplicare a vopselei autovehiculelor
      description: Modul în care se intenționează aplicarea vopselei pe suprafața
        vehiculului.
    motor_vehicle_paint_system_step:
      name: Etapa sistemului de vopsire a autovehiculelor
      description: Indică etapa sau componenta unui sistem de vopsire pentru refinisarea
        auto pentru care este destinat produsul (de exemplu, grund, strat de bază,
        lac transparent).
    motor_vehicle_speaker_mounting_type:
      name: Tip de montare a difuzorului pentru vehicule
      description: Modul în care este destinată instalarea difuzorului în vehicul
        (factorul de formă de montare).
    motor_vehicle_subwoofer_size:
      name: Dimensiune a subwooferului auto
      description: Diametrul nominal al driverului subwooferului (de exemplu, 8 in,
        10 in, 12 in), utilizat pentru a se potrivi spațiului din vehicul și compatibilității
        carcasei.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Configurația bobinei vocale a subwooferului pentru vehicule cu motor
      description: Numărul/configurația bobinelor vocale utilizate pentru a potrivi
        opțiunile de cablare ale amplificatorului (de exemplu, SVC vs. DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedanța bobinei vocale a subwooferului autovehiculului (per bobină)
      description: Impedanța nominală a fiecărei bobine mobile (nu cea cablată final),
        utilizată pentru calculele de cablare.
    motor_vehicle_voltage_regulator_type:
      name: Tip regulator de tensiune pentru vehicule cu motor
      description: Indică tehnologia/forma regulatorului utilizată în autovehicule.
    motorcycle_armor_certification_standard:
      name: Standard de certificare a protecțiilor pentru motocicliști
      description: Indică standardul (standardele) oficial(e) de siguranță pe care
        protectorul este certificat să le îndeplinească (de exemplu, EN 1621-2 pentru
        protectorii de spate, EN 1621-3 pentru piept).
    motorcycle_cover_size_class:
      name: Clasa de dimensiune a husei pentru motocicletă
      description: Găleată cu dimensiuni standardizate pentru huse de depozitare pentru
        motociclete, bazată pe categoria/intervalul de lungimi tipic al motocicletei
        la care se potrivește.
    motorcycle_glove_certification_standard:
      name: Standard de certificare a mănușilor pentru motociclete
      description: Specifică certificarea/standardul de protecție cu care respectă
        mănușile (de exemplu, nivelurile EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Mănuși de motocicletă cu construcție impermeabilă
      description: Specifică tipul de metodă de impermeabilizare utilizată în mănușă
        (dacă există).
    motorcycle_guard_coverage_area:
      name: Zona de protecție acoperită de protecția pentru motocicletă
      description: Zona principală de acoperire asigurată de produs (cot, încheietura
        mâinii, antebraț, combinație).
    motorcycle_kidney_belt_construction_type:
      name: Tipul de construcție al centurii lombare pentru motocicletă
      description: Stilul de construcție al centurii lombare, care influențează rigiditatea,
        circulația aerului și protecția.
    motorcycle_kidney_belt_purpose:
      name: Scopul centurii lombare pentru motocicletă
      description: Identifică stilul de condus sau scenariul principal pentru care
        este proiectată centura lombară pentru motocicletă.
    motorcycle_luggage_capacity_class:
      name: Clasa de capacitate a bagajului pentru motocicletă
      description: Indică capacitatea volumică a bagajului motocicletei, exprimată
        în litri.
    motorcycle_luggage_mounting_system:
      name: Sistem de montare a bagajelor pentru motociclete
      description: Sistem de fixare/montare utilizat pentru fixarea genții/coșului
        pe motocicletă (de exemplu, curele de prindere, sistem de eliberare rapidă
        montat pe plută).
    motorcycle_luggage_side:
      name: Partea sistemului de bagaje pentru motocicletă
      description: Pentru genți laterale de motocicletă, indică dacă produsul este
        pentru stânga, dreapta sau pentru set.
    motorcycle_protective_gear_size_system:
      name: Sistem de dimensiune a echipamentului de protecție pentru motociclete
      description: Sistemul de dimensiuni pentru echipamentul de protecție pentru
        motocicletă.
    motorcycle_rack_carrier_style:
      name: Stil transportator cu plută pentru motociclete
      description: Descrie tipul de transportator utilizat pentru transportul unei
        motociclete sau a unui scuter (de exemplu, platformă, șine sau sistem cu ridicare
        asistată).
    motorcycle_riding_discipline:
      name: Disciplina la condusul motocicletei
      description: Identifică disciplina principală de pilotaj/utilizare pentru care
        este conceput suportul cervical.
    motorcycle_tire_speed_rating:
      name: Indicele de viteză al anvelopelor pentru motociclete
      description: Identifică viteza maximă susținută pentru care este clasificată
        anvelopa, utilizând codul standard cu litere (de exemplu, H, V, W).
    motorsport_window_net_certification:
      name: Certificare plasă pentru ferestre pentru sporturi sportive
      description: Certificarea sau omologarea siguranței în curse pe care o îndeplinește
        plasa pentru geam (de exemplu, SFI sau FIA), inclusiv numărul specificațiilor,
        dacă este cazul.
    mound_usage_type:
      name: Tipul de utilizare al suportului de montare
      description: Identifică mediul de utilizare al suportului (mound), cum ar fi
        antrenament, meci, bullpen sau utilizare multifuncțională.
    mount_attachment_method:
      name: Metodă de atașare a suportului
      description: Specifică modul în care se atașează suportul la suprafața/structura
        vehiculului.
    mountainboard_truck_type:
      name: Tipul de axe pentru mountainboard
      description: Clasifică stilul de camioane incluse în placă, afectând răspunsul
        la viraje și durabilitatea.
    mounting_attachment_method:
      name: Metoda de montare/atașare
      description: Cum este conceput suportul/sacul pentru a se atașa la un tambur,
        suport, curea sau altă suprafață.
    mounting_attachment_type:
      name: Tip de montare/atașare
      description: Modul în care accesoriul de raport se fixează sau se conectează
        la roata de tors.
    mounting_hardware_included_for_installation:
      name: Accesorii de montare incluse (pentru instalare)
      description: Indică dacă elementele de fixare necesare pentru montarea scaunului
        din spate (de exemplu, suporturi, șuruburi, șine) sunt incluse în pachetul
        produsului.
    mounting_location:
      name: Locații de montare
      description: Specifică zona de poziționare prevăzută pe echipament sau pe caroserie
        pentru lumină/reflector (de exemplu, furcă față, cască, spițe roată).
    mounting_method:
      name: Metoda de montare
      description: Cum se montează sau se atașează un suport pentru băț/perie (de
        exemplu, cu clemă, cu bandă, cu adeziv).
    mounting_position:
      name: Poziție de montare
      description: Specifică locul în care este destinată montarea/instalarea comenzii
        frânei de mână în cabina vehiculului.
    mounting_rail_type:
      name: Tipul șinei de montare
      description: Specifică șina sau standardul de interfață la care se atașează
        accesoriul, cum ar fi Picatinny sau M-LOK.
    mounting_receiver_size:
      name: Dimensiunile receptorului de montare
      description: Dimensiunile cârligului receptor necesare pentru pluta de marfă
        montată pe cârlig.
    mounting_storage_type:
      name: Tip de montare/depozitare
      description: Modul în care dispozitivul este destinat a fi montat sau depozitat
        pe navă/persoană.
    mouth_grip_type:
      name: Tip de prindere bucală
      description: Descrie tipul de mâner sau protecție pentru fluier pentru confort
        și igienă.
    mouthguard_mold_type:
      name: Tipul de matriță pentru gutieră
      description: Descrie modul în care gutiera este fixată pe dinții atletului (de
        exemplu, metoda fierbere-și-mușcare, potrivire dentară personalizată).
    mouthpiece_facing_length:
      name: Lungimea părții frontale a muștiucului
      description: Indică categoria lungimii curbei orientate spre muștiuc (nu lungimea
        totală a muștiucului), care afectează răspunsul, rezistența și compatibilitatea
        anciei.
    mouthpiece_material:
      name: Materialul muștiucului
      description: Precizează materialul din care este realizată partea piesei bucale/vârfului
        care intră în contact cu gura la un fluier de petrecere, care poate fi diferit
        de materialul corpului principal.
    mouthpiece_shank_receiver_size:
      name: Dimensiunea muştiucului/receptorului
      description: Specifică standardul pentru soclul/tija piesei bucale compatibil
        cu flautul.
    mouthpiece_shank_size:
      name: Dimensiunea tijei muștiucului
      description: Specifică standardul de potrivire a tijei/receptorului muștiucului
        pentru a asigura compatibilitatea cu instrumentul de alamă destinat.
    mouthpiece_shank_type:
      name: Tip de tijă pentru muștiuc
      description: Specifică standardul pentru receptorul/coada muștiucului pentru
        compatibilitate (unde este cazul).
    mouthpiece_style:
      name: Stil de muștiuc
      description: Clasifică designul/forma muștiucului bitului cu arc, care influențează
        punctele de presiune, intensitatea acțiunii și preferințele calului.
    mouthpiece_type:
      name: Tip de muștiuc
      description: Tipul de muștiuc la capătul de suflare (încorporat, detașabil sau
        supliment).
    movement_mechanism:
      name: Mecanismul de mișcare
      description: Definește modul în care se mișcă banca în timpul utilizării (balansare,
        alunecare, legănare etc.).
    muffin_size:
      name: Dimensiunea brioșei
      description: Clasifică formatul dimensiunii fizice a produsului de brioșe (de
        exemplu, mini, standard, jumbo).
    mushroom_variety:
      name: Varietate de ciuperci
      description: Identifică specia sau varietatea specifică de ciuperci sau trufe
        conținute în produs (de exemplu, Shiitake, Stridie regală, Trufă neagră).
    music_stand_desk_tilt_adjustment:
      name: Reglarea înclinării pupitrului pentru partituri
      description: Indică dacă și cum poate fi reglat unghiul pupitrului.
    music_stand_intended_use:
      name: Destinația de utilizare a pupitrului
      description: Indică principalul context de utilizare/scopul pentru care a fost
        conceput pupitrul.
    musical_block_pitch_type:
      name: Tip de tonalitate a blocului muzical
      description: Descrie dacă blocul muzical produce o înălțime definită (acordată)
        sau o înălțime nedefinită.
    musical_box_mechanism_type:
      name: Tipul mecanismului cutiei muzicale
      description: Cum produce/redă cutia muzicală sunetul (de exemplu, mișcarea de
        înfășurare vs. redarea electronică).
    musical_keyboard_case_fit_type:
      name: Tip carcasă pentru claviatură muzicală
      description: Descrie modul în care dimensiunea carcasei se adaptează la instrument
        (de exemplu, gama de dimensiuni universale/generice față de dimensiuni specifice
        modelului/personalizate).
    musical_ratchet_sound_character:
      name: Caracterul sonor al clichetului muzical
      description: Descriere generală a timbrului/intensității sunetului clichetului.
    musical_scraper_groove_surface_material:
      name: Material de suprafață pentru canelura racletei muzicale
      description: Specifică materialul suprafeței de răzuire striate/canelate (poate
        varia de materialul corpului).
    musical_scraper_type:
      name: Tip racletă muzicală
      description: Precizează stilul/designul instrumentului muzical de tip racletă
        (de exemplu, guiro sau reco-reco), care influențează sunetul și tehnica de
        interpretare.
    mute_attachment_method:
      name: Metodă de atașare a surdinei
      description: Precizează modul în care un amortizor de taler se fixează sau se
        menține pe taler (de exemplu, cu gel, prin aderență statică, cu magnet, cu
        clemă).
    mute_attenuation_level:
      name: Nivelul de atenuare a sunetului
      description: Indică cât de mult reduce surdina volumul perceput, relevant în
        special pentru surdinele de exerciții.
    mute_cork_padding_material:
      name: Material surdină din plută / material de amortizare
      description: Precizează materialul din care este realizată căptușeala de contact
        a surdinei (de exemplu, benzi sau tampoane din plută) utilizată pentru aderență/fixare
        și pentru protecția clopotului.
    mute_coverage_type:
      name: Tip de acoperire a surdinei
      description: Indică stilul/acoperirea surdinei pe suprafața de cântat, de la
        amortizoare punctuale mici până la surdine de exerciții pe toată suprafața.
    mute_finish:
      name: Finisaj pentru surdină
      description: Finisajul suprafeței surdinei care poate afecta durabilitatea și
        estetica (de exemplu, lustruit vs. satinat).
    name_label_text_template:
      name: Șablon pentru textul etichetei de nume
      description: Specifică textul prestabilit sau șablonul imprimat pe eticheta
        de nume (de ex. „Aparține lui”, „Realizat de”).
    napkin_ply:
      name: Straturi ale șervețelului
      description: Indică grosimea șervețelului de cocktail după numărul de straturi
        (pliuri).
    neck_brace_fit_system:
      name: Sistem de fixare a ortezei cervicale
      description: Indică metoda principală utilizată pentru reglarea și fixarea ortezei
        cervicale pe utilizator.
    neck_brace_size_basis:
      name: Baza dimensiunilor ortezei cervicale
      description: Indică baza de dimensionare utilizată pentru alegerea dimensiunilor
        corecte ale ortezei cervicale.
    neck_configuration:
      name: Configurație a gâtului
      description: Specifică tipul/configurația gâtului inclus(ă) cu saxofonul, care
        influențează ergonomia și ușurința în interpretare.
    neck_coverage_type:
      name: Tip de acoperire a gâtului
      description: Specifică tipul de acoperire a zonei gâtului inclus(ă) cu pătura.
    neck_support_size_system:
      name: Sistem de dimensiune al suportului cervical
      description: Indică sistemul de dimensiune utilizat pentru orteza/asistența
        cervicală de curse (de exemplu, adult, tânăr sau o singură dimensiune).
    necklace_length_type:
      name: Tip de lungime a colierului
      description: Specifică categoria convențională de lungime a colierului, cum
        ar fi choker sau operă, pentru a facilita cumpărăturile în funcție de stil.
    needle_balance_zone:
      name: Zona de echilibrare a acului
      description: Indică zona magnetică sau emisfera pentru care este acordat acul
        busolei, asigurând citiri precise la nivel mondial.
    needle_case_format:
      name: Formatul cutiei pentru ace
      description: Factorul de formă general al organizatorului pentru cutia de ace.
    needle_damping_type:
      name: Tip de amortizare a acului
      description: Descrie modul în care este stabilizat acul busolei (de ex. cu lichid,
        uscat sau stabilizare electronică), ceea ce influențează timpul de stabilizare
        și durabilitatea.
    needle_felting_needle_profile:
      name: Profilul acului de împâslire
      description: Secțiunea transversală/profilul acului de împâslire, care influențează
        modul în care fibrele sunt deplasate și finisajul obținut.
    needle_holder_features:
      name: Caracteristicile suportului pentru ace
      description: Caracteristici funcționale notabile ale suportului pentru ac.
    needle_holder_mounting_attachment_method:
      name: Metoda de montare/atașare a suportului pentru ace
      description: Cum este destinat să fie atașat sau utilizat suportul pentru ac
        în timpul depozitării (de exemplu, magnetic, cu clemă, curea).
    needle_holder_style:
      name: Stilul suportului pentru ace
      description: Stilul/designul fizic de depozitare sau transport al suportului
        pentru ace.
    needle_pushing_surface_type:
      name: Tipul suprafeței de împingere a acului
      description: Tipul/modelul suprafeței de împingere a acului pe palma mâinii
        de cusut (de exemplu, adâncitură metalică, monedă sau plasture întărit).
    needle_requirement_beading_pattern:
      name: Cerințe privind acul (model de mărgelire)
      description: Tipul/dimensiunea acului recomandate de model.
    needle_size_system:
      name: Sistem de dimensiuni ale acului
      description: Standardul de dimensionare utilizat pentru etichetarea mărimii
        acului.
    needle_threader_compatible_needle_type:
      name: Tip de ac compatibil cu dispozitivul de înfilare a acului
      description: Specifică tipurile de ace cu care este proiectat să funcționeze
        dispozitivul de înfilare (după categoria/utilizarea acului).
    needle_threader_mechanism_type:
      name: Tip de mecanism pentru introducerea aței în ac
      description: Descrie modul în care dispozitivul de înfilare prinde/trage firul
        prin urechea acului.
    needle_threader_packaging_type:
      name: Tipul de ambalaj al înfilatorului de ac
      description: Cum este vândut/ambalat produsul (pachet individual vs. pachet
        multiplu vs. set).
    needlecraft_fabric_color_family:
      name: Familia de culori a țesăturii pentru lucrul cu acul
      description: Familia de culori normalizată pentru țesătură uniformă (utilizată
        alături de culoare pentru fațete).
    needlecraft_fabric_composition:
      name: Compoziția țesăturii pentru lucru cu acul
      description: Specifică compoziția/amestecul de fibre al materialului pentru
        lucru manual (de exemplu, 100% bumbac, amestec de in/bumbac).
    needlecraft_fabric_weave_type:
      name: Tip de țesătură din material textil pentru lucru manual
      description: Specifică tipul de țesătură/structură a pânzei pentru lucrul cu
        acul (de ex. țesătură uniformă vs in tradițional), care influențează comportamentul
        cusăturilor și aspectul final.
    needlecraft_kit_items_included:
      name: Kit de lucru cu ac inclus
      description: Enumeră principalele componente incluse în kit de lucru cu acul
        (scule și consumabile).
    needlecraft_kit_project_type:
      name: Tip de proiect kit de lucru cu acul
      description: Identifică articolul finit realizat de kit (rezultatul proiectului).
    needlecraft_stitching_coverage:
      name: Acoperire cusătură cu acul
      description: Indică dacă materialul este cusut peste un fir/un pătrat sau peste
        două fire (utilizat frecvent pentru țesături uniforme și in).
    needlepoint_canvas_mesh_count:
      name: Numărul de ochiuri pe inch al pânzei pentru goblen
      description: Numărul de ochiuri al pânzei (fire pe inch) pentru care este conceput
        modelul (denumit în mod obișnuit „număr de pânză”)
    needlepoint_frame_canvas_attachment_method:
      name: Metoda de fixare a pânzei de goblen pe cadru
      description: Descrie modul în care pânza de goblen este fixată pe cadrul de
        brodat.
    needlepoint_frame_compatible_stand_type:
      name: Tipul de suport compatibil cu cadrul de goblen pentru brodat
      description: Indică dacă cadrul este proiectat pentru montare pe un suport și
        specifică tipurile de suporturi compatibile.
    needlepoint_frame_contents:
      name: Conținutul cadrului de goblen
      description: Specifică ce componente și accesorii sunt incluse cu cadrul de
        goblen (de ex. cadru, bare/tije suplimentare, pioneze, benzi de prindere,
        geantă de transport).
    needlepoint_frame_tension_adjustment_type:
      name: Tipul de ajustare a tensiunii pentru cadrul de goblen
      description: Indică modul în care (sau dacă) tensiunea cadrului poate fi ajustată
        în timpul utilizării.
    needlepoint_pattern_chart_format:
      name: Format al diagramei de model pentru goblen
      description: Modul în care designul de goblen este reprezentat pentru cusut
        (diagramă sau ghid imprimat/pictat).
    needlepoint_project_type:
      name: Tipul proiectului de goblen
      description: Categoria sau tipul de produs finit pentru care este conceput modelul
        de goblen.
    net_design:
      name: Designul plasei
      description: Identifică tipul de construcție al plasei, indicând dacă aceasta
        se poate retrage sau plia pentru portabilitate.
    net_mesh_pattern:
      name: Tiparul ochiurilor plasei
      description: Specifică forma geometrică a ochiurilor plasei, care poate influența
        vizibilitatea și rezistența.
    net_twine_gauge:
      name: Grosimea sforii plasei
      description: Indică grosimea sau rezistența sforii plasei, exprimată în mod
        tradițional printr-un număr de calibru (de ex. 18, 36).
    nicotine_source:
      name: Sursă de nicotină
      description: Indică dacă nicotina din produs este derivată din tutun, sintetică
        sau dacă produsul nu conține nicotină.
    nipple_drive_interface:
      name: Interfața de strângere a niplului de spiță
      description: Identifică stilul/standardul interfeței de acționare sau al capului
        niplului (extern sau intern), determinând unealta necesară și metoda de montare
        a roții.
    nock_activation_method:
      name: Metoda de activare a crestăturii săgeții
      description: Specifică mecanismul prin care LED-ul crestăturii săgeții luminoase
        este pornit sau oprit (de ex. presiunea corzii arcului, senzor de mișcare
        sau întrerupător manual).
    nock_fitment_code:
      name: Cod de montare a crestăturii
      description: Codul producătorului sau al industriei care identifică familia/seria
        de croșete din care face parte.
    nock_throat_size:
      name: Dimensiunea gâtului crestăturii
      description: Specifică dimensiunea gâtului crestăturii (canalului) care se fixează
        pe coarda arcului.
    nock_transparency_level:
      name: Nivel de transparență a crestăturii săgeții
      description: Descrie cât de transparent este materialul crestăturii săgeții
        — transparent, translucid, opac sau fosforescent — influențând vizibilitatea
        și aspectul estetic.
    nock_type:
      name: Tipul de crestătură
      description: Specifică tipul de crestătură a săgeții sau bolțului, de exemplu
        tip pin, semi-lună sau luminoasă.
    noise_reduction_type:
      name: Tip de reducere a zgomotului
      description: Specifică tehnologia de reducere a zgomotului utilizată (sau absența
        acesteia) în setul de cască integrat, dacă este cazul.
    noise_suppression_technology:
      name: Tehnologie de suprimare a zgomotului
      description: Specifică dacă produsul utilizează amortizare pasivă sau circuite
        electronice active care comprimă sunete puternice și/sau amplifică sunetul
        ambiental.
    non_slip_base_features:
      name: Caracteristici ale bazei antiderapante
      description: Indică caracteristicile antiderapante incluse pentru a împiedica
        mișcarea pedalei în timpul performanței.
    nose_bridge_type:
      name: Tipul de punte nazală
      description: Indică designul punții nazale, care afectează potrivirea pe diferite
        dimensiuni ale feței.
    nose_clip_accessories_included:
      name: Accesorii pentru cleme de nas incluse
      description: Enumeră orice accesorii suplimentare furnizate împreună cu clema
        nazală pentru înot (de ex. dopuri pentru urechi, cutie de depozitare).
    nose_clip_features:
      name: Caracteristicile clemei nazale
      description: Evidențiază caracteristicile funcționale sau de confort generale
        ale clemei nazale.
    nose_coverage_style:
      name: Stil de acoperire a nasului
      description: Indică prezența și tipul panoului de protecție pentru nas sau bot
        de pe masca anti-muște.
    noseband_type:
      name: Tipul de bandă nazală
      description: Specifică designul benzilor nazale (dacă există) furnizate împreună
        cu hățurile.
    number_of_canvas_meshes:
      name: Numărul de ochiuri ale pânzei
      description: Dimensiunea ochiurilor foii de pânză plastică, exprimată în găuri
        pe inch (HPI) sau număr de găuri, care determină dimensiunea cusăturii și
        detaliile proiectului.
    number_of_chainrings:
      name: Numărul de foi de angrenaj
      description: Indică numărul de foi pentru care este proiectată sau cu care este
        livrată angrenajul pedalier.
    number_of_control_stations:
      name: Numărul de stații de control
      description: Indică numărul de posturi de comandă (cârmă) suportate de setul
        de control (un singur post vs două posturi etc.).
    number_of_digits:
      name: Număr de cifre
      description: Câte cifre afișează contorul (de exemplu, 1 cifră, 2 cifre, 3 cifre).
    number_of_guitar_slots:
      name: Numărul de sloturi pentru chitară
      description: Indică numărul de chitare pentru care este proiectată husa/cutia
        de transport.
    number_of_needlecraft_fabrics:
      name: Numărul de materiale textile pentru lucru cu acul
      description: Specifică densitatea țesăturii pentru pânza/materialul de lucru
        cu acul, exprimată de obicei în pătrate/fire pe inch (de ex. 14 ochiuri).
    number_of_plastic_canvas_meshes:
      name: Numărul de ochiuri al pânzei din plastic
      description: Specifică numărul de ochiuri ale pânzei din plastic (găuri pe inch),
        care determină dimensiunea cusăturii și nivelul de detalii al proiectului.
    number_of_quilting_frame_rails:
      name: Numărul de șine ale cadrului de matlasare
      description: Indică numărul de șine/role incluse în cadrul de matlasare (de
        ex. sisteme cu 2 șine vs 3 șine).
    number_of_rope_slots:
      name: Numărul de sloturi pentru cablu
      description: Indică dacă dispozitivul de asigurare este conceput pentru utilizare
        cu o singură coardă sau cu două coarde.
    number_of_switch_poles:
      name: Număr de poli ai comutatorului
      description: Numărul de circuite separate (poli) controlate de comutator (de
        exemplu, SPST, DPST).
    number_of_switch_throws:
      name: Numărul de acționări ale comutatorului
      description: Numărul de căi de ieșire (transmisii) per pol (de exemplu, SPDT).
    number_of_timing_chain_rows:
      name: Numărul de rânduri ale lanțului de distribuție
      description: Indică dacă lanțul de distribuție este cu un singur rând sau cu
        mai multe rânduri.
    number_of_trailer_axles:
      name: Numărul de axe ale remorcii
      description: Numărul de axe pe remorcă.
    number_of_wheel_pieces:
      name: Numărul de piese de roată
      description: Specifică dacă roata este construită dintr-o singură piesă, din
        două piese sau din trei piese.
    numbering_style:
      name: Stilul de numerotare
      description: Indică dacă și cum sunt prenumerotate dorsalele pentru identificarea
        echipei (de exemplu, nenumerotate, 1-10, personalizate).
    nunchuck_connector_type:
      name: Tipul conectorului pentru controlerul secundar de tip joystick
      description: Stilul de legătură dintre cele două mânere ale nunchack (bastoane
        legate) (de ex. sfoară, lanț, lanț cu articulație pivotantă).
    nursing_access:
      name: Acces alăptare
      description: Identifică metoda de acces pentru alăptare integrată în costumul
        de baie, dacă este cazul.
    nursing_access_type:
      name: Tip de acces alăptare
      description: Specifică modul în care articolul de îmbrăcăminte oferă acces la
        sân pentru alăptare sau pompare.
    nut_butter_texture:
      name: Textura untului de nuci
      description: Descrie consistența fizică a untului de nuci, astfel încât cumpărătorul
        să poată alege cu ușurință între fin, crocant etc.
    nutrient_fortification:
      name: Fortificarea cu nutrienți
      description: Identifică nutrienții cheie cu care este îmbogățită băutura sau
        produsul alimentar.
    oak_product_form:
      name: Formă a produsului din stejar
      description: Identifică tipul de stejar utilizat pentru maturarea/aromatizarea
        produselor.
    oak_toast_level:
      name: Nivel de prăjire a stejarului
      description: Specifică gradul de prăjire al produselor din stejar.
    oboe_case_capacity:
      name: Capacitatea tocului de oboi
      description: Indică instrumentul (instrumentele) și componentele principale
        pentru care a fost concepută cutia.
    oboe_case_carry_configuration:
      name: Modul de transport al cutiei pentru oboi
      description: Indică configurația principală de transport oferită de husă/geantă.
    oboe_case_design:
      name: Designul cutiei pentru oboi
      description: Clasifică structura/rigiditatea unei cutii sau a unei huse pentru
        oboi (de exemplu, rigidă, semirigidă, moale) pentru a indica nivelul de protecție.
    oboe_case_internal_fit_type:
      name: Tipul de amenajare interioară a cutiei pentru oboi
      description: Indică dacă interiorul este turnat pentru o configurație specifică
        a instrumentului sau utilizează compartimente reglabile.
    oboe_keywork_plating:
      name: Placare cu chei pentru oboi
      description: Specifică placarea/finisajul clapelor (claviilor) oboiului, separat
        de materialul corpului.
    oboe_strap_padding:
      name: Căptușeală pentru curea de oboi
      description: Descrie prezența/tipul de spațiere în zona de contact a curelei/asistenței
        pentru confort (de exemplu, zona umerilor/gâtului căptușită).
    oboe_swab_style:
      name: Stilul tamponului pentru oboi
      description: Specifică stilul funcțional/construcția unui bețișor de curățare
        pentru oboi (de exemplu, mătase ponderată, tip tracțiune).
    observation_window_material:
      name: Materialul ferestrei de vizualizare
      description: Specifică materialul panourilor/ferestrei de vizualizare (adesea,
        claritatea și durabilitatea Impact ).
    ocarina_accessories_included:
      name: Accesorii pentru ocarină incluse
      description: Accesoriile incluse împreună cu ocarina, cum ar fi o husă, o curea
        de gât sau un ghid de poziționare a degetelor.
    ocarina_chamber_count:
      name: Numărul camerelor ocarinei
      description: Indică numărul de camere pe care le are ocarina în linie, ceea
        ce afectează gama și complexitatea interpretării (simple/duble/triple etc.).
    ocarina_fingering_system:
      name: Sistem de digitație pentru ocarină
      description: Precizează sistemul/standardul de degetare pe care îl respectă
        ocarina suspendată (dacă este cazul).
    ocarina_finish_type:
      name: Tip de finisaj ocarină
      description: Finisajul suprafeței corpului ocarinei care afectează senzația
        și estetica.
    occupant_classification_sensor_support:
      name: Senzor de clasificare a ocupanților
      description: Indică dacă scaunul este echipat cu un senzor de clasificare/greutate
        a pasagerului sau dacă este prevăzut pentru transferul/instalarea senzorului
        original (de obicei în cazul scaunelor pasagerului din față).
    octave_harmonica_cover_plate_material:
      name: Materialul plăcii de acoperire pentru muzicuța octavă
      description: Materialul din care sunt realizate plăcile exterioare ale armonicii
        octave.
    octave_harmonica_tuning_system:
      name: Sistem de acordaj pentru muzicuța octavă
      description: Acordajul/temperamentul utilizat pentru armonica octavă.
    octoban_mounting_system_type:
      name: Tipul sistemului de montare Octoban
      description: Modul în care se montează/poziționează octobanul în timpul jocului
        (montare/suport/configurarea suportului).
    odor_control_features:
      name: Caracteristici de control al mirosurilor
      description: Indică dacă produsul oferă funcționalitate de neutralizare/dezodorizare
        a mirosurilor și prin ce abordare.
    office_furniture_items_included:
      name: Piese de mobilier de birou incluse
      description: Precizează articolele specifice de mobilier de birou incluse în
        set, cum ar fi un birou sau un dulap pentru dosare.
    oil_cooler_core_type:
      name: Tipul miezului radiatorului de ulei
      description: Specifică construcția internă a miezului răcitorului de ulei, care
        afectează eficiența răcirii, scăderea de presiune și durabilitatea.
    oil_cooler_mounting_style:
      name: Stilul de montare al răcitorului de ulei
      description: Descrie modul în care trebuie montat/instalat radiatorul de ulei
        pe vehicul.
    oil_dipstick_component_type:
      name: Tipul componentei jojei de ulei
      description: Specifică ce componentă de măsurare a nivelului de ulei este comercializată
        (de exemplu, doar lama/tija jojei, doar mânerul, ansamblul complet, tubul
        jojei etc.).
    oil_dipstick_measurement_markings:
      name: Marcajele de măsurare a jojei de ulei
      description: Specifică ce marcaje/scală sunt prezente pe joja pentru citirea
        nivelului de ulei.
    oil_dipstick_tube_mounting_type:
      name: Tip de montare a tubului jojei de ulei
      description: Specifică modul în care tubul jojei de ulei este fixat sau montat
        pe motor sau pe blocul motor.
    oil_drain_plug_head_drive_type:
      name: Tip acționare cu cap de scurgere a uleiului
      description: Specifică interfața de cuplare a sculei de pe capul dopului de
        golire a uleiului utilizat pentru instalare și demontare.
    oil_drain_plug_magnet_type:
      name: Șurub de scurgere a uleiului cu magnet
      description: Specifică dacă dopul de golire este magnetic și, dacă da, ce model
        este.
    oil_fill_cap_type:
      name: Tipul capacului de umplere cu ulei
      description: Stilul/tipul interfeței capacului de umplere cu ulei utilizată
        de capacul supapei (dacă este cazul).
    oil_filler_cap_attachment_type:
      name: Tipul de atașare al capacului de umplere cu ulei
      description: Specifică modul în care este fixat capacul de umplere cu ulei pe
        motor/șutul de umplere cu ulei (de exemplu, fixare prin presare, baionetă/sfert
        de tură).
    oil_filler_cap_installation_position:
      name: Poziția de instalare a capacului de umplere cu ulei
      description: Specifică locul în care se utilizează capacul atunci când există
        mai multe puncte de umplere cu ulei (de exemplu, capacul supapei, tubul de
        umplere la distanță).
    oil_filler_cap_locking_type:
      name: Tip de blocare a bușonului de umplere cu ulei
      description: Specifică dacă capacul rezervorului de ulei nu este blocabil sau
        utilizează o metodă de blocare/de scoatere securizată (de exemplu, cu cheie
        sau care necesită unelte) pentru a preveni manipularea/furtul sau deschiderea
        accidentală.
    oil_filler_cap_tether_type:
      name: Tip de prindere a bușonului de umplere cu ulei
      description: Specifică dacă capacul rezervorului de ulei este fixat/reținut
        pentru a preveni pierderea și ce tip de legătură este utilizat.
    oil_filler_cap_venting_type:
      name: Tipul de aerisire al capacului rezervorului de ulei
      description: Precizează dacă capacul este prevăzut cu orificiu de aerisire și
        care este mecanismul de aerisire (dacă este cazul).
    oil_filter_style:
      name: Stilul filtrului de ulei
      description: Specifică factorul de formă al filtrului de ulei și stilul de montare/instalare
        pentru compatibilitate cu suportul filtrului motorului.
    oil_pan_baffle_windage_features:
      name: Caracteristici de protecție/aerisire a băii de ulei
      description: Indică prezența unor dispozitive interne de control al uleiului
        în cuva de ulei.
    oil_pan_finish_coating:
      name: Finisaj/înveliș al băii de ulei
      description: Descrie finisajul sau acoperirea suprafeței carterului de ulei
        (vopsit, acoperit cu vopsea pulbere, placat, brut etc.).
    oil_pressure_sensor_function_type:
      name: Tipul funcției senzorului de presiune a uleiului
      description: Indică dacă piesa este un senzor de presiune a uleiului cu ieșire
        variabilă pentru un manometru/ECU sau un comutator de presiune a uleiului
        de tip pornit/oprit care activează un indicator luminos de avertizare.
    oil_pressure_sensor_signal_output_type:
      name: Tip de ieșire a semnalului senzorului de presiune a uleiului
      description: Specifică stilul de ieșire/semnal electric produs de senzorul/transmițătorul
        de presiune a uleiului.
    oil_processing_method:
      name: Metodă de procesare a uleiului
      description: Specifică modul în care uleiul a fost produs sau rafinat (de exemplu,
        presat la rece, virgin, rafinat), care Influence aroma, valorile nutriționale
        și aplicațiile culinare adecvate.
    oil_pump_drive_method:
      name: Metoda de acționare a pompei de ulei
      description: Indică ce acționează pompa de ulei din motor.
    oil_pump_mounting_style:
      name: Stil de montare a pompei de ulei
      description: Specifică unde și cum se montează pompa de ulei în motor (de exemplu,
        intern vs. extern/la distanță, montare pe capac, montare pe baia de ulei).
    oil_system_connection_thread_standard:
      name: Standardul filetului de racordare al sistemului de ulei
      description: Precizează standardul de filet/conexiune utilizat de interfața
        sistemului de ulei al piesei în scopul instalării/compatibilității (de exemplu,
        M12x1,5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Gradul de vâscozitate al uleiului
      description: Descrie vâscozitatea relativă a uleiului de filare utilizat la
        fabricarea echipamentelor (nu clasele SAE pentru industria auto).
    okra_variety:
      name: Varietate de okra
      description: Identifică soiul specific sau varietatea comercială de okra oferită,
        cum ar fi Clemson Spineless, Red Burgundy sau Baby Okra.
    olfactory_arts_material_form:
      name: Formă a materialului pentru arte olfactive
      description: Specifică forma fizică a materialului așa cum este comercializat.
    olfactory_arts_tool_kit_content:
      name: Conținutul trusei de instrumente pentru artele olfactive
      description: Enumeră componentele incluse atunci când produsul este comercializat
        sub formă de kit sau set pentru fabricarea lumânărilor, a bețișoarelor parfumate
        sau a parfumurilor.
    olive_variety:
      name: Varietate de măsline
      description: Specifică soiul de măslin utilizat, care afectează gustul, textura,
        culoarea și autenticitatea regională.
    onion_variety:
      name: Soi de ceapă
      description: Specifică tipul specific de ceapă, astfel încât cumpărătorul să
        poată identifica rapid culoarea, aroma și profilurile de utilizare preferate,
        permițând în același timp comerciantului să listeze cu exactitate produsele.
    opacity_level:
      name: Nivel de opacitate
      description: Indică cât de transparent sau opac este materialul.
    operating_modes:
      name: Moduri de funcționare
      description: Modurile principale de efecte și mișcare integrate, compatibile
        cu lumina laserului.
    operating_voltage:
      name: Tensiune de funcționare
      description: Specifică tensiunea nominală a sistemului pentru care este proiectat
        injectorul.
    optical_toy_features:
      name: Caracteristici ale jucăriei optice
      description: Evidențiază efectul vizual/optic principal produs de jucărie.
    orchestral_string_core_material:
      name: Materiale de bază pentru instrumentele cu coarde din orchestra
      description: Specifică materialul din care este realizat miezul corzii (miezul),
        care influențează în mod semnificativ senzația la atingere, reacția și timbrul.
    orchestral_string_end_type:
      name: Tipul de capăt al corzilor instrumentelor de coarde din orchestra
      description: Specifică modul de fixare la capătul de coadă al corzii.
    orchestral_string_included_strings:
      name: Corzi incluse pentru instrumente cu corzi orchestrale
      description: Enumeră șirurile de caractere specifice incluse în pachet (variază
        în funcție de instrument).
    orchestral_string_instrument_fitting_part_type:
      name: Tip de accesoriu/piesă pentru instrumente cu coarde de orchestră
      description: Specifică ce tip de accesoriu/piesă este produsul (de ex., căluș,
        cordar, suport de bărbie).
    orchestral_string_instrument_mute_type:
      name: Tip de surdină pentru instrumente cu corzi orchestrale
      description: Specifică tipul funcțional al surdinei pentru instrumente orchestrale
        cu coarde (de ex., exersare/hotel față de interpretare/concert) și/sau stilul
        de design comun.
    orchestral_string_instrument_part_position:
      name: Poziția piesei instrumentului orchestral cu coarde
      description: Indică locul piesei pe instrument (util când piesele sunt disponibile
        în variante superior/inferior sau stânga/dreapta).
    orchestral_string_winding_material:
      name: Material de înfășurare a corzilor pentru instrumente orchestrale
      description: Specifică materialul înfășurării exterioare utilizat pe coardă.
    organza_finish_sheen:
      name: Finisaj/luciu din organza
      description: Descrie aspectul suprafeței organzei (efect mat față de lucios/irizat).
    organza_ribbon_transparency_level:
      name: Nivelul de transparență al panglicii din organza
      description: Descrie gradul de transparență al panglicii din organza.
    organza_transparency_level:
      name: Nivel de transparență pentru organza
      description: Descrie cât de transparent este materialul de organza la un singur
        strat.
    origami_paper_shape:
      name: Forma hârtiei de origami
      description: Specifică forma colii utilizate pentru pliere.
    origami_paper_sidedness:
      name: Reversibilitatea hârtiei de origami
      description: Indică dacă hârtia de origami are aceeași culoare/model pe ambele
        fețe sau fețe contrastante.
    ostrich_feather_part:
      name: Partea penei de struț
      description: Identifică stilul/partea penei de struț utilizată (de ex., pană
        mare față de puf), care influențează moliciunea, densitatea și aplicațiile
        tipice de artizanat.
    outboard_motor_shaft_type:
      name: Tip de ax pentru motor de barcă
      description: Clasă de lungime standard a axului folosită pentru motoarele de
        barcă (formă de etichetare din industria marină).
    outboard_motor_steering_type:
      name: Tip de direcție pentru motorul de barcă
      description: Specifică interfața/mecanismul de direcție utilizat de motorul
        de barcă (de ex., manșă/tiller sau sistem de direcție la distanță).
    outdoor_table_functionality:
      name: Funcționalitatea mesei de exterior
      description: Identifică funcțiile specializate încorporate care nu se rezumă
        la o simplă suprafață de masă (de ex., compartiment frigorific, raft de depozitare,
        mască pentru butelia de gaz, bază pentru umbrelă, conector pentru scaun, design
        pliabil, utilizare în piscină, înălțime reglabilă, roți integrate, iluminare
        LED).
    outerwear_length_type:
      name: Tip de lungime a îmbrăcămintei exterioare
      description: Clasifică lungimea totală a unui articol de îmbrăcăminte de exterior
        în intervale descriptive standard.
    outerwear_pieces_included:
      name: Piese de îmbrăcăminte exterioară incluse
      description: Listează piesele de îmbrăcăminte furnizate atunci când produsul
        este vândut la set.
    outfit_attachment_mechanism:
      name: Mecanism de prindere a ținutei
      description: Specifică modul în care ținuta sau piesele accesorii se atașează
        de păpușă (de ex. cleme, adeziv, magneți).
    outfit_items_included:
      name: Articole vestimentare incluse
      description: Listează articolele vestimentare specifice incluse în set (de ex.,
        body, pantaloni scurți, bentiță).
    outlet_thread_type:
      name: Tip de filet al racordului de ieșire
      description: Standard de filet utilizat la porturile de ieșire ale conductelor
        pompei centrale de frână (de ex., evazare sferică metrică față de evazare
        inversată SAE).
    output_jack_type_instrument:
      name: Tip de mufă de ieșire (instrument)
      description: Specifică tipul mufei de ieșire audio de pe mandolina electrică.
    output_signal_type:
      name: Tip de semnal de ieșire
      description: Comportamentul/tipul ieșirii electrice produs de senzor (de ex.,
        rezistența analogică a termistorului NTC).
    outsole_marking_type:
      name: Tip de marcaj al tălpii exterioare
      description: Indică dacă talpa exterioară a pantofului lasă urme pe suprafețele
        de joc, un aspect esențial pentru sporturile cu rachetă de interior.
    outsole_material:
      name: Materialul tălpii exterioare
      description: Indică materialul tălpii exterioare a pantofului care intră în
        contact cu solul, influențând aderența, flexibilitatea și durabilitatea.
    outsole_stud_type:
      name: Tip de crampoane pentru talpa exterioară
      description: Descrie configurația tălpii exterioare/crampoanelor (de ex., crampoane
        turnate, striații din cauciuc, crampoane pentru gazon artificial) care asigură
        tracțiunea pe suprafața de joc aleasă.
    oven_bake_clay_formulation:
      name: Formula argilei cu coacere în cuptor
      description: Identifică familia de formule a argilei cu coacere în cuptor (de
        ex., argilă polimerică comparativ cu argilă din rășină), care influențează
        manipularea, comportamentul la polimerizare și proprietățile produsului finit.
    oven_housing_configuration:
      name: Configurație a măștii pentru cuptor
      description: Definește dispunerea prevăzută a aparatului care poate fi utilizată
        cu masca (de ex., cuptor simplu, cuptor dublu sau combinație de cuptor și
        cuptor cu microunde).
    overhead_mount_installation_method:
      name: Metoda de instalare a suportului de plafon
      description: Modul în care suportul de plafon este fixat de vehicul (accesorii/stil
        de atașare).
    oversize_or_undersize_grade:
      name: Grad de supradimensionare sau subdimensionare
      description: Specifică gradul de dimensionare al kitului (pistoane/segmente
        supradimensionate și/sau rulmenți subdimensionați) în raport cu dimensiunile
        standard ale OEM.
    p_tex_application_method:
      name: Metodă de aplicare P-Tex
      description: Descrie modul în care materialul P-Tex este aplicat pe baza schiului
        sau a snowboard-ului.
    p_tex_form:
      name: Formă de prezentare P-Tex
      description: Identifică forma fizică sub care este furnizat materialul de reparație.
    packability:
      name: Compresibilitate
      description: Indică dacă și cum vesta poate fi pliată sau depozitată atunci
        când nu este utilizată.
    packaging_format:
      name: Format de ambalare
      description: Modul în care corzile sunt ambalate/vândute (plicuri individuale,
        vrac etc.).
    packaging_material:
      name: Material de ambalare
      description: Specifică materialul principal al sticlei sau al recipientului
        care conține apa.
    packaging_type:
      name: Tipul de ambalaj
      description: Descrie modul în care figurina este ambalată pentru vânzarea cu
        amănuntul/expunere/depozitare de către colecționari.
    packing_medium:
      name: Mediu de ambalare
      description: Indică lichidul sau mediul (cum ar fi apa, diverse siropuri, suc
        sau saramură) utilizat pentru conservarea fructelor în recipient.
    pad_components_included:
      name: Componente de protecție incluse
      description: Specifică ce piese sunt incluse atunci când produsul este vândut
        ca set (de exemplu, doar genunchiere și cotiere, protecții pentru încheieturi).
    pad_controller_additional_control:
      name: Controale suplimentare ale pad controllerului
      description: Tipurile de controale fizice suplimentare față de pad-uri (butoane
        rotative, fadere, butoane) prezente pe unitate.
    pad_controller_performance_features:
      name: Caracteristici de performanță ale pad controllerului
      description: Caracteristici esențiale ale padurilor legate de performanță pentru
        interpretare și control expresiv.
    pad_coverage_area:
      name: Zona de acoperire a pad-ului
      description: Specifică zonele corpului protejate de pad-urile integrate ale
        centurii.
    pad_material_or_technology:
      name: Materialul sau tehnologia pad-ului
      description: Specifică tehnologia proprie de absorbție a impactului sau materialul
        mărcii, utilizat în pad.
    pad_mounting_or_holding_style:
      name: Stilul de montare sau fixare al pad-ului
      description: Indică modul în care pad-ul este ținut, purtat sau instalat în
        timpul utilizării.
    pad_saver_style:
      name: Stil de pad pentru pernuțe
      description: Indică stilul fizic/designul pad-ului folosit pentru uscarea pernuțelor
        și a alezajului.
    pad_shape:
      name: Formă a protecției
      description: Definește forma geometrică sau curbura suprafeței de lovire a pad-ului
        sau a corpului general (de ex., rotundă, curbată, dreptunghiulară, plată),
        ajutând utilizatorii să coreleze pad-urile cu obiectivele de antrenament și
        tipurile de lovituri.
    pad_shell_type:
      name: Tipul de carcasă al pad-ului
      description: Clasifică stilul de construcție al suprafeței exterioare a pad-ului
        (de ex., carcasă rigidă, carcasă moale, inserție interioară).
    pad_style:
      name: Stilul pad-ului
      description: Specifică tipul sau designul pad-ului care însoțește săniuța.
    padding_layers:
      name: Straturi de căptușeală
      description: Indică numărul de straturi de spumă utilizate pentru absorbția
        impactului.
    padding_level:
      name: Nivelul de căptușeală
      description: Indică cantitatea de căptușeală integrată în zonele de contact
        ale curelei/suportului (gât/umăr/spate).
    padding_material:
      name: Materialul de căptușeală
      description: Specifică materialul de umplutură sau căptușeala interioară care
        absoarbe impactul în interiorul sacilor, scuturilor, mănușilor și manechinelor.
    paddle_ball_attachment_type:
      name: Tip de atașare a mingii de paletă
      description: Specifică modul în care mingea este conectată la paletă (sau dacă
        nu este legată cu alte dispozitive).
    paddle_leash_style:
      name: Stil de curea pentru paletă
      description: Identifică stilul sau designul curelei de prindere a paletei.
    paddle_shape:
      name: Formă a padelei
      description: Definește silueta generală a capului/corpului paletei (de ex.,
        standard, alungită, corp lat), ceea ce influențează raza de acțiune, dimensiunea
        zonei optime de acțiune și manevrabilitatea.
    paddleboard_intended_use:
      name: Utilizarea prevăzută a plăcii de paddleboarding
      description: Clasifică scopul principal de design sau activitatea pentru care
        este construită placa (de ex., turism, yoga, curse).
    paint_application_method:
      name: Metodă de aplicare a vopselei
      description: Modul principal în care produsul este destinat să fie aplicat pe
        etrier.
    paint_by_number_surface_type:
      name: Tip de suprafață pentru pictură pe numere
      description: Suprafața pe care este imprimat modelul numerotat (de ex., pânză,
        hârtie, panou de lemn).
    paint_medium_application_method:
      name: Metodă de aplicare a mediului pentru pictură
      description: Indică modul recomandat de aplicare a mediului.
    paint_medium_intended_effect:
      name: Efect prevăzut al mediului pentru pictură
      description: Surprinde rezultatul principal pe care mediul este menit să îl
        creeze (textură, luciu, glasiu, fluiditate etc.).
    paint_safe_bristles:
      name: Peri siguri pentru vopsea
      description: Indică dacă perii periei sunt promovați ca fiind siguri pentru
        utilizarea pe vopsea auto/lac transparent (fără a lăsa zgârieturi).
    paintable_surface:
      name: Suprafață care poate fi vopsită
      description: Indică dacă forma de papier mâché este gata de a fi pictată așa
        cum este (de ex., grunduită/sigilată) sau necesită pregătire.
    paintball_caliber:
      name: Calibru pentru bile de paintball
      description: Specifică diametrul/calibrul bilelor de paintball sau al echipamentului
        compatibil.
    paintball_feed_system:
      name: Sistemul de alimentare al markerului de paintball
      description: Definește modul în care mingile de paintball sunt alimentate în
        marker.
    paintball_fill_color:
      name: Culoarea umpluturii mingii de paintball
      description: Indică culoarea umpluturii de marcare interioare, care poate diferi
        de carcasa exterioară și determină culoarea lăsată la impact.
    paintball_fill_type:
      name: Tip de umplutură pentru bile de paintball
      description: Descrie orice formulă sau proprietate specială a umpluturii (de
        ex., lavabilă, fosforescent, pudră). lavabil, fosforescent, pudră).
    paintball_grade:
      name: Grad de calitate a bilelor de paintball
      description: Descrie clasa de performanță sau nivelul de utilizare prevăzut
        (de ex., inițial, teren, competiție, iarnă).
    paintball_mask_coverage_level:
      name: Nivelul de acoperire al măștii de paintball
      description: Indică ce porțiuni ale feței sau capului sunt protejate de ochelarii
        sau masca de paintball (doar ochelari, față parțială, față completă sau cap
        complet).
    paintball_tank_valve_type:
      name: Tipul de supapă al rezervorului de paintball
      description: Descrie supapa sau interfața regulatorului prezentă pe rezervor.
    painting_surface_priming_type:
      name: Tipul de grunduire al suprafeței de pictură
      description: Specifică grunduirea/acoperirea suprafeței de pictură (dincolo
        de simpla grunduire/negrunduire), care afectează aderența vopselei și compatibilitatea
        cu tehnica.
    palette_knife_blade_edge_profile:
      name: Profilul muchiei lamei cuțitului de paletă
      description: Descrie profilul muchiei active a lamei cuțitului de paletă (nu
        ascuțimea), care influențează realizarea urmelor și amestecarea.
    palette_knife_flexibility:
      name: Flexibilitatea cuțitului de paletă
      description: Descrie rigiditatea/flexibilitatea lamei cuțitului de paletă.
    palette_surface_finish:
      name: Finisajul suprafeței paletei
      description: Descrie finisajul/acoperirea suprafeței de amestecare care influențează
        rezistența la pete și ușurința curățării.
    palm_padding_level:
      name: Nivel de căptușire a palmei
      description: Descrie gradul de amortizare din zona palmei mănușii sau a pad-ului
        de prindere.
    palm_padding_type:
      name: Tip de căptușire a palmei
      description: Indică materialul sau construcția utilizată pentru amortizarea
        palmei (de ex., gel, spumă, dublu strat).
    palm_wax_blend_readiness:
      name: Gradul de pregătire al amestecului de ceară de palmier
      description: Dacă produsul este ceară de palmier pură sau o formulare amestecată
        în prealabil, destinată unor caracteristici de performanță specifice.
    palm_wax_form:
      name: Forma cerii de palmier
      description: Forma fizică a cerii de palmier astfel cum este vândută, care influențează
        ușurința de măsurare, viteza de topire și manevrarea.
    pan_flute_tuning_standard:
      name: Standardul de acordare al naiului
      description: Frecvența de referință utilizată pentru acordare (de ex., A4=440
        Hz), importantă pentru interpretarea alături de alte instrumente.
    pannier_configuration:
      name: Configurația genților de portbagaj
      description: Indică dacă produsul este vândut ca o geantă simplă, o geantă dublă
        conectată sau o pereche/un set triplu de genți.
    pannier_mounting_system:
      name: Sistem de montare al genților de portbagaj
      description: Definește mecanismul utilizat pentru atașarea genților la portbagajul
        sau cadrul bicicletei, asigurând compatibilitatea cu diferite configurații.
    pant_cuff_style:
      name: Stil de manșetă pentru pantaloni
      description: Indică finisajul sau ajustarea la glezna pantalonilor (de ex.,
        manșete elastice, fermoare la gleznă, tiv deschis).
    pant_leg_conversion_type:
      name: Tip de conversie a cracului pantalonului
      description: Indică dacă și cum cracii pantalonilor pot fi convertiți sau ajustați
        în funcție de lungimi diferite.
    pantyhose_crotch_style:
      name: Stil de clin pentru dresuri
      description: Definește designul zonei clinului, făcând diferența între versiunile
        standard închise, decupate sau cu clin ranforsat.
    papaya_variety:
      name: Soi de papaya
      description: Specifică soiul cultivat sau varietatea comercială de papaya (de
        ex. Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Format de păpușă de hârtie și magnetică
      description: Specifică dacă produsul este un set tradițional de păpuși de hârtie,
        un set de păpuși magnetice sau un format hibrid.
    paper_color_family:
      name: Familie de culori pentru hârtie
      description: Specifică dacă pachetul are o singură culoare, culori asortate
        sau mixuri de specialitate (util atunci când culoarea se referă la articolul
        individual, dar pachetele sunt amestecate).
    paper_magnetic_doll_set_contents:
      name: Conținut al setului de păpuși de hârtie și magnetice
      description: Indică componentele principale incluse în set.
    paper_opacity:
      name: Opacitatea hârtiei
      description: Indică gradul de transparență a hârtiei, de la foarte transparentă
        la opacă (util pentru calchiere).
    paraglider_certification_rating:
      name: Calificativul de certificare al parapantei
      description: Precizează calificativul oficial de navigabilitate atribuit unei
        aripi de parapantă (de ex., clasele EN sau LTF).
    parasite_types_controlled:
      name: Tipurile de paraziți controlați
      description: Listează paraziții interni împotriva cărora produsul este eficient,
        pentru ca utilizatorii să poată adapta programele de deparazitare la infestările
        specifice.
    parking_camera_mounting_location:
      name: Locația de montare a camerei de parcare
      description: Locul de pe vehicul unde camera este destinată a fi instalată (de
        ex., zona plăcuței de înmatriculare, montaj pe suprafață la spate, montaj
        îngropat).
    parking_camera_night_vision_technology:
      name: Tehnologia de vedere nocturnă a camerei de parcare
      description: Metoda de asistență în condiții de iluminat redus utilizată de
        cameră.
    parking_camera_orientation:
      name: Orientarea camerei de parcare
      description: Dacă camera este proiectată pentru vizualizare posterioară (marșarier),
        vizualizare frontală sau utilizare selectabilă/în oglindă.
    parking_sensor_finish:
      name: Finisajul senzorului de parcare
      description: Indică finisajul suprafeței feței/capacului senzorului de parcare
        (de ex., poate fi vopsit/grunduit, mat, lucios) pentru a ajuta la asortarea
        cu estetica barei de protecție.
    parking_sensor_type:
      name: Tipul senzorului de parcare
      description: Specifică tehnologia de detecție utilizată de senzorul de parcare
        (de exemplu, cu ultrasunete, electromagnetică, radar, optică).
    parsley_root_variety:
      name: Soi de rădăcină de pătrunjel
      description: Specifică soiul sau varietatea rădăcinii de pătrunjel, atunci când
        este furnizată de producător/
    parsnip_variety:
      name: Soi de păstârnac
      description: Identifică soiul sau varietatea specifică de păstârnac, cum ar
        fi Hollow Crown sau White Gem, permițând cumpărătorilor să aleagă în funcție
        de arome, dulceață sau diferențe de dimensiune.
    part_condition:
      name: Starea piesei
      description: Indică dacă piesa este nouă, folosită, recondiționată etc.
    part_placement:
      name: Amplasare a piesei
      description: Indică locul de pe aparat (de ex., aparat pentru urcat scări sau
        stepper) unde este instalată piesa, cum ar fi stânga, dreapta, față sau spate.
    partial_capo_covered_strings:
      name: Corzi acoperite de capodastru parțial
      description: Specifică gama de corzi acoperită de capodastrul parțial folosind
        numerotarea standard pentru chitara cu 6 corzi (1 = Mi subțire, 6 = Mi gros).
    parting_style:
      name: Stil de cărare a părului
      description: Indică modul în care peruca are sau i se poate face cărarea (de
        ex., pe mijloc, într-o parte, cărare liberă), influențând flexibilitatea la
        coafare.
    party_favor_type:
      name: Tip de mărturie pentru petrecere
      description: Specifică ce fel de mărturie pentru petrecere este obiectul respectiv
        (de ex., autocolante, minijucării, baloane), pentru a permite navigarea/filtrarea
        în categoria Mărturii pentru petrecere.
    party_game_format:
      name: Formatul jocului de petrecere
      description: Formatul fizic principal al jocului de petrecere.
    party_horn_mouthpiece_type:
      name: Tip de muștiuc pentru goarnă de petrecere
      description: Specifică construcția muștiucului, care influențează igiena și
        confortul.
    party_horn_style:
      name: Stil de goarnă de petrecere
      description: Descrie stilul de construcție/comportament al goarnei de petrecere
        (cum se extinde sau cum produce sunetul).
    passenger_car_type:
      name: Tip de vagon de călători
      description: Identifică tipul specific de material rulant pentru transportul
        pasagerilor (vagon de călători) aferent modelului (de ex., vagon de pasageri,
        vagon de dormit), utilizat pentru consultare și construirea de garnituri.
    passion_fruit_variety:
      name: Soi de fructul pasiunii
      description: Identifică/specifică varietatea botanică sau comercială a fructului-pasiunii
        oferit (de ex. mov, galben, Granadilla).
    pasta_sauce_texture:
      name: Textura sosului de paste
      description: Descrie consistența sosului (de ex., fin, cu bucăți mari, cremos)
        pentru a se potrivi preferințelor consumatorilor privind senzația gustativă.
    pasta_sauce_variety:
      name: Sortiment de sos pentru paste
      description: Clasifică sosurile pentru paste în funcție de rețetă sau stil,
        astfel încât cumpărătorii să poată găsi rapid variante clasice precum marinara
        sau sosuri de specialitate precum sosul cu vodcă sau pesto.
    pastry_crust_state:
      name: Starea crustei pentru produse de patiserie
      description: Descrie stadiul de preparare sau coacere a crustei la momentul
        achiziției.
    pastry_crust_style:
      name: Stilul de crustă pentru produse de patiserie
      description: Identifică stilul specific de patiserie sau tipul de aluat al crustei.
    pastry_filling_type:
      name: Tip de umplutură pentru patiserie
      description: Specifică umplutura interioară principală a produsului de patiserie
        sau a biscuitului.
    patch_adhesion_method:
      name: Metodă de lipire a peticului
      description: Specifică modul în care peticul se lipește de camera de aer sau
        anvelopă (de ex., autoadeziv, vulcanizare la rece cu soluție sau activat prin
        căldură).
    patch_backing_material:
      name: Material de suport pentru plasture
      description: Materialul utilizat pe spatele/baza peticului (de ex., fetru, doc)
        care intră în contact cu articolul pe care se aplică.
    patch_backing_type:
      name: Tip de suport pentru plasture
      description: Suportul utilizat pe petic (de ex., termocolant/aplicare cu fierul
        de călcat, adeziv cu folie de protecție, velcro, fără suport).
    patch_base_material:
      name: Material de bază pentru plasture
      description: Materialul textil principal de bază/suport al peticului cu motive
        (nu ornamentele decorative).
    patch_border_edge_finish:
      name: Finisaj al marginii/bordurii peticului
      description: Metoda de finisare a marginii peticului (de ex., margine surfilată,
        margine tăiată cu laserul), influențând durabilitatea și aspectul.
    patch_placement_area:
      name: Zona de amplasare a peticului
      description: Zona comună vizată pentru amplasarea peticului pe îmbrăcăminte/accesorii.
    pathogen_removal_capability:
      name: Capacitate de eliminare a agenților patogeni
      description: Specifică clasele de microorganisme (bacterii, protozoare, viruși)
        pe care pompa este certificată să le elimine.
    pattern_sizing_system:
      name: Sistem de dimensionare a modelelor
      description: Specifică sistemul sau standardul regional de dimensionare utilizat
        pentru diagrama de dimensiuni a modelului (de exemplu, SUA, Marea Britanie,
        UE).
    peak_style:
      name: Stil de cozoroc
      description: Specifică stilul vizierei sau al cozorocului de pe cască, afectând
        acoperirea, estetica și regulile de disciplină.
    pear_variety:
      name: Varietate de pere
      description: Identifică soiul sau varietatea de pere (de ex. Bartlett, Bosc,
        Conference), permițând cumpărătorilor să aleagă gustul, textura și utilizarea
        culinară preferată.
    pearl_luster_grade:
      name: Gradul de luciu al perlelor
      description: Gradul de luciu/strălucire calitativ al suprafeței perlei.
    pearl_matching_level:
      name: Nivel de potrivire a perlelor
      description: Indică cât de bine se potrivesc perlele în cadrul unui lot sau
        al unui șir (de exemplu, după culoare, dimensiune și luciu).
    pearl_shape:
      name: Formă perle
      description: Categoria generală de formă a perlei.
    pearl_surface_condition:
      name: Stare suprafață perlată
      description: Indică aspectul vizibil al suprafeței unei perle, bazat pe prezența
        și severitatea petelor sau imperfecțiunilor.
    pearl_treatment:
      name: Tratament perle
      description: Dezvăluie orice tratament aplicat perlei care afectează culoarea/aspectul.
    pearl_type:
      name: Tip de perlă
      description: Specifică varietatea/originea perlei (de ex. apă dulce, Akoya,
        Tahiti, Marea de Sud) pentru perlele individuale.
    peat_level:
      name: Nivel turbă
      description: Descrie intensitatea influenței fumului de turbă în whisky, de
        la fără turbă la puternic afumat cu turbă.
    pedal_and_cleat_system_compatibility:
      name: Compatibilitate între sistemul de pedale și cleme
      description: Specifică ce standarde de pedale sau plăcuțe (cleats) sunt compatibile
        cu distanțierul sau pana, asigurând că utilizatorii aleg un produs potrivit
        pentru pedalele și încălțămintea lor.
    pedal_configuration:
      name: Configurația pedalei
      description: Indică dacă scaunul are o pedală unică, pedale separate/independente
        sau un design convertibil.
    pedal_mounting_style:
      name: Stil de montare a pedalei
      description: Specifică modul în care se atașează pedala sau capacul/pernuța
        pedalei la vehicul (metoda de instalare/atașare).
    pedal_set_components:
      name: Componentele setului de pedale
      description: Specifică ce pedale sunt incluse în set.
    pedal_spindle_material:
      name: Materialul axului pedalei
      description: Indică materialul utilizat pentru axul/tija pedalei, influențând
        rezistența, greutatea și rezistența la coroziune.
    pedal_spindle_thread_size:
      name: Dimensiuni ale axului pedalei
      description: Specifică standardul de filetare al axului pedalei care se înșurubează
        în brațul manivelei.
    pedal_type:
      name: Tip de pedală
      description: Descrie tipul de pedale furnizate cu bicicleta, indicând compatibilitatea
        cu încălțămintea și stilul de pedalat.
    pellet_accessory_type:
      name: Tip de accesoriu pentru peleți
      description: Identifică tipul specific de accesoriu pentru peleți, astfel încât
        pescarii să poată găsi rapid burghie, dispozitive de fixare sau opritoare
        în funcție de nevoile lor de monturi.
    pellet_grade:
      name: Gradul bilelor de airsoft
      description: Indică gradul de precizie de fabricație sau clasa de performanță
        a bilelor de airsoft.
    pen_ink_color:
      name: Culoare cerneală cu stilou
      description: Indică culoarea reală de cerneală eliberată de stilou, care poate
        varia față de culoarea corpului exterior.
    penalty_card_accessories_included:
      name: Accesorii card de penalizare incluse
      description: Enumeră accesoriile suplimentare pentru arbitraj incluse împreună
        cu cartonașele, cum ar fi portofel, foaie de scor, creion, monedă, fluier
        sau husă.
    penalty_card_colors_included:
      name: Culori incluse pentru cartonașele de penalizare
      description: Enumeră culorile cartonașelor de sancțiune incluse în setul de
        produs.
    penalty_flag_throw_distance:
      name: Distanța de aruncare a steagului de penalizare
      description: Clasificarea designului care indică raza de aruncare preconizată
        a steagului.
    pendant_cutter_safety_features:
      name: Caracteristici de siguranță ale tăietorului de pandantive
      description: Identifică elementele de siguranță integrate care reduc tăieturile
        accidentale în timpul transportului/purtării.
    pendant_cutter_wear_method:
      name: Metoda de utilizare a tăietorului de pandantive
      description: Specifică modul în care tăietorul de pandantive este destinat să
        fie purtat sau transportat.
    pepper_variety:
      name: Varietate de ardei
      description: Specifică varietatea sau specia de ardei/piper utilizată în produs,
        permițând cumpărătorilor să distingă între diferite profiluri de aromă și
        niveluri de iuțeală.
    percussion_case_style:
      name: Stilul cutiei pentru instrumente de percuție
      description: Clasifică stilul/construcția generală a cutiei (geantă moale vs
        cutie rigidă vs hibrid).
    percussion_instruments_included:
      name: Instrumente de percuție incluse
      description: Enumeră tipurile de instrumente de percuție incluse atunci când
        produsul este un set de jucării cu mai multe instrumente.
    percussion_mallet_handle_grip_style:
      name: Stil de prindere al mânerului bețelor de percuție
      description: Identifică tipul de finisaj al mânerului (dincolo de textură),
        cum ar fi lemnul nefinisat, lăcuit, cu mâner cauciucat sau cu bandă de învelire.
    percussion_mallet_head_construction:
      name: Construcția capului ciocanului de percuție
      description: Descrie stilul de construcție al capului ciocanului (de exemplu,
        fire înfășurate, pâslă înfășurată, cauciuc, lemn brut), care influențează
        sunetul și durabilitatea.
    perfumery_base_carrier_type:
      name: Tipul de purtător (carrier) utilizat în baza de parfumerie
      description: Precizează sistemul de purtător/solvent al unei baze de parfumerie
        (componenta principală din care este alcătuită baza, care asigură diluarea
        și performanța acesteia).
    perfumery_base_intended_application:
      name: Baza de parfumerie - utilizare prevăzută
      description: Indică formatul final pentru care este concepută baza (de exemplu,
        spray cu parfum fin vs. roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Transportator/solvent de ingrediente de parfumerie
      description: Identifică purtătorul/solventul în care este furnizat ingredientul,
        dacă este diluat (de ex. etanol, DPG, ulei de jojoba).
    perfumery_ingredient_form:
      name: Formă a ingredientului de parfumerie
      description: Specifică forma/starea fizică a ingredientului de parfumerie așa
        cum este furnizat.
    perfumery_ingredient_type:
      name: Tip de ingredient de parfumerie
      description: Clasifică ingredientul de parfumerie în funcție de natura sa în
        practica parfumeriei (de ex. ulei esențial, substanță aromatică sintetică).
    perfumery_ingredient_usage_note:
      name: Notă de utilizare a ingredientelor din parfumerie
      description: Indică rolul tipic în structura unui parfum (notă de vârf, mijloc/inimă,
        bază), recunoscând că materialele pot acoperi note.
    perfumery_ingredients:
      name: Ingrediente de parfumerie
      description: Enumeră tipurile de materiale parfumate consumabile incluse în
        kit (de ex. uleiuri esențiale, uleiuri parfumate, bază alcoolică).
    perfumery_note_position:
      name: Poziția notei de parfumerie
      description: Indică rolul tipic al ingredientului în structura unui parfum (notă
        de vârf/inimă/bază).
    persimmon_variety:
      name: Varietate de curmal
      description: Identifică soiul sau varietatea de curmal, deoarece diferite varietăți
        precum Fuyu sau Hachiya diferă în textură, gust, astringență și utilizare
        culinară.
    personalization_type:
      name: Tip de personalizare
      description: Specifică dacă și cum poate fi produsul personalizat pentru un
        eveniment (de exemplu, monogramă, nume/dată, inserție foto).
    phonics_focus:
      name: Focalizare fonetică
      description: Specifică ce fonetică și aptitudini de citire a cuvintelor vizează
        jucăria de citit.
    physalis_variety:
      name: Varietate de physalis
      description: Identifică specia botanică, soiul sau varietatea comună de physalis
        care este vândută.
    pi_ata_filler_type_included:
      name: Tip de umplutură pentru piñata inclus
      description: Dacă este inclusă umplutură, tipul de conținut furnizat.
    pi_ata_hanging_method:
      name: Metoda de agățare a piñatei
      description: Cum este concepută piñata pentru a fi agățată sau susținută (bucla,
        cârligul, șir inclus etc.).
    pi_ata_opening_type:
      name: Tipul de deschidere al piñatei
      description: Cum se accesează/închide orificiul de umplere (clapetă, velcro,
        fermoar, pre-sigilat etc.).
    piccolo_key_system:
      name: Sistem de taste piccolo
      description: Identifică sistemul/designul de chei utilizate la piccolo (de obicei
        sistemul Boehm pentru piccolo-urile moderne).
    piccolo_keywork_features:
      name: Funcții ale tastelor Piccolo
      description: Specifică mecanismele și opțiunile notabile ale tastelor pentru
        piccolo.
    pick_grip_aid:
      name: Ajutor pentru prinderea plectrului
      description: Indică principalul element de prindere integrat în plectru, dincolo
        de textura generală a suprafeței (de ex. găuri de prindere, logo în relief,
        inserție de cauciuc).
    pickleball_construction_type:
      name: Tip de construcție a paletei/mingii de pickleball
      description: Construcția de fabricație a mingii, cum ar fi dintr-o singură bucată
        fără îmbinări sau din două piese sudate, ceea ce influențează durabilitatea
        și consistența traiectoriei.
    pickling_method:
      name: Metodă de marinare
      description: Specifică mediul sau tehnica de conservare utilizată pentru marinare,
        cum ar fi saramura cu oțet sau lactofermentația.
    pickup_and_preamp_configuration:
      name: Configurația pickup-ului și a preamplificatorului
      description: Indică dacă viola este echipată cu un pickup integrat și/sau preamplificator
        activ pentru amplificare sau înregistrare.
    pickup_configuration:
      name: Configurația pick-upului
      description: Descrie configurația generală a pickup-urilor unei chitare electrice
        folosind prescurtările uzuale (de exemplu, SSS, HSS, HH).
    pickup_cover_material:
      name: Materialul capacului pick-upului
      description: Specifică materialul principal al capacului pickup-ului (dacă există),
        incluzând finisajele placate uzuale atunci când acestea sunt indicate de producător.
    pickup_cover_type:
      name: Tipul capacului pickup-ului
      description: Specifică dacă un pickup de chitară electrică are capac și materialul/stilul
        acestuia (de ex. metal vs plastic).
    pickup_string_spacing:
      name: Distanța dintre corzile chitarei
      description: Standardul de distanțare a poliilor/cordurilor pentru care este
        proiectat pickup-ul (de ex. Fender/F-spaced vs Gibson/standard), influențând
        alinierea pe chitare cu tremolo.
    pie_crust_type:
      name: Tip crustă de plăcintă
      description: Specifică stilul sau tipul de crustă utilizată pentru plăcintă
        sau tartă, cum ar fi aluat foitaj, biscuiți Graham sau crustă fără gluten.
    piece_configuration:
      name: Configurația piesei
      description: Indică numărul de piese separate din care este alcătuit tacul,
        arborele sau puntea, afectând portabilitatea și stilul de joc.
    pillow_form_size:
      name: Dimensiunea/forma pernei
      description: Denumire standardizată a dimensiunilor finite pentru formele/inserțiile
        de pernă (de exemplu, 45,7 cm x 45,7 cm).
    pilot_helmet_communications_integration:
      name: Integrarea comunicațiilor pe casca pilotului
      description: Indică dacă casca include sau este preconfigurată pentru componente
        de comunicații aeronautice.
    pilot_helmet_visor_configuration:
      name: Configurația vizierei căștii de pilot
      description: Specifică configurația vizieră/ecran de protecție inclusă odată
        cu casca de pilot.
    pin_attachment_type:
      name: Tipul de prindere a insignei
      description: Specifică mecanismul de fixare/suport utilizat pentru atașarea
        fixatorului la îmbrăcăminte sau la o suprafață (de exemplu, curea fluture,
        suport magnetic).
    pin_backing_type:
      name: Tipul de închizătoare a insignei
      description: Specifică mecanismul de fixare/suport utilizat pentru fixarea elementului
        de fixare pe îmbrăcăminte sau accesorii.
    pin_cushion_attachment_style:
      name: Tip de prindere a perniței pentru ace
      description: Descrie modul în care pernița pentru ace este purtată, atașată
        sau poziționată în timpul utilizării.
    pin_cushion_features:
      name: Caracteristici ale perniței pentru ace
      description: Funcționalități suplimentare dincolo de simpla fixare a acelor.
    pin_face_customization_method:
      name: Metoda de personalizare a feței perniței pentru ace
      description: Specifică modul în care este realizat designul frontal (de ex.,
        email dur, email moale, imprimat).
    pin_type:
      name: Tip de ac
      description: Specifică stilul sau formatul de ac utilizat pentru colecții dedicate
        fanilor sportului.
    ping_pong_certification:
      name: Certificare Ping -pong
      description: Declară standardul oficial sau nivelul aprobat de organismul de
        conducere al produsului.
    ping_pong_competition_certification:
      name: Certificare competiție Ping -pong
      description: Indică statutul oficial de certificare al mingii de ping-pong pentru
        jocul autorizat (de exemplu, aprobat de ITTF).
    ping_pong_paddle_handle_style:
      name: Tip de mâner al paletei de ping-pong
      description: Definește forma/stilul mânerului paletei, care influențează confortul
        prinderii și tehnica de joc.
    ping_pong_robot_accessory_type:
      name: Tip accesoriu robot Ping -pong
      description: Identifică subtipul funcțional al accesoriului, astfel încât cumpărătorul
        să poată restrânge rapid rezultatele (de exemplu, plase vs. adaptoare de alimentare).
    ping_pong_rubber_surface_type:
      name: Tip de suprafață din cauciuc Ping -pong
      description: Identifică stilul/textura suprafeței de cauciuc aplicate pe padelă,
        care afectează caracteristicile de rotire și viteză.
    ping_pong_rubber_type:
      name: Tip cauciuc Ping -pong
      description: Specifică modul de construcție al suprafeței unei fețe de cauciuc
        pentru ping-pong, care influențează caracteristicile de joc.
    ping_pong_table_type:
      name: Tipul mesei de ping-pong
      description: Clasifică stilul sau formatul general al mesei pentru o comparare
        mai ușoară (de ex., de competiție, blat convertibil, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Metoda de producere a sunetului la instrumentele de tip fluier
      description: Specifică modul în care instrumentul produce sunetul (mecanismul
        de flux de aer), ajutând la diferențierea dintre nai, instrumente cu ancii
        și familiile de tuburi de orgă în filtre.
    piston_application_type:
      name: Tipul de aplicație al pistonului
      description: Scopul/destinația de utilizare a pistonului (înlocuire vs performanță/curse
        vs uz intens).
    piston_crown_dish_style:
      name: Coroană de piston/tip disc
      description: Forma capului pistonului, care influențează volumul camerei de
        ardere și raportul de compresie (de ex., plat, bombat, concav).
    piston_pin_retention_type:
      name: Tip de fixare a bolțului pistonului
      description: Specifică modul în care este reținut elementul de fixare al încheieturii
        (pistonului) în ansamblul piston/biela.
    pit_configuration:
      name: Configurația gropii
      description: Definește structura formatului zonei de aterizare (dintr-o singură
        piesă vs. modulară) și, implicit, numărul de secțiuni sau module furnizate.
    pit_cover_type:
      name: Tipul capacului gropii
      description: Specifică suprafața sau folia de protecție furnizată pentru groapă,
        influențând rezistența la crampoane, protecția împotriva intemperiilor și
        preferințele sportivilor.
    pitahaya_flesh_color:
      name: Culoarea pulpei fructului de pitahaya
      description: Specifică culoarea pulpei din interiorul pitahayei (fructul dragonului)
        (de ex., alb, roșu, magenta), un element distinctiv care influențează gustul,
        aspectul și percepția asupra valorii nutritive.
    pitch_mat_coverage_length:
      name: Lungimea de acoperire a saltelei de lansare
      description: Clasifică lungimea de acoperire a saltelei pentru groapă (pit),
        în funcție de porțiunea de pistă acoperită (de ex., acoperire completă sau
        jumătate de pistă).
    pitch_range:
      name: Gama de înălțimi sonore
      description: Descrie gama percepută de înălțimi și luminozitatea sunetului produs
        de shaker.
    pitch_standard:
      name: Înălțime standard de referință
      description: Specifică înălțimea standard (acordajul de referință) pentru care
        este construit flautul drept (de ex., A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Denumirea dimensiunii cauciucului de lansare
      description: Indică clasificarea dimensională standard pe teren pentru cauciucul
        de lansare, simplificând selecția fără a fi nevoie ca cumpărătorul să cunoască
        măsurătorile exacte.
    pitching_screen_style:
      name: Stilul ecranului de lansare
      description: Definește designul structural al ecranului, astfel încât cumpărătorul
        să poată selecta rapid aspectul de protecție corect pentru scenariul său de
        antrenament.
    pitching_target_design:
      name: Designul țintei de lansare
      description: Clasifică stilul sau configurația generală a țintei de lansare.
    pitching_wheel_count:
      name: Numărul de roți de lansare
      description: Indică numărul de roți de propulsie pe care le folosește o mașină
        de lansare.
    pivot_adjustability:
      name: Reglarea pivotului
      description: Indică dacă foarfecele au un șurub pivotant reglabil pentru reglarea
        tensiunii de tăiere.
    pivot_piece_type:
      name: Tipul piesei pivotante
      description: Diferențiază între diferite forme ale interfeței de pivot furnizate,
        cum ar fi cupe tradiționale sau tip tub.
    place_card_holder_closure_mechanism:
      name: Mecanismul de închidere al suportului pentru card
      description: Specifică modul în care titularul prinde sau fixează cardul.
    place_card_orientation:
      name: Orientarea suportului pentru card
      description: Specifică orientarea cardului atunci când este utilizat sau afișat.
    place_card_printing_status:
      name: Starea tipăririi cardului de plasare
      description: Indică dacă cardul de plasare este gol pentru scriere manuală/tipărire,
        pre-tipărit (fără nume personalizate) sau personalizat/tipărit la comandă.
    placket_type:
      name: Tip de fentă de închidere
      description: Specifică stilul deschiderii frontale a tricoului polo, inclusiv
        numărul de nasturi sau închideri alternative.
    planetarium_content_theme:
      name: Temă de conținut a planetariului
      description: Conținut principal afișat de proiectorul planetariului.
    planetarium_projection_content_format:
      name: Formatul conținutului de proiecție al planetariului
      description: Specifică mecanismul de conținut al proiecției utilizat de planetariu
        (discuri/diapozitive fizice vs efect digital/LED).
    plant_fiber_type:
      name: Tipul de fibră vegetală
      description: Tipul specific de fibră de origine vegetală atunci când tipul sursei
        de fibre discontinue este „Vegetală”.
    plaster_gauze_finish:
      name: Finisaj din tifon de ipsos
      description: Tendința finisajului suprafeței rezultată după aplicare și netezire.
    plaster_gauze_grade:
      name: Clasa de calitate a tifonului pentru gips
      description: Clasa de utilizare a tifonului pentru gips (de ex., pentru instruire/studiu
        vs profesional).
    plaster_gauze_weave_density:
      name: Densitatea țesăturii tifonului pentru gips
      description: Deschiderea/strângerea relativă a țesăturii de tifon, care afectează
        rezistența și ridicarea tencuielii.
    plastic_canvas_finish:
      name: Finisaj din pânză plastică
      description: Tratament de suprafață/finisaj al rolei de pânză plastică.
    plastic_canvas_sheet_finish:
      name: Finisajul foii de pânză din plastic
      description: Tratamentul suprafeței/marginii foii de pânză din plastic.
    plastic_canvas_transparency:
      name: Transparență pânză plastică
      description: Cât de transparentă/opacă este pânza de plastic.
    plate_bottom_design:
      name: Designul fundului plăcii
      description: Descrie construcția părții inferioare a plăcii, care afectează
        tracțiunea, stabilitatea și siguranța pe diferite suprafețe de joc.
    plate_compatibility_standard:
      name: Standardul de compatibilitate al plăcii
      description: Indică standardul de greutate pentru care este proiectată bara
        (de exemplu, olimpică 50 mm, standard 25 mm).
    plate_installation_type:
      name: Tipul de instalare a plăcii
      description: Specifică modul în care placa este fixată sau poziționată pe teren
        (de exemplu, îngropată, cu țepi, prin aruncare), permițând cumpărătorului
        să aleagă între opțiuni permanente și portabile.
    plate_size_category:
      name: Categoria de dimensiune a plăcii
      description: Clasifică placa în funcție de nivelul de joc sau standardul regulamentar,
        astfel încât cumpărătorul să poată localiza rapid echipamentul conform ligii.
    play_dough_putty_kit_contents:
      name: Conținutul kitului de plastilină și pastă modelatoare
      description: Identifică principalele componente incluse, dincolo de materialul
        de modelaj (de ex., unelte, forme, extruder, recipient de depozitare).
    play_dough_tool_set_items_included:
      name: Articole incluse în setul de unelte pentru plastilină
      description: Identifică tipurile de unelte și accesorii incluse într-un set
        de unelte pentru plastilină (de exemplu, role, tăietoare, forme).
    play_environment_suitability:
      name: Adecvarea mediului de joacă
      description: Identifică mediul de joc prevăzut pentru setul de jocuri (de exemplu,
        interior, exterior, apă).
    play_food_features:
      name: Caracteristici ale alimentelor de jucărie
      description: Caracteristici funcționale speciale sau de realism ale alimentelor
        de jucărie.
    play_food_items_included:
      name: Articole incluse de alimente de jucărie
      description: Indică tipurile de alimente de jucărie incluse în setul de joacă
        pentru bucătărie.
    play_food_size_scale:
      name: Scara de mărime a alimentelor de jucărie
      description: Indică dimensiunile aproximative ale pieselor alimentare fictive
        pentru compatibilitatea cu bucătării de jucărie, păpuși și seturi de joacă.
    play_money_set_components_included:
      name: Componente incluse în setul de bani de jucărie
      description: Specifică tipurile de componente incluse în setul de bani/joc bancar.
    play_pattern:
      name: Tiparul de joc
      description: Modul principal de utilizare pentru care este concepută jucăria
        (de ex., antistres/fidget, obiect decorativ de birou, construcție/asamblare
        sau puzzle-uri).
    play_sprinkler_mounting_type:
      name: Tip de montare al aspersorului de joacă
      description: Cum este poziționat/fixat aspersorul de joacă în timpul utilizării.
    play_vehicle_lights_and_sounds:
      name: Redarea luminilor și a sunetelor vehiculului
      description: Indică dacă vehiculul de jucărie include efecte electronice de
        joacă, cum ar fi lumini și/sau sunete.
    play_vehicle_scale:
      name: Scara (raportul de mărime) a vehiculului de jucărie
      description: Indică raportul de scară al vehiculului de jucărie (utilizat în
        mod obișnuit pentru vehiculele de jucărie turnate sub presiune și modele asemănătoare).
    player_size_category:
      name: Categoria de dimensiune a jucătorului
      description: Definește categoria de vârstă/dimensiune a jucătorului pentru care
        este potrivit setul de echipament pentru catcher (de ex., Tee Ball, juniori,
        intermediar, adult).
    player_size_range:
      name: Interval de dimensiune a jucătorului
      description: Specifică intervalul de mărimi al utilizatorului pentru curea/suport
        (de ex., copil, adult, universal).
    playing_environment:
      name: Mediul de joc
      description: Specifică suprafața sau contextul principal de joc pentru care
        este proiectată mingea de hochei.
    playing_method:
      name: Metoda de redare
      description: Modul principal în care instrumentul este destinat să fie utilizat/activat.
    playing_surface_material:
      name: Materialul suprafeței de joc
      description: Identifică materialul suprafeței frontale de lovire a cajónului
        (tapa), care influențează puternic tonul și senzația la cântat.
    playing_surface_type:
      name: Tipul suprafeței de joc
      description: Descrie construcția suprafeței de joc/senzația la care se simte
        pad-ul de antrenament.
    playset_activities_included:
      name: Activități incluse în setul de joacă
      description: Identifică principalele activități/componente de joacă încorporate
        în leagăn/setul de joacă pentru a ajuta cumpărătorul să filtreze după ceea
        ce pot face copiii pe structură.
    playset_installation_type:
      name: Tipul de instalare a setului de joacă
      description: Specifică modul în care este instalat sau fixat leagănul/setul
        de joacă.
    playset_items_included:
      name: Articole incluse în setul de joacă
      description: Identifică tipurile de articole de joacă incluse în setul de picnic
        (mâncare, tacâmuri, pătură, coș etc.).
    pliers_jaw_style:
      name: Tip de fălci ale cleștelui
      description: Descrie configurația principală a fălcii sau stilul funcțional
        al cleștelui.
    plum_variety:
      name: Varietate de prune
      description: Identifică soiul sau varietatea specifică de prună, permițând cumpărătorului
        să aleagă în funcție de aromă, culoare și utilizare culinară preconizată.
    plumcot_variety:
      name: Soiul de hibrid prună-caisă
      description: Identifică soiul sau varietatea comercială specifică a prunei (de
        exemplu, Flavor King, Dapple Dandy), care poate influența aroma, culoarea
        și sezonalitatea.
    plunger_mute_handle_type:
      name: Tip de mâner al surdinei tip plunger
      description: Specifică mânerul sau stilul de prindere utilizat pentru a ține
        și manipula o surdină cu piston pentru efecte wa-wa.
    pocket_closure_type:
      name: Tip de închidere a buzunarului
      description: Definește modul în care este securizat fiecare buzunar, ajutând
        utilizatorii să găsească pantaloni cu spațiu de depozitare sigur în timpul
        activității.
    pocket_knife_opening_mechanism:
      name: Mecanism de deschidere a briceagului de buzunar
      description: Cum este implementată/deschisă lama (înțepătură manuală cu cui,
        cu știft pentru degetul mare, cu îndoitură, asistată, automată etc.).
    pocket_style:
      name: Stil de buzunar
      description: Specifică tipul principal de construcție al buzunarului prezent
        la pantaloni.
    pocket_type:
      name: Tip de buzunar
      description: Identifică stilul sau prezența buzunarelor pe piesa de îmbrăcăminte.
    pod_retention_system:
      name: Sistem de fixare a podului
      description: Descrie modul în care capsulele de paintball sunt ținute la loc
        și eliberate din ham sau pachet.
    pogo_stick_footrest_type:
      name: Tip de suport pentru picioare al pogo stick-ului
      description: Descrie designul platformei sau al suporturilor pentru picioare
        utilizate la pogo stick.
    pogo_stick_suspension_type:
      name: Tip de suspensie pogo stick
      description: Specifică mecanismul de revenire (săritură) al pogo stick-ului,
        care influențează senzația, durabilitatea și întreținerea.
    poi_handle_type:
      name: Tip de mâner pentru poi
      description: Specifică stilul mânerului/prinderii/atașamentului utilizat pentru
        a ține poi-ul.
    poi_light_source:
      name: Sursă de lumină Poi
      description: Pentru poi-urile iluminate, specifică tehnologia de iluminare.
    poi_tether_type:
      name: Tip de legătură Poi
      description: Indică tipul de legătură care conectează capul poi la mâner, buton
        sau bucla de încheietură (de exemplu, șnur, frânghie, lanț).
    poi_type:
      name: Tip de poi
      description: Specifică tipul principal de construcție/utilizare a poi-ului (de
        exemplu, antrenament, LED, foc).
    point_type:
      name: Tip de punct
      description: Forma/stilul vârfului acului de broderie.
    pointe_shoe_shank_length:
      name: Lungime a tălpii poantelor
      description: Porțiunea din lungimea pantofului susținută de întăritura (șancrul),
        de ex. lungime completă sau 3/4.
    pointe_shoe_shank_strength:
      name: Rezistența șancrului pantofului de vârf (pointe shoe)
      description: Nivelul de rigiditate al șancrului unui pantof de pointe, care
        influențează suportul și timpul de acomodare.
    poker_accessory_storage_included:
      name: Depozitare inclusă pentru accesorii de poker
      description: Indică pentru ce articole suplimentare de poker oferă accesoriul
        spațiu de depozitare dedicat.
    poker_chip_tray_rack_configuration:
      name: Configurație tavă/plută pentru poker
      description: Descrie stilul de organizare internă al unei tăvi/plute CIP (rânduri
        și capacitate pe rând).
    pole_anchoring_method:
      name: Metodă de ancorare a stâlpului
      description: Definește modul în care bara este fixată pe sol sau pe suprafața
        de joc.
    pole_basket_type:
      name: Tip de rozetă pentru bețe
      description: Clasifică stilul sau dimensiunea coșului montat lângă vârful bățului
        de schi, indicând direcția spre care este orientat spre zăpadă.
    pole_connection_system:
      name: Sistem de conectare a polilor
      description: Identifică mecanismul de îmbinare a secțiunilor bețelor, cum ar
        fi cu cord elastic, filetate sau sisteme tip hub, ajutând utilizatorii să
        evalueze viteza de montare și compatibilitatea.
    pole_system_type:
      name: Tip de sistem de bețe
      description: Descrie sistemul de susținere structural sau modul de montare al
        cortului (de exemplu, stâlpi din aluminiu, tuburi gonflabile, montare cu bețe
        de drumeție).
    police_equipment_fitment:
      name: Montarea echipamentelor de poliție
      description: Precizează ce echipamente destinate forțelor de ordine este configurat
        sau pre-cablat vehiculul să suporte.
    police_vehicle_equipment_package:
      name: Pachet de echipamente pentru vehicule de poliție
      description: Indică dotările/echipamentele specifice poliției incluse odată
        cu vehiculul, așa cum a fost comercializat.
    police_vehicle_light_siren_equipment:
      name: Echipament de lumini/sirenă pentru vehicule de poliție
      description: Specifică ce dispozitive de avertizare de urgență sunt instalate
        pe mașina de poliție.
    police_vehicle_upfit_level:
      name: Nivel de echipare al vehiculului de poliție
      description: Descrie ce echipament/dotări specifice poliției sunt instalate
        pe camion.
    polish_formulation:
      name: Formula produsului de lustruire
      description: Indică compoziția de bază/formula chimică a produsului de lustruire
        pentru tastatură (nu metoda de aplicare).
    polish_purpose:
      name: Scopul produsului de lustruire
      description: 'Rezultatul principal urmărit: aspectul lustruit al suprafeței
        instrumentului.'
    pollen_level:
      name: Nivelul de polen
      description: Indică cantitatea/probabilitatea colorării polenului de la varietatea
        de crin.
    polymer_clay_firmness_level:
      name: Nivelul de fermitate al argilei polimerice
      description: Fermitatea/moliciunea relativă a argilei polimerice înainte de
        coacere (prelucrabilitate).
    polymer_clay_translucency:
      name: Transluciditatea argilei polimerice
      description: Opacitatea/transparența vizuală a argilei polimerice după întărire.
    pom_pom_handle_style:
      name: Stil de mâner pentru pompoane
      description: Descrie stilul sau structura mânerului folosit pentru a ține pomponul.
    pom_pom_trim_backing_tape_material:
      name: Material de bandă/suport pentru garnituri cu pompoane
      description: Identifică materialul benzii cusute sau al împletiturii de care
        sunt atașate pompoanele (baza garniturii).
    pom_pom_type:
      name: Tip pom-pom
      description: Indică prezența și tipul specific de pompon sau bomboană pe pălărie.
    pomegranate_product_form:
      name: Forma produsului de rodie
      description: Descrie forma fizică oferită (fructe întregi, fructe de pădure
        decojite, sâmburi, fructe de pădure congelați).
    pomegranate_variety:
      name: Varietate de rodie
      description: Identifică soiul sau varietatea specifică a fructului de rodie
        (de exemplu, Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Stilul suportului pentru coadă de cal
      description: Descrie construcția specifică sau factorul de formă al suportului
        pentru coadă de cal, astfel încât cumpărătorul să își poată alege stilul preferat.
    popcorn_form:
      name: Formă de popcorn
      description: Indică forma fizică sau modul de preparare al produsului din porumb
        pentru floricele, cum ar fi produsul gata de consum, boabe, pachet pentru
        cuptorul cu microunde, set de condimente sau cutie cadou.
    pork_rind_form:
      name: Formă de șorici de porc
      description: Clasifică forma fizică sau stilul gustărilor din șorici de porc
        (de exemplu, șorici, jumări, pufuleți, granule etc.).
    portability_features:
      name: Caracteristici de portabilitate
      description: Enumeră elementele încorporate care ajută la mutarea, transportul
        sau depozitarea șezlongului.
    portability_frame_type:
      name: Portabilitate/Tipul cadrului
      description: Indiferent dacă clopotele orchestrei sunt de tip portabil/cu cadru
        de teren sau de tip fix/cu cadru de concert.
    portable_electronic_game_features:
      name: Caracteristici ale jocurilor electronice portabile
      description: Funcții cheie de joc/hardware acceptate de dispozitiv.
    post_surgery_stage_suitability:
      name: Adecvarea la etapa postoperatorie
      description: Indică etapa de recuperare (dacă există) pentru care este conceput
        costumul, important pentru cumpărătorul de lenjerie modelatoare medicală.
    postage_stamp_format:
      name: Formatul timbrului poștal
      description: Modul în care se comercializează/se ambalează timbrul definitiv
        (bucată, pereche, bandă, bloc, foaie, pliant, rolă etc.).
    postmark_type:
      name: Tipul ștampilei poștale
      description: Tipul de obliterație/ștampilă poștală prezent pe timbrele definitive
        folosite.
    potato_cut_style:
      name: Stilul de tăiere a cartofilor
      description: Indică modul de tăiere fizică sau stilul de preparare a cartofilor
        atunci când nu sunt vânduți întregi.
    potato_intended_use:
      name: Utilizarea preconizată a cartofilor
      description: Diferențiază cartofii destinați consumului imediat de cei destinați
        ca sămânță de cartofi sau produse procesate congelate.
    potato_variety:
      name: Varietate de cartofi
      description: Specifică varietatea/soiul de cartofi, permițând cumpărătorului
        să găsească tipuri specifice precum „Yukon Gold”, „Maris Piper” sau „Purple
        Majesty”.
    pottery_clay_firing_required:
      name: Necesită arderea lutului de ceramică
      description: Dacă materialul necesită ardere în cuptor pentru a atinge duritatea/finisajul
        final dorit.
    pottery_slip_application_method:
      name: Metoda de aplicare a angobei
      description: Specifică tehnica de aplicare a angobei.
    pottery_slip_compatible_clay_body:
      name: Corp de lut compatibil cu angoba
      description: Indică tipul (tipurile) de corp de lut cu care angoba este proiectată
        să se potrivească sau cu care să funcționeze.
    pottery_slip_form:
      name: Forma angobei
      description: Indică dacă angoba este vândută ca lichid gata de utilizare sau
        ca amestec uscat/pulbere care necesită amestecare.
    pouch_design:
      name: Designul pungii
      description: Detaliază caracteristicile de construcție sau de îmbunătățire a
        zonei pungii frontale.
    pouch_style:
      name: Stilul pungii
      description: Specifică designul zonei frontale a pungii, adresându-se preferințelor
        de confort, asistență și estetică.
    powdered_beverage_variety:
      name: Sortiment de băutură pudră
      description: Clasifică produsul după tipul de băutură pe care o prepară (de
        exemplu, limonadă, băutură sportivă, shake proteic).
    power_rack_style:
      name: Stil plută cu motor
      description: Specifică designul/configurația generală a plutei, ajutând cumpărătorul
        să facă distincția între cuști întregi, jumătate de plută și variante cu economie
        de spațiu.
    power_steering_fluid_formulation:
      name: Formulă de lichid pentru servodirecție
      description: Familia generală de formulare a fluidului (ATF, hidraulic dedicat/CHF
        sau universal), utilizată pentru filtrare de compatibilitate la nivel înalt.
    practice_mute_audio_output:
      name: Nivelul de atenuare a sunetului
      description: Specifică tipul de conexiune audio disponibilă pe surdina de exersare
        pentru monitorizare și/sau înregistrare (uzual la surdinele silențioase/electronice).
    practice_mute_intonation_impact:
      name: Impactul surdinei de exersare asupra intonației
      description: Descrie efectul de acordare/intonație așteptat la utilizarea surdinii
        de exersare.
    practice_mute_venting_valve_type:
      name: Tipul de ventilare/valvă al surdinei de exersare
      description: Specifică dacă și cum este ventilată surdina de exersare sau include
        o supapă reglabilă pentru modificarea rezistenței/volumului.
    practice_pad_features:
      name: Caracteristici ale saltelei de antrenament
      description: Evidențiază caracteristicile funcționale ale padului de exersare,
        dincolo de dimensiune/material.
    practice_pad_mounting_style:
      name: Stil de montare a plăcuței de exersare
      description: Indică modul în care este destinat poziționării sau atașării padului
        de exersare în timpul utilizării.
    practice_pad_rebound_level:
      name: Nivelul de recul al padului de exersare
      description: Indică revenirea/răspunsul relativ al padului de exersare în comparație
        cu membrane de tobă tipice.
    practice_pad_surface_configuration:
      name: Configurația suprafeței padului de exersare
      description: Descrie dacă padul are una sau mai multe suprafețe de joc și dacă
        acestea diferă ca senzație.
    pregnancy_stage_suitability:
      name: Potrivire pentru stadiul sarcinii
      description: Indică etapa/etapele sarcinii sau postpartum pentru care este concepută
        îmbrăcămintea.
    preparation_state:
      name: Starea de preparare
      description: Indică nivelul de preparare sau gătire necesar înainte de consum.
    preparation_style:
      name: Stil de preparare
      description: Definește starea de tăiere sau de prelucrare a castanelor de apă
        la vânzare (de exemplu, întregi, feliate, prăjite, congelate).
    preservation_medium:
      name: Mediu de conservare
      description: Specifică lichidul sau mediul principal în care se conservă măslinele
        sau caperele (de exemplu, saramură, ulei de măsline, oțet).
    presser_foot_attachment_method:
      name: Metoda de atașare a piciorușului presor
      description: Indică modul în care piciorușul presor al mașinii de cusut se atașează
        la suportul/coada piciorușului presor (de exemplu, prin fixare cu clic sau
        prin înșurubare), ceea ce afectează compatibilitatea.
    pressure_gauge_type:
      name: Tip manometru
      description: Indică tipul de manometru inclus cu pompa de bicicletă, dacă există.
    pressure_measurement_unit:
      name: Unitate de măsurare a presiunii
      description: Indică unitatea utilizată pentru citirea sau calibrarea senzorului
        de presiune, utilă pentru compararea Produse și asigurarea compatibilității
        manometru/ECU.
    pressure_plate_balance_type:
      name: Tipul de echilibrare al plăcii de presiune
      description: Indică dacă placa de presiune este vândută intern sau necesită/presupune
        o vânzare externă care se potrivește cu configurația motorului/volantului.
    pressure_plate_components_included:
      name: Componentele plăcii de presiune incluse
      description: Ce este inclus în lista plăcii de presiune.
    pressure_sensor_application:
      name: Aplicație senzor de presiune
      description: Identifică sistemul/punctul de măsurare al vehiculului pentru care
        este proiectat senzorul de presiune.
    pressure_sensor_port_thread_standard:
      name: Standardul portului/filetului pentru senzorul de presiune
      description: Specifică portul/standardul mecanic utilizat pentru instalarea
        senzorului în sistemul vehiculului.
    pressurization_method:
      name: Metoda de presurizare
      description: Identifică modul în care este generată sau menținută presiunea
        în interiorul dispozitivului.
    pretend_housekeeping_set_items_included:
      name: Articole incluse în setul de menaj de jucărie
      description: Enumeră accesoriile de menaj incluse în set (de exemplu, mop, mătură,
        făraș, sticlă cu pulverizator).
    pretend_play_electronic_features:
      name: Funcții electronice de joc de rol
      description: Caracteristici electronice/interactive incluse în produsul de joc
        de tip „joc de rol”.
    pretend_play_set_pieces_included:
      name: Piese de joc de rol incluse
      description: Recuzită/componente cheie incluse în setul de joacă (de exemplu,
        casierie, mâncare de jucărie, unelte).
    pretend_play_set_theme:
      name: Tema setului de joc de rol
      description: Scenariul/tema principală de joc de rol reprezentată de produs
        (utilă pentru descoperire transversală în categoria Joc de rol pentru copii).
    pretzel_coating:
      name: Glazură de covrig
      description: Identifică orice condiment sau glazură exterioară aplicată covrigului,
        acoperind atât opțiunile sărate (sărate, condimentate), cât și cele dulci
        (ciocolată, iaurt, caramel).
    pretzel_shape:
      name: Formă de covrig
      description: Specifică forma fizică a covrigului (de exemplu, răsucire, băț,
        mușcătură), un factor cheie de diferențiere utilizat de client la căutare
        sau filtrare.
    primary_component_material:
      name: Materialul componentei principale
      description: Materialul principal al blocului motor.
    primary_dish_application:
      name: Aplicație principală pentru preparate
      description: Identifică felul principal de mâncare sau preparatul pentru care
        este destinat aluatul.
    primary_plant_base:
      name: Baza principală de plante
      description: Indică ingredientul(ele) vegetal(e) principal(e) utilizat(e) pentru
        a crea alternativa la brânză.
    primary_plant_protein_source:
      name: Sursă principală de proteine vegetale
      description: Identifică principalul ingredient vegetal care furnizează proteine
        în produs.
    primary_sweetener_source:
      name: Sursă principală de îndulcitori
      description: Identifică planta sau materia primă din care este derivat siropul.
    print_placement:
      name: Poziționare a imprimeului
      description: Indică locul în care este plasată grafica/sigla principală pe tricou.
    print_technique:
      name: Tehnica de imprimare
      description: Specifică metoda de decorare/imprimare utilizată pe grafica tricoului.
    printable_canvas_intended_use:
      name: Utilizarea preconizată a pânzei imprimabile
      description: Aplicația principală pentru care este optimizată pânza imprimabilă.
    printable_fabric_format:
      name: Format imprimabil al materialului textil
      description: Modul de livrare al materialului pentru bumbac imprimabil (foi
        individuale vs rolă continuă), care influențează alimentarea imprimantei și
        fluxul de lucru.
    prism_material:
      name: Material prismă
      description: Specifică materialul elementului optic în sine (prisma), care influențează
        claritatea, durabilitatea și rezistența la zgârieturi.
    prisoner_transport_configuration:
      name: Configurația transportului de prizonieri
      description: Specifică dacă și cum este configurată duba pentru transportul
        deținuților/prizonierilor.
    prisoner_transport_partition_type:
      name: Tipul de partiție pentru transportul prizonierilor
      description: Tipul de partiție interioară/cușcă care separă compartimentele
        față și spate.
    privacy_or_acoustic_feature:
      name: Caracteristică de confidențialitate sau acustică
      description: Specifică elementele integrate de intimitate sau acustice, precum
        panouri despărțitoare, ecrane acustice sau carcase complete.
    processing_state:
      name: Stadiu de procesare
      description: Ai dreptate.Indică dacă penele sunt sterilizate/spălate sau pregătite
        în alt mod pentru utilizare în activități de artizanat.
    produce_grade:
      name: Calitatea produsului
      description: Clasifică gradul de calitate atribuit kiwi-ului pe baza dimensiunilor,
        aspectului și stării.
    produce_growth_stage:
      name: Stadiul de creștere a produselor
      description: Specifică stadiul de creștere în care este vândut produsul (de
        exemplu, microverde, frunză tânără, frunză matură, plantă vie, semințe).
    produce_washing_state:
      name: Starea de spălare a produsului
      description: Indică dacă verdețurile au fost spălate și sunt gata de consum.
    profile_shape:
      name: Profil/formă
      description: Curbura/profilul general al cinelului (cât de abrupt urcă de la
        margine la clopot).
    projectile_ammunition_type:
      name: Tip de proiectil/muniție
      description: Specifică tipul de proiectile sau consumabile utilizate de arma
        de jucărie, dacă este cazul.
    projectile_finish:
      name: Finisaj proiectil
      description: Specifică orice acoperire de suprafață aplicată pe BB, care contribuie
        la rezistența la coroziune sau la vizibilitate (de exemplu, acoperită cu cupru,
        placată cu zinc, vopsită).
    projectile_type:
      name: Tipul proiectilului
      description: Identifică tipul de proiectil pe care îl utilizează sau pentru
        care este destinat produsul.
    pronation_support:
      name: Asistență la pronație
      description: Indică tipul de mers sau modelul de pronație pentru care este conceput
        pantoful sport.
    propellant_type:
      name: Tipul de propulsor
      description: Specifică agentul propulsor pe care este proiectat să îl utilizeze
        piesa sau accesoriul.
    propeller_blade_cup:
      name: Cupa palei elicei
      description: Indică gradul de ondulare a muchiei posterioare (cup) a lamelor.
    propeller_hub_type:
      name: Tip butuc elice
      description: Specifică sistemul butuc/bucșă utilizat de elice (kit butuc înlocuibil
        vs. butuc presat).
    propeller_rotation:
      name: Rotația elicei
      description: Specifică direcția de rotație a unei elice.
    protectant_formula_base:
      name: Baza formulă protectoare
      description: Specifică formula de bază a protectorului, care afectează luciul,
        senzația la atingere și curățarea (de exemplu, pe bază de apă vs. pe bază
        de solvent).
    protection_coverage_area:
      name: Zona de acoperire a protecției
      description: Identifică ce părți ale ceasului acoperă accesoriul de protecție.
    protection_level:
      name: Nivel de protecție
      description: Indică nivelul de protecție al cutiei pentru transportul și depozitarea
        instrumentului.
    protective_case_interior_protection_type:
      name: Tipul de protecție interioară a carcasei de protecție
      description: Descrie principala metodă de protecție interioară utilizată pentru
        fixarea și amortizarea conținutului.
    protective_case_shell_type:
      name: Tipul structurii exterioare a cutiei de protecție
      description: Identifică tipul general de construcție a exteriorului cutiei (rigiditate),
        care influențează protecția la strivire și portabilitatea.
    protective_contact_padding_material:
      name: Materialul de căptușeală de contact al cutiei de protecție
      description: Material folosit pe punctele de contact ale instrumentului (jug/inserție
        clopot) pentru a preveni zgârieturile (de exemplu, fetru, cauciuc).
    protective_cup_configuration:
      name: Configurația cupei de protecție
      description: Specifică dacă este inclusă o cupă de protecție, detașabilă sau
        dacă articolul de îmbrăcăminte are doar un buzunar pentru a ține o cupă.
    protective_eyewear_standard_compliance:
      name: Conformitate cu standardele privind ochelarii de protecție
      description: Specifică standardele sau certificările de siguranță sau rezistență
        la impact pe care ochelarii le îndeplinesc sau le depășesc pentru utilizare
        sportivă.
    protective_gear_certification_standard:
      name: Standardul de certificare a echipamentului de protecție
      description: 'Indică standardul de siguranță/certificare cu care echipamentul
        este conform (variază în funcție de tipul produsului: standarde pentru căști,
        costume sau protecții împotriva impactului).'
    protective_gear_items_included:
      name: Echipament de protecție inclus
      description: Enumeră piesele individuale conținute într-un set de echipamente
        de protecție din mai multe piese.
    protective_gear_padding_type:
      name: Echipament de protecție tip spațiere
      description: Specifică tipul de spațiere utilizat în echipamentul de protecție
        pentru protecția la impact.
    protective_gear_safety_certifications:
      name: Certificări de siguranță pentru echipamentul de protecție
      description: Enumeră standardele recunoscute de siguranță sau performanță specifice
        sportului, îndeplinite de produs, cum ar fi standardele NOCSAE sau ASTM pentru
        căști de hochei pe iarbă.
    protective_pad_components_included:
      name: Componente ale plăcuței de protecție incluse
      description: Specifică ce articole de protecție specifice sunt incluse într-un
        set format din mai multe piese, astfel încât cumpărătorul să știe exact ce
        părți ale corpului sunt acoperite.
    protective_shorts_intended_use:
      name: Utilizarea prevăzută a pantalonilor scurți de protecție
      description: Disciplina principală de ciclism/curse pentru care sunt concepuți
        pantalonii scurți de protecție.
    protective_shorts_padding_type:
      name: Tip de căptușeală pentru șorțuri de protecție
      description: Specifică construcția/formatul elementelor de protecție utilizate
        în pantaloni scurți.
    protective_shorts_padding_zones:
      name: Zone de căptușire pentru șorțuri de protecție
      description: Identifică zonele corpului care au integrate spațiere/armură în
        pantalonii scurți de protecție.
    protective_treatment:
      name: Tratament protector
      description: Specifică orice finisaj sau tratament protector aplicat pentru
        rezistență la pete, apă sau UV (de exemplu, Teflon).
    protector_coverage_area:
      name: Zonă de acoperire a protecției
      description: Specifică ce zonă (zone) a trunchiului este concepută să acopere
        protectorul (de exemplu, piept, spate, părți laterale).
    puck_bottom_style:
      name: Stilul fundului pucului
      description: Descrie profilul inferior al pucului, care Influence viteza și
        controlul pe diferite suprafețe de shuffleboard.
    puck_type:
      name: Tipul de puc
      description: Clasifică stilul funcțional sau utilizarea preconizată a pucului
        de hochei, de la jocul oficial la suveniruri de colecție.
    pull_buoy_style:
      name: Stilul „pull buoy”
      description: Indică stilul funcțional sau configurația pull buoy-ului, cum ar
        fi standard, pentru gleznă sau combinație pullkick.
    pull_through_weight_material:
      name: Materialul greutății de tip pull-through
      description: Pentru bețișoarele tragice, identifică materialul greutății utilizate
        pentru a ghida bețișorul prin instrument.
    pulp_content:
      name: Conținut de pulpă
      description: Indică cantitatea de pulpă de fructe sau legume prezentă în băutură.
    pump_accessories_included:
      name: Accesorii pentru pompă incluse
      description: Enumeră articolele suplimentare incluse împreună cu pompa de mingi,
        pentru a înțelege conținutul pachetului.
    pumping_compatibility:
      name: Compatibilitate pompare
      description: Indică dacă sutienul pentru alăptare este conceput atât pentru
        pompare fără mâini, cât și pentru alăptare.
    punch_pad_type:
      name: Tipul de tampon de perforare
      description: Specifică designul sau stilul unei perne de box/antrenament, astfel
        încât cumpărătorul să poată alege perna corectă pentru nevoile sale de antrenament.
    punching_training_bag_shape:
      name: Forma sacului de box/de antrenament
      description: Specifică forma geometrică a sacului greu, ajutând cumpărătorii
        să aleagă modele potrivite pentru anumite exerciții de lovire (de ex. uppercut-uri,
        lovituri la corp).
    puncture_protection_technology:
      name: Tehnologie de protecție împotriva perforației
      description: Enumeră orice straturi anti-pană deținute sau generice sau tehnologii
        de ranforsare a flancurilor/carcasei încorporate în anvelopă (de exemplu,
        EXO, SnakeSkin, centură Kevlar ).
    puppet_features:
      name: Caracteristici marionetă
      description: Evidențiază caracteristicile funcționale sau de performanță ale
        păpușii (de ex. gură mobilă, efecte sonore, reversibilă).
    puppet_puppet_theater_accessory_type:
      name: Tip de accesoriu pentru păpuși și teatru de păpuși
      description: Specifică ce fel de accesoriu este produsul (de exemplu, recuzită
        de scenă, costum de marionetă, bară de control, șir de schimb).
    purity_unit:
      name: Unitate de puritate
      description: Cum este exprimată puritatea monedei (finețe vs. karat).
    push_up_bar_design:
      name: Designul barei de flotări
      description: Indică stilul funcțional de design al barelor de flotări (de exemplu,
        fixe, rotative, paralele).
    pushrod_end_type:
      name: Tip capăt tijă de împingere
      description: Specifică stilul capătului/atașamentului tijei de împingere utilizat
        la interfața pedală sau cilindru principal.
    putty_glow_activation_method:
      name: Metoda de activare a efectului de strălucire al slime-ului
      description: Modul în care slime-ul este încărcată/activată pentru a lumina
        (de ex. lumină solară, lumină UV/blacklight).
    putty_glow_color:
      name: Culoarea luminii emise de slime în modul de strălucire
      description: Indică culoarea pe care slime-ul o emite atunci când luminează
        în întuneric.
    putty_inclusions:
      name: Elemente incluse în slime
      description: Printre ingredientele notabile se numără amestecurile din interiorul
        plastilinei (de exemplu, sclipici, confetti, mărgele de spumă).
    putty_texture:
      name: Textura slime-ului
      description: Comportamentul principal de manipulare al slime-ului (de ex. elastic,
        săltăreț, fluid).
    puzzle_accessory_features:
      name: Caracteristici ale accesoriilor pentru puzzle
      description: Caracteristici funcționale și elemente de design ale accesoriilor
        pentru puzzle-uri (variază în funcție de tipul de accesoriu).
    pyrometric_cone_range:
      name: Gama conului pirometric
      description: Conul (conurile) pirometric(e) recomandat(e) pentru care glazura
        este formulată să se ardă (de exemplu, Conul 06–04, Conul 5–6).
    quarter_panel_coverage_type:
      name: Tip de acoperire a unui sfert de panou
      description: Specifică ce suprafață din panoul lateral este înlocuită/reparată
        de produs.
    quarter_panel_set_contents:
      name: Conținutul setului de panouri de sfert
      description: Specifică configurația setului de panouri de sfert inclus în ofertă
        (o singură parte, pereche sau cu secțiuni suplimentare de reparație).
    quilting_ruler_markings:
      name: Marcaje cu rigla de matlasare
      description: Specifică tipurile de marcaje imprimate pe rigla de matlasare utilizată
        pentru tăiere/aliniere.
    quilting_ruler_non_slip_feature:
      name: Riglă de matlasare antiderapantă
      description: Indică dacă rigla include un suport/tratament de suprafață antiderapant
        pentru a reduce deplasarea pe material.
    quilting_ruler_transparency:
      name: Transparență riglă matlasare
      description: Indică transparența/vizibilitatea materialului riglei pentru a
        vedea materialul și marcajele de dedesubt.
    quilting_thread_usage:
      name: Utilizarea firului de matlasare
      description: Indică aplicația de matlasare preconizată pentru fir (cum este
        destinat să fie utilizat).
    quilting_thread_weight_system:
      name: Sistemul de grosime al firului de matlasare
      description: Specifică sistemul de dimensionare/grosime a firului utilizat pentru
        a exprima grosimea (de ex. wt, Tex, Denier), pentru a interpreta corect valoarea
        numerică.
    quince_variety:
      name: Soi de gutuie
      description: Identifică varietatea sau soiul specific de gutui, deoarece aroma,
        gustul și potrivirea culinară pot varia în funcție de varietate.
    quinoa_variety:
      name: Varietate de quinoa
      description: Identifică culoarea sau varietatea specifică de quinoa, deoarece
        diferitele soiuri au arome, texturi și timpi de gătire distincți.
    quinto_tuning_system:
      name: Sistem de acordare pentru quinto
      description: Cum este acordat/tensionat quinto-ul.
    race_car_class:
      name: Clasa mașinilor de curse
      description: Clasa/categoria de competiție pentru care este construită mașina
        (regulament/grup de omologare).
    racing_balaclava_face_opening_style:
      name: Cagulă de curse cu deschidere frontală
      description: Configurația deschiderii feței cagulei, care afectează potrivirea,
        etanșarea și confortul căștii.
    racing_balaclava_neck_coverage_length:
      name: Lungimea acoperirii gâtului cagulei de curse
      description: Lungimea de acoperire a fustei/drapajului de gât, concepută pentru
        a fi introdusă în combinezon/sistem de fixare la gât pentru etanșare și protecție.
    racing_balaclava_ventilation_zones:
      name: Zone de ventilație pentru cagule de curse
      description: Zone desemnate pentru respirabilitate/plasă sau ventilate poziționate
        pentru a îmbunătăți circulația aerului sub cască.
    racing_chest_guard_intended_use:
      name: Utilizarea prevăzută a protecției de piept pentru curse
      description: Disciplina sau contextul principal de motorsport pentru care este
        proiectată protecția toracică.
    racing_chest_guard_size_type:
      name: Tipul de mărime al protecției toracice de curse
      description: Indică dacă produsul are mărimea pentru copii, adulți sau este
        universal/reglabil.
    racing_glove_certification_standard:
      name: Standard de certificare pentru mănuși de curse
      description: Specifică certificarea/standardul de siguranță pe care le respectă
        mănușile de curse (de exemplu, FIA, SFI, CE) și, opțional, clasificarea/nivelul,
        atunci când este cazul.
    racing_goggles_lens_system:
      name: Sistem de lentile pentru ochelari de curse
      description: Specifică sistemul de pregătire pentru schimbarea/detașarea lentilelor
        compatibil cu ochelarii de protecție.
    racing_helmet_certification_standard:
      name: Standard de certificare pentru căști de curse
      description: Certificarea (certificările) de siguranță pe care le îndeplinește
        casca de curse.
    racing_kart_brake_type:
      name: Tip de frână pentru kart de curse
      description: Tipul sistemului de frânare principal montat pe kart.
    racing_kart_class:
      name: Clasa de kart de curse
      description: Clasa de competiție sau setul de reguli pentru care este construit
        kartul.
    racing_kart_frame_material:
      name: Materialul cadrului de kart de curse
      description: Materialul principal al cadrului/șasiului kartului.
    racing_kart_seat_size:
      name: Dimensiuni scaun kart de curse
      description: Dimensiunile scaunului de kart utilizate pentru montare.
    racing_neck_support_style:
      name: Tipul de suport pentru gât pentru curse
      description: Tipul constructiv al suportului/ortezei pentru gât de curse și
        modul în care se integrează cu trunchiul/casca pilotului.
    racing_suit_certification_standard:
      name: Standard de certificare pentru combinezoane de curse
      description: Specifică certificarea/omologarea de siguranță pentru curse pe
        care o îndeplinește combinezonul (de ex. standarde FIA sau SFI).
    racing_suit_cuff_design:
      name: Designul manșetei costumului de curse
      description: Tip de manșetă pentru gleznă/încheietură utilizată pentru a interacționa
        cu mănușile/cizmele și pentru a îmbunătăți etanșarea/confortul.
    racing_suit_size_system:
      name: Sistem de mărimi pentru combinezoane de curse
      description: Sistemul de dimensionare utilizat pentru costum (de exemplu, Alpha
        S-XXL, Numeric EU/US, Youth).
    racing_truck_discipline:
      name: Disciplina camioanelor de curse
      description: Specifică disciplina/formatul principal de curse în care este construit
        camionul pentru a concura.
    rack_side_configuration:
      name: Configurație laterală a rastelului
      description: Indică dacă magazia plutei este acoperită cu covorașe pe o parte
        sau pe ambele părți, afectând eficiența spațiului și accesul.
    rack_system_configuration:
      name: Configurația sistemului de plute
      description: Descrie configurația generală/forma sistemului de plute pentru
        tobe.
    racket_dampener_type:
      name: Tipul amortizorului rachetei
      description: Specifică mecanismul de instalare sau stilul funcțional al amortizorului
        de vibrații al rachetei.
    racket_grip_size:
      name: Dimensiunea mânerului rachetei
      description: Specifică clasificarea dimensională bazată pe circumferința mânerului
        rachetei (de exemplu, G1–G6) pentru a asigura o potrivire corespunzătoare
        a mâinii și pentru confort.
    racket_sport_shoe_court_surface:
      name: Tipul suprafeței de joc pentru încălțămintea destinată sporturilor cu
        rachetă
      description: Specifică suprafața terenului de tenis pentru care este proiectat
        sau optimizat pantoful, ajutând jucătorii să aleagă încălțămintea cu modelul
        potrivit al tălpii exterioare și compusul de cauciuc pentru suprafața lor
        de joc tipică.
    racket_string_pattern:
      name: Model de racordaj pentru rachetă
      description: Specifică numărul de șiruri principale și transversale din patul
        de șiruri (de exemplu, 16 x 18), care influențează controlul, rotirea și durabilitatea.
    racket_stringing_status:
      name: Starea încordării rachetei
      description: Indică dacă racheta este vândută cu corzi montate, fără corzi sau
        pre-înșirată.
    racket_weight_class:
      name: Clasa de greutate a rachetei
      description: Oferă categoriile standard de greutate „U” pentru badminton, permițând
        jucătorilor să selecteze rachete în intervalul de greutate preferat.
    racquet_toy_set_equipment_included:
      name: Set de jucării cu rachetă inclus
      description: Enumeră articolele incluse în jucărie sau set (de exemplu, fileu,
        mingi, palete/rachete).
    racquetball_squash_training_aid_type:
      name: Tip de echipament auxiliar pentru antrenament de racquetball și squash
      description: Clasifică tipul specific de ajutor sau accesoriu de dresaj, astfel
        încât cumpărătorul să poată localiza rapid articolul de care are nevoie.
    radiator_cap_gasket_material:
      name: Materialul garniturii capacului radiatorului
      description: Materialul garniturii (garniturilor) de etanșare utilizate pe capacul
        radiatorului.
    radiator_cap_pressure_relief_style:
      name: Capac de radiator cu sistem de eliberare a presiunii
      description: Specifică stilul de eliberare a presiunii/ventilare/acționare a
        capacului radiatorului, care poate afecta gestionarea, siguranța și utilizarea
        preconizată.
    radiator_expansion_tank_cap_application:
      name: Aplicație capac radiator/vase expansiune
      description: Identifică dacă capacul este destinat pentru un ștuț de umplere
        al radiatorului sau pentru un vas de expansiune/superficie pentru lichid de
        răcire.
    radiator_fan_control_type:
      name: Tipul de control al ventilatorului radiatorului
      description: Specifică modul în care este controlat/declanșat ventilatorul radiatorului.
    radiator_fan_mounting_pattern:
      name: Model de montare a ventilatorului radiatorului
      description: Specifică stilul/modelul de montare utilizat pentru atașarea ventilatorului
        sau a ansamblului ventilatorului.
    radiator_fan_type:
      name: Tipul ventilatorului de radiator
      description: Specifică tipul funcțional/configurația ansamblului ventilatorului
        radiatorului.
    radiator_hose_end_type:
      name: Tipul capătului furtunului de radiator
      description: Specifică stilul principal de conexiune/etanșare utilizat la capetele
        furtunului/furtunurilor radiatorului pentru a interfața cu orificiile radiatorului/motorului.
    radiator_hose_position:
      name: Poziția furtunului radiatorului
      description: Poziția funcțională/tipul furtunului de radiator în sistemul de
        răcire.
    radiator_hose_shape:
      name: Forma furtunului de radiator
      description: Geometria/factorul de formă general al furtunului utilizat pentru
        rutarea și montajul instalării.
    radiator_overflow_tank_level_sensor_provision:
      name: Prevedere pentru senzorul de nivel al vasului de expansiune al radiatorului
      description: Indică dacă rezervorul include sau susține un senzor de nivel al
        lichidului de răcire.
    radiator_overflow_tank_shape:
      name: Formă a vasului de expansiune pentru radiator
      description: Forma generală a corpului vasului de expansiune.
    radish_variety:
      name: Varietate de ridiche
      description: Specifică soiul sau tipul de ridiche, astfel încât cumpărătorul
        să poată alege anumite caracteristici precum aroma, culoarea sau dimensiunile
        (de exemplu, daikon, pepene verde, mic dejun franțuzesc).
    radius_of_hollow:
      name: Raza golului
      description: Specifică profilul gol al lamei produs de ascuțitor, exprimat ca
        dimensiuni discrete comune sau plat.
    rail_coverage_configuration:
      name: Configurația acoperirii feroviare
      description: Indică ce parte (părți) a pătuțului protejează setul de huse, clarificând
        dacă achiziția este un singur panou frontal sau un set perimetral din mai
        multe piese.
    rail_mount_standard:
      name: Standard de montare pe șină
      description: Identifică standardul de șină sau interfață de montare utilizat
        pentru atașarea unui accesoriu (de exemplu, vizor, lanternă) la o pușcă cu
        aer comprimat.
    rail_side:
      name: Partea șinei
      description: Indică dacă șina de înlocuire este pentru partea stângă, partea
        dreaptă sau se vinde ca pereche.
    rail_style:
      name: Stilul șinei
      description: Clasifică designul sau configurația generală a șinei (de exemplu,
        cadru în A, curcubeu, îndoit), ceea ce determină posibilitățile de trucuri
        și spațiul necesar.
    rail_system:
      name: Sistem de șină
      description: Identifică interfața de montare a accesoriilor prezentă pe armă
        (de exemplu, Picatinny, M-LOK).
    rain_sensor_technology:
      name: Tehnologie a senzorului de ploaie
      description: Principiul de detectare utilizat pentru detectarea apei pe parbriz.
    rain_suit_configuration:
      name: Configurația costumului de ploaie
      description: Identifică dacă produsul este o combinezon dintr-o singură piesă,
        un set din mai multe piese sau o altă configurație.
    rainstick_construction_type:
      name: Tipul de construcție al unui baston de ploaie
      description: Descrie modul în care este construit bastonul de ploaie (tub tradițional
        din cactus/lemn vs. alternative moderne).
    rainstick_fill_material:
      name: Material de umplutură pentru baston de ploaie
      description: Specifică materialul de umplutură din interior care produce sunetul
        în cascadă (de ex. semințe, mărgele).
    rainstick_playing_technique:
      name: Tehnica de joc cu baston de ploaie
      description: Indică tehnica (tehnicile) de joc recomandate sau stilul de gestionare
        utilizat pentru a produce efectul dorit asupra unui baston de ploaie.
    rainstick_sound_character:
      name: Caracterul sonor al unui baston de ploaie
      description: Descrie caracterul sonic general produs de bastonul de ploaie.
    raising_method:
      name: Metoda de creștere
      description: Descrie modul în care animalele au fost crescute și îngrășate înainte
        de procesare (de ex. hrănite cu iarbă, crescute la pășune, finisate cu cereale).
    rally_competition_class:
      name: Clasa de competiție de raliu
      description: Clasa organismului de sancționare sau a regulamentului pentru care
        este construită mașina de raliu (unde se cunoaște).
    rally_surface_setup:
      name: Configurarea suprafeței de raliu
      description: Suprafața/terenul principal pentru configurarea mașinii de raliu
        sau construirea țintelor.
    ramp_surface_texture:
      name: Textură a suprafeței rampei
      description: Descrie finisajul sau nivelul de aderență al suprafeței de alergare
        a rampei.
    ratchet_mounting_style:
      name: Stil de montare cu clichet
      description: Cum este ținut sau montat clichetul muzical în timpul cântatului
        sau al configurării.
    rattle_element_material:
      name: Materialul elementului zornăitor
      description: Materialul elementelor zornăitoare (de exemplu, dinți/zăngănituri/mărgelele)
        care creează bâzâitul/zdrăngănitul caracteristic.
    rattle_type:
      name: Tip zornăitor
      description: Indică dacă momeala conține o zornăitoare internă sau o cameră
        de sunet și, dacă da, tipul de zornăitoare utilizat.
    rc_airship_lifting_gas_type:
      name: Tip de gaz de ridicare pentru dirijabil RC
      description: Indică gazul cu care este destinat să fie umplut anvelopa dirijabilului/blimpului
        (dacă este cazul).
    rc_helicopter_control_frequency:
      name: Frecvența de control al elicopterului RC
      description: Banda de radiofrecvență utilizată între operatorul de la data de
        pornire și elicopter, care afectează rezistența la interferențe și compatibilitatea
        (de exemplu, 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Caracteristici de stabilizare a elicopterului RC
      description: Enumeră funcțiile de asistență pentru stabilitate/control care
        facilitează zborul sau adaugă abilități.
    rc_motorcycle_controller_type:
      name: Tip de radiocomandă pentru motocicletă RC
      description: Factor de formă al operatorului de date inclus.
    rc_plane_takeoff_launch_method:
      name: Metoda de decolare/lansare unui avion RC
      description: Cum este de obicei lansat/decolat avionul, impactul, unde și cum
        poate fi folosit.
    rc_vehicle_controller_type:
      name: Tipul de dată al operatorului de vehicul RC
      description: Specifică factorul de formă al operatorului utilizat pentru a acționa
        vehiculul RC.
    rc_vehicle_scale:
      name: Scară a vehiculului RC
      description: Specifică raportul de scară (clasa dimensională) al mașinii/camionului
        cu telecomandă (de exemplu, 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Tipul de teren al vehiculului RC
      description: Indică terenul principal pentru care este proiectată mașina/camionul
        cu telecomandă.
    reach_adjustment_type:
      name: Tip de ajustare a distanței
      description: Indică dacă distanța dintre lama manetei și ghidon poate fi reglată
        și, dacă este reglabilă, dacă reglarea se face fără unelte sau necesită unelte.
    rear_axle_spacing:
      name: Distanța dintre puntea spate
      description: Dimensiunea prinderii pentru ax din spatele cadrului, care influențează
        compatibilitatea roților.
    rear_axle_standard:
      name: Punte spate standard
      description: Definește interfața/formatul axului utilizat de roata spate (de
        exemplu, eliberare rapidă, diverse dimensiuni ale axului transversal).
    rear_axle_type:
      name: Tipul punții spate
      description: Specifică sistemul de fixare și diametrul axului utilizate pentru
        fixarea roții spate pe cadru.
    rear_coverage:
      name: Acoperire posterioară
      description: Specifică gradul de acoperire a feselor oferit de slipul de bikini
        (de ex. acoperire parțială, completă).
    rear_opening_type:
      name: Tipul de deschidere spate
      description: Descrie tipul de acces la spate sau funcția de tip „clapetă la
        spate” pentru utilizare facilă la baie, cum ar fi deschidere tip scaun sau
        fermoar complet la spate.
    rear_seat_configuration:
      name: Configurația banchetei din spate
      description: Specifică configurația ansamblului banchetei din spate pentru a
        asista la montare și selectarea aspectului interior.
    rear_view_mirror_ornament_attachment_type:
      name: Tip de atașare a ornamentului pentru oglinda retrovizoare
      description: Specifică modul în care ornamentul se atașează la tija sau carcasa
        oglinzii retrovizoare (de exemplu, buclă șir, clemă, cârlig).
    rearview_mirror_mount_attachment_type:
      name: Tip de atașare a suportului pentru oglinda retrovizoare
      description: Definește modul în care suportul se atașează fizic la ansamblul
        oglinzii retrovizoare (corpul sau tija oglinzii), cum ar fi o clemă, o clemă,
        o curea, un tampon adeziv sau un suport cu șuruburi.
    rebound_board_face_type:
      name: Tipul suprafeței panoului de revenire
      description: Descrie configurația suprafeței care determină comportamentul la
        revenire, cum ar fi modelele plate, înclinate sau cu mai multe fețe.
    rebound_level:
      name: Nivelul de revenire
      description: Indică cât de mult sare înapoi mingea de perete după impact, ajutând
        utilizatorii să aleagă între modelele fără săritură și cele cu săritură moderată.
    rebound_surface_configuration:
      name: Configurația suprafeței de revenire
      description: Specifică aspectul suprafețelor de recuperare și predictibilitatea
        revenirilor (singulare, duble sau multiple; previzibile vs. imprevizibile).
    rebounder_design:
      name: Design al plasei de ricoșeu
      description: Definește stilul structural sau configurația suprafeței de revenire
        a produsului.
    rebounder_design_type:
      name: Tip de design al panoului de revenire
      description: Precizează mecanismul principal de revenire sau tipul de construcție
        al aparatului de antrenament (de exemplu, bază cu cordon elastic, plasă cu
        cadru, țintă rabatabilă).
    rebounder_sides:
      name: Laturile panoului de revenire
      description: Indică dacă jucătorul care recuperează mingi poate returna mingi
        dintr-o parte sau din ambele părți.
    rebounding_mechanism_type:
      name: Tip de mecanism de ricoșeu
      description: Specifică tehnologia utilizată pentru a returna pucul sau mingea
        (de exemplu, bară de protecție din cauciuc, coardă elastică).
    recipient_relationship:
      name: Relația cu destinatarul
      description: Relația cu destinatarul țintă (de exemplu, mamă, tată, prieten)
        pentru card.
    recliner_control_type:
      name: Tip de acționare al fotoliului rabatabil
      description: Specifică modul în care este acționat mecanismul de înclinare (de
        exemplu, manetă manuală, panou electric cu butoane, telecomandă).
    recliner_motion_type:
      name: Tip de mișcare a fotoliului rabatabil
      description: Definește capacitatea principală de mișcare a fotoliului rabatabil
        (de exemplu, balansoar, glisant, pivotant, suport pentru perete, ridicare).
    reclining_mechanism:
      name: Mecanism de rabatare
      description: Specifică mecanismul utilizat pentru acționarea funcției de rabatare
        a canapelei.
    recommended_candle_format:
      name: Formatul recomandat al lumânării
      description: Indică formatul (formaturile) recomandat(e) de lumânare pentru
        care sunt destinate aceste fitiluri autoadezive.
    recommended_container_type:
      name: Tip container recomandat
      description: Materiale de recipient recomandate și sigure pentru lumânări din
        ceară gel.
    recommended_fabric_type:
      name: Tip de material textil recomandat
      description: Material(e) textil(e) recomandat(e) pentru cele mai bune rezultate
        cu modelul de cusut.
    recommended_fabric_weight:
      name: Greutatea recomandată a materialului
      description: Indică categoria de greutate a materialului recomandată pentru
        model.
    recommended_food_pairing:
      name: Asociere alimentară recomandată
      description: Identifică proteinele principale sau preparatele pentru care este
        destinat sosul (de exemplu, pui, porc, vită, pește, legume).
    recommended_lane_condition:
      name: Condiție recomandată a pistei
      description: Indică modelul de ulei sau condiția pistei pentru care mingea este
        concepută.
    recommended_motor_impulse_class:
      name: Clasa recomandată a impulsului motorului
      description: Specifică clasa de impuls total a motorului pentru racheta de modelism
        recomandată pentru un zbor sigur și optim.
    recommended_reading_level:
      name: Nivel de lectură recomandat
      description: Indică nivelul de lectură/abilitate recomandat pentru produs, pentru
        a ajuta cumpărătorii să îl potrivească cu nivelul actual de dezvoltare a lecturii
        al copilului.
    recommended_sleep_position:
      name: Poziția de somn recomandată
      description: Identifică pozițiile de somn pentru care salteaua este concepută
        să asiste confortabil (de exemplu, pentru persoanele care dorm pe o parte
        sau pe spate).
    recommended_storage:
      name: Păstrare recomandată
      description: Indică modul în care produsul trebuie păstrat pentru a-și menține
        prospețimea.
    recommended_surfaces:
      name: Suprafețe recomandate
      description: Specifică tipurile de suprafețe/materiale pentru lipire pentru
        care este destinat adezivul, dincolo de compatibilitatea generală pentru lucrul
        manual (de exemplu, doar hârtie vs. multi-suprafețe).
    recommended_use_case:
      name: Situație de utilizare recomandată
      description: Scenariul principal de utilizare prevăzută pentru sigilant (reparație
        temporară/de urgență vs. reparație pe termen lung).
    recommended_use_location:
      name: Locație de utilizare recomandată
      description: Mediul prevăzut pentru balansoar (curtea din spate a casei vs.
        locul de joacă comercial etc.).
    recommended_vehicle_surfaces:
      name: Suprafețe recomandate pentru vehicule
      description: Specifică suprafețele/finisajele vehiculului pentru care peria
        este destinată să fie sigură (de exemplu, vopsea transparentă, vopsea mată/satinată,
        folie de vinil/PPF, sticlă, jante).
    recorder_accessories_included:
      name: Accesorii incluse pentru flaut drept
      description: Enumeră accesoriile incluse în pachetul acestui excelent înregistrator
        de bas.
    recorder_bore_design:
      name: Designul alezajului flautului drept
      description: Designul profilului interior al alezajului corpului flautului drept.
    recorder_bore_type:
      name: Tip de alezaj pentru flaut drept
      description: Specifică stilul alezajului flautului drept.
    recorder_case_shell_type:
      name: Tipul structurii cutiei pentru flautul drept
      description: Descrie rigiditatea structurală a cutiei.
    recorder_finish:
      name: Finisaj flaut drept
      description: Finisajul/tratamentul suprafeței corpului flautului drept (relevant
        în special pentru flauturile alto din lemn).
    recorder_hole_type:
      name: Tipul de orificiu pentru flautul drept
      description: Indică dacă găurile de ton sunt simple (fără găuri duble) sau includ
        găuri duble pentru o digitare cromatică îmbunătățită.
    recorder_joint_configuration:
      name: Configurația articulației flautului drept
      description: Descrie câte secțiuni ale corpului are flautul drept, ceea ce afectează
        portabilitatea, curățarea și înlocuirea pieselor.
    recorder_joint_style:
      name: Stilul articulației flautului drept
      description: Stilul de îmbinare/conexiune dintre secțiunile flautului drept,
        dacă este cazul.
    recorder_keywork:
      name: Clapele flautului drept
      description: Indică dacă flautul drept include clapă (clape) (mecanisme metalice/plastice)
        pentru notele joase, tipice la flautele drepte tenor/bas/mari.
    recorder_mouthpiece_type:
      name: Tip de muștiuc pentru flaut drept
      description: Descrie dacă muștiucul/capul flautului drept este integrat (dintr-o
        singură piesă) sau detașabil/interschimbabil.
    recorder_pitch_standard_a4:
      name: Standardul de înălțime al flautului drept (A4)
      description: Indică referința tonalității pentru care este construit flautul
        drept (de exemplu, A = 440 Hz ton modern vs. A = 415 Hz ton baroc).
    recorder_thumb_hole_type:
      name: Tip de gaură pentru degetul mare la flaut drept
      description: Specifică dacă flautul drept are un orificiu pentru degetul mare
        simplu sau unul dublu.
    recreational_vehicle_holding_tank_type:
      name: Tip rezervor pentru vehicule recreaționale
      description: Indică rezervoarele de colectare a deșeurilor de care dispune rulota.
    recreational_vehicle_leveling_system:
      name: Sistem de nivelare pentru vehicule recreaționale
      description: Tipul sistemului de nivelare/stabilizare instalat.
    recycled_material_content:
      name: Conținut de materiale reciclate
      description: Indică proporția din îmbrăcăminte fabricată din fibre sau fire
        reciclate.
    reed_dent_material:
      name: Material pentru îndoirea anciei
      description: Materialul dinților/adânciturilor anciei (elementele care separă
        capetele urzelii), care afectează durabilitatea și abraziunea firului.
    reed_type:
      name: Tipul de ancie
      description: Specifică tipul de construcție al anciei utilizate pentru fluierul
        cimpoiului și drone.
    reeds_included:
      name: Ancii incluse
      description: Specifică ce ancii sunt incluse în setul de cimpoi Great Highland
        (pentru fluierul cimpoiului și/sau drone) și dacă sunt din trestie sau sintetice.
    reefing_method:
      name: Metodă de terțarolare
      description: Indică mecanismul (dacă există) pentru reducerea sau strângerea
        velei în timp ce se află pe apă.
    reel_profile:
      name: Profilul mulinetei
      description: Clasifică profilul structural al corpului mulinetei baitcasting
    reel_seat_material:
      name: Materialul port-mulinetei
      description: Specifică materialul de construcție al mulinetei, care afectează
        greutatea, sensibilitatea și rezistența la coroziune.
    reel_seat_type:
      name: Tipul suportului de mulinetă
      description: Specifică stilul mecanismului de blocare care fixează mulineta
        de pescuit la muscă de lansetă.
    reel_size_class:
      name: Clasă de mărime a mulinetei
      description: Dimensiunea nominală desemnată de producător (de exemplu, 1000,
        3000, 5000) care indică capacitatea mulinetei și construcția generală a acesteia.
    referee_wallet_accessories_included:
      name: Accesorii incluse pentru portofelul arbitrului
      description: Enumeră articolele suplimentare incluse în pachetul unui portofel
        pentru arbitri, cum ar fi cartonașele roșii/galbene, fișele de scor sau instrumentele
        de scris, astfel încât cumpărătorii să știe dacă portofelul este vândut ca
        set complet.
    refinement_level:
      name: Nivel de rafinare
      description: Indică gradul de rafinare la care a fost supus uleiul, care afectează
        gustul, culoarea, valorile nutriționale și punctul de afumare.
    reflective_finish:
      name: Finisaj reflectorizant
      description: Specifică tratamentul suprafeței reflectorizante a unei sfere disco
        (de exemplu, oglindă dală vs efecte holografice/iridescente).
    reflective_or_glow_effect:
      name: Efect reflectorizant sau strălucitor
      description: Indică dacă bila antenei are efecte de vizibilitate, cum ar fi
        material reflectorizant, elemente fosforescente sau LED-uri.
    reflective_tape_pattern:
      name: Model de bandă reflectorizantă
      description: Descrie configurația benzii reflectorizante de pe îmbrăcăminte
        utilizată pentru a îndeplini cerințele de vizibilitate.
    regulation_standard:
      name: Standard de reglementare
      description: Specifică standardul oficial sau dimensiunea/certificarea organismului
        de conducere pe care o îndeplinește rețeaua.
    regulator_diaphragm_material:
      name: Materialul diafragmei regulatorului
      description: Specifică materialul diafragmei, care afectează compatibilitatea
        combustibil/etanol (de exemplu, E85) și durabilitatea.
    regulator_port_thread_standard:
      name: Standardul filetului portului regulatorului
      description: Specifică standardul de racordare/conexiune utilizat pe corpul
        regulatorului pentru orificiile de intrare/evacuare/retur.
    rein_features:
      name: Caracteristicile dârlogilor
      description: Evidențiază caracteristicile funcționale speciale sau de siguranță
        ale hățurilor.
    rein_style:
      name: Stilul hățului
      description: Identifică designul structural sau configurația hățurilor, permițând
        călăreților să aleagă tipul corect pentru disciplina și preferințele lor personale.
    reinforced_areas:
      name: Zone întărite
      description: Identifică părțile hainei care sunt întărite pentru durabilitate
        împotriva abraziunii.
    reinforcement_type:
      name: Tipul de armătură
      description: Armătura de construcție utilizată în furtunul radiatorului pentru
        rezistență și suport la temperatură/presiune.
    release_activation_method:
      name: Metoda de activare a eliberării
      description: Specifică modul în care un dispozitiv de eliberare a arcului este
        declanșat de arcaș.
    release_bearing_material:
      name: Materialul rulmentului de eliberare
      description: Materialul principal al componentelor rulmentului/feței (unde este
        specificat de producător).
    release_jaw_style:
      name: Stilul fălcii de eliberare
      description: Descrie designul fălcilor sau cârligului capului de eliberare.
    release_strap_type:
      name: Tip curea de eliberare
      description: Identifică tipul de curea sau sistem de prindere furnizat cu declanșatorul
        de tir cu arcul.
    remote_control_airship_envelope_material:
      name: Materialul plicului dirijabilului cu telecomandă
      description: Specifică materialul principal al învelișului dirijabilului/aeronavei
        (balonul de gaz), distinct de materialul general al jucăriei.
    remote_control_motorcycle_scale:
      name: Scară a motocicletei cu telecomandă
      description: Scara motocicletei RC față de o motocicletă reală (dacă este un
        vehicul la scară).
    remote_control_motorcycle_terrain_suitability:
      name: Potrivit pentru terenul motocicletei cu telecomandă
      description: Terenul principal pe care este proiectată să funcționeze motocicleta
        RC.
    remote_control_motorcycle_water_resistance:
      name: Rezistență la apă pentru motociclete cu telecomandă
      description: Nivel de protecție împotriva apei pentru electronica motocicletei
        RC.
    remote_control_plane_kit_completion_level:
      name: Nivelul de asamblare al kitului de avion cu telecomandă
      description: Indică ce este inclus și cât de complet este setul (de exemplu,
        gata de zbor vs. necesită emițător/receptor/baterie separată).
    remote_control_plane_landing_gear_type:
      name: Tipul trenului de aterizare al avionului cu telecomandă
      description: Indică configurația trenului de aterizare, care afectează durabilitatea
        și suprafețele de decolare/aterizare.
    remote_control_plane_power_type:
      name: Tip de alimentare pentru avionul cu telecomandă
      description: Specifică modul în care este alimentat/propulsat avionul (electric
        vs. incandescent/gaz/nitro), ceea ce afectează întreținerea, zgomotul și locurile
        unde poate fi zburat.
    remote_control_watercraft_features:
      name: Caracteristici ale ambarcațiunilor cu telecomandă
      description: Evidențiază caracteristicile specifice ambarcațiunilor RC care
        influențează utilizarea și durabilitatea.
    remote_control_watercraft_propulsion_drive_type:
      name: Tip de propulsie/acționare cu telecomandă pentru ambarcațiuni nautice
      description: Specifică modul în care este condusă ambarcațiunea cu telecomandă
        în apă.
    remote_control_watercraft_water_environment:
      name: Mediul acvatic al ambarcațiunii cu telecomandă
      description: Indică poziția dorită a apei în care ambarcațiunea cu telecomandă
        funcționează cel mai bine.
    remote_keyless_system_programming_method:
      name: Metoda de programare a sistemului fără cheie de la distanță
      description: Modul în care telecomanda/sistemul este programat sau asociat cu
        vehiculul (de exemplu, procedura de familiarizare vs. instrument profesional).
    repair_compound_type:
      name: Tipul compusului de reparare
      description: Tipul/formula materialului consumabil de reparații inclus (de exemplu,
        tip chit pentru caroserie, tip rășină pentru parbriz, tip ciment/etanșant
        pentru dopuri de anvelope).
    repair_kit_components:
      name: Componente kit de reparații
      description: Enumeră articolul specific inclus în kit de reparații, permițând
        cumpărătorul să înțeleagă conținutul și să compare pachetul.
    repair_method:
      name: Metoda de reparare
      description: Specifică abordarea principală de reparare utilizată de kit, cum
        ar fi plasturii adezivi de tip „coil-and-stick” sau înlocuirea supapei.
    replacement_part_purpose:
      name: Scopul piesei de schimb
      description: Indică dacă articolul este o piesă de schimb OEM, o piesă de upgrade/performanță
        sau un accesoriu add-on .
    replacement_part_type:
      name: Tipul piesei de schimb
      description: Identifică categoria funcțională a piesei pentru bicicleta eliptică,
        permițând cumpărătorilor să filtreze după componenta de care au nevoie.
    replacement_parts_availability:
      name: Disponibilitatea piesei de schimb
      description: Indică dacă sunt acceptate piese consumabile/înlocuibile pentru
        dispozitivul de băgat ața în ac (de ex. cârlige/fire de schimb).
    replica_gun_action_type:
      name: Tip de mecanism pentru replica de armă
      description: Specifică tipul de funcționare/acțiune al replicii de armă de foc
        (așa cum este reprezentată), cum ar fi cu închizător sau cu levier.
    replica_gun_firing_mechanism:
      name: Mecanism de tragere pentru replica de armă
      description: Indică dacă și cum replica simulează tragerea/funcționarea (neletală),
        cum ar fi tragerea cu capse sau faptul că nu trage deloc.
    replica_gun_moving_parts:
      name: Piese mobile pentru replica de armă
      description: Indică ce piese sunt funcționale/mobile pe replică.
    reservoir_orientation:
      name: Orientarea rezervorului
      description: Specifică orientarea sau profilul prevăzut al rezervorului în interiorul
        rucsacului.
    reservoir_type:
      name: Tipul rezervorului
      description: Tipul de configurație al rezervorului pompei centrale de ambreiaj.
    resin_suitability:
      name: Compatibilitate cu rășina
      description: Specifică dacă mingea de handbal este proiectată pentru utilizare
        cu rășină (clei) sau este fără rășină.
    resistance_adjustability:
      name: Posibilitatea de reglare a rezistenței
      description: Specifică dacă rezistența la respirație poate fi modificată de
        utilizator.
    resistance_band_design:
      name: Designul benzii de rezistență
      description: Descrie forma fizică sau stilul unei benzi de rezistență (de ex.,
        buclă, tub cu mânere, formă de 8), ajutând cumpărătorii să aleagă designul
        potrivit pentru rutina lor de exerciții.
    resistance_loading_type:
      name: Tip de încărcare a rezistenței
      description: Indică modul în care rezistența/greutatea este furnizată sau încărcată
        pe aparatul Smith (de ex., cu discuri adăugate sau stivă de greutăți cu selector).
    response_fields_included:
      name: Câmpuri de răspuns incluse
      description: Specifică ce câmpuri/opțiuni de răspuns standard sunt prezente
        pe cardul de răspuns RSVP (de ex., accept/refuz, alegerea meniului).
    restoration_status:
      name: Starea restaurării
      description: Indică dacă autoutilitara este în stare originală, restaurată,
        restaurată cu modificări sau în stare de proiect.
    rhinestone_base_color_family:
      name: Familie de culori a bazei strasului
      description: Identifică familia de culori a bazei strasului (de ex., transparent/cristal,
        auriu/galben, albastru).
    rhinestone_facet_style:
      name: Stil de fațetare a strasului
      description: Modelul feței/fațetelor strasului care influențează strălucirea
        și aspectul (de ex. Xilion rose, tăietură briliant, fațetat sau neted).
    rhinestone_hole_reinforcement_material:
      name: Material de ranforsare a găurii strasului
      description: Materialul din jurul/de la nivelul găurilor (de ex., inel metalic,
        plastic turnat) care influențează durabilitatea în timpul coaserii.
    rhinestone_setting_type:
      name: Tip de montură a strasului
      description: Modul în care piatra este montată/încadrată pentru coasere (de
        ex., montură cu gheare, montură tip casetă, montură cu bordură).
    rhubarb_product_cut_type:
      name: Tip de tăiere a produsului din rubarbă
      description: Descrie pregătirea fizică sau tipul de tăiere a produsului din
        rubarbă.
    ribbon_construction:
      name: Construcția panglicii
      description: Descrie caracteristicile cheie de construcție ale panglicii grosgrain,
        cum ar fi faptul că are fir metalic integrat sau este elastică, ceea ce îi
        schimbă utilitatea (de ex., pentru funde sau croitorie).
    ribbon_packaging_type:
      name: Tip de ambalare a panglicii
      description: Indică modul în care este furnizată/vândută panglica.
    ribbon_pattern_style:
      name: Stilul modelului de panglică
      description: Clasifică metoda de aplicare a modelului frecvent utilizată pe
        panglica grosgrain.
    ribbon_sheen_level:
      name: Nivelul de luciu al panglicii
      description: Indică luciul/gradul de strălucire vizuală al suprafeței panglicii
        de satin.
    ribbon_style:
      name: Stil al panglicii
      description: Specifică modelul/stilul vizual al panglicii (de ex. uni, în dungi,
        tricolor).
    ribbon_trim_backing_type:
      name: Tip de suport pentru panglică/pasmanterie
      description: Indică dacă panglica/pasmanteria are un strat suport și de care
        fel (pentru aplicare ușoară).
    ribbon_trim_edge_finish:
      name: Finisaj al marginii pentru panglică/pasmanterie
      description: Descrie construcția/finisajul marginii panglicii/pasmanteriei (util
        pentru comportamentul la destrămare și scopul utilizării).
    ric_rac_wave_size:
      name: Dimensiunea onduleului panglicii ric-rac
      description: Descrie amplitudinea/scara onduleului panglicii ric-rac (cât de
        mari sunt zigzagurile/onduleurile).
    rice_grain_length:
      name: Lungimea bobului de orez
      description: Clasifică produsele din orez în funcție de lungimea bobului, cum
        ar fi cu bob scurt, mediu sau lung, ceea ce influențează caracteristicile
        de gătire și utilizarea culinară.
    rice_processing_method:
      name: Metodă de procesare a orezului
      description: Descrie modul în care orezul a fost procesat sau pregătit (de ex.
        prefiert, încolțit, fulgi), influențând timpul de gătire, valoarea nutrițională
        și utilizarea.
    rice_variety:
      name: Soi de orez
      description: Specifică soiul cultivat sau varietatea specifică de orez, permițând
        cumpărătorilor să aleagă boabele cu aroma, gustul, textura preferată și în
        funcție de bucătăria vizată.
    riding_toy_features:
      name: Caracteristici ale jucăriei de călărit
      description: Evidențiază caracteristicile funcționale/de siguranță comune specifice
        jucăriilor de călărit.
    rifle_action_type:
      name: Tipul de mecanism al puștii
      description: Mecanismul de funcționare al puștii (modul în care se încarcă/trage/ejectează),
        important pentru identificare și interesul colecționarilor.
    rifle_finish:
      name: Finisaj al puștii
      description: Finisajul/stratul de acoperire exterior principal al pieselor metalice.
    rifle_magazine_type:
      name: Tip de încărcător pentru pușcă
      description: Tip de sistem de alimentare pentru pușcă.
    rifle_stock_material:
      name: Material al patului puștii
      description: Materialul principal utilizat pentru patul puștii/părțile nemetalice
        (de ex., lemn de nuc, polimer).
    rim_clamping_method:
      name: Metodă de prindere a jantei
      description: Modul în care aparatul fixează roata/janta în timpul montării și
        demontării anvelopei.
    rim_strip_type:
      name: Tipul benzii de jantă
      description: Clasifică banda/fondul de jantă în funcție de stilul său, construcție
        sau aplicația specifică (de ex., bandă pentru jante fără cameră comparativ
        cu bandă protectoare din cauciuc).
    rim_tubeless_compatibility:
      name: Compatibilitate jantă fără cameră
      description: Indică dacă janta, banda sau roata este concepută pentru configurații
        de anvelope fără cameră.
    ripeness_stage:
      name: Stadiul de coacere
      description: Indică nivelul de maturitate al fructului la momentul vânzării
        (de ex., necopt, copt, gata pentru consum).
    riser_pad_type:
      name: Tip de înălțător pentru ax
      description: Clasifică stilul funcțional al înălțătorului (de ex., distanțier
        standard, absorbant de șocuri, înălțător înclinat tip pană).
    roasted_malt_processing_type:
      name: Tipul de procesare a malțului prăjit
      description: Metoda specifică de procesare sau varianta utilizată pentru a crea
        malțul prăjit sau cerealele prăjite (de ex., orz prăjit nemalțificat, malț
        negru, variante fără gust amar sau decorticate).
    robotic_toy_interaction_mode:
      name: Mod de interacțiune a jucăriei robotice
      description: Descrie modul principal în care robotul interacționează sau se
        mișcă în timpul jocului.
    robotic_toy_light_features:
      name: Caracteristici de iluminare ale jucăriei robotice
      description: Indică dacă și cum jucăria folosește lumini ca parte a jocului
        (de ex., LED-uri, proiecție).
    robotic_toy_programming_supported:
      name: Programare acceptată pentru jucăria robotică
      description: Specifică ce metodă de programare acceptă jucăria, dacă este cazul.
    robotic_toy_skill_level:
      name: Nivel de abilitate pentru jucăria robotică
      description: Indică nivelul de complexitate a operării/programării așteptat
        de la utilizator.
    robotic_toy_sound_features:
      name: Caracteristici sonore ale jucăriei robotice
      description: Indică capacitățile sonore ale jucăriei robotice.
    rod_butt_style:
      name: Stil al capătului lansetei
      description: Definește configurația capătului lansetei utilizat în aplicațiile
        de pescuit la trenă.
    rod_construction_type:
      name: Tip de construcție a lansetei
      description: Indică stilul general de construcție a lansetei/undiței în ceea
        ce privește numărul de piese și posibilitatea de pliere telescopică.
    rod_guide_material:
      name: Material al inelelor de lansetă
      description: Specifică materialul utilizat pentru inelele de ghidaj sau inserțiile
        lansetei de pescuit, influențând durabilitatea, greutatea și frecarea firului.
    rod_guide_type:
      name: Tip de inele pentru lansetă
      description: Specifică stilul principal de inele de ghidaj instalate pe lansetă.
    rod_handle_type:
      name: Tip de mâner pentru lansetă
      description: Specifică configurația mânerului unei lansete de pescuit, susținând
        confortul și alegerea tehnicii.
    roll_cage_tubing_material:
      name: Material al țevilor pentru cușca de protecție
      description: Specifică materialul/aliajul țevilor utilizat pentru cușca de protecție/bara
        de protecție la răsturnare (de ex., oțel DOM comparativ cu aliaj crom-molibden
        4130).
    roller_skate_brake_shape:
      name: Formă a frânei pentru patine cu rotile
      description: Descrie forma geometrică/profilul capului de frână pentru preferințe
        de performanță sau estetice.
    roller_skate_brake_type:
      name: Tip de frână pentru patine cu rotile
      description: Specifică sistemul de frânare utilizat pe patinele cu rotile.
    roller_ski_technique:
      name: Tehnica schiurilor cu rotile
      description: Identifică tehnica de schi fond pentru care sunt proiectate schiurile
        cu rotile.
    roller_technology:
      name: Tehnologia rolei
      description: Indică tehnologia integrată care îmbunătățește performanța masajului,
        cum ar fi vibrația sau căldura.
    rolling_case_wheel_configuration:
      name: Configurația roților tocului cu rotile
      description: Specifică configurația roților utilizată pe tocul pe role pentru
        claviaturi muzicale.
    rolling_paper_format:
      name: Formatul hârtiei de rulat
      description: Identifică prezentarea fizică a produsului (de ex., foi plate,
        conuri prerulate, învelișuri).
    rolling_paper_gum_type:
      name: Tip de lipici pentru hârtia de rulat
      description: Specifică adezivul (guma) utilizat pe marginea hârtiei pentru sigilare,
        care poate afecta gustul și performanța.
    rolling_paper_size:
      name: Dimensiunea hârtiei de rulat
      description: Indică clasificarea dimensiunii standard a hârtiei de rulat sau
        a conului, permițând cumpărătorilor să selecteze rapid lățimea/lungimea corectă
        pentru nevoile lor.
    rolling_stock_type:
      name: Tip de material rulant
      description: Specifică ce fel de vehicul feroviar este modelul (locomotivă sau
        vagoane de călători/marfă și subtipurile comune de vagoane).
    roof_cargo_net_hook_fastener_style:
      name: Stil de cârlig/prindere pentru plasa de amarare pe portbagaj
      description: Specifică stilul pieselor de capăt utilizate pentru conectarea
        plasei la punctele de ancorare (de ex., cârlig tip S, carabinieră, cârlig
        tip J).
    roof_height_class:
      name: Clasă de înălțime a plafonului auto
      description: Clasifică înălțimea plafonului utilizată în mod obișnuit pentru
        furgonete/autoutilitare (relevant mai ales pentru conversii/construcția de
        autorulote).
    roof_type:
      name: Tipul de acoperiș
      description: Configurația acoperișului sau a secțiunii de tavan a incintei.
    root_variety:
      name: Soi de rădăcinoase
      description: Identifică soiul sau tipul comun al rădăcinoasei (de ex., hrean
        sau soiuri autentice de wasabi).
    rope_buoyancy:
      name: Flotabilitate a frânghiei
      description: Specifică dacă frânghia este concepută să plutească pe suprafața
        apei, ajutând utilizatorii să evite încurcarea și simplificând recuperarea.
    rope_construction:
      name: Construcția frânghiei
      description: Specifică detalii privind construcția fibrei pe lângă stilul de
        împletire, cum ar fi miezul răsucit sau împletite și dacă frânghia este de
        tip miez rezistent cu cămașă protectoare.
    rope_material:
      name: Materialul frânghiei
      description: Identifică materialul frânghiei/corzii de acordare.
    rope_strand_compatibility:
      name: Compatibilitate cu tipul de coardă
      description: Indică configurațiile de coardă pe care dispozitivul de asigurare
        le poate manipula (coardă simplă, semicoardă/dublă, coardă geamănă sau combinații).
    rope_stretch_type:
      name: Tip de elongație a corzii
      description: Descrie caracteristicile de elongație ale corzii, făcând distincția
        între corzi fără întindere, corzi semistatice (întindere redusă), corzi dinamice
        (standard) sau stiluri bungee (elastice).
    rose_bloom_stage:
      name: Stadiu de înflorire a trandafirului
      description: Indică cât de deschiși sunt trandafirii la livrare/sosire (de la
        boboc la complet deschis).
    rose_grade:
      name: Grad de calitate a trandafirului
      description: Grad de calitate comercială a trandafirilor tăiați.
    rosette_center_type:
      name: Tip de centru al rozetei
      description: Specifică tipul de detaliu central sau inserție de pe partea frontală
        a rozetei (ornament tip fundă/medalie).
    rosin_dust_level:
      name: Nivel de praf produs de sacâz
      description: Indică cantitatea preconizată de praf de sacâz produsă în timpul
        utilizării normale.
    rosin_formula_additives:
      name: Formulă/aditivi pentru sacâz
      description: Identifică caracteristici notabile ale formulării, cum ar fi amestecuri
        hipoalergenice, cu praf redus sau infuzate cu metale.
    rosin_hardness:
      name: Duritatea sacâzului
      description: Indică duritatea/moliciunea relativă a sacâzului pentru arcuș,
        care poate afecta aderența și formarea prafului în funcție de climat și stilul
        de interpretare.
    rotation_mechanism_type:
      name: Tip de mecanism de rotație
      description: Specifică mecanismul care permite rotirea corzii (la coarda de
        sărit), influențând fluența și viteza ce poate fi atinsă (de ex., rulmenți
        cu bile comparativ cu bucșe).
    rotation_motion_features:
      name: Caracteristici de rotație/mișcare
      description: Indică dacă planetele/orbitele se rotesc sau se mișcă și în ce
        mod.
    rotor_configuration_type:
      name: Tip de configurație a rotorului
      description: Identifică configurația rotorului și stilul de control al elicopterului
        RC (de ex., coaxial, rotor unic cu pas fix față de pas colectiv, multirotor),
        care influențează semnificativ caracteristicile de zbor și adecvarea pentru
        diferite niveluri de abilitate.
    rotor_construction_type:
      name: Tip de construcție a rotorului
      description: Specifică stilul de construcție al rotorului, care influențează
        greutatea, rigiditatea și gestionarea căldurii.
    rotor_mounting_interface:
      name: Interfață de montare a rotorului
      description: Definește standardul de interfață al butucului utilizat pentru
        fixarea rotorului pe roată.
    rotor_mounting_standard:
      name: Standard de montare a rotorului
      description: Specifică standardul de interfață utilizat pentru fixarea rotorului
        pe butuc (de ex., 6 șuruburi sau Center Lock).
    roulette_set_components_included:
      name: Componente incluse în setul de ruletă
      description: Componente esențiale de ruletă incluse cu roata/setul.
    roulette_wheel_ball_track_type:
      name: Tipul de pistă a bilei roții de ruletă
      description: Descrie stilul pistei bilei utilizate pe roată, care influențează
        realismul și senzația de joc.
    roulette_wheel_numbering_system:
      name: Sistemul de numerotare al roții de ruletă
      description: Indică numerotarea roții de ruletă și configurația zero pentru
        compatibilitatea cu jocul/cotele.
    rounders_equipment_included:
      name: Echipament inclus pentru rounders
      description: Listează articolele sau accesoriile specifice de rounders furnizate
        cu setul sau pachetul de antrenament, astfel încât cumpărătorii să știe exact
        ce conține cutia.
    rounders_governing_body_approval:
      name: Aprobare din partea forului decizional pentru rounders
      description: Indică certificarea sau aprobarea de către un organism oficial
        de conducere al sportului rounders sau al altui sport.
    row_counter_format:
      name: Format al numărătorului de rânduri
      description: Specifică formatul/stilul unui numărător de rânduri pentru tricotat
        (de ex., inel, lanț, mecanic cu clic, digital).
    row_counter_mechanism:
      name: Mecanismul numărătorului de rânduri
      description: Specifică modul în care este avansat/înregistrat numărul de rânduri
        pe instrument.
    row_counter_mounting_method:
      name: Metodă de fixare a numărătorului de rânduri
      description: Modul în care se atașează numărătorul/marcatorul în timpul utilizării
        (pe ac, pe deget, pe lucrare etc.).
    rowel_type:
      name: Tip de rozetă pentru pinteni
      description: Descrie forma sau profilul marginii pintenului în funcție de preferințele
        călărețului și sensibilitatea calului.
    rowing_machine_part_type:
      name: Tipul piesei pentru aparatul de vâslit
      description: Identifică componenta specifică pe care produsul este menit să
        o înlocuiască pe un aparat de vâslit, astfel încât cumpărătorii să poată găsi
        rapid piesa exactă de care au nevoie, fără a crea o multitudine de microcategorii.
    rubber_ducky_character_theme:
      name: Personaj/temă rățușcă de cauciuc
      description: Tema sau stilizarea personajului pentru rățușca de cauciuc (util
        pentru rățuștele inedite/de colecție).
    rubber_ducky_features:
      name: Caracteristici ale rățuștei de cauciuc
      description: Caracteristici funcționale/de design specifice jucăriilor de baie
        tip rățușcă de cauciuc.
    rubber_ducky_size_class:
      name: Clasă de mărime pentru rățușca de cauciuc
      description: O grupare a mărimilor accesibilă cumpărătorilor pentru rățuștele
        de cauciuc, bazată pe utilizarea tipică (jucărie de cadă comparativ cu decorațiune
        tort comparativ cu mărime gigant).
    ruffle_style:
      name: Stil de volănaș
      description: Descrie construcția sau stilul vizual al volănașului de pe o eșarfă
        pentru scaun.
    rugby_headgear_safety_certification:
      name: Certificare de siguranță pentru casca de rugby
      description: Indică dacă echipamentul de protecție pentru cap îndeplinește standardele
        oficiale de siguranță pentru rugby sau pentru sporturi în general.
    rugby_size:
      name: Mărime pentru rugby
      description: Clasifică echipamentul după etichetele de mărime specifice rugbyului,
        utilizate frecvent în titlurile produselor.
    rugby_variant:
      name: Varianta de rugby
      description: Specifică varianta de rugby (cod sau format) pentru care este destinat
        produsul.
    ruler_edge_type:
      name: Tipul de margine al riglei
      description: Identifică profilul marginii/funcția utilizată pentru măsurare
        sau marcare (de ex., margine dreaptă, teșită, cu buză).
    ruler_marking_style:
      name: Stilul de marcare al riglei
      description: Descrie dispunerea marcajelor/ghidajelor imprimate pe riglă, dincolo
        de gradațiile de bază.
    runner_configuration:
      name: Configurație a tălpicilor
      description: Descrie numărul și dispunerea tălpicilor de pe sanie.
    runner_material:
      name: Material al tălpicilor
      description: Specifică materialul utilizat pentru tălpicii sau benzile de alunecare
        ale saniei.
    saddle_cover_style:
      name: Stilul husei pentru șa
      description: Clasifică designul general sau stilul de utilizare al produsului
        (de ex., husă de depozitare, husă pentru mers pe bicicletă, geantă de transport).
    saddle_design:
      name: Designul șeii
      description: Clasifică designul/stilul general ergonomic sau de degajare a presiunii
        al șeii (de ex., cu decupaj, fără vârf, cu vârf despicat, cu arcuri).
    saddle_discipline:
      name: Disciplină pentru șa
      description: Specifică disciplina principală de echitație sau utilizarea/stilul
        vizat al șeii.
    saddle_mounting_type:
      name: Tip de montare a șeii
      description: Specifică interfața dintre șa și tija de șa pentru compatibilitate
        (de ex., cu șine, pivotantă, sistem I-Beam).
    saddle_pad_shape:
      name: Formă a valtrapului
      description: Descrie croiala fizică/conturul valtrapului, care influențează
        compatibilitatea cu șaua și preferințele estetice.
    saddle_pad_style:
      name: Stil de valtrap
      description: Identifică stilul funcțional al valtrapului sau disciplina vizată,
        permițând călăreților să aleagă designul potrivit pentru activitatea sau tipul
        lor de șa.
    saddle_padding_material:
      name: Material de căptușire pentru șa
      description: Indică materialul principal de amortizare sau tehnologia din interiorul
        șeii care influențează confortul și senzația în timpul călăriei.
    saddle_rail_material:
      name: Material al șinelor șeii
      description: Specifică materialul utilizat pentru șinele de sub șaua bicicletei,
        ceea ce influențează rezistența, confortul, greutatea și prețul.
    saddle_tree_material:
      name: Material al scheletului șeii
      description: Specifică materialul utilizat pentru scheletul șeii de echitație,
        cadrul intern al acesteia.
    saddle_tree_width:
      name: Lățime a scheletului șeii
      description: Descrie clasificarea lățimii scheletului șeii, determinând potrivirea
        pe greabănul calului.
    safety_documentation_available:
      name: Documentație de siguranță disponibilă
      description: Indică ce documente de conformitate/siguranță sunt furnizate pentru
        ingredient (de ex., fișa cu date de securitate, certificat/declarație IFRA,
        declarație privind alergenii).
    safety_equipment_included:
      name: Echipamente de protecție incluse
      description: Articole de protecție/siguranță incluse în kit.
    safety_features:
      name: Caracteristici de siguranță
      description: Indică caracteristicile de siguranță încorporate menite să reducă
        tăierile accidentale sau să protejeze lama în timpul depozitării.
    safety_harness_type:
      name: Tip de ham de siguranță
      description: Indică stilul și configurația hamului de reținere a copilului furnizat
        cu scaunul.
    safety_mechanism_type:
      name: Tip de mecanism de siguranță
      description: Descrie stilul sistemului de siguranță încorporat utilizat pentru
        a prinde haltera în cazul ridicărilor ratate.
    safety_restraint_type:
      name: Tip de sistem de siguranță
      description: Tipul de sistem încorporat pentru reținerea copilului pe scaunul
        leagănului, dacă există.
    safety_warning:
      name: Avertisment de siguranță
      description: Indică dacă produsul prezintă avertismente comune de siguranță
        pentru jucării relevante pentru bile (de ex., pericol de sufocare).
    sail_shape:
      name: Formă a velei
      description: Descrie stilul geometric al velei caiacului, care influențează
        eficiența, manevrabilitatea și montarea.
    salad_dressing_type:
      name: Tip de dressing pentru salată
      description: Identifică stilul sau textura fundamentală a dressingului (de ex.,
        cremos, vinaigrette, pe bază de iaurt), ajutând cumpărătorii să facă distincția
        între diferite baze și consistențe.
    salad_topping_base_ingredient:
      name: Ingredient de bază pentru toppingul de salată
      description: Specifică grupa principală de ingrediente care alcătuiește toppingul,
        ajutând clienții să filtreze în funcție de preferințele nutriționale, alergeni
        sau textura dorită.
    salt_level:
      name: Nivelul de sare
      description: Indică cantitatea de sare sau sodiu adăugată la nuci sau semințe.
    sand_cup_features:
      name: Caracteristici ale cupei pentru nisip
      description: Caracteristici funcționale/fizice ale cupei (cupelor) de nisip
        care influențează jocul și utilizarea.
    sand_shovel_handle_style:
      name: Stil de mâner pentru lopata de nisip
      description: Descrie forma mânerului/prinderii de la capătul cozii lopeții/hârlețului.
    sand_toy_set_pieces_included:
      name: Piese incluse în setul de jucării pentru nisip
      description: Listează tipurile de componente pentru joaca în nisip incluse în
        set (de ex., găleată, lopată, forme) pentru a ajuta cumpărătorii să compare
        kiturile în funcție de conținut.
    sand_water_mill_items_included:
      name: Articole incluse pentru moara de nisip și apă
      description: Listează accesoriile cheie incluse cu jucăria tip moară (găleți,
        cupe, forme etc.).
    sandbag_style:
      name: Stilul sacului de nisip
      description: Identifică designul specific și scopul de antrenament al sacului
        cu nisip (de ex. bulgăresc, Strongman, Power), ajutând cumpărătorii să aleagă
        între diferite modalități de antrenament.
    sandbox_bottom_type:
      name: Tip de bază pentru lada cu nisip
      description: Tipul de bază/construcție folosit la fundul lăzii cu nisip.
    sandbox_drainage_type:
      name: Tip de drenaj pentru lada cu nisip
      description: Cum se scurge apa din lada cu nisip (dacă este cazul), cum ar fi
        prin orificii de scurgere sau un dop detașabil.
    sandbox_seating_type:
      name: Tip de scaun pentru cutia cu nisip
      description: Dacă lada de nisip include scaune/banchete integrate și de ce fel.
    sapodillo_variety:
      name: Soi de sapotilă
      description: Identifică soiul sau varietatea specifică de sapotilă/chikoo (de
        ex. „Alano”, „Prolific”), permițând pasionaților să selecteze profilurile
        de aromă și caracteristicile preferate.
    sapote_variety:
      name: Soi de sapote
      description: Specifică specia/tipul de sapote oferit (de ex., negru, alb, mamey),
        permițând cumpărătorilor să facă distincția între diferite tipuri.
    satin_ribbon_face_type:
      name: Tip de față a panglicii de satin
      description: Specifică dacă panglica are un finisaj satinat (lucios) pe o singură
        față sau pe ambele fețe.
    sauce_consistency:
      name: Consistența sosului
      description: Descrie textura sau grosimea sosului de pizza.
    sauce_product_form:
      name: Formă a produsului de tip sos
      description: Indică forma fizică a sosului, cum ar fi lichid, ulei, pastă, pudră,
        fulgi sau sirop.
    sauce_variety:
      name: Sortiment de sos
      description: Identifică stilul specific sau familia de rețete a sosului alb
        sau de smântână (de ex., Alfredo, Béchamel, Hollandaise).
    saxophone_body_finish:
      name: Finisajul corpului saxofonului
      description: Descrie finisajul/placarea principală de pe corpul saxofonului
        (separat de mecanismul clapelor).
    saxophone_body_type:
      name: Tip de corp pentru saxofon
      description: Descrie configurația fizică generală a corpului saxofonului bas
        și orientarea pavilionului.
    saxophone_construction_style:
      name: Stilul de construcție al saxofonului
      description: Indică caracteristicile comune de construcție ale saxofonului care
        influențează durabilitatea, rezonanța și întreținerea.
    saxophone_included_accessories:
      name: Accesorii incluse pentru saxofon
      description: Listează accesoriile incluse care sunt livrate în mod obișnuit
        cu un pachet de saxofon alto.
    saxophone_key_system:
      name: Sistem de clape pentru saxofon
      description: Identifică sistemul mecanismului de clape al saxofonului (dispunere/standard
        al mecanismului) utilizat pe instrument.
    saxophone_key_touch_material:
      name: Material al butoanelor clapelor saxofonului
      description: Specifică materialul utilizat pentru butoanele clapelor de saxofon
        (de ex., clape cu sidef).
    saxophone_mouthpiece_baffle_type:
      name: Tipul de deflector al muștiucului de saxofon
      description: Descrie designul deflectorului care modelează fluxul de aer și
        vioiciunea sunetului.
    saxophone_neck_type:
      name: Tipul gâtului de saxofon
      description: Specifică configurația gâtului furnizată cu saxofonul bas.
    saxophone_package_contents:
      name: Conținutul pachetului de saxofon
      description: Listează accesoriile esențiale incluse cu saxofonul (de ex., husă,
        muștiuc, ligatură, curea de gât, kit de curățare).
    saxophone_reed_cut:
      name: Tăietura anciei de saxofon
      description: Specifică tăietura/stilul anciei de saxofon, care influențează
        răspunsul, tonul și senzația.
    saxophone_reed_material_type:
      name: Tipul de material al anciei de saxofon
      description: Specifică categoria materialului anciei (de exemplu, trestie sau
        sintetică).
    saxophone_reed_strength_scale:
      name: Scala de rezistență a anciei de saxofon
      description: Specifică sistemul de numerotare/scala de rezistență utilizată
        pentru ancie (adesea dependentă de marcă), permițând o comparație mai clară
        între listări.
    saxophone_small_part_thread_size:
      name: Dimensiunea filetului pieselor mici ale saxofonului
      description: Specifică dimensiunea/standardul de filet pentru piesele mici filetate
        ale saxofonului (în principal șuruburi), permițând selectarea potrivirii corecte.
    saxophone_swab_application_area:
      name: Zona de aplicare a tamponului de curățare pentru saxofon
      description: Indică ce parte a saxofonului este destinată curățării/uscării
        cu tamponul.
    scabbard_material:
      name: Materialul tecii
      description: Specifică materialul principal al tecii incluse (dacă există).
    scale_model_assembly_status:
      name: Starea de asamblare a modelului la scară
      description: Indică dacă modelul la scară este gata de expunere sau necesită
        asamblare/vopsire.
    scale_model_car_features:
      name: Caracteristicile mașinuței la scară
      description: Caracteristici notabile ale mașinuței la scară, cum ar fi uși/capotă
        care se deschid, roți directoare, suspensie etc.
    scale_model_kit_assembly_requirements:
      name: Cerințele de asamblare ale kitului de model la scară
      description: Specifică ce pași/materiale suplimentare de asamblare sunt de obicei
        necesare dincolo de simpla asamblare prin presare.
    scale_model_kit_components_included:
      name: Componentele incluse în kitul de model la scară
      description: Listează ce este inclus cu modelul/kitul de tanc la scară (de ex.,
        decalcomanii, figurine, piese fotogravate).
    scale_model_paint_status:
      name: Starea de vopsire a modelului la scară
      description: Indică dacă modelul de elicopter este prevopsit/finalizat sau necesită
        vopsire.
    scale_model_pose:
      name: Poză/postură a modelului la scară
      description: Specifică poza reprezentată a modelului de cal pentru potrivire
        la expunere/dioramă.
    scale_model_rotor_configuration:
      name: Configurația rotorului modelului la scară
      description: Specifică configurația rotorului elicopterului reprezentată de
        model.
    scale_model_truck_era:
      name: Epoca camionului model la scară
      description: Indică epoca/perioada camionului real pe care modelul îl reprezintă
        (util pentru colecționarii care caută camioane vintage sau moderne).
    scale_model_truck_propulsion_type:
      name: Tipul de propulsie al camionului model la scară
      description: Specifică dacă camionul reprezentat este diesel, pe benzină, electric,
        hibrid sau are alt tip de propulsie (astfel cum este reprezentat/comercializat
        de model).
    scale_units:
      name: Unitățile de scară
      description: Unitățile de măsură tipărite/gravate pe braț pentru setarea razei/diametrului.
    scent_function:
      name: Funcția mirosului
      description: Definește funcția principală a unui produs aromat, astfel încât
        vânătorii să poată identifica rapid instrumentul potrivit (de ex., atractant
        față de eliminarea mirosului).
    scent_source:
      name: Sursa mirosului
      description: Listează sursa biologică sau aromatică principală utilizată în
        formularea produsului, acoperind tipuri de urină, mirosuri pe bază de alimente,
        arome de plante etc.
    school_bus_body_type:
      name: Tipul de caroserie al autobuzului școlar
      description: Clasifică un autobuz școlar după formatele comune de caroserie/clasă
        utilizate pe piață (de ex., tipul A–D).
    school_bus_safety_feature:
      name: Caracteristica de siguranță a autobuzului școlar
      description: Echipamente de siguranță notabile instalate pe autobuzul școlar.
    school_glue_washability:
      name: Capacitate de spălare a lipiciului școlar
      description: Indică cât de ușor poate fi curățat lipiciul uscat/umed de pe piele/îmbrăcăminte/suprafețe.
    scissors_application:
      name: Aplicația foarfecelor
      description: Aplicația/materialul principal de tăiere prevăzut pentru foarfece.
    scooter_brake_pad_material:
      name: Materialul plăcuțelor de frână ale trotinetei
      description: Specifică compusul utilizat în plăcuțele de frână, care influențează
        performanța, zgomotul și durata de viață.
    scoring_method:
      name: Metoda de punctaj
      description: Specifică modul în care scorurile sunt urmărite pe masa de fotbal,
        cum ar fi numărătoare manuale cu bile sau tabele de scor electronice.
    scoring_pattern:
      name: Modelul de notare a punctajului
      description: Dispunerea zonelor de punctaj tipărite pe câmpul de joc.
    scoring_system_type:
      name: Tip de sistem de punctaj
      description: Descrie stilul mecanismului de ținere a scorului care însoțește
        masa, cum ar fi glisoare manuale sau diverse afișaje electronice.
    scottish_smallpipes_bag_material:
      name: Materialul burdufului cimpoiului scoțian mic
      description: Specifică materialul burdufului (rezervorului de aer) care însoțește
        cimpoiul mic.
    scottish_smallpipes_drone_tuning_configuration:
      name: Configurație de acordare a burdoanelor pentru cimpoi scoțian
      description: Specifică configurația de acordare a tuburilor de burdon care însoțește
        instrumentul (înălțimile/rolurile burdoanelor în raport cu tonica).
    scottish_smallpipes_reed_type:
      name: Tip de ancie pentru cimpoi scoțian
      description: Identifică tipul de ancie utilizat pentru tubul melodic (și/sau
        dacă ancia este sintetică sau din trestie).
    scraping_surface_type:
      name: Tip de suprafață de răzuire
      description: Specifică construcția/geometria suprafeței de răzuire care produce
        sunet (de ex., canelată, cu dinți/pieptene, ondulată).
    screw_drive_type:
      name: Tip de antrenare a șurubului
      description: Specifică stilul locașului de pe capul șurubului sau bulonului,
        indicând instrumentul necesar pentru a-l strânge sau a-l scoate (de ex., inbus/hexagonal,
        torx).
    screw_thread_size:
      name: Dimensiune a filetului șurubului
      description: Specifică standardul de dimensiune a filetului pentru șuruburile
        incluse sau compatibile (de ex., M4, M5, M6).
    sculpting_clay_base_type:
      name: Tip de bază a argilei de modelaj
      description: Descrie formularea/baza principală a argilei pentru modelaj.
    seafood_cut:
      name: Tăietură a fructelor de mare
      description: Descrie tăierea fizică sau prezentarea produsului din fructe de
        mare/pește (de ex., întreg, file, medalion/rondele).
    seafood_processing_method:
      name: Metodă de procesare a fructelor de mare
      description: Specifică tehnica principală de conservare sau procesare aplicată
        fructelor de mare, cum ar fi afumat, sărat sau liofilizat.
    seafood_source:
      name: Sursă a fructelor de mare
      description: Indică dacă fructele de mare provin din captură sălbatică, acvacultură,
        alternative pe bază de plante sau dintr-o altă sursă, ajutând cumpărătorii
        să evalueze sustenabilitatea și calitatea.
    seal_material:
      name: Material al manșetei de etanșare
      description: Materialul utilizat pentru garniturile sau manșetele de etanșare
        de la gât, încheietura mâinii și glezne, care mențin costumul impermeabil.
    seal_type:
      name: Tipul de etanșare
      description: Specifică metoda de etanșare utilizată de racord pentru a preveni
        scurgerile de lichid de răcire.
    sealant_formulation:
      name: Formulare a soluției de etanșare
      description: Indică formula chimică principală sau tehnologia aditivilor soluției
        de etanșare pentru anvelope de bicicletă (de ex., pe bază de latex, consolidată
        cu fibre, acrilic).
    seals_leak_type:
      name: Tipul de scurgere a etanșărilor
      description: Tipul/locația scurgerii din sistemul de răcire pe care produsul
        este menit să o etanșeze.
    seam_construction:
      name: Construcția cusăturii
      description: Descrie modul în care este creată cusătura mingii, influențând
        traiectoria, durabilitatea și senzația la atingere.
    seam_design:
      name: Designul cusăturii
      description: Specifică tipul de construcție al cusăturii sau caracteristicile
        cusăturilor decorative ale articolelor de ciorăpărie.
    seam_gauge_scale_type:
      name: Tip de gradație a lerei de măsurat tivul
      description: Indică ce gradații/marcaje sunt incluse pe instrumentul de măsurat
        tivul/cusăturile dincolo de scara de bază a riglei.
    seam_gauge_slider_material:
      name: Material al cursorului pentru lera de măsurat tivul
      description: Identifică materialul cursorului/indicatorului ajustabil (atunci
        când este prezent).
    seam_ripper_tip_style:
      name: Stil al vârfului tăietorului de ață
      description: Descrie designul funcțional al vârfului folosit pentru a aluneca
        sub cusături și a tăia ața în siguranță.
    seam_sealing_type:
      name: Tip de impermeabilizare a cusăturilor
      description: Descrie metoda utilizată pentru a preveni pătrunderea apei la cusăturile
        costumului de ploaie (de ex., complet termosudate, sudate).
    seam_type:
      name: Tip de cusătură
      description: Descrie stilul de cusătură pe mingea de baseball, care influențează
        prinderea, aerodinamica și nivelul de joc prevăzut.
    season_condition_protection:
      name: Protecție în funcție de sezon/condiții meteo
      description: Indică condițiile meteorologice principale împotriva cărora prelata
        de parbriz este menită să protejeze.
    season_rating:
      name: Clasificare sezonieră
      description: Specifică clasificarea pe sezoane a cortului, indicând potrivirea
        acestuia pentru diferite condiții meteorologice (de ex., 3 sezoane, 4 sezoane,
        5 sezoane/expediție).
    seasoning_variety:
      name: Sortiment de condimente
      description: Clasifică condimentul în funcție de stilul de preparare sau utilizarea
        culinară tradițională.
    seat_adjustment_power_type:
      name: Tip de acționare pentru reglarea scaunului auto
      description: Specifică modul în care sunt acționate mecanismele de reglare a
        scaunului (manete manuale comparativ cu motoare electrice), ceea ce poate
        afecta cablajul/compatibilitatea.
    seat_belt_attachment_type:
      name: Tip de prindere a centurii de siguranță
      description: Specifică modul în care chinga se prinde de elementele vehiculului/centurii.
    seat_belt_buckle_electrical_connector_type:
      name: Tip de conector electric pentru catarama centurii de siguranță
      description: Specifică conectorul/interfața folosită pentru cablajul comutatorului
        cataramei/pretensionatorului, atunci când este aplicabil.
    seat_belt_buckle_mounting_type:
      name: Tip de montare a cataramei centurii de siguranță
      description: Descrie modul în care catarama/receptorul se atașează la vehicul,
        scaun sau tija centurii (de ex., cu șurub, cu clemă).
    seat_belt_buckle_release_button_color:
      name: Culoarea butonului de eliberare a centurii de siguranță
      description: Specifică culoarea butonului de eliberare a cataramei.
    seat_belt_cover_placement:
      name: Amplasarea husei pentru centura de siguranță
      description: Specifică unde trebuie utilizată husa pe centura de siguranță.
    seat_belt_integration:
      name: Integrare cu centura de siguranță
      description: Specifică dacă scaunul include o centură de siguranță integrată
        și/sau receptor pentru cataramă, sau dacă receptorul OEM al vehiculului trebuie
        transferat la instalare.
    seat_belt_provision:
      name: Dotare cu centuri de siguranță
      description: Indică dacă centurile de siguranță și/sau componentele aferente
        (de exemplu, cataramele) sunt incluse în ansamblul scaunului din spate sau
        trebuie transferate de pe scaunul original.
    seat_belt_strap_installation_location:
      name: Locația de instalare a chingii centurii de siguranță
      description: Indică unde este instalată cureaua/chinga în cadrul sistemului
        de centuri.
    seat_cover_placement:
      name: Amplasare a husei de scaun
      description: Indică pentru ce poziție (poziții) de ședere din vehicul este destinată
        husa auto.
    seat_cover_securement_method:
      name: Metodă de fixare a husei auto
      description: Indică modul principal prin care husa este fixată de scaun. Dacă
        se folosesc mai multe metode, selectați-o pe cea principală.
    seat_cover_set_contents:
      name: Conținut al setului de huse auto
      description: Descrie ce piese sunt incluse în pachet (de ex., doar șezuturile
        sau scaun complet + tetiere).
    seat_fabric:
      name: Material textil pentru scaun
      description: Materialul textil principal folosit pentru șezutul și spătarul
        suspendat al scaunului.
    seat_height_category:
      name: Categorie de înălțime a scaunului
      description: Clasifică taburetul/scaunul în funcție de intervalul tipic de înălțime
        a șezutului (de ex., înălțime a blatului de bucătărie sau a barului) pentru
        a simplifica selecția.
    seat_material:
      name: Materialul șezutului
      description: Identifică materialul principal al suprafeței de ședere a băncii.
    seat_mounting_type:
      name: Tip de montare a scaunului
      description: Configurația de montare/șine utilizată pentru atașarea scaunului
        de podeaua vehiculului.
    seating_surface_material:
      name: Material al suprafeței de ședere
      description: Specifică materialul zonei pe care o persoană se lasă pe spate
        (de ex., plasă Textilene, material suspendat, răchită, tapițerie capitonată).
    seatpost_clamp_mechanism:
      name: Mecanism al colierului pentru tija de șa
      description: Tipul de sistem de strângere/închidere care fixează tija de șa.
    section_orientation_compatibility:
      name: Compatibilitate a orientării secțiunii
      description: Indică dacă accesoriul se potrivește cu o secțiune cu braț pe partea
        stângă, braț pe partea dreaptă sau o orientare universală.
    sectional_configuration:
      name: Configurație a modulelor
      description: Definește modulul specific sau orientarea unității modulare (de
        ex., de colț, capăt stânga, taburet), astfel încât cumpărătorii să poată asambla
        configurațiile dorite.
    sectional_shape:
      name: Formă a canapelei modulare
      description: Definește configurația/dispunerea geometrică generală a canapelei
        modulare.
    secured_components:
      name: Componente asigurate
      description: Listează piesele specifice ale bicicletei pe care le protejează
        axul antifurt sau piulițele de securitate (de ex., roata din față, roata din
        spate, tija de șa).
    seed_content:
      name: Conținut de semințe
      description: Indică dacă citricele sunt fără sâmburi, au puțini sâmburi sau
        au mulți sâmburi.
    seed_size_classification:
      name: Clasificare a dimensiunii semințelor
      description: Indică dimensiunea relativă a sâmburelui necomestibil din interiorul
        fructului de lici, care afectează cantitatea de pulpă comestibilă.
    self_adhesive_backing_format:
      name: Format al suportului autoadeziv
      description: Formatul fizic al stratului adeziv furnizat cu baza metalică a
        fitilului (disc pre-aplicat sau autocolante separate etc.).
    self_adhesive_hook_loop_backing_type:
      name: Tipul de suport al elementului autoadeziv cu velcro
      description: Specifică construcția suportului și sistemul adeziv utilizat pe
        partea autoadezivă.
    self_adhesive_hook_loop_fastener_shape:
      name: Formă a prinderii autoadezive cu velcro
      description: Specifică tăietura/forma bucăților de elemente de fixare furnizate.
    self_hardening_clay_finish:
      name: Finisaj al argilei cu uscare la aer
      description: Descrie aspectul/luciul suprafeței odată ce este complet întărită/uscată
        (util pentru a alege între mat natural, satinat etc.).
    self_hardening_clay_water_resistance_after_curing:
      name: Rezistență la apă după uscare a argilei cu uscare la aer
      description: Indică rezistența la expunerea la apă odată ce este complet întărită
        (fără un strat de etanșare suplimentar).
    sensor_functions:
      name: Funcții ale senzorului
      description: Indică parametrii de ciclism pe care îi măsoară senzorul.
    sensor_measurement_mode:
      name: Mod de măsurare al senzorului
      description: Indică parametrii pe care senzorul îi poate capta (de ex., doar
        cadență, doar viteză, dual viteză și cadență).
    sensor_mounting_position:
      name: Poziție de montare a senzorului
      description: Specifică locația de pe bicicletă sau biciclist unde este instalat
        senzorul, cum ar fi brațul pedalier, butucul roții sau pantoful. Acest lucru
        afectează compatibilitatea cu diferite configurații de biciclete.
    sensor_mounting_type:
      name: Tip de montare a senzorului
      description: Specifică modul în care senzorul MAP se montează pe galeria de
        admisie/motor (de ex., flanșă fixată cu șuruburi sau mufă de cauciuc presată).
    sensor_or_gauge_mounting_location:
      name: Locație de montare pentru senzor sau ceas indicator
      description: Specifică locul de pe vehicul unde senzorul sau ceasul indicator
        urmează a fi instalat (la nivel de sistem/locație, nu stânga/dreapta).
    sensory_modality:
      name: Modalitate senzorială
      description: Experiența/experiențele senzoriale principale pe care jucăria este
        concepută să le ofere (poate fi multisenzorială).
    sensory_toy_fidget_mechanism:
      name: Mecanism de tip jucărie antistres al jucăriei senzoriale
      description: Interacțiunea/mecanismul principal folosit pentru joaca antistres
        și autoreglare.
    sensory_toy_light_features:
      name: Caracteristici luminoase ale jucăriei senzoriale
      description: Comportamente/efecte de iluminare oferite de jucărie.
    sensory_toy_texture_type:
      name: Tipul de textură al jucăriilor senzoriale
      description: Elemente tactile/texturi de suprafață dominante utilizate pentru
        stimularea tactilă.
    sequin_application_method:
      name: Metodă de aplicare a paietelor
      description: Modul în care paieta este menită să fie aplicată/utilizată (de
        cusut sau de lipit, cu aplicare la cald etc.).
    sequin_finish:
      name: Finisajul paietelor
      description: Descrie finisajul vizual/al suprafeței și efectul reflectorizant
        al paietelor utilizate pe petic (de ex., mat, metalic, holografic), nu stratul
        suport al peticului sau metoda de prindere.
    serger_stitch_functions:
      name: Funcții de cusătură pentru mașina de surfilat
      description: Funcțiile de cusătură pe care le acceptă mașina de surfilat (variații
        suprafilare/surfilare și cusături de specialitate).
    serger_thread_count:
      name: Număr de fire pentru mașina de surfilat
      description: Numărul de fire pe care mașina de surfilat le poate folosi pentru
        coasere (de ex., capacitate de 2/3/4/5 fire).
    service_interval:
      name: Interval de revizie
      description: Timpul maxim recomandat între inspecțiile/servisările necesare
        la un centru de service autorizat.
    serving_temperature:
      name: Temperatura de servire
      description: Indică temperatura sau starea prevăzută de servire a produsului
        în momentul consumului.
    sesame_seed_hull_status:
      name: Stadiu de decorticare al semințelor de susan
      description: Specifică dacă tahini este obținut din semințe de susan decorticate
        sau nedecorticate, ceea ce afectează culoarea, gustul și valoarea nutrițională.
    sesame_seed_roast_level:
      name: Nivel de prăjire al semințelor de susan
      description: Indică gradul de prăjire al semințelor de susan înainte de măcinare,
        ajutând cumpărătorii să-și aleagă intensitatea preferată a aromei.
    sesame_seed_variety:
      name: Varietate de semințe de susan
      description: Identifică culoarea sau varietatea semințelor de susan utilizate
        pentru a produce uleiul.
    set_classification:
      name: Clasificarea setului
      description: Definește nivelul de joc prevăzut sau stilul setului de crochet
        (de ex., turneu, recreațional, de călătorie).
    set_components:
      name: Componente ale setului
      description: Indică articolele care sunt incluse în produs (de ex., doar piesa
        centrală sau setul complet).
    set_items_included:
      name: Articole din set incluse
      description: Specifică articolele vestimentare sau accesoriile incluse în set,
        cum ar fi materialul pentru sari, eșarfa dupatta sau cureaua.
    setup_mechanism:
      name: Mecanism de montare
      description: Descrie metoda principală de instalare a cortului (de ex., pop-up,
        gonflabil/cu arc de aer, cort de plafon cu carcasă dură).
    setup_type:
      name: Tipul de montare
      description: Cum se asamblează sau se desfășoară cortul/tunelul de joacă.
    sew_in_interfacing_elasticity:
      name: Elasticitate a întăriturii de cusut
      description: Indică dacă interfața de cusut este elastică și, dacă da, în ce
        direcție/direcții, pentru a se potrivi cu proiectele tricotate sau țesute.
    sew_in_label_placement:
      name: Amplasare a etichetei cusute
      description: Indică locația prevăzută de amplasare a etichetei pe articolul
        finit.
    sew_on_edge_finish:
      name: Finisaj al marginii de cusut
      description: Indică dacă marginile benzii de velcro sunt netivite/tăiate sau
        finisate pentru a rezista la destrămare.
    sew_on_rhinestone_hole_orientation:
      name: Orientare a găurilor pentru strasuri de cusut
      description: Aranjamentul/orientarea găurilor în raport cu piatra (de ex., alăturate,
        opuse, în cruce) pentru a accepta diferite stiluri de cusătură.
    sewing_kit_components_included:
      name: Componente incluse în trusa de cusut
      description: Listează articolele de mercerie/instrumentele de cusut incluse
        într-o trusă de cusut, astfel încât cumpărătorii să poată compara conținutul
        diferitelor truse.
    sewing_machine_bobbin_class:
      name: Clasă de suveică pentru mașina de cusut
      description: Specifică clasa/sistemul de bobină compatibil cu mașina de cusut
        pentru bobine și suveici.
    sewing_machine_buttonhole_type:
      name: Tip de butonieră pentru mașina de cusut
      description: Metoda de creare a butonierei acceptată de mașină.
    sewing_machine_display_type:
      name: Tip de afișaj pentru mașina de cusut
      description: Tipul de interfață de control/afișaj de pe mașina de cusut.
    sewing_machine_needle_point_type:
      name: Tip de vârf de ac pentru mașina de cusut
      description: Definește geometria vârfului/familia de vârfuri a acului, care
        determină modul în care penetrează diferite materiale textile (de ex., vârf
        ascuțit, vârf bilă, vârf lance).
    sewing_machine_needle_system:
      name: Sistem de ace pentru mașina de cusut
      description: Sistemul de ace standardizat/numărul modelului care determină compatibilitatea
        cu mașina (adesea scris ca 130/705 H, HAx1, DBx1, 15x1 etc.).
    sewing_machine_needle_type:
      name: Tip de ac pentru mașina de cusut
      description: Specifică aplicația/stilul vizat al acului (de ex., universal,
        vârf bilă, blugi/denim), care influențează calitatea cusăturii și potrivirea
        cu materialul.
    sewing_machine_shank_type:
      name: Tip de tijă pentru mașina de cusut
      description: Specifică standardul interfeței tijei/suportului piciorușului presor
        pentru care este conceput piciorușul, asigurând compatibilitatea cu mașina
        de cusut (de ex., tijă joasă, tijă înaltă, tijă înclinată).
    sewing_pattern_accessory_type:
      name: Tip de accesoriu pentru tipar de croitorie
      description: Specifică ce accesoriu se realizează cu acel tipar de croitorie.
    sewing_pattern_notions_required:
      name: Articole necesare pentru tiparul de croitorie
      description: Listează materialele suplimentare/accesoriile importante necesare
        pentru finalizarea proiectului (pe lângă material textil și ață).
    sewing_pattern_recommended_fabric:
      name: Material recomandat pentru tiparul de croitorie
      description: Listează tipurile/greutățile de materiale textile recomandate pentru
        tiparul de croitorie (conform recomandărilor designerului tiparului).
    sewing_pattern_size_range:
      name: Interval de mărimi pentru tiparul de croitorie
      description: Specifică intervalul de mărimi acoperit de tipar (de ex., de la
        bebeluși la adulți, mărimi mari).
    sewing_thread_size_system:
      name: Sistem de numerotare a mărimii aței de cusut
      description: Standardul de măsurare utilizat pentru a exprima grosimea aței
        (de ex., Tex, Denier, Ticket, număr de greutate, dimensiune V).
    shaft_curvature:
      name: Curbura crosei
      description: Descrie forma generală a crosei, care influențează garda, tehnica
        de lovire și ergonomia.
    shaft_kick_point:
      name: Punct de flexiune al crosei
      description: Identifică poziția de-a lungul crosei unde aceasta se îndoaie cel
        mai mult în timpul unei mișcări de lovire, influențând traiectoria mingii.
    shaft_length_type:
      name: Tip de lungime a tijei
      description: Desemnare standard în industrie a categoriei de mărime pentru tijele
        săgeților de darts (de ex., scurt, mediu), utilizată atunci când nu sunt furnizate
        măsurători exacte în milimetri.
    shaft_shape:
      name: Forma bâtei
      description: Definește profilul secțiunii transversale a bâtei tonfa (de ex.,
        rotund, pătrat, octogonal
    shaker_fill_material:
      name: Material de umplere pentru shaker
      description: Specifică umplutura interioară principală folosită pentru a crea
        sunetul shakerului (când este cazul), cum ar fi mărgele, semințe sau alice.
    shaker_shell_material:
      name: Material al carcasei pentru shaker
      description: Specifică materialul principal al corpului/carcasei shakerului
        tip ou (carcasa exterioară).
    shallot_variety:
      name: Soi de ceapă eșalotă
      description: Identifică soiul cultivat, tipul comercial sau varietatea produsului
        de eșalotă.
    shank_style:
      name: Stil de pârghie
      description: Descrie forma/configurația generală a brațelor de pârghie ale zăbalei
        (de ex., drepte, curbate, de pășunat).
    shapewear_enhancement_feature:
      name: Caracteristica de modelare a lenjeriei corective
      description: Evidențiază îmbunătățirea funcțională principală oferită de îmbrăcăminte
        (de ex., control abdominal, ridicare fese, căptușeală impermeabilă).
    sheath_type:
      name: Tipul de teacă
      description: Tipul de teacă/husă inclus cu cuțitul de colecție.
    sheet_music_clip_padding_material:
      name: Materialul de căptușeală al clemei pentru partituri
      description: Materialul oricărei căptușeli a fălcii/prinderii care intră în
        contact cu hârtia sau buza suportului pentru a preveni ruperea și alunecarea.
    sheet_music_clip_spring_tension_level:
      name: Nivelul de tensiune al arcului clemei pentru partituri
      description: Forța relativă a arcului clemei/forța de strângere.
    sheet_music_clip_use_environment:
      name: Mediul de utilizare al clemei pentru partituri
      description: Mediul principal prevăzut în care clema este concepută să funcționeze
        optim.
    shell_construction:
      name: Construcția carcasei
      description: Specifică modul în care este construită carcasa tobei mari, ceea
        ce influențează semnificativ tonul și greutatea.
    shell_finish:
      name: Finisajul carcasei
      description: Tratamentul de finisaj exterior al carcasei doumbek-ului.
    shell_hull_status:
      name: Stadiu de decorticare
      description: Specifică dacă nucile sau semințele sunt vândute cu coaja intactă
        sau îndepărtată.
    shift_boot_attachment_method:
      name: Metodă de fixare a manșonului schimbătorului de viteze
      description: Specifică modul în care manșonul schimbătorului se prinde de consola
        vehiculului/ornamentul schimbătorului (de ex., ramă cu prindere cu clips,
        inel de reținere, adeziv).
    shift_boot_installation_hardware_included:
      name: Elemente de instalare incluse pentru manșonul schimbătorului
      description: Listează elementele de instalare și componentele incluse cu manșonul
        schimbătorului.
    shift_knob_illumination:
      name: Iluminarea mânerului schimbătorului
      description: Specifică dacă mânerul schimbătorului include iluminare și metoda/tipul
        de iluminare (de ex., fotoluminescent, LED, fibră optică, model iluminat din
        spate).
    shift_knob_installation_method:
      name: Metodă de instalare a mânerului schimbătorului
      description: Specifică modul în care mânerul se prinde de levierul/tija schimbătorului.
    shift_knob_shape:
      name: Formă a mânerului schimbătorului
      description: Descrie factorul de formă ergonomic general al mânerului schimbătorului
        de viteze.
    shift_pattern_type:
      name: Tip de model al treptelor de viteză
      description: Specifică stilul marcajului treptelor de viteză de pe mânerul schimbătorului
        (dacă există).
    shifter_compatibility:
      name: Compatibilitate a schimbătorului de viteze
      description: Indică dacă extensia de ghidon este compatibilă cu schimbătoare
        de viteze electronice, schimbătoare mecanice, ambele sau dacă nu este compatibilă
        cu schimbătoare de viteze.
    shifter_mounting_interface:
      name: Interfață de montare a schimbătorului de viteze
      description: Descrie modul în care maneta schimbătorului se atașează la bicicletă
        (de ex., dimensiune discretă a colierului, I-Spec, MatchMaker, capăt de ghidon,
        bară inferioară, wireless).
    shifting_actuation_type:
      name: Tip de acționare a schimbătorului de viteze
      description: Identifică mecanismul utilizat pentru a schimba treptele de viteză
        în grupul de transmisie (mecanic, electronic cu fir, electronic wireless,
        hidraulic).
    shifting_mechanism:
      name: Mecanism de schimbare a vitezelor
      description: Identifică dacă maneta schimbătorului funcționează mecanic sau
        electronic și dacă este indexată (cu poziții fixe) sau cu fricțiune.
    shim_purpose:
      name: Scop al distanțierului
      description: Definește tipul funcțional al produsului (de ex., pană, distanțier)
        pentru ca cicliștii să poată găsi rapid soluția de reglare potrivită.
    shin_guard_attachment_method:
      name: Metoda de prindere a apărătorii de tibie
      description: Clasifică formatul general de design al apărătorii de tibie, inclusiv
        integrarea apărătorii de gleznă sau construcția tip șosetă.
    shirt_cuff_style:
      name: Stil al manșetei cămășii
      description: Identifică construcția manșetei mânecii, care influențează formalitatea,
        purtarea cu butoni de manșetă și confortul.
    shochu_base_ingredient:
      name: Ingredientul de bază pentru shochu
      description: Identifică sursa principală de amidon sau zahăr utilizată pentru
        a producere shochu.
    shochu_soju_variety:
      name: Tipul de shochu și soju
      description: Clasifică produsul după stilul recunoscut sau tipul de producție.
    shock_absorber_bushing_material:
      name: Materialul bucșelor amortizorului
      description: Materialul bucșelor/izolatoarelor de montare furnizate cu sau integrate
        în amortizor.
    shock_absorber_charge_type:
      name: Tipul de încărcare al amortizorului
      description: Specifică tehnologia de încărcare/amortizare a amortizorului (de
        ex., hidraulic/ulei, cu gaz, cu aer) și/sau designul tubului aferent unde
        este aplicabil.
    shock_absorber_mount_type_lower:
      name: Tip de montare a amortizorului (inferior)
      description: Stilul interfeței de montare inferioară a amortizorului pentru
        potrivire.
    shock_absorber_mount_type_upper:
      name: Tipul de montare al amortizorului (superior)
      description: Specifică stilul de interfață de montare superioară al amortizorului
        unui autovehicul pentru potrivire/compatibilitate.
    shock_absorber_position:
      name: Poziția amortizorului
      description: Specifică dacă amortizorul este destinat poziției față, spate,
        stânga sau dreapta pe vehicul (mai granular decât simpla plasare pe axă).
    shock_absorption_system:
      name: Sistemul de absorbție a șocurilor
      description: Definește mecanismul utilizat pentru reducerea vibrațiilor și a
        zgomotului la revenire.
    shoe_collar_height:
      name: Înălțimea gulerului pantofului
      description: Clasifică pantofii după înălțimea gulerului/tăieturii (joasă, medie,
        înaltă) pentru a indica acoperirea și susținerea gleznei.
    shoe_cover_height:
      name: Înălțime a husei pentru încălțăminte
      description: Specifică nivelul de acoperire al husei pentru pantoful de ciclism,
        făcând distincția între protecțiile doar pentru vârf și husele complete.
    shoe_sizing_system:
      name: Sistem de mărimi pentru încălțăminte
      description: Identifică standardul de mărimi (SUA, Regatul Unit, UE, JP, Mondopoint
        etc.) utilizat pentru mărimea specificată a încălțămintei.
    shoelace_aglet_material:
      name: Material al capetelor de șireturi
      description: Identifică materialul utilizat pentru vârfurile de la capetele
        șireturilor, care influențează durabilitatea și stilul.
    shooting_rest_design:
      name: Design al suportului de tragere
      description: Clasifică stilul structural al suportului (suport tip sac, sanie
        de tragere, trepied, menghină pentru armă etc.).
    shooting_stick_yoke_design:
      name: Design al suportului tip V pentru bastonul de tragere
      description: Specifică stilul suportului sau al formei în V care intră în contact
        cu arma de foc sau optica.
    shooting_target_style:
      name: Stil de țintă pentru trageri
      description: Clasifică stilul sau designul țintelor de tragere pentru patinaj
        artistic și hochei, astfel încât clienții să poată selecta obiectivul de antrenament
        de care au nevoie.
    shooting_target_type:
      name: Tip de țintă pentru trageri
      description: Clasifică țintele de tragere după stilul structural, material sau
        design (de ex. gong, siluetă, țintă de hârtie cu cercuri, țintă rotativă),
        permițând trăgătorilor să găsească rapid ținta corectă pentru disciplina și
        tipul lor de armă.
    short_block_assembly_balance_type:
      name: Tip de echilibrare a ansamblului motor scurt
      description: Indică dacă ansamblul rotativ este echilibrat intern sau extern.
    short_block_intended_use:
      name: Utilizare prevăzută pentru motorul scurt
      description: Cazul de utilizare vizat principal pentru blocul motor parțial
        asamblat
    short_block_rotating_assembly_included:
      name: Ansamblu rotativ inclus pentru motorul scurt
      description: Specifică ce componente majore ale ansamblului rotativ sunt incluse
        cu blocul motor parțial asamblat.
    shot_size:
      name: Dimensiune a alicelor
      description: Specifică denumirea dimensiunii alicelor pentru alice vrac sau
        componente de muniție.
    shotgun_action_type:
      name: Tip de mecanism pentru pușca de vânătoare
      description: Specifică mecanismul de funcționare/acțiunea puștii de vânătoare.
    shotgun_choke_type:
      name: Tip de șoc pentru pușca de vânătoare
      description: Specifică configurația șocului țevii puștii de vânătoare.
    shotgun_gauge:
      name: Calibru pentru pușca de vânătoare
      description: Specifică calibrul țevii unei puști de vânătoare (și calibrul .410
        acolo unde este cazul) pentru identificare și filtrare în anunțurile de obiecte
        de colecție.
    shotgun_stock_material:
      name: Material al patului pentru pușca de vânătoare
      description: Specifică materialul principal al patului (părții nemetalice)
    shuffleboard_speed_rating:
      name: Indice de viteză pentru shuffleboard
      description: Indică viteza relativă de alunecare pe masă pe care o oferă pudra
        pentru shuffleboard sau alt produs de întreținere, permițând jucătorilor să
        aleagă viteza adecvată pentru nivelul lor de calificare și lungimea mesei.
    shuffleboard_table_length_compatibility:
      name: Compatibilitate cu lungimea mesei de shuffleboard
      description: Lungimea standard a mesei de shuffleboard pentru care un produs
        este conceput să se potrivească sau să o completeze.
    shuttlecock_base_material:
      name: Material al bazei fluturașului de badminton
      description: Identifică materialul utilizat pentru vârful/baza fluturașului
        de badminton, care influențează durabilitatea, senzația și ricoșeul.
    shuttlecock_feather_material:
      name: Material al penei pentru fluturașul de badminton
      description: Identifică sursa principală a penelor sau tipul de construcție
        utilizat pentru „fusta” fluturașului de badminton, influențând durabilitatea,
        consecvența zborului și prețul.
    shuttlecock_grade:
      name: Grad de calitate al fluturașului de badminton
      description: Specifică nivelul de joc prevăzut sau clasificarea calității (de
        ex., antrenament, club, competiție).
    shuttlecock_speed_rating:
      name: Indice de viteză al fluturașului de badminton
      description: Specifică viteza sau indicele desemnat de producător pentru fluturașul
        de badminton, permițând jucătorilor să selecteze viteza corectă de zbor pentru
        condițiile de joc, temperatură și altitudine.
    side_panel_installation_state:
      name: Stadiu de instalare al panoului lateral
      description: Specifică dacă panoul lateral auto este furnizat neprelucrat, grunduit,
        vopsit sau acoperit/pregătit în alt mod pentru instalare.
    side_wall_mechanism:
      name: Mecanism al peretelui lateral
      description: Descrie modul în care peretele lateral al pătuțului atașabil se
        deschide sau se coboară pentru a permite accesul la bebeluș.
    signal_source:
      name: Sursă de semnal
      description: Indică modul în care vitezometrul primește/obține informații despre
        distanță sau timp.
    silk_fiber_type:
      name: Tipul de fibră de mătase
      description: Tipul/sursa fibrei de mătase utilizate pentru fabricarea materialului
        textil (de ex., mătase de dud sau tussah), influențând textura, uniformitatea
        și prețul.
    simulated_game_species:
      name: Specie de vânat simulată
      description: Indică pasărea sau animalul de vânat specific pe care manechinul
        îl reproduce pentru un antrenament realist.
    singlet_cut_style:
      name: Stil de croială pentru costum de lupte
      description: Specifică croiala/stilul costumului de lupte dintr-o singură piesă,
        luând în considerare înălțimea bretelelor, stilul spatelui și variațiile în
        funcție de sex/vârstă.
    sink_material:
      name: Material al chiuvetei
      description: Specifică materialul chiuvetei/chiuvetelor integrate incluse cu
        masa de toaletă.
    sinker_attachment_style:
      name: Stil de atașare a plumbului
      description: Descrie mecanismul furnizat pe plumb pentru atașarea acestuia la
        firul de pescuit sau montură.
    sinker_finish:
      name: Finisaj al plumbului
      description: Specifică stratul exterior de acoperire sau tratamentul de suprafață
        al plumbului de pescuit.
    sinker_shape:
      name: Formă a plumbului de pescuit
      description: Definește forma geometrică a plumbului (de ex., glonț, cilindru,
        lacrimă), astfel încât pescarii să poată selecta prezentarea optimă și rezistența
        la agățare.
    siren_system_included:
      name: Sistem de sirenă inclus
      description: Indică dacă un sistem de sirenă/adresare publică este instalat
        și de ce tip.
    siren_system_type:
      name: Tip de sistem de sirenă
      description: Specifică configurația sirenei/sistemului de adresare publică instalat
        pe mașina de poliție.
    size_designation:
      name: Desemnare a mărimii
      description: Etichetă standardizată de mărime pentru instrumentul muzical triunghi.
    size_system:
      name: Sistem de mărimi
      description: Specifică sistemul de mărimi sau standardul regional căruia îi
        corespunde eticheta de mărime (de ex., SUA, Regatul Unit, UE, mărime internațională
        cu litere).
    sizzle_mechanism:
      name: Mecanism de sfârâit
      description: Specifică modul în care cinelul produce efectul de sfârâit (de
        ex., nituri instalate în cinel, lanț atașabil/sizzler, sau fără elemente incluse).
    skate_blade_discipline:
      name: Disciplină aferentă lamei patinei
      description: Identifică disciplina de patinaj sau aplicația pentru care este
        concepută lama, cum ar fi hochei sau patinaj artistic, permițând cumpărătorilor
        să filtreze lamele relevante.
    skate_brake_type:
      name: Tip de frână pentru patine
      description: Identifică stilul mecanismului de frânare inclus cu patinele.
    skateboard_nut_thread_size:
      name: Dimensiunea filetului pentru piulițe de skateboard
      description: Specifică dimensiunea filetului (diametrul și pasul) piuliței pentru
        a asigura compatibilitatea cu axele, șuruburile centrale sau elementele de
        montare ale skateboardului.
    skein_winder_bearing_bushing_type:
      name: Tip de rulment/bucșă pentru depănătorul de sculuri
      description: Specifică tipul de rulment sau bucșă utilizat în ansamblul rotativ
        al depănătorului de sculuri.
    skein_winder_drive_type:
      name: Tip de acționare pentru depănătorul de sculuri
      description: Modul în care depănătorul de sculuri este alimentat/rotit în timpul
        utilizării.
    ski_binding_mechanism:
      name: Mecanism al legăturii de schi
      description: Definește designul mecanic fundamental sau disciplina aferentă
        legăturii (de ex., alpin, tehnic, telemark).
    ski_binding_part_type:
      name: Tip de piesă pentru legătura de schi
      description: Identifică componenta sau accesoriul specific pentru legăturile
        de schi, permițând filtrarea rapidă prin numeroase tipuri de piese.
    ski_boot_sole_standard:
      name: Standard de talpă pentru clăpari de schi
      description: Identifică norma tălpii sau standardul de compatibilitate cu legăturile
        pentru care este certificat clăparul de schi.
    skill_focus:
      name: Abilitate antrenată
      description: Identifică abilitatea principală de baschet pe care echipamentul
        de antrenament este menit să o dezvolte.
    skimboard_construction:
      name: Construcție a skimboard-ului
      description: 'Descrie construcția principală a plăcii, concentrându-se pe miez
        și tehnica de stratificare (de ex.: miez de spumă, miez de lemn).'
    skin_presence:
      name: Prezența pielii
      description: Specifică dacă puiul este vândut cu pielea intactă, îndepărtată
        sau parțial îndepărtată.
    slapstick_handle_type:
      name: Tip de mâner pentru slapstick
      description: Descrie stilul prinderii/mânerului integrat în slapstick, influențând
        ergonomia și confortul la interpretare.
    slapstick_playing_surface_material:
      name: Material al suprafeței de lovire pentru slapstick
      description: Specifică materialul elementelor de lovire/plesnire care intră
        în contact unul cu celălalt pentru a produce sunetul.
    sled_brake_type:
      name: Tip de frână pentru sanie
      description: Specifică mecanismul de frânare inclus pe sanie, dacă există.
    sled_towing_method:
      name: Metodă de tractare a saniei
      description: Indică modul principal în care sania este trasă sau remorcată.
    sleep_position_suitability:
      name: Potrivire pentru poziția de dormit
      description: Indică ce poziție de dormit susține cel mai eficient salteaua.
    sleeping_bag_shape:
      name: Formă a sacului de dormit
      description: Croiala generală a sacului de dormit, care influențează căldura,
        greutatea și spațiul interior.
    sleeping_pad_type:
      name: Tip de izopren
      description: Identifică stilul de construcție al izoprenului/saltelei – cum
        ar fi spumă cu celule închise sau gonflabilă cu aer – care are un impact direct
        asupra confortului, greutății și izolației.
    sleepwear_set_pieces_included:
      name: Piese incluse în setul de pijamale
      description: Listează componentele individuale furnizate într-un set de pijamale
        sau haine de casă din mai multe piese.
    sleeve_bearing_type:
      name: Tip de lagăr de alunecare
      description: Identifică tehnologia care permite rotația manșonului, influențând
        calitatea rotației pentru ridicările olimpice.
    sleeve_style:
      name: Stil al mânecii
      description: Specifică stilul mânecii dincolo de lungime (de ex., croială raglan).
    slide_board_accessories_included:
      name: Accesorii incluse pentru placa de alunecare
      description: Listează articolele suplimentare ambalate împreună cu placa de
        alunecare, astfel încât cumpărătorii să știe exact ce este inclus și să poată
        compara pachetele.
    slide_installation_type:
      name: Tip de instalare a toboganului
      description: Modul în care culisa este destinată a fi instalată sau montată
        (independent, atașat la un set de joacă etc.).
    slide_intended_finger:
      name: Deget vizat pentru culisă
      description: Indică pe ce deget este destinat a fi purtată culisa sau dacă nu
        se aplică (de ex., o bară de ton).
    slide_safety_features:
      name: Caracteristici de siguranță pentru culisă
      description: Elemente de design legate de siguranță incluse pe culisă.
    slide_type:
      name: Tip de culisă
      description: Specifică ce tip/tipuri de mecanisme de culisare pentru instrumente
        poate curăța produsul.
    slide_water_use_capability:
      name: Capacitate de utilizare a apei pentru tobogan
      description: Dacă toboganul este conceput pentru a fi utilizat cu apă (de ex.,
        racord pentru furtun) și în ce mod.
    slime_putty_kit_components_included:
      name: Componente incluse în kitul de slime și pastă modelatoare
      description: Listează instrumentele și elementele suplimentare care însoțesc
        produsul de tip slime/pastă modelatoare (în special pentru kituri/pachete).
    sling_material:
      name: Material al curelei
      description: Specifică fibra/materialul textil utilizat în chinga (buclei expres/dog-bone)
        de la echipamentul de escaladă.
    smith_machine_bar_path:
      name: Traiectorie a barei pentru aparatul Smith
      description: Descrie traiectoria fixă de mișcare a barei, informând utilizatorii
        despre biomecanică și cerințele de spațiu.
    smoke_color:
      name: Culoare a fumului
      description: Culoarea fumului produs de racheta de semnalizare/semnalul fumigen
        (distinctă de culoarea corpului produsului).
    smoked_malt_smoking_material:
      name: Material de afumare pentru malțul afumat
      description: Pentru malțurile afumate, identifică materialul utilizat în timpul
        afumării (de ex., specii specifice de lemn sau turbă).
    snack_mix_variety:
      name: Sortiment de amestec de gustări
      description: Clasifică produsul după stilul amestecului (de ex., amestec pentru
        drumeție, amestec de nuci, namkeen, sev).
    snack_processing_method:
      name: Metodă de procesare a gustărilor
      description: Indică tehnica principală de procesare sau conservare utilizată
        pentru a crea gustarea (de ex., liofilizare, coacere, prăjire).
    snack_texture:
      name: Textura gustării
      description: Indică textura fizică sau senzația gustativă a bastonașelor de
        susan.
    snap_installation_method:
      name: Metodă de instalare a capselor
      description: Modul în care capsa este instalată/atașată pe materialul proiectului.
    snare_drum_bearing_edge_profile:
      name: Profil al marginii de așezare a feței pentru toba mică
      description: Tăietura/profilul marginii (unde se așază fața) corpului tobei
        mici.
    snare_drum_finish_type:
      name: Tip de finisaj pentru toba mică
      description: Construcția/tipul finisajului la nivel superior utilizat pe corpul
        tobei mici.
    snare_drum_hoop_type:
      name: Tip de ramă pentru toba mică
      description: Tipul de rame/cercuri folosite pe toba mică.
    snare_drum_mounting_type:
      name: Tip de montare a tobei mici
      description: Modul în care toba mică este destinată a fi montată/utilizată.
    snare_drum_shell_material:
      name: Tip de montare a tobei mici
      description: Specifică metalul/aliajul utilizat pentru corpul tobei mici (corpul
        principal), ceea ce influențează puternic tonul, greutatea și durabilitatea.
    snare_drum_strainer_mechanism:
      name: Mecanism de acționare a cordarului pentru toba mică
      description: Tipul de mecanism de acționare folosit pentru a cupla/decupla firele
        de rezonanță ale tobei mici.
    snare_drum_strainer_type:
      name: Tip de mecanism de acționare a cordarului pentru toba mică
      description: Tipul de mecanism de acționare folosit pentru a cupla/decupla firele
        de rezonanță ale tobei mici.
    snare_hoop_type:
      name: Tip de ramă pentru toba mică
      description: Tipul de rame/cercuri prezente pe toba mică.
    snare_throw_off_type:
      name: Tip de manetă/mecanism de cuplare a cordarului
      description: Tipul de mecanism de acționare/manetă folosit pentru a cupla/decupla
        firele de rezonanță.
    snip_cutter_spring_mechanism:
      name: Mecanism cu arc pentru cleștele de tăiat ață
      description: Indică dacă cleștele/foarfecele mic de tăiat ață utilizează un
        mecanism cu arc/revenire și stilul acestuia.
    snorkel_mount_position:
      name: Poziție de montare a tubului de respirat
      description: Descrie locul în care este poziționat tubul de respirat pe capul
        utilizatorului în timpul folosirii.
    snorkel_top_type:
      name: Tip de capăt superior pentru tubul de respirat
      description: Descrie stilul de protecție împotriva pătrunderii apei de la capătul
        superior al tubului de respirat inclus în set.
    snow_condition_suitability:
      name: Potrivire pentru condițiile de zăpadă
      description: Descrie condițiile principale de zăpadă pentru care este destinată
        ceara.
    snow_sports_helmet_safety_certification:
      name: Certificare de siguranță pentru casca de sporturi de iarnă
      description: Identifică standardul/standardele de siguranță pe care le îndeplinește
        casca pentru utilizarea la schi și snowboarding.
    snowboard_base_material:
      name: Material al bazei snowboardului
      description: Identifică compoziția sau finisajul bazei (extrudată, variante
        sinterizate, formule proprii) care influențează viteza, durabilitatea și întreținerea.
    snowboard_width_class:
      name: Clasă de lățime a snowboardului
      description: Clasifică lățimea generală a plăcii în raport cu mărimea clăparului
        (de ex., normal, lat).
    soccer_ball_compartment_type:
      name: Tip de compartiment pentru minge de fotbal
      description: Specifică modul în care rucsacul adăpostește o minge de fotbal.
    soccer_ball_type:
      name: Tip de minge de fotbal
      description: Specifică utilizarea sau stilul preconizat al mingii de fotbal
        (de ex., pentru meci, antrenament, futsal), astfel încât cumpărătorii să poată
        găsi rapid varianta potrivită fără a fi nevoie de multe subcategorii.
    soccer_dummy_base_type:
      name: Tip de bază pentru manechinul de fotbal
      description: Descrie stilul bazei sau al mecanismului de ancorare pe care îl
        folosește manechinul.
    soccer_dummy_design:
      name: Design al manechinului de fotbal
      description: Specifică stilul de construcție al unui manechin pentru poarta
        de fotbal, cum ar fi rigid sau gonflabil.
    soccer_goal_target_style:
      name: Stil de țintă pentru poarta de fotbal
      description: Definește factorul de formă fizic sau designul țintei de antrenament,
        astfel încât cumpărătorii să poată alege stilul care se potrivește cel mai
        bine exercițiilor lor.
    soccer_goal_type:
      name: Tip de poartă de fotbal
      description: Indică stilul structural sau utilizarea vizată a porții (de ex.,
        pop-up, panou de ricoșeu, poartă de stradă).
    sock_cushioning:
      name: Amortizare a șosetei
      description: Indică efectul și stilul amortizării sau al căptușelii de sub picior
        încorporată în șosetă.
    sock_cushioning_level:
      name: Nivel de amortizare a șosetei
      description: Specifică efectul amortizării sub picior integrate în șosetă.
    sock_grip_type:
      name: Tip de aderență a șosetei
      description: Descrie orice caracteristici de tracțiune sau antiderapante aplicate
        pe talpa șosetei.
    sock_toe_style:
      name: Stil de vârf al șosetei
      description: Descrie stilul de realizare a zonei degetelor șosetei.
    soft_bait_style:
      name: Stil de nălucă moale
      description: Clasifică designul corpului sau profilul nălucii din plastic moale
        (de ex. vierme, swimbait, grub).
    soft_top_attachment_type:
      name: Tip de atașare a plafonului decapotabil
      description: Identifică modul în care plafonul decapotabil se atașează la vehicul
        (șine, capse, velcro etc.).
    soft_top_includes_frame_hardware:
      name: Plafonul decapotabil include cadru/componente
      description: Indică dacă produsul include cadrul/arcele plafonului decapotabil
        și/sau componentele de montare.
    soft_top_installation_type:
      name: Tip de instalare a plafonului decapotabil
      description: Specifică modul în care plafonul decapotabil al vehiculului este
        instalat/atașat, indicând metoda de instalare preconizată și efortul necesar.
    soft_top_window_configuration:
      name: Configurație a geamurilor plafonului decapotabil
      description: Indică câte geamuri are plafonul decapotabil și ce poziții sunt
        prezente.
    softball_certification:
      name: Certificare pentru softball
      description: Listează ștampilele sau aprobările forurilor de conducere imprimate
        pe minge, care determină eligibilitatea pentru ligă/joc.
    softness_level:
      name: Nivel de moliciune
      description: Indică cât de moale/discretă este partea cu bucle a benzii velcro,
        aspect relevant pentru confortul pe piele și aplicațiile cu volum redus.
    solar_system_model_included_bodies:
      name: Corpuri incluse în modelul sistemului solar
      description: Indică ce corpuri cerești sunt reprezentate în setul modelului.
    solar_system_model_scaling:
      name: Scară a modelului sistemului solar
      description: Indică dacă modelul sistemului solar respectă proporțiile pentru
        dimensiunile planetelor, distanțe/orbite, ambele, sau este o reprezentare
        schematică/fără scară.
    sold_secure_certification_level:
      name: Nivel de certificare Sold Secure
      description: Indică calificativul Sold Secure acordat sistemului de închidere
        antifurt de către organismul independent de testare din Regatul Unit (Bronz,
        Argint, Aur, Diamant).
    sold_secure_rating:
      name: Calificativ Sold Secure
      description: Indică nivelul de certificare Sold Secure atribuit antifurtului
        (lacăt, lanț de bicicletă etc.).
    sole_construction:
      name: Construcție a tălpii
      description: Indică modul în care este construită talpa pantofului (întreagă,
        despicată, din două piese etc.), influențând direct flexibilitatea, contactul
        cu podeaua și potrivirea pentru anumite tehnici de dans.
    sole_type:
      name: Tipul de talpă
      description: Descrie stilul structural al tălpii, indicând flexibilitatea și
        utilizarea preconizată.
    soprano_saxophone_body_style:
      name: Stil de corp pentru saxofon soprano
      description: Descrie configurația fizică a corpului saxofonului sopran.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Tip de deflector pentru muștiuc de saxofon soprano
      description: Descrie designul deflectorului/acoperișului muștiucului (conturul
        din spatele vârfului), influențând luminozitatea tonului (brightness), proiecția
        sunetului și răspunsul.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Dimensiune a camerei muștiucului pentru saxofon soprano
      description: Descrie dimensiunea camerei interne a muștiucului pentru saxofon
        sopran, care influențează rezistența și culoarea tonală.
    soprano_saxophone_mouthpiece_finish:
      name: Finisaj al muștiucului pentru saxofon soprano
      description: Finisajul/placarea de suprafață aplicată muștiucului (dacă este
        cazul).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Accesorii incluse pentru muștiucul de saxofon sopran
      description: Identifică accesoriile care însoțesc muștiucul.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Caracter tonal al muștiucului pentru saxofon sopran
      description: Profilul tonal de nivel înalt asociat în mod obișnuit cu designul
        muștiucului.
    sound_character:
      name: Caracterul sunetului
      description: Descrie timbrul general produs de instrumentul de percuție.
    sound_expansion_method:
      name: Metodă de extindere a sunetelor
      description: Specifică maniera în care modulul de sunet își poate adăuga sau
        extinde biblioteca internă de sunete dincolo de sunetele din fabrică (de ex.,
        pachete de conținut, import de mostre, carduri de expansiune).
    sound_module_sound_library_focus:
      name: Accentul din biblioteca de sunete a modulului
      description: Accentul principal al setului de sunete din fabrică pentru a ajuta
        cumpărătorii să găsească modulul potrivit pentru stilul lor/situația lor de
        utilizare.
    sound_port_type:
      name: Tip de gaură de rezonanță
      description: Descrie designul orificiului/portului de sunet de pe spatele cajonului,
        care influențează proiecția și răspunsul frecvențelor joase.
    sound_sensitivity_control:
      name: Control al sensibilității la sunet
      description: Indică dacă și cum poate fi reglată sensibilitatea la sunet.
    sound_synthesizer_patch_memory:
      name: Memorie pentru presetări de sintetizator
      description: Indică dacă sintetizatorul poate stoca și utiliza presetări.
    sound_type:
      name: Tip de sunet
      description: Tipul/tipurile principale de sunet sau ieșirile audio pe care le
        produce covorașul (de ex., instrumente, cântece, indicații vocale) pentru
        a ghida jocul.
    soundboard_material:
      name: Material al plăcii de rezonanță
      description: Materialul utilizat pentru placa de rezonanță a harpei (partea
        superioară) care generează rezonanța și tonul.
    soup_or_broth_variety:
      name: Sortiment de supă sau bulion
      description: Specifică stilul, rețeta sau preparatul culinar al supei sau bulionului,
        astfel încât cumpărătorii să-și poată găsi rapid tipul preferat.
    sour_cream_variety:
      name: Sortiment de smântână
      description: Clasifică produsele din smântână după varietatea lor specifică
        sau stilul cultural, cum ar fi crème fraîche sau crema mexicană.
    soy_sauce_variety:
      name: Sortiment de sos de soia
      description: Identifică stilul sau formularea specifică a sosului de soia (de
        ex., de culoare deschisă, închisă, tamari, ponzu), permițând cumpărătorilor
        să filtreze rapid după profilul aromei și utilizarea culinară.
    spark_plug_electrode_material:
      name: Material al electrodului bujiei
      description: Materialul/tehnologia vârfului/vârfurilor electrodului bujiei de
        la capătul de aprindere (central și/sau de masă), așa cum este comercializat
        (de ex., cupru, platină, iridiu).
    spark_plug_seat_type:
      name: Tip de scaun pentru bujie
      description: Stilul de etanșare/scaun utilizat de bujie la interfața cu chiulasa.
    spark_plug_terminal_type:
      name: Tip de terminal al bujiei
      description: Stilul terminalului superior utilizat pentru a conecta fișa/fișa
        bujiei.
    sparkler_shape:
      name: Forma artificiului de mână
      description: Forma/factorul de formă inedit general al artificiului de mână.
    speaker_cone_material:
      name: Materialul conului difuzorului
      description: Materialul principal al conului difuzorului (con woofer/difuzor
        de note medii).
    speaker_size:
      name: Dimensiunea difuzorului
      description: Dimensiunea nominală a difuzorului/dimensiunea de potrivire pentru
        difuzorul component (de ex., 16,5 cm, 15x23 cm), utilizată pentru potrivirea
        cu locațiile din fabrică și adaptoarele pentru difuzoare.
    special_effects_output_interface:
      name: Interfață de ieșire pentru efecte speciale
      description: Specifică conectorul/interfața de ieșire folosită pentru a controla
        dispozitivele de efecte speciale.
    special_effects_stand_stability_features:
      name: Caracteristici de stabilitate pentru stative de efecte speciale
      description: Specifică caracteristicile de stabilitate și siguranță încorporate
        menite să prevină răsturnarea sau alunecarea în timpul evenimentelor.
    specialty_malt_name_type:
      name: Nume/tip de malț de specialitate
      description: Identifică tipul specific de malț de specialitate denumit (adesea
        folosit ca nume al stilului comercial).
    specimen_presentation:
      name: Mod de prezentare a specimenului
      description: Indică modul în care specimenul/eșantionul de colecție este pregătit
        sau prezentat (de ex., brut/neprelucrat, șlefuit, tăiat sau montat).
    speed_bag_accessories_included:
      name: Accesorii incluse pentru sacul de viteză
      description: Listează articolele suplimentare furnizate alături de sacul de
        viteză, cum ar fi mănuși, pompe de aer, pivoți, lanțuri sau stative.
    speed_rating:
      name: Indice de viteză
      description: Indică viteza suprafeței de joc oferită de postavul mesei de biliard
        (de ex., lent, mediu sau rapid).
    speedometer_backlight_type:
      name: Tip de iluminare de fundal pentru vitezometru
      description: Specifică dacă și cum este iluminat din spate vitezometrul pentru
        vizibilitate pe timp de noapte.
    speedometer_display_type:
      name: Tip de afișaj pentru vitezometru
      description: 'Indică stilul de afișare a vitezei al vitezometrului: ac indicator/cadran
        analogic, afișaj numeric digital sau o combinație de elemente analogice și
        digitale.'
    speedometer_unit_of_measure:
      name: Unitate de măsură pentru vitezometru
      description: Specifică unitățile de viteză afișate pe cadran/afișaj.
    spike_replaceability:
      name: Posibilitate de înlocuire a crampoanelor
      description: Indică dacă crampoanele de pe pantof sunt înlocuibile, fixe, sau
        dacă pantoful nu are crampoane.
    spike_shape:
      name: Forma cramponului
      description: Identifică stilul geometric al vârfului cramponului, care influențează
        aderența și potrivirea pentru diferite suprafețe ale pistei.
    spike_thread_size:
      name: Dimensiune a filetului cramponului
      description: Specifică dimensiunea sau standardul bazei filetate care se înșurubează
        în pantof (de ex., filet 1/4-20).
    spin_classification:
      name: Clasificare a efectului de rotație
      description: Indică profilul de rotație pentru care este conceput discul (rotație
        redusă, medie, ridicată, hiperrotație).
    spin_profile:
      name: Profil de rotație
      description: Specifică caracteristicile relative de rotație pe care le favorizează
        crosa.
    spin_types_supported:
      name: Tipuri de rotații suportate
      description: Listează tipurile de rotații pe care mașina le poate imprima mingilor,
        astfel încât jucătorii să poată exersa împotriva diferitelor stiluri de lovituri.
    spinach_preparation_style:
      name: Stil de preparare a spanacului
      description: Descrie pregătirea fizică a frunzelor de spanac sau formatul produsului
        (de ex., frunze întregi, tocate, cuburi congelate).
    spinach_variety:
      name: Soi de spanac
      description: Identifică soiul botanic sau varietatea comercială de spanac (de
        ex., spanac baby, creț, spanac de apă, spanac roșu), permițând cumpărătorilor
        să selecteze exact tipul pe care îl doresc.
    spindle_bearing_surface_material:
      name: Material al suprafeței de contact a rulmentului pentru fus
      description: Materialul punctului/suprafeței de contact/sprijin utilizate la
        fusurile sprijinite, influențând fluența mișcării și uzura.
    spindle_bearing_type:
      name: Tip de rulment pentru ax
      description: Tipul interfeței vârfului fusului/zonei de sprijin care reduce
        frecarea în contact cu bolul/cupa de suport.
    spindle_finish:
      name: Finisajul fusului
      description: Finisajul/stratul de acoperire al suprafeței fusului, care influențează
        senzația tactilă, durabilitatea și estetica.
    spindle_hook_type:
      name: Tip de cârlig pentru fus
      description: Mecanismul de prindere a firului din partea superioară a fusului,
        utilizat pentru a fixa firul de ghidaj/firul tors.
    spindle_support_method:
      name: Metodă de sprijinire a fusului
      description: Modul în care fusul este destinat a fi sprijinit în timpul torsului.
    spindle_tip_style:
      name: Stil de vârf pentru fus
      description: Forma/designul punctului de contact care se sprijină în bol/cupă
        (suprafața de sprijin), influențând frecarea și fluiditatea torsului.
    spindle_whorl_position:
      name: Poziție a rotiței de fus
      description: Locul unde este așezată rotița pe tija fusului.
    spinner_blade_shape:
      name: Formă a paletei pentru năluca rotativă
      description: Identifică forma principală a paletei utilizate pe năluca rotativă,
        influențând vibrația, sclipirea și adâncimea de evoluție.
    spinner_control_card_design_type:
      name: Design/tip al cardului de control pentru tors
      description: Descrie tipul cardului de control al torsului în ceea ce privește
        modul în care prezintă informațiile de control (de ex., referință de raport,
        referință de tensiune, tabel de conversie).
    spinner_subtype:
      name: Subtip de nălucă rotativă
      description: Clasifică designul general al nălucii rotative sau familia din
        care face parte (de ex., rotativă pe linie, spinnerbait).
    spinning_oil_application_area:
      name: Zonă de aplicare pentru uleiul de filare
      description: Specifică punctul/punctele de aplicare a uleiului vizate pe o roată
        de tors.
    spinning_oil_application_tool:
      name: Instrument de aplicare a uleiului de filare
      description: Indică stilul aplicatorului/vârfului ambalajului utilizat pentru
        aplicarea uleiului pe piesele roții de tors, pentru o dozare controlată.
    spinning_oil_features:
      name: Caracteristici ale uleiului pentru mecanisme de filat
      description: Evidențiază proprietățile funcționale relevante pentru uleiurile
        destinate roților de filat (reziduuri, pătare, oxidare și posibilitatea de
        spălare).
    spinning_top_features:
      name: Caracteristici ale titirezului
      description: Caracteristici speciale de joacă incluse în titirez, dincolo de
        rotirea de bază.
    spinning_top_launch_mechanism:
      name: Mecanism de lansare a titirezului
      description: Modul în care titirezul este pornit/propulsat pentru a se învârti.
    spinning_wheel_brake_tension_system_type:
      name: Tip de sistem de frânare/tensionare a roții de tors
      description: Specifică sistemul de frânare/tensionare la înfășurare utilizat
        pentru a controla preluarea firului.
    spinning_wheel_drive_system:
      name: Sistem de antrenare a roții de tors
      description: Indică sistemul de antrenare pentru care este destinată bobina
        roții de tors.
    spinning_wheel_hook_system:
      name: Sistem de cârlige pentru roata de tors
      description: Specifică modul în care firul este ghidat de-a lungul brațelor
        aripioarei.
    spinning_wheel_part_application:
      name: Aplicație a piesei pentru roata de tors
      description: Specifică pentru care componente ale roții de tors este destinat
        uleiul.
    spinning_wheel_portability_foldability:
      name: Portabilitatea/pliabilitatea roții de tors
      description: Indică dacă roata de tors este concepută să se plieze/strângă pentru
        transport.
    spinning_wheel_tension_adjustment_type:
      name: Tip de reglare a tensiunii roții de tors
      description: Cum este reglată tensiunea pe roată pentru controlul preluării
        firului.
    splice_termination_type:
      name: Tip de matisare/terminație
      description: Specifică terminația de capăt prevăzută pe parâma de ancorare (de
        ex., ochi matisat, rodanță, cârlig de lanț).
    split_shot_cut_type:
      name: Tip de crestătură a plumbului despicat
      description: Specifică stilul canelurii sau deschiderii care permite atașarea
        la firul de pescuit.
    split_shot_shape:
      name: Formă a plumbului despicat
      description: Descrie forma fizică a plumbului despicat, influențând hidrodinamica
        și rezistența la agățare.
    split_shot_size:
      name: Dimensiunea plumbului despicat
      description: Cod alfanumeric standardizat de mărime (de ex., SSG, AAA, BB, 1)
        utilizat de producători și pescari pentru a clasifica greutățile tip plumb
        despicat. Completează măsurătorile exacte de greutate.
    spoiler_adjustability:
      name: Posibilitatea de reglare a spoilerului
      description: Indică dacă unghiul/înălțimea spoilerului este reglabilă.
    spoke_accessory_function:
      name: Funcție a accesoriului pentru spițe
      description: Clasifică funcția principală a accesoriului pe roată, cum ar fi
        decorativă, reflectorizantă sau luminoasă.
    spoke_butting_profile:
      name: Profil de ranforsare a spiței
      description: Descrie modul în care se modifică diametrul spiței de-a lungul
        lungimii sale (simplă, simplu/dublu/triplu sau cvadruplu-ranforsată), influențând
        greutatea și rezistența.
    spoke_gauge:
      name: Grosimea spiței
      description: Specifică grosimea (grosimea nominală a firului) spițelor cu care
        este compatibil niplul.
    spoke_interface_type:
      name: Tip de interfață a spițelor
      description: Indică stilul capului de spiță pentru care este conceput butucul
        (curbat în J, cu tracțiune directă, cu cap în formă de T).
    spoke_shape:
      name: Forma spiței
      description: Specifică secțiunea transversală externă a firului spiței, care
        influențează aerodinamica și estetica.
    spool_form_factor:
      name: Factor de formă al rolei
      description: Stilul fizic al corpului bobinei și modul în care firul/firul de
        lână este reținut (de ex., cu flanșă sau cu con).
    spoon_style:
      name: Stilul lingurii de pescuit
      description: Indică subtipul funcțional sau stilul lingurii, cum ar fi pentru
        lansare, oscilantă sau pentru trolling.
    sports_bra_padding_type:
      name: Tipul de căptușeală al sutienului sport
      description: Specifică tipul de căptușeală existent în sutienul sport.
    sports_cap_style:
      name: Stilul șepcii sport
      description: Identifică construcția/stilul general al șepcii (de ex., șapcă
        de baseball, snapback), independent de marca echipei.
    sports_governing_body_certification:
      name: Certificarea organismului de conducere sportiv
      description: Indică certificările sau aprobările oficiale de la organismele
        de conducere sportive recunoscute, confirmând că produsul îndeplinește standardele
        de competiție.
    sports_surface_compatibility:
      name: Compatibilitate cu suprafețe sportive
      description: Listează tipurile de joc sau de suprafață pe care vopseaua pentru
        marcaj poate fi aplicată în siguranță.
    sports_toy_set_contents:
      name: Conținut al setului de jucării sportive
      description: Identifică componentele incluse în setul de jucării sportive (de
        ex. minge, bâtă, plasă, ținte).
    spray_string_cleanup_method:
      name: Metodă de curățare a sprayului cu spumă
      description: Mod recomandat de îndepărtare/curățare a reziduurilor de spray
        cu spumă colorată.
    spray_string_finish_effect:
      name: Finisaj/efect al sprayului cu spumă
      description: Efectul vizual al spumei pulverizate odată aplicată (strălucire/reflectivitate
        și efecte speciale).
    spray_string_formulation_type:
      name: Tip de formulare a sprayului cu spumă
      description: Cum se comportă produsul în timpul și după pulverizare (de ex.,
        lavabil sau de tip permanent).
    spray_string_recommended_surface:
      name: Suprafață recomandată pentru sprayul cu spumă
      description: Tipurile de suprafețe pe care sprayul cu spumă este destinat a
        fi utilizat (și de pe care poate fi curățat ușor).
    spray_string_scent:
      name: Miros al sprayului cu spumă
      description: Profilul parfumului sau al mirosului, dacă există, al sprayului
        cu spumă.
    spray_string_suitable_age_group:
      name: Grupă de vârstă potrivită pentru sprayul cu spumă
      description: Vârsta minimă recomandată a utilizatorului/grupa de vârstă pentru
        utilizare în siguranță.
    spread_consistency:
      name: Consistența cremei tartinabile
      description: Descrie textura/consistența sosului sau a cremei tartinabile pentru
        a stabili așteptările privind senzația în gură și utilizarea (de ex., fină,
        cu bucăți, aerată).
    spread_variety:
      name: Sortiment de pastă tartinabilă
      description: Clasifică tipul specific de pastă din fructe (de ex., gem, jeleu,
        marmeladă, cremă de fructe), astfel încât cumpărătorii să poată face distincția
        între diferitele stiluri de preparare și texturi.
    spreader_bar_type:
      name: Tip de bară de depărtare
      description: Indică tipul de bară depărtătoare sau sistemul de cârlig furnizat
        sau compatibil cu hamul.
    sprint_canoe_class:
      name: Clasă de canoe de sprint
      description: Specifică denumirea oficială a clasei de curse de canoe de sprint.
    sprout_presentation:
      name: Formă de prezentare a germenilor
      description: Identifică prezentarea fizică a produsului (de ex., germeni proaspeți,
        microplante, ghiveci cu plante vii, pudră).
    squash_and_gourd_variety:
      name: Soi de dovleac și tărtăcuță
      description: Identifică soiul cultivat sau varietatea comercială specifică a
        dovleacului sau tărtăcuței, ajutând cumpărătorii să găsească rapid tipul dorit.
    stability_class:
      name: Clasa de stabilitate
      description: Categorisire generală a stabilității, derivată din evaluările de
        zbor sau din mențiunile de marketing.
    stabilizer_thread_size:
      name: Dimensiune a filetului stabilizatorului
      description: Specificația filetului utilizată pentru atașarea unui stabilizator
        sau accesoriu la un arc sau o arbaletă.
    stabilizer_type:
      name: Tipul stabilizatorului
      description: Identifică stilul sau clasificarea pozițională a stabilizatorului
        pentru arc sau arbaletă.
    stages_supported:
      name: Trepte acceptate
      description: Indică cu câte trepte este concepută să zboare o rachetă sau un
        kit.
    stain_remover_format:
      name: Formatul soluției de îndepărtare a petelor
      description: Specifică formatul/prezentarea produsului folosit pentru tratarea
        petelor din vehicule (sticlă cu pulverizator, aerosol, spumă, gel, pudră,
        șervețele, creion/marker).
    stake_shape:
      name: Formă a țărușului
      description: Definește secțiunea transversală sau stilul de design al unui țăruș
        de cort, care influențează puterea de susținere în diferite tipuri de sol.
    stamp_block_features:
      name: Caracteristici ale blocului pentru ștampile
      description: Evidențiază caracteristicile funcționale ale blocurilor pentru
        ștampile, cum ar fi grile de măsurare, mânere sau suprafețe antiderapante.
    stamp_block_type:
      name: Tip de bloc pentru ștampile
      description: Specifică construcția/stilul blocului utilizat pentru montarea
        ștampilelor (de ex., bloc acrilic transparent, bloc montat pe lemn sau bloc
        de poziționare).
    stamp_set_pieces_included:
      name: Piese incluse în setul de ștampile
      description: Indică componentele incluse în setul cu ștampilă și tușieră (de
        ex., ștampile, tușiere, markere).
    stand_padding_material:
      name: Material de căptușire a stativului
      description: Materialul folosit pe punctele de contact (ale stativelor/suporturilor)
        pentru a proteja finisajul instrumentului (de ex., spumă, cauciuc, silicon).
    staple_fiber_animal_fiber_type:
      name: Tip de fibră animală (fibre discontinue)
      description: Tip specific de fibră de origine animală când sursa fibrei discontinue
        este animală.
    staple_fiber_crimp_level:
      name: Nivel de ondulare a fibrei discontinue
      description: Gradul de ondulare naturală din fibră.
    staple_fiber_preparation_type:
      name: Tip de preparare a fibrei discontinue
      description: Stadiul de preparare/procesare al fibrei așa cum este vândută (cât
        de aliniată/manipulată), ceea ce influențează puternic metoda de tors, ușurința
        tragerii și rezultatul final.
    staple_fiber_source_type:
      name: Tip de sursă a fibrei discontinue
      description: 'Categoria largă de origine pentru conținutul de fibre (ex.: animală,
        vegetală, sintetică).'
    starch_processing_type:
      name: Tip de procesare a amidonului
      description: Indică dacă amidonul este nativ sau a fost modificat fizic sau
        chimic (de ex., instant, pregelatinizat) pentru a oferi proprietăți funcționale
        specifice, cum ar fi viteza de îngroșare sau toleranța la temperatură.
    starch_source:
      name: Sursă de amidon
      description: Specifică sursa botanică din care este derivat amidonul de gătit
        sau agentul de îngroșare (de ex., porumb, cartof, tapioca). Sursa este factorul
        de diferențiere principal pentru amidonul de gătit și influențează direct
        potrivirea în rețete, considerațiile legate de alergeni și comportamentul
        de căutare al consumatorilor.
    starfruit_variety:
      name: Soi de carambola
      description: Identifică soiul cultivat sau varietatea specifică de carambola
        (de ex., Arkin, Fwang Tung).
    starter_drive_type:
      name: Tip de antrenare a electromotorului
      description: Tipul mecanismului de antrenare/cuplare a electromotorului utilizat
        pentru a angrena pinionul cu coroana dințată.
    starter_pistol_action_type:
      name: Tip de mecanism pentru pistolul de start
      description: Identifică mecanismul de tragere/acțiune al pistolului de start
        (de ex., acțiune simplă, acțiune dublă, semiautomat).
    starter_pistol_caliber:
      name: Calibru pentru pistolul de start
      description: Specifică muniția oarbă sau calibrul cartușului pentru care este
        conceput pistolul de start.
    starter_terminal_type:
      name: Tip de terminal al electromotorului
      description: Specifică stilul terminalului/conectorului utilizat pentru conexiunile
        electrice pe electromotor sau solenoidul electromotorului (de ex., prezon,
        fișă lată, conector rapid).
    starting_block_anchoring_method:
      name: Metodă de ancorare a blocstarturilor
      description: Descrie modul în care blocstarturile se fixează de suprafața pistei
        (de ex., țepușe, ventuze, tampoane de cauciuc).
    steerer_tube_design:
      name: Design al gâtului furcii
      description: Descrie designul structural al gâtului furcii bicicletei – drept,
        conic, filetat etc. – care determină compatibilitatea cu cuvetele de direcție
        și cu cadrul.
    steering_cable_end_fitting_type:
      name: Tip de fiting pentru cablul de direcție
      description: Identifică stilul de terminație/atașare de la capetele cablului
        de direcție al ambarcațiunii (capătul de la cârmă și capătul de la motor/manșă)
        pentru a asigura compatibilitatea cu punctele de conectare. Utilizați standardul
        sau denumirea producătorului, dacă este cazul.
    steering_column_adjustability_features:
      name: Caracteristici de reglare ale coloanei de direcție
      description: Indică ce funcții de ajustare sunt încorporate în coloana de direcție.
    steering_column_ignition_provision:
      name: Prevedere pentru contact de pornire pe coloana de direcție
      description: Indică dacă coloana de direcție este concepută pentru a accepta
        un butuc/contact de pornire și/sau un blocator de direcție.
    steering_column_shaft_end_interface_type:
      name: Tip de interfață la capătul axului coloanei de direcție
      description: Identifică stilul interfeței de la capătul axului coloanei de direcție
        (de ex., canelat, dublu D, cu pană).
    steering_column_shift_type:
      name: Tip de schimbător pe coloana de direcție
      description: Specifică dacă coloana de direcție include un mecanism de schimbare
        a vitezelor montat pe coloană și tipul de transmisie.
    steering_component_drive_type:
      name: Tip de antrenare a componentei de direcție
      description: Specifică mecanismul de antrenare/asistență relevant pentru componentele
        de direcție (în special pompe servo și sisteme de direcție electrică EPS).
    steering_position:
      name: Poziția direcției
      description: Specifică dacă autoutilitara are volan pe stânga sau volan pe dreapta.
    steering_pump_pulley_type:
      name: Tip de fulie pentru pompa de servodirecție
      description: Specifică tipul de fulie/interfață utilizată pentru antrenarea
        pompei de servodirecție.
    steering_rack_finish_coating:
      name: Finisaj/strat de acoperire pentru caseta de direcție
      description: Specifică finisajul/stratul exterior de protecție împotriva coroziunii.
    steering_rack_position:
      name: Poziție a casetei de direcție
      description: Specifică locul unde este montată/utilizată caseta de direcție
        în sistemul vehiculului.
    steering_wheel_cover_installation_type:
      name: Tip de instalare a husei de volan
      description: Modul în care husa de volan este instalată/fixată pe volan.
    steering_wheel_grip_material:
      name: Material de prindere al volanului
      description: Specifică materialul de pe coroana volanului/zona de prindere (unde
        au contact mâinile), care poate diferi de materialul miezului/spițelor volanului.
    steering_wheel_mounting_pattern:
      name: Model al orificiilor de montare a volanului
      description: Specifică modelul de montare cu șuruburi/orificii utilizat pentru
        atașarea volanului (sport) la un butuc/butuc adaptor (de ex. 3 șuruburi, 5
        șuruburi).
    steering_wheel_rim_material_grip_surface:
      name: Material al coroanei volanului (suprafața de prindere)
      description: Specifică materialul principal de acoperire al prinderii/coroanei
        volanului (diferit de materialul general de construcție).
    stem_material:
      name: Material al muștiucului
      description: Specifică materialul utilizat în mod specific pentru țeava/muștiucul
        pipei (de ex., acrilic, ebonită, lucit).
    stencil_machine_consumable_type:
      name: Tip de consumabil pentru aparatul de șabloane
      description: Specifică consumabilele necesare pentru funcționare (dacă este
        cazul).
    step_surface_texture:
      name: Textură a suprafeței treptei
      description: Specifică designul/materialul suprafeței sau treptei (scării de
        piscină/barcă) menit să îmbunătățească aderența și confortul la umezeală.
    stepper_motion_type:
      name: Tip de mișcare pentru stepper
      description: Definește mișcarea principală de pășire oferită de aparat.
    stick_bow_profile:
      name: Profil de curbură a crosei
      description: Specifică profilul de curbură (sau tipul de curbură) al crosei
        de hochei pe iarbă, un factor esențial care influențează controlul mingii,
        performanța la „drag-flick” și stilul de joc.
    stick_construction:
      name: Construcție a crosei
      description: Specifică stilul de construcție al crosei de hochei, cum ar fi
        compozit dintr-o singură piesă, compozit din două piese sau lemn.
    stick_curvature_type:
      name: Tip de curbură a bățului
      description: Descrie profilul de curbură al bățului de aruncare, care influențează
        distanța și precizia aruncării.
    stick_head_shape:
      name: Formă a capului crosei
      description: Definește forma capului crosei, influențând preluarea mingii, stilul
        de lovire și controlul precis al mingii.
    stick_size_compatibility:
      name: Compatibilitate cu mărimea crosei
      description: Identifică grupa de mărime a crosei de hochei cu care este compatibil
        produsul (de ex., copii, juniori, intermediari, seniori, portar, universal).
    sticker_decal_features:
      name: Caracteristici ale autocolantelor
      description: Surprinde caracteristicile de aplicare și performanță specifice
        autocolantelor (de ex., aplicare fără bule de aer, repoziționabil).
    sticker_finish:
      name: Finisaj al autocolantului
      description: Descrie finisajul suprafeței/efectul vizual al autocolantelor.
    sticker_format:
      name: Formatul autocolantelor
      description: Specifică forma de prezentare la vânzare a autocolantelor decorative
        (de ex., coală, rolă, individuale, album).
    sticker_material_type:
      name: Tipul de material al autocolantului
      description: Specifică substratul/materialul principal al autocolantului decorativ
        (nu ornamentele de pe el).
    stilt_foot_attachment_type:
      name: Tip de atașare a piciorului pe picioroange
      description: Specifică modul în care piciorul utilizatorului se fixează de picioroange
        (de ex., curea cu cataramă, scai, șireturi).
    stirrup_style:
      name: Stil de scară
      description: Clasifică stilul specific designului sau disciplinei scărilor de
        șa, cuprinzând variante de siguranță, disciplină și construcție.
    stirrup_tread_material:
      name: Materialul tălpii scării
      description: Specifică materialul utilizat pentru suportul piciorului sau talpa
        scării, care influențează aderența, confortul și uzura.
    stitch_marker_and_counter_style:
      name: Stil de marcator de ochiuri și numărător
      description: Specifică stilul sau formatul unui marcator de ochiuri sau al unui
        numărător de ochiuri/rânduri (de ex., marcator tip agrafă, inel crestat, numărător
        tip inel, numărător digital).
    stitch_types:
      name: Tipuri de cusături
      description: Tipurile de cusături (funcționale și decorative) pe care le poate
        produce mașina.
    stitching_method:
      name: Metodă de coasere
      description: Indică modul în care sunt îmbinate panourile mingii.
    stitching_state:
      name: Stadiu de coasere
      description: Indică dacă piesele vestimentare sunt furnizate necusute, semicusute,
        cusute sau gata de purtat.
    stock_car_race_series:
      name: Seria de curse de mașini de stoc
      description: Specifică organismul de reglementare sau seria/clasa de curse pentru
        care este construită mașina de stoc.
    stone_adhesion:
      name: Aderența sâmburelui
      description: Indică dacă sâmburele piersicii sau nectarinei se desprinde liber,
        este aderent sau semiaderent.
    stone_creation_method:
      name: Metodă de creare a pietrei
      description: Specifică dacă piatra este naturală, creată în laborator, simulată
        sau reciclată.
    stone_cut_grade:
      name: Grad de tăietură a pietrei
      description: Indică evaluarea generală a calității tăieturii pietrei.
    stone_cut_style:
      name: Stil de tăietură a pietrei
      description: Stilul de tăietură/fațetare a pietrei de sticlă (de ex., fațetată
        sau caboșon).
    stone_fruit_cultivar:
      name: Soi de drupe
      description: Identifică soiul/varietatea specifică a piersicii sau nectarinei.
    stone_fruit_variety:
      name: Sortiment de drupe
      description: Face distincția între subtipurile din cadrul categoriei de fructe
        cu sâmbure tare (de ex., piersică, nectarină, piersică plată).
    stone_setting_type:
      name: Tip de montură a pietrei
      description: Specifică modul în care o piatră este fixată în bijuterie (tip
        casetă, cu gheare, pavé etc.).
    stone_transparency:
      name: Transparența pietrei
      description: Transparența/opacitatea optică a pietrei de sticlă.
    storage_case_type:
      name: Tip de recipient de depozitare
      description: Indică tipul de recipient în care este disponibil setul pentru
        depozitare și transport (de ex. cutie, husă, geantă).
    storage_compartment_type:
      name: Tip de compartiment de depozitare
      description: Specifică tipul de compartiment de depozitare pe care baliza de
        înot îl oferă pentru obiectele personale.
    storage_media_and_transfer_methods_supported:
      name: Medii de stocare și metode de transfer acceptate
      description: Mediile sau metodele de conectare acceptate pentru importul/exportul
        mostrelor și salvarea/încărcarea proiectelor.
    storage_requirements:
      name: Cerințe de depozitare
      description: Specifică modul în care produsul trebuie depozitat înainte și/sau
        după deschidere pentru a menține calitatea și siguranța.
    stove_jack_compatibility:
      name: Compatibilitate cu racord pentru sobă
      description: Indică dacă cortul include o deschizătură rezistentă la foc pentru
        burlanul unei sobe.
    straight_pin_application:
      name: Aplicație a acelor cu gămălie
      description: Specifică utilizarea vizată pentru acele cu gămălie.
    straight_pin_finish:
      name: Finisaj al acelor cu gămălie
      description: Descrie finisajul de suprafață sau stratul de acoperire al acului
        (de ex. nichelat), care influențează rezistența la coroziune și alunecarea.
    straight_pin_head_material:
      name: Material al gămăliei acului
      description: Specifică materialul gămăliei (dacă este prezentă), cum ar fi plastic
        sau sticlă.
    straight_pin_head_shape:
      name: Formă a gămăliei acului
      description: Descrie forma/stilul gămăliei acului pentru ușurință la utilizare
        și vizibilitate.
    strand_configuration:
      name: Configurație a șuvițelor
      description: Indică din câte rânduri sau șiraguri separate este alcătuit lanțul
        pentru portofel (simplu, dublu, triplu).
    strand_material:
      name: Materialul șiragului
      description: Specifică materialul utilizat pentru șiragurile/franjurii individuali.
    strap_attachment_hardware:
      name: Componente de prindere a curelei
      description: Specifică tipul/designul elementelor utilizate pentru a atașa cureaua
        la instrument/punctul de sprijin.
    strap_configuration:
      name: Configurația curelei
      description: Indică numărul punctelor de atașare la cască de pe curea (de ex.,
        în 2 puncte, în 4 puncte), ceea ce este esențial pentru potrivire, siguranță
        și cerințele ligii.
    strap_functionality:
      name: Funcționalitatea curelei
      description: Specifică utilizarea sau designul principal vizat al curelei pentru
        salteaua de yoga.
    strap_padding:
      name: Căptușeală a curelei
      description: Indică nivelul construcției căptușite din curea, menit să îmbunătățească
        confortul și să distribuie greutatea.
    strap_side:
      name: Partea curelei
      description: Indică dacă cureaua este concepută pentru legătura stângă, legătura
        dreaptă sau dacă este vândută la pereche.
    strap_width:
      name: Lățimea curelei
      description: Indică lățimea relativă a curelelor (subțiri, medii, late) pentru
        a ghida cumpărătorii care caută o acoperire sau o susținere specifică.
    strength_classification:
      name: Clasificare a rezistenței
      description: Eticheta comercială de rezistență utilizată în mod obișnuit de
        branduri (de ex., ușoară, puternică, extraputernică).
    strength_grade:
      name: Grad de rezistență
      description: Descrie rezistența de fixare prevăzută/nivelul de sarcină al sistemului
        de prindere cu velcro.
    stretch_level:
      name: Grad de elasticitate
      description: Indică cât de mult se întinde materialul textil în timpul utilizării.
    stretch_type:
      name: Tip de elasticitate
      description: Indică dacă țesătura are o elasticitate mecanică (din construcție)
        sau datorată firelor elastice și în ce direcție/direcții.
    stretcher_bar_material:
      name: Material al șasiului
      description: Materialul utilizat pentru barele șasiului/cadru (de ex., pin,
        brad, plop, mesteacăn, MDF/lemn prelucrat).
    strike_shield_shape:
      name: Formă a scutului de lovire
      description: Specifică factorul de formă general al suprafeței de lovire a unui
        scut pentru antrenament.
    string_core_shape:
      name: Formă a miezului corzii
      description: Specifică forma firului central utilizat la corzile înfășurate,
        influențând senzația tactilă și stabilitatea.
    string_coverage:
      name: Acoperirea corzilor
      description: Specifică ce corzi este conceput să apese/acopere capodastrul parțial
        (ca număr sau set comun).
    string_end_type:
      name: Tip de capăt al corzii
      description: Specifică modul în care coarda se termină la căluș/cordar pentru
        compatibilitate (deosebit de important pentru chitarele acustice/electrice
        și unii bași).
    string_set_type:
      name: Tip de set de corzi
      description: Specifică dacă produsul este un set complet sau o coardă/corzi
        de schimb individuale.
    strung_status:
      name: Stadiu de racordare
      description: Indică dacă capul crosei de lacrosse vine gata racordat cu un buzunar
        sau este vândut neracordat.
    strut_placement:
      name: Amplasare a barei de rigidizare
      description: Specifică poziția de instalare prevăzută pe vehicul (față/spate
        și stânga/dreapta) pentru telescop.
    stud_attachment_type:
      name: Tip de atașare a crampoanelor
      description: Specifică modul în care crampoanele sunt fixate sau configurate
        pe talpa exterioară, influențând tracțiunea, întreținerea și conformitatea
        cu regulamentele ligilor.
    stud_configuration:
      name: Configurație a crampoanelor
      description: Definește forma și dispunerea crampoanelor pe talpa exterioară,
        influențând tracțiunea și performanța pe diverse suprafețe.
    stud_material:
      name: Material al crampoanelor
      description: Identifică materialul principal al crampoanelor, oferind informații
        despre durabilitate, greutate și conformitatea cu reglementările de siguranță.
    stuffed_animal_features:
      name: Caracteristici ale animalului de pluș
      description: Evidențiază caracteristicile încorporate de joacă și confort ale
        animalului de pluș.
    stump_base_type:
      name: Tip de bază pentru jaloanele de cricket
      description: Definește stilul bazei sau sistemului de montare pe care îl utilizează
        jalonul de cricket (țepușă, revenire cu arc, cauciuc lestat etc.).
    stump_mechanism:
      name: Mecanism al jaloanelor
      description: Specifică mecanismul de revenire sau de montare al jaloanelor de
        cricket (de ex., cu arc, fixe).
    stump_size:
      name: Mărimea jaloanelor de cricket
      description: Etichetă de mărime a categoriilor, utilizată pentru jaloanele de
        cricket, indicând înălțimea tipică și grupa de vârstă potrivită a jucătorilor.
    subwoofer_installation_type:
      name: Tip de instalare a subwooferului
      description: Modul în care subwooferul este destinat a fi instalat într-un sistem
        audio auto.
    sugar_cane_variety:
      name: Soi de trestie de zahăr
      description: Identifică soiul cultivat sau varietatea comercială specifică de
        trestie de zahăr, care poate influența culoarea, dulceața și conținutul de
        fibre.
    sugar_content_level:
      name: Nivelul conținutului de zahăr
      description: Clasifică nivelul general de zahăr sau formularea concentratului
        de băutură, permițând cumpărătorilor să găsească rapid opțiuni standard, cu
        conținut redus sau fără zahăr.
    sugar_refinement_level:
      name: Nivelul de rafinare a zahărului
      description: 'Indică gradul sau stilul de rafinare (culoarea, conținutul de
        melasă sau nivelul de procesare – de ex.: brun, alb, nerafinat).'
    sugar_source:
      name: Sursă a zahărului
      description: Identifică originea botanică sau a materialului din care este obținut
        zahărul.
    suit_fit:
      name: Croială a costumului
      description: Croiala generală a costumului, indicând cât de aproape se așază
        pe corp.
    suit_pieces:
      name: Piese de costum
      description: Specifică câte articole de îmbrăcăminte asortate sunt incluse în
        setul costumului (de ex., 2 piese, 3 piese, 4 piese).
    suitable_for_anchoring_use:
      name: Potrivită pentru ancorare
      description: Indică utilizarea preconizată a frânghiei/parâmei în vederea ancorării.
    suitable_for_craft_type:
      name: Potrivit pentru tipul de artizanat
      description: Utilizarea principală în meșteșuguri pentru care este avută în
        vedere sârma de întindere.
    suitable_for_paint_type:
      name: Potrivit pentru tipul de vopsea
      description: Indică cu ce tipuri de vopsele se utilizează (în siguranță) pânza
        de pictură.
    suitable_for_swim_stroke:
      name: Potrivit pentru stilul de înot
      description: Indică pentru ce stil/stiluri de înot este concepută sau optimizată
        paleta de mână.
    suitable_mounting_surface_material:
      name: Material potrivit pentru suprafața de montare
      description: Specifică suprafața/materialul de montare vizat pe care stratul
        adeziv este conceput să se lipească.
    suitable_play_location:
      name: Loc de joacă potrivit
      description: Mediul/mediile de joacă vizate principale pentru jucăria tip moară
        de nisip și apă.
    suitable_riding_conditions:
      name: Condiții de condus potrivite
      description: Indică condițiile de mers (de ex., uscat, ud, iarnă) pentru care
        este formulat un lubrifiant sau soluție de curățare pentru bicicletă.
    suitable_snow_conditions:
      name: Condiții de zăpadă potrivite
      description: Indică condiția/condițiile principale de zăpadă pentru care este
        formulată ceara de aderență.
    suitable_surface_type:
      name: Tip de suprafață potrivită
      description: Specifică suprafețele de mers pentru care este conceput sistemul
        de aderență.
    suitable_table_size:
      name: Dimensiuni adecvate ale mesei
      description: Indică lungimea mesei de biliard/snooker pe care lampa este concepută
        să o lumineze.
    sun_protection_rating_upf:
      name: Indice de protecție solară (UPF)
      description: Furnizează nivelul certificat de protecție solară UPF al articolului
        de îmbrăcăminte.
    sun_shade_attachment_method:
      name: Metodă de atașare a parasolarului
      description: Modul în care parasolarul se fixează pe geam/parbriz.
    sun_shade_style:
      name: Stil de parasolar auto
      description: Construcția/formatul produsului pentru desfășurarea și depozitarea
        parasolarului.
    sunchoke_variety:
      name: Soi de topinambur
      description: Indică soiul cultivat sau varietatea specifică de topinambur (anghinare
        de Ierusalim), oferind informații detaliate pentru grădinari, bucătari și
        cumpărători exigenți.
    sunflower_oil_variety:
      name: Sortiment de ulei de floarea-soarelui
      description: Clasifică profilul acizilor grași sau soiul uleiului de floarea-soarelui
        (de ex., cu conținut ridicat de acid oleic, cu conținut mediu de acid oleic,
        linoleic).
    sunflower_variety:
      name: Soi de floarea-soarelui
      description: Varietate cultivată/soi de floarea-soarelui (varietăți comerciale
        comune pentru utilizare ca flori tăiate).
    support_brace_features:
      name: Caracteristici ale ortezei de susținere
      description: Listează caracteristicile funcționale notabile ale ortezei pentru
        încheietură, cum ar fi materialul textil respirabil, atelele detașabile sau
        placa metalică reglabilă.
    support_leg_count:
      name: Numărul de picioare de sprijin
      description: Numărul de picioare care au contact cu solul atunci când bastonul
        de tragere este în uz (de ex. monopod, bipod, trepied).
    support_padding:
      name: Căptușeală de susținere
      description: Indică dacă cureaua/suportul include căptușeală integrată în punctele
        de contact (gât/umăr/degetul mare).
    support_structure_type:
      name: Tip de structură de susținere
      description: Indică metoda de construcție folosită pentru a menține paravântul
        în poziție verticală.
    supported_bowling_delivery_types:
      name: Tipuri de aruncări de bowling acceptate
      description: Specifică variațiile de aruncare la cricket pe care mașina le poate
        simula, cum ar fi deviație în interior, deviație în exterior și tipuri de
        rotație.
    supported_dive_modes:
      name: Moduri de scufundare acceptate
      description: Specifică modurile operaționale de scufundare pe care le acceptă
        computerul de scufundări, cum ar fi Aer, Nitrox sau Manometru.
    supported_equipment_type:
      name: Tip de echipament acceptat
      description: Identifică echipamentul pentru sporturi de iarnă pe care rastelul
        este conceput să îl susțină (de ex., schiuri, snowboarduri, bețe de schi).
    supported_spin_types:
      name: Tipuri de rotire acceptate
      description: Specifică variațiile de rotație ale mingii pe care le poate aplica
        lansatorul.
    supported_spool_bobbin_types:
      name: Tipuri de role/mosoare acceptate
      description: Specifică ce formate de role/mosoare este conceput să accepte depănătorul
        electric.
    surf_wax_temperature_rating:
      name: Temperatură nominală pentru ceara de surf
      description: Specifică intervalul de temperatură a apei pentru care este formulată
        ceara, asigurând o aderență optimă în diferite zone climatice.
    surface_coating_or_finish:
      name: Strat de acoperire sau finisaj al suprafeței
      description: Specifică orice tratament de suprafață protector sau care îmbunătățește
        performanța aplicat pe clește.
    surface_coating_or_wrap:
      name: Strat de acoperire sau înveliș al suprafeței
      description: Tratamentul suprafeței exterioare folosit pentru aderență/control
        pe bățul central (și uneori pe bețele de mână).
    surface_finish:
      name: Finisajul suprafeței
      description: Descrie senzația/textura suprafeței mingii care influențează aderența
        și mișcarea în timpul jongleriei de contact.
    surface_finish_prep:
      name: Finisarea/pregătirea suprafeței
      description: Indică starea suprafeței de frecare (de ex., rectificată, prelucrată
        mecanic, turnată brută) la vânzare.
    surface_types_included:
      name: Tipuri de suprafețe incluse
      description: Specifică ce suprafață include setul/kitul pentru desen/pictură
        (dacă există), cum ar fi pânză, bloc de hârtie, panouri de lemn sau niciuna.
    surfboard_construction:
      name: Construcție a plăcii de surf
      description: Specifică tehnologia principală de construcție sau stratificarea
        plăcii de surfing.
    surfboard_tail_shape:
      name: Formă a cozii plăcii de surfing
      description: Definește conturul cozii plăcii de surfing, care influențează manevrabilitatea
        și stabilitatea.
    suspension_bushing_type:
      name: Tipul bucșei de suspensie
      description: Specifică stilul funcțional/de instalare al bucșei de suspensie.
    suspension_configuration:
      name: Configurația suspensiei
      description: Descrie dacă tricicleta are suspensie și unde este localizată.
    suspension_material:
      name: Materialul de suspendare
      description: Specifică materialul lanțurilor, frânghiilor sau cablurilor folosite
        pentru suspendarea leagănului.
    suspension_trainer_accessories_included:
      name: Accesorii incluse pentru corzile de antrenament prin suspendare
      description: Listează articolele suplimentare furnizate împreună cu kitul de
        antrenament prin suspendare (de ex., ancoră pentru ușă, curea de extensie,
        geantă de depozitare), ajutând cumpărătorii să înțeleagă ce conține cutia
        și să compare valoarea pachetelor.
    suspension_trainer_anchor_type:
      name: Tip de ancoră pentru corzile de antrenament prin suspendare
      description: Definește stilul de montare sau punctul de ancorare pentru care
        sunt concepute chingile (de ex., ușă, tavan, copac), oferind informații asupra
        compatibilității cu mediul utilizatorului.
    suspension_type:
      name: Tip de suspensie
      description: Specifică dacă furca este rigidă sau folosește un anumit sistem
        de suspensie (aer, arc elicoidal, hibrid, elastomer etc.), ajutând bicicliștii
        să coreleze furca cu stilul lor de mers.
    sustain_pedal_form_factor:
      name: Factor de formă al pedalei de sustain
      description: Descrie stilul fizic al pedalei de susținere (de ex., pedală de
        picior în stil pian sau comutator de picior compact), care are impact asupra
        senzației tactile și a utilizării vizate.
    sustain_pedal_switch_type:
      name: Tip de comutator pentru pedala de susținere
      description: Indică dacă pedala trimite un semnal de moment (susținere a sunetului
        atât timp cât este apăsată) sau cu reținere (cu comutare).
    sustainability_certification:
      name: Certificare de sustenabilitate
      description: Certificare legată de mediu sau de aprovizionare pentru materialul
        lemnos.
    swab_intended_bassoon_section:
      name: Secțiune a fagotului vizată de cârpa de curățat
      description: Identifică partea fagotului pe care cârpa de curățat este concepută
        să o șteargă (alezaje/părți diferite necesită forme și mărimi diferite ale
        cârpei).
    swab_style:
      name: Stil de cârpă de curățat
      description: Descrie designul fizic/formatul cârpei folosite pentru a trece
        prin sau a ajunge în anumite zone ale saxofonului.
    swab_weight_material:
      name: Material al greutății cârpei de curățat
      description: Materialul greutății de tragere/ghidajului (dacă este prezent),
        care influențează riscul de zgâriere și durabilitatea.
    swab_weight_style:
      name: Stil al greutății pentru cârpa de curățat
      description: Specifică modul în care este lestată cârpa de curățat pentru a
        trece prin alezajul fagotului.
    sway_bar_adjustability:
      name: Capacitatea de ajustare a barei stabilizatoare
      description: Dacă și cum este reglabilă rigiditatea barei stabilizatoare (de
        obicei, prin orificii multiple de montare a bieletei antiruliu).
    sway_bar_coating:
      name: Strat de acoperire pentru bara stabilizatoare
      description: Tratamentul suprafeței sau stratul de acoperire al barei stabilizatoare
        pentru rezistență la coroziune și aspect estetic.
    sway_bar_fitment_front_rear_kit:
      name: Compatibilitate/montare bară stabilizatoare (față/spate/kit)
      description: Indică dacă bara stabilizatoare este destinată punții față, punții
        spate sau este vândută ca un kit „față și spate”.
    sweatshirt_pocket_type:
      name: Tip de buzunar pentru bluză de trening
      description: Descrie stilul buzunarelor prezente pe bluza de trening.
    sweet_potato_variety:
      name: Soi de cartof dulce
      description: Identifică soiul cultivat sau varietatea comercială specifică a
        cartofului dulce.
    sweet_spot_position:
      name: Zona optimă de lovire
      description: Identifică unde este situată zona optimă de lovire de-a lungul
        lamei crosei, influențând stilul de joc și condițiile terenului.
    sweetener_presence:
      name: Prezența îndulcitorilor
      description: Specifică dacă sunt prezenți îndulcitori adăugați în untul de nuci
        și la ce nivel.
    sweetening_type:
      name: Tipul de îndulcire
      description: Descrie modul în care produsul este îndulcit sau nivelul său de
        dulceață.
    swim_armband_construction_type:
      name: Tip de construcție a aripioarelor de înot
      description: Definește stilul structural sau mecanismul de flotație al aripioarelor
        de înot (gonflabile sau din spumă solidă, hibride etc.).
    swim_belt_purpose:
      name: Scopul centurii de înot
      description: Clasificarea funcțională a centurii de înot (de ex., suport de
        flotație, aqua jogging, antrenament de rezistență, legătură statică, prindere
        pentru parașută de rezistență, lest de greutate, centură de siguranță pentru
        ape puțin adânci).
    swim_board_features:
      name: Caracteristici ale plutei de înot
      description: Evidențiază caracteristicile speciale sau îmbunătățirile plăcii
        de înot care sporesc utilitatea sau siguranța.
    swim_bottom_length:
      name: Lungimea slipului de baie
      description: Clasifică acoperirea generală pe picior a pantalonilor scurți de
        baie/boxerilor (de ex., slip-boxer scurt sau până la genunchi).
    swim_buoy_features:
      name: Caracteristici ale balizei de înot
      description: Surprinde caracteristici notabile suplimentare sau accesorii care
        sporesc vizibilitatea, siguranța sau utilitatea unei balize de înot.
    swim_cap_style:
      name: Stil de cască de înot
      description: Definește construcția sau stilul de design al căștii de înot (de
        ex., pentru păr lung, cască mulată/de curse, cu bule/stil turban).
    swim_diaper_feature:
      name: Caracteristică a scutecului de înot
      description: Indică dacă slipul de baie are o funcție integrată de scutec rezistent
        la scurgeri sau necesită/nu include un scutec de înot separat.
    swim_trainer_features:
      name: Caracteristici ale echipamentului de antrenament pentru înot
      description: 'Evidențiază caracteristici suplimentare funcționale sau de confort
        ale echipamentului de antrenament pentru înot (ex.: chingi ajustabile, materiale
        moi).'
    swim_trainer_type:
      name: Tip de echipament pentru antrenament la înot
      description: Definește stilul structural sau formatul echipamentului de antrenament
        pentru înot cu scopul de a ajuta filtrarea în funcție de design și scopul
        antrenamentului.
    swim_training_focus:
      name: Obiectiv al antrenamentului la înot
      description: Identifică obiectivul principal de antrenament pe care îl vizează
        paleta de mână (de ex., tehnică, forță, izolarea mușchilor).
    swim_weight_style:
      name: Stil al greutății de înot
      description: Clasifică factorul de formă al greutății de înot, ajutând cumpărătorii
        să diferențieze între tipuri de produse fundamental diferite, rămânând în
        aceeași categorie.
    swimbait_buoyancy:
      name: Flotabilitatea nălucii
      description: Indică modul în care năluca se comportă în coloana de apă (plutitoare,
        cu suspensie, cu scufundare etc.), permițând pescarilor să selecteze momeala
        corectă pentru adâncimea vizată și stilul de recuperare.
    swimbait_style:
      name: Stilul nălucii
      description: Clasifică construcția sau designul de acțiune al nălucii, cum ar
        fi cu coadă tip paletă sau nălucă glisantă.
    swimwear_pieces_included:
      name: Piese incluse în costumul de baie
      description: Listează componentele individuale ale îmbrăcăminții furnizate în
        setul burkini, astfel încât cumpărătorii să știe exact ce conține pachetul.
    swimwear_set_pieces_included:
      name: Piese incluse în setul de costume de baie
      description: Listează componentele vestimentare furnizate în setul burkini,
        astfel încât cumpărătorii să știe exact ce vor primi (de ex., top, colanți,
        hijab/bonetă).
    swing_attachment_connection_type:
      name: Tipul de prindere/conectare al leagănului
      description: Tipul de conectare utilizat pentru a suspenda leagănul de suportul
        său (de ex., frânghie, lanț, curele).
    swing_trainer_type:
      name: Tip de echipament de antrenament pentru lovitură
      description: Clasifică stilul sau mecanismul aparatului de antrenament pentru
        leagăn, pentru ca cumpărătorii să poată găsi rapid dispozitivele care corespund
        obiectivelor lor de antrenament.
    swing_training_objective:
      name: Obiectivul antrenamentului pentru lovitură
      description: Clasifică obiectivul principal de antrenament, mecanismul sau obiectivul
        aparatului de antrenament pentru swing (de ex., tempo, viteză, prindere).
    switch_electrical_positions:
      name: Pozițiile electrice ale comutatorului
      description: Specifică numărul și comportamentul pozițiilor electrice ale comutatorului
        (de ex., 3 poziții, activare momentană).
    swivel_type:
      name: Tipul de articulație rotativă
      description: Specifică configurația articulației rotative utilizate pentru a
        reduce încurcarea lesei.
    sword_scabbard_material:
      name: Materialul tecii sabiei
      description: Specifică materialul principal al tecii incluse (dacă există).
    synthesizer_form_factor:
      name: Factorul de formă al sintetizatorului
      description: Descrie formatul fizic/de redare al interfeței sintetizatorului.
    synthetic_feather_style:
      name: Stilul penei sintetice
      description: Stilul/tăietura penei sintetice utilizate pentru diferite aspecte
        și tehnici artizanale.
    synthetic_formulation_type:
      name: Tipul de formulare sintetică
      description: Specifică tipul de bază sintetică/formulare (de ex., PAO, ester,
        grupa III hidrocracată).
    syrup_base_ingredient:
      name: Ingredientul de bază al siropului
      description: Identifică sursa principală de plante sau zahăr din care este obținut
        siropul sau nectarul (de ex., arțar, agave, zahăr din trestie).
    syrup_variety:
      name: Varietate de sirop
      description: Definește stilul general sau categoria siropului în funcție de
        formulare sau utilizarea tradițională (de ex., arțar, aromatizant pentru cafea,
        fructe, medicinal).
    t_shirt_fit:
      name: Croiala tricoului
      description: Descrie croiala/tăietura generală prevăzută a tricoului.
    tabla_included_components:
      name: Componente care însoțesc tabla
      description: Indică articolele esențiale incluse cu lista de produse tabla (tobă
        singulară sau set, huse, ciocan de acordare etc.).
    tabla_set_pieces_included:
      name: Piese incluse în setul de tabla
      description: Indică componentele incluse cu setul tabla (de ex., dayan, bayan,
        inele, huse, instrumente de acordare, geantă).
    tabla_tonal_pitch_range_bayan:
      name: Gama tonală/de înălțime a tablei (bayan)
      description: Descrie categoria tipică de înălțime/gamă tonală pentru tobele
        bayan (bas) în funcție de dimensiune și construcție.
    table_base_material:
      name: Material al bazei mesei
      description: Identifică materialul principal al bazei sau piedestalului mesei
        (distinct de picioare sau blatul mesei), ajutând la filtrarea specifică materialului.
    table_base_type:
      name: Tipul de bază al mesei
      description: Identifică designul structural care susține blatul mesei (de ex.,
        piedestal, capră, bază în X).
    table_coverage_position:
      name: Poziția de acoperire a mesei de ping-pong
      description: 'Indică poziția/pozițiile mesei de ping-pong pentru care este concepută
        husa: pliată, în joc sau ambele.'
    table_hockey_part_type:
      name: Tipul de piesă pentru hochei de masă
      description: Identifică tipul specific de componentă în sistemele de hochei
        de masă/cu aer/cu tije/cu cupolă.
    table_leg_design:
      name: Designul picioarelor mesei
      description: Identifică stilul structural sau geometria piciorului, permițând
        cumpărătorilor să potrivească estetica specifică și nevoile de suport.
    table_size:
      name: Dimensiunea mesei de biliard
      description: Dimensiunea generală declarată comercial a mesei de biliard (în
        metri), permițând cumpărătorilor să aleagă rapid opțiuni comune, cum ar fi
        mesele de bar de 2,1 m sau mesele de turneu de 2,9 m.
    table_size_category:
      name: Material al bazei mesei
      description: Clasifică masa de foosball după amprenta generală pentru a ajuta
        cumpărătorii să potrivească spațiul disponibil fără a calcula măsurătorile.
    table_tennis_certification:
      name: Certificare tenis de masă
      description: Listează standardele oficiale sau aprobările organismelor de conducere
        pe care le îndeplinește produsul (de ex., clasele ITTF, EN 14468-2).
    tabletop_tilt_function:
      name: Funcția de înclinare a blatului mesei
      description: Specifică dacă blatul mesei poate fi înclinat, răsturnat sau rotit
        la unghiuri diferite.
    tackle_components_included:
      name: Componente de pescuit incluse
      description: Listează componentele specifice de echipament de pescuit incluse
        în kit, astfel încât cumpărătorii să știe exact ce este furnizat.
    talking_drum_accessories_included:
      name: Accesorii incluse cu toba vorbitoare
      description: Listează accesoriile incluse cu toba vorbitoare (în cutie).
    talking_drum_cord_material:
      name: Materialul corzilor tobei vorbitoare
      description: Materialul utilizat pentru corzile/frânghiile de tensionare care
        conectează membranele tobei.
    talking_drum_tuning_mechanism:
      name: Mecanismul de acordare al tobei vorbitoare
      description: Modul în care se modifică înălțimea tobei/în care se aplică tensiunea
        în timpul jocului (sau la configurare).
    tam_tam_construction_style:
      name: Stilul de construcție al tam-tamului
      description: Stilul de construcție/ciocănire al tam-tamului.
    tam_tam_items_included:
      name: Articole incluse cu tam-tamul
      description: Accesorii incluse cu tam-tamul (de ex., ciocan, suport, husă).
    tamarillo_variety:
      name: Soi de tamarillo
      description: Identifică soiul specific sau varianta de culoare a fructului tamarillo.
    tamarind_variety:
      name: Soiul de tamarind
      description: Specifică soiul botanic sau comercial de tamarind, care poate influența
        aroma, textura și utilizarea culinară.
    tambourine_frame_style:
      name: Stilul cadrului tamburinei
      description: Descrie configurația fizică a cadrului portabil utilizat pentru
        a ține/cânta la tamburină.
    tambourine_head_material:
      name: Material al membranei tamburinei
      description: Specifică materialul membranei de cântat la tamburinele cu membrană.
    tambourine_jingle_configuration:
      name: Configurația zurgălăilor tamburinei
      description: Modul în care zurgălăii sunt dispuși sau construiți pe tamburină.
    tambourine_jingle_material:
      name: Materialul zurgălăilor tamburinei
      description: Specifică materialul zurgălăilor tamburinei (discurile metalice),
        care influențează tonul și durabilitatea.
    tambourine_mounting_type:
      name: Tipul de montare al tamburinei
      description: Modul în care tamburina este destinată să fie ținută sau montată
        în timpul jocului.
    tambourine_tuning_mechanism:
      name: Mecanismul de acordare a tamburinei
      description: Specifică sistemul de acordare utilizat pe tamburinele portabile
        acordabile (dacă este aplicabil).
    tank_model_scale:
      name: Scară a machetei de tanc
      description: Specifică raportul la scară al machetei de tanc (de ex. 1:35, 1:72).
    tank_top_back_style:
      name: Stil de spate pentru maiou
      description: Specifică forma sau croiala spatelui maioului, care influențează
        susținerea, mobilitatea și estetica.
    tape_application_area:
      name: Zonă de aplicare a benzii
      description: Specifică partea echipamentului sau a jucătorului pe care banda
        urmează a fi aplicată, ajutând cumpărătorii să aleagă stilul corect.
    tape_finish:
      name: Finisajul benzii
      description: Finisajul suprafeței/vizual (strălucire sau textură) al benzii.
    tape_purpose:
      name: Scopul benzii
      description: Specifică utilizarea funcțională principală a benzii în întreținerea
        sau personalizarea rachetelor.
    tape_type:
      name: Tip de bandă
      description: Clasifică stilul funcțional sau construcția benzii de hochei, cum
        ar fi pânză, polietilenă transparentă, prindere, coezivă elastică, pentru
        apărători de tibie sau piele de căprioară.
    tapenade_main_ingredients:
      name: Ingrediente principale pentru tapenadă
      description: Specifică ingredientul de bază principal care definește tapenada
        (măsline, roșii, vinete, ardei etc.), util pentru cumpărătorii cu preferințe
        sau restricții bazate pe ingrediente.
    tapestry_loom_loom_format:
      name: Format al războiului de țesut pentru tapiserie
      description: Factorul de formă general/stilul suportului războiului manual de
        țesut pentru tapiserie.
    tapestry_loom_shedding_method:
      name: Metodă de creare a rostului pentru războiul de tapiserie
      description: Modul în care războiul de țesut creează un rost (separă firele
        de urzeală) pentru trecerea bătăturii.
    tapestry_loom_tensioning_system:
      name: Sistem de tensionare pentru războiul de tapiserie
      description: Metoda utilizată pentru a tensiona și fixa urzeala pe războiul
        de țesut pentru tapiserie.
    tar_head_material:
      name: Material al membranei tarului
      description: Identifică materialul feței (membranei) tobei tar, care influențează
        puternic senzația, durabilitatea și tonul.
    tar_playing_style:
      name: Stil de interpretare pentru tar
      description: Specifică poziția/tehnica principală de interpretare pentru care
        este conceput tarul.
    tar_tuning_system:
      name: Sistem de acordaj pentru tar
      description: Specifică modul în care este acordat tarul (cum este reglată tensiunea
        capului).
    target_components:
      name: Componente vizate
      description: Specifică ce componente de combustibil/admisie aer este destinat
        să curețe produsul.
    target_relative_humidity_rh:
      name: Umiditate relativă (UR) vizată
      description: Umiditatea relativă vizată prevăzută pe care produsul este conceput
        să o mențină în interiorul mediului instrumentului/carcasei.
    target_resetting_mechanism:
      name: Mecanismul de resetare a țintei
      description: Descrie modul în care, sau dacă, o țintă revine la poziția inițială
        după ce a fost lovită.
    target_trainer_type:
      name: Tip de dispozitiv de antrenament pentru țintire
      description: Clasifică stilul sau formatul general al țintei de antrenament
        pentru racquetball sau squash.
    targeted_contaminants:
      name: Contaminanți vizați
      description: Tipurile de microbi sau paraziți pe care produsul este certificat
        să îi elimine (pentru sisteme de filtrare/purificare a apei).
    targeted_muscle_group:
      name: Grupă de mușchi vizată
      description: Grupa de mușchi principală pe care accesoriul este menit să o antreneze
        sau să o susțină.
    taro_variety:
      name: Soi de taro
      description: Specifică soiul cultivat, specia sau numele comercial al rădăcinii
        de taro oferite (de ex., taro violet, Eddoe, Dasheen).
    tassel_trim_header_type:
      name: Tip de bandă superioară pentru panglica cu ciucuri
      description: Specifică construcția porțiunii superioare de montare utilizată
        pentru atașarea panglicii cu ciucuri pe o suprafață (de ex., bandă, împletitură,
        șnur).
    tassel_trim_use_case:
      name: Caz de utilizare pentru panglica cu ciucuri
      description: 'Zona principală de aplicare vizată pentru panglica/bordura cu
        ciucuri (ex.: draperii, tapițerie, îmbrăcăminte).'
    taste_profile:
      name: Profil gustativ
      description: 'Descrie caracteristicile gustative dominante ale soiului de mere
        (ex.: dulce, acrișor, aromat).'
    tea_variety:
      name: Sortiment de ceai
      description: Clasifică tipul sau stilul specific de ceai sau infuzie (de ex.,
        negru, verde, matcha, rooibos), astfel încât cumpărătorii să poată filtra
        varietățile preferate.
    teasing_tool_style:
      name: Stil de unealtă pentru dărăcit
      description: Stilul fizic sau factorul de formă al uneltei de dărăcit utilizate
        pentru a deschide și amesteca fibrele (de ex., perie, greblă, pieptene).
    tee_base_style:
      name: Stil de bază pentru suportul de minge
      description: Identifică designul structural al bazei unui suport de lovire pentru
        rugby care susține mingea.
    temper_hardness:
      name: Călire/duritate
      description: Indică cât de moale sau tare este sârma (cât de bine își păstrează
        forma).
    temperature_control_type:
      name: Tip de control al temperaturii
      description: Modul în care este controlată/reglată temperatura uneltei.
    tenkara_action_ratio:
      name: Raport de acțiune pentru Tenkara
      description: Indică raportul tradițional de flexie Tenkara care descrie unde
        se curbează undița sub sarcină (de ex. 6:4, 7:3).
    tennis_ball_court_surface:
      name: Suprafață de teren pentru mingea de tenis
      description: Specifică suprafața/suprafețele de teren pentru care este concepută
        mingea pentru a asigura performanțe și durabilitate optime.
    tennis_ball_pressure_type:
      name: Tip de presiune pentru mingea de tenis
      description: Identifică presiunea internă sau construcția mingii (presurizată,
        fără presiune, compresie redusă, spumă) care influențează ricoșeul și durabilitatea.
    tennis_racket_grip_size:
      name: Mărime a mânerului pentru racheta de tenis
      description: Specifică circumferința standardizată a mânerului rachetei (L0–L5
        sau echivalente în inchi) pentru a asigura potrivirea corectă a mâinii și
        confortul.
    tenor_flutophone_fingering_system:
      name: Sistem de digitație pentru flutofon tenor
      description: Specifică sistemul de digitație utilizat de flutofonul tenor (convenție
        de curriculum/notație).
    tenor_recorder_joint_type:
      name: Tip de îmbinare pentru fluier tenor
      description: Specifică tipul de îmbinare/conexiune dintre secțiunile fluierului
        tenor.
    tenor_saxophone_key_system:
      name: Sistem de clape pentru saxofon tenor
      description: Specifică sistemul de clape/standardul utilizat (adesea denumit
        stil francez/Boehm pentru saxofoane).
    tenor_saxophone_pad_material:
      name: Material al pernuțelor pentru saxofon tenor
      description: Specifică materialul principal utilizat pentru pernuțele instrumentului.
    tenor_trombone_slide_type:
      name: Tip de culisă pentru trombon tenor
      description: Tipul de culisă utilizat pe trombonul tenor (de ex., standard/dreaptă
        sau cu valvă/flux axial).
    tenor_trombone_valve_configuration:
      name: Configurația valvelor pentru trombon tenor
      description: Indică dacă trombonul tenor are un atașament cu valvă/rotor și
        ce configurație utilizează.
    tension_control_type:
      name: Tip de control al tensiunii
      description: Indică modul în care (sau dacă) suveica asigură o forță de frânare/tensiune
        reglabilă pe bobină/țeavă în timpul alimentării cu fir.
    tension_mechanism:
      name: Mecanism de tensionare
      description: Stilul de tensionare utilizat pentru a controla alimentarea cu
        fir de bătătură de la bobină/țeavă în timpul țeserii.
    tension_pitch_modulation_system:
      name: Sistem de modulare a tensiunii/înălțimii sunetului
      description: Modul în care toba vorbitoare își schimbă înălțimea sunetului/tensiunea
        în timpul interpretării (de exemplu, prin strângerea corzilor de tensionare).
    tension_system:
      name: Sistem de tensionare
      description: Sistemul de preluare/tensionare a roții de tors pentru care este
        destinat kitul de aripioare.
    tent_fabric_material:
      name: Material al țesăturii cortului
      description: Identifică materialul principal utilizat în supratenta sau corpul
        cortului, influențând greutatea, respirabilitatea și rezistența la intemperii.
    tent_season_rating:
      name: Sezonalitatea cortului
      description: Clasifică cortul după numărul de sezoane sau condițiile meteorologice
        pentru care este proiectat (de ex., 3 sezoane, 4 sezoane, expediție).
    tent_setup_type:
      name: Tip de asamblare a cortului
      description: Indică stilul de montare structurală a cortului, cum ar fi autoportant,
        semiautoportant, non-autoportant, gonflabil/cadru cu aer sau pop-up.
    tent_style:
      name: Stil de cort
      description: Descrie designul structural al cortului (de ex., iglu/dom, tunel,
        tip A).
    test_result_output_method:
      name: Metodă de afișare a rezultatelor testului
      description: Specifică modul în care testerul pentru baterii auto prezintă sau
        furnizează rezultatele testului utilizatorului (de ex., indicator led, ecran,
        imprimare, aplicație sau raport software).
    tether_strap_system:
      name: Sistem de chingi/curele de legătură
      description: Tipul sistemului de chingi sau curele utilizat pentru a conecta
        suportul pentru gât la cască/ham (dacă este cazul).
    text_color:
      name: Culoarea textului
      description: Culoarea textului imprimat sau brodat pe etichetă, distinctă de
        culoarea de fundal a etichetei.
    textile_craft_machine_operation_type:
      name: Tip de operare a mașinii de artizanat textil
      description: Modul în care este operată mașina (acționată manual/la pedală/motorizată/electrică)
    textile_finish_treatment:
      name: Finisaj/tratament textil
      description: Specifică tratamentele de suprafață notabile aplicate materialului
        textil.
    texture_inclusions:
      name: Incluziuni de textură
      description: Specifică componentele texturale adăugate, cum ar fi pulpa de aloe,
        semințele de busuioc, nata de coco, perle de boba sau bucăți de fructe.
    therapeutic_technology:
      name: Tehnologie terapeutică
      description: Specifică orice funcție terapeutică integrată, cum ar fi gel de
        răcire, benzi magnetice sau ceramică cu infraroșu.
    thermal_set_components:
      name: Componente ale setului termic
      description: Identifică dacă produsul include doar partea de jos, doar partea
        de sus, sau ambele piese ca set.
    thermal_weight:
      name: Greutate termică
      description: Indică categoria de căldură a materialului cagulei.
    thermostat_type:
      name: Tipul termostatului
      description: Designul funcțional sau stilul de control al unui termostat pentru
        sistemul de răcire al autovehiculelor.
    thimble_guide_size:
      name: Mărime a ghidajului tip degetar
      description: Desemnarea mărimii ghidajului tip degetar (mărimea de potrivire/acoperire),
        vândut de obicei ca mic/mediu/mare, mai degrabă decât în dimensiuni măsurate.
    thread_connection_size:
      name: Dimensiunea racordului filetat
      description: 'Definește specificația filetului care conectează tije, vârfuri
        și adaptoare (ex.: 6 mm, 5/16"-24).'
    thread_construction:
      name: Construcție a aței
      description: Modul în care ața este construită sau tratată (de ex., ață de brodat
        din mai multe fire comparativ cu ață lipită).
    thread_cord_type_beading_pattern:
      name: Tip de ață/șnur (model pentru mărgele)
      description: Tipul de ață sau șnur recomandat pentru a completa modelul.
    thread_cutter_form_factor:
      name: Factor de formă al tăietorului de ață
      description: Identifică stilul fizic al tăietorului de ață, cum ar fi foarfece
        mici, stil pandantiv sau stil inel.
    thread_cutter_mechanism:
      name: Mecanism al tăietorului de ață
      description: Descrie acțiunea sau mecanismul de tăiere utilizat de tăietorul
        de ață.
    thread_cutter_safety_features:
      name: Caracteristici de siguranță ale tăietorului de ață
      description: Indică caracteristicile de siguranță încorporate care reduc riscul
        de tăieri accidentale sau protejează lamele în timpul depozitării.
    thread_cutter_usage_application:
      name: Utilizare/aplicație a tăietorului de ață
      description: Indică utilizarea principală vizată în artizanat pentru tăietorul
        de ață.
    thread_finish_treatment:
      name: Finisaj/tratament al aței
      description: Finisajul sau tratamentul de suprafață aplicat aței, care influențează
        manipularea și performanța (de ex. cerată, lipită, mercerizată).
    thread_material:
      name: Material al aței
      description: Conținutul principal de fibre/material al aței/firului (nu al țesăturii).
    thread_material_fiber:
      name: Material al aței (fibră)
      description: Specifică fibra/materialul principal din care este confecționată
        ața în sine (nu țesătura).
    thread_package_format:
      name: Format de ambalare a aței
      description: Factorul de formă al ambalajului aței de cusut (de ex. rolă/mosor,
        con, bobină).
    thread_rack_compatible_spool_type:
      name: Tip de mosor compatibil cu suportul de ațe
      description: Tipul de set de ațe care trebuie să se afle pe rastel (role sau
        conuri etc.).
    thread_standard_size:
      name: Dimensiune standard a aței
      description: Identifică standardul de dimensiune/greutate a aței utilizat pe
        eticheta produsului (de ex., wt, Tex, denier).
    thread_type:
      name: Tip de ață
      description: Specifică construcția/tipul aței pentru cusut în cruce
    thread_weight_system:
      name: Sistem de măsurare a greutății aței
      description: Standardul utilizat pentru a exprima grosimea/greutatea aței.
    thread_yarn_guide_mounting_attachment_style:
      name: Stil de montare/atașare a ghidajului pentru ață
      description: Descrie modul în care ghidajul este purtat sau montat în timpul
        utilizării.
    thread_yarn_guide_tension_control:
      name: Control al tensiunii ghidajului pentru ață
      description: Indică dacă și cum ghidajul oferă tensiune/forță de frecare reglabilă
        asupra aței.
    thread_yarn_organizer_features:
      name: Caracteristici ale organizatorului de ațe
      description: Evidențiază caracteristicile de organizare funcțională și portabilitate
        specifice depozitării ațelor.
    threader_intended_use:
      name: Utilizare intenționată a dispozitivului de introdus ața în ac
      description: Indică contextul principal de artizanat pentru care este conceput
        dispozitivul manual de introdus ața în ac.
    threading_system:
      name: Sistem de înfilare
      description: Indică metoda și auxiliarele utilizate pentru a înfila mașina de
        surfilat (de ex., manual, cu coduri de culori, ghidat, înfilare cu aer).
    threading_type:
      name: Tip de filetare
      description: Indică dacă bijuteria utilizează filete interne, filete externe,
        este fără filet sau dacă nu se aplică.
    throttle_type_scooter_conversion:
      name: Tip de accelerație (conversie scuter)
      description: Specifică factorul de formă/interfața accelerației inclusă sau
        necesară pentru kitul de conversie.
    throw_rope_end_attachment:
      name: Prindere de capăt pentru parâmă de salvare
      description: Elementul sau bucla de terminare/atașare prevăzută la capătul/capetele
        de lucru ale parâmei de salvare.
    throw_rope_storage_packaging_type:
      name: Tip de depozitare/ambalare pentru parâma de salvare
      description: Modul în care parâma de salvare este depozitată sau desfășurată
        (de ex., sac de aruncare, tambur).
    throw_rope_visibility_features:
      name: Caracteristici de vizibilitate pentru parâma de salvare
      description: Caracteristici de vizibilitate și identificare menite să facă parâma
        mai ușor de văzut în apă/lumină slabă.
    thrower_operation_type:
      name: Tip de funcționare a aruncătorului
      description: Clasifică stilul mecanic/de operare al aruncătorului pentru filtrarea
        rapidă a mecanismelor manuale față de cele automate.
    thumb_design:
      name: Designul degetului mare
      description: Descrie modul în care degetul mare este încorporat în mănușă, influențând
        siguranța și priza.
    tiara_design:
      name: Designul tiarei
      description: Specifică stilul structural general sau silueta tiarei.
    tie_down_points_straps_included:
      name: Puncte/curele de ancorare incluse
      description: Specifică dacă suportul include puncte de ancorare integrate și/sau
        chingi incluse pentru fixarea motocicletei/scuterului.
    tiling_format:
      name: Format de aranjare tipare PDF
      description: Specifică stilul de aspect PDF pentru asamblarea paginilor imprimate.
    time_current_characteristic:
      name: Caracteristică timp-curent
      description: Indică comportamentul timp-curent al siguranței (de ex., cu acțiune
        rapidă sau temporizată), influențând potrivirea pentru circuitele cu curent
        de pornire ridicat.
    timer_count_mode:
      name: Mod de contorizare al temporizatorului
      description: Specifică modul de contorizare al temporizatorului, cum ar fi numărătoare
        inversă, numărătoare crescătoare (cronometru), ambele, sau interval/repetitiv.
    timer_display_type:
      name: Tip de afișaj al temporizatorului
      description: Indică modul în care temporizatorul de joc prezintă timpul rămas
        (de ex., ecran digital, cadran analogic, clepsidră cu nisip sau fără afișaj
        vizual).
    timer_operating_modes:
      name: Moduri de funcționare a temporizatorului
      description: Comportamente ale temporizatorului suportate pentru declanșarea
        efectelor.
    timing_belt_construction_material_rubber_compound:
      name: Material de construcție al curelei de distribuție (compus de cauciuc)
      description: Compusul principal de cauciuc utilizat pentru curea (de ex., HNBR),
        care influențează rezistența la căldură/ulei și longevitatea.
    timing_belt_profile:
      name: Profil al curelei de distribuție
      description: Standardul profilului/formei dintelui curelei de distribuție (de
        ex. trapezoidal sau curbiliniu).
    timing_belt_reinforcement_cord_material:
      name: Material al cablului de ranforsare pentru cureaua de distribuție
      description: Specifică materialul cablului de ranforsare intern din interiorul
        curelei de distribuție (de ex., fibră de sticlă, aramidă), influențând rezistența
        și întinderea.
    timing_component_material:
      name: Material al componentei de distribuție
      description: Materialul principal al componentei de distribuție (compusul curelei,
        metalul lanțului/roții dințate, materialul capacului).
    tin_whistle_body_material:
      name: Material al corpului fluierului irlandez
      description: Surprinde materialele comune ale corpului fluierului irlandez într-un
        mod mai specific decât lista largă de materiale pentru instrumente, atunci
        când este necesar.
    tin_whistle_bore_type:
      name: Tip de alezaj al tubului pentru fluierul irlandez
      description: Specifică designul alezajului/tubului fluierului irlandez.
    tin_whistle_included_accessories:
      name: Accesorii incluse pentru fluier irlandez
      description: Accesorii incluse cu fluierul irlandez (de ex., husă, tijă de curățare).
    tip_finish_coating:
      name: Finisaj/înveliș al vârfului
      description: 'Specifică tratamentul suprafeței de pe capătul de lucru (ex.:
        cromat, vopsit cu pulbere) care influențează rezistența la coroziune și deteriorarea
        jantei.'
    tip_shape:
      name: Formă a vârfului
      description: Descrie forma sau gradul de ascuțire al vârfului penei de chitară,
        care influențează articulația și senzația la interpretare.
    tippet_rating:
      name: Rezistența firului de forfac
      description: Rezistența maximă recomandată a firului de forfac exprimată în
        denumiri „X” specifice pescuitului la muscă (de ex., 4X).
    tire_changer_operation_type:
      name: Tip de operare a mașinii de dejantat
      description: Specifică modul în care mașina de dejantat este acționată/operată
        (de ex., în mod manual, pneumatic, hidraulic). Distinct de atributul general
        „Sursă de alimentare”; a se utiliza la descrierea metodei de acționare operațională
        a mașinii.
    tire_changer_type:
      name: Tip de mașină de dejantat
      description: Stilul general de operare, designul sau nivelul de automatizare
        al unei mașini de dejantat.
    tire_compound_type:
      name: Tip de compus al anvelopei
      description: Specifică clasificarea compusului de cauciuc utilizat în anvelope
        (de ex., moale, ploaie, slick), care influențează tracțiunea și durabilitatea
        în diferite condiții.
    tire_load_range:
      name: Indicele de sarcină al anvelopei
      description: Indică ratingul numărului de pliuri/gama de sarcină a anvelopei
        (în mod obișnuit pentru anvelopele LT - Light Truck) reflectând capacitatea
        de transport a sarcinii.
    tire_position:
      name: Poziția anvelopei
      description: Poziție de montare recomandată pe vehicul.
    tire_repair_kit_components:
      name: Componente ale kitului de reparație pentru anvelope
      description: Specifică articolele incluse în kit, permițând clienților să compare
        cât de complet este pachetul.
    tire_sidewall_type:
      name: Tip de flanc al anvelopei
      description: Specifică stilizarea flancului sau caracteristicile de construcție.
    tire_speed_rating:
      name: Indice de viteză al anvelopei
      description: Litera indicelui de viteză al anvelopei (de ex., H, V, W) indicând
        capacitatea maximă de viteză susținută.
    tire_spoon_type:
      name: Tip de levier pentru anvelope
      description: Clasifică levierul pentru anvelope după forma capătului și utilizarea
        vizată.
    tire_system_compatibility:
      name: Compatibilitate cu sistemul de anvelope
      description: Indică dacă soluția de etanșare este destinată sistemelor fără
        cameră, anvelopelor cu cameră sau ambelor.
    tire_temperature_rating_utqg:
      name: Indice de temperatură a anvelopei (UTQG)
      description: Gradul de rezistență la temperatură UTQG pentru anvelope auto (de
        ex., A, B, C).
    tire_traction_rating_utqg:
      name: Indice de tracțiune a anvelopei (UTQG)
      description: Gradul de tracțiune UTQG pentru performanța la frânarea pe carosabil
        umed.
    tire_tread_style:
      name: Stil al profilului de rulare
      description: Descrie modelul general al benzii de rulare al anvelopei tubulare,
        reflectând terenul vizat și caracteristicile de tracțiune.
    tire_tube_type:
      name: Tip de anvelopă
      description: Dacă anvelopa este concepută pentru utilizare fără cameră sau cu
        cameră.
    title_status:
      name: Statutul titlului de proprietate auto
      description: Statutul legal/de înmatriculare al vehiculului.
    tobacco_application:
      name: Mod de consum al tutunului
      description: Indică metoda de consum prevăzută sau aparatul de fumat pentru
        care este conceput tutunul vrac.
    tobacco_cut_type:
      name: Tip de tăietură a tutunului
      description: Specifică tăietura fizică sau stilul de preparare al tutunului
        vrac, influențând rata de ardere, metoda de umplere și experiența generală
        de fumat.
    tobacco_strength:
      name: Tăria tutunului
      description: Indică cantitatea percepută sau aportul de nicotină al tutunului
        atunci când este consumat, ajutând cumpărătorii să selecteze o intensitate
        care se potrivește preferințelor lor.
    toe_construction:
      name: Construcție a vârfului încălțămintei
      description: Specifică configurația zonei degetelor la încălțămintea din neopren,
        care influențează echilibrul, senzația pe placă și căldura.
    toe_coverage:
      name: Acoperire a degetelor de la picioare
      description: Indică tipul de acoperire a degetelor oferit de șosetă.
    toe_pick_style:
      name: Stil de dinți pentru patina de patinaj artistic
      description: Descrie designul dinților de la vârful lamei patinelor de patinaj
        artistic.
    toe_protection_type:
      name: Tip de bombeu
      description: Indică dacă și cum este ranforsată zona vârfului în scopuri de
        siguranță (de ex., vârf metalic, vârf moale).
    toe_reinforcement_type:
      name: Tip de ranforsare la vârf
      description: Detaliază construcția zonei vârfului, influențând durabilitatea
        și compatibilitatea cu încălțămintea.
    toe_stop_stem_thread_size:
      name: Dimensiunea filetului pentru opritorul patinelor
      description: Specifică dimensiunea filetului tijelor opritorului pentru a asigura
        compatibilitatea cu șasiul patinelor cu rotile.
    tofu_preparation_style:
      name: Stil de preparare pentru tofu
      description: Clasifică stilul tradițional sau subtipul de tofu axându-se pe
        alte criterii decât fermitatea (de ex., mătăsos, bloc, pufos, piele de tofu,
        noduri, fermentat).
    tom_mount_adjustment_features:
      name: Caracteristici de reglare ale suportului pentru tom
      description: Specifică ce reglaje oferă suportul pentru tom pentru poziționarea
        tobei (de ex., înclinare, rotație, înălțime).
    tom_mount_components_included:
      name: Componente incluse pentru montarea tom-ului
      description: Specifică ce piese sunt incluse cu suportul pentru tom (suport
        receptor, braț, articulație cu bilă, cleme, inele de memorie etc.).
    tom_mount_mounting_position:
      name: Poziție de montare a suportului pentru tom
      description: Specifică locul unde suportul pentru tom este destinat a fi atașat
        (de ex., toba mare, stativ de cinel, rastel de tobe).
    tonneau_cover_mounting_style:
      name: Stil de montare a prelatei pentru benă
      description: Indică modul în care se instalează/atașează prelata de șinele benei
        camionului.
    tool_case_form_factor:
      name: Factor de formă al trusei de scule
      description: Identifică stilul fizic al trusei/carcasei pentru scule, având
        impact asupra portabilității și depozitării (de ex., tip servietă, carcasă
        rigidă).
    tool_functions_included:
      name: Funcții ale sculelor incluse
      description: Listează funcțiile specifice de reparație sau întreținere pe care
        le poate îndeplini o sculă multifuncțională sau un set de scule.
    top_bunk_access_method:
      name: Metodă de acces la patul superior
      description: Indică modul în care ocupanții ajung la patul superior al patului
        supraetajat, ajutând la evaluarea siguranței și a spațiului.
    top_fit:
      name: Croială a topului
      description: Specifică silueta generală sau potrivirea bluzei/topului pe corp
        (de ex., cambrat sau supradimensionat).
    top_hat_style:
      name: Stil de pălărie joben
      description: Identifică variația de stil specifică a unui joben.
    top_soundboard_material:
      name: Material al feței (plăcii de rezonanță)
      description: Specifică materialul feței/plăcii de rezonanță a chitarei (placa
        principală care produce tonul).
    topping_form:
      name: Formă de topping
      description: Definește forma fizică sau consistența toppingului pentru desert
        pentru a ajuta cumpărătorii să restrângă rapid opțiunile la aplicația dorită.
    topping_type:
      name: Tipul de topping
      description: Indică toppingul exterior principal sau glazura aplicată pe gogoașă.
    tow_hook_type:
      name: Tipul cârligului de remorcare
      description: Indică dacă placa de genunchi include un cârlig de tractare integrat
        și specifică stilul mecanismului său.
    tow_point_configuration:
      name: Configurație a punctelor de remorcare
      description: Specifică configurația punctului de tractare (simplu, dublu, multiplu)
        oferită de tubul tractabil pentru diferite poziții de pilotare.
    tow_strap_protective_features:
      name: Caracteristici de protecție ale chingii de tractare
      description: Caracteristici notabile de construcție pentru siguranță și durabilitate
        încorporate în chinga de tractare.
    tow_strap_type:
      name: Tip de chingă de remorcare
      description: Indică construcția funcțională a chingii de tractare, cum ar fi
        chinga de tractare statică comparativ cu chinga de recuperare cinetică.
    towable_tube_style:
      name: Stil de tub tractabil
      description: Identifică designul general sau factorul de formă al tubului tractabil,
        care dictează poziția pasagerului și experiența plimbării.
    towed_water_sport_discipline:
      name: Disciplină de sporturi nautice tractate
      description: Specifică activitatea nautică tractată principală pentru care este
        concepută mănușa.
    towel_features:
      name: Caracteristici ale prosopului
      description: Listează caracteristici speciale sau elemente suplimentare care
        însoțesc un prosop.
    towel_style:
      name: Stilul prosopului
      description: Clasifică designul sau formatul funcțional al prosopului de golf.
    toy_airplane_control_type:
      name: Tip de control pentru avionul de jucărie
      description: Specifică modul în care avionul de jucărie este controlat de utilizator.
    toy_airplane_features:
      name: Caracteristicile avionului de jucărie
      description: Evidențiază caracteristicile de joacă notabile prezente pe avionul
        de jucărie.
    toy_airplane_flight_capability:
      name: Capacitate de zbor a avionului de jucărie
      description: Indică dacă avionul de jucărie este conceput să zboare/planeze
        cu adevărat sau este în principal pentru joacă la sol/expunere.
    toy_audio_features:
      name: Caracteristici audio ale jucăriei
      description: Listează capacitățile audio și efectele sonore încorporate în jucărie.
    toy_boat_play_features:
      name: Caracteristici de joacă ale bărcii de jucărie
      description: Evidențiază caracteristicile interactive notabile ale bărcilor
        de jucărie pentru descoperire și filtrare.
    toy_boat_recommended_play_environment:
      name: Mediu de joacă recomandat pentru barca de jucărie
      description: Specifică mediul de joacă prevăzut pentru barca de jucărie, pentru
        a susține așteptările cumpărătorilor și siguranța (de ex., cadă de baie comparativ
        cu apă deschisă).
    toy_bowling_equipment_included:
      name: Echipament de bowling de jucărie inclus
      description: Specifică ce componente de bowling sunt incluse în setul de bowling
        de jucărie (de ex., popice, minge, pistă/covoraș, geantă de transport).
    toy_car_features:
      name: Caracteristici ale mașinii de jucărie
      description: Evidențiază caracteristicile de joacă integrate în mașina de jucărie
        (separate de sistemul de propulsie), cum ar fi lumini, sunete sau părți care
        se deschid.
    toy_drawing_tablet_accessories_included:
      name: Accesorii incluse pentru tableta de desenat de jucărie
      description: Accesorii incluse suplimentare, pe lângă tableta în sine (de ex.
        stylus suplimentar, ștampile magnetice).
    toy_drawing_tablet_erase_method:
      name: Metodă de ștergere a tabletei de desen de jucărie
      description: Modul în care suprafața de desen este curățată/ștearsă.
    toy_drawing_tablet_screen_type:
      name: Tip de ecran al tabletei de desen de jucărie
      description: Tipul de suprafață de desen/afișaj utilizată (de ex., tabletă de
        scris LCD sau magnetică).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Instrument de scris/desenat pentru tableta de desen de jucărie
      description: Instrumentul principal utilizat pentru a desena pe tabletă (tipul
        de stylus).
    toy_figure_sound_feature:
      name: Funcție sonoră a figurinei de jucărie
      description: Indică dacă figurina animal produce sunete și de ce fel (de ex.,
        răget, sunet realist de animal).
    toy_game_features:
      name: Caracteristici ale jucăriei/jocului
      description: Evidențiază caracteristici notabile de joacă sau de construcție
        relevante pentru jucăriile de plajă și nisip.
    toy_gift_basket_items_included:
      name: Articole incluse în coșul cadou cu jucării
      description: 'Listează principalele tipuri de jucării incluse în coșul cadou
        (de ex.: jucărie de pluș, set de construcție, puzzle).'
    toy_glider_launch_method:
      name: Metodă de lansare a planorului de jucărie
      description: Specifică modul în care este lansat planorul de jucărie, ceea ce
        influențează stilul de joacă și așteptările cumpărătorilor.
    toy_helicopter_control_type:
      name: Tip de control pentru elicopterul de jucărie
      description: Modul în care elicopterul de jucărie este controlat/operat (independent
        de propulsie), cum ar fi telecomandă de mână, control prin aplicație sau fără
        control (zbor liber).
    toy_helicopter_features:
      name: Caracteristici ale elicopterului de jucărie
      description: Caracteristici funcționale cheie ale unui elicopter de jucărie
        (în special modele RC) care au impact asupra utilității și valorii de joacă.
    toy_jacks_set_items_included:
      name: Articole incluse în setul de cricuri de jucărie
      description: Specifică ce articole de bază sunt incluse în setul de cricuri
        de jucărie (de ex., cricuri, minge, sac).
    toy_keyboard_learning_mode:
      name: Mod de învățare al orgii de jucărie
      description: Indică abordarea educațională/de învățare susținută de orga de
        jucărie (de ex., clape luminoase, cântece de urmărit, lecții ghidate, învățare
        asistată de aplicație).
    toy_keyboard_sound_theme:
      name: Tema sonoră a claviaturii de jucărie
      description: Tipurile de voci/teme sonore de instrumente integrate oferite (dincolo
        de pian simplu).
    toy_kitchen_appliances_included:
      name: Aparate de bucătărie de jucărie incluse
      description: Specifică aparatele electrocasnice reprezentate în setul de joacă
        atunci când produsul este un aparat electrocasnic sau un set axat pe electrocasnice.
    toy_kitchen_assembly_requirement:
      name: Cerința de asamblare a bucătăriei de jucărie
      description: Indică dacă este necesară asamblarea și complexitatea aproximativă
        a asamblării.
    toy_kitchen_interactive_features:
      name: Caracteristici interactive ale bucătăriei de jucărie
      description: Evidențiază elementele interactive întâlnite frecvent în bucătăriile
        de jucărie și în accesoriile aferente.
    toy_motorcycle_feature_set:
      name: Set de caracteristici ale motocicletei de jucărie
      description: Caracteristicile cheie de joacă ale motocicletei de jucărie (selectați-le
        pe toate cele care se aplică).
    toy_motorcycle_scale:
      name: Scara motocicletei de jucărie
      description: Raportul scării pentru motocicletele de jucărie/de colecție (de
        ex., 1:12).
    toy_parachute_launch_method:
      name: Metodă de lansare a parașutei de jucărie
      description: Modul în care jucăria este menită să fie lansată/desfășurată pentru
        zbor.
    toy_piano_and_keyboard_accessories_included:
      name: Accesorii incluse pentru pianul și claviatura de jucărie
      description: Accesoriile incluse cu pianul de jucărie sau claviatura de jucărie.
    toy_playset_assembly_required:
      name: Necesită asamblarea setului de jucărie
      description: Indică dacă este necesară asamblarea de către un adult înainte
        de joacă (dincolo de o simplă îmbinare prin apăsare).
    toy_playset_items_included:
      name: Articole incluse în setul de joacă
      description: Enumeră componentele majore incluse în setul de joacă (ce conține
        cutia).
    toy_safety_certification:
      name: Certificare de siguranță pentru jucării
      description: Standardele/marcajele de siguranță și conformitate aplicabile jucăriilor
        pe piața cumpărătorului (de ex., EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Caracteristici ale navei spațiale de jucărie
      description: Indică caracteristicile comune de joacă/interactive încorporate
        în nava spațială de jucărie.
    toy_spaceship_size_class:
      name: Clasa de mărime a navei spațiale de jucărie
      description: Indică o clasă de mărime generală pentru nava spațială de jucărie
        pentru a sprijini filtrarea rapidă, separată de dimensiunile exacte (lungime/lățime/înălțime)
        și nu un raport numeric la scara modelului (de ex., 1:72).
    toy_tableware_pieces_included:
      name: Piese incluse în setul de veselă de jucărie
      description: Specifică ce articole de veselă de jucărie sunt incluse (farfurii,
        căni, tacâmuri, piese de servire).
    toy_tool_electronic_features:
      name: Caracteristici electronice ale uneltei de jucărie
      description: Descrie funcțiile interactive/electronice ale uneltei de jucărie
        (lumini, sunete, acțiune de rotație etc.).
    toy_tool_set_components_included:
      name: Componente incluse în trusa de scule de jucărie
      description: Enumeră articolele specifice de unelte pentru jocuri de rol incluse
        în pachet (în special pentru seturile de unelte).
    toy_train_scale:
      name: Scară a trenulețului de jucărie
      description: Specifică standardul scării trenulețului de jucărie/machetei (sau
        dimensiunea sistemului de șine) pentru a asigura compatibilitatea cu trenurile
        și șinele existente.
    toy_train_track_layout_type:
      name: Tipul aspectului șinelor trenulețului de jucărie
      description: Descrie forma/aspectul șinelor inclus pentru un set de trenulețe
        sau un pachet de șine de expansiune.
    toy_weapon_gadget_features:
      name: Caracteristici ale armei și gadgetului de jucărie
      description: Evidențiază caracteristicile comune funcționale și interactive
        specifice armelor de jucărie și gadgeturilor de spionaj.
    tpms_sensor_frequency_band:
      name: Banda de frecvență a senzorului TPMS
      description: Banda de frecvență radio acceptată de accesoriile asociate TPMS
        (dacă este cazul).
    track_and_field_discipline:
      name: Disciplină de atletism
      description: Identifică proba de atletism sau disciplina specifică pentru care
        este destinat produsul (de ex., aruncarea greutății, săritura cu prăjina,
        sprinturi).
    track_event_specialization:
      name: Specializare pentru proba de atletism pe pistă
      description: Indică tipul de probă pentru care este optimizat pantoful cu crampoane.
    track_field_event_suitability:
      name: Adecvare pentru proba de atletism
      description: Identifică proba/probele specifice de atletism pentru care este
        destinat echipamentul auxiliar de antrenament.
    track_set_special_features:
      name: Caracteristici speciale ale setului de piste
      description: Evidențiază caracteristicile notabile de joacă incluse în setul
        de piste, dincolo de pista de bază și mașini.
    track_surface_compatibility:
      name: Compatibilitate cu suprafața pistei
      description: Indică suprafața (suprafețele) de alergare pentru care este conceput
        pantoful cu crampoane sau pantoful sport.
    tracking_aid_type:
      name: Tipul dispozitivului de menținere a direcției
      description: Indică dacă caiacul include dispozitive care îmbunătățesc menținerea
        direcției în linie dreaptă.
    traction_pattern_type:
      name: Tipul modelului de tracțiune
      description: Descrie canelurile principale de pe suprafață sau modelul benzii
        de rulare care oferă aderență pe suport.
    trading_card_league:
      name: Liga cartonașelor de schimb
      description: Identifică liga sportivă asociată setului de cartonașe sau subiectului
        (dacă este cazul).
    trailer_construction:
      name: Construcția remorcii
      description: Identifică construcția principală a cadrului/caroseriei remorcii
        (de ex., din aluminiu, oțel sau construcție mixtă).
    trailer_coupler_size:
      name: Dimensiunea cuplajului remorcii
      description: Specifică dimensiunea bilei de cuplare a remorcii, necesară pentru
        tractare.
    trailer_hitch_mounting_location_method:
      name: Locul/metoda de montare a cârligului de remorcare
      description: Specifică locul și modul în care cârligul de remorcare este montat
        pe vehicul (de ex., receptor spate, receptor față, montat pe cadru, montat
        pe bară, montat pe benă).
    trailer_light_function:
      name: Funcția lămpii remorcii
      description: Funcția/poziția principală a lămpii remorcii.
    trailer_suspension_type:
      name: Tip de suspensie pentru remorcă
      description: Specifică tipul de sistem de suspensie utilizat la remorca de bicicletă,
        cum ar fi arcul elicoidal sau arcul cu foi, pentru a îmbunătăți confortul
        deplasării și protecția încărcăturii.
    trailer_wiring_circuit:
      name: Circuitul de cablare al remorcii
      description: Enumeră circuitele/semnalele de iluminat, frânare și auxiliare
        transmise de cablajul remorcii (adică ce linii de alimentare/masă și semnal
        sunt prezente).
    trailer_wiring_connector_type:
      name: Tipul conectorului pentru cablajul remorcii
      description: Specifică standardul prizei pe partea remorcii/partea vehiculului
        utilizat pentru cablajele și adaptoarele remorcii.
    train_whistle_intended_use:
      name: Utilizarea prevăzută a fluierului de tren
      description: Contextul principal de utilizare prevăzut pentru fluier.
    train_whistle_sound_character:
      name: Caracterul sonor al fluierului de tren
      description: Descrie caracterul tonal perceput al sunetului fluierului (timbru).
    trainer_mounting_type:
      name: Tip de montare a bicicletei
      description: Descrie modul în care bicicleta se conectează cu dispozitivul de
        antrenament (de ex., cu prindere pe roată sau transmisie directă).
    training_dummy_shape:
      name: Forma manechinului de antrenament
      description: Specifică designul general sau silueta manechinului, care afectează
        prinderea câinelui și realismul antrenamentului.
    training_focus:
      name: Obiectivul antrenamentului
      description: Descrie zona de aptitudini principală vizată de echipamentul auxiliar
        (de ex., reflexe, jocul de picioare, coordonarea ochi-mână).
    training_focus_area:
      name: Zona obiectivului de antrenament
      description: Specifică aptitudinea principală de lacrosse pe care echipamentul
        auxiliar este conceput să o dezvolte.
    training_objective:
      name: Obiectiv de instruire
      description: Specifică aptitudinea sau tehnica principală pe care produsul este
        conceput să o îmbunătățească.
    training_surface_suitability:
      name: Adecvarea suprafeței de antrenament
      description: Specifică suprafețele pe care poate fi utilizat dispozitivul de
        antrenament.
    training_surface_usage:
      name: Utilizarea suprafeței de antrenament
      description: Specifică activitățile principale pe care le acceptă suprafața
        de antrenament, făcând distincția între panourile de gheață sintetică pentru
        patinaj și covorașele pentru antrenament pe uscat sau multisport.
    training_usage_type:
      name: Tipul de utilizare pentru antrenament
      description: Specifică perioada sau contextul principal de utilizare prevăzut
        pentru chiloții de antrenament la oliță, cum ar fi antrenamentul de zi sau
        de noapte.
    trampoline_enclosure_type:
      name: Tipul incintei trambulinei
      description: Specifică configurația incintei utilizate pe trambulină, inclusiv
        cum/unde este montată plasa.
    trampoline_safety_certifications:
      name: Certificări de siguranță pentru trambulină
      description: Indică ce standarde/certificări de siguranță relevante pentru trambuline
        se declară că respectă produsul.
    transfer_application_method:
      name: Metodă de aplicare a transferului
      description: Specifică modul în care transferul este aplicat pe țesătură (de
        ex., aplicare cu fierul de călcat sau cu presă termică).
    transfer_method:
      name: Metoda de transfer
      description: Specifică modul în care designul este menit să fie transferat pe
        țesătură.
    transfer_peel_temperature:
      name: Temperatura de dezlipire a transferului
      description: Specifică starea de temperatură recomandată (fierbinte, caldă sau
        rece) la care ar trebui îndepărtată folia purtătoare după presare.
    transmission_cooler_construction:
      name: Construcția răcitorului de transmisie
      description: Specifică designul de construcție al miezului unui răcitor de transmisie.
    transmission_fluid_specification:
      name: Specificația fluidului de transmisie
      description: Standardul OEM/de specificații pe care îl îndeplinește lichidul
        de transmisie (de ex., familiile Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Materialul bucșei suportului de transmisie
      description: Specifică elastomerul sau materialul izolator utilizat în bucșa/izolatorul
        suportului (elementul de amortizare a vibrațiilor).
    transmission_mount_type:
      name: Tipul suportului de transmisie
      description: Specifică construcția/designul unui suport de transmisie (de ex.,
        hidraulic sau rigid) pentru a ajuta la determinarea potrivirii, a caracteristicilor
        NVH (zgomot, vibrații, duritate) și a utilizării prevăzute.
    transparency_level:
      name: Nivelul de transparență
      description: Descrie gradul de transparență al pereților cutiei, ajutând cumpărătorii
        să aleagă între vizibilitate clară și depozitare ascunsă.
    transport_case_type:
      name: Tipul cutiei de transport
      description: Clasifică stilul structural/rigiditatea soluției de transport,
        reflectând nivelul de protecție și metoda de ambalare.
    transposition_modes:
      name: Moduri de transpunere
      description: Specifică modurile de transpunere/tonalitate de concert pe care
        le acceptă tunerul (de ex., tonalitate de concert și chei de transpunere cum
        ar fi Si bemol sau Mi bemol).
    trap_design:
      name: Design al capcanei
      description: Identifică stilul structural sau mecanismul capcanei, care determină
        metoda de desfășurare și speciile sau mediile pentru care este cea mai potrivită.
    trap_spring_configuration:
      name: Configurația arcului capcanei
      description: Indică numărul sau dispunerea arcurilor care acționează capcana,
        ceea ce îi afectează forța și legalitatea.
    travel_bassinet_accessories_included:
      name: Accesorii incluse pentru landoul de călătorie
      description: Enumeră articolele suplimentare furnizate împreună cu landoul de
        călătorie.
    travel_spinning_wheel_assembly_required:
      name: Necesită asamblarea roții de tors de călătorie
      description: Dacă roata necesită asamblare/configurare, pe lângă depliere (de
        ex., atașarea furcii, tensiunii, pedalelor) înainte de utilizare.
    travel_spinning_wheel_portability_features:
      name: Caracteristici de portabilitate ale roții de tors de călătorie
      description: Elemente de design legate de portabilitate pentru roțile de tors
        de călătorie, cum ar fi construcția pliabilă și soluțiile de transport incluse.
    travel_trailer_appliances_fuel_type:
      name: Tipul de combustibil pentru aparatele rulotei
      description: Combustibilul principal utilizat pentru aparatele de la bord/încălzire/gătit
        (nu vehiculul tractor).
    travel_trailer_holding_tank_type:
      name: Tipul rezervorului de colectare al rulotei
      description: Indică ce rezervoare de colectare sunt prezente în rulotă (selectați-le
        pe toate care se aplică).
    travel_trailer_power_hookup_shore_power:
      name: Conexiune electrică pentru rulotă (alimentare externă la rețea)
      description: Standardul/standardele de conexiune electrică acceptate pentru
        conectarea la rețeaua de alimentare externă.
    tread_pattern_type:
      name: Tip de profil al benzii de rulare
      description: Clasifică designul general al benzii de rulare a anvelopei, cum
        ar fi neted, semineted sau cu crampoane, care afectează tracțiunea, rezistența
        la rulare și suprafața prevăzută.
    treadmill_key_type:
      name: Tipul cheii benzii de alergat
      description: Descrie stilul fizic sau mecanismul de operare/conectare al cheii
        de siguranță (de ex., rotundă magnetică, inserție de plastic, cu clemă).
    treadmill_part_type:
      name: Tip de piesă pentru banda de alergat
      description: Identifică componenta specifică a benzii de alergat pe care produsul
        este menit să o înlocuiască, astfel încât cumpărătorii să poată confirma rapid
        compatibilitatea (de ex., curea sau motor).
    treadmill_position:
      name: Poziția pe bandă de alergare
      description: Indică poziția de instalare a piesei pe banda de alergare (față,
        spate, sus, jos, centru).
    triangle_striker_material:
      name: Materialul percutorului pentru trianglu
      description: Materialul percutorului/bățului inclus.
    trigger_input_connector:
      name: Conector de intrare pentru declanșator
      description: Specifică standardul conectorului fizic folosit pentru intrările
        declanșatoarelor.
    trigger_input_connector_type:
      name: Tip de conector de intrare pentru declanșator
      description: Specifică tipul conectorului fizic folosit pentru intrările declanșatoarelor.
    trigger_input_zone_support:
      name: Suport pentru zona de intrare a declanșatorului
      description: Indică dacă intrările declanșatorului acceptă declanșatoare cu
        o singură zonă și/sau două zone (de ex., suprafață/ramă) și implementări similare
        multizonale.
    trim_application_method:
      name: Metodă de aplicare a pasmanteriei
      description: Indică modul în care pasmanteria este menită să fie atașată unui
        proiect (de ex., prin coasere, aplicare cu fierul de călcat, adeziv).
    trim_detail:
      name: Detaliu de pasmanterie
      description: Identifică marginile decorative proeminente sau finisajele de pe
        articolul de îmbrăcăminte (de ex., pasmanterie cu ciucuri, franjuri, pasmanterie
        din dantelă).
    trim_elasticity:
      name: Elasticitatea pasmanteriei
      description: Indică dacă pasmanteria în zig-zag este elastică pentru a fi utilizată
        la tricotaje/echipamente sportive.
    trim_finish:
      name: Finisajul pasmanteriei
      description: Tratamentul de finisare a suprafeței aplicat pasmanteriei (de ex.,
        metalizat, sclipici, reflectorizant).
    trim_tilt_type:
      name: Tipul de asietă și înclinare
      description: Dacă și modul în care motorul acceptă reglajul de asietă/înclinare.
    trolleybus_power_supply_type:
      name: Tipul sursei de alimentare a troleibuzului
      description: Specifică modul în care troleibuzul primește energie de tracțiune
        din rețeaua electrică.
    truck_bed_body_type:
      name: Tipul benei/caroseriei camionetei
      description: Configurația benei de marfă sau a caroseriei din spatele cabinei.
    truck_bed_length_class:
      name: Clasa de lungime a benei camionetei
      description: Indică clasa de lungime a benei camionetei pentru care este concepută
        plasa de marfă (menționată frecvent ca benă scurtă/standard/lungă).
    truck_mounting_hole_pattern:
      name: Modelul găurilor de montare a axului
      description: Specifică dispunerea găurilor utilizate pentru montarea axurilor
        pe placă (de ex., Old school, New school, Universal).
    truck_mounting_style:
      name: Stil de montare a axului
      description: Modul în care axurile sunt fixate pe placă (montare deasupra, prin
        decupaj, etc.), influențând înălțimea de rulare și stabilitatea.
    truck_profile:
      name: Profilul camionului
      description: Indică clasificarea înălțimii de rulare a axului de skateboard
        în raport cu placa, afectând spațiul liber pentru roți și senzația pe placă.
    trumpet_bell_material:
      name: Materialul pavilionului trompetei
      description: Materialul utilizat pentru secțiunea pavilionului (uneori diferă
        de restul instrumentului).
    trumpet_leadpipe_material:
      name: Material al tubului principal pentru trompetă
      description: Materialul sau tratamentul utilizat pentru tubul principal (țeava
        principală de la muștiuc la pistoane).
    trundle_mechanism:
      name: Mecanismul patului extensibil inferior
      description: Descrie modul în care componenta secundară a patului este desfășurată
        din cadrul principal.
    trunk_part_type:
      name: Tipul piesei pentru portbagaj
      description: Specifică ce componentă a caroseriei legată de portbagaj este vândută
        (de ex., capotă portbagaj, balama, încuietoare).
    tuba_leadpipe_material:
      name: Materialul tubului principal al tubei
      description: Identifică materialul utilizat pentru secțiunea tubului principal
        (tubul muștiucului) al tubei.
    tube_base_type:
      name: Tip de bază a tubului
      description: Specifică familia bazei/soclului lămpii electronice, utilizată
        pentru potrivirea fizică/electrică (de ex., Octal, Noval/9 pini).
    tube_matching_grade:
      name: Gradul de potrivire al lămpilor electronice
      description: Indică dacă lămpile electronice sunt testate/asociate ca set și
        tipul de potrivire oferit.
    tube_weight_category:
      name: Categorie de greutate a tubului
      description: Clasifică camera de aer în funcție de construcție/greutate (de
        ex., ultralejeră, standard, regim greu) pentru o comparație rapidă a durabilității
        față de performanță.
    tubeless_compatible:
      name: Compatibil fără cameră
      description: Indică dacă roata este concepută pentru a fi utilizată fără o cameră
        de aer atunci când este asociată cu anvelope fără cameră.
    tubing_shape:
      name: Forma tubulaturii
      description: Specifică forma secțiunii transversale a tubulaturii de susținere
        a stativului.
    tubular_construction_type:
      name: Tip de construcție tubulară
      description: Specifică stilul de construcție al anvelopelor tubulare pentru
        bicicletă, făcând distincția între anvelopele tubulare lipite tradiționale
        și variantele mai noi.
    tulip_type_flower_form:
      name: Tipul de lalea (forma florii)
      description: Specifică tipul horticol/forma florii lalelelor din buchet (de
        ex., simplă, bătută, papagal).
    tuner_input_method:
      name: Metoda de intrare a acordorului
      description: Specifică modul în care acordorul detectează înălțimea sunetului
        (microfon, senzor de vibrații/clemă, intrare pentru cablul instrumentului,
        doză de contact).
    tuning_mechanism:
      name: Mecanismul de acordare
      description: Modul în care membranele de bongo sunt tensionate/acordate.
    tuning_system:
      name: Sistem de acordare
      description: Cum se acordează toba tip cupă (darbuca) sau dacă este acordabilă.
    turn_signal_lens_color:
      name: Culoarea dispersorului semnalizatorului
      description: Culoarea dispersorului/capacului vizibil pe carcasa semnalizatorului
        (nu culoarea luminii emise).
    turn_signal_lighting_style:
      name: Stilul de iluminare al semnalizatorului
      description: Stilul/animația de semnalizare vizuală oferită de semnalizator.
    turnip_and_rutabaga_variety:
      name: Varietate de nap și nap suedez
      description: Identifică soiul sau varietatea specifică a napului sau a napului
        suedez.
    tweeter_crossover_type:
      name: Tipul de filtru crossover pentru tweeter
      description: Indică tipul de filtru high-pass și/sau componenta de protecție
        inclusă cu tweeterul, dacă există.
    tweeter_material:
      name: Materialul tweeterului
      description: Materialul principal al diafragmei/calotei tweeterului.
    tweeter_mount_type:
      name: Tip de montare a tweeterului
      description: Specifică modul în care tweeterul este menit să fie instalat în
        vehicul (metoda de montare/componentele de fixare).
    twill_direction:
      name: Direcția legăturii diagonale
      description: Indică direcția liniei diagonale a unei țesături din denim.
    twist_direction:
      name: Direcție de răsucire
      description: Direcția de răsucire a firelor utilizată în ghem/ață (răsucire
        S sau răsucire Z).
    u_joint_series_size:
      name: Seria/dimensiunea articulației cardanice
      description: Specifică seria sau standardul de dimensiune al articulației cardanice
        utilizate (de ex., seria 1310).
    uilleann_pipes_bag_material:
      name: Materialul burdufului pentru cimpoiul Uilleann
      description: Materialul componentei burdufului de aer (dacă este inclus), care
        are un impact asupra senzației, durabilității și întreținerii.
    uilleann_pipes_handedness:
      name: Orientarea cimpoiului Uilleann (pentru stângaci/dreptaci)
      description: Indică dacă setul este configurat pentru cântatul cu mâna dreaptă
        sau cu mâna stângă.
    uilleann_pipes_set_configuration:
      name: Configurația setului de cimpoi Uilleann
      description: Specifică ce configurație de cimpoi Uilleann este inclusă, în funcție
        de prezența regulatoarelor și a tuburilor de ison.
    uk_childrens_shoe_size:
      name: Mărimile încălțămintei pentru copii din Regatul Unit
      description: Specifică mărimea din Regatul Unit pentru încălțămintea de copii,
        precum 4 sau 4 Lat
    uk_clothing_size:
      name: Mărime din Regatul Unit pentru îmbrăcăminte
      description: Specifică mărimea din Regatul Unit pentru îmbrăcăminte, precum
        12 sau 18
    uk_cup_size:
      name: Mărime din Regatul Unit pentru cupă
      description: Specifică mărimea din Regatul Unit pentru cupa sutienului, cum
        ar fi C sau FF
    uk_mens_shoe_size:
      name: Mărime din Regatul Unit pentru încălțăminte de bărbați
      description: Specifică mărimea din Regatul Unit pentru încălțăminte de bărbați,
        cum ar fi 9 sau 9 Lat
    uk_womens_shoe_size:
      name: Mărimile încălțămintei pentru femei din Regatul Unit
      description: Specifică mărimile încălțămintei pentru femei din Regatul Unit,
        cum ar fi 6 sau 6 Lat
    ukulele_back_and_sides_wood:
      name: Lemnul pentru spatele și eclisele ukulelei
      description: Identifică lemnul/materialul utilizat pentru spatele și eclisele
        ukulelei.
    ukulele_body_cutaway:
      name: Decupajul corpului ukulelei
      description: Indică dacă corpul ukulelei de concert are un decupaj pentru un
        acces mai ușor la tastele superioare.
    ukulele_body_shape:
      name: Forma corpului ukulelei
      description: Stilul/forma generală a corpului utilizată pentru ukulele.
    ukulele_bridge_material:
      name: Materialul călușului ukulelei
      description: Specifică materialul utilizat pentru călușul ukulelei.
    ukulele_construction_type:
      name: Tip de construcție pentru ukulele
      description: Modul în care sunt construite fața/spatele/eclisele instrumentului
        (lemn masiv sau laminat).
    ukulele_electronics_configuration:
      name: Configurația componentelor electronice ale ukulelei
      description: Indică dacă ukulele este doar acustică sau include componente electronice
        încorporate (doză și/sau preamplificator) pentru amplificare.
    ukulele_string_re_entrant_tuning:
      name: Acordajul reentrant al corzilor ukulelei
      description: Dacă ukulele este configurată cu acordaj reentrant (sol acut) versus
        sol liniar/grav; preferință comună a cumpărătorului, care afectează sunetul.
    ukulele_top_wood:
      name: Lemnul feței ukulelei
      description: Identifică lemnul/materialul utilizat pentru fața/placa de rezonanță
        a ukulelei.
    ukulele_tuner_mechanism:
      name: Mecanismul cheilor de acordare ale ukulelei
      description: Specifică stilul/mecanismul cheilor de acordare utilizate la ukulele.
    ukulele_tuner_type:
      name: Tipul cheilor de acordare ale ukulelei
      description: Stilul mecanismului de acordare utilizat pentru capul ukulelei.
    ukulele_tuning:
      name: Acordarea ukulelei
      description: Specifică acordajul standard prevăzut pentru ukulele de buzunar.
    ultralight_aircraft_wing_configuration:
      name: Configurația aripilor aeronavei ultraușoare
      description: Plasarea și configurația aripii principale în raport cu fuzelajul/structura.
    under_bed_features:
      name: Caracteristici ale spațiului de sub pat
      description: Identifică elementul funcțional principal situat sub platforma
        patului.
    underfoot_strap_type:
      name: Tipul curelei sub picior
      description: Identifică materialul sau designul utilizat pentru cureaua care
        trece pe sub încălțăminte.
    underwear_fit:
      name: Croiala lenjeriei intime
      description: Indică profilul general al croielii boxerilor (de ex., strâmt,
        lejer, compresie).
    underwear_pieces_included:
      name: Piese de lenjerie intimă incluse
      description: Identifică piesele de vestimentație furnizate (partea superioară,
        partea inferioară, ambele sau un combinezon întreg), astfel încât clienții
        să știe dacă achiziționează un set complet sau un articol individual.
    uniform_pieces_included:
      name: Piese de uniformă incluse
      description: Identifică ce componente de vestimentație sunt furnizate (de ex.,
        cămașă, pantaloni, vestă), clarificând conținutul pachetului pentru achiziții
        în vrac sau truse.
    uniform_role:
      name: Rolul uniformei
      description: Specifică rolul profesional sau agenția pentru care este destinat
        articolul de uniformă (de ex., poliție, șerif, ambulanță/SMURD).
    update_method:
      name: Metoda de actualizare
      description: Modul în care actualizările de firmware/software sunt livrate pentru
        scaner.
    upholstery_fabric_backing_type:
      name: Tipul de suport al țesăturii pentru tapițerie
      description: Specifică suportul/laminarea de pe țesătura de tapițerie, care
        afectează instalarea și senzația la atingere.
    upholstery_fabric_water_resistance:
      name: Rezistența la apă a țesăturii pentru tapițerie
      description: Indică rezistența la apă și vărsări accidentale pentru suprafața
        țesăturii de tapițerie.
    upper_material:
      name: Materialul părții superioare
      description: Specifică materialul principal utilizat pe partea superioară a
        pantofului sport, care afectează respirabilitatea, durabilitatea și estetica.
    upright_bass_pickup_system:
      name: Sistemul de doze al contrabasului
      description: Indică dacă contrabasul include un sistem instalat de doze/preamplificator
        destinat amplificării.
    upright_piano_power_source:
      name: Sursa de alimentare a pianinei
      description: Modul în care este alimentată pianina, aplicabil pianinelor acustice
        fără alimentare, precum și pianinelor cu sisteme hibride/silențioase care
        necesită electricitate.
    urination_device_features:
      name: Caracteristici ale dispozitivului pentru urinare
      description: Evidențiază caracteristicile speciale de design care îmbunătățesc
        funcționalitatea sau confortul.
    us_childrens_shoe_size:
      name: Mărime SUA pentru încălțăminte de copii
      description: Specifică mărimea SUA pentru încălțăminte de copii, precum 5 sau
        5 Lat
    us_clothing_size:
      name: Mărime SUA pentru îmbrăcăminte
      description: Specifică mărimea SUA pentru îmbrăcăminte, cum ar fi 8 sau 14
    us_cup_size:
      name: Mărime SUA pentru cupă de sutien
      description: Specifică mărimea SUA pentru cupa sutienului, cum ar fi C sau DDD
    us_mens_shoe_size:
      name: Mărime SUA pentru încălțăminte de bărbați
      description: Specifică mărimea SUA pentru încălțăminte de bărbați, cum ar fi
        10 sau 10 Lat
    us_ring_size:
      name: Mărime SUA pentru inele
      description: Specifică mărimea SUA pentru inele, cum ar fi 7 sau 9,5
    us_womens_shoe_size:
      name: Mărime SUA pentru încălțăminte de damă
      description: Specifică mărimea SUA pentru încălțăminte de damă, cum ar fi 8
        sau 8 Lat
    usage:
      name: Utilizare
      description: Descrie utilizarea/reglajul preconizat al arborelui cu came.
    usda_honey_grade:
      name: Gradul mierii conform USDA
      description: Indică gradul oficial atribuit mierii de către Departamentul de
        Agricultură al SUA (USDA).
    user_control_method:
      name: Metodă de control pentru utilizator
      description: Indică modul în care utilizatorul interacționează cu aparatul (de
        ex., panou de control integrat, telecomandă, aplicație, voce), oferind informații
        cu privire la ușurința de utilizare.
    vacuum_boost_reference_port:
      name: Port de referință pentru vacuum/supraalimentare
      description: Indică dacă regulatorul include un port de referință al galeriei
        pentru vacuum/supra-alimentare și ce stil are.
    valve_base_shape:
      name: Forma bazei valvei
      description: Identifică geometria interfeței dintre baza valvei și jantă (rotundă,
        conică, cu port lateral, în formă de T etc.), care afectează etanșarea și
        compatibilitatea cu inserțiile de spumă.
    valve_core_type:
      name: Tip de miez de supapă
      description: Indică dacă ventilul valvei este detașabil, fix sau fără ventil,
        informație care afectează procedurile de întreținere și compatibilitatea cu
        instrumentele de injectare a substanței de etanșare.
    valve_cover_gasket_material:
      name: Materialul garniturii capacului de supape
      description: Specifică materialul garniturii capacului de supape inclus cu capacul
        de supape, sau materialul recomandat al garniturii atunci când este vândut
        fără garnitură (dacă este cazul).
    valve_cover_material:
      name: Material al capacului de supapă
      description: Materialul de construcție principal al capacului de supape.
    valve_design:
      name: Designul supapei
      description: Identifică construcția/designul supapei motorului.
    valve_guard_coverage_area:
      name: Zonă de acoperire a protecției pentru supape
      description: Indică părțile secțiunii supapei pe care le protejează apărătoarea.
    valvetrain_configuration:
      name: Configurație a distribuției
      description: Specifică configurația axului cu came/mecanismului de supape.
    varnish_formulation_base:
      name: Baza formulei lacului
      description: Specifică formula principală/chimia lacului pentru instrumente
        cu coarde, care afectează aspectul, reversibilitatea și compatibilitatea cu
        finisajele existente
    varnish_transparency_tint:
      name: Transparența/nuanța lacului
      description: Descrie dacă lacul este incolor sau nuanțat și, dacă este nuanțat,
        familia generală de nuanțe.
    vegetable_matter_vm_content:
      name: Conținut de materie vegetală (VM)
      description: Cantitatea de resturi/impurități de plante prezente în fibră.
    vegetable_preparation_style:
      name: Stilul de preparare a legumelor
      description: Descrie modul în care leguma este prezentată, tăiată sau preparată
        în alt mod înainte de vânzare (de ex., întreagă, tăiată cubulețe, buchețele).
    vehicle_audio_dsp_form_factor:
      name: Factorul de formă al unității DSP audio auto
      description: Specifică formatul fizic/de instalare al unității DSP.
    vehicle_battery_charger_features:
      name: Caracteristicile încărcătorului de baterie auto
      description: Enumeră modurile de operare și caracteristicile încorporate ale
        încărcătorului de baterie auto (de ex., mod de menținere a încărcării, desulfatare).
    vehicle_body_filler_form:
      name: Forma chitului de caroserie auto
      description: Forma fizică/stilul de ambalare a produsului de chit de caroserie.
    vehicle_coaxial_speaker_nominal_size:
      name: Dimensiunea nominală a difuzorului coaxial auto
      description: Dimensiunea nominală a difuzorului utilizată la montare (de ex.,
        16,5 cm, 15x23 cm).
    vehicle_cover_size_class:
      name: Clasa de dimensiune a prelatei auto
      description: Grupare generală de dimensiuni care indică pentru ce mărime de
        vehicul este concepută prelata.
    vehicle_decor_set_items_included:
      name: Articole incluse în setul de decorațiuni auto
      description: Enumeră tipurile de articole decorative incluse în setul de accesorii
        (vizibilitate la nivel de componente pentru cumpărători).
    vehicle_door_lock_actuation_method:
      name: Metoda de acționare a încuietorii ușii vehiculului
      description: Indică modul în care este acționată sau controlată încuietoarea
        ușii vehiculului.
    vehicle_door_lock_actuator_kit_contents:
      name: Conținutul kitului de acționare a încuietorii ușii vehiculului
      description: Indică ce este inclus cu elementul de acționare (doar elementul
        de acționare sau cu accesorii de fixare/tije/suporturi/cablaj).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Configurația cablajului dispozitivului de acționare al încuietorii ușii
        vehiculului
      description: Specifică stilul de cablare necesar pentru instalare (numărul de
        fire și rolul acestora).
    vehicle_door_lock_included_components:
      name: Componentele incluse ale încuietorii ușii vehiculului
      description: Enumeră componentele care sunt incluse în pachet (util pentru kituri/ansambluri).
    vehicle_electrical_connector_type:
      name: Tipul de conector electric auto
      description: Specifică stilul conectorului sau prizei electrice a regulatorului/câmpului
        alternatorului (excluzând borna principală de ieșire B+).
    vehicle_equipment_fit_out_level:
      name: Nivelul de echipare a vehiculului
      description: Indică nivelul de echipare pentru poliție inclus cu furgoneta.
    vehicle_glass_cleaner_form:
      name: Forma soluției de curățare a geamurilor auto
      description: Formatul fizic al produsului de curățare a geamurilor auto (de
        ex., spray, spumă, șervețele, gel, concentrat).
    vehicle_hitch_cover_illumination_type:
      name: Tipul de iluminare a capacului cârligului de remorcare
      description: Specifică dacă capacul cârligului de remorcare are iluminare și
        de ce fel.
    vehicle_hitch_cover_mounting_type:
      name: Tip de montare a capacului pentru cârligul de remorcare auto
      description: Indică metoda utilizată pentru a reține/atașa capacul cârligului
        în receptorul cârligului.
    vehicle_license_plate_finish:
      name: Finisajul plăcuței de înmatriculare auto
      description: Finisajul suprafeței plăcuței.
    vehicle_license_plate_frame_anti_theft_design:
      name: Designul antifurt al suportului plăcuței de înmatriculare auto
      description: Elemente de design legate de securitate, menite să descurajeze
        îndepărtarea sau modificarea neautorizată.
    vehicle_license_plate_frame_plate_standard:
      name: Standardul plăcii suportului plăcuței de înmatriculare auto
      description: Standardul/regiunea plăcuței de înmatriculare pentru care este
        dimensionat cadrul.
    vehicle_license_plate_frame_profile:
      name: Profilul suportului plăcuței de înmatriculare auto
      description: Modul în care rama înconjoară plăcuța (acoperire/formă), ceea ce
        influențează lizibilitatea și conformitatea.
    vehicle_license_plate_mounting_hole_count:
      name: Numărul de găuri de montare ale plăcuței de înmatriculare auto
      description: Numărul de găuri de montare de pe plăcuță.
    vehicle_license_plate_mounting_hole_pattern:
      name: Model al găurilor de prindere pentru plăcuța de înmatriculare auto
      description: Modelul de plasare a găurilor de montare pe plăcuță.
    vehicle_license_plate_reflectivity:
      name: Reflectivitatea plăcuței de înmatriculare auto
      description: Dacă și cum suprafața plăcuței reflectă lumina (important pentru
        vizibilitate și conformitate în cazul unor plăcuțe decorative).
    vehicle_license_plate_size_standard:
      name: Standard de dimensiune pentru plăcuța de înmatriculare auto
      description: Indică standardul regional/al vehiculului pentru care este dimensionată
        plăcuța (spațierea găurilor de montare și dimensiunile generale).
    vehicle_license_plate_text_style:
      name: Stil de text pentru plăcuța de înmatriculare auto
      description: Stilul caracterelor de pe plăcuță (dacă există), inclusiv în relief
        față de imprimate.
    vehicle_license_plate_theme:
      name: Tematică a plăcuței de înmatriculare auto
      description: Tema generală de design pentru grafica plăcuței.
    vehicle_lift_actuation_method:
      name: Metodă de acționare a cricului auto
      description: Modul în care elevatorul/cricul este alimentat/acționat pentru
        a ridica vehiculul.
    vehicle_lift_mounting_type:
      name: Tipul de montare al elevatorului auto
      description: Indică modul în care elevatorul este instalat sau ancorat în spațiul
        de lucru.
    vehicle_lift_type:
      name: Tip de cric auto
      description: Specifică stilul structural al elevatorului auto utilizat pentru
        service sau depozitare (de ex., cu 2 coloane, cu 4 coloane, tip foarfecă).
    vehicle_magnet_attachment_type:
      name: Tipul de prindere al magnetului auto
      description: Specifică metoda principală de prindere/montare pentru produsele
        vândute ca magneți auto (de exemplu, doar magnetic sau magnetic cu asistență
        adezivă).
    vehicle_magnet_intended_use:
      name: Utilizarea prevăzută a magnetului auto
      description: Indică principalul caz de utilizare prevăzut pentru magnetul auto.
    vehicle_mirror_adjustment_type:
      name: Tipul de ajustare al oglinzii auto
      description: Specifică modul în care oglinda este ajustată/controlată.
    vehicle_mirror_glass_type:
      name: Tip de sticlă pentru oglinda auto
      description: Specifică tipul optic/de formă al suprafeței sticlei oglinzii.
    vehicle_organizer_features:
      name: Caracteristici ale organizatorului auto
      description: Caracteristici funcționale cheie ale organizatoarelor auto, cum
        ar fi plierea, căptușeala impermeabilă, buzunarele izolate sau baza antiderapantă.
    vehicle_paint_chemistry_base:
      name: Compoziția chimică/baza vopselei auto
      description: Indică formularea/compoziția chimică a vopselei utilizate în vopseaua
        auto.
    vehicle_polish_application_method:
      name: Metoda de aplicare a soluției de lustruit (polish) auto
      description: Specifică metoda sau instrumentul recomandat pentru aplicarea soluției
        de lustruit auto.
    vehicle_pursuit_package:
      name: Pachet de echipare auto pentru urmărire
      description: Indică dacă vehiculul este dotat cu un pachet de performanță pentru
        misiuni de urmărire, destinat utilizării de către poliție (de exemplu, răcire
        modernizată, frâne, suspensie și calibrare).
    vehicle_safety_equipment_position:
      name: Poziția echipamentului de siguranță auto
      description: Specifică în ce loc, pe sau în vehicul, se intenționează să se
        utilizeze sau să se instaleze echipamentul de siguranță.
    vehicle_safety_equipment_visibility_features:
      name: Caracteristici de vizibilitate ale echipamentului de siguranță auto
      description: Indică caracteristicile de îmbunătățire a vizibilității, concepute
        pentru a spori evidențierea.
    vehicle_seat_row:
      name: Rândul de scaune al vehiculului
      description: Indică pentru ce rând din spate este destinat scaunul (al doilea
        rând sau al treilea rând), inclusiv aplicațiile pentru scaune rabatabile din
        spate.
    vehicle_steering_assist_type:
      name: Tipul asistenței la direcție al vehiculului
      description: Specifică sistemul de asistență la direcție pentru care este concepută
        componenta.
    vehicle_steering_wheel_lock_form_factor:
      name: Factorul de formă al blocatorului de volan auto
      description: Descrie stilul fizic al blocatorului și modul în care interacționează
        cu volanul (și, opțional, cu alte comenzi).
    vehicle_wax_polish_product_form:
      name: Forma produsului de tip ceară/soluție de lustruit (polish) auto
      description: Forma fizică/formatul de dozare al cerii, soluției de lustruit,
        produsului de protecție sau de etanșare.
    vehicle_wheel_valve_stem_type:
      name: Tipul tijei pentru supapa roții vehiculului
      description: Specifică tipul tijei pentru supapă acceptat sau inclus.
    vehicle_windshield_fluid_formula:
      name: Formula lichidului de parbriz auto
      description: Obiectivul principal de curățare/îndepărtare al formulei lichidului
        de parbriz.
    veil_length_type:
      name: Tip de lungime a voalului
      description: Clasifică un voal utilizând terminologia standard de lungime, mai
        degrabă decât măsurarea numerică.
    vellum_opacity_level:
      name: Nivelul de opacitate al hârtiei de calc
      description: Indică cât de translucidă sau opacă este foaia de hârtie de calc.
    ventilation_configuration:
      name: Configurație a ventilației
      description: Configurația principală de ventilație/admisie și evacuare a aerului
        la cască.
    ventilation_control_type:
      name: Tip de control al ventilației
      description: Specifică stilul de gestionare a fluxului de aer încorporat în
        cască.
    ventilation_level:
      name: Nivel de ventilație
      description: Indică designul relativ al fluxului de aer/ventilației armurii.
    venting_design:
      name: Designul ventilației
      description: Specifică dacă și cum este ventilată prelata pentru a reduce condensul
        și mucegaiul în timpul depozitării.
    vestibule_type:
      name: Tipul vestibulului
      description: Clasifică dispunerea antreului în raport cu cortul.
    vibraphone_bar_material:
      name: Materialul lamelelor vibrafonului
      description: Materialul lamelelor/clapetelor de ton ale vibrafonului (lamelele
        care produc sunet).
    vibraphone_motor_type:
      name: Tipul motorului vibrafonului
      description: Tipul de motor utilizat pentru a acționa ventilatoarele rotative
        ale rezonatorului pentru vibrato (dacă este prevăzut).
    vibraphone_range_octaves:
      name: Gama vibrafonului (octave)
      description: Gama de frecvențe a vibrafonului exprimată în octave (de ex., 3
        octave, 3,5 octave).
    vibraphone_resonator_tube_material:
      name: Materialul tubului rezonator al vibrafonului
      description: Materialul tuburilor rezonatoare ale vibrafonului aflate sub lamele.
    vibraphone_tuning_standard:
      name: Standardul de acordaj al vibrafonului
      description: Înălțimea de referință a sunetului utilizată pentru acordaj (La=440
        Hz etc.).
    viewing_sides:
      name: Părți de vizualizare
      description: Specifică câte fețe ale tabelei de marcaj afișează informații (cu
        o singură față, cu două fețe, cu patru fețe etc.).
    vintage_advertisement_decade:
      name: Deceniul reclamei vintage
      description: Specifică deceniul în care reclama a fost tipărită sau produsă
        inițial (aproximativ, dacă anul exact este necunoscut).
    vintage_advertisement_format:
      name: Format vintage al reclamei
      description: Specifică formatul sau mediul fizic al obiectului de colecție tip
        reclamă vintage.
    vintage_advertisement_subject_category:
      name: Categoria de subiect a reclamei vintage
      description: Identifică categoria de produse/servicii care face obiectul reclamei
        (pentru ce este reclama).
    vintage_classic_truck_cab_type:
      name: Tipul de cabină a camionetei vintage și clasice
      description: Configurația cabinei/stilul caroseriei compartimentului pentru
        pasageri al camionetei.
    virginia_tech_helmet_star_rating:
      name: Evaluarea cu stele a căștilor de către Virginia Tech
      description: Evaluarea de siguranță atribuită de Laboratorul de Căști Virginia
        Tech (0–5 stele).
    virtual_analog_synthesizer_form_factor:
      name: Factorul de formă al sintetizatorului analogic virtual
      description: Specifică formatul fizic al șasiului sintetizatorului (claviatură
        sau modul/rastel).
    viscosity_thickness:
      name: Vâscozitate/grosime
      description: Descrie cât de densă sau fluidă este barbotina așa cum este vândută
        sau la consistența de lucru recomandată.
    vise_configuration:
      name: Configurație a menghinei
      description: Specifică aspectul structural sau numărul de piese din setul de
        menghine, ceea ce afectează portabilitatea și complexitatea configurării.
    visibility_features:
      name: Configurație a menghinei
      description: Evidențiază elementele de design care sporesc vizibilitatea biciclistului/motociclistului
        în trafic.
    visor_brim_type:
      name: Tip de vizieră/cozoroc
      description: Indică prezența și stilul unei viziere sau al unui cozoroc de cască.
    visor_configuration:
      name: Configurație a vizierei
      description: Descrie prezența și stilul oricărei viziere sau scut facial încorporat.
    visor_lens_finish:
      name: Finisajul lentilei vizierei
      description: Specifică nuanța, finisajul optic sau stilul grafic aplicat lentilei
        vizierei.
    visor_style:
      name: Stilul vizierei
      description: Indică dacă gluga include un cozoroc/o vizieră și configurația
        acesteia.
    voc_compliance_standard:
      name: Standardul de conformitate COV
      description: Declarația de conformitate cu reglementările privind compușii organici
        volatili (COV) pentru produs (dacă este cazul).
    voc_regulatory_class:
      name: Clasa de reglementare COV
      description: Clasa declarată de reglementare/conformitate COV pentru produs
        (conform etichetei/fișei cu date de securitate), utilizată pentru restricțiile
        regionale de mediu și de reglementare.
    vodka_base_ingredient:
      name: Ingredient de bază pentru vodcă
      description: Ingredientul agricol principal din care este distilată vodca (de
        ex., grâu, cartof, porumb).
    voice_coil_configuration:
      name: Configurația bobinei mobile
      description: Numărul/dispunerea bobinelor mobile pentru flexibilitatea cablajului
        și opțiunile de impedanță.
    voice_effects:
      name: Efecte vocale
      description: Tipurile de efecte vocale încorporate acceptate de setul de karaoke.
    voltage_rating_type:
      name: Tipul de tensiune nominală
      description: Specifică dacă tensiunea nominală a siguranței se aplică la curent
        alternativ, curent continuu sau ambele.
    voltage_regulator_connector_type:
      name: Tipul conectorului regulatorului de tensiune
      description: Specifică stilul conexiunii/terminalului utilizat pentru conectarea
        regulatorului la cablajul vehiculului/alternator/generator.
    wader_foot_type:
      name: Tip de botoș pentru cizme-pantalon
      description: Specifică dacă cizmele-pantalon de pescuit au cizme integrate sau
        ciorapi din neopren separați.
    wader_sole_type:
      name: Tipul tălpii cizmelor-pantalon de pescuit
      description: Specifică materialul tălpii exterioare sau tipul de tracțiune utilizat
        pentru bocancii de pescuit sau cizmele-pantalon cu cizmă integrată.
    waistband_style:
      name: Stilul beteliei
      description: Descrie construcția beteliei și modul în care este fixată sau ajustată
        pentru potrivire și confort.
    wakeboard_binding_mounting_pattern:
      name: Modelul de montare a legăturilor pentru wakeboard
      description: Specifică modelul de inserție/placă de pe wakeboard cu care legăturile
        sunt compatibile.
    wakeboard_riding_style:
      name: Stilul de utilizare a wakeboardului
      description: Clasifică mediul vizat sau stilul de utilizare al wakeboardului.
    wall_decal_style:
      name: Stilul autocolantului de perete
      description: Specifică modul în care autocolantul este produs/aplicat (de ex.,
        decupat la matriță, prin transfer, foaie cu autocolante).
    wallyball_equipment_included:
      name: Echipament inclus pentru wallyball
      description: Enumeră piesele specifice furnizate în setul de wallyball, astfel
        încât cumpărătorii să știe exact ce achiziționează și să poată compara pachetele.
    warp_beam_type:
      name: Tip de sul de urzeală
      description: Specifică configurația sulului de urzeală inclus sau instalat pe
        războiul de țesut (configurația sulului furnizată cu războiul de țesut).
    washability:
      name: Lavabilitate
      description: Indică dacă lipiciul se curăță cu apă și/sau este lavabil după
        aplicare.
    watch_band_design:
      name: Designul curelei de ceas
      description: Descrie stilul de construcție sau modelul de design al unei curele
        de ceas (de ex., NATO, milaneză, cu zale).
    watch_movement:
      name: Mecanismul ceasului
      description: Specifică mecanismul care alimentează ceasul, un factor esențial
        pe care cumpărătorii îl folosesc pentru a diferenția modelele.
    water_activation:
      name: Activare la contactul cu apa
      description: Dacă baliza se poate activa automat la scufundarea în apă (comun
        pentru EPIRB-urile din categoria I/II).
    water_chamber_configuration:
      name: Configurația camerei de apă
      description: Descrie dispunerea camerei interne a saltelei, cum ar fi o singură
        cameră sau camere duble, ceea ce afectează susținerea, controlul temperaturii
        și deranjarea partenerului.
    water_dispensing_mechanism:
      name: Mecanism de distribuire a apei
      description: Definește modul în care apa este eliberată din unitate, cum ar
        fi prin robinete, duze de pulverizare sau turnare gravitațională.
    water_exposure_protection_level:
      name: Nivelul de protecție la expunerea la apă
      description: Indică nivelul de protecție a produsului atunci când este expus
        la apă (de ex., stropiri vs. scufundare temporară). Utilizați gradul de protecție
        la pătrundere (IP) atunci când este disponibil un cod IP oficial.
    water_fed_design:
      name: Design cu alimentare cu apă
      description: Indică dacă peria este concepută pentru a fi utilizată cu apă curentă
        printr-un mâner cu flux continuu sau o conexiune la furtun.
    water_gun_features:
      name: Caracteristici ale pistolului cu apă
      description: Caracteristici funcționale notabile și capacități incluse ale pistolului
        cu apă.
    water_gun_operating_mechanism:
      name: Mecanismul de funcționare al pistolului cu apă
      description: Modul în care pistolul cu apă presurizează și expulzează apa în
        timpul utilizării.
    water_gun_spray_pattern:
      name: Modelul de pulverizare al pistolului cu apă
      description: Tipul de jet de apă produs de duză în timpul tragerii.
    water_heating_method:
      name: Metoda de încălzire a apei
      description: Descrie modul în care, sau dacă, apa este încălzită înainte de
        utilizare – de exemplu, absorbție solară, arzătoare cu propan, rezistențe
        electrice, încălzire pe bază de baterii, izolație pentru reținerea căldurii
        sau neîncălzită.
    water_mattress_construction:
      name: Construcția saltelei cu apă
      description: Specifică stilul de construcție al saltelei cu apă (de ex., cadru
        rigid sau cadru moale), care determină compatibilitatea cu cadrul de pat și
        senzația generală.
    water_play_features:
      name: Caracteristici pentru joaca cu apa
      description: Componentele pentru activități acvatice incluse în parcul acvatic/toboganul
        cu apă.
    water_polo_competition_approval:
      name: Aprobare pentru competiții de polo pe apă
      description: Identifică organismul de conducere sau nivelul de competiție pentru
        care mingea este aprobată sau certificată oficial.
    water_polo_goal_type:
      name: Tipul de poartă pentru polo pe apă
      description: Clasifică configurația structurală sau de montare a porții (de
        ex., plutitoare, montată pe margine/punte, portabilă).
    water_pump_drive_type:
      name: Tipul de antrenare a pompei de apă
      description: Specifică modul în care pompa de apă este antrenată/acționată în
        sistemul de răcire al vehiculului.
    water_pump_housing_material:
      name: Materialul carcasei pompei de apă
      description: Materialul carcasei/corpului pompei de apă.
    water_pump_impeller_material:
      name: Materialul rotorului pompei de apă
      description: Specifică materialul rotorului pompei de apă (rotorul intern/paleta
        care mișcă lichidul de răcire).
    water_pump_mounting_type:
      name: Tipul de montare a pompei de apă
      description: Specifică stilul de montare/factorul de formă al pompei de apă
        pentru montarea pe motor (de ex., carcasă prin înșurubare comparativ cu cartuș/inserție).
    water_purification_method:
      name: Metodă de purificare a apei
      description: Identifică mecanismul principal prin care produsul face apa potabilă
        pe teren (de ex., pompă comparativ cu alimentare gravitațională comparativ
        cu lumină UV).
    water_resistance:
      name: Rezistență la apă
      description: Comunică gradul de protecție la intemperii oferit, cum ar fi impermeabil
        sau rezistent la apă.
    water_resistance_level:
      name: Nivelul de rezistență la apă
      description: Indică dacă materialul textil respinge apa și la ce nivel.
    water_resistance_rating_case_protection_level:
      name: Gradul de rezistență la apă (nivelul de protecție al carcasei)
      description: Indică nivelul de rezistență la apă/protecție oferit de troler
        (nivel de marketing, nu etanșarea IP a electronicelor), de ex., rezistent
        la apă comparativ cu impermeabil.
    water_rocket_kit_items_included:
      name: Articole incluse în kitul rachetei cu apă
      description: Componentele majore incluse în pachetul produsului.
    water_rocket_propulsion_type:
      name: Tip de propulsie a rachetei cu apă
      description: Sursa principală de propulsie/energie utilizată pentru a lansa
        racheta.
    water_rocket_recovery_system:
      name: Sistemul de recuperare al rachetei cu apă
      description: Metoda utilizată pentru a recupera racheta după lansare.
    water_ski_base_design:
      name: Designul bazei schiului nautic
      description: Specifică profilul de jos al schiurilor nautice, care influențează
        caracteristicile de manevrabilitate.
    water_ski_fin_type:
      name: Tipul aripioarei pentru schi nautic
      description: Specifică configurația aripioarei unui schi nautic, care afectează
        menținerea direcției și manevrabilitatea.
    water_source:
      name: Sursă de apă
      description: Identifică originea apei înainte de carbonatare.
    water_sports_safety_standard:
      name: Standard de siguranță pentru sporturi nautice
      description: Enumeră standardele formale de siguranță sau de flotabilitate pe
        care le îndeplinește produsul (de ex., CE EN 1385 pentru căști, ISO 12402-5
        pentru auxiliare de flotabilitate, USCG tip III).
    water_table_feature_set:
      name: Set de caracteristici ale măsuței cu apă
      description: Evidențiază caracteristicile de joacă încorporate ale măsuței cu
        apă, cum ar fi cascade, pulverizatoare, pompe sau bazine pe mai multe niveluri.
    water_table_items_included:
      name: Articole incluse pentru măsuța cu apă
      description: Specifică ce accesorii însoțesc setul măsuței cu apă (de ex., bărci,
        căni, pâlnii, figurine).
    water_table_water_source_type:
      name: Tipul sursei de apă pentru măsuța cu apă
      description: Specifică modul în care măsuța cu apă este umplută sau alimentată
        cu apă.
    waterbed_stabilization_level:
      name: Nivelul de stabilizare al patului cu apă
      description: Indică gradul de reducere a valurilor sau de control al mișcării
        oferit de salteaua patului cu apă.
    watercolor_ink_water_resistance_after_drying:
      name: Rezistența la apă a cernelii acuarelă (după uscare)
      description: Indică dacă cerneala acuarelă devine rezistentă la apă/impermeabilă
        după uscare (conform declarației producătorului).
    watercraft_care_application_area:
      name: Zona de aplicare pentru îngrijirea ambarcațiunilor
      description: Indică zona principală sau componenta unei ambarcațiuni pe care
        se intenționează a fi utilizat produsul.
    watercraft_drive_mechanism:
      name: Mecanismul de propulsie al ambarcațiunii
      description: Descrie mecanismul specific de propulsie la bord instalat sau acceptat.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Modelul unității de transmisie a rezervorului de combustibil pentru ambarcațiuni
      description: Specifică modelul de montare/standardul pentru unitățile de transmisie
        ale rezervorului de combustibil și indicatoarele compatibile (de ex., modele
        comune de șuruburi marine).
    watercraft_fuel_tank_shape:
      name: Forma rezervorului de combustibil pentru ambarcațiuni
      description: Descrie factorul general de formă fizică al rezervorului de combustibil
        pentru a susține planificarea spațiului/potrivirii.
    watercraft_hull_material:
      name: Materialul carenei ambarcațiunii
      description: Specifică materialul principal al construcției carenei.
    watercraft_ignition_part_voltage:
      name: Tensiunea piesei de aprindere pentru ambarcațiuni
      description: Tensiunea nominală/cerința pentru piesa de aprindere (dacă este
        cazul), cum ar fi sistemele de 12 V.
    watercraft_impeller_material_grade:
      name: Clasa materialului rotorului pentru ambarcațiuni
      description: Specifică materialul rotorului ambarcațiunii (de ex., cauciuc neoprenic,
        nitril, bronz).
    watercraft_lighting_certification_compliance:
      name: Certificarea/conformitatea iluminatului pentru ambarcațiuni
      description: Indică conformitatea cu reglementările/standardele pentru care
        lumina este certificată pentru uz marin (de ex., conform USCG/ABYC/COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Caracteristici de ajustare a suportului motorului pentru ambarcațiuni
      description: Capacitățile de ajustare ale suportului (de ex., înclinare, ridicare,
        glisare) care afectează gradul de utilizare și potrivirea.
    watercraft_piston_part_type:
      name: Tipul piesei pistonului pentru ambarcațiuni
      description: Identifică ce componentă legată de piston reprezintă listarea.
    watercraft_propeller_blade_rake:
      name: Înclinarea paletei elicei ambarcațiunii
      description: Specifică înclinarea paletei (unghiul paletei în raport cu butucul),
        care afectează ridicarea provei și performanța.
    watercraft_propeller_rotation_direction:
      name: Direcția de rotație a elicei ambarcațiunii
      description: Indică direcția de rotație/sensul necesar al elicei pentru compatibilitatea
        cu transmisia (de ex., pe dreapta/standard comparativ cu pe stânga/contrarotativă).
    watercraft_pump_stage_impeller_role:
      name: Treapta pompei/rolul rotorului pentru ambarcațiuni
      description: Identifică dacă rotorul este destinat unui rol specific al pompei
        (de ex., pompă de apă brută/mare, circulația lichidului de răcire, pompă cu
        jet).
    watercraft_registration_status:
      name: Starea de înmatriculare a ambarcațiunii
      description: Indică dacă barca cu pânze include titlul de proprietate și/sau
        documentația de înmatriculare.
    watercraft_safety_equipment_activation_type:
      name: Tipul de activare a echipamentului de siguranță pentru ambarcațiuni
      description: Metoda principală de activare a dispozitivului de siguranță (pentru
        balize/alarme MOB/PLB-uri), diferită de umflare.
    watercraft_steering_cable_core_material:
      name: Materialul miezului cablului de direcție pentru ambarcațiuni
      description: Specifică materialul cablului/miezului interior care transmite
        forța.
    watercraft_steering_cable_hardware_included:
      name: Accesorii de fixare incluse pentru cablul de direcție al ambarcațiunii
      description: Specifică ce accesorii de instalare și accesorii adiționale însoțesc
        cablul de direcție.
    watercraft_steering_cable_system_type:
      name: Tipul sistemului de cabluri de direcție pentru ambarcațiuni
      description: Specifică arhitectura sistemului de direcție pentru care este conceput
        cablul (de ex., rotativ, cu cremalieră).
    watercraft_steering_wheel_hub_bore_type:
      name: Tip de butuc/alezaj pentru volanul ambarcațiunii
      description: Specifică stilul interfeței de montare/alezajului central (de ex.,
        conic, canelat) unde volanul se cuplează cu un butuc sau adaptor.
    watercress_variety:
      name: Varietate de năsturel
      description: Identifică varietatea sau tipul specific de năsturel vândut.
    waterproof_level:
      name: Nivel de impermeabilitate
      description: Indică nivelul de protecție la apă al încălțămintei, inclusiv orice
        declarații de impermeabilitate susținute de garanție.
    wax_blend_composition:
      name: Compoziția amestecului de ceară
      description: Enumeră materialele de ceară amestecate în produs și/sau tipul
        de amestec comercializat.
    wax_coat_type:
      name: Tipul stratului de ceară
      description: Indică dacă ceara are rolul de strat de bază, strat de finisaj
        sau formulă universală/cu un singur strat.
    wax_hardness:
      name: Duritatea cerii
      description: Indică duritatea relativă a cerii, afectând durabilitatea și alunecarea
        pe diferite tipuri de zăpadă.
    wax_physical_form:
      name: Forma fizică a cerii
      description: Indică forma/aspectul fizic în care este furnizată ceara brută
        pentru lumânări.
    wax_recommended_candle_application:
      name: Aplicarea recomandată a cerii pentru lumânări
      description: Indică stilul/stilurile principale de lumânări pentru care este
        formulată ceara.
    wax_tackiness_level:
      name: Nivel de aderență a cerii
      description: Descrie nivelul de aderență/prindere pe care ceara îl oferă pe
        lamă.
    weapon_system_integration:
      name: Integrare a sistemului de arme
      description: Indică dacă vehiculul include sisteme de arme sau suporturi integrate.
    weather_suitability:
      name: Adecvare pentru condiții meteorologice
      description: Indică condițiile de mediu pentru care sunt concepute mănușile,
        cum ar fi jocul pe vreme rece sau pe vreme umedă.
    weave_finish:
      name: Țesătură/finisaj
      description: Descrie țesătura principală a materialului sau finisajul suprafeței
        care afectează textura și luciul cravatei.
    weave_style:
      name: Stil de țesătură
      description: Specifică modelul tradițional de țesere utilizat în confecționarea
        pălăriei Panama, care influențează respirabilitatea, flexibilitatea, aspectul
        și prețul.
    weave_type:
      name: Tipul țesăturii
      description: Identifică stilul de țesere/construcție a materialului (numele
        comercial al țesăturii) care influențează textura, luciul și drapajul.
    weaving_beater_edge_type:
      name: Tipul de muchie al bătătorului de țesut
      description: Descrie profilul muchiei de lucru al bătătorului plat care intră
        în contact cu bătătura (de ex., drept față de dințat).
    weaving_beater_style:
      name: Stil de spată pentru țesut
      description: Identifică stilul/formatul funcțional al bătătorului plat de țesut.
    weaving_shuttle_tip_style:
      name: Stilul vârfului suveicii de țesut
      description: Specifică designul vârfului/părții frontale a suveicii, care influențează
        modul în care trece prin rost și probabilitatea de a prinde firele de urzeală.
    weaving_shuttle_use_case:
      name: Situația de utilizare al suveicii de țesut
      description: Specifică aplicația de țesut prevăzută pentru care este concepută
        sau optimizată suveica.
    webbing_construction_type:
      name: Tip de construcție a chingii
      description: Descrie țesătura fizică sau stilul de împletitură a chingii, care
        afectează manipularea, rezistența și utilizarea prevăzută.
    webbing_design:
      name: Designul chingii
      description: Descrie stilul membranei dintre degete, care afectează antrenamentul
        de rezistență și propulsia.
    weight_adjustability:
      name: Ajustabilitatea greutății
      description: Descrie dacă rezistența produsului poate fi modificată de către
        utilizator (de ex., cu selecție de greutăți sau cu încărcare) sau este fixată
        la o singură greutate.
    weight_integration_system:
      name: Sistem de integrare a greutăților
      description: Descrie dacă și cum sunt integrate greutățile de lestare în vesta
        compensatoare (BCD) (de ex., buzunare detașabile pentru greutăți, niciuna,
        supliment opțional).
    weight_plate_compatibility:
      name: Compatibilitatea discurilor de greutate
      description: Definește diametrul discurilor de greutate pe care aparatul îl
        acceptă (olimpic, standard sau ambele).
    weight_plate_style:
      name: Stilul discurilor de greutate
      description: Clasifică designul/tipul discului de greutate (de ex., olimpic,
        din cauciuc, cu selecție) pentru o filtrare rapidă a compatibilității.
    weightlifting_belt_style:
      name: Stilul centurii de haltere
      description: Clasifică designul general sau configurația în funcție de scop
        a centurii (de ex., centură cu pârghie, centură pentru flotări la paralele,
        centură conică).
    weightlifting_federation_certification:
      name: Certificarea federației de haltere
      description: Aprobarea oficială sau omologarea produsului de către federațiile
        sporturilor de forță, cum ar fi IPF sau IWF.
    wetsuit_boot_height:
      name: Înălțimea cizmelor pentru costumul de neopren
      description: Clasifică înălțimea/croiala cizmei pe picior, influențând acoperirea,
        mobilitatea și pătrunderea apei.
    wetsuit_entry_system:
      name: Sistemul de îmbrăcare al costumului de neopren
      description: Descrie tipul și locația deschiderii/sistemului de fermoar utilizat
        pentru a îmbrăca costumul de neopren.
    wetsuit_seam_construction:
      name: Construcția cusăturilor costumului de neopren
      description: Specifică modul în care sunt realizate și etanșate cusăturile,
        influențând căldura, flexibilitatea și durabilitatea.
    wheat_product_form:
      name: Formă a produsului din grâu
      description: Specifică forma fizică sau procesată a produsului din grâu.
    wheel_arrangement:
      name: Dispunerea roților
      description: Specifică dispunerea roților locomotivei cu abur (notația Whyte),
        care este o caracteristică definitorie și un termen de căutare/de colecție
        comun.
    wheel_brake_type:
      name: Tip de frână pentru roată
      description: Detaliază configurația de frânare prevăzută pe roțile sau rolele
        căruciorului.
    wheel_chock_grip_features:
      name: Caracteristici de aderență ale saboților de roată
      description: Caracteristici de design pentru tracțiune și aderență care îmbunătățesc
        puterea de reținere pe suprafețe și anvelope.
    wheel_cleaner_acidity_ph_category:
      name: Categoria de aciditate/pH a soluției de curățare pentru jante
      description: Indică dacă soluția de curățare pentru jante este acidă, neutră
        sau alcalină (și, opțional, dacă este comercializată ca având un pH echilibrat).
    wheel_cleaner_formula_type:
      name: Tipul formulei soluției de curățare pentru jante
      description: Pentru soluțiile de curățare a jantelor și soluțiile de spălare
        aferente, indică categoria principală a formulei produsului (de ex., pe bază
        de acid, fără acid, cu pH neutru/echilibrat sau reactivă la fier).
    wheel_construction_type:
      name: Tip de construcție a roții
      description: Specifică metoda de fabricație/construcție a roții.
    wheel_contaminant_target:
      name: Contaminantul vizat pentru roată
      description: Specifică tipurile principale de contaminare pe care soluția de
        curățare este concepută să le elimine.
    wheel_core_type:
      name: Tip de miez al roții
      description: Descrie stilul de construcție al miezului roții, care influențează
        greutatea, rigiditatea și transferul de energie.
    wheel_cylinder_inlet_port_thread_standard:
      name: Standardul filetului portului de admisie al cilindrului de frână
      description: Specifică standardul filetului portului de admisie al conductei
        de frână pe cilindrul de roată (de ex., bordurare metrică convexă comparativ
        cu bordurare inversată SAE).
    wheel_fastener_seat_type:
      name: Tipul de scaun al elementelor de fixare ale roții
      description: Specifică stilul scaunului piuliței/prezonului care se îmbină cu
        janta (de ex., conic/teșit, sferic/rază, plat, mag/tijă).
    wheel_illumination:
      name: Iluminarea roții
      description: Indică dacă roata are iluminare încorporată sau caracteristici
        fosforescente.
    wheel_material:
      name: Materialul roții
      description: Identifică compoziția principală a roților, care afectează durabilitatea,
        aderența și amortizarea vibrațiilor.
    wheel_profile:
      name: Profil al roții
      description: Descrie forma secțiunii transversale a roții care afectează viteza,
        aderența și agilitatea.
    wheel_setup_type:
      name: Tip de configurație a roților
      description: Definește stilul de configurare a roților utilizat pe role.
    wheel_system_finish:
      name: Finisajul sistemului de roți
      description: Finisajul/acoperirea suprafeței jantelor/roților și a anumitor
        piese/accesorii ale roților.
    whip_style:
      name: Stilul cravașei
      description: Clasifică produsul în funcție de stilul specific al biciului sau
        cravașei ecvestre sau de disciplina prevăzută.
    whipped_cream_base:
      name: Bază pentru frișcă
      description: Identifică ingredientul de bază principal utilizat pentru prepararea
        friștii, cum ar fi smântâna din lapte sau din nucă de cocos.
    whipped_cream_form:
      name: Forma friștii
      description: Indică formatul fizic în care este vândută frișca.
    whistle_head_material:
      name: Material al muștiucului pentru fluier
      description: Specifică materialul capului/muștiucului fluierului (dispozitivului
        de suflare).
    whistle_light_features:
      name: Caracteristicile luminoase ale fluierului
      description: Indică dacă fluierul include efecte luminoase integrate pentru
        petreceri (de ex., LED).
    whistle_purpose:
      name: Scopul fluierului
      description: Identifică aplicația principală prevăzută pentru fluier (antrenament
        sportiv, siguranță maritimă, dresaj canin etc.).
    whistle_sound_style:
      name: Stilul sunetului fluierului
      description: Descrie stilul/caracterul sunetului emis de fluier (de ex., cu
        un singur ton comparativ cu cel multiton).
    white_glue_finish_appearance_when_dry:
      name: Finisajul/aspectul lipiciului alb la uscare
      description: Specifică modul în care arată lipiciul după uscare pentru utilizare
        artizanală/de birou (de ex., transparent sau opac).
    white_glue_washability:
      name: Proprietate de spălare a lipiciului alb
      description: Indică dacă lipiciul uscat poate fi spălat/curățat de pe țesături
        sau piele.
    whitewater_kayak_style:
      name: Stilul caiacului pentru ape repezi
      description: Intenția principală de design în segmentul apelor repezi (de ex.,
        barcă pentru apă puțin adâncă, caiac de ape repezi, caiac pentru începători).
    whitewater_rating_class:
      name: Clasificarea pentru ape repezi (clasă)
      description: Cea mai înaltă clasă din Scala Internațională de Dificultate a
        Râurilor pe care pluta este evaluată să o suporte.
    whorl_mounting_interface:
      name: Interfață de montare a rotiței de fus
      description: Modul în care volantul se atașează la roata de tors (stilul/conexiunea
        tijei).
    wick_construction_type:
      name: Tip de construcție a fitilului
      description: Construcția/stilul fitilului (împletit, plat, împletitură pătrată,
        cu miez, din lemn etc.).
    wick_core_type:
      name: Tipul de miez al fitilului
      description: Dacă fitilul este fără miez sau include un material pentru miez
        (de ex., miez de hârtie sau miez de zinc), afectând rigiditatea și caracteristicile
        de ardere.
    wick_tab_crimp_type:
      name: Tipul de sertizare al bazei metalice a fitilului
      description: Modul în care baza metalică fixează fitilul (stil de construcție/sertizare).
    wick_tab_material:
      name: Material al bazei metalice pentru fitil
      description: Materialul bazei/susținătorului atașat (frecvent din tablă cositorită),
        relevant pentru rezistența la coroziune și preferințele de reglementare (de
        ex., evitarea plumbului).
    wick_tab_shape:
      name: Forma bazei metalice a fitilului
      description: Forma/factorul de formă al plăcuței de bază a fitilului.
    wick_type_included:
      name: Tipul de fitil inclus
      description: Specifică materialul/tipul fitilului inclus în kit.
    wig_fiber_material:
      name: Materialul fibrelor perucii
      description: Identifică fibra principală utilizată pentru părul perucii, astfel
        încât cumpărătorii să poată alege cu ușurință între varietățile din păr uman
        și opțiunile sintetice, cu caracteristici diferite de stilizare și longevitate.
    wildlife_attractant_scent:
      name: Miros atractant pentru faună sălbatică
      description: Identifică mirosul principal utilizat pentru a atrage animalele
        sălbatice, acoperind mirosurile alimentare naturale și mirosurile de tip feromoni.
    willow_grade:
      name: Calitatea lemnului de salcie
      description: Specifică gradul de calitate al lemnului de salcie utilizat, indicând
        structura fibrei și nivelul general de performanță.
    willow_type:
      name: Tipul salciei
      description: Identifică tipul de salcie sau materialul alternativ utilizat pentru
        lama bâtei, care afectează considerabil performanța, durabilitatea și prețul.
    wind_up_mechanism_type:
      name: Tip de mecanism cu arc
      description: Specifică modul în care jucăria este întoarsă sau activată.
    wind_up_toy_movement_pattern:
      name: Modelul de mișcare al jucăriei cu cheiță
      description: Descrie mișcarea principală produsă atunci când este întoarsă.
    windbreak_purpose:
      name: Scopul paravântului
      description: Definește principalul caz de utilizare prevăzut pentru paravânt.
    windfoil_board_mounting_system:
      name: Sistemul de montare a plăcii de windfoil
      description: Specifică cutia foliei sau interfața de montare integrată în placa
        de windfoil.
    windfoil_sail_style:
      name: Stilul velei de windfoil
      description: Clasifică vela în funcție de stilul de utilizare sau disciplina
        prevăzută.
    winding_direction:
      name: Direcția de întoarcere
      description: Indică modelul de rotație acceptat de dispozitivul de întors ceasuri
        (în sens orar, în sens antiorar sau bidirecțional).
    winding_method:
      name: Metoda de înfășurare
      description: Modul în care bătătura este menită să fie înfășurată/încărcată
        pentru a fi utilizată în suveică.
    winding_speed_control_type:
      name: Tipul de control al vitezei de înfășurare
      description: Indică metoda utilizată pentru a controla viteza de înfășurare
        în timpul utilizării.
    winding_type:
      name: Tipul de înfășurare
      description: Specifică construcția de înfășurare a corzilor de bas (profilul
        de înfășurare exterior).
    windlass_control_station_type:
      name: Tipul stației de control al vinciului de ancoră
      description: Tipul de interfață de control inclusă sau acceptată pentru operarea
        vinciului de ancoră.
    windlass_mount_type:
      name: Tipul de montare al vinciului de ancoră
      description: Unde/cum se intenționează montarea vinciului de ancoră pe barcă.
    window_component_location:
      name: Locația componentei geamului
      description: Specifică pentru ce fereastră/deschidere se aplică piesa în interiorul
        vehiculului (de ex., parbriz/geamul portierei/lunetă/geamul lateral spate).
    window_configuration:
      name: Configurație a ferestrei
      description: Indică prezența și dimensiunea relativă a ferestrelor transparente
        de vizibilitate pe aripa de wingfoil.
    window_glass_construction:
      name: Construcția geamului vehiculului
      description: Specifică construcția de siguranță/laminarea geamului vehiculului.
    window_glass_features:
      name: Caracteristicile geamului
      description: Indică dacă geamul acceptă tehnologii integrate ale vehiculului
        (de ex., suport pentru senzorul de ploaie, suport pentru cameră).
    window_glass_finish:
      name: Finisajul geamului
      description: Specifică finisajul/nuanța/tratamentul de confidențialitate al
        geamului autovehiculului.
    window_glass_tint_color:
      name: Culoare de nuanțare a geamului ferestrei
      description: Specifică nuanța culorii foliei prezente în geam (nu culoarea generală
        a produsului).
    window_glass_tint_level:
      name: Nivelul de nuanțare al geamului
      description: Indică nivelul aproximativ de întunecare al nuanțării din fabrică/pentru
        intimitate a geamului (nu folie aftermarket). Utilizați niveluri descriptive
        atunci când VLT-ul (transmiterea luminii vizibile) exact nu este cunoscut.
    window_net_latch_mechanism:
      name: Mecanismul de închidere al plasei pentru geam
      description: Specifică mecanismul de închidere/deschidere utilizat pentru plasa
        de geam (de ex., buton, manetă, cataramă stil centură de siguranță).
    window_net_mounting_hardware:
      name: Elemente de montare pentru plasa de geam
      description: Identifică tipul de elemente de montare sau metoda de fixare utilizată
        pentru instalarea plasei de geam (de ex., prindere cu cleme, șuruburi, stil
        cârlig/tijă) sau dacă elementele sunt incluse.
    window_net_opening_direction:
      name: Direcția de deschidere a plasei de geam
      description: Specifică modul în care plasa de geam se deschide/eliberează în
        raport cu ocupantul pentru evacuare și conformitatea cu regulile.
    window_regulator_operation:
      name: Acționarea macaralei geamului
      description: Specifică modul de acționare al macaralei geamului (manivelă manuală
        sau electrică).
    windshield_coverage_area:
      name: Zona de acoperire a parbrizului
      description: Specifică ce părți ale exteriorului frontal al vehiculului trebuie
        să protejeze prelata pentru parbriz (de ex., doar parbrizul comparativ cu
        cazul în care include ștergătoarele, oglinzile, geamurile laterale sau marginea
        capotei).
    windshield_mount_attachment_method:
      name: Metodă de atașare a suportului pentru parbriz
      description: Specifică modul în care suportul aderă la sau se prinde de suprafața
        parbrizului.
    windshield_washer_fluid_seasonality:
      name: Sezonalitatea lichidului de parbriz
      description: Indică anotimpul/clima vizată sau utilizarea principală a formulei
        lichidului de parbriz (de ex., degivrant pentru iarnă, spălare insecte pentru
        vară, all-season).
    windsurf_fin_style:
      name: Stil de aripioare de windsurfing
      description: Clasifică aripioara în funcție de disciplina de navigație sau stilul
        de utilizare prevăzut (de ex., valuri, slalom, iarbă de mare).
    windsurfing_connection_standard:
      name: Standardul de conectare pentru windsurf
      description: Interfața mecanică sau tipul de cutie utilizat pentru a atașa piesa
        de placă sau de greement.
    windsurfing_sail_style:
      name: Stil de velă pentru windsurfing
      description: Clasifică disciplina prevăzută a velei sau utilizarea acesteia,
        precum ar fi valuri, freeride sau folie.
    wine_additive_type:
      name: Tipul de aditiv pentru vin
      description: Specifică ce tip de produs pentru obținerea vinului roșu este acesta
        (ingredient, aditiv, drojdie, agent de limpezire, kit etc.).
    wine_body:
      name: Corpolența vinului
      description: Descrie greutatea percepută și senzația pe care o lasă vinul în
        gură.
    wine_carbonation:
      name: Carbonatarea vinului
      description: Indică dacă vinul este liniștit, ușor efervescent sau spumant și,
        acolo unde este relevant, intensitatea efervescenței.
    wine_making_ingredient_type:
      name: Tipul de ingredient pentru vinificație
      description: Specifică categoria de ingrediente funcționale pentru aditivii
        și ingredientele consumabile utilizate în vinificație.
    wine_making_stage:
      name: Etapa de vinificație
      description: Identifică etapa din procesul de vinificație căreia îi este destinat
        produsul.
    wine_style:
      name: Stilul vinului
      description: Clasifică stilul general de producție al vinului, în afară de culoare,
        cum ar fi vin liniștit, spumant sau fortificat.
    winemaking_process_stage:
      name: Etapa procesului de vinificație
      description: Indică etapa principală a procesului de vinificație pentru care
        sunt destinate proviziile.
    wing_count:
      name: Număr de aripi
      description: Numărul de aripi/brațe ale bumerangului.
    wing_handle_type:
      name: Tip de mâner pentru aripă
      description: Specifică stilul sistemului de prindere pentru mâini pe aripa de
        wingfoil.
    wing_part_type:
      name: Tipul piesei de aripă
      description: Identifică componenta specifică sau piesa de schimb pentru o aripă
        de wingfoil.
    wingfoiling_style:
      name: Stilul de wingfoiling
      description: Indică disciplina specifică de wingfoiling sau stilul de utilizare
        pe care îl vizează produsul.
    wiper_arm_finish:
      name: Finisajul brațului ștergătorului
      description: Finisajul suprafeței sau stratul de protecție aplicat brațului
        ștergătorului, având impact asupra rezistenței la coroziune și a aspectului.
    wiper_arm_pivot_mount_type:
      name: Tipul de montare pe pivot a brațului ștergătorului
      description: Specifică modul în care brațul ștergătorului se montează pe timoneria
        sau pivotul ștergătorului vehiculului.
    wiper_blade_attachment_type:
      name: Tipul de prindere al lamelei ștergătorului
      description: Specifică stilul conectorului/prinderii utilizat pentru a monta
        lamela ștergătorului pe brațul ștergătorului.
    wiper_blade_rubber_material:
      name: Materialul cauciucului lamelei ștergătorului
      description: Materialul elementului de ștergere (inserție/rezervă) care intră
        în contact cu geamul.
    wiper_system_position:
      name: Poziția sistemului de ștergătoare
      description: Indică poziția de montare pe vehicul pentru sistemul de ștergătoare.
    wire_coating_material:
      name: Materialul de acoperire al sârmei
      description: Specifică materialul de acoperire exterior/cămășii aplicat pe sârmă
        (nu materialul miezului firului), care poate afecta rezistența la abraziune
        și cât de ușor trece prin orificiile mărgelelor.
    wire_coating_type:
      name: Tipul de acoperire al sârmei
      description: Specifică dacă și cum este acoperit/învelit firul (pentru culoare,
        protecție și textură).
    wire_construction_type:
      name: Tip de construcție a sârmei
      description: Specifică construcția fizică a sârmei pentru mărgele, cum ar fi
        torsionat comparativ cu solid și dacă este acoperit.
    wire_finish:
      name: Finisajul sârmei
      description: Specifică finisajul suprafeței, acoperirea sau placarea aplicată
        pe sârmă (de ex., lustruită, emailată, galvanizată, placată), care afectează
        aspectul și rezistența la pătare/coroziune.
    wire_gauge_awg:
      name: Grosimea firului (AWG)
      description: Dimensiunea American Wire Gauge (AWG) a conductorilor utilizați
        în cablaj.
    wire_insulation_material:
      name: Material de izolație a sârmei
      description: Materialul izolației/cămășii firului utilizat în cablaj (are impact
        asupra rezistenței la temperatură/chimice).
    wire_packaging_type:
      name: Tip de ambalare a sârmei
      description: Specifică modul în care sârma/firul este vândută/ambalată.
    wire_shape_profile:
      name: Forma/profilul sârmei
      description: Descrie forma secțiunii transversale a sârmei.
    wiring_configuration:
      name: Configurația cablajului
      description: Indică dacă spada de scrimă este furnizată precablată pentru punctaj
        electric, necablată, wireless sau destinată antrenamentului non-electric.
    wobbler_style:
      name: Stil de nălucă oscilantă
      description: Definește designul specific/stilul de acțiune al nălucii, cum ar
        fi momeli artificiale crankbait sau jerkbait.
    wood_block_surface_preparation:
      name: Pregătirea suprafeței blocului de lemn
      description: Indică starea suprafeței gata de utilizare a blocului de lemn pentru
        finisare și artizanat.
    wood_grain_direction:
      name: Direcția fibrei lemnului
      description: Direcția fibrei lemnului în raport cu cea mai lungă dimensiune
        a produsului (importantă pentru rezistență, comportamentul la tăiere și aspect).
    wood_slice_edge_style:
      name: Stilul marginii feliei de lemn
      description: Starea marginii feliei, cum ar fi marginea din scoarță naturală
        comparativ cu marginea netedă/șlefuită.
    wooden_block_special_features:
      name: Caracteristici speciale ale cuburilor de lemn
      description: Caracteristici funcționale notabile incluse în setul de cuburi
        de lemn.
    woodwind_body_construction:
      name: Construcția corpului instrumentului de suflat din lemn
      description: Indică dacă instrumentul este realizat dintr-o singură piesă sau
        din mai multe secțiuni (de ex., din 2 piese/din 3 piese), afectând curățarea,
        depozitarea și portabilitatea.
    woodwind_polishing_cloth_intended_use:
      name: Utilizarea prevăzută a lavetei de lustruit pentru instrumente de suflat
        din lemn
      description: Specifică ce trebuie să curețe/lustruiască laveta în primul rând
        la un instrument de suflat din lemn.
    woodwind_small_part_type:
      name: Tipul de piesă mică pentru instrumente de suflat din lemn
      description: Specifică ce fel de piesă mică de schimb pentru clarinet este articolul
        (de ex., componente pentru clape, pernițe/plută/pâslă, inele).
    woofer_mounting_type:
      name: Tip de montare a woofer-ului
      description: Modul în care wooferul trebuie montat/utilizat (în aer liber comparativ
        cu în interior) și formele comune de montare auto.
    woofer_surround_material:
      name: Materialul suspensiei wooferului
      description: Materialul utilizat pentru suspensia wooferului (inelul de suspensie
        exterior).
    worn_on_finger:
      name: Purtat pe deget
      description: Specifică pe ce deget trebuie să fie purtat ghidajul.
    wrap_style:
      name: Stilul de înfășurare
      description: Indică de câte ori centura trebuie să se înfășoare în jurul taliei.
    wrapping_occasion:
      name: Ocazia de ambalare
      description: Ocazia principală de oferire a cadourilor/sărbătoare pentru care
        se utilizează hârtia de ambalat.
    wrapping_paper_features:
      name: Caracteristicile hârtiei de ambalat
      description: Proprietăți funcționale și legate de durabilitate ale hârtiei de
        ambalat, cum ar fi rezistența la rupere, conținutul reciclat sau formatele
        de coli pretăiate.
    wrestling_dummy_design:
      name: Designul manechinului de lupte
      description: Forma generală a corpului sau postura manechinului, cum ar fi forma
        umană în picioare sau sac de aruncare, care dictează exercițiile de antrenament
        aplicabile.
    wrestling_mat_safety_certifications:
      name: Certificări de siguranță ale saltelei de lupte
      description: Enumeră orice certificări sau standarde de siguranță ale industriei
        sau organismelor sportive pe care salteaua le îndeplinește.
    wrist_strap_style:
      name: Stil al curelei pentru încheietură
      description: Descrie stilul curelei pentru încheietură (sau lipsa acesteia)
        care afectează suportul și potrivirea.
    wrist_support_style:
      name: Stilul de suport pentru încheietură
      description: Identifică construcția sau stilul suportului pentru încheietură,
        cum ar fi orteză, mănușă, bandă sau fașă, pentru a susține preferințele utilizatorului
        și selectarea performanței.
    xylophone_range_octaves:
      name: Gamă a xilofonului (octave)
      description: Amplitudinea totală a xilofonului exprimată în octave (de ex.,
        2,5 octave, 3 octave, 4 octave).
    xylophone_resonator_type:
      name: Tipul rezonatorului de xilofon
      description: Tipul sistemului de rezonatoare utilizat pentru amplificarea tonului
        (dacă există).
    yam_variety:
      name: Soi de ignamă
      description: Specifică soiul sau varietatea comună de ignamă vândută (de ex.,
        mov, galbenă, picior de elefant).
    yarn_cutter_physical_style:
      name: Stilul fizic al tăietorului de fire
      description: Identifică stilul fizic al unui tăietor de fire (de ex., pandantiv,
        inel, foarfece) pentru a sprijini navigarea și filtrarea în cadrul acestei
        categorii.
    yarn_finish_or_effect:
      name: Finisajul sau efectul firului
      description: Evidențiază tratamentele speciale vizuale sau funcționale aplicate
        firului, cum ar fi fluorescența sau sclipirea metalică.
    yarn_guide_style:
      name: Stilul ghidajului de fir
      description: Stilul fizic al componentei de ghidare a firului.
    yarn_swift_adjustability:
      name: Reglaj de vârtelniță pentru fire
      description: Indică dacă și cum poate fi ajustată vârtelnița (extensibilă, pliabilă/rabatabilă),
        afectând depozitarea și gama de dimensiuni ale sculurilor pe care le poate
        manipula.
    yarn_swift_bearing_type:
      name: Tipul de rulment al vârtelniței pentru fire
      description: Descrie mecanismul de suport al rotației (de ex., rulment cu bile)
        care afectează fluiditatea și viteza de înfășurare.
    yeast_application:
      name: Utilizare a drojdiei
      description: Indică utilizarea principală – culinară sau de fermentare – prevăzută
        pentru produsul pe bază de drojdie.
    yo_yo_accessory_part_type:
      name: Tip de accesoriu/piesă pentru yo-yo
      description: Identifică tipul de piesă de schimb sau accesoriu pentru yo-yo
        reprezentat de produs (de ex., sfoară, rulment, pernițe de răspuns).
    yo_yo_axle_system_type:
      name: Tipul sistemului de ax pentru yo-yo
      description: Abordarea constructivă pentru axul de yo-yo (de ex., ax fix comparativ
        cu transax), având impact asupra senzației de joc și a întreținerii.
    yo_yo_bearing_size_class:
      name: Clasa de mărime a rulmentului pentru yo-yo
      description: Clasa standardizată de mărime a rulmentului utilizată de yo-yo,
        dacă este cazul.
    yo_yo_bearing_type:
      name: Tipul rulmentului pentru yo-yo
      description: Configurația rulmentului care influențează capacitatea de reacție
        și caracteristicile de rotire.
    yo_yo_play_style:
      name: Stilul de joc cu yo-yo
      description: Stilul de joc principal vizat pentru yo-yo, reflectând disciplina
        cu sfori/trucuri pentru care este conceput produsul.
    yo_yo_response_system:
      name: Sistemul de răspuns pentru yo-yo
      description: Specifică mecanismul de răspuns pentru yo-yo pentru care este concepută
        această piesă (compatibilitate).
    yo_yo_responsiveness:
      name: Reactivitatea jucăriei yo-yo
      description: Dacă yo-yo se întoarce în mână la o smucitură (reactiv) sau necesită
        o tehnică de prindere (non-reactiv).
    yo_yo_string_material:
      name: Materialul sforii pentru yo-yo
      description: Compoziția materialului sforii pentru yo-yo.
    yogurt_base_ingredient:
      name: Ingredient de bază pentru iaurt
      description: Identifică sursa principală pe bază de lapte sau plante utilizată
        pentru obținerea iaurtului, esențială pentru preferințele dietetice și considerentele
        legate de alergeni.
    yoke_type:
      name: Tipul jugului
      description: Identifică stilul suportului sau al jugului care susține arma de
        foc pe monopied.
    zill_playing_style:
      name: Stil de interpretare pentru zill
      description: Contextul/stilul de interpretare prevăzut (în mod obișnuit dans
        din buric comparativ cu variante orchestrale/culturale).
    zill_strap_material:
      name: Material al curelei pentru zill
      description: Materialul curelei/elasticului pentru degete utilizat pentru a
        ține talgerele (dacă sunt incluse), având impact asupra confortului, durabilității
        și prinderii.
    zills_strap_adjustability:
      name: Posibilitatea de ajustare a curelei pentru talgere
      description: Dacă și cum cureaua/elasticul inclus poate fi ajustat pentru potrivire.
    zipper_application:
      name: Aplicația fermoarului
      description: Specifică proiectul sau aplicația pentru care este conceput fermoarul.
    zipper_chain_type:
      name: Tipul de lanț al fermoarului
      description: Specifică construcția/tipul lanțului/dinților fermoarului.
    zipper_end_type:
      name: Tipul de capăt al fermoarului
      description: Indică modul în care se termină fermoarul și dacă se separă (capăt
        deschis) sau este cu capăt închis (nu se separă), inclusiv accesoriile comune
        de capăt separabil utilizate la fermoarele artizanale.
    zipper_gauge:
      name: Dimensiunea fermoarului
      description: 'Indică dimensiunea/desemnarea mărimii lanțului fermoarului, exprimată
        de obicei ca un număr cu un # (de exemplu, #3 sau #5), care se corelează cu
        lățimea dintelui/spiralei și utilizarea prevăzută.'
    zipper_opening_length:
      name: Lungimea deschiderii fermoarului
      description: Definește cât din deschiderea frontală are fermoar, distingând
        stilurile cu fermoar complet de cele cu jumătate de fermoar sau un sfert de
        fermoar.
    zipper_pull_material:
      name: Materialul cheiței fermoarului
      description: Specifică materialul cheiței fermoarului sau al clapetei de tragere
        (partea pe care o prindeți), diferit de dinții/lanțul și banda fermoarului.
    zipper_pull_side:
      name: Partea cursorului fermoarului
      description: Specifică de pe ce parte/părți ale fermoarului este accesibilă
        urechea de tragere.
    zipper_pull_strap_cord_tab_material:
      name: Materialul șnurului/urechii/cheiței fermoarului
      description: Materialul componentei tip șnur/ureche/ciucure atașată la cheița
        fermoarului (dacă este prezentă), excluzând corpul/accesoriul principal al
        cheiței fermoarului.
    zipper_reversibility_mechanism:
      name: Mecanismul de reversibilitate al fermoarului
      description: Specifică modul în care fermoarul este reversibil (de ex., cursor
        cu două fețe comparativ cu cursor cu clapetă rabatabilă/blocare automată,
        conceput pentru haine reversibile).
    zipper_separating_type:
      name: Tipul de separare al fermoarului
      description: Indică dacă fermoarul se separă la bază/vârf sau are capăt închis,
        pentru potrivirea cu jachete, saci de dormit, genți etc.
    zipper_side:
      name: Partea fermoarului
      description: Specifică partea pe care este situat fermoarul principal atunci
        când sacul de dormit se află cu fața în sus.
    zipper_slider_material:
      name: Materialul cursorului fermoarului
      description: Specifică materialul cursorului fermoarului (mecanismul mobil),
        care poate avea impact asupra forței și a rezistenței la coroziune.
    zipper_slider_pull_configuration:
      name: Configurația cursorului/cheiței fermoarului
      description: Indică dacă fermoarul are un singur cursor/cheiță sau două și dacă
        cheițele sunt pe una sau pe ambele fețe ale cursorului.
    zipper_style:
      name: Stil de fermoar
      description: Indică lungimea fermoarului sau prezența acestuia pe articolul
        de îmbrăcăminte (de ex., fără fermoar, un sfert de fermoar, o jumătate de
        fermoar, fermoar complet).
    zipper_tape_material:
      name: Material al benzii fermoarului
      description: Specifică materialul principal al benzii fermoarului (părțile din
        material textil) care este cusută în proiect.
    zipper_teeth_type:
      name: Tip de dinți ai fermoarului
      description: Specifică stilul de construcție al lanțului/dinților fermoarului
        (de ex., spirală, plastic turnat, metal, invizibil), care afectează flexibilitatea,
        rezistența și aplicațiile tipice.
