    detectable_drugs:
      name: Droguri detectabile
      description: Specifică tipurile de droguri care pot fi identificate printr-un
        test, de exemplu, marijuana, opiacee
    detection_technology:
      name: Tehnologie de detectare
      description: Specifică principiul științific sau markerul biologic pe care testul
