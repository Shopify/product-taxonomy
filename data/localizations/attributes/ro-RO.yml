    headjoint_cut:
      name: Decupaj articulație
      description: Specifică decupajul articulației flautului, de exemplu ondulat,
        în Z
    headphone_cushion_shape:
      name: Formă pernă căști
      description: Descrie conturul fizic al pernuței pentru a ajuta utilizatorii
        să o potrivească cu geometria cupei urechii
    headphone_driver_technology:
      name: Tehnologie driver căști
      description: Definește tipul de traductor folosit pentru a crea sunet în căști
    headphone_jack_type:
      name: Tip mufă căști
      description: Specifică dimensiunea mufei pentru căști, cum ar fi 3,5 mm, USB
        tip C
    headphone_style:
      name: Stil căști
      description: Definește designul căștilor, de exemplu, pe gât, căști intraauriculare
    headset_connection_type:
      name: Tip conexiune cască
      description: Specifică interfața disponibilă (interfețele disponibile) pentru
        conectarea căștilor externe la telefon
    headwear_features:
      name: Caracteristici articole pentru acoperire cap
      description: Evidențiază caracteristicile unice ale articolelor pentru acoperirea
        capului, de exemplu, pliabile, versatile
    hearing_aid_compatibility:
      name: Compatibilitate aparat auditiv
      description: Specifică dacă telefonul îndeplinește cerințele de compatibilitate
        cu aparatele auditive (HAC) și, dacă este cazul, nivelul de rating
    hearing_aid_ear_side:
      name: Partea urechii pentru aparat auditiv
      description: Specifică dacă aparatul auditiv este proiectat pentru urechea stângă,
        urechea dreaptă, sau ambele urechi
    hearing_aid_features:
      name: Caracteristici aparat auditiv
      description: Evidențiază caracteristicile speciale ale aparatelor auditive,
        cum ar fi acumulatorul reîncărcabil sau digital
    hearing_aid_material:
      name: Material aparat auditiv
      description: Identifică materialul principal utilizat pentru realizarea aparatelor
        auditive, cum ar fi plasticul sau siliconul
    hearing_loss_level:
      name: Nivel de pierdere a auzului
      description: Specifică gradul de pierdere a auzului pe care aparatul auditiv
        este proiectat să îl abordeze
    hearing_protection_class:
      name: Clasa de protecție auditivă
      description: Specifică clasa de certificare locală care indică performanța de
        atenuare conform standardelor regionale
    heat_function:
      name: Funcție încălzire
      description: Indică dacă un produs are o funcție de încălzire, de obicei pentru
        articolele de îngrijire personală
    heat_level:
      name: Nivel de iuțeală
      description: Indică cât de iuți sunt produsele alimentare și băuturile, cum
        ar fi moderat sau foarte iute
    heat_settings:
      name: Setări căldură
      description: Specifică nivelurile de control al temperaturii unui produs, de
        exemplu scăzută, medie, ridicată
    heat_source:
      name: Sursă de căldură
      description: Specifică tipul de sursă de căldură din dispozitivele de încălzire,
        de exemplu, gel termic, posibilitate de încălzire la microunde
    heat_therapy_type:
      name: Tip de terapie termică
      description: Indică dacă produsul oferă căldură umedă, căldură uscată, sau ambele
    heating_instructions:
      name: Instrucțiuni de încălzire
      description: Specifică modul de încălzire adecvată a produsului, de exemplu
        în cuptor, pe plită
    heating_method:
      name: Metodă de încălzire
      description: Specifică tehnica folosită pentru încălzire, de obicei pentru încălzitoarele
        de biberoane, de exemplu, la abur, în baie de apă
    heating_pad_design:
      name: Design pernă de încălzire
      description: Specifică stilul fizic sau factorul de formă al pernei de încălzire
    heating_pad_features:
      name: Caracteristici pernă de încălzire
      description: Evidențiază caracteristici funcționale speciale sau de conveniență
        încorporate în perna de încălzire
    heating_speed:
      name: Viteză de încălzire
      description: Indică viteza cu care un produs se încălzește, de exemplu rapid,
        lent
    heel_height_type:
      name: Tip înălțime toc
      description: Definește înălțimea tocului unui pantof, cum ar fi plat sau înalt
    heel_shoe_type:
      name: Tip pantof cu toc
      description: Identifică stilul tocului unui pantof, cum ar fi tip platformă
        sau talpă ortopedică
    height_adjustment:
      name: Reglare înălțime
      description: Specifică dacă înălțimea unui produs poate fi modificată, de exemplu
        înălțime fixă, înălțime reglabilă
    helicobacter_pylori_detection_method:
      name: Metodă de detectare Helicobacter pylori
      description: Identifică principiul biologic sau abordarea pe care kitul o folosește
        pentru a detecta infecția cu Helicobacter pylori
    helmet_shade_design:
      name: Design protecție împotriva luminii mască
      description: Descrie tipul de mecanism de protecție împotriva luminii pentru
        măștile de sudură, cum ar fi fix sau cu întunecare automată
    herbal_supplement_health_goal:
      name: Obiectivul de sănătate al suplimentului de origine vegetală
      description: Indică obiectivul principal de wellness, sistemul corporal sau
        zona fiziologică pe care suplimentul pe bază de plante este destinat să îl
        susțină (de exemplu, suport imunitar, ameliorarea stresului, suport pentru
        ficat și detoxifiere)
    hitch_class:
      name: Clasă cârlig
      description: Identifică capacitatea de remorcare a cârligului unui vehicul,
        cum ar fi Clasa I sau Clasa II
    hitch_type:
      name: Tip cârlig
      description: Specifică metoda de montare pentru remorci de biciclete, cum ar
        fi pe osie sau cu tijă pe scaun
    hiv_test_generation:
      name: Generație test HIV
      description: Indică generația testului de diagnostic HIV, reflectând îmbunătățiri
        în sensibilitate și fereastra de detecție
    hockey_equipment_included:
      name: Echipament de hochei inclus
      description: Specifică articolele dintr-un set de echipament de lacrosse, cum
        ar fi racheta de lacrosse sau protecțiile pentru umeri
    hold_level:
      name: Nivel fixare
      description: Definește puterea de fixare a produselor pentru coafat, de exemplu,
        ușoară, puternică
    hole_plating_type:
      name: Tip placare găuri
      description: Indică dacă găurile plăcii sunt neplacate, placate prin gaură sau
        prezintă caneluri de via, ceea ce afectează lipirea și conectivitatea între
        straturi
    hook_design:
      name: Design agrafă
      description: Identifică designul agrafelor, cataramelor și elementelor de fixare,
        de exemplu cu resort, cu două capete
    hook_grip_design:
      name: Design mâner croșetă
      description: Descrie stilul mânerului croșetelor, cum ar fi anti-alunecare sau
        ergonomic
    hook_size:
      name: Dimensiune croșetă
      description: Identifică dimensiunea croșetelor, cum ar fi B, G sau I
    hook_type:
      name: Tip cârlig
      description: Identifică tipul de cârlig pentru ambarcațiuni, cum ar fi fix sau
        telescopic
    hoop_shape:
      name: Formă brățară
      description: Descrie forma unui articol de tip brățară, de obicei plase de pescuit,
        de exemplu, în formă de D
    horse_category:
      name: Categorie cai
      description: Clasifică echipamentul de călărie în funcție de mărimea și rasa
        cailor, de exemplu ponei, standard
    horse_grooming_accessories_included:
      name: Accesorii de îngrijire cai incluse
      description: Identifică articolele suplimentare incluse în produsele pentru
        îngrijirea cailor, cum ar fi lamele sau cutia pentru transport
    hose_material:
      name: Material furtun
      description: Specifică tipul de material utilizat pentru furtunuri, cum ar fi
        PVC sau aluminiu
    host_interface:
      name: Interfață host
      description: Specifică metoda utilizată pentru conectarea la hard disk-uri,
        cum ar fi Thunderbolt 3 sau SATA
    housing_color:
      name: Culoare carcasă
      description: Identifică culoarea carcasei exterioare a unui produs, cum ar fi
        bej sau transparent
    housing_material:
      name: Material carcasă
      description: Specifică materialul utilizat pentru stratul exterior al produsului,
        de exemplu oțel inoxidabil, lemn
    housing_pattern:
      name: Model carcasă
      description: Descrie designul sau motivul de pe exteriorul unui produs, cum
        ar fi abstract sau geometric
    hub/switch_storage_options:
      name: Opțiuni de stocare hub/switch
      description: Identifică capacitățile de stocare ale echipamentelor de tip hub
        sau switch, cum ar fi cu stivuibile sau nestivuibile
    humidification_system:
      name: Sistem de umidificare
      description: Descrie tipul de opțiune de umidificare inclusă sau acceptată de
        aparatul PAP
    humidifier_design:
      name: Design umidificator
      description: Descrie stilul unui umidificator, cum ar fi cu posibilitatea de
        fixare sau portabil
    humidity_control:
      name: Control umiditate
      description: Indică capacitatea produsului de a regla nivelul de umiditate,
        de obicei pentru umidificatoarele pentru trabucuri, de exemplu, 0,65
    humidity_control_method:
      name: Metodă de control a umidității
      description: Specifică tipul de reglare a umidității pentru dispozitive, de
        exemplu, semi-automat, manual
    hunting/survival_knife_design:
      name: Design cuțit de vânătoare/supraviețuire
      description: Identifică designul unui cuțit de vânătoare/supraviețuire, cum
        ar fi vârf ascuțit sau vârf pieziș (tanto)
    hunting_blind_design:
      name: Design cort de vânătoare
      description: Specifică tipul de design al cortului de vânătoare, de exemplu
        fără vizor, transparent într-un singur sens
    hvac_control_type:
      name: Tip comandă HVAC
      description: Identifică tipul de comandă HVAC, cum ar fi digital sau manual
    ice_pack_type:
      name: Tip acumulator gheață
      description: Specifică materialul sau tehnologia utilizată pentru un acumulator
        de gheață, de exemplu pachet cu gel, pachet cu spumă
    icon_type:
      name: Tip pictogramă
      description: Specifică tipul pictogramei, cum ar fi folder sau rețele de socializare
    identity_verification_requirement:
      name: Cerințe de verificare a identității
      description: Specifică dacă înregistrarea cu nume real sau verificarea identității
        eKYC este necesară înainte ca SIM-ul sau eSIM-ul să poată fi utilizat
    ignition_system:
      name: Sistem de aprindere
      description: Identifică tipul de sistem de aprindere pentru generatoare, cum
        ar fi manual sau electronic
    illumination_technique:
      name: Tehnică de iluminare
      description: Identifică metoda de iluminare utilizată pentru microscoape, cum
        ar fi cu câmp luminos sau câmp întunecat
    image_formats_supported:
      name: Formate de imagini acceptate
      description: Identifică tipurile de fișiere imagine pe care le poate genera
        o cameră, cum ar fi JPEG sau RAW
    image_sensor_size:
      name: Dimensiune senzor imagine
      description: Indică dimensiunea senzorului de imagine pentru camere video, cum
        ar fi 1/1,7 sau cadru complet
    immobilizer_type:
      name: Tip imobilizator
      description: Specifică tipul de dispozitiv folosit pentru a preveni furtul vehiculului,
        de exemplu, blocarea anvelopelor sau blocarea volanului
    incense_fragrance:
      name: Parfum produse cu tămâie
      description: Identifică parfumul unui produs pe bază de tămâie, cum ar fi lavanda
        sau lemnul de santal
    incense_kit_items_included:
      name: Articole incluse în kitul de produse cu tămâie
      description: Identifică elementele conținute într-un kit pentru fabricarea produselor
        pe bază de tămâie, de exemplu, bețișoare de bambus, matrițe
    incense_type:
      name: Tip produs tămâie
      description: Identifică forma produsului pe bază de tămâie, cum ar fi con sau
        bețișor
    incontinence_aid_features:
      name: Caracteristici produse incontinență
      description: Descrie caracteristicile specifice ale produselor pentru incontinență,
        cum ar fi fără scurgeri sau hipoalergenice
    incontinence_pad_type:
      name: Tip de absorbant pentru incontinență
      description: Definește stilul sau forma specifică a absorbantului (de exemplu,
        protecție zilnică, protecție, perniță suplimentară)
    inductance_tolerance:
      name: Toleranță inductanță
      description: Definește deviația procentuală permisă de la valoarea nominală
        de inductanță
    industry_focus:
      name: Sector de activitate vizat
      description: Evidențiază sectoarele vizate de un produs, cum ar fi învățământul
        sau producția
    infant_age_group:
      name: Grup de vârstă sugari
      description: Clasifică produsele potrivite pentru anumite grupe de vârstă pentru
        sugari, de exemplu nou-născuți, 0-6 luni
    inflation_method:
      name: Metodă umflare
      description: Identifică modul în care este umflat un produs, cum ar fi automat
        sau hidrostatic
    ingredient_category:
      name: Categorie ingrediente
      description: Clasifică tipul de ingrediente din vitamine și suplimente, de exemplu
        fibre, plante
    ingredient_origin:
      name: Origine ingrediente
      description: Specifică sursa ingredientelor produsului, de exemplu naturale,
        sintetice
    ingredient_pathway:
      name: Proveniența ingredientelor
      description: Indică dacă ingredientele pentru parfumerie sunt obținute în mod
        natural prin separare fizică din biomasă fără modificări chimice sau sunt
        sintetizate prin alte metode
    ingredients:
      name: Ingrediente
      description: Specifică principalele componente utilizate pentru formula unui
        produs, de exemplu, oxid de zinc, aloe vera
    ingress_protection_ip_rating:
      name: Grad de protecție la pătrundere (IP)
      description: Indică clasa oficială de rezistență la apă/praf IP cu care respectă
        carcasa (de exemplu, IP68)
    ink_application_technique:
      name: Tehnică aplicare cerneală
      description: Descrie metoda folosită pentru aplicarea cernelii pentru proiecte
        artistice și de artizanat, cum ar fi serigrafia
    ink_color:
      name: Culoare cerneală
      description: Identifică culoarea cernelii, de obicei pentru produse de birou,
        de exemplu, neagră, argintie
    ink_form:
      name: Formă cerneală
      description: Descrie metoda de ambalare sau de furnizare a cernelii pentru proiecte
        artistice, cum ar fi stiloul sau flaconul
    ink_pattern:
      name: Model cerneală
      description: Identifică tema vizuală a pixurilor sau ștampilelor, de exemplu
        geometric, Crăciun
    ink_type:
      name: Tip cerneală
      description: Identifică tipul de cerneală utilizat pentru un produs, cum ar
        fi pe bază de solvenți sau colorant
    inline_skating_style:
      name: Stil patinaj
      description: Definește stilul specific de patinaj pentru care este conceput
        produsul, cum ar fi patinajul de agrement sau de viteză
    input/output_ports:
      name: Porturi de intrare/ieșire
      description: Identifică tipurile de porturi disponibile pentru un dispozitiv,
        cum ar fi USB sau mufă de ieșire
    input_connection:
      name: Conexiune de intrare
      description: Specifică tipul de conexiune de intrare pentru cablurile audio,
        cum ar fi 3,5 mm sau RCA
    input_connection_type:
      name: Tip de conexiune de intrare
      description: Specifică conectorul sau standardul de interfață acceptat pe partea
        de intrare a convertorului
    input_signal_interface:
      name: Interfață semnal de intrare
      description: Specifică tipul (tipurile) de conexiuni de intrare pe care le acceptă
        convertorul audio
    input_video_interface:
      name: Interfață video de intrare
      description: Specifică tipul (tipurile) de conector video acceptat ca intrare
        de convertorul de scanare
    insole_length_type:
      name: Tipul de lungime al branțului
      description: Definește acoperirea sau stilul lungimii inserției
    installation_accessories_included:
      name: Accesorii de instalare incluse
      description: Identifică orice instrumente sau materiale instructive incluse
        cu bateria necesare pentru instalare
    installation_tools_included:
      name: Instrumente de instalare incluse
      description: Enumeră toate instrumentele sau consumabilele incluse cu piesa
        pentru instalare
    instruction_set_architecture:
      name: Arhitectură set instrucțiuni
      description: Definește arhitectura informatică pe care o poate înțelege un procesor,
        de exemplu pe 32 de biți
    instrument/accessory_finish:
      name: Finisaj instrument/accesoriu
      description: Descrie acoperirea suprafeței sau culoarea unui instrument muzical
        sau accesoriu, cum ar fi placat cu aur sau lăcuit
    instrument_accessory_material:
      name: Material accesoriu instrument
      description: Identifică materialul folosit în accesoriile instrumentelor muzicale,
        cum ar fi lemnul sau alama
    instrument_bow_material:
      name: Material arcuș instrument
      description: Identifică materialul folosit pentru arcușul unui instrument muzical,
        cum ar fi fibra de carbon sau pernambuc
    instrument_color:
      name: Culoare instrument
      description: Identifică culoarea unui instrument muzical, cum ar fi negru sau
        argintiu
    instrument_controller_type:
      name: Tip controler instrument
      description: Identifică instrumentul muzical simulat de un controler de joc,
        cum ar fi chitara sau microfonul
    instrument_material:
      name: Material instrument
      description: Identifică materialul principal folosit pentru un instrument muzical,
        cum ar fi lemn de arțar sau alamă
    instrument_part_material:
      name: Material piesă instrument
      description: Specifică tipul de material utilizat pentru piesele instrumentului,
        cum ar fi lemnul de abanos sau placarea cu aur
    instrument_pattern:
      name: Model instrument
      description: Descrie designul vizual sau motivul unui instrument muzical, cum
        ar fi uni sau texturat
    instrument_string_color:
      name: Culoare corzi instrument
      description: Identifică culoarea corzilor instrumentelor muzicale, cum ar fi
        auriu sau argintiu
    instrument_string_material:
      name: Material corzi instrument
      description: Specifică compoziția corzilor instrumentelor muzicale, cum ar fi
        bronzul sau fluorocarbonul
    instrument_string_pattern:
      name: Model corzi instrument
      description: Indică modelul corzilor de chitară, cum ar fi uni sau geometric
    instrument_support_type:
      name: Tip suport instrument
      description: Identifică tipul de suport folosit pentru un instrument muzical,
        cum ar fi cureaua de umăr sau pupitrul muzical
    insulation_material:
      name: Material izolație
      description: Specifică compoziția izolației, cum ar fi vata minerală sau poliuretanul
        (PU)
    integrated_led_lighting:
      name: Iluminare LED integrată
      description: Indică dacă difuzorul încorporează iluminare LED sau RGB încorporată
        și tipul acesteia
    integrated_power/charging_options:
      name: Opțiuni integrate de alimentare/încărcare
      description: Specifică dacă suportul include prize electrice integrate și/sau
        porturi USB pentru încărcare, îmbunătățind utilitatea pentru dispozitivele
        conectate
    integrated_stand_type:
      name: Tip de suport integrat
      description: Descrie stilul suportului sau al mecanismului de susținere încorporat
        al carcasei
    intended_application:
      name: Destinație de utilizare
      description: Identifică utilizarea specifică a vopselelor și baițurilor, de
        exemplu pentru uși, terase/garduri
    intended_effect:
      name: Efect scontat
      description: Descrie principalul beneficiu pentru starea de bine pentru care
        este comercializat suplimentul cu CBD
    intended_jewelry_type:
      name: Tip de bijuterie pentru care este destinat
      description: Indică tipurile de bijuterii pentru care suportul este conceput
        să le țină sau să le expună
    intended_surface:
      name: Suprafață destinată
      description: Identifică suprafața principală pe care pernița/tamponul este proiectat(ă)
        să o protejeze
    intercom_communication_type:
      name: Tip comunicare interfon
      description: Clasifică formatul fundamental de comunicare pe care unitatea îl
        suportă
    intercom_wiring_type:
      name: Tip cablare interfon
      description: Specifică schema de cablare sau comunicare pentru care o unitate
        de difuzor interfon este proiectată
    interface_type:
      name: Tip interfață
      description: Specifică tipul de conexiune pentru un produs, cum ar fi Bluetooth
        sau USB
    interior_lining_material:
      name: Material căptușeală interioară
      description: Identifică materialul principal care căptușește interiorul cutiei
        de bijuterii, protejând bijuteriile de zgârieturi și uzură
    interior_texture:
      name: Textura interioară
      description: Definește modelul suprafeței interne care ajută la crearea spumei
        în interiorul bolului sau cănii
    internal_drive_form_factor_supported:
      name: Formă unitate internă acceptată
      description: Indică dimensiunile unităților hard disk compatibile cu un dispozitiv,
        de exemplu 2,5 inchi
    internet_radio_form_factor:
      name: Factor de formă radio internet
      description: Definește stilul fizic sau orientarea de montare a radioului internet
    intimate_apparel_features:
      name: Caracteristici articole de lenjerie intimă
      description: Descrie caracteristicile speciale ale articolelor de lenjerie intimă,
        cum ar fi designul respirabil sau confortul
    inverter_type:
      name: Tip invertor
      description: Identifică tipul de invertor pentru piesele EV, cum ar fi unda
        sinusoidală pură sau unda pătrată
    invitation_personalization_design:
      name: Design personalizare invitație
      description: Definește caracteristicile de design ale unei invitații, de exemplu
        confirmare inclusă, personalizabilă
    ironing_features:
      name: Caracteristici sistem de călcat
      description: Specifică caracteristicile speciale ale unui fier de călcat sau
        ale unui sistem de călcat, de exemplu oprire automată, abur
    item_condition:
      name: Stare articol
      description: Indică calitatea unui articol, de obicei vehicule sau piese pentru
        vehicule, de ex., second-hand, recondiționat
    item_material:
      name: Material articol
      description: Specifică substanța principală din care este realizat un articol,
        de obicei pentru piese și accesorii pentru vehicule, de exemplu, cupru, fibră
        de sticlă
    item_style:
      name: Stil articol
      description: Descrie tema estetică sau de design a unui produs, cum ar fi modern
        sau rustic
    j_cup_type:
      name: Tip consolă J-cup
      description: Definește stilul consolelor J-cup pentru echipamentele de ridicare
        de greutăți, de exemplu plat, sandwich
    jaw_advancement_adjustability:
      name: Reglarea avansării maxilarului
      description: Indică dacă și cum poziția maxilarului inferior oferită de dispozitiv
        poate fi ajustată de utilizator
    jaw_material:
      name: Material braț
      description: Identifică materialul folosit pentru brațul unei unelte, cum ar
        fi oțelul sau titanul
    jewelry_cleaning_accessories_included:
      name: Accesorii de curățare bijuterii incluse
      description: Enumeră orice unelte sau accesorii suplimentare furnizate cu produsul
        de curățat (de exemplu, perii, tăvi, cârpe de lustruit)
    jewelry_cleaning_purpose:
      name: Scop curățare bijuterii
      description: Indică funcția principală intenționată a produsului (de exemplu,
        îndepărtarea oxidării, lustruire, acoperire de protecție)
    jewelry_finding_type:
      name: Tip componente bijuterii
