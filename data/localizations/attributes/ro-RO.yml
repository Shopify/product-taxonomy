    extractor_tip_style:
      name: Stil duză extractor
      description: Definește designul vârfului uneltelor de extracție, de exemplu,
        cupă, ac
    eye_care_applicator_type:
      name: Tip aplicator pentru îngrijirea ochilor
      description: Definește tipul de aplicator încorporat sau vârful dozatorului
