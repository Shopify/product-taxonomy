    energy_efficiency_class_sdr:
      name: Clasă de eficiență energetică (SDR)
      description: Specifică nivelul de eficiență energetică a dispozitivelor compatibile
        SDR, de obicei televizoare, de exemplu, A+++
    engine_design:
      name: Design motor
      description: Descrie configurația motorului unui vehicul, de exemplu în 2 timpi
    engine_purpose:
      name: Destinație de utilizare motor
      description: Specifică destinația de utilizare a unui motor mic, cum ar fi pentru
