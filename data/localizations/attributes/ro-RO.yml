      description: Definește designul fizic sau aspectul unui computer, cum ar fi
        all-in-one sau notebook
    computer_server_features:
      name: Caracteristici computer pentru server
      description: Descrie caracteristicile speciale ale unui server, cum ar fi sursa
        de alimentare redundantă sau compatibilitatea cu virtualizarea
    computer_specialized_features:
      name: Caracteristici specializate ale computerului
      description: Evidențiază caracteristici specifice ale computerului, cum ar fi
        sistemul de răcire cu lichid sau iluminarea RGB
    concertina_button_configuration:
      name: Configurare buton concertină
      description: Specifică numărul și aspectul butoanelor de pe o concertină, cum
        ar fi concertina anglo cu 20 de butoane
    condition:
      name: Stare
      description: Descrie starea sau calitatea unui produs, de exemplu în stare excelentă
        (M), în stare proastă (P)
    conditioner_effect:
      name: Efect balsam
      description: Definește beneficiile unui balsam de păr, cum ar fi netezire sau
        anti-mătreață
    condom_compatibility:
      name: Compatibilitate prezervativ
      description: Specifică cu ce materiale de prezervativ lubrifiantul este sigur
        de folosit
    condom_fit_type:
      name: Tip potrivire prezervativ
      description: Descrie dimensionarea generală sau conturul anatomic proiectat
        pentru a îmbunătăți confortul și senzația
    condom_type:
      name: Tip prezervativ
      description: Specifică dacă un prezervativ este destinat bărbaților sau femeilor
    conductivity_gel_application:
      name: Aplicare gel conductiv
      description: Specifică procedura medicală sau diagnostică pentru care gelul
        sau loțiunea conductivă este destinată
    conductor_core_type:
      name: Tip miez conductor
      description: Indică dacă conductorul intern este multifilar sau monofilar
    connecting_thread:
      name: Filet de legătură
      description: Specifică tipul filetului pentru îmbinarea pieselor instalațiilor
        sanitare, de exemplu IPS de 1/2 inci
    connection_method:
      name: Metodă de conectare
      description: Specifică tipul de conexiune pentru un produs, cum ar fi fără fir
        sau cu fir
    connection_type:
      name: Tip conexiune
      description: Specifică tipul de conexiune utilizat de electronice, cum ar fi
        cu fir sau Bluetooth
    connectivity_technology:
      name: Tehnologie de conectivitate
      description: Definește metoda de transfer de date pentru un produs, de exemplu
        Bluetooth, USB
    connectivity_type:
      name: Tip conectivitate
      description: Clarifică dacă placa este fără lipire (stil breadboard) sau proiectată
        pentru lipire
    connector_1_type:
      name: Tip conector 1
      description: Specifică conectorul sau interfața prezentă la primul capăt al
        adaptorului sau cuplajului
    connector_2_type:
      name: Tip conector 2
      description: Specifică conectorul sau interfața prezentă la al doilea capăt
        al adaptorului sau cuplajului
    connector_contact_plating:
      name: Placare contacte conector
      description: Specifică placarea sau acoperirea de suprafață aplicată contactelor
        electrice pentru a îmbunătăți conductivitatea și rezistența la coroziune
    connector_design:
      name: Design conector
      description: Identifică designul conectorilor în lanț sau al zalelor, cum ar
        fi cu capăt deschis sau cu sistem de fixare
    connector_gender:
      name: Gen conector
      description: Specifică genul capetelor conectorului în electronică, de exemplu,
        tată, tată-mamă
    connector_mounting_style:
      name: Stil de montare a conectorului
      description: Indică modul în care conectorul este montat mecanic sau integrat
        într-un ansamblu (de exemplu, PCB, panou, șasiu, cablu, cuplaj)
    connector_orientation:
      name: Orientare conector
      description: Descrie orientarea fizică a interfeței de împerechere în raport
        cu suprafața de montare sau cablul (de exemplu, drept, unghi drept, vertical)
    connector_position:
      name: Poziție conector
      description: Descrie locația conectorului video când ecranul este privit din
        față (de exemplu, jos-dreapta, sus-stânga)
    connector_type:
      name: Tip conector
      description: Specifică stilul sau standardul de conector prezent pe capetele
        firului jumper
    console_accessories_included:
      name: Accesorii consolă incluse
      description: Enumeră accesoriile sau componentele cheie împachetate cu consola
        (de exemplu, controllere, cabluri, dock, jocuri)
    console_system:
      name: Sistem consolă
      description: Definește marca specifică a unei console de jocuri video, cum ar
        fi Atari 2600 sau Playstation
    console_type:
      name: Tip consolă
      description: Clasifică factorul de formă fizic al consolei și mediul de utilizare
        prevăzut
    constitutive_ingredients:
      name: Ingrediente
      description: Specifică principalele componente utilizate pentru formula unui
        produs, de exemplu, ceară de albine, ulei de măceșe
    construction:
      name: Construcție
      description: Indică metoda sau tehnica de construcție metalică utilizată în
        fabricarea bijuteriilor (de exemplu, placat, vermeil, umplut, solid)
    construction_set_theme:
      name: Temă set construcție
      description: Identifică tema unui set de construcție, cum ar fi pirați sau animale
    contact_lens_case_accessories_included:
      name: Accesorii incluse pentru cutia de lentile de contact
      description: Enumeră articolele suplimentare ambalate cu cutia de lentile de
        contact
    contact_lens_case_features:
      name: Caracteristicile cutiei pentru lentile de contact
      description: Evidențiază caracteristicile funcționale notabile sau incluziunile
        cutiei
    contact_lens_material:
      name: Material lentile de contact
      description: Specifică formularea polimerului sau familia de materiale (de exemplu,
        hidrogel, hidrogel siliconic) din care este făcută lentila
    contact_material:
      name: Material de contact
      description: Indică metalul sau stratul de acoperire utilizat pentru contactele
        bateriei din suport
    contrast:
      name: Contrast
      description: Folosit pentru a specifica nivelul de contrast al filmului din
        aparat, de exemplu normal sau ridicat
    contrast_ratio_typical:
      name: Raport de contrast (tipic)
      description: Indică raportul de contrast al afișajului, de exemplu 3000:1
    control_functions:
      name: Funcții de control
      description: Specifică capacitățile de control ale comutatoarelor cu pedală
        pentru amplificator, cum ar fi schimbarea canalului
    control_interface:
      name: Interfață de control
      description: Identifică modul în care unitatea poate fi configurată sau controlată
        (de exemplu, software PC, aplicație mobilă, LCD pe dispozitiv, telecomandă)
    control_method:
      name: Metodă de control
      description: Descrie tehnica de control a componentelor de automatizare, cum
        ar fi cuplu direct sau scalar (V/f)
    control_solution_level:
      name: Nivel soluție de control
      description: Indică nivelul de concentrație de glucoză al soluției de control
    control_technology:
      name: Tehnologie de control
      description: Specifică modalitatea de funcționare, de obicei pentru tratamente
        pentru ferestre, de ex., manuală, cu motor
    control_type:
      name: Tip comandă
      description: Specifică tipul de mecanism de comandă, cum ar fi cu senzor sau
        cu buton
    controller_design:
      name: Design controler
      description: Descrie forma controlerelor pentru automatizare, cum ar fi compacte
        sau montate pe rack
    controller_drive_type:
      name: Tip unitate controler
      description: Identifică tipul de putere utilizat în unitățile de control al
        automatizării, cum ar fi alimentate cu CA sau CC
    conversion_direction:
      name: Direcția de conversie
      description: Descrie tipul și direcția conversiei pe care o realizează dispozitivul
    converter_functionality:
      name: Funcționalitate convertizor
      description: Identifică funcția specifică a convertizoarelor pentru lentile,
        cum ar fi amplificatorul de viteză sau unghiul larg
    conveyor_operation:
      name: Funcționare transportor
      description: Identifică modul în care funcționează un sistem de transport, cum
        ar fi alimentat cu electricitate sau acționat gravitațional
    cooking_compartments:
      name: Compartimente de gătit
      description: Specifică numărul de zone de gătit pentru aparatele de bucătărie,
        cum ar fi în cazul friteuzelor cu aer, care pot fi simple sau duble
    cooking_method:
      name: Metodă de preparare
      description: Specifică tehnica de preparare recomandată, de exemplu, la grătar,
        prăjire
    cooking_wine_variety:
      name: Soi de vin de gătit
      description: Diferențiază între diferite soiuri de vin de gătit, de exemplu
        de orez, sherry
    cookware/bakeware_features:
      name: Caracteristici articole pentru gătit/copt
      description: Identifică caracteristicile speciale ale vaselor de gătit sau de
        copt, cum ar fi acoperirea antiaderență sau posibilitatea de utilizare în
        cuptor
    cookware/bakeware_material:
      name: Material articole pentru gătit/copt
      description: Identifică materialul principal utilizat pentru vasele de gătit
        sau de copt, cum ar fi oțelul inoxidabil sau ceramica
    cookware_features:
      name: Caracteristici articole pentru gătit
      description: Evidențiază caracteristicile unice ale articolelor de gătit, cum
        ar fi posibilitatea de utilizare în cuptor sau mânerul care nu se încălzește
    cookware_items_included:
      name: Produse pentru gătit incluse
      description: Descrie în detaliu componentele unui set de vase pentru gătit,
        cum ar fi oală din fontă sau tigaie pentru prăjit
    cooling_technology:
      name: Tehnologie de răcire
      description: Specifică metoda utilizată pentru răcirea electronicelor, cum ar
        fi cu aer sau cu radiator
    cord_fastening_system:
      name: Sistem de prindere a corzii
      description: Specifică tipul de sistem de prindere pentru corzi elastice, de
        exemplu cu bilă, cu cârlig
    cordless_phone_frequency_band:
      name: Banda de frecvență a telefonului fără fir
      description: Specifică banda (benzile) de frecvență radio pe care funcționează
        sistemul de telefon fără fir, ajutând cumpărătorii să asigure compatibilitatea
        regională și să evite interferențele.
    core_color:
      name: Culoare corp
      description: Identifică culoarea principală a corpului unui arc sau al unei
        arbalete, cum ar fi negru sau albastru
    core_material:
      name: Material corp
      description: Specifică materialul principal utilizat, de obicei pentru arcuri
        și arbalete, cum ar fi fibră de sticlă, lemn
    core_pattern:
      name: Model corp
      description: Descrie designul principal de pe corpul unui arc sau al unei arbalete,
        cum ar fi camuflaj sau păsări
    corrector_features:
      name: Caracteristici corector
      description: Descrie caracteristicile unice ale lichidelor corectoare, ale stilourilor
        și benzilor, de exemplu fără timp de uscare, cu vârf precis
    corsage/boutonniere_design:
      name: Design flori corsaj/butonieră
      description: Descrie stilul florilor pentru corsaj sau butonieră, cum ar fi
        de purtat în mână sau fixat cu ac
    cosmetic_condition:
      name: Stare fizică
      description: Definește uzura și starea produselor electronice, de exemplu noi,
        deschise și nefolosite
    cosmetic_finish:
      name: Finisaj
      description: Definește finisajul unui produs din perspectiva aspectului, de
        exemplu mat, natural
    cosmetic_function:
      name: Funcție cosmetică
      description: Definește beneficiul sau efectul dorit al unui produs cosmetic,
        de exemplu calmant, vindecător
    cosmetic_set_type:
      name: Tipul setului cosmetic
      description: Clasifică setul după focusul sau tema sa principală
    costume_theme:
      name: Temă costum
      description: Identifică tema sau conceptul principal al unui costum, cum ar
        fi horror sau fantezie
    cotton_ball_size:
      name: Dimensiunea bilelor din bumbac
      description: Indică categoria relativă de dimensiune a fiecărei bile de bumbac
        (de exemplu, mică, mare, jumbo)
    counter_shape:
      name: Formă blat
      description: Descrie forma unui blat sau a unui birou, cum ar fi dreaptă sau
        curbată
    country:
      name: Țară
      description: Specifică țara asociată produsului, cum ar fi Japonia sau Germania
    country_of_issue:
      name: Țara de emitere
      description: Indică țara în care a fost emisă cartela telefonică sau pentru
        care este destinată utilizarea acesteia
    cover_closure_design:
      name: Design închidere capac
      description: Specifică designul închiderii, de obicei pentru fețele de pernă,
        de ex., tip plic, cu fermoar
    cover_color:
      name: Culoare husă
      description: Specifică culoarea principală a husei unui produs, de exemplu transparentă,
        bleumarin
    cover_features:
      name: Caracteristici husă
      description: Descrie caracteristicile speciale ale unei huse, cum ar fi impermeabilă,
        rezistentă la căldură
    cover_material:
      name: Material husă
      description: Identifică tipul de țesătură sau material utilizat pentru husa
        produsului, cum ar fi mătasea sau bumbacul
    cover_pattern:
      name: Model husă
      description: Specifică motivul vizual sau designul de pe husa unui produs, cum
        ar fi floral sau tie-dye
    cover_type:
      name: Tip prelată
      description: Descrie stilul sau funcționalitatea unei prelate pentru vehicule,
        cum ar fi cu acoperire completă sau retractabilă
    coverage_area:
      name: Zonă de acoperire
      description: Indică țările sau teritoriile în care software-ul GPS are acoperire,
        cum ar fi Statele Unite sau Canada
    coverage_country:
      name: Țara de acoperire
      description: Specifică țara principală în care poate fi utilizat creditul preplătit
    coverage_level:
      name: Nivelul de acoperire
      description: Indică opacitatea sau intensitatea acoperirii pe care o oferă produsul
        odată aplicat (de exemplu, transparent, mediu, complet)
    coverage_region:
      name: Regiune de acoperire
      description: Indică regiunea în care software-ul GPS are acoperire, cum ar fi
        America de Nord sau Oceania
    craft/sculpting_project_type:
      name: Tip de proiect de olărit/sculptură
      description: Identifică tipul specific de proiect de olărit sau de sculptură,
        cum ar fi modelarea sau realizarea de măști
    craft_cutter/embosser_type:
      name: Tip dispozitiv de tăiere/calandru artizanal
      description: Specifică tipul de dispozitiv de tăiere sau calandrul, de exemplu
        mașină de tăiat cu matrițe, șablon
    craft_decoration_maker_type:
      name: Tip de dispozitiv pentru decorațiuni artizanale
      description: Specifică tipul de dispozitiv pentru realizarea de decorațiuni
        artizanale, cum ar fi ștampilele sau dispozitivele pentru crearea de autocolante
    craft_knife_design:
      name: Design cutter artizanat
      description: Descrie stilul specific al unui cutter pentru artizanat, cum ar
        fi drept sau de precizie
    craft_pipe_cleaner_design:
      name: Design tije flexibile pentru proiecte de artizanat
      description: Descrie designul sau stilul tijelor flexibile pentru proiecte de
        artizanat, cum ar fi tijă acoperită cu material
    craft_project_type:
      name: Tip proiect de artizanat
      description: Identifică tipul de proiect de artizanat, cum ar fi crearea de
        albume sau realizarea de bijuterii
    crafting_frame/stretcher_features:
      name: Caracteristici cadru/gherghef
      description: Descrie caracteristicile unice pentru cadre/gherghefuri, cum ar
        fi fixarea sau suprafață netedă
    crafting_frame_features:
      name: Caracteristici cadru
      description: Descrie caracteristicile unice ale cadrelor, cum ar fi tensiunea
        reglabilă sau greutatea scăzută
    crafting_hoop_features:
      name: Caracteristici gherghef circular
      description: Evidențiază caracteristicile gherghefurilor pentru brodat, de exemplu
        fixarea, suprafață netedă
    crafting_mat/pad_features:
      name: Caracteristici covoraș/suprafață pentru proiecte de artizanat
      description: Descrie caracteristicile unice ale covorașelor sau suprafețelor
        pentru proiecte de artizanat, cum ar fi ușor de curățat sau anti-alunecare
    crafting_stretcher_features:
      name: Caracteristici gherghef pentru întindere material
      description: Descrie caracteristicile esențiale ale unui gherghef pentru întinderea
        materialului, cum ar fi tensiunea reglabilă sau greutatea scăzută
    crampon_attachment_type:
      name: Tip fixare crampon
      description: Identifică modul în care crampoanele se fixează de încălțăminte,
        cum ar fi hibrid sau prin apăsare cu piciorul
    creatine_type:
      name: Tip de creatină
      description: Specifică forma chimică sau formularea specializată de creatină
        folosită în supliment
    creative_art_project_type:
      name: Tip proiect creativ
      description: Identifică tipul de proiect creativ, cum ar fi desen sau creare
        de albume
    crib/toddler_bed_features:
      name: Caracteristici leagăn/pat pentru copii
      description: Descrie aspectele unice ale leagănelor și paturilor pentru copii,
        cum ar fi designul convertibil sau mecanismul de balansare
    crib_features:
      name: Caracteristici pătuț
      description: Evidențiază caracteristicile unice ale leagănelor pentru copii,
        cum ar fi designul convertibil sau opțiunile de depozitare
    cricket_equipment_included:
      name: Echipament crichet inclus
      description: Identifică articolele specifice de crichet dintr-un set, cum ar
        fi casca sau stâlpii
    crutch_folding_type:
      name: Tip de pliere cârjă
      description: Specifică dacă și cum cârja se pliază pentru transport sau depozitare
    crutch_type:
      name: Tip cârjă
      description: Diferențiază între diferite stiluri de cârje, de exemplu pentru
        antebraț, axilă
    crystal_system:
      name: Sistem cristal
      description: Identifică structura geometrică a unui cristal, cum ar fi hexagonală
        sau cubică
    cue_style:
      name: Stil tac
      description: Specifică stilul unui tac de biliard, de exemplu drept, conic
    cue_type:
      name: Tip tac
      description: Specifică tipul de tac de biliard, de exemplu break, jump
    cue_wrap:
      name: Învelitoare tac
      description: Identifică tipul de învelitoare a tacului de biliard, cum ar fi
        material irlandez sau fără învelitoare
    cuff_connector_type:
      name: Tip de conector manșetă
      description: Definește interfața mecanică care atașează tubul manșetei la monitorul
        de tensiune arterială
    cuff_size_category:
      name: Categorie mărime manșetă
      description: Specifică clasa de dimensionare standardizată a manșetei (de exemplu,
        sugar, adult, adult mare)
    cuff_style:
      name: Stil manșetă
      description: Descrie designul manșetei pentru antebraț la cârjele pentru antebraț
    cuisine:
      name: Bucătărie specifică
      description: Clasifică produsele după stilul sau regiunea culinară, de exemplu,
        sud-vestul Statelor Unite, mediteraneană
    culinary_botanical_name:
      name: Denumirea științifică a plantelor folosite în gastronomie
      description: Specifică denumirea științifică a ierburilor sau plantelor folosite
        în scopuri culinare, de exemplu capsicum annuum, mentha
    cup_size:
      name: Dimensiunea cupei
      description: Specifică dimensiunea bustului pentru sutiene, cum ar fi AA sau
        L
    curing_method:
      name: Metoda de întărire/polimerizare
      description: Indică cum se fixează sau se polimerizează adezivul (de exemplu,
        uscare la aer, lampă UV/LED, căldură)
    curler_pad_material:
      name: Materialul pernuței ondulatorului
      description: Identifică materialul pernuței înlocuibile care apasă pe gene,
        afectând confortul, durabilitatea și considerentele legate de alergii
    curler_size_compatibility:
      name: Compatibilitatea dimensiunii ondulatoarelor
      description: Specifică dimensiunea sau tipul pernuței pentru ondulator pentru
        care se potrivesc rezervele (de ex., standard, mini, parțial)
    curler_type:
      name: Tip bigudiuri
      description: Specifică tipul de bigudiuri, cum ar fi tije flexibile sau bigudiuri
        fierbinți
    currencies_supported:
      name: Monede acceptate
      description: Identifică moneda acceptată de un produs, de exemplu dolar canadian
        (CAD), yuan chinezesc (CNY)
    currency:
      name: Monedă
      description: Definește tipul de monedă acceptată de un produs, cum ar fi yuanul
        chinezesc (CNY) sau dolarul american (USD)
    currency_type:
      name: Tip monedă
      description: Identifică tipul de monedă acceptat de un produs, cum ar fi monede
        sau jetoane
    cushion_design:
      name: Design pernă
      description: Descrie factorul general de formă sau stilul pernei metatarsale
        (de exemplu, pernuță, mânecă, dom)
    customer_support_channels:
      name: Canale de asistență pentru clienți
      description: Specifică modalitățile prin care clienții pot obține ajutor, cum
        ar fi asistență telefonică sau tutoriale video
    customization:
      name: Personalizare
      description: Identifică tipul de personalizare disponibil pentru ștampilele
        de birou, cum ar fi textul personalizat sau gravarea siglei
    cutter_options:
      name: Opțiuni cuțit
      description: Identifică caracteristicile cuțitului pentru dispozitivele de sigilare
        cu impuls, de exemplu cuțit încorporat
    cutting_method:
      name: Metodă de tăiere
      description: Specifică tehnica de tăiere, utilizată de obicei pentru uneltele
        de grădinărit, de ex., bypass, nicovală
    cycling_style:
      name: Stil ciclism
      description: Definește destinația de utilizare sau stilul produselor pentru
        ciclism, cum ar fi cursele rutiere sau cursele BMX
    cylinder_size_designation:
      name: Desemnare dimensiune cilindru
      description: Identifică codul standard cu litere sau numere folosit pentru a
        identifica dimensiunile și capacitatea unui cilindru de oxigen (de exemplu,
        M6, D, E)
    daisy_chain_capability:
      name: Capacitate de înlănțuire
      description: Indică dacă mai multe unități de conferință pot fi legate împreună
        (înlănțuite) pentru a extinde acoperirea microfonului și difuzorului și metoda
        de conexiune folosită
    dance_style:
      name: Stil de dans
      description: Indică genul sau tipurile specifice de dans, de exemplu flamenco,
        balet
    data_network:
      name: Rețea de date
      description: Specifică compatibilitatea rețelei de date a dispozitivelor mobile,
        cum ar fi LTE sau 3G
    data_network_generation:
      name: Generarea rețelei de date
      description: Indică cea mai avansată tehnologie de rețea mobilă acceptată de
        cartela preplătită sau cartela SIM (de exemplu, 3G, 4G LTE, 5G)
    data_rollover_policy:
      name: Politica de transfer a datelor
      description: Indică dacă datele de mare viteză neutilizate sunt transferate
        în următoarea perioadă de valabilitate sau expiră
    decoder/encoder_function:
      name: Funcție decodor/codor
      description: Specifică funcția logică implementată de CI
    decoration_material:
      name: Material decorațiune
      description: Identifică materialul folosit pentru decorațiuni, cum ar fi paiete
        sau pene
    decorative_stamp_design:
      name: Design ștampilă decorativă
      description: Descrie designul ștampilelor decorative, cum ar fi povești sau
        retro/vintage
    denomination:
      name: Valoare
      description: Identifică valoarea nominală a obiectelor de colecție, cum ar fi
        monedele și timbrele, de exemplu, 1.000 de dolari, 1 cent
    dental_appliance_compatibility:
