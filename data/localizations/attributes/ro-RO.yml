    dental_repair_kit_certifications:
      name: Certificări set reparații stomatologice
      description: Identifică certificările unui set de reparații stomatologice, cum
        ar fi aprobat de FDA sau fără BPA
    dental_water_jet_operation:
      name: Funcționare duș bucal
      description: Specifică sursa de alimentare pentru un duș bucal, cum ar fi cu
