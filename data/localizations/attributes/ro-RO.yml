    therapy_temperature_type:
      name: Tip temperatură pentru terapie
      description: Indică dacă produsul oferă terapie cu căldură, terapie cu frig,
        sau ambele
    thermal_detector_type:
      name: Tip detector termic
      description: Specifică tehnologia utilizată pentru măsurarea variațiilor de
        căldură emisă de obiecte, cum ar fi detectorul de siliciu amorf (a Si)
    thermal_sensation:
      name: Senzație termică
      description: Descrie efectul de temperatură perceput pe piele după aplicare
    thermocouple_type:
      name: Tip termocuplu
      description: Specifică categoria de termocuplu din senzori, de exemplu Tip J,
