      description: Identifică tehnologia utilizată în verificatoarele de bancnote,
        cum ar fi magnetice sau infraroșii
    vesa_mounting_pattern:
      name: Model de montare VESA
      description: Indică spațierea găurilor VESA de pe spatele monitorului pentru
        compatibilitate cu suporturi, brațe și standuri
    vg/pg_ratio:
      name: Raportul VG/PG
      description: Indică raportul dintre glicerina vegetală și propilen glicol în
        lichidul pentru țigările electronice, de exemplu 30:70
    video_codecs/formats_supported:
      name: Codecuri/formate audio acceptate
      description: Definește codecurile și formatele video acceptate de un dispozitiv,
