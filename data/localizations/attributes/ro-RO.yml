    printer_color_capability:
      name: Capacitate de culoare a imprimantei
      description: Specifică dacă dispozitivul imprimă doar monocrom sau acceptă  imprimare
        și copiere full-color
    printer_connection_interface:
      name: Interfață de conexiune imprimantă
      description: Definește tipul de port pe care serverul de imprimare îl folosește
        pentru a se conecta la imprimanta însăși
    printer_form_factor:
      name: Factor de formă imprimantă
      description: Clasifică tipul fizic sau portabilitatea dispozitivului
    printer_functions:
      name: Funcțiile imprimantei
      description: Definește capabilitățile imprimantelor, copiatoarelor și faxurilor;
        de exemplu, scanare, imprimare foto
    printing_color:
      name: Culoare de imprimare
      description: Definește ieșirea color a cartușelor de toner și de cerneală, de
        exemplu negru, cian
    printing_method:
      name: Metoda de imprimare
      description: Descrie procesul de imprimare, cum ar fi imprimarea offset sau
        gravura
    privacy_filtering_direction:
      name: Direcție de filtrare a confidențialității
      description: Indică din ce direcții de vizualizare filtrul blochează vizibilitatea
        (de exemplu, orizontal în două direcții, în patru direcții)
    processor_cores:
      name: Nuclee de procesor
      description: Indică numărul de nuclee din procesorul unui computer, de exemplu
        două
    processor_family:
      name: Familia de procesoare
      description: Identifică seria sau marca procesorului dispozitivului electronic,
        de exemplu Intel Core i7
    processor_socket:
      name: Soclu procesor
      description: Specifică tipul de soclu de procesor compatibil în electronică,
        cum ar fi LGA 1151 (soclu H4) sau soclu AM4
    processor_technology:
      name: Tehnologia procesoarelor
      description: Definește tehnologia procesoarelor, de obicei pentru echipamente
        audio; de exemplu, bazat pe software, tub/valvă
    product_benefits:
      name: Beneficiile produsului
      description: Descrie beneficiile oferite de un produs, de obicei pentru sănătate
        și frumusețe; de ex. netezire, fermitate
    product_certifications_standards:
      name: Certificări și standarde de produs
      description: Indică certificările sau standardele pe care le îndeplinește un
        produs, cum ar fi organic sau fără cruzime față de animale
    product_classification:
      name: Clasificarea produselor
      description: Clasifică tipul de material prețios, monedă sau obiect de valoare
        (de exemplu, monedă, lingouri, pietre prețioase, card cadou, NFT)
    product_form:
      name: Forma produsului
      description: Definește formatul sau modul de prezentare al unui produs, de obicei
        pentru sănătate și frumusețe; de ex. loțiune, ser
    product_format:
      name: Format produs
      description: Indică dacă articolul este livrat ca produs fizic sau ca descărcare
        digitală
    product_formulation:
      name: Formula produsului
      description: Identifică compoziția materialelor consumabile pentru construcții,
        de exemplu substanța de bază, gata amestecat
    product_manual_area:
      name: Domeniul manualului de utilizare
      description: Specifică subiectul unui manual de utilizare, de exemplu, cameră
        și componente optice, rechizite de birou
    product_sterility:
      name: Sterilitatea produsului
      description: Indică dacă un produs este steril pentru sănătate și siguranță
    product_use:
      name: Utilizarea produsului
      description: Identifică utilizarea sau scopul principal avut în vedere al materialelor
        prețioase sau al obiectelor de colecție (de exemplu, valută/modalitate de
        plată, obiect de colecție, bijuterie, card cadou)
    program_format:
      name: Format desfășurător de program
      description: Descrie structura desfășurătoarelor de program, cum ar fi pliant
        sau o singură foaie
    projection_design:
      name: Design proiecție
      description: Descrie modelul sau imaginea proiectată de un filtru de iluminare
        sau proiector gobo, cum ar fi textul sau sigla
    projector_light_source:
      name: Sursa de lumină a proiectorului
      description: Identifică tipul de sursă de lumină dintr-un proiector, cum ar
        fi led sau laser
    prop_theme:
      name: Tema recuzitei
      description: Identifică tipul sau genul de recuzită de film și televiziune,
        cum ar fi istoric sau SF
    propane_application:
      name: Utilizarea propanului
      description: Specifică scopul propanului, cum ar fi pentru încălzire sau grătar
    propeller_blade_design:
      name: Design pală elice
      description: Descrie configurația palelor de pe elicea unei ambarcațiuni, cum
        ar fi 3 sau 4 pale
    prophy_cup_design:
      name: Design cupa de profilaxie
      description: Descrie designul cupelor de profilaxie utilizate în stomatologie,
        cum ar fi cu perie sau cu nervuri
    propulsion_type:
      name: Tipul de propulsie
      description: Specifică metoda de mișcare pentru echipamentul de exterior, de
        exemplu împingere, remorcare
    protected_component:
      name: Componentă protejată
      description: Identifică partea aparatului de pinball pe care o protejează capacul
    protection_type:
      name: Tip de protecție
      description: Identifică nivelul de protecție oferit de echipamentele de siguranță,
        cum ar fi Tipul I sau Tipul II
    protective_gear_features:
      name: Caracteristici echipament de protecție
      description: Identifică caracteristicile unice ale echipamentului de protecție,
        cum ar fi rezistent la șocuri sau anti-aburire
    protective_mask_design:
      name: Design mască de protecție
      description: Prezintă designul măștilor de protecție, cum ar fi mască completă
        sau semi-mască
    protective_mask_features:
      name: Caracteristici mască de protecție
      description: Detaliază caracteristicile unice ale măștilor de protecție, cum
        ar fi cureaua reglabilă sau supapa
    protein_processing_type:
      name: Tip de procesare proteine
      description: Specifică cum este rafinată sau procesată proteina (de exemplu,
        izolat vs. concentrat), afectând puritatea, rata de digestie și preferința
        consumatorului
    protein_source:
      name: Sursă de proteină
      description: Identifică originea principală a proteinei folosite în supliment
    pstn_connectivity_options:
      name: Opțiuni de conectivitate PSTN
      description: Specifică interfețele de rețea telefonică publică comutată (PSTN)
        pe care o acceptă un produs, de exemplu FXO, POTS
    publication_frequency:
      name: Frecvența publicării
      description: Indică cât de des este publicată o revistă sau un ziar, cum ar
        fi zilnic sau lunar
    publication_type:
      name: Tip publicație
      description: Identifică tipul de publicație academică sau de cercetare, cum
        ar fi un articol de jurnal sau o teză
    pull_up_bar:
      name: Bară de tracțiune
      description: Specifică tipul de prindere pe echipamentul de fitness, cum ar
        fi standard sau fără protecție
    pump_accessories:
      name: Accesorii pentru pompă
      description: Identifică articolele incluse cu pompele de sân, cum ar fi cutia
        de transport sau biberoanele
    pump_speed_settings:
      name: Setările de viteză ale pompei
      description: Specifică caracteristicile de control al vitezei, de obicei pentru
        pompele de sân; de exemplu viteză reglabilă
    punching/training_bag_material:
      name: Material saci de box/de antrenament
      description: Identifică materialul principal utilizat pentru un sac de box/de
        antrenament, cum ar fi pielea sau pânza
    puppet_theme:
      name: Tema păpușilor de păpușar
      description: Clasifică păpușile de păpușar în funcție de tema lor, cum ar fi
        umane sau fantastice
    puppet_type:
      name: Tipul de păpușă de păpușar
      description: Identifică tipul de păpușă pentru teatrul de păpuși, cum ar fi
        ventriloc sau marionetă
    push_button_terminal_type:
      name: Tip terminal push-button
      description: Specifică tipul de conexiune electrică pe buton, asigurând compatibilitatea
        cu cablajele și conectorii rapizi în timpul instalării
    puzzle_theme:
      name: Temă puzzle
      description: Descrie subiectul sau motivul principal al unui puzzle, cum ar
        fi cu animale sau spațial
    puzzle_type:
      name: Tip puzzle
      description: Identifică tipul specific de puzzle, cum ar fi 3D sau enigmă
    quiver_style:
      name: Tip tolbă de săgeți
      description: Specifică tipul tolbei de săgeți pentru tirul cu arcul, de exemplu
        de șold, de spate
    rack_design:
      name: Design suport de pahare
      description: Descrie aspectul sau structura unui suport de pahare, cum ar fi
        deschis sau compartimentat
    rack_format:
      name: Format raft
      description: Definește carcasa fizică sau standardul de dimensiune al benzii
        de canal pentru plasare pe raft sau pe desktop
    rack_mounting_style:
      name: Stil montare pe suport
      description: Descrie stilul structural al montării pe raft (de exemplu, raft
        fix, raft glisant, șine, panou gol).
    rack_type:
      name: Tip suport
      description: Identifică tipul de suport pentru depozitare auto, cum ar fi de
        portbagaj sau plafon
    rack_width_standard:
      name: Standard lățime raft
      description: Definește lățimea orizontală standard din industrie de montare
        pe care o urmează produsul
    racket_balance:
      name: Echilibrul rachetei
      description: Indică distribuția greutății unei rachete, de exemplu, grea pe
        cap, echilibru uniform
    racket_gauge:
      name: Calibrul rachetei
      description: Specifică grosimea corzilor rachetei de tenis, de exemplu 16
    racket_head_shape:
      name: Forma capului rachetei
      description: Definește forma capului rachetei, de exemplu oval, izometric
    racket_material:
      name: Material rachetă
      description: Specifică tipul de material din care este fabricată o rachetă sport,
        cum ar fi lemn sau fibră de carbon
    racket_string_design:
      name: Design corzi rachetă
      description: Identifică construcția corzilor la rachetele de tenis, cum ar fi
        monofilament și multifilament
    racket_string_material:
      name: Material corzi rachetă
      description: Specifică compoziția corzilor rachetei de tenis, cum ar fi kevlar
        sau poliuretan (PU)
    radar_bands:
      name: Benzi de frecvență radar
      description: Specifică benzile de frecvență pe care un dispozitiv radar le poate
        detecta, de exemplu X, K
    radar_technology:
      name: Tehnologie radar
      description: Specifică tehnologia radar utilizată într-un produs, de exemplu,
        cu impulsuri, stare solidă
    radio_case_design:
      name: Design geantă de transport echipament radio
      description: Definește tipul sau funcționalitatea genților de transport pentru
        echipamentul radio, cum ar fi fixe sau pivotante
    radio_features:
      name: Caracteristici radio
      description: Specifică capabilitățile unice ale unui radio, cum ar fi suport
        GPS sau redare MP3
    radio_form_factor:
      name: Factor de formă radio
      description: Identifică clasa fizică a transceiverului amator, influențând opțiunile
        de montare, cerințele de alimentare și scenariile tipice de utilizare
    radio_scanner_form_factor:
      name: Factor de formă scanner radio
      description: Indică configurația fizică sau stilul de montare al scannerului
        radio (de exemplu, portabil, bază, desktop, montat pe vehicul)
    radiology_compatibility:
      name: Compatibilitate radiologie
      description: Indică dacă orteza poate rămâne pe pacient în timpul procedurilor
        de imagistică (de exemplu, RMN, CT, raze X)
    raid_levels_supported:
      name: Niveluri RAID suportate
      description: Enumeră toate configurațiile RAID pe care matricea de hard disk-uri
        le poate crea sau gestiona
    ramp_type:
      name: Tip rampă
      description: Specifică designul sau tipul rampelor de skateboarding, cum ar
        fi half-pipe sau fun box
    range_type:
      name: Tip arie de acoperire
      description: Definește aria de acoperire a dispozitivelor precum monitoarele
        pentru bebeluși, cum ar fi cu rază mare de acțiune
    rarity:
      name: Raritate
      description: Specifică unicitatea articolelor, de obicei pentru obiectele de
        colecție; de exemplu, ediție limitată, extrem de rare
    razor_flexibility:
      name: Flexibilitatea aparatului de ras
      description: Indică flexibilitatea aparatelor de ras și a aparatelor de tuns,
        de exemplu flexibile sau fixe
    razor_head_design:
      name: Design cap aparat de ras
      description: Definește numărul de lame dintr-un aparat de ras, de exemplu, o
        lamă, cu trei lame
    razor_type:
      name: Tip de brici
      description: 'Specifică designul briciului, de exemplu drept sau sintetic '
    read/write_speed:
      name: Viteza de citire/scriere
      description: Indică rata sau viteza de transfer a datelor, de obicei pentru
        duplicatoare de discuri; de exemplu 4x, 52x
    reading_toy_type:
      name: Tip jucărie de citit
      description: Specifică tipul de jucărie educațională de citit, de exemplu joc
        de ortografie, tabletă de lectură
    receipt_paper_features:
      name: Caracteristicile hârtiei de chitanță
      description: Identifică caracteristicile unice ale hârtiei pentru chitanțe,
        cum ar fi indicatorul de sfârșit al rolei sau sigla pre-imprimată
    reclining_function:
      name: Funcția de înclinare
      description: Descrie caracteristici specifice de înclinare, cum ar fi înclinarea
        completă sau gravitație zero
    recommended_age_group:
      name: Interval de vârstă recomandat
      description: Identifică intervalul de vârstă potrivit pentru un produs, de obicei
        jucării și jocuri; ex. bebeluși, adolescenți
    recommended_skill_level:
      name: Nivel de calificare recomandat
      description: Specifică nivelul de calificare, de exemplu începător, expert
    recommended_use:
      name: Utilizare recomandată
      description: Identifică utilizarea sau domeniul principal pentru care a fost
        proiectat un produs hardware, de exemplu, industrial, rezidențial
    record_cleaning_components_included:
      name: Componente de curățare discuri incluse
      description: Enumeră articolele specifice furnizate în kit pentru ca clienții
        să poată compara pachetele dintr-o privire (de exemplu, perie, lichid, cârpă)
    recorder_fingering_system:
      name: Sistem de digitație recorder
      description: Specifică tipul de sistem de digitație pentru recorder, de exemplu
        german, baroc
    recorder_specialized_features:
      name: Caracteristici specializate dispozitive de înregistrare
      description: Identifică funcțiile avansate ale dispozitivelor de înregistrare
        video, de exemplu inteligent, suport Dolby Atmos
    recording_accessories_included:
      name: Accesorii de înregistrare incluse
      description: Detaliază componentele suplimentare incluse în pachetele de înregistrare,
        cum ar fi căștile sau microfonul
    recording_capability_type:
      name: Tip capacitate de înregistrare
      description: Indică dacă receptorul poate înregistra conținut TV și metoda folosită
        (de exemplu, USB PVR, HDD intern, cloud)
    recording_functionality:
      name: Funcționalitate de înregistrare
      description: Indică dacă și cum receptorul poate înregistra conținut TV (de
        exemplu, DVR pe HDD intern, USB extern)
    recording_mode:
      name: Mod de înregistrare
      description: Enumeră modurile operaționale pe care recorderul le suportă (de
        exemplu, continuu, înregistrare temporizată)
    recording_quality:
      name: Calitatea înregistrării
      description: Descrie claritatea audio a sistemelor de transcriere și de dictare,
        cum ar fi joasă sau înaltă
    recording_speed_modes_supported:
      name: Moduri de viteză de înregistrare acceptate
      description: Enumeră modurile de viteză ale benzii pe care VCR-ul le poate înregistra
        sau reda, ceea ce influențează timpul de înregistrare și calitatea imaginii
    recreational_vehicle_type:
      name: Tipul vehiculului de agrement
      description: Identifică categoria unui vehicul de agrement, cum ar fi clasa
        A sau rulotă de călătorie
    reed_strength:
      name: Rezistență ancie
      description: Indică flexibilitatea anciilor pentru instrumentele de suflat,
        cum ar fi moale, medie sau dură
    reel_capacity:
      name: Capacitate în role
      description: Specifică capacitatea în role a unui tanc de developare, cum ar
        fi o rolă sau patru
    reflector_design:
      name: Design reflector
      description: Descrie designul unui reflector pentru bliț, cum ar fi tip fagure
        sau umbrelă
    regenerative_braking_features:
      name: Caracteristici frânare regenerativă
      description: Descrie caracteristicile modulelor de frânare regenerativă ale
        vehiculelor electrice, de exemplu rezistență la intemperii, ușurință de instalare
    region:
      name: Regiune
      description: Identifică locația specifică din care provine produsul, de obicei
        pentru vin și băuturi spirtoase; de exemplu, California, Bordeaux
    region_code:
      name: Cod de regiune
      description: Specifică regiunea în care un software pentru jocuri video este
        licențiat pentru utilizare, cum ar fi Asia (AS) sau Global (GL)
    release_mechanism:
      name: Mecanism de eliberare
      description: Indică tehnologia de livrare sau de absorbție a vitaminei (de exemplu,
        eliberare susținută, lipozomală, masticabilă)
    release_schedule:
      name: Program de lansare
      description: Specifică cât de des sunt lansate noi episoade sau actualizări,
        de exemplu săptămânal, bisăptămânal
    remote_control_functions:
      name: Funcții de control de la distanță
      description: Listează acțiunile specifice pe care telecomanda pentru obturator
        le poate declanșa, în afară de realizarea de fotografii
    remote_shutter_form_factor:
      name: Factor de formă al telecomenzii pentru obturator
      description: Identifică stilul fizic sau carcasa telecomenzii pentru obturator,
        cum ar fi brelocul/butonul, inelul de control sau bățul pentru selfie cu obturator
        integrat
    remote_technology:
      name: Tehnologie telecomandă
      description: Identifică tehnologia utilizată în telecomenzile aparatelor de
        fotografiat, cum ar fi Bluetooth sau tethered
    removable_storage_formats_supported:
      name: Formate de stocare amovibile acceptate
      description: Definește formatele de stocare amovibile cu care este compatibil
        un dispozitiv, de exemplu SD, microUSB
    removal_target:
      name: Ținta de îndepărtare
      description: Specifică pentru ce produse de unghii este conceput dizolvantul
        (de ex., ojă gel, unghii acrilice, pulbere dip)
    replacement_lamp_type:
      name: Tip lampă de înlocuire
      description: Clasifică tipul de piesă de schimb furnizat (de ex., modul lampă
        și carcasă, bandă LED pentru iluminare din spate, ansamblu CCFL)
    reptile/amphibian_food_form:
      name: Formă hranei pentru reptile/amfibieni
      description: Specifică forma hranei pentru reptile/amfibieni, de exemplu liofilizat
        sau pelete
    reptile/amphibian_habitat_supply_type:
      name: Tipul de sursă de încălzire sau iluminat pentru reptile/amfibieni
      description: Identifică tipul de sursă de încălzire sau iluminare pentru habitatele
        reptilelor/amfibienilor, cum ar fi o lampă de încălzit sau o lampă UVB
    research_focus:
      name: Obiectivul cercetării
      description: Identifică domeniul principal de studiu în lucrările academice,
        cum ar fi biologia sau economia
    research_methodology:
      name: Metodologia de cercetare
      description: Identifică tipul de metode de cercetare utilizate în lucrările
        academice, cum ar fi sondajul sau analiza calitativă
    resistance_level:
      name: Nivel de rezistență
      description: Indică nivelul de rezistență al produsului, de obicei pentru benzi
        de fitness; de exemplu, foarte ridicat
    resistance_system:
      name: Sistem de rezistență
      description: Definește mecanismul folosit pentru a crea rezistență în echipamentele
        de fitness, de exemplu apă, aer
    resistance_tolerance:
      name: Toleranță rezistență
      description: Definește deviația permisă a rezistenței reale de la valoarea sa
        nominală, exprimată ca procent (de exemplu, ±1%)
    restrictor_gate_shape:
      name: Formă clapetă de restricție
      description: Definește forma geometrică a clapetei de restricție inclusă cu
        sau necesară de joystick
    result_display:
      name: Afișarea rezultatului
      description: Specifică formatul testului de sarcină, de exemplu, cu linii, digital
    retail/sale_sign_design:
      name: Design semn de vânzare cu amănuntul/reduceri
      description: Indică tipul de mesaj de pe semnele de vânzare cu amănuntul sau
        de reduceri, de exemplu reduceri, ofertă specială
    reticle_plane:
      name: Planul reticulului
      description: Indică planul focal al reticulului în lunetele și vizoarele de
        arme, de exemplu, principal sau secundar
    reticle_type:
      name: Tipul de reticul
      description: Identifică tipul de reticul în lunetele armelor, cum ar fi Duplex
        sau Mildot
    rewinder_operation_mode:
      name: Mod de operare derulator
      description: Definește modurile funcționale pe care derulatorul le suportă (de
        exemplu, doar derulare, derulare și derulare rapidă)
    rf_output_standard:
      name: Standard de ieșire RF
      description: Specifică standardul de difuzare televiziune sau radio pe care
        îl emite modulatorul
    rfid_frequency:
      name: Frecvența RFID
      description: Specifică frecvența de funcționare a produselor RFID, de exemplu
        scăzută, ultra-înaltă
    riding_style:
      name: Tip de utilizare echipament sportiv
      description: Specifică destinația sau tipul de utilizare a echipamentului sportiv
        de iarnă, de exemplu slalom, freestyle
    riding_toy_propulsion_type:
      name: Tip de propulsie jucărie de încălecat
      description: Identifică modul în care este propulsată o jucărie de încălecat,
        cum ar fi electrică sau cu pedale
    rim/wheel_design:
      name: Design jantă/roată
      description: Descrie tipul sau construcția jantelor/roților unui vehicul, cum
        ar fi aliaj sau spițe
    ring_design:
      name: Design inel
      description: Descrie tipul unui inel, cum ar fi tip verighetă sau un solitaire
    ring_size:
      name: Dimensiune inel
      description: Specifică dimensiunea unui inel, cum ar fi L sau 6.5
    rinse_requirement:
      name: Cerință de clătire
      description: Clarifică dacă produsul de curățare trebuie clătit, poate fi lăsat
        pe piele sau nu necesită clătire (de exemplu, apă micelară)
    rise_height_class:
      name: Clasă de ridicare de la sol
      description: Categorizează cât înălțime suplimentară adaugă mânerul degetului
        mare în raport cu bastonul standard (de ex., joasă, medie, înaltă)
    riser_color:
      name: Culoare lansator
      description: Identifică culoarea lansatorului în arcurile de tir, cum ar fi
        neagră sau albastră
    riser_material:
      name: Material lansator
      description: Specifică materialul lansatorului unui arc sau arbalete, cum ar
        fi fibră de carbon sau lemn
    riser_pattern:
      name: Model lansator
      description: Descrie designul sau motivul de pe lansatorul arcurilor și arbaletelor,
        cum ar fi camuflaj sau texturat
    rivet_form:
      name: Forma nitului
      description: Descrie forma niturilor de feronerie, de exemplu, masiv, despicat
    road_sign_design:
      name: Design indicator rutier
      description: Identifică tipul de informații afișate pe un indicator rutier,
        de exemplu stop, limită de viteză
    robe_style:
      name: Tip de halat
      description: Specifică tipul de design general sau tipul de construcție al halatului,
        cum ar fi halat spa sau de tip wrap
    rock_composition:
      name: Compoziția rocilor
      description: Specifică compoziția geologică a unei roci, cum ar fi marmură sau
        calcar
    rock_formation:
      name: Formarea rocilor
      description: Specifică clasificarea geologică a rocilor, cum ar fi magmatice
        sau sedimentare
    rocker_type:
      name: Tip rocker
      description: Specifică tipul de curbură al snowboard-urilor sau schiurilor,
        de exemplu plat, rocker
    rod_color:
      name: Culoare tijă
      description: Identifică culoarea unei undițe, de exemplu neagră sau albastră
    rod_material:
      name: Material tijă
      description: Identifică materialul utilizat în articolele sportive cu tijă,
        cum ar fi grafitul sau fibra de sticlă
    rod_pattern:
      name: Model tijă
      description: Descrie designul sau imprimeul de pe o undiță, cum ar fi camuflaj
        sau dungi
    rod_shape:
      name: Forma barelor
      description: Definește forma sau configurația barelor pentru perdelele de duș,
        de exemplu drepte, în formă de U
    roller_head:
      name: Cap rolă
      description: Definește numărul de capete ale rolelor, de obicei pentru instrumentele
        de îngrijire a pielii; de exemplu, unul, două
    roller_material:
      name: Material rolă
      description: Specifică materialul utilizat într-o rolă, de obicei pentru instrumentele
        de îngrijire a pielii; de exemplu, jad, silicon
    roller_type:
      name: Tip rolă
      description: Identifică tipul de rolă, de obicei pentru instrumentele de îngrijire
        a pielii; ex. gheață, microac
    roof_decor_shape:
      name: Forma decorațiunilor pentru acoperiș
      description: Definește designul sau forma decorațiunilor pentru acoperiș, cum
        ar fi cal sau bărcuță
    room_correction_technology:
      name: Tehnologie de corecție acustică a camerei
      description: Specifică sistemul automat de calibrare acustică sau de corecție
        a camerei integrat în receiver
    rosin_form:
      name: Formă colofoniu
      description: Descrie forma colofoniului pentru arcușul instrumentelor cu coarde,
        cum ar fi bloc sau disc
    rosin_grade:
      name: Tip colofoniu
      description: Specifică tipul de colofoniu utilizat pentru instrumentele cu coarde,
        de exemplu de culoare închisă, mediu
    rotating_direction:
      name: Direcția de rotație
      description: Specifică direcția de rotire a burghiului și a biților de șurubelniță,
        cum ar fi stânga sau dreapta
    rotation_direction:
      name: Direcție de rotație
      description: Indică dacă freza pentru unghii suportă rotație înainte, rotație
        inversă sau ambele
    rotator_control_technology:
      name: Tehnologia de control al rotorului
      description: Definește mecanismul de control al rotatoarelor de antenă, cum
        ar fi manual sau motorizat
    route_of_administration:
      name: Cale de administrare
      description: Identifică modul în care produsul este aplicat sau consumat, ceea
        ce influențează eficacitatea și siguranța (de exemplu, oral, topic, plasture
        transdermic, sublingual, injecție intramusculară)
    rug/mat_features:
      name: Caracteristici covor/preș
      description: Descrie caracteristicile speciale ale covoarelor/preșurilor, cum
        ar fi baza antiderapantă sau uscarea rapidă
    rug/mat_material:
      name: Material covor/preș
      description: Specifică tipul de material utilizat pentru covoare sau preșuri,
        cum ar fi cauciuc sau microfibră
    rug/mat_shape:
      name: Formă covor/preș
      description: Specifică forma covoarelor și a preșurilor de ex. traversă, pătrat
    rug_features:
      name: Caracteristici covor
      description: Descrie caracteristicile specifice ale covoarelor, cum ar fi baza
        antiderapantă sau culorile rezistente la UV
    rug_material:
      name: Material covor
      description: Identifică materialul utilizat la fabricarea unui covor, cum ar
        fi lâna sau iuta
    rug_shape:
      name: Forma covorului
      description: Identifică designul geometric al covoarelor, cum ar fi pătrat sau
        traversă
    rum_grade:
      name: Clasificarea romului
      description: Clasifică romul în funcție de caracteristici sau calitate, de exemplu
        premium, condimentat
    saddle_base_color:
      name: Culoare bază șa
      description: Identifică culoarea principală a bazei unei șei de bicicletă, cum
        ar fi neagră sau albastră
    saddle_base_material:
      name: Material bază șa
      description: Identifică materialul folosit pentru baza unei șei de bicicletă,
        cum ar fi oțelul sau fibra de carbon
    saddle_base_pattern:
      name: Model bază șa
      description: Descrie designul sau imprimeul de pe o baza unei șei de bicicletă,
        cum ar fi abstract sau logo
    saddle_material:
      name: Material șa
