    plant_support_material:
      name: Material de suport pentru plante
      description: Specifică materialul utilizat în cuștile sau suporturile pentru
        plante, cum ar fi teracotă sau piatră
    plate_type:
      name: Tip placă
      description: Identifică tipul de placă în instrumentele de coafat, de exemplu
        titan, ceramică
    play_equipment_items_included:
      name: Echipamente de joacă incluse
      description: Enumeră elementele suplimentare incluse în echipamentul de joacă,
