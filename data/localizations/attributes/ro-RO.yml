    playset_features:
      name: Caracteristicile setului de joc
      description: Evidențiază aspectele speciale ale unui set de joc, de exemplu,
        ediție limitată, rezistent la apă
    plug_type:
      name: Tip ștecher
      description: Identifică compatibilitatea regională a unui ștecher, de exemplu
