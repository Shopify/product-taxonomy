    toy_figure_theme:
      name: Temă figurine de jucărie
      description: Identifică tema sau categoria unei figuri de jucărie, cum ar fi
        animal sau sport
    toy_tool_type:
      name: Tip unealtă de jucărie
      description: Identifică tipul de unealtă de jucărie dintr-un set de joc, cum
