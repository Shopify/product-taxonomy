    globe_map_content:
      name: Dünya haritası içeriği
      description: Dünya küresi üzerinde gösterilen başlıca kartografik içeriği tanımlar.
    glue_trap_design:
      name: Yapışkan tuzak tasarımı
      description: Tuzağın fiziksel stilini veya biçimini belirleyerek, yerleştirileceği
        alan ve haşere türüyle uyumluluğunu kolaylaştırır.
    grab_bar_shape:
      name: Tutma çubuğu şekli
      description: Tutma çubuğunun yapısal tasarımını tanımlar; bu tasarım montaj
        konumunu ve kullanıcı destek stilini etkiler.
    grass_discharge_type:
      name: Çim boşaltma tipi
      description: Çim biçme makinesinin çim kırpıntılarını nasıl dışarı attığını
        belirtir (örneğin, yandan boşaltma, arkadan torbalama).
    grate_design:
      name: Rende tasarımı
      description: Izgaranın yapısal stilini tanımlar.
    grater_design:
      name: Rende tasarımı
      description: Bir rende veya limon kabuğu rendesinin fiziksel tasarımını veya
