    jar_shape:
      name: Kavanoz şekli
      description: Dekoratif kavanozun genel geometrik veya geleneksel şeklini tanımlar.
    juicer_type:
      name: Meyve sıkacağı tipi
      description: Meyve sıkacağının meyve suyunu çıkarmak için kullandığı mekanizmayı
        sınıflandırır.
    key_blade_type:
      name: Anahtar bıçağı tipi
      description: Anahtarın fiziksel bıçak stilini sınıflandırır (örneğin düz/dişli,
        tübüler veya çukur).
    kitchen_layout:
      name: Mutfak yerleşim düzeni
      description: Alıcının oda şekline ve iş akışına uygun setleri bulmasına yardımcı
