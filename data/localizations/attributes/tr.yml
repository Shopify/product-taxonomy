        veya L şeklinde) tanımlar.
    kitchen_linen_items_included:
      name: Ürüne dahil olan mutfak tekstili ürünleri
      description: Set içerisinde bulunan mutfak tekstili bileşenlerini listeleyerek,
        alıcının tam olarak hangi ürünleri satın aldığını anlamasına yardımcı olur.
    label_content_type:
