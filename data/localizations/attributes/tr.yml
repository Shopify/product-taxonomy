---
tr:
  attributes:
    3d_glasses_fit_design:
      name: 3D gözlük takma tasarımı
      description: Gözlüklerin nasıl takıldığını veya tutturulduğunu belirtir (ör.
        klipsli, sarmalı, üzerine takma).
    3d_glasses_material:
      name: 3D gözlük malzemesi
      description: Bambu veya paslanmaz çelik gibi 3D gözlükler için kullanılan malzemeyi
        belirtir
    3d_glasses_technology:
      name: 3D gözlük teknolojisi
      description: Gözlüklerin tasarlandığı 3D görüntü/senkronizasyon teknolojisini
        belirtir, belirli ekranlar veya projektörlerle uyumluluğu belirler.
    3d_printer_case_style:
      name: 3D yazıcı kılıf stili
      description: Alışveriş yapanların yumuşak taşıma çantaları, sert kabuklu kılıflar,
        sabit muhafazalar ve basit toz örtüleri arasında ayrım yapabilmesi için genel
        ürün türünü sınıflandırır.
    3d_printer_cleaning_kit_components_included:
      name: 3D yazıcı temizlik kiti dahil bileşenler
      description: Alışveriş yapanların tam olarak ne satın aldıklarını bilmeleri
        için kitte sağlanan bireysel araçları ve sarf malzemelerini listeler.
    3d_printing_resin_type:
      name: 3D baskı reçine tipi
      description: Alışveriş yapanların reçinenin standart, mühendislik sınıfı, dökülebilir
        veya diğer özel tiplerden olup olmadığını hızla belirlemelerine yardımcı olarak
        reçinenin formülasyonunu veya amaçlanan uygulamasını belirtir.
    80_plus_efficiency_rating:
      name: 80 Plus verimlilik derecesi
      description: PSU'nun elde ettiği resmi 80 Plus enerji verimliliği sertifika
        seviyesini gösterir
    abrasive_material:
      name: Aşındırıcı malzeme
      description: Zımparalama aletlerinde kullanılan elmas veya silisyum karbür gibi
        aşındırıcının türünü tanımlar
    absinthe_style:
      name: Absinthe Stili
      description: Absinthe tarzını tanımlar, örneğin karışık, damıtılmış
    absinthe_variety:
      name: Absinthe Çeşitleri
      description: Absinthe ürünlerini benzersiz çeşitlerine göre farklılaştırır,
        örneğin rouge, verte
    absorbency_level:
      name: Emicilik Seviyesi
      description: Genel olarak kişisel bakım ürünleri için emicilik kapasitesini
        tanımlar; örn. gece boyunca, hafif
    absorbent_hygiene_product_features:
      name: Emici hijyen ürün özellikleri
      description: Temizlik ürünlerinin sızdırmaz veya hipoalerjenik gibi spesifik
        özelliklerini açıklar
    academic_level:
      name: Akademik seviye
      description: Medya içeriğinin lisans veya doktora gibi akademik seviyesini belirtir
    accessibility_design_features:
      name: Erişilebilirlik tasarımı özellikleri
      description: İşitme, görme veya el becerisi konusunda güçlük yaşayan kullanıcılara
        yardımcı olan özel tasarım öğelerini listeler.
    accessory_material:
      name: Aksesuar yapımı
      description: Aksesuarlardaki malzeme türünü belirtir, genellikle nakliye sarf
        malzemeleri için kullanılır; örneğin plastik, karton
    accessory_size:
      name: Aksesuar Boyutu
      description: Bir aksesuar ürününün boyutunu tanımlar, örneğin tek beden veya
        kompakt
    accordion_tuning:
      name: Akordeon akordu
      description: Kuru veya konser perdesi gibi bir akordeonda kullanılan akort türünü
        belirtir
    activation_mechanism:
      name: Aktivasyon mekanizması
      description: Alarmı tetikleyen ana yöntemi belirtir
    activation_method:
      name: Aktivasyon yöntemi
      description: Ön ödemeli kredinin veya SIM kartın kullanıcı tarafından nasıl
        etkinleştirildiğini açıklar.
    active_ingredient:
      name: Aktif Madde
      description: A vitamini, retinol gibi kişisel bakım ürünlerindeki birincil maddeleri
        tanımlar
    activewear_clothing_features:
      name: Aktif giyim özellikleri
      description: Dört yönde esneyen veya nefes alabilen tasarım gibi aktif giyimin
        benzersiz özelliklerini tanımlar
    activity:
      name: Aktivite
      description: Ürünün tenis veya pilates gibi hangi spor veya aktivite için tasarlandığını
        belirtir
    activity_tracker_design:
      name: Etkinlik izleyici tasarımı
      description: Aktivite takip cihazının nasıl takılacağını belirtir, örneğin klips,
        kol bandı
    acupuncture_model_format:
      name: Akupunktur modeli formatı
      description: Akupunktur modellerinin boyutunu ve ölçeğini tanımlar; örneğin
        gerçek boyutlu, minyatür
    acupuncture_model_type:
      name: Akupunktur modeli tipi
      description: 'Akupunktur modelinin temsil ettiği vücut kısmını veya türünü belirtir;
        örneğin kafa, el, hayvan '
    adapter_directionality:
      name: Adaptör yönlülüğü
      description: Adaptörün sinyal akışını her iki yönde mi yoksa yalnızca belirli
        bir yönde mi desteklediğini gösterir
    adapter_operating_modes:
      name: Adaptör çalışma modları
      description: Adaptörün Bluetooth alıcı, verici veya her ikisi olarak işlev görüp
        görmediğini belirtir
    adaptive_sync_technology:
      name: Uyarlanabilir senkronizasyon teknolojisi
      description: Yırtılmasız görseller için monitör tarafından desteklenen değişken
        yenileme hızı (VRR) teknolojisini belirtir
    adc_resolution:
      name: ADC çözünürlüğü
      description: Ölçüm hassasiyetini tanımlayan entegre Analog-Dijital Dönüştürücünün
        çözünürlüğünü (bit cinsinden) belirtir
    additional_animation_software_features:
      name: Ek animasyon yazılımı özellikleri
      description: Animasyon düzenleme yazılımındaki karakter animasyonu veya görsel
        efektler gibi benzersiz özellikleri belirtir
    additional_cleaning_technology:
      name: Ek temizleme teknolojisi
      description: Buharın ötesinde dahil edilen temizleme teknolojilerini listeler
        (örn. ultrasonik, UV, ozon)
    additional_design_software_type:
      name: Ek tasarım yazılımı türü
      description: Sanal tur veya peyzaj tasarımı gibi tasarım yazılımının ek yeteneklerini
        belirtir
    additional_financial_software_features:
      name: Ek finansal yazılım özellikleri
      description: Varlık yönetimi veya denetim ve uyumluluk gibi finansal yazılımın
        ek becerilerini tanımlar
    additional_graphic_software_features:
      name: Ek grafik yazılım özellikleri
      description: Dijital illüstrasyon veya düzen tasarımı gibi grafik yazılımının
        ek becerilerini vurgular
    additional_publishing_software_features:
      name: Ek yayınlama yazılımı özellikleri
      description: Baskı tasarımı veya dijital yayıncılık gibi yayıncılık yazılımındaki
        ek işlevleri vurgular
    additional_security_software_features:
      name: Ek güvenlik yazılımı özellikleri
      description: Güvenlik yazılımının disk şifreleme, izinsiz giriş tespiti gibi
        ek becerilerini tanımlar
    adhesive_application_type:
      name: Yapıştırıcı uygulama tipi
      description: Yapıştırıcı için amaçlanan kirpik hizmetini veya kullanım durumunu
        tanımlar
    adhesive_features:
      name: Yapıştırıcı özellikleri
      description: Yama veya bantlarda kullanılan yapıştırıcının özel özelliklerini
        vurgular
    adhesive_format:
      name: Yapıştırıcı formatı
      description: Onarım kullanımı için yapıştırıcının hangi fiziksel formda tedarik
        edildiğini gösterir
    adhesive_strength:
      name: Yapışkan gücü
      description: Burun bandının yapıştırıcısının yapışma veya kaldırma gücü seviyesini
        belirtir (örn., orijinal, ekstra güç)
    adhesive_type:
      name: Yapışkan Tipi
      description: Bir üründe kullanılan yapıştırıcının türünü tanımlar, örneğin çıkarılabilir
        veya kalıcı gibi
    aftershave_product_form:
      name: Tıraş sonrası ürün formu
      description: Tıraş losyonu veya krem gibi tıraş sonrası ürünün kıvamını tanımlar
    age_group:
      name: Yaş Grubu
      description: Bir ürün için yetişkinler veya çocuklar gibi hedef yaş aralığını
        tanımlar
    age_restrictions:
      name: Yaş Sınırlamaları
      description: Bir ürün veya etkinlik için 18 yaş veya üzeri gibi minimum yaş
        gereksinimini belirtir
    ai_application:
      name: Yapay zeka uygulaması
      description: Tahmine dayalı analitik veya konuşma tanıma gibi yazılımdaki yapay
        zekanın işlevini belirtir
    air_freshener_form:
      name: Oda spreyi formu
      description: Araba hava spreylerinin türünü tanımlar; örneğin yağ, havalandırma
        klipsi
    air_fryer_functions:
      name: Airfryer fonksiyonları
      description: 'Bir airfryer veya benzeri cihazda mevcut olan çeşitli pişirme
        modlarını listeler, örneğin: yağsız kızartma, fırınlama'
    air_mattress_features:
      name: Hava yatağı özellikleri
      description: Şişirilmesi kolay veya delinmeye karşı dayanıklı olması gibi havalı
        yatağın benzersiz özelliklerini açıklar
    air_tube_configuration:
      name: Hava tüpü konfigürasyonu
      description: Manşetle entegre edilmiş hava şişirme tüplerinin sayısını veya
        stilini gösterir
    airbrush_feed_type:
      name: Airbrush besleme tipi
      description: Airbrush’larda yer çekimi veya sifon gibi boya dağıtım yöntemini
        tanımlar
    airbrush_operation_method:
      name: Airbrush çalışma yöntemi
      description: Havalı boya tabancalarının çalışma stilini belirtir; örneğin, çift
        etkili veya tek etkili
    aircraft_engine_configuration:
      name: Uçak motoru konfigürasyonu
      description: Uçağa güç veren motor sayısını belirtir (örneğin tek veya çift)
    aircraft_engine_type:
      name: Uçak motoru tipi
      description: Uçağa güç veren motor tipini belirtir (örneğin jet veya turboprop)
    airflow_opening_design:
      name: Hava akışı açıklık tasarımı
      description: Ağızlığa yerleştirilmiş nefes alma veya havalandırma yapılandırmasını
        açıklar
    airsoft_equipment_included:
      name: Airsoft ekipmanı dahil
      description: Airsoft ürünleriyle sağlanan koruyucu gözlük veya taktik yelek
        gibi ekstra donanımları belirtir
    album_type:
      name: Albüm Türü
      description: Albüm veya damgalama kitlerinin ciltleme stilini açıklar; örneğin
        spiral ciltli, not defteri
    alcohol/solvent_content:
      name: Alkol/Çözücü içeriği
      description: Ürünü nakliye ve düzenleyici amaçlar için alkol veya çözücü içeriğine
        göre sınıflandırır (örneğin, alkol ≤%24, alkol >%24, çözücü küçük kap)
    alcohol_content:
      name: Alkol içeriği
      description: Toniğin alkolsüz olup olmadığını veya varsa formülün yaklaşık olarak
        ne kadar alkol içerdiğini belirtir
    alert_type:
      name: Uyarı Tipi
      description: Sesli alarmlar veya akıllı telefon bildirimleri gibi bir ürünün
        sağladığı uyarı türünü belirtir
    allergen_information:
      name: Alerjen Bilgisi
      description: Buğday veya yer fıstığı gibi yiyecek veya içeceklerde bulunan potansiyel
        alerjenleri belirtir
    allergen_test_type:
      name: Alerjen Test Tipi
      description: Test kitinin tespit etmek üzere tasarlandığı alerjen türünü belirtir,
        örneğin gıda veya çevresel
    allergens:
      name: Alerjenler
      description: Linalool veya limonen gibi sağlık ve güzellik ürünlerindeki potansiyel
        alerjenleri belirtir
    allergy_friendly_features:
      name: Alerji dostu özellikler
      description: Bir ürünün lateks içermemesi veya küflenmeye karşı dayanıklı olması
        gibi alerji dostu özelliklere sahip olup olmadığını tanımlar
    amino_acid_subtype:
      name: Amino asit alt türü
      description: Takviyede bulunan amino asitlerin ana türünü veya profilini belirtir
    amplifier/booster_suitable_location:
      name: Amplifikatör/Güçlendirici için uygun konum
      description: Amplifikatör veya sinyal güçlendirici için araç veya büyük mekan
        gibi en iyi yerleri belirler
    amplifier_class:
      name: Amplifikatör Sınıfı
      description: AB veya D gibi amplifikatör tipini tanımlar
    amplifier_configuration:
      name: Amplifikatör yapılandırması
      description: İki kanallı veya dört kanallı gibi motorlu taşıt amplifikatörlerinin
        kurulumunu belirtir
    amputation_level:
      name: Amputasyon seviyesi
      description: Ürünün tasarlandığı amputasyon seviyesini belirtir
    analyte_measured:
      name: Ölçülen analit
      description: Kontrol solüsyonunun kalibrasyon sağladığı biyobelirteç(ler)i tanımlar
    anamorphic_squeeze_ratio:
      name: Anamorfik sıkıştırma oranı
      description: Anamorfik bir merceğin yatay sıkıştırma faktörünü belirtir. Kullanıcıların
        mercekleri istedikleri sıkıştırma düzeltmesi çıkışıyla eşleştirmelerine olanak
        tanır.
    anatomical_detail_displayed:
      name: Görüntülenen anatomik detay
      description: Model üzerinde vurgulanan anatomik veya meridyen özelliklerini
        gösterir
    anchor_type:
      name: Çapa Tipi
      description: Çekilen su sporları ekipmanlarında kullanılan çapayı tanımlar,
        örneğin fluke veya pulluk
    anemometer_application:
      name: Rüzgarölçer uygulaması
      description: Endüstriyel veya meteorolojik gibi bir anemometrenin kullanım amacını
        tanımlar
    angles_supported:
      name: Desteklenen Açılar
      description: Bir ürünün alabileceği açı aralığını belirtir, genellikle elektronik
        cihazlar için; örneğin ayarlanabilir, 0° ila 180°
    angling_style:
      name: Olta Balıkçılığı Stili
      description: Ürünün tasarlandığı balıkçılık tekniğini tanımlar, örneğin sörf
        oltası veya sinek oltası
    animal_feed_form:
      name: Hayvan yemi formu
      description: Sıvı veya granül gibi hayvan yemi formunu belirtir
    animal_type:
      name: Hayvan Türü
      description: Bir ürünün hedeflediği hayvan türünü belirtir; ördekler, geyikler
        veya köpekler gibi
    answering_machine_type:
      name: Telesekreter tipi
      description: Entegre bir telesekretetin varlığını ve teknolojisini belirtir
    antenna_connector_type:
      name: Anten konnektör tipi
      description: Harici antenleri takmak için kullanılan RF konektörünü belirtir
    antenna_rf_connector_type:
      name: Anten RF konnektör tipi
      description: Anten tarafından kullanılan RF konektörünü tanımlar
    antenna_type:
      name: Anten Tipi
      description: Elektronik cihazlar için anten tipini belirtir; örneğin çok yönlü,
        ızgaralı
    anti_agin_skin_care_type:
      name: Yaşlanma karşıtı cilt bakım türü
      description: Maske, losyon gibi yaşlanma karşıtı cilt bakım ürünlerinin türünü
        sınıflandırır
    anti_perspirant_strength_level:
      name: Ter önleyici güç seviyesi
      description: Ter önleyicinin etkinlik sınıflandırmasını belirtir (örn., klinik
        güç, spor gücü)
    antibody_class_tested:
      name: Test edilen antikor sınıfı
      description: Kitin tespit ettiği immünoglobulin veya biyobelirteci belirtir
        (örn. IgE, IgG4)
    antifreeze_type:
      name: Antifriz Tipi
      description: Araç bakımına yönelik antifriz tipini belirtir; örneğin konsantre,
        önceden seyreltilmiş
    antique_car_design:
      name: Antika araba tasarımı
      description: Antika bir arabanın birincil tasarım stilini tanımlar (örneğin
        T-bucket veya Grand tourer)
    antique_vehicle_era:
      name: Antika araç dönemi
      description: Antika bir aracın tarihi dönemini tanımlar (örneğin Brass Dönemi
        veya Vintage Dönemi)
    appliance_board_function:
      name: Cihaz kartı işlevi
      description: Cihaz içindeki kartın işlevsel rolünü belirtir
    appliance_unit_location:
      name: Cihaz ünite konumu
      description: Kartın amaçlandığı cihazın fiziksel bölümünü belirtir (ör. iç veya
        dış ünite)
    application_area:
      name: Uygulama Alanı
      description: Ürünün uygulandığı vücut kısmını veya alanını belirtir; örneğin
        dudaklar, tüm vücut
    application_method:
      name: Uygulama Yöntemi
      description: Bir ürünün nasıl uygulandığını veya kullanıldığını tanımlar; örneğin
        jel, sıvı, sprey
    application_type:
      name: Uygulama türü
      description: Bakımın içeride bırakılıp bırakılmadığını veya durulanıp durulanmadığını
        ve herhangi bir özel kullanım modunu gösterir.
    applicator_format:
      name: Aplikatör formatı
      description: Losyon veya güneş kremi aplikatörünün fiziksel formunu veya stilini
        açıklar
    applicator_material:
      name: Aplikatör malzemesi
      description: Aplikatörde kullanılan malzemeyi belirtir, genellikle tamponlar
        içindir; örneğin plastik, karton
    applicator_type:
      name: Uygulayıcı türü
      description: Tamponlarla birlikte verilen aplikatör tipini tanımlar; örneğin
        aplikatörlü, aplikatörsüz
    applique/patch_shape:
      name: Aplike/Yama şekli
      description: Hayvan veya geometrik gibi aplikelerin veya yamaların şeklini tanımlar
    applique_shape:
      name: Aplike şekli
      description: Çiçek veya hayvan gibi aplike öğelerinin şeklini açıklar
    aquarium_filter_features:
      name: Akvaryum filtresi özellikleri
      description: Akvaryum filtrelerinin hızlı kartuş değişimi, çok aşamalı filtreleme
        gibi özel özelliklerini açıklar
    aquarium_light_spectrum:
      name: Akvaryum ışık spektrumu
      description: Akvaryum aydınlatması için ışık spektrumunun türünü belirtir; örneğin
        mavi, gün ışığı
    aquarium_overflow_box_design:
      name: Akvaryum taşma haznesi tasarımı
      description: Bir akvaryum taşma kutusunun kurulum tarzını tanımlar; örneğin
        harici veya asılı gibi
    archery_activity:
      name: Okçuluk aktivitesi
      description: Okçuluk faaliyetinin türünü belirtir; örneğin açık havada avcılık,
        hedef alıştırması
    archery_equipment_included:
      name: Okçuluk ekipmanları dahil
      description: Sabitleyici montaj parçası, güvenlik camı okları gibi dahil edilen
        okçuluk aksesuarlarını belirtir
    archery_style:
      name: Okçuluk Stili
      description: Ürünün tasarlandığı özel okçuluk türünü tanımlar; örneğin 3D okçuluk,
        yay avcılığı
    archery_target_type:
      name: Ok hedef türleri
      description: 'Farklı okçuluk antrenmanlarına yönelik tasarlanmış hedef türlerini
        belirtir, örneğin: 3D hedef, torba hedef'
    aromatherapy:
      name: Aromaterapi
      description: Kullanılan kokuyu veya uçucu yağı belirtir; örneğin okaliptüs,
        lavanta
    arrangement:
      name: Aranjman
      description: Çiçeklerin nasıl düzenleneceğini veya sunulacağını belirtir; örneğin
        vazo, sepet
    arrow/bolt_material:
      name: Ok/Cıvata malzemesi
      description: Okların veya dart oklarının yapı malzemesini tanımlar; örneğin
        alüminyum veya bambu
    arrow_fletching_material:
      name: Ok yiv açma malzemesi
      description: Sentetik veya plastik gibi ok kaplamalarında kullanılan malzemeyi
        tanımlar
    arrow_material:
      name: Ok malzemesi
      description: Bambu veya fiberglas gibi okların bileşimini tanımlar
    art/crafting_tool_material:
      name: Sanat/El işi alet malzemesi
      description: Ahşap veya metal gibi sanatın veya el işi araçlarının ana malzemesini
        tanımlar
    art_fixative_application_method:
      name: Sanat sabitleyici uygulama yöntemi
      description: Aerosol veya fırça ile uygulama gibi bir sanat sabitleyicisinin
        nasıl uygulandığını açıklar
    art_movement:
      name: Sanat akımı
      description: 'Bir tablonun üslup yaklaşımını veya sanat akımını tanımlar, örneğin:
        Empresyonizm, Ekspresyonizm'
    art_style:
      name: Sanat Stili
      description: Art nouveau veya tipografi gibi bir ürünün estetik tarzını tanımlar
    artwork_authenticity:
      name: Sanat eseri özgünlüğü
      description: Eserin özgünlüğünü belirtir, orijinal bir eser mi yoksa bir reprodüksiyon
        mu olduğunu açıklar
    artwork_frame_material:
      name: Sanat eseri çerçeve malzemesi
