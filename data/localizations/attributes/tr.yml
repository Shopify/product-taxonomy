    light_source:
      name: Işık Kaynağı
      description: Bir üründe kullanılan LED veya floresan gibi ampul türünü tanımlar
    light_spectrum:
      name: Işık Spektrumu
      description: Bir ürünün üretebileceği ışık dalga boyu aralığını tanımlar, örneğin
