        tuz ve buzlu tipler gibi tasarımlar arasında ayrım yapılmasına yardımcı olur.
    fuel_compatibility:
      name: Yakıt uyumluluğu
      description: Izgaranın hangi tür yakıtları güvenli bir şekilde tutmak üzere
        tasarlandığını belirtir.
    funnel_type:
      name: Huni tipi
      description: Huniyi tasarımına veya kullanım amacına göre sınıflandırır.
    furnace_configuration:
      name: Fırın konfigürasyonu
      description: Fırın kabininin montajı için fiziksel hava akışı yönünü belirtir.
    furniture_anchor_type:
      name: Mobilya ankraj tipi
      description: Mobilya ankraj kit yapısal stilini ve etki mekanizmasını belirtir.
    garage_floor_mat_style:
      name: Garaj zemin paspası stili
      description: Garaj paspasının ürün biçimini veya stilini tanımlar.
    garbage_disposal_feed_type:
      name: Çöp öğütücü besleme tipi
      description: Gıda atıklarının öğütücüye sürekli çalışma sırasında mı yoksa partiler
        halinde mi beslendiğini belirtir.
    garbage_disposal_stopper_style:
      name: Çöp öğütücü tıpası stili
      description: Tıpanın işlevsel stilini belirtir.
    garden_hose_design:
      name: Bahçe hortumu tasarımı
      description: Hortumun yapısal stilini belirler; bu da kullanım amacını ve üretim
        özelliklerini belirler.
    garden_hose_fitting_type:
      name: Bahçe hortumu bağlantı tipi
      description: Arama ve filtrelemeyi kolaylaştırmak için adaptör veya Y ayırıcı
        gibi bahçe hortumu bağlantı parçalarının stilini veya işlevini tanımlar.
    gardening_fork_type:
      name: Bahçe çatalı tipi
      description: Çatalın belirli stilini veya kullanım amacını sınıflandırır.
    garland_style:
      name: Çelenk stili
      description: Çelenkin yapım veya dekoratif stilini sınıflandırır.
    gas_type:
