      description: Lens kalınlığı ve ağırlığıyla doğrudan ilişkili sayısal kırılma
        indeksini belirtir (örn., 1.50, 1.60, 1.67)
    lens_storage_type:
      name: Lens depolama tipi
      description: Fotoğraf makinesi lensleri için lens kılıfı veya lens çantası gibi
        saklama türünü tanımlar
    lens_tint_type:
      name: Lens renk tonu tipi
      description: Elle tutma görünürlüğü veya kozmetik amaçlar için lense uygulanan
        renk tonunu açıklar
    lens_type:
      name: Lens Tipi
      description: Gözlük ürünlerinde polarize veya progresif gibi lens türünü belirtir
    license_type:
