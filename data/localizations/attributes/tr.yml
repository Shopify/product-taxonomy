    ice_shape:
      name: Buz şekli
      description: Makinenin ürettiği buzun şeklini tanımlayarak, kullanıcıların tercih
        ettikleri buz türünü üreten makineleri seçmelerine yardımcı olur.
    incense_holder_style:
      name: Tütsülük tarzı
      description: Tutucunun yapısal tasarımını belirleyerek, alıcının farklı işlevsel
