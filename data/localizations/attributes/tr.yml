    fondue_pot_type:
      name: Fondü tenceresi türü
      description: Fondü setinin ısıtma şeklini veya kullanım amacını sınıflandırır.
    fondue_set_pieces_included:
      name: Dahil olan fondü seti parçaları
      description: Fondü setinde bulunan bileşenleri (örneğin fondü tenceresi veya
