    vehicle_fluid_type:
      name: Araç Sıvıları tipi
      description: Araç bakımında kullanılan sıvının türünü tanımlar; örneğin konsantre
        veya önceden seyreltilmiş
    vehicle_frame/body_features:
      name: Araç şasi/gövde özellikleri
      description: Araç gövde parçalarının boyalı veya krom kaplama gibi özel özelliklerini
        açıklar
    vehicle_mirror_design:
      name: Araç aynası tasarımı
