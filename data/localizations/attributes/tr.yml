    lid_material:
      name: Kapak malzemesi
      description: Ürünün kapağında kullanılan cam veya paslanmaz çelik gibi malzeme
        türünü tanımlar
    lid_type:
      name: Kapak Tipi
      description: Flip-top veya geçmeli kapak gibi kullanılan kapak türünü belirtir
