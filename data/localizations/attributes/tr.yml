      description: Ülke veya bölge koduna bağlı olarak bir güç adaptörünün veya dönüştürücünün
        takılabileceği fişi belirtir; örneğin ABD, AB
    plug_type_output:
      name: Fiş tipi (çıkış)
      description: Bir güç adaptörünün veya dönüştürücünün ülke veya bölge koduna
        göre çıkış olarak alabileceği fişi belirtir; örn. ABD, AB
    plumbing_primer_application:
      name: Sıhhi tesisat astarı uygulaması
      description: Borular veya bağlantı parçaları gibi sıhhi tesisat astarının nerede
        kullanılabileceğini belirtir
    plumbing_trap_design:
      name: Sıhhi tesisat tuzak tasarımı
      description: Tambur veya şişe gibi tesisat tuzağının tipini belirtir
    plunger_shape:
      name: Piston şekli
      description: Kupa veya akordeon gibi bir lavabo pompasının şeklini belirtir
    plywood_grade:
      name: Kontrplak sınıfı
      description: C veya D sınıfı gibi inşaat malzemeleri için kontrplak sınıflandırmasını
        belirtir
    pneumatic_conveyor_operation:
      name: Pnömatik konveyör çalışması
      description: Eko faz veya yoğun faz gibi pnömatik konveyörlerin çalışma modunu
        tanımlar
    poe_standard:
      name: Poe Standardı
      description: Bir ürünün uyduğu Ethernet Üzerinden Güç (PoE) protokolünü tanımlar;
        örneğin pasif, IEEE 802.3af
    point_design:
      name: Nokta Tasarımı
      description: Raptiye veya çivi gibi ofis malzemelerinin uç stilini tanımlar,
        örneğin keskin, kör
    pointing_device:
      name: İşaretleme Aygıtı
      description: Bilgisayar ekranında gezinmek için kullanılan cihazı tanımlar;
        örneğin fare düğmeleri, dokunmatik yüzey
    polar_pattern:
      name: Polar Model
      description: Çok yönlü veya kardioid gibi bir mikrofonun ses alma yönünü belirtir
    polarity_configuration:
      name: Polarite konfigürasyonu
      description: LED'ler, ekran modülleri ve benzer cihazlarla ilgili dahili polarite
        düzenlemesini açıklar
    polarization:
      name: Polarizasyon
      description: Antenlerin dalga yönünü tanımlar; örneğin dikey, dairesel
    pole/post_material:
      name: Direk malzemesi
      description: Güneş şemsiyesi veya şemsiye direklerinin fiberglas veya çelik
        gibi yapı malzemesini belirtir
    pole_color:
      name: Direk rengi
      description: Şemsiye gibi ürünlerde direğin rengini tanımlar, örneğin siyah,
        bronz
    pole_material:
      name: Şemsiye direk malzemesi
      description: Direk yapımında kullanılan malzemeyi belirtir, örneğin çelik, ahşap
    pole_pattern:
      name: Direk deseni
      description: Şemsiyenin direğindeki tasarım veya motifi açıklar; örneğin çiçek
        motifi veya geometrik tasarım
    policy_sign_design:
      name: Politika işareti tasarımı
      description: Bir politika tabelasında gösterilen özel mesajı açıklar; örneğin
        sigara içilmez, cep telefonu yasaktır
    polish_dry_form:
      name: Kuru formda cila
      description: Oje kurutma ürünlerinin formülasyonunu tanımlar, örneğin solvent
        bazlı, silikon bazlı
    polish_remover_form:
      name: Cila sökücü formu
      description: Oje çıkarıcı ürünün türünü belirtir; örneğin sıvı, çıkarma sargıları
    polish_remover_formulation:
      name: Oje çıkarıcı formülasyonu
      description: Çıkarıcının kimyasal bileşimini, özellikle aseton içeriğini veya
        alternatif bazları belirtir
    polish_type:
      name: Cila Tipi
      description: Deniz taşıtlarının bakımında kullanılan metal veya vinil gibi özel
        cila türünü tanımlar
    polyphony:
      name: Çok Seslilik
      description: Bir sentezleyicinin eşzamanlı nota kapasitesini belirtir, örneğin
        polifonik, multi-timbral
    portability:
      name: Taşınabilirlik
      description: Bir ürünün taşınması veya hareket ettirilmesinin kolaylığını belirtir,
        genellikle göğüs pompaları için; örneğin taşınabilir, kompakt boyut
    post_material:
      name: Posta malzemesi
      description: Çeşitli kategorilerdeki direkler için malzeme türünü belirtir;
        örneğin alüminyum veya fiberglas
    postage_stamp_features:
      name: Posta pulu özellikleri
      description: Posta pullarının üst baskı veya filigran gibi özel özelliklerini
        tanımlar
    postpartum_stage:
      name: Doğum sonrası aşama
      description: Pedin tasarlandığı doğumdan sonraki zaman dilimini belirtir
    potential_extract:
      name: Potansiyel Ekstrakt
      description: Tahıl ve maltların bira üretiminde düşük veya yüksek gibi potansiyel
        ekstrakt seviyesini gösterir.
    pottery/sculpting_project_type:
      name: Çömlekçilik/Heykelcilik proje türü
      description: Modelleme veya maske yapımı gibi belirli bir çömlekçilik veya heykeltraşlık
        projesi türünü tanımlar
    potty/toilet_seat_design:
      name: Lazımlık/Klozet tasarımı
      description: Katlanabilir veya standart gibi lazımlık veya klozet koltuklarının
        stilini veya yapısını tanımlar
    potty_training_kit_components:
      name: Tuvalet eğitim seti bileşenleri
      description: Tuvalet eğitim setinde yer alan öğeleri belirtir; örneğin çıkartmalar,
        basamaklı tabure
    power_connector_type:
      name: Güç konnektörü tipi
      description: Yükseltici veya adaptör tarafından gerektirilen veya sağlanan yardımcı
        güç konektörlerini belirtir
    power_conversion_semiconductor_type:
      name: Güç dönüşüm yarı iletken tipi
      description: Şarj cihazının güç aşamasında kullanılan, boyut, verimlilik ve
        ısı üretimini etkileyen birincil yarı iletken malzemesini tanımlar
    power_source:
      name: Güç Kaynağı
      description: Bir ürünün çalışmak için kullandığı enerji kaynağını belirtir,
        örneğin güneş enerjisi veya piller
    power_supply_efficiency_rating:
      name: Güç kaynağı verimlilik derecesi
      description: Masaüstü bilgisayarın PSU'sunun 80 Plus verimlilik sertifika seviyesini
        belirtir
    power_supply_form_factor:
      name: Güç kaynağı form faktörü
      description: PSU'nun fiziksel boyutunu ve montaj standardını belirtir (örn.,
        ATX, SFX).
    power_supply_modularity:
      name: Güç kaynağı modülerliği
      description: PSU'nun kablolarının çıkarılamaz, kısmen çıkarılabilir veya tamamen
        çıkarılabilir olup olmadığını gösterir
    pregnancy_test_sensitivity:
      name: Hamilelik Testi Hassasiyeti
      description: Testin hamileliği belirleme yeteneğini belirtir; örneğin erken
        teşhis, standart tespit
    prescription_status:
      name: Reçete durumu
      description: Kulak damlalarının reçetesiz olarak mevcut olup olmadığını veya
        bir sağlık uzmanından reçete gerektirip gerektirmediğini belirtir
    presentation_supply_features:
      name: Sunum kaynağı özellikleri
      description: Ayarlanabilir yükseklik veya silinebilir yüzey gibi sunum malzemelerinin
        benzersiz özelliklerini açıklar
    preservation_type:
      name: Koruma Türü
      description: Sabit veya kurutulmuş gibi laboratuvar numunelerini korumak için
        kullanılan yöntemi tanımlar
    pretend_electronics_toy_type:
      name: Taklit elektronik oyuncak tipi
      description: Elektronik aletlerinin kategorisini belirtir; örneğin kamera, cep
        telefonu
    pretend_housekeeping_toy_type:
      name: Ev idaresi oyuncak türü
      description: Temizlik seti veya mutfak aletleri gibi evcilik oyuncağının türünü
        belirler
    primary_pcie_slot_version:
      name: Birincil PCIe yuva sürümü
      description: Tipik olarak grafik kartları için kullanılan ana x16 yuva tarafından
        desteklenen PCI Express jenerasyonunu belirtir
    primary_region:
      name: Birincil bölge
      description: Bir yazılım veya bulut hizmeti için birincil pazarı veya konumu
        belirtir; örneğin Kuzey Amerika, Asya-Pasifik
    primer_use:
      name: Astar Kullanımı
      description: Baz boya veya kapatıcı gibi bir astarın işlevini belirtir
    print_orientation:
      name: Baskı yönü
      description: Grafiğin malzemenin hangi tarafına basıldığını belirtir
    print_server_form_factor:
      name: Yazdırma sunucusu form faktörü
      description: Yazdırma sunucusunun fiziksel tasarımını belirtir (ör. harici kutu,
        dahili kart, USB dongle)
    print_technology:
      name: Baskı Teknolojisi
      description: Mürekkep püskürtmeli veya lazer gibi bir yazıcının kullandığı işlemi
        belirtir
    printer/copier_specialized_features:
      name: Yazıcı/Fotokopi makinesi özel özellikleri
      description: Mobil yazdırma desteği veya ses kontrolü gibi yazıcıların/fotokopi
        makinelerinin belirli özelliklerini vurgular
    printer_accessories_included:
      name: Yazıcı aksesuarları dahil
      description: Yazıcı, fotokopi makinesi veya faksla birlikte verilen ek bileşenlerin
        ayrıntıları; örneğin kağıt tepsisi, kaynaştırıcı
    printer_color_capability:
      name: Yazıcı renk kapasitesi
      description: Cihazın sadece monokrom çıktı verip vermediğini veya tam renkli
        baskı ve kopyalamayı destekleyip desteklemediğini belirtir
    printer_connection_interface:
      name: Yazıcı bağlantı arayüzü
      description: Yazdırma sunucusunun yazıcının kendisine bağlanmak için kullandığı
        bağlantı noktası türünü tanımlar
    printer_form_factor:
      name: Yazıcı form faktörü
      description: Cihazın fiziksel stilini veya taşınabilirliğini sınıflandırır
    printer_functions:
      name: Yazıcı İşlevleri
      description: Yazıcıların, fotokopi makinelerinin ve faks makinelerinin özelliklerini
        tanımlar; örneğin tarama, fotoğraf baskısı
    printing_color:
      name: Baskı Rengi
      description: Toner ve mürekkep püskürtmeli kartuşların renk çıkışını tanımlar;
        örneğin siyah, siyan
    printing_method:
      name: Baskı Yöntemi
      description: Ofset baskı veya gravür gibi yazdırma sürecini belirtir
    privacy_filtering_direction:
      name: Gizlilik filtreleme yönü
      description: Filtrenin hangi görüş yönlerinden görünürlüğü engellediğini gösterir
        (örn., iki yönlü yatay, dört yönlü)
    processor_cores:
      name: İşlemci Çekirdekleri
      description: Bir bilgisayarın işlemcisindeki çekirdek sayısını gösterir; örneğin
        ikili
    processor_family:
      name: İşlemci Ailesi
      description: Elektronik cihazın CPU'sunun serisini veya markasını tanımlar;
        örneğin Intel Core i7
    processor_socket:
      name: İşlemci Soketi
      description: LGA 1151 (soket H4) veya Soket AM4 gibi elektroniklerdeki uyumlu
        işlemci soket tipini belirtir
    processor_technology:
      name: İşlemci teknolojisi
      description: İşlemci teknolojisini tanımlar, genellikle ses ekipmanı için; örneğin
        yazılım tabanlı, tüp/valf
    product_benefits:
      name: Ürün Avantajları
      description: Bir ürünün genellikle sağlık ve güzellik açısından sunduğu faydaları
        açıklar; örneğin yumuşatma, sıkılaştırma
    product_certifications_standards:
      name: Ürün Sertifikaları ve Standartları
      description: Bir ürünün karşıladığı organik veya hayvanlar üzerinde deney yapılmayan
        sertifikalar veya standartları belirtir
    product_classification:
      name: Ürün sınıflandırması
      description: Değerli malzeme, para birimi veya değerli eşyanın türünü sınıflandırır
        (örneğin, para birimi, külçe, değerli taşlar, hediye kartı, NFT)
    product_form:
      name: Ürün Formu
      description: Bir ürünün biçimini veya sunumunu tanımlar, genellikle sağlık ve
        güzellik için; örneğin losyon, serum
    product_format:
      name: Ürün formatı
      description: Ürünün fiziksel bir ürün olarak mı yoksa dijital indirme olarak
        mı teslim edildiğini gösterir
    product_formulation:
      name: Ürün formülasyonu
      description: Temel madde, hazır karışım gibi inşaat sarf malzemelerinin bileşimini
        tanımlar
    product_manual_area:
      name: Ürün kılavuzu alanı
      description: Bir ürün kılavuzunun konusunu belirtir; örneğin kamera ve optik,
        ofis malzemeleri
    product_sterility:
      name: Ürün Sterilitesi
      description: Bir ürünün sağlık ve güvenlik açısından steril olup olmadığını
        belirtir
    product_use:
      name: Ürünün kullanımı
      description: Kıymetli materyallerin veya koleksiyon ürünlerinin birincil amaçlanan
        kullanımını veya amacını tanımlar (ör. para birimi/yasal ödeme aracı, koleksiyon
        ürünü, takı, hediye kartı)
    program_format:
      name: Program biçimi
      description: Kitapçık veya tek sayfa gibi etkinlik programlarının düzenini belirtir
    projection_design:
      name: Projeksiyon tasarımı
      description: Metin veya logo gibi bir aydınlatma filtresi veya gobo tarafından
        yansıtılan desen veya görüntüyü tanımlar
    projector_light_source:
      name: Projektör ışık kaynağı
      description: Projektördeki LED veya lazer gibi ışık kaynağının türünü tanımlar
    prop_theme:
      name: Prop teması
      description: Tarihsel veya bilimkurgu gibi film ve televizyon malzemelerinin
        tarzını veya türünü tanımlar
    propane_application:
      name: Propan uygulaması
      description: Propanın ısıtma veya ızgara gibi amacını belirtir
    propeller_blade_design:
      name: Pervane kanadı tasarımı
      description: Bir deniz taşıtı pervanesindeki kanatların 3 kanatlı veya 4 kanatlı
        gibi konfigürasyonunu açıklar
    prophy_cup_design:
      name: Profilaksi Kabı Tasarımı
      description: Diş hekimliğinde kullanılan fırça veya nervürlü profilaksi kaplarının
        tasarımını açıklar
    propulsion_type:
      name: Tahrik Tipi
      description: Dış mekan ekipmanı için hareket yöntemini belirtir; örneğin itme,
        çekme
    protected_component:
      name: Korunan bileşen
      description: Kapağın koruduğu langırt makinesinin parçasını belirtir
    protection_type:
      name: Koruma Tipi
      description: Tip I veya Tip II gibi güvenlik donanımının sunduğu koruma seviyesini
        tanımlar
    protective_gear_features:
      name: Koruyucu donanım özellikleri
      description: Darbeye dayanıklılık veya buğulanmayı önleme gibi koruyucu donanımın
        benzersiz özelliklerini tanımlar
    protective_mask_design:
      name: Koruyucu Maske tasarımı
      description: Tam veya yarım yüz maskesi gibi koruyucu maskelerin tasarımını
        belirtir
    protective_mask_features:
      name: Koruyucu Maske özellikleri
      description: Koruyucu maskelerin ayarlanabilir askılı veya valfli gibi benzersiz
        özelliklerini ayrıntılarıyla anlatır
    protein_processing_type:
      name: Protein işleme türü
      description: Proteinin nasıl rafine edildiğini veya işlendiğini belirtir (örn.
        izolat vs. konsantre), saflığı, sindirim hızını ve tüketici tercihini etkiler
    protein_source:
      name: Protein kaynağı
      description: Takviyede kullanılan ana protein kaynağını tanımlar
    pstn_connectivity_options:
      name: Pstn Bağlantı Seçenekleri
      description: Bir ürünün desteklediği Genel Anahtarlamalı Telefon Ağı (PSTN)
        arayüzlerini belirtir; örneğin FXO, POTS
    publication_frequency:
      name: Yayın Sıklığı
      description: Bir derginin veya gazetenin günlük veya aylık gibi ne sıklıkta
        yayınlandığını belirtir
    publication_type:
      name: Yayın türü
      description: Dergi makalesi veya tez gibi akademik veya araştırma yayınının
        türünü tanımlar
    pull_up_bar:
      name: Barfiks Çubuğu
      description: Fitness ekipmanında standart veya ham gibi kavrama türünü belirtir
    pump_accessories:
      name: Pompa aksesuarları
      description: Taşıma çantası veya biberonlar gibi göğüs pompalarıyla birlikte
        verilen öğeleri tanımlar
    pump_speed_settings:
      name: Pompa hızı ayarları
      description: Hız kontrol özelliklerini belirtir, genellikle göğüs pompaları
        için; örneğin ayarlanabilir hız
    punching/training_bag_material:
      name: Kum Torbası ve Antrenman Torbalası malzemesi
      description: Deri veya kanvas gibi bir boks/antrenman torbasında kullanılan
        ana malzemeyi tanımlar
    puppet_theme:
      name: Kukla teması
      description: Kuklaları tasarım temalarına göre insan veya fantastik gibi kategorilere
        ayırır
    puppet_type:
      name: Kukla Türü
      description: El kuklası veya kukla gibi kuklanın tarzını tanımlar
    push_button_terminal_type:
      name: Basmalı düğme terminal tipi
      description: Düğmedeki elektrik bağlantı stilini belirtir, kurulum sırasında
        kablo demetleri ve hızlı bağlantı sekmeleri ile uyumluluğu sağlar
    puzzle_theme:
      name: Bulmaca teması
      description: Hayvanlar veya uzay gibi bir bulmacanın ana konusunu veya motifini
        açıklar
    puzzle_type:
      name: Yapboz tipi
      description: 3D veya zeka oyunu gibi spesifik bulmaca türünü tanımlar
    quiver_style:
      name: Ok Kılıfı Stili
      description: Okçulukta ok kılıfının stilini belirtir; örneğin kalça, sırt
    rack_design:
      name: Raf Tasarımı
      description: Açık veya bölmeli gibi bir cam rafın düzenini veya yapısını açıklar
    rack_format:
      name: Raf formatı
      description: Raf veya masaüstü yerleşimi için kanal şeridinin fiziksel muhafaza
        veya boyut standardını tanımlar
    rack_mounting_style:
      name: Raf montaj stili
      description: Raf montajının yapısal stilini açıklar (ör. sabit raf, kayar raf,
        raylar, boş panel)
    rack_type:
      name: Raf Tipi
      description: Bir aracın bagaj veya tavan gibi depolama rafının stilini tanımlar
    rack_width_standard:
      name: Raf genişlik standardı
      description: Ürünün izlediği endüstri standardı yatay montaj genişliğini tanımlar
    racket_balance:
      name: Raket dengesi
      description: 'Bir raketin ağırlık dağılımını belirtir, örneğin: başı ağır, dengeli'
    racket_gauge:
      name: Raket Ölçümü
      description: Tenis raketi tellerinin kalınlığını belirtir, örneğin 16
    racket_head_shape:
      name: Raket başı şekli
      description: 'Raket başının şeklini tanımlar, örneğin: oval, izometrik'
    racket_material:
      name: Raket malzemesi
      description: Ahşap veya karbon fiber gibi bir spor raketinin yapıldığı malzemenin
        türünü belirtir.
    racket_string_design:
      name: Raketi İpi tasarımı
      description: Tenis raketlerindeki mono-filament ve multi-filament gibi tel yapılarını
        tanımlar
    racket_string_material:
      name: Raket ipi malzemesi
      description: Kevlar veya Poliüretan (PU) gibi tenis raketi tellerinin bileşimini
        belirtir
    radar_bands:
      name: Radar Bantları
      description: Bir radar cihazının algılayabileceği frekans bantlarını belirtir;
        örneğin X, K
    radar_technology:
      name: Radar Teknolojisi
      description: Bir üründe kullanılan radar teknolojisini belirtir; örneğin darbe,
        katı hal
    radio_case_design:
      name: Radyo kasası tasarımı
      description: Sabit veya döner gibi radyo taşıma çantalarının stilini veya işlevselliğini
        tanımlar
    radio_features:
      name: Radyo özellikleri
      description: Bir radyonun GPS desteği veya MP3 çalma gibi benzersiz özelliklerini
        belirtir
    radio_form_factor:
      name: Radyo form faktörü
      description: Amatör alıcı-vericinin fiziksel sınıfını tanımlar, montaj seçeneklerini,
        güç gereksinimlerini ve tipik kullanım senaryolarını etkiler
    radio_scanner_form_factor:
      name: Radyo tarayıcı form faktörü
      description: Radyo tarayıcının fiziksel konfigürasyonunu veya montaj stilini
        belirtir (ör. el tipi, taban, masaüstü, araç montajlı)
    radiology_compatibility:
      name: Radyoloji uyumluluğu
      description: Ortezin görüntüleme işlemleri sırasında (örn. MRI, CT, röntgen)
        hastanın üzerinde kalıp kalamayacağını gösterir
    raid_levels_supported:
