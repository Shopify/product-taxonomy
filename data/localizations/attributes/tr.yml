    compatible_can_size:
      name: Uyumlu kutu boyutu
      description: Ezicinin uyumlu olduğu içecek kutusu boyutlarını listeler.
    compatible_cigarette_size:
      name: Uyumlu sigara boyutu
      description: Sigara tutucuya uygun standart sigara uzunluklarını veya formatlarını
