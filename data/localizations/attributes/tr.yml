      description: Ürünün yalıtımlı olup olmadığını ve kullanılan yalıtım teknolojisini
        belirtir.
    food_dehydrator_surface_type:
      name: Gıda kurutucu yüzey tipi
      description: Tepsi veya tablaların yüzey tipini tanımlar; hava akışını ve gıdanın
