    infuser_type:
      name: İnfüzyon aparatı tipi
      description: Ürünle birlikte meyve veya çay süzgeci verilip verilmediğini ve
        türünü belirtir.
    inner_pot_coating:
      name: İç tencere kaplaması
      description: İç tencerenin yüzeyindeki kaplama türünü belirterek yapışmazlık
        özelliğini ve temizleme kolaylığını gösterir.
    insulation_capability:
      name: Yalıtım Özelliği
      description: Bu özellik, kılıfın içecekleri nasıl ve ne ölçüde yalıttığını gösterir
        ve yalnızca dekoratif amaçlı kılıfları sıcaklık kontrolü sağlayan kılıflardan
        ayırır.
    insulation_status:
      name: Yalıtım durumu
      description: Matara/termosun içecek sıcaklığını korumaya yardımcı olacak şekilde
        yalıtımlı olup olmadığını belirtir.
    insulation_technology:
      name: Yalıtım teknolojisi
      description: Sıcaklığı korumak için kullanılan yalıtım yapısını tanımlar.
    insulation_type:
      name: Yalıtım türü
      description: İçecek haznesinin veya soğutucunun yalıtılıp yalıtılmadığını ve
        nasıl yalıtıldığını belirtir; bu durum buz tutma performansını ve yoğuşma
        kontrolünü etkiler.
    intended_beverage_type:
      name: Hedeflenen içecek türü
      description: Dekantörün hangi ana içecek için tasarlandığını veya en sık hangi
        içecekle kullanıldığını belirtir.
    internal_membrane_type:
