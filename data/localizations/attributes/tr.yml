    media_section:
      name: Medya Bölümü
      description: Bir gazete veya derginin spor veya politika gibi spesifik kategorisini
        tanımlar
    media_theme:
      name: Medya teması
      description: Medya içeriğini seyahat veya oyun gibi birincil odak noktasına
        göre sınıflandırır
    medical_alarm_features:
      name: Medikal Alarm özellikleri
      description: Uzun pil ömrü veya iki yönlü iletişim gibi tıbbi alarm sisteminin
