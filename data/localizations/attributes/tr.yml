    vehicle_braking_features:
      name: Araç frenleme özellikleri
      description: Korozyona dayanıklı veya delinmiş gibi araç fren parçalarının spesifik
        özelliklerini açıklar
    vehicle_cleaning_item_features:
      name: Araç temizleme öğesi özellikleri
      description: Geliştirilmiş yakıt verimliliği veya yüksek parlaklık gibi araç
        temizlik ürünlerinin faydalarını vurgular
    vehicle_decor_features:
      name: Araç dekor özellikleri
      description: UV ışınlarına dayanıklı veya su geçirmez gibi araç dekor öğelerinin
        özelliklerini açıklar
    vehicle_drive/handling_features:
      name: Araç sürüşü/kullanım özellikleri
      description: Motorlu taşıt parçalarının özelliklerini tanımlar, genellikle şanzıman,
        aktarma sistemi, çekme ve tekerlek sistemlerinde; örneğin yüksek performans,
        ısıya dayanıklılık
    vehicle_engine/part_features:
      name: Araç motoru/parça özellikleri
      description: Yakıt verimliliği veya performans artışı gibi motorlu taşıt motor
        parçalarının benzersiz özelliklerini belirtir
    vehicle_engine_features:
      name: Araç motoru özellikleri
      description: Bir aracın motorunun yüksek performans veya yakıt verimliliği gibi
        belirli özelliklerini açıklar
    vehicle_exhaust_type:
      name: Araç egzoz tipi
      description: Bir araçtaki egzoz sisteminin tipini (aks arkası veya turbo arka
        gibi) tanımlar
    vehicle_features:
      name: Araç özellikleri
      description: Bir araçtaki ısıtmalı koltuklar veya navigasyon sistemi gibi özel
        özellikleri veya ekipmanları açıklar
    vehicle_floor_configuration:
      name: Araç tabanı konfigürasyonu
      description: Bir işe gidiş geliş aracının tabanının tasarım ve düzen özelliğini
        belirtir (örneğin alçak tabanlı veya yarı alçak tabanlı)
    vehicle_fluid_features:
      name: Araç sıvı özellikleri
      description: Antifriz veya biyolojik olarak parçalanabilirlik gibi araç sıvılarının
