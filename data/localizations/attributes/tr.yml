    soundboard_material:
      name: Ses tahtası malzemesi
      description: Arpın ses tahtasında kullanılan malzemeyi belirtir; rezonans ve
        tonu etkiler.
    soup_or_broth_variety:
      name: Çorba veya et suyu çeşidi
      description: Çorba veya et suyunun türünü, tarifini veya pişirme şeklini belirtir,
        böylece alıcı tercih ettiği türü hızlıca bulabilir.
    sour_cream_variety:
      name: Ekşi krema çeşidi
      description: Ekşi kremayı çeşidine veya kültürel stiline göre sınıflandırır
        (crème fraîche, Mexican crema vb.).
    soy_sauce_variety:
      name: Soya sosu çeşidi
      description: Soya sosunun belirli stilini veya formülasyonunu (örneğin, açık,
        koyu, tamari, ponzu) tanımlayarak, alıcının lezzet profiline ve mutfak kullanımına
        göre hızlıca filtreleme yapmasını sağlar.
    spark_plug_electrode_material:
      name: Buji elektrot malzemesi
      description: Bujinin ateşleme ucu elektrot(lar)ının malzemesini/teknolojisini
        belirtir (bakır, platin, iridyum vb.).
    spark_plug_seat_type:
      name: Buji yuva tipi
      description: Bujinin silindir kapağı arayüzünde kullandığı sızdırmazlık/oturma
        tipini belirtir.
    spark_plug_terminal_type:
      name: Buji terminal tipi
      description: Ateşleme kablosu/buji başlığı bağlantısı için kullanılan üst terminal
        tipini belirtir.
    sparkler_shape:
      name: Maytap şekli
      description: Maytabın genel şekil/tasarım formunu belirtir.
    speaker_cone_material:
      name: Hoparlör koni malzemesi
      description: Hoparlör konisinin (woofer/SKN konisi) ana malzemesi.
    speaker_size:
      name: Hoparlör boyutu
      description: Hoparlörün nominal sürücü/montaj boyutunu belirtir (ör. 6,5 inç,
        6x9 inç), fabrika çıkışı hoparlör konumları ve hoparlör adaptörleriyle uyumlu
        olması için kullanılır.
    special_effects_output_interface:
      name: Özel efekt çıkış arayüzü
      description: Özel efekt cihazlarını kontrol etmek için kullanılan çıkış bağlantı
        tipini belirtir.
    special_effects_stand_stability_features:
      name: Özel efekt standının denge özellikleri
      description: Etkinlik sırasında devrilmeyi/kaymayı önleyen yerleşik denge ve
        güvenlik özelliklerini belirtir.
    specialty_malt_name_type:
      name: Özel malt adı/türü
      description: Belirtilen özel malt türünü tanımlar (genellikle ticari stil adı
        olarak kullanılır).
    specimen_presentation:
      name: Numune sunum şekli
      description: Koleksiyon numunesinin nasıl hazırlandığını/sunulduğunu belirtir
        (ham, cilalı, kesilmiş, monte vb.).
    speed_bag_accessories_included:
      name: Dahil olan hız torbası aksesuarları
      description: Hız torbasıyla birlikte verilen ek ürünleri listeler; örneğin eldivenler,
        hava pompaları, döner bağlantılar, zincirler veya standlar.
    speed_rating:
      name: Hız derecelendirmesi
      description: Bilardo örtüsünün sağladığı oyun yüzeyi hızını belirtir (örn. yavaş,
        orta, hızlı).
    speedometer_backlight_type:
      name: Hız göstergesi arka aydınlatma tipi
      description: Gece görünürlüğü için hız göstergesinin arka aydınlatmasının olup
        olmadığını ve nasıl yapılacağını belirtir.
    speedometer_display_type:
      name: Hız göstergesi ekran tipi
      description: 'Hız göstergesinin hız okuma stilini belirtir: analog ibre/kadran,
        dijital sayısal gösterge veya analog ve dijital öğelerin bir kombinasyonu.'
    speedometer_unit_of_measure:
      name: Hız göstergesi ölçü birimi
      description: Kadran/ekranda gösterilen hız birimlerini belirtir.
    spike_replaceability:
      name: Çivi değiştirilebilirliği
      description: Ayakkabının üzerindeki çivilerin değiştirilebilir, sabit veya çivisiz
        olup olmadığını gösterir.
    spike_shape:
      name: Çivi uç şekli
      description: Çivi ucunun geometrik şeklini belirtir; bu da tutuşu ve farklı
        yüzeylere uygunluğunu etkiler.
    spike_thread_size:
      name: Çivi diş ölçüsü
      description: Çivinin ayakkabıya vidalanan diş ölçüsünü/standardını belirtir
        (ör. 1/4-20).
    spin_classification:
      name: Spin sınıflandırması
      description: Diskin tasarlandığı dönüş profilini belirtir (düşük, orta, yüksek
        vb.).
    spin_profile:
      name: Spin profili
      description: Şaftın desteklediği göreceli spin özelliklerini belirtir.
    spin_types_supported:
      name: Desteklenen spin türleri
      description: Makinenin toplara verebileceği spin çeşitlerini listeler, böylece
        oyuncular farklı vuruş stillerine karşı pratik yapabilirler.
    spinach_preparation_style:
      name: Ispanak hazırlama stili
      description: Ispanak yapraklarının fiziksel hazırlanış şeklini veya ürün formatını
        (örneğin, bütün yaprak, doğranmış, küp şeklinde) tanımlar.
    spinach_variety:
      name: Ispanak çeşidi
      description: Ispanağın botanik veya pazar çeşidini (örneğin, bebek ıspanağı,
        savoy ıspanağı, su ıspanağı, kırmızı ıspanak) tanımlayarak, alıcının tam olarak
        istediği türü seçmesini sağlar.
    spindle_bearing_surface_material:
      name: Mil yatağı yüzey malzemesi
      description: Destek milinde kullanılan uç/yatak yüzeyi malzemesini belirtir;
        pürüzsüzlük ve aşınmayı etkiler.
    spindle_bearing_type:
      name: Mil rulman tipi
      description: Destek haznesi/kabı ile sürtünmeyi azaltan mil ucu/rulman arayüzü
        tipi.
    spindle_finish:
      name: Mil yüzey kaplaması
      description: Milin yüzey kaplamasını/işlemini belirtir; his, dayanıklılık ve
        estetiği etkiler.
    spindle_hook_type:
      name: Mil kancası tipi
      description: İpliği/leader’ı sabitlemek için milin üst kısmındaki kanca mekanizmasını
        belirtir.
    spindle_support_method:
      name: Mil destek yöntemi
      description: Eğirme sırasında milin nasıl destekleneceğini belirtir.
    spindle_tip_style:
      name: Mil ucu stili
      description: Kabın içinde temas eden uç kısmın şekil/tasarımını belirtir; sürtünme
        ve dönüş akıcılığını etkiler.
    spindle_whorl_position:
      name: Mil çarkının konumu
      description: Çarkın mil üzerinde bulunduğu konumu belirtir.
    spinner_blade_shape:
      name: Spinner bıçak şekli
      description: Spinner üzerinde kullanılan ana bıçak şeklini belirtir; titreşim,
        parlama ve derinliği etkiler.
    spinner_control_card_design_type:
      name: Spinner kontrol kartı tasarımı/tipi
      description: Kontrol kartının türünü, kontrol bilgilerini sunma biçimi açısından
        tanımlar (örneğin, oran referansı, gerilim referansı, dönüşüm grafiği).
    spinner_subtype:
      name: Spinner alt türü
      description: Spinner tasarımını/ailesini sınıflandırır (örneğin inline spinner,
        spinnerbait).
    spinning_oil_application_area:
      name: Eğirme yağı uygulama alanı
      description: Eğirme çarkında yağın uygulanacağı noktaları belirtir.
    spinning_oil_application_tool:
      name: Çıkrık yağı uygulama aracı
      description: Yağın kontrollü uygulanması için kullanılan aplikatör/ambalaj ucu
        tipini belirtir.
    spinning_oil_features:
      name: Eğirme yağı özellikleri
      description: İplik eğirme makinesi yağlarının ilgili fonksiyonel özelliklerini
        (kalıntı, leke bırakma, oksidasyon ve yıkanabilirlik) belirtir.
    spinning_top_features:
      name: Çıkrık özellikleri
      description: Dönen topun temel dönme işlevi dışında sunduğu özel oyun özelliklerini
        belirtir.
    spinning_top_launch_mechanism:
      name: Dönen top başlatma mekanizması
      description: Dönen topun nasıl başlatıldığını/döndürüldüğünü belirtir.
    spinning_wheel_brake_tension_system_type:
      name: Eğirme çarkı fren/gerilim sistemi tipi
      description: İplik alımını kontrol eden fren/gerilim sistemi tipini belirtir.
    spinning_wheel_drive_system:
      name: Çıkrık tahrik sistemi
      description: Bobinin hangi tahrik sistemi için tasarlandığını gösterir.
    spinning_wheel_hook_system:
      name: Eğirme çarkı kanca sistemi
      description: İpliğin flyer kolları boyunca nasıl yönlendirildiğini belirtir.
    spinning_wheel_part_application:
      name: Eğirme çarkı parça kullanım alanı
      description: Yağın eğirme çarkının hangi bileşenleri için tasarlandığını belirtir.
    spinning_wheel_portability_foldability:
      name: Eğirme çarkı taşınabilirlik/katlanabilirliği
      description: Çarkın taşıma için katlanabilir/toplanabilir şekilde tasarlanıp
        tasarlanmadığını belirtir.
    spinning_wheel_tension_adjustment_type:
      name: Eğirme çarkı gerilim ayar tipi
      description: Çekiş kontrolü için gerilimin nasıl ayarlandığını belirtir.
    splice_termination_type:
      name: Ek/sonlandırma tipi
      description: Çapa hattındaki uç sonlandırma tipini belirtir (ek halkası, yüksük,
        zincir kancası vb.).
    split_shot_cut_type:
      name: Split kurşun yarık tipi
      description: İpe bağlantı yapılmasını sağlayan oluk veya açıklık stilini belirtir.
    split_shot_shape:
      name: Split kurşun şekli
      description: Split kurşunun fiziksel formunu belirtir; hidrodinamik ve takılma
        direncini etkiler.
    split_shot_size:
      name: Split kurşun boyutu
      description: Üretici ve balıkçılar tarafından kullanılan standart alfanümerik
        boyut kodunu (örn. SSG, AAA, BB, 1) belirtir. Kesin ağırlık ölçümlerini tamamlayıcı
        niteliktedir.
    spoiler_adjustability:
      name: Spoiler ayarlanabilirliği
      description: Spoiler açısının/yüksekliğinin ayarlanabilir olup olmadığını gösterir.
    spoke_accessory_function:
      name: Jant teli aksesuar işlevi
      description: Aksesuarın tekerlek üzerindeki temel işlevini belirtir (dekoratif,
        reflektif, aydınlatmalı vb.).
    spoke_butting_profile:
      name: Jant teli kalınlaştırma profili
      description: Jant telinin çapının uzunluğu boyunca nasıl değiştiğini (düz, tek,
        çift, üçlü veya dörtlü kalınlaştırılmış) ve bunun ağırlık ve mukavemeti nasıl
        etkilediğini açıklar.
    spoke_gauge:
      name: Jant teli kalınlığı
      description: Jant teli somununun uyumlu olduğu tel kalınlığı (tel kalınlığı
        derecesi) değerini belirtir.
    spoke_interface_type:
      name: Tel bağlantı arayüzü tipi
      description: Göbeğin tasarlandığı jant teli başı tipini belirtir (J-bend, straight-pull,
        T-head).
    spoke_shape:
      name: Jant teli kesit şekli
      description: Jant telinin dış kesit şeklini belirtir; aerodinamik ve estetiği
        etkiler.
    spool_form_factor:
      name: Makara form faktörü
      description: Makara gövdesinin fiziksel stilini ve ipin nasıl tutulduğunu belirtir
        (flanşlı, konik vb.).
    spoon_style:
      name: Kaşık (yem) stili
      description: Kaşığın işlevsel alt türünü veya stilini belirtir; örneğin, dökme,
        sallama veya sürükleme.
    sports_bra_padding_type:
      name: Spor sütyeni ped tipi
      description: Spor sütyeninde bulunan iç boşluğun türünü belirtir.
    sports_cap_style:
      name: Spor şapka stili
      description: Takım markasından bağımsız olarak, şapkanın genel yapısını/stilini
        (örneğin, beyzbol şapkası, snapback) tanımlar.
    sports_governing_body_certification:
      name: Spor yönetim organı sertifikası
      description: Ürünün yarışma standartlarını karşıladığını teyit eden, tanınmış
        spor yönetim organlarından alınan resmi sertifikaları veya onayları gösterir.
    sports_surface_compatibility:
      name: Spor yüzeyi uyumluluğu
      description: Boyanın güvenle uygulanabileceği oyun veya yüzey türlerini listeler.
    sports_toy_set_contents:
      name: Spor oyuncak seti içeriği
      description: Spor oyuncak setinin içerisinde hangi bileşenlerin bulunduğunu
        belirtir (örneğin, top, sopa, ağ, hedefler).
    spray_string_cleanup_method:
      name: Sprey ip temizleme yöntemi
      description: Sprey ip kalıntılarının nasıl temizleneceğini belirtir.
    spray_string_finish_effect:
      name: Sprey ip görsel efekti
      description: Püskürtülen boyanın uygulandıktan sonraki görsel etkisi (parlaklık/yansıtıcılık
        ve özel efektler).
    spray_string_formulation_type:
      name: Sprey ip formülasyon tipi
      description: Ürünün püskürtme sırasında ve sonrasında nasıl davrandığı (örneğin,
        yıkanabilir mi yoksa kalıcı mı).
    spray_string_recommended_surface:
      name: Sprey ip önerilen yüzey
      description: Sprey ipin uygulanabileceği (ve muhtemelen temizleneceği) yüzey
        tipleri.
    spray_string_scent:
      name: Sprey ip koku özelliği
      description: Sprey ipin varsa koku/aroma profilini belirtir.
    spray_string_suitable_age_group:
      name: Sprey ip uygun yaş grubu
      description: Güvenli kullanım için önerilen minimum kullanıcı yaşı/yaş grubu.
    spread_consistency:
      name: Sürüm kıvamı
      description: Sosun veya sürülebilir ürünün dokusunu/kıvamını tanımlayarak ağızda
        bırakacağı his ve kullanım şekliyle ilgili beklentileri belirler (örneğin,
        pürüzsüz, taneli, çırpılmış).
    spread_variety:
      name: Sürüm türü
      description: Meyve ezmesinin (örneğin reçel, jöle, marmelat, lor) türünü sınıflandırarak,
        alıcının farklı hazırlama stilleri ve dokuları arasında ayrım yapmasını sağlar.
    spreader_bar_type:
      name: Yayıcı çubuk tipi
      description: Tesisat ile birlikte verilen veya uyumlu olan bağlantı çubuğu veya
        kanca sisteminin tipini belirtir.
    sprint_canoe_class:
      name: Sprint kano sınıfı
      description: Sprint kano yarışlarının resmi sınıf tanımını belirtir.
    sprout_presentation:
      name: Filiz sunum şekli
      description: Ürünün fiziksel sunum formatını belirtir (taze filiz, mikro yeşillik,
        canlı saksı, toz vb.).
    squash_and_gourd_variety:
      name: Kabak/su kabağı çeşidi
      description: Kabak veya su kabağının belirli kültivarını ya da pazar çeşidini
        belirtir; böylece alıcılar istedikleri türü hızlıca bulabilir.
    stability_class:
      name: Stabilite sınıfı
      description: Uçuş değerlendirmelerinden veya pazarlama iddialarından türetilen
        genel istikrar sınıflandırması.
    stabilizer_thread_size:
      name: Stabilizatör diş ölçüsü
      description: Yaya veya arbalete stabilizatör/aksesuar takmak için kullanılan
        diş ölçüsünü belirtir.
    stabilizer_type:
      name: Stabilizatör tipi
      description: Yay veya arbalet dengeleyicisinin stilini veya konum sınıflandırmasını
        tanımlar.
    stages_supported:
      name: Desteklenen aşamalar
      description: Bir roketin veya kit kaç aşamada uçacak şekilde tasarlandığını
        gösterir.
    stain_remover_format:
      name: Leke çıkarıcı formatı
      description: Araç lekelerini çıkarmak için kullanılan ürün teslimat/formatını
        belirtir (sprey şişe, aerosol, köpük, jel, toz, mendil, kalem/markör).
    stake_shape:
      name: Çadır kazığı şekli
      description: Çadır kazığının kesitini veya tasarım stilini tanımlar ve bu da
        farklı zemin tiplerinde tutma gücünü etkiler.
    stamp_block_features:
      name: Damga bloğu özellikleri
      description: Ölçü ızgarası, tutma yeri veya kaymaz yüzey gibi işlevsel özellikleri
        belirtir.
    stamp_block_type:
      name: Damga bloğu tipi
      description: Damgalama işlemi için damgaları monte etmek amacıyla kullanılan
        damga bloğunun yapısını/stilini belirtir (örneğin, şeffaf akrilik blok, ahşap
        montajlı blok veya konumlandırma bloğu).
    stamp_set_pieces_included:
      name: Dahil olan damga seti parçaları
      description: Damga ve damga pedi setinde hangi bileşenlerin bulunduğunu gösterir
        (örneğin, damgalar, mürekkep pedleri, işaretleyiciler).
    stand_padding_material:
      name: Stand dolgu malzemesi
      description: Alet yüzeyini korumak için temas noktalarında kullanılan malzeme
        (örneğin, köpük, kauçuk, silikon).
    staple_fiber_animal_fiber_type:
      name: Hayvansal elyaf türü
      description: Elyaf kaynağı hayvansal olduğunda belirli hayvansal elyaf türünü
        belirtir.
    staple_fiber_crimp_level:
      name: Elyaf kıvrım seviyesi
      description: Elyafın doğal kıvrım/dalgalanma derecesini belirtir.
    staple_fiber_preparation_type:
      name: Elyaf hazırlama türü
      description: Elyafın satıştaki hazırlama/işleme durumunu belirtir (nasıl hizalandığı/işlendiği),
        eğirme yöntemini, çekme kolaylığını ve nihai sonucu büyük ölçüde etkiler.
    staple_fiber_source_type:
      name: Elyaf kaynağı türü
      description: Elyafın genel köken kategorisini belirtir.
    starch_processing_type:
      name: Nişasta işleme türü
      description: Nişastanın doğal olup olmadığını veya koyulaşma hızı veya sıcaklık
        toleransı gibi belirli işlevsel özellikler kazandırmak için fiziksel veya
        kimyasal olarak modifiye edilip edilmediğini (örneğin, hazır nişasta, ön jelatinleştirilmiş)
        gösterir.
    starch_source:
      name: Nişasta kaynağı
      description: Pişirme nişastası veya kıvam arttırıcı maddenin elde edildiği botanik
        kaynağı belirtir (örneğin, mısır, patates, tapyoka). Yemeklik nişastalar için
        en önemli ayırt edici özellik kaynak olup, tarif uygunluğunu, alerjen hususlarını
        ve tüketici arama davranışını doğrudan etkiler.
    starfruit_variety:
      name: Yıldız meyvesi çeşidi
      description: Yıldız meyvesinin belirli kültivarını/çeşidini belirtir (örneğin
        Arkin, Fwang Tung).
    starter_drive_type:
      name: Marş tahrik tipi
      description: Marş motorunun pinyon dişlisini volan dişlisiyle kavrayan tahrik/kavrama
        mekanizması tipini belirtir.
    starter_pistol_action_type:
      name: Starter tabancası çalışma (aksiyon) tipi
      description: Starter tabancasının ateşleme/çalışma mekanizması tipini belirtir
        (tek etkili, çift etkili, yarı otomatik vb.).
    starter_pistol_caliber:
      name: Starter tabancası kalibresi
      description: Starter tabancasının haznelediği boş fişek/mermi kalibresini belirtir.
    starter_terminal_type:
      name: Marş terminal tipi
      description: Marş motoru veya marş solenoidindeki elektrik bağlantı terminali
        tipini belirtir (saplama, maşa, fiş vb.).
    starting_block_anchoring_method:
      name: Başlangıç bloğu sabitleme yöntemi
      description: Başlangıç bloklarının pist yüzeyine nasıl sabitlendiğini belirtir
        (çivili, vantuzlu, kauçuk pedli vb.).
    steerer_tube_design:
      name: Gidon borusu tasarımı
      description: Gidon borusunun yapısal tasarımını (düz, konik, dişli vb.) tanımlar;
        bu tasarım, gidon yatağı ve kadro uyumluluğunu belirler.
    steering_cable_end_fitting_type:
      name: Direksiyon kablosu uç bağlantı tipi
      description: Tekne direksiyon kablosunun uçlarındaki (dümen ucu ve motor/dümen
        ucu) bağlantı/bağlantı şeklini belirleyerek, dümen ve motor bağlantı noktalarıyla
        uyumluluğu sağlar. Uygun olduğu durumlarda standart veya üretici tanımını
        kullanın.
    steering_column_adjustability_features:
      name: Direksiyon ayarlanabilirlik özellikleri
      description: Direksiyon kolonunda bulunan ayar özelliklerini belirtir.
    steering_column_ignition_provision:
      name: Direksiyon ve ateşleme sistemi
      description: Direksiyon kolonunun kontak kilidi ve/veya direksiyon kilidi takılmasına
        uygun olup olmadığını belirtir.
    steering_column_shaft_end_interface_type:
      name: Direksiyon mili ucu arayüz tipi
      description: Direksiyon kolonu şaft ucu bağlantı stilini belirtir (yivli, çift
        D, kamalı vb.).
    steering_column_shift_type:
      name: Direksiyon kolonu vites tipi
      description: Direksiyon kolonunun, kolona monte edilmiş bir vites değiştirme
        mekanizması içerip içermediğini ve şanzıman tipini belirtir.
    steering_component_drive_type:
      name: Direksiyon bileşeni tahrik tipi
      description: Direksiyon bileşenleriyle (özellikle pompalar ve direksiyon polistiren
        sistemleri) ilgili tahrik/destek mekanizmasını belirtir.
    steering_position:
      name: Direksiyon pozisyonu
      description: Aracın sol direksiyonlu mu yoksa sağ direksiyonlu mu olduğunu belirtir.
    steering_pump_pulley_type:
      name: Direksiyon pompası kasnağı tipi
      description: Direksiyon pompasıyla kullanılan kasnak tahrik tipini/arayüzünü
        belirtir.
    steering_rack_finish_coating:
      name: Direksiyon rafı kaplaması/yüzeyi
      description: Korozyona karşı koruma için dış yüzey kaplamasını/yüzey işlemini
        belirtir.
    steering_rack_position:
      name: Direksiyon kremayer konumu
      description: Direksiyon kremayerinin araçtaki direksiyon sistemi içinde hangi
        konumda monte edildiğini/kullanıldığını belirtir.
    steering_wheel_cover_installation_type:
      name: Direksiyon kılıfı montaj tipi
      description: Direksiyon kılıfının direksiyona nasıl takıldığı/sabitlendiği.
    steering_wheel_grip_material:
      name: Direksiyon simidi tutma yüzeyi malzemesi
      description: Jantın/tutma yerinin (ellerin temas ettiği yer) malzemesini belirtir;
        bu malzeme jantın gövdesinden/kollarından farklı olabilir.
    steering_wheel_mounting_pattern:
      name: Direksiyon simidi montaj deseni
      description: Direksiyon simidinin göbeğe veya adaptöre takılmasında kullanılan
        cıvata/delik montaj düzenini belirtir (örneğin, 3 cıvata, 5 cıvata).
    steering_wheel_rim_material_grip_surface:
      name: Direksiyon simidi tutma yüzeyi malzemesi
      description: Genel yapıdan bağımsız olarak tutma yüzeyindeki kaplama malzemesini
        belirtir.
    stem_material:
      name: Ağızlık sapı malzemesi
      description: Pipo sapı/ağızlığı için kullanılan malzemeyi belirtir (akrilik,
        ebonit, lüsit vb.).
    stencil_machine_consumable_type:
      name: Şablon makinesi sarf malzemesi türü
      description: Çalıştırmak için gerekli sarf malzemelerini (varsa) belirtir.
    step_surface_texture:
      name: Basamak yüzey dokusu
      description: Islak zeminde tutuşu ve konforu artırmak amacıyla tasarlanmış basamak
        deseni veya yüzey tasarımını/malzemesini belirtir.
    stepper_motion_type:
      name: Stepper hareket tipi
      description: Makinenin sunduğu temel adımlama hareket tipini belirtir.
    stick_bow_profile:
      name: Sopa yay profili
      description: Saha hokeyi sopasının şaftının eğrilik profilini (veya "yay tipini")
        belirtir; bu, top kontrolünü, sürükleme vuruşu performansını ve oyun stilini
        etkileyen kritik bir faktördür.
    stick_construction:
      name: Çubuk yapısı
      description: Hokey sopasının yapım tarzını belirtir; örneğin tek parça kompozit,
        iki parça kompozit veya ahşap.
    stick_curvature_type:
      name: Sopa eğrilik tipi
      description: Fırlatma sopasının eğrilik profilini belirtir; bu profil, atış
        mesafesini ve doğruluğunu etkiler.
    stick_head_shape:
      name: Sopa başı şekli
      description: Sopa başının şeklini belirtir, topu kontrol etme, vuruş stili ve
        yakın top kontrolünü etkiler.
    stick_size_compatibility:
      name: Çubuk boyut uyumluluğu
      description: Ürünün uyumlu olduğu hokey sopası beden grubunu belirtir (örneğin,
        Genç, Küçükler, Orta Seviye, Büyükler, Kaleci, Evrensel).
    sticker_decal_features:
      name: Etiket/çıkartma özellikleri
      description: Etiketlerin/çıkartmaların kendine özgü uygulama ve performans özelliklerini
        (örneğin, kabarcıksız, yeniden konumlandırılabilir) belirtir.
    sticker_finish:
      name: Çıkartma yüzey bitişi
      description: Etiketlerin yüzey dokusunu/görsel etkisini tanımlar.
    sticker_format:
      name: Etiket formatı
      description: Dekoratif etiketlerin satış formatını belirtir (örneğin, yaprak,
        rulo, tekli, kitap).
    sticker_material_type:
      name: Etiket malzemesi türü
      description: Dekoratif etiketin ana alt tabakasını/malzemesini belirtir (süslemeler
        hariç).
    stilt_foot_attachment_type:
      name: Sırık ayakkabısı ayak bağlantı tipi
      description: Kullanıcının ayağının sırığa nasıl bağlandığını belirtir (örneğin,
        tokalı kayış, cırt cırtlı bant, bağcıklı bağlama).
    stirrup_style:
      name: Üzengi tarzı
      description: Bu sınıflandırma, güvenlik, disiplin ve yapım farklılıklarını kapsayan,
        tasarıma veya disipline özgü üzengi tipini içerir.
    stirrup_tread_material:
      name: Üzengi basamak malzemesi
      description: Üzenginin ayak tabanı veya basma yüzeyi için kullanılan malzemeyi
        belirtir; bu malzeme tutuşu, konforu ve aşınmayı etkiler.
    stitch_marker_and_counter_style:
      name: İlmek işaretleyici ve sayaç stili
      description: İlmek işaretleyici veya ilmek/sıra sayacının stilini/formunu belirtir
        (kilitli işaretleyici, split halka, halka sayaç, dijital sayaç vb.).
    stitch_types:
      name: Dikiş türleri
      description: Makinenin üretebileceği dikiş türleri (işlevsel ve dekoratif).
    stitching_method:
      name: Dikiş yöntemi
      description: Top panellerinin nasıl birleştirildiğini belirtir.
    stitching_state:
      name: Dikiş durumu
      description: Giysi parçalarının dikilmemiş, yarı dikilmiş, dikilmiş veya giymeye
        hazır halde mi verildiğini gösterir.
    stock_car_race_series:
      name: Stok otomobil yarış serisi
      description: Bu yarış otomobilinin hangi yarış organizasyonunda veya yarış serisinde/sınıfında
        yarışmak üzere üretildiğini belirtir.
    stone_adhesion:
      name: Çekirdek ayrılma durumu
      description: Şeftali veya nektarin çekirdeğinin kolayca ayrılabilen, yapışık
        veya yarı ayrılabilir olup olmadığını gösterir.
    stone_creation_method:
      name: Taş oluşturma yöntemi
      description: Taşın doğal, laboratuvar üretimi, sentetik veya geri dönüştürülmüş
        olup olmadığını belirtir.
    stone_cut_grade:
      name: Taş kesim kalitesi
      description: Taşın genel kesim kalitesini belirtir.
    stone_cut_style:
      name: Taş kesim stili
      description: Cam taşın kesim/faset stilini belirtir (fasetli, kabaşon vb.).
    stone_fruit_cultivar:
      name: Taş meyve çeşidi
      description: Şeftali veya nektarinin belirli çeşidini/türünü tanımlar.
    stone_fruit_variety:
      name: Taş meyve çeşidi
      description: Kategori içindeki alt türü belirtir (şeftali, nektarin, yassı şeftali
        vb.).
    stone_setting_type:
      name: Taş montaj tipi
      description: Taşın ürüne nasıl sabitlendiğini belirtir (çerçeve, tırnak, pavé
        vb.).
    stone_transparency:
      name: Taşın şeffaflığı
      description: Cam taşın optik şeffaflık/opaklık durumunu belirtir.
    storage_case_type:
      name: Saklama kabı tipi
      description: Setin saklama/taşıma için hangi kapta sunulduğunu belirtir (kutu,
        çanta vb.).
    storage_compartment_type:
      name: Saklama bölmesi tipi
      description: Yüzme şamandırasının kişisel eşyalar için sağladığı saklama bölmesinin
        türünü belirtir.
    storage_media_and_transfer_methods_supported:
      name: Desteklenen depolama ortamları ve aktarım yöntemleri
      description: Örnek içe/dışa aktarımı ve proje kaydetme/yükleme için desteklenen
        ortam ve bağlantı yöntemlerini belirtir.
    storage_requirements:
      name: Depolama gereksinimleri
      description: Ürünün kalite ve güvenliği korumak için açılmadan önce ve/veya
        açıldıktan sonra nasıl saklanması gerektiğini belirtir.
    stove_jack_compatibility:
      name: Soba çıkışı uyumluluğu
      description: Çadırda soba borusu için yangına dayanıklı bir çıkış açıklığı bulunup
        bulunmadığını belirtir.
    straight_pin_application:
      name: Düz iğne kullanım alanı
      description: Düz iğnelerin amaçlanan kullanım alanını belirtir.
    straight_pin_finish:
      name: Düz iğne yüzey kaplaması
      description: İğnenin korozyon direncini ve kayganlığını etkileyen yüzey işlemini
        veya kaplamasını (örneğin, nikel kaplama) tanımlar.
    straight_pin_head_material:
      name: Düz iğne başlık malzemesi
      description: İğne başlığının (varsa) malzemesini belirtir (plastik, cam vb.).
    straight_pin_head_shape:
      name: Düz iğne başlık şekli
      description: İğne başlığının kullanım ve görünürlük açısından şeklini belirtir.
    strand_configuration:
      name: Tel dizilim konfigürasyonu
      description: Zincirin kaç ayrı sıra/halattan oluştuğunu belirtir (tekli, çiftli,
        üçlü).
    strand_material:
      name: Tel/şerit malzemesi
      description: Tek tek şeritlerin/akışkan ipliklerin malzemesini belirtir.
    strap_attachment_hardware:
      name: Kayış bağlantı donanımı
      description: Kayışı alete/destek noktasına takmak için kullanılan donanımın
        türünü/tasarımını belirtir.
    strap_configuration:
      name: Kayış yapılandırması
      description: Kayış üzerindeki kask bağlantı noktalarının sayısını gösterir (örneğin,
        2 noktalı, 4 noktalı), bu da uyum, güvenlik ve lig gereksinimleri açısından
        kritik öneme sahiptir.
    strap_functionality:
      name: Kayış işlevselliği
      description: Yoga matı kayışının asıl kullanım amacını veya tasarımını belirtir.
    strap_padding:
      name: Kayış dolgu seviyesi
      description: Kayışın dolgu yapısının konforunu artırmak ve ağırlığı dağıtmak
        amacıyla kullanılan dolgu seviyesini gösterir.
    strap_side:
      name: Kayış tarafı
      description: Kayışın sol, sağ veya çift olarak tasarlanıp tasarlanmadığını belirtir.
    strap_width:
      name: Kayış genişliği
      description: Omuz askılarının göreceli genişliğini (ince, orta, geniş) belirterek,
        belirli bir kapsama veya destek arayan alıcıya rehberlik eder.
    strength_classification:
      name: Dayanım sınıflandırması
      description: Markalar tarafından kullanılan pazarlama güç ifadesini belirtir
        (Hafif, Güçlü, Ekstra Güçlü vb.).
    strength_grade:
      name: Mukavemet derecesi
      description: Cırt cırtlı bağlantının amaçlanan tutma gücü / dayanım seviyesini
        belirtir.
    stretch_level:
      name: Esneme seviyesi
      description: Kumaşın kullanım sırasında ne kadar esnediğini gösterir.
    stretch_type:
      name: Esneme tipi
      description: Kumaşın mekanik mi yoksa elastik mi esneme özelliğine sahip olduğunu
        ve hangi yönlerde esnediğini gösterir.
    stretcher_bar_material:
      name: Gergi çıtası malzemesi
      description: Tuval gergi çıtaları/çerçevesi için kullanılan malzemeyi belirtir
        (çam, köknar, kavak, huş, MDF vb.).
    strike_shield_shape:
      name: Darbe kalkanı şekli
      description: Darbe kalkanının vuruş yüzeyinin genel formunu belirtir.
    string_core_shape:
      name: Tel çekirdek şekli
      description: Sarımlı tellerde kullanılan çekirdek telin şeklini belirtir; his
        ve stabiliteyi etkiler.
    string_coverage:
      name: Tel kapsama alanı
      description: Kısmi kaponun hangi telleri bastığını/kapsadığını belirtir (adet
        veya kombinasyon olarak).
    string_end_type:
      name: Tel uç tipi
      description: Uyumluluk açısından (özellikle akustik/elektrikli ve bazı bas gitarlar
        için önemlidir) telin köprü/kuyruk kısmında nasıl sonlandığını belirtir.
    string_set_type:
      name: Tel seti tipi
      description: Ürünün tam tel seti mi yoksa tekli yedek tel(ler) mi olduğunu belirtir.
    strung_status:
      name: İpli durumu
      description: Lakros başlığının ipli (hazır cepli) mi yoksa ipsiz mi satıldığını
        belirtir.
    strut_placement:
      name: Amortisör yerleşimi
      description: Amortisörün araç üzerindeki (ön/arka ve sol/sağ) montaj konumunu
        belirtir.
    stud_attachment_type:
      name: Çivi bağlantı tipi
      description: Kramponların/çivilerin dış tabana nasıl takıldığını veya yapılandırıldığını,
        Impact dayanımını, bakımını ve lig kurallarına uygunluğunu belirtir.
    stud_configuration:
      name: Çivi konfigürasyonu
      description: Çivilerin/kramponların tabandaki şekil ve dizilimini belirtir;
        tutuş ve performansı etkiler.
    stud_material:
      name: Krampon/çivi malzemesi
      description: Çivilerin/bağlantı elemanlarının ana malzemesini belirleyerek dayanıklılık,
        ağırlık ve güvenlik yönetmeliklerine uygunluk hakkında bilgi verir.
    stuffed_animal_features:
      name: Peluş oyuncak özellikleri
      description: Peluş oyuncağın oyun ve konfor özelliklerini belirtir.
    stump_base_type:
      name: Kriket direği taban tipi
      description: Kriket direğinin kullandığı taban veya montaj sisteminin stilini
        tanımlar (çivili, yaylı, ağırlıklı kauçuk vb.).
    stump_mechanism:
      name: Kriket direği mekanizması
      description: Kriket direğinin geri dönüş veya montaj mekanizmasını belirtir.
    stump_size:
      name: Kriket direği beden sınıfı
      description: Kriket direkleri için kullanılan, tipik yüksekliği ve uygun oyuncu
        yaş grubunu gösteren kategorik beden etiketi.
    subwoofer_installation_type:
      name: Subwoofer montaj tipi
      description: Subwoofer’ın araç ses sistemine nasıl monte edildiğini belirtir.
    sugar_cane_variety:
      name: Şeker kamışı çeşidi
      description: Şeker kamışının rengini, tatlılığını ve lif içeriğini etkileyebilecek
        olan belirli kültivar veya pazar çeşidini tanımlar.
    sugar_content_level:
      name: Şeker içeriği seviyesi
      description: İçecek konsantresinin genel şeker seviyesini veya formülasyonunu
        sınıflandırarak, tüketicinin normal, azaltılmış şekerli veya şekersiz seçenekleri
        hızlıca bulmasını sağlar.
    sugar_refinement_level:
      name: Şekerin rafinasyon seviyesi
      description: Şekerin rafine edilme derecesini veya tarzını (renk, melas oranı,
        işleme seviyesi) belirtir.
    sugar_source:
      name: Şeker kaynağı
      description: Şekerin elde edildiği botanik veya ham maddesel kaynağı belirtir.
    suit_fit:
      name: Takım elbise kesimi
      description: Takımın genel kesimi, vücuda ne kadar yakın oturduğunu gösterir.
    suit_pieces:
      name: Takım parça sayısı
      description: Takım elbise setinde kaç adet uyumlu giysi bulunduğunu belirtir
        (örneğin, 2 parçalı, 3 parçalı, 4 parçalı).
    suitable_for_anchoring_use:
      name: Demirleme için uygunluk
      description: Halatın/ipin demirleme amaçlı kullanım için uygun olup olmadığını
        belirtir.
    suitable_for_craft_type:
      name: Uygun el işi türü
      description: Bloklama telinin temel olarak hangi el işi tekniği için tasarlandığını
        belirtir.
    suitable_for_paint_type:
      name: Uygun boya türü
      description: Tuvalin hangi boya türleriyle kullanılmasının uygun/güvenli olduğunu
        gösterir.
    suitable_for_swim_stroke:
      name: Uygun yüzme stili
      description: Bu el paletinin hangi yüzme stili(leri) için tasarlandığını veya
        optimize edildiğini gösterir.
    suitable_mounting_surface_material:
      name: Uygun montaj yüzeyi malzemesi
      description: Yapışkan arka yüzeyin hangi yüzeylere uygun olduğunu belirtir.
    suitable_play_location:
      name: Uygun oyun alanı
      description: Kum ve su değirmeni oyuncağının temel kullanım ortamlarını belirtir.
    suitable_riding_conditions:
      name: Uygun sürüş koşulları
      description: Bisiklet yağı veya temizleyicisinin hangi sürüş koşuluna (örneğin,
        kuru, ıslak, kış) uygun olarak formüle edildiğini belirtir.
    suitable_snow_conditions:
      name: Uygun kar koşulları
      description: Tutuş wax'ının hangi kar koşulları için formüle edildiğini belirtir.
    suitable_surface_type:
      name: Uygun yüzey tipi
      description: Tutuş ürününün hangi yürüyüş yüzeyleri için uygun olduğunu belirtir.
    suitable_table_size:
      name: Uygun masa boyutu
      description: Lambanın aydınlatmak üzere tasarlandığı bilardo/snooker masasının
        uzunluğunu/uzunluklarını belirtir.
    sun_protection_rating_upf:
      name: Güneş koruma faktörü (UPF)
      description: Ürünün sertifikalı UPF güneş koruma seviyesini gösterir.
    sun_shade_attachment_method:
      name: Güneşlik bağlantı yöntemi
      description: Güneşliğin cama/ön cama nasıl sabitlendiğini belirtir.
    sun_shade_style:
      name: Güneşlik tipi
      description: Güneşliğin yapısal tipi ve açılıp katlanma formatını belirtir.
    sunchoke_variety:
      name: Yer elması çeşidi
      description: Yer elması (Kudüs enginarı) bitkisinin belirli çeşidini veya varyetesini
        belirtir ve bahçıvanlar, şefler ve seçici tüketiciler için ayrıntılı bilgi
        sağlar.
    sunflower_oil_variety:
      name: Ayçiçek yağı çeşidi
      description: Ayçiçek yağının yağ asidi profilini/çeşidini belirtir (Yüksek oleik,
        orta oleik, linoleik vb.).
    sunflower_variety:
      name: Ayçiçeği kültivarı
      description: Ayçiçeği çeşidi/kültivarı (kesme çiçek olarak kullanılan yaygın
        pazar çeşitleri).
    support_brace_features:
      name: Destek ateli özellikleri
      description: Bilek desteğinin nefes alabilen kumaş, çıkarılabilir atel veya
        ayarlanabilir metal plaka gibi dikkat çekici fonksiyonel özelliklerini listeler.
    support_leg_count:
      name: Destek ayağı sayısı
      description: Atış destek çubuğu kullanıldığında yere temas eden ayak sayısını
        belirtir (monopod, bipod, tripod vb.).
    support_padding:
      name: Destek dolgu özelliği
      description: Kayışın/desteğin temas noktalarında (boyun, omuz, başparmak) entegre
        dolgu içerip içermediğini belirtir.
    support_structure_type:
      name: Destek yapısı tipi
      description: Rüzgarlığın dik durmasını sağlayan yapı tipini belirtir.
    supported_bowling_delivery_types:
      name: Desteklenen kriket atış türleri
      description: Makinenin simüle edebileceği kriket atış türlerini belirtir (inswing,
        outswing, spin vb.).
    supported_dive_modes:
      name: Desteklenen dalış modları
      description: Dalış bilgisayarının desteklediği dalış modlarını belirtir (Air,
        Nitrox, Gauge vb.).
    supported_equipment_type:
      name: Desteklenen ekipman türü
      description: Rafın hangi kış sporları ekipmanlarını taşıyacak şekilde tasarlandığını
        belirtir (kayak, snowboard vb.).
    supported_spin_types:
      name: Desteklenen dönüş türleri
      description: Fırlatıcının uygulayabildiği top falso türlerini belirtir.
    supported_spool_bobbin_types:
      name: Desteklenen makara/bobin tipleri
      description: Elektrikli sarma makinesinin kabul ettiği makara/bobin tiplerini
        belirtir.
    surf_wax_temperature_rating:
      name: Sörf wax'ı sıcaklık derecesi
      description: Bu ürün, farklı iklimlerde optimum tutuş sağlamak amacıyla, cila
        formülünün hangi su sıcaklığı aralığı için üretildiğini belirtir.
    surface_coating_or_finish:
      name: Yüzey kaplaması veya bitişi
      description: Penseye uygulanan koruyucu veya performans artırıcı yüzey kaplamalarını
        belirtir.
    surface_coating_or_wrap:
      name: Yüzey kaplama veya sargı
      description: Orta kumanda kolunda (ve bazen el kumanda kollarında) kavrama/kontrol
        için kullanılan dış yüzey uygulaması.
    surface_finish:
      name: Yüzey işlemi
      description: Temas jonglörlüğünde tutuş ve hareketi etkileyen yüzey dokusunu
        belirtir.
    surface_finish_prep:
      name: Yüzey bitişi/hazırlığı
      description: Satış anındaki sürtünme yüzeyi durumunu belirtir (yeniden işlenmiş,
        döküm vb.).
    surface_types_included:
      name: Dahil olan yüzey tipleri
      description: Kitin çizim/boyama için hangi yüzeyi içerdiğini belirtir (tuval,
        kağıt, ahşap panel vb.).
    surfboard_construction:
      name: Sörf tahtası yapısı
      description: Sörf tahtasının temel yapım teknolojisini/katman yapısını belirtir.
    surfboard_tail_shape:
      name: Sörf tahtası kuyruk şekli
      description: Kuyruk formunu belirtir; manevra kabiliyeti ve tutuşu etkiler.
    suspension_bushing_type:
      name: Süspansiyon burç tipi
      description: Süspansiyon burcunun işlevsel/montaj tipini belirtir.
    suspension_configuration:
      name: Süspansiyon konfigürasyonu
      description: Üç tekerlekli bisiklette süspansiyon olup olmadığını ve konumunu
        belirtir.
    suspension_material:
      name: Süspansiyon malzemesi
      description: Salıncağı asmak için kullanılan zincirlerin, iplerin veya kabloların
        malzemesini belirtir.
    suspension_trainer_accessories_included:
      name: Dahil olan askı antrenman aleti aksesuarları
      description: Eğitim setiyle birlikte verilen ek parçaları (örneğin, kapı ankrajı,
        uzatma kayışı, saklama çantası) listeler ve bu sayede alıcının kutunun içinde
        ne olduğunu anlamasına ve paket değerini karşılaştırmasına yardımcı olur.
    suspension_trainer_anchor_type:
      name: Askı antrenman aleti ankraj tipi
      description: Kayışların hangi montaj stili veya sabitleme noktası için tasarlandığını
        (örneğin, kapı, tavan, ağaç) tanımlayarak kullanıcının ortamıyla uyumluluğunu
        belirtir.
    suspension_type:
      name: Süspansiyon tipi
      description: Çatalın rijit mi yoksa belirli bir süspansiyon sistemine mi (hava,
        yay, hibrit, elastomer vb.) sahip olduğunu belirtir, sürücülerin çatalı kendi
        sürüş stillerine uygun hale getirmelerine yardımcı olur.
    sustain_pedal_form_factor:
      name: Yastık pedalı form faktörü
      description: Yastık pedalının fiziksel stilini (örneğin, piyano tarzı ayak pedalı
        veya kompakt ayak anahtarı), hissiyatı ve kullanım amacını tanımlar.
    sustain_pedal_switch_type:
      name: Yastık pedalı anahtar tipi
      description: Pedalın anlık (basılı kaldığı sürece devam eden) veya kalıcı (açmak/kapatmak)
        sinyal gönderip göndermediğini gösterir.
    sustainability_certification:
      name: Sürdürülebilirlik sertifikası
      description: Ahşap malzeme için çevresel veya kaynak sertifikası.
    swab_intended_bassoon_section:
      name: Fagot için temizleme bezi kullanım bölümü
      description: Temizleme çubuğunun fagotun hangi bölümünü temizlemek için tasarlandığını
        belirtir (farklı delikler/bölümler farklı temizleme çubuğu şekil ve boyutları
        gerektirir).
    swab_style:
      name: Temizleme bezi tipi
      description: Saksafonun belirli bölgelerine ulaşmak veya bu bölgelerden geçmek
        için kullanılan temizleme bezinin fiziksel tasarımını/biçimlerini tanımlar.
    swab_weight_material:
      name: Temizleme bezi ağırlık malzemesi
      description: Çekme ağırlığının malzemesini belirtir; çizilme riskini ve dayanıklılığı
        etkiler.
    swab_weight_style:
      name: Ağırlık stil tipi
      description: Temizleme bezinin fagot borusundan geçmesi için nasıl ağırlıklandırıldığını
        belirtir.
    sway_bar_adjustability:
      name: Viraj denge çubuğu ayarlanabilirliği
      description: Viraj denge çubuğunun sertliğinin ayarlanabilir olup olmadığı ve
        nasıl ayarlanabilir olduğu (genellikle birden fazla uç bağlantı montaj deliği
        aracılığıyla).
    sway_bar_coating:
      name: Viraj denge çubuğu kaplaması
      description: Korozyon direnci ve estetik görünüm için denge çubuğuna uygulanan
        yüzey kaplaması veya uygulaması.
    sway_bar_fitment_front_rear_kit:
      name: Viraj denge çubuğu montajı (ön/arka/kit)
      description: Viraj denge çubuğunun ön aks için mi, arka aks için mi yoksa ön
        ve arka kit olarak mı satıldığını gösterir.
    sweatshirt_pocket_type:
      name: Sweatshirt cep tipi
      description: Sweatshirt üzerindeki ceplerin stilini tanımlar.
    sweet_potato_variety:
      name: Tatlı patates çeşidi
      description: Tatlı patatesin belirli kültivarını veya pazar çeşidini tanımlar.
    sweet_spot_position:
      name: Tatlı nokta konumu
      description: Sopanın tatlı noktasının bıçak boyunca nerede konumlandığını belirtir;
        oyun stilini ve zemin koşullarını etkiler.
    sweetener_presence:
      name: Tatlandırıcı varlığı
      description: Fıstık ezmesinde ilave tatlandırıcı olup olmadığını ve hangi oranda
        bulunduğunu belirtir.
    sweetening_type:
      name: Tatlandırıcı türü
      description: Ürünün nasıl tatlandırıldığını veya tatlılık seviyesini açıklar.
    swim_armband_construction_type:
      name: Yüzme kol bandı yapım türü
      description: Kol bantlarının yapısal tipini veya yüzdürme mekanizmasını belirtir
        (şişirilebilir, katı köpük, hibrit vb.).
    swim_belt_purpose:
      name: Yüzme kemeri kullanım amacı
      description: Yüzme kemerinin işlevsel sınıflandırmasını belirtir (örneğin, yüzdürme
        desteği, aqua jogging, direnç antrenmanı, sabit bağlama, sürükleme paraşütü
        bağlantısı, ağırlık dengeleme, güvenli sığ su kullanımı).
    swim_board_features:
      name: Yüzme tahtası özellikleri
      description: Yüzme tahtasının kullanım kolaylığını veya güvenliğini artıran
        özel özelliklerini veya geliştirmelerini belirtir.
    swim_bottom_length:
      name: Mayo altı uzunluğu
      description: Yüzme şortunun bacak kapsama uzunluğunu belirtir (kısa, diz hizası
        vb.).
    swim_buoy_features:
      name: Yüzme şamandırasının özellikleri
      description: Yüzme şamandırasının görünürlüğünü, güvenliğini veya kullanışlılığını
        artıran ek önemli özellikleri veya eklentileri belirtir.
    swim_cap_style:
      name: Yüzme bonesi tarzı
      description: Yüzme bonesinin yapım veya tasarım stilini tanımlar (örneğin, uzun
        saçlı, kubbeli/yarışçı, baloncuklu/türban).
    swim_diaper_feature:
      name: Yüzme bezi özelliği
      description: Bu yüzme kıyafetinin entegre sızdırmaz bez özelliğine sahip olup
        olmadığını veya ayrı bir yüzme bezine ihtiyaç duyup duymadığını gösterir.
    swim_trainer_features:
      name: Yüzme antrenman aleti özellikleri
      description: Yüzme antrenman aletinin ek işlevsel veya konfor özelliklerini
        belirtir.
    swim_trainer_type:
      name: Yüzme eğitici tipi
      description: Yüzme antrenman aletinin yapısal stilini veya formatını tanımlayarak,
        tasarım ve antrenman amacına göre filtrelemeye yardımcı olur.
    swim_training_focus:
      name: Yüzme antrenman odağı
      description: El paletinin hedeflediği temel antrenman amacını belirtir (örneğin,
        teknik, güç, kas izolasyonu).
    swim_weight_style:
      name: Yüzme ağırlık stili
      description: Yüzme ağırlığının şekil faktörünü sınıflandırarak, alıcının aynı
        kategori içinde kalırken temelde farklı ürün türleri arasında ayrım yapmasına
        yardımcı olur.
    swimbait_buoyancy:
      name: Yem yüzdürme özelliği
      description: Yemin suda nasıl davrandığını gösterir (yüzer, askıda kalır, batar,
        vb.), böylece balıkçılar hedef derinliklerine ve avlanma stillerine uygun
        doğru yemi seçebilirler.
    swimbait_style:
      name: Yüzen yem stili
      description: Yemlerin yapısını veya hareket tasarımını sınıflandırır; örneğin,
        kürek kuyruklu veya kaygan yem gibi.
    swimwear_pieces_included:
      name: Dahil olan mayo parçaları
      description: Burkini setinde Supply giyim bileşenlerinin listesini vererek alıcının
        paketin içinde tam olarak ne olduğunu bilmesini sağlar.
    swimwear_set_pieces_included:
      name: Dahil olan mayo seti parçaları
      description: Burkini setinde bulunan giyim parçalarını listeler, böylece alıcı
        tam olarak ne alacağını bilir (örneğin, üst, tayt, başörtüsü/şapka).
    swing_attachment_connection_type:
      name: Salıncak bağlantı tipi
      description: Salıncağın destek noktasına asılması için kullanılan bağlantı türü
        (örneğin, ip, zincir, kayış).
    swing_trainer_type:
      name: Salınım eğitici tipi
      description: Salınım antrenman aletinin stilini veya mekanizmasını sınıflandırarak,
        alıcının antrenman hedeflerine uygun cihazı hızlıca bulmasını sağlar.
    swing_training_objective:
      name: Salınım antrenman amacı
      description: Salınım antrenman aletinin temel antrenman odağını, mekanizmasını
        veya amacını sınıflandırır (örneğin, tempo, hız, kavrama).
    switch_electrical_positions:
      name: Anahtar elektriksel konumları
      description: Anahtardaki elektriksel konumların sayısını ve davranışını belirtir
        (örneğin, 3 konumlu, anlık açık).
    swivel_type:
      name: Döner mekanizma tipi
      description: Tasma dolaşmasını azaltmak için kullanılan döner mekanizma tipini
        belirtir.
    sword_scabbard_material:
      name: Kılıç kını malzemesi
      description: "(Varsa) dahil olan kın/kılıfın ana malzemesini belirtir."
    synthesizer_form_factor:
      name: Sentezleyici form faktörü
      description: Sentezleyicinin fiziksel/çalma arayüzü formatını tanımlar.
    synthetic_feather_style:
      name: Sentetik tüy tarzı
      description: Farklı görünümler ve el işi teknikleri için kullanılan sentetik
        tüyün stilini/kesimini belirtir.
    synthetic_formulation_type:
      name: Sentetik formülasyon tipi
      description: Sentetik baz yağ/formülasyon tipini belirtir (örneğin, PAO, ester,
        hidrokraking yöntemiyle elde edilen III. grup).
    syrup_base_ingredient:
      name: Şurup baz bileşeni
      description: Şurup veya nektarın elde edildiği ana bitki/şeker kaynağını belirtir
        (akçaağaç, agav, şeker kamışı vb.).
    syrup_variety:
      name: Şurup çeşidi
      description: Şurubun genel stilini veya kategorisini, formülasyonuna veya geleneksel
        kullanımına göre tanımlar (örneğin, akçaağaç şurubu, kahve aroması, meyve
        şurubu, tıbbi şurup).
    t_shirt_fit:
      name: Tişört kesimi
      description: Tişörtün genel kalıp/kesim tipini belirtir.
    tabla_included_components:
      name: Tabla dahil edilen bileşenler
      description: Tabla ürününde hangi temel parçaların dahil olduğunu belirtir (tek
        davul, set, kılıf, akort anahtarı vb.).
    tabla_set_pieces_included:
      name: Dahil olan tabla seti parçaları
      description: Tabla setine dahil olan bileşenleri belirtir (dayan, bayan, halkalar,
        kılıflar, akort aletleri, çanta vb.).
    tabla_tonal_pitch_range_bayan:
      name: Tabla ton/perde aralığı (bayan)
      description: Gövde ve yapısına göre bayan davullarının (bas davulları) tipik
        perde/ton aralığı kategorisini tanımlar.
    table_base_material:
      name: Masa taban malzemesi
      description: Masanın tabanının veya kaidesinin (ayaklarından veya masa tablasından
        farklı olarak) ana malzemesini belirleyerek, malzemeye özgü filtrelemeye yardımcı
        olur.
    table_base_type:
      name: Tablo taban tipi
      description: Masa tablasını destekleyen yapısal tasarımı tanımlar (örneğin,
        kaide, sehpa, X taban).
    table_coverage_position:
      name: Masa örtü uyum pozisyonu
      description: 'Kılıfın hangi masa tenisi masası pozisyonuna/pozisyonlarına uygun
        olduğunu gösterir: katlanmış, oyun halinde veya her ikisi birden.'
    table_hockey_part_type:
      name: Masa hokeyi parça tipi
      description: Masa üstü/havalı/çubuklu/balonlu hokey sistemlerindeki belirli
        bileşen türünü tanımlar.
    table_leg_design:
      name: Masa ayağı tasarımı
      description: Bacağın yapısal stilini veya geometrisini belirleyerek, alıcının
        belirli estetik ve destek ihtiyaçlarına uygun bir ürün seçmesini sağlar.
    table_size:
      name: Masa boyutu
      description: Bilardo masasının ticari olarak belirtilen genel boyutunu (fit
        cinsinden) belirtir, alıcının 7 fitlik bar masaları veya 9 fitlik turnuva
        masaları gibi yaygın seçenekleri hızlıca seçmesine olanak tanır.
    table_size_category:
      name: Masa boyut kategorisi
      description: Bu özellik, alıcının ölçü hesaplaması yapmadan mevcut alana uygun
        Langırt masasını seçmesine yardımcı olmak için Langırt masalarını genel kapladıkları
        alana göre kategorize eder.
    table_tennis_certification:
      name: Masa tenisi sertifikası
      description: Ürünün sahip olduğu resmi standart veya federasyon onaylarını belirtir
        (örneğin, ITTF, EN 14468-2 sınıfları).
    tabletop_tilt_function:
      name: Masa tablası eğim fonksiyonu
      description: Masa tablasının farklı açılara eğilebilme, dönebilme veya hareket
        edebilme özelliğini belirtir.
    tackle_components_included:
      name: Dahil olan olta takımı bileşenleri
      description: Kit içinde bulunan balıkçılık malzemelerinin tam listesini vererek
        alıcının nelerin sağlandığını bilmesini sağlar.
    talking_drum_accessories_included:
      name: Dahil olan konuşan davul aksesuarları.
      description: Konuşan davulla birlikte kutuda bulunan aksesuarları listeler.
    talking_drum_cord_material:
      name: Konuşan davul kordon malzemesi
      description: Davul derilerini birbirine bağlayan gergi telleri/ipleri için kullanılan
        malzeme.
    talking_drum_tuning_mechanism:
      name: Konuşan davul akort mekanizması
      description: Çalım sırasında (veya kurulumda) perdenin nasıl değiştirildiğini/gerginliğin
        nasıl uygulandığını belirtir.
    tam_tam_construction_style:
      name: Tam-tam yapım tarzı
      description: Tam-tamın yapım/çekiçleme stilini belirtir.
    tam_tam_items_included:
      name: Dahil olan tam-tam ürünleri
      description: Tam-tam ile birlikte verilen aksesuarlar (örneğin, tokmak, stand,
        kılıf).
    tamarillo_variety:
      name: Tamarillo çeşidi
      description: Tamarillo meyvesinin belirli çeşidini veya renk varyasyonunu tanımlar.
    tamarind_variety:
      name: Demirhindi çeşidi
      description: Demirhindi bitkisinin botanik veya ticari çeşidini belirtir; bu
        da lezzetini, dokusunu ve mutfak kullanımını etkiler.
    tambourine_frame_style:
      name: Tef çerçeve tipi
      description: Tefin elde tutularak çalınmasını sağlayan fiziksel çerçeve yapısını
        belirtir.
    tambourine_head_material:
      name: Tef deri malzemesi
      description: Zarlı teflerde çalma zarının malzemesini belirtir.
    tambourine_jingle_configuration:
      name: Tef zil düzeni
      description: Tef üzerindeki zillerin nasıl yerleştirildiğini belirtir.
    tambourine_jingle_material:
      name: Tef zil malzemesi
      description: Tefin zillerinin (metal disklerin) malzemesini belirtir; bu da
        ses tonunu ve dayanıklılığını etkiler.
    tambourine_mounting_type:
      name: Tef montaj tipi
      description: Tefin çalınırken nasıl tutulacağını veya monte edileceğini belirtir.
    tambourine_tuning_mechanism:
      name: Tef akort mekanizması
      description: Ayarlanabilir el teflerinde kullanılan akort sistemini belirtir
        (varsa).
    tank_model_scale:
      name: Tank model ölçeği
      description: Tank modelinin ölçek oranını belirtir (1:35, 1:72 vb.).
    tank_top_back_style:
      name: Atlet sırt stili
      description: Atletin sırt kısmının kesimini/şeklini belirtir; destek ve hareket
        özgürlüğünü etkiler.
    tape_application_area:
      name: Bant uygulama alanı
      description: Bandın ekipmanın veya oyuncunun hangi bölümüne uygulanmak üzere
        tasarlandığını belirtir, alıcının doğru stili seçmesine yardımcı olur.
    tape_finish:
      name: Bant yüzey bitişi
      description: Bandın yüzey/görsel bitişini (parlaklık veya doku) belirtir.
    tape_purpose:
      name: Bant kullanım amacı
      description: Bandın raket bakımı veya kişiselleştirmedeki temel işlevini belirtir.
    tape_type:
      name: Bant türü
      description: Kumaş, şeffaf polietilen, kavrama bandı, esnek yapışkan bant, dizlik
        veya süet gibi hokey bandının işlevsel stilini veya yapısını sınıflandırır.
    tapenade_main_ingredients:
      name: Tapenade ana malzemesi
      description: Tapenade’i tanımlayan ana temel malzemeyi (zeytin, domates, patlıcan,
        biber vb.) belirtir; bu, içerik bazlı tercihleri veya kısıtlamaları olan alıcılar
        için faydalıdır.
    tapestry_loom_loom_format:
      name: Goblen tezgahı form tipi
      description: Goblen el tezgahının genel form tipini/ayak stilini belirtir.
    tapestry_loom_shedding_method:
      name: Goblen tezgahı ağızlık oluşturma yöntemi
      description: Tezgâhın, atkının geçirilmesi için çözgü ipliklerini ayırarak ağızlık
        oluşturma yöntemini belirtir.
    tapestry_loom_tensioning_system:
      name: Goblen tezgahı gerdirme sistemi
      description: Dokuma tezgahında çözgü ipliklerini germek ve sabitlemek için kullanılan
        yöntem.
    tar_head_material:
      name: Tar başlık malzemesi
      description: Tar enstrümanının zar (membranın) malzemesini tanımlar; bu da vuruş
        hissini, dayanıklılığını ve tonunu büyük ölçüde etkiler.
    tar_playing_style:
      name: Tar çalma stili
      description: Tarın tasarlandığı temel çalma pozisyonunu/tekniğini belirtir.
    tar_tuning_system:
      name: Tar akort sistemi
      description: Tarın nasıl akort edildiğini (zar geriliminin nasıl ayarlandığını)
        belirtir.
    target_components:
      name: Hedef bileşenleri
      description: Ürünün hangi yakıt/hava giriş bileşenlerini temizlemek için tasarlandığını
        belirtir.
    target_relative_humidity_rh:
      name: Hedef bağıl nem (RH)
      description: Ürünün enstrüman/kutu ortamında sağlamayı hedeflediği bağıl nem
        (RH) seviyesini belirtir.
    target_resetting_mechanism:
      name: Hedef sıfırlama mekanizması
      description: Hedefin vurulduktan sonra başlangıç konumuna nasıl (veya dönüp
        dönmediğini) belirtir.
    target_trainer_type:
      name: Hedef antrenman aracı tipi
      description: Raketbol veya squash antrenman aletinin genel stilini veya formatını
        sınıflandırır.
    targeted_contaminants:
      name: Hedeflenen kirleticiler
      description: Ürünün ortadan kaldırdığı mikrop veya parazit türlerini belirtir.
    targeted_muscle_group:
      name: Hedeflenen kas grubu
      description: Yardımcı aletin amaçlandığı birincil kas grubu, çalıştırılması
        veya desteklenmesi gereken kas grubudur.
    taro_variety:
      name: Taro çeşidi
      description: Sunulan taro kökünün çeşidini, türünü veya pazar adını belirtir
        (örneğin, Mor Taro, Eddoe, Dasheen).
    tassel_trim_header_type:
      name: Püskül şerit üst bant tipi
      description: Püskül şeridin bir yüzeye sabitlenmesini sağlayan üst bant/montaj
        kısmının yapısını belirtir (örneğin, bant, örgü, kordon).
    tassel_trim_use_case:
      name: Püskül şeridin temel kullanım alanını belirtir.
      description: Püskül süslemenin asıl kullanım alanı.
    taste_profile:
      name: Tat profili
      description: Elma çeşidinin baskın tat özelliklerini tanımlar.
    tea_variety:
      name: Çay çeşidi
      description: Çayın veya bitki çayının türünü/stilini sınıflandırır (örneğin,
        siyah, yeşil, matcha, rooibos) ve alıcının tercih ettiği çeşitleri filtrelemesini
        sağlar.
    teasing_tool_style:
      name: Elyaf açma aleti stili
      description: Elyafı açmak ve karıştırmak için kullanılan aletin fiziksel stilini
        veya formunu belirtir (örneğin, fırça, tırmık, tarak).
    tee_base_style:
      name: Rugby vuruş sehpası taban tipi
      description: Rugby vuruş sehpasının topu destekleyen tabanının yapısal tasarımını
        belirtir.
    temper_hardness:
      name: Sertlik / dayanıklılık
      description: Telin ne kadar yumuşak veya sert olduğunu (şeklini ne kadar iyi
        koruduğunu) belirtir.
    temperature_control_type:
      name: Sıcaklık kontrol tipi
      description: Aletin sıcaklığının nasıl kontrol edildiğini veya ayarlandığını
        belirtir.
    tenkara_action_ratio:
      name: Tenkara aksiyon oranı
      description: Kamışın yük altında nerede büküldüğünü gösteren geleneksel Tenkara
        esneklik oranını belirtir (örneğin, 6:4).
    tennis_ball_court_surface:
      name: Tenis topu kortu yüzeyi
      description: Topun en iyi performans ve dayanıklılığı sağlamak üzere tasarlandığı
        kort yüzeylerini belirtir.
    tennis_ball_pressure_type:
      name: Tenis topu basınç tipi
      description: Topun sıçrama ve dayanıklılığını etkileyen iç basınç türünü veya
        yapısını belirtir (basınçlı, basınçsız, düşük basınçlı, köpük).
    tennis_racket_grip_size:
      name: Tenis raketi tutuş ölçüsü
      description: Raket sapının standartlaştırılmış çevre ölçüsünü (L0–L5 veya inç
        karşılıkları) belirterek ele uygunluk ve konfor sağlar.
    tenor_flutophone_fingering_system:
      name: Tenor flütfon parmak sistemi
      description: Tenor flütfon için kullanılan parmak sistemini (müfredat/nota sistemi)
        belirtir.
    tenor_recorder_joint_type:
      name: Tenor blok flüt bağlantı tipi
      description: Tenor blok flütün bölümleri arasındaki bağlantı tipini belirtir.
    tenor_saxophone_key_system:
      name: Tenor saksafon tuş sistemi
      description: Kullanılan tuş sistemi/standardını belirtir (genellikle Fransız/Boehm
        sistemi).
    tenor_saxophone_pad_material:
      name: Tenor saksafon ped malzemesi
      description: Enstrüman pedlerinde kullanılan ana malzemeyi belirtir.
    tenor_trombone_slide_type:
      name: Tenor trombon sürgü tipi
      description: Tenor trombonda kullanılan sürgü tipini belirtir (örneğin, standart/düz
        veya tetikli/axial flow).
    tenor_trombone_valve_configuration:
      name: Tenor trombon valf konfigürasyonu
      description: Tenor trombonun valf/rotor bağlantısına sahip olup olmadığını ve
        hangi konfigürasyonu kullandığını belirtir.
    tension_control_type:
      name: Gerginlik kontrol tipi
      description: Mekik mekanizmasının, iplik besleme sırasında bobin/mil üzerinde
        ayarlanabilir bir sürtünme/gerilim sağlayıp sağlamadığını (veya nasıl sağladığını)
        belirtir.
    tension_mechanism:
      name: Gerilim mekanizması
      description: Dokuma sırasında bobinden/pirnden atkı ipliğinin geçişini kontrol
        etmek için kullanılan gerilim sistemini belirtir.
    tension_pitch_modulation_system:
      name: Gerilim/perde modülasyon sistemi
      description: Konuşan davulun çalma sırasında (örneğin gerilim iplerini sıkarak)
        perde/gerginliği nasıl değiştirdiğini belirtir.
    tension_system:
      name: Gergi sistemi
      description: Flyer kitinin tasarlandığı iplik eğirme çarkı toplama/gerilim sistemini
        belirtir.
    tent_fabric_material:
      name: Çadır kumaş malzemesi
      description: Çadırın dış tentesinde veya gövdesinde kullanılan ana kumaşı belirtir;
        bu kumaş ağırlık, nefes alabilirlik ve hava koşullarına dayanıklılığı etkiler.
    tent_season_rating:
      name: Çadır mevsim derecesi
      description: Çadırı tasarlandığı mevsim sayısına veya hava koşullarına göre
        sınıflandırır (örneğin, 3 mevsimlik, 4 mevsimlik, keşif tipi).
    tent_setup_type:
      name: Çadır kurulum tipi
      description: Çadırın yapısal kurulum stilini belirtir (örneğin, bağımsız, yarı
        bağımsız, bağımsız olmayan, şişme/airframe veya pop-up).
    tent_style:
      name: Çadır stili
      description: Çadırın yapısal tasarımını tanımlar (örneğin, kubbe, tünel, A-frame).
    test_result_output_method:
      name: Test sonucu çıktı yöntemi
      description: Araç akü test cihazının test sonuçlarını kullanıcıya nasıl sunduğunu
        belirtir (örneğin, gösterge, ekran, yazılı çıktı, uygulama veya yazılım raporu).
    tether_strap_system:
      name: Bağlama/kayış sistemi
      description: Boyun desteğini kask veya emniyet sistemine bağlamak için kullanılan
        bağlantı/kayış sisteminin türünü belirtir (varsa).
    text_color:
      name: metin rengi
      description: Etiket üzerindeki baskılı veya işlemeli metnin rengini belirtir
        (etiket arka plan renginden bağımsızdır).
    textile_craft_machine_operation_type:
      name: Tekstil el işi makinesi çalışma tipi
      description: Makinenin nasıl çalıştırıldığı (elle mi, ayakla mı yoksa motorlu/elektrikli
        mi).
    textile_finish_treatment:
      name: Tekstil yüzey işlemi / apre
      description: Tekstil malzemesine uygulanan önemli yüzey işlemlerini/apreleri
        belirtir.
    texture_inclusions:
      name: Dokusal ilaveler
      description: Aloe vera parçacıkları, fesleğen tohumu, nata de coco, patlayan
        boba veya meyve parçaları gibi eklenen dokusal bileşenleri belirtir.
    therapeutic_technology:
      name: Terapötik teknoloji
      description: Soğutma jeli, manyetik şeritler veya kızılötesi seramik gibi entegre
        terapötik özellikleri belirtir.
    thermal_set_components:
      name: Termal bağlantı tipi
      description: Ürünün yalnızca alt parça, yalnızca üst parça veya her iki parçanın
        birlikte set olarak sunulup sunulmadığını belirtir.
    thermal_weight:
      name: Termal ağırlık
      description: Balaklava kumaşının ısı yalıtım kategorisini belirtir.
    thermostat_type:
      name: Termostat tipi
      description: Motorlu taşıt soğutma sistemi termostatının işlevsel tasarımını
        veya kontrol tipini belirtir.
    thimble_guide_size:
      name: Yüksük kılavuzu beden ölçüsü
      description: Yüksük kılavuzunun ölçü yerine genellikle küçük/orta/büyük olarak
        ifade edilen beden (uyum/kapsama) tanımını belirtir.
    thread_connection_size:
      name: Diş ölçüsü
      description: Şaftları, uçları ve adaptörleri birbirine bağlayan diş ölçüsünü
        belirtir (örneğin, 6 mm, 5/16"-24).
    thread_construction:
      name: İplik yapısı
      description: İpliğin nasıl üretildiğini veya işlem gördüğünü belirtir (örneğin,
        çok katlı nakış ipliği veya bonded iplik).
    thread_cord_type_beading_pattern:
      name: İplik/kordon tipi (boncuk deseni)
      description: Deseni tamamlamak için önerilen iplik veya kordon tipini belirtir.
    thread_cutter_form_factor:
      name: İplik kesici form faktörü
      description: İplik kesicinin fiziksel stilini belirtir (örneğin, elde tutulan
        makas tipi, kolye tipi veya yüzük tipi).
    thread_cutter_mechanism:
      name: İplik kesici mekanizması
      description: İplik kesicinin kullandığı kesme mekanizmasını veya çalışma şeklini
        belirtir.
    thread_cutter_safety_features:
      name: İplik kesici güvenlik özellikleri
      description: Kazara kesilme riskini azaltan veya depolama sırasında bıçakları
        koruyan yerleşik güvenlik özelliklerini belirtir.
    thread_cutter_usage_application:
      name: İplik kesici kullanım amacı
      description: İplik kesicinin temel kullanım amacını belirtir.
    thread_finish_treatment:
      name: İplik yüzey işlemi
      description: İpliğe uygulanan ve kullanım ile performansı etkileyen yüzey işlemini
        belirtir (örneğin, mumlu, bonded, merserize).
    thread_material:
      name: İplik malzemesi
      description: İpliğin (kumaş değil) ana elyaf/malzeme içeriğini belirtir.
    thread_material_fiber:
      name: İplik malzemesi (elyaf)
      description: İpliğin kendisinde kullanılan ana elyafı/malzemeyi belirtir (kumaş
        değil).
    thread_package_format:
      name: İplik ambalaj formatı
      description: Dikiş ipliğinin ambalaj biçimini belirtir (örneğin, makara, koni,
        bobin).
    thread_rack_compatible_spool_type:
      name: İplik rafı uyumlu makara tipi
      description: Rafın kabul edecek şekilde tasarlandığı iplik ambalaj türünü belirtir
        (makara, koni vb.).
    thread_standard_size:
      name: Diş standardı ölçüsü
      description: Ürün etiketinde kullanılan iplik kalınlık/ağırlık standardını belirtir
        (örneğin, wt, Tex, denier).
    thread_type:
      name: İplik türü
      description: Kanaviçe ipliğinin yapısını/türünü belirtir.
    thread_weight_system:
      name: İplik ağırlık sistemi
      description: İplik kalınlığını/ağırlığını ifade etmek için kullanılan standardı
        belirtir.
    thread_yarn_guide_mounting_attachment_style:
      name: İplik ve yün kılavuzu montaj tipi
      description: Kılavuzun kullanım sırasında nasıl takıldığını veya monte edildiğini
        belirtir.
    thread_yarn_guide_tension_control:
      name: İplik ve yün kılavuzu gerilim kontrolü
      description: Kılavuzun iplik veya yün üzerinde ayarlanabilir gerilim/sürtünme
        sağlayıp sağlamadığını ve nasıl sağladığını belirtir.
    thread_yarn_organizer_features:
      name: İplik ve yün düzenleyici özellikleri
      description: İplik/yün saklamaya özgü işlevsel düzenleme ve taşınabilirlik özelliklerini
        belirtir.
    threader_intended_use:
      name: Dişli kullanım amacı
      description: El tipi iğne iplik geçiricinin öncelikle hangi el işi/dikiş bağlamı
        için tasarlandığını belirtir.
    threading_system:
      name: İplik geçirme sistemi
      description: Overlok makinesinde kullanılan iplik geçirme yöntemini ve yardımcı
        sistemleri belirtir (örneğin, manuel, renk kodlu, kılavuzlu, hava ile iplik
        geçirme).
    threading_type:
      name: Diş açma tipi
      description: Takının içten dişli, dıştan dişli, dişsiz veya uygulanamaz olup
        olmadığını belirtir.
    throttle_type_scooter_conversion:
      name: Gaz kolu tipi (scooter dönüşümü)
      description: Dönüşüm kitinin içerdiği veya gerektirdiği gaz kolu tipini/arayüzünü
        belirtir.
    throw_rope_end_attachment:
      name: Atma ipi uç bağlantı tipi
      description: Atma ipinin çalışma ucunda bulunan bağlantı donanımını veya halkayı
        belirtir.
    throw_rope_storage_packaging_type:
      name: Atma ipi saklama/ambalaj tipi
      description: Atma ipinin nasıl saklandığını veya kullanıma sunulduğunu belirtir
        (örneğin, çanta veya makara).
    throw_rope_visibility_features:
      name: Atma ipi görünürlük özellikleri
      description: İpin su içinde veya düşük ışıkta daha kolay görülmesini sağlayan
        görünürlük ve tanımlama özelliklerini belirtir.
    thrower_operation_type:
      name: Fırlatıcı çalışma tipi
      description: Fırlatıcının mekanik/çalışma stilini sınıflandırarak manuel ve
        otomatik mekanizmaların hızlı filtrelenmesini sağlar.
    thumb_design:
      name: Başparmak tasarımı
      description: Eldivende başparmağın nasıl tasarlandığını ve bunun güvenlik ile
        kavrama üzerindeki etkisini açıklar.
    tiara_design:
      name: Taç tasarımı
      description: Tacın genel yapısal stilini veya silüetini belirtir.
    tie_down_points_straps_included:
      name: Dahil olan bağlama noktaları/kayışları
      description: Rafın motosiklet/scooter sabitlemek için entegre bağlama noktaları
        ve/veya dahil kayışlar içerip içermediğini belirtir.
    tiling_format:
      name: Sayfa yerleşim formatı
      description: Basılı sayfaların birleştirilmesi için kullanılan PDF yerleşim
        stilini belirtir.
    time_current_characteristic:
      name: Zaman-akım karakteristiği
      description: Sigortanın zaman-akım davranışını belirtir (örneğin, hızlı tepki
        veya gecikmeli tepki) ve ani akım devrelerine uygunluğunu etkiler.
    timer_count_mode:
      name: Zamanlayıcı sayım modu
      description: Zamanlayıcının sayım modunu belirtir (geri sayım, ileri sayım/kronometre,
        her ikisi veya aralıklı/tekrarlı).
    timer_display_type:
      name: Zamanlayıcı görüntüleme türü
      description: Oyun zamanlayıcısının kalan süreyi nasıl gösterdiğini belirtir
        (örneğin, dijital ekran, analog kadran, kum saati veya görsel gösterge olmaması).
    timer_operating_modes:
      name: Zamanlayıcı çalışma modları
      description: Efekt tetikleme için desteklenen zamanlayıcı davranışları
    timing_belt_construction_material_rubber_compound:
      name: Zamanlama kayışı yapım malzemesi (kauçuk bileşimi)
      description: Kullanılan ana kayış kauçuk bileşimini (örneğin, HNBR) belirtir;
        bu bileşim ısı ve yağ direnci ile kullanım ömrünü etkiler.
    timing_belt_profile:
      name: Triger kayışı diş profili
      description: Triger kayışının diş profili/şekil standardını belirtir (örneğin,
        trapez veya eğrisel).
    timing_belt_reinforcement_cord_material:
      name: Triger kayışı takviye kordonu malzemesi
      description: Triger kayışının içindeki takviye kordon malzemesini (örneğin,
        fiberglas, aramid) belirtir; bu malzeme dayanım ve esnemeyi etkiler.
    timing_component_material:
      name: Zamanlama bileşeni malzemesi
      description: Zamanlama bileşeninin ana malzemesini belirtir (kayış bileşimi,
        zincir/dişli metali, kaplama malzemesi).
    tin_whistle_body_material:
      name: Teneke düdükler gövde malzemesi
      description: Gerekli durumlarda, genel enstrüman malzeme listesinden daha spesifik
        olarak teneke düdük gövdesi malzemesini belirtir.
    tin_whistle_bore_type:
      name: Teneke düdük iç delik tipi
      description: Teneke düdük iç delik tasarımını belirtir.
    tin_whistle_included_accessories:
      name: Dahil olan teneke düdük aksesuarları
      description: Teneke düdük ile birlikte verilen aksesuarları belirtir (örneğin,
        kılıf, temizleme çubuğu).
    tip_finish_coating:
      name: Uç yüzey bitişi/kaplaması
      description: Çalışma ucuna uygulanan yüzey işlemini belirtir (örneğin, krom
        kaplama, toz boya); bu işlem korozyon direncini ve jant hasarını etkiler.
    tip_shape:
      name: Uç şekli
      description: Gitar penasının ucunun şekil veya keskinliğini belirtir; bu durum
        artikülasyon ve çalım hissini etkiler.
    tippet_rating:
      name: Tippet derecesi
      description: Sinek balıkçılığında X derecelendirmesiyle ifade edilen önerilen
        maksimum tippet kalınlığını belirtir (örneğin, 4X).
    tire_changer_operation_type:
      name: Lastik sökme makinesi çalışma tipi
      description: Lastik sökme makinesinin nasıl çalıştırıldığını belirtir (örneğin,
        manuel, pnömatik, hidrolik). Genel “Güç kaynağı” özelliğinden farklıdır; makinenin
        çalışma/aktifleşme yöntemini tanımlarken kullanılır.
    tire_changer_type:
      name: Lastik sökme makinesi tipi
      description: Lastik sökme makinesinin genel çalışma tarzını, tasarımını veya
        otomasyon seviyesini belirtir.
    tire_compound_type:
      name: Lastik hamur tipi
      description: Lastiklerde kullanılan kauçuk bileşimi sınıflandırmasını belirtir
        (örneğin, yumuşak, yağmur, slick); bu sınıflandırma farklı koşullarda tutuş
        ve dayanıklılığı etkiler.
    tire_load_range:
      name: Lastik yük aralığı
      description: Lastiğin katman derecesini/yük aralığını belirtir (genellikle LT
        lastikler için); bu değer taşıma kapasitesini yansıtır.
    tire_position:
      name: Lastik konumu
      description: Araç üzerinde önerilen montaj konumunu belirtir.
    tire_repair_kit_components:
      name: Lastik tamir kiti bileşenleri
      description: Kitte hangi parçaların bulunduğunu belirtir ve müşterilerin paket
        içeriğini karşılaştırmasına olanak tanır.
    tire_sidewall_type:
      name: Lastik yanak tipi
      description: Yanak tasarımını veya yapısal özelliklerini belirtir.
    tire_speed_rating:
      name: Lastik hız derecesi
      description: Maksimum sürekli hız kapasitesini gösteren lastik hız derecelendirme
        harfini belirtir (örneğin, H, V, W).
    tire_spoon_type:
      name: Lastik levyesi tipi
      description: Lastik levyesini uç şekline ve kullanım amacına göre sınıflandırır.
    tire_system_compatibility:
      name: Lastik sistem uyumluluğu
      description: Sızdırmazlık sıvısının iç lastiksiz (tubeless), iç lastikli veya
        her iki sistem için uygun olup olmadığını belirtir.
    tire_temperature_rating_utqg:
      name: Lastik sıcaklık derecesi (UTQG)
      description: Otomotiv lastikleri için UTQG sıcaklık dayanım sınıfını belirtir
        (örneğin, A, B, C).
    tire_traction_rating_utqg:
      name: Lastik çekiş derecesi (UTQG)
      description: UTQG ıslak zemin frenleme performansı için çekiş sınıfını belirtir.
    tire_tread_style:
      name: Lastik sırt deseni
      description: Lastiğin genel sırt desenini tanımlar; bu desen kullanım amacına
        uygun arazi ve çekiş özelliklerini yansıtır.
    tire_tube_type:
      name: Lastik iç lastik tipi
      description: Lastiğin iç lastiksiz (tubeless) veya iç lastikli kullanım için
        tasarlanıp tasarlanmadığını belirtir.
    title_status:
      name: Ruhsat durumu
      description: Aracın yasal/tescil (ruhsat) durumunu belirtir.
    tobacco_application:
      name: Tütün kullanım amacı
      description: Gevşek tütünün hangi tüketim yöntemi veya içim ekipmanı için tasarlandığını
        belirtir.
    tobacco_cut_type:
      name: Tütün kesim tipi
      description: Gevşek tütünün fiziksel kesim veya hazırlama stilini belirtir;
        bu durum yanma hızını, doldurma yöntemini ve genel içim deneyimini etkiler.
    tobacco_strength:
      name: Tütünün yoğunluğu
      description: Tütünün tüketildiğinde hissedilen gövde veya nikotin etkisini belirtir;
        kullanıcıların tercih ettikleri yoğunluğu seçmelerine yardımcı olur.
    toe_construction:
      name: Burun yapısı
      description: Dalgıç botlarının burun kısmının konfigürasyonunu belirtir; bu
        durum dengeyi, board hissini ve sıcaklık yalıtımını etkiler.
    toe_coverage:
      name: Ayak parmağı kaplama tipi
      description: Çorabın sağladığı ayak parmağı kaplama türünü belirtir.
    toe_pick_style:
      name: Burun dişi stili
      description: Artistik paten bıçaklarındaki burun dişinin tasarımını belirtir.
    toe_protection_type:
      name: Burun koruma tipi
      description: Ayakkabının burun kısmının güvenlik amacıyla güçlendirilip güçlendirilmediğini
        ve nasıl güçlendirildiğini belirtir (örneğin, çelik burun, yumuşak burun).
    toe_reinforcement_type:
      name: Burun takviye tipi
      description: Burun kısmının yapısal tasarımını belirtir; bu yapı dayanıklılığı
        ve ayakkabı uyumluluğunu etkiler.
    toe_stop_stem_thread_size:
      name: Burun freni sap diş ölçüsü
      description: Burun freni sapının diş ölçüsünü belirtir; bu ölçü plaka uyumluluğunu
        sağlar.
    tofu_preparation_style:
      name: Tofu hazırlama stili
      description: Tofunun sertlik dışında geleneksel stilini veya alt türünü sınıflandırır
        (örneğin, ipeksi, blok, puf, kabuk, düğümlü, fermente).
    tom_mount_adjustment_features:
      name: Tom montaj ayar özellikleri
      description: Tom montaj aparatının davulun konumlandırılması için sağladığı
        ayarlamaları belirtir (örneğin, eğim, dönüş, yükseklik).
    tom_mount_components_included:
      name: Dahil olan tom montaj bileşenleri
      description: Tom montaj aparatı ile birlikte hangi parçaların dahil olduğunu
        belirtir (gövde, kol, bilye, kelepçeler, hafıza kilitleri vb.).
    tom_mount_mounting_position:
      name: Tom montaj pozisyonu
      description: Tom montaj aparatının nereye takılacağını belirtir (örneğin, bas
        davul, zil sehpası, rack sistemi).
    tonneau_cover_mounting_style:
      name: Kasa örtüsü montaj stili
      description: Tonneau kapağın kamyon kasası raylarına nasıl monte edildiğini/bağlandığını
        belirtir.
    tool_case_form_factor:
      name: Alet çantası form faktörü
      description: Alet çantasının fiziksel stilini belirtir; bu stil taşınabilirlik
        ve depolamayı etkiler (örneğin, evrak çantası tipi, sert kabuklu).
    tool_functions_included:
      name: Dahil olan alet fonksiyonları
      description: Çok amaçlı aletin veya alet setinin gerçekleştirebileceği belirli
        onarım veya bakım fonksiyonlarını listeler.
    top_bunk_access_method:
      name: Üst ranza erişim yöntemi
      description: Üst ranzaya nasıl erişildiğini belirtir; güvenlik ve alan planlamasına
        yardımcı olur.
    top_fit:
      name: Üst giysi kalıbı
      description: Üst giysinin vücut üzerindeki genel silüetini veya kalıbını belirtir
        (örneğin, dar kesim, oversize).
    top_hat_style:
      name: Silindir şapka tarzı
      description: Silindir şapkanın belirli stil varyasyonunu belirtir.
    top_soundboard_material:
      name: Üst (ses tahtası) malzemesi
      description: Gitarın üst kısmının/ses tahtasının (ana ses üreten plaka) malzemesini
        belirtir.
    topping_form:
      name: Üst malzeme formu
      description: Tatlı üzerindeki malzemenin fiziksel formunu veya kıvamını belirtir;
        kullanıcıların uygun ürünü hızlıca seçmesini sağlar.
    topping_type:
      name: Üst malzeme türü
      description: Donut üzerine uygulanan ana dış kaplama veya üst malzemeyi belirtir.
    tow_hook_type:
      name: Çeki kancası tipi
      description: Kneeboard’un entegre bir çeki kancası içerip içermediğini ve mekanizma
        stilini belirtir.
    tow_point_configuration:
      name: Çekme noktası konfigürasyonu
      description: Çekilebilir tüpün farklı sürüş pozisyonları için sunduğu çekme
        noktası konfigürasyonunu belirtir (tekli, çiftli, çoklu).
    tow_strap_protective_features:
      name: Çekme kayışı koruyucu özellikleri
      description: Çekme kayışına entegre edilmiş dikkat çekici güvenlik ve dayanıklılık
        özelliklerini belirtir.
    tow_strap_type:
      name: Çekme kayışı tipi
      description: Çekme kayışının işlevsel yapısını belirtir (örneğin, statik çekme
        kayışı veya kinetik kurtarma kayışı).
    towable_tube_style:
      name: Çekilebilir tüp tipi
      description: Çekilebilir tüpün genel tasarımını veya formunu belirtir; bu tasarım
        sürüş pozisyonunu ve deneyimi etkiler.
    towed_water_sport_discipline:
      name: Çekmeli su sporu disiplini
      description: Eldivenin tasarlandığı temel çekmeli su sporu disiplinini belirtir.
    towel_features:
      name: Havlu özellikleri
      description: Havlunun sahip olduğu özel özellikleri veya ek unsurları listeler.
    towel_style:
      name: Havlu stili
      description: Golf havlusunun işlevsel tasarımını veya biçimini sınıflandırır.
    toy_airplane_control_type:
      name: Oyuncak uçak kumanda tipi
      description: Oyuncak uçağın kullanıcı tarafından nasıl kontrol edildiğini belirtir.
    toy_airplane_features:
      name: Oyuncak uçak özellikleri
      description: Oyuncak uçakta bulunan dikkat çekici oyun özelliklerini belirtir.
    toy_airplane_flight_capability:
      name: Oyuncak uçak uçuş özelliği
      description: Oyuncak uçağın gerçekten uçmak/süzülmek için mi yoksa esas olarak
        yerde oynama/sergileme amacıyla mı tasarlandığını belirtir.
    toy_audio_features:
      name: Oyuncak ses özellikleri
      description: Oyuncağa entegre edilmiş ses özelliklerini ve ses efektlerini listeler.
    toy_boat_play_features:
      name: Oyuncak tekne oyun özellikleri
      description: Oyuncak teknelerin dikkat çekici etkileşimli oyun özelliklerini
        belirtir.
    toy_boat_recommended_play_environment:
      name: Oyuncak tekne için önerilen oyun ortamı
      description: Oyuncak teknenin kullanım için tasarlandığı oyun ortamını belirtir
        (örneğin, küvet veya açık su); güvenlik ve kullanıcı beklentilerini destekler.
    toy_bowling_equipment_included:
      name: Dahil olan oyuncak bowling ekipmanları
      description: Oyuncak bowling setine dahil olan bileşenleri belirtir (örneğin,
        pinler, top, pist/mat, taşıma çantası).
    toy_car_features:
      name: Oyuncak araba özellikleri
      description: Oyuncak arabaya entegre edilmiş (hareket mekanizmasından bağımsız)
        ışık, ses veya açılabilir parçalar gibi oyun özelliklerini belirtir.
    toy_drawing_tablet_accessories_included:
      name: Dahil olan oyuncak çizim tableti aksesuarları
      description: Tabletin kendisi dışında dahil edilen ek aksesuarları belirtir
        (örneğin, yedek kalem, damgalar).
    toy_drawing_tablet_erase_method:
      name: Oyuncak çizim tableti silme yöntemi
      description: Çizim yüzeyinin nasıl temizlendiğini/silindiğini belirtir.
    toy_drawing_tablet_screen_type:
      name: Oyuncak çizim tableti ekran tipi
      description: Kullanılan çizim/görüntüleme yüzeyinin türünü belirtir (örneğin,
        LCD yazı tableti veya manyetik yüzey).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Oyuncak çizim tableti yazı/çizim aracı
      description: Tablet üzerinde çizim yapmak için kullanılan temel aracı (kalem
        tipi) belirtir.
    toy_figure_sound_feature:
      name: Oyuncak figür ses özelliği
      description: Figürün ses çıkarıp çıkarmadığını ve hangi tür sesler ürettiğini
        belirtir (örneğin, kükreme, gerçekçi hayvan sesi).
    toy_game_features:
      name: Oyuncak/Oyun özellikleri
      description: Plaj ve kum oyuncaklarına özgü dikkat çekici oyun veya yapısal
        özellikleri belirtir.
    toy_gift_basket_items_included:
      name: Dahil olan oyuncak hediye sepeti parçaları
      description: 'Hediye sepetine dahil olan başlıca oyuncak türlerini listeler
        (örneğin: peluş oyuncak, yapım seti, yapboz).'
    toy_glider_launch_method:
      name: Oyuncak planör fırlatma yöntemi
      description: Oyuncak planörün nasıl fırlatıldığını belirtir; bu durum oyun tarzını
        ve kullanıcı beklentilerini etkiler.
    toy_helicopter_control_type:
      name: Oyuncak helikopter kumanda tipi
      description: Oyuncak helikopterin nasıl kontrol edildiğini belirtir (itki sisteminden
        bağımsız olarak); örneğin el kumandası, uygulama kontrolü veya kontrolsüz/serbest
        uçuş.
    toy_helicopter_features:
      name: Oyuncak helikopterin özellikleri
      description: Oyuncak helikopterin (özellikle uzaktan kumandalı modellerin) kullanım
        kolaylığını ve oyun değerini etkileyen temel işlevsel özelliklerini belirtir.
    toy_jacks_set_items_included:
      name: Dahil olan oyuncak kriko seti ürünleri
      description: Oyuncak kriko setine dahil olan temel parçaları belirtir (örneğin,
        taşlar, top, çanta).
    toy_keyboard_learning_mode:
      name: Oyuncak klavye öğrenme modu
      description: Oyuncak klavyenin desteklediği eğitim/öğrenme yaklaşımını belirtir
        (örneğin, ışıklı tuşlar, eşlikli şarkılar, rehberli dersler, uygulama destekli
        öğrenme).
    toy_keyboard_sound_theme:
      name: Oyuncak klavye ses teması
      description: Oyuncak klavyede bulunan dahili enstrüman seslerini veya ses temalarını
        belirtir (sadece piyano sesi dışında).
    toy_kitchen_appliances_included:
      name: Dahil olan oyuncak mutfak aletleri
      description: Ürün bir mutfak aleti veya mutfak aleti odaklı set ise, oyun setinde
        temsil edilen mutfak aletlerini belirtir.
    toy_kitchen_assembly_requirement:
      name: Oyuncak mutfak montaj gereksinimi
      description: Montaj gerekip gerekmediğini ve yaklaşık montaj zorluk seviyesini
        belirtir.
    toy_kitchen_interactive_features:
      name: Oyuncak mutfak interaktif özellikleri
      description: Oyuncak mutfaklarda ve ilgili aksesuarlarda bulunan etkileşimli
        özellikleri belirtir.
    toy_motorcycle_feature_set:
      name: Oyuncak motosiklet özellik seti
      description: Oyuncak motosikletin temel oyun özelliklerini belirtir (uygunsa
        birden fazla seçenek seçilebilir).
    toy_motorcycle_scale:
      name: Oyuncak motosiklet ölçeği
      description: Oyuncak/koleksiyonluk motosikletler için ölçek oranını belirtir
        (örneğin, 1:12).
    toy_parachute_launch_method:
      name: Oyuncak paraşüt fırlatma yöntemi
      description: Oyuncağın uçuş için nasıl fırlatıldığını veya kullanıma hazır hale
        getirildiğini belirtir.
    toy_piano_and_keyboard_accessories_included:
      name: Dahil olan oyuncak piyano ve klavye aksesuarları
      description: Oyuncak piyano veya klavye ile birlikte verilen aksesuarları belirtir.
    toy_playset_assembly_required:
      name: Oyuncak oyun seti montaj gereksinimi
      description: Oyun öncesinde yetişkin montajı gerekip gerekmediğini belirtir
        (basit geçmeli birleştirme dışında).
    toy_playset_items_included:
      name: Dahil olan oyuncak oyun seti parçaları
      description: Oyun setine dahil olan başlıca bileşenleri listeler (kutunun içinde
        bulunan parçalar).
    toy_safety_certification:
      name: Oyuncak güvenlik sertifikasyonu
      description: Alıcının pazarında geçerli olan oyuncak güvenlik ve uygunluk standartlarını/işaretlerini
        belirtir (örneğin, EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Oyuncak uzay gemisi özellikleri
      description: Oyuncak uzay gemisine entegre edilmiş yaygın etkileşimli oyun özelliklerini
        belirtir.
    toy_spaceship_size_class:
      name: Oyuncak uzay gemisi boyut sınıfı
      description: Oyuncak uzay gemisi için hızlı filtreleme amacıyla kullanılan genel
        boyut sınıfını belirtir; tam ölçülerden (uzunluk/genişlik/yükseklik) ve sayısal
        ölçek oranından (örn. 1:72) farklıdır.
    toy_tableware_pieces_included:
      name: Dahil olan oyuncak sofra takımı parçaları
      description: Hangi oyuncak sofra takımı parçalarının dahil olduğunu belirtir
        (tabak, bardak, çatal-bıçak, servis gereçleri).
    toy_tool_electronic_features:
      name: Oyuncak alet elektronik özellikleri
      description: Oyuncak aletin etkileşimli/elektronik işlevlerini belirtir (ışık,
        ses, dönme hareketi vb.).
    toy_tool_set_components_included:
      name: Dahil olan oyuncak alet seti bileşenleri
      description: Paket içeriğinde yer alan oyun amaçlı alet parçalarını listeler
        (özellikle alet setleri için).
    toy_train_scale:
      name: Oyuncak tren ölçeği
      description: Mevcut tren ve raylarla uyumluluğu sağlamak için oyuncak/model
        trenin ölçek standardını veya ray sistemi ölçüsünü belirtir.
    toy_train_track_layout_type:
      name: Oyuncak tren ray düzen tipi
      description: Tren seti veya genişleme ray paketinde bulunan ray düzenini/şeklini
        belirtir.
    toy_weapon_gadget_features:
      name: Oyuncak silah ve alet özellikleri
      description: Oyuncak silah ve casus aletlerine özgü yaygın etkileşimli ve işlevsel
        özellikleri belirtir.
    tpms_sensor_frequency_band:
      name: TPMS sensör frekans bandı
      description: TPMS ile ilgili aksesuarların desteklediği radyo frekans bandını
        belirtir (uygunsa).
    track_and_field_discipline:
      name: Atletizm disiplini
      description: Ürünün tasarlandığı atletizm branşını/disiplini belirtir (örneğin,
        gülle atma, sırıkla atlama, sprint).
    track_event_specialization:
      name: Pist branşı uzmanlığı
      description: Çivili ayakkabının hangi pist branşı için optimize edildiğini belirtir.
    track_field_event_suitability:
      name: Atletizm branşı uygunluğu
      description: Antrenman ekipmanının hangi atletizm branş(lar)ı için tasarlandığını
        belirtir.
    track_set_special_features:
      name: Pist seti özel özellikleri
      description: Pist setine, temel ray ve arabalar dışında dahil edilen dikkat
        çekici oyun özelliklerini belirtir.
    track_surface_compatibility:
      name: Pist yüzeyi uyumluluğu
      description: Çivili ayakkabının veya kramponun hangi koşu yüzey(ler)i için tasarlandığını
        belirtir.
    tracking_aid_type:
      name: Takip yardım sistemi tipi
      description: Kayığın düz hat üzerinde ilerlemeyi artıran bir sistem içerip içermediğini
        belirtir.
    traction_pattern_type:
      name: Tutuş deseni tipi
      description: Ped yüzeyindeki tutuş sağlayan ana oluk veya diş desenini belirtir.
    trading_card_league:
      name: Koleksiyon kartı ligi
      description: Kart seti veya kartın konusu ile ilişkili spor ligini belirtir
        (uygunsa).
    trailer_construction:
      name: Treyler yapısı
      description: Treylerin şasi/gövde ana yapım malzemesini belirtir (örneğin, alüminyum,
        çelik veya karma yapı).
    trailer_coupler_size:
      name: Treyler kaplin ölçüsü
      description: Çekme işlemi için gerekli olan römork kaplin topuzunun ölçüsünü
        belirtir.
    trailer_hitch_mounting_location_method:
      name: Römork çeki demiri montaj yeri/yöntemi
      description: Römork çeki demirinin araçta nereye ve nasıl monte edildiğini belirtir
        (örneğin, arka alıcı, ön alıcı, şasiye montajlı, tampona montajlı, kasa içi
        montajlı).
    trailer_light_function:
      name: Römork lambası fonksiyonu
      description: Römork lambasının temel işlevini/konumunu belirtir.
    trailer_suspension_type:
      name: Römork süspansiyon tipi
      description: Bisiklet römorkunda kullanılan süspansiyon sisteminin türünü belirtir
        (örneğin, helezon yay veya yaprak yay); sürüş konforu ve yük korumasını etkiler.
    trailer_wiring_circuit:
      name: Römork elektrik devresi
      description: Römork tesisatında bulunan aydınlatma, fren ve yardımcı devreleri/sinyalleri
        listeler (hangi güç, topraklama ve sinyal hatlarının mevcut olduğunu belirtir).
    trailer_wiring_connector_type:
      name: Römork kablo bağlantı tipi
      description: Römork kablo demeti ve adaptörleri için kullanılan römork/araç
        tarafı fiş standardını belirtir.
    train_whistle_intended_use:
      name: Tren düdüğünün kullanım amacı
      description: Düdüğün temel kullanım amacını belirtir.
    train_whistle_sound_character:
      name: Tren düdüğü ses karakteri
      description: Düdüğün sesinin algılanan tonal karakterini (tınısını) tanımlar.
    trainer_mounting_type:
      name: Antrenman cihazı montaj tipi
      description: Bisikletin antrenman aletiyle nasıl bağlantı kurduğunu belirtir
        (örneğin, tekerlek üzerinden veya direkt tahrik).
    training_dummy_shape:
      name: Eğitim mankeni şekli
      description: Eğitim mankeninin genel tasarımını veya silüetini belirtir; bu
        tasarım köpeğin tutuşunu ve eğitim gerçekçiliğini etkiler.
    training_focus:
      name: Eğitim odağı
      description: Yardımcı ekipmanın hedeflediği temel beceri alanını belirtir (örneğin,
        refleks, ayak çalışması, el-göz koordinasyonu).
    training_focus_area:
      name: Eğitim odak alanı
      description: Ürünün geliştirmeyi amaçladığı temel lakros becerisini belirtir.
    training_objective:
      name: Eğitim hedefi
      description: Ürünün geliştirmeyi amaçladığı temel beceri veya tekniği belirtir.
    training_surface_suitability:
      name: Eğitim yüzeyi uygunluğus
      description: Antrenman ekipmanının hangi yüzeylerde kullanılabileceğini belirtir.
    training_surface_usage:
      name: Eğitim yüzeyi kullanımı
      description: Eğitim yüzeyinin desteklediği temel aktiviteleri belirtir; kayılabilir
        sentetik buz panellerini kuru zemin veya çok amaçlı spor matlarından ayırır.
    training_usage_type:
      name: Eğitim kullanım türü
      description: Eğitim pantolonunun temel kullanım dönemini veya bağlamını belirtir
        (örneğin, gündüz veya gece kullanımı).
    trampoline_enclosure_type:
      name: Trambolin güvenlik ağı tipi
      description: Trambolinde kullanılan güvenlik ağı konfigürasyonunu belirtir;
        ağın nasıl ve nereye monte edildiğini kapsar.
    trampoline_safety_certifications:
      name: Trambolin güvenlik sertifikasyonları
      description: Ürünün hangi trambolinle ilgili güvenlik standartları veya sertifikalarına
        uygun olduğunu belirtir.
    transfer_application_method:
      name: Transfer uygulama yöntemi
      description: Transferin kumaşa nasıl uygulandığını belirtir (örneğin, ütüyle
        yapıştırma veya ısı presi).
    transfer_method:
      name: Transfer yöntemi
      description: Tasarımın kumaşa hangi yöntemle aktarılmasının amaçlandığını belirtir.
    transfer_peel_temperature:
      name: Transfer soyma sıcaklığı
      description: Presleme işleminden sonra taşıyıcı tabakanın çıkarılması gereken
        önerilen sıcaklık durumunu belirtir (sıcak, ılık veya soğuk).
    transmission_cooler_construction:
      name: Şanzıman soğutucu yapısı
      description: Şanzıman soğutucu çekirdeğinin yapısal tasarımını belirtir.
    transmission_fluid_specification:
      name: Şanzıman yağı özellikleri
      description: Şanzıman sıvısının karşıladığı OEM/spesifikasyon standardı (örneğin,
        Dexron/Mercon aileleri, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Şanzıman takoz burcu malzemesi
      description: Şanzıman takoz burcunda (titreşim sönümleyici eleman) kullanılan
        elastomer veya izolatör malzemesini belirtir.
    transmission_mount_type:
      name: Şanzıman takoz tipi
      description: Şanzıman takozunun yapısını/tasarımını belirtir (örneğin, hidrolik
        veya sabit); uyumluluk, NVH özellikleri ve kullanım amacını belirlemeye yardımcı
        olur.
    transparency_level:
      name: Şeffaflık seviyesi
      description: Kutu duvarlarının ne kadar şeffaf olduğunu belirtir; kullanıcıların
        şeffaf görünürlük ile gizli depolama arasında seçim yapmasına yardımcı olur.
    transport_case_type:
      name: Koli tipi taşıma
      description: Taşıma çözümünün yapısal stilini/rijitliğini belirtir; koruma seviyesini
        ve paketleme yöntemini yansıtır.
    transposition_modes:
      name: Transpozisyon modları
      description: Akort cihazının desteklediği transpozisyon/konser perdesi modlarını
        belirtir (örneğin, konser perdesi ve B♭ veya E♭ gibi transpoze tonlar).
    trap_design:
      name: Tuzak tasarımı
      description: Tuzağın yapısal stilini veya mekanizmasını belirtir; bu yapı kurulum
        yöntemini ve hangi türler/ortamlar için uygun olduğunu belirler.
    trap_spring_configuration:
      name: Tuzak yay konfigürasyonu
      description: Tuzağın yapısal stilini veya mekanizmasını belirtir; bu yapı kurulum
        yöntemini ve hangi türler/ortamlar için uygun olduğunu belirler.
    travel_bassinet_accessories_included:
      name: Dahil olan seyahat beşiği aksesuarları
      description: Seyahat beşiği ile birlikte verilen ek aksesuarları listeler.
    travel_spinning_wheel_assembly_required:
      name: Seyahat tipi çıkrık montaj gereksinimi
      description: Çıkrığın kullanımdan önce katlamayı açma dışında montaj/kurulum
        gerektirip gerektirmediğini belirtir (örneğin, flyer takma, gerilim ayarı,
        pedal montajı).
    travel_spinning_wheel_portability_features:
      name: Seyahat tipi iplik eğirme makinesi taşınabilirlik özellikleri
      description: Seyahat tipi çıkrıkların taşınabilirliğe yönelik tasarım özelliklerini
        belirtir (örneğin, katlanabilir yapı ve dahil taşıma çözümleri).
    travel_trailer_appliances_fuel_type:
      name: Karavan içi cihaz yakıt türü
      description: Karavan içindeki cihazlar/ısıtma/pişirme sistemleri için kullanılan
        birincil yakıt türünü belirtir (çekici araç hariç).
    travel_trailer_holding_tank_type:
      name: Karavan atık su tankı tipi
      description: Karavanda hangi atık su tanklarının bulunduğunu belirtir (uygun
        olanların tümü seçilebilir).
    travel_trailer_power_hookup_shore_power:
      name: Karavan elektrik bağlantısı (şebeke elektriği)
      description: Şebeke elektriği bağlantısı için desteklenen elektrik bağlantı
        standardını/standartlarını belirtir.
    tread_pattern_type:
      name: Diş deseni tipi
      description: Lastiğin genel diş tasarımını (örneğin, slick, yarı slick, dişli)
        sınıflandırır; bu tasarım çekişi, yuvarlanma direncini ve kullanım yüzeyini
        etkiler.
    treadmill_key_type:
      name: Koşu bandı güvenlik anahtarı tipi
      description: Emniyet anahtarının fiziksel stilini veya bağlantı/çalışma mekanizmasını
        tanımlar (örneğin, manyetik yuvarlak, plastik uçlu, klipsli).
    treadmill_part_type:
      name: Koşu bandı parça tipi
      description: Ürünün, alıcının uyumluluğu hızlıca teyit edebilmesi için (örneğin,
        kayış mı yoksa motor mu) koşu bandının hangi bileşenini değiştirmek üzere
        tasarlandığını belirtir.
    treadmill_position:
      name: Koşu bandı pozisyonu
      description: Parçanın koşu bandı üzerindeki montaj konumunu belirtir (ön, arka,
        üst, alt, orta).
    triangle_striker_material:
      name: Üçgen vurucu malzemesi
      description: Ürünle birlikte gelen vurucu/tokatçının malzemesini belirtir.
    trigger_input_connector:
      name: Tetik giriş konektörü
      description: Tetik girişleri için kullanılan fiziksel bağlantı standardını belirtir.
    trigger_input_connector_type:
      name: Tetik giriş bağlantı tipi
      description: Tetik girişleri için kullanılan fiziksel bağlantı tipini belirtir.
    trigger_input_zone_support:
      name: Tetik giriş bölge desteği
      description: Tetik girişlerinin tek bölgeli ve/veya çift bölgeli (örneğin, head/rim)
        tetikleyicileri ve benzer çok bölgeli uygulamaları destekleyip desteklemediğini
        belirtir.
    trim_application_method:
      name: Kaplama uygulama yöntemi
      description: Süslemenin projeye nasıl uygulanacağını belirtir (örneğin, dikilerek,
        ütüyle yapıştırılarak veya yapıştırıcıyla).
    trim_detail:
      name: Süsleme detayı
      description: Giysideki belirgin dekoratif kenar veya bitişleri tanımlar (örneğin,
        püskül, saçak, dantel süsleme).
    trim_elasticity:
      name: Süsleme esnekliği
      description: Zigzag (ric-rac) süslemenin örgü veya spor giyim uygulamaları için
        esnek olup olmadığını belirtir.
    trim_finish:
      name: Süsleme yüzey kaplaması
      description: Süslemeye uygulanan yüzey kaplama türünü belirtir (örneğin, metalik,
        simli, yansıtıcı).
    trim_tilt_type:
      name: Trim ve tilt tipi
      description: Motorun trim/tilt ayarını destekleyip desteklemediğini ve nasıl
        desteklediğini belirtir.
    trolleybus_power_supply_type:
      name: Troleybüs güç besleme tipi
      description: Troleybüsün çekiş gücünü elektrik şebekesinden nasıl aldığını belirtir.
    truck_bed_body_type:
      name: Kamyon kasa/gövde tipi
      description: Kabinin arkasındaki yük kasası veya gövde bölümünün konfigürasyonunu
        belirtir.
    truck_bed_length_class:
      name: Kamyon kasa uzunluk sınıfı
      description: Kargo ağının uygun olduğu kamyon kasa uzunluk sınıfını belirtir
        (genellikle kısa/standart/uzun kasa olarak ifade edilir).
    truck_mounting_hole_pattern:
      name: Kamyon montaj deliği deseni
      description: Kamyonların güverteye monte edilmesinde kullanılan delik düzenini
        belirtir (örneğin, Eski tip, Yeni tip, Evrensel).
    truck_mounting_style:
      name: Kamyon montaj stili
      description: Kamyonların güverteye nasıl monte edildiğini belirtir (örneğin,
        top mount, drop-through); bu durum sürüş yüksekliğini ve dengeyi etkiler.
    truck_profile:
      name: Kamyon profili
      description: Kaykayın tekerleklerinin güverteye göre sürüş yüksekliği sınıflandırmasını
        belirtir; bu durum tekerlek boşluğunu ve board hissiyatını etkiler.
    trumpet_bell_material:
      name: Trompet çanı malzemesi
      description: Trompetin çan (bell) bölümünde kullanılan malzemeyi belirtir (enstrümanın
        diğer bölümlerinden farklı olabilir).
    trumpet_leadpipe_material:
      name: Trompet giriş borusu malzemesi
      description: Ağızlıktan valflere uzanan ana boruda (leadpipe) kullanılan malzeme
        veya yüzey işlemini belirtir.
    trundle_mechanism:
      name: Tekerlekli mekanizma
      description: İkincil yatak bileşeninin ana gövdeden nasıl çıkarıldığını/açıldığını
        açıklar.
    trunk_part_type:
      name: Bagaj bölümü tipi
      description: Satılan bagajla ilgili gövde parçasının türünü belirtir (örneğin,
        bagaj kapağı, menteşe, kilit).
    tuba_leadpipe_material:
      name: Tuba ağızlık borusu malzemesi
      description: Tuba’nın ağızlık borusu bölümünde kullanılan malzemeyi belirtir.
    tube_base_type:
      name: Tüp taban tipi
      description: Fiziksel/elektriksel uyum için kullanılan tüpün taban/soket ailesini
        belirtir (örneğin, Octal, Noval/9 pin).
    tube_matching_grade:
      name: Tüp eşleştirme derecesi
      description: Tüplerin set halinde test edilip eşleştirilip eşleştirilmediğini
        ve sağlanan eşleştirme türünü belirtir.
    tube_weight_category:
      name: Tüp ağırlık kategorisi
      description: Dayanıklılık ve performansı karşılaştırmak için tüpü yapı/ağırlık
        sınıfına göre sınıflandırır (örneğin, Ultralight, Standard, Heavy Duty).
    tubeless_compatible:
      name: Tubeless uyumlu
      description: Jantın, tubeless lastiklerle birlikte iç lastik olmadan kullanılmak
        üzere tasarlanıp tasarlanmadığını belirtir.
    tubing_shape:
      name: Boru kesit şekli
      description: Standın destek borularının kesit şeklini belirtir.
    tubular_construction_type:
      name: Boru tipi yapı türü
      description: Boru tipi bisiklet lastiklerinin üretim tarzını belirtir; geleneksel
        yapıştırmalı tubular lastikler ile yeni varyasyonları ayırt eder.
    tulip_type_flower_form:
      name: Lale tipi (çiçek formu)
      description: Buketteki lalelerin bahçecilik türünü/çiçek formunu belirtir (örneğin,
        tek katlı, çift katlı, papağan tipi).
    tuner_input_method:
      name: Akort cihazı giriş yöntemi
      description: Akort cihazının perdeyi nasıl algıladığını belirtir (mikrofon,
        titreşim/klips sensörü, enstrüman kablosu girişi, temas sensörü).
    tuning_mechanism:
      name: Akort mekanizması
      description: Bongo derilerinin nasıl gerildiğini/akort edildiğini belirtir.
    tuning_system:
      name: Akort sistemi
      description: Darbukanın nasıl akort edildiğini veya akort edilebilir olup olmadığını
        belirtir.
    turn_signal_lens_color:
      name: Sinyal lambası lens rengi
      description: Sinyal lambası muhafazasındaki görünür lensin/kapağın rengini belirtir
        (yayılan ışığın rengi değil).
    turn_signal_lighting_style:
      name: Sinyal lambası aydınlatma stili
      description: Dönüş sinyalinin sunduğu görsel sinyal verme stili veya animasyonunu
        belirtir.
    turnip_and_rutabaga_variety:
      name: Şalgam ve rutabaga (İsveç şalgamı) çeşidi
      description: Şalgamın veya rutabaganın (İsveç şalgamı) belirli kültivarını veya
        varyetesini belirtir.
    tweeter_crossover_type:
      name: Tweeter geçiş filtresi tipi
      description: Tweeter ile birlikte gelen yüksek geçişli filtre ve/veya koruma
        bileşeninin türünü belirtir (varsa).
    tweeter_material:
      name: Tweeter diyafram malzemesi
      description: Tweeter’ın ana diyafram/kubbe malzemesini belirtir.
    tweeter_mount_type:
      name: Tweeter montaj tipi
      description: Tweeter’ın araçta hangi montaj yöntemi/donanımı ile kurulacağını
        belirtir.
    twill_direction:
      name: Fitil yönü
      description: Denim/kot kumaşta fitil çizgisinin yönünü belirtir.
    twist_direction:
      name: Büküm yönü
      description: İplikte kullanılan kat büküm yönünü belirtir (S bükümü veya Z bükümü).
    u_joint_series_size:
      name: U-mafsal serisi/ölçüsü
      description: Kullanılan U-mafsal serisini veya ölçü standardını belirtir (örneğin,
        1310 serisi).
    uilleann_pipes_bag_material:
      name: Uilleann tulum hava torbası malzemesi
      description: Hava torbası bileşeninin (varsa) malzemesini belirtir; bu malzeme
        hissiyatı, dayanıklılığı ve bakım gereksinimini etkiler.
    uilleann_pipes_handedness:
      name: Uilleann tulum el yönü
      description: Setin sağ el veya sol el çalım düzenine göre yapılandırılıp yapılandırılmadığını
        belirtir.
    uilleann_pipes_set_configuration:
      name: Uilleann boru seti konfigürasyonu
      description: Regülatör ve drone’ların varlığına göre dahil edilen uilleann tulum
        konfigürasyonunu belirtir.
    uk_childrens_shoe_size:
      name: Birleşik Krallık çocuk ayakkabı numarası
      description: Birleşik Krallık çocuk ayakkabı numarasını (örneğin 4 veya 4 Geniş)
        belirtir.
    uk_clothing_size:
      name: Birleşik Krallık giyim bedeni
      description: Birleşik Krallık giyim bedenini (örneğin 9 veya 9 Geniş) gibi belirtir
    uk_cup_size:
      name: Birleşik Krallık sütyen ölçüsü
      description: Birleşik Krallık sütyen cup ölçüsünü belirtir (örneğin, C veya
        FF).
    uk_mens_shoe_size:
      name: Birleşik Krallık erkek ayakkabı numarası
      description: Birleşik Krallık erkek ayakkabı numarasını (örneğin 9 veya 9 Geniş
        gibi) belirtir
    uk_womens_shoe_size:
      name: Birleşik Krallık kadın ayakkabı numarası
      description: Birleşik Krallık kadın ayakkabı numarasını belirtir (örneğin, 6
        veya 6 geniş kalıp).
    ukulele_back_and_sides_wood:
      name: Ukulele arka ve yan kısımları ahşap
      description: Ukulelenin arka ve yan kısımlarında kullanılan ahşap/malzeme türünü
        belirtir.
    ukulele_body_cutaway:
      name: Ukulele gövdesi kesiti
      description: Konser ukulelesi gövdesinde üst perdelere daha kolay erişim sağlayan
        kesit bulunup bulunmadığını belirtir.
    ukulele_body_shape:
      name: Ukulele gövde şekli
      description: Ukulele için kullanılan genel gövde stilini veya şeklini belirtir.
    ukulele_bridge_material:
      name: Ukulele köprü malzemesi
      description: Ukulele köprüsünde kullanılan malzemeyi belirtir.
    ukulele_construction_type:
      name: Ukulele yapım tipi
      description: Enstrümanın üst, arka ve yan kısımlarının yapım türünü belirtir
        (masif veya lamine).
    ukulele_electronics_configuration:
      name: Ukulele elektronik konfigürasyonu
      description: Ukulelenin yalnızca akustik mi yoksa amplifikasyon için dahili
        elektronik (manyetik ve/veya ön yükseltici) içerip içermediğini belirtir.
    ukulele_string_re_entrant_tuning:
      name: Ukulele re-entrant akort düzeni
      description: Ukulelenin re-entrant (yüksek Sol) akort mu yoksa lineer/düşük
        Sol akort mu ile ayarlandığını belirtir; bu tercih ses karakterini etkiler.
    ukulele_top_wood:
      name: Ukulele üst kapak ağacı
      description: Ukulelenin üst kapağında/ses tahtasında kullanılan ahşap veya malzemeyi
        belirtir.
    ukulele_tuner_mechanism:
      name: Ukulele akort mekanizması
      description: Ukulele üzerinde kullanılan akort mekanizmasının türünü belirtir.
    ukulele_tuner_type:
      name: Ukulele burguluk tipi
      description: Ukulele kafa kısmında kullanılan burguluk (akort burgusu) tipini
        belirtir.
    ukulele_tuning:
      name: Ukulele akortu
      description: Cep ukulelesi için amaçlanan standart akort düzenini belirtir.
    ultralight_aircraft_wing_configuration:
      name: Ultralight kanat konfigürasyonu
      description: Ana kanadın gövdeye/yapıya göre konumunu ve yerleşim düzenini belirtir.
    under_bed_features:
      name: Yatak altı özellikleri
      description: Yatak platformunun altında bulunan temel işlevsel bileşeni belirtir.
    underfoot_strap_type:
      name: Ayak altı kayışı tipi
      description: Ayakkabının altından geçen kayışın malzemesini veya tasarımını
        belirtir.
    underwear_fit:
      name: İç çamaşırı kesimi
      description: Boxer şortun genel kesim profilini belirtir (örneğin, dar, bol,
        sıkı/kompresyon).
    underwear_pieces_included:
      name: Dahil olan iç giyim parçaları
      description: Hangi giyim parçalarının sağlandığını belirtir (üst, alt, her ikisi
        veya tek parça tulum); böylece müşteriler komple bir takım mı yoksa tek parça
        bir ürün mü satın aldıklarını anlayabilir.
    uniform_pieces_included:
      name: Dahil olan üniforma parçaları
      description: Hangi üniforma parçalarının sağlandığını belirtir (örneğin, gömlek,
        pantolon, yelek); toplu veya set alımlarda paket içeriğini netleştirir.
    uniform_role:
      name: Üniforma kullanım rolü
      description: Üniforma ürününün hangi meslek grubu veya kurum için tasarlandığını
        belirtir (örneğin, polis, şerif, acil sağlık hizmetleri).
    update_method:
      name: Güncelleme yöntemi
      description: Tarayıcı için ürün yazılımı/yazılım güncellemelerinin nasıl sağlandığını
        belirtir.
    upholstery_fabric_backing_type:
      name: Döşemelik kumaş arka kaplama tipi
      description: Döşemelik kumaşın montajını ve dokusunu etkileyen arka kaplama/laminasyon
        türünü belirtir.
    upholstery_fabric_water_resistance:
      name: Döşemelik kumaş suya dayanıklılık özelliği
      description: Döşemelik kumaş yüzeyinin suya ve sıvı dökülmelerine karşı dayanıklılığını
        belirtir.
    upper_material:
      name: Üst yüzey malzemesi
      description: Ayakkabının üst kısmında kullanılan ana malzemeyi belirtir; bu
        malzeme nefes alabilirlik, dayanıklılık ve görünümü etkiler.
    upright_bass_pickup_system:
      name: Kontrbas manyetik sistemi
      description: Kontrbasın amplifikasyon için dahili bir manyetik ve/veya ön yükseltici
        sistem içerip içermediğini belirtir.
    upright_piano_power_source:
      name: Dik piyano güç kaynağı
      description: Dik piyanonun nasıl çalıştığını belirtir; elektriksiz akustik modeller
        ile elektrik gerektiren sessiz/hibrit sistemli modelleri kapsar.
    urination_device_features:
      name: İdrar yapma cihazı özellikleri
      description: İşlevselliği veya kullanım kolaylığını artıran özel tasarım özelliklerini
        belirtir.
    us_childrens_shoe_size:
      name: ABD çocuk ayakkabı numarası
      description: ABD çocuk ayakkabı numarasını (örneğin 5 veya 5 Geniş) belirtir
    us_clothing_size:
      name: ABD giysi bedeni
      description: ABD giysi bedenini (örneğin 8 veya 14) belirtir
    us_cup_size:
      name: ABD sütyen ölçüsü
      description: ABD sütyen ölçüsünü (örneğin C veya DDD) belirtir
    us_mens_shoe_size:
      name: ABD erkek ayakkabı numarası
      description: ABD erkek ayakkabı numarasını (örneğin 10 veya 10 Geniş) belirtir
    us_ring_size:
      name: ABD yüzük ölçüsü
      description: ABD yüzük ölçüsünü (örneğin 7 veya 9.5) belirtir
    us_womens_shoe_size:
      name: ABD kadın ayakkabı numarası
      description: ABD erkek ayakkabı numarasını belirtir (örneğin, 8 veya 8 geniş
        kalıp).
    usage:
      name: Kullanım amacı
      description: Eksantrik milinin kullanım amacını veya ayar karakterini belirtir.
    usda_honey_grade:
      name: USDA bal kalite derecesi
      description: ABD Tarım Bakanlığı (USDA) tarafından belirlenen bal kalite sınıflandırmasını
        belirtir.
    user_control_method:
      name: Kullanıcı kontrol yöntemi
      description: Kullanıcının makineyle nasıl etkileşim kurduğunu belirtir (örneğin,
        yerleşik kontrol paneli, uzaktan kumanda, uygulama, sesli komut); kullanım
        kolaylığı açısından bilgi verir.
    vacuum_boost_reference_port:
      name: Vakum/boost referans portu
      description: Regülatörün vakum/boost için manifold referans portu içerip içermediğini
        ve tipini belirtir.
    valve_base_shape:
      name: Valf taban şekli
      description: Sızdırmazlığı ve köpük dolgu uyumluluğunu etkileyen, valf tabanı
        ile jant arasındaki arayüz geometrisini belirtir (yuvarlak, konik, yan portlu,
        T şekilli vb.).
    valve_core_type:
      name: Valf çekirdek tipi
      description: Valf çekirdeğinin çıkarılabilir, sabit veya çekirdeksiz olup olmadığını
        belirtir; bu bilgi bakım işlemlerini ve sızdırmazlık sıvısı uygulama uyumluluğunu
        etkiler.
    valve_cover_gasket_material:
      name: Supap kapağı contası malzemesi
      description: Supap kapağıyla birlikte verilen contanın malzemesini veya conta
        dahil değilse önerilen conta malzemesini belirtir (varsa).
    valve_cover_material:
      name: Valf kapağı malzemesi
      description: Supap kapağının ana yapım malzemesini belirtir.
    valve_design:
      name: Valf tasarımı
      description: Motor valfinin yapısını/tasarımını belirtir.
    valve_guard_coverage_area:
      name: Valf koruma kapsama alanı
      description: Koruyucunun valf bölümünün hangi kısımlarını koruduğunu belirtir.
    valvetrain_configuration:
      name: Supap mekanizması konfigürasyonu
      description: Eksantrik mili/supap mekanizması düzenini belirtir.
    varnish_formulation_base:
      name: Vernik formülasyon bazı
      description: Telli çalgı verniğinin temel formülasyonunu/kimyasını belirtir;
        bu durum görünümü, geri döndürülebilirliği ve mevcut yüzeylerle uyumluluğu
        etkiler.
    varnish_transparency_tint:
      name: Vernik şeffaflık/renk tonu
      description: Verniğin şeffaf mı yoksa renkli mi olduğunu ve renkliyse genel
        renk ailesini belirtir.
    vegetable_matter_vm_content:
      name: Bitkisel madde (VM) içeriği
      description: Elyaf içinde bulunan bitki artıkları/safsızlık miktarını belirtir.
    vegetable_preparation_style:
      name: Sebze hazırlama tarzı
      description: Sebzenin satış öncesinde nasıl sunulduğunu veya hazırlandığını
        belirtir (örneğin, bütün, küp doğranmış, çiçek halinde).
    vehicle_audio_dsp_form_factor:
      name: Araç ses işlemci (DSP) form faktörü
      description: DSP ünitesinin fiziksel/kurulum biçimini belirtir.
    vehicle_battery_charger_features:
      name: Araç akü şarj cihazı özellikleri
      description: Araç akü şarj cihazının çalışma modlarını ve dahili özelliklerini
        listeler (örneğin, bakım modu, sülfat giderme modu).
    vehicle_body_filler_form:
      name: Araç gövde dolgu macunu formu
      description: Gövde dolgu macununun fiziksel formunu/ambalaj tipini belirtir.
    vehicle_coaxial_speaker_nominal_size:
      name: Araç koaksiyel hoparlör nominal boyutu
      description: Montajda kullanılan hoparlörün nominal boyutunu belirtir (örneğin,
        6,5 inç, 6x9 inç).
    vehicle_cover_size_class:
      name: Araç kılıfı boyut sınıfı
      description: Kılıfın hangi araç boyutuna uygun olduğunu gösteren genel boyut
        sınıflandırmasını belirtir.
    vehicle_decor_set_items_included:
      name: Dahil olan araç dekor seti ürünleri
      description: Aksesuar setine dahil olan dekoratif ürün türlerini listeler (alıcıya
        bileşen düzeyinde görünürlük sağlar).
    vehicle_door_lock_actuation_method:
      name: Araç kapı kilidi çalıştırma yöntemi
      description: Araç kapı kilidinin nasıl çalıştırıldığını veya kontrol edildiğini
        belirtir.
    vehicle_door_lock_actuator_kit_contents:
      name: Araç kapı kilidi aktüatör kit içeriği
      description: Aktüatörle birlikte hangi parçaların dahil olduğunu belirtir (yalnızca
        aktüatör veya donanım/çubuklar/braketler/kablo demeti).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Araç kapı kilidi aktüatör kablolama konfigürasyonu
      description: Kurulum için gerekli kablolama tipini belirtir (kablo sayısı ve
        işlevi).
    vehicle_door_lock_included_components:
      name: Araç kapı kilidi paket içeriği
      description: Paket içerisinde hangi bileşenlerin bulunduğunu listeler (kit/montaj
        ürünleri için kullanışlıdır).
    vehicle_electrical_connector_type:
      name: Araç elektrik konnektör tipi
      description: Alternatörün regülatör/alan elektrik bağlantı tipini veya fiş stilini
        belirtir (ana B+ çıkış bağlantı pimi hariç).
    vehicle_equipment_fit_out_level:
      name: Araç ekipman donanım seviyesi
      description: Araçta bulunan polis donanım seviyesini belirtir.
    vehicle_glass_cleaner_form:
      name: Araç cam temizleyici formu
      description: Araç cam temizleyicisinin fiziksel ürün formatını belirtir (örneğin,
        sprey, köpük, mendil, jel, konsantre).
    vehicle_hitch_cover_illumination_type:
      name: Araç çeki demiri kapağı aydınlatma tipi
      description: Çeki demiri kapağının aydınlatmalı olup olmadığını ve aydınlatma
        türünü belirtir.
    vehicle_hitch_cover_mounting_type:
      name: Araç çeki demiri kapağı montaj tipi
      description: Çeki demiri kapağının çeki demiri yuvasına nasıl sabitlendiğini
        veya takıldığını belirtir.
    vehicle_license_plate_finish:
      name: Araç plaka yüzey kaplaması
      description: Plakanın yüzey kaplama türünü belirtir.
    vehicle_license_plate_frame_anti_theft_design:
      name: Araç plaka çerçevesi hırsızlığa karşı tasarımı
      description: Sökülmeyi veya kurcalamayı önlemeye yönelik güvenlik tasarım özelliklerini
        belirtir.
    vehicle_license_plate_frame_plate_standard:
      name: Araç plaka çerçevesi plaka standardı
      description: Çerçevenin uyumlu olduğu plaka standardını/bölgesini belirtir.
    vehicle_license_plate_frame_profile:
      name: Araç plaka çerçevesi profili
      description: Çerçevenin plakayı nasıl çevrelediğini (kaplama alanı/şekil) belirtir;
        bu durum okunabilirliği ve mevzuata uygunluğu etkiler.
    vehicle_license_plate_mounting_hole_count:
      name: Araç plaka montaj deliği sayısı
      description: Plaka üzerindeki montaj deliği sayısını belirtir.
    vehicle_license_plate_mounting_hole_pattern:
      name: Araç plaka montaj delik deseni
      description: Plaka üzerindeki montaj deliklerinin yerleşim düzenini belirtir.
    vehicle_license_plate_reflectivity:
      name: Araç plaka yansıtıcılığı
      description: Plaka yüzeyinin ışığı yansıtıp yansıtmadığını ve nasıl yansıttığını
        belirtir (bazı özel plakalarda görünürlük ve mevzuat uyumu açısından önemlidir).
    vehicle_license_plate_size_standard:
      name: Araç plaka boyut standardı
      description: Plakanın hangi bölgesel/araç standardına göre boyutlandırıldığını
        belirtir (montaj deliği aralığı ve genel ölçüler).
    vehicle_license_plate_text_style:
      name: Araç plaka yazı stili
      description: Plaka üzerindeki karakterlerin stilini belirtir (varsa; kabartmalı
        veya baskılı gibi).
    vehicle_license_plate_theme:
      name: Araç plaka teması
      description: Plaka üzerindeki görsel tasarımın genel temasını belirtir.
    vehicle_lift_actuation_method:
      name: Araç kaldırma çalıştırma yöntemi
      description: Aracı kaldırmak için kullanılan lift/krikonun nasıl çalıştırıldığını
        belirtir.
    vehicle_lift_mounting_type:
      name: Araç lift montaj tipi
      description: Liftin çalışma alanına nasıl monte edildiğini veya sabitlendiğini
        belirtir.
    vehicle_lift_type:
      name: Araç kaldırma tipi
      description: Servis veya depolama amacıyla kullanılan araç liftinin yapısal
        stilini belirtir (örneğin, iki kolonlu, dört kolonlu, makaslı).
    vehicle_magnet_attachment_type:
      name: Araç mıknatıs bağlantı tipi
      description: Araç mıknatısı olarak satılan ürünün birincil montaj yöntemini
        belirtir (örneğin, yalnızca manyetik veya yapışkan destekli manyetik).
    vehicle_magnet_intended_use:
      name: Araç mıknatısı kullanım amacı
      description: Araç mıknatısının temel kullanım amacını belirtir.
    vehicle_mirror_adjustment_type:
      name: Araç aynası ayar tipi
      description: Aynanın nasıl ayarlanacağını/kontrol edileceğini belirtir.
    vehicle_mirror_glass_type:
      name: Araç ayna camı tipi
      description: Ayna cam yüzeyinin optik/şekil tipini belirtir.
    vehicle_organizer_features:
      name: Araç düzenleyici özellikleri
      description: Araç düzenleyicilerinin temel işlevsel özelliklerini belirtir (örneğin,
        katlanabilirlik, su geçirmez astar, yalıtımlı cepler, kaymaz taban).
    vehicle_paint_chemistry_base:
      name: Araç boya kimyası/bazı
      description: Araç boyasında kullanılan boya formülasyonunu/kimyasını belirtir.
    vehicle_polish_application_method:
      name: Araç cilası uygulama yöntemi
      description: Araç cilasının uygulanması için önerilen yöntem veya ekipmanı belirtir.
    vehicle_pursuit_package:
      name: Araç takip paketi (polis paketi)
      description: Aracın polis kullanımı için tasarlanmış takip amaçlı performans
        paketi içerip içermediğini belirtir (örneğin, geliştirilmiş soğutma, fren,
        süspansiyon ve kalibrasyon).
    vehicle_safety_equipment_position:
      name: Araç güvenlik ekipmanı konumu
      description: Güvenlik ekipmanının araç üzerinde veya içinde nereye monte edileceğini
        veya kullanılacağını belirtir.
    vehicle_safety_equipment_visibility_features:
      name: Araç güvenlik ekipmanlarının görünürlük özellikleri
      description: Görünürlüğü artırmaya yönelik tasarlanmış özellikleri belirtir.
    vehicle_seat_row:
      name: Araç koltuk sırası
      description: Koltuğun hangi arka sıra için olduğunu belirtir (ikinci sıra veya
        üçüncü sıra; ek katlanır koltuklar dahil).
    vehicle_steering_assist_type:
      name: Araç direksiyon destek tipi
      description: Parçanın hangi direksiyon destek sistemi için tasarlandığını belirtir.
    vehicle_steering_wheel_lock_form_factor:
      name: Araç direksiyon kilidi form faktörü
      description: Kilidin fiziksel stilini ve direksiyon simidiyle (ve gerekirse
        diğer kontrollerle) nasıl etkileşim kurduğunu açıklar.
    vehicle_wax_polish_product_form:
      name: Araç cila/parlatıcı ürün formu
      description: Cila, parlatıcı, koruyucu veya sızdırmazlık ürününün fiziksel formunu/uygulama
        biçimini belirtir.
    vehicle_wheel_valve_stem_type:
      name: Araç tekerlek supap tipi
      description: Desteklenen veya dahil edilen supap tipi/gövdesini belirtir.
    vehicle_windshield_fluid_formula:
      name: Araç ön cam yıkama sıvısı formülü
      description: Ön cam yıkama sıvısının temel temizleme/çıkarma özelliğini belirtir.
    veil_length_type:
      name: Duvak uzunluk tipi
      description: Peçeyi sayısal ölçü yerine standart uzunluk terimleriyle sınıflandırır.
    vellum_opacity_level:
      name: Parşömen opaklık seviyesi
      description: Parşömen kâğıdının ne kadar saydam veya opak olduğunu belirtir.
    ventilation_configuration:
      name: Havalandırma konfigürasyonu
      description: Kaskın ana hava giriş ve çıkış konfigürasyonunu belirtir.
    ventilation_control_type:
      name: Havalandırma kontrol tipi
      description: Kaska entegre edilmiş hava akışı yönetim stilini belirtir.
    ventilation_level:
      name: Havalandırma seviyesi
      description: Zırhın hava akışı/havalandırma tasarımını belirtir.
    venting_design:
      name: Havalandırma tasarımı
      description: Depolama sırasında yoğuşma ve küf oluşumunu azaltmak için kılıfın
        havalandırmalı olup olmadığını ve nasıl havalandırıldığını belirtir.
    vestibule_type:
      name: Giriş bölümü tipi
      description: Apsisin (giriş bölümünün) çadıra göre konumunu ve düzenini belirtir.
    vibraphone_bar_material:
      name: Vibrafon çubuk malzemesi
      description: Vibrafonun ses üreten çubuklarının/tuşlarının malzemesini belirtir.
    vibraphone_motor_type:
      name: Vibrafon motor tipi
      description: "(Varsa) vibrato efekti için dönen rezonatör fanlarını çalıştıran
        motor tipini belirtir."
    vibraphone_range_octaves:
      name: Vibrafon ses aralığı (oktav)
      description: Vibrafonun ses aralığını oktav cinsinden belirtir (örneğin, 3 oktav,
        3,5 oktav).
    vibraphone_resonator_tube_material:
      name: Vibrafon rezonatör borusu malzemesi
      description: Çubukların altında bulunan vibrafon rezonatör borularının malzemesini
        belirtir.
    vibraphone_tuning_standard:
      name: Vibrafon akort standardı
      description: Akort için kullanılan referans frekansı belirtir (örneğin, La=440
        Hz).
    viewing_sides:
      name: Görüntüleme yüz sayısı
      description: Skorboardun kaç yüzünde bilgi gösterildiğini belirtir (tek taraflı,
        çift taraflı, dört taraflı vb.).
    vintage_advertisement_decade:
      name: Vintage reklam on yılı
      description: Reklamın ilk olarak basıldığı veya üretildiği on yılı belirtir
        (kesin yıl bilinmiyorsa yaklaşık).
    vintage_advertisement_format:
      name: Vintage reklam formatı
      description: Koleksiyonluk vintage reklamın fiziksel formatını veya ortamını
        belirtir.
    vintage_advertisement_subject_category:
      name: Vintage reklam konu kategorisi
      description: Reklamı yapılan ürün veya hizmet kategorisini belirtir.
    vintage_classic_truck_cab_type:
      name: Vintage ve klasik kamyon kabin tipi
      description: Kamyonun yolcu kabininin konfigürasyonunu/gövde stilini belirtir.
    virginia_tech_helmet_star_rating:
      name: Virginia Tech kask yıldız derecesi
      description: Virginia Tech Kask Laboratuvarı tarafından verilen güvenlik derecelendirmesini
        belirtir (0–5 yıldız).
    virtual_analog_synthesizer_form_factor:
      name: Sanal analog sentezleyici form faktörü
      description: Sentezleyici gövdesinin fiziksel formatını belirtir (klavyeli veya
        modül/raf tipi).
    viscosity_thickness:
      name: Viskozite/yoğunluk
      description: Ürünün satıldığı haliyle veya önerilen kullanım kıvamındaki yoğunluğunu/akışkanlığını
        belirtir.
    vise_configuration:
      name: Mengene konfigürasyonu
      description: Mengene setinin yapısal düzenini veya parça sayısını belirtir;
        bu durum taşınabilirliği ve kurulum karmaşıklığını etkiler.
    visibility_features:
      name: Görünürlük özellikleri
      description: Trafikte sürücünün görünürlüğünü artıran tasarım özelliklerini
        belirtir.
    visor_brim_type:
      name: Siperlik/kenarlık tipi
      description: Kaskta siperlik veya kenarlık bulunup bulunmadığını ve stilini
        belirtir.
    visor_configuration:
      name: Vizör konfigürasyonu
      description: Dahili siperlik veya yüz koruyucunun varlığını ve stilini belirtir.
    visor_lens_finish:
      name: Vizör lens kaplaması
      description: Vizör lensine uygulanan renk tonu, optik kaplama veya grafik stilini
        belirtir.
    visor_style:
      name: Siperlik stili
      description: Kaputun siperlik/siperlik içerip içermediğini ve şeklini belirtir.
    voc_compliance_standard:
      name: VOC uyumluluk standardı
      description: Ürünün (uygulanabilir durumlarda) mevzuata uygun VOC uyumluluk
        beyanını belirtir.
    voc_regulatory_class:
      name: VOC düzenleyici sınıfı
      description: Ürünün etiketine/Güvenlik Bilgi Formuna göre beyan edilen VOC düzenleyici/uyumluluk
        sınıfını belirtir; bölgesel mevzuat ve çevresel kısıtlamalar için kullanılır.
    vodka_base_ingredient:
      name: Votka baz bileşeni
      description: Votkanın damıtıldığı başlıca tarımsal hammaddesini belirtir (örneğin,
        buğday, patates, mısır).
    voice_coil_configuration:
      name: Ses bobini konfigürasyonu
      description: Kablolama esnekliği ve empedans seçenekleri için ses bobinlerinin
        sayısını/düzenini belirtir.
    voice_effects:
      name: Ses efektleri
      description: Karaoke setinin desteklediği dahili vokal efekt türlerini belirtir.
    voltage_rating_type:
      name: Gerilim değeri tipi
      description: Sigortanın gerilim değerinin alternatif akım (AC), doğru akım (DC)
        veya her ikisi için geçerli olup olmadığını belirtir.
    voltage_regulator_connector_type:
      name: Voltaj regülatörü bağlantı tipi
      description: Regülatörün araç tesisatına/alternatöre/jeneratöre bağlanmasında
        kullanılan bağlantı/terminal tipini belirtir.
    wader_foot_type:
      name: Tulum ayak tipi
      description: Wader’ın entegre botlu mu yoksa ayrı çoraplı (stocking foot) mu
        olduğunu belirtir.
    wader_sole_type:
      name: Wader taban tipi
      description: Balıkçı çizmelerinde veya botlu wader’larda kullanılan dış taban
        malzemesini veya tutuş tipini belirtir.
    waistband_style:
      name: Bel bandı stili
      description: Bel bandının yapısını ve uyum/rahatlık için nasıl sabitlendiğini
        veya ayarlandığını belirtir.
    wakeboard_binding_mounting_pattern:
      name: Wakeboard bağlama montaj deseni
      description: Bağlamaların uyumlu olduğu wakeboard üzerindeki insert/plaka desenini
        belirtir.
    wakeboard_riding_style:
      name: Wakeboard sürüş stili
      description: Wakeboard’un kullanım ortamını veya sürüş stilini sınıflandırır.
    wall_decal_style:
      name: Duvar çıkartması stili
      description: Çıkartmanın nasıl üretildiğini/uygulandığını belirtir (örneğin,
        kalıp kesim, transfer, etiket sayfası).
    wallyball_equipment_included:
      name: Dahil olan wallyball ekipmanları
      description: Wallyball setiyle birlikte verilen parçaları listeler; alıcının
        paketi net şekilde görmesini ve karşılaştırmasını sağlar.
    warp_beam_type:
      name: Çözgü levendi tipi
      description: Tezgâhın dahil ettiği veya takılı çözgü kirişi konfigürasyonunu
        belirtir.
    washability:
      name: Yıkanabilirlik
      description: Yapıştırıcının suyla temizlenip temizlenemediğini ve/veya uygulama
        sonrası yıkanabilir olup olmadığını belirtir.
    watch_band_design:
      name: Saat kayışı tasarımı
      description: Saat kayışının yapım stilini veya tasarım desenini belirtir (örneğin,
        NATO, Milanese, bakla tipi).
    watch_movement:
      name: Saat mekanizması
      description: Saatin hangi mekanizma ile çalıştığını belirtir; modeller arasında
        seçim yaparken önemli bir ayırt edici özelliktir.
    water_activation:
      name: Suya temasla otomatik aktivasyon
      description: Cihazın suya batırıldığında otomatik olarak devreye girip girmediğini
        belirtir (Kategori I/II EPIRB’lerde yaygındır).
    water_chamber_configuration:
      name: Su haznesi konfigürasyonu
      description: Yatağın iç su haznesi düzenini (tek veya çift bölmeli gibi) tanımlar;
        bu yapı destek, ısı kontrolü ve partner hareketinden etkilenme düzeyini etkiler.
    water_dispensing_mechanism:
      name: Su dağıtım mekanizması
      description: Suyun üniteden nasıl verildiğini tanımlar (örneğin, musluk, püskürtme
        nozulu veya yerçekimiyle akıtma).
    water_exposure_protection_level:
      name: Suya karşı koruma seviyesi
      description: Ürünün suya maruz kaldığında sağladığı koruma seviyesini belirtir
        (örneğin, su sıçramasına karşı veya geçici suya batırmaya karşı). Resmî bir
        IP kodu mevcutsa Giriş Koruma (IP) derecelendirmesi kullanılmalıdır.
    water_fed_design:
      name: Suyla beslemeli tasarım
      description: Fırçanın, içinden su geçen sap veya hortum bağlantısıyla akan suyla
        kullanılmak üzere tasarlanıp tasarlanmadığını belirtir.
    water_gun_features:
      name: Su tabancası özellikleri
      description: Su tabancasının dikkat çekici işlevsel özelliklerini ve sunduğu
        donanımları belirtir.
    water_gun_operating_mechanism:
      name: Su tabancası çalışma mekanizması
      description: Su tabancasının kullanım sırasında suyu nasıl basınçlandırdığı
        ve püskürttüğünü açıklar.
    water_gun_spray_pattern:
      name: Su tabancası püskürtme deseni
      description: Nozuldan çıkan su akışının türünü belirtir.
    water_heating_method:
      name: Su ısıtma yöntemi
      description: Suyun kullanım öncesinde nasıl (veya ısıtılıp ısıtılmadığını) açıklar;
        örneğin güneş enerjisi, propan brülör, elektrikli rezistans, batarya destekli
        ısıtma, ısı tutucu yalıtım veya ısıtmasız kullanım.
    water_mattress_construction:
      name: Su yatağı yapımı
      description: Su yatağının yapım tipini (örneğin, sert kenarlı veya yumuşak kenarlı)
        belirtir; bu özellik çerçeve uyumluluğunu ve genel hissi etkiler.
    water_play_features:
      name: Su oyunu özellikleri
      description: Su parkı/kaydırak setinde yer alan su aktivitesi bileşenlerini
        belirtir.
    water_polo_competition_approval:
      name: Su topu müsabaka onayı
      description: Topun hangi yönetim organı veya müsabaka seviyesi için resmî olarak
        onaylandığını veya sertifikalandırıldığını belirtir.
    water_polo_goal_type:
      name: Su topu kale tipi
      description: Kalenin yapısal veya montaj konfigürasyonunu sınıflandırır (örneğin,
        yüzer, güverteye monte, taşınabilir).
    water_pump_drive_type:
      name: Su pompası tahrik tipi
      description: Araç soğutma sisteminde su pompasının nasıl tahrik edildiğini/çalıştırıldığını
        belirtir.
    water_pump_housing_material:
      name: Su pompası gövde malzemesi
      description: Su pompası gövdesinin malzemesini belirtir.
    water_pump_impeller_material:
      name: Su pompası pervanesi malzemesi
      description: Soğutucu sıvıyı hareket ettiren su pompası pervanesinin malzemesini
        belirtir.
    water_pump_mounting_type:
      name: Su pompası montaj tipi
      description: Su pompasının motor uyumluluğu için montaj/şekil faktörünü belirtir
        (örneğin, cıvatalı gövde veya kartuş/ek parça tipi).
    water_purification_method:
      name: Su arıtma yöntemi
      description: Ürünün sahada suyu içilebilir hâle getirmek için kullandığı temel
        mekanizmayı belirtir (örneğin, pompa, yerçekimiyle akış veya UV ışık).
    water_resistance:
      name: Suya dayanıklılık
      description: Sağlanan hava koşullarına karşı koruma derecesini belirtir (örneğin,
        su geçirmez veya suya dayanıklı).
    water_resistance_level:
      name: Suya dayanıklılık seviyesi
      description: Tekstil ürününün suyu itip itmediğini ve hangi seviyede su iticilik
        sağladığını belirtir.
    water_resistance_rating_case_protection_level:
      name: Suya dayanıklılık derecesi (kasa koruma seviyesi)
      description: Tekerlekli kasanın sağladığı suya karşı koruma seviyesini belirtir
        (pazarlama düzeyi; elektronik IP sızdırmazlık derecesi değildir).
    water_rocket_kit_items_included:
      name: Dahil olan su roketi kit ürünleri
      description: Ürün paketine dahil olan temel bileşenleri belirtir.
    water_rocket_propulsion_type:
      name: Su roketi itiş tipi
      description: Roketi fırlatmak için kullanılan temel itiş/enerji kaynağını belirtir.
    water_rocket_recovery_system:
      name: Su roketi kurtarma sistemi
      description: Fırlatma sonrasında roketi geri almak için kullanılan yöntemi belirtir.
    water_ski_base_design:
      name: Su kayağı taban tasarımı
      description: Su kayağının alt gövde profilini belirtir; bu profil yönlendirme
        özelliklerini etkiler.
    water_ski_fin_type:
      name: Su kayağı kanatçık tipi
      description: Su kayağının iz takibi ve manevra kabiliyetini etkileyen kanatçık
        konfigürasyonunu belirtir.
    water_source:
      name: Su kaynağı
      description: Karbonatlama işleminden önce suyun kaynağını belirtir.
    water_sports_safety_standard:
      name: Su sporları güvenlik standardı
      description: Ürünün karşıladığı resmî güvenlik veya yüzdürme standartlarını
        listeler (örneğin, kasklar için CE EN 1385, yüzdürme yardımcıları için ISO
        12402-5, USCG Tip III).
    water_table_feature_set:
      name: Su oyun masası özellik seti
      description: Su oyun masasındaki yerleşik oyun özelliklerini belirtir (örneğin,
        şelale, fıskiye, pompa, çok katlı havuz).
    water_table_items_included:
      name: Dahl olan su oyun masası ürünleri
      description: Su oyun masası setine dahil olan aksesuarları belirtir (örneğin,
        tekne, bardak, huni, figür).
    water_table_water_source_type:
      name: Su oyun masası su besleme tipi
      description: Su oyun masasının nasıl doldurulduğunu veya suyla nasıl beslendiğini
        belirtir.
    waterbed_stabilization_level:
      name: Su yatağı stabilizasyon seviyesi
      description: Su yatağının sağladığı dalga azaltma veya hareket kontrolü derecesini
        belirtir.
    watercolor_ink_water_resistance_after_drying:
      name: Sulu boya mürekkebi suya dayanıklılığı (kuruduktan sonra)
      description: Sulu boya mürekkebinin kuruduktan sonra suya dayanıklı olup olmadığını
        belirtir (üretici tarafıdnan belirtilen).
    watercraft_care_application_area:
      name: Deniz aracı bakım uygulama alanı
      description: Ürünün deniz aracının hangi ana bölümünde kullanılmak üzere tasarlandığını
        belirtir.
    watercraft_drive_mechanism:
      name: Deniz aracı tahrik mekanizması
      description: Deniz aracında kullanılan veya desteklenen tahrik mekanizmasını
        belirtir.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Deniz aracı yakıt depo sensörü montaj deseni
      description: Yakıt deposu seviye sensörleri ve uyumlu göstergeler için montaj
        deseni/standardını belirtir (örneğin, yaygın denizcilik cıvata desenleri).
    watercraft_fuel_tank_shape:
      name: Deniz aracı yakıt deposu şekli
      description: Yakıt deposunun genel fiziksel formunu tanımlar; alan ve yerleşim
        planlamasına yardımcı olur.
    watercraft_hull_material:
      name: Deniz aracı gövde malzemesi
      description: Gövde yapımında kullanılan ana malzemeyi belirtir.
    watercraft_ignition_part_voltage:
      name: Deniz aracı ateşleme parçası voltajı
      description: Ateşleme parçası için nominal voltaj değerini/gereksinimini belirtir
        (örneğin, 12 V sistemler).
    watercraft_impeller_material_grade:
      name: Deniz aracı pervane malzeme türü
      description: Deniz aracında kullanılan pervanenin malzemesini belirtir (örneğin,
        neopren, nitril, bronz).
    watercraft_lighting_certification_compliance:
      name: Deniz aracı aydınlatma sertifikasyonu / uyumluluğu
      description: Aydınlatmanın denizcilik kullanımına yönelik hangi düzenleyici/standartlara
        uygun olduğunu belirtir (örneğin, USCG/ABYC/COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Deniz aracı motor montaj ayar özellikleri
      description: Montaj aparatının eğme, kaldırma, kaydırma gibi ayar özelliklerini
        belirtir.
    watercraft_piston_part_type:
      name: Deniz aracı piston parça tipi
      description: Listenin, hangi pistonla ilgili bileşeni temsil ettiğini belirtir.
    watercraft_propeller_blade_rake:
      name: Deniz aracı pervane kanadı eğimi
      description: Kanatların göbeğe göre eğim açısını belirtir; kaldırma ve performansı
        etkiler.
    watercraft_propeller_rotation_direction:
      name: Deniz aracı pervane dönüş yönü
      description: Aktarma sistemi uyumluluğu için gerekli pervane dönüş yönünü belirtir
        (sağ dönüşlü veya sol dönüşlü).
    watercraft_pump_stage_impeller_role:
      name: Deniz aracı pompa kademesi / pervane görevi
      description: Pervanenin belirli bir pompa görevine yönelik olup olmadığını belirtir
        (örneğin, deniz suyu pompası, soğutma devresi, jet pompası).
    watercraft_registration_status:
      name: Deniz aracı tescil durumu
      description: Mülkiyet ve/veya tescil belgelerinin mevcut olup olmadığını belirtir.
    watercraft_safety_equipment_activation_type:
      name: Deniz aracı güvenlik ekipmanı aktivasyon tipi
      description: Güvenlik cihazının (işaret verici/MOB/PLB) nasıl aktive edildiğini
        belirtir.
    watercraft_steering_cable_core_material:
      name: Deniz aracı direksiyon kablosu çekirdek malzemesi
      description: Kuvvet iletimini sağlayan iç kablonun/çekirdeğin malzemesini belirtir.
    watercraft_steering_cable_hardware_included:
      name: Dahil olan deniz aracı direksiyon kablosu donanımı
      description: Direksiyon kablosuyla birlikte hangi montaj donanımı ve aksesuarların
        dahil olduğunu belirtir.
    watercraft_steering_cable_system_type:
      name: Deniz aracı direksiyon kablosu sistem tipi
      description: Kablonun tasarlandığı direksiyon sistemi mimarisini belirtir (örneğin,
        döner sistem, kremayer).
    watercraft_steering_wheel_hub_bore_type:
      name: Deniz aracı direksiyon göbek/delik tipi
      description: Tekerleğin göbeğe/adaptöre bağlandığı merkez delik arayüzü tipini
        belirtir (örneğin, konik, yivli).
    watercress_variety:
      name: Su teresi çeşidi
      description: Satılan su teresinin belirli çeşidini belirtir.
    waterproof_level:
      name: Su geçirmezlik seviyesi
      description: Ayakkabının suya karşı koruma seviyesini belirtir; varsa garanti
        kapsamındaki su geçirmezlik beyanlarını içerir.
    wax_blend_composition:
      name: Balmumu karışım bileşimi
      description: Üründe kullanılan balmumu türlerini ve/veya pazarlanan karışım
        tipini belirtir.
    wax_coat_type:
      name: Balmumu kaplama tipi
      description: Balmumunun astar kat, son kat veya çok amaçlı/tek kat formül olarak
        tasarlanıp tasarlanmadığını belirtir.
    wax_hardness:
      name: Balmumu sertliği
      description: Balmumunun göreceli sertliğini belirtir; bu özellik farklı kar
        türlerinde dayanıklılık ve kayma performansını etkiler.
    wax_physical_form:
      name: Balmumu fiziksel formu
      description: Ham mumun hangi fiziksel formda sunulduğunu belirtir (örneğin blok,
        granül, pul vb.).
    wax_recommended_candle_application:
      name: Balmumu önerilen mum uygulaması
      description: Balmumunun hangi mum türleri için formüle edildiğini belirtir.
    wax_tackiness_level:
      name: Mum yapışkanlık seviyesi
      description: Balmumunun bıçak yüzeyinde sağladığı yapışkanlık/tutunma seviyesini
        tanımlar.
    weapon_system_integration:
      name: Silah sistemi entegrasyonu
      description: Aracın entegre silah sistemleri veya montaj aparatları içerip içermediğini
        belirtir.
    weather_suitability:
      name: Hava koşullarına uygunluk
      description: Eldivenlerin hangi çevresel koşullar için tasarlandığını belirtir
        (örneğin soğuk hava, yağışlı hava).
    weave_finish:
      name: Dokuma/yüzey işlemi
      description: Kumaşın dokusunu ve parlaklığını etkileyen temel dokuma türünü
        veya yüzey işlemini belirtir.
    weave_style:
      name: Dokuma stili
      description: Panama şapkasının üretiminde kullanılan geleneksel dokuma desenini
        belirtir; bu desen nefes alabilirlik, esneklik ve fiyatı etkiler.
    weave_type:
      name: Dokuma türü
      description: Kumaşın dokusunu, parlaklığını ve dökümlülüğünü etkileyen dokuma/yapım
        stilini belirtir.
    weaving_beater_edge_type:
      name: Dokuma tokmağı kenar tipi
      description: Atkı ipliğine temas eden düz dokuma tokmağının kenar profilini
        belirtir (örneğin düz veya tırtıklı).
    weaving_beater_style:
      name: Dokuma tarağı stili
      description: Düz dokuma tokmağının işlevsel stilini/biçimini belirtir.
    weaving_shuttle_tip_style:
      name: Dokuma mekik ucu stili
      description: Mekiğin ön uç/burun tasarımını belirtir; bu tasarım, ağızlıktan
        (çözgü aralığından) nasıl geçtiğini ve çözgü ipliklerine takılma olasılığını
        etkiler.
    weaving_shuttle_use_case:
      name: Dokuma mekik kullanım amacı
      description: Mekiğin tasarlandığı veya optimize edildiği dokuma uygulamasını
        belirtir.
    webbing_construction_type:
      name: Kolon dokuma yapım tipi
      description: Dokumanın fiziksel örgü veya örgü stilini tanımlar; bu stil, işleme,
        mukavemet ve kullanım amacını etkiler.
    webbing_design:
      name: Parmak arası perde tasarımı
      description: Parmaklar arasındaki perde yapısını belirtir; direnç antrenmanı
        ve itiş gücünü etkiler.
    weight_adjustability:
      name: Ağırlık ayarlanabilirliği
      description: Ürünün direncinin kullanıcı tarafından değiştirilip değiştirilemeyeceğini
        (örneğin, ayarlanabilir veya yüklenebilir olup olmadığını) veya tek bir ağırlıkta
        sabit olup olmadığını açıklar.
    weight_integration_system:
      name: Ağırlık entegrasyon sistemi
      description: Balast ağırlıklarının denge yeleğine (BCD) entegre edilip edilmediğini
        ve nasıl entegre edildiğini belirtir (örneğin, çıkarılabilir ağırlık cepleri,
        entegre sistem yok, isteğe bağlı eklenti).
    weight_plate_compatibility:
      name: Ağırlık plakası uyumluluğu
      description: Makinenin kabul ettiği ağırlık plakası çaplarını belirtir (Olimpik,
        Standart veya her ikisi).
    weight_plate_style:
      name: Ağırlık plakası tarzı
      description: Hızlı uyumluluk filtrelemesi için ağırlık plakasının tasarımını/tipini
        sınıflandırır (örneğin, Olimpik, tamponlu, seçmeli).
    weightlifting_belt_style:
      name: Halter kemeri stili
      description: Kemerin genel tasarımını veya amaca yönelik konfigürasyonunu sınıflandırır
        (örneğin, lever kemer, dip kemeri, konik kemer).
    weightlifting_federation_certification:
      name: Halter federasyonu sertifikası
      description: Ürünün IPF veya IWF gibi federasyonlar tarafından resmî olarak
        onaylanıp onaylanmadığını belirtir.
    wetsuit_boot_height:
      name: Dalgıç botu yüksekliği
      description: Botun bacak üzerindeki yükseklik/kesim tipini sınıflandırır; koruma
        ve hareket kabiliyetini etkiler.
    wetsuit_entry_system:
      name: Dalgıç elbisesi giriş sistemi
      description: Dalgıç elbisesine giriş için kullanılan açıklık/fermuar sisteminin
        türünü ve konumunu belirtir.
    wetsuit_seam_construction:
      name: Dalgıç elbisesi dikiş yapısı
      description: Dikişlerin nasıl yapıldığını ve nasıl sızdırmaz hâle getirildiğini
        belirtir; sıcaklık ve dayanıklılığı etkiler.
    wheat_product_form:
      name: Buğday ürün formu
      description: Buğday ürününün fiziksel veya işlenmiş formunu belirtir.
    wheel_arrangement:
      name: Tekerlek düzeni
      description: Buharlı lokomotifin tekerlek düzenini (Whyte notasyonu) belirtir;
        bu özellik tanımlayıcı bir niteliktir ve koleksiyoncular tarafından sıkça
        arama terimi olarak kullanılır.
    wheel_brake_type:
      name: Tekerlek fren tipi
      description: Sepetin tekerleklerinde veya döner tekerleklerinde bulunan fren
        sistemini belirtir.
    wheel_chock_grip_features:
      name: Tekerlek takozu tutuş özellikleri
      description: Yüzeyde ve lastik karşısında tutuş gücünü artıran tasarım özelliklerini
        belirtir.
    wheel_cleaner_acidity_ph_category:
      name: Jant temizleyici asitlik/pH kategorisi
      description: Jant temizleyicisinin asidik, nötr veya alkali olup olmadığını
        (ve isteğe bağlı olarak pH değerinin piyasa değeri olup olmadığını) gösterir.
    wheel_cleaner_formula_type:
      name: Jant temizleyici formülü tipi
      description: Jant temizleyicileri ve ilgili yıkama çözümleri için, ürünün ana
        formül kategorisini belirtir (örneğin, asit bazlı, asit içermeyen, pH nötr/dengeli
        veya demir reaktif).
    wheel_construction_type:
      name: Tekerlek yapı türü
      description: Tekerleğin üretim/yapım yöntemini belirtir.
    wheel_contaminant_target:
      name: Tekerlek kirletici hedefi
      description: Temizleyicinin gidermeye yönelik tasarlandığı başlıca kir türlerini
        belirtir.
    wheel_core_type:
      name: Tekerlek çekirdek tipi
      description: Tekerlek göbeğinin yapım tarzını belirtir; bu yapı ağırlığı, rijitliği
        ve enerji aktarımını etkiler.
    wheel_cylinder_inlet_port_thread_standard:
      name: Tekerlek silindiri giriş portu diş standardı
      description: Tekerlek silindirindeki fren hattı giriş portunun diş standardını
        belirtir (örneğin, metrik bubble flare veya SAE ters flare).
    wheel_fastener_seat_type:
      name: Bijon oturma tipi
      description: Jantla uyumlu bijon somunu/cıvata oturma tipini belirtir (örneğin,
        konik, küresel/radyal, düz, mag/shank).
    wheel_illumination:
      name: Tekerlek aydınlatması
      description: Tekerleğin entegre aydınlatma veya ışık özelliğine sahip olup olmadığını
        belirtir.
    wheel_material:
      name: Tekerlek malzemesi
      description: Tekerleklerin dayanıklılığını, yol tutuşunu ve titreşim sönümlemesini
        etkileyen temel bileşimini belirler.
    wheel_profile:
      name: Tekerlek profili
      description: Hız, tutuş ve çevikliği etkileyen tekerleğin kesit şeklini belirtir.
    wheel_setup_type:
      name: Tekerlek kurulum tipi
      description: Patenlerde kullanılan tekerlek dizilim stilini belirtir.
    wheel_system_finish:
      name: Tekerlek sistemi yüzey kaplaması
      description: Jantların/tekerleklerin ve ilgili parçaların yüzey kaplamasını
        belirtir.
    whip_style:
      name: Kırbaç stili
      description: Ürünü belirli binicilik kırbacı stiline veya kullanım disiplinine
        göre sınıflandırır.
    whipped_cream_base:
      name: Krem şanti baz bileşeni
      description: Çırpılmış kremanın yapımında kullanılan temel hammaddesini belirtir
        (örneğin süt kreması veya hindistancevizi).
    whipped_cream_form:
      name: Çırpılmış krema formu
      description: Çırpılmış kremanın satıldığı fiziksel formu belirtir (örneğin sprey,
        toz, sıvı).
    whistle_head_material:
      name: Düdük başlık malzemesi
      description: Düdüğün başlık/ağızlık kısmının (fipple bloğu/başlığı) malzemesini
        belirtir.
    whistle_light_features:
      name: Düdük ışık özellikleri
      description: Düdüğün parti amaçlı entegre ışık efektleri (örneğin LED) içerip
        içermediğini belirtir.
    whistle_purpose:
      name: Düdüğün amacı
      description: Düdüğün temel kullanım amacını belirtir (örneğin spor koçluğu,
        deniz güvenliği, köpek eğitimi).
    whistle_sound_style:
      name: Düdük ses stili
      description: Düdüğün ses çıkış stilini/karakterini belirtir (örneğin tek tonlu
        veya çok tonlu).
    white_glue_finish_appearance_when_dry:
      name: Beyaz tutkal kuruma sonrası görünümü
      description: Tutkalın kuruduktan sonra nasıl göründüğünü belirtir (örneğin şeffaf
        veya opak).
    white_glue_washability:
      name: Beyaz tutkal yıkanabilirliği
      description: Kurumuş tutkalın kumaş veya ciltten yıkanarak çıkarılıp çıkarılamayacağını
        belirtir.
    whitewater_kayak_style:
      name: Nehir kayağı stili
      description: Beyaz su segmentindeki temel tasarım amacını belirtir (örneğin
        Creekboat, River Runner, Playboat).
    whitewater_rating_class:
      name: Akarsu zorluk derecesi (sınıfı)
      description: Raftın dayanabildiği en yüksek Uluslararası Nehir Zorluk Derecesi
        sınıfını belirtir.
    whorl_mounting_interface:
      name: Fırdöndü montaj arayüzü
      description: Ağırlığın (whorl) çıkrığa nasıl bağlandığını belirtir (mil tipi/bağlantı
        şekli).
    wick_construction_type:
      name: Fitil yapı türü
      description: Fitilin yapım tarzını belirtir (örgülü, düz, kare örgü, çekirdekli,
        ahşap vb.).
    wick_core_type:
      name: Fitil çekirdek tipi
      description: Fitilin çekirdeksiz olup olmadığını veya çekirdek malzemesi (örneğin
        kâğıt veya çinko) içerip içermediğini belirtir; bu durum yanma özelliklerini
        etkiler.
    wick_tab_crimp_type:
      name: Fitil sekme kıvırma tipi
      description: Fitil tablasının fitili nasıl sabitlediğini belirtir (yapı/kıvırma
        şekli).
    wick_tab_material:
      name: Fitil taban malzemesi
      description: Fitil tablasının/sabitleyicinin malzemesini belirtir (genellikle
        teneke); korozyon direnci ve mevzuat açısından önemlidir.
    wick_tab_shape:
      name: Fitil sekme şekli
      description: Fitil tablasının şekil/form faktörünü belirtir.
    wick_type_included:
      name: Dahill olan fitil tipi
      description: Kit içerisinde yer alan fitilin türünü/malzemesini belirtir.
    wig_fiber_material:
      name: Peruk elyaf malzemesi
      description: Peruk saçında kullanılan ana lif türünü belirleyerek, alıcının
        farklı şekillendirme ve dayanıklılık özelliklerine sahip insan saçı çeşitleri
        ve sentetik seçenekler arasında kolayca seçim yapmasını sağlar.
    wildlife_attractant_scent:
      name: Yaban hayatı cezbedici koku türü
      description: Yaban hayvanlarını cezbetmek için kullanılan temel koku türünü
        belirtir (doğal yem kokuları veya feromon türleri).
    willow_grade:
      name: Söğüt kalite derecesi
      description: Kullanılan söğüt ağacının kalite derecesini belirtir; damar yapısını
        ve genel performans seviyesini gösterir.
    willow_type:
      name: Söğüt türü
      description: Sopanın gövdesinde kullanılan söğüt türünü veya alternatif malzemeyi
        belirtir; performansı, dayanıklılığı ve fiyatı önemli ölçüde etkiler.
    wind_up_mechanism_type:
      name: Kurmalı mekanizma tipi
      description: Oyuncağın nasıl kurulduğunu veya nasıl etkinleştirildiğini belirtir.
    wind_up_toy_movement_pattern:
      name: Kurmalı oyuncak hareket deseni
      description: Kurulduğunda ortaya çıkan ana hareket biçimini tanımlar.
    windbreak_purpose:
      name: Rüzgâr kırıcı kullanım amacı
      description: Rüzgâr kırıcı ürünün temel kullanım amacını belirtir.
    windfoil_board_mounting_system:
      name: Windfoil board montaj sistemi
      description: Windfoil board üzerine entegre edilmiş foil kutusu veya montaj
        arayüzünü belirtir.
    windfoil_sail_style:
      name: Windfoil yelken stili
      description: Yelkeni, kullanım amacına yönelik sürüş stili veya disipline göre
        sınıflandırır.
    winding_direction:
      name: Sarma yönü
      description: Saat kurma cihazının desteklediği dönüş yönünü belirtir (saat yönünde,
        saat yönünün tersinde veya çift yönlü).
    winding_method:
      name: Sarma yöntemi
      description: Atkı ipliğinin mekikte kullanılmak üzere nasıl sarılması veya yüklenmesi
        gerektiğini belirtir.
    winding_speed_control_type:
      name: Sarma hızı kontrol tipi
      description: Kullanım sırasında sarım hızının hangi yöntemle kontrol edildiğini
        belirtir.
    winding_type:
      name: Sarma tipi
      description: Bas gitar tellerinin sarım yapısını (dış sarım profili) belirtir.
    windlass_control_station_type:
      name: Irgat kontrol istasyonu tipi
      description: Irgatın çalıştırılması için sunulan veya desteklenen kontrol arayüzü
        tipini belirtir.
    windlass_mount_type:
      name: Irgat montaj tipi
      description: Irgatın tekne üzerinde nereye ve nasıl monte edilmesinin tasarlandığını
        belirtir.
    window_component_location:
      name: Pencere bileşeni konumu
      description: Parçanın araç içinde hangi pencere/açıklık için geçerli olduğunu
        belirtir (örneğin, ön cam, kapı camı, arka cam, sabit yan cam).
    window_configuration:
      name: Pencere konfigürasyonu
      description: Wingfoil kanadında bulunan şeffaf görüş pencerelerinin varlığını
        ve göreceli boyutunu belirtir.
    window_glass_construction:
      name: Pencere camı yapımı
      description: Motorlu taşıt camının güvenlik/laminasyon yapısını belirtir.
    window_glass_features:
      name: Pencere camı özellikleri
      description: Camın entegre araç teknolojilerini (örneğin yağmur sensörü pedi,
        kamera braketi) destekleyip desteklemediğini belirtir.
    window_glass_finish:
      name: Pencere camı yüzey işlemi
      description: Motorlu taşıt camının yüzey kaplamasını, renk tonunu veya gizlilik
        uygulamasını belirtir.
    window_glass_tint_color:
      name: Pencere camı renk tonu
      description: Camdaki film/ton uygulamasının renk tonunu belirtir (genel ürün
        rengini değil).
    window_glass_tint_level:
      name: Pencere camı ton seviyesi
      description: Camın yaklaşık fabrika/gizlilik ton koyuluğunu belirtir (sonradan
        uygulanan film değil). Kesin VLT değeri bilinmiyorsa tanımlayıcı seviyeler
        kullanılır.
    window_net_latch_mechanism:
      name: Pencere ağı kilitleme mekanizması
      description: Pencere ağı için kullanılan kilitleme/açma mekanizmasını belirtir
        (örneğin düğmeli, kollu, emniyet kemeri tipi toka).
    window_net_mounting_hardware:
      name: Pencere ağı montaj donanımı
      description: Pencere ağının montajında kullanılan donanım veya bağlantı yöntemini
        belirtir (örneğin klipsli, vidalı, kanca/çubuk tipi) ve donanımın dahil olup
        olmadığını gösterir.
    window_net_opening_direction:
      name: Pencere ağının açılma yönü
      description: Pencere ağının, araç içindeki kişiye göre hangi yönde açıldığını/serbest
        bırakıldığını belirtir.
    window_regulator_operation:
      name: Cam kaldırma mekanizması çalışma tipi
      description: Cam kaldırma mekanizmasının manuel mi yoksa elektrikli mi çalıştığını
        belirtir.
    windshield_coverage_area:
      name: Ön cam kapsama alanı
      description: Ön cam örtüsünün aracın ön dış yüzeyinin hangi kısımlarını korumak
        üzere tasarlandığını belirtir (örneğin, yalnızca ön cam mı yoksa silecekler,
        aynalar, yan camlar veya kaput kenarı da dahil mi).
    windshield_mount_attachment_method:
      name: Ön cam montaj bağlantı yöntemi
      description: Montaj aparatının ön cam yüzeyine nasıl tutunduğunu veya sabitlendiğini
        belirtir.
    windshield_washer_fluid_seasonality:
      name: Ön cam yıkama sıvısı mevsimsel kullanım türü
      description: Ön cam yıkama sıvısının formülasyonunun amaçlanan mevsimi/iklimi
        veya birincil kullanım alanını belirtir (örneğin, kış buz çözücü, yaz hava
        temizleyici, dört mevsim).
    windsurf_fin_style:
      name: Rüzgar sörfü yüzgeci tarzı
      description: Yüzgeci, kullanım amacına göre yelken disiplini veya kullanım stiline
        göre sınıflandırır (örneğin, dalga, slalom, yosunlu zemin).
    windsurfing_connection_standard:
      name: Rüzgar sörfü bağlantı standardı
      description: Parçanın boarda veya donanıma bağlanmasında kullanılan mekanik
        arayüz veya box tipi bağlantıyı belirtir.
    windsurfing_sail_style:
      name: Rüzgar sörfü yelken stili
      description: Yelkenin kullanım amacını veya disiplinini sınıflandırır (örneğin,
        dalga, freeride, foil).
    wine_additive_type:
      name: Şarap katkı maddesi türü
      description: Ürünün ne tür bir şarap yapım ürünü olduğunu belirtir (bileşen,
        katkı maddesi, maya, berraklaştırıcı, kit vb.).
    wine_body:
      name: Şarap gövdesi
      description: Şarabın algılanan ağırlığını ve ağızda bıraktığı hissi tanımlar.
    wine_carbonation:
      name: Şarap karbonasyonu
      description: Şarabın durgun, yarı köpüklü veya köpüklü olup olmadığını ve köpürme
        yoğunluğunu belirtir.
    wine_making_ingredient_type:
      name: Şarap yapımında kullanılan malzeme türü
      description: Şarap yapımında kullanılan katkı ve bileşenlerin fonksiyonel kategorisini
        belirtir.
    wine_making_stage:
      name: Şarap yapım aşaması
      description: Ürünün şarap yapım sürecinin hangi aşamasında kullanılacağını belirtir.
    wine_style:
      name: Şarap stili
      description: Şarabın üretim tarzını, rengine ek olarak durgun, köpüklü veya
        güçlendirilmiş gibi sınıflandırır.
    winemaking_process_stage:
      name: Şarap yapım sürecinin aşaması
      description: Ürünün şarap üretim sürecinin hangi ana aşaması için tasarlandığını
        belirtir.
    wing_count:
      name: Kanat sayısı
      description: Bumerang üzerindeki kanat/kol sayısını belirtir.
    wing_handle_type:
      name: Kanat tutamak tipi
      description: Wingfoil kanadı üzerindeki el tutma sistemi stilini belirtir.
    wing_part_type:
      name: Kanat parçası tipi
      description: Wingfoil kanadı için belirli bileşeni veya yedek parçayı belirtir.
    wingfoiling_style:
      name: Wingfoil sürüş stili
      description: Ürünün hedeflediği wingfoil disiplini veya sürüş stilini belirtir.
    wiper_arm_finish:
      name: Silecek kolu yüzey kaplaması
      description: Silecek koluna uygulanan yüzey kaplamasını veya koruyucu kaplamayı
        belirtir; bu kaplama korozyon direncini ve görünümü etkiler.
    wiper_arm_pivot_mount_type:
      name: Silecek kolu pivot montaj tipi
      description: Silecek kolunun aracın silecek mekanizmasına veya pivot noktasına
        nasıl monte edildiğini belirtir.
    wiper_blade_attachment_type:
      name: Silecek bıçağı bağlantı tipi
      description: Silecek bıçağının silecek koluna bağlanmasında kullanılan bağlantı
        tipini belirtir.
    wiper_blade_rubber_material:
      name: Silecek lastiği malzemesi
      description: Camla temas eden silme elemanının (lastik/yenileme parçası) malzemesini
        belirtir.
    wiper_system_position:
      name: Silecek sistemi konumu
      description: Araç üzerindeki silecek sisteminin montaj konumunu belirtir.
    wire_coating_material:
      name: Tel kaplama malzemesi
      description: Telin dış kaplama/kılıf malzemesini belirtir (çekirdek tel malzemesi
        değil); bu durum aşınma direncini ve boncuk deliklerinden geçiş akıcılığını
        etkiler.
    wire_coating_type:
      name: Tel kaplama tipi
      description: Telin kaplanıp kaplanmadığını ve nasıl kaplandığını belirtir (renk,
        koruma ve doku açısından).
    wire_construction_type:
      name: Tel yapı türü
      description: Boncuk telinin fiziksel yapısını belirtir (örgülü veya tek parça,
        kaplamalı veya kaplamasız).
    wire_finish:
      name: Tel yüzey işlemi
      description: Telin yüzeyine uygulanan kaplama, boya veya elektroliz işlemini
        (örneğin, cilalı, emaye, galvanizli, kaplamalı) belirtir; bu işlem telin görünümünü
        ve kararma/korozyon direncini etkiler.
    wire_gauge_awg:
      name: Tel kesiti (AWG)
      description: Kablo demetinde kullanılan iletkenlerin Amerikan Tel Ölçüsü (AWG)
        değerini belirtir.
    wire_insulation_material:
      name: Tel yalıtım malzemesi
      description: Kablo demetinde kullanılan tel izolasyon/kılıf malzemesini belirtir;
        sıcaklık ve kimyasal direnci etkiler.
    wire_packaging_type:
      name: Tel ambalaj tipi
      description: Telin hangi formatta satıldığını/paketlendiğini belirtir.
    wire_shape_profile:
      name: Tel kesit şekli/profili
      description: Telin kesit şeklini belirtir.
    wiring_configuration:
      name: Kablolama yapılandırması
      description: Eskrim epenin elektrikli puanlama için önceden kablolu, kablosuz,
        telsiz veya elektriksiz antrenman amaçlı olup olmadığını belirtir.
    wobbler_style:
      name: Wobbler stili
      description: Wobbler yeminin belirli tasarım/hareket stilini tanımlar (örneğin
        crankbait veya jerkbait).
    wood_block_surface_preparation:
      name: Ahşap blok yüzeyinin hazırlanması
      description: Ahşap bloğun son işlem ve el işi uygulamaları için kullanıma hazır
        yüzey durumunu belirtir.
    wood_grain_direction:
      name: Ahşap damar yönü
      description: Ahşap damarlarının ürünün en uzun boyutuna göre yönünü belirtir
        (mukavemet, kesim davranışı ve görünüm açısından önemlidir).
    wood_slice_edge_style:
      name: Ahşap dilim kenar stili
      description: Ahşap dilimin kenar durumunu belirtir (doğal kabuklu veya zımparalanmış/pürüzsüz).
    wooden_block_special_features:
      name: Ahşap blok özel özellikleri
      description: Ahşap blok setine dahil dikkat çekici işlevsel özellikleri belirtir.
    woodwind_body_construction:
      name: Nefesli çalgılar gövde yapısı
      description: Aletin tek parça mı yoksa birden fazla bölümden mi (örneğin, 2
        parçalı/3 parçalı) yapıldığını gösterir; bu durum temizliğini, saklanmasını
        ve taşınabilirliğini etkiler.
    woodwind_polishing_cloth_intended_use:
      name: Nefesli çalgı parlatma bezi kullanım amacı
      description: Parlatma bezinin nefesli çalgının hangi yüzeyini temizlemek/parlatmak
        için tasarlandığını belirtir.
    woodwind_small_part_type:
      name: Nefesli çalgı küçük parça tipi
      description: Ürünün ne tür bir klarnet küçük yedek parçası olduğunu belirtir
        (örneğin tuş mekanizması, ped, mantar, halka).
    woofer_mounting_type:
      name: Woofer montaj tipi
      description: Woofer’ın nasıl monte edilmek veya kullanılmak üzere tasarlandığını
        belirtir (açık hava/free-air veya kutulu kullanım).
    woofer_surround_material:
      name: Woofer süspansiyon malzemesi
      description: Woofer’ın dış süspansiyon halkasında kullanılan malzemeyi belirtir.
    worn_on_finger:
      name: Takılacağı parmak
      description: Yüksük kılavuzunun hangi parmağa takılacağını belirtir.
    wrap_style:
      name: Sarma stili
      description: Kemerin bele kaç tur dolanacak şekilde tasarlandığını belirtir.
    wrapping_occasion:
      name: Paketleme amacı
      description: Hediye paketleme kâğıdının tasarlandığı temel hediye/özel gün amacını
        belirtir.
    wrapping_paper_features:
      name: Hediye paketleme kâğıdı özellikleri
      description: Paketleme kâğıdının yırtılma direnci, geri dönüştürülmüş içerik
        veya önceden kesilmiş format gibi işlevsel ve sürdürülebilirlik özelliklerini
        belirtir.
    wrestling_dummy_design:
      name: Güreş mankeni tasarımı
      description: Güreş mankeninin genel gövde şekli veya duruşunu belirtir (örneğin
        ayakta insan formu veya fırlatma torbası tipi).
    wrestling_mat_safety_certifications:
      name: Güreş minderi güvenlik sertifikaları
      description: Minderin sahip olduğu sektörel veya spor kuruluşlarına ait güvenlik
        sertifikalarını belirtir.
    wrist_strap_style:
      name: Bilek kayışı stili
      description: Bilek kayışının stilini veya bulunup bulunmadığını belirtir; destek
        ve uyumu etkiler.
    wrist_support_style:
      name: Bilek destek stili
      description: Kullanıcı tercihine ve performansa uygun seçim yapılmasına yardımcı
        olmak amacıyla, bilek desteğinin yapısını veya stilini (örneğin, bileklik,
        eldiven, bant veya sargı) tanımlar.
    xylophone_range_octaves:
      name: Ksilofon ses aralığı (oktav)
      description: Ksilofonun toplam ses aralığını oktav cinsinden belirtir (örneğin
        2,5 oktav, 3 oktav).
    xylophone_resonator_type:
      name: Ksilofon rezonatör tipi
      description: Sesi güçlendirmek için kullanılan rezonatör sisteminin türünü belirtir.
    yam_variety:
      name: Yam çeşidi
      description: Satılan tatlı patatesin çeşidini veya yaygın türünü belirtir (örneğin,
        mor, sarı, fil ayağı).
    yarn_cutter_physical_style:
      name: İplik kesici fiziksel stil
      description: Bu kategori içinde gezinmeyi ve filtrelemeyi kolaylaştırmak için
        iplik kesici aletin fiziksel stilini (örneğin, kolye, halka, makas) tanımlar.
    yarn_finish_or_effect:
      name: İplik yüzey efekti
      description: İpliğe uygulanan floresan, metalik ışıltı gibi özel görsel veya
        işlevsel işlemleri belirtir.
    yarn_guide_style:
      name: İplik kılavuzu stili
      description: İplik yönlendirme bileşeninin fiziksel stilini belirtir.
    yarn_swift_adjustability:
      name: Çıkrık sehpası ayarlanabilirliği
      description: Çıkrık sehpasının ayarlanabilir olup olmadığını ve nasıl ayarlanabildiğini
        belirtir; depolama ve çile boyutu uyumluluğunu etkiler.
    yarn_swift_bearing_type:
      name: Çıkrık sehpası rulman tipi
      description: Dönüşü sağlayan mekanizmanın türünü belirtir (örneğin bilyalı rulman);
        dönüş akıcılığını etkiler.
    yeast_application:
      name: Maya kullanım amacı
      description: Maya ürününün temel mutfak veya fermantasyon kullanım amacını belirtir.
    yo_yo_accessory_part_type:
      name: Yo-yo aksesuarı/parça türü
      description: Ürünün ne tür bir yo-yo yedek parçası veya aksesuarı olduğunu belirtir
        (örneğin ip, rulman, response ped).
    yo_yo_axle_system_type:
      name: Yo-yo aks sistemi tipi
      description: Yo-yo aksının yapım tipini belirtir (örneğin sabit aks veya transaks);
        oyun hissini ve bakımı etkiler.
    yo_yo_bearing_size_class:
      name: Yo-yo rulman boyut sınıfı
      description: Yo-yo’da kullanılan standart rulman boyut sınıfını belirtir (uygulanabilir
        olduğunda).
    yo_yo_bearing_type:
      name: Yo-yo rulman tipi
      description: Tepki davranışını ve dönüş özelliklerini etkileyen rulman konfigürasyonunu
        belirtir.
    yo_yo_play_style:
      name: Yo-yo oyun stili
      description: Yo-yo’nun tasarlandığı temel oyun stilini belirtir; ip/hareket
        disiplinini yansıtır.
    yo_yo_response_system:
      name: Yo-yo tepki sistemi
      description: Bu parçanın hangi yo-yo tepki sistemiyle uyumlu olduğunu belirtir.
    yo_yo_responsiveness:
      name: Yo-yo tepkiselliği
      description: Yo-yo’nun çekmeyle geri dönen (responsive) mi yoksa bind gerektiren
        (unresponsive) mi olduğunu belirtir.
    yo_yo_string_material:
      name: Yo-yo ip malzemesi
      description: Yo-yo ipinin malzeme bileşimini belirtir.
    yogurt_base_ingredient:
      name: Yoğurt baz bileşeni
      description: Yoğurdun yapımında kullanılan ana süt veya bitki bazlı kaynağı
        belirtir; bu, diyet gereksinimleri, alerjenler ve alerjenler açısından kritik
        öneme sahiptir.
    yoke_type:
      name: Yoke tipi
      description: Monopod üzerinde ateşli silahı destekleyen beşik/yoke tipini belirtir.
    zill_playing_style:
      name: Zil çalma stili
      description: Zillerin tasarlandığı icra stilini belirtir (örneğin oryantal dans
        veya orkestral/kültürel kullanım).
    zill_strap_material:
      name: Zil kayış malzemesi
      description: Zilleri tutmak için kullanılan parmak kayışı/elastik malzemesini
        belirtir; konfor ve dayanıklılığı etkiler.
    zills_strap_adjustability:
      name: Zills kayış ayarlanabilirliği
      description: Kayışın/elastiğin ayarlanabilir olup olmadığını ve nasıl ayarlandığını
        belirtir.
    zipper_application:
      name: Fermuar kullanım amacı
      description: Fermuarın hangi proje veya uygulama için tasarlandığını belirtir.
    zipper_chain_type:
      name: Fermuar zinciri tipi
      description: Fermuar zincirinin/dişlerinin yapım tipini belirtir.
    zipper_end_type:
      name: Fermuar ucu tipi
      description: Fermuarın nasıl sonlandığını ve açık uçlu (ayrılabilir) ya da kapalı
        uçlu (ayrılmaz) olup olmadığını belirtir; hobi/tekstil fermuarlarında kullanılan
        yaygın ayrılabilir uç donanımlarını da kapsar.
    zipper_gauge:
      name: Fermuar numarası (#)
      description: 'Fermuar zincirinin ölçü/numara değerini (genellikle # ile ifade
        edilir; örneğin #3 veya #5) belirtir; bu değer diş/sarmal genişliği ve kullanım
        amacını gösterir.'
    zipper_opening_length:
      name: Fermuar açıklığı uzunluğu
      description: Ön açıklığın ne kadarının fermuarlı olduğunu belirtir (tam boy,
        yarım, çeyrek fermuar gibi).
    zipper_pull_material:
      name: Fermuar çekme ucu malzemesi
      description: Fermuarın çekme ucu/çekme kolunun (elle tutulan kısmın) malzemesini
        belirtir; fermuar dişleri/zinciri ve bant kısmından farklıdır.
    zipper_pull_side:
      name: Fermuar çekme yönü
      description: Çekme ucuna hangi taraftan/taraflardan erişilebildiğini belirtir.
    zipper_pull_strap_cord_tab_material:
      name: Fermuar çekme kayışı/kordonu malzemesi
      description: Fermuar çekme ucuna takılı olan kayış/kordon/sekme/püskül bileşeninin
        (varsa) malzemesini belirtir; ana fermuar sürgü donanımı/gövdesi hariçtir.
    zipper_reversibility_mechanism:
      name: Fermuar ters çevrilebilirlik mekanizması
      description: Fermuarın nasıl ters çevrilebilir olduğunu belirtir (örneğin, çift
        taraflı sürgü veya ters çevrilebilir giysiler için tasarlanmış çevirme/otomatik
        kilitli sürgü).
    zipper_separating_type:
      name: Fermuar ayrılma tipi
      description: Fermuarın alttan veya üstten ayrılıp ayrılmadığını ya da kapalı
        uçlu olup olmadığını belirtir; ceket, uyku tulumu, çanta gibi ürünlerle uyumluluk
        açısından önemlidir.
    zipper_side:
      name: Fermuar tarafı
      description: Uyku tulumu yüzü yukarı bakacak şekilde konumlandırıldığında ana
        fermuarın hangi tarafta bulunduğunu belirtir.
    zipper_slider_material:
      name: Fermuar sürgüsü malzemesi
      description: Fermuar sürgüsünün (hareketli mekanizmanın) malzemesini belirtir;
        dayanıklılığı ve korozyon direncini etkileyebilir.
    zipper_slider_pull_configuration:
      name: Fermuar sürgüsü/çekme kolu konfigürasyonu
      description: Fermuarın tek veya çift sürgü/çekme koluna sahip olup olmadığını
        ve çekme kollarının sürgünün bir veya iki tarafında bulunup bulunmadığını
        belirtir.
    zipper_style:
      name: Fermuar stili
      description: Giyside fermuarın uzunluğunu veya varlığını belirtir (örneğin fermuarsız,
        çeyrek fermuar, yarım fermuar, tam fermuar).
    zipper_tape_material:
      name: Fermuar şerit malzemesi
      description: Projeye dikilen fermuar bandının (kumaş kenarlarının) ana malzemesini
        belirtir.
    zipper_teeth_type:
      name: Fermuar diş tipi
