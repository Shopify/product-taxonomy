    compatible_reed_cut:
      name: Uyumlu kamış kesimi
      description: Ligatürün uyumlu olduğu kamış kesim tipini belirtir (örneğin törpülenmiş/Fransız
        kesim veya törpülenmemiş/Amerikan kesim).
    compatible_reed_type:
      name: Uyumlu kamış tipi
      description: Ağızlığın hangi kamış kesimi/tipi için tasarlandığını belirtir.
    compatible_reel_type:
      name: Uyumlu olta makinesi tipi
      description: Çanta, kutu veya kılıfın hangi olta makarası modeline uygun olduğunu
        belirtir.
    compatible_refrigerant_type:
      name: Uyumlu soğutucu akışkan türü
      description: Klima evaporatörünün hangi soğutucu akışkanla kullanılmak üzere
        tasarlandığını gösterir.
    compatible_ride_equipment:
      name: Uyumlu sürüş ekipmanı
      description: Rampın kullanılması amaçlanan tekerlekli spor ekipmanı türleri.
    compatible_roof_height:
      name: Uyumlu çatı yüksekliği
      description: Kılıfla kullanılması tasarlanan çatı profilini belirtir (standart
        veya genişletilmiş/yüksek tavan).
    compatible_roof_rail_type:
      name: Uyumlu tavan rayı tipi
      description: Baz tavan raf sisteminin uyumlu olduğu araç tavan konfigürasyonunu
        belirtir.
    compatible_rope_count:
      name: Uyumlu halat sayısı
      description: Parçanın hangi boks ringi halat konfigürasyonu için tasarlandığını
        belirtir (ör. 3 halatlı ringler, 4 halatlı ringler veya evrensel uyum).
    compatible_rope_type:
      name: Uyumlu halat tipi
      description: Cihazla hangi halat yapılarının kullanılabileceğini belirtir.
    compatible_saddle_type:
      name: Uyumlu eyer tipi
      description: Aksesuarın hangi eyer stili veya binicilik disiplinine uygun şekilde
        tasarlandığını belirterek İngiliz eyeri, Batı eyeri ve diğer eyer türleri
        arasında doğru uyumu sağlar.
    compatible_saxophone_size:
      name: Uyumlu saksafon boyutu
      description: Ürünün hangi saksafon boyutuyla uyumlu olduğunu belirtir (ör. soprano,
        alto, tenor).
    compatible_saxophone_type:
      name: Uyumlu saksafon tipi
      description: Ligatürün/kapağın hangi saksafona uygun tasarlandığını belirtir.
    compatible_scale_length:
      name: Uyumlu skala uzunluğu
      description: Telin hangi gitar ölçek uzunluğu aralığı için tasarlandığını belirtir
        (ör. kısa ölçek, standart veya bariton).
    compatible_seat_airbag:
      name: Uyumlu koltuk hava yastığı
      description: Koltuğun yan hava yastığını destekleyip desteklemediğini/içerip
        içermediğini veya koltuğa monte hava yastığı donanımlı araçlarla uyumlu olup
        olmadığını belirtir.
    compatible_seating_capacity:
      name: Uyumlu koltuk kapasitesi
      description: Aksesuarın hangi koltuk sayısı veya konfigürasyonu ile uyumlu olacak
        şekilde tasarlandığını belirtir.
    compatible_sensor_port_type:
      name: Uyumlu sensör bağlantı noktası tipi
      description: Yağ karterinin yağ seviyesi ve/veya yağ sıcaklığı sensörlerini
        destekleyip desteklemediğini ve varsa bağlantı noktası modelini belirtir.
    compatible_shifter_type:
      name: Uyumlu vites kolu tipi
      description: Vites körüğünün hangi vites kolu tipine veya konfigürasyonuna uygun
        olarak tasarlandığını belirtir.
    compatible_shis:
      name: Uyumlu SHIS
      description: Parçanın uyumlu olduğu Standartlaştırılmış Kulaklık Tanımlama Sistemi
        (SHIS) kodlarını listeler (ör. IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Uyumlu paten disiplini
      description: Parçanın veya aksesuarın hangi paten disiplinine/disiplinlerine
        uygun tasarlandığını belirtir.
    compatible_snowshoe_deck_type:
      name: Uyumlu kar ayakkabısı platform tipi
      description: Bağlama sisteminin uyumlu olduğu kar ayakkabısı iskelet veya platform
        modelini belirtir.
    compatible_special_effects_lighting_features:
      name: Uyumlu özel efektli aydınlatma özellikleri
      description: Birimlerin birbirine bağlanabilmesi veya sese tepki verebilmesi
        gibi, efektli aydınlatmalar için satın alma kararını etkileyen (renk/desen
        dışındaki) yaygın özellikleri vurgular.
    compatible_spinning_wheel_drive_system:
      name: Uyumlu çıkrık tahrik sistemi
      description: Aksesuar desteklediği çıkrık tahrik sistemlerini belirtir.
    compatible_spoke_gauge:
      name: Uyumlu jant teli çapı
      description: Nipel dişlerinin uyumlu olduğu jant teli çapı ölçülerini belirterek
        kullanıcıların jant telleri ile nipelleri doğru şekilde eşleştirmesini sağlar.
    compatible_steering_wheel_airbag:
      name: Uyumlu direksiyon hava yastığı
      description: Direksiyon simidinin orijinal ekipman üreticisinin bir hava yastığı
        modülünü içermeye elverişli olup olmadığını (veya hava yastıksız uygulamalar
        için tasarlanıp tasarlanmadığını) belirtir.
    compatible_steering_wheel_control_button:
      name: Uyumlu direksiyon kumanda düğmesi
      description: Fabrika çıkışlı direksiyona monte kontroller (ses/seyir kontrol/telefon)
        ve ilgili kablolama sistemi ile uyumlu olup olmadığını belirtir.
    compatible_stencil_material:
      name: Uyumlu şablon malzemesi
      description: Makinenin kullanarak şablon oluşturabileceği veya işleyebileceği
        malzemeler (ör. kağıt, plastik film, mylar).
    compatible_stencil_media_format:
      name: Uyumlu şablon medya formatı
      description: 'Makinenin desteklediği şablon medya form faktörlerini gösterir:
        levhalar, rulolar veya her ikisi.'
    compatible_strap_retractor:
      name: Uyumlu kayış geri çekme mekanizması
      description: Kayışın geri çekilebilir sistemlerle uyumlu olup olmadığını veya
        geri çekilemeyen (statik) kemerler için tasarlanıp tasarlanmadığını belirtir.
    compatible_string_instrument_finish:
      name: Uyumlu telli çalgı kaplaması
      description: Cilanın hangi enstrüman yüzey türlerinde güvenle kullanılabileceğini
        belirtir.
    compatible_substrate_material:
      name: Uyumlu alt tabaka malzemesi
      description: Boyanın yapışmak üzere formüle edildiği yüzey malzemesi/malzemeleri.
    compatible_surface:
      name: Uyumlu yüzey
      description: Cırt cırtlı yapıştırıcının yapıştırılacağı yüzeyi/malzemeyi belirtir.
    compatible_surface_material:
      name: Uyumlu yüzey malzemesi
      description: Ürünün kullanılması amaçlanan araç yüzeyi malzemeleri.
    compatible_tear_off_system:
      name: Uyumlu tear-off sistemi
      description: Kopar-at (tear-off) filmler için montaj parçalarının mevcut olup
        olmaması dahil olmak üzere, gözlüğün kopar-at ve/veya rulo (roll-off) filmleri
        destekleyip desteklemediğini belirtir.
    compatible_thermostat_type:
      name: Uyumlu termostat tipi
      description: Su çıkışı gövdesinin termostata uygun şekilde tasarlanıp tasarlanmadığını
        ve varsa hangi tip/boyut termostatla uyumlu olduğunu belirtir.
    compatible_thread:
      name: Uyumlu iplik
      description: İplik geçiricinin (kalınlık/tip bakımından) hangi tür iplikleri
        geçirmek için tasarlandığını belirtir.
    compatible_thread_spool_format:
      name: Uyumlu iplik/makara biçimi
      description: Kutunun hangi iplik biçimlerini depolamak üzere tasarlandığını
        belirtir (makaralar, bobinler, nakış ipliği makaraları/kartları, koni makaralar
        vb.).
    compatible_thread_yarn_tool:
      name: Uyumlu iplik ve yün aracı
      description: Başka ekipmanlara monte edilen veya başka ekipmanlarla birlikte
        kullanılan araçlar için makine/sistem uyumluluğu (ör. dikiş makinesi, sürfile/overlok
        makinesi, dokuma tezgâhı, çıkrık).
    compatible_tire_application:
      name: Uyumlu lastik uygulaması
      description: Topuk düşürücünün kullanılması tasarlanan lastik/tekerlek uygulama
        segmenti (araç modeline değil servis uygulanan lastik/jant türüne bağlıdır).
    compatible_tom_pad_mounting:
      name: Uyumlu tom pedi montajı
      description: Elektronik tom pedinin bağlanacağı ögeyi belirtir (ör. kelepçe/çubuk
        montajı, L-çubuk veya stand montajı); mevcut raf sistemlerine uyup uymayacağını
        etkiler.
    compatible_toy_vehicle_scale:
      name: Uyumlu oyuncak araç ölçeği
      description: Oyun setinin uyumlu olduğu oyuncak araç ölçeğini veya yaklaşık
        araç boyutunu belirtir.
    compatible_tpms_sensor_type:
      name: Uyumlu TPMS sensör tipi
      description: Tekerleklerin TPMS sensörlerini ve/veya gerekli herhangi bir valf/sensör
        tipini destekleyip desteklemediğini belirtir.
    compatible_training_equipment:
      name: Uyumlu antrenman ekipmanı
      description: Montaj parçasına takılabilecek antrenman veya fitness ekipmanı
        türlerini listeler.
    compatible_treadmill_design:
      name: Uyumlu koşu bandı tasarımı
      description: Aksesuarın uyumlu olduğu koşu bandı tasarımını belirtir; ör. katlanabilir
        veya katlanmayan modeller.
    compatible_tube:
      name: Uyumlu tüp
      description: Yamanın hangi iç lastik veya dış lastik yapısı için tasarlandığını
        belirtir, ör. bütil, lateks, TPU veya iç lastiksiz.
    compatible_valve_type:
      name: Uyumlu valf tipi
      description: Yağlayıcının hangi pirinç enstrüman valf tipiyle uyumlu olduğunu
        belirtir.
    compatible_vaporizing_material:
      name: Uyumlu buharlaştırıcı malzeme
      description: Cihazın hangi malzeme türlerini buharlaştırmak üzere tasarlandığını
        belirtir.
    compatible_vehicle_windshield_fluid:
      name: Uyumlu araç ön cam sıvısı
      description: Araç ekipmanı veya cam uygulamalarıyla ilgili uyumluluk iddiaları
        (ör. yağmur itici kaplamalar için güvenli, far yıkama sistemleri için güvenli).
    compatible_visor_system:
      name: Uyumlu vizör sistemi
      description: Motosiklet kaskının hangi vizör/iç vizör sistemi tipleriyle uyumlu
        olduğunu gösterir.
    compatible_water_board_type:
      name: Uyumlu su boardu tipi
      description: Rafın taşımasının amaçlandığı su sporları tahtaları.
    compatible_water_sport_board_type:
      name: Uyumlu su sporları tahtası türü
      description: Rafın taşımak üzere tasarlandığı su sporları tahtaları türlerini
        listeler.
    compatible_watercraft_communication_standard:
      name: Uyumlu deniz aracı iletişim standardı
      description: Gemi/deniz araçlarındaki elektronik sistemlerle birlikte çalışabilirlik
        için desteklenen deniz haberleşme/ağ standartlarını veya entegrasyon protokollerini
        belirtir.
    compatible_watercraft_engine_type:
      name: Uyumlu deniz aracı motor tipi
      description: Parçanın uyumlu olduğu hedef güç aktarma organı konfigürasyonunu
        belirtir (dıştan takma/içten takma/arkadan tahrikli/jet tahrikli).
    compatible_weight_plate_diameter:
      name: Uyumlu ağırlık plakası çapı
      description: Makinenin hangi ağırlık plakası çaplarıyla uyumlu olduğunu belirtir.
    compatible_wheel_finish:
      name: Uyumlu jant yüzey kaplaması
      description: Temizleyicinin (üretici tarafından iddia edildiği üzere) hangi
        jant yüzey kaplamalarında/malzemelerinde güvenle kullanılabileceğini belirtir.
    compatible_whorl_drive_band_type:
      name: Uyumlu çıkrık makarası tahrik kayışı tipi
      description: Çıkrık makarasının hangi tahrik kayışı modeliyle çalışmasının amaçlandığını
        belirtir.
    compatible_wick_series:
      name: Uyumlu fitil serisi
      description: Satıcı tarafından belirtilmişse, sabitleme tabanının uyacağı yaygın
        fitil serisini/tiplerini (endüstri adlandırmasına göre) belirtir.
    compatible_winder_head_bit:
      name: Uyumlu sarma aparatı başlığı/ucu
      description: Sarma aparatının desteklediği burgulu akort anahtarı başlığı/bağlantı
        arabirimi tipini belirtir (ör. oluklu başlık, değiştirilebilir uçlar veya
        evrensel başlık).
    compatible_windlass_rode:
      name: Uyumlu ırgat halatı
      description: Irgatın hangi tip çıpa halatı ile kullanılmak üzere tasarlandığını
        belirtir.
    compatible_windshield_type:
      name: Uyumlu ön cam tipi
      description: Bu muhafazanın hangi ön cam modeliyle uyumlu olarak tasarlandığını
        belirtir.
    compatible_wood:
      name: Uyumlu ahşap
      description: Cilanın hangi klavye ahşap türlerinde önerildiğini/güvenle kullanılabileceğini
        belirtir.
    compatible_writing_surface:
      name: Uyumlu yazım yüzeyi
      description: Mürekkebin hangi yüzeylerde/kağıtlarda en iyi sonucu vermek üzere
        tasarlandığını belirtir.
    compatible_zipper_size:
      name: Uyumlu fermuar boyutu
      description: Çekme ucunun uyumlu olduğu fermuar boyutunu belirtir (genellikle
        no. 3, no. 5, no. 8, no. 10 gibi ifade edilir); böylece uyumluluk filtrelemesini
        iyileştirir.
    compliance_certification:
      name: Uygunluk sertifikası
      description: Tepe ışığının yol kullanımı ve elektromanyetik uyumluluk açısından
        karşıladığı uygunluk/onay standartları.
    component_position:
      name: Bileşen konumu
      description: Parçanın motor zamanlama tertibatı içindeki göreceli konumunu belirtir
        (ör. ön veya arka kapak, üstte veya altta). Aracın ön/arka yerleşimini belirtmez.
    concentration_level:
      name: Konsantrasyon seviyesi
      description: Domates salçasının yoğunluk derecesini (tek, çift, üçlü konsantre)
        belirtir; tarif gereksinimlerine uygun seçim yapmakta faydalıdır.
    concentration_type:
      name: Konsantre tipi
      description: Ürünün kullanıma hazır mı yoksa konsantre mi olduğunu ve (konsantre
        ise) tipik seyreltme talimatlarını belirtir.
    concert_bass_drum_mounting_stand_type:
      name: Konser bas davulu montaj standı tipi
      description: Konser bas davulunun performans sırasında nasıl desteklendiğini
        veya monte edildiğini belirtir.
    concert_pitch_standard:
      name: Konser perdesi standardı
      description: Piyanonun satış sırasında akort edildiği konser perdesi referansını
        (A4) belirtir (ör. A440, A442, A444).
    condiment_form:
      name: Çeşni formu
      description: Yaban turpu ürününün fiziksel formunu veya kıvamını belirtir (ör.
        macun, toz, krem).
    condiment_texture:
      name: Çeşni dokusu
      description: Sosun veya çutninin fiziksel kıvamını tanımlar (ör. taneli, pürüzsüz).
    confetti_format:
      name: Konfeti formatı
      description: Konfetinin paketlenme veya fırlatılma şekline göre ürün formatını
        belirtir (ör. serbest dökülen veya püskürtmeli/top patlatmalı sistemler).
    conga_head_tensioning_system:
      name: Conga davul başlığı gerdirme sistemi
      description: Conga derisini germek/akortlamak için kullanılan donanım türünü
        belirtir (ör. geleneksel gergi kulağı veya modern hızlı akort mekanizmaları).
    conga_set_included_drum_types:
      name: Conga setine dâhil davul türleri
      description: Conga setine dâhil conga türleri (ör. quinto + conga + tumba).
    connector_case_style:
      name: Konektör kutusu stili
      description: Konektör kutusunun genel yapı stilini (ör. sert kabuklu veya yumuşak
        kılıflı) sınıflandırarak koruma seviyesi ve taşınabilirlik hakkında bilgi
        verir.
    console_cover_installation_method:
      name: Konsol kapağı montaj yöntemi
      description: Konsol kapağının konsola/kol dayanağına nasıl takılacağını belirtir
        (ör. geçmeli, elastik kayışlar, cırt cırtlı, yapışkanlı, klipsli).
    console_display_type:
      name: Konsol ekran türü
      description: Makinede sunulan kullanıcı ekranı stilini tanımlar (ör. LCD, LED,
        dokunmatik ekran).
    construction_design:
      name: Yapı tasarımı
      description: Pedin kaç adet eklemli parçadan oluştuğunu ve dolayısıyla hareket
        edebilirliği nasıl etkilediğini belirtir (ör. 1 parçalı veya 3 parçalı).
    contact_angle:
      name: Temas açısı
      description: Rulman bileziklerinin temas açısını belirtir; tek açı veya çift
        açı seti halinde (ör. 36°/45°) ifade edilir.
    contact_juggling_ball_fill_type:
      name: Kontakt jonglaj topunun iç dolgu türü
      description: Topun içinin dolu mu yoksa dolgu malzemeli mi olduğunu (ve dolgu
        varsa türünü) belirtir; ağırlık dağılımını ve dayanıklılığı etkiler.
    contact_juggling_ball_transparency:
      name: Kontakt jonglaj topunun şeffaflığı
      description: Topun şeffaflığını/optik görünümünü belirtir.
    contact_surface_material:
      name: Temas yüzeyi malzemesi
      description: Çizilmeyi önlemek ve daha iyi kavranmasını sağlamak için enstrümanla
        temas eden temas noktalarında hangi malzemenin kullanıldığını (ör. mantar/kauçuk)
        tanımlar.
    container_material:
      name: Kap malzemesi
      description: Ürünün perakende kabının temel malzemesini belirtir (ör. cam, PET
        plastik, alüminyum).
    contaminant_removal:
      name: Kirleticileri giderme
      description: Ürünün giderme veya azaltma konusunda sertifikalı olduğu kirletici
        madde sınıflarını listeler.
    contra_alto_clarinet_body_configuration:
      name: Kontra-alto klarnet gövde yapısı
      description: Kontra-alto klarnetin fiziksel yapısal formunu (örneğin düz veya
        katlanmış tasarım) tanımlar.
    contra_alto_clarinet_lowest_note_extension:
      name: Kontra-alto klarnetin en düşük nota uzantısı
      description: Enstrümanın çalınabilir en düşük nota uzantısını (mekanizmanın
        izin verdiği en düşük nota) belirtir; genellikle düşük E♭, düşük D veya düşük
        C modellerini ayırt etmek için kullanılır.
    contra_bass_clarinet_bell_type:
      name: Kontrbas klarnet zil tipi
      description: Kontrbas klarnette kullanılan zil konfigürasyonu.
    contra_bass_clarinet_bore_type:
      name: Kontrbas klarnet iç delik tipi
      description: Enstrümanın iç delik tasarımı.
    contra_bass_clarinet_lowest_written_note:
      name: Kontrbas klarnetin en düşük yazılı notası
      description: Enstrümanın çalabildiği en düşük yazılı nota (genellikle düşük
        C veya düşük Eb uzantısına bağlıdır).
    control_arm_bushing_material:
      name: Salıncak kolu burç malzemesi
      description: Varsa, dâhil/takılı burçların malzemesini belirtir.
    control_arm_bushings_included:
      name: Dâhil salıncak kolu burçları
      description: Salıncak kolunun burçlar takılı şekilde gönderilip gönderilmediğini
        belirtir.
    control_arm_finish:
      name: Salıncak kolu yüzey kaplaması
      description: Salıncak koluna uygulanan koruyucu yüzeyi belirtir (korozyona karşı
        koruma ve görünüm amacıyla).
    control_arm_grease_fitting_type:
      name: Salıncak kolu gresörlük tipi
      description: Salıncak kolu/rotil tertibatının gresörlük (zerk) içerip içermediğini
        ve servis uygulanabilir olup olmadığını belirtir.
    control_arm_material:
      name: Salıncak kolu malzemesi
      description: Salıncak kolu gövdesinin ana malzemesini ve imalat yapısını belirtir.
    control_arm_position:
      name: Salıncak kolunun konumu
      description: Aks köşesi/yan konumu bağlamında, salıncak kolunun süspansiyon
        sistemi içinde hangi konum için tasarlandığını belirtir (ör. üst/alt, ön/arka,
        sol/sağ).
    control_arm_style:
      name: Salıncak kolu stili
      description: Süspansiyon düzeninde kullanılan salıncak kolunun geometrik/tasarım
        stilini tanımlar.
    control_cable_connector_type:
      name: Kontrol kablosu bağlantı tipi
      description: Kontrol kablolarının kontrol mekanizması ve motorla bağlantı kurmak
        için kullandığı uç/bağlantı tipini belirtir (ör. orijinal ekipman üreticisine
        özgü uç bağlantı parçaları).
    control_voltage_or_gate_connectivity:
      name: Kontrol gerilimi veya gate bağlantı uyumluluğu
      description: Modüler/analog ekipmanlarla entegrasyon için kontrol voltajı/gate
        bağlantı desteğini belirtir.
    controller_function:
      name: Kontrolcü işlevi
      description: Koşu bandı kontrol kartının temel işlevini tanımlar; ör. motor
        kontrolü, güç kaynağı veya invertör sürücü.
    controller_type:
      name: Kontrolcü tipi
      description: Uyumluluk ve performans bakımından önemli kontrol cihazı özelliklerine
        odaklanarak Scooter EV dönüşüm kitinde yer alan (veya kullanım için gerekli
        olan) motor kontrol cihazını/kontrol sistemini belirtir.
    conversion_kit_cooling_method:
      name: Dönüşüm kiti soğutma yöntemi
      description: Motor/invertör/batarya entegrasyonu için kullanılan temel termal
        yönetim yaklaşımı.
    conversion_kit_installation_complexity:
      name: Dönüşüm kiti kurulum karmaşıklığı
      description: Tipik müşteri ihtiyaçlarına/gerekli araçlara göre kurulum için
        öngörülen çaba düzeyi.
    converted_bed_size:
      name: Dönüştürülmüş yatak boyutu
      description: Bu kit takıldığında beşiğin dönüştürüleceği yatak boyutunu veya
        konfigürasyonunu belirtir.
    convertible_configuration:
      name: Dönüştürülebilir konfigürasyon
      description: Ürünün kaç farklı yatak konfigürasyonuna dönüştürülebildiğini belirtir
        (ör. 3'ü 1 arada beşik → küçük çocuk yatağı → uzanma yatağı).
    convertible_high_chair_modes:
      name: Dönüştürülebilir mama sandalyesi modları
      description: Sandalyenin dönüştürülebileceği oturma konfigürasyonlarını belirtir.
    cookie_decorating_kit_items_included:
      name: Dâhil kurabiye süsleme kiti ögeleri
      description: Müşterilerin kutuda hangi malzemelerin bulunduğunu tam olarak öğrenebilmeleri
        için, birlikte gönderilen her bir süsleme bileşenini listeler (ör. krema uçları/tüpleri,
        renkli şekerlemeler, kurabiye kalıpları).
    cookie_variety:
      name: Kurabiye çeşitleri
      description: Alıcıların tercih ettikleri türü hızlıca bulabilmeleri için kurabiyenin
        stilini veya çeşidini tanımlar.
    cooking_state:
      name: Pişirme durumu
      description: Satış anında tavuk ürününün hazır olma düzeyini belirtir (çiğ,
        tamamen pişmiş, marine edilmiş vb.).
    coolant_additive_purpose:
      name: Soğutma sıvısı katkı maddesinin amacı
      description: Soğutma sıvısı katkı maddesinin temel kullanım amacı (radyatör
        temizleme ürünü veya özel sızdırmazlık sağlayıcılar hariç).
    coolant_base_fluid:
      name: Soğutma sıvısı baz sıvısı
      description: Antifriz/soğutma sıvısı formülasyonunda kullanılan birincil glikol
        bazını tanımlar.
    coolant_outlet_connection_style:
      name: Soğutma sıvısı çıkış bağlantı tipi
      description: Radyatör hortumu veya soğutma sıvısı hattını takmak için kullanılan
        çıkış bağlantı arabirimi tipi.
    coolant_outlet_neck_angle:
      name: Soğutma sıvısı çıkış boynu açısı
      description: Su çıkış boynunun montaj flanşına/motora göre açısını/yönünü belirtir
        (üst radyatör hortumunun yönlendirilmesi için faydalıdır).
    coolant_technology:
      name: Soğutma sıvısı teknolojisi
      description: Antifrizin/soğutma sıvısının kullandığı soğutma sıvısı kimya/teknoloji
        ailesini belirtir (genellikle ambalajdaki etikette yer aldığı gibi).
    coolant_temperature_sensor_port:
      name: Soğutma sıvısı sıcaklık sensörü portu
      description: Su boynunda soğutma sıvısı sıcaklık sensörü için bir bağlantı noktası
        veya anahtar olup olmadığı ve hangi arabirimi kullandığı.
    coolant_temperature_sensor_seal_type:
      name: Soğutma sıvısı sıcaklık sensörü conta tipi
      description: Sensör ile motor/soğutma sıvısı kanalı arasında kullanılan sızdırmazlık
        yönteminin türü.
    cooling_system_component_included:
      name: Dâhil soğutma sistemi bileşeni
      description: Su pompasıyla birlikte verilen ek soğutma sistemi bileşenlerini
        listeler.
    cooling_system_flush_application_step:
      name: Soğutma sistemi yıkama uygulama adımı
      description: Ürünün servis sürecindeki yerini belirtir (ör. ön yıkama temizleyicisi
        veya son durulama/nötralizasyon ürünü).
    cooling_system_type:
      name: Soğutma sistemi tipi
      description: İçten takmalı deniz motorunun kullandığı soğutma sistemi konfigürasyonunu
        belirtir (ör. ham su/açık devre, kapalı devre/ısı eşanjörlü tatlı su, omurga
        soğutmalı).
    cord_material:
      name: Kordon malzemesi
      description: Temizleme çubuğunu saksafonun içinden geçirmek için kullanılan
        ipin/şeridin malzemesini belirtir.
    core_type_bass_strings:
      name: Çekirdek tipi (bas telleri)
      description: Hissiyatı ve esnekliği etkileyen telin çekirdek yapısını/şeklini
        belirtir.
    cork_grease_base_material:
      name: Mantar yağı bazlı malzeme
      description: Mantar yağı formülasyonunun temel bazı (ör. lanolin bazlı).
    cork_grease_form:
      name: Mantar yağı formu
      description: Mantar yağı ürününün fiziksel şekil faktörü.
    corn_presentation:
      name: Mısır sunumu
      description: Mısır ürününün fiziksel sunumunu veya formunu belirtir (ör. kabuklu
        bütün, tane, toz).
    corn_syrup_variety:
      name: Mısır şurubu çeşidi
      description: Şurubun özel üretim tarzını veya işleme yöntemini belirtir.
    corn_variety:
      name: Mısır çeşidi
      description: Satılan mısırın botanik veya ticari çeşidini belirterek alıcıların
        tat, doku, renk ve mutfaktaki kullanım amaçları bakımından farklılık gösteren
        türler arasında ayrım yapmasını sağlar.
    corner_compatibility:
      name: Köşe uyumluluğu
      description: Örtünün hangi masa köşesi şekli (kare veya yuvarlak) için tasarlandığını
        belirtir.
    corner_flag_features:
      name: Köşe bayrağı özellikleri
      description: Köşe bayrağının özel fonksiyonel özelliklerini veya geliştirilmiş
        niteliklerini vurgular (ör. katlanabilir direk, yansıtıcı malzeme).
    cornet_mouthpiece_shank_type:
      name: Kornet ağızlığı şaft tipi
      description: Kornetin uyumluluk açısından desteklediği ağızlık yuvası/şaft standardını
        belirtir.
    cornhole_league_certification:
      name: Cornhole ligi sertifikası
      description: Ürün için geçerli resmi sertifikaları veya lig onaylarını belirtir.
    corrosion_resistance:
      name: Korozyona dayanıklı
      description: Montaj aparatının/tutucunun dış mekan kullanımına yönelik korozyon
        direnci kaplamasını veya derecesini belirtir.
    corrosion_resistance_level:
      name: Korozyon dayanım seviyesi
      description: Tatlı su/tuzlu su ortamları için uygun korozyon korumasını gösterir.
    costume_components_included:
      name: Dâhil kostüm bileşenleri
      description: Kostümle birlikte verilen kıyafet parçalarını ve aksesuarlarını
        listeleyerek set içeriğini netleştirir.
    cotton_weave_type:
      name: Pamuklu dokuma türü
      description: Basılabilir pamuklu yüzeyin dokusunu ve baskı netliğini etkileyen
        dokuma/örgü yapısını tanımlar.
    counter_type:
      name: Sayaç tipi
      description: Dahili tekrar veya kuvvet takibi özelliğinin varlığını ve stilini
        belirtir.
    counterweight_fill_material:
      name: Karşı ağırlık dolgu malzemesi
      description: Karşı ağırlığa denge sağlamak veya ön dolum yapmak amacıyla kullanılabilecek
        maddeyi belirtir.
    counterweight_type:
      name: Karşı ağırlık tipi
      description: Uyumluluğu ve montajı kolaylaştırmak için karşı ağırlığın tasarım
        veya yapı stilini (ör. kum torbası veya çelik levha) belirtir.
    coupler_system:
      name: Kuplör sistemi
      description: Vagon uyumluluğu için model lokomotife takılan kuplör tipini veya
        sistemini belirtir.
    court_surface_suitability:
      name: Saha yüzeyi uygunluğu
      description: Ayakkabı dış tabanının hangi basketbol saha zemini için tasarlandığını
        belirterek alıcıların kapalı ahşap zeminli sahalar, açık hava asfalt/beton
        sahalar veya her ikisi için doğru zemin tutuşunu ve dayanıklılığı seçmesine
        yardımcı olur.
    cover_fit_style:
      name: Kılıf oturma stili
      description: Örtünün masayı kaplayarak görünüşü ve koruma düzeyini nasıl etkilediğini
        açıklar.
    cover_fit_type:
      name: Örtünün oturma tipi
      description: Örtünün özel kesim mi (özel/yarı özel) yoksa evrensel mi olduğunu
        ve suda bağlama amacıyla mı yoksa depolama/römork kullanımı için mi tasarlandığını
        belirtir.
    cowbell_beater_type:
      name: Cowbell tokmağı tipi
      description: Cowbell (çan) sesi/yüzey kaplaması için önerilen tokmak tipi (ürünle
        belirtilmişse).
    cowbell_mounting_method:
      name: Cowbell montaj yöntemi
      description: Çanın nasıl takılacağı/kullanılacağı (elde veya enstrümana monte).
    cowbell_sound_character:
      name: Cowbell ses karakteri
      description: Liste kaydında kullanılan genel ton karakteri (boyutun ötesinde
        ürün keşfi sağlamayı destekler).
    cradle_capacity:
      name: Beşik kapasitesi
      description: Beşiğin tek bir bebek mi yoksa ikizler için mi tasarlandığını belirtir.
    craft_cutter_embosser_machine_operation:
      name: El işi kesici/kabartma makinesinin çalışması
      description: Kullanıcının iş akışı açısından kesicinin/kabartma makinesinin
        nasıl çalıştığını beliritr (ör. manuel kol, elektrikli basma düğmesi, uygulama
        kontrollü).
    craft_decoration_maker_accessories_included:
      name: Dâhil el işi dekorasyon üreticisi aksesuarları
      description: El işi dekorasyon üreticisine dâhil olan temel aksesuarları listeler
        (ör. başlangıç bandı/filmi, yedek çıkartmalar, sim kartuşları, temizleme araçları).
    craft_foil_application_method:
      name: El işi folyosu uygulama yöntemi
      description: El işi folyosunun nasıl uygulanacağını/etkinleştirileceğini tanımlar
        (yapıştırıcı, ısı, toner/reaktif vb. yoluyla).
    craft_foil_format:
      name: El işi yaldız folyosu biçimi
      description: El işi folyosunun satıldığı fiziksel biçimi belirtir (ör. rulo
        veya yapraklar halinde).
    craft_glue_finish:
      name: Hobi tutkalı bitiş efekti
      description: Kuruduktan sonra tutkalın nasıl görüneceğini açıklar (ör. şeffaf,
        beyaz/opak, yarı saydam, parlak/mat).
    craft_magnet_application:
      name: Hobi mıknatısı uygulama alanı
      description: Mıknatıs ürünü için amaçlanan birincil hobi kullanım alanı veya
        montaj yüzeyi.
    craft_magnet_holding_strength_level:
      name: Hobi mıknatısı tutma gücü düzeyi
      description: Alıcıların projelerine uygun tutma gücüne sahip hobi mıknatıslarını
        seçebilmeleri için bağıl güç kategorisi.
    craft_organizer_storage_features:
      name: Hobi organizeri depolama özellikleri
      description: Hobi organizerlerinin düzenleme özelliklerini ve dahili depolama
        unsurlarını açıklar (ör. ayarlanabilir ayırıcılar, çekmeceler, şeffaf cepler).
    craft_scoring_board_included_accessories:
      name: El işi skor tahtasına dâhil aksesuarlar
      description: Skor tahtası ile birlikte gelen aksesuarları belirtir (ör. katlama
        kemiği/kalemi, cetvel gönye, zarf yapma aparatı).
    craft_scoring_board_measurement_system:
      name: El iş skor tahtası ölçü sistemi
      description: Skor tahtasında işaretli ölçü sistemini belirtir (inç, metrik,
        çift ölçülü veya işaretsiz).
    craft_wire_finish_coating:
      name: El işi teli bitiş yüzeyi/kaplaması
      description: Renk, kararma direnci veya koruma sağlamak amacıyla tele uygulanan
        yüzey bitişini veya kaplamasını belirtir.
    craft_wood_surface_preparation:
      name: El işi ahşap yüzey hazırlığı
      description: Ahşap yüzeyin son kat boyaya/cilaya hazır olup olmadığını veya
        ön hazırlık (ör. zımparalama veya astarlama) gerektirip gerektirmediğini belirtir.
    crank_spindle_interface:
      name: Aynakol mil arabirimi
      description: Aynakol ve orta göbek arasındaki uyumluluğu sağlamak adına, orta
        göbeğin desteklediği aynakol mil sistemini belirtir (ör. SRAM DUB, Kare Mil).
    crankshaft_balance_type:
      name: Krank mili dengeleme tipi
      description: Krank milinin içten dengeli mi (nötr) yoksa dıştan dengeli mi (titreşim
        sönümleyici/volan ağırlıkları gerektiren) olduğunu belirtir.
    crankshaft_bolt_pattern:
      name: Krank mili cıvata düzeni
      description: Volan/esnek plaka bağlantısı için arka flanş üzerindeki cıvata
        düzeni.
    crankshaft_sensor_reluctor_type:
      name: Krank mili sensörü sinyal diski tipi
      description: Krank mili pozisyon sensörünün kullandığı tetikleyici/sinyal diski
        konfigürasyonu (geçerli olduğu yerlerde).
    craps_accessories_included:
      name: Dahil edilen craps aksesuarları
      description: Zarlar/çipler/oyun alanı haricinde, ürüne dâhil olan ekstra barbut
        aksesuarlarını tanımlar.
    crash_cymbal_profile:
      name: Crash zil profili
      description: Zilin, perde ve tepkiselliğini etkileyen genel kavisi/profili (kavis
        bölgesinin ne kadar belirgin olduğu).
    crash_cymbal_sound_character:
      name: Crash zil ses karakteri
      description: Crash zil sesi için birincil tonal karakter tanımlayıcılar.
    crash_pad_size_class:
      name: Düşüş minderi boyut sınıfı
      description: Tırmanış minderinin genel boyut kategorisini belirterek alıcıların
        tam ölçülere ihtiyaç duymadan yüzey kapsama alanı hakkında hızlıca fikir edinmesini
        sağlar.
    crate_engine_assembly_level:
      name: Sandık motor montaj seviyesi
      description: Sandık motorun gönderim sırasındaki tamamlanma seviyesi (hangi
        ana bileşenlerin dâhil olduğu).
    cream_base_ingredient:
      name: Krema bazı içeriği
      description: Hem hayvansal süt türlerini hem de bitki bazlı alternatifleri kapsayacak
        şekilde kremanın ana kaynağını belirtir.
    cream_cheese_base:
      name: Krem peynir bazı
      description: Krema peynirinin yapımında kullanılan başlıca süt veya bitki bazlı
        kaynağı belirterek alıcıların beslenme, alerjen ve lezzet hususlarını dikkate
        almalarına yardımcı olur.
    cream_cheese_form:
      name: Krem peynir biçimi
      description: Krem peynirin, sürülebilirlik ve kullanım amacını etkileyen fiziksel
        biçimi ve doku tipini açıklar (ör. kalıp, çırpılmış, dip sos).
    cream_variety:
      name: Krema çeşidi
      description: Kremanın yağ oranına, işlenme şekline veya mutfaktaki kullanım
        amacına göre belirlenen özel türünü tanımlar (ör. yarı yarıya süt-krema karışımı,
        yoğun krema, yemek kreması).
    crib_accessory_features:
      name: Beşik aksesuarı özellikleri
      description: Bebek karyolası ve küçük çocuk yatak aksesuarlarına özgü, nefes
        alabilirlik veya elastik kenarlar gibi işlevsel ya da konfor odaklı özellikleri
        listeler.
    crib_bumper_features:
      name: Bebek karyolası yan koruma yastığı özellikleri
      description: Beşik koruyucusunun özel işlevsel özelliklerini belirtir.
    crib_conversion_kit_components:
      name: Beşik dönüştürme kiti bileşenleri
      description: Alıcıların kurulum için ihtiyaç duydukları her şeye sahip olup
        olmadıklarını doğrulayabilmeleri için kite dâhil olan ana parçaları listeler.
    cricket_ball_grade:
      name: Kriket topu sınıfı
      description: Topun kalite seviyesini veya hedeflenen oyun standardını belirtir.
    cricket_ball_piece_construction:
      name: Kriket topu parça yapısı
      description: Topun dış kabuğunu oluşturmak için kullanılan, kalite ve fiyatın
        temel bir göstergesi olan dış parça veya kalıplanmış bölme sayısını belirtir.
    cricket_ball_type:
      name: Kriket topu tipi
      description: Ürünle birlikte temin edilen kriket topu tipini veya hiçbir topun
        dâhil olmadığını belirtir.
    cricket_bat_accessory_type:
      name: Kriket sopası aksesuarı türü
      description: Alıcının ihtiyaç duyduğu ürünü hızlıca filtreleyebilmesi için kriket
        sopası aksesuarı veya bakım ürününün türünü belirtir.
    cricket_bat_size:
      name: Kriket sopası boyutu
      description: Kriket sopasının oyuncu yaşı ve boyuna göre seçilen standart boyut
        sınıflandırmasını (0–6, Harrow, SH, LH) belirtir.
    cricket_bat_size_compatibility:
      name: Kriket sopası boyut uyumluluğu
      description: Aksesuarın uyacağı sopa boyutlarını listeleyerek doğru uyumun yakalanmasını
        sağlar.
    cricket_helmet_role:
      name: Kriket kaskının rolü
      description: Kaskın oyunda hangi rol için tasarlandığını belirtir, ör. vurucu
        veya kale bekçisi.
    cricket_leg_guard_type:
      name: Kriket bacak koruyucusu tipi
      description: Kriket sporunda kullanılan özel bacak koruyucusu stilini belirtir.
    cricket_player_role:
      name: Kriket oyuncusunun rolü
      description: Kaskın oyunda temel olarak hangi rol için tasarlandığını belirtir.
    cricket_protection_grade:
      name: Kriket koruma derecesi
      description: Kriket ekipmanı üreticileri tarafından atanan koruma derecesi sınıflandırmasını
        belirtir.
    cricket_stump_base_type:
      name: Kriket wicket taban tipi
      description: Zemin dengesini ve oyun yüzeyine uygunluğu etkileyen, kale direkleriyle
        birlikte verilen tabanın tarzını veya malzemesini belirtir.
    cricket_stump_target_features:
      name: Kriket kalesi direği hedef özellikleri
      description: Antrenmanda kullanım kolaylığını, görünürlüğü, dayanıklılığı veya
        dengeyi artıran belirgin fonksiyonel özellikleri vurgular.
    cricket_stump_type:
      name: Kriket kalesi direği tipi
      description: Alıcıların geleneksel maç kale direkleri, antrenman çeşitleri veya
        modern aydınlatmalı modeller arasında seçim yapmalarına yardımcı olmak için
        kale direklerinin tarzını veya yapısını kategorize eder.
    cricket_training_focus:
      name: Kriket antrenman odağı
      description: Antrenman ekipmanının geliştirmek için tasarlandığı temel kriket
        yeteneği veya disiplini.
    croquet_set_components_included:
      name: Kroket setine dahil edilen bileşenler
      description: Alıcıların tam olarak ne satın aldıklarını anlamaları için setle
        birlikte temin edilen tüm temel bileşenleri listeler (ör. kriket kaleleri,
        sabitleme kazıkları, taşıma çantası).
    cross_country_binding_system:
      name: Kros kayağı bağlama sistemi
      description: Ürünün delindiği veya uyumlu çalıştığı kros kayağı bağlama standardını
        belirtir.
    cross_stitch_chart_symbol_type:
      name: Kanaviçe şeması sembol türü
      description: Şemanın temsil biçimi (semboller, renkler veya her ikisi).
    cross_stitch_finishing_type:
      name: Kanaviçe bitirme türü
      description: İşlenen proje için amaçlanan bitirme/sergi türü.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Kanaviçe kasnağı kumaş tutma mekanizması
      description: Kullanım kolaylığını ve kumaş uyumunu etkileyen, kumaşın kasnağa
        sabitlenme/gerilme yöntemini belirtir (ör. klipsler, kelepçeler, raptiyeler).
    cross_stitch_frame_included_components:
      name: Kanaviçe kasnağına dâhil bileşenler
      description: Kutuya dahil olarak gönderilenleri (ör. yalnızca kasnak veya kasnak
        + kelepçeler + stand) listeleyerek kafa karışıklığının ve iadelerin önüne
        geçer.
    cross_stitch_frame_type:
      name: Kanaviçe kasnağı tipi
      description: Kullanım ve proje uyumunu etkileyen, kanaviçe kasnağı yapısını/tipini
        (kumaşın tutulma biçimini) belirtir.
    cross_stitch_pattern_technique:
      name: Kanaviçe desen tekniği
      description: Şemaya göre gereken kanaviçe tekniği/stili.
    crossbar_shape_profile:
      name: Ara atkı şekli/profili
      description: Ara atkı aerodinamik/profil şeklini belirtir.
    crossbar_style:
      name: Üst çıta stili
      description: Üst çıtanın yapı tarzını belirterek esnemeyen müsabaka çıtalarını,
        esnek veya hibrit antrenman çıtalarından ayırır.
    crossbow_type:
      name: Arbalet tipi
      description: Arbaletin temel tasarım stilini tanımlar, ör. makaralı, ters kavisli
        veya tabanca tipi. Yapı stili performans, boyut ve kullanım durumlarını belirlediğinden
        alıcılar sıklıkla buna göre filtreleme yapar.
    crossover_component_type:
      name: Crossover bileşen tipi
      description: Pasif crossover (ses frekans bölücü) devresinde kullanılan temel
        bileşen topolojisini tanımlar.
    crossover_configuration:
      name: Crossover konfigürasyonu
      description: Crossover'ın tek bir geçiş noktası mı yoksa birden fazla geçiş
        noktası mı kullandığını belirtir (ör. 2 yollu veya 3 yollu tasarımlar).
    crossover_type:
      name: Crossover tipi
      description: Bileşen setine dâhil olan crossover devresi tipi.
    crown_profile:
      name: Tepe profili
      description: Şapkanın siperlik üzerindeki tepe kısmının yüksekliğini veya profilini
        belirtir.
    crown_style:
      name: Tepe stili
      description: Melon şapkanın tepe kısmının genel silüetini veya profilini tanımlar.
    crust_taste_profile:
      name: Taban hamuru tat profili
      description: Taban hamurunun kendine özgü lezzet yöneliminin tatlı mı, tuzlu
        mu yoksa nötr mü olduğunu belirtir.
    crystal_finish:
      name: Kristalin yüzey bitişi
      description: İşlenmemiş kristalin yüzey bitişini, kaplamasını veya işlenme durumunu
        tanımlar (ör. ham, cilalı, tamburlanmış, fasetli/kesimli, buzlu, aura kaplama,
        boyalı, ısı işlem görmüş).
    crystal_material:
      name: Cam malzemesi
      description: Kadranı koruyan saat camı için kullanılan malzemeyi belirtir.
    crystalline_finish_style:
      name: Kristalize yüzey stili
      description: Hazır mumlarda palmiye mumunun ürettiği karakteristik kristalize/tüysü
        görünümü ifade eder.
    cucumber_variety:
      name: Salatalık çeşidi
      description: Salatalığın kültivarını veya ticari türünü belirtir (ör. İngiliz
        salatalığı, İran salatalığı, Kirby).
    cue_compatibility:
      name: İsteka uyumluluğu
      description: Çantanın hangi isteka bağlantı yapısına uygun tasarlandığını belirtir;
        ör. tek parça veya 3/4 ek yerli istekalar.
    cue_construction:
      name: İsteka gövde yapısı
      description: Istakanın, taşınabilirliği ve uyumluluğu etkileyen yapı özelliklerini
        (ör. parça sayısı veya yalnızca dip ya da yalnızca şaft gibi kısmi bir bileşen
        olup olmadığını) belirtir.
    cue_head_material:
      name: İsteka başlık malzemesi
      description: Istaka başlığının (pak ile temas eden kısmın), dayanıklılığı ve
        yüzey korumasını etkileyen malzemesini belirtir.
    cue_sport_compatibility:
      name: İsteka sporu uyumluluğu
      description: Aksesuarın hangi isteka sporu için tasarlandığını belirtir.
    cue_thread_size:
      name: İsteka vida diş ölçüsü
      description: Aksesuarların tam oturmasını sağlamak amacıyla; uzatmalarda, bağlantı
        koruyucularda, ağırlık cıvatalarında ve diğer isteka aksesuarlarında kullanılan
        vida dişi özelliklerini belirtir.
    cue_tip_hardness:
      name: İsteka ucunun sertliği
      description: Beyaz top kontrolünü ve vuruş hissiyatını etkileyen isteka ucu
        sertlik derecesini gösterir.
    cuff_height:
      name: Konç yüksekliği
      description: Botun, desteği ve esnekliği etkileyen konç yüksekliğini (düşük,
        orta, yüksek, çıkarılabilir/ayarlanabilir) belirtir.
    cuff_position:
      name: Bant pozisyonu
      description: Leash bandının sporcunun vücudunda nereye takılmak üzere tasarlandığını
        belirtir.
    cultivation_method:
      name: Yetiştirme yöntemi
      description: Üretim tekniklerini ve tarım uygulamalarını kapsayacak şekilde
        yeşilliklerin nasıl yetiştirildiğini belirtir.
    cup_type:
      name: Çukur tipi
      description: Payetin, parıltıyı, dokuyu ve dikildiğinde ya da yapıştırıldığında
        nasıl durduğunu etkileyen yüzey profilini (düz veya çukur) ve çukur derinliğini
        belirtir.
    cupcake_size:
      name: Cupcake boyutu
      description: Satılan cupcake'lerin fiziksel boyut kategorisini belirtir (ör.
        mini, standart, jumbo).
    curd_size:
      name: Tane boyutu
      description: Çökelek tanelerinin boyutunu veya dokusunu belirtir.
    cure_method:
      name: Kürleme yöntemi
      description: Yapıştırıcının donması veya kürlenmesi için gereken süreci tanımlar
        (ör. UV ışığı, hava nemi, ısı).
    curing_or_preparation_method:
      name: Olgunlaştırma veya hazırlama yöntemi
      description: Zeytinlerin nasıl olgunlaştırıldığını veya işlendiğini belirtir
        (ör. salamura, yağda olgunlaştırılmış, ızgara).
    curling_broom_head_material:
      name: Körling süpürge başlığı malzemesi
      description: Süpürge başlığının veya pedinin temel malzeme bileşimini belirtir.
    curling_broom_head_type:
      name: Körling süpürge başlığı tipi
      description: Süpürge başlığının/pedinin stilini veya yapısını belirtir.
    curling_shoe_slider_material:
      name: Körling ayakkabısı kaydırıcı malzemesi
      description: Körling ayakkabılarında kullanılan kaygan tabanın ana malzemesini
        belirtir.
    curling_training_aid_type:
      name: Curling antrenman ekipmanı türü
      description: Kullanılan körling antrenman ekipmanının türünü belirtir.
    curry_variety:
      name: Köri çeşidi
      description: Körili sos ürünlerini; Tikka Masala, Massaman veya yeşil Tay körisi
        gibi yapılması hedeflenen özel köri tarzına veya tarifine göre sınıflandırarak
        net bir lezzet/tarz filtresi sunar.
    cushion_rubber_profile:
      name: Yastık kauçuk profili
      description: Bant lastiği kauçuk parçalarının şekil veya profil kodu.
    cushioning_level:
      name: Yastıklama seviyesi
      description: Çorabın darbe koruması ve konfor sağlamak amacıyla sunduğu taban
        altı dolgu miktarını belirtir.
    custom_label_content_type:
      name: Özel etiket içerik türü
      description: Dikilebilir etikette hangi bilgilerin kişiselleştirildiğini belirtir
        (ör. isim, logo, mesaj, beden, bakım sembolleri, iletişim bilgileri).
    customization_type:
      name: Kişiselleştirme türü
      description: Formanın baskısız mı, oyuncuya özel üretilmiş mi veya kişiselleştirilmiş
        isim/numara içeren özel yapım mı olduğunu belirtir.
    cut_or_preparation_style:
      name: Kesim veya hazırlık stili
      description: Sebze parçalarının konserve veya kavanoz içinde nasıl kesildiğini
        ya da hazırlandığını belirtir (ör. bütün, küp doğranmış, dilim/şerit).
    cut_resistance_rating:
      name: Kesilme direnci derecesi
      description: Ürünün resmi olarak test edilmiş kesilme direnci seviyesini belirtir.
    cut_type:
      name: Kesim tipi
      description: Kumaşın metre/yarda ile mi, kesilmiş parça olarak mı yoksa rulo/top
        halinde mi satıldığını belirtir.
    cutting_application:
      name: Kesim uygulaması
      description: Makasın kullanılacağı temel kesimi belirtir.
    cutting_mat_grid_style:
      name: Kesme matı ızgara stili
      description: Mat yüzeyindeki baskılı kılavuz stili.
    cutting_mat_intended_use:
      name: Kesme matının kullanım amacı
      description: Kesim matının hangi temel el işi/çalışma yüzeyi kullanım durumu
        için tasarlandığını belirtir.
    cv_boot_clamp_type:
      name: Aks körüğü kelepçe tipi
      description: Aks körüğünü sabitlemek için kullanılan kelepçe/şerit stilini belirtir.
    cv_boot_kit_contents:
      name: Aks körüğü kit içeriği
      description: Aks körüğüne dâhil ögeleri listeler (ör. kelepçeler, gres yağı
        paketi, sabitleme şeritleri).
    cv_boot_material:
      name: Aks körüğü malzemesi
      description: Aks körüğünün ana yapı malzemesini belirtir.
    cv_boot_position:
      name: Aks körüğünün konumu
      description: Aks körüğünün, aks mili üzerindeki iç mi (şanzıman tarafı) yoksa
        dış (tekerlek tarafı) aks kafası konumuna mı uyumlu olduğunu belirtir.
    cycling_apparel_fit:
      name: Bisiklet giyim kalıbı
      description: Giysinin kesimini tanımlayarak hedeflenen sıkılığı ve aerodinamik
        yapıyı belirtir (ör. Yarış, Rahat Kesim).
    cylinder_head_assembly:
      name: Silindir kapağı montaj seviyesi
      description: Silindir kapağının satışa sunulduğu haldeki tamamlanma seviyesini
        belirtir (ör. sübap mekanizması bileşenleri takılı olarak tamamen monte edilmiş
        veya çıplak/parçasız döküm).
    cylinder_head_material_grade:
      name: Silindir kapağı malzeme kalitesi
      description: Silindir kapağı dökümünde kullanılan malzeme ve kalite sınıfını
        belirtir.
    cylinder_head_position:
      name: Silindir kapağının konumu
      description: Çok sıralı (motorlarda, silindir kapağının hangi sıraya/tarafa
        uyumlu olduğunu belirtir (ör. sol/sağ taraf veya 1. sıra/2. sıra)."
    cymbal_alloy:
      name: Zil alaşımı
      description: Kit içerisindeki zillerin alaşımı/bileşimi.
    cymbal_application:
      name: Zil uygulaması
      description: Zilin tasarlandığı/pazarlandığı temel çalma uygulaması.
    cymbal_arm_mounting_interface:
      name: Zil kolu montaj arabirimi
      description: Zil kolunun diğer bateri aksamına nasıl bağlandığını belirtir (ör.
        kelepçe, bateri kafesi, sehpa yuvası).
    cymbal_arm_rotation_positioning_features:
      name: Zil kolu rotasyon/konumlandırma özellikleri
      description: Kolun hangi açılarda eğilebileceğini/döndürülebileceğini ve nasıl
        kilitleneceğini etkileyen konumlandırma özelliklerini belirtir.
    cymbal_arm_style:
      name: Zil kolu stili
      description: Zil kolunun erişim ve konumlandırma tercihlerine uygun olarak düz
        mü yoksa T tipi mi olduğunu belirtir.
    cymbal_drum_case_wheel_configuration:
      name: Zil ve davul çantası tekerlek konfigürasyonu
      description: Çantanın tekerlekleri olup olmadığını ve (varsa) çekerek taşıma
        için tekerlek konfigürasyonunu belirtir.
    cymbal_hammering_style:
      name: Zil dövme stili
      description: Tonal karmaşıklığı ve vuruş hissiyatını etkileyen dövme yöntemi/görünümü.
    cymbal_kit_components_included:
      name: Dahil edilen zil seti bileşenleri
      description: Ride zil setinde/paketinde (ride zilin kendisine ek olarak) hangi
        zil türlerinin yer aldığını belirtir.
    cymbal_kit_items_included:
      name: Dahil edilen zil seti parçaları
      description: Set/paket içine hangi zillerin dâhil olduğunu tanımlar (zil türüne
        göre).
    cymbal_lathing:
      name: Zil tornalama
      description: Zil yüzeyinin ne kadarının tornalandığını (kanallı olduğunu) veya
        tornalanmadan ham bırakıldığını belirtir.
    cymbal_playing_style_genre:
      name: Zil çalma stili/türü
      description: Zillerin hangi tipik performans bağlamı için tasarlandığını tanımlar
        (ör. parmak zilleri veya bando/orkestra el zilleri).
    cymbal_set_configuration:
      name: Zil seti konfigürasyonu
      description: Ürünün tek bir zil, eşleştirilmiş bir çift veya çoklu çift seti
        (ör. grup eğitimi için) olarak satılıp satılmadığını belirtir.
    cymbal_sound_character:
      name: Zil ses karakteri
      description: Keşif amacıyla kullanılan, zilin genel ton profilini/ses karakterini
        tanımlar (örneğin, parlak veya koyu/pes).
    cymbal_sustain:
      name: Zil tınlama süresi
      description: Zilin vurulduktan sonra tınlamaya ettiği süre.
    cymbal_type:
      name: Zil tipi
      description: Elektronik zil pedinin taklit etmek üzere tasarlandığı işlevsel
        zil rolünü belirtir.
    cymbal_volume_level:
      name: Zil ses seviyesi
      description: Zilin algılanan ses yüksekliği/çıkış kategorisi.
    cymbal_weight_class:
      name: Zil ağırlık sınıfı
      description: Zilin ağırlık sınıfını belirtir; bu tonu, ses yüksekliğini ve tepkiselliği
        etkiler.
    dairy_heat_treatment:
      name: Süt ısıl işlemi.
      description: Kremaya uygulanan ve raf ömrünü, lezzeti ve çırpma performansını
        etkileyen işleme veya pastörizasyon seviyesini (ör. Çiğ, Pastörize, UHT) tanımlar.
    damage_type:
      name: Hasar türü
      description: Kitin hangi türlerde ön cam hasarlarını onarmasının amaçlandığını
        belirtir.
    damper_pedal_style:
      name: Damper pedalı stili
      description: Klavyeler/dijital piyanolar ile kullanılan damper pedalının fiziksel
        stilini tanımlar.
    damping_adjustability:
      name: Sönümleme ayarlanabilirliği
      description: Amortisör üzerinde hangi sönümleme ve/veya sürüş yüksekliği parametrelerinin
        ayarlanabilir olduğunu belirtir.
    damping_level:
      name: Sönümleme seviyesi
      description: Susturucunun sağladığı ses seviyesi ve tınlama süresini azaltma
        oranını belirtir.
    dance_occasion:
      name: Dans etkinliği
      description: Giysinin dans provası veya performans içindeki kullanım amacını/bağlamını
        belirtir.
    darbuka_accessories_included:
      name: Dahil edilen darbuka aksesuarları
      description: Darbuka ile birlikte verilen yaygın aksesuarları listeler.
    darbuka_body_finish_type:
      name: Darbuka gövde kaplama tipi
      description: Darbuka gövdesinin dış yüzey işlemini, kaplamasını veya dekoratif
        uygulamasını tanımlar.
    darbuka_head_material:
      name: Darbuka başlık malzemesi
      description: Darbuka üzerindeki deri membranının malzemesini belirtir.
    dart_barrel_material:
      name: Dart gövdesi malzemesi
      description: Dart gövdesinin; ağırlık dağılımını, dayanıklılığını ve fiyatını
        etkileyen ana malzemesini belirtir.
    dart_shaft_design:
      name: Dart şaftı tasarımı
      description: Sabit, dönen, teleskopik olup olmadığını veya kanadı entegre edip
        etmediğini sınıflandırarak şaftın mekanik tasarımını tanımlar ve bu, performans
        ve fiyatını etkiler.
    dart_shaft_thread_type:
      name: Dart şaftı diş tipi
      description: Şaftın dart gövdesine vidalanması için kullanılan diş boyutunu/tipini
        belirterek şaftlar ve gövdeler arasındaki uyumluluğu sağlar.
    dart_thread_size:
      name: Dart vidası ölçüsü
      description: Parçanın uyumlu olduğu diş boyutunu/standardını belirterek şaftlar,
        uçlar ve gövdeler arasındaki uyumu sağlar.
    dart_tip_compatibility:
      name: Dart ucu uyumluluğu
      description: Dart parçasının çelik uçlu, plastik uçlu veya her iki dart tarzı
        için mi tasarlandığını belirtir.
    dart_tip_connection_type:
      name: Dart ucu bağlantı türü
      description: Ucun bir dart gövdesine veya şaftına takılmak için kullanılan diş
        özelliğini veya montaj sistemini tanımlayarak uyumluluğu sağlar.
    dartboard_tournament_approval:
      name: Dart tahtası turnuva onayı
      description: Dart tahtasının belirli dart federasyonları veya ligleri tarafından
        resmi olarak onaylanıp onaylanmadığını belirtir.
    dartboard_type:
      name: Dart tahtası tipi
      description: Dart tahtalarını yapım teknolojisine ve dart uyumluluğuna göre
        sınıflandırır (ör. kıl, elektronik, manyetik).
    dash_cover_construction_type:
      name: Torpido koruyucu yapı tipi
      description: Torpido koruyucunun nasıl şekillendirildiğini/yapılandırıldığını
        (ör. kalıplanmış veya dikilmiş) tanımlar; bu durum uyum hassasiyetini ve görünüşü
        etkiler.
    dash_cover_cutout_configuration:
      name: Torpido koruyucu kesim konfigürasyonu
      description: Kılıfın hangi orijinal ekipman üreticisi torpido açıklıkları/sensörleri
        için önceden kesildiğini veya şekillendirildiğini belirtir.
    dashboard_accessory_position:
      name: Torpido aksesuar konumu
      description: Aksesuarın torpido üzerinde veya çevresinde nereye yerleştirilmek/monte
        edilmek üzere tasarlandığını belirtir.
    date_variety:
      name: Hurma çeşidi
      description: Hurmanın kültivarını/çeşidini belirtir (ör. Medjool, Deglet Noor,
        Acve). Çeşit; lezzeti, boyutu ve dokuyu güçlü bir şekilde etkiler; ayrıca
        çoğu ürün başlığında ve açıklamasında öne çıkarılır, bu nedenle kayda geçirilmesi
        filtrelemeyi ve keşif olanaklarını iyileştirir.
    dayan_head_material:
      name: Dayan deri malzemesi
      description: Doğal deri türü veya sentetik gibi, çalma yüzeyinin (pudi) malzemesini
        belirtir.
    dayan_strap_material:
      name: Dayan askı malzemesi
      description: Dayan'ı bağlamak için kullanılan gergi kayışlarının (baddhi) malzemesini
        belirtir.
    dayan_syahi_type:
      name: Dayan syahi tipi
      description: Dayan derisi üzerindeki syahi (siyah akort macunu) uygulama türü.
    decaffeination_method:
      name: Kafeinsizleştirme yöntemi
      description: Kafeinsiz kahveden kafeinin çıkarılması için kullanılan işlemi
        tanımlar.
    decal_installation_method:
      name: Çıkartma uygulama yöntemi
      description: Dekalin araç yüzeyine uygulanma biçimi (ör. kuru uygulama, ıslak
        uygulama). Geçerli durumlarda, alet/gereksinim ayrıntıları (ör. transfer bandı
        veya ısı tabancası) talimatlarda veya ilgili alet niteliklerinde ifade edilmelidir.
    decal_orientation:
      name: Çıkartmanın yönü
      description: Çıkartmanın camın iç yüzeyine mi yoksa dış yüzeyine mi uygulanacağı.
    decal_placement_type:
      name: Çıkartma yerleşim tipi
      description: Çıkartmanın aracın neresine uygulanacağını belirtir (ör. gövde
        paneli, tampon, kaput).
    decal_visibility_property:
      name: Çıkartmanın görünürlük özelliği
      description: Görünürlüğü veya ışık tepkisini artırmayı amaçlayan bir çıkartmanın
        optik/görünürlük özellikleri (ör. reflektörlü, floresan, karanlıkta parlama
        veya şeffaflık özellikleri).
    deck_concave_level:
      name: Kaykay tahtası konkav seviyesi
      description: Kaykay tahtasının konkav derinliğini veya yoğunluğunu belirtir
        (ör. hafif/az, orta, derin).
    deck_flex_rating:
      name: Kaykay tahtası esneklik derecesi
      description: Kaykay tahtasının esneklik/sertlik derecesinin nitel değerlendirmesi.
    deck_material:
      name: Kaykay tahtası malzemesi
      description: Kaykay tahtasının ana yapım malzemesini tanımlar.
    decoder_interface_socket_type:
      name: Dekoder arayüzü/soket tipi
      description: Lokomotif modeli için dijital dekoder arayüz tipini veya yerleşik
        dekoder konfigürasyonunu belirtir.
    decoration_technique:
      name: Dekorasyon tekniği
      description: Tişört üzerine grafiklerin veya süslemelerin uygulanmasında kullanılan
        ana yöntemi tanımlar.
    decorative_stamp_form_factor:
      name: Dekoratif damga form faktörü
      description: Fiziksel damga formatını ve bir tasarımı nasıl bastığını tanımlar
        (tekli damga, set, rulo, arka plan vb.).
    decorative_tape_application:
      name: Dekoratif bant uygulaması
      description: Dekoratif bandın tasarlandığı veya pazarlandığı ana el işi kullanım
        amacı.
    decorative_tape_format:
      name: Dekoratif bant formatı
      description: Dekoratif bandın kullanım için nasıl tedarik edildiğini/paketlendiğini
        belirtir.
    decoy_buoyancy:
      name: Mühre batmazlığı
      description: Mührenin su sütununda nasıl davrandığını (yüzen, askıda kalan veya
        batan) tanımlar.
    decoy_joint_type:
      name: Mühre eklem tipi
      description: Mühre gövdesinin yekpare mi yoksa eklemli mi olduğunu belirterek
        yüzme eylemini etkiler.
    decoy_motion_mechanism:
      name: Mühre hareket mekanizması
      description: Mührenin, avı çekmek için (yapıyorsa) nasıl hareket veya su hareketi/dalgalanması
        ürettiğini tanımlar.
    decoy_posture:
      name: Mühre duruşu
      description: Mühre ile modellenen hayvanın tasvir edilen duruşunu veya aktivitesini
        belirtir (ör. besleniyor, dinleniyor, tetikte).
    decoy_size_class:
      name: Mühre boyut sınıfı
      description: Mührenin gerçek hayvana kıyasla göreceli ölçeğini kategorize eder
        (ör. Standart, Magnum, Büyük Boy).
    decoy_style:
      name: Mühre stili
      description: Avcıların doğru kurulumu seçmelerine yardımcı olmak için mührenin
        fiziksel form faktörünü veya tasarım sınıfını tanımlar.
    deli_meat_variety:
      name: Şarküteri eti çeşitleri
      description: Şarküteri etinin belirli tarzını sınıflandırır (ör. salam, bolon
        sosis, kurutulmuş çiğ jambon/prosciutto, rozbif).
    delivery_form:
      name: Teslimat şekli
      description: Enjektör temizleyicinin fiziksel sunum şekli.
    denim_composition:
      name: Denim kumaş bileşimi
      description: Denim kumaşın ana elyaf bileşimi (boyalar/terbiye işlemleri hariç
        temel elyaflar).
    denim_finish:
      name: Denim terbiye işlemi
      description: Denim kumaşa uygulanan yüzey/terbiye işlemi.
    denim_intended_use:
      name: Denimin kullanım amacı
      description: Denim kumaşın pazarlandığı tipik proje/kullanım alanı.
    denim_stretch_type:
      name: Denim esneklik türü
      description: Denim kumaşın mekanik esnekliğe, eklenmiş elastan/spandekse sahip
        olduğu yoksa hiç esneme özelliğinin bulunmadığı bilgisi.
    denim_wash:
      name: Denim yıkama türü
      description: Denim kumaşa uygulanan renk tonunu veya yıkama işlemini belirtir
        (örneğin; açık, koyu, ham, asit).
    derailleur_cage_length:
      name: Aktarıcı bacak uzunluğu
      description: Zincir kapasitesini belirleyen aktarıcı bacak uzunluğunu belirtir
        (temel olarak arka aktarıcılar için).
    derailleur_mounting_style:
      name: Aktarıcı montaj türü
      description: Aktarıcının bisiklet kadrosuna veya kulakçığa nasıl bağlandığını
        belirtir (ör. kaynaklı/kulakçıklı montaj, kelepçeli, doğrudan montaj, UDH).
    derailleur_type:
      name: Aktarıcı tipi
      description: Ürünün ön aktarıcı mı yoksa arka aktarıcı mı olduğunu belirtir.
    deshedder_tool_type:
      name: Tüy toplama aleti tipi
      description: Alıcıların tercih ettikleri tımar/bakım yöntemini seçebilmeleri
        için tüy toplama aletinin yapısal stilini sınıflandırır (ör. bıçaklı/jiletli,
        blok, kaşağı veya eldiven).
    diabolo_axle_system:
      name: Diabolo aks sistemi
      description: Grind hareketlerini, stabiliteyi ve ip aşınmasını etkileyen diabolo
        aks sistemini/konfigürasyonunu belirtir.
    diagnostic_functions_supported:
      name: Desteklenen arıza tespit fonksiyonları
      description: Tarayıcının gerçekleştirebileceği arıza tespit/bakım işlevlerini
        belirtir.
    diagnostic_interface_type:
      name: Arıza tespit arayüz tipi
      description: Araç veya cihazla iletişim kurmak için kullanılan bağlantı/arayüz
        tipini belirtir (ör. OBD-II, Bluetooth, Wi‑Fi, USB).
    diamond_color_grade:
      name: Elmas renk derecesi
      description: D (renksiz) ile Z (açık renk) arasındaki elmas renk derecesini
        belirtir veya fantezi renkli elmasları ifade eder.
    diaper_cover_style:
      name: Bebek bezi külodu tarzı
      description: Tarza göre göz atmaya ve filtrelemeye yardımcı olmak için bebek
        bezi külodunun tasarım siluetini veya dekoratif stilini tanımlar.
    diastatic_power_unit:
      name: Diastatik güç birimi
      description: Ürünün diastatik güç değerini bildirmek için kullanılan birim sistemini
        belirtir (ör.°Lintner veya Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Diyatonik mızıka akort sistemi
      description: Diyatonik mızıkanın kullandığı nota dizilimini/akort sistemini
        belirtir.
    dice_sides:
      name: Zar yüzleri
      description: Ürüne dâhil olan zarların zar başına kenar (yüzey) sayısını belirtir
        (ör. d6, d20). Karma setler için, baskın olanı kullanın veya desteklenen durumlarda
        birden fazla değer olarak listeleyin.
    didgeridoo_construction_type:
      name: Didgeridoo yapısal türü
      description: Didgeridoo'nun üretim veya şekillendirme biçimi (geleneksel veya
        modern üretim yaklaşımı).
    dietary_formulation_claim:
      name: Beslenme formülasyonu beyanı
      description: At beslenmesine uygun, önemli formülasyon özelliklerini veya hariç
        tutulan bileşenleri öne çıkarır (ör. Tahılsız, Düşük nişastalı, Organik).
    dinosaur_playset_scale_figure_size_class:
      name: Dinozor oyun seti ölçeği/figür boyutu sınıfı
      description: Diğer setlerle uyumluluğu sağlamaya yardımcı olmak için set içeriğindeki
        dinozorların/figürlerin genel ölçeğini tanımlar.
    dinosaur_species_included:
      name: Dâhil olan dinozor türleri
      description: Oyun setinde hangi dinozor türlerinin temsil edildiğini (figürler
        veya döküm dinozorlar) tanımlar.
    dipsy_diver_size_designation:
      name: Dipsy diver (dalar disk aparatı) boyut tanımı
      description: Balıkçılık dalar diskinin ağırlık ve dalış derinliği ile ilişkili
        olan, üretici tarafından tanımlanmış boyut kodunu belirtir.
    disc_brake_rotor_mount_type:
      name: Disk fren rotoru montaj tipi
      description: Disk fren rotorunun göbeğe nasıl bağlandığını belirtir (örneğin,
        6 cıvatalı, Center Lock).
    disc_lock_accessories_included:
      name: Disk kilidi aksesuarları dahildir
      description: Bisiklet disk kilidiyle birlikte paketlenen ek ürünleri belirtir.
        Örneğin; hatırlatma kablosu, taşıma çantası, montaj braketi veya piller.
    disco_ball_mirror_tile_material:
      name: Disko topu ayna kaplama malzemesi
      description: Disko topu üzerindeki yansıtıcı kutucuğun malzemesi (varsa).
    disco_ball_mirror_tile_size:
      name: Disko topu aynası kutucuk bedeni
      description: Disko topunun üzerindeki kayıtlı işletmesi ayna kutucukları/karelerinin
        yaklaşık boyutu.
    display_backlight_color:
      name: Ekran arka ışığı rengi
      description: Gösterge ekranının/kadranının arka ışık/aydınlatma rengi.
    disposable_compostable_claim:
      name: Tek kullanımlık/Kompostlanabilir iddiası
      description: Ürünün kompostlanabilir, biyolojik olarak parçalanabilir, geri
        dönüştürülebilir olup olmadığını veya (uygun olduğu durumlarda) hiçbir özelliğe
        sahip olmadığını belirtir.
    distillation_method:
      name: Damıtma yöntemi
      description: İçkinin üretiminde kullanılan damıtma yöntemini veya imbik türünü
        belirtir.
    distilled_water_intended_use:
      name: Damıtılmış suyun kullanım amacı
      description: Damıtılmış suyun başlıca kullanım alanlarını tanımlar (örneğin;
        içme suyu, CPAP cihazı, nemlendirici, ütü).
    distress_transmission_frequency:
      name: Acil durum iletim frekansı
      description: Acil durum uyarısı için kullanılan birincil radyo frekansı/frekansları.
    distressing_level:
      name: Rahatsız edici düzeyde
      description: Kumaşa uygulanan kasıtlı yıpranma, yırtılma veya aşınma miktarını
        belirtir.
    distressing_style:
      name: Rahatsız edici tarz
      description: Kot pantolonlardaki yıpranma türünü veya seviyesini belirtir. Örneğin,
        yırtık veya eskitme efektleri gibi.
    distributor_advance_mechanism:
      name: Dağıtıcı avans mekanizması
      description: Distribütör tarafından kullanılan ateşleme zamanlaması ilerletme
        mekanizmasının türünü belirtir.
    distributor_cap_terminal_type:
      name: Dağıtıcı kapak terminal tipi
      description: Distribütör kapağı terminalinin stilini belirtir.
    distributor_gear_material:
      name: Dağıtıcı dişli malzemesi
      description: Dağıtıcı tahrik dişlisinin malzemesini belirtir.
    distributor_ignition_type:
      name: Dağıtıcı ateşleme tipi
      description: Distribütörün platinli, elektronik ateşlemeli veya HEI tipi sistemler
        için tasarlanıp tasarlanmadığını belirtir.
    distributor_kit_contents:
      name: Distribütör kit içeriği
      description: Distribütörle birlikte hangi bileşenlerin dahil olduğunu gösterir
        (örneğin; kapak, rotor, ateşleme Modules, conta/O-ring, tahrik dişlisi, kablolama/bağlayıcı).
    dive_computer_form_factor:
      name: Dalış bilgisayarı form faktörü
      description: Dalgıç bilgisayarının fiziksel tasarımını veya montaj yöntemini
        belirtir. Örneğin, konsola monte veya saat tipi.
    diving_mask_design:
      name: Dalgıç maskesi tasarımı
      description: Dalış maskesinin genel yapısal stilini tanımlar; uyumunu, görüş
        alanını ve kullanım amacını etkiler.
    divot_tool_prong_configuration:
      name: Divot aleti uç konfigürasyonu
      description: Çim hasarını onarmak için kullanılan çim düzeltme aletindeki uçların
        sayısını ve düzenini belirtir.
    divot_tool_style:
      name: Çim onarım aleti stili
      description: Çim onarım aletinin genel yapısal veya kullanım şeklini tanımlar.
        Örneğin; sabit, katlanır/açılır bıçaklı, çok amaçlı alet veya şapkaya veya
        sopaya takılan aksesuarlar gibi.
    djembe_shell_construction:
      name: Djembe kabuk yapımı
      description: Djembe gövdesinin/kabuğunun yapım yöntemini açıklar.
    djembe_tuning_system:
      name: Djembe akort sistemi
      description: Djembenin nasıl gerildiğini/akort edildiğini belirtir.
    dmx_output_connector_type:
      name: DMX çıkış tipi
      description: Sorumlunun DMX çıkış port(ları) için kullanılan fiziksel bağlayıcı
        formatı.
    doctor_playset_items_included:
      name: Dahil edilen doktor oyun seti parçaları
      description: Doktor oyun setinde bulunan taklit tıbbi aletleri ve rol yapma
        aksesuarlarını belirtir (örn. stetoskop, şırınga, refleks çekici).
    doctor_playset_role_play_setting:
      name: Doktor oyun seti rol oynama ayarları
      description: Doktor oyun setinin temsil ettiği temel rol yapma bağlamını tanımlar.
    doctor_playset_wearable_items_included:
      name: Dahil edilen giyilebilir doktor oyun seti parçaları
      description: Oyun setine dahil olan giyilebilir kostüm bileşenlerini belirtir.
    doll_accessory_type:
      name: Oyuncak bebek aksesuarı türü
      description: Ürünün ne tür bir oyuncak bebek veya aksiyon figürü aksesuarı olduğunu
        tanımlar (örn. kıyafet, ayakkabı, mobilya, teşhir standı), böylece alıcı bu
        aksesuar kategorisi içinde ürünlere göz atabilir ve filtreleme yapabilir.
    doll_eye_type:
      name: Bebek gözü tipi
      description: Bebeğin gözlerinin yapım tarzını belirtir (örn. gömme akrilik,
        boyalı, LED ışıklı).
    doll_hair_fiber_type:
      name: Oyuncak bebek saçı elyafı türü
      description: Oyuncak bebekte kullanılan saç/elyaf türü (veya hiç kullanılmaması),
        gerçekçiliği, şekillendirmeyi ve bakımı etkiler.
    doll_making_kit_components_included:
      name: Dahil edilen bebek yapım seti bileşenleri
      description: Alıcının paketi karşılaştırabilmesi ve kendisinin Supply gerekenleri
        bilmesi için, oyuncak bebek yapım kit bulunan temel malzemeleri ve araçları
        listeler.
    dollhouse_installation_placement_type:
      name: Oyuncak ev kurulumu/yerleşim türü
      description: Oyuncak evin nasıl kullanılacağı veya yerleştirileceği (örn. masa
        üstü mü, yere mi konulacak yoksa duvara mı monte edilecek).
    dollhouse_items_included:
      name: Oyuncak ev ürünü dahildir
      description: Oyuncak ev kutusunun içinde neler olduğunu (mobilya, oyuncak bebekler,
        aksesuarlar) belirtir.
    dollhouse_lighting_type:
      name: Oyuncak ev aydınlatma türü
      description: Oyuncak evde bulunan veya desteklenen aydınlatma türü.
    dollhouse_room_type:
      name: Oyuncak ev tipi
      description: Bu aksesuarın oyuncak ev içindeki hangi oda/alanda tipik olarak
        kullanılacağını belirtir.
    dollhouse_scale:
      name: Oyuncak ev ölçüsü
      description: Oyuncak ev veya oyuncak ev aksesuarlarının ölçek oranı (örn. 1:12),
        evler, mobilyalar ve figürler arasında uyumluluğu sağlamak içindir.
    dollhouse_style_theme:
      name: Oyuncak ev tarzı/tema
      description: Oyuncak evin genel tarzı veya teması (örn. modern veya Viktoryen).
    donnos_playing_technique:
      name: Donnos'un oyun tekniği
      description: Donnos'un nasıl oynandığı/hareket ettirildiği (sadece elle mi yoksa
        sopa/vurucu ile), alıcı beklentilerine ve dahil edilen aksesuarlara uygun
        olarak açıklanmaktadır.
    donnos_tuning_system:
      name: Donnos akort sistemi
      description: Ses perdesini ayarlamak veya değiştirmek için kullanılan temel
        yöntem (örn. gerilim telleri/sıkıştırma mekanizması).
    door_assembly_type:
      name: Kapı montaj tipi
      description: 'Nelerin dahil olduğunu belirtir: yalnızca kapı gövdesi, kapı dış
        yüzeyi veya komple kapı düzeneği.'
    door_closure_mechanism:
      name: Kapı kapatma mekanizması
      description: Kapının kapanma hareketini kontrol eden mekanizmayı tanımlar (örn.
        yumuşak kapanma, manyetik kilit).
    door_handle_components_included:
      name: Kapı tanıtıcı bileşenleri dahil
      description: Kapı tanıtıcısıyla birlikte hangi temel parçaların dahil olduğunu
        gösterir (örn. kilit silindiri, conta/sızdırmazlık elemanı, kaplama kapağı,
        montaj donanımı, kablo demeti, mandal/aktüatör).
    door_handle_operation:
      name: Kapı kolu çalışma şekli
      description: Araç kapı tanıtıcı tertibatının birincil çalıştırma/işletim şeklini
        belirtir (ör. mekanik bağlantı, anahtar silindiri, anahtarsız dokunmatik/düğme,
        elektrikli açılır kapanır).
    door_lock_knob_attachment_method:
      name: Kapı kilidi topuzu takma yöntemi
      description: Kapı kilidi topuzunun kilit çubuğuna nasıl takıldığını belirtir
        (ör. vidalı, bastırmalı).
    door_lock_position:
      name: Kapı kilidi konumu
      description: Araçtaki kapı kilidinin veya kapı kilidi parçasının hangi kapı/açma
        pozisyonuna uyacak şekilde tasarlandığını belirtir.
    door_seal_feature_set:
      name: Kapı contası özellik seti
      description: Kapı contasının fonksiyonel özellikleri.
    door_seal_material_type:
      name: Kapı contası malzeme türü
      description: Kapı contasında kullanılan temel elastomer/malzeme türünü belirtir
        (genel malzeme tanımının ötesinde).
    door_seal_product_form:
      name: Kapı contası ürün formu
      description: Kapı contasının satış/teslim şeklini belirtir.
    door_window_operation:
      name: Kapı camı çalışma tipi
      description: Kapının pencere sisteminin manuel mi yoksa elektrikli mi çalıştırılacağını
        veya kapının penceresiz olup olmadığını belirtir.
    double_decker_bus_deck_configuration:
      name: Çift katlı otobüs kat düzeni
      description: Çift katlı bir otobüsün kat erişim/tavan yapılandırmasını belirtir.
    double_drum_pedal_linkage_medium:
      name: Çift tambur pedal bağlantısı orta boy
      description: İkincil pedalın birincil pedala bağlanmasında kullanılan aktarım
        mekanizmasını belirtir (ör. tahrik mili, zincir, kayış).
    double_end_bag_core_type:
      name: Çift uçlu boks torbası çekirdek türü
      description: Çarpma hızını, hissini ve bakım gereksinimlerini belirleyen iç
        vuruş çekirdeği yapısını tanımlar.
    double_pointed_needle_point_style:
      name: Çift uçlu örgü şişi uç stili
      description: Farklı iplikler ve örgü stilleri için tasarlanan şiş ucunun sivrilik/şekil
        yapısını tanımlar.
    dough_extruder_accessories_included:
      name: Hamur şekillendirme aparatıyla birlikte verilen aksesuarlar
      description: Hamur şekillendirme aparatıyla birlikte verilen ek bileşenler.
    dough_extruder_operation_type:
      name: Hamur şekillendirme aparatı çalışma tipi
      description: Hamurun şekil oluşturmak için ekstrüderden nasıl geçirildiğini
        belirtir.
    dough_extruder_shape_disc_included:
      name: Hamur şekillendirme diski dahil
      description: Ekstrüderin, birlikte verilen diskler/nozullar aracılığıyla üretebildiği
        şekil(ler).
    dough_format:
      name: Hamur formu
      description: Paket içindeki hamurun fiziksel sunumunu/şeklini tanımlar (ör.
        top, levha, disk, ince şeritler).
    doumbek_accessories_included:
      name: Dahil edilen dümbelek aksesuarları
      description: Darbukayla birlikte verilen aksesuarlar (ör. akort anahtarı, taşıma
        çantası).
    doumbek_head_material:
      name: Dümbelek davul derisi malzemesi
      description: Darbuka davulunun derisinin (membranının) malzemesi.
    doumbek_head_type:
      name: Darbuka kafa tipi
      description: Darbuka başlığının yapısı/türü (zarın nasıl yapıldığı veya monte
        edildiği).
    doumbek_playing_style_technique:
      name: Darbuka çalma stili/tekniği
      description: Darbukayla yaygın olarak ilişkilendirilen amaçlanan çalma ortamını/stilini
        belirtir.
    doumbek_tuning_system:
      name: Dümbelek akort sistemi
      description: Darbukanın nasıl gerildiği/akort edildiği (veya akort edilemez
        olup olmadığı).
    dowel_end_style:
      name: Dübel uç tipi
      description: Dübel uçlarının kesimini/şeklini tanımlar; yerleştirme kolaylığını,
        güvenliği ve amaçlanan el işi kullanımını etkiler.
    dowel_surface_texture:
      name: Dübel yüzey dokusu
      description: Dübelin düz veya oluklu gibi yüzey durumunu tanımlar; görünümü
        ve yapışkan tutunmasını etkiler.
    drafting_compass_adjustment_mechanism:
      name: Çizim pusulası ayarlama mekanizması
      description: Yarıçapı hassas şekilde ayarlamak için kullanılan temel ince ayar
        mekanizması.
    drafting_compass_fine_adjustment_mechanism:
      name: Teknik pergel ince ayar mekanizması
      description: Varsa, yarıçapı hassas şekilde ayarlamak için kullanılan ince ayar
        türü.
    drafting_compass_lead_holder_type:
      name: Pergel uç tutucu türü
      description: Pergelin içerdiği veya desteklediği çizim ucu/tutucu türü.
    drag_system_material:
      name: Kalama sistemi malzemesi
      description: Kalama sisteminde kullanılan malzeme veya teknolojiyi tanımlar;
        ısı direncini ve akıcılığı etkiler.
    drag_system_type:
      name: Kalama sistemi tipi
      description: Makarada kullanılan kalama mekanizmasının türünü tanımlar; ön kalama,
        arka kalama, kollu, yıldız, manyetik veya disk kalama gibi.
    drag_type:
      name: Kalama türü
      description: Makaranın kullandığı kalama mekanizmasının stilini belirtir (konum
        veya çalıştırma yöntemi).
    drawer_features:
      name: Çekmece özellikleri
      description: Çekmece yapımına özgü özel unsurlar veya işlevler (örn, yumuşak
        kapanma, keçe astarlı) hakkında bilgi.
    drawer_slide_type:
      name: Çekmece rayı tipi
      description: Çekmecelerin raylarının montaj ve uzatma stilini belirtir (örn.
        alttan montaj, tam uzatma).
    drawing_ink_compatible_tools:
      name: Çizim mürekkebiyle uyumlu araçlar
      description: Mürekkebin hangi uygulama araçları için tasarlandığını belirtir
        (örn. divit kalem mi yoksa fırça mı).
    drawing_ink_permanence:
      name: Çizim mürekkebinin kalıcılığı
      description: Bitmiş sanat eserleri ve çoğaltmaları için önemli olan kalıcılık
        özelliklerini gösterir.
    dress_embellishment:
      name: Elbise süslemesi
      description: Elbise tasarımında kullanılan belirgin dekoratif unsurları vurgular.
    dress_train_type:
      name: Elbise kuyruk tipi
      description: Elbise kuyruğunun varlığını ve uzunluk/stilini belirtir; resmiyet
        düzeyi ile mekâna uygunluğu hakkında bilgi verir.
    dried_surface_finish:
      name: Kurutulmuş yüzey kaplaması
      description: Describes the typical surface appearance after drying (sheen/texture).
    drink_tube_insulation:
      name: İçecek borusu yalıtımı
      description: İçecek borusunun, sıvıların ısınmasını veya donmasını önlemek için
        yalıtım veya termal kılıf içerip içermediğini gösterir.
    drive_band_cross_section_shape:
      name: Tahrik kayışı kesit şekli
      description: Tahrik kayışının profil şekli (yuvarlak, düz vb.).
    drive_band_join_type:
      name: Tahrik kayışı birleştirme türü
      description: Tahrik kayışının nasıl birleştirildiğini/oluşturulduğunu belirtir
        (sonsuz tip veya bağlama gerektiren vb.).
    drive_band_material_type:
      name: Tahrik kayışı malzeme tipi
      description: Çıkrıklarda kullanılan tahrik kayışının malzemesini/türünü belirtir.
    drive_location:
      name: Sürüş konumu
      description: Eliptik bisiklette volanın/tahrik mekanizmasının konumunu belirtir;
        bu, cihazın kapladığı alanı ve hareket hissini etkiler.
    drive_mechanism:
      name: Tahrik mekanizması
      description: Pedallardan volana güç aktarımında kullanılan tahrik sistemi tipini
        tanımlar.
    drive_shaft_material:
      name: Tahrik mili malzemesi
      description: Tahrik mili borusunun veya komple tertibatının ana yapım malzemesini
        belirtir.
    drive_system:
      name: Tahrik sistemi
      description: Aktarımlar pedal kuvvetinin direnç sistemine aktarılma mekanizmasını
        belirtir.
    drivetrain_configuration:
      name: Aktarma sistemi yapılandırması
      description: Bisikletteki aktarma sistemi düzenini belirtir. Arka göbeğin sabit,
        tek vitesli serbest rubleli veya çift yönlü olup olmadığını gösterir.
    drivetrain_speed_compatibility:
      name: Aktarma sistemi hız uyumluluğu
      description: Dişlinin uyumlu çalışacak şekilde tasarlandığı kaset hızlarını
        belirtir; doğru diş profili ve aralığını sağlar.
    drone_positioning_system:
      name: Drone konumlandırma sistemi
      description: Drone tarafından desteklenen, navigasyon ve sabit havada asılı
        kalma için kullanılan dahili konumlandırma/tutuş teknolojisini belirtir.
    drone_transmission_type:
      name: Drone iletim türü
      description: Drone ile kumanda/cihaz arasındaki kontrol ve/veya video bağlantısı
        için kullanılan temel yöntemi belirtir.
    drop_spindle_whorl_position:
      name: El iği ağırlık konumu
      description: Ağırlık parçasının mil üzerindeki konumu.
    drum_carder_accessories_included:
      name: Dahil edilen drum carder aksesuarları
      description: Tamburlu tarak setiyle birlikte sunulan yaygın parçaları/aksesuarları
        belirtir.
    drum_clamp_locking_mechanism:
      name: Tambur kelepçesi kilitleme mekanizması
      description: Kelepçenin boruya/çembere nasıl kilitlendiğini veya sıkıldığını
        belirtir (örn. kanatlı cıvata, davul anahtarlı cıvata, hızlı serbest bırakma).
    drum_clamp_mount_interface:
      name: Davul kelepçesi montaj arayüzü
      description: Kelepçenin aksesuar bağlamak için sunduğu bağlantı türünü belirtir
        (örn. L çubuğu yuvası, bilyalı mafsal, zil eğim mekanizması).
    drum_clamp_type:
      name: Tambur kelepçe tipi
      description: Davul seti montaj donanımında kullanılan işlevsel kelepçe türünü
        belirtir (örn. çember kelepçesi veya raf/boru kelepçesi).
    drum_head_application_batter_resonant:
      name: Davul derisi kullanım amacı (vuruş/rezonans)
      description: Davul derisinin davul üzerindeki hangi taraf/işlev için tasarlandığını
        belirtir (üst çalma yüzeyi veya alt rezonans/trampet tarafı).
    drum_head_collar_type:
      name: Davul derisi kenar halkası türü
      description: Başlığın, belirli yatak kenarlarına/gövdelerine uyacak şekilde
        standart, alçak veya özel bir yaka profiline sahip olup olmadığını belirtir.
    drum_head_damping_control:
      name: Davul derisi sönümleme kontrolü
      description: Davul derisi tasarımına entegre edilmiş üst ton kontrolü veya susturma
        özelliklerini belirtir.
    drum_head_film_material:
      name: Davul derisi film malzemesi
      description: Davul derisi filminin ana malzemesini belirtir (genellikle PET/Mylar,
        ancak özel malzemeleri de içerebilir).
    drum_head_hoop_collar_type:
      name: Davul derisi çember tipi
      description: Davul derisinin kasnak ve yaka yapısını (örn. yaka profili ve kasnak
        malzemesi) tanımlar. Bu, bazı gövdeler ve kasnaklarda uyumu ve akort stabilitesini
        etkileyebilir.
    drum_head_hoop_rim_material:
      name: Davul derisi kasnağı/kenar malzemesi
      description: İç kısımda bulunan çemberin (sapın içindeki ekli çember) malzemesi,
        dayanıklılığı ve akort stabilitesini etkileyebilir.
    drum_head_included:
      name: Davul derisi dahildir
      description: Davulla birlikte vuruş ve/veya rezonans derisinin dahil olup olmadığını
        belirtir.
    drum_head_muffling_feature:
      name: Davul derisi susturma özelliği
      description: Davul derisine entegre edilmiş dahili üst ton kontrol özelliklerini
        belirtir.
    drum_head_muffling_type:
      name: Davul derisi sönümleme türü
      description: Davul derisinin dahili üst ton kontrolü/sönümleme elemanları içerip
        içermediğini gösterir.
    drum_head_ply_count:
      name: Davul derisi katman sayısı
      description: Davul derisi yapımında kullanılan film katmanlarının sayısı (örn.,
        1 katmanlı, 2 katmanlı).
    drum_head_position:
      name: Davul derisinin konumu
      description: Davul derisinin vurma (üst/vuruş) derisi, rezonans (alt) derisi,
        trampet tarafı (alt) derisi olarak mı kullanılacağını yoksa her iki şekilde
        de kullanılabileceğini mi belirtir.
    drum_head_reinforcement_type:
      name: Davul derisi güçlendirme türü
      description: Trampetin derisinin, dayanıklılığı artırmak ve tonu odaklamak için
        merkez nokta veya kontrol halkası gibi güçlendirme özelliklerine sahip olup
        olmadığını belirtir.
    drum_head_surface_finish:
      name: Davul derisi yüzey kaplaması
      description: Vuruşu ve fırça tepkisini etkileyen davul derisi yüzey dokusunu/kaplamasını
        belirtir.
    drum_head_type:
      name: Davul derisi tipi
      description: Davulda kullanılan davul derisi yapısını/türünü belirtir (esas
        olarak birlikte sunulan vuruş/rezonans derileri için).
    drum_key_design_type:
      name: Davul akort anahtarı tasarım tipi
      description: Germe davul anahtarının işlevsel tasarımını belirtir (örn. standart,
        cırcırlı, T kollu).
    drum_key_drive_type:
      name: Davul anahtarı tahrik türü
      description: Gergi çubuğunu veya montaj donanımını devreye sokmak için kullanılan
        tambur anahtarının tahrik/arayüz stilini belirtir.
    drum_key_handle_style:
      name: Davul anahtarı sap türü
      description: Davul tuşunun ergonomik/takviye edici stilini, akort sırasında
        rahatlığı ve kaldıraç etkisini açıklamaktadır.
    drum_kit_included_items:
      name: Davul setiyle birlikte sunulan parçalar
      description: Davul seti paketine gövde/pad dışında hangi ana parçaların dahil
        olduğunu belirtir (örn. donanım, ziller, davul taburesi).
    drum_kit_portability:
      name: Davul seti taşınabilirlik özelliği
      description: Setin kompakt saklama/taşıma için tasarlanıp tasarlanmadığını belirtir
        (örn. seyahat tipi/kompakt/katlanabilir).
    drum_kit_shell_construction_features:
      name: Davul seti gövde yapı özellikleri
      description: Davulların yapım şekli (katman sayısı/türü), ses tonunu ve dayanıklılığını
        etkiler.
    drum_mount_clamp_type:
      name: Davul montaj kelepçesi tipi
      description: Davul montaj donanımında kullanılan kelepçe form faktörünü tanımlar.
    drum_multi_clamp_clamp_type:
      name: Davul çoklu kelepçe türü
      description: Çoklu kelepçenin işlevsel stilini/yapılandırmasını belirtir (nasıl
        kelepçelendiği ve neyi bağladığı).
    drum_mute_material:
      name: Davul susturucu malzemesi
      description: Davul derisi ile temas eden ve/veya titreşimi azaltan davul susturucusunun
        ana malzemesini belirtir.
    drum_pad_triggering_zones:
      name: Davul pedi tetikleyici bölgeleri
      description: Tom pad tarafından desteklenen tetikleme bölgelerinin sayısını/türünü
        belirtir (örn. yalnızca yüzey veya yüzey+rim); bu durum ifade çeşitliliğini
        ve modül uyumluluğunu etkiler.
    drum_pedal_accessories_included:
      name: Dahil edilen davul pedalı aksesuarları
      description: Davul pedalıyla birlikte paketlenmiş temel aksesuarları ve bileşenleri
        listeler.
    drum_pedal_baseplate_type:
      name: Davul pedalı taban plakası türü
      description: Pedalın taban plakalı mı yoksa yüzer/çerçevesiz bir tasarım mı
        kullandığını belirtir.
    drum_pedal_bearing_type:
      name: Davul pedalı rulman tipi
      description: Ana dönme noktalarında kullanılan yatak mekanizmasını belirtir
        (örn. salıncak, topuk, kam).
    drum_pedal_cam_type:
      name: Davul pedalı kam tipi
      description: Davul pedalının hissiyatını ve tepkisini etkileyen kam şekli/geometrisini
        belirtir (örn. doğrusal veya hızlandırıcı tip).
    drum_pedal_chain_configuration:
      name: Davul pedalı zincir yapılandırması
      description: Zincir tahrikli davul pedalında kullanılan zincir düzenini belirtir
        (örn. tek zincir, çift zincir veya ofset zincir).
    drum_pedal_chain_type:
      name: Davul pedalı zincir tipi
      description: Tahrik sisteminde kullanılan zincir türünü belirtir (örn. makaralı
        zincir veya bisiklet tipi zincir), bu durum akıcılığı ve dayanıklılığı etkileyebilir.
    drum_pedal_clamp_type:
      name: Davul pedalı kelepçe türü
      description: Pedalların bas davul kasnağına nasıl takılacağını belirtir.
    drum_pedal_intended_use:
      name: Davul pedalı kullanım amacı
      description: Kayış tahrikli pedalın tasarlandığı/kullanıldığı birincil çalma
        Context belirtir.
    drum_pedal_spring_adjustment_method:
      name: Davul pedalı yay ayar yöntemi
      description: Kayış tahrikli pedalın tasarlandığı/pazarlandığı temel çalma kullanım
        alanını belirtir.
    drum_pedal_spring_type:
      name: Davul pedalı yay tipi
      description: Pedalların geri dönüş hareketi için kullanılan yay mekanizmasını
        belirtir.
    drum_shell_material:
      name: Davul kasası malzemesi
      description: Akustik davullar için ana gövde yapım malzemesini belirtir (örn.
        akçaağaç, huş ağacı, akrilik).
    drum_shell_wood_species:
      name: Davul gövdesi ağaç türleri
      description: Davul gövdesinde kullanılan ahşap türünü belirtir; bu, tonu ve
        rezonansı etkiler.
    drumhead_type:
      name: Davul derisi tipi
      description: Octoban üzerinde kullanılan davul derisi yapılandırmasını/türünü
        belirtir.
    drumstick_model:
      name: Davul çubuğu modeli
      description: Birçok marka tarafından kullanılan standartlaştırılmış baget modeli/beden
        tanımı (örn. 5A, 7A).
    drumstick_taper:
      name: Baget ucu konikliği
      description: Şafttan uca kadar olan koniklik profilini tanımlar; bu yapı geri
        sekme ve dengeyi etkiler.
    drysuit_footwear_style:
      name: Dalgıç kıyafeti ayakkabı stili
      description: Dalış elbisesinin alt bacak kısmının entegre yapısını tanımlar
        (örn. entegre botlar, neopren çoraplar, çoraplı ayak veya çıplak ayak bileği
        contaları).
    dumbbell_style:
      name: Dambıl tipi
      description: Dambılın temel tasarımını belirtir. Sabit yapı, ayarlanabilir sistem
        veya ağırlık takılabilir sap tipi olup olmadığı, bu özellik satın alma kararlarını
        ve egzersiz kullanım alanlarını önemli ölçüde etkiler.
    dundun_playing_position:
      name: Dundun oyun pozisyonu
      description: Davulun amaçlanan çalma/taşıma pozisyonu.
    dye_status:
      name: Boya durumu
      description: Elyafın boyalı, boyasız/doğal veya birden fazla renk/karışım içerip
        içermediğini gösterir.
    dye_style:
      name: Boya stili
      description: İplik renginin düz, çok renk geçişli (variegated) veya özel boyama
        yöntemleriyle boyanmış olup olmadığını belirtir.
    dye_technique:
      name: Boyama tekniği
      description: Elyafın renklendirilmesinde kullanılan yöntem (örn. elde boyama,
        kazan boyama, space-dyed).
    dye_type_needlecraft_fabric:
      name: Boya türü (nakış kumaşı)
      description: Keten kumaşın düz renk, el boyaması veya özel boyalı olup olmadığını
        gösterir.
    dyeing_color_processing:
      name: Boyama / renk işleme
      description: Elyafın renklendirilip renklendirilmediğini ve nasıl renklendirildiğini
        açıklar (örn. boyasız, ağartılmış/beyazlatılmış veya belirli boyama teknikleri).
    e_bike_certification_class:
      name: E-bisiklet sertifikasyon kursu
      description: Elektrikli bisikletler için lastiğin resmi hız derecesini belirtir
        (örn. E-25, E-50).
    e_bike_speed_rating:
      name: E-bisiklet hız derecelendirmesi
      description: Lastiğin resmi E-bisiklet sertifikasyon seviyesini belirtir (örn.
        ≤25 km/sa için E25, ≤50 km/sa için E50).
    e_scooter_connector_type:
      name: E-scooter bağlantı konnektörü türü
      description: Bileşenin güç veya sinyal iletişimi için kullandığı elektrik kablosunun
        veya fişinin tipini tanımlar.
    e_scooter_throttle_type:
      name: E-scooter gaz kontrol türü
      description: Elektrikli scooter'larda ivmeyi kontrol etmek için kullanılan ivme
        kontrol cihazının türünü belirtir.
    ear_coverage:
      name: Kulak örtüsü
      description: Kaskın kulak koruması içerip içermediğini ve çıkarılabilir olup
        olmadığını belirtir.
    ear_coverage_style:
      name: Kulak kaplama stili
      description: Kulakların sinek maskesiyle örtülüp örtülmediğini veya nasıl örtüldüğünü
        açıklar.
    ear_coverage_type:
      name: Kulak örtme tipi
      description: Şapkanın kulakları nasıl kapattığını veya kapatıp kapatmadığını
        belirtir.
    ear_guard_type:
      name: Kulak koruyucu tipi
      description: Kaskın içine entegre edilmiş kulak koruyucularının türünü tanımlar.
        Örn. sert plastik, dolgulu veya çıkarılabilir koruyucular.
    earmuff_style:
      name: Kulaklık tarzı
      description: Kulaklıkların nasıl takıldığını veya yapısal tasarım stilini (örn.
        baş üzerinden veya başın arkasından sarılarak) tanımlar.
    earring_closure_type:
      name: Küpe kapama tipi
      description: Küpenin kulağa nasıl sabitlendiğini belirten mekanizma (örn. itmeli,
        kollu, klipsli).
    easel_art_desk_features:
      name: Şövale ve resim masası özellikleri
      description: Şövale veya resim masasındaki yaygın işlevsel özellikleri vurgular.
    easel_art_desk_surface_type:
      name: Şövale ve resim masası yüzey tipi
      description: Sağlanan kullanılabilir çizim/yazma yüzeylerini tanımlar (örn.
        kara tahta, beyaz tahta, Paper rulosu, manyetik tahta).
    eb_clarinet_body_type:
      name: Mi bemol klarnet gövde tipi
      description: Mi bemol klarnetin soprano mu yoksa alto varyant mı olduğunu belirtir.
    eco_material_type:
      name: Ekonomik malzeme türü
      description: Pedde kullanılan çevre dostu köpük veya malzeme teknolojisini vurgular.
    edge_construction:
      name: Kenar yapısı
      description: Kayakta, uzunluğunun hiçbir kısmında, bir bölümünde veya tamamında
        metal kenar bulunup bulunmadığını belirtir.
    edge_tuner_type:
      name: Kenar ayarlayıcı tipi
      description: Kayak veya snowboard kenar ayarlayıcısının türünü sınıflandırır
        (örn. eğe kılavuzu veya elektrikli makine).
    edible_plant_part:
      name: Yenilebilir bitki kısmı
      description: Bitkinin hangi kısmının tüketim için satıldığını gösterir.
    educational_guide_included:
      name: Eğitim kılavuzu dahildir
      description: Model ile birlikte hangi öğrenme materyallerinin dahil olduğunu
        gösterir.
    educational_topic:
      name: Eğitim konusu
      description: Karınca çiftliğinin eğitim içeriği tarafından desteklenen temel
        öğrenme konusunu belirtir.
    egg_component:
      name: Yumurta bileşeni
      description: Ürünün hangi yumurta kısmını içerdiğini belirtir; örn. bütün yumurta,
        sadece yumurta beyazı, yumurta sarısı veya karışımlar/yerine kullanılan malzemeler.
    egg_component_replaced:
      name: Yumurta bileşeni değiştirildi
      description: Ürünün yumurtanın hangi kısmının yerine geçmesi amaçlandığını belirtir
        (örn. tam yumurta, beyaz yumurta).
    egg_enrichment:
      name: Yumurtada besinsel zenginleştirme
      description: Yumurtalara eklenen Omega-3 veya D vitamini gibi besin takviyelerini
        belirtir.
    egg_farming_method:
      name: Yumurta üretim yöntemi
      description: Yumurtaların üretim veya yetiştirme yöntemini belirtir (örn. kafessiz,
        serbest dolaşan tavuklardan elde edilen, organik).
    egg_grade:
      name: Yumurta kalitesi
      description: Düzenleyici kurumlar veya sektör kuruluşları tarafından verilen
        kalite derecesini belirtir.
    egg_processing_state:
      name: Yumurta işleme durumu
      description: Yumurta satışından önce uygulanan herhangi bir işlemi belirtir
        (örn. fresh, tuzlu, yüzyıl yumurtası).
    egg_production_method:
      name: Yumurta üretim yöntemi
      description: Yumurtaların üretildiği çiftlik veya barınma sistemini belirtir
        (örn. kafessiz, otlakta yetiştirilmiş, organik).
    egg_replacer_main_ingredient:
      name: Yumurta ikamesi kullanılan ana bileşen
      description: Yumurta yerine kullanılan ürünün ana bileşenini belirtir ve diyet
        gereksinimleri veya istenen pişirme özellikleri konusunda kullanıcılara yardımcı
        olur.
    egg_size:
      name: Yumurta bedeni
      description: Yumurtaları standart pazar beden sınıflandırmalarına göre sınıflandırır.
    egg_source_animal:
      name: Yumurtaları üreten hayvan
      description: Yumurtaları üreten hayvan türünü tanımlar.
    egg_white_processing_method:
      name: Yumurta beyazı işleme yöntemi
      description: Yumurta beyazlarının toplandıktan sonra nasıl işlendiğini (örn.
        pastörize edilmesi, sprey kurutulması) gösterir ve bu durum gıda güvenliğini,
        raf ömrünü ve kullanımını etkiler.
    eggplant_variety:
      name: Patlıcan çeşidi
      description: Alıcıya, patlıcanın çeşidini veya pazar varyetesini belirterek,
        boyut, lezzet, renk ve mutfak kullanımı bakımından farklılık gösteren türleri
        seçme olanağı sağlar.
    eggshell_color:
      name: Yumurta kabuğu rengi
      description: Yumurtaların kabuklarının baskın rengini belirtir.
    elastic_edge_finish_type:
      name: Esnek kenar bitirme/tipi
      description: Dokuma lastiğin konforunu ve kullanım alanını etkileyen kenar yapısını
        belirtir.
    elastic_intended_use:
      name: Elastik kullanım amacı
      description: Lastiğin tasarlandığı temel kullanım alanını belirtir (ürünün daha
        kolay bulunmasına ve uyumsuz seçimlerin azaltılmasına yardımcı olur).
    elastic_recovery_performance:
      name: Lastik geri toparlanma performansı
      description: Dokuma lastiğin esnetildikten sonra orijinal uzunluğuna ne kadar
        iyi döndüğünü belirtir.
    elastic_recovery_quality:
      name: Elastik toparlanma kalitesi
      description: Lastiğin esneme sonrası eski uzunluğuna ne kadar iyi döndüğünü
        gösterir.
    elastic_stretch_level:
      name: Elastik esneme seviyesi
      description: Elastik malzemenin gerilim altında ne kadar uzayabileceği (tam
        yüzde belirtilmediğinde genellikle göreceli seviyeler olarak ifade edilir).
    elastic_structure:
      name: Elastik yapı
      description: İlik lastiğinin yapısal şeklini (örneğin, örme, dokuma, örgülü)
        belirtir; bu şekil esneme, toparlanma ve dikiş performansını etkileyebilir.
    elastic_type:
      name: Elastik tipi
      description: Elastik malzemenin yapım türünü belirtir (örn. katlanabilir elastik
        (FOE), örgülü, örme, dokuma).
    electric_assist_type:
      name: Elektrikli destek türü
      description: Bisikletin motor desteğine sahip olup olmadığını ve sağlanan destek
        türünü gösterir.
    electric_bicycle_motor_position:
      name: Elektrikli bisiklet motorunun konumu
      description: Elektrikli bisiklette tahrik motorunun konumunu belirtir; örn.
        orta tahrik (mid-drive), ön göbek, arka göbek veya çift göbek.
    electric_bike_class:
      name: Elektrikli bisiklet dersi
      description: E-bisikleti; hız sınırlarını ve gaz desteğini tanımlayan düzenleyici
        sınıflara göre kategorize eder.
    electric_guitar_bridge_type:
      name: Elektro gitar köprü türü
      description: Elektro gitardaki köprü/vibrato sistemi türünü belirtir.
    electric_instrument_output_connection_type:
      name: Elektrikli enstrüman çıkış bağlantı türü
      description: Elektro çelloda sunulan fiziksel ses çıkış bağlantılarını belirtir.
    electric_riding_vehicle_control_options:
      name: Elektrikli sürüş aracı kontrol seçenekleri
      description: Sürücü/ebeveyn için mevcut kontrol/işletim seçenekleri (örn. pedal,
        direksiyon, uzaktan kumanda).
    electric_spinning_wheel_speed_control_type:
      name: Elektrikli çıkrık hız kontrol tipi
      description: Kullanıcının elektrikli tekerleğin dönüş hızını nasıl ayarladığını
        açıklar.
    electric_ukulele_output_jack_type:
      name: Elektrikli ukulele çıkış jakı türü
      description: Elektrikli ukulelede kullanılan fiziksel çıkış bağlantısını belirtir.
    electric_van_body_length_class:
      name: Elektrikli van kasa uzunluk sınıfı
      description: Liste kayıtlarında kullanılan, dingil mesafesi/uzunluğa dayalı
        yaygın ticari araç boyutlandırma sınıfı.
    electric_van_roof_height_class:
      name: Elektrikli minibüs tavan yüksekliği sınıfı
      description: Kamyonetler (özellikle yük kamyonetleri) için kullanılan yaygın
        tavan yüksekliği sınıflandırması.
    electric_vehicle_drivetrain_layout:
      name: Elektrikli araç güç aktarma sistemi
      description: Motor sayısını ve motorların konumunu tanımlayan motor/aks yapılandırmasını
        belirtir (yalnızca AWD/FWD/RWD sınıflandırmasının ötesinde).
    electric_winder_accessories_included:
      name: Elektrikli sarma makinesi aksesuarları dahildir
      description: Elektrikli sarıcıyla birlikte sunulan aksesuarları listeler (örn.
        kelepçeler, adaptörler).
    electrical_connector_type:
      name: Elektrik konnektörü tipi
      description: Kapı kilidi/kilit sistemi tarafından elektriksel entegrasyon için
        kullanılan bağlantı konnektörü türünü belirtir (uygulanabiliyorsa).
    electrical_system_voltage:
      name: Elektrik sistemi voltajı
      description: Regülatörün tasarlandığı nominal araç elektrik sistemi voltajını
        belirtir.
    electronic_cymbal_trigger_zones:
      name: Elektronik zil tetikleme bölgeleri
      description: Zil pedinin kaç adet bağımsız tetikleme bölgesi sağladığını belirtir
        (örneğin, yay/kenar/zil ucu).
    electronic_drum_module_audio_interface_functionality:
      name: Elektronik davul modülü ses arayüzü işlevi
      description: Modülün, MIDI’ye ek olarak kayıt/çalma işlemleri için USB ses arayüzü
        olarak çalışıp çalışamadığını belirtir.
    electronic_drum_module_metronome_features:
      name: Elektronik davul modülü metronom özellikleri
      description: Yerleşik alıştırma/metronom özelliklerini belirtir.
    electronic_drum_module_power_source:
      name: Elektronik davul modülü güç kaynağı
      description: Kontrol modülü için gereken veya desteklenen güç kaynağını belirtir.
    electronic_drum_module_sample_import_support:
      name: Elektronik davul modülü örnek içe aktarma desteği
      description: Modülün kullanıcı örneklerini içe aktarabilip aktaramadığını ve
        bunu hangi yöntemle yaptığını belirtir.
    electronic_drum_pad_playing_surface_type:
      name: Elektronik davul pad çalma yüzeyi türü
      description: Tom padin çalma yüzeyi yapısını belirtir (örn. mesh deri veya kauçuk);
        bu yapı geri sekmeyi, gürültüyü ve çalma hissini etkiler.
    electronic_features:
      name: Elektronik özellikler
      description: Oyun bankacılığı ürününde yer alan elektronik/etkileşimli özellikleri
        (varsa) belirtir.
    electronic_lights_and_sound:
      name: Elektronik ışıklar ve ses
      description: Oyuncak ev setinin elektronik ışık ve/veya ses özelliklerine (örn,
        ışıklar, kapı zili sesi, müzik, ses efektleri) sahip olup olmadığını gösterir.
    electronics_power_source:
      name: Elektronik güç kaynağı
      description: Aktif elektronik bileşenlerin nasıl güç aldığı/güçlendirildiğini
        belirtir (uygulanabiliyorsa).
    eligible_race_series:
      name: Uygun yarış serileri
      description: Aracın katılmaya uygun olduğu yarış serisini veya yetkilendirme
        kuruluşunu belirtir.
    elliptical_trainer_part_type:
      name: Eliptik kondisyon aleti parça türü
      description: Eliptik bisiklet için belirli aksesuar veya yedek parça türünü
        (örn. kayış, konsol, pedal) sınıflandırarak, alıcının birçok alt kategori
        arasında gezinmeden ihtiyaç duyduğu ürüne hızlıca ulaşmasını sağlar.
    embellishment_technique:
      name: Süsleme tekniği
      description: Nakış, baskı veya boncuk işleme gibi giysiye uygulanan başlıca
        dekoratif veya yüzeysel işleme.
    embellishment_type:
      name: Süsleme türü
      description: Jartiyere uygulanan dekoratif öğe türünü belirtir (örn. dantel,
        fiyonk veya inci).
    embossing_pen_ink_color:
      name: Kabartma kalem mürekkebi rengi
      description: Kabartma kaleminin uyguladığı mürekkebin rengini belirtir (şeffaf/yapışkan
        veya pigmentli olabilir). Kalem/gövde renginden farklı.
    embossing_stylus_tip_shape:
      name: Kabartma kalemi uç şekli
      description: Farklı efektler oluşturmak için kullanılan kabartma ucunun geometrik
        şeklini belirtir (örn. yuvarlak uç veya sivri uç).
    embroidered_coverage_level:
      name: Nakışlı kaplama seviyesi
      description: Yama yüzeyindeki nakış ipliği kaplama miktarını yaklaşık olarak
        belirtir.
    embroidered_patch_backing_type:
      name: Nakışlı yama arka kaplama türü
      description: Nakışlı yamanın arka yüzeyindeki destek/kaplama katmanını belirtir;
        bu yapı dayanıklılığı ve uygulama şeklini etkiler.
    embroidery_hoop_type:
      name: Nakış kasnağı tipi
      description: Nakış kasnağının yapım tarzını ve temel gerdirme mekanizmasını
        tanımlar.
    embroidery_machine_bobbin_type:
      name: Nakış makinesi bobin tipi
      description: Bobin sisteminin tipi/yükleme şekli.
    emergency_lighting_configuration:
      name: Acil durum aydınlatma yapılandırması
      description: Araç üzerindeki birincil acil durum uyarı aydınlatma konfigürasyonunu
        belirtir (örn. tavan lambası, ön ızgara lambaları).
    emergency_lighting_package:
      name: Acil durum aydınlatma paketi
      description: Kurulan acil durum uyarı ışıklarının türlerini belirtir.
    emissions_compliance_standard:
      name: Emisyon uyumluluk standardı
      description: Uygulanabiliyorsa motorun emisyon sertifikasyonunu/uyumluluğunu
        belirtir.
    emissions_standard:
      name: Emisyon standardı
      description: Araç için emisyon uyumluluk standardı (bölge ve yıla göre değişir).
    enclosure_panel_configuration:
      name: Muhafaza paneli yapılandırması
      description: Hangi muhafaza panellerinin veya taraflarının dahil olduğunu belirtir
        (kapsama yapılandırması); örn. tam muhafaza, yalnızca yan perdeler veya 3
        tarafı kapalı (ön/arka açık) yapı.
    enclosure_window_material:
      name: Muhafaza pencere malzemesi
      description: Yapının şeffaf pencere panellerinde kullanılan malzemeyi tanımlar.
    end_fitting_type:
      name: Uç bağlantı tipi
      description: Amortisörün her iki ucunda (araç tarafı ve kapak tarafı) kullanılan
        bağlantı stili, montaj uyumluluğunu belirler.
    end_type:
      name: Son tip
      description: Çekme kayışının kurtarma noktalarına bağlanması için uçlarındaki
        bağlantı/bağlantı şeklini belirtir.
    ends_style_blocking_wires:
      name: Uç stili (bloklama telleri)
      description: Bloklama telinin uçlarının, güvenlik ve dantel kenarlarından kolay
        geçirilmesi için nasıl sonlandırıldığını belirtir.
    enduro_bike_suspension_adjustability:
      name: Enduro bisiklet süspansiyonu ayarlanabilirliği
      description: Hangi süspansiyon ayarlarının mevcut olduğunu gösterir (genellikle
        ön çatal ve arka amortisör için).
    engine_bay_mounting_location:
      name: Motor bölmesi montaj konumu
      description: Taşma deposunun motor bölmesinde nereye monte edilmek üzere tasarlandığını
        belirtir (göreceli konum).
    engine_bearing_coating:
      name: Motor yatağı kaplaması
      description: Rulman üzerindeki yüzey kaplamasını belirtir (aşınma direnci, gömülebilirlik
        ve sürtünmenin azaltılması için).
    engine_bearing_position:
      name: Motor rulmanı konumu
      description: Rulmanın motor içindeki konumunu/işlevini belirtir.
    engine_bearing_size:
      name: Motor yatağı gövdesi
      description: Rulmanın standart boyutta mı yoksa undersize/oversize bir varyant
        mı olduğunu belirtir (genellikle krank taşlama ve boşluk ayarlarıyla ilişkilidir).
    engine_configuration:
      name: Motor konfigürasyonu
      description: Motorun silindir düzenini/yapılandırmasını tanımlar (örn. sıralı,
        V, düz/boksör).
    engine_cooling_type:
      name: Motor soğutma tipi
      description: Motorun soğutma yöntemini belirtir.
    engine_degreaser_form:
      name: Motor yağ çözücü formu
      description: Motor yağ çözücüsünün fiziksel formatı/teslimat şekli.
    engine_degreaser_rinse_requirement:
      name: Motor yağ çözücü durulama gereksinimi
      description: Yağ çözücünün uygulama sonrasında suyla durulanması gerekip gerekmediği.
    engine_mount_type:
      name: Motor bağlantı tipi
      description: Motor bağlantı elemanının fonksiyonel tasarımını belirtir (örn.
        hidrolik, dolu, tork destekli).
    engine_oil_formulation:
      name: Motor yağı formülasyonu
      description: Motor yağının formülasyon odak noktasını belirtir. Örneğin, standart
        kullanım, yüksek kilometre bakımı, uzun yağ değişim aralıkları veya filo/ağır
        hizmet tipi motor yağları uygulaması.
    engine_oil_specification:
      name: Motor yağı özellikleri
      description: Yağın karşıladığı şartname/standart (örn. API SP, API SN Shopify
        Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Motor revizyon kit içeriği
      description: Motor revizyon kitinde hangi ana bileşenlerin yer aldığını belirtir.
    engine_rotation_direction:
      name: Motor dönüş yönü
      description: Denizcilik uygulamalarında kullanılan motor dönüş yönünü belirtir.
    engine_timing_system_drive_type:
      name: Motor zamanlama sistemi tahrik tipi
      description: Motorun zamanlama sisteminin kayış tahrikli, zincir tahrikli veya
        dişli tahrikli olup olmadığını belirterek uyumluluk eşleştirmesi yapılmasını
        sağlar.
    engine_valve_coating:
      name: Motor valfi kaplaması
      description: Vanaya aşınma/ısı direnci için uygulanan herhangi bir yüzey uygulamasını
        veya kaplamayı tanımlar.
    engine_valve_position:
      name: Motor valf konumu
      description: Motor valfinin motorun emme tarafı mı yoksa egzoz tarafı için mi
        tasarlandığını belirtir.
    engine_valve_stem_tip_type:
      name: Motor supap mili ucu tipi
      description: Supap sapı ucunun, külbütör kolu veya ayarlayıcıyla temas noktasındaki
        stilini/yapısını belirtir.
    engine_valvetrain_type:
      name: Motor valf mekanizması tipi
      description: Valf mekanizması/eksantrik mili düzeni.
    enhancement_level:
      name: Geliştirme seviyesi
      description: 'Dolgunun sağladığı yaklaşık hacim artışını cup ölçüsüyle belirtir:
        Hafif (1 cup’a kadar), Orta (1–2 cup), Belirgin (2+ cup).'
    entry_zipper_location:
      name: Giriş fermuarı konumu
      description: Kıyafetin ana giriş fermuarının veya açıklığının konumunu belirtir
        (örn. ön, arka, omuz veya çapraz).
    epee_point_type:
      name: Epe ucu türü
      description: Bıçağa takılan uç kısmının marka veya standardını belirtir; bu
        da uyumluluğu ve bakımı etkiler.
    equestrian_discipline:
      name: Binicilik disiplini
      description: Mahmuzun hangi binicilik disiplini için tasarlandığını veya en
        uygun olduğunu belirtir.
    equestrian_helmet_safety_certification:
      name: Binicilik kaskı güvenlik sertifikası
      description: Kaskın uygun olduğu güvenlik standardını/standartlarını veya sertifikalarını
        belirtir.
    equine_application_area:
      name: At bakımı uygulama alanı
      description: Ürünün hangi vücut bölgesinde veya malzemede kullanılacağını belirtir
        (örn. toynak, yele, koşum takımı).
    equipment_contact_material_brew_wine:
      name: Ekipmanla temas eden malzeme (bira/şarap)
      description: Ürünün sıvı ile temas eden ana malzemesi (örn. cam, paslanmaz çelik,
        plastik).
    eu_children_clothing_size:
      name: AB çocuk giyim bedeni
      description: AB çocuk giyim bedenlerini boya göre belirtir, örn. 104 veya 140
    eu_clothing_size:
      name: AB giyim bedeni
      description: AB giyim bedenini belirtir, örn. 38 veya 46
    eu_cup_size:
      name: AB ölçüleri
      description: C veya E gibi AB standartlarını belirtir
    eu_ring_size:
      name: AB yüzük ölçüsü
      description: AB yüzük numarasını çevre uzunluğuyla belirtir, örn. 52 veya 63
    eu_shoe_size:
      name: AB ayakkabı numarası
      description: AB ayakkabı numarasını belirtir; örn. 42 veya geniş kalıp 42
    euphonium_included_accessories:
      name: Euphonium ile birlikte sunulan aksesuarlar
      description: Listelerde, öfonyum birlikte genellikle paket halinde sunulan ürünler
        (örn. ağızlık, koli) yer almaktadır.
    euphonium_valve_configuration:
      name: Öfonyum valf konfigürasyonu
      description: Valf sayısını ve 4. valfin elle mi yoksa yan mekanizma ile mi çalıştırıldığını
        belirtir.
    european_sword_historical_period:
      name: Avrupa kılıcı tarihi dönemi
      description: Kılıç modelinin/replikasının temel alındığı başlıca tarihi dönem
        (veya orijinalinin yapıldığı dönem).
    european_sword_pattern_type:
      name: Avrupa kılıç modeli/tipi
      description: Koleksiyonluk kılıçla temsil edilen belirli Avrupa kılıç modeli/tipi
        (tipolojisi).
    ev_connector_adapter_direction:
      name: EV bağlayıcı/adaptör yönü
      description: Adaptörün FROM ve TO (araç giriş tarafı vs. şarj cihazı/kablo tarafı)
        bağlanacağını belirterek doğru uyumluluk filtrelemesi sağlar.
    ev_conversion_kit_completeness_level:
      name: EV dönüşüm kit tamamlanma düzeyi
      description: Ürünün tam dönüşüm kit mi yoksa kısmi kit/paket mi olduğunu belirtir
        (örn. yalnızca motor+sorumlu).
    ev_conversion_kit_drivetrain_configuration:
      name: EV dönüşüm kit aktarma organı yapılandırması
      description: Bir EV dönüşüm kit aktarma organı mimarisini, motor yerleşimi/tahrik
        düzenini ve mevcut şanzımanın korunup korunmayacağını belirtir.
    ev_conversion_kit_voltage_class:
      name: EV dönüşüm kit voltaj sınıfı
      description: EV dönüşüm kit tasarlandığı nominal sistem voltaj sınıfı (kategori).
        Bu özelliği, kesin voltaj ölçümüne ek olarak, yaygın sistem voltaj sınıflarına
        göre filtreleme yapmak için kullanın.
    evaporator_core_type:
      name: Evaporatör çekirdek türü
      description: Otomotiv klima sistemindeki evaporatör çekirdeğinin yapı tasarımını
        belirtir.
    evenweave_fabric_finish_treatment:
      name: Evenweave kumaş kaplama/uygulama
      description: Kumaşa uygulanmış, kullanımını veya görünümünü etkileyen ön bitiş
        işlemlerini ya da uygulamaları belirtir.
    evenweave_fabric_package_format:
      name: Evenweave kumaş paket formatı
      description: Kumaşın nasıl satıldığını belirtir (kesilmiş parça veya metre/yarda
        bazında sürekli uzunluk).
    exercise_bike_accessory_part_type:
      name: Egzersiz bisikleti aksesuarı/parça türü
      description: Ürünün temel işlevini veya bileşen türünü belirtir (örn. pedal,
        tahrik kayışı, şişe tutucu, ekran kapağı, krank kolu).
    exercise_bike_cushion_component:
      name: Egzersiz bisikleti minder bileşeni
      description: Koltuk pedi, sele veya koltuk kılıfı gibi birlikte sunulan oturma
        bileşenini belirtir.
    exercise_bike_metrics_tracked:
      name: Egzersiz bisikleti metrik takip sistemi
      description: Bilgisayarın gerçek zamanlı olarak ölçebileceği ve görüntüleyebileceği
        egzersiz verisi alanlarını listeler.
    exercise_mat_accessories_included:
      name: Egzersiz matı aksesuarları dahildir
      description: Mat ile birlikte sunulan ek bileşenleri listeler (örn. kayışlar
        veya diz pedleri).
    exhaust_cooling_type:
      name: Egzoz soğutma tipi
      description: Egzoz bileşeninin ıslak egzoz (su soğutmalı/su enjeksiyonlu) veya
        kuru egzoz sistemleri için tasarlandığını gösterir.
    exhaust_installation_position:
      name: Egzoz montaj konumu
      description: Araçta parçanın nereye takıldığını gösterir.
    exhaust_outlet_configuration:
      name: Egzoz çıkış konfigürasyonu
      description: Aracın arka tarafındaki egzoz çıkış yerini belirtir.
    expansion_tank_cap_connection_type:
      name: Genleşme tankı kapağı bağlantı türü
      description: Genleşme tankının ağzına kapağı takmak ve sızdırmazlığını sağlamak
        için kullanılan mekanik bağlantı türü.
    expansion_tank_cap_pressure_relief_feature:
      name: Genleşme tankı kapağı basınç tahliye özelliği
      description: Kapak, basınç/vakum tahliye işlevini sağlayıp sağlamadığı ve nasıl
        sağladığı.
    expansion_tank_cap_seal_material:
      name: Genleşme tankı kapağı sızdırmazlık malzemesi
      description: Genleşme tankının boyun kısmıyla temas eden conta/sızdırmazlık
        elemanının malzemesi.
    extension_attachment_method:
      name: Uzatma bağlantı yöntemi
      description: Uzantının bisiklet kokpitine/gidonuna nasıl takıldığını gösterir
        ve sürücülerin mevcut sistemleriyle uyumluluğunu doğrulamalarına yardımcı
        olur.
    extension_bend_type:
      name: Uzatma kıvrım türü
      description: Gidon uzantısının geometrik şeklini veya kıvrımını tanımlar; bu
        da sürücünün ergonomisini ve aerodinamiğini etkiler.
    extension_mechanism:
      name: Uzatma mekanizması
      description: Masanın uzunluğunu veya yüzey alanını genişletmek için kullandığı
        yöntemi açıklar (varsa).
    extension_table_features:
      name: Uzatma masasının özellikleri
      description: Dikiş makinesi uzatma tablalarına özgü işlevsel özellikleri vurgular.
    eyelet_grommet_installation_method:
      name: Kuş gözü ve rondela montaj yöntemi
      description: Kuş gözü/rondelanın malzemeye nasıl monte edildiğini veya sabitlendiğini
        belirtir.
    eyewear_lens_shape:
      name: Gözlük lens şekli
      description: Lensin silindirik veya küresel gibi geometrik şeklini belirtir;
        bu şekiller görüş alanını, bozulmayı ve stili etkiler.
    eyewear_strap_material:
      name: Gözlük kayışı malzemesi
      description: Koruyucu gözlük veya güneş gözlüğünü kullanıcının başına sabitleyen
        ayarlanabilir kayışın malzemesini belirtir.
    fabric_backing_type:
      name: Kumaş arka kaplamsı türü
      description: Yazdırılabilir pamuğun, standart yazıcılardan geçirilebilmesini
        belirleyen dengeleyici bir kağıt arka kaplamaya sahip olup olmadığını (ve
        türünü) belirtir.
    fabric_cut_format:
      name: Kumaş kesim biçimi
      description: Nakış/işleme kanvası parçasının kesim biçimini/türünü belirtir.
    fabric_end_use:
      name: Kumaşın son kullanımı
      description: Kumaşın temel kullanım amacını belirtir (hangi kullanım için en
        uygun olduğunu gösterir).
    fabric_finish:
      name: Kumaş bitişi
      description: İpek kumaşa uygulanan ve parlaklığını, dokusunu ve performansını
        etkileyen yüzey işlemi/uygulama.
    fabric_intended_use:
      name: Kumaş kullanım amacı
      description: Keten kumaş için önerilen başlıca uygulama/projeler.
    fabric_opacity_level:
      name: Kumaş opaklık seviyesi
      description: Kumaşın ne kadar şeffaf olduğunu belirtir; bu durum katmanlama
        ve astar ihtiyacını etkiler.
    fabric_patch_shape:
      name: Kumaş yama şekli
      description: Kit ile birlikte sunulan yamaların şeklini belirtir.
    fabric_repair_kit_application_method:
      name: Kumaş tamir kit uygulama yöntemi
      description: Onarımın kumaşa nasıl uygulanacağını belirtir (örn. ütüyle yapıştırılan,
        dikilen, yapıştırıcıyla yapıştırılan).
    fabric_repair_kit_components_included:
      name: 'Kumaş tamir kit bileşenleri şunları içerir:'
      description: Kit içerisinde sunulan belirli bileşenleri listeler (örn. yamalar,
        iplik, iğne, yapıştırıcı).
    fabric_repair_kit_intended_use:
      name: Kumaş tamir kit kullanım amacı
      description: Kitin hangi yaygın onarım işlemleri için tasarlandığını belirtir
        (örn. yırtıklar, delikler, paça kıvırma).
    fabric_selling_format:
      name: Kumaş satış biçimi
      description: Kumaşın nasıl satıldığını belirtir (sürekli uzunluk, önceden kesilmiş
        parça, rulo/top veya numune).
    fabric_stretch_level:
      name: Kumaş esneklik seviyesi
      description: Kumaşın esneme/elastikiyet derecesini belirtir; bu, kullanıcıların
        vücuda oturan giysiler veya yapılandırılmış projeler için uygun kumaşı seçmesine
        yardımcı olur.
    fabric_stretch_type:
      name: Kumaş esneme tipi
      description: Bu özellik, sörf yaparken veya yüzerken hareket kabiliyeti açısından
        önemli olan şort kumaşının esneme performansını gösterir.
    fabric_texture:
      name: Kumaş dokusu
      description: Ev giyim üstünde kullanılan kumaşın yüzey hissini veya örgü yapısını
        tanımlar.
    fabric_use_case:
      name: Kumaş kullanım alanı
      description: Saten kumaş parçasının/topunun temel kullanım amacını belirtir.
    fabric_weight_class:
      name: Kumaş ağırlık sınıfı
      description: Flanel kumaşı, kullanıcıların tam GSM/oz değerini bilmeden filtreleme
        yapabilmesi için tipik kullanım ağırlığı sınıflarına göre kategorize eder.
    face_mask_material:
      name: Yüz maskesi malzemesi
      description: Kaskla birlikte verilen veya kaskla uyumlu olan yüz maskesinin
        malzeme bileşimi.
    face_mask_style:
      name: Yüz maskesi stili
      description: Moda yüz maskesinin genel şekli veya yapım stilini tanımlayarak,
        alıcının tercih ettiği uyumu ve estetiği bulmasına yardımcı olur.
    face_mask_style_code:
      name: Yüz maskesi stil kodu
      description: Yüz maskesinin yapısal çubuk stilini veya sektör kod ailesini tanımlar
        (örn. ROPO, OPO, RJOP).
    face_protection_type:
      name: Yüz koruma tipi
      description: Kaskla birlikte sunulan veya kaska entegre edilmiş yüz koruma türünü
        belirtir (örn. kafes veya vizör).
    faceplate_security_features:
      name: Ön panel güvenlik özellikleri
      description: Temel tasarımın ötesinde, yüz paneline ilişkin hırsızlık önleme
        ve erişim özelliklerini belirtir.
    facing_length:
      name: Yüz uzunluğu
      description: Ağızlığın facing uzunluğunu (eğri uzunluğunu) belirtir; bu özellik
        tepkiyi ve kamış seçimini etkiler.
    fan_shroud_type:
      name: Fan muhafazası tipi
      description: Fan muhafazasının kapsama/geometri stilini belirtir (örn. tam,
        yarım veya halka tipi).
    farming_method:
      name: Tarım yöntemi
      description: Hayvanların yetiştirilmesinde kullanılan serbest dolaşım veya organik
        üretim gibi hayvan refahı/yetiştiricilik uygulamalarını vurgular.
    farming_practice:
      name: Tarım uygulamaları
      description: Ürün için kullanılan başlıca yetiştirme yöntemini belirtir (örn.
        geleneksel, organik, hidroponik).
    fascinator_style:
      name: Şapka süsü tarzı
      description: Alıcının popüler şapka stillerine göre hızlıca filtreleme yapabilmesi
        için, şapka süsünün yapısal tasarımını veya şekillerini tanımlar.
    fastener_grade:
      name: Bağlantı elemanı sınıfı
      description: Cıvatanın yük kapasitesini belirleyen dayanım derecesini/sınıfını
        belirtir (örn. Grade 8 veya Class 10.9).
    fat_rendering_state:
      name: Yağın eritme durumu
      description: Yağın eritilmiş, eritilmemiş (çiğ) veya kısmen eritilmiş olup olmadığını
        belirtir. Bu durum raf ömrünü ve mutfak uygulamalarını etkiler.
    fat_source:
      name: Yağ kaynağı
      description: Tereyağı, sade yağ veya margarin üretiminde kullanılan yağın birincil
        kaynağını (hayvansal veya bitkisel) belirleyerek alerji ve diyet filtrelemesini
        destekler.
    faucet_hole_configuration:
      name: Musluk deliği konfigürasyonu
      description: Lavabo tezgahında önceden açılmış musluk deliklerinin sayısını
        ve yerini gösterir.
    feather_application:
      name: Tüy uygulaması
      description: Hindi tüylerinin el işi veya üretim amaçlı temel kullanım alanını
        belirtir.
    feather_attachment_format:
      name: Tüy eklentisi/biçimi
      description: Sentetik tüylerin kullanım için nasıl hazırlandığını/satıldığını
        belirtir (gevşek, ipe dizili, bantlı vb.).
    feather_coloration_style:
      name: Tüy renklendirme stili
      description: Tüy(ler)e rengin nasıl uygulandığını/göründüğünü belirtir (örn.
        düz renk, uçtan boyalı, degrade); temel renk değerinden bağımsızdır.
    feather_component:
      name: Tüy bileşeni
      description: Satılan tavus kuşu tüyünün hangi kısmı/türünü belirtir (örn. göz
        tüyü mü yoksa tümseği mi).
    feather_curvature:
      name: Tüy eğriliği
      description: Tüyün genel şekli/eğrilik profili.
    feather_finish:
      name: Tüy bitişi
      description: Devekuşu tüylerinin doğal mı yoksa dekoratif amaçlı işlenmiş (örn.
        boyanmış veya ağartılmış) mi olduğunu gösterir.
    feather_form:
      name: Tüy şekli
      description: Satılan kaz tüyü parçalarının fiziksel şeklini belirtir.
    feather_grade:
      name: Tüy kalitesi
      description: Tüyün el işi veya sergileme amaçlı genel kalite/seçim derecesini
        belirtir.
    feather_part:
      name: Tüy bölümü
      description: Satılan hindi tüyünün hangi bölümünü/yapısını temsil ettiğini belirtir
        (el işi ve yapay sinek bağlama ürün listelerinde yaygın olarak kullanılır).
    feather_processing_type:
      name: Tüy işleme türü
      description: Tüylerin el işi kullanımına yönelik nasıl işlendiğini/uygulandığını
        belirtir (örn. boyalı, ağartılmış, doğal/boyasız).
    feather_product_form:
      name: Tüy ürün biçimi
      description: Satılan tüy ürününün fiziksel şekli/kesimi (örn. tek tek tüyler,
        boa veya saçak).
    feather_quantity_unit:
      name: Tüy miktarı birimi
      description: Ürünlerin nasıl satıldığını (örn. adet olarak, ağırlık olarak,
        demet olarak) tanımlayarak liste kayıtları arasında doğru karşılaştırma yapılmasını
        sağlar.
    feather_source:
      name: Tüy kaynağı
      description: Tüyden badminton toplarında kullanılan tüylerin hayvan kaynağını
        belirtir.
    feather_stiffness:
      name: Tüy sertliği
      description: Tüy dikenlerinin/yapısının göreceli sertliği/rijitliği.
    feed_mechanism:
      name: Besleme mekanizması
      description: Topların atış makinesine nasıl beslendiğini gösterir.
    feed_purpose:
      name: Besleme amacı
      description: Yemin veya takviyenin temel beslenme ya da işlevsel amacını açıklar.
    feeder_mechanism_type:
      name: Besleme mekanizması tipi
      description: Yemleme makinesinin yemi bırakmak için kullandığı dağıtım mekanizmasını
        tanımlar.
    feijoa_cultivar:
      name: Feijoa çeşidi
      description: Farklı kültivarlar farklı tat, boyut ve hasat zamanları sunduğundan,
        feijoanın belirli kültivarını veya çeşidini belirtir.
    felt_duty:
      name: Keçenin işlevi
      description: Tenis topunun keçe sınıfını (örn. ekstra dayanıklı, standart dayanıklı)
        belirtir; bu sınıf farklı zeminlerde topun dayanıklılığını etkiler.
    felting_mold_intended_use:
      name: Keçe kalıbı kullanım amacı
      description: Kalıbın, keçe projelerinde ne oluşturmak veya hangi amaçla kullanılmak
        üzere tasarlandığını belirtir.
    felting_pad_surface_material:
      name: Keçeleme pedi yüzey malzemesi
      description: Keçeleme pedi/matının, elyafa/iğneye temas eden çalışma yüzeyinde
        kullanılan malzeme.
    fencing_certification:
      name: Eskrim sertifikası
      description: Eskrim silahının sahip olduğu resmî yönetim kurumu onaylarını (örn.
        FIE, USFA) listeler; bu onaylar, müsabaka uygunluğunu ve kalite standartlarını
        gösterir.”
    fencing_connector_type:
      name: Eskrim bağlantı tipi
      description: Eskrim kablolarını, soketlerini veya makaralarını bağlamak için
        kullanılan konnektör yapılandırmasını (örn. 2 pinli, 3 pinli, süngü tipi)
        belirtir; bu, bileşen uyumluluğunu sağlar.
    fencing_discipline:
      name: Eskrim disiplini
      description: Ürünün tasarlandığı veya uyumlu olduğu eskrim silahını ya da disiplinini
        belirtir.
    fencing_weapon_type:
      name: Eskrim silahı türü
      description: Antrenman yardımcısının uyumlu olduğu veya temsil ettiği eskrim
        ya da antrenman silahı stilini belirtir; bu, kullanıcıların uygun ekipmanı
        bulmasına yardımcı olur.
    fender_finish_state:
      name: Çamurluğun kaplama durumu
      description: Çamurluğun boya ve montaja hazır olması açısından sunulan yüzey/kaplama
        durumunu belirtir.
    fender_pieces_included:
      name: Dahil edilen çamurluk parçaları
      description: Ürünle birlikte sağlanan bileşenleri listeler; bunun tek bir çamurluk
        mu yoksa aksesuarlarla birlikte tam bir set mi olduğunu açıklığa kavuşturur.
    fender_type:
      name: Çamurluk tipi
      description: Çamurluğun genel tasarımını veya stilini sınıflandırır.
    fennel_trimming:
      name: Rezene budaması
      description: Rezene soğanıyla birlikte hangi bitki kısımlarının bulunduğunu
        (örn. yapraklı, üst kısmı ve kökü temizlenmiş) belirtir.
    fennel_variety:
      name: Rezene çeşidi
      description: Satılan rezene soğanlarının kültivarını veya ticari çeşidini belirtir.
    fermentation_application:
      name: Fermantasyon uygulaması
      description: Kültürün fermente etmek için tasarlandığı temel gıda veya içeceği
        (örn. peynir, yoğurt, süt kefiri, ekşi maya) belirtir.
    fermentation_method:
      name: Fermantasyon yöntemi
      description: Soya sosunun nasıl üretildiğini veya fermente edildiğini (örn.
        doğal olarak demlenmiş, kimyasal hidrolizle üretilmiş) belirtir.
    fermentation_vessel_material:
      name: Fermantasyon kabı malzemesi
      description: Kitte yer alan fermantasyon kabının varsa ana malzemesini belirtir.
    ferrule_material:
      name: Ferül malzemesi
      description: Şaft ferülünde kullanılan malzemeyi (örn. Juma, Fenolik, Polikarbonat,
        XTC veya ferülsüz) belirtir; bu, dayanıklılığı ve vuruş hissini etkiler.
    fia_homologation_certification:
      name: FIA homologasyonu/sertifikasyonu
      description: Aracın (veya güvenlik hücresinin) sertifikalı/homologe olup olmadığını
        ve hangi standarda uygun olduğunu belirtir.
    fiber_animal_source_type:
      name: Elyaf hayvanı/kaynak türü
      description: Fitilin elde edildiği hayvanı veya temel kaynağı (ya da sentetik
        kaynağı) belirtir; örn. merinos yünü, alpaka veya bitkisel elyaflar.
    fiber_luster_level:
      name: Elyaf parlaklık seviyesi
      description: Elyafın mat ile yüksek parlaklık arasında değişen görsel parlaklığını
        belirtir.
    fiber_preparation_processing_stage:
      name: Elyaf hazırlama / işleme aşaması
      description: Elyafın kullanım için nasıl hazırlandığını/işlendiğini gösterir
        (örn. kardelenmiş, taraklanmış, harmanlanmış, süper yıkamalı).
    fiber_preparation_type:
      name: Elyaf hazırlama türü
      description: Elyafın el işi çalışmaları için nasıl hazırlandığını belirtir (örn.
        taranmış batt, tambur taramalı veya ön keçelenmiş levha).
    field_hockey_ball_playing_surface:
      name: Çim hokeyi topu oyun yüzeyi
      description: Topun tasarlandığı oyun yüzeyini veya ortamını tanımlar.
    field_hockey_ball_type:
      name: Çim hokeyi topu türü
      description: Çim hokeyi topunu kullanım amacı veya özel özelliğine göre kategorize
        eder.
    field_hockey_goal_size_standard:
      name: Çim hokeyi kalesi boyut standardı
      description: Kaleyi, yaygın çim hokeyi standartlarına veya antrenman boyutlarına
        göre sınıflandırır (örn. FIH resmi saha standardı, gençlik veya mini).
    field_hockey_training_objective:
      name: Çim hokeyi antrenman amacı
      description: Antrenman yardımcısının geliştirmek için tasarlandığı temel beceriyi
        veya odak alanını belirtir.
    field_point_attachment_method:
      name: Saha noktası bağlantı yöntemi
      description: Hedef ucunun ok şaftına veya insert parçasına nasıl sabitlendiğini
        belirtir (örn. vidalı veya yapıştırmalı).
    field_point_tip_style:
      name: Saha noktası uç stili
      description: Uç kısmının geometrik stilini veya fonksiyonel profilini tanımlar;
        bu da nüfuz etme, çıkarma çabası ve yasallığı etkiler.
    fielding_glove_position:
      name: Saha eldiveni pozisyonu
      description: Eldivenin beyzbol veya softbol oyununda hangi savunma pozisyonu
        ya da kullanım amacı için tasarlandığını belirtir.
    fielding_training_focus:
      name: Saha eğitimi odak noktası
      description: Eğitim seansı sırasında yardımın hedeflediği birincil beceri alanını
        belirtir.
    fig_variety:
      name: İncir çeşidi
      description: Satılan incirin belirli bir türünü veya çeşidini belirtir.
    figure_8_device_design:
      name: Şekil 8 cihaz tasarımı
      description: Şekil 8 cihazının, işleme özelliklerini ve kullanım amacını etkileyen
        özel konfigürasyonunu tanımlar.
    figure_finish_type:
      name: Şekil bitirme tipi
      description: At modelinin yüzey/boya kalitesini (koleksiyonluk bir obje olarak
        nasıl göründüğünü/hissettirdiğini) belirtir.
    figurine_scale:
      name: Figür ölçeği
      description: Figür ölçeğinin gerçek konuya oranı (uygun olduğunda), örn. 1:6.
    fill_status:
      name: Doluluk durumu
      description: Güreş mankeninin önceden doldurulmuş, boş veya kısmen doldurulmuş
        olarak satılıp satılmadığını belirtir; bu durum gönderim maliyetini ve alıcının
        hazırlık ihtiyacını belirler.
    filling_consistency:
      name: Dolgu yoğunluğu
      description: Dolgunun, sunulduğu şekliyle dokusunu veya kıvamını belirtir (örn.
        pürüzsüz krema, parçacıklı meyve, macun kıvamı).
    filling_type:
      name: Dolgu türü
      description: Kurabiyenin içindeki ana dolgu veya kremayı belirtir (varsa).
    filtration_and_mother_status:
      name: Filtrasyon ve maya tortusu durumu
      description: Sirkenin filtrelenmiş, filtrelenmemiş, çiğ veya ’doğal maya tortusu’
        içerip içermediğini belirtir. Bu özellik probiyotik veya çiğ ürün arayan tüketicilere
        yöneliktir
    filtration_method:
      name: Filtrasyon yöntemi
      description: Votkanın damıtım sonrası filtrelenmesi ve arındırılması için kullanılan
        malzemeyi veya yöntemi belirtir.
    fin_box_system:
      name: Fin kutusu sistemi
      description: Tahtanın kullandığı fin kutusu veya montaj bağlantı sistemini belirtir;
        bu yapı sonradan takılacak finlerle uyumluluğu belirler.
    fin_buoyancy:
      name: Fin kaldırma kuvveti
      description: Finin suda pozitif, nötr veya negatif kaldırma kuvvetine sahip
        olup olmadığını belirtir; bu durum dalgıcın denge pozisyonunu ve ekipman dengesini
        etkiler.
    fin_flex_rating:
      name: Fin esneklik derecesi
      description: Finin göreceli sertlik veya esneklik seviyesini belirtir; bu özellik
        genel performansı etkiler.
    fin_mounting_system:
      name: Fin montaj sistemi
      description: Finin kiteboarda sabitlenmesi için kullanılan bağlantı arayüzünü
        veya standardını tanımlar (örn. FCS II, vidalı, 4 delikli); bu yapı finler
        ile board arasındaki uyumluluğu sağlar.
    fin_position:
      name: Fin pozisyonu
      description: Finin board üzerindeki amaçlanan montaj konumunu belirtir.
    fin_strap_type:
      name: Palet kayışı tipi
      description: Paletin topuğa/ayağa sabitlenmesinde kullanılan kayış veya müşteri
        bağlantı sisteminin stilini belirtir.
    fin_template:
      name: Fin şablonu
      description: Sörf tahtası fininin hidrodinamik şablonunu veya dış hat şeklini
        kategorize eder. Bu yapı dönüş stilini, hızı ve genel board hissini etkiler.
    finger_count:
      name: Parmak sayımı
      description: Eldivenin, tabın veya tetik mekanizmasının desteklemek üzere tasarlandığı
        parmak sayısını belirtir.
    finger_coverage:
      name: Parmak örtüsü
      description: Parmakların ne kadarının örtüldüğünü gösterir.
    finger_grip_adjustability:
      name: Parmak kavrama ayarlanabilirliği
      description: Parmak kavrama bölümünün farklı el boyutlarına uyacak şekilde nasıl
        bağlandığını veya ayarlandığını belirtir.
    finger_hole_configuration:
      name: Parmak deliği düzeni
      description: Parmak deliklerinin el yönünü belirtir (sağ el, sol el veya her
        iki el için uygun).
    finger_hole_count:
      name: Parmak deliği sayısı
      description: Kavrama derisindeki parmak deliği sayısını belirtir. Bu özellik
        parmaksız, 2 delikli, 3 delikli ve 4 delikli modeller arasındaki temel stil
        farkını oluşturur.
    finger_pick_band_style:
      name: Parmak penası bant türü
      description: Parmağa takılan bant/halkanın stilini belirtir; bu yapı konforu
        ve ayarlanabilirliği etkiler.
    finger_pick_blade_length:
      name: Parmak penası bıçak uzunluğu
      description: Bant kısmından uzanan pena bıçağının uzunluğunu belirtir.
    finger_pick_blade_shape:
      name: Parmak penası ucu şekli
      description: Tellere temas eden pena yüzeyinin (bıçak kısmının) şeklini/profilini
        belirtir.
    finger_pick_size:
      name: Parmak penası boyutu
      description: Parmak penası bant/halkasının, farklı parmak veya başparmak çevrelerine
        uyacak boyutunu belirtir (enstrüman boyutu değil).
    finger_pick_wear_location:
      name: Parmak penası kullanım konumu
      description: Parmak penasının hangi parmakta kullanılmak üzere tasarlandığını
        veya ürünün başparmak ve parmak seti olup olmadığını belirtir.
    finger_protection:
      name: Parmak koruması
      description: Eldivende parmak omurga koruması bulunup bulunmadığını ve omurga
        parçalarının çıkarılabilir olup olmadığını belirtir.
    fingerboard_bearing_type:
      name: Parmak kaykay rulman türü
      description: Parmak kaykay tekerleklerinde kullanılan rulman tipini belirtir.
    fingerboard_grip_type:
      name: Klavye tutuş tipi
      description: Parmak kaykayının yüzeyinde kullanılan kavrama yüzeyi malzemesini/tipini
        belirtir.
    fining_agent_active_ingredient:
      name: Patlatıcı maddesi aktif bileşeni
      description: Üründe kullanılan birincil berraklaştırıcı veya açıklayıcı madde.
    fining_agent_type:
      name: Parlatıcı madde türü
      description: Kırmızı şarabı berraklaştıran ürünler için berraklaştırıcı/berraklaştırıcı
        maddenin kimyasını veya maddesini belirtir.
    finish_after_baking:
      name: Pişirme işleminden sonra bitirin
      description: Ürün sertleştikten/piştikten sonra oluşan tipik yüzey görünümünü
        belirtir.
    finish_effect:
      name: Bitiş efekti
      description: Yapay elmaslara uygulanan özel yüzey/optik efektleri tanımlar.
    finish_type:
      name: Bitirme türü
      description: Ukulele gövdesine uygulanan yüzey kaplaması.
    finished_product_format:
      name: Son ürün formatı
      description: Kitin üretmek için tasarlandığı koku ürünü türünü belirtir.
    fire_pit_accessories_included:
      name: Dahil edilen ateş çukuru aksesuarları
      description: Ateş çukuru ile birlikte sunulan dikkat çekici aksesuarları listeler
        (örn. kıvılcım koruyucu ekranlar veya lav taşları); böylece kutu içeriği netleşir.
    firework_assortment_launch_type:
      name: Havai fişek seti ateşleme türü
      description: Set içindeki havai fişeklerin genellikle nasıl ateşlendiğini/fırlatıldığını
        belirtir.
    firework_assortment_types_included:
      name: Havai fişek setine dahil olan havai fişek türleri
      description: Set içerisinde yer alan temel havai fişek türlerini belirtir; böylece
        kullanıcıların paket içeriklerini karşılaştırmasına yardımcı olur (örn. volkan,
        Roma mumu, maytap).
    firework_effect_types:
      name: Havai fişek efekt türleri
      description: Setin oluşturduğu temel görsel ve/veya duyusal efekt türlerini
        belirtir (uygun olanların tümü seçilebilir).
    firework_ignition_method:
      name: Havai fişek ateşleme yöntemi
      description: Havai fişeğin nasıl ateşlendiğini veya başlatıldığını belirtir
        (örn. fitil veya elektrikli kibrit).
    firework_visual_intensity_level:
      name: Havai fişek görsel yoğunluk seviyesi
      description: Volkan efektinin oluşturduğu kıvılcımların genel görsel yoğunluğunu/hacmini
        belirtir.
    firing_mode:
      name: Ateşleme modu
      description: Airsoft silahın desteklediği seçilebilir veya temel ateşleme modlarını
        listeler.
    first_day_cover_cachet_type:
      name: İlk gün zarfı kaşe tipi
      description: İlk gün zarfındaki kaşe türünü belirtir (örn. baskılı, elle boyanmış).
    first_day_cover_cancellation_type:
      name: İlk gün teminat iptal türü
      description: İlk gün zarfına uygulanan posta iptal damgasının türünü/stilini
        belirtir (örn. makine damgası, el damgası).
    first_day_cover_set_type:
      name: İlk gün zarf seti türü
      description: Zarfın tek bir seri, tam bir set veya alt küme/kombinasyonu temsil
        edip etmediğini belirtir.
    fishing_hook_size:
      name: Olta iğnesi boyutu
      description: 'Olta iğnesinin standart boyut tanımını belirtir (örn. #4, 1/0,
        10/0). Bu özellik balıkçıların hedef balık türüne ve yem boyutuna uygun iğne
        seçmesine yardımcı olur.'
    fishing_hook_style:
      name: Olta iğnesi stili
      description: Tekli iğnenin sunumu, yakalama verimliliği ve kullanım amacını
        etkileyen belirli tasarımını veya kıvrım şeklini belirtir.
    fishing_hook_type:
      name: Olta iğnesi tipi
      description: Balık kaşığıyla birlikte sunulan iğne tipini/yapılandırmasını belirtir
        (varsa).
    fishing_line_application:
      name: Balık oltası uygulaması
      description: Olta misinasının veya lider materyalinin kullanım amacını belirtir
        (örn. lider, ana misina, tippet).
    fishing_line_buoyancy_type:
      name: Olta misinası kaldırma kuvveti türü
      description: Misinanın su içindeki davranışını sınıflandırır (örn. yüzen, ara
        seviye, batan); bu özellik balıkçıların uygun derinlik sunumunu seçmesine
        yardımcı olur.
    fishing_needle_purpose:
      name: Balıkçılık iğnesi kullanım amacı
      description: İğnenin balıkçılık takım düzenlemeleri içindeki temel kullanım
        amacını belirtir.
    fishing_needle_types_included:
      name: Balıkçılık iğnesi çeşitleri dahil
      description: Set içerisinde sunulan belirli iğne veya takım hazırlama aracı
        türlerini listeler, böylece kullanıcılar kit içeriğini hızlıca görebilir.
    fit_profile:
      name: Uygun profil
      description: Pedin genel kesimini ve siluetini belirtir. Bu yapı hareket kabiliyetini
        ve koruma kapsamını etkiler.
    fit_volume_classification:
      name: Uygun hacim sınıflandırması
      description: Botun markalar tarafından belirtilen genel iç hacim sınıfını kategorize
        eder (örn. düşük hacim için LV).
    fitting_angle:
      name: Uygun açı
      description: Bağlantı elemanının gövde eğim açısını belirtir (örn. düz, 45°,
        90°). Açısı ayarlanabilir bağlantı elemanları için “Ayarlanabilir / döner”,
        yaygın olmayan açılar için ise “Diğer” seçeneğini kullanın.
    flag_base_type:
      name: Bayrak tabanı türü
      description: Köşe bayrağını farklı oyun zeminlerine sabitlemek için kullanılan
        ankraj veya taban türünü tanımlar.
    flag_design_theme:
      name: Bayrak tasarımı teması
      description: Bayrak üzerinde temsil edilen temel tasarım temasını belirtir (örn.
        ülke/milli, spor takımı, tatil). Bu özellik amaca yönelik alışverişte keşif
        ve filtrelemeyi destekler.
    flag_mounting_method:
      name: Bayrak dikme yöntemi
      description: Bayrağın araca nasıl bağlandığını belirtir (örn. anten bağlantısı,
        çeki demiri bağlantısı, mıknatıslı).
    flag_type:
      name: Bayrak tipi
      description: Golf bayrağının belirli kullanım amacını veya stilini sınıflandırır
        (örn. pin bayrağı, golf arabası bayrağı veya antrenman bayrağı).
    flame_resistance_standard:
      name: Alev direnci standardı
      description: Giysinin karşıladığı belirli alev dayanımı veya ark flaşı standardını/sertifikasını
        belirtir.
    flamenco_cajon_snare_system:
      name: Flamenko cajon trampet sistemi
      description: Flamenko müziğine özgü vızıltıyı oluşturmak için kullanılan dahili
        trampet mekanizmasını (veya hiç mekanizma olmamasını) belirtir.
    flammability_compliance:
      name: Yanıcılık uyumluluğu
      description: Kumaşın araç iç mekanları için geçerli yanıcılık standardını/standartlarını
        karşıladığını belirtir.
    flannel_brushing_finish:
      name: Flanel fırçalama işlemi
      description: Flanel kumaşın fırçalanmış olup olmadığını ve hangi yüzey(ler)de
        uygulandığını belirtir; bu işlem yumuşaklığı, sıcaklığı ve görünümü etkiler.
    flannel_use_type:
      name: Flanel kullanım türü
      description: Flanel kumaş kesiminin/topunun temel kullanım amacını belirtir.
    flap_configuration:
      name: Kapak düzeni
      description: Selenin flap stilini belirtir (örn. tek flaplı veya çift flaplı).
    flare_color:
      name: İşaret fişeği rengi
      description: Evet, “İşaret fişeği rengi” doğru ve profesyonel bir çeviri olmuş.Attribute
        başlığı olarak rahatlıkla kullanılabilir.
    flash_card_included_features:
      name: Bilgi kartının özellikleri
      description: Bilgi kartlarıyla birlikte sunulan işlevsel öğrenme/kullanım özelliklerini
        vurgular.
    flavor_intensity:
      name: Lezzet yoğunluğu
      description: Aroma vericinin ne kadar yoğun olduğunu belirtir. Bu özellik kullanıcıların
        uygun kullanım miktarını belirlemesine yardımcı olur (örn. standart yoğunluk,
        ekstra yoğun).
    flavor_solvent_base:
      name: Aroma çözücü bazı
      description: Aroma vericide kullanılan temel taşıyıcıyı veya çözücüyü belirtir
        (örn. alkol, propilen glikol, gliserin).
    fleece_fiber_animal_type:
      name: Yapağı elyafı hayvan türü
      description: Yapağı elyafının elde edildiği hayvan türü.
    fleece_finish_surface:
      name: Polar kumaş bitişi / yüzey türü
      description: Polar kumaşın yüzeyini/bitiş işlemini belirtir (örn. anti-pill,
        fırçalanmış); bu özellik tüylenme direncini, yumuşaklığı ve görünümü etkiler.
    fleece_preparation_method:
      name: Polar kumaş hazırlama yöntemi
      description: Polar kumaşın el işi ve eğirme işlemleri için nasıl hazırlandığını/işlendiğini
        belirtir (elyafın durumu).
    flesh_color:
      name: Ten rengi
      description: Kavunun iç kısmının rengini belirtir.
    fletching_orientation:
      name: Ok tüylerinin yerleşim yönü
      description: Ok tüylerinin şaft üzerine nasıl yerleştirildiğini belirtir (örn.
        düz, açılı, helisel); bu yapı okun dönüşünü ve uçuşunu etkiler.
    fletching_profile:
      name: Ok tüyü profili
      description: Ok tüyünün geometrik şeklini veya kesimini tanımlar; bu yapı sürüklenmeyi,
        açıklık uyumunu, gürültüyü ve okun genel uçuş özelliklerini etkiler.
    flight_system_type:
      name: Uçuş sistemi türü
      description: Uçuş sisteminin yapım tarzını belirler ve katlanabilir, kalıplanmış
        ve entegre uçuş ve şaft sistemleri arasında ayrım yapar.
    float_attachment_method:
      name: Şamandıra bağlantı yöntemi
      description: Şamandıranın misinaya nasıl bağlandığını belirtir (örn. kayar veya
        sabit); bu özellik balıkçıların takım düzeni stiline göre filtreleme yapmasına
        yardımcı olur.
    float_design:
      name: Şamandıra tasarımı
      description: Balıkçılık şamandırasının genel stilini veya türünü (örn. bobber,
        waggler, kalem tipi) sınıflandırır; böylece balıkçılar tekniklerine ve koşullara
        uygun modeli hızlıca seçebilir.
    float_raft_use_environment:
      name: Şamandıra/sal kullanım ortamı
      description: Şişme botunun kullanım için tasarlandığı temel su ortamını (havuz,
        sakin açık su veya dalgalı/sörf bölgesi gibi) belirtir; bu da dayanıklılık
        ve tasarım beklentilerini yansıtır.
    floatation:
      name: Yüzdürme
      description: İşaret fenerinin suda yüzebilecek şekilde tasarlanıp tasarlanmadığı.
    floor_construction_type:
      name: Zemin yapısı tipi
      description: Sal tabanının tasarımını (örn. kendinden su tahliyeli, yüksek basınçlı
        drop dikişli) belirtir; bu tasarım drenajı, rijitliği ve performansı etkiler.
    floor_design:
      name: Zemin tasarımı
      description: Ürünle birlikte sunulan zemin kaplamanın türü.
    floor_inclusion:
      name: Zemin dahil durumu
      description: Giriş holünün zemin içerip içermediğini ve bu zeminin çıkarılabilir
        olup olmadığını belirtir.
    floor_mat_cleaning_method:
      name: Zemin paspası temizleme yöntemi
      description: Paspas için üretici tarafından önerilen temel temizleme yöntemini
        belirtir.
    floor_mat_edge_style:
      name: Zemin paspası kenar stili
      description: Paspasın dökülen sıvıları ve kiri tutmak için yükseltilmiş kenarlara/dudak
        yapısına sahip olup olmadığını açıklar.
    floor_mat_format:
      name: Zemin matı biçimi
      description: Zemin koruma ürününün fiziksel formatını veya türünü (örn. tek
        paspas, geçmeli karo, rulo) tanımlar.
    floor_mat_retention_system:
      name: Zemin paspası sabitleme sistemi
      description: Paspası yerinde sabit tutmak için kullanılan yöntemi belirtir.
    floor_mat_set_configuration:
      name: Zemin paspası seti içeriği
      description: Paket içeriğinde hangi konumların dahil olduğunu (örn. yalnızca
        ön çift, tam set) belirtir.
    floss_sugar_granulation_grade:
      name: Pamuk şekerinin granülasyon derecesi
      description: Şeker karışımının kristal boyutunu (ince, orta, iri) açıklar; bu,
        makine performansını ve son dokuyu etkileyebilir.
    floss_sugar_product_form:
      name: Pamuk şekeri ürün formu
      description: Pamuk şekerinin kullanıma hazır mı, temel şekerle karıştırılması
        gereken bir aroma konsantresi mi yoksa renksiz bir baz şeker mi olduğunu belirtir.
    flour_grind_texture:
      name: Unun öğütülmüş dokusu
      description: Unun öğütme inceliğini veya dokusunu (örn. ekstra ince, orta, iri
        veya taş değirmende öğütülmüş) belirtir; bu, tarif performansını etkileyebilir.
    flour_processing_method:
      name: Un işleme yöntemi
      description: Una uygulanan dikkat çekici işleme veya işlem yöntemlerini (örn.
        taş değirmende öğütülmüş, beyazlatılmış, filizlendirilmiş, zenginleştirilmiş)
        belirtir; bunlar lezzeti, rengi veya besin değerini etkiler.”
    flower_care_instructions:
      name: Çiçek bakım talimatları
      description: Taze kesme çiçeklere özel önerilen bakım adımlarını (örn. sapları
        kesme, su değiştirme sıklığı) sunar.
    flugelhorn_leadpipe_material:
      name: Flugelhorn ağız borusu malzemesi
      description: Ağızlık parçasının malzemesi (eğer enstrümanın genel malzemesinden
        ayrı olarak belirtilmişse).
    flugelhorn_trigger_type:
      name: Flugelhorn tetikleyici tipi
      description: Flugelhornun bir akort tetiğine sahip olup olmadığını ve bunun
        hangi sürgü/valfi kontrol ettiğini belirtir.
    fluorescence_grade:
      name: Floresans derecesi
      description: Elmasın UV ışığına maruz kaldığında gösterdiği floresans yoğunluğunu
        belirtir.
    fluorescence_under_uv:
      name: UV ışığı altında floresans
      description: Numunenin ultraviyole ışık altında floresans gösterip göstermediğini
        ve gösteriyorsa hangi tür floresans sergilediğini belirtir.
    fluorocarbon_content:
      name: Florokarbon içeriği
      description: Mumun florokarbon katkı maddeleri içerip içermediğini ve hangi
        seviyede içerdiğini belirtir.
    flute_case_capacity:
      name: Flüt kutusu kapasitesi
      description: Kutunun ana flüt gövdesine ek olarak neleri taşımak için tasarlandığını
        (örn. flüt + pikolo, ek ağızlık bölümü) belirtir.
    flute_cleaning_rod_tip_type:
      name: Flüt temizleme çubuğu ucu tipi
      description: Bezi/silme aparatını tutan veya enstrümana temas eden çubuk ucunun
        tasarımını (örn. yarıklı, vidalı, halkalı) açıklar.
    flute_footjoint_type:
      name: Flüt alt parça tipi
      description: Flütün alt parça yapılandırmasını belirtir.
    flute_headjoint_cork_type:
      name: Flüt ağızlık mantarı tipi
      description: Ağızlık bölümüyle birlikte sunulan mantar/tıpa düzeneğinin malzemesini
        veya tipini belirtir.
    flute_key_system:
      name: Flüt tuş sistemi
      description: Uygun durumlarda, flütte kullanılan mekanik/tuş sistemini (örn.
        Boehm sistemi) belirtir.
    flute_keywork_material:
      name: Flüt tuş mekanizması malzemesi
      description: Gövde malzemesinden ayrı olarak belirtilmişse, tuşların (mekanizmanın)
        malzemesini ve/veya kaplamasını belirtir.
    flute_offset_g:
      name: Flütte ofset G tuş düzeni
      description: Flütün ofset G tuş düzenine sahip olup olmadığını belirtir.
    flute_wall_thickness:
      name: Flüt duvar kalınlığı
      description: Flüt borusunun duvar kalınlığı kategorisi (ince duvarlı, standart,
        kalın duvarlı).
    fly_pattern_type:
      name: Sinek deseni tipi
      description: Yapay sinek yemlerini, olta balıkçılığı stiline veya taklit ettiği
        böcek/yem türüne göre sınıflandırır; böylece balıkçıların uygun sinek yemi
        türünü hızlıca bulmalarına yardımcı olur.
    fly_rod_style:
      name: Sinek kamışı tipi
      description: Kamışı, amaçlanan atış tekniğine veya kullanım alanına göre sınıflandırır
        (örn. Tek elli, Switch, Spey).
    fly_style:
      name: Sinek stili
      description: Uzun paçalı içlikteki ön açıklığın veya ön erişim bölümünün tipini
        belirtir.
    fly_tying_tools_included:
      name: Sete dahil sinek bağlama araçları
      description: Sette sunulan belirli sinek bağlama araçlarını listeler; böylece
        kullanıcılar tam olarak nelerin dahil olduğunu görebilir ve setleri karşılaştırabilir.
    fly_type:
      name: Yapay sinek türü
      description: Uzun paçalı içliğin fermuarlı bir açıklığa sahip olup olmadığını
        ve bu açıklığın stilini belirtir.
    flyer_hook_mounting_method:
      name: Yapay sinek kancası montaj yöntemi
      description: Kancanın yapay sineğe nasıl bağlandığını (örn. vidalı veya geçmeli)
        belirtir; bu, montaj kolaylığını ve uyumluluğu etkiler.
    flyer_hook_orientation:
      name: Yapay sinek kancası yönü
      description: Kancanın yapay sineğin sol veya sağ tarafı için mi tasarlandığını
        ya da ters çevrilebilir/evrensel olup olmadığı.
    flyer_kit_finish_coating:
      name: Yapay sinek seti kaplama/yüzey işlemi
      description: Yapay sinek seti bileşenlerine uygulanan yüzey kaplaması.
    flyer_kit_included_components:
      name: Yapay sinek setine dahil bileşenler
      description: Sette hangi parçaların yer aldığını belirtir.
    flyer_orifice_type:
      name: Yapay sinek delik tipi
      description: Yapay sinekte kullanılan delik tipini belirtir.
    flying_disc_feature_set:
      name: Uçan disk özellik seti
      description: Uçan diskin dikkat çekici işlevsel özellikleri.
    flysheet_material:
      name: Dış örtü malzemesi
      description: Ağırlığı, dayanıklılığı ve hava koşullarına karşı direnci etkileyen
        dış tente/çadır dış katmanında kullanılan ana kumaşı belirtir.
    flywheel_balance_type:
      name: Volan dengeleme tipi
      description: Volanın nötr dengeli olup olmadığını veya harici bir dengesizlik
        ağırlığı kullanıp kullanmadığını belirtir.
    foam_blocks_size_class:
      name: Köpük blok boyut sınıfı
      description: Setteki blokların genel boyut sınıfını belirtir.
    foam_blocks_surface_texture:
      name: Köpük blok yüzey dokusu
      description: Köpük blokların dış yüzey dokusunu/yüzey hissini açıklar.
    foam_surface_effect:
      name: Köpük yüzey efekti
      description: El işi köpüğü veya strafora uygulanan yaygın dekoratif yüzey efektlerini
        (örn. simli, metalik veya holografik kaplama) açıklar.
    foil_color:
      name: Folyo rengi
      description: Sertifikada kullanılan folyo vurgu rengini varsa belirtir.
    foil_curtain_mounting_method:
      name: Folyo perde montaj yöntemi
      description: Folyo perdenin nasıl monte edilmesinin veya asılmasının amaçlandığını
        (örn. yapışkan şerit, kuşgözü) açıklar.
    foil_discipline:
      name: Foil disiplini
      description: Foilin tasarlandığı temel sürüş stilini veya disiplini belirtir.
    foil_mast_board_mounting_type:
      name: Foil direği board montaj tipi
      description: Direğin üst kısmında, boarda veya foil rayına bağlanan bağlantı
        arayüzünü tanımlar.
    foil_mast_fuselage_connection_type:
      name: Folyo direk gövdesi bağlantı tipi
      description: Direğin gövdeye veya ön kanat düzeneğine nasıl bağlandığını belirtir.
    foil_mounting_interface:
      name: Foil montaj arayüzü
      description: Parçanın boarda veya diğer foil bileşenlerine bağlanmak için kullandığı
        bağlantı standardını belirtir.
    foil_mounting_system:
      name: Foil montaj sistemi
      description: Board üzerindeki foil veya fin montaj arayüzünü belirtir; bu, kullanıcının
        mevcut ekipmanıyla uyumluluğu sağlar.
    foil_mounting_type:
      name: Foil montaj tipi
      description: Foilin boarda bağlanmasında kullanılan arayüz sistemini belirtir;
        bu, bileşenler arasında uyumluluk sağlar.
    fold_over_elastic_application:
      name: Katlanır elastik kullanım alanı
      description: İlikli lastiğin temel kullanım amacı/uygulama alanı.
    foldability:
      name: Katlanabilirlik
      description: Ayırıcı parçanın depolama veya yeniden yapılandırma amacıyla katlanıp
        katlanmadığını ve nasıl katlandığını açıklar.
    foldability_stow:
      name: Katlanabilirlik (saklama)
      description: Rafın kullanılmadığında katlanarak saklanıp saklanamadığını (örn.
        araca doğru yukarı katlanma)
    folding_style:
      name: Katlanma şekli
      description: Çarpma yastığının taşıma ve depolama için nasıl katlandığını, iniş
        yüzeyinin düzgünlüğünü ve paketlenebilirliğini nasıl etkilediğini gösterir.
    food_basket_items_included:
      name: Yiyecek sepetine dahil ürünler
      description: Sepette yer alan temel gıda ürün türlerini listeler. Böylece kullanıcıların
        alıcının damak zevkine veya beslenme ihtiyaçlarına uygun sepetleri seçmesine
        yardımcı olur.
    food_coloring_form:
      name: Gıda boyası formu
      description: Gıda boyasının sunulduğu fiziksel formu veya uygulama biçimini
        belirtir (örn. jel, sıvı, toz, sprey).
    food_contact_material:
      name: Gıda ile temas eden malzeme
      description: Şarap yapımında kullanılan ekipman ürünlerinin (fermantörler, sifonlar,
        huni) ana hammaddesi; şıra/şarap ile birlikte kullanılır.
    food_packing_medium:
      name: Gıda ambalaj malzemesi
      description: Meyve veya sebzelerin hangi ortam içinde paketlendiğini belirtir
        (örn. su, salamura, şurup, yağ).
    foosball_rod_type:
      name: Langırt çubuğu türü
      description: Çubuğun oyun hissini ve güvenliği etkileyen mekanik yapılandırmasını
        belirtir.
    foot_arch_type_compatibility:
      name: Ayak kemeri türü uyumluluğu
      description: Tabanlığın hangi ayak kemeri profili için tasarlandığını belirtir.
    foot_arch_type_suitability:
      name: Ayak kemeri tipi uygunluğu
      description: Tabanlığın desteklemek üzere tasarlandığı ayak kemeri profilini
        belirtir.
    foot_coverage:
      name: Ayak örtüsü
      description: Bu, bacak giysisinin ayaklı, ayaksız, üzengili veya açık topuklu
        olup olmadığını gösterir.
    foot_guard_type:
      name: Ayak koruma tipi
      description: Bacak koruyucusunda ayak parmağı/ayak koruması bulunup bulunmadığını
        ve bu korumanın sabit mi yoksa çıkarılabilir mi olduğunu belirtir.
    foot_support_level:
      name: Ayak destek seviyesi
      description: Ayakkabı tabanlığının sağladığı yapısal destek veya sertlik seviyesini
        belirtir (örn. düşük, orta, yüksek veya ekstra yüksek).
    footbag_play_style:
      name: Footbag oyun stili
      description: Footbag’in temel kullanım/oyun stilini belirtir.
    football_ball_type:
      name: Futbol topu türü
      description: Futbol topunun maç kullanımı, antrenman veya koleksiyon/sergileme
        gibi temel kullanım amacını belirtir.
    football_dummy_type:
      name: Futbol kuklası tipi
      description: Futbol kuklasının stilini veya işlevsel tasarımını, özel antrenman
        amacını yansıtacak şekilde sınıflandırır.
    football_glove_certification:
      name: Futbol eldiveni sertifikası
      description: Rekabetçi oyun için gerekli sertifikasyonları veya standart uyumluluğunu
        belirtir (örn. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Ayak ucu paneli montaj tipi
      description: Ayak tahtasının karyola iskeletine veya zemine nasıl bağlandığını
        belirtir. Bu özellik kullanıcıların uyumlu donanım ve montaj yöntemlerini
        seçmesine yardımcı olur.
    footboard_style:
      name: Ayak ucu paneli stili
      description: Ayak tahtasının yapısal veya estetik tasarım stilini tanımlar.
    footrest_adjustability:
      name: Ayak desteği ayarlanabilirliği
      description: Ayak dayamalarının, farklı çocuk bacak uzunluklarına uyacak şekilde
        ayarlanıp ayarlanamadığını ve bunun nasıl yapıldığını belirtir.
    footrest_type:
      name: Ayak dayama tipi
      description: Tabure üzerinde ayak dayanağının bulunup bulunmadığını ve tasarımını
        belirtir.
    footstrap_configuration:
      name: Ayak kayışı yapılandırması
      description: Tahta üzerindeki ayak kayışı bağlantı yerleşimini/desenini belirtir.
    footswitch_action_style:
      name: Ayak pedalı anahtarı çalışma türü
      description: Anahtarın anlık mı yoksa kilitlemeli mi çalıştığını ve her iki
        modu da destekleyip desteklemediğini belirtir.
    footswitch_power_source:
      name: Ayak pedalı güç kaynağı
      description: Ayak pedalı anahtarının nasıl güç aldığını belirtir (uygulanabiliyorsa).
        Örn. amfi jakı üzerinden pasif, pil, harici adaptör, USB vb.
    footwear_construction_method:
      name: Ayakkabı üretim yöntemi
      description: Ayakkabının üst kısmının tabana hangi teknikle bağlandığını tanımlar.
        Bu yöntem dayanıklılığı, yeniden tabanlama imkanını ve fiyatı etkiler.
    footwear_cut:
      name: Ayakkabı kesimi
      description: Ayakkabının bilek yaka yüksekliğini belirtir (düşük bilek, orta
        bilek, yüksek bilek). Bu yapı hareket kabiliyeti ile desteği dengeler.
    footwear_size_system:
      name: Ayakkabı beden sistemi
      description: Belirtilen ayakkabı numarası için kullanılan bölgesel numaralandırma
        standardını belirtir (örn. US, EU, UK).
    footwear_support_type:
      name: Ayakkabı destek tipi
      description: Ayakkabının sağladığı biyomekanik desteği veya pronasyon kontrol
        seviyesini belirtir (örn. nötr, denge destekli, hareket kontrollü).
    fork_material:
      name: Çatal malzemesi
      description: Bisikletin ön maşasında kullanılan malzemeyi belirtir; bu özellik
        sertliği, ağırlığı ve sürüş kalitesini etkiler.
    form_factor:
      name: Biçim faktörü
      description: DMX kontrol cihazının temel donanım biçim faktörü.
    formula_car_series_class:
      name: Formula otomobil serisi/sınıfı
      description: Formula aracının hangi yarış serisinde veya sınıfta yarışmak üzere
        üretildiğini belirtir.
    formulation_style:
      name: İçerik formu
      description: Belirli kullanım amaçları veya tercihler için tasarlanmış özel
        formülasyonları vurgular (örn. Barista, Ekstra Kremsi).
    formulation_type:
      name: Formülasyon türü
      description: Dezenfektan spreyin formülasyon tarzı.
    fossil_preparation_level:
      name: Fosil hazırlık seviyesi
      description: Fosil örneği üzerinde yapılan hazırlık/temizleme derecesini belirtir
        (örn. matriks içinde hazırlanmemiş veya tamamen hazırlanmış).
    fossil_preservation_type:
      name: Fosil koruma türü
      description: Fosil korunma türü (örn. permineralize, döküm, kalıp, gösterim).
    fossil_restoration_status:
      name: Fosillerin restorasyon durumu
      description: Numunenin onarılıp onarılmadığı ve nasıl onarıldığı/yeniden oluşturulduğu
        (örn. yapıştırılmış, yeniden yapılandırılmış, kompozit malzeme ile birleştirilmiş).
    foundation_configuration:
      name: Baza yapılandırması
      description: Bazanın tek parça mı yoksa büyük yatak ölçüleri için bölünmüş/iki
        parçalı set olarak mı üretildiğini belirtir.
    foundation_profile:
      name: Baza yüksekliği
      description: Bazanın genel yükseklik kategorisini (örn. ultra alçak, alçak,
        standart veya yüksek profil) sınıflandırır; böylece kullanıcılar yatak yüksekliği
        tercihleri ve çarşaf uyumuna uygun seçimi hızlıca yapabilir.
    frame_adjustability:
      name: Çerçeve ayarlanabilirliği
      description: Çerçevenin ayarlanıp ayarlanamadığını ve nasıl ayarlanabildiğini
        (örn. genişlik/yükseklik ayarı, döndürme/eğim) belirtir; bu da ergonomiyi
        ve projeye uyumu etkiler.
    frame_drum_jingle_configuration:
      name: Def zil düzeni
      description: Defte zil bulunup bulunmadığını ve bulunuyorsa genel zil düzenini
        belirtir.
    frame_drum_tuning_system:
      name: Def akort sistemi
      description: Defin nasıl akort edildiğini veya akort edilebilir olup olmadığını
        belirtir.
    frame_finish:
      name: Çerçeve kaplaması
      description: Çerçeveye uygulanan koruyucu kaplama veya malzeme türü; dayanıklılığı
        ve estetiği etkiler.
    frame_mounting_standard:
      name: Çerçeve montaj standardı
      description: Bot ile frame arasındaki bağlantı standardını tanımlar (örn. 195
        mm 2 noktalı, Trinity 3 noktalı). Bu özellik frame uyumluluğu açısından kritiktir.
    frame_steel_gauge:
      name: Çerçeve çelik kalınlığı ölçüsü
      description: Rafın dikey taşıyıcılarında kullanılan çelik boruların kalınlığını
        (gauge) belirtir; bu özellik dayanıklılık ve stabilitenin önemli bir göstergesidir.
    frame_suspension_type:
      name: Frame süspansiyon tipi
      description: Bisiklet frame’inin rijit, hardtail veya tam süspansiyon gibi süspansiyon
        tasarımını belirtir; bu özellik kullanıcıların amaçlanan kurulumlarına uygun
        frame seçmesine yardımcı olur.
    free_reed_instrument_orientation:
      name: Serbest kamışlı enstrüman oryantasyonu
      description: Enstrümanın ergonomi ve kullanım amacına göre nasıl tutulup çalındığını
        belirtir (örn. körüklü elde kullanım, omuz askılı).
    free_weight_rack_type:
      name: Serbest ağırlık rafı türü
      description: Rafın yapısal stilini veya işlevini sınıflandırır (örn. barbell
        rafı, kettlebell rafı, ağırlık plakası standı).
    freehub_body_type:
      name: Freehub gövde tipi
      description: Arka bisiklet göbeğinin desteklediği freehub gövdesi veya kaset
        sürücü standardını belirtir.
    freehub_driver_standard:
      name: Freehub sürücüsü standardı
      description: Göbek parçasının desteklediği kaset/sürücü bağlantı standardını
        belirtir (örn. Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Freewheel diş standardı
      description: Freewheel’in uyumlu olduğu göbek diş standardını veya ölçüsünü
        belirtir.
    french_horn_bell_construction:
      name: Fransız kornosu çan yapısı
      description: Çanın nasıl üretildiğini ve taşıma/bakım için çıkarılıp çıkarılamadığını
        belirtir.
    french_horn_bell_material:
      name: Korno çanı malzemesi
      description: Fransız kornosunda kullanılan çanın (ve çoğunlukla çan ağzının)
        malzemesini/alaşımını belirtir.
    french_horn_bell_type:
      name: Fransız kornosu çan tipi
      description: Çanın yapım tarzı.
    french_horn_finish:
      name: Fransız kornosu bitişi
      description: Aletin dış yüzeyinin kaplaması/yüzeyi.
    french_horn_included_accessories:
      name: Fransız kornosu (aksesuarlar dahil)
      description: Fransız kornosuyla birlikte verilen aksesuarlar (kol, ağızlık vb.).
    french_horn_leadpipe_material:
      name: Korno ağız borusu malzemesi
      description: Leadpipe’ta kullanılan malzeme/alaşım türü.
    french_horn_wrap_type:
      name: Fransız kornosu sargı tipi
      description: Fransız kornosunun genel sarım/şekil yapılandırması
    fretboard_radius_fit:
      name: Klavye yarıçap uyumluluğu
      description: Kapo pedinin eğiminin düz veya kavisli klavyeler için tasarlanıp
        tasarlanmadığını veya birden fazla klavye kavisini karşılayacak şekilde ayarlanabilir
        olup olmadığını gösterir.
    friction_surface_included:
      name: Sürtünme yüzeyi dahil
      description: Volanın değiştirilebilir/monte edilmiş bir sürtünme yüzeyine (örn.
        insert, halka) sahip olup olmadığı veya tek parça bir sürtünme yüzeyine sahip
        olup olmadığı.
    fringe_curtain_finish:
      name: Püskül perde bitişi/yüzeyi
      description: Püskül yüzeyinin görsel bitişini belirtir (parlaklık/doku).
    fringe_curtain_material:
      name: Saçaklı perde kumaşı
      description: Perde şeritlerinin ana malzemesini belirtir (örn. PET folyo, plastik,
        kağıt, kumaş).
    fringe_curtain_use_location:
      name: Püskül perde kullanım alanı
      description: Püskül perdenin iç mekan, dış mekan veya her iki kullanım için
        tasarlanıp tasarlanmadığını belirtir.
    fringe_trim_style:
      name: Püskül şerit stil türü
      description: Püskül şeridin yapısını/stilini belirtir (şeritlerin veya halkaların
        nasıl oluşturulduğu ve sunulduğu).
    front_axle_standard:
      name: Ön aks standardı
      description: Maşanın kabul edecek şekilde tasarlandığı aks çapı ve genişliğini
        listeler (örn. 15 × 110 mm Boost); bu özellik göbek uyumluluğunu sağlar.
    front_button_configuration:
      name: Ön düğme düzeni
      description: Ceketin ön düğme stilini belirtir. Tek sıra veya çift sıra düğmeli
        olup olmadığını ve ön düğme sayısını gösterir.
    front_closure_style:
      name: Ön kapama stili
      description: Trençkotun ön tasarım stilini belirtir. Örn. tek sıra düğmeli,
        çift sıra düğmeli, açık, kruvaze veya fermuarlı.
    front_decoration_type:
      name: Ön süsleme türü
      description: Şapkanın ön kısmında bulunan süsleme veya yama türünü belirtir
        (örn. işlemeli yama, deri yama).
    front_point_configuration:
      name: Ön uç yapılandırması
      description: Ön dişlerin tasarımını belirtir (tek uçlu, çift uçlu, modüler,
        değiştirilebilir). Bu yapı buz ve karma zeminlerde nüfuz hassasiyetini etkiler.
    front_seat_position:
      name: Ön koltuk konumu
      description: Ön sıradaki koltuğun hangi taraf/konum için tasarlandığını belirtir.
    front_style:
      name: Ön stil
      description: Chino pantolonun ön tasarımını belirtir. Düz ön, pileli veya farklı
        detaylara sahip olup olmadığını gösterir.
    frosting_or_icing_type:
      name: Krema veya şeker hamuru türü
      description: Kek veya tatlı barı üzerine uygulanan Krema veya şeker hamuru türü.
    fruit_cultivar_or_variety:
      name: Meyve kültivarı veya çeşidi
      description: Meyvenin belirli kültivarını veya varyete adını belirtir (örn.
        Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Meyve kesim stili
      description: Meyvenin nasıl hazırlandığını veya kesildiğini belirtir (örn. bütün,
        dilimlenmiş, küp şeklinde).
    fruit_mix_variety:
      name: Meyve karışımı çeşidi
      description: Meyve karışımının temalı harmanını veya genel çeşidini belirtir
        (örn. Tropical Mix, Berry Medley).
    fruit_piece_form:
      name: Meyve parça formu
      description: Kurutulmuş meyve parçalarının fiziksel kesim veya sunum şeklini
        belirtir (örn. bütün, dilimlenmiş, toz).
    fruit_snack_form:
      name: Meyve atıştırmalığı formu
      description: Meyve atıştırmalığının sunulduğu fiziksel formu veya stilini sınıflandırır.
    fruit_topping_format:
      name: Meyve sosu formatı
      description: Sosun formunu, dokusunu veya sunum stilini belirtir; böylece kullanıcılar
        sos, şurup, parçacıklı meyve veya patlayan inci gibi seçenekler arasında seçim
        yapabilir.
    fruit_variety:
      name: Meyve çeşidi
      description: Meyve şarabı tarifi/kiti/malzemesi için kullanılan temel meyveyi
        belirtir (örn. elma, kiraz, böğürtlen).
    fuel_cap_gasket_seal_material:
      name: Yakıt kapağı conta/sızdırmazlık malzemesi
      description: Yakıt kapağındaki sızdırmazlık contasında/O-ring’de kullanılan
        malzemeyi belirtir.
    fuel_cap_locking_mechanism:
      name: Yakıt kapağı kilitleme mekanizması
      description: Kilitli yakıt kapağında kullanılan kilitleme yöntemini belirtir.
    fuel_cap_type:
      name: Yakıt kapağı tipi
      description: Araç yakıt dolum ağzında kullanılan yakıt kapağının işlevsel türünü/tasarımını
        belirtir.
    fuel_cap_venting:
      name: Yakıt deposu kapağı havalandırması
      description: Yakıt deposu kapağının havalandırmalı olup olmadığını ve varsa
        havalandırma tipini gösterir.
    fuel_filter_features:
      name: Yakıt filtresi özellikleri
      description: Yakıt filtresinin dikkat çeken işlevsel özelliklerini listeler
        (su ayırma, tahliye valfi, sensör bağlantı noktası vb.).
    fuel_filter_media_material:
      name: Yakıt filtresi filtreleme malzemesi
      description: Yakıt filtresi elemanının içinde kullanılan temel filtreleme malzemesini
        belirtir.
    fuel_filter_mounting_connection_type:
      name: Yakıt filtresi montaj/bağlantı türü
      description: Yakıt filtresinin nasıl bağlandığını/takıldığını belirtir (vidalı/spin-on,
        hızlı bağlantı, hortum nipeli, banjo vb.).
    fuel_injection_cleaning_method:
      name: Yakıt enjeksiyonu temizleme yöntemi
      description: Kitin, yakıt enjeksiyon sistemini temizlemek için nasıl kullanıldığını
        belirtir.
    fuel_injector_electrical_connector_type:
      name: Yakıt enjektörü elektrik konnektör türü
      description: Yakıt enjektörünün elektrik konnektörü standardını/şeklini belirtir.
    fuel_injector_seat_type:
      name: Yakıt enjektör yuvası tipi
      description: Emme manifoldu/yakıt rayındaki sızdırmazlık için kullanılan enjektör
        uç/yuva bağlantı stilini belirtir.
    fuel_injector_spray_pattern:
      name: Yakıt enjektörü püskürtme deseni
      description: Üretici veya sektör terminolojisine göre enjektörün yakıt püskürtme/dağıtım
        desenini belirtir (örn. konik, yelpaze, kalem akışı, çok delikli).
    fuel_level_sensor_mounting_type:
      name: Yakıt seviye sensörü montaj türü
      description: Yakıt seviye sensörünü/göndericisini yakıt deposuna veya pompa
        modülüne bağlamak için kullanılan fiziksel montaj arayüzünü belirtir.
    fuel_level_sensor_sensing_mechanism:
      name: Yakıt seviyesi sensörü algılama mekanizması
      description: Yakıt seviye sensörü veya gönderici ünitesinde yakıt seviyesini
        ölçmek için kullanılan algılama mekanizmasını/teknolojisini belirtir.
    fuel_line_compliance_standard:
      name: Yakıt hattı uyumluluk standardı
      description: Yakıt hattının karşıladığı düzenleyici veya endüstri standardını
        belirtir (özellikle denizcilik uygulamalarında yaygındır).
    fuel_line_connector_interface_type:
      name: Yakıt hattını bağlayıcı arayüz tipi
      description: Yakıt hattının veya bağlantı parçasının uç kısmındaki bağlantı/arayüz
        stilini belirtir.
    fuel_pressure_regulator_body_material:
      name: Yakıt basınç regülatörü gövde malzemesi
      description: Dayanıklılık ve korozyon direnci için regülatör gövdesinde kullanılan
        malzemeyi belirtir.
    fuel_pressure_regulator_mounting_type:
      name: Yakıt basınç regülatörü montaj türü
      description: Yakıt basınç regülatörünün nasıl monte edildiğini veya takıldığını
        belirtir; bu, uyumluluğu ve araca uygunluğu etkiler.
    fuel_pump_inlet_type:
      name: Yakıt pompası giriş tipi
      description: Pompa girişindeki bağlantı tipi.
    fuel_pump_mounting_location:
      name: Yakıt pompası montaj konumu
      description: Yakıt pompasının araç yakıt sistemi üzerinde veya içinde nereye
        monte edildiğini.
    fuel_pump_outlet_connection_type:
      name: Yakıt pompası çıkış bağlantı tipi
      description: Yakıt pompası çıkışındaki fiziksel bağlantı tipini belirtir; bu,
        uyumluluğu/montaj uygunluğunu etkiler.
    fuel_system_application:
      name: Yakıt sistemi uygulaması
      description: Yakıt pompasının desteklemek üzere tasarlandığı yakıt besleme sistemi
        yapısını (örn. karbüratörlü, EFI, GDI, dizel besleme/transfer) belirtir.
    fuel_system_connection_type:
      name: Yakıt sistemi bağlantı tipi
      description: Kitin desteklediği yakıt sistemi bağlantı standardını/standartlarını
        veya adaptör arayüzünü/arayüzlerini belirtir.
    fuel_system_type:
      name: Yakıt sistemi tipi
      description: Motorun yakıt besleme sistemini (örn. karbüratör veya yakıt enjeksiyon
        sistemi) belirtir.
    fuel_tank_installation_position:
      name: Yakıt deposu montaj konumu
      description: Yakıt deposunun araç üzerindeki tipik montaj konumunu belirtir.
    fuel_tank_orientation:
      name: Yakıt deposu yönü
      description: Yakıt deposunun yatay mı yoksa dikey mi monte edilmek üzere tasarlandığını
        belirtir.
    fuel_tank_shape:
      name: Yakıt deposu şekli
      description: Yakıt deposunun genel formunu/şeklini açıklar; bu, fiziksel uyumluluk
        ve doğru yedek parça eşleşmesini destekler.
    fur_type:
      name: Kürk türü
      description: El ısıtıcısının veya çantanın dış kısmındaki kürkün hangi hayvan
        türüne ya da sentetik malzemeye ait olduğunu belirtir.
    furniture_finish:
      name: Mobilya kaplaması
      description: Mobilyaya uygulanan yüzey işlemini veya kaplamayı açıklar; bu,
        görünümünü ve bakım gereksinimlerini etkiler.
    fuse_form_factor:
      name: Sigorta form faktörü
      description: Sigortanın, hedeflenen sigorta yuvasına veya sigorta bloğuna uygun
        olmasını sağlamak için fiziksel sigorta tipini/formatını (örn. bıçak tipi
        veya kartuş tipi) belirtir.
    fuse_terminal_or_mount_style:
      name: Sigorta terminali veya montaj stili
      description: Sigortanın mekanik/elektriksel olarak nasıl bağlandığını (takmalı/geçmeli,
        cıvatalı veya hat üstü) belirtir.
    fusible_application_method:
      name: Yapıştırıcı uygulama yöntemi
      description: Fusibl yapıştırıcının nasıl etkinleştirildiğini/uygulandığını (örn.
        ütüyle ısı uygulama, presleme, dikişle güçlendirme) belirtir.
    fusible_hem_tape_application_method:
      name: Yapışkan paça bandı uygulama yöntemi
      description: Bandın nasıl etkinleştirildiğini/uygulandığını (örn. ütüyle yapıştırma,
        ısı presi) açıklar.
    fusible_seam_tape_activation_method:
      name: Yapışkan dikiş bandı aktivasyon yöntemi
      description: Yapıştırıcının uygulama sırasında nasıl etkinleştirildiğini belirtir.
    fusible_seam_tape_application:
      name: Yapışkan dikiş bandı uygulaması
      description: Yapıştırılabilir dikiş bandının temel kullanım amacını belirtir.
    fusible_seam_tape_material:
      name: Yapışkan dikiş bandı malzemesi
      description: Bandın/ağın/taşıyıcı katmanın malzemesini veya bileşimini belirtir
        (bağlandığı kumaşı değil).
    fusible_seam_tape_washability:
      name: Yapışkan dikiş bandı yıkanabilirliği
      description: Yapıştırılmış dikişin yıkama veya temizleme sonrasında sağlam kalıp
        kalmadığını belirtir.
    fusible_seam_tape_waterproof_rating:
      name: Yapışkan dikiş bandı su geçirmezlik derecesi
      description: Dikiş bandının uygulama sonrasında su geçirmez veya suya dayanıklı
        bir dikiş oluşturmak için tasarlanıp tasarlanmadığını belirtir.
    fusible_tape_backing_type:
      name: Yapışkan bandın arka yüz tipi
      description: Bandın ayırıcı kâğıda/koruyucu katmana sahip olup olmadığını ve
        bunun hangi formda olduğunu belirtir; bu, kullanım ve uygulamayı etkiler.
    futon_frame_conversion_mechanism:
      name: Futon iskeletinin dönüşüm mekanizması
      description: İskeletin kanepe, dinlenme ve yatak konumları arasında dönüştürülmesini
        sağlayan mekanizmayı veya yapısal sistemi tanımlar.
    gaiter_height_type:
      name: Tozluk yüksekliği tipi
      description: Tozlukları, bacakta sağladıkları kaplama yüksekliğine göre sınıflandırır
        (örn. bilek hizası, orta baldır, diz üstü veya uyluk hizası).
    game_variation:
      name: Oyun çeşidi
      description: Setin tasarlandığı oyun tarzını/türünü belirtir (örn. klasik tetherball,
        ipli tenis, speedball).
    garlic_preparation_style:
      name: Sarımsak hazırlama stili
      description: Sarımsağın satış öncesinde nasıl hazırlandığını veya işlendiğini
        (örn. bütün, kıyılmış, toz hâlinde) belirtir.
    garlic_variety:
      name: Sarımsak çeşidi
      description: Sunulan sarımsağın botanik veya ticari çeşidini/kültivarını belirtir.
    garment_back_style:
      name: Giysinin arka tasarımı
      description: Giysinin arka kısmının tasarımını veya yapısını (örn. sırt dekolteli,
        racerback, çapraz askılı sırt) belirtir.
    garment_pattern_type:
      name: Giysi desen türü
      description: Dikiş kalıbının hangi tür giysi yapmak için tasarlandığını belirtir.
    garnish_type:
      name: Süsleme türü
      description: Kokteyli tamamlamak için kullanılan garnitürün ne olduğunu (malzeme
        veya garnitür türü) belirtir.
    gas_lift_class:
      name: Gazlı amortisör sınıfı
      description: Oturma yüksekliği ayarında kullanılan gazlı amortisör silindirinin
        güvenlik ve dayanıklılık sınıfını belirtir.
    gas_propellant_type:
      name: Gaz itici türü
      description: Blaster gazla çalışıyorsa, önerilen veya uyumlu gaz itici türünü
        belirtir.
    gatta_tabla_tuning_block_material:
      name: Gatta (tabla akort bloğu) malzemesi
      description: Akort kayışı ile gövde arasında kullanılan akort bloklarının (gatta)
        malzemesini belirtir.
    gauge_mounting_type:
      name: Gösterge montaj tipi
      description: Yakıt göstergesinin deniz aracına nasıl monte edildiğini/takıldığını
        belirtir.
    gauge_style:
      name: Gösterge stili
      description: Pompanın kullandığı basınç göstergesi türünü (örn. analog gösterge,
        dijital ekran veya göstergesiz) belirtir.
    gear_oil_api_classification:
      name: Dişli yağı API sınıflandırması
      description: Diferansiyellerde/manuel şanzımanlarda kullanılan dişli yağları
        için API GL sınıflandırmasını belirtir.
    gel_wax_density_grade:
      name: Jel mum yoğunluk derecesi
      description: Jel mumun yoğunluk derecesini belirtir; bu, berraklığı, koku yükünü
        ve gömülü süslemelere uygunluğunu etkiler.
    gel_wax_transparency_level:
      name: Jel mum şeffaflık seviyesi
      description: Jel mumun kullanım amacına uygun şekilde kullanıldığında gösterdiği
        berraklık/opaklık düzeyini açıklar.
    gelatin_form:
      name: Jelatin formu
      description: Kullanıcıların tarifler ve endüstriyel uygulamalar için doğru formu
        seçebilmesi amacıyla jelatinin fiziksel formunu açıklar.
    gelatin_or_gelling_agent_source:
      name: Jelatin veya jelleştirici maddenin kaynağı
      description: Üründe kullanılan jelatinin veya jelleştirici maddenin kaynağını/türünü
        belirtir; bu, beslenme tercihleri ve dinî hassasiyetler açısından önemlidir.
    gelatin_source:
      name: Jelatin kaynağı
      description: Jelatinin hayvansal, bitkisel veya sentetik kaynağını belirtir;
        böylece kullanıcılar beslenme, etik veya dinî gereksinimlerle uyumluluğunu
        doğrulayabilir.
    gelling_agent:
      name: Jelleştirici madde
      description: Tatlıyı kıvamlandırmak veya jelleştirmek için kullanılan temel
        maddeyi belirtir; bu, beslenmeye uygunluk ve doku açısından önemlidir.
    gemstone_clarity_grade:
      name: Değerli taşın berraklık derecesi
      description: Değerli taşın berraklık derecesi (derecelendirildiğinde).
    gemstone_creation_method:
      name: Değerli taş üretim yöntemi
      description: Değerli taşın doğal, laboratuvarda üretilmiş veya imitasyon/simülant
        olup olmadığını belirtir.
    gemstone_cut_style:
      name: Değerli taş kesim stili
      description: Değerli taş örneğinin kesim stilini/yüzey işlemini açıklar.
    gemstone_treatment_status:
      name: Değerli taş işlem durumu
      description: Değerli taşın işlem görüp görmediğini ve nasıl iyileştirildiğini/geliştirildiğini
        belirtir.
    geological_period:
      name: Jeolojik dönem
      description: Fosilin biliniyorsa ait olduğu jeolojik dönemi (ve isteğe bağlı
        olarak epoku) belirtir (örn. Jura, Kretase, Eosen).
    gift_box_tin_insert_type:
      name: Hediye kutusu/teneke kutu iç yerleştirme tipi
      description: Kutu/teneke kutu içindeki ürünleri düzenlemek veya korumak için
        kullanılan iç yerleştirme düzenini.
    gift_box_tin_sustainability_features:
      name: Hediye kutusu/teneke kutu sürdürülebilirlik özellikleri
      description: Hediye kutusu/teneke kutu ambalajının sürdürülebilirlikle ilgili
        özellikleri.
    gift_box_tin_window_type:
      name: Hediye kutusu/teneke pencere tipi
      description: Hediye kutusunda bir teşhir penceresi bulunup bulunmadığını ve
        varsa bunun stilini belirtir.
    gift_message_option:
      name: Hediye mesajı seçeneği
      description: Hediye mesajı/notu eklenip eklenemeyeceğini ve bunun nasıl sunulduğunu
        (yok, dahil veya özelleştirilebilir) belirtir.
    ginger_maturity:
      name: Zencefilin olgunluk seviyesi
      description: Zencefilin hasat aşamasını (örn. genç veya olgun) belirtir; bu,
        lezzet yoğunluğunu ve tercih edilen kullanım alanlarını etkiler.
    ginger_variety:
      name: Zencefil çeşidi
      description: Lezzet profillerini ve mutfaktaki kullanım alanlarını ayırt etmek
        için zencefil ailesindeki kültivarı, türü veya ilgili rizomu belirtir.
    glass_kiln_controller_type:
      name: Cam fırını kontrol cihazı türü
      description: Fırınla birlikte sunulan sıcaklık/pişirme kontrol cihazının tipini.
    glass_kiln_firing_application:
      name: Cam fırını pişirme uygulaması
      description: Fırının tasarlandığı temel cam işleme uygulamasını/uygulamalarını
        belirtir.
    glass_stone_application_method:
      name: Cam taş uygulama yöntemi
      description: Cam taşların projelerde nasıl uygulanmasının/sabitlenmesinin amaçlandığını
        (örn. yapıştırmalı, ısıyla yapışan, dikilebilir) belirtir.
    glass_tint:
      name: Cam renk tonu
      description: Işık maruziyetini kontrol etmek için şişede kullanılan cam/plastik
        renk tonunu belirtir (özellikle bira ve şarap yapımında yaygındır).
    glaze_firing_atmosphere:
      name: Sır pişirme atmosferi
      description: Sırın uygun olduğu pişirme atmosferini/atmosferlerini belirtir.
    glaze_opacity:
      name: Sır opaklığı
      description: Sırın pişirme sonrasında ne kadar şeffaf göründüğünü belirtir.
    glaze_product_form:
      name: Sır ürün formu
      description: Sır ürününün sunulduğu fiziksel formu (örn. sıvı, kuru toz, konsantre,
        sprey) belirtir.
    glider_avionics_package:
      name: Planör aviyonik paketi
      description: Planörde kurulu bulunan seyrüsefer ve uçuş enstrümantasyonu seviyesini
        belirtir.
    glider_certification_rating:
      name: Planör sertifikasyon derecesi
      description: Planörün güvenlik ve performans seviyesini gösteren resmî sertifikasyon
        sınıfını (örn. EN-A, EN-B) belirtir.
    glider_landing_gear_configuration:
      name: Planör iniş takımı yapılandırması
      description: Planörde kullanılan iniş takımı yapılandırmasını belirtir.
    glider_launch_method:
      name: Planör kalkış yöntemi
      description: Planörün genellikle nasıl kalkış yaptığını veya kendi kendine nasıl
        kalkış yaptığını belirtir.
    glider_performance_class:
      name: Planör performans sınıfı
      description: Planörler için yaygın olarak kullanılan yarış/performans sınıfını
        veya kategorisini belirtir.
    glitter_application_method:
      name: Sim uygulama yöntemi
      description: El işi siminin nasıl uygulanmasının/kullanılmasının amaçlandığını
        belirtir (örn. serpme/sallamalı uygulama, karıştırmalı kullanım, sürterek
        uygulama, yapıştırıcı üzerine uygulama, fırçayla uygulama, sprey uygulama,
        ısıyla sabitleme/kabartma).
    glitter_eco_friendly_claim:
      name: Simin çevre dostu özelliği
      description: Dökme sim formüllerine özgü çevresel/eko iddiaları belirtir.
    glitter_effect_type:
      name: Sim efekt türü
      description: Simin/payetlerin temel rengin ötesindeki görsel efektini (örn.
        holografik, yanardöner) açıklar.
    glitter_glue_base_solvent_type:
      name: Simli yapıştırıcı baz/çözücü tipi
      description: Simli yapıştırıcının temel bazını açıklar; bu, temizlik ve malzeme
        uyumluluğu açısından yaygın bir kullanıcı kaygısıdır.
    glitter_opacity_coverage:
      name: Sim opaklığı/kapatıcılığı
      description: Sim efektinin uygulandığında ne kadar opak göründüğünü belirtir.
    glitter_use_suitability:
      name: Simin kullanım uygunluğu
      description: Sim tozunun temel kullanım amacını veya onaylı kullanım alanını
        (örn. yalnızca el işi kullanımı, kozmetik sınıfı/vücut için güvenli veya gıda
        ile temasa uygun) belirtir.
    glove_armor_placement:
      name: Eldivendeki koruma bölgeleri
      description: Koruyucu zırhın eldivenin hangi bölgelerinde bulunduğunu belirtir.
    glove_cuff_length:
      name: Eldiven manşet uzunluğu
      description: Yarış eldiveninin bilek/ön kol bölgesindeki manşet uzunluğu stilini
        belirtir.
    glove_finger_coverage:
      name: Eldivenin parmak kaplama durumu
      description: Eldivenin sağladığı parmak kaplama seviyesini, tam parmaklı modellerden
        parmaksız tasarımlara kadar açıklar.
    glove_finger_design:
      name: Eldiven parmak tasarımı
      description: Eldivenin parmak yapısını (örn. beş parmaklı veya mitten tipi)
        belirtir.
    glove_fit_profile:
      name: Eldiven kalıp yapısı
      description: Oyuncuların tercih ettikleri hissi seçebilmeleri için eldivenin
        iç yapısını ve genel formunu açıklar.
    glove_insulation:
      name: Eldiven yalıtımı
      description: Eldivenin yalıtımını/termal yapısını veya ısıtma özelliğini (örn.
        yalıtım seviyesi, astar/yalıtım teknolojisi veya ısıtmalı tip) belirtir.
    glove_palm_material:
      name: Eldiven avuç içi malzemesi
      description: Eldivenin avuç içi kısmında (ana temas/tutuş yüzeyi) kullanılan
        temel malzemeyi belirtir; bu malzeme el üstü kısmından farklı olabilir.
    glove_size:
      name: Eldiven bedeni
      description: Lapa eldivenlerinin uygun olduğu genel el boyutunu belirtir; bu
        genellikle giyim tipi beden kodları veya çocuk bedenleriyle ifade edilir.
    glove_webbing_style:
      name: Eldiven ağ örgüsü tipi
      description: Eldivenin ağ veya cep tasarımını tanımlar; bu, top kontrolünü,
        pozisyona uygunluğu ve oyuncu tercihini etkiler.
    glow_effect:
      name: Parlama efekti
      description: Jel topların düşük ışıklı oyunlarda kullanılmak üzere karanlıkta
        parlayan veya iz bırakıcı özelliklere sahip olup olmadığını belirtir.
    glow_plug_connector_type:
      name: Kızdırma bujisi bağlantı tipi
      description: Kızdırma bujisi üzerindeki, araç kablo tesisatına bağlanmak için
        kullanılan elektrik terminali/bağlantı tipi.
    glow_plug_heating_element_type:
      name: Kızdırma bujisi ısıtma elemanı tipi
      description: Kızdırma bujisinde kullanılan ısıtma elemanının tipini/teknolojisini
        belirtir.
    glue_application_format:
      name: Yapıştırıcı uygulama formatı
      description: Okul yapıştırıcısının uygulanmasında kullanılan aplikatör/dağıtım
        formatını belirtir.
    glue_applicator_type:
      name: Yapıştırıcı aplikatör tipi
      description: Sıvı yapıştırıcının uygulanmasında kullanılan entegre aplikatör/ucun
        tipini belirtir.
    glue_base_formulation:
      name: Yapıştırıcı baz formülasyonu
      description: Kraf sıvı yapıştırıcısının temel kimyasal/baz formülasyonunu belirtir;
        bu, performans, güvenlik ve temizlik özelliklerini etkiler.
    glue_gun_nozzle_style:
      name: Yapıştırıcı tabancası uç tasarımı
      description: Yapıştırıcı tabancasının fiziksel nozul uç tipini belirtir; bu,
        uygulama hassasiyetini ve yapıştırıcı kaplamasını etkiler.
    glue_safety_standard:
      name: Yapıştırıcı güvenlik standardı
      description: Yapıştırıcının etiketleme ve yaygın standartlara göre toksik olmayan
        / çocuklar için güvenli olup olmadığını belirtir.
    goal_frame_material:
      name: Kale direği malzemesi
      description: Kale direkleri/çerçevesinin malzemesini belirtir; bu, ağırlığı,
        taşınabilirliği ve hava koşullarına dayanıklılığı etkiler.
    goal_size:
      name: Kale boyutu
      description: Futbol kalesini, ham ölçüler yerine daha hızlı seçim yapmayı sağlayan
        standart veya antrenman boyutu gruplarına göre sınıflandırır.
    goal_size_classification:
      name: Kale boyut sınıfı
      description: Kalenin standart boyut sınıfını (örn. tam ölçü standart, genç,
        mini) belirtir; böylece kullanıcılar oyun seviyelerine uygun ekipmanı hızlıca
        seçebilir.
    goal_size_standard:
      name: Kale boyut standardı
      description: Kalenin hangi resmî veya yaş grubuna yönelik standarda (örn. World
        Aquatics standardı, 12U) uygun olduğunu belirtir.
    goalie_configuration:
      name: Kaleci ayarı
      description: Masanın her tarafında kaç kaleci bulunduğu konfigürasyonunu (örn.
        Amerikan 3 kalecili, Avrupa 1 kalecili stil) belirtir.
    goalie_playing_surface:
      name: Kaleci oyun zemini
      description: Buz hokeyi kaleci ekipman setinin tasarlandığı temel oyun yüzeyini
        veya ortamı belirtir.
    goalkeeper_glove_cut:
      name: Kaleci eldiveni kesimi
      description: Kaleci eldivenlerinin avuç içi/parmak yapım stilini (kesimini)
        belirtir; bu, uyumu, top hissini ve kontrolü etkiler.
    goalkeeper_training_aid_type:
      name: Kaleci antrenman ekipmanı tipi
      description: Kaleci antrenman yardımcısının stilini tanımlar ve doğru şekilde
        filtrelenmesini sağlar.
    goblet_drum_playing_style:
      name: Darbuka çalma stili
      description: Enstrümanın esas olarak elle çalınmak üzere mi yoksa baget/çubuklarla
        kullanılmak üzere mi tasarlandığını belirtir.
    gobo_format:
      name: Gobo şekli
      description: Projektörün kabul ettiği gobo boyutunu/standartını (çap ve kalınlık
        sınıfı) belirtir; bu, yedek veya özel gobolarla uyumluluğu sağlar.
    gobo_root_variety:
      name: Gobo kök çeşidi
      description: Gobo (dulavratotu) kökünün belirli kültivarını veya çeşidini belirtir.
    gobo_rotation:
      name: Gobo rotasyonu
      description: Gobonun dönebilen olup olmadığını ve hangi yönde dönebildiğini
        belirtir.
    goggle_accessory_type:
      name: Gözlük aksesuar türü
      description: Aksesuar türünü (örn. kılıf, kutu, kayış) sınıflandırır; böylece
        kullanıcılar bu geniş ürün kategorisini filtreleyebilir.
    goggle_features:
      name: Gözlük özellikleri
      description: Gözlüklerin sunduğu özel işlevsel veya tasarımsal özellikleri listeler.
    goggle_fit_design:
      name: Gözlük uyum tasarımı
      description: Gözlüklerin nasıl takılmak veya yüzeye oturmak üzere tasarlandığını,
        gözlük üstü kullanım (OTG) uyumluluğu dahil olmak üzere açıklar.
    goggle_gasket_material:
      name: Gözlük conta malzemesi
      description: Yüze temas eden contanın malzemesini belirtir; bu, konforu, alerji
        riskini ve sızdırmazlığı etkiler.
    goggle_integration:
      name: Goggle uyumluluğu
      description: Kaskın gözlüklerle birlikte kullanılmak üzere tasarlanıp tasarlanmadığını
        ve gözlük sabitlemeye yönelik entegre özellikler içerip içermediğini belirtir.”
    goggle_lens_shape:
      name: Gözlük camı şekli
      description: Yedek camın eğrilik profilini (örn. silindirik, küresel, torik)
        tanımlar; bu, görüntü bozulmasını ve görüş alanını etkiler.
    goggle_lens_tint:
      name: Gözlük camı renk tonu
      description: Camın renk tonunu veya yüzey bitişini tanımlar; bu, ışık geçirgenliğini,
        renk algısını ve estetik görünümü etkiler.
    goggle_strap_material:
      name: Gözlük kayışı malzemesi
      description: Baş kayışında kullanılan temel malzemeyi belirtir; bu, dayanıklılığı
        ve konforu etkiler.
    golf_accessory_set_purpose:
      name: Golf aksesuar seti kullanım amacı
      description: Golf aksesuar setinin temel kullanım amacını veya temasını belirtir.
    golf_bag_style:
      name: Golf çantası stili
      description: Golf çantasının temel tasarımını veya kullanım stilini belirtir
        (örn. stand, cart, staff).
    golf_ball_alignment_design:
      name: Golf topu hizalama tasarımı
      description: Top yüzeyine basılmış veya kalıplanmış herhangi bir görsel hizalama
        yardımcısını belirtir.
    golf_ball_construction:
      name: Golf topu yapımı
      description: Golf topunun yapımında kullanılan katman/parça sayısını belirtir;
        bu sayı topun dönüşünü, hissini ve mesafesini etkiler.
    golf_ball_cover_material:
      name: Golf topu kaplama malzemesi
      description: Golf topunun dış kaplama malzemesini tanımlar. Bu malzeme topun
        dönüş hızını, dayanıklılığını ve vuruş hissini etkiler.
    golf_cart_cover_climate_use:
      name: Golf arabası örtüsü iklim kullanım türü
      description: Bu ürün, saklama örtüsünün dayanabileceği birincil iklim/mevsim
        durumunu belirtir.
    golf_cart_enclosure_fit_type:
      name: Golf sepeti muhafaza tipi
      description: Kabinin belirli bir koltuk sayısı/şekil faktörü için mi tasarlandığını
        yoksa evrensel/ayarlanabilir bir uyum mu sunduğunu belirtir.
    golf_cart_intended_use:
      name: Golf sepetinin kullanım amacı
      description: Golf sepetinin tasarlandığı veya yapılandırıldığı asıl kullanım
        amacı.
    golf_club_number:
      name: Golf kulübü numarası
      description: Kulüp üzerinde basılı olan belirli numarayı veya wedge tanımını
        belirtir (örn. 5, PW, GW).
    golf_club_part_type:
      name: Golf sopası parça türü
      description: Golf kulübü aksesuarını veya bileşenini yaygın alt türlere göre
        sınıflandırır (örn. adaptör kovanı, ferrule, ağırlık).
    golf_grip_size:
      name: Golf sopası sapı boyutu
      description: Golf sopasının sapının genel dış boyut kategorisini belirtir ve
        sapın elde nasıl hissettirdiğini gösterir.
    golf_shoe_spike_type:
      name: Golf ayakkabısı çivisi türü
      description: Golf ayakkabılarının dış tabanında kullanılan çekiş sisteminin
        türünü belirtir (örn. çivili veya çivisiz tasarımlar).
    golf_tee_style:
      name: Golf tee stili
      description: Golf tee'sinin yapısal veya işlevsel stilini/tasarımını tanımlar.
        Bu stil topun yüksekliğini, dayanıklılığını veya dönüş hızının azaltılmasını
        etkiler.
    golf_training_focus:
      name: Golf antrenmanına odaklanma
      description: Ürünün geliştirmeyi amaçladığı temel beceriyi veya yönü sınıflandırır.
    golf_training_objective:
      name: Golf antrenmanı hedefi
      description: Geliştirmeye yönelik olduğu temel golf becerisi veya yönü
    gong_profile_type:
      name: Gong profil tipi
      description: Opera gongunun fiziksel profilini belirtir (örn. düz veya yükseltilmiş
        merkezli). Bu yapı tonu ve çalma stilini önemli ölçüde etkiler.
    grading_scale:
      name: Derecelendirme ölçeği
      description: Derecelendirilmiş külçe paranın üzerinde kullanılan derecelendirme
        ölçeği (örn. Sheldon 1–70).
    grading_service:
      name: Derecelendirme hizmeti
      description: Madeni para veya banknot için üçüncü taraf derecelendirme/sertifikasyon
        kuruluşu (örn. PCGS, NGC).
    graduation_increment:
      name: Ölçü aralığı
      description: Dikiş ölçer üzerindeki en küçük basılı/işlenmiş bölmeyi belirtir
        (işaretlerin çözünürlüğü).
    grain_processing_method:
      name: Tahıl işleme yöntemi-
      description: Tahıla uygulanan temel işleme yöntemini belirtir (örn. yarı haşlanmış,
        ezilmiş, filizlendirilmiş). Bu işlem pişirme süresini, dokuyu ve besin değerini
        etkiler.
    grand_piano_soundboard_material:
      name: Kuyruklu piyano ses tahtası malzemesi
      description: Piyano ses tablasında (rezonans tablası) kullanılan ana malzeme.
        Bu özellik tonu ve dayanıklılığı etkiler.
    grappling_dummy_pose:
      name: Güreş antreman mankeni
      description: Mankenin varsayılan vücut pozisyonunu/duruşunu tanımlar ve hangi
        egzersiz ve teknikleri desteklediğini belirler.
    grease_application:
      name: Yağlama uygulaması
      description: Yağın hangi araç bileşeninde veya kullanım alanında kullanılacağını
        belirtir.
    grease_consistency_grade_nlgi:
      name: Gres yağı kıvamı derecesi (NLGI)
      description: Yağın kıvamını gösteren NLGI kıvam numarasını belirtir (örn. NLGI
        2 yaygın çok amaçlı yağdır).
    grease_thickener_type:
      name: Yağ kalınlaştırıcı türü
      description: Gres formülasyonunda kullanılan kalınlaştırıcı/sabun sistemini
        belirtir.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Great Highland gayda üfleme borusu valf tipi
      description: Üfleme borusunda kullanılan geri dönüşsüz valf sistemini belirtir.
    great_highland_bagpipes_drone_configuration:
      name: Great Highland gayda drone konfigürasyonu
      description: Sete dahil olan drone türlerini belirtir.
    great_highland_bagpipes_mounting_material:
      name: Great Highland gaydası montaj malzemesi
      description: Gayda üzerindeki dekoratif süslemelerin malzemesini belirtir (örn.
        nikel gümüşü, taklit fildişi).
    greens_maturity_stage:
      name: Yeşillik olgunluk aşaması
      description: Yeşil bitkinin hasat edildiği gelişim aşamasını gösterir.
    greens_preparation_state:
      name: Yeşillik hazırlık durumu
      description: Yapraklı yeşilliklerin nasıl işlendiğini veya paketlendiğini belirtir
        (örn. önceden yıkanmış, doğranmış, tüketime hazır).
    grenade_effect_type:
      name: El bombası etkisi türü
      description: Paintball el bombasının etkinleştirildiğinde oluşturduğu temel
        işlevsel efekti belirtir (örn. duman, boya, flashbang).
    grid_unit:
      name: Izgara ünitesi
      description: Mat üzerinde basılı olan temel ölçü sistemini belirtir (ızgara/ölçek
        mevcutsa).
    grille_emblem_provision:
      name: Izgara amblemi temini
      description: Ön ızgaranın OEM amblemini/logosunu destekleyip desteklemediğini
        ve bunun nasıl sağlandığını belirtir.
    grille_mounting_method:
      name: Izgara montaj yöntemi
      description: Ön ızgaranın araca nasıl monte edildiğini belirtir (örn. doğrudan
        değişim veya ekleme/kaplama; cıvatalı veya klipsli/geçmeli; delme gerektiren
        veya delme gerektirmeyen).
    grille_style:
      name: Izgara tarzı
      description: Araç ızgarasının görsel/tasarım stilini belirtir.
    grip_chalk_form:
      name: Kavrama tebeşiri formu
      description: Çantayla birlikte sunulan veya kullanılan tebeşirin fiziksel formunu
        belirtir.
    grip_coverage:
      name: Kavrama kapsamı
      description: Çorap üzerindeki silikon veya kauçuk kavrama bölümlerinin bulunup
        bulunmadığını ve konumunu belirtir.
    grip_design:
      name: Kavrama tasarımı
      description: Ağırlık plakasının daha kolay taşınması ve egzersiz çeşitliliği
        sağlaması için kullanılan tutma kolu veya delik yapılandırmasını belirtir.
    grip_enhancer_effect:
      name: Kavrama artırıcı etki
      description: Ürünün sağladığı temel performans özelliğini belirtir (örn. nem
        emilimi veya yapışkan reçine kaplama).
    grip_enhancer_form:
      name: Tutuş artırıcı formu
      description: Sporcuların uygun uygulama yöntemini seçebilmesi için grip artırıcı
        ürünün fiziksel formunu veya sunum biçimini belirtir.
    grip_features:
      name: Kavrama özellikleri
      description: Oyun sırasında tutuşu, konforu veya kontrolü iyileştirmek amacıyla
        tasarlanmış dahili kavrama/tutuş özelliklerini belirtir.
    grip_material:
      name: Kavrama malzemesi
      description: Pantolonun kavrama yüzeyinde kullanılan malzemeyi tanımlar.
    grip_shape:
      name: Kavrama şekli
      description: Kavrama bölümünün kesit şeklini veya stilini belirtir, özellikle
        putter griplerinde önemlidir.
    grip_surface_type:
      name: Tutuş yüzeyi tipi
      description: Pedal yüzeyindeki diş/dokulu tutuş tasarımını belirtir. Bu yapı
        kavramayı ve kullanım hissini etkiler.
    grip_tackiness_level:
      name: Kavrama yapışkanlık seviyesi
      description: Kavrama yüzeyinin ne kadar yapışkan/tutucu olduğunu belirtir. Bu
        özellik oyuncuların kuru his ile ekstra yapışkan kontrol arasında seçim yapmasına
        yardımcı olur.
    grip_tape_form:
      name: Grip bandı formu
      description: Ürün teslimat şeklini belirtir (örn. levha, rulo, sprey kit).
    grip_wax_form:
      name: Kavrama mumu kalıbı
      description: Grip mumunun satışa sunulduğu fiziksel formu sınıflandırır.
    gripper_coverage:
      name: Kavrama kapsamı
      description: Kaymaz tabandaki kavrama bölümünün stilini belirtir. Bu özellik
        yüzey kaplama alanını ve çıkarılabilir olup olmadığını gösterir.
    grommet_application_material:
      name: Kuşgözü halkaların uygulama malzemesi
      description: Kuşgözü halkaların takılması amaçlanan ana malzeme(ler) (örn. kumaş,
        deri, vinil, branda/kanvas).
    grommet_duty_rating:
      name: Kuşgözü halkaların dayanım sınıfı
      description: Bu, rondelanın kullanım amacına uygun dayanıklılık/kullanım sınıfını
        gösterir.
    grommet_style:
      name: Halkalı stil
      description: Kuşgözü setinin yapısal stilini belirtir (nasıl monte edildiği/kullanıldığı).
    grooming_glove_texture_type:
      name: Kuşgözü bakım eldiveni doku türü
      description: Bakım için kullanılan temel yüzey dokusunu belirtir. Bu özellik
        ovalama, parlatma veya yıkama gibi kullanım amacını gösterir.
    groove_orientation:
      name: Oluk yönlendirmesi
      description: Enstrüman üzerindeki olukların veya çıkıntıların yönünü/düzenini
        belirtir.
    groove_sampler_onboard_effects:
      name: Davul makinesi dahili efektleri
      description: Davul makinesinde bulunan dahili efekt işleme kategorilerini belirtir
        (insert/master). Örn. reverb, delay, kompresyon, distortion, EQ ve filtreleme.
    groove_sampler_storage_expansion_type:
      name: Davul makinesi depolama genişletme türü
      description: Davul makinesinin desteklediği çıkarılabilir/genişletilebilir depolama
        seçeneklerini belirtir.
    ground_attachment_method:
      name: Zemine sabitleme yöntemi
      description: Antreman kemerinin oyun yüzeyine nasıl sabitlendiğini, bunun da
        dengeyi ve yüzey uyumluluğunu nasıl etkilediğini açıklar.
    groupset_components_included:
      name: Dahil olan grup seti bileşenleri
      description: Bisiklet grup setine dahil olan belirli bileşenleri listeler. Böylece
        kullanıcılar paket içeriğini anlayabilir.
    gt_racing_class:
      name: GT yarış sınıfı
      description: Aracın tasarlandığı veya homologe edildiği GT kategorisini/sınıfını
        belirtir.
    guard_construction_type:
      name: Koruma yapısı tipi
      description: Koruyucunun sert kabuk koruyucu, yumuşak zırh ek parçası veya kılıf/kayış
        tipi tasarım olup olmadığını belirtir.
    guard_size_measurement_basis:
      name: Koruyucu beden ölçüsünün dayandığı ölçüm esası
      description: Bedenlendirmede kullanılan ölçümün neye dayandığını (örn. dirsek
        çevresi, bilek çevresi, ön kol çevresi) belirtir.
    guard_style:
      name: Koruyucu stili
      description: Pateni bıçak koruyucusunun yapısını veya türünü sınıflandırır;
        böylece kullanıcılar sert yürüyüş koruyucuları, yumuşak emiciler, yaylı koruyucular
        ve diğer tasarımlar arasında hızlıca ayrım yapabilir.
    guava_flesh_color:
      name: Guava meyve eti rengi
      description: Guava meyvesinin iç et rengini belirtir.
    guava_variety:
      name: Guava çeşidi
      description: Satılan guava meyvesinin belirli kültivarını veya ticari çeşidini
        (örn. elma guavası, Mexican Cream, Tayland, pembe, çekirdeksiz, beyaz) belirtir.
    guide_material:
      name: Kılavuz malzemesi
      description: Olta kamışının misina kılavuzlarında veya iç parçalarında kullanılan
        malzemeyi belirtir.
    guide_type:
      name: Misina kılavuz tipi
      description: Olta kamışında kullanılan kılavuzların tipini (örn. tek ayaklı,
        makaralı, yılan tipi) belirtir.
    guideline_markings:
      name: Kılavuz işaretleri
      description: Pitching mat yüzeyine basılmış veya yerleştirilmiş görsel hizalama
        işaretlerinin türünü belirtir; bu, pitching antrenmanlarına yardımcı olur.
    guiro_scraper_material:
      name: Güiro kazıyıcı malzemesi
      description: Güiro ile birlikte verilen veya önerilen kazıyıcı/çubuk malzemesini
        belirtir.
    guiro_surface_style:
      name: Güiro yüzey yapısı
      description: Ses üretmek için kazınan çalma yüzeyinin desenini/geometrisini
        açıklar.
    guitar_body_finish_type:
      name: Gitar gövdesi kaplama türü
      description: Gitar gövdesinde kullanılan kaplama işlemini belirtir.
    guitar_bridge_system_type:
      name: Gitar köprü sistemi tipi
      description: Uyumluluk ve filtreleme için köprü/stop-tel sistemi tasarım ailesini
        belirtir.
    guitar_case_style:
      name: Gitar kılıfı stili
      description: Gitar kılıfı veya taşıma çantasının genel koruma ve yapı tipini
        belirtir.
    guitar_humidifier_placement:
      name: Gitar nemlendiricisinin yerleştirme konumu
      description: Nemlendiricinin enstrüman veya ortamla ilişkili olarak nerede kullanılmak
        veya yerleştirilmek üzere tasarlandığını belirtir.
    guitar_pedal_i_o_configuration:
      name: Gitar pedalının giriş/çıkış yapılandırması
      description: Pedalın mono veya stereo giriş/çıkış yönlendirmesini destekleyip
        desteklemediğini belirtir.
    guitar_pedal_output_connector_type:
      name: Gitar pedalının çıkış bağlantı tipi
      description: Pedalın kullandığı ses çıkış bağlantı tipini belirtir.
    guitar_slide_finish:
      name: Gitar slide kaplaması
      description: Slide’ın yüzey kaplamasını belirtir; bu, his ve tellere karşı sürtünmeyi
        etkiler.
    guitar_slide_style:
      name: Gitar slide kaplama tipi
      description: Gitar slide’ının veya ton barının formunu ve nasıl takılıp kullanıldığını
        belirtir.
    guitar_stand_type:
      name: Gitar standı tipi
      description: Gitar standının gitarı nasıl desteklediğini ve sakladığını belirleyen
        temel formunu belirtir.
    guitar_strap_attachment_type:
      name: Gitar askısı bağlantı tipi
      description: Askının gitara (veya askı düğmelerine) nasıl bağlandığını, geleneksel
        uçlar mı yoksa hızlı çıkarılabilir sistemler mi kullanıldığını belirtir.
    guitar_strap_end_material:
      name: Gitar askısı uç malzemesi
      description: Askının uç/kulak kısmında kullanılan malzemeyi belirtir; bu bölüm
        askı düğmelerine veya askı kilidi sistemlerine bağlanır.
    guitar_strap_features:
      name: Gitar askısı özellikleri
      description: Gitar askısının temel boyut ve malzeme özelliklerinin ötesindeki
        dikkat çekici işlevsel özelliklerini belirtir (çoklu seçim).
    guitar_string_coating:
      name: Gitar tel kaplaması
      description: Tellerin koruyucu bir kaplamaya sahip olup olmadığını ve varsa
        kaplama tipini belirtir.
    guitar_string_gauge_type:
      name: Gitar tel kalınlık tipi
      description: Akustik gitar tel setinin pazarlanan kalınlık kategorisini (örn.
        ekstra hafif, hafif, orta) belirtir. Genellikle ince Mi teli kalınlığına göre
        yaklaşık olarak ifade edilir; kesin kalınlık aralıkları üreticiye göre değişebilir.
    guitar_string_set_gauge_category:
      name: Gitar tel seti kalınlık kategorisi
      description: Gitar tel seti için yaygın pazarlama kalınlık kategorilerini (genellikle
        ince Mi / 1. tel üzerinden belirlenen) belirtir.
    guitar_string_winding_type:
      name: Gitar tel sarım tipi
      description: Setteki sarımlı tellerin dış sarım stilini belirtir.
    guitar_tuning_peg_button_shape:
      name: Gitar akort burgusu düğme şekli
      description: Akort burgusunun düğme şeklini veya stilini belirtir.
    guitar_tuning_peg_configuration:
      name: Gitar akort burgusu yapılandırması
      description: Kafa kısmındaki akort burgularının yerleşim düzenini belirtir.
    guitar_tuning_peg_mounting_style:
      name: Gitar burgusu montaj stili
      description: Akort burgusunun kafa kısmına nasıl monte edildiğini (burç tipi
        ve dönmeyi engelleme yöntemi) belirtir.
    guitar_tuning_peg_shaft_type:
      name: Gitar akort burgusu mil tipi
      description: Tel milinin dolu mu yoksa yarıklı mı olduğunu ve telin nasıl sabitlendiğini
        belirtir.
    guitar_tuning_peg_style:
      name: Gitar burgusu stili
      description: Enstrüman sapındaki akort burgusu/makine başı tipini ve montaj
        formatını (örn. kapalı dişli veya açık dişli, kilitli, yarıklı mil) belirtir.
    gum_condition:
      name: Sakız kıvamı
      description: Pulun arka yüzündeki yapışkanın kıvamını/durumunu (örn. hiç menteşelenmemiş,
        menteşeli, yapışkansız) belirtir.
    gun_action_type:
      name: Ateşleme mekanizması tipi
      description: Yükleme/ateşleme için kullanılan mekanik çalışma tipini (örn. sürgülü
        mekanizma, kol mekanizması) belirtir.
    gun_operational_status:
      name: Silahın operasyonel durumu
      description: Koleksiyon silahının etkisizleştirilmiş/ateş edemez durumda olup
        olmadığını ve nasıl sunulduğunu belirtir.
    gun_type:
      name: Silah tipi
      description: Antika silahın genel ateşli silah formunu belirtir.
    gusset_material:
      name: Körük malzemesi
      description: Kasık/körük astarında kullanılan malzemeyi belirtir; bu, nefes
        alabilirlik, hijyen ve konforu etkiler.
    gymnastics_discipline:
      name: Jimnastik disiplini
      description: Ürünün tasarlandığı jimnastik branşını (örn. Artistik, Ritmik,
        Akrobatik) belirtir.
    hair_extension_texture:
      name: Saç uzatma dokusu
      description: Saç uzatma tutamlarının kıvrım, dalga veya doku desenini açıklar.
    hair_net_style:
      name: Saç filesi stili
      description: Saç filesinin tasarım veya yapım stilini (örn. bouffant, snood,
        topuz örtüsü) belirtir.
    hair_quality_grade:
      name: Saç kalite derecesi
      description: Saçın sektörel kalite/köken tanımlarını belirtir.
    halter_style:
      name: Halter stili
      description: Halterın işlevsel veya tasarım stilini (örn. ip, açılır-kapanır,
        gösteri) belirtir; bu, kullanıcıların kullanım amacına uygun halteri seçmesine
        yardımcı olur.
    hammock_style:
      name: Hamak stili
      description: Hamak yapısının stilini veya tasarımını açıklar.
    hand_and_foot_coverage:
      name: El ve ayak kaplama
      description: Eller ve/veya ayakları kaplayan entegre veya çıkarılabilir eldiven
        ve patikleri açıklar.
    hand_cymbal_set_configuration:
      name: El zili seti yapılandırması
      description: Ürünün eşleşmiş bir çift, tek bir zil veya daha büyük bir set olarak
        satılıp satılmadığını belirtir.
    hand_drum_head_material:
      name: El davulu deri malzemesi
      description: Kupa davulunda kullanılan davul derisinin (zarın) malzemesini belirtir.
    hand_exerciser_style:
      name: El egzersiz cihazı stili
      description: El egzersiz cihazının genel stilini veya mekanizmasını sınıflandırır.
    hand_guard_backbone_material:
      name: El koruyucu iskelet malzemesi
      description: Varsa yapısal omurga/ana destek parçasının malzemesini belirtir;
        bu, dayanıklılık ve koruma seviyesini belirler.
    hand_guard_coverage_style:
      name: El koruyucu kaplama stili
      description: El koruyucunun kaplama profili ve sağladığı koruma alanını açıklar;
        bu, rüzgâr ve darbe korumasını etkiler.
    hand_guard_mounting_type:
      name: El koruyucu montaj tipi
      description: El koruyucuların motosiklete nasıl bağlandığını (örn. gidon ucu
        iç kelepçeli veya yalnızca kelepçeli) belirtir.
    hand_guard_set_configuration:
      name: El koruma seti yapılandırması
      description: Ürünün sol/sağ çift olarak mı yoksa tek taraflı olarak mı satıldığını
        belirtir.
    hand_guard_style:
      name: El koruyucu stili
      description: Koruyucunun kaplama tasarımını veya stilini (örn. kapalı, açık,
        tam, hafif, standart) açıklar.
    hand_guard_weather_protection:
      name: El koruyucunun hava koşullarına karşı koruma seviyesi
      description: El koruyucularının sağladığı amaçlanan hava koşullarına karşı koruma
        seviyesini belirtir.
    hand_paddle_strap_type:
      name: El paleti kayış tasarımı
      description: El paletinin kullanıcı eline sabitlenmesinde kullanılan kayış tipini
        veya kayış olup olmadığını belirtir.
    hand_percussion_mount_attachment_mechanism:
      name: El perküsyonu montaj bağlantı mekanizması
      description: Montajın bir standa, rafa veya diğer donanımlara nasıl bağlandığını
        (örn. kelepçeli veya çubuk montajlı) belirtir.
    hand_percussion_mounting_handling:
      name: El perküsyon montajı/kullanımı
      description: Enstrümanın tipik kullanım sırasında elde taşınarak, vücuda takılarak,
        monte edilerek ya da masa/zemin üzerine yerleştirilerek kullanılıp kullanılmadığını
        belirtir.
    hand_percussion_pitch_type:
      name: El perküsyon perdesi tipi
      description: Enstrümanın belirli bir perde (ayarlanabilir/notalı) üretip üretmediğini
        ya da belirsiz perdeye sahip olup olmadığını belirtir.
    hand_percussion_playing_method:
      name: El perküsyonu çalma yöntemi
      description: Enstrümanın ses üretmek için genellikle nasıl çalındığını (örn.
        sallama veya kazıma) açıklar.
    hand_percussion_set_configuration:
      name: El perküsyonu set yapılandırması
      description: Ürünün tek bir enstrüman, eşleşmiş çift veya çok parçalı bir set
        olup olmadığını belirtir.
    hand_percussion_size_class:
      name: El perküsyon boyut sınıfı
      description: Kesin ölçü verilmediğinde veya kolay filtreleme için enstrümanın
        genel boyut kategorisini belirtir.
    hand_sewing_needle_point_type:
      name: El dikiş iğnesi uç tipi
      description: El dikiş iğnesinin farklı malzemeleri (örn. dokuma kumaş, örgü,
        deri) veya iplikleri delmek için kullanılan uç şeklini/stilini belirtir.
    hand_support_level:
      name: El destek seviyesi
      description: Eldiven, bandaj veya kayışın sağladığı destek veya sıkıştırma düzeyini
        belirtir.
    hand_support_size:
      name: El destek boyutu
      description: Eldiven, kayış veya bandaj için üretici tarafından belirtilen beden
        ölçüsünü (XS–XXL veya tek beden) belirtir.
    handball_ball_type:
      name: Hentbol topu tipi
      description: Hentbol topunun kullanım amacını (örn. maç, antrenman veya plaj)
        belirtir.
    handball_playing_surface:
      name: Hentbol oyun yüzeyi
      description: Hentbol topunun optimize edildiği oyun yüzeyini/yüzeylerini belirtir.
    handball_target_type:
      name: Hentbol hedef türü
      description: Takım hentbolu antrenmanlarında kullanılan şut hedefinin stilini
        veya tasarımını belirtir.
    handbrake_actuation_type:
      name: El freni çalıştırma tipi
      description: Park freninin nasıl çalıştırıldığını belirtir.
    handbrake_orientation:
      name: El freninin yönü
      description: El freninin sol direksiyonlu veya sağ direksiyonlu araçlar için
        tasarlanıp tasarlanmadığını ya da evrensel olduğunu belirtir.
    handgun_grip_material:
      name: Tabanca kabza malzemesi
      description: Tabanca kabzasının/panellerinin ana malzemesi.
    handle_configuration:
      name: Sap yapılandırması
      description: Wakeboard tutamağının yapısal stilini (örn. tek, çift, Deep-V,
        T-wrap) açıklar; böylece kullanıcılar beceri seviyelerine, hareketlere veya
        board tipine uygun seçim yapabilir.
    handle_ergonomics:
      name: Tutma yeri ergonomisi
      description: Tutma yerinin konfor ve kontrolü artırmaya yönelik ergonomik özelliklerini
        açıklar.
    handle_grip_material:
      name: Sap tutma yeri malzemesi
      description: Tutma yerinin kavrama yüzeyinde kullanılan malzemeyi belirtir;
        bu, özellikle ıslakken konforu ve tutuşu etkiler.
    handle_grip_type:
      name: Sap tutma yeri tipi
      description: Konforu ve kontrolü artırmak için tasarlanan tutma yeri kaplamasını/malzeme
        veya yüzey stilini belirtir.
    handle_shape:
      name: Tutma yeri şekli
      description: Tutma yerinin kesit şeklini veya profilini belirtir.
    handlebar_design:
      name: Gidon tasarımı
      description: Merdiven stepper üzerindeki gidon tipini (yok, sabit, yükseklik
        ayarlı, katlanabilir veya direnç bandı tutamakları gibi) belirtir.
    handlebar_type:
      name: Gidon türü
      description: Bisiklete takılı gidonun stilini belirtir; bu, sürüş pozisyonunu,
        kontrolü ve konforu etkiler.
    handslide_bore_type:
      name: El sürgüsü boru çapı tipi
      description: Bas trombonun tek delik veya çift delik sürgü kullanıp kullanmadığını
        belirtir.
    handwear_cuff_style:
      name: Bileklik tarzı eldivenler
      description: Eldiven veya eldiven tiplerinin bilek/manşet yapım stilini açıklar;
        bu, kaplama ve uyumu etkiler.
    handwear_insulation_material:
      name: Eldiven yalıtım malzemesi
      description: Eldiven veya eldiven tiplerinin içinde kullanılan yalıtım veya
        astar malzemesini belirtir.
    handwear_size:
      name: El giyim bedeni
      description: Eldiven veya diğer el giysilerinin doğru uyum sağlaması için beden
        ölçüsünü belirtir.
    hang_glider_design:
      name: Yelken kanat tasarımı
      description: Yelken kanadının yapısal stilini (örn. esnek kanat, rijit kanat,
        motorlu) sınıflandırır.
    hanger_thread_size:
      name: Askı dişli ölçüsü
      description: Askının bank stick veya bite alarm üzerine monte edilmesinde kullanılan
        vida diş ölçüsünü/standardını belirtir; bu, uyumluluğu sağlar.
    hanging_suspension_method:
      name: Askı süspansiyon yöntemi
      description: Salıncağı asmak için kullanılan temel donanım veya sistemi (örn.
        ip, zincir, stand çerçevesi) tanımlar.
    hardtop_finish_type:
      name: Sabit tavan kaplama türü
      description: Sabit tavanın yüzey bitiş durumunu belirtir (örn. astarlı veya
        boyalı); bu, montaja hazır olma durumunu ve görünümü etkiler.
    hardtop_shell_material:
      name: Sabit tavan gövde malzemesi
      description: Bir aracın sabit tavanının sert gövdesinde kullanılan temel malzemeyi
        (herhangi bir kumaş kaplama değil), örn. fiberglas veya alüminyum, belirtir.
    hardtop_window_configuration:
      name: Sabit tavan cam yapılandırması
      description: Sabit tavanla birlikte gelen camları ve bunların yerleşim düzenini
        açıklar.
    harmonica_comb_material:
      name: Mızıka tarak malzemesi
      description: Mızıka kamasının (hava odası gövdesi) yapımında kullanılan malzemeyi
        belirtir.
    harmonica_cover_plate_finish:
      name: Mızıka kapak plakası kaplaması
      description: Mızıka kapak plakaları üzerindeki kaplama veya yüzey bitişini belirtir.
    harmonica_cover_plate_material:
      name: Mızıka kapak plakası malzemesi
      description: Dış kapak plakalarında kullanılan malzeme
    harmonica_finish:
      name: Mızıka yüzey kaplaması
      description: Mızıka kapak plakalarının/gövdesinin yüzey kaplamasını belirtir.
    harmonica_included_accessories:
      name: Dahil olan mızıka aksesuarları
      description: Mızıka ile birlikte hangi aksesuarların verildiğini belirtir.
    harmonica_note_range:
      name: Mızıka nota aralığı
      description: Orkestra bağlamında kullanılan enstrüman ses aralığı sınıflandırmasını
        (örn. bas, bariton, tenor) belirtir.
    harmonica_reed_plate_material:
      name: Mızıka kamış plakası malzemesi
      description: Kamış plakalarında kullanılan malzemeyi (örn. pirinç, paslanmaz
        çelik, alüminyum) belirtir.
    harmonica_system_type:
      name: Mızıka sistemi/türü
      description: Orkestra armonikasının sistemini veya form faktörünü (örn. akor,
        bas, bariton, polifonya) belirtir.
    harmonica_tuning_system:
      name: Mızıka akort sistemi
      description: Mızıkada kullanılan akort düzenini/sistemini (örn. Richter, Solo,
        Orkestra akordu) belirtir.
    harness_shell_type:
      name: Koşum takımı dış gövde tipi
      description: Koşum takımının kabuk yapısının sertlik seviyesini (örn. yumuşak
        kabuk, sert kabuk, hibrit) açıklar.
    harness_style:
      name: Koşum takımı stili
      description: Koşum takımının yapısal stilini/tasarımını (örn. bel tipi, oturmalı,
        göğüs/yelek tipi, kanat kemeri, boardshort veya hibrit) tanımlar.
    harness_type:
      name: Koşum tipi
      description: Tırmanış koşum takımının yapısal stilini (örn. oturmalı, tam vücut
        veya göğüs tipi) sınıflandırır.
    harp_action_type:
      name: Arp mekanizma tipi
      description: Arp üzerindeki ses perdesini/alterasyonları değiştirmek için kullanılan
        temel mekanizma.
    harp_finish:
      name: Arp yüzey kaplaması
      description: Arp gövdesinin yüzey kaplaması (örn. doğal, boyalı, lake).
    harp_included_accessories:
      name: Arpla birlikte verilen aksesuarlar
      description: Pedal arp satın alımıyla birlikte verilen aksesuarları listeler.
    harvest_method:
      name: Hasat yöntemi
      description: Deniz ürününün yabani avlanmış, çiftlikte yetiştirilmiş veya başka
        bir yöntemle elde edilip edilmediğini belirtir.
    harvest_stage:
      name: Hasat aşaması
      description: Rokanın mikro filiz, bebek yaprak veya olgun demet gibi hangi büyüme
        aşamasında hasat edildiğini belirtir.
    hat_style:
      name: Şapka stili
      description: Parti şapkasının temel yapısını/tasarımını (örn. koni şapka, taç,
        silindir şapka, vizör) belirtir; ürünün temel görünümünü yansıtır.
    hazard_signal_mode:
      name: Tehlike sinyali modu
      description: LED/elektronik yol işaret fişekleri için seçilebilir ışık desenleri/modları
    head_configuration:
      name: Baş yapılandırması
      description: Buz ve karışık arazide işlevi doğrudan etkileyecek şekilde balta
        başında keser, çekiç, her ikisi veya hiçbiri bulunup bulunmadığını belirtir.
    head_material:
      name: Başlık malzemesi
      description: Quinto ile birlikte verilen çalma başlığının malzemesini belirtir.
    head_movement_type:
      name: Başlık hareketi türü
      description: "“İkili ayak (bipod) veya çubuk başlığının yönlü hareket kabiliyetini
        (örn. pan, tilt, eğim) belirtir."
    head_side:
      name: Baş tarafı
      description: Davul derisinin vurulan (beater) taraf, rezonans (ön) taraf veya
        her iki taraf için olup olmadığını belirtir.
    head_weight_style:
      name: Baş ağırlık stili
      description: Sinek baş kısmındaki ağırlık yapılandırmasını belirtir; bu, batma
        hızını ve sunumunu etkiler.
    headband_embellishment:
      name: Saç bandı süslemesi
      description: Saç bandına takılan dekoratif unsurları (örn. fiyonk, inci, kristal,
        hayvan kulakları) belirtir.
    headboard_style:
      name: Yatak başlığı stili
      description: Yatakla birlikte verilen yatak başlığının tasarım veya yapım stilini
        açıklar.
    headgear_strap_configuration:
      name: Başlık kayışı yapılandırması
      description: Güreş başlığını sabitlemek için kullanılan kayış sayısını belirtir.
    headjoint_crown_style:
      name: Flüt baş parçası kuron stili
      description: Flütün baş parçası kuronunun (uç kapağının) stilini veya tasarımını
        belirtir; bu, görünümün yanı sıra ağırlık ve dengeyi de etkileyebilir.
    headjoint_pitch_standard:
      name: Flüt baş parçası perde standardı
      description: Başlık kısmının tasarım ayar standardını gösterir (örn. A=440'a
        karşı A=442).
    headliner_product_form:
      name: Tavan döşemesi ürün formu
      description: Ürünün tam kalıplı bir tavan döşemesi montajı, yedek döşeme kumaşı
        veya onarım/kaplama bileşeni olup olmadığını belirtir.
    headrest_mount_attachment_method:
      name: Başlık montaj bağlantı yöntemi
      description: Montaj parçasının koltuk başlığına/koltuk direklerine nasıl takılacağını
        belirtir.
    headrest_provision:
      name: Başlık uyumluluğu
      description: Başlıkların dahil olup olmadığını ve/veya başlık montaj noktalarının
        mevcut olup olmadığını gösterir.
    headset_standard:
      name: Gidon bağlantı standardı
      description: Frame tarafından kullanılan gidon borusu/gidon bağlantı arayüzünün
        tipi.
    headstall_style:
      name: Başlık stili
      description: At başlığının yapısal tasarımını veya kulak/kaş konfigürasyonunu
        sınıflandırır.
    headwear_intended_use:
      name: Başlık kullanım amacı
      description: Türbanın kullanım amacını veya kullanılacağı bağlamı belirtir (ör.
        kemoterapiye bağlı saç kaybı, yüzme, dini kullanım).
    hearing_enhancer_style:
      name: İşitme güçlendirici tipi
      description: Kullanıcıların kulak üstü, kulak içi, baş arkası ve diğer tasarımlar
        arasından seçim yapabilmesi için cihazın fiziksel tasarım şeklini belirtir.
    heart_rate_monitoring_method:
      name: Kalp atış hızı izleme yöntemi
      description: Makinenin egzersiz sırasında kalp atış hızı verilerini nasıl topladığını
        belirtir.
    heart_rate_sensing_technology:
      name: Kalp atış hızı algılama teknolojisi
      description: Monitörün kalp atış hızını algılamak için kullandığı fizyolojik
        ölçüm yöntemini belirtir (ör. elektriksel EKG veya optik PPG).
    heart_rate_sensor_placement:
      name: Kalp atış hızı sensörü konumu
      description: Sensörün nerede takıldığını veya konumlandırıldığını (vücutta ya
        da bisiklet üzerinde) belirtir. Bu durum kullanım konforunu ve ölçüm doğruluğunu
        etkiler.
    heat_retention_technology:
      name: Isı koruma teknolojisi
      description: Egzersiz amaçlı korselerde terlemeyi veya termal etkiyi artıran
        teknoloji, kaplama ya da malzemeyi belirtir (ör. neopren sauna etkisi).
    heated_glass_feature:
      name: Isıtmalı cam özelliği
      description: Camın, arka cam buz çözücü rezistansı ve/veya cama entegre anten
        gibi dahili elektrikli bileşenler içerip içermediğini belirtir.
    heater_control_actuation_method:
      name: Isıtıcı kontrol etkinleştirme yöntemi
      description: Araçtaki ısıtıcı/HVAC kontrolünün HVAC kutusunu nasıl çalıştırdığını
        belirtir (ör. kablo kumandalı, vakum kumandalı veya elektronik sinyalleme
        yoluyla).
    heater_control_electrical_connector_type:
      name: Isıtıcı kontrol elektrik konnektörü tipi
      description: Isıtıcı kontrol grubunda kullanılan elektrik konnektörünün stilini
        veya arayüz tipini belirtir (ör. kablolu çıkışlı (pigtail) veya fiş tipi bağlantı).
    heating_technology:
      name: Isıtma teknolojisi
      description: Buharlaştırıcının, içeriği buhara dönüştürmek için kullandığı temel
        ısıtma mekanizmasını belirtir.
    heel_shape:
      name: Topuk şekli
      description: Alıcıların yapısal görünüm ve denge tercihlerine göre filtreleme
        yapabilmesi için topuğun geometrik stilini veya siluetini belirtir (ör. stiletto
        veya blok topuk).
    helicopter_mission_type:
      name: Helikopter görev türü
      description: Helikopterin kullanım amacı.
    helicopter_rotor_configuration:
      name: Helikopter rotor konfigürasyonu
      description: Helikopter rotor sisteminin yerleşim düzenini (ana rotor/kuyruk
        rotoru düzeni) belirtir. Örneğin, tek ana rotor + kuyruk rotoru, koaksiyel,
        tandem veya iç içe geçmiş rotor düzenleri.
    helmet_accessory_type:
      name: Kask aksesuar tipi
      description: Bisiklet kaskı parçasının veya aksesuarının türünü belirtir. Böylece
        müşteriler aradıkları ürünü kolayca bulabilir.
    helmet_audio_connector_type:
      name: Bisiklet kaskı parçası türü
      description: Varsa, kaskın iletişim kablosunda kullanılan hava aracı ses konnektörü
        türünü belirtir.
    helmet_communication_system_readiness:
      name: Kask iletişim sistemi uyumluluğu
      description: Kaskın interkom/Bluetooth iletişim sistemini kabul edecek şekilde
        tasarlanıp tasarlanmadığı.
    helmet_construction_type:
      name: Kask yapısı tipi
      description: Kaskın dış kabuğunun ve iç astarının yapım tarzını tanımlar (örn.
        köpük, sert kabuk, hibrit).
    helmet_fit_head_shape:
      name: Kask uyumu (baş şekli)
      description: Farklı baş şekilleri için tasarlanan iç uyum profili.
    helmet_interior_liner_type:
      name: Kask iç astar türü
      description: Konfor astarının türü ve çıkarılabilir/yıkanabilir olup olmadığı.
    helmet_liner_material:
      name: Kask iç astar malzemesi
      description: Konfor ve darbe emilimi sağlayan iç astarın veya dolgunun malzemesini
        belirtir.
    helmet_retention_closure_type:
      name: Kask sabitleme kayışı kapatma türü
      description: Kask çene kayışının kapatma/sabitleme mekanizması (örn. çift D
        halka, mikrometrik mandallı toka).
    helmet_safety_certification:
      name: Kask güvenlik sertifikasyonu
      description: Kaskın uyduğu güvenlik standartlarını veya sertifikalarını listeler.
    helmet_safety_certification_standard:
      name: Kask güvenlik sertifikasyon standard
      description: Motosiklet kaskının sahip olduğu güvenlik/onay standartları.
    helmet_shell_material:
      name: Kask dış kabuk malzemesi
      description: Kaskın dış kabuğunda kullanılan temel malzeme veya yapı türü.
    helmet_size_system:
      name: Kask beden sistemi
      description: Kask bedenini ifade etmek için kullanılan beden tablosu.
    helmet_sun_visor_type:
      name: Kask güneşlik tipi
      description: Kaskın dahili güneşlik, renkli dış siperlik, her ikisi birden veya
        hiçbiri içerip içermediğini belirtir.
    helmet_vehicle_fit:
      name: Kask araç uyumluluğu
      description: Kaskın hangi araç/sürüş türü için tasarlandığı.
    helmet_ventilation_adjustability:
      name: Kask havalandırmasının ayarlanabilirliği
      description: Kask havalandırmasının sürücü tarafından nasıl kontrol edilebileceğini
        belirtir.
    helmet_ventilation_configuration:
      name: Kask havalandırma yapılandırması
      description: Kaskın havalandırma düzenini ve ayarlanabilirliğini (örn. çene
        havalandırması, alın/hava giriş delikleri, kapatılabilir havalandırmalar)
        tanımlar.
    helmet_visor_peak_adjustability:
      name: Kask vizörü/siperliği ayarlanabilirliği
      description: Kaskın arazi tipi siperliğinin/vizörünün ayarlanabilir ve/veya
        çıkarılabilir olup olmadığı.
    helmet_visor_shield_optical_features:
      name: Kask vizörünün optik özellikleri
      description: Ana yüz siperi/vizörün optik ve uyumluluk özellikleri.
    helmet_visor_shield_type:
      name: Kask vizörü/yüz siperi türü
      description: Kaskla birlikte sunulan ana yüz siperi/vizör yapılandırması.
    hem_style:
      name: Etek ucu stili
      description: Paça açıklığının bitiş stilini (örn. temiz bitişli, kıvrılmış veya
        ham kesim) tanımlar. Bu özellik giysinin görünümünü önemli ölçüde etkiler.
    hemisphere_compatibility:
      name: Yarım küre uyumluluğu
      description: Yıldız haritasının, görülebilen takımyıldızlara göre hangi yarım
        küre için tasarlandığını belirtir.
    hemline_style:
      name: Etek boyu stili
      description: Elbisenin alt kenarının kesimini veya tasarımını tanımlar.
    herbal_infusion_function:
      name: Bitkisel demleme işlevi
      description: Demlemenin pazarlanırken öne çıkarılan temel sağlık veya işlevsel
        faydasını gösterir.
    hex_size:
      name: Alyan anahtar ölçüsü
      description: Kızdırma bujisini takmak/çıkarmak için alyan anahtar gereklidir.
    hi_hat_pair_type:
      name: Hi-hat zil çifti türü
      description: Ürünün, eşleştirilmiş üst/alt hi-hat zil çifti mi yoksa tek bir
        zil bileşeni mi olduğu.
    hi_hat_sound_character:
      name: Hi-hat ses karakteri
      description: Alıcının istediği sese göre filtreleme yapmasına yardımcı olmak
        için genel ton profilini tanımlar.
    high_visibility_class:
      name: Yüksek görünürlük sınıfı
      description: Giysinin ANSI/ISEA 107 görünürlük sınıflandırma seviyesini belirtir.
    highback_style:
      name: Yüksek sırtlı model
      description: Sürüş özelliklerini etkileyen arka destek yapısal stili/tasarımı.
    hitch_ball_diameter:
      name: Çeki topuzu çapı
      description: Römork kaplinine bağlanan çeki topuzunun küresel baş kısmının çapı
        (ör. 1 7/8 inç, 2 inç, 2 5/16 inç, 50 mm).
    hitch_ball_mounting_style:
      name: Çeki topuzu montaj tipi
      description: Çeki topuzunun standart somunla monte edilen tipte mi, belirli
        çeki başlıkları için sabit/preslenmiş tipte mi yoksa entegre donanım içerip
        içermediği.
    hobby_horse_handle_type:
      name: Hobi atı sap türü
      description: Hobi atını tutmak veya yönlendirmek için kullanılan tutma yeri/sap
        yapısı.
    hobby_horse_sound_features:
      name: Hobi atı ses özellikleri
      description: Hobi atın ses efektleri içerip içermediğini ve ne tür ses efektleri
        içerdiğini gösterir.
    hockey_goal_type:
      name: Hokey kalesi türü
      description: Hokey kalesinin stilini veya kullanım amacını (örn. resmi buz hokeyi,
        sokak hokeyi, mini hokey) belirtir.
    hockey_size_category:
      name: Hokey boyut kategorisi
      description: Parçanın uyumlu olduğu standart ekipman beden kategorisine (Genç,
        Küçük, Orta, Büyük) uygun olduğunu belirtir.
    hockey_size_segment:
      name: Hokey ekipman beden kategorisi
      description: Genel koruyucu ekipman ölçülerini ve uyumunu belirleyen standart
        hokey ekipmanı beden kategorisini belirtir.
    hold_surface_texture:
      name: Tutma yüzeyi dokusu
      description: Tutamağın kavrama yüzeyinin pürüzlülük derecesi veya dokusal yüzey
        özelliğini tanımlar.
    home_decor_sewing_pattern_project_type:
      name: Ev dekorasyonu dikiş kalıbı modeli türü
      description: Ana sayfa dekor ürününün hangi türde bir dikiş kalıbı ile üretildiğini
        belirtir (örn. yastık kılıfı, perde, masa örtüsü).
    homologation_rule_set:
      name: Homologasyon / kural seti
      description: Aracın uygun olduğu onay kuruluşu veya kural seti (uygulanabildiği
        durumlarda).
    honey_form:
      name: Bal formu
      description: Bal ürününün fiziksel formu veya sunum şeklini belirtir.
    honey_processing_method:
      name: Bal işleme yöntemi
      description: Balın ambalajlanmadan önce nasıl işlendiği veya hangi işlemlerden
        geçirildiğini tanımlar.
    honey_variety:
      name: Bal çeşidi
      description: Balın tek çiçekli (monofloral) veya çok çiçekli (polifloral) olmasına
        göre botanik ya da çiçek kaynağı; bu özellik balın lezzetini, rengini ve fiyatını
        doğrudan etkiler.
    hood_configuration:
      name: Kapüşon yapılandırması
      description: Kapüşonun tasarımı ve ayarlanabilirlik özellikleri.
    hood_design:
      name: Kapüşon tasarımı
      description: Giysideki kapüşonun varlığını ve stilini belirtir
    hood_style:
      name: Kapüşon stili
      description: Giyside kapüşon bulunup bulunmadığı ve kapüşonun stili.
    hood_type:
      name: Kapüşon tipi
      description: Giysinin kapüşon bölümüne ait özel tasarım özelliklerinı belirtir.
    hook_and_eye_size_hook_number:
      name: Kopça ölçüsü (kopça numarası)
      description: Ambalaj üzerinde kopçanın genel ölçüsünü belirtmek için kullanılan
        standart kopça ölçüsü/numarası (uygulanabildiği durumlarda).
    hook_and_loop_fastener_duty_rating:
      name: Cırt cırtlı bağlantı kullanım sınıfı
      description: Cırt cırtlı bağlantının amaçlanan dayanım/kullanım seviyesini gösterir.
    hook_and_loop_fastener_format:
      name: Cırt cırtlı bağlantı formatı
      description: Cırt cırtlı bağlantı ürününün fiziksel formu veya ambalaj formatı
        (örn. rulo/bant, nokta, şerit).
    hook_and_loop_fastener_side:
      name: Cırt cırtlı bağlantı tarafı
      description: Ürünün yalnızca kanca tarafını, yalnızca halka tarafını veya her
        iki tarafı içeren bir seti kapsayıp kapsamadığı.
    hook_coating_finish:
      name: Kanca kaplaması/yüzeyi-
      description: Kancaya korozyon direnci, düşük görünürlük veya renk kazandırmak
        amacıyla uygulanan yüzey işlemi ya da kaplama (örn. siyah nikel, parlak kalay).
    hook_configuration:
      name: Kanca yapılandırması
      description: Sahte yem ile birlikte sunulan kancaların bulunup bulunmadığı ve
        kanca stili.
    hook_eye_style:
      name: Kanca göz stili
      description: Kancanın bağlama halkasının şeklini veya yönü özelliği, kancanın
        nasıl bağlandığını ya da takıldığını etkileyen yapısını ifade eder.
    hook_eye_type:
      name: Kanca göz tipi
      description: Kanca gözünün tasarımı; düğüm seçimini ve takım düzenini etkiler.
    hook_loop_format:
      name: Cırt cırtlı bağlantı formatı
      description: Dikilebilir cırt cırtlı bağlantının fiziksel formunu belirtir.
    hook_loop_side:
      name: Cırt cırt tarafı
      description: Ürünün kanca tarafı, halka tarafı veya eşleştirilmiş bir kanca-halka
        seti olup olmadığını belirtir.
    hook_material:
      name: Kanca malzemesi
      description: Kargı kancasının/başlığının yapımında kullanılan malzemeyi belirtir.
        Bu özellik özellikle tuzlu su kullanımında dayanıklılık ve korozyon direnci
        açısından önemlidir.
    hook_organizer_style:
      name: Kanca düzenleyici türü
      description: Kanca düzenleyicinin fiziksel stili veya formu (örn. kutu, rulo
        veya kese); düzenleyici türüne göre arama ve filtreleme yapılmasını destekler.
    hook_point_configuration:
      name: Kanca uç yapılandırması
      description: Kancanın iki uçlu (çift) veya üç uçlu (üçlü) olup olmadığını belirtir.
    hook_point_type:
      name: Kanca uç tipi
      description: Balıkçılık kancası ucunun bileme biçimini veya şeklini tanımlar.
        Bu özellik batma ve tutunma performansını etkiler.
    hook_shank_length:
      name: Kanca sapı uzunluğu
      description: Kanca sapının göreceli uzunluk sınıflandırmasını (örn. kısa, uzun)
        hızlı görsel ve işlevsel karşılaştırma için gösterir.
    hooks_eyes_attachment_method:
      name: Kopça tutturma yöntemi
      description: Kopçaların giysiye veya projeye nasıl tutturulduğu.
    hop_up_type:
      name: Hop-up tipi
      description: BB mermilerine menzil ve isabetlilik için geri dönüş hareketi kazandırmak
        amacıyla kullanılan hop-up sistemini tanımlar.
    horse_blanket_type:
      name: At battaniyesi tipi
      description: At örtüsü veya battaniyesinin ana stilini veya kullanım amacını
        belirtir.
    horse_brush_type:
      name: At fırçası tipi
      description: Fırçayı, özel bakım stiline veya kullanım amacına göre sınıflandırarak,
        kategori hiyerarşisini parçalamadan filtreleme yapılmasına olanak tanır.
    horse_care_purpose:
      name: At bakımında kullanım amacı
      description: Ürünün temel işlevsel amacı, at bakımı alanında sağlık, bakım ve
        yönetim ihtiyaçlarını karşılamaktır.
    horse_feed_stage:
      name: At yemi yaş grubu
      description: Yemin, atın yaşam evresine veya fizyolojik durumuna göre formüle
        edildiğini belirtir.
    horse_groomer_type:
      name: At bakım aracı türü
      description: Kullanıcının ihtiyaç duyduğu aleti hızlıca bulabilmesi için, bakım
        ürünlerinin stilini sınıflandırır.
    horse_leg_protection_type:
      name: At bacak koruyucu türü
      description: Atlar için kullanılan koruyucu botun, sargının veya bandajın türünü
        ya da işlevini sınıflandırır.
    horse_model_breed:
      name: At modeli cinsi
      description: Ölçek modelinin temsil ettiği at cinsini belirtir (varsa).
    hosiery_toe_style:
      name: Çorap burun tipi
      description: Çorabın burun kısmının yapısını tanımlar. Bu özellik dayanıklılık
        ve açık burunlu ayakkabılarla uyumluluk açısından önemlidir.
    hot_air_balloon_basket_type:
      name: Sıcak hava balonu sepeti tipi
      description: Biniş ve kullanım amacına yönelik olarak kullanılan ana sepet konfigürasyonunu/stilini
        (örn. standart spor, ticari yüksek kapasiteli, bölmeli, engelli erişimine
        uygun/kapılı) belirtir.
    hot_air_balloon_burner_type:
      name: Sıcak hava balonu brülörü tipi
      description: Balona monte edilen brülör sisteminin tipi/yapılandırması.
    hot_air_balloon_envelope_material:
      name: Sıcak hava balonu zarf malzemesi
      description: Balon zarfında (kubbesinde) kullanılan temel kumaş/malzeme.
    hotfix_application_tool:
      name: Isıyla yapıştırılan taşların uygulama aracı
      description: Sıcak yapıştırmalı yapay taşların uygulanmasında önerilen alet
        veya ısı kaynağı.
    hub_axle_type:
      name: Göbek mili türü
      description: Göbeğin hangi mil bağlantı sistemi için tasarlandığını belirtir
        (hızlı bırakma, geçmeli aks, vb.).
    hub_motor_type:
      name: Göbek motoru tipi
      description: Göbek motorunun yapım tarzını (dişlili, direkt tahrikli, fırçalı,
        fırçasız) açıklayarak alıcıyı tork, ağırlık ve verimlilik özellikleri hakkında
        bilgilendirir.
    hula_hoop_construction_type:
      name: Hulahop yapım türü
      description: Hulahop'un nasıl yapıldığını/monte edildiğini açıklar.
    hula_hoop_features:
      name: Hulahop özellikleri
      description: Hulahopun dikkat çekici işlevsel veya tasarımsal özelliklerini
        belirtir
    hull_design:
      name: Gövde tasarımı
      description: Performans ve kullanım özelliklerini etkileyen gövde şeklini tanımlar.
    hull_type:
      name: Gövde tipi
      description: Performansı ve dengeyi etkileyen gövde formunu tanımlar.
    humidifier_refill_medium_type:
      name: Nemlendirici yedek dolum malzemesi türü
      description: Kutu tipi nemlendiricide kullanılan nem tutucu/dolum malzemesini
        (ıslatılan veya değiştirilen bileşeni) belirtir.
    humidifier_refill_method:
      name: Nemlendirici doldurma yöntemi
      description: Nemlendiricinin nasıl yeniden nemlendirildiğini veya değiştirildiğini
        açıklar.
    humidifying_medium:
      name: Nemlendirme ortamı
      description: Üründe kullanılan nemlendirme elemanını/ortamını (ıslatılan/aktif
        hale getirilen kısmı) tanımlar.
    hummus_base_ingredient:
      name: Humusun ana malzemesi
      description: Humusun yapımında kullanılan temel baklagili veya sebzeyi belirtir.
    hunting_call_type:
      name: Av düdüğü türü
      description: Avcıların ihtiyaçlarına ve beceri düzeylerine en uygun seçeneği
        kolayca belirleyebilmeleri için çağırma aparatının temel çalışma biçimini
        veya mekanizmasını (örn. ağızla üflemeli, elektronik, kutu tipi) sınıflandırır.
    hunting_dog_collar_function:
      name: Av köpeği tasmasının kullanım amacı
      description: Tasmayı temel işlevine veya kullanım amacına göre sınıflandırır.
        Böylece müşteriler takip, eğitim, görünürlük veya genel kullanım gibi işlevlere
        göre ürünleri filtreleyebilir.
    hvac_control_functions:
      name: HVAC kontrol işlevleri
      description: Ünitenin kontrol ettiği HVAC/buz çözme/hava akışı işlevlerini (mekanik
        veya elektronik) belirtir.
    hybrid_drivetrain_configuration:
      name: Hibrit güç aktarma sistemi yapılandırması
      description: Elektrik motorunun/motorlarının ve içten yanmalı motorun tahrik
        gücünü nasıl sağladığını açıklayan PHEV sistem mimarisini belirtir.
    hybrid_system_type:
      name: Hibrit sistem türü
      description: Araçta kullanılan hibritleşme mimarisini sınıflandırır.
    hybrid_truck_cab_type:
      name: Hibrit kamyon kabin tipi
      description: Kamyonun kabin yapılandırmasını belirtir. Bu özellik oturma kapasitesini
        ve iç mekan alanını etkiler.
    hydration_bag_features:
      name: Su torbası özellikleri
      description: Su torbalarına özgü dikkat çekici tasarım veya işlevsel özellikleri
        vurgular.
    hydration_belt_features:
      name: Hidrasyon kemeri özellikleri
      description: Hidrasyon kemerinin kullanım kolaylığını, güvenliğini veya pratikliğini
        artıran dikkat çekici yerleşik özellikleri listeler.
    hydration_bladder_compatibility:
      name: Su torbası uyumluluğu
      description: Yeleğin bir su torbası sistemi içerip içermediğini veya bu sistemi
        destekleyip desteklemediğini belirtir.
    hydration_mouthpiece_style:
      name: Su torbası ağızlık tipi
      description: Bir hidrasyon sistemi ağızlığının veya valfinin tasarımını ya da
        işlevsel türünü belirtir. Böylece müşteriler tercih ettikleri içme arayüzünü
        seçebilir ve uyumluluğu değerlendirebilir.
    hydration_pack_style:
      name: Hidrasyon çantası türü
      description: Hidrasyon çantasının sırt çantası veya yelek gibi yapısal türünü
        belirtir. Böylece uyum ve kullanım amacına göre filtreleme yapılabilir.
    hydration_system_insulation:
      name: Hidrasyon sistemi yalıtımı
      description: Rezervuarın ve/veya içme hortumunun, sıcak veya soğuk koşullarda
        sıvının sıcaklığını korumaya yardımcı olacak şekilde yalıtımlı olup olmadığını
        belirtir.
    hydration_valve_type:
      name: Hidrasyon valfi tipi
      description: Sistem veya şişe ile birlikte sunulan içme valfinin ya da ağızlığın
        türünü belirtir. Yaygın ısırmalı valf ve yüksek akışlı ağızlık tasarımlarını
        kapsar.
    hydraulic_fluid_type:
      name: Hidrolik sıvı tipi
      description: Hidrolik bisiklet fren kolunun kullanmak üzere tasarlandığı fren
        sıvısının türünü belirtir. Bu bilgiler bakım ve güvenlik açısından hayati
        önem taşımaktadır.
    hydrogenation_level:
      name: Hidrojenasyon seviyesi
      description: Yağın hidrojenlenmemiş, kısmen hidrojenlenmiş veya tamamen hidrojenlenmiş
        olup olmadığını belirtir. Bu durum trans yağ içeriğini ve pişirme performansını
        etkiler.
    hydrophobicity_level:
      name: Hidrofobiklik seviyesi
      description: Ürünün suyu boncuklanma veya akış şeklinde uzaklaştırma performansının
        derecesini belirtir.
    ice_cream_format:
      name: Dondurma formu
      description: Dondurma ürününün fiziksel formunu veya sunum şeklini (ör. pint,
        bar, mochi vb.) tanımlar.
    ice_skate_sharpener_type:
      name: Buz pateni bileme cihazı türü
      description: Bileme cihazının genel tasarımını veya formatını sınıflandırır
        (el taşı, elektrikli makine, aparat vb.).
    ice_temperature_suitability:
      name: Buz sıcaklığı uygunluğu
      description: Buz hokeyi sopası mumu (wax) için formüle edildiği buz sıcaklığı
        aralığını belirtir. Bu durum performansı ve kar tutmama özelliklerini etkiler.
    icing_sugar_variety:
      name: Pudra şekeri çeşidi
      description: Pudra şekerinin formülasyonunu veya işlevsel türünü sınıflandırır
        (örn. fondan, erimeyen kar tozu, renkli, aromalı).
    ignition_coil_configuration:
      name: Ateşleme bobini konfigürasyonu
      description: Ateşleme bobininin şekil faktörünü belirtir (tek bobin/buji üzerine
        bobin, silindir sayısına göre çok kuleli bobin paketi, bobin rayı/kaset veya
        distribütör tipi).
    ignition_lead_compliance_standard:
      name: Ateşleme kablosunun uygun olduğu standart
      description: Ateşleme kablolarının üretici tarafından uygunluğu beyan edilen
        resmi endüstri standardı veya sertifikası (ör. SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Ateşleme kablosu yalıtım malzemesi
      description: Ateşleme müşteri adayı üzerinde kullanılan birincil yalıtım/kılıf
        malzemesi (dış kablo yalıtımı).
    ignition_lead_set_type:
      name: Ateşleme kablosu seti türü
      description: Ürünün tek bir ateşleme kablosu mu yoksa bir set mi olduğunu ve
        setin hangi amaçla kullanıldığını belirtir.
    ignition_lead_terminal_type:
      name: Ateşleme kablosu terminal türü
      description: Ateşleme kablosunun uçlarında kullanılan terminal/konnektör tipi
        (örn. buji terminali ve bobin/distribütör terminali stili).
    illumination_type:
      name: Aydınlatma türü
      description: Gece oyununda topun aydınlatılıp aydınlatılmadığını ve nasıl aydınlatıldığını
        belirtir (örn. fosforlu parlayan, darbe ile aktive olan LED).
    immobilizer_installation_type:
      name: İmmobilizer montaj tipi
      description: İmmobilizerin araca nasıl monte edildiğini veya bağlandığını belirtir.
    immobilizer_unlock_method:
      name: İmmobilizer kilidini açma yöntemi
      description: İmmobilizerin nasıl devreye alındığını/devre dışı bırakıldığını
        veya kilidinin nasıl açıldığını belirtir.
    impact_protection_certifications:
      name: Darbe koruma sertifikaları
      description: Koruyucu pedin karşıladığı veya aştığı belirli güvenlik standartlarının
        adlarını belirtir.
    impact_protection_level:
      name: Darbe koruma seviyesi
      description: Sporcu kasığının (koruyucu kabın) sunduğu darbe koruma seviyesi
        veya teknolojisini belirtir.
    impact_protection_rating:
      name: Darbe koruma derecesi
      description: Standartlara göre sertifikalandırılmış darbe koruma seviyesini
        (örn. EN 1621-1 Seviye 1, EN 14120 Seviye 2) belirtir. Böylece kullanıcıların
        daha yüksek koruma seviyelerini filtrelemesini sağlar.
    impact_surface_material:
      name: Darbe yüzeyi malzemesi
      description: Güvenlik ve kullanım hissi açısından ana darbe/çarpma yüzeyinde
        kullanılan malzemeyi (örn. köpük, plastik) tanımlar.
    incense_base_material:
      name: Tütsünün temel malzemesi
      description: Kittteki tütsüyü yapmak için kullanılan temel baz/bağlayıcı malzeme
        (toz baz).
    incense_making_method:
      name: Tütsü yapım yöntemi
      description: Kit tarafından desteklenen amaçlanan üretim/üretim süreci.
    incense_tool_type:
      name: Tütsü aleti türü
      description: Ürünün ne tür bir tütsü yapım aracı olduğunu belirtir (şekillendirme,
        ölçme, presleme, karıştırma veya kurutma amaçlı).
    incline_adjustment_type:
      name: Eğim ayarlama türü
      description: Antrenmanlar sırasında eğimin nasıl (veya değiştirilip değiştirilemeyeceğini)
        açıklar.
    included_accessories:
      name: Dahil olan aksesuarlar
      description: Listelere yedek uçlar/matkap uçları, saklama kutusu, şarj kablosu
        veya AC adaptör gibi ek aksesuarlar da dahildir.
    included_case_type:
      name: Dahil olan kılıf tipi
      description: Bas saksafonla birlikte verilen taşıma/saklama çantasının türünü
        belirtir (varsa).
    included_components:
      name: Dahil edilen bileşenler
      description: Paketin içeriğini listeler (araç setleri ve paketler için kullanışlıdır).
    included_fastener_components:
      name: Dahil olan bağlantı/sabitleme parçaları
      description: Ürünün kopça seti, yalnızca kanca, yalnızca halka veya benzer bir
        giysi kapama varyantı olup olmadığını belirtir.
    included_hydration_vessel_type:
      name: Dahil hidrasyon kabı tipi
      description: Kemerle birlikte sunulan veya kemerin desteklediği hidrasyon kabının
        türünü belirtir.
    included_items_woodwind_instrument:
      name: Dahil edilen ürün (üflemeli çalgı)
      description: Bas saksafon paketiyle birlikte gelen yaygın olarak dahil edilen
        ürünleri listeler.
    included_materials:
      name: Dahil edilen malzemeler
      description: Kalıp satın alımına dahil olan bileşenleri belirtir (yalnızca kalıp
        veya kalıp + malzemeler).
    included_mounting_accessories:
      name: Dahil edilen montaj aksesuarları
      description: Hoparlörlü telefonla birlikte gelen montaj/bağlantı aksesuarlarını
        listeler.
    included_pump_type:
      name: Dahil edilen pompa tipi
      description: Havalı yatakla birlikte verilen veya entegre olan pompa türünü
        belirtir.
    included_scraper_implement_type:
      name: Dahil edilen kazıyıcı alet tipi
      description: Müzik scraperı ile birlikte verilen çalma aparatı/aparatlarını
        (örn. scraper çubuğu, tel fırça) belirtir.
    indicator_design:
      name: Gösterge tasarımı
      description: Balık vuruş göstergesinin fiziksel şeklini veya stilini sınıflandırır.
    indicator_functions_tracked:
      name: Gösterge tarafından izlenen işlevler
      description: Gösterge tarafından izlenen belirli oyun metriklerini listeler.
        Örn. top sayısı, strike, out, inning, pitch sayısı, over, wicket, skor veya
        down.
    indoor_outdoor_use:
      name: İç ve dış mekan kullanımı
      description: Bowling oyuncağının iç mekân, dış mekân veya her ikisinde kullanım
        için tasarlanıp tasarlanmadığını belirtir.
    inflatable_decoration_items_included:
      name: Şişme dekorasyon ürünleri dahil
      description: Şişme dekorasyonla birlikte gelen temel aksesuarları listeler (örn.
        hava üfleyici fan, kazıklar, sabitleme ipleri).
    inflatable_decoration_type:
      name: Şişme dekorasyon türü
      description: Şişme parti dekorasyonunun türünü (şekil/form faktörü) belirtir.
        Böylece arama ve filtrelemeyi destekler.
    inflatable_raft_float_features:
      name: Şişme sal/şamandıra özellikleri
      description: Şişme sal/şamandıranın sahip olduğu fonksiyonel özellikler.
    inflation_method_included:
      name: Dahil edilen yöntem
      description: Tamir setiyle birlikte verilen lastik şişirme çözümünün türünü
        (varsa) belirtir.
    infused_scent:
      name: Enjekte edilmiş koku
      description: Yem malzemesine emdirilmiş koku veya aroma katkılarını belirtir.
    ingredient_base_type:
      name: Bileşen baz türü
      description: Fermentasyon için sağlanan temel bazın türünü belirtir (örn. üzüm
        suyu konsantresi, taze meyve suyu veya meyve konsantresi).
    ingredient_physical_form:
      name: Bileşenin fiziksel formu
      description: Koku bileşeninin tedarik edildiği fiziksel formu belirtir (işleme,
        ölçüm ve formülasyon için kullanılır).
    ingredient_processing_method:
      name: İçerik işleme yöntemi
      description: Bileşene uygulanan temel işleme tekniğini belirtir (örn. dondurarak
        kurutulmuş, kavrulmuş, fermente edilmiş).
    ink_colors_included:
      name: Dahil edilen mürekkep renkleri
      description: Set içindeki mürekkep pedlerinde bulunan mürekkep renklerini belirtir.
    ink_pad_application_method:
      name: Mürekkep pedi uygulama yöntemi
      description: Mürekkebin mürekkep pedinden nasıl dağıtıldığı/kullanıldığı (geleneksel
        damga pedi, damlatma pedi veya fırça uçlu ped).
    ink_pad_permanence:
      name: Mürekkep pedi kalıcılığı
      description: Baskı mürekkebinin kalıcı ve/veya arşiv kalitesinde olup olmadığını,
        kuruduktan sonra solmaya ve suya karşı dayanıklılığını belirtir.
    ink_pad_size:
      name: Mürekkep pedi bedeni
      description: Mürekkep pedinin yüzeyinin/kasasının standart boyutunu veya form
        faktörünü belirtir.
    ink_pad_special_effects:
      name: Mürekkep pedi özel efektleri
      description: Baskı sırasında mürekkebin oluşturduğu özel görsel veya işlevsel
        efektler (örn. metalik, simli).
    ink_permanence:
      name: Mürekkebin kalıcılığı
      description: Kurumuş sumi mürekkebinin kalıcı/arşiv amaçlı mı yoksa yıkanabilir/kalıcı
        olmayan mı olduğunu belirtir.
    ink_preparation_required:
      name: Mürekkep hazırlığı gereklidir
      description: Sumi mürekkebinin kullanıma hazır olup olmadığını veya kullanımdan
        önce suyla seyreltilmesi ya da öğütülmesi gerekip gerekmediğini belirtir.
    inline_skate_brake_type:
      name: Sıralı tekerlekli paten fren sistemi türü
      description: Patenlerde bulunan fren konfigürasyonunu belirtir. Örn. çıkarılabilir
        topuk freni veya fren olmaması gibi.
    inner_tent_configuration:
      name: İç çadır konfigürasyonu
      description: İç çadırın yapılandırmasını veya stilini belirtir. Örneğin, tam
        iç tente, file iç tente veya termal astar.
    innerspring_coil_type:
      name: İç yay bobin türü
      description: Yatak içinde bulunan iç yay sisteminin yapı stilini belirtir. Bu
        yapı destek, hareket izolasyonu ve fiyat üzerinde etkilidir.
    input_connector_type:
      name: Giriş konnektör tipi
      description: Pedal tarafından kullanılan ses giriş konnektör türünü belirtir
        (genellikle 1/4 inç TS).
    input_valve_type:
      name: Giriş valfi tipi
      description: Adaptörün FROM bisiklet lastiği/tekerleğinde bulunan valf standardını
        belirtir.
    insecticide_treatment:
      name: Böcek ilacı uygulaması
      description: Ağın fabrikada böcek ilacıyla işlem görüp görmediğini ve eğer işlem
        görmüşse, ek koruma için kullanılan uygulama türünü gösterir.
    insert_coverage_area:
      name: Eklenti kapsama alanı
      description: Tabanlığın ayağın hangi bölümünü kaplayacağını belirtir (örn. tüm
        ayak, sadece topuk).
    insert_length_type:
      name: Ek parça uzunluk tipi
      description: Ayak tabanının ne kadarının kemer desteğiyle kaplandığını gösterir.
    inside_message_type:
      name: Eklenti mesaj türü
      description: Kartın iç kısmında önceden basılmış bir mesaj olup olmadığını ve
        özelleştirilebilir olup olmadığını gösterir.
    insole_attachment_method:
      name: İç taban bağlantı yöntemi
      description: Ayakkabı içindeki kavis desteğinin nasıl sabitlendiğini belirtir
        (gevşek yerleştirme, yapışkanlı arka yüz, cırt cırt vb.).
    insole_material:
      name: İç taban malzemesi
      description: Ayağın üzerinde durduğu taban/plantarın malzemesini tanımlar. Bu
        özellik yastıklama ve destek seviyesini etkiler.
    installation_fabrication_level:
      name: Kurulum imalat seviyesi
      description: Kiti kurmak için gereken özel imalat veya modifikasyon miktarını
        belirtir.
    installation_location:
      name: Kurulum yeri
      description: Motor yağ sisteminde yağ basınç sensörünün tipik montaj noktasını
        belirtir (örn. motor bloğu yağ galerisi portu, filtre gövdesi, sandwich plaka
        veya uzaktan hat montajı).
    installation_method:
      name: Kurulum yöntemi
      description: Matın veya karonun zemine nasıl sabitlendiğini veya monte edildiğini
        belirtir.
    instant_coffee_form:
      name: Hazır kahve türü
      description: Hazır kahvenin sunulduğu fiziksel şeklini tanımlar. Bu özellik
        hazırlama yöntemini ve raf ömrünü etkiler.
    instep_coverage:
      name: Ayak üstü kapsama alanı
      description: Ürünün yalnızca kaval kemiğini mi yoksa hem kaval kemiği hem de
        ayak üstünü/ayağı mı koruduğunu belirtir.
    instruction_format:
      name: Talimat formatı
      description: Kit içinde bulunan talimatların formatı.
    instrument_cleaning_swab_form_factor:
      name: Alet temizleme pamuklu çubuğunun şekil faktörü
      description: Kullanılan pamuklu çubuğun fiziksel stilini (örn. bezden geçirme
        sistemi veya çubuk/fırça sistemi) çalgıcının tercihlerine ve enstrüman kısıtlamalarına
        uyacak şekilde belirtir.
    instrument_dimensions_unit_context:
      name: Enstrüman ölçülerinin birim bağlamı
      description: Verilen yükseklik/genişlik/uzunluk ölçülerinin neyi ifade ettiğini
        açıklar (örn. enstrümanın toplam boyutu, tek boru uzunluğu, stand yüksekliği).
    instrument_electronics_type:
      name: Enstrüman elektronik türü
      description: Enstrümanın manyetik/preamfi sisteminin aktif mi pasif mi olduğunu
        belirtir.
    instrument_key:
      name: Enstrüman tonu
      description: Kayıt flütünün kataloglarda kullanılan enstrüman tonalitesini belirtir
        (genellikle C veya F gibi).
    instrument_level:
      name: Enstrüman seviyesi
      description: Enstrümanın hitap ettiği hedef çalıcı seviyesini belirtir.
    instrument_part_mounting_method:
      name: Enstrüman parçasının monte edilme yöntemi
      description: Parçanın nasıl takılacağını veya monte edileceğini belirtir (örn.
        kelepçeyle, yapıştırıcıyla veya vidayla).
    instrument_parts_included:
      name: Dahil enstrüman parçaları
      description: A klarnet kutusuna dahil olan temel bileşenleri/parçaları listeler.
    instrument_playing_technique:
      name: Enstrüman çalma tekniği
      description: Enstrümanın tipik olarak nasıl çalındığı/çalıştırıldığı (örn. sallanarak,
        vurularak, tıkırdatılarak).
    instrument_size_class:
      name: Enstrüman boyut sınıfı
      description: Enstrümanın tam ölçüler yerine, kullanıcıya yönelik genel boyut
        sınıfı.
    insulation_fill_material:
      name: Yalıtım dolgu malzemesi
      description: Ceket veya yeleğin yalıtımında kullanılan temel malzemeyi belirtir.
    integrated_bottom_type:
      name: Entegre taban tipi
      description: Giysinin hareket sırasında örtücülük sağlamak için entegre külot,
        şort, mayo veya benzeri iç katmanlar içerip içermediğini belirtir.
    integrated_charging_options:
      name: Entegre şarj seçenekleri
      description: Komodinde bulunan entegre güç veya şarj arayüzlerini listeler.
    integrated_furniture_function:
      name: Mobilya entegre fonksiyonu
      description: Duvar yatağı veya çerçevesiyle birlikte sunulan ek entegre mobilya
        unsurlarını belirtir (örn. masa, kanepe, raflar).
    integrated_locking:
      name: Entegre kilitleme sistemi
      description: Rafın araçla bağlantısı ve/veya bisikletin rafa sabitlenmesi için
        entegre kilit içerip içermediğini belirtir.
    integrated_power_options:
      name: Entegre güç seçenekleri
      description: Bu, ünitenin sunduğu entegre güç veya şarj özelliklerinin türünü
        belirtir.
    integrated_storage_features:
      name: Entegre depolama özellikleri
      description: Bilardo isteka rafının isteka yuvalarının dışında sunduğu ek saklama
        veya aksesuar özelliklerini belirtir.
    integrated_tool_functions:
      name: Entegre araç fonksiyonları
      description: Kola entegre edilmiş ek alet özellikleri (örn. tel kancası, sibop
        çekirdeği sökücü, lastik topu yerleştirici).
    intended_board_type:
      name: Kullanım amacı tahta türü
      description: Yüzgecin tasarlandığı kiteboard stilini belirtir (örn. çift yönlü,
        yönlü surf, hidrofoil).
    intended_consumption:
      name: Amaçlanan tüketim
      description: Ürünün nasıl tüketilmek üzere tasarlandığını belirtir. Çiğ tüketilebilen,
        pişirme gerektiren veya yarı pişmiş olup olmadığını gösterir.
    intended_craft:
      name: Amaçlanan el işi
      description: İplik kılavuzunun tasarlandığı temel el işi bağlamını belirtir.
    intended_culinary_use:
      name: Mutfakta kullanım amacı
      description: Sosun ana mutfak kullanım amacını belirtir. Örneğin dip sos, pişirme
        veya glaze (parlatma sosu).
    intended_handlebar_style:
      name: Amaçlanan gidon stili
      description: Kolu tasarlandığı gidon veya kullanım stilini tanımlar (örn. düz
        gidon, drop gidon, aero). Bu, ek alt kategorilere ihtiyaç duymadan uyumluluk
        seçeneklerini hızlıca daraltır.
    intended_player_role:
      name: Oyuncunun üstleneceği rol
      description: Başlıkın sahadaki hangi rol için tasarlandığını belirtir (örn.
        kaleci, hakem).
    intended_playing_surface:
      name: Oyun alanı olarak tasarlanan yüzey
      description: Diskin, topun veya çemberin tasarlandığı yüzey. Örneğin; buz, asfalt,
        spor salonu zeminleri veya sentetik buz.
    intended_repair_location:
      name: Amaçlanan onarım yeri
      description: Tamir kitinin lastiğin hangi bölgesini onarmak için tasarlandığını
        belirtir.
    intended_seating_position:
      name: Amaçlanan oturma pozisyonu
      description: Emniyet kemeri kayışının takılması veya kullanılması amaçlanan
        araç koltuğu pozisyonunu belirtir.
    intended_sewing_application:
      name: Dikiş kullanım amacı
      description: İpliğin tasarlandığı dikiş uygulamasını belirtir (örn. genel giyim
        dikimi, patchwork/kapitone, döşemelik).
    intended_technique:
      name: Amaçlanan teknik
      description: Pedin/matın tasarlandığı temel keçe yapma tekniğini belirtir.
    intended_use:
      name: Kullanım amacı
      description: Enstrümanın temel kullanım bağlamı.
    intended_use_fleece_fabric:
      name: Kullanım amacı (polar kumaş)
      description: Polar kumaşın pazarlanırken hedeflendiği temel proje veya uygulamayı
        belirtir.
    intended_user:
      name: Hedef kullanıcı
      description: Havacılık koruyucu ekipmanın kimler tarafından kullanılmak üzere
        tasarlandığını belirtir.
    intended_yarn_form:
      name: İplik kullanım formu
      description: İplik kabının en uygun şekilde desteklediği iplik sunum biçimini
        belirtir.
    interaction_mode:
      name: Etkileşim modu
      description: Sesleri veya aktiviteleri tetiklemek için kullanılan temel etkileşim
        yöntemini belirtir.
    interactive_effects:
      name: Etkileşimli efektler
      description: Bir mutfak oyun setiyle birlikte sunulan etkileşimli elektronik
        veya mekanik efektleri belirtir.
    interfacing_application_area:
      name: Arayüz uygulama alanı
      description: Bu ara katman kumaşının desteklemek üzere tasarlandığı yaygın dikiş/el
        işi alanlarını tanımlar.
    interfacing_color_family:
      name: Ara tela renk grubu
      description: Açık veya koyu renkli kumaşların altında kullanılmak üzere tasarlanmış
        tipik ara katman taban rengini belirtir.
    interfacing_selling_format:
      name: Arayüz satış formatı
      description: Tela ürününün satış formatını tanımlar (örneğin, metreyle satılan
        sürekli kesim, önceden kesilmiş parçalar, rulo veya numune parçalar).
    interfacing_stiffness_level:
      name: Arayüz sertlik seviyesi
      description: Ara katman malzemesinin sağladığı sertlik/sağlamlık derecesini
        tanımlar.
    interior_padding_type:
      name: İç dolgu türü
      description: İçeriği korumak ve düzenlemek amacıyla koli içerisinde kullanılan
        iç dolgu veya yerleştirme sisteminin türü.
    interior_stall_configuration:
      name: İç bölme yapılandırması
      description: Hayvan taşımaya yönelik iç yerleşim/düzenlemeyi belirtir (bölme
        yönü ve kompartıman yapısı).
    invitation_printing_coverage:
      name: Davetiye baskı kapsamı
      description: Davetiyenin hangi yüzlerine baskı yapıldığını belirtir (yalnızca
        ön yüz veya çift taraflı).
    iodization:
      name: İyotlama
      description: Tuzun içine iyot eklenip eklenmediğini ve ne ölçüde eklendiğini
        gösterir.
    iridescence_level:
      name: Işığa göre renk değiştirme (İridesans) seviyesi
      description: Tavus kuşu tüylerine özgü doğal/işlem görmüş ışığa göre renk değiştiren
        parlaklığın yoğunluğunu tanımlar.
    irish_warpipe_set_configuration:
      name: İrlanda savaş gaydası set yapılandırması
      description: İrlanda savaş gaydası için hangi yapılandırmanın satıldığını belirtir
        (tam enstrüman veya parça/kısmi set).
    iron_on_applique_application_method:
      name: Ütüyle yapıştırılan aplike uygulama yöntemi
      description: Ütüyle yapıştırılan aplikenin alt tabakaya nasıl uygulanması gerektiğini
        belirtir.
    ironing_center_features:
      name: Ütüleme merkezi özellikleri
      description: Ütüleme merkezlerinin kullanım kolaylığını ve pratikliğini artıran
        özel özellikleri listeler.
    jacket_breast_style:
      name: Ceket göğüs stili
      description: Ceket modelinin tek düğmeli mi yoksa çift düğmeli mi olduğunu belirtir.
    jacket_vent_style:
      name: Ceket yırtmaç stili
      description: Takım elbise ceketinin arkasındaki yırtmaç (açıklık) türünü belirtir.
    jam_and_jelly_consistency:
      name: Reçel ve jöle kıvamı
      description: Sürülür ürünün dokusunu tanımlar, meyve parçacıkları veya çekirdek
        içerip içermediğini belirtir.
    jaw_shape:
      name: Çene şekli
      description: Çene veya uç geometrisini (örn. düz, eğimli, uzun burunlu) tanımlar.
        Bu özellik hassasiyet ve erişim kabiliyetini etkiler.
    jerky_form:
      name: Kurutulmuş et formu
      description: Kurutulmuş et parçalarının fiziksel şeklini veya kesimini tanımlar
        (örn. şeritler, çubuklar, lokmalar).
    jersey_style:
      name: Forma stili
      description: Taraftar formaları için forma şeklini veya giyim tarzını belirtir.
    jew_harp_accessories_included:
      name: Ağız mızıkası aksesuarları dahildir.
      description: Ağız kopuzuyla birlikte paketlenen ürünleri listeler (örn. kılıf,
        kese, kullanım talimatı).
    jew_s_harp_frame_style:
      name: Ağız kopuzunun gövde (çerçeve) stilini belirtir.
      description: Ağız kopuzunun gövde/çerçeve yapım stilini tanımlar. Bu özellik
        hissiyatı, dayanıklılığı ve çalma ergonomisini etkiler.
    jew_s_harp_tongue_profile:
      name: Ağız kopuzunun dil profili
      description: Ağız kopuzunun dili (kamışı) profilini/geometrisini tanımlar. Bu
        özellik tepki hassasiyetini ve tınıyı etkiler.
    jewelry_pieces_included:
      name: Dahil olan takı parçaları
      description: Set içinde yer alan belirli takı parçalarını listeler; böylece
        müşteriler tam olarak hangi ürünleri satın aldıklarını bilir.
    jigsaw_puzzle_piece_shape:
      name: Yapboz parçası şekli
      description: Parçaların genel kesim/şekil stili ve kenar profili
    jockstrap_design_features:
      name: Jockstrap tasarım özellikleri
      description: Jockstraplara özgü, işlevi veya estetiği etkileyen özel tasarım
        unsurlarını kapsar.
    juggling_club_construction_type:
      name: Hokkabaz sopası yapı türü
      description: Hokkabaz sopasının genel yapı türünü belirtir (tek parça kalıplı
        veya çok parçalı birleştirilmiş gibi). Bu durum dayanıklılık, kullanım hissi
        ve bakım özelliklerini etkileyebilir.
    juggling_club_core_material:
      name: Hokkabaz sopası ana materyali
      description: Sopanın içinde kullanılan temel çekirdek malzemeyi belirtir (dış
        kaplama/banttan ayrı olarak).
    juggling_prop_set_size:
      name: Hokkabazlık ekipmanı set boyutu
      description: Set içinde yer alan ana ekipman sayısını belirtir (örn. 3 top seti,
        çift poi).
    juggling_ring_edge_style:
      name: Hokkabazlık halkasının kenar stili
      description: Halkanın kenar profilini tanımlar Bu özellik konforu ve yakalama
        kolaylığını etkiler.
    juice_form:
      name: Meyve suyu formu
      description: Ürünün fiziksel formunu veya işleme aşamasını belirtir (örn. tek
        konsantrasyonlu sıvı, konsantre, toz).
    juice_processing_method:
      name: Meyve suyu işleme yöntemi
      description: Meyve suyu veya içeceğe uygulanan temel işleme tekniğini belirtir.
        Bu durum lezzeti, besin değerini koruma düzeyini ve raf ömrünü etkiler.
    jump_rope_style:
      name: İp atlama stili
      description: İpin/kablonun yapı stilini sınıflandırır (ör. boncuklu, kumaş,
        hız kablosu). Bu özellik kullanım amacı ve performansı doğrudan etkiler.
    kale_variety:
      name: Karalahana çeşidi
      description: Lahana çeşidini veya türünü belirtir (örn. Kıvırcık, Lacinato/Dinosaur,
        Kırmızı Rus). Bu, alıcının lezzet, doku ve mutfak kullanımına göre seçim yapmasına
        yardımcı olur.
    kaleidoscope_viewing_type:
      name: Kaleydoskop görüntüleme türü
      description: Kaleydoskopun görüntüleme formatını veya çalışma şeklini tanımlar
        (örn. klasik göz merceği tüpü, teleidoskop mercek tabanlı, tekerlekli, projeksiyon).
    kayak_construction_type:
      name: Kayak yapım türü
      description: Kayağın ana yapım tarzını belirtir. Örneğin, sert gövdeli veya
        şişme.
    kayak_design_type:
      name: Kayak tasarım türü
      description: Sörf koşullarında stabilite ve manevra kabiliyeti gibi kullanım
        özelliklerini etkileyen temel gövde şeklini belirtir.
    kayak_hull_design:
      name: Kayak gövde tasarımı
      description: Sörf koşullarında denge ve manevra kabiliyeti gibi kullanım özelliklerini
        etkileyen temel gövde şeklini belirtir.
    kayak_storage_bag_type:
      name: Kayak saklama çantası türü
      description: Bir kayak saklama çantasının stilini veya formatını belirtir; örneğin
        kuru çanta veya kürek çantası.
    kayak_style:
      name: Kayak tarzı
      description: Kayığın temel tasarım veya kullanım tarzını belirtir (örn. eğlence
        amaçlı, gezi amaçlı, şişme).
    keel_type:
      name: Omurga tipi
      description: Yelkenli teknenin omurga konfigürasyonunu belirler.
    kettlebell_style:
      name: Kettlebell stili
      description: Kettlebell’in yapı veya stil varyantını belirtir (örn. yarışma
        tipi, ayarlanabilir, yumuşak). Böylece kullanıcıların antrenman ihtiyaçlarına
        uygun seçimi yapmasını sağlar.
    key_attachment_mechanism:
      name: Anahtar takma mekanizması
      description: Koli içindeki anahtarları sabitlemek için kullanılan donanımı belirtir.
        Örneğin; halkalar, klipsler veya vida direkleri.
    key_retention_when_unlocked:
      name: Kilidi açıkken anahtarın yerinde kalma durumu
      description: Kilit açık konumdayken anahtarın çıkarılıp çıkarılamayacağını gösterir.
    keyboard_amplifier_inputs:
      name: Klavye amplifikatörü girişleri
      description: Klavye amplifikatörünün desteklediği giriş bağlantılarını (örn.
        1/4 inç TRS, MIDI girişi, Bluetooth) listeler.
    keyboard_amplifier_output_types:
      name: Klavye amplifikatörü çıkış türleri
      description: Klavye amplifikatörünün sesi diğer sistemlere yönlendirmek için
        desteklediği ana çıkış konnektör türlerini belirtir.
    keyboard_case_handle_type:
      name: Klavye çantası sap türü
      description: Klavye çantasını taşımak için kullanılan ana tutma sistemi (askılar
        dışında).
    keyboard_case_interior_padding_type:
      name: Klavye çantası iç dolgu türü
      description: Sert çanta içinde kullanılan temel iç yastıklama/astar yöntemini
        belirtir.
    keyboard_case_protection_level:
      name: Klavye koruma seviyesi
      description: Sert çantanın genel koruma/sağlamlık sınıfını belirtir. Kalıplı
        sert kabuklu çantalar ile ağır hizmet tipi uçuş/ATA tarzı çantaları ayırt
        eder.
    keyboard_case_wheel_type:
      name: Klavye taşıma çantası tekerlek türü
      description: Tekerlek içeren sert çantaların tekerlek yapılandırmasını belirtir.
    keyboard_pedal_connector_type:
      name: Klavye pedal bağlantı türü
      description: Sustain pedalın klavye veya dijital piyanoya bağlanmak için kullandığı
        konnektör/fiş tipini belirtir.
    keyboard_power_supply_type:
      name: Klavye güç kaynağı türü
      description: Klavye için temel güç besleme yöntemini belirtir (pil, AC adaptör,
        USB ile çalıştırma vb.).
    keyboard_stand_tier_type:
      name: Klavye standı katman türü
      description: Standın yalnızca taban stand olarak mı satıldığını yoksa ikinci
        katman (üst ek) içerip içermediğini belirtir.
    keyboard_stand_tiers:
      name: Klavye standı kat sayısı
      description: Z tipi standın desteklediği çalma katmanı sayısını belirtir (örn.
        tek katmanlı veya çift katmanlı).
    keychain_attachment_type:
      name: Anahtarlık bağlantı türü
      description: Anahtarlığın anahtarlara, çantalara veya kemerlere bağlanmasını
        sağlayan temel bağlantı donanımını belirtir.
    keychain_style:
      name: Anahtarlık stili
      description: Anahtarlık ürününün fiziksel formunu (neye benzediğini) tanımlar.
    keywork_finish:
      name: Klavye mekanizması yüzey kaplaması
      description: Gövde kaplamasından ayrı olarak, tuş mekanizması (keys) üzerinde
        uygulanan kaplama/bitiriş türünü tanımlar.
    kick_point:
      name: Esneme noktası
      description: Bir hokey sopası şaftındaki esneme “kick-point” konumunu belirtir.
        Bu özellik şut çıkış hızını ve hisse etkiler.
    kick_zone_grip_system:
      name: Esneme bölgesi kavrama sistemi
      description: Kayakta tutuş sağlamak için esneme bölgesinde kullanılan teknolojiyi
        belirtir.
    kickboard_features:
      name: Kickboard özellikleri
      description: Kickboard’un antrenman veya konforu artıran özel özelliklerini
        (yüzey dokusu ve el tutma seçenekleri dahil) vurgular.
    kickboard_handle_style:
      name: Kickboard tutma yeri stili
      description: Kickboardun tutuşu ve konforu etkileyen el tutamakları veya yüzey
        işlemlerine sahip olup olmadığını ve bunların nasıl olduğunu belirtir.
    kickstand_mounting_position:
      name: Kickstandın monte edildiği konum
      description: Kickstandın bisiklet kadrosuna nereden bağlandığını (örn. orta
        montaj, zincir kolu montajı, arka aks montajı) belirtir.
    kickstand_type:
      name: Kickstand tipi
      description: Kickstandın yapısal stilini veya mekanizmasını (örn. tek ayaklı
        yan sehpa, çift ayaklı orta sehpa, teleskopik) açıklar.
    kidney_belt_support_level:
      name: Böbrek kemeri destek seviyesi
      description: Böbrek kemerinin alt sırt ve karın stabilizasyonu için sağladığı
        üretici tarafından belirlenen genel destek seviyesini belirtir.
    kiln_firing_atmosphere:
      name: Fırın pişirme atmosferi
      description: Fırının çalışma sırasında desteklediği pişirme atmosferini/atmosferlerini
        (örn. oksidasyon veya indirgeme) belirtir.
    kiln_heating_element_type:
      name: Fırın ısıtma elemanı türü
      description: Fırında kullanılan ısıtma elemanlarının türünü/malzemesini belirtir.
    kingpin_design:
      name: Ana pimin tasarımı
      description: Ana pimin donanımının yapım stilini açıklar; bu, ağırlığı ve grind
        açıklığını etkiler.
    kingpin_orientation:
      name: Ana pimin yönü
      description: Truck ana pim yönelimini belirtir; bu, sürüş özelliklerini ve deck
        uyumluluğunu etkiler.
    kit_components_included:
      name: Fırın pişirme atmosferi
      description: Kullanıcıların tam olarak ne satın aldıklarını bilmesi için kit
        içerisinde bulunan bireysel donanım parçalarını (örn. zemin kazıkları, cıvatalar,
        kayışlar, montaj aleti) listeler.
    kit_format:
      name: Kit formatı
      description: Kitin nasıl paketlendiğini ve taşındığını (örn. kese, çanta, kutu)
        belirtir.
    kit_items_included:
      name: Dahil olan kit öğeleri
      description: Şarap yapım kitinde bulunan ana ekipman ve malzemeleri listeler;
        böylece kullanıcılar başlangıç kitleri ile yalnızca malzeme içeren yedek kitleri
        ayırt edebilir.
    kit_pouch_case_type:
      name: Kitin kese/kılıf türü
      description: Bakım kitinde yer alan saklama çözümünün varsa türünü belirtir.
    kit_tools_included:
      name: Kitte yer alan araçları belirtir.
      description: Projeyi tamamlamak için kitte sağlanan temel araçları varsa listeler.
    kite_inflation_system:
      name: Uçurtma şişirme sistemi
      description: Uçurtmanın ön kenarının ve destek strutlarının nasıl şişirildiğini
        belirtir.
    kite_line_configuration:
      name: Uçurtma ipi yapılandırması
      description: Uçurtma kanadının kullanacağı uçuş/kontrol ipi sayısını belirtir;
        bar ve iplerin doğru eşleştirilmesi için yaygın bir özelliktir.
    kite_type:
      name: Uçurtma türü
      description: Uçurtmanın yapısal tasarım kategorisini (şekil ve dizgin stili)
        tanımlar.
    kiteboard_bag_style:
      name: Kiteboard çanta stili
      description: Kiteboard çantasının belirli stilini veya alt türünü (örn. boardbag,
        golf çantası, seyahat çantası, foil çantası) belirtir.”
    kiwifruit_variety:
      name: Kivi çeşidi
      description: Kivinin belirli kültivarını veya renk çeşidini (yeşil, altın, kırmızı
        vb.) belirtir.
    knee_pad_pocket_type:
      name: Dizlik cep tipi
      description: Giysinin koruyucu dizlikleri barındırıp barındırmadığını ve bunların
        nasıl yerleştirildiğini belirtir.
    knee_pad_style:
      name: Dizlik stili
      description: Diz korumasının yapım stilini veya form faktörünü (örn. kılıf,
        destek aparatı, koruyucu) açıklar.
    knee_protection_design:
      name: Diz koruma tasarımı
      description: Diz koruyucusuna entegre edilmiş menteşeli diz bölümü sayısını
        belirtir.
    kneeboard_construction:
      name: Kneeboard yapısı
      description: Tahtanın ana üretim tekniğini veya kompozit yapısını (örn. rotasyon
        kalıplı plastik, sıkıştırma kalıplı, karbon fiber) belirtir.
    kneeboard_strap_type:
      name: Kneeboard kayış tipi
      description: Sürücüyü tahtaya sabitlemek için kullanılan diz kayışı sisteminin
        stilini açıklar.
    knife_lock_mechanism:
      name: Bıçak kilit mekanizması
      description: Katlanır bıçak ağzını açık konumda sabitlemek için kullanılan mekanizmayı
        veya kilitsiz tasarımları belirtir.
    knife_locking_mechanism:
      name: Bıçak kilitleme mekanizması
      description: Bıçak ağzını açık konumda sabitleyen mekanizma tipini belirtir;
        bu, kilitli bıçaklarda güvenliği, dayanımı ve kullanım kolaylığını doğrudan
        tanımlar.
    knife_opening_mechanism:
      name: Bıçak açma mekanizması
      description: Bıçağın sap içinden nasıl açıldığını açıklar; manuel, yay destekli,
        otomatik ve özel açılma stillerini ayırt eder.
    knife_system:
      name: Bıçak sistemi
      description: Overlok makinesindeki kesici bıçağın çalışıp çalışmadığını ve nasıl
        çalıştığını belirtir.
    knit_elastic_application:
      name: Örme elastik uygulaması
      description: Örme elastik şeridin tasarlandığı dikiş veya el işi kullanım amacını
        belirtir.
    knit_pattern:
      name: Örgü deseni
      description: Hırka kumaşında kullanılan temel örgü ilmeğini veya dokusunu (örn.
        saç örgü, ribana, waffle) belirtir; kullanıcıların belirli doku ve ısıl özelliklere
        sahip ürünleri seçmesini sağlar.
    knit_style:
      name: Örgü stili
      description: Kazak kumaşında kullanılan temel örgü yapısını, dokusunu veya dekoratif
        desenini belirtir.
    knitting_marker_counter_type:
      name: Örgü işaretleyici/sayacı tipi
      description: Örgü işaretleyici ve sayaçlar kategorisindeki fonksiyonel ürün
        tipini belirtir.
    knitting_needle_tip_style:
      name: "“Örgü şişi uç stili"
      description: Farklı iplik ve teknikler için optimize edilmiş uç keskinliğini
        ve şeklini belirtir.
    knock_sensor_technology:
      name: Vuruntu sensörü teknolojisi
      description: Vuruntu sensöründe kullanılan algılama teknolojisi.
    knurl_aggressiveness:
      name: Tırtık agresiflik seviyesi
      description: Bar milindeki tırtık deseninin keskinliğini veya dokusunu açıklar;
        bu, tutuş konforunu ve güvenliğini etkiler.
    knurl_marking_standard:
      name: Tırtık işaretleme standardı
      description: El yerleşimi için kullanılan tırtık referans halkalarının konumunu
        belirtir (örn. IPF veya IWF işaretlemeleri).
    kohlrabi_variety:
      name: Alabaş çeşidi
      description: Alabaş yumrusunun kültivarını veya ticari çeşidini belirtir; bu,
        farklı lezzet profilleri, boyutlar ve renkler arasında seçim yapılmasını sağlar.
    koji_mold_type:
      name: Koji küfü türü
      description: Fermantasyon sırasında kullanılan koji küfü türünü veya suşunu
        belirtir; bu, aroma ve lezzeti etkiler.
    kumquat_variety:
      name: Kumkuat çeşidi
      description: Sunulan kumkuatların kültivarını veya çeşidini belirtir; böylece
        kullanıcılar lezzet profili, boyut veya mutfak kullanımına göre seçim yapabilir.
    label_edge_type:
      name: Etiket kenar tipi
      description: Sökülmeyi önlemek ve estetik görünüm sağlamak için kullanılan kenar
        bitiş stilini belirtir.
    label_finish:
      name: Etiket yüzey kaplaması
      description: Etikete uygulanan yüzey kaplamasını, dokuyu veya koruyucu işlemi
        belirtir.
    label_finish_edge_style:
      name: Etiket yüzey kaplaması/kenar stili
      description: Kenarların nasıl bitirildiğini belirtir; bu, konforu ve dayanıklılığı
        etkiler (örn. dokuma kenar veya lazer kesim).
    label_fold_type:
      name: Etiket katlama tipi
      description: Ürüne dikilecek Label nasıl tasarlandığını (örn. uç katlama mı
        yoksa orta katlama mı) belirtir; bu da etiketin nasıl uygulanacağını ve nerede
        duracağını etkiler.
    label_text_type:
      name: Etiket metni türü
      description: Etiketin boş, önceden basılmış veya kişiselleştirme/özel tasarım
        için hazırlanmış olup olmadığını belirtir.
    lace_area_size:
      name: Dantel bölgesi beden
      description: Dantel bölümünün boyutunu veya yapılandırmasını tanımlar (örn.
        4×4 kapanma, 13×6 ön kısım), bu da mevcut ayırma boşluğunu belirler.
    lace_tightener_style:
      name: Bağcık sıkma sistemi stili
      description: Dantelin sıkma mekanizmasının tasarımını veya form faktörünü belirtir.
    lace_type:
      name: Dantel türü
      description: Saç çizgisi/kap bölgesinde kullanılan dantel malzemesini veya bitişini
        tanımlar. Bu özellik gerçekçilik ve ten rengi uyumunu etkiler.
    lacrosse_ball_certification:
      name: Lakros topu sertifikası
      description: Lakros topunun hangi spor dalının yönetim organı tarafından onaylandığını
        veya hangi standartları karşıladığını belirtir.
    lacrosse_goal_regulation_certification:
      name: Lakros kalesi standart sertifikası
      description: Lakros kalesi veya ağının belirli bir yönetim kurumu standardına
        (örn. NCAA veya NFHS) uygun olup olmadığını belirtir.
    lacrosse_pocket_type:
      name: Lakros cep tipi
      description: Başlığa gerilen cep veya file sisteminin genel stilini belirtir.
        Bu özellik top kontrolünü ve atış çıkışını etkiler.
    lacrosse_string_type:
      name: Lakros ip türü
      description: İp veya file ürününün tam formunu ya da kullanım amacını sınıflandırır.
        Böylece müşteriler cep içindeki file parçaları, kitler ve belirli ip türleri
        arasında ayrım yapabilir.
    ladder_position:
      name: Merdiven konumu
      description: Asma çocuk yatağında merdiven veya basamak erişiminin nerede bulunduğunu
        belirtir.
    lanyard_attachment_hardware:
      name: Boyun ipi takma donanımı
      description: Boyun ipinin ucunda yer alan ve anahtar, kimlik kartı, telefon
        veya diğer aksesuarları bağlamak için kullanılan donanımın türünü belirtir.
    lanyard_style:
      name: Boyun askısı stili
      description: Boyun ipinin nasıl takıldığını veya taşındığını belirtir.
    lanyard_type:
      name: Boyun ipi tipi
      description: Düdükle birlikte verilen veya uyumlu olan boyun ipinin stilini
        tanımlar.
    lap_hand_loom_accessories_included:
      name: Diz tipi el dokuma tezgâhı aksesuarları dahil
      description: Diz üstü el dokuma tezgahı paketine dahil aksesuarlar.
    lapel_style:
      name: Yaka stili
      description: Ceket yakasının tasarımını belirtir (örn., çentikli, sivri, şal
        yaka).
    laser_safety_class:
      name: Lazer güvenliği dersi
      description: Ürün için cihaz dokümantasyonu veya etiketlemede belirtilen lazer
        güvenlik sınıfını (örn. Sınıf 2, 3R, 3B, 4) belirtir.
    latex_processing_method:
      name: Lateks işleme yöntemi
      description: Lateks köpüğün üretiminde kullanılan üretim sürecini belirtir;
        genellikle Dunlop veya Talalay yöntemi olup, bu süreç hissiyatı, tepki verme
        özelliğini ve fiyatı etkiler.
    latex_type:
      name: Lateks tipi
      description: Yatakta kullanılan lateksin kaynağını ve bileşimini (doğal, organik,
        sentetik veya karışım) belirtir. Dayanıklılık, çevre dostluğu ve olası alerjenler
        hakkında bilgi sağlar.
    launch_profile:
      name: Top çıkış profili
      description: Bir golf sopası şaftının üretmek üzere tasarlandığı tipik top çıkış
        yüksekliğini (düşük, orta, yüksek) belirtir.
    launcher_mounting_configuration:
      name: Fırlatıcı montaj yapılandırması
      description: Fırlatıcının nasıl monte edildiğini veya kullanım için nasıl yapılandırıldığını
        belirtir. Bağımsız, namlu altı veya ray montajlı seçeneklere ihtiyaç duyan
        alıcılar için yol gösterir.
    layer_construction:
      name: Katman yapısı
      description: Kumaş laminat yapısını (örn. 2 katmanlı, 2.5 katmanlı, 3 katmanlı)
        belirtir. Bu özellik ağırlık, paketlenebilirlik ve dayanıklılığı etkiler.
    layer_design:
      name: Katman tasarımı
      description: Saç filesinin yapısını katmanlar veya çift taraflı kullanım özelliği
        açısından tanımlar.
    lazy_kate_tension_control_type:
      name: İplik sehpası gerilim kontrol türü
      description: İplik sehpasının, iplik bükme veya sarma sırasında bobinlere uyguladığı
        çekme/gerginlik yöntemi.
    lead_hardware_type:
      name: Tasma bağlantı donanımı türü
      description: İpin ucundaki bağlantı veya sabitleme stilini tanımlar (çıtçıt,
        klips, halka, zincir vb.), kullanım kolaylığını, güvenliği ve disipline uygunluğu
        etkiler.
    leaf_gelatin_grade:
      name: Yaprak jelatin kalitesi
      description: Jelatin tabakaları için kullanılan standartlaştırılmış mukavemet
        derecesini belirtir.
    leaf_preparation:
      name: Yaprak hazırlama yöntemi
      description: Yaprakların doğranmadan önce nasıl hazırlandığını açıklar. Örneğin;
        doğranmış, rendelenmiş veya jülyen doğranmış gibi.
    leaf_spring_material:
      name: Yaprak yay malzemesi
      description: Yaprak yay paketinin ana yapı malzemesi.
    leak_protection_layer:
      name: Sızıntı koruma katmanı
      description: Yüzme şortunun dahili bebek bezi sisteminin sızıntı koruması için
        tek katmanlı mı yoksa çift katmanlı mı olduğunu gösterir.
    leash_clip_type:
      name: Tasma klipsi tipi
      description: Tasmanın tasma veya koşum takımına takılması için kullanılan klips
        veya donanım türünü belirtir (örn. cıvata klipsi, karabina, döner klips).
    leash_style:
      name: Tasma tarzı
      description: Tasma ipinin şeklini veya sarılma biçimini tanımlar.
    leash_type:
      name: Tasma türü
      description: Kullanım amacına göre hızlı filtreleme için tasmanın genel stilini
        veya amaca yönelik yapısını sınıflandırır.
    leavening_action_type:
      name: Mayalama işlemi türü
      description: Kabartma tozunun kimyasal bileşimini veya kabartma türünü belirtir
        (örn. tek etkili, çift etkili, alüminyumsuz). Bu durum, pişirme performansını
        ve tarifin uygunluğunu doğrudan etkiler.
    leavening_agent:
      name: Mayalama maddesi
      description: Hamurda kullanılan başlıca kabartma mekanizmasını belirtir.
    led_color_options:
      name: LED renk seçenekleri
      description: Alarmda görsel ısırık belirtisi için seçilebilen LED renklerini
        listeler.
    led_indicator_color:
      name: LED gösterge rengi
      description: Ürünün LED göstergesinin rengini belirleyerek, balıkçılara birden
        fazla alarmı eşleştirmelerine veya kişisel tercihlerine uygun olanı seçmelerine
        yardımcı olur.
    led_light_color:
      name: LED ışık rengi
      description: Entegre LED aydınlatmanın rengini belirtir.
    leek_variety:
      name: Pırasa çeşidi
      description: Pırasanın çeşidini veya varyetesini belirterek, lezzet, boyut ve
        yetiştirme mevsimine göre farklılaştırmaya olanak tanır.
    leg_coverage:
      name: Bacak örtüsü
      description: Dalgıç elbisesinin bacağın ne kadarını kapladığını belirtir (örn.
        kısa, tam boy).
    leg_cuff_style:
      name: Paça manşeti tarzı
      description: Pantolon paçasının bitiş stilini belirtir.
    leg_cut_height:
      name: Bacak kesim yüksekliği
      description: Bikini altının bacak açıklığının ne kadar yukarıda kesildiğini
        gösterir.
    leg_cut_style:
      name: Paça kesim stili
      description: Bacak açıklığının şeklini tanımlar. Bu şekil görünümü, rahatlığı
        ve bronzlaşma izlerini etkiler.
    leg_length:
      name: Bacak uzunluğu
      description: Alıcının kategoriyi bölmeden tercih ettiği kapsama alanını seçebilmesi
        için gövdeleri göreceli bacak uzunluğuna göre (kısa, orta, uzun) kategorize
        eder.
    leg_loop_type:
      name: Bacak halkası türü
      description: Bacak halkalarının tasarımını tanımlar.
    leg_opening_style:
      name: Paça açıklığı stili
      description: Eşofman altı paçalarının nasıl sonlandırıldığını belirtir; örneğin
        elastik manşetler, dikişli kenarlar veya açık paça gibi.
    leg_style:
      name: Bacak stili
      description: Oturma bankının ayaklarının veya tabanının tasarım veya yapım stilini
        tanımlar.
    legging_foot_design:
      name: Tayt ayak tasarımı
      description: Taytların ayak kısmı açık mı, ayak kısmı var mı yoksa her iki model
        arasında dönüştürülebilir mi olduğunu belirtir.
    leggings_waistband_style:
      name: Tayt bel bandı stili
      description: Taytın bel bandının yapısal tasarımını belirtir. Bu özellik konforu,
        desteği ve görünümü etkiler.
    lei_closure_style:
      name: Çiçek çelengi kapatma stili
      description: Çiçek çelenginin sürekli bir halka şeklinde mi yoksa uçları açık
        ve bağlanıp kurdeleyle tutturulan bir yapıda mı olduğunu açıklar.
    lemon_variety:
      name: Limon çeşidi
      description: Limonların belirli kültivarını veya çeşidini tanımlar (örn. Eureka,
        Meyer, Amalfi).
    length_adjustment_method:
      name: Uzunluk ayarlama yöntemi
      description: İp atlama ipinin uzunluğunun kullanıcıya uyacak şekilde ayarlanıp
        ayarlanamayacağını ve nasıl ayarlandığını belirtir.
    lens_color_tint:
      name: Lens rengi/tonu
      description: Ürünle birlikte sunulan koruyucu gözlük lenslerinin renk veya tint
        (renk tonu) özelliğini belirtir.
    lens_construction:
      name: Lens yapısı
      description: Buğu direnci ve optik performansı belirtmek için lensin yapısal
        tasarımını (örn. tek cam, çift cam/termal) belirtir.
    lens_tint_category:
      name: Lens renk tonu kategorisi
      description: Farklı ışık koşullarına uygun lens seçimini kolaylaştırmak için,
        lensin koyuluk seviyesini uluslararası tint kategorilerine göre sınıflandırır.
    lettuce_variety:
      name: Marul çeşidi
      description: Marulun belirli bahçe çeşidini (örn. Iceberg, Romaine, Butterhead)
        tanımlayarak hassas filtreleme ve karşılaştırma imkanı sağlar.
    level_of_play:
      name: Oyun seviyesi
      description: Üretici tarafından belirtilen performans seviyesini, oyuncunun
        rekabet düzeyi ve bütçesiyle uyumlu olacak şekilde ifade eder.
    lever_configuration:
      name: Kol konfigürasyonu
      description: Su taşıtının motor kontrol sisteminin kol/kumanda konfigürasyonunu
        belirtir (örneğin tek kollu veya çift kollu).
    lever_type:
      name: Kol tipi
      description: Arp tellerine takılan perde değiştirme kollarının tipi veya mekanizması.
    license_plate_cover_style:
      name: Plaka kapağı stili
      description: Plaka kapağının yapı stilini belirtir (örneğin tam kapak veya vidalı
        kapak).
    license_plate_personalization_type:
      name: Plaka kişiselleştirme tipi
      description: Plakanın boş, önceden baskılı veya alıcı tarafından sağlanan kişiselleştirmeyi
        (metin ve/veya grafik) destekleyip desteklemediğini belirtir.
    license_usage_terms:
      name: Lisans/kullanım koşulları
      description: Desen kullanım hakları (örneğin, yalnızca kişisel kullanım veya
        sınırlı ticari kullanım).
    licensed_sports_property:
      name: Lisanslı spor ürünü
      description: Ürünün bir lig/takım/kuruluş tarafından resmi olarak lisanslı olup
        olmadığını gösterir.
    lid_hinge_mechanism:
      name: Kapak menteşe mekanizması
      description: Kapak için kullanılan menteşe mekanizmasını belirtir; bu mekanizma
        güvenliği ve kullanım kolaylığını etkiler.
    lid_support_positions:
      name: Kapak destek pozisyonları
      description: Piyanonun kapağının desteklendiği pozisyonları (kapağın ne kadar
        açılabileceğini) belirtir.
    lie_angle_color_code:
      name: Lie açısı renk kodu sistemi
      description: Üreticinin bazı golf sopalarında kullanılan renk kodlu lie açısı
        sistemini belirtir (örneğin black dot, green dot).
    life_jacket_certification_standard:
      name: Can yeleği sertifikasyon standardı
      description: Ürünün karşıladığı resmi güvenlik sınıflandırması veya standardı,
        örneğin USCG Tipi veya ISO/AS seviyeleri.
    life_raft_certification_standard:
      name: Can kurtarma salı sertifikasyon standardı
      description: Salın yapım ve bakımında karşılanan güvenlik standardı/sertifikası.
    life_raft_container_type:
      name: Can kurtarma salı konteyner tipi
      description: Can kurtarma botunun depolama ve kullanıma hazır hale getirilmesi
        için nasıl paketlendiğini belirtir.
    life_vest_approval_standard:
      name: Can yeleği onay standardı
      description: Can yeleğinin uyduğu sertifikasyon/onay standardını belirtir.
    life_vest_intended_user:
      name: Can yeleği hedef kullanıcı tipi
      description: Uygunluk ve donanım açısından hedeflenen kullanıcı kategorisini
        belirtir.
    lifebuoy_approval_standard:
      name: Can simidi onay standardı
      description: Can simidinin uyduğu güvenlik onayı veya standardı (örneğin, USCG/SOLAS).
    lifebuoy_features:
      name: Can simidi özellikleri
      description: Can simitleri için fonksiyonel güvenlik, montaj/kullanım ve dahil
        olan aksesuar özelliklerini belirtir.
    lift_mechanism_type:
      name: Kaldırma mekanizması türü
      description: Duvar yatağının yükseltilmesi/indirilmesi veya açılması/kapanmasına
        yardımcı olan mekanizmayı belirtir.
    lift_stand_support_point:
      name: Kaldırma/stand destek noktası
      description: Kaldırma sistemi/standın araca temas ettiği veya destek verdiği
        noktayı belirtir.
    lifting_gas_type:
      name: Kaldırma gazı türü
      description: Hava gemisinin kullandığı birincil kaldırma gazını veya yüzdürme
        ortamını belirtir.
    lifting_support_type:
      name: Kaldırma destek tipi
      description: Kaldırma sisteminin araç üzerine rampalarla mı çıkıldığını yoksa
        şasi/kaldırma noktalarına temas eden kollar/pedlerle mi kaldırıldığını belirtir.
    ligature_and_cap_component_type:
      name: Bağlama ve kapak bileşen türü
      description: Ürünün bağlama parçası, kapak veya her ikisini içeren bir set olup
        olmadığını belirtir.
    ligature_material:
      name: Bağlama malzemesi
      description: Kamışla temas ederek sabitleyen bağlama gövdesinin ana malzemesi
        (örneğin metal, deri, kumaş).
    ligature_plating_or_finish:
      name: Bağlama kaplaması veya yüzey bitişi
      description: Metal klarnet bağlama parçasına ve/veya kapağına uygulanan kaplama
        ve/veya yüzey işlemini belirtir.
    ligature_reed_contact_style:
      name: Bağlama - kamış temas stili
      description: Bağlama parçasının kamışla nasıl temas ettiğini belirtir (örneğin
        minimum temas, çok noktalı, sarma tipi).
    ligature_screw_position_relative_to_reed:
      name: Bağlama vidasının konumu (kamışa göre)
      description: Ağızlığa takıldığında bağlama sıkma vidasının/vidalarının kamışa
        veya çalan tarafa göre konumunu belirtir.
    ligature_tension_adjustment_mechanism:
      name: Bağlama gerilimi ayarlama mekanizması
      description: Bağlama mekanizmasının kamış üzerindeki basıncı nasıl uyguladığını/ayarladığını
        (bağlama tasarımını) açıklar.
    ligature_tightening_mechanism_type:
      name: Bağlama sıkma mekanizması tipi
      description: Bağlama parçasının ağızlık ve kamış etrafında nasıl sıkılaştığını
        belirten mekanizmayı tanımlar (örneğin tek vida, çift vida, kol/hızlı açma).
    light_bar_housing_material:
      name: Işık çubuğu gövde malzemesi
      description: Işık çubuğu gövdesinin/muhafazasının ana malzemesini belirtir;
        bu malzeme dayanıklılığı ve ısı dağılımını etkiler.
    light_bar_lens_material:
      name: LED bar lens malzemesi
      description: Işık çubuğu merceğinin/kapağının ana malzemesini belirtir; bu malzeme
        darbe dayanımını ve optik netliği etkileyebilir.
    light_bar_mounting_location:
      name: LED bar montaj konumu
      description: Araç üzerindeki birincil montaj konumu.
    light_stand_style:
      name: Işık standı tarzı
      description: Özel efekt ışıklarını desteklemek için kullanılan standın yapısal
        stilini veya form faktörünü belirtir (örneğin tripod, T-bar, kranklı).
    light_switch_function:
      name: Işık anahtarı fonksiyonu
      description: Anahtarın hangi aydınlatma devrelerini veya fonksiyonlarını kontrol
        ettiğini belirtir.
    lighting_control_protocols_supported:
      name: Desteklenen aydınlatma kontrol protokolleri
      description: Denetleyicinin DMX512’ye ek olarak veya onun yerine desteklediği
        kontrol/ağ protokollerini belirtir.
    lighting_effects:
      name: Aydınlatma efektleri
      description: Oynanışı veya estetiği geliştiren entegre aydınlatma özelliklerini
        belirtir.
    lighting_mode:
      name: Aydınlatma modu
      description: Sabit, flaş, stroboskop veya SOS gibi mevcut operasyonel ışık desenlerini
        listeler.
    lily_variety:
      name: Zambak çeşidi
      description: Taze kesme çiçek olarak satılan zambakların ticari/botanik çeşidini
        belirtir (örneğin Asiatic, Oriental).
    limb_articulation:
      name: Uzuv eklem hareketliliği
      description: Mankenin uzuv esnekliği veya eklem hareketliliği derecesini belirtir
        (yok, sabit, yarı esnek, tamamen hareketli).
    limb_material:
      name: Uzuv malzemesi
      description: Yay veya arbaletin kollarında kullanılan ana malzemeyi belirtir;
        bu malzeme ağırlığı, dayanıklılığı, titreşimi ve genel performansı etkiler.
    lime_variety:
      name: Limon çeşidi
      description: Satılan limonun belirli botanik veya ticari çeşidini tanımlar.
    line_buoyancy:
      name: Misina yüzdürme özelliği
      description: Misinanın doğal olarak yüzüp yüzmediğini veya batıp batmadığını
        ve hangi hızda battığını, bunun da yem sunumunu ve misina yönetimini nasıl
        etkilediğini açıklar.
    line_purpose:
      name: Misina kullanım amacı
      description: Uçurtma sistemindeki hattın amaçlanan işlevini tanımlar (örneğin
        ön uçuş hattı, depower hattı, bridle hattı).
    linen_finish_treatment:
      name: Keten yüzey bitişi/apre işlemi
      description: Keten kumaşa uygulanan ve dokusunu, görünümünü veya performansını
        değiştiren her türlü apre işlemi.
    linen_weave_type:
      name: Keten dokuma türü
      description: Keten kumaşın dokusunu, nefes alabilirliğini ve dökümlülüğünü etkileyen
        dokuma yapısını belirtir.
    liner_padding_type:
      name: Astar dolgu tipi
      description: Astarın yapısını veya yastıklama stilini belirtir (örneğin, file,
        hafif dolgulu, kapitone).
    liner_shape:
      name: Astar şekli
      description: Uyku tulumu astarının genel şeklini tanımlar; böylece müşteriler
        astarı uyku tulumlarına ve konfor tercihlerine uygun şekilde eşleştirebilir.
    liner_type:
      name: Astar tipi
      description: Şortun iç astarı olup olmadığını ve varsa hangi model olduğunu
        gösterir.
    lining:
      name: Zar
      description: Mayo astarının olup olmadığını ve nasıl yapıldığını, giysinin içindeki
        astar kaplamasının derecesini de içerecek şekilde belirtir.
    lining_material:
      name: Astar malzemesi
      description: Ayakkabının iç astarında kullanılan malzemeyi belirtir; bu malzeme
        konforu, nefes alabilirliği ve sıcaklığı etkiler.
    lining_type:
      name: Astar tipi
      description: Mayo iç giysisinin astarlı olup olmadığını ve ne ölçüde astarlı
        olduğunu belirtir.
    link_connection_style:
      name: Bağlantı ilişkisi stili
      description: Bağlantı parçasının zincire nasıl bağlandığını sınıflandırır (örneğin,
        hızlı bağlantı, bağlantı pimi), böylece sürücülerin doğru montaj yöntemini
        veya yedek parçayı seçmelerini sağlar.
    live_bait_form:
      name: Canlı yem formu
      description: Yemin fiziksel şeklini veya muhafaza durumunu (örneğin canlı, dondurulmuş
        veya kurutulmuş) belirtir.
    living_room_furniture_items_included:
      name: Dahil olan oturma odası mobilyaları
      description: Oturma odası setine dahil olan mobilya parçalarını belirtir (örneğin
        kanepe, loveseat, sehpa); böylece dahil olan bileşenler netleşir.
    load_mechanism:
      name: Yükleme mekanizması
      description: Makineye direnç oluşturma veya ekleme yöntemini belirtir (örneğin,
        seçici ağırlık sistemi, plaka yüklemeli, bant yüklemeli).
    lock_cylinder_type:
      name: Kilit silindiri tipi
      description: Kullanılan anahtar silindiri/göbeği tipini belirtir (kilit açmaya
        karşı direnç ve yedek anahtarlar açısından önemlidir).
    lock_security_level:
      name: Kilit güvenlik seviyesi
      description: Kilit/silindirin maymuncukla açılmaya ve delinmeye karşı güvenlik
        direnci özelliklerini açıklar.
    lock_system:
      name: Kilit sistemi
      description: Kaldırma sistemini yüksekte sabitlemek için kullanılan güvenlik
        kilitleme sistemi.
    locker_bench_configuration:
      name: Soyunma dolabı bankı konfigürasyonu
      description: Soyunma dolabı bankının yönelimini veya yapısal konfigürasyonunu
        tanımlar (örneğin, tek taraflı, çift taraflı ada tipi, duvara monte).
    locomotive_prototype_power_type:
      name: Lokomotif prototip güç tipi
      description: Modelin temsil ettiği gerçek dünya lokomotif tahrik tipini belirtir.
    locomotive_wheel_arrangement_whyte_notation:
      name: Lokomotif tekerlek düzeni (Whyte gösterimi)
      description: Lokomotif prototipinin tekerlek düzeni (örneğin, 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Loft yatak yükseklik sınıflandırması
      description: Loft yatağının genel yükseklik stilini (alçak, orta, yüksek, ekstra
        yüksek) belirtir; böylece müşteriler tavan yüksekliği ve yatak altı alan gereksinimlerine
        uygun seçim yapabilir.
    logo_application_method:
      name: Logo uygulama yöntemi
      description: Okul armasının veya logonun giysiye nasıl uygulandığını belirtir
        (örneğin nakışlı veya baskılı).
    logo_label_compatible_fabric_weight:
      name: Logo etiket uyumlu kumaş ağırlığı
      description: Etiketin bozulmadan veya kalınlık oluşturmadan uygulanabilmesi
        için önerilen kumaş ağırlığı kategorisini belirtir.
    logo_label_edge_finish:
      name: Logo etiket kenar bitişi
      description: Etiketin kenar yapısını/bitişini belirtir; bu yapı sökülme direncini
        ve cilt temasındaki konforu etkiler.
    logo_label_print_production_method:
      name: Logo etiket baskı/üretim yöntemi
      description: Logonun etiket yüzeyine nasıl uygulandığını/oluşturulduğunu belirtir.
    long_block_completeness:
      name: Uzun blok bütünlük durumu
      description: Uzun blok montajına hangi ana bileşenlerin dahil olduğunu belirtir.
    long_john_pieces_included:
      name: Uzun içlik setine dahil parçalar
      description: Ürünün uzun içlik setinin yalnızca alt parçayı, yalnızca üst parçayı
        veya her iki parçayı birden içerip içermediğini belirtir.
    longan_variety:
      name: Longan meyvesi çeşidi
      description: Longan meyvesinin botanik veya ticari çeşidini (örneğin Kohala,
        Biew Kiew) belirtir; bu özellik tat, boyut ve tatlılık farklılıklarını ayırt
        etmeye yardımcı olur.
    loom_accessories_included:
      name: Dahil olan dokuma tezgahı aksesuarları
      description: Kutu/paket içerisinde tezgahla birlikte verilen temel aksesuarlar.
    loom_finish:
      name: Dokuma tezgahı yüzey işlemi
      description: Dokuma tezgahının yüzey işlemi (özellikle ahşap dokuma tezgahları
        için).
    loom_folding_portability_design_type:
      name: Dokuma tezgahı katlanma/taşınabilirlik tasarım tipi
      description: Dokuma tezgahının taşıma veya kompakt depolama için katlanıp katlanmadığını
        ve nasıl katlandığını belirtir.
    loom_frame_folding_design:
      name: Dokuma tezgahı çerçevesi katlanma tasarımı
      description: Masa tipi dokuma tezgahı çerçevesinin depolama veya taşıma için
        katlanıp katlanmadığını, daraltılıp daraltılmadığını veya sökülüp sökülmediğini
        ve bunun nasıl yapıldığını belirtir.
    loom_tension_adjustment_method:
      name: Dokuma tezgahı çözgü gerginliği ayarlama yöntemi
      description: Dokuma tezgahında çözgü gerginliğini ayarlamak için kullanılan
        temel yöntemi belirtir.
    loom_tie_up_system:
      name: Dokuma tezgahı bağlama sistemi
      description: Pedallar, lameller ve şaftlar arasında kullanılan bağlama/bağlantı
        sistemi türünü belirtir (örneğin, Texsolv veya metal zincir).
    loquat_variety:
      name: Muşmula çeşidi
      description: Muşmulanın botanik veya ticari çeşidini belirtir; bu farklılıklar
        boyut, tat, olgunlaşma dönemi ve görünüm açısından değişiklik gösterebilir.
    lubricant_features:
      name: Yağlayıcı özellikleri
      description: Yağlayıcının özel performans özelliklerini, katkı maddelerini veya
        sağladığı faydaları belirtir.
    lubrication_requirement:
      name: Yağlama gereksinimi
      description: Koşu bandı kayışının önceden işlem görmüş/bakım gerektirmeyen bir
        yapıda olup olmadığını veya sürekli yağlama veya cilalama gerektirip gerektirmediğini
        gösterir.
    lubrication_type:
      name: Yağlama türü
      description: Burcun yağlanabilirliğini/greslenebilirliğini ve gresle bakım yapılmak
        üzere tasarlanıp tasarlanmadığını (örneğin, oluklar veya gres nipeli) belirtir.
    lug_nut_seat_profile:
      name: Bijon somunu oturma yüzeyi profili
      description: Doğru bijon uyumluluğu ve güvenli montaj için tekerleğin gerektirdiği
        bijon oturma yüzeyi profilini belirtir.
    lumbar_support_type:
      name: Bel destek tipi
      description: Sandalyenin sunduğu bel desteğinin türünü açıklar (örneğin, çıkarılabilir
        yastık, ayarlanabilir mekanizma, masaj).
    lunge_trainer_style:
      name: Lunge antrenman aleti tasarım tipi
      description: Bir lunge antrenman aletinin yapısal tasarımını tanımlar.
    lure_buoyancy:
      name: Sahte yem yüzdürme özelliği
      description: Yemin su içinde dinlenme halinde veya çekiş sırasında nasıl davrandığını
        belirtir (örneğin, yüzeyde yüzme, orta derinlikte askıda kalma veya batma).
    luster:
      name: Parlaklık
      description: Işığın numune yüzeyiyle (örneğin, camsı, metalik) etkileşim biçimini
        tanımlar.
    lychee_cultivar:
      name: Liçi çeşidi
      description: Belirli liçi çeşidini veya kültivarını (örneğin Brewster, Hak Ip
        veya Mauritius) belirtir; bu çeşitler tat, çekirdek boyutu, hasat dönemi ve
        fiyat açısından farklılık gösterebilir.
    lyre_flip_folder_mounting_location:
      name: Lyre/flip aparatının montaj konumu
      description: Lyre veya flip aparatının enstrüman ya da aksesuar üzerinde (örneğin
        çan, boru, stand) monte edilmesi amaçlanan konumu belirtir.
    lyrics_display_type:
      name: Şarkı sözü görüntüleme türü
      description: Karaoke sırasında şarkı sözlerinin nasıl görüntülendiği (eğer destekleniyorsa).
    magazine_compatibility:
      name: Şarjör uyumluluğu
      description: Yeleğin üzerindeki dahili ceplerin hangi şarjör kalibreleri veya
        tipleri için tasarlandığını belirtir.
    magnet_requirement:
      name: Mıknatıs gereksinimi
      description: Sensörün çalışması için harici bir mıknatısa ihtiyaç duyup duymadığını
        belirtir.
    magnet_toy_storage_included:
      name: Mıknatıslı oyuncak saklama kutusu dahildir
      description: Masaüstü düzenleme ve seyahat için mıknatıslı oyuncakla birlikte
        verilen saklama/koli tipi.
    malanga_variety:
      name: Malanga çeşidi
      description: Satılan malanga/taro kökünün belirli çeşidini belirtir; bu, alıcının
        istediği lezzet, renk veya mutfak kullanımına göre seçim yapmasına yardımcı
        olur.
    malt_color_rating_system:
      name: Malt renk derecelendirme sistemi
      description: Belirtilen rengin hangi ölçeğe (Lovibond, SRM veya EBC) göre ifade
        edildiğini belirtir.
    malt_crush:
      name: Malt ezme durumu
      description: Temel maltın bütün/öğütülmemiş mi yoksa önceden ezilmiş mi satıldığını
        ve varsa ezme tipini belirtir.
    malt_form:
      name: Malt formu
      description: Ürünün bütün taneli mi yoksa mayşeleme için işlenmiş (örneğin ezilmiş)
        olarak mı satıldığını belirtir.
    malt_intended_use:
      name: Malt kullanım amacı
      description: Maltın asıl kullanım amacı (bira yapımı, damıtma veya çift amaçlı
        kullanım).
    malt_treatment:
      name: Malt işlem türü
      description: Tahılın/maltın standart kurutma işlemi dışında nasıl işlendiğini
        açıklar (yaygın özel işlemler).
    malt_usage_purpose:
      name: Malt kullanım amacı
      description: Özel bir maltın bira tarifine olan temel işlevsel katkısını açıklar.
    man_overboard_system_type:
      name: Denize düşen kişi (MOB) sistemi tipi
      description: Ürün tarafından sağlanan başlıca denize düşen kişi (MOB) çözüm
        kategorisini belirtir.
    mandolin_back_sides_wood:
      name: Mandolin arka ve yan ahşap türü
      description: Mandolinin arka ve yan kısımlarında kullanılan ağaç türlerini belirtir.
    mandolin_body_top_wood:
      name: Mandolin üst kapak ahşap türü
      description: Mandolin ses tahtasında (üst kapak) kullanılan ana ahşap veya malzemeyi
        belirtir.
    mandolin_bridge_type:
      name: Mandolin köprü tipi
      description: Mandolinde kullanılan köprünün stilini belirtir.
    mandolin_pickup_configuration:
      name: Mandolin manyetik konfigürasyonu
      description: Mandolinin elektronik donanım içerip içermediğini ve hangi tip
        manyetik/pickup sisteminin bulunduğunu belirtir.
    mandolin_string_configuration:
      name: Mandolin tel konfigürasyonu
      description: Mandolinin tel konfigürasyonunu toplam tel sayısı ve course sayısı
        ile belirtir (örneğin 8 tel / 4 course).
    mangosteen_variety:
      name: Mangostan çeşidi
      description: Satılan mangostan veya yakından ilişkili Garcinia meyvesinin türünü
        veya çeşidini belirtir.
    mannequin_style:
      name: Manken tasarım tipi
      description: Eğitim mankeninin yapısal tasarımını veya yapım tarzını tanımlar.
    manufacturing_process:
      name: Üretim süreci
      description: Makara gövdesinin veya tamburun birincil üretim yöntemini belirtir
        (örneğin CNC işleme, kalıp döküm).
    map_coverage_sky_planet_body:
      name: Harita kapsamı (gökyüzü/gezegen cismi)
      description: 'Haritanın neyi gösterdiğini belirtir: gece gökyüzü (takımyıldızlar)
        veya belirli bir gezegen cismi.'
    map_format:
      name: Harita formatı
      description: Avcılık haritalarının ve rehberlerinin fiziksel veya dijital sunumunu
        tanımlar.
    map_sensor_output_signal_type:
      name: MAP sensörü çıkış sinyali tipi
      description: MAP sensörünün motor kontrol ünitesine (ECU) sağladığı çıkış sinyalinin
        türünü belirtir.
    map_size_sheet:
      name: Harita boyutu (sayfa)
      description: Harita sayfasının/posterin/planisferin nihai boyutunu (çerçeve
        boyutu, duvar alanı vb.) belirterek sergileme ve uyumluluk açısından bilgi
        verir.
    marabou_feather_form:
      name: Marabu tüyü formu
      description: Satılan marabu tüyü ürününün formunu belirtir.
    marabou_feather_treatment:
      name: Marabu tüyü işlem türü
      description: Marabu tüyünün el işi kullanımına uygun şekilde nasıl işlendiğini
        veya son işlemlerinin nasıl yapıldığını belirtir.
    marble_track_set_feature_modules:
      name: Bilye parkuru seti özellik modülleri
      description: Sete dahil olan özel işlevsel modülleri belirtir (örneğin asansör,
        fırlatıcı, anahtar mekanizmaları).
    marine_flare_certification_standard:
      name: Deniz işaret fişeği sertifikasyon standardı
      description: Bu işaret fişeğinin hangi deniz güvenliği sertifikalarına veya
        standartlarına uygun olduğunu belirtir.
    marine_safety_standard_compliance:
      name: Denizcilik güvenlik standartlarına uyum
      description: Aksesuarın hangi resmi su güvenliği standartlarını karşıladığını
        veya onayladığını gösterir.
    marine_transmission_type:
      name: Deniz şanzıman tipi
      description: İçten takmalı motorla eşleştirilen deniz şanzımanının tipini belirtir
        (örneğin, direkt tahrikli veya V-tahrikli).
    marker_action_type:
      name: Marker çalışma tipi
      description: İşaretleyicinin temel ateşleme/çalışma mekanizmasını açıklar.
    marker_caliber:
      name: İşaretleyici kalibresi
      description: İşaretleyicinin ateşleyebileceği paintball toplarının çapını belirtir.
    marking_durability:
      name: İşaretleme dayanıklılığı
      description: Boyalı çizginin normal koşullarda ne kadar süre görünür kalmasının
        beklendiğini belirtir (örneğin geçici, yarı kalıcı veya kalıcı).
    marking_tip_type:
      name: İşaretleme ucu tipi
      description: Pusulanın çizim için kullandığı işaretleme ucu türünü belirtir
        (örneğin kurşun kalem tutucu, mürekkep ucu veya çizim ucu).
    marshmallow_processing_method:
      name: Marshmallow işleme yöntemi
      description: Marshmallowların dokusunu, raf ömrünü veya tadını etkileyen özel
        işlemleri belirtir.
    marshmallow_size:
      name: Marshmallow boyutu
      description: Marshmallow parçalarının göreli boyutunu sınıflandırır.
    martial_arts_belt_rank:
      name: Dövüş sanatları kemer rütbesi
      description: Kemerin üzerindeki renk veya özel renk kombinasyonunun temsil ettiği
        beceri/rütbe seviyesini gösterir.
    mask_bib_type:
      name: Maske önlük tipi
      description: Eskrim maskesinin önlük tipini belirtir; örneğin standart kumaş,
        iletken, çıkarılabilir veya hiçbiri.
    mask_cage_material:
      name: Maske kafesi malzemesi
      description: Yüz kafesi veya maske Frame için özel olarak kullanılan malzeme.
    mask_goggle_design:
      name: Maske/gözlük tasarımı
      description: Koruyucu ekipmanın genel yapısal tasarımını veya kaplama stilini
        tanımlar.
    mask_skirt_material:
      name: Maske etek malzemesi
      description: Maske ile yüz arasında su geçirmez bir sızdırmazlık sağlayan yumuşak
        eteğin malzemesini tanımlar.
    mask_strap_material:
      name: Maske kayış malzemesi
      description: Maskeyi başa sabitleyen kayışın malzemesini belirtir.
    mass_air_flow_sensor_measurement_type:
      name: Kütle hava akış sensörü ölçüm tipi
      description: MAF sensörünün kullandığı algılama teknolojisini/çıkış stilini
        belirtir.
    mass_air_flow_sensor_mounting_type:
      name: Kütle hava akış sensörü montaj tipi
      description: MAF sensörünün veya sensör grubunun emme sistemine nasıl monte
        edildiğini belirtir.
    massage_feature:
      name: Masaj özelliği
      description: Ayarlanabilir tabanın entegre masaj işlevi içerip içermediğini
        ve içeriyorsa kaç masaj bölgesi sunduğunu belirtir.
    mast_attachment_interface:
      name: Direk bağlantı arayüzü
      description: Gövde ile direk arasındaki bağlantı standardını belirtir; bu, bileşenlerin
        uyumluluğunu kontrol etmeye yardımcı olur.
    mast_base_type:
      name: Direk tabanı tipi
      description: Direği panoya veya adaptöre bağlayan montaj arayüzünü tanımlar.
    mast_bend_curve:
      name: Direk büküm eğrisi
      description: Direğin esneklik karakteristiğini belirtir; bu, yelken uyumluluğunu
        ve kullanım özelliklerini etkiler.
    mast_diameter_type:
      name: Direk çapı tipi
      description: Standartlaştırılmış rüzgar sörfü direği çap sınıflandırması (örneğin
        RDM, SDM, MDM); uyumluluk kontrolleri için kullanılır.
    mat_backing_type:
      name: Paspas alt kaplama tipi
      description: Paspasın nasıl monte edildiğini veya sabitlendiğini belirtir.
    mat_installation_method:
      name: Mat montaj yöntemi
      description: Paspasın nasıl monte edildiğini veya yerine nasıl sabitlendiğini
        gösterir.
    mat_style:
      name: Paspas stili
      description: Minderin yapısal stilini veya şeklini tanımlar (örneğin, katlanır
        minder, birbirine kenetlenen kutucuk, çarpma minderi).
    maternity_panel_type:
      name: Hamilelik paneli tipi
      description: Hamilelikte oluşan büyümeyi karşılamak üzere tasarlanmış esnek
        panel veya bel bandının stilini belirtir.
    maternity_waistband_style:
      name: Hamilelik bel bandı stili
      description: Hamile pantolonlarına özgü bel bandı veya karın panelinin tasarımını
        ve yerleşimini belirtir; giysinin büyüyen karın bölgesini nasıl desteklediğini
        açıklar.
    mattress_top_type:
      name: Yatak üst katman tipi
      description: Yatağın üst katmanının veya yüzey yapısının stilini belirtir; örneğin,
        yastık üstü veya sıkı üst.
    maturation_vessel_material:
      name: Olgunlaştırma kabı malzemesi
      description: Şoçu'nun yıllandırılmasında kullanılan kap veya fıçının ana malzemesini
        belirtir.
    maximum_quilt_size_supported:
      name: Desteklenen maksimum yorgan boyutu
      description: Çerçevenin taşıyabileceği maksimum yorgan/proje boyutunu belirtir
        (genellikle yatak ölçüsü veya maksimum genişlik olarak ifade edilir).
    meal_course:
      name: Öğün türü
      description: Ürünün tipik olarak hangi öğünde tüketildiğini belirtir.
    meal_preparation_state:
      name: Yemek hazırlık durumu
      description: Tüketimden önce gereken hazırlık düzeyini belirtir (örneğin yemeye
        hazır, yemek kiti).
    meat_processing_state:
      name: Et işleme durumu
      description: Et ürününe satıştan önce uygulanan pişirme veya kürleme derecesini
        belirtir.
    meat_quality_grade:
      name: Et kalite derecesi
      description: Etin, tanınmış bir derecelendirme kuruluşu (örneğin USDA, MSA,
        Wagyu) tarafından verilen kalite derecesini veya sınıflandırmasını belirtir.
    meat_raising_claim:
      name: Et yetiştirme beyanı
      description: Etle ilişkilendirilen yaygın hayvan refahı veya yetiştirme uygulaması
        beyanlarını belirtir (örneğin, otla beslenmiş, serbest dolaşan).
    mechanical_loom_assembly_status:
      name: Mekanik dokuma tezgahı montaj durumu
      description: Tezgahın montaj gereksinimine bağlı olarak nasıl gönderildiğini
        veya teslim edildiğini belirtir.
    mechanical_loom_weaving_type:
      name: Mekanik dokuma tezgahı dokuma türü
      description: Dokuma tezgahının desteklediği temel dokuma mekanizması/türü.
    mechanical_puzzle_primary_mechanism:
      name: Mekanik bulmacanın temel mekanizması
      description: Mekanik bulmacayı çözmek için kullanılan temel etkileşim/mekanizma.
    mechanical_puzzle_solution_format:
      name: Mekanik bulmaca çözüm formatı
      description: İpuçları veya çözümlerin (varsa) hangi formatta sunulduğunu belirtir.
    medal_attachment_style:
      name: Madalya bağlantı stili
      description: Madalyanın nasıl takılacağını veya sergileneceğini belirtir (örneğin,
        boyun kurdelesi, iğneli arka kapama).
    medal_award_level:
      name: Madalya ödül seviyesi
      description: Madalyanın temsil ettiği ödül seviyesini belirtir (örneğin, 1.
        sıra, katılımcı).
    medal_finish:
      name: Madalya yüzey bitişi
      description: Madalyanın malzemeden bağımsız olarak yüzey bitişini (parlaklık/doku)
        belirtir.
    medal_packaging:
      name: Madalya ambalajı
      description: Madalyayla birlikte verilen sunum ambalajının türünü belirtir.
    melodica_accessory_set_included:
      name: Melodika aksesuar seti dahildir
      description: Melodika paketine dahil olan yaygın aksesuarları belirtir.
    melodica_air_chamber_material:
      name: Melodika hava haznesi malzemesi
      description: Melodikanın hava haznesinin/gövdesinin malzemesini belirtir (örneğin
        ABS, ahşap vb.); bu özellik, diğer parçalardan ayırt edilmesini sağlar.
    melodica_included_accessories:
      name: Dahil olan melodika aksesuarları
      description: Kutuda melodika ile birlikte gelen aksesuarlar.
    melodica_key_color_scheme:
      name: Melodika tuş renk şeması
      description: Tuşların renk şemasını belirtir (gövde hariç); bu özellikle çocuklar
        ve yeni başlayanlar için okunabilirliği etkiler.
    melodica_mouthpiece_configuration:
      name: Melodika ağızlık konfigürasyonu
      description: Melodika için hangi üfleme arayüzlerinin dahil edildiğini veya
        kullanıldığını belirtir.
    melodica_mouthpiece_type:
      name: Melodika ağızlık tipi
      description: Melodika ile birlikte verilen üfleme arayüzü stilini belirtir (ağızlık
        ve/veya esnek hortum).
    melodica_reed_plate_material:
      name: Melodika kamış plakası malzemesi
      description: Enstrüman gövdesinden ayrı olarak kamış plakasının malzemesini
        belirtir; bu dayanıklılığı ve tonu etkileyebilir.
    melodica_size_class:
      name: Melodika boyut sınıfı
      description: Melodikanın genel boyut/taşınabilirlik sınıfını belirtir; genellikle
        tuş sayısı ve form faktörüne göre sınıflandırılır (örneğin mini/öğrenci, standart,
        genişletilmiş aralık).
    melon_variety:
      name: Kavun çeşidi
      description: Üründe bulunan kavun türünü belirtir; bu, alıcının tercih ettiği
        çeşidi hızlıca belirlemesine yardımcı olur.
    memory_foam_infusion_material:
      name: Hafıza köpüğü infüzyon malzemesi
      description: Soğutma, koku kontrolü veya antimikrobiyal amaçlarla hafıza köpüğüne
        katılan özel maddeleri tanımlar.
    memory_wire_gauge:
      name: Hafıza teli ölçüsü
      description: Hafıza telinin Amerikan Tel Ölçüsü (AWG) değerini belirtir.
    memory_wire_project_size:
      name: Hafıza teli proje boyutu
      description: Hafıza telinin tasarlandığı takı formunu/sarmal boyutunu belirtir
        (örneğin bileklik, kolye, yüzük).
    metal_purity:
      name: Metal saflığı
      description: Takıda kullanılan metalin saflık derecesini belirtir (genellikle
        karat veya binde bir olarak ifade edilir).
    metrics_counted:
      name: Sayılan metrikler
      description: Sayacın takip etmek üzere tasarlandığı istatistik veya olayları
        listeler.
    metronome_display_style:
      name: Metronom gösterim tipi
      description: Tempo bilgisinin kullanıcıya nasıl gösterileceğini/bildirileceğini
        belirtir (ibre/sarkaç, sayısal LED/LCD veya yanıp sönen ışık).
    metronome_output_method:
      name: Metronom çıkış yöntemi
      description: Metronom sesi/vuruş sinyali için mevcut çıkış yöntemlerini belirtir.
    microphone_toy_feature_set:
      name: Oyuncak mikrofon özellik seti
      description: Oyuncak mikrofonların oyun odaklı temel özelliklerini belirtir
        (ses efektleri, yükseltme, kayıt vb.).
    midi_output_type:
      name: MIDI çıkış türü
      description: Tetikleyici modül tarafından sağlanan MIDI çıkış türlerini belirtir.
    military_branch:
      name: Askeri kuvvet
      description: Üniformanın hangi askeri kuvvete ait olduğunu veya hangi kuvvetten
        esinlendiğini belirtir.
    milk_base_type:
      name: Süt baz türü
      description: İçecekte kullanılan ana süt veya süt alternatifini (varsa) belirtir.
    milk_feeding_method:
      name: Hayvan besleme yöntemi
      description: Süt kaynağı olan hayvanların nasıl beslendiğini belirtir (örneğin
        otla beslenen, tahılla beslenen).
    milk_processing_method:
      name: Süt işleme yöntemi
      description: Sütün geçirdiği işlem veya işleme tekniğini belirtir; bu teknik
        güvenlik, raf ömrü ve besin özelliklerini etkiler.
    milk_source_animal:
      name: Süt kaynağı hayvan
      description: Sütün hangi hayvandan elde edildiğini belirleyerek tüketicilerin
        inek, keçi, manda veya diğer hayvansal kaynaklı süt ürünleri olup olmadığını
        anlamalarına yardımcı olur.
    millet_processing_method:
      name: Darı işleme yöntemi
      description: Darı tanesinin birincil işleme yöntemini veya durumunu belirtir
        (örneğin, işlenmemiş, kabuğu soyulmuş, filizlendirilmiş).
    millet_variety:
      name: Darı çeşidi
      description: Üründe bulunan darı çeşidini belirtir (örneğin, inci darı, tilki
        kuyruğu darı, parmak darı).
    milling_process:
      name: Öğütme işlemi
      description: Öğütme işleminde kullanılan üretim yöntemini belirtir; bu yöntem
        tat, ısı maruziyeti ve besin değerini etkileyebilir.
    mint_mark:
      name: Darphane damgası
      description: Madeni para üzerinde bulunan darphane işaretini belirtir (varsa).
    mirror_configuration:
      name: Ayna konfigürasyonu
      description: Makyaj masası takımına dahil olan aynanın stilini veya yapısını
        belirtir.
    mirror_coverage:
      name: Ayna kaplama alanı
      description: Sürgülü kapılardaki ayna panellerinin kapsamını tanımlar.
    mirror_curvature_type:
      name: Ayna eğrilik tipi
      description: Ayna yüzeyinin dışbükey, düz veya içbükey olup olmadığını belirtir;
        bu görüş alanını etkiler.
    mirror_mounting_location:
      name: Ayna montaj yeri
      description: Aynanın bisikletin veya sürücünün neresine monte edileceğini belirtir.
    mirror_shape:
      name: Ayna şekli
      description: Makyaj setine dahil olan ana aynanın geometrik şeklini veya stilini
        belirtir.
    mix_ratio:
      name: Karışım oranı
      description: Konsantre ürünler için önerilen soğutma sıvısı-su seyreltme oranını
        veya önceden seyreltilmiş ürünlerde sabit karışım oranını belirtir.
    mma_glove_type:
      name: MMA eldiveni türü
      description: Bu, eldivenin MMA antrenmanı veya müsabakası içindeki birincil
        kullanım amacını veya stilini belirtir.
    mobility_features:
      name: Hareketlilik özellikleri
      description: Tekerlekler veya katlanabilir ayaklar gibi yerleşik hareket veya
        taşınabilirlik unsurlarını belirtir.
    model_aircraft_assembly_level:
      name: Model uçak montaj seviyesi
      description: Uçağın kullanılabilmesi için ne kadar montaj gerektiğini belirtir.
    model_making_kit_items_included:
      name: Model yapım kitine dahil olan ürünler
      description: Model yapım kiti veya paketinin içeriğini listeler (örneğin boya,
        tutkal, fırça).
    model_making_product_type:
      name: Model yapım ürün tipi
      description: Model yapımı kategorisindeki farklı ürün türleri arasında gezinmeyi
        ve filtrelemeyi iyileştirmek için ürünün temelde ne olduğunu (kit, aksesuar,
        alet veya sarf malzemesi) belirtir.
    model_rocket_kit_contents:
      name: Model roket kiti içeriği
      description: Ürünün komple çok aşamalı bir model roket kiti mi yoksa bir eklenti/modül/parça
        kiti mi (örneğin itici veya sürdürücü kademe bileşenleri) olduğunu belirtir.
    model_rocket_kit_format:
      name: Model roket kit formatı
      description: Roketin kit halinde mi satıldığını ve montaj hazırlık seviyesini
        belirtir.
    model_rocket_motor_impulse_class:
      name: Model roket motoru itki sınıfı
      description: Model roket motorunun standart toplam itki sınıfını (örneğin A,
        B, C vb.) belirtir.
    model_rocket_motor_mount_size:
      name: Model roket motor yuvası çapı
      description: Roketin motor yuvasının kabul edeceği motor gövdesi çapını belirtir.
    model_rocket_power_source_required:
      name: Model roket için gereken güç kaynağı
      description: Ürünün pil veya harici güç gerektirip gerektirmediğini ve ne tür
        bir güç kaynağına ihtiyaç duyduğunu belirtir.
    model_rocket_propellant_type:
      name: Model roket yakıtı türü
      description: Model roketçiliğinde kullanılan itici güç/motor sistemini tanımlar.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Model roket için önerilen fırlatma çubuğu veya ray boyutu
      description: Roketin tasarlandığı fırlatma çubuğu çapını veya ray boyutunu belirtir
        (örneğin 1/8 inç çubuk, 1010 ray).
    model_rocket_recovery_method:
      name: Model roket kurtarma yöntemi
      description: Roketin uçuş sonrası güvenle geri dönüşü için kullanılan birincil
        geri kurtarma sistemi
    model_rocket_recovery_system_type:
      name: Model roket kurtarma sistemi tipi
      description: Roketin uçuş sonrasında güvenli bir şekilde geri dönmesi için kullanılan
        birincil kurtarma yöntemini belirtir.
    model_rocket_staging:
      name: Model roket aşamalandırması
      description: Model roketin kaç motorlu kademe ile uçacak şekilde tasarlandığını
        belirtir.
    model_train_accessory_electrical_connection_type:
      name: Model tren aksesuarı elektrik bağlantı tipi
      description: Model tren aksesuarlarının düzeneğe bağlanmasında kullanılan bağlantı
        veya terminal tipini belirtir (uygulanabilir olduğunda).
    model_train_coupler_type:
      name: Model tren kaplin tipi
      description: Model tren vagonu veya lokomotifinde kullanılan kaplin standardını
        belirtir.
    model_train_gauge:
      name: Model tren ray açıklığı
      description: Aksesuarın hangi model demiryolu ray açıklığı sistemi için tasarlandığını
        belirtir (uygulanabilir olduğunda) ve kullanıcının ray ve düzeniyle fiziksel
        uyumluluğun sağlanmasına yardımcı olur.
    model_train_lighting_features:
      name: Model tren aydınlatma özellikleri
      description: Model tren/lokomotifte bulunan aydınlatma fonksiyonlarını belirtir.
    model_train_power_pickup_method:
      name: Model tren güç alma yöntemi
      description: Modelin çalışması için gücü nasıl aldığına ilişkin yöntemi belirtir
        (raydan güç, pil vb.).
    model_train_scale:
      name: Model tren ölçeği
      description: Model trenin ölçek standardını belirtir (model ile gerçek tren
        arasındaki oran).
    model_train_sound_features:
      name: Model tren ses özellikleri
      description: Modelin yerleşik ses efektleri içerip içermediğini ve ne tür ses
        özellikleri sunduğunu belirtir.
    model_train_track_gauge:
      name: Model tren ray açıklığı
      description: Modelin çalışmak üzere tasarlandığı ray açıklığı veya ray sistemi
        standardını belirtir (örneğin standart ray açıklığı, dar ray açıklığı varyantları
        veya uygulanabildiği durumlarda markaya/sisteme özgü ray sistemleri).
    modeling_dough_base_material:
      name: Modelleme hamuru taban malzemesi
      description: Modelleme hamurunun ana bileşimini belirtir (örneğin buğday/un
        bazlı veya polimer bazlı).
    modeling_dough_features:
      name: Modelleme hamuru özellikleri
      description: Alıcıların genellikle filtrelediği modelleme hamurunun temel fonksiyonel
        özellikleri.
    modification_level:
      name: Modifikasyon seviyesi
      description: Maltın ne kadar modifiye edildiğini (arpa endospermi/proteinlerinin
        ne kadar iyice parçalandığını) gösterir ve genellikle az modifiye edilmiş/modifiye
        edilmiş/aşırı modifiye edilmiş olarak özetlenir.
    molasses_base_ingredient:
      name: Pekmez ana ham maddesi
      description: Pekmezin üretildiği başlıca bitki veya meyve kaynağını belirtir.
    molasses_grade:
      name: Pekmez sınıfı
      description: Pekmezi, lezzet yoğunluğunu, rengini ve besin profilini doğrudan
        etkileyen ekstraksiyon/rafine etme aşamasına göre sınıflandırır.
    mold_material:
      name: Kalıp malzemesi
      description: Kalıbın ana malzeme bileşimini belirtir (örneğin silikon, plastik,
        metal).
    molle_compatibility:
      name: MOLLE uyumluluğu
      description: Yeleğin, modüler çanta ve aksesuarları takmak için MOLLE/PALS dokuma
        sistemine sahip olup olmadığını belirtir.
    motor_belt_type:
      name: Motor kayışı tipi
      description: Koşu bandı tahrik sisteminde kullanılan kayışın tasarımını/profilini
        tanımlar.
    motor_configuration:
      name: Motor konfigürasyonu
      description: Scooterın kaç adet bağımsız tahrik motoru kullandığını gösterir.
    motor_mounting_configuration:
      name: Motor montaj konfigürasyonu
      description: Scooter için dönüştürme kitinde motorun nasıl monte edildiğini
        veya entegre edildiğini açıklar.
    motor_mounting_position:
      name: Motor montaj konumu
      description: Elektrikli scooter’da motorun nereye monte edildiğini belirtir
        (örneğin ön teker göbeği, arka teker göbeği, çift göbek veya orta tahrik).
    motor_position:
      name: Motor konumu
      description: Elektrikli bisiklette motorun nerede bulunduğunu belirtir; bu konum
        sürüş dinamiklerini ve bakım kolaylığını etkiler.
    motor_vehicle_a_v_integration_features:
      name: Motorlu taşıt ses/görüntü entegrasyon özellikleri
      description: Multimedya ünitesinin desteklediği araç içi ve akıllı telefon entegrasyon
        özelliklerini belirtir (örneğin Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Motorlu taşıt ampulü kullanım konumu
      description: Ampulün tasarlandığı araç aydınlatma konumunu veya işlevini belirtir
        (örneğin kısa far, fren lambası).
    motor_vehicle_bulb_approval_standard:
      name: Motorlu taşıt ampulü onay standardı
      description: Hedef pazarda yol kullanımına yönelik mevzuata uygunluk/onay işaretlemesini
        belirtir.
    motor_vehicle_oxygen_sensor_bank:
      name: Motorlu araç oksijen sensörü bankası
      description: V tipi veya boxer motorlarda oksijen sensörünün hangi silindir
        bankasına takıldığını belirtir (örneğin Bank 1 veya Bank 2); sıralı motorlarda
        “Uygulanamaz” kullanılır.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Motorlu taşıt oksijen sensörü kablo sayısı
      description: Oksijen sensörü kablo demetindeki kablo sayısını belirtir.
    motor_vehicle_oxygen_sensor_position:
      name: Motorlu taşıt oksijen sensörü konumu
      description: Oksijen (O2) sensörünün egzoz sisteminde katalitik konvertöre göre
        nerede monte edildiğini belirtir.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Motorlu taşıt oksijen sensörü numarası
      description: Belirli bir banka/konum ataması içindeki sensör numarasını (örneğin,
        Sensör 1 veya Sensör 2) gösterir.
    motor_vehicle_oxygen_sensor_type:
      name: Motorlu araç oksijen sensörü tipi
      description: Oksijen sensörünün tasarımını veya teknolojisini belirtir.
    motor_vehicle_paint_application_method:
      name: Motorlu taşıt boyası uygulama yöntemi
      description: Boyanın araç yüzeyine nasıl uygulanması gerektiği.
    motor_vehicle_paint_system_step:
      name: Motorlu taşıt boya sistemi adımı
      description: Ürünün, otomotiv boya yenileme sisteminin hangi aşaması veya bileşeni
        için tasarlandığını belirtir (örneğin, astar, baz kat, vernik).
    motor_vehicle_speaker_mounting_type:
      name: Motorlu taşıt hoparlör montaj tipi
      description: Hoparlörün araca nasıl monte edileceği (montaj şekli).
    motor_vehicle_subwoofer_size:
      name: Motorlu araç subwoofer boyutu
      description: Araç içi alan ve kasa uyumluluğunu belirlemek için kullanılan nominal
        subwoofer sürücü çapını belirtir (örneğin 8 inç, 10 inç, 12 inç).
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Motorlu taşıt subwoofer ses bobini konfigürasyonu
      description: Amplifikatör kablolama seçenekleriyle (örneğin SVC veya DVC) uyumlu
        olacak şekilde kullanılan ses bobini sayısını ve yapılandırmasını belirtir.
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Motorlu taşıt subwoofer ses bobini empedansı (bobin başına)
      description: Kablolama hesaplamalarında kullanılan, her bir ses bobininin empedans
        değerini belirtir (nihai bağlanmış yük değil).
    motor_vehicle_voltage_regulator_type:
      name: Motorlu taşıt voltaj regülatörü tipi
      description: Motorlu taşıtlarda kullanılan regülatörün teknoloji veya tasarım
        tipini belirtir.
    motorcycle_armor_certification_standard:
      name: Motosiklet zırhı sertifikasyon standardı
      description: Koruyucunun hangi resmi güvenlik standardına uygun olarak sertifikalandırıldığını
        gösterir (örneğin, sırt koruyucuları için EN 1621-2, göğüs koruyucuları için
        EN 1621-3).
    motorcycle_cover_size_class:
      name: Motosiklet örtüsü beden sınıfı
      description: Uygun olduğu tipik motosiklet kategorisi veya uzunluk aralığına
        göre belirlenen motosiklet örtüleri için standart beden sınıflandırmasını
        belirtir.
    motorcycle_glove_certification_standard:
      name: Motosiklet eldiveni sertifikasyon standardı
      description: Eldivenlerin uyduğu koruyucu sertifikayı/standardı belirtir (örneğin,
        EN 13594 seviyeleri).
    motorcycle_glove_waterproof_construction:
      name: Motosiklet eldiveni su geçirmezlik yapısı
      description: Eldivende kullanılan su geçirmezlik yönteminin türünü belirtir
        (varsa).
    motorcycle_guard_coverage_area:
      name: Motosiklet koruma kapsama alanı
      description: Ürünün sağladığı başlıca koruma alanını belirtir (dirsek, bilek,
        önkol veya kombinasyon).
    motorcycle_kidney_belt_construction_type:
      name: Motosiklet böbrek kemeri yapım tipi
      description: Böbrek kemerinin yapım tarzını belirtir; bu yapı sertliği, hava
        akışını ve koruma düzeyini etkiler.
    motorcycle_kidney_belt_purpose:
      name: Motosiklet böbrek kemerinin amacı
      description: Motosiklet böbrek kemerinin hangi temel sürüş stili veya senaryosu
        için tasarlandığını belirtir.
    motorcycle_luggage_capacity_class:
      name: Motosiklet bagaj kapasitesi sınıfı
      description: Motosiklet bagajının hacim kapasitesini litre aralığı olarak belirtir.
    motorcycle_luggage_mounting_system:
      name: Motosiklet bagaj montaj sistemi
      description: Çanta veya yan çantayı motosiklete sabitlemek için kullanılan bağlantı/montaj
        sistemini belirtir (örneğin, sele üzerinden atılan kayışlar, bagaj rafına
        monte edilen hızlı sök-tak mekanizması).
    motorcycle_luggage_side:
      name: Motosiklet bagajı tarafı
      description: Yan çantalar/sele çantaları için ürünün sol taraf, sağ taraf veya
        çift/set olarak mı sunulduğunu belirtir.
    motorcycle_protective_gear_size_system:
      name: Motosiklet koruyucu ekipman beden sistemi
      description: Üründe kullanılan beden sistemini belirtir (örneğin, alfabetik
        beden, sayısal, tek beden).
    motorcycle_rack_carrier_style:
      name: Motosiklet taşıyıcı raf tipi
      description: Motosiklet veya scooter taşımak için kullanılan taşıyıcı sistemin
        tipini belirtir (örneğin platformlu, raylı, lift destekli vb.).
    motorcycle_riding_discipline:
      name: Motosiklet sürüş disiplini
      description: Boyun desteğinin tasarlandığı birincil sürüş/kullanım disiplinini
        belirtir.
    motorcycle_tire_speed_rating:
      name: Motosiklet lastiği hız derecesi
      description: Lastiğin dayanabileceği maksimum sürekli hızı, standart harf kodu
        (örneğin, H, V, W) kullanarak belirtir.
    motorsport_window_net_certification:
      name: Motorsporları pencere ağı sertifikasyon standardı
      description: Pencere ağının karşılamış olduğu yarış güvenliği sertifikasını
        veya homologasyonunu belirtir (örneğin SFI veya FIA); varsa ilgili spesifikasyon
        numarasını da içerir.
    mound_usage_type:
      name: Atış tümseği kullanım türü
      description: Atış tümseğinin kullanım amacını belirtir (örneğin antrenman, maç,
        bullpen veya çok amaçlı).
    mount_attachment_method:
      name: Montaj bağlantı yöntemi
      description: Montaj parçasının araç yüzeyine/yapısına nasıl takılacağını belirtir.
    mountainboard_truck_type:
      name: Arazi kaykayı aks tipi
      description: Arazi kaykayı ile birlikte gelen aks tipini sınıflandırır; bu tip
        dönüş tepkisini ve dayanıklılığı etkiler.
    mounting_attachment_method:
      name: Montaj/bağlantı yöntemi
      description: Tutucu veya çantanın davula, standa, kemere ya da başka bir yüzeye
        nasıl sabitlenecek şekilde tasarlandığını belirtir.
    mounting_attachment_type:
      name: Montaj/bağlantı tipi
      description: Oran ayar aksesuarının çıkrığa nasıl monte edildiğini veya onunla
        nasıl bağlantı kurduğunu belirtir.
    mounting_hardware_included_for_installation:
      name: Montaj için gerekli donanım dahildir.
      description: Arka koltuğun montajı için gerekli olan bağlantı elemanlarının
        (örneğin, braketler, cıvatalar, raylar) ürünle birlikte verilip verilmediğini
        gösterir.
    mounting_location:
      name: Montaj yeri
      description: Işık/reflektör için ekipman veya vücut üzerinde amaçlanan yerleştirme
        alanını belirtir (örneğin, ön çatal, kask, jant telleri).
    mounting_method:
      name: Montaj yöntemi
      description: Çubuk veya fırça tutucunun nasıl monte edildiğini veya sabitlendiğini
        belirtir (örneğin kelepçeli, kayışlı, yapışkanlı).
    mounting_position:
      name: Montaj konumu
      description: Araç kabininde el freni kumandasının nereye monte edileceğini/kurulacağını
        belirtir.
    mounting_rail_type:
      name: Montaj rayı tipi
      description: Aksesuarın takılacağı ray veya arayüz standardını belirtir (örneğin
        Picatinny veya M-LOK).
    mounting_receiver_size:
      name: Montaj alıcısı boyutu
      description: Çeki demirine monte edilen yük taşıyıcıları için gerekli olan alıcı
        (receiver) boyutunu belirtir.
    mounting_storage_type:
      name: Montaj/Depolama tipi
      description: Cihazın gemide veya kişi üzerinde nasıl monte edileceğini ya da
        saklanacağını belirtir.
    mouth_grip_type:
      name: Ağız kavrama tipi
      description: Düdüğün ağızlık veya koruyucu kısmının konfor ve hijyen açısından
        türünü tanımlar.
    mouthguard_mold_type:
      name: Ağız koruyucu kalıp tipi
      description: Ağız koruyucusunun sporcunun dişlerine nasıl takıldığını açıklar
        (örneğin, kaynatıp şekillendirilen, kişiye özel diş uyumu).
    mouthpiece_facing_length:
      name: Ağızlık ön uzunluğu
      description: Ağızlığın ön yüz (dönme) eğri uzunluğu kategorisini belirtir (ağızlığın
        toplam uzunluğu değil); bu değer tepkiyi, direnci ve kamış uyumluluğunu etkiler.
    mouthpiece_material:
      name: Ağızlık malzemesi
      description: Üflemeli parti ürününün ağızla temas eden ağızlık/uç kısmında kullanılan
        malzemeyi belirtir; bu malzeme, ürünün ana gövde malzemesinden farklı olabilir.
    mouthpiece_shank_receiver_size:
      name: Ağızlık şaftı/receiver boyutu
      description: Flugelhorn ile uyumlu ağızlık şaftı/receiver standardını belirtir.
    mouthpiece_shank_size:
      name: Ağızlık şaft boyutu
      description: Kullanılacağı bakır üflemeli çalgı ile uyumluluğu sağlamak için
        ağızlık şaft/receiver uyum standardını belirtir.
    mouthpiece_shank_type:
      name: Ağızlık sap tipi
      description: "(Uygulanabilir olduğu durumlarda) uyumluluk için ağızlık receiver/şaft
        standardını belirtir."
    mouthpiece_style:
      name: Ağızlık stili
      description: Dizgin ağızlığının tasarımını/şeklini sınıflandırır; bu tasarım
        basınç noktalarını, etki şiddetini ve atın tercihlerini etkiler.
    mouthpiece_type:
      name: Ağızlık tipi
      description: Üfleme ucundaki ağızlık tipi (dahili, çıkarılabilir veya takılabilir
        modeller).
    movement_mechanism:
      name: Hareket mekanizması
      description: Kullanım sırasında bankın nasıl hareket ettiğini belirtir (sallanma,
        kayma, beşik hareketi vb.).
    muffin_size:
      name: Muffin boyut sınıfı
      description: Muffin ürününün fiziksel boyut formatını sınıflandırır (örneğin
        mini, standart, jumbo).
    mushroom_variety:
      name: Mantar çeşidi
      description: Üründe bulunan mantar veya trüfün türünü veya çeşidini belirtir
        (örneğin Shiitake, King Oyster, Black Truffle).
    music_stand_desk_tilt_adjustment:
      name: Müzik sehpası masa eğim ayarı
      description: Sehpa tablasının açısının ayarlanıp ayarlanamayacağını ve nasıl
        ayarlanabildiğini belirtir.
    music_stand_intended_use:
      name: Müzik sehpası kullanım amacı
      description: Standın asıl kullanım amacını belirtir.
    musical_block_pitch_type:
      name: Müzik bloğu perde türü
      description: Müzik bloğunun belirli (akortlu) veya belirsiz perde üretip üretmediğini
        belirtir.
    musical_box_mechanism_type:
      name: Müzik kutusu mekanizması tipi
      description: Müzik kutusunun sesi nasıl ürettiğini veya çaldığını belirtir (örneğin
        kurmalı mekanizma veya elektronik çalma).
    musical_keyboard_case_fit_type:
      name: Müzik klavyesi kılıf uyum tipi
      description: Kılıfın enstrümana göre nasıl boyutlandırıldığını belirtir (örneğin
        evrensel/genel boyut aralığı veya modele özel/özel uyum).
    musical_ratchet_sound_character:
      name: Müzikal cırcır ses karakteri
      description: Cırcır mekanizmasının tını/ses yüksekliği karakterinin genel açıklaması.
    musical_scraper_groove_surface_material:
      name: Müzikal kazıyıcı oluk yüzey malzemesi
      description: Oluklu/tırtıklı kazıyıcı yüzeyin malzemesini belirtir (gövde malzemesinden
        farklı olabilir).
    musical_scraper_type:
      name: Müzikal kazıyıcı tipi
      description: Müzikal kazıyıcı enstrümanın stilini/tasarımını belirtir (örneğin
        guiro veya reco-reco); bu tasarım sesi ve çalma tekniğini etkiler.
    mute_attachment_method:
      name: Susturucu bağlantı yöntemi
      description: Zil susturucusunun zile nasıl takıldığını veya nasıl sabitlendiğini
        belirtir (örneğin jel, statik yapışkan, mıknatıs, klips).
    mute_attenuation_level:
      name: Susturma azaltma seviyesi
      description: Susturucunun algılanan ses seviyesini ne kadar azalttığını belirtir.
    mute_cork_padding_material:
      name: Susturucu mantar/dolgu malzemesi
      description: Susturucunun temas dolgu malzemesini (örneğin tutuş ve zil koruması
        için kullanılan mantar şerit/pedler) belirtir.
    mute_coverage_type:
      name: Susturucu kapsama tipi
      description: Susturucunun çalma yüzeyindeki stilini veya kapsama alanını belirtir
        (küçük noktasal sönümleyicilerden tam yüzey pratik susturucularına kadar).
    mute_finish:
      name: Susturucu yüzey kaplaması
      description: Susturucunun dayanıklılığını ve estetiğini etkileyebilecek yüzey
        kaplamasını belirtir (örneğin cilalı veya saten).
    name_label_text_template:
      name: İsim etiketi metin şablonu
      description: İsim etiketine basılan önceden ayarlanmış metni veya şablonu belirtir
        (örneğin “Aittir”, “Yapan”).
    napkin_ply:
      name: Peçete kat sayısı
      description: Kokteyl peçetesinin kalınlığını kat sayısı ile belirtir.
    neck_brace_fit_system:
      name: Boyunluk uyum sistemi
      description: Boyunluğun sürücüye ayarlanması ve sabitlenmesi için kullanılan
        başlıca yöntemi belirtir.
    neck_brace_size_basis:
      name: Boyunluk beden belirleme ölçütü
      description: Doğru boyunluk bedenini seçmek için kullanılan ölçütü belirtir.
    neck_configuration:
      name: Boyun konfigürasyonu
      description: Saksafonla birlikte verilen boyun (neck) stilini veya yapılandırmasını
        belirtir; bu yapı ergonomiyi ve çalınabilirliği etkiler.
    neck_coverage_type:
      name: Boyun kapsama tipi
      description: Battaniye ile birlikte sunulan boyun örtüsü stilini belirtir.
    neck_support_size_system:
      name: Boyun desteği beden sistemi
      description: Yarış boyun desteği/korsesi için kullanılan beden sistemini belirtir
        (örneğin, yetişkin, genç veya tek beden).
    necklace_length_type:
      name: Kolye uzunluk tipi
      description: Stile uygun alışverişi kolaylaştırmak için gerdanlık veya opera
        kolyesi gibi geleneksel kolye uzunluğu kategorilerini belirtir.
    needle_balance_zone:
      name: Pusula iğnesi denge bölgesi
      description: Pusula iğnesinin ayarlandığı manyetik denge bölgesini veya yarım
        küreyi belirtir; bu sayede doğru ölçüm sağlar.
    needle_case_format:
      name: İğne kutusu formatı
      description: İğne kutusunun genel düzenleyici form faktörünü belirtir.
    needle_damping_type:
      name: İğne sönümleme tipi
      description: Pusula iğnesinin nasıl sabitlendiğini (örneğin, sıvı dolu, kuru
        veya elektronik olarak sabitlenmiş) ve bunun yerleşme süresini ve dayanıklılığını
        nasıl etkilediğini açıklar.
    needle_felting_needle_profile:
      name: Keçe iğnesi profili
      description: Keçe iğnesinin kesit/profil görünümü, liflerin nasıl hareket ettirildiğini
        ve elde edilen yüzeyin görünümünü etkiler.
    needle_holder_features:
      name: İğne tutucu özellikleri
      description: İğne tutucunun öne çıkan fonksiyonel özelliklerini belirtir.
    needle_holder_mounting_attachment_method:
      name: İğne tutucu montaj/bağlantı yöntemi
      description: İğne tutucunun saklama sırasında nasıl sabitleneceğini veya kullanılacağını
        belirtir (örneğin manyetik, klipsli, kayışlı).
    needle_holder_style:
      name: İğne tutucu tipi
      description: İğne tutucunun fiziksel saklama veya taşıma tasarımını belirtir.
    needle_pushing_surface_type:
      name: İğne itme yüzey tipi
      description: Dikiş yüksüğünün (sewing palm) üzerindeki iğne itme yüzeyinin türünü/tasarımını
        belirtir (örneğin metal oyuk, madeni para tipi veya güçlendirilmiş parça).
    needle_requirement_beading_pattern:
      name: İğne gereksinimi (boncuk deseni)
      description: Modelde önerilen iğne tipi ve/veya boyutunu belirtir.
    needle_size_system:
      name: İğne boyutu sistemi
      description: İğne boyut etiketlemesinde kullanılan ölçü standardını belirtir.
    needle_threader_compatible_needle_type:
      name: İğne iplik geçirici ile uyumlu iğne tipi
      description: İplik geçiricinin hangi iğne tipleriyle çalışmak üzere tasarlandığını
        belirtir (iğne kategorisi/kullanımına göre).
    needle_threader_mechanism_type:
      name: İplik geçirici mekanizma tipi
      description: İplik geçiricinin ipliği iğne deliğinden nasıl yakalayıp geçirdiğini
        açıklar.
    needle_threader_packaging_type:
      name: İğne geçirici ambalaj türü
      description: Ürünün nasıl satıldığını/paketlendiğini belirtir (tekli, çoklu
        paket veya set).
    needlecraft_fabric_color_family:
      name: İğne işi kumaş renk ailesi
      description: Eşit dokuma kumaş için kullanılan standartlaştırılmış renk ailesini
        belirtir (renk özelliğiyle birlikte kullanılır).
    needlecraft_fabric_composition:
      name: İğne işi kumaş kompozisyonu
      description: İğne işi kumaşının elyaf bileşimini/karışımını belirtir (örneğin,
        %100 pamuk, keten/pamuk karışımı).
    needlecraft_fabric_weave_type:
      name: İğne işi kumaş dokuma türü
      description: İğne işi için kullanılan keten kumaşın dokuma yapısını belirtir
        (örneğin evenweave veya geleneksel keten); bu yapı dikiş davranışını ve görünümünü
        etkiler.
    needlecraft_kit_items_included:
      name: Dahil olan iğne işi kit ürünü
      description: İğne işi kitinde bulunan başlıca bileşenleri (aletler ve sarf malzemeleri)
        listeler.
    needlecraft_kit_project_type:
      name: İğne işi kiti proje türü
      description: Kitin ortaya çıkaracağı nihai ürünü (proje sonucunu) belirtir.
    needlecraft_stitching_coverage:
      name: İğne işi dikiş kapsamı
      description: Kumaşın 1 iplik/kare üzerinden mi yoksa 2 iplik üzerinden mi işlendiğini
        belirtir (evenweave ve keten kumaşlarda yaygındır).
    needlepoint_canvas_mesh_count:
      name: Goblen kanvas örgü sayısı
      description: Tasarımın hazırlandığı kanvasın kanvas iplik sayısını (inç başına
        iplik sayısı) belirtir; bu değer genellikle “kanvas iplik sayısı” olarak adlandırılır.
    needlepoint_frame_canvas_attachment_method:
      name: Goblen çerçevesi kanvas sabitleme yöntemi
      description: Goblen kanvasının goblen çerçevesine nasıl sabitlendiğini belirtir.
    needlepoint_frame_compatible_stand_type:
      name: Goblen çerçevesi uyumlu stand tipi
      description: Çerçeve bir standa monte edilecek şekilde tasarlanmışsa, uyumlu
        olduğu stand tiplerini belirtir.
    needlepoint_frame_contents:
      name: Goblen çerçevesi içeriği
      description: Goblen çerçevesi ile birlikte hangi bileşenlerin ve aksesuarların
        dahil olduğunu belirtir (örneğin çerçeve, ek çubuklar, çiviler/pimler, tutuş
        şeritleri, taşıma çantası).
    needlepoint_frame_tension_adjustment_type:
      name: Goblen çerçevesi gerginlik ayar tipi
      description: Kullanım sırasında çerçeve gerginliğinin nasıl (veya ayarlanıp
        ayarlanamayacağını) belirtir.
    needlepoint_pattern_chart_format:
      name: Kanaviçe desen şeması formatı
      description: Goblen tasarımının işleme için nasıl sunulduğunu belirtir (şema
        şeklinde mi yoksa basılı/boyalı kılavuz olarak mı).
    needlepoint_project_type:
      name: Goblen proje türü
      description: Goblen tasarımının amaçlanan nihai ürün veya kategori türünü belirtir.
    net_design:
      name: Ağ tasarımı
      description: Ağın yapım tarzını belirtir; taşınabilirlik için geri çekilebilir
        veya katlanabilir olup olmadığını gösterir.
    net_mesh_pattern:
      name: Ağ örgüsü deseni
      description: Ağ açıklıklarının geometrik şeklini belirtir; bu şekil görüşü ve
        dayanıklılığı etkileyebilir.
    net_twine_gauge:
      name: Ağ ipi ölçüsü
      description: Geleneksel olarak bir ölçü numarası (örneğin, 18, 36) olarak ifade
        edilen, ağın ip kalınlığını veya mukavemetini gösterir.
    nicotine_source:
      name: Nikotin kaynağı
      description: Üründe bulunan nikotinin tütün kaynaklı mı, sentetik mi olduğunu
        veya ürünün nikotin içermediğini gösterir.
    nipple_drive_interface:
      name: Jant teli nipel tahrik arayüzü
      description: Jant teli nipelinin tahrik arayüzü veya başlık tipini (harici veya
        dahili) belirtir; bu bilgi gerekli aleti ve jant yapım yöntemini belirler.
    nock_activation_method:
      name: Ok kuyruğu aktivasyon yöntemi
      description: Işıklı ok kuyruğundaki LED’in hangi mekanizma ile açılıp kapandığını
        belirtir (örneğin yay kirişi basıncı, hareket sensörü, manuel anahtar).
    nock_fitment_code:
      name: Ok kuyruğu uyumluluk kodu
      description: Ok kuyruğunun ait olduğu aile/seriyi tanımlayan üretici veya sektör
        kodunu belirtir.
    nock_throat_size:
      name: Ok kuyruğu oluk boyutu
      description: Yay kirişine oturan nock oluğunun (throat) boyutunu belirtir.
    nock_transparency_level:
      name: Ok arkası şeffaflık seviyesi
      description: Ok kuyruğu malzemesinin saydamlık derecesini (şeffaf, yarı saydam,
        opak veya karanlıkta parlayan) belirtir; bu özellik görünürlüğü ve estetiği
        etkiler.
    nock_type:
      name: Ok kuyruğu tipi
      description: Ok veya arbalet cıvatasında kullanılan ok kuyruğu tasarımını belirtir
        (örneğin pin tipi, yarım ay veya ışıklı).
    noise_reduction_type:
      name: Gürültü azaltma tipi
      description: Kaskın entegre kulaklığında kullanılan (veya kullanılmayan) gürültü
        azaltma teknolojisini belirtir (varsa).
    noise_suppression_technology:
      name: Gürültü bastırma teknolojisi
      description: Ürünün pasif sönümleme mi yoksa yüksek sesleri bastıran ve/veya
        ortam sesini yükselten aktif elektronik devre kullandığını belirtir.
    non_slip_base_features:
      name: Kaymaz taban özellikleri
      description: Performans sırasında pedalın kaymasını önlemek için eklenen kaymaz
        özellikleri belirtir.
    nose_bridge_type:
      name: Burun köprüsü tipi
      description: Burun köprüsünün tasarımını belirtir; bu tasarım farklı yüz tiplerine
        uyumu etkiler.
    nose_clip_accessories_included:
      name: Dahil olan burun klipsi aksesuarları
      description: Yüzme burun klipsiyle birlikte verilen ek aksesuarları listeler
        (örneğin kulak tıkaçları, saklama kutusu).
    nose_clip_features:
      name: Burun klipsi özellikleri
      description: Burun klipsinin genel işlevsel veya konfor özelliklerini belirtir.
    nose_coverage_style:
      name: Burun kaplama stili
      description: Sinek maskesinde burun veya ağızlık koruma panelinin varlığını
        ve türünü belirtir.
    noseband_type:
      name: Burun bandı tipi
      description: Dizginle birlikte verilen burun bandının (varsa) tasarımını belirtir.
    number_of_canvas_meshes:
      name: Kanvas örgü sayısı
      description: Plastik kanvasın ağ sayısını (inç başına delik sayısı - HPI) belirtir;
        bu değer dikiş boyutunu ve proje detay düzeyini belirler.
    number_of_chainrings:
      name: Zincir dişlisi sayısı
      description: Krankın kaç adet aynakol dişlisi takmak üzere tasarlandığını veya
        birlikte sunulduğunu belirtir.
    number_of_control_stations:
      name: Kontrol istasyonlarının sayısı
      description: Kontrol setinin desteklediği dümen/kontrol istasyonlarının sayısını
        gösterir (tek istasyonlu, çift istasyonlu vb.).
    number_of_digits:
      name: Basamak sayısı
      description: Sayacın kaç basamak gösterdiğini belirtir (örneğin 1 basamaklı,
        2 basamaklı, 3 basamaklı).
    number_of_guitar_slots:
      name: Gitar yuvası sayısı
      description: Kılıfın veya gig çantasının kaç gitar taşıyacak şekilde tasarlandığını
        belirtir.
    number_of_needlecraft_fabrics:
      name: İğne işi kumaşı iplik sayısı
      description: İğne işi kanvası/kumaşı için iplik sayısını belirtir; bu değer
        genellikle inç başına kare/iplik sayısı olarak ifade edilir (örneğin 14 iplik).
    number_of_plastic_canvas_meshes:
      name: Plastik kanvas ağ sayısı
      description: Plastik kanvasın ağ sayısını (inç başına delik sayısı) belirtir;
        bu da dikiş boyutunu ve proje bilgi seviyesini belirler.
    number_of_quilting_frame_rails:
      name: Kapitone çerçevesi ray sayısı
      description: Kapitone çerçevesinde bulunan ray/makara sayısını belirtir (örneğin
        2 raylı veya 3 raylı sistem).
    number_of_rope_slots:
      name: Halat yuvalarının sayısı
      description: Emniyet aletinin tek halat mı yoksa çift halat kullanımı için mi
        tasarlandığını belirtir.
    number_of_switch_poles:
      name: Anahtar kutup sayısı
      description: Anahtarın kontrol ettiği ayrı devre (kutup) sayısını belirtir (örneğin
        SPST, DPST).
    number_of_switch_throws:
      name: Anahtar atış sayısı
      description: Kutup başına çıkış yolu (atış) sayısını belirtir (örneğin SPDT).
    number_of_timing_chain_rows:
      name: Zamanlama zinciri sıra sayısı
      description: Zamanlama zincirinin tek sıralı mı yoksa çok sıralı mı olduğunu
        belirtir.
    number_of_trailer_axles:
      name: Treyler aks sayısı
      description: Treylerin aks sayısını belirtir.
    number_of_wheel_pieces:
      name: Tekerlek parçalarının sayısı
      description: Tekerleğin tek parça, iki parça veya üç parça yapıda olup olmadığını
        belirtir.
    numbering_style:
      name: Numaralandırma stili
      description: Formanın takım tanımlaması için önceden numaralandırılıp numaralandırılmadığını
        ve nasıl numaralandırıldığını belirtir (örneğin numarasız, 1-10, özel).
    nunchuck_connector_type:
      name: Nunchaku bağlantı tipi
      description: İki nunchaku sapı arasındaki bağlantı tipini belirtir (örneğin
        ip, zincir, döner zincir).
    nursing_access:
      name: Emzirme erişimi
      description: Varsa, mayo içine entegre edilmiş emzirme erişim yöntemini belirtir.
    nursing_access_type:
      name: Emzirme erişim türü
      description: Giysinin emzirme veya süt sağma için göğse nasıl erişim sağladığını
        belirtir.
    nut_butter_texture:
      name: Kuruyemiş ezmesi dokusu
      description: Tüketicinin pürüzsüz, parçacıklı vb. seçenekler arasında kolayca
        seçim yapabilmesi için kuruyemiş ezmesinin fiziksel kıvamını belirtir.
    nutrient_fortification:
      name: Besin takviyesi
      description: İçecek veya gıda ürününün zenginleştirildiği temel besin maddelerini
        belirtir.
    oak_product_form:
      name: Meşe ürün formu
      description: Ürünlerin olgunlaştırılması veya tatlandırılmasında kullanılan
        meşenin fiziksel formunu belirtir.
    oak_toast_level:
      name: Meşe kavurma seviyesi
      description: Meşe ürünlerinin kavurma seviyesini belirtir.
    oboe_case_capacity:
      name: Obua kılıfı kapasitesi
      description: Kılıfın hangi enstrümanları ve ana bileşenleri taşımak üzere tasarlandığını
        belirtir.
    oboe_case_carry_configuration:
      name: Obua kılıfı taşıma konfigürasyonu
      description: Kılıfın veya gigbag’in sunduğu başlıca taşıma konfigürasyonunu
        belirtir.
    oboe_case_design:
      name: Obua kılıfı tasarımı
      description: Obua kılıfının veya gigbag’in yapısını/sertliğini (örneğin sert,
        yarı sert, yumuşak) sınıflandırarak koruma seviyesini belirtir.
    oboe_case_internal_fit_type:
      name: Obua kılıfı iç uyum tipi
      description: İç kısmın belirli bir enstrüman konfigürasyonuna göre kalıplanmış
        mı yoksa ayarlanabilir bölmeli mi olduğunu belirtir.
    oboe_keywork_plating:
      name: Obua tuş takımı kaplaması
      description: Obua gövde malzemesinden ayrı olarak tuş takımının kaplamasını
        veya yüzey işlemini belirtir.
    oboe_strap_padding:
      name: Obua askı dolgu tipi
      description: Konfor için askı/destek temas bölgesinde dolgu bulunup bulunmadığını
        ve dolgu tipini belirtir (örneğin dolgulu omuz/boyun bölgesi).
    oboe_swab_style:
      name: Obua temizleme bezi tipi
      description: Obua temizleme bezinin işlevsel tipini/yapısını belirtir (örneğin
        ipli çekmeli, ağırlıklı ipek).
    observation_window_material:
      name: Gözlem penceresi malzemesi
      description: Görüntüleme paneli/penceresinin malzemesini belirtir; bu malzeme
        genellikle netliği ve dayanıklılığı etkiler.
    ocarina_accessories_included:
      name: Dahil olan okarina aksesuarları
      description: Okarina ile birlikte verilen aksesuarları belirtir (örneğin kılıf,
        boyun askısı veya parmak pozisyon tablosu).
    ocarina_chamber_count:
      name: Okarina odası sayısı
      description: Sıralı okarinanın kaç odacığa sahip olduğunu belirtir; bu sayı
        ses aralığını ve çalma zorluğunu etkiler (tekli, çiftli, üçlü vb.).
    ocarina_fingering_system:
      name: Okarina parmak sistemi
      description: "(Varsa) kolye tipi okarinanın kullandığı parmaklama sistemini/standardını
        belirtir."
    ocarina_finish_type:
      name: Okarina yüzey kaplama tipi
      description: Okarina gövdesinin yüzey kaplamasını belirtir; bu kaplama hissiyatı
        ve estetiği etkiler.
    occupant_classification_sensor_support:
      name: Yolcu sınıflandırma sensörü desteği
      description: Koltukta yolcu sınıflandırma/ağırlık sensörü bulunup bulunmadığını
        veya OEM sensörünün aktarılmasına imkân tanıyıp tanımadığını belirtir.
    octave_harmonica_cover_plate_material:
      name: Oktav mızıkası kapak plakası malzemesi
      description: Oktav armonikanın dış kapak plakalarının malzemesini belirtir.
    octave_harmonica_tuning_system:
      name: Oktav mızıkası akort sistemi
      description: Oktav armonika için kullanılan akort/temperament sistemini belirtir.
    octoban_mounting_system_type:
      name: Octoban montaj sistemi tipi
      description: Çalma sırasında octoban’ın nasıl monte edildiğini veya konumlandırıldığını
        belirtir (montaj/braket/ayak sistemi).
    odor_control_features:
      name: Koku kontrol özellikleri
      description: Ürünün koku nötrleştirme/deodorizasyon işlevi sağlayıp sağlamadığını
        ve hangi yöntemle sağladığını belirtir.
    office_furniture_items_included:
      name: Dahil olan ofis mobilyaları
      description: Setin içerisinde yer alan ofis mobilyası öğelerini belirtir (örneğin
        masa, dosya dolabı).
    oil_cooler_core_type:
      name: Yağ soğutucu çekirdek tipi
      description: Yağ soğutucunun iç çekirdek yapısını belirtir; bu yapı soğutma
        verimliliğini, basınç kaybını ve dayanıklılığı etkiler.
    oil_cooler_mounting_style:
      name: Yağ soğutucu montaj stili
      description: Yağ soğutucusunun araca nasıl monte edileceğini belirtir.
    oil_dipstick_component_type:
      name: Yağ seviye çubuğu bileşen tipi
      description: Satılan yağ seviyesi ölçüm bileşeninin hangisi olduğunu belirtir
        (örneğin sadece yağ çubuğu, sadece sap, komple set, yağ çubuğu borusu vb.).
    oil_dipstick_measurement_markings:
      name: Yağ seviye çubuğu ölçüm işaretleri
      description: Yağ seviyesini okumak için yağ çubuğunda hangi işaret veya ölçeklerin
        bulunduğunu belirtir.
    oil_dipstick_tube_mounting_type:
      name: Yağ seviye çubuğu borusu montaj tipi
      description: Yağ seviye çubuğu borusunun motora veya motor bloğuna nasıl tutturulduğunu
        veya monte edildiğini belirtir.
    oil_drain_plug_head_drive_type:
      name: Yağ tahliye tapası başlık sürücü tipi
      description: Yağ tahliye tapası başlığında montaj ve sökme için kullanılan alet
        temas arayüzünü belirtir.
    oil_drain_plug_magnet_type:
      name: Yağ tahliye tapası mıknatıs tipi
      description: Tahliye tapasının manyetik olup olmadığını ve manyetikse hangi
        tipte olduğunu belirtir.
    oil_fill_cap_type:
      name: Yağ doldurma kapağı tipi
      description: "(Varsa) supap kapağında kullanılan yağ doldurma kapağı arayüzünün
        stilini/tipini belirtir."
    oil_filler_cap_attachment_type:
      name: Yağ doldurma kapağı bağlantı tipi
      description: Yağ doldurma kapağının motor/yağ doldurma ağzına nasıl sabitlendiğini
        belirtir (örneğin, dişli, bayonet/çeyrek tur, geçmeli).
    oil_filler_cap_installation_position:
      name: Yağ doldurma kapağının takılma konumu
      description: Birden fazla yağ doldurma noktası bulunduğunda (örneğin, supap
        kapağı, uzaktan doldurma borusu) kapağın nerede kullanılacağını belirtir.
    oil_filler_cap_locking_type:
      name: Yağ doldurma kapağı kilitleme tipi
      description: Yağ doldurma kapağının kilitsiz mi yoksa kurcalamayı, hırsızlığı
        veya kazara açılmayı önlemek için kilitli/güvenli bir çıkarma yöntemi (örneğin
        anahtarlı veya alet gerektiren) kullanıp kullanmadığını belirtir.
    oil_filler_cap_tether_type:
      name: Yağ dolum kapağı bağlantı tipi
      description: Yağ doldurma kapağının kaybolmayı önlemek için bağlı/sabitlenmiş
        olup olmadığını ve kullanılan bağlantı tipini belirtir.
    oil_filler_cap_venting_type:
      name: Yağ doldurma kapağı havalandırma tipi
      description: Kapağın havalandırmalı olup olmadığını ve (varsa) havalandırma
        mekanizmasını belirtir.
    oil_filter_style:
      name: Yağ filtresi tipi
      description: Motorun filtre yuvasıyla uyumluluğu sağlamak için yağ filtresinin
        şekil faktörünü ve montaj/kurulum stilini belirtir.
    oil_pan_baffle_windage_features:
      name: Yağ karteri baffle/rüzgâr kırıcı özellikleri
      description: Yağ karterinde bulunan dahili yağ kontrol özelliklerini belirtir.
    oil_pan_finish_coating:
      name: Yağ karteri yüzey işlemi/kaplaması
      description: Yağ karterinin yüzey kaplamasını veya bitişini belirtir (boyalı,
        toz boyalı, kaplamalı, ham vb.).
    oil_pressure_sensor_function_type:
      name: Yağ basınç sensörü fonksiyon tipi
      description: Parçanın gösterge/ECU için değişken çıkışlı bir yağ basınç sensörü
        mü yoksa uyarı lambasını tetikleyen aç/kapa tipi bir yağ basınç anahtarı mı
        olduğunu belirtir.
    oil_pressure_sensor_signal_output_type:
      name: Yağ basınç sensörü sinyal çıkış tipi
      description: Yağ basınç sensörü/vericisi tarafından üretilen elektrik çıkış/sinyal
        stilini belirtir.
    oil_processing_method:
      name: Yağ işleme yöntemi
      description: Yağın nasıl üretildiğini veya rafine edildiğini belirtir (örneğin
        soğuk pres, sızma, rafine); bu yöntem lezzeti, besin değerini ve uygun pişirme
        kullanımını etkiler.
    oil_pump_drive_method:
      name: Yağ pompası tahrik yöntemi
      description: Motor içindeki yağ pompasını hangi bileşenin tahrik ettiğini belirtir.
    oil_pump_mounting_style:
      name: Yağ pompası montaj stili
      description: Motor içinde yağ pompasının nereye ve nasıl monte edildiğini belirtir
        (örneğin dahili, harici/uzaktan, kapak montajı, yağ karteri montajı).
    oil_system_connection_thread_standard:
      name: Yağ sistemi bağlantı diş standardı
      description: Parçanın yağ sistemi arayüzünde montaj ve uyumluluk için kullanılan
        diş/bağlantı standardını belirtir (örneğin M12x1.5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Yağ viskozite derecesi
      description: El işi ekipmanlarında kullanılan iplik yağının göreceli yoğunluğunu
        belirtir (otomotiv SAE sınıfları değildir).
    okra_variety:
      name: Bamya çeşidi
      description: Sunulan bamyanın belirli kültivarını veya ticari çeşidini belirtir
        (örneğin Clemson Spineless, Red Burgundy, Baby Okra).
    olfactory_arts_material_form:
      name: Olfaktör sanat malzemesi formu
      description: Satılan malzemenin fiziksel formunu belirtir.
    olfactory_arts_tool_kit_content:
      name: Koku sanatları alet kiti içeriği
      description: Ürün mum, tütsü veya parfüm yapımı için kit/set olarak satıldığında
        hangi bileşenlerin dahil olduğunu belirtir.
    olive_variety:
      name: Zeytin çeşidi
      description: Kullanılan zeytinin kültivarını belirtir; bu kültivar tat, doku,
        renk ve bölgesel özgünlüğü etkiler.
    onion_variety:
      name: Soğan çeşidi
      description: Soğanın belirli türünü belirtir; böylece alıcı tercih ettiği renk,
        lezzet ve kullanım özelliklerini kolayca bulabilir ve satıcı ürünü doğru şekilde
        listeleyebilir.
    opacity_level:
      name: Şeffaflık seviyesi
      description: Kumaşın ne kadar şeffaf veya opak olduğunu belirtir.
    operating_modes:
      name: Çalışma modları
      description: Lazer ışığının desteklediği başlıca dahili efekt/hareket modlarını
        belirtir.
    operating_voltage:
      name: Çalışma gerilimi
      description: Enjektörün tasarlandığı nominal sistem voltajını belirtir.
    optical_toy_features:
      name: Optik oyuncak özellikleri
      description: Oyuncağın ürettiği temel görsel/optik etkileri belirtir.
    orchestral_string_core_material:
      name: Orkestra teli çekirdek malzemesi
      description: Telin çekirdek yapısında kullanılan temel malzemeyi belirtir; bu
        malzeme hissiyatı, tepkiyi ve tonu önemli ölçüde etkiler.
    orchestral_string_end_type:
      name: Orkestra teli uç tipi
      description: Telin kuyruk (tailpiece) tarafındaki bağlantı tipini belirtir.
    orchestral_string_included_strings:
      name: Dahil olan orkestra teli türleri
      description: Pakete dahil olan belirli telleri listeler (enstrümana göre değişir).
    orchestral_string_instrument_fitting_part_type:
      name: Orkestra yaylı çalgı parça/bağlantı tipi
      description: Ürünün ne tür bir bağlantı parçası/aksesuar olduğunu belirtir (örneğin,
        köprü, kuyruk parçası, çenelik).
    orchestral_string_instrument_mute_type:
      name: Orkestra yaylı çalgı susturucu tipi
      description: Orkestra yaylı çalgı susturucusunun işlevsel türünü (örneğin çalışma/otel
        tipi veya performans/konser tipi) ve/veya tasarım stilini belirtir.
    orchestral_string_instrument_part_position:
      name: Orkestra yaylı çalgı parça konumu
      description: Parçanın enstrüman üzerindeki konumunu belirtir (üst/alt veya sağ/sol
        varyantlar için).
    orchestral_string_winding_material:
      name: Orkestra teli sarım malzemesi
      description: Tel üzerinde kullanılan dış sargı/kaplama malzemesini belirtir.
    organza_finish_sheen:
      name: Organza yüzey kaplaması / parlaklık seviyesi
      description: Organza kumaşın yüzey görünümünü belirtir (mat veya parlak/yanardöner).
    organza_ribbon_transparency_level:
      name: Organza kurdele şeffaflık seviyesi
      description: Organza kurdelenin ne kadar şeffaf olduğunu belirtir.
    organza_transparency_level:
      name: Organze şeffaflık seviyesi
      description: Organza kumaşın tek kat halinde ne kadar şeffaf olduğunu belirtir.
    origami_paper_shape:
      name: Origami kâğıdı şekli
      description: Katlama için kullanılan kâğıt yaprağının şeklini belirtir.
    origami_paper_sidedness:
      name: Origami kâğıdı yüz tipi
      description: Origami kâğıdının iki yüzünde aynı renk/desen mi yoksa farklı/zıt
        renkler mi olduğunu belirtir.
    ostrich_feather_part:
      name: Devekuşu tüyü parçası
      description: Kullanılan devekuşu tüyü tipini/parçasını (örneğin plume veya drab)
        belirtir; bu özellik yumuşaklık, yoğunluk ve kullanım alanını etkiler.
    outboard_motor_shaft_type:
      name: Dıştan takma motor şaft tipi
      description: Dıştan takmalı motorlarda kullanılan standart şaft uzunluğu sınıfını
        belirtir (denizcilik sektöründe kullanılan etiket formatı).
    outboard_motor_steering_type:
      name: Dıştan takmalı motor direksiyon tipi
      description: Dıştan takmalı motor tarafından kullanılan yönlendirme arayüzünü/mekanizmasını
        belirtir (örneğin, dümen kolu veya uzaktan kumandalı yönlendirme sistemi).
    outdoor_table_functionality:
      name: Dış mekan masa işlevselliği
      description: Basit bir masa yüzeyinin ötesine geçen özel yerleşik işlevleri
        belirtir (örneğin soğutucu bölmesi, saklama rafı, gaz tankı kapağı, şemsiye
        yuvası, sandalye bağlantısı, katlanır tasarım, havuz içi kasa, ayarlanabilir
        yükseklik, entegre tekerlekler, LED aydınlatma).
    outerwear_length_type:
      name: Dış giyim uzunluk tipi
      description: Dış giyim ürününün toplam uzunluğunu standart tanımlayıcı aralıklara
        göre sınıflandırır.
    outerwear_pieces_included:
      name: Dahil olan dış giyim parçaları
      description: Ürün set halinde satıldığında dahil edilen giyim parçalarını listeler.
    outfit_attachment_mechanism:
      name: Kıyafet bağlantı mekanizması
      description: Kıyafet veya aksesuar parçalarının bebeğe nasıl takıldığını belirtir
        (örneğin sekme, yapışkan, mıknatıs).
    outfit_items_included:
      name: Dahil olan kıyafet parçaları
      description: Setin içinde yer alan belirli giyim parçalarını listeler (örneğin
        body, şort, saç bandı).
    outlet_thread_type:
      name: Çıkış diş standardı
      description: Ana silindir fren hattı çıkış portlarında kullanılan diş standardını
        belirtir (örneğin metrik bubble flare veya SAE inverted flare).
    output_jack_type_instrument:
      name: Çıkış jakı tipi (enstrüman)
      description: Elektrikli mandolindeki ses çıkış jakının tipini belirtir.
    output_signal_type:
      name: Çıkış sinyali tipi
      description: Sensörün ürettiği elektriksel çıkış davranışı veya tipini belirtir
        (örneğin NTC termistör analog direnç).
    outsole_marking_type:
      name: Dış taban iz bırakma tipi
      description: Ayakkabının dış tabanının kort yüzeylerinde iz bırakıp bırakmadığını
        belirtir.
    outsole_material:
      name: Dış taban malzemesi
      description: Ayakkabının yere temas eden dış taban malzemesini belirtir; bu
        malzeme tutuşu, esnekliği ve dayanıklılığı etkiler.
    outsole_stud_type:
      name: Dış taban krampon tipi
      description: Seçilen oyun yüzeyinde çekiş sağlayan dış taban/krampon yapısını
        belirtir (örneğin kalıplanmış krampon, kauçuk çıkıntı, çim tırnağı).
    oven_bake_clay_formulation:
      name: Fırında pişirilen kil formülasyonu
      description: Fırında pişirilen kilin formülasyon ailesini (örneğin polimer kil
        veya reçine kil) belirtir; bu özellik kullanım şeklini, kürlenme davranışını
        ve nihai özellikleri etkiler.
    oven_housing_configuration:
      name: Fırın gövdesi konfigürasyonu
      description: Dolabın uyumlu olduğu cihaz yerleşim tipini belirtir (örneğin tek
        fırın, çift fırın veya fırın ve mikrodalga kombinasyonu).
    overhead_mount_installation_method:
      name: Üstten montaj kurulum yöntemi
      description: Üstten montaj aparatının araca nasıl sabitlendiğini belirtir (donanım/bağlantı
        tipi).
    oversize_or_undersize_grade:
      name: Büyük veya küçük beden sınıfı
      description: Kitin ölçü sınıfını (oversize piston/segman ve/veya undersize yataklar)
        OEM standart ölçüsüne göre belirtir.
    p_tex_application_method:
      name: P-Tex uygulama yöntemi
      description: P-Tex malzemesinin kayak veya snowboard tabanına nasıl uygulandığını
        belirtir.
    p_tex_form:
      name: P-Tex formu
      description: Tamir malzemesinin hangi fiziksel formda sunulduğunu belirtir.
    packability:
      name: Paketlenebilirlik
      description: Yeleğin kullanılmadığında paketlenip saklanıp saklanamayacağını
        ve nasıl saklandığını belirtir.
    packaging_format:
      name: Ambalaj formatı
      description: Tellerin nasıl paketlenip satıldığını belirtir (tekli zarflar,
        toplu paket vb.).
    packaging_material:
      name: Ambalaj malzemesi
      description: Suyu tutan şişe veya kabın ana malzemesini belirtir.
    packaging_type:
      name: Ambalaj türü
      description: Figürün perakende satış, sergileme veya koleksiyon saklama için
        nasıl paketlendiğini belirtir.
    packing_medium:
      name: Paketleme ortamı
      description: Kabın içindeki meyveyi korumak için kullanılan sıvıyı veya ortamı
        (su, çeşitli şuruplar, meyve suyu veya salamura gibi) belirtir.
    pad_components_included:
      name: Dahil olan ped bileşenleri
      description: Ürün set halinde satıldığında hangi parçaların dahil olduğunu belirtir
        (örneğin, dizlik ve dirseklik, sadece bilek koruyucu).
    pad_controller_additional_control:
      name: Pad kontrolcüsü ek kontrol öğeleri
      description: Cihazda pedler dışında bulunan ek fiziksel kontrol türlerini belirtir
        (örneğin düğmeler, fader’lar, tuşlar).
    pad_controller_performance_features:
      name: Pad kontrolcüsü performans özellikleri
      description: Çalma ve ifade kontrolü için temel performans özelliklerini belirtir.
    pad_coverage_area:
      name: Ped kapsama alanı
      description: Korsenin entegre pedlerinin koruduğu vücut bölgelerini belirtir.
    pad_material_or_technology:
      name: Ped malzemesi veya teknolojisi
      description: Pedde kullanılan özel darbe emici teknolojiyi veya markalı malzemeyi
        belirtir.
    pad_mounting_or_holding_style:
      name: Ped montajı veya tutma stili
      description: Kullanım sırasında pedin nasıl tutulduğunu, takıldığını veya monte
        edildiğini belirtir.
    pad_saver_style:
      name: Ped koruyucu tipi
      description: Pedleri ve iç kanalı kurutmak için kullanılan ped kurutucunun fiziksel
        tasarımını belirtir.
    pad_shape:
      name: Ped şekli
      description: Pedin vuruş yüzeyinin veya genel gövdesinin geometrik şeklini veya
        eğriliğini belirtir (örneğin yuvarlak, kavisli, dikdörtgen, düz).
    pad_shell_type:
      name: Ped kabuk tipi
      description: Pedin dış yüzeyinin yapım tarzını sınıflandırır (örneğin sert kabuk,
        yumuşak kabuk, iç dolgu).
    pad_style:
      name: Ped tipi
      description: Kızakla birlikte sunulan ped tipini veya tasarımını belirtir.
    padding_layers:
      name: Dolgu katmanları
      description: Darbe emilimi için kullanılan köpük katmanlarının sayısını belirtir.
    padding_level:
      name: Dolgu seviyesi
      description: Askı/destek temas alanlarına (boyun/omuz/sırt) entegre edilen dolgu
        miktarını belirtir.
    padding_material:
      name: Dolgu malzemesi
      description: Çanta, kalkan, eldiven ve mankenlerin içindeki darbe emici dolgu
        malzemesini belirtir.
    paddle_ball_attachment_type:
      name: Raket topu bağlantı tipi
      description: Topun raketle nasıl bağlantılı olduğunu (veya bağlı olup olmadığını)
        belirtir.
    paddle_leash_style:
      name: Kürek tasması tipi
      description: Kürek tasma ipinin stilini veya tasarımını belirtir.
    paddle_shape:
      name: Kürek şekli
      description: Raketin baş/gövdesinin genel silüetini (örneğin, standart, uzatılmış,
        geniş gövde) belirtir; bu özellik erişimi, ideal vuruş noktasını ve manevra
        kabiliyetini etkiler.
    paddleboard_intended_use:
      name: Paddleboard kullanım amacı
      description: Tahtanın tasarlandığı temel kullanım amacını veya aktiviteyi sınıflandırır
        (örneğin Touring, Yoga, Racing).
    paint_application_method:
      name: Boya uygulama yöntemi
      description: Ürünün kaliper üzerine uygulanma şeklini belirtir.
    paint_by_number_surface_type:
      name: Numaralı boyama yüzey tipi
      description: Numaralandırılmış tasarımın basıldığı yüzeyi belirtir (örneğin
        tuval, kâğıt, ahşap panel).
    paint_medium_application_method:
      name: Boya medyumu uygulama yöntemi
      description: Medyumun uygulanması için önerilen yöntemi belirtir.
    paint_medium_intended_effect:
      name: Boya medyumunun amaçlanan etkisi
      description: Medyumun oluşturması amaçlanan temel sonucu belirtir (örneğin doku,
        parlaklık, glaze, akışkanlık).
    paint_safe_bristles:
      name: Boyaya zarar vermeyen fırça kılları
      description: Fırça kıllarının otomotiv boyası/vernik üzerinde güvenli (çiziksiz)
        kullanım için tasarlanıp tasarlanmadığını belirtir.
    paintable_surface:
      name: Boyanabilir yüzey
      description: Kâğıt hamurundan yapılmış şeklin boyamaya hazır olup olmadığını
        (örneğin astarlanmış/koruyucu kaplamalı) veya hazırlık gerektirip gerektirmediğini
        belirtir.
    paintball_caliber:
      name: Paintball kalibresi
      description: Boya toplarının veya uyumlu ekipmanların çapını/kalibresini belirtir.
    paintball_feed_system:
      name: Paintball besleme sistemi
      description: Boya toplarının işaretleyiciye nasıl beslendiğini tanımlar.
    paintball_fill_color:
      name: Paintball dolgu rengi
      description: İç işaretleme dolgusunun rengini gösterir; bu renk dış kabuktan
        farklı olabilir ve darbe sonrasında kalan rengi belirler.
    paintball_fill_type:
      name: Paintball dolum türü
      description: Dolgunun özel formülasyonunu veya özelliğini belirtir (örneğin
        yıkanabilir, karanlıkta parlayan, toz formunda).
    paintball_grade:
      name: Paintball kalite seviyesi
      description: Performans sınıfını veya kullanım seviyesini belirtir (örneğin
        giriş seviyesi, saha, yarışma, kış).
    paintball_mask_coverage_level:
      name: Paintball maskesinin kapsama düzeyi
      description: Paintball gözlüğü veya maskesinin yüzün ya da başın hangi bölümlerini
        koruduğunu belirtir (yalnızca gözlük, yarım yüz, tam yüz, tam baş).
    paintball_tank_valve_type:
      name: Paintball tankı vana tipi
      description: Tank üzerinde bulunan vana veya regülatör arayüzünü belirtir.
    painting_surface_priming_type:
      name: Boya yüzeyi astar tipi
      description: Boyama yüzeyindeki astar/kaplama türünü belirtir (yalnızca astarlı/astarsız
        olmanın ötesinde); bu özellik boya yapışmasını ve teknik uyumluluğunu etkiler.
    palette_knife_blade_edge_profile:
      name: Palet bıçağı kenar profili
      description: Palet bıçağının çalışma kenarı profilini (keskinliği değil) belirtir;
        bu profil iz bırakma ve karıştırma şeklini etkiler.
    palette_knife_flexibility:
      name: Palet bıçağı esnekliği
      description: Palet bıçağının sertliğini/esnekliğini belirtir.
    palette_surface_finish:
      name: Palet yüzey kaplaması
      description: Leke direncini ve temizleme kolaylığını etkileyen karıştırma yüzey
        kaplamasını belirtir.
    palm_padding_level:
      name: Avuç içi dolgu seviyesi
      description: Eldivenin avuç içi bölgesindeki veya kavrama pedindeki dolgu miktarını
        belirtir.
    palm_padding_type:
      name: Avuç içi dolgu tipi
      description: Avuç içi dolgusunun malzemesini veya yapısını belirtir (örneğin
        jel, köpük, çift katman).
    palm_wax_blend_readiness:
      name: Palmiye mumu karışım durumu
      description: Ürünün saf palmiye mumu mu yoksa belirli performans özellikleri
        için önceden karıştırılmış bir formülasyon mu olduğunu belirtir.
    palm_wax_form:
      name: Palmiye mumu formu
      description: Satışa sunulan palmiye mumunun fiziksel formunu belirtir; bu form
        ölçüm kolaylığını, erime hızını ve kullanım şeklini etkiler.
    pan_flute_tuning_standard:
      name: Pan flüt akort standardı
      description: Akort için kullanılan referans frekansını belirtir (örneğin A4=440
        Hz); bu değer diğer enstrümanlarla uyum için önemlidir.
    pannier_configuration:
      name: Heybe konfigürasyonu
      description: Ürünün tekli çanta, birbirine bağlı çift çanta veya çift/üçlü set
        olarak satılıp satılmadığını belirtir.
    pannier_mounting_system:
      name: Heybe montaj sistemi
      description: Çantanın bisiklet rafına veya kadroya nasıl sabitlendiğini belirten
        mekanizmayı açıklar ve farklı kurulumlarla uyumluluğu sağlar.
    pant_cuff_style:
      name: Pantolon paça stili
      description: Pantolonun paça kısmındaki bitiş veya ayar tipini belirtir (örneğin
        elastik paça, fermuarlı paça, açık paça).
    pant_leg_conversion_type:
      name: Pantolon paça dönüşüm tipi
      description: Pantolon paçalarının farklı uzunluklara dönüştürülüp dönüştürülemeyeceğini
        ve nasıl ayarlanabileceğini belirtir.
    pantyhose_crotch_style:
      name: Külotlu çorap kasık stili
      description: Kasık bölgesinin tasarımını belirtir; standart kapalı kasık, kasıksız
        veya takviyeli ağ (gusset) modelleri birbirinden ayırır.
    papaya_variety:
      name: Papaya çeşidi
      description: Papayanın kültivarını veya ticari çeşidini belirtir (örneğin Solo,
        Maradol).
    paper_and_magnetic_doll_format:
      name: Kâğıt ve manyetik bebek formatı
      description: Ürünün geleneksel bir kâğıt bebek seti mi, manyetik bebek seti
        mi yoksa hibrit bir formatta mı olduğunu belirtir.
    paper_color_family:
      name: Kâğıt renk ailesi
      description: Paketin tek renkli, karışık renkli veya özel karışım olup olmadığını
        belirtir (renk ürün bazında ayrı olsa da paketler karışık olabilir).
    paper_magnetic_doll_set_contents:
      name: Kâğıt ve manyetik bebek seti içeriği
      description: Setin içerisinde hangi ana bileşenlerin yer aldığını belirtir.
    paper_opacity:
      name: Kâğıt opaklığı
      description: Kâğıdın ne kadar saydam veya opak olduğunu belirtir (örneğin çizim/tracing
        için).
    paraglider_certification_rating:
      name: Yamaç paraşütü sertifikasyon derecesi
      description: Yamaç paraşütü kanadına atanan resmi uçuşa elverişlilik derecesini
        belirtir (örneğin EN veya LTF sınıfları).
    parasite_types_controlled:
      name: Kontrol edilen parazit türleri
      description: Ürünün etkili olduğu iç parazitleri listeler; böylece alıcılar
        parazit kontrol programını belirli enfestasyonlara göre uyarlayabilir.
    parking_camera_mounting_location:
      name: Park kamerası montaj konumu
      description: Kameranın araç üzerinde nereye monte edileceğini belirtir (örneğin
        plaka bölgesi, arka yüzeye montaj, gömme montaj).
    parking_camera_night_vision_technology:
      name: Park kamerası gece görüş teknolojisi
      description: Kameranın kullandığı düşük ışık destek yöntemini belirtir.
    parking_camera_orientation:
      name: Park kamerası yönü
      description: Kameranın arka (geri görüş), ön veya seçilebilir/aynalı kullanım
        için tasarlanıp tasarlanmadığını belirtir.
    parking_sensor_finish:
      name: Park sensörü yüzey kaplaması
      description: Park sensörünün yüzey/kapağının bitiş türünü belirtir (örneğin
        boyanabilir/astarlı, mat veya parlak); bu özellik tampon estetiğiyle uyum
        sağlamaya yardımcı olur.
    parking_sensor_type:
      name: Park sensörü tipi
      description: Park sensörünün kullandığı algılama teknolojisini belirtir (örneğin,
        ultrasonik, elektromanyetik, radar, optik).
    parsley_root_variety:
      name: Maydanoz kökü çeşidi
      description: Tedarikçi tarafından belirtilmişse maydanoz kökünün kültivarını
        veya çeşidini belirtir.
    parsnip_variety:
      name: Yaban havucu çeşidi
      description: Yaban havucunun belirli çeşidini veya kültivarını belirtir (örneğin
        Hollow Crown, White Gem); bu bilgi lezzet, tatlılık veya boyut farklılıklarına
        göre seçim yapılmasını sağlar.
    part_condition:
      name: Parça durumu
      description: Parçanın yeni, kullanılmış, revize edilmiş vb. olup olmadığını
        belirtir.
    part_placement:
      name: Parça konumu
      description: Parçanın makinenin (örneğin merdiven tırmanma cihazı veya step
        aleti) hangi bölümüne takıldığını belirtir (sol, sağ, ön, arka vb.).
    partial_capo_covered_strings:
      name: Kısmi kaponun kapsadığı teller
      description: Kısmi kaponun kapsadığı tel aralığını, standart 6 telli gitar numaralandırmasına
        göre belirtir (1 = ince Mi, 6 = kalın Mi).
    parting_style:
      name: Peruk ayrım stili
      description: Peruğun nasıl ayrıldığını veya ayrılabileceğini belirtir (örneğin
        ortadan, yandan, serbest ayrım); bu durum şekillendirme esnekliğini etkiler.
    party_favor_type:
      name: Parti hediyesi türü
      description: Ürünün hangi tür parti hediyesi olduğunu belirtir (örneğin çıkartma,
        mini oyuncak, baloncuk) ve kategori içinde filtrelemeyi kolaylaştırır.
    party_game_format:
      name: Parti oyunu formatı
      description: Parti oyununun temel fiziksel formatını belirtir.
    party_horn_mouthpiece_type:
      name: Parti kornası ağızlık tipi
      description: Ağızlık yapısını belirtir; bu yapı hijyen ve konforu etkiler.
    party_horn_style:
      name: Parti kornası tarzı
      description: Parti kornasının yapısını veya davranış biçimini belirtir (nasıl
        uzadığı veya ses çıkardığı).
    passenger_car_type:
      name: Yolcu vagonu tipi
      description: Model için temsil edilen yolcu vagonu tipini belirtir (örneğin
        yolcu vagonu, yataklı vagon); bu bilgi kategori içinde gezinme ve set oluşturma
        amacıyla kullanılır.
    passion_fruit_variety:
      name: Çarkıfelek meyvesi çeşidi
      description: Sunulan çarkıfelek meyvesinin botanik veya ticari çeşidini tanımlar/belirtir
        (örneğin, mor, sarı, Granadilla).
    pasta_sauce_texture:
      name: Makarna sosu dokusu
      description: Sosun kıvamını (örneğin, pürüzsüz, taneli, kremalı) tüketicinin
        ağızda bıraktığı hisse uygun şekilde tanımlar.
    pasta_sauce_variety:
      name: Makarna sosu çeşidi
      description: Makarna soslarını tarifine veya tarzına göre sınıflandırarak, alıcının
        marinara gibi klasik sosları veya votka ya da pesto gibi özel sosları hızlıca
        bulmasını sağlar.
    pastry_crust_state:
      name: Hamur kabuğu durumu
      description: Satın alımda hamurun hazırlanma veya pişirme aşamasını belirtir.
    pastry_crust_style:
      name: Turta hamuru stili
      description: Hamur kabuğunun belirli hamur tipi veya stilini belirtir.
    pastry_filling_type:
      name: Hamur işi dolgu türü
      description: Hamur işinin veya çöreklerin ana iç dolgusunu belirtir.
    patch_adhesion_method:
      name: Yama yapıştırma yöntemi
      description: Yamanın iç lastiğe veya dış lastiğe nasıl yapıştığını belirtir
        (örneğin, kendinden yapışkanlı, çimento ile vulkanize olan veya ısı ile aktive
        olan).
    patch_backing_material:
      name: Yama arka yüzey malzemesi
      description: Yamanın arka/taban kısmında kullanılan ve süslenecek ürüne temas
        eden malzemeyi belirtir (örneğin keçe, dimi kumaş).
    patch_backing_type:
      name: Yama arka yüzey tipi
      description: Yama üzerinde kullanılan arka yüzey (örneğin, ısı ile yapıştırılan/ütüyle
        yapıştırılan, kendinden yapışkanlı, cırt cırtlı, hiçbiri).
    patch_base_material:
      name: Yama taban malzemesi
      description: Motif yamasının ana taban/destek tekstil malzemesini belirtir (dekoratif
        süslemeler hariç).
    patch_border_edge_finish:
      name: Yama kenar bitişi
      description: Yamanın kenar bitirme yöntemini belirtir (örneğin merrow/overlok
        kenar, lazer kesim kenar); bu yöntem dayanıklılığı ve görünümü etkiler.
    patch_placement_area:
      name: Yama yerleşim alanı
      description: Yamanın giysi veya aksesuar üzerindeki yaygın kullanım yerini belirtir.
    pathogen_removal_capability:
      name: Patojen giderme kapasitesi
      description: Pompanın hangi mikroorganizma sınıflarını (bakteri, protozoa, virüs)
        gidermek üzere sertifikalı olduğunu belirtir.
    pattern_sizing_system:
      name: Kalıp boyutlandırma sistemi
      description: Kalıbın beden tablosunda kullanılan bölgesel beden sistemini veya
        standardını belirtir (örneğin ABD, İngiltere, AB).
    peak_style:
      name: Şapka siperliği stili
      description: Kaskın vizörünün veya siperliğinin stilini belirtir; bu stil kapsama
        alanını, estetiği ve disiplin kurallarını etkiler.
    pear_variety:
      name: Armut çeşidi
      description: Armutun kültivarını veya çeşidini belirtir (örneğin Bartlett, Bosc,
        Conference); bu bilgi tat, doku ve kullanım amacına göre seçim yapmayı sağlar.
    pearl_luster_grade:
      name: İnci parlaklık derecesi
      description: İnci yüzeyinin niteliksel parlaklık derecesini belirtir.
    pearl_matching_level:
      name: İnci eşleştirme seviyesi
      description: Bir parti veya dizideki incilerin renk, boyut ve parlaklık açısından
        ne kadar iyi eşleştiğini belirtir.
    pearl_shape:
      name: İnci şekli
      description: İncinin genel şekil kategorisini belirtir.
    pearl_surface_condition:
      name: İnci yüzey durumu
      description: İncinin görünür yüzey durumunu, leke veya kusurların varlığı ve
        derecesine göre belirtir.
    pearl_treatment:
      name: İnci işlemi
      description: İncinin rengini veya görünümünü etkileyen herhangi bir işlem uygulanıp
        uygulanmadığını belirtir.
    pearl_type:
      name: İnci tipi
      description: Dökme inciler için inci türünü veya kökenini (örneğin tatlı su,
        Akoya, Tahiti, Güney Denizi) belirtir.
    peat_level:
      name: Turba seviyesi
      description: Viskideki turba dumanı etkisinin yoğunluğunu, turbasızdan yoğun
        turbalıya kadar tanımlar.
    pedal_and_cleat_system_compatibility:
      name: Pedal ve kilit sistemi uyumluluğu
      description: Ara parça veya kama parçasının hangi pedal veya kilit standartlarıyla
        uyumlu olduğunu belirtir; böylece kullanıcı pedallarına ve ayakkabılarına
        uygun ürünü seçebilir.
    pedal_configuration:
      name: Pedal konfigürasyonu
      description: Sandalyenin tek pedallı, bağımsız/ayrık pedallı veya dönüştürülebilir
        tasarıma sahip olup olmadığını belirtir.
    pedal_mounting_style:
      name: Pedal montaj stili
      description: Pedalların veya pedal kapağının/pedinin araca nasıl takılacağını
        (montaj/bağlantı yöntemi) belirtir.
    pedal_set_components:
      name: Pedal seti bileşenleri
      description: Sete hangi pedalların dahil olduğunu belirtir.
    pedal_spindle_material:
      name: Pedal mili malzemesi
      description: Pedal mili/aksı için kullanılan malzemeyi belirtir; bu malzeme
        dayanıklılığı, ağırlığı ve korozyon direncini etkiler.
    pedal_spindle_thread_size:
      name: Pedal mili diş ölçüsü
      description: Krank koluna vidalanan pedal milinin diş standardını belirtir.
    pedal_type:
      name: Pedal tipi
      description: Bisikletle birlikte verilen pedalların stilini, ayakkabı uyumluluğunu
        ve sürüş tarzını belirtir.
    pellet_accessory_type:
      name: Pelet aksesuar türü
      description: Balıkçıların, olta takımı yapım ihtiyaçlarına göre matkapları,
        bantlayıcıları veya durdurucuları hızlıca bulabilmeleri için, pelet aksesuarının
        belirli türünü tanımlar.
    pellet_grade:
      name: Pelet kalitesi
      description: Airsoft mermilerinin üretim hassasiyetini veya performans derecesini
        belirtir.
    pen_ink_color:
      name: Kalem mürekkebi rengi
      description: Kalemin püskürttüğü mürekkebin gerçek rengini gösterir; bu renk,
        kalemin dış gövde renginden farklı olabilir.
    penalty_card_accessories_included:
      name: Dahil olan ceza kartı aksesuarları
      description: Ceza kartlarıyla birlikte verilen ek hakem aksesuarlarını (cüzdan,
        not defteri, kalem, para, düdük, kılıf vb.) listeler.
    penalty_card_colors_included:
      name: Dahil olan ceza kartı renkleri
      description: Ürün setinde yer alan ceza kartlarının renklerini listeler.
    penalty_flag_throw_distance:
      name: Ceza bayrağı atış mesafesi
      description: Bayrağın amaçlanan atış mesafesini belirten tasarım sınıflandırmasıdır.
    pendant_cutter_safety_features:
      name: Kolye tipi kesici güvenlik özellikleri
      description: Taşıma/kullanım sırasında kazara kesilmeleri azaltan entegre güvenlik
        unsurlarını belirler.
    pendant_cutter_wear_method:
      name: Kolye tipi kesicinin takılma yöntemi
      description: Kolye tipi kesicinin nasıl taşınması veya takılması gerektiğini
        belirtir.
    pepper_variety:
      name: Biber çeşidi
      description: Üründe kullanılan biberin çeşidini veya türünü belirtir; böylece
        farklı tat profilleri ve acılık seviyeleri ayırt edilebilir.
    percussion_case_style:
      name: Vurmalı çalgı kılıfı stili
      description: Kılıfın genel stilini/yapısını sınıflandırır (yumuşak çanta, sert/rijit
        kılıf veya hibrit).
    percussion_instruments_included:
      name: Dahil olan vurmalı çalgılar
      description: Ürün çoklu enstrüman içeren bir oyuncak seti ise, hangi tür vurmalı
        çalgıların dahil edildiğini listeler.
    percussion_mallet_handle_grip_style:
      name: Vurmalı tokmak sap kavrama stili
      description: Sap üzerindeki kavrama türünü (yalnızca yüzey dokusunun ötesinde),
        örneğin ham ahşap, laklı, kauçuk kaplama veya sargılı olup olmadığını belirtir.
    percussion_mallet_head_construction:
      name: Vurmalı çalgı tokmağı başlığı yapımı
      description: Tokmağın başlık yapısını (örneğin iplikle sarılı, keçe kaplı, kauçuk,
        ham ahşap) tanımlar; bu yapı ses karakterini ve dayanıklılığı etkiler.
    perfumery_base_carrier_type:
      name: Parfüm baz taşıyıcı/çözücü türü
      description: Parfüm bazının taşıyıcı/çözücü sistemini belirtir; bu sistem seyreltme
        ve performansı etkiler.
    perfumery_base_intended_application:
      name: Parfüm bazının amaçlanan kullanım alanı
      description: Bazın hangi son kullanım formatı için tasarlandığını belirtir (örneğin
        sprey parfüm veya roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Parfüm bileşeni taşıyıcı/çözücü türü
      description: Seyreltilmişse, bileşenin hangi taşıyıcı/çözücü içinde sunulduğunu
        belirtir (örneğin etanol, DPG, jojoba yağı).
    perfumery_ingredient_form:
      name: Parfümeri bileşen formu
      description: Parfüm bileşeninin sunulduğu fiziksel formu veya durumu belirtir.
    perfumery_ingredient_type:
      name: Parfümeri bileşen türü
      description: Parfümeri uygulamasına göre bileşeni sınıflandırır (örneğin uçucu
        yağ, aroma kimyasalı).
    perfumery_ingredient_usage_note:
      name: Parfüm bileşeni kullanım notu
      description: Parfüm yapısındaki tipik rolünü (üst nota, orta/kalp nota, dip
        nota) belirtir; bazı malzemelerin birden fazla notada yer alabileceğini kabul
        eder.
    perfumery_ingredients:
      name: Parfümeri içerikleri
      description: Kit içinde yer alan tüketilebilir koku malzemelerinin türlerini
        listeler (örneğin uçucu yağlar, esans yağları, alkol baz).
    perfumery_note_position:
      name: Parfümeri nota konumu
      description: Bileşenin parfüm yapısındaki tipik nota konumunu (üst, orta/kalp,
        dip) belirtir.
    persimmon_variety:
      name: Trabzon hurması çeşidi
      description: Trabzon hurmasının kültivarını veya çeşidini belirtir (örneğin
        Fuyu veya Hachiya); bu çeşitler doku, tat ve kullanım açısından farklılık
        gösterebilir.
    personalization_type:
      name: Kişiselleştirme türü
      description: Ürünün bir etkinlik için kişiselleştirilip kişiselleştirilemeyeceğini
        ve nasıl kişiselleştirilebileceğini belirtir (örneğin monogram, isim/tarih,
        fotoğraf ekleme).
    phonics_focus:
      name: Fonetik odak
      description: Okuma oyuncağının hangi fonetik ve kelime okuma becerilerini hedeflediğini
        belirtir.
    physalis_variety:
      name: Physalis çeşidi
      description: Satılan physalis’in belirli botanik türünü, kültivarını veya yaygın
        çeşidini belirtir.
    pi_ata_filler_type_included:
      name: Piñata dolgu türü (dahil)
      description: Dolgu dahilse, sağlanan içeriğin türünü belirtir.
    pi_ata_hanging_method:
      name: Piñata asma yöntemi
      description: Piñatanın nasıl asılacağı veya destekleneceğini belirtir (halka,
        kanca, ip vb.).
    pi_ata_opening_type:
      name: Piñata açma tipi
      description: Dolum açıklığının nasıl açılıp kapatıldığını belirtir (kapak, cırt
        cırt, fermuar, önceden kapatılmış vb.).
    piccolo_key_system:
      name: Pikolo tuş sistemi
      description: Pikoloda kullanılan tuş sistemi/tasarımını belirtir (modern pikololarda
        genellikle Boehm sistemi).
    piccolo_keywork_features:
      name: Pikolo tuş sistemi özellikleri
      description: Pikolo üzerindeki önemli tuş mekanizmalarını ve seçeneklerini belirtir.
    pick_grip_aid:
      name: Pena tutuş desteği
      description: Penanın yüzey dokusunun ötesinde yer alan temel dahili tutuş desteğini
        belirtir (örneğin kavrama delikleri, kabartmalı logo, kauçuk kaplama).
    pickleball_construction_type:
      name: Pickleball yapı türü
      description: Topun üretim yapısını (örneğin dikişsiz tek parça veya kaynaklı
        iki parça) belirtir; bu yapı dayanıklılığı ve uçuş tutarlılığını etkiler.
    pickling_method:
      name: Turşulama yöntemi
      description: Turşulama için kullanılan koruma ortamını veya tekniğini belirtir
        (örneğin sirke salamurası veya laktik fermantasyon).
    pickup_and_preamp_configuration:
      name: Manyetik ve preamp yapılandırması
      description: Viyolanın amplifiye performans veya kayıt için dahili manyetik
        ve/veya aktif preamp içerip içermediğini belirtir.
    pickup_configuration:
      name: Pikap konfigürasyonu
      description: Elektro gitarın manyetik dizilimini yaygın kısaltmalarla (örneğin
        SSS, HSS, HH) belirtir.
    pickup_cover_material:
      name: Pikap kapak malzemesi
      description: Manyetik kapağının (varsa) ana malzemesini, üreticinin belirttiği
        kaplama yüzeyleri dahil olmak üzere belirtir.
    pickup_cover_type:
      name: Manyetik kapak tipi
      description: Elektrikli gitar manyetiğinin kapaklı olup olmadığını ve kapak
        malzemesini/stilini (örneğin metal veya plastik) belirtir.
    pickup_string_spacing:
      name: Manyetik tel aralığı
      description: Manyetiğin üretildiği pole-piece/tel aralığı standardını belirtir
        (örneğin Fender/F-spaced veya Gibson/standart); bu, tremolo donanımlı gitarlarda
        hizalamayı etkiler.
    pie_crust_type:
      name: Turta hamuru türü
      description: Turta veya tartta kullanılan hamur türünü veya stilini belirtir
        (örneğin gevrek hamur, bisküvi tabanı, glutensiz hamur).
    piece_configuration:
      name: Parça konfigürasyonu
      description: Istaka, şaft veya köprünün kaç ayrı parçadan oluştuğunu belirtir;
        bu durum taşınabilirliği ve oyun stilini etkiler.
    pillow_form_size:
      name: Yastık içi ölçüsü
      description: Yastık içi/dolgu için standart bitmiş ölçüyü belirtir (örneğin
        18 inç x 18 inç).
    pilot_helmet_communications_integration:
      name: Pilot kaskı iletişim entegrasyonu
      description: Kaskın havacılık iletişim bileşenlerini içerip içermediğini veya
        bu bileşenlere hazır olup olmadığını belirtir.
    pilot_helmet_visor_configuration:
      name: Pilot kaskı vizör konfigürasyonu
      description: Pilot kaskıyla birlikte verilen vizör/yüz siperi yapılandırmasını
        belirtir.
    pin_attachment_type:
      name: Pim bağlantı tipi
      description: Rozetin giysiye veya yüzeye takılmasını sağlayan arka mekanizmayı
        belirtir (örneğin kelebek klips, manyetik arka).
    pin_backing_type:
      name: Pim arka yüzey tipi
      description: Rozetin giysi veya aksesuara sabitlenmesini sağlayan bağlantı mekanizmasını
        belirtir.
    pin_cushion_attachment_style:
      name: İğne yastığı bağlantı stili
      description: İğne yastığının kullanım sırasında nasıl takıldığını, sabitlendiğini
        veya konumlandırıldığını belirtir.
    pin_cushion_features:
      name: İğne yastığı özellikleri
      description: Temel iğne tutma işlevinin ötesindeki fonksiyonel özellikleri belirtir.
    pin_face_customization_method:
      name: Rozet yüzey kişiselleştirme yöntemi
      description: Ön tasarımın nasıl üretildiğini belirtir (örneğin sert emaye, yumuşak
        emaye, baskı).
    pin_type:
      name: Rozet tipi
      description: Spor koleksiyon rozetleri için kullanılan ürün stilini veya formatını
        belirtir.
    ping_pong_certification:
      name: Masa tenisi sertifikası
      description: Ürünün resmi standart veya yetkili kurum onay seviyesini belirtir.
    ping_pong_competition_certification:
      name: Masa tenisi müsabaka sertifikası
      description: Masa tenisi topunun resmi müsabaka onay durumunu belirtir (örneğin
        ITTF onaylı).
    ping_pong_paddle_handle_style:
      name: Masa tenisi raket sapı stili
      description: Raket sapının şekil/stilini belirtir; bu yapı tutuş konforunu ve
        oyun tekniğini etkiler.
    ping_pong_robot_accessory_type:
      name: Masa tenisi robotu aksesuar türü
      description: Alıcının sonuçları hızlıca daraltabilmesi için aksesuarın işlevsel
        alt türünü tanımlar (örneğin ağ, güç adaptörü).
    ping_pong_rubber_surface_type:
      name: Masa tenisi lastik yüzey tipi
      description: Raket üzerine uygulanan lastiğin stilini/doku türünü belirtir;
        bu durum spin ve hız özelliklerini etkiler.
    ping_pong_rubber_type:
      name: Masa tenisi lastiği türü
      description: Masa tenisi lastiğinin yüzey yapısını belirtir; bu yapı oyun karakterini
        etkiler.
    ping_pong_table_type:
      name: Masa tenisi masası tipi
      description: Tablonun genel stilini veya biçimini sınıflandırarak karşılaştırmayı
        kolaylaştırır (örneğin müsabaka, dönüşüm tablası, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Borulu çalgı ses üretim yöntemi
      description: Enstrümanın sesi nasıl ürettiğini (hava akışı mekanizması) belirtir;
        bu bilgi filtrelerde farklı borulu çalgı türlerini ayırt etmeye yardımcı olur.
    piston_application_type:
      name: Piston kullanım tipi
      description: Pistonun amaçlanan kullanım alanını belirtir (yedek parça, performans/yarış,
        ağır hizmet vb.).
    piston_crown_dish_style:
      name: Piston tepe/çanak stili
      description: Piston tepe şeklinin yanma odası hacmini ve sıkıştırma oranını
        nasıl etkilediğini belirtir (örneğin düz tepe, kubbe, çanak).
    piston_pin_retention_type:
      name: Piston pimi sabitleme tipi
      description: Piston piminin piston/biyel kolu tertibatında nasıl sabitlendiğini
        belirtir.
    pit_configuration:
      name: Çukur konfigürasyonu
      description: İniş alanının yapısal formatını (tek parça veya çok modüllü) ve
        buna bağlı olarak sağlanan bölüm/modül sayısını belirtir.
    pit_cover_type:
      name: Çukur kapak tipi
      description: Çukurla birlikte verilen koruyucu yüzey veya tabaka türünü belirtir;
        bu özellik dayanıklılığı ve kullanım tercihlerini etkiler.
    pitahaya_flesh_color:
      name: Pitahaya et rengi
      description: Pitahayanın (ejder meyvesi) iç et rengini (örneğin beyaz, kırmızı,
        magenta) belirtir; bu özellik tat, görünüm ve algılanan besin değeri açısından
        önemli bir ayırt edici unsurdur.
    pitch_mat_coverage_length:
      name: Pitch mat kapsama uzunluğu
      description: Kriket pitch matını kapladığı alan uzunluğuna göre sınıflandırır
        (örneğin tam saha veya yarım saha).
    pitch_range:
      name: Perde aralığı
      description: Çalkalayıcının algılanan perde aralığını/parlaklığını tanımlar.
    pitch_standard:
      name: Perde standardı
      description: Blok flütün üretildiği referans akort standardını belirtir (örneğin
        A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Atış lastiği boyut sınıflandırması
      description: Atış lastiği için standart saha boyutu sınıflandırmasını belirtir;
        böylece kullanıcıların tam ölçüleri bilmesine gerek kalmadan uygun ürünü seçmesi
        kolaylaşır.
    pitching_screen_style:
      name: Atış koruma perdesi stili
      description: Perdenin yapısal tasarımını belirtir; böylece kullanıcı antrenman
        senaryosuna uygun koruma düzenini seçebilir.
    pitching_target_design:
      name: Atış hedefi tasarımı
      description: Atış hedefinin genel stilini veya yapılandırmasını belirtir.
    pitching_wheel_count:
      name: Atış makinesi tekerlek sayısı
      description: Atış makinesinin kullandığı tahrik tekerleklerinin sayısını belirtir.
    pivot_adjustability:
      name: Pivot ayarlanabilirliği
      description: Makasın kesme gerilimini ayarlamak için ayarlanabilir pivot vidasına
        sahip olup olmadığını belirtir.
    pivot_piece_type:
      name: Pivot parçası tipi
      description: Geleneksel yuva tipi veya tüp tipi gibi farklı pivot arayüz şekilleri
        arasında ayrım yapar.
    place_card_holder_closure_mechanism:
      name: Yer kartı tutucu kapatma mekanizması
      description: Kart tutucunun kartı nasıl kavradığını veya sabitlediğini belirtir.
    place_card_orientation:
      name: Yer kartı yönü
      description: Yer kartının kullanım veya sergileme sırasındaki yönünü belirtir.
    place_card_printing_status:
      name: Yer kartı yazdırma durumu
      description: Yer kartının el yazısı veya baskı için boş mu, önceden basılmış
        (isimler kişiselleştirilmemiş) mi yoksa kişiselleştirilmiş/özel baskılı mı
        olduğunu belirtir.
    placket_type:
      name: Patlet tipi
      description: Polo tişörtün ön açıklık stilini, düğme sayısını veya alternatif
        kapama yöntemlerini belirtir.
    planetarium_content_theme:
      name: Planetaryum içerik teması
      description: Planetaryum projektörü tarafından gösterilen ana içerik temasını
        belirtir.
    planetarium_projection_content_format:
      name: Planetaryum projeksiyon içerik formatı
      description: Planetaryumun kullandığı projeksiyon içerik mekanizmasını belirtir
        (fiziksel disk/slayt veya dijital/LED efekt).
    plant_fiber_type:
      name: Bitki lifi türü
      description: Elyaf kaynağı bitki olduğunda, kullanılan belirli bitki kökenli
        lif türünü belirtir.
    plaster_gauze_finish:
      name: Alçı gazlı bez yüzey bitişi
      description: Uygulama ve düzeltme sonrası oluşan yüzey bitiş eğilimini belirtir.
    plaster_gauze_grade:
      name: Alçı gazlı bez kalitesi
      description: Alçı gazlı bezin kullanım amacına göre sınıfını belirtir (örneğin
        hobi/öğrenci veya profesyonel).
    plaster_gauze_weave_density:
      name: Alçı gazlı bezin dokuma yoğunluğu
      description: Gazlı bez dokusunun açıklık/sıklık derecesini belirtir; bu durum
        dayanıklılığı ve alçı tutma kapasitesini etkiler.
    plastic_canvas_finish:
      name: Plastik kanvas yüzey bitişi
      description: Plastik kanvas rulosunun yüzey işlemini/bitişini belirtir.
    plastic_canvas_sheet_finish:
      name: Plastik kanvas levha yüzey bitişi
      description: Plastik kanvas levhanın yüzey/kenar işlemi.
    plastic_canvas_transparency:
      name: Plastik kanvas şeffaflığı
      description: Plastik kanvasın ne kadar şeffaf veya opak olduğunu belirtir.
    plate_bottom_design:
      name: Plaka tabanı tasarımı
      description: Plakanın alt yüzey yapısını belirtir; bu yapı farklı oyun zeminlerinde
        tutuşu, stabiliteyi ve güvenliği etkiler.
    plate_compatibility_standard:
      name: Plaka uyumluluk standardı
      description: Barın hangi ağırlık plakası standardına göre tasarlandığını belirtir
        (örneğin Olimpik 50 mm, Standart 25 mm).
    plate_installation_type:
      name: Plaka montaj tipi
      description: Plakanın sahada nasıl sabitleneceğini veya konumlandırılacağını
        (örneğin, yere gömülü, çivili, serbest yerleştirilen) belirtir ve alıcının
        kalıcı ve taşınabilir seçenekler arasında seçim yapmasına olanak tanır.
    plate_size_category:
      name: Plaka boyut kategorisi
      description: Plakayı oyun seviyesine veya düzenleme standardına göre sınıflandırarak
        alıcının lig kurallarına uygun ekipmanı hızlıca bulmasını sağlar.
    play_dough_putty_kit_contents:
      name: Oyun hamuru ve macun kit içeriği
      description: Bileşiğin kendisi dışında dahil edilen ana bileşenleri belirtir
        (örneğin aletler, kalıplar, ekstrüder, saklama kutusu).
    play_dough_tool_set_items_included:
      name: Dahil olan oyun hamuru alet seti
      description: Oyun hamuru alet setinde yer alan alet ve aksesuar türlerini belirtir
        (örneğin merdane, kesici, kalıp).
    play_environment_suitability:
      name: Oyun ortamı uygunluğu
      description: Setin kullanımına uygun oyun ortamını belirtir (örneğin iç mekân,
        dış mekân, su).
    play_food_features:
      name: Oyun yiyecek özellikleri
      description: Oyun yiyeceklerinin özel işlevsel veya gerçekçilik özelliklerini
        belirtir.
    play_food_items_included:
      name: Dahil olan oyun yiyecek ürünleri
      description: Mutfak oyun setine dahil olan oyuncak yiyecek türlerini belirtir.
    play_food_size_scale:
      name: Oyun yiyecek ölçek oranı
      description: Oyuncak mutfak, bebek ve oyun setleriyle uyumluluk için taklit
        yiyecek parçalarının yaklaşık ölçek oranını belirtir.
    play_money_set_components_included:
      name: Dahil olan oyuncak para seti bileşenleri
      description: Oyun para/bankacılık setine hangi bileşen türlerinin dahil olduğunu
        belirtir.
    play_pattern:
      name: Oyun deseni
      description: Oyuncağın temel kullanım amacını belirtir (örneğin stres giderme,
        masaüstü dekor, yapı kurma, bulmaca).
    play_sprinkler_mounting_type:
      name: Oyun fıskiyesi montaj tipi
      description: Oyun fıskiyesinin kullanım sırasında nasıl konumlandırıldığını
        veya sabitlendiğini belirtir.
    play_vehicle_lights_and_sounds:
      name: Oyuncak araç ışık ve ses özellikleri
      description: Oyuncak aracın ışık ve/veya ses gibi elektronik efektler içerip
        içermediğini belirtir.
    play_vehicle_scale:
      name: Oyuncak araç ölçek oranı
      description: Oyuncak aracın ölçek oranını belirtir (genellikle die-cast ve model
        tipi araçlar için kullanılır).
    player_size_category:
      name: Oyuncu beden kategorisi
      description: Kaleci ekipman setinin uygun olduğu oyuncu beden/yaş grubunu belirtir
        (örneğin Tee Ball, Genç, Orta, Yetişkin).
    player_size_range:
      name: Oyuncu beden aralığı
      description: Kayış/destek için amaçlanan kullanıcı beden aralığını belirtir
        (örneğin çocuk, yetişkin, evrensel).
    playing_environment:
      name: Oyun ortamı
      description: Hokey topunun tasarlandığı birincil oyun yüzeyini veya kullanım
        ortamını belirtir.
    playing_method:
      name: Oynama yöntemi
      description: Enstrümanın çalınması/aktif hale getirilmesi için tasarlanmış temel
        yöntem.
    playing_surface_material:
      name: Oyun yüzeyi malzemesi
      description: Cajon'un ön çalma yüzeyinin (tapa) malzemesini tanımlar; bu malzeme,
        tonu ve hissiyatı büyük ölçüde etkiler.
    playing_surface_type:
      name: Oyun yüzeyi türü
      description: Antrenman pedinin oyun yüzeyi yapısını veya hissini belirtir.
    playset_activities_included:
      name: Dahil olan oyun alanı aktiviteleri
      description: Alıcının, çocukların yapıda neler yapabileceğine göre filtreleme
        yapmasına yardımcı olmak için salıncak setine/oyun setine entegre edilmiş
        ana oyun aktivitelerini/bileşenlerini tanımlar.
    playset_installation_type:
      name: Oyun seti kurulum tipi
      description: Salıncak/oyun setinin nasıl monte edildiğini veya sabitlendiğini
        belirtir.
    playset_items_included:
      name: Dahil olan oyun seti parçaları
      description: Piknik oyun setine dahil olan oyuncak öğe türlerini belirtir (yiyecek,
        sofra takımı, battaniye, sepet vb.).
    pliers_jaw_style:
      name: Pense çene stili
      description: Pensenin temel çene yapılandırmasını veya işlevsel stilini belirtir.
    plum_variety:
      name: Erik çeşidi
      description: Erik kültivarını veya çeşidini belirtir; bu bilgi tat, renk ve
        kullanım amacına göre seçim yapılmasını sağlar.
    plumcot_variety:
      name: Plumcot çeşidi
      description: Erik-kayısı (plumcot) kültivarını veya ticari çeşidini belirtir
        (örneğin Flavor King, Dapple Dandy).
    plunger_mute_handle_type:
      name: Pistonlu susturucu tutma kolu tipi
      description: Wa-wa efektleri için pistonlu susturucuda kullanılan tutma kolu/kavrama
        stilini belirtir.
    pocket_closure_type:
      name: Cep kapatma tipi
      description: Her cebin nasıl sabitlendiğini belirtir; böylece kullanıcılar güvenli
        depolama sunan pantolonları seçebilir.
    pocket_knife_opening_mechanism:
      name: Cep bıçağı açma mekanizması
      description: Bıçağın nasıl açılıp kapandığı (manuel tırnak çentiği, başparmak
        sapı, çevirme kolu, destekli, otomatik vb.).
    pocket_style:
      name: Cep tipi
      description: Pantolonun ana cep yapısını belirtir.
    pocket_type:
      name: Cep tipi
      description: Giysideki cep stilini veya cep varlığını belirtir.
    pod_retention_system:
      name: Pod sabitleme sistemi
      description: Paintball podlarının kayış veya çanta üzerinde nasıl sabitlendiğini
        ve serbest bırakıldığını belirtir.
    pogo_stick_footrest_type:
      name: Pogo çubuğu tipi ayak dayama yeri
      description: Pogo stick üzerinde durmak için kullanılan ayak platformu tasarımını
        belirtir.
    pogo_stick_suspension_type:
      name: Pogo stick süspansiyon tipi
      description: Pogo stick’in geri tepme mekanizmasını belirtir; bu mekanizma hissi,
        dayanıklılığı ve bakım gereksinimini etkiler.
    poi_handle_type:
      name: Poi sap tipi
      description: Poi’yi tutmak için kullanılan tutma kolu/kavrama/bağlantı stilini
        belirtir.
    poi_light_source:
      name: Poi ışık kaynağı
      description: Poi’yi tutmak için kullanılan tutma kolu/kavrama/bağlantı stilini
        belirtir.
    poi_tether_type:
      name: Poi bağlantı tipi
      description: Poi başlığını tanıtıcıya, tokaya veya bilek halkasına bağlayan
        ipin türünü belirtir (örneğin, kordon, halat, zincir).
    poi_type:
      name: Poi tipi
      description: Poi'nin temel yapım/kullanım türünü belirtir (örneğin, antrenman,
        LED, ateş).
    point_type:
      name: Puan tipi
      description: Nakış iğnesinin ucunda kullanılan Shapes/stil.
    pointe_shoe_shank_length:
      name: Point ayakkabı taban sertliği uzunluğu
      description: Ayakkabının taban kısmının desteklediği bölüm, örneğin tam veya
        3/4 uzunluk.
    pointe_shoe_shank_strength:
      name: Bale ayakkabısı tabanının dayanıklılığı
      description: Bale ayakkabısının tabanının sertlik seviyesi, desteği ve alışma
        süresini etkiler.
    poker_accessory_storage_included:
      name: Dahil olan poker aksesuarları saklama alanı
      description: Bu aksesuarın hangi ek poker ürünü için özel saklama alanı sağladığını
        gösterir.
    poker_chip_tray_rack_configuration:
      name: Poker çip tepsisi/raf konfigürasyonu
      description: Çip tepsisi/rafın iç düzen yapısını (sıra sayısı ve sıra başına
        kapasite) belirtir.
    pole_anchoring_method:
      name: Direk sabitleme yöntemi
      description: Direğin yere veya oyun yüzeyine nasıl sabitlendiğini belirtir.
    pole_basket_type:
      name: Baton sepet tipi
      description: Kayak direği ucundaki sepetin stilini veya boyutunu sınıflandırır;
        bu bilgi amaçlanan kar koşullarını gösterir.
    pole_connection_system:
      name: Direk bağlantı sistemi
      description: Direk bölümlerini birleştiren mekanizmayı belirtir (örneğin şok
        kordonlu, dişli veya göbek sistemli); bu bilgi kurulum hızını ve uyumluluğu
        değerlendirmeye yardımcı olur.
    pole_system_type:
      name: Direk sistem tipi
      description: Çadırın yapısal destek sistemini veya kurulum stilini belirtir
        (örneğin alüminyum direk, şişirilebilir hava tüpü, trekking batonlu kurulum).
    police_equipment_fitment:
      name: Polis ekipmanı uyumluluğu
      description: Aracın hangi kolluk kuvveti ekipmanlarını destekleyecek şekilde
        yapılandırıldığını veya önceden kablolandığını belirtir.
    police_vehicle_equipment_package:
      name: Polis aracı ekipman paketi
      description: Araçla birlikte sunulan polis donanım paketini belirtir.
    police_vehicle_light_siren_equipment:
      name: Polis aracı ışık/siren ekipmanı
      description: Polis aracına hangi acil durum uyarı cihazlarının takıldığını belirtir.
    police_vehicle_upfit_level:
      name: Polis aracı donanım seviyesi
      description: Araca hangi polis teşkilatına özgü ekipman/donanımın takıldığını
        açıklar.
    polish_formulation:
      name: Cila formülasyonu
      description: Klavye cilasının formülasyon bazını/kimyasını belirtir (uygulama
        yöntemini değil).
    polish_purpose:
      name: Cila amacı
      description: Enstrüman yüzeyindeki cilalamanın temel amacını belirtir.
    pollen_level:
      name: Polen seviyesi
      description: Zambak çeşidine bağlı polen lekesi miktarını veya olasılığını belirtir.
    polymer_clay_firmness_level:
      name: Polimer kil sertlik seviyesi
      description: Pişirme öncesi polimer kilin nispi sertlik/yumuşaklık seviyesini
        belirtir.
    polymer_clay_translucency:
      name: Polimer kilin saydamlığı
      description: Kürlendikten sonra polimer kilin görsel opaklık/şeffaflık seviyesini
        belirtir.
    pom_pom_handle_style:
      name: Ponpon sap stili
      description: Ponponu tutmak için kullanılan sap/kavrama stilini veya yapısını
        belirtir.
    pom_pom_trim_backing_tape_material:
      name: Ponpon şerit arka/bant malzemesi
      description: Ponponların dikili olduğu bant veya şeridin (trim tabanı) malzemesini
        belirtir.
    pom_pom_type:
      name: Ponpon tipi
      description: Şapkada ponpon olup olmadığını ve varsa türünü belirtir.
    pomegranate_product_form:
      name: Nar ürün formu
      description: Sunulan fiziksel formu belirtir (bütün meyve, ayıklanmış taneler,
        çekirdek, dondurulmuş taneler).
    pomegranate_variety:
      name: Nar çeşidi
      description: Nar meyvesinin belirli kültivarını veya çeşidini belirtir (örneğin
        Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Atkuyruğu tokası stili
      description: Atkuyruğu tokasının yapısını veya form faktörünü belirtir; böylece
        kullanıcı tercih ettiği stili seçebilir.
    popcorn_form:
      name: Patlamış mısır formu
      description: Patlamış mısır ürününün fiziksel veya sunum formunu belirtir (tüketime
        hazır, çekirdek, mikrodalga paketi, baharat kiti, hediye kutusu vb.).
    pork_rind_form:
      name: Domuz derisi formu
      description: Domuz derisi atıştırmalıklarının fiziksel formunu veya stilini
        sınıflandırır (örneğin rind, crackling, puff, pellet).
    portability_features:
      name: Taşınabilirlik özellikleri
      description: Şezlongun taşınmasını, yerleştirilmesini veya saklanmasını kolaylaştıran
        yerleşik unsurları belirtir.
    portability_frame_type:
      name: Taşınabilirlik/çerçeve tipi
      description: Orkestra çanlarının taşınabilir saha tipi mi yoksa sabit konser
        tipi çerçeveye mi sahip olduğunu belirtir.
    portable_electronic_game_features:
      name: Taşınabilir elektronik oyun özellikleri
      description: Cihazın desteklediği temel oyun ve donanım özelliklerini belirtir.
    post_surgery_stage_suitability:
      name: Ameliyat sonrası aşama uygunluğu
      description: Vücut şekillendirici ürünün hangi iyileşme aşaması için tasarlandığını
        belirtir (varsa); tıbbi şekillendirici giysi alıcıları için önemlidir.
    postage_stamp_format:
      name: Posta pulu formatı
      description: Pulun nasıl sunulduğunu/paketlendiğini belirtir (tekli, çiftli,
        şerit, blok, tabaka, kitapçık sayfası, rulo vb.).
    postmark_type:
      name: Posta damgası türü
      description: Kullanılmış pullardaki iptal/posta damgası türünü belirtir.
    potato_cut_style:
      name: Patates kesim tarzı
      description: Patateslerin bütün satılmadığı durumlarda kesim veya hazırlama
        stilini belirtir.
    potato_intended_use:
      name: Patatesin kullanım amacı
      description: Tüketime yönelik patatesleri, tohumluk veya işlenmiş/dondurulmuş
        amaçlı patateslerden ayırır.
    potato_variety:
      name: Patates çeşidi
      description: Patatesin kültivarını/çeşidini belirtir; böylece alıcılar “Yukon
        Gold”, “Maris Piper” veya “Purple Majesty” gibi türleri bulabilir.
    pottery_clay_firing_required:
      name: Çömlek kili için fırınlama gerekliliği
      description: Malzemenin nihai sertliğe veya yüzeye ulaşmak için fırınlanması
        gerekip gerekmediğini belirtir.
    pottery_slip_application_method:
      name: Seramik slip uygulama yöntemi
      description: Slip’in amaçlanan uygulama tekniğini belirtir.
    pottery_slip_compatible_clay_body:
      name: Slip ile uyumlu kil gövdesi
      description: Slip’in hangi kil gövdesi türleriyle uyumlu veya birlikte kullanılmak
        üzere tasarlandığını belirtir.
    pottery_slip_form:
      name: Seramik slip formu
      description: Ürünün kullanıma hazır sıvı halde mi yoksa karıştırılması gereken
        kuru karışım/toz halinde mi satıldığını belirtir.
    pouch_design:
      name: Ön cep tasarımı
      description: Ön cep bölümünün yapısını veya geliştirilmiş özelliklerini açıklar.
    pouch_style:
      name: Ön cep stili
      description: Ön cep bölümünün tasarımını; konfor, destek ve estetik unsurlar
        açısından belirtir.
    powdered_beverage_variety:
      name: Toz içecek çeşidi
      description: Ürünü hazırladığı içecek türüne göre sınıflandırır (örneğin limonata,
        spor içeceği, protein shake).
    power_rack_style:
      name: Power rack stili
      description: Genel raf tasarımını/konfigürasyonunu belirtir; tam kafes, yarım
        rack veya kompakt modeller arasında ayrım yapılmasını sağlar.
    power_steering_fluid_formulation:
      name: Hidrolik direksiyon sıvısı formülasyonu
      description: Sıvının genel formülasyon ailesini belirtir (ATF bazlı, özel hidrolik/CHF
        veya evrensel), üst seviye uyumluluk filtrelemesi için kullanılır.
    practice_mute_audio_output:
      name: Pratik susturucu ses çıkış tipi
      description: Bu özellik, sessiz/elektronik çalışma susturucularında yaygın olarak
        kullanılan, izleme ve/veya kayıt için kullanılabilen ses çıkış türünü belirtir.
    practice_mute_intonation_impact:
      name: Pratik susturucu entonasyon etkisi
      description: Pratik susturucu kullanıldığında beklenen akort/entonasyon etkisini
        açıklar.
    practice_mute_venting_valve_type:
      name: Pratik susturucu havalandırma/valf tipi
      description: Pratik susturucunun havalandırmalı olup olmadığını ve ayarlanabilir
        valf içerip içermediğini belirtir.
    practice_pad_features:
      name: Antrenman pedi özellikleri
      description: Egzersiz pedinin boyut ve malzeme dışında kalan işlevsel özelliklerini
        belirtir.
    practice_pad_mounting_style:
      name: Egzersiz pedi montaj stili
      description: Bu, egzersiz pedinin kullanım sırasında nasıl konumlandırılması
        veya takılması gerektiğini gösterir.
    practice_pad_rebound_level:
      name: Egzersiz pedi geri tepme seviyesi
      description: Bu değer, egzersiz pedinin tipik davul derilerine kıyasla göreceli
        geri tepme/tepki özelliğini gösterir.
    practice_pad_surface_configuration:
      name: Egzersiz pedi yüzey konfigürasyonu
      description: Pedin tek veya birden fazla çalma yüzeyine sahip olup olmadığını
        ve yüzeylerin hissiyat açısından farklılık gösterip göstermediğini belirtir.
    pregnancy_stage_suitability:
      name: Gebelik evresine uygunluk
      description: Ürünün hangi gebelik veya doğum sonrası dönem için tasarlandığını
        belirtir.
    preparation_state:
      name: Hazırlık durumu
      description: Tüketimden önce gereken hazırlık veya pişirme düzeyini belirtir.
    preparation_style:
      name: Hazırlama stili
      description: Su kestanesinin satıldığı sıradaki kesim veya işleme durumunu tanımlar
        (örneğin, bütün, dilimlenmiş, kavrulmuş, dondurulmuş).
    preservation_medium:
      name: Koruma ortamı
      description: Zeytin veya kaparilerin muhafaza edildiği başlıca sıvı veya ortamı
        belirtir (örneğin, salamura, zeytinyağı, sirke).
    presser_foot_attachment_method:
      name: Baskı ayağı takma yöntemi
      description: Dikiş makinesi baskı ayağının baskı ayağı tutucusuna/şaftına nasıl
        takıldığını (örneğin, geçmeli veya vidalı) gösterir ve bu da uyumluluğu etkiler.
    pressure_gauge_type:
      name: Basınç göstergesi tipi
      description: Bisiklet pompasıyla birlikte verilen basınç göstergesinin türünü
        belirtir (varsa).
    pressure_measurement_unit:
      name: Basınç ölçüm birimi
      description: Basınç sensörünün okuma veya kalibrasyonu için kullanılan birimi
        belirtir; bu, ürünleri karşılaştırmak ve gösterge/ECU uyumluluğunu sağlamak
        için kullanışlıdır.
    pressure_plate_balance_type:
      name: Baskı plakası dengeleme tipi
      description: Baskı plakasının dahili dengeli olup olmadığını veya motor/volan
        düzenine uygun harici dengeleme gerektirip gerektirmediğini belirtir.
    pressure_plate_components_included:
      name: Dahil olan baskı plakası bileşenleri
      description: Baskı plakası listesine hangi bileşenlerin dahil olduğunu belirtir.
    pressure_sensor_application:
      name: Basınç sensörü uygulaması
      description: Basınç sensörünün hangi araç sistemi/ölçüm noktası için tasarlandığını
        belirtir.
    pressure_sensor_port_thread_standard:
      name: Basınç sensörü port/diş standardı
      description: Sensörün araç sistemine montajında kullanılan mekanik port/diş
        standardını belirtir.
    pressurization_method:
      name: Basınçlandırma yöntemi
      description: Cihaz içinde basıncın nasıl oluşturulduğunu veya sürdürüldüğünü
        belirtir.
    pretend_housekeeping_set_items_included:
      name: Dahil olan oyuncak ev temizliği seti ürünleri
      description: Sete dahil olan temizlik aksesuarlarını listeler (paspas, süpürge,
        faraş, sprey şişesi vb.).
    pretend_play_electronic_features:
      name: Oyuncak elektronik özellikleri
      description: Oyuncak ürüne dahil edilen elektronik/etkileşimli özellikleri belirtir.
    pretend_play_set_pieces_included:
      name: Dahil olan oyuncak set parçaları
      description: Oyuncak setinde yer alan temel aksesuarları/bileşenleri listeler
        (yazar kasa, oyuncak yiyecek, aletler vb.).
    pretend_play_set_theme:
      name: Oyuncak set teması
      description: Ürünün temsil ettiği temel hayali oyun temasını belirtir (tüm Oyuncak
        seti oynayan çocuklar arasında genel keşif için faydalıdır).
    pretzel_coating:
      name: Simit kaplaması
      description: Simit üzerine uygulanan dış kaplama veya baharat türünü belirtir
        (tuzlu veya tatlı seçenekler dahil).
    pretzel_shape:
      name: Simit şekli
      description: Arama veya filtreleme yaparken kullanılan önemli bir ayırt edici
        özellik olan simidin fiziksel şeklini (örneğin, bükme, yapıştırma, ısırma)
        belirtir.
    primary_component_material:
      name: Ana bileşen malzemesi
      description: Motor bloğunun ana malzemesi.
    primary_dish_application:
      name: Ana yemek uygulaması
      description: Hamurun hangi ana yemek veya hazırlık için tasarlandığını belirtir.
    primary_plant_base:
      name: Ana bitkisel baz
      description: Peynir alternatifi için kullanılan ana süt ürünü içermeyen bileşeni
        belirtir.
    primary_plant_protein_source:
      name: Birincil bitkisel protein kaynağı
      description: Üründe protein sağlayan ana bitkisel bileşeni belirtir.
    primary_sweetener_source:
      name: Birincil tatlandırıcı kaynağı
      description: Şurubun elde edildiği bitkiyi veya ham maddeyi belirtir.
    print_placement:
      name: Baskı yerleşimi
      description: Tişört üzerindeki ana grafik/logo’nun konumunu belirtir.
    print_technique:
      name: Baskı tekniği
      description: Tişört grafiğinde kullanılan baskı/dekorasyon yöntemini belirtir.
    printable_canvas_intended_use:
      name: Yazdırılabilir tuvalin kullanım amacı
      description: Yazdırılabilir tuvalin optimize edildiği birincil kullanım alanını
        belirtir.
    printable_fabric_format:
      name: Yazdırılabilir kumaş formatı
      description: Yazdırılabilir pamuğun nasıl sunulduğunu belirtir (tek sayfa mı
        yoksa sürekli rulo halinde mi), bu da yazıcı beslemesini ve proje iş akışını
        etkiler.
    prism_material:
      name: Prizma malzemesi
      description: Optik elemanın (prizmanın) malzemesini belirtir; bu malzeme netlik,
        dayanıklılık ve çizilme direncini etkiler.
    prisoner_transport_configuration:
      name: Mahkum nakli konfigürasyonu
      description: Araçın tutuklu/mahkum nakli için yapılandırılıp yapılandırılmadığını
        ve nasıl yapılandırıldığını belirtir.
    prisoner_transport_partition_type:
      name: Mahkum nakli bölme tipi
      description: Ön ve arka bölmeleri ayıran iç bölme/kafes tipini belirtir.
    privacy_or_acoustic_feature:
      name: Gizlilik veya akustik özelliği
      description: Bölme panelleri, akustik perdeler veya tam kapalı alanlar gibi
        yerleşik gizlilik veya akustik unsurları belirtir.
    processing_state:
      name: İşlenme durumu
      description: Tüylerin el işi kullanımına uygun şekilde sterilize edilip edilmediğini
        veya başka bir işlemden geçirilip geçirilmediğini belirtir.
    produce_grade:
      name: Tarım ürünü kalite derecesi
      description: Kiviye verilen kalite derecesini boyut, görünüm ve genel durumuna
        göre sınıflandırır.
    produce_growth_stage:
      name: Ürün büyüme aşaması
      description: Ürünün satıldığı büyüme aşamasını belirtir (mikro yeşillik, bebek
        yaprak, olgun yaprak vb.).
    produce_washing_state:
      name: Ürün yıkama durumu
      description: Yeşilliklerin yıkanıp yıkanmadığını ve tüketime hazır olup olmadığını
        belirtir.
    profile_shape:
      name: Profil/şekil
      description: Zilin genel eğimini/profilini belirtir (kenardan çana doğru yükselme
        derecesi).
    projectile_ammunition_type:
      name: Mermi/mühimmat türü
      description: Oyuncak silahın kullandığı mermi veya sarf malzemesi türünü belirtir
        (varsa).
    projectile_finish:
      name: Mermi yüzey kaplaması
      description: BB'ye uygulanan ve korozyon direncini veya görünürlüğü artıran
        herhangi bir yüzey kaplamasını belirtir (örneğin, bakır kaplı, çinko kaplı,
        boyalı).
    projectile_type:
      name: Mermi tipi
      description: Ürünün kullandığı veya kullanım amacına uygun mermi türünü belirtir.
    pronation_support:
      name: Pronasyon desteği
      description: Ayakkabının hangi yürüyüş veya pronasyon modeline uygun olarak
        tasarlandığını gösterir.
    propellant_type:
      name: İtici gaz türü
      description: Parçanın veya aksesuarın kullanmak üzere tasarlandığı itici gaz
        türünü belirtir.
    propeller_blade_cup:
      name: Pervane kanadı kenar kıvrımı
      description: Kanatların arka kenarındaki kıvrım miktarını gösterir.
    propeller_hub_type:
      name: Pervane göbeği tipi
      description: Pervanenin kullandığı göbek/burç sistemini belirtir (değiştirilebilir
        göbek kiti veya preslenmiş).
    propeller_rotation:
      name: Pervane dönüş yönü
      description: Pervanenin dönüş yönünü belirtir.
    protectant_formula_base:
      name: Koruyucu formül bazı
      description: Koruyucu ürünün temel formülasyon bazını belirtir (örneğin su bazlı
        veya solvent bazlı); bu durum parlaklık, yüzey hissi ve temizlik kolaylığını
        etkiler.
    protection_coverage_area:
      name: Koruma kapsamı alanı
      description: Koruyucu aksesuarın saatin hangi kısımlarını kapladığını belirtir.
    protection_level:
      name: Koruma seviyesi
      description: Taşıma çantasının enstrümanın taşınması ve saklanması için sunduğu
        koruma seviyesini belirtir.
    protective_case_interior_protection_type:
      name: Koruyucu çanta iç koruma tipi
      description: İçeriği sabitlemek ve darbelere karşı korumak için kullanılan ana
        iç koruma yöntemini belirtir.
    protective_case_shell_type:
      name: Koruyucu çanta kabuk tipi
      description: Çantanın dış yapısının genel yapım stilini (sertlik/rijitlik düzeyini)
        belirtir; bu özellik ezilme korumasını ve taşınabilirliği etkiler.
    protective_contact_padding_material:
      name: Koruyucu temas dolgu malzemesi
      description: Enstrümanın temas noktalarında çizilmeyi önlemek için kullanılan
        malzemeyi belirtir (keçe, kauçuk vb.).
    protective_cup_configuration:
      name: Koruyucu kupa konfigürasyonu
      description: Koruyucu kupanın dahil olup olmadığını, çıkarılabilir olup olmadığını
        veya yalnızca kupa cebi bulunup bulunmadığını belirtir.
    protective_eyewear_standard_compliance:
      name: Koruyucu gözlük standartlarına uygunluk
      description: Gözlüğün spor kullanımı için karşıladığı güvenlik veya darbe dayanımı
        standartlarını/sertifikalarını belirtir.
    protective_gear_certification_standard:
      name: Koruyucu ekipman sertifikasyon standardı
      description: 'Ekipmanın uyduğu güvenlik/sertifikasyon standardını gösterir (ürün
        türüne göre değişir: kask standartları, tulum standartları, darbe koruma zırhı
        standartları).'
    protective_gear_items_included:
      name: Dahil olan koruyucu donanım ürünleri
      description: Çok parçalı koruyucu ekipman setinde yer alan parçaları listeler.
    protective_gear_padding_type:
      name: Koruyucu ekipman dolgu tipi
      description: Darbe koruması için kullanılan dolgu türünü belirtir.
    protective_gear_safety_certifications:
      name: Koruyucu ekipman güvenlik sertifikaları
      description: Ürün tarafından karşılanan, spora özgü tanınmış güvenlik veya performans
        standartlarını listeler; örneğin NOCSAE veya ASTM saha hokeyi kaskı standartları
        gibi.
    protective_pad_components_included:
      name: Dahil olan Koruyucu ped bileşenleri
      description: Çok parçalı bir sette hangi koruyucu ürünlerin yer aldığını belirterek,
        alıcının hangi vücut bölgelerinin korunduğunu tam olarak bilmesini sağlar.
    protective_shorts_intended_use:
      name: Koruyucu şortların kullanım amacı
      description: Bu koruyucu şortlar, esas olarak binicilik/yarış disiplini için
        tasarlanmıştır.
    protective_shorts_padding_type:
      name: Koruyucu şort dolgu tipi
      description: Şortlarda kullanılan koruyucu unsurların yapısını/formatını belirtir.
    protective_shorts_padding_zones:
      name: Koruyucu şort dolgu bölgeleri
      description: Koruyucu şortlarda entegre dolgu/zırh bulunan vücut bölgelerini
        belirtir.
    protective_treatment:
      name: Koruyucu uygulama
      description: Leke, su veya UV ışınlarına karşı dayanıklılık için uygulanan herhangi
        bir koruyucu kaplama veya uygulamayı belirtir (örneğin, Teflon).
    protector_coverage_area:
      name: Koruyucu kapsama alanı
      description: Koruyucunun hangi gövde bölgelerini kapladığını belirtir (göğüs,
        sırt, yanlar vb.).
    puck_bottom_style:
      name: Disk alt yüzey stili
      description: Diskin alt yüzey profilini tanımlar; bu profil farklı shuffleboard
        yüzeylerinde hız ve kontrolü etkiler.
    puck_type:
      name: Disk tipi
      description: Resmi maçlarda kullanılan hokey disklerinden koleksiyonluk hatıra
        eşyalarına kadar, hokey diskinin işlevsel tarzını veya kullanım amacını sınıflandırır.
    pull_buoy_style:
      name: Çekme şamandırası tarzı
      description: Çekme şamandırasının işlevsel stilini veya konfigürasyonunu belirtir
        (standart, ayak bileği tipi, pullkick vb.).
    pull_through_weight_material:
      name: Çekme ağırlığı malzemesi
      description: Geçmeli temizleme çubuklarında, çubuğu enstrüman içinden geçirmek
        için kullanılan ağırlığın malzemesini belirtir.
    pulp_content:
      name: Posa içeriği
      description: İçecekte bulunan meyve veya sebze posası miktarını belirtir.
    pump_accessories_included:
      name: Dahil olan pompa aksesuarları
      description: Top pompasıyla birlikte verilen ek parçaları listeler; böylece
        kullanıcı paket içeriğini anlayabilir.
    pumping_compatibility:
      name: Pompalama uyumluluğu
      description: Emzirme sütyeninin eller serbest süt sağmaya da uygun olup olmadığını
        belirtir.
    punch_pad_type:
      name: Boks ped tipi
      description: Alıcının antrenman ihtiyaçlarına uygun doğru boks/antrenman pedini
        seçebilmesi için pedin tasarımını veya stilini belirtir.
    punching_training_bag_shape:
      name: Boks/antrenman torbası şekli
      description: Ağır kum torbasının geometrik stilini belirterek, alıcının belirli
        vuruş egzersizlerine (örneğin, aparkatlar, vücut vuruşları) uygun modelleri
        seçmesine yardımcı olur.
    puncture_protection_technology:
      name: Delinmeye karşı koruma teknolojisi
      description: Lastiğe entegre edilmiş özel veya genel delinme önleyici katmanları
        ya da yan duvar/gövde takviye teknolojilerini listeler (örneğin EXO, SnakeSkin,
        Kevlar kuşağı).
    puppet_features:
      name: Kukla özellikleri
      description: Kuklanın işlevsel veya performans özelliklerini belirtir (hareketli
        ağız, ses efekti vb.).
    puppet_puppet_theater_accessory_type:
      name: Kukla ve kukla tiyatrosu aksesuar türü
      description: Ürünün ne tür bir aksesuar olduğunu belirtir (sahne aksesuarı,
        kukla kostümü, kontrol çubuğu, yedek ip vb.).
    purity_unit:
      name: Saflık birimi
      description: Madeni paranın saflığının nasıl ifade edildiği belirtir (incelik
        derecesi ve karat değeri).
    push_up_bar_design:
      name: Şınav barı tasarımı
      description: Şınav barlarının fonksiyonel tasarım stilini belirtir (örneğin
        sabit, döner, paralel bar).
    pushrod_end_type:
      name: İtme çubuğu ucu tipi
      description: Pedal veya ana silindir arayüzünde kullanılan itme çubuğu ucunun/bağlantı
        parçasının stilini belirtir.
    putty_glow_activation_method:
      name: Macun parıltı aktivasyon yöntemi
      description: Macunun parlaması için nasıl şarj edildiğini/aktif hale getirildiğini
        belirtir (örneğin güneş ışığı, UV/siyah ışık).
    putty_glow_color:
      name: Macun parıltı rengi
      description: Macunun karanlıkta parladığında yaydığı rengi belirler.
    putty_inclusions:
      name: Macun iç katkıları
      description: Macunun içinde bulunan dikkat çekici katkı maddelerini belirtir
        (örneğin sim, konfeti, köpük boncuk).
    putty_texture:
      name: Macun dokusu
      description: Macunun temel kullanım davranışını belirtir (zıplayan, esneyen,
        sıvı benzeri vb.).
    puzzle_accessory_features:
      name: Yapboz aksesuar özellikleri
      description: Yapboz aksesuarlarının işlevsel özelliklerini ve tasarım unsurlarını
        belirtir (aksesuar türüne göre değişir).
    pyrometric_cone_range:
      name: Pirometrik koni aralığı
      description: Sırın pişirilmesi için önerilen pirometrik koni aralığını belirtir
        (örneğin, Kon 06–04, Kon 5–6).
    quarter_panel_coverage_type:
      name: Çeyrek panel kapsama türü
      description: Ürünün çeyrek panel alanının ne kadarını değiştirdiğini/onardığını
        belirtir.
    quarter_panel_set_contents:
      name: Çeyrek panel set içeriği
      description: Liste kaydında yer alan çeyrek panel paket konfigürasyonunu belirtir
        (tek taraf, çift taraf veya ek onarım parçalarıyla).
    quilting_ruler_markings:
      name: Kapitone cetvel işaretleri
      description: Dikiş cetvelinde kesim/hizalama için kullanılan baskılı işaretlerin
        türlerini belirtir.
    quilting_ruler_non_slip_feature:
      name: Dikiş cetveli kaymaz özelliği
      description: Cetvelin kumaş üzerinde kaymayı azaltmak için kaymaz bir taban/yüzey
        uygulaması içerip içermediğini belirtir.
    quilting_ruler_transparency:
      name: Dikiş cetveli şeffaflığı
      description: Cetvel malzemesinin kumaş ve altındaki işaretlerin görülmesini
        sağlayan şeffaflık düzeyini belirtir.
    quilting_thread_usage:
      name: Kapitone ipliği kullanım amacı
      description: İpliğin hangi kapitone uygulaması için tasarlandığını belirtir.
    quilting_thread_weight_system:
      name: Kapitone iplik ağırlık sistemi
      description: İplik kalınlığını ifade eden ağırlık derecelendirme sistemini belirtir
        (örneğin wt, Tex, Denier), böylece sayısal beden doğru şekilde yorumlanabilir.
    quince_variety:
      name: Ayva çeşidi
      description: Ayvanın belirli çeşidini veya türünü tanımlar; çünkü lezzet, aroma
        ve mutfak kullanımına uygunluk çeşitlere göre farklılık gösterebilir.
    quinoa_variety:
      name: Kinoa çeşidi
      description: Kinoanın belirli rengini veya çeşidini belirtir; farklı çeşitler
        tat, doku ve pişirme süresi açısından farklılık gösterebilir.
    quinto_tuning_system:
      name: Quinto akort sistemi
      description: Quinto’nun akort/gerginliğinin nasıl ayarlandığını belirtir.
    race_car_class:
      name: Yarış arabası sınıfı
      description: Aracın üretildiği yarış sınıfını/kategorisini belirtir (kurallar
        seti/homologasyon grubu).
    racing_balaclava_face_opening_style:
      name: Yarış balaklavası yüz açıklığı stili
      description: Balaklavanın yüz açıklığı konfigürasyonunu belirtir; bu durum kask
        uyumu, sızdırmazlık ve konforu etkiler.
    racing_balaclava_neck_coverage_length:
      name: Yarış tipi balaklava boyun kapatma uzunluğu
      description: Boyun eteğinin/örtüsünün, tulum veya boyun desteği içine sokulacak
        şekilde tasarlanan uzunluğunu belirtir.
    racing_balaclava_ventilation_zones:
      name: Yarış balaklavası havalandırma bölgeleri
      description: Kask altında hava akışını artırmak için tasarlanmış nefes alabilen/fileli
        veya havalandırmalı bölgelerin konumunu belirtir.
    racing_chest_guard_intended_use:
      name: Yarış göğüs koruyucusunun kullanım amacı
      description: Göğüs koruyucunun tasarlandığı temel motor sporları disiplini veya
        kullanım bağlamını belirtir.
    racing_chest_guard_size_type:
      name: Yarış göğüs koruyucu beden tipi
      description: Ürünün gençlere, yetişkinlere uygun mu yoksa evrensel/ayarlanabilir
        mi olduğunu gösterir.
    racing_glove_certification_standard:
      name: Yarış eldiveni sertifikasyon standardı
      description: Yarış eldivenlerinin uyduğu güvenlik sertifikasını/standardını
        (örneğin FIA, SFI, CE) ve varsa seviye/derecesini belirtir.
    racing_goggles_lens_system:
      name: Yarış gözlüğü lens sistemi
      description: Gözlüklerin desteklediği lens değiştirme/yırtılma hazırlık sistemini
        belirtir.
    racing_helmet_certification_standard:
      name: Yarış kaskı sertifikasyon standardı
      description: Yarış kaskının sahip olduğu güvenlik sertifikaları.
    racing_kart_brake_type:
      name: Yarış kartı fren tipi
      description: Kartın üzerine takılan birincil fren sistemi tipi.
    racing_kart_class:
      name: Yarış kartı sınıfı
      description: Kartın üretildiği yarış sınıfı veya kurallar bütünü.
    racing_kart_frame_material:
      name: Yarış kartı şasi malzemesi
      description: Kartın ana şasi malzemesi.
    racing_kart_seat_size:
      name: Yarış kartı koltuğu beden ölçüsü
      description: Kart koltuğunun montaj için kullanılan beden ölçüsünü belirtir.
    racing_neck_support_style:
      name: Yarış boyun desteği stili
      description: Yarış boyun desteğinin yapısal stilini ve sürücünün gövdesi/kaskıyla
        nasıl uyum sağladığını belirtir.
    racing_suit_certification_standard:
      name: Yarış tulumu sertifikasyon standardı
      description: Tulumun karşıladığı yarış güvenliği sertifikasını/homologasyonunu
        belirtir (örneğin FIA veya SFI).
    racing_suit_cuff_design:
      name: Yarış tulumu manşet tasarımı
      description: Eldiven veya botlarla uyum sağlayan ve sızdırmazlığı artıran bilek/ayak
        bileği manşet türünü belirtir.
    racing_suit_size_system:
      name: Yarış tulumu beden sistemi
      description: Tulum için kullanılan beden sistemi (örneğin Alfabetik S-XXL, Sayısal
        AB/ABD, Genç).
    racing_truck_discipline:
      name: Yarış kamyonu disiplini
      description: Kamyonun hangi ana yarış disiplininde/formatında yarışmak üzere
        tasarlandığını belirtir.
    rack_side_configuration:
      name: Raf yan konfigürasyonu
      description: Rafın paspasları tek tarafta mı yoksa çift tarafta mı depoladığını
        belirtir; bu durum alan verimliliğini ve erişimi etkiler.
    rack_system_configuration:
      name: raf sistemi konfigürasyonu
      description: Davul raf sisteminin genel düzenini/şeklini tanımlar.
    racket_dampener_type:
      name: Raket titreşim önleyici tipi
      description: Raket titreşim sönümleyicisinin montaj mekanizmasını veya işlevsel
        stilini belirtir.
    racket_grip_size:
      name: Raket kavrama boyutu
      description: Raketin ele tam oturmasını ve rahatlığını sağlamak için, raketin
        çevre uzunluğuna dayalı beden sınıflandırmasını (örneğin, G1–G6) belirtir.
    racket_sport_shoe_court_surface:
      name: Raket spor ayakkabısı kort yüzeyi
      description: Ayakkabının tasarlandığı veya optimize edildiği tenis kortu yüzeyini
        belirtir ve oyuncuların tipik oyun yüzeylerine uygun dış taban deseni ve kauçuk
        bileşimine sahip ayakkabı seçmelerine yardımcı olur.
    racket_string_pattern:
      name: Raket tel dizilim deseni
      description: Tel yatağındaki ana ve çapraz tel sayısını belirtir (örneğin 16
        × 18); bu durum kontrolü, spin’i ve dayanıklılığı etkiler.
    racket_stringing_status:
      name: Raket tellerinin geriliş durumu
      description: Raketin telleri takılı, telleri takılmamış veya önceden tellenmiş
        olarak satıldığını gösterir.
    racket_weight_class:
      name: Raket ağırlık sınıfı
      description: Badmintonun standart "U" ağırlık kategorilerini beirterek, oyuncuların
        tercih ettikleri ağırlık aralığında raket seçmelerine olanak tanır.
    racquet_toy_set_equipment_included:
      name: Dahil olan raket oyuncak seti ekipmanları
      description: Oyuncağın veya setin içinde hangi ürünlerin bulunduğunu listeler
        (örneğin, file, toplar, raketler).
    racquetball_squash_training_aid_type:
      name: Racquetball ve squash antrenman yardımcısı türü
      description: Alıcının ihtiyaç duyduğu ürünü hızlıca bulabilmesi için, eğitim
        materyali veya aksesuarının türünü sınıflandırır.
    radiator_cap_gasket_material:
      name: Radyatör kapağı conta malzemesi
      description: Radyatör kapağında kullanılan sızdırmazlık contasının/contalarının
        malzemesi.
    radiator_cap_pressure_relief_style:
      name: Radyatör kapağı basınç tahliye tipi
      description: Radyatör kapağının basınç tahliye/havalandırma mekanizmasını belirtir;
        bu durum kullanım ve güvenliği etkileyebilir.
    radiator_expansion_tank_cap_application:
      name: Radyatör/genleşme tankı kapağı uygulaması
      description: Kapağın radyatör doldurma ağzı için mi yoksa genleşme/taşma deposu
        için mi tasarlandığını belirtir.
    radiator_fan_control_type:
      name: Radyatör fanı kontrol tipi
      description: Radyatör fanının nasıl kontrol edildiğini belirtir.
    radiator_fan_mounting_pattern:
      name: Radyatör fanı montaj deseni
      description: Fanın veya fan tertibatının takılması için kullanılan montaj stilini/şeklini
        belirtir.
    radiator_fan_type:
      name: Radyatör fanı tipi
      description: Radyatör fan tertibatının fonksiyonel tipini/konfigürasyonunu belirtir.
    radiator_hose_end_type:
      name: Radyatör hortumu uç tipi
      description: Radyatör hortumunun radyatör/motor bağlantı noktalarıyla birleşmesinde
        kullanılan birincil bağlantı/sızdırmazlık stilini belirtir.
    radiator_hose_position:
      name: Radyatör hortumunun konumu
      description: Soğutma sistemindeki radyatör hortumunun işlevsel konumu/tipi.
    radiator_hose_shape:
      name: Radyatör hortumu şekli
      description: Montaj, yönlendirme ve uyum için kullanılan genel hortum geometrisi/şekil
        faktörü.
    radiator_overflow_tank_level_sensor_provision:
      name: Radyatör taşma tankı seviye sensörü tertibatı
      description: Tankın soğutma sıvısı seviye sensörü içerip içermediğini veya sensör
        desteği sunup sunmadığını belirtir.
    radiator_overflow_tank_shape:
      name: Radyatör taşma tankı şekli
      description: Taşma tankı gövdesinin genel form faktörünü belirtir.
    radish_variety:
      name: Turp çeşidi
      description: Alıcının belirli lezzet, renk veya boyut özelliklerini seçebilmesi
        için turp çeşidini veya türünü belirtir (örneğin, Daikon, Karpuz, Fransız
        Kahvaltısı).
    radius_of_hollow:
      name: Oyuğun yarıçapı
      description: Bileme makinesinin oluşturduğu bıçak oyuk profilini belirtir; genellikle
        standart ölçüler veya düz form olarak ifade edilir.
    rail_coverage_configuration:
      name: Ray kapsama konfigürasyonu
      description: Örtü setinin beşiğin hangi bölümlerini kapladığını belirtir; tek
        panel mi yoksa çevre seti mi olduğunu açıklar.
    rail_mount_standard:
      name: Ray montajı standardı
      description: Bir aksesuarın (örneğin, nişangah, el feneri) havalı tüfeğe takılması
        için kullanılan ray veya montaj arayüzü standardını tanımlar.
    rail_side:
      name: Ray tarafı
      description: Değişim rayının sol, sağ veya çift olarak sunulup sunulmadığını
        belirtir.
    rail_style:
      name: Ray stili
      description: Rayın genel tasarımını veya konfigürasyonunu (örneğin, A-Frame,
        gökkuşağı, kıvrımlı) kategorize eder; bu da yapılabilecek hareketlerin ve
        gerekli alanın belirlenmesinde rol oynar.
    rail_system:
      name: Ray sistemi
      description: Silah üzerindeki aksesuar montaj arayüzünü belirtir (örneğin Picatinny,
        M-LOK).
    rain_sensor_technology:
      name: Yağmur sensörü teknolojisi
      description: Ön camdaki suyu tespit etmek için kullanılan algılama prensibi.
    rain_suit_configuration:
      name: Yağmurluk konfigürasyonu
      description: Ürünün tek parça tulum, çok parçalı set veya başka bir konfigürasyon
        olup olmadığını belirtir.
    rainstick_construction_type:
      name: Rainstick yapım türü
      description: Rainstick’in nasıl üretildiğini belirtir (geleneksel kaktüs/ahşap
        tüp veya modern alternatifler).
    rainstick_fill_material:
      name: Rainstick dolgu malzemesi
      description: İçeride kullanılan dolgu malzemesini belirtir; bu dolgu, yağmur
        benzeri sesi oluşturur (örneğin tohum, boncuk).
    rainstick_playing_technique:
      name: Rainstick çalma tekniği
      description: Rainstick ile istenen etkiyi elde etmek için önerilen çalma veya
        kullanım tekniğini belirtir.
    rainstick_sound_character:
      name: Rainstick ses karakteri
      description: Rainstick’in ürettiği genel ses karakterini tanımlar.
    raising_method:
      name: Yetiştirme yöntemi
      description: Hayvanların işlenmeden önce nasıl yetiştirildiğini ve besiye alındığını
        açıklar (örneğin, otla beslenmiş, mera ortamında yetiştirilmiş, tahılla beslenmiş).
    rally_competition_class:
      name: Ralli yarış sınıfı
      description: Ralli aracının hangi yetkili kuruluş veya kurallar sınıfına göre
        üretildiğini belirtir (biliniyorsa).
    rally_surface_setup:
      name: Ralli yüzey ayarı
      description: Ralli aracının ayarlandığı/optimize edildiği ana yüzeyi veya arazi
        türünü belirtir.
    ramp_surface_texture:
      name: Rampa yüzey dokusu
      description: Rampanın sürüş yüzeyinin kaplama veya tutuş seviyesini tanımlar.
    ratchet_mounting_style:
      name: Mandallı montaj stili
      description: Müzik mandalının çalma sırasında nasıl tutulduğunu veya monte edildiğini
        belirtir.
    rattle_element_material:
      name: Çıngırak elemanı malzemesi
      description: Vızıltı/çıngırtı sesini çıkaran tıkırtı elemanlarının (örneğin
        dişler/ziller/boncuklar) malzemesi.
    rattle_type:
      name: Çıngırak tipi
      description: Yemde dahili bir çıngırak veya ses haznesi olup olmadığını ve varsa
        kullanılan çıngırak türünü belirtir.
    rc_airship_lifting_gas_type:
      name: RC hava gemisi kaldırma gazı tipi
      description: Hava gemisinin/zeplin gövdesinin hangi gazla doldurulacağını belirtir
        (varsa).
    rc_helicopter_control_frequency:
      name: RC helikopter kontrol frekansı
      description: Parazit direncini ve uyumluluğu etkileyen kumanda ile helikopter
        arasında kullanılan radyo frekans bandını belirtir (örneğin 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: RC helikopter stabilizasyon özellikleri
      description: Uçuşu kolaylaştıran veya özellik katan denge/kontrol destek özelliklerini
        listeler.
    rc_motorcycle_controller_type:
      name: RC motosiklet kumanda tipi
      description: Dahil olan kumandanın form faktörünü belirtir.
    rc_plane_takeoff_launch_method:
      name: RC uçağın kalkış/fırlatma yöntemi
      description: Uçağın tipik olarak nasıl fırlatıldığını/kalkış yaptığını belirtir;
        bu durum kullanım alanını etkiler.
    rc_vehicle_controller_type:
      name: RC araç kumanda tipi
      description: RC aracı kontrol etmek için kullanılan kumanda form faktörünü belirtir.
    rc_vehicle_scale:
      name: RC araç ölçeği
      description: Uzaktan kumandalı aracın ölçek oranını(beden sınıfı) belirtir (örneğin
        1:10, 1:16).
    rc_vehicle_terrain_type:
      name: RC araç arazi tipi
      description: Uzaktan kumandalı araba/kamyonun öncelikle hangi arazi koşullarında
        kullanılmak üzere tasarlandığını gösterir.
    reach_adjustment_type:
      name: Erişim ayar tipi
      description: Vites kolu ile gidon arasındaki mesafenin ayarlanabilir olup olmadığını
        ve ayarlanabilir ise, ayarlamanın aletsiz mi yoksa alet gerektirip gerektirmediğini
        gösterir.
    rear_axle_spacing:
      name: Arka aks aralığı
      description: Kadronun arka kısmının kabul edecek şekilde tasarlandığı dropout/aks
        ölçüsünü belirtir; bu ölçü tekerlek uyumluluğunu etkiler.
    rear_axle_standard:
      name: Arka aks standardı
      description: Arka tekerleğin kullandığı aks arayüzünü/formatını belirtir (örneğin
        hızlı bırakma, farklı thru-axle ölçüleri).
    rear_axle_type:
      name: Arka aks tipi
      description: Arka tekerleğin kadroya sabitlenmesinde kullanılan bağlantı sistemini
        ve aks çapını belirtir.
    rear_coverage:
      name: Arka kapsama
      description: Bikini altının kalçaların ne kadarını örttüğünü belirtir (örneğin
        az örtücü, tam örtücü).
    rear_opening_type:
      name: Arka açılma tipi
      description: Tuvalet kullanımını kolaylaştıran arka erişim/“arka kapak” tasarımını
        belirtir (örneğin drop-seat veya tam arka fermuar).
    rear_seat_configuration:
      name: Arka koltuk düzeni
      description: Arka koltuk tertibatının konfigürasyonunu belirtir; bu bilgi montaj
        ve iç yerleşim seçimini destekler.
    rear_view_mirror_ornament_attachment_type:
      name: Arka görüş aynası süsü bağlantı tipi
      description: Süsün dikiz aynası gövdesine veya muhafazasına nasıl takılacağını
        belirtir (örneğin, halka, klips, kanca).
    rearview_mirror_mount_attachment_type:
      name: Dikiz aynası montaj bağlantı tipi
      description: Montaj aparatının dikiz aynası gövdesine veya sapına nasıl sabitlendiğini
        belirtir (kelepçe, klips, kayış, yapışkan ped vb.).
    rebound_board_face_type:
      name: Geri tepme tahtası yüzey tipi
      description: Topun geri tepme davranışını belirleyen yüzey konfigürasyonunu
        tanımlar (düz, açılı, çok yüzeyli vb.).
    rebound_level:
      name: Sekme seviyesi
      description: Duvar topunun çarpma sonrasında ne kadar geri sektiğini belirtir;
        sekmeyen veya orta seviye sekmeli modeller arasında seçim yapılmasını sağlar.
    rebound_surface_configuration:
      name: Geri tepme yüzeyi konfigürasyonu
      description: Sekme yüzeylerinin düzenini ve sekmenin öngörülebilirliğini belirtir
        (tek, çift veya çok taraflı; öngörülebilir veya rastgele).
    rebounder_design:
      name: Geri tepme tahtası tasarımı
      description: Ürünün yapısal stilini veya geri tepme yüzeyi konfigürasyonunu
        tanımlar.
    rebounder_design_type:
      name: Geri tepme tahtası tasarım tipi
      description: Antrenman aletinin temel geri tepme mekanizmasını veya yapım tarzını
        belirtir (örneğin elastik kordon sistemi, çerçeveli ağ, pop-up hedef).
    rebounder_sides:
      name: Geri tepme yüzeyleri
      description: Topu geri gönderebilen oyuncunun tek taraftan mı yoksa her iki
        taraftan mı topu geri gönderebileceğini gösterir.
    rebounding_mechanism_type:
      name: Sekme mekanizması tipi
      description: Disk veya topun geri dönüşünde kullanılan teknolojiyi belirtir
        (örneğin kauçuk tampon, elastik kordon).
    recipient_relationship:
      name: Alıcı ilişkisi
      description: Tebrik kartının kime gönderileceği (örneğin, Anne, Baba, Arkadaş)
        ve hangi yaş grubuna ait olduğu.
    recliner_control_type:
      name: Yatar koltuk kontrol tipi
      description: Yatırma mekanizmasının nasıl çalıştırıldığını belirtir (örneğin,
        manuel kol, elektrikli düğme paneli, uzaktan kumanda).
    recliner_motion_type:
      name: Yatar koltuk hareket tipi
      description: Yatar koltuğun temel hareket özelliğini belirtir (sallanır, kayar,
        döner, duvara sıfır, lift vb.).
    reclining_mechanism:
      name: Yatırma mekanizması
      description: Kanepenin yatırma fonksiyonunu çalıştıran mekanizmayı belirtir.
    recommended_candle_format:
      name: Önerilen mum formatı
      description: Bu kendinden yapışkanlı fitil pedlerinin hangi mum formatları için
        önerildiğini belirtir.
    recommended_container_type:
      name: Önerilen konteyner türü
      description: Jel mumlar için önerilen veya güvenli kap malzemelerini belirtir.
    recommended_fabric_type:
      name: Önerilen kumaş türü
      description: Bu dikiş kalıbıyla en iyi sonucu veren önerilen kumaşları belirtir.
    recommended_fabric_weight:
      name: Önerilen kumaş ağırlığı
      description: Kalıp için önerilen kumaş ağırlık kategorisini belirtir.
    recommended_food_pairing:
      name: Önerilen yemek eşleşmesi
      description: Sosun en uygun olduğu ana protein veya yemekleri belirtir (tavuk,
        sığır eti, balık, sebze vb.).
    recommended_lane_condition:
      name: Önerilen şerit durumu
      description: Topun tasarlandığı yağ deseni veya pist koşulunu belirtir.
    recommended_motor_impulse_class:
      name: Önerilen motor toplam itki sınıfı
      description: Güvenli ve optimum uçuş için önerilen model roket motoru toplam
        itki sınıfını belirtir.
    recommended_reading_level:
      name: Önerilen okuma seviyesi
      description: Ürünün önerilen okuma aşamasını/becerisini gösterir ve alıcının
        ürünü çocuğun mevcut okuma gelişimine uygun hale getirmesine yardımcı olur.
    recommended_sleep_position:
      name: Önerilen uyku pozisyonu
      description: Yatağın hangi uyku pozisyonlarını rahatça destekleyecek şekilde
        tasarlandığını belirtir (örneğin, yan veya sırt üstü uyuyanlar için).
    recommended_storage:
      name: Önerilen saklama koşulları
      description: Ürünün tazeliğini korumak için nasıl saklanması gerektiğini gösterir.
    recommended_surfaces:
      name: Önerilen yüzeyler
      description: Yapıştırıcının kullanılabileceği yüzey/malzeme kategorilerini belirtir
        (örneğin yalnızca kağıt veya çok yüzeyli kullanım).
    recommended_use_case:
      name: Önerilen kullanım alanı
      description: Sızdırmazlık ürününün temel kullanım senaryosunu belirtir (geçici/acil
        veya uzun vadeli onarım).
    recommended_use_location:
      name: Önerilen kullanım konumu
      description: Tahterevallinin tasarlandığı kullanım ortamını belirtir (ev arka
        bahçesi, ticari oyun alanı vb.).
    recommended_vehicle_surfaces:
      name: Önerilen araç yüzeyleri
      description: Fırçanın güvenle kullanılabileceği araç yüzeylerini belirtir (vernik,
        mat boya, vinil kaplama, cam, jant vb.).
    recorder_accessories_included:
      name: Dahil olan blok flüt aksesuarları
      description: Bu liste, harika bas kayıt cihazıyla birlikte gelen aksesuarları
        içermektedir.
    recorder_bore_design:
      name: Kaydedici delik tasarımı
      description: Kaydedici gövdesinin iç delik profili tasarımı.
    recorder_bore_type:
      name: Blok flüt iç kanal tipi
      description: Kayıt cihazının delik tipini belirtir.
    recorder_case_shell_type:
      name: Koli kabuklu kaydedici türü
      description: Koli balığının yapısal rijitliğini tanımlar.
    recorder_finish:
      name: Kayıt cihazının bitişi
      description: Blok flüt gövdesinin yüzey işlemesi/uygulaması (özellikle ahşap
        alto blok flütler için önemlidir).
    recorder_hole_type:
      name: Kaydedici delik tipi
      description: Ses deliklerinin tek (çift deliksiz) mi yoksa kromatik parmak pozisyonlarını
        iyileştirmek için çift delikli mi olduğu.
    recorder_joint_configuration:
      name: Kaydedici bağlantı konfigürasyonu
      description: Kaydedicinin kaç gövde bölümüne sahip olduğunu açıklar; bu da taşınabilirliği,
        temizliği ve parça değişimini etkiler.
    recorder_joint_style:
      name: Kaydedici eklem stili
      description: Varsa, blokflüt bölümleri arasındaki ortak/ilişki stili.
    recorder_keywork:
      name: Kaydedici tuş takımı
      description: Kaydedicinin, tenor/bas/büyük blokflütlerde tipik olan düşük notalar
        için tuş (metal/plastik mekanizma) içerip içermediğini gösterir.
    recorder_mouthpiece_type:
      name: Blok flüt ağızlık tipi
      description: Blok flütün ağızlık/başlık kısmının entegre (tek parça) mi yoksa
        çıkarılabilir/değiştirilebilir mi olduğunu açıklar.
    recorder_pitch_standard_a4:
      name: Blokflüt perde standardı (A4)
      description: Kaydedicinin hangi perde referansına göre üretildiğini gösterir
        (örneğin, A=440 Hz modern perdeye karşılık A=415 Hz barok perde).
    recorder_thumb_hole_type:
      name: Blok flüt başparmak deliği tipi
      description: Kaydedicinin tek başparmak deliği mi yoksa çift başparmak deliği
        mi tasarımına sahip olduğunu belirtir.
    recreational_vehicle_holding_tank_type:
      name: Karavan tipi atık su deposu
      description: Karavanın hangi atık su depolarına sahip olduğunu gösterir.
    recreational_vehicle_leveling_system:
      name: Karavan dengeleme sistemi
      description: Kurulan tesviye/stabilizasyon sisteminin türü.
    recycled_material_content:
      name: Geri dönüştürülmüş malzeme içeriği
      description: Giysinin geri dönüştürülmüş elyaf veya ipliklerden üretilen oranını
        gösterir.
    reed_dent_material:
      name: Kamış diş malzemesi
      description: İpliklerin dayanıklılığını ve aşınmasını etkileyen, çözgü uçlarını
        ayıran kamış dişlerinin/çıkıntılarının malzemesi.
    reed_type:
      name: Kamış tipi
      description: Gayda borusu ve drone'larında kullanılan kamış yapım tipini belirtir.
    reeds_included:
      name: Dahil olan kamışlar
      description: Büyük İskoç gaydası setine hangi kamışların (üfleme borusu ve/veya
        drone borusu) dahil olduğunu ve bunların kamış mı yoksa sentetik mi olduğunu
        belirtir.
    reefing_method:
      name: Yelken küçültme yöntemi
      description: Denizdeyken yelkeni küçültmek veya toplamak için kullanılan mekanizmayı
        (varsa) belirtir.
    reel_profile:
      name: Makara gövde profili
      description: Olta makarasının gövdesinin yapısal stilini/profilini sınıflandırır.
    reel_seat_material:
      name: Makara yatağı malzemesi
      description: Makara yuvasının yapım malzemesini belirtir; bu malzeme ağırlığı,
        hassasiyeti ve korozyon direncini etkiler.
    reel_seat_type:
      name: Makara yuvası tipi
      description: Olta makarasını oltaya sabitleyen kilitleme mekanizmasının stilini
        belirtir.
    reel_size_class:
      name: Makara boyut sınıfı
      description: Üretici tarafından belirlenen beden derecesini (örneğin 1000, 3000,
        5000) belirtir; bu derece makara kapasitesini ve genel yapı sınıfını gösterir.
    referee_wallet_accessories_included:
      name: Hakem cüzdanı aksesuarları dahildir
      description: Hakem cüzdanıyla birlikte verilen ek ürünleri (kırmızı/sarı kartlar,
        skor kağıtları, yazı gereçleri vb.) listeler; böylece ürünün tam set olarak
        satılıp satılmadığı anlaşılır.
    refinement_level:
      name: Rafine edilme seviyesi
      description: Yağın rafine edilme derecesini belirtir; bu durum tadı, rengi,
        besin değeri ve dumanlanma noktasını etkiler.
    reflective_finish:
      name: Yansıtıcı yüzey kaplaması
      description: Disko topunun yansıtıcı yüzey kaplamasını belirtir (örneğin ayna
        parçalı veya holografik/yanardöner efektli).
    reflective_or_glow_effect:
      name: Yansıtıcı veya karanlıkta parlayan etki
      description: Anten topunun yansıtıcı malzeme, karanlıkta parlayan yapı veya
        LED/ışıklı özellik gibi görünürlük artırıcı efektlere sahip olup olmadığını
        belirtir.
    reflective_tape_pattern:
      name: Yansıtıcı bant deseni
      description: Giysi üzerindeki yansıtıcı bantların görünürlük gereksinimlerini
        karşılayacak şekilde yerleşim düzenini belirtir.
    regulation_standard:
      name: Resmi standart
      description: Ağın karşıladığı resmi standartları veya yetkili kurum ölçü/sertifikasyon
        gerekliliklerini belirtir.
    regulator_diaphragm_material:
      name: Regülatör diyafram malzemesi
      description: Diyafram malzemesini belirtir; bu malzeme yakıt/etanol uyumluluğunu
        (örneğin E85) ve dayanıklılığı etkiler.
    regulator_port_thread_standard:
      name: Regülatör port diş standardı
      description: Regülatör gövdesindeki giriş/çıkış/geri dönüş portlarında kullanılan
        diş/bağlantı standardını belirtir.
    rein_features:
      name: Dizgin özellikleri
      description: Dizginlerde bulunan özel işlevsel veya güvenlik özelliklerini belirtir.
    rein_style:
      name: Dizgin stili
      description: Dizginlerin yapısal tasarımını veya konfigürasyonunu belirtir;
        böylece biniciler disiplinlerine ve kişisel tercihlerine uygun türü seçebilir.
    reinforced_areas:
      name: Güçlendirilmiş alanlar
      description: Giysinin aşınmaya karşı dayanıklılık için güçlendirilmiş bölümlerini
        belirtir.
    reinforcement_type:
      name: Takviye tipi
      description: Radyatör hortumunda mukavemet ve sıcaklık/basınç direnci sağlamak
        için kullanılan yapısal takviye türünü belirtir.
    release_activation_method:
      name: Tetikleme aktivasyon yöntemi
      description: Okçuluk tetik aparatının okçu tarafından nasıl aktive edildiğini
        belirtir.
    release_bearing_material:
      name: Debriyaj yatağı malzemesi
      description: Yatak/yüzey bileşenlerinin ana malzemesini belirtir (üretici tarafından
        belirtilmişse).
    release_jaw_style:
      name: Tetik çenesi stili
      description: Tetik başlığındaki çene veya kanca tasarımını belirtir.
    release_strap_type:
      name: Tetik kayışı tipi
      description: Okçuluk tetik aparatı ile birlikte verilen kayış veya bağlantı
        sistemini belirtir.
    remote_control_airship_envelope_material:
      name: Uzaktan kumandalı hava gemisi zarf malzemesi
      description: Zeplin/hava gemisi gaz torbasının ana malzemesini belirtir.
    remote_control_motorcycle_scale:
      name: Uzaktan kumandalı motosiklet ölçeği
      description: RC motosikletin gerçek motosiklete göre ölçek oranını belirtir.
    remote_control_motorcycle_terrain_suitability:
      name: Uzaktan kumandalı motosiklet arazi uygunluğu
      description: RC motosikletin tasarlandığı temel arazi türünü belirtir.
    remote_control_motorcycle_water_resistance:
      name: Uzaktan kumandalı motosiklet, suya dayanıklı
      description: RC motosiklet elektroniğinin suya karşı koruma seviyesini belirtir.
    remote_control_plane_kit_completion_level:
      name: Uzaktan kumandalı uçak set tamlık seviyesi
      description: Setin içeriğini ve ne kadar eksiksiz olduğunu belirtir (örneğin
        uçuşa hazır veya ayrı verici/alıcı/pil gerektirir).
    remote_control_plane_landing_gear_type:
      name: Uzaktan kumandalı uçak iniş takımı tipi
      description: İniş takımı konfigürasyonunu belirtir; bu durum dayanıklılığı ve
        uygun kalkış/iniş yüzeylerini etkiler.
    remote_control_plane_power_type:
      name: Uzaktan kumandalı uçak güç tipi
      description: Uçağın nasıl güçlendirildiğini veya tahrik edildiğini belirtir
        (elektrikli, glow, benzinli, nitro vb.); bu da bakım, gürültü ve uçurulabileceği
        yerleri etkiler.
    remote_control_watercraft_features:
      name: Uzaktan kumandalı deniz aracı özellikleri
      description: Uzaktan kumandalı su araçlarına özgü temel özellikleri belirtir.
    remote_control_watercraft_propulsion_drive_type:
      name: Uzaktan kumandalı deniz aracı tahrik/sürüş tipi
      description: Uzaktan kumandalı deniz aracının suda nasıl sürüleceğini belirtir.
    remote_control_watercraft_water_environment:
      name: Uzaktan kumandalı deniz aracı su ortamı
      description: RC su aracının en iyi performansı gösterdiği su koşullarını belirtir.
    remote_keyless_system_programming_method:
      name: Uzaktan anahtarsız sistem programlama yöntemi
      description: Uzaktan kumandanın/sistemin araca nasıl programlandığını veya eşleştirildiğini
        belirtir (örneğin araç üzerindeki prosedürle veya profesyonel cihazla).
    repair_compound_type:
      name: Tamir bileşiği türü
      description: Dahil edilen sarf tamir malzemesinin türünü/formülasyonunu belirtir
        (örneğin gövde dolgu macunu, ön cam reçinesi, lastik tamir macunu/sızdırmazlık
        maddesi).
    repair_kit_components:
      name: Tamir kit bileşenleri
      description: Tamir kitinde yer alan belirli ürünleri listeler; böylece alıcı
        içeriği anlayabilir ve paketleri karşılaştırabilir.
    repair_method:
      name: Onarım yöntemi
      description: Kitin kullandığı temel onarım yöntemini belirtir (örneğin yapıştırmalı
        yama veya valf değişimi).
    replacement_part_purpose:
      name: Yedek parça kullanım amacı
      description: Ürünün OEM yedek parça, performans/yükseltme parçası veya ek aksesuar
        olup olmadığını belirtir.
    replacement_part_type:
      name: Yedek parça türü
      description: Eliptik kondisyon aleti parçasının işlevsel kategorisini belirtir;
        böylece alıcı ihtiyaç duyduğu bileşeni filtreleyebilir.
    replacement_parts_availability:
      name: Yedek parça stok durumu
      description: İplik geçirme aparatı için değiştirilebilir/sarf parçaların (örneğin
        yedek kanca/tel) desteklenip desteklenmediğini belirtir.
    replica_gun_action_type:
      name: Replika silah mekanizması tipi
      description: Replika ateşli silahın (gösterilen) çalışma/hareket tipini belirtir;
        örneğin, sürgülü veya kollu mekanizmalı.
    replica_gun_firing_mechanism:
      name: Replika silah ateşleme mekanizması
      description: Replikanın ateşleme işlevini (öldürücü olmayan şekilde) simüle
        edip etmediğini ve nasıl simüle ettiğini belirtir (örneğin kapsül ateşlemeli
        veya ateşleme özelliği olmayan).
    replica_gun_moving_parts:
      name: Replika silahın hareketli parçaları
      description: Replikada hangi parçaların işlevsel veya hareketli olduğunu belirtir.
    reservoir_orientation:
      name: Rezervuar yönü
      description: Çanta içindeki su haznesinin amaçlanan yönünü veya profilini belirtir.
    reservoir_type:
      name: Rezervuar tipi
      description: Debriyaj ana silindiri için rezervuar konfigürasyon tipini belirtir.
    resin_suitability:
      name: Reçine uygunluğu
      description: Hentbol topunun reçine (tutkal) ile kullanım için mi yoksa reçinesiz
        kullanım için mi tasarlandığını belirtir.
    resistance_adjustability:
      name: Direnç ayarlanabilirliği
      description: Nefes alma direncinin kullanıcı tarafından ayarlanabilir olup olmadığını
        belirtir.
    resistance_band_design:
      name: Direnç bandı tasarımı
      description: Direnç bandının fiziksel şeklini veya stilini (örneğin, halka,
        kıvrımlı tüp, sekiz şekli) tanımlayarak, alıcının egzersiz rutini için doğru
        tasarımı seçmesine yardımcı olur.
    resistance_loading_type:
      name: Direnç yükleme tipi
      description: Smith makinesine direncin/ağırlığın nasıl sağlandığını veya yüklendiğini
        gösterir (örneğin, plaka yüklü veya seçmeli ağırlık yığını).
    response_fields_included:
      name: Dahil olan yanıt alanları
      description: Yanıt kartında bulunan standart yanıt alanlarını/seçeneklerini
        belirtir (örneğin kabul/red, yemek tercihi).
    restoration_status:
      name: Restorasyon durumu
      description: Aracın orijinal, restore edilmiş, restomod yapılmış veya proje
        durumunda olup olmadığını belirtir.
    rhinestone_base_color_family:
      name: Yapay elmas taban renk ailesi
      description: Yapay elmas tabanının renk ailesini belirtir (örneğin şeffaf/kristal,
        altın/sarı, mavi).
    rhinestone_facet_style:
      name: Yapay elmas faset stili
      description: Yapay elmasın parlaklığını ve görünümünü etkileyen yüzey/faset
        desenini belirtir (örneğin Xilion rose, brilliant kesim, fasetli veya düz).
    rhinestone_hole_reinforcement_material:
      name: Yapay elmas delik güçlendirme malzemesi
      description: Delik çevresinde kullanılan malzemeyi belirtir (örneğin metal halka,
        kalıplanmış plastik); bu malzeme dikiş sırasında dayanıklılığı etkiler.
    rhinestone_setting_type:
      name: Yapay elmas montaj tipi
      description: Taşın dikim için nasıl monte edildiğini/kenarlık tipini belirtir
        (örneğin tırnaklı, çerçeveli, kenarlı montaj).
    rhubarb_product_cut_type:
      name: Ravent ürünü kesim tipi
      description: Ravent ürününün fiziksel hazırlanış veya kesim şeklini belirtir.
    ribbon_construction:
      name: Kurdele yapısı
      description: Grogren kurdelenin telli veya elastik gibi yapısal özelliklerini
        belirtir; bu özellikler kullanım amacını etkiler.
    ribbon_packaging_type:
      name: Kurdele ambalaj türü
      description: Kurdelelerin nasıl sunulduğunu/satıldığını belirtir.
    ribbon_pattern_style:
      name: Kurdele deseni stili
      description: Grogren kurdelelerde kullanılan desen uygulama yöntemini sınıflandırır.
    ribbon_sheen_level:
      name: Kurdele parlaklık seviyesi
      description: Saten kurdelenin yüzey parlaklığını/cilasını belirtir.
    ribbon_style:
      name: Kurdele stili
      description: Kurdelenin görsel desenini/stilini belirtir (örneğin düz, çizgili,
        üç renkli).
    ribbon_trim_backing_type:
      name: Kurdele/şerit arka destek tipi
      description: Kurdele/şeridin arkasında bir destek olup olmadığını ve ne tür
        bir destek olduğunu (kolay uygulama için) belirtir.
    ribbon_trim_edge_finish:
      name: Kurdele/şerit kenar bitişi
      description: Kurdele/şeridin kenar yapısını veya bitişini belirtir; bu durum
        yıpranma davranışını ve kullanım amacını etkiler.
    ric_rac_wave_size:
      name: Ric-rac dalga boyutu
      description: Ric-rac’ın dalga genliğini/ölçeğini (zikzakların büyüklüğünü) belirtir.
    rice_grain_length:
      name: Pirinç tane uzunluğu
      description: Pirinç ürünlerini tane uzunluğuna göre kısa, orta veya uzun taneli
        olarak sınıflandırır; bu da pişirme özelliklerini ve mutfak kullanımını etkiler.
    rice_processing_method:
      name: Pirinç işleme yöntemi
      description: Pirincin nasıl işlendiğini veya hazırlandığını (örneğin, ön haşlama,
        filizlendirme, pul haline getirme) açıklar; bu, pişirme süresini, besin değerini
        ve kullanımını Impact .
    rice_variety:
      name: Pirinç çeşidi
      description: Pirincin belirli çeşidini veya kültivarını belirterek, alıcının
        tercih ettiği lezzet, aroma, doku ve kullanım amacına uygun pirinç tanelerini
        seçmesine olanak tanır.
    riding_toy_features:
      name: Binilebilir oyuncak özellikleri
      description: Binilebilir oyuncaklara özgü yaygın işlevsel veya güvenlik özelliklerini
        belirtir.
    rifle_action_type:
      name: Tüfek mekanizması tipi
      description: Tüfeğin çalışma mekanizması (nasıl ateş ettiği/mermiyi dışarı attığı),
        tanımlama ve koleksiyoncular için önemlidir.
    rifle_finish:
      name: Tüfek yüzey kaplaması
      description: Metal aksamın dış yüzeyine uygulanan birincil kaplama veya son
        işlemi belirtir.
    rifle_magazine_type:
      name: Tüfek şarjör tipi
      description: Tüfeğin besleme sistemi tipi.
    rifle_stock_material:
      name: Tüfek dipçiği malzemesi
      description: Tüfek dipçiği/aksesuarları için kullanılan ana malzeme (örneğin,
        ceviz, polimer).
    rim_clamping_method:
      name: Jant sıkıştırma yöntemi
      description: Makinenin montaj ve sökme sırasında tekerleği/jantı nasıl sabitlediğini
        belirtir.
    rim_strip_type:
      name: Jant şeridi tipi
      description: Jant şeridini stiline, yapısına veya kullanım amacına göre sınıflandırır
        (örneğin tubeless jant bandı, koruyucu kauçuk şerit).
    rim_tubeless_compatibility:
      name: Jant tubeless lastik uyumluluğu
      description: Jantın, bandın veya tekerleğin tubeless lastik sistemiyle uyumlu
        olup olmadığını belirtir.
    ripeness_stage:
      name: Olgunluk aşaması
      description: Meyvenin satış anındaki olgunluk seviyesini belirtir (örneğin olgunlaşmamış,
        olgun, yemeye hazır).
    riser_pad_type:
      name: Yükseltici ped tipi
      description: Pedin işlevsel stilini sınıflandırır (standart ara parça, şok emici,
        açılı kama vb.).
    roasted_malt_processing_type:
      name: Kavrulmuş malt işleme türü
      description: Kavrulmuş malt veya kavrulmuş tahıla uygulanan özel işleme yöntemi
        veya çeşidi (örneğin, maltlanmamış kavrulmuş arpa, siyah malt, acılığı giderilmiş
        veya kabuğu soyulmuş çeşit).
    robotic_toy_interaction_mode:
      name: Robot oyuncak etkileşim modu
      description: Robotun oyun sırasında temel etkileşim veya hareket etme biçimini
        belirtir.
    robotic_toy_light_features:
      name: Robot oyuncak ışık özellikleri
      description: Oyuncağın oyun sırasında ışık kullanıp kullanmadığını ve nasıl
        kullandığını belirtir (örneğin LED, projeksiyon).
    robotic_toy_programming_supported:
      name: Robot oyuncak desteklenen programlama türü
      description: Oyuncağın (varsa) hangi programlama yaklaşımını desteklediğini
        belirtir.
    robotic_toy_skill_level:
      name: Robot oyuncak beceri seviyesi
      description: Kullanıcıdan beklenen kullanım/programlama karmaşıklık düzeyini
        belirtir.
    robotic_toy_sound_features:
      name: Robot oyuncak ses özellikleri
      description: Robot oyuncağın ses özelliğini belirtir.
    rod_butt_style:
      name: Olta dipçik stili
      description: Trolling kullanımında kamışın dip kısmının konfigürasyonunu belirtir.
    rod_construction_type:
      name: Kamış yapım tipi
      description: Kamışın parça sayısı ve katlanabilirlik açısından genel yapı stilini
        belirtir.
    rod_guide_material:
      name: Olta kılavuzu malzemesi
      description: Olta kamışının misina kılavuzları veya insertlerinde kullanılan
        malzemeyi belirtir; bu malzeme dayanıklılığı, ağırlığı ve sürtünmeyi etkiler.
    rod_guide_type:
      name: Olta kılavuzu tipi
      description: Kamış üzerinde bulunan misina kılavuzlarının temel stilini belirtir.
    rod_handle_type:
      name: Kamış sap tipi
      description: Olta kamışının tutma yeri konfigürasyonunu belirtir; bu özellik
        konforu ve teknik seçimini etkiler.
    roll_cage_tubing_material:
      name: Devrilme kafesi boru malzemesi
      description: Güvenlik kafesi/devrilme barı için kullanılan boru malzemesini
        veya alaşımı belirtir (örneğin DOM çelik, 4130 krom molibden).
    roller_skate_brake_shape:
      name: Paten freni şekli
      description: Fren başlığının performans veya estetik tercihleri etkileyen geometrik
        şekil/profilini belirtir.
    roller_skate_brake_type:
      name: Paten fren tipi
      description: Patenlerde kullanılan fren sistemini belirtir.
    roller_ski_technique:
      name: Tekerlekli kayak tekniği
      description: Tekerlekli kayakların tasarlandığı kros kayak tekniğini belirtir.
    roller_technology:
      name: Silindir teknolojisi
      description: Titreşim veya ısı gibi masaj performansını artıran entegre teknolojileri
        belirtir.
    rolling_case_wheel_configuration:
      name: Tekerlekli kılıf tekerlek konfigürasyonu
      description: Tekerlekli klavye kılıflarında kullanılan tekerlek düzenini belirtir.
    rolling_paper_format:
      name: Sarma kağıdı formatı
      description: Ürünün fiziksel sunum biçimini belirtir (örneğin düz yaprak, önceden
        sarılmış koni, wrap).
    rolling_paper_gum_type:
      name: Sarma kağıdı yapıştırıcı türü
      description: Kağıt kenarında kullanılan yapıştırıcı türünü belirtir; bu özellik
        tat ve performansı etkileyebilir.
    rolling_paper_size:
      name: Sarma kağıdı boyutu
      description: Sarma kağıdı veya koninin standart boyut sınıflandırmasını belirtir;
        böylece doğru genişlik/uzunluk seçilebilir.
    rolling_stock_type:
      name: Demiryolu araç tipi
      description: Modelin hangi tür raylı araç olduğunu belirtir (lokomotif, yolcu
        vagonu, yük vagonu vb.).
    roof_cargo_net_hook_fastener_style:
      name: Çatı kargo ağı kanca/bağlantı stili
      description: Ağı ankraj noktalarına bağlamak için kullanılan uç bağlantı donanımının
        stilini belirtir (S kanca, karabina, J kanca vb.).
    roof_height_class:
      name: Tavan yükseklik sınıfı
      description: Özellikle karavan/dönüşüm araçlarında kullanılan tavan yüksekliği
        tipini sınıflandırır.
    roof_type:
      name: Çatı tipi
      description: Muhafazanın çatı veya tavan bölümünün konfigürasyonu.
    root_variety:
      name: Kök çeşidi
      description: Kökün belirli çeşidini veya yaygın türünü belirtir (örneğin yaban
        turpu veya gerçek wasabi).
    rope_buoyancy:
      name: Halat yüzdürme özelliği
      description: Halatın su yüzeyinde yüzebilecek şekilde tasarlanıp tasarlanmadığını
        belirtir; bu, binicilerin dolaşma riskini azaltmaya ve halatı geri almayı
        kolaylaştırmaya yardımcı olur.
    rope_construction:
      name: Halat yapısı
      description: Örgü stilinin ötesinde halatın elyaf yapısını belirtir (bükümlü
        veya örgü çekirdek/kılıf, kernmantle tipi vb.).
    rope_material:
      name: Halat malzemesi
      description: Akort ipinin/kordonunun malzemesini tanımlar.
    rope_strand_compatibility:
      name: Halat teli uyumluluğu
      description: Emniyet cihazının hangi halat dizilim konfigürasyonlarını desteklediğini
        gösterir (tekli, yarım/çiftli, ikili veya bunların kombinasyonları).
    rope_stretch_type:
      name: Halat germe tipi
      description: Halatın esneme özelliklerini tanımlar ve esnemeyen, az esneyen,
        standart veya bungee tipi olmak üzere farklı çeşitlerini belirtir.
    rose_bloom_stage:
      name: Gül açma aşaması
      description: Güllerin teslimat/varış anındaki açılma derecesini (tomurcuktan
        tamamen açılmış haline kadar) gösterir.
    rose_grade:
      name: Gül sınıfı
      description: Kesme güllerin ticari kalite derecesini belirtir.
    rosette_center_type:
      name: Rozet merkez tipi
      description: Rozetin ön yüzündeki orta bilgi veya eklentinin türünü belirtir.
    rosin_dust_level:
      name: Reçine tozu seviyesi
      description: Normal kullanım sırasında üretilmesi beklenen reçine tozu miktarını
        gösterir.
    rosin_formula_additives:
      name: Reçine formülü / katkı maddeleri
      description: Hipoalerjenik, düşük tozlu veya metal katkılı karışımlar gibi dikkat
        çekici formül özelliklerini belirtir.
    rosin_hardness:
      name: Reçine sertliği
      description: Yay reçinesinin göreceli sertliğini/yumuşaklığını belirtir; bu
        özellik farklı iklimlerde tutuşu ve toz oluşumunu etkiler.
    rotation_mechanism_type:
      name: Dönme mekanizması tipi
      description: Halatın dönmesini sağlayan mekanizmayı belirtir; bu mekanizma akıcılığı
        ve ulaşılabilecek hızı etkiler (örneğin rulman veya burç sistemi).
    rotation_motion_features:
      name: Dönme/hareket özellikleri
      description: Gezegenlerin veya yörüngelerin dönüp dönmediğini ve nasıl hareket
        ettiğini belirtir.
    rotor_configuration_type:
      name: Rotor konfigürasyon tipi
      description: RC helikopterlerin rotor konfigürasyonunu ve kontrol stilini (örneğin,
        koaksiyel, tek rotorlu sabit hatveli veya Collective hatveli, çok rotorlu)
        tanımlar; bu özellikler uçuş karakteristiklerini ve farklı beceri seviyelerine
        uygunluğunu önemli ölçüde etkiler.
    rotor_construction_type:
      name: Rotor yapım tipi
      description: Rotorun yapım stilini belirtir; bu özellik ağırlığı, sertliği ve
        ısı yönetimini etkiler.
    rotor_mounting_interface:
      name: Rotor montaj arayüzü
      description: Rotorun tekerleğe bağlanmasında kullanılan göbek arayüz standardını
        belirtir.
    rotor_mounting_standard:
      name: Rotor montaj standardı
      description: Rotorun göbeğe bağlanmasında kullanılan arayüz standardını belirtir
        (örneğin 6 cıvatalı veya Center Lock).
    roulette_set_components_included:
      name: Dahil olan rulet seti bileşenleri
      description: Rulet çarkı/seti ile birlikte gelen temel rulet bileşenleri.
    roulette_wheel_ball_track_type:
      name: Rulet çarkı top yolu tipi
      description: Çark üzerinde kullanılan top kanalının stilini belirtir; bu stil
        gerçekçilik ve oyun hissini etkiler.
    roulette_wheel_numbering_system:
      name: Rulet çarkı numaralandırma sistemi
      description: Oyun ve olasılık uyumluluğu için rulet çarkının numaralandırma
        ve sıfır düzenini belirtir.
    rounders_equipment_included:
      name: Dahil olan rounders ekipmanları
      description: Alıcının kutunun içinde tam olarak ne olduğunu bilmesi için, eğitim
        yardımcı seti veya paketiyle birlikte verilen belirli ürün veya aksesuarları
        listeler.
    rounders_governing_body_approval:
      name: Rounders resmi kurum onayı
      description: Resmi rounders veya ilgili spor kuruluşu tarafından verilen sertifika/onayı
        belirtir.
    row_counter_format:
      name: Satır sayacı formatı
      description: Örgü sıra sayacının formatını/stilini belirtir (halka, zincir,
        tıklamalı, dijital vb.).
    row_counter_mechanism:
      name: Sıra sayacı mekanizması
      description: Sıra sayısının cihaz üzerinde nasıl artırıldığını veya kaydedildiğini
        belirtir.
    row_counter_mounting_method:
      name: Sıra sayacı montaj yöntemi
      description: Sayaç/işaretleyicinin kullanım sırasında nasıl takıldığını belirtir
        (iğneye, parmağa, projeye vb.).
    rowel_type:
      name: Mahmuz diş tipi
      description: Mahmuz çarkının şekil veya kenar profilini belirtir; bu özellik
        binici tercihini ve at hassasiyetini etkiler.
    rowing_machine_part_type:
      name: Kürek çekme makinesi parça tipi
      description: Ürün, kürek çekme makinesinde hangi parçanın yerine geçmesi gerektiğini
        belirterek, alıcının mikro kategoriler arasında kaybolmadan ihtiyaç duyduğu
        parçayı hızlıca bulmasını sağlar.
    rubber_ducky_character_theme:
      name: Lastik ördek karakteri/teması
      description: Lastik ördeğin tema veya karakter tasarımını belirtir (yenilikçi/koleksiyonluk
        modeller için).
    rubber_ducky_features:
      name: Lastik ördek özellikleri
      description: Kauçuk ördek banyo oyuncaklarına özgü işlevsel/tasarım özellikleri.
    rubber_ducky_size_class:
      name: Lastik ördek boyut sınıfı
      description: Lastik ördekleri tipik kullanım alanlarına göre (küvet oyuncağı,
        pasta süsü, jumbo vb.) sınıflandıran kullanıcı dostu boyut gruplandırması.
    ruffle_style:
      name: Fırfırlı stili
      description: Sandalye kuşağındaki fırfırın yapısını veya görsel stilini belirtir.
    rugby_headgear_safety_certification:
      name: Ragbi kaskı güvenlik sertifikası
      description: Bu, başlığın resmi ragbi veya genel spor güvenlik standartlarına
        uygun olup olmadığını gösterir.
    rugby_size:
      name: Ragbi beden ölçüsü
      description: Ekipmanı, ürün başlıklarında kullanılan yaygın ragbi beden etiketlerine
        göre sınıflandırır.
    rugby_variant:
      name: Ragbi varyantı
      description: Ürünün hangi ragbi varyantı (kod veya format) için tasarlandığını
        belirtir.
    ruler_edge_type:
      name: Cetvel kenarı tipi
      description: Ölçüm veya işaretleme için kullanılan kenar profilini/işlevini
        belirtir (örneğin düz kenar, eğimli kenar, dudaklı kenar).
    ruler_marking_style:
      name: Cetvel işaretleme stili
      description: Cetvel üzerindeki temel çizgi işaretlerinin ötesindeki işaretleme/kılavuz
        düzenini açıklar.
    runner_configuration:
      name: Kızak konfigürasyonu
      description: Kızaktaki kızak raylarının sayısını ve düzenini belirtir.
    runner_material:
      name: Kızak rayı malzemesi
      description: Kızak raylarında veya kayma şeritlerinde kullanılan malzemeyi belirtir.
    saddle_cover_style:
      name: Sele örtüsü stili
      description: Ürünün genel tasarımını veya kullanım stilini sınıflandırır (örneğin
        saklama kılıfı, sürüş örtüsü, taşıma çantası).
    saddle_design:
      name: Sele tasarımı
      description: Selenin genel ergonomik veya rahatlatıcı tasarımını/stilini sınıflandırır
        (örneğin oyuklu, burunsuz, split-nose, yaylı).
    saddle_discipline:
      name: Sele kullanım disiplini
      description: Selenin temel kullanım disiplinini veya sürüş stilini belirtir.
    saddle_mounting_type:
      name: Sele montaj tipi
      description: Sele ile sele borusu arasındaki uyumluluk arayüzünü belirtir (örneğin
        raylı, pivotal, I-Beam).
    saddle_pad_shape:
      name: Sele altlığı şekli
      description: Pedin fiziksel kesimini/hatlarını belirtir; bu özellik sele uyumluluğunu
        ve estetik tercihi etkiler.
    saddle_pad_style:
      name: Sele pedi stili
      description: Pedin işlevsel stilini veya kullanım disiplinini belirtir; böylece
        biniciler aktivitelerine uygun sele tipini seçebilir.
    saddle_padding_material:
      name: Sele dolgu malzemesi
      description: Selenin içindeki temel dolgu malzemesini veya teknolojisini belirtir;
        bu özellik konforu ve sürüş hissini etkiler.
    saddle_rail_material:
      name: Sele ray malzemesi
      description: Bisiklet selesinin altındaki raylarda kullanılan malzemeyi belirtir;
        bu malzeme dayanıklılığı, konforu, ağırlığı ve fiyatı etkiler.
    saddle_tree_material:
      name: Sele iskelet malzemesi
      description: Selenin iç iskeletini (ağaç) oluşturan malzemeyi belirtir.
    saddle_tree_width:
      name: Sele ağacı genişliği
      description: Selenin iskeletinin genişlik sınıflandırmasını ve atın omuzlarına
        uyumunu tanımlar.
    safety_documentation_available:
      name: Dail olan güvenlik dokümanları
      description: İçerik için sağlanan uygunluk/güvenlik belgelerini belirtir (örneğin
        Güvenlik Bilgi Formu, IFRA beyanı, alerjen bildirimi).
    safety_equipment_included:
      name: Dahil olan güvenlik ekipmanları
      description: Kitte yer alan güvenlik/koruyucu ürünleri belirtir.
    safety_features:
      name: Güvenlik özellikleri
      description: Kazara kesilmeleri azaltmak veya bıçağı saklama sırasında korumak
        için tasarlanan dahili güvenlik özelliklerini belirtir.
    safety_harness_type:
      name: Emniyet kemeri tipi
      description: Koltukla birlikte verilen çocuk emniyet kemerinin stilini ve konfigürasyonunu
        belirtir.
    safety_mechanism_type:
      name: Güvenlik mekanizması tipi
      description: Başarısız kaldırışlarda halteri yakalamak için kullanılan entegre
        güvenlik sisteminin stilini belirtir.
    safety_restraint_type:
      name: Emniyet kemeri tipi
      description: Salıncak oturağında bulunan entegre çocuk güvenlik sisteminin türünü
        belirtir (varsa).
    safety_warning:
      name: Güvenlik uyarısı
      description: Ürünün misketlerle ilgili yaygın oyuncak güvenlik uyarılarını (örneğin
        boğulma tehlikesi) içerip içermediğini belirtir.
    sail_shape:
      name: Yelken şekli
      description: Kayak yelkeninin geometrik stilini belirtir; bu özellik verimliliği,
        kontrolü ve montajı etkiler.
    salad_dressing_type:
      name: Salata sosu türü
      description: Sosun temel stilini veya dokusunu (örneğin, kremalı, sirkeli, yoğurt
        bazlı) belirleyerek, alıcının farklı bazlar ve kıvamlar arasında ayrım yapmasına
        yardımcı olur.
    salad_topping_base_ingredient:
      name: Salata sosu ana malzemesi
      description: Üst malzemeyi oluşturan ana bileşen grubunu belirtir; bu bilgi
        beslenme tercihlerine veya alerjen filtrelemesine yardımcı olur.
    salt_level:
      name: Tuz seviyesi
      description: Kuruyemişlere veya tohumlara eklenen tuz/sodyum miktarını belirtir.
    sand_cup_features:
      name: Kum kabı özellikleri
      description: Kum kabının/kaplarının oyun ve kullanımını etkileyen işlevsel veya
        fiziksel özelliklerini belirtir.
    sand_shovel_handle_style:
      name: Kum küreği sap stili
      description: Kürek/kazma sapının uç kısmındaki tutma şeklinin tasarımını belirtir.
    sand_toy_set_pieces_included:
      name: Dahil olan kum oyuncağı seti parçaları
      description: Set içinde yer alan kum oyuncağı bileşen türlerini (örneğin kova,
        kürek, kalıplar) listeler; böylece alıcılar setleri içeriklerine göre karşılaştırabilir.
    sand_water_mill_items_included:
      name: Kum ve su değirmeni set içeriği
      description: Değirmen oyuncağıyla birlikte verilen temel aksesuar bileşenlerini
        (kova, kepçe, kalıp vb.) listeler.
    sandbag_style:
      name: Kum torbası tarzı
      description: Kum torbasının özel tasarımını ve kullanım amacını (örneğin, Bulgar,
        Strongman, Power) belirleterek, alıcının farklı egzersiz yöntemleri arasında
        seçim yapmasına yardımcı olur.
    sandbox_bottom_type:
      name: Kum havuzu taban tipi
      description: Kumun altında kullanılan taban/alt yapı türünü belirtir.
    sandbox_drainage_type:
      name: Kum havuzu drenaj tipi
      description: Kum havuzunun suyu nasıl tahliye ettiğini belirtir (örneğin drenaj
        delikleri veya çıkarılabilir tıpa).
    sandbox_seating_type:
      name: Kum havuzu oturma tipi
      description: Kum havuzunda entegre oturma alanı bulunup bulunmadığını ve varsa
        türünü belirtir.
    sapodillo_variety:
      name: Sapodillo çeşidi
      description: Sapodillo/chikoo meyvesinin belirli çeşidini (örneğin “Alano”,
        “Prolific”) tanımlayarak, meraklıların tercih ettikleri lezzet profillerini
        ve özelliklerini belirlemelerini sağlar.
    sapote_variety:
      name: Sapot çeşidi
      description: Sunulan sapotenin türünü/çeşidini belirtir (örneğin, siyah, beyaz,
        mamey), böylece alıcı farklı çeşitler arasında ayrım yapabilir.
    satin_ribbon_face_type:
      name: Saten kurdele yüzey tipi
      description: Kurdelenin saten kaplamasının tek taraflı mı yoksa çift taraflı
        mı olduğunu belirtir.
    sauce_consistency:
      name: Sos kıvamı
      description: Pizza sosunun dokusunu veya yoğunluğunu belirtir.
    sauce_product_form:
      name: Sos ürün formu
      description: Sos ürününün fiziksel formunu belirtir (sıvı, yağ, macun, toz,
        pul, şurup vb.).
    sauce_variety:
      name: Sos çeşitleri
      description: Beyaz veya kremalı sosun belirli stilini/tarif ailesini belirtir
        (örneğin Alfredo, Beşamel, Hollandaise).
    saxophone_body_finish:
      name: Saksafon gövde kaplaması
      description: Saksafon gövdesinin ana yüzey kaplamasını belirtir (tuş takımından
        ayrı olarak).
    saxophone_body_type:
      name: Saksafon gövde tipi
      description: Bas saksafonun gövde konfigürasyonunu ve çan yönelimini belirtir.
    saxophone_construction_style:
      name: Saksafon yapım tarzı
      description: Saksafon yapımında dayanıklılığı, rezonansı ve bakımı etkileyen
        yaygın özellikleri belirtir.
    saxophone_included_accessories:
      name: Saksafona dahil olan aksesuarlar
      description: Alto saksafon paketiyle birlikte verilen aksesuarları listeler.
    saxophone_key_system:
      name: Saksafon tuş sistemi
      description: Enstrümanda kullanılan tuş sistemi düzenini belirtir (düzen/mekanizma
        standardı).
    saxophone_key_touch_material:
      name: Saksafon tuş temas malzemesi
      description: Saksafon tuşlarının dokunma yüzeylerinde kullanılan malzemeyi belirtir
        (örneğin, inci dokunma yüzeyleri).
    saxophone_mouthpiece_baffle_type:
      name: Saksafon ağızlığı bölme tipi
      description: Hava akışını ve parlaklığı şekillendiren baffle tasarımını belirtir.
    saxophone_neck_type:
      name: Saksafon boyun tipi
      description: Bas saksafonla birlikte verilen boyun konfigürasyonunu belirtir.
    saxophone_package_contents:
      name: Saksafon paketi içeriği
      description: Saksafonla birlikte verilen temel aksesuarları listeler (örneğin
        kılıf, ağızlık, ligatür, boyun askısı, temizlik seti).
    saxophone_reed_cut:
      name: Saksafon kamışı kesim tipi
      description: Saksafon kamışının kesim stilini belirtir; bu özellik tepkiyi,
        tonu ve hissi etkiler.
    saxophone_reed_material_type:
      name: Saksafon kamışı malzeme türü
      description: Kamış malzemesinin kategorisini belirtir (örneğin, kamış veya sentetik).
    saxophone_reed_strength_scale:
      name: Saksafon kamış sertlik ölçeği
      description: Kamış için kullanılan (çoğunlukla markaya bağlı) dayanıklılık numaralandırma
        sistemini/ölçek sistemini belirtir ve liste kayıtları arasında daha net karşılaştırma
        yapılmasını sağlar.
    saxophone_small_part_thread_size:
      name: Saksafon küçük parça diş ölçüsü
      description: Saksafonun vidalı küçük parçaları için diş ölçüsünü/standardını
        belirtir; böylece doğru uyum seçilebilir.
    saxophone_swab_application_area:
      name: Saksafon temizleme bezi uygulama alanı
      description: Temizleme bezinin saksafonun hangi bölümünü temizlemek/kurutmak
        için tasarlandığını belirtir.
    scabbard_material:
      name: Kılıf malzemesi
      description: "(Varsa) dahil olan kın/kılıfın ana malzemesini belirtir."
    scale_model_assembly_status:
      name: Ölçek model montaj durumu
      description: Ölçek modelin sergilemeye hazır mı yoksa montaj/boyama gerektiriyor
        mu olduğunu belirtir.
    scale_model_car_features:
      name: Ölçekli model araba özellikleri
      description: Model arabanın dikkat çekici özelliklerini belirtir (açılabilir
        kapı/kaput, yönlendirilebilir tekerlek, süspansiyon vb.).
    scale_model_kit_assembly_requirements:
      name: Ölçekli model kit montaj gereksinimleri
      description: Temel geçmeli montajın ötesinde gerekli olabilecek ek montaj adımlarını
        veya malzemeleri belirtir.
    scale_model_kit_components_included:
      name: Ölçekli model kit dahil bileşenler
      description: Tank ölçek modeli/kit ile birlikte verilen parçaları listeler (çıkartma,
        figür, foto-etch parçalar vb.).
    scale_model_paint_status:
      name: Ölçek model boya durumu
      description: Modelin önceden boyanmış mı yoksa boyama gerektirir durumda mı
        olduğunu belirtir.
    scale_model_pose:
      name: Maket model pozu
      description: Sergileme/diorama uyumu için at modelinin tasvir edilen pozunu
        belirtir.
    scale_model_rotor_configuration:
      name: Ölçekli model rotor konfigürasyonu
      description: Modelde gösterilen helikopter rotor konfigürasyonunu belirtir.
    scale_model_truck_era:
      name: Ölçekli model kamyon dönemi
      description: Modelin temsil ettiği gerçek dünyadaki kamyonun dönemini/zaman
        dilimini belirtir (klasik ve modern kamyonları araştıran koleksiyoncular için
        faydalıdır).
    scale_model_truck_propulsion_type:
      name: Ölçekli model kamyon tahrik tipi
      description: Gösterilen kamyonun dizel, benzinli, elektrikli, hibrit veya başka
        bir tahrik türünden (modelde gösterildiği gibi) olup olmadığını belirtir.
    scale_units:
      name: Ölçü birimleri
      description: Yarıçap/çap ayarı için kiriş üzerinde basılı veya kazınmış ölçü
        birimlerini belirtir.
    scent_function:
      name: Koku işlevi
      description: Koku ürünlerinin temel işlevlerini tanımlayarak avcıların doğru
        aracı (örneğin, cezbedici madde, koku giderici) hızla seçmelerini sağlar.
    scent_source:
      name: Koku kaynağı
      description: Ürün formülasyonunda kullanılan başlıca biyolojik veya aromatik
        kaynağı listeler (idrar türleri, gıda bazlı kokular, bitkisel aromalar vb.).
    school_bus_body_type:
      name: Okul otobüsü gövde tipi
      description: Okul otobüsünü pazarda kullanılan yaygın gövde/sınıf formatlarına
        göre sınıflandırır (örneğin Type A–D).
    school_bus_safety_feature:
      name: Okul otobüsü güvenlik özelliği
      description: Okul otobüsüne takılı önemli güvenlik ekipmanlarını belirtir.
    school_glue_washability:
      name: Okul tutkalının yıkanabilirliği
      description: Kurumuş veya ıslak tutkalın cilt, giysi veya yüzeylerden ne kadar
        kolay temizlenebileceğini belirtir.
    scissors_application:
      name: Makas kullanım amacı
      description: Makasın temel kesim amacı veya kesmeye uygun olduğu malzemeyi belirtir.
    scooter_brake_pad_material:
      name: Scooter fren balatası malzemesi
      description: Fren balatalarında kullanılan bileşimi belirtir; bu bileşim performansı,
        gürültüyü ve kullanım ömrünü etkiler.
    scoring_method:
      name: Puanlama yöntemi
      description: Langırt masasında skorların nasıl takip edildiğini belirtir (örneğin
        manuel boncuk sayaç veya elektronik skor tabelası).
    scoring_pattern:
      name: Puanlama düzeni
      description: Oyun alanına basılmış puanlama bölgelerinin düzenini belirtir.
    scoring_system_type:
      name: Skor sistemi tipi
      description: Masada bulunan puan tutma mekanizmasının stilini belirtir (manuel
        kaydırıcılar veya elektronik ekranlar gibi).
    scottish_smallpipes_bag_material:
      name: İskoç gayda çantası malzemesi
      description: Gayda ile birlikte verilen hava torbasının malzemesini belirtir.
    scottish_smallpipes_drone_tuning_configuration:
      name: İskoç gaydası drone akort konfigürasyonu
      description: Enstrümanla birlikte verilen drone akort düzenini (toniğe göre
        perde/rol dağılımını) belirtir.
    scottish_smallpipes_reed_type:
      name: İskoç küçük gaydası kamış tipi
      description: Üflemeli çalgıda kullanılan kamış tipini (ve/veya kamışların sentetik
        mi yoksa bambu mu olduğunu) belirtir.
    scraping_surface_type:
      name: Kazıma yüzeyi tipi
      description: Ses çıkaran kazıyıcı yüzeyin yapısını/geometrisini belirtir (örneğin,
        oluklu, taraklı/dişli, dalgalı).
    screw_drive_type:
      name: Vidalı tahrik tipi
      description: Vida veya cıvata başındaki tahrik yuvası stilini belirtir ve sıkmak
        veya çıkarmak için gereken aleti gösterir (örneğin, altıgen/Allen, Torx).
    screw_thread_size:
      name: Vida diş ölçüsü
      description: Dahil edilen veya uyumlu vidaların diş ölçüsü standardını belirtir
        (örneğin M4, M5, M6).
    sculpting_clay_base_type:
      name: Heykel kili baz türü
      description: Heykel kilinin temel formülasyonunu/baz yapısını açıklar.
    seafood_cut:
      name: Deniz ürünü kesim tipi
      description: Deniz ürününün fiziksel kesimini veya sunum şeklini belirtir (bütün,
        fileto, steak vb.).
    seafood_processing_method:
      name: Deniz ürünleri işleme yöntemi
      description: Deniz ürününe uygulanan başlıca koruma veya işleme yöntemini belirtir
        (füme, tuzlama, dondurarak kurutma vb.).
    seafood_source:
      name: Deniz ürünü kaynağı
      description: Deniz ürününün vahşi av, çiftlik üretimi, bitkisel bazlı veya başka
        bir kaynaktan olup olmadığını belirterek, alıcının sürdürülebilirlik ve kaliteyi
        değerlendirmesine yardımcı olur.
    seal_material:
      name: Sızdırmazlık malzemesi
      description: Elbisenin su geçirmezliğini sağlayan boyun, bilek ve ayak bileği
        contaları veya sızdırmazlık elemanlarında kullanılan malzeme.
    seal_type:
      name: Sızdırmazlık tipi
      description: Soğutma sıvısı sızıntısını önlemek için bağlantı parçasının kullandığı
        sızdırmazlık yöntemini belirtir.
    sealant_formulation:
      name: Sızdırmazlık malzemesi formülasyonu
      description: Bisiklet lastiği sızdırmazlık maddesinin temel kimyasal formülasyonunu
        veya katkı teknolojisini belirtir (örneğin lateks bazlı, elyaf takviyeli,
        akrilik).
    seals_leak_type:
      name: Giderilen sızıntı türü
      description: Ürünün kapatmak üzere tasarlandığı soğutma sistemi sızıntısının
        türünü veya konumunu belirtir.
    seam_construction:
      name: Dikiş yapısı
      description: Topun dikişinin nasıl oluşturulduğunu belirtir; bu yapı tutuşu,
        aerodinamiği ve dayanıklılığı etkiler.
    seam_design:
      name: Dikiş tasarımı
      description: Çorabın dikiş yapısını veya dekoratif dikiş özelliklerini belirtir.
    seam_gauge_scale_type:
      name: Dikiş ölçer ölçek tipi
      description: Temel cetvel ölçeğinin ötesinde, dikiş ölçer üzerinde bulunan ek
        ölçekleri/işaretleri belirtir.
    seam_gauge_slider_material:
      name: Dikiş ölçüsü kaydırıcı malzemesi
      description: Varsa, ayarlanabilir kaydırıcı/işaretçi bileşeninin malzemesini
        belirtir.
    seam_ripper_tip_style:
      name: Dikiş sökücü uç tipi
      description: Dikişlerin altına girerek ipliği güvenli şekilde kesmeye yarayan
        uç tasarımını belirtir.
    seam_sealing_type:
      name: Dikiş sızdırmazlık tipi
      description: Yağmurluğun dikiş yerlerinden su girişini önlemek için kullanılan
        yöntemi belirtir (örneğin tamamen bantlanmış, kaynaklı).
    seam_type:
      name: Dikiş tipi
      description: Beyzbol topunun dikiş stilini belirtir; bu özellik tutuşu, aerodinamiği
        ve oyun seviyesini etkiler.
    season_condition_protection:
      name: Mevsim/koşul koruması
      description: Ön cam örtüsünün hangi hava koşullarına karşı koruma sağlamak üzere
        tasarlandığını belirtir.
    season_rating:
      name: Mevsim derecesi
      description: Çadırın mevsimsellik derecesini belirtir ve farklı hava koşullarına
        uygunluğunu gösterir (örneğin, 3 mevsim, 4 mevsim, 5 mevsim/keşif gezisi).
    seasoning_variety:
      name: Baharat çeşitliliği
      description: Baharatı hazırlama stiline veya geleneksel mutfak kullanımına göre
        sınıflandırır.
    seat_adjustment_power_type:
      name: Koltuk ayar güç tipi
      description: Koltuk ayar mekanizmalarının nasıl çalıştırıldığını (manuel kollar
        mı yoksa elektrik motorları mı) belirtir; bu da kablolama/uyumluluğu etkileyebilir.
    seat_belt_attachment_type:
      name: Emniyet kemeri bağlantı tipi
      description: Kayışın araçtaki kemer donanımına nasıl bağlandığını belirtir.
    seat_belt_buckle_electrical_connector_type:
      name: Emniyet kemeri tokası elektrik konnektör tipi
      description: Toka anahtarı veya gerdirici kablolaması için kullanılan konektör/arayüz
        tipini belirtir.
    seat_belt_buckle_mounting_type:
      name: Emniyet kemeri tokası montaj tipi
      description: Tokanın veya alıcı parçasının araca, koltuğa ya da kemer koluna
        nasıl monte edildiğini belirtir (örneğin cıvatalı, klipsli).
    seat_belt_buckle_release_button_color:
      name: Emniyet kemeri tokası açma düğmesi rengi
      description: Toka açma mekanizmasının rengini belirtir.
    seat_belt_cover_placement:
      name: Emniyet kemeri kılıfı yerleşimi
      description: Emniyet kemeri kılıfının kemer üzerinde hangi bölgede kullanılmak
        üzere tasarlandığını belirtir.
    seat_belt_integration:
      name: Emniyet kemeri entegrasyonu
      description: Koltukta entegre emniyet kemeri ve/veya toka yuvası bulunup bulunmadığını
        ya da montaj için aracın OEM toka yuvasının aktarılması gerekip gerekmediğini
        belirtir.
    seat_belt_provision:
      name: Emniyet kemeri dahil durumu
      description: Arka koltuk takımına emniyet kemerlerinin ve/veya ilgili kemer
        donanımının (örneğin, tokaların) dahil olup olmadığını veya orijinal koltuktan
        ayrıca aktarılması gerekip gerekmediğini gösterir.
    seat_belt_strap_installation_location:
      name: Emniyet kemeri kayışı montaj konumu
      description: Kayışın kemer sistemi içinde hangi konuma monte edildiğini belirtir.
    seat_cover_placement:
      name: Koltuk kılıfı yerleşimi
      description: Kılıfın araçta hangi koltuk pozisyonları için tasarlandığını belirtir.
    seat_cover_securement_method:
      name: Koltuk kılıfı sabitleme yöntemi
      description: Koltuk kılıfının koltuğa hangi yöntemle sabitlendiğini belirtir.
        Birden fazla yöntem kullanılıyorsa, ana/birincil olanı seçin.
    seat_cover_set_contents:
      name: Koltuk kılıfı seti içeriği
      description: Paket içinde hangi parçaların bulunduğunu belirtir (örneğin sadece
        oturma bölümü veya tam set + başlıklar).
    seat_fabric:
      name: Koltuk kumaşı
      description: Sandalyenin oturma ve sırt bölümünde kullanılan ana kumaşı belirtir.
    seat_height_category:
      name: Koltuk yüksekliği kategorisi
      description: Tabureyi tipik oturma yüksekliği aralığına göre sınıflandırır (örneğin
        tezgâh veya bar yüksekliği).
    seat_material:
      name: Koltuk malzemesi
      description: Bankın oturma yüzeyinin ana malzemesini tanımlar.
    seat_mounting_type:
      name: Koltuk montaj tipi
      description: Koltuğun araç tabanına bağlanmasında kullanılan montaj/ray konfigürasyonunu
        belirtir.
    seating_surface_material:
      name: Oturma yüzeyi malzemesi
      description: Kişinin uzandığı yüzeyin malzemesini belirtir (örneğin Textilene
        file, askı kumaşı, hasır, minderli döşeme).
    seatpost_clamp_mechanism:
      name: Sele borusu kelepçe mekanizması
      description: Sele borusunu sabitleyen sıkıştırma/kilitleme sisteminin türünü
        belirtir.
    section_orientation_compatibility:
      name: Bölüm yönlendirme uyumluluğu
      description: Aksesuarın sol kol, sağ kol veya evrensel yönlendirme bölümüne
        uygun olup olmadığını belirtir.
    sectional_configuration:
      name: Modüler konfigürasyon
      description: Alıcının istediği düzeni oluşturabilmesi için, modüler ünitenin
        belirli modülü veya yönünü (örneğin, köşe, sol kolçak ucu, şezlong) tanımlar.
    sectional_shape:
      name: Modüler koltuk şekli
      description: Modüler koltuğun genel geometrik düzenini/şeklini belirtir.
    secured_components:
      name: Sabitlenen bileşenler
      description: Kilitli mil veya güvenlik somunlarının koruduğu bisiklet parçalarını
        listeler (örneğin ön tekerlek, arka tekerlek, sele borusu).
    seed_content:
      name: Tohum içeriği
      description: Turunçgil meyvesinin çekirdeksiz, az çekirdekli veya tamamen çekirdekli
        olup olmadığını gösterir.
    seed_size_classification:
      name: Tohum boyut sınıflandırması
      description: Liçi meyvesindeki yenmeyen çekirdeğin göreli boyutunu belirtir;
        bu, yenilebilir et miktarını etkiler.
    self_adhesive_backing_format:
      name: Kendinden yapışkanlı arka yüzey formatı
      description: Fitil tablası ile birlikte verilen yapışkanlı arka yüzeyin fiziksel
        formatını belirtir (önceden uygulanmış ped veya ayrı etiket vb.).
    self_adhesive_hook_loop_backing_type:
      name: Kendinden yapışkanlı cırt cırtlı arka yüzey tipi
      description: Kendinden yapışkanlı tarafta kullanılan destek/astar yapısını ve
        yapıştırıcı sistemini belirtir.
    self_adhesive_hook_loop_fastener_shape:
      name: Kendinden yapışkanlı kancalı ve ilikli kopça şekli
      description: Verilen bağlantı parçalarının kesim/şekil tipini belirtir.
    self_hardening_clay_finish:
      name: Kendiliğinden sertleşen kil yüzey bitişi
      description: Tam kürlendikten sonraki yüzey görünümünü/parlaklığını belirtir
        (mat, saten vb.).
    self_hardening_clay_water_resistance_after_curing:
      name: Kürlendikten sonra kendiliğinden sertleşen kilin suya dayanıklılığı
      description: Tam kürlendikten sonra (ek sızdırmazlık olmadan) suya karşı direncini
        belirtir.
    sensor_functions:
      name: Sensör işlevleri
      description: Sensörün hangi bisiklet performans metriklerini ölçtüğünü belirtir.
    sensor_measurement_mode:
      name: Sensör ölçüm modu
      description: Sensörün hangi metrikleri algılayabildiğini belirtir (yalnızca
        kadans, yalnızca hız veya hız + kadans).
    sensor_mounting_position:
      name: Sensör montaj konumu
      description: Sensörün bisiklet veya sürücü üzerinde hangi konuma monte edildiğini
        belirtir (örneğin krank kolu, göbek, ayakkabı). Bu durum farklı bisiklet kurulumlarıyla
        uyumluluğu etkiler.
    sensor_mounting_type:
      name: Sensör montaj tipi
      description: MAP sensörünün emme manifoldu/motor üzerine nasıl monte edildiğini
        belirtir (örneğin cıvatalı flanş veya geçmeli tip).
    sensor_or_gauge_mounting_location:
      name: Sensör veya gösterge montaj yeri
      description: Araçta sensörün veya göstergenin nereye monte edileceğini belirtir
        (sistem/konum düzeyinde, sol/sağ değil).
    sensory_modality:
      name: Duyusal modalite
      description: Oyuncağın sağlamayı amaçladığı birincil duyusal deneyimi (veya
        deneyimleri) belirtir.
    sensory_toy_fidget_mechanism:
      name: Duyusal oyuncak stres atma mekanizması
      description: Huzursuzluk ve öz düzenleme için kullanılan birincil etkileşim/mekanizma.
    sensory_toy_light_features:
      name: Duyusal oyuncak ışığı özellikleri
      description: Oyuncağın sunduğu ışık davranışlarını/efektlerini belirtir.
    sensory_toy_texture_type:
      name: Duyusal oyuncak doku türü
      description: Dokunsal uyarım için kullanılan baskın yüzey hissi/doku türünü
        belirtir.
    sequin_application_method:
      name: Pul uygulama yöntemi
      description: Pulun nasıl uygulanacağını belirtir (dikme, yapıştırma, ısıyla
        sabitleme vb.).
    sequin_finish:
      name: Payet yüzey bitişi
      description: Bu açıklama, yamada kullanılan pulların yüzey/görsel görünümünü
        ve yansıtıcı etkisini (örneğin, mat, metalik, holografik) tanımlar; yamanın
        arka yüzeyini veya yapıştırma yöntemini değil.
    serger_stitch_functions:
      name: Overlok dikiş işlevleri
      description: Overlok makinesinin desteklediği dikiş işlevlerini belirtir (kenar
        temizleme varyasyonları ve özel overlok dikişleri).
    serger_thread_count:
      name: Overlok iplik sayısı
      description: Overlok makinesinin kullanabildiği iplik sayısını belirtir (örneğin
        2/3/4/5 iplik).
    service_interval:
      name: Servis aralığı
      description: Yetkili servis tarafından yapılması gereken bakım/denetimler arasındaki
        önerilen azami süreyi belirtir.
    serving_temperature:
      name: Servis sıcaklığı
      description: Ürünün tüketim sırasında önerilen servis sıcaklığını veya durumunu
        belirtir.
    sesame_seed_hull_status:
      name: Susam kabuğu durumu
      description: Tahinin kabuklu veya kabuksuz susamdan yapılıp yapılmadığını belirtir;
        bu durum renk, tat ve besin değerini etkiler.
    sesame_seed_roast_level:
      name: Susam kavurma seviyesi
      description: Susam tohumlarının öğütülmeden önce ne kadar kavrulduğunu gösterir
        ve tüketicinin tercih ettiği lezzet yoğunluğunu seçmesine yardımcı olur.
    sesame_seed_variety:
      name: Susam tohumu çeşidi
      description: Yağın üretiminde kullanılan susamın rengini veya çeşidini belirtir.
    set_classification:
      name: Sınıflandırma kümesi
      description: Kroket setinin kullanım amacını veya oyun seviyesini belirtir (örneğin
        turnuva, rekreasyon, seyahat).
    set_components:
      name: Bileşenleri ayarlayın
      description: Ürünle birlikte hangi parçaların verildiğini belirtir (örneğin
        yalnızca orta çubuk veya tam set).
    set_items_included:
      name: Dahil olan set parçaları
      description: Set içinde yer alan giysi veya aksesuarları belirtir (örneğin saree
        kumaşı, dupatta, kemer).
    setup_mechanism:
      name: Kurulum mekanizması
      description: Çadırın temel kurulum yöntemini belirtir (örneğin pop-up, şişirilebilir,
        çatı üstü açılır tip).
    setup_type:
      name: Kurulum tipi
      description: Oyun çadırı/tünelinin nasıl kurulduğunu veya açıldığını belirtir.
    sew_in_interfacing_elasticity:
      name: Dikilebilir tela esnekliği
      description: Dikişli ara katmanın esnek olup olmadığını ve eğer esnekse, örme
        veya dokuma projelerle uyumlu olması için hangi yönlerde esnediğini gösterir.
    sew_in_label_placement:
      name: Dikilebilir etiket yerleşimi
      description: Bitmiş ürün üzerindeki amaçlanan yerleşim konumunu belirtir.
    sew_on_edge_finish:
      name: Dikilebilir kenar bitişi
      description: Cırt bant kenarlarının ham mı yoksa yıpranmaya karşı işlenmiş mi
        olduğunu belirtir.
    sew_on_rhinestone_hole_orientation:
      name: Dikilebilir yapay elmas deliklerinin yönü
      description: Farklı dikiş stillerini desteklemek için deliklerin taşa göre düzenlenmesi/yönlendirilmesi
        (örneğin, yan yana, karşılıklı, çapraz).
    sewing_kit_components_included:
      name: Dahil olan dikiş seti bileşenleri
      description: Alıcının her bir dikiş kit neler bulunduğunu karşılaştırabilmesi
        için, kit içerisinde yer alan dikiş malzemeleri/aletlerini listeler.
    sewing_machine_bobbin_class:
      name: Dikiş makinesi bobin sınıfı
      description: Bobin ve bobin yuvası için dikiş makinesiyle uyumlu bobin sınıfını/sistemini
        belirtir.
    sewing_machine_buttonhole_type:
      name: Dikiş makinesi ilik açma tipi
      description: Makine tarafından desteklenen ilik açma yöntemi.
    sewing_machine_display_type:
      name: Dikiş makinesi ekran tipi
      description: Dikiş makinesindeki kontrol/ekran arayüzünün türü.
    sewing_machine_needle_point_type:
      name: Dikiş makinesi iğne ucu tipi
      description: İğnenin farklı kumaşlara nasıl nüfuz edeceğini belirleyen uç geometrisini/uç
        ailesini tanımlar (örneğin, sivri uç, yuvarlak uç veya kama uç).
    sewing_machine_needle_system:
      name: Dikiş makinesi iğne sistemi
      description: Makine uyumluluğunu belirleyen standart iğne sistemi/model numarasını
        belirtir (örneğin 130/705H, HAx1, DBx1, 15x1 vb.).
    sewing_machine_needle_type:
      name: Dikiş makinesi iğne tipi
      description: İğnenin kullanım amacını/stilini belirtir (örneğin evrensel, yuvarlak
        uçlu, kot/denim); bu özellik dikiş kalitesini ve kumaş uyumluluğunu etkiler.
    sewing_machine_shank_type:
      name: Dikiş makinesi ayak bağlantı tipi
      description: Baskı ayağının tasarlandığı şaft/bağlantı arayüzü standardını belirtir
        (örneğin alçak şaft, yüksek şaft, eğimli şaft) ve makine uyumluluğunu belirler.
    sewing_pattern_accessory_type:
      name: Dikiş kalıbı aksesuar türü
      description: Dikiş kalıbının hangi aksesuarı ürettiğini belirtir.
    sewing_pattern_notions_required:
      name: Dikiş kalıbı için gerekli ek malzemeler
      description: Projeyi tamamlamak için gerekli olan ek malzeme ve donanımları
        listeler (kumaş ve iplik dışında).
    sewing_pattern_recommended_fabric:
      name: Dikiş kalıbı için önerilen kumaş
      description: Dikiş kalıbı için önerilen kumaş türlerini/ağırlıklarını (kalıp
        tasarımcısı tarafından sağlanan bilgilere göre) listeler.
    sewing_pattern_size_range:
      name: Dikiş kalıbı beden aralığı
      description: Kalıbın kapsadığı beden aralığını belirtir (örneğin bebekten yetişkine,
        büyük bedenler dâhil).
    sewing_thread_size_system:
      name: Dikiş ipliği numaralandırma sistemi
      description: İplik kalınlığını ifade etmek için kullanılan ölçü sistemini belirtir
        (örneğin Tex, Denier, Ticket, numara, V ölçüsü).
    shaft_curvature:
      name: Şaft eğriliği
      description: Şaftın genel formunu tanımlar; bu form açıklığı, salınımı ve ergonomiyi
        etkiler.
    shaft_kick_point:
      name: Şaft eğriliği
      description: Vuruş sırasında şaftın en fazla esnediği noktayı belirtir; bu da
        topun uçuş yörüngesini etkiler.
    shaft_length_type:
      name: Mil uzunluk tipi
      description: Milimetre ölçüsü verilmediğinde dart şaftları için kullanılan endüstri
        standardı kategorik boyut tanımını belirtir (örneğin Kısa, Orta).
    shaft_shape:
      name: Şaft şekli
      description: Tonfa şaftının kesit profilini belirtir (örneğin yuvarlak, kare,
        sekizgen).
    shaker_fill_material:
      name: Marakas dolgu malzemesi
      description: "(Uygulanabilir olduğunda) titreşimli ses oluşturmak için kullanılan
        birincil iç dolgu malzemesini belirtir; örneğin boncuk, tohum veya bilye."
    shaker_shell_material:
      name: Marakas gövde malzemesi
      description: Yumurta çalkalayıcının gövdesinin/kabuğunun (dış gövdesinin) ana
        malzemesini belirtir.
    shallot_variety:
      name: Arpacık soğanı çeşidi
      description: Arpacık soğanının belirli çeşidini veya pazar türünü belirtir.
    shank_style:
      name: Şaft stili
      description: Kaldırım matkap ucunun şaftlarının genel formunu/konfigürasyonunu
        belirtir (örneğin düz, kavisli, grazing).
    shapewear_enhancement_feature:
      name: Vücut şekillendirici geliştirme özelliği
      description: Giysinin sunduğu temel işlevsel özelliği belirtir (örneğin karın
        toparlama, kalça kaldırma, sızdırmaz astar).
    sheath_type:
      name: Kılıf tipi
      description: Koleksiyonluk bıçakla birlikte verilen kılıf/kın tipini belirtir.
    sheet_music_clip_padding_material:
      name: Nota klipsi iç ped malzemesi
      description: Kağıt veya nota sehpasıyla temas eden çene/tutma pedi malzemesini
        belirtir; bu malzeme yırtılmayı ve kaymayı önler.
    sheet_music_clip_spring_tension_level:
      name: Nota klipsi yay gerilim seviyesi
      description: Klips yayının/sıkma kuvvetinin göreli seviyesini belirtir.
    sheet_music_clip_use_environment:
      name: Nota klipsi kullanım ortamı
      description: Klipsin en iyi performans göstermesi için tasarlandığı temel kullanım
        ortamını belirtir.
    shell_construction:
      name: Kabuk yapısı
      description: Bas davul gövdesinin nasıl üretildiğini belirtir; bu yapı ton ve
        ağırlığı önemli ölçüde etkiler.
    shell_finish:
      name: Kabuk kaplama
      description: Doumbek gövdesinin dış yüzey kaplamasını belirtir.
    shell_hull_status:
      name: Gövde/kabuk durumu
      description: Kuruyemiş veya tohumların kabuklu mu yoksa kabuksuz mu satıldığını
        belirtir.
    shift_boot_attachment_method:
      name: Vites körüğü montaj yöntemi
      description: Vites körüğünün konsola/vites trimine nasıl monte edildiğini belirtir
        (klipsli çerçeve, tutucu halka, yapıştırıcı vb.).
    shift_boot_installation_hardware_included:
      name: Vites körüğü montaj donanımı dahil
      description: Vites körüğüyle birlikte verilen montaj donanımı ve bileşenlerini
        listeler.
    shift_knob_illumination:
      name: Vites topuzu aydınlatması
      description: Vites topuzunun aydınlatma içerip içermediğini ve aydınlatma yöntemini/türünü
        (örneğin, fotolüminesans, LED, fiber optik, arkadan aydınlatmalı desen) belirtir.
    shift_knob_installation_method:
      name: Vites topuzu montaj yöntemi
      description: Vites topuzunun vites koluna/vitese nasıl takıldığını belirtir.
    shift_knob_shape:
      name: Vites topuzu şekli
      description: Vites topuzunun genel ergonomik formunu belirtir.
    shift_pattern_type:
      name: Vites deseni tipi
      description: Vites topuzu üzerindeki vites işaretleme stilini belirtir (varsa).
    shifter_compatibility:
      name: Vites kolu uyumluluğu
      description: Gidon uzantısının elektronik vites değiştiricilerle, mekanik vites
        değiştiricilerle, her ikisiyle de uyumlu olup olmadığını veya vites değiştiricilerle
        uyumlu olmadığını gösterir.
    shifter_mounting_interface:
      name: Vites kolu montaj arayüzü
      description: Vites kolunun bisiklete nasıl takıldığını açıklar (örneğin, gizli
        kelepçeli gövde, I-Spec, MatchMaker, gidon ucu, alt boru, kablosuz).
    shifting_actuation_type:
      name: Vites değiştirme aktüasyon tipi
      description: Vites grubunda kullanılan aktüasyon tipini belirtir (mekanik, kablolu
        elektronik, kablosuz elektronik, hidrolik).
    shifting_mechanism:
      name: Vites değiştirme mekanizması
      description: Vites kolunun mekanik mi elektronik mi çalıştığını ve indeksli
        mi sürtünmeli mi olduğunu belirtir.
    shim_purpose:
      name: Şim amacı
      description: Ürünün işlevsel tipini (örneğin, pul, kama, ara parça) tanımlayarak
        bisikletçilerin ayrı alt kategorilere ihtiyaç duymadan doğru ayarlama çözümünü
        hızlıca bulmalarını sağlar.
    shin_guard_attachment_method:
      name: Dizlik sabitleme yöntemi
      description: Dizliklerin tasarım formatını belirtir (örneğin ayak bileği entegreli,
        çorap tipi vb.).
    shirt_cuff_style:
      name: Gömlek manşet stili
      description: Kol manşetinin yapısını belirtir; bu özellik resmiyet, kol düğmesi
        uyumu ve konforu etkiler.
    shochu_base_ingredient:
      name: Shochu temel bileşeni
      description: Shochu üretiminde kullanılan ana nişasta veya şeker kaynağını belirtir.
    shochu_soju_variety:
      name: Shochu ve soju çeşitleri
      description: Ürünü bilinen stiline veya üretim türüne göre sınıflandırır.
    shock_absorber_bushing_material:
      name: Amortisör burç malzemesi
      description: Amortisörle birlikte verilen veya amortisöre entegre olan montaj
        burçları/izolatörlerinin malzemesini belirtir.
    shock_absorber_charge_type:
      name: Amortisör şarj tipi
      description: Amortisörün şarj/sönümleme teknolojisini belirtir (örneğin hidrolik/yağlı,
        gazlı, havalı) ve gerekiyorsa boru tasarımını açıklar.
    shock_absorber_mount_type_lower:
      name: Amortisör alt montaj tipi
      description: Amortisörün alt montaj arayüzü stilini belirtir; uyum eşleştirmesi
        için kullanılır.
    shock_absorber_mount_type_upper:
      name: Amortisör üst montaj tipi
      description: Motorlu araç amortisörünün üst montaj arayüzü stilini belirtir;
        uyumluluk eşleştirmesi için kullanılır.
    shock_absorber_position:
      name: Amortisör konumu
      description: Amortisörün araçta ön, arka, sol veya sağ konum için tasarlanıp
        tasarlanmadığını belirtir (sadece aksa özel olmaktan daha ayrıntılı).
    shock_absorption_system:
      name: Darbe emme sistemi
      description: Geri sekme sırasında titreşim ve gürültüyü azaltan mekanizmayı
        belirtir.
    shoe_collar_height:
      name: Ayakkabı bilek yüksekliği
      description: Ayakkabıları bilek kesim yüksekliğine göre sınıflandırır (düşük,
        orta, yüksek bilekli).
    shoe_cover_height:
      name: Ayakkabı kılıfı yüksekliği
      description: Bisiklet ayakkabı kılıfının kapsama seviyesini belirtir; yalnızca
        burun kısmını kaplayan modeller ile tam boy galoşları ayırır.
    shoe_sizing_system:
      name: Ayakkabı numaralandırma sistemi
      description: Belirtilen ayakkabı numarası için kullanılan beden standardını
        belirtir (ABD, BK, AB, JP, Mondopoint vb.).
    shoelace_aglet_material:
      name: Ayakkabı bağcığı ucu malzemesi
      description: Bağcık uçlarında (aglet) kullanılan malzemeyi belirtir; bu malzeme
        dayanıklılık ve görünümü etkiler.
    shooting_rest_design:
      name: Atış sehpası tasarımı
      description: Atış sehpasının yapısal stilini sınıflandırır (çanta tipi, kızak,
        tripod, silah mengenesi vb.).
    shooting_stick_yoke_design:
      name: Atış çubuğu yoke tasarımı
      description: Ateşli silah veya optikle temas eden beşik/yoke tasarımını belirtir.
    shooting_target_style:
      name: Atış hedefi stili
      description: Atış hedefinin stilini/tasarımını sınıflandırır; böylece kullanıcılar
        ihtiyaç duydukları antrenman türünü seçebilir.
    shooting_target_type:
      name: Atış hedefi türü
      description: Atış hedeflerini yapısal stiline, malzemesine veya tasarımına göre
        sınıflandırır (örneğin gong, silüet, kağıt hedef, spinner); böylece atıcılar
        kendi disiplinleri ve silah türleri için uygun hedefi hızlıca bulabilir.
    short_block_assembly_balance_type:
      name: Kısa blok balans tipi
      description: Dönen aksamın iç balanslı mı yoksa dış balanslı mı olduğunu belirtir.
    short_block_intended_use:
      name: Kısa blok kullanım amacı
      description: Kısa bloğun birincil kullanım amacını belirtir.
    short_block_rotating_assembly_included:
      name: Kısa blokta dahil döner aksam
      description: Kısa blokla birlikte verilen ana döner aksam bileşenlerini belirtir.
    shot_size:
      name: Saçma boyutu
      description: Dökme saçma veya mühimmat bileşenleri için saçma boyutu numarasını
        belirtir.
    shotgun_action_type:
      name: Av tüfeği mekanizma tipi
      description: Av tüfeğinin mekanizma tipini belirtir (örneğin pompalı, yarı otomatik,
        kırma).
    shotgun_choke_type:
      name: Av tüfeği şok tipi
      description: Av tüfeği namlusunun şok konfigürasyonunu belirtir.
    shotgun_gauge:
      name: Av tüfeği kalibresi
      description: Av tüfeğinin kalibre/gauge bilgisini (uygunsa .410 bore dâhil)
        belirtir; koleksiyon listelerinde tanımlama ve filtreleme amacıyla kullanılır.
    shotgun_stock_material:
      name: Av tüfeği dipçiği malzemesi
      description: Dipçik ve ön el kundağının ana malzemesini belirtir.
    shuffleboard_speed_rating:
      name: Shuffleboard hız derecelendirmesi
      description: Bu özellik, Shuffleboard tozu veya diğer bakım ürünlerinin masa
        üzerinde sağladığı göreceli kayma hızını gösterir ve oyuncuların beceri seviyelerine
        ve masa uzunluğuna uygun hızı seçmelerine olanak tanır.
    shuffleboard_table_length_compatibility:
