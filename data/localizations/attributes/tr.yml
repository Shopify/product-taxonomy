    handle_grip_style:
      name: Sap tutma stili
      description: Çatalın tutma yerinin şeklini veya ergonomisini tanımlar.
    handle_length_adjustability:
      name: Sap uzunluğu ayarlanabilirliği
      description: Sap uzunluğunun ayarlanıp ayarlanamayacağını ve nasıl ayarlanabildiğini
