      description: Tankın içindeki su ve havayı birbirinden ayrı tutan iç ayırma tasarımını
        tanımlar.
    iron_cleaner_purpose:
      name: Ütü temizleyicinin amacı
      description: Temizleyicinin asıl kullanım amacını belirtir.
    ironing_board_form_factor:
      name: Ütü masasının form faktörü
      description: Alıcının doğru türü bulmasına yardımcı olmak için ütü masasının
        genel stilini/kurulum tipini sınıflandırır.
    ironing_board_pad_shape:
      name: Ütü masası altlığı şekli
      description: Farklı ütü masası tasarımlarına uyum sağlaması için pedin genel
