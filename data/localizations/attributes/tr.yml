    lip_gloss_formulation:
      name: Dudak parlatıcı formülasyonu
      description: Dudak parlatıcısının birincil dokusunu veya formatını tanımlar
    lip_liner_design:
      name: Dudak kalemi tasarımı
      description: Dudak kalemini tanımlar; örneğin geri çekilebilir veya sabit
    lip_makeup_opacity:
      name: Dudak makyajı opaklığı
      description: Ürünün uygulandıktan sonraki kapatıcılık veya opaklık seviyesini
