      description: Etiket yüzeyinin boş mu, şablonla önceden basılmış mı yoksa başka
        şekilde biçimlendirilmiş mi olduğunu açıklar.
    lamp_arm_style:
      name: Lamba kolu tarzı
      description: Lambanın ayarlanabilirliğini ve konumunu etkileyen kol/boyun tasarımını
        tanımlar (örneğin, kuğu boynu veya döner kol).
    lamp_post_base_mounting_type:
      name: Lamba direği tabanı montaj tipi
      description: Tabanın zemine veya yüzeye nasıl monte edileceğini veya sabitleneceğini
        belirtir.
    lamp_shade_fitter_type:
      name: Abajur bağlantı parçası tipi
      description: Abajur ile lamba arasındaki bağlantı mekanizmasını tanımlayarak,
        tahmine dayalı işlemlere gerek kalmadan uyumluluğu sağlar.
    lamp_shade_shape:
      name: Abajur şekli
      description: Abajurun geometrik şeklini belirterek, istenen silüetleri hızlı
        bir şekilde bulmayı sağlar.
    lamp_shade_translucency:
      name: Abajur yarı saydamlığı
      description: Abajurdan ne kadar ışık geçtiğini göstererek kullanıcıların istedikleri
        ambiyansı seçmelerine yardımcı olur.
    lampshade_shape:
      name: Abajur şekli
      description: Abajurun geometrik şeklini veya biçimini tanımlar.
    laundry_ball_texture:
      name: Çamaşır topu dokusu
      description: Kumaşın çalkalanmasını ve liflerin uzaklaştırılmasını etkileyen
        topun yüzey şeklini tanımlar.
    laundry_wash_accessory_type:
      name: Çamaşır yıkama aksesuarı türü
      description: Çamaşır torbası veya çerçevesinin belirli türünü tanımlar.
    lawn_aerator_type:
      name: Çim havalandırma aleti tipi
      description: Çim havalandırma makinelerini temel çalışma tasarımlarına veya
        şekillerine göre sınıflandırır.
    lawn_mower_belt_type:
      name: Çim biçme makinesi kayış tipi
      description: Kayışın yapısal tasarımını veya profilini sınıflandırır.
    lawn_mower_blade_type:
      name: Çim biçme makinesi bıçak tipi
      description: Çim biçme makinesi bıçağının kesme veya kaldırma tasarımını ve
        kullanım amacını belirtir.
    lawn_spreader_type:
      name: Çim serpme makinesi tipi
      description: Çim/bahçe gübre serpme makinesinin mekanik veya konfigürasyon stilini
        belirtir (örneğin serpme veya düşürmeli tip).
    lawn_tractor_tread_type:
      name: Çim biçme traktörü lastik tipi
      description: Belirli yüzeyler veya çekiş ihtiyaçları için tasarlanmış lastik
        desenini tanımlar.
    lid_features:
      name: Kapak özellikleri
      description: Kapak üzerindeki, yemek pişirme veya temizlik kolaylığı sağlayan
        özel işlevsel unsurları vurgular.
    lid_vent_type:
      name: Kapak havalandırma tipi
      description: Kapağın buharın çıkmasına izin verip vermediğini ve nasıl izin
        verdiğini gösterir.
    lift_mechanism:
      name: Kaldırma mekanizması
      description: Perde veya storun yukarı, aşağı veya eğimli konuma getirilmesi
        için kullanılan çalıştırma mekanizmasını belirtir.
    light_exposure_requirement:
      name: Işık gereksinimi
      description: Ekosistemin aşırı ısınmadan veya organizmaları strese sokmadan
        sağlıklı kalabilmesi için ihtiyaç duyduğu ışık seviyesini belirtir.
    liner_installation_method:
      name: Astar kurulum yöntemi
      description: Astarın yüzeyde nasıl yerinde kaldığını açıklar.
    lint_roller_type:
      name: Tüy toplama rulosu tipi
      description: Tüy toplama rulosunun temizleme mekanizmasını veya tasarımını sınıflandırır.
    live_trap_design:
      name: Canlı yakalama tuzağı tasarımı
      description: Tuzağın genel yapısal tarzını sınıflandırır
    lock_keying_option:
      name: Kilit anahtarlama seçeneği
      description: Kilidin nasıl anahtarlanacağını belirtir; tek anahtarla birden
        fazla kilit veya her kilit için ayrı anahtar gereksinimini karşılamaya yardımcı
        olur.
    lubricant_requirement:
      name: Yağlama gereksinimi
      description: Bileme sırasında önerilen veya gerekli olan yağlayıcı türünü belirtir.
    lunch_set_items_included:
      name: Öğle yemeği setine dahil olan ürünler
      description: Öğle yemeği kutusu setinde bulunan bireysel bileşenleri listeler.
    machete_blade_style:
      name: Pala bıçağı tarzı
      description: Pala bıçağının geleneksel bölgesel veya işlevsel stilini belirtir.
    map_style:
      name: Harita stili
      description: Küre üzerinde gösterilen kartografik stili veya tematik odak noktasını
        tanımlar.
    masher_head_design:
      name: Ezici başlık tasarımı
      description: Ezme yüzeyinin tasarımını sınıflandırır; bu tasarım doku ve gereken
        eforu etkiler.
    mattress_protector_features:
      name: Yatak koruyucu özellikleri
      description: Yatak koruyucularına özgü işlevsel veya koruyucu özellikleri vurgular;
        alıcının su geçirmezlik veya hipoalerjenik malzemeler gibi niteliklere göre
        filtreleme yapmasını sağlar.
    measuring_spoon_features:
      name: Ölçü kaşığı özellikleri
      description: Ölçü kaşığının/kaşıklarının özel tasarım veya işlevsel özelliklerini
        vurgular.
    meat_tenderizer_face_type:
      name: Et yumuşatıcı yüzey tipi
      description: Et yumuşatma başlığının çalışma yüzeyinin dokusunu tanımlar.
    meat_tenderizer_mechanism:
      name: Et yumuşatıcı mekanizması
      description: Et yumuşatıcısının temel çalışma mekanizmasını sınıflandırır.
    medical_specialty:
      name: Tıbbi uzmanlık
      description: Ekipmanın hangi tıbbi uzmanlık alanı veya sağlık disiplini için
        tasarlandığını belirtir
    merv_rating:
      name: MERV derecelendirmesi
      description: Filtrenin çeşitli boyutlardaki parçacıkları yakalama yeteneğini
        gösteren Minimum Verimlilik Raporlama Değeri’ni (MERV) tanımlar.
    microwave_compatibility:
      name: Mikrodalgaya uygunluk
      description: Ürünün mikrodalga fırında güvenle kullanılıp kullanılamayacağını
        belirtir.
    microwave_oven_functions:
      name: Mikrodalga fırın fonksiyonları
      description: Önceden ayarlanmış veya gelişmiş pişirme modlarını listeler; konveksiyon,
        ızgara, sensörlü pişirme gibi özelliklere sahip modellerin bulunmasını sağlar.
    milk_frother_type:
      name: Süt köpürtme makinesi tipi
      description: Ürünü köpürtme mekanizmasına veya form faktörüne göre sınıflandırır.
    milk_frothing_method:
      name: Süt köpürtme yöntemi
      description: Sütü köpürtmek için kullanılan teknolojiyi veya mekanizmayı belirtir.
    milk_frothing_system:
      name: Süt köpürtme sistemi
      description: Makinenin sunduğu süt köpürtme veya buharlaştırma mekanizmasının
        türünü belirtir.
    mirror_curvature:
      name: Ayna eğriliği
      description: Yansıtıcı yüzeyin eğriliğini belirtir; bu durum görüş açısını ve
        görüntü bozulmasını etkiler.
    mirror_type:
      name: Ayna tipi
      description: Aynanın genel stilini veya işlevsel kategorisini sınıflandırır.
    mist_output_mode:
      name: Sis çıkış modu
      description: Difüzörde bulunan seçilebilir sis desenlerini veya yoğunluk ayarlarını
        gösterir.
    mixing_bowl_features:
      name: Karıştırma kabı özellikleri
      description: Kullanım kolaylığını ve bakımını etkileyen kabın özel işlevsel
        özelliklerini vurgular.
    mixing_mechanism:
      name: Karıştırma mekanizması
      description: Salata sosu malzemelerini karıştırmak için kullanılan iç mekanizmayı
        açıklar.
    mochi_maker_functions:
      name: Mochi makinesi fonksiyonları
      description: Cihazın desteklediği dahili çalışma modlarını veya programlarını
        listeler.
    mode_of_action:
      name: Etki mekanizması
      description: Mantar ilacının nasıl etki ettiğini gösterir; temas yoluyla etki
        eden koruyucuları sistemik veya translaminar ürünlerden ayırır.
    moisture_absorber_form:
      name: Nem emici form
      description: Ürünün fiziksel formatını tanımlar; alıcının askılı torbalar, kaplar,
        paketler vb. seçenekler arasından seçim yapmasını sağlar.
    money_retrieval_method:
      name: Para geri alma yöntemi
      description: Kumbaradan biriktirilen paranın nasıl çıkarıldığını açıklar.
    mop_head_type:
      name: Paspas başlığı tipi
      description: Paspas başlığının veya yedek başlığın yapısal tasarımını gösterir
        ve alıcının temizlik ihtiyaçlarına uygun doğru modeli bulmasına yardımcı olur.
    mop_wringing_mechanism:
      name: Paspas sıkma mekanizması
      description: Paspastan fazla sıvının nasıl uzaklaştırıldığını gösterir ve alıcının
        tercih ettiği sıkma stilini seçmesine yardımcı olur.
    mounting_bolt_pattern:
      name: Montaj cıvata deseni
      description: Mil gövdesindeki montaj cıvata deliklerinin sayısını ve düzenini
        belirtir (örneğin, 3 cıvatalı üçgen, 4 cıvatalı kare).
    mouthpiece_shape:
      name: Ağızlık şekli
      description: Sigara tutacağının ağızlık kısmının şeklini belirtir.
    mower_deck_material:
      name: Çim biçme makinesi tabla malzemesi
      description: Çim biçme makinesi tablasının yapım malzemesini belirtir; bu malzeme
        dayanıklılığı ve ağırlığı etkiler.
    mulch_form:
      name: Malç formu
      description: Malçın fiziksel şeklini veya kıvamını tanımlar.
    nap_mat_items_included:
      name: Uyku matına dahil olan ürünler
      description: Uyku matıyla birlikte gelen belirli bileşenleri veya aksesuarları
        listeler.
    napkin_edge_finish:
      name: Peçete kenarı bitişi
      description: Peçetenin kenarına veya etek kısmına uygulanan dikiş veya dekoratif
        bitişi belirtir.
    noodle_core_design:
      name: Erişte iç yapı tasarımı
      description: Eriştenin iç kısmının dolu mu yoksa içi boş mu olduğunu belirtir.
    nozzle_adjustability:
      name: Meme ayarlanabilirliği
      description: Püskürtme deseninin veya akış hızının değiştirilmesi için memenin
        ayarlanıp ayarlanamayacağını gösterir.
    nozzle_material:
      name: Meme malzemesi
      description: Püskürtme nozullarının dayanıklılık ve tıkanmaya karşı direnç açısından
        malzemesini belirtir.
    nozzle_style:
      name: Nozul stili
      description: Tüpün uç kısmının işlevsel şeklini veya stilini belirtir.
    nozzle_types_included:
      name: Dahil edilen nozul tipleri
      description: Bu, kurutma makinesiyle birlikte verilen nozulların şekil/stillerini
        listeler ve alıcının hangi ürün formlarını oluşturabileceğini bilmesine yardımcı
        olur.
    number_of_compartments:
      name: Bölme sayısı
      description: Atık kabında atık veya geri dönüştürülebilir malzemeleri ayrıştırmak
        için kaç ayrı bölüm bulunduğunu gösterir.
    numeral_style:
      name: Rakam stili
      description: Saat kadranındaki rakamların görsel stilini veya varlığını tanımlar.
    oil_dispenser_spout_design:
      name: Yağ dağıtıcı ağızlık tasarımı
      description: Ağızlık veya nozulun stilini tanımlar; bu tasarım akış kontrolünü
        ve damlamayı önlemeyi etkiler.
    organizer_application:
      name: Düzenleyici kullanım amacı
      description: Bu düzenleyici ek parçanın hangi tür eşyaları saklamak için tasarlandığını
        belirtir.
    ornament_hook_style:
      name: Süs eşyası kanca stili
      description: Süs eşyalarını asmak için kullanılan kancanın stilini veya şeklini
        tanımlar.
    oscillation_mode:
      name: Salınım modu
      description: Fanın havayı dağıtmak için salınım yapıp yapmadığını ve nasıl salınım
        yaptığını açıklar.
    oscillation_type:
      name: Salınım tipi
      description: Fanın salınım yapıp yapmayacağını ve nasıl salınım yapacağını belirterek,
        geniş hava sirkülasyonuna ihtiyaç duyan alıcılara yardımcı olur.
    outdoor_grill_rack_type:
      name: Dış mekan ızgara rafı tipi
      description: Rafın işlevsel stilini belirterek, kullanım amacını ve pişirme
        işlevini açıklar.
    oxygen_indicator_type:
      name: Oksijen gösterge tipi
      description: Emici paketin hâlâ aktif olup olmadığını gösteren görsel bir göstergenin
        bulunup bulunmadığını ve ne tür bir gösterge olduğunu belirtir.
    pad_cleaning_action:
      name: Ped temizleme işlevi
      description: Pedin temel temizleme işlevini veya elde edilen nihai sonucu tanımlar.
    pan_bottom_type:
      name: Tava tabanı tipi
      description: Tavanın çıkarılabilir tabanlı mı yoksa sabit, yekpare tabanlı mı
        olduğunu gösterir.
    pan_perforation_type:
      name: Tava delik tipi
      description: Tavanın tabanının veya yanlarının sıvı tahliyesine izin verecek
        şekilde düz mü yoksa delikli mi olduğunu gösterir.
    parasol_opening_mechanism:
      name: Şemsiye açma mekanizması
      description: Şemsiye kubbesinin nasıl açılıp kapandığını açıklar.
    parchment_paper_coating:
      name: Parşömen kâğıdı kaplaması
      description: Yapışmazlık özelliği sağlamak için parşömen kâğıdına uygulanan
        yüzey işlemini tanımlar.
    particle_size_grade:
      name: Parçacık boyutu derecesi
      description: Vermikülitin granül boyut sınıflandırmasını tanımlar; bu sınıflandırma
        havalandırma ve su tutma özelliklerini etkiler.
    patio_heater_safety_features:
      name: Veranda ısıtıcısı güvenlik özellikleri
      description: Kazaları önlemek ve güvenli çalışmayı sağlamak için tasarlanmış
        yerleşik güvenlik mekanizmalarını vurgular.
    pattern_match_type:
      name: Desen eşleşme türü
      description: Kurulum sırasında desenin şeritler arasında nasıl hizalanması gerektiğini
        belirtir.
    pendulum_compatibility:
      name: Sarkaç uyumluluğu
      description: Mekanizmanın bir sarkaçı çalıştırıp çalıştıramayacağını ve sarkaçın
        dahil olup olmadığını gösterir.
    perch_design:
      name: Tünek tasarımı
      description: Tünek yapısının stilini veya biçimini tanımlar.
    perch_surface_texture:
      name: Tünek yüzey dokusu
      description: Tüneğin tutuşu ve tırnak aşınmasını etkileyen yüzey dokusunu veya
        bitişini tanımlar.
    pet_safety:
      name: Evcil hayvan güvenliği
      description: Bitkinin yaygın evcil hayvanlar için zehirli olup olmadığını gösterir.
    pet_toxicity:
      name: Evcil hayvan toksisitesi
      description: Bitkinin yaygın evcil hayvanlar için zehirli olup olmadığını belirtir
        ve evcil hayvan sahipleri için güvenliği sağlar.
    ph_adjustment_direction:
      name: pH ayarlama yönü
      description: Ürünün çözeltinin pH seviyesini yükseltmek (pH Up) veya düşürmek
        (pH Down) amacıyla formüle edildiğini gösterir.
    pie_pan_edge_style:
      name: Turta kalıbı kenar stili
      description: Kenar tasarımının hamurun görünümünü ve kalıptan çıkarma kolaylığını
        nasıl etkilediğini açıklar.
    pin_shape:
      name: Pim şekli
      description: Kumaşı sabitleyen pimin genel şeklini tanımlar.
    pipe_connection_method:
      name: Boru bağlantı yöntemi
      description: Montaj uyumluluğunu sağlamak için boru dirseğinin uçlarındaki bağlantı
        stilini (örneğin, erkek, dişi, geçmeli, dişli) belirtir.
    piping_tip_shape:
      name: Krema sıkma ucu şekli
      description: Süsleme uçlarının şeklini veya tasarımını tanımlar.
    pitcher_spout_style:
      name: Sürahi ağızlık stili
      description: Latte sanatının hassasiyetini ve dökme kontrolünü etkileyen ağızlık
        tasarımını tanımlar.
    pizza_cutter_design:
      name: Pizza kesici tasarımı
      description: Pizza kesicinin yapısal stilini belirleyerek, farklı kesme mekanizmaları
        arasında seçim yapmalarına yardımcı olur.
    pizza_pan_style:
      name: Pizza tavası stili
      description: Pizza tavasının yapım/tasarım stilini, hamurun nasıl piştiğini
        ve hangi pizza çeşidi için uygun olduğunu belirtir.
    plant_care_difficulty:
      name: Bitki bakımı zorluğu
      description: Bitkinin bakımı için gereken özen seviyesini gösterir ve hem yeni
        başlayanların hem de uzmanların uygun seçim yapmasına yardımcı olur.
    plant_container_type:
      name: Bitki kabı tipi
      description: Yapay çalıyla birlikte verilen saksı veya kap türünü belirtir (varsa).
    plant_life_cycle:
      name: Bitki yaşam döngüsü
      description: Bitkinin tek yıllık, iki yıllık veya çok yıllık olup olmadığını
        gösterir.
    planter_material:
      name: Saksı malzemesi
      description: Ürünle birlikte verilen saksı/bitki kabının malzemesini belirtir.
    plate_coupling_pattern:
      name: Plaka bağlantı deseni
      description: Mikrodalganın döner tabla motor bağlantı elemanıyla eşleşen ve
        doğru dönüşü sağlayan alt göbek konfigürasyonunu belirtir.
    plate_purpose:
      name: Tabağın amacı
      description: Çim biçme makinesi sisteminde plakanın işlevsel rolünü tanımlar.
    plate_style:
      name: Tabak stili
      description: Yemek takımı tabağının belirli stilini veya kullanım amacını tanımlar.
    pole_construction_type:
      name: Direk yapı tipi
      description: Direğin yapısal stilini tanımlar ve bu kurulumu ve taşınabilirliği
        etkiler.
    pool_chemical_type:
      name: Havuz kimyasalı türü
      description: Havuz bakım ürününün temel işlevini veya kimyasal yapısını sınıflandırır.
    pool_filter_type:
      name: Havuz filtresi tipi
      description: Havuz veya spa filtresinin kullandığı filtrasyon teknolojisini
        veya yapım tarzını tanımlar.
    pool_game_type:
      name: Havuz oyunu türü
      description: Ürünün havuzda hangi tür oyun veya spora olanak sağladığını belirtir.
    pool_ladder_design:
      name: Havuz merdiveni tasarımı
      description: Havuz merdiveninin genel yapısal tasarımını sınıflandırır.
    pool_liner_installation_style:
      name: Havuz astarı montaj stili
      description: Havuz astarının havuz duvarına sabitlenmesinde kullanılan bağlantı
        yöntemini tanımlar.
    pool_lounge_style:
      name: Havuz şezlongu tarzı
      description: Havuz şezlongunun yapısal tarzını görsel veya işlevsel filtreleme
        amacıyla sınıflandırır.
    pool_lounger_features:
      name: Havuz şezlongu özellikleri
      description: Şezlonga işlevsellik veya konfor katan özel yerleşik özellikleri
        vurgular.
    pool_skimmer_type:
      name: Havuz temizleyici tipi
      description: Sıyırıcının tasarımını sınıflandırarak alıcının el ağları ile otomatik
        veya yüzer sıyırıcıları karşılaştırmasına yardımcı olur.
    pool_toy_features:
      name: Havuz oyuncağı özellikleri
      description: Havuz oyuncaklarına özgü dikkat çekici işlevsel veya tasarım özelliklerini
        vurgular.
    pool_type:
      name: Havuz tipi
      description: Yüzme havuzunun yapısal tarzını sınıflandırır.
    pool_vacuum_type:
      name: Havuz süpürgesi tipi
      description: Havuz süpürgesinin çalışma şeklini veya tahrik mekanizmasını belirtir.
    popcorn_kernel_variety:
      name: Patlamış mısır tanesi çeşidi
      description: Mısır tanesinin doğal çeşidini veya şeklini belirtir.
    portafilter_type:
      name: Portafilter tipi
      description: Portafiltrenin yapısal stilini belirler ve bu da ekstraksiyon yöntemini
        ve iş akışını etkiler.
    post_installation_method:
      name: Direk montaj yöntemi
      description: Posta kutusu direğinin nasıl monte edildiğini veya yerine nasıl
        sabitlendiğini tanımlar.
    pour_spout_design:
      name: Dökme ağzı tasarımı
      description: Dökme ağzının akış kontrolünü etkileyen özel özelliklerini veya
        stilini belirtir.
    pour_spout_style:
      name: Dökme ağzı tarzı
      description: Dağıtıcının dökme ağzının tasarımını ve bunun akış kontrolünü ve
        damlama direncini nasıl etkilediğini açıklar.
    power_equipment_hitch_type:
      name: Güç ekipmanı bağlantı tipi
      description: Bu eklentinin traktörlere veya güç ünitelerine monte edilmesi için
        kullanılan bağlantı arayüzünü tanımlar.
    predator_guard_style:
      name: Yırtıcı hayvan koruyucu stili
      description: Koruyucunun yapısal tasarımını sınıflandırarak alıcının koni, disk,
