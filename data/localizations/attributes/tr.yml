    steam_table_pan_size_compatibility:
      name: Buharlı pişirme tavası boyut uyumluluğu
      description: Cihazın alabileceği gastronorm veya standart tencere boyutlarını
        listeler.
    steam_table_pan_type:
      name: Buharlı servis tepsisi tipi
      description: Su tahliyesi ve ısıtma performansını etkileyen tavanın yapım tarzını
