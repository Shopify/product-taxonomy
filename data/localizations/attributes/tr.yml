    food_dehydrator_tray_type:
      name: Gıda kurutucu tepsi tipi
      description: Tepsinin belirli stilini veya işlevsel tasarımını tanımlar.
    food_grater_type:
      name: Yiyecek rendesi tipi
      description: Rendenin yapısal stilini tanımlar.
    food_processor_attachments_included:
      name: Dahil olan mutfak robotu aparatları
      description: Set içinde bulunan aparat türlerini listeler; kullanıcıların hangi
        işlevleri elde edeceklerini net şekilde görmelerini sağlar.
    food_storage_bag_features:
      name: Gıda saklama poşetinin özellikleri
      description: Çantanın dikkat çekici işlevsel özelliklerini vurgular.
    food_storage_bag_type:
      name: Gıda saklama poşeti tipi
      description: Gıda saklama poşetinin temel stilini veya kullanım amacını belirtir.
    food_storage_features:
      name: Gıda saklama özellikleri
      description: Gıda saklama ürününe işlevsellik veya kullanım kolaylığı katan
        özel özellikleri vurgular.
    food_wrap_features:
      name: Gıda sarma özellikleri
      description: Kullanımı ve sürdürülebilirliği etkileyen özel özellikleri vurgular.
    footwear_type_compatibility:
      name: Ayakkabı türü uyumluluğu
      description: Şekillendiricinin hangi ayakkabı türü için tasarlandığını belirtir.
    formulation_concentration:
      name: Formülasyon konsantrasyonu
      description: Ürünün konsantre mi yoksa kullanıma hazır formülasyon mu olduğunu
        belirtir.
    fountain_design:
      name: Çeşme tasarımı
      description: Çeşmenin yapısal stilini veya biçim faktörünü sınıflandırır.
    fragrance_oil_application:
      name: Koku yağı kullanım alanı
      description: Yağ için önerilen veya yaygın kullanım şeklini belirtir, kendin
        yap ve hobi amaçlı kullanıcılarının doğru formülasyonu seçmesine yardımcı
        olur.
    fragrance_oil_composition:
      name: Koku yağı bileşimi
      description: Formülasyonun tamamen doğal uçucu yağ mı, sentetik koku yağı mı
        yoksa her ikisinin karışımı mı olduğunu gösterir.
    fragrance_refill_type:
      name: Koku dolum tipi
      description: Difüzörün kabul ettiği koku dolum kartuşlarının biçimini tanımlar.
    freezer_configuration:
      name: Dondurucu kanfigürasyonu
      description: Dondurucu ünitesinin fiziksel yönelimini/tasarım stilini tanımlar.
    freezing_method:
      name: Dondurma yöntemi
      description: Dondurma makinesinin karışımı dondurmak için kullandığı teknolojiyi
