    hygrometer_type:
      name: Higrometre tipi
      description: Puro kutusuyla birlikte verilen higrometrenin türünü belirtir (varsa).
    ice_bucket_accessories_included:
      name: Buz kovasına dahil olan aksesuarlar
      description: Buz kovasıyla birlikte verilen ek bar gereçlerini listeler.
    ice_bucket_insulation:
      name: Buz kovası yalıtımı
      description: Buz kovasının duvar yapısını veya yalıtım seviyesini gösterir;
