        böylece alıcılar tam olarak ne aldıklarını bilir ve setleri kolayca karşılaştırabilir.
    firewood_seasoning:
      name: Yakacak odun kuruluk durumu
      description: Odunun kuruluk durumunu belirtir; nem oranını, tutuşma kolaylığını
        ve ısı verimliliğini etkiler.
    flag_attachment_style:
      name: Bayrak bağlantı stili
      description: Bayrağın veya rüzgar tulumunun bir direğe veya montaj noktasına
        nasıl sabitleneceğini açıklar.
    flame_adjustment:
      name: Alev ayarı
      description: Alev yoğunluğunun ayarlanıp ayarlanamayacağını ve nasıl ayarlanabileceğini
        gösterir.
    flask_insulation_type:
      name: Şişe yalıtım tipi
      description: Şişenin ısı muhafazasını etkileyen, ısı yalıtım yapısını gösterir.
    flatware_finish:
      name: Çatal bıçak takımı yüzey kaplaması
      description: Çatal bıçak takımının yüzey kaplamasını veya parlaklığını tanımlar;
        estetiği ve çizik görünürlüğünü etkiler.
    floor_protection_transparency_level:
      name: Zemin koruma şeffaflık seviyesi
      description: Filmin veya şeridin ne kadar saydam olduğunu gösterir; bu, saydamdan
        opaklığa kadar değişir.
    floor_scrubber_brush_type:
      name: Zemin temizleme fırçası tipi
      description: Temizleme makinesinin kullandığı birincil fırça veya ped konfigürasyonunu
        tanımlar.
    floor_surface_compatibility:
      name: Zemin yüzeyi uyumluluğu
      description: Koruyucunun hangi zemin yüzey malzemeleri için güvenli olduğunu
        ve hangi malzemeleri korumak üzere tasarlandığını belirtir.
    flow_control_type:
      name: Akış kontrol tipi
      description: Su çıkışını ayarlamak için ayarlanabilir bir mekanizma içerip içermediğini
        belirtir.
    flue_outlet_position:
      name: Baca çıkış konumu
      description: Baca çıkışının soba gövdesinden nerede çıktığını belirtir; montaj
        düzenini ve baca bağlantısını etkiler.
    flue_pipe_connection_type:
      name: Baca borusu ilişkisi tipi
      description: Bu, uzantının diğer duman yönetimi bileşenlerine bağlanmasında
        kullanılan birleştirme mekanizmasını açıklar.
    fluorescent_tube_output_type:
      name: Floresan tüp çıkış tipi
      description: Floresan lambanın çıkış alt tipini belirtir; bu, balast uyumluluğu
        ve parlaklık açısından önemlidir.
    fly_swatter_type:
      name: Sinek öldürücü tipi
      description: Sinek öldürücü aletin çalışma şeklini veya mekanizmasını belirtir.
    foil_duty_rating:
      name: Folyo kullanım amacı değerlendirmesi
      description: Folyonun kullanım amacına uygun olarak mukavemetini veya kalitesini
        sınıflandırır.
    foliage_color:
      name: Yaprak rengi
      description: Bitkinin yapraklarının baskın rengini belirtir; çiçek rengi dışında
