      description: Tohum çimlenmesi ve büyümesi için sağlanan substrat türünü belirler.
    growth_habit:
      name: Büyüme alışkanlığı
      description: Bitkinin genel formunu tanımlar ve aralık ile saksı seçimi konusunda
