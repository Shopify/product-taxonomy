    media_format:
      name: Medya Formatı
      description: Bir cihaz için vinil veya VHS gibi uyumlu medya formatlarını tanımlar
    media_physical_size:
      name: Medya fiziksel boyutu
      description: Boş medyanın standartlaştırılmış fiziksel boyutunu veya form faktörünü
