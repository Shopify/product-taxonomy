      description: Can yeleklerinin yansıtıcı veya yüzer gibi benzersiz özelliklerini
        vurgular
    light_attachment_type:
      name: Hafif bağlantı türü
      description: Bir kitap ışığının esnek veya sabit gibi nasıl takıldığını açıklar
    light_color:
