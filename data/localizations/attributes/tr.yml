    straw_dispensing_mechanism:
      name: Pipet dağıtım mekanizması
      description: Pipetlerin nasıl dağıtıldığını açıklar ve belirli hijyen veya kullanım
        kolaylığı özellikleri arayan müşterilere yardımcı olur.
    sugar_dispenser_mechanism:
      name: Şeker dağıtım mekanizması
      description: Şekerin kaptan nasıl döküldüğünü açıklar ve alıcının tercih ettiği
        dökme stilini seçmesine yardımcı olur.
    suitable_for_pool_shape:
      name: Uygun havuz şekli
      description: Bu aksesuarın hangi havuz şekilleriyle kullanılabileceğini göstererek
        kullanıcıların doğru uyumu sağlamasına yardımcı olur.
    suitable_pool_surface_type:
      name: Uygun havuz yüzey tipi
      description: Fırçanın/süpürgenin hangi havuz yüzey malzemeleri için tasarlandığını
        belirleyerek yüzey hasarını önler ve optimum temizlik sağlar.
    suitable_spread_material:
      name: Uygun serpme malzemesi
      description: Serpme aletinin hangi tür malzemeleri dağıtmak üzere tasarlandığını
        belirtir.
    sundial_type:
      name: Güneş saati tipi
      description: Güneş saatinin tasarım stilini veya bilimsel yapısını tanımlar.
    supplement_function:
      name: Takviye işlevi
      description: Takviyeleri temel kullanım amaçlarına göre sınıflandırarak, yetiştiricilerin
        belirli bitki ihtiyaçları için doğru katkı maddesini seçmelerine yardımcı
        olur.
    surface_reflectivity:
      name: Yüzey yansıtıcılığı
      description: Levha yüzeyinin gece görüşünü iyileştirmek için ışığı yansıtacak
        şekilde tasarlanıp tasarlanmadığını gösterir.
    sweetener_type:
      name: Tatlandırıcı türü
      description: Şurupta kullanılan başlıca tatlandırıcıyı tanımlar.
    table_skirt_pleat_style:
      name: Masa eteği pile stili
      description: Eteğin dekoratif pileleme veya büzme stilini tanımlayarak alıcının
        estetik temaları eşleştirmesine yardımcı olur.
    tablecloth_clip_design:
      name: Masa örtüsü klipsi tasarımı
      description: Masa örtüsü klipsinin mekanizmasını veya stilini tanımlar.
    tablecloth_features:
      name: Masa örtüsü özellikleri
      description: Masa örtüsünün özel performans veya tasarım özelliklerini vurgular.
    tamper_evident_feature:
      name: Kurcalamaya karşı koruma özelliği
      description: Kapakta bulunan kurcalamaya karşı koruma özelliğinin varlığını
        ve türünü gösterir.
    tang_type:
      name: Sap tipi
      description: Bıçağın sap ıtasarımını belirtir ve bıçak metalinin sapın içine
        ne kadar uzandığını gösterir.
    teapot_spout_style:
      name: Çaydanlık ağız stili
      description: Çaydanlığın dökme ağzının tasarımını, dökme kontrolünü ve estetiğini
        etkileyen yönleriyle açıklar.
    temperature_zones:
      name: Sıcaklık bölgeleri
      description: Şarap buzdolabının kaç adet bağımsız olarak kontrol edilebilir
        sıcaklık bölgesi sağladığını belirtir.
    thermocouple_junction_type:
      name: Termokupl bağlantı tipi
      description: Algılama bağlantısının yapısını gösterir ve tepki süresini ve elektriksel
        izolasyonu etkiler.
    thermometer_design:
      name: Termometre tasarımı
      description: Ev tipi termometrenin temel çalışma şeklini veya teknolojisini
        belirtir.
    thermos_handle_type:
      name: Termos tutma kolu tipi
      description: Termosa entegre edilmiş tutma kolu veya taşıma aparatının stilini
        tanımlar.
    thread_standard:
      name: Diş standardı
      description: Aksesuarın bağlantılarında kullanılan diş (vida) standardını tanımlayarak,
        tesisat bileşenleriyle uyumluluğu sağlar.
    tilt_mechanism:
      name: Eğme mekanizması
      description: Tentenin optimum gölge konumu için eğilmesini sağlayan mekanizmayı
        belirtir.
    time_format:
      name: Zaman formatı
      description: Saatin 12 saatlik, 24 saatlik veya her iki formatta da zamanı gösterip
        gösteremeyeceğini belirtir.
    timer_mechanism:
      name: Zamanlayıcı mekanizması
      description: Zamanı ölçmek için kullanılan temel mekanizmayı tanımlar.
    tine_position:
      name: Tırnak konumu
      description: Tırmık uçlarının tekerlekler/motorla olan konumunu tanımlar; bu
        konum manevra kabiliyetini ve toprak penetrasyonunu etkiler.
    tire_construction:
      name: Lastik yapısı
      description: Lastik gövdesinin iç yapım yöntemini tanımlar.
    tire_construction_type:
      name: Lastik yapı tipi
      description: Lastiğin çapraz katmanlı mı yoksa radyal yapıda mı olduğunu belirler;
        bu da esnekliği, kapasiteyi ve Ride kalitesini etkiler.
    tire_tread_pattern:
      name: Lastik diş deseni
      description: Lastiğin diş deseninin stilini tanımlar ve farklı çim türleri ve
        çekiş ihtiyaçları için uygunluğunu belirtir.
    tissue_lotion_content:
      name: Mendil losyonu içeriği
      description: Mendillerin losyon veya diğer yatıştırıcı katkı maddeleriyle emdirilip
        emdirilmediğini gösterir.
    toaster_features:
      name: Ekmek kızartma makinesi özellikleri
      description: Ekmek kızartma makinesinde bulunan özel işlevleri ve tasarım öğelerini
        listeler.
    tong_type:
      name: Maşa tipi
      description: Maşanın asıl kullanım amacını veya stilini belirtir.
    toothbrush_holder_features:
      name: Diş fırçası tutucu özellikleri
      description: Tutucuyu diğerlerinden ayıran özel işlevleri veya tasarım unsurlarını
        vurgular.
    toothpick_dispensing_mechanism:
      name: Kürdan dağıtım mekanizması
      description: Kürdanların nasıl dağıtıldığını açıklayan mekanizmayı tanımlar.
    topographical_relief:
      name: Topografik kabartma
      description: Küre yüzeyinin yükselti özelliklerine sahip olup olmadığını gösterir.
    towel_holder_design:
      name: Havlu askısı tasarımı
      description: Havlu askısının yapısal stilini tanımlar; örneğin, çubuk veya halka
        şeklinde olması gibi.
    towel_weave:
      name: Havlu dokuma tipi
      description: Havlu kumaşının yapısını veya dokuma stilini tanımlar; bu da dokusunu,
        emiciliğini ve kuruma süresini etkiler.
    track_lighting_rail_type:
      name: Raylı aydınlatma ray tipi
      description: Rayın mekanik/elektrik standardını tanımlar ve hangi armatür ve
        bağlantı elemanlarının uyumlu olduğunu belirler.
    track_lighting_system_compatibility:
      name: Raylı aydınlatma sistemi uyumluluğu
      description: Armatürün veya aksesuarın tasarlandığı elektriksel ve mekanik ray
        standardını belirtir.
    track_rail_circuit_configuration:
      name: Ray devre konfigürasyonu
      description: Rayın desteklediği elektrik devresi sayısını veya türünü belirtir
        ve bu da armatür gruplarının bağımsız kontrolünü etkiler.
    track_system_standard:
      name: Ray sistemi standardı
      description: Güç beslemesinin uyduğu fiziksel ray standardını belirler ve alıcının
        bileşenleri ray tipiyle (örneğin, H, J veya L ray) eşleştirmesine olanak tanır.
    tractor_tire_application:
      name: Traktör lastiği kullanım alanı
      description: Lastiğin öncelikle hangi kullanım alanı veya ortam için tasarlandığını
        gösterir.
    tractor_tire_tread_classification:
      name: Traktör lastiği diş deseni sınıflandırması
      description: Traktör lastiklerinin diş desenlerini tarımsal ve endüstriyel standartlara
        göre sınıflandırır.
    tree_shape:
      name: Ağaç şekli
      description: Yapay bir ağacın genel silüetini veya profilini tanımlar.
    trigger_type:
      name: Tetik tipi
      description: Püskürtme nozulunda su akışını kontrol etmek için kullanılan tetik
        mekanizmasını belirtir.
    trimmer_line_feed_system:
      name: Çim biçme makinesi misina besleme sistemi
      description: Çalışma sırasında misinanın başlıktan nasıl ilerletildiğini belirtir.
    trimmer_line_shape:
      name: Misina kesit şekli
      description: Çim biçme makinesi misinasının kesit şeklini tanımlar; bu şekil
        kesme performansını ve gürültüyü etkiler.
    turntable_type:
      name: Döner tabla tipi
      description: Pişirme yüzeyinin stilini belirler; geleneksel döner cam tablalar
        ile düz tabanlı veya dönmeyen tasarımları ayırt eder.
    ultrasonic_cleaner_accessories_included:
      name: Dahil oln ultrasonik temizleyici aksesuarları
      description: Temizleyiciyle birlikte verilen ek bileşenleri listeler; böylece
        alıcı kutunun içinde tam olarak ne olduğunu bilir.
    umbrella_base_type:
      name: Şemsiye taban tipi
      description: Tabanın yapısal stilini veya montaj tasarımını tanımlar.
    umbrella_opening_mechanism:
      name: Şemsiye açılma mekanizması
      description: Şemsiye gölgeliğinin nasıl açılıp kapanacağını tanımlar.
    umbrella_type:
      name: Şemsiye tipi
      description: Şemsiyenin genel tasarımını veya form faktörünü belirtir.
    upf_rating:
      name: UPF derecelendirmesi
      description: Şemsiye gölgelik kumaşının ultraviyole koruma faktörünü (UPF) gösterir
        ve zararlı UV ışınlarını engellemedeki etkinliğini nicel olarak ifade eder.
    utensil_flexibility:
      name: Mutfak gereci esnekliği
      description: Kazıyıcı gövdesinin ne kadar sert veya esnek olduğunu gösterir;
        bu durum kavisli kaplar veya sert hamur için uygunluğunu etkiler.
    utensil_holder_features:
      name: Mutfak gereci tutucu özellikleri
      description: Mutfak gereci tutucusunun özel işlevsel özelliklerini tanımlar.
    utensil_tray_features:
      name: Mutfak gereci tepsisi özellikleri
      description: Tepsinin işlevselliğini artıran özel özelliklerini vurgular.
    vacuum_hose_connection_type:
      name: Vakum hortumu bağlantı tipi
      description: Hortum uçlarındaki bağlantı şeklini tanımlar ve vakum makineleri
        veya aksesuarlarla doğru mekanik uyumu sağlar.
    valance_style:
      name: Valans stili
      description: Valansın dekoratif tasarımını belirleyerek kullanıcıların dekorasyonlarına
        uygun bir stil seçmelerine yardımcı olur.
    valet_organizer_features:
      name: Çekmece düzenleyici özellikleri
      description: Şarj istasyonuna entegre edilmiş belirli düzenleme özelliklerini
        vurgular.
    valve_configuration:
      name: Vana konfigürasyonu
      description: Bahçe hortumu vanasının işlevsel stilini tanımlar ve alıcının sulama
        için doğru çözümü hızlı bir şekilde bulmasına yardımcı olur.
    valve_stem_angle:
      name: Valf mili açısı
      description: Valf milinin iç lastiğe göre yönünü/açısını belirtir; bu durum
        şişirme kolaylığını ve jant uyumunu etkiler.
    vase_filler_type:
      name: Vazo dolgu malzemesi türü
      description: Ürünü, dolgu malzemesinin türüne veya şekline göre sınıflandırır.
    vent_pipe_type:
      name: Havalandırma borusu tipi
      description: Baca veya havalandırma borusunun yapım tarzını sınıflandırır.
    vent_style:
      name: Havalandırma stili
      description: Havalandırma bileşeninin yapısal stilini veya amacını sınıflandırır.
    waffle_style:
      name: Waffle stili
      description: Plakaların oluşturduğu waffle ızgara desenini tanımlar.
    wallpaper_removal_type:
      name: Duvar kağıdı sökme türü
      description: Dekorasyon yenilemesi sırasında sökülme kolaylığını gösterir.
    wallpaper_washability_rating:
      name: Duvar kağıdının yıkanabilirlik derecesi
      description: Duvar kağıdı yüzeyinin uygulandıktan sonra nasıl temizlenebileceğini
        tanımlar.
    warmer_type:
      name: Isıtıcı tipi
      description: Mum veya yağ ısıtıcısının birincil ısıtma mekanizmasını veya kullanım
        amacını belirtir.
    warmth_level:
      name: Isı seviyesi
      description: Yorganın veya battaniyenin genel ısı yalıtım seviyesini veya mevsimsel
        uygunluğunu sınıflandırır.
    warmth_rating:
      name: Isı derecesi
      description: Battaniyenin yalıtım seviyesini gösterir (TOG derecelendirmesine
        benzer).
    waste_container_lid_features:
      name: Atık kabı kapağı özellikleri
      description: Kapağa entegre edilmiş özel işlevleri veya geliştirmeleri vurgular.
    waste_container_sign_message:
      name: Atık kabı işaret mesajı
      description: Etiket veya levha üzerinde basılı olan belirli atık türünü veya
        uyarı metnini tanımlar.
    water_filtration_technology:
      name: Su filtreleme teknolojisi
      description: Suyu arıtmak için kullanılan temel teknolojiyi veya mekanizmayı
        tanımlar.
    water_heater_element_connection_type:
      name: Su ısıtıcı elemanı bağlantı tipi
      description: Elemanın montaj şeklini belirler ve vidalı ile çeşitli flanşlı
        montaj şekilleri arasında ayrım yapar.
    water_sensor_design:
      name: Su sensörü tasarımı
      description: Su algılama elemanının fiziksel stilini belirtir.
    water_supply_type:
      name: Su besleme tipi
      description: Cihazın su alma yöntemini belirler ve manuel doldurmalı su hazneleri
        ile şebeke suyu hatları arasında ayrım yapar.
    watering_needs:
      name: Sulama ihtiyaçları
      description: Bitkinin tipik su ihtiyacını tanımlar.
    wax_paper_form:
      name: Mumlu kâğıt formu
      description: Mumlu kâğıdın sürekli rulo halinde mi yoksa önceden kesilmiş yapraklar
        halinde mi satıldığını belirtir.
    weather_guard_mounting_method:
      name: Hava koşullarına karşı koruyucu montaj yöntemi
      description: Koruyucunun yemliğe veya destek yapısına nasıl bağlandığını belirtir.
    wheel_bearing_type:
      name: Tekerlek rulman tipi
      description: Tekerleğin iç rulman veya burç yapısını belirler; bu yapı, yuvarlanma
        düzgünlüğünü ve bakım gereksinimlerini etkiler.
    wheel_tread_style:
      name: Tekerlek sırt deseni
      description: Tekerlek sırt desenini belirtir; bu desen çekişi, gürültü seviyesini
        ve zeminde oluşabilecek izleri etkiler.
    whistling:
      name: Islık özelliği
      description: Su kaynama noktasına ulaştığında su ısıtıcısının düdük sesi çıkarıp
        çıkarmayacağını belirtir.
    wick_material:
      name: Fitil malzemesi
      description: Kullanılan fitilin bileşimini tanımlar (örneğin pamuk, fiberglas).
    window_film_installation_surface:
      name: Pencere filmi uygulama yüzeyi
      description: Filmin iç mekan, dış mekan veya çift yüzey uygulaması için tasarlanıp
        tasarlanmadığını belirtir.
    window_film_type:
      name: Pencere filmi türü
      description: Filmin işlevsel tarzını kategorize eder (örneğin, gizlilik mi yoksa
        güvenlik mi).
    window_rod_type:
      name: Perde çubuğu tipi
      description: Pencere perde çubuğunun işlevsel stilini sınıflandırır.
    window_screen_type:
      name: Pencere sinekliği türü
      description: Sinekliğin yapısal stilini veya çalışma yöntemini tanımlar.
    window_treatment_lining_type:
      name: Pencere perde astar tipi
      description: Perde kenarlığının veya kornişin astarlı olup olmadığını ve hangi
        tür astar kullanıldığını gösterir.
    wine_aerator_type:
      name: Şarap havalandırıcı tipi
      description: Şarap havalandırıcısının şeklini veya çalışma şeklini belirtir.
    wine_glass_style:
      name: Şarap kadehi stili
      description: Aroma ve lezzeti en üst düzeye çıkarmak için amaçlanan şarap türünü
        veya kadeh tasarımını belirtir.
    wok_bottom_type:
      name: Wok taban tipi
      description: Wok tabanının şeklini tanımlayarak farklı ocak üstleri ve wok halkalarıyla
        uyumluluğunu belirler.
    wood_grain_orientation:
      name: Ahşap damar yönü
      description: Üründe ahşap damarlarının yönünü belirtir (örneğin uç damar, kenar
        damar veya yüzey damar). Ahşap damar yönü, dayanıklılığı ve bıçak dostu kullanımını
        etkiler.
    wood_seasoning_method:
      name: Ahşap kurutma yöntemi
      description: Odun yakıtının nasıl kurutulduğunu veya dinlendirildiğini gösterir;
        bu durum nem oranını ve yanma kalitesini etkiler.
    wrap_format:
      name: Ambalaj formu
      description: Gıda ambalajının tedarik edileceği fiziksel formu belirtir; örneğin
        rulo veya önceden kesilmiş tabakalar.
    abacus_bead_material:
      name: Abaküs boncuk malzemesi
      description: Abaküs boncuklarının ana malzemesi.
    abec_rating:
      name: ABEC derecelendirmesi
      description: ABEC derecelendirmelerine göre rulmanların hassasiyet sınıfını
        belirtir ve pürüzsüzlük ile tolerans seviyelerini gösterir.
    abrasive_level:
      name: Aşındırma seviyesi
      description: Otomotiv yüzeylerinde cila/macunun göreceli kesme gücü.
    absinthe_accessories_included:
      name: Dahil olan absent aksesuarları
      description: Ürünle birlikte paketlenmiş olarak gelen kaşık, bardak veya şeker
        küpleri gibi aksesuarları belirtir.
    ac_compressor_mounting_style:
      name: AC kompresör montaj stili
      description: Kompresörün motor/aksesuar tahrik sistemine mekanik montaj/bağlantı
        şeklini veya braket arayüzünü tanımlar.
    ac_compressor_oil_type:
      name: AC kompresör yağı tipi
      description: Klima kompresörünün ihtiyaç duyduğu/kullandığı yağlama yağı kimyasını
        belirtir (yaygın türler arasında PAG ve POE bulunur).
    accent_modes:
      name: Vurgulama modları
      description: Metronomun bir ölçü içindeki vuruşları (temel tıklama sesinin ötesinde)
        nasıl vurgulayabildiğini belirtir.
    access_mechanism:
      name: Erişim mekanizması
      description: Kullanıcının yükseltilmiş uyku platformuna nasıl ulaştığını açıklar.
    accessibility_features:
      name: Erişilebilirlik özellikleri
      description: Minibüs üzerindeki erişilebilirlik ile ilgili ekipman ve konfigürasyonları
        belirtir.
    accessories_included:
      name: Dahil olan aksesuarlar
      description: Sandalyeyle birlikte gelen ek ürünleri (örneğin, ayak taburesi,
        bel yastığı) listeler ve alıcıya katma değer konusunda şeffaf bir görünüm
        sunar.
    accessory_pieces_included:
      name: Aksesuar parçaları dahildir.
      description: Çok parçalı giyim aksesuarı hediye paketi veya setinde yer alan
        aksesuar ürünlerini listeler.
    acoustic_amplifier_feedback_control_features:
      name: Akustik amplifikatör geri bildirim kontrol özellikleri
      description: Akustik enstrümanlar için dahili geri bildirim önleme araçlarını
        (örneğin, çentik filtresi, faz anahtarı, otomatik geri bildirim bastırma)
        gösterir.
    acoustic_drum_kit_components_included:
      name: Akustik davul kiti bileşenleri dahildir.
      description: Kit içerisinde hangi ana bileşenlerin yer aldığını belirtir (yalnızca
        gövde seti mi yoksa komple kit mi; ziller/donanım dahil mi).
    acoustic_guitar_body_shape:
      name: Akustik gitar gövde şekli
      description: Akustik gitarın gövde şeklini/hatlarını tanımlar; bu şekil tonu,
        konforu ve tipik kullanımını etkiler.
    acoustic_guitar_string_core_design:
      name: Akustik gitar tel çekirdek tasarımı
      description: Sarımlı tellerin çekirdek yapısı.
    acoustic_piano_key_material:
      name: Akustik piyano tuşu malzemesi
      description: Piyano tuş üstü/fildişi yüzeylerinde kullanılan ana malzemeyi belirtir.
    acoustic_piano_lid_type:
      name: Akustik piyano kapağı tipi
      description: Akustik piyanolarda kullanılan kapak/örtü mekanizmasının stilini
        belirtir (kuyruklu/dik piyano üst kapağı/kapağı farklılıkları için).
    acoustic_piano_plate_frame_material:
      name: Akustik piyano plaka/çerçeve malzemesi
      description: Piyano plakasının/çerçevesinin (harp) ana malzemesini belirtir;
        genellikle dökme demirdir.
    acoustic_piano_soundboard_material:
      name: Akustik piyano ses tahtası malzemesi
      description: Piyano ses tahtası için kullanılan ana malzemeyi belirtir.
    action_figure_scale:
      name: Aksiyon figürü ölçeği
      description: Aksesuarın uyumlu olması amaçlanan toplayıcı ölçek oranını (örneğin,
        1:12) gösterir.
    action_type:
      name: Eylem türü
      description: Silahın ateşleme veya kurma mekanizmasını tanımlar (örneğin, sürgülü,
        kırma namlulu, kaldıraçlı).
    actuation_mechanism:
      name: Tahrik mekanizması
      description: 'Fren sisteminin kol tarafından nasıl çalıştırıldığını gösterir:
        tamamen mekanik kablolu, tamamen hidrolik, kabloyla çalışan hidrolik veya
        elektronik/kablosuz.'
    actuation_method:
      name: Çalıştırma yöntemi
      description: Bastırma sisteminin nasıl etkinleştirildiğini veya boşaltıldığını
        belirtir.
    adapter_orientation:
      name: Adaptör yönlendirmesi
      description: Bisiklet lastiği supap adaptörünün açısını veya konfigürasyonunu
        belirtir ve pompanın açısını etkiler (örneğin, düz, 90°).
    additive_application_stage:
      name: Katkı maddesi uygulama aşaması
      description: Ürünün süreçte hangi aşamada kullanılmasının planlandığını gösterir.
    adhesive_backing:
      name: Yapışkanlı arka yüzey
      description: Baskı yapılabilir ipeğin, kendinden yapışkanlı uygulama için yapışkan
        bir arka yüzeye sahip olup olmadığı.
    adhesive_formulation:
      name: Yapıştırıcı formülasyonu
      description: Yapıştırıcının kimyasal bazını veya formülasyonunu belirtir (örneğin,
        siyanoakrilat veya epoksi).
    adhesive_sides:
      name: Yapışkan kenarlar
      description: Yapıştırıcı maddenin bandın/şeridin tek tarafında mı yoksa her
        iki tarafında mı olduğunu gösterir.
    adjunct_grain_processing_form:
      name: İlave tahıl işleme formu
      description: Bira yapımında kullanılan ilave tahılın satıldığı fiziksel/işlenmiş
        halini belirtir (örneğin, pul haline getirilmiş, kavrulmuş, maltlanmış, ham).
    adjustability_type:
      name: Ayarlanabilirlik türü
      description: Amortisörün ne tür bir ayarlamayı desteklediğini belirtir.
    adjustable_cup_mutes:
      name: Ayarlanabilir cup susturucuları
      description: Cup susturucunun ayarlanabilir/çıkarılabilir olup olmadığını ve
        ayar şeklini belirtir.
    adjustable_zones:
      name: Ayarlanabilir bölgeler
      description: Tabanın hangi bölümlerinin bağımsız olarak ayarlanabileceğini belirler.
    adjustment_type:
      name: Ayarlama türü
      description: Regülatörün ayarlanabilir olup olmadığını ve ayarlama işleminin
        nasıl yapıldığını gösterir.
    administration_method:
      name: Uygulama yöntemi
      description: Parazit ilacının ata nasıl verildiğini (örneğin, ağız yoluyla veya
        enjeksiyonla) belirtir ve alıcının veteriner talimatlarına uymasına ve yönetilebilir
        bir uygulama yöntemi seçmesine yardımcı olur.
    advice_card_prompt_type:
      name: Tavsiye kartı yönlendirme türü
      description: Kart üzerinde basılı olan yönlendirme türü (veya yönlendirme bulunmaması).
    aeration_method:
      name: Havalandırma yöntemi
      description: Canlı yemler için yeterli oksijen sağlanmasını garanti eden, sistem
        tarafından sağlanan veya desteklenen havalandırma türünü tanımlar.
    aero_package_components:
      name: Aerodinamik paket bileşenleri
      description: Araçta hangi temel aerodinamik bileşenlerin takılı olduğunu gösterir
        (uygun olan tüm seçenekleri seçin).
    aerodynamic_elements_included:
      name: Dahil edilen aerodinamik unsurlar
      description: Formula aracında hangi aerodinamik bileşenlerin yer aldığını belirtir
        (destekleniyorsa, uygun olan tüm seçenekleri seçin).
    aftertouch_support:
      name: Aftertouch desteği
      description: Denetleyicinin tuşlarda/pedlerde aftertouch (kanal veya polifonik)
        desteği olup olmadığını belirtir.
    agave_content_classification:
      name: Agave içerik sınıflandırması
      description: Tequilanın %100 Mavi Weber agavesinden mi üretildiğini yoksa en
        az %51 agave şekeri içeren bir mixto mu olduğunu belirtir.
    aida_cloth_count:
      name: Aida kumaş sıklığı
      description: Aida kumaşının sıklığını (inç başına kare/dikiş sayısı) belirtir;
        bu değer dikiş boyutunu ve tasarım ölçeğini belirler.
    aida_cloth_pre_cut_format:
      name: Aida kumaşı ön kesim formatı
      description: Aida kumaşının önceden kesilmiş parça, top üzerinden sürekli kesim
        veya rulo halinde satılıp satılmadığını belirtir.
    air_bag_material:
      name: Hava yastığı malzemesi
      description: İrlanda savaş borusunda kullanılan hava yastığı/haznesinin malzemesini
        belirtir.
    air_bed_internal_construction:
      name: Hava yatağının iç yapısı
      description: Hava yatağının iç kısmında konfor ve denge sağlamak için kullanılan
        iç destek yapısını veya teknolojisini tanımlar.
    air_dry_clay_color_form:
      name: Hava ile kuruyan kil renk seçeneği
      description: Kil, ister önceden renklendirilmiş, ister boyama için beyaz/nötr,
        isterse de karışık/çeşitli olarak satılsın.
    air_hockey_items_included:
      name: Dahil olan hava hokeyi ürünleri
      description: Set içerisinde bulunan aksesuar parçalarını listeler, böylece müşteriler
        tam olarak ne aldıklarını bilirler (örneğin, 2 itici, 4 disk, 2 keçe ped).
    air_intake_temperature_sensor_mounting_style:
      name: Hava giriş sıcaklık sensörünün montaj stili
      description: IAT sensörünün emme sistemindeki fiziksel montaj şekli.
    air_integration_capability:
      name: Hava entegrasyon özelliği
      description: Dalış bilgisayarının kablosuz tüp basınç vericilerini destekleyip
        desteklemediğini ve nasıl desteklediğini gösterir.
    air_mattress_valve_type:
      name: Hava yatağı valf tipi
      description: Aksesuarın hangi valf tipine uygun olduğunu veya hangi valf tipini
        içerdiğini belirterek pompalar, valfler ve onarım parçaları arasında uyumluluğu
        sağlar.
    air_water_rocket_kit_items_included:
      name: Dahil olan hava ve su roket kiti parçaları
      description: Roket setine dahil olan temel bileşenler (fırlatıcı, pompa, kanatlar,
        dolum parçaları).
    air_water_rocket_launch_method:
      name: Hava ve su roketi fırlatma yöntemi
      description: Roketin nasıl basınçlandırıldığı ve fırlatıldığı (kullanıcı etkileşimi
        ve ekipman türü).
    airbag_position:
      name: Hava yastığı konumu
      description: Hava yastığı parçasının destekleyeceği amaçlanan konumlandırma/bölgeyi
        belirtir.
    aircraft_ads_b_capability:
      name: Uçak ADS-B özelliği
      description: Uçağın ADS-B Out uyumluluğu için donatılmış olup olmadığını belirtir.
    aircraft_airframe_material:
      name: Uçak gövdesi malzemesi
      description: Uçak gövdesi yapımında kullanılan ana malzeme(ler).
    aircraft_cabin_configuration:
      name: Uçak kabini düzeni
      description: Uçağın kabin düzenini belirtir (örneğin, konferans grubu, divan,
        dört bölgeli kabin).
    aircraft_documentation_included:
      name: Uçağa ait dokümanlar dahildir.
      description: Parça ile birlikte hangi belgelerin verildiğini listeler (örneğin,
        8130-3).
    aircraft_galley_configuration:
      name: Uçak mutfak bölümü düzeni
      description: Kabin içerisinde mutfak/yemek servisi imkanlarının varlığı ve türü.
    aircraft_installation_location:
      name: Uçak montaj yeri
      description: Parça veya aksesuarın uçakta nereye monte edildiğini veya kullanıldığını
        belirtir.
    aircraft_internet_connection:
      name: Uçak internet bağlantısı
      description: Kabin içi internet bağlantısının varlığını/türünü gösterir.
    aircraft_landing_gear_type:
      name: Uçak iniş takımı tipi
      description: Otojiro iniş takımı konfigürasyonunu belirtir.
    aircraft_lavatory_configuration:
      name: Uçak tuvalet konfigürasyonu
      description: Uçak içi tuvalet konfigürasyonunun türü.
    aircraft_maintenance_program_enrollment:
      name: Uçak bakım programına kayıt
      description: Uçağın motor ve/veya gövde bakım programına kayıtlı olup olmadığını
        ve kayıtlıysa hangi kapsama türünün geçerli olduğunu (motor, gövde veya her
        ikisi) gösterir.
    aircraft_operational_certification:
      name: Uçak işletme sertifikası
      description: Uçağın işletildiği düzenleyici veya operasyonel sertifikasyon esasını
        belirtir (yetki alanına bağlı olarak, örneğin FAA Bölüm 91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Uçak koruyucu ekipman sertifikasyonu
      description: Koruyucu ekipmanın hangi havacılık/düzenleyici veya endüstri standardına
        uygun olarak sertifikalandırıldığını belirtir.
    aircraft_system_application:
      name: Uçak sistemi uygulaması
      description: Parçanın/aksesuarın hangi uçak sistemine veya alanına ait olduğunu
        belirler (çeşitli uçak parçaları arasında gezinme ve filtreleme için kullanılır).
    airflow_resistance_level:
      name: Hava akışı direnci seviyesi
      description: Geri basınç/hava direnci açısından susturucunun ne kadar kısıtlayıcı
        olduğunu gösterir.
    airship_envelope_material:
      name: Hava gemisi zarf malzemesi
      description: Hava gemisinin dış gövdesinin (kabuğunun) ana malzemesi.
    airsoft_part_type:
      name: Airsoft parça türü
      description: Airsoft silahları için işlevsel bileşen veya aksesuar türünü tanımlar
        (örneğin, şarjör, namlu, el kundağı).
    airworthiness_approval_basis:
      name: Uçuşa elverişlilik onayı esasları
      description: Uygulanabilir durumlarda, parçanın onay/sertifikasyon esasını belirtir
        (örneğin, PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Alarm ses seviyesi ayarlanabilirliği
      description: Alarmın ses yüksekliğinin kullanıcı tarafından ayarlanıp ayarlanamayacağını
        ve nasıl ayarlanabileceğini gösterir.
    alcohol_ink_finish_effect:
      name: Alkol bazlı mürekkep bitiş/efekt türü
      description: Alkol bazlı mürekkep formülasyonunun (sadece renkten Beyond ) ürettiği
        görsel efekti/bitişi tanımlar; örneğin metalik veya sedefli görünüm.
    alignment_aid_style:
      name: Hizalama kılavuzu stili
      description: Mat yüzeyine basılmış veya çizilmiş hizalama kılavuzlarının türünü
        tanımlar (örneğin, düz çizgi, mesafe işaretleri).
    alternator_cooling_type:
      name: Alternatör soğutma tipi
      description: Alternatörün nasıl soğutulduğunu ve havalandırıldığını açıklar.
    alternator_marine_ignition_protection_rating:
      name: Alternatör deniz tipi ateşleme koruma derecesi
      description: Alternatörün deniz motoru bölmeleri için ateşlemeye karşı korumalı
        olup olmadığını gösterir (örneğin, SAE J1171 / ISO 8846 uyumlu).
    alternator_mounting_configuration:
      name: Alternatör montaj konfigürasyonu
      description: Alternatörün motor braketine takılması için kullanılan fiziksel
        montaj konfigürasyonunu belirtir.
    alternator_pulley_type:
      name: Alternatör kasnak tipi
      description: Alternatör üzerindeki kasnak/kavrama tasarımını belirtir (veya
        kasnak bulunmadığını gösterir).
    alternator_regulator_type:
      name: Alternatör regülatör tipi
      description: Voltaj regülatörünün alternatörün içinde mi yoksa dışında mı olduğunu
        ve OEM tarafından mı (bilgisayar/PCM kontrollü) kontrol edildiğini gösterir.
    alternator_terminal_connection_type:
      name: Alternatör terminal bağlantı tipi
      description: Alternatör çıkışı/uyarıcı terminali için temel elektriksel bağlantı
        stili, kablo demeti uyumluluğunu sağlamaya yardımcı olur.
    altitude_suitability:
      name: Rakım uygunluğu
      description: Topun belirli rakım koşullarına göre tasarlanıp tasarlanmadığını
        gösterir; bu durum hız ve sekme özelliklerini etkiler.
    ambulance_stretcher_mount_type:
      name: Ambulans sedyesi montaj tipi
      description: Ambulansın desteklediği sedye yükleme/montaj sistemi tipini belirtir.
    american_football_safety_certification:
      name: Amerikan futbolu güvenlik sertifikası
      description: Ürünün Amerikan futboluna özgü güvenlik sertifikalarını veya standartlarını
        karşıladığını gösterir.
    amplifier_tube_function:
      name: Amplifikatör lambasının işlevi
      description: Enstrüman amplifikatör devresinde lambanın işlevsel rolünü belirtir
        (örneğin, ön yükseltici mi yoksa güç yükseltici mi).
    analog_synthesizer_cv_gate_i_o:
      name: Analog sentezleyici CV/Gate Giriş/Çıkış
      description: Modular/analog donanımlarla entegrasyon için desteklenen kontrol
        voltajı (CV) ve gate bağlantı türlerini belirtir.
    analog_synthesizer_keybed_configuration:
      name: Analog sentezleyici klavye konfigürasyonu
      description: Sentezleyicinin dahili bir klavyeye sahip olup olmadığını ve varsa
        tuş sayısını açıklar.
    anchor_configuration:
      name: Çapa yapılandırması
      description: Süspansiyon sisteminin tek bir merkezi ankraj noktası mı yoksa
        birden fazla bağımsız ankraj noktası mı kullandığını gösterir ve bu da egzersiz
        çeşitliliğini ve karmaşıklığını etkiler.
    animal_raising_method:
      name: Hayvan yetiştirme yöntemi
      description: Kaynak hayvan için kullanılan tarım veya hayvancılık uygulamalarını
        tanımlar.
    animal_species:
      name: Hayvan türleri
      description: Oyuncak hayvanın temsil ettiği hayvanı veya yaratığı belirtir (örneğin,
        ayı, tavşan, dinozor).
    animal_trap_jaw_style:
      name: Hayvan tuzağı çene tipi
      description: Tuzak çenelerinin konfigürasyonunu belirtir; bu, tutma gücünü ve
        hayvan refahını etkiler.
    animal_trap_type:
      name: Hayvan tuzağı türü
      description: Tuzakların mekanik stilini/tasarımını sınıflandırarak, alıcının
        ihtiyaç duyduğu veya yönetmeliklerin izin verdiği tuzaklama yöntemini hızlı
        bir şekilde bulmasını sağlar.
    ankle_collar_style:
      name: Ayak bileği yakası stili
      description: Ayakkabının bilek kısmının stilini veya yapısını tanımlar; örneğin
        alçak kesim, SKN kesim, yüksek kesim, çorap yaka veya bağcıksız gibi özellikler
        destek, uyum ve estetiği etkiler.
    ankle_guard_protection_level:
      name: Ayak bileği koruma seviyesi
      description: Ayak bileği koruyucusunun sağladığı genel darbe koruma seviyesini
        değerlendirir.
    ankle_strap_padding_type:
      name: Ayak bileği kayışı dolgu tipi
      description: Kayışın iç kısmında kullanılan ve konforu etkileyen yastıklama
        malzemesini veya iç boşluk yaklaşımını tanımlar.
    ankle_strap_type:
      name: Ayak bileği kayışı türü
      description: Snowboard bağlama kayışının yapısını veya tasarımını sınıflandırır.
    ant_farm_habitat_medium_type:
      name: Karınca çiftliği yaşam ortamı türü
      description: Karınca çiftliği tarafından sağlanan veya gerekli olan birincil
        tünel kazma/gözlem ortamını belirtir.
    ant_farm_kit_contents:
      name: Karınca çiftliği kit içeriği
      description: Karınca çiftliği kitinde hangi bileşenlerin yer aldığını belirtir
        (örneğin, yaşam alanı kabı, kum/jel, karınca kuponu, besleme araçları).
    ant_farm_lighting_type:
      name: Karınca çiftliği aydınlatma türü
      description: Gözlem için kullanılan dahili aydınlatma/ışıklandırma türünü (varsa)
        belirtir.
    antenna_fit_type:
      name: Anten montaj türü
      description: Anten topunun hangi anten form faktörüne uyacak şekilde tasarlandığı
        belirtir.
    anti_caking_agent:
      name: Topaklanmayı önleyici madde
      description: Topaklanmayı önlemek için eklenen topaklanma önleyici maddenin
        türünü belirtir; bu bilgi alerji hususları ve tarifin doğruluğu açısından
        önemlidir.
    anti_g_suit_bladder_material:
      name: Anti-G tulumu hava kesesi malzemesi
      description: Yerçekimi önleyici elbisenin içindeki şişirilebilir iç bölme(ler)
        için kullanılan malzeme; birden fazla malzeme kullanılıyorsa, geçerli olan
        tüm malzemeleri listeleyin.
    anti_g_suit_connector_type:
      name: Anti-G tulumu bağlayıcı tipi
      description: Uçağa veya regülatöre bağlantı sağlamak için kullanılan hava/basınç
        hortumunun stilini/standardını belirtir.
    anti_g_suit_inflation_method:
      name: Anti-G tulumu şişirme yöntemi
      description: Bu, elbisenin hava yastıklarının G kuvvetine karşı koruma sağlamak
        için nasıl basınçlandırıldığını gösterir.
    anti_g_suit_size_system:
      name: Anti-G tulumu beden sistemi
      description: Takım elbise beden/kalıp sistemini belirtmek için kullanılan beden
        standardı.
    anti_reverse_type:
      name: Geri dönüş önleyici tip
      description: Sağlanan geri dönüş önleyici mekanizmanın türünü belirtir; bu,
        kancanın sabitlenmesini ve gerideki boşluğu etkiler.
    anti_theft_feature:
      name: Hırsızlığa karşı koruma özelliği
      description: Montaj/tutucunun hırsızlığa karşı caydırıcı özellikler (örneğin
        kilitlenebilir bağlantı elemanları veya kurcalamaya karşı dayanıklı tasarım)
        içerip içermediğini gösterir.
    antique_gun_ignition_system:
      name: Antika silah ateşleme sistemi
      description: Antika ateşli silahın kullandığı tarihi ateşleme sistemini belirtir.
    apple_variety:
      name: Elma çeşidi
      description: Elma çeşidini veya türünü (örneğin, Gala, Fuji, Granny Smith) belirtir;
        tat, doku ve mutfak kullanımına göre seçim yapılmasına yardımcı olur.
    applique_edge_finish:
      name: Aplike kenar bitişi
      description: Kenarların nasıl işlendiğini açıklar; bu işlem görünümü ve sökülmeye
        karşı direnci etkiler.
    arbor_type:
      name: Mil tipi
      description: Makara, misina toplama milinin tasarımına göre sınıflandırılır;
        bu tasarım misina sarım hızını, arka dolgu kapasitesini ve misina hafızasını
        etkiler.
    archery_accessory_type:
      name: Okçuluk aksesuarı türü
      description: Alıcının ürünleri hızlıca filtreleyebilmesi için okçuluk aletleri
        için tasarlanan aksesuar türünü belirtir.
    archery_part_type:
      name: Okçuluk parçası türü
      description: Satılan belirli donanımı veya yedek parçayı (örneğin, gövde, yay
        kolu, yay kirişi) tanımlayarak, kategori ağacını genişletmeden hassas filtreleme
        yapılmasını sağlar.
    archery_range_accessory_type:
      name: Okçuluk sahası aksesuarı türü
      description: Okçuluk alanında kullanılan aksesuarların türünü sınıflandırarak,
        alıcının ihtiyaç duyduğu ürünü hızlı bir şekilde filtrelemesini sağlar.
    archery_target_features:
      name: Okçuluk hedefi özellikleri
      description: Diğer özelliklerde yer almayan özel performans veya kullanım kolaylığı
        özelliklerini listeler (örneğin, kendiliğinden onarılan köpük, taşıma özelliği).
    archery_tool_type:
      name: Okçuluk aleti türü
      description: Okçulukta kullanılan alet veya ekipman türünü sınıflandırır.
    armband_features:
      name: Bileklik özellikleri
      description: Bilekliğin özel işlevsel veya görsel özelliklerini listeler.
    armguard_style:
      name: Kol koruyucu stili
      description: Kol koruyucunun yapım stilini veya formunu tanımlar; tasarım kapsamı
        ve geleneksel/modern görünüm hakkında bilgi verir.
    armor_protection_type:
      name: Zırh koruma türü
      description: Araç zırh sisteminin sağladığı koruma türü.
    armrest_adjustability:
      name: Kolçak ayarlanabilirliği
      description: Sandalye kolçaklarının boyut ayarlanabilirliğini ve konfigürasyonunu
        tanımlar (örneğin, sabit, 2 boyutlu, 3 boyutlu, yukarı katlanabilir).
    armrest_type:
      name: Kolçak tipi
      description: Sandalyenin kolçaklarının varlığını ve ayarlanabilirliğini açıklar
        (örneğin, kolçaksız, sabit, ayarlanabilir, çıkarılabilir).
    arrow_bolt_point_type:
      name: Ok/cıvata ucu tipi
      description: Ok veya cıvataya takılan uç veya sivri ucun stilini tanımlar.
    arrow_component_type:
      name: Ok bileşeni türü
      description: Okun belirli parçasını veya aksesuarını (ek parça, sargı, burç,
        yapıştırıcı vb.) sınıflandırarak, onlarca ek alt kategoriye ihtiyaç duymadan
        ürünleri filtreleyebilmenizi sağlar.
    arrow_containment_level:
      name: Ok kapsama seviyesi
      description: Ok yatağının oku tamamen, kısmen veya hiç tutup tutmadığını açıklar.
    arrow_fletching_orientation:
      name: Ok kanatçık yönü
      description: Okun dönüş yönünü belirleyen kanat veya ok kanatçıklarının yönelimini
        (örneğin, sol kanat, sağ kanat, sarmal) belirtir.
    arrow_nock_groove_size:
      name: Ok çentik oluğu boyutu
      description: Ok ucunun oluk/boğaz kısmının beden sınıflandırmasını belirterek,
        farklı yay kirişi çaplarıyla uyumluluğu belirler.
    arrow_nock_type:
      name: Ok çentik tipi
      description: Okun yay kirişiyle temas ettiği çentik kısmının tasarımı/stili.
    arrow_rest_style:
      name: Ok yatağı stili
      description: Ok yatağının işlevsel stilini/mekanizmasını belirtir (örneğin,
        düşmeli, blade tipi, whisker biscuit tipi). Stil, ok yatağının oku nasıl desteklediğini,
        tuttuğunu ve serbest bıraktığını belirler; ürünleri ayırt etmede temel bir
        özelliktir.
    arrow_shaft_compatibility:
      name: Ok mili uyumluluğu
      description: Işıklı ok çentiğinin hangi ok mili/burç standardına uyduğunu gösterir
        (örneğin, X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Sanat/el işi alet ucu stili
      description: Çalışma ucunun şeklini/profilini (örneğin sivri veya yuvarlak)
        tanımlar; oluşturduğu kabartma iz türünü belirtir.
    art_ink_lightfastness_rating:
      name: Sanat mürekkebinin ışığa dayanıklılık derecesi
      description: Mürekkebin ışığa maruz kaldığında solmaya karşı direncini gösterir
        ve genellikle standart derecelendirmelerle ifade edilir.
    art_ink_opacity:
      name: Sanat mürekkebi opaklığı
      description: Uygulandıktan sonra mürekkebin kaplama seviyesini belirtir.
    art_security_rating:
      name: ART güvenlik derecelendirmesi
      description: Kilidin aldığı Hollanda ART yıldız puanını (1-5 yıldız) belirtir.
    artichoke_cut:
      name: Enginar kesimi
      description: Enginarın çeşidini veya botanik türünü belirtir; boyut, renk, tat
        ve mutfak kullanımına göre ayrım yapılmasına yardımcı olur.
    artichoke_variety:
      name: Enginar çeşidi
      description: Alıcının enginarları boyut, renk, tat ve mutfak kullanım alanlarına
        göre ayırt etmesine yardımcı olmak için enginarın kültivarını veya botanik
        çeşidini belirtir.
    articulation_features:
      name: Hareketli parça özellikleri
      description: Dinozor modelinin hareketli parçalara (hareketli çene, uzuvlar,
        kuyruk) sahip olup olmadığını ve genel olarak poz verilebilirliğini gösterir.
    artificial_bait_form:
      name: Yapay yem formu
      description: Balıkçılık yeminin veya sahte yemin fiziksel formunu veya sunum
        tarzını belirtir.
    asa_mounting_type:
      name: ASA montaj türü
      description: Drop forward'ın kullandığı Hava Kaynağı Adaptörü (ASA) arayüzünün
        stilini veya montaj standardını belirtir (örneğin, kırlangıç kuyruğu, ray,
        doğrudan montaj).
    ascender_descender_type:
      name: Yükselici/iniş aleti tipi
      description: Daha hassas filtreleme için tırmanma yükselici veya iniş aletinin
        stilini sınıflandırır.
    aspiration_type:
      name: Aspirasyon tipi
      description: Motorun nasıl hava aldığı veya güçlendirildiğini belirtir.
    assembly_state:
      name: Montaj durumu
      description: Dolabın demonte, önceden monte edilmiş veya başka bir biçimde olup
        olmadığını gösterir.
    assistance_mechanism:
      name: Yardım mekanizması
      description: Power tower’ın barfiks, dips veya diğer egzersizler için sunduğu
        dahili destek veya direnç sistemini belirtir.
    atemoya_cultivar:
      name: Atemoya çeşidi
      description: Atemoya meyvesinin adlandırılmış kültivar/çeşidini belirtir ve
        alıcının tercih ettiği lezzet, boyut veya çekirdek özelliklerine sahip meyveleri
        seçmesine olanak tanır.
    athletic_cup_size:
      name: Atletik koruyucu kap boyutu
      description: Koruyucu kupanın sporcuya uygun şekilde oturmasını sağlamak için
        üretici tarafından belirlenen bedenini belirtir.
    attachment_position:
      name: Bağlantı konumu
      description: Çantanın sele veya sürücü üzerinde nereye takılacağını belirtir.
    attractant_scent_profile:
      name: Çekici koku profili
      description: Yaban hayvanlarını çekmek veya insan kokusunu maskelemek için kullanılan
        belirli koku veya tadı tanımlar.
    atv_utv_intended_use:
      name: ATV/UTV kullanım amacı
      description: ATV/UTV'nin asıl kullanım amacı/tarzı.
    audio_channel_configuration:
      name: Ses kanalı yapılandırması
      description: Ekolayzer/DSP'nin desteklediği ayrık ses kanalı sayısı (örneğin,
        2 kanallı stereo, 4 kanallı ön/arka, 6 kanallı).
    audio_inputs:
      name: Ses girişleri
      description: Örnekleme/kayıt için kullanılabilen ses giriş bağlantı türlerini
        belirtir (örneğin, 1/4 inç hat girişi, XLR, 3,5 mm, mikrofon ön yükselticisi,
        fono).
    audio_output:
      name: Ses çıkışı
      description: Oyuncağın ses çıkarıp çıkarmadığını ve sesin nasıl iletildiğini
        gösterir.
    audio_outputs:
      name: Ses çıkışları
      description: Ana çıkışlar ve atanabilir/yardımcı çıkışlar dahil olmak üzere
        mevcut ses çıkış bağlantılarını belirtir.
    audio_playback_source:
      name: Ses çalma kaynağı
      description: Karaoke cihazının müzik çalabileceği birincil medya kaynakları.
    autograph_authentication:
      name: İmza doğrulaması
      description: Kart üzerindeki imzanın doğrulama durumunu/türünü gösterir.
    autograph_format:
      name: İmza formatı
      description: İmzanın orijinal el yazısıyla atılmış bir otograf mı, damgalı/basılı
        bir faks mı yoksa bir yazıt/eklenti mi olduğunu açıklar.
    autogyro_cockpit_enclosure:
      name: Otojiro kokpit muhafazası
      description: Kokpitin açık mı yoksa kapalı mı olduğunu belirtir.
    available_firing_modes:
      name: Mevcut ateşleme modları
      description: İşaretleyicinin kutudan çıktığı haliyle seçilebilen ateşleme modlarını
        listeler.
    avocado_variety:
      name: Avokado çeşidi
      description: Avokadonun kültivarını veya çeşidini belirtir ve tat, doku, boyut
        ve yağ oranı farklılıklarını ayırt etmeye yardımcı olur.
    award_customization_included:
      name: Dahil olan ödül kişiselleştirmesi
      description: Ödül satın alımına hangi kişiselleştirme seçeneklerinin dahil olduğunu
        belirtir.
    award_material:
      name: Ödül malzemesi
      description: Ödül ürününün (kupa, plaket, madalya, rozet, kurdele) ana malzemesini/malzemelerini
        tanımlar.
    award_mounting_display_type:
      name: Ödülün montaj/sergileme türü
      description: Ödülün nasıl sergileneceği veya monte edileceği belirtilir (duvara
        mı, masaya mı, yoksa giyilebilir mi).
    award_plaque_plate_material:
      name: Ödül plaketi levha malzemesi
      description: Plakete yapıştırılan isim levhasının/oyma levhasının malzemesini
        belirtir (arka malzeme türünden farklı olarak).
    award_ribbon_attachment_type:
      name: Ödül kurdelesi bağlantı türü
      description: Kurdelenin nasıl takılacağını veya giyileceğini belirtir.
    award_ribbon_imprint_method:
      name: Ödül kurdelesi baskı yöntemi
      description: Şerit üzerine metin/grafiklerin nasıl uygulanacağını belirtir.
    award_ribbon_material:
      name: Ödül kurdelesi malzemesi
      description: Kurdele kumaşının ana malzemesi (örneğin, saten, polyester).
    award_ribbon_placement_title:
      name: Ödül kurdelesinde belirtilen derece veya unvan
      description: Kurdele ile belirtilen standart unvan veya derece (örneğin, 1.lik,
        katılımcı).
    axle_compatibility:
      name: Aks uyumluluğu
      description: Tekerleğin uyumlu olduğu aks standardını belirtir; bu sayede bisiklet
        şasisi ve çatallarıyla uyumluluk sağlanır.
    back_beam_type:
      name: Arka çözgü kirişi tipi
      description: Arka çözgü kirişinin türünü veya ayarlanabilirlik özelliğini belirtir
        (ör. sabit veya yükseklik ayarlı).
    back_design:
      name: Sırt tasarımı
      description: Giysinin görünümünü ve desteğini etkileyen dikkat çekici sırt tasarımı
        özelliklerini belirtir.
    back_panel_type:
      name: Arka panel tipi
      description: Dolabın, ekran görünürlüğünü ve dekor uyumunu etkileyen arka panelinin
        stilini veya malzemesini belirtir.
    back_sides_material:
      name: Arka ve yan kısımlardaki malzeme
      description: Klasik gitar gövdesinin arka ve yan kısımlarında kullanılan malzemeyi
        belirtir.
    backing_type:
      name: Arka yüzey türü
      description: Satılan taş süslemenin arka yüzey veya sabitleme türünü belirtir
        (kendinden yapışkanlı ürünler için).
    backup_camera_mounting_location:
      name: Geri görüş kamerası montaj konum
      description: Geri görüş kamerasının araç üzerinde monte edilmek üzere tasarlandığı
        konumu belirtir.
    backup_camera_video_interface:
      name: Geri görüş kamerası video arayüzü
      description: Kameranın bir monitöre, DVR'a veya multimedya ünitesine bağlanmak
        için kullandığı video çıkışını, arayüzünü veya bağlantı türünü belirtir (ör.
        kompozit RCA, OEM LVDS, Ethernet üzerinden IP).
    badminton_set_components_included:
      name: Badminton setindeki bileşenler.
      description: Badminton setinde sunulan öğeleri listeler.
    bag_attachment_method:
      name: Çanta bağlama yöntemi
      description: Sıvı torbası veya taşıyıcının diğer ekipmanlara bağlanmasında kullanılan
        temel yöntemi belirtir (ör. MOLLE bağlantı sistemi, kemer halkası, karabina).
    bag_case_carrying_style:
      name: Çanta/kılıf taşıma şekli
      description: Kılıfın veya gigbag'in temel taşıma biçimini (nasıl taşınmak üzere
        tasarlandığını) belirtir.
    bag_cover_material:
      name: Çanta kılıfı malzemesi
      description: Çantanın dış kaplama malzemesini belirtir; bu özellik dayanıklılığı,
        tutuşu ve görünümü etkiler.
    bag_embellishment:
      name: Çanta süsleme detayı
      description: Çantanın dış yüzeyindeki püskül, zımba veya kapitone gibi belirgin
        dekoratif unsurları açıklar.
    bag_fill_medium:
      name: Çanta dolgu malzemesi
      description: Çantayı doldurmak veya basınçlandırmak için kullanılan maddeyi
        belirtir (ör. hava, su, kum).
    bag_material:
      name: Torba malzemesi
      description: Hava torbası veya iç kesenin malzemesi.
    bag_padding_level:
      name: Çanta dolgu seviyesi
      description: Çanta veya kılıfta kullanılan dolgunun derecesini ya da türünü
        belirtir.
    bag_size_descriptor:
      name: Çanta boyut sınıfı
      description: Kova çantanın tam ölçülerini tamamlayan pazarlama amaçlı boyut
        sınıfını belirtir (ör. mini, büyük).
    bagel_size:
      name: Simit büyüklüğü
      description: Simitlerin genel boyutunu belirtir, ör. mini, ince, standart, büyük,
        ekstra büyük veya jumbo.
    bagpipe_accessories_included:
      name: Dahil olan gayda aksesuarları
      description: Gayda ile birlikte sunulan temel borular dışındaki başlıca bileşen
        ve aksesuarları listeler (ör. taşıma çantası, alıştırma chanter'ı, kılıf,
        kordonlar, nem kontrol sistemi)
    bagpipes_playing_mode:
      name: Gayda üfleme sistemi
      description: Çalgının çalınırken havayla nasıl beslendiğini belirtir.
    bait_compatibility:
      name: Yem uyumluluğu
      description: 'Pelet aksesuarının hangi yem türleriyle kullanılmak üzere tasarlandığını
        belirtir ve balıkçıların tercih ettikleri yemle uyumluluğu değerlendirmesine
        yardımcı olur. '
    bait_species:
      name: Yem çeşitleri
      description: Yem olarak kullanılan temel canlı veya organizmayı belirtir; yasal
        uygunluğun ve hedef tür üzerindeki etkinliğin değerlendirilmesine yardımcı
        olur.
    baking_chip_form:
      name: Pasta/süsleme çikolatası formu
      description: Pasta ve kurabiye yapımında kullanılan çikolata parçacıklarının
        fiziksel boyutunu veya şeklini açıklar; bu özellik erime davranışını ve tarifin
        görünümünü etkiler.
    balance_board_style:
      name: Denge tahtası tipi
      description: Denge tahtalarını hareket mekanizmasına veya yapı türüne göre sınıflandırır;
        tahtanın nasıl hareket ettiğini ve sunduğu antrenman zorluğunu gösterir.
    balance_cushion_accessories_included:
      name: Denge minderi aksesuarları
      description: Minderle birlikte sunulan aksesuarları listeler ve kullanıcıların
        paket içeriğini karşılaştırmasına yardımcı olur.
    balance_type:
      name: Balans durumu
      description: Tahrik milinin satış anındaki balans durumunu belirtir (ör. fabrikada
        balanslanmış, yüksek hızda balanslanmış, balanslanmamış).
    ball_bladder_material:
      name: Top iç kesesi malzemesi
      description: Hentbol topunun iç kesesinde kullanılan malzemeyi belirtir; bu
        özellik hava tutma kapasitesini, sekme performansını ve dayanıklılığı etkiler.
    ball_certification:
      name: Top sertifikası
      description: Topun sahip olduğu resmî performans sertifikalarını veya onayları
        belirtir.
    ball_construction:
      name: Top yapısı
      description: Top panellerinin birleştirilmesinde kullanılan üretim yöntemini
        belirtir; bu özellik dayanıklılığı, temas hissini, su emilimini ve fiyatı
        etkiler.
    ball_core_construction:
      name: Top çekirdeği yapısı
      description: Topun iç yapısını belirtir; bu özellik sekme performansını ve hissiyatı
        etkiler.
    ball_core_type:
      name: Top çekirdeği türü
      description: Topun iç yapısını belirtir; bu özellik sekme performansını ve ağırlık
        dağılımını etkiler.
    ball_cup_game_included_pieces:
      name: Top ve bardak oyunu ürün paketinde hangi parçaların bulunduğunu belirtir.
      description: Top ve bardak oyunu için ürün paketinde hangi bileşenlerin bulunduğunu
        belirtir.
    ball_drilling_state:
      name: Top deliği durumu
      description: Topta parmak deliklerinin açılmış olup olmadığını ve açılmışsa
        hangi düzeyde olduğunu belirtir.
    ball_holder_type:
      name: Top tutucu tipi
      description: Top tutucunun yapısal tasarımını veya formunu belirtir.
    ball_pit_ball_surface_finish:
      name: Top havuzu topu yüzey kaplaması
      description: Top yüzeyinin dokunsal veya görsel kaplamasını açıklar; bu özellik
        tutuşu, oyun hissini ve temizliği etkiler.
    ball_pit_safety_features:
      name: Top havuzu güvenlik özellikleri
      description: Top havuzlarıyla ilgili güvenlik odaklı tasarım özelliklerini belirtir.
    ball_pump_accessory_type:
      name: Top pompası aksesuar tipi
      description: Top pompası aksesuarının türünü tanımlar; böylece satıcılar basınç
        göstergesi, hortum, yağlayıcı ve diğer ek parçaları aynı üst kategori altında
        sınıflandırabilir.
    ball_return_mechanism:
      name: Top geri dönüş mekanizması
      description: Varsa, mat üzerinde bulunan top geri dönüş sisteminin türünü belirtir.
    ball_return_type:
      name: Top toplama sistemi tipi
      description: Oyun sırasında topları toplayan cep veya geri dönüş sisteminin
        türünü belirtir.
    ball_speed_rating:
      name: Top hız derecesi
      description: Üretici tarafından belirlenen, topun standart koşullarda ne kadar
        hızlı oynandığını gösteren hız kategorisidir.
    ball_surface_texture:
      name: Top yüzeyi dokusu
      description: Topların dış yüzeyindeki doku veya desen yapısını açıklar; bu özellik
        tutuşu ve görünümü etkileyebilir.
    ball_surface_type:
      name: Top yüzeyi türü
      description: Topun dış yüzey kaplamasını veya yastıklama yapısını açıklar; bu
        özellik darbe hissini ve tutuşu etkiler.
    ballonet_configuration:
      name: Balonet sistemi konfigürasyonu
      description: Rijit olmayan veya yarı rijit hava gemilerinde trim ve basınç kontrolü
        için kullanılan balonet sisteminin türünü veya yapılandırmasını belirtir.
    balloon_closure_valve_type:
      name: Balon kapatma/valf tipi
      description: Balonun şişirildikten sonra nasıl kapatıldığını belirtir (ör. bağlamalı,
        kendinden kapanan valf).
    balloon_kit_finish:
      name: Balon seti yüzey kaplaması
      description: Sette bulunan balonların yüzey veya görsel kaplama özelliklerini
        açıklar.
    balloon_kit_material:
      name: Balon seti malzemeleri
      description: Setteki balonların ana malzemesini belirtir.
    banana_variety:
      name: Muz çeşidi
      description: Sunulan muzun çeşidini veya kültivarını belirtir.
    banjo_head_type:
      name: Banjo deri tipi
      description: Banjonun deri (head) kısmının türünü veya malzemesini belirtir.
        Bu özellik parlaklığı, ses yüksekliğini ve çalma hissini etkiler.
    banjo_neck_material:
      name: Banjo sapı malzemesi
      description: Sapın malzemesi, hissiyatı, dengeyi ve tonu etkiler.
    banjo_pickup_configuration:
      name: Banjo manyetik sistemi
      description: Banjoda dahili bir manyetik bulunup bulunmadığını ve kullanılıyorsa
        hangi genel manyetik teknolojisinin tercih edildiğini belirtir.
    banjo_rim_material:
      name: Banjo gövde çemberi malzemesi
      description: Banjonun çember/gövde (rim/pot) kısmında kullanılan malzemeyi belirtir.
        Bu özellik tonu ve ağırlığı önemli ölçüde etkiler.
    banjo_tone_ring_type:
      name: Banjo ton halkası tipi
      description: Banjonun tınısını ve ses yüksekliğini şekillendiren ton halkasının
        tasarımını veya malzeme ailesini belirtir.
    banjo_tuning_machine_type:
      name: Banjo akort makinesi tipi
      description: Banjo kullanılan akort mekanizmasının türleri.
    banknote_authentication_grading:
      name: Banknot doğrulama/derecelendirmesi
      description: Banknotun orijinalliğini doğrulayan/değerlendiren üçüncü taraf
        hizmet sağlayıcısı (varsa).
    banknote_grade:
      name: Banknot derecesi
      description: Koleksiyonculukta kullanılan standart banknot derecelendirme ölçeğindeki
        notu belirtir.
    banknote_holder_type:
      name: Banknot muhafaza tipi
      description: Banknotun fiziksel saklama durumunu belirtir (ör. serbest halde
        veya derecelendirme kapsülü içinde).
    banknote_material:
      name: Banknot malzemesi
      description: Banknotun üretildiği temel malzemeyi belirtir.
    banknote_security_features:
      name: Banknot güvenliği özellikleri
      description: Banknotta bulunan dikkat çekici güvenlik veya tasarım unsurlarını
        belirtir.
    banknote_serial_number_type:
      name: Banknot seri numarası tipi
      description: Seri numarasının mevcut olup olmadığını ve/veya koleksiyon değeri
        taşıyan özel özelliklere sahip olup olmadığını belirtir (seri numarasının
        kendisini değil).
    banner_display_location:
      name: Afiş kullanım konumu
      description: Afişin kullanılmak üzere tasarlandığı konumu belirtir (ör. kapı
        girişi, duvar, masa arkası fonu).
    banner_hanging_hardware_type:
      name: Afiş asma donanımı tipi
      description: Afişe entegre edilmiş veya birlikte sunulan temel asma/sabitleme
        donanımını belirtir (ör. kuşgözü, direk cebi, ip).
    banner_message_type:
      name: Afiş mesaj tipi
      description: Afiş üzerindeki metnin önceden basılmış (sabit) veya boş/özelleştirilebilir
        olup olmadığını belirtir.
    banner_shape:
      name: Banner şekli
      description: Taraftar afişinin genel şeklini veya kesimini belirtir.
    banquette_configuration:
      name: Banket oturma düzeni
      description: Banketin genel şeklini veya yerleşim yönünü belirtir.
    bar_coating:
      name: Bar kaplaması
      description: Varsa, barın üzerindeki yenilebilir dış kaplamayı belirtir.
    bar_pad_style:
      name: Bar koruyucu pedi tipi
      description: Bar koruyucu pedinin tasarımını ve kılıf yapısını belirtir.
    bar_texture:
      name: Bar dokusu
      description: Barın genel dokusunu veya ağızda bıraktığı hissi açıklar.
    barb_type:
      name: Diken tipi
      description: Kancada diken bulunup bulunmadığını ve varsa türünü belirtir.
    barbell_finish:
      name: Halter yüzey kaplaması
      description: Halter çubuğuna ve/veya ağırlık kovanlarına uygulanan koruyucu
        veya estetik yüzey işlemini/kaplamayı belirtir. Bu özellik korozyon direncini,
        tutuş hissini ve fiyatı etkiler.
    barbell_knurling_pattern:
      name: Halter tırtık deseni
      description: Halter üzerindeki tırtıklı tutuş bölgesinin stilini ve agresiflik
        seviyesini belirtir. Powerlifting veya halter işaretlemeleri gibi özel işaretleri
        de kapsar.
    barista_suitability:
      name: Barista kullanımına uygunluk
      description: Ürünün kahve hazırlama ve süt köpürtme işlemleri için uygun şekilde
        formüle edilip edilmediğini belirtir.
    barre_rail_configuration:
      name: Barre barı konfigürasyonu
      description: Bale barresi ile birlikte sunulan yatay bar sayısını belirtir.
    barrel_or_cask_type:
      name: Fıçı/varil tipi
      description: Tekilanın yıllandırılması veya sonlandırılması için kullanılan
        fıçı ya da varilin türünü belirtir (ör. Amerikan meşesi, bourbon fıçısı, şeri
        fıçısı).
    barrel_profile:
      name: Namlu profili
      description: Dart namlusunun genel şeklini veya ağırlık dağılımını açıklar.
    barrel_thread_standard:
      name: Namlu diş standardı
      description: Satış sonrası (aftermarket) namlularla uyumluluğu belirlemek amacıyla
        işaretleyicide kullanılan namlu diş standardını belirtir.
    base_anchoring_method:
      name: Taban sabitleme yöntemi
      description: Tabanın zemine nasıl sabitlendiğini belirtir. Bu özellik farklı
        yüzeyler ve oyun koşulları için uygunluğunu gösterir.
    base_ballast_method:
      name: Taban ağırlıklandırma yöntemi
      description: Antrenman ekipmanının tabanının denge sağlamak için nasıl ağırlaştırıldığını
        veya ağırlaştırılıp ağırlaştırılmadığını belirtir (ör. su dolumu, kum dolumu).
    base_configuration:
      name: Baza tipi
      description: Panel tabanının yapısal konfigürasyonunu belirtir.
    base_fill_material:
      name: Taban dolgu malzemesi
      description: Basketbol mankeninin tabanını doldurmak veya ağırlıklandırmak için
        kullanılan maddeyi belirtir. Bu özellik dengeyi ve kurulum zorluğunu etkiler.
    base_ingredient:
      name: Ana bileşen
      description: Shochu veya sojunun damıtıldığı temel tarımsal bileşeni belirtir.
    base_oil_type:
      name: Baz yağ tipi
      description: Şanzıman sıvısının baz yağ formülasyonunu belirtir (ör. tam sentetik,
        sentetik karışım veya mineral).
    base_storage_type:
      name: Temel saklama türü
      description: Tabanın entegre depolama alanı sunup sunmadığını ve bunu hangi
        mekanizma ile sağladığını belirtir.
    baseball_glove_type:
      name: Beyzbol eldiveni tipi
      description: Eldiveni veya mitt'i oyuncu pozisyonuna ya da kullanım amacına
        göre sınıflandırır.
    baseball_softball_league_certification:
      name: Beyzbol/softbol lig sertifikasyonu
      description: Ürünün uygun olduğu yönetici kuruluş veya lig standartlarını belirtir.
    baseball_softball_usage_role:
      name: Beyzbol/softbol kullanım amacı
      description: Bacak koruyucunun sahadaki hangi oyuncu veya görev için tasarlandığını
        belirtir (ör. catcher, vurucu, hakem, saha oyuncusu).
    baseball_toy_set_components_included:
      name: Dahil olan beysbol oyuncak seti parçaları
      description: Üründe hangi beyzbol ekipmanlarının bulunduğunu belirtir (ör. sopa,
        top, vuruş sehpası, bazlar).
    baseplate_construction:
      name: Taban plakası yapımı
      description: Kaykay truck'ının taban plakasının üretim yöntemini belirtir. Bu
        özellik dayanıklılığı ve ağırlığı etkiler.
    basketball_hoop_accessory_type:
      name: Basketbol potası aksesuar tipi
      description: Basketbol potasına ait parça veya aksesuarın türünü sınıflandırır.
        Filtreleme ve karşılaştırma amacıyla kullanılır.
    basketball_padding_location:
      name: Basketbol koruma pedi konumu
      description: Koruma pedinin basketbol sisteminin hangi bölümünü kaplamak üzere
        tasarlandığını belirtir.
    basketball_rim_type:
      name: Basketbol çemberi tipi
      description: Basketbol çemberinin yapısal veya performans odaklı tasarımını
        belirtir. Böylece kullanıcılar oyun seviyelerine ve montaj ihtiyaçlarına uygun
        seçimi yapabilir.
    basketball_toy_features:
      name: Basketbol oyuncağı özellikleri
      description: Basketbol oyuncaklarının boyutlarının ötesindeki dikkat çekici
        oyun veya işlev özelliklerini belirtir.
    bass_clarinet_body_material:
      name: Bas klarnet gövde malzemesi
      description: Bas klarnetin gövdesinde kullanılan ana malzemeyi belirtir (tuşlar,
        direkler ve diğer metal parçalar hariç).
    bass_clarinet_lowest_written_note:
      name: Bas klarnetin en pes notası
      description: Bas klarnetin çalabildiği en düşük notayı belirtir (genellikle
        düşük Mi♭, Re, Do veya Si uzantısı olarak ifade edilir).
    bass_drum_beater_head_shape:
      name: Bas davul tokmak başlığı şekli
      description: Bas davul tokmağının davul derisine temas eden vurma yüzeyinin
        geometrik şeklini veya profilini açıklar.
    bass_drum_beater_shaft_material:
      name: Bas davul tokmak sapı malzemesi
      description: Tokmak başlığı değil, tokmak sapında/çubuğunda kullanılan malzemeyi
        belirtir.
    bass_drum_head_built_in_muffling:
      name: Bas davul derisi entegre susturma tipi
      description: Davul derisine entegre edilmiş sönümleme/susturma sisteminin türünü
        belirtir.
    bass_drum_head_configuration:
      name: Bas davul derisi konfigürasyonu
      description: Satın alındığında bas davulla birlikte hangi derilerin bulunduğunu
        veya takılı olduğunu açıklar.
    bass_drum_head_surface_finish:
      name: Bas davul derisi yüzey kaplaması
      description: Bas davul derisinin yüzey dokusunu veya kaplama türünü belirtir.
    bass_drum_head_type:
      name: Bas davul derisi tipi
      description: Bas davul derisinin tasarım türünü veya özel yapısını belirtir.
    bass_drum_hoop_material:
      name: Bas davul kasnağı malzemesi
      description: Bas davul kasnaklarında kullanılan malzemeyi belirtir. Bu özellik
        dayanıklılığı, görünümü ve ağırlığı etkiler.
    bass_drum_mounting_style:
      name: Bas davul montaj tipi
      description: Bas davulun nasıl desteklenmek veya kullanılmak üzere tasarlandığını
        belirtir (ör. davul seti ayakları, beşik/stand, bando taşıyıcısı).
    bass_harmonica_comb_material:
      name: Bas armonika tarak malzemesi
      description: Bas armonikanın tarak/gövde (hava odası bloğu) kısmında kullanılan
        malzemeyi belirtir.
    bass_harmonica_mouthpiece_style:
      name: Bas armonika ağızlık tipi
      description: Bas armonikanın ağızlık yapılandırmasını belirtir.
    bass_harmonica_reed_material:
      name: Bas armonika dil malzemesi
      description: Bas armonikada kullanılan ses dillerinin malzemesini belirtir.
    bass_harmonica_tuning_system:
      name: Bas armonika akort sistemi
      description: Bas armonikada kullanılan akort sistemi veya temperaman düzenini
        belirtir.
    bass_recorder_bocal_type:
      name: Bas blok flüt bocal tipi
      description: Bas blok flütte ağızlığa ulaşmak için kullanılan bocal/hava kanalı
        türünü belirtir.
    bass_recorder_included_accessories:
      name: Bas blok flüt aksesuarları
      description: Bas blok flüt paketiyle birlikte sunulan aksesuarları listeler.
    bass_recorder_keywork_material:
      name: Bas blok flüt mekanizması malzemesi
      description: Bas blok flütte bulunan mekanizma/tuş sisteminde kullanılan malzemeyi
        belirtir.
    bass_trombone_slide_material:
      name: Bas trombon sürgü malzemesi
      description: Bas trombonun dış sürgü borularında ve/veya sürgü düzeneğinde kullanılan
        temel malzemeyi veya kaplamayı belirtir.
    bass_trombone_valve_wrap_style:
      name: Bas trombon valf sargı tipi
      description: Çalgıda kullanılan valf sargısı (valve wrap) tasarımını belirtir.
    bass_ukulele_string_type:
      name: Bas ukulele teli tipi
      description: Bas ukulelede kullanılan tel türünü belirtir.
    bassinet_cradle_accessory_features:
      name: Beşik ve portatif beşik aksesuar özellikleri
      description: Beşik ve karyola aksesuarlarının dikkat çekici işlevsel özelliklerini
        veya niteliklerini belirtir (ör. su geçirmez, organik sertifikalı, hipoalerjenik).
    bassoon_bell_material:
      name: Fagot çan malzemesi
      description: Fagotun çan kısmında kullanılan malzemeyi belirtir.
    bassoon_bocal_system:
      name: Fagot bocal sistemi
      description: Farklı fagot sistemleri ve kullanım amaçları için kullanılan bocal
        türünü belirtir.
    bassoon_case_shell_type:
      name: Fagot kılıfı koruma tipi
      description: Kılıfın koruma yapısını belirtir (yumuşak, sert veya hibrit).
    bassoon_keywork_material:
      name: Fagot tuş mekanizması malzemesi
      description: Fagotun tuşlarında ve mekanik aksamında kullanılan malzemeyi ve/veya
        kaplamayı belirtir.
    bassoon_model_level:
      name: Fagot seviye sınıfı
      description: Fagotun hedeflendiği çalıcı seviyesini belirtir.
    bassoon_performance_level:
      name: Fagot performans seviyesi
      description: Fagot modelinin hedeflendiği çalıcı seviyesini belirtir.
    bassoon_reed_scrape_style:
      name: Fagot kamışı kazıma tipi
      description: Fagot kamışında kullanılan kazıma/profil stilini belirtir.
    bassoon_reed_thread_color:
      name: Fagot kamışı ip rengi
      description: Kamışın bağlanmasında kullanılan ipin rengini belirtir.
    bassoon_reed_type:
      name: Fagot kamışı tipi
      description: Ürünün uygun olduğu fagot kamışı alt türünü belirtir (uygun olduğunda).
    bassoon_system:
      name: Fagot sistemi
      description: Çalgıda kullanılan fagot tuş sistemini veya tasarım geleneğini
        belirtir.
    bat_construction:
      name: Beyzbol sopası yapısı
      description: Sopanın gövdesinin kaç ayrı parçadan veya birleştirilmiş bölümden
        oluştuğunu belirtir (ör. tek parça, iki parça, hibrit). Bu özellik esnekliği,
        titreşim kontrolünü ve genel performansı etkiler.
    bat_handle_size_compatibility:
      name: Sopa sapı boyutu uyumluluğu
      description: Gripin uyumlu olduğu kriket sopası sapı boyutlarını belirtir.
    bath_book_interactive_features:
      name: Banyo kitabı etkileşimli özellikleri
      description: Banyo kitabına entegre edilmiş oyun ve öğrenme özelliklerini belirtir.
    bath_bubble_machine_features:
      name: Banyo köpük makinesi özellikleri
      description: Banyo köpük makinesinin temel köpük üretiminin ötesindeki başlıca
        işlevsel özelliklerini belirtir.
    bath_crayon_features:
      name: Banyo boya kalemi özellikleri
      description: Banyo boya kalemlerinin başlıca işlevsel ve güvenlik özelliklerini
        belirtir.
    bath_squirter_spray_pattern:
      name: Banyo fıskiyesi su püskürtme şekli
      description: Banyo fıskiyesinin sıkıldığında veya etkinleştirildiğinde suyu
        nasıl püskürttüğünü (çıkış şekli) belirtir.
    bath_toy_molded_drain_design:
      name: Banyo oyuncağı tahliye tasarımı
      description: Oyuncağın suyun boşalmasını ve kurumasını sağlayacak şekilde tasarlanıp
        tasarlanmadığını belirtir. Bu özellik su birikimini azaltmaya yardımcı olur.
    bath_toy_water_play_function:
      name: Banyo oyuncağı suyla oyun işlevi
      description: Oyuncağın temel su etkileşimi veya suyla oynama mekanizmasını belirtir.
    baton_size_standard:
      name: Bayrak yarışı baton boyut standardı
      description: Bayrak yarışı batonunun yarışma boyut sınıfını belirtir (gençler
        veya yetişkinler).
    battery_case_certification_standard:
      name: Batarya taşıma çantası sertifikasyonu/standardı
      description: Batarya taşıma/depolama amacıyla çantanın uyduğu ilgili taşıma/güvenlik
        sertifikalarını veya test standartlarını listeler.
    battery_case_interior_padding_material:
      name: Batarya taşıma çantası iç dolgu malzemesi
      description: Çantanın içinde kullanılan temel yastıklama/astar malzemesini belirtir
        (varsa).
    battery_configuration:
      name: Batarya tipi
      description: Bataryanın fiziksel paket düzenini/şeklini (form faktörünü) belirtir.
        Böylece kullanıcılar bataryayı belirli Airsoft replikalarındaki sınırlı bölme
        alanıyla eşleştirebilir.
    battery_group_size:
      name: Batarya grup boyutu
      description: Birçok araçta uyumluluk için kullanılan standartlaştırılmış batarya
        kasa boyutu (ör. BCI Group 24F, H6).
    battery_polarity:
      name: Batarya kutup yönü
      description: Terminal kutup yönünü/konumunu (pozitif terminalin konumu) belirtir.
        Bu, birçok otomotiv ve motor sporları bataryası için önemli bir uyumluluk
        kriteridir.
    battery_standards_supported:
      name: Desteklenen batarya standartları
      description: Test cihazının marş performansını veya batarya sağlığını test ederken
        desteklediği batarya derecelendirme standartlarını belirtir.
    battery_voltage_class:
      name: Batarya voltajı sınıfı
      description: EV (Elektronik Araç) batarya paketi için yaygın voltaj sistemi
        sınıfını belirtir ve hızlı filtreleme için kullanılır (ör. 400V ve 800V sistemler).
    batting_cage_components_included:
      name: Vuruş kafesi dahil bileşenler
      description: Alıcıların tam bir sistemin mi yoksa belirli yedek parçaların mı
        dahil olduğunu doğrulayabilmesi için ürünle birlikte verilen parçaları listeler.
    batting_helmet_accessories_included:
      name: Vuruş kaskı dahil aksesuarlar
      description: Vuruş kaskıyla birlikte verilen koruyucu veya kozmetik aksesuarları
        listeler.
    batting_stuffing_form_factor:
      name: Dolgu malzemesi form faktörü
      description: Ürünün gevşek dolgu, levha, rulo, önceden kesilmiş parça veya şekillendirilmiş
        form olarak satılıp satılmadığını belirtir.
    batting_stuffing_loft_level:
      name: Dolgu malzemesi kabarıklık seviyesi
      description: Dolgu malzemesinin hacmini/kabarıklığını (göreceli kabarıklık yüksekliğini)
        belirtir; genellikle kapitone ve dolgu seçimi için kullanılır.
    batting_stuffing_thermal_insulation_level:
      name: Dolgu malzemesi ısı yalıtım seviyesi
      description: Yorgan, ceket ve battaniyelerde kullanılan dolgu malzemesinin göreceli
        sıcaklık/yalıtım performansı.
    batting_tee_base_design:
      name: Vuruş sehpası taban tasarımı
      description: Sehpanın taban stilini veya yapısını açıklar. Bu özellik stabiliteyi
        ve uygun olduğu oyun yüzeyi türlerini etkiler.
    battle_top_arena_stadium_compatibility:
      name: Dövüş topacı arena/stadyum uyumluluğu
      description: Ürünün hangi arena/stadyum sistemiyle kullanılmak üzere tasarlandığını
        belirtir (özellikle setler veya özel arena şekilleri için).
    battle_top_items_included:
      name: Dövüş topacına dahil öğeler
      description: Paketin hangi dövüş topacı öğelerini içerdiğini belirtir (ör. topaç,
        fırlatıcı, stadyum/arena, çekme ipi, yedek parçalar).
    battle_top_performance_type:
      name: Dövüş topacı performans tipi
      description: Savaş topacının genel performans stilini açıklar. Genellikle arenadaki
        davranışını yansıtır (agresif, dayanıklılık odaklı vb.).
    bayan_included_accessories:
      name: Bayan'a dahil aksesuarlar
      description: Bayan ile birlikte verilen aksesuarlar (kutu içeriği).
    bayan_tuning_system_type:
      name: Bayan akort sistemi tipi
      description: Bayanın nasıl gerildiğini/akort edildiğini (yapısal stilini) belirtir.
        Bu özellik, taşınabilirliği ve akort kolaylığını etkiler.
    bb_gun_action_type:
      name: BB silahı kurma mekanizması tipi
      description: BB silahının mekanik kurma veya çevrim mekanizmasını belirtir (ör.
        manivela kurmalı, pompalı, kırmalı namlu).
    bb_gun_caliber:
      name: BB silahı kalibresi
      description: Silahın atmak üzere tasarlandığı BB çapını tanımlar ve mühimmat
        uyumluluğunu sağlar.
    bb_gun_part_type:
      name: BB silahı parça tipi
      description: BB silahları için tasarlanmış belirli bileşeni veya aksesuarı sınıflandırır.
        Böylece müşteriler ihtiyaç duydukları yedek, yükseltme veya ek parçayı kolayca
        bulabilir (ör. namlu, piston keçesi, hızlı doldurucu).
    beach_ball_features:
      name: Plaj topu özellikleri
      description: Plaj toplarına özgü dikkat çekici işlevsel özellikler.
    beach_bucket_features:
      name: Plaj kovasının özellikleri
      description: Plaj kovasının kullanımını, dayanıklılığını ve pratikliğini etkileyen
        işlevsel özellikleri.
    beach_sand_toy_items_included:
      name: Plaj ve kum oyuncağı dahil öğeler
      description: Kovayla birlikte verilen ek plaj/kum oyun parçaları (set olarak
        satılıyorsa).
    bead_breaker_type:
      name: Lastik topuğu ayırıcı tipi
      description: Lastik topuğu ayırma mekanizmasının tipini/tasarımını belirtir.
    bead_hole_style:
      name: Boncuk deliği stili
      description: Boncuğun deliğinin/yuvasının stilini veya yapılandırmasını belirtir.
        Bu özellik kancaya veya misinaya nasıl oturduğunu etkiler.
    bead_type:
      name: Boncuk tipi
      description: Desen için gereken birincil boncuk türü/türleri.
    bead_type_patch_embellishment:
      name: Boncuk tipi (yama süslemesi)
      description: Yama yüzeyinde kullanılan birincil boncuk türü.
    beaded_accessory_project_type:
      name: Boncuklu aksesuar proje tipi
      description: Desenin hangi aksesuarı oluşturduğunu belirtir.
    beading_needle_flexibility:
      name: Boncuk iğnesi esnekliği
      description: Boncuk iğnesi gövdesinin dar boncuk işleme yollarında kullanılabilmesi
        için görece esnekliği.
    beading_pattern_bead_size:
      name: Boncuk işleme deseni boncuk boyutu
      description: Desende belirtilen önerilen boncuk boyutu/boyutları (genellikle
        11/0, 8/0 gibi kum boncuğu ölçüleri).
    beading_pattern_chart_format:
      name: Boncuk işleme deseni şema formatı
      description: Desenin görsel olarak nasıl sunulduğunu belirtir (ör. grafik şeklinde
        veya adım adım fotoğraflarla).
    beading_pattern_stitch_technique:
      name: Boncuk işleme deseni dikişi/tekniği
      description: Desen içerisinde kullanılan temel boncuk dokuma dikişi veya tekniği.
    beading_technique_stitch:
      name: Boncuk işleme tekniği/dikiş
      description: Desende kullanılan temel boncuk işleme tekniğini veya dikişini
        tanımlar (ör. peyote dikişi, tuğla dikişi)
    beading_thread_fiber_type:
      name: Boncuk ipliği lif tipi
      description: Boncuk ipliğinin performans açısından önemli olan lif/malzeme alt
        türünü belirtir (genel Malzeme bilgisinden daha spesifiktir).
    beading_thread_size:
      name: Boncuk dizme ipi ölçüsü
      description: Boncuk ipliği için kullanılan üreticiye/sektöre özgü boyut etiketini
        gösterir (ör. D boyutu veya 00).
    beading_thread_use_case:
      name: Boncuk ipliği kullanım amacı
      description: Boncuk ipliğinin temel önerilen kullanım alanını tanımlar. Böylece
        müşteriler projeleri için doğru ürünü seçebilir.
    beading_wire_coating_material:
      name: Boncuk teli kaplama malzemesi
      description: Boncuk telinin dış kaplama malzemesini belirtir (varsa). Bu malzeme,
        hissiyatı, dayanıklılığı ve bükülmeye karşı direnci etkiler.
    beading_wire_strand_count:
      name: Boncuk teli tel sayısı
      description: Çok telli boncuk telindeki tel sayısını belirtir (ör. 7 telli,
        19 telli, 49 telli). Bu özellik, esnekliği ve dökümü etkiler.
    beadlock_type:
      name: Beadlock tipi
      description: Jantın beadlock olup olmadığını ve beadlock stilini belirtir (özellikle
        off-road/UTV kullanıcıları için).
    beam_material:
      name: Çerçeve malzemesi
      description: Kirişin/çubuğun ana malzemesi (genellikle başlıklardan/aparatlardan
        farklıdır).
    beam_pattern:
      name: Işık huzmesi deseni
      description: Sürüş/off-road aydınlatmasında kullanılan ışık dağılım desenini
        belirtir.
    bean_bag_fabric_material:
      name: Fasulye torbası kumaş malzemesi
      description: Setle birlikte verilen fasulye torbalarında kullanılan dış kumaşı
        tanımlar.
    bean_paste_variety:
      name: Fasulye ezmesi çeşidi
      description: Üretim tarzına veya ana bileşenine göre belirli fasulye ezmesi
        türünü sınıflandırır.
    bean_preparation:
      name: Fasulye hazırlama şekli
      description: Fasulyelerin satış öncesinde nasıl hazırlandığını veya işlendiğini
        belirtir (ör. bütün bakla, ayıklanmış, doğranmış, filizlendirilmiş).
    bean_variety:
      name: Fasulye çeşidi
      description: Fasulyelerin botanik veya ticari çeşidini belirtir (ör. taze fasulye,
        edamame, metre fasulyesi).
    beanie_style:
      name: Bere stili
      description: Müşterilerin yaygın varyasyonlar arasında hızlıca seçim yapabilmesi
        için berenin genel tasarımını, yapısını veya siluetini belirtir.
    bearing_clearance:
      name: Rulman boşluğu
      description: Rulmanın iç radyal boşluk sınıfını belirtir (iç hareket miktarı).
        C0 sınıfı CN veya normal boşluk olarak da adlandırılır.
    bearing_construction_type:
      name: Rulman yapısı türü
      description: Göbekte kullanılan rulman tasarımını veya yapı stilini tanımlar
        (ör. kartuş rulman, gevşek bilyalı).
    bearing_edge_type:
      name: Rulman kenar tipi
      description: Davul kasası rulman kenarının tipini/profilini belirtir. Bu özellik,
        sesin atağını ve kalıcılığını etkiler
    bearing_lubrication:
      name: Rulman yağlaması
      description: Rulman imalatı sırasında kullanılan yağlayıcı türünü belirtir.
        Örneğin gres veya yağ.
    bearing_material:
      name: Rulman malzemesi
      description: Rulman yapım malzemesini (örneğin, çelik, seramik hibrit) belirleyerek
        sürücülerin dayanıklılık, maliyet ve performans seçenekleri arasında seçim
        yapmasına yardımcı olur.
    bearing_rating:
      name: Rulman derecelendirmesi
      description: Patenlerde kullanılan rulman toleransını veya performans sınıfını
        belirtir (ör. ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Rulman contası kodu
      description: Rulman üzerinde kullanılan sızdırmazlık stilini gösterir ve bu
        da dayanıklılığı ve yuvarlanma direncini etkiler.
    bearing_seal_type:
      name: Rulman contası türü
      description: Rulman iç parçalarını kirleticilerden koruyan ve sürtünmeyi etkileyen
        sızdırmazlık veya koruma tasarımını belirtir (örneğin, 2RS, ZZ, LLU, açık).
    bearing_shield_type:
      name: Rulman koruma tipi
      description: Rulman iç parçalarını koruyan koruma veya sızdırmazlık yöntemi.
    bearing_size_code:
      name: Rulman boyut kodu
      description: İç çap, dış çap ve genişlik bilgilerini bir arada ifade eden standart
        rulman numarasını belirtir (ör. 608, 688).
    bearing_type:
      name: Rulman tipi
      description: Kulaklıkta kullanılan rulmanların yapım stilini belirtir.
    beater_head_material:
      name: Tokmak başlığı malzemesi
      description: Bas davul tokmağının temas/başlık malzemesini belirtir (örneğin,
        keçe, ahşap, kauçuk).
    beaters_included:
      name: Tokmaklar dahildir
      description: Davul pedalına kaç adet tokmak takıldığını (örneğin, tek veya çift
        tokmak) veya hiç tokmak takılmadığını belirtir.
    bed_base_type:
      name: Yatak bazası türü
      description: Yatak veya divan tabanının yapı tipini belirtir (ör. düz platform,
        yaylı çıtalı, ayarlanabilir).
    bed_storage_type:
      name: Yatak saklama alanı türü
      description: Karyolanın entegre depolama mekanizmasını belirtir.
    bedroom_furniture_items_included:
      name: Banyo mobilyaları dahil
      description: Yatak odası takımında yer alan mobilya parçalarını (örneğin, yatak,
        şifonyer, komodin) belirterek, alıcının uzun açıklamaları okumadan nelerin
        dahil olduğunu hızlıca görmesini sağlar.
    bedroom_vanity_items_included:
      name: Makyaj masasının birlikte gelen parçaları
      description: Yatak odası makyaj masası setiyle birlikte verilen parçaları listeler.
        Bu sayede kullanıcılar ayna, tabure veya aydınlatma kiti gibi hangi öğelerin
        teslimata dahil olduğunu tam olarak görebilir.
    beer_based_cocktail_variety:
      name: Bira bazlı kokteyl çeşitleri
      description: Bira bazlı kokteylleri çeşitlerine göre sınıflandırır. Örneğin,
        Radler, Shandy, Michelada.
    beet_variety:
      name: Pancar çeşidi
      description: Pancarın çeşidini veya türünü belirtir. Böylece alıcının lezzetini,
        rengini ve mutfak kullanımını belirlemesine yardımcı olur (örneğin, kırmızı,
        altın sarısı, chioggia).
    bell_actuation_mechanism:
      name: Zil etkinleştirme mekanizması
      description: Kullanıcının zili çaldırmak için gerçekleştirmesi gereken eylemi
        belirtir. Böylece müşteriler tercih ettikleri kullanım ergonomisini seçebilir.
    bell_guard_coverage_area:
      name: Zil koruyucu kapsama alanı
      description: Koruyucunun zilin hangi bölümünü korumak üzere tasarlandığını belirtir.
    bell_material:
      name: Zil malzemesi
      description: Zil bileşeninin malzemesi (genel enstrüman malzemesinden ayrı belirtilmişse).
    bellhousing_bolt_pattern:
      name: Debriyaj muhafazası cıvata deseni
      description: Şanzıman muhafazasının kullandığı debriyaj muhafazası/motor tarafı
        cıvata deseni standardını veya desen ailesini belirtir.
    bellows_material:
      name: Körük malzemesi
      description: Körük gövdesinin/kaplamasının malzemesi (varsa).
    bellows_orientation:
      name: Körük yönelimi
      description: Borulara hava sağlamak için kullanılan körük yapılandırmasını belirtir.
    belly_panel_style:
      name: Karın paneli stili
      description: Büyüyen karna uyum sağlayan bel bandının veya karın panelinin yapısını
        açıklar.
    belt_buckle_type:
      name: Kemer tokası tipi
      description: Kemerde kullanılan özel toka mekanizmasını veya tasarımını tanımlar.
    beret_style:
      name: Bere tarzı
      description: Berenin belirli tasarımını veya kültürel varyantını tanımlar.
    berry_species:
      name: Meyve türü
      description: Üründe bulunan meyvenin türünü belirtir. Böylece müşteriler istedikleri
        meyveye göre hızlıca filtreleme yapabilir.
    beta_casein_variant:
      name: Beta-kazein çeşidi
      description: Sindirilebilirlik konusunda hassasiyeti olan tüketiciler için sütte
        bulunan beta-kazein protein varyantını belirtir (ör. A2).
    beverage_sweetness_level:
      name: İçeceğin tatlılık seviyesi
      description: İçeceği ilave tatlılık veya şeker miktarına göre sınıflandırır.
    bezel_graduation_units:
      name: Çerçeve derecelendirme birimleri
      description: Döner çerçeve üzerindeki birim işaretlerini belirtir (derece, mil
        veya çift ölçek).
    bicycle_brake_set_components_included:
      name: Bisiklet fren setine dahil bileşenler
      description: Müşterilerin tam olarak nelerin dahil olduğunu bilmesi ve farklı
        paket yapılandırmalarını karşılaştırabilmesi için kitte bulunan parçaları
        listeler.
    bicycle_cage_mounting_position:
      name: Bisiklet kafesi montaj konumu
      description: Kafesin bisiklet üzerinde nereye monte edilmek üzere tasarlandığını
        belirtir.
    bicycle_computer_mount_placement:
      name: Bisiklet bilgisayarı montaj konumu
      description: Bilgisayar tutucusunun bisiklet üzerinde nereye monte edildiğini
        belirtir. Örneğin gidonun önüne veya boğaz üst kapağına.
    bicycle_folding_mechanism:
      name: Bisiklet katlama mekanizması
      description: Bisiklet kadrosunda kullanılan mekanik katlama sistemini belirtir
        (ör. yarım katlama, dikey katlama).
    bicycle_frame_design:
      name: Bisiklet kadrosu tasarımı
      description: Bisiklet kadrosunun genel stilini belirtir. Bu özellik erişilebilirliği,
        yük kapasitesini ve depolamayı etkiler.
    bicycle_frame_style:
      name: Bisiklet kadrosu stili
      description: Bisiklet kadrosunun yapısal stilini açıklar (step-through, lowrider,
        uzatılmış chopper vb.). Bu özellik sürüş pozisyonunu ve görünümü etkiler.
    bicycle_handlebar_type:
      name: Bisiklet gidon türü
      description: Belirli gidon stilini veya geometrisini tanımlar. Böylece sürücüler
        sürüş pozisyonlarına ve disiplinlerine uygun gidonları seçebilir.
    bicycle_headset_configuration:
      name: Bisiklet furş takımı yapılandırması
      description: Furş takımının yapısal stilini veya standardını, kap yerleşimine
        göre belirtir (ör. External Cup, ZeroStack, Integrated, Threaded).
    bicycle_hub_type:
      name: Bisiklet göbeği tipi
      description: Tekerlekle birlikte verilen göbek mekanizmasını açıklar. Bu mekanizma
        aktarma sistemi uyumluluğunu ve sürüş tarzını etkiler.
    bicycle_lock_security_certification:
      name: Bisiklet kilidi güvenlik sertifikası
      description: Hırsızlığa karşı koruma performansını doğrulayan bağımsız üçüncü
        taraf sertifikasyonu (örneğin, Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Bisiklet pedalı tipi
      description: Pedalın genel çalışma stilini veya tasarımını belirtir. Örneğin
        platform, kilitli pedal varyantları veya hibritler. Bu, sürücülerin sürüş
        tarzlarına uygun arayüzü seçmesine yardımcı olur.
    bicycle_propulsion_type:
      name: Üç tekerlekli tahrik türü
      description: Bisikletin nasıl tahrik edildiğini belirtir. Örneğin manuel pedal
        çevirme, elektrik desteği veya içten yanmalı motor gücü.
    bicycle_pump_type:
      name: Bisiklet tahrik türü
      description: Pompanın yapısal stilini tanımlar. Böylece müşteriler sürüş, depolama
        veya acil durum ihtiyaçlarına en uygun tasarımı seçebilir.
    bicycle_rack_mounting_type:
      name: Bisiklet bagaj taşıyıcısı montaj tipi
      description: Bagaj taşıyıcısının bisiklete bağlanmasında kullanılan temel yöntemi
        veya konumu açıklar. Böylece kullanıcılar kadro ve donanımlarıyla uyumluluğu
        doğrulayabilir.
    bicycle_suspension_type:
      name: Bisiklet süspansiyon türü
      description: Bisiklette süspansiyon bulunup bulunmadığını ve yapılandırmasını
        belirtir.
    bicycle_tire_tread_pattern:
      name: Bisiklet lastiği diş deseni
      description: Lastiğin diş stilini belirtir. Bu özellik, farklı yüzeylerde tutuşu
        ve yuvarlanma direncini etkiler.
    bidirectional_charging_capability:
      name: Çift yönlü şarj özelliği
      description: EV'nin V2G ve/veya V2H gibi çift yönlü şarj modlarını destekleyip
        desteklemediğini belirtir.
    bike_rack_mounting_style:
      name: Bisiklet taşıyıcı montaj türü
      description: Bisikletin taşıyıcı tarafından nasıl desteklendiğini/sabitlendiğini
        belirtir.
    bike_rack_tilt_function:
      name: Bisiklet taşıyıcısı eğim fonksiyonu
      description: Taşıyıcı takılıyken arka yük alanına erişim için bir eğim fonksiyonunun
        bulunup bulunmadığını ve türünü belirtir.
    bikini_top_style:
      name: Bikini üstü stili
      description: Bikini üstünün tasarımını veya kesimini belirtir Böylece müşteriler
        tercih ettikleri kalıp ve siluetleri bulabilir.
    billiard_brush_type:
      name: Bilardo fırçası tipi
      description: Bilardo masası temizleme aracının belirli stilini tanımlar (ör.
        masa fırçası, bant fırçası, tüy kaldırma bloğu).
    billiard_glove_finger_coverage:
      name: Bilardo eldiveni parmak kapsama alanı
      description: Bilardo eldiveni tasarımında hangi parmakların kapalı olduğunu
        belirtir ve bilardoya özgü eldiven stilleri için hassas filtreleme sağlar.
    billiard_pocket_style:
      name: Bilardo cep tipi
      description: Cebin yapısal veya görsel stilini belirtir. Bu özellik uyumluluğu
        ve masa dekorunu etkiler.
    billiard_rack_style:
      name: Bilardo üçgeni stili
      description: Üçgenin fiziksel stilini veya mekanizmasını açıklar (ör. geleneksel
        çerçeve, şablon tabaka, katlanabilir).
    billiard_table_type:
      name: Bilardo masası tipi
      description: Masanın tasarlandığı isteka sporunu veya kullanım stilini belirtir
        (ör. pool, snooker, karambol).
    billiards_discipline:
      name: Bilardo disiplini
      description: Ürünün amaçlandığı veya uyumlu olduğu belirli isteka sporu varyasyonunu
        (oyun türünü) belirtir.
    binding_compatibility_standard:
      name: Bağlama uyumluluk standardı
      description: Kayak botunun sertifikalandırıldığı bağlama arayüzünü (taban standardını)
        tanımlar ve kayak bağlamalarıyla güvenli ve doğru eşleşmeyi sağlar.
    binding_inclusion:
      name: Bağlamanın dahil olup olmadığı
      description: Kayakların bağlamasız, entegre sistemli veya ayrı bağlamalar dahil
        olarak satılıp satılmadığını belirtir.
    binding_interface:
      name: Bağlama arayüzü
      description: Kayakların önceden monte edildiği veya uyumlu olduğu bağlama plakası
        ya da arayüz standardını belirtir ve bot/bağlama uyumluluğunu sağlar.
    binding_liner_type:
      name: Bağlama iç bot tipi
      description: Bağlama/bot içinde kullanılan iç astarın stilini açıklar (ör. çıkarılabilir,
        yürünebilir, ısıyla şekillendirilebilir).
    binding_mounting_system:
      name: Bağlama montaj sistemi
      description: Bağlamayı kayağa bağlamak için kullanılan arayüzü tanımlar (düz
        montaj, ray/sürgü sistemi, plaka vb.).
    binding_position:
      name: Bağlama konumu
      description: Bağlama için amaçlanan montaj konumunu veya yapılandırmasını belirtir
        (ör. ön bot, arka bot, ARTP).
    binding_strap_position:
      name: Bağlama kayışı konumu
      description: Kayışın bağlamanın neresine takılmak üzere tasarlandığını belirtir.
    bingo_components_included:
      name: Dahil edilen bingo bileşenleri
      description: Bingo topları, kartlar ve işaretleyiciler gibi bingo setiyle birlikte
        verilen bileşenleri listeler.
    bingo_number_range:
      name: Bingo sayı aralığı
      description: Setin desteklediği bingo sayı aralığını/varyantını tanımlar.
    bingo_set_features:
      name: Bingo seti özellikleri
      description: Bingo setinin temel ürün formatını tanımlar (fiziksel/manüel veya
        elektronik/etkileşimli).
    bipod_mounting_interface:
      name: Bipod montaj arayüzü
      description: Bipodu ateşli silaha veya ray sistemine bağlamak için kullanılan
        bağlantı arayüzünü belirtir.
    bit_attachment_type:
      name: Gem bağlantı tipi
      description: Başlığın geme nasıl bağlandığını belirtir (ör. bağlamalı uçlar,
        tokalı uçlar, Chicago vidalı uçlar).
    bit_mouthpiece_design:
      name: Gem ağızlık tasarımı
      description: Ağızlığın yapısal stilini veya eklem yapılandırmasını tanımlar.
        Bu yapı, basınç dağılımını, damak boşluğunu ve genel sertliği belirler.
    bit_ring_style:
      name: Gem halka stili
      description: Gemin dizgine bağlanan yanak veya halka stilini tanımlar. Bu stil
        etkiyi, yanal yönlendirmeyi ve dizgin hissini etkiler.
    bladder_material:
      name: İç lastik malzemesi
      description: Havayı tutan iç kesenin malzemesini tanımlar.
    blade_attachment_type:
      name: Paten bıçağı bağlantı tipi
      description: Patenin clap (menteşeli) mekanizma mı yoksa sabit bıçak montajı
        mı kullandığını belirtir.
    blade_finish_coating:
      name: Bıçak yüzeyi/kaplaması
      description: Estetik görünüm veya korozyon koruması için bıçağa uygulanan yüzey
        işlemini belirtir.
    blade_hosel_type:
      name: Bıçak hosel tipi
      description: Bıçak hoselinin şafta bağlanan bağlantı stilini belirtir. Bu özellik,
        uyumluluğu etkiler (ör. Standart veya Konik).
    blade_length_type:
      name: Paten bıçağı uzunluğu tipi
      description: Palet pala uzunluğunu kısa, orta veya uzun olarak sınıflandırır.
        Her biri ayak vuruşu temposunu ve antrenman hedeflerini etkiler.
    blade_lie:
      name: Bıçak lie değeri
      description: Hokey sopası bıçağının lie numarasını belirtir. Bu değer, bıçağın
        şafta göre buz üzerinde nasıl durduğunu gösterir.
    blade_sharpness:
      name: Bıçak keskinliği
      description: Silah ağzının eğitim amaçlı keskinleştirilmiş mi yoksa köreltilmiş
        mi olduğunu belirtir.
    blade_size_category:
      name: Bıçak boyutu kategorisi
      description: Genç ve yetişkin bıçaklarını ayırt etmek için kullanılan standart
        uluslararası kılıç bıçağı boyut kodunu (0–5) belirtir.
    blade_size_class:
      name: Bıçak boyutu sınıfı
      description: Bıçağı oyuncu ölçülendirme sistemine göre sınıflandırır. Youth,
        Junior, Intermediate veya Senior gibi şaft boyutlarıyla eşleşir.
    blade_size_number:
      name: Bıçak boyutu numarası
      description: Eskrim kurallarıyla tanımlanan ve bıçak uzunluğunu ile yaş grubu
        uygunluğunu belirleyen standart sayısal boyut kodu (0–5).
    blaster_mechanism:
      name: Blaster mekanizması
      description: Jel blaster'ın dahili çalışma mekanizmasını tanımlar (ör. GBB,
        AEG, yaylı).
    block_edge_style:
      name: Blok kenar stili
      description: Ahşap blokların kenarlarının/köşelerinin dokunma hissi ve güvenlik
        açısından nasıl işlendiğini açıklar.
    blocking_mat_features:
      name: Şekillendirme matı özellikleri
      description: Bloklama matlarına özgü işlevsel özellikler (depolama, taşınabilirlik,
        kullanım kolaylığı).
    blocking_mat_grid_unit:
      name: Bloklama matı ızgara birimi
      description: Basılı ızgarada kullanılan birim sistemini belirtir. Bu, kullanıcıların
        desenleri ve ölçüleri eşleştirmesine yardımcı olur.
    blocking_mat_surface_markings:
      name: Bloklama matı yüzey işaretleri
      description: Mat yüzeyine basılmış veya kalıplanmış ölçüm/kılavuz işaretlerinin
        türü.
    blocking_wire_coating:
      name: Bloklama teli kaplaması
      description: Bloklama teline uygulanan yüzey işlemini/kaplamayı belirtir. Bu
        özellik, pas direncini, pürüzsüzlüğü ve takılma riskini etkiler.
    blocking_wire_end_cap_type:
      name: Bloklama teli uç kapağı tipi
      description: Güvenlik ve kumaş koruması amacıyla bloklama teli uçlarında kullanılan
        koruma/bitiş türünü belirtir.
    blocking_wire_set_includes:
      name: Bloklama teli set içeriği
      description: Bloklama teli ürünüyle birlikte verilen bileşenleri belirtir (ör.
        T iğneleri, saklama tüpü).
    blocking_wire_usage:
      name: Bloklama teli kullanım amacı
      description: Esnek bloklama telinin tasarlandığı temel kullanım amacını belirtir.
    bloom_stage:
      name: Çiçek açma aşaması
      description: Papatya çiçeklerinin teslimat/sevkıyat sırasında açılma derecesini
        belirtir.
    blower_motor_bearing_type:
      name: Üfleyici motoru rulman tipi
      description: Üfleyici motorunda kullanılan rulman tasarımını belirtir.
    blower_motor_mounting_position:
      name: Üfleyici motoru montaj konumu
      description: Üfleyici motorunun HVAC modülünde/araçta nereye monte edildiğini
        belirtir (ör. ön, arka).
    blowpipe_valve_type:
      name: Üfleme borusu valf tipi
      description: Dahil edilen üfleme borusu valfının stilini belirtir (varsa).
    bo_staff_style:
      name: Bo sopası stili
      description: Bo sopası yapısal stilini veya yapısını tanımlar (ör. düz, konik,
        köpük kaplı, katlanabilir).
    board_game_theme:
      name: Kutu oyunu teması
      description: Kutu oyununun anlatı/ortam temasını belirtir (keşif ve gezinme
        amaçlı kullanılır).
    board_rail_shape:
      name: Board ray şekli
      description: Board raylarının profilini belirtir (ör. yumuşak, sert, 50/50).
        Bu özellik, dalga üzerindeki tutuşu ve yönlendirmeyi etkiler.
    board_size_classification:
      name: Board boyut sınıflandırması
      description: Cornhole tahtasını veya setini yaygın standart boyutlara göre sınıflandırır.
    board_type_compatibility:
      name: Board tipi uyumluluğu
      description: Güvenlik kayışının tasarlandığı board türünü belirtir.
    boat_construction_type:
      name: Tekne yapım tipi
      description: Kürekli teknenin yapısal stilini veya formatını açıklar (ör. şişirilebilir,
        sert gövdeli).
    boat_hook_flotation:
      name: Tekne çengeli yüzebilirliği
      description: Tekne çengelinin suya düşmesi halinde yüzebilecek şekilde tasarlanıp
        tasarlanmadığını belirtir.
    boat_ladder_stowage_style:
      name: Tekne merdiveni saklama stili
      description: Merdivenin kullanılmadığında nasıl saklandığını açıklar (ör. katlanır,
        geri çekilebilir, çıkarılabilir).
    boat_trailer_construction_type:
      name: Tekne römorku yapı tipi
      description: Römorkun tekneyi kızaklar, makaralar veya hibrit bir sistemle destekleyip
        desteklemediğini belirtir.
    boat_weaving_shuttle_weft_exit_type:
      name: Tekne dokuma mekiği atkı çıkış tipi
      description: Dokuma sırasında atkı ipliğinin mekikten nasıl çıktığını belirtir.
    bobbin_loading_type:
      name: Masura yükleme tipi
      description: Masuranın dikiş makinesine nasıl yerleştirildiğini/yüklendiğini
        belirtir.
    bobbin_system:
      name: Masura sistemi
      description: Dikiş makinesinde kullanılan masura yükleme sistemini/tipini belirtir.
    bobbin_type:
      name: Masura tipi
      description: Mekiğin kullanmak üzere tasarlandığı (veya içerdiği) iplik taşıyıcı
        formatını belirtir. Bu özellik uyumluluğu ve tipik kullanımı belirler (ör.
        tekne mekikleri genellikle masura kullanırken, paçavra mekikleri kumaş şeritleri
        için açık olabilir).
    bobbin_winder_winding_direction:
      name: Masura sarıcı sarım yönü
      description: Masura sarıcının desteklediği sarım/dönüş yönünü belirtir.
    bobble_mechanism:
      name: Ponpon mekanizması
      description: Ponpon mekanizmasının stilini belirtir. Bu özellik, hareketi ve
        dayanıklılığı etkiler.
    bocal_material:
      name: Bokal malzemesi
      description: Dahil edilen bokalların malzemesini belirtir.
    bodhr_n_head_material:
      name: Bodhrán deri malzemesi
      description: Çalma yüzeyinin (membranın) malzemesi. Bu malzeme, tonu ve bakım
        gereksinimlerini büyük ölçüde etkiler.
    bodhr_n_tuning_system_type:
      name: Bodhrán akort mekanizması tipi
      description: Deri gerginliğini ayarlamak için kullanılan yerleşik akort mekanizmasının
        stilini belirtir (ayarlanabiliyorsa).
    body_armor_coverage_area:
      name: Vücut zırhı koruma alanı
      description: Ürünün hangi vücut bölgelerini koruduğunu belirtir.
    body_armor_intended_use:
      name: Vücut zırhı kullanım amacı
      description: TV/UTV vücut zırhının tasarlandığı temel sürüş veya kullanım senaryosunu
        belirtir.
    body_cord_connector_style:
      name: Vücut kablosu konnektör stili
      description: Kablonun uçlarındaki konnektör yapılandırmasını açıklar (ör. pim
        sayısı veya süngü tipi). Bu yapılandırma, silahlar ve puanlama kutularıyla
        uyumluluğu belirler.
    body_panel_finish_state:
      name: Kaporta paneli yüzey durumu
      description: Çeyrek panelin boyama/montaj öncesindeki satış durumundaki yüzey
        hazırlığını/bitişini açıklar.
    body_shape:
      name: Gövde şekli
      description: Elektro gitarın genel gövde şeklini/stilini belirtir.
    bodysuit_bottom_coverage:
      name: Body alt kısmı kapsama alanı
      description: Body'nin alt kısmının kesimini ve kapsama alanını tanımlar. Bu
        özellik konforu ve kıyafet uyumluluğunu etkiler.
    boilie_shape:
      name: Boilie şekli
      description: Yuvarlama tablasıyla üretilen boilielerin şeklini tanımlar. Böylece
        balıkçılar farklı yem profilleri arasında seçim yapabilir.
    boilie_stop_buoyancy:
      name: Boilie stoper yüzebilirliği
      description: Boilie stoperinin yüzecek, batacak veya nötr yüzebilirlikte kalacak
        şekilde tasarlanıp tasarlanmadığını belirtir. Bu özellik, yemin su sütunundaki
        sunumunu etkiler.
    bok_choy_variety:
      name: Bok choy çeşidi
      description: Bok choy kültivarını, ticari adını veya çeşidini belirtir (ör.
        Baby, Shanghai, Nai Bai, Tatsoi, Purple Lady). Böylece müşteriler istedikleri
        lezzet, boyut ve görünümü seçebilir.
    bolt_drive_style:
      name: Cıvata tahrik tipi
      description: 'Kaykay montaj cıvatalarının tahrik tipini belirtir: Allen veya
        Phillips gibi yaygın başlık/sürücü türlerini ayırt eder.'
    bone_content:
      name: Kemik içeriği
      description: Etin kemik içerip içermediğini belirtir.
    bongo_center_block_material:
      name: Bongo orta blok malzemesi
      description: İki bongo gövdesini birbirine bağlayan orta bloğun malzemesi (varsa).
    bongo_shell_material:
      name: Bongo gövde malzemesi
      description: Bongo gövdelerinin (davul kasalarının) malzemesi (deri ve donanım
        hariç).
    bongo_tuning_system:
      name: Bongo akort sistemi
      description: Bongoların nasıl akort edildiğini veya akort için nasıl yapılandırıldığını
        belirtir (ör. geleneksel lug akordu veya ip akordu). Bu özellik, bakım gereksinimlerini
        ve özgünlüğü etkiler.
    boning_type:
      name: Balen tipi
      description: Korse içindeki yapısal destek sistemini tanımlar; kullanılan malzemeyi
        ve balen stilini/şeklini birlikte kapsar. Bu özellik, destek seviyesini, esnekliği
        ve dayanıklılığı doğrudan etkiler.
    boot_liner_type:
      name: Bot iç astar tipi
      description: Snowboard botunun iç astarının yapısını veya kişiselleştirilmiş
        özelliğini tanımlar (örneğin, ısı ile şekillendirilebilir, çıkarılabilir).
    boot_sole_compatibility:
      name: Bot tabanı uyumluluğu
      description: Bağlamanın kabul ettiği bot tabanı standartlarını veya arayüz sistemlerini
        listeler.
    boot_support_level:
      name: Bot destek seviyesi
      description: Patenin sağladığı genel bilek veya bot sertliği/destek derecesini
        açıklar.
    boot_width_code:
      name: Bot genişliği kodu
      description: Artistik paten ölçülendirmesinde kullanılan, üreticiye özgü harf
        tabanlı genişlik tanımlamasını belirtir (ör. AAA, AA, B, C, D).
    booth_configuration:
      name: Loca düzeni
      description: Oturma grubunun genel yerleşim düzenini tanımlar (ör. tek taraflı,
        köşe tipi, modüler).
    bootie_toe_design:
      name: Patik burun tasarımı
      description: Sörf ve resif patiklerinin burun yapısı stilini tanımlar.
    border_type:
      name: Kenar tipi
      description: İşlemeli yamanın kenar bitişini/kenar stilini belirtir (görünümü,
        sökülmeye karşı direnci ve algılanan kaliteyi etkiler).
    bore_cleaner_format:
      name: İç boru temizleyici formatı
      description: İç boru temizleme ürününün fiziksel formunu belirtir (alet veya
        sarf malzemesi).
    bore_cleaner_safe_for_finish:
      name: İç boru temizleyicinin güvenli olduğu yüzeyler
      description: İç boru temizleyicinin hangi yaygın pirinç üflemeli çalgı yüzeylerinde
        güvenle kullanılabileceğini belirtir.
    bottle_cage_loading_direction:
      name: Şişe kafesi yükleme yönü
      description: Şişenin kafese hangi yönden yerleştirildiğini veya çıkarıldığını
        açıklar.
    bottle_neck_finish_closure_size:
      name: Şişe boynu bitişi/kapatma ölçüsü
      description: Kapaklar, mantarlar ve kapatma ekipmanlarıyla uyumluluğu sağlamak
        için standartlaştırılmış şişe ağzı/bitiş ölçüsünü belirtir (ör. 26 mm taç
        kapak bitişi).
    bottle_style:
      name: Şişe stili
      description: Ev tipi bira ve şarap yapımında kullanılan yaygın şişe form faktörleri.
    bottom_bracket_interface:
      name: Orta göbek arayüzü
      description: Aynakolun tasarlandığı mil/orta göbek standardını tanımlar ve kadro
        ile orta göbek uyumluluğunu sağlar.
    bottom_bracket_standard:
      name: Orta göbek standardı
      description: Kadronun desteklediği orta göbek muhafazası/arayüzünü belirtir.
        Bu da aynakol uyumluluğunu belirler.
    bottom_type_suitability:
      name: Taban türü uygunluğu
      description: Çapanın en iyi tutunacak şekilde tasarlandığı deniz tabanı koşullarını
        belirtir.
    bounce_level:
      name: Zıplama seviyesi
      description: Topun bırakıldığında veya fırlatıldığında ne kadar sıçradığını
        belirtir. Böylece kullanıcılar duvara atış veya slam gibi egzersizler için
        doğru topu seçebilir.
    bouncy_ball_surface_finish:
      name: Zıplayan top yüzey kaplaması
      description: Zıplayan topun dokunsal ve/veya görsel yüzey bitişini belirtir
        (ör. pürüzsüz, dikenli, simli).
    boundary_marker_type:
      name: Sınır işaretleyici tipi
      description: Saha veya kort sınır işaretleyicisinin ya da işaretleme ürününün
        fiziksel formunu tanımlar (ör. koni, bant, boya, şablon, makine).
    bouquet_size_tier:
      name: Buket boyut kademesi
      description: Sap sayısından bağımsız olarak buket/demet için standartlaştırılmış
        boyut kademesini belirtir (özellikle karışık saplı buketlerde kullanışlıdır).
    bow_and_yo_yo_edge_finish:
      name: Fiyonk ve kumaş rozet kenar bitişi
      description: Fiyonkta/kumaş rozette kullanılan kenar bitişini veya süsleme stilini
        açıklar (özellikle kurdele tabanlı fiyonklarda).
    bow_case_shell_type:
      name: Yay kutusu dış gövde tipi
      description: Yay kılıfının dış yapısını açıklar (ör. sert kabuk veya yumuşak
        kılıf).
    bow_compatibility:
      name: Yay uyumluluğu
      description: Geniş uçlu okun kullanım amacıyla tasarlandığı veya uygun olduğu
        yay tipini belirtir.
    bow_hair_color:
      name: Yay kılı rengi
      description: Orkestral yaylı çalgı yayında kullanılan kılların rengini/görünümünü
        tanımlar (ör. beyaz/ağartılmış, doğal beyaz, siyah).
    bow_stick_material:
      name: Yay çubuğu malzemesi
      description: Yay çubuğunda (ana gövdede) kullanılan malzemeyi tanımlar. Bu malzeme
        ağırlığı, hissiyatı ve fiyatı büyük ölçüde etkiler.
    bow_type:
      name: Yay tipi
      description: Gençlik yayının yapısal tasarımını belirtir (ör. makaralı yay,
        recurve, uzun yay). Bu tasarım atış stilini, gerekli aksesuarları ve eğitim
        programlarını önemli ölçüde etkiler.
    bow_winding_material:
      name: Yay sarım malzemesi
      description: Yay sarımında/sargısında kullanılan malzemeyi belirtir. Bu malzeme,
        tutuşu ve dengeyi etkiler.
    bow_yo_yo_embellishment_style:
      name: Fiyonk/kumaş rozet süsleme stili
      description: Süslemenin (fiyonk veya kumaş rozet) yapısal stilini tanımlar.
    bowling_ball_core_type:
      name: Bowling topu çekirdeği tipi
      description: Bowling topunun iç çekirdek tasarımını veya simetrisini tanımlar.
        Bu özellik, top hareketini ve falso potansiyelini etkiler.
    bowling_ball_coverstock_type:
      name: Bowling topu dış kaplama tipi
      description: Bowling topunun dış kaplama malzemesini veya teknolojisini belirtir.
        Bu özellik, tutuşu ve falso potansiyelini belirler.
    bowling_set_style:
      name: Bowling seti stili
      description: Bowling setinin genel stilini veya kullanım amacını tanımlar.
    box_lid_type:
      name: Kutu kapağı tipi
      description: Hediye kutusu veya metal kutuda kullanılan kapak/açılma mekanizması
        tipi.
    box_spring_profile:
      name: Yaylı baza profili
      description: Yaylı bazanın genel yüksekliğini müşteri dostu profil kategorilerine
        göre sınıflandırır (ör. alçak profil, standart, yüksek profil). Böylece müşteriler
        tam ölçüleri bilmeden filtreleme yapabilir.
    box_spring_requirement:
      name: Yaylı baza gerekliliği
      description: Yatağın ek bir yaylı baza veya temel destek gerektirip gerektirmediğini
        belirtir.
    boxing_ring_style:
      name: Boks ringi stili
      description: Ringin genel yapısal stilini veya amaçlanan kullanım senaryosunu
        sınıflandırır (ör. yarışma veya antrenman, yükseltilmiş veya zemin tipi).
    bra_length_type:
      name: Sütyen uzunluğu tipi
      description: Sütyenleri dikey kaplama alanına göre sınıflandırır. Örneğin standart,
        uzun hatlı, midi veya kısa model.
    bra_padding_type:
      name: Sütyen dolgu tipi
      description: Kaplardaki dolgu seviyesini veya kaplarda dolgu olup olmadığını
        belirtir.
    braces_compatibility:
      name: Diş teli uyumluluğu
      description: Ağız koruyucunun ortodontik tellerle kullanılıp kullanılamayacağını
        ve ne ölçüde kullanılabileceğini belirtir.
    brake_band_form:
      name: Fren bandı formu
      description: Fren bandının kesintisiz halka (sonsuz) şeklinde mi yoksa sabitlenmesi
        gereken kesilmiş uzunlukta mı sunulduğunu belirtir.
    brake_band_material_type:
      name: Fren bandı malzeme tipi
      description: Fren bandının işlevsel malzemesini belirtir (ör. pamuk kordon,
        naylon ip, yay çeliği). Bu özellik, dayanıklılığı, tutuşu, esnemeyi ve gürültüyü
        etkiler.
    brake_band_style:
      name: Fren bandı stili
      description: Eğirme çarkında flyer/bobin gerginliği uygulamak için kullanılan
        fren bandı gerginlik sistemini/stilini belirtir.
    brake_bleeding_method:
      name: Fren havası alma yöntemi
      description: Kitin desteklediği hava alma yöntemini belirtir.
    brake_booster_assist_type:
      name: Fren servosu destek tipi
      description: Fren servosunda kullanılan destek mekanizmasını belirtir.
    brake_booster_diaphragm_configuration:
      name: Fren servosu diyafram yapılandırması
      description: Servoda kullanılan diyaframların sayısını/tipini belirtir.
    brake_caliper_bleeder_screw_position:
      name: Fren kaliperi hava alma vidası konumu
      description: Montaj sonrası kaliper üzerindeki hava alma vidasının konumunu
        belirtir (doğru hava alma için vidanın en üst noktada olduğunu doğrulamak
        amacıyla kullanılır).
    brake_caliper_finish:
      name: Fren kaliperi yüzeyi
      description: Fren kaliperi gövdesine uygulanan yüzey bitişini veya koruyucu
        kaplamayı belirtir (ör. boya, kaplama, eloksal).
    brake_caliper_included_hardware:
      name: Fren kaliperi dahil donanım
      description: Kaliper grubuyla birlikte nelerin verildiğini belirtir.
    brake_caliper_mount_type:
      name: Fren kaliperi montaj tipi
      description: Kaliperi taşıyıcıya/brakete bağlamak için kullanılan montaj arayüzü
        stilini belirtir.
    brake_caliper_paint_base_chemistry:
      name: Fren kaliperi boya baz kimyası
      description: Kullanılan boya/reçine sistemini veya kimyasal ailesini belirtir.
    brake_caliper_paint_kit_contents:
      name: Fren kaliperi boya kiti içeriği
      description: Paketin boya dışında hangi öğeleri içerdiğini belirtir.
    brake_circuit_type:
      name: Fren devresi tipi
      description: Ana merkez silindirinin desteklediği hidrolik devre yapılandırmasını
        belirtir.
    brake_clutch_fluid_base_chemistry:
      name: Fren/debriyaj hidroliği baz kimyası
      description: Fren/debriyaj hidrolik sıvısının temel kimyasal bazını belirtir.
        Bu özellik, uyumluluğu ve karışabilirliği etkiler.
    brake_clutch_fluid_dot_specification:
      name: Fren/debriyaj hidroliği DOT spesifikasyonu
      description: Hidrolik fren/debriyaj sıvıları için DOT performans sınıflandırmasını
        belirtir (ör. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Fren kampanası yüzeyi/kaplaması
      description: Fren kampanasına uygulanan yüzey bitişini veya koruyucu kaplamayı
        belirtir (ör. e-kaplama, boyalı, çinko kaplı).
    brake_drum_type:
      name: Fren kampanası tipi
      description: Fren kampanasının entegre göbek/rulmanlı veya bunlar olmadan tasarlanıp
        tasarlanmadığını belirtir.
    brake_fluid_base:
      name: Fren hidroliği baz maddesi
      description: Gerekli veya dahil olan hidrolik fren hidroliği formülasyonunu
        belirtir.
    brake_fluid_base_chemistry:
      name: Fren hidroliği baz kimyası
      description: Fren hidroliğinin kimyasal temelini tanımlar. Bu, uyumluluk ve
        karıştırma kurallarını belirler.
    brake_fluid_dot_specification:
      name: Fren hidroliği DOT spesifikasyonu
      description: Fren hidroliği ürünleri için DOT fren hidroliği derecesini/spesifikasyonunu
        belirtir (ör. DOT 3, DOT 4).
    brake_fluid_standards_compliance:
      name: Fren hidroliği standart uyumluluğu
      description: Fren hidroliğinin karşıladığını iddia ettiği sektör standartları
        (DOT derecesi dışında).
    brake_fluid_type:
      name: Fren hidroliği tipi
      description: Hidrolik bisiklet fren kaliperleri için gereken fren hidroliği
        tipini belirtir.
    brake_hose_end_fitting_type:
      name: Fren hortumu uç bağlantı tipi
      description: Kaliperler ve hatlarla uyumluluğu sağlamak için fren hortumunun
        her iki ucundaki bağlantı stilini belirtir (ör. banjo, flare, dişi/erkek dişli).
    brake_lever_pull_type:
      name: Fren kolu çekiş tipi
      description: Kolun tasarlandığı kablo çekiş oranını/mekaniğini tanımlar ve belirli
        fren kaliperleriyle uyumluluğu sağlar (ör. kısa çekişli jant frenleri ve uzun
        çekişli V-frenler).
    brake_light_switch_actuation_type:
      name: Fren lambası anahtarı tetikleme tipi
      description: Anahtarın hangi fiziksel olayla etkinleştirildiğini tanımlar (pedal/plunger,
        hidrolik basınç vb.).
    brake_light_switch_connector_type:
      name: Fren lambası anahtarı konektörü tipi
      description: Fren lambası anahtarının araç tesisatına bağlanmak için kullandığı
        elektrik konnektörü stilini/formatını belirtir.
    brake_light_switch_contact_type:
      name: Fren lambası anahtarı kontakt tipi
      description: Fren lambası anahtarının elektriksel kontak yapılandırmasını/davranışını
        belirtir (ör. normalde açık/kapalı, değiştirici veya çok devreli).
    brake_light_switch_mounting_style:
      name: Fren lambası anahtarı montaj tipi
      description: Fren lambası anahtarının araca veya fren sistemine nasıl monte
        edildiğini belirtir (ör. dişli, geçmeli klipsli, braket montajlı, banjo cıvatalı).
    brake_master_cylinder_mounting_type:
      name: Fren ana merkez silindiri montaj tipi
      description: Ana merkez silindirinin araca/fren servosuna nasıl monte edildiğini
        belirtir (cıvata deseni / flanş stili).
    brake_master_cylinder_reservoir_type:
      name: Fren ana silindiri haznesi tipi
      description: Ana merkez silindiriyle birlikte verilen veya gereken fren hidroliği
        deposunun tipi/yapılandırması.
    brake_mount_type:
      name: Fren montaj tipi
      description: Sürücülerin fren sistemi uyumluluğunu doğrulayabilmesi için maşaya
        entegre edilmiş fren arayüzünü tanımlar.
    brake_mounting_flange_bolt_pattern:
      name: Fren montaj flanşı cıvata deseni
      description: Fren destek plakasını veya kaliper braketini römork aksına bağlamak
        için kullanılan montaj flanşı delik/cıvata düzenini belirtir (ör. 4 cıvatalı).
    brake_pad_backing_plate_material:
      name: Fren balatası taşıyıcı plaka malzemesi
      description: Fren balatası taşıyıcı plakasının malzemesini belirtir. Bu malzeme,
        ısı dağılımını ve ağırlığı etkiler.
    brake_pad_compatible_rotor_type:
      name: Fren balatası uyumlu rotor tipi
      description: Balatanın çalışmak üzere tasarlandığı rotor/disk yüzeyi tipini
        belirtir.
    brake_pad_compound:
      name: Fren balatası bileşimi
      description: Fren balatasının sürtünme malzemesi formülünü tanımlar.
    brake_pad_form_factor:
      name: Fren balatası form faktörü
      description: Balatanın tasarlandığı fren sistemi/form faktörünü belirtir (ör.
        disk, kampana, park freni).
    brake_pad_material:
      name: Fren balatası malzemesi
      description: Fren balatası kaplamasında kullanılan sürtünme bileşiğini/malzeme
        ailesini belirtir.
    brake_pad_shim_included:
      name: Fren balatası şimi dahil
      description: Gürültü azaltıcı şimlerin dahil edilip edilmediğini veya önceden
        takılmış olup olmadığını belirtir.
    brake_pad_wear_indicator_type:
      name: Fren balatası aşınma göstergesi tipi
      description: Fren balatalarında bulunan aşınma göstergesinin türünü belirtir
        (ör. mekanik uyarı tırnağı veya elektronik sensör).
    brake_position:
      name: Fren konumu
      description: Fren bileşeninin araç üzerinde nereye monte edilmek üzere tasarlandığını
        belirtir.
    brake_rotor_mount_type:
      name: Fren diski montaj tipi
      description: Fren rotorunu göbeğe bağlamak için kullanılan arayüzü tanımlar
        (uygunsa).
    brake_service_kit_components_included:
      name: Fren servis kiti dahil bileşenler
      description: Fren servis kitinde bulunan araçların, adaptörlerin ve sarf malzemelerinin
        listesini verir.
    brake_shoe_friction_material:
      name: Fren pabucu sürtünme malzemesi
      description: Fren pabucunda kullanılan sürtünme/kaplama bileşiği (kampanayla
        temas eden malzeme).
    brake_shoe_set_contents:
      name: Fren pabucu set içeriği
      description: Paketin neleri içerdiğini belirtir (ör. yalnızca pabuçlar veya
        pabuçlar ve montaj donanımı/yaylar).
    brake_system_type:
      name: Fren sistemi tipi
      description: Atış sırasında makara dönüşünü kontrol etmek için kullanılan fren
        mekanizması teknolojisini belirtir.
    brake_type:
      name: Fren tipi
      description: Çözgü kirişi freninin/gerdirme mekanizmasının tipi.
    brandy_age_classification:
      name: Brendi yaş sınıflandırması
      description: Brendiyi, minimum yıllandırma gereksinimlerini yansıtan sektör
        standardı kalite/yaş tanımlarına göre sınıflandırır (ör. VS, VSOP, XO).
    brass_cleaning_tool_type:
      name: Pirinç üflemeli çalgı temizleme aracı tipi
      description: Pirinç üflemeli çalgıları temizlemek veya bakımını yapmak için
        kullanılan araç türünü belirtir.
    brass_instrument_application_area:
      name: Pirinç üflemeli çalgı uygulama alanı
      description: Dezenfektan spreyin pirinç üflemeli çalgının hangi bölümlerinde
        kullanılmak üzere tasarlandığını belirtir.
    brass_instrument_care_kit_purpose:
      name: Pirinç üflemeli çalgı bakım kiti amacı
      description: Kitin amaçlanan kullanım senaryosunu açıklar (rutin bakım, derin
        temizlik, seyahat/acil durum, başlangıç kiti vb.).
    brass_instrument_case_shell_material:
      name: Pirinç üflemeli çalgı kılıfı sert kabuk malzemesi
      description: Sert kabuğun/çerçevenin ana malzemesi (uygunsa). Genel çanta/kılıf
        malzemesinden ayrıdır.
    brass_instrument_lubricant_additives_features:
      name: Pirinç üflemeli çalgı yağlayıcısı katkıları/özellikleri
      description: Yağlayıcı formülünün dikkat çekici işlevsel özellikleri.
    brass_instrument_lubricant_base_composition:
      name: Pirinç üflemeli çalgı yağlayıcısı baz bileşimi
      description: Pirinç üflemeli çalgı yağlayıcılarında kullanılan temel yağlayıcı
        bazını/kimyasını belirtir.
    brass_instrument_lubricant_viscosity_grade:
      name: Pirinç üflemeli çalgı yağlayıcısı viskozite derecesi
      description: Pirinç üflemeli çalgılar için tasarlanmış yağlayıcının göreceli
        kalınlığını/akışkanlığını belirtir.
    brass_instrument_replacement_part_type:
      name: Bakır nefesli çalgı yedek parça tipi
      description: Pirinç üflemeli çalgılar için ne tür bir yedek parça olduğunu belirtir
        (valf/sürgü/su anahtarı bileşenleri, mantarlar/keçeler, koruyucular vb.).
    brass_instrument_valve_configuration:
      name: Pirinç üflemeli çalgı valf yapılandırması
      description: Enstrümanın perdeyi nasıl değiştirdiğini belirtir (valf/sürgü mekanizması).
    brass_lubricant_application_area:
      name: Bakır nefesli çalgı yağlayıcısı uygulama alanı
      description: Yağlayıcının tasarlandığı pirinç üflemeli çalgı mekanizması.
    brass_mouthpiece_backbore:
      name: Pirinç üflemeli çalgı ağızlığı arka delik profili
      description: Ağızlığın arka delik profilini/kategorisini belirtir (arka deliğin
        şekli/boyutu). Bu özellik, tonu ve entonasyonu etkiler.
    brass_mouthpiece_cup_depth:
      name: Pirinç üflemeli çalgı ağızlığı çanak derinliği
      description: Ağızlığın çanak derinliği sınıflandırmasını belirtir. Bu özellik,
        tonu ve tepkiyi etkiler.
    brass_polishing_cloth_abrasiveness_level:
      name: Pirinç parlatma bezi aşındırıcılık seviyesi
      description: Bezin kararmayı gidermede ne kadar etkili olduğunu veya ne kadar
        nazik bir parlaklık sağladığını belirtir.
    bread_crumb_base_ingredient:
      name: Ekmek kırıntısı temel malzemesi
      description: Bu, kırıntıların yapıldığı temel malzemeyi belirtir. Örneğin buğday,
        pirinç, domuz derisi veya badem.
    bread_variety:
      name: Ekmek çeşidi
      description: Ekmek veya çöreğin stilini ya da çeşidini belirtir. Böylece müşteriler
        belirli türleri kolayca bulabilir (ör. briyoş, baget, naan).
    breadstick_style:
      name: Çubuk şeklinde
      description: Ekmek çubuklarının belirli geleneksel stilini veya biçimini tanımlar.
    bridge_head_material:
      name: Köprü başlığı malzemesi
      description: Yalnızca köprü başlığında kullanılan malzemeyi belirtir. Bu malzeme,
        ağırlığı, hissiyatı ve dayanıklılığı etkiler.
    bridge_head_type:
      name: Köprü başlığı tipi
      description: Köprü başlığının stilini tanımlar. Böylece alıcılar tercih ettikleri
        isteka dayanağı şekillerini seçebilir.
    bridle_part_type:
      name: Dizgin parçası tipi
      description: Yedek parçanın dizginin hangi belirli bileşenini temsil ettiğini
        tanımlar. Böylece müşteriler ihtiyaç duydukları parçayı bulabilir.
    bridle_style:
      name: Dizgin stili
      description: Dizginin genel stilini veya yapısını sınıflandırır. Böylece biniciler
        ihtiyaçlarına veya disiplinlerine uygun ekipmanları hızlıca bulabilir.
    broadhead_field_point_attachment_style:
      name: Geniş uçlu ok ucu/hedef ucu bağlantı stili
      description: Geniş uçlu ok ucunun veya hedef ucunun ok şaftına nasıl bağlandığını
        belirtir.
    broadhead_thread_size:
      name: Geniş uçlu ok ucu diş ölçüsü
      description: Geniş uçlu ok ucunu veya hedef ucunu ok insertine ya da şaftına
        bağlamak için kullanılan diş spesifikasyonunu listeler.
    broadhead_tip_type:
      name: Geniş uçlu ok ucu tipi
      description: Nüfuzu başlatan geniş uçlu ok ucu ucunun/ferrülünün stilini tanımlar.
        Bu özellik, farklı av hayvanlarındaki performansı etkiler.
    broccoli_cut:
      name: Brokoli kesimi
      description: Brokolinin daha önce nasıl kesildiğini veya hazırlandığını belirtir
        (ör. bütün baş, çiçekler, pirinç şeklinde doğranmış).
    broccoli_variety:
      name: Brokoli çeşidi
      description: Brokolinin belirli kültivarını veya pazar varyetesini tanımlar
        (örneğin, Tenderstem, Romanesco).
    broom_head_material:
      name: Süpürge başlığı malzemesi
      description: Süpürge başlığının malzeme bileşimini belirtir. Bu özellik, dayanıklılığı
        ve oyun özelliklerini etkiler.
    brush_format:
      name: Fırça formatı
      description: Kayak veya snowboard fırçasının fiziksel formatını belirtir. Elde
        kullanılan blokları ve roto yün veya roto keçe silindirleri gibi matkapla
        döndürülen formatlardan ayırır.
    brush_shape:
      name: Fırça şekli
      description: Fırça gövdesinin veya başlığının fiziksel şeklini/profilini belirtir.
        Bu özellik, temas alanını ve kullanım kolaylığını etkiler.
    brussel_sprout_preparation:
      name: Brüksel lahanası hazırlama şekli
      description: Tedarik edilen Brüksel lahanalarının fiziksel hazırlama veya kesim
        şeklini açıklar.
    brussels_sprout_variety:
      name: Brüksel lahanası çeşidi
      description: Brüksel lahanalarının kültivarını veya çeşidini belirtir. Mevcut
        ve gelecekteki çeşitleri kapsar.
    bubble_blower_features:
      name: Baloncuk üfleyici özellikleri
      description: Baloncuk üfleyicilerin yaygın işlevsel özelliklerini listeler.
    bubble_gun_bubble_output_modes:
      name: Baloncuk tabancası baloncuk çıkış modları
      description: Baloncuk tabancasının tek baloncuk, sürekli veya çoklu hız ayarları
        gibi çalışma modlarını belirtir.
    bubble_machine_features:
      name: Baloncuk makinesi özellikleri
      description: Baloncuk makinelerinin temel çalışmasının ötesindeki yaygın işlevsel
        özelliklerini vurgular.
    bubble_machine_items_included:
      name: Baloncuk makinesi dahil öğeler
      description: Kutuda bulunan temel öğeleri listeler (ör. baloncuk solüsyonu,
        yedek çubuklar, taşıma askısı, uzaktan kumanda).
    bubble_output_rate:
      name: Baloncuk çıkış oranı
      description: Bir baloncuk üfleyicinin yaklaşık/niteliksel baloncuk üretim oranını
        belirtir (ör. düşük, orta, yüksek) ve çıkışın değişken olup olmadığını kapsar.
    bubble_solution_container_type:
      name: Baloncuk solüsyonu hazne tipi
      description: Baloncuk solüsyonunun baloncuk tabancasıyla nasıl sağlandığını/kullanıldığını
        belirtir (ör. dahili hazne, takılı şişe, ayrı tepsi/daldırma kabı).
    bubble_toy_included_accessories:
      name: Baloncuk oyuncağı dahil aksesuarlar
      description: Baloncuk oyuncağıyla birlikte verilen yaygın öğeleri listeler (ör.
        solüsyon şişesi, tepsi, yedek çubuklar).
    buckwheat_processing_method:
      name: Karabuğday işleme yöntemi
      description: Karabuğdaya satış öncesinde uygulanan işlemi açıklar (ör. kavrulmuş,
        filizlendirilmiş, şişirilmiş).
    buckwheat_product_form:
      name: Karabuğday ürün formu
      description: Genel listede yer almayan karabuğdaya özgü fiziksel sunum biçimlerini
        kapsar (ör. pul, şişirilmiş ürünler, hazır saşeler).
    bug_collecting_kit_items_included:
      name: Böcek toplama kitine dahil edilen parçalar
      description: Böcek toplama kitine dahil araçlar ve eğitim materyalleri.
    built_in_storage_type:
      name: Yerleşik depolama tipi
      description: Ranza iskeletine entegre edilmiş depolama türlerini tanımlar (ör.
        çekmeceler, raflar, merdiven depolama alanları).
    bumper_finish:
      name: Tampon yüzeyi
      description: Tampona uygulanan yüzey kaplamasını veya bitişini belirtir.
    bumper_sensor_cutouts:
      name: Tampon sensörü kesikleri
      description: Tamponun içerdiği veya desteklediği OEM destek açıklıklarını/kesiklerini
        belirtir.
    bunk_bed_configuration:
      name: Ranza yapılandırması
      description: Ranzanın yapısal düzenini ve yatak boyutu kombinasyonunu belirtir.
    buoyancy:
      name: Yüzerlik
      description: Yemin veya sahtenin su sütunundaki yüzdürme davranışını belirtir.
        Örneğin yüzen, batan veya askıda kalan.
    burkini_pieces_included:
      name: Dahil edilen burkini parçaları
      description: Müşterilerin tam olarak ne satın aldıklarını bilmeleri için burkini
        setine dahil giysi parçalarını listeler.
    burn_rate:
      name: Yanma hızı
      description: Sigara kâğıdının yakıldıktan sonra ne kadar hızlı yandığını açıklar.
    bus_model_type:
      name: Otobüs modeli tipi
      description: Ölçekli modelin temsil ettiği gerçek otobüs yapılandırmasını/tipini
        tanımlar (gövde/kullanım sınıfı).
    bust_design:
      name: Göğüs tasarımı
      description: Bodysuit'in göğüs bölgesi yapılandırmasını ve yaka açıklığını açıklar
        (ör. açık göğüslü, dahili sütyenli, derin dekolteli).
    butter_variety:
      name: Tereyağı çeşidi
      description: Tereyağının kültürlü, tatlı kremalı, Avrupa tipi, sadeleştirilmiş
        (ghee) veya peynir altı suyu tereyağı gibi üretim stilini ya da ayırt edici
        türünü belirtir.
    buttermilk_variety:
      name: Buttermilk çeşitleri
      description: Satılan ayranın belirli stilini veya formunu tanımlar (ör. kültürlü,
        geleneksel, toz).
    button_application:
      name: Düğme kullanım alanı
      description: Düğmenin amaçlanan kullanım alanını veya proje türünü belirtir
        (ör. giyim, döşeme).
    button_attachment_type:
      name: Düğme ekleme tipi
      description: Düğmenin kumaşa tutturulma yapısını belirtir (ör. delikli dikim
        veya saplı); kapatma stilini değil.
    button_finish:
      name: Düğme yüzeyi
      description: Düğmenin yüzey görünümünü/bitişini açıklar (ör. mat veya parlak).
    buttonhole_elastic_application:
      name: İlik lastiği kullanım alanı
      description: Katlanabilir süsleme lastiğinin temel kullanım amacını/uygulama
        alanını belirtir.
    cab_type:
      name: Kabin türü
      description: Kamyon kabin yapılandırmasını belirtir.
    cabasa_construction_type:
      name: Cabasa gövde yapısı
      description: Cabasa gövdesinin ve zincir/boncuk düzeneğinin fiziksel yapısını/stilini
        belirtir.
    cabbage_variety:
      name: Lahana çeşidi
      description: Lahananın kültivarını veya türünü tanımlar (ör. beyaz lahana, napa
        lahanası, savoy lahanası). Böylece müşteriler lezzet, doku ve mutfak kullanımına
        göre filtreleme yapabilir.
    cabinet_door_style:
      name: Dolap kapağı stili
      description: Mutfak estetiğiyle uyum sağlamaya yardımcı olmak için dolap kapağı
        panelinin görsel tasarımını tanımlar (ör. Shaker, yükseltilmiş panel).
    cabinet_overlay_type:
      name: Dolap yerleşimi tipi
      description: Kapakların dolap çerçevesine göre nasıl konumlandığını veya onu
        ne ölçüde örttüğünü belirtir.
    cable_end_type:
      name: Kablo ucu tipi
      description: Kablonun fren veya vites kollarıyla bağlantı kuran uç nipelinin
        ya da bağlantı parçasının şeklini/stilini açıklar.
    cable_housing_construction:
      name: Kablo kılıfı yapısı
      description: Kılıfın spiral sarımlı, sıkışmasız veya segmentli bağlantılı gibi
        yapısal tasarımını açıklar. Bu özellik, sıkışma direncini, esnekliği ve sürüş
        hissini etkiler.
    cable_housing_liner_type:
      name: Kablo kılıfı astar tipi
      description: Kılıfın iç astar ve/veya yağlama işlemi içerip içermediğini ve
        kullanılan malzeme ya da teknolojiyi belirtir. Bu özellik, sürtünme azaltımını
        ve hava koşullarına dayanıklılığı etkiler.
    cable_management_type:
      name: Kablo yönetimi tipi
      description: Konferans masasının sunduğu yerleşik kablo veya güç yönetimi özelliklerinin
        türünü belirtir.
    cable_surface_treatment:
      name: Kablo yüzey işlemi
      description: Sürtünmeyi azaltmak veya korozyona karşı koruma sağlamak amacıyla
        kabloya uygulanan özel kaplama veya yüzey işlemlerini tanımlar.
    cabochon_back_type:
      name: Kaboşon arka tipi
      description: Kaboşonun arka profilini/yüzeyini belirtir. Bu durum, yerleştirme/yapıştırma
        yöntemlerini ve uyumluluğu etkiler.
    cacao_bean_variety:
      name: Kakao çekirdeği çeşidi
      description: Kullanılan kakao çekirdeğinin botanik çeşidini veya kültivarını
        belirtir.
    cacao_roast_level:
      name: Kakao kavurma seviyesi
      description: Kakaonun öğütülmeden önce ne derece kavrulduğunu açıklar.
    cage_package_type:
      name: Kafes paket tipi
      description: Satın alıma hangi bileşenlerin dahil olduğunu tanımlar (ör. yalnızca
        ağ, çerçeve kiti, tam paket).
    cajon_body_shell_material:
      name: Cajon gövde/kasa malzemesi
      description: Cajon gövdesinin/kasasının malzemesini tanımlar (tapa hariç).
    cajon_corner_control_system:
      name: Cajon köşe kontrol sistemi
      description: Cajon destek köşesindeki ses ayarının (örneğin, köşe vidaları)
        vuruş tepkisini değiştirip değiştirmeyeceğini belirtir.
    cajon_corner_edge_design:
      name: Cajon köşe/kenar tasarımı
      description: Konforu ve çalınabilirliği etkileyen köşe/kenar yapısını açıklar.
    cajon_feet_type:
      name: Cajon ayak tipi
      description: Cajondaki ayak tipini belirtir. Bu özellik, stabiliteyi ve rezonansı
        etkiler.
    cajon_snare_adjustability:
      name: Cajon trampet ayarlanabilirliği
      description: Trampet efektinin ayarlanıp ayarlanamadığını ve nasıl ayarlanabildiğini
        belirtir (gerginlik, devreye alma veya her ikisi).
    cajon_snare_system_type:
      name: Cajon trampet sistemi tipi
      description: Trampet efektini oluşturmak için kullanılan dahili trampet mekanizmasını
        belirtir.
    cake_shape:
      name: Kek şekli
      description: Kahveli kekin pişirildiği fiziksel formu açıklar.
    cake_topping:
      name: Kek üst kaplaması
      description: Kahveli keke uygulanan temel üst kaplamayı veya bitişi tanımlar.
    cake_type:
      name: Pasta türü
      description: Kekin stilini veya çeşidini açıklar (ör. pound kek, pandispanya,
        cheesecake).
    caliper_mount_type:
      name: Kaliper montaj tipi
      description: Fren kaliperinin kullandığı kadro veya maşa arayüz standardını
        tanımlar (ör. Post Mount, Flat Mount).
    caliper_mounting_standard:
      name: Kaliper montaj standardı
      description: Fren kaliperini bisiklet kadrosuna veya maşasına bağlamak için
        kullanılan montaj arayüzünü/standardını belirtir (ör. Flat Mount, Post Mount,
        IS vb.).
    camera_mounting_location_vehicle_exterior:
      name: Kamera montaj konumu (araç dışı)
      description: Kameraların araç üzerinde nereye monte edilmesinin amaçlandığını
        belirtir (ör. ön panjur, arka kısım, yan aynalar).
    camouflage_environment_type:
      name: Kamuflaj ortam tipi
      description: Kamuflaj deseninin tasarlandığı temel ortamı belirtir. Örneğin
        ormanlık alan, çöl veya bataklık.
    camping_oil_application:
      name: Kamp yağı kullanım amacı
      description: Yağın kamp bağlamındaki temel kullanım amacını belirtir (ör. lamba
        yakıtı veya ocak yakıtı).
    camshaft_construction:
      name: Eksantrik mili yapısı
      description: Eksantrik milinin üretim/ham parça stili.
    camshaft_material:
      name: Eksantrik mili malzemesi
      description: Eksantrik mili çekirdeğinin/milinin ana malzemesi (temel malzeme).
    camshaft_position:
      name: Eksantrik mili konumu
      description: Eksantrik milinin motor içindeki amaçlanan konumunu/tipini belirtir
        (ör. emme veya egzoz ya da belirli bir motor sırası/konumu).
    candle_container_type_included:
      name: Dahil olan mum kabı tipi
      description: Varsa, kit ile birlikte verilen mum kabı türünü belirtir.
    candle_dye_form:
      name: Mum boyası formu
      description: Mum yapımında kullanılan boya/renklendiricinin fiziksel formunu
        belirtir.
    candle_fragrance_form:
      name: Mum kokusu formu
      description: Mum yapımında kullanılması amaçlanan koku bileşeninin türünü/formunu
        belirtir.
    candle_making_tool_type:
      name: Mum yapım aracı tipi
      description: Ürünün ne tür bir mum yapım aracı olduğunu tanımlar (ör. dökme
        kabı, fitil merkezleme aracı, termometre).
    candy_texture:
      name: Şekerleme dokusu
      description: Şekerlemenin aromasından veya şeklinden bağımsız olarak ağız hissini
        ya da kıvamını açıklar.
    candying_method:
      name: Şekerleme yöntemi
      description: Meyvenin şekerle nasıl şekerlendiğini veya muhafaza edildiğini
        açıklar (ör. kristalize, glazelenmiş, şurup içinde).
    canned_meat_form:
      name: Konserve et formu
      description: Etin ambalaj içindeki işlenmiş formunu veya sunum şeklini sınıflandırır.
    canoe_construction_type:
      name: Kano yapım tipi
      description: Kano gövdesi yapım stillerini ayırt eder; örneğin sert gövde, şişirilebilir
        ve katlanabilir.
    canoe_hull_shape:
      name: Kano gövde şekli
      description: Stabiliteyi ve kullanım özelliklerini etkileyen ana gövde en kesitini
        veya taban profilini tanımlar.
    canoe_stern_design:
      name: Kano kıç tasarımı
      description: Motor uyumluluğunu ve kullanım özelliklerini etkileyen gövdenin
        kıç tasarımını tanımlar.
    canopy_type:
      name: Gölgelik tipi
      description: Kabin yatağıyla birlikte verilen gölgeliğin veya üst örtünün stilini
        açıklar.
    canvas_compatible_media:
      name: Tuval uyumlu medya
      description: Tuvalin hangi sanat/el işi malzemeleriyle kullanılmak üzere tasarlandığını
        belirtir.
    canvas_format:
      name: Tuval formatı
      description: Yazdırılabilir tuvalin levha, rulo veya önceden kesilmiş panel
        olarak satılıp satılmadığını belirtir.
    canvas_mounting_format:
      name: Tuval montajı/formatı
      description: Resim tuvali ürününün fiziksel formatını/montaj stilini belirtir.
    canvas_stretcher_assembly_type:
      name: Tuval gergi çerçevesi montaj tipi
      description: Gergi çerçevesinin montajlı bir çerçeve olarak mı yoksa montaj
        gerektiren çıta/set halinde mi satıldığını belirtir.
    canvas_stretcher_corner_joint_type:
      name: Tuval gergi çerçevesi köşe birleşim tipi
      description: Gergi çerçevesi köşelerinin nasıl birleştirildiğini/yapıldığını
        belirtir (ör. zıvana-geçme, parmak eklem, zımbalı, kamalı).
    canvas_surface_tone:
      name: Tuval yüzey tonu
      description: Astar uygulanmış tuval yüzeyinin (zeminin) temel tonunu/rengini
        belirtir; baskılı desen veya tasarımı değil (ör. beyaz, siyah, tonlu).
    canvas_weave_type:
      name: Tuval dokuma tipi
      description: Tuval yüzeyinin dokuma yapısını açıklar. Bu, doku ve boya uygulamasını
        etkiler.
    cap_attachment_style:
      name: Kapak bağlantısı stili
      description: Saksafon ağızlık kapağının yapısını/bağlantı stilini belirtir.
        Bu, korumayı ve kılıfa uyumu etkileyebilir.
    cap_construction:
      name: Kapak yapısı
      description: Peruk bonesinin nasıl üretildiğini belirtir (ör. lace front, tam
        dantel, elle bağlanmış). Bu, gerçekçilik, konfor ve şekillendirme esnekliğini
        etkiler.
    cap_crown_structure:
      name: Şapka tepelik yapısı
      description: Şapkanın tepe kısmının yapılandırılmış (sertleştirilmiş) veya yapılandırılmamış
        (yumuşak) olup olmadığını belirtir.
    cap_fit_type:
      name: Kapak oturma tipi
      description: Şapkanın kullanıcının başına nasıl oturduğunu veya ayarlandığını
        tanımlar (ör. sabit beden veya ayarlanabilir).
    cap_seal_type:
      name: Kapak conta tipi
      description: Yağ sızıntısını ve buhar kaçışını önlemek için kullanılan sızdırmazlık
        bileşenini belirtir (ör. O-ring, conta).
    cap_size:
      name: Bone bedeni
      description: Peruk bonesinin genel baş ölçüsü uyumunu gösteren standart beden
        etiketleri.
    cap_type:
      name: Kapak tipi
      description: Taşma tankında kullanılan kapak/kapatma arayüzü tipini belirtir.
    caper_size_grade:
      name: Kapari boyut sınıfı
      description: Kaparileri tomurcuk çapına karşılık gelen sektör standardı sınıf
        adlarına göre sınıflandırır.
    capo_clamping_mechanism:
      name: Kapo sıkıştırma mekanizması
      description: Tellere baskı uygulamak için kullanılan kelepçe/çalıştırma stilini
        belirtir (kaponun nasıl kullanıldığı).
    capo_finish:
      name: Kapo yüzeyi
      description: Kapo gövdesinin yüzey kaplamasını belirtir (görünüm/doku); renkten
        bağımsızdır (ör. mat veya parlak).
    capo_fit_type:
      name: Kapo uyum tipi
      description: Kaponun uyum sağlayacak şekilde tasarlandığı sap profilini belirtir
        (yarıçap/düzlük dahil). Bu, cızırtısız sıkıştırma ve entonasyonu etkiler.
    capo_pad_material:
      name: Kapo pedi malzemesi
      description: Tellere/klavyeye temas eden pedin malzemesini belirtir (tutuşu,
        akort kararlılığını ve olası yüzey izlerini etkiler).
    capo_tension_mechanism:
      name: Kapo gerginlik mekanizması
      description: Sürgülü kapoda tellere baskının/gerginliğin nasıl uygulandığını
        ve ayarlandığını belirtir.
    capture_method:
      name: Yakalama yöntemi
      description: Kapanın canlı yakalama veya öldürücü etkisiz hale getirme amacıyla
        tasarlanıp tasarlanmadığını belirtir.
    car_ev_conversion_kit_motor_type:
      name: Araç EV dönüşüm kiti motor tipi
      description: Dönüşüm kitinde bulunan veya gerekli olan çekiş motoru teknolojisini
        belirtir (ör. AC endüksiyon veya kalıcı mıknatıslı).
    car_playset_items_included:
      name: Araba oyun seti dahil öğeler
      description: Temel yapının ötesinde araba oyun setine dahil olan ana bileşenleri
        listeler (ör. arabalar, figürler, tabelalar).
    car_shampoo_application_method:
      name: Araç şampuanı uygulama yöntemi
      description: Şampuanın yıkama sırasında nasıl uygulanmasının amaçlandığını belirtir.
    car_wash_solution_form:
      name: Araç yıkama solüsyonu formu
      description: Araç yıkama solüsyonunun fiziksel formunu belirtir (ör. sıvı, köpük,
        mendil).
    car_wash_solution_scent:
      name: Araç yıkama solüsyonu kokusu
      description: Araç yıkama solüsyonunun kokusunu/aromasını belirtir (kokuluysa).
    carbonated_water_variety:
      name: Gazlı su çeşidi
      description: Gazlı suları, yaygın pazar çeşitlerine ve formülasyonlarına göre
        sınıflandırır (örneğin, tonik, soda, fonksiyonel gazlı su).
    carbonation:
      name: Karbonasyon
      description: İçecekteki karbonasyon seviyesini veya stilini açıklar (ör. gazsız,
        hafif gazlı, gazlı, nitro).
    carburetor_barrel_count:
      name: Karbüratör boğaz sayısı
      description: Karbüratördeki gaz kelebeği boğazı/namlu sayısını belirtir.
    carburetor_choke_type:
      name: Karbüratör jikle tipi
      description: Karbüratörün kullandığı jikle çalıştırma stilini belirtir.
    carburetor_mounting_flange_type:
      name: Karbüratör montaj flanşı tipi
      description: Emme sistemi/manifold ile uyumluluğu sağlamak için karbüratör montaj
        arayüzü stilini belirtir (ör. geçmeli veya flanş/cıvata desenleri).
    card_binder_page_type:
      name: Kart klasörü sayfa tipi
      description: 'Klasörler/portföyler için: Kartları saklamak amacıyla kullanılan
        sayfa stili.'
    card_box_holder_type:
      name: Kart kutusu/tutucu tipi
      description: Etkinliklerde kart toplamak veya saklamak için kullanılan ürünün
        işlevsel form faktörünü belirtir (ör. kutu, posta kutusu tarzı kutu, sepet,
        stant tipi tutucu).
    card_game_accessory_features:
      name: Kart oyunu aksesuar özellikleri
      description: Kart oyunu aksesuarlarının dikkat çeken işlevsel özellikleri.
    card_lot_type:
      name: Kart lot tipi
      description: Ürünün tek bir kart mı yoksa çoklu kart lotu/karışık paket mi olduğunu
        belirtir.
    card_sleeve_size_format_compatibility:
      name: Kart kılıfı boyutu/formatı uyumluluğu
      description: Kılıfların, sayfaların veya deste kutularının uyum sağlayacak şekilde
        tasarlandığı kart boyutlarını belirtir.
    carding_surface_pin_material:
      name: Taranma yüzeyi pim malzemesi
      description: Lifleri açmak ve kabartmak için kullanılan pimlerin/dişlerin malzemesi.
    care_durability:
      name: Bakım dayanıklılığı
      description: Etiketin uygulandıktan sonraki yıkama/ısı dayanıklılığı beklentilerini
        belirtir.
    care_label_attachment_type:
      name: Bakım etiketi bağlantı tipi
      description: Bakım etiketinin ürüne nasıl uygulanmak üzere tasarlandığını belirtir
        (ör. dikilebilir, ütüyle yapıştırılabilir/ısı transferli, yapışkanlı).
    care_label_format:
      name: Bakım etiketi formatı
      description: Bakım etiketi ürününün fiziksel/baskı formatı.
    care_label_symbol_system:
      name: Bakım etiketi sembol sistemi
      description: Etikette kullanılan standartları/sembol setini belirtir (ör. ISO
        bakım sembolleri, ASTM/ABD sembolleri).
    cargo_area_configuration:
      name: Yük alanı yapılandırması
      description: Yük bisikletindeki yük alanının yapısal stilini veya konumunu belirtir
        (ör. longtail, ön yüklemeli, üç tekerlekli).
    cargo_net_adjustability:
      name: Yük ağı ayarlanabilirliği
      description: Yük ağının gerginlik/uyum açısından ayarlanabilir olup olmadığını
        ve nasıl ayarlanabildiğini belirtir.
    cargo_net_position:
      name: Yük ağı konumu
      description: Ağın bagaj/yük alanında nereye monte edilmek veya kullanılmak üzere
        tasarlandığını belirtir.
    cargo_net_stretch_type:
      name: Yük ağı esneme tipi
      description: Bagaj yük ağının elastik/esneyebilir mi yoksa sabit/esnemez mi
        olduğunu belirtir.
    cargo_net_style:
      name: Yük ağı stili
      description: Yük ağının yapı stilini veya form faktörünü belirtir (ör. bungee
        kordon, ağ dokuma, bariyer, hamak).
    cargo_rack_finish:
      name: Yük taşıyıcı yüzeyi
      description: Yük taşıyıcısının dış yüzey kaplamasını/işlemini belirtir.
    carpet_cleaner_application_method:
      name: Halı temizleyici uygulama yöntemi
      description: Ürünün halıya nasıl uygulanıp işlendiğini belirtir (genel formunun
        ötesinde).
    carrier_style:
      name: Taşıyıcı stili
      description: Teknenin araç üzerinde desteklenmesi için kullanılan taşıma mekanizmasını/stilini
        belirtir.
    carrot_size:
      name: Havuç boyutu
      description: Havuç ürününün genel boyutunu sınıflandırır.
    carrot_variety:
      name: Havuç çeşidi
      description: Havucun belirli çeşidini veya kültivarını tanımlar.
    carrying_capacity_pairs_boards:
      name: Taşıma kapasitesi (çift/board)
      description: Bir aksesuarın, taşıyıcıyla birlikte kullanıldığında kaç kayak
        çifti veya snowboard taşımaya olanak sağladığını ya da bunun için tasarlandığını
        belirtir (ör. uzatma kitleri).
    cartridge_thread_compatibility:
      name: Kartuş diş uyumluluğu
      description: Bir buharlaştırıcının veya pilin desteklediği diş standardını belirtir
        ve kartuşlarla pillerin fiziksel olarak uyumlu olmasını sağlar.
    case_capacity_butts_shafts:
      name: Kılıf kapasitesi (ıstaka dipleri × şaftlar)
      description: Kılıfın kaç adet ıstaka dip kısmı ve şaft barındırabileceğini,
        dip × şaft formatında tanımlar (ör. 2x4 = 2 dip ve 4 şaft).
    case_features:
      name: Kılıf özellikleri
      description: Zil/davul seti kılıfının koruma ve taşıma ile ilgili işlevsel özelliklerini
        vurgular.
    case_humidifier_refill_type:
      name: Kılıf nemlendirici dolum tipi
      description: Nemlendiricinin yeniden kullanılabilir (yeniden nemlendirilebilir/yenilenebilir)
        ortam mı yoksa tek kullanımlık değiştirilebilir dolumlar mı kullandığını belirtir.
    case_lining_material:
      name: Kılıf astarı malzemesi
      description: Bir kılıfın veya gig bag'in iç kısmında yer alan ve enstrümanı
        ya da içeriği koruyan ana astar malzemesini tanımlar.
    case_material:
      name: Kılıf malzemesi
      description: Saat kasasının ana malzemesini tanımlar. Bu malzeme; dayanıklılığı,
        ağırlığı ve görünümü etkiler.
    case_mounting_method:
      name: Kılıf montajı yöntemi
      description: Nemlendiricinin enstrüman kılıfı içinde nasıl konumlandırılması
        veya sabitlenmesi gerektiğini belirtir.
    case_structure:
      name: Kılıf yapısı
      description: Kılıf yapısının sertlik derecesini belirtir.
    case_style_cymbal_drum:
      name: Kılıf stili (zil/davul)
      description: Ürünün zilleri veya davul setlerini taşımak için yumuşak çanta,
        sert kılıf veya hibrit tasarım olup olmadığını belirtir.
    casing_material:
      name: Karkas malzemesi
      description: Lastik karkasında kullanılan ana kumaşı tanımlar. Bu malzeme; ağırlığı,
        sürüş hissini ve delinme korumasını etkiler.
    casino_set_chip_material:
      name: Kumarhane seti fiş malzemesi
      description: Sette bulunan fişlerin ana malzemesi (varsa).
    casino_set_layout_included:
      name: Kumarhane seti oyun yüzeyi içeriği
      description: Setle birlikte hangi tür oyun yüzeyinin/oyun düzeninin verildiğini
        belirtir.
    cask_finish:
      name: Sonlandırma fıçısı
      description: İçkinin sonlandırılması veya olgunlaştırılması için kullanılan
        fıçı veya varili belirtir (ör. bourbon varili, şeri fıçısı).
    cassava_variety:
      name: Manyok çeşidi
      description: Sunulan yuka/manyokun belirli kültivarını veya çeşidini tanımlar.
        Bu özellik; tat, renk ve pişirme özelliklerini etkiler.
    cassette_body_type:
      name: Kaset gövdesi tipi
      description: Arka göbeğin veya tekerleğin kabul ettiği freehub ya da sürücü
        standardını belirtir (ör. HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Kaset çalar özellik seti
      description: Araç içi kaset çalarlarda yaygın olarak bulunan kaset taşıma ve
        oynatma özelliklerini belirtir.
    cassette_speed_compatibility:
      name: Kaset hız uyumluluğu
      description: Kasetin veya ruble dişlisinin kaç vites sistemiyle (ör. 7 vites,
        12 vites) çalışacak şekilde tasarlandığını belirtir. Böylece zincir, vites
        kolu ve aktarıcı uyumluluğu sağlanır.
    castanet_shell_size_class:
      name: Kastanyet kabuk boyut sınıfı
      description: Kastanyet kabukları için standartlaştırılmış boyut sınıfını belirtir.
        Bu sınıf, genellikle oyuncular ve eğitmenler tarafından uyum ve ton seçimi
        için kullanılır.
    castanets_included_pieces:
      name: Kastanyet dahil parçalar
      description: Ürün kapsamında nelerin bulunduğunu belirtir (çift veya tekli,
        ayrıca ek parçalar).
    castanets_pitch:
      name: Kastanyet perde değeri
      description: Üreticilerin ses aralığını tanımlamak için kullandığı yaygın perde/boyut
        etiketini belirtir.
    castanets_type:
      name: Kastanyet tipi
      description: Kastanyetin stilini veya amaçlanan kullanım kategorisini belirtir.
    caster_type:
      name: Tekerlek tipi
      description: Arabaya takılı tekerleklerin veya döner tekerleklerin stilini tanımlar
        (ör. döner, kilitlenebilir). Bu özellik, manevra kabiliyeti ve stabilite hakkında
        bilgi verir.
    castle_playset_included_items:
      name: Kale oyun seti dahil öğeler
      description: Müşterilerin setleri karşılaştırabilmesi için kale oyun setinde
        bulunan temel bileşenleri belirtir (ör. figürler, mobilyalar, araçlar, aksesuarlar).
    catcher_equipment_included:
      name: Dahil edilen yakalayıcı oyuncu ekipmanları
      description: Yakalayıcı ekipman setinde bulunan bileşenleri belirtir. Örneğin
        yakalayıcı kaskı veya göğüs koruyucu.
    catcher_helmet_style:
      name: Yakalayıcı kaskı stili
      description: Yakalayıcının koruyucu başlığının genel tasarım stilini belirtir.
    cattle_breed:
      name: Sığır ırkı
      description: Etin elde edildiği sığır ırkını tanımlar (ör. Angus, Wagyu, Hereford).
    cauliflower_variety:
      name: Karnabahar çeşidi
      description: Satılan karnabaharın kültivarını, rengini veya özel çeşidini tanımlar.
    celery_form:
      name: Kereviz formu
      description: Kerevizin hangi fiziksel formda veya kesim stilinde satıldığını
        belirtir.
    celery_variety:
      name: Kereviz çeşidi
      description: Kerevizin belirli kültivarını veya çeşidini kaydeder. Böylece müşteriler
        lezzet profiline, rengine veya mutfaktaki kullanımına göre seçim yapabilir.
    cereal_bar_texture:
      name: Tahıl barı dokusu
      description: Tahıl barının ağız hissini ve kıvamını açıklar (ör. yumuşak, çıtır).
    cereal_type:
      name: Tahıl gevreği türü
      description: Tahıl veya granolanın şeklini ya da formatını sınıflandırır (pul,
        puf, granola kümeleri, müsli vb.). Böylece müşteriler tercih ettikleri dokuyu
        veya hazırlama yöntemini bulabilir.
    certificate_border_style:
      name: Sertifika kenarlık stili
      description: Sertifikada kullanılan dekoratif kenarlık tasarımını açıklar.
    certificate_personalization_type:
      name: Sertifika kişiselleştirme tipi
      description: Sertifikanın nasıl kişiselleştirilebildiğini belirtir (elle yazım
        için boş, yazdırılabilir şablon, değişken alanlarla önceden basılmış vb.).
    certification_service:
      name: Sertifikasyon hizmeti
      description: Üçüncü taraf derecelendirme/sertifikasyon şirketi (varsa).
    certification_standard:
      name: Sertifikasyon standardı
      description: Balaklavanın karşılamak üzere derecelendirildiği güvenlik ve yangına
        dayanıklılık sertifikasını veya uyumluluk standardını belirtir.
    chain_coating_finish:
      name: Zincir kaplaması/yüzeyi
      description: Dayanıklılığı artırmak, sürtünmeyi azaltmak, korozyonu önlemek
        veya görünümü değiştirmek amacıyla zincire uygulanan yüzey işlemini veya kaplamayı
        belirtir (ör. Ti-nitrür, DLC, nikel, pas önleyici EPT).
    chain_connection_type:
      name: Zincir bağlantı tipi
      description: Zincirin uçlarını birleştirmek için sağlanan veya gereken bağlantı
        yöntemini belirtir.
    chain_tier_configuration:
      name: Zincir katman yapılandırması
      description: Yakalama düzeneğindeki zincir katmanlarının sayısını/düzenini belirtir
        (tek, çift veya üçlü katman).
    chain_tool_type:
      name: Zincir aleti tipi
      description: Belirli bisiklet zincir aleti türünü sınıflandırır. Böylece müşteriler
        doğru aracı hızlıca bulabilir.
    chainring_shape:
      name: Aynakol dişlisi şekli
      description: Aynakol dişlisinin şeklini belirtir. Örneğin yuvarlak veya oval/eliptik.
    chair_accessories_included:
      name: Dahil edilen sandalye aksesuarları
      description: Sandalyenin işlevselliğini artıran yerleşik veya birlikte verilen
        aksesuarları listeler.
    chair_sash_care_instructions:
      name: Sandalye kuşağı bakım talimatları
      description: Sandalye kuşağı için önerilen temizlik/bakım yöntemini açıklar.
    chair_sash_finish:
      name: Sandalye kuşağı yüzeyi
      description: Kuş kumaşının yüzey parlaklığını/dokusunu açıklar.
    chair_storage_design:
      name: Sandalye depolama tasarımı
      description: Sling sandalyenin depolama ve taşınabilirlik açısından değerlendirilmesine
        yardımcı olmak için nasıl saklanmak üzere tasarlandığını belirtir (ör. katlanabilir,
        istiflenebilir, katlanamaz).
    chaise_or_sectional_orientation:
      name: Şezlong veya modül yönü
      description: Kanepenin karşısından bakıldığında entegre şezlongun veya uzatılmış
        bölümün hangi tarafta bulunduğunu belirtir.
    chamber_size:
      name: Hazne boyutu
      description: Direnci ve tonal rengi etkileyen ağızlık haznesinin boyutunu/hacmini
        belirtir.
    chanter_finger_spacing:
      name: Chanter parmak aralığı
      description: Chanter üzerindeki parmak aralığını/boyut profilini belirtir (genellikle
        standart, küçük el veya büyük el olarak tanımlanır).
    chanter_type:
      name: Melodi borusu tipi
      description: Enstrümanla birlikte verilen (veya enstrümanda kullanılan) chanter'ın
        açık uçlu, kapalı uçlu, çalışma amaçlı veya tuşlu gibi stilini/konfigürasyonunu
        belirtir.
    chard_variety:
      name: Pazı çeşidi
      description: Satılan pazının belirli kültivarını veya renk çeşidini tanımlar.
    charging_port_location:
      name: Şarj portu konumu
      description: Aracın ana harici şarj girişinin (şarj portunun) fiziksel konumu.
    chassis_construction_type:
      name: Şasi yapım tipi
      description: Araçta kullanılan temel şasi yapım yöntemini açıklar.
    checkbook_loading_orientation:
      name: Çek defteri yükleme yönü
      description: Çek defteri kılıfının üstten yüklemeli, yandan yüklemeli veya evrensel
        çek formatlarıyla uyumlu olup olmadığını belirtir.
    cheekpiece_style:
      name: Yanaklık stili
      description: Snaffle gemindeki yanak/halka konfigürasyonu türünü tanımlar. Bu,
        dizgin etkisini ve yanal stabiliteyi belirler.
    cheese_alternative_form:
      name: Peynir alternatifi formu
      description: Peynir alternatifinin hangi fiziksel formda veya kesimde satıldığını
        belirtir.
    cheese_form:
      name: Peynir formu
      description: Peynir ürününün fiziksel sunum şeklini açıklar (ör. tekerlek, blok,
        dilimlenmiş, rendelenmiş).
    cheese_texture:
      name: Peynir dokusu
      description: Peyniri genel dokusuna veya sertliğine göre sınıflandırır.
    cheese_variety:
      name: Peynir çeşitleri
      description: Atıştırmalıkta ana lezzet verici olarak kullanılan peynir türünü
        belirtir.
    cherimoya_variety:
      name: Çerimoya çeşidi
      description: Çerimoyanın belirli kültivarını/çeşidini tanımlar (ör. Fino de
        Jete, El Bumpo).
    cherry_variety:
      name: Kiraz çeşidi
      description: Kirazların kültivarını veya çeşidini belirtir. Böylece müşteriler
        lezzetleri, renkleri, boyutları veya mutfaktaki kullanım amaçlarıyla bilinen
        belirli türleri seçebilir.
    chest_pocket_style:
      name: Göğüs cebi stili
      description: Gömlekteki göğüs ceplerinin varlığını ve konfigürasyonunu belirtir.
    chewing_tobacco_form:
      name: Çiğneme tütünü formu
      description: Çiğneme tütünü ürününün fiziksel formunu, kesim stilini veya poşet
        boyutunu tanımlar (ör. gevşek yaprak, uzun kesim, ince poşet).
    chicory_variety:
      name: Hindiba çeşidi
      description: Satılan hindibanın belirli çeşidini veya kültivarını tanımlar (ör.
        Radicchio, Belçika hindibası, Eskarol).
    chiffon_recommended_use:
      name: Şifon önerilen kullanım alanı
      description: Şifon kumaş için önerilen başlıca dikiş/el işi uygulamaları.
    child_seat_accessory_type:
      name: Çocuk koltuğu aksesuar türü
      description: Belirli çocuk koltuğu aksesuarı veya yedek parça türünü tanımlar
        (ör. koltuk minderi, ayak dayanağı, montaj adaptörü). Böylece müşteriler ihtiyaç
        duydukları ürünü çok sayıda mikro kategori oluşturmadan hızlıca bulabilir.
    child_seat_mounting_type:
      name: Çocuk koltuğu montaj tipi
      description: Bisiklet çocuk koltuğunun bisiklet kadrosuna, bagajına veya kokpit
        bölgesine nasıl bağlandığını belirtir.
    chime_sound_character:
      name: Çan sesi karakteri
      description: Çanların hedeflenen ses karakterini/tınısını açıklar.
    chin_cup_type:
      name: Çene kupası tipi
      description: Çene kupasının stilini veya yapısını belirtir. Bu özellikler konforu
        ve darbe korumasını etkiler.
    chin_strap_type:
      name: Çene bandı tipi
      description: Bir şapkanın çene kayışı tipini (yok, sabit, ayarlanabilir veya
        çıkarılabilir) belirtir. Böylece müşteriler rüzgârlı veya hareketli ortamlarda
        güvenli kalan stilleri seçebilir.
    china_cymbal_edge_shape:
      name: Çin zili kenar şekli
      description: Çin zillerinin tipik kenar/flanş profilini (kenarın ne kadar yukarı
        doğru kıvrık olduğunu) tanımlar. Bu da hissiyatı ve sesi etkiler.
    china_cymbal_sound_character:
      name: Çin zilinin ses karakteri
      description: Keşif ve filtreleme amacıyla kullanılan china zilinin temel ses/ton
        karakteri tanımlarıdır (ör. trashy, koyu, parlak). Birden fazla değer uygulanabilir.
    chinstrap_type:
      name: Çene kayışı tipi
      description: Kaskla birlikte verilen çene kayışının modeli.
    chip_cut_style:
      name: Cips kesim stili
      description: Cipslerin fiziksel kesim veya doku stilini belirtir (ör. oluklu,
        kettle usulü pişirilmiş, patlatılmış)
    chip_denomination:
      name: Fiş değeri
      description: Sette hangi fiş değerlerinin bulunduğunu belirtir (basılı veya
        atanmış değerler).
    chocolate_form:
      name: Çikolata formu
      description: Pastacılık çikolatasının hangi fiziksel formda satıldığını açıklar.
    choy_sum_variety:
      name: Choy sum çeşidi
      description: Satılan choy sumun belirli ticari veya botanik çeşidini tanımlar.
    cigar_wrapper_color:
      name: Puro sarma yaprağı rengi
      description: Puronun sarma yaprağının standart renk sınıflandırması.
    cigarette_filter_type:
      name: Sigara filtre tipi
      description: Sigaranın filtre içerip içermediğini ve içeriyorsa filtrenin yapısını
        veya özel özelliğini belirtir.
    cigarette_size:
      name: Sigara boyutu
      description: Sigaraları sektör standartlarına göre uzunluk veya format terminolojisine
        göre sınıflandırır (ör. king size, 100s, slim).
    cigarette_strength_descriptor:
      name: Sigara sertlik tanımlayıcısı
      description: Markaların katran/nikotin yoğunluğunu belirtmek için geleneksel
        olarak kullandığı pazarlama etiketi (ör. Light, Bold, Silver).
    cinch_liner_material:
      name: Karın kayışı astar malzemesi
      description: Ata temas eden astar veya dolgu malzemesini tanımlar.
    circular_knitting_needle_cable_type:
      name: Dairesel örgü şişi kablo tipi
      description: Hafıza/kıvrılma davranışını ve döner yapı özelliklerini etkileyen
        kablo malzemesi/davranışı ve yapısıdır (ör. kaplamalı çelik, naylon).
    circular_knitting_needles_tip_material:
      name: Dairesel örgü şişi uç malzemesi
      description: İki şiş ucunun malzemesi (kablo malzemesinden farklı olarak).
    circumference_adjustment_mechanism:
      name: Çevre ayarlama mekanizması
      description: Çile çevresini ayarlamak veya sabitlemek için kullanılan mekanizma.
    clamp_design:
      name: Kelepçe tasarımı
      description: Kelepçenin yapısal stilini veya mekanizmasını açıklar.
    clamp_sheet_music_clip_features:
      name: Kelepçeli nota tutucu klips özellikleri
      description: Kelepçeli nota tutucu klipslerin işlevsel ve koruyucu özellikleri
        (ör. dolgu, kaymaz yüzey, döner yapı).
    clamping_closure_type:
      name: Sıkıştırma/kapatma tipi
      description: Nakış kasnağını kumaş etrafında sıkıştırmak veya sabitlemek için
        kullanılan mekanizmayı belirtir.
    clarinet_bell_acoustic_design:
      name: Klarnet zili akustik tasarımı
      description: Zilin tepki ve entonasyonunu etkilemek üzere tasarlanan ses/havalandırma
        yapısını açıklar.
    clarinet_bell_adjustment_mechanism:
      name: Klarnet zili ayar mekanizması
      description: Zil uzunluğunun/geometrisinin nasıl ayarlandığını açıklar.
    clarinet_bell_ring_material:
      name: Klarnet zili halkası malzemesi
      description: Varsa, klarnet zilinin kenarındaki koruyucu halka/bandın malzemesini
        belirtir.
    clarinet_bell_tuning_effect:
      name: Klarnet zili akort etkisi
      description: Zilin, standart bir zile kıyasla akort/entonasyonu (özellikle boğaz
        sesleri ve pes register) nasıl etkileyecek şekilde tasarlandığını belirtir.
    clarinet_body_type:
      name: Klarinet gövdesi tipi
      description: La klarnet temel gövde yapısı türünü belirtir.
    clarinet_bore_type:
      name: Klarnet delik yapısı türü
      description: Alto klarnetin delik tasarımını açıklar.
    clarinet_cap_style:
      name: Klarnet kapağı stili
      description: Klarnet ligatürü ve/veya bek kapağı ürününe dahil edilen kapağın
        tasarım stilini belirtir (ör. ters çevrilmiş veya havalandırmalı).
    clarinet_care_kit_intended_use:
      name: Klarnet bakım kiti kullanım amacı
      description: Kitin tasarlandığı temel kullanım amacını belirtir (ör. günlük
        hızlı kurutma veya kapsamlı temizlik/bakım).
    clarinet_included_accessories:
      name: Klarinete dahil edilen aksesuarlar
      description: Si bemol klarnet kutusunun içeriğini belirtir.
    clarinet_keywork_material:
      name: Klarnet mekanizma malzemesi
      description: Klarnetin mekanizma sisteminde kullanılan malzemeyi belirtir (ör.
        pirinç, nikel gümüş, gümüş kaplama).
    clarinet_keywork_plating:
      name: Klarnet tuş kaplaması
      description: Klarnet mekanizmasının (tuşların) kaplamasını/yüzey malzemesini
        belirtir.
    clarinet_mouthpiece_baffle_profile:
      name: Klarnet beki baffle profili
      description: Klarnet bekinin parlaklık ve projeksiyonu etkileyen iç baffle/tavan
        profilini açıklar.
    clarinet_mouthpiece_beak_shape:
      name: Klarnet beki gaga şekli
      description: Çalma konforu ve embouchure hissi açısından dış gaga profilini/açısını
        belirtir.
    clarinet_mouthpiece_chamber_size:
      name: Klarnet ağızlığı hazne boyutu
      description: Üretici tarafından belirtilen göreli hazne boyutunu açıklar. Bu,
        ton rengini ve çalma direncini etkileyebilir.
    clarinet_mouthpiece_intended_tone:
      name: Klarnet beki hedef ton karakteri
      description: Bek için hedeflenen genel tonal karakteri açıklar.
    clarinet_mouthpiece_player_level:
      name: Klarnet beki çalıcı seviyesi
      description: Bekin hedeflendiği kullanıcı seviyesini belirtir.
    clarinet_reed_cut:
      name: Klarnet kamışı kesimi
      description: Kamışın kesim/profil türünü belirtir (ör. filed veya unfiled ve
        diğer ticari kesim stilleri). Bunlar, tepkiyi ve tonu etkiler.
    clarinet_reed_material_type:
      name: Klarnet kamışı malzeme türü
      description: Kamışın hangi malzemeden üretildiğini belirtir (kamış veya sentetik
        ve yaygın sentetik alt türleri).
    clarinet_thumb_rest_type:
      name: Klarnet başparmak desteği türü
      description: Sağ el başparmak desteğinin türünü/özelliğini belirtir.
    classical_guitar_string_3rd_string_type:
      name: Klasik gitar teli 3. tel türü
      description: Sol (3.) telin düz (monofilament) veya sarımlı olup olmadığını
        belirtir.
    classical_guitar_string_bass_winding_material:
      name: Klasik gitar teli bas sarım malzemesi
      description: Bas tellerinde (genellikle 4-6. teller) kullanılan sarım malzemesini
        belirtir.
    classical_guitar_string_set_configuration:
      name: Klasik gitar teli set konfigürasyonu
      description: Ürünün klasik gitar için tam set mi yoksa belirli tellerden mi
        (genellikle tiz veya bas tarafı) oluştuğunu belirtir.
    clay_modeling_dough_base_material:
      name: Kil ve modelleme hamuru temel malzemesi
      description: Modelleme malzemesinin birincil formülasyonu/temel türü.
    clay_modeling_dough_curing_method:
      name: Kil ve modelleme hamuru kürleme yöntemi
      description: Malzemenin nasıl sertleştiği/katılaştığı (veya tekrar kullanılabilir
        kaldığı), ihtiyaç duyulan aletleri ve tipik kullanım şeklini belirler.
    clay_paintability:
      name: Kil boyanabilirliği
      description: Kürlenmiş kil yüzeyinin boyanabilir olup olmadığını ve önerilen
        boya türlerini belirtir.
    clay_primary_composition:
      name: Kilin temel bileşimi
      description: Havada kuruyan kilin temel malzemesini/bağlayıcısını belirtir (ör.
        kağıt bazlı, mineral bazlı).
    clay_shooting_discipline:
      name: Kil atış disiplini
      description: Ürünün tasarlandığı kil hedef atıcılığı disiplinini veya etkinliğini
        belirtir.
    cleaner_format:
      name: Temizleyici formu
      description: Sürgü temizleyici ürününün ambalaj/ürün formunu belirtir.
    cleaner_sanitizer_intended_area:
      name: Temizleyici/dezenfektan kullanım alanı
      description: Ürünün temizlemek/dezenfekte etmek için tasarlandığı pirinç üflemeli
        çalgı bölümünü belirtir.
    cleaning_formula:
      name: Temizleme formülü
      description: Güvenlik, uyumluluk ve filtreleme amacıyla ürünün temel temizleme/dezenfeksiyon
        kimyası grubunu belirtir (marka değil).
    cleaning_task_focus:
      name: Temizlik odağı
      description: Susuz yıkama ürününün çözmek için tasarlandığı temel temizlik sorunlarını
        belirtir.
    cleanup_method:
      name: Temizleme yöntemi
      description: Yapıştırıcının (ıslakken) ellerden, aletlerden veya yüzeylerden
        nasıl temizlenmesinin amaçlandığını belirtir.
    clear_glue_application_method:
      name: Şeffaf yapıştırıcı uygulama yöntemi
      description: Şeffaf yapıştırıcı ambalajına dahil edilen uygulayıcı/dağıtıcı
        türünü belirtir.
    clear_glue_finish_after_drying:
      name: Şeffaf yapıştırıcı kuruma sonrası görünümü
      description: Yapıştırıcının kuruduktan/sertleştikten sonraki görünümünü açıklar
        (ör. kristal berraklığında veya yarı saydam, parlak veya mat).
    cleat_bolt_pattern:
      name: Krampon cıvata düzeni
      description: Kramponun ayakkabıya bağlanmasında kullanılan cıvata düzenini belirtir.
        Bu düzen pedal ve ayakkabı uyumluluğunu belirler (ör. 2 cıvatalı MTB veya
        3 cıvatalı yol tipi).
    cleat_compatibility:
      name: Kilit sistemi uyumluluğu
      description: Ayakkabı kılıfının hangi pedal veya krampon sistemlerine uyduğunu
        belirtir.
    cleat_finish:
      name: Krampon yüzey kaplaması
      description: Bağlama elemanının yüzey işlemini/kaplamasını belirtir. Bu, korozyon
        direnci ve görünümü etkiler.
    cleat_receptacle_system:
      name: Krampon yuvası sistemi
      description: Çivili golf ayakkabılarında kullanılan uyumlu çivi/krampon bağlantı
        sistemini belirtir.
    cleat_release_mechanism:
      name: Kilit açma mekanizması
      description: Bisiklet kramponunun pedaldan nasıl ayrıldığını belirtir (ör. tek
        yönlü veya çok yönlü ayrılma).
    cleat_stud_type:
      name: Krampon dişi türü
      description: Amerikan futbolu ayakkabılarının tabanındaki dişlerin/kramponların
        yapısını veya bağlantı stilini belirtir.
    climate_control_module_function:
      name: İklim kontrol modülü işlevi
      description: Modülün araç HVAC sistemindeki temel görevini belirtir.
    climbing_hold_mounting_type:
      name: Tırmanma tutamağı montaj tipi
      description: Tutamağın duvara veya eğitim tahtasına nasıl sabitlendiğini belirtir.
    climbing_hold_type:
      name: Tırmanma tutamağı tipi
      description: Tutamağın kavranma şeklini belirleyen formunu veya stilini sınıflandırır.
    climbing_protection_device_type:
      name: Tırmanış koruma ekipmanı tipi
      description: Koruma ekipmanının türünü belirtir (ör. kam, takoz, piton); kullanıcıların
        uygun ekipmanı daha hızlı bulmasına yardımcı olur.
    climbing_rope_middle_marking:
      name: Tırmanma ipi orta işareti
      description: İpin orta noktasının (veya uçlarının) güvenli iniş ve indirme için
        nasıl işaretlendiğini açıklar.
    climbing_rope_treatment:
      name: Tırmanma ipi uygulaması
      description: Halatın dış kılıfına ve/veya iç kısmına uygulanan su geçirmez,
        kuru veya koruyucu herhangi bir kaplamayı belirtir.
    climbing_rope_type:
      name: Tırmanma ipi tipi
      description: Halatın UIAA sertifikasına ve kullanım amacına göre sınıflandırmasını
        belirtir (ör. dinamik tek, yarım, ikiz, statik veya yardımcı kordon). Bu sayede
        kullanıcılar faaliyetlerine uygun halatı kolayca bulabilir.
    climbing_safety_certifications:
      name: Tırmanma güvenliği sertifikaları
      description: Ürünün karşıladığı tırmanış ve endüstriyel güvenlik standartlarını
        listeler.
    clip_color:
      name: Klips rengi
      description: Klipsli nota kağıdının ana renkleri.
    clip_mechanism_type:
      name: Klips mekanizması tipi
      description: Para klipsi veya para klipsli cüzdanda kullanılan sabitleme mekanizmasını
        belirtir. Bu sayede kullanıcılar mıknatıslı, yaylı, kollu ve diğer seçenekler
        arasından tercih yapabilir.
    clip_style:
      name: Klips stili
      description: Tutucunun takılması için kullanılan özel klips mekanizmasını tanımlar
        ve uyumluluk bilgisi sağlar (örneğin, timsah klipsi, karabina).
    clipper_motor_technology:
      name: Tıraş makinesi motor teknolojisi
      description: Tıraş makinesinde kullanılan motor tasarımını belirtir. Bu, güç,
        gürültü, dayanıklılık ve bakım gereksinimlerini etkiler.
    closet_configuration:
      name: Dolap düzeni
      description: Giyinme odası sisteminin genel şeklini veya yerleşimini tanımlar
        (ör. L tipi, U tipi, adalı).
    closing_mechanism:
      name: Kapanma mekanizması
      description: Çekmecenin kapanma şeklini belirtir; örneğin standart, yumuşak
        kapanma, kendiliğinden kapanma veya iterek açma.
    cloth_construction:
      name: Çuha yapısı
      description: Kumaşın dokuma veya apre türünü belirtir. Bunlar hız ve dayanıklılığı
        etkiler (örneğin, kamgarn veya yün).
    cloth_thickness:
      name: Bez kalınlığı
      description: Parlatma bezinin kalınlığını/ağırlık sınıfını belirtir.
    club_head_material:
      name: Sopa başlığı malzemesi
      description: Sopa başlığının üretiminde kullanılan ana malzemeyi belirtir.
    clutch_hydraulic_system_type:
      name: Debriyaj hidrolik sistemi türü
      description: Debriyajın çalıştırma/hidrolik sistem uyumluluğunu belirtir (ör.
        hidrolik debriyaj veya kablolu dönüşüm uygulamaları).
    clutch_line_connection_type:
      name: Debriyaj hattı bağlantı türü
      description: Debriyaj hattında kullanılan uç bağlantı/rakor arayüzünü belirtir
        (ana merkez, alt merkez ve sert hatlarla uyumluluk açısından önemlidir).
    clutch_pressure_plate_actuation_type:
      name: Debriyaj baskı plakası kumanda tipi
      description: Debriyajın itmeli veya çekmeli bir ayırma mekanizmasıyla çalışıp
        çalışmadığını belirtir (diyafram yaylı sistem).
    clutch_pressure_plate_release_mechanism_type:
      name: Debriyaj baskı plakası ayırma mekanizması türü
      description: Baskı plakasında kullanılan ayırma/çalıştırma arayüzü türü.
    clutch_pressure_plate_surface_type:
      name: Debriyaj baskı plakası yüzey türü
      description: Baskı plakasının sürtünme temas yüzeyi tipidir.
    clutch_slave_cylinder_connection_type:
      name: Debriyaj alt merkez silindiri bağlantı tipi
      description: Debriyaj alt merkezindeki hidrolik hat bağlantı arayüzünü belirtir
        (dişli bağlantı, hızlı bağlantı, banjo vb.).
    clutch_slave_cylinder_mounting_type:
      name: Debriyaj alt merkezi montaj türü
      description: Alt merkezin şanzımana/debriyaj muhafazasına nasıl monte edildiğini
        belirtir (ör. cıvatalı, klipsli veya entegre eş merkezli).
    coating_type:
      name: Kaplama türü
      description: Tahıl/yulaf barı üzerine uygulanan dış kaplama, sos veya glazür
        türünü belirtir (ör. çikolata, yoğurt).
    cocking_mechanism:
      name: Kurma mekanizması
      description: Arbalet kirişini kurmak veya boşaltmak için kullanılan temel yöntem
        ya da cihazı belirtir.
    cocktail_garnish_form:
      name: Kokteyl garnitürü formu
      description: Garnitürün kullanım için nasıl sunulduğunu veya işlendiğini açıklar
        (ör. taze veya kurutulmuş).
    cocktail_mix_variety:
      name: Kokteyl karışımı çeşidi
      description: Karışımın hangi kokteyli oluşturmak için kullanıldığını belirtir
        (örneğin, Margarita, Mojito, Piña Colada).
    cocktail_napkin_features:
      name: Kokteyl peçetesinin özellikleri
      description: Kokteyl peçetelerinin işlevsel, kullanışlı ve çevre dostu özelliklerini
        vurgular.
    cocktail_pick_tip_style:
      name: Kokteyl kürdanı ucu stili
      description: Süslemeleri delmek veya tutmak için kullanılan ucun şeklini/özelliği
        tanımlar.
    cocktail_pick_top_handle_style:
      name: Kokteyl çubuğu üst kısmı/sap tasarımı
      description: Tutma veya sunum amacıyla kullanılan dekoratif üst kısmın ya da
        sapın tasarımını belirtir.
    cocktail_type:
      name: Kokteyl türü
      description: Önceden hazırlanmış ürünün temsil ettiği belirli kokteyl tarifini
        veya stilini belirtir (ör. Margarita, Negroni, Piña Colada).
    cocktail_umbrella_handle_pick_material:
      name: Kokteyl şemsiyesi çubuk malzemesi
      description: Kokteyl şemsiyesinin sap/çubuk kısmında kullanılan malzeme (şemsiye
        kısmı hariç).
    cocoa_processing_method:
      name: Kakao işleme yöntemi
      description: Kakao tozunun nasıl işlendiğini belirtir (ör. doğal, Hollanda usulü
        işlenmiş, siyah kakao).
    cocoa_product_form:
      name: Kakao ürünü biçimi
      description: Kakao ürününün satıldığı fiziksel formu tanımlar.
    coconut_husk_status:
      name: Hindistan cevizi kabuk durumu
      description: Hindistan cevizinin dış kabuğunun ne ölçüde çıkarıldığını belirtir.
        Bu özellik, kullanım kolaylığını, saklamayı ve atık miktarını etkiler.
    coconut_maturity_stage:
      name: Hindistan cevizi olgunluk aşaması
      description: Hasat sırasında Hindistan cevizinin gelişim aşamasını belirtir.
        Bu özellik, lezzeti, su içeriğini ve kullanım amacını önemli ölçüde etkiler
        (ör. içimlik veya yemeklik).
    coconut_oil_refinement_type:
      name: Hindistan cevizi yağı rafinasyon türü
      description: Hindistan cevizi yağının rafinasyon veya kalite türünü belirtir.
        Ör. virgin, rafine, MCT, fraksiyonlanmış.
    coconut_preparation_form:
      name: Hindistan cevizi hazırlama formu
      description: Hindistan cevizinin fiziksel olarak nasıl hazırlandığını veya kesildiğini
        belirtir (bütün, dilimlenmiş, rendelenmiş, püre hâline getirilmiş vb.). Bu
        bilgiler, tarifler veya atıştırmalıklar için uygun formatın bulunmasına yardımcı
        olur.
    coffee_bean_species:
      name: Kahve çekirdeği türleri
      description: Üründe kullanılan kahve çekirdeği türünü belirtir.
    coffee_beverage_variety:
      name: Kahveli içecek çeşidi
      description: Hazır tüketilebilir veya karıştırılabilir kahve içeceklerini türlerine
        göre sınıflandırır.
    coffee_processing_method:
      name: Kahve işleme yöntemi
      description: Kahve çekirdeklerinde kullanılan hasat sonrası işleme yöntemini
        belirtir.
    coil_material:
      name: Bobin malzemesi
      description: Isıtma bobininde kullanılan temel malzemeyi veya örgü tipini belirtir.
        Bunlar, aroma, dayanıklılık ve sıcaklık kontrolü uyumluluğunu etkiler.
    coil_spring_design:
      name: Helezon yaylı tasarımı
      description: Sürüş özelliklerini etkileyen yay oranını/şeklini belirtir.
    coil_spring_finish_coating:
      name: Helezon yay kaplaması/yüzeyi
      description: Korozyona karşı koruma amacıyla uygulanan yüzey işlemini veya kaplamayı
        belirtir.
    coil_spring_material:
      name: Helezon yay malzemesi
      description: Helezon yayın temel malzemesini/bileşimini belirtir.
    coil_system_type:
      name: Yay sistemi türü
      description: Yataklarda kullanılan belirli yay sistemini belirtir (ör. torba
        yay, Bonnell yay).
    coil_type:
      name: Bobin türü
      description: Buhar üretimi ve aromayı etkileyen bobin yapısını veya teknolojisini
        açıklar.
    coin_grade_numismatic:
      name: Madeni para derecesi (nümismatik)
      description: Madeni paranın standartlaştırılmış derecesini belirtir (ör. Sheldon
        ölçeği veya tanımlayıcı derece).
    coin_strike_or_finish:
      name: Madeni para basım kalitesi
      description: Madalyonun basım türü veya yüzey işlemi (örneğin, standart basım,
        prova basımı).
    coin_strike_type:
      name: Madeni para basım türü
      description: Madeni paranın basım/yüzey türünü açıklar (ör. prova basımı, dolaşım
        basımı).
    collar_style:
      name: Yaka stili
      description: Giysideki yaka veya boyun açıklığının tasarımını tanımlar.
    collectible_gun_accessories_included:
      name: Koleksiyonluk silahla birlikte gelen aksesuarlar
      description: Koleksiyonluk silahla birlikte sunulan aksesuar ve belgeleri listeler
        (ör. kılıf, taşıma kutusu, süngü, evraklar).
    collectible_gun_firing_mechanism:
      name: Koleksiyonluk silah ateşleme mekanizması
      description: Koleksiyonluk ateşli silahların (özellikle antika ve tarihi parçaların)
        ateşleme/tetikleme mekanizması türünü belirtir.
    collectible_knife_blade_finish:
      name: Koleksiyonluk bıçak ağız yüzeyi
      description: Bıçağın görünümünü (ve bazı durumlarda korozyon direncini) etkileyen
        yüzey işlemini açıklar.
    color_code_system:
      name: Renk kodu sistemi
      description: Varsa, ipin sayısal renk referansında kullanılan renk kodlama sistemini
        belirtir (ör. DMC, Anchor).
    color_coding_standard:
      name: Renk kodlama standardı
      description: Plakanın uluslararası bir renk kodlama standardını (ör. IWF veya
        IPF) ya da başka bir sistemi takip edip etmediğini belirtir.
    color_effect:
      name: Renk efekti
      description: Saç uzatmalarına (postiş) uygulanan özel renk tekniklerini veya
        efektlerini belirtir.
    color_family:
      name: Renk ailesi
      description: Sumi mürekkebi için üst düzey renk ailesini belirtir (ör. sıcak
        siyah, mavi-siyah).
    color_finish:
      name: Renk yüzeyi
      description: Yalnızca rengin yeterli olmadığı durumlarda, görünen el koruyucu
        parçaların yüzey türünü belirtir (ör. mat veya parlak).
    coloring_finish:
      name: Boyama efekti
      description: Boyamanın oluşturduğu görsel yüzeyi veya özel efekti belirtir (ör.
        metalik veya neon).
    comb_material:
      name: Tarak stili
      description: Mızıkanın hava kanallarını oluşturan gövde kısmında kullanılan
        malzeme.
    comb_type:
      name: Tarak tipi
      description: At bakım taraklarını temel kullanım amaçlarına göre sınıflandırır
        (ör. kaşağı, yele tarağı, kıl çekme tarağı). Bu bilgi, kullanıcıların ihtiyaçlarına
        uygun ürünü daha kolay bulmasına yardımcı olur.
    combat_shorts_cut_style:
      name: Dövüş şortu kesim stili
      description: Dövüş sporları şortlarına özgü kesim veya kalıp stilini belirtir
        (örn. yüksek kesim, retro kesim, sıkı kesim).
    comic_creator_role:
      name: Çizgi roman yaratıcısı rolü
      description: Liste kaydına ilişkin olarak adı geçen yaratıcı rolünü belirtir
        (örn. yazar, sanatçı).
    commemorative_coin_finish:
      name: Hatıra para yüzeyi
      description: Hatıra parasının basım/yüzey işlem türünü belirtir.
    commemorative_coin_mint_mark:
      name: Hatıra parası darphane işareti
      description: Madalyonun üzerinde darphane işareti olup olmadığını gösterir.
    commemorative_subject:
      name: Hatıra konusu
      description: Hatıra olarak anılan temel konuyu belirtir (etkinlik, kişi, yer,
        yıl dönümü, kuruluş vb.).
    commercial_vehicle_class:
      name: Ticari araç sınıfı
      description: GVWR tabanlı düzenleyici/endüstriyel sınıflandırma, ticari araçların
        ağırlık sınıfını tanımlamak ve filtrelemek için kullanılır.
    compass_damping_medium:
      name: Pusula sönümleme ortamı
      description: Pusula kapsülü içindeki ibre hareketini stabilize etmek için kullanılan
        ortamı belirtir.
    compass_illumination_type:
      name: Pusula aydınlatma tipi
      description: Pusula işaretlerinin düşük ışıklı ortamlarda nasıl görünür hale
        getirileceğini belirtir (örneğin, fosforlu boya, trityum, LED arka aydınlatma).
    compass_mounting_style:
      name: Pusula montaj şekli
      description: Pusulanın nasıl taşındığını, takıldığını veya monte edildiğini
        açıklar.
    compass_scale_units:
      name: Pusula ölçeği birimleri
      description: Pusula gövdesine işaretlenmiş ölçü birimlerini (derece, miliradyan
        veya her ikisi) belirtir.
    compatible_abs_system:
      name: Uyumlu ABS sistemi
      description: Ana silindirin ABS'li araçlara yönelik olup olmadığını belirtir.
    compatible_adapter_brand:
      name: Uyumlu adaptör markası
      description: Şaftın adaptörüne uyumlu olacak şekilde önceden yapılandırıldığı
        golf sopası kafası markasını belirtir.
    compatible_airbag_system_type:
      name: Uyumlu hava yastığı sistemi tipi
      description: Parçanın hangi hava yastığı sistemi nesli/özellik setiyle uyumlu
        olduğunu belirtir (örneğin, tek kademeli veya çift kademeli).
    compatible_amplifier_fit_method:
      name: Uyumlu amplifikatör takma yöntemi
      description: Kılıf/kapak için uyumluluğun nasıl tanımlandığını belirtir (ör.
        evrensel uyum, modele özgü, boyutlara göre).
    compatible_apparatus:
      name: Uyumlu alet
      description: Bu tutacakların hangi jimnastik aleti veya aktivitesi için tasarlandığını
        belirtir.
    compatible_archery_tool:
      name: Uyumlu okçuluk aleti
      description: Aksesuarın başlıca hangi okçuluk aleti veya ekipman parçası ile
        çalışacak şekilde tasarlandığını belirtir.
    compatible_axle_size:
      name: Uyumlu aks boyutu
      description: Ayak yaslama parçasının hangi göbek/aks çapı veya dişli standardı
        ile uyumlu olacak şekilde tasarlandığını belirtir (ör. 10 mm/3⁄8 in, 14 mm,
        3/8 inç 26 TPI).
    compatible_axle_type:
      name: Uyumlu aks tipi
      description: Antrenman sisteminin desteklediği arka aks bağlantı standardını/standartlarını
        (örneğin hızlı bırakma veya geçme mil ölçüleri) belirtir.
    compatible_axle_weight_rating:
      name: Uyumlu aks ağırlığı derecesi
      description: Römork fren tertibatının hangi römork aks ağırlığı derecesi ile
        uyumlu olacak şekilde tasarlandığını (aks başına kapasite) belirtir.
    compatible_bait_type:
      name: Uyumlu yem türü
      description: Olta balıkçılarının tercih ettikleri yeme uygun bir alet seçebilmeleri
        için yem delicinin uyumlu olduğu balık yemi türlerini tanımlar.
    compatible_bass_scale_length:
      name: Uyumlu bas skala uzunluğu
      description: Bu tel setinin hangi bas skala uzunluğuna/uzunluklarına yönelik
        olduğunu belirtir (uygun sarım uzunluğu ve uyumluluk için önemlidir).
    compatible_battle_top_system:
      name: Uyumlu topaç çarpıştırma sistemi
      description: Topacın hangi topaç çarpıştırma ürün ekosistemi veya serisi için
        tasarlandığını gösterir (parça ve arena uyumundan emin olmak için kullanılır).
    compatible_bb_size:
      name: Uyumlu BB boyutu
      description: Ürünün desteklediği havalı tüfek peletlerinin çapını belirtir.
    compatible_bed_frame_style:
      name: Uyumlu yatak çerçevesi stili
      description: Aksesuarın hangi yatak veya çerçeve stiliyle uyumlu olacak şekilde
        tasarlandığını belirtir.
    compatible_bicycle_tire_type:
      name: Uyumlu bisiklet lastiği tipi
      description: Ürünün hangi bisiklet lastiği tiplerini onarabileceğini veya sızdırmaz
        hale getirebileceğini belirtir.
    compatible_bike_component:
      name: Uyumlu bisiklet bileşeni
      description: Aletin veya ürünün bisikletin hangi bileşenine göre tasarlandığını
        belirtir.
    compatible_billiard_game:
      name: Uyumlu bilardo oyunu
      description: Rafın hangi bilardo oyunu biçimi/biçimleri için tasarlandığını
        göstererek müşterilerin kendi oyunlarına uygun bir raf seçebilmelerini sağlar.
    compatible_billiard_table_size:
      name: Uyumlu bilardo masası boyutu
      description: Kılıfın hangi standart masa uzunluklarıyla uyumlu olduğunu belirterek
        alıcıların bilardo masaları için doğru boyutta kılıf seçebilmelerini sağlar.
    compatible_bit_type:
      name: Uyumlu gem tipi
      description: Kılıfın kullanılabileceği uç çeşitleri.
    compatible_blade_hosel:
      name: Uyumlu hosel tipi
      description: Şaftın hangi blade tipi/konik boyun stili ile uyumlu olduğunu belirterek
        şaft ve blade'in doğru şekilde birbirine oturmasını sağlar.
    compatible_blade_system:
      name: Uyumlu bıçak sistemi
      description: Bıçağın hangi yedek bıçak sistemi/biçimi ile uyumlu olduğunu belirtir
        (örneğin, standart hobi no. 11, kırılabilir bölmeli falçata uçları).
    compatible_boat_weaving_shuttle_loom:
      name: Uyumlu masuralı mekik tezgâhı
      description: Masuralı mekiğin kullanılması amaçlanan dokuma tezgâhı tipleri.
    compatible_bobbin_type:
      name: Uyumlu masura tipi
      description: Masuralı mekiğin hangi masura/makara stili ile kullanılmak üzere
        tasarlandığını belirtir.
    compatible_bottle_mouth:
      name: Uyumlu şişe ağzı
      description: Pipetin veya kapağın takılacağı şişe ağzı tipi veya çapı.
    compatible_bow_attachment_system:
      name: Uyumlu yay bağlantı sistemi
      description: Parçanın hangi yay kanadı (limb) veya aksesuar arabirimi için tasarlandığını
        belirtir (ör. ILF, vidalı bağlantı, hızlı sökülen).
    compatible_bow_crossbow_type:
      name: Uyumlu yay/arbalet tipi
      description: Aksesuarın hangi yay veya arbalet stiline uygun olarak tasarlandığını
        belirtir.
    compatible_brake_fluid:
      name: Uyumlu fren hidroliği
      description: Ana silindir contalarının/malzemelerinin uyumlu olduğu fren hidroliği
        DOT spesifikasyonları.
    compatible_brake_pad:
      name: Uyumlu fren balatası
      description: Rotorun hangi fren balatası bileşikleri için onaylandığını göstererek
        güvenlik ve optimum düzeyde aşınma elde edilmesini sağlar.
    compatible_brake_service_system:
      name: Uyumlu fren servis sistemi
      description: Parçanın disk frenler, kampanalı frenler veya her ikisi için de
        uygun olup olmadığını belirtir.
    compatible_brake_system:
      name: Uyumlu fren sistemi
      description: Fren hidroliği kullanımı için temel sistem uyumluluk notlarını
        belirtir.
    compatible_brake_type:
      name: Uyumlu fren tipi
      description: Rafın uyumlu olduğu fren tipini belirtir; örneğin disk fren veya
        jant freni.
    compatible_brass_instrument_finish:
      name: Uyumlu bakır nefesli çalgı kaplaması
      description: Temizleyicinin yüzeye zarar vermeden hangi üflemeli çalgı yüzeylerinde
        güvenle kullanılabileceğini belirtir.
    compatible_building_toy_system:
      name: Uyumlu yapı oyuncağı sistemi
      description: Oyuncağın hangi yapı sistemi/standardıyla uyumlu olduğunu (veya
        eş değer boyutlandırmayı) belirtir; örneğin LEGO uyumlu veya özel üretim.
    compatible_capo_fretboard_radius:
      name: Uyumlu kapo tuşe yarıçapı
      description: Kaponun optimum temas ve akort stabilitesi sağlamak üzere hangi
        tuşe yarıçapı/profili için tasarlandığını belirtir.
    compatible_capo_number_of_strings:
      name: Uyumlu kapo tel sayısı
      description: Kaponun kaç tel sıkıştırmak üzere tasarlandığını belirtir (6, 7,
        8, 12 telli ve özel enstrümanlar için faydalıdır).
    compatible_cardio_machine_type:
      name: Uyumlu kardiyo cihazı tipi
      description: Aksesuarın veya parçanın hangi tip kardiyo aletiyle çalışmak üzere
        tasarlandığını belirtir.
    compatible_chain_link_type:
      name: Uyumlu zincir baklası tipi
      description: Aletin hangi zincir baklası stilini desteklediğini tanımlar (standart,
        yarım bakla, hızlı bağlantı baklası vb.).
