    drumhead_type:
      name: Rumpukalvon tyyppi
      description: Octobanissa käytetty kalvokokoonpano tai -tyyppi.
    drumstick_model:
      name: Rumpukapulamalli
      description: Tämä on standardoitu rumpukapulan malli- tai kokomerkintä, jota
