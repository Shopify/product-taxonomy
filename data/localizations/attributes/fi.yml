      description: Perävaunun valon ensisijainen toiminto/sijainti.
    trailer_suspension_type:
      name: Pyöräkärryn jousitustyyppi
      description: Määrittää polkupyörän peräkärryssä käytetyn, ajomukavuutta ja lastin
