    swimwear_set_pieces_included:
      name: Mukana tulevat uima-asustesetin osaset
      description: Luettelee burkinisettiin sisältyvät vaateosat, kuten yläosan, leggingsit
        ja hijabin tai uimalakin, jotta ostajat tietävät tarkasti, mitä pakkaukseen
        kuuluu.
    swing_attachment_connection_type:
      name: Keinun kiinnitys- tai liitäntätapa
      description: Ilmaisee, millä kiinnitystavalla keinu ripustetaan tukirakenteeseen,
        kuten köydellä, ketjulla tai hihnoilla.
    swing_trainer_type:
      name: Lyönnin harjoituslaitteen tyyppi
      description: Ilmaisee swing trainer -harjoitteluvälineen tyylin tai toimintamekanismin,
        jotta ostajat löytävät nopeasti omiin harjoittelutavoitteisiinsa sopivat välineet.
    swing_training_objective:
      name: Lyöntiharjoittelun tavoite
      description: Ilmaisee swing trainer -harjoitteluvälineen ensisijaisen harjoittelutavoitteen
        tai toimintamekanismin, kuten tempon, nopeuden tai otteen harjoittamisen.
    switch_electrical_positions:
      name: Kytkimen asennot
      description: Ilmaisee kytkimen sähköisten asentojen määrän ja toimintatavan,
        kuten 3-asentoinen kytkin tai hetkellisesti kytkeytyvä ON-asento.
    swivel_type:
      name: Kääntönivelen tyyppi
      description: Ilmaisee, millaista kääntönivelratkaisua käytetään talutushihnan
        sotkeutumisen vähentämiseen.
    sword_scabbard_material:
      name: Miekan tupen materiaali
      description: Määrittää tupen (jos sellainen on) ensisijaisen materiaalin.
    synthesizer_form_factor:
      name: Syntetisaattorin muotokerroin
      description: Kuvaa syntetisaattorin fyysisen/toistokäyttöliittymän formaatin.
    synthetic_feather_style:
      name: Synteettinen sulkatyyli
      description: Ilmaisee synteettisen sulan tyylin tai leikkauksen, jota voidaan
        käyttää erilaisten ilmeiden ja askartelutekniikoiden luomiseen.
    synthetic_formulation_type:
      name: Synteettinen formulaatiotyyppi
      description: Ilmaisee synteettisen perusöljyn tai perusöljykoostumuksen tyypin,
        kuten PAO-, esteri- tai vetykrakatun ryhmän III öljyn.
    syrup_base_ingredient:
      name: Siirapin perusainesosa
      description: Ilmaisee siirapin tai nektarin ensisijaisen raaka-aineen tai sokerilähteen,
        kuten vaahteran, agaaven tai ruokosokerin.
    syrup_variety:
      name: Siirappilajike
      description: Määrittelee siirapin yleisen tyylin tai luokan sen koostumuksen
        tai perinteisen käytön perusteella (esim. vaahterasiirappi, kahvinmakuinen,
        hedelmäsiirappi, lääkesiirappi).
    t_shirt_fit:
      name: T-paidan istuvuus
      description: Kuvaa t-paidan aiottua yleistä istuvuutta/leikkausta.
    tabla_included_components:
      name: Tablasettiin sisältyvät osat ja tarvikkeet
      description: Ilmaisee tabla-tuotteen mukana toimitettavat keskeiset osat ja
        tarvikkeet, kuten yksittäisen rummun tai tablasetin sekä mahdolliset suojukset,
        kuljetuslaukut ja viritysvasaran.
    tabla_set_pieces_included:
      name: Tabla-settiin sisältyvät osat
      description: Ilmaisee, mitkä osat sisältyvät tabla-settiin (esim. dayan, bajan,
        renkaat, suojukset, viritystyökalut, laukku).
    tabla_tonal_pitch_range_bayan:
      name: Bayan-rummun sävelkorkeusalue
      description: Ilmaisee bayan-rummun eli tablan bassorummun tyypillisen sävelkorkeus-
        tai äänialaluokan sen koon ja rakenteen perusteella.
    table_base_material:
      name: Pöydän pohjamateriaali
      description: Tunnistaa pöydän pohjan tai jalustan päämateriaalin (eroaa jaloista
        tai pöytälevystä), mikä auttaa materiaalikohtaisessa suodatuksessa.
    table_base_type:
      name: Pöydän pohjan tyyppi
      description: Ilmaisee pöytälevyn tukirakenteen tyypin, kuten keskipylväsjalustan,
        pukkijalan tai X-jalustan.
    table_coverage_position:
      name: Pöytäsuojan peittoalue
      description: Ilmaisee, sopiiko suojus pingispöydälle kokoontaitettuna, peliasennossa
        vai molemmissa asennoissa.
    table_hockey_part_type:
      name: Pöytäkiekon osan tyyppi
      description: Ilmaisee, minkä tyyppisestä pöytä-, ilma-, sauva- tai kuplajääkiekkopelin
        osasta on kyse.
    table_leg_design:
      name: Pöydän jalan muotoilu
      description: Ilmaisee pöydänjalan rakenteen tai muodon, kuten tyylin, geometrian
        ja tuen tarpeen kannalta olennaiset ominaisuudet.
    table_size:
      name: Pöydän koko
      description: Ilmaisee biljardipöydän kaupallisesti ilmoitetun kokonaiskoon jalkoina,
        esimerkiksi 7 jalan baaripöytä tai 9 jalan turnauspöytä.
    table_size_category:
      name: Pöydän koon kategoria
      description: Ilmaisee pöytäjalkapallopöydän kokoluokan, jotta ostajat voivat
        valita tilaansa sopivan vaihtoehdon ilman tarkkojen mittojen laskemista.
    table_tennis_certification:
      name: Pöytätennissertifikaatti
      description: Luettelee viralliset standardit tai lajiliittojen/hallintoelinten
        hyväksynnät, jotka tuote täyttää, kuten ITTF-hyväksynnän tai EN 14468-2 -standardin
        mukaiset luokat.
    tabletop_tilt_function:
      name: Pöytälevyn kallistustoiminto
      description: Määrittää, voiko pöytälevyä kallistaa, kääntää tai kiertää eri
        kulmiin.
    tackle_components_included:
      name: Vieheen mukana tulevat osat
      description: Luettelee settiin sisältyvät yksittäiset kalastustarvikkeet, jotta
        ostajat tietävät tarkasti, mitä mukana toimitetaan.
    talking_drum_accessories_included:
      name: Talking drum -rummun mukana toimitettavat tarvikkeet
      description: Ilmaisee, mitä tarvikkeita talking drum -rummun mukana toimitetaan
        pakkauksessa.
    talking_drum_cord_material:
      name: Talking drum -rummun nyörin materiaali
      description: Ilmaisee rumpukalvoja yhdistävien kiristysnyörien tai -köysien
        materiaalin.
    talking_drum_tuning_mechanism:
      name: Talking drum -rummun kiristys- ja viritysmekanismi
      description: Ilmaisee, miten rummun sävelkorkeutta muutetaan tai kalvoihin kohdistuvaa
        kireyttä säädetään soittamisen aikana tai käyttöönotossa.
    tam_tam_construction_style:
      name: Tam-tamin rakenteen tyyppi
      description: Tam-tamin rakenne- tai vasarointityyli.
    tam_tam_items_included:
      name: Mukana toimitetut tam-tam-tuotteet
      description: Tam-tamin mukana toimitettavat tarvikkeet, kuten nuija, teline
        tai suojus.
    tamarillo_variety:
      name: Tamarillon lajike
      description: Ilmaisee tamarillon lajikkeen tai värimuunnoksen.
    tamarind_variety:
      name: Tamarindilajike
      description: Määrittää tamarindin kasvitieteellisen tai kaupallisen lajikkeen,
        joka voi vaikuttaa makuun, koostumukseen ja kulinaariseen käyttöön.
    tambourine_frame_style:
      name: Tamburiinin kehyksen tyyli
      description: Kuvaa tamburiinin pitämiseen/soittamiseen käytettävän fyysisen
        kädessä pidettävän kehyksen kokoonpanoa.
    tambourine_head_material:
      name: Tamburiinin pään materiaali
      description: Ilmaisee kalvollisen tamburiinin soittopään eli kalvon materiaalin.
    tambourine_jingle_configuration:
      name: Tamburiinin helistinasetelma
      description: Miten helistinsävelmät on järjestetty tai rakennettu tamburiinissa.
    tambourine_jingle_material:
      name: Tamburiinin helistinmateriaali
      description: Määrittää tamburiinin helistinten (metallilevyjen) materiaalin,
        joka vaikuttaa sävyyn ja kestävyyteen.
    tambourine_mounting_type:
      name: Tamburiinin kiinnitystyyppi
      description: Ilmaisee, miten tamburiinia on tarkoitus pitää kädessä tai kiinnittää
        soittamisen aikana.
    tambourine_tuning_mechanism:
      name: Tamburiinin viritysmekanismi
      description: Määrittää viritettävien kädessä pidettävien tamburiinien viritysjärjestelmän
        (jos sovellettavissa).
    tank_model_scale:
      name: Panssarivaunumallin mittakaava
      description: Ilmaisee panssarivaunumallin mittakaavan, kuten 1:35 tai 1:72.
    tank_top_back_style:
      name: Hihattoman topin selkäosan malli
      description: Ilmaisee hihattoman topin selkäosan mallin, kuten leikkauksen tai
        muodon, joka vaikuttaa tukeen, liikkuvuuteen ja ulkonäköön.
    tape_application_area:
      name: Teipin käyttöalue
      description: Ilmaisee teipin tarkoitetun käyttökohdan varusteessa tai pelaajassa,
        mikä auttaa ostajia valitsemaan oikean teippityypin.
    tape_finish:
      name: Teipin viimeistely
      description: Teipin pinta/visuaalinen viimeistely (kiilto tai rakenne).
    tape_purpose:
      name: Teipin tarkoitus
      description: Määrittää teipin ensisijaisen toiminnallisen käyttötarkoituksen
        mailan huollossa tai mukauttamisessa.
    tape_type:
      name: Teippityyppi
      description: Ilmaisee jääkiekkoteipin käyttötarkoituksen tai rakenteen, kuten
        kangas-, kirkas polyeteeni-, pito-, joustava itseensä tarttuva, säärisuoja-
        tai säämiskäteippi.
    tapenade_main_ingredients:
      name: Tapenaden pääainesosat
      description: Ilmaisee tapenaden pääraaka-aineen, kuten oliivin, tomaatin, munakoison
        tai paprikan, jotta ostajat voivat valita tuotteen raaka-ainemieltymystensä
        tai -rajoitustensa mukaan.
    tapestry_loom_loom_format:
      name: Kuvakudontakangaspuiden malli
      description: Ilmaisee kuvakudontaan tarkoitettujen käsikangaspuiden yleisen
        mallin tai telinerakenteen.
    tapestry_loom_shedding_method:
      name: Kuvakudontakangaspuiden viriönmuodostusmenetelmä
      description: Ilmaisee, miten kangaspuut muodostavat viriön eli erottavat loimilangat
        toisistaan, jotta kude voidaan viedä niiden välistä.
    tapestry_loom_tensioning_system:
      name: Kuvakudontakangaspuiden kiristysjärjestelmä
      description: Ilmaisee menetelmän, jolla loimi kiristetään ja kiinnitetään kuvakudontakangaspuissa.
    tar_head_material:
      name: Tar-rummun kalvon materiaali
      description: Ilmaisee tar-rummun kalvomateriaalin, joka vaikuttaa vahvasti soittotuntumaan,
        kestävyyteen ja sointiin.
    tar_playing_style:
      name: Tar-rummun soittotyyli
      description: Ilmaisee ensisijaisen soittoasennon tai -tekniikan, jota varten
        tar-rumpu on suunniteltu.
    tar_tuning_system:
      name: Tar-rummun viritysjärjestelmä
      description: Ilmaisee tar-rummun viritystavan eli menetelmän, jolla kalvon kireyttä
        säädetään.
    target_components:
      name: Kohdekomponentit
      description: Ilmaisee, mitä polttoaine- tai ilmanottojärjestelmän osia tuote
        on tarkoitettu puhdistamaan.
    target_relative_humidity_rh:
      name: Tavoiteltu suhteellinen kosteus
      description: Ilmaisee suhteellisen kosteuden tavoitearvon, jota tuote on suunniteltu
        ylläpitämään soittimen tai kotelon sisäympäristössä.
    target_resetting_mechanism:
      name: Tavoitepalautusmekanismi
      description: Kuvaa, miten kohde palaa alkuperäiseen sijaintiinsa osuman jälkeen
        tai palaako se takaisin.
    target_trainer_type:
      name: Lyöntiharjoitteluverkon tyyppi
      description: Ilmaisee racquetball- tai squash-harjoittelutaulun yleisen mallin
        tai toteutustavan.
    targeted_contaminants:
      name: Kohde-epäpuhtaudet
      description: Mikrobien tai loisten tyypit, joiden poistamiseen tuote on sertifioitu.
    targeted_muscle_group:
      name: Kohdelihasryhmä
      description: Ilmaisee ensisijaisen lihasryhmän, jonka harjoittamiseen tai tukemiseen
        lisävaruste on tarkoitettu.
    taro_variety:
      name: Tarojuuren lajike
      description: Ilmaisee tarjolla olevan taronjuuren lajikkeen, lajin tai kauppanimen,
        kuten Purple Taro, Eddoe tai Dasheen.
    tassel_trim_header_type:
      name: Tupsunauhan kiinnitysreunan tyyppi
      description: Ilmaisee tupsunauhan kiinnitysreunan rakenteen, kuten nauha-, punos-
        tai nyörireunan.
    tassel_trim_use_case:
      name: Tupsunauhan käyttökohde
      description: Ilmaisee tupsunauhan ensisijaisen käyttökohteen tai käyttöalueen.
    taste_profile:
      name: Makuprofiili
      description: Ilmaisee omenalajikkeen pääasialliset makuominaisuudet, kuten makeuden,
        hapokkuuden tai aromikkuuden.
    tea_variety:
      name: Teelajike
      description: Luokittelee teen tai haudukkeen tyypin tai tyylin (esim. musta,
        vihreä, matcha, rooibos), jotta ostaja voi suodattaa haluamiaan lajikkeita.
    teasing_tool_style:
      name: Tupeerausvälineen malli
      description: Ilmaisee kuitujen avaamiseen ja sekoittamiseen käytettävän välineen
        fyysisen mallin, kuten harjan, haran tai kamman.
    tee_base_style:
      name: T-liittimen pohjarakenteen tyyppi
      description: Ilmaisee rugby-potkutelineen pohjan rakenteen tai mallin, jonka
        varaan pallo asetetaan.
    temper_hardness:
      name: Karkaisuaste / kovuus
      description: Ilmaisee langan kovuusasteen ja sen, kuinka hyvin lanka pitää muotonsa.
    temperature_control_type:
      name: Lämpötilan säädön tyyppi
      description: Ilmaisee, miten työkalun lämpötilaa säädetään tai hallitaan.
    tenkara_action_ratio:
      name: Tenkara-vavan taipumajakauma
      description: Ilmaisee tenkara-vavan perinteisen taipumasuhteen, kuten 6:4, joka
        kertoo, miten vapa taipuu kuormituksen alla.
    tennis_ball_court_surface:
      name: Tenniskentän alustatyyppi
      description: Ilmaisee, mille kenttäalustoille tennispallo on tarkoitettu, jotta
        se toimii mahdollisimman hyvin ja kestää käytössä.
    tennis_ball_pressure_type:
      name: Tennispallon painetyyppi
      description: Ilmaisee pallon sisäisen paineen tai rakenteen (paineistettu, paineeton,
        alhainen paine, vaahtomuovi), joka vaikuttaa kimmoisuuteen ja kestävyyteen.
    tennis_racket_grip_size:
      name: Tennismailan kahvakoko
      description: Ilmaisee tennismailan kahvan standardoidun koon, kuten L0–L5 tai
        vastaavan tuumakoon, jotta kahva sopii käyttäjän käteen mukavasti.
    tenor_flutophone_fingering_system:
      name: Tenoriflutofonin sormitusjärjestelmä
      description: Ilmaisee, mitä sormitusjärjestelmää tenoriflutofonissa käytetään
        opetuksessa tai nuottimerkinnöissä.
    tenor_recorder_joint_type:
      name: Tenorinokkahuilun osarakenne
      description: Ilmaisee, miten tenorinnokkahuilun eri osat liittyvät toisiinsa.
    tenor_saxophone_key_system:
      name: Tenorisaksofonin läppäjärjestelmä
      description: Ilmaisee tenorisaksofonissa käytettävän läppäjärjestelmän tai koneistostandardin,
        kuten ranskalaisen/Boehm-tyylisen järjestelmän.
    tenor_saxophone_pad_material:
      name: Tenorisaksofonin läppätyynyjen materiaali
      description: Määrittää instrumentin tyynyjen ensisijaisen materiaalin.
    tenor_trombone_slide_type:
      name: Tenoripasuunan vetoputken tyyppi
      description: Ilmaisee tenoripasuunan vetoputkirakenteen, kuten vakio-/suoravetoinen
        malli tai trigger-/axial flow -rakenne.
    tenor_trombone_valve_configuration:
      name: Tenoripasuunan venttiilirakenne
      description: Ilmaisee, onko tenoripasuunassa venttiili-/roottorilisäosa ja millaista
        kokoonpanoa se käyttää.
    tension_control_type:
      name: Jännityksensäädön tyyppi
      description: Ilmaisee, miten sukkula tuottaa säädettävän vedon/kireyden puolalle
        tai pirralle syötön aikana, tai tuottaako se sitä lainkaan.
    tension_mechanism:
      name: Kiristysmekanismi
      description: Sukkulan kireydensäätötapa, jolla hallitaan kuteen syöttöä puolalta
        tai pirniltä kudonnan aikana.
    tension_pitch_modulation_system:
      name: Kireyden ja sävelkorkeuden säätöjärjestelmä
      description: Ilmaisee, miten talking drum -rumpu muuttaa sävelkorkeutta tai
        kalvon kireyttä soittamisen aikana, esimerkiksi kiristysnyörejä puristamalla.
    tension_system:
      name: Kiristysjärjestelmä
      description: Rukin vetojärjestelmä tai kireydensäätöjärjestelmä, jota varten
        siipisarja on tarkoitettu.
    tent_fabric_material:
      name: Telttakankaan materiaali
      description: Ilmaisee teltan ulkokankaan tai rungon pääasiallisen materiaalin,
        joka vaikuttaa painoon, hengittävyyteen ja säänkestävyyteen.
    tent_season_rating:
      name: Telttakauden luokitus
      description: Luokittelee teltan sen mukaan, kuinka monelle vuodenajalle tai
        millaisiin sääolosuhteisiin se on suunniteltu, kuten 3 vuodenajan teltta,
        4 vuodenajan teltta tai retkikuntateltta.
    tent_setup_type:
      name: Teltan pystytystyyli
      description: Ilmaisee teltan rakenteellisen pystytystavan, kuten itsestään seisova,
        osittain itsestään seisova, ei-itsestään seisova, ilmatäytteinen/ilmarunkoinen
        tai pop-up-malli.
    tent_style:
      name: Telttatyyli
      description: Kuvaa teltan rakenteellista mallia, kuten kupoli-, tunneli- tai
        A-runkoteltta.
    test_result_output_method:
      name: Testituloksen näyttö- tai ilmoitustapa
      description: Ilmaisee, miten ajoneuvon akkutesteri näyttää tai toimittaa testitulokset
        käyttäjälle, esimerkiksi merkkivalolla, näytöllä, tulosteena, sovelluksessa
        tai ohjelmistoraporttina.
    tether_strap_system:
      name: Hihnajärjestelmä
      description: Niskatuen kypärään tai valjaisiin yhdistävän kiinnitysnauha- tai
        hihnajärjestelmän tyyppi, jos sellainen on käytössä.
    text_color:
      name: Tekstin väri
      description: Etiketin painetun tai brodeeratun tekstin väri, erillään etiketin
        taustaväristä.
    textile_craft_machine_operation_type:
      name: Tekstiilikäsityökoneen toimintatapa
      description: Ilmaisee, miten konetta käytetään, esimerkiksi käsikäyttöisesti,
        jalkakäyttöisesti tai moottoroituna/sähkökäyttöisesti.
    textile_finish_treatment:
      name: Tekstiilin viimeistelykäsittely
      description: Määrittää tekstiilimateriaaliin tehdyt merkittävät pintakäsittelyt.
    texture_inclusions:
      name: Lisätyt tekstuuria tuovat ainesosat
      description: Määrittää lisätyt tekstuuria tuovat ainesosat, kuten aloe-hedelmälihan,
        basilikan siemenet, nata de cocon, poksuvat boba-helmet tai hedelmäpalat.
    therapeutic_technology:
      name: Terapeuttinen teknologia
      description: Määrittää mahdollisen integroidun terapeuttisen toiminnon, kuten
        viilentävän geelin, magneettinauhat tai infrapunakeraamisen materiaalin.
    thermal_set_components:
      name: Lämpökerraston osat
      description: Määrittää, sisältääkö tuote vain pohjaosia, vain päällisosia vai
        molempia osia settinä.
    thermal_weight:
      name: Lämpöluokka
      description: Ilmaisee kypärämyssyn kankaan lämpöluokan.
    thermostat_type:
      name: Termostaatin tyyppi
      description: Moottoriajoneuvon jäähdytysjärjestelmän termostaatin toiminnallinen
        suunnittelu tai ohjaustapa.
    thimble_guide_size:
      name: Sormustinohjaimen koko
      description: Sormustinohjaimen kokomerkintä (sopivuus/peittävyys), myydään tyypillisesti
        pienenä/keskikokoisena/suurena eikä mitattuina ulottuvuuksina.
    thread_connection_size:
      name: Siiman liitoksen koko
      description: Määrittelee nuolien, kärkien ja sovittimien yhdistämiseen käytettävän
        siiman määrityksen (esim. 6 mm, 5/16"-24).
    thread_construction:
      name: Langan rakenne
      description: Miten lanka on valmistettu tai käsitelty (esim. kerrattu kirjontalanka
        vs. liimattu lanka).
    thread_cord_type_beading_pattern:
      name: Lanka-/nyörityyppi (helmikuvio)
      description: Suositeltu lanka- tai nyörityyppi kuvion viimeistelyyn.
    thread_cutter_form_factor:
      name: Lankaleikkurin muototekijä
      description: Määrittää lankaleikkurin fyysisen tyypin, kuten käsikäyttöiset
        sakset, riipus- tai sormusmalli.
    thread_cutter_mechanism:
      name: Lankaleikkurin mekanismi
      description: Kuvaa lankaleikkurin käyttämää leikkaustoimintoa tai -mekanismia.
    thread_cutter_safety_features:
      name: Ketjuleikkurin turvaominaisuudet
      description: Ilmaisee sisäänrakennetut turvaominaisuudet, jotka vähentävät sattumalta
        tapahtuvan leikkuun riskiä tai suojaavat teriä varastoinnin aikana.
    thread_cutter_usage_application:
      name: Lankaleikkurin käyttö
      description: Ilmaisee lankaleikkurin ensisijaisen käyttötarkoituksen käsitöissä.
    thread_finish_treatment:
      name: Langan viimeistely/käsittely
      description: Lankaan käytetty pintakäsittely, joka vaikuttaa käsittelyyn ja
        käyttäytymiseen (esim. vahattu, liimattu, merseroitu).
    thread_material:
      name: Langan materiaali
      description: Langan pääkuitu/-materiaali (ei kangas).
    thread_material_fiber:
      name: Langan materiaali (kuitu)
      description: Määrittää langan ensisijaisen kuidun/materiaalin (ei kangas).
    thread_package_format:
      name: Lankapaketin muoto
      description: Ompelulangan pakkauksen muototekijä (esim. kela, kartio, puola).
    thread_rack_compatible_spool_type:
