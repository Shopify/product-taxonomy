    spindle_tip_style:
      name: Värttinän kärjen tyyli
      description: Alustaa/kuppia (laakeripintaa) vasten olevan kohdan muoto/malli,
        joka vaikuttaa kitkaan ja kehräämisen tasaisuuteen.
    spindle_whorl_position:
      name: Värttinän kehrän sijainti
      description: Mihin kehräpyörä asettuu värttinän akselilla.
    spinner_blade_shape:
      name: Vieheen lipan muoto
      description: Määrittää vieheessä käytetyn lipan pääasiallisen muodon, joka vaikuttaa
        värähtelyyn, välkkymiseen ja käyttösyvyyteen.
    spinner_control_card_design_type:
      name: Langanmittaustyökalun malli/tyyppi
      description: Kuvaa langanmittaustyökalun tyyppiä sen osalta, miten se esittää
        ohjaustietoja (esim. suhdeviittaus, kireysviittaus, muunnoskaavio).
    spinner_subtype:
      name: Vieheen alatyyppi
      description: Luokittelee viehemallin tai -ryhmän (esim. pyörivä lippa, spinnerbait).
    spinning_oil_application_area:
      name: Kehruuöljyn käyttöalue
      description: Määrittää öljyn käyttökohdat rukissa.
    spinning_oil_application_tool:
      name: Pyörivän pyörän öljyn levitystyökalu
      description: Ilmaisee levittimen/pakkauksen kärjen tyypin, jota käytetään öljyn
        levittämiseen rukin osille hallitusti.
    spinning_oil_features:
      name: Kehruuöljyn ominaisuudet
      description: Korostaa rukille tarkoitettujen öljyjen toiminnallisia ominaisuuksia
        (jäämät, värjäytyminen, hapettuminen ja pestävyys).
    spinning_top_features:
      name: Hyrrän ominaisuudet
      description: Hyrrän käyttöominaisuudet muissa kuin perusleikeissä.
    spinning_top_launch_mechanism:
      name: Hyrrän pyöräytysmekanismi
      description: Miten hyrrä laukaistaan/pyöräytetään käyntiin.
    spinning_wheel_brake_tension_system_type:
      name: Rukin jarru-/kiristysjärjestelmän tyyppi
      description: Määrittää langan syöttöä säätelevän jarru-/kiristysjärjestelmän.
    spinning_wheel_drive_system:
      name: Rukin käyttöjärjestelmä
      description: Ilmaisee, mihin toimintajärjestelmään puola on tarkoitettu.
    spinning_wheel_hook_system:
      name: Rukin koukkujärjestelmä
      description: Määrittää, miten lanka ohjataan puolanvarsia pitkin.
    spinning_wheel_part_application:
      name: Rukin kohdeosat
      description: Määrittää, mille rukin osille öljy on tarkoitettu.
    spinning_wheel_portability_foldability:
      name: Rukin siirrettävyys/taittuvuus
      description: Ilmaisee, onko rukki suunniteltu taittuvaksi kuljetusta varten.
    spinning_wheel_tension_adjustment_type:
      name: Rukin kireyden säätötyyppi
      description: Miten pyörän kireyttä säädetään langan kireydensäädössä.
    splice_termination_type:
      name: Punos-/liitäntätapa
      description: Määrittää ankkuriköydelle varatun päätetavan (esim. silmukka, vaijerikilpi,
        ketjukoukku).
    split_shot_cut_type:
      name: Puristetun haulin leikkaustyyppi
      description: Määrittää uran tai aukon, johon siima kiinnitetään.
    split_shot_shape:
      name: Kalastuspainon muoto
      description: Kuvaa puristetun haulin fyysistä muotoa, joka vaikuttaa hydrodynamiikkaan
        ja tarttumattomuuteen.
    split_shot_size:
      name: Puristetun haulin koko
      description: Standardoitu aakkosnumeerinen kokokoodi (esim. SSG, AAA, BB, 1),
        joita valmistajat ja kalastajat käyttävät näiden siimapainojen luokitteluun.
        Täydentää tarkkoja painomittauksia.
    spoiler_adjustability:
      name: Spoilerin säädettävyys
      description: Ilmaisee, onko spoilerin kulma/korkeus säädettävissä.
    spoke_accessory_function:
      name: Pinnan lisävarusteen toiminnot
      description: Luokittelee lisävarusteen ensisijaiset toiminnot pyörässä, kuten
        koristeellinen, heijastava tai valaistu.
    spoke_butting_profile:
      name: Pinnojen paksuusprofiili
      description: Kuvaa, miten pinnan halkaisija muuttuu pituudeltaan (tasainen,
        yksin-, kaksin-, kolmin- tai nelinkertaisesti ohennettu), mikä vaikuttaa painoon
        ja lujuuteen.
    spoke_gauge:
      name: Pinnan paksuus
      description: Määrittää kiinnikkeen kanssa yhteensopivien pinnojen paksuuden
        (vaijerin paksuusluokituksen).
    spoke_interface_type:
      name: Pinnan liitäntätyyppi
      description: Ilmaisee pinnan pään tyypin, jota varten napa on suunniteltu (J-pinna,
        suora, T-pää).
    spoke_shape:
      name: Pinnan muoto
      description: Määrittää pinnavaijerin ulkoisen poikkileikkauksen, joka vaikuttaa
        aerodynamiikkaan ja estetiikkaan.
    spool_form_factor:
      name: Kerän muototekijä
      description: Puolan rungon tyyli ja langan pysyminen paikallaan (esim. laipallinen
        vs. kartio).
    spoon_style:
      name: Lusikkauistimen tyyli
      description: Ilmaisee lusikkauistimen toiminnallisen alatyypin tai tyylin, kuten
        heitto, lepatus tai uistelu.
    sports_bra_padding_type:
      name: Urheiluliivien toppauksen tyyppi
      description: Määrittää urheiluliivien toppauksen tyypin.
    sports_cap_style:
      name: Urheilulippalakin tyyli
      description: Määrittää lippalakin yleisen rakenteen/tyylin (esim. pesäpallolippis,
        suoralippainen) joukkuebrändeistä riippumatta.
    sports_governing_body_certification:
      name: Urheilun hallintoelimen sertifiointi
      description: Ilmaisee tunnustettujen urheilun hallintoelinten viralliset sertifikaatit
        tai hyväksynnät, jotka vahvistavat tuotteen täyttävän kilpailustandardit.
    sports_surface_compatibility:
      name: Pintojen yhteensopivuus urheilussa
      description: Listaa pelipaikka- tai pintatyypit, joille maalia voidaan turvallisesti
        levittää.
    sports_toy_set_contents:
      name: Urheilulelusetin sisältö
      description: Määrittää, mitä osia urheilulelusetti sisältää (esim. pallo, maila,
        verkko, maalitaulut).
    spray_string_cleanup_method:
      name: Serpentiinisprayn puhdistusmenetelmä
      description: Suositeltava tapa poistaa/puhdistaa serpentiinisprayn jäämät.
    spray_string_finish_effect:
      name: Serpentiinisprayn viimeistely/efekti
      description: Ruiskutetun serpentiinisprayn visuaalinen vaikutus levityksen jälkeen
        (kiilto/heijastavuus ja erikoistehosteet).
    spray_string_formulation_type:
      name: Serpentiinisprayn toimintatyyppi
      description: Miten tuote käyttäytyy suihkutuksen aikana ja sen jälkeen (esim.
        pestävä vs. pysyvä tyyli).
    spray_string_recommended_surface:
      name: Serpentiinisprayn suositeltava käyttöpinta
      description: Pintatyypit, joille serpentiinispray on tarkoitettu käytettäväksi
        (ja joilta se todennäköisesti puhdistetaan).
    spray_string_scent:
      name: Serpentiinisprayn tuoksu
      description: Sprayn tuoksu- tai hajuprofiili, jos sellainen on.
    spray_string_suitable_age_group:
      name: Serpentiinisprayn sopiva käyttäjäryhmä
      description: Turvallisen käytön suositeltu käyttäjän vähimmäisikä/ikäryhmä.
    spread_consistency:
      name: Levitteen koostumus
      description: Kuvaa dipin tai levitteen rakennetta/koostumusta ja ennakoi suutuntumaa
        ja käyttöä (esim. samettinen, paksu, vaahdotettu).
    spread_variety:
      name: Levitteen tyyppi
      description: Luokittelee tietyn hedelmälevitetyypin (esim. hillo, hyytelö, marmeladi,
        rahka), jotta ostaja voi erottaa eri valmistustavat ja koostumukset.
    spreader_bar_type:
      name: Levitystangon tyyppi
      description: Ilmaisee valjaiden mukana toimitetun tai niiden kanssa yhteensopivan
        trapetsikoukun tai koukkujärjestelmän tyypin.
    sprint_canoe_class:
      name: Ratamelontakanootin luokka
      description: Määrittää ratamelontakanootin virallisen kilpailuluokan.
    sprout_presentation:
      name: Itujen esillepano
      description: Määrittää tuotteen fyysisen esillepanon (esim. tuoreet idut, mikrovihreät,
        kasvatusruukku, jauhe).
    squash_and_gourd_variety:
      name: Kurpitsalajike
      description: Määrittää kurpitsan lajikkeen tai markkinamuodon, jolloin ostaja
        pystyy löytämään haluamansa tyypin nopeasti.
    stability_class:
      name: Vakausluokka
      description: Yleinen vakausluokitus, joka on johdettu lentoluokituksista tai
        markkinointiväitteistä.
    stabilizer_thread_size:
      name: Jousen vakaajan kierrekoko
      description: Kierremääritys, jota käytetään vakaajan tai lisävarusteen kiinnittämisessä
        jouseen tai varsijouseen.
    stabilizer_type:
      name: Vakaajan tyyppi
      description: Määrittää jousen tai varsijousen vakaajan tyylin tai asentoluokituksen.
    stages_supported:
      name: Tuetut vaiheet
      description: Ilmaisee, kuinka monessa vaiheessa raketti tai pakkaus on suunniteltu
        lentämään.
    stain_remover_format:
      name: Tahranpoistoaineen muoto
      description: Määrittää ajoneuvojen tahrojen käsittelyyn käytettävän tuotteen
        toimituksen/muodon (suihkepullo, aerosoli, vaahto, geeli, jauhe, pyyhkeet,
        kynä/tussi).
    stake_shape:
      name: Telttakepin muoto
      description: Määrittää telttakepin poikkileikkauksen tai mallin, joka vaikuttaa
        pitokykyyn eri maaperätyypeissä.
    stamp_block_features:
      name: Leimasinpalikan ominaisuudet
      description: Korostaa leimasinpalikoiden toiminnallisia ominaisuuksia, kuten
        mittaruudukko, kahva tai liukumaton pinta.
    stamp_block_type:
      name: Leimasinpalikan tyyppi
      description: Määrittää merkkien kiinnittämiseen käytettävän leimasinpalikan
        rakenteen/tyylin (esim. läpinäkyvä akryylipalikka, puupalikka tai kohdistuspalikka).
    stamp_set_pieces_included:
      name: Postimerkkisettiin sisältyvät osat
      description: Ilmaisee, mitkä osat sisältyvät leimasin- ja leimasintyynysarjaan
        (esim. leimasimet, mustetyynyt, tussit).
    stand_padding_material:
      name: Telineen pehmustemateriaali
      description: Kosketuspisteissä instrumentin pinnan suojaamiseksi käytetty materiaali
        (esim. vaahtomuovi, kumi, silikoni).
    staple_fiber_animal_fiber_type:
      name: Katkokuidun eläinkuidun tyyppi
      description: Eläinperäisen kuidun nimenomainen tyyppi, kun perustarvikkeen kuidun
        lähdetyyppi on eläinperäinen.
    staple_fiber_crimp_level:
      name: Katkokuidun kiharuusaste
      description: Kuidun luonnollisen kiharuuden/aaltoilun aste.
    staple_fiber_preparation_type:
      name: Katkokuidun valmistustyyppi
      description: Kuidun valmistus-/käsittelytila myyntihetkellä (kuinka kohdistettu/käsitelty),
        jolla on suuri vaikutus kehruumenetelmään, vedettävyyteen ja lopputulokseen.
    staple_fiber_source_type:
      name: Katkokuidun lähteen tyyppi
      description: Laaja kuitusisällön alkuperäluokka.
    starch_processing_type:
      name: Tärkkelyksen käsittelytyyppi
      description: Ilmaisee, onko tärkkelys natiivia vai onko sitä fysikaalisesti
        tai kemiallisesti muokattu (esim. pikatärkkelys, esigelatinoitu) tiettyjen
        toiminnallisten ominaisuuksien, kuten sakeutumisnopeuden tai lämmönkestävyyden,
        aikaansaamiseksi.
    starch_source:
      name: Tärkkelyksen lähde
      description: Määrittää kasvilähteen, josta ruoanlaittotärkkelys tai sakeuttamisaine
        on peräisin (esim. maissi, peruna, tapioka). Lähde on ruoanlaitossa käytettävän
        tärkkelysten ensisijainen erottava tekijä ja vaikuttaa suoraan reseptien soveltuvuuteen,
        allergeenien huomiointiin ja kuluttajien hakukäyttäytymiseen.
    starfruit_variety:
      name: Karambolalajike
      description: Määrittää karambolan lajikkeen tai muunnoksen (esim. Arkin, Fwang
        Tung).
    starter_drive_type:
      name: Starttimoottorin käyttölaitteen tyyppi
      description: Käynnistinmoottori/kytkentämekanismi, jolla hammaspyörän kytketään
        lautaspyörään.
    starter_pistol_action_type:
      name: Starttipistoolin toimintamekanismi
      description: Määrittää starttipistoolin laukaisu-/toimintamekanismin (esim.
        yksitoiminen, kaksitoiminen, puoliautomaattinen).
    starter_pistol_caliber:
      name: Starttipistoolin kaliiperi
      description: Määrittää starttipistoolin käyttämän paukkupatruunan tai patruunan
        kaliiperin.
    starter_terminal_type:
      name: Käynnistimen liittimen tyyppi
      description: Määrittää käynnistimen tai käynnistinsolenoidin sähköliitännöissä
        käytettävän liittimen/kytkennän tyypin (esim. kierrepinna, haarukkaliitin,
        pistoke).
    starting_block_anchoring_method:
      name: Lähtötelineiden kiinnitysmenetelmä
      description: Kuvaa, miten telineet kiinnitetään radan pintaan (esim. piikit,
        imukupit, kumityynyt).
    steerer_tube_design:
      name: Kaulaputken malli
      description: Kuvaa kaulaputken rakenteellisen mallin – suora, kapeneva, kierteellinen
        jne. – joka määrittää ohjainlaakerin ja rungon yhteensopivuuden.
    steering_cable_end_fitting_type:
      name: Ohjauskaapelin päätykappaleen kiinnitystyyppi
      description: Määrittää vesikulkuneuvon ohjausvaijerin päiden (ruorin puoleinen
        pää ja moottorin/peräsimen pää) kiinnitystavan, jotta varmistetaan yhteensopivuus
        ohjausruorin ja moottorin kiinnityspisteiden kanssa. Käytä standardin mukaista
        tai valmistajan nimikettä tarvittaessa.
    steering_column_adjustability_features:
      name: Ohjauspylvään säätöominaisuudet
      description: Ilmaisee, mitkä toiminnot ohjauspylvääseen on integroitu.
    steering_column_ignition_provision:
      name: Ohjauspylvään sytytysjärjestelmä
      description: Ilmaisee, onko ohjauspylväs suunniteltu siten, että siihen voidaan
        asentaa virtalukon sylinteri/kytkin ja/tai ohjauslukko.
    steering_column_shaft_end_interface_type:
      name: Ohjausakselin kiinnityspinnan tyyppi
      description: Määrittää ohjausakselin kiinnityspinnan tyypin (esim. uritettu,
        D-akseli, kiilaurallinen).
    steering_column_shift_type:
      name: Ohjauspylvään vaihteen tyyppi
      description: Määrittää, sisältääkö ohjauspylväs siihen asennetun vaihteensiirtomekanismin
        ja sen vaihteistotyypin.
    steering_component_drive_type:
      name: Ohjauskomponentin käyttötyyppi
      description: Määrittää ohjauskomponentteihin (erityisesti pumppuihin ja EPS-järjestelmiin)
        liittyvän käyttö-/avustinmekanismin.
    steering_position:
      name: Ohjauspuoli
      description: Määrittää, onko pakettiautossa vasemman- vai oikeampuolinen ohjaus.
    steering_pump_pulley_type:
      name: Ohjauspumpun hihnapyörän tyyppi
      description: Määrittää ohjauspumpun kanssa käytettävän hihnapyörän käyttötyypin/liitännän.
    steering_rack_finish_coating:
      name: Hammastangon viimeistely/pinnoite
      description: Määrittää ulkopinnan korroosiosuojauksen/pinnoitteen.
    steering_rack_position:
      name: Ohjaustelineen asento
      description: Määrittää, mihin hammastanko on asennettu /missä sitä käytetään
        ajoneuvon ohjausjärjestelmässä.
    steering_wheel_cover_installation_type:
      name: Ohjauspyörän suojuksen asennustyyppi
      description: Miten ohjauspyörän suojus asennetaan/kiinnitetään ohjauspyörään.
    steering_wheel_grip_material:
      name: Ohjauspyörän otepinnan materiaali
      description: Määrittää ohjauspyörän kehän/otepinnan (kohta, johon kädet koskettavat)
        materiaalin, joka voi poiketa ohjauspyörän muiden osien materiaalista.
    steering_wheel_mounting_pattern:
      name: Ohjauspyörän kiinnityskuvio
      description: Määrittää pultti-/reikäkiinnityskuvion, jota käytetään ohjauspyörän
        kiinnittämiseen napaan tai sovittimeen (esim. 3 pulttia, 5 pulttia).
    steering_wheel_rim_material_grip_surface:
      name: Ohjauspyörän kehän materiaali (otepinta)
      description: Määrittää ensisijaisen otepinnan/kehäpäällysteen materiaalin (erilainen
        kuin muu valmistusmateriaali).
    stem_material:
      name: Varren materiaali
      description: Määrittää piipun varren tai suukappaleen materiaalin (esim. akryyli,
        eboniitti, akryylilasi).
    stencil_machine_consumable_type:
      name: Sapluunakoneen kulutustarviketyyppi
      description: Määrittää käytön edellyttämät kulutustarvikkeet (jos sellaisia
        on).
    step_surface_texture:
      name: Askelman pintatekstuuri
      description: Määrittää askelman kulutuspinnan tai pinnan rakenteen/materiaalin,
        jonka tarkoituksena on parantaa pitoa ja mukavuutta märällä kelillä.
    stepper_motion_type:
      name: Stepperin liikkeen tyyppi
      description: Määrittää koneen tuottaman pääasiallisen liikkeen.
    stick_bow_profile:
      name: Mailan kaarevuus
      description: Määrittää maahockeymailan varren kaarevuusprofiilin (tai taivutuksen),
        joka on kriittinen pallonhallintaan, drag-flick-tekniikan tehokkuuteen ja
        pelityyliin vaikuttava tekijä.
    stick_construction:
      name: Mailan rakenne
      description: Määrittää mailan rakenteen, kuten yksiosainen komposiitti, kaksiosainen
        komposiitti tai puu.
    stick_curvature_type:
      name: Putken kaarevuustyyppi
      description: Kuvaa syöttiputken kaarevuusprofiilia, joka vaikuttaa heittomatkaan
        ja -tarkkuuteen.
    stick_head_shape:
      name: Mailanpään muoto
      description: Määrittelee mailanpään muodon, joka vaikuttaa syöttämiseen, lyöntityyliin
        ja lähietäisyydeltä tapahtuvaan pallonhallintaan.
    stick_size_compatibility:
      name: Mailan koon yhteensopivuus
      description: Määrittää mailan kokoryhmän, jonka kanssa tuote on yhteensopiva
        (esim. Youth, Junior, Intermediate, Senior, Goalie, Universal).
    sticker_decal_features:
      name: Tarran ominaisuudet
      description: Tallentaa tarroille ominaiset käyttö- ja toimintaominaisuudet (esim.
        kuplaton, uudelleensijoitettava).
    sticker_finish:
      name: Tarran viimeistely
      description: Kuvaa tarrojen pintakäsittelyä/visuaalista efektiä.
    sticker_format:
      name: Tarran muoto
      description: Määrittää koristetarrojen jälleenmyyntimuodon (esim. arkki, rulla,
        yksittäinen, kirja).
    sticker_material_type:
      name: Tarran materiaalityyppi
      description: Määrittää koristetarran ensisijaisen alustan/materiaalin (ei koristeita).
    stilt_foot_attachment_type:
      name: Puujalan jalkakiinnityksen tyyppi
      description: Määrittää, miten käyttäjän jalka kiinnitetään puujalkaan (esim.
        solkikiinnitys, tarranauha, nauhakiinnitys).
    stirrup_style:
      name: Jalustintyyli
      description: Luokittelee jalustimien malli- tai lajikohtaiset tyylit, mukaan
        lukien turvallisuutta, lajia ja rakennetta koskevat versiot.
    stirrup_tread_material:
      name: Jalustimen kulutuspinnan materiaali
      description: Määrittää jalustimen jalustinkumin tai astinpinnan materiaalin,
        joka vaikuttaa pitoon, mukavuuteen ja kulumiseen.
    stitch_marker_and_counter_style:
      name: Silmukkamerkki ja laskurityyli
      description: Määrittää silmukkamerkin tai silmukka-/kerroslaskurin tyylin tai
        muodon (esim. lukitusmerkki, avattava rengasmerkki, rengaslaskuri, digitaalinen
        laskuri.
    stitch_types:
      name: Ommeltyypit
      description: Koneen tuottamat ommeltyypit (toiminnalliset ja koristeelliset).
    stitching_method:
      name: Ompeleminen
      description: Osoittaa, miten pallokaistaleet on liitetty toisiinsa.
    stitching_state:
      name: Ompelutila
      description: Ilmaisee, toimitetaanko vaatekappaleet ompelemattomina, puoliommeltuina,
        ommeltuina vai käyttövalmiina.
    stock_car_race_series:
      name: Vakioautojen kilpailusarja
      description: Määrittää hyväksyntäelimen tai kilpailusarjan/luokan, jossa vakioauto
        kilpailee.
    stone_adhesion:
      name: Kiven irtoaminen
      description: 'Ilmaisee, miten persikan tai nektariinin kivi irtoaa hedelmälihasta:
        onko hedelmä kivetön, kiinteäkivinen vai välimuotoinen.'
    stone_creation_method:
      name: Kiven luontimenetelmä
      description: Määrittää, onko kivi luonnonkivi, synteettinen, simulantti vai
        kierrätetty.
    stone_cut_grade:
      name: Kiven hiontaluokka
      description: Ilmaisee kiven hionnan yleisen laadun arvioinnin.
    stone_cut_style:
      name: Kiven leikkaustyyli
      description: Lasikiven hionnan/fasetoinnin tyyli (esim. fasetoitu vs pyöröhiottu).
    stone_fruit_cultivar:
      name: Kivihedelmälajike
      description: Määrittää persikan tai nektariinin tietyn lajikkeen/muunnoksen.
    stone_fruit_variety:
      name: Kivihedelmämuunnos
      description: Erottaa alatyypin kategorian sisällä (esim. persikka, nektariini,
        lattapersikka).
    stone_setting_type:
      name: Kiven kiinnitystyyppi
      description: Määrittää, miten kivi on kiinnitetty työhön (kehys, piikki, pavé
        jne.).
    stone_transparency:
