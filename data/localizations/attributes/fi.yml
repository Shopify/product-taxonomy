    dumbbell_style:
      name: Käsipainotyyppi
      description: Määrittää käsipainon perusrakenteen – onko kyseessä kiinteä malli,
        säädettävä järjestelmä vai painotettavat kahvat – mikä vaikuttaa merkittävästi
        ostopäätöksiin ja harjoittelukäyttötarkoituksiin.
    dundun_playing_position:
      name: Dundunin soittoasento
      description: Rummun soitto-/kantoasento.
    dye_status:
      name: Värjäys
      description: Ilmaisee, onko karstattu kuitu värjätty, värjäämätön/luonnollinen
        vai sisältääkö se useita värejä/sekoituksia.
    dye_style:
      name: Värjäystyyli
      description: Määrittää, onko lanka yksivärinen, kirjava vai muuten erikoisvärjätty.
    dye_technique:
      name: Värjäystekniikka
      description: Tämä on kuidun värjäysmenetelmä (esim. käsinvärjäys, kattilavärjäys,
        liukuvärjäys).
    dye_type_needlecraft_fabric:
      name: Värjäystyyppi (kirjontakankaat)
      description: Ilmaisee, onko pellavakangas yksiväristä, käsinvärjättyä vai erikoisvärjättyä.
    dyeing_color_processing:
      name: Värjäys/värikäsittely
      description: Kuvailee, onko kuitu värjätty ja miten (esim. värjäämätön, valkaistu/valkoinen
        vai tietyillä värjäystekniikoilla).
    e_bike_certification_class:
      name: Sähköpyörän sertifiointiluokka
      description: Määrittää sähköpyörän renkaan virallisen nopeusluokituksen (esimerkiksi
        E-25, E-50).
    e_bike_speed_rating:
      name: Sähköpyörän nopeusluokitus
      description: Ilmoittaa renkaan virallisen sähköpyöräsertifiointitason (esimerkiksi
        E25 nopeudelle ≤25 km/h, E50 nopeudelle ≤50 km/h).
    e_scooter_connector_type:
      name: Sähköpotkulaudan liitintyyppi
      description: Yksilöi sähköliittimen tai pistokkeen tyypin, jota komponentti
        käyttää virta- tai signaalikytkentöihin.
    e_scooter_throttle_type:
      name: Sähköpotkulaudan kaasukahvatyyppi
      description: Määrittää sähköpotkulaudan kiihdyttämiseen käytetyn kaasukahvatyypin.
    ear_coverage:
      name: Korvasuojat
      description: Määrittää, sisältääkö kypärä korvasuojat ja ovatko ne irrotettavat.
    ear_coverage_style:
      name: Korvapeitteen tyyli
      description: Kuvaa, miten kärpäshuppu peittää korvat tai peittääkö se korvat.
    ear_coverage_type:
      name: Korvasuojatyyppi
      description: Määrittää, miten huppu peittää tai suojaa korvat, mukaan lukien
        mahdolliset korvaläpät ja niiden tyyli.
    ear_guard_type:
      name: Korvasuojusten tyyppi
      description: Kuvaa päähineeseen integroidun kuulonsuojauksen tyypin, kuten kova
        muovisuoja, pehmustettu suoja tai irrotettavat suojat.
    earmuff_style:
      name: Korvalappujen tyyli
      description: Yksilöi korviensuojaimen käytön tai rakenteen (esim. pään yli tai
        pään taakse kierrettävä).
    earring_closure_type:
      name: Korvakorun korvaan kiinnittämisen tyyppi
      description: Määrittää korvakorun kiinnitysmekanismin (esimerkiksi perhoslukko,
        vipulukko, klipsi).
    easel_art_desk_features:
      name: Maalaustelineen ja taidepöydän ominaisuudet
      description: Korostaa maalaustelineen tai taidepöydän yleisiä toiminnallisia
        ominaisuuksia.
    easel_art_desk_surface_type:
      name: Maalaustelineen ja taidepöydän pintatyyppi
      description: Ilmaisee käytettävän piirustus- tai kirjoituspinnan (esimerkiksi
        liitutaulu, valkotaulu, paperirulla, magneettitaulu).
    eb_clarinet_body_type:
      name: Eb-klarinetin rungon tyyppi
      description: Määrittää, onko Es-klarinetti sopraano- vai alttoversio.
    eco_material_type:
      name: Ekologisen materiaalin tyyppi
      description: Ilmaisee, onko pädissä käytetty ympäristöystävällistä vaahtomuovia
        tai materiaaliteknologiaa.
    edge_construction:
      name: Reunan rakenne
      description: Ilmaisee, onko suksessa metallireuna koko pituudeltaan, osittain
        vai ei lainkaan.
    edge_tuner_type:
      name: Kanttiteroitintyyppi
      description: Luokittelee suksien tai lumilautojen kanttiteroittimen tyypin,
        kuten viilanohjain tai sähkökäyttöinen kone.
    edible_plant_part:
      name: Syötävä kasvinosa
      description: Ilmaisee, mikä osa kasvista myydään syötäväksi.
    educational_guide_included:
      name: Mukana tuleva koulutusopas
      description: Osoittaa, mitä oppimateriaaleja malliin sisältyy.
    educational_topic:
      name: Oppimissisältö
      description: Muurahaisterraarion opetusmateriaalin ensisijainen oppimissisältö.
    egg_component:
      name: Munan osa
      description: Yksilöi, minkä osan kananmunasta tuote sisältää, kuten koko muna,
        pelkkä valkuainen, keltuainen tai sekoitukset/korvikkeet.
    egg_component_replaced:
      name: Korvattava munan osa
      description: Ilmaisee, minkä osan kananmunasta tuote on tarkoitettu korvaamaan
        (esimerkiksi kokonainen kananmuna, kananmunanvalkuainen).
    egg_enrichment:
      name: Munan rikastaminen
      description: Ilmaisee muniin lisättyjä ravintolisiä, esimerkiksi omega-3-rasvahappoja
        tai D-vitamiinia.
    egg_farming_method:
      name: Munantuotantotapa
      description: Ilmaisee munien tuotanto- tai kasvatusmenetelmän (esimerkiksi häkitön,
        vapaana pidetty, luomu).
    egg_grade:
      name: Munan laatuluokka
      description: Ilmaisee sääntelyelinten tai alan toimijoiden määrittämän laatuluokan.
    egg_processing_state:
      name: Munien käsittelytila
      description: Ilmaisee munien käsittelytavan ennen myymistä (esimerkiksi tuore,
        suolattu, säilötty).
    egg_production_method:
      name: Munantuotantomenetelmä
      description: Määrittää munien tuotannossa käytetyn viljely- tai kasvatusjärjestelmän
        (esim. lattiakanala, ulkokanala, luomukanala).
    egg_replacer_main_ingredient:
      name: Munankorvikkeen pääraaka-aine
      description: Ilmaisee munanvastikkeen valmistuksessa käytetyn pääraaka-aineen,
        mikä auttaa käyttäjiä ruokavaliotarpeiden tai haluttujen leivontaominaisuuksien
        huomioimisessa.
    egg_size:
      name: Munan koko
      description: Luokittelee munat tavanomaisten kokoluokitusten mukaisesit.
    egg_source_animal:
      name: Munan alkuperäeläin
      description: Määrittää munat tuottaneen eläinlajin.
    egg_white_processing_method:
      name: Munanvalkuaisen käsittelymenetelmä
      description: Ilmaisee, miten munanvalkuaiset on käsitelty erottelun jälkeen
        (esim. pastöroitu, sumutekuivattu), mikä vaikuttaa elintarviketurvallisuuteen,
        säilyvyyteen ja käyttötarkoituksiin.
    eggplant_variety:
      name: Munakoisolajike
      description: Määrittää munakoisolajikkeen tai -viljelylajikkeen, jotta ostaja
        voi valita tyyppejä, jotka eroavat toisistaan koon, maun, värin ja käyttötarkoituksen
        suhteen.
    eggshell_color:
      name: Munankuoren väri
      description: Määrittää munien vallitsevan kuorivärin.
    elastic_edge_finish_type:
      name: Joustava reunan viimeistely/tyyppi
      description: Määrittää kudotun kuminauhan reunarakenteen, joka vaikuttaa mukavuuteen
        ja käyttötarkoitukseen.
    elastic_intended_use:
      name: Kuminauhan käyttötarkoitus
      description: Kuminauhan ensisijainen käyttösovellus (auttaa löytämisessä ja
        vähentää yhteensopivuusvirheitä).
    elastic_recovery_performance:
      name: Kuminauhan palautumistehokkuus
      description: Kuvaa sitä, kuinka hyvin kudottu kuminauha palautuu alkuperäiseen
        pituuteensa venytyksen jälkeen.
    elastic_recovery_quality:
      name: Kuminauhan palautumislaatu
      description: Ilmaisee kuminauhan nauhan venymän palautumisen eli kuinka hyvin
        se palautuu alkuperäiseen pituuteensa venytyksen jälkeen.
    elastic_stretch_level:
      name: Kuminauhan venytystaso
      description: Ilmaisee sitä, kuinka paljon kuminauha voi venyä jännitettynä (ilmaistaan
        usein suhteellisina tasoina, kun tarkkaa prosenttiosuutta ei ilmoiteta).
    elastic_structure:
      name: Kuminauhan rakenne
      description: Määrittää napinläpikuminauhan rakenteellisen rakenteen (esimerkiksi
        neulottu, kudottu, punottu), mikä voi vaikuttaa venyvyyteen, palautumiseen
        ja ommeltavuuteen.
    elastic_type:
      name: Kuminauhan tyyppi
      description: Määrittää kuminauhan rakennetyypin (esimerkiksi taitettava kuminauha
        (FOE), punottu, neulottu, kudottu).
    electric_assist_type:
      name: Polkupyörän sähköavustustyyppi
      description: Ilmaisee pyörän mahdollisen moottoriavustusten ja sen tavan.
    electric_bicycle_motor_position:
      name: Sähköpyörän moottorin sijainti
      description: Sähköavusteisen polkupyörän moottorin sijainti, kuten keskiömoottori,
        etumoottori, takamoottori tai kaksoismoottori.
    electric_bike_class:
      name: Sähköpyöräluokka
      description: Tämä ilmaisee sähköpyörän luokituksen, mikä määrittää nopeusrajoituksen
        ja nopeusavustuksen.
    electric_guitar_bridge_type:
      name: Sähkökitaran tallatyyppi
      description: Määrittää sähkökitaran talla- ja vibrajärjestelmän tyypin.
    electric_instrument_output_connection_type:
      name: Sähköisen soittimen lähtöliitäntätyyppi
      description: Määrittää sähkösellon fyysiset äänilähtöliitännät.
    electric_riding_vehicle_control_options:
      name: Sähköisen ajettavan lelun ohjausvaihtoehdot
      description: Määrittää kuljettajan/vanhemman käytettävissä olevat ohjaus-/käyttövaihtoehdot
        (esimerkiksi poljin, ohjauspyörä, kauko-ohjaus).
    electric_spinning_wheel_speed_control_type:
      name: Sähköisen rukin nopeuden säätötyyppi
      description: Kuvaa sitä, miten käyttäjä säätää sähköisen rukin pyörimisnopeutta.
    electric_ukulele_output_jack_type:
      name: Sähköukulelen lähtöliitintyyppi
      description: Määrittää sähköukulelen käyttämän fyysisen lähtöliitännän.
    electric_van_body_length_class:
      name: Sähkökäyttöisen pakettiauton rungon pituusluokka
      description: Yleinen akseliväliin/pituuteen perustuva pakettiautojen kokoluokka,
        jota käytetään listauksissa.
    electric_van_roof_height_class:
      name: Sähköpakettiauton katon korkeusluokka
      description: Pakettiautojen (erityisesti kuormapakettiautojen) yleinen kattokorkeusluokitus.
    electric_vehicle_drivetrain_layout:
      name: Sähköajoneuvon voimansiirtorakenne
      description: Moottori- ja akselikokoonpano, joka kuvaa moottoreiden lukumäärän
        ja sijainnin (pelkän nelivedon, takavedon tai etuvedon sijasta).
    electric_winder_accessories_included:
      name: Sähköisen puolaimen mukana toimitettavat lisävarusteet
      description: Luettelee sähköisen puolaimenn mukana toimitettavat lisävarusteet
        (esimerkiksi puristimet, adapterit).
    electrical_connector_type:
      name: Sähköliittimen tyyppi
      description: Määrittää oven lukon tai lukitusjärjestelmän sähköiseen integrointiin
        käytettävän liitintyypin (jos sovellettavissa).
    electrical_system_voltage:
      name: Sähköjärjestelmän jännite
      description: Ilmaisee ajoneuvon sähköjärjestelmän nimellisjännitteen, jolle
        säädin on suunniteltu.
    electronic_cymbal_trigger_zones:
      name: Elektronisen symbaalin liipaisinalueet
      description: Määrittää, kuinka monta itsenäistä liipaisualuetta symbaalipadi
        tarjoaa (esim. pinta/reuna/kupu).
    electronic_drum_module_audio_interface_functionality:
      name: Elektronisen rumpumoduulin ääniliitännän toiminta
      description: Ilmaisee, voiko moduuli toimia USB-ääniliitäntänä tallennusta/toistoa
        varten (MIDI:n lisäksi).
    electronic_drum_module_metronome_features:
      name: Elektronisen rumpumoduulin metronomiominaisuudet
      description: Määrittää moduulin harjoittelu- ja metronomiominaisuudet.
    electronic_drum_module_power_source:
      name: Elektronisen rumpumoduulin virtalähde
      description: Määrittää hallintamoduulin vaaditun tai tuetun virtalähteen.
    electronic_drum_module_sample_import_support:
      name: Elektronisen rumpumoduulin näytteiden tuontituki
      description: Ilmaisee, voiko moduuli tuoda käyttäjien sampleja ja miten.
    electronic_drum_pad_playing_surface_type:
      name: Elektronisen rumpupadin soittopinnan tyyppi
      description: Kuvailee tom-padin soittopinnan rakenteen (esim. verkkokalvo vs.
        kumi), mikä vaikuttaa kimmoisuuteen, äänekkyyteen ja tuntumaan.
    electronic_features:
      name: Elektroniset ominaisuudet
      description: Ilmaisee leikkipankkituotteeseen sisältyvät sähköiset/vuorovaikutteiset
        ominaisuudet (jos sellaisia on).
    electronic_lights_and_sound:
      name: Elektroniset valot ja äänet
      description: Ilmaisee, sisältääkö nukkekotileikkisetti elektronisia valoja ja/tai
        ääniominaisuuksia (esim. valot, ovikello, musiikki, äänitehosteet).
    electronics_power_source:
      name: Elektroniikan virtalähde
      description: Määrittää, miten käytetty elektroniikka saa virtansa (jos sovellettavissa).
    eligible_race_series:
      name: Kilpailukelpoinen kilpasarja
      description: Kilpailusarja tai järjestäjä, jossa auto on kilpailukelpoinen.
    elliptical_trainer_part_type:
      name: Crosstrainerin osatyyppi
      description: Luokittelee elliptisen kuntolaitteen lisävarusteen tai varaosan
        tyypin (esim. hihna, konsoli, poljin), jotta ostajat voivat suodattaa tarvitsemansa
        tuotteen nopeasti ilman, että heidän tarvitsee selata useita alaluokkia.
    embellishment_technique:
      name: Koristelutekniikka
      description: Kuvaa vaatteeseen tehtyjä tärkeimpiä koriste- tai pintakäsittelyjä,
        kuten kirjontaa, painatusta tai helmikoristelua.
    embellishment_type:
      name: Koristetyyppi
      description: Tunnistaa sukkanauhaan lisätyn koristeen tyypin, kuten pitsin,
        rusetit tai helmet.
    embossing_pen_ink_color:
      name: Kohokuviointikynän musteen väri
      description: Määrittää kohokuviointikynän levittämän musteen värin (voi olla
        väritön/tahmea tai pigmentoitu). Eri kuin kynän/rungon väri.
    embossing_stylus_tip_shape:
      name: Kohokuviointikynän kärjen muoto
      description: Kuvaa erilaisten tehosteiden luomiseen käytetyn kohokuviointikynän
        kärjen geometriaa (esimerkiksi pallo vs. terävä).
    embroidered_coverage_level:
      name: Kirjonnan kattavuus
      description: Kirjailun suhteellinen peitto merkin pinnalla.
    embroidered_patch_backing_type:
      name: Kirjailumerkin taustamateriaali
      description: Kirjotun paikan kääntöpuolella oleva tukikerros, joka vaikuttaa
        kestävyyteen ja kiinnitystapaan.
    embroidery_hoop_type:
      name: Kirjontarenkaan tyyppi
      description: Määrittää kirjontarenkaan rakennetyypin ja sen ensisijaisen kiristysmekanismin.
    embroidery_machine_bobbin_type:
      name: Kirjontaompelukoneen puolatyyppi
      description: Puolajärjestelmän tyyppi/lataustapa.
    emergency_lighting_configuration:
      name: Hätävalaistuskokoonpano
      description: Määrittää ajoneuvoon ensisijaisesti asennetun hätävalaistuksen
        kokoonpanon (esimerkiksi kattovalopalkki, etusäleikkö).
    emergency_lighting_package:
      name: Hätävalaistuspaketti
      description: Määrittää asennettujen hätävilkkujen tyypit.
    emissions_compliance_standard:
      name: Päästöjen vaatimustenmukaisuusstandardi
      description: Ilmaisee moottorin päästösertifikaatin/vaatimustenmukaisuuden soveltuvin
        osin.
    emissions_standard:
      name: Päästöstandardi
      description: Tämä ilmaisee ajoneuvon päästöstandardin (vaihtelee alueen ja vuoden
        mukaan).
    enclosure_panel_configuration:
      name: Kotelopaneelin kokoonpano
      description: Määrittää, mitkä seinät tai sivut sisältyvät (suojakokoonpano),
        esimerkiksi täydet seinät, vain sivuverhot tai kolmisivuinen (avoin edestä/takaa).
    enclosure_window_material:
      name: Sivuseinien ikkunamateriaali
      description: Ilmaisee sivuseinien läpinäkyvien ikkunapaneelien materiaalin.
    end_fitting_type:
      name: Päätyliittimen tyyppi
      description: Jousituksen kummassakin päissä (ajoneuvon puolella ja kannen puolella)
        käytetty liitintyyppi, joka määrittää kiinnityksen yhteensopivuuden.
    end_type:
      name: Päätytyyppi
      description: Määrittää vetoliinan päiden kiinnitystavan tai liitäntätyylin,
        jolla liina kytketään vetokohtiin.
    ends_style_blocking_wires:
      name: Päätyyli (pingotuslangat)
      description: Määrittää, miten pingotuslangan päät on viimeistelty turvallisuuden
        takaamisen ja pitsin reunoihin pujottamisen helpottamiseksi.
    enduro_bike_suspension_adjustability:
      name: Enduropyörän jousituksen säätö
      description: Ilmaisee käytettävissä olevat jousituksen säädöt (yleensä etuhaarukalle
        ja takaiskunvaimentimelle).
    engine_bay_mounting_location:
      name: Kiinnityskohta moottoritilassa
      description: Ylivuotosäiliön aiottu asennuspaikka moottoritilassa (suhteellinen
        paikka).
    engine_bearing_coating:
      name: Moottorin laakerin pinnoite
      description: Määrittää laakerin pintakäsittelyn (liittyy kulumiskestävyyteen,
        upotettavuuteen tai kitkan vähentämiseen).
    engine_bearing_position:
      name: Moottorin laakerin sijainti
      description: Määrittää moottoriin kuuluvan laakerin sijainnin/toiminnon.
    engine_bearing_size:
      name: Moottorin laakerin koko
      description: Määrittää, onko laakeri vakiokokoinen vai ali-/ylikokoinen versio
        (liittyy yleensä kampiakselin hiontaan ja välykseen).
    engine_configuration:
      name: Moottorikokoonpano
      description: Kuvailee moottorin sylinterien asettelun/konfiguraation (esim.
        rivimoottori, V-moottori, bokserimoottori).
    engine_cooling_type:
      name: Moottorin jäähdytystyyppi
      description: Määrittää moottorin jäähdytysmenetelmän.
    engine_degreaser_form:
      name: Moottorin rasvanpoistoaineen fyysinen olomuoto
      description: Moottorin rasvanpoistoaineen fyysinen olomuoto/toimitusmuoto.
    engine_degreaser_rinse_requirement:
      name: Moottorinpesuaineen huuhteluvaatimus
      description: Ilmaisee, onko rasvanpoistoaine tarkoitettu huuhdeltavaksi vedellä
        käytön jälkeen.
    engine_mount_type:
      name: Moottorin kiinnikkeen tyyppi
      description: Määrittää moottorin kiinnikkeen toiminnallisen rakenteen (esimerkiksi
        hydraulinen, umpinainen, vääntömomenttituki).
    engine_oil_formulation:
      name: Moottoriöljyn koostumus
      description: Ilmaisee moottoriöljyn käyttötarkoituksen (esimerkiksi tavalliseen
        käyttöön, korkean ajokilometrimäärän olosuhteisiin, pidennettyihin öljynvaihtoväleihin
        tai kalusto- tai raskaskalustokäyttö).
    engine_oil_specification:
      name: Moottoriöljyn määritys
      description: Määritelmä/standardi, jonka öljy täyttää (esimerkiksi API SP, API
        SN Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Moottorin korjaussarjan sisältö
      description: Määrittää moottorin korjaussarjaan sisältyvät tärkeimmät komponentit.
    engine_rotation_direction:
      name: Moottorin pyörimissuunta
      description: Määrittää merenkulussa käytettävän moottorin pyörimissuunnan.
    engine_timing_system_drive_type:
      name: Moottorin ajoitusjärjestelmän tyyppi
      description: Ilmaisee, onko moottorin jakojärjestelmä hihnakäyttöinen, ketjukäyttöinen
        vai hammaspyöräkäyttöinen yhteensopivuuden varmistamiseksi.
    engine_valve_coating:
      name: Moottorin venttiilin pinnoite
      description: Määrittää venttiiliin kulutuksen- tai lämmönkestävyyden parantamiseksi
        tehdyt pintakäsittelyt tai siinä käytetyt pinnoitteet.
    engine_valve_position:
      name: Moottorin venttiilien sijainti
      description: Määrittää, onko moottorin venttiili tarkoitettu moottorin imupuolelle
        vai pakopuolelle.
    engine_valve_stem_tip_type:
      name: Moottorin venttiilin varren pään tyyppi
      description: Määrittää venttiilin varren pään tyypin tai rakenteen kohdassa,
        jossa se koskettaa keinuvipua tai säätölaitetta.
    engine_valvetrain_type:
      name: Moottorin venttiilikoneiston tyyppi
      description: Tämä määrittää venttiilikoneiston/nokka-akselin rakenteen.
    enhancement_level:
      name: Kohotustaso
      description: 'Toppauksen aikaansaama arvioitu toppaus kuppikokoina ilmaistuna:
        hienovarainen (enintään yksi kuppikoko), kohtalainen (yhdestä kahteen kuppikokoa),
        merkittävä (yli kaksi kuppikokoa).'
    entry_zipper_location:
      name: Vetoketjun sijainti
      description: Määrittää, missä puvun ensisijainen vetoketju tai aukko sijaitsee
        (esimerkiksi edessä, takana, olkapäällä, vinottain).
    epee_point_type:
      name: Kalpakärjen tyyppi
      description: Määrittää kalpaan asennetun kärjen valmistajan tai standardin,
        mikä vaikuttaa yhteensopivuuteen ja huoltoon.
    equestrian_discipline:
      name: Ratsastuslaji
      description: Määrittää ratsastuslajin, johon kannus on tarkoitettu tai sopivin.
    equestrian_helmet_safety_certification:
      name: Ratsastuskypärän turvallisuussertifiointi
      description: Määrittää turvallisuusstandardit tai sertifioinnit, joiden mukainen
        kypärä on.
    equine_application_area:
      name: Hevosen käyttöalue
      description: Määrittää kehonosan tai materiaalin, jolle tuote on tarkoitettu
        (esim. kavio, harja, varusteet).
    equipment_contact_material_brew_wine:
      name: Laitteiden kosketusmateriaali (panimo/viininvalmistus)
      description: Nesteen kanssa kosketuksissa olevan tuotteen ensisijainen materiaali
        (esimerkiksi lasi, ruostumaton teräs, muovi).
    eu_children_clothing_size:
      name: Lasten vaatteiden EU-koko
      description: Määrittää lasten vaatteiden EU-koon pituuden mukaan, esimerkiksi
        104 tai 140.
    eu_clothing_size:
      name: Vaatteen EU-koko
      description: Määrittää EU-kokoluokan, kuten 38 tai 46
    eu_cup_size:
      name: EU-kuppikoko
      description: Määrittää rintaliivien EU-kuppikokomerkinnän, esimerkiksi C tai
        E.
    eu_ring_size:
      name: Sormuksen EU-koko
      description: Määrittää sormuksen EU-koon ympärysmitan mukaan, esimerkiksi 52
        tai 63
    eu_shoe_size:
      name: EU-kengännumero
      description: Määrittää EU-kengännumeron, esimerkiksi 42 tai 42 leveä
    euphonium_included_accessories:
      name: Eufoniumin mukana tulevat lisävarusteet
      description: Luettelee baritonitorven mukana yleisesti toimitettavat lisävarusteet
        (esimerkiksi suukappale, kotelo).
    euphonium_valve_configuration:
      name: Baritonitorven venttiilit
      description: Määrittää venttiilien määrän ja sen, käytetäänkö neljättä venttiiliä
        käsin vai sivutoimisella mekanismilla.
    european_sword_historical_period:
      name: Eurooppalaisen miekan historiallinen ajanjakso
      description: Ensisijainen historiallinen ajanjakso, johon miekkamalli/kopio
        perustuu (tai alkuperäisen aikakausi).
    european_sword_pattern_type:
      name: Eurooppalaisen miekan malli/tyyppi
      description: Keräilymiekan edustama erityinen eurooppalainen miekkamalli/tyyppi
        (typologia).
    ev_connector_adapter_direction:
      name: EV-liittimen/sovittimen suunta
      description: Määrittää, mistä ja mihin sovitin muuntaa (ajoneuvon tulopuoli
        vs. laturin/kaapelin puoli), mikä mahdollistaa tarkan yhteensopivuussuodatuksen.
    ev_conversion_kit_completeness_level:
      name: Sähköajoneuvon muunnossarjan taso
      description: Ilmaisee, onko tuote kokonainen muunnossarja vai osittainen sarja/paketti
        (esim. pelkkä moottori ja säädin).
    ev_conversion_kit_drivetrain_configuration:
      name: Sähköajoneuvon muunnossarjan voimansiirto
      description: Määrittää sähköauton muunnossarjan voimansiirron arkkitehtuurin,
        mukaan lukien moottorin sijoittelun/vetotavan ja sen, säilytetäänkö alkuperäinen
        vaihteisto.
    ev_conversion_kit_voltage_class:
      name: Sähköajoneuvon muunnossarjan jännite
      description: Nimellinen järjestelmäjänniteluokka, jolle sähköauton muunnossarja
        on suunniteltu. Tämän avulla voit suodattaa tuloksia yleisten järjestelmäjänniteluokkien
        mukaan tarkkojen jännitemittaustulosten lisäksi.
    evaporator_core_type:
      name: Höyrystimen kennon tyyppi
      description: Määrittää autojen ilmastointilaitteen höyrystimen rakenteen.
    evenweave_fabric_finish_treatment:
      name: Tasakudoksisen kankaan viimeistely/käsittely
      description: Ilmaisee kankaan esikäsittelyn tai viimeistelyn, joka vaikuttaa
        käsittelyyn tai ulkonäköön.
    evenweave_fabric_package_format:
      name: Tasakudoksisen kankaan myyntimuoto
      description: Kankaan myyntitapa (valmiiksi leikattu pala vai jatkuva metritavara).
    exercise_bike_accessory_part_type:
      name: Kuntopyörän lisävaruste- tai osatyyppi
      description: Kuvaa tuotteen ensisijaista toimintaa tai osatyyppiä (esimerkiksi
        poljin, vetohihna, pulloteline, näytön suojus, poljinvarsi).
    exercise_bike_cushion_component:
      name: Kuntopyörän pehmusteosa
      description: Määrittää toimitetun istuimeen liittyvän osan, esimerkiksi istuintyyny,
        satula tai istuinsuoja.
    exercise_bike_metrics_tracked:
      name: Kuntopyörän seuraamat mittarit
      description: Luettelee harjoitustietokentät, joita tietokone voi mitata ja näyttää
        reaaliaikaisesti.
    exercise_mat_accessories_included:
      name: Jumppamattoon sisältyvät lisävarusteet
      description: Luettelee maton mukana toimitettavat lisäkomponentit, kuten hihnat
        tai polvisuojat.
    exhaust_cooling_type:
      name: Pakokaasujen jäähdytystyyppi
      description: Ilmaisee, onko pakokaasukomponentti tarkoitettu märkäpakokaasujärjestelmään
        (vesijäähdytteinen/vesiruiskutusjärjestelmä) vai kuivapakokaasujärjestelmään.
    exhaust_installation_position:
      name: Pakoputken asennusasento
      description: Osoittaa, mihin ajoneuvossa osa asennetaan.
    exhaust_outlet_configuration:
      name: Pakoputkikokoonpano
      description: Määrittää pakoputken ulostulon ajoneuvon takaosassa.
    expansion_tank_cap_connection_type:
      name: Paisuntasäiliön korkin liitäntätyyppi
      description: Mekaaninen liitäntätyyppi, jolla korkki kiinnitetään tiiviisti
        paisuntasäiliön kaulaan.
    expansion_tank_cap_pressure_relief_feature:
      name: Paisuntasäiliön korkin paineenpoistotoiminto
      description: Ilmaisee, tarjoaako korkki paineen- tai alipaineenpoistotoiminnon
        ja miten.
    expansion_tank_cap_seal_material:
      name: Paisuntasäiliön korkin tiivistemateriaali
      description: Paisuntasäiliön kaulan kanssa kosketuksissa olevan tiivisteen materiaali.
    extension_attachment_method:
      name: Lisäosan kiinnitystapa
      description: Osoittaa, miten lisäosa kiinnitetään polkupyörän tankoon. Tämä
        auttaa asiakkaita varmistamaan yhteensopivuuden olemassa olevan rungon kanssa.
    extension_bend_type:
      name: Lisäosan käyryys
      description: Kuvaa ohjaustangon lisäosan geometrista tyyliä tai käyryyttä, mikä
        vaikuttaa kuljettajan ergonomiaan ja aerodynamiikkaan.
    extension_mechanism:
      name: Jatko-osan mekanismi
      description: Kuvailee menetelmän, jolla pöydän pituutta tai pinta-alaa laajennetaan,
        mikäli sovellettavissa.
    extension_table_features:
      name: Jatkopöydän ominaisuudet
      description: Korostaa ompelukoneen jatkopöytien toiminnallisia ominaisuuksia.
    eyelet_grommet_installation_method:
      name: Rengasniitin ja vahvikerenkaan asennustapa
      description: Määrittää, miten rengasniitti/vahvikerengas asennetaan/kiinnitetään
        materiaaliin.
    eyewear_lens_shape:
      name: Lasien linssimuoto
      description: Ilmaisee linssien geometrisen muodon (esimerkiksi sylinterimäinen
        tai pallomainen), mikä vaikuttaa kuvakulmaan, vääristymiin ja ulkonäköön.
    eyewear_strap_material:
      name: Silmälasien hihnan materiaali
      description: Ilmaisee sen säädettävän hihnan materiaalin, jolla suojalasit tai
        silmälasit kiinnitetään käyttäjän päähän.
    fabric_backing_type:
      name: Kankaan pohjatyyppi
      description: Tämä määrittää, onko tulostettavassa puuvillakankaassa vakauttava
        paperipohja (ja millainen), mikä ratkaisee, voidaanko sitä syöttää tavallisiin
        tulostimiin.
    fabric_cut_format:
      name: Kankaan leikkausmuoto
      description: Määrittää koristeluompelukankaan leikkauksen/muodon.
    fabric_end_use:
      name: Kankaan käyttötarkoitus
      description: Määrittää kankaan ensisijaisen käyttötarkoituksen (mihin se parhaiten
        soveltuu).
    fabric_finish:
      name: Kankaan viimeistely
      description: Silkkikankaan pintakäsittely, joka vaikuttaa kiiltoon, tuntumaan
        ja ominaisuuksiin.
    fabric_intended_use:
      name: Kankaan käyttötarkoitus
      description: Tämä määrittää pellavakankaan tärkeimmät suositellut käyttökohteet.
    fabric_opacity_level:
      name: Kankaan läpikuultavuustaso
      description: Ilmaisee kankaan läpikuultavuuden, mikä vaikuttaa kerrospukeutumisen
        ja vuorauksen tarpeeseen.
    fabric_patch_shape:
      name: Kangaslaastarin muoto
      description: Kuvailee pakkaukseen sisältyvien laastarien muodot.
    fabric_repair_kit_application_method:
      name: Kankaan korjaussarjan kiinnitystapa
      description: Määrittää, miten korjaus kiinnitetään kankaaseen (esimerkiksi silitysrauta,
        ompelu, liima).
    fabric_repair_kit_components_included:
      name: Kankaan korjaussarjan sisältö
      description: Luettelee tuotepaketin sisällön (esimerkiksi paikat, lanka, neula,
        liima).
    fabric_repair_kit_intended_use:
      name: Kankaan korjaussarjan käyttötarkoitus
      description: Määrittää yleisen korjaustyön, johon sarja on tarkoitettu (esim.
        repeämät, reiät, päärmäys).
    fabric_selling_format:
      name: Kankaan myyntimuoto
      description: Ilmaisee, missä muodossa kangas myydään (yhtenäisenä kappaleena,
        valmiiksi leikattuna kappaleena, rullana tai näytteenä).
    fabric_stretch_level:
      name: Kankaan venyvyystaso
      description: Kuvaa kankaan joustavuutta ja venyvyyttä, mikä auttaa asiakkaita
        valitsemaan sopivia kankaita.
    fabric_stretch_type:
      name: Kankaan venyvyystyyppi
      description: Määrittää surffausshortsien kankaan venyvyyden, mikä on tärkeää
        liikkuvuuden kannalta surffattaessa tai uidessa.
    fabric_texture:
      name: Kankaan rakenne
      description: Kuvaa oloasutopeissa käytetyn kankaan pinnan tuntua tai neulosrakennetta.
    fabric_use_case:
      name: Kankaan käyttökohde
      description: Satiinikangaspalan/-pakan ensisijainen käyttötarkoitus.
    fabric_weight_class:
      name: Kankaan painoluokka
      description: Luokittelee flanellin sen tyypillisten käyttöpainoluokkien mukaan,
        mikä auttaa ostajia suodattamaan tuotteita ilman tarkkaa tietoa neliöpainosta
        (GSM/oz).
    face_mask_material:
      name: Kangasnaamion materiaali
      description: Kypärän mukana tulevan tai siihen yhteensopivan sisähupun materiaalikoostumus.
    face_mask_style:
      name: Kangasnaamion tyyli
      description: Määrittää muodikkaan kasvonaamion yleisen muodon tai tyylin, mikä
        auttaa ostajia löytämään itselleen sopivan istuvuuden ja ulkonäön.
    face_mask_style_code:
      name: Kasvomaskin tyylikoodi
      description: Määrittää kasvomaskin ristikkorakenteen tai toimialakoodin (esimerkiksi
        ROPO, OPO, RJOP).
    face_protection_type:
      name: Kasvosuojuksen tyyppi
      description: Ilmaisee kypärään sisältyvän tai sen mukana toimitetun kasvosuojuksen
        (esimerkiksi häkki tai visiiri).
    faceplate_security_features:
      name: Etupaneelin turvaominaisuudet
      description: Määrittää etupaneelin varkaudenesto- ja käyttöominaisuudet (perusominaisuuksien
        lisäksi).
    facing_length:
      name: Kääntöpinnan pituus
      description: Määrittää suukappaleen suun pituuden (kaarevuuden), mikä vaikuttaa
        soittimen reagointiin ja lehtien valintaan.
    fan_shroud_type:
      name: Tuulettimen suojustyyppi
      description: Määrittää tuulettimen suojuksen peittoalueen tai muodon (esimerkiksi
        kokonaan, puoliksi tai rengas).
    farming_method:
      name: Kasvatustapa
      description: Korostaa eläinten kasvatuksessa noudatettavia eläinten hyvinvointia
        koskevia käytäntöjä tai kasvatuskäytäntöjä (esimerkiksi vapaasti kasvanut
        tai luomu)
    farming_practice:
      name: Maatalouskäytäntö
      description: Määrittää tuotteen ensisijaisen viljelymenetelmän (esimerkiksi
        perinteinen, luomu, vesiviljely).
    fascinator_style:
      name: Juhlapäähineen tyyli
      description: Kuvailee fascinator-hatun rakenteellisen muotoilun tai muodon,
        jotta ostajat voivat nopeasti suodattaa tuotteita suosittujen hattutyylien
        mukaan.
    fastener_grade:
      name: Pulttiluokka
      description: Ilmaisee pultin lujuusluokan, kuten Grade 8 tai Class 10.9, joka
        määrittää kuormituskestävyyden.
    fat_rendering_state:
      name: Rasvan sulatustila
      description: Määrittää, onko rasva sulatettu, sulattamaton (raaka) vai osittain
        sulatettu, mikä vaikuttaa säilyvyysaikaan ja ruoanlaittotapoihin.
    fat_source:
      name: Rasvan lähde
      description: Tunnistaa voin, kirkastetun voin tai margariinin valmistuksessa
        käytetyn rasvan ensisijaisen lähteen (eläin- tai kasvirasva) ja tukee allergioita
        ja ruokavaliota koskevaa suodattamista.
    faucet_hole_configuration:
      name: Hanareiän konfiguraatio
      description: Ilmaisee pesualtaan tason esiporattujen hanareikien lukumäärän
        ja paikan.
    feather_application:
      name: Höyhenten käyttötapa
      description: Kalkkunan sulkien ensisijainen käyttötarkoitus askartelussa tai
        valmistuksessa.
    feather_attachment_format:
      name: Höyhenen kiinnitys/muoto
      description: Synteettisten sulkien valmistelu- tai myyntitapa (irtosulat, nauhassa,
        teipissä jne.).
    feather_coloration_style:
      name: Höyhenten värityyli
      description: Kuvailee värin levitystavan tai ulkonäön sulissa (esim. tasavärinen,
        kärki värjätty, liukuvärjätty), niiden perusväriarvosta riippumatta.
    feather_component:
      name: Höyhenten komponentti
      description: Määrittää, mitä osaa/tyyliä riikinkukon höyhenestä myydään (esim.
        silmähöyhenet tai siikaset).
    feather_curvature:
      name: Höyhenen kaarevuus
      description: Höyhenen yleinen muoto-/kaarevuusprofiili.
    feather_finish:
      name: Sulan viimeistely
      description: Ilmaisee, ovatko strutsin höyhenet luonnollisia vai käsiteltyjä
        (esim. värjättyjä tai valkaistuja) koristekäyttöön.
    feather_form:
      name: Höyhenen muoto
      description: Määrittää fyysisen muodon, jossa hanhen sulkia myydään.
    feather_grade:
      name: Höyhenen laatu
      description: Höyhenen yleinen laatu/laatuluokitus käsitöitä tai esillepanoa
        varten.
    feather_part:
      name: Sulan osa
      description: Myytävän kalkkunan sulan osa tai rakenne (yleinen tieto askartelu-
        ja perhonsidontatarvikkeiden tuotetiedoissa).
    feather_processing_type:
      name: Sulkien käsittelytapa
      description: Miten höyhenet on käsitelty käsitöitä varten (esim. värjätty, valkaistu,
        luonnollinen/värjäämätön).
    feather_product_form:
      name: Sulkatuotteen lomake
      description: Höyhentuotteen fyysinen muoto/leikkaus myyntihetkellä (esim. irtonaiset
        höyhenet, höyhenpuuhkat tai hapsut).
    feather_quantity_unit:
      name: Höyhenten määräyksikkö
      description: Määrittää tuotteen myyntitavan (esim. kappaleittain, painon mukaan,
        nipuittain) tuotteiden tarkan vertailun mahdollistamiseksi eri myynti-ilmoitusten
        välillä.
    feather_source:
      name: Höyhenten alkuperä
      description: Määrittää sulkapalloissa käytettyjen höyhenten alkuperäeläimen.
    feather_stiffness:
      name: Höyhenen jäykkyys
      description: Sulkien väkästen/rakenteen suhteellinen jäykkyys.
    feed_mechanism:
      name: Syöttömekanismi
      description: Ilmaisee, miten pallot syötetään syöttökoneeseen.
    feed_purpose:
      name: Rehun tarkoitus
      description: Kuvaa rehun tai ravintolisän ensisijaista ravitsemuksellista tai
        toiminnallista tavoitetta.
    feeder_mechanism_type:
      name: Annostelumekanismin tyyppi
      description: Määrittää annostelumekanismin, jota ruokintalaite käyttää rehun
        vapauttamiseen.
    feijoa_cultivar:
      name: Feijoan lajike
      description: Tunnistaa feijoan tietyn lajikkeen tai muunnoksen, koska eri lajikkeilla
        on erilainen maku, koko ja sadonkorjuuaika.
    felt_duty:
      name: Huovan kulutuskestävyys
      description: Määrittää tennispallon huovan kulutuskestävyyden luokituksen (esim.
        erittäin hyvä kulutuskestävyys, tavallinen kulutuskestävyys), joka vaikuttaa
        käyttöikään eri pinnoilla.
    felting_mold_intended_use:
      name: Huovutusmuotin tarkoitettu käyttötarkoitus
      description: Mitä muotilla on tarkoitus luoda tai mihin sitä on tarkoitus käyttää
        huovutusprojekteissa.
    felting_pad_surface_material:
      name: Huovutusalustan pintamateriaali
      description: Huovutusalustan/‑maton työpinnalla käytetty materiaali, joka on
        kosketuksissa kuituun/neulaan.
    fencing_certification:
      name: Miekkailusertifiointi
      description: Listaa viralliset sääntelyelimet, joiden vaatimukset miekkailuase
        täyttää (esim. FIE, USFA), mikä osoittaa lainmukaisuutta kilpailuissa ja laatustandardeja.
    fencing_connector_type:
      name: Miekkailuvarusteen liitintyyppi
      description: Määrittää johtojen, istukoiden tai kelojen kiinnittämiseen käytettävän
        yhdistinkokoonpanon (esim. kaksinapainen, kolminapainen, bajonetti) varmistaen
        komponenttien yhteensopivuuden.
    fencing_discipline:
      name: Miekkailulaji
      description: Määrittää miekkailuaseen tai ‑lajin, jota varten tuote on suunniteltu
        tai jonka kanssa se on yhteensopiva.
    fencing_weapon_type:
      name: Miekkailuaseen tyyppi
      description: Määrittää miekkailu- tai harjoitusaseen tyypin, jonka kanssa harjoitusväline
        on yhteensopiva tai jota se edustaa, auttaen käyttäjiä löytämään sopivat varusteet.
    fender_finish_state:
      name: Lokasuojan viimeistelyn tila
      description: Ilmaisee lokasuojan toimituksen mukaisen pintakäsittelyn tai viimeistelyn
        tilan maalaus- ja asennusvalmiutta varten.
    fender_pieces_included:
      name: Mukana tulevat lokasuojan osat
      description: Listaa tuotteen mukana toimitetut komponentit selventääksesi, onko
        kyseessä yksittäinen lokasuoja vai täydellinen sarja lisävarusteineen.
    fender_type:
      name: Lokasuojan tyyppi
      description: Luokittelee lokasuojan yleisen muotoilun tai tyylin.
    fennel_trimming:
      name: Fenkolin perkaaminen
      description: Ilmaisee, mitkä kasvinosat sisältyvät fenkolin sipuliin (esim.
        lehdet, leikattu latva ja juuri).
    fennel_variety:
      name: Fenkolilajike
      description: Määrittää myytävien fenkoli-sipulien viljelylajikkeen tai kauppanimikkeen.
    fermentation_application:
      name: Fermentoinnin käyttökohde
      description: Määrittää ensisijaisen elintarvikkeen tai juoman, jonka käymiseen
        viljelmä on tarkoitettu (esim. juusto, jogurtti, maitokefiiri ja hapantaikina).
    fermentation_method:
      name: Fermentointimenetelmä
      description: Määrittää, miten soijakastike on valmistettu tai fermentoitu (esim.
        luonnollisesti valmistettu, kemiallisesti hydrolysoitu).
    fermentation_vessel_material:
      name: Fermentointiastian materiaali
      description: Pakkaukseen sisältyvän fermentointiastian pääasiallinen materiaali
        (jos sellainen on).
    ferrule_material:
      name: Holkkimateriaali
      description: Määrittää akselin holkin materiaalin (esim. juma, fenoli, polykarbonaatti,
        XTC tai ei mitään), joka vaikuttaa kestoon ja iskutuntuman.
    fia_homologation_certification:
      name: FIA:n luokittelu/sertifiointi
      description: Ilmaisee, onko auto (tai turvakehikko) sertifioitu/luokiteltu ja
        jos on, minkä standardin mukaisesti.
    fiber_animal_source_type:
      name: Kuidun eläin-/lähdetyyppi
      description: Eläin tai ensisijainen raaka-aine, josta hahtuva on peräisin (tai
        synteettinen materiaali), kuten merinovilla, alpakka tai kasvikuidut.
    fiber_luster_level:
      name: Kuidun kiiltoaste
      description: Kuidun visuaalinen kiilto, joka vaihtelee mattapintaisesta voimakkaaseen
        kiiltoon.
    fiber_preparation_processing_stage:
      name: Kuidun valmistus-/käsittelyvaihe
      description: Ilmaisee, miten säie on valmisteltu/käsitelty käyttöä varten (esim.
        karstattu vs. kammattu, sekoitettu, superwash).
    fiber_preparation_type:
      name: Kuidun valmistustyyppi
      description: Osoittaa, miten kuitu on valmisteltu käsitöitä varten (esim. villavanu,
        rumpukarstattu, esihuopalevy).
    field_hockey_ball_playing_surface:
      name: Maahockeypallon pelipinta
      description: Yksilöi pelialustan tai ympäristön, johon pallo on suunniteltu.
    field_hockey_ball_type:
      name: Maahockeypallon tyyppi
      description: Luokittelee maahockeypallon sen käyttötarkoituksen tai erityisominaisuuden
        mukaan.
    field_hockey_goal_size_standard:
      name: Maahockeymaalin standardikoko
      description: Luokittelee maalin yleisten maahockeystandardien tai harjoituskokonaisuuksien
        mukaan (esim. FIH:n ulkopelisäännöt, nuoret, mini).
    field_hockey_training_objective:
      name: Maahockeyn harjoitustavoite
      description: Määrittelee ensisijaisen taidon tai painopistealueen, jota harjoittelun
        apuvälineen tarkoitus on parantaa.
    field_point_attachment_method:
      name: Taulukärkien kiinnitysmenetelmä
      description: Ilmaisee, miten taulukärki kiinnitetään nuolen varteen tai inserttiin
        (esim. ruuvattava, liimattava).
    field_point_tip_style:
      name: Taulukärjen pään tyyli
      description: Määrittää taulukärjen geometrisen tyylin tai toiminnallisen profiilin,
        mikä vaikuttaa tunkeutumiseen, irrottamisen helppouteen ja laillisuuteen.
    fielding_glove_position:
      name: Räpylän asento
      description: Yksilöi baseball- tai softball-pelissä puolustuspeliroolin tai
        käyttötarkoituksen, jota varten hanska on suunniteltu.
    fielding_training_focus:
      name: Kenttäharjoittelun painopiste
      description: Määrittää ensisijaisen taidon, jota apuväline auttaa parantamaan.
    fig_variety:
      name: Viikunalajike
      description: Määrittää myytävän viikunan viljelylajikkeen tai -muunnoksen.
    figure_8_device_design:
      name: Laskeutumiskahdeksikon muotoilu
      description: Määrittää laskeutumiskahdeksikon erityisen kokoonpanon, joka vaikuttaa
        käsittelyominaisuuksiin ja käyttötarkoitukseen.
    figure_finish_type:
      name: Hahmon viimeistelyn tyyppi
      description: Ilmaisee pienoismallihevosen pinnan/maalipinnan viimeistelyn (miltä
        se näyttää/tuntuu keräilykohteena).
    figurine_scale:
      name: Hahmon mittakaava
      description: Pienoismallihahmon suhde todelliseen kohteeseen (jos sovellettavissa),
        esim. 1:6.
    fill_status:
      name: Täytön tila
      description: Ilmaisee, myydäänkö paininukke valmiiksi täytettynä, täyttämättömänä
        vai osittain täytettynä, mikä määrittää toimituskulut ja ostajan vaivannäön.
    filling_consistency:
      name: Täytteen koostumus
      description: Kuvaa täytteen koostumusta tai viskositeettia toimitushetkellä
        (esim. sileä kerma, kokkareinen hedelmä tai tahna).
    filling_type:
      name: Täytteen tyyppi
      description: Määrittää pikkuleivän sisällä mahdollisesti olevan täytteen tai
        kreemin.
    filtration_and_mother_status:
      name: Suodatus ja kalvon tila
      description: Ilmaisee, onko etikka suodatettua, suodattamatonta, raakaa vai
        onko siinä etikkakalvo, mikä palvelee probioottisia tai raakoja vaihtoehtoja
        etsiviä kuluttajia.
    filtration_method:
      name: Suodatusmenetelmä
      description: Vodkan tislauksen jälkeisessä suodatuksessa ja puhdistuksessa käytetty
        materiaali tai menetelmä.
    fin_box_system:
      name: Eväkiinnikejärjestelmä
      description: Määrittää laudassa käytetyn eväkiinnikkeen tai asennuksen pinnan,
        mikä määrittää evien yhteensopivuuden jälkimarkkinoilla.
    fin_buoyancy:
      name: Räpylän kelluvuus
      description: 'Ilmaisee räpylän nosteen vedessä: positiivinen, neutraali tai
        negatiivinen, mikä vaikuttaa sukeltajan trimmiin ja varusteiden tasapainoon.'
    fin_flex_rating:
      name: Evän taipuisuustaso
      description: Ilmaisee evän suhteellisen jäykkyyden tai taipuisuuden, joka vaikuttaa
        yleiseen suorituskykyyn.
    fin_mounting_system:
      name: Evän kiinnitysjärjestelmä
      description: Määrittää kiinnityspinnan tai vakiotavan, jonka mukaan evä kiinnitetään
        leijalautaan (esimerkiksi FCS II, ruuvikiinnitys, nelireikäinen), mikä varmistaa
        evien ja lautojen yhteensopivuuden.
    fin_position:
      name: Evän asento
      description: Määrittää evän suunnitellun asennusasennon laudassa.
    fin_strap_type:
      name: Evän hihnan tyyppi
      description: Määrittää hihnan tyylin tai kiristysmekanismin, jolla evä kiinnitetään
        kantapäähän tai jalkaan.
    fin_template:
      name: Räpylän malli
      description: Luokittelee surffilaudan evän hydrodynaamisen mallin tai muotoilun,
        joka vaikuttaa kääntymistyyliin, nopeuteen ja laudan yleiseen tuntumaan.
    finger_count:
      name: Sormien lukumäärä
      description: Ilmaisee, kuinka monelle sormelle hanska, sormiläppä tai laukaisulaite
        on tarkoitettu.
    finger_coverage:
      name: Sormien peittävyys
      description: Ilmaisee, kuinka suuren osan sormista tuote kattaa.
    finger_grip_adjustability:
      name: Sormiotteen säädettävyys
      description: Ilmaisee, miten sormiotteen voi kiinnittää tai säätää eri kokoisille
        käsille sopiviksi.
    finger_hole_configuration:
      name: Sormireikien konfiguraatio
      description: Määrittää sormenreikien suunnan käden suhteen (oikeakätinen, vasenkätinen
        tai molempikätinen).
    finger_hole_count:
      name: Sormireikien määrä
      description: Ilmoittaa sormiaukkojen määrän kämmenkappaleen nahassa; tämä on
        keskeinen ero sormettomien, 2-reikäisten, 3-reikäisten ja 4-reikäisten mallien
        välillä.
    finger_pick_band_style:
      name: Sormiplektran tyyli
      description: Sormilenkin tai -lenkkien tyyli, joka vaikuttaa käyttömukavuuteen
        ja säädettävyyteen.
    finger_pick_blade_length:
      name: Sormiplektran terän pituus
      description: Nauhasta ulottuvan plektran terän pituus.
    finger_pick_blade_shape:
      name: Plektran terän muoto
      description: Kieliä koskettavan plektran pinnan (terän) muoto/profiili.
    finger_pick_size:
      name: Sormiplektran koko
      description: Sormiplektran nauhan/lenkin mitoitus eri sormien tai peukalon ympärysmitoille
        (ei soittimen koko).
    finger_pick_wear_location:
      name: Sormiplektran käyttösijainti
      description: Ilmaisee, missä sormessa sormiplektraa on tarkoitus käyttää, vai
        onko tuote peukalossa ja sormessa käytettävä sarja.
    finger_protection:
      name: Sormisuoja
      description: Ilmaisee, sisältääkö käsine sormien ja käden selkäosan suojan sekä
        ovatko tuet irrotettavissa.
    fingerboard_bearing_type:
      name: Sormirullalaudan laakerityyppi
      description: Määrittää sormirullalautojen pyörissä käytetyn laakerityypin.
    fingerboard_grip_type:
      name: Otelaudan otetyyppi
      description: Määrittää sormirullalaudan laudassa käytetyn pitoalueen materiaalin
        tai tyypin.
    fining_agent_active_ingredient:
      name: Kirkastusaineen vaikuttava aine
      description: Tuotteessa käytetty ensisijainen kirkastus- tai selkeytysaine.
    fining_agent_type:
      name: Kirkastusaineen tyyppi
      description: Määrittää punaviinin kirkastamisessa käytetyn kirkasteen kemiallisen
        koostumuksen tai materiaalin.
    finish_after_baking:
      name: Polton jälkeinen viimeistely
      description: Kuvailee tyypillistä pinnan ulkonäköä kovettumisen tai polton jälkeen.
    finish_effect:
      name: Pintatehoste
      description: Kuvailee strassiin tehtyjä erityisiä optisia tai pintatehosteita.
    finish_type:
      name: Pintakäsittelyn tyyppi
      description: Ukulelen rungon pintakäsittely.
    finished_product_format:
      name: Valmis tuoteformaatti
      description: Määrittää, millaista tuoksutuotetta pakkauksen avulla voidaan valmistaa.
    fire_pit_accessories_included:
      name: Nuotiopaikan mukana tulevat lisävarusteet
      description: Luettelee tulisijan mukana tulevat merkittävät lisävarusteet, kuten
        kipinäsuojat tai laavakivet, mikä selventää pakkauksen sisältöä.
    firework_assortment_launch_type:
      name: Ilotulitelajitelman laukaisutapa
      description: Kuvaa, miten mukana olevat ilotulitteet tyypillisesti sytytetään/ammutaan.
    firework_assortment_types_included:
      name: Mukana toimitetut ilotulitevalikoimat
      description: Määrittää valikoimaan kuuluvat tärkeimmät ilotulitetyypit, jotta
        ostajat voivat vertailla tuotepakettia (esim. kipinäsuihkut, roomalaiset kynttilät
        ja sähikäiset).
    firework_effect_types:
      name: Ilotulitustehosteiden tyypit
      description: Lajitelman tuottamat ensisijaiset visuaalisten ja/tai aistivaikutteisten
        tehosteiden ryhmät (valitse kaikki soveltuvat).
    firework_ignition_method:
      name: Ilotulitteen sytytysmenetelmä
      description: Määrittää, miten ilotulitusväline sytytetään (esim. sytytin tai
        sähköinen tulitikku).
    firework_visual_intensity_level:
      name: Ilotulitteen visuaalisen voimakkuuden taso§
      description: Kipinöiden yleinen visuaalinen voimakkuus/määrä kipinäsuihkeessa.
    firing_mode:
      name: Laukaisutila
      description: Listaa muovikuula-aseen valittavat tai ensisijaiset ampumistilat.
    first_day_cover_cachet_type:
      name: Ensipäiväkuoren kuvituksen tyyppi
      description: Ensipäiväkuoren (FDC) kuvitustapa (esim. painettu, käsinmaalattu).
    first_day_cover_cancellation_type:
      name: Ensipäivänkuoren postileiman tyyppi
      description: Ensipäivänkuoressa olevan postileiman tyyppi/tyyli (esim. kone-
        tai käsinleimaus).
    first_day_cover_set_type:
      name: Ensipäivänkuoren tyyppi
      description: Ilmaisee, onko kuori yksittäinen tuote, kokonainen sarja vai osa
        joukkoa tai yhdistelmää.
    fishing_hook_size:
      name: Koukun koko
      description: 'Määrittää ongenkoukun vakioidun kokomerkinnän (esim. #4, 1/0,
        10/0), minkä avulla kalastajat voivat sovittaa koukun koon saaliskalalajien
        ja syöttien mukaan.'
    fishing_hook_style:
      name: Kalastuskoukun tyyli
      description: Yksilöi yksihaarakoukun mallin tai kaaren muodon, mikä vaikuttaa
        esillepanoon, tarttumisen tehokkuuteen ja aiottuun käyttötarkoitukseen.
    fishing_hook_type:
      name: Kalastuskoukun tyyppi
      description: Kuvaa kalastuslusikan kanssa toimitetun (jos sellainen on) koukun
        kokoonpanoa.
    fishing_line_application:
      name: Siiman käyttö
      description: Yksilöi kalastussiiman tai perukemateriaalin käyttötarkoituksen
        (esim. peruke, pääsiima, perukesiima).
    fishing_line_buoyancy_type:
      name: Siiman kelluvuus
      description: Luokittelee siiman käyttäytymisen vedessä (esim. kelluva, keskisyvyys,
        uppoava) ja auttaa kalastajia valitsemaan sopivan syvyyden.
    fishing_needle_purpose:
      name: Syöttineulan tarkoitus
      description: Yksilöi neulan ensisijaisen käyttötarkoituksen kalastukseen liittyvissä
        takilointitehtävissä.
    fishing_needle_types_included:
      name: Mukana toimitetut syöttineulatyypit
      description: Listaa sarjassa olevat neula- tai viehetyökalutyypit, jotta asiakkaat
        voivat nopeasti nähdä pakkauksen sisällön.
    fit_profile:
      name: Sopivuusprofiili
      description: Kuvaa suojuksen yleistä leikkausta ja ääriviivaa, jotka vaikuttavat
        liikkuvuuteen ja peittävyyteen.
    fit_volume_classification:
      name: Sopivuuden tilavuusluokitus
      description: Luokittelee kengän kokonaissisätilavuuden brändien markkinoinnin
        mukaan (esim. LV tarkoittaa pientä tilavuutta).
    fitting_angle:
      name: Liitoksen kulma
      description: Määrittää liitoskappaleen taivutuskulman (esim. suora, 45° tai
        90°). Käytä vaihtoehtoa ”Säädettävä/kääntyvä” liitoksille, joissa on säädettävä
        kulma, ja ”Muu” liitoksille, joissa on epätavallinen kulma.
    flag_base_type:
      name: Lipun jalustan tyyppi
      description: Määrittää ankkurointi- tai jalustatyylin, jota käytetään kulmalipun
        kiinnittämiseen eri pelialustoille.
    flag_design_theme:
      name: Lipun aihe
      description: Kuvailee lipun ensisijaisen aiheen (esim. valtio/kansallinen, urheilujoukkue,
        juhlapäivä), mikä helpottaa tuotteen löytämistä ja suodattamista käyttötarkoituksen
        mukaan.
    flag_mounting_method:
      name: Lipun kiinnitysmenetelmä
      description: Määrittää, miten lippu kiinnitetään ajoneuvoon (esim. antennikiinnike,
        vetokoukkukiinnike tai magneettinen).
    flag_type:
      name: Lipun tyyppi
      description: Luokittelee golflipun erityisen tarkoituksen tai tyylin, kuten
        lipputanko, golfkärry tai harjoituslippu.
    flame_resistance_standard:
      name: Palonkestävyyden standardi
      description: Ilmaisee vaatekappaleen palonkestävyyttä tai valokaarileimahdukselta
        suojaamista koskevan standardin/sertifioinnin.
    flamenco_cajon_snare_system:
      name: Flamenco-cajonin virvelikoneisto
      description: Määrittää sisäisen virvelimekanismin, jota käytetään soittimelle
        ominaisen flamenco-särinän tuottamiseen (tai sen puuttumisen).
    flammability_compliance:
      name: Syttyvyysvaatimusten noudattaminen
      description: Ilmoittaa sovellettavat paloturvallisuusstandardit, jotka ajoneuvojen
        sisustusmateriaaleissa käytettävä kangas täyttää.
    flannel_brushing_finish:
      name: Flanelliharjattu viimeistely
      description: Ilmaisee, onko flanelli harjattu ja miltä puolelta, mikä vaikuttaa
        pehmeyteen, lämpöön ja ulkonäköön.
    flannel_use_type:
      name: Flanellin käyttötyyppi
      description: Flanellipalan tai -pakan ensisijainen käyttötarkoitus.
    flap_configuration:
      name: Läpän konfiguraatio
      description: Määrittää satulan siiven tyylin, kuten yksi- tai kaksiläppäinen.
    flare_color:
      name: Hätäsoihdun väri
      description: Valon tai liekin väri (tai LED-soihtujen linssin väri).
    flash_card_included_features:
      name: Flash-korttien ominaisuudet
      description: Korostaa muistikortteihin sisältyviä toiminnallisia oppimis- tai
        käyttöominaisuuksia.
    flavor_intensity:
      name: Makuaineen voimakkuus
      description: Ilmaisee aromiaineen väkevyyden, mikä auttaa käyttäjiä määrittämään
        sopivan annostuksen (esim. keskivahva tai erittäin vahva).
    flavor_solvent_base:
      name: Aromiaineen liuotinpohja
      description: Ilmoittaa aromin ensisijaisen kantoaineen tai liuottimen (esim.
        alkoholi, propyleeniglykoli, glyseriini).
    fleece_fiber_animal_type:
      name: Fleecekuidun eläintyyppi
      description: Fleecekuidun eläinperäinen lähde (laji).
    fleece_finish_surface:
      name: Fleeceviimeistely/‑pinta
      description: Kuvaa fleecen pintaa tai viimeistelyä (esim. nukkaantumaton, harjattu),
        mikä vaikuttaa nukkaantumiseen, pehmeyteen ja ulkonäköön.
    fleece_preparation_method:
      name: Fleecen valmistusmenetelmä
      description: Miten fleece valmistellaan/käsitellään käsitöitä ja kehräämistä
        varten (kuidun kunto).
    flesh_color:
      name: Hedelmälihan väri
      description: Määrittää melonin hedelmälihan värin.
    fletching_orientation:
      name: Sulituksen suunta
      description: Määrittää, miten sulitus on asetettu varteen (esim. suora, epäkeskeinen,
        kierteinen), mikä vaikuttaa nuolen kierteeseen ja lentoon.
    fletching_profile:
      name: Sulitusprofiili
      description: Määrittää sulituksen geometrisen muodon tai leikkauksen, mikä vaikuttaa
        ilmanvastukseen, välykseen, ääneen ja nuolen yleisiin lento-ominaisuuksiin.
    flight_system_type:
      name: Lentojärjestelmän tyyppi
      description: Tunnistaa lentoradan rakennetyypin ja erottaa toisistaan taitettavat,
        valetut ja integroidut lento- ja akselijärjestelmät.
    float_attachment_method:
      name: Kellukkeen kiinnitysmenetelmä
      description: Kuvailee, miten koho kiinnitetään siimaan (esim. liukuva tai kiinteä),
        mikä avulla kalastajat voivat suodattaa tuotteita takilointitavan mukaan.
    float_design:
      name: Kellukkeen suunnittelu
      description: Luokittelee kohon yleisen tyylin tai tyypin (esimerkiksi virtaavan
        veden koho, pystykoho, pyöreä koho), jotta kalastajat voivat nopeasti valita
        tekniikkaansa ja olosuhteisiin sopivan mallin.
    float_raft_use_environment:
      name: Kellunta-/lautankäyttöympäristö
      description: Ensisijaisesti tarkoitettu vesiasetus puhallettavalle tuotteelle
        (uima-allas, tyyni avovesi tai aallokko), joka vastaa kestävyyttä ja suunnittelua
        koskevia odotuksia.
    floatation:
      name: Kellunta
      description: Onko merkkivalo suunniteltu kellumaan vedessä.
    floor_construction_type:
      name: Lattian rakennetyyppi
      description: Määrittää lautan pohjan rakenteen (esim. itsestään tyhjentyvä,
        drop-stitch-kuitukangas), joka vaikuttaa veden poistumiseen, jäykkyyteen ja
        suorituskykyyn.
    floor_design:
      name: Lattian suunnittelu
      description: Kotelon mukana toimitetun maanpeitteen tyyli.
    floor_inclusion:
      name: Lattiapohja mukana
      description: Ilmoittaa, onko eteistilassa pohja ja onko kyseinen pohja irrotettavissa.
    floor_mat_cleaning_method:
      name: Maton puhdistusmenetelmä
      description: Ilmoittaa valmistajan suositteleman lattiamaton ensisijaisen puhdistustavan.
    floor_mat_edge_style:
      name: Maton reunan tyyli
      description: Kuvaa, onko matossa kohoreunat tai uloke roiskeiden ja roskien
        keräämiseksi.
    floor_mat_format:
      name: Maton muoto
      description: Määrittää lattiansuojatuotteen fyysisen muodon tai tyylin (esim.
        yksittäinen matto, lukittuvat laatat, rulla).
    floor_mat_retention_system:
      name: Maton kiinnitysjärjestelmä
      description: Määrittää menetelmän, jolla matto pidetään paikallaan.
    floor_mat_set_configuration:
      name: Lattiamattosetin kokoonpano
      description: Ilmoittaa, mitkä paikat sisältyvät pakkaukseen (esim. vain etupari,
        täysi sarja).
    floss_sugar_granulation_grade:
      name: Hattarasokerin rakeisuusluokka
      description: Kuvaa sokeriseoksen kidekoostumusta (hieno, keskikarkea, karkea),
        joka voi vaikuttaa koneen tehokkuuteen ja lopulliseen koostumukseen.
    floss_sugar_product_form:
      name: Hattarasokerin tuotemuoto
      description: Ilmaisee, onko hattarasokeri käyttövalmis, perussokerin kanssa
        sekoitettava makuainetiiviste vai väritön perussokeri.
    flour_grind_texture:
      name: Jauhojen jauhatusrakenne
      description: Ilmaisee jauhatuksen karkeuden tai jauhon koostumuksen, kuten erittäin
        hieno, keskikarkea, karkea tai kivijauhettu, mikä voi vaikuttaa reseptin onnistumiseen.
    flour_processing_method:
      name: Jauhojen käsittelymenetelmä
      description: Tallentaa tietoja merkittävistä jauhojen käsittely- tai työstömenetelmistä
        (esim. kivijauhettu, valkaistu, idätetty, ravintoarvolta parannettu) jotka
        vaikuttavat makuun, väriin tai ravintoarvoihin.
    flower_care_instructions:
      name: Kukkien hoito-ohjeet
      description: Tarjoaa suositeltuja hoito-ohjeita erityisesti tuoreille leikkokukille
        (esim. varsien leikkaaminen, kastelutiheyden muuttaminen).
    flugelhorn_leadpipe_material:
      name: Flyygelitorven suukappaleen putken materiaali
      description: Suukappaleen osan materiaali (jos määritetään eroteltuna instrumenttien
        kokonaismateriaalista)
    flugelhorn_trigger_type:
      name: Flyygelitorven vireenkorjaimen tyyppi
      description: Ilmaisee, sisältääkö flyygelitorvi vireliipaisimen ja mitä vetoputkea
        tai venttiiliä se käyttää.
    fluorescence_grade:
      name: Fluoresenssin luokka
      description: Ilmoittaa timantin fluoresenssin voimakkuuden, kun se altistetaan
        UV-valolle.
    fluorescence_under_uv:
      name: Fluoresenssi UV-valossa
      description: Ilmaisee, osoittaako näyte fluoresenssia ultraviolettivalossa ja
        millaista se on.
    fluorocarbon_content:
      name: Fluorihiilipitoisuus
      description: Ilmaisee, sisältääkö vaha fluorihiililisäaineita ja missä määrin.
    flute_case_capacity:
      name: Huilun kotelon kapasiteetti
      description: Ilmoittaa, mitä koteloon on suunniteltu sopimaan huilun rungon
        lisäksi (esim. huilu + pikkolo, ylimääräinen suukappale).
    flute_cleaning_rod_tip_type:
      name: Huilun puhdistuspuikon pään tyyppi
      description: Kuvaa sen puikon pään rakennetta, joka pitää kangasta/tikkua paikallaan
        tai on kosketuksissa soittimeen (esim. uurrettu, kierteinen, silmukka).
    flute_footjoint_type:
      name: Huilun jalan tyyppi
      description: Määrittää huilun jalan kokoonpanon.
    flute_headjoint_cork_type:
      name: Huilun suuaukon korkkityyppi
      description: Määrittää suukappaleen mukana toimitetun suukappaleen korkki-/tulppakokoonpanon
        materiaalin/tyypin.
    flute_key_system:
      name: Huilun kosketinjärjestelmä
      description: Ilmaisee huilun mekanismin/koneiston (esim. Boehm-järjestelmä)
        tarvittaessa.
    flute_keywork_material:
      name: Huilun koneiston materiaali
      description: Mekanismin (koneiston) materiaali ja/tai pinnoite, kun se on määritelty
        erikseen rungon materiaalista.
    flute_offset_g:
      name: Huilun offset G
      description: Määrittää, onko huilussa offset G ‑muotoilu.
    flute_wall_thickness:
      name: Huilun seinämän paksuus
      description: Huiluputken seinämän paksuusluokka (ohutseinäinen, vakio, paksuseinäinen).
    fly_pattern_type:
      name: Perhon tyyppi
      description: Luokittelee tekoperhon kalastustyylin tai hyönteisten/kasvien jäljittelyn
        perusteella, jotta kalastajat voivat suodattaa nopeasti oikean perhotyylin.
    fly_rod_style:
      name: Perhovavan tyyppi
      description: Luokittelee vavan sen suunnitellun heittolajin tai käyttötarkoituksen
        mukaan (esim. yksikätinen, switch-heitto, spey-heitto).
    fly_style:
      name: Sepalustyyli
      description: Määrittää pitkien kalsareiden sepaluksen tai etuaukon tyypin.
    fly_tying_tools_included:
      name: Perhonsidontatyökalut sisältyvät hintaan
      description: Listaa sarjaan kuuluvat perhonsidontatyökalut, jotta ostaja tietää
        sisällön tarkalleen ja voi vertailla tuotepaketteja.
    fly_type:
      name: Sepaluksen tyyppi
      description: Määrittää, onko pitkissä kalsareissa toimiva sepalus, ja sepaluksen
        tyylin.
    flyer_hook_mounting_method:
      name: Lankaohjaimen kiinnitystapa
      description: Kuinka ohjain asennetaan lyhtyyn (esim. ruuvikiinnitys tai puristuskiinnitys),
        mikä vaikuttaa asennettavuuteen ja yhteensopivuuteen.
    flyer_hook_orientation:
      name: Lankaohjaimen suunta
      description: Onko ohjain tarkoitettu lyhdyn vasemmalle vai oikealle puolelle
        vai onko se käännettävä/yleiskäyttöinen.
    flyer_kit_finish_coating:
      name: Lyhtypakkauksen viimeistely/pinnoite
      description: Lyhtypakkauksen osien pinta käsitellään.
    flyer_kit_included_components:
      name: Lyhtypakkaukseen sisältyvät osat
      description: Yksilöi, mitä osia pakkaus sisältää.
    flyer_orifice_type:
      name: Lyhdyn aukon tyyppi
      description: Ilmoittaa rukinlyhdyn käyttämän lanka-aukon tyypin.
    flying_disc_feature_set:
      name: Lentokiekon ominaisuusjoukko
      description: Liitokiekon merkittävät toiminnalliset ominaisuudet.
    flysheet_material:
      name: Teltan ulkokerroksen materiaali
      description: Ilmoittaa teltan ulkokankaan/päällyskankaan päämateriaalin, mikä
        vaikuttaa painoon, kestävyyteen ja säänkestävyyteen.
    flywheel_balance_type:
      name: Vauhtipyörän tasapainotustyyppi
      description: Ilmaisee, onko vauhtipyörä neutraalisti tasapainotettu vai käyttääkö
        se ulkoista epätasapainopainoa.
    foam_blocks_size_class:
      name: Vaahtomuovipalikoiden kokoluokka
      description: Ilmaisee palikkasarjan yleisen kokoluokan.
    foam_blocks_surface_texture:
      name: Vaahtomuovipalikoiden pintarakenne
      description: Kuvailee vaahtomuovipalikoiden ulkopinnan tuntuman/viimeistelyn.
    foam_surface_effect:
      name: Vaahtomuovin pintavaikutelma
      description: Kuvailee yleisiä koristeluun tarkoitettuja pintakäsittelyjä, joita
        käytetään askarteluvaahdossa tai vaahtomuovissa, kuten kimalle-, metalli-
        tai holografisia viimeistelyjä.
    foil_color:
      name: Kalvon väri
      description: Määrittää todistuksessa käytetyn kalvon tehostevärin (jos sovellettavissa).
    foil_curtain_mounting_method:
      name: Folioverhon kiinnitysmenetelmä
      description: Miten folioverho on tarkoitus asentaa tai ripustaa (esim. teippi,
        vahvikerenkaat).
    foil_discipline:
      name: Vesilautailun laji
      description: Määrittää ensisijaisen lautailutyylin tai ‑lajin, johon siipi on
        suunniteltu.
    foil_mast_board_mounting_type:
      name: Kantosiipilaudan maston kiinnitystyyppi
      description: Määrittää maston yläpäässä olevan liitäntätavan, jolla se kiinnittyy
        lautaan tai foil-kiskoon.
    foil_mast_fuselage_connection_type:
      name: Kantosiipimaston rungon liitäntätyyppi
      description: Määrittää, miten masto kiinnittyy runkoon tai etusiivekkeen kokoonpanoon.
    foil_mounting_interface:
      name: Kantosiiven kiinnitysliittymä
      description: Määrittää liitäntästandardin, jolla osa kiinnitetään lautaan tai
        muihin kantosiipikomponentteihin.
    foil_mounting_system:
      name: Kantosiiven liitäntäjärjestelmä
      description: Määrittää kantosiipien tai evien asennuspinnan laudassa, mikä varmistaa
        yhteensopivuuden käyttäjän nykyisen laitteiston kanssa.
    foil_mounting_type:
      name: Kantosiiven liitäntätyyppi
      description: Yksilöi foilin lautaan kiinnittämiseen käytetyn liitäntäjärjestelmän,
        joka varmistaa osien yhteensopivuuden.
    fold_over_elastic_application:
      name: Taiteltavan kuminauhan sovelluskohde
      description: Napinläven kuminauhan ensisijainen käyttötarkoitus/sovelluskohde
    foldability:
      name: Taitettavuus
      description: Kuvaa, voidaanko erotin taittaa tai pienentää säilytystä tai uutta
        kokoonpanoa varten ja miten.
    foldability_stow:
      name: Taitettavuus (varastointi)
      description: Voiko telineen taittaa, kun se ei ole käytössä (esim. taittuu ajoneuvoa
        vasten).
    folding_style:
      name: Taittotapa
      description: Ilmaisee, miten boulderpatja taittuu kuljetusta ja varastointia
        varten, mikä vaikuttaa laskeutumispinnan tasaisuuteen ja pakattavuuteen.
    food_basket_items_included:
      name: Ruokakorin mukana tulevat tuotteet
      description: Listaa tärkeimmät korin sisältämät ruokatyypit, jotta ostajat voivat
        valita vastaanottajan makumieltymyksiä tai ruokavaliota vastaavia koreja.
    food_coloring_form:
      name: Elintarvikevärin muoto
      description: Määrittää fyysisen muodon tai toimitusmuodon, jossa elintarvikeväri
        toimitetaan (esim. geeli, neste, jauhe, suihke).
    food_contact_material:
      name: Elintarvikkeiden kanssa kosketuksiin joutuva materiaali
      description: Rypälemehun/viinin valmistuksessa käytettävien viininvalmistuslaitteiden
        (käymisastiat, letkut, suppilot) pääasiallinen materiaali.
    food_packing_medium:
      name: Elintarvikkeiden pakkausmateriaalit
      description: Ilmoittaa aineen, johon hedelmät tai vihannekset on säilötty (esim.
        vesi, suolavesi, sokeriliemi, öljy).
    foosball_rod_type:
      name: Pöytäjalkapallopelin tangon tyyppi
      description: Ilmaisee tangon mekaanisen rakenteen, joka vaikuttaa pelituntumaan
        ja turvallisuuteen.
    foot_arch_type_compatibility:
      name: Jalkaholvityypin yhteensopivuus
      description: Määrittää jalkaholvin profiilin, johon sisäosa on suunniteltu.
    foot_arch_type_suitability:
      name: Jalkaholvityypin sopivuus
      description: Ilmoittaa, minkä jalkaholvin profiilin tukemiseen pohjallinen on
        tarkoitettu.
    foot_coverage:
      name: Jalkineen peittävyys
      description: Ilmaisee, ovatko jalkojen alueen vaatteet jalalliset, jalattomat,
        jalkalenkilliset vai avokantaiset.
    foot_guard_type:
      name: Jalkasuojan tyyppi
      description: Ilmaisee, sisältääkö säärisuoja varvas-/jalkaterän suojan, ja määrittää,
        onko suoja kiinteä vai irrotettava.
    foot_support_level:
      name: Jalan tukitaso
      description: Ilmaisee kengänpohjallisen rakenteellisen tuki- tai kovuustason,
        kuten matala, keskitaso, korkea tai erittäin korkea.
    footbag_play_style:
      name: Footbag-pelityyli
      description: Footbagin ensisijainen tarkoitettu pelityyli.
    football_ball_type:
      name: Footbag-pallon tyyppi
      description: Määrittää jalkapallon ensisijaisen käyttötarkoituksen tai kontekstin,
        kuten pelaamisen, harjoittelun tai keräilyesineiden esillepanon.
    football_dummy_type:
      name: Jalkapallonuken tyyppi
      description: Luokittelee nuken tyylin tai toiminnallisen rakenteen sen erityisen
        koulutustarkoituksen mukaan.
    football_glove_certification:
      name: Jalkapallokäsineiden sertifiointi
      description: Ilmaisee kilpailulliseen pelaamiseen vaadittavan sertifioinnin
        tai standardien noudattamisen (esim. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Jalkapäädyn kiinnitystyyppi
      description: Määrittää, miten sängyn jalkopää kiinnittyy sängyn runkoon tai
        lattiaan, minkä avulla ostaja voi valita yhteensopivat kiinnitystarvikkeet
        ja asennustavat.
    footboard_style:
      name: Jalkopään tyyli
      description: Määrittää sängyn jalkopään rakenteellisen tai esteettisen muotoilun.
    footrest_adjustability:
      name: Jalkatuen säädettävyys
      description: Määrittää, voidaanko jalkatukia säätää lasten jalkojen eri pituuksien
        mukaan ja miten.
    footrest_type:
      name: Jalkatuen tyyppi
      description: Määrittää jalkatuen olemassaolon ja rakenteen jakkarassa.
    footstrap_configuration:
      name: Jalkaremmin kokoonpano
      description: Määrittää laudan kannella olevien jalkalenkkien kiinnityspisteiden
        kuvion
    footswitch_action_style:
      name: Jalkakytkimen toimintatapa
      description: Ilmaisee, onko kytkimen toimintatapa palautuva vai lukittuva, ja
        tukeeko se mahdollisesti molempia.
    footswitch_power_source:
      name: Jalkakytkimen virtalähde
      description: Määrittää jalkakytkimen virtalähteen, jos se on tarpeen (passiivisesti
        vahvistimen liitännästä, akulla, ulkoisella virtalähteellä, USB-väylästä jne.).
    footwear_construction_method:
      name: Jalkineiden valmistusmenetelmä
      description: Määrittelee tekniikan, jota käytetään päällisen kiinnittämiseen
        pohjaan, mikä vaikuttaa kestävyyteen, pohjallisten vaihtomahdollisuuksiin
        ja hintaan.
    footwear_cut:
      name: Jalkineiden malli
      description: Ilmaisee nilkkakauluksen korkeuden (matala, keskitaso, korkea),
        mikä antaa sekä liikkuvuutta että tukea.
    footwear_size_system:
      name: Jalkineiden kokojärjestelmä
      description: Ilmaisee ilmoitetun kenkäkoon alueellisen kokoluokituksen (esim.
        US, EU, UK).
    footwear_support_type:
      name: Jalkineiden tukityyppi
      description: Ilmoittaa kengän tarjoaman biomekaanisen tuen tai pronaation hallinnan
        tason (esim. neutraali, vakaa, liikekontrolli).
    fork_material:
      name: Haarukan materiaali
      description: Määrittää polkupyörän etuhaarukan materiaalin, joka vaikuttaa jäykkyyteen,
        painoon ja ajon laatuun.
    form_factor:
      name: Muotokerroin
      description: DMX-ohjaimen ensisijainen laitteiston muototekijä.
    formula_car_series_class:
      name: Formula-autojen sarja/luokka
      description: Määrittää kilpa-autosarjan tai ‑luokan, jossa formula-auto on tarkoitettu
        kilpailemaan.
    formulation_style:
      name: Erikoisvalmisteen tyyli
      description: Korostaa tiettyihin käyttötarkoituksiin tai mieltymyksiin suunniteltuja
        erikoisvalmisteita (esim. Barista, Extra Creamy).
    formulation_type:
      name: Valmistemuoto
      description: Desinfiointisuihkeen koostumus.
    fossil_preparation_level:
      name: Fossiilien valmistelutaso
      description: Näytteelle tehdyn esikäsittelyn tai puhdistuksen aste (esim. puhdistamaton
        matriisissa tai täysin puhdistettu).
    fossil_preservation_type:
      name: Fossiilien säilytystyyppi
      description: Fossiilien säilytystapa (esim. kivettyminen, valos, muotti, painanne).
    fossil_restoration_status:
      name: Fossiilien ennallistamisen tila
      description: Onko näyte korjattu/ennallistettu ja miten (esim. liimattu, rekonstruoitu,
        yhdistetty).
    foundation_configuration:
      name: Perustuksen määritys
      description: Määrittää, valmistetaanko sängynpohja yhtenä kappaleena vai kahtena
        osana suuria patjoja varten.
    foundation_profile:
      name: Sängynpohja
      description: Luokittelee perustuksen (sängyn rungon tai jousipohjan) kokonaiskorkeuden
        – esimerkiksi erittäin matala, matala, vakio tai korkea profiili – jotta ostajat
        voivat nopeasti löytää sopivan korkuisen patjan ja sopivat lakanat.
    frame_adjustability:
      name: Rungon säädettävyys
      description: Ilmaisee, voidaanko runkoa säätää ja miten (esim. leveyden/korkeuden
        säätö, kierto/kallistus), mikä vaikuttaa ergonomiaan ja projektin sopivuuteen.
    frame_drum_jingle_configuration:
      name: Kehärumpujen helistinkokoonpano
      description: Sisältääkö kehärumpu helistimiä ja jos sisältää, niin mikä on yleinen
        kokoonpano.
    frame_drum_tuning_system:
      name: Kehärummun viritysjärjestelmä
      description: Miten kehärumpu viritetään tai onko se viritettävissä.
    frame_finish:
      name: Rungon viimeistely
      description: Määrittää runkoon levitetyn suojapinnoitteen tai materiaaliviimeistelyn,
        joka vaikuttaa kestävyyteen ja ulkonäköön.
    frame_mounting_standard:
      name: Rungon asennusstandardi
      description: Määrittää kengän ja rungon välisen liitäntätavan (esim. 195 mm
        2-pisteinen, Trinity 3-pisteinen), joka on kriittinen rungon yhteensopivuuden
        kannalta.
    frame_steel_gauge:
      name: Teräslevyn paksuus
      description: Yksilöi telineen pystytolpissa käytetyn teräsputken seinämävahvuuden
        (aineenpaksuuden), joka on keskeinen lujuuden ja vakauden indikaattori.
    frame_suspension_type:
      name: Runkojousituksen tyyppi
      description: Ilmaisee polkupyörän runkojousituksen rakenteen, kuten jäykkä,
        jäykkäperäinen tai täysjousitus, jotta ostaja voi valita rungon, joka sopii
        hänen haluamaansa kokoonpanoon.
    free_reed_instrument_orientation:
      name: Vapaalehdykkäsoittimen suunta
      description: Määrittää, miten soitinta pidetään tai soitetaan (käsissä palkeella,
        olkahihnoilla jne.) ergonomian ja käyttötarkoituksen mukaan suodattamista
        varten.
    free_weight_rack_type:
      name: Vapaiden painojen varastohyllyn tyyppi
      description: Luokittelee telineen rakenteellisen tyylin tai käyttötarkoituksen
        (esim. levytankoteline, kahvakuulateline, levypainoteline).
    freehub_body_type:
      name: Vapaarattaan runkotyyppi
      description: Määrittää polkupyörän takanavan tukeman vapaarattaan rungon tai
        kasettipakan standardin.
    freehub_driver_standard:
      name: Vapaarattaan ohjain, vakio
      description: Tunnistaa kasetti-/pakkaliitännän, johon navan osa tukee (esim.
        Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Vapaarattaan kierteen standardi
      description: Määrittää navan kierteen standardin tai koon, jonka kanssa vapaaratas
        on yhteensopiva.
    french_horn_bell_construction:
      name: Käyrätorven kaikusuppilon valmistusmenetelmä
      description: Määrittää kaikusuppilon rakenteen ja voidaanko se irrottaa kuljetusta
        tai huoltoa varten.
    french_horn_bell_material:
      name: Käyrätorven kellon materiaali
      description: Määrittää käyrätorven (ja usein kaikusuppilon) materiaalin/seoksen.
    french_horn_bell_type:
      name: Käyrätorven kaikusuppilon tyyppi
      description: Kaikusuppilon valmistustapa.
    french_horn_finish:
      name: Käyrätorven viimeistely
      description: Soittimen ulkopinta/pinnoitus.
    french_horn_included_accessories:
      name: Käyrätorven mukana tulevat lisävarusteet
      description: Käyrätorven mukana tulevat lisävarusteet (kotelo, suukappale jne.).
    french_horn_leadpipe_material:
      name: Käyrätorven suukappaleen materiaali
      description: Ilmoittaa suukappaleen putken materiaalin tai seoksen.
    french_horn_wrap_type:
      name: Käyrätorven putkiston malli
      description: Käyrätorven putkiston yleismuoto.
    fretboard_radius_fit:
      name: Otelaudan kaarevuus
      description: Ilmaisee, onko capon pehmusteen kaarevuus suunniteltu suorille
        vai kaareville otelaudoille, vai onko se säädettävissä sopimaan useille eri
        otelaudan säteille.
    friction_surface_included:
      name: Mukana tuleva kitkapinta
      description: Sisältääkö vauhtipyörä vaihdettavan tai valmiiksi asennetun kitkapinnan
        (esim. irtolevy, rengas) vai onko se yksiosainen kitkapinta.
    fringe_curtain_finish:
      name: Hapsuverhon viimeistely
      description: Kuvailee hapsupinnan visuaalisen viimeistelyn (kiilto/tekstuuri).
    fringe_curtain_material:
      name: Hapsuverhon materiaali
      description: Ilmoittaa verholistojen ensisijaisen materiaalin (esim. PET-kalvo,
        muovi, paperi, tekstiili).
    fringe_curtain_use_location:
      name: Hapsuverhon käyttösijainti
      description: Ilmaisee, onko hapsuverho tarkoitettu sisäkäyttöön, ulkokäyttöön
        vai molempiin.
    fringe_trim_style:
      name: Hapsujen leikkaustyyli
      description: Määrittää hapsujen rakenteen/tyylin (miten säikeet tai silmukat
        muodostetaan ja esitetään).
    front_axle_standard:
      name: Etuakseli vakiona
      description: Ilmoittaa akselin halkaisijan ja välin, jolle haarukka on suunniteltu
        (esim. 15 x 110 mm, Boost), mikä varmistaa navan yhteensopivuuden.
    front_button_configuration:
      name: Etunappien konfiguraatio
      description: Ilmoittaa takin etunapituksen ja määrittää, onko kyseessä yksi-
        vai kaksirivinen takki, ja ilmoittaa etunappien määrän.
    front_closure_style:
      name: Etunapitus
      description: Ilmaisee trenssitakin etuosan tyylin, kuten yksi- tai kaksirivinen,
        avoin, kietaisutyylinen tai vetoketjullinen.
    front_decoration_type:
      name: Etuosan koristelutyyppi
      description: Ilmoittaa hatun etuosassa olevan koristeen tai merkin tyypin (esim.
        kirjailtu merkki, nahkamerkki).
    front_point_configuration:
      name: Etupiikkien konfiguraatio
      description: Määrittää etupiikkien rakenteen (yksipiikkinen, kaksipiikkinen,
        modulaarinen, vaihdettava), mikä vaikuttaa tunkeutumistarkkuuteen jäällä ja
        sekamaastossa.
    front_seat_position:
      name: Etuistuimen asento
      description: Mille puolelle / mihin asentoon eturivissä istuin on tarkoitettu.
    front_style:
      name: Etuosan tyyli
      description: Kuvaa chinojen etuosaa ja osoittaa, ovatko housut vekittömät vai
        laskostetut tai onko niissä muita yksityiskohtia.
    frosting_or_icing_type:
      name: Päällyste- tai kuorrutustyyppi
      description: Määrittää kakkuun tai jälkiruokiin levitettävän päällysteen tai
        kuorrutteen tyypin.
    fruit_cultivar_or_variety:
      name: Hedelmän viljelylajike tai lajike
      description: Määrittää hedelmän viljelylajikkeen tai lajikkeen nimen (esim.
        Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Hedelmän leikkaustyyli
      description: Kuvaa, miten hedelmä valmistellaan tai leikataan (esim. kokonainen,
        viipaloitu, kuutioitu).
    fruit_mix_variety:
      name: Hedelmäsekoitus
      description: Ilmoittaa hedelmäsekoituksen teemasekoituksen nimen tai yleisen
        tyypin (esim. trooppinen sekoitus, marjasekoitus).
    fruit_piece_form:
      name: Hedelmäpalan muoto
      description: Kuvaa kuivattujen hedelmäpalojen fyysistä leikkausta tai tarjoilua,
        esim. kokonainen, viipaloitu, jauhettu.
    fruit_snack_form:
      name: Hedelmävälipalan muoto
      description: Luokittelee hedelmävälipalan tarjoilumuodon tai tyylin.
    fruit_topping_format:
      name: Hedelmätäytteen muoto
      description: Kuvaa täytteen fyysistä muotoa, koostumusta tai tyyliä, jotta ostaja
        voi valita kastikkeiden, siirappien, hedelmäpalojen, mehukuulien jne. välillä.
    fruit_variety:
      name: Hedelmälajike
      description: Ilmaisee hedelmäviinin reseptissä, pakkauksessa tai toimituksessa
        ensisijaisesti käytetyn hedelmän (esim. omena, kirsikka, karhunvatukka).
    fuel_cap_gasket_seal_material:
      name: Polttoainesäiliön korkin tiivistemateriaali
      description: Määrittää polttoainesäiliön korkin tiivisteen/O-renkaan materiaalin.
    fuel_cap_locking_mechanism:
      name: Polttoainesäiliön korkin lukitusmekanismi
      description: Ilmaisee lukittuvan polttoainesäiliön korkin lukitustavan.
    fuel_cap_type:
      name: Polttoainesäiliön korkin tyyppi
      description: Määrittää ajoneuvon polttoaineen täyttöaukon korkin toiminnallisen
        tyypin/rakenteen.
    fuel_cap_venting:
      name: Polttoainekorkin ilmanvaihto
      description: Ilmaisee, onko polttoainekorkissa ilmanvaihtoa, ja jos on, ilmanvaihtotavan.
    fuel_filter_features:
      name: Polttoainesuodattimen ominaisuudet
      description: Luettelee polttoainesuodattimen merkittävät toiminnalliset ominaisuudet
        (vedenerotus, tyhjennysventtiili, anturiportti jne.).
    fuel_filter_media_material:
      name: Polttoainesuodattimen suodatinmateriaali
      description: Määrittää polttoainesuodattimen sisällä olevan ensisijaisen suodatinmateriaalin.
    fuel_filter_mounting_connection_type:
      name: Polttoainesuodattimen kiinnitys-/liitäntätyyppi
      description: Määrittää, miten polttoainesuodatin liitetään/asennetaan (kierrettävä,
        pikaliitin, letkukara, banjoliitin jne.).
    fuel_injection_cleaning_method:
      name: Polttoaineen ruiskutusjärjestelmän puhdistusmenetelmä
      description: Osoittaa, miten pakkausta käytetään polttoaineen ruiskutusjärjestelmän
        puhdistamiseen.
    fuel_injector_electrical_connector_type:
      name: Polttoainesuuttimen sähköliittimen tyyppi
      description: Ilmoittaa polttoainesuuttimen sähköliittimen standardin tai muodon.
    fuel_injector_seat_type:
      name: Polttoainesuuttimen istukan tyyppi
      description: Määrittää suuttimen kärjen/istukan liitännän tyylin, jota käytetään
        imusarjan/polttoainekiskon tiivistämiseen.
    fuel_injector_spray_pattern:
      name: Polttoainesuuttimen ruiskutuskuvio
      description: Tunnistaa suuttimen polttoaineen suihkutuskuvion käyttämällä valmistajan
        tai alan terminologiaa (esim. kartio, viuhka, kynäsuihku, monireikäinen).
    fuel_level_sensor_mounting_type:
      name: Polttoainetason anturin asennustyyppi
      description: Määrittää fyysisen kiinnitysliitännän, jota käytetään polttoainetason
        anturin/lähettimen kiinnittämiseen polttoainesäiliöön tai pumppumoduuliin.
    fuel_level_sensor_sensing_mechanism:
      name: Polttoaineen tason anturin tunnistusmekanismi
      description: Määrittää polttoainetason anturin tai anturiyksikön käyttämän tunnistusmenetelmän
        tai -teknologian.
    fuel_line_compliance_standard:
      name: Polttoaineletkun vaatimustenmukaisuusstandardi
      description: Ilmaisee polttoaineletkun täyttämän sääntely- tai alan standardin
        (yleistä merikäyttöön tarkoitetuissa sovelluskohteissa).
    fuel_line_connector_interface_type:
      name: Polttoaineletkun liitäntätyyppi
      description: Määrittää polttoaineletkun tai liittimen päiden liitäntä- tai rajapintatyypit.
    fuel_pressure_regulator_body_material:
      name: Polttoaineen paineensäätimen rungon materiaali
      description: Määrittää säätimen kotelon/rungon materiaalin kestävyyden ja korroosionkestävyyden
        vuoksi.
    fuel_pressure_regulator_mounting_type:
      name: Polttoaineen paineensäätimen asennustyyppi
      description: Määrittää, miten polttoaineen paineensäädin asennetaan, mikä vaikuttaa
        sopivuuteen ja yhteensopivuuteen.
    fuel_pump_inlet_type:
      name: Polttoainepumpun imuaukon tyyppi
      description: Liitäntätyyppi pumpun imuaukossa.
    fuel_pump_mounting_location:
      name: Polttoainepumpun kiinnityksen sijainti
      description: Paikka, johon polttoainepumppu on asennettu ajoneuvon polttoainejärjestelmässä.
    fuel_pump_outlet_connection_type:
      name: Polttoainepumpun ulostulon tyyppi
      description: Määrittää polttoainepumpun ulostulon kytkentätyypin sopivuuden/asennuksen
        yhteensopivuuden varmistamiseksi.
    fuel_system_application:
      name: Polttoainejärjestelmän sovellus
      description: Polttoainetoimitusjärjestelmän rakenne, jota varten polttoainepumppu
        on suunniteltu (esim. kaasutin, EFI, GDI, dieselkäyttöinen nosto-/siirtolaite).
    fuel_system_connection_type:
      name: Polttoainejärjestelmän liitäntätyyppi
      description: Määrittää sarjan kanssa yhteensopivat polttoainejärjestelmän liitäntästandardit
        tai sovitinrajapinnat.
    fuel_system_type:
      name: Polttoainejärjestelmän tyyppi
      description: Määrittää moottorin polttoaineen toimitusjärjestelmän (esim. kaasutin
        tai polttoaineen ruiskutusrakenne).
    fuel_tank_installation_position:
      name: Polttoainesäiliön asennusasento
      description: Määrittää polttoainesäiliön tyypillisen asennuspaikan ajoneuvossa.
    fuel_tank_orientation:
      name: Polttoainesäiliön suunta
      description: Määrittää, onko polttoainesäiliö tarkoitettu asennettavaksi vaakasuoraan
        vai pystysuoraan.
    fuel_tank_shape:
      name: Polttoainesäiliön muoto
      description: Kuvaa polttoainesäiliön yleistä muototekijää/muotoa, mikä tukee
        fyysistä sopivuutta ja vaihtosäiliön yhteensopivuutta.
    fur_type:
      name: Turkistyyppi
      description: Tunnistaa muhvikäsilaukun tai ‑laukun ulkopuolella olevan turkiksen
        lajin tai keinotekoisen materiaalin.
    furniture_finish:
      name: Huonekalujen pintakäsittely
      description: Kuvailee huonekalun pintakäsittelyä tai viimeistelyä, joka vaikuttaa
        sen ulkonäköön ja huoltotarpeisiin.
    fuse_form_factor:
      name: Sulakkeen muototekijä
      description: Määrittää sulakkeen fyysisen tyypin tai liittimen, millä varmistetaan
        sen sopivuus tarkoitettuun liittimeen tai sulakerasiaan (esim. lattasulake
        tai putkisulake).
    fuse_terminal_or_mount_style:
      name: Sulakkeen liitin- tai asennustapa
      description: Määrittää, miten sulake liitetään mekaanisesti/sähköisesti (pistokeliitäntä,
        pulttikiinnitys tai johtoon asennettava).
    fusible_application_method:
      name: Liimautuvan materiaalin levitystapa
      description: Määrittää, miten liimautuva materiaali aktivoidaan/levitetään (esim.
        silityslämmöllä, prässillä, ompeluvahvikkeella).
    fusible_hem_tape_application_method:
      name: Liimautuvan palttausnauhan käyttötapa
      description: Kuvaa, miten teippi aktivoidaan/kiinnitetään (esim. silitysrauta,
        lämpöprässi).
    fusible_seam_tape_activation_method:
      name: Liimautuvan saumanauhan aktivointimenetelmä
      description: Ilmaisee, kuinka liima aktivoituu levityksen aikana.
    fusible_seam_tape_application:
      name: Liimautuvan saumanauhan käyttötapa
      description: Määrittää silitettävän saumateipin ensisijaisen käyttötarkoituksen.
    fusible_seam_tape_material:
      name: Silitettävän saumateipin materiaali
      description: Teipin/verkon/kudoksen materiaali tai koostumus (ei kangas, johon
        se kiinnitetään).
    fusible_seam_tape_washability:
      name: Liimautuvan saumanauhan pestävyys
      description: Osoittaa, pysyykö yhteen liimattu sauma ehjänä pesun tai puhdistuksen
        jälkeen.
    fusible_seam_tape_waterproof_rating:
      name: Liimautuvan saumanauhan vedenpitävyysluokitus
      description: Ilmaisee, onko saumanauha tarkoitettu muodostamaan vedenpitävä
        tai vettä hylkivä sauma kiinnityksen jälkeen.
    fusible_tape_backing_type:
      name: Liimautuvan teipin taustamateriaalin tyyppi
      description: Määrittää, onko teipissä irrokepaperia/‑liuskaa ja minkä muotoinen
        se on, mikä vaikuttaa käsittelyyn ja käyttötapaan.
    futon_frame_conversion_mechanism:
      name: Vuodesohvan rungon mekanismi
      description: Määrittää mekanismin tai rakennetyylin, jota käytetään vaihtamiseen
        sohvan, lepotuolin ja sängyn eri asentojen välillä.
    gaiter_height_type:
      name: Säärystimen pituustyyppi
      description: Luokittelee säärystimet niiden jalan peittävyyspituuden mukaan,
        kuten nilkka, keskisääri, polvipituinen tai reidenpituinen.
    game_variation:
      name: Pelivariaatio
      description: Määrittää pelityylin, jota varten pakkaus on suunniteltu (esim.
        klassinen salkopallo, liekapallo, speedball).
    garlic_preparation_style:
      name: Valkosipulin valmistustyyli
      description: Määrittää, miten valkosipuli on valmistettu tai käsitelty ennen
        myyntiä (esim. kokonainen, murskattu, jauhettu).
    garlic_variety:
      name: Valkosipulilajike
      description: Tunnistaa tarjotun valkosipulin kasvitieteellisen tai kaupallisen
        lajikkeen/viljelylajikkeen.
    garment_back_style:
      name: Vaatteen selkäosan tyyli
      description: Ilmaisee vaatteen selkäosan muotoilun tai rakenteen (esim. avoin
        selkämys, painijanselkä, ristikkäiset olkaimet).
    garment_pattern_type:
      name: Vaatteen kuviotyyppi
      description: Määrittää sen ompelukaavan vaatekappaleen tyypin.
    garnish_type:
      name: Koristetyyppi
      description: Määrittää, mitä koristetta (ainesosaa tai koristetyyliä) käytetään
        cocktailin viimeistelyyn.
    gas_lift_class:
      name: Kaasujousiluokka
      description: Määrittää istuinkorkeuden säätöön käytettävän kaasujousisylinterin
        turvallisuus- ja lujuusluokituksen.
    gas_propellant_type:
      name: Ponnekaasun tyyppi
      description: Määrittää suositellun tai yhteensopivan ponnekaasun tyypin, kun
        ase on kaasukäyttöinen.
    gatta_tabla_tuning_block_material:
      name: Gattan (tablan virityspala) materiaali
      description: Virityshihnan ja rungon välissä käytettyjen virityspalojen (gatta)
        materiaali.
    gauge_mounting_type:
      name: Mittarin kiinnitystyyppi
      description: Polttoainemittarin asennus vesikulkuneuvoon.
    gauge_style:
      name: Mittarin tyyli
      description: Määrittää pumpun käyttämän painemittarin tyypin, kuten analoginen
        taulu, digitaalinen lukema tai ei mitään.
    gear_oil_api_classification:
      name: Vaihteistoöljyn API-luokitus
      description: Tasauspyörästöissä/manuaalivaihteistoissa käytettävien vaihteistoöljyjen
        API GL ‑luokitus.
    gel_wax_density_grade:
      name: Geelivahan tiheysluokka
      description: Ilmaisee geelivahan tiheysluokan, joka vaikuttaa kirkkauteen, tuoksuun
        ja soveltuvuuteen koristekappaleiksi.
    gel_wax_transparency_level:
      name: Geelivahan läpinäkyvyystaso
      description: Kuvaa geelivahan kirkkautta/peittävyyttä, kun sitä käytetään käyttötarkoituksen
        mukaisesti.
    gelatin_form:
      name: Gelatiinin muoto
      description: Antaa yksityiskohtaista tietoa gelatiinin fyysisestä olemuksesta,
        jotta käyttäjät voivat valita oikean muodon resepteihin ja teollisiin käyttökohteisiin.
    gelatin_or_gelling_agent_source:
      name: Gelatiinin tai hyytelöimisaineen lähde
      description: Ilmaisee tuotteessa käytetyn hyytelöimisaineen alkuperän tai tyypin,
        mikä on tärkeää ruokavalion ja uskonnollisten näkökohtien kannalta.
    gelatin_source:
      name: Gelatiinin lähde
      description: Ilmaisee gelatiinin eläin-, kasvi- tai synteettisen alkuperän,
        jotta ostajat voivat varmistaa yhteensopivuuden ruokavalion, eettisten tai
        uskonnollisten vaatimusten kanssa.
    gelling_agent:
      name: Hyytelöimisaine
      description: Yksilöi ensisijaisen aineen, jota käytetään jälkiruoan hyydyttämiseen
        tai sakeuttamiseen; tärkeä ruokavalioon sopivuuden ja koostumuksen vuoksi.
    gemstone_clarity_grade:
      name: Jalokivien kirkkausaste
      description: Jalokiven puhtausluokka (jos luokiteltu).
    gemstone_creation_method:
      name: Jalokiven valmistusmenetelmä
      description: Ilmaisee, onko jalokivi luonnollinen, laboratoriovalmisteinen vai
        jäljitelmä/simulantti.
    gemstone_cut_style:
      name: Jalokiven hiontatyyli
      description: Kuvaa jalokiven hiontatyyliä/viimeistelyä.
    gemstone_treatment_status:
      name: Jalokiven käsittelyn tila
      description: Ilmaisee, onko jalokiveä käsitelty/parannettu ja miten.
    geological_period:
      name: Geologinen aikakausi
      description: Fossiilin geologinen kausi (ja valinnaisesti epookki), kun se on
        tiedossa (esim. jurakausi, liitukausi, eoseenikausi).
    gift_box_tin_insert_type:
      name: Lahjarasian/‑purkin välikappaleen tyyppi
      description: Sisäosan välikappaleiden avulla voit järjestää tai suojata rasiassa
        tai purkissa olevia tuotteita.
    gift_box_tin_sustainability_features:
      name: Lahjarasian/‑purkin kestävyysominaisuudet
      description: Lahjapakkauksen tai rasian vastuullisuuteen liittyvät ominaisuudet.
    gift_box_tin_window_type:
      name: Lahjarasian/-purkin ikkunan tyyppi
      description: Onko lahjarasiassa ikkuna ja minkälainen se on.
    gift_message_option:
      name: Lahjan viestin vaihtoehto
      description: Määrittää, voiko lahjan mukaan laittaa viestin ja miten (ei mitään,
        sisällytetään, muokattavissa).
    ginger_maturity:
      name: Inkiväärin kypsyys
      description: Ilmaisee inkiväärin sadonkorjuuvaiheen, kuten nuori tai kypsä,
        mikä vaikuttaa maun voimakkuuteen ja suositeltuihin käyttötarkoituksiin ruoanlaitossa.
    ginger_variety:
      name: Inkiväärilajike
      description: Määrittää inkiväärilajikkeen, tyypin tai muun inkiväärikasvien
        heimoon kuuluvan juurakon, joiden avulla makuprofiilit ja kulinaariset käyttötavat
        voidaan erottaa toisistaan.
    glass_kiln_controller_type:
      name: Lasiuunin säätölaitteen tyyppi
      description: Uunin toimitukseen sisältyvän lämpötilan/polton säätölaitteen tyyppi.
    glass_kiln_firing_application:
      name: Lasiuunin polton käyttötapa
      description: Polttouunin pääasialliset käyttökohteet.
    glass_stone_application_method:
      name: Lasikiven käyttötapa
      description: Määrittää, miten lasikivet on tarkoitus kiinnittää projekteihin
        (esim. liima, kuumakiinnitys, ommeltava).
    glass_tint:
      name: Lasin sävytys
      description: Pullossa käytetty lasi-/muovisävytys valolle altistumisen hallitsemiseksi
        (yleistä oluenpanossa/viininvalmistuksessa).
    glaze_firing_atmosphere:
      name: Uunin ilmakehä lasituspoltossa
      description: Polttoilmakehä(t), jota varten lasite on suunniteltu.
    glaze_opacity:
      name: Lasitteen läpinäkyvyys
      description: Kuinka läpinäkyvältä lasite näyttää polton jälkeen.
    glaze_product_form:
      name: Lasitetuotteen muoto
      description: Fyysinen olomuoto, jossa lasitetuote toimitetaan (esim. neste,
        kuiva jauhe, tiiviste, suihke).
    glider_avionics_package:
      name: Purjelentokoneen mittaristopaketti
      description: Ilmaisee purjelentokoneeseen asennetun suunnistuslaitteiden ja
        lentomittarien yleistason.
    glider_certification_rating:
      name: Purjelentokoneen sertifiointiluokitus
      description: Virallinen sertifiointiluokka, joka osoittaa purjelentokoneen turvallisuus-
        ja tehokkuustason (esim. EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Purjelentokoneen laskutelineiden kokoonpano
      description: Määrittää purjeliitokoneen laskutelineiden kokoonpanon.
    glider_launch_method:
      name: Purjelentokoneen hinausmenetelmä
      description: Määrittää, miten purjelentokone tyypillisesti hinataan ilmaan tai
        onko se omatoimisesti lentoonlähtökykyinen.
    glider_performance_class:
      name: Purjelentokoneen suorituskykyluokka
      description: Purjelentokoneiden yleisesti käytetty kilpailu- tai tehokkuusluokka
        tai ‑kategoria.
    glitter_application_method:
      name: Glitterin levitysmenetelmä
      description: Ilmaisee suunnitellun tekniikan askartelukimalteen levittämiseen
        tai käyttöön (esim. sirotteleminen/ravisteleminen, sekoittaminen, hierominen,
        levittäminen liiman päälle, levittäminen siveltimellä, suihkuttaminen, lämpökiinnitys
        tai kohokuviointi).
    glitter_eco_friendly_claim:
      name: Glitterin ympäristöystävällisyysväite
      description: Irtokimallevalmisteille ominaiset ympäristö-/ekoväittämät.
    glitter_effect_type:
      name: Kimalletehosteen tyyppi
      description: Kuvailee kimalteen tai paljettien visuaalista vaikutusta perusvärin
        lisäksi (esim. holografinen, hohtava).
    glitter_glue_base_solvent_type:
      name: Glitterliiman pohja- tai liuotintyyppi
      description: Kuvailee kimalleliiman ensisijaista pohjaa (yleinen ostajan huolenaihe
        puhdistettavuuden ja materiaalien yhteensopivuuden suhteen).
    glitter_opacity_coverage:
      name: Glitterin peittävyys/peittokyky
      description: Ilmaisee, kuinka läpinäkymättömältä kimallustehoste näyttää levitettynä.
    glitter_use_suitability:
      name: Kimalteen käyttökelpoisuus
      description: Ilmaisee kimallejauheen ensisijaisen suunnitellun tai hyväksytyn
        käyttötarkoituksen (esim. vain askartelu, kosmeettinen käyttö / vartalolle
        sopiva tai elintarvikekäyttöön sopiva).
    glove_armor_placement:
      name: Hanskasuojan sijoitus
      description: Yksilöi suojapanssarin sijainnin käsineessä.
    glove_cuff_length:
      name: Hanskan ranteen pituus
      description: Kilpa-ajokäsineen ranteen tai kyynärvarren peittävä pituus.
    glove_finger_coverage:
      name: Käsineen sormien peittävyys
      description: Kuvailee hanskan tarjoamaa sormien peittävyyttä, joka vaihtelee
        kokosormisista sormettomiin malleihin.
    glove_finger_design:
      name: Käsineen sormien muotoilu
      description: Määrittää hanskan sormien määrän, kuten viisisorminen tai lapanen.
    glove_fit_profile:
      name: Hanskan istuvuusprofiili
      description: Kuvailee käsineen sisämuodon ja yleisen siluetin, joiden perusteella
        pelaajat voivat valita itselleen mieluisan tuntuman.
    glove_insulation:
      name: Hanskan eristys
      description: Määrittää käsineen eristyksen tai vuorauksen rakenteen tai lämmitysominaisuudet
        (esimerkiksi eristystaso, vuori-/eristysteknologia tai lämmitystyyppi).
    glove_palm_material:
      name: Hanskan kämmenen materiaali
      description: Määrittää hanskan kämmenessä käytetyn päämateriaalin (ensisijainen
        kontakti-/tarttumapinta), joka voi poiketa kämmenselän materiaalista.
    glove_size:
      name: Käsineen koko
      description: Ilmaisee yleisen käsikoon, johon sopivaksi hanskat on suunniteltu,
        mikä ilmaistaan usein vaatteiden tyylisillä kokokoodeilla tai nuorten mitoituksella.
    glove_webbing_style:
      name: Hanskan verkko-osan tyyli
      description: Määrittää hanskan verkko-osan tai taskun muotoilun, joka vaikuttaa
        pallonhallintaan, pelipaikan sopivuuteen ja pelaajan mieltymyksiin.
    glow_effect:
      name: Hohtotehoste
      description: Ilmaisee, onko geelikuulissa pimeässä hohtavia tai valojuovia muodostavia
        ominaisuuksia hämärässä pelatessa.
    glow_plug_connector_type:
      name: Hehkutulpan liitintyyppi
      description: Hehkutulpan sähköliittimen tyyppi, jolla se kytketään ajoneuvon
        johtosarjaan.
    glow_plug_heating_element_type:
      name: Hehkutulpan lämmityselementin tyyppi
      description: Hehkutulpan lämmityselementin tyyppi/teknologia.
    glue_application_format:
      name: Liiman levitysmuoto
      description: Määrittää koululiiman annostelu- tai levitystavan.
    glue_applicator_type:
      name: Liimanlevittimen tyyppi
      description: Määrittää nestemäisen liiman levittämiseen käytettävän sisäänrakennetun
        levittimen/annostelukärjen tyylin.
    glue_base_formulation:
      name: Liimapohjainen koostumus
      description: Määrittää nestemäisen askarteluliiman ensisijaisen kemiallisen
        tai peruskoostumuksen (tehokkuus-, turvallisuus- ja puhdistusodotusten osalta).
    glue_gun_nozzle_style:
      name: Liimapistoolin suuttimen tyyppi
      description: Määrittää liimapistoolin fyysisen suuttimen tyypin, joka vaikuttaa
        käyttötarkkuuteen ja liiman peittävyyteen.
    glue_safety_standard:
      name: Liiman turvallisuusstandardi
      description: Osoittaa, onko liima myrkytöntä tai turvallista lapsille etiketin
        ja yleisten standardien mukaisesti.
    goal_frame_material:
      name: Maalin rungon materiaali
      description: Määrittää maalitolppien ja rungon materiaalin, joka vaikuttaa painoon,
        siirrettävyyteen ja säänkestävyyteen.
    goal_size:
      name: Maalin koko
      description: Luokittelee jalkapallomaalin ryhmiin yleisen sääntelyn tai harjoituskoon
        perusteella, mikä mahdollistaa valinnan karkeita mittoja nopeammin.
    goal_size_classification:
      name: Maalin kokoluokitus
      description: Ilmaisee maalin standardoidun kokoluokan (esim. sääntöjen mukainen
        täyskoko, nuoriso, mini), jotta käyttäjät voivat nopeasti valita pelitasolleen
        sopivat varusteet.
    goal_size_standard:
      name: Maalin kokostandardi
      description: Osoittaa, minkä virallisen tai ikäryhmän standardin maali täyttää
        (esim. World Aquatics ‑säännöt, 12U).
    goalie_configuration:
      name: Maalivahtien kokoonpano
      description: Ilmaisee taulukossa joukkuetta kohden määritettyjen maalivahtien
        määrän (amerikkalainen 3 maalivahdin tyyli tai eurooppalainen 1 maalivahdin
        tyyli).
    goalie_playing_surface:
      name: Maalivahdin pelipinta
      description: Määrittää ensisijaisen pelipinnan tai ympäristön, johon jääkiekkomaalivahdin
        varusteet on suunniteltu.
    goalkeeper_glove_cut:
      name: Maalivahdin hanskojen leikkaus
      description: Ilmaisee maalivahdin hanskojen kämmenen/sormien rakenteen (leikkauksen),
        joka vaikuttaa istuvuuteen, pallotuntumaan ja hallintaan.
    goalkeeper_training_aid_type:
      name: Maalivahdin harjoitteluvälineen tyyppi
      description: Määrittää maalivahdin harjoitteluapuvälineen tyypin ja mahdollistaa
        tarkan suodatuksen.
    goblet_drum_playing_style:
      name: Darbukarummun soittotyyli
      description: Onko soitin suunniteltu ensisijaisesti käsin soittamiseen vai käytettäväksi
        kapuloiden tai nuijien kanssa.
    gobo_format:
      name: Gobon muoto
      description: Määrittää projektoriin sopivan gobon koon tai standardin (halkaisija
        ja paksuudet), mikä varmistaa yhteensopivuuden vaihdettavien tai mukautettujen
        gobojen kanssa.
    gobo_root_variety:
      name: Isotakiaisen juuren lajike
      description: Määrittää isotakiaisen juuren tietyn viljelylajikkeen tai lajikkeen.
    gobo_rotation:
      name: Gobon kierto
      description: Määrittää, voiko gobo kiertää ja mihin suuntaan.
    goggle_accessory_type:
      name: Suojalasien oheisvarusteen tyyppi
      description: Luokittelee lisävarusteen tyypin (esimerkiksi suojus, kotelo, hihna),
        jotta ostajat voivat suodattaa tuotevalikoimaa tässä yläkategoriassa.
    goggle_features:
      name: Suojalasien ominaisuudet
      description: Listaa suojalasien erityiset toiminnalliset tai muotoiluominaisuudet.
    goggle_fit_design:
      name: Suojalasien istuvuus
      description: Kuvailee suojalasien suunniteltua istuvuutta tai käyttötapaa, mukaan
        lukien yhteensopivuus silmälasien päällä.
    goggle_gasket_material:
      name: Suojalasien tiivistemateriaali
      description: Kasvoja vasten olevan tiivisteen materiaali, joka vaikuttaa käyttömukavuuteen,
        allergiariskeihin ja vuotojen ehkäisyyn.
    goggle_integration:
      name: Suojalasien saumaton istuvuus
      description: Onko kypärä suunniteltu käytettäväksi suojalasien kanssa ja/tai
        sisältääkö se integroidut ominaisuudet suojalasien kiinnittämiseen.
    goggle_lens_shape:
      name: Suojalasien linssien muoto
      description: Määrittää vaihtolinssin kaarevuusprofiilin, joka vaikuttaa vääristymiin
        ja näkökenttään (esimerkiksi lieriömäinen, pallomainen, toorinen).
    goggle_lens_tint:
      name: Suojalasien linssien sävytys
      description: Määrittää linssin sävyn tai viimeistelyn, joka vaikuttaa valonläpäisyyn,
        värien havaitsemiseen ja ulkonäköön.
    goggle_strap_material:
      name: Suojalasien hihnojen materiaali
      description: Päähihnan ensisijainen materiaali, joka vaikuttaa kestävyyteen
        ja käyttömukavuuteen.
    golf_accessory_set_purpose:
      name: Golfvarustesetin tarkoitus
      description: Ilmaisee golfvarustesetin ensisijaisen käyttötarkoituksen tai teeman.
    golf_bag_style:
      name: Golflaukun tyyli
      description: Ilmaisee golflaukun ensisijaisen muotoilun tai käyttötavan (esim.
        jalusta, golfauto, henkilöstö).
    golf_ball_alignment_design:
      name: Golfpallon kohdistuskuvio
      description: Määrittää kaikki pallon pintaan painetut tai upotetut visuaaliset
        kohdistuksen apuvälineet.
    golf_ball_construction:
      name: Golfpallon rakenne
      description: Määrittää golfpallon rakenteessa käytettyjen kerrosten/palojen
        määrän, joka vaikuttaa kierteeseen, tuntumaan ja etäisyyteen.
    golf_ball_cover_material:
      name: Golfpallon kuorimateriaali
      description: Määrittää golfpallon kuorimateriaalin, joka vaikuttaa kierteeseen,
        kestävyyteen ja tuntumaan.
    golf_cart_cover_climate_use:
      name: Golfauton suojapeitteen käyttö
      description: Ilmaisee ensisijaisen ilmaston/vuodenajan olosuhteet, jotka suojapeite
        on suunniteltu kestämään.
    golf_cart_enclosure_fit_type:
      name: Golfauton suojan istuvuus
      description: Määrittää, onko kotelo suunniteltu tietylle istuinmäärälle/muototekijälle
        vai tarjoaako se yleisen/säädettävän istuvuuden.
    golf_cart_intended_use:
      name: Golfauton käyttötarkoitus
      description: Ensisijainen käyttötarkoitus, jota varten golfauto on suunniteltu
        tai määritetty.
    golf_club_number:
      name: Golfmailan numero
      description: Yksilöi mailaan merkityn numeron tai wedge-tyyppimerkinnän (esimerkiksi
        5, PW, GW).
    golf_club_part_type:
      name: Golfmailan osan tyyppi
      description: Luokittelee golfmailan lisävarusteen tai komponentin yleisiin alatyyppeihin
        (esim. sovitinholkki, holkki, paino).
    golf_grip_size:
      name: Golfmailan kahvan koko
      description: Määrittää golfmailan kahvan ulkoisen kokoluokan ja osoittaa, kuinka
        paksulta kahva tuntuu kädessä.
    golf_shoe_spike_type:
      name: Golfkengän piikkien tyyppi
      description: Yksilöi golfkenkien ulkopohjan pitojärjestelmän tyypin (esim. piikkinen
        tai piikitön malli).
    golf_tee_style:
      name: Golftiin tyyli
      description: Kuvailee golftiin rakenteellista tai toiminnallista tyyliä/muotoilua,
        joka vaikuttaa pallon korkeuteen, kestävyyteen tai kierteen vähentämiseen.
    golf_training_focus:
      name: Golfharjoittelun painopiste
      description: Luokittelee ensisijaisen taidon tai osa-alueen, jota tuotteen on
        tarkoitus parantaa.
    golf_training_objective:
      name: Golfharjoittelun tavoite
      description: Määrittää ensisijaisen golftaidon tai golfiin liittyvän näkökulman,
        jota harjoittelun apuvälineen on tarkoitus parantaa.
    gong_profile_type:
      name: Gongin profiilin tyyppi
      description: Kuvaa oopperagongin fyysistä profiilia (esim. litteä tai kohotettu
        keskusta), joka vaikuttaa voimakkaasti sointiin ja soittotyyliin.
    grading_scale:
      name: Arviointiasteikko
      description: Luokiteltujen sijoituskolikoiden luokitteluskaala (esim. Sheldon
        1–70).
    grading_service:
      name: Luokittelupalvelu
      description: Kolmannen osapuolen tarjoama kolikoiden tai setelien luokittelu-/sertifiointipalvelu
        (esim. PCGS, NGC).
    graduation_increment:
      name: Kokojen porrastus
      description: Määrittää saumanmitan skaalan pienimmän painetun/kaiverretun jaon
        (merkintöjen tarkkuus)
    grain_processing_method:
      name: Viljan käsittelymenetelmä
      description: Määrittää viljan ensisijaisen käsittelymenetelmän (esim. esikeitetty,
        murskattu, idätetty), joka vaikuttaa kypsennysaikaan, rakenteeseen ja ravintoarvoihin.
    grand_piano_soundboard_material:
      name: Flyygelin kaikupohjan materiaali
      description: Pianon kaikupohjan ensisijainen materiaali, joka vaikuttaa äänenväriin
        ja kestävyyteen.
    grappling_dummy_pose:
      name: Paininuken asento
      description: Kuvailee nuken oletusasennon/ryhdin ja määrittää, mitä harjoituksiin
        ja tekniikoihin se sopii.
    grease_application:
      name: Voiteluaineen käyttäminen
      description: Määrittää ajoneuvon komponentin tai käyttötarkoituksen, johon rasva
        on ensisijaisesti tarkoitettu.
    grease_consistency_grade_nlgi:
      name: Voiteluaineen konsistenssiluokka (NLGI)
      description: Määrittää voiteluaineen kiinteyden ilmaisevan NLGI-konsistenssiluvun
        (esim. NLGI 2 on yleinen ja monikäyttöinen).
    grease_thickener_type:
      name: Voiteluaineen sakeuttajan tyyppi
      description: Ilmaisee voiteluaineen koostumuksessa käytetyn sakeuttamisaineen/saippuajärjestelmän.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Great Highland ‑säkkipillit, puhallusputkiventtiilin tyyppi
      description: Määrittää puhallusputkessa käytetyn takaiskuventtiilijärjestelmän.
    great_highland_bagpipes_drone_configuration:
      name: Great Highland ‑säkkipillin bordunaputket
      description: Määrittää sarjaan kuuluvien droonien tyypit.
    great_highland_bagpipes_mounting_material:
      name: Great Highland ‑säkkipillin kiinnitysmateriaali
      description: Määrittää säkkipillien koristeellisten kiinnitysten materiaalin
        (esim. nikkelihopea, norsunluun jäljitelmä).
    greens_maturity_stage:
      name: Lehtivihannesten kypsyysaste
      description: Ilmaisee vihannesten kehitysvaiheen satoa korjattaessa.
    greens_preparation_state:
      name: Vihannesten valmistelutila
      description: Kuvailee, miten lehtivihannekset käsitellään tai pakataan (esim.
        esipestyt, pilkotut, syömävalmiit).
    grenade_effect_type:
      name: Kranaatin vaikutustyyppi
      description: Ilmaisee paintball-kranaatin aktivoitumisen jälkeen tuottaman ensisijaisen
        toiminnallisen vaikutuksen (esim. savu, maali, välähdys).
    grid_unit:
      name: Ruudukon mittajärjestelmä
      description: Mattoon painettu ensisijainen mittajärjestelmä (jos ruudukko/asteikko
        on olemassa).
    grille_emblem_provision:
      name: Säleikön tunnuksen varustaminen
      description: Määrittää, voiko säleikköön laittaa OEM-tunnuksen/‑merkin ja miten.
    grille_mounting_method:
      name: Säleikön asennusmenetelmä
      description: Määrittää, miten säleikkö asennetaan ajoneuvoon (esimerkiksi suora
        vaihto-osa tai lisäosa/päällyste; pulttikiinnitys tai klipsi-/napsautuskiinnitys;
        vaatiiko poraamista vai ei).
    grille_style:
      name: Säleikön tyyli
      description: Määrittää ajoneuvon säleikön visuaalisen tyylin/muotoilun.
    grip_chalk_form:
      name: Magnesian muoto
      description: Määrittää pussin kanssa toimitettavan tai käytettävän magnesian
        fyysisen muodon.
    grip_coverage:
      name: Pitokyky
      description: Määrittää silikoni- tai kumipinnoitettujen pitoelementtien olemassaolon
        ja sijainnin sukassa.
    grip_design:
      name: Otemuotoilu
      description: Määrittää levypainon kahva- tai reikäkokoonpanon, joka helpottaa
        kantamista ja lisää harjoittelun monipuolisuutta.
    grip_enhancer_effect:
      name: Pitoa parantavan tuotteen vaikutus
      description: Kuvailee tuotteen ensisijaisen suorituskykyominaisuuden (esimerkiksi
        kosteuden imeyttäminen tai pitävä hartsiviimeistely).
    grip_enhancer_form:
      name: Otteenvahvistimen muoto
      description: Määrittää pitoa parantavan tuotteen fyysisen muodon tai formaatin,
        jotta urheilijat voivat valita sopivan käyttötavan.
    grip_features:
      name: Pito-ominaisuudet
      description: Ilmaisee sisäänrakennetut ote-/kahvaominaisuudet, joiden tarkoituksena
        on parantaa pitoa, mukavuutta tai hallittavuutta pelin aikana.
    grip_material:
      name: Pitopinnan materiaali
      description: Ilmaisee housujen pitopinnan materiaalin.
    grip_shape:
      name: Kahvan muoto
      description: Kuvailee kahvan poikkileikkausmuotoa tai tyyliä, erityisesti puttausmailojen
        kahvan osalta.
    grip_surface_type:
      name: Pinnan otetyyppi
      description: Kuvailee polkimen kulutuspinnan/pitopinnan rakennetta, joka vaikuttaa
        pitoon ja tuntumaan.
    grip_tackiness_level:
      name: Otteen pitävyystaso
      description: Arvioi otepinnan pitävyyttä ja auttaa pelaajia valitsemaan kuivan
        tuntuman ja erittäin pitävän hallinnan välillä.
    grip_tape_form:
      name: Tartuntateipin muoto
      description: Osoittaa pitoteippituotteen toimitusmuodon (esim. arkki, rulla,
        ruiskutettava pakkaus).
    grip_wax_form:
      name: Pitovoiteen muoto
      description: Luokittelee pitovoiteen myyntimuodon.
    gripper_coverage:
      name: Tarttujan pito
      description: Määrittää liukumattoman kengän (tukikengän) pitotyypin ja ilmaisee
        pinnan peittävyyden ja irrotettavuuden.
    grommet_application_material:
      name: Vahvikerenkaan käyttömateriaali
      description: Ensisijaiset materiaalit, joihin vahvikerenkaat on tarkoitus asentaa
        (esim. kangas, nahka, vinyyli, pressu/purjekangas).
    grommet_duty_rating:
      name: Vahvikerenkaan lujuusluokitus
      description: Ilmaisee vahvikerenkaan suunnitellun lujuus- tai käyttöluokan.
    grommet_style:
      name: Vahvikerenkaan tyyppi
      description: Vahvikerenkaan rakenne (kokoamis-/käyttötapa).
    grooming_glove_texture_type:
      name: Hoitokäsineen pintakuvioinnin tyyppi
      description: Määrittää ensisijaisen pintarakenteen, jota käytetään hoitamiseen,
        ja ilmaisee suunnitellun käyttötarkoituksen, kuten hankaaminen, kiillotus
        tai pesu.
    groove_orientation:
      name: Uran suunta
      description: Kuvailee instrumentin urien tai harjanteiden suunnan/asettelun.
    groove_sampler_onboard_effects:
      name: Grooveboksin sisäiset efektit
      description: Ilmaisee grooveboksissa (insert/master) käytettävissä olevien sisäänrakennettujen
        efektien prosessointikategoriat, kuten kaiku, viive, pakkaus, särö, taajuuskorjain
        ja suodatus.
    groove_sampler_storage_expansion_type:
      name: Grooveboksin tallennustilan laajennustyyppi
      description: Määrittää grooveboksien kanssa käytettävät irrotettavat/laajennettavat
        tallennusmahdollisuudet.
    ground_attachment_method:
      name: Kiinnitysmenetelmä maahan
      description: Kuvaa, miten syöttökaari on kiinnitetty pelipintaan, mikä vaikuttaa
        vakauteen ja pinnan yhteensopivuuteen.
    groupset_components_included:
      name: Mukana tulevat osasarjan osat
      description: Luettelee ryhmäsarjaan sisältyvät voimansiirron osat, jotta asiakkaat
        ymmärtävät paketin sisällön.
    gt_racing_class:
      name: GT-kilpaluokka
      description: Määrittää GT-kategorian tai -luokan, johon auto on rakennettu tai
        luokiteltu.
    guard_construction_type:
      name: Suojuksen rakennetyyppi
      description: Onko kyseessä kovakuorinen suojus, pehmeä suojapaneeli vai hiha-
        tai hihnamainen suoja.
    guard_size_measurement_basis:
      name: Suojuksen koon mittausperuste
      description: Mihin mittaan koko perustuu (esim. kyynärpään ympärysmitta, ranteen
        ympärysmitta tai kyynärvarren ympärysmitta).
    guard_style:
      name: Suojuksen tyyli
      description: Luokittelee luistimen teräsuojan rakenteen tai tyypin, mikä auttaa
        ostajia erottamaan nopeasti toisistaan kovat kävelysuojat, pehmeät suojat,
        jousikiinnitteiset suojat ja muut mallit.
    guava_flesh_color:
      name: Guavan hedelmälihan väri
      description: Ilmaisee guavan sisäisen hedelmälihan värin.
    guava_variety:
      name: Guavalajike
      description: Määrittää myytävän guavan tarkan jalostus- tai markkinalajikkeen
        (esim. omenaguava, Mexican cream, thaimaalainen, vaaleanpunainen, siemenetön
        tai valkoinen).
    guide_material:
      name: Vaparenkaiden materiaali
      description: Vavan vaparenkaisiin tai insertteihin käytetty materiaali.
    guide_type:
      name: Renkaan tyyppi
      description: Määrittää onkivapaan kiinnitettyjen vaparenkaiden tyylin, kuten
        yksijalkainen, rulla tai snake.
    guideline_markings:
      name: Ohjemerkinnät
      description: Syöttömaton pintaan painetut tai upotetut visuaaliset kohdistusmerkinnät
        syöttöharjoitusten helpottamiseksi.
    guiro_scraper_material:
      name: Guiron raaputtimen materiaali
      description: Mukana tulevan tai suositellun guiron kanssa käytettävän raaputtimen
        tai soittotikun materiaali.
    guiro_surface_style:
      name: Guiro-soittimen pinnan tyyli
      description: Kuvaa soittopinnan kuviota tai geometriaa, jota raaputetaan äänen
        tuottamiseksi.
    guitar_body_finish_type:
      name: Kitaran rungon viimeistelytyyppi
      description: Määrittää kitaran rungossa käytetyn viimeistelyn.
    guitar_bridge_system_type:
      name: Kitaran tallajärjestelmän tyyppi
      description: Tallan/kieltenpitimen rakenteellinen tuoteperhe yhteensopivuutta
        ja selaamista varten.
    guitar_case_style:
      name: Kitarakotelon tyyli
      description: Määrittää kitarakotelon tai keikkalaukun yleisen suojaustason tai
        rakennetyylin.
    guitar_humidifier_placement:
      name: Kitarankostuttimen sijoittelu
      description: Määrittää kostuttimen suunnitellun käyttö- tai sijoituspaikan suhteessa
        laitteeseen tai ympäristöön.
    guitar_pedal_i_o_configuration:
      name: Kitarapedaalin I/O-kokoonpano
      description: Ilmaisee, tukeeko pedaali mono- vai stereotulo/‑lähtöreititystä.
    guitar_pedal_output_connector_type:
      name: Kitarapedaalin lähdön liitintyyppi
      description: Määrittää pedaalin käyttämän audiolähdön liitintyypin.
    guitar_slide_finish:
      name: Kitaran sliden viimeistely
      description: Sliden pinnan viimeistely, joka vaikuttaa kielten tuntumaan ja
        kitkaan.
    guitar_slide_style:
      name: Kitaran slideputken tyyli
      description: Määrittää kitaran sliden tai äänipalkin muototekijän ja käyttötavan.
    guitar_stand_type:
      name: Kitaratelineen tyyppi
      description: Määrittää kitaratelineen ensisijaisen muototekijän (miten se tukee/pitelee
        kitaraa).
    guitar_strap_attachment_type:
      name: Kitaran hihnan kiinnitystyyppi
      description: Määrittää, miten hihna kiinnittyy kitaraan (tai hihnatappeihin),
        mukaan lukien käytetäänkö perinteisiä kiinnityspäitä vai pikakiinnitysjärjestelmiä.
    guitar_strap_end_material:
      name: Kitaran hihnan pään materiaali
      description: Hihnanpäissä (osat, jotka kiinnitetään hihnatappeihin tai hihnanlukitusjärjestelmiin)
        käytetty materiaali.
    guitar_strap_features:
      name: Kitaran hihnan ominaisuudet
      description: Kitaran hihnan tärkeät toiminnalliset ominaisuudet (muut kuin peruskoko
        tai perusmateriaali – monivalinta).
    guitar_string_coating:
      name: Kitaran kielten pinnoite
      description: Ilmaisee, onko kielissä suojapinnoite ja jos on, pinnoitteen tyypin.
    guitar_string_gauge_type:
      name: Kitaran kielten paksuus
      description: Akustisen kitaran kielisetin markkinoitu paksuusluokka (esim. erittäin
        ohut, ohut, keskivahvuinen). Arvioidaan usein korkea E ‑paksuuden perusteella;
        tarkat paksuudet voivat vaihdella valmistajan mukaan.
    guitar_string_set_gauge_category:
      name: Kitaran kielisarjan paksuusluokka
      description: Yleisesti markkinoidut paksuussarjat kitaran kieliseteille (tyypillisesti
        johdettu korkea E / 1. ‑kielestä).
    guitar_string_winding_type:
      name: Kitaran kielten viritystyyppi
      description: Määrittää kielisarjan punottujen kielten pintarakenteen (punoksen
        tyypin).
    guitar_tuning_peg_button_shape:
      name: Kitaran viritysnupin muoto
      description: Viritysavaimen/‑nupin muoto/tyyli.
    guitar_tuning_peg_configuration:
      name: Kitaran viritysnupin kokoonpano
      description: Virityskoneistojen asettelu lavassa.
    guitar_tuning_peg_mounting_style:
      name: Kitaran viritysnupin kiinnitystyyppi
      description: Virityskoneiston kiinnitystapa lapaan (holkkityyppi ja kiertymisen
        estotapa).
    guitar_tuning_peg_shaft_type:
      name: Kitaran viritysnupin akselin tyyppi
      description: Onko kielen tappi umpinainen vai jaettu, ja miten kieli on kiinnitetty.
    guitar_tuning_peg_style:
      name: Kitaran viritysnupin tyyli
      description: Fyysisen virityskoneiston/‑nupin tyyppi ja kiinnitystapa soittimen
        lavassa (esim. umpimallinen vai avoin, lukittava, jaettu).
    gum_condition:
      name: Huopien tila
      description: Postimerkin liiman tila/status kääntöpuolella (esim. alkuperäinen
        liimoite, hieman liimoitetta, ei liimoitetta).
    gun_action_type:
      name: Aseen toimintatyyppi
      description: Lataus- ja laukaisumekanismin tyyppi (esim. pulttilukko, vipulukko).
    gun_operational_status:
      name: Aseen käyttökunto
      description: Ilmaisee, onko keräilyase deaktivoitu tai tehty ampumakelvottomaksi
        (ja miten se on esillä).
    gun_type:
      name: Aseen tyyppi
      description: Määrittää antiikkiaseen yleisen ampuma-aseen muototekijän.
    gusset_material:
      name: Haarakiilan materiaali
      description: Määrittää haara-/kiilaosan vuorissa käytetyn materiaalin, joka
        vaikuttaa hengittävyyteen, hygieniaan ja mukavuuteen.
    gymnastics_discipline:
      name: Voimistelulaji
      description: Määrittää voimistelutyypin, johon tuote on tarkoitettu (esim. taiteellinen,
        rytminen, akrobaattinen).
    hair_extension_texture:
      name: Hiustenpidennysten rakenne
      description: Kuvailee hiustenpidennysten kiharaa, aaltoa tai tekstuuria.
    hair_net_style:
      name: Hiusverkon tyyli
      description: Määrittää hiusverkon muotoilun tai rakenteen (esim. suojahuppu,
        hiusverkko, nutturaverkko).
    hair_quality_grade:
      name: Hiusten laatuluokka
      description: Ilmaisee hiuksille määritettyjä toimialan laatu-/alkuperämerkintöjä.
    halter_style:
      name: Pitimen tyyppi
      description: Tunnistaa riimun toiminnallisen tyylin tai muotoilun (esim. köysi,
        irrotettava, näyttely) ja auttaa ostajaa valitsemaan käyttötarkoitukseensa
        sopivan riimun.
    hammock_style:
      name: Riippumaton tyyli
      description: Kuvaa riippumaton rakennetta tai tyyliä.
    hand_and_foot_coverage:
      name: Käsien ja jalkojen suojukset
      description: Kuvaa kiinnitettyjä tai irrotettavia lapasia ja tossuja, jotka
        peittävät kädet ja/tai jalat.
    hand_cymbal_set_configuration:
      name: Käsisymbaalisetin kokoonpano
      description: Ilmaisee, myydäänkö tuotetta yhteensopivana parina, yksittäisenä
        symbaalina vai laajempana settinä.
    hand_drum_head_material:
      name: Käsirumpukalvon materiaali
      description: Maljarummun kalvon materiaali.
    hand_exerciser_style:
      name: Käsien voimaharjoittelulaitteen tyyppi
      description: Luokittelee käsien voimaharjoittelulaitteen yleisen tyypin tai
        mekanismin.
    hand_guard_backbone_material:
      name: Käsisuojuksen tukirangan materiaali
      description: Rakenteellisen rungon/selkäosan materiaali (jos sellainen on),
        joka määrittää lujuuden ja suojauksen.
    hand_guard_coverage_style:
      name: Käsisuojuksen peittotyyli
      description: Kuvaa käsisuojuksen peittoastetta/profiilia, joka vaikuttaa tuulen-/sääsuojaan.
    hand_guard_mounting_type:
      name: Käsisuojan kiinnitystapa
      description: Määrittää, miten käsisuojat on kiinnitetty moottoripyörään (esim.
        ohjaustangon päähän kiinnitettävä sisäkiinnike tai pelkkä kiristin).
    hand_guard_set_configuration:
      name: Käsisuojasetin kokoonpano
      description: Myydäänkö tuotetta vasemman ja oikean parina vai yksittäin.
    hand_guard_style:
      name: Käsisuojuksen tyyli
      description: Kuvailee käsisuojan peittävää rakennetta tai tyyppiä (esim. umpinainen,
        avoin, täysikokoinen, kevytrakenteinen, vakio).
    hand_guard_weather_protection:
      name: Käsisuojuksen sääsuoja
      description: Ilmaisee suunnitellun käsisuojien tarjoaman sääsuojan.
    hand_paddle_strap_type:
      name: Käsiräpylän hihnatyyppi
      description: Määrittää hihnan tyypin tai hihnan puuttumisen, jota käytetään
        käsimelan kiinnittämiseen käyttäjän käteen.
    hand_percussion_mount_attachment_mechanism:
      name: Perkussiosoittimen kiinnitysmekanismi
      description: Määrittää, miten teline kiinnitetään jalustaan, hyllyyn tai muihin
        laitteisiin (esim. puristin- vai tankokiinnitys).
    hand_percussion_mounting_handling:
      name: Kädessä pidettävien lyömäsoittimien kiinnitys/käsittely
      description: Onko instrumentti kädessä pidettävä, päälle puettava, kiinnitetty
        vai asetettu pöydälle tai lattialle tyypillisen käytön aikana.
    hand_percussion_pitch_type:
      name: Kädessä pidettävien lyömäsoittimien sävelkorkeuden tyyppi
      description: Ilmaisee, tuottaako soitin määritellyn sävelkorkeuden (viritettävä/nuotti)
        vai määrittelemättömän sävelkorkeuden.
    hand_percussion_playing_method:
      name: Kädessä pidettävien lyömäsoittimien soittotapa
      description: Miten soitinta tyypillisesti soitetaan äänen tuottamiseksi (esim.
        ravistellaan tai raaputetaan).
    hand_percussion_set_configuration:
      name: Kädessä pidettävien lyömäsoitinsettien kokoonpano
      description: Onko tuote yksittäinen instrumentti, yhteensopiva pari vai moniosainen
        setti.
    hand_percussion_size_class:
      name: Kädessä pidettävien lyömäsoittimien kokoluokka
      description: Soittimen yleinen kokoluokka, kun tarkkoja mittoja ei ole saatavilla,
        tai suodatuksen helpottamiseksi.
    hand_sewing_needle_point_type:
      name: Neulan kärjen tyyppi käsinompelussa
      description: Käsinompeluneulan kärjen muoto tai tyyppi, jota käytetään erilaisten
        materiaalien (esim. kudotut kankaat, neuleet, nahka) tai lankojen kanssa.
    hand_support_level:
      name: Käden tuen taso
      description: Määrittää käsineen, kääreen tai hihnan tarjoaman tuen tai kompression
        asteen.
    hand_support_size:
      name: Käsituen koko
      description: Valmistajan ilmoittama hansikkaan, hihnan tai kääreen koko (XS–XXL
        tai yhden koon tuote).
    handball_ball_type:
      name: Käsipallon pallotyyppi
      description: Ilmaisee käsipallon käyttötarkoituksen, kuten ottelupallo, harjoituspallo
        tai rantakäsipallo.
    handball_playing_surface:
      name: Käsipallon pelialusta
      description: Ilmaisee pelialustat, joille käsipallo on optimoitu.
    handball_target_type:
      name: Käsipallon maalityyppi
      description: Määrittää joukkuekäsipallon harjoitteluun tarkoitetun maalin tyylin
        tai rakenteen.
    handbrake_actuation_type:
      name: Käsijarrun käyttötyyppi
      description: Määrittää, miten seisontajarrua käytetään.
    handbrake_orientation:
      name: Käsijarrun suunta
