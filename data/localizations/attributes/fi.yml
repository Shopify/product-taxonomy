    travel_trailer_appliances_fuel_type:
      name: Matkailuvaunun laitteiden polttoainetyyppi
      description: Ensisijainen polttoaine, jota käytetään laitteissa/lämmityksessä/ruoanlaitossa
        (ei vetoajoneuvossa).
    travel_trailer_holding_tank_type:
      name: Matkailuvaunun säiliön tyyppi
      description: Ilmaisee, mitkä säiliöt ovat matkailuvaunussa (valitse kaikki soveltuvat).
    travel_trailer_power_hookup_shore_power:
      name: Matkailuvaunun virtaliitäntä (maasähkö)
      description: Maasähköyhteyksille tuetut sähköliitäntästandardit.
    tread_pattern_type:
      name: Rengaskuvion tyyppi
