      description: Suuntavilkun visuaalinen merkinantotyyli/animaatio.
    turnip_and_rutabaga_variety:
      name: Nauris- ja lanttulajike
      description: Osoittaa nauriin tai lantun tietyn lajikkeen tai muunnoksen.
    tweeter_crossover_type:
      name: Diskanttikaiuttimen jakosuotimen tyyppi
      description: Ilmaisee diskanttikaiuttimen mukana tulevan ylipäästösuodattimen
