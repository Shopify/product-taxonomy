    surfboard_construction:
      name: Surffilaudan rakenne
      description: Määrittää surffilaudan ensisijaisen rakenteen tai lujitteen.
    surfboard_tail_shape:
      name: Surffilaudan pyrstön muoto
      description: Määrittelee laudan pyrstön muodon, joka vaikuttaa ohjattavuuteen
