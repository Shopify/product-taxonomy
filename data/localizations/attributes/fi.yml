---
fi:
  attributes:
    3d_glasses_fit_design:
      name: 3D-lasien istuvuuden muotoilu
      description: Kuvaa, miten laseja pidetään tai miten ne kiinnitetään (esim. klipsikiinnitys,
        kietoutuva malli, päälle puettava malli).
    3d_glasses_material:
      name: 3D-lasien materiaali
      description: Määrittää 3D-laseissa käytetyn materiaalin, kuten bambun tai ruostumattoman
        teräksen
    3d_glasses_technology:
      name: 3D-lasien tekniikka
      description: Määrittelee 3D-kuva-/synkronointitekniikan, jolle lasit on suunniteltu,
