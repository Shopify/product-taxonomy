      description: Huuliharpun kamman (runko, joka muodostaa ilmakammiot) materiaali.
    comb_type:
      name: Kamman tyyppi
      description: Luokittelee hevosen harjat niiden ensisijaisen käyttötarkoituksen
        mukaan (esim. kampa, harja, nyppimiskampa), mikä auttaa ostajia löytämään
        nopeasti oikean välineen tiettyyn hoitotarpeeseen.
    combat_shorts_cut_style:
      name: Kamppailulajishortsit
      description: Ilmaisee kamppailulajishortseille ominaisen leikkauksen tai istuvuustyylin
        (esim. korkea leikkaus, retro-leikkaus, kompressio).
    comic_creator_role:
      name: Sarjakuvan luojan rooli
      description: Määrittää listauksen kannalta olennaisen tekijän roolin (esim.
        kirjoittaja, taiteilija).
    commemorative_coin_finish:
      name: Juhlarahan viimeistely
      description: Kuvailee juhlarahan lyönti-/viimeistelytyyppin
    commemorative_coin_mint_mark:
      name: Rahapajan tunnus juhlarahassa
      description: Ilmaisee kolikon rahapajan tunnuksen (tai ei rahapajan tunnusta).
    commemorative_subject:
      name: Juhlarahan aihe
      description: Ensisijainen muistettu aihe (tapahtuma, henkilö, paikka, vuosipäivä,
        organisaatio jne.).
    commercial_vehicle_class:
      name: Hyötyajoneuvon luokitus
      description: GVWR-pohjainen säädöksellinen tai toimialan painoluokitus selaamista
        ja suodattamista varten.
    compass_damping_medium:
      name: Kompassin vaimennusneste
      description: Määrittää väliaineen, jota käytetään neulan liikkeen vakauttamiseen
        kompassikapselin sisällä.
    compass_illumination_type:
      name: Kompassin valaistuksen tyyppi
      description: Määrittää, miten kompassin merkinnät näkyvät hämärässä (esim. luminoiva
        maali, tritium, LED-taustavalo).
    compass_mounting_style:
      name: Kompassin kiinnitystyyli
      description: Kuvailee kompassin kantotavan, pukemisen tai asennuksen.
    compass_scale_units:
      name: Kompassin asteikon yksiköt
      description: Ilmaisee kompassin koteloon merkityt mittayksiköt (asteet, millit
        tai molemmat).
    compatible_abs_system:
      name: Yhteensopiva ABS-järjestelmä
      description: Ilmaisee, onko pääsylinteri tarkoitettu ABS-jarruilla varustetuille
        ajoneuvoille.
    compatible_adapter_brand:
      name: Yhteensopiva brändi
      description: Ilmaisee sen golfmailan pään merkin, johon varsi on valmiiksi sovitettu.
    compatible_airbag_system_type:
      name: Yhteensopiva turvatyynyjärjestelmän tyyppi
      description: Ilmaisee turvatyynyjärjestelmän sukupolven/ominaisuudet, joiden
        kanssa osa on yhteensopiva (esim. yksivaiheinen vs. kaksivaiheinen).
    compatible_amplifier_fit_method:
      name: Yhteensopiva vahvistimen sovitusmenetelmä
      description: Ilmaisee, miten yhteensopivuus on määritelty päällisen/kotelon
        osalta (universaali sopivuus tai mallikohtainen tai mittatyö).
    compatible_apparatus:
      name: Yhteensopiva laite
      description: Määrittää voimisteluvälineen tai -toiminnon, johon kahvat on suunniteltu.
    compatible_archery_tool:
      name: Yhteensopiva jousiammuntatyökalu
      description: Ilmaisee ensisijaisen jousiammuntatyökalun tai -varusteen, jonka
        kanssa lisävaruste on suunniteltu toimimaan.
    compatible_axle_size:
      name: Yhteensopiva akselikoko
      description: Ilmaisee navan/akselin halkaisijan tai kierrestandardin, johon
        jalkatappi on suunniteltu sopimaan (esim. 10 mm/3⁄8 tuumaa, 14 mm, 3/8 tuumaa,
        26 TPI).
    compatible_axle_type:
      name: Yhteensopiva akselityyppi
      description: Yksilöi perävaunun tukeman taka-akselikiinnityksen standardin (tai
        standardit), kuten pikalinkku- tai läpiakselikoot.
    compatible_axle_weight_rating:
      name: Yhteensopiva akselipainoluokitus
      description: Määrittää perävaunun akselipainoluokituksen (kantavuus akselia
        kohden), jolle perävaunun jarrukokoonpano on suunniteltu sopimaan.
    compatible_bait_type:
      name: Yhteensopiva syöttityyppi
      description: Tunnistaa syöttityypit, joiden kanssa syöttipora on yhteensopiva,
        jotta kalastajat voivat valita työkaluunsa sopivan syötin.
    compatible_bass_scale_length:
      name: Yhteensopiva basson mensuuripituus
      description: Ilmaisee basson mensuuripituuden (tai pituudet), joille kielisarja
        on tarkoitettu (tärkeää oikean kielten punoksen pituuden ja istuvuuden varmistamiseksi).
    compatible_battle_top_system:
      name: Yhteensopiva taisteluhyrräjärjestelmä
      description: Yksilöi taisteluhyrrätuotteen ekosysteemin tai sarjan, jota varten
        hyrrä on suunniteltu (käytetään osien ja areenan yhteensopivuuden varmistamiseen).
    compatible_bb_size:
      name: Yhteensopiva airsoft-kuulan koko
      description: Ilmaisee tuotteen tukeman airsoft-kuulien halkaisijan.
    compatible_bed_frame_style:
      name: Yhteensopiva vuoderunkotyyli
      description: Määrittää sängyn tai rungon tyypin, johon lisävaruste on suunniteltu
        sopimaan.
    compatible_bicycle_tire_type:
      name: Yhteensopiva polkupyörän rengastyyppi
      description: Määrittää, minkä tyyppisiä polkupyörän renkaita tuotteella voidaan
        korjata tai tiivistää.
    compatible_bike_component:
      name: Yhteensopiva pyörän komponentti
      description: Määrittää, mitä polkupyörän osaa työkalu tai tuote on suunniteltu
        huoltamaan.
    compatible_billiard_game:
      name: Yhteensopiva biljardipeli
      description: Yksilöi biljardipeli(t), johon keppihylly on suunniteltu, millä
        varmistetaan, että asiakkaat valitsevat peliinsä sopivan hyllyn.
    compatible_billiard_table_size:
      name: Yhteensopivan biljardipöydän koko
      description: Määrittää pöydän vakiopituuden/-pituudet, joille suojus on suunniteltu
        sopimaan, millä varmistetaan, että ostajat valitsevat oikean kokoisen suojuksen
        biljardipöydälleen.
    compatible_bit_type:
      name: Yhteensopiva terätyyppi
      description: Terätyypit, joiden kanssa suojusta voi käyttää.
    compatible_blade_hosel:
      name: Yhteensopiva lavan liitoskohta
      description: Määrittää varren ja lavan liitoskohdan (hosel/taper) tyypin, joka
        varmistaa, että varsi ja lapa sopivat yhteen.
    compatible_blade_system:
      name: Yhteensopiva teräjärjestelmä
      description: Ilmaisee vaihtoteräjärjestelmän tai -muodon, joka sopii veitseen
        (esimerkiksi standardi askarteluterä nro 11 tai taitettavat segmenttiterät).
    compatible_boat_weaving_shuttle_loom:
      name: Yhteensopiva venesukkula
      description: Minkä tyyppisten kangaspuiden kanssa venesukkulaa on tarkoitus
        käyttää?
    compatible_bobbin_type:
      name: Yhteensopiva puolan tyyppi
      description: Määrittää, minkä tyyppiselle puolalle sukkula on suunniteltu.
    compatible_bottle_mouth:
      name: Yhteensopiva pullon suuaukko
      description: Pullon suuaukon tyyppi tai halkaisija, johon pilli tai korkki on
        suunniteltu sopimaan.
    compatible_bow_attachment_system:
      name: Yhteensopiva jousen kiinnitysjärjestelmä
      description: Yksilöi lapojen tai lisävarusteiden kiinnityskohdan, jota varten
        osa on suunniteltu (esimerkiksi ILF, ruuvikiinnitys, pikakiinnitys).
    compatible_bow_crossbow_type:
      name: Yhteensopiva jousi-/varsijousityyppi
      description: Merkitsee jousen tai varsijousen tyypin, johon lisävaruste on suunniteltu
        sopimaan.
    compatible_brake_fluid:
      name: Yhteensopiva jarruneste
      description: Jarrunesteen DOT-spesifikaatio(t), joiden kanssa pääsylinterin
        tiivisteet/materiaalit on suunniteltu yhteensopiviksi.
    compatible_brake_pad:
      name: Yhteensopiva jarrupala
      description: Ilmaiseen, mille jarrupalayhdisteille jarrulevy on hyväksytty,
        mikä varmistaa turvallisuuden ja optimaalisen kulumisen.
    compatible_brake_service_system:
      name: Yhteensopiva jarrunhuoltojärjestelmä
      description: Määrittää, onko osa tarkoitettu levyjarruille, rumpujarruille vai
        molemmille.
    compatible_brake_system:
      name: Yhteensopiva jarrujärjestelmä
      description: Määrittää järjestelmän jarrunesteen käytön tärkeimmät yhteensopivuustiedot.
    compatible_brake_type:
      name: Yhteensopiva jarrutyyppi
      description: Määrittää jarrutyypin, jonka kanssa teline on yhteensopiva, esimerkiksi
        levy- tai vannejarru.
    compatible_brass_instrument_finish:
      name: Yhteensopiva vaskipuhaltimen pinta
      description: Määrittää, mille vaskipuhaltimien pinnoille puhdistusainetta on
        turvallista käyttää vahingoittamatta pintaa.
    compatible_building_toy_system:
      name: Yhteensopiva rakennuslelujärjestelmä
      description: Ilmaisee, minkä rakennusjärjestelmän tai standardin (tai vastaavan
        koon) kanssa lelu on yhteensopiva, kuten LEGO-yhteensopiva tai valmistajan
        oma järjestelmä.
    compatible_capo_fretboard_radius:
      name: Yhteensopiva capon otelaudan säde
      description: Määrittelee otelaudan kaarevuuden (säteen/profiilin), jolle capo
        on suunniteltu sopimaan optimaalisen kosketuksen ja vireen vakauden varmistamiseksi.
    compatible_capo_number_of_strings:
      name: Capon yhteensopiva kielimäärä
      description: Ilmaisee, kuinka monta kieltä capo on suunniteltu puristamaan (6-,
        7-, 8- ja 12-kielisille sekä erikoissoittimille).
    compatible_cardio_machine_type:
      name: Yhteensopiva kuntolaitteen tyyppi
      description: Määrittää sen kuntolaitteen tyypin, jonka kanssa lisävaruste tai
        osa on suunniteltu toimimaan.
    compatible_chain_link_type:
      name: Yhteensopiva ketjulenkkityyppi
      description: Yksilöi ketjulenkkityylin, jota työkalu tukee (standardi, puolikas
        lenkki, pikaliitin jne.).
    compatible_chain_size:
      name: Yhteensopiva ketjukoko
      description: Määrittää ketjun leveyden tai ketjujakostandardit (esim. 1/8 tuumaa,
        3/32 tuumaa), jota työkalu tukee.
    compatible_chain_width:
      name: Yhteensopiva ketjun leveys
      description: Ilmaisee, minkä ketjukoon kanssa vapaaratas on suunniteltu toimimaan.
    compatible_chip_denomination:
      name: Yhteensopiva pelimerkin nimellisarvo
      description: Ilmaisee, mille pelimerkkien arvoille salkussa tai telineessä on
        merkityt tai varatut paikat (tai mitkä arvot siihen voidaan järjestellä).
    compatible_clarinet_mouthpiece_ligature:
      name: Yhteensopiva klarinetin suukappaleen ligatuuri
      description: Ilmaisee lehdenkiristimen kokostandardin tai suukappaleen yhteensopivuustiedot.
    compatible_classical_guitar_string_scale_length:
      name: Yhteensopiva klassinen kitaran mensuuripituus
      description: Kitaran mensuuripituuden / kielten pituuden yhteensopivuus, jolle
        kielisarja on suunniteltu.
    compatible_clay_target_size:
      name: Yhteensopiva savikiekon koko
      description: Listaa savikiekkojen koot tai muodot, joita heitin voi hyväksyä
        oikean istuvuuden ja tehokkuuden varmistamiseksi.
    compatible_cleat_system:
      name: Yhteensopiva klossijärjestelmä
      description: Määrittää klossijärjestelmän tai pulttijaon, jota poljin tukee,
        jotta ajaja voi sovittaa pyöräilykenkänsä oikeaan järjestelmään.
    compatible_clipless_pedal_system:
      name: Yhteensopiva lukoton poljinjärjestelmä
      description: Yksilöi tietyn lukkopoljin-/klossistandardin, johon tuote on suunniteltu
        käytettäväksi.
    compatible_clutch_type:
      name: Yhteensopiva kytkintyyppi
      description: Kytkimen liitännän yhteensopivuus vapaarattaan kanssa (jos sovellettavissa).
    compatible_coffee_pod_system:
      name: Yhteensopiva kahvikapselijärjestelmä
      description: Määrittää kahvinkeittimen tai keittojärjestelmän, jolle kapselit
        on suunniteltu.
    compatible_construction_set_system:
      name: Yhteensopiva rakennussarjajärjestelmä
      description: Määrittää, minkä rakennusjärjestelmän tai tuotemerkin ekosysteemin
        kanssa setti on yhteensopiva (esimerkiksi LEGO-yhteensopiva, DUPLO-yhteensopiva).
    compatible_contra_bass_clarinet_peg_stand:
      name: Yhteensopiva kontrabassoklarinetin tappi/teline
      description: Ilmaisee, minkä tyyppistä jalustaliitäntää, tappikiinnitystä tai
        tukirakennetta tuote vaatii.
    compatible_coolant_chemistry:
      name: Yhteensopiva jäähdytysnesteen kemia
      description: Määrittää, minkä jäähdytysnesteen kemiallisten aineiden tuoteryhmien
        kanssa lisäaine on kehitetty yhteensopivaksi.
    compatible_cooling_system_material:
      name: Yhteensopiva jäähdytysjärjestelmän materiaali
      description: Määrittää, mille jäähdytysjärjestelmille tai materiaaleille jäähdyttimen
        huuhteluaine on turvallinen (esimerkiksi alumiinijäähdyttimet, sekametallijärjestelmät).
    compatible_crib_format:
      name: Yhteensopiva kehdon muoto
      description: Määrittää patjan tai lakanan yleisen kokoluokan tai muodon, johon
        lisävaruste on suunniteltu sopimaan.
    compatible_cross_stitch_fabric_count:
      name: Yhteensopiva ristipistokankaan tiheys
      description: Suositeltu kankaan tiheys (tai tiheydet) mallin ompeluun.
    compatible_cross_stitch_frame:
      name: Yhteensopiva ristipistokehys
      description: Ilmaisee, mihin käyttöön kehys on suunniteltu (käsikäyttö, pöytäteline,
        lattiajalusta tai yleismalli).
    compatible_crossbar:
      name: Yhteensopiva poikittaispalkki
      description: Telineen yhteensopivuus ajoneuvon kattotelineiden poikittaispalkkien
        kanssa (jos kattokiinnitteinen), mukaan lukien palkkien muoto- ja profiilistandardit.
    compatible_cycling_cleat:
      name: Yhteensopiva pyöräilyklossi
      description: Määrittää klossi- tai poljinjärjestelmän, jonka kanssa pyöräilykengät
        on suunniteltu toimimaan.
    compatible_cymbal_size:
      name: Yhteensopiva symbaalin koko
      description: Määrittää symbaalin halkaisijan, jolle laukku on suunniteltu (tarkoitettu
        koko tai enimmäiskoko); tämä koskee yhteensopivuutta symbaalin koon mukaan,
        ei laukun ulkomittaa.
    compatible_device_type:
      name: Yhteensopiva laitetyyppi
      description: Osoittaa, minkä tyyppiselle laitteelle teline on tarkoitettu (esim.
        näyttö/TV, tabletti, älypuhelin, kannettava DVD-soitin).
    compatible_dock_structure_type:
      name: Yhteensopiva laiturin rakennetyyppi
      description: Laiturirakenne, johon portaat on suunniteltu asennettaviksi.
    compatible_dough_type:
      name: Yhteensopiva massan tyyppi
      description: Määrittää, minkä tyyppisille tai merkkisille massoille työkalut
        on suunniteltu (esimerkiksi tavallinen muovailuvaha, muovailusavi).
    compatible_drawing_ink_surface:
      name: Yhteensopiva piirustusmustepinta
      description: Ilmaisee suositellut pinnat/alustat parhaan tehokkuuden saavuttamiseksi.
    compatible_drivetrain_brand:
      name: Yhteensopiva voimansiirron merkki
      description: Listaa voimansiirron tai jarrujärjestelmän merkin, jonka kanssa
        vaijeri on suunniteltu toimimaan.
    compatible_drivetrain_speeds:
      name: Yhteensopivat vaihteiston nopeudet
      description: Määrittää vaihteiden määrän (esim. 10-vaihteinen), joita kampisarja
        ja eturatas tukevat.
    compatible_equipment:
      name: Yhteensopivat laitteet
      description: Määrittää, minkä tyyppisiä talviurheiluvälineitä ruuvipenkki on
        suunniteltu pitämään.
    compatible_evap_system:
      name: Yhteensopiva EVAP-järjestelmä
      description: Ilmaisee, onko polttoainesäiliön korkki suunniteltu täyttämään
        EVAP-järjestelmän (esim. alkuperäistä osaa vastaava tiiveys) ja vähentämään
        moottorin vikavalojen syttymistä.
    compatible_exercise_bike_style:
      name: Yhteensopiva kuntopyörätyyppi
      description: Ilmaisee, minkä tyyppisiin kuntopyöriin lisävaruste tai varaosa
        on suunniteltu sopimaan.
    compatible_fencing_weapon:
      name: Yhteensopiva miekkailuase
      description: Määrittää, mihin miekkailuaseeseen tai -lajiin takki tai lamee
        on tarkoitettu.
    compatible_fiber_type:
      name: Yhteensopiva kuitutyyppi
      description: Ensisijaiset kuitutyypit, joita rumpukarstauskone on tarkoitettu
        käsittelemään tehokkaasti.
    compatible_fin_box_system:
      name: Yhteensopiva eväkiinnikejärjestelmä
      description: Tunnistaa eväkiinnikkeen tai kiinnitysjärjestelmän, johon evä on
        suunniteltu sopimaan, mikä auttaa surffaajia ostamaan surffilaudalleen yhteensopivia
        eviä (esimerkiksi FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Yhteensopivan otelaudan säde
      description: Määrittää otelaudan kaarevuuden (tasainen, kaareva tai yhdistetty),
        jota varten capo on suunniteltu varmistamaan tasainen paine ja vähentämään
        surinaa.
    compatible_finish_type:
      name: Yhteensopiva viimeistelytyyppi
      description: Ilmaisee, mille instrumenttien pintakäsittelytyypeille suihkeen
        sanotaan olevan turvallinen.
    compatible_fishing_reel_type:
      name: Yhteensopiva kalastuskelatyyppi
      description: Määrittää kelan tyypin, johon lisävaruste on suunniteltu sopimaan
        tai jonka kanssa se toimii (esim. heittokela, uistelukela, perhokela).
    compatible_fly_line_weight:
      name: Yhteensopiva perhosiiman paino
      description: Ilmaisee perhosiiman painot AFTMA-standardilla, joiden kanssa kela
        on suunniteltu toimimaan.
    compatible_flywheel_type:
      name: Yhteensopiva vauhtipyörän tyyppi
      description: Määrittää vauhtipyörän tyypin, jonka kanssa kytkimen painelevyä
        on tarkoitus käyttää.
    compatible_football_kick_type:
      name: Yhteensopiva amerikkalaisen jalkapallon potkutyyppi
      description: Tunnistaa potkutilanteet, joihin tuote on suunniteltu (esim. aloituspotku,
        kenttäpotku), mikä auttaa urheilijoita löytämään nopeasti sopivat varusteet.
    compatible_fuel_system_type:
      name: Yhteensopiva polttoainejärjestelmätyyppi
      description: Määrittää polttoainejärjestelmän, jolle pesuri on suunniteltu.
    compatible_gas_type:
      name: Yhteensopiva kaasun tyyppi
      description: Yksilöi paintball-aseen painesäiliöön sopivan paineistetun kaasun
        tyypin.
    compatible_gel_wax_additives:
      name: Yhteensopivat geelivahan lisäaineet
      description: Määrittää, mitkä lisäainetyypit ovat yhteensopivia tämän geelivahan
        kanssa (esim. väriaine, upotettavat koristeet).
    compatible_glaze_layering:
      name: Yhteensopiva lasitteen kerrostus
      description: Onko tarkoitettu kerrostettavaksi muiden lasitteiden kanssa tehosteiden
        luomiseksi.
    compatible_golf_bag_type:
      name: Yhteensopiva golfbägin tyyppi
      description: Ilmaisee, millaisiin golfbägeihin kansi tai kotelo sopii.
    compatible_ground_polarity:
      name: Yhteensopiva maadoitusnapaisuus
      description: Määrittää, onko jännitteensäädin tarkoitettu negatiivisen vai positiivisen
        maadoituksen sähköjärjestelmille (vai onko se napaisuudesta riippumaton).
    compatible_guitar_body_shape:
      name: Yhteensopiva kitaran rungon muoto
      description: Ilmaisee, mihin kitaran runkoon/muotoon kotelo on suunniteltu sopimaan.
    compatible_guitar_case:
      name: Yhteensopiva kitarakotelo
      description: Määrittää, mihin kitarakoteloihin ilmankostutin on suunniteltu
        sopimaan ja toimimaan oikein.
    compatible_guitar_scale_length:
      name: Yhteensopiva kitaran mensuuripituus
      description: Ilmaisee, mille kitaran mensuuripituudelle tai -pituuksille kielisetti
        on tarkoitettu (perustuen kielen käämityksen pituuteen ja kokonaispituuteen).
    compatible_gun_platform:
      name: Yhteensopiva asealusta
      description: Määrittää käyttöalustan tai voimanlähteen, jonka kanssa tuote on
        yhteensopiva (esimerkiksi AEG, GBB, HPA).
    compatible_hair_length:
      name: Yhteensopiva hiusten pituus
      description: Määrittää hiusten enimmäispituuden tai -volyymin, jonka päähine
        mukavasti sallii.
    compatible_head_and_neck_restraint_system:
      name: Yhteensopiva pään ja niskan tukijärjestelmä
      description: Ilmaisee, onko kypärässä kiinnityspisteitä ja/tai onko se yhteensopiva
        pään ja niskan tukijärjestelmien (esim. HANS) kanssa, mukaan lukien kiinnitystappien
        sisällyttäminen ja asennuksen tila.
    compatible_helmet_certification_standard:
      name: Yhteensopivan kypärän sertifiointistandardi
      description: Ilmaisee kypärän turvallisuusstandardin tai sertifiointikontekstin,
        jolle lisävaruste on suunniteltu (esimerkiksi kilpakäytössä käytettävät repäisykalvot
        viittaavat usein tiettyihin sääntelyelinten määräyksiin).
    compatible_helmet_shell_size:
      name: Yhteensopiva kypäränkuoren koko
      description: Ilmaisee, mihin kypärän kuorikokoon tai -kokoihin sisäosan vaihtokappale
        sopii (kuorikoot vastaavat usein kokoluokkia, kuten XS–S, M, L–XL).
    compatible_helmet_size:
      name: Yhteensopiva kypäräkoko
      description: Ilmaisee kypärän koon, jonka kanssa kasvomaski on yhteensopiva.
    compatible_helmet_type:
      name: Yhteensopiva kypärän tyyppi
      description: Kypäräluokka, jonka kanssa kaulatuki on suunniteltu toimimaan.
    compatible_hitch_receiver_size:
      name: Yhteensopiva vetokoukun vastaanottimen koko
      description: Vetokoukun vastaanottimen aukon koko, johon lisävaruste on suunniteltu
        sopimaan (vetokoukkuun kiinnitettäville telineille).
    compatible_hook_size:
      name: Yhteensopiva koukun koko
      description: Virkkuukoukkujen kokojärjestelmä(t) ja/tai kokovalikoima, johon
        järjestäjä on suunniteltu sopimaan (esimerkiksi yhdysvaltalaiset kirjain-
        ja numerokoot, metrinen millimetrialue).
    compatible_horse_coat_type:
      name: Yhteensopiva hevosen karvan tyyppi
      description: Määrittää hevosen karvanlaadun ominaisuudet, joihin karvanpoistaja
        parhaiten soveltuu (esimerkiksi paksu talvikarva tai herkkä iho).
    compatible_host_platform:
      name: Yhteensopiva alusta
      description: Määrittää, minkä alustojen tai laitetyyppien kanssa pad-ohjain
        on yhteensopiva (esimerkiksi Windows, macOS, iOS, Android) tai voiko se toimia
        itsenäisesti ilman tietokonetta.
    compatible_inflation_gas:
      name: Yhteensopiva täyttökaasu
      description: Määrittää, millä ilmapallo on tarkoitus täyttää (ilmalla, heliumilla
        tai kummalla tahansa).
    compatible_injection_type:
      name: Yhteensopiva ruiskutustyyppi
      description: Ilmaisee, minkä polttoaineen ruiskutusjärjestelmän puhdistamiseen
        tuote on suunniteltu.
    compatible_instrument_surface_material:
      name: Yhteensopiva instrumentin pinta/materiaali
      description: Ilmaisee, mille instrumenttipinnoille/materiaaleille kiillotusainetta
        on tarkoitus käyttää.
    compatible_intercom_system:
      name: Yhteensopiva sisäpuhelinjärjestelmä
      description: Ilmaisee kypärän valmiuden/yhteensopivuuden kypäräpuhelin-/viestintäjärjestelmän
        asentamiseen tai kiinnittämiseen varten.
    compatible_interior_material:
      name: Yhteensopiva sisämateriaali
      description: Osoittaa, mille ajoneuvon sisämateriaaleille tahranpoistoaine on
        turvallinen/tehokas (esim. matto, kangasverhoilu, nahka, vinyyli).
    compatible_kayak_type:
      name: Yhteensopiva kajakkityyppi
      description: Listaa yleiset kajakkityypit, joihin purjepakkaus on suunniteltu
        asennettavaksi.
    compatible_license_plate_hole_pattern:
      name: Yhteensopiva rekisterikilven reikäkuvio
      description: Määrittää kiinnittimen tai pidikkeen tukemat asennusreikien paikat
        (ajoneuvon puolella ja/tai levyn puolella).
    compatible_license_plate_size:
      name: Yhteensopiva rekisterikilven koko
      description: Ilmaisee alueelliset tai mittaiset rekisterikilven koot, joiden
        kanssa teline/pidike on suunniteltu sopimaan.
    compatible_loom:
      name: Yhteensopivat kangaspuut
      description: Määrittää kangaspuutyypit, joiden kanssa litteää kudekampaa on
        tarkoitus käyttää.
    compatible_loom_type:
      name: Yhteensopiva kangaspuiden tyyppi
      description: Määrittää kudonta-asetelman, johon pirta on tarkoitettu (esimerkiksi
        niisikoneet vs. kuvakudospuut).
    compatible_machine_type:
      name: Yhteensopiva konetyyppi
      description: Ilmaisee, minkä tyyppiselle tikkauskokoonpanolle kehys on suunniteltu
        (vain käsin tikkaus, kotiompelukone, pitkävartinen tikkauskone).
    compatible_mast_type:
      name: Yhteensopiva mastotyyppi
      description: 'Määrittää, mille maston halkaisijoille purje on suunniteltu: ohut
        (RDM), standardi (SDM) tai molemmat.'
    compatible_model_system_train_scale:
      name: Yhteensopiva pienoismallijärjestelmä (junan mittakaava)
      description: Määrittää pienoismallijunan mittakaavan/järjestelmän, johon lisävaruste
        sopii, jos sovellettavissa (esim. HO, N, O).
    compatible_mounting_surface:
      name: Yhteensopiva kiinnityspinta
      description: Pinta tai esine, johon klipsi on tarkoitettu kiinnitettäväksi.
    compatible_mouthpiece_patch:
      name: Yhteensopiva suukappaleen paikka
      description: Määrittää, onko suukappale suunniteltu käytettäväksi suukappaleen
        pehmusteiden (laastareiden) kanssa, sekä suositellun pehmusteen paksuusalueen.
    compatible_mouthpiece_type:
      name: Yhteensopiva suukappaleen tyyppi
      description: Ilmaisee, minkä tyyppistä suukappaletta mellofoni on suunniteltu
        käyttämään (yleisesti käyrätorvi- tai trumpettityylisiä liittimiä mallista
        riippuen).
    compatible_neck_profile_width:
      name: Yhteensopiva kaulan profiili/leveys
      description: Ilmaisee kitaran kaulaprofiilin/leveysluokan, johon capo on suunniteltu
        sopimaan (esim. kapea sähkökitaran kaulaprofiili vs. leveä klassinen kitara).
    compatible_needle_size:
      name: Yhteensopiva neulakoko
      description: Ilmaisee neulan koon/tyypit, joille kotelo on tarkoitettu (esim.
        kirjonta, seinävaatteet, käsinompeluneulan pituudet).
    compatible_needle_system:
      name: Yhteensopiva neulajärjestelmä
      description: Koneen kanssa yhteensopiva(t) neulajärjestelmä(t) (esim. 130/705H).
    compatible_parking_brake_mechanism:
      name: Yhteensopiva seisontajarrumekanismi
      description: Ilmaisee, onko jarrusatula suunniteltu toimimaan integroidun seisontajarrumekanismin
        kanssa.
    compatible_pedal_instrument_type:
      name: Pedaalille yhteensopiva instrumenttityyppi
      description: Määrittää, minkä soittimen kanssa pedaalia on tarkoitus käyttää
        (esim. digitaalinen piano, kosketinsoittimet/syntetisaattori, MIDI).
    compatible_pedal_type:
      name: Yhteensopiva poljintyyppi
      description: Ilmaisee poljintyylin tai järjestelmän, johon hihna tai klossi
        on suunniteltu sopimaan (esim. platform, SPD, Look Keo).
    compatible_pin_type:
      name: Yhteensopiva pinnityyppi
      description: Minkä tyyppisten neulojen kanssa matto on suunniteltu käytettäväksi
        (tai onko se neulayhteensopiva)?
    compatible_pipe_filter_size:
      name: Yhteensopiva piipun suodattimen koko
      description: Ilmaisee piippuun sopivan suodattimen koon tai tyypin (tai että
        suodatinta ei tarvita).
    compatible_plate_size:
      name: Yhteensopiva levykoko
      description: Luodinkestävien levyjen mitat tai vakiokoot, jotka sopivat liiveihin.
    compatible_play_vehicle_scale:
      name: Yhteensopiva leluajoneuvon mittakaava
      description: Ilmaisee lelun mittakaavan, johon lisävaruste on suunniteltu sopivaksi
        (esim. 1:64), mikä parantaa keräilyn ja ratajärjestelmien yhteensopivuutta.
    compatible_playing_surface:
      name: Yhteensopiva leikkipinta
      description: Ilmaisee pelikentän tai pinnan tyypin, jolle amerikkalaisen jalkapallon
        kengät on suunniteltu.
    compatible_pole_dimensions:
      name: Yhteensopivat pylvään mitat
      description: Määrittää pylvään poikkileikkauksen koon, johon lisävaruste sopii.
    compatible_pole_shape:
      name: Yhteensopiva pylvään muoto
      description: Määrittää pylvään tai tolpan poikkileikkausmuodon, johon pehmuste
        on suunniteltu sopimaan.
    compatible_power_steering_system:
      name: Yhteensopiva ohjaustehostinjärjestelmä
      description: Ilmaisee ohjausjärjestelmän tyypin (tyypit), joille neste on tarkoitettu.
    compatible_powerplant_type:
      name: Yhteensopiva voimanlähdetyyppi
      description: Ilmaisee ilmakiväärin työntövoimajärjestelmän, johon osa on tarkoitettu
        (esim. jousimäntä, CO2, PCP).
    compatible_presser_foot:
      name: Yhteensopiva paininjalka
      description: Määrittää ompelukoneen tukeman paininjalan kiinnitys- tai yhteensopivuusjärjestelmän
        (esim. napsautettava vs. ruuvikiinnitteinen; matala/korkea/vino varsi). Käytä
        vaihtoehtoa 'universaali/useita', jos tuettuja järjestelmiä on useita tai
        mukana on sovittimia.
    compatible_protective_gear:
      name: Yhteensopivat suojavarusteet
      description: Määrittää, minkä muiden suojavarusteiden kanssa niskasuoja on suunniteltu
        toimimaan.
    compatible_protective_gear_integration:
      name: Yhteensopivien suojavarusteiden integrointi
      description: Kuvaa, miten suojainta on tarkoitus käyttää tai integroida muiden
        varusteiden kanssa (esim. sisätasku, erillinen kiinnitysvyö).
    compatible_punching_bag_type:
      name: Yhteensopiva nyrkkeilysäkkityyppi
      description: Määrittää, minkä nyrkkeily- tai harjoitussäkkityyppien kanssa tuote
        on yhteensopiva.
    compatible_racing_discipline:
      name: Yhteensopiva kilpalaji
      description: Moottoriurheilulaji(t), joita varten kypärä on tarkoitettu/sertifioitu.
    compatible_rc_scale:
      name: Yhteensopiva radio-ohjattavien mittakaava
      description: Ilmaisee radio-ohjattavien mittakaavasuhteen (esim. 1:10), johon
        lisävaruste tai osa on suunniteltu sopimaan.
    compatible_recorder_size:
      name: Yhteensopiva nokkahuilun koko
      description: Määrittää, minkä kokoisille nokkahuiluille kotelo on suunniteltu.
    compatible_recorder_type:
      name: Yhteensopiva nokkahuilutyyppi
      description: Määrittää nokkahuilun tyypin (tuoteperhe/koko), jonka kanssa lisälaite
        on yhteensopiva (esim. sopraano, altto).
    compatible_reed_cut:
      name: Yhteensopiva ruokolehden leikkaus
      description: Määrittää, minkä kielileikkaustyylin kanssa lehdenkiristimen on
        tarkoitus olla yhteensopiva (esim. viilattu/ranskalainen leikkaus vs. viilaamaton/amerikkalainen
        leikkaus).
    compatible_reed_type:
      name: Yhteensopiva ruokolehden tyyppi
      description: Määrittää, minkä muotoisille/tyyppisille ruokolehdille suukappale
        on suunniteltu.
    compatible_reel_type:
      name: Yhteensopiva kelan tyyppi
      description: Määrittää kelan tyylin, johon laukku, kotelo tai suojus on suunniteltu
        sopimaan.
    compatible_refrigerant_type:
      name: Yhteensopiva kylmäainetyyppi
      description: Ilmaisee kylmäaineen, jonka kanssa ilmastointilaitteen höyrystin
        on tarkoitettu käytettäväksi.
    compatible_ride_equipment:
      name: Yhteensopivat pyörälliset urheiluvälineet
      description: Pyörällisten urheiluvälineiden tyypit, joille ramppi on tarkoitettu.
    compatible_roof_height:
      name: Yhteensopiva kattokorkeus
      description: Osoittaa kattoprofiilin, jota varten suojus on suunniteltu (vakio
        vs. laajennettu/korkea katto).
    compatible_roof_rail_type:
      name: Yhteensopiva kattokiskotyyppi
      description: Määrittää, mihin kattokokoonpanoon kattotelineen perusjärjestelmä
        on suunniteltu kiinnitettäväksi.
    compatible_rope_count:
      name: Yhteensopiva köysien lukumäärä
      description: Määrittää, minkälaiseen nyrkkeilykehän köysikokoonpanoon osa on
        suunniteltu, kuten 3-köyttä, 4-köyttä tai yleismalli.
    compatible_rope_type:
      name: Yhteensopiva köysityyppi
      description: Määrittää, mitä köysirakenteita laitteen kanssa voidaan käyttää.
    compatible_saddle_type:
      name: Yhteensopiva satulatyyppi
      description: Määrittää satulatyylin tai ratsastuslajin, johon varuste on suunniteltu
        sopimaan, varmistaen yhteensopivuuden koulu-, lännen- ja muiden satuloiden
        välillä.
    compatible_saxophone_size:
      name: Yhteensopiva saksofonin koko
      description: Ilmaisee, minkä saksofonityypin kanssa tuote on yhteensopiva (esim.
        sopraano, altto, tenori).
    compatible_saxophone_type:
      name: Yhteensopiva saksofonityyppi
      description: Määrittää, mille saksofonityypille ligatuuri/suojus on suunniteltu
        sopimaan.
    compatible_scale_length:
      name: Yhteensopiva mensuuripituus
      description: Määrittää kitaran mensuuripituusalueen, jolle kielet on tarkoitettu
        (esim. lyhyt mensuuri, vakio, baritoni).
    compatible_seat_airbag:
      name: Yhteensopiva istuimen turvatyyny
      description: Ilmaisee, onko istuimessa sivuturvatyynyt tai niiden tuki, tai
        onko se yhteensopiva istuimiin asennetuilla turvatyynyillä varustettujen ajoneuvojen
        kanssa.
    compatible_seating_capacity:
      name: Yhteensopiva istumapaikkamäärä
      description: Määrittää istuinten määrän tai kokoonpanon, johon lisävaruste on
        suunniteltu sopimaan.
    compatible_sensor_port_type:
      name: Yhteensopiva anturin liitäntätyyppi
      description: Määrittää, tukeeko öljypohja öljyntason ja/tai öljyn lämpötilan
        antureita sekä mahdollisen liitäntätyypin.
    compatible_shifter_type:
      name: Yhteensopiva vaihdekepin tyyppi
      description: Määrittää vaihdekepin tyypin tai kokoonpanon, johon vaihdekepin
        suojakumi on suunniteltu sopimaan.
    compatible_shis:
      name: Yhteensopiva SHIS
      description: Luettelee standardoidun kuulokkeiden tunnistusjärjestelmän (SHIS)
        koodit, joihin osa sopii (esim. IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Yhteensopiva luistelulaji
      description: Ilmaisee luistelulajit, joihin osa tai lisävaruste on suunniteltu
        sopimaan.
    compatible_snowshoe_deck_type:
      name: Yhteensopiva lumikenkien kansityyppi
      description: Määrittää lumikengän rungon tai kannen tyypin, jonka kanssa side
        on yhteensopiva.
    compatible_special_effects_lighting_features:
      name: Yhteensopivat erikoistehosteen valaistusominaisuudet
      description: Korostaa yleisiä ominaisuuksia, jotka vaikuttavat tehostevalojen
        ostopäätökseen (värin ja kuvion lisäksi), kuten yksiköiden liittäminen tai
        reagointi ääneen.
    compatible_spinning_wheel_drive_system:
      name: Yhteensopiva rukin vetojärjestelmä
      description: Määrittää, mitä rukin vetojärjestelmää tai -järjestelmiä lisävaruste
        tukee.
    compatible_spoke_gauge:
      name: Yhteensopiva pinnamittari
      description: Määrittää pinnalangan paksuuden, johon nipan kierteet sopivat,
        mahdollistaen pinnojen ja nippojen oikean yhteensopivuuden.
    compatible_steering_wheel_airbag:
      name: Yhteensopiva ohjauspyörän turvatyyny
      description: Ilmaisee, tukeeko ohjauspyörä alkuperäisen (OEM) turvatyynymoduulin
        säilyttämistä (vai onko se tarkoitettu sovelluksiin, joissa ei ole turvatyynyä).
    compatible_steering_wheel_control_button:
      name: Yhteensopiva ohjauspyörän ohjauspainike
      description: Ilmaisee yhteensopivuuden tehdasasenteisten ohjauspyörään asennettujen
        säätimien (ääni/vakionopeudensäädin/puhelin) ja niihin liittyvien johdotusten
        kanssa.
    compatible_stencil_material:
      name: Yhteensopiva sabluunamateriaali
      description: Materiaalit, joista kone voi tehdä sabluunoita tai joista se voi
        työstää niitä (esim. paperi, muovikalvo, mylar).
    compatible_stencil_media_format:
      name: Yhteensopiva sapluunamuoto
      description: 'Ilmaisee, mitä sapluunamateriaalin muotoja kone tukee: arkit,
        rullat tai molemmat.'
    compatible_strap_retractor:
      name: Yhteensopiva vyönkelauslaite
      description: Ilmaisee, onko vyö yhteensopiva kelausjärjestelmien kanssa vai
        onko se suunniteltu ei-kelautuville (staattisille) vöille.
    compatible_string_instrument_finish:
      name: Yhteensopiva jousisoittimen pintakäsittely
      description: Määrittää, mille instrumenttien pintakäsittelytyypeille kiillotusainetta
        on turvallista käyttää.
    compatible_substrate_material:
      name: Yhteensopiva alustamateriaali
      description: Pintamateriaalit, joihin maali on suunniteltu tarttumaan.
    compatible_surface:
      name: Yhteensopiva pinta
      description: Määrittää pinnan/materiaalin, johon tarranauha on tarkoitettu kiinnitettäväksi.
    compatible_surface_material:
      name: Yhteensopiva pintamateriaali
      description: Ajoneuvojen pintamateriaalit, joille tuote on suunniteltu käytettäväksi.
    compatible_tear_off_system:
      name: Yhteensopiva repäisyjärjestelmä
      description: Ilmaisee, voiko suojalaseissa käyttää repäisykalvoja (tear-offs)
        ja/tai rullakalvoja (roll-offs), ja onko siinä kiinnikkeet repäisykalvoja
        varten.
    compatible_thermostat_type:
      name: Yhteensopiva termostaatin tyyppi
      description: Ilmaisee, onko vesilaippa/kotelo suunniteltu termostaatille, ja
        jos on, minkä tyyppiselle/kokoiselle.
    compatible_thread:
      name: Yhteensopiva lanka
      description: Määrittää, minkä tyyppisille langoille langanpujotin on suunniteltu
        (paksuuden/tyypin mukaan).
    compatible_thread_spool_format:
      name: Yhteensopiva langan/puolan muoto
      description: Ilmaisee, minkälaisia lankamuotoja laatikko on tarkoitettu säilyttämään
        (kelat, puolat, kirjontalankapuolat/kortit, kartiot jne.).
    compatible_thread_yarn_tool:
      name: Yhteensopiva lankatyökalu
      description: Koneen/järjestelmän yhteensopivuus työkaluihin, jotka kiinnitetään
        muihin laitteisiin tai joita käytetään niiden kanssa (esim. ompelukone, saumuri,
        kangaspuut, rukki).
    compatible_tire_application:
      name: Yhteensopivat renkaat
      description: Ilmaisee rengas/vanne-segmentin, jolle renkaan irrotin on suunniteltu
        (perustuen huollettavaan renkaaseen/vanteeseen, ei ajoneuvomalliin).
    compatible_tom_pad_mounting:
      name: Yhteensopiva tomipadikiinnitys
      description: Määrittää, mihin sähköinen tom-tom kiinnitetään (esim. puristin-
        tai tankokiinnitys, L-tankokiinnitys, jalustakiinnitys), mikä vaikuttaa siihen,
        sopiiko se olemassa oleviin varastohylly-järjestelmiin.
    compatible_toy_vehicle_scale:
      name: Yhteensopiva leluajoneuvon skaala
      description: Ilmaisee leluauton mittasuhteen tai arvioidun autokoon, jonka kanssa
        leikkisetti on yhteensopiva.
    compatible_tpms_sensor_type:
      name: Yhteensopiva TPMS-anturityyppi
      description: Määrittää, tukeeko rengas TPMS-antureita ja/tai mahdollisen vaaditun
        venttiili-/anturityypin.
    compatible_training_equipment:
      name: Yhteensopivat kuntoilulaitteet
      description: Luettelee ne kuntoilu- tai treenivälinetyypit, jotka voidaan kiinnittää
        telineeseen.
    compatible_treadmill_design:
      name: Yhteensopivat juoksumattomallit
      description: Määrittää, minkä tyyppisille juoksumatoille lisävaruste on yhteensopiva,
        kuten kokoontaitettavat tai kiinteät mallit.
    compatible_tube:
      name: Yhteensopiva rengas
      description: Ilmaisee sisärenkaan tai renkaan rakenteen, jolle paikka on suunniteltu
        (esimerkiksi butyyli, lateksi, TPU tai sisäkumiton).
    compatible_valve_type:
      name: Yhteensopiva venttiilityyppi
      description: Ilmaisee, minkä tyyppisiin messinkiventtiileihin voiteluaine sopii.
    compatible_vaporizing_material:
      name: Yhteensopiva höyrystettävä materiaali
      description: Ilmaisee materiaalityypit, joita laite on suunniteltu höyrystämään.
    compatible_vehicle_windshield_fluid:
      name: Yhteensopiva ajoneuvon tuulilasinpesuneste
      description: Ajoneuvon varusteisiin tai lasikäsittelyihin liittyvät yhteensopivuusväittämät
        (esim. sopii sadeveden hylkiville pinnoitteille, sopii ajovalojen pesulaitteille).
    compatible_visor_system:
      name: Yhteensopiva visiirijärjestelmä
      description: Ilmaisee, minkä visiiri- tai lisäosajärjestelmien kanssa moottoripyöräkypärä
        on yhteensopiva.
    compatible_water_board_type:
      name: Yhteensopiva vesiurheilulaudan tyyppi
      description: Ilmaisee, mille vesiurheilulaudoille teline on tarkoitettu
    compatible_water_sport_board_type:
      name: Yhteensopiva vesiurheilulautatyyppi
      description: Luettelee lautatyypit, joiden kuljettamiseen teline on suunniteltu.
    compatible_watercraft_communication_standard:
      name: Yhteensopiva vesikulkuneuvojen viestintästandardi
      description: Määrittää tuetut meriviestintä- ja verkko-standardit tai integrointiprotokollat,
        jotka takaavat yhteentoimivuuden aluksen oman elektroniikan kanssa varten.
    compatible_watercraft_engine_type:
      name: Yhteensopiva vesikulkuneuvon moottorin tyyppi
      description: Ilmaisee voimansiirtojärjestelmän, johon osa sopii (ulko-/sisämoottori,
        perämoottori tai vesijettimoottori).
    compatible_weight_plate_diameter:
      name: Yhteensopiva painolevyn halkaisija
      description: Määrittää, mitkä painolevyjen halkaisijat kone hyväksyy.
    compatible_wheel_finish:
      name: Yhteensopiva vanteen pintakäsittely
      description: Määrittää vanteiden pintakäsittelyt/materiaalit, joille puhdistusainetta
        on turvallista käyttää (valmistajan mukaan).
    compatible_whorl_drive_band_type:
      name: Yhteensopiva rukinlyhdyn vetohihnatyyppi
      description: Määrittää, minkä tyyppisen vetohihnan kanssa rukinlyhty on tarkoitettu
        käytettäväksi.
    compatible_wick_series:
      name: Yhteensopiva sydänlankasarja
      description: Ilmaisee yleiset sydänlankasarjat/-tyypit, joille pidike on suunniteltu
        (alan nimistö), mikäli myyjä on ne määritellyt.
    compatible_winder_head_bit:
      name: Yhteensopiva virityskammen kelauspää
      description: Määrittää virityskammen tukeman viritinavaimen/pään liitäntätyypin
        (esim. urapää, vaihdettavat kärjet, yleispää).
    compatible_windlass_rode:
      name: Yhteensopiva vinssiköysi
      description: Määrittää, minkä tyyppisen ankkuriköyden käyttöön vinssi on suunniteltu.
    compatible_windshield_type:
      name: Yhteensopiva tuulilasin tyyppi
      description: Määrittää, minkälaisen tuulilasin kanssa kotelo on suunniteltu
        käytettäväksi.
    compatible_wood:
      name: Yhteensopiva puu
      description: Määrittää, mille otelaudan puulajeille kiillotusainetta suositellaan
        ja minkä puulajien kanssa sen käyttö on turvallista.
    compatible_writing_surface:
      name: Yhteensopiva kirjoituspinta
      description: Määrittää pinnat/paperit, joille musteen on tarkoitus toimia parhaiten.
    compatible_zipper_size:
      name: Yhteensopiva vetoketjun koko
      description: 'Ilmaisee vetoketjun koon, johon vetimen on tarkoitus sopia (usein
        ilmaistaan muodossa #3, #5, #8, #10), mikä parantaa yhteensopivuussuodatusta.'
    compliance_certification:
      name: Vaatimustenmukaisuustodistus
      description: Valopalkin täyttämät tieliikenteen ja sähkömagneettisen yhteensopivuuden
        standardit.
    component_position:
      name: Komponentin sijainti
      description: Määrittää osan suhteellisen sijainnin moottorin jakokoneistossa
        (esim. etu- vs. takakansi, ylempi vs. alempi). Ei tarkoita osan sijaintia
        ajoneuvon etu- tai takaosassa.
    concentration_level:
      name: Pitoisuustaso
      description: Tomaattisoseen pitoisuutta kuvaava laadullinen merkintä (yksinkertainen,
        kaksinkertainen, kolminkertainen), joka auttaa valitsemaan oikean tuotteen
        reseptin vaatimusten mukaan.
    concentration_type:
      name: Tiivistetyyppi
      description: Ilmaisee, onko tuote käyttövalmis vai tiiviste ja yleiset laimennusohjeet
        (jos kyseessä tiiviste).
    concert_bass_drum_mounting_stand_type:
      name: Konserttibassorumpujen kiinnitystelinetyyppi
      description: Ilmaisee, miten konserttibassorumpu tuetaan tai kiinnitetään.
    concert_pitch_standard:
      name: Konserttivireen standardi
      description: Määrittää viritystason (A4-ääni), johon piano on viritetty myyntihetkellä
        (esim. A440, A442, A444).
    condiment_form:
      name: Höysteen tai mausteen muoto
      description: Ilmaisee piparjuurituotteen fyysisen muodon tai koostumuksen (esim.
        tahna, jauhe, kerma).
    condiment_texture:
      name: Mausteen rakenne
      description: Kuvaa relissin tai chutneyn fyysistä koostumusta (esim. kokkareinen,
        sileä).
    confetti_format:
      name: Konfetin muoto
      description: Määrittää konfettituotteen muodon sen perusteella, miten se on
        pakattu tai laukaistaan (esim. irtokonfetti vs. konfettitykit).
    conga_head_tensioning_system:
      name: Congarummun kalvon kiristysjärjestelmä
      description: Kongarummun kalvon kiristämiseen/virittämiseen käytetyn laitteiston
        tyyppi (esim. perinteinen korvakkeilla viritys vs. modernit pikaviritysmekanismit).
    conga_set_included_drum_types:
      name: Conga-settiin sisältyvät rumputyypit
      description: Mitkä congatyypit sisältyvät congasettiin (esim. quinto + conga
        + tumba).
    connector_case_style:
      name: Liitinkotelotyyli
      description: Luokittelee liitinkotelon yleisen rakennetyylin (esimerkiksi kova
        laukku tai pehmeä pussi) suojaustason ja kannettavuuden ilmoittamiseksi.
    console_cover_installation_method:
      name: Konsolin kannen asennusmenetelmä
      description: Määrittää, miten konsolin suojus kiinnitetään konsoliin/käsinojaan
        (esim. päälle vedettävä, joustohihnat, tarrakiinnitys, liimakiinnitys, klipsikiinnitys).
    console_display_type:
      name: Konsolin näyttötyyppi
      description: Määrittää koneen näytön tyypin (esim. LCD, LED, kosketusnäyttö).
    construction_design:
      name: Rakennesuunnitelma
      description: Ilmaisee, kuinka monesta nivelletystä osasta suojus koostuu, tämä
        vaikuttaa liikkuvuuteen (esimerkiksi yksi- tai kolmeosainen).
    contact_angle:
      name: Kosketuskulma
      description: Ilmaisee laakerin kehien kosketuskulman, joka ilmoitetaan joko
        yhtenä kulmana tai parina (esimerkiksi 36°/45°).
    contact_juggling_ball_fill_type:
      name: Kontaktijongleerauspallon täyttötyyppi
      description: Ilmaisee, onko pallo umpinainen vai täytetty (ja jos täytetty,
        niin minkä tyyppinen täyte), mikä vaikuttaa pallon painoon ja kestävyyteen.
    contact_juggling_ball_transparency:
      name: Kontaktijongleerauspallon läpinäkyvyys
      description: Määrittää pallon läpinäkyvyyden/optisen ulkonäön.
    contact_surface_material:
      name: Kosketuskohtien pintamateriaali
      description: Ilmaisee soittimeen kosketuksissa olevien kohtien materiaalin (esim.
        korkki/kumi) naarmuuntumisen estämiseksi ja otteen parantamiseksi.
    container_material:
      name: Säilön materiaali
      description: Määrittää tuotteen myyntisäiliön päämateriaalin (esim. lasi, polyeteenitereftalaatti
        muovi, alumiini).
    contaminant_removal:
      name: Epäpuhtauksien poisto
      description: Listaa epäpuhtauksien luokat, joiden poistamiseen tai vähentämiseen
        tuote on sertifioitu.
    contra_alto_clarinet_body_configuration:
      name: Kontra-alttoklarinetin rungon kokoonpano
      description: Kuvaa kontra-alttoklarinetin rungon muotoa ja kokonaisrakennetta
        (esimerkiksi suora vs. taitettu rakenne).
    contra_alto_clarinet_lowest_note_extension:
      name: Kontra-alttoklarinetin matalin nuotti (laajennus)
      description: Määrittää soittimen alimman soitettavan nuotin (alimman nuotin,
        jonka koskettimisto sallii), tällä erotellaan yleisesti erottamaan alimmat
        E♭-, D- ja C-mallit.
    contra_bass_clarinet_bell_type:
      name: Kontrabassoklarinetin kellon tyyppi
      description: Kontrabassoklarinetissa käytetty kellon rakenne.
    contra_bass_clarinet_bore_type:
      name: Kontrabassoklarinetin porauksen tyyppi
      description: Instrumentin porauksen rakenne.
    contra_bass_clarinet_lowest_written_note:
      name: Kontrabassoklarinetin alin mahdollinen sävel
      description: Soittimen alin mahdollinen sävel (riippuu usein siitä, onko käytössä
        matala C- vai matala Eb -laajennus).
    control_arm_bushing_material:
      name: Tukivarren puslan materiaali
      description: Määrittää mukana toimitettujen/asennettujen holkkien materiaalin,
        jos niitä on.
    control_arm_bushings_included:
      name: Mukana tulevat tukivarren puslat
      description: Ilmaisee, onko tukivarressa asennettuja laakereita.
    control_arm_finish:
      name: Tukivarren pintakäsittely
      description: Määrittää tukivarteen levitetyn suojapinnoitteen (korroosiosuojaus
        ja ulkonäkö).
    control_arm_grease_fitting_type:
      name: Tukivarren rasvanipan tyyppi
      description: Määrittää, sisältääkö tukivarsi-/pallonivelkokoonpano rasvanipan
        (Zerk) ja onko se huollettavissa.
    control_arm_material:
      name: Ohjausvarren materiaali
      description: Määrittää tukivarren rungon ensisijaisen materiaalin ja valmistusrakenteen.
    control_arm_position:
      name: Tukivarren asento
      description: Määrittää tukivarren jousitusasennon akselin kulman/puolen mukaan
        (esimerkiksi ylempi/alempi, etu/taka, vasen/oikea).
    control_arm_style:
      name: Ohjausvarren tyyppi
      description: Määrittää jousitusratkaisussa käytettävän tukivarren geometrisen
        tai rakenteellisen tyylin.
    control_cable_connector_type:
      name: Ohjauskaapelin liitintyyppi
      description: Määrittää ohjauskaapelin (tai kaapeleiden) pääte- tai liitintyypin,
        jota käytetään ohjauksen ja moottorin yhdistämiseen (esimerkiksi valmistajakohtaiset
        alkuperäisliittimet eli OEM-liittimet).
    control_voltage_or_gate_connectivity:
      name: Ohjausjännite tai porttikytkentä
      description: Määrittää, millaista ohjausjännite- ja porttiliitäntää tuetaan
        integroitaessa modulaariseen/analogiseen laitteistoon.
    controller_function:
      name: Hallintalaitteen toiminta
      description: Määrittää juoksumaton hallintapaneelin ensisijaisen tehtävän (esimerkiksi
        moottorin ohjauksen, virransyötön tai taajuusmuuttajan ohjauksen).
    controller_type:
      name: Ohjaintyyppi
      description: Moottorinohjain tai ohjausjärjestelmä, joka sisältyy sähköskootterin
        muunnossarjaan (tai joka vaaditaan), joka keskittyy yhteensopivuuden ja suorituskyvyn
        kannalta olennaisiin ohjainominaisuuksiin.
    conversion_kit_cooling_method:
      name: Muunnossarjan jäähdytysmenetelmä
      description: Moottorin, invertterin ja akun integraation ensisijainen lämmönhallintatapa.
    conversion_kit_installation_complexity:
      name: Muunnossarjan asennuksen monimutkaisuus
      description: Arvioitu asennuksen vaativuustaso perustuen asiakkaan tyypilliseen
        osaamiseen ja tarvittaviin työkaluihin.
    converted_bed_size:
      name: Sängyn koko muutettuna
      description: Ilmaisee sängyn koon tai kokoonpanon, joksi pinnasänky muunnetaan
        tämän sarjan asennuksella.
    convertible_configuration:
      name: Muunneltava kokoonpano
      description: 'Ilmaisee, kuinka moneen erilaiseen sängyn kokoonpanoon tuote voidaan
        muuntaa (esim. kolmikäyttöinen: pinnasänky → taaperosänky → vuodesohva).'
    convertible_high_chair_modes:
      name: Muunnettavan syöttötuolin tilat
      description: Määrittää istuinkokoonpanot, joihin tuoli voidaan muuntaa.
    cookie_decorating_kit_items_included:
      name: Pikkuleipien koristelusarjan mukana tulevat osat
      description: Luettelee mukana toimitettavat koristelutarvikkeet, jotta asiakkaat
        tietävät tarkalleen, mitä pakkaus sisältää (esim. kuorrutusputket, strösselit,
        keksimuotit).
    cookie_variety:
      name: Pikkuleipälajike
      description: Yksilöi keksin tyypin tai lajikkeen, minkä avulla ostaja voi löytää
        nopeasti haluamansa tyypin.
    cooking_state:
      name: Kypsyysaste
      description: Ilmaisee kanatuotteen kypsyysasteen myyntihetkellä (raaka, täysin
        kypsennetty, marinoitu jne.).
    coolant_additive_purpose:
      name: Jäähdytysnesteen lisäaineen tarkoitus
      description: Tämä ilmaisee jäähdytysnesteen lisäaineen ensisijaisen käyttötarkoituksen
        (ei jäähdyttimen huuhtelu tai erillinen tiivisteainetuotteet).
    coolant_base_fluid:
      name: Jäähdytysnesteen perusneste
      description: Yksilöi pakkasnesteen/jäähdytysnesteen koostumuksessa käytetyn
        ensisijaisen glykolipohjan.
    coolant_outlet_connection_style:
      name: Jäähdytysnesteen poistoliitännän tyyppi
      description: Jäähdytinletkun tai jäähdytysnestelinjan liitäntätapa.
    coolant_outlet_neck_angle:
      name: Jäähdytysnesteen lähtöliitännän kulma
      description: Vesiliitännän kulma tai suuntaus suhteessa kiinnityslaippaan/moottoriin
        (hyödyllinen ylävesiletkun reitityksessä).
    coolant_technology:
      name: Jäähdytysnesteteknologia
      description: Määrittää jäähdytysnesteen kemiallisen koostumuksen tai teknologiasukupolven
        (kuten se on yleensä merkitty pakkaukseen).
    coolant_temperature_sensor_port:
      name: Jäähdytysnesteen lämpötila-anturin portti
      description: Sisältääkö vesiliitäntä paikan jäähdytysnesteen lämpötila-anturille
        tai -kytkimelle ja mikä on sen liitäntätapa.
    coolant_temperature_sensor_seal_type:
      name: Jäähdytysnesteen lämpötila-anturin tiivistystyyppi
      description: Anturin ja moottorin tai jäähdytysnestekanavan välinen tiivistysmenetelmä.
    cooling_system_component_included:
      name: Sisältyvät jäähdytysjärjestelmäkomponentit
      description: Luettelee vesipumpun mukana toimitetut jäähdytysjärjestelmän lisäkomponentit.
    cooling_system_flush_application_step:
      name: Jäähdytysjärjestelmän huuhtelun sovellusvaihe
      description: Ilmaisee tuotteen käyttökohteen huoltoprosessissa (esimerkiksi
        esihuuhtelun puhdistusaine vs. loppuhuuhtelu/neutralointiaine).
    cooling_system_type:
      name: Jäähdytysjärjestelmän tyyppi
      description: Määrittää veneen keskimoottorin jäähdytysjärjestelmän kokoonpanon
        (esim. raakavesijäähdytys/avoin kierto, suljettu kierto/makeavesijäähdytys
        lämmönvaihtimella, kölijäähdytys).
    cord_material:
      name: Narun materiaali
      description: Määrittää narun/nauhan materiaalin, jota käytetään liinan vetämiseen
        saksofonin läpi.
    core_type_bass_strings:
      name: Ydinrakenne (bassokielten ydin)
      description: Määrittää kielen ytimen muodon, mikä vaikuttaa tuntumaan ja joustavuuteen.
    cork_grease_base_material:
      name: Korkkirasvan pohjaraaka-aine
      description: Korkkirasvan koostumuksen ensisijainen raaka-aine (esim. lanoliinipohjainen).
    cork_grease_form:
      name: Korkkirasvan tuotetyyppi
      description: Korkkirasvatuotteen fyysinen muotokerroin.
    corn_presentation:
      name: Maissin esillepano
      description: Määrittää maissituotteen fyysisen esitystavan tai muodon (esim.
        kokonainen kuorineen, jyvät, jauhe).
    corn_syrup_variety:
      name: Maissisiirappilajike
      description: Määrittää siirapin tietyn tyypin tai valmistusmenetelmän.
    corn_variety:
      name: Maissilajike
      description: Yksilöi myytävän maissin tietyn kasvitieteellisen lajikkeen tai
        kauppanimikkeen, jonka avulla ostaja voi valita sen maun, koostumuksen, värin
        ja kulinaarisen käytön mukaan.
    corner_compatibility:
      name: Kulman yhteensopivuus
      description: Määrittää pöydän kulman muodon (kulma tai pyöreä), jolle kansi
        on suunniteltu.
    corner_flag_features:
      name: Kulmalipun ominaisuudet
      description: Korostaa kulmalipun erityisiä toiminnallisia ominaisuuksia tai
        parannuksia (esim. kokoontaitettava tanko, heijastava materiaali).
    cornet_mouthpiece_shank_type:
      name: Kornetin suukappaleen varren tyyppi
      description: Määrittää kornetin tukeman suukappaleen kiinnitystavan tai varren
        yhteensopivuuden varmistamiseksi.
    cornhole_league_certification:
      name: Cornhole-liigan sertifiointi
      description: Ilmaisee viralliset sertifikaatit tai liigan hyväksynnän, jonka
        tuote täyttää.
    corrosion_resistance:
      name: Korroosionkesto
      description: Määrittää jalustan/pidikkeen korroosionkestoluokituksen ulkokäyttöön.
    corrosion_resistance_level:
      name: Korroosionkeston taso
      description: Ilmaisee, että korroosiosuojaus soveltuu makeaan veteen ja meriveteen.
    costume_components_included:
      name: Asun mukana tulevat osat
      description: Luettelee asuun sisältyvät vaatekappaleet ja asusteet ja täsmentää,
        mitä sarjaan kuuluu.
    cotton_weave_type:
      name: Puuvillakudostyyppi
      description: Kuvaa tulostettavan puuvillapinnan kudonta-/neulosrakennetta, joka
        vaikuttaa tekstuuriin ja painatuksen terävyyteen.
    counter_type:
      name: Tiskin tyyppi
      description: Ilmaisee sisäänrakennetun toiston tai voimaseurannan olemassaolon
        ja tyylin.
    counterweight_fill_material:
      name: Vastapainon täytemateriaali
      description: Ilmaisee täyteaineen, jolla vastapaino voidaan esitäyttää ja jolla
        sitä voidaan täyttää.
    counterweight_type:
      name: Vastapainon tyyppi
      description: Määrittää vastapainon rakenteellisen muotoilun tai tyylin, kuten
        hiekkasäkki tai teräslevy, yhteensopivuuden ja asennuksen helpottamiseksi.
    coupler_system:
      name: Kytkinjärjestelmä
      description: Pienoismalliveturiin asennettu kytkintyyppi tai -järjestelmä kaluston
        yhteensopivuutta varten.
    court_surface_suitability:
      name: Kentän alustan sopivuus
      description: Ilmaisee koripallokentän pinnan, jolle kengän pohja on suunniteltu,
        mikä auttaa ostajaa valitsemaan oikean pidon ja kestävyyden halliin, ulkoasfaltille/betonille
        tai molemmille.
    cover_fit_style:
      name: Liinan asettumistyyli
      description: Kuvaa, miten kansi asettuu pöydän päälle ja vaikuttaa sen ulkonäköön
        ja suojaustasoon.
    cover_fit_type:
      name: Suojuksen istuvuustyyppi
      description: Ilmaisee, onko suojapeite räätälöity (mittatilaus/puolittain mittatilaus)
        vai yleismallinen, sekä onko se tarkoitettu vesillä tapahtuvaan kiinnitykseen
        tai säilytys-/trailerikäyttöön.
    cowbell_beater_type:
      name: Lehmänkellon iskulaitteen tyyppi
      description: Suositeltu iskulaite lehmänkellon soundille/viimeistelylle (jos
        tuote määrittelee sen).
    cowbell_mounting_method:
      name: Lehmänkellon asennusmenetelmä
      description: Miten lehmänkello on tarkoitus asentaa/käyttää (kädessä pidettävä
        vs. laitteistoon kiinnitettävä).
    cowbell_sound_character:
      name: Lehmänkellon sointi
      description: Yleinen soinnin luonne, jota käytetään tuoteluetteloissa (tukee
        koon lisäksi myös löydettävyyttä).
    cradle_capacity:
      name: Telakan kapasiteetti
      description: Ilmaisee, onko kehto suunniteltu yhdelle vauvalle vai kaksosille.
    craft_cutter_embosser_machine_operation:
      name: Askarteluleikkurin/reliefileikkurin käyttö
      description: Määrittää leikkurin tai kohokuviointilaitteen toimintaperiaatteen
        käyttäjän työnkulun näkökulmasta (esim. käsikampi, sähköinen painike, sovellusohjattu).
    craft_decoration_maker_accessories_included:
      name: Mukana tulevat askartelukoristeiden valmistustarvikkeet
      description: Luetteloi askartelukoneen mukana tulevat tärkeimmät lisätarvikkeet
        (esim. aloitusteippi/-kalvo, tarratäytöt, glitterkasetit, puhdistustyökalut).
    craft_foil_application_method:
      name: Askartelukalvon kiinnitystapa
      description: Määrittää, miten askartelufolio on tarkoitettu kiinnitettäväksi
        tai aktivoitavaksi (liima, lämpö, väriaine/reaktiivinen jne.).
    craft_foil_format:
      name: Askartelufolion muoto
      description: Ilmaisee askartelufolion fyysisen muodon myyntihetkellä (esim.
        rulla tai arkki).
    craft_glue_finish:
      name: Askarteluliiman pinta
      description: Kuvailee liiman ulkonäköä kuivumisen jälkeen (esim. kirkas, valkoinen/läpinäkymätön,
        läpikuultava, kiiltävä/matta).
    craft_magnet_application:
      name: Askartelumagneetin kiinnitystapa
      description: Magneettituotteen ensisijainen käyttötarkoitus tai kiinnityspinta
        askartelussa.
    craft_magnet_holding_strength_level:
      name: Askartelumagneetin pitovoimataso
      description: Craft-magneettien suhteellinen lujuusluokka, joka auttaa ostajaa
        valitsemaan projektiinsa sopivan pitovoiman.
    craft_organizer_storage_features:
      name: Craft -lokerikon säilytysominaisuudet
      description: Kuvailee askartelujärjestelijöiden organisointiominaisuudet ja
        sisäiset säilytyselementit (esim. säädettävät väliseinät, laatikot, läpinäkyvät
        taskut).
    craft_scoring_board_included_accessories:
      name: Craft-pistetaulun mukana tulevat lisävarusteet
      description: Määrittää pistetaulun mukana toimitettavat lisävarusteet (esimerkiksi
        pisteytyskynä/taittotyökalu, kolmio, kirjekuorityökalu).
    craft_scoring_board_measurement_system:
      name: Craft-pistetaulun mittausjärjestelmä
      description: Määrittää pistetaulussa käytetyn mittajärjestelmän (brittiläinen,
        metrinen, molemmat tai ei mittamerkintöjä).
    craft_wire_finish_coating:
      name: Craft-langan viimeistely/pinnoite
      description: Määrittää langan pintakäsittelyn tai pinnoitteen, jolla pyritään
        säilyttämään väri, ehkäisemään tummumista tai suojaamaan lankaa.
    craft_wood_surface_preparation:
      name: Craft-puupinnan valmistelu
      description: Ilmaisee, onko puupinta valmis viimeisteltäväksi/maalattavaksi
        vai vaatiiko se esikäsittelyä (esim. hiontaa/pohjamaalausta).
    crank_spindle_interface:
      name: Kampiakselin liitäntätyyppi
      description: Määrittää keskiön tukeman kampiakselin liitäntätyypin (esim. SRAM
        DUB, nelikantti), mikä varmistaa kampisarjan ja keskiön välisen yhteensopivuuden.
    crankshaft_balance_type:
      name: Kampiakselin tasapainotustyyppi
      description: Ilmaisee, onko kampiakseli tasapainotettu sisäisesti (neutraali)
        vai ulkoisesti (vaatii värinänvaimentimen/vauhtipyörän vastapainot).
    crankshaft_bolt_pattern:
      name: Kampiakselin pulttijako
      description: Kampiakselin takalaipan pulttijako vauhtipyörän tai vetolevyn kiinnitystä
        varten.
    crankshaft_sensor_reluctor_type:
      name: Kampiakselin anturin reluktorityyppi
      description: Kampiakselin asentoanturin liipaisin- tai reluktoripyörän kokoonpano
        (jos sovellettavissa).
    craps_accessories_included:
      name: Craps-pelin mukana tulevat lisätarvikkeet
      description: Tunnistaa noppien, pelimerkkien ja pelipöydän lisäksi muut craps-noppapeliin
        liittyvät lisävarusteet.
    crash_cymbal_profile:
      name: Aksenttipellin profiili
      description: Symbaalin yleinen kaarevuus/profiili (kaaren nousu), mikä vaikuttaa
        äänen korkeuteen ja vasteeseen.
    crash_cymbal_sound_character:
      name: Crash-symbaalin sointi
      description: Crash-symbaalin soinnin sävyn ensisijaiset määritteet.
    crash_pad_size_class:
      name: Kiipeilymaton kokoluokka
      description: Ilmaisee kiipeilymaton yleisen kokoluokan, mikä antaa ostajille
        nopean käsityksen suoja-alueesta ilman tarvetta tarkkoihin mittoihin.
    crate_engine_assembly_level:
      name: Vaihtomoottorin kokoonpanon aste
      description: Kuinka valmis moottori on toimitettaessa (mitkä pääkomponentit
        sisältyvät toimitukseen).
    cream_base_ingredient:
      name: Kerman perusainesosa
      description: Yksilöi kerman ensisijaisen raaka-aineen, mikä kattaa sekä maitotuotteet
        että kasviperäiset vaihtoehdot.
    cream_cheese_base:
      name: Tuorejuuston raaka-ainepohja
      description: Yksilöi tuorejuuston valmistuksessa käytetyn ensisijaisen maito-
        tai kasviperäisen lähteen, mikä auttaa ostajaa ruokavalioon, allergioihin
        ja makuun liittyvissä kysymyksissä.
    cream_cheese_form:
      name: Tuorejuuston muoto
      description: Kuvaa tuorejuuston fyysistä muotoa tai koostumusta (esim. lohko,
        vatkattu, dippi), mikä vaikuttaa levittyvyyteen ja käyttötarkoitukseen.
    cream_variety:
      name: Kermatyyppi
      description: Yksilöi kerman tyypin sen rasvapitoisuuden, valmistustavan tai
        käyttötarkoituksen mukaan (esimerkiksi kahvikerma, kuohukerma, ruoanlaittokerma).
    crib_accessory_features:
      name: Pinnasängyn mukana tulevat lisävarusteet
      description: Luettelee pinnasänkyjen ja taaperosängyn varusteille ominaisia
        toiminnallisia tai mukavuutta edistäviä ominaisuuksia, kuten hengittävyyden
        tai joustavat reunat.
    crib_bumper_features:
      name: Pinnasängyn suojapehmusteen ominaisuudet
      description: Korostaa pinnasängyn suojapehmusteen erityisiä toiminnallisia ominaisuuksia.
    crib_conversion_kit_components:
      name: Pinnasängyn muunnossarjan komponentit
      description: Luettelee pakkauksen tärkeimmät osat, jotta ostaja voi varmistaa,
        että hänellä on kaikki tarvittava asennukseen.
    cricket_ball_grade:
      name: Krikettipalloluokka
      description: Määrittää pallon laatutason tai ai sen, millaiseen peliin se on
        tarkoitettu.
    cricket_ball_piece_construction:
      name: Krikettipallon osarakenne
      description: Ilmaisee pallon kuoren valmistuksessa käytettyjen ulkokuoren osien
        tai valettujen osien lukumäärän, mikä on keskeinen laadun ja hinnan mittari.
    cricket_ball_type:
      name: Krikettipallon tyyppi
      description: Määrittää tuotteen mukana toimitetun krikettipallon tyypin tai
        ilmoittaa, jos tuotteen mukana ei toimiteta palloa.
    cricket_bat_accessory_type:
      name: Krikettimailan lisävarustetyyppi
      description: Määrittää krikettimailan lisävarusteen tai huoltotuotteen tyypin,
        jotta ostaja voi suodattaa tarvitsemansa tuotteen nopeasti.
    cricket_bat_size:
      name: Krikettimailan koko
      description: Ilmaisee standardoidun krikettimailan koko-luokituksen (0–6, Harrow,
        SH, LH), joka tyypillisesti valitaan pelaajan iän ja pituuden perusteella.
    cricket_bat_size_compatibility:
      name: Krikettimailan koon yhteensopivuus
      description: Luettelee mailakoot, joille lisävaruste on tarkoitettu. Tämän avulla
        varmistetaan yhteensopivuus.
    cricket_helmet_role:
      name: Krikettikypärätyyppi
      description: Ilmaisee pelipaikan, jolle kypärä on tarkoitettu, esimerkiksi lyöminen
        tai hilojen puolustaminen.
    cricket_leg_guard_type:
      name: Krikettijalkasuojatyyppi
      description: Merkitsee kriketin jalkasuojien erityisen tyypin.
    cricket_player_role:
      name: Krikettipelaajan pelipaikka
      description: Määrittää, minkä pelipaikan pelaajille kenkä on tarkoitettu.
    cricket_protection_grade:
      name: Kriketin suojausluokka
      description: Määrittää krikettivarustevalmistajan määrittämän suojausluokan.
    cricket_stump_base_type:
      name: Krikettiportin pohjan tyyppi
      description: Ilmaisee portin mukana toimitettavan pohjatyypin tai -materiaalin,
        joka vaikuttaa vakauteen ja sopivuuteen pelipinnalle.
    cricket_stump_target_features:
      name: Krikettiportin ominaisuudet
      description: Korostaa selkeitä toiminnallisia ominaisuuksia, jotka parantavat
        käytettävyyttä, näkyvyyttä, kestävyyttä tai vakautta harjoittelussa.
    cricket_stump_type:
      name: Krikettiporttityyppi
      description: Luokittelee krikettiporttien tyypin tai rakenteen, mikä auttaa
        ostajia valitsemaan perinteisten otteluporttien, harjoitusmallien tai nykyaikaisten
        valaistujen vaihtoehtojen välillä.
    cricket_training_focus:
      name: Kriketin harjoittelufokus
      description: Ensisijainen kriketin taito tai osa-alue, jonka kehittämiseen apuväline
        on suunniteltu.
    croquet_set_components_included:
      name: Krokettisetin mukana tulevat osat
      description: Luettelee kaikki sarjan mukana toimitetut avainkomponentit (esim.
        hilat, maatapit, kantolaukku), jotta asiakkaat ymmärtävät täsmälleen, mitä
        he ovat ostamassa.
    cross_country_binding_system:
      name: Maastohiihtosuksien sidejärjestelmä
      description: Määrittää maastohiihtosuksien sidestandardin, jota varten tuotteeseen
        on porattu reikiä tai jonka kanssa se on yhteensopiva.
    cross_stitch_chart_symbol_type:
      name: Ristipistokaavion symbolityyppi
      description: Tämä ilmaisee kaavion esitystavan (symbolit, värit tai molemmat).
    cross_stitch_finishing_type:
      name: Ristipistotyön viimeistelytyyppi
      description: Tämä ilmaisee ristipistotyön tarkoitetun viimeistely- tai esillepanotavan.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Ristipistokehyksen kiinnitysmekanismi
      description: Ilmaisee, miten kangas on kiinnitetty/kiristetty runkoon (esim.
        klipsit, puristimet, nastat), mikä vaikuttaa helppokäyttöisyyteen ja kankaan
        yhteensopivuuteen.
    cross_stitch_frame_included_components:
      name: Ristipistokehykseen sisältyvät komponentit
      description: Luettelee pakkauksen sisällön (esimerkiksi pelkkä kehys, kehys
        + kiinnikkeet + jalusta), mikä vähentää epäselvyyksiä ja palautuksia.
    cross_stitch_frame_type:
      name: Ristipistokehyksen tyyppi
      description: Määrittää ristipistokehystyypin tai -rakenteen (miten kangas kiinnitetään),
        mikä vaikuttaa käytettävyyteen ja soveltuvuuteen eri projekteissa.
    cross_stitch_pattern_technique:
      name: Ristipistokuviotekniikka
      description: Tämä ilmaisee kaavion ristipistotekniikan tai -tyylin.
    crossbar_shape_profile:
      name: Poikkituen muoto tai profiili
      description: Määrittää poikkituen aerodynamiikan / profiilin muodon.
    crossbar_style:
      name: Poikkituen tyyppi
      description: Määrittää poikkipuun rakennetyypin ja erottaa jäykät kilpailutangot
        joustavista tai hybridiharjoitustangoista.
    crossbow_type:
      name: Varsijousityyppi
      description: Yksilöi varsijousen perustyypin, kuten taljajousi, vastakaarijousi
        tai pistoolijousi. Rakennustyyli ajaa tehokkuutta, kokoa ja käyttää koteloa,
        joten ostaja suodattaa usein sen mukaan.
    crossover_component_type:
      name: Jakosuotimen komponenttityyppi
      description: Määrittää passiivisessa jakosuodinverkossa käytetyn ensisijaisen
        komponenttitopologian.
    crossover_configuration:
      name: Jakosuotimen konfiguraatio
      description: Ilmaisee, käyttääkö jakosuodin yhtä vai useampaa jakotaajuutta
        (esim. 2-tie- tai 3-tie-rakenteet).
    crossover_type:
      name: Jakosuodintyyppi
      description: Tämä on komponenttisarjaan sisältyvän jakosuotimen tyyppi.
    crown_profile:
      name: Kupuprofiili
      description: Määrittää lippalakin kuvun korkeuden/profiilin lipan yläpuolella.
    crown_style:
      name: Kuputyyli
      description: Määrittää knallin kuvun yleisen siluetin tai profiilin.
    crust_taste_profile:
      name: Kuoren makuprofiili
      description: Ilmaisee, onko kuoren luontainen maku makea, suolainen vai neutraali.
    crystal_finish:
      name: Kristallipinta
      description: Kuvaa irtokiteen pintakäsittelyn, pinnoitteen tai prosessoinnin
        asteen (esim. hiomaton/raaka, kiillotettu, rumpuhiottu, viistottu/fasetoitu,
        huurrettu, aura-pinnoitettu, värjätty, lämpökäsitelty).
    crystal_material:
      name: Kristallimateriaali
      description: Määrittää kellon taulua suojaavan lasin valmistusmateriaalin.
    crystalline_finish_style:
      name: Kristallinen pintaviimeistely
      description: Tämä on palmuvahan aiheuttama tyypillinen kiteinen/höyhenmäinen
        ulkonäkö valmiissa kynttilöissä.
    cucumber_variety:
      name: Kurkkulajike
      description: Määrittää kurkkulajikkeen tai -markkinalajikkeen (esimerkiksi englantilainen,
        persialainen, Kirby).
    cue_compatibility:
      name: Kepin yhteensopivuus
      description: Ilmaisee kepin nivelkokoonpanon, jolle kotelo on suunniteltu, esimerkiksi
        yksiosaiset tai 3/4-niveliset kepit.
    cue_construction:
      name: Kepin rakenne
      description: Ilmaisee kepin rakenteen – osien lukumäärä tai onko kyseessä osakomponentti,
        esimerkiksi pelkkä perä tai pelkkä varsi – mikä vaikuttaa kannettavuuteen
        ja yhteensopivuuteen.
    cue_head_material:
      name: Kepin pään materiaali
      description: Määrittää biljardikepin pään materiaalin (palloon koskettava osa),
        joka vaikuttaa kestävyyteen ja pinnan suojaamiseen.
    cue_sport_compatibility:
      name: Soveltuvat biljardilajit
      description: Ilmaisee, mihin biljardilajiin lisävaruste on suunniteltu.
    cue_thread_size:
      name: Kepin kierrekoko
      description: Määrittää laajennuksissa, liitossuojissa, painopulteissa ja muissa
        keppitarvikkeissa käytettävän kierteen, jotta sopivuus voidaan taata.
    cue_tip_hardness:
      name: Biljardikepin kärjen kovuus
      description: Luokittelee biljardikepin kärjen kovuusasteen, joka vaikuttaa lyöntipallon
        hallintaan ja lyöntituntumaan.
    cuff_height:
      name: Saappaansuun korkeus
      description: Ilmaisee rullaluistimen saappaansuun korkeuden (matala, keskikorkea,
        korkea, irrotettava/säädettävä), mikä vaikuttaa tukeen ja joustavuuteen.
    cuff_position:
      name: Saappaansuuhihnan sijainti
      description: Ilmaiseen, mihin kohtaan ratsastajan kehoa hihnan mansetti on tarkoitettu
        kiinnitettäväksi.
    cultivation_method:
      name: Viljelymenetelmä
      description: Määrittelee, miten vihannekset on viljelty (kattaa viljelytekniikat
        ja viljelykäytännöt).
    cup_type:
      name: Kuppityyppi
      description: Ilmaisee paljetin pintaprofiilin (litteä vs. kuppimainen) ja kupin
        syvyyden, jotka voivat vaikuttaa kimallukseen, tekstuuriin ja siihen, miten
        paljetti asettuu ommeltuna tai liimattuna.
    cupcake_size:
      name: Kuppikakun koko
      description: Määrittää myytävien kuppikakkujen fyysisen kokoluokan (esimerkiksi
        mini, vakio tai jumbo).
    curd_size:
      name: Juustorakeiden koko
      description: Määrittää raejuuston rakeiden koon tai rakenteen.
    cure_method:
      name: Kovettumismenetelmä
      description: Kuvaa liiman kovettumisprosessia (esimerkiksi UV-valo, ilmankosteus,
        lämpö).
    curing_or_preparation_method:
      name: Säilöntä- tai valmistusmenetelmä
      description: Määrittää, miten oliivit on säilötty tai muuten valmistettu (esimerkiksi
        suolavesi, öljy, grillattu).
    curling_broom_head_material:
      name: Curlingharjan pään materiaali
      description: Määrittää curlingharjan pään tai pehmusteen ensisijaisen materiaalikoostumuksen.
    curling_broom_head_type:
      name: Curlingharjan päätyyppi
      description: Määrittää curlingharjan pään/pehmusteen tyylin tai rakenteen.
    curling_shoe_slider_material:
      name: Curlingkengän liukumateriaali
      description: Yksilöi curling-kenkien liukupohjan päämateriaalin.
    curling_training_aid_type:
      name: Curling-harjoitteluvälineen tyyppi
      description: Määrittää curlingharjoitteluvälineen tyypin.
    curry_variety:
      name: Currytyyppi
      description: Luokittelee currykastikkeet sen mukaan, millaisen curryn tai reseptin
        valmistukseen ne on tarkoitettu (esimerkiksi tikka masala, massaman tai thaimaalainen
        vihreä curry), jotta makua ja tyyliä voidaan suodattaa tarkasti.
    cushion_rubber_profile:
      name: Vallin kumiprofiili
      description: Tämä on vallin kumipalojen profiilikoodi.
    cushioning_level:
      name: Pehmustustaso
      description: Määrittää sukan tarjoaman pehmustustason, joka vaikuttaa käyttömukavuuteen.
    custom_label_content_type:
      name: Mukautettu lappusisältötyyppi
      description: Määrittää, mitä tietoja kiinniommeltavaan merkkiin mukautetaan
        (esim. nimi, logo, viesti, koko, hoito-ohjesymbolit, yhteystiedot).
    customization_type:
      name: Mukauttamisen tyyppi
      description: Määrittää, onko pelipaita tyhjä, pelaajalle omistettu vai mukautettu
        personoidulla nimellä ja numerolla.
    cut_or_preparation_style:
      name: Leikkaus- tai valmistustyyli
      description: Ilmaisee tölkin tai purkin vihannespalojen leikkaus- tai valmistustavan
        (esim. kokonaiset, kuutioidut, varret).
    cut_resistance_rating:
      name: Viiltosuojausluokitus
      description: Määrittää tuotteen virallisesti testatun viiltosuojaustason.
    cut_type:
      name: Leikkaustyyppi
      description: Määrittää, myydäänkö kangasta metritavarana, valmiiksi leikattuina
        paloina vai rullana.
    cutting_application:
      name: Leikkauskäyttö
      description: Ilmaisee saksien tarkoitetun leikkauskäyttötarkoituksen.
    cutting_mat_grid_style:
      name: Leikkausmaton ruudukkotyyppi
      description: Ilmaisee mattoon painetun ohjeruudukon.
    cutting_mat_intended_use:
      name: Leikkausmaton käyttötarkoitus
      description: Ilmaisee leikkuulaudan ensisijaisen käyttötarkoituksen.
    cv_boot_clamp_type:
      name: Vetonivelen suojakumin kiinnitystyyppi
      description: Määrittää vetoakselin suojakumin kiinnitykseen käytetyn kiristimen
        tai pannan tyylin.
    cv_boot_kit_contents:
      name: Vetonivelen suojakumipakkauksen sisältö
      description: Luettelee vetoakselin suojakumin mukana tulevat osat (esim. kiristimet,
        rasvapussi, kiinnitysnauhat).
    cv_boot_material:
      name: Vetoakselin suojakumin materiaali
      description: Määrittää vetonivelen suojakumin ensisijaisen materiaalirakenteen.
    cv_boot_position:
      name: Vetonivelen suojakumin paikka
      description: Määrittää, sopiiko vetoakselin suojakumi akselin sisempään vai
        ulompaan vetoniveleen.
    cycling_apparel_fit:
      name: Pyöräilyvaatteen istuvuus
      description: Kuvaa vaatteen leikkausta, istuvuutta ja aerodynamiikkaa (esimerkiksi
        kisa, rento).
    cylinder_head_assembly:
      name: Sylinterikannen kokoonpano
      description: Määrittää sylinterikannen täydellisyysasteen myyntihetkellä (esim.
        täysin koottu venttiilikoneiston komponentit asennettuina tai paljas/kokoamaton
        valu).
    cylinder_head_material_grade:
      name: Sylinterikannen materiaaliluokka
      description: Määrittää sylinterinkannen valussa käytetyn materiaalin ja laadun.
    cylinder_head_position:
      name: Sylinterikannen paikka
      description: Määrittää sylinteririvin, puolen tai suuntauksen, johon sylinterikansi
        sopii monirivisessä moottorissa (esim. vasen/oikea puoli tai rivi 1/rivi 2).
    cymbal_alloy:
      name: Symbaalin metalliseos
      description: Määrittää pakkauksen symbaalien seoksen/koostumuksen.
    cymbal_application:
      name: Symbaalin käyttötarkoitus
      description: Ensisijainen soittokäyttötarkoitus, johon symbaali on tarkoitettu
        tai johon sitä markkinoidaan.
    cymbal_arm_mounting_interface:
      name: Symbaalivarren kiinnitystapa
      description: Määrittää, miten symbaalivarsi kiinnittyy rumpusetin muihin osiin
        (esim. puristin, teline, jalusta).
    cymbal_arm_rotation_positioning_features:
      name: Symbaalivarren kierto- ja asemointiominaisuudet
      description: Määrittää asennon säätöominaisuudet, jotka vaikuttavat varren kulman/kierron
        säätöön ja lukitsemiseen.
    cymbal_arm_style:
      name: Symbaalivarren tyyli
      description: Määrittää, onko symbaalivarsi suora vai puomi. Tämä vaikuttaa ulottuvuuteen
        ja sijoitteluun.
    cymbal_drum_case_wheel_configuration:
      name: Symbaali- ja rumpukotelon pyörärakenne
      description: Ilmaisee, onko laukussa pyörät ja (tarvittaessa) pyörien kokoonpano
        pyörillä kuljetusta varten.
    cymbal_hammering_style:
      name: Symbaalin vasarointityyli
      description: Kuvaa vasarointiprosessia/ulkoasua, joka vaikuttaa monimutkaisuuteen
        ja tuntumaan.
    cymbal_kit_components_included:
      name: Symbaalisetin mukana tulevat komponentit
      description: Määrittää, mitkä symbaalityypit sisältyvät ride-symbaalisarjaan
        (itse ride-symbaalin lisäksi).
    cymbal_kit_items_included:
      name: Symbaalisetin mukana tulevat tuotteet
      description: Määrittää pakkaukseen/settiin sisältyvät symbaalit (symbaalityypin
        mukaan).
    cymbal_lathing:
      name: Symbaalin sorvausmuoto
      description: Ilmaisee, onko symbaalin pinnasta osa sorvattu (uurteinen, sekä
        sorvatun osan suuruuden ja sorvaamattoman/käsittelemättömän osan suuruuden.
    cymbal_playing_style_genre:
      name: Symbaalien soittotyyli/genre
      description: Ilmaisee tyypillisen esiintymistilanteen, johon symbaalit on suunniteltu
        (esim. vatsatanssin zillit vs. marssi- tai orkesterisymbaalit).
    cymbal_set_configuration:
      name: Symbaalisetin kokoonpano
      description: Ilmaisee, myydäänkö tuotetta yksittäisenä symbaalina, parina vai
        useamman parin sarjana (esim. ryhmäopetukseen).
    cymbal_sound_character:
      name: Symbaalin äänen luonne
      description: Kuvaa symbaalin tunnistamiseen käytettävän yleisen soinnillisen
        profiilin/vireen, (esim. kirkas tai tumma).
    cymbal_sustain:
      name: Symbaalin kesto
      description: Määrittää, kuinka kauan symbaali soi lyönnin jälkeen.
    cymbal_type:
      name: Symbaalityyppi
      description: Määrittää sen symbaalin toiminnallisen roolin, jota elektroninen
        symbaalityyny on tarkoitettu jäljittelemään.
    cymbal_volume_level:
      name: Symbaalin äänenvoimakkuus
      description: Tämä on symbaalin koettu äänenvoimakkuus/äänenvoimakkuusluokka.
    cymbal_weight_class:
      name: Symbaalien painoluokka
      description: Ilmaisee symbaalin painoluokan, joka vaikuttaa sävyyn, äänenvoimakkuuteen
        ja vasteeseen.
    dairy_heat_treatment:
      name: Maitotuotteiden lämpökäsittely
      description: Ilmaisee kerman käsittely- tai pastörointiasteen (esim. raaka,
        pastöroitu, UHT), joka vaikuttaa kerman säilyvyyteen, makuun ja vatkattavuuteen.
    damage_type:
      name: Vauriotyyppi
      description: Määrittää tuulilasin vauriotyypit, joiden korjaamiseen tuote on
        tarkoitettu.
    damper_pedal_style:
      name: Kaikupedaalin tyyli
      description: Kuvaa kosketinsoittimissa/digitaalipianoissa käytettävän kaikupedaalin
        fyysistä tyyliä.
    damping_adjustability:
      name: Vaimennuksen säädettävyys
      description: Ilmaisee, mitkä iskunvaimentimen vaimennuksen ja/tai ajokorkeuden
        parametrit ovat säädettävissä.
    damping_level:
      name: Vaimennustaso
      description: Ilmaisee, kuinka paljon rumpuvaimennin vähentää äänenvoimakkuutta
        ja äänen kestoa.
    dance_occasion:
      name: Tanssitilaisuus
      description: Ilmaisee vaatteen käyttötarkoituksen tanssiharjoittelussa tai esityksessä.
    darbuka_accessories_included:
      name: Darbukan mukana tulevat lisävarusteet
      description: Luettelee darbukan mukana toimitettavat yleiset lisävarusteet.
    darbuka_body_finish_type:
      name: Darbukan rungon viimeistelytyyppi
      description: Kuvailee darbukan rungon ulkopintaa, pinnoitetta tai koristeellista
        merkintää.
    darbuka_head_material:
      name: Darbuka nrumpukalvomateriaali
      description: Määrittää darbukan rumpukalvon materiaalin.
    dart_barrel_material:
      name: Tikan runkomateriaali
      description: Määrittää tikan runkopäämateriaalin, mikä vaikuttaa painoon, kestävyyteen
        ja hintaan.
    dart_shaft_design:
      name: Tikan varren muotoilu
      description: Luokittelee varren mekaanisen rakenteen, kuten onko se kiinteä,
        pyörivä, teleskooppinen vai integroitu siivekkeeseen, mikä vaikuttaa suorituskykyyn
        ja hintaan.
    dart_shaft_thread_type:
      name: Tikan varren kierretyyppi
      description: Ilmaisee varren tikan runkoon ruuvaamiseen käytetyn kierrekoon/-tyypin,
        mikä varmistaa varsien ja runkojen yhteensopivuuden.
    dart_thread_size:
      name: Tikan kierrekoko
      description: Määrittää kierrekoon tai -standardin, jonka kanssa osa on yhteensopiva.
        Tämä varmistaa varren, rungon ja kärjen yhteensopivuuden.
    dart_tip_compatibility:
      name: Tikan kärjen yhteensopivuus
      description: Ilmaisee, onko tikan osa tarkoitettu teräskärkisille vai pehmeäkärkisille
        tikoille vai molemmille tikkatyypeille.
    dart_tip_connection_type:
      name: Tikan kärkityyppi
      description: Ilmaisee yhteensopivuuden takaamiseksi kärjen kiinnitystavan tai
        kiinnitysjärjestelmän, jolla kärki kiinnitetään tikan varteen.
    dartboard_tournament_approval:
      name: Tikkataulun turnaushyväksyntä
      description: Ilmaisee, onko tikkataululla tiettyjen tikkaliittojen tai -sarjojen
        virallinen hyväksyntä.
    dartboard_type:
      name: Tikkataulutyyppi
      description: Luokittelee tikkataulun valmistustekniikan ja tikkayhteensopivuuden
        mukaan (esim. harjas, elektroninen, magneettinen).
    dash_cover_construction_type:
      name: Kojelautasuojan rakennetyyppi
      description: Kuvaa, miten kojelautasuoja on valmistettu/rakennettu (esim. valettu
        vai ommeltu), sillä se vaikuttaa istuvuuteen ja ulkonäköön.
    dash_cover_cutout_configuration:
      name: Kojelaudan suojuksen leikkauskonfiguraatio
      description: Ilmaisee, minkä valmistajien kojelauta-aukoille/antureille suoja
        on valmiiksi leikattu tai muotoiltu.
    dashboard_accessory_position:
      name: Kojelautalisävarusteen paikka
      description: Määrittää, mihin lisävaruste on tarkoitus sijoittaa tai asentaa
        kojelaudalla.
    date_variety:
      name: Taatelilajike
      description: Ilmaisee taatelilajikkeen (esimerkiksi Medjool, Deglet Noor, Ajwa).
        Lajike vaikuttaa merkittävästi makuun, kokoon ja rakenteeseen, minkä vuoksi
        se mainitaan useimmissa tuotteiden nimissä ja kuvauksissa. Sen sen huomioiminen
        parantaa suodatusta ja löydettävyyttä.
    dayan_head_material:
      name: Dayan-rummun kalvon materiaali
      description: Määrittää kalvon (pudi) materiaalin (esimerkiksi nahka tai synteettinen).
    dayan_strap_material:
      name: Dayan-rummun hihnan materiaali
      description: Dayan-rummun viritykseen käytettävien kiristyshihnojen (baddhi)
        materiaali.
    dayan_syahi_type:
      name: Dayan-rummun syahityyppi
      description: Määrittää Dayan-rummun kalvon syahikäsittelyn (syahi on musta viritystahna).
    decaffeination_method:
      name: Kofeiinin poistomenetelmä
      description: Määrittää prosessin, jolla kofeiini poistetaan kofeiinittomasta
        kahvista.
    decal_installation_method:
      name: Teippauksen asennusmenetelmä
      description: Miten teippaus kiinnitetään ajoneuvon pintaan (esimerkiksi kuivakiinnitys
        tai märkäkiinnitys). Työkalu- ja vaatimustiedot (esimerkiksi siirtoteippi
        tai kuumailmapistooli) tulee kirjata ohjeisiin tai työkalun ominaisuuksiin
        soveltuvin osin.
    decal_orientation:
      name: Teippauksen suunta
      description: Onko tarra tarkoitettu käytettäväksi lasin sisä- vai ulkopinnalla.
    decal_placement_type:
      name: Teippauksen sijoituspaikka
      description: Määrittää, mihin ajoneuvossa teippaus on tarkoitus kiinnittää (esim.
        koripaneeliin, puskuriin, konepeltiin).
    decal_visibility_property:
      name: Teippauksen näkyvyysominaisuus
      description: Näkyvyyttä tai valonheijastavuutta parantavan teippauksen optiset
        ja näkyvyysominaisuudet (esim. heijastavat, fluoresoivat, pimeässä hohtavat
        tai läpikuultavat ominaisuudet).
    deck_concave_level:
      name: Skeittilaudan dekin kaarevuus
      description: Ilmaisee skeittilaudan dekin kaarevuuden (esim. loiva, keskitaso,
        jyrkkä).
    deck_flex_rating:
      name: Kannen taipumisluokitus
      description: Tämä on skeittilaudan dekin laatuluokitus
    deck_material:
      name: Dekin materiaali
      description: Määrittää rullalaudan laudan ensisijaisen valmistusmateriaalin.
    decoder_interface_socket_type:
      name: Dekooderin liitäntätyyppi
      description: Tämä on veturimallin digitaalisen dekooderin liitäntätyyppi tai
        sisäinen dekooderikokoonpano.
    decoration_technique:
      name: Koristelutekniikka
      description: Määrittää ensisijaisen menetelmän, jolla grafiikkaa tai koristeita
        lisätään T-paitaan.
    decorative_stamp_form_factor:
      name: Koristeleiman muoto
      description: Määrittää fyysisen leimasimen muodon ja sen, miten se tulostaa
        kuvion (yksittäinen leimasin, sarja, rullaleimasin, taustaleimasin jne.).
    decorative_tape_application:
      name: Koristeteipin käyttösovellus
      description: Tämä määrittää koristeteipin ensisijaisen käyttötarkoituksen.
    decorative_tape_format:
      name: Koristeellinen teippimuoto
      description: Määrittää, miten koristeteippi toimitetaan tai pakataan käyttöä
        varten.
    decoy_buoyancy:
      name: Syötin kelluvuus
      description: Kuvaa, miten syötti käyttäytyy vedessä sarake (kelluu, pysyy paikallaan
        tai vajoaa).
    decoy_joint_type:
      name: Syötin niveltyyppi
      description: Ilmaisee, onko houkutuslinnun runko kiinteä vai nivelletty, mikä
        vaikuttaa uintiin.
    decoy_motion_mechanism:
      name: Syötin liikemekanismi
      description: Kuvaa, miten syötti aiheuttaa liikettä (jos ollenkaan) tai liikuttaa
        vettä kalojen houkuttelemiseksi.
    decoy_posture:
      name: Houkutuslinnun asento
      description: Ilmaisee houkuttimen mallina toimivan eläimen kuvatun asennon tai
        toiminnan (esim. ruokailu, lepo, valppaus).
    decoy_size_class:
      name: Houkutuslinnun kokoluokka
      description: Luokittelee houkuttimen suhteellisen koon verrattuna oikeaan eläimeen
        (esimerkiksi vakio, magnum, ylisuuri).
    decoy_style:
      name: Houkutintyyli
      description: Määrittää houkuttimen fyysisen muodon tai suunnitteluluokan, mikä
        auttaa metsästäjiä valitsemaan oikean tuotteen.
    deli_meat_variety:
      name: Leikkelelajike
      description: Luokittelee leikkeen tyypin (esim. salami, bologna, prosciutto,
        paahtopaisti).
    delivery_form:
      name: Toimitusmuoto
      description: Tämä määrittää polttoainesuuttimen puhdistusaineen fyysisen olomuodon.
    denim_composition:
      name: Denimin koostumus
      description: Denimin ensisijainen kuitukoostumus (peruskuidut lukuun ottamatta
        väriaineita/viimeistelyaineita).
    denim_finish:
      name: Denimkäsittely
      description: Denim-kankaaseen käytetty pinta-/käsittelyaine.
    denim_intended_use:
      name: Denimin käyttötarkoitus
      description: Tyypillinen projekti/käyttötarkoitus, johon denimiä markkinoidaan.
    denim_stretch_type:
      name: Denimin joustotyyppi
      description: Määrittää, onko denimissä mekaanista joustoa, onko siihen lisättyä
        elastaania/spandexia vai eikö se jousta ollenkaan.
    denim_wash:
      name: Denimpesu
      description: Ilmaisee denimkankaaseen käytetyn pesukäsittelyn (esim. vaalea,
        tumma, raaka, happo)
    derailleur_cage_length:
      name: Vaihtajan häkin pituus
      description: Ilmaisee vaihtajan häkin pituuden, mikä määrittää ketjun kapasiteetin
        (pääasiassa takavaihtajille).
    derailleur_mounting_style:
      name: Vaihtajan kiinnitystapa
      description: Määrittää, miten vaihtaja kiinnitetään polkupyörän runkoon tai
        ripustimeen (esim. juottamalla, puristimella, suoralla kiinnityksellä, UDH).
    derailleur_type:
      name: Vaihtajatyyppi
      description: Ilmaisee, onko tuote etu- vai takavaihtaja.
    deshedder_tool_type:
      name: Karvaharjatyyppi
      description: Luokittelee irtokarvanpoistajan rakenteellisen tyylin, jotta ostajat
        voivat valita haluamansa trimmausmenetelmän (esim. terä, harjauspalikka, kampa
        tai hansikas).
    diabolo_axle_system:
      name: Diabolon akselisto
      description: Määrittää diabolon akselijärjestelmän tai -kokoonpanon, joka vaikuttaa
        pyörimiseen, vakauteen ja narun kulumiseen.
    diagnostic_functions_supported:
      name: Tuetut vikakooditoiminnot
      description: Määrittää vikakoodi- ja huoltotoiminnot, joita vikakoodinlukijalla
        voidaan suorittaa.
    diagnostic_interface_type:
      name: Vikakoodiliitäntätyyppi
      description: Ajoneuvon tai laitteen kanssa kommunikointiin käytettävä liitäntä/yhteys
        (esim. OBD-II, Bluetooth, Wi‑Fi, USB).
    diamond_color_grade:
      name: Timantin väriluokitus
      description: Ilmaisee timanttien väriluokan asteikolla D (väritön) – Z (vaaleanvärinen)
        tai viittaa erikoisvärisiin timantteihin.
    diaper_cover_style:
      name: Vaippatyyli
      description: Määrittelee vaippahousujen leikkausmallin tai koristelutyylin tyyppiin
        perustuvan selaamisen ja suodattamisen helpottamiseksi.
    diastatic_power_unit:
      name: Diastaattisen voiman mittayksikkö
      description: Määrittää yksikköjärjestelmän, jolla tuotteen diastaattisen voima
        ilmoitetaan (esimerkiksi °Lintner vs. Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Diatonisen huuliharpun viritysjärjestelmä
      description: Määrittää diatonisen huuliharpun nuottijärjestelmän tai viritystavan.
    dice_sides:
      name: Nopan sivujen lukumäärä
      description: Tuotteeseen sisältyvien noppien sivujen lukumäärät (esim. d6, d20).
        Sekajoukoissa käytä hallitsevaa arvoa tai listaa useina arvoina, kun se on
        tuettu.
    didgeridoo_construction_type:
      name: Didgeridoon rakennetyyppi
      description: Kuvaa didgeridoon rakennetta tai muotoilua (perinteinen vai moderni
        rakennustapa).
    dietary_formulation_claim:
      name: Ravintokoostumusväite
      description: Korostaa hevosten ravitsemuksen kannalta tärkeitä tuotteen koostumuksen
        ominaisuuksia tai poissulkemisia (esim. viljaton, vähän tärkkelystä sisältävä,
        luomutuote).
    dinosaur_playset_scale_figure_size_class:
      name: Dinosauruslelusetin tai -lelun mittasuhde
      description: Kuvailee mukana tulevien dinosaurusten/figuurien yleisen mittakaavan
        yhteensopivuuden helpottamiseksi muiden settien kanssa.
    dinosaur_species_included:
      name: Sisältyvät dinosauruslajit
      description: Yksilöi lelusetissä esiintyvät dinosauruslajit (hahmot tai valetut
        dinosaurukset).
    dipsy_diver_size_designation:
      name: Syvääjän kokoluokitus
      description: Ilmaisee valmistajan määrittämän syvääjän kokokoodin, joka vastaa
        painoa ja uintisyvyyttä.
    disc_brake_rotor_mount_type:
      name: Jarrulevyn kiinnitystyyppi
      description: Ilmaisee, miten levyjarrulevy kiinnitetään napaan (esimerkiksi
        kuusipulttinen, keskilukitus).
    disc_lock_accessories_included:
      name: Mukana tulevat levylukkotarvikkeet
      description: Määrittää polkupyörän levylukon mukana toimitettavat lisävarusteet
        (esimerkiksi kiinnitysköysi, kantopussi, kiinnike tai paristot).
    disco_ball_mirror_tile_material:
      name: Diskopallon peilipalojen materiaali
      description: Tämä ilmaisee diskopallon peilipalojen materiaalin (jos sovellettavissa).
    disco_ball_mirror_tile_size:
      name: Diskopallon peilipalojen koko
      description: Diskopallon yksittäisten peilipalojen/neliöiden likimääräinen koko.
    display_backlight_color:
      name: Näytön taustavalon väri
      description: Tämä ilmaisee mittarin näytön/valitsimen taustavalon/valaistuksen
        värin.
    disposable_compostable_claim:
      name: Kertakäyttöisyys-/kompostoitavuusväite
      description: Ilmaisee, onko tuote kompostoitava, biohajoava, kierrätettävä vai
        ei lainkaan (soveltuen).
    distillation_method:
      name: Tislausmenetelmä
      description: Ilmaisee väkevän alkoholijuoman valmistuksessa käytetyn tislausmenetelmän
        tai tislaustyypin.
    distilled_water_intended_use:
      name: Tislatun veden käyttötarkoitus
      description: Määrittää tislatun veden ensisijaisen käyttökohteen (esim. juomavesi,
        CPAP-laite, ilmankostutin, höyrysilitysrauta).
    distress_transmission_frequency:
      name: Hätälähetystaajuus
      description: Määrittää hätäilmoituksissa käytetyn ensisijaisen radiotaajuuden
        tai käytetyt ensisijaiset radiotaajuudet.
    distressing_level:
      name: Käsittelytaso
      description: Ilmaisee kankaaseen tehtyjen tarkoituksellisten kulumajälkien,
        repeämien tai kulumien määrän.
    distressing_style:
      name: Käsittelytyyli
      description: Ilmaisee farkkujen kulutusjälkien tyypin tai voimakkuuden (esimerkiksi
        repeämät tai kulumajäljet).
    distributor_advance_mechanism:
      name: Virranjakajan ennakkomekanismi
      description: Määrittää, minkä tyyppistä sytytysennakon säätömekanismia virranjakajassa
        käytetään.
    distributor_cap_terminal_type:
      name: Jakajan kannen päätetyyppi
      description: Määrittää jakajan kannen päätteiden tyypin.
    distributor_gear_material:
      name: Virranjakajan hammaspyörän materiaali
      description: Määrittää virranjakajan pyörijän materiaalin.
    distributor_ignition_type:
      name: Virranjakajan sytytystyyppi
      description: Määrittää, onko virranjakaja suunniteltu pistesytytykselle, elektroniselle
        sytytykselle vai HEI-tyyppisille järjestelmille.
    distributor_kit_contents:
      name: Virranjakajapaketin sisältö
      description: Ilmaisee, mitkä komponentit sisältyvät virranjakajaan (esim. kansi,
        roottori, sytytysmoduuli, tiiviste/O-rengas, käyttöhammaspyörä, johdot/liitin).
    dive_computer_form_factor:
      name: Sukellustietokoneen muoto ja rakenne
      description: Määrittää sukellustietokoneen fyysisen rakenteen tai kiinnitystavan,
        kuten konsoliin kiinnitettävä tai kellomalli.
    diving_mask_design:
      name: Sukellusmaskin malli
      description: Määrittää sukellusmaskin yleisen rakenteellisen tyylin, joka vaikuttaa
        istuvuuteen, näkökenttään ja käyttötarkoitukseen.
    divot_tool_prong_configuration:
      name: Greenihaarukan piikkirakenne
      description: Määrittää nurmikon korjaamiseen käytetyn greenihaarukan piikkien
        lukumäärän ja rakenteen.
    divot_tool_style:
      name: Divot-työkalun tyyppi
      description: Määrittää greenihaarukan yleisen rakenteen tai käyttötavan (esimerkiksi
        kiinteä, veitsimäinen/taitettava, monitoimityökalu tai hattuun tai mailaan
        kiinnitettävät lisävarusteet).
    djembe_shell_construction:
      name: Djemberummun kuoren rakenne
      description: Kuvaa djemben rungon/kuoren valmistusmenetelmää.
    djembe_tuning_system:
      name: Djembe-viritysjärjestelmä
      description: Määrittää, miten djembe jännitetään/viritetään.
    dmx_output_connector_type:
      name: DMX-lähdön liitintyyppi
      description: Tämä on ohjaimen DMX-lähtöporttien fyysinen liitintyyppi.
    doctor_playset_items_included:
      name: Lääkärileikkisetin mukana tulevat välineet
      description: Määrittää lääkärileikkisettiin sisältyvät leikkilääkärivälineet
        ja roolileikkitarvikkeet (esim. stetoskooppi, ruisku, refleksivasara).
    doctor_playset_role_play_setting:
      name: Lääkärileikkisetin ensisijainen roolileikkitarkoitus
      description: Määrittää lääkärileikkisarjan ensisijaisen roolileikkiympäristön.
    doctor_playset_wearable_items_included:
      name: Lääkärileikkisetin mukana tulevat puettavat osat
      description: Tämä määrittää leikkisettiin sisältyvät asut ja asusteet.
    doll_accessory_type:
      name: Nuken lisävarustetyyppi
      description: Määrittää, minkä tyyppinen nuken tai toimintahahmon lisävaruste
        tai asuste tuote on (esimerkiksi vaatteet, kengät, huonekalut, esittelytelineet),
        jotta ostaja voi selata ja suodattaa tätä lisävaruste tai asusteluokkaa.
    doll_eye_type:
      name: Nuken silmätyyppi
      description: Määrittää nuken silmien rakennetyypin (esim. upotetut akryyliset,
        maalatut, LED-valaistut).
    doll_hair_fiber_type:
      name: Nuken hiuskuitutyyppi
      description: Ilmaisee nukessa käytetyn hius- tai kuitutyypin (tai hiusten puuttumisen),
        mikä vaikuttaa realismiin, hiusten käsittelyyn ja hoitoon.
    doll_making_kit_components_included:
      name: Nukentekosetin sisältämät osat
      description: Luettelee nukentekosettiin sisältyvät tärkeimmät materiaalit ja
        työkalut, jotta ostaja voi vertailla tuotepaketteja ja tietää, mitä hänen
        tarvitsee hankkia itse.
    dollhouse_installation_placement_type:
      name: Nukkekodin asennus/sijoitustyyppi
      description: Miten ja missä nukkekotia on tarkoitus käyttää (esim. pöydälle
        sijoitettava, lattialle sijoitettava tai seinään kiinnitettävä).
    dollhouse_items_included:
      name: Nukkekodin sisältö
      description: Määrittää nukkekodin tuotepakkauksen sisällön (huonekalut, nuket,
        asusteet).
    dollhouse_lighting_type:
      name: Nukkekodin valaistustapa
      description: Nukkekotiin sisältyvä tai sen tukema valaistustyyppi.
    dollhouse_room_type:
      name: Nukkekodin huonetyyppi
      description: Määrittää nukkekodin huoneen/alueen, jossa lisävarustetta tyypillisesti
        käytetään.
    dollhouse_scale:
      name: Nukkekodin mittasuhde
      description: Tämä ilmaisee nukkekodin tai nukkekotitarvikkeiden mittasuhteen
        (esim. 1:12), jonka avulla varmistetaan talojen, huonekalujen ja hahmojen
        yhteensopivuus.
    dollhouse_style_theme:
      name: Nukkekodin tyyli/teema
      description: Nukkekodin yleinen tyyli tai teema selaamista ja lahjojen ostamista
        varten (esimerkiksi moderni vs. viktoriaaninen).
    donnos_playing_technique:
      name: Donnos-soittotekniikka
      description: Määrittää miten, miten donnorumpuja (dundun-rumpuja) soitetaan
        (pelkällä kädellä vai kapulalla), jotta ostajat tietävät, mitä odottaa, sekä
        sisältyvät lisävarusteet.
    donnos_tuning_system:
      name: Donnosin viritysjärjestelmä
      description: Ensisijainen menetelmä virittämiseen tai sävelkorkeuden muuttamiseen
        (esim. kiristettävät narut / puristusmekanismi).
    door_assembly_type:
      name: Oven kokoonpanotyyppi
      description: 'Ilmaisee, mitä toimitukseen sisältyy: pelkkä oven runko, oven
        verhoilu vai koko ovikokoonpano.'
    door_closure_mechanism:
      name: Oven sulkemismekanismi
      description: Määrittää mekanismin, joka ohjaa oven sulkeutumista (esimerkiksi
        pehmeä sulkeutuminen, magneettisalpa).
    door_handle_components_included:
      name: Sisältyvät ovenkahvakomponentit
      description: Ilmaisee, mitkä keskeiset osat sisältyvät ovenkahvaan (esim. lukkosylinteri,
        tiiviste, peitelevy, kiinnitystarvikkeet, johtosarja, lukon vastakappale/toimilaite).
    door_handle_operation:
      name: Ovenkahvan käyttötapa
      description: Määrittää auton ovenkahvakokoonpanon pääasiallisen käyttömekanismin
        (esimerkiksi mekaaninen vivusto, avainsylinteri, avaimeton kosketus- tai painonappitoiminto,
        sähköisesti ulos ponnahtava).
    door_lock_knob_attachment_method:
      name: Oven lukitusnupin kiinnitysmenetelmä
      description: Määrittää, miten oven lukitusnuppi kiinnittyy lukkotankoon (esim.
        ketju, työntö).
    door_lock_position:
      name: Lukon paikka ovessa
      description: Määrittää, mihin oven/aukon kohtaan auton ovilukko tai sen osa
        on tarkoitettu.
    door_seal_feature_set:
      name: Ovitiivisteen ominaisuudet
      description: Määrittää ovitiivisteen toiminnalliset ominaisuudet.
    door_seal_material_type:
      name: Ovitiivisteen materiaalityyppi
      description: Ovitiivisteessä käytetty ensisijainen elastomeeri tai materiaaliperhe
        (muu kuin yleinen materiaali).
    door_seal_product_form:
      name: Oven tiivisteen tuotelomake
      description: Ilmaisee ovitiivisteen myyntipakkaustyypin.
    door_window_operation:
      name: Ovi-ikkunan käyttö
      description: Määrittää, onko oven ikkunajärjestelmä tarkoitettu manuaaliseen
        vai koneelliseen käyttöön tai onko ovessa ikkunaa.
    double_decker_bus_deck_configuration:
      name: Kaksikerroksisen bussin ylemmän kerroksen toteutustapa
      description: Määrittää kaksikerroksisen bussin ylemmän kerroksen kulkuväylät
        ja ylemmän kerroksen toteutustavan.
    double_drum_pedal_linkage_medium:
      name: Tuplarumpupedaalin yhdistämistapa
      description: Määrittää tavan, jolla pedaalit yhdistetään toiseensa (esimerkiksi
        vetoakseli, ketju, hihna).
    double_end_bag_core_type:
      name: Kaksipäinen säkin koostumus
      description: Ilmaisee säkin koostumusta, joka määrittää palautumisnopeuden,
        tuntuman ja huoltotarpeet.
    double_pointed_needle_point_style:
      name: Kaksipäisen puikon tyyli
      description: Kuvaa eri langoille ja neuletyyleille tarkoitettujen kärkien terävyyttä/muotoa.
    dough_extruder_accessories_included:
      name: Mukana tulevat taikinapuristimen lisäosat
      description: Määrittää taikinapuristimen mukana toimitetut lisäkomponentit.
    dough_extruder_operation_type:
      name: Taikinapuristimen käyttötapa
      description: Määrittää, miten taikina puristetaan ulos kuvioiden muodostamiseksi.
    dough_extruder_shape_disc_included:
      name: Taikinapuristimen mukana toimitetut muotit
      description: Muodot, joita puristin voi tuottaa mukana tulevien kiekkojen/suuttimien
