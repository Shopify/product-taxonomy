    drone_transmission_type:
      name: Droonin yhteystyyppi
      description: Ensisijainen menetelmä, jota käytetään ohjaukseen ja/tai videoyhteyteen
        droonin ja ohjaimen tai laitteen välillä.
    drop_spindle_whorl_position:
      name: Värttinän kehrän sijainti
      description: Tämä määrittää kehrän paikan akselissa.
    drum_carder_accessories_included:
      name: Rumpukarstan mukana tulevat lisävarusteet
      description: Määrittää rumpukarstapakkaukseen yleisesti sisältyvät tuotteet.
    drum_clamp_locking_mechanism:
