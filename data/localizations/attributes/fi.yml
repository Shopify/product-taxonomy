    safety_restraint_type:
      name: Turvavyön tyyppi
      description: Keinuistuimeen mahdollisesti asennetun lasten turvavyön tyyppi.
    safety_warning:
      name: Turvallisuusvaroitus
      description: Ilmaisee, onko tuotteessa yleisiä marmorikuuliin liittyviä leluja
