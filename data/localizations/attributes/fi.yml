      description: Hiekkakupin/-kuppien toiminnalliset/fyysiset ominaisuudet, jotka
        vaikuttavat leikkiin ja käyttöön.
    sand_shovel_handle_style:
      name: Hiekkalapion kahvan tyyli
      description: Kuvaa lapion varren päässä olevan kahvan muotoa.
    sand_toy_set_pieces_included:
      name: Hiekkalelusetin sisältämät osat
      description: Listaa hiekkalelusetin osat (esim. ämpäri, lapio, muotit), jotta
