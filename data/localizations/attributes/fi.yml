    lens_color_tint:
      name: Linssin väri/sävy
      description: Tuotteen mukana toimitettujen suojalasien linssien väri tai sävy.
    lens_construction:
      name: Linssin rakenne
      description: Määrittää linssin rakenteen (esim. yksittäinen linssi, kaksoislinssi
