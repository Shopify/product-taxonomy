    zills_strap_adjustability:
      name: Sormisymbaalin nauhan säätömahdollisuus
      description: Voidaanko mukana tulevaa nauhaa/kuminauhaa säätää istuvuuden mukaan
        ja miten.
    zipper_application:
      name: Vetoketjun käyttökohde
      description: Määrittää, mihin projektiin tai käyttötarkoitukseen vetoketju on
        suunniteltu.
    zipper_chain_type:
      name: Vetoketjun tyyppi
      description: Määrittää vetoketjun/hampaiden rakenteen/tyypin.
    zipper_end_type:
      name: Vetoketjun pään tyyppi
      description: Ilmaisee, miten vetoketju päättyy ja onko se päistään erkaneva
        (avoin) vai päästään suljettu (ei erkaneva), mukaan lukien yleinen päistään
        erkaneva ketju, jota käytetään käsitöiden vetoketjuissa.
    zipper_gauge:
      name: Vetoketjun paksuus
      description: 'Ilmaisee vetoketjun ketjun paksuuden/kokomerkinnän, joka ilmaistaan
        tyypillisesti numerolla ja #-merkillä (esimerkiksi #3 tai #5), joka korreloi
        hampaan/spiraalin leveyden ja käyttötarkoituksen kanssa.'
    zipper_opening_length:
      name: Vetoketjun aukaisupituus
      description: Määrittää, kuinka suuri osa etureunasta on vetoketjullista ja erottaa
        kokovetoketjun puolivetoketjusta tai neljäsosavetoketjusta.
    zipper_pull_material:
      name: Vetoketjun vetimen materiaali
      description: Määrittää vetoketjun vetimen tai vedinliuskan (osan, johon tartut)
        materiaalin, joka on eri kuin vetoketjun piikkien/ketjun ja nauhan materiaali.
    zipper_pull_side:
      name: Vetoketjun vetopuoli
      description: Määrittää, kummalta vetoketjun puolelta vedintä voi käsitellä.
    zipper_pull_strap_cord_tab_material:
      name: Vetoketjun vedinhihnan/narun/vedinliuskan materiaali
      description: Vetoketjun vetimeen (jos sellainen on) kiinnitetyn hihnan/nyörin/liuskan
        materiaali, lukuun ottamatta itse vetoketjun vetimen runkoa.
    zipper_reversibility_mechanism:
      name: Vetoketjun käännettävyysmekanismi
      description: Määrittää, miten vetoketju on käännettävä (esim. kaksisuuntainen
        vedin vai käännettävä/automaattisesti lukittuva vedin, joka on suunniteltu
        kääntövaatteille).
    zipper_separating_type:
      name: Vetoketjun avautumistyyppi
      description: Ilmaisee, avautuuko vetoketju alhaalta/ylhäältä vai onko se suljettu,
        ja sopiiko se siten takkeihin, makuupusseihin, laukkuihin ym.
    zipper_side:
      name: Vetoketjun puoli
      description: Määrittää, millä puolella päävetoketju sijaitsee, kun makuupussi
        on kasvo-osa ylöspäin.
    zipper_slider_material:
      name: Vetoketjun vetimen materiaali
      description: Määrittää vetoketjun vetimen (liikkuvan mekanismin) materiaalin,
        joka vaikuttaa korroosionkestävyyteen.
    zipper_slider_pull_configuration:
      name: Vetoketjun vedinkokoonpano
      description: Ilmaisee, onko vetoketjussa yksi vai kaksi vedintä ja ovatko vedinliuskan
        vetimen toisella puolella vai molemmilla puolilla.
    zipper_style:
      name: Vetoketjun tyyli
      description: Ilmaisee vetoketjun pituuden tai vaatteen vetoketjullisuuden (esim.
        vetoketjuton, neljäsosavetoketju, puolivetoketju, kokovetoketju).
    zipper_tape_material:
      name: Vetoketjun nauhan materiaali
      description: Määrittää vetoketjun nauhan (kankaisten sivujen) päämateriaalin,
        joka ommellaan kiinni projektiin.
    zipper_teeth_type:
      name: Vetokejun hampaiden tyyppi
      description: Määrittää vetoketjun ketjun/hampaiden rakenteen (esim. spiraali,
        valettu muovi, metalli, piilovetoketju), mikä vaikuttaa joustavuuteen, lujuuteen
        ja tyypilliseen käyttötarkoitukseen.
    assembly_required:
      name: Vaatii kokoamista
      description: Ilmaisee, vaatiiko tuote kokoamista ennen käyttöä
    organic_certification:
      name: Luomusertifikaatti
      description: Kertoo, mikä luomu- tai vastuullisuussertifikaatti tuotteella on
