    sweetener_presence:
      name: Makeutusaine
      description: Määrittää, onko pähkinävoissa lisättyjä makeutusaineita ja missä
        määrin.
    sweetening_type:
      name: Makeutustyyppi
      description: Kuvaa sitä, miten tuote on makeutettu tai mikä sen makeusaste on.
    swim_armband_construction_type:
      name: Käsivarsikellukkeen rakenne
      description: Määrittelee käsivarsikellukkeiden rakenteen tai kelluntamekanismin
        (täytettävä vs. vaahtomuovi, hybridi jne.).
    swim_belt_purpose:
      name: Uimavyön tarkoitus
      description: Uimavyön toiminnallinen luokittelu (esim. kelluntatuki, vesijuoksu,
        vastusharjoittelu, vastusuimavyö, vastusvarjo, vastapaino, kahlaaminen).
    swim_board_features:
      name: Uimalaudan ominaisuudet
      description: Korostaa uimalaudan erityisominaisuuksia tai parannuksia, jotka
        tehostavat käytettävyyttä tai turvallisuutta.
    swim_bottom_length:
      name: Uimahousujen pituus
      description: Luokittelee uimahousujen lahkeen pituuden (esim. lyhyet uimahousut
        vs. polvipituiset).
    swim_buoy_features:
      name: Uimapoijun ominaisuudet
      description: Ilmaisee uimarin poijun lisäominaisuudet tai -varusteet, jotka
        parantavat näkyvyyttä, turvallisuutta tai käytettävyyttä.
    swim_cap_style:
      name: Uimalakin malli
      description: Ilmaisee uimalakin rakenteen tai mallin, kuten pitkille hiuksille
        tarkoitetun uimalakin, kupolimaisen kilpauimalakin tai kupla-/turbaanimallin.
    swim_diaper_feature:
      name: Uimavaipan ominaisuus
      description: Ilmaisee, onko uimahousuissa integroitu vuotosuojattu vaippaominaisuus
