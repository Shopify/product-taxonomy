    ukulele_body_shape:
      name: Ukulelen rungon muoto
      description: Ukulelen rungon yleinen tyyli.
    ukulele_bridge_material:
      name: Ukulelen tallan materiaali
      description: Ilmoittaa ukulelen tallan materiaalin.
    ukulele_construction_type:
      name: Ukulelen rakennetyyppi
      description: Instrumentin kannen/taustan/sivujen rakenne (kokopuinen vs. laminaatti).
    ukulele_electronics_configuration:
