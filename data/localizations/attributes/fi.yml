      description: Määrittää minibussin esteettömyyteen liittyvät varusteet ja kokoonpanot.
    accessories_included:
      name: Mukana tulevat lisävarusteet
      description: Luettelee tuolin mukana toimitettavat lisävarustesarjat (esim.
        rahi, lannerulla), jotta ostaja saa selkeän kuvan niiden tuomasta lisäarvosta.
    accessory_pieces_included:
      name: Mukana tulevat lisäosat
      description: Luettelee moniosaisen vaatelahjapaketin mukana toimitettavat lisävarusteet.
    acoustic_amplifier_feedback_control_features:
      name: Akustisen vahvistimen äänenkierron ohjausominaisuudet
      description: Ilmaisee akustisten instrumenttien sisäänrakennetut äänenkiertoa
        estävät työkalut (esim. notch-suodatin, vaiheenvalitsin, automaattinen kierron
        vaimennus).
    acoustic_drum_kit_components_included:
      name: Akustisen rumpusetin komponentit sisältyvät lähetykseen
      description: Ilmaisee settiin sisältyvät pääkomponentit (pelkkä runkosetti vs.
        täydellinen setti; sis. symbaalit/laitteet).
    acoustic_guitar_body_shape:
      name: Akustisen kitaran rungon muoto
      description: Kuvailee akustisen kitaran rungon muodon/ääriviivat, jotka vaikuttavat
        sointiin, mukavuuteen ja tyypilliseen käyttötapaan.
    acoustic_guitar_string_core_design:
      name: Akustisen kitaran kielien rakenne
      description: Punottujen kielien perusrakenne.
    acoustic_piano_key_material:
      name: Akustisen pianon koskettimien materiaali
      description: Määrittää pianon koskettimien pääasiallisen materiaalin.
    acoustic_piano_lid_type:
      name: Akustisen pianon kannen tyyppi
      description: Määrittää akustisessa pianossa käytetyn kansi-/suojamekanismin
        tyylin (erottelee flyygelin pystypianosta).
    acoustic_piano_plate_frame_material:
      name: Akustisen pianon rungon/kehyksen materiaali
      description: Määrittää pianon rungon/kehyksen päämateriaalin, yleensä valurautaa.
    acoustic_piano_soundboard_material:
      name: Akustisen pianon kaikupohjan materiaali
      description: Määrittää pianon kaikupohjan päämateriaalin.
    action_figure_scale:
      name: Toimintahahmon mittakaava
      description: Ilmaisee keräilytuotteen mittakaavan (esim. 1:12), johon lisävarusteen
        on tarkoitus sopia.
    action_type:
      name: Toimintatyyppi
      description: Kuvailee aseen laukaisu- tai viritysmekanismia (esim. lukko-, taitto-
        tai vipulataus).
    actuation_mechanism:
      name: Käyttömekanismi
      description: 'Ilmaisee, miten vipu käyttää jarrujärjestelmää: täysin mekaaninen
        vaijeri, täysin hydraulinen, vaijerilla toimiva hydraulinen tai elektroninen/langaton.'
    actuation_method:
      name: Aktivointitapa
      description: Miten sammutusjärjestelmä aktivoidaan tai vapautetaan.
    adapter_orientation:
      name: Sovittimen suuntaisuus
      description: Määrittää polkupyörän rengasventtiilin sovittimen kulman tai kokoonpanon,
        joka vaikuttaa pumpun käyttöön (esim. suora, 90°).
    additive_application_stage:
      name: Lisäaineen käyttövaihe
      description: Ilmaisee, missä prosessin vaiheessa tuotetta on tarkoitus käyttää.
    adhesive_backing:
      name: Liimapinta
      description: Onko tulostettavassa silkkikankaassa itseliimautuva tausta.
    adhesive_formulation:
      name: Liiman koostumus
      description: Ilmaisee liiman kemiallisen pohjan tai koostumuksen, kuten syanoakrylaatti
        tai epoksi.
    adhesive_sides:
      name: Liimapintaiset sivut
      description: Ilmaisee, onko sulavaa liimaa teipin/verkon yhdellä vai molemmilla
        pinnoilla.
    adjunct_grain_processing_form:
      name: Lisäviljan käsittelylomake
      description: Ilmaisee lisäviljan fyysisen/käsitellyn panimokäyttöön myytäessä
        (esim. hiutaleina, torrifioituna, mallastettuna, raakana).
    adjustability_type:
      name: Säädettävyystyyppi
      description: Määrittää, millaista säätöä joustintuki tarvitsee, jos sellaista
        on.
    adjustable_cup_mutes:
      name: Säädettävät kupinvaimentimet
      description: Ilmaisee, onko kuppi säädettävä/irrotettava ja säätötavan.
    adjustable_zones:
      name: Säädettävät vyöhykkeet
      description: Yksilöi, mitkä jalustan osat voidaan säätää erikseen.
    adjustment_type:
      name: Säätötyyppi
      description: Ilmaisee, onko säädin säädettävä ja miten säätö tehdään.
    administration_method:
      name: Antotapa
      description: ilmaisee, miten matolääke annetaan hevoselle (esim. suun kautta
        vai injektiona). Auttaa ostajaa eläinlääkärin ohjeiden noudattamisessa ja
        valitsemaan hallittavan antomenetelmän.
    advice_card_prompt_type:
      name: Ohjekortin kehotetyyppi
      description: Korttiin painettu kehotetyyppi (tai kehotteen puute).
    aeration_method:
      name: Ilmanvaihdon tapa
      description: Kuvailee säiliön tarjoaman tai tukeman ilmanvaihdon tyyppiä, mikä
        varmistaa riittävän hapen elävälle syötille.
    aero_package_components:
      name: Aero-pakkauksen komponentit
      description: Ilmaisee, mitkä keskeiset aerodynaamiset komponentit on asennettu
        ajoneuvoon (valitse kaikki soveltuvat).
    aerodynamic_elements_included:
      name: Mukana tulevat aerodynaamiset elementit
      description: 'Määrittää, mitkä aerodynaamiset komponentit sisältyvät formula-autoon
        (jos tuetaan: valitse kaikki sovellettavat).'
    aftertouch_support:
      name: Aftertouch-tuki
      description: Tukeeko ohjain aftertouch-toimintoa (kanava tai polyfoninen) koskettimilla/padeilla.
    agave_content_classification:
      name: Agaavepitoisuusluokitus
      description: Määrittää, onko tequila valmistettu 100-prosenttisesti tequila-agaavesta
        (sininen Weber-agaave) vai onko se sekoitus, joka sisältää vähintään 51 %
        agaave-sokereita.
    aida_cloth_count:
      name: Aida-kankaan tiheys
      description: Määrittää Aida-kankaan tiheyden (ruutujen/pistosten lukumäärä tuumaa
        kohti), mikä vaikuttaa piston kokoon ja kuviokokoon.
    aida_cloth_pre_cut_format:
      name: Aida-kankaan leikkausmuoto
      description: Ilmaisee, myydäänkö Aida-kangasta valmiiksi leikattuina kappaleina,
        metritavarana (rullasta) vai rullina.
    air_bag_material:
      name: Ilmasäkin materiaali
      description: Määrittää Irlantilaisen säkkipillin ilmasäkin materiaalin.
    air_bed_internal_construction:
      name: Ilmapatjan sisäinen rakenne
      description: Kuvailee ilmapatjan mukavuuden ja vakauden takaavan sisäisen tukirakenteen
        tai -teknologian.
    air_dry_clay_color_form:
      name: Ilmakuivuvan saven värimuoto
      description: Myydäänkö savi valmiiksi värjättynä, valkoisena/neutraalina maalausta
        varten vai sekoituksena/lajitelmana.
    air_hockey_items_included:
      name: Mukana tulevat ilmakiekkotuotteet
      description: Luettelee settiin kuuluvat lisävarusteet, jotta asiakkaat tietävät
        tarkalleen, mitä he saavat (esim. 2 mailaa, 4 kiekkoa, 2 huopatyynyä).
    air_intake_temperature_sensor_mounting_style:
      name: Ilmanoton lämpötila-anturin asennustapa
      description: IAT-anturin fyysinen asennustapa ilmanottojärjestelmässä.
    air_integration_capability:
      name: Ilman integrointiominaisuus
      description: Ilmaisee, tukeeko sukellustietokone langattomia säiliöpaineen lähettimiä
        ja miten.
    air_mattress_valve_type:
      name: Ilmapatjan venttiilin tyyppi
      description: Määrittää venttiilityypin, johon lisävaruste sopii tai jonka se
        sisältää. Tämä varmistaa pumppujen, venttiilien ja korjausosien yhteensopivuuden.
    air_water_rocket_kit_items_included:
      name: Mukana tulevat ilma- ja vesirakettisarjan osat
      description: Rakettisarjan mukana tulevat tärkeimmät komponentit (laukaisin,
        pumppu, siivekkeet, täyttöosat).
    air_water_rocket_launch_method:
      name: Ilma- ja vesiraketin laukaisutapa
      description: Miten raketti paineistetaan/laukaistaan (käyttäjän vuorovaikutus
        ja laitteiston tyyppi).
    airbag_position:
      name: Turvatyynyn sijainti
      description: Määrittää turvatyynyä tukevan osan turvavyöhykkeen/asennon.
    aircraft_ads_b_capability:
      name: Lentokoneen ADS-B-kyvykkyys
      description: Määrittää, tukeeko lentokone ADS-B-järjestelmää.
    aircraft_airframe_material:
      name: Lentokoneen rungon materiaali
      description: Lentokoneen rungon rakenteen ensisijainen materiaali (ensisijaiset
        materiaalit).
    aircraft_cabin_configuration:
      name: Lentokoneen matkustamon konfiguraatio
      description: Määrittää lentokoneen matkustamon pohjakaavan (esim. konferenssiryhmä,
        divaani, nelivyöhykkeinen matkustamo).
    aircraft_documentation_included:
      name: Mukana tulevat lentokoneen asiakirjat
      description: Luettelee, mitkä asiakirjat toimitetaan osan mukana (esim. 8130-3).
    aircraft_galley_configuration:
      name: Lentokoneen keittiön konfiguraatio
      description: Matkustamon keittiön/pitopalvelun olemassaolo ja tyyppi.
    aircraft_installation_location:
      name: Asennuskohta lentokoneessa
      description: Missä kohtaa lentokonetta osa tai lisävaruste on asennettu tai
        sitä käytetään.
    aircraft_internet_connection:
      name: Lentokoneen internet-yhteys
      description: Ilmaisee matkustamon internet-yhteyden olemassaolon/tyypin.
    aircraft_landing_gear_type:
      name: Lentokoneen laskutelineiden tyyppi
      description: Määrittää autogyron laskutelineiden kokoonpanon.
    aircraft_lavatory_configuration:
      name: Lentokoneen käymälän määritys
      description: Matkustamon käymälän määritys.
    aircraft_maintenance_program_enrollment:
      name: Lentokoneen huolto-ohjelman rekisteröinti
      description: Ilmaisee, onko ilma-alus rekisteröity moottorin ja/tai rungon huolto-ohjelmaan,
        ja jos on, mitä kattavuustyyppiä se koskee (moottori, runko vai molemmat).
    aircraft_operational_certification:
      name: Ilma-aluksen käyttösertifiointi
      description: Määrittää sääntely- tai operointiperustan, jonka mukaisesti ilma-alusta
        käytetään (maakohtainen; esim. FAA Part 91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Lentokoneen suojavarusteiden sertifiointi
      description: Määrittää ilmailu-, sääntely- tai toimialastandardin, jonka vaatimukset
        suojavaruste täyttää.
    aircraft_system_application:
      name: Lentokonejärjestelmän käyttötarkoitus
      description: Yksilöi, mihin ilma-aluksen järjestelmään tai osa-alueeseen osa
        tai lisävaruste kuuluu (käytetään selailuun ja suodatukseen eri osakategorioissa).
    airflow_resistance_level:
      name: Ilmavirran vastustaso
      description: Ilmaisee, kuinka rajoittavalta vaimennin tuntuu vastapaineen tai
        ilmanvastuksen suhteen.
    airship_envelope_material:
      name: Ilmalaivan vaipan materiaali
      description: Ilmalaivan vaipan (ulkokuoren) ensisijainen materiaali.
    airsoft_part_type:
      name: Airsoft-osan tyyppi
      description: Yksilöi airsoft-aseiden toiminnallisen osan tai lisävarusteen tyypin
        (esim. lipas, piippu, käsisuoja).
    airworthiness_approval_basis:
      name: Lentokelpoisuuden hyväksyntäperusta
      description: Määrittää osan hyväksyntä-/sertifiointiperusteen soveltuvin osin
        (esim. PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Hälytyksen äänenvoimakkuuden säädettävyys
      description: Ilmaisee, voiko käyttäjä säätää hälytyksen äänenvoimakkuutta ja
        miten.
    alcohol_ink_finish_effect:
      name: Alkoholimusteen pintatehoste
      description: Kuvailee alkoholipitoisen musteen koostumuksen tuottamaa visuaalista
        vaikutelmaa (pelkän värin lisäksi) kuten metallinen tai helmiäishohtoinen.
    alignment_aid_style:
      name: Kohdistusapuviivojen tyyli
      description: Kuvailee maton pinnalle painettujen tai upotettujen kohdistusviivojen
        tyypin (esim. suora viiva, etäisyysmerkit).
    alternator_cooling_type:
      name: Vaihtovirtageneraattorin jäähdytystyyppi
      description: Kuvailee, miten vaihtovirtageneraattoria jäähdytetään ja tuuletetaan.
    alternator_marine_ignition_protection_rating:
      name: Vaihtovirtageneraattorin merikäyttöön tarkoitettu sytytyssuojausluokitus
      description: Ilmaisee, onko vaihtovirtageneraattori sytytyssuojattu merimoottoritiloja
        varten (esim. standardien SAE J1171 / ISO 8846 mukainen).
    alternator_mounting_configuration:
      name: Vaihtovirtageneraattorin asennuskokoonpano
      description: Määrittää fyysisen kiinnityskokoonpanon, jota käytetään vaihtovirtageneraattorin
        kiinnittämiseen moottorin kiinnikkeeseen.
    alternator_pulley_type:
      name: Vaihtovirtageneraattorin hihnapyörän tyyppi
      description: Ilmaisee vaihtovirtageneraattorin hihnapyörän/kytkimen rakenteen
        (tai osoittaa, että hihnapyörää ei ole mukana).
    alternator_regulator_type:
      name: Vaihtovirtageneraattorin säätimen tyyppi
      description: Ilmaisee, onko jännitteensäädin laturin sisäinen vai ulkoinen ja
        onko se alkuperäisen valmistajan ohjaama (tietokoneen/PCM:n ohjaama).
    alternator_terminal_connection_type:
      name: Vaihtovirtageneraattorin pääteyhteystyyppi
      description: Ensisijaiset sähköliitännät laturin lähtö-/herätepäätteelle johtosarjan
        yhteensopivuuden varmistamiseksi.
    altitude_suitability:
      name: Sopivuus korkeuteen merenpinnasta
      description: Ilmaisee, onko pallo suunniteltu käyttöön tietyllä korkeudella
        merenpinnasta, mikä vaikuttaa nopeuteen ja kimmoisuuteen.
    ambulance_stretcher_mount_type:
      name: Ambulanssipaarien kiinnitystyyppi
      description: Määrittää ambulanssin tukeman paarien lastaus-/kiinnitysjärjestelmän
        tyypin.
    american_football_safety_certification:
      name: Amerikkalaisen jalkapallon turvallisuussertifikaatti
      description: Ilmaisee amerikkalaisen jalkapallon erityiset turvallisuussertifikaatit
        tai -standardit, jotka tuote täyttää.
    amplifier_tube_function:
      name: Vahvistinputken toiminta
      description: Määrittää putken toiminnallisen roolin instrumentin vahvistinpiirissä
        (esim. esivahvistin vs. päätevahvistin).
    analog_synthesizer_cv_gate_i_o:
      name: Analoginen syntetisaattori CV/Gate I/O
      description: Ilmaisee, millaisia ohjausjännite- ja porttiliitäntöjä tuetaan
        integroitaessa modulaariseen/analogiseen laitteistoon.
    analog_synthesizer_keybed_configuration:
      name: Analogisen syntetisaattorin koskettimiston kokoonpano
      description: Kuvailee, onko syntetisaattorissa sisäänrakennettu koskettimisto
        ja jos on, koskettimien määrän.
    anchor_configuration:
      name: Kiinnityksen kokoonpano
      description: Ilmaisee, käyttääkö jousitusjärjestelmä yhtä keskitettyä kiinnityspistettä
        vai useita itsenäisiä kiinnityspisteitä, mikä vaikuttaa harjoitusten vaihteluun
        ja asennon monimutkaisuuteen.
    animal_raising_method:
      name: Eläinten kasvatusmenetelmä
      description: Kuvailee tuotantoeläimen kasvatuksessa käytettyjä maatilan tai
        kotieläintuotannon käytäntöjä.
    animal_species:
      name: Eläinlajit
      description: Määrittää pehmolelun edustaman eläimen tai olennon (esim. karhu,
        pupu, dinosaurus).
    animal_trap_jaw_style:
      name: Eläinloukun leukatyyppi
      description: Ansan leukojen rakenne, vaikutus pitovoimaan ja eläinten hyvinvointiin.
    animal_trap_type:
      name: Eläinloukun tyyppi
      description: Luokittelee ansan mekaanisen tyylin/rakenteen, jolloin ostaja voi
        nopeasti paikantaa tarvitsemansa tai määräysten salliman pyyntimenetelmän.
    ankle_collar_style:
      name: Nilkkakauluksen tyyli
      description: Kuvailee kengän nilkkakauluksen tyyliä tai rakennetta, kuten matala,
        keskikorkea, korkea, sukkakaulus tai nauhaton, jotka vaikuttavat tukeen, istuvuuteen
        ja estetiikkaan.
    ankle_guard_protection_level:
      name: Nilkkasuojan suojaustaso
      description: Arvioi nilkkasuojan tarjoaman vaikutuksen kokonaismäärää.
    ankle_strap_padding_type:
      name: Nilkkahihnan toppaustyyppi
      description: Kuvailee hihnan sisällä käytettyä, mukavuuteen vaikuttavaa pehmustemateriaalia
        tai -tapaa.
    ankle_strap_type:
      name: Nilkkaremmin tyyppi
      description: Luokittelee lumilautasiteen nilkkaremmin rakenteen tai mallin.
    ant_farm_habitat_medium_type:
      name: Muurahaisterraario, keskikokoinen malli
      description: Määrittää muurahaisterrarion tarjoaman tai vaatiman ensisijaisen
        tunnelointi-/havaintovälineen.
    ant_farm_kit_contents:
      name: Muurahaisterraariosarjan sisältö
      description: Yksilöi, mitkä osat sisältyvät muurahaisterraarioon (esim. itse
        terraario, hiekka/geeli, muurahaislahjakortti, ruokintavälineet).
    ant_farm_lighting_type:
      name: Muurahaisterraarion valaistustapa
      description: Määrittää havainnoinnissa käytettävän sisäänrakennetun valaistuksen
        (jos sellainen on) tyypin.
    antenna_fit_type:
      name: Antennin sopivuustyyppi
      description: Mihin antennin muotoon palloantenni on tarkoitettu sopivaksi?
    anti_caking_agent:
      name: Paakkuuntumisenestoaine
      description: Määrittää paakkuuntumisen estämiseksi lisätyn paakkuuntumisenestoaineen
        tyypin. Tämä tieto on tärkeää allergioiden ja reseptin tarkkuuden vuoksi.
    anti_g_suit_bladder_material:
      name: G-puvun ilmarakon materiaali
      description: G-puvun sisällä olevan täytettävän ilmarakon materiaali; listaa
        kaikki, jos on käytetty useita materiaaleja.
    anti_g_suit_connector_type:
      name: G-puvun liittimen tyyppi
      description: Määrittää lentokoneeseen tai säätimeen liitettävän ilma-/paineletkun
        tyypin/standardin.
    anti_g_suit_inflation_method:
      name: G-puvun täyttömenetelmä
      description: Ilmaisee, miten puvun ilmarakot paineistetaan G-suojan tarjoamiseksi.
    anti_g_suit_size_system:
      name: G-puvun kokojärjestelmä
      description: Kokostandardi, jota käytetään puvun koon ja istuvuuden määrittämiseen.
    anti_reverse_type:
      name: Takaiskumekanismi
      description: Määrittää koukun asetuksiin ja takavälykseen vaikuttavan takaiskumekanismin
        tyypin.
    anti_theft_feature:
      name: Varkaudenestotoiminto
      description: Ilmaisee, tarjoaako teline/pidike varkaudenestotoimintoja, kuten
        lukittavia kiinnikkeitä tai kajoamisen estävän rakenteen.
    antique_gun_ignition_system:
      name: Historiallisen aseen sytytysjärjestelmä
      description: Määrittää historiallisen ampuma-aseen laukaisu-/sytytysjärjestelmän.
    apple_variety:
      name: Omenalajike
      description: Määrittää omenan viljelylajikkeen tai muunnoksen (esim. Gala, Fuji,
        Granny Smith), mikä auttaa asiakasta valitsemaan oikean lajikkeen maun, rakenteen
        ja kulinaarisen käytön perusteella.
    applique_edge_finish:
      name: Reunaviimeistelyn asennustapa
      description: Kuvailee reunojen viimeistelyn ja sen vaikutuksen ulkonäköön ja
        rispaantumisen kestävyydelle.
    arbor_type:
      name: Kelan akselityyppi
      description: Luokittelee kelan puolan akselirakenteen, joka vaikuttaa siiman
        sisäänkelausnopeuteen, pohjasiiman määrään ja siiman muistitaipumukseen.
    archery_accessory_type:
      name: Jousiammuntavarusteiden tyyppi
      description: Määrittää jousiammuntaan tarkoitetun lisävarusteen tyypin tuotteiden
        suodattamisen helpottamiseksi ostajille.
    archery_part_type:
      name: Jousiammunnan osan tyyppi
      description: Yksilöi myytävän laitteiston tai varaosan (esim. korotuspala, lapa,
        jänne), mikä mahdollistaa tarkan suodatuksen ilman kategoriapuuta.
    archery_range_accessory_type:
      name: Jousiammuntaradan lisävarusteen tyyppi
      description: Luokittelee jousiammuntaradalla käytetyn varusteen tyypin, jolloin
        ostaja voi nopeasti suodattaa juuri tarvitsemansa tuotteen.
    archery_target_features:
      name: Jousiammuntamaalien ominaisuudet
      description: Luettelee erityiset toiminta- tai mukavuusominaisuudet, joita muut
        luokat eivät kata (esim. itsekorjautuva vaahto, kantokahvan käyttönimi).
    archery_tool_type:
      name: Jousiammuntatyökalun tyyppi
      description: Luokittelee tietyn tyyppisen jousiammuntatyökalun tai -varusteen.
    armband_features:
      name: Käsivarsinauhan ominaisuudet
      description: Luettelee käsivarsinauhan toimintaa parantavia erityisiä toiminnallisia
        tai visuaalisia ominaisuuksia.
    armguard_style:
      name: Käsisuojan malli
      description: Määrittää käsisuojan rakenteen tai muodon, mikä tarjoaa tietoa
        mallin peittävyydestä ja perinteisestä tai modernista ulkomuodosta.
    armor_protection_type:
      name: Panssarointityyppi
      description: Ajoneuvon panssarointijärjestelmän tarjoaman suojan tyyppi.
    armrest_adjustability:
      name: Käsinojan säädettävyys
      description: Määrittää tuolin käsinojien mittojen säädettävyyden ja kokoonpanon
        (esim. kiinteät, 2D, 3D, ylös nostettavat).
    armrest_type:
      name: Käsinojan tyyppi
      description: Kuvailee, onko tuolissa käsinojat ja jos on, niiden säädettävyyden
        (esim. ei käsinojia, kiinteät, säädettävät, irrotettavat).
    arrow_bolt_point_type:
      name: Nuolen/vasaman kärjen tyyppi
      description: Määrittää nuoleen tai vasamaan asennetun kärjen mallin.
    arrow_component_type:
      name: Nuolen osan tyyppi
      description: Luokittelee nuolen tietyn osan tai lisävarusteen (insertti, wrappi,
        holkki, liima jne.), jotta asiakas voi suodattaa tuotteen ilman kymmeniä ylimääräisiä
        alakategorioita.
    arrow_containment_level:
      name: Nuolihyllyn malli
      description: Kuvailee, kantaanko nuolihylly nuolen kokonaan, osittain vai ei
        lainkaan.
    arrow_fletching_orientation:
      name: Nuolen sulituskuvio
      description: Määrittää sulituskuvion (esim. kiertosuunta vasen tai oikea, spiraali,
        helikaalinen), joka määrää nuolen pyörimissuunnan.
    arrow_nock_groove_size:
      name: Nuolen nokin koko
      description: Määrittää nokin kokoluokituksen, mikä määrittää yhteensopivuuden
        jänteen eri halkaisijoiden kanssa.
    arrow_nock_type:
      name: Nuolen nokkityyppi
      description: Jousen jänteeseen istuvan nuolen nokin muotoilu/malli.
    arrow_rest_style:
      name: Nuolihyllyn malli
      description: Määrittää nuolihyllyn toiminnallisen malin/mekanismin (esim. pudotus,
        terä, harja). Malli määrittää, miten nuolihylly tukee nuolta ja pitää paikoillaan
        ja vapauttaa nuolen. Tämä on ensisijainen tekijä, jolla ostaja erottaa tuotteen
        muista.
    arrow_shaft_compatibility:
      name: Nuolivarren yhteensopivuus
      description: Ilmaisee nuolen varren/holkin standardin, johon valaistu nokki
        sopii (esim. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Taide-/käsityökärjen malli
      description: Kuvailee kärjen muodon/profiilin (esim. terävä vs. pyöreä kärki)
        ja ilmaisee, millaisia kohokuviointijälkiä se tuottaa.
    art_ink_lightfastness_rating:
      name: Taidemusteen valonkestoluokitus
      description: Ilmaisee musteen haalistumisenkestävyyden valolle altistettaessa,
        tyypillisesti ilmaistuna vakioarvojen avulla.
    art_ink_opacity:
      name: Taidemusteen läpinäkyvyys
      description: Määrittää musteen peittoasteen levityksen jälkeen.
    art_security_rating:
      name: ART-turvallisuusluokitus
      description: Määrittää lukon hollantilaisen ART-tähtiluokituksen (1–5 tähteä).
    artichoke_cut:
      name: Artisokan osa
      description: Ilmaisee, mitä osaa artisokasta tarjotaan (esim. kokonainen, sydän,
        pohja), kulinaariseen käyttötarkoitukseen soveltamiseksi.
    artichoke_variety:
      name: Artisokkalajike
      description: Määrittää artisokan viljelylajikkeen tai kasvitieteellisen lajikkeen,
        mikä auttaa värin, maun ja käyttötarkoituksen valinnassa.
    articulation_features:
      name: Liikkuvuusominaisuudet
      description: Ilmaisee, onko dinosaurusmallissa liikkuvia osia (säädettävä leuka,
        raajat, häntä) ja onko se yleisesti asetettavissa asentoihin.
    artificial_bait_form:
      name: Keinotekoisen syötin muoto
      description: Ilmaisee kalastussyötin tai vieheen fyysisen muodon tai mallin.
    asa_mounting_type:
      name: Ilmanlähdesovittimen kiinnitystyyppi
      description: Ilmaisee ilmanlähdesovittimen (Air Source Adapter, ASA) liitännän
        tai kiinnitysstandardin (esim. lohenpyrstö, kisko, suora kiinnitys).
    ascender_descender_type:
      name: Nousu-/laskeutumislaitteen tyyppi
      description: Luokittelee kiipeämisen, nousun tai laskeutumisen tyylin tarkempaa
        suodatusta varten.
    aspiration_type:
      name: Ahdintyyppi
      description: Ilmaisee moottorin ahtimen/tehostimen toimintatavan.
    assembly_state:
      name: Kokoonpanon tila
      description: Ilmaisee, toimitetaanko kaappi valmiina asennettavaksi, esikoottuna
        vai muussa muodossa.
    assistance_mechanism:
      name: Avustusmekanismi
      description: Määrittää kaikki sisäänrakennetut avustus- tai vastusjärjestelmät,
        joita voimatorni tarjoaa leuanvetoja, dippejä tai muita harjoituksia varten.
    atemoya_cultivar:
      name: Atemoyan viljelylajike
      description: Määrittää atemoya-hedelmän viljelylajikkeen, jonka avulla ostaja
        voi valita sen maun, koon tai siemenominaisuuksien perusteella.
    athletic_cup_size:
      name: Urheilullinen kuppikoko
      description: Ilmaisee valmistajan määrittämän suojakupin koon istuvuuden varmistamiseksi
        urheilijalle.
    attachment_position:
      name: Kiinnityskohta
      description: Määrittää, mihin kohtaan satulaa tai ratsastajaa laukku on tarkoitettu
        kiinnitettäväksi.
    attractant_scent_profile:
      name: Houkutusaineen tuoksuprofiili
      description: Kuvailee hajun tai maun, jota käytetään villieläimien houkutteluun
        tai peittämään ihmisten hajua.
    atv_utv_intended_use:
      name: ATV:n/UTV:n käyttötarkoitus
      description: ATV:n/UTV:n ensisijainen käyttötarkoitus/malli.
    audio_channel_configuration:
      name: Audiokanavan konfiguraatio
      description: Taajuuskorjaimen/DSP-tuen erillisten äänikanavien lukumäärä (esim.
        2-kanavainen stereo, 4-kanavainen edessä/takana, 6-kanavainen).
    audio_inputs:
      name: Audiotulot
      description: Määrittää samplauksessa/äänityksessä käytettävissä olevien äänituloliitäntöjen
        tyypit (esim. 6,3 mm linja, XLR, 3,5 mm, mikrofonietuaste, phono).
    audio_output:
      name: Audiolähtö
      description: Ilmaisee, tuottaako lelu ääntä ja miten ääni toistetaan.
    audio_outputs:
      name: Audiolähdöt
      description: Määrittää käytettävissä olevat äänilähdöt, mukaan lukien päälähdöt
        ja mahdolliset määritettävät/aux-lähdöt.
    audio_playback_source:
      name: Äänentoiston lähde
      description: Ensisijaiset medialähteet, joista karaokejärjestelmä voi soittaa
        musiikkia.
    autograph_authentication:
      name: Nimikirjoituksen todennus
      description: Ilmaisee kortissa olevan nimikirjoituksen todennustilan/tyypin.
    autograph_format:
      name: Nimikirjoituksen muoto
      description: Kuvailee, onko allekirjoitus alkuperäinen käsin allekirjoitettu
        nimikirjoitus, leimattu/painettu faksimile vai kaiverrus/lisätty.
    autogyro_cockpit_enclosure:
      name: Autogiron ohjaamon kate
      description: Määrittää, onko ohjaamo avoin vai suljettu.
    available_firing_modes:
      name: Käytettävissä olevat laukaisutilat
      description: Luettelee värikuula-aseen vakiona valittavissa olevat laukaisutilat.
    avocado_variety:
      name: Avokadolajike
      description: Määrittää avokadon viljelylajikkeen tai muunnoksen, jotta ostaja
        voi valita sen maun, rakenteen, koon ja öljypitoisuuden mukaan.
    award_customization_included:
      name: Palkinnon personointi sisältyy hintaan
      description: Ilmaisee, minkälaisia personointeja/mukauttamisia sisältyy palkinnon
        ostamiseen.
    award_material:
      name: Palkinnon materiaali
      description: Yksilöi palkinnon päämateriaali(t) (pokaali, laatta, mitali, rintaneula,
        nauhaan ripustettava).
    award_mounting_display_type:
      name: Palkintojen kiinnitys-/esitystapa
      description: Määrittää, miten palkinto on tarkoitus asettaa esille tai ripustaa
        (seinälle / tietokoneelle / puettava).
    award_plaque_plate_material:
      name: Palkintolaatan materiaali
      description: Määrittää laattaan kiinnitetyn nimi-/kaiverruskilven/ materiaalin
        (eri kuin taustamateriaali).
    award_ribbon_attachment_type:
      name: Palkintonauhan kiinnitystyyppi
      description: Määrittää, miten nauha on tarkoitus kiinnittää tai pukea.
    award_ribbon_imprint_method:
      name: Palkintonauhan painatusmenetelmä
      description: Määrittää, miten teksti/grafiikka lisätään nauhaan.
    award_ribbon_material:
      name: Palkintonauhan materiaali
      description: Nauhakankaan päämateriaali (esim. satiini, polyesteri).
    award_ribbon_placement_title:
      name: Palkintonauhan sijoitus/nimike
      description: Nauhan välittämä tieto sijoituksesta (esim. 1. sija, osallistuja).
    axle_compatibility:
      name: Akselien yhteensopivuus
      description: Ilmaisee pyörän akselistandardin, varmistaen yhteensopivuuden polkupyörän
        rungon ja haarukan kanssa.
    back_beam_type:
      name: Takapalkin tyyppi
      description: Takapalkin tyyppi/säädettävyys (esim. kiinteä tai korkeussäädettävä).
    back_design:
      name: Takaosan muotoilu
      description: Määrittää merkittävät takaosan rakenteet, jotka vaikuttavat tyyliin
        ja tukeen.
    back_panel_type:
      name: Takapaneelin tyyppi
      description: Määrittää kaapin takapaneelin mallin tai materiaalin, joka vaikuttaa
        esille panon näkyvyyteen ja sisustuksen yhteensopivuuteen.
    back_sides_material:
      name: Taustan ja sivujen materiaali
      description: Määrittää klassisen kitaran rungon takaosan ja sivujen materiaalin.
    backing_type:
      name: Taustatyyppi
      description: Kuvailee myytävän tekojalokiven taustan/kiinnitystavan (itseliimautuvat
        tuotteet).
    backup_camera_mounting_location:
      name: Peruutuskameran asennuspaikka
      description: Ilmaisee peruutuskameran aiotun asennuspaikan ajoneuvossa.
    backup_camera_video_interface:
      name: Peruutuskameran videokäyttöliittymä
      description: Määrittää videolähdön/liitännän/liittimen, jolla peruutuskamera
        kytketään monitoriin, DVR:ään tai pääyksikköön (esim. komposiitti-RCA, LVDS
        OEM, IP Ethernetillä).
    badminton_set_components_included:
      name: Mukana tulevat sulkapallosetin osat
      description: Luettelee sulkapallosetin mukana toimitettavat yksittäiset osat.
    bag_attachment_method:
      name: Pussin liittämismenetelmä
      description: Ilmaisee ensisijaisen menetelmän, jolla juomapussi/pidike kiinnitetään
        muihin varusteisiin (esim. MOLLE-kiinnitys, vyölenkki, karabiinihaka).
    bag_case_carrying_style:
      name: Laukun/kotelon kantotapa
      description: Määrittää kotelon/keikkalaukun ensisijaisen kantotavan (miten se
        on rakennettu kannettavaksi).
    bag_cover_material:
      name: Laukun päällisen materiaali
      description: Määrittää laukun päällisen (ulkokuoren) materiaalin, mikä vaikuttaa
        kestävyyteen, pitoon ja ulkonäköön.
    bag_embellishment:
      name: Laukun koristelu
      description: Kuvailee laukun ulkopuolelle kiinnitettyjä näkyviä koriste-elementtejä,
        kuten tupsuja, nastoja tai tikkauksia.
    bag_fill_medium:
      name: Pussin täyttöaine
      description: Yksilöi pussin täyttämiseen tai paineistamiseen käytetyn aineen
        (esim. ilma, vesi, hiekka).
    bag_material:
      name: Pussin materiaali
      description: Turvatyynyn/ilmarakon materiaali.
    bag_padding_level:
      name: Laukun pehmustustaso
      description: Määrittää pussin tai suojan pehmusteen reunatäytteen määrän tai
        tyylin.
    bag_size_descriptor:
      name: Laukku koon määrite
      description: Markkinointikokoluokka ämpärilaukulle (esim. mini, iso), tarkkojen
        mittojen täydentämiseksi.
    bagel_size:
      name: Bagelin koko
      description: Määrittää bagelin yleisen koon esim. mini, ohut, normaali, suuri,
        erittäin suuri tai jumbo.
    bagpipe_accessories_included:
      name: Mukana tulevat säkkipillitarvikkeet
      description: Luettelee säkkipillin mukana tulevat tärkeimmät osat/lisävarusteet
        (itse säkkipillin lisäksi), esimerkiksi kotelo, harjoituspilli, suojus, narut,
        kosteudenhallinta.
    bagpipes_playing_mode:
      name: Säkkipillin soittotila
      description: Määrittää, miten ilmaa syötetään soittimeen soiton aikana.
    bait_compatibility:
      name: Syötin yhteensopivuus
      description: Luettelee syöttityypit, joiden kanssa pellettilisävaruste on suunniteltu
        toimimaan. Tämän avulla kalastaja voi varmistaa, että valittu työkalu vastaa
        haluttua syöttiä.
    bait_species:
      name: Syöttilajit
      description: Yksilöi syöttinä tarjotun ensisijaisen organismin. Näin kalastaja
        voi varmistaa sen laillisuuden ja tehokkuuden kohdelajilla.
    baking_chip_form:
      name: Leivontahippujen muoto
      description: Kuvailee leivontahippujen fyysisen koon ja muodon, mitkä vaikuttavat
        sulamiskäyttäytymiseen ja ulkonäköön.
    balance_board_style:
      name: Tasapainolaudan malli
      description: Luokittelee tasapainolaudat niiden mekanismin tai rakenteen mukaan
        osoittaen, kuinka lauta liikkuu ja millaisen harjoitushaasteen se tarjoaa.
    balance_cushion_accessories_included:
      name: Mukana tulevat tasapainotyynyn lisävarusteet
      description: Luettelee kaikki tyynyn mukana pakatut lisävarusteet, minkä avulla
        ostaja voi vertailla tuotepakettien hintoja.
    balance_type:
      name: Tasapainotustyyppi
      description: Ilmaisee vetoakselin tasapainotuksen tilan/luokan myyntihetkellä
        (esim. tehdastasapainotettu, suurille nopeuksille, tasapainottamaton).
    ball_bladder_material:
      name: Käsipallon sisäkumin materiaali
      description: Ilmaisee käsipallon sisäkumin materiaalin, joka vaikuttaa ilmanpitävyyteen,
        kimmoisuuteen ja yleiseen kestävyyteen.
    ball_certification:
      name: Pallon sertifiointi
      description: Ilmoittaa pallolle myönnetyt viralliset suorituskykysertifikaatit
        ja hyväksynnät.
    ball_construction:
      name: Pallon rakenne
      description: Ilmaisee valmistusmenetelmän, jolla pallon paneelit on liitetty
        toisiinsa, mikä vaikuttaa kestävyyteen, tuntumaan, veden imeytymiseen ja hintaan.
    ball_core_construction:
      name: Pallon ytimen rakenne
      description: Tiedot pallon sisäisestä rakenteesta, mikä vaikuttaa kimmoisuuteen
        ja tuntumaan.
    ball_core_type:
      name: Pallon ytimen tyyppi
      description: Ilmaisee pallon sisäisen rakenteen, joka vaikuttaa kimmoisuuteen
        ja painonjakaumaan.
    ball_cup_game_included_pieces:
      name: Mukana tulevat pallo- ja kuppipelin osat
      description: Yksilöi pallo- ja kuppipelin tuotepakettiin sisältyvät osat.
    ball_drilling_state:
      name: Poraus
      description: Ilmaisee, onko palloon tehty poraukset ja jos on mitkä.
    ball_holder_type:
      name: Pallopidikkeen tyyppi
      description: Määrittää pallonpitimen rakenteellisen tyypin tai muodon.
    ball_pit_ball_surface_finish:
      name: Pallomeripallon pinnan viimeistely
      description: Kuvailee pallon pinnan tunto-/visuaalista viimeistelyä, joka vaikuttaa
        pitoon, tuntumaan leikissä ja puhdistettavuuteen.
    ball_pit_safety_features:
      name: Pallomeren turvallisuusominaisuudet
      description: Pallomerien turvallisuuteen liittyvät suunnitteluominaisuudet.
    ball_pump_accessory_type:
      name: Pallopumpun lisävarustetyyppi
      description: Määrittää pallopumpun lisävarusteen tarkan tyypin, jonka avulla
        kauppiaat voivat luokitella painemittarit, letkut, voiteluaineet ja muut lisävarusteet
        yhden pääluokan alle.
    ball_return_mechanism:
      name: Pallon palautusmekanismi
      description: Määrittää maton pallonpalautuksen tavan, jos sellainen on olemassa.
    ball_return_type:
      name: Pallon palautustapa
      description: Järjestelmän tasku-/palautusjärjestelmä, joka kerää pallot pelin
        aikana.
    ball_speed_rating:
      name: Pallon nopeusluokitus
      description: Valmistajan määrittelemä nopeusluokka, joka osoittaa pallon nopeuden
        vakioiduissa peliolosuhteissa.
    ball_surface_texture:
      name: Kuulan pintarakenne
      description: Kuvailee pallojen ulkopinnan pintarakenteen tai urakuvioinnin,
        joka voi vaikuttaa pitoon ja ulkonäköön.
    ball_surface_type:
      name: Kuulan pintatyyppi
      description: Kuvailee pallon ulkopinnan viimeistelyn tai pehmustuksen, jotka
        vaikuttavat iskutuntumaan ja pitoon.
    ballonet_configuration:
      name: Ballonetin konfiguraatio
      description: Ei-rakenteisten tai puolirakenteisten ilmalaivojen ballonet-järjestelmän
        kokoonpano, jota käytetään trimmauksen ja paineen hallintaan.
    balloon_closure_valve_type:
      name: Ilmapallon sulku-/venttiilityyppi
      description: Yksilöi, miten ilmapallo suljetaan täytön jälkeen (esim. sidontanauha,
        itsetiivistyvä venttiili).
    balloon_kit_finish:
      name: Ilmapallojen viimeistely
      description: Kuvailee pakkaukseen sisältyvien ilmapallojen pinnan/visuaalisen
        viimeistelyn.
    balloon_kit_material:
      name: Ilmapallojen materiaali
      description: Määrittää pakkaukseen sisältyvien ilmapallojen päämateriaalin.
    banana_variety:
      name: Banaanilajike
      description: Määrittää tarjotun banaanin viljelylajikkeen tai tyypin.
    banjo_head_type:
      name: Banjon kalvon tyyppi
      description: Banjon kalvon tyyppi/materiaali, joka vaikuttaa äänen kirkkauteen,
        voimakkuuteen ja tuntumaan.
    banjo_neck_material:
      name: Banjon kaulan materiaali
      description: Kaulan materiaali, joka vaikuttaa tuntumaan, vakauteen ja ääneen.
    banjo_pickup_configuration:
      name: Banjon mikrofonikokoonpano
      description: Sisältääkö Banjo oman mikrofonin ja mitä yleistä mikrofonitekniikkaa
        siinä käytetään.
    banjo_rim_material:
      name: Banjo reunuksen materiaali
      description: Reunuksen (pyöreän rungon) materiaali, jolla on suuri vaikutus
        ääneen ja painoon.
    banjo_tone_ring_type:
      name: Banjon reunuksen tyyppi
      description: Määrittää Banjo reunuksen muotoilun/materiaaliperheen, joka vaikuttaa
        soittimen sointiin ja äänenvoimakkuuteen.
    banjo_tuning_machine_type:
      name: Banjon virityskoneiston tyyppi
      description: Banjossa käytettyjen virittimien tyyppi.
    banknote_authentication_grading:
      name: Setelien aitouden tarkastus/luokittelu
      description: Kolmannen osapuolen palvelu (jos sellainen on), joka vahvisti/luokitteli
