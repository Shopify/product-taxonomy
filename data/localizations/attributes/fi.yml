    hook_coating_finish:
      name: Koukun pinnoitus/viimeistely
      description: Koukun pintakäsittely tai pinnoite, joka on tehty korroosionkestävyyden,
        huomaamattomuuden tai värin vuoksi (esim. musta nikkeli, kirkas metalli).
    hook_configuration:
      name: Koukkukokoonpano
      description: Kuvaa syötin mukana toimitettujen koukkujen olemassaoloa ja tyyliä.
    hook_eye_style:
      name: Koukun silmän tyyli
      description: Määrittää koukun silmän muodon tai suunnan, joka vaikuttaa siihen,
        miten koukku sidotaan tai kiinnitetään.
    hook_eye_type:
      name: Koukun silmän tyyppi
      description: Määrittää koukun silmän rakenteen, joka vaikuttaa solmun valintaan
        ja kiinnitykseen.
    hook_loop_format:
      name: Tarranauhan muoto
      description: Määrittää ommeltavan tarranauhan fyysisen muodon.
    hook_loop_side:
      name: Tarranauhan puoli
      description: Määrittää, onko tuote koukku, lenkki vai yhteensopiva koukku ja
        lenkki -sarja.
    hook_material:
      name: Koukun materiaali
      description: Ilmaisee nostokoukun/‑pään materiaalin, joka on keskeinen tekijä
        suolavesikäytössä lujuuden ja korroosionkestävyyden kannalta.
    hook_organizer_style:
      name: Koukkujen säilytysvälineen tyyli
      description: Koukkujen säilytysvälineen fyysinen tyyli tai muototekijä (esimerkiksi
        kotelo, rulla tai pussi), jota käytetään selaamiseen ja suodattamiseen säilytysvälineen
        tyypin mukaan.
    hook_point_configuration:
      name: Koukun kärkien konfiguraatio
      description: Ilmaisee, onko koukussa kaksi kärkeä (kaksikärkinen) vai kolme
        kärkeä (kolmikärkinen).
    hook_point_type:
      name: Koukun kärjen tyyppi
      description: Kuvaa koukun kärjen hiontaa tai muotoa, jotka vaikuttavat läpäisyyn
        ja pitokykyyn.
    hook_shank_length:
      name: Koukun varren pituus
      description: Ilmaisee koukun varren suhteellisen pituusluokituksen (esim. lyhyt,
        pitkä) nopeaa visuaalista ja toiminnallista vertailua varten.
    hooks_eyes_attachment_method:
      name: Hakasten kiinnitysmenetelmä
      description: Miten koukut ja silmukat kiinnitetään vaatteeseen tai projektiin.
    hop_up_type:
      name: Hop-up-tyyppi
      description: Määrittelee hop-up-järjestelmän, jota käytetään antamaan kuulalle
        kierrettä kantaman ja tarkkuuden parantamiseksi.
    horse_blanket_type:
      name: Hevosen loimen tyyppi
      description: Määrittää hevosen loimen ensisijaisen tyylin tai käyttötarkoituksen.
    horse_brush_type:
      name: Hevosen harjan tyyppi
      description: Luokittelee harjan sen tietyn harjaustyylin tai käyttötarkoituksen
        mukaan, jolloin asiakkaat voivat suodattaa pitäen kategoriahierarkian ehjänä.
    horse_care_purpose:
      name: Hevosen hoidon tarkoitus
      description: Tuotteen ensisijainen käyttötarkoitus hevosenhoidossa, kattaen
        terveydenhuollon, harjaamisen ja tallinhoidon tarpeet.
    horse_feed_stage:
      name: Hevosen rehun taso
      description: Ilmaisee hevosen elämänvaiheen tai fysiologisen tilan, jota varten
        rehu on kehitetty.
    horse_groomer_type:
      name: Hevosen hoitovälineen tyyppi
      description: Luokittelee hoitovälineen tyypin, jotta ostajat löytävät nopeasti
        tarvitsemansa työkalun.
    horse_leg_protection_type:
      name: Hevosen jalkojen suojaustyyppi
      description: Luokittelee jännesuojan, kääreen tai sidosten tietyn tyylin tai
        toiminnon.
    horse_model_breed:
      name: Pienoismallihevosen rotu
      description: Määrittää pienoismallin kuvaaman hevosrodun (jos sovellettavissa).
    hosiery_toe_style:
      name: Sukkahousujen varvastyyli
      description: Määrittelee sukkahousujen varvasalueen rakenteen, mikä on tärkeää
        kestävyyden ja yhteensopivuuden kannalta avokärkisten jalkineiden kanssa.
    hot_air_balloon_basket_type:
      name: Kuumailmapallon korityyppi
      description: Määrittää ensisijaisen korin kokoonpanon/tyylin (esim. kilpakori,
        kaupallinen suuren kapasiteetin kori, ositettu, esteetön/ovi), jota käytetään
        koriin nousemisessa ja suunnitellussa käytössä.
    hot_air_balloon_burner_type:
      name: Kuumailmapallon poltintyyppi
      description: Kuumailmapalloon asennetun poltinjärjestelmän tyyppi/konfiguraatio.
    hot_air_balloon_envelope_material:
      name: Kuumailmapallon kuoren materiaali
      description: Ilmapallon kuoren (kupolin) ensisijainen kangas/materiaali.
    hotfix_application_tool:
      name: Kuumakiinnitystyökalu
      description: Suositeltu työkalu tai lämmönlähde hotfix-strassien kiinnittämiseen.
    hub_axle_type:
      name: Napa-akselin tyyppi
      description: Ilmaisee akselin kiinnitysjärjestelmän, jota varten napa on suunniteltu
        (pikakiinnitys, läpiakseli jne.).
    hub_motor_type:
      name: Napamoottorin tyyppi
      description: Kuvailee napamoottorin rakenteen (vaihteistollinen, suoraveto,
        harjallinen, harjaton), jotta ostaja saa tietoa vääntömomentista, painosta
        ja hyötysuhdeominaisuuksista.
    hula_hoop_construction_type:
      name: Hulavanteen rakennetyyppi
      description: Kuvailee, miten vanne on rakennettu/koottu.
    hula_hoop_features:
      name: Hulavanteen ominaisuudet
      description: Korostaa hulavanteen olennaisia toiminnallisia tai suunnitteluominaisuuksia
    hull_design:
      name: Rungon muotoilu
      description: Kuvaa rungon muodon, joka vaikuttaa suorituskykyyn ja käsittelyominaisuuksiin.
    hull_type:
      name: Rungon tyyppi
      description: Kuvaa rungon muotoa, joka vaikuttaa tehokkuuteen ja vakauteen.
    humidifier_refill_medium_type:
      name: Ilmankostuttimen vaihtosuodattimen tyyppi
      description: Ilmaisee ilmankostuttimen kosteudenpidätys-/vaihtosuodattimen (joka
        kastuu tai vaihdetaan).
    humidifier_refill_method:
      name: Ilmankostuttimen täyttötapa
      description: Kuvailee tavan, jolla ilmankostutin täytetään vedellä tai miten
        sen kostutuselementti vaihdetaan.
    humidifying_medium:
      name: Kostutusaine
      description: Yksilöi tuotteen käyttämän kostutuselementin tai -väliaineen (joka
        kastellaan tai aktivoidaan).
    hummus_base_ingredient:
      name: Hummuksen pääainesosa
      description: Ilmaisee hummuksen valmistuksessa käytetyn ensisijaisen palkokasvin
        tai kasvispohjan.
    hunting_call_type:
      name: Houkutuspillin tyyppi
      description: Luokittelee pillin ensisijaisen toimintatavan tai mekanismin (esim.
        suulla puhallettava, sähköinen, laatikkomainen), jotta metsästäjät voivat
        nopeasti valita tarpeisiinsa ja taitotasoonsa parhaiten sopivan välineen.
    hunting_dog_collar_function:
      name: Metsästyskoiran kaulapannan toiminta
      description: Luokittelee pannan ensisijaisen toiminnallisen tyylin tai tarkoituksen,
        mikä auttaa ostajaa suodattamaan tuotteita toiminnon, kuten seurannan, koulutuksen,
        näkyvyyden tai vakiokäytön, mukaan.
    hvac_control_functions:
      name: LVI-ohjaustoiminnot
      description: Ilmaisee, mitä LVI/sulatus/ilmavirtaustoimintoja yksikkö ohjaa
        (mekaanisesti tai elektronisesti).
    hybrid_drivetrain_configuration:
      name: Hybridivoimalaitteen kokoonpano
      description: Ilmaisee PHEV-järjestelmän rakenteen, joka kuvaa, miten sähkömoottori(t)
        ja polttomoottori tuottavat käyttövoimaa.
    hybrid_system_type:
      name: Hybridijärjestelmän tyyppi
      description: Luokittelee ajoneuvon käyttämän hybridisaatiorakenteen.
    hybrid_truck_cab_type:
      name: Hybridikuorma-auton ohjaamotyyppi
      description: Määrittää kuorma-auton ohjaamokokoonpanon, joka vaikuttaa istumapaikkojen
        määrään ja sisätilojen kokoon.
    hydration_bag_features:
      name: Juomarepun ominaisuudet
      description: Korostaa juomareppujen (nesteytysjärjestelmien) erityisiä muotoilullisia
        tai toiminnallisia ominaisuuksia.
    hydration_belt_features:
      name: Nesteytysvyön ominaisuudet
      description: Listaa merkittäviä vakuumiominaisuuksia, jotka parantavat juomavyön
        käytettävyyttä, turvallisuutta tai kätevyyttä.
    hydration_bladder_compatibility:
      name: Nesteytyspussin yhteensopivuus
      description: Ilmaisee, onko liivissä nesteytyspussi tai voiko siihen lisätä
        sellaisen.
    hydration_mouthpiece_style:
      name: Nesteytyssuukappaleen tyyli
      description: Määrittää nesteytysjärjestelmän suukappaleen tai venttiilin muotoilun
        tai toiminnallisen tyylin, mikä auttaa ostajaa valitsemaan haluamansa juomaliitännän
        ja varmistamaan yhteensopivuuden.
    hydration_pack_style:
      name: Nesteytyspakkauksen tyyli
      description: Määrittää nesteytyspakkauksen rakenteellisen tyylin, kuten reppu
        tai liivi, istuvuuden varmistamiseksi ja käyttötarkoituksen suodattamisen
        helpottamiseksi.
    hydration_system_insulation:
      name: Nesteytysjärjestelmän eristys
      description: Ilmaisee, onko säiliö ja/tai juomaletku eristetty nesteen lämpötilan
        ylläpitämiseksi kuumissa tai kylmissä olosuhteissa.
    hydration_valve_type:
      name: Nesteytysventtiilin tyyppi
      description: Määrittää järjestelmän tai pullon mukana toimitetun juomaventtiilin
        tai suukappaleen tyylin, ja kattaa yleisimmät puruventtiilit ja suuren virtauksen
        suutinmallit.
    hydraulic_fluid_type:
      name: Hydraulinesteen tyyppi
      description: Määrittää jarrunesteen tyypin, jota polkupyörän hydraulinen jarrukahva
        on suunniteltu käyttämään. Nämä tiedot ovat kriittisiä huollon ja turvallisuuden
        kannalta.
    hydrogenation_level:
      name: Kovettamisen taso
      description: Ilmaisee, onko rasva kovettamatonta, osittain kovetettua vai kokonaan
        kovetettua, mikä vaikuttaa transrasvan sisältöön ja leivonnan onnistumiseen.
    hydrophobicity_level:
      name: Vedenhylkivyyden taso
      description: Ilmaisee tuotteen markkinoinnissa annetun veden pisaroinnin tai
        valumisen tason.
    ice_cream_format:
      name: Jäätelön muoto
      description: Kuvailee jäätelötuotteen fyysisen muodon tai esillepanon (esim.
        pakkaus, puikko, mochi).
    ice_skate_sharpener_type:
      name: Luistimien teroituslaitteen tyyppi
      description: Luokittelee teroittimen yleisen rakenteen tai muodon (kädessä pidettävä
        kivi, sähkökone, jigi jne.).
    ice_temperature_suitability:
      name: Jään lämpötilan sopivuus
      description: Ilmaisee jään lämpötila-alueen, jolle jääkiekkomailan vaha on kehitetty,
        mikä vaikuttaa tehokkuuteen ja lunta hylkiviin ominaisuuksiin.
    icing_sugar_variety:
      name: Tomusokerin tyyppi
      description: Luokittelee tomusokerin koostumuksen tai toiminnallisen tyypin
        (esim. sokerimassa, lumisokerijauhe, värjätty, maustettu).
    ignition_coil_configuration:
      name: Sytytyspuolan kokoonpano
      description: Määrittää sytytyspuolan muodon (yksittäinen puola/tulpanhattu-puola,
        monilähtöinen puolapaketti sylinteriluvun mukaan, puolakisko/kasetti tai virranjakajatyyppinen).
    ignition_lead_compliance_standard:
      name: Sytytysjohdon vaatimustenmukaisuusstandardi
      description: Sytytysjohtojen täyttämä virallinen alan standardi tai sertifiointi,
        valmistajan mukaan (esim. SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Sytytysjohtimen eristemateriaali
      description: Sytytysjohdossa käytetty ensisijainen eristys-/vaippamateriaali
        (kaapelin ulkovaippa).
    ignition_lead_set_type:
      name: Sytytysjohtosarjan tyyppi
      description: Onko tuote yksittäinen sytytysjohto vai täydellinen sarja, ja mihin
        sarja on tarkoitettu.
    ignition_lead_terminal_type:
      name: Sytytysjohdon liittimen tyyppi
      description: Sytytysjohdon päissä käytettävän liittimen tyyppi (esim. sytytystulpan
        liitin ja sytytyspuola/virranjakaja).
    illumination_type:
      name: Valaistustyyppi
      description: Määrittää, valaistaanko pallo yöpeliä varten ja miten se valaistaan
        (esim. pimeässä hohtava, iskusta aktivoituva LED).
    immobilizer_installation_type:
      name: Ajonestolaiteen asennustyyppi
      description: Ilmaisee, miten ajonestolaite on asennettu tai kytketty ajoneuvoon.
    immobilizer_unlock_method:
      name: Ajonestolaitteen lukituksen avausmenetelmä
      description: Määrittää, miten ajonestolaite aktivoidaan/deaktivoidaan tai sen
        lukitus avataan.
    impact_protection_certifications:
      name: Iskusuojauksen sertifioinnit
      description: Nimeää turvastandardit, jotka suojapehmuste täyttää tai ylittää.
    impact_protection_level:
      name: Iskusuojataso
      description: Määrittää alasuojan iskunsuojaustason tai ‑tekniikan.
    impact_protection_rating:
      name: Iskusuojausluokitus
      description: Määrittää standardien (esim. EN 1621-1 taso 1, EN 14120 taso 2)
        mukaisesti sertifioidun iskunsuojaustason, mikä auttaa kuljettajia löytämään
        korkeamman tason suojan.
    impact_surface_material:
      name: Iskupintojen materiaali
      description: Kuvailee suojapehmusteen ensisijaisen isku- tai iskupintamateriaalin
        turvallisuuden ja tuntuman (esim. vaahtomuovi, muovi).
    incense_base_material:
      name: Suitsukkeen päämateriaali
      description: Ensisijainen perus-/sideaine, jota käytetään pakkauksen suitsukkeen
        (jauhepohjan) valmistukseen.
    incense_making_method:
      name: Suitsukkeen valmistusmenetelmä
      description: Valmistusmenetelmä, jota varten pakkaus on suunniteltu.
    incense_tool_type:
      name: Suitsuketyökalun tyyppi
      description: Määrittää, minkä tyyppinen suitsukkeen valmistusväline tämä tuote
        on (käytetään suitsukkeen muotoiluun, mittaamiseen, puristamiseen, sekoittamiseen
        tai kuivaamiseen).
    incline_adjustment_type:
      name: Kaltevuuden säätötapa
      description: Kuvailee, miten (tai jos) kaltevuutta voidaan muuttaa harjoittelun
        aikana.
    included_accessories:
      name: Mukana tulevat lisävarusteet
      description: Listaa mukana toimitetut lisävarusteet, kuten varaosat/kärjet,
        säilytyskotelo, latauskaapeli tai verkkolaite.
    included_case_type:
      name: Mukana tulevan kotelon tyyppi
      description: Bassosaksofonin mukana tulevan kantolaukun tai säilytyskotelon
        tyyppi (jos sellainen on).
    included_components:
      name: Mukana tulevat komponentit
      description: Listaa pakkauksen sisällön (hyödyllinen työkalusarjoja ja tuotepaketteja
        varten).
    included_fastener_components:
      name: Mukana tulevat kiinnityskomponentit
      description: Määrittää, onko tuotteessa hakaskiinnitys, pelkät koukut, pelkät
        lenkit vai vastaava kiinnitysmenetelmä.
    included_hydration_vessel_type:
      name: Mukana toimitetun nesteytysastian tyyppi
      description: Yksilöi vyön mukana tulevan tai siihen kiinnitettävän juomasäiliön
        tyypin.
    included_items_woodwind_instrument:
      name: Mukana toimitetut tuotteet (puupuhallin)
      description: Listaa, mitkä tuotepaketteihin tavallisesti sisältyvät tuotteet
        toimitetaan bassosaksofonipaketin mukana.
    included_materials:
      name: Mukana toimitetut materiaalit
      description: Ilmaisee, mitkä komponentit sisältyvät kaavaostokseen (vain kaava
        vai kaava + materiaalit).
    included_mounting_accessories:
      name: Mukana toimitetut kiinnitystarvikkeet
      description: Luettelee kaiutinpuhelimen toimitukseen sisältyvät kiinnitys- tai
        liitäntätarvikkeet.
    included_pump_type:
      name: Mukana toimitetun pumpun tyyppi
      description: Yksilöi ilmapatjan mukana tulevan tai sisäänrakennetun pumpun tyypin.
    included_scraper_implement_type:
      name: Mukana toimitetun raaputtimen tyyppi
      description: Ilmaisee, mitkä soittovälineet toimitetaan musiikkiraaputtimen
        mukana (esim. raaputtimen keppi/tanko, vispilä).
    indicator_design:
      name: Ilmaisimen muotoilu
      description: Luokittelee tärpinilmaisimen fyysisen muodon tai tyylin.
    indicator_functions_tracked:
      name: Pelimittarin toiminnot
      description: Listaa tietyt pelin mittarit, joita laitteella voidaan seurata,
        kuten pallot, hutilyönnit, palot, vuoroparit, syöttöjen määrä, lyönnit pelialueen
        yli, syöttövuorot, pisteet tai poltot.
    indoor_outdoor_use:
      name: Sisä-/ulkokäyttö
      description: Ilmaisee, onko keilauslelu tarkoitettu sisäkäyttöön, ulkokäyttöön
        vai kumpaankin.
    inflatable_decoration_items_included:
      name: Ilmatäytteisten koriste-esineiden mukana toimitetut tuotteet
      description: Luettelee puhallettavan koristeen mukana toimitetut tärkeimmät
        lisävarusteet (esim. puhallin, kiilat, kiinnitysköydet).
    inflatable_decoration_type:
      name: Ilmatäytteisen koristeen tyyppi
      description: Määrittää puhallettavan juhlakoristeen tyypin (muoto/muototekijä)
        selaamisen ja suodattamisen helpottamiseksi.
    inflatable_raft_float_features:
      name: Ilmatäytteisen lautan/kellukkeen ominaisuudet
      description: Ilmatäytteisen lautan/kellukkeen toiminnalliset ominaisuudet.
    inflation_method_included:
      name: Täyttömenetelmä toimitetaan mukana
      description: Määrittää korjauspakkaukseen mahdollisesti sisältyvän renkaan täyttöratkaisun
        tyypin.
    infused_scent:
      name: Hajustettu
      description: Yksilöi syöttimateriaaliin imeytetyt tuoksu- tai makuaineet.
    ingredient_base_type:
      name: Ainesosapohjan tyyppi
      description: Määrittää käymisen ensisijaisen pohjan (esim. rypälemehutiiviste
        tai tuoremehu tai hedelmätiiviste).
    ingredient_physical_form:
      name: Ainesosan fyysinen olomuoto
      description: Määrittää hajusteaineosan fyysisen olomuodon (käytetään käsittelyyn,
        mittaamiseen ja muotoiluun).
    ingredient_processing_method:
      name: Ainesosien käsittelymenetelmä
      description: Määrittää ainesosaan sovelletun ensisijaisen käsittelytekniikan
        (esim. pakastekuivattu, paahdettu, hapatettu).
    ink_colors_included:
      name: Mukana toimitetut musteen värit
      description: Määrittää pakkaukseen sisältyvien leimasintyynyjen sisältämät mustevärit.
    ink_pad_application_method:
      name: Mustetyynyn käyttömenetelmä
      description: Miten muste annostellaan tai miten sitä käytetään tyynystä (perinteinen
        leimasintyyny, töpötin, sivellinkynä).
    ink_pad_permanence:
      name: Mustetyynyn pysyvyys
      description: Onko leimattu muste pysyvää ja/tai arkistokelpoista (kuivumisen
        jälkeinen haalistumisen- ja vedenkestävyys).
    ink_pad_size:
      name: Mustetyynyn koko
      description: Mustetyynyn pinnan/kotelon standardoitu koko/muototekijä.
    ink_pad_special_effects:
      name: Mustetyynyn erikoistehosteet
      description: Musteen erityiset visuaaliset/toiminnalliset tehosteet leimattaessa
        (esim. metallinen, kimalle).
    ink_permanence:
      name: Musteen pysyvyys
      description: Ilmaisee, onko kuivunut sumi-muste tarkoitettu pysyväksi vai pestäväksi/ei-pysyväksi.
    ink_preparation_required:
      name: Muste on valmisteltava
      description: Ilmaisee, onko sumi-muste käyttövalmis vai onko sitä laimennettava
        vedellä tai jauhettava ennen käyttöä.
    inline_skate_brake_type:
      name: Rullaluistinten jarrutyyppi
      description: Määrittää rullaluistinten mukana tulevan jarrukokoonpanon, kuten
        irrotettavan kantapääjarrun tai sen, ettei jarrua ole.
    inner_tent_configuration:
      name: Sisäteltan kokoonpano
      description: Määrittää sisäteltan kokoonpanon tai tyylin, esimerkiksi täysvuori,
        verkkovuori tai lämpövuori.
    innerspring_coil_type:
      name: Sisäjousen jousityyppi
      description: Määrittää patjan sisällä olevan jousitusjärjestelmän rakennetyypin,
        joka vaikuttaa tukeen, liikkeen eristämiseen ja hintaan.
    input_connector_type:
      name: Tuloliittimen tyyppi
      description: Määrittää pedaalin käyttämän audiotulon liitintyypin (yleensä 1/4
        tuuman TS).
    input_valve_type:
      name: Tuloventtiilin tyyppi
      description: Ilmaisee polkupyörän sisäkumissa tai vanteessa olevan venttiilistandardin,
        JOSTA adapteri muuntaa.
    insecticide_treatment:
      name: Hyönteisten torjunta
      description: Ilmaisee, onko verkkoa käsitelty tehtaalla hyönteismyrkyllä, ja
        jos on, niin minkä tyyppistä käsittelyä on käytetty lisäsuojana.
    insert_coverage_area:
      name: Lisää peittoalue
      description: Määrittää, minkä osan jalasta pohjallinen on suunniteltu peittämään
        (esim. täyspitkä, vain kantapää).
    insert_length_type:
      name: Tukipohjallisen pituustyyppi
      description: Ilmaisee, kuinka suuren osan jalkapohjasta holvituki kattaa.
    inside_message_type:
      name: Sisäisen viestin tyyppi
      description: Ilmaisee, painetaanko kortin sisäpuolelle valmis viesti ja onko
        se muokattavissa.
    insole_attachment_method:
