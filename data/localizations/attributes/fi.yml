    banknote_grade:
      name: Setelin luokitus
      description: Standardoitu setelin numismaattinen kuntoluokitus.
    banknote_holder_type:
      name: Setelin pidikkeen tyyppi
      description: Ilmaisee setelin fyysisen säilytysmuodon (esim. irtonainen tai
        arviointikotelossa).
    banknote_material:
      name: Setelin materiaali
      description: Setelin ensisijainen pohja/materiaali.
    banknote_security_features:
      name: Setelin turvaominaisuudet
      description: Setelin merkittävät turva-/suunnitteluominaisuudet.
    banknote_serial_number_type:
      name: Setelin sarjanumeron tyyppi
      description: Ilmaisee, onko sarjanumero olemassa ja/tai onko sillä erityistä
        merkitystä keräilyssä (ei itse numero).
    banner_display_location:
      name: Banderollin esityspaikka
      description: Määrittää banderollin aiotun sijoittelun (esim. oviaukko, seinä,
        pöydän tausta).
    banner_hanging_hardware_type:
      name: Banderollin ripustimen tyyppi
      description: Määrittää banderolliin asennetun tai sen mukana tulevan ensisijaisen
        ripustus-/kiinnityslaitteen (esim. purjerenkaat, tangon tasku, köysi).
    banner_message_type:
      name: Banderollin viestityyppi
      description: Ilmaisee, onko banderollin teksti/viesti valmiiksi painettu (kiinteä)
        vai tyhjä/muokattava.
    banner_shape:
      name: Banderollin muoto
      description: Määrittää urheilufanibanderollin yleisen muodon/leikkauksen.
    banquette_configuration:
      name: Bankettikokoonpano
      description: Banketin yleinen muoto tai tyyli.
    bar_coating:
      name: Patukan pinnoite
      description: Ilmaisee patukan syötävän pinnoitteen, jos sellainen on.
    bar_pad_style:
      name: Päällisen tyyli
      description: Patukan pehmusteen ja suojuksen muotoilu.
    bar_texture:
      name: Patukan tekstuuri
      description: Kuvaa patukan yleistä rakennetta tai purevuutta.
    barb_type:
      name: Väkästyyppi
      description: Ilmaisee, onko koukussa väkänen, ja sen tyylin.
    barbell_finish:
      name: Tangon pinta
      description: Tiedot tangon ja/tai hylsyjen suojaavasta tai esteettisestä pintakäsittelystä
