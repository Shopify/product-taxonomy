    dowel_surface_texture:
      name: Tapin pinnan tekstuuri
      description: Kuvaa tapin pintaa (esimerkiksi sileä tai uurrettu), mikä vaikuttaa
        ulkonäköön ja liiman tarttumiseen.
    drafting_compass_adjustment_mechanism:
      name: Tarkkuusharpin säätömekanismi
      description: Ensisijainen hienosäätömekanismi, jolla säde asetetaan tarkasti.
    drafting_compass_fine_adjustment_mechanism:
      name: Piirustuskompassin hienosäätömekanismi
      description: Säteen tarkkaan säätämiseen käytetty hienosäätötyyppi (jos olemassa).
    drafting_compass_lead_holder_type:
      name: Tarkkuusharpin pidiketyyppi
      description: Tämä määrittää tarkkuusharpin sisältämän tai tukeman pidiketyypin.
    drag_system_material:
      name: Vetojärjestelmän materiaali
      description: Määrittää jarrulevyjen materiaalin tai tekniikan, mikä vaikuttaa
        lämmönkestävyyteen ja tasaisuuteen.
    drag_system_type:
      name: Jarrumekanismin tyyppi
      description: Tämä ilmaisee kelassa käytetyn jarrumekanismin tyypin (esimerkiksi
        etu-, taka-, vipu-, tähti-, magneetti- tai levyjarru).
    drag_type:
      name: Jarrutyyppi
      description: Määrittää kelan käyttämän jarrumekanismin tyylin (sijainti tai
        käyttötapa).
    drawer_features:
      name: Vetolaatikon ominaisuudet
      description: Yksilöi vetolaatikoiden erityiset rakenneosat tai toiminnot (esim.
        pehmeästi sulkeutuva, huopavuorattu).
    drawer_slide_type:
      name: Vetolaatikon liukukiskotyyppi
      description: Määrittää vetolaatikon kiskojen kiinnitys- ja jatketyylin (esim.
        altapäin asennettava, kokonaan ulosvedettävä).
    drawing_ink_compatible_tools:
      name: Piirtomusteen kanssa yhteensopivat työkalut
      description: Määrittää välineet, joihin muste on tarkoitettu (esim. dippikynä
