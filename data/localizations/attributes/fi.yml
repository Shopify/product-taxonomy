    triangle_striker_material:
      name: Triangelin lyömäpuikon materiaali
      description: Mukana toimitettavan lyömäpuikon materiaali.
    trigger_input_connector:
      name: Triggerin syötön liitin
      description: Määrittää triggerin syöttöihin käytetyn fyysisen liittimen standardin
    trigger_input_connector_type:
      name: Triggerin syötön liittimen tyyppi
      description: Määrittää triggerin syötöissä käytettävän fyysisen liittimen tyypin.
    trigger_input_zone_support:
      name: Triggerin syöttövyöhykkeen tuki
      description: Ilmaisee, tukevatko triggerien syötöt yksivyöhykkeisiä ja/tai kaksivyöhykkeisiä
