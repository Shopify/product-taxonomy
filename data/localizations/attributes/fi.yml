      name: Juoksumaton osan tyyppi
      description: Tunnistaa juoksumaton osan, jonka tuote on tarkoitettu korvaamaan,
        jotta ostaja voi nopeasti varmistaa sopivuuden (esim. hihna vs. moottori).
    treadmill_position:
      name: Juoksumaton asento
      description: Ilmaisee osan asennussijainnin juoksumatolla (edessä, takana, ylempänä,
