      description: Ilmaisee, sisältyykö rumpuun lyöntikalvo ja/tai resonanssikalvot.
    drum_head_muffling_feature:
      name: Rumpukalvon äänenvaimennusominaisuus
      description: Tämä määrittää rumpukalvoon integroidut yläsävelen säätöominaisuudet.
