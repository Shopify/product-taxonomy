    dress_embellishment:
      name: Mekon koristelu
      description: Korostaa mekon koriste-elementtejä.
    dress_train_type:
      name: Mekon laahustyyppi
      description: Ilmaisee mekon laahuksen olemassaolon ja pituuden/tyylin, mikä
        kertoo mekon juhlavuudesta ja soveltuvuudesta eri tilaisuuksiin.
    dried_surface_finish:
      name: Kuivuneen pinnan ulkonäkö
      description: Kuvaa tyypillistä pinnan ulkonäköä kuivumisen jälkeen (kiilto/rakenne).
    drink_tube_insulation:
      name: Juomaputken eristys
      description: Ilmaisee, onko juomaputkessa eristys tai lämpösuoja, joka estää
        nesteen lämpenemisen tai jäätymisen.
    drive_band_cross_section_shape:
      name: Vetohihnan muoto
      description: Ilmaisee vetohihnan profiilin muodon (pyöreä, litteä jne.).
    drive_band_join_type:
      name: Vetohihnan liitostyyppi
      description: Vetohihna liitostapa/rakenne (päättymätön tai vaatii sitomisen
        jne.).
    drive_band_material_type:
      name: Vetohihnan materiaalin tyyppi
      description: Määrittää rukin vetohihnan materiaalin/tyypin.
    drive_location:
      name: Käyttömekanismin sijainti
      description: Määrittää, missä vauhtipyörä/käyttömekanismi sijaitsee crosstrainerissa,
        mikä vaikuttaa laitteen viemään tilaan ja liikkeen tuntumaan.
    drive_mechanism:
      name: Voimansiirto
      description: Määrittää voimansiirtotyypin, jolla voima siirretään polkimista
