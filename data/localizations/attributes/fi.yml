    tubing_shape:
      name: Putkiston muoto
      description: Määrittää jalustan tukiputkien poikittaisen muodon.
    tubular_construction_type:
      name: Tuubirenkaan rakennetyyppi
      description: Määrittää putkirenkaiden rakennetyypin erottaen perinteiset liimatut
