    drum_pedal_spring_adjustment_method:
      name: Rumpupedaalin jousen säätömenetelmä
      description: Ilmaisee, miten pedaalin jousen kireyttä säädetään.
    drum_pedal_spring_type:
      name: Rumpupedaalin jousen tyyppi
      description: Määrittää pedaalin palautusliikkeessä käytettävän jousimekanismin.
    drum_shell_material:
      name: Rumpujen runkomateriaali
      description: Määrittää akustisten rumpujen rungon ensisijaisen rakennusmateriaalin
