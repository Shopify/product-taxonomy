    track_set_special_features:
      name: Ratasetin erityisominaisuudet
      description: Tuo esiin ratasetin merkittäviä leikkiominaisuuksia, jotka sisältyvät
        ratasettiin perusradan ja autojen lisäksi.
    track_surface_compatibility:
      name: Radan pinnan yhteensopivuus
      description: Ilmaisee juoksupinnan(-pinnat), joille nasta tai kenkä on suunniteltu.
    tracking_aid_type:
      name: Ohjauksen lisävarustetyyppi
      description: Ilmaisee, onko kajakissa apuvälineitä, jotka parantavat suunnassa
        pysymistä.
    traction_pattern_type:
      name: Pitokuvion tyyppi
      description: Kuvaa ensisijaista pinnan uurretta tai pintakuviota, joka antaa
        laudalle pidon.
    trading_card_league:
      name: Keräilykortin liiga
      description: Ilmaisee korttisettiin liittyvän urheiluliigan tai aiheen (jos
        sovellettavissa).
    trailer_construction:
      name: Perävaunun rakenne
      description: Ilmaisee perävaunun korin ensisijaisen rakenteen (esim. alumiini,
        teräs tai sekarakenne).
    trailer_coupler_size:
      name: Perävaunun liittimen koko
      description: Määrittää vetämiseen tarvittavan perävaunun liittimen kuulan koon.
    trailer_hitch_mounting_location_method:
      name: Perävaunun vetokoukun kiinnityksen sijainti / kiinnitystapa
      description: Määrittää, mihin ja miten vetokoukku on asennettu ajoneuvoon (esim.
        taakse, eteen, runkoon, puskuriin, alustaan).
    trailer_light_function:
