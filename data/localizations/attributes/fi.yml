        ruokakulttuuri.
    riding_toy_features:
      name: Ratsastuslelun ominaisuudet
      description: Korostaa ratsastuslelujen yleisiä toiminnallisia/turvallisuusominaisuuksia.
    rifle_action_type:
      name: Kiväärin toimintatyyppi
      description: Kiväärin toimintamekanismi (sen lataaminen / laukaiseminen / hylsyn
