    bearing_seal_code:
      name: Laakerin tiivistyskoodi
      description: Ilmaisee laakerissa käytetyn tiivistystavan, joka vaikuttaa kestävyyteen
        ja vierintävastukseen.
    bearing_seal_type:
      name: Laakerin tiivistetyyppi
      description: Määrittää tiivisteen tai suojauksen rakenteen, joka suojaa laakerin
        sisäosia epäpuhtauksilta ja vaikuttaa vastukseen (esim. 2RS, ZZ, LLU, avoin).
    bearing_shield_type:
      name: Laakerikilven tyyppi
      description: Suojaus- tai tiivistystyyppi, joka suojaa laakerin sisäosia.
    bearing_size_code:
      name: Laakerin kokokoodi
      description: Standardoitu laakerimerkintä (esim. 608, 688), jossa yhdistyvät
        sisä- ja ulkohalkaisija sekä leveys.
    bearing_type:
      name: Laakerityyppi
      description: Määrittää kuulokkeissa käytettyjen laakereiden rakennetyypin.
    beater_head_material:
      name: Nuijan pään materiaali
      description: Määrittää bassorummun nuijan kontaktipinnan materiaalin (esim.
        huopa, puu, kumi).
    beaters_included:
      name: Nuijien lukumäärä
      description: Määrittää, kuinka monta nuijaa rumpupedaaliin sisältyy/asennetaan
        (esim. yksi vai kaksi nuijaa), tai sisältyykö nuija tuotteeseen.
    bed_base_type:
      name: Sängyn pohjan tyyppi
      description: Määrittää sängyn tai divaanin pohjan rakenteen (esim. tasopohja,
        jousitettu sälepohja, säädettävä).
    bed_storage_type:
      name: Sängyn säilytystyyppi
      description: Määrittää sängyn rungossa olevan säilytysmekanismin.
    bedroom_furniture_items_included:
      name: Mukana tulevat makuuhuonekalusteet
      description: Määrittää makuuhuonekalustoon kuuluvat yksittäiset huonekalut (esim.
        sänky, lipasto, yöpöydät), jolloin ostaja näkee nopeasti, mitä sisältöön kuuluu,
        ilman pitkiä kuvauksia.
    bedroom_vanity_items_included:
      name: Mukana tulevat makuuhuoneen meikkipöydän tuotteet
      description: Luettelee meikkipöydän mukana tulevat tuotteet, jotta asiakkaat
        tietävät tarkalleen, mitä toimitukseen sisältyy (esim. peili, tuoli, valaisinsarja).
    beer_based_cocktail_variety:
      name: Olutpohjainen cocktailvalikoima
      description: Luokittelee olutpohjaiset cocktailit niiden tietyn tyypin mukaan,
        esim. Radler, Shandy, Michelada.
    beet_variety:
      name: Punajuurilajike
      description: Määrittää punajuuren lajikkeen tai muunnoksen, auttaen ostajaa
        tunnistamaan maun, värin ja kulinaariset käyttötarkoitukset (esim. Red, Golden,
        Chioggia).
    bell_actuation_mechanism:
      name: Kellon käyttömekanismi
      description: Määrittää kellon soittamiseen vaadittavan toiminnon. Auttaa ostajaa
        haluamansa ergonomian valinnassa.
    bell_guard_coverage_area:
      name: Kellon suojan kattama alue
      description: Ilmaisee, mitä osaa kellosta suojus on suunniteltu suojaamaan.
    bell_material:
      name: Kellon materiaali
      description: Kellokomponentin materiaali (jos se on määritelty erikseen instrumentin
        koko materiaalista).
    bellhousing_bolt_pattern:
      name: Kellokotelon kuvio
      description: Määrittää kytkinkopan tai moottorin puoleisen pulttijaon standardin
        tai kuviosarjan, jota käytetään vaihteistokotelossa.
    bellows_material:
      name: Paljemateriaali
      description: Paljerungon/päällysteen materiaali (jos mukana).
    bellows_orientation:
      name: Palkeiden suunta
      description: Ilmaisee palkeen kokoonpanon, jolla ilmaa syötetään pilleihin.
    belly_panel_style:
      name: Palkeen tyyppi
      description: Kuvaa vyötärönauhan tai tukipaneelin, joka mukautuu kasvavaan vatsaan,
        rakennetta.
    belt_buckle_type:
      name: Vyönsoljen tyyppi
      description: Kuvaa vyössä käytetyn soljen mekanismia tai rakennetta.
    beret_style:
      name: Baretin malli
      description: Yksilöi tietyn baretin muotoilun tai kulttuurisen variaation.
    berry_species:
      name: Marjalajit
      description: Ilmaisee tuotteessa olevan marjalajin, jotta ostaja voi nopeasti
        suodattaa haluamansa marjan.
    beta_casein_variant:
      name: Beetakaseiiniversio
      description: Määrittää, mitä beta-kaseiiniproteiinin versiota (esim. A2) maidossa
        on, sellaisille kuluttajille, joilla on sen sulavuuteen liittyviä huolenaiheita.
    beverage_sweetness_level:
      name: Juoman makeusaste
      description: Luokittelee juoman lisätyn makeuttajan tai sokerin määrän mukaan.
    bezel_graduation_units:
      name: Kehyksen asteikkoyksiköt
      description: Määrittää pyörivän kehyksen yksikkömerkinnät (asteet, millit tai
        kaksoisskaala).
    bicycle_brake_set_components_included:
      name: Polkupyörän jarrusarjan osat sisältyvät mukaan
      description: Luettelee pakkauksessa olevat yksittäiset osat, jotta ostaja tietää
        tarkalleen, mitä paketti sisältää, ja voi vertailla eri tuotepakettien kokoonpanoja.
    bicycle_cage_mounting_position:
      name: Polkupyörän korin kiinnityskohta
      description: Määrittää, mihin kohtaan polkupyörää kori on tarkoitettu asennettavaksi.
    bicycle_computer_mount_placement:
      name: Polkupyörän tietokonetelineen sijainti
      description: Ilmaisee, mihin polkupyörässä tietokoneen teline asennetaan, kuten
        ohjaustangon etuosaan tai ohjainkannattimen yläosaan.
    bicycle_folding_mechanism:
      name: Polkupyörän taittomekanismi
      description: Määrittää polkupyörän rungossa käytetyn mekaanisen taittojärjestelmän
        (esim. puolitaitto, pystytaitto).
    bicycle_frame_design:
      name: Polkupyörän rungon suunnittelu
      description: Määrittää polkupyörän rungon yleisen tyylin, mikä vaikuttaa käytettävyyteen,
        kuormakapasiteettiin ja säilyttämiseen.
    bicycle_frame_style:
      name: Polkupyörän rungon malli
      description: Kuvaa pyörän rungon rakennetyyliä (esim. step-through, lowrider,
        chopper stretch), mikä vaikuttaa pyöräilijän asentoon ja estetiikkaan.
    bicycle_handlebar_type:
      name: Polkupyörän ohjaustangon tyyppi
      description: Yksilöi ohjaustangon mallin tyylin tai geometrian, mikä auttaa
        ajajia valitsemaan ajoasentoonsa ja -tyyliinsä sopivan ohjaustangon.
    bicycle_headset_configuration:
      name: Polkupyörän ohjainlaakerin kokoonpano
      description: Ilmaisee ohjainlaakerin (headset) rakenteellisen tyylin tai standardin
        kuppirakenteen perusteella (esim. ulkopuoliset kupit, ZeroStack, integroitu,
        kierteellinen).
    bicycle_hub_type:
      name: Polkupyörän navan tyyppi
      description: Kuvailee pyörän mukana toimitettavan navan mekanismin, joka vaikuttaa
        voimansiirron yhteensopivuuteen ja ajotyyliin.
    bicycle_lock_security_certification:
      name: Polkupyörän lukon turvallisuussertifiointi
      description: Riippumaton kolmannen osapuolen sertifikaatti, joka vahvistaa varkaussuojaominaisuudet
        (esim. Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Polkupyörän polkimen tyyppi
      description: Määrittää polkimen yleisen käyttö- tai rakennetavan (esim. tasopinta-,
        lukkiutuva tai hybridirakenne), mikä auttaa valitsemaan ajotyyliin sopivan
        mallin.
    bicycle_propulsion_type:
      name: Polkupyörän käyttövoimatyyppi
      description: Määrittää, miten polkupyörää liikutetaan, kuten manuaalisella polkemisella,
        sähköavusteisesti tai polttomoottorilla.
    bicycle_pump_type:
      name: Polkupyörän pumpputyyppi
      description: Yksilöi pumpun rakenteellisen mallin, mikä auttaa ostajaa valitsemaan
        ajo-, säilytys- tai hätätilannetarpeisiinsa parhaiten sopivan mallin.
    bicycle_rack_mounting_type:
      name: Polkupyörätelineen kiinnitystyyppi
      description: Kuvaa ensisijaisen menetelmän tai kiinnitystavan, jolla teline
        kiinnitetään polkupyörään, mikä auttaa käyttäjiä varmistamaan yhteensopivuuden
        rungon ja laitteiston kanssa.
    bicycle_suspension_type:
      name: Polkupyörän jousitustyypi
      description: Tunnistaa polkupyörän jousituksen olemassaolon ja kokoonpanon.
    bicycle_tire_tread_pattern:
      name: Polkupyörän renkaan kulutuspintakuvio
      description: Määrittää renkaan kulutuspinnan mallin, mikä vaikuttaa pitoon ja
        vierintävastukseen eri pinnoilla.
    bidirectional_charging_capability:
      name: Kaksisuuntainen lataus
      description: Ilmaisee, tukeeko sähköauto kaksisuuntaista lataustekniikkaa, kuten
        V2G ja/tai V2H.
    bike_rack_mounting_style:
      name: Polkupyörätelineen kiinnitystyyppi
      description: Polkupyörän tuenta/kiinnitys telineeseen.
    bike_rack_tilt_function:
      name: Pyörän rungon kallistustoiminto
      description: Onko telineessä kallistustoimintoa ja millainen se on, jotta tavaratilaan
        pääsee käsiksi telineen ollessa asennettuna.
    bikini_top_style:
      name: Bikiniyläosan malli
      description: Määrittää bikinin yläosan mallin tai leikkauksen, auttaen ostajaa
        löytämään haluamasi istuvuuden ja siluetin.
    billiard_brush_type:
      name: Biljardipöytäharjan malli
      description: Määrittelee biljardipöydän puhdistustyökalun tietyn tyylin (esim.
        pöytäharja, kiskoharja, nukanpoistaja).
    billiard_glove_finger_coverage:
      name: Biljardikäsineen sormien peitto
      description: Tunnistaa, mitkä sormet hanskan muotoilu peittää, tarjoten tarkan
        suodatuksen biljardipöytäkohtaisille hanskatyyleille.
    billiard_pocket_style:
      name: Biljardipussityyli
      description: Määrittää taskun rakenteellisen tai esteettisen tyylin, mikä vaikuttaa
        yhteensopivuuteen ja pöytäkoristeluun.
    billiard_rack_style:
      name: Biljardikeppihyllyn malli
      description: Kuvaa varastohyllyn fyysistä tyyliä tai mekanismia (esim. perinteinen
        runko, malliarkki, taitettava).
    billiard_table_type:
      name: Biljardipöydän malli
      description: Määrittää biljardipelin lajin, johon pöytä on suunniteltu (esim.
        pool, snooker, carom).
    billiards_discipline:
      name: Biljardilaji
      description: Ilmaisee tietyn biljardipelivariaation (pelityypin), johon tuote
        on tarkoitettu tai jonka kanssa se on yhteensopiva.
    binding_compatibility_standard:
      name: Kiinnityksen yhteensopivuusstandardi
      description: Yksilöi siteiden kiinnityksen (pohjan normin), jolle hiihtomono
        on sertifioitu, millä varmistetaan turvallinen ja oikea kiinnitys siteisiin.
    binding_inclusion:
      name: Myynti siteiden kanssa
      description: Määrittää, myydäänkö sukset ilman siteitä, integroidulla järjestelmällä
        vai mukana tulevilla erillisillä siteillä.
    binding_interface:
      name: Siteiden liitäntä
      description: Ilmaisee siteiden asennuslevyn tai liitännän vakiomallin, joka
        on esiasennettu suksiin tai jonka kanssa ne ovat yhteensopivia, varmistaen
        monojen/siteiden yhteensopivuuden.
    binding_liner_type:
      name: Siteen pehmustetyyppi
      description: Kuvailee siteessä/kengässä käytetyn sisävuorin mallin, (esim. irrotettava,
        käveltävä, lämpömuovattava).
    binding_mounting_system:
      name: Siteiden kiinnitysjärjestelmä
      description: Ilmaisee siteen sukseen kiinnittämiseen käytettävän liitännän (ilman
        siteitä, kisko/rata, levy jne.).
    binding_position:
      name: Sidonta-asento
      description: Merkitsee siteen aiotun kiinnitysasennon tai kokoonpanon (esim.
        monon etu-/takaosa, ARTP).
    binding_strap_position:
      name: Sidontaremmin asento
      description: Määrittää, mihin kohtaan sidettä hihna on tarkoitus asentaa.
    bingo_components_included:
      name: Mukana tulevat bingokomponentit
      description: Luettelee bingosetin mukana toimitetut komponentit, kuten bingopallot,
        kortit ja merkit.
    bingo_number_range:
      name: Bingo-numeroalue
      description: Tunnistaa setin tukeman bingonumeroinnin alueen/version.
    bingo_set_features:
      name: Bingosetin ominaisuudet
      description: Yksilöi bingosetin ensisijaisen tuoteformaatin (fyysinen/manuaalinen
        vs. sähköinen/interaktiivinen).
    bipod_mounting_interface:
      name: Bipodin kiinnitysliitäntä
      description: Määrittää kiinnitysliitännän, jolla bipod kiinnitetään ampuma-aseeseen
        tai kiskojärjestelmään.
    bit_attachment_type:
      name: Kuolaimen kiinnitystyyppi
      description: Määrittää, miten päähihna kiinnitetään kuolaimeen (esim. solmut,
        soljet, Chicago-ruuvipäät).
    bit_mouthpiece_design:
      name: Kuolaimen suukappaleen muotoilu
      description: Määrittää suukappaleen rakenteellisen tyylin tai nivelkonfiguraation,
        joka säätelee paineen jakelua, kitalaen välystä ja yleistä laatua.
    bit_ring_style:
      name: Kuolainrenkaan malli
      description: Määrittää suitsiin kiinnitettävän kuolaimen poskihihnan tai renkaan
        tyylin, vaikutustoiminnon, sivuttaisohjauksen ja ohjien tuntuman.
    bladder_material:
      name: Rakon materiaali
      description: Yksilöi ilmatäytteisen sisäisen rakon materiaalin.
    blade_attachment_type:
      name: Terän liitostyyppi
      description: Yksilöi, käytetäänkö luistimessa saranoitua mekanismia vai kiinteää
        teräkiinnitystä.
    blade_finish_coating:
      name: Terän viimeistely/pinnoite
      description: Terään levitetään pintakäsittely esteettisistä tai korroosiosuojaussyistä.
    blade_hosel_type:
      name: Mailanpään liitoskohdan tyyppi
      description: Määrittää terän liitostavan, mikä vaikuttaa yhteensopivuuteen (esim.
        vakio tai kartiomainen).
    blade_length_type:
      name: Terän pituustyyppi
      description: Luokittelee räpylän evän pituuden lyhyeksi, keskipitkäksi tai pitkäksi,
        joista jokainen vaikuttaa potkutiheyteen ja harjoitustavoitteisiin.
    blade_lie:
      name: Lavan kulma
      description: Määrittää jääkiekkomailan lavan kulman ilmaisten, miten maila on
        jäällä suhteessa varteen.
    blade_sharpness:
      name: Lavan terävyys
      description: Ilmaisee, onko aseen terä teroitettu vai tylsytetty harjoittelua
        varten.
    blade_size_category:
      name: Terän kokoluokka
      description: Standardoitu kansainvälinen sapeliterän koko -koodi (0–5), jota
        käytetään nuorten ja aikuisten terien erottamiseen.
    blade_size_class:
      name: Terän kokoluokka
      description: Luokittelee lavan pelaajan kokomäärityksen mukaan vastaamaan varren
        kokoa, kuten Youth, Junior, Intermediate tai Senior.
    blade_size_number:
      name: Lavan kokonumero
      description: Miekkailumääräysten mukainen vakiomuotoinen numeerinen koko-koodi
        (0–5), joka määrittää terän pituuden ja ikäryhmäkelpoisuuden.
    blaster_mechanism:
      name: Blasterin toimintamekanismi
      description: Määrittää gel blasterin sisäisen toimintamekanismin (esim. GBB,
        AEG, jousi).
    block_edge_style:
      name: Lohkon reunan tyyli
      description: Kuvailee, miten puupalikoiden reunat/kulmat on viimeistelty tuntuman
        ja turvallisuuden takaamiseksi.
    blocking_mat_features:
      name: Pingotusmaton ominaisuudet
      description: Pingotusmattojen erityisominaisuudet (säilytys, kannettavuus, käytettävyys).
    blocking_mat_grid_unit:
      name: Pingotusmaton ruudukon yksikkö
      description: Tulostetussa ruudukossa käytetty yksikköjärjestelmä, joka auttaa
        käyttäjiä yhdistämään kuviot mittoihin.
    blocking_mat_surface_markings:
      name: Pingotusalustan pintamerkinnät
      description: Maton pintaan painettujen tai muovattujen mittaus-/opasmerkintöjen
        yksikkö.
    blocking_wire_coating:
      name: Pingotuslangan pinnoite
      description: Pingotuslangan pintakäsittely tai pinnoite, joka vaikuttaa ruosteenestoon,
        sileyteen ja langantarttumisriskiin.
    blocking_wire_end_cap_type:
      name: Pingotuslangan päätytulpan tyyppi
      description: Määrittää pingotuslangan päissä käytettävän suojan tai viimeistelyn
        tyypin, joka takaa turvallisuuden ja suojaa neuletta.
    blocking_wire_set_includes:
      name: Pingotuslankasarja sisältää
      description: Määrittää, mitkä osat kuuluvat pingotuslankatuotteeseen (esim.
        T-neulat, säilytysputki).
    blocking_wire_usage:
      name: Pingotuslangan käyttö
      description: Ensisijainen käyttötarkoitus, johon joustava pingotuslanka on suunniteltu.
    bloom_stage:
      name: Kukintavaihe
      description: Ilmaisee, kuinka auki päivänkakkaran kukat ovat toimitus-/lähetyshetkellä.
    blower_motor_bearing_type:
      name: Puhaltimen moottorin laakerointityyppi
      description: Määrittää puhaltimen moottorissa käytetyn laakerirakenteen.
    blower_motor_mounting_position:
      name: Puhaltimen moottorin asennussijainti
      description: Mihin puhaltimen moottori on asennettu LVI-moduuliin/ajoneuvoon
        (esim. eteen, taakse).
    blowpipe_valve_type:
      name: Puhallusputken venttiilin tyyppi
      description: Määrittää puhallusputken mallin (jos sellainen on).
    bo_staff_style:
      name: Bo-sauvan tyyli
      description: Määrittää sauvan mallin tai rakenteen (esim. suora, kapeneva, vaahtomuovipehmustettu,
        kokoontaitettava).
    board_game_theme:
      name: Lautapelin teema
      description: Lautapelin tarinaan tai maailmaan liittyvä teema (käytetään löytämiseen
        ja selaamiseen).
    board_rail_shape:
      name: Laudan kantin muoto
      description: Määrittää laudan reunojen muodon (esim. pyöreä, terävä, 50/50),
        joka vaikuttaa laudan hallintaan ja kulkuun aallolla.
    board_size_classification:
      name: Laudan kannen kokoluokitus
      description: Luokittelee cornhole-laudan tai -setin yleisiin standardoituihin
        kokoihin.
    board_type_compatibility:
      name: Lautatyypin yhteensopivuus
      description: Määrittää laudan tyypin, jolle hihna on suunniteltu.
    boat_construction_type:
      name: Veneen rakennetyyppi
      description: Kuvaa soutuveneen rakennetta tai muotoa (esim. ilmatäytteinen,
        jäykkä).
    boat_hook_flotation:
      name: Venehaan kellunta
      description: Ilmaisee, onko venekoukku suunniteltu kellumaan, jos se putoaa
        veteen.
    boat_ladder_stowage_style:
      name: Venetikkaiden säilytystyyli
      description: Ilmaisee, miten tikkaat varastoidaan, kun niitä ei käytetä (esim.
        kokoontaitettavat, sisäänvedettävät, irrotettavat).
    boat_trailer_construction_type:
      name: Venetrailerin rakennetyyppi
      description: Ilmaisee, tukeeko perävaunu venettä pitkittäispalkeilla, rullilla
        vai hybridijärjestelmällä.
    boat_weaving_shuttle_weft_exit_type:
      name: Sukkulan kuteen ulostulotyyppi
      description: Tapa, jolla kudelanka tulee ulos sukkulasta kudonnan aikana.
    bobbin_loading_type:
      name: Puolan asennustapa
      description: Määrittää, miten puola asetetaan/ladataan ompelukoneeseen.
    bobbin_system:
      name: Puolajärjestelmä
      description: Ompelukoneen käyttämä puolan asennusjärjestelmä/-tapa.
    bobbin_type:
      name: Puolatyyppi
      description: Määrittää langanohjaimen muodon, jota sukkula on suunniteltu käyttämään
        (tai jonka se sisältää). Tämä määrittää yhteensopivuuden ja tyypillisen käytön
        (esim. venesukkulat käyttävät usein puolia; räsysukkulat voivat olla avoimia
        kuderäsyjä varten).
    bobbin_winder_winding_direction:
      name: Puolauslaitteen pyörimissuunta
      description: Määrittää puolauslaitteen tukeman puolaus- tai pyörimissuunnan.
    bobble_mechanism:
      name: Heiluripään mekanismi
      description: Määrittää heiluripään mekanismin tyylin, joka vaikuttaa liikkuvuuteen
        ja kestävyyteen.
    bocal_material:
      name: S-putken materiaali
      description: Määrittää mukana toimitettujen s-putkien materiaalin.
    bodhr_n_head_material:
      name: Bodhránin kalvon materiaali
      description: Soittokalvon materiaali (kalvo), jolla on suuri vaikutus sointiin
        ja huoltotarpeisiin.
    bodhr_n_tuning_system_type:
      name: Bodhrán-rummun viritysjärjestelmän tyyppi
      description: Kalvon kireyden säätämiseen (jos viritettävä) käytettävän sisäänrakennetun
        viritysmekanismin malli.
    body_armor_coverage_area:
      name: Pohjapanssarin peittämä alue
      description: Ilmaisee, mitä kehon osia tuote suojaa.
    body_armor_intended_use:
      name: Pohjapanssarin käyttötarkoitus
      description: Määrittää ensisijaisen ajo- tai käyttötilanteen, johon mönkijän/UTV:n
        pohjapanssari on suunniteltu.
    body_cord_connector_style:
      name: Vartalojohdon liitintyyppi
      description: Kuvailee johdon päiden liitinkonfiguraation (esim. piikkien määrä
        tai bajonettikiinnitys), joka määrittää yhteensopivuuden aseiden ja pisteytyslaitteiden
        kanssa.
    body_panel_finish_state:
      name: Koripaneelien viimeistelyn tila
      description: Kuvaa neljännespaneelin pintakäsittelyn tai viimeistelyn tilaa
        myyntihetkellä maalausta tai asennusta varten.
    body_shape:
      name: Rungon muoto
      description: Määrittää sähkökitaran rungon muodon/tyylin.
    bodysuit_bottom_coverage:
      name: Bodyn alaosan peitto
      description: Määrittää rungon alaosan leikkauksen ja peittävyyden, mikä vaikuttaa
        mukavuuteen ja asusteiden yhteensopivuuteen.
    boilie_shape:
      name: Boilie-stopparin muoto
      description: Ilmaisee kierityspöydän tuottamien boilie-pallojen muodon, jotta
        kalastajat voivat valita eri boilie-profiilien välillä.
    boilie_stop_buoyancy:
      name: Boilie-stopparin kelluvuus
      description: Määrittää, onko boilie-stoppari suunniteltu kellumaan, uppoamaan
        vai pysymään neutraalisti kelluvana, mikä vaikuttaa syötin pystysuuntaiseen
        esiintymiseen vedessä.
    bok_choy_variety:
      name: Paksoilajike
      description: Määrittää paksoin lajikkeen, kauppanimen tai muunnoksen (esim.
        Baby, Shanghai, Nai Bai, Tatsoi, Purple Lady), jolloin ostaja voi valita halutun
        maun, koostumuksen ja ulkonäön.
    bolt_drive_style:
      name: Pulttikiinnitys
      description: Määrittää rullalaudan kiinnityspulttien käyttötavan ja erottaa
        toisistaan yleisimmät ruuvikantatyypit, kuten kuusiokolo- tai ristipääruuvit.
    bone_content:
      name: Luusisältö
      description: Määrittää, sisältääkö liha luita.
    bongo_center_block_material:
      name: Bongorumpujen keskiosan materiaali
      description: Kahden bongorummun kuoren yhdistävän keskimmäisen lohkon materiaali
        (jos sovellettavissa).
    bongo_shell_material:
      name: Bongojen runkomateriaali
      description: Bongorumpujen rungon materiaali, lukuun ottamatta kalvoja ja laitteistoa.
    bongo_tuning_system:
      name: Bongojen viritysjärjestelmä
      description: Bongojen viritys/rakenne viritystä varten (esim. perinteinen korvakeviritys
        vs. köysiviritys), mikä vaikuttaa huoltamiseen ja autenttiseen ulkonäköön.
    boning_type:
      name: Tukiluiden tyyppi
      description: Yksilöi vyötärökorsetin sisäisen tukirakenteen, jossa yhdistyvät
        tukiluiden materiaali sekä tyyli/muoto. Tämä vaikuttaa suoraan tuen määrään,
        joustavuuteen ja kestävyyteen.
    boot_liner_type:
      name: Saappaanvuorauksen tyyppi
      description: Kuvaa lumilautamonon sisävuorin rakennetta tai mukauttamisen ominaisuutta
        (esim. lämmöllä muovattava, irrotettava).
    boot_sole_compatibility:
      name: Monon pohjan yhteensopivuus
      description: Luettelee monon pohjastandardit (normit) tai yhteensopivuusjärjestelmät,
        jotka käyvät siteeseen.
    boot_support_level:
      name: Käynnistystuen taso
      description: Kuvaa luistimen antamaa nilkan tai kengän yleistä jäykkyyttä/tukiluokitusta.
    boot_width_code:
      name: Saappaan leveyskoodi
      description: Valmistajan kirjaimiin perustuva leveysmerkintä, jota käytetään
        erityisesti taitoluistinten mitoituksessa (esim. AAA, AA, B, C, D).
    booth_configuration:
      name: Kopin kokoonpano
      description: Määrittää kopin yleisen istumapaikkakokoonpanon (esim. yksipuolinen,
        kulma, modulaarinen).
    bootie_toe_design:
      name: Tossun kärjen muotoilu
      description: Ilmaisee surffitossujen ja riuttakenkien kärkirakenteen.
    border_type:
      name: Reunuksen tyyppi
      description: Brodeeratun merkin reunan viimeistely/reunuksen tyyli (vaikuttaa
        ulkonäköön, rispaantumiskestävyyteen ja koettuun laatuun).
    bore_cleaner_format:
      name: Porausreiän puhdistusaine
      description: Ilmaisee reiänpuhdistuslaitteen fyysisen muodon (työkalu vs. kulutusosa).
    bore_cleaner_safe_for_finish:
      name: Porausreiän puhdistusaine sopii viimeistelyyn
      description: Osoittaa, minkä yleisten vaskipuhaltimien pintakäsittelyjen kanssa
        putkipuhdistusainetta on turvallista käyttää.
    bottle_cage_loading_direction:
      name: Pullotelineen lastaussuunta
      description: Kuvaa suunnan, jossa pullo asetetaan häkkiin tai poistetaan siitä.
    bottle_neck_finish_closure_size:
      name: Pullonkaulan viimeistely / sulkimen koko
      description: Standardisoitu pullon suun tai kaulan koko, jolla varmistetaan
        yhteensopivuus korkkien, tulppien ja korkittajien kanssa (esim. 26 mm kruunukorkkisuu).
    bottle_style:
      name: Pullotyyli
      description: Yleisiä pullomuotoja, joita käytetään kotioluen valmistuksessa
        ja viininvalmistuksessa.
    bottom_bracket_interface:
      name: Keskiön tyyppi
      description: Yksilöi akselin tai keskiön standardin, jolle kampi on suunniteltu,
        mikä varmistaa yhteensopivuuden rungon ja keskiölaakerin kanssa.
    bottom_bracket_standard:
      name: Keskiölaakerin vakio
      description: Rungon tukema keskiömuhvin tyyppi/standardi, joka määrittää kampisarjan
        yhteensopivuuden.
    bottom_type_suitability:
      name: Pohjatyypin soveltuvuus
      description: Määrittää merenpohjan olosuhteen, jossa ankkuri on suunniteltu
        pysymään parhaiten.
    bounce_level:
      name: Kimmoisuustaso
      description: Ilmaisee, kuinka paljon pallo ponnahtaa takaisin pudottamisen tai
        heiton yhteydessä auttaen käyttäjiä valitsemaan oikean pallon harjoituksiin,
        kuten seinäheittoihin tai läimäytyksiin.
    bouncy_ball_surface_finish:
      name: Pomppupallon pinnan viimeistely
      description: Määrittää pomppupallon tunto- ja/tai visuaalisen pinnan viimeistelyn
        (esim. sileä, piikikäs, kimalteleva).
    boundary_marker_type:
      name: Rajamerkin tyyppi
      description: Määrittää kentän tai radan rajamerkinnän tai merkintätuotteen fyysisen
        muodon (esim. kartio, teippi, maali, sapluuna, kone).
    bouquet_size_tier:
      name: Kukkakimpun kokoluokka
      description: Kukkakimpun tai -nipun standardoitu kokoluokka varsien määrästä
        riippumatta (hyödyllinen silloin, kun kimppu koostuu eri kukkalajeista).
    bow_and_yo_yo_edge_finish:
      name: Rusetin ja jojokoristeen reunan viimeistely
      description: Kuvailee rusetissa tai jojokoristeessa käytettyä reunan tai trimmauksen
        viimeistelyä (erityisesti nauhamaisissa ruseteissa).
    bow_case_shell_type:
      name: Jousilaukun kuoren tyyppi
      description: Kuvailee jousilaukun ulkokuoren rakennetta (esim. kova salkku vs.
        pehmeä laukku).
    bow_compatibility:
      name: Jousen yhteensopivuus
      description: Määrittää jousityypin, jolle leikkaava nuolenkärki on tarkoitettu
        tai jonka voimakkuutta se on suunniteltu kestämään.
    bow_hair_color:
      name: Rusetin hiusväri
      description: Yksilöi orkesterijousisoittimen jousessa käytettyjen jouhien värin/ulkonäön
        (esim. valkoinen/valkaistu, luonnonvalkoinen, musta).
    bow_stick_material:
      name: Jousen kepin materiaali
      description: Ilmaisee jousen kepin (pääakselin) materiaalin, jolla on suuri
        vaikutus painoon, tuntumaan ja hintaan.
    bow_type:
      name: Jousityyppi
      description: Määrittää nuorten jousen rakenteellisen mallin (esim. taljajousi,
        vastakaarijousi, pitkäjousi), mikä vaikuttaa voimakkaasti ampumatyyliin, tarvittaviin
        lisävarusteisiin ja harjoitusohjelmiin.
    bow_winding_material:
      name: Jousen langan materiaali
      description: Määrittää jousen kääreen tai päällysteen materiaalin, joka vaikuttaa
        otteeseen ja tasapainoon.
    bow_yo_yo_embellishment_style:
      name: Rusetti-/jojo-koristelutyyli
      description: Yksilöi koristeen valmistustyylin (rusetti tai kangasjojo).
    bowling_ball_core_type:
      name: Keilapallon ytimen tyyppi
      description: Tunnistaa keilapallon sisäisen ytimen rakenteen tai symmetrian,
        joka vaikuttaa pallon liikkeeseen ja kaarrepotentiaaliin.
    bowling_ball_coverstock_type:
      name: Keilapallon kuorimateriaali
      description: Määrittää keilapallon ulkokuoren materiaalin tai tekniikan, joka
        sanelee pidon ja kierrepotentiaalin.
    bowling_set_style:
      name: Keilailuvälinetyyppi
      description: Määrittää keilailuvälineiden yleisen tyylin tai käytön.
    box_lid_type:
      name: Laatikon kannen tyyppi
      description: Lahjalaatikon tai -purkin kansi/avausmekanismi.
    box_spring_profile:
      name: Joustinpatjan profiili
      description: Luokittelee joustinpatjan kokonaiskorkeuden ostajaystävällisiin
        profiililuokkiin (esim. matala profiili, vakio, korkea profiili), jotta asiakkaat
        voivat suodattaa nopeasti tietämättä tarkkoja mittoja.
    box_spring_requirement:
      name: Joustinpohjan vaatimus
      description: Ilmaisee, tarvitaanko patjaan lisäjoustinpatja tai pohjarakenteen.
    boxing_ring_style:
      name: Nyrkkeilykehän malli
      description: Luokittelee kehän yleisen rakennetyylin tai suunnitellun käyttötarkoituksen
        (esim. kilpakehä vs. harjoituskehä, korotettu kehä vs. lattiatason kehä).
    bra_length_type:
      name: Rintaliivien pituustyyppi
      description: Määrittelee rintaliivien pituusluokituksen pystysuuntaisen peittävyyden
        perusteella, kuten normaali, pitkä, midi tai lyhyt helma.
    bra_padding_type:
      name: Rintaliivien toppauksen tyyppi
      description: Kuvaa reunatäytteen määrää tai läsnäoloa kupeissa.
    braces_compatibility:
      name: Oikomiskojeen yhteensopivuus
      description: Määrittää, voidaanko hammassuojaa käyttää oikomishoidon oikomiskojeiden
        kanssa ja missä määrin.
    brake_band_form:
      name: Jarrunauhan muoto
      description: Ilmaisee, toimitetaanko jarrunauha jatkuvana silmukkana (päättömänä)
        vai katkaistuna pituutena, joka on kiinnitettävä itse.
    brake_band_material_type:
      name: Jarrunauhan materiaalityyppi
      description: Määrittää jarrunauhan toiminnallisen materiaalin (esim. puuvillanaru
        vs. nailonsiima vs. jousiteräs), joka vaikuttaa kestävyyteen, pitoon, venyvyyteen
        ja kohinaan.
    brake_band_style:
      name: Jarrunauhan tyyli
      description: Määrittää rukin jarrunauhan kireydensäätöjärjestelmän tai -tyypin,
        jota käytetään lyhdyn tai puolan jarrutukseen.
    brake_bleeding_method:
      name: Jarrujen ilmausmenetelmä
      description: Sarjan tukema ilmaustekniikka.
    brake_booster_assist_type:
      name: Jarrutehostimen avustustyyppi
      description: Ilmaisee jarrutehostimen käyttämän avustusmekanismin.
    brake_booster_diaphragm_configuration:
      name: Jarrutehostimen kalvon kokoonpano
      description: Ilmaisee tehostinlaitteessa käytettyjen kalvojen lukumäärän/tyypin.
    brake_caliper_bleeder_screw_position:
      name: Jarrusatulan ilmausruuvin asento
      description: Määrittää ilmausruuvin sijainnin jarrusatulassa asennettuna (käytetään
        varmistamaan, että ilmausruuvi on korkeimmassa kohdassa oikean ilmauksen varmistamiseksi).
    brake_caliper_finish:
      name: Jarrusatulan viimeistely
      description: Määrittää jarrusatulan rungon pinnan viimeistelyn tai suojapinnoitteen
        (esim. maali, pinnoitus, anodisointi).
    brake_caliper_included_hardware:
      name: Jarrusatula sisällytettynä laitteena
      description: Määrittää, mitä jarrusatulan kokoonpano sisältää.
    brake_caliper_mount_type:
      name: Jarrusatulan kiinnitystyyppi
      description: Jarrusatulan kiinnitystapa, jolla satula kiinnitetään olka-akseliin
        tai kannattimeen.
    brake_caliper_paint_base_chemistry:
      name: Jarrusatulan maalipohjan kemia
      description: Käytetty maali-/hartsijärjestelmä tai kemikaaliryhmä.
    brake_caliper_paint_kit_contents:
      name: Jarrusatulan maalipakkauksen sisältö
      description: Ilmaisee, mitä pakkaukseen sisältyy maalin lisäksi.
    brake_circuit_type:
      name: Jarrupiirin tyyppi
      description: Pääsylinterin tukema hydraulipiirin kokoonpano.
    brake_clutch_fluid_base_chemistry:
      name: Jarru-/kytkinnesteen kemiallinen koostumus
      description: Jarru-/kytkinhydrauliikkanesteen ensisijainen kemiallinen koostumus,
        joka vaikuttaa yhteensopivuuteen ja sekoitettavuuteen.
    brake_clutch_fluid_dot_specification:
      name: Jarru-/kytkinneste DOT-luokitus
      description: DOT-luokitus hydraulisille jarru-/kytkinnesteille (esim. DOT 3,
        DOT 4).
    brake_drum_finish_coating:
      name: Jarrurummun viimeistely/pinnoite
      description: Jarrurumpuun tehty pintaviimeistely tai suojapinnoite (esim. e-coat
        / elektroforeettinen pinnoitus, maalattu, sinkitty).
    brake_drum_type:
      name: Jarrurummun tyyppi
      description: Jarrurummun rakennetyyppi (integroidulla navalla/laakerilla tai
        ilman).
    brake_fluid_base:
      name: Jarrunesteen koostumus
      description: Määrittää vaaditun tai mukana tulevan hydraulijarrunesteen koostumuksen.
    brake_fluid_base_chemistry:
      name: Jarrunesteen peruskemia
      description: Määrittää jarrunesteen kemiallisen perustan, joka ratkaisee yhteensopivuuden
        ja sekoitusohjeet.
    brake_fluid_dot_specification:
      name: Jarrunesteen DOT-luokitus
      description: Ilmaisee jarrunesteen DOT-luokituksen/spesifikaation (esim. DOT
        3, DOT 4) jarrunestetuotteille.
    brake_fluid_standards_compliance:
      name: Jarrunesteiden standardien noudattaminen
      description: Toimialastandardit, jotka jarruneste ilmoittaa täyttävänsä (DOT-luokituksen
        lisäksi).
    brake_fluid_type:
      name: Jarrunesteen tyyppi
      description: Määrittää polkupyörän hydraulisten jarrusatuloiden vaatiman jarrunesteen.
    brake_hose_end_fitting_type:
      name: Jarruletkun pään liittimen tyyppi
      description: Liitäntätyyppi jarruletkun kummassakin päässä (esim. banjo, kartioliitin,
        sisä-/ulkokierre), jota käytetään varmistamaan yhteensopivuus jarrusatuloiden
        ja jarruputkien kanssa.
    brake_lever_pull_type:
      name: Jarruvivun vetotyyppi
      description: Määrittää vivun vaijerin vetosuhteen tai mekaniikan, joka varmistaa
        yhteensopivuuden tiettyjen jarrusatuloiden kanssa (esim. lyhyen vedon vannejarrut
        verrattuna pitkän vedon V-jarruihin).
    brake_light_switch_actuation_type:
      name: Jarruvalokatkaisimen aktivoinnin tyyppi
      description: Yksilöi, mitkä fyysiset tapahtumat aktivoivat kytkimen (poljin/mäntä
        vs. hydraulinen paine jne.).
    brake_light_switch_connector_type:
      name: Jarruvalokatkaisimen liittimen tyyppi
      description: Määrittää sähköliittimen tyypin tai muodon, jota käytetään jarruvalokatkaisimen
        kytkemiseen ajoneuvon johdinsarjaan.
    brake_light_switch_contact_type:
      name: Jarruvalokatkaisimen kontaktityyppi
      description: Jarruvalokytkimen sähköinen kosketinkonfiguraatio tai toimintatapa
        (esim. sulkeutuva/avautuva, vaihtokosketin tai monipiirinen).
    brake_light_switch_mounting_style:
      name: Jarruvalon kytkimen asennustapa
      description: Jarruvalokatkaisimen asennustapa ajoneuvoon tai jarrujärjestelmään
        (esim. ketju, klipsikiinnitys, telinekiinnitys, banjo).
    brake_master_cylinder_mounting_type:
      name: Pääjarrusylinterin kiinnitystyyppi
      description: Pääsylinterin kiinnitys ajoneuvoon/jarrutehostimeen (pulttijako
        / laippamalli).
    brake_master_cylinder_reservoir_type:
      name: Pääjarrusylinterin nestesäiliön tyyppi
      description: Pääsylinterin nesteyttämän tai vaatiman jarrunestesäiliön tyyppi/kokoonpano.
    brake_mount_type:
      name: Jarrun kiinnitystyyppi
      description: Tunnistaa haarukkaan sisäänrakennetun jarruliitännän, jotta ajajat
        voivat varmistaa jarrujärjestelmän yhteensopivuuden.
    brake_mounting_flange_bolt_pattern:
      name: Jarrun kiinnityslaipan pulttijako
      description: Määrittää kiinnityslaipan reikä-/pulttijaon, jota käytetään jarrulevyn
        tai jarrusatulan kiinnikkeen kiinnittämiseen perävaunun akseliin (esim. 4
        pulttia).
    brake_pad_backing_plate_material:
      name: Jarrupalojen taustalevyn materiaali
      description: Määrittää jarrupalan taustalevyn materiaalin, mikä vaikuttaa lämmön
        haihtumiseen ja painoon.
    brake_pad_compatible_rotor_type:
      name: Jarrupalojen kanssa yhteensopiva roottorityyppi
      description: Määrittää roottorin/levyn pinnan tyypin, jonka kanssa jarrupala
        on suunniteltu toimimaan.
    brake_pad_compound:
      name: Jarrupalayhdiste
      description: Yksilöi jarrupalan kitkamateriaalin koostumuksen (reseptin).
    brake_pad_form_factor:
      name: Jarrupalojen muotokerroin
      description: Määrittää jarrujärjestelmän/muodon, johon jarrupala on suunniteltu
        (esim. levy, rumpu, seisontajarru).
    brake_pad_material:
      name: Jarrupalojen materiaali
      description: Määrittää jarrupalojen päällysteessä käytetyn kitkayhdisteen/materiaaliperheen.
    brake_pad_shim_included:
      name: Mukana tuleva jarrupalojen simmilevy
      description: Ilmaisee, sisältyvätkö melunvaimennuksen simmilevyt toimitukseen
        tai onko ne kiinnitetty valmiiksi.
    brake_pad_wear_indicator_type:
      name: Jarrupalojen kulumisen ilmaisimen tyyppi
      description: Ilmaisee, minkä tyyppinen kulumisenilmaisin jarrupaloihin kuuluu
        (esim. mekaaninen kulumisenilmaisin tai elektroninen anturi).
    brake_position:
      name: Jarruasento
      description: Osoittaa, mihin ajoneuvoon jarrukomponentti on tarkoitus asentaa.
    brake_rotor_mount_type:
      name: Jarrulevyn kiinnitystyyppi
      description: Määrittää jarrulevyn napaan kiinnittämiseen käytettävän liitännän
        (jos sovellettavissa).
    brake_service_kit_components_included:
      name: Jarrujen huoltopakkauksen sisältyvät osat
      description: Luettelo jarruhuoltopakkaukseen sisältyvistä työkaluista/sovittimista/kulutustarvikkeista.
    brake_shoe_friction_material:
      name: Jarrukengän kitkamateriaali
      description: Jarrukengässä (rumpua koskettavassa materiaalissa) käytetty kitka-/päällysteyhdiste.
    brake_shoe_set_contents:
      name: Jarrukenkäsarjan sisältö
      description: Mitä pakettiin sisältyy (esim. pelkät kengät vs. kengät plus laitteisto/jouset)?
    brake_system_type:
      name: Jarrujärjestelmän tyyppi
      description: Määrittää jarrutusmekanismin tekniikan, jota käytetään puolan pyörimisnopeuden
        hallintaan heiton aikana.
    brake_type:
      name: Jarrutyyppi
      description: Loimen jarrun tai kireydensäätömekanismin tyyppi.
    brandy_age_classification:
      name: Brandyn ikäluokitus
      description: Luokittelee brandyn toimialastandardien mukaisten laatu- ja ikämerkintöjen
        (esim. VS, VSOP, XO) perusteella, jotka kertovat tuotteen vähimmäiskypsytysajasta.
    brass_cleaning_tool_type:
      name: Vaskipuhdistustyökalun tyyppi
      description: Määrittää vaskipuhaltimien puhdistukseen tai huoltoon käytetyn
        työkalun tyypin.
    brass_instrument_application_area:
      name: Vaskipuhaltimen käyttöalue
      description: Vaskipuhaltimen osa(t), joihin desinfiointisuihketta on tarkoitus
        käyttää.
    brass_instrument_care_kit_purpose:
      name: Vaski-instrumenttien hoitopakkauksen käyttötarkoitus
      description: Kuvailee sarjan suunnitellun käyttötilanteen tai -tarkoituksen
        (esim. rutiinihuolto, syväpuhdistus, matka-/hätätilanne, opiskelijan aloitussarja
        jne.).
    brass_instrument_case_shell_material:
      name: Vaskipuhaltimien kotelon materiaali
      description: Jäykän rungon tai kuoren päämateriaali (jos sovellettavissa) erotuksena
        laukun tai kotelon yleisestä materiaalista.
    brass_instrument_lubricant_additives_features:
      name: Vaskipuhaltimien voiteluaineiden lisäaineet/ominaisuudet
      description: Voiteluaineen koostumuksen merkittävät toiminnalliset ominaisuudet.
    brass_instrument_lubricant_base_composition:
      name: Vaskipuhaltimien voiteluaineen peruskoostumus
      description: Vaskipuhaltimien voiteluaineiden ensisijainen voiteluainepohja/kemia.
    brass_instrument_lubricant_viscosity_grade:
      name: Vaskipuhaltimien voiteluaineen viskositeettiluokka
      description: Vaskipuhaltimille tarkoitetun voiteluaineen suhteellinen paksuus/virtaavuus.
    brass_instrument_replacement_part_type:
      name: Vaskipuhaltimen varaosan tyyppi
      description: Määrittää, minkä tyyppinen vaskipuhaltimen varaosa on kyseessä
        (venttiili-, luisti- tai sylkiventtiilikomponentit, korkit/huovat, suojat
        jne.).
    brass_instrument_valve_configuration:
      name: Vaskipuhaltimen venttiilikokoonpano
      description: Tapa, jolla soitin muuttaa sävelkorkeutta (venttiili/liukumekanismi).
    brass_lubricant_application_area:
      name: Vaskipuhaltimen voiteluaineen käyttöalue
      description: Vaskipuhallinmekanismi, jolle voiteluaine on tarkoitettu.
    brass_mouthpiece_backbore:
      name: Messinkinen suukappaleen takaporaus
      description: Suukappaleen takaosan profiili/kategoria (takaporauksen muoto/koko),
        mikä vaikuttaa ääneen ja intonaatioon.
    brass_mouthpiece_cup_depth:
      name: Messinkisen suukappaleen kupin syvyys
      description: Suukappaleen kupin syvyysluokitus (kuinka syvä kuppi on), mikä
        vaikuttaa ääneen ja vasteeseen.
    brass_polishing_cloth_abrasiveness_level:
      name: Messinginkillotusliinan hankausaste
      description: Ilmaisee, kuinka tehokas liina on tummumisen poistamisessa verrattuna
        siihen, kuinka tehokas se on hellävaraisessa kiillotuksessa.
    bread_crumb_base_ingredient:
      name: Korppujauhon pääraaka-aine
      description: Ilmaisee korppujauhon pääainesosan, kuten vehnä, riisi, siankamara
        tai manteli.
    bread_variety:
      name: Leivän lajike
      description: Määrittää leivän tai sämpylän tyypin tai lajikkeen, mikä auttaa
        ostajia löytämään tietyt tuotetyypit (esim. briossi, patonki, naan-leipä).
    breadstick_style:
      name: Leipätikkutyyppi
      description: Määrittää leipätikun erityisen perinteisen tyypin tai muodon.
    bridge_head_material:
      name: Kepin restin materiaali
      description: Materiaali, jota on käytetty yksinomaan apukepin restissä ja joka
        vaikuttaa sen painoon, tuntuun sekä kestävyyteen.
    bridge_head_type:
      name: Sillan pään tyyppi
      description: Yksilöi restin tyylin, mikä auttaa ostajaa valitsemaan haluamansa
        apukepin restin.
    bridle_part_type:
      name: Suitsien osan tyyppi
      description: Yksilöi suitsien osan, jota varaosa edustaa, mikä auttaa asiakkaita
        löytämään juuri tarvitsemansa osan.
    bridle_style:
      name: Suitsien tyyli
      description: Luokittelee suitsien yleisen tyylin tai rakenteen, jotta ratsastajat
        voivat nopeasti löytää tarpeisiinsa tai lajiinsa sopivat varusteet.
    broadhead_field_point_attachment_style:
      name: Leikkaavan kärjen / taulukärjen kiinnitystapa
      description: Määrittää, miten leveä kärki tai kenttäkärki kiinnittyy nuolen
        varteen.
    broadhead_thread_size:
      name: Leikkaavan kärjen kierteen koko
      description: Luettelee kierremäärityksen, jota käytetään leikkaavan kärjen tai
        taulukärjen kiinnittämiseen nuolen inserttiin tai varteen.
    broadhead_tip_type:
      name: Leikkaavan kärjen malli
      description: Määrittää leikkaavan kärjen tai holkin tyypin, joka aloittaa tunkeutumisen
        ja vaikuttaa suorituskykyyn eri riistalajeilla.
    broccoli_cut:
      name: Parsakaalin leikkuutapa
      description: Määrittää, miten parsakaali on leikattu tai valmistettu ennen pakkaamista
        (esim. kokonainen kerä, kukinnot, murustettu).
    broccoli_variety:
      name: Parsakaalilajike
      description: Määrittää parsakaalin tietyn lajikkeen tai markkinoitavan version
        (esim. Tenderstem, Romanesco).
    broom_head_material:
      name: Harjan pään materiaali
      description: Määrittää luudan pään materiaalikoostumuksen, joka vaikuttaa kestävyyteen
        ja peliominaisuuksiin.
    brush_format:
      name: Harjan malli
      description: Ilmaisee suksi- tai lumilautaharjan fyysisen muodon, erottaen toisistaan
        kädessä pidettävät harjakappaleet ja porakoneella pyöritettävät rotomallit,
        kuten lieriönmuotoiset rotovilla- tai rotohuopaharjat.
    brush_shape:
      name: Harjan muoto
      description: Määrittää harjan rungon tai pään fyysiset muodot tai profiilin,
        joka vaikuttaa kosketuspintaan ja käsittelyyn.
    brussel_sprout_preparation:
      name: Ruusukaalien valmistus
      description: Kuvaa ruusukaalien fyysisen valmistuksen tai leikkaustavan.
    brussels_sprout_variety:
      name: Ruusukaalilajike
      description: Määrittää ruusukaalien lajikkeen tai muunnoksen niin, että sekä
        nykyiset että tulevat lajikkeet huomioidaan.
    bubble_blower_features:
      name: Kuplapuhaltimen ominaisuudet
      description: Luettelee kuplapuhaltimien yleisiä toiminnallisia ominaisuuksia.
    bubble_gun_bubble_output_modes:
      name: Kuplapyssyn kuplien tuottoasetukset
      description: Määrittää saippuakuplapyssyn toimintatilat, kuten yksittäiset kuplat,
        jatkuvan kuplavirran tai useat eri nopeusasetukset.
    bubble_machine_features:
      name: Kuplakoneen ominaisuudet
      description: Korostaa kuplakoneiden yleisiä toiminnallisia ominaisuuksia perustoimintojen
        lisäksi.
    bubble_machine_items_included:
      name: Kuplakoneen mukana tulevat tarvikkeet
      description: Luettelee pakkauksessa olevat tärkeimmät tuotteet (esim. kuplaliuos,
        ylimääräiset sauvat, kantohihna, kaukosäädin).
    bubble_output_rate:
      name: Kuplien ulostulonopeus
      description: Ilmaisee kuplapuhaltimen likimääräisen/laadullisen kuplien tuotantonopeuden
        (esim. matala/keskitaso/korkea), mukaan lukien sen, onko tuotos vaihteleva.
    bubble_solution_container_type:
      name: Saippuaveden säiliön tyyppi
      description: Määrittää tavan, jolla saippualiuosta syötetään tai käytetään saippuakuplapyssyssä
        (esim. sisäinen säiliö, kiinnitettävä pullo tai erillinen tarjotin/dippausastia).
    bubble_toy_included_accessories:
      name: Kuplalelun mukana tulevat lisävarusteet
      description: Luettelee yleisimmät saippualelun mukana tulevat tarvikkeet (esim.
        liuospullo, tarjotin, vaihtosauvat).
    buckwheat_processing_method:
      name: Tattarin käsittelymenetelmä
      description: Kuvaa tattarin käsittelyä ennen alennusmyyntiä (esim. paahdettu,
        idätetty, turvotettu).
    buckwheat_product_form:
      name: Tattarin tuotelomake
      description: Tattarille ominainen fyysinen esitysmuoto niille tyypeille, joita
        yleinen tuoteluettelo ei kata (esim. hiutaleet, murot/naksut, annospussit).
    bug_collecting_kit_items_included:
      name: Ötököiden keräilypakkauksen mukana tulevat tarvikkeet
      description: Työkalut ja opetusmateriaalit, jotka sisältyvät ötököiden keräilypakkaukseen.
    built_in_storage_type:
      name: Sisäänrakennettu säilytystilatyypit
      description: Yksilöi kerrossängyn runkoon sisältyvät säilytystilat (esim. laatikot,
        hyllyt, porrastilat).
    bumper_finish:
      name: Puskurin viimeistely
      description: Määrittää puskuriin levitetyn pintapinnoitteen tai viimeistelyn.
    bumper_sensor_cutouts:
      name: Puskurin anturin aukot
      description: Ilmoittaa, mitkä alkuperäisvalmistajan avustinjärjestelmien aukkoja
        tai lovia puskurissa on tai mitä se tukee.
    bunk_bed_configuration:
      name: Kerrossängyn kokoonpano
      description: Ilmaisee kerrossängyn rakenteellisen pohja- ja patjakoko-yhdistelmän.
    buoyancy:
      name: Kelluvuus
      description: Ilmaisee syötin tai vieheen kelluvuuskäyttäytymisen vedessä, kuten
        kellumisen, uppoamisen tai leijumisen.
    burkini_pieces_included:
      name: Mukana tulevat burkini-setin osat
      description: Luettelee burkini-setin mukana tulevat vaatteiden osat, jotta asiakkaat
        tietävät tarkalleen, mitä he ostavat.
    burn_rate:
      name: Palamisnopeus
      description: Kuvaa sitä, kuinka nopeasti savukepaperi palaa syttymisen jälkeen.
    bus_model_type:
      name: Linja-auton mallityyppi
      description: Yksilöi pienoismallin esittämän tosimaailman linja-auton kokoonpanon
        tai tyypin (kori-/käyttöluokka).
    bust_design:
      name: Rinnanympäryksen muotoilu
      description: Kuvailee bodyn rinnan alueen rakennetta ja pääntien peittävyyttä
        (esim. avoin, sisäänrakennettu rintaliivi, syvään uurrettu).
    butter_variety:
      name: Voilajike
      description: Määrittää voin tuotantotavan tai sen muista erottavan tyypin, kuten
        hapatettu voi, makea kermavoi, eurooppalaistyylinen voi, kirkastettu voi (ghee)
        tai heravoi.
    buttermilk_variety:
      name: Piimälajike
      description: Määrittää myytävän piimän tietyn tyylin tai muodon (esim. hapatettu,
        perinteinen, jauhe).
    button_application:
      name: Napin kiinnitys
      description: Ilmaisee napin aiotun sovellus- tai projektityypin, (esim. vaatteet,
        verhoilu).
    button_attachment_type:
      name: Napin kiinnitystyyppi
      description: Määrittää napin kiinnitystavan kankaaseen (esim. läpiommeltavat
        reiät vs. kannallinen nappi), ei sulkemistapaa.
    button_finish:
      name: Napin viimeistely
      description: Kuvaa pinnan viimeistelyä/ulkonäköä (esim. matta vs. kiiltävä).
    buttonhole_elastic_application:
      name: Napinläpikuminauha
      description: Taiteltavan koristekuminauhan ensisijainen käyttötarkoitus tai
        sovelluskohde.
    cab_type:
      name: Ohjaamon tyyppi
      description: Määrittää kuorma-auton ohjaamon kokoonpanon.
    cabasa_construction_type:
      name: Cabasan rakennetyyppi
      description: Määrittää cabasan rungon sekä ketju-/helmirakenteen fyysisen rakennustavan
        tai tyylin.
    cabbage_variety:
      name: Kaalilajike
      description: Tunnistaa kaalin lajikkeen tai tyypin (esim. vihreä, kiinankaali,
        savoijinkaali), jotta ostaja voi suodattaa tietoja maun, rakenteen ja kulinaarisen
        käytön mukaan.
    cabinet_door_style:
      name: Kaapin oven tyyli
      description: Yksilöi kaapinoven paneelin visuaalisen muotoilun (kuten Shaker-tyyli
        tai kohokuvioitu paneeli), mikä auttaa sovittamaan sen keittiön yleisilmeeseen.
    cabinet_overlay_type:
      name: Kaapinoven saranointitapa
      description: Määrittää, miten ovet peittävät kaapin rungon tai miten ne asettuvat
        suhteessa siihen.
    cable_end_type:
      name: Kaapelin pään tyyppi
      description: Kuvailee jarru- tai vaihdevipuihin kytkeytyvän kaapelin päässä
        olevan nipan tai liittimen muodon tai tyypin.
    cable_housing_construction:
      name: Vaijerinkuoren rakenne
      description: Kuvailee vaijerinkuoren rakenteellista toteutusta – kuten kierrettyä,
        kokoonpainumatonta tai nivellettyä pala-rakennetta – mikä vaikuttaa kuoren
        puristuskestävyyteen, joustavuuteen ja ajotuntumaan.
    cable_housing_liner_type:
      name: Vaijerinkuoren vuorauksen tyyppi
      description: Ilmaisee, sisältääkö kotelo sisävuorauksen ja/tai voitelumerkinnän,
        sekä käytetyn materiaalin tai teknologian, joka vaikuttaa kitkan vähenemiseen
        ja säänkestävyyteen.
    cable_management_type:
      name: Kaapelin hallintatyyppi
      description: Määrittää neuvottelupöydän tarjoaman sisäänrakennetun kaapelin-
        tai virranhallintaominaisuudet.
    cable_surface_treatment:
      name: Kaapelin pinnan käsittely
      description: Ilmaisee kaapeliin levitetyn erikoispinnoitteen tai -viimeistelyn
        kitkan vähentämiseksi tai korroosiosuojaamiseksi.
    cabochon_back_type:
      name: Cabochonin selkäpuolen tyyppi
      description: Ilmoittaa kabosonin (pyöröhiotun kiven) taustan muodon tai viimeistelyn,
        mikä vaikuttaa istutus- ja liimausmenetelmiin sekä yhteensopivuuteen.
    cacao_bean_variety:
      name: Kaakaopapujen lajike
      description: Määrittää käytetyn kaakaopavun viljelylajikkeen tai muunnoksen.
    cacao_roast_level:
      name: Kaakaon paahtoaste
      description: Kuvailee kaakaopavun paahtoasteen ennen jauhamista.
    cage_package_type:
      name: Häkkipakkaustyyppi
      description: Määrittää, mitkä komponentit sisältyvät ostokseen (esim. pelkkä
        verkko, runkosarja, kokonaispaketti).
    cajon_body_shell_material:
      name: Cajonin rungon/kuoren materiaali
      description: Ilmaisee cajonin rungon/kuoren materiaalin (pois lukien etulevy
        eli tapa).
    cajon_corner_control_system:
      name: Cajonin kulman säätömekanismi
      description: Määrittää, tukeeko cajon kulmien soundinsäätöä (esim. kulmaruuveilla)
        napsautusäänen (slap response) muuntamiseksi.
    cajon_corner_edge_design:
      name: Cajonin kulman-/reunanmuotoilu
      description: Kuvailee kulman/reunan rakenteen, joka vaikuttaa mukavuuteen ja
        soitettavuuteen.
    cajon_feet_type:
      name: Cajonin jalkojen malli
      description: Määrittää cajonin jalkojen mallin, mikä vaikuttaa vakauteen ja
        resonanssin.
    cajon_snare_adjustability:
      name: Cajon-virvelin säädettävyys
      description: Ilmaisee, voidaanko virveliefektiä säätää ja miten (jännitys, kiinnitys
        tai molemmat).
    cajon_snare_system_type:
      name: Cajon-virvelijärjestelmän malli
      description: Määrittää sisäisen virvelimekanismin, jota käytetään virveliefektin
        luomiseen.
    cake_shape:
      name: Kakun muoto
      description: Kuvaa fyysistä olomuotoa, jossa kahvikakku kypsennetään.
    cake_topping:
      name: Kakun päälliset
      description: Ilmaisee kahvikakun pääasiallisen päällysteen tai kuorrutuksen.
    cake_type:
      name: Kakun tyyppi
      description: Kuvailee kakun tyyliä tai tyypin (esim. kuivakakku, sokerikakku,
        juustokakku).
    caliper_mount_type:
      name: Jarrusatulan kiinnitystyyppi
      description: Määrittää jarrusatulassa käytetyn runko- tai haarukkaliitäntästandardin
        (esim. Post Mount, Flat Mount).
    caliper_mounting_standard:
      name: Jarrusatulan kiinnitysstandardi
      description: Määrittää kiinnitysstandardin/-rajapinnan (esim. Flat Mount, Post
        Mount, IS jne.), jota käytetään jarrusatulan kiinnittämiseen polkupyörän runkoon
        tai haarukkaan.
    camera_mounting_location_vehicle_exterior:
      name: Kameran asennuspaikka (ajoneuvon ulkopuoli)
      description: Kameran (tai kameroiden) tarkoitettu asennuspaikka ajoneuvossa
        (esim. etumaski, takaosa, sivupeilit).
    camouflage_environment_type:
      name: Naamiointiympäristön tyyppi
      description: Ilmaisee ensisijaisen ympäristön, jota varten naamiointikuvio on
        suunniteltu, kuten metsä, aavikko tai suo.
    camping_oil_application:
      name: Öljyn käyttö leirinnässä
      description: Määrittää öljyn ensisijaisen käyttötarkoituksen retkeily- ja leiriytymiskäyttöön
        (esim. lamppuöljy tai keitinpolttoaine).
    camshaft_construction:
      name: Nokka-akselin rakenne
      description: Nokka-akselin valmistus-/aihiotyyppi.
    camshaft_material:
      name: Nokka-akselin materiaali
      description: Nokka-akselin rungon/akselin ensisijainen materiaali (perusmateriaali).
    camshaft_position:
      name: Nokka-akselin asento
      description: Määrittää nokka-akselin tarkoitetun sijainnin/tyypin moottorissa
        (esim. imu- tai pakopuoli, tai tietty moottorilohko/asento).
    candle_container_type_included:
      name: Mukana tulevan kynttiläastian tyyppi
      description: Määrittää pakkaukseen sisältyvien kynttiläastioiden tyypin, jos
        niitä kuuluu tuotteeseen.
    candle_dye_form:
      name: Kynttilän väriaine
      description: Määrittää kynttilänvalmistuksessa käytetyn kynttilänvärin/väriaineen
        fyysisen muodon.
    candle_fragrance_form:
      name: Kynttilän tuoksumuoto
      description: Määrittää kynttilänvalmistukseen tarkoitetun hajusteaineosan tyypin/muodon.
    candle_making_tool_type:
      name: Kynttilänvalmistustyökalun tyyppi
      description: Tunnistaa, minkä tyyppinen kynttilänvalmistusväline tuote on (esim.
        kaatoastia, sydämen keskitystyökalu, lämpömittari).
    candy_texture:
      name: Karkkien koostumus
      description: Kuvaa karkin suutuntuma tai koostumusta mausta tai muodosta riippumatta.
    candying_method:
      name: Karamellisointimenetelmä
      description: Kuvaa, miten hedelmä on karamellisoitu tai säilötty sokeriin (esim.
        sokeroitu, kuorrutettu, siirapissa).
    canned_meat_form:
      name: Säilykelihamuoto
      description: Luokittelee lihan jalostetun muodon tai esillepanon pakkauksessa.
    canoe_construction_type:
      name: Kanootin rakennetyyppi
      description: Yksilöi kanootin rungon rakennetyypit, kuten kovakuorinen, puhallettava
        ja taitettava.
    canoe_hull_shape:
      name: Kanootin rungon muoto
      description: Määrittää rungon ensisijaisen poikkileikkauksen tai pohjan profiilin,
        mikä vaikuttaa vakauteen ja hallittavuuteen.
    canoe_stern_design:
      name: Kanootin perän muotoilu
      description: Määrittää veneen rungon perän tyypin, joka vaikuttaa moottorin
        yhteensopivuuteen ja käsiteltävyyteen.
    canopy_type:
      name: Katostyyppi
      description: Kuvailee cabana-sängyn katoksen tai kattopeitteen tyylin.
    canvas_compatible_media:
      name: Kankaalle sopivat aineet
      description: Ilmoittaa, minkä taide- tai askarteluaineiden kanssa maalauskangas
        on tarkoitettu käytettäväksi.
    canvas_format:
      name: Kankaan formaatti
      description: Ilmaisee, myydäänkö tulostettavaa painettavaa kangasta arkkeina,
        rullina vai valmiiksi leikattuina paneeleina.
    canvas_mounting_format:
      name: Kankaan kiinnitys/muoto
      description: Maalauskankaan fyysinen muoto/kiinnitystapa.
    canvas_stretcher_assembly_type:
      name: Kangaspaarien kokoonpanotyyppi
      description: Myydäänkö paarit koottuna runkona vai kokoamista vaativalla tavalla
        tankoina/pakkauksina.
    canvas_stretcher_corner_joint_type:
      name: Kiilakehyksen kulmaliitoksen tyyppi
      description: Tapa, jolla kiilakehyksen kulmat on liitetty/rakennettu (esim.
        tapitettu liitos, sormiliitos, niitattu, kiilattava).
    canvas_surface_tone:
      name: Kankaan pinnan sävy
      description: Pohjamaalatun kankaan pinnan pohjasävy/väri, ei painettua kuviota
        tai kuviota (esim. valkoinen, musta, sävytetty).
    canvas_weave_type:
      name: Kankaan kudontatyyppi
      description: Kuvailee maalauskankaan pinnan kudoksen rakennetta, mikä vaikuttaa
        kankaan tekstuuriin ja maalin käyttäytymiseen.
    cap_attachment_style:
      name: Suojuksen kiinnitystyyppi
      description: Määrittää saksofonin suukappaleen suojuksen rakenne-/kiinnitystyylin,
        mikä voi vaikuttaa suojaukseen ja sopivuuteen soitinkotelossa.
    cap_construction:
      name: Suojuksen kokoonpano
      description: Määrittää peruukin pohjan (myssyn) rakennustavan (esim. Lace Front,
        Full Lace, käsin solmittu), mikä vaikuttaa peruukin luonnollisuuteen, mukavuuteen
        ja muotoilumahdollisuuksiin.
    cap_crown_structure:
      name: Korkin kruunun rakenne
      description: Ilmaisee, onko korkin kruunu strukturoitu (jäykistetty) vai strukturoimaton
        (pehmeä).
    cap_fit_type:
      name: Lakin istuvuustyyppi
      description: Määrittää, miten lakki istuu tai miten sitä voidaan säätää käyttäjän
        päähän sopivaksi (esim. sovitettu vs. säädettävä).
    cap_seal_type:
      name: Korkin tiivisteen tyyppi
      description: Määrittää tiivistyskomponentin, jota käytetään öljyvuotojen ja
        höyryjen karkaamisen estämiseen (esim. O-rengas, tiiviste).
    cap_size:
      name: Korkin koko
      description: Standardikokomerkinnät, jotka osoittavat peruukkipohjan päänkoon.
    cap_type:
      name: Korkin tyyppi
      description: Paisuntasäiliössä käytetyn korkin/sulkimen liitännän tyyppi.
    caper_size_grade:
      name: Kapriksen kokoluokka
      description: Luokittelee kaprikset alan standardien mukaisesti lajikenimillä,
        jotka vastaavat silmujen halkaisijaa.
    capo_clamping_mechanism:
      name: Capon puristusmekanismi
      description: Määrittää puristimen/toimilaitteen tavan, jolla paine kohdistetaan
        kieliin (capon käyttötapa).
    capo_finish:
      name: Capon viimeistely
      description: Capon rungon pinnoitus (ulkoasu/tuntuma) riippumatta väristä (esim.
        matta vs. kiiltävä).
    capo_fit_type:
      name: Capon istuvuustyyppi
      description: Määrittää kaulaprofiilin, johon capo on suunniteltu sopimaan (mukaan
        lukien säde/tasaisuus), mikä vaikuttaa värinättömään kiinnitykseen ja intonaatioon.
    capo_pad_material:
      name: Capon pehmusteen materiaali
      description: Määrittää kieliä ja otelautaa koskettavan pehmusteen materiaalin
        (vaikuttaa pitoon, vireen vakauteen ja mahdollisiin jälkiin soittimen pintakäsittelyssä).
    capo_tension_mechanism:
      name: Capon kiristysmekanismi
      description: Määrittää, miten liukuvan capon painetta/jännitystä kohdistetaan
        ja säädetään kieliin.
    capture_method:
      name: Pyydystysmenetelmä
      description: Ilmaisee, onko ansa tarkoitettu elävänä pyydystämiseen vai tappava.
