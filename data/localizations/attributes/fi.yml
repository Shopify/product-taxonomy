    swim_trainer_features:
      name: Uimaharjoitteluvälineen ominaisuudet
      description: Ilmaisee uimaharjoitteluvälineen lisäominaisuudet, jotka parantavat
        sen toimivuutta tai käyttömukavuutta.
    swim_trainer_type:
      name: Uimaharjoittelulaitteen tyyppi
      description: Ilmaisee uimaharjoitteluvälineen rakenteen tai mallin, jotta tuotteita
        voidaan suodattaa suunnittelun ja harjoittelutarkoituksen mukaan.
    swim_training_focus:
      name: Uimisen harjoittelun keskittymiskohde
      description: Ilmaisee, mihin ensisijaiseen harjoittelutavoitteeseen mela on
        tarkoitettu, kuten tekniikan, voiman tai tietyn lihasryhmän harjoittamiseen.
    swim_weight_style:
      name: Uintivälineen painon tyyli
      description: Ilmaisee uintipainon mallin tai tuotetyypin, jotta ostajat voivat
        erottaa toisistaan saman kategorian erityyppiset tuotteet.
    swimbait_buoyancy:
      name: Uintivieheen kelluvuusominaisuus
      description: Ilmaisee uintivieheen kelluvuuden, kuten kelluva, leijuva tai uppoava,
