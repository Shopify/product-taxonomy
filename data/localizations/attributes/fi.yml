    trailer_wiring_circuit:
      name: Perävaunun kytkentäkaavio
      description: Listaa perävaunun johdotuksen kuljettamat valaistus-, jarru- ja
        apupiirit/signaalit (eli mitä virta-/maadoitus- ja signaalilinjoja on olemassa).
    trailer_wiring_connector_type:
      name: Perävaunun johdotuksen liitintyyppi
      description: Määrittää perävaunun puoleisen / ajoneuvon puoleisen pistokestandardin,
        jota käytetään perävaunun johtosarjoissa ja sovittimissa.
    train_whistle_intended_use:
      name: Junapillin käyttötarkoitus
      description: Pillin ensisijainen käyttötarkoitus.
    train_whistle_sound_character:
      name: Junapillin sointi
      description: Kuvaa pillin äänen havaittua sävyä (sointi).
    trainer_mounting_type:
      name: Apupyörien kiinnitystyyppi
      description: Kuvaa, miten polkupyörä on yhteydessä harjoitusvastukseen (esim.
        wheel-on tai direct-drive).
    training_dummy_shape:
      name: Harjoitusdummyn muoto
      description: Määrittää dummyn yleisen muotoilun tai siluetin, joka vaikuttaa
        koiran otteeseen ja koulutuksen realistisuuteen.
    training_focus:
      name: Koulutuksen painopiste
      description: Kuvailee ensisijaista taito-aluetta, johon apuväline kohdistuu
        (esim. refleksit, jalkatyö, käden ja silmän koordinaatio).
    training_focus_area:
      name: Koulutuksen painopistealue
      description: Määrittää ensisijaisen lacrossetaidon, jota apuväline on suunniteltu
