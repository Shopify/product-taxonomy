        haarukan ajotyyliinsä.
    sustain_pedal_form_factor:
      name: Sustain-pedaalin muoto
      description: Kuvaa sustain-pedaalin tyyliä (esim. pianotyylinen jalkapoljin
        vs. kompakti jalkakytkin), joka vaikuttaa tuntumaan ja käyttötarkoitukseen.
    sustain_pedal_switch_type:
      name: Sustain-pedaalin kytkimen tyyppi
      description: Ilmaisee, lähettääkö poljin hetkellisen (pidetään painettuna) vai
        lukitussignaalin (vaihto).
    sustainability_certification:
      name: Kestävyyssertifiointi
      description: Puumateriaalin ympäristö- tai hankintasertifikaatti.
    swab_intended_bassoon_section:
      name: Fagotin osille tarkoitetut puhdistusliinat
      description: Määrittää, minkä fagotin osan puhdistamiseen liina on tarkoitettu
        (eri reiät/osat vaativat erimuotoisia ja -kokoisia liinoja).
    swab_style:
      name: Liinantyyppi
      description: Kuvaa saksofonin läpi tai tiettyihin osiin ulottuvan liinan rakennetta/muotoa.
    swab_weight_material:
      name: Liinapainon materiaali
      description: Vetopainon/langan (jos on) materiaali, joka vaikuttaa naarmuuntumisriskiin
