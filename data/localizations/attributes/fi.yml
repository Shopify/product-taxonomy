    suspension_bushing_type:
      name: Jousituksen puslan tyyppi
      description: Määrittää jousituksen puslan toiminnallisen /asennustavan.
    suspension_configuration:
      name: Jousituksen kokoonpano
      description: Kuvaa, onko kolmipyörässä jousitus ja missä se sijaitsee.
    suspension_material:
      name: Jousituksen materiaali
      description: Määrittää keinun ripustamiseen käytettyjen ketjujen, köysien tai
