    drum_head_damping_control:
      name: Rumpukalvon vaimennuksen säätö
      description: Tämä määrittää rumpukalvon rakenteeseen integroidut yläsävelen
        hallintaominaisuudet tai vaimennustyypin.
    drum_head_film_material:
      name: Rumpukalvon materiaali
      description: Rumpukalvon ensisijainen materiaali (yleensä PET/Mylar, mutta voi
        sisältää erikoismateriaaleja).
    drum_head_hoop_collar_type:
      name: Rumpukalvon vanteen/kauluksen tyyppi
      description: Yksilöi rumpukalvon vanteen ja kauluksen rakenteen (esim. kauluksen
        profiili ja vanteen materiaali), mikä voi vaikuttaa istuvuuteen ja virityksen
        vakauteen tietyissä rungoissa ja vanteissa.
    drum_head_hoop_rim_material:
      name: Rumpukalvon vanteen/reunan materiaali
      description: Rumpukalvon sisällä olevan vanteen/reunan materiaali, joka voi
        vaikuttaa kestävyyteen ja virityksen vakauteen.
    drum_head_included:
