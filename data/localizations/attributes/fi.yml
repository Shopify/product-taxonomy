    drum_pedal_cam_type:
      name: Rumpupedaalin nokan tyyppi
      description: Määrittää rumpupedaalin nokka-akselin muodon/geometrian, joka vaikuttaa
        ja vasteeseen (esimerkiksi lineaarinen vs. kiihdytys).
    drum_pedal_chain_configuration:
      name: Rumpupedaalin ketjun kokoonpano
      description: Määrittää ketjukäyttöisen rumpupedaalin ketjutoteutuksen (esim.
        yksiketjuinen, kaksiketjuinen tai porrastettu ketju).
    drum_pedal_chain_type:
      name: Rumpupedaalin ketjun tyyppi
      description: Ilmaisee pedaalissa käytetyn ketjun tyypin (esimerkiksi rullaketju
