    lifebuoy_features:
      name: Pelastusrenkaan ominaisuudet
      description: Toiminnallinen turvallisuus, asennus/käsittely ja mukana tulevat
        pelastusrenkaiden lisävarusteet.
    lift_mechanism_type:
      name: Nostimen mekanismityyppi
      description: Määrittää mekanismin, joka auttaa seinäsängyn nostamisessa/laskemisessa
        tai avaamisessa/sulkemisessa.
    lift_stand_support_point:
      name: Nostimen/telineen tukipiste
      description: Kohta, jossa nostin/teline koskettaa/tukee ajoneuvoa.
    lifting_gas_type:
      name: Nostokaasun tyyppi
      description: Määrittää ilmalaivan käyttämän ensisijaisen nostokaasun tai kelluntaväliaineen.
    lifting_support_type:
      name: Nostintuen tyyppi
      description: Ilmaisee, ajetaanko nostimeen kulkukiskoja pitkin vai käytetäänkö
        nostimessa runkoon/nostopisteisiin koskettavia varsia/pehmikkeitä.
    ligature_and_cap_component_type:
      name: Kiristimen ja suojahatun komponenttityyppi
      description: Ilmaisee, onko tuote kiristin, suojahattu vai molemmat sisältävä
        setti.
    ligature_material:
      name: Ligatuurin materiaali
      description: Kiristinrungon ensisijainen materiaali, joka koskettaa lehteä ja
        kiinnittää sen (esim. metalli, nahka, kangas).
    ligature_plating_or_finish:
      name: Ligatuurin pinnoitus tai viimeistely
      description: Määrittää metallisen klarinetin kiristimen ja/tai suojahatun pinnoitteen
        ja/tai pinnan viimeistelyn.
    ligature_reed_contact_style:
      name: Ligatuurin ruokolehden kontaktityyppi
      description: Määrittää, miten kiristin koskettaa lehteä (esim. minimaalinen
        kosketus, usea piste, kiertävä).
    ligature_screw_position_relative_to_reed:
      name: Kiristinruuvin asento (suhteessa lehteen)
      description: Ilmaisee ligatuurin kiristysruuvien sijainnin suhteessa ruokolehteen
        tai soittajan puoleiseen sivuun, kun se on asennettu suukappaleeseen.
    ligature_tension_adjustment_mechanism:
      name: Kiristimen kireyden säätömekanismi
      description: Kuvaa, miten kiristin kohdistaa painetta lehteen tai säätää sitä
        (kiinnityksen muotoilu).
    ligature_tightening_mechanism_type:
      name: Ligatuurin kiristysmekanismin tyyppi
      description: Määrittää mekanismin, jolla ligatuuri kiristyy suukappaleen ja
        ruokolehden ympärille (esim. yksi ruuvi, kaksi ruuvia, vipu/pikakiinnitys).
    light_bar_housing_material:
      name: Valaisinkotelon materiaali
      description: Valaisinkotelon/‑rungon päämateriaali, joka vaikuttaa kestävyyteen
        ja lämmön haihtumiseen.
    light_bar_lens_material:
      name: Valopalkin linssin materiaali
      description: Valopaneelin linssin/suojuksen päämateriaali, joka voi vaikuttaa
        iskunkestävyyteen ja optiseen kirkkauteen.
    light_bar_mounting_location:
      name: Valopalkin asennuspaikka
      description: Ensisijainen suunniteltu asennuspaikka ajoneuvossa.
    light_stand_style:
      name: Kevyen jalustan tyyppi
      description: Määrittää erikoistehostevalojen tukemiseen käytettävän jalustan
        rakenteellisen tyylin tai muototekijän (esim. kolmijalka, T-tanko, kampi),
        ei asennuspintaa (seinä/katto), joka määräytyy kiinnitystyypin mukaan.
    light_switch_function:
      name: Valokytkimen toiminnot
      description: Määrittää, mitä valaistuspiirejä tai toimintoja kytkin ohjaa.
    lighting_control_protocols_supported:
      name: Tuetut valaistuksen ohjausprotokollat
      description: Ohjaus-/verkostoprotokollat, joita ohjain tukee DMX512:n lisäksi
        tai sen sijaan.
    lighting_effects:
      name: Valaistustehosteet
      description: Määrittää mahdolliset pelattavuutta tai ulkonäköä parantavat integroidut
        valaistusominaisuudet.
    lighting_mode:
      name: Valotila
      description: Luettelee käytettävissä olevat toimintavalotilat, kuten tasainen
        valo, vilkku, strobo tai SOS.
    lily_variety:
      name: Liljalajike
      description: Määrittää tuoreena leikkokukkana myytävän liljan kaupallisen/kasvitieteellisen
        lajikkeen (esim. aasialainen, itämainen).
    limb_articulation:
      name: Raajan liikkuminen
      description: Ilmaisee nuken raajojen joustavuuden tai niveltyvyyden asteen (ei
        mitään, kiinteä, puoli-joustava, täysin nivelletty).
    limb_material:
      name: Lavan materiaali
      description: Jousen tai varsijousen lavoissa käytetty päämateriaali, joka vaikuttaa
        painoon, kestävyyteen, tärinään ja yleiseen suorituskykyyn.
    lime_variety:
      name: Limettilajike
      description: Ilmaisee myytävän limetin tarkan kasvitieteellisen tai kaupallisen
        lajikkeen.
    line_buoyancy:
      name: Siiman kelluvuus
      description: Kuvaa, kelluuko vai uppoaako punottu siima luonnostaan ja miten
        nopeasti, mikä vaikuttaa vieheen esittelyyn ja siiman hallintaan.
    line_purpose:
      name: Narun käyttötarkoitus
      description: Määrittää siiman käyttötarkoituksen leijajärjestelmässä (esim.
        etulennätyssiima, depower-siima, bridle-siima).
    linen_finish_treatment:
      name: Pellavan viimeistely/käsittely
      description: Mikä tahansa pellavakankaaseen käytetty viimeistelyprosessi, joka
        muuttaa tuntumaa, ulkonäköä tai suorituskykyä.
    linen_weave_type:
      name: Pellavakudostyyppi
      description: Määrittää pellavakankaan kudontarakenteen, joka vaikuttaa rakenteeseen,
        hengittävyyteen ja laskeutumiseen.
    liner_padding_type:
      name: Vuorin toppauksen tyyppi
      description: Ilmaisee vuorin rakenteen tai pehmustetyylin (esim. verkko, kevyesti
        topattu, tikattu).
    liner_shape:
      name: Vuoren muoto
      description: Kuvaa makuupussin vuorin yleisen muodon, jotta asiakas voi sovittaa
        sen makuupussiinsa ja mieltymyksiinsä.
    liner_type:
      name: Vuoren tyyppi
      description: Ilmaisee, onko shortseissa sisävuori ja jos on, minkä mallinen
        se on.
    lining:
      name: Vuori
      description: Ilmaisee, onko uimahousut vuorattu ja miten, mukaan lukien vuorin
        peittävyys vaatteen sisällä.
    lining_material:
      name: Vuoren materiaali
      description: Määrittää kengän sisävuoren materiaalin, mikä vaikuttaa mukavuuteen,
        hengittävyyteen ja lämpöön.
    lining_type:
      name: Verhoilun tyyppi
      description: Määrittää, onko uima-asussa vuori ja missä määrin.
    link_connection_style:
      name: Ketjun liitososa
      description: Luokittelee, miten liitos liittyy ketjuun (esim. pikaliitin, liitosnasta),
        jotta kuljettajat voivat valita oikean asennustavan tai varaosan.
    live_bait_form:
      name: Elävän syötin olomuoto
      description: Määrittää syötin fyysisen olomuodon tai säilöntätilan, kuten elävä,
        jäädytetty tai kuivattu.
    living_room_furniture_items_included:
      name: Mukana tulevat olohuoneen kalusteet
      description: Määrittää olohuonekalustoon kuuluvat yksittäiset huonekalut, mikä
        auttaa ostajia ymmärtämään nopeasti, mitä osia (esim. sohva, kahden istuttava
        sohva, sohvapöytä) sarja sisältää.
    load_mechanism:
      name: Kuormausmekanismi
      description: Määrittää ensisijaisen tavan, jolla vastus muodostetaan tai lisätään
        laitteeseen (esim. painopakka, levypaino, vastuskuminauha).
    lock_cylinder_type:
      name: Lukkosylinterin tyyppi
      description: Määrittää käytetyn avainsylinterin/ytimen tyypin (merkityksellistä
        avausvastuksen ja vaihtoavainten kannalta).
    lock_security_level:
      name: Lukon suojaustaso
      description: Kuvailee lukon tai lukkosylinterin tiirikoinnilta ja poraamiselta
        suojaavat turvaominaisuudet.
    lock_system:
      name: Lukitusjärjestelmä
      description: Nostimen korkeuden lukitsemiseen käytetyn turvalukitusjärjestelmän
        tyyppi.
    locker_bench_configuration:
      name: Pukuhuoneen penkin kokoonpano
      description: Kuvaa pukuhuoneen penkin suuntaa tai rakenteellista kokoonpanoa
        (esim. yksipuolinen, kaksipuolinen saareke, seinään kiinnitettävä).
    locomotive_prototype_power_type:
      name: Veturin prototyypin voimanlähteen tyyppi
      description: Määrittää mallin edustaman veturin käyttövoimatyypin.
    locomotive_wheel_arrangement_whyte_notation:
      name: Veturin pyörien asettelu (Whyte-merkintä)
      description: Veturin prototyypin pyörien asettelu (esim. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Parvisängyn korkeusluokitus
      description: Ilmaisee parvisängyn korkeustyypin (matala, keskikorkea, korkea,
        erittäin korkea), minkä avulla ostaja voi sovittaa sängyn huoneen kattokorkeuteen
        ja sängynalustilan tarpeisiin.
    logo_application_method:
      name: Logon kiinnittämismenetelmä
      description: Kuvaa, miten koulun tunnus tai logo on kiinnitetty vaatteeseen
        (esim. brodeerattu tai painettu).
    logo_label_compatible_fabric_weight:
      name: Logomerkin kanssa yhteensopivan kankaan paino
      description: Suositeltu kankaan painoluokka, jolloin lappu voidaan kiinnittää
        ilman vääristymiä paksuuden lisääntymistä.
    logo_label_edge_finish:
      name: Logomerkin reunan viimeistely
      description: Määrittää lapun reunan rakenteen tai viimeistelyn, mikä vaikuttaa
        purkautumisen kestävyyteen ja mukavuuteen ihoa vasten.
    logo_label_print_production_method:
      name: Logon lappuun painamisen tai tuottamisen menetelmä
      description: Tapa, jolla logo kiinnitetään tai muodostetaan lapun pintaan.
    long_block_completeness:
      name: Osittain kootun moottorin täydellisyys
      description: Määrittää, mitkä pääkomponentit sisältyvät osittain kootun moottorin
        kokoonpanoon.
    long_john_pieces_included:
      name: Kalsarisetissä toimitetut osat
      description: Selventää, sisältääkö tuote vain alaosan, vain yläosan vai molemmat
        kalsarisetin osat.
    longan_variety:
      name: Longaanilajike
      description: Määrittää longan-hedelmän viljelylajikkeen tai kaupallisen lajikkeen
        (esim. Kohala, Biew Kiew), minkä avulla ostaja voi tunnistaa halutut maku-,
        koko- ja makeusominaisuudet.
    loom_accessories_included:
      name: Kangaspuiden mukana tulevat lisävarusteet
      description: Tärkeimmät lisävarusteet, jotka sisältyvät laatikkoon/pakkaukseen
        kangaspuiden kanssa.
    loom_finish:
      name: Kangaspuiden viimeistely
      description: Kangaspuiden pinnan viimeistely (pääasiassa puiset kangaspuut).
    loom_folding_portability_design_type:
      name: Kangaspuiden taitto/kannettavuus
      description: Taittuvatko kangaspuut kuljetusta tai kompaktia säilytystä varten
        ja miten.
    loom_frame_folding_design:
      name: Kangaspuiden rungon kokoontaitettava rakenne
      description: Määrittää, voidaanko pöytäkangaspuiden runko taittaa, painaa kokoon
        tai purkaa varastointia tai kuljetusta varten ja miten.
    loom_tension_adjustment_method:
      name: Kangaspuiden kireyden säätömenetelmä
      description: Ensisijainen kangaspuiden loimen kireyden säätämisen menetelmä.
    loom_tie_up_system:
      name: Kangaspuiden sidontajärjestelmä
      description: Poljinten/välittäjien/akselien välillä käytetyn sidonta-/kytkentäjärjestelmän
        tyyppi (esim. Texsolv tai metalliketju).
    loquat_variety:
      name: Lokvattilajike
      description: Määrittää lokvatin viljelylajikkeen tai lajikkeen, mikä heijastaa
        eroja koossa maussa kypsymisajassa ja ulkonäössä.
    lubricant_features:
      name: Voiteluaineen ominaisuudet
      description: Korostaa voiteluaineen erityisominaisuuksia, lisäaineita tai etuja.
    lubrication_requirement:
      name: Voiteluvaatimus
      description: Ilmaisee, onko juoksumaton matto esikäsitelty tai huoltovapaa vai
        vaatiiko se jatkuvaa voitelua tai vahausta.
    lubrication_type:
      name: Voitelutyyppi
      description: Määrittää holkin voitelun/rasvavoitelun tarpeen ja sen, onko se
        suunniteltu rasvalla huollettavaksi (esim. urat tai zerk-liitos).
    lug_nut_seat_profile:
      name: Pyöränmutterin istukan profiili
      description: Määrittää pyöränmutterin istukan profiilin, joka varmistaa pyöränmutterien
        oikean yhteensopivuuden ja turvallisen asennuksen.
    lumbar_support_type:
      name: Ristiselän tukityyppi
      description: Kuvailee tuolin mukana tulevan ristiselän tyyliä (esim. irrotettava
        tyyny, säädettävä mekanismi, hieronta).
    lunge_trainer_style:
      name: Syöksyn harjoitteluvälineen tyyppi
      description: Määrittää askelkyykkylaitteen rakenteellisen suunnittelun.
    lure_buoyancy:
      name: Vieheen kelluvuus
      description: Määrittää, miten uistin käyttäytyy vesipatsaassa levossa tai kelattaessa
        (esim. kelluu pinnalla, leijuu välivedessä tai uppoaa).
    luster:
      name: Kiilto
      description: Kuvaa tavan, jolla valo on vuorovaikutuksessa näytteen pinnan kanssa
        (esim. lasimainen, metallinen).
    lychee_cultivar:
      name: Litsilajike
      description: Määrittää tietyn litsilajikkeen tai -viljelylajikkeen – esimerkiksi
        Brewster, Hak Ip tai Mauritius – jotka voivat vaihdella maun, siemenkoon,
        sadonkorjuukauden ja hinnan suhteen.
    lyre_flip_folder_mounting_location:
      name: Lyyra-/selailukansion kiinnityssijainti
      description: Paikka, jossa lyyra- tai selailukansio on tarkoitettu kiinnitettäväksi
        soittimeen tai lisävarusteeseen (esim. kelloon, suuputkeen tai telineeseen).
    lyrics_display_type:
      name: Sanoitusten näyttötyyppi
      description: Miten sanoitukset näytetään (jos niitä käytetään) karaoken aikana.
    magazine_compatibility:
      name: Lippaan yhteensopivuus
      description: Määrittää ensisijaiset lippaiden kaliiperit tai tyypit, joiden
        pitelemiseen liivin sisäänrakennetut taskut on suunniteltu.
    magnet_requirement:
      name: Magneettivaatimus
      description: Ilmaisee, tarvitseeko anturi ulkoisen magneetin toimiakseen.
    magnet_toy_storage_included:
      name: Magneettilelujen säilytystila sisältyy toimitukseen
      description: Magneettilelun toimitukseen sisältyy säilytysväline/kotelo työpöydän
        järjestämistä ja matkustamista varten.
    malanga_variety:
      name: Kaakaotaarolajike
      description: Määrittää myytävän tarolajikkeen tai -viljelylajikkeen, jotta ostaja
        voi valita halutun lajikkeen maun, värin tai käyttötarkoituksen perusteella.
    malt_color_rating_system:
      name: Maltaan väriluokitusjärjestelmä
      description: Määrittää, mihin väriasteikkoon ilmoitettu väri viittaa (Lovibond,
        SRM tai EBC).
    malt_crush:
      name: Mallasmurska
      description: Ilmaisee, myydäänkö perusmallas kokonaisena/jauhamattomana vai
        esimurskattuna, ja jos myydään, niin murskaustavan.
    malt_form:
      name: Maltaan olomuoto
      description: Ilmaisee, myydäänkö tuote kokonaisina jyvinä vai onko se käsitelty
        mäskäystä varten (esim. murskattu).
    malt_intended_use:
      name: Maltaan käyttötarkoitus
      description: Maltaan ensisijainen käyttötarkoitus (paneminen, tislaus tai kaksoiskäyttö).
    malt_treatment:
      name: Maltaan käsittely
      description: Kuvaa, miten viljaa/mallasta on käsitelty tavallisen uunikuivatuksen
        (yleiset erityisprosessit) lisäksi.
    malt_usage_purpose:
      name: Maltaan käyttötarkoitus
      description: Kuvaa erikoismaltaan ensisijaista toiminnallista panosta olutreseptiin.
    man_overboard_system_type:
      name: Mies yli laidan -järjestelmän tyyppi
      description: Määrittää tuotteen tarjoaman ensisijaisen mies yli laidan ‑ratkaisuluokan.
    mandolin_back_sides_wood:
      name: Mandoliinin takaosa ja sivut puuta
      description: Määrittää mandoliinin takaosan ja sivujen valmistukseen käytetyn
        puulajin.
    mandolin_body_top_wood:
      name: Mandoliinin rungon kansi puuta
      description: Mandoliinin äänilevyn (ylhäällä) ensisijainen puu/materiaali.
    mandolin_bridge_type:
      name: Mandoliinin tallan tyyppi
      description: Määrittää mandoliinin tallan tyylin.
    mandolin_pickup_configuration:
      name: Mandoliinin mikrofonikonfiguraatio
      description: Ilmaisee, sisältääkö mandoliini elektroniikkaa ja minkä tyyppinen
        mikrofonijärjestelmä on asennettu.
    mandolin_string_configuration:
      name: Mandoliinin kielien konfiguraatio
      description: Määrittää mandoliinin kielikokoonpanon kokonaiskielimäärän ja kieliparien
        lukumäärän perusteella (esim. 8 kieltä / 4 kieliparia).
    mangosteen_variety:
      name: Mangostaanilajike
      description: Yksilöi myytävän mangostanin tai läheisesti sukua olevan Garcinia-hedelmän
        lajin tai viljelylajikkeen.
    mannequin_style:
      name: Harjoittelunuken tyyli
      description: Kuvaa harjoitusnuken rakenteellista muotoilua tai rakennustyyliä.
    manufacturing_process:
      name: Valmistusprosessi
      description: Kelarungon tai puolan ensisijainen valmistusmenetelmä (esim. CNC-koneistettu,
        painevalettu).
    map_coverage_sky_planet_body:
      name: Kartan kattavuus (taivas/planeetat)
      description: 'Ilmaisee, mitä kartta kuvaa: yötaivasta (tähdistöjä) vai tiettyä
        planeettaa.'
    map_format:
      name: Kartan muoto
      description: Määrittelee metsästyskarttojen ja ‑oppaiden fyysisen tai digitaalisen
        esitystavan.
    map_sensor_output_signal_type:
      name: MAP-anturin lähtösignaalin tyyppi
      description: Määrittää lähtösignaalin tyypin, jonka MAP-anturi lähettää moottorinohjausyksikölle
        (ECU).
    map_size_sheet:
      name: Kartan koko (arkki)
      description: Määrittää kartta-arkin/julisteen/planisfäärin valmiin koon esillepanon
        ja yhteensopivuuden helpottamiseksi (kehyksen koko, seinätila).
    marabou_feather_form:
      name: Marabou-höyhenen muoto
      description: Marabou-höyhentuotteen muototekijä myyntihetkellä.
    marabou_feather_treatment:
      name: Marabou-höyhenen käsittely
      description: Miten marabou-höyhen käsiteltiin tai viimeisteltiin käsitöitä varten.
    marble_track_set_feature_modules:
      name: Kuularatasetin ominaisuusmoduulit
      description: Korostaa settiin sisältyviä erityisiä toiminnallisia moduuleja
        (esim. nostin, laukaisin, kytkimet).
    marine_flare_certification_standard:
      name: Merihätäraketin sertifiointi/standardi
      description: Ilmaisee, mitä meriturvallisuussertifikaatteja tai ‑standardeja
        soihdun sanotaan täyttävän.
    marine_safety_standard_compliance:
      name: Meriturvallisuusstandardien noudattaminen
      description: Ilmaisee, mitkä viralliset vesiturvallisuusstandardit tai ‑hyväksynnät
        lisävaruste täyttää.
    marine_transmission_type:
      name: Merivaihteiston tyyppi
      description: Määrittää sisäperämoottoriin yhdistetyn merivaihteistotyypin (esim.
        suoraveto tai V-veto).
    marker_action_type:
      name: 'Merkkaimen toimintatyyppi '
      description: Kuvaa merkkaimen peruslaukaisu-/toimintamekanismin.
    marker_caliber:
      name: Merkkaimen kaliiperi
      description: Määrittää maalipallojen halkaisijan, joiden ampumiseen merkkain
        on suunniteltu.
    marking_durability:
      name: Merkinnän kestävyys
      description: Ilmaisee, kuinka kauan maalatun viivan odotetaan pysyvän näkyvissä
        normaalissa olosuhteissa, kuten tilapäinen (enintään 3 viikkoa), puolipysyvä
        (enintään 6 kuukautta) tai pysyvä (yli 6 kuukautta).
    marking_tip_type:
      name: Merkintäkärjen tyyppi
      description: Merkintäterän tyyppi, jota harppi käyttää piirtämiseen (esim. lyijykynän
        pidike tai muste tai piirtokärki).
    marshmallow_processing_method:
      name: Vaahtokarkkien käsittelymenetelmä
      description: Kuvaa vaahtokarkeille tehdyn erikoiskäsittelyn, joka vaikuttaa
        rakenteeseen, säilyvyyteen tai makuun.
    marshmallow_size:
      name: Vaahtokarkin koko
      description: Luokittelee yksittäisten vaahtokarkkipalojen suhteellisen koon.
    martial_arts_belt_rank:
      name: Taistelulajien vyön arvo
      description: Ilmaisee vyön värin tai erityisen väriyhdistelmän edustaman taito-/arvotason.
    mask_bib_type:
      name: Maskin leukalapun tyyppi
      description: Määrittää miekkailumaskin leukalapun tyypin, kuten tavallinen kangas,
        johtava, irrotettava tai ei mitään.
    mask_cage_material:
      name: Maskin kehikon materiaali
      description: Kasvosuojan tai maskin kehyksen valmistuksessa käytetty materiaali.
    mask_goggle_design:
      name: Maskin/suojalasien muotoilu
      description: Määrittelee suojavarusteiden yleisen rakenteen tai peittävyyden.
    mask_skirt_material:
      name: Maskin helman materiaali
      description: Määrittää pehmeän helman materiaalin, joka varmistaa vesitiiviyden
        maskin ja kasvojen välillä.
    mask_strap_material:
      name: Maskin hihnan materiaali
      description: Määrittää maskin päähän kiinnittävän hihnan materiaalin.
    mass_air_flow_sensor_measurement_type:
      name: Ilmamassamittarin mittaustyyppi
      description: Määrittää MAF-anturin käyttämän tunnistustekniikan/lähtötavan.
    mass_air_flow_sensor_mounting_type:
      name: Ilmamassamittarin asennustyyppi
      description: Miten MAF-anturi tai anturikokoonpano on asennettu imujärjestelmään.
    massage_feature:
      name: Hierontaominaisuus
      description: Ilmaisee, sisältääkö säädettävä alusta integroidun hierontatoiminnon
        ja jos sisältää, kuinka monta hieronta-aluetta siinä on.
    mast_attachment_interface:
      name: Maston kiinnityskohta
      description: Määrittää rungon ja maston välisen liitäntästandardin, mikä auttaa
        ostajia varmistamaan osien yhteensopivuuden.
    mast_base_type:
      name: Maston jalustan tyyppi
      description: Määrittää kiinnitysliitännän, joka yhdistää maston piirilevyyn
        tai sovittimeen.
    mast_bend_curve:
      name: Maston joustokäyrä
      description: Maston joustokäyrä, joka määrittää purjeen yhteensopivuuden ja
        käsiteltävyyden.
    mast_diameter_type:
      name: Maston halkaisijan tyyppi
      description: Purjelautamaston standardoitu halkaisijaluokitus (esim. RDM, SDM,
        MDM), jota käytetään yhteensopivuustarkastuksissa.
    mat_backing_type:
      name: Maton taustamateriaalin tyyppi
      description: Määrittää maton alapinnan materiaalin tai pohjan tyypin, joka pitää
        maton paikallaan eri pinnoilla.
    mat_installation_method:
      name: Maton asennustapa
      description: Ilmaisee, miten matto on asennettu tai kiinnitetty paikalleen.
    mat_style:
      name: Mattotyyli
      description: Määrittää maton rakenteellisen tyylin tai muodon (esim. taitettava
        matto, yhteenliitettävä laatta tai alastulomatto).
    maternity_panel_type:
      name: Raskausajan tukipaneelin tyyppi
      description: lmaisee raskausvatsan kasvuun mukautuvan joustavan paneelin tai
        vyötärönauhan tyylin.
    maternity_waistband_style:
      name: Äitiysvyötärönauhan tyyli
      description: Ilmaisee äitiyshousuille ominaisen vyötärön tai vatsapaneelin muotoilun
        ja sijoittelun, joka kuvaa, miten vaate tukee kasvavaa vatsaa.
    mattress_top_type:
      name: Patjanpäällisen tyyppi
      description: Määrittää patjan pintakerroksen tai pintarakenteen tyylin, kuten
        pehmustetun pintakerroksen tai tiiviin pintarakenteen.
    maturation_vessel_material:
      name: Kypsytysastian materiaali
      description: Määrittää shochun kypsytyksessä käytetyn astian tai tynnyrin ensisijaisen
        materiaalin.
    maximum_quilt_size_supported:
      name: Tilkkutäkin suurin tuettu koko
      description: Tilkkutäkin tai projektin enimmäiskoko, jonka kehys pystyy ottamaan
        vastaan (ilmaistaan yleensä sängyn koon tai maksimileveyden mukaan).
    meal_course:
      name: Ruokalajin tyyppi
      description: Yksilöi tuotteelle tyypillisen ruokailutilanteen.
    meal_preparation_state:
      name: Aterian valmistelutila
      description: Ilmaisee, kuinka paljon valmistelua tuote vaatii ennen nauttimista
        (esim. käyttövalmis, ateriasetti).
    meat_processing_state:
      name: Lihan prosessoinnin aste
      description: Ilmaisee lihan kypsennys- tai suolausasteen ennen myyntiä.
    meat_quality_grade:
      name: Lihan laatuluokka
      description: Ilmaisee tunnustetun luokitusviranomaisen lihalle antaman laatuluokan
        tai luokituksen, esimerkiksi USDA-, MSA- tai Wagyu-luokituksen.
    meat_raising_claim:
      name: Lihankasvatusväite
      description: Korostaa lihaan liittyviä yleisiä eläinten hyvinvointia tai tuotantotapaa
        koskevia väittämiä, kuten ruoholla ruokittu tai vapaana kasvanut.
    mechanical_loom_assembly_status:
      name: Koneellisten kangaspuiden kokoamistila
      description: Kangaspuun toimitustapa tai toimitusmuoto kokoonpanotarpeen mukaan.
    mechanical_loom_weaving_type:
      name: Konekudotun rakenteen tyyppi
      description: Kangaspuun ensisijainen kudontamekanismi tai -tyyppi.
    mechanical_puzzle_primary_mechanism:
      name: Mekaanisen pulmapelin ensisijainen mekanismi
      description: Ensisijainen vuorovaikutus/mekanismi, jota käytetään mekaanisen
        pulmapelin ratkaisemiseeN.
    mechanical_puzzle_solution_format:
      name: Mekaanisen pulmapelin ratkaisumuoto
      description: Muoto, jossa vinkkejä/ratkaisuja annetaan, jos niitä on mukana.
    medal_attachment_style:
      name: Mitalin kiinnitystyyppi
      description: Määrittää tavan, jolla mitali on tarkoitettu kannettavaksi tai
        asetettavaksi esille (esim. kaulanauha, rintaneulakiinnitys).
    medal_award_level:
      name: Mitalipalkintotaso
      description: Määrittää mitalin edustaman palkintotason (esim. 1. sija, osallistuja).
    medal_finish:
      name: Mitalin viimeistely
      description: Määrittää mitalin pinnan viimeistelyn (visuaalinen kiilto/tekstuuri)
        materiaalista riippumatta.
    medal_packaging:
      name: Mitalien pakkaus
      description: Ilmaisee mitalin mukana tulevan esillepanopakkauksen tyypin.
    melodica_accessory_set_included:
      name: Melodikan mukana tuleva lisävarustesarja
      description: Melodikan pakkaukseen sisältyvät yleiset lisävarusteet.
    melodica_air_chamber_material:
      name: Melodikan ilmakammion materiaali
      description: Melodikan ilmakammion/rungon materiaali, kuten ABS-muovi tai puu,
        kun myyjät erottavat sen muista osista.
    melodica_included_accessories:
      name: Melodikan mukana tulevat lisävarusteet
      description: Melodikan laatikossa mukana tulevat lisävarusteet.
    melodica_key_color_scheme:
      name: Melodikan koskettimien värijärjestelmä
      description: Ilmaisee koskettimien värityksen rungon värin sijaan. Väritys vaikuttaa
        koskettimien erottuvuuteen erityisesti lasten ja aloittelijoiden kannalta.
    melodica_mouthpiece_configuration:
      name: Melodikan suukappaleen kokoonpano
      description: Ilmaisee, mitkä puhallusliitännät ovat mukana tai mitä liitäntöjä
        käytetään melodikan soittamiseen.
    melodica_mouthpiece_type:
      name: Melodikan suukappaleen tyyppi
      description: Puhallusliitäntätyyli, joka sisältyy melodikaan (suukappale ja/tai
        joustava putki).
    melodica_reed_plate_material:
      name: Melodikan kielilaatan materiaali
      description: Kielilaatan materiaali, joka erotetaan soittimen rungon materiaalista
        ja joka voi vaikuttaa kestävyyteen ja sointiin.
    melodica_size_class:
      name: Melodikan kokoluokka
      description: Melodikan yleinen koko- tai kannettavuusluokka, joka perustuu yleensä
        koskettimien määrään ja rakenteeseen, esimerkiksi mini-/oppilasmallit, vakiomallit
        tai laajennetun äänialan mallit.
    melon_variety:
      name: Melonilajike
      description: Määrittää tuotteessa tietyn melonityypin, jotta ostaja voi nopeasti
        tunnistaa haluamansa lajikkeen.
    memory_foam_infusion_material:
      name: Muistivaahdon lisäainemateriaali
      description: Yksilöi muistivaahtoon sekoitetut viilentämiseen, hajujen hallintaan
        tai antimikrobisiin tarkoituksiin tarkoitetut erityisaineet.
    memory_wire_gauge:
      name: Muistilangan paksuusluokka
      description: Määrittää muistilangan AWG-paksuusluokan.
    memory_wire_project_size:
      name: Muistilankaprojektin koko
      description: Määrittää korun tyypin tai kierukan koon, johon muistilanka on
        muotoiltu, esimerkiksi rannekoru, kaulakoru tai sormus.
    metal_purity:
      name: Metallin puhtaus
      description: Ilmaisee koruissa käytetyn metallin hienous- tai puhtausasteen,
        joka ilmaistaan tyypillisesti karaatteina (K) tai tuhannesosina.
    metrics_counted:
      name: Laskettavat arvot
      description: Luettelee yksittäiset tilastot tai tapahtumat, joita laskuri on
        suunniteltu seuraamaan.
    metronome_display_style:
      name: Metronomin näyttötapa
      description: Määrittää, miten tempo näytetään tai ilmaistaan käyttäjälle, esimerkiksi
        neulalla/heilurilla, numeerisella LED-/LCD-näytöllä tai vilkkuvalla valolla.
    metronome_output_method:
      name: Metronomin äänentoistotapa
      description: Määrittää metronomin äänen/iskusignaalin käytettävissä olevat lähtötavat.
    microphone_toy_feature_set:
      name: Mikrofonilelun ominaisuusvalikoima
      description: Tärkeimmät lelumikrofonien ominaisuudet (ääniefektit, vahvistus,
        tallennus jne.).
    midi_output_type:
      name: MIDI-lähdön tyyppi
      description: Määrittää trigger-moduulin tarjoaman MIDI-lähdön tyypin tai tyypit.
    military_branch:
      name: Puolustushaara
      description: Ilmaisee, mihin puolustushaaraan univormu liittyy tai mistä puolustushaarasta
        se on saanut vaikutteita.
    milk_base_type:
      name: Maidon perusainetyyppi
      description: Määrittää juomassa käytetyn ensisijaisen maidon tai maidon vastikkeen,
        jos sellaista on.
    milk_feeding_method:
      name: Eläinten ruokintatapa
      description: Ilmaisee, miten alkuperäeläimiä on ruokittu (esimerkiksi ruoho-
        tai viljaruokinta), mikä voi vaikuttaa makuun ja ravintosisältöön.
    milk_processing_method:
      name: Maidon käsittelymenetelmä
      description: Ilmaisee, miten maito on käsitelty, mikä vaikuttaa sen turvallisuuteen,
        säilyvyyteen ja ravitsemuksellisiin ominaisuuksiin.
    milk_source_animal:
      name: Maidon alkuperäeläin
      description: Yksilöi eläinlajin, josta maito on peräisin, mikä auttaa kuluttajia
        valitsemaan lehmän-, vuohen-, puhvelin- tai muun eläinperäisen maidon välillä.
    millet_processing_method:
      name: Hirssin käsittelymenetelmä
      description: Ilmaisee hirssinjyvän ensisijaisen käsittelytavan tai tilan (esimerkiksi
        kuorimaton, kuorittu, idätetty).
    millet_variety:
      name: Hirssilajike
      description: Ilmaisee tuotteen sisältämän tietyn hirssilajin, kuten helmihirssin,
        tähkähirssin tai sormihirssin.
    milling_process:
      name: Jauhantaprosessi
      description: Ilmaisee, millä menetelmällä jauho on jauhettu. Menetelmä voi vaikuttaa
        makuun, jauhamisen aikana syntyvään lämpöön ja ravintoarvoihin.
    mint_mark:
      name: Rahapajan tunnus
      description: Kolikossa näkyvä rahapajan tunnus (jos sovellettavissa).
    mirror_configuration:
      name: Peilikonfiguraatio
      description: Ilmaisee, millainen kampauspöytäsettiin sisältyvä peili on tyyliltään
        tai rakenteeltaan.
    mirror_coverage:
      name: Peilien peittävyys
      description: Kuvaa liukuovien peilipaneelien laajuuden.
    mirror_curvature_type:
      name: Peilin kaarevuustyyppi
      description: Määrittää, onko peilin pinta kupera, tasainen vai kovera, mikä
        vaikuttaa näkökenttään.
    mirror_mounting_location:
      name: Peilin kiinnityskohta
      description: Ilmaisee peilin tarkoitetun kiinnityspaikan polkupyörässä tai ajajassa.
    mirror_shape:
      name: Peilin muoto
      description: Ilmaisee meikkipöytäsarjan pääpeilin muodon tai tyylin.
    mix_ratio:
      name: Sekoitussuhde
      description: Määrittää jäähdytysnesteen ja veden suositellun laimennussuhteen
        (tiivisteille) tai vahvistaa käyttövalmiiden tuotteiden kiinteän esisekoitussuhteen.
    mma_glove_type:
      name: MMA-käsineen tyyppi
      description: Ilmaisee, onko hanska tarkoitettu ensisijaisesti esimerkiksi MMA-harjoitteluun,
        sparraukseen vai kilpailukäyttöön.
    mobility_features:
      name: Liikkuvuusominaisuudet
      description: Ilmaisee sisäänrakennetut liikkumis- tai siirrettävyysominaisuudet,
        kuten pyörät tai kokoontaitettavat jalat.
    model_aircraft_assembly_level:
      name: Mallilentokoneiden kokoonpanotaso
      description: Ilmaisee, kuinka paljon rakentamista tarvitaan ennen kuin lentokonetta
        voidaan käyttää.
    model_making_kit_items_included:
      name: Pienoismallin rakennussarjan sisältö
      description: Luettelee, mitä pienoismallin pakkaukseen tai tuotepakettiin sisältyy
        (esim. maali, liima, sivellin).
    model_making_product_type:
      name: Pienoismallituotteen tyyppi
      description: Ilmaisee tuotteen perustyypin pienoismallien rakentamisen kategoriassa,
        kuten rakennussarja, lisävaruste, työkalu tai tarvikemateriaali.
    model_rocket_kit_contents:
      name: Pienoismalliraketin rakennussarjaan sisältyvät osat
      description: Ilmaisee, onko tuote kokonainen monivaiheinen pienoismallirakettisarja
        vai lisäosa/moduuli/osien sarja (esimerkiksi boosterin tai ylävaiheen komponentit).
    model_rocket_kit_format:
      name: Mallirakettipakkauksen muoto
      description: Määrittää, myydäänkö raketti pakkauksena ja sen kokoonpanovalmiustason.
    model_rocket_motor_impulse_class:
      name: Rakettimoottorin impulssiluokka
      description: Ilmaisee standardoidun rakettimoottorin mallin impulssiluokan (esim.
        A, B, C...).
    model_rocket_motor_mount_size:
      name: Rakettimoottorin kiinnikkeen koko
      description: Määrittää moottorin rungon halkaisijan, jolle raketin moottorikiinnike
        on suunniteltu.
    model_rocket_power_source_required:
      name: Vaadittu malliraketin virtalähde
      description: Ilmaisee, tarvitseeko tuote paristoja tai ulkoista virtalähdettä
        ja minkä tyyppisiä.
    model_rocket_propellant_type:
      name: Rakettimoottorin ajoaineen tyyppi
      description: Ilmaisee pienoismalliraketin työntövoiman tuottavan ajoaine- tai
        moottorijärjestelmän.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Suositeltu laukaisutangon tai -kiskon koko
      description: Määrittää laukaisutangon halkaisijan tai laukaisukiskon koon, jolle
        raketti on suunniteltu, esimerkiksi 1/8 tuuman laukaisutanko tai 1010-laukaisukisko.
    model_rocket_recovery_method:
      name: Raketin palautusmenetelmä
      description: Ensisijainen palautusjärjestelmä, jolla raketti palautetaan turvallisesti
        lennon jälkeen.
    model_rocket_recovery_system_type:
      name: Raketin palautusjärjestelmän tyyppi
      description: Ilmaisee ensisijaisen menetelmän, jolla raketti palautetaan turvallisesti
        maahan lennon jälkeen.
    model_rocket_staging:
      name: Pienoismalliraketin vaiheistus
      description: Ilmaisee, kuinka monella moottorivaiheella pienoismalliraketti
        on suunniteltu lentämään.
    model_train_accessory_electrical_connection_type:
      name: Pienoisrautatietarvikkeen sähköliitäntätyyppi
      description: Määrittää liitin- tai liitäntätyypin, jota käytetään moottoroitujen
        pienoismallijunien lisälaitteiden kytkemiseen rataverkkoon (jos sovellettavissa).
    model_train_coupler_type:
      name: Pienoismallijunan kytkintyyppi
      description: Määrittää pienoismallijunan vaunuihin tai veturiin asennetun kytkinstandardin.
    model_train_gauge:
      name: Mallijunan raideleveys
      description: Määrittää pienoismallirautatien raideleveysjärjestelmän, johon
        lisälaite on tarkoitettu (jos sovellettavissa), mikä varmistaa fyysisen yhteensopivuuden
        käyttäjän rataosien ja pienoisrautatien kanssa.
    model_train_lighting_features:
      name: Mallijunan valaisuominaisuudet
      description: Määrittää pienoismallin/veturin valaistustoiminnot.
    model_train_power_pickup_method:
      name: Pienoismallijunan virranottotapa
      description: Määrittää, miten pienoismalli saa käyttövoimansa (ratavirta, akku
        jne.).
    model_train_scale:
      name: Mallijunan mittakaava
      description: Määrittää pienoismallijunan mittakaavastandardin (pienoismallin
        ja todellisen junan välinen suhde).
    model_train_sound_features:
      name: Pienoismallijunan äänitoiminnot
      description: Ilmaisee, sisältääkö pienoismalli sisäänrakennettuja äänitehosteita
        ja minkä tyyppisiä äänitoimintoja se tarjoaa.
    model_train_track_gauge:
      name: Pienoismallijunan raideleveys
      description: Määrittää raideleveyden tai raidejärjestelmän standardin, jolla
        pienoismallin on suunniteltu kulkevan (esim. normaaliraideleveys, kapearaiteiset
        variantit tai merkki- tai järjestelmäkohtaiset raideleveydet soveltuvin osin).
    modeling_dough_base_material:
      name: Muovailuvahan pohjamateriaali
      description: Muovailuvahan pääasiallinen pohja/koostumus (esim. vehnä/jauhopohjainen
        tai polymeeripohjainen).
    modeling_dough_features:
      name: Muovailuvahan ominaisuudet
      description: Muovailuvahan keskeiset toiminnalliset ominaisuudet, joiden perusteella
        ostajat yleensä suodattavat tuotteita.
    modification_level:
      name: Muokkaustaso
      description: Ilmaisee maltaan muokkausasteen (kuinka perusteellisesti ohran
        tärkkelys- ja proteiinirakenne on pilkkoutunut), mikä tiivistetään usein muotoon
        alimuokattu, muokattu tai ylimuokattu.
    molasses_base_ingredient:
      name: Melassin pääraaka-aine
      description: Yksilöi kasvin tai hedelmän, josta melassi on ensisijaisesti valmistettu.
    molasses_grade:
      name: Melassilaatu
      description: Luokittelee melassin uutto- tai jalostusvaiheen mukaan, mikä vaikuttaa
        suoraan maun voimakkuuteen, väriin ja ravintoarvoihin.
    mold_material:
      name: Muotin materiaali
      description: Itse muotin ensisijainen materiaalikoostumus (esim. silikoni, muovi,
        metalli).
    molle_compatibility:
      name: MOLLE-yhteensopivuus
      description: Ilmaisee, sisältääkö liivi MOLLE/PALS-nauhakujastoa modulaaristen
        taskujen ja lisävarusteiden kiinnittämistä varten.
    motor_belt_type:
      name: Moottorin hihnan tyyppi
      description: Määrittää juoksumaton vetojärjestelmässä käytettävän hihnan mallin/profiilin.
    motor_configuration:
      name: Moottorin kokoonpano
      description: Ilmaisee, kuinka montaa erillistä käyttömoottoria sähköskootteri
        käyttää.
    motor_mounting_configuration:
      name: Moottorin asennuskokoonpano
      description: Kuvailee, miten moottori on asennettu tai toteutettu sähköskootterin
        muunnossarjassa.
    motor_mounting_position:
      name: Moottorin asennussijainti
      description: Ilmaisee, mihin kohtaan sähköskootteria moottori on asennettu,
        kuten etunapaan, takanapaan, molempiin napoihin (dual) tai keskiövetoisesti.
    motor_position:
      name: Moottorin sijainti
      description: Ilmaisee, missä kohtaa sähköpolkupyörän moottori sijaitsee, mikä
        vaikuttaa ajettavuuteen ja huollettavuuteen.
    motor_vehicle_a_v_integration_features:
      name: Moottoriajoneuvojen A/V-integraatio-ominaisuudet
      description: Älypuhelin- ja ajoneuvointegraatio-ominaisuudet, joita keskusyksikkö
        tukee (esim. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Ajoneuvon polttimon käyttökohde tai sijainti
      description: Määrittää ajoneuvon valaisimen suunnitellun sijainnin tai toiminnon,
        jota varten polttimo on tarkoitettu (esim. lähivalo, jarruvalo).
    motor_vehicle_bulb_approval_standard:
      name: Ajoneuvon polttimon hyväksyntästandardi
      description: Ilmaisee tieliikennekäyttöä koskevan säädöstenmukaisuuden tai hyväksyntämerkinnän
        kohdemaassa.
    motor_vehicle_oxygen_sensor_bank:
      name: Moottoriajoneuvon happianturin ryhmä
      description: Ilmaisee, mihin moottorin sylinteriryhmään happianturi sopii (esim.
        lohko 1 tai lohko 2) V-moottoreissa tai bokserimoottoreissa; käytä "Ei sovelleta"
        rivimoottoreissa.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Moottoriajoneuvon happianturin johtojen määrä
      description: Happianturin johtosarjan johtojen määrä.
    motor_vehicle_oxygen_sensor_position:
      name: Ajoneuvon happianturin sijainti
      description: Määrittää, mihin kohtaan pakoputkistoa happianturi (O2-anturi)
        on asennettu suhteessa katalysaattoriin.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Ajoneuvon happianturin anturinumero
      description: Ilmaisee anturin numeron (esim. anturi 1 tai anturi 2) tietyssä
        lohkossa tai sijainnissa.
    motor_vehicle_oxygen_sensor_type:
      name: Moottoriajoneuvon happianturin tyyppi
      description: Määrittää happianturin rakenteen/teknologian.
    motor_vehicle_paint_application_method:
      name: Moottoriajoneuvon maalin levitysmenetelmä
      description: Miten maali on tarkoitus levittää ajoneuvon pinnalle.
    motor_vehicle_paint_system_step:
      name: Moottoriajoneuvon maalausjärjestelmän vaihe
      description: Ilmaisee, mihin vaiheeseen tai osaan auton maalausjärjestelmää
        tuote on tarkoitettu (esim. pohjamaali, pintamaali, lakka).
    motor_vehicle_speaker_mounting_type:
      name: Moottoriajoneuvon kaiuttimen kiinnitystyyppi
      description: Kaiuttimen asennustapa ajoneuvossa (asennusmuoto).
    motor_vehicle_subwoofer_size:
      name: Moottoriajoneuvon bassokaiuttimen koko
      description: Subwoofer-elementin nimellishalkaisija (esim. 8 tuumaa, 10 tuumaa,
        12 tuumaa), jota käytetään ajoneuvon tilan ja kotelon yhteensopivuuden määrittämiseen.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Ajoneuvon subwooferin puhekelan kokoonpano
      description: Puhekelojen määrä tai kokoonpano, jota käytetään sovittamiseen
        vahvistimen kytkentävaihtoehtojen kanssa (esim. SVC eli yksi puhekela ja DVC
        eli kaksi puhekelaa).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Moottoriajoneuvon subwooferin puhekelan impedanssi (kelaa kohden)
      description: Kunkin puhekelan impedanssiarvo (ei lopullinen kytkentäkuorma),
        jota käytetään kytkentälaskelmissa.
    motor_vehicle_voltage_regulator_type:
      name: Moottoriajoneuvon jännitteensäätimen tyyppi
      description: Ilmaisee moottoriajoneuvoissa käytetyn jännitteensäätimen teknologian
        tai rakenteen.
    motorcycle_armor_certification_standard:
      name: Moottoripyörän panssarien sertifiointistandardi
      description: Ilmaisee viralliset turvallisuusstandardit, joiden mukaisiksi suojat
        on sertifioitu (esim. EN 1621-2 selkäsuojille, EN 1621-3 rintasuojille).
    motorcycle_cover_size_class:
      name: Moottoripyöräpeitteen kokoluokka
      description: Moottoripyöräpeitteen standardoitu kokoluokka, joka perustuu tyypilliseen
        moottoripyörän luokkaan tai pituusalueeseen, jolle peite sopii.
    motorcycle_glove_certification_standard:
      name: Moottoripyöräkäsineiden sertifiointistandardi
      description: Määrittää suojauksen sertifioinnin tai standardin, jonka mukaisia
        käsineet ovat (esim. standardin EN 13594 mukaiset tasot).
    motorcycle_glove_waterproof_construction:
      name: Moottoripyöräkäsineen vedenpitävä rakenne
      description: Määrittää käsineissä käytetyn vedenpitävyysmenetelmän (jos on).
    motorcycle_guard_coverage_area:
      name: Moottoripyörän suojan peittoalue
      description: Tuotteen tarjoama ensisijainen suoja-alue (kyynärpää, ranne, kyynärvarsi,
        yhdistelmä).
    motorcycle_kidney_belt_construction_type:
      name: Moottoripyöräilijän munuaisvyön rakenne
      description: Munuaisvyön rakennetyyli, joka vaikuttaa tukevuuteen, ilman kulkuun
        ja suojaukseen.
    motorcycle_kidney_belt_purpose:
      name: Moottoripyöräasun munuaisvyön tarkoitus
      description: Ilmaisee ensisijaisen ajotyylin tai käyttötilanteen, johon moottoripyöräilijän
        munuaisvyö on suunniteltu.
    motorcycle_luggage_capacity_class:
      name: Moottoripyörän laukkujen kokoluokka
      description: Ilmaisee moottoripyörän laukkujen tilavuuden litroina.
    motorcycle_luggage_mounting_system:
      name: Moottoripyörän laukkujen kiinnitysjärjestelmä
      description: Kiinnitys- tai asennusjärjestelmä, jolla laukku tai sivulaukku
        kiinnitetään moottoripyörään (esim. heittohihnat, telineeseen asennettava
        pikakiinnitys).
    motorcycle_luggage_side:
      name: Moottoripyörän laukkujen puolisuus
      description: Sivulaukuissa tämä ilmaisee, onko tuote tarkoitettu vasemmalle
        puolelle, oikealle puolelle vai pariksi/sarjaksi.
    motorcycle_protective_gear_size_system:
      name: Moottoripyörän suojavarusteiden kokojärjestelmä
      description: Ilmaisee tuotteessa käytetyn kokojärjestelmän (esim. kirjainkoko,
        numeerinen, yksi koko).
    motorcycle_rack_carrier_style:
      name: Moottoripyörän kuljetustelineen tyyppi
      description: Kuvailee moottoripyörän tai skootterin kuljettamiseen tarkoitetun
        telineen toiminnallisen tyypin (taso-, kisko- tai nostoavusteinen teline jne.).
    motorcycle_riding_discipline:
      name: Moottoripyöräilyn ajotyyli
      description: Ilmaisee ensisijaisen ajo-/käyttölajin, jota varten niskatuki on
        suunniteltu.
    motorcycle_tire_speed_rating:
      name: Moottoripyörän renkaan nopeusluokitus
      description: Ilmaisee renkaan suurimman sallitun jatkuvan nopeuden standardinmukaisella
        kirjainkoodilla (esim. H, V, W).
    motorsport_window_net_certification:
      name: Moottoriurheilun ikkunaverkon sertifiointi
      description: Moottoriurheilun turvasertifiointi tai luokittelu, jonka ikkunaverkko
        täyttää (esim. SFI tai FIA), mukaan lukien tarvittaessa tekninen eritelmänumero.
    mound_usage_type:
      name: Kummun käyttötapa
      description: Määrittää kummun aiotun sovellusympäristön, kuten harjoitus, peli,
        bullpen tai monikäyttöinen.
    mount_attachment_method:
      name: Asennuksen kiinnitysmenetelmä
      description: Määrittää, miten teline kiinnitetään ajoneuvon pintaan/rakenteeseen.
    mountainboard_truck_type:
      name: Mountainboard-trukin tyyppi
      description: Luokittelee lautaan kuuluvien trukkien tyypin, joka vaikuttaa kääntymisvasteeseen
        ja kestävyyteen.
    mounting_attachment_method:
      name: Kiinnitystapa
      description: Kuvaa, miten pidike tai laukku on suunniteltu kiinnitettäväksi
        rumpuun, telineeseen, vyöhön tai muuhun pintaan.
    mounting_attachment_type:
      name: Asennus-/liitostyyppi
      description: Kuvaa, miten välityssuhdetarvike kiinnittyy tai liittyy rukkiin.
    mounting_hardware_included_for_installation:
      name: Kiinnityslaite sisältyy (asennusta varten)
      description: Ilmaisee, sisältyvätkö takapenkin asentamiseen tarvittavat kiinnitystarvikkeet
        (esim. kiinnikkeet, pultit, kiskot) tuotteen toimitukseen.
    mounting_location:
      name: Asennuskohta
      description: Määrittää valolle/heijastimelle tarkoitetun sijoitusalueen varusteissa
        tai korissa (esim. etuhaarukka, kypärä, pyörän pinnat).
    mounting_method:
      name: Kiinnitystapa
      description: Kuvaa, miten varsi- tai harjateline kiinnittyy (esim. puristinkiinnitys,
        hihna- tai remmikiinnitys, tarrakiinnitys).
    mounting_position:
      name: Asennussijainti
      description: Määrittää paikan, johon käsijarrun vipu on tarkoitettu asennettavaksi
        ajoneuvon matkustamossa.
    mounting_rail_type:
      name: Asennuskiskon tyyppi
      description: Määrittää kiskon tai liitäntästandardin, johon lisävaruste kiinnittyy,
        kuten Picatinny tai M-LOK.
    mounting_receiver_size:
      name: Kiinnitysvastaanottimen koko
      description: Vetokoukun vastaanottimen koko, joka vaaditaan vetokoukkuun kiinnitettäville
        tavaratelineille.
    mounting_storage_type:
      name: Kiinnitys-/säilytystilatyyppi
      description: Miten laite on tarkoitettu asennettavaksi tai säilytettäväksi aluksessa/henkilöllä.
    mouth_grip_type:
      name: Suukappaleen tyyppi
      description: Kuvailee pillin suukappaleen tai suojan tyypin, joka parantaa käyttömukavuutta
        ja hygieniaa.
    mouthguard_mold_type:
      name: Hammassuojan muotin tyyppi
      description: Kuvaa, miten hammassuoja sovitetaan urheilijan hampaisiin (esim.
        kuumana muotoiltava malli, yksilöllinen hammaslääkärin tekemä sovitus).
    mouthpiece_facing_length:
      name: Suukappaleen viisteen pituus
      description: Ilmaisee suukappaleen viisteen kaaren pituusluokan (ei koko suukappaleen
        pituutta), mikä vaikuttaa äänen syttyvyyteen, vasteeseen ja ruokolehtien yhteensopivuuteen.
    mouthpiece_material:
      name: Suukappaleen materiaali
      description: Määrittää juhlapillin suukappaleen tai kärjen materiaalin, joka
        voi poiketa rungon materiaalista.
    mouthpiece_shank_receiver_size:
      name: Suukappaleen varren tai vastakappaleen koko
      description: Määrittää flyygelitorven kanssa yhteensopivan suukappaleen vastakappaleen
        tai varren standardin.
    mouthpiece_shank_size:
      name: Suukappaleen varren koko
      description: Määrittää suukappaleen varren tai vastakappaleen istuvuusstandardin,
        jolla varmistetaan yhteensopivuus vaskipuhaltimen kanssa.
    mouthpiece_shank_type:
      name: Suukappaleen varren tyyppi
      description: Määrittää suukappaleen vastakappaleen tai varren standardin yhteensopivuutta
        varten (jos sovellettavissa).
    mouthpiece_style:
      name: Suukappaleen tyyli
      description: Luokittelee kuolainosan suukappaleen muotoilun, joka vaikuttaa
        painepisteisiin, voimakkuuteen ja hevoskohtaisiin mieltymyksiin.
    mouthpiece_type:
      name: Suukappaleen tyyppi
      description: Suukappaleen tyyppi puhalluspäässä (sisäänrakennettu, irrotettava
        tai lisättävä malli).
    movement_mechanism:
      name: Liikemekanismi
      description: Määrittää, miten penkki liikkuu käytön aikana (heiluva, liukuva,
        keinuva jne.).
    muffin_size:
      name: Muffinin koko
      description: Luokittelee muffinituotteen fyysisen kokoluokan (esim. mini, normaali,
        jumbo).
    mushroom_variety:
      name: Sienilajike
      description: Yksilöi tuotteessa olevan sienen tai tryffelin tarkan lajin tai
        lajikkeen (esim. siitake, kuningasvinokas, mustatryffeli).
    music_stand_desk_tilt_adjustment:
      name: Nuottitelineen tason kallistussäätö
      description: Ilmaisee, voiko tason kulmaa säätää ja miten säätö tapahtuu.
    music_stand_intended_use:
      name: Nuottitelineen käyttötarkoitus
      description: Ilmaisee telineen ensisijaisen käyttötarkoituksen tai käyttöympäristön.
    musical_block_pitch_type:
      name: Rytmikapulan viretyyppi
      description: Kuvaa, tuottaako rytmikapula määrätyn sävelkorkeuden (viritetty)
        vai määrittelemättömän sävelkorkeuden.
    musical_box_mechanism_type:
      name: Soittorasian mekanismin tyyppi
      description: Miten soittorasia tuottaa tai toistaa ääntä (esim. mekaaninen jousikoneisto
        tai elektroninen toisto).
    musical_keyboard_case_fit_type:
      name: Kosketinsoittimen laukun istuvuustyyppi
      description: Kuvailee, miten laukku on mitoitettu soittimelle (esim. yleismalli
        / yleinen kokoluokka tai mallikohtainen/mittatilausmalli).
    musical_ratchet_sound_character:
      name: Räikkäsoittimen sointi
      description: Räikkäsoittimen sointivärin/äänenvoimakkuuden yleinen kuvaus.
    musical_scraper_groove_surface_material:
      name: Raappasoittimen uran pintamateriaali
      description: Määrittää uritetun tai uritetun raaputuspinnan materiaalin (voi
        poiketa rungon materiaalista).
    musical_scraper_type:
      name: Raappasoitintyyppi
      description: Määrittää raappasoittimen tyypin/rakenteen (esim. guiro tai reco-reco),
        mikä vaikuttaa ääneen ja soittotekniikkaan.
    mute_attachment_method:
      name: Vaimentimen kiinnitysmenetelmä
      description: Määrittää, miten symbaalin vaimennin kiinnittyy symbaaliin tai
        pysyy paikallaan (esim. geeli, staattinen kiinnitys, magneetti, klipsi).
    mute_attenuation_level:
      name: Vaimennustaso
      description: Ilmaisee, kuinka paljon vaimennin vähentää koettua äänenvoimakkuutta;
        erityisen tärkeää harjoitteluvaimentimien kohdalla.
    mute_cork_padding_material:
      name: Vaimenninkorkin tai -pehmusteen materiaali
      description: Määrittää vaimentavan pehmusteen (esim. korkkisuikaleet tai -tyynyt)
        materiaalin, jota käytetään otteen ja pidon varmistamiseen ja soittimen kellon
        suojaamiseen.
    mute_coverage_type:
      name: Vaimentimen peittävyystyyppi
      description: Ilmaisee vaimentimen tyylin tai peittävyyden soittopinnalla, vaihdellen
        pienistä täplävaimentimista koko pinnan peittäviin harjoitteluvaimentimiin.
    mute_finish:
      name: Vaimentava pinta
      description: Vaimentimen pintakäsittely, joka voi vaikuttaa kestävyyteen ja
        ulkonäköön (esim. kiillotettu tai satiini).
    name_label_text_template:
      name: Lapun tekstipohja
      description: Määrittää lappuun painetun esiasetetun tekstin tai pohjan (esim.
        "Kuuluu henkilölle", "Valmistaja").
    napkin_ply:
      name: Servietin kerrosmäärä
      description: Ilmaisee cocktail-servietin paksuuden kerrosten lukumääränä.
    neck_brace_fit_system:
      name: Niskatuen säätöjärjestelmä
      description: Ilmaisee pääasiallisen tavan, jolla niskatuki säädetään ja kiinnitetään
        ajajaan.
    neck_brace_size_basis:
      name: Niskatuen koon mittaustapa
      description: Ilmaisee oikean kokoisen niskasuojan valintaan käytettävän mittaustavan.
    neck_configuration:
      name: Kaulan konfiguraatio
      description: Määrittää saksofonin mukana tulevan kaulahihnan tyypin tai kokoonpanon,
        mikä vaikuttaa ergonomiaan ja soitettavuuteen.
    neck_coverage_type:
      name: Kaulan peitteen tyyppi
      description: Määrittää peiton mukana tulevan kaulaosan peittävyyden.
    neck_support_size_system:
      name: Kaulatuen kokojärjestelmä
      description: Ilmaisee kilpa-ajoon tarkoitetun niskatuen kokojärjestelmän (esim.
        aikuisten, nuorten tai yksi koko).
    necklace_length_type:
      name: Kaulakorun pituustyyppi
      description: Määrittää kaulakorun perinteisen pituuskategorian, kuten choker
        tai opera, mikä helpottaa oikean tyylisen korun ostamista.
    needle_balance_zone:
      name: Neulan tasapainotusalue
      description: Ilmaisee magneettisen tasapainoalueen tai pallonpuoliskon, jolle
        kompassineula on säädetty, mikä varmistaa tarkat lukemat maailmanlaajuisesti.
    needle_case_format:
      name: Neulakotelon muoto
      description: Neulakotelon yleinen muoto.
    needle_damping_type:
      name: Neulan vaimennustyyppi
      description: Kuvailee, miten kompassineula on vakautettu (esim. nestetäytteinen,
        kuiva tai elektronisesti vakautettu), mikä vaikuttaa asettumisaikaan ja kestävyyteen.
    needle_felting_needle_profile:
      name: Huovutusneulan profiili
      description: Huovutusneulan poikkileikkaus tai profiili, joka vaikuttaa kuitujen
        siirtymiseen ja lopputulokseen.
    needle_holder_features:
      name: Neulanpitimen ominaisuudet
      description: Neulanpitimen huomionarvoiset toiminnalliset ominaisuudet.
    needle_holder_mounting_attachment_method:
      name: Neulanpitimen kiinnitystapa
      description: Kuvailee, miten neulanpidin on tarkoitettu kiinnitettäväksi tai
        käytettäväksi säilytyksen aikana (esim. magneettinen, klipsi tai hihna).
    needle_holder_style:
      name: Neulanpitimen tyyppi
      description: Neulanpidikkeen fyysinen säilytys- tai kantotapa tai sen muotoilu.
    needle_pushing_surface_type:
      name: Neulan paininpinnan tyyppi
      description: Ompelukämmenen neulan paininpinnan tyyppi tai muotoilu (esim. metallinen
        kuoppa, kolikko tai vahvistettu paikka).
    needle_requirement_beading_pattern:
      name: Neulavaatimus (helmikirjontakuvio)
      description: Ohjeen suosittelema neulan tyyppi/koko.
    needle_size_system:
      name: Neulan kokojärjestelmä
      description: Neulakoon merkitsemisen kokostandardi.
    needle_threader_compatible_needle_type:
      name: Neulan langoittajaan sopiva neulatyyppi
      description: Määrittää, minkä tyyppisten neulojen kanssa langoittaja on suunniteltu
        toimimaan (neulaluokan tai käyttötarkoituksen mukaan).
    needle_threader_mechanism_type:
      name: Neulan langanpujottimen mekanismityyppi
      description: Kuvailee, miten langoittaja tarttuu lankaan tai vetää sen neulansilmän
        läpi.
    needle_threader_packaging_type:
      name: Neulan langoittajan pakkaustyyppi
      description: Tuotteen myynti/pakkaustapa (yksittäin tai monipakkaus tai sarja).
    needlecraft_fabric_color_family:
      name: Kirjontakankaan värisarja
      description: Evenweave-kankaan normalisoitu värisarja (käytetään ryhmittelyyn
        värin ohessa).
    needlecraft_fabric_composition:
      name: Kirjontakankaan koostumus
      description: Määrittää kirjontakankaan kuitukoostumuksen tai sekoitteen (esim.
        100 % puuvilla, pellava-puuvillasekoite).
    needlecraft_fabric_weave_type:
      name: Kirjontakankaan sidostyyppi
      description: Määrittää pellavaisen kirjontakankaan sidoksen tai rakenteen (esim.
        evenweave tai perinteinen pellava), mikä vaikuttaa pistojen käyttäytymiseen
        ja ulkonäköön.
    needlecraft_kit_items_included:
      name: Kirjontasarjan mukana tulevat osat
      description: Luettelee kirjontasarjan pääosat (työvälineet ja tarvikkeet).
    needlecraft_kit_project_type:
      name: Kirjontasarjan projektityyppi
      description: Yksilöi sarjan valmiin tuotteen (projektin lopputulos).
    needlecraft_stitching_coverage:
      name: Kirjontatyön peittävyysaste
      description: Ilmaisee, tehdäänkö ommel yhden langan/ruudun yli vai kahden langan
        yli (yleistä evenweave-kankaille ja pellavalle).
    needlepoint_canvas_mesh_count:
      name: Kirjontakankaan silmätiheys
      description: Suunniteltu kankaan verkkotiheys (lankaa tuumaa kohden), jolle
        kuvio on laadittu (yleisesti canvas count).
    needlepoint_frame_canvas_attachment_method:
      name: Kirjontakehyksen kankaan kiinnitysmenetelmä
      description: Kuvailee, miten kirjontakangas kiinnitetään kehykseen.
    needlepoint_frame_compatible_stand_type:
      name: Kirjontakankaan kehykseen sopiva jalustatyyppi
      description: Jos kehys on suunniteltu kiinnitettäväksi telineeseen, tämä täsmentää
        yhteensopivat telinetyypit.
    needlepoint_frame_contents:
      name: Kirjontakankaan kehyksen sisältö
      description: Määrittää, mitä osia ja tarvikkeita kirjontakehyksen mukana toimitetaan
        (esim. kehys, lisätangot, nastat/neulat, kiinnitysnauhat, kantolaukku).
    needlepoint_frame_tension_adjustment_type:
      name: Kirjontakehyksen kireydensäätötapa
      description: Ilmaisee, miten (tai voiko) kehyksen kireyttä säätää käytön aikana.
    needlepoint_pattern_chart_format:
      name: Pistokirjonnan kuviokaavion muoto
      description: Määrittää, miten kirjontamalli on esitetty kirjontaa varten (kaavio
        tai painettu/maalattu pohja).
    needlepoint_project_type:
      name: Kirjontatyön tyyppi
      description: Kirjontamallin tarkoitettu lopputuote tai tuotekategoria.
    net_design:
      name: Verkon rakenne
      description: Yksilöi verkon rakennetyypin ja sen, voidaanko se vetää sisään
        tai taittaa kantamista varten.
    net_mesh_pattern:
      name: Verkon kuviointi
      description: Määrittää verkon aukkojen geometrisen muodon, mikä voi vaikuttaa
        näkyvyyteen ja kestävyyteen.
    net_twine_gauge:
      name: Verkon langan paksuus
      description: Ilmoittaa verkon langan paksuuden tai lujuuden, joka ilmaistaan
        perinteisesti lukuarvona (esim. 18, 36).
    nicotine_source:
      name: Nikotiinin lähde
      description: Ilmaisee, onko tuotteen sisältämä nikotiini tupakkapohjaista, synteettistä
        vai sisältääkö tuote lainkaan nikotiinia.
    nipple_drive_interface:
      name: Nipan vääntiöliitäntä
      description: Täsmentää nipan vääntiöliitännän tai pään tyylin/standardin (ulkoinen
        tai sisäinen), mikä määrittää tarvittavan työkalun ja kiekon rakennustavan.
    nock_activation_method:
      name: Nokin aktivointitapa
      description: Määrittää mekanismin, jolla valaistun nuolen nokin LED-valo syttyy
        tai sammuu (esim. jänteen paine, liike, manuaalinen kytkin).
    nock_fitment_code:
      name: Nokin sovituskoodi
      description: Valmistajan tai alan koodi, joka yksilöi nokin tuoteperheen tai
        sarjan, johon se kuuluu.
    nock_throat_size:
      name: Nokkiuran koko
      description: Määrittää jousijänteeseen napsahtavan nokkiuran koon.
    nock_transparency_level:
      name: Nokin läpinäkyvyystaso
      description: Kuvailee nokin materiaalin läpinäkyvyyttä – kirkas, läpikuultava,
        peittävä tai pimeässä hohtava – mikä vaikuttaa näkyvyyteen ja ulkonäköön.
    nock_type:
      name: Nokkityyppi
      description: Määrittää nuolen tai vasaman nokin muotoilun, kuten pinninokki,
        puolikuu tai valaistu.
    noise_reduction_type:
      name: Melunvaimennuksen tyyppi
      description: Ilmoittaa kypärän integroidussa kuulokkeissa käytetyn melunvaimennusteknologian
        (tai ei käytössä).
    noise_suppression_technology:
      name: Melunvaimennustekniikka
      description: Määrittää, käytetäänkö tuotteessa passiivista vaimennusta vai aktiivista
        elektronista piiriä, joka vaimentaa kovia ääniä ja/tai vahvistaa ympäristön
        ääniä.
    non_slip_base_features:
      name: Liukuestepohjan ominaisuudet
      description: Ilmaisee liukuesteominaisuudet, jotka estävät poljinta liikkumasta
        käytön aikana.
    nose_bridge_type:
      name: Nenäsillan tyyppi
      description: Ilmoittaa nenäsillan rakenteen, joka vaikuttaa istuvuuteen eri
        kokoisille kasvoille.
    nose_clip_accessories_included:
      name: Mukana tulevat nenäklipsitarvikkeet
      description: Luettelee kaikki uimanenäklipsin mukana tulevat lisävarusteet (esim.
        korvatulpat, säilytyskotelo).
    nose_clip_features:
      name: Nenäklipsin ominaisuudet
      description: Korostaa nenäklipsin yleisiä toiminnallisia tai mukavuuteen liittyviä
        ominaisuuksia.
    nose_coverage_style:
      name: Turvan peitteen tyyli
      description: Ilmoittaa kärpäsmaskin nenä- tai kuonosuojan olemassaolon ja tyypin.
    noseband_type:
      name: Turpahihnan tyyppi
      description: Määrittää suitsien mukana tulevan turpahihnan mallin (jos sellainen
        on).
    number_of_canvas_meshes:
      name: Kankaan silmäluku
      description: Muovikanavalevyn silmäkoko, joka ilmaistaan reikinä tuumaa kohden
        (HPI) tai tiheytenä, mikä määrittää pistokoon ja käsityön yksityiskohtaisuuden.
    number_of_chainrings:
      name: Eturattaiden lukumäärä
      description: Ilmaisee, kuinka monelle eturattaalle kampi on suunniteltu asennettavaksi
        tai kuinka monta ratasta sen mukana toimitetaan.
    number_of_control_stations:
      name: Ohjauspisteiden lukumäärä
      description: Ilmaisee ohjaussarjan tukemien ohjauspisteiden määrän (yksi- vai
        kaksipisteohjaus jne.).
    number_of_digits:
      name: Numeroiden lukumäärä
      description: Näytön numeroiden määrä (esim. 1-numeroinen, 2-numeroinen, 3-numeroinen).
    number_of_guitar_slots:
      name: Kitarapaikkojen lukumäärä
      description: Ilmaisee, kuinka monelle kitaralle laukku/keikkapussi on suunniteltu.
    number_of_needlecraft_fabrics:
      name: Kirjontakankaiden lukumäärä
      description: Määrittää kirjontakankaan tiheyden, joka ilmaistaan yleensä ruutuina
        tai lankoina tuumaa kohden (esim. 14-count).
    number_of_plastic_canvas_meshes:
      name: Muovikanavan silmämäärä
      description: Määrittää muovikanavan silmäluvun (reikiä tuumaa kohden), joka
        määrittää pistokoon ja työn yksityiskohtaisuuden tason.
    number_of_quilting_frame_rails:
      name: Tikkauksessa käytettävien kehysten tankojen määrä
      description: Tikkauskehykseen sisältyvien tankojen tai telojen määrä (esim.
        2-tankoinen vs. 3-tankoinen järjestelmä).
    number_of_rope_slots:
      name: Köysipaikkojen lukumäärä
      description: Ilmaisee, onko varmistuslaite suunniteltu käytettäväksi yhdellä
        vai kahdella köydellä.
    number_of_switch_poles:
      name: Kytkimen napojen lukumäärä
      description: Kytkimen ohjaamien erillisten virtapiirien (napojen) määrä (esim.
        SPST, DPST).
    number_of_switch_throws:
      name: Kytkimen kytkentäasentojen määrä
      description: Kytkentäasentojen määrä napaa kohden (esim. SPDT).
    number_of_timing_chain_rows:
      name: Jakoketjun rivien lukumäärä
      description: Ilmaisee, onko jakoketju yksirivinen vai monirivinen.
    number_of_trailer_axles:
      name: Perävaunun akselien lukumäärä
      description: Perävaunun akselien lukumäärä.
    number_of_wheel_pieces:
      name: Pyörän osien lukumäärä
      description: Määrittää, onko vanne yksiosainen, kaksiosainen vai kolmiosainen.
    numbering_style:
      name: Numerointitapa
      description: Ilmaisee, onko numerolaput esinumeroitu joukkueen tunnistamista
        varten ja miten (esim. numeroimaton, 1–10, mukautettu).
    nunchuck_connector_type:
      name: Nunchakun kapuloiden yhdistäjä
      description: Nunchakun kahden kapulan yhdistäjän tyyppi (esim. köysi, ketju,
        kääntyvä ketju).
    nursing_access:
      name: Imetysmahdollisuus
      description: Yksilöi uimapuvun tarjoaman imetysmahdollisuuden, jos sellainen
        on olemassa.
    nursing_access_type:
      name: Imetysmahdollisuuden tyyppi
      description: Määrittää, miten vaate tarjoaa pääsyn rintaan imetystä tai pumpulla
        maidon lypsämistä varten.
    nut_butter_texture:
      name: Pähkinävoin koostumus
      description: Kuvailee pähkinävoin koostumuksen, jotta ostajat voivat helposti
        valita esimerkiksi sileän ja muruisen vaihtoehdon välillä.
    nutrient_fortification:
      name: Ravinteiden täydentäminen
      description: Yksilöi ravintoaineet, joilla juomaa tai elintarviketuotetta on
        täydennetty.
    oak_product_form:
      name: Tammituotteen muoto
      description: Yksilöi tuotteiden kypsyttämiseen tai maustamiseen käytettävän
        tammen fyysisen muodon.
    oak_toast_level:
      name: Tammen paahtoaste
      description: Määrittää tammituotteiden paahtoasteen.
    oboe_case_capacity:
      name: Oboekotelon tilavuus
      description: Ilmaisee, mitä instrumentteja ja tärkeimpiä komponentteja kotelossa
        on tarkoitus kuljettaa.
    oboe_case_carry_configuration:
      name: Oboekotelon kantotapa
      description: Ilmoittaa kotelon tai keikkakassin ensisijaisen kantotavan.
    oboe_case_design:
      name: Oboekotelon rakenne
      description: Luokittelee oboekotelon tai keikkakassin rakenteen/jäykkyyden (esim.
        kova, puolikova, pehmeä), mikä ilmaisee suojaustason.
    oboe_case_internal_fit_type:
      name: Oboekotelon sisäketyyppi
      description: Ilmaisee, onko kotelon sisäosa muotoiltu tietylle soitinkokoonpanolle
        vai onko siinä säädettäviä lokeroita.
    oboe_keywork_plating:
      name: Oboen koneiston pinnoitus
      description: Määrittää oboen koneiston pinnoituksen/viimeistelyn erotuksena
        rungon materiaalista.
    oboe_strap_padding:
      name: Oboen hihnan pehmuste
      description: Kuvailee käyttömukavuutta parantavan kantohihnan tai tuen kosketusalueen
        pehmusteen olemassaolon tai tyypin (esim. pehmustettu olkapää- tai niska-alue).
    oboe_swab_style:
      name: Oboen puhdistuspuikon tyyppi
      description: Määrittää oboen puhdistuspuikon toiminnallisen tyypin/rakenteen
        (esim. läpivedettävä, painolla varustettu liina).
    observation_window_material:
      name: Tarkkailuikkunan materiaali
      description: Määrittää katseluikkunoiden tai -paneelien materiaalin (vaikuttaa
        usein kirkkauteen ja kestävyyteen).
    ocarina_accessories_included:
      name: Okariinan mukana tulevat lisävarusteet
      description: Okariinan mukana tulevat lisävarusteet, kuten kotelo, kaulahihna
        tai sormituskaavio.
    ocarina_chamber_count:
      name: Okariinan kammioiden määrä
      description: Ilmaisee kuinka monta kammiota rivimallisessa okariinassa on, mikä
        vaikuttaa äänialaan ja soiton monimuotoisuuteen (yksi-/kaksi-/kolmikammioinen
        jne.).
    ocarina_fingering_system:
      name: Okariinan sormitusjärjestelmä
      description: Määrittää riippuokariinan sormitusjärjestelmän tai -standardin,
        (jos sovellettavissa).
    ocarina_finish_type:
      name: Okariinan pintakäsittelyn tyyppi
      description: Okariinan rungon pintakäsittely, joka vaikuttaa tuntumaan ja ulkoasuun.
    occupant_classification_sensor_support:
      name: Matkustajan luokitteluanturin tuki
      description: Ilmaisee, onko istuimessa matkustajan luokittelu-/painoanturia
        tai onko siinä valmius OEM-anturin siirtämiseen/asentamiseen (yleensä etumatkustajan
        istuimissa).
    octave_harmonica_cover_plate_material:
      name: Oktaavihuuliharpun peitelevyn materiaali
      description: Oktaaviharmonikan ulkopuolisten kansilevyjen materiaali.
    octave_harmonica_tuning_system:
      name: Oktaavihuuliharpun viritysjärjestelmä
      description: Oktaaviharmonikan viritysjärjestelmä/temperamentti.
    octoban_mounting_system_type:
      name: Octobanin ripustusjärjestelmän tyyppi
      description: Miten oktobani kiinnitetään/asennetaan soiton aikana (kiinnike/teline/jalusta-asennus).
    odor_control_features:
      name: Hajun hallintaominaisuudet
      description: Ilmaisee, tarjoaako tuote hajun neutralointia/poistoa ja millä
        menetelmällä.
    office_furniture_items_included:
      name: Mukana tulevat toimistokalusteet
      description: Yksilöi toimistokalustesarjaan sisältyvät kalusteet, kuten työpöytä
        tai arkistokaappi.
    oil_cooler_core_type:
      name: Öljynjäähdyttimen kennotyyppi
      description: Määrittää öljynjäähdyttimen sisäisen kennorakenteen, joka vaikuttaa
        jäähdytystehoon, painehäviöön ja kestävyyteen.
    oil_cooler_mounting_style:
      name: Öljynjäähdyttimen kiinnitystapa
      description: Kuvailee, miten öljynjäähdytin on tarkoitus kiinnittää/asentaa
        ajoneuvoon.
    oil_dipstick_component_type:
      name: Öljynmittatikun osan tyyppi
      description: Määrittää, mistä öljymäärän mittausosasta on kyse (esim. mittatikun
        mitta/varsi, pelkkä kahva, kokoonpano, mittatikun putki jne.).
    oil_dipstick_measurement_markings:
      name: Öljynmittatikun mittausmerkinnät
      description: Määrittää, millaiset merkinnät/asteikko mittatikussa on öljytason
        lukemista varten.
    oil_dipstick_tube_mounting_type:
      name: Öljyn mittatikun putken kiinnitystyyppi
      description: Määrittää, miten öljyn mittatikun putki kiinnitetään tai tuetaan
        moottoriin tai moottorilohkoon.
    oil_drain_plug_head_drive_type:
      name: Öljyn tyhjennystulpan kannan vääntiötyyppi
      description: Määrittää öljyn tyhjennystulpan kannan työkalukiinnityksen (vääntiötyypin),
        jota käytetään asennukseen ja irrotukseen.
    oil_drain_plug_magnet_type:
      name: Öljyn tyhjennystulpan magneetin tyyppi
      description: Määrittää, onko tyhjennystulppa magneettinen ja jos on, millainen.
    oil_fill_cap_type:
      name: Öljyn täyttökorkin tyyppi
      description: Venttiilikopan öljyn täyttökorkin liitännän tyyppi (jos sovellettavissa).
    oil_filler_cap_attachment_type:
      name: Öljyn täyttökorkin kiinnitystyyppi
      description: Määrittää, miten öljyn täyttökorkki kiinnittyy moottoriin/öljyntäyttöaukkoon
        (esim. kierre, bajonetti/neljänneskierros, painokiinnitteinen).
    oil_filler_cap_installation_position:
      name: Öljyn täyttökorkin sijainti
      description: Määrittää korkin sijainnin, kun öljyn täyttöpisteitä on useita
        (esim. venttiilikoppa, etä-öljyntäyttöputki).
    oil_filler_cap_locking_type:
      name: Öljyn täyttöaukon kannen lukitustyyppi
      description: Määrittää, onko öljyn täyttökorkissa lukitus (esim. avaimella tai
        työkalulla), joka estää peukaloinnin/varkauden tai tahattoman avaamisen.
    oil_filler_cap_tether_type:
      name: Öljyn täyttökorkin kiinnitystyyppi
      description: Määrittää, onko öljyn täyttökorkissa kiinnitys katoamisen estämiseksi
        ja millaista kiinnitystapaa käytetään.
    oil_filler_cap_venting_type:
      name: Öljyntäyttökorkin tuuletustyyppi
      description: Määrittää, onko korkki tuuletettu ja mikä on tuuletusmekanismi
        (jos sovellettavissa).
    oil_filter_style:
      name: Öljynsuodattimen tyyppi
      description: Määrittää öljynsuodattimen muodon ja kiinnitys-/asennustyypin moottorin
        suodatinliitännän yhteensopivuuden varmistamiseksi.
    oil_pan_baffle_windage_features:
      name: Öljypohjan väliseinä-/windage-suojaratkaisut
      description: Ilmaisee öljypohjan sisäiset öljynhallintaominaisuudet.
    oil_pan_finish_coating:
      name: Öljyastian viimeistely/pinnoite
      description: Kuvailee öljypohjan pintakäsittelyn tai pinnoitteen (maalattu,
        jauhemaalattu, pinnoitettu, käsittelemätön jne.).
    oil_pressure_sensor_function_type:
      name: Öljynpaineanturin toimintatyyppi
      description: Ilmaisee, onko osa muuttuvaa lähtöä tuottava öljynpaineanturi mittaria/ECU:ta
        varten vai päälle/pois-tyyppinen öljynpainekytkin, joka sytyttää varoitusvalon.
    oil_pressure_sensor_signal_output_type:
      name: Öljynpaineanturin signaalin lähtötyyppi
      description: Määrittää öljynpaineanturin/lähettimen tuottaman sähköisen lähtösignaalin
        tyypin.
    oil_processing_method:
      name: Öljyn käsittelymenetelmä
      description: Määrittää, miten öljy on valmistettu tai puhdistettu (esim. kylmäpuristettu,
        neitsytöljy, raffinoitu), mikä vaikuttaa makuun, ravintoarvoon ja sopiviin
        ruoanlaittokäyttötarkoituksiin.
    oil_pump_drive_method:
      name: Öljypumpun käyttötapa
      description: Ilmaisee moottorin öljypumpun käyttölaitteen.
    oil_pump_mounting_style:
      name: Öljypumpun kiinnitystyyppi
      description: Määrittää öljypumpun asennuspaikan ja -tavan moottorissa (esim.
        sisäinen tai ulkoinen/erillinen, jakopään kopan asennus, öljypohjan asennus).
    oil_system_connection_thread_standard:
      name: Öljyjärjestelmän liitäntäkierteen standardi
      description: Määrittää osan öljyjärjestelmän liitännässä käytetyn kierre-/liitäntästandardin
        asennusta ja yhteensopivuutta varten (esim. M12x1,5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Öljyn viskositeettiluokka
      description: Kuvaa kehräyskoneissa käytettävän öljyn suhteellista viskositeettia
        (ei autojen SAE-luokituksia).
    okra_variety:
      name: Okralajike
      description: Yksilöi okran tarkemman viljelylajikkeen tai kauppanimikkeen, kuten
        Clemson Spineless, Red Burgundy tai Baby Okra.
    olfactory_arts_material_form:
      name: Hajuaistia hyödyntävän taiteen materiaalien muoto
      description: Määrittää materiaalin fyysisen muodon myyntihetkellä.
    olfactory_arts_tool_kit_content:
      name: Tuoksutyökalupakin sisältö
      description: Luettelee, mitkä osat sisältyvät pakkaukseen tai kynttilän/suitsukkeen/hajuveden
        valmistussettinä myytävään tuotteeseen.
    olive_variety:
      name: Oliivilajike
      description: Määrittää käytetyn oliivin viljelylajikkeen, joka vaikuttaa makuun,
        koostumukseen, väriin ja alueelliseen autenttisuuteen.
    onion_variety:
      name: Sipulilajike
      description: Määrittää sipulin tarkan tyypin, jotta ostajat löytävät nopeasti
        haluamansa värin, maun ja käyttöprofiilin ja kauppiaat voivat luetteloida
        tuotteet tarkasti.
    opacity_level:
      name: Peittävyystaso
      description: Ilmaisee, kuinka läpikuultava tai peittävä kangas on.
    operating_modes:
      name: Toimintatilat
      description: Laservalon ensisijaiset sisäänrakennetut tehosteet/liikkeet.
    operating_voltage:
      name: Käyttöjännite
      description: Määrittää nimellisjännitteen, jolle injektori on suunniteltu.
    optical_toy_features:
      name: Optisen lelun ominaisuudet
      description: Korostaa lelun tuottamaa ensisijaista visuaalista/optista vaikutusta.
    orchestral_string_core_material:
      name: Orkesterisoittimen kielten ydinmateriaali
      description: Määrittää kielen ydinrakenteessa käytetyn materiaalin (ydin), mikä
        vaikuttaa merkittävästi tuntumaan, vasteeseen ja sointiin.
    orchestral_string_end_type:
      name: Orkesterisoittimen kielen päätytyyppi
      description: Määrittää kielen pään kiinnitystavan kielenpitimessä.
    orchestral_string_included_strings:
      name: Jousisoitinten mukana tulevat kielet
      description: Luettelee, mitkä yksittäiset kielet sisältyvät pakkaukseen (vaihtelee
        soittimen mukaan).
    orchestral_string_instrument_fitting_part_type:
      name: Orkesterikielisoittimen sovitin/osatyyppi
      description: Määrittää, minkä tyyppinen osa tai sovitin tuote on (esim. talla,
        kieltenpidin, leukatuki).
    orchestral_string_instrument_mute_type:
      name: Orkesterin jousisoitinten vaimennustyyppi
      description: Määrittää orkesterisoittimen vaimentimen toiminnallisen tyypin
        (esim. harjoitus/hotelli tai esiintyminen/konsertti) ja/tai yleisen rakennetyypin.
    orchestral_string_instrument_part_position:
      name: Orkesterikielisoittimen osan sijainti
      description: Ilmaisee, mihin kohtaan soitinta osa kuuluu (hyödyllinen, kun osista
        on saatavilla ylä-/ala- tai vasen-/oikeakätisiä versioita).
    orchestral_string_winding_material:
      name: Orkesterin jousisoitinten punosmateriaali
      description: Määrittää kielen käämityksen/vaipan materiaalin.
    organza_finish_sheen:
      name: Organzan viimeistely/kiillotus
      description: Kuvailee organza-kankaan pinnan ulkonäköä (matta tai kiiltävä/hohtava).
    organza_ribbon_transparency_level:
      name: Organza-nauhan läpinäkyvyysaste
      description: Kuvailee, kuinka läpinäkyvä organza-nauha on.
    organza_transparency_level:
      name: Organzakankaan läpinäkyvyystaso
      description: Kuvailee, kuinka läpikuultavaa organza-kangas on yksinkertaisena
        kerroksena.
    origami_paper_shape:
      name: Origamipaperin muoto
      description: Määrittää taittamiseen käytettävät arkin muodon.
    origami_paper_sidedness:
      name: Origamipaperin puolisuus
      description: Ilmaisee, onko paperissa sama väri/kuvio molemmilla puolilla vai
        kontrastiset puolet.
    ostrich_feather_part:
      name: Strutsin sulan osa
      description: Yksilöi strutsin sulkatyypin tai sen osan (esim. plume eli sulka
        tai drab eli untuva), mikä vaikuttaa pehmeyteen, tiheyteen ja tyypillisiin
        askartelusovelluksiin.
    outboard_motor_shaft_type:
      name: Perämoottorin akselin tyyppi
      description: Perämoottorin akselin vakiopituusluokka (veneteollisuudessa käytetty
        nimikemuoto).
    outboard_motor_steering_type:
      name: Perämoottorin ohjaustapa
      description: Ilmaisee perämoottorin ohjaustavan/-mekanismin (esim. peräsinvarsi
        tai etäohjausjärjestelmä).
    outdoor_table_functionality:
      name: Ulkopöydän toiminnot
      description: Yksilöi erityiset, tavallisista pöydistä erottavat, sisäänrakennetut
        toiminnot (esim. kylmälokero, hylly, kaasupullon suojus, aurinkovarjon jalusta,
        tuolien kiinnitysmekanismi, kokoontaitettava rakenne, allasturvallinen käyttö,
        korkeudensäätö, pyörät, LED-valaistus).
    outerwear_length_type:
      name: Päällysvaatteiden pituus
      description: Luokittelee päällysvaatteen kokonaispituuden vakiomuotoisiin kuvaaviin
        luokkiin.
    outerwear_pieces_included:
      name: Mukana tulevat ulkovaatekerraston osat
      description: Luettelee vaatekappaleet, jotka toimitetaan pakettina myytävässä
        tuotteessa.
    outfit_attachment_mechanism:
      name: Asusteen kiinnitysmekanismi
      description: Määrittää, miten asusteet tai varusteet kiinnittyvät nukkeen (esim.
        liuskat, liima, magneetit).
    outfit_items_included:
      name: Mukana tulevat asusteet
      description: Luettelee pakettiin kuuluvat vaatekappaleet (esim. body, shortsit,
        hiuspanta).
    outlet_thread_type:
      name: Liitännän tyyppi
      description: Pääsylinterin jarruputken lähtöliitännöissä käytetty kierrestandardi
        (esim. metrinen "bubble flare" tai SAE "inverted flare").
    output_jack_type_instrument:
      name: Ulostuloliittimen tyyppi (soitin)
      description: Määrittää sähkömandoliinin audiolähdön liitintyypin.
    output_signal_type:
      name: Lähtösignaalin tyyppi
      description: Anturin tuottaman sähköisen lähtösignaalin tyyppi tai käyttäytyminen
        (esim. NTC-termistorin analoginen resistanssi).
    outsole_marking_type:
      name: Ulkopohjan merkinnän tyyppi
      description: Ilmaisee, jättääkö kengän ulkopohja jälkiä kentän pinnoille, mikä
        on kriittinen seikka sisätiloissa pelattavissa mailapeleissä.
    outsole_material:
      name: Ulkopohjan materiaali
      description: Ilmaisee alustaa koskettavan kengän ulkopohjan materiaalin, joka
        vaikuttaa pitoon, joustavuuteen ja kestävyyteen.
    outsole_stud_type:
      name: Ulkopohjan nappulatyyppi
      description: Kuvailee ulkopohjan/nappuloiden rakenteen (esim. valetut nappulat,
        kumiset ulokkeet, tekonurminappulat), joka tarjoaa pidon valitulla pelialustalla.
    oven_bake_clay_formulation:
      name: Uunissa kovettuvan massan koostumus
      description: Yksilöi uunissa kovettuvan massan koostumusryhmän (esim. polymeerimassa
        tai hartsipohjainen massa), joka vaikuttaa työstettävyyteen, kovettumiskäyttäytymiseen
        ja lopputuotteen ominaisuuksiin.
    oven_housing_configuration:
      name: Uunikokoonpano
      description: Määrittää kaapin tilaan sopivan laitteiston asettelun (esim. erillisuuni,
        kaksoisuuni tai uuni-mikroaaltouuniyhdistelmä).
    overhead_mount_installation_method:
      name: Kattoasennusmenetelmä
      description: Miten kattoteline kiinnitetään ajoneuvoon (kiinnitystarvikkeet/kiinnitystapa).
    oversize_or_undersize_grade:
      name: Ylikoko- tai alikokoluokka
      description: Määrittää sarjan kokoluokan (ylikokomännät/-renkaat ja/tai alikokolaakerit)
        suhteessa alkuperäisvalmistajan standardikokoon.
    p_tex_application_method:
      name: P-Texin levitysmenetelmä
      description: Kuvailee, miten P-Tex-materiaali kiinnitetään suksen tai lumilaudan
        pohjaan.
    p_tex_form:
      name: P-Tex-materiaalin muoto
      description: Yksilöi fyysisen muodon, jossa korjausmateriaali toimitetaan.
    packability:
      name: Pakattavuus
      description: Ilmaisee, voiko liivin pakata tai säilyttää silloin, kun se ei
        ole käytössä, ja miten se tapahtuu.
    packaging_format:
      name: Pakkausmuoto
      description: Kielten pakkaus- tai myyntitapa (yksittäispussit, irtokappaleet
        jne.).
    packaging_material:
      name: Pakkausmateriaali
      description: Määrittää vettä sisältävän pullon tai säiliön päämateriaalin.
    packaging_type:
      name: Pakkaustyyppi
      description: Kuvailee, miten nyökkäyspääfiguuri on pakattu vähittäismyyntiä,
        esillepanoa tai keräilysäilytystä varten.
    packing_medium:
      name: Säilöntäneste
      description: Ilmaisee nesteen tai aineen (kuten vesi, erilaiset siirapit, mehu
        tai suolavesi), jota käytetään säilötyn hedelmän säilöntään.
    pad_components_included:
      name: Mukana tulevat suojaosat
      description: Määrittää, sarjana myytävään tuotteeseen sisältyvät osat (esim.
        polvi- ja kyynärsuojat, vain rannesuojat).
    pad_controller_additional_control:
      name: Pad-ohjaimen lisäsäätimet
      description: Laitteen fyysiset lisäsäätimet itse padien lisäksi (nupit, liukusäätimet,
        painikkeet).
    pad_controller_performance_features:
      name: Pad-ohjaimen tehokkaat ominaisuudet
      description: Padien keskeiset soittamiseen ja ilmaisun hallintaan liittyvät
        ominaisuudet.
    pad_coverage_area:
      name: Suojuksen peittoalue
      description: Määrittää kehon alueet, jotka vyön integroidut suojukset suojaavat.
    pad_material_or_technology:
      name: Suojuksen materiaali tai teknologia
      description: Määrittää suojuksessa käytetyn patentoidun iskuja vaimentavan teknologian
        tai brändätyn materiaalin.
    pad_mounting_or_holding_style:
      name: Suojuksen kiinnitys- tai pitotapa
      description: Ilmaisee, miten suojusta pidetään, käytetään tai se asennetaan
        käytön aikana.
    pad_saver_style:
      name: Puhdistuspuikon tyyppi
      description: Ilmaisee läppien ja putken kuivaamiseen käytettävän puhdistuspuikon
        fyysisen tyypin/muotoilun.
    pad_shape:
      name: Pehmusteen muoto
      description: Määrittää pehmusteen lyöntipinnan tai rungon geometrisen muodon
        tai kaarevuuden (esim. pyöreä, kaareva, suorakulmainen, tasainen), mikä auttaa
        käyttäjiä valitsemaan harjoitustavoitteisiin ja lyöntityyleihin sopivat pehmusteet.
    pad_shell_type:
      name: Pehmusteen ulkopinnan tyyppi
      description: Luokittelee pehmusteen ulkopinnan rakennetyypin (esim. kova kuori,
        pehmeä kuori, sisäke).
    pad_style:
      name: Pehmustetyyppi
      description: Määrittää kelkan mukana toimitettavan pehmusteen tyypin tai rakenteen.
    padding_layers:
      name: Pehmustekerrokset
      description: Ilmaisee iskunvaimennukseen käytettyjen vaahtomuovikerrosten määrän.
    padding_level:
      name: Pehmustustaso
      description: Ilmaisee hihnan tai tuen kosketusalueille (niska/olkapää/selkä)
        integroidun pehmusteen määrän.
    padding_material:
      name: Pehmustemateriaali
      description: Määrittää iskuja vaimentavan sisäisen täyte- tai pehmusteaineen
        laukkujen, suojien, hanskojen ja harjoitusnukkien sisällä.
    paddle_ball_attachment_type:
      name: Mailapelin kiinnitystyyppi
      description: Määrittää, miten pallo on kiinnitetty mailaan (tai onko se kiinnitetty
        mailaan).
    paddle_leash_style:
      name: Melan hihnan tyyppi
      description: Yksilöi melan hihnan narun tyypin tai rakenteen.
    paddle_shape:
      name: Melan muoto
      description: Määrittää melan lavan/rungon yleisen muodon (esim. vakiomallinen,
        pidennetty, leveärunkoinen), joka vaikuttaa ulottuvuuteen, sweet spot -alueen
        kokoon ja käsiteltävyyteen.
    paddleboard_intended_use:
      name: Suppilaudan käyttötarkoitus
      description: Luokittelee laudan ensisijaisen käyttötarkoituksen tai toiminnan,
        jota varten se on valmistettu (esim. retkeily, jooga, kilpailu).
    paint_application_method:
      name: Maalin levitysmenetelmä
      description: Tuotteen ensisijainen käyttötapa jarrusatulassa.
    paint_by_number_surface_type:
      name: Numeromaalauspohjan tyyppi
      description: Pinta, johon numeroitu kuvio on painettu (esim. kangas, paperi,
        puulevy).
    paint_medium_application_method:
      name: Maalausvärin levitystapa
      description: Ilmaisee suositellun tavan levittää maalia.
    paint_medium_intended_effect:
      name: Maalausvärin tarkoitettu vaikutus
      description: Kuvaa ensisijaisen vaikutuksen, jonka maalausvärin on tarkoitus
        tuottaa (esim. tekstuuri, kiilto, lasitus, virtaus jne.).
    paint_safe_bristles:
      name: Maalinkestävät harjakset
      description: Ilmaisee, markkinoidaanko siveltimen harjaksia turvallisina käytettäväksi
        automaalipinnoilla/kirkaslakkapinnalla (naarmuttamaton).
    paintable_surface:
      name: Maalattava pinta
      description: Ilmaisee, onko paperimassamalli valmis maalattavaksi sellaisenaan
        (esim. pohjustettu/käsitelty), vai vaatiiko se esikäsittelyä.
    paintball_caliber:
      name: Paintball-kaliiperi
      description: Määrittää maalipallojen tai yhteensopivien laitteiden halkaisijan/kaliiperin.
    paintball_feed_system:
      name: Paintball-syöttöjärjestelmä
      description: Määrittää, miten värikuulat syötetään merkkaimeen.
    paintball_fill_color:
      name: Värikuulan täyteaineen väri
      description: Ilmaisee sisäisen merkintäaineen värin, joka voi poiketa ulkokuoren
        väristä, ja joka määrittää osumasta jäävän jäljen värin.
    paintball_fill_type:
      name: Paintball-täyttötyyppi
      description: Kuvailee täyteaineen erityisen koostumuksen tai ominaisuuden (esim.
        pestävä, pimeässä hohtava, jauhemainen).
    paintball_grade:
      name: Paintball-luokitus
      description: Kuvaa suorituskykyluokan tai käyttötarkoituksen tason (esim. aloittelija,
        kenttä, kilpailu, talvi).
    paintball_mask_coverage_level:
      name: Paintball-maskin peittävyystaso
      description: Ilmaisee, mitä kasvojen tai pään osia paintball-suojalasit tai
        -maski suojaavat (vain suojalasit, puolikasvosuoja, koko kasvot tai koko pää).
    paintball_tank_valve_type:
      name: Paintball-säiliön venttiilityyppi
      description: Kuvaa säiliössä olevan venttiili- tai säädinliitännän.
    painting_surface_priming_type:
      name: Maalauspohjan pohjustustapa
      description: Määrittää maalauspohjan pohjusteen tai pinnoitteen (pelkän pohjustettu/pohjustamaton
        sijasta), mikä vaikuttaa maalin tarttuvuuteen ja tekniikoiden yhteensopivuuteen.
    palette_knife_blade_edge_profile:
      name: Palettiveitsen terän profiili
      description: Kuvailee palettiveitsen terän työstöreunan profiilin (ei terävyyttä),
        joka vaikuttaa jäljen tekemiseen ja sekoittamiseen.
    palette_knife_flexibility:
      name: Palettiveitsen joustavuus
      description: Kuvaa palettiveitsen terän jäykkyyttä/joustavuutta.
    palette_surface_finish:
      name: Palettipinnan viimeistely
      description: Kuvaa sekoituspinnan viimeistelyn tai pinnoitteen, joka vaikuttaa
        tahrankestävyyteen ja puhdistettavuuteen.
    palm_padding_level:
      name: Kämmenen pehmustetaso
      description: Kuvaa käsineen kämmenosan tai otekahvan pehmusteen määrän.
    palm_padding_type:
      name: Kämmenen pehmusteen tyyppi
      description: Ilmaisee kämmenpehmusteessa käytetyn materiaalin tai rakenteen
        (esim. geeli, vaahtomuovi, kaksikerroksinen).
    palm_wax_blend_readiness:
      name: Palmuvahasekoituksen valmius
      description: Onko tuote puhdasta palmuvahaa vai esisekoitettu koostumus tiettyjä
        suorituskyvyn ominaisuuksia varten.
    palm_wax_form:
      name: Palmuvahan muoto
      description: Palmuvahan fyysinen muoto myytäessä, mikä vaikuttaa annostelun
        helppouteen, sulamisnopeuteen ja käsittelyyn.
    pan_flute_tuning_standard:
      name: Panhuilun viritysstandardi
      description: Virityksessä käytetty referenssitaajuus (esim. A4=440 Hz), joka
        on tärkeä muiden instrumenttien kanssa soitettaessa.
    pannier_configuration:
      name: Laukkujen konfiguraatio
      description: Ilmaisee, myydäänkö tuote yksittäisenä laukkuna, yhdistettynä tuplalaukkuna
        vai pari-/kolmoissettinä.
    pannier_mounting_system:
      name: Laukkujen kiinnitysjärjestelmä
      description: Määrittää mekanismin, jota käytetään laukun kiinnittämiseen polkupyörän
        tavaratelineeseen tai runkoon, mikä varmistaa yhteensopivuuden eri kokoonpanojen
        kanssa.
    pant_cuff_style:
      name: Housujen lahkeen tyyli
      description: Ilmaisee housujen lahkeensuun viimeistelyn tai säätöratkaisun nilkan
        kohdalla (esim. kuminauharesorit, nilkkavetoketjut, avoin lahkeensuu).
    pant_leg_conversion_type:
      name: Housujen lahkeiden muunnostyyppi
      description: Ilmaisee, voidaanko housujen lahkeita muuntaa tai säätää eri pituuksille
        ja miten.
    pantyhose_crotch_style:
      name: Sukkahousujen haarakiilan tyyli
      description: Määrittää haarakappaleen rakenteen, erottaen esimerkiksi tavallisen
        suljetun haaran, haarattoman mallin tai vahvistetulla haarakiilalla varustetut
        versiot.
    papaya_variety:
      name: Papaijalajike
      description: Määrittää papaijan viljelylajikkeen tai kauppanimikkeen (esim.
        Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Paperi- ja magneettinuken muoto
      description: Määrittää, onko tuote perinteinen paperinukkesarja, magneettinukkesarja
        vai hybridimuotoinen sarja.
    paper_color_family:
      name: Paperivärisarja
      description: Määrittää, onko pakkaus yksivärinen, värilajitelma vai erikoissekoitus
        (käytetään, kun väri on määritelty yksittäiselle tuotteelle mutta pakkauksessa
        on useita värejä).
    paper_magnetic_doll_set_contents:
      name: Paperi- ja magneettinukkesarjan sisältö
      description: Ilmaiseen sarjan tärkeimmät osat.
    paper_opacity:
      name: Paperin läpinäkyvyys
      description: Ilmaisee paperin läpikuultavuuden erittäin läpinäkyvästä peittävään
        (hyödyllinen piirtämisessä ja kopioinnissa).
    paraglider_certification_rating:
      name: Varjoliitimen sertifiointiluokitus
      description: Ilmaisee varjoliitimen siivelle myönnetyn virallisen lentokelpoisuusluokituksen
        (esim. EN- tai LTF-luokat).
    parasite_types_controlled:
      name: Torjuttavat loistyypit
      description: Luettelee sisäloiset, joihin tuote tehoaa, jotta ostajat voivat
        sovittaa madotusohjelman tiettyihin tartuntoihin.
    parking_camera_mounting_location:
      name: Pysäköintikameran asennuspaikka
      description: Auton osa, johon kamera on tarkoitettu asennettavaksi (esim. rekisterikilven
        alue, pinta-asennus taakse, upotettu asennus).
    parking_camera_night_vision_technology:
      name: Pysäköintikameran yönäkötekniikka
      description: Kameran käyttämä hämäräkuvausmenetelmä.
    parking_camera_orientation:
      name: Pysäköintikameran suuntaus
      description: Onko kamera suunniteltu takanäkymää (peruutuskamera), etunäkymää
        tai valinnaista tai peilikuvana käytettävää näkymää varten.
    parking_sensor_finish:
      name: Pysäköintitutkan viimeistely
      description: Ilmaisee pysäköintitutkan anturin tai suojuksen pinnan viimeistelyn
        (esim. maalattava/pohjamaalattu, matta, kiiltävä) puskurin ulkonäköön sovittamisen
        helpottamiseksi.
    parking_sensor_type:
      name: Pysäköintianturin tyyppi
      description: Määrittää pysäköintitutkan tunnistintekniikan (esim. ultraääni,
        sähkömagneettinen, tutka, optinen).
    parsley_root_variety:
      name: Juuripersiljan lajike
      description: Määrittää juuripersiljan viljelylajikkeen tai lajikkeen, jos toimittaja
        sen ilmoittaa.
    parsnip_variety:
      name: Palsternakan lajike
      description: Yksilöi palsternakan tietyn lajikkeen tai viljelylajikkeen, kuten
        Hollow Crown tai White Gem, minkä avulla ostajat voivat valita maun, makeuden
        tai kokoerojen mukaan.
    part_condition:
      name: Osan kunto
      description: Ilmaisee, onko osa uusi, käytetty, kunnostettu tms.
    part_placement:
      name: Osan sijainti
      description: Ilmaisee, mihin kohtaan konetta (esim. porraskone tai stepperi)
        osa on asennettu, kuten vasemmalle, oikealle, eteen tai taakse.
    partial_capo_covered_strings:
      name: Osittaisen capon kattamat kielet
      description: Määrittää kitaran kielialueen, jonka osittainen capo kattaa, käyttäen
        tavallista 6-kielisen kitaran numerointia (1 = korkea E, 6 = matala E).
    parting_style:
      name: Jakauksen tyyli
      description: Ilmaisee, peruukin olemassa olevan tai mahdollisen jakauksen (esim.
        keskijakaus, sivujakaus, vapaa jakaus), mikä vaikuttaa stailauksen joustavuuteen.
    party_favor_type:
      name: Vieraslahjan tyyppi
      description: Määrittää vieraslahjan tyypin (esim. tarrat, minilelut, saippuakuplat),
        mikä mahdollistaa selailun/suodattamisen juhlatarvikkeiden tuoteryhmässä.
    party_game_format:
      name: Juhlapelin muoto
      description: Juhlapelin ensisijainen fyysinen formaatti.
    party_horn_mouthpiece_type:
      name: Juhlatorven suukappaleen tyyppi
      description: Määrittää suukappaleen rakenteen, joka vaikuttaa hygieniaan ja
        mukavuuteen.
    party_horn_style:
      name: Juhlatorven tyyppi
      description: Kuvailee torven rakenteen/toiminnan (miten se avautuu tai tuottaa
        ääntä).
    passenger_car_type:
      name: Henkilöauton tyyppi
      description: Yksilöi pienoismallin matkustajavaunutyypin (esim. matkustajavaunu,
        makuuvaunu) selailua ja sarjan kokoamista varten.
    passion_fruit_variety:
      name: Passionhedelmän lajike
      description: Yksilöi/määrittää tarjotun passionhedelmän kasvitieteellisen tai
        kaupallisen lajikkeen (esim. Purple, Yellow, Granadilla).
    pasta_sauce_texture:
      name: Pastakastikkeen koostumus
      description: Kuvailee kastikkeen koostumusta (esim. sileä, paksu, kermainen)
        suutuntuman mukaan.
    pasta_sauce_variety:
      name: Pastakastikkeen lajike
      description: Luokittelee pastakastikkeet reseptin tai tyypin mukaan, jotta ostajat
        löytävät nopeasti klassikot, kuten marinaran, tai erikoiskastikkeet, kuten
        vodkakastikkeen tai peston.
    pastry_crust_state:
      name: Leivonnaispohjan tila
      description: Kuvailee pohjan valmistus- tai paistoasteen ostohetkellä.
    pastry_crust_style:
      name: Leivonnaisen kuoren tyyli
      description: Yksilöi leivonnaispohjan tietyn tyypin tai taikinalajin mukaan.
    pastry_filling_type:
      name: Leivonnaisen täytteen tyyppi
      description: Ilmaisee leivonnaisen tai skonssin pääasiallisen täytteen.
    patch_adhesion_method:
      name: Laastarin kiinnitysmenetelmä
      description: Määrittää, miten paikka kiinnittyy sisäkumiin tai renkaaseen (esim.
        itsekiinnittyvä, vulkanointi tai lämpöaktivoitu).
    patch_backing_material:
      name: Merkin taustamateriaali
      description: Paikan taustan tai pohjan materiaali (esim. huopa, kangas), joka
        on kosketuksissa koristeltavaan tuotteeseen.
    patch_backing_type:
      name: Merkin taustan tyyli
      description: Paikassa käytetty taustamateriaali (esim. silitettävä liimapinta,
        tarratausta, tarranauha, ei mitään).
    patch_base_material:
      name: Lapun pohjan materiaali
      description: Kuvioaiheisen merkin ensisijainen pohjakangas tai taustamateriaali
        (ei koristeelliset yksityiskohdat).
    patch_border_edge_finish:
      name: Merkin reunan viimeistely
      description: Merkin reunaviimeistelytapa (esim. merrow-reunus/ylilankaommel,
        laserleikattu reuna), joka vaikuttaa kestävyyteen ja ulkonäköön.
    patch_placement_area:
      name: Merkin sijoituspaikka
      description: Vaatteen tai asusteen tyypillinen kohta, johon merkki on tarkoitettu
        sijoitettavaksi.
    pathogen_removal_capability:
      name: Patogeenien poistokyky
      description: Määrittää, mitkä mikro-organismien luokat (bakteerit, alkueläimet,
        virukset) pumppu on sertifioitu poistamaan.
    pattern_sizing_system:
      name: Kuvioiden kokojärjestelmä
      description: Määrittää kaavan kokotaulukossa käytetyn alueellisen kokojärjestelmän
        tai standardin (esim. US, UK, EU).
    peak_style:
      name: Lipan tyyppi
      description: Määrittää kypärän lipan tai visiirin tyypin, mikä vaikuttaa peittävyyteen,
        ulkonäköön ja lajikohtaisiin sääntöihin.
    pear_variety:
      name: Päärynän lajike
      description: Yksilöi päärynän viljelylajikkeen tai lajikkeen (esim. Bartlett,
        Bosc, Conference), minkä avulla ostajat voivat valita haluamansa maun, rakenteen
        ja käyttötarkoituksen.
    pearl_luster_grade:
      name: Helmen kiillon luokka
      description: Helmen pinnan kiillon arviointiluokka.
    pearl_matching_level:
      name: Helmien yhtenäisyysaste
      description: Ilmaisee, kuinka hyvin erän tai helmet vastaavat toisiaan erässä
        tai helminauhassa (esim. väri, koko, kiilto).
    pearl_shape:
      name: Helmen muoto
      description: Helmen yleinen muotoluokka.
    pearl_surface_condition:
      name: Helmiäispinnan kunto
      description: Ilmaisee helmen näkyvän pinta kunnon virheiden tai täplien esiintymisen
        ja niiden vakavuuden.
    pearl_treatment:
      name: Helmien käsittely
      description: Paljastaa helmen väriin ja ulkonäköön vaikuttavat käsittelyt.
    pearl_type:
      name: Helmityyppi
      description: Määrittää irtohelmien helmityypin tai alkuperän (esim. makean veden
        helmi, Akoya, Tahiti, Etelämeren helmi).
    peat_level:
      name: Turpeisuustaso
      description: Kuvaa turpeen savun vaikutuksen voimakkuuden viskissä, savuttomasta
        voimakkaasti savuiseen.
    pedal_and_cleat_system_compatibility:
      name: Poljin- ja klossijärjestelmän yhteensopivuus
      description: Määrittää, minkä poljin- tai klossistandardien kanssa kiila/pala
        on yhteensopiva, jotta käyttäjä voi valita tuotteelle sopivat polkimet ja
        kengät.
    pedal_configuration:
      name: Polkimen kokoonpano
      description: Ilmaisee, onko tuolissa yksi poljin, jaetut/itsenäiset polkimet
        vai muunnettava rakenne.
    pedal_mounting_style:
      name: Polkimen asennustyyli
      description: Määrittää, miten poljin tai polkimen suojus/päällys kiinnittyy
        ajoneuvoon (asennus-/kiinnitystapa).
    pedal_set_components:
      name: Poljinsarjan osat
      description: Määrittää, mitkä polkimet sisältyvät sarjaan.
    pedal_spindle_material:
      name: Polkimen akselin materiaali
      description: Polkimen akselin materiaali, joka vaikuttaa lujuuteen, painoon
        ja korroosionkestävyyteen.
    pedal_spindle_thread_size:
      name: Polkimen akselin kierrekoko
      description: Määrittää polkimen akselin kierteitysstandardin, jolla se ruuvataan
        kiinni kampeen.
    pedal_type:
      name: Polkimen tyyppi
      description: Kuvailee polkupyörän mukana toimitettavien polkimien tyypin, mikä
        ilmaisee yhteensopivuuden kenkien kanssa sekä ajotavan.
    pellet_accessory_type:
      name: Pellettilisävarusteen tyyppi
      description: Yksilöi tietyn pellettilisävarusteen tyypin, jotta kalastajat voivat
        nopeasti löytää takilaansa sopivat porat, pellettipihdit tai stopparit.
    pellet_grade:
      name: Kuulien laatu
      description: Ilmaisee airsoft-kuulien valmistustarkkuuden tai suorituskykyluokan.
    pen_ink_color:
      name: Kynän musteen väri
      description: Ilmaisee kynän annosteleman musteen todellisen värin, joka voi
        poiketa kynän ulkokuoren väristä.
    penalty_card_accessories_included:
      name: Mukana tulevat rangaistuskorttitarvikkeet
      description: Luettelee rangaistuskorttien mukana tulevat lisätarvikkeet, kuten
        lompakon, tuloskortin, lyijykynän, kolikon, pillin tai pussin.
    penalty_card_colors_included:
      name: Mukana tulevien rangaistuslappujen värit
      description: Luettelee tuotesarjaan sisältyvien rangaistuskorttien värit.
    penalty_flag_throw_distance:
      name: Rangaistuslipun heittoetäisyys
      description: Suunnitteluluokitus, joka ilmoittaa lipun tarkoitetun heittoetäisyyden.
    pendant_cutter_safety_features:
      name: Turvavyöleikkurin turvaominaisuudet
      description: Yksilöi integroidut turvaominaisuudet, jotka vähentävät tahattomia
        viiltoja kannettaessa tai käytettäessä.
    pendant_cutter_wear_method:
      name: Turvavyöleikkurin kantamistapa
      description: Määrittää, miten turvavyöleikkuria on tarkoitus kantaa tai käyttää.
    pepper_variety:
      name: Pippurin lajike
      description: Määrittää tuotteessa käytetyn pippurin lajikkeen, minkä avulla
        ostajat voivat erottaa eri makuprofiilit ja tulisuusasteet toisistaan.
    percussion_case_style:
      name: Lyömäsoittimet kotelon tyyppi
      description: Luokittelee kotelon yleisen tyypin/rakenteen (pehmeä laukku tai
        kova/jäykkä kotelo tai hybridi).
    percussion_instruments_included:
      name: Mukana tulevat lyömäsoitinvälineet
      description: Luettelee tuotteeseen sisältyvien lyömäsoittimien tyypit, kun kyseessä
        on monesta soittimesta koostuva lelusetti.
    percussion_mallet_handle_grip_style:
      name: Lyömäsoittimen nuijan varren otepinta
      description: Yksilöi varren otepinnan käsittelyn tyypin (tekstuurin lisäksi),
        kuten käsittelemätön puu, lakattu, kumipinnoitettu otepinta tai punos.
    percussion_mallet_head_construction:
      name: Nuijan pään rakenne
      description: Kuvailee nuijan pään rakenteen (esim. lankapäällysteinen, huopapäällysteinen,
        kumi, käsittelemätön puu), mikä vaikuttaa ääneen ja kestävyyteen.
    perfumery_base_carrier_type:
      name: Hajusteen kantaja-aineen tyyppi
      description: Määrittää hajusteen kantaja- tai liuotinainejärjestelmän (eli pohjan
        pääasiallisen koostumuksen laimentamista ja ominaisuuksia varten).
    perfumery_base_intended_application:
      name: Hajustepohjan käyttötarkoitus
      description: Ilmaisee loppukäyttömuodon, johon pohja on suunniteltu (esim. hajuvesisuihke
        tai roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Hajusteen kantaja- tai liuotinaine
      description: Yksilöi kantaja- tai liuotinaineen, jossa ainesosa toimitetaan,
        mikäli se on laimennettu (esim. etanoli, DPG, jojobaöljy).
    perfumery_ingredient_form:
      name: Hajuveden ainesosan muoto
      description: Määrittää hajusteen ainesosan fyysisen muodon tai olomuodon toimitushetkellä.
    perfumery_ingredient_type:
      name: Hajuveden ainesosatyyppi
      description: Luokittelee hajusteen ainesosan sen mukaan, mikä se on hajustekäytännössä
        (esim. eteerinen öljy, aromikemikaali).
    perfumery_ingredient_usage_note:
      name: Hajusteen ainesosan käyttöä koskeva huomautus
      description: Ilmaisee tyypillisen roolin tuoksuryhmässä (latvatuoksu, sydäntuoksu,
        pohjatuoksu), huomioiden, että ainesosat voivat sijoittua usean eri tuoksunuotin
        välille.
    perfumery_ingredients:
      name: Hajuveden ainesosat
      description: Luettelee sarjaan sisältyvät kulutettavat hajusteiden ainesosat
        (esim. eteeriset öljyt, tuoksuöljyt, alkoholipohja).
    perfumery_note_position:
      name: Hajusteen nuotin sijainti
      description: Ilmaisee ainesosan tyypillisen roolin tuoksuryhmässä (latva/sydän/pohja).
    persimmon_variety:
      name: Persimonin lajike
      description: Yksilöi persimonin viljelylajikkeen tai lajikkeen, koska eri lajikkeet,
        kuten Fuyu tai Hachiya, eroavat toisistaan koostumuksen, maun, supistavan
        vaikutuksen ja kulinaarisen käytön suhteen.
    personalization_type:
      name: Mukautustyyppi
      description: Määrittää, voidaanko tuotetta mukauttaa tapahtumaa varten ja miten
        (esim. monogrammin, nimen/päivämäärän, valokuvan lisääminen).
    phonics_focus:
      name: Fonetiikan painopiste
      description: Määrittää, mitä fonetiikan ja sananluvun taitoja lukulelu kehittää.
    physalis_variety:
      name: Lyhtykoison lajike
      description: Yksilöi myytävän lyhtykoison tarkan kasvitieteellisen lajin, viljelylajikkeen
        tai yleisen lajikkeen.
    pi_ata_filler_type_included:
      name: Mukana tulevat piñata-täyteainetyypit
      description: Jos täyte sisältyy toimitukseen, tarjotun sisällön tyyppi.
    pi_ata_hanging_method:
      name: Piñatan ripustusmenetelmä
      description: Miten piñata on suunniteltu ripustettavaksi tai tuettavaksi (mukana
        tulevat silmukka, koukku, naru jne.).
    pi_ata_opening_type:
      name: Piñatan avaustapa
      description: Miten täyttöaukko avataan/suljetaan (läppä, tarranauha, vetoketju,
        valmiiksi suljettu jne.).
    piccolo_key_system:
      name: Piccolohuilun koneisto
      description: Yksilöi pikkolohuilussa käytetyn koneistojärjestelmän/rakenteen
        (nykyisissä pikkolohuiluissa tyypillisesti Boehm-järjestelmä).
    piccolo_keywork_features:
      name: Piccolon koneiston ominaisuudet
      description: Määrittää pikkolohuilun merkittävät koneistomekanismit ja valinnaiset
        ominaisuudet.
    pick_grip_aid:
      name: Plektran otetuki
      description: Ilmaisee plektran ensisijaisen sisäänrakennetun otetuen, joka menee
        pinnan tuntumaa tai tekstuuria pidemmälle (esim. pitoaukot, kohokuvioitu logo,
        kumipinta).
    pickleball_construction_type:
      name: Pickleball-pallon rakennetyyppi
      description: Pallon valmistusrakenne, kuten saumaton yksiosainen tai hitsattu
        kaksiosainen, mikä vaikuttaa kestävyyteen ja lentoradan tasaisuuteen.
    pickling_method:
      name: Säilöntämenetelmä
      description: Määrittää käytetyn säilöntäaineen tai menetelmän, kuten etikkaliemen
        tai maitohappokäymisen.
    pickup_and_preamp_configuration:
      name: Mikrofonien ja esivahvistimen kokoonpano
      description: Ilmaisee, onko alttoviulussa sisäänrakennettu mikrofoni ja/tai
        aktiivinen esivahvistin vahvistettua soittoa tai äänitystä varten.
    pickup_configuration:
      name: Mikrofonikokoonpano
      description: Kuvailee sähkökitaran mikrofonien yleisen asettelun yleisesti käytettyä
        lyhennettä käyttäen (esim. SSS, HSS, HH).
    pickup_cover_material:
      name: Mikrofonin kansimateriaali
      description: Määrittää mikrofonin suojuksen pääasiallisen materiaalin (jos sellainen
        on), mukaan lukien yleiset pinnoitetut viimeistelyt valmistajan niin ilmoittaessa.
    pickup_cover_type:
      name: Mikrofonin suojuksen tyyppi
      description: Määrittää, onko sähkökitaran mikrofonissa kuori ja mikä on kuoren
        materiaali/tyyli (esim. metalli tai muovi).
    pickup_string_spacing:
      name: Mikrofonin napaväli
      description: Mikrofonin napavälin standardi, jota varten mikrofoni on valmistettu
        (esim. Fender/F-spaced tai Gibson/standard); tämä vaikuttaa kielten kohdistukseen
        tremolotallalla varustetuissa kitaroissa.
    pie_crust_type:
      name: Piirakkapohjan tyyppi
      description: Määrittää piirakan tai tortun pohjan tyylin tai tyypin, kuten lehtevä
        taikina, grahamkeksi tai gluteeniton pohja.
    piece_configuration:
      name: Varren kokoonpano
      description: Ilmaisee, kuinka monesta erillisestä osasta biljardikeppi, varsi
        tai silta koostuu, mikä vaikuttaa kannettavuuteen ja pelitapaan.
    pillow_form_size:
      name: Sisätyynyn koko
      description: Sisätyynyjen standardoitu valmiin tuotteen kokomerkintä (esim.
        18" x 18").
    pilot_helmet_communications_integration:
      name: Lentäjän kypärän viestintäjärjestelmän integrointi
      description: Ilmaisee, sisältääkö kypärä ilmailun viestintäkomponentteja tai
        onko siinä valmius niitä varten.
    pilot_helmet_visor_configuration:
      name: Lentäjän kypärän visiirin kokoonpano
      description: Määrittää lentäjän kypärään sisältyvän visiirin/kasvosuojuksen
        kokoonpanon.
    pin_attachment_type:
      name: Pinnin kiinnitystyyppi
      description: Määrittää rintaneulan kiinnitysmekanismin, jolla neula kiinnitetään
        vaatteeseen tai pintaan (esim. perhoslukko, magneettikiinnitys).
    pin_backing_type:
      name: Pinnin kiinnitystyyppi
      description: Määrittää rintaneulan kiinnitysmekanismin, jolla neula kiinnitetään
        vaatteeseen tai asusteisiin.
    pin_cushion_attachment_style:
      name: Neulatyynyn kiinnitystapa
      description: Tapa, jolla neulatyynyä käytetään, se kiinnitetään tai pidetään
        paikallaan käytön aikana.
    pin_cushion_features:
      name: Neulatyynyn ominaisuudet
      description: Toiminnalliset ominaisuudet pelkän neulatyynytoiminnon lisäksi.
    pin_face_customization_method:
      name: Rintaneulan etupuolen mukauttamistapa
      description: Määrittää etupuolen kuvioinnin toteutuksen (esim. kova emali, pehmeä
        emali, painatus).
    pin_type:
      name: Rintaneulan tyyppi
      description: Määrittää urheiluaiheisissa keräilytuotteissa käytettävän rintaneulan
        tyylin tai muodon.
    ping_pong_certification:
      name: Pöytätennissertifikaatti
      description: Ilmoittaa tuotteen virallisen standardin tai hallintoelimen hyväksyntätason.
    ping_pong_competition_certification:
      name: Pöytätenniksen kilpailusertifikaatti
      description: Ilmaisee pöytätennispallon virallisen sertifiointistatuksen virallisiin
        otteluihin (esim. ITTF-hyväksytty).
    ping_pong_paddle_handle_style:
      name: Pöytätennismailan kahvan malli
      description: Määrittää mailan kahvan muodon tai tyypin, mikä vaikuttaa otteen
        mukavuuteen ja pelitekniikkaan.
    ping_pong_robot_accessory_type:
      name: Pöytätennisrobotin lisävarusteen tyyppi
      description: Yksilöi lisävarusteen toiminnallisen alatyypin, jotta ostajat voivat
        rajata hakutuloksia nopeasti (esim. verkot vs. virtalähteet).
    ping_pong_rubber_surface_type:
      name: Pöytätennismailan kumipinnan tyyppi
      description: Yksilöi mailan kumin pinnan tyypin tai tekstuurin, joka vaikuttaa
        kierre- ja nopeusominaisuuksiin.
    ping_pong_rubber_type:
      name: Pöytätennismailan kumipinnan tyyppi
      description: Määrittää pöytätennismailan kumin pintarakennetyypin, joka vaikuttaa
        pelattavuuteen.
    ping_pong_table_type:
      name: Pingispöydän tyyppi
      description: Luokittelee pöydän yleisen tyypin tai mallin vertailun helpottamiseksi
        (esim. kilpapöytä, pöytätennislevy, minipöytä).
    pipe_instrument_voicing_sound_production_method:
      name: Pilli-instrumentin äänentuottotapa
      description: Määrittää, miten soitin tuottaa äänen (ilmavirran mekanismi), minkä
        avulla voidaan erottaa toisistaan panhuilujen, puupuhaltimien ja urkupillien
        soitinryhmät suodattimilla.
    piston_application_type:
      name: Männän käyttökohde
      description: Männän käyttötarkoitus (vaihto-osa tai tehokas mäntä / kilpa-ajo
        tai raskaaseen käyttöön).
    piston_crown_dish_style:
      name: Männän laen muoto
      description: Männän laen muoto, joka vaikuttaa palotilan tilavuuteen ja puristussuhteeseen
        (esim. tasalaki, kupu, kupera/kovera).
    piston_pin_retention_type:
      name: Männän tapin lukitustapa
      description: Määrittää, miten männäntappi lukitaan kiinni männän ja kiertokangen
        kokoonpanoon.
    pit_configuration:
      name: Kuopan konfiguraatio
      description: Määrittää laskeutumisalueen rakenteellisen muodon (yksiosainen
        tai moniosainen) ja siten toimitettavien osioiden tai moduulien määrän.
    pit_cover_type:
      name: Kuopan suojustyyppi
      description: Määrittää hyppypatjaan kuuluvan suojapinnan tai päällisen, joka
        vaikuttaa suojaukseen piikeiltä ja säältä, sekä urheilijoiden mieltymyksiin.
    pitahaya_flesh_color:
      name: Pitaian hedelmälihan väri
      description: Määrittää pitaian (lohikäärmehedelmän) sisuksen värin (esim. valkoinen,
        punainen, magenta), joka on keskeinen erottava tekijä ja vaikuttaa makuun,
        ulkonäköön ja koettuun ravintoarvoon.
    pitch_mat_coverage_length:
      name: Krikettikentän maton peittoalueen pituus
      description: Luokittelee krikettikentän maton sen mukaan, kuinka suuren osan
        portista se peittää (esim. täysi vai puolikas kenttä).
    pitch_range:
      name: Ääniala
      description: Kuvaa ravistimen äänen havaittua sävelkorkeusaluetta/kirkkautta.
    pitch_standard:
      name: Äänenkorkeuden standardi
      description: Määrittää nokkahuilun viritystason (referenssivireen) (esim. A=440,
        A=442, A=415).
    pitching_rubber_size_designation:
      name: Syöttölevyn kokomerkintä
      description: Ilmaisee syöttölevyn standardoidun kenttäkokoluokituksen, mikä
        helpottaa valintaa ilman, että ostajien tarvitsee tietää tarkkoja mittoja.
    pitching_screen_style:
      name: Syöttösuojan tyyppi
      description: Määrittää suojan rakenteen, jotta ostajat voivat nopeasti valita
        harjoitustilanteeseensa sopivan suojaratkaisun.
    pitching_target_design:
      name: Syöttömaalitaulun malli
      description: Luokittelee syöttömaalitaulun yleisen tyypin tai kokoonpanon.
    pitching_wheel_count:
      name: Heittolaitteen pyörien lukumäärä
      description: Ilmaisee heittolaitteen käyttämien heittopyörien lukumäärän.
    pivot_adjustability:
      name: Nivelen säädettävyys
      description: Ilmaisee, onko saksissa säädettävä nivelruuvi leikkausjännityksen
        hienosäätöä varten.
    pivot_piece_type:
      name: Nivelkumin tyyppi
      description: Erottelee toimitetut erilaiset nivelkumien muodot, kuten perinteinen
        tai putkimalli.
    place_card_holder_closure_mechanism:
      name: Paikkakortin sulkumekanismi
      description: Määrittää, miten pidike tarttuu korttiin ja pitää sitä paikoillaan.
    place_card_orientation:
      name: Paikkakortin suunta
      description: Määrittää paikkakortin näyttösuunnan.
    place_card_printing_status:
      name: Paikkakortin tulostuksen tila
      description: Ilmaisee, onko paikkakortti tyhjä käsin kirjoittamista/tulostamista
        varten, esipainettu (nimet eivät ole yksilöityjä) vai yksilöity/mittatilaustyönä
        painettu.
    placket_type:
      name: Halkion tyyppi
      description: Määrittää poolopaidan etuhalkion tyylin, mukaan lukien nappien
        määrän tai vaihtoehtoiset sulkimet.
    planetarium_content_theme:
      name: Planetaarion sisältöteema
      description: Planetaarioprojektorin näyttämä ensisijainen sisältö.
    planetarium_projection_content_format:
      name: Planetaarioprojektorin sisältöformaatti
      description: Määrittää planetaarion käyttämän projektiojärjestelmän (fyysiset
        levyt/diat tai digitaalinen/LED-tehoste).
    plant_fiber_type:
      name: Kasvikuitutyyppi
      description: Tietty kasviperäinen kuitutyyppi, kun katkokuidun alkuperä on kasvi.
    plaster_gauze_finish:
      name: Kipsiharson viimeistely
      description: Pintaviimeistelyn lopputulos levityksen ja tasoituksen jälkeen.
    plaster_gauze_grade:
      name: Kipsiharsolaatu
      description: Kipsisiteen käyttötarkoitusluokitus (esim. askartelu/opiskelija
        tai ammattilaiskäyttö).
    plaster_gauze_weave_density:
      name: Kipsiharsokudoksen tiheys
      description: Sideharson kankaan suhteellinen avoimuus/tiheys, joka vaikuttaa
        lujuuteen ja kipsin tarttuvuuteen.
    plastic_canvas_finish:
      name: Muovikankaan viimeistely
      description: Muovikangasrullan pinta-/viimeistelykäsittely.
    plastic_canvas_sheet_finish:
      name: Muovikangaslevyn viimeistely
      description: Muovikangaslevyn pinta-/reunakäsittely
    plastic_canvas_transparency:
      name: Muovikankaan läpinäkyvyys
      description: Kuinka läpinäkyvä/läpinäkymätön muovikangas on.
    plate_bottom_design:
      name: Levyn pohjan muotoilu
      description: Kuvaa levyn alapinnan rakennetta, joka vaikuttaa pitoon, vakauteen
        ja turvallisuuteen eri pelialustoilla.
    plate_compatibility_standard:
      name: Levyn yhteensopivuusstandardi
      description: Ilmaisee levytangon painolevystandardin, jolle tanko on suunniteltu
        (esim. olympia 50 mm, standardi 25 mm).
    plate_installation_type:
      name: Levyn asennustyyppi
      description: Määrittää, miten levy kiinnitetään tai asetetaan kentälle (esim.
        upotettava, piikit, asetettava), jolloin ostajat voivat valita pysyvien ja
        siirrettävien vaihtoehtojen välillä.
    plate_size_category:
      name: Levyn kokoluokka
      description: Luokittelee levyn sen pelitason tai sääntöstandardin mukaan, jotta
        ostajat löytävät nopeasti liigavaatimukset täyttävät varusteet.
    play_dough_putty_kit_contents:
      name: Muovailumassapakkauksen sisältö
      description: Yksilöi pääasialliset osat itse massan lisäksi (esim. työkalut,
        muotit, pursotin, säilytysvälineet).
    play_dough_tool_set_items_included:
      name: Muovailumassan mukana tulevat osat
      description: Yksilöi muovailuvahatyökalusarjaan sisältyvät työkalut ja tarvikkeet
        (esim. kaulimet, muotit, pursottimet).
    play_environment_suitability:
      name: Sopiva peliympäristö
      description: Yksilöi sarjan tarkoitetun peliympäristön (esim. sisällä, ulkona,
        vedessä).
    play_food_features:
      name: Leikkiruoan ominaisuudet
      description: Leikkiruokatuotteen erityiset toiminnalliset tai todenkaltaiset
        ominaisuudet.
    play_food_items_included:
      name: Leikkiruokatuotteen mukana tulevat osat
      description: Ilmaisee keittiöleikkisarjan mukana tulevien leikkiruokien tyypit.
    play_food_size_scale:
      name: Leikkiruoan mittakaava
      description: Ilmaisee leikkiruokien likimääräisen mittakaavan yhteensopivuuden
        varmistamiseksi leikkikeittiöiden, nukkejen ja leikkisarjojen kanssa.
    play_money_set_components_included:
      name: Mukana tulevat leikkirahasetin osat
      description: Määrittää, mitä osatyyppejä sisältyy leikkiraha- tai pankkileikkisarjaan.
    play_pattern:
      name: Leikkikuvio
      description: Lelun ensisijainen käyttötarkoitus (esim. fidget/stressinlievitys,
        työpöytäveistos/taide, rakentelu tai palapelit).
    play_sprinkler_mounting_type:
      name: Leikkisprinklerin asennustyyppi
      description: Miten leikkisprinkleri asetetaan/kiinnitetään käytön aikana.
    play_vehicle_lights_and_sounds:
      name: Leluajoneuvon valot ja äänet
      description: Ilmaisee, onko leluajoneuvossa elektronisia valo- tai äänitehosteita.
    play_vehicle_scale:
      name: Leluauton mittakaava
      description: Ilmaisee leluajoneuvon mittakaavan (käytetään yleisesti painevaletuille
        ja pienoismallileluautoille.
    player_size_category:
      name: Pelaajan kokoluokka
      description: Määrittää pelaajan koon tai ikäryhmän, jolle siepparin varustesarja
        on tarkoitettu (esim. aloittelijat, nuoret, keskitaso, aikuiset).
    player_size_range:
      name: Pelaajan kokoluokka
      description: Määrittää tarkoitetun käyttäjän hihnan tai tuen kokoalueen (esim.
        lapsi, aikuinen, yleinen).
    playing_environment:
      name: Peliympäristö
      description: Määrittää ensisijaisen pelialustan tai ympäristön, johon hockey-pallo
        on tarkoitettu.
    playing_method:
      name: Soittotapa
      description: Instrumentin ensisijainen soittotapa tai aktivointimenetelmä.
    playing_surface_material:
      name: Soittopinnan materiaali
      description: Yksilöi cajonin etulevyn (tapa) materiaalin, joka vaikuttaa merkittävästi
        sointiväriin ja soittotuntumaan.
    playing_surface_type:
      name: Soittopinnan tyyppi
      description: Kuvailee harjoituspadin soittopinnan rakenteen/tuntuman
    playset_activities_included:
      name: Mukana tulevat leikkisarjan toiminnot
      description: Yksilöi kiipeilytelineen tai leikkisarjan pääasialliset leikkitoiminnot/osat,
        joiden avulla ostajat voivat suodattaa rakennelman tarjoamia aktiviteetteja.
    playset_installation_type:
      name: Leikkisetin asennustyyppi
      description: Määrittää, miten kiipeilyteline tai leikkisarja asennetaan tai
        kiinnitetään.
    playset_items_included:
      name: Leikkisetin mukana tulevat osat
      description: Yksilöi piknik-leikkisarjan sisältämät roolileikkituotteet (ruoka,
        astiat, viltti, kori jne.).
    pliers_jaw_style:
      name: Pihtien leukamalli
      description: Kuvailee pihtien ensisijaisen leukarakenteen tai toimintotavan.
    plum_variety:
      name: Luumulajike
      description: Yksilöi luumun tietyn lajikkeen tai muunnoksen, jonka avulla ostaja
        voi valita maun, värin ja aiotun kulinaarisen käyttötarkoituksen perusteella.
    plumcot_variety:
      name: Luumukoosilajike
      description: Yksilöi luumun tietyn viljelylajikkeen tai kaupallisen muunnoksen
        (esim. Flavor King, Dapple Dandy), joka voi vaikuttaa makuun, väriin ja saatavuuteen.
    plunger_mute_handle_type:
      name: Plunger-vaimentimen kahvan tyyppi
      description: Määrittää kahva- tai otetyylin, jota käytetään plunger-vaimentimen
        pitelemiseen ja wa-wa-efektien luomiseen.
    pocket_closure_type:
      name: Taskun suljentatyyppi
      description: Määrittää, miten kukin tasku suljetaan, mikä auttaa käyttäjiä valitsemaan
        housut, joissa tavarat pysyvät turvallisesti mukana liikkeen aikana.
    pocket_knife_opening_mechanism:
      name: Taskuveitsen avausmekanismi
      description: Terän avausmekanismi (manuaalinen kynsiura, peukalonuppi, flipperi,
        avustettu, automaattinen jne.).
    pocket_style:
      name: Taskun tyyppi
      description: Määrittää housujen päätaskujen rakenteen.
    pocket_type:
      name: Taskun tyyppi
      description: Yksilöi vaatteen tyylin tai taskujen olemassaolon.
    pod_retention_system:
      name: Podien pitojärjestelmä
      description: Kuvailee, kuinka podit pidetään paikoillaan ja vapautetaan valjaista
        tai kantolaukusta.
    pogo_stick_footrest_type:
      name: Hyppykepin jalkatason tyyppi
      description: Kuvailee hyppykepin päällä seisomiseen käytettävän jalkatason/-tappien
        rakenteen.
    pogo_stick_suspension_type:
      name: Hyppykepin jousitustyyppi
      description: Määrittää hyppykepin palautusmekanismin, joka vaikuttaa tuntumaan,
        kestävyyteen ja huoltotarpeeseen.
    poi_handle_type:
      name: Poi-pallon kahvatyyppi
      description: Määrittää poi-välineen kahvan, otteen tai kiinnityksen tyylin,
        jolla poi pidetään kädessä.
    poi_light_source:
      name: Poin valonlähde
      description: Jos valaistu, määrittää käytettävän valaisutekniikan.
    poi_tether_type:
      name: Poin kiinnitystapa
      description: Ilmaisee, millainen kiinnitysmateriaali yhdistää poi-pään kahvaan,
        nuppiin tai rannehihnaan (esim. naru, köysi tai ketju).
    poi_type:
      name: Poin tyyppi
      description: Määrittää poien ensisijaisen rakenteen tai käyttötarkoituksen (esim.
        harjoitus, LED-valopoi tai tulipoi).
    point_type:
      name: Kärjen tyyppi
      description: Kirjontaneulan kärjen muoto/tyyppi.
    pointe_shoe_shank_length:
      name: Varvastossun anturan pituus
      description: Kenkärangan tukeman kengän pituuden osuus, esimerkiksi täyspitkä
        tai 3/4-pituinen.
    pointe_shoe_shank_strength:
      name: Balettitossun (pointe) pohjallisen/rangan jäykkyys
      description: Balettitossun varren jäykkyystaso, joka vaikuttaa tukeen ja sisäänajoaikaan.
    poker_accessory_storage_included:
      name: Mukana tuleva pokeritarvikkeiden säilytystila
      description: Ilmaisee, mille muille pokeritarvikkeille lisävaruste tarjoaa erillisen
        säilytyspaikan.
    poker_chip_tray_rack_configuration:
      name: Pelimerkkien lokeron/telineen konfiguraatio
      description: Kuvailee pelimerkkien lokeron/telineen sisäisen jaottelun (rivit
        ja rivikohtainen kapasiteetti).
    pole_anchoring_method:
      name: Kepin kiinnitysmenetelmä
      description: Määrittää, miten pylväs kiinnitetään maahan tai pelialustalle.
    pole_basket_type:
      name: Sauvan somman tyyppi
      description: Luokittelee hiihtosauvan kärkeen kiinnitetyn somman tyypin tai
        koon, mikä osoittaa tarkoitetut lumiolosuhteet.
    pole_connection_system:
      name: Pylvään liitosjärjestelmä
      description: Yksilöi mekanismin, jolla pylvään osat liitetään toisiinsa (kuten
        kuminauha-, kierre- tai napajärjestelmät), mikä auttaa käyttäjiä arvioimaan
        pystytysnopeutta ja yhteensopivuutta.
    pole_system_type:
      name: Keppijärjestelmän tyyppi
      description: Kuvailee teltan rakenteellisen tukijärjestelmän tai pystytystyylin
        (esim. alumiinikaaret, täytettävät ilmaputket, vaellussauvoilla pystytettävä).
    police_equipment_fitment:
      name: Poliisin varusteiden asennus
      description: Määrittää, mitä viranomaisvarusteita varten ajoneuvo on konfiguroitu
        tai esijohdotettu.
    police_vehicle_equipment_package:
      name: Poliisiajoneuvon varustepaketti
      description: Ilmaisee ajoneuvoon myytäessä sisältyvät poliisille tarkoitetut
        varusteet/laitteet.
    police_vehicle_light_siren_equipment:
      name: Poliisiajoneuvojen valo-/sireenilaitteet
      description: Määrittää, mitkä hätävaroituslaitteet on asennettu poliisiautoon.
    police_vehicle_upfit_level:
      name: Poliisiajoneuvon varustelutaso
      description: Kuvailee ajoneuvoon asennetut poliisivarusteet/valmiudet.
    polish_formulation:
      name: Kiillotusaineen koostumus
      description: Ilmaisee otelaudan kiillotusaineen koostumuksen pohjan / kemiallisen
        tyypin (ei levitystapaa).
    polish_purpose:
      name: Kiillotusaineen käyttötarkoitus
      description: Kiillotuksen ensisijainen haluttu tulos instrumentin pinnalla.
    pollen_level:
      name: Siitepölytaso
      description: Ilmaisee liljalajikkeen siitepölyn aiheuttaman värjäytymisen määrän/todennäköisyyden.
    polymer_clay_firmness_level:
      name: Polymeerisaven kovuusaste
      description: Polymeerisaven suhteellinen kiinteys/pehmeys ennen polttamista
        (työstettävyys).
    polymer_clay_translucency:
      name: Polymeerisaven läpikuultavuus
      description: Polymeerisaven visuaalinen opasiteetti/läpinäkyvyys kovettumisen
        jälkeen.
    pom_pom_handle_style:
      name: Huiskan kahvan tyyppi
      description: Kuvailee tupsun pitämiseen käytetyn kahvan tyypin tai rakenteen.
    pom_pom_trim_backing_tape_material:
      name: Tupsun pohjamateriaali/nauha
      description: Ilmaisee sen ommellun nauhan tai punoksen materiaalin, johon tupsut
        on kiinnitetty. Tämä muodostaa somisteen pohjan.
    pom_pom_type:
      name: Tupsujen tyyppi
      description: Ilmaisee hatussa olevan tupsun tai pallokoristeen olemassaolon
        ja tarkemman tyypin.
    pomegranate_product_form:
      name: Granaattiomenan tuotemuoto
      description: Kuvaa tarjottua fyysistä muotoa (kokonainen hedelmä, kuoritut siemenet,
        jyvät, pakastetut siemenet).
    pomegranate_variety:
      name: Granaattiomenalajike
      description: Määrittää granaattiomenahedelmän tietyn lajikkeen tai muunnoksen
        (esim. Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Poninhäntäpidikkeen tyyli
      description: Kuvaa poninhäntäpidikkeen erityistä rakennetta tai muotoa, jotta
        ostajat voivat valita mieleisensä tyylin.
    popcorn_form:
      name: Popcorn-muoto
      description: Ilmaisee popcorn-tuotteen fyysisen muodon tai valmistustavan, kuten
        syöntivalmis, jyvinä, mikroaaltouunipakkauksena, maustepakkauksena tai lahjapakkauksena.
    pork_rind_form:
      name: Sianrasvanahkojen muoto
      description: Luokittelee sianrasvanahkasnacksien muodon tai tyypin, kuten rasvanahka,
        crackling, puffattu pala tai pelletti.
    portability_features:
      name: Siirrettävyysominaisuudet
      description: Luettelee lepotuolin kiinteät ominaisuudet, jotka helpottavat sen
        siirtämistä, kantamista tai säilyttämistä.
    portability_frame_type:
      name: Kannettavuus/rungon tyyppi
      description: Ilmaisee, ovatko orkesterikellot siirrettävää kenttäteline-/marssikäyttöön
        tarkoitettua tyyppiä vai kiinteää konserttitelinetyyppiä.
    portable_electronic_game_features:
      name: Kannettavan elektronisen pelin ominaisuudet
      description: Keskeiset pelitoiminnot ja laitteisto-ominaisuudet, joita laite
        tukee.
    post_surgery_stage_suitability:
      name: Leikkauksen jälkeinen käyttövaihe
      description: Ilmaisee, mihin toipumisvaiheeseen vartaloasu on mahdollisesti
        suunniteltu. Tieto on tärkeä lääkinnällisiä muotoiluvaatteita ostaville.
    postage_stamp_format:
      name: Postimerkin muoto
      description: Ilmaisee, missä muodossa tai pakkauksessa käyttösarja­merkki tarjotaan,
        kuten yksittäisenä merkkinä, parina, liuskana, lohkona, arkkina, vihkopaneelina
        tai rullana.
    postmark_type:
      name: Postileiman tyyppi
      description: Ilmaisee käytetyssä käyttösarjamerkissä olevan mitätöinnin tai
        postileiman tyypin.
    potato_cut_style:
      name: Perunan leikkaustyyli
      description: Ilmaisee perunoiden fyysisen leikkauksen tai valmistustavan, kun
        niitä ei myydä kokonaisina.
    potato_intended_use:
      name: Perunan käyttötarkoitus
      description: Erottaa välittömään kulutukseen tarkoitetut perunat siemenperunoista
        tai pakastetuista käsitellyistä tuotteista.
    potato_variety:
      name: Perunalajike
      description: Määrittää perunoiden lajikkeen, jotta ostajat voivat löytää tiettyjä
        lajikkeita, kuten ”Yukon Gold”, ”Maris Piper” tai ”Purple Majesty”.
    pottery_clay_firing_required:
      name: Keramiikkasaven polttotarve
      description: Ilmaisee, vaatiiko materiaali uunipolttoa saavuttaakseen tarkoitetun
        lopullisen kovuuden tai viimeistelyn.
    pottery_slip_application_method:
      name: Keramiikkalietteen levitysmenetelmä
      description: Määrittää lietteelle tarkoitetun levitystekniikan.
    pottery_slip_compatible_clay_body:
      name: Keramiikkalietteelle soveltuva savimassa
      description: Ilmaisee savimassatyypit, joiden kanssa liete on suunniteltu yhteensopivaksi
        tai käytettäväksi.
    pottery_slip_form:
      name: Keramiikkalietteen muoto
      description: Ilmaisee, myydäänkö keramiikkaliete käyttövalmiina nesteenä vai
        kuivaseoksena/jauheena, joka on sekoitettava ennen käyttöä.
    pouch_design:
      name: Pussin muotoilu
      description: Kuvaa haarakiilan/pussiosan rakennetta ja tukevuutta parantavia
        ominaisuuksia.
    pouch_style:
      name: Pussin tyyli
      description: Määrittää etuosan pussialueen rakenteen, joka vaikuttaa käyttömukavuuteen,
        tukeen ja ulkonäköön.
    powdered_beverage_variety:
      name: Juomasekoitelajike
      description: Luokittelee tuotteen sen valmistaman juomatyypin mukaan, kuten
        limonadi, urheilujuoma tai proteiinipirtelö.
    power_rack_style:
      name: Voimahäkin rakennetyyppi
      description: Määrittää telineen yleisen mallin tai kokoonpanon ja auttaa ostajia
        erottamaan toisistaan täysikokoiset voimahäkit, puolihäkit ja tilaa säästävät
        vaihtoehdot.
    power_steering_fluid_formulation:
      name: Ohjaustehostinnesteen koostumusryhmä
      description: Nesteen yleinen koostumusryhmä, kuten ATF-pohjainen, erillinen
        hydrauli-/CHF-neste tai yleisneste, yleistä yhteensopivuuden suodatusta varten.
    practice_mute_audio_output:
      name: Harjoitussordinon äänentoistolähtö
      description: Määrittää harjoitussordinossa olevan äänilähdön tyypin kuuntelua
        ja/tai tallennusta varten. Tämä on yleistä hiljaisissa tai elektronisissa
        harjoitussordinoissa.
    practice_mute_intonation_impact:
      name: Harjoitussordinon intonaatiovaikutus
      description: Ilmaisee, miten harjoitussordinon käyttö vaikuttaa soittimen vireeseen
        tai intonaatioon.
    practice_mute_venting_valve_type:
      name: Harjoitussordinon ilmanvirtaus- tai venttiilirakenne
      description: Määrittää, onko harjoitussordiinossa tuuletusaukko ja miten se
        toimii, tai onko siinä säädettävä venttiili vastuksen tai äänenvoimakkuuden
        säätämiseksi.
    practice_pad_features:
      name: Harjoittelutyynyn ominaisuudet
      description: Esittelee harjoitusalustan toiminnalliset ominaisuudet koon ja
        materiaalin lisäksi.
    practice_pad_mounting_style:
      name: Harjoitusalustan kiinnitystapa
      description: Ilmaisee, miten harjoitusalusta on tarkoitus sijoittaa tai kiinnittää
        käytön aikana.
    practice_pad_rebound_level:
      name: Harjoitusalustan kimmoisuus
      description: Ilmaisee harjoitusalustan suhteellisen kimmoisuuden/vasteen verrattuna
        tyypillisiin rumpukalvoihin.
    practice_pad_surface_configuration:
      name: Harjoitusalustan pinnan kokoonpano
      description: Kuvaa, onko alustassa yksi vai useampi käyttöpinta ja eroaako niiden
        tuntuma toisistaan.
    pregnancy_stage_suitability:
      name: Sopivuus raskauden vaiheeseen
      description: Ilmaisee, mihin raskauden aikaiseen tai synnytyksen jälkeiseen
        vaiheeseen vaate on suunniteltu.
    preparation_state:
      name: Valmistelutila
      description: Osoittaa ennen nauttimista tarvittavan valmistus- tai kypsennysasteen.
    preparation_style:
      name: Valmistustyyli
      description: Määrittää vesikastanjoiden leikkuu- tai jalostustilan myyntihetkellä
        (esim. kokonaiset, viipaloidut, paahdetut, pakastetut).
    preservation_medium:
      name: Säilöntäaine
      description: Määrittää ensisijaisen nesteen tai väliaineen, jossa oliivit tai
        kaprikset säilötään (esim. suolavesi, oliiviöljy, etikka).
    presser_foot_attachment_method:
      name: Paininjalan kiinnitystapa
      description: Ilmaisee, miten ompelukoneen paininjalka kiinnittyy paininjalan
        pidikkeeseen/varteen (esim. pikakiinnitys tai ruuvikiinnitys), mikä vaikuttaa
        yhteensopivuuteen.
    pressure_gauge_type:
      name: Painemittarin tyyppi
      description: Ilmaisee polkupyörän pumpun mukana toimitetun painemittarin tyypin,
        jos sellainen on.
    pressure_measurement_unit:
      name: Paineen mittayksikkö
      description: Ilmaisee paineanturin lukemassa tai kalibroinnissa käytetyn yksikön,
        mikä on hyödyllistä tuotteiden vertailussa ja mittarin/ohjausyksikön yhteensopivuuden
        varmistamisessa.
    pressure_plate_balance_type:
      name: Painelevyn tasapainotyyppi
      description: Ilmaisee, onko painelevy sisäisesti tasapainotettu vai vaatiiko/olettaako
        se ulkoista paineistusta moottorin/vauhtipyörän asennon mukaisesti.
    pressure_plate_components_included:
      name: toimitukseen sisältyvät painelevyn osat
      description: Mitä painelevyn listaukseen sisältyy.
    pressure_sensor_application:
      name: Paineanturin käyttötarkoitus
      description: Ilmaisee ajoneuvojärjestelmän/mittauspisteen, johon paineanturi
        on suunniteltu.
    pressure_sensor_port_thread_standard:
      name: Paineanturin portti / ketjustandardi
      description: Määrittää mekaanisen portin tai ketjustandardin, jota käytetään
        anturin asentamiseen ajoneuvojärjestelmään.
    pressurization_method:
      name: Paineistusmenetelmä
      description: Määrittää, miten paine syntyy tai miten sitä ylläpidetään laitteen
        sisällä.
    pretend_housekeeping_set_items_included:
      name: Toimitettavaan settiin sisältyvät siivouslelut
      description: Luettelee, mitkä siivoustarvikkeet sisältyvät settiin (esim. moppi,
        luuta, rikkalapio, suihkepullo).
    pretend_play_electronic_features:
      name: Lelun elektroniset ominaisuudet
      description: Lelun elektroniset/interaktiiviset ominaisuudet.
    pretend_play_set_pieces_included:
      name: Toimitettavaan settiin sisältyvät lelut
      description: Lelusettiin sisältyvät tärkeimmät lavasteet ja osat (esim. kassakone,
        leikkiruoka, työkalut).
    pretend_play_set_theme:
      name: Lelusetin teema
      description: Ensisijainen leikkitilanne/‑teema, jota tuote edustaa (hyödyllinen
        laaja-alaiseen oppimiseen kaikkien roolileikkejä leikkivien lasten keskuudessa).
    pretzel_coating:
      name: Suolatikun päällyste
      description: Ilmaisee suolatikun ulkopinnalle levitetyt mausteet tai päällysteet,
        jotka kattavat sekä suolaiset (suolatut, maustetut) että makeat (suklaa, jogurtti,
        karamelli) vaihtoehdot.
    pretzel_shape:
      name: Suolatikun muoto
      description: Määrittää suolatikun fyysisen muodon (esim. kierre, tikku, pala),
        joka on asiakkaiden käyttämä keskeinen erottava tekijä haussa tai suodatuksessa.
    primary_component_material:
      name: Komponentin ensisijainen materiaali
      description: Moottorilohkon ensisijainen materiaali.
    primary_dish_application:
      name: Ensisijainen ruokalaji
      description: Määrittää pääruoan tai ‑valmisteen, johon taikina on tarkoitettu.
    primary_plant_base:
      name: Ensisijainen kasvipohja
      description: Ilmaisee tärkeimmät maidottomat ainesosat, joita käytetään juuston
        korvikkeen valmistamisessa.
    primary_plant_protein_source:
      name: Ensisijainen kasviproteiinin lähde
      description: Määrittää tuotteen tärkeimmän proteiinia sisältävän kasviperäisen
        ainesosan.
    primary_sweetener_source:
      name: Ensisijainen makeutusaineen lähde
      description: Ilmaisee kasvin tai raaka-aineen, josta siirappi on peräisin.
    print_placement:
      name: Printin sijoittelu
      description: Ilmaisee, mihin t-paidan päägrafiikka/logo sijoitetaan.
    print_technique:
      name: Painotekniikka
      description: Määrittää t-paidan grafiikassa käytetyn koristelu-/painatusmenetelmän.
    printable_canvas_intended_use:
      name: Tulostettavan kankaan käyttötarkoitus
      description: Ensisijainen käyttötarkoitus, johon tulostettava kangas on optimoitu.
    printable_fabric_format:
      name: Tulostettavan kankaan muoto
      description: Määrittää, miten tulostettava puuvillakangas toimitetaan (yksittäiset
        arkit vai jatkuva rulla), mikä vaikuttaa tulostimen syöttöön ja projektin
        työkulkuun.
    prism_material:
      name: Prisman materiaali
      description: Määrittää itse optisen elementin (prisman) materiaalin, joka vaikuttaa
        kirkkauteen, kestävyyteen ja naarmuuntumattomuuteen.
    prisoner_transport_configuration:
      name: Vankien kuljetuskokoonpano
      description: Määrittää, onko pakettiauto varusteltu pidätettyjen/vankien kuljetusta
        varten ja miten.
    prisoner_transport_partition_type:
      name: Vankien kuljetusajoneuvon seinän tyyppi
      description: Etu- ja takaosastoja erottavan sisäväliseinän/häkin tyyppi.
    privacy_or_acoustic_feature:
      name: Yksityisyys- tai akustiikkaominaisuus
      description: Määrittää sisäänrakennetut yksityisyyttä suojaavat tai akustiset
        elementit, kuten väliseinät, akustiset sermit tai täydellinen kotelointi.
    processing_state:
      name: Valmistelun tila
      description: Onko höyhenet steriloitu/pesty tai muuten valmisteltu askartelukäyttöön.
    produce_grade:
      name: Kiivin laatuluokka
      description: Luokittelee kiiville annetun laatuluokan kokon, ulkonäön ja kunnon
        perusteella.
    produce_growth_stage:
      name: Tuotteen kasvuaste
      description: Määrittää kasvuasteen, jossa tuote myydään (esim. versot, babylehti,
        täysikasvuinen lehti, elävä kasvi, siemen).
    produce_washing_state:
      name: Tuotteen pesun tila
      description: Ilmaisee, onko lehtivihannekset pesty ja valmiita syötäväksi.
    profile_shape:
      name: Profiili/muoto
      description: Symbaalin yleinen kaarevuus / profiili (kuinka jyrkästi se nousee
        reunasta kupuun).
    projectile_ammunition_type:
      name: Ammustyyppi
      description: Määrittää leluaseen käyttämien ammusten tai kulutustarvikkeiden
        tyypin, jos sovellettavissa.
    projectile_finish:
      name: Ammuksen viimeistely
      description: Määrittää kuulan pinnoitteen, joka parantaa korroosionkestävyyttä
        tai näkyvyyttä (esim. kuparoitu, sinkitty, maalattu).
    projectile_type:
      name: Ammuksen tyyppi
      description: Yksilöi, minkä tyyppistä ammusta tuote käyttää tai mihin se on
        tarkoitettu.
    pronation_support:
      name: Pronaatiotuki
      description: Ilmaisee askellustyypin tai pronaatiotyylin, jota varten tennarit
        on suunniteltu.
    propellant_type:
      name: Ponneaineen tyyppi
      description: Määrittää ponneaineen, jonka kanssa osa tai lisävaruste on suunniteltu
        käytettäväksi.
    propeller_blade_cup:
      name: Potkurin lavan kaarevuus
      description: Ilmaisee lavan takareunan kaarevuuden.
    propeller_hub_type:
      name: Potkurin navan tyyppi
      description: Määrittää potkurin keskiö-/holkkijärjestelmän (vaihdettavat keskiösarjat
        tai kiinteä/prässätty rakenne).
    propeller_rotation:
      name: Potkurin pyörimissuunta
      description: Määrittää potkurin pyörimissuunnan.
    protectant_formula_base:
      name: Suoja-aineen peruskoostumus
      description: Määrittää suoja-aineen peruskoostumuksen, joka vaikuttaa kiiltoon,
        tuntuun ja puhdistettavuuteen (esim. vesipohjainen tai liuotinpohjainen).
    protection_coverage_area:
      name: Suojattu alue
      description: Yksilöi, mitkä kellon osat suojavaruste peittää.
    protection_level:
      name: Suojaustaso
      description: Ilmaisee kotelon tarkoitetun suojaustason laitteen kuljetusta ja
        varastointia varten.
    protective_case_interior_protection_type:
      name: Suojakotelon sisäpuolinen suojaustapa
      description: Kuvailee sisäpuolista ensisijaista suojaustapaa, jolla sisältö
        kiinnitetään ja pehmustetaan.
    protective_case_shell_type:
      name: Suojakotelon kuorityyppi
      description: Yksilöi suojakotelon ulkokuoren rakennetyypin (jäykkyyden), joka
        vaikuttaa puristuskestävyyteen ja kannettavuuteen.
    protective_contact_padding_material:
      name: Suojakontaktin pehmustemateriaali
      description: Soittimen kontaktipisteissä (kannatin/kellokappaleen sisäosa) naarmujen
        estämiseen käytetty materiaali (esim. huopa, kumi).
    protective_cup_configuration:
      name: Suojakupin kokoonpano
      description: Määrittää, sisältyykö tuotteeseen suojakuppi, onko se irrotettava
        vai onko vaatteessa vain tasku kupille.
    protective_eyewear_standard_compliance:
      name: Suojalasien standardienmukaisuus
      description: Määrittää turvallisuus- tai iskunkestävyysstandardit tai sertifikaatit,
        jotka suojalasit täyttävät tai ylittävät urheilukäytössä.
    protective_gear_certification_standard:
      name: Suojavarusteiden sertifiointistandardi
      description: 'Ilmaisee varusteen turvallisuus- tai sertifiointistandardin (vaihtelee
        tuotetyypin mukaan: kypärästandardit, asustestandardit, iskusuojastandardit).'
    protective_gear_items_included:
      name: Mukana tulevat suojavarusteet
      description: Luettelee moniosaisen suojavarustesarjan yksittäiset osat.
    protective_gear_padding_type:
      name: Suojavarusteen pehmustetyyppi
      description: Määrittää suojavarusteiden iskuilta suojaavan pehmustetyypin.
    protective_gear_safety_certifications:
      name: Suojavarusteiden turvallisuussertifikaatit
      description: Luettelee tuotteen täyttämät, tunnustetut lajikohtaiset turvallisuus-
        tai suorituskykystandardit, kuten NOCSAE- tai ASTM-standardit maahockeykypäröille.
    protective_pad_components_included:
      name: Suojapehmusteiden mukana tulevat osat
      description: Määrittää, mitä yksittäisiä suojavarusteita moniosainen sarja sisältää,
        jotta ostaja tietää tarkalleen, mitkä kehonosat sisältyvät suojaukseen.
    protective_shorts_intended_use:
      name: Suojaavien shortsien käyttötarkoitus
      description: Ensisijainen ajo-/kilpailulaji, johon suojashortsit on suunniteltu.
    protective_shorts_padding_type:
      name: Suojaavan shortsien pehmusteen tyyppi
      description: Määrittää shortseissa käytettyjen suojaelementtien rakenteen tai
        muodon.
    protective_shorts_padding_zones:
      name: Suojaavien shortsien pehmusteiden alueet
      description: Yksilöi, mitkä kehonosat suojashortsit suojaavat integroiduilla
        pehmusteilla tai suojilla.
    protective_treatment:
      name: Suojakäsittely
      description: Määrittää mahdollisen suojaavan viimeistelyn tai käsittelyn, joka
        parantaa tahrojen tai veden hylkivyyttä tai UV-suojaa (esim. Teflon).
    protector_coverage_area:
      name: Suojan kattama alue
      description: Määrittää, mitä vartalon alueita (esim. rintakehä, selkä, kyljet)
        suojus on suunniteltu suojaamaan.
    puck_bottom_style:
      name: Kiekon pohjan tyyppi
      description: Kuvailee kiekon alapinnan profiilin, joka vaikuttaa nopeuteen ja
        hallintaan eri shuffleboard-alustoilla.
    puck_type:
      name: Kiekon tyyppi
      description: Luokittelee kiekon toimintatavan tai käyttötarkoituksen virallisesta
        pelikäytöstä keräily- ja matkamuistokäyttöön.
    pull_buoy_style:
      name: Vetopoijun tyyppi
      description: Ilmaisee vetopoijun toiminnallisen tyypin tai rakenteen, kuten
        vakiomalli, nilkkamalli tai yhdistelmä (pullkick).
    pull_through_weight_material:
      name: Läpivedettävän liinan painon materiaali
      description: Yksilöi läpivetoliinan painon materiaalin, jota käytetään ohjaamaan
        puhdistuspyyhe instrumentin läpi.
    pulp_content:
      name: Hedelmäsosepitoisuus
      description: Ilmaisee juoman sisältämän hedelmä- tai vihannessoseen määrän.
    pump_accessories_included:
      name: Mukana tulevat pumpun lisävarusteet
      description: Luettelee pallopumpun mukana toimitettavat lisävarusteet, jotta
        ostaja ymmärtää paketin sisällön.
    pumping_compatibility:
      name: Sopivuus pumppaukseen
      description: Ilmaisee, onko imetysliivit suunniteltu handsfree-pumppaukseen
        ja imetykseen.
    punch_pad_type:
      name: Iskutyynyn tyyppi
      description: Määrittää nyrkkeily-/iskutyynyn rakenteen tai tyylin, jotta ostaja
        voi valita harjoitustarpeisiinsa sopivan tyynyn.
    punching_training_bag_shape:
      name: Nyrkkeily-/harjoitussäkin muoto
      description: Määrittää raskaan säkin geometrisen muodon, mikä auttaa mallien
        valinnassa eri lyöntiharjoituksiin (esim. upparit, vartalolyönnit).
    puncture_protection_technology:
      name: Pistosuojatekniikka
      description: Luettelee renkaaseen sisältyvät valmistajakohtaiset tai yleiset
        rengasrikolta suojaavat kerrokset tai kylki-/runkovahviketekniikat (esim.
        EXO, SnakeSkin, Kevlar-vyö).
    puppet_features:
      name: Nuken ominaisuudet
      description: Korostaa nuken toiminnallisia tai suorituskykyyn liittyviä ominaisuuksia
        (esim. liikkuva suu, ääniefektit, käännettävyys).
    puppet_puppet_theater_accessory_type:
      name: Nukkejen ja nukketeatterin lisävarustetyyppi
      description: Määrittää, millainen lisävaruste tuote on (esim. näyttämörekvisiitta,
        nuken asu, ohjaustanko, vaihtolanka).
    purity_unit:
      name: Puhtausyksikkö
      description: Miten kolikon puhtaus ilmaistaan (hienous vai karaatti).
    push_up_bar_design:
      name: Punnerrustangon muotoilu
      description: Ilmaisee punnerrustankojen toiminnallisen suunnittelutyylin (esim.
        kiinteät, pyörivät, nojapuut).
    pushrod_end_type:
      name: Työntötangon pään tyyppi
      description: Määrittää polkimessa tai pääsylinterissä käytettävän työntötangon
        pään/lisäosan tyylin.
    putty_glow_activation_method:
      name: Muovailumassan hohdon aktivointimenetelmä
      description: Miten muovailumassa saadaan hohtamaan (esim. auringonvalo, UV-valo/mustavalo).
    putty_glow_color:
      name: Muovailumassan hohtoväri
      description: Määrittää värin, jota muovailumassa säteilee hohtaessaan pimeässä.
    putty_inclusions:
      name: Muovailumassan sisältö
      description: Huomionarvoiset muovailumassaan sekoitetut ainekset (esim. kimalle,
        konfetti, vaahtomuovihelmet).
    putty_texture:
      name: Muovailumassan rakenne
      description: Muovailumassan ensisijainen toiminta käsiteltäessä (esim. kimmoisa,
        venyvä, nestemäinen).
    puzzle_accessory_features:
      name: Palapelin lisätarvikkeen ominaisuudet
      description: Palapelitarvikkeiden toiminnalliset ominaisuudet ja muotoiluelementit
        (vaihtelee tarviketyypin mukaan).
    pyrometric_cone_range:
      name: Pyrometrinen kartioalue
      description: Suositellut pyrometriset kartiot, joita varten lasite on suunniteltu
        (esim. kartio 06–04, kartio 5–6).
    quarter_panel_coverage_type:
      name: Takalokasuojan peittävyys
      description: Määrittää, kuinka suuren osan takalokasuojan pinta-alasta tuote
        korvaa/korjaa.
    quarter_panel_set_contents:
      name: Takalokasuojasetin sisältö
      description: Määrittää listaukseen sisältyvän takalokasuojapaketin kokoonpanon
        (yksi puoli, molemmat puolet tai lisäkorjausosat).
    quilting_ruler_markings:
      name: Tikkausviivaimen merkinnät
      description: Määrittää tikkausviivaimeen painettujen merkintöjen tyypit leikkaamista/kohdistamista
        varten.
    quilting_ruler_non_slip_feature:
      name: Tikkausviivaimen liukumattomuus
      description: Ilmaisee, onko viivaimessa liukumaton tausta/pintakäsittely, joka
        vähentää viivoittimen siirtymistä kankaalla.
    quilting_ruler_transparency:
      name: Tikkausviivaimen läpinäkyvyys
      description: Ilmaisee viivaimen materiaalin läpinäkyvyyden/näkyvyyden kankaan
        ja alla olevien merkintöjen näkemiseksi.
    quilting_thread_usage:
      name: Tikkauslangan käyttö
      description: Ilmaisee langan suunnitellun käytön tikkauksessa (miten sitä on
        tarkoitus käyttää).
    quilting_thread_weight_system:
      name: Tikkauslangan vahvuus
      description: Määrittää langan paksuuden ilmaisemiseen käytetyn koko-/vahvuusjärjestelmän
        (esim. wt, Tex, Denier), jotta numeerinen koko voidaan tulkita oikein.
    quince_variety:
      name: Kvittenilajike
      description: Tunnistaa kvittenin viljelylajikkeen tai lajikkeen, sillä maku,
        aromi ja soveltuvuus ruoanlaitossa voivat vaihdella lajikkeen mukaan.
    quinoa_variety:
      name: Kvinoan lajike
      description: Määrittää kvinoan tarkan värin tai lajikkeen, koska eri lajikkeilla
        on erilaiset maut, koostumukset ja kypsennysajat.
    quinto_tuning_system:
      name: Quinto-kongarummun viritysjärjestelmä
      description: Quinton virittäminen/jännittäminen.
    race_car_class:
      name: Kilpa-autoluokka
      description: Kilpailuluokka/-kategoria, jota varten auto on rakennettu (sääntöjoukon/tyyppihyväksynnän
        ryhmittely).
    racing_balaclava_face_opening_style:
      name: Kypärämyssyn kasvoaukko
      description: Kypärämyssyn kasvoaukon muoto, joka vaikuttaa kypärän istuvuuteen,
        tiiviyteen ja käyttömukavuuteen.
    racing_balaclava_neck_coverage_length:
      name: Kypärämyssyn kaulasuojan pituus
      description: Kaulasuojan peittopituus, joka on suunniteltu sujautettavaksi puvun/kaulan
        tuen sisään tiivistyksen ja suojan takaamiseksi.
    racing_balaclava_ventilation_zones:
      name: Kypärämyssyjen tuuletuskohdat
      description: Hengittävät/verkkomaiset tai tuuletetut alueet, jotka parantavat
        ilmankiertoa kypärän alla.
    racing_chest_guard_intended_use:
      name: Rintasuojan käyttötarkoitus
      description: Ensisijainen moottoriurheilulaji tai konteksti, jota varten rintasuoja
        on suunniteltu.
    racing_chest_guard_size_type:
      name: Rintasuojan koko
      description: Ilmaisee, onko tuote mitoitettu nuorille vai aikuisille vai onko
        se yleismallinen/säädettävä.
    racing_glove_certification_standard:
      name: Kilpakäsineen sertifiointistandardi
      description: Määrittää kilpakäsineiden turvallisuussertifikaatin/‑standardin
        (esim. FIA, SFI, CE) ja valinnaisesti luokituksen/tason, jos sovellettavissa.
    racing_goggles_lens_system:
      name: Kilpalasien linssijärjestelmä
      description: Määrittää suojalasien linssinvaihdon/repäisyvalmiuden järjestelmän.
    racing_helmet_certification_standard:
      name: Kilpakypärän sertifiointistandardi
      description: Turvallisuussertifikaatit, jotka kilpakypärä täyttää.
    racing_kart_brake_type:
      name: Karting-kilpa-auton jarrujen tyyppi
      description: Karting-kilpa-autoon asennetun ensisijaisen jarrujärjestelmän tyyppi.
    racing_kart_class:
      name: Karting-kilpa-auton luokka
      description: Kilpailuluokka tai sääntökokonaisuus, jonka mukaisesti karting-kilpa-auto
        on rakennettu.
    racing_kart_frame_material:
      name: Karting-kilpa-auton rungon materiaali
      description: Karting-kilpa-auton rungon/alustan ensisijainen materiaali.
    racing_kart_seat_size:
      name: Karting-kilpa-auton istuimen koko
      description: Asennettavan karting-kilpa-auton istuimen koko.
    racing_neck_support_style:
      name: Niskatuen tyyli
      description: Niskatuen rakenteellinen tyyli ja miten se liittyy yhteen ajajan
        vartalon/kypärän kanssa.
    racing_suit_certification_standard:
      name: Kilpapuvun sertifiointistandardi
      description: Määrittää, minkä kilpailuturvallisuuden sertifioinnin tai tyyppihyväksynnän
        puku täyttää (esim. FIA:n tai SFI:n standardit).
    racing_suit_cuff_design:
      name: Kilpapuvun hihan- ja jalansuiden muotoilu
      description: Nilkka-/rannemansetin tyyppi, jota käytetään käsineiden/saappaiden
        kanssa tiiviyden/käyttömukavuuden parantamiseksi.
    racing_suit_size_system:
      name: Kilpapuvun kokojärjestelmä
      description: Puvussa käytetty kokojärjestelmä (esim. Alpha S-XXL, EU/US-numero,
        nuoriso).
    racing_truck_discipline:
      name: Kilpa-autoilun laji
      description: Määrittää ensisijaisen kilpailulajin/formaatin, jossa auto on rakennettu
        kilpailemaan.
    rack_side_configuration:
      name: Varastohyllyn puolten konfiguraatio
      description: Ilmaisee, onko räkissä matot yhdellä vai molemmilla puolilla, mikä
        vaikuttaa tilankäyttöön ja kulkuun.
    rack_system_configuration:
      name: Räkkijärjestelmän kokoonpano
      description: Kuvaa rumpuräkin yleisen asettelun/muodostuksen.
    racket_dampener_type:
      name: Mailan tärinänvaimentimen tyyppi
      description: Määrittää mailan tärinänvaimentimen asennusmekanismin tai toiminnallisen
        tyylin.
    racket_grip_size:
      name: Mailan otteen koko
      description: Määrittää mailan kahvan ympärysmittaan perustuvan kokoluokituksen
        (esim. G1–G6) oikeanlaisen istuvuuden ja käyttömukavuuden varmistamiseksi.
    racket_sport_shoe_court_surface:
      name: Mailapelikenkien kentän pinta
      description: Määrittää, millaiselle tenniskentän pinnalle kenkä on suunniteltu
        tai optimoitu, mikä auttaa pelaajia valitsemaan jalkineet, joissa on oikea
        ulkopohjakuvio ja kumiseos tyypillistä pelialustaa varten.
    racket_string_pattern:
      name: Mailan jännekuvio
      description: Määrittää pää- ja poikittaisjänteiden lukumäärän mailassa (esim.
        16 x 18), mikä vaikuttaa hallintaan, kierteeseen ja kestävyyteen.
    racket_stringing_status:
      name: Mailan jänteiden tila
      description: Ilmaisee, myydäänkö maila jännitettynä vai jännittämättömänä vai
        onko siinä tehdasjänteet.
    racket_weight_class:
      name: Mailan painoluokka
      description: Tarjoaa sulkapallon standardoidut ”U”-painoluokat, jolloin pelaajat
        voivat valita mailat haluamastaan painoluokasta.
    racquet_toy_set_equipment_included:
      name: Toimitukseen sisältyvät mailalelusetin varusteet
      description: Luettelee, mitä tuotteita leluun tai settiin sisältyy (esim. verkko,
        pallot, mailat).
    racquetball_squash_training_aid_type:
      name: Racketball- ja squash-harjoitteluvälineet
      description: Luokittelee tietyn tyyppisen harjoitusapuvälineen tai ‑lisävarusteen,
        jotta ostaja voi nopeasti löytää tarvitsemansa tuotteen.
    radiator_cap_gasket_material:
      name: Jäähdyttimen korkin tiivistemateriaali
      description: Jäähdyttimen korkissa käytettyjen tiivisteiden materiaali.
    radiator_cap_pressure_relief_style:
      name: Jäähdyttimen korkin paineenpoistomekanismi
      description: Määrittää jäähdyttimen korkin paineenalennus-/ilmaus-/käyttötavan,
        joka voi vaikuttaa käsittelyyn, turvallisuuteen ja suunniteltuun käyttöön.
    radiator_expansion_tank_cap_application:
      name: Jäähdyttimen/paisuntasäiliön korkin käyttö
      description: Ilmaisee, onko korkki tarkoitettu jäähdyttimen täyttökaulaan vai
        jäähdytysnesteen paisunta-/ylivirtaussäiliöön.
    radiator_fan_control_type:
      name: Jäähdyttimen tuulettimen ohjaustyyppi
      description: Määrittää, miten jäähdyttimen tuuletinta ohjataan tai miten se
        käynnistetään.
    radiator_fan_mounting_pattern:
      name: Jäähdyttimen tuulettimen asennuskaavio
      description: Ilmaisee, millaisella kiinnitystavalla tai -kuviolla tuuletin tai
        tuuletinkokoonpano asennetaan.
    radiator_fan_type:
      name: Jäähdyttimen tuulettimen tyyppi
      description: Määrittää jäähdyttimen tuuletinkokoonpanon toiminnallisen tyypin
        tai kokoonpanon.
    radiator_hose_end_type:
      name: Jäähdyttimen letkun liitäntäpään tyyppi
      description: Ilmaisee jäähdyttimen letkun päiden ensisijaisen liitäntä- tai
        tiivistystavan jäähdyttimen tai moottorin liitäntöihin.
    radiator_hose_position:
      name: Jäähdyttimen letkun sijainti
      description: Jäähdyttimen letkun toiminnallinen sijainti tai tyyppi jäähdytysjärjestelmässä.
    radiator_hose_shape:
      name: Jäähdyttimen letkun muoto
      description: Letkun yleinen geometria tai muoto, joka vaikuttaa asennusreititykseen
        ja sopivuuteen.
    radiator_overflow_tank_level_sensor_provision:
      name: Paisuntasäiliön nestetasoanturin valmius
      description: Ilmaisee, sisältääkö säiliö jäähdytysnesteen tasoanturin tai tukeeko
        se sen käyttöä.
    radiator_overflow_tank_shape:
      name: Jäähdyttimen ylivuotosäiliön muoto
      description: Paisuntasäiliön rungon yleinen muoto tai rakenne.
    radish_variety:
      name: Retiisilajike
      description: Määrittää retiisin lajikkeen tai tyypin, jotta ostajat voivat valita
        haluamansa maun, värin tai koon, kuten daikonin, vesimeloniretiisin tai French
        Breakfast -retiisin.
    radius_of_hollow:
      name: Terän uran säde
      description: Ilmaisee teroittimen tuottaman luistimen terän hollow-profiilin,
        joka ilmoitetaan yleisinä vakiokokoina tai flat-profiilina.
    rail_coverage_configuration:
      name: Reunasuojan kattavuusasetelma
      description: Ilmaisee, mitä pinnasängyn osia suojasetti suojaa, ja selventää,
        onko kyseessä yksittäinen etupaneeli vai moniosainen reunasetti.
    rail_mount_standard:
      name: Kiskokiinnitysstandardi
      description: Ilmaisee kisko- tai kiinnitysstandardin, jolla lisävaruste, kuten
        tähtäin tai valaisin, kiinnitetään BB-aseeseen.
    rail_side:
      name: Kiskon puoli
      description: Ilmaisee, onko vaihtokisko tarkoitettu vasemmalle puolelle, oikealle
        puolelle vai myydäänkö se parina.
    rail_style:
      name: Reilin malli
      description: Luokittelee skeittireilin yleisen mallin tai rakenteen, kuten A-runko,
        rainbow-reili tai kinkattu reili. Malli vaikuttaa temppumahdollisuuksiin ja
        tarvittavaan tilaan.
    rail_system:
      name: Kiskojärjestelmä
      description: Ilmaisee aseessa olevan lisävarusteiden kiinnitysrajapinnan, kuten
        Picatinny- tai M-LOK-järjestelmän.
    rain_sensor_technology:
      name: Sadeanturiteknologia
      description: Ilmaisee, millä tunnistustekniikalla tuulilasissa oleva vesi havaitaan.
    rain_suit_configuration:
      name: Sadeasun kokoonpano
      description: Ilmaisee, onko tuote yksiosainen haalari, moniosainen sarja vai
        jokin muu kokoonpano.
    rainstick_construction_type:
      name: Sadeputken rakenne
      description: Kuvaa, miten sadeputki on rakennettu, esimerkiksi onko se perinteinen
        kaktus- tai puuputki vai moderni vaihtoehto.
    rainstick_fill_material:
      name: Sadeputken täytemateriaali
      description: Määrittää sadeputken sisällä käytetyn täytteen, joka synnyttää
        solisevan äänen, kuten siemenet tai helmet.
    rainstick_playing_technique:
      name: Sadeputken soittotekniikka
      description: Ilmaisee sadeputken suositellut soittotekniikat tai käsittelytavan,
        joilla saadaan aikaan tarkoitettu ääniefekti.
    rainstick_sound_character:
      name: Sadeputken äänen luonne
      description: Kuvaa sadeputken tuottamaa yleistä äänen luonnetta.
    raising_method:
      name: Kasvatusmenetelmä
      description: Ilmaisee eläinten kasvatus- ja loppukasvatusmenetelmän ennen käsittelyä,
        kuten ruohoruokinta, laidunkasvatus tai viljalla viimeistely.
    rally_competition_class:
      name: Rallikilpailun luokka
      description: Ilmaisee kattojärjestön tai sääntöjen mukaisen luokan, johon ralliauto
        on rakennettu, jos tieto on saatavilla.
    rally_surface_setup:
      name: Ralliauton säätö ajopinnan mukaan
      description: Ilmaisee ensisijaisen ajoalustan tai maaston, jota varten ralliauton
        säädöt tai rakenne on suunniteltu.
    ramp_surface_texture:
      name: Rampin pinnan tekstuuri
      description: Kuvaa rampin ajopinnan pintakäsittelyä tai pitoa.
    ratchet_mounting_style:
      name: Räikän asennustyyli
      description: Ilmaisee, miten räikkäsoitinta pidetään kädessä tai miten se kiinnitetään
        soittamisen tai käyttöönoton aikana.
    rattle_element_material:
      name: Helistinelementin materiaali
      description: Ilmaisee soittimen ominaisen surisevan tai helisevän äänen tuottavien
        elementtien materiaalin, kuten hampaat, kulkuset tai helmet.
    rattle_type:
      name: Räminätyyppi
      description: Ilmaisee, sisältääkö viehe sisäisen räminäkuulan tai äänikammion
        ja jos sisältää, minkä tyyppinen räminä siinä on.
    rc_airship_lifting_gas_type:
      name: Kauko-ohjattavan ilmalaivan nostokaasu
      description: Ilmaisee, millä kaasulla ilmalaivan tai mainospallon kuori on tarkoitus
        täyttää, jos sovellettavissa.
    rc_helicopter_control_frequency:
      name: Kauko-ohjattavan helikopterin ohjaustaajuus
      description: Ohjaimen ja kauko-ohjattavan helikopterin välinen radiotaajuusalue,
        kuten 2,4 GHz, joka vaikuttaa häiriönsietoon ja yhteensopivuuteen.
    rc_helicopter_stabilization_features:
      name: Kauko-ohjattavan helikopterin vakautusominaisuudet
      description: Luettelee vakautus- ja ohjausavustintoiminnot, jotka helpottavat
        lentämistä tai lisäävät helikopterin ominaisuuksia.
    rc_motorcycle_controller_type:
      name: Radio-ohjattavan moottoripyörän ohjaintyyppi
      description: Mukana toimitettavan ohjaimen muotoilu tai rakenne.
    rc_plane_takeoff_launch_method:
      name: Kauko-ohjattavan lentokoneen lentoonlähtö-/laukaisutapa
      description: Ilmaisee kauko-ohjattavan lentokoneen tavallisen lentoonlähtö-
        tai laukaisutavan sekä sen vaikutuksen käyttöpaikkaan ja käyttötapaan.
    rc_vehicle_controller_type:
      name: Kauko-ohjattavan ajoneuvon ohjaintyyppi
      description: Ilmaisee kauko-ohjattavan ajoneuvon ohjaamiseen käytettävän ohjaimen
        tyypin tai muodon.
    rc_vehicle_scale:
      name: Radio-ohjattavan ajoneuvon mittakaava
      description: Ilmaisee kauko-ohjattavan auton tai kuorma-auton mittakaavan eli
        kokoluokan, kuten 1:10 tai 1:16.
    rc_vehicle_terrain_type:
      name: Kauko-ohjattavan ajoneuvon käyttömaasto
      description: Ilmaisee, millaiselle maastolle kauko-ohjattava auto tai kuorma-auto
        on ensisijaisesti tarkoitettu.
    reach_adjustment_type:
      name: Ulottuvuuden säätötapa
      description: Ilmaisee, voidaanko jarrukahvan ja ohjaustangon välistä etäisyyttä
        säätää ja, jos tämä on mahdollista, voiko säädön tehdä ilman työkaluja vai
        vaatiiko tämä työkalun käyttöä.
    rear_axle_spacing:
      name: Taka-akselin välys
      description: Haarukkapään/akselin koko, joka runko on suunniteltu hyväksymään.
        Vaikuttaa renkaiden yhteensopivuuteen.
    rear_axle_standard:
      name: Taka-akselin standardi
      description: Määrittää takarenkaan käyttämän akselin liitännän/muodon (esim.
        pikalukitus, eri läpiakselikoot).
    rear_axle_type:
      name: Taka-akselin tyyppi
      description: Määrittää kiinnitysjärjestelmän ja akselin halkaisijan, joita käytetään
        takapyörän kiinnittämiseen runkoon.
    rear_coverage:
      name: Pakaroiden peittävyys
      description: Määrittää, kuinka suuren osan pakaroista bikinien alaosa peittää
        (esim. keimaileva, täyteläinen).
    rear_opening_type:
      name: Takapuolen aukon tyyppi
      description: Kuvailee takapuoleen pääsyn eli "peppuläpän" ominaisuutta kätevää
        vessassa käymistä varten, kuten avattava luukku tai täysimittainen takana
        oleva vetoketju.
    rear_seat_configuration:
      name: Takaistuinten konfiguraatio
      description: Määrittää takaistuinkokoonpanon konfiguraation. Tämä edesauttaa
        sovitusta ja sisäpuolen asettelun valintaa.
    rear_view_mirror_ornament_attachment_type:
      name: Taustapeilin koristeen kiinnityksen tyyppi
      description: Määrittää, miten koriste kiinnittyy taustapeilin varteen tai koteloon
        (esim. narulenkki, klipsi, koukku).
    rearview_mirror_mount_attachment_type:
      name: Taustapeilin kiinnityksen liitostyyppi
      description: Määrittää, miten kiinnitysosa kiinnittyy fyysisesti taustapeilikokoonpanoon
        (peilin runkoon tai varteen), kuten puristimella, klipsillä, hihnalla, tarratyynyllä
        tai pultattavalla kiinnikkeellä.
    rebound_board_face_type:
      name: Palautusseinän lyöntipinnan tyyppi
      description: Kuvaa pinnan rakenteen, joka määrittää kimpoamiskäyttäytymisen,
        kuten tasainen, kulmitettu tai monipintainen rakenne.
    rebound_level:
      name: Kimpoamistaso
      description: Ilmaisee, kuinka paljon seinäpallo kimpoaa takaisin vaikutuksen
        jälkeen, mikä auttaa käyttäjiä valitsemaan kimpoamattoman ja kohtalaisen kimpoamisen
        mallin välillä.
    rebound_surface_configuration:
      name: Kimpoamispintojen konfiguraatio
      description: Määrittää kimpoamispintojen asettelun ja kimpoamisen ennustettavuuden
        (yksi-, kaksi- tai monipuolinen; ennustettava vs. ennustamaton).
    rebounder_design:
      name: Rebounder-seinän suunnittelu
      description: Määrittää tuotteen rakenteellisen tyylin tai kimpoamispinnan konfiguraation.
    rebounder_design_type:
      name: Rebounder-seinän suunnittelutyyppi
      description: Määrittää harjoitusvälineen ensisijaisen kimpoamismekanismin tai
        rakennetyypin (esim. joustinnarulla varustettu alusta, kehystetty verkko,
        ponnahtava maalitaulu).
    rebounder_sides:
      name: Rebounder-seinän puolet
      description: Ilmaisee, voiko rebounder-seinä palauttaa palloja yhdeltä vai molemmilta
        puolilta.
    rebounding_mechanism_type:
      name: Palautusmekanismin tyyppi
      description: Määrittää kiekon tai pallon palauttamiseen käytetyn tekniikan (esim.
        kumilevy, joustinköysi).
    recipient_relationship:
      name: Vastaanottajan suhde
      description: Onnittelukortin ajateltu vastaanottajan suhde (esim. äiti, isä,
        ystävä).
    recliner_control_type:
      name: Nojatuolin ohjaustyyppi
      description: Määrittää, miten kallistusmekanismia käytetään (esim. manuaalinen
        vipu, sähkökäyttöinen painikepaneeli, kaukosäädin).
    recliner_motion_type:
      name: Lepotuolin liikkeen tyyppi
      description: Määrittelee lepotuolin ensisijaisen liikkumiskyvykkyyden (esim.
        keinu, liuku, kääntö, seinän viereen menevä, nosto).
    reclining_mechanism:
      name: Kallistusmekanismi
      description: Määrittää sohvan kallistuksen säätötoiminnon mekanismin.
    recommended_candle_format:
      name: Suositeltu kynttilän muoto
      description: Ilmaisee suositellut kynttilän muodot tai muodon, joille nämä itseliimautuvat
        sydänpidikkeet on tarkoitettu.
    recommended_container_type:
      name: Suositeltu säiliötyyppi
      description: Säiliömateriaalit, joita suositellaan tai jotka ovat turvallisia
        geelivahakynttilöiden valmistukseen.
    recommended_fabric_type:
      name: Suositeltu kangastyyppi
      description: Suositellut kankaat parhaan tuloksen saavuttamiseksi ompelukaavan
        osalta.
    recommended_fabric_weight:
      name: Suositeltu kankaan paino
      description: Ilmaisee kuviolle suositellun kankaan painoluokan.
    recommended_food_pairing:
      name: Suositeltu ruokapari
      description: Määrittää ensisijaiset proteiinit tai ruoat, joille kastike on
        tarkoitettu (esim. kana, sianliha, naudanliha, kala, vihannekset).
    recommended_lane_condition:
      name: Suositeltu radan kunto
      description: Ilmaisee öljykuvion tai radan kunnon, jolle pallo on suunniteltu.
    recommended_motor_impulse_class:
      name: Suositeltu moottorin impulssiluokka
      description: Määrittää suositellun rakettimoottorin impulssiluokan turvallista/optimaalista
        lentoa varten.
    recommended_reading_level:
      name: Suositeltu lukemistaso
      description: Ilmaisee tuotteen suositellun lukutaitovaiheen/-kyvyn, jotta ostaja
        voi valita sen lapsen nykyiselle lukutaidon kehitystasolle sopivaksi.
    recommended_sleep_position:
      name: Suositeltu nukkumisasento
      description: Ilmaisee, missä nukkumisasennoissa patja on suunniteltu mukavia
        unia varten (esim. kyljellään tai selällään nukkuminen).
    recommended_storage:
      name: Suositeltu säilytys
      description: Ilmaisee, miten tuotetta tulisi varastoida tuoreuden säilyttämiseksi.
    recommended_surfaces:
      name: Suositellut pinnat
      description: Määrittää liiman aiotut liimauspinta/-materiaalikategoriat yleisen
        askarteluun sopivuuden lisäksi (esim. pelkkä paperi vs. monenlaiset pinnat).
    recommended_use_case:
      name: Suositeltu käyttötarkoitus
      description: Tiivisteen ensisijainen käyttötarkoitus (väliaikainen/hätätilanne
        vs. pitkäaikaisempi korjaus).
    recommended_use_location:
      name: Suositeltu käyttösijainti
      description: Keinulaudan tarkoitettu ympäristö (esim. kotipiha vs. yleinen leikkipuisto
        jne.)
    recommended_vehicle_surfaces:
      name: Suositellut ajoneuvon pinnat
      description: Määrittää ajoneuvon pinnat/viimeistelyt, joiden osalta siveltimen
        on tarkoitus olla turvallinen (esim. läpinäkyvä päällysmaali, matta-/satiinimaali,
        vinyyliteippi/PPF, lasi, renkaat).
    recorder_accessories_included:
      name: Mukana tulevat nokkahuilun lisätarvikkeet
      description: Listaa bassonokkahuilun mukana toimitetut lisävarusteet.
    recorder_bore_design:
      name: Nokkahuilun reikien asettelu
      description: Nokkahuilun rungon sisäinen reikäprofiili.
    recorder_bore_type:
      name: Nokkahuilun reikien tyyppi
      description: Määrittää nokkahuilun reikien tyylin.
    recorder_case_shell_type:
      name: Nokkahuilun kotelon kuoren tyyppi
      description: Kuvaa kotelon rakenteellista jäykkyyttä.
    recorder_finish:
      name: Nokkahuilun viimeistely
      description: Nokkahuilun rungon pinnan viimeistely/käsittely (erityisen olennainen
        puisten alttonokkahuilujen osalta).
    recorder_hole_type:
      name: Nokkahuilun reiän tyyppi
      description: Ovatko äänireiät yksinkertaisia (ei tuplareikiä), vai sisältyykö
        mukaan tuplareikiä kromaattisten sormitusten parantamiseksi.
    recorder_joint_configuration:
      name: Nokkahuilun liitoskonfiguraatio
      description: Kuvaa nokkahuilun runko-osien lukumäärää, mikä vaikuttaa siirrettävyyteen,
        puhdistukseen ja osien vaihtoon.
    recorder_joint_style:
      name: Nokkahuilun liitosten tyyli
      description: Nokkahuilun osien välinen liitos-/yhdistämistyyli, jos sovellettavissa.
    recorder_keywork:
      name: Nokkahuilun koskettimisto
      description: Ilmaisee, onko nokkahuilussa koskettimet (metalli-/muovimekanismit)
        matalien nuottien soittamiseen, mikä olisi tyypillistä tenori-/basso-/suurikokoisille
        nokkahuiluille.
    recorder_mouthpiece_type:
      name: Nokkahuilun suukappaletyyppi
      description: Kuvaa, onko tallentimen suukappale/pääliitos integroitu (yksiosainen)
        vai irrotettava/vaihdettavissa.
    recorder_pitch_standard_a4:
      name: Nokkahuilun sävelkorkeuden standardi (A4)
      description: Ilmaisee nokkahuilun rakenteen mukaisen viitesävelkorkeuden (esim.
        moderni sävelkorkeus A = 440 Hz vs. barokkisävelkorkeus A = 415 Hz).
    recorder_thumb_hole_type:
      name: Nokkahuilun peukaloaukkotyyppi
      description: Määrittää, onko nokkahuilussa yksi vai kaksi peukaloaukkoa.
    recreational_vehicle_holding_tank_type:
      name: Matkailuajoneuvon säiliön tyyppi
      description: Ilmaisee, millaiset jätesäiliöt matkailuajoneuvossa on.
    recreational_vehicle_leveling_system:
      name: Matkailuajoneuvon tasausjärjestelmä
      description: Asennetun tasaus-/vakautusjärjestelmän tyyppi.
    recycled_material_content:
      name: Kierrätysmateriaalisisältö
      description: Ilmaisee kierrätyskuiduista tai -langoista valmistetun vaatteen
        osuuden.
    reed_dent_material:
      name: Kaiteen piirron materiaali
      description: Loimilankojen päitä erottavien kaiteen piirtojen/hampaiden materiaali,
        joka vaikuttaa kestävyyteen ja langan kulumiseen.
    reed_type:
      name: Ruokopillin tyyppi
      description: Määrittää säkkipillin melodiapillin ja bordunaputkien käyttämien
        ruokopillien rakennetyypin.
    reeds_included:
      name: Ruokopillit sisältyvät
      description: Määrittää, mitkä ruokopillit sisältyvät ylämaan säkkipillin settiin
        (melodiapilli ja/tai bordunapilli), ja ovatko ne oikeasta ruo'osta tehtyjä
        vai synteettisiä.
    reefing_method:
      name: Reivaamismenetelmä
      description: Ilmaisee mekanismin (jos sellainen on) purjeen laskemiseksi tai
        säilyttämiseksi vesillä ollessa.
    reel_profile:
      name: Kelan profiili
      description: Luokittelee hyrräkelan rungon rakenteellisen tyylin/profiilin.
    reel_seat_material:
      name: Kelakiinnikkeen materiaali
      description: Määrittää kelakiinnikkeen valmistusmateriaalin, joka vaikuttaa
        painoon, herkkyyteen ja korroosionkestävyyteen.
    reel_seat_type:
      name: Kelakiinnikkeen tyyppi
      description: Määrittää lukitusmekanismin tyylin, joka kiinnittää perhokelan
        vapaan.
    reel_size_class:
      name: Kelan kokoluokka
      description: Valmistajan määrittämä kokoluokitus (esim. 1000, 3000, 5000), joka
        ilmaisee puolan kapasiteetin ja kelan kokonaisrakenteen.
    referee_wallet_accessories_included:
      name: Erotuomarin lompakon mukana tulevat lisätarvikkeet
      description: Listaa ylimääräiset erotuomarin lompakon mukana tulevat tarvikkeet,
        kuten punainen/keltainen kortti, tulosten seurantapohja tai kirjoitusvälineet,
        jotta ostaja tietää, myydäänkö lompakko täytenä pakkauksena.
    refinement_level:
      name: Jalostusaste
      description: Ilmaisee öljyn jalostusasteen, joka vaikuttaa makuun, väriin, ravintoarvoihin
        ja savuamispisteeseen.
    reflective_finish:
      name: Heijastava viimeistely
      description: Määrittää diskopallon heijastavan pinnan käsittelyn (esim. peilitiili
        vs. holografiset/irisoivat efektit).
    reflective_or_glow_effect:
      name: Heijastava tai hehkuva vaikutus
      description: Ilmaisee, onko antennipallossa näkyvyysefektejä, kuten heijastavaa
        materiaalia, pimeässä hohtavaa materiaalia tai valaisevia/LED-elementtejä.
    reflective_tape_pattern:
      name: Heijastava nauhakuvio
      description: Kuvaa heijastavien nauhojen konfiguraatiota vaatteessa, jota käytetään
        näkyvyysvaatimusten täyttämiseen.
    regulation_standard:
      name: Sääntelystandardi
      description: Määrittää virallisen standardin tai hallintoelimen asettamat ulottuvuudet/sertifioinnit,
        jotka verkko täyttää.
    regulator_diaphragm_material:
      name: Säätimen kalvon materiaali
      description: Määrittää kalvon materiaalin, joka vaikuttaa polttoaineen/etanolin
        yhteensopivuuteen (esim. E85) ja kestävyyteen.
    regulator_port_thread_standard:
      name: Paineensäätimen liitännän kierteen standardi
      description: Määrittää säätimen rungossa käytettyjen tulo-/lähtö-/paluuliitäntöjen
        kierre-/yhteysstandardin.
    rein_features:
      name: Ohjaksen ominaisuudet
      description: Korostaa ohjasten erityisiä toiminnallisia tai turvaominaisuuksia.
    rein_style:
      name: Ohjaksen tyyli
      description: Ilmaisee ohjasten rakenteellisen rakenteen tai kokoonpanon, jolloin
        ratsastaja voi valita oikean tyypin lajinsa ja henkilökohtaisten mieltymystensä
        mukaan.
    reinforced_areas:
      name: Vahvistetut alueet
      description: Osoittaa, mitkä vaatteen osat on vahvistettu hankauskestävyyden
        parantamiseksi.
    reinforcement_type:
      name: Vahvikkeen tyyppi
      description: Jäähdyttimen letkussa käytetty rakennevahvike lujuuden ja lämpötilan/paineen
        kestävyyden parantamiseksi.
    release_activation_method:
      name: Laukaisun aktivointimenetelmä
      description: Määrittää, miten jousiampuja laukaisee jousiammunnan laukaisulaitteen.
    release_bearing_material:
      name: Vapautuslaakerin materiaali
      description: Laakeri-/pintaosien ensisijainen materiaali (kuten valmistaja on
        määrittänyt).
    release_jaw_style:
      name: Laukaisulaitteen leuan tyyli
      description: Kuvaa laukaisupään leuan tai -koukun rakenteen.
    release_strap_type:
      name: Vapautushihnan tyyppi
      description: Määrittää hihnan tai liitosjärjestelmän, joka tulee jousiammunnan
        laukaisulaitteen kanssa.
    remote_control_airship_envelope_material:
      name: Kauko-ohjattavan ilmalaivan rungon materiaali
      description: Määrittää ilmalaivan kaasupussin päämateriaalin, joka on erillinen
        lelun muusta materiaalista.
    remote_control_motorcycle_scale:
      name: Kauko-ohjattavan moottoripyörän mittakaava
      description: Kauko-ohjattavan moottoripyörän mittakaava suhteessa oikeaan moottoripyörään
        (jos se on mallinnettu mittakaavassa vastaavaksi).
    remote_control_motorcycle_terrain_suitability:
      name: Kauko-ohjattavan moottoripyörän maastokelpoisuus
      description: Ensisijainen maasto, jossa kauko-ohjattava moottoripyörä on suunniteltu
        toimimaan.
    remote_control_motorcycle_water_resistance:
      name: Kauko-ohjattavan moottoripyörän vedenkestävyys
      description: Kauko-ohjattavan moottoripyörän elektroniikan vesisuojaustaso.
    remote_control_plane_kit_completion_level:
      name: Kauko-ohjattavan lentokoneen pakkauksen täysimittaisuusaste
      description: Ilmaisee, mitä pakkaukseen sisältyy ja kuinka täysimittainen setti
        on (esim. lennättämiseen valmis vs. vaatii erillisen lähettimen/vastaanottimen/akun).
    remote_control_plane_landing_gear_type:
      name: Kauko-ohjattavan lentokoneen laskutelineiden tyyppi
      description: Ilmaisee laskutelinekokoonpanon, mikä vaikuttaa kestävyyteen ja
        lentoonlähtö-/laskeutumispintoihin.
    remote_control_plane_power_type:
      name: Kauko-ohjattavan lentokoneen virtatyyppi
      description: Määrittää, miten kone saa virtansa/kuljetusvoimansa (sähkö vs.
        hehku/bensiini/nitro), mikä vaikuttaa huoltoon, meluun ja siihen, missä sitä
        voidaan lennättää.
    remote_control_watercraft_features:
      name: Kauko-ohjattavan vesialuksen ominaisuudet
      description: Korostaa tärkeimpiä kauko-ohjattavalle vesialukselle ominaisia
        ominaisuuksia, jotka vaikuttavat käytettävyyteen ja kestävyyteen.
    remote_control_watercraft_propulsion_drive_type:
      name: Kauko-ohjattavan vesialuksen propulsion/käyttölaitteen tyyppi
      description: Määrittää, miten kauko-ohjattavaa vesialusta ohjataan vedessä.
    remote_control_watercraft_water_environment:
      name: Kauko-ohjattavan vesialuksen vesiympäristö
      description: Ilmaisee tarkoitetut vesiolosuhteet, joissa kauko-ohjattava vesialus
        toimii parhaiten.
    remote_keyless_system_programming_method:
      name: Kauko-ohjattavan avaimettoman järjestelmän ohjelmointimenetelmä
      description: Miten kaukosäädin/järjestelmä ohjelmoidaan tai yhdistetään ajoneuvoon
        (esim. sisäänrakennettu menettely vs. ammattilaistyökalu).
    repair_compound_type:
      name: Korjausainetyyppi
      description: Mukana olevien kulutettavien korjausmateriaalien tyyppi/koostumus
        (esim. koritiivistysmassan tyyppi, tuulilasin korjaushartsin tyyppi, rengaspaikan
        liiman/tiivisteen tyyppi).
    repair_kit_components:
      name: Korjauspakkauksen osat
      description: Listaa korjauspakkaukseen sisältyvät tuotteet, jotta avulla ostaja
        voi ymmärtää sisällöt ja vertailla tuotepaketteja.
    repair_method:
      name: Korjausmenetelmä
      description: Määrittää pakkauksen ensisijaisesti hyödyntämän korjausmenetelmän,
        kuten irrotettavat ja itsekiinnittyvät liimapaikat tai korvaava venttiili.
    replacement_part_purpose:
      name: Varaosan tarkoitus
      description: Ilmaisee, onko tuote alkuperäisvalmistajan varaosa, päivitys-/viritysosa
        vai lisävaruste.
    replacement_part_type:
      name: Varaosan tyyppi
      description: Ilmaisee crosstrainerin osan toiminnallisen luokan niin, että ostaja
        voi käyttää suodattimia löytääkseen tarvitsemansa komponentin.
    replacement_parts_availability:
      name: Varaosien saatavuus
      description: Ilmaisee, tukeeko langoitin kulutustarvikkeita/vaihdettavia osia
        (esim. vaihtokoukut/langat).
    replica_gun_action_type:
      name: Replika-aseen toimintatapa
      description: Määrittää replika-aseen toimintatavan (kuten esitetty), kuten pulttilukko
        tai vipulukko.
    replica_gun_firing_mechanism:
      name: Replika-aseen laukaisumekanismi
      description: Ilmaisee, simuloiko replika ampumista/toimimista (ei tappavasti)
        ja miten, kuten onko se nallipyssy tai ei-laukeava.
    replica_gun_moving_parts:
      name: Replika-aseen liikkuvat osat
      description: Ilmaisee, mitkä replika-aseen osat ovat toimivia/liikkuvia.
    reservoir_orientation:
      name: Säiliön suunta
      description: Määrittää rakon tarkoitetun suunnan tai profiilin pakkauksen sisällä.
    reservoir_type:
      name: Säiliön tyyppi
      description: Kytkimen pääsylinterin säiliön kokoonpanon tyyppi.
    resin_suitability:
      name: Hartsille soveltuvuus
      description: Määrittää, onko käsipallo suunniteltu käytettäväksi hartsin (liiman)
        kanssa, vai onko se hartsiton.
    resistance_adjustability:
      name: Vastuksen säätö
      description: Määrittää, voiko käyttäjä muuttaa hengitysvastusta.
    resistance_band_design:
      name: Vastusnauhan suunnittelu
      description: Kuvaa vastusnauhan fyysistä muotoa tai tyyliä (esim. silmukka,
        putki, jossa on käyttönimi, kahdeksikon muoto) ja auttaa näin ostajaa valitsemaan
        oikean mallin harjoitusrutiiniinsa.
    resistance_loading_type:
      name: Vastuskuormituksen tyyppi
      description: Ilmaisee, miten vastus/paino tarjotaan tai kuormataan Smith-laitteeseen
        (esim. levypainoilla kuormitus tai painopakka).
    response_fields_included:
      name: Mukaan sisältyvät vastauskentät
      description: Määrittää, mitkä vakiovastauskentät/-vaihtoehdot sisältyvät vastauskorttiin
        (esim. hyväksy/hylkää, aterian valinta).
    restoration_status:
      name: Entisöinnin tila
      description: Ilmaisee, onko pakettiauto alkuperäisessä, entisöidyssä, restomod-
        vai projektitilassa.
    rhinestone_base_color_family:
      name: Tekojalokiven perustan väriperhe
      description: Ilmaisee tekojalokiven perustan väriperheen (esim. läpinäkyvä/kristalli,
        kullanvärinen/keltainen, sininen).
    rhinestone_facet_style:
      name: Tekojalokiven edustan tyyli
      description: Tekojalokiven edustakuvio, joka vaikuttaa kimalteluun ja ulkonäköön
        (esim. xilion-ruusu, briljanttihiottu, viistetty vs. sileä).
    rhinestone_hole_reinforcement_material:
      name: Tekojalokiven kolon vahvistusmateriaali
      description: Kolojen ympärillä/kohdilla oleva materiaali (esim. metallinen läpivienti,
        muovattu muovi), mikä vaikuttaa kestävyyteen ompelun aikana.
    rhinestone_setting_type:
      name: Tekojalokiven asetuksen tyyppi
      description: Kuinka kivi kiinnitetään/särmätään ompelua varten (esim. piikkiasettelu,
        kehysasettelu, reunusasettelu).
    rhubarb_product_cut_type:
      name: Raparperituotteen leikkuutyyppi
      description: Kuvaa raparperituotteen fyysistä valmistusta tai leikkuuta.
    ribbon_construction:
      name: Nauharakenne
      description: Kuvailee grosgrain-nauhan keskeisiä rakenneominaisuuksia, kuten
        sitä, onko se langoitettu vai joustava, mikä muuttaa sen käyttötarkoitusta
        (esim. rusetit vs. ompelu).
    ribbon_packaging_type:
      name: Nauhan pakkaustyyppi
      description: Ilmaisee, miten nauha tarjotaan/myydään.
    ribbon_pattern_style:
