      description: Määrittää metalliosan päässä olevan kiinnittimen tai kiinnikkeen
        tyylin (neppari, klipsi, lenkki, ketju jne.), mikä vaikuttaa helppokäyttöisyyteen,
        turvallisuuteen ja käyttösoveltuvuuteen.
    leaf_gelatin_grade:
      name: Lehtigelatiinin laatu
      description: Määrittää gelatiinilevyjen standardoidun vahvuusluokan.
    leaf_preparation:
