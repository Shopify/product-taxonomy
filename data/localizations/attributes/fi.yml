      description: Ilmaisee pääasialliset lumiolosuhteet, joille pitovoide on kehitetty.
    suitable_surface_type:
      name: Sopiva pintatyyppi
      description: Määrittää kävelypinnat, joille pito on suunniteltu.
    suitable_table_size:
