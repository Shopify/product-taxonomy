      name: Rumpukalvon äänenvaimennustyyppi
      description: Ilmaisee, onko rumpukalvossa yläsävelen säätöelementtejä tai vaimennuselementtejä.
    drum_head_ply_count:
      name: Rumpukalvon kerrosmäärä
      description: Tämä ilmaisee rumpukalvon rakenteessa käytettyjen kalvokerrosten
        lukumäärän (esimerkiksi yksikerroksinen, kaksikerroksinen).
    drum_head_position:
      name: Rumpukalvon asento
      description: Ilmaisee, onko rumpukalvo tarkoitettu lyöntikalvoksi (ylä-/iskukalvo),
