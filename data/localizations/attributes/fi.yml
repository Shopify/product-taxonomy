      description: Kaavan käyttöoikeudet (esim. vain henkilökohtainen käyttö tai rajoitettu
        kaupallinen käyttö).
    licensed_sports_property:
      name: Lisensoitu urheilutuote
      description: Ilmaisee, onko tuote liigan, joukkueen tai organisaation virallisesti
        lisensoima.
    lid_hinge_mechanism:
      name: Kannen saranamekanismi
      description: Määrittää kannen saranamekanismin, mikä vaikuttaa turvallisuuteen
        ja helppokäyttöisyyteen.
    lid_support_positions:
      name: Kannen tukiasennot
      description: Määrittää flyygelin kannen kannattimien asennot (kuinka paljon
        kantta voidaan avata).
    lie_angle_color_code:
      name: Lie-kulman värikoodi
      description: Tarkoittaa valmistajan joissain mailoissa käyttämää värikoodattua
        lie-kulmajärjestelmää (esim. musta piste, vihreä piste).
    life_jacket_certification_standard:
      name: Pelastusliivin sertifiointiluokitus
      description: Tuotteen virallinen turvallisuusluokitus tai ‑standardi, kuten
        USCG:n tyyppi tai ISO/AS-tasot.
    life_raft_certification_standard:
      name: Pelastuslautan turvallisuussertifiointistandardi
      description: Turvallisuusstandardi/‑sertifiointi, jonka mukaisesti lautta on
        rakennettu ja huollettu.
    life_raft_container_type:
      name: Pelastuslautan säiliön tyyppi
      description: Miten pelastuslautta pakataan säilytystä ja käyttöönottoa varten.
    life_vest_approval_standard:
