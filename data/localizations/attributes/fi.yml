    string_end_type:
      name: Kielen kiinnitystyyppi
      description: Määrittää, miten kieli kiinnittyy tallaan/kieltenpitimeen yhteensopivuuden
        varmistamiseksi (erityisen tärkeää akustisille/sähkökitaroille ja joillekin
