    doumbek_head_material:
      name: Doumbekin kalvon materiaali
      description: Määrittää doumbekin rumpukalvon materiaalin.
    doumbek_head_type:
      name: Doumbekin rumpukalvotyyppi
      description: Määrittää doumbekin rumpukalvon rakenteen/tyypin (kalvon valmistus-
