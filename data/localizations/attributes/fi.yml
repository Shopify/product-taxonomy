      description: Ilmaisee, onko kankaalla mekaanista vai elastista joustavuutta
        ja mihin suuntaan/suuntiin.
    stretcher_bar_material:
      name: Kiilapuun materiaali
      description: Kiilapuun/-kehyksen materiaali (esim. mänty, kuusi, poppeli, koivu,
        MDF / tekninen puutuote).
    strike_shield_shape:
      name: Potkutyynyn muoto
      description: Määrittää potkutyynyn osumapinnan yleisen muodon.
    string_core_shape:
      name: Kielen ytimen muoto
      description: Määrittää punotuissa kielissä käytettävän ydinlangan muodon, joka
