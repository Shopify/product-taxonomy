    uk_clothing_size:
      name: Iso-Britannian vaatteiden koko
      description: Määrittää vaatteiden Iso-Britannian kokoluokan, kuten 12 tai 18
    uk_cup_size:
      name: Iso-Britannian rintaliivien kuppikoko
      description: Määrittää rintaliivien Iso-Britannian kuppikoon, kuten C tai FF
    uk_mens_shoe_size:
      name: Iso-Britannian miesten kenkäkoko
      description: Määrittää Iso-Britannian miesten kenkäkoon, kuten 9 tai 9 Wide
    uk_womens_shoe_size:
