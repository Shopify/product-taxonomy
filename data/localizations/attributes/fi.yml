      description: Kuvaa tangon varren uritetun kuvion terävyyttä tai rakennetta,
        joka vaikuttaa otteen mukavuuteen ja varmuuteen.
    knurl_marking_standard:
      name: Pyällyksen merkintästandardi
      description: Määrittää käsien sijoittamiseksi käytettyjen pyällettyjen viiterenkaiden
        sijainnin (esim. IPF- tai IWF-merkinnät).
    kohlrabi_variety:
