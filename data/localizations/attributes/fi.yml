      description: Määrittää rummun viritysavaimen kiinnitys- tai liitäntätyypin,
        jolla välineitä kiinnitetään tai rumpua viritetään.
    drum_key_handle_style:
      name: Rummun viritysavaimen kahvatyyli
      description: Kuvaa rummun viritysavaimen kahvaa tai ergonomiaa, joka vaikuttaa
