      description: Määrittää housujen lahkeensuun aukon viimeistelytyylin.
    leg_cut_height:
      name: Jalan leikkauskorkeus
      description: Ilmaisee, kuinka korkealle bikinin alaosan jalantiet on leikattu.
    leg_cut_style:
      name: Jalan leikkaustyyli
      description: Kuvaa jalanteiden muotoa, joka vaikuttaa ulkonäköön, käyttömukavuuteen
