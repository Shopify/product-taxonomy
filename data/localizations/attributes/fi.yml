    sway_bar_coating:
      name: Kallistuksenvakaimen pinnoite
      description: Kallistuksenvakaimen pintakäsittely tai pinnoite vaikuttaa korroosionkestävyyteen
        ja ulkonäköön.
    sway_bar_fitment_front_rear_kit:
      name: Kallistuksenvakaimen asennus (etu/taka/pakkaus)
      description: Ilmaisee, onko kallistuksenvakain tarkoitettu etuakselille, taka-akselille
        vai myydäänkö sitä etu- ja taka-akselille tarkoitettuna pakkauksena.
    sweatshirt_pocket_type:
      name: Collegepaidan taskutyyppi
      description: Kuvaa collegepaidan taskujen tyyliä.
    sweet_potato_variety:
      name: Bataattilajike
      description: Määrittää bataatin lajikkeen.
    sweet_spot_position:
