      description: Kumiankan kylpyleluille ominaiset toiminnalliset/malliominaisuudet.
    rubber_ducky_size_class:
      name: Kumiankan kokoluokka
      description: Ostajaystävällinen kokoryhmittely kumiankoille tyypillisen käytön
        perusteella (ammelelu vs. kakkukoristeet vs. jättimäiset).
    ruffle_style:
