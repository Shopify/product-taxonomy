    drive_shaft_material:
      name: Vetoakselin materiaali
      description: Määrittää vetoakselin tai koko vetoakselikokoonpanon ensisijaisen
        materiaalin.
    drive_system:
      name: Voimansiirtojärjestelmä
      description: Määrittää mekanismin, jolla poljinvoima siirretään vastusjärjestelmään.
    drivetrain_configuration:
      name: Voimansiirron kokoonpano
      description: lmaisee polkupyörän voimansiirron rakenteen ja kertoo, onko takanapa
        kiinteä, vapaakytkimellä varustettu yksivaihteinen vai flip-flop-tyyppinen.
    drivetrain_speed_compatibility:
      name: Voimansiirron nopeusyhteensopivuus
      description: Listaa ne rataspakka-nopeudet, joiden kanssa eturatas on suunniteltu
        toimimaan, millä varmistetaan oikeat hammasprofiilit ja välitykset.
    drone_positioning_system:
      name: Droonin paikannusjärjestelmä
      description: Määrittää droonin tukeman sisäisen paikannus- ja vakaustekniikan
