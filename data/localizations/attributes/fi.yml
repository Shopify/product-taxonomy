      description: Veden tyhjentäminen hiekkalaatikosta (jos tarpeen), esimerkiksi
        tyhjennysreikien kautta tai irrotettavan tulpan avulla.
    sandbox_seating_type:
      name: Hiekkalaatikon istuintyyppi
      description: Onko hiekkalaatikossa kiinteät istuimet ja jos, millaiset?
    sapodillo_variety:
      name: Sapodillo-lajike
      description: Ilmaisee sapodillan/sapotan tietyn lajikkeen tai muunnoksen (esim.
        "Alano", "Prolific"), jolloin harrastajat voivat valita haluamansa makuprofiilit
        ja ominaisuudet.
    sapote_variety:
      name: Sapotillalajike
      description: Määrittää tarjotun sapoten lajin/tyypin (esim. musta, valkoinen,
        mamey), jonka avulla ostaja voi erottaa eri lajit toisistaan.
    satin_ribbon_face_type:
      name: Satiininauhan pinnan tyyppi
      description: Määrittää, onko nauhassa satiinipinta toisella puolella vai molemmilla
        puolilla.
    sauce_consistency:
      name: Kastikkeen koostumus
      description: Kuvaa pizzakastikkeen koostumusta tai paksuutta.
    sauce_product_form:
      name: Kastikkeen tuotemuoto
      description: Ilmaisee kastikkeen fyysisen muodon, kuten neste, öljy, tahna,
        jauhe, hiutaleet tai siirappi.
    sauce_variety:
      name: Kastiketyyppi
      description: Ilmaisee valkoisen tai kermakastikkeen tietyn tyylin tai reseptiryhmän
        (esim. Alfredo, Béchamel, Hollandaise).
    saxophone_body_finish:
      name: Saksofonin rungon viimeistely
      description: Kuvaa saksofonin rungon ensisijaista viimeistelyä/pinnoitusta (erillään
        koskettimista).
    saxophone_body_type:
      name: Saksofonin rungon tyyppi
      description: Kuvaa bassosaksofonin rungon ja kellon suuntauksen yleistä fyysistä
        kokoonpanoa.
    saxophone_construction_style:
      name: Saksofonin rakenteen tyyli
      description: Ilmaisee saksofonin yleisiä rakenneominaisuuksia, jotka vaikuttavat
        kestävyyteen, resonanssiin ja huoltoon.
    saxophone_included_accessories:
      name: Saksofonin mukana tulevat oheistarvikkeet
      description: Listalta löytyi lisävarusteita, jotka yleensä lähetetään alttosaksofonin
        tuotepaketissa.
    saxophone_key_system:
      name: Saksofonin kosketinjärjestelmä
      description: Ilmaisee soittimessa käytetyn koskettimiston (pohja/mekanismistandardi).
    saxophone_key_touch_material:
      name: Saksofonin koskettimien kosketusmateriaali
      description: Määrittää saksofonin koskettimien kosketusmateriaalin (esim. helmiäispäällys).
    saxophone_mouthpiece_baffle_type:
      name: Saksofonin suukappaleen bafflen tyyppi
      description: Kuvaa ilmavirtaa ja kirkkautta muokkaavan bafflen rakennetta.
    saxophone_neck_type:
      name: Saksofonin kaulan tyyppi
      description: Määrittää kaulakokoonpanon, joka toimitetaan bassosaksofonin mukana.
    saxophone_package_contents:
      name: Saksofonipaketin sisältö
      description: Listaa saksofonin mukana tulevat tärkeimmät lisävarusteet (esim.
        kotelo, suukappale, ligatuuri, kaulahihna, puhdistuspakkaus).
    saxophone_reed_cut:
      name: Saksofonin kielen leikkaus
      description: Määrittää saksofonin kielen leikkauksen/tyylin, joka vaikuttaa
        vasteeseen, sävyyn ja tuntumaan.
    saxophone_reed_material_type:
      name: Saksofonin lehden materiaalin tyyppi
      description: Määrittää lehtimateriaalin luokan (esim. ruoko vs. synteettinen).
    saxophone_reed_strength_scale:
      name: Saksofonin lehden vahvuusasteikko
      description: Määrittää lehden vahvuutta ilmaisevan numerointijärjestelmän/asteikon
        (usein brändistä riippuvainen), mikä mahdollistaa selkeämmän vertailun eri
        listausten välillä.
    saxophone_small_part_thread_size:
      name: Saksofonin pienosien kierrekoko
      description: Määrittää kierteillä varustettujen saksofonin pienosien (pääasiassa
        ruuvien) kierrekoon/-standardin, mikä helpottaa oikean sopivuuden valintaa.
    saxophone_swab_application_area:
      name: Saksofonin kuivausliinan käyttöalue
      description: Ilmaisee, minkä saksofonin osan puhdistamiseen/kuivaamiseen liina
        on tarkoitettu.
    scabbard_material:
      name: Tupen materiaali
      description: Määrittää mukana tulevan tupen tai huotran ensisijaisen materiaalin
        (jos läsnä)
    scale_model_assembly_status:
      name: Pienoismallin kokoonpanon tila
      description: Ilmaisee, onko pienoismalli esillepanovalmis vai vaatiiko se kokoamista/maalausta.
    scale_model_car_features:
      name: Pienoismalliauton ominaisuudet
      description: Pienoismalliauton merkittävät ominaisuudet, kuten avattavat ovet/konepelti,
        kääntyvät pyörät, jousitus jne.
    scale_model_kit_assembly_requirements:
      name: Pienoismallipakkauksen kokoaminen
      description: Määrittää, mitä muita kokoamisvaiheita/tarvikkeita tyypillisesti
        tarvitaan peruspikakiinnityksen ohella.
    scale_model_kit_components_included:
      name: Mukana toimitettavat pienoismallipakkauksen osat
      description: Listaa, mitä tankin pienoismalliin/pakkaukseen sisältyy (esim.
        tarrat, figuurit, PE-osat).
    scale_model_paint_status:
      name: Pienoismallin maalaustila
      description: Ilmaisee, onko helikopterimalli esimaalattu/viimeistelty vai vaatiiko
        se maalausta.
    scale_model_pose:
      name: Pienoismallin asento
      description: Määrittää hevosmallin kuvatun asennon esittely-/dioraamakäyttöä
        varten.
    scale_model_rotor_configuration:
      name: Pienoismallin roottorin kokoonpano
      description: Määrittää mallin kuvaaman helikopterin roottorin kokoonpanon.
    scale_model_truck_era:
      name: Kuorma-auton pienoismallin aikakausi
      description: Ilmaisee mallin kuvaaman oikean kuorma-auton aikakauden/ajanjakson
        (hyödyllinen keräilijöille, jotka etsivät vintage-kuorma-autoja modernien
        sijaan).
    scale_model_truck_propulsion_type:
      name: Kuorma-auton pienoismallin käyttövoimatyyppi
      description: Määrittää, onko kuvatun kuorma-auton käyttövoima diesel, bensiini,
        sähkö, hybridi vai muu (mallin mukaisesti).
    scale_units:
      name: Pienoismallin mittayksiköt
      description: Säteen/halkaisijan asetuksen mittayksiköt painettuna/kaiverrettuna
        palkkiin.
    scent_function:
      name: Hajun käyttötarkoitus
      description: Määrittelee hajutuotteen ensisijaisen käyttötarkoituksen, jotta
        metsästäjät pystyvät rajaamaan oikean työkalun nopeasti (esim. houkutin vs.
        hajunpoistaja).
    scent_source:
      name: Hajun lähde
      description: Listaa tuotteen koostumuksessa käytetyn ensisijaisen biologisen
        tai aromaattisen lähteen, kuten virtsatyypit, elintarvikepohjaiset hajut,
        kasviaromit jne.
    school_bus_body_type:
      name: Koulubussin korityyppi
      description: Luokittelee koulubussin markkinoilla yleisesti käytössä olevien
        runko-/luokkamuotojen mukaan (esim. tyyppi A–D).
    school_bus_safety_feature:
      name: Koulubussin turvallisuusominaisuus
      description: Koulubussiin asennetut merkittävät turvavarusteet.
    school_glue_washability:
      name: Askarteluliiman pestävyys
      description: Ilmaisee, kuinka helposti kuivunut/märkä liima voidaan puhdistaa
        iholta/vaatteista/pinnoilta.
    scissors_application:
      name: Saksisovellus
      description: Ensisijainen leikkaussovellus/materiaali saksille.
    scooter_brake_pad_material:
      name: Skootterin jarrupalojen materiaali
      description: Määrittää jarrupaloissa käytetyn yhdisteen, joka vaikuttaa tehoon,
        meluun ja käyttöikään.
    scoring_method:
      name: Pisteytysmenetelmä
      description: Määrittää, miten tuloksia seurataan pöytäjalkapallopöydässä, esimerkiksi
        manuaalisilla laskureilla tai elektronisilla tulostauluilla.
    scoring_pattern:
      name: Pistelasku
      description: Pelikentälle painettujen pistelaskualueiden pohja.
    scoring_system_type:
      name: Pistejärjestelmän tyyppi
      description: Kuvaa pöytään sisältyvän pistelaskumekanismin tyyliä, kuten manuaalisia
        liukusäätimiä tai erilaisia elektronisia näyttöjä.
    scottish_smallpipes_bag_material:
      name: Skotlantilaisen pikkupillin materiaali
      description: Määrittää pikkupillien mukana toimitetun säkin (ilmasäiliön) materiaalin.
    scottish_smallpipes_drone_tuning_configuration:
      name: Skotlantilaisen pikkupillin borduunapillien virityskokoonpano
      description: Määrittää instrumentin mukana toimitettujen borduunapillien viritysasetuksen
        (borduunapillien sävelkorkeudet/roolit suhteessa perussäveleen).
    scottish_smallpipes_reed_type:
      name: Skotlantilaisen pikkupillin kielen tyyppi
      description: Määrittää säkkipillin puhaltimessa käytetyn kielen tyypin (ja/tai
        onko kieli synteettinen vai ruo'osta valmistettu).
    scraping_surface_type:
      name: Kaapimispinnan tyyppi
      description: Määrittää ääntä tuottavan raaputuspinnan rakenteen/geometrian (esim.
        uritettu, kampa/hammastettu, aaltopinta).
    screw_drive_type:
      name: Ruuvin kannan tyyppi
      description: Määrittää ruuvin tai pultin kannan uran tyypin, jonka perusteella
        valitaan kiristämiseen tai irrottamiseen tarvittava työkalu (esim. kuusiokolo,
        Torx).
    screw_thread_size:
      name: Ruuvien kierteen koko
      description: Määrittää mukana toimitettujen tai yhteensopivien ruuvien kierteen
        kokostandardin (esim. M4, M5, M6).
    sculpting_clay_base_type:
      name: Kuvanveistosaven pohjatyyppi
      description: Kuvaa kuvanveistosaven koostumuksen/pohjan.
    seafood_cut:
      name: Kalan ja äyriäisten leikkaustapa
      description: Kuvaa kalan ja äyriäisten leikkaustavan tai esillepanon (esim.
        kokonainen, filee, pihvi).
    seafood_processing_method:
      name: Merenelävien käsittelymenetelmä
      description: Määrittää kalalle ja äyriäisille käytetyn ensisijaisen säilöntä-
        tai käsittelytekniikan, kuten savustus, suolaus tai pakastekuivaus.
    seafood_source:
      name: Kalan ja äyriäisten alkuperä
      description: Ilmaisee, onko kalat tai äyriäiset pyydetty luonnosta vai kasvatettu,
        onko tuote kasviperäinen tai jostain muusta lähteestä, mikä auttaa ostajaa
        arvioimaan kestävyyttä ja laatua.
    seal_material:
      name: Tiivistemateriaali
      description: Kaulan, ranteen ja nilkan tiivisteissä tai manseteissa käytetty
        materiaali, joka pitää puvun vesitiiviinä.
    seal_type:
      name: Tiivisteen tyyppi
      description: Määrittää liittimessä käytetyn tiivistysmenetelmän jäähdytysnesteen
        vuotojen estämiseksi.
    sealant_formulation:
      name: Paikkausaineen koostumus
      description: Ilmaisee polkupyörän renkaan paikkausaineen ensisijaisen kemiallisen
        koostumuksen tai lisäaineen (esim. lateksipohjainen, kuituvahvisteinen, akryyli).
    seals_leak_type:
      name: Tiivisteiden vuototyyppi
      description: Jäähdytysjärjestelmän vuodon, jonka tiivistämiseen tuote on tarkoitettu,
        tyyppi/sijainti.
    seam_construction:
      name: Sauman rakenne
      description: Kuvaa pallon sauman luontitapaa, joka vaikuttaa lyönnin kaartumiseen,
        kestävyyteen ja tuntumaan.
    seam_design:
      name: Saumojen asettelu
      description: Määrittää sukkahousujen saumarakenteen tai koristeelliset saumaominaisuudet.
    seam_gauge_scale_type:
      name: Saumamitan asteikkotyyppi
      description: Ilmaisee, mitä asteikkomerkintöjä saumamitassa on perusviivaimen
        asteikon ohella.
    seam_gauge_slider_material:
      name: Saumamitan liukusäätimen materiaali
      description: Ilmaisee säädettävän liukusäätimen/osoitinkomponentin, jos sellainen
        on, materiaalin.
    seam_ripper_tip_style:
      name: Ratkojan kärjen tyyppi
      description: Kuvaa kärjen toiminnallisen mallin, jonka ansiosta ratkojan kärjen
        voi liu'uttaa ompeleiden alle ja katkaista lanka turvallisesti.
    seam_sealing_type:
      name: Sauman tiivistystyyppi
      description: Kuvaa menetelmän, jota käytetään estämään veden pääsy sadepuvun
        saumoihin (esim. kokonaan teipattu, hitsattu).
    seam_type:
      name: Saumatyyppi
      description: Kuvaa baseball-pallon ommeltyyliä, joka vaikuttaa pitoon, aerodynamiikkaan
        ja aiottuun pelitasoon.
    season_condition_protection:
      name: Suojausvuodenaika/-olosuhde
      description: Ilmaisee ensisijaisen sään/olosuhteen, jolta tuulilasin suojus
        on tarkoitettu suojaamaan.
    season_rating:
      name: Vuodenaikaluokitus
      description: Määrittää teltan vuodenaikaluokituksen, joka osoittaa sen soveltuvuuden
        eri sääolosuhteisiin (esim. 3 vuodenaikaa, 4 vuodenaikaa, 5 vuodenaikaa/retki).
    seasoning_variety:
      name: Maustevalikoima
      description: Luokittelee mausteen valmistustavan tai perinteisen ruoanlaittokäytön
        mukaan.
    seat_adjustment_power_type:
      name: Istuimen säätötapa
      description: Määrittää, miten istuimen säätömekanismeja käytetään (manuaaliset
        vivut vs. sähkömoottorit), mikä voi vaikuttaa johdotukseen/yhteensopivuuteen.
    seat_belt_attachment_type:
      name: Turvavyön kiinnitystyyppi
      description: Määrittää, miten hihna kiinnitetään ajoneuvoon/vyölaitteistoon.
    seat_belt_buckle_electrical_connector_type:
      name: Turvavyön lukon sähköliittimen tyyppi
      description: Määrittää lukon kytkimen/esikiristimen johdotuksessa käytetyn liittimen/liitännän,
        jos sovellettavissa.
    seat_belt_buckle_mounting_type:
      name: Turvavyön lukon kiinnitystyyppi
      description: Kuvaa, miten lukko/vastakappale on kiinnitetty ajoneuvoon, istuimeen
        tai kiinnikkeeseen (esim. pulttikiinnitys, napsautettava).
    seat_belt_buckle_release_button_color:
      name: Turvavyön lukon vapautuspainikkeen väri
      description: Määrittää soljen avausmekanismin värin.
    seat_belt_cover_placement:
      name: Turvavyön suojuksen paikka
      description: Määrittää, missä kohtaa turvavyötä suojus on tarkoitettu käytettäväksi.
    seat_belt_integration:
      name: Turvavyön integrointi
      description: Määrittää, kuuluuko istuimeen turvavyö ja/tai soljen vastakappale
        vai onko ajoneuvon alkuperäisen valmistajan soljen vastakappale on siirrettävä
        asennusta varten.
    seat_belt_provision:
      name: Turvavyöt
      description: Ilmaisee, sisältyvätkö turvavyöt ja/tai niihin liittyvät varusteet
        (esimerkiksi soljet) takaistuinkokoonpanoon vai onko ne siirrettävä alkuperäisestä
        istuimesta.
    seat_belt_strap_installation_location:
      name: Turvavyön hihnan asennuspaikka
      description: Ilmaisee, mihin hihna asennetaan vyöjärjestelmässä.
    seat_cover_placement:
      name: Istuimen suojuksen asettelu
      description: Ilmaisee, mille istuinpaikalle/istuinpaikoille ajoneuvossa suojus
        on tarkoitettu.
    seat_cover_securement_method:
      name: Istuinsuojan kiinnitysmenetelmä
      description: Ilmaisee istuinsuojan ensisijaisen kiinnitystavan istuimeen. Jos
        käytetään useita menetelmiä, valitse pääasiallinen/ensisijainen.
    seat_cover_set_contents:
      name: Istuinsuojapakkauksen sisältö
      description: Kuvaa pakkaukseen sisältyvät osat (esim. pelkät istuimen suojat
        vs. koko istuin + niskatuet).
    seat_fabric:
      name: Istuinkangas
      description: Tuolin istuimen ja selkänojan verhoilun ensisijainen kangas.
    seat_height_category:
      name: Istuimen korkeusluokka
      description: Luokittelee jakkaran tyypillisen istuinkorkeusalueen mukaan (esim.
        tiskin tai baarin korkeus) valinnan helpottamiseksi.
    seat_material:
      name: Istuimen materiaali
      description: Ilmaisee penkin istuinmateriaalin pääasiallisen materiaalin.
    seat_mounting_type:
      name: Istuimen asennustyyppi
      description: Kiinnitys-/kiskokokoonpano, jolla istuin kiinnitetään ajoneuvon
        lattiaan.
    seating_surface_material:
      name: Istuimen pintamateriaali
      description: Määrittää lepopaikan materiaalin (esim. pinnoitettu verkko, verkkokangas,
        rottinki, pehmustettu verhoilu).
    seatpost_clamp_mechanism:
      name: Satulatolpan kiinnitysmekanismi
      description: Satulatolpan kiinnittävän kiinnitys-/sulkemisjärjestelmän tyyppi.
    section_orientation_compatibility:
      name: Asennussuunnan yhteensopivuus
      description: Ilmaisee, sopiiko lisävaruste vasenkätiseen, oikeakätiseen vai
        yleismalliseen asennukseen.
    sectional_configuration:
      name: Moduulikokoonpano
      description: Määrittää kalusteen moduulin tai suuntauksen (esim. kulma, vasen
        käsinoja, divaani), jotta ostaja voi koota haluamiansa järjestelmiä.
    sectional_shape:
      name: Kalusteen muoto
      description: Määrittää kulmasohvan geometrisen yleiskokoonpanon/mallin.
    secured_components:
      name: Turvatut osat
      description: Listaa polkupyörän osat, joita lukitussalpa tai turvamutterit suojaavat
        (esim. etupyörä, takapyörä, satulatolppa).
    seed_content:
      name: Siemensisältö
      description: Ilmaisee, onko sitrushedelmä siemenetön, vähäsiemeninen vai kokonaan
        siemenellinen.
    seed_size_classification:
      name: Siemenen kokoluokitus
      description: Ilmaisee litsin sisällä olevan syötäväksi kelpaamattoman siemenen
        suhteellisen koon, joka vaikuttaa syötävän hedelmälihan määrään.
    self_adhesive_backing_format:
      name: Itsekiinnittyvän pinnan formaatti
      description: Sydänlangan kiinnikkeen mukana toimitetun kiinnityspinnan fyysinen
        muoto (valmiiksi kiinnitetty pidike vs. erilliset tarrat tms.).
    self_adhesive_hook_loop_backing_type:
      name: Itsekiinnittyvä tarranauhakiinnitys
      description: Määrittää itsekiinnittyvällä puolella käytetyn tausta-/sisusrakenteen
        ja kiinnitysjärjestelmän.
    self_adhesive_hook_loop_fastener_shape:
      name: Itsestään kiinnittyvien tarranauhojen muoto
      description: Määrittää toimitettujen kiinnitysosien leikkauksen/muodon.
    self_hardening_clay_finish:
      name: Itsekovettuva savipinta
      description: Kuvaa pinnan ulkonäköä/kiiltoa lopullisen kovettumisen jälkeen
        (hyödyllinen valittaessa luonnollisen mattapinnan, kiillon jne. välillä).
    self_hardening_clay_water_resistance_after_curing:
      name: Itsekovettuvan saven vedenkestävyys kovettumisen jälkeen
      description: Ilmaisee vedenkestävyyden lopullisen kovettumisen jälkeen (ilman
        lisätiivisteainetta).
    sensor_functions:
      name: Anturin toiminnot
      description: Ilmaisee, mitä pyöräilyn mittareita anturi mittaa.
    sensor_measurement_mode:
      name: Anturin mittaustila
      description: Ilmaisee, mitkä mittaukset anturi voi tallentaa (esim. vain poljinnopeus,
        vain nopeus, yhdistetty nopeus ja poljinnopeus).
    sensor_mounting_position:
      name: Anturin asennussijainti
      description: Määrittää, mihin polkupyörässä tai pyöräilijässä anturi on asennettu,
        kuten kampivarsi, pyörän napa tai kenkä. Tämä vaikuttaa yhteensopivuuteen
        eri pyöräkokoonpanojen kanssa.
    sensor_mounting_type:
      name: Anturin asennustyyppi
      description: Määrittää, miten MAP-anturi kiinnitetään imusarjaan/moottoriin
        (esim. pulttikiinnitteinen laippa vs. painettava läpivienti).
    sensor_or_gauge_mounting_location:
      name: Anturin tai mittarin kiinnityskohta
      description: Määrittää, mihin kohtaan ajoneuvoa anturi tai mittari asennetaan
        (järjestelmä-/sijaintitaso, ei vasen/oikea).
    sensory_modality:
      name: Aistimodaliteetti
      description: Ensisijainen aistikokemus (tai -kokemukset), jonka lelu on suunniteltu
        tarjoamaan (voi olla moniaistillinen).
    sensory_toy_fidget_mechanism:
      name: Fidget-lelumekanismi
      description: Ensisijainen vuorovaikutus/mekanismi, jota käytetään keskittymisen
        avuksi ja itsesäätelyyn.
    sensory_toy_light_features:
      name: Aistilelun valojen ominaisuudet
      description: Lelun tarjoamat valaistusominaisuudet/tehosteet.
    sensory_toy_texture_type:
      name: Aistilelun pintarakenne
      description: Hallitseva pinnan tuntu/rakenne, jota käytetään tuntoärsykkeiden
        tarjoamiseen.
    sequin_application_method:
      name: Paljettien kiinnitysmenetelmä
      description: Miten paljetti on tarkoitus kiinnittää/käyttää (ompelu vs. liima-
        tai lämpökiinnitys jne.).
    sequin_finish:
      name: Paljettiviimeistely
      description: Kuvaa merkin paljettien pinnan/visuaalisen viimeistelyn ja heijastavan
        efektin (esim. matta, metallinen, holografinen), ei merkin taustaa tai kiinnitystapaa.
    serger_stitch_functions:
      name: Saumurin ommeltoiminnot
      description: Saumurin tukemat ommeltoiminnot (overlock-/yliluottelumenetelmät
        ja erikoissaumuriompeleet).
    serger_thread_count:
      name: Saumurin lankamäärä
      description: Saumurissa käytettävien lankojen lukumäärä (esim. 2/3/4/5-lankainen
        kapasiteetti).
    service_interval:
      name: Huoltoväli
      description: Suositeltu enimmäisaika vaadittavien tarkastusten/huoltojen välillä
        hyväksytyssä huoltopisteessä.
    serving_temperature:
      name: Tarjoilulämpötila
      description: Ilmaisee tuotteen tarjoilulämpötilan tai tilan nautittaessa.
    sesame_seed_hull_status:
      name: Seesaminsiementen kuoren tila
      description: Määrittää, onko tahini valmistettu kuorituista vai kuorimattomista
        seesaminsiemenistä, mikä vaikuttaa väriin, makuun ja ravintosisältöön.
    sesame_seed_roast_level:
      name: Seesaminsiementen paahtoaste
      description: Ilmaisee, kuinka paljon seesaminsiemeniä paahdettiin ennen jauhamista,
        mikä auttaa ostajaa valitsemaan haluamansa maun voimakkuuden.
    sesame_seed_variety:
      name: Seesaminsiementen lajike
      description: Ilmaisee öljyn valmistukseen käytettyjen seesaminsiementen värin
        tai lajikkeen.
    set_classification:
      name: Pakkauksen luokitus
      description: Määrittelee krokettipakkauksen pelitason tai tyylin (esim. turnaus,
        virkistyspeli, matkapeli).
    set_components:
      name: Pakkauksen osat
      description: Ilmaisee, mitkä osat sisältyvät tuotteeseen (esim. pelkkä keskipaalu
        vs. koko sarja).
    set_items_included:
      name: Setin mukana tulevat tarvikkeet
      description: Määrittää pakkaukseen kuuluvat vaatteet tai asusteet, kuten sarikankaan,
        dupatta-huivin tai vyön.
    setup_mechanism:
      name: Asennusmekanismi
      description: Kuvaa teltan ensisijaisen pystytystavan (esim. pop-up, ilmatäytteinen/ilmapuomi,
        simpukkamallinen kattoteltta).
    setup_type:
      name: Pystytystapa
      description: Kuinka leikkiteltta/tunneli kootaan tai pystytetään.
    sew_in_interfacing_elasticity:
      name: Tukikankaan elastisuus
      description: Ilmaisee, joustaako ommeltava tukikangas ja jos joustaa, mihin
        suuntaan/suuntiin, jotta se sopisi neule- tai kudottuihin projekteihin.
    sew_in_label_placement:
      name: Ommeltavan merkin paikka
      description: Osoittaa aiotun paikan valmiissa tuotteessa.
    sew_on_edge_finish:
      name: Ommeltava reunaviimeistely
      description: Ilmaisee, ovatko tarranauhan reunat huolittelemattomat/leikatut
        vai huolitellut rispaantumisen estämiseksi.
    sew_on_rhinestone_hole_orientation:
      name: Ommeltavan strassin reiän suunta
      description: Reikien järjestely/suunta strassiin nähden (esim. vierekkäin, vastakkain,
        ristiin) erilaisten ommeltyylien tukemiseksi.
    sewing_kit_components_included:
      name: Ompelupakkauksen sisältämät komponentit
      description: Listaa ompelupakkaukseen kuuluvat ompeluvälineet/työkalut, jotta
        ostaja voi vertailla, mitä pakkauksiin kuuluu.
    sewing_machine_bobbin_class:
      name: Ompelukoneen puolaluokitus
      description: Määrittää ompelukoneen kanssa yhteensopivan puolaluokituksen/-järjestelmän
        puolille ja puolakotelolle.
    sewing_machine_buttonhole_type:
      name: Ompelukoneen napinläpityyppi
      description: Koneen tukema napinläpimenetelmä.
    sewing_machine_display_type:
      name: Ompelukoneen näyttötyyppi
      description: Ompelukoneen ohjaus-/näyttöliittymän tyyppi.
    sewing_machine_needle_point_type:
      name: Ompelukoneen neulan kärjen tyyppi
      description: Määrittää neulan kärkigeometrian/kärkiryhmän, joka määrittää, miten
        neula lävistää erilaisia kankaita (esim. terävä vs. joustoneula vs. nahkaneula).
    sewing_machine_needle_system:
      name: Ompelukoneen neulajärjestelmä
      description: Standardoitu neulajärjestelmä/mallinumero, joka määrittää koneen
        yhteensopivuuden (usein kirjoitetaan muodossa 130/705 H, HAx1, DBx1, 15x1
        jne.).
    sewing_machine_needle_type:
      name: Ompelukoneen neulan tyyppi
      description: Määrittää neulan aiotun käytön/tyypin (esim. yleisneula, joustoneula,
        farkku/denim), mikä vaikuttaa ompeleen laatuun ja kankaan sopivuuteen.
    sewing_machine_shank_type:
      name: Ompelukoneen varsityyppi
      description: Määrittää paininjalan varren/pidikkeen liitäntätavan, jota varten
        jalka on suunniteltu, ja varmistaa yhteensopivuuden ompelukoneen kanssa (esim.
        matala, korkea tai vino kiinnitys)
    sewing_pattern_accessory_type:
      name: Kaavan asustetyyppi
      description: Määrittää, mikä asuste kaavalla tehdään
    sewing_pattern_notions_required:
      name: Kaavaa varten tarvittavat ompelutarvikkeet
      description: Listaa merkittävät lisämateriaalit/laitteet, joita tarvitaan projektin
        loppuun saattamiseksi (kankaan ja langan ohella).
    sewing_pattern_recommended_fabric:
      name: Kaavalle suositeltu kangas
      description: Listaa kaavalle suositellut kangastyypit/painot (kaavan suunnittelijan
        toimittamat tiedot).
    sewing_pattern_size_range:
      name: Kaavan kokoluokka
      description: Määrittää kaavan kattaman kokoluokan (esim. vauvasta aikuiseen,
        plus-koot).
    sewing_thread_size_system:
      name: Ompelulangan kokoluokitus
      description: Ompelulangan koon ilmaisemiseen käytetty standardi (esim. Tex,
        Denier, Ticket, painoluku, V-koko).
    shaft_curvature:
      name: Varren kaarevuus
      description: Kuvaa varren yleistä muotoa, joka vaikuttaa ulottuvuuteen, heilahdusliikkeeseen
        ja ergonomiaan.
    shaft_kick_point:
      name: Varren taipumiskohta
      description: Määrittää varressa kohdan, jossa se taipuu eniten svingin aikana
        ja vaikuttaa pallon lentorataan.
    shaft_length_type:
      name: Varren pituustyyppi
      description: Alan standardin mukainen kokomerkintä tikka-akseleille (esim. lyhyt,
        keskikokoinen), jota käytetään, kun tarkkoja millimetrimittoja ei ilmoiteta.
    shaft_shape:
      name: Varren muoto
      description: Määrittää tonfan varren poikkileikkausprofiilin (esim. pyöreä,
        neliömäinen, kahdeksankulmainen).
    shaker_fill_material:
      name: Rytmimunan täytemateriaali
      description: Määrittää pääasiallisen aineen, jota käytetään shakerin sisällä
        ravistusäänen aikaansaamiseksi (jos sovellettavissa), kuten helmet, siemenet
        tai haulit.
    shaker_shell_material:
      name: Rytmimunan kuoren materiaali
      description: Määrittää munashakerin rungon/kuoren (ulkokuoren) pääasiallisen
        materiaalin.
    shallot_variety:
      name: Salottisipulilajike
      description: Ilmaisee salottisipulin lajikkeen, kauppatyypin tai muunnoksen.
    shank_style:
      name: Varren tyyli
      description: Kuvaa kankikuolaimen varsien muotoa/kokoonpanoa (esim. suora, kaareva,
        grazer).
    shapewear_enhancement_feature:
      name: Muotoilevan alusvaatteen toiminnallinen ominaisuus
      description: Korostaa vaatteen pääasiallista toimintoa (esim. vatsan kiinteytys,
        pakaroiden kohotus, vuotamaton vuori).
    sheath_type:
      name: Suojuksen tyyppi
      description: Keräilyveitsen mukana tulevan suojuksen/tupen tyyppi.
    sheet_music_clip_padding_material:
      name: Nuottipidikkeen pehmustemateriaali
      description: Jalustan reunaa tai paperia koskettava nuottitelineen pehmuste,
        joka estää repeytymisen ja liukumisen.
    sheet_music_clip_spring_tension_level:
      name: Nuottipidikkeen jousen kireystaso
      description: Pidikkeen jousen suhteellinen lujuus / puristusvoima.
    sheet_music_clip_use_environment:
      name: Nuottipidikkeen käyttöympäristö
      description: Pääasiallinen käyttö, jossa pidike on suunniteltu toimimaan parhaiten.
    shell_construction:
      name: Rungon rakenne
      description: Määrittää bassorummun rungon rakenteen, joka vaikuttaa merkittävästi
        sointiin ja painoon.
    shell_finish:
      name: Rungon viimeistely
      description: Doumbek-rumpurungon ulkopuolen viimeistely
    shell_hull_status:
      name: Kuoren tila
      description: Määrittää, myydäänkö pähkinät tai siemenet kuorineen vai kuoret
        poistettuina.
    shift_boot_attachment_method:
      name: Vaihdekepin suojakumin kiinnitystapa
      description: Määrittää, miten vaihdekepin suojakumi kiinnittyy ajoneuvon konsoliin/vaihteenvalitsimen
        kehykseen (esim. napsautettava peitekehys, kiinnitysrengas, liima).
    shift_boot_installation_hardware_included:
      name: Mukana toimitettava vaihdekepin suojakumin asennuslaite
      description: Listaa vaihdekepin suojakumin mukana toimitetun asennuslaitteen
        ja komponentit.
    shift_knob_illumination:
      name: Vaihdekepin nupin valaistus
      description: Määrittää, onko vaihdekepin nupissa valaistus sekä valaistustavan/tyypin
        (esim. pimeässä hohtava, LED, valokuitu, taustavalaistu kuvio).
    shift_knob_installation_method:
      name: Vaihdekepin nupin asennusmenetelmä
      description: Määrittää, miten vaihdekepin nuppi kiinnittyy vaihteenvalitsimeen/vipuun.
    shift_knob_shape:
      name: Vaihdekepin nupin muoto
      description: Kuvaa vaihdekepin nupin yleistä ergonomista muotoa.
    shift_pattern_type:
      name: Vaihtokuvion tyyppi
      description: Määrittää vaihdekepin nupin vaihdemerkinnän tyylin (jos sellainen
        on).
    shifter_compatibility:
      name: Vaihteenvalitsimen yhteensopivuus
      description: Ilmaisee, onko ohjaustangon jatke yhteensopiva sähköisten vaihdevipujen,
        mekaanisten vaihdevipujen tai molempien kanssa tai ei yhteensopiva vaihdevipujen
        kanssa.
    shifter_mounting_interface:
      name: Vaihteenvalitsimen asennusliittymä
      description: Kuvaa, miten vaihdevipu kiinnittyy pyörään (esim. erillinen kiinnityshalkaisija,
        I-Spec, MatchMaker, päätyvipu, alaputki, langaton).
    shifting_actuation_type:
      name: Vaihteensiirron käyttötapa
      description: Määrittää vaihteiden vaihtamiseen käytetyn mekanismin voimansiirtosarjassa
        (mekaaninen, elektroninen langallinen, elektroninen langaton, hydraulinen).
    shifting_mechanism:
      name: Vaihtomekanismi
      description: Ilmaisee, toimiiko vaihtaja mekaanisesti vai elektronisesti ja
        onko se indeksoitu vai kitkapohjainen.
    shim_purpose:
      name: Välilevyn tarkoitus
      description: Määrittelee tuotteen toiminnallisen tyypin (esim. välilevy, kiila,
        täytelevy), jotta pyöräilijät voivat löytää oikean säätöratkaisun nopeasti
        ilman erillisiä alakategorioita.
    shin_guard_attachment_method:
      name: Säärisuojan kiinnitystapa
      description: Luokittelee säärisuojan yleisen muotoilun, mukaan lukien nilkkasuojan
        integroinnin tai sukan rakenteen.
    shirt_cuff_style:
      name: Paidan kalvosintyyli
      description: Määrittää hihansuiden rakenteen, joka vaikuttaa muodollisuuteen,
        yhteensopivuuteen kalvosinnappien kanssa ja käyttömukavuuteen.
    shochu_base_ingredient:
      name: Shochun perusainesosa
      description: Määrittää shochun valmistuksessa käytetyn ensisijaisen tärkkelyksen
        tai sokerin lähteen.
    shochu_soju_variety:
      name: Shochun ja sojun tyyppi
      description: Luokittelee tuotteen sen tunnetun tyylin tai tuotantotyypin mukaan.
    shock_absorber_bushing_material:
      name: Iskunvaimentimen holkin materiaali
      description: Kiinnitysholkkien/eristimien materiaali, joka toimitetaan iskunvaimentimen
        mukana tai on integroitu iskunvaimentimeen.
    shock_absorber_charge_type:
      name: Iskunvaimentimen lataustyyppi
      description: Määrittää iskunvaimentimen lataus-/vaimennustekniikan (esim. hydraulinen/öljy,
        kaasu tai ilma) ja/tai siihen liittyvän putkirakenteen soveltuvin osin.
    shock_absorber_mount_type_lower:
      name: Iskunvaimentimen kiinnitystyyppi (matala)
      description: Iskunvaimentimen pohjaan kiinnitettävän liitännän tyyli sopivuuden
        varmistamiseksi.
    shock_absorber_mount_type_upper:
      name: Iskunvaimentimen kiinnitystyyppi (ylempi)
      description: Määrittää moottoriajoneuvon iskunvaimentimen ylemmän asennusliitännän
        tyylin sopivuuden/yhteensopivuuden varmistamiseksi.
    shock_absorber_position:
      name: Iskunvaimentimen asento
      description: Määrittää, onko iskunvaimennin tarkoitettu ajoneuvon eteen, taakse,
        vasemmalle vai oikealle puolelle (tarkempi kuin pelkän akselin sijoittelu).
    shock_absorption_system:
      name: Iskunvaimennusjärjestelmä
      description: Määrittää mekanismin, jota käytetään tärinän ja melun vähentämiseen
        palautuessa.
    shoe_collar_height:
      name: Kengän varren korkeus
      description: Luokittelee kengät varren/leikkauksen korkeuden mukaan (matala
        varsi, puolivarsi, korkea varsi) nilkan peittävyyden ja tuen ilmaisemiseksi.
    shoe_cover_height:
      name: Kengänsuojuksen korkeus
      description: Määrittää pyöräilykenkien suojuksen peittävyyden ja erottaa kärkisuojukset
        korkeista päällyskengistä.
    shoe_sizing_system:
      name: Kenkien kokojärjestelmä
      description: Ilmaisee ilmoitetun kenkäkokomerkinnän kokostandardin (US, UK,
        EU, JP, Mondopoint jne.).
    shoelace_aglet_material:
      name: Kengännauhan pujottimen materiaali
      description: Määrittää kengännauhojen päissä olevien pujottimien materiaalin,
        joka vaikuttaa kestävyyteen ja tyyliin.
    shooting_rest_design:
      name: Ampumatuen malli
      description: Luokittelee tuen rakenteellisen tyylin (ampumapussi, kohdistustuki,
        kolmijalkatuki, asepenkki jne.).
    shooting_stick_yoke_design:
      name: Ampumatuen haarukka
      description: Määrittää ampuma-aseeseen tai optiikkaan liitetyn telineen tai
        haarukan tyylin.
    shooting_target_style:
      name: Tarkkuustaulun tyyli
      description: Luokittelee taitoluistelun ja jääkiekon harjoitusvälineiden tyylin
        tai suunnittelun, jotta asiakkaat voivat valita haluamansa painotuksen harjoituksiin.
    shooting_target_type:
      name: Ampumataulun tyyppi
      description: Luokittelee tarkkuustaulut rakenteellisen tyylin, materiaalin tai
        muodon mukaan (esim. gongi, siluetti, paperinen häränsilmä, spinneri), minkä
        avulla ampujat voivat nopeasti paikantaa oikean kohteen lajilleen ja asetyypille.
    short_block_assembly_balance_type:
      name: Perusmoottorikokoonpanon tasapainotuksen tyyppi
      description: Ilmaisee, onko mäntäkoneisto sisäisesti vai ulkoisesti tasapainotettu.
    short_block_intended_use:
      name: Perusmoottorin käyttötarkoitus
      description: Perusmoottorin ensisijainen käyttötarkoitus.
    short_block_rotating_assembly_included:
      name: Perusmoottorin mäntäkoneisto sisältyy toimitukseen
      description: Määrittää, mitkä tärkeimmät mäntäkoneiston komponentit sisältyvät
        perusmoottoriin.
    shot_size:
      name: Haulin koko
      description: Määrittää irtohaulien tai ammusten osien haulikoko-merkinnän.
    shotgun_action_type:
      name: Haulikon toimintatyyppi
      description: Määrittää haulikon toimintamekanismin/toiminnan.
    shotgun_choke_type:
      name: Haulikon supistajatyyppi
      description: Määrittää haulikon piipun/piippujen supistajakokoonpanon.
    shotgun_gauge:
      name: Haulikon kaliiperi
      description: Määrittää haulikon piipun kaliiperin (ja .410-kokoisen reiän tarvittaessa)
        tuotteiden tunnistamista ja suodattamista varten keräilyesineluetteloissa.
    shotgun_stock_material:
      name: Haulikon tukin materiaali
      description: Määrittää tukin/etutukin päämateriaalin.
    shuffleboard_speed_rating:
      name: Shuffleboardin nopeusluokitus
      description: Ilmaisee suhteellisen liukunopeuden, jonka jauhe tai muu asianmukainen
        aine antaa shuffleboard-pöydälle, jolloin pelaajat voivat valita taitotasolleen
        ja pöydän pituudelle sopivan nopeuden.
    shuffleboard_table_length_compatibility:
      name: Shuffleboard-pöydän pituuden yhteensopivuus
      description: Shuffleboard-pöydän vakiopituus, jolle tuote on suunniteltu tai
        jota se on suunniteltu täydentämään.
    shuttlecock_base_material:
      name: Sulkapallon pohjan materiaali
      description: Ilmaisee sulkapallon nokan/pohjan materiaalin, joka vaikuttaa kestävyyteen,
        tuntumaan ja kimmoisuuteen.
    shuttlecock_feather_material:
      name: Sulkapallon höyhenmateriaali
      description: Määrittää sulkapallon helmassa käytettyjen sulkien ensisijaisen
        lähteen tai rakenteen, joka vaikuttaa kestävyyteen, tasalaatuisuuteen ja hintaan.
    shuttlecock_grade:
      name: Sulkapallon luokka
      description: Määrittää aiotun pelitason tai laatuluokituksen (esim. harjoitus,
        seura, kilpailu).
    shuttlecock_speed_rating:
      name: Sulkapallon nopeusluokitus
      description: Määrittää sulkapallon valmistajan määrittämän nopeuden tai luokituksen,
        jonka avulla pelaajat voivat valita oikean lentonopeuden peliolosuhteiden,
        lämpötilan ja pelipaikan sijainnin mukaan.
    side_panel_installation_state:
      name: Sivupaneelin asennuksen tila
      description: Määrittää, toimitetaanko sivupaneeli maalamattomana, pohjamaalattuna,
        maalattuna vai muuten pinnoitettuna/valmisteltuna asennusta varten.
    side_wall_mechanism:
      name: Reunan mekanismi
      description: Kuvaa, miten vauvansängyn reuna avautuu tai laskee.
    signal_source:
      name: Signaalin lähde
      description: Ilmaisee, miten matkamittari vastaanottaa/johtaa matka- tai aikatiedot.
    silk_fiber_type:
      name: Silkkikuidun tyyppi
      description: Kankaan valmistuksessa käytetyn silkkikuidun tyyppi/lähde (esim.
        mulperipuu tai tussah), joka vaikuttaa tuntuun, tasaisuuteen ja hintaan.
    simulated_game_species:
      name: Simuloidut riistalajit
      description: Ilmaisee tietyn riistalinnun tai eläimen, jota dummy esittää, jotta
        koulutus olisi realistista.
    singlet_cut_style:
      name: Painijanpuvun leikkaus
      description: Määrittää painijanpuvun leikkauksen/tyylin huomioiden olkaimen
        korkeuden, selän tyylin ja eri sukupuolet / nuoret.
    sink_material:
      name: Pesualtaan materiaali
      description: Määrittää allaskaappiin kuuluvien altaiden materiaalin.
    sinker_attachment_style:
      name: Siimapainon kiinnitystyyppi
      description: Kuvaa pohjapainossa olevaa mekanismia sen kiinnittämiseksi siimaan
        tai laitteistoon.
    sinker_finish:
      name: Siimapainon viimeistely
      description: Määrittää siimapainon ulkopinnoitteen tai pintakäsittelyn.
    sinker_shape:
      name: Siimapainon muoto
      description: Määrittelee painon geometrisen muodon (esim. luoti, sylinteri,
        pisara), jotta kalastajat voivat valita optimaalisen käyttötavan ja tarttumattomuusominaisuuden.
    siren_system_included:
      name: Mukana toimitettava sireenijärjestelmä
      description: Ilmaisee, onko sireeni-/PA-järjestelmä asennettu ja jos on, minkä
        tyyppinen se on.
    siren_system_type:
      name: Sireenijärjestelmän tyyppi
      description: Määrittää poliisiautoon asennetun sireenin/PA-järjestelmän kokoonpanon.
    size_designation:
      name: Kokomääritys
      description: Standardoitu kokomerkintä triangelille.
    size_system:
      name: Kokojärjestelmä
      description: Määrittää kokomerkinnän vastaavan kokojärjestelmän tai alueellisen
        standardin (esim. US, UK, EU, kansainvälinen).
    sizzle_mechanism:
      name: Särinämekanismi
      description: Määrittää, miten symbaali tuottaa särisevän efektin (esim. symbaaliin
        asennetut niitit, kiinnitettävä ketju/sihisevä elementti, tai mitään ei ole
        asennettu).
    skate_blade_discipline:
      name: Luistimen terän käyttölaji
      description: Tunnistaa luistelulajin tai käytön, johon terä on suunniteltu,
        kuten jääkiekko tai taitoluistelu, jolloin ostaja voi suodattaa tuotteita
        asiaankuuluvilla kriteereillä.
    skate_brake_type:
      name: Luistimen jarrutyyppi
      description: Määrittää luistimien mukana tulevan pysäytysmekanismin tyylin.
    skateboard_nut_thread_size:
      name: Skeittilaudan mutterin kierrekoko
      description: Määrittää mutterin kierrekoon (halkaisijan ja nousun), jolla varmistetaan
        yhteensopivuus rullalaudan akseleiden, keskiötappien tai kiinnityslaitteiden
        kanssa.
    skein_winder_bearing_bushing_type:
      name: Vyyhdinpuun laakerin/holkin tyyppi
      description: Määrittää vyyhdinpuun pyörivässä osassa käytetyn laakerin tai holkin
        tyypin.
    skein_winder_drive_type:
      name: Vyyhdinpuun käyttövoiman tyyppi
      description: Mistä vyyhdinpuu saa käyttövoimansa/pyörimisvoimansa käytön aikana.
    ski_binding_mechanism:
      name: Suksien sidemekanismi
      description: Määrittelee sidemekanismin perusrakenteen tai lajin (esim. alppihiihto,
        tech/pin-siteet tai telemark).
    ski_binding_part_type:
