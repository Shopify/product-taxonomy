    drum_clamp_type:
      name: Rumpupuristintyyppi
      description: Määrittää rumpusetin runkoon asennettavat telineiden rumpupakkauksen
        puristintyylin (esim. vannepuristin vs. teline/putkipuristin).
    drum_head_application_batter_resonant:
      name: Rumpukalvon käyttötapa (soitto/resonanssi)
      description: Määrittää, kummalle puolelle tai mihin tarkoitukseen rumpukalvon
        yläpinta on suunniteltu (soitopinta vai pohjapuoli eli resonanssi- tai virvelipuoli).
    drum_head_collar_type:
