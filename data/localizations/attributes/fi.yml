      description: Ilmaisee leluavaruusaluksen karkean kokoluokan pikasuodatuksen
        tukemiseksi, erillään tarkoista mittasuhteista (pituus/leveys/korkeus) ja
        mallin numeerisesta mittasuhdeluvusta (esim. 1:72).
    toy_tableware_pieces_included:
      name: Mukana tulevat lelutarjoiluastiat
      description: Määrittää sisältyvät leluastiat (lautaset, kupit, aterimet, tarjoiluvälineet).
    toy_tool_electronic_features:
      name: Lelutyökalujen elektroniset ominaisuudet
      description: Kuvailee lelutyökalun interaktiivisia/elektronisia ominaisuuksia
        (valot, äänet, pyörivä liike jne.).
    toy_tool_set_components_included:
      name: Mukana tulevat leikkityökalusetin osat
      description: Luettelee pakkaukseen sisältyvän leikkityökalun nimikkeet (erityisesti
        työkalusarjoissa).
