    swimbait_style:
      name: Uintivieheen tyyli
      description: Luokittelee uintivieheen rakenteen tai toimintatavan, kuten melapyrstö-
        tai liukuviehe.
    swimwear_pieces_included:
      name: Mukana tulevat uima-asusteet
      description: Ilmaisee burkinisettiin sisältyvät vaateosat, jotta ostajat tietävät
