    tweeter_material:
      name: Diskanttikaiuttimen materiaali
      description: Diskanttikaiuttimen pääkalvon/kalotin materiaali.
    tweeter_mount_type:
      name: Diskanttikaiuttimen asennustapa
      description: Määrittää, miten diskanttikaiutin on tarkoitus asentaa ajoneuvoon
