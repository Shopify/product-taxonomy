    training_objective:
      name: Harjoittelun tavoite
      description: Määrittää ensisijaisen taidon tai tekniikan, jota tuote on suunniteltu
        parantamaan.
    training_surface_suitability:
      name: Harjoitusalustan soveltuvuus
      description: Määrittää, millä alustoilla harjoitusjalkinetta voidaan käyttää.
    training_surface_usage:
      name: Harjoitusalustan käyttö
      description: Määrittää ensisijaiset aktiviteetit, joita harjoitusalusta tukee,
        erottaen synteettisen jään laatat kuivan maan tai multisport-matoista.
    training_usage_type:
      name: Harjoittelukäytön tyyppi
      description: Määrittää treenihousujen ensisijaisen käyttöajanjakson tai -yhteyden,
        kuten päivä- tai yöharjoittelu.
    trampoline_enclosure_type:
      name: Trampoliinin suojaverkon tyyppi
      description: Määrittää trampoliinilla käytettävän suojaverkon kokoonpanon, mukaan
        lukien verkon kiinnitystavan ja -paikan.
    trampoline_safety_certifications:
      name: Trampoliinin turvallisuussertifioinnit
      description: Ilmaisee, mitä trampoliineihin liittyviä turvallisuusstandardeja/-sertifikaatteja
