    drum_pedal_clamp_type:
      name: Rumpupedaalin puristintyyppi
      description: Määrittää, miten pedaali kiinnitetään bassorumpuvanteeseen.
    drum_pedal_intended_use:
      name: Rumpupolkimen käyttötarkoitus
      description: Ilmaisee sen pääasiallisen käyttötarkoituksen, johon hihnakäyttöinen
