        hintaan.
    barbell_knurling_pattern:
      name: Tangon karhennuskuvio
      description: Tiedot tangon karhennetun otealueen tyylistä ja karkeudesta, mukaan
        lukien erityiset voimanosto- tai painonnostomerkinnät.
    barista_suitability:
      name: Soveltuvuus kahvinvalmistukseen
      description: Kuvailee, onko tuote suunniteltu kahvin valmistukseen ja vaahdotukseen.
    barre_rail_configuration:
      name: Barre-kiskokokoonpano
      description: Ilmaisee balettitangon mukana toimitettujen vaakasuorien tankojen
