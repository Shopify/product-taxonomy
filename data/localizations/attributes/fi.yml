      name: Lelujunan mittakaava
      description: Määrittää lelu-/mallijunan mittakaavastandardin (tai ratajärjestelmän
        koon) yhteensopivuuden varmistamiseksi olemassa olevien junien ja ratojen
        kanssa.
    toy_train_track_layout_type:
      name: Lelujunaradan pohjan tyyppi
      description: Kuvaa junasetin mukana tulevan radan tai laajennusrataosan pohjan/muodon.
    toy_weapon_gadget_features:
      name: Leluaseiden ja -laitteiden ominaisuudet
      description: Tuo esiin leluaseille ja vakoiluvälineille ominaisia yleisiä interaktiivisia
        ja toiminnallisia ominaisuuksia.
    tpms_sensor_frequency_band:
      name: TPMS-anturin taajuuskaista
      description: TPMS-lisävarusteiden tukema radiotaajuuskaista (jos sovellettavissa).
    track_and_field_discipline:
      name: Rata- ja kenttälaji
      description: Määrittää urheilutapahtuman tai -lajin, johon tuote on tarkoitettu
        (esim. kuulantyöntö, seiväshyppy, pikajuoksu).
    track_event_specialization:
      name: Ratatapahtuman määritys
      description: Ilmaisee tapahtumatyypin, jolle piikkari on optimoitu.
    track_field_event_suitability:
      name: Soveltuvuus rata- ja kenttätapahtumaan
      description: Määrittää erityiset rata- ja kenttätapahtumat, joihin harjoitteluväline
