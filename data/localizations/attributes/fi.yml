      name: Kahluusaappaiden pohjan tyyppi
      description: Määrittää kahluusaappaiden tai saappaallisten kahluuhousujen pohjan
        materiaalin tai kuvioinnin.
    waistband_style:
      name: Vyötärönauhan tyyli
      description: Ilmoittaa vyötärönauhan rakenteen sekä sen kiinnittämis- tai säätötavan
        istuvuuden ja mukavuuden varmistamiseksi.
    wakeboard_binding_mounting_pattern:
      name: Wakeboard-siteiden kiinnityskuvio
      description: Määrittää wakeboardin kiinnike-/levykuvion, jonka kanssa siteet
        ovat yhteensopivia.
    wakeboard_riding_style:
      name: Wakeboardin lautailutyyli
      description: Luokittelee wakeboardin aiotun ympäristön tai käyttötavan.
    wall_decal_style:
      name: Seinätarran tyyli
      description: Määrittää, miten tarra valmistetaan/kiinnitetään (esim. stanssattu,
        siirtokuva, tarra-arkki).
    wallyball_equipment_included:
      name: Mukana tulevat wallyball-varusteet
      description: Luettelo wallyball-setin mukana toimitettavista osista, jotta ostajat
        tietävät tarkalleen mitä ostavat ja voivat vertailla tuotepaketteja.
    warp_beam_type:
      name: Loimitukin tyyppi
      description: Määrittää kangaspuiden mukana toimitettavan tai niihin asennetun
        puomin kokoonpanon (kangaspuiden mukana mukana toimitettu puomikokoonpano).
    washability:
      name: Pestävyys
      description: Ilmoittaa, voidaanko liima puhdistaa vedellä ja/tai onko se pestävissä
        levittämisen jälkeen.
    watch_band_design:
      name: Kellonrannekkeen muotoilu
      description: Ilmoittaa kellonrannekkeen rakenteen tai muotoilun (esim. NATO,
        Milanese, Link).
    watch_movement:
      name: Kellon mekanismi
      description: Määrittää kellon liikemekanismin, joka on ostajalle keskeinen tekijä
        mallien erottamisessa toisistaan.
    water_activation:
      name: Vesiaktivointi
      description: Aktivoituuko majakka automaattisesti upotessaan veteen (yleistä
        luokkien I/II hätäpaikannusradiopoijuissa).
    water_chamber_configuration:
      name: Vesikammiokokoonpano
      description: Ilmoittaa patjan sisäisten vesisäiliöiden rakenteen, kuten yksi-
        tai kaksikammioinen, mikä vaikuttaa tukevuuteen, lämpötilan säätöön ja kumppanin
        aiheuttamiin häiriöihin.
    water_dispensing_mechanism:
      name: Veden annostelumekanismi
      description: Määrittää, miten vesi lasketaan pois yksiköstä, esimerkiksi hanojen
        tai suuttimien kautta tai painovoimaisesti.
    water_exposure_protection_level:
      name: Vesialtistuksen suojaustaso
      description: Ilmaisee tuotteen suojaustason vedelle altistumista vastaan (esim.
        roiskevesi tai tilapäinen upotus veteen). Käytä tiiviysluokitusta (IP), kun
        virallinen IP-luokitus on saatavilla.
    water_fed_design:
      name: Vedensyötön menetelmä
      description: Ilmaisee, onko harja suunniteltu käytettäväksi juoksevan veden
        kanssa läpivirtaavan kahvan vai letkuliitoksen kautta.
    water_gun_features:
      name: Vesipyssyn ominaisuudet
      description: Vesipistoolin merkittävät toiminnalliset ominaisuudet.
    water_gun_operating_mechanism:
      name: Vesipistoolin käyttömekanismi
      description: Miten vesipistooli paineistaa ja suihkuttaa vettä käytön aikana.
    water_gun_spray_pattern:
      name: Vesipistoolin suihkukuvio
      description: Suuttimen ampumisen aikana tuottaman vesisuihkun tyyppi.
    water_heating_method:
      name: Veden lämmitysmenetelmä
      description: Kuvaa, miten tai jos vesi lämmitetään ennen käyttöä – esimerkiksi
        aurinkoenergialla, propaanipolttimilla, sähkövastuksilla, akkukäyttöisellä
        lämmityksellä, lämmönvaraavalla eristyksellä tai ilman lämmitystä.
    water_mattress_construction:
      name: Vesipatjan rakenne
      description: Ilmoittaa vesipatjan rakennetyypin (esim. kova- vai pehmeäreunainen),
        mikä puolestaan vaikuttaa rungon yhteensopivuuteen ja yleiseen tuntumaan.
    water_play_features:
      name: Vesileikkiominaisuudet
      description: Vesipuistoon/liukumäkeen sisältyvät vesiaktiviteettiosat.
    water_polo_competition_approval:
      name: Vesipallon kilpailuhyväksyntä
      description: Ilmaisee hallintoelimen tai kilpailutason, jolle pallo on virallisesti
        hyväksytty tai sertifioitu.
    water_polo_goal_type:
      name: Vesipallon maalityyppi
      description: Luokittelee maalin rakenteellisen tai kiinnityskokoonpanon (esim.
        kelluva, kannelle asennettu, kannettava).
    water_pump_drive_type:
      name: Vesipumpun käyttötyyppi
      description: Määrittää, miten vesipumppua käytetään / miten se aktivoidaan ajoneuvon
        jäähdytysjärjestelmässä.
    water_pump_housing_material:
      name: Vesipumpun kotelon materiaali
      description: Vesipumpun kotelon/rungon materiaali.
    water_pump_impeller_material:
      name: Vesipumpun juoksupyörän materiaali
      description: Ilmoittaa vesipumpun juoksupyörän (jäähdytysnestettä liikuttavan
        sisäisen roottorin/siipipyörän) materiaalin.
    water_pump_mounting_type:
      name: Vesipumpun kiinnityksen tyyppi
      description: Määrittää vesipumpun kiinnitystavan/muodon moottoriin asennusta
        varten (esim. pulttikiinnitteinen kotelo vs. patruuna/sisäosa).
    water_purification_method:
      name: Veden puhdistusmenetelmä
      description: Määrittää ensisijaisen mekanismin, jolla tuote tekee vedestä juomakelpoista
        kenttäolosuhteissa (esim. pumppu vai painovoimainen syöttö vai UV-valo).
    water_resistance:
      name: Vedenkestävyys
      description: Ilmoittaa säänkestävyyden asteen, kuten vesitiivis tai vedenkestävä.
    water_resistance_level:
      name: Vedenkestävyystaso
      description: Ilmaisee, hylkiikö tekstiili vettä ja missä määrin.
    water_resistance_rating_case_protection_level:
      name: Vedenkestävyysluokitus (kotelon suojaustaso)
      description: Ilmaisee kotelon tarjoaman vedenpitävyyden/suojauksen tason (markkinointitaso,
        ei elektroniikasn IP-tiiviysluokka), esim. vedenkestävä vai vesitiivis.
    water_rocket_kit_items_included:
      name: Vesirakettipakkaukseen kuuluvat tuotteet
      description: Tärkeimmät tuotepakettiin kuuluvat osat.
    water_rocket_propulsion_type:
      name: Vesiraketin käyttövoimatyyppi
      description: Ensisijainen raketin laukaisemiseen käytettävää liikevoima/energianlähde.
    water_rocket_recovery_system:
      name: Vesiraketin palautusjärjestelmä
      description: Menetelmä, jolla raketti palautetaan laukaisun jälkeen.
    water_ski_base_design:
      name: Vesisuksien pohjan rakenne
      description: Määrittää vesisuksien pohjan profiilin, joka vaikuttaa käsiteltävyysominaisuuksiin.
    water_ski_fin_type:
      name: Vesisuksien evätyyppi
      description: Määrittää vesisuksen eväkokoonpanon, joka vaikuttaa suuntavakavuuteen
        ja ohjattavuuteen.
    water_source:
      name: Veden lähde
      description: Tunnistaa veden alkuperän ennen hiilihapotusta.
    water_sports_safety_standard:
      name: Vesiurheilun turvallisuusstandardi
      description: Luettelee viralliset turvallisuus- tai kelluttavuusstandardit,
        jotka tuote täyttää (esim. CE EN 1385 kypärille, ISO 12402-5 kelluntavälineille,
        USCG Type III).
    water_table_feature_set:
      name: Vesipöytäsarja
      description: Korostaa vesipöytään kuuluvia leikkirakenteita, kuten vesiputouksia,
        ruiskuja, pumppuja tai monikerroksisia altaita.
    water_table_items_included:
      name: Pakettiin sisältyvät vesipöytätuotteet
      description: Ilmoittaa, mitkä tulevat lisävarusteet toimitetaan vesipöytäsarjan
        mukana (esim. veneet, kupit, suppilot, hahmot).
    water_table_water_source_type:
      name: Vesipöydän vedensyöttötyyppi
      description: Ilmoittaa, miten vesipöytä täytetään vedellä tai miten siihen syötetään
        vettä.
    waterbed_stabilization_level:
      name: Vesisängyn vaimennustaso
      description: Ilmaisee vesisängyn patjan aallonvaimennuksen tai liikkeenhallinnan
        asteen.
    watercolor_ink_water_resistance_after_drying:
      name: Vesivärimusteen vedenkestävyys (kuivumisen jälkeen)
      description: Ilmaisee, tuleeko vesivärimusteesta vedenkestävä kuivuttuaan (valmistajan
        väitteen mukaan).
    watercraft_care_application_area:
      name: Vesikulkuneuvojen hoitoaineen levitysalue
      description: Ilmaisee vesikulkuneuvon alueen tai osan, jolla tuotetta on pääasiassa
        tarkoitus käyttää.
    watercraft_drive_mechanism:
      name: Vesikulkuneuvon käyttömekanismi
      description: Ilmoittaa alukseen asennetun tai sen tukeman propulsiomekanismin.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Vesikulkuneuvon polttoainesäiliön anturiyksikön kuvio
      description: Ilmoittaa polttoainesäiliön anturien ja yhteensopivien mittareiden
        kiinnityskuvion/standardin (esim. yleiset vesiliikennekäyttöön tarkoitetut
        pulttijaot).
    watercraft_fuel_tank_shape:
      name: Vesikulkuneuvojen polttoainesäiliön muoto
      description: Ilmoittaa polttoainesäiliön yleisen fyysisen muodon tilan/asennuksen
        suunnittelun tueksi.
    watercraft_hull_material:
      name: Vesikulkuneuvon rungon materiaali
      description: Ilmoittaa rungon ensisijaisen rakennusmateriaalin.
    watercraft_ignition_part_voltage:
      name: Vesikulkuneuvon sytytysosan jännite
      description: Sytytysosan nimellisjännite/jännitevaatimus (jos sovellettavissa),
        esimerkiksi 12 V:n järjestelmä.
    watercraft_impeller_material_grade:
      name: Vesikulkuneuvon juoksupyörän materiaaliluokka
      description: Määrittää vesikulkuneuvon juoksupyörän materiaalin (esim. neopreenikumi,
        nitriili, pronssi).
    watercraft_lighting_certification_compliance:
      name: Vesikulkuneuvojen valaistuksen sertifiointi / vaatimustenmukaisuus
      description: Ilmaisee, että valo on sertifioitu vesiliikennekäyttöön tarkoitettujen
        määräysten/standardien mukaiseksi (esim. USCG/ABYC/COLREG-yhteensopiva).
    watercraft_motor_mount_adjustment_features:
      name: Vesikulkuneuvon moottorin kiinnityksen säätöominaisuudet
      description: Kiinnityksen säätöominaisuudet (esim. trimmi, nosto, liuku), jotka
        vaikuttavat käytettävyyteen ja sopivuuteen.
    watercraft_piston_part_type:
      name: Vesikulkuneuvon männän osan tyyppi
      description: Ilmaisee, mitä mäntään liittyvää komponenttia listaus vastaa.
    watercraft_propeller_blade_rake:
      name: Vesikulkuneuvon potkurin lavan nousu
      description: Määrittää potkurin lavan nousun (lavan kulman suhteessa napaan),
        joka vaikuttaa keulan nousuun ja suorituskykyyn.
    watercraft_propeller_rotation_direction:
      name: Vesikulkuneuvon potkurin pyörimissuunta
      description: Ilmaisee potkurin pyörimissuunnan/kätisyyden (esim. oikeakätinen/vakio
        vs. vasenkätinen/vastakkaiseen suuntaan pyörivä) voimansiirron yhteensopivuuden
        selvittämistä varten.
    watercraft_pump_stage_impeller_role:
      name: Vesikulkuneuvon pumpun vaihe / juoksupyörän tehtävä
      description: Ilmaisee, onko juoksupyörä tarkoitettu tietynpaiseen pumppuun (esim.
        raakavesi-/merivesipumppu, jäähdytysnesteen kiertopumppu, ruiskutuspumppu).
    watercraft_registration_status:
      name: Vesikulkuneuvon rekisteröintitila
      description: Ilmoittaa, kuuluuko purjeveneeseen omistusoikeus- ja/tai rekisteröintiasiakirjat.
    watercraft_safety_equipment_activation_type:
      name: Vesikulkuneuvon turvavarusteiden aktivointityyppi
      description: Turvalaitteen ensisijainen aktivointimenetelmä (majakoille/MOB-hälyttimille/PLB-hätälähettimille),
        eri kuin täyttämistapa.
    watercraft_steering_cable_core_material:
      name: Vesikulkuneuvon ohjausvaijerin ytimen materiaali
      description: Määrittää voimaa välittävän vaijerin sisäosan/ytimen materiaalin.
    watercraft_steering_cable_hardware_included:
      name: Vesikulkuneuvon ohjausvaijerin mukana toimitettavat laitteistot
      description: Määrittää, mitkä asennuslaitteet ja lisävarusteet toimitetaan ohjausvaijerin
        mukana.
    watercraft_steering_cable_system_type:
      name: Vesikulkuneuvon ohjausvaijerijärjestelmän tyyppi
      description: Määrittää ohjausjärjestelmän arkkitehtuurin, johon vaijeri on suunniteltu
        (esim. pyörivä, hammastanko).
    watercraft_steering_wheel_hub_bore_type:
      name: Vesialuksen ohjauspyörän keskiön/reiän tyyppi
      description: Määrittää keskiasennuksen/reiän liitäntätavan (esim. kartiomainen,
        uritettu), jolla pyörä liittyy napaan tai sovittimeen.
    watercress_variety:
      name: Vesikrassilajike
      description: Ilmaisee myytävän vesikrassin lajikkeen tai tyypin.
    waterproof_level:
      name: Vedenpitävyystaso
      description: Ilmaisee jalkineiden vedenpitävyystason, mukaan lukien mahdolliset
        takuun mukaiset vedenpitävyysväitteet.
    wax_blend_composition:
      name: Vahaseoksen koostumus
      description: Luettelo tuotteessa ja/tai markkinoidussa seostyypissä käytetyistä
        vahamateriaaleista.
    wax_coat_type:
      name: Vahakerroksen tyyppi
      description: Ilmaisee, onko vaha tarkoitettu pohjakerrokseksi, pintakerrokseksi
        vai yleiskäyttöön/yhdeksi kerrokseksi.
    wax_hardness:
      name: Vahan kovuus
      description: Ilmaisee vahan suhteellisen kovuuden, joka vaikuttaa kestävyyteen
        ja luistokykyyn eri lumityypeillä.
    wax_physical_form:
      name: Vahan fyysinen muoto
      description: Ilmaisee fyysisen muodon, jossa kynttilävaha toimitetaan.
    wax_recommended_candle_application:
      name: Vahan suositeltu käyttötapa
      description: Ilmaisee ensisijaisen kynttilän tyylin/tyylit, joille vaha on kehitetty.
    wax_tackiness_level:
      name: Vahan pitävyystaso
      description: Kuvaa vahan terään tuoman tahmeuden/pidon tasoa.
    weapon_system_integration:
      name: Asejärjestelmän integrointi
      description: Ilmaisee, sisältääkö ajoneuvo integroituja asejärjestelmiä tai
        niiden jalustoja.
    weather_suitability:
      name: Soveltuvuus sääolosuhteisiin
      description: Ilmaisee ympäristöolosuhteet, joihin käsineet on suunniteltu, kuten
        kylmä sää tai pelaamiseen märällä säällä.
    weave_finish:
      name: Kudos/pinta
      description: Kuvaa pääasiallista kankaan kudosta tai pintakäsittelyä, joka vaikuttaa
        solmion rakenteeseen ja kiiltoon.
    weave_style:
      name: Kudontatyyli
      description: Määrittää perinteisen panamahatun valmistuksessa käytettävän kudontakuvion,
        joka vaikuttaa hengittävyyteen, joustavuuteen, ulkonäköön ja hintaan.
    weave_type:
      name: Kudostyyppi
      description: Määrittää kankaan kudos-/rakennetyylin (kudoksen kauppanimitys),
        joka vaikuttaa pintakuvioon, kiiltoon ja laskeutumiseen.
    weaving_beater_edge_type:
      name: Kudinkaiteen reunan tyyppi
      description: Ilmoittaa kudinta koskettavan litteän kaidepuun työsärmän profiilin
        (esim. suora vs. sahalaitainen).
    weaving_beater_style:
      name: Pirtan tyyli
      description: Ilmoittaa litteästi kudinkaiteen toiminnallisen tyylin/muodon.
    weaving_shuttle_tip_style:
      name: Kudontasukkulan kärjen tyyli
      description: Määrittää sukkulan kärjen rakenteen, joka vaikuttaa siihen, miten
        sukkula kulkee viriön poikki ja kuinka todennäköisesti se jää kiinni loimilankoihin.
    weaving_shuttle_use_case:
      name: Kudontasukkulan käyttötapa
      description: Määrittää kudontakäytön, jota varten sukkula on suunniteltu tai
        optimoitu.
    webbing_construction_type:
      name: Verkon rakennetyyppi
      description: Kuvaa kankaan fyysistä kudonta- tai punostyyliä, joka vaikuttaa
        käsittelyyn, lujuuteen ja käyttötarkoitukseen.
    webbing_design:
      name: Nauhakudoksen rakenne
      description: Kuvaa sormien välisen verkon tyyliä, joka vaikuttaa vastusharjoitteluun
        ja työntövoimaan.
    weight_adjustability:
      name: Painon säädettävyys
      description: Kuvaa, voiko käyttäjä muuttaa tuotteen vastusta (esim. painopakka
        tai kuormattava) vai onko siinä yksi kiinteä paino.
    weight_integration_system:
      name: Painojen integrointijärjestelmä
      description: Kuvaa, onko painoliiviin integroitu painoja ja miten se on toteutettu
        (esim. irrotettavat painotaskut, ei mitään, valinnainen lisäosa).
    weight_plate_compatibility:
      name: Painolevyjen yhteensopivuus
      description: Määrittää, minkä halkaisijan levypainot laite hyväksyy (olympiakoko,
        standardikoko vai molemmat).
    weight_plate_style:
      name: Levypainojen tyyli
      description: Luokittelee levypainon rakenteen/tyypin (esim. olympia, bumper,
        painopakka) nopeaa yhteensopivuussuodatusta varten.
    weightlifting_belt_style:
      name: Painonnostovyön tyyli
      description: Luokittelee vyön yleisen rakenteen tai käyttötarkoitukseen perustuvan
        kokoonpanon (esim. vipuvyö, dippivyö, kavennettu vyö).
    weightlifting_federation_certification:
      name: Painonnostoliiton sertifiointi
      description: Tuotteen virallinen hyväksyntä tai vaatimustenmukaisuus voimailulajiliittojen,
        kuten IPF:n tai IWF:n, toimesta.
    wetsuit_boot_height:
      name: Märkäpuvun kengän korkeus
      description: Luokittelee kengän varren korkeuden/leikkauksen mukaan, vaikuttaa
        peittoon, liikkuvuuteen ja veden läpäisyyn.
    wetsuit_entry_system:
      name: Märkäpuvun sulkujärjestelmä
      description: Ilmoittaa märkäpuvun pukemiseen käytettävän avaus-/vetoketjujärjestelmän
        tyypin ja sijainnin.
    wetsuit_seam_construction:
      name: Märkäpuvun saumarakenne
      description: Määrittää, miten saumat on tehty ja tiivistetty, mikä vaikuttaa
        lämpimyyteen, joustavuuteen ja kestävyyteen.
    wheat_product_form:
      name: Vehnätuotteen muoto
      description: Määrittää vehnätuotteen fyysisen tai prosessoidun muodon.
    wheel_arrangement:
      name: Pyörästöjärjestys
      description: Määrittää höyryveturin pyöräjärjestyksen (Whyten järjestelmä),
        joka on määrittelevä ominaisuus ja keräilijöiden usein käyttämä hakutermi.
    wheel_brake_type:
      name: Pyörän jarrutyyppi
      description: Tiedot kärryn pyörien jarrujärjestelyistä.
    wheel_chock_grip_features:
      name: Pyöräkiilan pito-ominaisuudet
      description: Pito- ja tartuntaominaisuudet parantavat pitoa pintaa ja rengasta
        vasten.
    wheel_cleaner_acidity_ph_category:
      name: Vanteenpuhdistusaineen happamuus/pH-luokka
      description: Ilmaisee, onko vanteenpuhdistusaine hapan, neutraali vai emäksinen
        (mahdollisesti merkitty pH-arvona).
    wheel_cleaner_formula_type:
      name: Vanteenpuhdistusaineen koostumustyyppi
      description: Tämä ilmaiseen vanteidenpuhdistusaineiden ja niihin liittyvien
        pesuliuosten ensisijaisen koostumusluokan (esim. happopohjainen, hapoton,
        pH-neutraali/tasapainotettu tai rautareaktiivinen).
    wheel_construction_type:
      name: Renkaan rakennetyyppi
      description: Määrittää vanteen valmistusmenetelmän.
    wheel_contaminant_target:
      name: Kohteena oleva vanteen lika
      description: Määrittää ensisijaiset likatyypit, joita puhdistusaine on suunniteltu
        poistamaan.
    wheel_core_type:
      name: Renkaan ytimen tyyppi
      description: Kuvaa vanteen keskiosan rakennetta, joka vaikuttaa painoon, jäykkyyteen
        ja energian välittymiseen.
    wheel_cylinder_inlet_port_thread_standard:
      name: Pyöräsylinterin liitännän kierrestandardi
      description: Määrittää jarruletkun tuloliitännän kierrestandardin pyörän sylinterissä
        (esim. metrinen kuplalaippa vs. käänteinen SAE-laippa).
    wheel_fastener_seat_type:
      name: Pyörän kiinnitysistukan tyyppi
      description: Määrittää vanteeseen sopivan pyöränmutterin/-pultin istukan tyypin
        (esim. kartio/kapeneva, kuula-/säde, litteä, varrellinen mag).
    wheel_illumination:
      name: Pyörän valaistus
      description: Ilmaisee, onko pyörässä sisäänrakennettua valaistusta tai hohto-ominaisuuksia.
    wheel_material:
      name: Pyörän materiaali
      description: Määrittää pyörien pääasiallisen koostumuksen, joka vaikuttaa kestävyyteen,
        pitoon ja tärinänvaimennukseen.
    wheel_profile:
      name: Pyörän profiili
      description: Ilmoittaa renkaan poikkileikkauksen muodon, joka vaikuttaa nopeuteen,
        pitoon ja ajo-ominaisuuksiin.
    wheel_setup_type:
      name: Pyöräkokoonpanon tyyppi
      description: Määrittää luistimissa käytetyn rengaskokoonpanotyylin.
    wheel_system_finish:
      name: Pyöräjärjestelmän pintakäsittely
      description: Vanteiden/pyörien ja tiettyjen pyörien osien/lisävarusteiden pintakäsittely/pinnoite.
    whip_style:
      name: Raipan tyyli
      description: Luokittelee tuotteen sen raippatyylin tai halutun lajin mukaan.
    whipped_cream_base:
      name: Kermavaahdon perusainesosa
