---
th:
  attributes:
    3d_glasses_fit_design:
      name: การออกแบบการสวมใส่แว่น 3D
      description: ระบุวิธีการสวมใส่หรือติดแว่น (เช่น คลิปออน, รอบศีรษะ, สวมทับ)
    3d_glasses_material:
      name: วัสดุที่ใช้ทำแว่นตา 3 มิติ
      description: ระบุวัสดุที่ใช้สำหรับแว่นตา 3 มิติ เช่น ไม้ไผ่หรือสแตนเลส
    3d_glasses_technology:
      name: เทคโนโลยีแว่น 3D
      description: ระบุเทคโนโลยีภาพ 3D/การซิงโครไนซ์ที่แว่นตาได้รับการออกแบบมาโดยเฉพาะ
        โดยกำหนดความเข้ากันได้กับจอแสดงผลหรือโปรเจคเตอร์เฉพาะ
    3d_printer_case_style:
      name: สไตล์เคสเครื่องพิมพ์ 3D
      description: จำแนกประเภทผลิตภัณฑ์โดยรวมเพื่อให้ผู้ซื้อแยกความแตกต่างระหว่างกระเป๋าถืออ่อน
        เคสแข็ง ตู้ครอบแบบติดตั้ง และผ้าคลุมกันฝุ่นธรรมดา
    3d_printer_cleaning_kit_components_included:
      name: ส่วนประกอบชุดทำความสะอาดเครื่องพิมพ์ 3D ที่รวมอยู่
      description: ระบุรายการเครื่องมือและวัสดุสิ้นเปลืองที่มาในชุดเพื่อให้ผู้ซื้อทราบว่าจะได้รับอะไรบ้าง
    3d_printing_resin_type:
      name: ประเภทเรซิ่นสำหรับพิมพ์ 3D
      description: ระบุสูตรหรือการใช้งานเรซิ่นที่กำหนดไว้ ช่วยให้ผู้ซื้อระบุได้อย่างรวดเร็วว่าเรซิ่นนั้นเป็นแบบมาตรฐาน
        เกรดวิศวกรรม แบบหล่อได้ หรือชนิดเฉพาะทางอื่นๆ
    80_plus_efficiency_rating:
      name: มาตรฐานประสิทธิภาพ 80 Plus
      description: แสดงการรับรองมาตรฐานประสิทธิภาพพลังงาน 80 Plus อย่างเป็นทางการที่
        PSU ได้รับ
    abrasive_material:
      name: วัสดุขัด
      description: ระบุประเภทของสารขัดถูที่ใช้ในเครื่องมือขัดกระดาษทราย เช่น เพชรหรือซิลิคอนคาร์ไบด์
    absinthe_style:
      name: สไตล์แอปซินท์
      description: ระบุรูปแบบของอัปแซ็งต์ เช่น ผสม หรือกลั่น
    absinthe_variety:
      name: ลักษณะแอปซินท์
      description: ระบุความแตกต่างของผลิตภัณฑ์อัปแซ็งต์ตามพันธุ์ที่มีเอกลักษณ์เฉพาะตัว
        เช่น Rouge, Verte
    absorbency_level:
      name: ระดับการดูดซึม
      description: ระบุความสามารถในการถูกดูดซึม โดยทั่วไปสำหรับผลิตภัณฑ์ดูแลส่วนบุคคล
        เช่น ตลอดคืน ง่าย
    absorbent_hygiene_product_features:
      name: คุณลักษณะผลิตภัณฑ์สุขอนามัยแบบดูดซับ
      description: ระบุลักษณะพิเศษของผลิตภัณฑ์สุขอนามัย เช่น ป้องกันการรั่วซึมหรือสูตรลดการเกิดอาการแพ้
    academic_level:
      name: ระดับวิชาการ
      description: ระบุระดับวิชาการของเนื้อหาสื่อ เช่น ระดับปริญญาตรี หรือปริญญาเอก
    accessibility_design_features:
      name: คุณสมบัติการออกแบบเพื่อการเข้าถึง
      description: แสดงรายการองค์ประกอบการออกแบบพิเศษที่ช่วยเหลือผู้ใช้ที่มีปัญหาทางการได้ยิน
        การมองเห็น หรือความคล่องตัว
    accessory_material:
      name: วัสดุอุปกรณ์เสริม
      description: ระบุประเภทของวัสดุในเครื่องประดับ ซึ่งโดยทั่วไปใช้ในอุปกรณ์สำหรับจัดส่งสินค้า
        กล่าวคือ พลาสติก กระดาษลัง
    accessory_size:
      name: ขนาดเครื่องประดับ
      description: ระบุขนาดของสินค้าเสริม เช่น ขนาดเดียวใส่ได้หมดหรือขนาดกะทัดรัด
    accordion_tuning:
      name: การปรับเสียงหีบเพลง
      description: ระบุประเภทของการปรับเสียงที่ใช้ในหีบเพลง เช่น ระดับเสียงแบบเปล่าๆ
        หรือระดับเสียงแบบคอนเสิร์ต
    activation_mechanism:
      name: กลไกการเปิดใช้งาน
      description: ระบุวิธีหลักที่ทริกเกอร์สัญญาณเตือน
    activation_method:
      name: วิธีการเปิดใช้งาน
      description: อธิบายถึงวิธีการเปิดใช้งานเครดิตเติมเงินหรือซิมโดยผู้ใช้
    active_ingredient:
      name: ส่วนผสมสำคัญ
      description: ระบุสารหลักในผลิตภัณฑ์ดูแลส่วนบุคคล เช่น วิตามินเอ เรตินอล
    activewear_clothing_features:
      name: คุณลักษณะเสื้อผ้าชุดออกกำลังกาย
      description: ระบุลักษณะเฉพาะของชุดออกกำลังกาย เช่น การออกแบบที่ยืดได้สี่ทิศทางหรือระบายอากาศได้
    activity:
      name: กิจกรรม
      description: ระบุกีฬาหรือกิจกรรมที่สินค้าได้รับการออกแบบมาโดยเฉพาะ เช่น เทนนิสหรือพิลาทิส
    activity_tracker_design:
      name: การออกแบบอุปกรณ์ติดตามกิจกรรม
      description: ระบุวิธีการสวมใส่อุปกรณ์ติดตามกิจกรรม เช่น แบบหนีบ แบบรัดแขน
    acupuncture_model_format:
      name: รูปแบบโมเดลการฝังเข็ม
      description: ระบุขนาดและมาตราส่วนของหุ่นฝังเข็ม เช่น ขนาดเท่าตัวจริง หรือขนาดจิ๋ว
    acupuncture_model_type:
      name: ประเภทโมเดลการฝังเข็ม
      description: 'ระบุส่วนของร่างกายหรือสายพันธุ์ที่ใช้หุ่นแทนในการฝังเข็ม เช่น
        หัว มือ สัตว์ '
    adapter_directionality:
      name: ทิศทางของอะแดปเตอร์
      description: ระบุว่าอะแดปเตอร์รองรับการไหลของสัญญาณในทั้งสองทิศทางหรือเฉพาะทิศทางเดียวที่ระบุเท่านั้น
    adapter_operating_modes:
      name: โหมดการทำงานของอะแดปเตอร์
      description: ระบุว่าอะแดปเตอร์ทำงานเป็นตัวรับบลูทูธ ตัวส่ง หรือทั้งคู่
    adaptive_sync_technology:
      name: เทคโนโลยีการซิงค์แบบปรับตัว
      description: ระบุเทคโนโลยีอัตรารีเฟรชแบบแปรผัน (VRR) ที่จอมอนิเตอร์รองรับเพื่อภาพที่ไม่มีการฉีกขาด
    adc_resolution:
      name: ความละเอียด ADC
      description: ระบุความละเอียด (เป็นบิต) ของตัวแปลงอนาล็อกเป็นดิจิทัลในตัว เพื่อระบุความแม่นยำในการวัด
    additional_animation_software_features:
      name: คุณลักษณะเพิ่มเติมของซอฟต์แวร์แอนิเมชัน
      description: ระบุคุณลักษณะเฉพาะในซอฟต์แวร์แก้ไขภาพเคลื่อนไหว เช่น ภาพเคลื่อนไหวของตัวละครหรือเอฟเฟ็กต์ภาพ
    additional_cleaning_technology:
      name: เทคโนโลยีทำความสะอาดเพิ่มเติม
      description: แสดงรายการเทคโนโลยีทำความสะอาดใดๆ ที่มีอยู่ นอกเหนือจากไอน้ำ (เช่น
        อัลตราโซนิก ยูวี โอโซน)
    additional_design_software_type:
      name: ประเภทซอฟต์แวร์การออกแบบเพิ่มเติม
      description: ระบุความสามารถเพิ่มเติมของซอฟต์แวร์การออกแบบ เช่น ทัวร์เสมือนจริงหรือการออกแบบภูมิทัศน์
    additional_financial_software_features:
      name: คุณลักษณะเพิ่มเติมของซอฟต์แวร์ทางการเงิน
      description: ระบุความสามารถพิเศษของซอฟต์แวร์ทางการเงิน เช่น การจัดการสินทรัพย์หรือการตรวจสอบและการปฏิบัติตามกฎระเบียบ
    additional_graphic_software_features:
      name: คุณลักษณะเพิ่มเติมของซอฟต์แวร์กราฟิก
      description: เน้นความสามารถพิเศษของซอฟต์แวร์กราฟิก เช่น ภาพประกอบแบบดิจิทัลหรือการออกแบบเค้าโครง
    additional_publishing_software_features:
      name: คุณลักษณะเพิ่มเติมของซอฟต์แวร์การเผยแพร่
      description: เน้นฟังก์ชันพิเศษในซอฟต์แวร์การเผยแพร่ เช่น การออกแบบสิ่งพิมพ์หรือสิ่งพิมพ์ดิจิทัล
    additional_security_software_features:
      name: คุณลักษณะเพิ่มเติมของซอฟต์แวร์รักษาความปลอดภัย
      description: ระบุความสามารถพิเศษของซอฟต์แวร์รักษาความปลอดภัย เช่น การเข้ารหัสดิสก์
        การตรวจจับการบุกรุก
    adhesive_application_type:
      name: ประเภทการใช้กาว
      description: ระบุประเภทงานต่อ/ติดขนตาหรือกรณีการใช้งานที่ตั้งใจไว้สำหรับกาว
    adhesive_features:
      name: คุณสมบัติกาว
      description: เน้นคุณสมบัติพิเศษของกาวที่ใช้กับแผ่นแปะหรือเทป
    adhesive_format:
      name: รูปแบบกาว
      description: ระบุรูปแบบทางกายภาพที่กาวถูกจัดหาสำหรับการใช้ซ่อมแซม
    adhesive_strength:
      name: ความแข็งแรงของกาว
      description: ระบุระดับความแข็งแรงของการยึดติดหรือการยกของกาวบนแผ่นติดจมูก (เช่น
        ปกติ แข็งแรงพิเศษ)
    adhesive_type:
      name: ประเภทกาว
      description: ระบุประเภทของกาวที่ใช้ในผลิตภัณฑ์ เช่น กาวแบบนำออกได้หรือติดถาวร
    aftershave_product_form:
      name: รูปแบบผลิตภัณฑ์หลังโกนหนวด
      description: ระบุระดับความเหนียวข้นของผลิตภัณฑ์หลังการโกน เช่น บาล์มหรือครีม
    age_group:
      name: กลุ่มอายุ
      description: ระบุช่วงอายุเป้าหมายสำหรับสินค้า เช่น ผู้ใหญ่หรือเด็ก
    age_restrictions:
      name: ข้อจำกัดด้านอายุ
      description: ระบุข้อกำหนดอายุขั้นต่ำสำหรับผลิตภัณฑ์หรือกิจกรรม เช่น อายุ 18
        ปีขึ้นไป
    ai_application:
      name: แอปพลิเคชัน AI
      description: ระบุฟังก์ชันของ AI ในซอฟต์แวร์ เช่น การวิเคราะห์เชิงคาดการณ์ หรือการรู้จำคำพูด
    air_freshener_form:
      name: รูปแบบน้ำหอมปรับอากาศ
      description: ระบุประเภทของน้ำหอมปรับอากาศในรถยนต์ เช่น น้ำมัน คลิปหนีบช่องแอร์
    air_fryer_functions:
      name: ฟังก์ชันของหม้อทอดไร้น้ำมัน
      description: แสดงรายการโหมดการปรุงอาหารต่างๆ ที่มีในหม้อทอดไร้น้ำมันหรือเครื่องใช้ไฟฟ้าที่คล้ายกัน
        เช่น ทอดไร้น้ำมัน อบ
    air_mattress_features:
      name: คุณลักษณะของที่นอนลม
      description: อธิบายลักษณะเฉพาะของที่นอนลม เช่น สูบลมได้ง่ายหรือทนต่อการแตกรั่วซึม
    air_tube_configuration:
      name: การกำหนดค่าท่ออากาศ
      description: ระบุจำนวนหรือรูปแบบของท่อสูบลมที่ประสานเข้ากับปลอก
    airbrush_feed_type:
      name: ประเภทฟีดของแอร์บรัช
      description: ระบุวิธีการส่งสีด้วยแอร์บรัช เช่น แรงโน้มถ่วงหรือกาลักน้ำ
    airbrush_operation_method:
      name: วิธีการใช้งานแอร์บรัช
      description: ระบุรูปแบบการทำงานของแปรงพ่นสี เช่น ใช้งานได้รูปแบบเดียว หรือ ใช้งานได้สองรูปแบบ
    aircraft_engine_configuration:
      name: โครงร่างเครื่องยนต์ของเครื่องบิน
      description: ระบุจำนวนเครื่องยนต์ที่ใช้ขับเคลื่อนเครื่องบิน เช่น หนึ่งเครื่องหรือสองเครื่อง
    aircraft_engine_type:
      name: ชนิดเครื่องยนต์เครื่องบิน
      description: ระบุชนิดของเครื่องยนต์ที่ใช้ขับเคลื่อนเครื่องบิน เช่น เครื่องยนต์เจ็ท
        หรือ เครื่องยนต์เทอร์โบพร็อพ
    airflow_opening_design:
      name: การออกแบบช่องเปิดการไหลของอากาศ
      description: อธิบายการกำหนดค่าการหายใจหรือการระบายอากาศที่สร้างไว้ในยางคาด
    airsoft_equipment_included:
      name: รวมอุปกรณ์ปืนพ่นสี
      description: ระบุอุปกรณ์เพิ่มเติมที่มาพร้อมกับผลิตภัณฑ์ปืนอัดลม เช่น แว่นตาป้องกันหรือเสื้อเกราะป้องกัน
    album_type:
      name: ประเภทอัลบั้ม
      description: อธิบายลักษณะการเข้าเล่มของสมุดภาพหรือสมุดสะสมแสตมป์ เช่น แบบสันกระดูกงู
        แบบสมุดติดรูป
    alcohol/solvent_content:
      name: ปริมาณแอลกอฮอล์/ตัวทำละลาย
      description: จำแนกประเภทผลิตภัณฑ์ตามปริมาณแอลกอฮอล์หรือตัวทำละลายเพื่อวัตถุประสงค์ในการจัดส่งและการควบคุม
        (เช่น แอลกอฮอล์ ≤24%, แอลกอฮอล์ >24%, ภาชนะใส่ตัวทำละลายขนาดเล็ก)
    alcohol_content:
      name: ปริมาณแอลกอฮอล์
      description: ระบุว่าโทนเนอร์ปราศจากแอลกอฮอล์หรือไม่ หรือหากมี สูตรมีแอลกอฮอล์ประมาณเท่าใด
    alert_type:
      name: ประเภทการแจ้งเตือน
      description: ระบุประเภทของการแจ้งเตือนที่ผลิตภัณฑ์มีให้ เช่น เสียงเตือนหรือการแจ้งเตือนของสมาร์ทโฟน
    allergen_information:
      name: ข้อมูลสารก่อภูมิแพ้
      description: ระบุสารก่อภูมิแพ้ที่อาจเกิดขึ้นได้ในอาหารหรือเครื่องดื่ม เช่น ข้าวสาลีหรือถั่วลิสง
    allergen_test_type:
      name: ประเภทการทดสอบสารก่อภูมิแพ้
      description: ระบุประเภทสารก่อภูมิแพ้ที่ชุดทดสอบออกแบบมาเพื่อตรวจจับ เช่น ในอาหารหรือสิ่งแวดล้อม
    allergens:
      name: สารก่อภูมิแพ้
      description: ระบุสารก่อภูมิแพ้ที่อาจเกิดขึ้นในผลิตภัณฑ์เพื่อสุขภาพและความงาม
        เช่น ลินาลูล หรือ ลิโมนีน
    allergy_friendly_features:
      name: คุณลักษณะที่ไม่ก่อให้เกิดภูมิแพ้
      description: ระบุว่าผลิตภัณฑ์มีคุณสมบัติป้องกันการแพ้หรือไม่ เช่น ไม่มีส่วนผสมของยางธรรมชาติหรือป้องกันเชื้อรา
    amino_acid_subtype:
      name: ชนิดย่อยของกรดอะมิโน
      description: ระบุประเภทหรือโปรไฟล์หลักของกรดอะมิโนที่อยู่ในอาหารเสริม
    amplifier/booster_suitable_location:
      name: ตำแหน่งที่ตั้งที่เหมาะสมของเครื่องขยายเสียง/บูสเตอร์
      description: ระบุตำแหน่งที่ดีที่สุดสำหรับเครื่องขยายเสียงหรือเครื่องขยายสัญญาณ
        เช่น ยานพาหนะหรือสถานที่จัดงานขนาดใหญ่
    amplifier_class:
      name: คลาสเครื่องขยายเสียง
      description: ระบุประเภทของแอมพลิฟายเออร์ เช่น AB หรือ D
    amplifier_configuration:
      name: การกำหนดค่าเครื่องขยายเสียง
      description: ระบุการตั้งค่าแอมพลิฟายเออร์ของยานยนต์ เช่น สองแชนเนลหรือสี่แชนเนล
    amputation_level:
      name: ระดับการตัดอวัยวะ
      description: แสดงระดับการตัดอวัยวะที่ผ้ารัดลดบวมได้รับการออกแบบมาโดยเฉพาะ
    analyte_measured:
      name: สารที่วัด
      description: ระบุไบโอมาร์กเกอร์ที่สารละลายควบคุมให้การสอบเทียบ
    anamorphic_squeeze_ratio:
      name: อัตราส่วนการบีบแบบอะนามอร์ฟิก
      description: ระบุปัจจัยการบีบอัดแนวนอนของเลนส์อะนามอร์ฟิก ช่วยให้ผู้ใช้สามารถจับคู่เลนส์กับเอาต์พุตการบีบที่ต้องการได้
    anatomical_detail_displayed:
      name: รายละเอียดกายวิภาคที่แสดง
      description: ระบุว่าคุณสมบัติกายวิภาคหรือเส้นเมอริเดียนใดถูกเน้นบนโมเดล
    anchor_type:
      name: ประเภทที่ยึด
      description: ระบุสมอที่ใช้ในอุปกรณ์กีฬาทางน้ำแบบลาก เช่น แบบแมงดาหรือแบบไถ
    anemometer_application:
      name: การใช้งานเครื่องวัดความเร็วลม
      description: ระบุวัตถุประสงค์การใช้งานเครื่องวัดความเร็วลม เช่น เชิงอุตสาหกรรมหรืออุตุนิยมวิทยา
    angles_supported:
      name: มุมที่รองรับ
      description: ระบุช่วงของมุมที่ผลิตภัณฑ์สามารถรองรับได้ โดยทั่วไปสำหรับอุปกรณ์อิเล็กทรอนิกส์
        เช่น ปรับได้, 0° ถึง 180°
    angling_style:
      name: สไตล์การตกปลา
      description: ระบุเทคนิคการตกปลาที่ผลิตภัณฑ์ได้รับการออกแบบมาใช้ เช่น แบบเซิร์ฟแคสติ้งหรือแบบฟลายฟิชชิ่ง
    animal_feed_form:
      name: รูปแบบอาหารสัตว์
      description: ระบุรูปแบบของอาหารสัตว์ เช่น ของเหลวหรือเม็ด
    animal_type:
      name: ประเภทสัตว์
      description: ระบุประเภทของสัตว์ที่ต้องการให้นำผลิตภัณฑ์มาใช้ เช่น เป็ด กวาง
        หรือสุนัข
    answering_machine_type:
      name: ประเภทเครื่องตอบรับโทรศัพท์
      description: ระบุการมีอยู่และเทคโนโลยีของเครื่องตอบรับโทรศัพท์ในตัว
    antenna_connector_type:
      name: ประเภทขั้วต่อเสาอากาศ
      description: ระบุขั้วต่อ RF ที่ใช้เพื่อติดตั้งเสาอากาศภายนอก
    antenna_rf_connector_type:
      name: ประเภทขั้วต่อ RF ของเสาอากาศ
      description: ระบุขั้วต่อ RF ที่เสาอากาศใช้
    antenna_type:
      name: ประเภทเสาอากาศ
      description: ระบุประเภทของเสาอากาศสำหรับอุปกรณ์อิเล็กทรอนิกส์ เช่น แบบรอบทิศทาง
        แบบกริด
    anti_agin_skin_care_type:
      name: ประเภทผลิตภัณฑ์บำรุงผิวลดเลือนริ้วรอย
      description: จำแนกประเภทผลิตภัณฑ์ดูแลผิวเพื่อการลดเลือนริ้วรอย เช่น มาสก์ โทนเนอร์
    anti_perspirant_strength_level:
      name: ระดับความแรงของสารระงับเหงื่อ
      description: แสดงการจำแนกประสิทธิภาพของสารระงับเหงื่อ (เช่น ความแรงทางคลินิก
        ความแรงสำหรับกีฬา)
    antibody_class_tested:
      name: คลาสแอนติบอดีที่ทดสอบ
      description: ระบุอิมมูโนโกลบูลินหรือไบโอมาร์กเกอร์ที่ชุดตรวจจับ (เช่น IgE, IgG4)
    antifreeze_type:
      name: ประเภทสารป้องกันการแข็งตัว
      description: ระบุประเภทของสารป้องกันการแข็งตัวสำหรับการบำรุงรักษายานพาหนะ เช่น
        สารเข้มข้น แบบเจือจางล่วงหน้า
    antique_car_design:
      name: การออกแบบรถยนต์โบราณ
      description: อธิบายสไตล์การออกแบบหลักของรถโบราณ เช่น รถรุ่น T-bucket หรือ Grand
        Tourer
    antique_vehicle_era:
      name: ยุคยานพาหนะโบราณ
      description: บรรยายถึงช่วงเวลาทางประวัติศาสตร์ของยานพาหนะโบราณ เช่น ยุคทองเหลือง
        หรือ ยุควินเทจ
    appliance_board_function:
      name: ฟังก์ชันบอร์ดเครื่องใช้ไฟฟ้า
      description: ระบุบทบาทการทำงานของบอร์ดภายในเครื่องใช้ไฟฟ้า
    appliance_unit_location:
      name: ตำแหน่งหน่วยเครื่องใช้ไฟฟ้า
      description: ระบุส่วนทางกายภาพของเครื่องใช้ไฟฟ้าที่กำหนดให้นำแผงวงจรนี้ไปใช้
        (เช่น ชิ้นส่วนภายในหรือภายนอก)
    application_area:
      name: พื้นที่ใช้งาน
      description: ระบุส่วนของร่างกายหรือบริเวณที่ทาผลิตภัณฑ์ เช่น ริมฝีปาก ทั้งตัว
    application_method:
      name: วิธีใช้งาน
      description: ระบุวิธีการใช้ผลิตภัณฑ์ เช่น เจล ของเหลว สเปรย์
    application_type:
      name: ประเภทการใช้งาน
      description: ระบุว่าการรักษาถูกทิ้งไว้หรือล้างออกและโหมดการใช้งานพิเศษใดๆ
    applicator_format:
      name: รูปแบบอุปกรณ์ทา
      description: อธิบายรูปแบบหรือสไตล์ทางกายภาพของอุปกรณ์ทาโลชั่นหรือครีมกันแดด
    applicator_material:
      name: วัสดุอุปกรณ์
      description: ระบุวัสดุที่ใช้ในอุปกรณ์ โดยทั่วไปสำหรับผ้าอนามัยแบบสอด เช่น พลาสติก
        กระดาษแข็ง
    applicator_type:
      name: ประเภทอุปกรณ์
      description: ระบุประเภทของอุปกรณ์ที่รวมมาพร้อมกับอนามัยแบบสอด เช่น อุปกรณ์ช่วยใส่หรือแบบไม่ใช้อุปกรณ์
    applique/patch_shape:
      name: รูปร่างของศิลปะการปะติด/แผ่นแปะ
      description: อธิบายรูปแบบของงานตัดปะผ้าหรือแผ่นปะติดเสื้อผ้า เช่น สัตว์หรือเรขาคณิต
    applique_shape:
      name: รูปร่างของศิลปะการปะติด
      description: อธิบายรูปทรงของงานปะติด เช่น ลายดอกไม้หรือสัตว์
    aquarium_filter_features:
      name: คุณลักษณะระบบกรองตู้ปลา
      description: อธิบายคุณลักษณะพิเศษของระบบกรองตู้ปลา เช่น เปลี่ยนไส้กรองได้เร็ว
        การกรองแบบหลายขั้นตอน
    aquarium_light_spectrum:
      name: แสงสเปกตรัมในพิพิธภัณฑ์สัตว์น้ำ
      description: ระบุประเภทของสเปกตรัมแสงสำหรับแสงในตู้ปลา เช่น แสงสีฟ้า แสงกลางวัน
    aquarium_overflow_box_design:
      name: การออกแบบกล่องโอเวอร์โฟลว์ตู้ปลา
      description: อธิบายรูปแบบการติดตั้งของกล่องกรองตู้ปลา เช่น ภายนอกหรือแบบแขวน
    archery_activity:
      name: กิจกรรมยิงธนู
      description: ระบุประเภทของกิจกรรมยิงธนู เช่น การล่าสัตว์กลางแจ้ง การฝึกซ้อมเป้า
    archery_equipment_included:
      name: รวมอุปกรณ์ยิงธนู
      description: ระบุอุปกรณ์เสริมสำหรับการยิงธนูที่มีให้ เช่น ชุดถ่วง ลูกธนู Safety
        Glass
    archery_style:
      name: สไตล์การยิงธนู
      description: ระบุประเภทการยิงธนูที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ เช่น การยิงธนูเป้าบิน
        การยิงธนูล่าสัตว์
    archery_target_type:
      name: ประเภทของเป้ายิงธนู
      description: ระบุประเภทของเป้าธนูที่ออกแบบมาสำหรับการฝึกยิงธนูที่แตกต่างกัน
        เช่น เป้า 3 มิติ เป้ากระเป๋า
    aromatherapy:
      name: สุคนธบำบัด
      description: ระบุกลิ่นหรือน้ำมันหอมระเหยที่ใช้ เช่น ยูคาลิปตัส ลาเวนเดอร์
    arrangement:
      name: การเรียบเรียง
      description: ระบุวิธีการจัดหรือนำเสนอดอกไม้ เช่น แจกัน ตะกร้า
    arrow/bolt_material:
      name: วัสดุสำหรับลูกธนู/โบลต์
      description: ระบุวัสดุที่ใช้สร้างลูกธนูหรือลูกศร เช่น อะลูมิเนียมหรือไม้ไผ่
    arrow_fletching_material:
      name: วัสดุสำหรับปีกลูกธนู
      description: ระบุวัสดุที่ใช้ทำปีกลูกธนูธนู เช่น วัสดุสังเคราะห์หรือพลาสติก
    arrow_material:
      name: วัสดุสำหรับลูกธนู
      description: ระบุองค์ประกอบของลูกศร เช่น ไม้ไผ่หรือไฟเบอร์กลาส
    art/crafting_tool_material:
      name: วัสดุของเครื่องมือสำหรับงานศิลปะ/หัตถกรรม
      description: ระบุวัสดุหลักของงานศิลปะหรือเครื่องมือประดิษฐ์ เช่น ไม้หรือโลหะ
    art_fixative_application_method:
      name: วิธีการใช้สเปรย์เคลือบผลงานศิลปะ
      description: อธิบายวิธีการใช้น้ำเคลือบงานศิลปะ เช่น สเปรย์หรือทาด้วยแปรง
    art_movement:
      name: ความเคลื่อนไหวทางศิลปะ
      description: กำหนดแนวทางเชิงสไตล์ความเคลื่อนไหวทางศิลปะของงานจิตรกรรม เช่น อิมเพรสชันนิสม์
        เอ็กซ์เพรสชันนิสม์
    art_style:
      name: สไตล์ศิลปะ
      description: อธิบายสไตล์สุนทรียศาสตร์ของผลิตภัณฑ์ เช่น นวศิลป์หรืออักษรศิลป์
    artwork_authenticity:
      name: ความถูกต้องของงานศิลปะ
      description: ระบุถึงความแท้จริงของผลงานศิลปะ โดยระบุว่าเป็นผลงานสร้างสรรค์ดั้งเดิมหรือผลงานเลียนแบบ
    artwork_frame_material:
      name: วัสดุของกรอบงานศิลปะ
      description: ระบุวัสดุที่ใช้ในกรอบงานศิลปะ เช่น ไม้หรือเคลือบทอง
    artwork_type:
      name: สไตล์งานศิลปะ
      description: ระบุสไตล์ของงานศิลปะดิจิทัล เช่น ตัวพิมพ์หรือการวาดภาพดิจิทัล
    assisted_braking_technology:
      name: เทคโนโลยีช่วยเบรก
      description: ระบุประเภทของตัวช่วยหยุดเชือกในอุปกรณ์มัดเชือก เช่น แบบแอคทีฟ แบบแพสซีฟ
    attachment_method:
      name: วิธีการแนบ
      description: ระบุวิธีการติดหรือยึดผลิตภัณฑ์ เช่น ตีนตุ๊กแก คลิปออน
    attachment_options:
      name: ตัวเลือกการแนบ
      description: ระบุวิธีการติดหรือยึดสินค้า เช่น สายคล้อง
    attachment_type:
      name: ประเภทการแนบ
      description: ระบุวิธีการติดตั้งหรือเชื่อมต่อผลิตภัณฑ์ เช่น Snap-on หรือ ตะขอและห่วง
    atv/off_road_tire_type:
      name: ประเภทยางรถเอทีวี/ออฟโรด
      description: ระบุการใช้งานเฉพาะของยาง ATV หรือยางออฟโรด เช่น ลุยทรายหรือโคลน
    audio/scan_converter_features:
      name: คุณลักษณะตัวแปลงเสียง/รูปแบบสัญญาณ
      description: อธิบายความสามารถของอุปกรณ์แปลงสัญญาณเสียง/รูปแบบสัญญาณ เช่น การแปลงอัตโนมัติหรือรีโมทคอนโทรล
    audio/video_cable_connector_type_end_a:
      name: ประเภทขั้วต่อสายเคเบิลเสียง/วิดีโอ (ปลาย A)
      description: ระบุขั้วต่อหรืออินเทอร์เฟซที่แน่นอนที่อยู่บนปลายแรก (ปลาย A) ของสายเคเบิล
    audio/video_cable_connector_type_end_b:
      name: ประเภทขั้วต่อสายเคเบิลเสียง/วิดีโอ (ปลาย B)
      description: ระบุขั้วต่อหรืออินเทอร์เฟซที่แน่นอนที่อยู่บนปลายที่สอง (ปลาย B)
        ของสายเคเบิล
    audio_bypass_type:
      name: ประเภทบายพาสเสียง
      description: ระบุวิธีการเดินสัญญาณเสียงเมื่อปิดเอฟเฟกต์ (เช่น ทรูบายพาส บัฟเฟอร์
        รีเลย์)
    audio_cassette_tape_type:
      name: ประเภทเทปคาสเซ็ตเสียง
      description: ระบุสูตรเทป IEC (ไบอัส) สำหรับคาสเซ็ตเสียง
    audio_codecs/formats_supported:
      name: รองรับตัวแปลงสัญญาณเสียง/รูปแบบ
      description: ระบุประเภทไฟล์เสียงที่ผลิตภัณฑ์สามารถเล่นได้ เช่น WAVE หรือ MP3
    audio_component_form_factor:
      name: รูปแบบของส่วนประกอบเสียง
      description: กำหนดสไตล์ทางกายภาพหรือรูปแบบการติดตั้งของส่วนประกอบ
    audio_connectivity:
      name: การเชื่อมต่อเสียง
      description: ระบุประเภทการเชื่อมต่อระบบเสียงที่ผลิตภัณฑ์รองรับ เช่น HDMI หรือ
        USB
    audio_conversion_direction:
      name: ทิศทางการแปลงเสียง
      description: ระบุการไหลของสัญญาณที่ตัวแปลงรองรับ (เช่น อนาล็อกเป็นดิจิทัล, ดิจิทัลเป็นอนาล็อก,
        สองทิศทาง)
    audio_converter_features:
      name: คุณลักษณะตัวแปลงเสียง
      description: สรุปคุณลักษณะหลักของอุปกรณ์แปลงสัญญาณเสียง เช่น ขับเคลื่อนด้วย
        AI หรือรองรับระบบอนาล็อก
    audio_d/a_converter_dac:
      name: ตัวแปลงสัญญาณเสียง D/A (Dac)
      description: ระบุประเภทของตัวแปลงดิจิทัลเป็นอนาล็อก (DAC) ในอุปกรณ์เสียง เช่น
        USB ออปติคอล
    audio_duplex_capability:
      name: ความสามารถดูเพล็กซ์เสียง
      description: ระบุว่าอุปกรณ์รองรับการสื่อสารเสียงแบบฟูลดูเพล็กซ์ (สองทางพร้อมกัน)
        หรือฮาล์ฟดูเพล็กซ์
    audio_mixer_type:
      name: ประเภทมิกเซอร์เสียง
      description: ระบุประเภทของเครื่องมิกซ์เสียง เช่น อนาล็อกหรือสตรีมมิ่ง
    audio_output_channel:
      name: ช่องสัญญาณเอาท์พุตเสียง
      description: ระบุจำนวนช่องสัญญาณหรือการกำหนดค่าลำโพงที่ระบบเสียงสามารถส่งออกไปได้
        เช่น 2 หรือ 5.1
    audio_output_format:
      name: รูปแบบเอาท์พุตเสียง
      description: ระบุคุณภาพและประเภทเสียงที่สร้างโดยอุปกรณ์เสียง เช่น ดิจิทัลหรืออนาล็อก
    audio_player/recorder_features:
      name: คุณลักษณะเครื่องเล่นเสียง/เครื่องบันทึก
      description: ระบุความสามารถเฉพาะของเครื่องเล่นเสียงหรือเครื่องบันทึก เช่น การเล่น
        MP3 หรือการควบคุมด้วยเสียง
    audio_purpose:
      name: วัตถุประสงค์ด้านเสียง
      description: ระบุการใช้งานหรือตำแหน่งที่กำหนดไว้สำหรับผลิตภัณฑ์เครื่องเสียง
        เช่น เครื่องเสียงรถยนต์หรือโฮมเธียเตอร์
    audio_return_channel_support:
      name: การรองรับช่องส่งคืนเสียง
      description: ระบุว่าอุปกรณ์รองรับการส่งผ่าน ARC หรือ eARC สำหรับการส่งเสียง
        จากจอแสดงผลกลับไปยัง AVR หรือซาวด์บาร์หรือไม่
    audio_signal_configuration:
      name: การกำหนดค่าสัญญาณเสียง
      description: ระบุว่าสายเคเบิลส่งเสียงแบบโมโน สเตอริโอ บาลานซ์ หรือมัลติแชนเนล
        (เช่น TRRS, ดิจิทัล)
    audio_system:
      name: ระบบเสียง
      description: กำหนดระบบเล่น/บันทึกเสียงที่ VCR รองรับ (เช่น สเตอริโอ Hi-Fi, โมโน)
    audio_technology:
      name: เทคโนโลยีเสียง
      description: ระบุเทคโนโลยีที่ใช้ในอุปกรณ์เสียง เช่น AAC หรือ Dolby Atmos
    authentication_technology:
      name: เทคโนโลยีการยืนยันตัวตน
      description: ระบุวิธีการรักษาความปลอดภัยที่ใช้ในเทคโนโลยีการยืนยันตัวตน เช่น
        ระบบไบโอเมตริก แบบใช้การ์ด
    authenticity:
      name: ของแท้
      description: ระบุความเป็นต้นฉบับของสินค้า เช่น ของแท้ ของเลียนแบบ
    auto_focusing_modes:
      name: โหมดโฟกัสอัตโนมัติ
      description: ระบุประเภทของระบบโฟกัสอัตโนมัติในกล้อง เช่น เฉพาะจุดหรือติดตามวัตถุ
    autoclave_sterilization_method:
      name: วิธีการฆ่าเชื้อด้วยหม้อนึ่งความดัน
      description: ระบุเทคนิคการฆ่าเชื้อที่ใช้ในหม้อนึ่งฆ่าเชื้อโรค เช่น ไอน้ำหรือใช้ความร้อนแห้ง
    autograph_type:
      name: ประเภทลายเซ็นต์
      description: ระบุหมวดหมู่ของสิ่งของที่มีลายเซ็น เช่น กีฬาหรือดนตรี
    automation:
      name: การดำเนินการอัตโนมัติ
      description: อธิบายระดับของการทำงานอัตโนมัติในเครื่องบรรจุภัณฑ์ เช่น แบบแมนนวลหรือแบบอัตโนมัติ
    award_design:
      name: การออกแบบรางวัล
      description: อธิบายรูปแบบหรือธีมของรางวัลหรือใบรับรอง เช่น ทันสมัยหรือเป็นทางการ
    award_occasion:
      name: โอกาสรับรางวัล
      description: ระบุวัตถุประสงค์ของรางวัล เช่น การให้ความสำคัญกับพนักงานหรือผลสัมฤทธิ์ทางการเรียน
    awning_construction_type:
      name: ประเภทการก่อสร้างกันสาด
      description: ระบุรูปแบบการติดตั้งกันสาด เช่น พับเก็บหรือยึดตายตัว
    awning_design:
      name: การออกแบบกันสาด
      description: อธิบายรูปทรงหรือลักษณะของกันสาด เช่น แบบเรียบหรือแบบโค้ง
    baby/toddler_car_seat_features:
      name: คุณลักษณะคาร์ซีทสำหรับทารก/เด็กเล็ก
      description: เน้นคุณลักษณะที่สำคัญของคาร์ซีทสำหรับทารก/เด็กเล็ก เช่น สายยึดโยง
        5 จุดหรือระบบป้องกันการกระแทกด้านข้าง
    baby/toddler_clothing_features:
      name: คุณลักษณะเสื้อผ้าเด็กทารก/เด็กเล็ก
      description: เน้นคุณลักษณะพิเศษของเสื้อผ้าทารก/เด็กเล็ก เช่น ขอบเอวปรับได้หรือป้องกันรังสียูวี
    baby/toddler_equipment_safety_features:
      name: คุณลักษณะด้านความปลอดภัยของอุปกรณ์สำหรับทารก/เด็กเล็ก
      description: ระบุฟีเจอร์การป้องกันในอุปกรณ์สำหรับทารกหรือเด็กเล็ก เช่น ฐานกันลื่น
    baby/toddler_furniture_features:
      name: คุณลักษณะของเฟอร์นิเจอร์สำหรับทารก/เด็กเล็ก
      description: ระบุคุณลักษณะพิเศษของเฟอร์นิเจอร์สำหรับทารก/เด็กเล็ก เช่น ปรับความสูงได้หรือแบบพับได้
    baby/toddler_furniture_items_included:
      name: รวมเฟอร์นิเจอร์สำหรับทารก/เด็กเล็ก
      description: ระบุประเภทของเฟอร์นิเจอร์สำหรับทารกหรือเด็กเล็กที่รวมอยู่ในชุดผลิตภัณฑ์
        เช่น เก้าอี้ทรงสูง หีบใส่ของเล่น
    baby/toddler_hat_style:
      name: สไตล์หมวกสำหรับทารกและเด็กเล็ก
      description: อธิบายสไตล์หมวกสำหรับทารกหรือเด็กเล็ก เช่น หมวกบักเก็ตหรือหมวกกันแดด
    baby/toddler_hosiery_style:
      name: สไตล์เครื่องถุงเท้าสำหรับทารก/เด็กเล็ก
      description: อธิบายสไตล์ของถุงเท้าหรือกางเกงรัดรูปสำหรับทารกหรือเด็กเล็ก เช่น
        ถุงเท้าข้อสั้นหรือกางเกงรัดรูป
    baby/toddler_seat_features:
      name: คุณลักษณะที่นั่งสำหรับทารก/เด็กเล็ก
      description: คุณลักษณะสำคัญของที่นั่งสำหรับทารก/เด็กเล็ก เช่น เบาะนั่งหรือถาดปรับเอนได้
    baby/toddler_sleepwear_style:
      name: สไตล์ชุดนอนทารก/เด็กเล็ก
      description: อธิบายการออกแบบชุดนอนของทารกหรือเด็กเล็ก เช่น ชุดคลุมเท้าหรือชุดหมี
    baby_drink_packaging:
      name: บรรจุภัณฑ์เครื่องดื่มสำหรับทารก
      description: ระบุประเภทภาชนะสำหรับเครื่องดื่มสำหรับทารก เช่น กล่อง ขวด
    baby_equipment_safety_features:
      name: คุณลักษณะด้านความปลอดภัยของอุปกรณ์สำหรับทารก
      description: ระบุประเด็นด้านความปลอดภัยของอุปกรณ์สำหรับเด็ก เช่น สายยึดโรง 3
        จุดหรือมีฐานกันลื่น
    baby_food_flavor:
      name: รสชาติอาหารทารก
      description: ระบุโปรไฟล์รสชาติของผลิตภัณฑ์อาหารทารก เช่น ถั่วเขียวหรือกล้วย
    baby_formula_format:
      name: รูปแบบสูตรทารก
      description: ระบุสถานะการเตรียมนมผงสูตรสำหรับทารก เช่น ผงแห้งหรือพร้อมบริโภค
    baby_gift_items_included:
      name: รวมรายการของขวัญเด็กทารก
      description: ให้รายละเอียดส่วนประกอบในแพ็คเกจของขวัญสำหรับทารก เช่น หนังสือหรือยางกัด
    baby_health_items_included:
      name: รวมรายการสินค้าเพื่อสุขภาพทารก
      description: ระบุรายการที่รวมอยู่ในชุดอุปกรณ์ดูแลเด็กทารก เช่น กรรไกรตัดเล็บหรือเทอร์โมมิเตอร์
    baby_monitor_features:
      name: คุณลักษณะของเครื่องเบบี้มอนิเตอร์
      description: อธิบายความสามารถของเครื่องเบบี้มอนิเตอร์ เช่น การสื่อสารสองทางหรือการตรวจวัดอุณหภูมิ
    baby_snack_flavor:
      name: รสชาติของว่างสำหรับทารก
      description: ระบุลักษณะรสชาติของขนมสำหรับทารก เช่น ผลไม้ ผัก
    baby_snack_texture:
      name: เนื้อสัมผัสของว่างสำหรับทารก
      description: อธิบายลักษณะหรือความสม่ำเสมอของขนมสำหรับทารก เช่น แบบนุ่ม แบบพอง
    back_type:
      name: ประเภทส่วนท้าย
      description: ระบุรูปแบบของพนักพิงหลังบนเบาะนั่ง เช่น ไม่มีพนักพิงหลังหรือพนักพิงหลังต่ำ
    backboard_material:
      name: วัสดุแป้นบาสเกตบอล
      description: ระบุวัสดุก่อสร้างของแป้นของเกม ซึ่งส่งผลต่อประสิทธิภาพการเด้ง ความทนทาน
        และต้นทุน
    background_design:
      name: การออกแบบพื้นหลัง
      description: อธิบายการออกแบบภาพหรือลวดลายบนพื้นหลังของสตูดิโอ เช่น แบบพิมพ์หรือโครมาคีย์
    backing_color:
      name: สีพื้นหลัง
      description: ระบุสีของด้านหลังหรือด้านล่างของผลิตภัณฑ์ เช่น สีเบจหรือสีดำ
    backing_material:
      name: วัสดุแผ่นรองรับ
      description: ระบุวัสดุที่ใช้ด้านหลังของผลิตภัณฑ์จำพวกอุปกรณ์สำหรับขัดกระดาษทราย
        เช่น โพลีเอสเตอร์ พีวีซี
    backing_pattern:
      name: ลวดลายพื้นหลัง
      description: ระบุลวดลายที่ด้านหลังของผลิตภัณฑ์ โดยทั่วไปแล้วใช้กับอุปกรณ์สำหรับขัดกระดาษทราย
        เช่น แอบสแตรกต์ ข้อความ
    backlighting_type:
      name: ประเภทแบ็คไลท์
      description: อธิบายรูปแบบแสงสว่างที่ให้มาบนคีย์บอร์ดหรือเมาส์ที่รวมอยู่
    backrest_type:
      name: ประเภทพนักพิง
      description: ระบุวัสดุหรือรูปแบบของพนักพิงเก้าอี้ เช่น ตาข่าย บุนวม
    backrest_upholstery_color:
      name: วัสีเบาะพนักพิง
      description: ระบุสีของเบาะพนักพิงบนเฟอร์นิเจอร์ เช่น สีเบจหรือสีน้ำเงิน
    backrest_upholstery_material:
      name: วัสดุสำหรับหุ้มเบาะพนักพิง
      description: ระบุประเภทสิ่งทอบนพนักพิงเฟอร์นิเจอร์ เช่น ผ้ากำมะหยี่หรือหวาย
    backrest_upholstery_pattern:
      name: ลวดลายเบาะพนักพิง
      description: ระบุลวดลายบนผ้าพนักพิงของโซฟา เช่น ลายทาง ลายตารางหมากรุก
    bag/case_closure:
      name: ที่ปิดกระเป๋า/ฝาครอบ
      description: ระบุประเภทของตัวล็อกที่ใช้กับกระเป๋าหรือกล่อง เช่น ตัวล็อกแบบกุญแจ
        ตีนตุ๊กแก
    bag/case_features:
      name: คุณลักษณะกระเป๋า/เคส
      description: อธิบายลักษณะเฉพาะของกระเป๋าหรือเคส เช่น กันน้ำหรือน้ำหนักเบา
    bag/case_material:
      name: วัสดุสำหรับกระเป๋า/เคส
      description: ระบุวัสดุหลักที่ใช้ในกระเป๋าหรือเคส เช่น หนังหรือผ้าใบ
    bag/case_storage_features:
      name: คุณลักษณะการจัดเก็บสำหรับกระเป๋า/เคส
      description: ระบุองค์ประกอบพื้นที่ใส่ของที่เป็นเอกลักษณ์ในกระเป๋าหรือกล่อง เช่น
        ช่องแบ่งแบบปรับได้หรือช่องกระเป๋าด้านนอก
    bag_closure:
      name: การปิดกระเป๋า
      description: อธิบายวิธีการยึดกระเป๋า กล่าวคือ เชือกรูด หัวเข็มขัด
    bag_strap_type:
      name: ประเภทสายรัดกระเป๋า
      description: ระบุประเภทของสายกระเป๋า เช่น สะพายข้างหรือสะพายไหล่
    bag_style:
      name: สไตล์กระเป๋า
      description: อธิบายการออกแบบหรือประเภทของกระเป๋า เช่น กระเป๋าสะพายหลังหรือกระเป๋าคลัตช์
    bag_type:
      name: ประเภทกระเป๋า
      description: ระบุหมวดหมู่ของกระเป๋าและกล่องสัมภาระสำหรับรถจักรยานยนต์ เช่น กระเป๋าท้ายรถหรือกระเป๋าเครื่องมือ
    bakery_items_included:
      name: รวมอุปกรณ์เบเกอรี่
      description: ระบุประเภทของสินค้าเบเกอรี่ที่รวมอยู่ เช่น เบเกิล สโคน
    bakeware_features:
      name: คุณลักษณะอุปกรณ์ทำเบเกอรี่
      description: เน้นคุณลักษณะพิเศษของอุปกรณ์ทำเบเกอรี่ เช่น เคลือบสารกันติดหรือใช้กับเตาอบได้
    bakeware_items_included:
      name: รวมอุปกรณ์ทำเบเกอรี่
      description: ระบุอุปกรณ์ที่ใช้ในการอบที่รวมอยู่ในชุดผลิตภัณฑ์ เช่น ถาดสำหรับอบหรือแม่พิมพ์เค้ก
    bakeware_pieces_included:
      name: ชิ้นส่วนอุปกรณ์ที่ใช้ในการอบที่รวมอยู่
      description: ระบุอุปกรณ์อบขนมที่รวมอยู่ในชุด เช่น พิมพ์มัฟฟินหรือพิมพ์เค้ก
    bakeware_shape:
      name: รูปทรงอุปกรณ์ทำเบเกอรี่
      description: ระบุรูปร่างของอุปกรณ์ทำเบเกอรี่ เช่น บันด์หรือสี่เหลี่ยม
    baking_purpose:
      name: วัตถุประสงค์ในการอบ
      description: ระบุประเภทของขนมอบที่ใช้กับผลิตภัณฑ์ เช่น คุกกี้ มัฟฟิน
    baking_sheet_material:
      name: วัสดุสำหรับถาดอบขนม
      description: ระบุประเภทของวัสดุที่ใช้ในถาดอบ เช่น สแตนเลสหรือซิลิโคน
    ball_material:
      name: วัสดุสำหรับลูกบอล
      description: ระบุวัสดุหลักที่ใช้ในโครงสร้างของลูกบอล เช่น หนังหรือยาง
    ball_size:
      name: ขนาดลูกบอล
      description: ระบุขนาดของลูกบอลสำหรับกีฬาหรือเกม เช่น 5, สำหรับเด็ก
    balloon_kit_items_included:
      name: รายการอุปกรณ์ทำบอลลูนที่รวมอยู่
      description: ระบุสิ่งของที่ให้มาในชุดบอลลูน เช่น คลิปหรือตุ้มน้ำหนัก
    balloon_shape:
      name: รูปร่างบอลลูน
      description: อธิบายรูปทรงหรือดีไซน์ของลูกโป่ง เช่น ทรงกลม หรือรูปหัวใจ
    band_color:
      name: สีสายรัด
      description: ระบุสีของสายนาฬิกา เช่น หลากสี สีทองอมชมพู
    band_material:
      name: วัสดุสำหรับสายรัด
      description: ระบุวัสดุที่ใช้ในสายนาฬิกา เช่น หนังหรือสแตนเลส
    band_pattern:
      name: ลายแถบ
      description: ระบุธีมของภาพบนสายของผลิตภัณฑ์จำพวกนาฬิกา เช่น ลายทาง โลโก้
    band_strength:
      name: ความแข็งแรงของสายรัด
      description: อธิบายความทนทานของหนังยาง เช่น มาตรฐานหรือการใช้งานหนัก
    bandage_shape:
      name: รูปร่างผ้าพันแผล
      description: อธิบายรูปแบบตัดล่วงหน้าของผ้าพันแผลหรือวัสดุปิดแผลแบบติดกาว
    banner_design:
      name: การออกแบบแบนเนอร์
      description: ระบุลักษณะการออกแบบของแบนเนอร์ปาร์ตี้ เช่น พู่หรือมาลัยดอกไม้
    bar_mounting_type:
      name: ประเภทการติดตั้งบาร์
      description: ระบุวิธีการติดตั้งสำหรับบาร์ออกกำลังกาย เช่น ประตูหรือตง
    barcode_scanner_form_factor:
      name: รูปแบบเครื่องสแกนบาร์โค้ด
      description: ระบุรูปแบบการออกแบบทางกายภาพของเครื่องสแกนบาร์โค้ด (เช่น แบบมือถือ,
        แบบนำเสนอ, แบบแหวน)
    barcode_scanner_interface:
      name: อินเตอร์เฟซเครื่องสแกนบาร์โค้ด
      description: ระบุวิธีการสื่อสารสำหรับเครื่องสแกนบาร์โค้ด เช่น USB หรือ Bluetooth
    barcode_supported:
      name: รองรับบาร์โค้ด
      description: ระบุประเภทของบาร์โค้ดที่เครื่องสแกนสามารถอ่านได้ เช่น 1D, 2D
    barrel_material:
      name: วัสดุสำหรับทรงบาร์เรล
      description: ระบุวัสดุที่ใช้ในกระบอกผลิตภัณฑ์สำหรับเส้นผม เช่น ไทเทเนียม เซรามิก
    barrel_shape:
      name: รูปร่างลำกล้อง
      description: ระบุรูปร่างทางกายภาพหรือโปรไฟล์ของลำกล้อง ซึ่งมีผลโดยตรงต่อสไตล์ของลอนหรือคลื่นที่สร้างขึ้น
    barware_items_included:
      name: รวมอุปกรณ์บาร์
      description: ให้รายละเอียดส่วนประกอบของชุดค็อกเทลและอุปกรณ์บาร์ เช่น กระบอกผสมเครื่องดื่ม
        พิมพ์ทำน้ำแข็ง
    barware_material:
      name: วัสดุสำหรับอุปกรณ์บาร์
      description: ระบุวัสดุหลักที่ใช้ในอุปกรณ์บาร์ เช่น แก้วหรือสแตนเลส
    base_oil:
      name: น้ำมันพื้นฐาน
      description: ระบุน้ำมันหลักในผลิตภัณฑ์ดูแลส่วนบุคคล เช่น มะพร้าวหรือมะกอก
    base_spirit:
      name: เหล้าตัวหลัก
      description: ระบุแอลกอฮอล์หลักที่ใช้ในผลิตภัณฑ์ เช่น วิสกี้หรือเหล้ารัม
    base_type:
      name: ประเภทฐาน
      description: ระบุประเภทของฐาน โดยทั่วไปสำหรับไมโครโฟน เช่น แคลมป์ สามขา
    baseball/softball_ball_type:
      name: ประเภทลูกบอลสำหรับเบสบอลและซอฟท์บอล
      description: ระบุว่าลูกบอลได้รับการออกแบบสำหรับซอฟท์บอลหรือเบสบอล
    basket_material:
      name: วัสดุสำหรับตะกร้า
      description: ระบุประเภทของวัสดุที่ใช้ในตะกร้า เช่น เครื่องจักสานหรือโลหะ
    basketball_equipment_included:
      name: รวมอุปกรณ์บาสเก็ตบอล
      description: ระบุอุปกรณ์บาสเก็ตบอลที่มาพร้อมกับผลิตภัณฑ์ เช่น ตาข่ายและเสา
    bass_button_configuration:
      name: รูปร่างภายนอกของปุ่มเบส
      description: ระบุจำนวนปุ่มเบสบนหีบเพลง เช่น 8 เบสหรือ 24 เบส
    bat_material:
      name: วัสดุสำหรับไม้ตี
      description: ระบุประเภทของวัสดุที่ใช้ในไม้ตี เช่น อลูมิเนียมหรือคาร์บอนไฟเบอร์
    bat_standard:
      name: ไม้เบสบอลมาตรฐาน
      description: ระบุการรับรองไม้เบสบอลหรือไม้ซอฟต์บอล เช่น Little League หรือ NCAA
    bath_brush_style:
      name: รูปแบบแปรงอาบน้ำ
      description: อธิบายรูปแบบทางกายภาพหรือรูปแบบของเครื่องมือขัดผิว (เช่น แปรงด้ามยาว
        ถุงมือ เข็มขัด)
    bathroom_furniture_items_included:
      name: รวมเฟอร์นิเจอร์ห้องน้ำ
      description: ระบุรายการที่รวมอยู่ในชุดเฟอร์นิเจอร์ห้องน้ำ เช่น ตู้โต๊ะเครื่องแป้งหรือกระจก
    bathtub_base_design:
      name: การออกแบบฐานอ่างอาบน้ำ
      description: ระบุการออกแบบฐานและขาของอ่างอาบน้ำ เช่น แบบขารองหรือแบบแท่น
    bathtub_features:
      name: คุณลักษณะของอ่างอาบน้ำ
      description: ระบุลักษณะเฉพาะของอ่างอาบน้ำ เช่น ระบบป้องกันน้ำล้นหรืออ่างน้ำวน
    bathtub_skirt_shape:
      name: รูปร่างขอบนอกอ่างอาบน้ำ
      description: อธิบายรูปทรงของขอบอ่างอาบน้ำ เช่น แบบตรงหรือโค้ง
    baton_grip_design:
      name: การออกแบบด้ามจับไม้บาตอง
      description: อธิบายประเภทของด้ามจับบนไม้บาตองของวาทยากร เช่น ไม้ก๊อกหรือยาง
    battery_cell_type:
      name: ประเภทเซลล์แบตเตอรี่
      description: ระบุองค์ประกอบทางเคมีของแบตเตอรี่ เช่น อัลคาไลน์หรือลิเธียม-แอร์
    battery_charge_controller_type:
      name: ประเภทตัวควบคุมการชาร์จแบตเตอรี่
      description: ระบุการควบคุมพื้นฐานหรือเทคโนโลยีการชาร์จหรือโทโพโลยีที่ตัวควบคุมใช้
    battery_connector_type:
      name: ประเภทขั้วต่อแบตเตอรี่
      description: ระบุขั้วต่อหลักหรือรูปแบบขั้วที่ใช้ในการชาร์จหรือคายประจุแบตเตอรี่
    battery_features:
      name: คุณลักษณะของแบตเตอรี่
      description: อธิบายลักษณะพิเศษของแบตเตอรี่ เช่น ชาร์จเร็วหรือทนความร้อน
    battery_management_features:
      name: คุณลักษณะการจัดการแบตเตอรี่
      description: ระบุความสามารถของระบบการจัดการแบตเตอรี่ เช่น การตรวจจับข้อผิดพลาดหรือการติดตามตรวจสอบระยะไกล
    battery_mounting_type:
      name: ประเภทการติดตั้งแบตเตอรี่
      description: ระบุการติดตั้งทางกายภาพหรือมาตรฐานการเชื่อมต่อของชุดแบตเตอรี่
    battery_size:
      name: ขนาดแบตเตอรี่
      description: ระบุความเข้ากันได้ของแบตเตอรี่สำหรับผลิตภัณฑ์ เช่น AAA หรือ 9V
    battery_technology:
      name: เทคโนโลยีแบตเตอรี่
      description: ระบุประเภทของแบตเตอรี่ที่ใช้ในผลิตภัณฑ์อิเล็กทรอนิกส์ เช่น อัลคาไลน์หรือลิเธียมไอออน
    battery_terminal_type:
      name: ประเภทขั้วแบตเตอรี่
      description: ระบุรูปแบบขั้วต่อทางกายภาพบนขั้วแบตเตอรี่
    battery_type:
      name: ประเภทแบตเตอรี่
      description: 'แยกความแตกต่างระหว่างแบตเตอรี่ประเภทต่างๆ เช่น แบบใช้แล้วทิ้งหรือแบบชาร์จใหม่ได้ '
    bead_shape:
      name: รูปร่างของลูกปัด
      description: อธิบายรูปทรงหรือดีไซน์ของลูกปัด เช่น กลมหรือสี่เหลี่ยม
    beard_care_benefits:
      name: ประโยชน์การดูแลเครา
      description: แสดงรายการประโยชน์การทำงานหลักที่ผลิตภัณฑ์ให้สำหรับเคราและผิวหนังที่อยู่ข้างใต้
    beat_subdivisions:
      name: การแบ่งจังหวะ
      description: ระบุการแบ่งจังหวะของบีทในเครื่องเมโทรนอม เช่น โน้ตตัวดำหรือเขบ็ตหนึ่งชั้น
    beater_head_size:
      name: ขนาดหัวไม้ตี
      description: ระบุขนาดของหัวกระเดื่อง เช่น ขนาดกลาง (M) หรือขนาดใหญ่ (L)
    bed/frame_features:
      name: คุณลักษณะของเตียง/โครง
      description: เน้นคุณลักษณะเฉพาะของเตียงและโครงเตียง เช่น ตัวเลือกที่เก็บของหรือหัวเตียงที่มีมาให้
    bed_leveling_type:
      name: ประเภทการปรับระดับแท่นพิมพ์
      description: ระบุวิธีที่เครื่องพิมพ์ใช้ปรับระดับพื้นผิวการสร้างก่อนการพิมพ์
    bed_pan_features:
      name: คุณสมบัติกระโถน
      description: เน้นองค์ประกอบการออกแบบพิเศษเพิ่มเติมหรือการปรับปรุงการทำงาน
    bed_pan_handle_style:
      name: สไตล์ที่จับกระโถน
      description: อธิบายสไตล์ของที่จับหรือที่จับที่ให้ไว้สำหรับการวางตำแหน่งและการนำออก
    bed_pan_type:
      name: ประเภทหม้อนอน
      description: ระบุการออกแบบของหม้อนอน เช่น แบบมาตรฐาน สำหรับคนอ้วน
    bedding_pieces_included:
      name: ชิ้นส่วนเครื่องนอนที่รวมอยู่
      description: ระบุส่วนประกอบที่รวมอยู่ในชุดเครื่องนอน เช่น ปลอกหมอน ผ้าปูด้านบน
    bedding_size:
      name: ขนาดเครื่องนอน
      description: ระบุหมวดหมู่ขนาดสำหรับชุดเครื่องนอน เช่น มาตรฐาน คิงไซส์
    beer_style:
      name: สไตล์เบียร์
      description: ช่วยจัดหมวดหมู่เบียร์ตามลักษณะเฉพาะที่แตกต่างกัน เช่น ขม มีฟองฟูนุ่ม
    beer_variety:
      name: ลักษณะเบียร์
      description: แบ่งประเภทเบียร์ตามประเภทหรือสไตล์เฉพาะ เช่น สเตาท์ พิลส์เนอร์
    bell_design:
      name: การออกแบบกระดิ่ง
      description: อธิบายลักษณะของกระดิ่งตั้งโต๊ะ เช่น กระดิ่งตบ กระดิ่งเรียกพนักงาน
    bell_size:
      name: ขนาดปากลำโพง
      description: ระบุขนาดกระดิ่งของเครื่องดนตรี เช่น ขนาดใหญ่ (L) หรือขนาดกลาง (M)
    bell_sound:
      name: เสียงกระดิ่ง
      description: อธิบายประเภทของเสียงกระดิ่ง เช่น เสียงระฆังหรือเสียงติ๊ง
    belt_type:
      name: ประเภทเข็มขัด
      description: ระบุการออกแบบเข็มขัดนิรภัยของยานพาหนะ เช่น แบบพาดตักหรือแบบสามจุด
    best_uses:
      name: การใช้งานที่ดีที่สุด
      description: ไฮไลต์กิจกรรมที่เหมาะสมที่สุดสำหรับการใช้งานสินค้า เช่น การเดินทาง
        การเดินป่า หรือการดำน้ำ
    bevel_type:
      name: ประเภทเอียง
      description: ระบุประเภทของรอยบากบนเครื่องมือ เช่น เดี่ยวหรือคู่
    beverage_product_form:
      name: รูปแบบผลิตภัณฑ์เครื่องดื่ม
      description: อธิบายว่าเครื่องดื่มถูกนำเสนอหรือบริโภคอย่างไร เช่น พร้อมดื่มหรือแบบแคปซูล
    bib_design:
      name: การออกแบบเอี๊ยม
      description: ระบุสไตล์หรือประเภทของผ้ากันเปื้อนเด็ก เช่น แบบผ้าพันคอหรือแบบมีแขน
    bicycle_brake_type:
      name: ประเภทเบรคจักรยาน
      description: ระบุระบบเบรกบนจักรยาน เช่น วีเบรกหรือดิสก์
    bicycle_features:
      name: คุณลักษณะของจักรยาน
      description: ระบุลักษณะพิเศษของจักรยาน เช่น ยางที่ทนต่อการแตกรั่วซึม ชั้นวางสัมภาระ
    bidet_mounting_type:
      name: ประเภทการติดตั้งอ่างใส่น้ำและล้างก้น
      description: ระบุวิธีการติดตั้งโถชำระล้าง เช่น ติดผนังหรือตั้งพื้น
    binder_ring_shape:
      name: รูปร่างสันห่วง
      description: อธิบายเกี่ยวกับห่วงแฟ้มในเครื่องใช้สำนักงาน เช่น ทรงกลม หรือรูปตัว
        D
    binding_mount:
      name: แท่นตัวล็อก
      description: ระบุประเภทของการติดตั้งไบน์ดิ้งสำหรับอุปกรณ์กีฬาฤดูหนาว เช่น ดิสก์
        2x2
    binding_style:
      name: สไตล์ตัวล็อก
      description: อธิบายวิธีการที่ใช้ในการเข้าเล่มเอกสาร เช่น สันเกลียวหรือขดลวด
    binocular/monocular_design:
      name: การออกแบบกล้องสองตา/กล้องตาเดียว
      description: อธิบายการใช้งานเฉพาะสำหรับกล้องสองตาหรือกล้องตาเดียว เช่น ดาราศาสตร์หรือการล่าสัตว์
    binocular_design:
      name: การออกแบบกล้องส่องทางไกล
      description: อธิบายการใช้งานหรือฟังก์ชันเฉพาะของกล้องส่องทางไกล เช่น การล่าสัตว์หรือดาราศาสตร์
    biometric_authentication_method:
      name: วิธีการยืนยันตัวตนด้วยไบโอเมตริก
      description: แสดงรายการตัวเลือกการรักษาความปลอดภัยแบบไบโอเมตริกซ์ในตัวที่มีในโทรศัพท์
        เช่น เซ็นเซอร์ลายนิ้วมือหรือการจดจำใบหน้า
    biometric_certifications:
      name: การรับรองไบโอเมตริก
      description: แสดงรายการการรับรองไบโอเมตริกอุตสาหกรรมหรือรัฐบาลอย่างเป็นทางการ
        ที่อุปกรณ์เป็นไปตาม (เช่น FBI PIV, FIPS 201)
    biometric_monitor_accessory_features:
      name: คุณลักษณะของอุปกรณ์ตรวจวัดชีวมิติ
      description: ระบุฟังก์ชันพิเศษของอุปกรณ์ตรวจวัดไบโอเมตริกซ์ เช่น เครื่องวัดอัตราการเต้นของหัวใจหรือเครื่องวัดจำนวนก้าวที่เดิน
    bios_type:
      name: ประเภท BIOS
      description: ระบุประเภทของ BIOS ที่ใช้ในเมนบอร์ด เช่น แบบไฮบริด แบบดั้งเดิม
    bird_cage/stand_design:
      name: การออกแบบกรงนก/ขาตั้ง
      description: ระบุรูปแบบของกรงนกหรือขาตั้ง เช่น กรงหลังคาโดม ขาตั้งแบบมีล้อ
    bird_food_form:
      name: รูปแบบอาหารนก
      description: อธิบายรูปแบบทางกายภาพของอาหารนก เช่น เมล็ดพืชหรืออาหารเม็ด
    bird_food_ingredients:
      name: ส่วนผสมอาหารนก
      description: ระบุประเภทของส่วนผสมในอาหารนก เช่น หนอนหรือเมล็ดทานตะวัน
    bird_treat_type:
      name: ประเภทอาหารนก
      description: ระบุหมวดหมู่ของอาหารว่างสำหรับนก เช่น บิสกิตหรือผลไม้
    birthday_candle_design:
      name: การออกแบบเทียนวันเกิด
      description: อธิบายธีมภาพของเทียนวันเกิด เช่น รูปสัตว์หรือตัวการ์ตูน
    birthday_candle_type:
      name: ประเภทเทียนวันเกิด
      description: ระบุลักษณะเฉพาะของเทียนวันเกิด เช่น กลิ่นหอม ไฟเย็น
    bitter_variety:
      name: ลักษณะความขม
      description: จำแนกประเภทรสขมตามโปรไฟล์รสชาติ เช่น กลิ่นดอกไม้ รสเผ็ด
    blade_coating:
      name: การเคลือบใบมีด
      description: ระบุการเคลือบเพื่อประสิทธิภาพใดๆ ที่ใช้กับใบมีดเพื่อความคมหรือการเลื่อน
        (เช่น แพลทินัม PTFE ไทเทเนียม)
    blade_curve:
      name: เส้นโค้งใบมีด
      description: ระบุความโค้งของส่วนปลายไม้ฮ็อกกี้ เช่น ปลายเปิด ปลายหงาย
    blade_design:
      name: การออกแบบใบมีด
      description: ระบุรูปแบบใบมีดในมีดอเนกประสงค์ เช่น ใบมีดโกนหรือมีดคัตเตอร์
    blade_edge_configuration:
      name: การกำหนดค่าขอบใบมีด
      description: ระบุรูปแบบขอบของใบมีดแต่ละใบ (เช่น ขอบเดียว ขอบคู่ ระบบตลับ ใบมีดครึ่งหนึ่ง)
    blade_material:
      name: วัสดุสำหรับใบมีด
      description: ระบุวัสดุที่ใช้ในการสร้างใบมีด เช่น เหล็กหรืออะลูมิเนียม
    blade_type:
      name: ประเภทใบมีด
      description: ระบุรูปทรงและลักษณะของใบมีดของสินค้า เช่น ตรงหรือกริช
    blanket_color:
      name: สีผ้าห่ม
      description: ระบุสีหลักของผ้าห่ม เช่น สีกรมท่าหรือหลากสี
    blanket_pattern:
      name: ลวดลายผ้าห่ม
      description: อธิบายการออกแบบหรือลวดลายบนผ้าห่ม เช่น ลายดอกไม้หรือเรขาคณิต
    blending_type:
      name: ประเภทการผสม
      description: ระบุวิธีการผสมที่ใช้ในอุปกรณ์ห้องแล็บ เช่น แบบต่อเนื่องหรือแบบเป็นชุด
    blind/shade_style:
      name: สไตล์ม่านบังตา/มู่ลี่
      description: ระบุการออกแบบหรือประเภทของมู่ลี่หรือม่านบังแสง เช่น ม่านม้วนหรือมู่ลี่แนวตั้ง
    blocked_signal_types:
      name: ประเภทสัญญาณที่ถูกบล็อก
      description: ระบุประเภทของสัญญาณไร้สายที่เครื่องรบกวนสามารถบล็อกได้
    blood_group_systems_detected:
      name: ระบบหมู่โลหิตที่ตรวจพบ
      description: ระบุว่าชุดสามารถกำหนดระบบหมู่โลหิตใด
    blood_test_kit_components:
      name: ส่วนประกอบชุดตรวจเลือด
      description: ระบุรายการที่รวมอยู่ในชุดตรวจเลือด เช่น ผ้ากอซ พลาสเตอร์ปิดแผล
    bluetooth_functionality:
      name: ฟังก์ชันบลูทูธ
      description: ระบุว่าอุปกรณ์ทำหน้าที่เป็นตัวส่ง ตัวรับ หรือทั้งคู่ (ทรานซีฟเวอร์)
    board_concave_shape:
      name: รูปทรงเว้าของกระดาน
      description: ระบุการโค้งเว้าของกระดานโต้คลื่นหรือแพดเดิลบอร์ด เช่น เว้ารูปตัว
        V, แบบราบ
    board_game_features:
      name: คุณลักษณะของบอร์ดเกม
      description: เน้นแง่มุมที่เป็นเอกลักษณ์ของบอร์ดเกม เช่น การตั้งค่าที่รวดเร็ว
        ภาคเสริมที่มีให้
    board_game_mechanics:
      name: กลไกของบอร์ดเกม
      description: อธิบายโครงสร้างการเล่นเกมของบอร์ดเกม เช่น แบบกลยุทธ์หรือแบบร่วมมือกัน
    board_material:
      name: วัสดุใช้ทำกระดาน
      description: ระบุประเภทของวัสดุในบอร์ดนำเสนอ เช่น อะคริลิคหรือพอร์ซเลน
    board_mounting_type:
      name: ประเภทการติดตั้งกระดาน
      description: ระบุรูปแบบการติดตั้งของบอร์ดนำเสนอ เช่น แบบพกพาหรือแบบมีขาตั้ง
    board_profile:
      name: โปรไฟล์บอร์ด
      description: ระบุลักษณะของกระดานโต้คลื่น เช่น แบบราบ ร็อคเกอร์
    board_surface:
      name: พื้นผิวกระดาน
      description: อธิบายประเภทของพื้นผิวบนป้ายแสดงผล เช่น ผ้าหรือไม้ก๊อก
    board_type:
      name: ประเภทบอร์ด
      description: จำแนกประเภทสเก็ตบอร์ดตามการออกแบบและวัตถุประสงค์ เช่น คลาสสิกหรือครุยเซอร์
    boat_type:
      name: ประเภทเรือ
      description: ระบุการออกแบบหรือรุ่นเฉพาะของยานพาหนะที่แล่นบนหรือในน้ำ เช่น เรือท้องแบนหรือเรือเด็คโบท
    body/facial_hair_type:
      name: ประเภทขนตามร่างกาย/ใบหน้า
      description: ช่วยจับคู่ผลิตภัณฑ์ดูแลเส้นผมให้เข้ากับประเภทของเส้นผม เช่น เส้นเล็กหรือเส้นใหญ่
        ซึ่งโดยทั่วไปแล้วใช้สำหรับการฟอกสีผม
    body_area:
      name: พื้นที่ร่างกาย
      description: ระบุส่วนของร่างกายที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ เช่น ใบหน้า
        บิกินี่ไลน์
    body_color:
      name: สีลำตัว
      description: ระบุสีหลักของยานพาหนะหรือชิ้นส่วน เช่น สีขาวหรือสีเงิน
    body_jewelry_type:
      name: ประเภทเครื่องประดับร่างกาย
      description: ระบุประเภทของเครื่องประดับตามร่างกาย เช่น การเจาะสะดือ ต่างหูแบบหนีบ
    body_material:
      name: วัสดุส่วนลำตัว
      description: ระบุวัสดุหลักของผลิตภัณฑ์ ซึ่งโดยทั่วไปใช้กับเบ็ดตกปลา เช่น วัสดุคอมโพสิต
        อลูมิเนียม
    body_paint/foundation_type:
      name: ประเภทสีและแป้งรองพื้นสำหรับร่างกาย
      description: ระบุหมวดหมู่ของผลิตภัณฑ์เมกอัพสำหรับร่างกาย เช่น รองพื้น หรือเลือดปลอม
    body_paint_formula_base:
      name: ฐานสูตรสีทาตัว
      description: ระบุฐานสูตรหลัก ซึ่งส่งผลต่อความทนทาน การเคลือบผิว และวิธีการล้างออก
    body_pattern:
      name: รูปแบบของบอดี้
      description: อธิบายการออกแบบภาพหรือลวดลายบนพื้นผิวหลักของผลิตภัณฑ์ เช่น ดอกไม้
        เรขาคณิต
    body_side:
      name: ด้านของร่างกาย
      description: ระบุว่าผลิตภัณฑ์นี้ได้รับการออกแบบมาสำหรับด้านซ้าย ด้านขวา หรือเหมาะสำหรับการใช้งานสองข้าง
    bodyboard_features:
      name: คุณลักษณะบอดี้บอร์ด
      description: อธิบายลักษณะเฉพาะของบอดี้บอร์ด เช่น หลังคาแข็งหรือแบบเป่าลม
    boiler_system:
      name: ระบบหม้อต้ม
      description: ระบุระบบหม้อต้มสำหรับเครื่องทำความร้อน เช่น คอมบิ โซโล
    bolt_form:
      name: รูปแบบสลัก
      description: อธิบายรูปแบบของโบลต์ในอุปกรณ์ฮาร์ดแวร์ เช่น หัวหกเหลี่ยม แบบกลึง
    bolt_material:
      name: วัสดุสำหรับโบลต์
      description: ระบุองค์ประกอบของลูกศรสำหรับยิงธนู เช่น ไม้ไผ่หรือไฟเบอร์กลาส
    bone_anchored_interface_type:
      name: ประเภทอินเทอร์เฟซที่ยึดกับกระดูก
      description: กำหนดว่าโปรเซสเซอร์ติดกับรากฟังเทียมอย่างไร แยกแยะระหว่างระบบแอบัตเมนต์ผ่านผิวหนังและระบบแม่เหล็กผ่านผิวหนัง
    book/file_cover_material:
      name: วัสดุสำหรับปกหนังสือ/แฟ้ม
      description: ระบุวัสดุที่ใช้ในปกหนังสือหรือปกแฟ้ม เช่น กระดาษแข็งหรือหนัง
    book_cover_material:
      name: วัสดุสำหรับปกหนังสือ
      description: ระบุวัสดุที่ใช้ทำปกหนังสือ เช่น หนังหรือกระดาษ
    book_cover_type:
      name: ประเภทปกหนังสือ
      description: ระบุประเภทของปกหนังสือ เช่น ปกแข็งหรือปกอ่อน
    bookmark_design:
      name: การออกแบบบุ๊กมาร์ก
      description: อธิบายสไตล์หรือประเภทของที่คั่นหนังสือ เช่น แม่เหล็กหรือคลิป
    bookmark_shape:
      name: รูปร่างบุ๊กมาร์ก
      description: อธิบายรูปทรงหรือโครงร่างของที่คั่นหนังสือ เช่น ทรงกลมหรือสี่เหลี่ยม
    boombox_lighting_effects:
      name: เอฟเฟกต์ไฟบูมบ็อกซ์
      description: อธิบายการมีอยู่และสไตล์ของโชว์ไฟ LED หรือ RGB ในตัวที่รวมอยู่ในลำโพง
    boot_style:
      name: สไตล์ของรองเท้าบูต
      description: ระบุสไตล์ของรองเท้าบูท เช่น รองเท้าบูทสั้น
    boot_type:
      name: ประเภทรองเท้าบูท
      description: จำแนกประเภทสไตล์ของรองเท้าบูต เช่น รองเท้าบูตนุ่ม รองเท้าบูตแข็ง
    borescope_design:
      name: การออกแบบกล้องงู
      description: อธิบายประเภทของกล้องบอร์สโคป เช่น ยืดหยุ่น ไม่ยืดหยุ่น หรือไฟเบอร์สโคป
    bottle/container_closure:
      name: ฝาปิดขวด/ภาชนะ
      description: ระบุประเภทของการปิดขวดหรือภาชนะบรรจุ เช่น แบบปั๊มหรือฝาพับ
    bottle_closure_type:
      name: ประเภทที่ปิดขวด
      description: ระบุประเภทของฝาปิดที่ใช้กับขวด เช่น จุกไม้ก๊อกหรือฝาจีบ
    bottle_design:
      name: การออกแบบขวด
      description: อธิบายลักษณะของขวด โดยทั่วไปจะเป็นผลิตภัณฑ์สำหรับเด็ก เช่น ถือง่าย
    bottle_material:
      name: วัสดุสำหรับขวด
      description: ระบุสารที่ใช้ในโครงสร้างของขวด เช่น แก้วหรือพลาสติก
    bottle_sterilizer_features:
      name: คุณลักษณะเครื่องนึ่งขวดนม
      description: เน้นฟังก์ชันเฉพาะของเครื่องนึ่งฆ่าเชื้อขวดนม เช่น ฟังก์ชันปิดเครื่องอัตโนมัติหรือฟังก์ชันละลายน้ำแข็ง
    bottle_type:
      name: ประเภทขวด
      description: ระบุประเภทของการปิดขวด เช่น หัวบีบหรือหัวสเปรย์
    bottle_warmer/sterilizer_features:
      name: คุณลักษณะเครื่องอุ่นขวดนม/ฆ่าเชื้อขวดนม
      description: เน้นคุณลักษณะพิเศษของเครื่องอุ่นขวดนมหรือเครื่องฆ่าเชื้อ เช่น การปิดเครื่องอัตโนมัติหรือตัวจับเวลา
    bottle_warmer_features:
      name: คุณลักษณะเครื่องอุ่นขวดนม
      description: เน้นคุณลักษณะเฉพาะของเครื่องอุ่นขวด เช่น จอ LCD หรือตัวจับเวลา
    bottom_surface_material:
      name: วัสดุสำหรับพื้นผิวด้านล่าง
      description: ระบุวัสดุพื้นผิวด้านล่างของผลิตภัณฑ์ เช่น โลหะหรือแก้ว
    bow/crossbow_features:
      name: คุณลักษณะคันธนู/หน้าไม้
      description: อธิบายคุณลักษณะพิเศษของคันธนู/หน้าไม้ เช่น ปรับระยะดึงได้หรือกล้องเล็งมีแสงส่องสว่าง
    bow_features:
      name: คุณลักษณะคันธนู
      description: ระบุลักษณะเฉพาะของคันธนู เช่น ปรับระยะดึงได้ กล้องเล็งมีแสงส่องสว่าง
    bow_hair_material:
      name: วัสดุที่ใช้ทำโบว์ผม
      description: ระบุองค์ประกอบของสายคันชักในเครื่องสาย เช่น ขนสังเคราะห์ หางม้า
    bow_material:
      name: วัสดุสำหรับคันธนู
      description: ระบุประเภทของวัสดุที่ใช้ในคันธนู กล่าวคือ อะลูมิเนียม ไฟเบอร์กลาส
    box_type:
      name: ประเภทกล่อง
      description: ระบุรูปแบบของกล่องเก็บของหรืออุปกรณ์จัดระเบียบสำหรับยานพาหนะ เช่น
        แบบหีบหรือครอสโอเวอร์
    bra_closure_type:
      name: ประเภทของชุดชั้นในแบบตะขอ
      description: ระบุวิธีการสวมหรือถอดเสื้อชั้นใน เช่น ด้านหน้า แบบสวม (ไม่มีตัวปิด)
    bra_coverage:
      name: การปิดครอบของบรา
      description: ระบุระดับการปกปิดของเสื้อชั้นใน เช่น เต็มตัวหรือครึ่งตัว
    bra_features:
      name: คุณลักษณะของบรา
      description: ให้รายละเอียดเกี่ยวกับคุณลักษณะเฉพาะของเสื้อชั้นใน เช่น แผ่นรองแบบถอดได้
        ผ้าซับเหงื่อ
    bra_strap_type:
      name: ประเภทสายบรา
      description: ระบุสไตล์และการใช้งานของสายบรา เช่น เรเซอร์แบ็ค
    bra_style:
      name: สไตล์บรา
      description: ระบุดีไซน์หรือสไตล์ของบรา เช่น แบบดันทรงหรือแบบไร้สาย
    bra_support_level:
      name: ระดับการรองรับของบรา
      description: ระบุระดับการรองรับแรงกระแทกของบรา เช่น ต่ำ ปานกลาง สูง
    brace_support_level:
      name: ระดับการพยุงของเฝือก
      description: ระบุระดับการรองรับหรือการป้องกันโดยรวมที่ผู้ผลิตกำหนดไว้สำหรับอุปกรณ์พยุงนี้
    bracelet_design:
      name: การออกแบบสร้อยข้อมือ
      description: ระบุดีไซน์ของสร้อยข้อมือ เช่น แบบ Charm หรือ Cuff
    bracket/brace_design:
      name: การออกแบบที่ค้ำ/เท้าแขน
      description: อธิบายลักษณะฉากยึดหรือที่ค้ำ เช่น ฉากยึดมุม ที่ค้ำแบบเข้ามุม
    bracket_profile:
      name: โปรไฟล์ขายึด
      description: ระบุรูปแบบขายึดทางกายภาพที่มาพร้อมกับการ์ด ซึ่งกำหนดความเข้ากันได้กับตัวเครื่อง
    brandy_variety:
      name: ลักษณะบรั่นดี
      description: แยกแยะระหว่างรูปแบบบรั่นดีต่างๆ เช่น คอนญัค เกร็ปป้า
    breadboard_type:
      name: ประเภทเบรดบอร์ด
      description: จำแนกเบรดบอร์ดตามโครงสร้างพื้นฐานหรือสไตล์ขนาด
    breath_spray_benefit:
      name: ประโยชน์สเปรย์ลมหายใจ
      description: ระบุประโยชน์หลักในการดูแลช่องปากที่สเปรย์ดับกลิ่นปากนี้มอบให้
    breath_sprays_certifications:
      name: ใบรับรองสเปรย์ระงับกลิ่นปาก
      description: ระบุมาตรฐานที่สเปรย์ลมหายใจมีคุณสมบัติครบถ้วน เช่น การค้าที่เป็นธรรมหรือปราศจากกลูเตน
    bridge/router_advanced_features:
      name: คุณลักษณะขั้นสูงของบริดจ์/เราเตอร์
      description: เน้นฟังก์ชันขั้นสูงของบริดจ์/เราเตอร์ เช่น ขับเคลื่อนโดย AI หรือรองรับ
        VPN
    brightness_levels:
      name: ระดับความสว่าง
      description: ระบุช่วงของเอาต์พุตแสงสำหรับผลิตภัณฑ์ เช่น ปานกลางหรือสูง
    bristle_grade:
      name: เกรดขนแปรง
      description: ระบุคุณภาพหรือการจำแนกประเภทของขนสัตว์หรือขนสังเคราะห์ที่ใช้ (เช่น
        ขนแบดเจอร์ซิลเวอร์ทิป ไฟเบอร์ซิลเวอร์ทิปสังเคราะห์)
    bristle_hardness:
      name: ความแข็งของขนแปรง
      description: ระบุความแน่นของขนแปรงสีฟัน
    bristle_material:
      name: วัสดุสำหรับขนแข็ง
      description: ระบุองค์ประกอบของขนแปรง เช่น ไนลอนหรือขนม้า
    bristle_shape:
      name: รูปร่างขนแปรง
      description: ระบุรูปทรงของขนแปรง เช่น เรียบ ทำมุม
    broadcast_video_standard:
      name: มาตรฐานวิดีโอออกอากาศ
      description: ระบุมาตรฐานการออกอากาศอนาล็อกที่ VCR เข้ากันได้
    broadcasting_standard_supported:
      name: มาตรฐานการออกอากาศที่รองรับ
      description: ระบุมาตรฐานการออกอากาศโทรทัศน์หรือการมอดูเลต (ดาวเทียม เคเบิล ภาคพื้นดิน)
        ที่ผลิตภัณฑ์สามารถถอดรหัสหรือจัดการได้
    broadhead/field_point_material:
      name: วัสดุของหัวลูกศรแบบ Broadhead/Field
      description: ระบุวัสดุที่ใช้ในหัวธนูล่าสัตว์หรือหัวธนูในภาคสนาม เช่น สแตนเลสหรือเหล็กกล้าคาร์บอน
    broadhead_design:
      name: การออกแบบหัวลูกธนู
      description: ระบุประเภทการออกแบบของหัวลูกธนูที่ใช้ในการยิงธนู เช่น หัวลูกธนูแบบใบมีดตายตัว
        หัวลูกธนูแบบกลไก
    brush_application:
      name: การใช้แปรง
      description: อธิบายจุดประสงค์ในการใช้แปรงสำหรับงานศิลปะ เช่น สีอะคริลิกหรือสีน้ำ
    brush_end_type:
      name: ประเภทปลายแปรง
      description: อธิบายรูปแบบโครงสร้างของปลายแปรง (เช่น ปลายเดียว ปลายคู่ แบบหดได้)
    brush_head_shape:
      name: รูปร่างหัวแปรง
      description: กำหนดรูปแบบโดยรวมของหัวแปรง ซึ่งมีผลต่อการเข้าถึงและความเหมาะสมสำหรับผู้ใช้ที่แตกต่างกัน
    brush_head_usage:
      name: การใช้งานหัวแปรง
      description: ระบุวัตถุประสงค์การใช้งานหัวแปรง โดยทั่วไปสำหรับเครื่องสำอาง เช่น
        การทำความสะอาดอย่างล้ำลึก การขัดผิว
    brush_material:
      name: วัสดุสำหรับแปรง
      description: ระบุประเภทของวัสดุที่ใช้ในการทำแปรง เช่น ซิลิโคนหรือพลาสติก
    brush_size:
      name: ขนาดแปรง
      description: ระบุขนาดของพู่กันสำหรับงานศิลปะ เช่น 0, 12
    brush_type:
      name: ประเภทแปรง
      description: ระบุวัสดุที่ใช้ในแปรงโกนหนวด เช่น ขนสังเคราะห์หรือขนแบดเจอร์
    brushing_mode:
      name: โหมดการแปรงฟัน
      description: แสดงรายการโปรแกรมการทำความสะอาดที่ตั้งไว้ล่วงหน้าที่แปรงสีฟันสามารถวนผ่าน
        (เช่น ทำความสะอาด อ่อนโยน ฟอกขาว)
    bug_type:
      name: ประเภทของจุดบกพร่อง
      description: ระบุพันธุ์แมลงที่เป็นเป้าหมายของผลิตภัณฑ์ เช่น มดหรือแตน
    building_board_material:
      name: วัสดุใช้ทำบอร์ดตัวต่อ
      description: ระบุประเภทของวัสดุที่ใช้ในแผ่นกระดานสำหรับงานก่อสร้าง เช่น ไม้อัดหรือซีเมนต์
    building_consumable_form:
      name: รูปแบบอุปกรณ์ก่อสร้างสิ้นเปลือง
      description: ระบุรูปแบบของสารประกอบปะผนัง เช่น ของเหลวหรือผง
    building_toy_type:
      name: ประเภทของเล่นตัวต่อ
      description: ระบุหมวดหมู่ของเล่นตัวต่อ เช่น ชุดสร้างทักษะ STEM, กระเบื้องแม่เหล็ก
    bulb_cap_type:
      name: ประเภทฝาครอบหลอดไฟ
      description: ระบุประเภทของฝาครอบหรือฐานของหลอดไฟหรืออุปกรณ์ติดตั้ง เช่น E12,
        GU10
    bulb_shape:
      name: รูปทรงของหลอดไฟ
      description: อธิบายรูปทรงของผลิตภัณฑ์ไฟส่องสว่าง เช่น หลอดยาว แบบเกลียว
    bulb_size:
      name: ขนาดหลอดไฟ
      description: ระบุขนาดของหลอดไฟ เช่น A19, C7
    bulb_type:
      name: ประเภทหลอดไฟ
      description: ระบุประเภทของหลอดไฟที่ใช้ในผลิตภัณฑ์ไฟส่องสว่าง เช่น LED, ฮาโลเจน
    bulldozer_blade_type:
      name: ประเภทใบมีดรถดันดิน
      description: ระบุลักษณะของใบมีดบนรถปราบดิน เช่น แบบทำมุมหรือแบบตรง (ใบมีดรูปตัว
        S)
    bullet_protection_level:
      name: ระดับการป้องกันกระสุน
      description: ระบุระดับการป้องกันกระสุนในเสื้อ เช่น IIA, IV
    bullhorn_features:
      name: คุณลักษณะของบูลฮอร์น
      description: เน้นฟังก์ชันเฉพาะของโทรโข่ง เช่น การบันทึกเสียงหรือฟังก์ชันไซเรน
    bullion_form:
      name: รูปแบบทองคำแท่ง
      description: ระบุประเภทของทองคำแท่ง เช่น ทรงกลมหรือแท่ง
    bungee_arm_mechanism:
      name: กลไกแขนบันจี้
      description: กำหนดเทคโนโลยีที่ใช้ในการแขวนและนำทางสายเมาส์ (เช่น แขนสปริง, สายยางยืด,
        การแขวนแม่เหล็ก)
    burner_material:
      name: วัสดุสำหรับเตา
      description: ระบุวัสดุที่ใช้ในการสร้างเตาหรือเตาย่าง เช่น เหล็กหล่อหรือสแตนเลส
    butt_cap_color:
      name: สีของจุกอุดด้าม
      description: ระบุสีของจุกอุดด้ามคันเบ็ด เช่น สีดำหรือสีน้ำเงิน
    butt_cap_material:
      name: วัสดุสำหรับฝาครอบปุ่ม
      description: ระบุองค์ประกอบของปลายด้านล่างของด้ามจับบนอุปกรณ์กีฬา เช่น EVA (อีทิลีนไวนิลอะเซเทต)
        ไม้ก๊อก
    butt_cap_pattern:
      name: ลวดลายของจุกอุดด้าม
      description: อธิบายการออกแบบหรือลวดลายบนฝาปิดคันเบ็ด เช่น ลายพรางหรือลายดอกไม้
    button/snap_closure_type:
      name: ประเภทที่ปิดด้วยกระดุม/สแนป
      description: อธิบายลักษณะของกลไกการยึด เช่น แบบแม่เหล็กหรือแบบมองไม่เห็น
    button_surface_profile:
      name: โปรไฟล์พื้นผิวปุ่ม
      description: อธิบายรูปร่างทางกายภาพของพื้นผิวลูกสูบของปุ่ม ซึ่งส่งผลต่อสรีรศาสตร์และสไตล์ภาพ
    cabinet_type:
      name: ประเภทตู้
      description: ระบุการออกแบบและรูปแบบของเกมอาร์เคด เช่น บาร์ท็อปหรือมินิอาร์เคด
    cable_form_factor:
      name: รูปแบบสายเคเบิล
      description: อธิบายรูปแบบการออกแบบทางกายภาพหรือรูปร่างของสายเคเบิล
    cable_housing_material:
      name: วัสดุสำหรับปลอกนอกสายเบรค
      description: ระบุวัสดุที่ใช้สำหรับปลอกสายเคเบิล เช่น ไนลอนหรือ PVC
    cable_jacket_rating:
      name: อันดับเปลือกสายเคเบิล
      description: ระบุอันดับสิ่งแวดล้อมหรือความปลอดภัยของเปลือกนอกของสายเคเบิล (เช่น
        พลีนัม, ฝังดินตรง, ทนรังสี UV)
    cable_shielding:
      name: การป้องกันสายเคเบิล
      description: ระบุประเภทของการป้องกันที่ใช้ในสายเคเบิล เช่น แบบถัก (STP), แบบฟอยล์
        (FTP)
    cable_style:
      name: รูปแบบสายเคเบิล
      description: อธิบายการออกแบบทางกายภาพของสายเคเบิล (เช่น ถัก, แบน, ขด, ยืดหดได้)
    cable_tie_type:
      name: ประเภทเคเบิลไท
      description: ระบุรูปแบบการสร้างหรือกลไกการยึดของเคเบิลไท
    cable_tray_style:
      name: รูปแบบถาดเคเบิล
      description: อธิบายรูปแบบโครงสร้างของส่วนถาดเคเบิลที่กำหนดวิธีการระบายอากาศ
        และการรองรับเคเบิล
    cable_type:
      name: ประเภทสายเคเบิล
      description: จำแนกประเภทสายเคเบิลต่างๆ โดยทั่วไปในอุปกรณ์ปั่นจักรยาน เช่น เบรก
        เกียร์
    cache_level:
      name: ระดับแคช
      description: ระบุตำแหน่งลำดับชั้นของแคช (เช่น L1, L2, L3) ซึ่งส่งผลต่อขนาด ความหน่วง
        และความใกล้ชิดกับแกนประมวลผล
    caffeine_content:
      name: ปริมาณคาเฟอีน
      description: ระบุปริมาณคาเฟอีนที่มีอยู่ในผลิตภัณฑ์ เช่น คาเฟอีนต่ำ คาเฟอีนดีแคฟเฟอีนต่ำ
    cage_type:
      name: ประเภทกรง
      description: ระบุรูปแบบของโครงสร้างนิรภัยในยานพาหนะ เช่น โครงแบบเต็มคันหรือโครงแบบครึ่งคัน
    calculator_accessory_type:
      name: ประเภทอุปกรณ์เครื่องคิดเลข
      description: ระบุประเภทของอุปกรณ์เสริมเครื่องคิดเลข เช่น ม้วนกระดาษหรืออะแดปเตอร์เครื่องพิมพ์
    calculator_features:
      name: คุณลักษณะเครื่องคิดเลข
      description: อธิบายฟังก์ชันที่เครื่องคิดเลขสามารถทำได้ เช่น การคำนวณสินเชื่อหรือการวิเคราะห์ทางสถิติ
    calendar/organizer_features:
      name: คุณลักษณะของปฏิทิน/กล่องใส่เครื่องเขียน
      description: อธิบายคุณลักษณะพิเศษของปฏิทินหรือผู้จัดงาน เช่น ช่วงการนัดหมายหรือวันหยุดที่ทำเครื่องหมายไว้
    calendar_format:
      name: รูปแบบปฏิทิน
      description: ระบุกรอบเวลาของผลิตภัณฑ์ปฏิทิน เช่น รายวันหรือรายเดือน
    calibration_sensor_type:
      name: ประเภทเซ็นเซอร์ปรับเทียบ
      description: ระบุเทคโนโลยีฮาร์ดแวร์พื้นฐานหรือรูปแบบของเครื่องปรับเทียบ
    call_blocking_method:
      name: วิธีการบล็อกสาย
      description: ระบุว่าอุปกรณ์ระบุและบล็อกสายที่ไม่ต้องการอย่างไร
    caller_id_compatibility:
      name: ความเข้ากันได้กับระบบแสดงหมายเลข
      description: ระบุว่าโทรศัพท์รองรับบริการแสดงหมายเลขที่ให้บริการโดยเครือข่ายโทรศัพท์หรือไม่
    caller_id_standard_compatibility:
      name: ความเข้ากันได้ของมาตรฐานการแสดงหมายเลขผู้โทร
      description: ระบุรูปแบบสัญญาณแสดงหมายเลขผู้โทรที่อุปกรณ์สามารถถอดรหัสได้
    cam_system:
      name: ระบบลูกเบี้ยว
      description: ระบุระบบลูกเบี้ยวที่ใช้ในอุปกรณ์ยิงธนู เช่น ไฮบริด แบบเดี่ยว
    camera_attachment:
      name: อุปกรณ์ติดกล้อง
      description: ระบุชิ้นส่วนหรืออุปกรณ์เสริมของกล้อง เช่น ช่องมองภาพแบบมุมหรืออะแดปเตอร์ช่องมองภาพ
    camera_button/knob_type:
      name: ประเภทปุ่ม/ปุ่มหมุนของกล้อง
      description: ระบุปุ่มหรือปุ่มหมุนบนกล้อง เช่น ปุ่มกดชัตเตอร์ ปุ่มหมุนเลือกโหมด
    camera_control_type:
      name: ประเภทตัวควบคุมกล้อง
      description: ระบุประเภทของรีโมทคอนโทรลของกล้อง เช่น สวิตช์ระยะไกล การกดชัตเตอร์
    camera_display_technology:
      name: เทคโนโลยีของจอแสดงผลกล้อง
      description: ระบุเทคโนโลยีหน้าจอของกล้อง เช่น OLED, Super AMOLED
    camera_features:
      name: คุณลักษณะของกล้อง
      description: ระบุความสามารถพิเศษของกล้อง เช่น ระบบป้องกันภาพสั่นไหวหรือการตรวจจับใบหน้า
    camera_gear_type:
      name: ประเภทเฟืองกล้อง
      description: ระบุประเภทของอุปกรณ์กล้อง เช่น ไดรฟ์กล้องหรือชุดควบคุมการโฟกัส
    camera_hd_type:
      name: ประเภทกล้อง HD
      description: ระบุคุณภาพวิดีโอของกล้อง เช่น Quad HD หรือ 8K ultra HD
    camera_lens_material:
      name: วัสดุสำหรับเลนส์กล้อง
      description: ระบุองค์ประกอบของเลนส์กล้องหรือกล้องวิดีโอ เช่น แก้วหรือพลาสติก
    camera_lens_type:
      name: ประเภทเลนส์กล้อง
      description: ระบุประเภทของเลนส์กล้อง เช่น มาโครหรือเทเลโฟโต้
    camera_mounting_type:
      name: ประเภทการติดตั้งเลนส์เลนส์กับกล้อง
      description: ระบุวิธีการติดกล้อง เช่น ขาตั้งกล้อง คลิปออน
    camera_sensor_type:
      name: ประเภทเซนเซอร์กล้อง
      description: ระบุประเภทของเซ็นเซอร์ในกล้องหรือเลนส์ เช่น CMOS, CCD
    camera_shape:
      name: รูปทรงของกล้อง
      description: อธิบายลักษณะการออกแบบกล้องวงจรปิด เช่น Bullet หรือ Box
    candle_kit_items_included:
      name: รายการอุปกรณ์ทำเทียนที่รวมอยู่
      description: ระบุสิ่งของที่ให้มาในชุดเทียน เช่น ไส้เทียนหรือหม้อหลอมขี้ผึ้ง
    candle_material:
      name: วัสดุที่ใช้ทำเทียน
      description: ระบุประเภทของขี้ผึ้งหรือวัสดุที่ใช้ในเทียน เช่น ขี้ผึ้งพาราฟินหรือขี้ผึ้ง
    candle_shape:
      name: รูปร่างเทียน
      description: อธิบายรูปทรงของเทียน เช่น ทรงกระบอกหรือสี่เหลี่ยม
    candle_type:
      name: ประเภทเทียน
      description: ระบุการออกแบบเทียน เช่น เรียวหรือทีไลท์
    cane_base_design:
      name: การออกแบบฐานไม้เท้า
      description: ระบุการกำหนดค่าของฐานรองรับของไม้เท้า
    canned_meat_variety:
      name: ลักษณะเนื้อกระป๋อง
      description: แยกความแตกต่างระหว่างเนื้อสัตว์กระป๋องประเภทต่างๆ เช่น ไก่งวงหรือแฮม
    canopy_color:
      name: สีกันสาด
      description: ระบุเฉดสีของหลังคาร่มหรือร่มกันแดด เช่น สีดำ
    canopy_material:
      name: วัสดุสำหรับผ้าคลุม
      description: ระบุวัสดุที่ใช้ทำร่มหรือบังแดด เช่น ผ้าฝ้ายหรือไวนิล
    canopy_pattern:
      name: ลายกันสาด
      description: ระบุลวดลายที่มองเห็นได้บนร่มหรือหลังคาร่มกันแดด เช่น ลายตารางหมากรุกหรืองานศิลปะ
    cantilever_material:
      name: วัสดุแคนติลีเวอร์
      description: ระบุวัสดุของแคนติลีเวอร์ที่ยึดหัวเข็ม ส่งผลต่อความสามารถในการติดตามและลักษณะเสียง
    canvas_finish:
      name: ฟินิชลุคผ้าใบ
      description: บ่งชี้ว่าผ้าใบพร้อมสำหรับการวาดภาพหรือไม่ เช่น ลงสีรองพื้นแล้ว
        หรือไม่ได้ลงสีรองพื้นแล้ว
    canvas_material:
      name: วัสดุสำหรับผ้าใบ
      description: ระบุประเภทของผ้าที่ใช้ในการประดิษฐ์ผืนผ้าใบ เช่น ผ้าฝ้ายหรือผ้าลินิน
    canvas_texture:
      name: พื้นผิวผ้าใบ
      description: อธิบายความรู้สึกพื้นผิวของผืนผ้าใบ เช่น ลายเรียบหรือลายกลาง
    capacitance_tolerance:
      name: ความคลาดเคลื่อนความจุ
      description: ระบุค่าเบี่ยงเบนที่อนุญาตของความจุจริงจากค่าที่ระบุ แสดงเป็นเปอร์เซ็นต์
    capacitor_application:
      name: การใช้งานตัวเก็บประจุ
      description: แสดงการใช้งานหลักที่ตั้งใจไว้หรือคลาสแอปพลิเคชันของตัวเก็บประจุ
        (เช่น มอเตอร์รัน, เสียง, สนับเบอร์)
    capacitor_polarity:
      name: ขั้วของตัวเก็บประจุ
      description: ระบุว่าตัวเก็บประจุมีขั้ว, ไม่มีขั้ว หรือสองขั้ว ส่งผลต่อทิศทางการติดตั้งและตำแหน่งวงจรที่เหมาะสม
    car_freshener_fragrance:
      name: น้ำหอมปรับอากาศรถยนต์
      description: ระบุกลิ่นของน้ำหอมปรับอากาศในรถยนต์ เช่น ลาเวนเดอร์ หรือรถใหม่
    car_seat_installation:
      name: การติดตั้งเบาะรถยนต์
      description: ระบุวิธีการติดตั้งคาร์ซีทสำหรับเด็ก เช่น สลักหรือเข็มขัดนิรภัย
    car_seat_orientation:
      name: การวางแนวคาร์ซีท
      description: ระบุทิศทางที่คาร์ซีทสำหรับเด็กหันหน้าไป เช่น หันไปด้านหลังหรือหันไปด้านหน้า
    car_type:
      name: ประเภทรถ
      description: ระบุหมวดหมู่ของยานพาหนะ เช่น SUV หรือรถเก๋ง
    carabiner_gate_type:
      name: ประเภทที่เปิดคาราบิเนอร์
      description: ระบุประเภทของเกทบนคาราไบเนอร์สำหรับปีนเขา เช่น เกทแบบเกลียวหรือเกทแบบงับ
    carabiner_shape:
      name: รูปร่างคาราบิเนอร์
      description: ระบุรูปแบบของคาราไบเนอร์ที่ใช้ในการปีนเขา เช่น HMS หรือลูกแพร์
    card/adapter_installation:
      name: การติดตั้งการ์ด/อะแดปเตอร์
      description: ระบุวิธีการติดตั้งการ์ด I/O หรืออะแดปเตอร์ เช่น ภายในหรือภายนอก
    card_attributes:
      name: คุณสมบัติของการ์ด
      description: อธิบายคุณลักษณะพิเศษของการ์ดสะสม เช่น ฟอยล์หรือโฮโลแกรม
    card_design:
      name: การออกแบบบัตร
      description: ระบุรูปแบบของสถานที่หรือบัตรตอบรับ เช่น พับหรือแบน
    card_format:
      name: รูปแบบบัตร
      description: อธิบายลักษณะของบัตรเชิญหรือการ์ด เช่น การ์ดแบนหรือการ์ดพับ
    card_holder_design:
      name: การออกแบบที่ใส่บัตร
      description: อธิบายสไตล์หรือรูปแบบของที่ใส่การ์ดระบุที่นั่งแขก เช่น แบบหนีบหรือแบบตั้ง
    card_interface_type:
      name: ประเภทอินเทอร์เฟซการ์ด
      description: อธิบายว่าตัวอ่านสื่อสารผ่านหน้าสัมผัสทางกายภาพ, RF ไร้สัมผัส, หรือทั้งสองอย่าง
    card_rechargeability:
      name: ความสามารถในการรีชาร์จในบัตร
      description: ระบุว่าสามารถโหลดยอดคงเหลือในบัตรได้หรือไม่หลังจากใช้เครดิตเริ่มต้นแล้ว
        และวิธีการรีชาร์จหลัก
    card_size:
      name: ขนาดบัตร
      description: ใช้เพื่อระบุขนาดของการ์ดอวยพรหรือโน้ต เช่น A4, Letter
    card_usage_status:
      name: สถานะการใช้งานบัตร
      description: ระบุว่าเครดิตของบัตรโทรศัพท์ได้ถูกใช้ไปแล้วหรือยังคงอยู่ครบถ้วน
    care_instructions:
      name: คำแนะนำการดูแล
      description: ให้คำแนะนำในการดูแลรักษาผลิตภัณฑ์ เช่น ซักมือหรือซักแห้งเท่านั้น
    carry_options:
      name: ตัวเลือกการพกพา
      description: ระบุวิธีการยกที่ใช้ได้สำหรับสิ่งของ เช่น ที่จับหรือสายสะพาย
    carrying_positions:
      name: ตำแหน่งการพกพา
      description: ระบุวิธีสวมใส่เป้อุ้มเด็กแบบต่างๆ เช่น สะพายข้างหรือสะพายหลัง
    carrying_type:
      name: ประเภทการพกพา
      description: อธิบายวิธีการพกพาสินค้า เช่น กระเป๋าถือหรือสายสะพาย
    cart_design:
      name: การออกแบบรถเข็น
      description: อธิบายเค้าโครงหรือโครงสร้างของรถเข็นทางการแพทย์ เช่น ตะขอคู่หรือแบบมีฐาน
    cart_type:
      name: ประเภทการพกพา
      description: ระบุแหล่งพลังงานสำหรับรถกอล์ฟ เช่น ไฟฟ้าหรือแก๊ส
    cartridge_authenticity:
      name: ความแท้ของตลับหมึก
      description: ระบุว่าวัสดุสิ้นเปลืองเป็นของผู้ผลิตต้นฉบับ ใช้ร่วมกันได้ ผลิตใหม่
        หรือเติมใหม่
    cartridge_mounting_style:
      name: สไตล์การติดตั้งหัวเข็ม
      description: ระบุวิธีที่หัวเข็มติดกับโทนอาร์มหรือเฮดเชลล์ (เช่น การติดตั้งครึ่งนิ้ว,
        P-mount) เพื่อให้แน่ใจถึงความเข้ากันได้เชิงกล
    cartridge_type:
      name: ประเภทม้วนเทป
      description: ระบุเทคโนโลยีหัวเข็มในเครื่องเล่นแผ่นเสียง เช่น เซรามิกหรือแม่เหล็ก
    cartridge_yield_type:
      name: ประเภทความจุตลับหมึก
      description: ระบุระดับความจุที่ผู้ผลิตกำหนดของตลับหมึก (เช่น มาตรฐาน ความจุสูง)
    case_color:
      name: สีเคส
      description: ระบุสีตัวเรือนของสินค้า เช่น สีใสหรือสีขาว
    case_pattern:
      name: ลวดลายเคส
      description: อธิบายการออกแบบหรือลวดลายบนเคสของผลิตภัณฑ์ เช่น ลายดอกไม้หรือเรขาคณิต
    case_transparency_level:
      name: ระดับความโปร่งใสของเคส
      description: บ่งบอกว่าเคสนี้โปร่งใสแค่ไหน
    case_type:
      name: ประเภทเคส
      description: ระบุประเภทของเคสสำหรับผลิตภัณฑ์อิเล็กทรอนิกส์และอุปกรณ์เสริม เช่น
        กระเป๋าเงินหรือสไตล์หนังสือ
    cassette_adapter_type:
      name: ประเภทอะแดปเตอร์เทปคาสเซ็ท
      description: ระบุประเภทของอะแดปเตอร์เทปคาสเซ็ต เช่น เชื่อม 3.5 มม. กับคาสเซ็ท
        เชื่อมบลูทูธกับคาสเซ็ท
    cat_age_group:
      name: กลุ่มอายุแมว
      description: ระบุผลิตภัณฑ์ที่เหมาะสมสำหรับช่วงชีวิตของแมวโดยเฉพาะ เช่น ลูกแมว
        แมวสูงวัย
    cat_litter_formula:
      name: สูตรวัสดุสำหรับห้องน้ำแมว
      description: ระบุองค์ประกอบของทรายแมว เช่น เม็ดหรือดินเหนียว
    cbd_ingredients:
      name: ส่วนผสมของ CBD
      description: ระบุส่วนประกอบเฉพาะที่เกี่ยวข้องกับ CBD ในผลิตภัณฑ์ เช่น CBD แบบเต็มสเปกตรัมหรือสารให้ความหวาน
    celebration_type:
      name: ประเภทการเฉลิมฉลอง
      description: ระบุโอกาสที่ผลิตภัณฑ์เหมาะสม เช่น คริสต์มาสหรือวันรับปริญญา
    cellular_capability:
      name: ความสามารถเซลลูลาร์
      description: ระบุว่ารุ่นนี้รองรับเครือข่ายมือถือนอกเหนือจาก Wi-Fi หรือไม่
    cervix_height_suitability:
      name: ความเหมาะสมกับความสูงปากมดลูก
      description: ระบุความสูงปากมดลูก (เช่น ต่ำ ปานกลาง สูง) ที่ถ้วยได้รับการปรับให้เหมาะสมเพื่อให้แน่ใจว่าพอดี
    chain_link_type:
      name: ประเภทการเชื่อมต่อโซ่
      description: ระบุรูปแบบของสร้อยสำหรับเครื่องประดับ เช่น แบบเชือกหรือแบน
    chain_type:
      name: ประเภทโซ่
      description: ระบุประเภทของโซ่ที่ใช้ในชิ้นส่วนทางเรือ เช่น BBB หรือ High test
        (HT)
    chair/sofa_features:
      name: คุณลักษณะของเก้าอี้/โซฟา
      description: ระบุคุณลักษณะเฉพาะของเฟอร์นิเจอร์ที่นั่ง เช่น ป้องกันคราบ หรือปรับเอนด้วยไฟฟ้า
    chair_features:
      name: คุณลักษณะของเก้าอี้
      description: เน้นฟังก์ชั่นพิเศษของเก้าอี้ เช่น ฟังก์ชั่นนวดหรือปรับเอนด้วยไฟฟ้า
    chalkboard_surface:
      name: พื้นผิวกระดานดำ
      description: ระบุประเภทของพื้นผิวบนกระดานดำ เช่น แม่เหล็กหรือแบบดั้งเดิม
    changing_mat/tray_features:
      name: คุณลักษณะเบาะ/ถาดเปลี่ยนผ้าอ้อม
      description: อธิบายคุณลักษณะพิเศษของเสื่อ/ถาดเปลี่ยนผ้าอ้อมเด็ก เช่น ช่องเก็บของในตัวหรือแบบพกพา
    changing_mat_features:
      name: คุณลักษณะเบาะเปลี่ยนผ้าอ้อม
      description: อธิบายลักษณะพิเศษของเสื่อเปลี่ยนผ้าอ้อมเด็ก เช่น ช่องเก็บของในตัวหรือแบบพกพา
    changing_tray_features:
      name: คุณลักษณะถาดเปลี่ยนผ้าอ้อม
      description: อธิบายลักษณะพิเศษของถาดเปลี่ยนผ้าอ้อมสำหรับทารก เช่น ช่องเก็บของในตัวหรือสายรัดนิรภัย
    charcoal_source_material:
      name: วัสดุที่ใช้ผลิตถ่านกัมมันต์
      description: ระบุวัตถุดิบที่ถ่านกัมมันต์มาจาก
    charger_style:
      name: รูปแบบเครื่องชาร์จ
      description: กำหนดรูปแบบทางกายภาพหรือการออกแบบโดยรวมของเครื่องชาร์จไร้สาย
    charger_type:
      name: ประเภทเครื่องชาร์จ
      description: ระบุประเภทของเครื่องชาร์จสำหรับแบตเตอรี่รถยนต์ เช่น แบบธรรมดาหรือแบบอัจฉริยะ
    charging_cable_type:
      name: ประเภทสายชาร์จ
      description: ระบุชนิดของสายชาร์จ EV เช่น ระดับ 3 หรืออะแดปเตอร์
    charging_interface_type:
      name: ประเภทอินเทอร์เฟซการชาร์จ
      description: ระบุพอร์ตทางกายภาพหรือวิธีการที่ใช้ในการชาร์จชุดไฟ (เช่น USB-C,
        Micro-USB, การชาร์จแบบไร้สาย)
    charging_level:
      name: ระดับการชาร์จ
      description: ระบุระดับพลังงานของสถานีชาร์จ EV เช่น ระดับ 1 (120v) หรือระดับ
        2 (240v)
    charging_method:
      name: วิธีการชาร์จ
      description: ระบุวิธีการชาร์จอุปกรณ์อิเล็กทรอนิกส์ เช่น ไร้สาย แบบใช้สาย
    chassis_type:
      name: ประเภทโครงรถ
      description: ระบุฟอร์มแฟคเตอร์ของเคสคอมพิวเตอร์และเซิร์ฟเวอร์ เช่น แบบทาวเวอร์หรือแร็ค
    chemical_application:
      name: การใช้สารเคมี
      description: ระบุการใช้งานหลักของผลิตภัณฑ์เคมี เช่น การกันน้ำ การทำความสะอาด
    chemical_container_type:
      name: ประเภทภาชนะบรรจุสารเคมี
      description: ระบุประเภทของภาชนะสำหรับน้ำยาทำความสะอาดท่อระบายน้ำ เช่น เจอร์ริแกนหรือแพ็คแบบแบ่งบรรจุ
    chemical_grade:
      name: เกรดสารเคมี
      description: บ่งบอกถึงคุณภาพและความบริสุทธิ์ของสารเคมี เช่น เกรดอาหารหรือเกรดห้องปฏิบัติการ
    chemical_product_form:
      name: รูปแบบผลิตภัณฑ์สารเคมี
      description: ระบุรูปแบบของผลิตภัณฑ์เคมี เช่น เจลหรือเม็ด
    chemical_purity:
      name: ความบริสุทธิ์ของสารเคมี
      description: ระบุระดับความบริสุทธิ์ในผลิตภัณฑ์เคมี เช่น >90% หรือ >95%
    chemical_safety_features:
      name: คุณลักษณะด้านความปลอดภัยของสารเคมี
      description: เน้นประเด็นด้านความปลอดภัยของสารเคมี เช่น ไม่ติดไฟหรือสารก่อภูมิแพ้
    chicken_feed_stage:
      name: ระยะอาหารไก่
      description: ระบุช่วงอายุที่เหมาะสมสำหรับอาหารไก่ เช่น อาหารเริ่มต้นหรือไก่ไข่
    child_seat_placement:
      name: การจัดวางที่นั่งเด็ก
      description: ระบุตำแหน่งของเบาะนั่งเด็กบนจักรยาน เช่น ด้านหน้าหรือด้านหลัง
    chin_strap_style:
      name: รูปแบบสายรัดคาง
      description: ระบุการออกแบบโครงสร้างหรือการกำหนดค่าของสายรัด (เช่น สายเดี่ยว
        เต็มศีรษะ แบบวงกลม)
    chipper_technology:
      name: เทคโนโลยีชิปเปอร์
      description: ระบุประเภทของเทคโนโลยีที่ใช้ในเครื่องย่อย เช่น สกรูหรือดรัม
    chiropractic_table_design:
      name: การออกแบบโต๊ะสำหรับการบำบัดโรคโดยวิธีการจับกระดูกสันหลัง
      description: อธิบายลักษณะการทำงานของโต๊ะไคโรแพรคติก เช่น การตกหรือระดับความสูง
    chocolate_type:
      name: ประเภทช็อคโกแลต
      description: กำหนดชนิดของช็อกโกแลตตามส่วนผสมและปริมาณโกโก้ เช่น ช็อกโกแลตดำ
        ช็อกโกแลตนม
    cholesterol_analyte_measured:
      name: สารคอเลสเตอรอลที่วัด
      description: แสดงรายการไบโอมาร์กเกอร์เฉพาะที่อุปกรณ์สามารถวัดหรือคำนวณนอกเหนือจากคอเลสเตอรอลทั้งหมด
    chuck_type:
      name: ประเภทหัวจับ
      description: ระบุชนิดของหัวจับในเครื่องมือฮาร์ดแวร์ เช่น SDS หรือ SDS max
    cigar_body:
      name: ก้านซิการ์
      description: ระบุความแรงและรสชาติของซิการ์ เช่น อ่อน ปานกลางถึงแรง
    circuit_board_features:
      name: คุณลักษณะของแผงวงจร
      description: อธิบายลักษณะเฉพาะของแผงวงจร เช่น กราฟิกออนบอร์ดหรือการรองรับการโอเวอร์คล็อก
    circuit_breaker_design:
      name: การออกแบบตัวตัดวงจร
      description: อธิบายรูปแบบการติดตั้งเซอร์กิตเบรกเกอร์ เช่น สลักออนหรือปลั๊กอิน
    circuit_breaker_panel_form:
      name: รูปแบบแผงตัวตัดวงจร
      description: ระบุประเภทของแผงเซอร์กิตเบรกเกอร์ เช่น กล่องขนาดเล็กหรือกล่องขึ้นรูป
    circuit_breaker_type:
      name: ประเภทตัวตัดวงจร
      description: ระบุประเภทของเซอร์กิตเบรกเกอร์ เช่น มาตรฐาน หรือ AFCI
    clarinet_key_system:
      name: ระบบคีย์คลาริเน็ต
      description: ระบุระบบกุญแจสำหรับคลาริเน็ต เช่น Albert หรือ Boehm
    clasp_type:
      name: ประเภทตัวล็อค
      description: ระบุประเภทตัวล็อคสำหรับอุปกรณ์เสริม เช่น แบบหัวเข็มขัดหรือแบบผีเสื้อ
    claw_design:
      name: การออกแบบที่จับ
      description: ระบุรูปร่างของกรงเล็บของไม้เกาหลัง เช่น โค้งมนหรือแหลม
    clay/slip_texture:
      name: พื้นผิวดินเหนียว/ลื่น
      description: อธิบายเนื้อสัมผัสและความสม่ำเสมอของดินเหนียวหรือน้ำดินเหนียว เช่น
        หยาบหรือเรียบ
    clay_texture:
      name: พื้นผิวดินเหนียว
      description: อธิบายความรู้สึกและความสม่ำเสมอของผลิตภัณฑ์จากดินเหนียว เช่น ปานกลางหรือเรียบ
    cleaner_purpose:
      name: วัตถุประสงค์ของน้ำยาทำความสะอาด
      description: ระบุการใช้น้ำยาทำความสะอาดทางเรือโดยเฉพาะ เช่น ตัวเรือหรือดาดฟ้า
    cleaning_instructions:
      name: คำแนะนำในการทำความสะอาด
      description: คำแนะนำเกี่ยวกับวิธีการทำความสะอาดที่แนะนำ เช่น ล้างในเครื่องล้างจานได้หรือล้างด้วยมือเท่านั้น
    cleaning_kit_components_included:
      name: ส่วนประกอบชุดทำความสะอาดที่รวมอยู่
      description: ระบุรายการสิ่งของเฉพาะที่อยู่ในชุดเพื่อให้ลูกค้าเข้าใจว่าได้รับเครื่องมือและวัสดุสิ้นเปลืองอะไรบ้าง
    cleaning_mode:
      name: โหมดทำความสะอาด
      description: แสดงรายการโหมดการทำความสะอาดหรือการใช้ไหมขัดฟันเฉพาะที่มีบนอุปกรณ์
    cleaning_purpose:
      name: วัตถุประสงค์ในการทำความสะอาด
      description: ระบุวัตถุประสงค์การใช้ผลิตภัณฑ์ทำความสะอาดหรือซักผ้า เช่น ให้ความสดชื่น
        คราบ
    cleaning_surfaces:
      name: การทำความสะอาดพื้นผิว
      description: ระบุพื้นผิวที่เหมาะสมสำหรับผลิตภัณฑ์ทำความสะอาด เช่น พื้นผิวกระจกหรือเตาตั้งพื้น
    cleaning_technology:
      name: เทคโนโลยีการทำความสะอาด
      description: อธิบายการเคลื่อนไหวหรือกลไกหลักที่แปรงสีฟันใช้เพื่อทำความสะอาดฟัน
    cleanse_focus:
      name: จุดเน้นการล้างพิษ
      description: ระบุระบบร่างกายหลักหรือวัตถุประสงค์ที่ผลิตภัณฑ์ล้างพิษมุ่งเป้า
    cleanser_type:
      name: ประเภทคลีนเซอร์
      description: อธิบายพื้นผิวหรือรูปแบบเฉพาะของคลีนเซอร์
    cleat_type:
      name: ประเภทราวเกาะ
      description: ระบุรูปแบบของปุ่มสตั๊ดที่ใช้ในการเชื่อมต่อ เช่น ฐานพลิกขึ้นหรือเปิด
    climbing_activity:
      name: กิจกรรมปีนเขา
      description: ระบุประเภทกิจกรรมการปีนที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ เช่น
        การปีนเขาหรือการปีนน้ำแข็ง
    clip_type:
      name: ประเภทคลิป
      description: ระบุสไตล์คลิปบนรายการต่างๆ เช่น คลิปบอร์ด เช่น ความจุสูง
    clipper/trimmer_type:
      name: ประเภทอุปกรณ์ตัดแต่งขนและผม
      description: ระบุแหล่งพลังงานของปัตตาเลี่ยนหรือทริมเมอร์ เช่น แบบมีสายหรือไร้สาย
    clipper_motor_type:
      name: ประเภทมอเตอร์ปัตตาเลี่ยน
      description: อธิบายการออกแบบมอเตอร์กลไกที่ขับเคลื่อนอุปกรณ์ (เช่น แบบหมุน แบบโรตารี่
        แบบแม่เหล็ก แบบไร้แปรง)
    clock_and_alarm_features:
      name: คุณสมบัตินาฬิกาและนาฬิกาปลุก
      description: ระบุรายละเอียดนาฬิกาในตัวและความสามารถในการปลุก/พักเครื่อง ที่วิทยุนี้มีให้
    closure_style:
      name: สไตล์การปิด
      description: ระบุวิธีการที่ใช้ในการปิดตัวสินค้า โดยทั่วไปจะเป็นชุดเครื่องนอน
        เช่น แบบดั้งเดิม แบบซ่อนซิป
    closure_type:
      name: ประเภทการปิด
      description: ระบุวิธีการที่ใช้ในการติดหรือยึดสินค้า เช่น ซิปหรือหัวเข็มขัด
    cloth_treatment:
      name: การบำบัดผ้า
      description: ระบุว่าผ้าได้รับการบำบัดล่วงหน้าหรือไม่ และถ้าใช่ ลักษณะของการบำบัด
    clothing_accessory_material:
      name: วัสดุที่ใช้ทำเครื่องประดับเสื้อผ้า
      description: ระบุวัสดุหลักที่ใช้ในอุปกรณ์เสื้อผ้า เช่น หนังหรือผ้าลินิน
    clothing_features:
      name: คุณลักษณะเสื้อผ้า
      description: อธิบายคุณลักษณะเฉพาะของเครื่องแต่งกาย เช่น กันน้ำหรือกันรอยยับ
    club_subset:
      name: คลับย่อย
      description: 'จำแนกประเภทไม้กอล์ฟเป็นหมวดหมู่ย่อยตามชนิด เช่น แซนด์เวดจ์ เบลดพัตเตอร์ '
    club_type:
      name: ประเภทคลับ
      description: แบ่งประเภทไม้กอล์ฟตามการใช้งาน เช่น ไดรเวอร์ เหล็ก
    coating/sealant_application:
      name: การใช้งานสารเคลือบผิว/สารกันรั่ว
      description: อธิบายการทำงานของสารเคลือบป้องกันและสารเคลือบหลุมร่องฟัน เช่น การป้องกันสภาพอากาศ
        การป้องกันสนิม
    coaxial_cable_series:
      name: ซีรีส์สายโคแอกเซียล
      description: ระบุซีรีส์หรือการกำหนดมาตรฐานอุตสาหกรรมของสายเคเบิล (เช่น RG-6,
        RG-58, LMR-400) ซึ่งกำหนดขนาดทางกายภาพและประสิทธิภาพทางไฟฟ้า
    cockpit_type:
      name: ประเภทห้องนักบิน
      description: ระบุการออกแบบและเทคโนโลยีที่ใช้ในห้องนักบินของเครื่องบิน เช่น แบบอนาล็อกหรือไฮบริด
    cocktail_decoration_design:
      name: การออกแบบที่ประดับค็อกเทล
      description: ระบุรูปแบบหรือสไตล์ของอุปกรณ์งานเลี้ยงค็อกเทล เช่น ลายจุดหรือรูปทรงแปลกใหม่
    cocktail_decoration_material:
      name: วัสดุตกแต่งแก้วค็อกเทล
      description: ระบุสารตกแต่งค็อกเทลที่ทำมาจาก เช่น พลาสติกหรือกระดาษ
    coffee/tea_set_pieces_included:
      name: ชิ้นส่วนชุดชา/กาแฟที่รวมอยู่
      description: ให้รายละเอียดสิ่งของแต่ละรายการภายในชุดกาแฟหรือชา เช่น ถ้วยและจานรอง
    coffee_creamer_variety:
      name: ลักษณะครีมเทียม
      description: แยกความแตกต่างระหว่างครีมเทียมประเภทต่างๆ เช่น แบบผง ปราศจากนม
    coffee_input_type:
      name: ประเภทอินพุตกาแฟ
      description: ระบุรูปแบบของกาแฟ เช่น แบบพ็อด เมล็ดกาแฟ
    coffee_product_form:
      name: รูปแบบผลิตภัณฑ์กาแฟ
      description: ระบุประเภทของผลิตภัณฑ์กาแฟ เช่น กาแฟบดหรือเมล็ดกาแฟ
    coffee_roast:
      name: กาแฟคั่ว
      description: ระบุระดับการคั่วของผลิตภัณฑ์กาแฟ เช่น อ่อน ปานกลาง เข้ม
    coil_connection:
      name: การเชื่อมต่อคอยล์
      description: ระบุความสามารถในการเปลี่ยนคอยล์ในอุปกรณ์สูบไอ เช่น แบบถาวรหรือแบบเปลี่ยนได้
    coin_material:
      name: วัสดุที่ใช้ทำเหรียญ
      description: ระบุประเภทของวัสดุที่ใช้สร้างเหรียญสะสม เช่น ทองแดง ทองแดง
    collagen_source:
      name: แหล่งคอลลาเจน
      description: ระบุแหล่งกำเนิดหลักของคอลลาเจนที่ใช้ในอาหารเสริม (เช่น วัว ทะเล
        พืช)
    collagen_type:
      name: ประเภทคอลลาเจน
      description: ระบุประเภทโมเลกุลคอลลาเจนที่ผลิตภัณฑ์ให้มา (เช่น Type I, II, III)
    collar/mount_compatible_device:
      name: อุปกรณ์ที่รองรับคอ/ที่ยึด
      description: ระบุอุปกรณ์ที่ใช้ร่วมกันได้สำหรับคอลลาร์หรือส่วนยึดขาตั้งกล้อง
        เช่น เลนส์ กล้อง
    collar/mount_design:
      name: การออกแบบคอ/ที่ยึด
      description: อธิบายการออกแบบคอลลาร์หรือส่วนยึดขาตั้งกล้อง เช่น แบบปลดเร็วหรือวงแหวน
    collar_lock_type:
      name: ประเภทอุปกรณ์ล็อคคอ
      description: ระบุประเภทของปลอกคอล็อคบนอุปกรณ์ยกน้ำหนัก เช่น สปินล็อคหรือแคลมป์สปริง
    color:
      name: สี
      description: ระบุสีหรือลวดลายหลัก เช่น สีน้ำเงินหรือลายทาง
    color_accuracy_standards:
      name: มาตรฐานความแม่นยำของสี
      description: ระบุมาตรฐานการปรับเทียบสี โดยทั่วไปสำหรับจอภาพ เช่น sRGB, Adobe
        RGB
    color_depth:
      name: ความลึกสี
      description: ระบุความลึกบิตแบบออปติคัล/เอาต์พุตของสแกนเนอร์ (จำนวนบิตต่อพิกเซล)
        ซึ่งกำหนดความแม่นยำของสี, การไล่ระดับ และความยืดหยุ่นในการแก้ไข
    color_saturation:
      name: ความอิ่มตัวของสี
      description: ระบุความเข้มของสีในฟิล์มของกล้อง เช่น สูง, ต่ำ
    comb/brush_size:
      name: ขนาดหวี/แปรง
      description: จัดประเภทขนาดทางกายภาพโดยรวมของแปรงหรือหวี
    comb_features:
      name: คุณสมบัติหวี
      description: แสดงรายการลักษณะประสิทธิภาพหรือการออกแบบที่โดดเด่นของหวี
    comb_tooth_spacing:
      name: ระยะห่างฟันหวี
      description: อธิบายระยะห่างหรือความหนาแน่นของฟันหวี
    comic_edition:
      name: ฉบับการ์ตูน
      description: ระบุเวอร์ชันหรือรุ่นวางจำหน่ายเฉพาะของหนังสือการ์ตูน ซึ่งอาจส่งผลต่อความหายากและมูลค่าสะสมได้
        เช่น ฉบับพิมพ์ครั้งแรก ปกฉบับต่างๆ
    comic_tradition:
      name: ประเพณีการ์ตูน
      description: บ่งบอกถึงวัฒนธรรมหรือประเพณีของภูมิภาคที่เป็นต้นกำเนิดของการ์ตูน
        เช่น การ์ตูนจีนหรือมังงะ
    commode_opening_type:
      name: ประเภทช่องเปิดโถส้วม
      description: ระบุการมีอยู่และสไตล์ของการตัดส่วนโถส้วมหรือความเข้ากันได้ของถังในที่นั่ง
    communication_device_features:
      name: คุณลักษณะของอุปกรณ์สื่อสาร
      description: ระบุคุณลักษณะเฉพาะในอุปกรณ์สื่อสาร เช่น หน้าจอสัมผัสหรือการควบคุมด้วยเสียง
    communication_protocols:
      name: เกณฑ์วิธีการสื่อสาร
      description: ระบุโปรโตคอลเครือข่ายที่ใช้ เช่น Modbus หรือ Profibus
    compass_style:
      name: สไตล์เข็มทิศ
      description: ระบุรูปแบบของเข็มทิศนำทาง เช่น เข็มทิศดำน้ำหรือไจโรคอมพาส
    compatible_accessibility_equipment_type:
      name: ประเภทอุปกรณ์เข้าถึงที่เข้ากันได้
      description: ระบุประเภทของอุปกรณ์เข้าถึงหรือการเคลื่อนที่ที่อุปกรณ์เสริมออกแบบมาเพื่อทำงานด้วย
    compatible_aircraft_type:
      name: ประเภทอากาศยานที่รองรับ
      description: ระบุประเภทของเครื่องบินที่เหมาะกับผลิตภัณฑ์ เช่น เครื่องบินหรือเฮลิคอปเตอร์
    compatible_amplifier:
      name: เครื่องขยายเสียงที่เข้ากันได้
      description: ระบุประเภทของแอมพลิฟายเออร์ที่ผลิตภัณฑ์เข้ากันได้ เช่น เบสหรือคีย์บอร์ด
    compatible_aquarium:
      name: พิพิธภัณฑ์สัตว์น้ำที่รองรับ
      description: ระบุว่าตู้ปลาประเภทใดเหมาะสำหรับผลิตภัณฑ์ เช่น ตู้ปลาทุกชนิด น้ำเค็ม
    compatible_baby_bottle_design:
      name: การออกแบบขวดนมที่เข้ากันได้
      description: ระบุรูปแบบขวดนมเด็กที่ผลิตภัณฑ์เข้ากันได้ เช่น ขวดคอกว้าง
    compatible_baby_carrier_type:
      name: ประเภทเป้อุ้มเด็กที่เข้ากันได้
      description: ระบุประเภทของเป้อุ้มเด็กที่ผลิตภัณฑ์ใช้งานร่วมกันได้ เช่น เป้อุ้มหรือแบบเป้สะพายหลัง
    compatible_baby_chair_type:
      name: ประเภทเก้าอี้เด็กทารกที่เข้ากันได้
      description: ระบุประเภทของเก้าอี้เด็กที่เหมาะกับผลิตภัณฑ์ เช่น รถเข็นสินค้าหรือร้านอาหาร
    compatible_baby_transport_type:
      name: ประเภทการเคลื่อนย้ายเด็กทารกที่ใช้ร่วมกันได้
      description: ระบุสิ่งของที่ใช้ในการเคลื่อนย้ายเด็กทารก เช่น รถเข็นเด็กหรือคาร์ซีท
    compatible_ball_type:
      name: ประเภทบอลที่รองรับ
      description: ระบุประเภทลูกที่เหมาะกับการใช้งานกับสินค้า เช่น เทนนิส วิฟเฟิล
    compatible_battery_size:
      name: ขนาดของแบตเตอรี่ที่รองรับ
      description: ระบุขนาดของแบตเตอรี่ที่ผลิตภัณฑ์เข้ากันได้ เช่น AAA, CR2032
    compatible_battery_technology:
      name: เทคโนโลยีแบตเตอรี่ที่รองรับ
      description: ระบุประเภทของเทคโนโลยีแบตเตอรี่ที่ผลิตภัณฑ์เข้ากันได้ เช่น ลิเธียมไอออนหรืออัลคาไลน์
    compatible_bench_positions:
      name: ตำแหน่งม้านั่งที่เข้ากันได้
      description: ระบุการปรับระดับ โดยทั่วไปสำหรับม้านั่งออกกำลังกาย เช่น ราบ หรือ
        ลาดลง
    compatible_bike_type:
      name: ประเภทจักรยานที่รองรับ
      description: ระบุประเภทของจักรยานที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ เช่น
        จักรยานไฟฟ้าหรือเสือหมอบ
    compatible_brass_instrument:
      name: เครื่องดนตรีทองเหลืองที่เข้ากันได้
      description: ระบุเครื่องทองเหลืองที่ใช้ร่วมกับผลิตภัณฑ์ได้ เช่น ทรัมเป็ตหรือทูบา
    compatible_cable_tie_material:
      name: วัสดุเคเบิลไทที่เข้ากันได้
      description: ระบุประเภทของเคเบิลไท (เช่น สแตนเลส, ไนลอน) ที่ปืนได้รับการออกแบบมาเพื่อติดตั้งหรือถอด
    compatible_chemical_treatment_strength_level:
      name: ระดับความแรงของการรักษาทางเคมีที่เข้ากันได้
      description: ระบุความแรงหรือความแรงที่ผู้ผลิตแนะนำ (เช่น อ่อน ปกติ ซูเปอร์)
        ของการรักษาทางเคมี
    compatible_clarinet_type:
      name: ประเภทคลาริเน็ตที่เข้ากันได้
      description: ระบุประเภทของคลาริเน็ตที่ผลิตภัณฑ์เข้ากันได้ เช่น คลาริเน็ต A หรือสากล
    compatible_contact_lens_type:
      name: ประเภทคอนแทคเลนส์ที่ใช้ร่วมได้
      description: ระบุประเภทของคอนแทคเลนส์ที่สามารถเก็บหรือทำความสะอาดในตลับได้
    compatible_contact_lenses:
      name: คอนแทคเลนส์ที่ใช้กับผลิตภัณฑ์นี้ได้
      description: ระบุประเภทหรือวัสดุของคอนแทคเลนส์ที่สามารถใช้น้ำยานี้ได้อย่างปลอดภัย
    compatible_cosmetic_tools:
      name: อุปกรณ์แต่งหน้าที่เข้ากันได้
      description: ระบุว่าเครื่องมือเสริมความงามชนิดใดที่สามารถใช้ร่วมกับผลิตภัณฑ์นี้ได้
        เช่น ฟองน้ำ แหนบ
    compatible_device:
      name: อุปกรณ์ที่รองรับ
      description: ระบุว่าอุปกรณ์ใดบ้างที่ใช้งานร่วมกับอิเล็กทรอนิกส์ได้ เช่น สมาร์ทวอทช์หรือหูฟังไร้สาย
    compatible_drum_configuration:
      name: รูปร่างภายนอกของกลองที่เข้ากันได้
      description: ระบุการตั้งค่าดรัมที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อใช้งาน เช่น
        ดับเบิลเบสหรือไฮแฮท
    compatible_electric/acoustic_instrument:
      name: เครื่องดนตรีไฟฟ้า/อะคูสติกที่เข้ากันได้
      description: ระบุเครื่องดนตรีไฟฟ้าหรืออะคูสติกที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อใช้งาน
        เช่น กีตาร์ไฟฟ้าหรือซินธิไซเซอร์
    compatible_electronic_card_type:
      name: ประเภทบัตรอิเล็กทรอนิกส์ที่รองรับ
      description: ระบุประเภทของการ์ดอิเล็กทรอนิกส์ที่ผลิตภัณฑ์สามารถโต้ตอบได้ เช่น
        แบบแถบแม่เหล็กหรือ Library
    compatible_equipment_type:
      name: ประเภทอุปกรณ์ที่เข้ากันได้
      description: ระบุประเภทของอุปกรณ์สระน้ำหรือสปาที่แผงวงจรได้รับการออกแบบมาโดยเฉพาะ
        (เช่น เครื่องทำความร้อน ปั๊ม เครื่องผลิตคลอรีน)
    compatible_exercise_machine_type:
      name: ประเภทเครื่องออกกำลังกายที่เข้ากันได้
      description: ระบุประเภทของเครื่องออกกำลังกายที่ต้องการให้นำบอร์ดมาใช้ (เช่น
        ลู่วิ่ง เครื่องเดินวงรี)
    compatible_exercises:
      name: การออกกำลังกายที่รองรับ
      description: ระบุการออกกำลังกายที่สามารถทำได้โดยใช้สินค้านี้ เช่น Chin-up หรือ
        Dip
    compatible_eyewear_type:
      name: ประเภทแว่นตาที่ใช้ร่วมได้
      description: ระบุประเภทของแว่นตาที่อุปกรณ์เสริมออกแบบมาเพื่อให้พอดีหรือใช้งานได้
    compatible_filament:
      name: เส้นใยที่รองรับ
      description: ระบุประเภทของเส้นพลาสติกที่เครื่องพิมพ์ 3 มิติสามารถใช้ได้ เช่น
        Polylactic acid (PLA) หรือไนลอน
    compatible_film_type:
      name: ประเภทฟิล์มที่เข้ากันได้
      description: ระบุประเภทของฟิล์มที่กล้องสามารถใช้ได้ เช่น ฟิล์มเนกาทีฟหรือฟิล์มสี
    compatible_flute_type:
      name: ประเภทฟลูตที่เข้ากันได้
      description: ระบุประเภทของฟลุตที่ผลิตภัณฑ์เข้ากันได้ เช่น แบบสากล พิคโคโล
    compatible_game_format:
      name: รูปแบบเกมที่รองรับ
      description: ระบุประเภทของรูปแบบเกมที่รองรับ เช่น ดาวน์โหลดแบบดิจิทัลเท่านั้น
        หรือ แผ่นดิสก์
    compatible_gardening_tool:
      name: เครื่องมือทำสวนที่เข้ากันได้
      description: ระบุว่าผลิตภัณฑ์สามารถใช้กับเครื่องมือทำสวนชนิดใดได้ เช่น คราดหรือพลั่ว
    compatible_hair_color:
      name: สีผมที่รองรับ
      description: จับคู่ผลิตภัณฑ์ให้เข้ากับสีผมเฉพาะ เช่น สีเงิน สีบลอนด์
    compatible_hammock_design:
      name: การออกแบบเปลญวนที่ใช้ร่วมกันได้
      description: ระบุประเภทของเปลที่สินค้าสามารถใช้ได้ เช่น แบบแขวน แบบโครง
    compatible_harmonica_type:
      name: ประเภทฮาร์โมนิกาที่เข้ากันได้
      description: ระบุประเภทของฮาร์โมนิกาที่ผลิตภัณฑ์ได้รับการออกแบบ เช่น ไดโทนิกหรือโครมาติก
    compatible_hdcp:
      name: HDCP ที่รองรับ
      description: ระบุความเข้ากันได้ของ HDCP ของอุปกรณ์อิเล็กทรอนิกส์ เช่น HDCP 2.2
        หรือไม่รองรับ
    compatible_instrument:
      name: เครื่องดนตรีที่เข้ากันได้
      description: ระบุเครื่องดนตรีที่ผลิตภัณฑ์ออกแบบมาเพื่อ เช่น กีตาร์หรือเปียโน
    compatible_keyboard_configuration:
      name: รูปร่างภายนอกของคีย์บอร์ดที่เข้ากันได้
      description: ระบุรูปแบบแป้นพิมพ์ที่เข้ากันได้กับผลิตภัณฑ์ เช่น 61 คีย์หรือ 76
        คีย์
    compatible_lock_type:
      name: ประเภทล็อคที่รองรับ
      description: ระบุประเภทการล็อคที่ผลิตภัณฑ์สามารถใช้งานได้ เช่น ระบบล็อคแบบใส่รหัสหรือระบบอิเล็กทรอนิกส์
    compatible_makeup:
      name: เครื่องสำอางที่เข้ากันได้
      description: ระบุผลิตภัณฑ์เครื่องสำอางที่เข้ากันได้ เช่น ลิปสติก อายแชโดว์
    compatible_mattress_size:
      name: ขนาดที่นอนที่ใช้ร่วมกันได้
      description: ระบุขนาดที่นอนที่เหมาะกับผลิตภัณฑ์นี้ เช่น คิง ทวิน
    compatible_memory_cards:
      name: การ์ดหน่วยความจำที่รองรับ
      description: ระบุประเภทของการ์ดหน่วยความจำที่ผลิตภัณฑ์สามารถใช้ได้ โดยทั่วไปใช้กับกล้อง
        เช่น SD, microSDHC
    compatible_microphone_thread:
      name: เธรดไมโครโฟนที่รองรับ
      description: ระบุขนาดเกลียวที่เข้ากันได้สำหรับผลิตภัณฑ์ไมโครโฟน เช่น 5/8"-27
    compatible_motherboard_form_factor:
      name: ฟอร์มแฟกเตอร์ของเมนบอร์ดที่รองรับ
      description: ระบุขนาดเมนบอร์ดที่ผลิตภัณฑ์สามารถรองรับได้ เช่น ATX
    compatible_oboe_type:
      name: ประเภทโอโบที่เข้ากันได้
      description: ระบุประเภทของโอโบที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อใช้งาน เช่น
        แตรสากลหรือแตรอังกฤษ
    compatible_operating_system:
      name: ระบบปฏิบัติการที่รองรับ
      description: ระบุความเข้ากันได้ของซอฟต์แวร์ของผลิตภัณฑ์ เช่น Windows, macOS
    compatible_orchestral_string_instrument:
      name: เครื่องสายออร์เคสตราที่เข้ากันได้
      description: ระบุเครื่องสายออร์เคสตราที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อใช้งาน
        เช่น ไวโอลินหรือเชลโล
    compatible_paper_size:
      name: ขนาดของกระดาษที่เข้ากันได้
      description: ระบุขนาดกระดาษที่อุปกรณ์สามารถรองรับได้ โดยทั่วไปจะใช้สำหรับเครื่องพิมพ์
        เช่น A4 โปสการ์ด
    compatible_patient_profile:
      name: โปรไฟล์ผู้ป่วยที่เข้ากันได้
      description: ระบุกลุ่มผู้ป่วยที่เหมาะสมสำหรับผลิตภัณฑ์ทางการแพทย์ เช่น เด็กหรือผู้สูงอายุ
    compatible_percussion_instrument:
      name: เครื่องเคาะจังหวะที่เข้ากันได้
      description: ระบุว่าผลิตภัณฑ์เครื่องเพอร์คัชชันชนิดใดที่สามารถใช้ร่วมกับกลองหรือบองโกได้
    compatible_pinball_machine_edition:
      name: รุ่นเครื่องพินบอลที่ใช้ร่วมได้
      description: ระบุว่าอุปกรณ์เสริมเหมาะกับรุ่นหรือระดับตกแต่งใดของเครื่องพินบอล
        (เช่น Pro, Premium, LE)
    compatible_play_vehicle_type:
      name: ประเภทรถของเล่นที่เข้ากันได้
      description: ระบุประเภทของยานพาหนะสำหรับเล่นที่เหมาะกับผลิตภัณฑ์ เช่น รถยนต์หรือเรือ
    compatible_player:
      name: เครื่องเล่นที่เข้ากันได้
      description: ระบุอุปกรณ์ที่สามารถใช้กับอะแดปเตอร์เทปคาสเซ็ต เช่น iPad แล็ปท็อป
    compatible_polish_thinner_type:
      name: ประเภทน้ำยาเจือจางยาทาเล็บที่ใช้ร่วมได้
      description: ระบุระบบการเคลือบเล็บที่น้ำยาเจือจางออกแบบมาเพื่อใช้งาน
    compatible_power_supply_form_factor:
      name: รูปแบบแหล่งจ่ายไฟที่เข้ากันได้
      description: ระบุขนาดหรือมาตรฐานหน่วยจ่ายไฟ (PSU) ที่ตู้ได้รับการออกแบบมาให้ใส่
    compatible_printer:
      name: เครื่องพิมพ์ที่รองรับ
      description: ระบุประเภทของเครื่องพิมพ์ที่ผลิตภัณฑ์เข้ากันได้ เช่น เลเซอร์หรืออิงค์เจ็ท
    compatible_processor_series:
      name: ซีรีส์ผู้ประมวลผลที่รองรับ
      description: ระบุซีรีส์ของโปรเซสเซอร์ที่ผลิตภัณฑ์ใช้งานร่วมกันได้ เช่น AMD Ryzen
        หรือ Intel core Solo
    compatible_programming_languages:
      name: ภาษาโปรแกรมที่รองรับ
      description: ระบุภาษาการเขียนโปรแกรมที่ผลิตภัณฑ์ซอฟต์แวร์สามารถใช้งานได้ เช่น
        Python หรือ Java
    compatible_recipes:
      name: สูตรอาหารที่รองรับ
      description: ระบุสูตรที่เหมาะสมสำหรับผลิตภัณฑ์ โดยทั่วไปใช้สำหรับเครื่องทำไอศกรีม
        เช่น เชอร์เบท เจลาโต้
    compatible_resin_type:
      name: ประเภทเรซิ่นที่เข้ากันได้
      description: ระบุประเภทของเรซิ่น UV ที่เครื่องพิมพ์ SLA/MSLA สามารถใช้ได้
    compatible_resolution:
      name: ความละเอียดที่รองรับ
      description: ระบุความละเอียดการแสดงผลที่รองรับ เช่น 1080p, Full HD
    compatible_satellite_radio_service:
      name: บริการวิทยุดาวเทียมที่เข้ากันได้
      description: ระบุบริการวิทยุดาวเทียมที่เครื่องรับออกแบบมาเพื่อทำงานด้วย เพื่อให้แน่ใจว่าเข้ากันได้กับการสมัครสมาชิกที่มีอยู่หรือที่ตั้งใจไว้
    compatible_seat_type:
      name: ประเภทที่นั่งที่เข้ากันได้
      description: ระบุประเภทของคาร์ซีทสำหรับเด็กที่เหมาะกับผลิตภัณฑ์ เช่น เบาะเสริมหรือคาร์ซีทสำหรับทารก
    compatible_shoe_size:
      name: ขนาดรองเท้าที่เข้ากันได้
      description: จับคู่ผลิตภัณฑ์กับขนาดรองเท้า เช่น 12, 42
    compatible_software_platform:
      name: แพลตฟอร์มซอฟต์แวร์ที่รองรับ
      description: ระบุแพลตฟอร์มซอฟต์แวร์ที่ผลิตภัณฑ์เข้ากันได้ เช่น Adobe Creative
        หรือ Canva
    compatible_special_effects_device:
      name: อุปกรณ์เอฟเฟกต์พิเศษที่เข้ากันได้
      description: ระบุอุปกรณ์เอฟเฟกต์พิเศษที่ผลิตภัณฑ์สามารถใช้งานได้ เช่น ไฟ LED
        หรือเครื่องพ่นหมอก
    compatible_stove_top_type:
      name: ประเภทเตาตั้งพื้นที่ใช้ร่วมกันได้
      description: ระบุประเภทของหน้าเตาที่ผลิตภัณฑ์สามารถใช้ได้ เช่น เตาแก๊สหรือเตาแม่เหล็กไฟฟ้า
    compatible_string_instrument:
      name: เครื่องสายที่เข้ากันได้
      description: ระบุว่าผลิตภัณฑ์นี้ออกแบบมาสำหรับเครื่องสายประเภทใด เช่น อูคูเลเล่หรือกีตาร์เบส
    compatible_stroller_type:
      name: ประเภทรถเข็นเด็กที่เข้ากันได้
      description: ระบุประเภทของรถเข็นเด็กที่เหมาะกับผลิตภัณฑ์ เช่น แบบก้านร่มหรือหรับวิ่งจ็อกกิ้ง
    compatible_vacuum_type:
      name: ประเภทเครื่องดูดฝุ่นที่รองรับ
      description: ระบุประเภทของเครื่องดูดฝุ่นที่ผลิตภัณฑ์ใช้งานร่วมกันได้ เช่น แบบพกพาหรือไอน้ำ
    compatible_vehicle:
      name: ยานพาหนะที่รองรับ
      description: ระบุประเภทของยานพาหนะที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ เช่น
        รถยนต์หรือ SUV
    compatible_voice_assistant:
      name: ผู้ช่วยเสียงที่เข้ากันได้
      description: ระบุแพลตฟอร์มควบคุมด้วยเสียงที่สามารถควบคุมเครื่องรับได้
    compatible_walking_aid_equipment:
      name: อุปกรณ์ช่วยเดินที่ใช้ร่วมกันได้
      description: ระบุว่าอุปกรณ์ช่วยเดินชนิดใดที่ผลิตภัณฑ์นี้ได้รับการออกแบบมาโดยเฉพาะ
        เช่น ไม้ค้ำยัน วอล์กเกอร์
    compatible_wax_container_size:
      name: ขนาดภาชนะแว็กซ์ที่ใช้ร่วมได้
      description: ระบุขนาดตลับ กระป๋อง หรือหม้อมาตรฐานที่สามารถวางในเครื่องอุ่นได้โดยตรงโดยไม่ต้องเทออก
    compatible_wax_form:
      name: รูปแบบแว็กซ์ที่ใช้ร่วมได้
      description: ระบุรูปแบบของแว็กซ์กำจัดขนที่เครื่องอุ่นออกแบบมาเพื่อละลาย
    compatible_weight_lifting_accessory:
      name: อุปกรณ์เสริมสำหรับการยกน้ำหนักที่ใช้ร่วมกันได้
      description: ระบุอุปกรณ์ยกน้ำหนักที่เข้ากันได้กับสินค้านี้ เช่น บาร์เบลหรือดัมบ์เบล
    compliance_certifications:
      name: การรับรองการปฏิบัติตามข้อกำหนด
      description: ระบุการรับรองการปฏิบัติตามข้อกำหนดของผลิตภัณฑ์ เช่น HIPAA หรือ
        FedRAMP
    component_mounting_style:
      name: สไตล์การติดตั้งส่วนประกอบ
      description: กำหนดวิธีหลักที่ส่วนประกอบอิเล็กทรอนิกส์หรือบอร์ดติดกับแผงวงจร,
        แผง, แชสซี หรือราง
    component_output_type:
      name: ประเภทส่วนประกอบเอาต์พุต
      description: ระบุประเภทสัญญาณเอาท์พุตของส่วนประกอบอิเล็กทรอนิกส์ เช่น UART หรือ
        อนาล็อก
    component_package_type:
      name: ประเภทบรรจุภัณฑ์ส่วนประกอบ
      description: ระบุฟอร์มแฟคเตอร์หรือบรรจุภัณฑ์ของชิ้นส่วนอิเล็กทรอนิกส์ เช่น SDM
        (Surface Mount Device), DIP (Dual In-line Package)
    component_size_code:
      name: รหัสขนาดส่วนประกอบ
      description: ระบุการกำหนดขนาด SMD หรือ through-hole มาตรฐาน (เช่น 0603, 0805)
        ที่ใช้สำหรับแพ็คเกจตัวเก็บประจุ
    component_tolerance:
      name: ความคลาดเคลื่อนของส่วนประกอบ
      description: กำหนดค่าเบี่ยงเบนที่อนุญาตจากค่าที่ระบุ (ความต้านทาน ความจุ ความเหนี่ยวนำ
        ความถี่ ฯลฯ) แสดงเป็นเปอร์เซ็นต์
    components_included:
      name: ส่วนประกอบที่รวมอยู่
      description: แสดงรายการชิ้นส่วนฮาร์ดแวร์ที่มาในชุดเริ่มต้น
    compression_circuit_type:
      name: ประเภทวงจรคอมเพรสเซอร์
      description: อธิบายเทคโนโลยีการลดเกนพื้นฐาน (เช่น VCA, FET, ออปติคัล) ที่กำหนดเสียงและการตอบสนองของโปรเซสเซอร์
    compression_format:
      name: รูปแบบการบีบอัด
      description: ระบุประเภทของการบีบอัดไฟล์วิดีโอที่ใช้ เช่น MPEG-4, AVI
    compression_level:
      name: ระดับการบีบอัด
      description: ระบุความรุนแรงของแรงกดในผลิตภัณฑ์ที่มีแรงบีบอัด เช่น เบา แน่น
    computer_accessories_included:
      name: รวมอุปกรณ์คอมพิวเตอร์
      description: ระบุอุปกรณ์เสริมคอมพิวเตอร์ที่มีให้ เช่น เมาส์หรือกระเป๋าแล็ปท็อป
    computer_form:
      name: รูปแบบคอมพิวเตอร์
      description: ระบุการออกแบบหรือเค้าโครงทางกายภาพของคอมพิวเตอร์ เช่น ออลอินวันหรือโน้ตบุ๊ก
    computer_server_features:
      name: คุณลักษณะเซิร์ฟเวอร์คอมพิวเตอร์
      description: อธิบายคุณลักษณะพิเศษของเซิร์ฟเวอร์ เช่น แหล่งจ่ายไฟสำรองหรือการสนับสนุนการจำลองเสมือน
    computer_specialized_features:
      name: คุณลักษณะพิเศษของคอมพิวเตอร์
      description: เน้นคุณลักษณะเฉพาะของคอมพิวเตอร์ เช่น ระบบระบายความร้อนด้วยของเหลวหรือไฟ
        RGB
    concertina_button_configuration:
      name: รูปร่างภายนอกของปุ่มคอนเซอร์ตินา
      description: ระบุจำนวนและโครงร่างของปุ่มบนคอนเสิร์ต เช่น แองโกลคอนเสิร์ตติน่า
        20 ปุ่ม
    condition:
      name: สภาพสินค้า
      description: อธิบายสถานะหรือคุณภาพของผลิตภัณฑ์ เช่น สภาพเหมือนใหม่ (M), สภาพแย่
        (P)
    conditioner_effect:
      name: ผลครีมนวดผม
      description: ระบุคุณประโยชน์ของครีมนวดผม เช่น ปรับผมให้เรียบหรือป้องกันรังแค
    condom_compatibility:
      name: ความเข้ากันได้ของถุงยางอนามัย
      description: ระบุว่าวัสดุถุงยางอนามัยใดที่สารหล่อลื่นปลอดภัยใช้ด้วย
    condom_fit_type:
      name: ประเภทความพอดีของถุงยางอนามัย
      description: อธิบายขนาดโดยรวมหรือรูปร่างทางกายวิภาคที่ออกแบบมาเพื่อปรับปรุงความสบายและความรู้สึก
    condom_type:
      name: ประเภทถุงยางอนามัย
      description: แยกความแตกต่างว่าถุงยางอนามัยมีไว้สำหรับผู้ชายหรือผู้หญิง
    conductivity_gel_application:
      name: การใช้งานเจลนำไฟฟ้า
      description: ระบุขั้นตอนทางการแพทย์หรือการวินิจฉัยที่ต้องการให้นำเจลหรือโลชั่นนำไฟฟ้ามาใช้
    conductor_core_type:
      name: ประเภทแกนตัวนำ
      description: ระบุว่าตัวนำภายในเป็นแบบตีเกลียวหรือแกนทึบ
    connecting_thread:
      name: เธรดการเชื่อมต่อ
      description: ระบุประเภทเกลียวสำหรับการต่อชิ้นส่วนประปา เช่น 1/2 นิ้ว IPS
    connection_method:
      name: วิธีเชื่อมต่อ
      description: ระบุประเภทการเชื่อมต่อที่ผลิตภัณฑ์ใช้ เช่น ไร้สายหรือแบบมีสาย
    connection_type:
      name: ประเภทการเชื่อมต่อ
      description: ระบุประเภทการเชื่อมต่อที่ใช้โดยอุปกรณ์อิเล็กทรอนิกส์ เช่น แบบใช้สายหรือบลูทูธ
    connectivity_technology:
      name: เทคโนโลยีการเชื่อมต่อ
      description: ระบุวิธีการถ่ายโอนข้อมูลในผลิตภัณฑ์ เช่น Bluetooth, USB
    connectivity_type:
      name: ประเภทการเชื่อมต่อ
      description: ชี้แจงว่าบอร์ดเป็นแบบไม่ต้องบัดกรี (สไตล์เบรดบอร์ด) หรือออกแบบมาสำหรับการบัดกรี
    connector_1_type:
      name: ประเภทขั้วต่อ 1
      description: ระบุขั้วต่อหรืออินเทอร์เฟซที่อยู่บนปลายแรกของอะแดปเตอร์หรือตัวเชื่อมต่อ
    connector_2_type:
      name: ประเภทขั้วต่อ 2
      description: ระบุขั้วต่อหรืออินเทอร์เฟซที่อยู่บนปลายที่สองของอะแดปเตอร์หรือตัวเชื่อมต่อ
    connector_contact_plating:
      name: การชุบหน้าสัมผัสขั้วต่อ
      description: ระบุการชุบผิวหรือการเคลือบที่ใช้กับหน้าสัมผัสทางไฟฟ้า เพื่อปรับปรุงการนำไฟฟ้าและความต้านทานการกัดกร่อน
    connector_design:
      name: การออกแบบตัวเชื่อมต่อ
      description: ระบุการออกแบบตัวเชื่อมต่อหรือตัวต่อโซ่ เช่น ปลายเปิดหรือแบบสแน็ป
    connector_gender:
      name: เพศของตัวเชื่อมต่อ
      description: ระบุเพศของขั้วต่อในอุปกรณ์อิเล็กทรอนิกส์ เช่น ตัวผู้ ตัวผู้กับตัวเมีย
    connector_mounting_style:
      name: รูปแบบการติดตั้งขั้วต่อ
      description: ระบุวิธีการติดตั้งหรือประกอบขั้วต่อทางกลไกในชุดประกอบ (เช่น PCB,
        แผง, โครง, สายเคเบิล, ตัวเชื่อมต่อ)
    connector_orientation:
      name: ทิศทางขั้วต่อ
      description: อธิบายทิศทางทางกายภาพของอินเทอร์เฟซการเชื่อมต่อเทียบกับ พื้นผิวการติดตั้งหรือสายเคเบิล
        (เช่น ตรง, มุมฉาก, แนวตั้ง)
    connector_position:
      name: ตำแหน่งขั้วต่อ
      description: อธิบายตำแหน่งของขั้วต่อวิดีโอเมื่อดูหน้าจอจากด้านหน้า (เช่น ล่างขวา,
        บนซ้าย)
    connector_type:
      name: ประเภทขั้วต่อ
      description: ระบุสไตล์หรือมาตรฐานของขั้วต่อที่ปลายสายจัมเปอร์
    console_accessories_included:
      name: อุปกรณ์เสริมคอนโซลที่รวมอยู่
      description: ระบุอุปกรณ์เสริมหรือส่วนประกอบหลักที่มาพร้อมกับคอนโซล (เช่น คอนโทรลเลอร์
        สายเคเบิล แท่นวาง เกม)
    console_system:
      name: ระบบคอนโซล
      description: ระบุแบรนด์เฉพาะของคอนโซลวิดีโอเกม เช่น Atari 2600 หรือ Playstation
    console_type:
      name: ประเภทคอนโซล
      description: จำแนกรูปแบบทางกายภาพของคอนโซลและสภาพแวดล้อมการใช้งานที่ตั้งใจไว้
    constitutive_ingredients:
      name: ส่วนผสมที่เป็นส่วนประกอบ
      description: ระบุส่วนประกอบหลักที่ใช้ในสูตรผลิตภัณฑ์ เช่น ขี้ผึ้ง น้ำมันโรสฮิป
    construction:
      name: การจัดทำ
      description: ระบุวิธีหรือเทคนิคการจัดทำโลหะที่ใช้ในการผลิตเครื่องประดับ (เช่น
        ชุบ ชุบเวอร์เมิล หุ้ม ชุบแบบแข็ง)
    construction_set_theme:
      name: ธีมชุดก่อสร้าง
      description: ระบุธีมของฉากการก่อสร้าง เช่น โจรสลัดหรือสัตว์
    contact_lens_case_accessories_included:
      name: อุปกรณ์เสริมตลับคอนแทคเลนส์ที่รวมมาให้
      description: ระบุสิ่งของเสริมที่บรรจุมากับตลับคอนแทคเลนส์
    contact_lens_case_features:
      name: คุณสมบัติตลับคอนแทคเลนส์
      description: เน้นคุณสมบัติการทำงานที่โดดเด่นหรือสิ่งที่รวมอยู่ในตลับ
    contact_lens_material:
      name: วัสดุคอนแทคเลนส์
      description: ระบุสูตรโพลิเมอร์หรือตระกูลวัสดุ (เช่น ไฮโดรเจล ซิลิโคนไฮโดรเจล)
        ที่เลนส์ทำมาจาก
    contact_material:
      name: วัสดุหน้าสัมผัส
      description: ระบุโลหะหรือการชุบที่ใช้สำหรับหน้าสัมผัสแบตเตอรี่ภายในที่วาง
    contrast:
      name: ตัดกัน
      description: ใช้เพื่อระบุระดับคอนทราสต์ในฟิล์มของกล้อง เช่น ปกติหรือสูง
    contrast_ratio_typical:
      name: อัตราความคมชัด (ทั่วไป)
      description: ระบุอัตราส่วนคอนทราสต์ของจอแสดงผล เช่น 3000:1
    control_functions:
      name: ฟังก์ชันการควบคุม
      description: ระบุความสามารถในการควบคุมของฟุตสวิตช์ของเครื่องขยายเสียง เช่น การสลับช่องสัญญาณ
    control_interface:
      name: อินเทอร์เฟซควบคุม
      description: ระบุวิธีที่หน่วยสามารถกำหนดค่าหรือควบคุมได้ (เช่น ซอฟต์แวร์ PC,
        แอปมือถือ, LCD บนอุปกรณ์, รีโมทคอนโทรล)
    control_method:
      name: วิธีการควบคุม
      description: อธิบายเทคนิคการควบคุมส่วนประกอบของระบบอัตโนมัติ เช่น แรงบิดโดยตรงหรือสเกลาร์
        (V/f)
    control_solution_level:
      name: ระดับสารละลายควบคุม
      description: ระบุระดับความเข้มข้นกลูโคสของสารละลายควบคุม
    control_technology:
      name: เทคโนโลยีการควบคุม
      description: ระบุวิธีดำเนินการ โดยทั่วไปใช้สำหรับการตกแต่งหน้าต่าง เช่นแบบแมนนวล
        ขับเคลื่อนด้วยมอเตอร์
    control_type:
      name: ประเภทการควบคุม
      description: ระบุประเภทของกลไกการควบคุม เช่น เซ็นเซอร์หรือปุ่ม
    controller_design:
      name: การออกแบบตัวควบคุม
      description: อธิบายรูปแบบของตัวควบคุมอัตโนมัติ เช่น ขนาดกะทัดรัดหรือแบบติดตั้งบนชั้นวาง
    controller_drive_type:
      name: ประเภทไดรฟ์ตัวควบคุม
      description: ระบุประเภทของกำลังไฟที่ใช้ในไดรฟ์ควบคุมอัตโนมัติ เช่น ไฟ AC หรือ
        DC
    conversion_direction:
      name: ทิศทางการแปลง
      description: อธิบายประเภทและทิศทางของการแปลงที่อุปกรณ์ทำได้
    converter_functionality:
      name: การทำงานของตัวแปลง
      description: ระบุฟังก์ชันเฉพาะของตัวแปลงเลนส์ เช่น ตัวเพิ่มความเร็วหรือมุมกว้าง
    conveyor_operation:
      name: การทำงานของสายพานลำเลียง
      description: ระบุว่าระบบสายพานลำเลียงทำงานอย่างไร เช่น ขับเคลื่อนด้วยกำลังหรือขับเคลื่อนด้วยแรงโน้มถ่วง
    cooking_compartments:
      name: ช่องประกอบอาหาร
      description: ระบุจำนวนพื้นที่ประกอบอาหารในเครื่องใช้ในครัว เช่น หม้อทอดไร้น้ำมัน
        เช่น หม้อเดี่ยวหรือหม้อคู่
    cooking_method:
      name: วิธีทำอาหาร
      description: ระบุเทคนิคการทำอาหารที่แนะนำ เช่น การย่าง การทอด
    cooking_wine_variety:
      name: ลักษณะไวน์สำหรับปรุงอาหาร
      description: แยกความแตกต่างระหว่างไวน์ปรุงอาหารประเภทต่างๆ เช่น ไวน์ข้าว ไวน์เชอร์รี่
    cookware/bakeware_features:
      name: คุณลักษณะเครื่องครัว/อุปกรณ์ทำเบเกอรี่
      description: ระบุคุณลักษณะพิเศษของอุปกรณ์ที่ใช้ประกอบอาหารหรืออุปกรณ์ที่ใช้อบ
        เช่น เคลือบสารกันติด หรือใช้กับเตาอบได้
    cookware/bakeware_material:
      name: วัสดุที่ใช้ทำเครื่องครัว/อุปกรณ์ทำเบเกอรี่
      description: ระบุวัสดุหลักที่ใช้ในเครื่องครัวหรืออุปกรณ์อบ เช่น สแตนเลสหรือเซรามิก
    cookware_features:
      name: คุณลักษณะเครื่องครัว
      description: เน้นคุณลักษณะของเครื่องครัว เช่น ใช้กับเตาอบได้หรือด้ามจับคงความเย็น
    cookware_items_included:
      name: รวมอุปกรณ์เครื่องครัว
      description: รายละเอียดส่วนประกอบของชุดเครื่องครัว เช่น หม้ออบดัตช์หรือกระทะทอด
    cooling_technology:
      name: เทคโนโลยีระบายความร้อน
      description: ระบุวิธีการที่ใช้ในการทำให้อุปกรณ์อิเล็กทรอนิกส์เย็นลง เช่น ลมหรือแผงระบายความร้อน
    cord_fastening_system:
      name: ระบบยึดสายไฟ
      description: ระบุประเภทของระบบยึดสำหรับสายบันจี้จัม เช่น ลูกสลับ ตะขอ
    cordless_phone_frequency_band:
      name: ย่านความถี่โทรศัพท์ไร้สาย
      description: ระบุแบนด์ความถี่วิทยุที่ระบบโทรศัพท์ไร้สายทำงาน ช่วยให้ผู้ซื้อมั่นใจได้ถึงความเข้ากันได้ตามภูมิภาคและหลีกเลี่ยงการรบกวน
    core_color:
      name: สีของแกน
      description: ระบุสีหลักของคันธนูหรือแกนหน้าไม้ เช่น สีดำหรือสีน้ำเงิน
    core_material:
      name: วัสดุหลัก
      description: ระบุวัสดุหลักที่ใช้ โดยทั่วไปสำหรับคันธนูและหน้าไม้ เช่น ไฟเบอร์กลาส
        ไม้
    core_pattern:
      name: ลวดลายของแกน
      description: อธิบายการออกแบบหลักบนคันธนูหรือแกนหน้าไม้ เช่น ลายพรางหรือลายนก
    corrector_features:
      name: คุณลักษณะของคอเรคเตอร์
      description: อธิบายคุณลักษณะเฉพาะของน้ำยาลบคำผิด ปากกา และเทป เช่น ไม่มีเวลาทำให้แห้ง
        ทิปที่มีความแม่นยำ
    corsage/boutonniere_design:
      name: ช่อดอกไม้ขนาดเล็กติดชุดเจ้าสาว/เจ้าบ่าว
      description: อธิบายสไตล์ของเสื้อยกทรงหรือเสื้อยกทรง เช่น แบบถือหรือแบบปักหมุด
    cosmetic_condition:
      name: สภาพเครื่องสำอาง
      description: ระบุการสึกหรอและสภาพของผลิตภัณฑ์อิเล็กทรอนิกส์ เช่น ใหม่ เปิดแล้ว-ไม่เคยใช้
    cosmetic_finish:
      name: ฟุนิชลุคเครื่องสำอาง
      description: ระบุผลลัพธ์หลังตกแต่งขั้นสุดท้ายของผลิตภัณฑ์ เช่น เงาด้านหรือธรรมชาติ
    cosmetic_function:
      name: ฟังก์ชันเครื่องสำอาง
      description: ระบุประโยชน์หรือผลกระทบที่กำหนดไว้ของผลิตภัณฑ์เครื่องสำอาง เช่น
        ปลอบประโลมผิว การฟื้นสภาพ
    cosmetic_set_type:
      name: ประเภทชุดเครื่องสำอาง
      description: จำแนกชุดตามจุดเน้นหรือธีมหลัก
    costume_theme:
      name: ธีมเครื่องแต่งกาย
      description: ระบุธีมหลักหรือแนวคิดของเครื่องแต่งกาย เช่น เรื่องสยองขวัญหรือแฟนตาซี
    cotton_ball_size:
      name: ขนาดสำลีก้อน
      description: แสดงหมวดหมู่ขนาดสัมพัทธ์ของสำลีก้อนแต่ละก้อน (เช่น เล็ก ใหญ่ จัมโบ้)
    counter_shape:
      name: รูปร่างเคาน์เตอร์
      description: อธิบายรูปทรงของเคาน์เตอร์หรือโต๊ะ เช่น ตรงหรือโค้ง
    country:
      name: ประเทศ
      description: ระบุประเทศที่เกี่ยวข้องกับผลิตภัณฑ์ เช่น ญี่ปุ่นหรือเยอรมนี
    country_of_issue:
      name: ประเทศที่ออก
      description: ระบุประเทศที่ออกบัตรโทรศัพท์หรือกำหนดให้เป็นพื้นที่ใช้บัตรโทรศัพท์
    cover_closure_design:
      name: การออกแบบฝาปิด
      description: ระบุการออกแบบการปิด โดยทั่วไปจะเป็นปลอกหมอน เช่น ซองจดหมาย ซิป
        เป็นต้น
    cover_color:
      name: สีปก
      description: ระบุสีหลักของฝาครอบผลิตภัณฑ์ เช่น สีใส สีกรมท่า
    cover_features:
      name: คุณลักษณะของที่ครอบ
      description: อธิบายลักษณะพิเศษของฝาครอบผลิตภัณฑ์ เช่น กันน้ำหรือทนความร้อน
    cover_material:
      name: วัสดุหุ้ม
      description: ระบุประเภทของผ้าหรือวัสดุที่ใช้ในปลอกผลิตภัณฑ์ เช่น ผ้าไหมหรือผ้าฝ้าย
    cover_pattern:
      name: รูปแบบปก
      description: ระบุลวดลายหรือการออกแบบที่มองเห็นได้บนวัสดุที่ใช้มุง เช่น ลายดอกไม้หรือลายมัดย้อม
    cover_type:
      name: ประเภทปก
      description: อธิบายสไตล์หรือฟังก์ชันการทำงานของผ้าคลุมรถ เช่น ผ้าคลุมเต็มตัวหรือแบบพับเก็บได้
    coverage_area:
      name: พื้นที่ที่ครอบคลุม
      description: ระบุประเทศหรือดินแดนที่ครอบคลุมทางภูมิศาสตร์สำหรับซอฟต์แวร์ GPS
        เช่น สหรัฐอเมริกาหรือแคนาดา
    coverage_country:
      name: ประเทศที่คุ้มครอง
      description: ระบุประเทศหลักที่สามารถใช้เครดิตเติมเงินได้
    coverage_level:
      name: ระดับการปกปิด
      description: ระบุความทึบหรือความเข้มของการปกปิดที่ผลิตภัณฑ์ให้เมื่อใช้ (เช่น
        บางเบา ปานกลาง เต็มที่)
    coverage_region:
      name: ภูมิภาคที่ครอบคลุม
      description: ระบุภูมิภาคที่ครอบคลุมทางภูมิศาสตร์อย่างกว้างๆ สำหรับซอฟต์แวร์
        GPS เช่น อเมริกาเหนือหรือโอเชียเนีย
    craft/sculpting_project_type:
      name: ประเภทโครงการงานฝีมือ/การปั้นโมเดล
      description: ระบุประเภทของงานฝีมือหรือโครงการแกะสลัก เช่น การสร้างแบบจำลองหรือการทำหน้ากาก
    craft_cutter/embosser_type:
      name: ประเภทคัตเตอร์/เครื่องปั๊มลายนูนสำหรับงานฝีมือ
      description: ระบุประเภทของเครื่องตัดหรือเครื่องปั๊มลายนูน เช่น เครื่องตัดไดคัท
        ลายฉลุ
    craft_decoration_maker_type:
      name: ประเภทเครื่องตกแต่งงานฝีมือ
      description: ระบุประเภทของเครื่องสร้างของตกแต่งงานฝีมือ เช่น เครื่องประทับตราหรือเครื่องทำสติกเกอร์
    craft_knife_design:
      name: การออกแบบมีดงานฝีมือ
      description: อธิบายลักษณะเฉพาะของมีดสำหรับงานฝีมือ เช่น แบบตรงหรือแบบแม่นยำ
    craft_pipe_cleaner_design:
      name: การออกแบบลวดล้างไปป์สำหรับงานฝีมือ
      description: อธิบายการออกแบบหรือสไตล์ของลวดกำมะหยี่สำหรับงานฝีมือ เช่น ก้านลวดกำมะหยี่หรือก้านไม้งา
    craft_project_type:
      name: ประเภทโครงการหัตถกรรม
      description: ระบุประเภทของโครงการงานฝีมือ เช่น การทำสมุดภาพหรือการทำเครื่องประดับ
    crafting_frame/stretcher_features:
      name: คุณลักษณะกรอบใส่/ขึงงานฝีมือ
      description: อธิบายลักษณะเฉพาะของโครง/เปลสำหรับคราฟต์ เช่น ด้ามจับที่มั่นคงหรือพื้นผิวเรียบ
    crafting_frame_features:
      name: คุณลักษณะกรอบใส่งานฝีมือ
      description: อธิบายลักษณะเฉพาะของเฟรมการประดิษฐ์ เช่น ความตึงที่ปรับได้หรือน้ำหนักเบา
    crafting_hoop_features:
      name: คุณลักษณะห่วงใส่งานฝีมือ
      description: เน้นคุณลักษณะของสะดึงปักผ้า เช่น ด้ามจับที่มั่นคง พื้นผิวเรียบ
    crafting_mat/pad_features:
      name: คุณลักษณะเบาะ/แผ่นรองงานฝีมือ
      description: อธิบายลักษณะเฉพาะของเสื่อหรือแผ่นรองสำหรับประดิษฐ์ เช่น แผ่นรองหลังที่ทำความสะอาดง่ายหรือกันลื่น
    crafting_stretcher_features:
      name: คุณลักษณะกรอบขึงงานฝีมือ
      description: อธิบายคุณลักษณะหลักของกรอบขึงงานฝีมือ เช่น ความตึงที่ปรับได้หรือน้ำหนักเบา
    crampon_attachment_type:
      name: ประเภทอุปกรณ์ยึดแครมปอน
      description: ระบุว่าตะปูยึดติดกับรองเท้าอย่างไร เช่น รองเท้าแบบไฮบริดหรือแบบสเต็ปอิน
    creatine_type:
      name: ประเภทครีเอทีน
      description: ระบุรูปแบบทางเคมีหรือสูตรพิเศษของครีเอทีนที่ใช้ในอาหารเสริม
    creative_art_project_type:
      name: ประเภทโครงการงานศิลปะสร้างสรรค์
      description: ระบุประเภทของโครงการศิลปะเชิงสร้างสรรค์ เช่น การวาดภาพหรือสมุดภาพ
    crib/toddler_bed_features:
      name: คุณลักษณะเตียงเด็กเล็ก
      description: อธิบายลักษณะเฉพาะของเตียงทารกและเด็กเล็ก เช่น การออกแบบที่ปรับเปลี่ยนได้หรือกลไกการโยก
    crib_features:
      name: คุณลักษณะของเตียงเด็ก
      description: เน้นคุณลักษณะเฉพาะของเปลเด็ก เช่น ตัวเลือกแบบปรับได้หรือพื้นที่เก็บของ
    cricket_equipment_included:
      name: รวมอุปกรณ์คริกเก็ต
      description: ระบุอุปกรณ์คริกเก็ตเฉพาะที่รวมอยู่ในชุด เช่น หมวกกันน็อคหรือตอไม้
    crutch_folding_type:
      name: ประเภทการพับไม้ค้ำ
      description: ระบุว่าและอย่างไรไม้ค้ำพับเพื่อการขนส่งหรือจัดเก็บ
    crutch_type:
      name: ประเภทไม้ค้ำยัน
      description: แยกความแตกต่างระหว่างไม้ค้ำรูปแบบต่างๆ เช่น ไม้ค้ำศอก ไม้ค้ำใต้รักแร้
    crystal_system:
      name: ระบบคริสตัล
      description: ระบุโครงสร้างทางเรขาคณิตของคริสตัล เช่น หกเหลี่ยมหรือลูกบาศก์
    cue_style:
      name: สไตล์ไม้คิว
      description: ระบุรูปแบบของไม้บิลเลียด เช่น ตรง ทรงกรวย
    cue_type:
      name: ประเภทไม้คิว
      description: ระบุประเภทหัวคิวของไม้บิลเลียด เช่น ไม้เปิดเกม จัมป์
    cue_wrap:
      name: หนังหุ้มไม้คิว
      description: ระบุประเภทของผ้าพันบนไม้คิวบิลเลียด เช่น ผ้าไอริชลินินหรือไม่พันผ้า
    cuff_connector_type:
      name: ประเภทขั้วต่อผ้าพันแขน
      description: กำหนดอินเทอร์เฟซเชิงกลที่ติดท่อผ้าพันแขนกับเครื่องวัดความดันโลหิต
    cuff_size_category:
      name: หมวดหมู่ขนาดผ้าพันแขน
      description: ระบุคลาสขนาดมาตรฐานของผ้าพันแขน (เช่น ทารก ผู้ใหญ่ ผู้ใหญ่ขนาดใหญ่)
    cuff_style:
      name: สไตล์ข้อพับ
      description: อธิบายการออกแบบของข้อพับแขนบนไม้ค้ำแขน
    cuisine:
      name: มื้ออาหาร
      description: จำแนกผลิตภัณฑ์ตามสไตล์การทำอาหารหรือภูมิภาค เช่น สหรัฐอเมริกาตอนตะวันตกเฉียงใต้
        เมดิเตอร์เรเนียน
    culinary_botanical_name:
      name: ชื่อชื่อพืชสำหรับทำอาหาร
      description: ระบุชื่อทางวิทยาศาสตร์ของสมุนไพรหรือพืชที่ใช้ในการประกอบอาหาร เช่น
        capsicum annuum, mentha
    cup_size:
      name: ขนาดถ้วย
      description: ระบุขนาดรอบอกของบรา เช่น AA หรือ L
    curing_method:
      name: วิธีการบ่ม
      description: ระบุวิธีการตั้งหรือบ่มของกาว (เช่น แห้งด้วยอากาศ หลอด UV/LED ความร้อน)
    curler_pad_material:
      name: วัสดุแผ่นรองที่ดัดขนตา
      description: ระบุวัสดุของแผ่นรองที่เปลี่ยนได้ที่กดกับขนตา ซึ่งส่งผลต่อความสบาย
        ความทนทาน และการพิจารณาเรื่องภูมิแพ้
    curler_size_compatibility:
      name: ความเข้ากันได้กับขนาดที่ดัดขนตา
      description: ระบุขนาดแผ่นรองที่ดัดขนตาหรือสไตล์ที่รีฟิลพอดี (เช่น มาตรฐาน มินิ
        บางส่วน)
    curler_type:
      name: ประเภทที่ดัดผม
      description: ระบุชนิดของเครื่องม้วนผม เช่น แบบไม่ใช้ความร้อนหรือแบบใช้ความร้อน
    currencies_supported:
      name: รองรับสกุลเงิน
      description: ระบุประเภทของสกุลเงินที่ผลิตภัณฑ์ยอมรับ เช่น ดอลลาร์แคนาดา (CAD)
        หยวนจีน (CNY)
    currency:
      name: สกุลเงิน
      description: ระบุประเภทของสกุลเงินที่ผลิตภัณฑ์รองรับ เช่น หยวนจีน (CNY) หรือดอลลาร์สหรัฐ
        (USD)
    currency_type:
      name: ประเภทสกุลเงิน
      description: ระบุประเภทของสกุลเงินที่ผลิตภัณฑ์จัดการ เช่น เหรียญหรือโทเค็น
    cushion_design:
      name: การออกแบบเบาะ
      description: อธิบายรูปแบบโดยรวมหรือสไตล์ของเบาะเมตาทาร์ซัล (เช่น แผ่น ปลอก โดม)
    customer_support_channels:
      name: ช่องทางการช่วยเหลือลูกค้า
      description: ระบุวิธีที่ลูกค้าสามารถรับความช่วยเหลือ เช่น การสนับสนุนทางโทรศัพท์หรือวิดีโอแนะนำการใช้งาน
    customization:
      name: การปรับแต่ง
      description: ระบุประเภทของการปรับแต่งส่วนบุคคลที่มีอยู่ในตราประทับในสำนักงาน
        เช่น ข้อความที่กำหนดเองหรือการแกะสลักโลโก้
    cutter_options:
      name: ตัวเลือกเครื่องตัด
      description: ระบุคุณสมบัติของเครื่องปิดปากถุงด้วยความร้อน เช่น มีแท่นตัดในตัว
    cutting_method:
      name: วิธีการตัด
      description: ระบุเทคนิคการตัด โดยทั่วไปใช้สำหรับเครื่องมือทำสวน เช่น Bypass,
        Anvil
    cycling_style:
      name: สไตล์การขี่จักรยาน
      description: ระบุวัตถุประสงค์การใช้งานหรือรูปแบบการขี่ของผลิตภัณฑ์การปั่นจักรยาน
        เช่น การแข่งขันประเภทถนนหรือ BMX
    cylinder_size_designation:
      name: การกำหนดขนาดถัง
      description: ระบุตัวอักษรมาตรฐานหรือรหัสตัวเลขที่ใช้ระบุมิติและความจุของถังออกซิเจน
        (เช่น M6, D, E)
    daisy_chain_capability:
      name: ความสามารถในการต่อลูกโซ่
      description: ระบุว่าหน่วยประชุมหลายหน่วยสามารถเชื่อมต่อกัน (ต่อลูกโซ่) เพื่อขยายความครอบคลุมไมโครโฟนและลำโพง
        และวิธีการเชื่อมต่อที่ใช้
    dance_style:
      name: สไตล์การเต้น
      description: ระบุประเภทหรือประเภทเฉพาะของการเต้นรำ เช่น ฟลาเมงโก้ บัลเล่ต์
    data_network:
      name: เครือข่ายข้อมูล
      description: ระบุความเข้ากันได้ของเครือข่ายข้อมูลของอุปกรณ์เคลื่อนที่ เช่น LTE
        หรือ 3G
    data_network_generation:
      name: การสร้างเครือข่ายข้อมูล
      description: บ่งบอกถึงเทคโนโลยีเครือข่ายมือถือสูงสุดที่บัตรเติมเงินหรือซิมรองรับ
        (เช่น 3G, 4G LTE, 5G)
    data_rollover_policy:
      name: นโยบายการหมุนเวียนข้อมูล
      description: ระบุว่าข้อมูลความเร็วสูงที่ไม่ได้ใช้จะถูกโอนไปยังช่วงอายุการใช้งานถัดไปหรือหมดอายุ
    decoder/encoder_function:
      name: ฟังก์ชันดีโค้ดเดอร์/เอ็นโค้ดเดอร์
      description: ระบุฟังก์ชันลอจิกที่ IC ใช้งาน
    decoration_material:
      name: วัสดุตกแต่ง
      description: ระบุวัสดุที่ใช้ในการตกแต่ง เช่น เลื่อมหรือขนนก
    decorative_stamp_design:
      name: การออกแบบตรายางประดับ
      description: อธิบายการออกแบบบนแสตมป์ตกแต่ง เช่น เทพนิยายหรือย้อนยุค/วินเทจ
    denomination:
      name: หน่วยเงินตรา
      description: ระบุมูลค่าหน้าของสิ่งของสะสม เช่น เหรียญและแสตมป์ เช่น 1,000 ดอลลาร์
        1 เซ็นต์
    dental_appliance_compatibility:
      name: ความเข้ากันได้ของเครื่องมือทันตกรรม
      description: ระบุว่าเครื่องมือทันตกรรมหรืองานบูรณะแบบใดที่โฟมนี้ปลอดภัยหรือต้องการให้นำโฟมนี้มาใช้
        (เช่น อะไลเนอร์ เหล็กดัดฟัน วีเนียร์)
    dental_floss_format:
      name: รูปแบบไหมขัดฟัน
      description: ระบุรูปแบบผลิตภัณฑ์โดยรวมหรือสไตล์การส่งมอบของไหมขัดฟัน
    dental_floss_shape:
      name: รูปทรงไหมขัดฟัน
      description: ระบุรูปร่างหรือลักษณะของไหมขัดฟัน เช่น เทปหรือริบบิ้น
    dental_floss_thickness_level:
      name: ระดับความหนาของไหมขัดฟัน
      description: แยกความแตกต่างของไหมขัดฟันตามระดับความหนา เช่น แบบบางหรือแบบธรรมดา
    dental_floss_type:
      name: ประเภทไหมขัดฟัน
      description: ระบุประเภทของไหมขัดฟัน เช่น แบบไม่เคลือบขี้ผึ้งหรือแบบเคลือบขี้ผึ้ง
    dental_mouthgard_recommended_use:
      name: การใช้ที่แนะนำสำหรับฟันยางกันกระแทก
      description: ระบุวัตถุประสงค์ของที่กันการกัดฟัน เช่น ลดการนอนกรน ป้องกันเหล็กจัดฟันบาดปาก
    dental_mouthguard_arch_coverage:
      name: การครอบคลุมโค้งฟันของเฝือกฟัน
      description: ระบุว่าเฝือกฟันออกแบบมาเพื่อครอบโค้งฟันใด
    dental_mouthguard_certifications:
      name: ใบรับรองที่ครอบฟัน
      description: บ่งบอกถึงความปลอดภัยและการรับรองคุณภาพของฟันยาง เช่น ปลอดสาร BPA
        หรือได้รับการรับรอง CE
    dental_paste_flavor:
      name: รสชาติยาสีฟัน
      description: ระบุรสชาติของยาสีฟันทันตกรรม เช่น ไม่ปรุงรสหรือหมากฝรั่ง
    dental_repair_kit_certifications:
      name: ใบรับรองชุดซ่อมทันตกรรม
      description: ระบุใบรับรองของชุดซ่อมทันตกรรมที่มี เช่น ได้รับการอนุมัติจากองค์การอาหารและยา
        หรือปลอดสาร BPA
    dental_water_jet_operation:
      name: การทำงานของระบบฉีดน้ำทันตกรรม
      description: ระบุแหล่งพลังงานสำหรับระบบฉีดน้ำทันตกรรม เช่น แบบมีสายหรือไร้สาย
    dentistry_items_included:
      name: รายการทันตกรรมที่รวมอยู่
      description: ระบุเครื่องมือทันตกรรมที่รวมอยู่ในชุด เช่น กระจกทันตกรรมหรือเครื่องมือกำจัดคราบจุลินทรีย์
    denture_arch_coverage:
      name: การครอบคลุมโค้งฟันปลอม
      description: ระบุว่าฟันปลอม (หรือวีเนียร์แบบสวม) ตั้งใจจะครอบโค้งฟันใด
    denture_base_color:
      name: สีพื้นฟันปลอม
      description: ระบุเฉดสีของเหงือกเทียมในฟันปลอม เช่น เหงือกสีชมพูหรือเหงือกธรรมชาติ
    denture_coverage:
      name: ความครอบคลุมของฟันปลอม
      description: ระบุขอบเขตการครอบคลุมของฟันปลอม เช่น แบบเต็มปากหรือแบบบางส่วน
    denture_design:
      name: การออกแบบฟันปลอม
      description: อธิบายประเภทของฟันปลอม เช่น แบบปรับได้ แบบด่วน
    denture_retention_mechanism:
      name: กลไกการยึดฟันปลอม
      description: ระบุว่าฟันปลอมยึดติดกับฟันหรือเหงือกอย่างไร
    denture_teeth_color:
      name: สีฟันปลอม
      description: ระบุเฉดสีของฟันปลอม เช่น สีขาวนวลหรือสีเหลืองอ่อน
    deployment_type:
      name: ประเภทตะขอพับ
      description: อธิบายวิธีการใช้งานซอฟต์แวร์ AI เช่น ไฮบริดหรือคลาวด์
    desk_organizer_features:
      name: คุณลักษณะกล่องใส่เครื่องเขียน
      description: อธิบายคุณลักษณะของที่เก็บของบนโต๊ะ เช่น ฉากกั้นแบบปรับได้หรือมีช่องในตัว
    desk_size:
      name: ขนาดที่ตั้งโน้ตดนตรี
      description: ระบุประเภทขนาดของโต๊ะ เช่น เล็ก (S) หรือใหญ่ (L)
    detailed_ingredients:
      name: ส่วนผสมโดยละเอียด
      description: แสดงรายการส่วนประกอบบางอย่างที่ใช้ในด้านสุขภาพและความงาม เช่น วิตามินซี
        โปรไบโอติก
    detectable_drugs:
      name: ยาที่ตรวจพบได้
      description: ระบุประเภทของสารเสพติดที่การทดสอบสามารถระบุได้ เช่น กัญชา ฝิ่น
    detection_technology:
      name: เทคโนโลยีการตรวจจับ
      description: ระบุหลักการทางวิทยาศาสตร์หรือเครื่องหมายทางชีวภาพที่การทดสอบเอชไอวีตรวจจับ
        (เช่น แอนติบอดี, คอมโบแอนติเจน/แอนติบอดี, อาร์เอ็นเอ, พีซีอาร์)
    detector_operation_mode:
      name: โหมดการทำงานของเครื่องตรวจจับ
      description: อธิบายวิธีการทำงานของเครื่องตรวจจับด้านความปลอดภัย เช่น เชื่อมต่อถึงกันหรือแบบสแตนด์อโลน
    detector_sensitivity:
      name: ความไวของเครื่องตรวจจับ
      description: อธิบายความสามารถในการปรับความไวของเครื่องตรวจจับโลหะ เช่น แบบปรับได้หรือแบบคงที่
    detector_type:
      name: ประเภทตัวเชื่อมต่อ
      description: ระบุวิธีการตรวจจับที่ใช้ในอุปกรณ์ความปลอดภัย เช่น การแตกตัวเป็นไอออนแบบออปติก
        การสุ่มตัวอย่างอากาศ
    developer_strength:
      name: ความแรงของสารผสม
      description: ระบุความเข้มข้นเปอร์ออกไซด์หรือปริมาตรของสารผสมหรือชุดเพื่อให้ตรงกับการยกสีที่ต้องการ
    developmental_features:
      name: คุณลักษณะของพัฒนาการ
      description: เน้นย้ำถึงคุณประโยชน์ด้านการพัฒนาของผลิตภัณฑ์ เช่น การพัฒนาภาษาหรือการเติบโตทางอารมณ์และสังคม
    device_interface:
      name: อินเทอร์เฟซอุปกรณ์
      description: ระบุวิธีการเชื่อมต่อระหว่างอุปกรณ์อิเล็กทรอนิกส์ เช่น HDMI, USB
    device_technology:
      name: เทคโนโลยีอุปกรณ์
      description: อธิบายประเภทของเทคโนโลยีในเครื่องมือฮาร์ดแวร์ เช่น ดิจิทัลหรือแอนะล็อก
    dexterity_skills:
      name: ทักษะความคล่องแคล่ว
      description: ระบุทักษะความคล่องแคล่วที่จำเป็นสำหรับเกม เช่น การทรงตัวหรือความแม่นยำ
    dial_color:
      name: สีหน้าปัด
      description: ระบุสีของหน้าปัดนาฬิกา เช่น สีทองหรือหลากสี
    dial_pattern:
      name: รูปแบบหน้าปัด
      description: อธิบายการออกแบบหรือลวดลายบนหน้าปัดนาฬิกา เช่น ลายจุดหรือลายมัดย้อม
    dialing_method:
      name: วิธีการโทรออก
      description: กำหนดกลไกที่โทรศัพท์ใช้ในการป้อนตัวเลข
    diaper_bag_additional_features:
      name: คุณลักษณะเพิ่มเติมของกระเป๋าผ้าอ้อม
      description: ระบุคุณลักษณะพิเศษในกระเป๋าสำหรับผ้าอ้อม เช่น มีแผ่นรองเปลี่ยน
        ที่วางขวด
    diaper_bag_material:
      name: วัสดุที่ใช้ทำกระเป๋าผ้าอ้อม
      description: ระบุประเภทของวัสดุที่ใช้ทำกระเป๋าผ้าอ้อม เช่น หนังหรือผ้าใบ
    diaper_bag_style:
      name: สไตล์กระเป๋าใส่ผ้าอ้อม
      description: อธิบายการออกแบบหรือรูปแบบของกระเป๋าสำหรับผ้าอ้อม เช่น กระเป๋าสะพายหลังหรือกระเป๋าสะพายข้าง
    diaper_features:
      name: คุณลักษณะผ้าอ้อม
      description: อธิบายลักษณะพิเศษของผ้าอ้อม เช่น ป้องกันการรั่วซึมหรือแพ้ง่าย
    diaper_kit_components:
      name: ส่วนประกอบชุดผ้าอ้อม
      description: ระบุสิ่งของที่รวมอยู่ในชุดผ้าอ้อม เช่น ผ้าเช็ดทำความสะอาดหรือแผ่นรองเปลี่ยนผ้าอ้อม
    diaper_organizer_features:
      name: คุณลักษณะกระเป๋าเก็บผ้าอ้อม
      description: เน้นคุณลักษณะพิเศษของที่เก็บผ้าอ้อม เช่น ช่องหลายช่องหรือซับในกันน้ำ
    diaper_size:
      name: ขนาดผ้าอ้อม
      description: ระบุขนาดของผ้าอ้อม เช่น ทารกหรือเด็กเล็ก
    diaper_type:
      name: ประเภทผ้าอ้อม
      description: แยกความแตกต่างระหว่างอุปกรณ์ช่วยสำหรับภาวะปัสสาวะเล็ด เช่น แผ่นอนามัย
        กางเกงผ้าอ้อม หรือผ้าอ้อม
    dice_shape:
      name: รูปร่างลูกเต๋า
      description: อธิบายรูปทรงเรขาคณิตของลูกเต๋า เช่น ลูกบาศก์ (6 ด้าน) หรือ Icosahedron
        (20 ด้าน)
    dielectric_type:
      name: ประเภทวัตถุที่ไม่เป็นสื่อไฟฟ้า
      description: ระบุวัสดุอิเล็กทริกหรือฉนวนที่ใช้ในตัวเก็บประจุ เช่น เซรามิกหรืออิเล็กโทรไลต์
    dietary_preferences:
      name: ความชอบอาหาร
      description: ช่วยระบุผลิตภัณฑ์ที่เหมาะกับการควบคุมอาหารบางอย่าง เช่น วีแกน ปราศจากถั่ว
    dietary_supplements:
      name: ผลิตภัณฑ์เสริมอาหาร
      description: ระบุสารอาหารที่เพิ่มเข้าไปในผลิตภัณฑ์ เช่น แคลเซียมหรือโปรไบโอติก
    dietary_use:
      name: การใช้งานอาหาร
      description: จำแนกประเภทผลิตภัณฑ์ตามคุณประโยชน์ด้านอาหาร เช่น การสร้างกล้ามเนื้อ
        คาร์โบไฮเดรตต่ำ
    difficulty_level:
      name: ระดับความยาก
      description: ระบุระดับความซับซ้อนหรือความท้าทายของปริศนาหรือเกม เช่น ง่ายหรือเชี่ยวชาญ
    diffuser_design:
      name: การออกแบบดิฟฟิวเซอร์
      description: อธิบายโครงสร้างของตัวกระจายแสงแฟลช เช่น วงแหวนหรือโดม
    digestive_supplement_type:
      name: ประเภทอาหารเสริมระบบย่อยอาหาร
      description: จัดประเภทชนิดเฉพาะของอาหารเสริมระบบย่อยอาหาร (เช่น โปรไบโอติก เอนไซม์
        ไฟเบอร์)
    digital_sound_processing:
      name: การประมวลผลเสียงแบบดิจิตอล
      description: ระบุเทคนิคการปรับเปลี่ยนเสียงในส่วนประกอบต่างๆ ของระบบเสียง เช่น
        ดีเลย์หรือรีเวิร์บ
    digitizer_surface_finish:
      name: พื้นผิวดิจิไทเซอร์
      description: อธิบายการเคลือบผิวหรือการตกแต่งพื้นผิวของกระจกดิจิไทเซอร์
    din_size:
      name: ขนาด DIN
      description: ระบุขนาดช่องเปิดแดชบอร์ดมาตรฐานที่เครื่องรับพอดี (เช่น Single DIN,
        Double DIN)
    dinnerware_pieces_included:
      name: ชิ้นส่วนอุปกรณ์สำหรับมื้ออาหารที่รวมอยู่
      description: ระบุส่วนประกอบของคอลเลกชั่นอุปกรณ์สำหรับมื้ออาหาร เช่น จานหรือชามเสิร์ฟ
    direct_box_type:
      name: ประเภทไดเร็คบ็อกซ์
      description: ระบุการกำหนดค่าวงจรของไดเร็คบ็อกซ์ (DI) ซึ่งส่งผลต่อความต้องการพลังงาน,
        ลักษณะเสียง และการใช้งานที่ตั้งใจไว้
    direction_detection_capability:
      name: ความสามารถในการตรวจจับทิศทาง
      description: ระบุว่าเรดาร์สามารถรายงานทิศทางของวัตถุได้หรือไม่ (เช่น เข้าใกล้,
        ถอยห่าง หรือทั้งคู่)
    dirt_separating_method:
      name: วิธีการแยกสิ่งสกปรก
      description: อธิบายเทคนิคที่เครื่องดูดฝุ่นใช้ในการแยกสิ่งสกปรก เช่น ระบบไซโคลน
        ระบบถุงกรอง
    discharge_type:
      name: ประเภทการปล่อยประจุ
      description: ระบุประเภทของการระบายในรถดัมพ์ เช่น การทิ้งด้านข้างหรือการถ่ายโอน
    disk_format_type:
      name: ประเภทรูปแบบดิสก์
      description: ระบุประเภทของรูปแบบดิสก์สำหรับผลิตภัณฑ์ซอฟต์แวร์ เช่น บลูเรย์หรือซีดี
    dispenser_type:
      name: ประเภทเครื่องจ่าย
      description: ระบุรูปแบบการจ่ายผลิตภัณฑ์ โดยทั่วไปเกี่ยวกับสุขภาพและความงาม เช่น
        แท่ง โหล
    dispensing_operation_type:
      name: ประเภทการดำเนินการจ่าย
      description: อธิบายว่ายาสีฟันถูกจ่ายด้วยมือ กึ่งอัตโนมัติ หรืออัตโนมัติ
    display_board_features:
      name: คุณลักษณะของบอร์ดแสดงผล
      description: อธิบายคุณลักษณะเฉพาะของบอร์ดแสดงผล เช่น แผ่นรองหลังแบบมีกาวในตัวหรือแข็งแรงทนทาน
    display_color_mode:
      name: แสดงโหมดสี
      description: ระบุสีจอแสดงผลของผลิตภัณฑ์ เช่น สี ขาวดำ
    display_features:
      name: คุณลักษณะจอแสดงผล
      description: อธิบายประเภทของการแสดงผลบนผลิตภัณฑ์ เช่น หน้าจอสัมผัสหรือปุ่มควบคุม
    display_interface:
      name: อินเทอร์เฟซจอแสดงผล
      description: ระบุอินเทอร์เฟซวิดีโอหรือข้อมูลที่ใช้โดยโมดูลหน้าจอ
    display_mode:
      name: โหมดจอแสดงผล
      description: อธิบายวิธีการแสดงผลิตภัณฑ์ เช่น ดิจิทัลหรือแอนะล็อก
    display_recommended_use:
      name: การใช้งานที่แนะนำของจอแสดงผล
      description: แนะนำการใช้งานที่เหมาะสมที่สุดสำหรับการจัดแสดงสินค้าตามรูปแบบและการออกแบบ
        เช่น เชิงพาณิชย์หรือการศึกษา
    display_resolution:
      name: ความละเอียดของจอแสดงผล
      description: ระบุความละเอียดของจอแสดงผลดิจิทัล เช่น 1280 x 1024, Full HD
    display_sign_design:
      name: การออกแบบป้ายแสดง
      description: ระบุประเภทของข้อมูลที่ป้ายสื่อ เช่น ห้องน้ำ การขาย หรือทางออก
    display_technology:
      name: เทคโนโลยีของจอแสดงผล
      description: ระบุประเภทของเทคโนโลยีหน้าจอที่ใช้ในสินค้า เช่น LED, Eink
    disposable/reusable_bag_features:
      name: คุณลักษณะถุงแบบใช้แล้วทิ้ง/นำกลับมาใช้ใหม่ได้
      description: อธิบายลักษณะสำคัญของถุงขยะสำหรับสัตว์เลี้ยง เช่น ย่อยสลายได้ทางชีวภาพ
        หรือป้องกันการรั่วซึม
    disposable/reusable_item_material:
      name: วัสดุที่ใช้ทำสิ่งของแบบใช้แล้วทิ้ง/นำกลับมาใช้ใหม่ได้
      description: ระบุว่าวัสดุของผลิตภัณฑ์เป็นแบบใช้แล้วทิ้งหรือใช้ซ้ำได้ กล่าวคือ
        วัสดุที่ย่อยสลายได้ทางชีวภาพ กระดาษ
    disposable_bag_features:
      name: คุณลักษณะถุงแบบใช้แล้วทิ้ง
      description: เน้นคุณลักษณะพิเศษของอุปกรณ์เติมถังใส่ผ้าอ้อม เช่น ควบคุมกลิ่นหรือมีกลิ่นหอม
    disposable_bag_material:
      name: วัสดุที่ใช้ทำถุงแบบใช้แล้วทิ้ง
      description: ระบุองค์ประกอบของถุงที่ใช้แล้วทิ้ง เช่น พลาสติก วัสดุที่ย่อยสลายได้ทางชีวภาพ
    disposable_glove_features:
      name: คุณลักษณะถุงมือแบบใช้แล้วทิ้ง
      description: ระบุลักษณะพิเศษของถุงมือแบบใช้แล้วทิ้ง เช่น ข้อมือยาวหรือไม่มีแป้ง
    disposable_tableware_material:
      name: วัสดุที่ใช้ทำเครื่องใช้บนโต๊ะอาหารแบบใช้แล้วทิ้ง
      description: ระบุวัสดุที่ใช้ในเครื่องใช้บนโต๊ะอาหารแบบใช้แล้วทิ้ง เช่น พลาสติกหรือกระดาษ
    dive_computer_items_included:
      name: รวมอุปกรณ์ไดฟ์คอมพิวเตอร์
      description: ระบุว่าสิ่งของใดบ้างที่มาพร้อมกับไดฟ์คอมพิวเตอร์ เช่น ทรานสมิตเตอร์หรือสายรัด
    diving/snorkeling_equipment_included:
      name: รวมอุปกรณ์ดำน้ำ/ดำน้ำตื้น
      description: ระบุอุปกรณ์ดำน้ำ/ดำน้ำตื้นที่มีให้ เช่น ชุดดำน้ำหรือท่อหายใจ
    diving_regulator_style:
      name: สไตล์เรกูเลเตอร์ดำน้ำ
      description: ระบุรูปแบบของตัวควบคุมการดำน้ำ เช่น ลูกสูบหรือไดอะแฟรมไม่สมดุล
    dj_equipment_features:
      name: คุณลักษณะอุปกรณ์ดีเจ
      description: ระบุคุณลักษณะเฉพาะของอุปกรณ์ DJ เช่น การควบคุม MIDI หรือการทำงานแบบสแตนด์อโลน
    dj_software_compatibility:
      name: ความเข้ากันได้ของซอฟต์แวร์ดีเจ
      description: ระบุซอฟต์แวร์ DJ ที่ผลิตภัณฑ์ใช้งานร่วมกันได้ เช่น Rekordbox, Serato
        DJ
    docking_compatibility:
      name: ความเข้ากันได้ของแท่นวาง
      description: ระบุว่าคอนโซลสามารถวางบนแท่นหรือชาร์จได้โดยไม่ต้องถอดเคสหรือไม่
    docsis_standard:
      name: มาตรฐาน DOCSIS
      description: ระบุเวอร์ชัน DOCSIS ที่เคเบิลโมเด็มรองรับ
    dog_age_group:
      name: กลุ่มอายุสุนัข
      description: ช่วยแยกแยะสิ่งของสำหรับสุนัขตามช่วงชีวิตของสุนัข เช่น ลูกสุนัข
        สุนัขสูงวัย
    dog_diaper_size:
      name: ขนาดผ้าอ้อมสุนัข
      description: ระบุขนาดของผ้าอ้อมสุนัข เช่น ขนาดใหญ่พิเศษ (XL), เล็ก (S)
    dog_diaper_type:
      name: ประเภทผ้าอ้อมสุนัข
      description: ระบุประเภทของผ้าอ้อมสุนัข เช่น โตเต็มวัยเพศเมีย ลูกสุนัข
    dog_house_features:
      name: คุณลักษณะของบ้านสุนัข
      description: อธิบายลักษณะพิเศษของบ้านสุนัข เช่น ขนาดที่ปรับได้ หรือการป้องกันรังสียูวี
    dog_kennel/run_features:
      name: คุณลักษณะของกรง/คอกสุนัข
      description: เน้นคุณลักษณะเฉพาะของคอกสุนัข/วิ่งเล่น เช่น ทนทานต่อสภาพอากาศ สามารถพกพาได้
    dog_kennel_features:
      name: คุณลักษณะของบ้านสุนัข
      description: อธิบายลักษณะเฉพาะของคอกสุนัข เช่น แบบล็อคได้หรือแบบพับได้
    dog_pen_features:
      name: คุณลักษณะของคอกสุนัข
      description: อธิบายคุณลักษณะพิเศษของคอกสุนัข เช่น ป้องกันรังสียูวี หรือทนต่อสภาพอากาศ
    dog_toy_type:
      name: ประเภทของเล่นสุนัข
      description: แยกประเภทของของเล่นสุนัข เช่น แบบตุ๊กตานุ่มๆ หรือแบบมีเสียงดัง
    doll/playset_features:
      name: คุณลักษณะตุ๊กตา/ชุดของเล่น
      description: อธิบายลักษณะพิเศษของตุ๊กตาหรือชุดละคร เช่น ข้อต่อหรือของสะสม
    doll_features:
      name: คุณลักษณะตุ๊กตา
      description: อธิบายลักษณะพิเศษของตุ๊กตา เช่น ข้อต่อที่ประกบหรือรายละเอียดที่สมจริง
    doll_type:
      name: ประเภทตุ๊กตา
      description: ระบุหมวดหมู่ของตุ๊กตา เช่น เด็กทารกหรือแบบของสะสม
    door/frame_application:
      name: การใช้งานประตู/วงกบ
      description: ระบุว่าจะใช้วงกบประตูที่ใด เช่น ภายในหรือภายนอก
    door_application:
      name: การใช้งานประตู
      description: ระบุการใช้งานของประตูหรือบานพับ เช่น ภายในหรือภายนอก
    door_closer_application:
      name: การใช้งานโช้คประตู
      description: ระบุการใช้งานของโช้คประตู เช่น ภายในหรือภายนอก
    door_closer_design:
      name: การออกแบบโช้คประตู
      description: ระบุสไตล์การออกแบบของโช้คประตู เช่น พื้นหรือปกปิดเหนือศีรษะ
    door_color:
      name: สีประตู
      description: ระบุสีประตูของผลิตภัณฑ์ เช่น สีแดงหรือสีดำ
    door_frame_finish:
      name: การตกแต่งผิววงกบประตู
      description: ระบุพื้นผิวของวงกบประตู เช่น สำเร็จรูปหรือพร้อมตกแต่ง
    door_glass_finish:
      name: การตกแต่งผิวกระจกประตู
      description: ระบุประเภทของกระจกที่ประตู เช่น ตะกั่วหรือลวดลาย
    door_insulation:
      name: ฉนวนประตู
      description: ระบุสถานะฉนวนของประตู เช่น หุ้มฉนวน ไม่ได้หุ้มฉนวน
    door_knob_function:
      name: ฟังก์ชันลูกบิดประตู
      description: ระบุการทำงานของลูกบิดประตูและมือจับ เช่น ทางเดินหรือความเป็นส่วนตัว
    door_mat_base_color:
      name: สีเบสพรมเช็ดเท้าหน้าประตู
      description: ระบุสีหลักของฐานรองพรมเช็ดเท้าหน้าประตู เช่น สีเบจหรือสีดำ
    door_mat_base_material:
      name: วัสดุพื้นฐานของพรมเช็ดเท้าหน้าประตู
      description: ระบุวัสดุที่ด้านล่างของพรมเช็ดเท้า เช่น ปอกระเจาหรือลาเท็กซ์
    door_mat_base_pattern:
      name: ลวดลายพื้นฐานของพรมเช็ดเท้าหน้าประตู
      description: อธิบายการออกแบบหรือลวดลายบนฐานรองพรมเช็ดเท้า เช่น ลายดอกไม้หรือเรขาคณิต
    door_mat_surface_material:
      name: วัสดุพื้นผิวของพรมเช็ดเท้าหน้าประตู
      description: ระบุวัสดุบนพื้นผิวพรมเช็ดเท้า เช่น หญ้าทะเลหรือยาง
    door_material:
      name: วัสดุสำหรับประตู
      description: ระบุวัสดุที่ใช้ทำประตู เช่น กระจกนิรภัยหรือไฟเบอร์บอร์ดความหนาแน่นปานกลาง
        (MDF)
    door_pattern:
      name: ลวดลายประตู
      description: อธิบายการออกแบบหรือลวดลายบนประตู โดยทั่วไปใช้กับตู้บุฟเฟ่ต์และตู้ไซด์บอร์ด
    door_stop_placement:
      name: การวางตำแหน่งกันชนประตู
      description: ระบุตำแหน่งที่ติดตั้งตัวกั้นประตู เช่น บนพื้นหรือผนัง
    door_stopper_design:
      name: การออกแบบตัวกั้นประตู
      description: ระบุรูปแบบของตัวกั้นประตู เช่น ทรงตะขอ หรือทรงลิ่ม
    door_suitable_location:
      name: ตำแหน่งประตูที่เหมาะสม
      description: ระบุตำแหน่งที่เหมาะสมที่สุดสำหรับประตู เช่น ด้านหน้าหรือลานบ้าน
    door_surface_finish:
      name: การตกแต่งพื้นผิวประตู
      description: ระบุพื้นผิวที่ประตูบ้าน เช่น แบบเคลือบหรือไม่เคลือบ
    door_type:
      name: ประเภทประตู
      description: ระบุกลไกการเปิดประตู เช่น บานพับ บานเลื่อน
    double_stroller_configuration:
      name: การกำหนดค่ารถเข็นเด็กคู่
      description: ระบุการจัดที่นั่งในรถเข็นเด็กแฝด เช่น เรียงตามหลังกันหรือตีคู่กัน
    download_format:
      name: รูปแบบการดาวน์โหลด
      description: ระบุรูปแบบไฟล์สำหรับการดาวน์โหลดเพลงดิจิทัล เช่น MP3 หรือ WAV
    downstream_port_types:
      name: ประเภทพอร์ตดาวน์สตรีม
      description: แสดงรายการประเภทของพอร์ตเอาต์พุตที่ฮับมีให้สำหรับการเชื่อมต่ออุปกรณ์ต่อพ่วง
        (เช่น USB-A, USB-C, HDMI, อีเทอร์เน็ต)
    drain_location:
      name: ตำแหน่งท่อระบายน้ำ
      description: ระบุตำแหน่งท่อระบายน้ำในอ่างอาบน้ำหรือฝักบัว เช่น ตรงกลางหรือด้านซ้าย
    drainage_feature:
      name: คุณสมบัติการระบายน้ำ
      description: ระบุการออกแบบใด ๆ ที่อนุญาตให้ระบายของเหลวหรือแห้งภายในเคส
    drawing/painting_kit_items_included:
      name: รายการอุปกรณ์วาดภาพ/ระบายสีที่รวมอยู่
      description: ระบุสิ่งของที่อยู่ในชุดอุปกรณ์ศิลปะหรืองานฝีมือ เช่น แผ่นระบายสี
        ถ้วยสี
    dress_form_features:
      name: คุณลักษณะหุ่นจำลองเสื้อผ้า
      description: เน้นคุณลักษณะที่สำคัญของรูปแบบการแต่งกาย เช่น พื้นผิวที่ปักหมุดได้หรือฐานที่หมุนได้
    dress_occasion:
      name: โอกาสสำหรับการแต่งตัว
      description: ระบุโอกาสที่กำหนดไว้สำหรับการแต่งกาย เช่น วันหยุด ทุกวัน
    dress_style:
      name: สไตล์การแต่งตัว
      description: ระบุดีไซน์ของชุดเดรส เช่น แบบผูกเอวหรือทรงเอ็มไพร์
    drill_features:
      name: คุณลักษณะของสว่าน
      description: ระบุลักษณะพิเศษของสว่าน เช่น ความเร็วที่ปรับได้หรือไฟส่องสว่างในตัว
    drilling_method:
      name: วิธีการเจาะ
      description: ระบุเทคนิคที่ใช้ในเครื่องจักรเจาะ เช่น เครื่องโรตารี่หรือเครื่องเพอร์คัชชัน
    drilling_rig_orientation:
      name: การวางแนวแท่นขุดเจาะ
      description: ระบุทิศทางการเจาะด้วยแท่นขุดเจาะ เช่น แนวนอนหรือแนวตั้ง
    drinkware_material:
      name: อุปกรณ์สำหรับเครื่องดื่ม
      description: ระบุองค์ประกอบของแก้วน้ำ เช่น แก้วหรือพลาสติก
    drinkware_pieces_included:
      name: ชิ้นส่วนอุปกรณ์สำหรับเครื่องดื่มที่รวมอยู่
      description: ระบุส่วนประกอบต่างๆ ของอุปกรณ์สำหรับเครื่องดื่ม รวมอยู่ในชุด เช่น
        เหยือกหรือแก้วไวน์
    drinkware_shape:
      name: รูปทรงของแก้วเครื่องดื่ม
      description: กำหนดรูปร่างหรือรูปร่างของภาชนะใส่เครื่องดื่ม เช่น โค้งหรือเรียว
    drive_form_factor:
      name: รูปแบบไดรฟ์
      description: ระบุความสูงหรือระดับขนาดของกลไกไดรฟ์ (เช่น ความสูงเต็ม, ความสูงครึ่งหนึ่ง,
        สลิมไลน์)
    drive_size:
      name: ขนาดไดรฟ์
      description: อธิบายขนาดตัวขับของบ็อกซ์และประแจทอร์ค เช่น 1 นิ้ว
    drive_type:
      name: ประเภทไดรฟ์
      description: ระบุประเภทของระบบขับเคลื่อนในยานพาหนะหรือเครื่องจักรกลหนัก เช่น
        2WD หรือ 4WD
    driver_configuration:
      name: การกำหนดค่าไดรเวอร์
      description: ระบุจำนวนทางไดรเวอร์แยกในระบบลำโพง (เช่น 2 ทาง 3 ทาง)
    driver_technology:
      name: เทคโนโลยีไดรเวอร์
      description: ระบุประเภททรานสดิวเซอร์ที่ใช้ผลิตเสียง (เช่น ไดนามิก, บาลานซ์อาร์มาเจอร์,
        แพลนาร์แมกเนติก, ไฮบริด)
    drone_board_function:
      name: ฟังก์ชันบอร์ดโดรน
      description: อธิบายวัตถุประสงค์หลักของแผงวงจรภายในระบบโดรน
    drone_features:
      name: คุณสมบัติของโดรน
      description: ระบุคุณลักษณะการทำงานและการออกแบบต่างๆ ที่มีอยู่ในโดรน เช่น ระบบนำทาง
        GPS หรือการหลีกเลี่ยงสิ่งกีดขวาง
    drum_configuration:
      name: การกำหนดค่ากลอง
      description: ใช้เพื่อระบุการตั้งค่ากลองชุด เช่น 7 ชิ้นหรือชุดเปลือก
    drum_hardware_adjustability:
      name: ความสามารถในการปรับใช้อุปกรณ์กลองชุด
      description: ให้รายละเอียดเกี่ยวกับคุณลักษณะที่ปรับได้ของอุปกรณ์เสริมของกลองและเครื่องเคาะจังหวะ
        เช่น มุมตีที่ปรับได้
    drum_hardware_material:
      name: วัสดุที่ใช้ทำอุปกรณ์กลองชุด
      description: ระบุวัสดุที่ใช้ในฮาร์ดแวร์ดรัม เช่น เหล็กหรืออะลูมิเนียม
    dry/wet_cleaning:
      name: การทำความสะอาดแบบแห้ง/เปียก
      description: ระบุว่าผลิตภัณฑ์เหมาะสำหรับการซักแห้งหรือเปียก
    dry_bean_variety:
      name: ลักษณะถั่วแห้ง
      description: ระบุความหลากหลายของถั่วเมล็ดแห้งที่ใช้ เช่น ถั่วชิกพี ถั่วดำ
    dryer_features:
      name: คุณลักษณะของเครื่องเป่าแห้ง
      description: ระบุคุณลักษณะเฉพาะของเครื่องอบผ้า เช่น การทำความสะอาดตัวเองหรือเทคโนโลยีอินเวอร์เตอร์
    dryer_technology:
      name: เทคโนโลยีเครื่องเป่า
      description: ระบุเทคโนโลยีการทำแห้งในระบบ HVAC เช่น สารดูดความชื้น แช่เย็น
    drying_method:
      name: วิธีการอบแห้ง
      description: ระบุว่าอุปกรณ์ทำให้แปรงสีฟันแห้งหลังจากฆ่าเชื้ออย่างไร ถ้ามี
    drying_speed:
      name: ความเร็วในการแห้ง
      description: ระบุอัตราที่ผลิตภัณฑ์แห้งหรือเซ็ตตัว เช่น แห้งเร็วหรือปกติ
    dsl_standard_compatibility:
      name: ความเข้ากันได้มาตรฐาน DSL
      description: ระบุมาตรฐาน DSL ที่ตัวกรองหรืออุปกรณ์เสริมรองรับเพื่อให้แน่ใจว่ามีการตัดเสียงรบกวนและคุณภาพการเชื่อมต่อที่เหมาะสม
    duct_design:
      name: การออกแบบท่อดักท์
      description: ระบุรูปแบบของท่ออากาศในระบบ HVAC เช่น แข็ง ยืดหยุ่น
    duct_shape:
      name: รูปร่างท่อ
      description: อธิบายรูปทรงของท่ออากาศในระบบ HVAC เช่น กลม หรือ แบน
    duplex_component_type:
      name: ประเภทชิ้นส่วนดูเพล็กซ์
      description: ระบุรูปแบบเฉพาะของชิ้นส่วนดูเพล็กซ์ที่มีให้ (เช่น ชุดประกอบ, ถาด,
        เฟือง)
    duplexer_installation_type:
      name: ประเภทการติดตั้งดูเพล็กซ์เซอร์
      description: ชี้แจงวิธีที่ดูเพล็กซ์เซอร์ติดกับเครื่องพิมพ์ (เช่น ช่องภายใน,
        การติดตั้งภายนอกด้านหลัง)
    duplexing_technology:
      name: เทคโนโลยีดูเพล็กซ์
      description: ระบุว่าเครื่องพิมพ์รองรับการพิมพ์สองด้านหรือไม่ เช่น ไม่รองรับการพิมพ์สองด้านอัตโนมัติ
    duplication_operation_mode:
      name: โหมดการทำงานของการทำซ้ำ
      description: ระบุว่าเครื่องทำสำเนาทำงานแบบอิสระ ต้องเชื่อมต่อกับคอมพิวเตอร์
        หรือรองรับทั้งสองโหมด
    durability_features:
      name: คุณลักษณะด้านความทนทาน
      description: เน้นย้ำถึงความสามารถของผลิตภัณฑ์ในการทนต่อสภาวะต่างๆ เช่น กันสนิม
        กันกระแทก
    dust_container_type:
      name: ประเภทถังเก็บฝุ่น
      description: ระบุประเภทระบบเก็บฝุ่นในเครื่องดูดฝุ่นและเครื่องใช้ไฟฟ้า เช่น ไร้ถุงเก็บฝุ่น
        มีถุงเก็บฝุ่น
    dust_mask_type:
      name: ประเภทหน้ากากกันฝุ่น
      description: ระบุรูปแบบของหน้ากากป้องกันฝุ่น เช่น แบบถ้วยหรือแบบพับแบน
    dvi_connection_type:
      name: ประเภทการเชื่อมต่อ DVI
      description: ระบุขั้วต่อ DVI เฉพาะและรูปแบบลิงก์ที่รองรับ (เช่น DVI-D ลิงก์เดียว,
        DVI-I ลิงก์คู่, Mini-DVI)
    dye_form:
      name: รูปแบบการย้อม
      description: อธิบายสถานะทางกายภาพของสีย้อมงานฝีมือ เช่น เจลหรือผง
    dynamic_level:
      name: ระดับไดนามิก
      description: จัดหมวดหมู่ลูกแร็กเก็ตบอลและสควอชตามความเร็วและการกระดอน เช่น จุดเขียว
        จุดแดง
    dynamics_processing_function:
      name: ฟังก์ชันการประมวลผลไดนามิก
      description: ระบุงานไดนามิกหลักที่หน่วยดำเนินการ (เช่น คอมเพรสเซอร์, ลิมิเตอร์,
        นอยซ์เกต, ดี-เอสเซอร์)
    e_book_formats_supported:
      name: รองรับรูปแบบ E-book
      description: ระบุรูปแบบ E-book ที่เข้ากันได้กับอุปกรณ์ เช่น PDF หรือ EPUB
    e_book_reader_part_location:
      name: ตำแหน่งชิ้นส่วนอีบุ๊ครีดเดอร์
      description: ระบุว่าชิ้นส่วนติดตั้งหรืออยู่ที่ใดบนอุปกรณ์
    e_cigarette/vaporizer_style:
      name: สไตล์ของบุหรี่ไฟฟ้า/เครื่องทำไอระเหย
      description: จำแนกประเภทบุหรี่ไฟฟ้าและเครื่องพ่นไอระเหยตามรูปแบบ เช่น แบบใช้แล้วทิ้ง
        แบบปากกา
    e_liquid_flavor:
      name: รสชาติบุหรี่ไฟฟ้า
      description: ระบุรสชาติของน้ำยาบุหรี่ไฟฟ้าสำหรับเครื่องทำไอระเหยและบุหรี่ไฟฟ้า
        เช่น รสกาแฟ รสสตรอเบอร์รี่
    e_liquid_variety:
      name: ลักษณะบุหรี่ไฟฟ้า
      description: แยกความแตกต่างระหว่างตัวเลือกน้ำยาบุหรี่ไฟฟ้าต่างๆ เช่น Short Fill,
        Nicotine Shot
    e_reader_display_technology:
      name: เทคโนโลยีจอแสดงผลอีรีดเดอร์
      description: ระบุประเภทของเทคโนโลยีหน้าจอที่ใช้ใน e-reader เช่น LCD หรือ e-ink
    ear_care_application_method:
      name: วิธีใช้งานผลิตภัณฑ์ดูแลหู
      description: ระบุวิธีการใช้กับผลิตภัณฑ์ดูแลหู เช่น หัวฉีดหรือหยด
    ear_dryer_technology:
      name: เทคโนโลยีเครื่องเป่าหู
      description: ระบุกลไกการอบแห้งหลักที่ผลิตภัณฑ์ใช้
    ear_orientation:
      name: ทิศทางหู
      description: ระบุว่าหูฟังออกแบบมาสำหรับหูซ้าย หูขวา หรือสามารถสวมได้ทั้งสองข้าง
    ear_pick_tip_style:
      name: รูปแบบปลายไม้แคะหู
      description: กำหนดรูปทรงหรือการออกแบบของปลายที่ใช้งานที่กำจัดขี้หู
    ear_side:
      name: ข้างหู
      description: ระบุว่าเครื่องช่วยนี้มีไว้สำหรับหูซ้าย หูขวา หรือใช้เป็นคู่สองข้าง
    ear_tip_size:
      name: ขนาดจุกหู
      description: ระบุขนาดทั่วไปที่ใช้สำหรับจุกหูเมื่อไม่ได้ระบุขนาดมิลลิเมตรที่แน่นอน
    ear_tip_style:
      name: สไตล์จุกหู
      description: กำหนดรูปทรงเรขาคณิตของจุกหูที่มีอิทธิพลต่อความพอดีและการปิดผนึกอะคูสติก
    earphone_features:
      name: คุณลักษณะของหูฟัง
      description: เน้นคุณลักษณะที่เป็นเอกลักษณ์ในหูฟัง เช่น ไมโครโฟนในตัวหรือการควบคุมระดับเสียง
    earplug_cord_style:
      name: รูปแบบสายที่อุดหู
      description: ระบุว่าที่อุดหูเชื่อมต่อด้วยสายหรือไม่ ซึ่งช่วยป้องกันการสูญหายและช่วยให้ถอดออกได้ง่าย
    earplug_shape:
      name: รูปทรงที่อุดหู
      description: อธิบายโปรไฟล์ทางกายภาพของที่อุดหู ซึ่งส่งผลต่อความสบายและความพอดีภายในช่องหูที่ต่างกัน
    earplug_type:
      name: ประเภทที่อุดหู
      description: จำแนกรูปแบบการสร้างของที่อุดหูที่จ่าย (เช่น โฟม หล่อ กรอง)
    earplug_use:
      name: ใช้ที่อุดหู
      description: ระบุกิจกรรมหรือวัตถุประสงค์เฉพาะสำหรับที่อุดหู เช่น การว่ายน้ำหรือการนอน
    earring_design:
      name: การออกแบบต่างหู
      description: อธิบายสไตล์หรือโครงสร้างของต่างหู เช่น แบบห่วงหรือแบบติดหู
    edge_style:
      name: สไตล์ขอบ
      description: ระบุรูปร่างของขอบบนสิ่งของต่างๆ เช่น เคาน์เตอร์ เช่น บูลโนส ปลดเปลื้อง
    edge_type:
      name: ประเภทขอบ
      description: ระบุรูปแบบของขอบบนเครื่องมือหรือเครื่องใช้ เช่น ฟันเลื่อยแบบไมโครหรือมีรอยบาก
    education_level:
      name: ระดับการศึกษา
      description: ระบุขั้นตอนการศึกษาที่ซอฟต์แวร์ได้รับการออกแบบ เช่น โรงเรียนประถมศึกษาหรือบัณฑิตวิทยาลัย
    effects_processor_form_factor:
      name: รูปแบบของโปรเซสเซอร์เอฟเฟกต์
      description: อธิบายรูปแบบทางกายภาพหรือการส่งมอบของโปรเซสเซอร์
    egg_decorating_items_included:
      name: รายการอุปกรณ์ตกแต่งไข่ที่รวมอยู่
      description: ระบุอุปกรณ์เสริมที่ให้มาในชุดตกแต่งไข่ เช่น เม็ดสีย้อม ที่จุ่มไข่
    egg_turning:
      name: การกลับไข่ฟัก
      description: อธิบายวิธีการหมุนไข่ในตู้ฟัก เช่น แบบอัตโนมัติหรือแบบแมนนวล
    electric_scooter_motor_type:
      name: ประเภทมอเตอร์สกู๊ตเตอร์ไฟฟ้า
      description: ระบุประเภทและการกำหนดค่าของมอเตอร์สกู๊ตเตอร์ เช่น DC แบบแปรงถ่าน
        หรือ DC แบบไม่มีแปรงถ่าน
    electrode_connector_type:
      name: ประเภทขั้วต่ออิเล็กโทรด
      description: อธิบายอินเทอร์เฟซทางกายภาพที่ใช้ติดอิเล็กโทรดหรือแผ่น
    electronic_drum_components:
      name: ส่วนประกอบกลองชุดไฟฟ้า
      description: ระบุองค์ประกอบของกลองชุดอิเล็กทรอนิกส์ เช่น โมดูลกลองหรือแป้นซ้อมกลอง
    electronic_game_genre:
      name: ประเภทเกมอิเล็กทรอนิกส์
      description: ระบุหมวดหมู่ของเกมอิเล็กทรอนิกส์ เช่น ฟิตเนสหรือปริศนา
    electrotherapy_modality:
      name: วิธีการรักษาด้วยไฟฟ้า
      description: ระบุประเภทของเทคโนโลยีการกระตุ้นที่อุปกรณ์รองรับ (เช่น TENS, EMS,
        IFC)
    embellishment/trim_material:
      name: วัสดุตกแต่ง/ตัดแต่ง
      description: ระบุวัสดุที่ใช้สำหรับตกแต่งรายละเอียดหรือการตกแต่ง เช่น เลื่อมหรือมุก
    embellishments:
      name: เครื่องตกแต่ง
      description: ระบุองค์ประกอบตกแต่งเพิ่มเติมบนผลิตภัณฑ์ เช่น เลื่อมหรือกระดุม
    embossing_project_type:
      name: ประเภทโครงการการปั๊มนูน
      description: ระบุประเภทของโครงการลายนูน เช่น สมุดภาพหรือการทำการ์ด
    embouchure_hole_shape:
      name: รูปร่างรูเป่าฟลูต
      description: อธิบายรูปร่างของรูบนข้อต่อหัวขลุ่ย เช่น ทรงกลมหรือวงรี
    emergency/safety_sign_design:
      name: การออกแบบป้ายฉุกเฉิน/ความปลอดภัย
      description: ระบุประเภทของข้อความด้านความปลอดภัยหรือข้อความฉุกเฉินบนป้าย เช่น
        ทางหนีไฟหรือสุนัขเฝ้ายาม
    emergency_items_included:
      name: รายการฉุกเฉินที่รวมอยู่
      description: ระบุรายการที่รวมอยู่ในชุดอุปกรณ์ฉุกเฉิน เช่น วิทยุหรือแบตเตอรี่
    enclosure_type:
      name: ประเภทสิ่งที่แนบมา
      description: ระบุประเภทของเคสหรือฝาครอบสำหรับเครื่องพิมพ์ 3 มิติ เช่น แบบเปลือยหรือกล่องแบบ
        DIY
    end_design:
      name: การออกแบบปลาย
      description: ระบุจำนวนปลายที่ใช้งานได้และสามารถเปลี่ยนหรือสลับได้หรือไม่
    enema_device_type:
      name: ประเภทอุปกรณ์สวนทวาร
      description: จำแนกการออกแบบหลักหรือระบบการส่งของผลิตภัณฑ์
    enema_nozzle_type:
      name: ประเภทหัวฉีดสวนทวาร
      description: ระบุรูปแบบหรือวัสดุของหัวฉีดหรือปลายที่ให้มาพร้อมกับชุด (เช่น ปลายเรียว
        ปลายสำหรับเด็ก หัวฉีดสแตนเลส)
    energy_efficiency_class:
      name: ระดับประสิทธิภาพพลังงาน
      description: ระบุระดับประสิทธิภาพการใช้พลังงานของผลิตภัณฑ์ เช่น A+++
    energy_efficiency_class_hdr:
      name: ระดับประสิทธิภาพพลังงาน (HDR)
      description: ระบุประสิทธิภาพการใช้พลังงานของอุปกรณ์ที่รองรับ HDR ซึ่งโดยทั่วไปคือโทรทัศน์
        เช่น A+++
    energy_efficiency_class_sdr:
      name: ระดับประสิทธิภาพพลังงาน (SDR)
      description: ระบุประสิทธิภาพการใช้พลังงานของอุปกรณ์ที่รองรับ SDR ซึ่งโดยทั่วไปคือโทรทัศน์
        เช่น A+++
    engine_design:
      name: การออกแบบเครื่องยนต์
      description: อธิบายโครงร่างเครื่องยนต์ของยานพาหนะ เช่น 2 จังหวะ
    engine_purpose:
      name: วัตถุประสงค์ของเครื่องยนต์
      description: ระบุจุดประสงค์การใช้งานเครื่องยนต์ขนาดเล็ก เช่น เครื่องตัดหญ้าหรือเลื่อยไฟฟ้า
    engine_type:
      name: ประเภทเครื่องยนต์
      description: ระบุชนิดของเครื่องยนต์ในยานพาหนะหรือชิ้นส่วน เช่น ไฟฟ้าหรือดีเซล
    engraving:
      name: การแกะสลัก
      description: รายละเอียดประเภทการแกะสลักบนผลิตภัณฑ์ เช่น ข้อความที่กำหนดเองหรือการแกะสลักโลโก้
    entry_orientation:
      name: ทิศทางการใส่เหรียญ
      description: อธิบายทิศทางที่เหรียญถูกใส่เข้าไปในกลไก (เช่น ด้านหน้า ด้านบน ด้านข้าง
        ด้านล่าง)
    envelope_features:
      name: คุณลักษณะซองจดหมาย
      description: อธิบายลักษณะพิเศษของซองจดหมาย เช่น การปิดแบบตัวล็อคหรือแบบมีเส้น
    envelope_seal_design:
      name: การออกแบบซีลปิกปากซอง
      description: อธิบายความสวยงามหรือรูปแบบของตราประทับซองจดหมาย เช่น ลายดอกไม้หรืออักษรย่อ
    equalizer_type:
      name: ประเภทอีควอไลเซอร์
      description: จำแนกประเภทโครงสร้างอีควอไลเซชั่นหรือรูปแบบการประมวลผลที่หน่วยผลิตภัณฑ์มีให้
    equipment_operation:
      name: การทำงานของอุปกรณ์
      description: อธิบายวิธีการทำงานของอุปกรณ์ทางการแพทย์ เช่น ด้วยมือหรือขับเคลื่อน
    era:
      name: ยุค
      description: ใช้เพื่อจัดหมวดหมู่ของสะสมหรือโบราณวัตถุตามช่วงเวลา เช่น ป่าตะวันตกหรือสงครามโลกครั้งที่สอง
    error_correction_type:
      name: ประเภทการแก้ไขข้อผิดพลาด
      description: ระบุว่าโมดูลหน่วยความจำมีความสามารถในการแก้ไขข้อผิดพลาดหรือไม่
        และหากมี ระบุเทคโนโลยี ECC หรือรูปแบบบัฟเฟอร์เฉพาะที่ใช้
    esrb_rating:
      name: เรตติ้ง ESRB
      description: ระบุความเหมาะสมด้านอายุของวิดีโอเกม เช่น E (ทุกคน) หรือ T (Teen)
    ethernet_cable_category:
      name: หมวดหมู่สายอีเทอร์เน็ต
      description: ระบุอันดับหมวดหมู่ TIA/EIA ของสายอีเทอร์เน็ตแบบคู่บิด ซึ่งกำหนดแบนด์วิดท์และประสิทธิภาพ
    ethernet_lan_interface_type:
      name: ประเภทอินเทอร์เฟซอีเทอร์เน็ตแลน
      description: ระบุประเภทการเชื่อมต่ออีเทอร์เน็ตที่ผลิตภัณฑ์รองรับ เช่น LAN หรือแบบเร็ว
    ev_battery_features:
      name: คุณลักษณะแบตเตอรี่ EV
      description: จุดเด่นของแบตเตอรี่ EV เช่น อายุการใช้งานยาวนานหรือระบบจัดการแบตเตอรี่อัจฉริยะ
    ev_battery_type:
      name: ประเภทแบตเตอรี่ EV
      description: ระบุประเภทของแบตเตอรี่ที่ใช้ในยานพาหนะไฟฟ้า เช่น ลิเธียมไอออนหรือกรดตะกั่ว
    ev_connector/adapter_type:
      name: ประเภทขั้วต่อ/อะแดปเตอร์ EV
      description: ระบุประเภทของตัวเชื่อมต่อหรืออะแดปเตอร์สำหรับรถยนต์ไฟฟ้า เช่น CCS
        หรือ Tesla
    ev_conversion_kit_components:
      name: ส่วนประกอบชุดแปลง EV
      description: ระบุชิ้นส่วนที่รวมอยู่ในชุดแปลง EV เช่น มอเตอร์หรือชุดแบตเตอรี่
    evaporation_technology:
      name: เทคโนโลยีการระเหย
      description: ระบุระบบการระเหยในอุปกรณ์ควบคุมสภาพอากาศ เช่น แบบธรรมชาติหรือแบบอัลตราโซนิก
    event_type:
      name: ประเภทเหตุการณ์
      description: จำแนกประเภทลักษณะของกิจกรรม เช่น คอนเสิร์ต สัมมนา หรือเทศกาล
    exercise_equipment_included:
      name: รวมอุปกรณ์ออกกำลังกาย
      description: ระบุรายการออกกำลังกายเฉพาะที่รวมอยู่ในชุด เช่น เสื่อโยคะหรือดัมเบล
    exercise_equipment_material:
      name: วัสดุที่ใช้ทำอุปกรณ์ออกกำลังกาย
      description: ระบุวัสดุหลักที่ใช้ในอุปกรณ์ออกกำลังกาย เช่น เหล็กหรือยาง
    exercise_machine_board_function:
      name: ฟังก์ชันบอร์ดเครื่องออกกำลังกาย
      description: อธิบายฟังก์ชันหลักหรือตำแหน่งของบอร์ดภายในเครื่อง (เช่น ควบคุมมอเตอร์,
        จอแสดงผล)
    exercise_machine_features:
      name: คุณลักษณะเครื่องออกกำลังกาย
      description: อธิบายคุณลักษณะพิเศษของอุปกรณ์ออกกำลังกาย เช่น ปรับความเร็วได้หรือจอแสดงผลในตัว
    exercise_mat_material:
      name: วัสดุที่ใช้ทำเบาะออกกำลังกาย
      description: ระบุประเภทของวัสดุที่ใช้ในเสื่อออกกำลังกาย เช่น PVC หรือไม้ก๊อก
    exfoliating_agent_type:
      name: ประเภทสารขัดผิว
      description: ระบุสารขัดหรือสารขัดผิวเคมีหลักที่ใช้
    exfoliation_level:
      name: ระดับการขัดผิว
      description: ระบุว่าการขัดผิวของฟองน้ำอ่อนโยนหรือแน่นเพียงใด
    exfoliation_method:
      name: วิธีการขัดผิว
      description: ระบุว่าและอย่างไรที่คลีนเซอร์ขัดผิว (เช่น ทางกายภาพ เคมี เอนไซม์)
    expansion_slots:
      name: ช่องเสียบขยาย
      description: ระบุช่องสำหรับเพิ่มฮาร์ดแวร์ในคอมพิวเตอร์หรือเซิร์ฟเวอร์ เช่น PCIe,
        M.2
    exposure_control:
      name: การควบคุมการรับสัมผัส
      description: ระบุวิธีการปรับปริมาณแสงในภาพถ่าย เช่น โหมดใช้ชัตเตอร์เป็นหลัก
        โหมดใช้รูรับแสงเป็นหลัก
    extended_saxophone_range:
      name: ช่วงแซกโซโฟนแบบขยาย
      description: ระบุช่วงโน้ตขยายของแซ็กโซโฟน เช่น คีย์ F# สูงหรือคีย์ A ต่ำ
    external_antenna_connector_type:
      name: ประเภทขั้วต่อเสาอากาศภายนอก
      description: กำหนดขั้วต่อทางกายภาพที่ใช้เพื่อติดตั้งเสาอากาศภายนอก
    external_defibrillator_features:
      name: คุณลักษณะของเครื่องกระตุกหัวใจไฟฟ้า
      description: เน้นคุณลักษณะที่สำคัญของเครื่องกระตุ้นหัวใจทางการแพทย์ เช่น ฟังก์ชั่นสำหรับเด็กหรือ
        ECG บนหน้าจอ
    extinguisher_rating:
      name: คะแนนเครื่องดับเพลิง
      description: ระบุประเภทของถังดับเพลิง เช่น ประเภท A, ประเภท B
    extinguishing_agent_type:
      name: ประเภทสารดับเพลิง
      description: ระบุชนิดของสารดับเพลิงในผลิตภัณฑ์ป้องกันอัคคีภัย เช่น น้ำหรือโฟม
    extraction_method:
      name: วิธีการสกัด
      description: ระบุเทคนิคที่ใช้ในการสกัดแคนนาบินอยด์จากวัสดุพืชกัญชง
    extraction_technology:
      name: เทคโนโลยีการสกัด
      description: อธิบายกลไกหลักที่ผลิตภัณฑ์ใช้ในการสกัดสิ่งสกปรก
    extraction_type:
      name: ประเภทการสกัด
      description: ระบุวิธีการกำจัดอากาศในเครื่องดูดควัน เช่น แบบไร้ท่อหรือปรับรูปแบบได้
    extractor_items_included:
      name: รายการเครื่องมือสกัดที่รวมมาให้
      description: ระบุเครื่องมือสกัดหรืออุปกรณ์เสริมต่างๆ ที่รวมอยู่ในชุด
    extractor_tip_style:
      name: สไตล์ปลายระบาย
      description: ระบุการออกแบบปลายหัวบนเครื่องขัดผิว เช่น สคูป เข็ม
    eye_care_applicator_type:
      name: ประเภทอุปกรณ์ทาผลิตภัณฑ์ดูแลดวงตา
      description: กำหนดสไตล์ของอุปกรณ์ทาหรือหัวจ่ายในตัวที่มาพร้อมกับผลิตภัณฑ์รักษาดวงตา
    eye_condition_treated:
      name: สภาวะตาที่รักษา
      description: ระบุปัญหาตาหลักที่ผลิตภัณฑ์ถูกสร้างขึ้นเพื่อบรรเทาหรือรักษา
    eye_pillow_shape:
      name: รูปร่างของหมอนปิดตา
      description: ระบุรูปร่างทางกายภาพของหมอนปิดตา เช่น ทรงโค้งหรือทรงสี่เหลี่ยม
    eye_shadow_effect:
      name: เอฟเฟกต์อายแชโดว์
      description: ระบุลักษณะการเปลี่ยนแปลงที่เห็นได้ชัดเจนจากอายแชโดว์ เช่น สโมคกี้
        กลิตเตอร์
    eye_shadow_palette_size:
      name: ขนาดพาเลทอายแชโดว์
      description: จำแนกผลิตภัณฑ์ตามรูปแบบพาเลททั่วไปเพื่อการเรียกดูอย่างรวดเร็ว
    eyebrow_applicator_type:
      name: ประเภทอุปกรณ์ทาคิ้ว
      description: อธิบายอุปกรณ์ทาหรือปลายที่ใช้ในการทาผลิตภัณฑ์คิ้ว
    eyebrow_enhancer_color:
      name: สีเขียนคิ้ว
      description: ระบุสีของผลิตภัณฑ์สีเขียนคิ้ว เช่น สีดำหรือสีบลอนด์อ่อน
    eyebrow_stencil_shape:
      name: รูปทรงแม่แบบคิ้ว
      description: อธิบายรูปทรงคิ้วหรือสไตล์โค้งหลักที่แม่แบบมีวัตถุประสงค์เพื่อสร้าง
    eyelash_applicator_design:
      name: ออกแบบอุปกรณ์สำหรับขนตา
      description: ระบุลักษณะของอุปกรณ์ติดขนตาปลอม เช่น แบบตรง แบบโค้ง
    eyelash_curl_type:
      name: ประเภทความโค้งขนตา
      description: ระบุการจำแนกความโค้ง (เช่น C-curl, D-curl) ของเส้นใยขนตา
    eyelash_curler_type:
      name: ประเภทที่ดัดขนตา
      description: ระบุการออกแบบหรือกลไกของที่ดัดขนตา
    eyelash_material:
      name: วัสดุที่ใช้ทำขนตา
      description: ระบุประเภทของวัสดุที่ใช้ในขนตาปลอม เช่น ไหมหรือใยสังเคราะห์
    eyelash_remover_formulation:
      name: สูตรน้ำยาล้างขนตา
      description: ระบุประเภทสูตรหลักของน้ำยาล้าง
    eyelash_style:
      name: สไตล์ขนตา
      description: อธิบายเอฟเฟกต์ภาพโดยรวมหรือการออกแบบของชุดขนตา (เช่น ธรรมชาติ ตาแมว
        ดราม่า)
    eyelash_type:
      name: ประเภทขนตา
      description: ระบุประเภทของขนตาปลอม เช่น ขนตาติดแถบ แบบต่อขนตา
    eyepiece/adapter_material:
      name: วัสดุที่ใช้ทำอะแดปเตอร์ช่องมองภาพ
      description: ระบุวัสดุที่ใช้ในเลนส์ใกล้ตาหรืออะแดปเตอร์ของกล้องจุลทรรศน์ เช่น
        แก้วหรือโลหะ
    eyewear_compatibility:
      name: ความเข้ากันได้กับแว่นตา
      description: ระบุประเภทของแว่นตาที่ต้องการให้นำสายคล้องมาใช้
    eyewear_frame_color:
      name: สีของกรอบแว่น
      description: ระบุสีของกรอบแว่นตา เช่น สีดำหรือสีทอง
    eyewear_frame_design:
      name: การออกแบบกรอบแว่น
      description: อธิบายสไตล์ของแว่นกันแดด เช่น ทรงนักบินหรือทรงแคทอาย
    eyewear_frame_material:
      name: วัสดุที่ใช้ทำกรอบแว่น
      description: ระบุประเภทของวัสดุที่ใช้ทำกรอบแว่นตา เช่น ไม้ไผ่หรือคาร์บอนไฟเบอร์
    eyewear_frame_pattern:
      name: ลวดลายกรอบแว่น
      description: ระบุลวดลายบนกรอบแว่นตา เช่น ลายทางหรือลายตารางหมากรุก
    eyewear_frame_shape:
      name: รูปทรงของกรอบแว่น
      description: อธิบายรูปร่างของแว่นตา เช่น กลมหรือสี่เหลี่ยม
    eyewear_hinge_type:
      name: ประเภทบานพับแว่นตา
      description: อธิบายกลไกบานพับที่ใช้บนขาแว่น ซึ่งมีอิทธิพลต่อความทนทานและความยืดหยุ่น
    eyewear_lens_color:
      name: สีของเลนส์แว่นตา
      description: ระบุสีของเลนส์ในแว่นตา เช่น สีใสหรือสีส้ม
    eyewear_lens_material:
      name: วัสดุที่ใช้ทำเลนส์แว่นตา
      description: ระบุประเภทของวัสดุที่ใช้สำหรับเลนส์แว่นตา เช่น พลาสติกหรือแก้วดัชนีสูง
    eyewear_lens_pattern:
      name: ลวดลายของเลนส์แว่นตา
      description: อธิบายการออกแบบหรือลายพิมพ์บนเลนส์แว่นตา เช่น รูปหัวใจหรือลายเพสลีย์
    eyewear_strap_features:
      name: คุณสมบัติสายคล้องแว่นตา
      description: เน้นลักษณะการทำงานที่โดดเด่นของสายหรือโซ่ (เช่น ลอยน้ำ สะท้อนแสง
        ปลดเร็ว)
    eyewear_strap_or_chain_style:
      name: รูปแบบสายคล้องหรือโซ่แว่นตา
      description: ระบุรูปแบบการสร้างหลักหรือรูปแบบของสายคล้องหรือโซ่แว่นตา (เช่น
        สายเชือก โซ่โลหะ สายนีโอพรีน)
    fabric:
      name: ผ้า
      description: ระบุประเภทของผ้าที่ใช้ในผลิตภัณฑ์ เช่น ผ้าฝ้ายหรือผ้าเดนิม
    fabric_structure:
      name: โครงสร้างผ้า
      description: ระบุองค์ประกอบโครงสร้างของผ้า เช่น ผ้าทอหรือผ้าไม่ทอ
    face_area:
      name: บริเวณใบหน้า
      description: ระบุพื้นที่ใบหน้าที่เป็นเป้าหมายของผลิตภัณฑ์บำรุงผิว เช่น ดวงตาหรือคอ
    face_powder_color:
      name: สีของแป้งทาหน้า
      description: ระบุเฉดสีของแป้งทาหน้า เช่น สีทองอมชมพูหรือสีน้ำตาลเข้ม
    face_powder_type:
      name: ประเภทของแป้งทาหน้า
      description: ระบุชนิดของแป้งทาหน้า เช่น แป้งฟินิชชิ่งหรือแป้งฝุ่น
    faceplate_design:
      name: การออกแบบหน้ากาก
      description: ระบุประเภทของแผ่นปิดหน้าบนอุปกรณ์อิเล็กทรอนิกส์ของยานพาหนะ เช่น
        แบบถอดได้หรือแบบตายตัว
    facial_cleansing_kit_items_included:
      name: รายการที่รวมในชุดทำความสะอาดใบหน้า
      description: ระบุผลิตภัณฑ์หรือเครื่องมือเฉพาะที่อยู่ในชุดทำความสะอาดใบหน้า (เช่น
        คลีนเซอร์ โทนเนอร์ เซรั่ม แปรง กระเป๋าเดินทาง)
    facial_steamer_features:
      name: คุณสมบัติเครื่องพ่นไอน้ำใบหน้า
      description: ระบุฟังก์ชันในตัวหลักที่ช่วยเพิ่มประสิทธิภาพการรักษาด้วยไอน้ำ
    facility_sign_design:
      name: การออกแบบป้ายสิ่งอำนวยความสะดวก
      description: อธิบายพื้นที่หรือห้องเฉพาะที่ป้ายนี้มีไว้สำหรับ เช่น ห้องครัวหรือสำนักงาน
    fader_type:
      name: ประเภทเฟเดอร์
      description: ระบุสไตล์ทางกายภาพของเฟเดอร์ช่องสัญญาณบนมิกเซอร์
    false_eyelash_adhesive_formulation:
      name: สูตรกาวขนตาปลอม
      description: ระบุสูตรเคมีหลักของกาว
    false_nail_adhesive_type:
      name: ประเภทกาวเล็บปลอม
      description: ระบุประเภทของตัวเลือกกาวที่จัดหาหรือต้องการสำหรับเล็บ (เช่น กาว
        แท็บ ทั้งสอง ไม่มี)
    false_nail_application_method:
      name: วิธีการติดเล็บปลอม
      description: ระบุวิธีการติดเล็บปลอม เช่น แบบใช้กาวติดหรือแบบมีกาวในตัว
    fastener_finish:
      name: การตกแต่งผิวตัวยึด
      description: อธิบายการเคลือบผิวของอุปกรณ์ฮาร์ดแวร์ เช่น ทองเหลืองหรือโครเมียม
    fastener_material:
      name: วัสดุที่ใช้ทำตัวยึด
      description: ระบุประเภทของวัสดุที่ใช้ในรัด เช่น ทองเหลือง สแตนเลส
    fastener_type:
      name: ประเภทตัวยึด
      description: ระบุประเภทของกลไกการยึดที่ใช้ เช่น แม่เหล็ก
    fat_content:
      name: ปริมาณไขมัน
      description: ระบุปริมาณไขมันในผลิตภัณฑ์อาหารและเครื่องดื่ม เช่น ไขมันเต็มส่วน
        ไขมันต่ำ
    faucet_thread:
      name: เธรดก๊อกน้ำ
      description: ระบุประเภทของการเชื่อมต่อเกลียว faucet เช่น แบบคู่หรือแบบตัวเมีย
    features:
      name: คุณลักษณะ
      description: อธิบายคุณสมบัติหรือคุณลักษณะเพิ่มเติมของผลิตภัณฑ์ เช่น น้ำหนักเบาหรือแบบพับได้
    feed_system:
      name: ระบบให้อาหาร
      description: อธิบายวิธีการป้อนกระดาษลงในอุปกรณ์ เช่น อัตโนมัติหรือด้วยตนเอง
    feet_type:
      name: ประเภทเท้า
      description: ระบุประเภทของขาในอุปกรณ์อิเล็กทรอนิกส์ ซึ่งโดยทั่วไปคือไม้เซลฟี่
        เช่น แบบพับเก็บได้
    felt_tip_design:
      name: การออกแบบปลายหัวสักหลาด
      description: อธิบายความหนาของปลายสักหลาดของปากกา เช่น ปานกลางหรือละเอียด
    feminine_sanitary_supply_features:
      name: คุณลักษณะเครื่องใช้เพื่อสุขอนามัยของผู้หญิง
      description: อธิบายลักษณะเฉพาะของผลิตภัณฑ์สุขภัณฑ์สำหรับผู้หญิง เช่น การออกแบบที่ระบายอากาศได้ดี
        การดูดซึมที่รวดเร็ว
    fencing_components:
      name: ส่วนประกอบการวางรั้ว
      description: ระบุส่วนของระบบรั้ว เช่น รางหรือแผง
    fertility_metrics_measured:
      name: เมตริกภาวะเจริญพันธุ์ที่วัด
      description: แสดงรายการเมตริกทางชีวภาพหรือพารามิเตอร์ที่ผลิตภัณฑ์ให้แก่ผู้ใช้
    fiber_art_project_type:
      name: ประเภทโครงการงานศิลปะจากไฟเบอร์
      description: จัดหมวดหมู่งานหัตถกรรมจากเส้นใย เช่น งานปักหรือมาคราเม่
    fiber_optic_mode:
      name: โหมดไฟเบอร์ออปติก
      description: ระบุว่าอุปกรณ์เสริมไฟเบอร์ได้รับการออกแบบมาสำหรับไฟเบอร์ออปติกโหมดเดียวหรือหลายโหมด
    field_flatness:
      name: ความเรียบของสนาม
      description: ระบุความเรียบของมุมรับภาพในเลนส์กล้องจุลทรรศน์ เช่น Super Plan,
        Semi-Plan
    filament_type:
      name: ประเภทเส้นใย
      description: ระบุประเภทของเส้นใยที่ใช้ในการพิมพ์ 3 มิติ เช่น เรซินหรือเหมาะต่อการใช้กับอาหาร
    file_format_type:
      name: ประเภทรูปแบบไฟล์
      description: ระบุรูปแบบของไฟล์ดิจิทัล เช่น GIF, PDF
    file_shape:
      name: รูปร่างแฟ้ม
      description: อธิบายรูปร่างของตะไบเท้า เช่น ทรงโค้งหรือวงรี
    filler_material:
      name: วัสดุเติม
      description: ระบุประเภทของวัสดุที่ใช้บรรจุลงในผลิตภัณฑ์ โดยทั่วไปแล้วจะเป็นหมอนหรือหมอนอิง
        เช่น เมมโมรีโฟม ขนนก
    filler_support:
      name: การสนับสนุนฟิลเลอร์
      description: ระบุระดับความแน่นหรือรูปแบบภายในของหมอน เช่น นุ่มหรือเมมโมรีโฟม
    filler_type:
      name: ประเภทฟิลเลอร์
      description: ระบุประเภทของฟิลเลอร์ที่ใช้ในการบำรุงรักษายานพาหนะ เช่น ไฟเบอร์กลาสหรือน้ำหนักเบา
    filling/padding_project_type:
      name: ประเภทโครงการการยัดไส้/การยัดเบาะ
      description: ระบุวัตถุประสงค์การใช้วัสดุอุดหรือวัสดุบุรอง เช่น การทำของเล่นยัดไส้
    film_application_method:
      name: วิธีใช้งานฟิล์ม
      description: ระบุวิธีการติดฟิล์มกรองแสงที่หน้าต่าง เช่น แบบยึดเกาะเหนียวแน่น
        แบบมีกาวในตัว
    film_format:
      name: รูปแบบภาพยนตร์
      description: ระบุประเภทของฟิล์มที่ใช้ในกล้อง เช่น 35 มม. หรือ Instax mini
    film_type:
      name: ประเภทภาพยนตร์
      description: ระบุขนาดและรูปแบบของฟิล์มที่ใช้ในกล้อง เช่น 35 มม. หรือ 120 มม
    filter_form_factor:
      name: รูปแบบของตัวกรอง
      description: อธิบายสไตล์ทางกายภาพของหน่วยกรองสำหรับตรวจสอบความเข้ากันได้ (เช่น
        ตลับ ตัวกรองพัดลม แคปซูล แผ่น ชุดตัวกรอง)
    filter_installation_type:
      name: ประเภทการติดตั้งฟิลเตอร์
      description: ระบุรูปแบบทางกายภาพและวิธีการติดตั้งของฟิลเตอร์ DSL
    filter_material:
      name: วัสดุที่ใช้ทำที่กรอง
      description: ระบุประเภทของวัสดุที่ใช้ในตัวกรอง โดยทั่วไปใช้กับกาแฟ เช่น กระดาษ
        ป่าน
    filter_slope:
      name: ความชันของตัวกรอง
      description: ระบุอัตราการลดทอนของตัวกรองครอสโอเวอร์ แสดงเป็น dB ต่ออ็อกเทฟ
    filter_topology:
      name: โครงสร้างตัวกรอง
      description: ระบุตระกูลการตอบสนองของตัวกรอง ซึ่งกำหนดรูปร่างการตอบสนองความถี่และลักษณะเฟส
    filter_type:
      name: ประเภทฟิลเตอร์
      description: แยกความแตกต่างระหว่างตัวกรอง โดยทั่วไปใช้สำหรับตู้ปลา เช่น แบบกลไก
        เคมี
    filtering_modes:
      name: โหมดการกรอง
      description: ระบุโหมดการทำงานของเรดาร์หรือเครื่องตรวจจับความเร็ว เช่น โหมดทางหลวง
        การล็อก GPS
    filtration_class:
      name: คลาสการกรอง
      description: จำแนกประเภทระดับการกรองของอุปกรณ์ช่วยหายใจ เช่น FFP1 หรือ B3
    filtration_technology:
      name: เทคโนโลยีการกรอง
      description: ระบุเทคโนโลยีหรือขั้นตอนที่ตัวกรองใช้เพื่อกำจัดสารปนเปื้อนในอากาศที่เกิดขึ้นระหว่างการพิมพ์
    fin_material:
      name: วัสดุที่ใช้ทำครีบ
      description: ระบุประเภทของวัสดุในตีนกบดำน้ำหรือดำน้ำตื้น เช่น พลาสติกหรือยาง
    fin_pocket_type:
      name: ประเภทช่องฟิน
      description: ระบุการออกแบบช่องสวมเท้าที่อยู่ในตีนกบ เช่น หุ้มส้น เปิดส้น
    fin_profile:
      name: โปรไฟล์ฟิน
      description: จำแนกประเภทกระดานโต้คลื่นตามลักษณะครีบ เช่น ห้าครีบ แฝด
    fingerboard_color:
      name: สีฟิงเกอร์บอร์ด
      description: ระบุสีฟิงเกอร์บอร์ดบนเครื่องสาย เช่น สีเงิน สีขาว
    fingerboard_material:
      name: วัสดุสำหรับฟิงเกอร์บอร์ด
      description: ระบุประเภทของวัสดุที่ใช้สำหรับฟิงเกอร์บอร์ดบนกีตาร์ เช่น ไม้มะเกลือหรือวัสดุสังเคราะห์
    fingerboard_pattern:
      name: ลวดลายฟิงเกอร์บอร์ด
      description: อธิบายการออกแบบหรือลวดลายบนฟิงเกอร์บอร์ดของกีตาร์ เช่น ลายดอกไม้หรือเรขาคณิต
    fingerprint_capture_method:
      name: วิธีการจับภาพลายนิ้วมือ
      description: ระบุประเภทของวิธีการตรวจจับลายนิ้วมือที่ใช้ เช่น Capacitive หรือ
        Optical
    finial_shape:
      name: รูปทรงของส่วนยอด
      description: ระบุการออกแบบหรือรูปแบบของส่วนยอดของเฟอร์นิเจอร์ที่มีการประดับตกแต่ง
        เช่น ลูกโอ๊กหรือลูกบอล
    finish:
      name: ฟินิชลุค
      description: อธิบายคุณภาพพื้นผิวของผลิตภัณฑ์ เช่น ซาตินหรือด้าน
    fire_extinguisher_items_included:
      name: รวมอุปกรณ์ดับเพลิง
      description: ระบุรายการอื่นๆ ที่มาพร้อมกับถังดับเพลิง เช่น สายฉีดหรือขายึด
    firewire_standard:
      name: มาตรฐานไฟร์ไวร์
      description: ระบุข้อกำหนด IEEE 1394 ที่สายเคเบิลรองรับ ซึ่งกำหนดความเร็วสูงสุดและความเข้ากันได้ของอุปกรณ์
    firmness:
      name: ความแน่น
      description: ระบุระดับความแน่นของสิ่งของต่างๆ เช่น เฟอร์นิเจอร์หรือที่นอน เช่น
        นุ่มมาก แน่น
    first_aid_container_type:
      name: ประเภทภาชนะปฐมพยาบาล
      description: กำหนดสไตล์หลักของภาชนะหรือกล่องที่มาพร้อมกับชุด
    first_aid_kit_compliance_standard:
      name: มาตรฐานการปฏิบัติตามชุดปฐมพยาบาล
      description: ระบุมาตรฐานหรือกฎระเบียบอย่างเป็นทางการใด ๆ ที่ชุดเป็นไปตาม
    first_aid_kit_components:
      name: ส่วนประกอบชุดปฐมพยาบาล
      description: ระบุรายละเอียดสิ่งที่อยู่ในชุดปฐมพยาบาล เช่น ผ้าพันแผล กรรไกร
    first_aid_kit_usage:
      name: การใช้ชุดปฐมพยาบาล
      description: ระบุจุดประสงค์การใช้งานสำหรับชุดปฐมพยาบาล เช่น การเดินทาง การเล่นกีฬา
    first_steps/crawlers_style:
      name: รูปแบบอุปกรณ์ช่วยฝึกเด็กเดิน/คลาน
      description: ระบุประเภทของรองเท้าสำหรับทารกที่กำลังหัดเดินหรือคลาน เช่น รองเท้าเด็กวัยก่อนเดิน
        รองเท้าพื้นหนานุ่มพิเศษ
    fish_type:
      name: ประเภทปลา
      description: ช่วยจับคู่กับพันธุ์ปลาเฉพาะ เช่น ปลาเขตร้อนหรือปลาน้ำเย็น
    fishing_rod_action:
      name: การทำงานเบ็ดตกปลา
      description: บ่งบอกถึงการตอบสนองของคันเบ็ด เช่น ช้าหรือเร็วมาก
    fishing_rod_power:
      name: พลังเบ็ดตกปลา
      description: แสดงถึงความแข็งของคันเบ็ด เช่น Ultra Light, Extra Heavy
    fishing_wire_material:
      name: วัสดุที่ใช้ทำสายเบ็ดตกปลา
      description: ระบุองค์ประกอบของสายเบ็ด เช่น ไนลอนหรือสแตนเลส
    fit:
      name: ฟิต
      description: อธิบายความพอดีของเสื้อผ้า โดยทั่วไปจะเป็นทรงกางเกง เช่น ขาเดฟ ขาบาน
    fit_type:
      name: ประเภทฟิต
      description: อธิบายประเภทความพอดีสำหรับชิ้นส่วนและอุปกรณ์เสริมของรถยนต์ เช่น
        แบบคัสตอมหรือแบบสากล
    fixation_type:
      name: ประเภทการยึด
      description: ระบุกลไกการยึดติด โดยทั่วไปใช้สำหรับที่วางต้นคริสต์มาส เช่น หมุดยึดแบบหนาม
        สกรูยึด
    flag_shape:
      name: รูปทรงของธง
      description: ระบุรูปแบบทางเรขาคณิตของธงและถุงลม เช่น หยดน้ำหรือธงสามเหลี่ยม
    flammability_rating_ul_94:
      name: อันดับความไวไฟ (UL 94)
      description: ระบุการจำแนกประเภททนไฟ UL 94 ของวัสดุปลอก
    flare_type:
      name: ประเภทไฟ
      description: ระบุประเภทของพลุฉุกเฉินบนถนน เช่น LED หรือแบบดั้งเดิม
    flash_card_theme:
      name: ธีมแฟลชการ์ด
      description: ระบุธีมการเรียนรู้ของแฟลชการ์ด เช่น ตัวอักษรหรือตัวเลข
    flash_cell_type:
      name: ประเภทเซลล์แฟลช
      description: ระบุจำนวนบิตที่เก็บต่อเซลล์แฟลชภายในสถาปัตยกรรมหน่วยความจำ (เช่น
        SLC, MLC, TLC)
    flash_modes:
      name: โหมดแฟลช
      description: ระบุการตั้งค่าต่างๆ สำหรับแฟลชของกล้อง เช่น อัตโนมัติหรือปรับเอง
    flash_type:
      name: ประเภทแฟลช
      description: ระบุประเภทของแฟลชที่ใช้ในกล้อง เช่น วงแหวนหรือมาโคร
    flashing_material:
      name: วัสดุที่ใช้ทำแฟลชชิ่ง
      description: ระบุวัสดุที่ใช้ในการปิดบังหลังคา เช่น พลาสติกหรือทองแดง
    flat_shoe_style:
      name: สไตล์รองเท้าส้นเตี้ย
      description: ระบุดีไซน์เฉพาะของรองเท้าส้นเตี้ย เช่น รองเท้าบัลเลต์หรือทรงเอสปาดริลล์
    flatware_material:
      name: วัสดุที่ใช้ทำชุดช้อนส้อมมีด
      description: ระบุองค์ประกอบของอุปกรณ์บนโต๊ะอาหาร เช่น สแตนเลสหรือเงิน
    flatware_pieces_included:
      name: ชิ้นส่วนอุปกรณที่ใช้บนโต๊ะอาหารที่รวมอยู่
      description: ระบุประเภทของเครื่องใช้ที่อยู่ในชุดอุปกรณที่ใช้บนโต๊ะอาหาร เช่น
        มีดทาเนยหรือช้อนซุป
    flavor:
      name: รสชาติ
      description: ระบุรสหรือรสชาติของผลิตภัณฑ์ เช่น วานิลลา มินต์
    flavor_profile:
      name: โปรไฟล์รสชาติ
      description: ระบุรสชาติเฉพาะของรายการต่างๆ ซึ่งโดยทั่วไปใช้สำหรับการผลิตเบียร์
        เช่น คาราเมล บ๊อง
    flexibility_rating:
      name: คะแนนความยืดหยุ่น
      description: ระบุระดับความยืดหยุ่นของไบน์ดิ้งสำหรับสโนว์บอร์ดหรือรองเท้าเดินหิมะ
        เช่น 4
    floor_configuration:
      name: การกำหนดค่าพื้น
      description: ระบุว่าเต็นท์มีพื้นหรือไม่ และถ้ามี เป็นประเภทใด
    floral_wire_design:
      name: การออกแบบลวดจัดดอกไม้
      description: อธิบายประเภทของลวดจัดดอกไม้ที่ใช้ในการประดิษฐ์ เช่น ลวดผูกหรือลวดหุ้มผ้า
    flour/grain_type:
      name: ประเภทแป้ง/ธัญพืช
      description: ระบุประเภทของเมล็ดพืชหรือแป้งในผลิตภัณฑ์ เช่น ข้าวโพด ข้าวสาลี
    flow_rate_type:
      name: ประเภทอัตราการไหล
      description: ระบุความเร็วของการจ่ายของเหลว โดยทั่วไปจะเป็นขวดนมเด็ก เช่น ปานกลาง
        ช้า
    flower_color:
      name: สีดอกไม้
      description: ระบุสีของดอกไม้ เช่น สีชมพูหรือหลากสี
    flower_pattern:
      name: ลวดลายดอกไม้
      description: อธิบายลวดลายที่พบในดอกไม้ เช่น ลายริ้ว ลายจุด
    flue_type:
      name: ประเภทปล่องควัน
      description: ระบุประเภทของระบบปล่องไฟในเตาผิง เช่น แบบสมดุลหรือแบบทั่วไป
    fluid_type:
      name: ประเภทของของไหล
      description: ระบุของเหลวที่จำเป็นสำหรับอุปกรณ์เอฟเฟกต์พิเศษ เช่น น้ำแข็งแห้งหรือน้ำหมอก
    fluoride_content:
      name: ปริมาณฟลูออไรด์
      description: ระบุการมีอยู่และความเข้มข้นสัมพัทธ์ของฟลูออไรด์ในน้ำยาบ้วนปาก
    flush_plate_color:
      name: สีฝาครอบสวิตซ์หรือปลั๊ก
      description: ระบุสีของเพลทชักโครกบนถังส้วม เช่น สีขาวหรือสีเงิน
    flush_plate_pattern:
      name: รูปแบบฝาครอบสวิตซ์หรือปลั๊ก
      description: อธิบายการออกแบบหรือลวดลายบนฟลัชเพลทของโถชักโครก เช่น ลายดอกไม้หรือลายสก็อต
    flush_system:
      name: ระบบการกดน้ำ
      description: ระบุระบบฟลัชที่ใช้ในอุปกรณ์ติดตั้งประปา เช่น เดี่ยวหรือคู่
    flute_configuration:
      name: รูปร่างภายนอกของฟลูต
      description: ระบุการตั้งค่าเฉพาะของฟลุต เช่น B footjoint หรือ Inline G
    fm_transmitter_playback_source:
      name: แหล่งเล่นเครื่องส่ง FM
      description: ระบุตัวเลือกอินพุตสื่อที่อุปกรณ์สามารถเล่นได้ นอกเหนือจากบลูทูธ
        (เช่น USB stick, การ์ด microSD)
    foam_form:
      name: รูปแบบโฟม
      description: ระบุรูปร่างหรือประเภทของผลิตภัณฑ์โฟมสำหรับงานฝีมือ เช่น ลูกบอลหรือแผ่น
    focus_adjustment:
      name: การปรับโฟกัส
      description: ระบุวิธีที่กล้องปรับโฟกัส เช่น อัตโนมัติ ปรับเอง
    focus_device_type:
      name: ประเภทอุปกรณ์การโฟกัส
      description: ระบุประเภทของอุปกรณ์โฟกัสที่ใช้ในกล้อง เช่น เครื่องมือช่วยโฟกัส
        ตัวหมุนโฟกัส
    focus_type:
      name: ประเภทโฟกัส
      description: ระบุวิธีการโฟกัสในกล้อง เช่น TTL หรือ TTL-CT-SIR
    fold_type:
      name: ประเภทการพับ
      description: ระบุรูปแบบการพับในผลิตภัณฑ์กระดาษ เช่น พับรูปตัว Z หรือพับสองทบ
    folder/report_cover_material:
      name: วัสดุที่ใช้ทำปกแฟ้ม/รายงาน
      description: ระบุวัสดุที่ใช้ทำแฟ้มหรือปกรายงาน เช่น กระดาษหรือหนัง
    folding_mechanism:
      name: กลไกการพับ
      description: ระบุวิธีการพับผลิตภัณฑ์ โดยทั่วไปสำหรับรถเข็นเด็ก เช่น แบบกะทัดรัด
        มือเดียว
    font_style:
      name: รูปแบบตัวอักษร
      description: ระบุประเภทของแบบอักษรในผลิตภัณฑ์ซอฟต์แวร์ เช่น sans serif หรือสคริปต์
    food_bag_material:
      name: วัสดุที่ใช้ทำถุงใส่อาหาร
      description: ระบุวัสดุที่ใช้ในถุงเก็บอาหาร เช่น กระดาษหรือซิลิโคน
    food_dispenser_type:
      name: ประเภทเครื่องจ่ายอาหาร
      description: ระบุประเภทของอาหารที่เครื่องจ่ายนี้ได้รับการออกแบบมาโดยเฉพาะ เช่น
        ซีเรียลหรือพาสต้า
    food_product_form:
      name: รูปแบบผลิตภัณฑ์อาหาร
      description: ระบุรูปแบบการนำเสนอผลิตภัณฑ์อาหาร เช่น แห้งหรือแช่แข็ง
    food_storage_material:
      name: วัสดุที่ใช้ทำที่เก็บอาหาร
      description: ระบุวัสดุที่ใช้ในรายการเก็บอาหาร เช่น แก้วหรือพลาสติก
    food_supplement_form:
      name: รูปแบบอาหารเสริม
      description: ระบุรูปแบบของอาหารเสริมเพื่อสุขภาพ เช่น ของเหลวหรือยาเม็ด
    foot_arch_type:
      name: ประเภทอุ้งเท้า
      description: ระบุประเภทอุ้งเท้าที่ผลิตภัณฑ์ออกแบบมาเพื่อรองรับ
    foot_side:
      name: ข้างเท้า
      description: ระบุว่าที่รองรับข้อเท้าออกแบบสำหรับเท้าซ้าย เท้าขวา หรือสามารถใช้กับข้างใดก็ได้
    footage_type:
      name: ประเภทฟุตเทจ
      description: อธิบายหมวดหมู่ของภาพถ่ายสต็อกหรือวิดีโอ เช่น แอนิเมชั่น พื้นผิว
    footboard_type:
      name: ประเภทแผ่นวางเท้า
      description: ระบุรูปแบบของแผ่นวางเท้าบนแป้นเหยียบ เช่น แบบตันหรือแบบเจาะรู
    footwear_color:
      name: สีรองเท้า
      description: ระบุสีหลักของรองเท้า เช่น สีขาวหรือสีแดง
    footwear_material:
      name: วัสดุที่ใช้ทำรองเท้า
      description: ระบุประเภทของวัสดุที่ใช้ในรองเท้า เช่น หนังกลับหรือยาง
    footwear_pattern:
      name: รูปแบบรองเท้า
      description: อธิบายลวดลายบนรองเท้า เช่น ลายทางหรือลายใบไม้
    force_feedback_type:
      name: ประเภทการตอบสนองแรง
      description: อธิบายกลไกขับเคลื่อนที่ใช้ในการสร้างการตอบสนองแรงและความต้านทานการบังคับเลี้ยว
    format_supported:
      name: รูปแบบที่รองรับ
      description: ระบุขนาดที่เข้ากันได้ โดยทั่วไปใช้สำหรับอัลบั้มภาพถ่าย เช่น 12
        x 16 นิ้ว, 13 x 18 ซม
    formula_level:
      name: ระดับสูตร
      description: ระบุอายุที่เหมาะสมของนมผงสำหรับทารก เช่น ระดับ 1 (0-6 เดือน)
    formulation_strength:
      name: ความแรงของสูตร
      description: ระบุความแรงเปรียบเทียบของสูตรผลิตภัณฑ์
    fossil_type:
      name: ประเภทฟอสซิล
      description: ระบุชนิดของฟอสซิล เช่น ฟันฉลาม หรือกระดูกไดโนเสาร์
    foundation_color:
      name: สีรองพื้น
      description: ระบุสีของฐานรองที่นอน เช่น สีเบจหรือสีดำ
    foundation_material:
      name: วัสดุพื้นฐาน
      description: ระบุวัสดุหลักที่ใช้ในฐานรองที่นอน เช่น โลหะหรือไม้
    foundation_pattern:
      name: รูปแบบพื้นฐาน
      description: อธิบายการออกแบบหรือลวดลายบนฐานรองที่นอน เช่น ลายตัววีหรือลายผ้าดามาส
    fragrance:
      name: น้ำหอม
      description: ระบุว่าผลิตภัณฑ์มีกลิ่นหอมหรือไม่ เช่น ดอกไม้ ไม่มีกลิ่น
    fragrance_level:
      name: ระดับความหอม
      description: ระบุความเข้มข้นของกลิ่นของผลิตภัณฑ์ เช่น ไม่มีกลิ่น มีกลิ่นหอมอ่อนๆ
    frame_color:
      name: สีกรอบ
      description: ระบุสีโครงของสินค้า เช่น สีใสหรือสีทอง
    frame_design:
      name: การออกแบบโครง
      description: อธิบายสไตล์หรือวัสดุของกรอบผลิตภัณฑ์ เช่น โลหะหรือไม้
    frame_material:
      name: วัสดุสำหรับกรอบ
      description: ระบุวัสดุที่ใช้ในโครงของสินค้า เช่น ไม้หรือพลาสติก
    frame_pattern:
      name: รูปแบบกรอบ
      description: อธิบายการออกแบบภาพหรือสไตล์ของโครงผลิตภัณฑ์ เช่น เรขาคณิตหรือลายทาง
    frame_style:
      name: รูปแบบของกรอบ
      description: อธิบายการออกแบบหรือประเภทของกรอบสำหรับงานศิลปะ เช่น สมัยใหม่หรือเรียบง่าย
    frequency/radio_bands_supported:
      name: รองรับความถี่/คลื่นวิทยุ
      description: ระบุแถบคลื่นวิทยุที่อุปกรณ์ใช้งานร่วมกันได้ เช่น AM, UHF
    frequency_type:
      name: ประเภทความถี่
      description: ระบุการตั้งค่าความถี่บนเครื่องตรวจจับโลหะ เช่น แบบความถี่เดียว
        แบบหลายความถี่
    frequency_weighting:
      name: การถ่วงน้ำหนักความถี่
      description: อธิบายการตอบสนองความถี่ของเครื่องวัดเสียง เช่น การเวจท์เสียง A
    frog_material:
      name: วัสดุสำหรับกบ
      description: ระบุวัสดุที่ใช้ในกบของคันธนูเครื่องสาย เช่น ไม้มะเกลือหรือเงิน
    fruit_source:
      name: แหล่งผลไม้
      description: ระบุว่าผลไม้ในเครื่องดื่มมีความเข้มข้นหรือไม่
    fuel_additives:
      name: สารเติมแต่งน้ำมันเชื้อเพลิง
      description: ระบุประเภทของสารเติมแต่งในผลิตภัณฑ์เชื้อเพลิง เช่น สารป้องกันเจลหรือสารยับยั้งการกัดกร่อน
    fuel_container_features:
      name: คุณลักษณะถังน้ำมัน
      description: อธิบายคุณลักษณะของถังน้ำมันเชื้อเพลิง เช่น พวยกาป้องกันการหกหรือมีมาตรวัดน้ำมันเชื้อเพลิง
    fuel_grade:
      name: เกรดน้ำมันเชื้อเพลิง
      description: ระบุเกรดของผลิตภัณฑ์เชื้อเพลิง เช่น Bioheat หรือ 2-K
    fuel_purity:
      name: ความบริสุทธิ์ของน้ำมันเชื้อเพลิง
      description: ระบุระดับความบริสุทธิ์ของเชื้อเพลิงโพรเพน เช่น HD-5 เชิงพาณิชย์
    fuel_source:
      name: แหล่งเชื้อเพลิง
      description: ระบุแหล่งพลังงานที่ใช้ โดยทั่วไปสำหรับเซลล์เชื้อเพลิง เช่น ไฮโดรเจน
        โพรเพน
    fuel_supply:
      name: การจ่ายน้ำมันเชื้อเพลิง
      description: ระบุแหล่งเชื้อเพลิงสำหรับรถยนต์หรือเครื่องยนต์ เช่น ดีเซลหรือไฮบริด
    furniture/fixture_color:
      name: สีเฟอร์นิเจอร์/อุปกรณ์ติดตั้ง
      description: ระบุสีของเฟอร์นิเจอร์หรืออุปกรณ์ติดตั้ง เช่น สีเบจหรือสีดำ
    furniture/fixture_features:
      name: คุณลักษณะเฟอร์นิเจอร์/อุปกรณ์ติดตั้ง
      description: เน้นลักษณะพิเศษของเฟอร์นิเจอร์หรือของตกแต่ง เช่น ชั้นวางแบบปรับได้
        หรือกระจกบิวท์อิน
    furniture/fixture_material:
      name: วัสดุที่ใช้ทำเฟอร์นิเจอร์/อุปกรณ์ติดตั้ง
      description: ระบุวัสดุหลักที่ใช้ในเฟอร์นิเจอร์หรืออุปกรณ์ติดตั้ง เช่น ไม้หรือโลหะ
    furniture/fixture_pattern:
      name: รูปแบบเฟอร์นิเจอร์/อุปกรณ์ติดตั้ง
      description: ระบุธีมภาพบนผลิตภัณฑ์เฟอร์นิเจอร์ เช่น ลายทางหรือลายตารางหมากรุก
    game_components:
      name: ส่วนประกอบเกม
      description: ระบุชิ้นส่วนที่รวมอยู่ในชุดเกม เช่น ลูกเต๋าหรือกระดานเกม
    game_console_skin_coverage:
      name: ความครอบคลุมสกินคอนโซลเกม
      description: ระบุว่าชุดสกินครอบคลุมส่วนใดของอุปกรณ์
    game_difficulty:
      name: ความยากของเกม
      description: อธิบายระดับความท้าทายในเกมปาร์ตี้ เช่น ปานกลางหรือยาก
    game_features:
      name: คุณลักษณะของเกม
      description: เน้นคุณลักษณะพิเศษของเกม เช่น การเดินทางที่เป็นมิตรหรือปรับแต่งได้
    game_name:
      name: ชื่อเกม
      description: ระบุชื่อเฉพาะของเกมการดื่ม เช่น Beer Pong หรือ Kings Cup
    gameplay_skills:
      name: ทักษะการเล่นเกม
      description: ระบุทักษะที่ได้รับการปรับปรุงจากเกม เช่น การคิดเชิงกลยุทธ์หรือความจำ
    games_included:
      name: รวมเกม
      description: แสดงรายการเกมที่มาพร้อมกับสินค้า เช่น ไพ่หรือหมากฮอส
    gaming_enhancement_features:
      name: คุณสมบัติเสริมประสิทธิภาพการเล่นเกม
      description: ระบุเทคโนโลยี HDMI 2.1 ที่เน้นการเล่นเกมที่เครื่องรับรองรับ
    garage_door_material:
      name: วัสดุประตูโรงรถ
      description: ระบุวัสดุก่อสร้างของประตูโรงรถ เช่น เหล็กหรือไม้
    gardening_use:
      name: การใช้งานทำสวน
      description: ระบุวัตถุประสงค์ในการทำสวนของผลิตภัณฑ์ เช่น การคลุมดิน การจัดสวน
    garment_steamer_design:
      name: การออกแบบเครื่องรีดไอน้ำ
      description: ระบุรูปแบบหรือประเภทของเครื่องพ่นไอน้ำสำหรับรีดผ้า เช่น แบบพกพาหรือเครื่องรีดไอน้ำ
    gases_detected:
      name: ก๊าซที่ตรวจพบ
      description: ระบุก๊าซเฉพาะที่เครื่องตรวจจับสามารถตรวจจับได้ เช่น มีเทนหรือเรดอน
    gate_mounting_type:
      name: ประเภทการติดตั้งประตูรั้ว
      description: ระบุตำแหน่งที่ติดตั้งประตูกั้นสำหรับเด็กทารกหรือสัตว์เลี้ยง เช่น
        ผนังหรือทางเข้าประตู
    gauge_type:
      name: ประเภทเกจ
      description: ระบุชนิดของมาตรวัดยานพาหนะ เช่น ระดับน้ำมันเชื้อเพลิงหรืออุณหภูมิ
    gear_material:
      name: วัสดุที่ใช้ทำเฟือง
      description: ระบุวัสดุที่ใช้ในโครงสร้างเกียร์ เช่น คาร์บอนไฟเบอร์หรือไทเทเนียม
    gear_ratio:
      name: อัตราทดเกียร์
      description: ระบุอัตราทดเกียร์ในรอกตกปลา เช่น 6:1, 1:1
    gearing_type:
      name: ประเภทการทดเกียร์
      description: ระบุประเภทของระบบเกียร์ในผลิตภัณฑ์การปั่นจักรยาน เช่น โซ่หรือสายพาน
    gel_strength:
      name: ความแข็งแรงของเจล
      description: ระบุความแข็งแรงของเจลหรือบลูมของผลิตภัณฑ์เจลาติน เช่น บลูมสูง บลูมต่ำ
    gemstone_type:
      name: ประเภทอัญมณี
      description: ระบุอัญมณีหลักที่ใช้ในสินค้า โดยอิงตามการจำแนกแร่หรือวัสดุของหิน
    genre:
      name: ประเภท
      description: แยกหมวดหมู่หรือสไตล์ของสื่อ เช่น เรื่องสยองขวัญหรือแฟนตาซี
    geological_era:
      name: ยุคทางธรณีวิทยา
      description: จำแนกอายุของหินหรือฟอสซิลที่สะสมได้ เช่น มีโซโซอิกหรือซีโนโซอิก
    gift_bag_handle_design:
      name: การออกแบบหูหิ้วถุงของขวัญ
      description: อธิบายลักษณะที่จับบนถุงของขวัญ เช่น เชือกหรือริบบิ้น
    gift_set_format:
      name: รูปแบบชุดของขวัญ
      description: ระบุรูปแบบการนำเสนอชุดของขวัญ เช่น กล่องของขวัญหรือถุงของขวัญ
    gimbal_stabilization_axes:
      name: แกนกันสั่นแบบกิมบอล
      description: ระบุจำนวนแกนของการรักษาเสถียรภาพทางอิเล็กทรอนิกส์หรือทางกลไกที่ให้มาเมื่อไม้เซลฟี่มีฟังก์ชันกันสั่น
    gin_variety:
      name: ลักษณะเหล้าจิน
      description: จำแนกประเภทผลิตภัณฑ์เหล้ายินตามประเภทเฉพาะ เช่น แต่งกลิ่น ลอนดอนดราย
    glaze_finish:
      name: ฟินิชลุคแบบเป็นเงามัน
      description: บ่งบอกถึงพื้นผิวและความแวววาวของเคลือบเซรามิกหรือเครื่องปั้นดินเผา
        เช่น ผ้าซาตินหรือแคร็กเคิล
    glazing_type:
      name: ประเภทกระจก
      description: ระบุประเภทของกระจกหน้าต่าง เช่น บานหน้าต่างคู่หรือบานหน้าต่างเดี่ยว
    glide_style:
      name: รูปแบบการเลื่อน
      description: ระบุคุณลักษณะการเลื่อนที่ตั้งใจของแผ่นรอง (เช่น ความเร็ว, การควบคุม)
    glitter_particle_size:
      name: ขนาดอนุภาคกลิตเตอร์
      description: จำแนกขนาดอนุภาคของกลิตเตอร์ ซึ่งส่งผลต่อความเข้มของประกาย พื้นผิว
        และความง่ายในการใช้
    glitter_shape:
      name: รูปร่างแวววาว
      description: ระบุรูปทรงของกลิตเตอร์ เช่น รูปหัวใจหรือดาว
    glucose_measurement_units:
      name: หน่วยวัดกลูโคส
      description: ระบุว่าหน่วยวัดใด (mg/dL หรือ mmol/L) ที่เครื่องวัดสามารถแสดงผลได้
    glucose_meter_features:
      name: คุณลักษณะเครื่องวัดกลูโคส
      description: อธิบายลักษณะพิเศษของเครื่องวัดน้ำตาลกลูโคส เช่น แบบพกพาหรือฟังก์ชันหน่วยความจำ
    glue_gun_features:
      name: คุณลักษณะของปืนกาว
      description: เน้นลักษณะเฉพาะของปืนกาว เช่น คุณลักษณะการทำความร้อนอย่างรวดเร็วหรือความปลอดภัย
    glue_gun_operation:
      name: การทำงานของปืนกาว
      description: ระบุแหล่งพลังงานของปืนกาว เช่น แบบมีสายหรือไร้สาย
    glue_gun_technology:
      name: เทคโนโลยีปืนกาว
      description: ระบุประเภทของเทคโนโลยีที่ใช้ในปืนกาว เช่น แบบอุณหภูมิต่ำ แบบอุณหภูมิสูง
    glue_strength:
      name: ความแข็งของกาว
      description: ระบุความสามารถในการยึดเกาะของกาว เช่น ติดแน่น อ่อนโยน
    glue_viscosity:
      name: ความหนืดของกาว
      description: อธิบายความหนาของกาว ซึ่งส่งผลต่อการไหลและการควบคุมการใช้
    golf_ball_type:
      name: ประเภทของลูกกอล์ฟ
      description: ระบุคุณลักษณะด้านประสิทธิภาพของลูกกอล์ฟ เช่น Tour Performance หรือ
        Soft Distance
    golf_equipment_included:
      name: รวมอุปกรณ์กอล์ฟ
      description: ระบุอุปกรณ์กอล์ฟเพิ่มเติมที่รวมอยู่ในชุด เช่น เครื่องมือดิวอต หรือกล่องใส่ลูกกอล์ฟ
    gps_compatible_device:
      name: อุปกรณ์ที่รองรับ GPS
      description: ระบุอุปกรณ์ที่สามารถใช้ซอฟต์แวร์ GPS ได้ เช่น แล็ปท็อปหรืออุปกรณ์การบิน
    gps_device_features:
      name: คุณลักษณะของอุปกรณ์ GPS
      description: อธิบายความสามารถพิเศษของอุปกรณ์ GPS เช่น กล้องติดรถยนต์ที่ขับเคลื่อนด้วย
        AI หรือกล้องติดรถยนต์ในตัว
    gps_map_type:
      name: ประเภทแผนที่ GPS
      description: ระบุประเภทของแผนที่ที่ใช้ในซอฟต์แวร์ GPS เช่น แผนภูมิภูมิประเทศหรือแผนภูมิการเดินเรือ
    gps_software_focus:
      name: การโฟกัสของซอฟต์แวร์ GPS
      description: ระบุการใช้งานหลักของซอฟต์แวร์ GPS เช่น การนำทางยานยนต์หรือการวิเคราะห์เชิงพื้นที่
    grading:
      name: การให้เกรด
      description: ระบุคุณภาพหรือเงื่อนไขของบัตรสะสม เช่น BCCG หรือ PSA
    grain:
      name: ธัญพืช
      description: ระบุระดับความหยาบของฟิล์มกล้อง เช่น สูงหรือละเอียด
    grape_variety:
      name: พันธุ์องุ่น
      description: ระบุประเภทขององุ่นที่ใช้ในการผลิตไวน์ เช่น Cabernet Sauvignon หรือ
        Chardonnay
    graphics_card_type:
      name: ประเภทกราฟิกการ์ด
      description: ระบุประเภทของกราฟิกการ์ดในคอมพิวเตอร์ เช่น แบบมืออาชีพ เฉพาะทาง
    graphics_tablet_accessories_included:
      name: รวมอุปกรณ์เสริมของกราฟิกส์แท็บเล็ต
      description: ระบุรายการผลิตภัณ์อื่นๆ ที่มาพร้อมกับกราฟิกส์แท็บเล็ต เช่น ที่วางปากกาหรือสายคล้องปากกา
    graphics_tablet_specialized_features:
      name: คุณลักษณะพิเศษของกราฟิกส์แท็บเล็ต
      description: รายละเอียดคุณลักษณะพิเศษของกราฟิกส์แท็บเล็ต เช่น กันน้ำหรือมีไฟแบ็คไลท์
        LED
    gravel/substrate_material:
      name: วัสดุที่ใช้ทำกรวดและวัสดุรองพื้น
      description: ระบุองค์ประกอบของกรวดหรือพื้นผิวในตู้ปลา เช่น ดินเหนียว ควอตซ์
    gray_coverage_level:
      name: ระดับการปกปิดผมหงอก
      description: ระบุเปอร์เซ็นต์หรือระดับของผมหงอกหรือผมขาวที่ผลิตภัณฑ์สามารถปกปิดหรือผสมผสาน
    grease_filter_material:
      name: วัสดุสำหรับการกรองไขมัน
      description: ระบุวัสดุที่ใช้ในตัวกรองน้ำมันของผลิตภัณฑ์ เช่น โลหะ สแตนเลส
    grind_size:
      name: ขนาดการบด
      description: บ่งบอกถึงความหยาบหรือละเอียดของกากกาแฟ เช่น หยาบพิเศษหรือละเอียดมาก
    grip_or_holder_style:
      name: สไตล์ที่จับหรือที่ยึด
      description: ระบุรูปแบบทางกายภาพหลักของผลิตภัณฑ์ ช่วยให้ลูกค้ากรองการออกแบบที่ต้องการได้อย่างรวดเร็ว
    grip_texture:
      name: พื้นผิวยึดเกาะ
      description: อธิบายความรู้สึกพื้นผิวของการยึดเกาะของผลิตภัณฑ์ เช่น ความเรียบหรือพื้นผิว
    grip_type:
      name: ประเภทด้ามจับ
      description: ระบุรูปแบบด้ามจับบนอุปกรณ์ฟันดาบ เช่น French, Pistol
    grit_type:
      name: ประเภทกรวด
      description: ระบุระดับความหยาบของเครื่องมือหรือผลิตภัณฑ์ทางทันตกรรม เช่น หยาบหรือละเอียดมาก
    grooming_kit_format:
      name: รูปแบบของชุดกรูมมิ่ง
      description: ระบุประเภทบรรจุภัณฑ์ของชุดอุปกรณ์ดูแลร่างกาย เช่น กระเป๋าชุดเครื่องมือหรือกล่อง
    guitar_fitting/part_type:
      name: ประเภทฟิตติ้ง/ชิ้นส่วนกีต้าร์
      description: ระบุประเภทของชิ้นส่วนหรือฟิตติ้งกีตาร์ เช่น ปิ๊กการ์ดหรือลูกบิด
    guitar_size:
      name: ขนาดกีตาร์
      description: ระบุขนาดของกีตาร์ เช่น ขนาดเต็มหรือขนาด 3/4
    gutter_fitting_type:
      name: ประเภทการติดตั้งรางน้ำ
      description: ระบุประเภทของข้อต่อที่ใช้ในระบบรางน้ำ เช่น ขั้วต่อรางน้ำหรือฝาปิดปลาย
    gutter_style:
      name: สไตล์ราง
      description: ระบุประเภทของรางน้ำ เช่น น้ำลึกหรือทางอุตสาหกรรม
    habitat_material:
      name: วัสดุที่ใช้ทำที่อยู่
      description: ระบุวัสดุหลักของแหล่งที่อยู่อาศัยของสัตว์เลี้ยง เช่น อะคริลิกหรือไม้
    hair_care_effect:
      name: ผลการดูแลเส้นผม
      description: กำหนดประโยชน์หลักหรือผลลัพธ์ที่แชมพูได้รับการคิดค้นมาเพื่อส่งมอบ
    hair_care_finish:
      name: ฟินิชการดูแลเส้นผม
      description: ระบุลักษณะหรือเนื้อสัมผัสขั้นสุดท้ายของเส้นผมหลังการใช้ เช่น เป็นประกาย
        เงาด้าน
    hair_care_items_included:
      name: รวมอุปกรณ์ดูแลผม
      description: ระบุประเภทผลิตภัณฑ์ดูแลเส้นผมที่รวมอยู่ในชุด เช่น เซรั่มบำรุงเส้นผมหรือครีมหมักผม
    hair_care_technology:
      name: เทคโนโลยีการดูแลเส้นผม
      description: ระบุเทคโนโลยีที่ใช้ในผลิตภัณฑ์ดูแลเส้นผม เช่น อบไอน้ำ เทอร์โมไลซิส
    hair_color:
      name: ยาย้อมผม
      description: ระบุสีหรือเฉดสีของผลิตภัณฑ์ดูแลเส้นผม เช่น สีบลอนด์หรือสีน้ำตาลเข้ม
    hair_color_formulation:
      name: สูตรสีผม
      description: ระบุความยาวนานหรือประเภทการทำงานของผลสีของผลิตภัณฑ์ (เช่น สีย้อมถาวร
        โทนเนอร์ แต้มรากผม)
    hair_concealer_fiber_material:
      name: วัสดุเส้นใยปกปิดผม
      description: ระบุวัสดุหลักของเส้นใยหรือผงสร้างของผลิตภัณฑ์
    hair_dryer_motor_type:
      name: ประเภทมอเตอร์ไดร์เป่าผม
      description: ระบุชนิดของมอเตอร์ที่ใช้ในไดร์เป่าผม มีผลต่อความทนทาน ระดับเสียง
        และพลังลม
    hair_dye_type_removed:
      name: ประเภทสีย้อมผมที่กำจัด
      description: ระบุชนิดของสีย้อมผมที่ผลิตภัณฑ์ออกแบบมาเพื่อกำจัด (เช่น ถาวร เฮนน่า)
    hair_loss_type:
      name: ประเภทผมร่วง
      description: จัดเรียงผลิตภัณฑ์ตามประเภทของผมร่วง เช่น ผมร่วงเป็นหย่อม ศีรษะล้านแบบผู้ชาย
    hair_oil_application:
      name: การใช้น้ำมันผม
      description: ระบุว่าน้ำมันผมตั้งใจจะใช้หรือทาอย่างไร
    hair_oil_effect:
      name: ผลของน้ำมันผม
      description: ระบุประโยชน์หรือผลลัพธ์หลักที่ได้รับจากน้ำมันใส่ผม
    hair_shear_type:
      name: กรรไกรตัดผม
      description: ระบุลักษณะของกรรไกรตัดผมที่ใช้ในการดูแลผม เช่น กรรไกรตัดแต่งพื้นผิว
        กรรไกรซอยผม
    hair_styling_benefits:
      name: ประโยชน์การจัดแต่งทรงผม
      description: เน้นประโยชน์หรือผลลัพธ์หลักที่ผลิตภัณฑ์มอบให้กับเส้นผม
    hair_styling_items_included:
      name: รวมอุปกรณ์จัดแต่งทรงผม
      description: ระบุเครื่องมือจัดแต่งทรงผมที่รวมอยู่ในชุดผลิตภัณฑ์ เช่น เครื่องลอนผมหรือแปรงผม
    hair_styling_tool_features:
      name: คุณลักษณะของเครื่องมือจัดแต่งผม
      description: ระบุลักษณะพิเศษของเครื่องมือจัดแต่งทรงผม เช่น เทอร์โมสตัทที่ปรับได้
        หรือการปิดเครื่องอัตโนมัติ
    hair_treatment_effect:
      name: ผลการรักษาผม
      description: ระบุคุณประโยชน์หลักที่ได้รับจากเซรั่มบำรุงผม
    hair_type:
      name: ประเภทผม
      description: จำแนกสินค้าตามประเภทหรือสภาพเส้นผมโดยเฉพาะ เช่น ผมหยิกหรือผมแห้ง
    hammer_head_material:
      name: วัสดุที่ใช้ทำส่วนหัวค้อน
      description: ระบุองค์ประกอบของหัวค้อน เช่น เหล็กหรือไฟเบอร์กลาส
    hand_side:
      name: ด้าน
      description: ระบุประเภทของความถนัดที่สินค้าได้รับการออกแบบมาโดยเฉพาะ เช่น ด้านซ้าย
        ทั้งสองด้าน
    hand_soap_features:
      name: คุณสมบัติสบู่ล้างมือ
      description: เน้นลักษณะพิเศษหรือประโยชน์ของสบู่ล้างมือ
    hand_warmer_type:
      name: ประเภทเครื่องอุ่นมือ
      description: ระบุประเภทของเครื่องอุ่นมือ เช่น แบบใช้ลมหรือแบบใช้แบตเตอรี่
    handcuff_lock_type:
      name: ประเภทล็อคกุญแจมือ
      description: ระบุกลไกการล็อคของกุญแจมือ เช่น กุญแจหรือล็อคสองชั้น
    handle_color:
      name: สีที่จับ
      description: ระบุสีของที่จับของผลิตภัณฑ์ เช่น สีดำหรือสีน้ำเงิน
    handle_design:
      name: การออกแบบด้ามจับ
      description: อธิบายลักษณะด้ามจับของเครื่องมือ เช่น แบบตรงหรือแบบปืนพก
    handle_grip_texture:
      name: เนื้อสัมผัสของด้ามจับ
      description: ระบุลักษณะพื้นผิวของด้ามจับผลิตภัณฑ์ เช่น แบบร่องหรือเรียบ
    handle_material:
      name: วัสดุสำหรับที่จับ
      description: ระบุวัสดุที่ใช้ในด้ามจับของผลิตภัณฑ์ เช่น ไม้ไผ่หรือพลาสติก
    handle_pattern:
      name: รูปแบบด้ามจับ
      description: อธิบายการออกแบบหรือลวดลายบนที่จับของผลิตภัณฑ์ เช่น ลายดอกไม้หรือเรขาคณิต
    handle_style:
      name: สไตล์ที่จับ
      description: กำหนดการออกแบบหรือรูปร่างของด้ามไม้เท้า ซึ่งส่งผลต่อความสบายในการจับ
        หลักสรีรศาสตร์ และความสวยงาม
    handle_type:
      name: ประเภทด้ามจับ
      description: ระบุความยาวหรือการมีอยู่ของที่จับบนผลิตภัณฑ์ เช่น สั้น ไม่มีที่จับ
    handset_type:
      name: ประเภทเครื่องโทรศัพท์
      description: ระบุชุดหูโทรศัพท์สำหรับโทรศัพท์ต่างๆ เช่น แบบมีสายหรือแบบไร้สาย
    handwear_features:
      name: คุณลักษณะของเครื่องสวมมือ
      description: อธิบายคุณลักษณะพิเศษของถุงมือหรือถุงมือแบบ Mittens เช่น ปรับระดับการปิดได้หรือจับได้กระชับขึ้น
    handwear_material:
      name: วัสดุที่ใช้ทำเครื่องสวมมือ
      description: อธิบายประเภทของวัสดุที่ใช้ในถุงมือหรือถุงมือ เช่น ขนเทียมหรือขนสัตว์
    handwear_type:
      name: ประเภทเครื่องสวมมือ
      description: จำแนกประเภทของเครื่องสวมมือ เช่น ถุงมือแบบไม่มีนิ้ว ถุงมือลุยหิมะ
    hanging_chair_design:
      name: การออกแบบเก้าอี้แขวน
      description: ระบุว่าเก้าอี้แขวนมาพร้อมขาตั้งหรือไม่
    haptic_feedback_type:
      name: ประเภทการตอบสนองแบบสัมผัส
      description: อธิบายประเภทของการตอบรับแบบสัมผัสหรือแบบเคลื่อนไหวที่ตัวควบคุมมอบให้
    hard_cider_variety:
      name: ลักษณะฮาร์ดไซเดอร์
      description: ระบุโปรไฟล์รสชาติของฮาร์ดไซเดอร์ เช่น เปรี้ยว หวาน
    hard_drive_features:
      name: คุณลักษณะของฮาร์ดไดรฟ์
      description: ระบุความสามารถพิเศษของฮาร์ดไดรฟ์ เช่น ขับเคลื่อนด้วย AI หรือกันกระแทก
    hard_drive_form_factor:
      name: ฟอร์มแฟคเตอร์ของฮาร์ดไดรฟ์
      description: ระบุขนาดทางกายภาพของฮาร์ดไดรฟ์ เช่น 2.5 นิ้ว, 3.5 นิ้ว
    hard_drive_installation:
      name: การติดตั้งฮาร์ดไดรฟ์
      description: ระบุตำแหน่งของฮาร์ดไดรฟ์ในอุปกรณ์อิเล็กทรอนิกส์ เช่น ภายในหรือภายนอก
    hardhat_class:
      name: คลาสหมวกนิรภัย
      description: ระบุการจัดหมวดหมู่ความปลอดภัยของหมวกนิรภัย เช่น C (สื่อไฟฟ้า),
        E (ไฟฟ้า)
    hardness:
      name: ความแข็ง
      description: บ่งบอกถึงความแน่นของผลิตภัณฑ์ เช่น อ่อน ปานกลาง แข็ง
    hardness_rating_pencil_scale:
      name: ระดับความแข็ง (มาตราส่วนดินสอ)
      description: ระบุระดับความแข็งของกระจกนิรภัยโดยอิงตามมาตราส่วนความแข็งของดินสอ
    hardware_finish:
      name: การตกแต่งผิวฮาร์ดแวร์
      description: อธิบายการรักษาพื้นผิวหรือการเคลือบอุปกรณ์ฮาร์ดแวร์ เช่น ทองเหลืองหรือโครเมียม
    hardware_material:
      name: วัสดุที่ใช้ทำฮาร์ดแวร์
      description: ระบุองค์ประกอบของอุปกรณ์ฮาร์ดแวร์ เช่น โลหะหรือสแตนเลส
    hardware_mounting_type:
      name: ประเภทการติดตั้งฮาร์ดแวร์
      description: ระบุวิธีการติดตั้งหรือวางผลิตภัณฑ์ฮาร์ดแวร์ เช่น ติดผนัง หรือตั้งอิสระ
    hardwood_lumber_grade:
      name: เกรดไม้อัดเนื้อแข็ง
      description: จำแนกประเภทคุณภาพไม้อัดเนื้อแข็ง เช่น เกรด 2A ทั่วไป
    harness_closure_type:
      name: ประเภทของสายรัดแบบตะขอ
      description: ระบุประเภทของตัวปิดที่ใช้ในฮาร์เนส เช่น หัวเข็มขัดแบบปลดด้านข้างหรือซิป
    harp_size:
      name: ขนาดฮาร์ป
      description: ระบุหมวดหมู่ขนาดของพิณ เช่น เล็ก คอนเสิร์ตแกรนด์
    hatch_suitable_location:
      name: ตำแหน่งประตูเล็กที่เหมาะสม
      description: ระบุตำแหน่งที่เหมาะสมที่สุดสำหรับฟัก เช่น พื้นหรือผนัง
    hazmat_suit_design:
      name: การออกแบบชุดป้องกันวัตถุอันตราย
      description: อธิบายรูปแบบของชุดป้องกันวัสดุอันตราย เช่น ชุดคลุมหรือชุดห่อหุ้ม
    hdmi_version_supported:
      name: เวอร์ชัน HDMI ที่รองรับ
      description: ระบุเวอร์ชันข้อกำหนด HDMI สูงสุดที่อุปกรณ์รองรับอย่างเต็มที่ (เช่น
        HDMI 2.1 สำหรับ 4K @ 120 Hz)
    hdr_format:
      name: รูปแบบ HDR
      description: ระบุ High Dynamic Range (HDR) สำหรับโทรทัศน์ เช่น HDR10, Dolby
        Vision
    headjoint_cut:
      name: ตัดข้อต่อศีรษะ
      description: ระบุการตัดของข้อต่อหัวเป็นฟลุต เช่น คลื่น ตัดแบบ Z
    headphone_cushion_shape:
      name: รูปร่างแผ่นรองหูฟัง
      description: อธิบายรูปทรงทางกายภาพของแผ่นรองเพื่อช่วยให้ลูกค้าจับคู่รูปทรงเรขาคณิตของที่ครอบหู
    headphone_driver_technology:
      name: เทคโนโลยีไดรเวอร์หูฟัง
      description: กำหนดประเภททรานสดิวเซอร์ที่ใช้สร้างเสียงในหูฟัง
    headphone_jack_type:
      name: ประเภทแจ็คหูฟัง
      description: ระบุประเภทของขนาดแจ็คหูฟัง เช่น 3.5 มม., USB type-C
    headphone_style:
      name: สไตล์หูฟัง
      description: ระบุการออกแบบหูฟัง เช่น แบบคล้องคอ เอียร์บัด
    headset_connection_type:
      name: ประเภทการเชื่อมต่อชุดหูฟัง
      description: ระบุอินเทอร์เฟซที่ใช้ได้สำหรับการเชื่อมต่อชุดหูฟังภายนอกกับโทรศัพท์
    headwear_features:
      name: คุณลักษณะของเครื่องสวมศรีษะ
      description: เน้นคุณลักษณะเฉพาะของเครื่องประดับศีรษะ เช่น พับได้ ใช้งานได้หลากหลาย
    hearing_aid_compatibility:
      name: ความเข้ากันได้กับเครื่องช่วยฟัง
      description: ระบุว่าโทรศัพท์ตรงตามข้อกำหนดความเข้ากันได้กับเครื่องช่วยฟัง (HAC)
        หรือไม่ และหากมี ระดับการจัดอันดับ
    hearing_aid_ear_side:
      name: ข้างหูของเครื่องช่วยฟัง
      description: ระบุว่าเครื่องช่วยฟังออกแบบสำหรับหูซ้าย หูขวา หรือทั้งสองหู
    hearing_aid_features:
      name: คุณลักษณะของเครื่องช่วยฟัง
      description: เน้นคุณลักษณะพิเศษของเครื่องช่วยฟัง เช่น แบตเตอรี่แบบชาร์จไฟได้หรือดิจิทัล
    hearing_aid_material:
      name: วัสดุที่ใช้ทำเครื่องช่วยฟัง
      description: ระบุวัสดุหลักที่ใช้ในโครงสร้างของเครื่องช่วยฟัง เช่น พลาสติกหรือซิลิโคน
    hearing_loss_level:
      name: ระดับการสูญเสียการได้ยิน
      description: ระบุระดับการสูญเสียการได้ยินที่เครื่องช่วยฟังออกแบบมาเพื่อรองรับ
    hearing_protection_class:
      name: ระดับการป้องกันเสียง
      description: ระบุระดับการรับรองท้องถิ่นที่ระบุประสิทธิภาพการลดเสียงตามมาตรฐานระดับภูมิภาค
    heat_function:
      name: ฟังก์ชันความร้อน
      description: ระบุว่าผลิตภัณฑ์มีคุณสมบัติทำความร้อนหรือไม่ ซึ่งโดยทั่วไปแล้วใช้สำหรับผลิตภัณฑ์ดูแลส่วนบุคคล
    heat_level:
      name: ระดับความร้อน
      description: ระบุความเผ็ดของผลิตภัณฑ์อาหารและเครื่องดื่ม เช่น เผ็ดเล็กน้อยหรือเผ็ดจัด
    heat_settings:
      name: การตั้งค่าความร้อน
      description: ระบุระดับการควบคุมอุณหภูมิของผลิตภัณฑ์ เช่น ต่ำ กลาง สูง
    heat_source:
      name: แหล่งความร้อน
      description: ระบุประเภทของแหล่งความร้อนในแผ่นทำความร้อน เช่น เจลความร้อนที่เข้าไมโครเวฟได้
    heat_therapy_type:
      name: ประเภทการบำบัดด้วยความร้อน
      description: ระบุว่าผลิตภัณฑ์ให้ความร้อนชื้น ความร้อนแห้ง หรือทั้งสองอย่าง
    heating_instructions:
      name: คำแนะนำในการทำความร้อน
      description: ระบุวิธีการให้ความร้อนผลิตภัณฑ์อย่างเหมาะสม เช่น เตาอบ เตาตั้งพื้น
    heating_method:
      name: วิธีการทำความร้อน
      description: ระบุเทคนิคที่ใช้ในการให้ความร้อน โดยทั่วไปจะเป็นเครื่องอุ่นขวดนม
        เช่น อบไอน้ำ อ่างควบคุมอุณหภูมิ
    heating_pad_design:
      name: การออกแบบแผ่นให้ความร้อน
      description: ระบุสไตล์ทางกายภาพหรือรูปแบบของแผ่นให้ความร้อน
    heating_pad_features:
      name: คุณสมบัติแผ่นให้ความร้อน
      description: เน้นคุณสมบัติการทำงานหรือความสะดวกพิเศษที่สร้างเข้าไปในแผ่นให้ความร้อน
    heating_speed:
      name: ความเร็วในการทำความร้อน
      description: ระบุอัตราที่ผลิตภัณฑ์ร้อนขึ้น เช่น เร็วหรือช้า
    heel_height_type:
      name: ประเภทความสูงของส้นเท้า
      description: ระบุความสูงของส้นรองเท้า เช่น ส้นเตี้ยหรือส้นสูง
    heel_shoe_type:
      name: ประเภทรองเท้าส้นสูง
      description: ระบุสไตล์ของส้นรองเท้า เช่น ส้นสูงตึกหรือส้นทรงเตารีด
    height_adjustment:
      name: การปรับความสูง
      description: ระบุว่าความสูงของผลิตภัณฑ์สามารถเปลี่ยนแปลงได้หรือไม่ เช่น ความสูงคงที่
        ความสูงที่ปรับได้
    helicobacter_pylori_detection_method:
      name: วิธีการตรวจจับเฮลิโคแบคเตอร์ ไพโลไร
      description: ระบุหลักการทางชีวภาพหรือแนวทางที่ชุดใช้เพื่อตรวจจับการติดเชื้อเฮลิโคแบคเตอร์
        ไพโลไร
    helmet_shade_design:
      name: การออกแบบสีหมวกกันน็อค
      description: อธิบายประเภทของกลไกบังแสงในหมวกกันน็อคสำหรับงานเชื่อม เช่น ปรับแสงคงที่หรือปรับแสงอัตโนมัติ
    herbal_supplement_health_goal:
      name: เป้าหมายสุขภาพของอาหารเสริมสมุนไพร
      description: ระบุวัตถุประสงค์ด้านสุขภาพหลัก ระบบร่างกาย หรือพื้นที่ทางสรีรวิทยาที่อาหารเสริมสมุนไพรตั้งใจจะสนับสนุน
        (เช่น สนับสนุนภูมิคุ้มกัน บรรเทาความเครียด สนับสนุนตับและล้างพิษ)
    hitch_class:
      name: ชนิดของพ่วงรถ
      description: ระบุความสามารถในการลากจูงของการผูกปมของยานพาหนะ เช่น Class I หรือ
        Class II
    hitch_type:
      name: ประเภทผูกปม
      description: ระบุวิธีการติดตั้งสำหรับรถพ่วงจักรยาน เช่น แบบยึดกับเพลาหรือหลักอาน
    hiv_test_generation:
      name: รุ่นการทดสอบเอชไอวี
      description: ระบุรุ่นของการทดสอบวินิจฉัยเอชไอวี สะท้อนการปรับปรุงในความไวและหน้าต่างการตรวจจับ
    hockey_equipment_included:
      name: รวมอุปกรณ์ฮอกกี้
      description: ระบุรายการในชุดอุปกรณ์ลาครอส เช่น ไม้ลาครอสหรือแผ่นรองไหล่
    hold_level:
      name: ระดับการถือ
      description: ระบุความความแข็งแรงของผลิตภัณฑ์จัดแต่งทรงผม เช่น แบบอ่อน แบบแข็ง
    hole_plating_type:
      name: ประเภทการชุบรู
      description: ระบุว่ารูของบอร์ดไม่มีการชุบ, ชุบทะลุ หรือมีไวอาบาร์เรล ซึ่งส่งผลต่อการบัดกรีและการเชื่อมต่อระหว่างชั้น
    hook_design:
      name: การออกแบบตะขอ
      description: ระบุการออกแบบตะขอ หัวเข็มขัด และตัวยึด เช่น สปริง ปลายคู่
    hook_grip_design:
      name: การออกแบบด้ามจับแบบตะขอ
      description: อธิบายรูปแบบการจับของตะขอโครเชต์ เช่น แบบกันลื่นหรือตามหลักสรีระศาสตร์
    hook_size:
      name: ขนาดตะขอ
      description: ระบุขนาดของเข็มถักโครเชต์ เช่น B, G หรือ I
    hook_type:
      name: ประเภทตะขอ
      description: ระบุรูปแบบของตะขอเกี่ยวเรือ เช่น แบบยึดอยู่กับที่หรือแบบเหลื่อม
    hoop_shape:
      name: รูปทรงของห่วง
      description: อธิบายรูปทรงของปากห่วง ซึ่งโดยทั่วไปสำหรับสวิงตักปลา เช่น รูปตัว
        D
    horse_category:
      name: หมวดหมู่ม้า
      description: จำแนกประเภทของแท็คสำหรับม้าตามขนาดและสายพันธุ์ของม้า เช่น ม้าขนาดเล็ก
        มาตรฐาน
    horse_grooming_accessories_included:
      name: รวมอุปกรณ์กรูมมิ่งม้า
      description: ระบุสินค้าเพิ่มเติมที่มาพร้อมกับผลิตภัณฑ์ดูแลม้า เช่น ใบมีดหรือกระเป๋าหิ้ว
    hose_material:
      name: วัสดุที่ใช้ทำสายยาง
      description: ระบุประเภทของวัสดุที่ใช้ในท่ออ่อน เช่น PVC หรืออะลูมิเนียม
    host_interface:
      name: โฮสต์อินเทอร์เฟซ
      description: ระบุวิธีการที่ใช้เชื่อมต่อกับฮาร์ดไดรฟ์ เช่น Thunderbolt 3 หรือ
        SATA
    housing_color:
      name: สีตัวเรือน
      description: ระบุสีของปลอกด้านนอกของผลิตภัณฑ์ เช่น สีเบจหรือสีใส
    housing_material:
      name: วัสดุสำหรับตัวเรือน
      description: ระบุวัสดุที่ใช้ในชั้นนอกของผลิตภัณฑ์ เช่น สแตนเลส ไม้
    housing_pattern:
      name: รูปแบบตัวเรือน
      description: อธิบายการออกแบบหรือลวดลายภายนอกของผลิตภัณฑ์ เช่น แนวแอบสแตรกต์หรือโลโก้
    hub/switch_storage_options:
      name: ตัวเลือกกระปุกใส่สวิตช์
      description: ระบุความสามารถในการจัดเก็บข้อมูลของฮับหรือสวิตช์ เช่น เชื่อมต่อเป็นกลุ่มได้หรือเชื่อมต่อเป็นกลุ่มไม่ได้
    humidification_system:
      name: ระบบทำความชื้น
      description: อธิบายประเภทของตัวเลือกการทำความชื้นที่รวมหรือรองรับโดยเครื่อง
        PAP
    humidifier_design:
      name: การออกแบบเครื่องเพิ่มความชื้น
      description: อธิบายรูปแบบของเครื่องทำความชื้น เช่น แบบติดได้หรือแบบพกพา
    humidity_control:
      name: การควบคุมความชื้น
      description: ระบุความสามารถของผลิตภัณฑ์ในการควบคุมระดับความชื้น โดยทั่วไปใช้สำหรับกล่องเก็บซิการ์
        เช่น 0.65
    humidity_control_method:
      name: วิธีการควบคุมความชื้น
      description: ระบุประเภทของการควบคุมความชื้นในอุปกรณ์ เช่น แบบกึ่งอัตโนมัติ แบบแมนนวล
    hunting/survival_knife_design:
      name: การออกแบบมีดพราน/มีดดำรงชีพ
      description: ระบุการออกแบบของมีดล่าสัตว์/เอาชีวิตรอด เช่น ปลายหอกหรือปลายทันโต
    hunting_blind_design:
      name: การออกแบบซุ้มดักยิงสัตว์
      description: ระบุประเภทของการออกแบบซุ้มดักยิงสัตว์ เช่น ไม่มีฉากกั้น การมองทะลุได้ทางเดียว
    hvac_control_type:
      name: ประเภทตัวควบคุม HVAC
      description: ระบุประเภทของการควบคุม HVAC เช่น ดิจิทัลหรือด้วยตนเอง
    ice_pack_type:
      name: ประเภทน้ำแข็งแพ็ค
      description: ระบุวัสดุหรือเทคโนโลยีที่ใช้ในไอซ์แพ็ค เช่น เจลแพ็ค โฟมแพ็ค
    icon_type:
      name: ประเภทไอคอน
      description: ระบุประเภทของไอคอนคอมพิวเตอร์ เช่น โฟลเดอร์หรือโซเชียลมีเดีย
    identity_verification_requirement:
      name: ข้อกำหนดการยืนยันตัวตน
      description: ระบุว่าจำเป็นต้องลงทะเบียนชื่อจริงหรือยืนยันตัวตนด้วย eKYC ก่อนที่จะใช้งาน
        SIM หรือ eSIM ได้หรือไม่
    ignition_system:
      name: ระบบการติดเครื่อง
      description: ระบุประเภทของระบบจุดระเบิดในเครื่องกำเนิดไฟฟ้า เช่น แบบธรรมดาหรือแบบอิเล็กทรอนิกส์
    illumination_technique:
      name: เทคนิคการส่องสว่าง
      description: ระบุวิธีการจัดแสงที่ใช้ในกล้องจุลทรรศน์ เช่น สนามสว่างหรือสนามมืด
    image_formats_supported:
      name: รองรับรูปแบบภาพ
      description: ระบุประเภทไฟล์ภาพที่กล้องสามารถสร้างได้ เช่น JPEG หรือ RAW
    image_sensor_size:
      name: ขนาดเซนเซอร์ภาพ
      description: ระบุขนาดของเซนเซอร์ภาพในกล้อง เช่น 1/1.7 หรือเต็มกรอบ
    immobilizer_type:
      name: ประเภทอิมโมบิไลเซอร์
      description: ระบุชนิดของอุปกรณ์ที่ใช้ป้องกันการโจรกรรมรถ เช่น การล็อกยาง หรือล็อกพวงมาลัย
    incense_fragrance:
      name: กลิ่นหอมธูป
      description: ระบุกลิ่นของผลิตภัณฑ์ธูป เช่น ลาเวนเดอร์หรือไม้จันทน์
    incense_kit_items_included:
      name: รวมอุปกรณ์ชุดธูปหอม
      description: ระบุองค์ประกอบที่มีอยู่ในชุดทำธูป เช่น แท่งไม้ไผ่ แม่พิมพ์
    incense_type:
      name: ประเภทธูป
      description: ระบุรูปแบบของธูป เช่น กรวยหรือแท่ง
    incontinence_aid_features:
      name: คุณลักษณะของเครื่องช่วยกลั้นปัสสาวะ
      description: อธิบายลักษณะพิเศษของเครื่องช่วยกลั้นปัสสาวะไม่อยู่ เช่น ป้องกันการรั่วซึมหรือสูตรลดการเกิดอาการแพ้
    incontinence_pad_type:
      name: ประเภทแผ่นรองกลั้นปัสสาวะไม่อยู่
      description: กำหนดสไตล์หรือรูปแบบเฉพาะของแผ่นรอง (เช่น ไลเนอร์ การ์ด บูสเตอร์แพด)
    inductance_tolerance:
      name: ความคลาดเคลื่อนความเหนี่ยวนำ
      description: กำหนดเปอร์เซ็นต์ค่าเบี่ยงเบนที่อนุญาตจากค่าความเหนี่ยวนำที่ระบุ
    industry_focus:
      name: มุ่งเน้นอุตสาหกรรม
      description: เน้นภาคส่วนเป้าหมายสำหรับผลิตภัณฑ์ เช่น การศึกษาหรือการผลิต
    infant_age_group:
      name: กลุ่มอายุทารก
      description: แยกประเภทผลิตภัณฑ์ที่เหมาะกับช่วงอายุของทารกโดยเฉพาะ เช่น ทารกแรกเกิด,
        0-6 เดือน
    inflation_method:
      name: วิธีการสูบลม
      description: ระบุวิธีการสูบลมผลิตภัณฑ์ เช่น อัตโนมัติหรือไฮโดรสแตติก
    ingredient_category:
      name: หมวดหมู่ส่วนผสม
      description: จำแนกประเภทของส่วนผสมในวิตามินและอาหารเสริม เช่น ไฟเบอร์ สมุนไพร
    ingredient_origin:
      name: ที่มาของส่วนผสม
      description: ระบุแหล่งที่มาของส่วนผสมของผลิตภัณฑ์ เช่น จากธรรมชาติ สังเคราะห์
    ingredient_pathway:
      name: เส้นทางส่วนผสม
      description: ระบุว่าส่วนผสมของน้ำหอมได้มาจากธรรมชาติผ่านการแยกทางกายภาพจากชีวมวลโดยไม่เปลี่ยนแปลงทางเคมีหรือสังเคราะห์โดยวิธีการอื่น
    ingredients:
      name: วัตถุดิบ
      description: ระบุส่วนประกอบที่ใช้ในสูตรผลิตภัณฑ์ เช่น ซิงค์ออกไซด์ ว่านหางจระเข้
    ingress_protection_ip_rating:
      name: ระดับการป้องกันการรั่วซึม (IP)
      description: ให้ระดับการป้องกันน้ำ/ฝุ่น IP อย่างเป็นทางการที่เคสเป็นไปตามมาตรฐาน
        (เช่น IP68)
    ink_application_technique:
      name: เทคนิคการใช้หมึก
      description: อธิบายวิธีการใช้หมึกในงานศิลปะและงานฝีมือ เช่น การพิมพ์สกรีน
    ink_color:
      name: สีหมึก
      description: ระบุสีของหมึก โดยทั่วไปใช้กับเครื่องใช้สำนักงาน เช่น สีดำ สีเงิน
    ink_form:
      name: รูปแบบหมึก
      description: อธิบายวิธีการบรรจุหรือการจัดส่งหมึกอาร์ต เช่น ปากกาหรือขวด
    ink_pattern:
      name: ลายหมึก
      description: ระบุธีมภาพของปากกาหรือแสตมป์ เช่น เรขาคณิต คริสต์มาส
    ink_type:
      name: ประเภทหมึก
      description: ระบุชนิดของหมึกที่ใช้ในผลิตภัณฑ์ เช่น ตัวทำละลายหรือสีย้อม
    inline_skating_style:
      name: สไตล์ของอินไลน์สเกต
      description: ระบุสไตล์เฉพาะของการเล่นอินไลน์สเก็ตที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ
        เช่น การเล่นสเก็ตอินไลน์เพื่อสันทนาการหรือแข่งความเร็ว
    input/output_ports:
      name: พอร์ตขาเข้า/ขาออก
      description: ระบุประเภทของพอร์ตที่มีอยู่ในอุปกรณ์ เช่น USB หรือแจ็คเอาท์พุต
    input_connection:
      name: การเชื่อมต่ออินพุต
      description: ระบุประเภทการเชื่อมต่ออินพุตสำหรับสายสัญญาณเสียง เช่น 3.5 มม. หรือ
        RCA
    input_connection_type:
      name: ประเภทการเชื่อมต่อขาเข้า
      description: ระบุขั้วต่อหรือมาตรฐานอินเทอร์เฟซที่ยอมรับทางด้านขาเข้าของตัวแปลง
    input_signal_interface:
      name: อินเทอร์เฟซสัญญาณขาเข้า
      description: ระบุประเภทของการเชื่อมต่อขาเข้าที่ตัวแปลงเสียงรองรับ
    input_video_interface:
      name: อินเทอร์เฟซวิดีโอขาเข้า
      description: ระบุประเภทของขั้วต่อวิดีโอที่ยอมรับเป็นขาเข้าโดยตัวแปลงสแกน
    insole_length_type:
      name: ประเภทความยาวแผ่นรองเท้า
      description: กำหนดการปกคลุมหรือสไตล์ความยาวของแผ่นรอง
    installation_accessories_included:
      name: อุปกรณ์เสริมการติดตั้งที่รวมอยู่
      description: ระบุเครื่องมือหรือวัสดุคำแนะนำที่มาพร้อมกับแบตเตอรี่เพื่อช่วยในการติดตั้ง
    installation_tools_included:
      name: เครื่องมือติดตั้งที่รวมอยู่
      description: แสดงรายการเครื่องมือหรือวัสดุสิ้นเปลืองที่มาพร้อมกับชิ้นส่วนเพื่อช่วยในการติดตั้ง
    instruction_set_architecture:
      name: สถาปัตยกรรมชุดคำสั่ง
      description: ระบุสถาปัตยกรรมคอมพิวเตอร์ที่โปรเซสเซอร์สามารถเข้าใจได้ เช่น 32
        บิต
    instrument/accessory_finish:
      name: การตกแต่งผิวอุปกรณ์/อุปกรณ์เสริม
      description: อธิบายการรักษาพื้นผิวหรือสีของเครื่องดนตรีหรือเครื่องประดับ เช่น
        เคลือบทองหรือเคลือบแล็คเกอร์
    instrument_accessory_material:
      name: วัสดุที่ใช้ทำอุปกรณ์เสริมของเครื่องดนตรี
      description: ระบุวัสดุที่ใช้ในอุปกรณ์เสริมเครื่องดนตรี เช่น ไม้หรือทองเหลือง
    instrument_bow_material:
      name: วัสดุที่ใช้ทำคันชักเครื่องดนตรี
      description: ระบุวัสดุที่ใช้สร้างคันธนูเครื่องดนตรี เช่น คาร์บอนไฟเบอร์หรือไม้บราซิล
    instrument_color:
      name: สีของเครื่องดนตรี
      description: ระบุสีของเครื่องดนตรี เช่น สีดำหรือสีเงิน
    instrument_controller_type:
      name: ประเภทตัวควบคุมเครื่องมือ
      description: ระบุเครื่องดนตรีที่จำลองโดยคอนโทรลเลอร์เกม เช่น กีตาร์หรือไมโครโฟน
    instrument_material:
      name: วัสดุที่ใช้ทำเครื่องดนตรี
      description: ระบุวัสดุหลักที่ใช้ในการก่อสร้างเครื่องดนตรี เช่น ไม้เมเปิลหรือทองเหลือง
    instrument_part_material:
      name: วัสดุที่ใช้ทำชิ้นส่วนเครื่องดนตรี
      description: ระบุชนิดของวัสดุที่ใช้ในชิ้นส่วนอุปกรณ์ เช่น ไม้มะเกลือ หรือเคลือบทอง
    instrument_pattern:
      name: ลวดลายเครื่องดนตรี
      description: อธิบายการออกแบบภาพหรือลวดลายบนเครื่องดนตรี เช่น สีแบบเรียบหรือมีพื้นผิว
    instrument_string_color:
      name: สีของสายเครื่องดนตรี
      description: ระบุสีของสายบนเครื่องดนตรี เช่น สีทองหรือสีเงิน
    instrument_string_material:
      name: วัสดุที่ใช้ทำสายเครื่องดนตรี
      description: ระบุองค์ประกอบของเครื่องสายเครื่องดนตรี เช่น บรอนซ์หรือฟลูออโรคาร์บอน
    instrument_string_pattern:
      name: รูปแบบของสายเครื่องดนตรี
      description: ระบุลวดลายบนสายกีตาร์ เช่น สีทึบหรือเรขาคณิต
    instrument_support_type:
      name: ประเภทขาตั้งเครื่องดนตรี
      description: ระบุประเภทของอุปกรณ์รองรับที่ใช้สำหรับเครื่องดนตรี เช่น สายคล้องคอหรือขาตั้งโน้ตเพลง
    insulation_material:
      name: วัสดุฉนวน
      description: ระบุองค์ประกอบของฉนวน เช่น ขนแร่ หรือโพลียูรีเทน (PU)
    integrated_led_lighting:
      name: ไฟ LED ในตัว
      description: ระบุว่าลำโพงมีไฟ LED หรือ RGB ในตัวหรือไม่และเป็นประเภทใด
    integrated_power/charging_options:
      name: ตัวเลือกพลังงาน/การชาร์จในตัว
      description: ระบุว่าขาตั้งมีเต้าเสียบไฟฟ้าในตัวและ/หรือพอร์ตชาร์จ USB หรือไม่
        เพิ่มประโยชน์สำหรับอุปกรณ์ที่เชื่อมต่อ
    integrated_stand_type:
      name: ประเภทขาตั้งแบบบูรณาการ
      description: อธิบายรูปแบบของขาตั้งหรือกลไกรองรับแบบติดตั้งในตัวบนเคส
    intended_application:
      name: การใช้งานที่ตั้งใจไว้
      description: ระบุการใช้สีและคราบโดยเฉพาะ เช่น ประตู ดาดฟ้า/รั้ว
    intended_effect:
      name: ผลที่ตั้งใจ
      description: อธิบายถึงประโยชน์ต่อสุขภาพเบื้องต้นที่ได้รับจากอาหารเสริม CBD ที่วางจำหน่าย
    intended_jewelry_type:
      name: ประเภทเครื่องประดับที่ตั้งใจ
      description: ระบุว่าขาตั้งออกแบบมาเพื่อถือหรือแสดงเครื่องประดับประเภทใด
    intended_surface:
      name: พื้นผิวที่ตั้งใจใช้
      description: ระบุพื้นผิวหลักที่แผ่นรองออกแบบมาเพื่อป้องกัน
    intercom_communication_type:
      name: ประเภทการสื่อสารอินเตอร์คอม
      description: จำแนกรูปแบบการสื่อสารพื้นฐานที่หน่วยรองรับ
    intercom_wiring_type:
      name: ประเภทการเดินสายอินเตอร์คอม
      description: ระบุการเดินสายหรือรูปแบบการสื่อสารที่หน่วยลำโพงอินเตอร์คอมได้รับการออกแบบมาโดยเฉพาะ
    interface_type:
      name: ประเภทอินเทอร์เฟซ
      description: ระบุประเภทการเชื่อมต่อที่ผลิตภัณฑ์ใช้ เช่น บลูทูธ หรือ USB
    interior_lining_material:
      name: วัสดุบุภายใน
      description: ระบุวัสดุหลักที่บุด้านในของกล่องเครื่องประดับ ป้องกันเครื่องประดับจากรอยขีดข่วนและการสึกหรอ
    interior_texture:
      name: พื้นผิวด้านใน
      description: กำหนดรูปแบบพื้นผิวภายในที่ช่วยสร้างฟองภายในชามหรือแก้ว
    internal_drive_form_factor_supported:
      name: รองรับฟอร์มแฟคเตอร์ไดรฟ์ภายใน
      description: ระบุขนาดฮาร์ดไดรฟ์ที่เข้ากันได้สำหรับอุปกรณ์ เช่น 2.5 นิ้ว
    internet_radio_form_factor:
      name: รูปแบบของวิทยุอินเทอร์เน็ต
      description: กำหนดสไตล์ทางกายภาพหรือทิศทางการติดตั้งของวิทยุอินเทอร์เน็ต
    intimate_apparel_features:
      name: คุณลักษณะของชุดชั้นใน
      description: อธิบายลักษณะพิเศษของเครื่องแต่งกายที่ใกล้ชิด เช่น การออกแบบที่ระบายอากาศได้ดีหรือความสบาย
    inverter_type:
      name: ประเภทอินเวอร์เตอร์
      description: ระบุประเภทของอินเวอร์เตอร์กำลังในส่วน EV เช่น คลื่นไซน์บริสุทธิ์หรือคลื่นสี่เหลี่ยม
    invitation_personalization_design:
      name: การออกแบบบัตรเชิญที่ปรับให้เหมาะกับแต่ละบุคคล
      description: ระบุคุณลักษณะการออกแบบคำเชิญ เช่น มีใบตอบรับคำเชิญ ปรับแต่งได้
    ironing_features:
      name: คุณลักษณะด้านการรีดผ้า
      description: ระบุคุณลักษณะพิเศษของเตารีดหรือระบบรีดผ้า เช่น ระบบปิดเครื่องอัตโนมัติ
        ระบบเพิ่มพลังไอน้ำ
    item_condition:
      name: สภาพสินค้า
      description: บ่งบอกถึงคุณภาพของสินค้า โดยทั่วไปคือยานพาหนะหรือชิ้นส่วนของยานพาหนะ
        เช่น สินค้ามือสองที่ผ่านการรับรอง ซ่อมแซมใหม่
    item_material:
      name: วัสดุที่ใช้ทำอุปกรณ์
      description: ระบุสารหลักของสินค้า โดยทั่วไปใช้กับชิ้นส่วนและอุปกรณ์เสริมของยานพาหนะ
        เช่น ทองแดง ไฟเบอร์กลาส
    item_style:
      name: สไตล์ของรายการ
      description: อธิบายความสวยงามหรือธีมการออกแบบของผลิตภัณฑ์ เช่น ทันสมัยหรือเรียบง่าย
    j_cup_type:
      name: ประเภทเจคัพ
      description: ระบุรูปแบบของ J-cup สำหรับอุปกรณ์ยกน้ำหนัก เช่น แบน แซนด์วิช
    jaw_advancement_adjustability:
      name: การปรับการเลื่อนขากรรไกรล่าง
      description: ระบุว่าตำแหน่งขากรรไกรล่างที่อุปกรณ์ให้มาสามารถปรับโดยผู้ใช้ได้หรือไม่และอย่างไร
    jaw_material:
      name: วัสดุสำหรับขากรรไกร
      description: ระบุวัสดุที่ใช้ในปากจับของเครื่องมือ เช่น เหล็กกล้าหรือไทเทเนียม
    jewelry_cleaning_accessories_included:
      name: อุปกรณ์เสริมทำความสะอาดเครื่องประดับที่รวมอยู่
      description: แสดงรายการเครื่องมือหรืออุปกรณ์เสริมพิเศษใด ๆ ที่มาพร้อมกับน้ำยาทำความสะอาด
        (เช่น แปรง ถาด ผ้าขัด)
    jewelry_cleaning_purpose:
      name: วัตถุประสงค์การทำความสะอาดเครื่องประดับ
      description: ระบุหน้าที่ที่ตั้งใจหลักของผลิตภัณฑ์ (เช่น การกำจัดคราบหมอง การขัด
        การเคลือบป้องกัน)
    jewelry_finding_type:
      name: ประเภทตะขอเครื่องประดับ
      description: ระบุส่วนประกอบที่ใช้ในการทำเครื่องเพชรพลอย เช่น ตัวครอบลูกปัดหรือห่วงวงแหวน
    jewelry_material:
      name: วัสดุที่ใช้ทำเครื่องประดับ
      description: ระบุวัสดุหลักที่ใช้ในเครื่องประดับ เช่น ทองหรืออีนาเมล
    jewelry_project_type:
      name: ประเภทโครงการเครื่องเพชรพลอย
      description: ระบุประเภทของโครงการเครื่องประดับ เช่น การทำสร้อยคอหรืองานดัดลวด
    jewelry_set_type:
      name: ประเภทชุดเครื่องเพชรพลอย
      description: ระบุประเภทของเครื่องประดับในชุดทำเครื่องประดับ เช่น แหวนหรือสร้อยคอ
    jewelry_steam_cleaner_features:
      name: คุณสมบัติเครื่องทำความสะอาดเครื่องประดับด้วยไอน้ำ
      description: แสดงรายการคุณสมบัติในตัวหรือฟังก์ชันความปลอดภัยที่โดดเด่นที่แยกแยะโมเดล
    jewelry_type:
      name: ประเภทเครื่องประดับ
      description: แยกแยะความแตกต่างระหว่างเครื่องประดับประเภทต่างๆ เช่น เครื่องประดับแท้หรือเครื่องประดับเลียนแบบ
    joint_connection:
      name: การต่อข้อต่อ
      description: ระบุการเชื่อมต่อข้อต่อในไม้คิวบิลเลียด เช่น วัสดุคอมโพสิต ไม่มีข้อต่อ
    joint_face_type:
      name: ประเภทการบรรจบข้อต่อ
      description: ระบุประเภทของหน้าข้อต่อบนแกนไม้บิลเลียด เช่น เต็มหน้าหรือแบบไพลอต
    joint_style:
      name: สไตล์ร่วม
      description: ระบุประเภทของตัวต่อที่ใช้ในไม้คิวบิลเลียด เช่น Uni-loc หรือ Radial
    journey_type:
      name: ประเภทการเดินทาง
      description: ระบุประเภทการเดินทางที่ครอบคลุมโดยตั๋วโดยอิงตามจำนวนทริปและทิศทางการเดินทาง
    joystick_mounting_style:
      name: รูปแบบการติดตั้งจอยสติ๊ก
      description: ระบุวิธีการยึดชุดจอยสติ๊กกับแผงควบคุมหรือตู้
    joystick_sensor_technology:
      name: เทคโนโลยีเซ็นเซอร์จอยสติก
      description: ระบุเทคโนโลยีการตรวจจับหลักที่ใช้ในการตรวจจับการเคลื่อนไหวหรือตำแหน่ง
    jump_rope_design:
      name: การออกแบบเชือกกระโดด
      description: อธิบายประเภทของเชือกกระโดด เช่น แบบธรรมดาหรือแบบสมาร์ท
    jumping_surface_color:
      name: สีของแผ่นกระโดด
      description: ระบุสีของพื้นผิวสำหรับการกระโดดของแทรมโพลีน เช่น สีน้ำเงินหรือสีดำ
    jumping_surface_material:
      name: วัสดุสำหรับพื้นผิวการกระโดด
      description: ระบุเนื้อผ้าของพื้นที่กระโดดของแทรมโพลีน เช่น ผ้าใยสังเคราะห์ โพลีโพรพีลีน
    jumping_surface_pattern:
      name: ลวดลายแผ่นกระโดด
      description: ระบุการออกแบบหรือลายพิมพ์บนพื้นผิวสำหรับกระโดดของแทรมโพลีน เช่น
        รูปดาวหรือลายทาง
    karaoke_modes:
      name: โหมดคาราโอเกะ
      description: ระบุประเภทของการร้องคาราโอเกะ เช่น ร้องเดี่ยวหรือร้องคู่
    kerosene_application:
      name: การใช้งานน้ำมันก๊าด
      description: ระบุการใช้น้ำมันก๊าดโดยเฉพาะ เช่น เครื่องทำความร้อนหรือเชื้อเพลิงเครื่องบิน
    key_purpose:
      name: วัตถุประสงค์หลัก
      description: ระบุตำแหน่งที่ออกแบบให้ใช้กุญแจหรือกุญแจว่าง เช่น ประตู กุญแจล็อค
    keyboard_action:
      name: การทำงานของแป้นพิมพ์
      description: ระบุความรู้สึกของคีย์เปียโน เช่น การใช้ค้อนหรือคีย์ถ่วงน้ำหนัก
    keyboard_assembly_type:
      name: ประเภทชุดคีย์บอร์ด
      description: กำหนดชุดประกอบทางกายภาพที่จัดหาให้ (เช่น คีย์บอร์ดแบบแยก, พาล์มเรสต์พร้อมคีย์บอร์ด,
        ชุดคีย์แต่ละตัว)
    keyboard_backlight_type:
      name: ประเภทแบ็คไลท์คีย์บอร์ด
      description: รายละเอียดเทคโนโลยีหรือรูปแบบการส่องสว่างที่ใช้สำหรับคีย์คีย์บอร์ดหรือตัวเครื่อง
    keyboard_format:
      name: รูปแบบแป้นพิมพ์
      description: ระบุขนาดและเค้าโครงของคีย์บอร์ด เช่น ขนาดเต็มหรือขนาดกะทัดรัด
    keyboard_key_type:
      name: ประเภทแป้นของคีย์บอร์ด
      description: อธิบายการตอบสนองหรือความรู้สึกของคีย์บนคีย์บอร์ดดนตรี เช่น แบบถ่วงน้ำหนักหรือกึ่งถ่วงน้ำหนัก
    keyboard_language:
      name: ภาษาของคีย์บอร์ด
      description: ระบุเลย์เอาต์ภาษาของคีย์บอร์ด เช่น ENG (อังกฤษ) หรือ DEU (เยอรมัน)
    keyboard_layout:
      name: เลย์เอาต์แป้นพิมพ์
      description: ระบุลักษณะการจัดเรียงปุ่มบนคีย์บอร์ด เช่น QWERTY, Workman
    keyboard_mounting_style:
      name: รูปแบบการติดตั้งคีย์บอร์ด
      description: กำหนดวิธีการติดตั้งแผ่นภายในที่ส่งผลต่อเสียงและความรู้สึกของคีย์บอร์ดแมคคานิคัล
    keyboard_port_type:
      name: ประเภทพอร์ตแป้นพิมพ์
      description: ระบุประเภทของพอร์ตสำหรับการเชื่อมต่อคีย์บอร์ด เช่น USB type-C
    keyboard_specialized_features:
      name: คุณลักษณะพิเศษของคีย์บอร์ด
      description: ระบุลักษณะเฉพาะของแป้นพิมพ์ เช่น มุมที่ปรับได้หรือไฟแบ็คไลท์
    keyboard_switch_type:
      name: ประเภทสวิตช์คีย์บอร์ด
      description: ระบุรูปแบบการตอบสนองของคีย์บอร์ด เช่น การสัมผัสหรือการคลิก
    keyboard_type:
      name: ประเภทคีย์บอร์ด
      description: ระบุการออกแบบและฟังก์ชันการทำงานของคีย์บอร์ด เช่น แบบมาตรฐาน แบบแบ็คไลท์
    keycap_legend_printing_method:
      name: วิธีการพิมพ์ตำนานคีย์แคป
      description: อธิบายวิธีการใส่ตำนานบนคีย์แคป ซึ่งส่งผลต่อความทนทานและรูปลักษณ์
    keycap_material:
      name: วัสดุคีย์แคป
      description: ระบุวัสดุหลักหรือกระบวนการผลิตของคีย์แคปซึ่งส่งผลต่อความทนทาน พื้นผิว
        และตำนาน
    keycap_profile:
      name: โปรไฟล์คีย์แคป
      description: ระบุตระกูลรูปทรงหรือรูปร่างของชุดคีย์แคป ซึ่งส่งผลต่อความรู้สึก
        ในการพิมพ์และความสวยงาม
    keypad_style:
      name: สไตล์ปุ่มกด
      description: ระบุวิธีการป้อนข้อมูลสำหรับแผงปุ่มกด เช่น ดิจิทัลหรือแบบตัวอักษรและตัวเลข
    keystone_correction_type:
      name: ประเภทการแก้ไขคีย์สโตน
      description: อธิบายประเภทของการแก้ไขคีย์สโตนหรือเรขาคณิตที่โปรเจคเตอร์รองรับเพื่อขจัดการบิดเบี้ยวแบบสี่เหลี่ยมคางหมู
        (เช่น แนวตั้งแบบแมนนวล, สี่จุดอัตโนมัติ)
    kiln_features:
      name: คุณสมบัติเตาเผา
      description: ระบุความสามารถในการทำงานและลักษณะการออกแบบของเตาเผา
    kiln_loading_style:
      name: รูปแบบการบรรจุเตาเผา
      description: ระบุวิธีการที่สิ่งของถูกวางเข้าและนำออกจากห้องเตาเผา
    kit_construction_type:
      name: ประเภทการก่อสร้างแบบชุด
      description: ระบุเนื้อผ้าสำหรับพื้นที่กระโดดของแทรมโพลีน เช่น วัสดุสังเคราะห์
        โพลีโพรพีลีน
    kitchen/dining_furniture_items_included:
      name: รวมเฟอร์นิเจอร์ห้องครัว/ห้องรับประทานอาหาร
      description: ระบุชิ้นส่วนเฟอร์นิเจอร์ที่รวมอยู่ในชุด เช่น เก้าอี้ทานอาหารหรือเคาน์เตอร์กลางครัว
    kitchen_utensil_items_included:
      name: อุปกรณ์เครื่องครัวที่รวมอยู่
      description: ระบุเครื่องมือที่รวมอยู่ในชุดเครื่องครัว เช่น ที่ตีหรือที่คีบ
    kitesurfing_style:
      name: สไตล์สำหรับไคท์เซิร์ฟ
      description: ระบุสไตล์การเล่นไคท์เซิร์ฟที่สินค้านี้ออกแบบมาโดยเฉพาะ เช่น การโต้คลื่น
    knee_brace_style:
      name: สไตล์เฝือกเข่า
      description: ระบุการออกแบบโครงสร้างของอุปกรณ์พยุง โดยสะท้อนถึงลักษณะการสวมใส่และระดับการรองรับที่อุปกรณ์มอบให้
    kneeboard_features:
      name: คุณลักษณะของนีบอร์ด
      description: อธิบายลักษณะเฉพาะของสนับเข่า เช่น สายรัดแบบปรับได้หรือแผ่นกันลื่น
    knife_type:
      name: ประเภทมีด
      description: จำแนกประเภทมีดตามวัตถุประสงค์การใช้งานหรือการออกแบบ เช่น เครื่องมืออเนกประสงค์หรือ
        EDC
    knitting/padding_project_type:
      name: ประเภทโครงการถักนิตติ้ง/ยัดเบาะ
      description: ระบุจุดประสงค์ในการใช้วัสดุถักหรือวัสดุบุรอง เช่น การควิลท์หรือการทำหมอน
    knitting_project_type:
      name: ประเภทโครงการถักนิตติ้ง
      description: ระบุประเภทของโครงการถักนิตติ้ง เช่น การทำหมอนหรือการทำของเล่นยัดไส้
    knob/handle_design:
      name: การออกแบบปุ่มจับ/ที่จับ
      description: อธิบายสไตล์ของอุปกรณ์ตู้ เช่น ลูกบิดกลมหรือตัวดึงบาร์
    knob_function:
      name: ฟังก์ชันลูกบิด
      description: ระบุฟังก์ชันของปุ่มหมุนของเครื่องขยายเสียง เช่น อัตราขยายหรือสถานะ
    knob_style:
      name: สไตล์ลูกบิด
      description: อธิบายการออกแบบปุ่มหมุนบนแอมพลิฟายเออร์เครื่องดนตรี เช่น สแตนดาร์ดหรือเรโทร/วินเทจ
    knot_shape:
      name: รูปทรงปม
      description: ระบุรูปทรงหรือโปรไฟล์โดยรวมของปมหรือหัวแปรง
    labeling_project_type:
      name: ประเภทโครงการติดฉลาก
      description: ระบุวัตถุประสงค์ในการประดิษฐ์สำหรับการเย็บฉลาก เช่น งานหัตถกรรมสิ่งทอที่บ้าน
        หรือการทำของขวัญส่วนบุคคล
    laboratory_freezer_design:
      name: การออกแบบเครื่องแช่แข็งห้องแล็บ
      description: อธิบายการกำหนดค่าของตู้แช่แข็งในห้องปฏิบัติการ เช่น แบบแนวตั้งหรือแบบตู้
    lacrosse_equipment_included:
      name: รวมอุปกรณ์ลาครอส
      description: ระบุรายการในชุดอุปกรณ์ลาครอส เช่น ไม้ลาครอสหรือแผ่นรองไหล่
    ladder_type:
      name: ประเภทบันได
      description: ระบุรูปแบบของบันไดเรือ เช่น แบบตายตัวหรือแบบยืดหดได้
    lamination_mode:
      name: โหมดการเคลือบ
      description: ระบุประเภทของกระบวนการเคลือบที่ใช้ เช่น การเคลือบเย็นหรือการเคลือบร้อน
    lamination_type:
      name: ประเภทการเคลือบ
      description: ระบุว่าพื้นผิวแผนภูมิหรือโมเดลมีการเคลือบหรือไม่ และถ้ามี เป็นแบบด้านเดียวหรือสองด้าน
    lamp_assembly_type:
      name: ประเภทชุดประกอบหลอดไฟ
      description: ระบุว่าผลิตภัณฑ์เป็นหลอดเปลือย, หลอดพร้อมตัวเรือน, แพ็คคู่ หรือการกำหนดค่าชุดประกอบอื่น
    lamp_quality_grade:
      name: เกรดคุณภาพหลอดไฟ
      description: ระบุว่าหลอดไฟเป็น OEM ต้นฉบับ, ใช้หลอด OEM ในตัวเรือนที่ใช้ร่วมกันได้
        หรือเป็นตลาดหลังการขาย/ใช้ร่วมกันได้ทั้งหมด
    lamp_type:
      name: ประเภทโคมไฟ
      description: ระบุแหล่งกำเนิดแสงในตัวขยายภาพ เช่น แสงเย็น แสงไดโครอิก
    lancet_mechanism_type:
      name: ประเภทกลไกเข็มเจาะ
      description: กำหนดกลไกการทำงานหรือการออกแบบความปลอดภัยของเข็มเจาะ (เช่น หดกลับเพื่อความปลอดภัย
        เปิดใช้งานด้วยแรงดัน)
    language:
      name: ภาษา
      description: ระบุภาษาที่ใช้หรือภาษาที่เข้ากันได้ เช่น ภาษาอังกฤษ หลายภาษา
    language_version:
      name: เวอร์ชันภาษา
      description: ระบุเวอร์ชันภาษาของผลิตภัณฑ์สื่อ เช่น ENG-US หรือ ARA-อารบิก
    laptop_cable_type:
      name: ประเภทสายเคเบิลแล็ปท็อป
      description: ระบุวัตถุประสงค์การทำงานของสายเคเบิลภายในแล็ปท็อป
    laptop_housing_part_type:
      name: ประเภทชิ้นส่วนตัวเครื่องแล็ปท็อป
      description: ระบุส่วนประกอบภายนอกที่ให้มา (เช่น ฐานด้านล่าง ที่วางมือ ขอบ)
    laser_color:
      name: สีเลเซอร์
      description: ระบุสีของตัวชี้เลเซอร์ เช่น สีแดงหรือสีเขียว
    laser_light_source:
      name: แหล่งกำเนิดแสงเลเซอร์
      description: ระบุเทคโนโลยีแสงที่ใช้ในตัวชี้เลเซอร์ เช่น LED
    laser_pattern:
      name: รูปแบบเลเซอร์
      description: ระบุการออกแบบหรือลวดลายที่เกิดจากเลเซอร์ เช่น รูปดาวหรือสัตว์
    lathe_application:
      name: การใช้งานเครื่องกลึง
      description: ระบุประเภทของงานที่ออกแบบมาสำหรับเครื่องกลึง เช่น งานปั่นอะคริลิกหรืองานกระจก
    laundry_detergent_features:
      name: คุณลักษณะของน้ำยาซักผ้า
      description: อธิบายลักษณะพิเศษของน้ำยาซักผ้า เช่น ปกป้องสีหรือขจัดคราบ
    lead_grade:
      name: เกรดตะกั่ว
      description: ระบุเกรดของตะกั่วในเครื่องเขียน เช่น H, 9B
    leash_design:
      name: การออกแบบสายจูง
      description: อธิบายการทำงานของสายจูงสัตว์เลี้ยง เช่น แบบถอดออกได้หรือพับเก็บได้
    leather/vinyl_texture:
      name: พื้นผิวหนัง/ไวนิล
      description: อธิบายความรู้สึกพื้นผิวของผลิตภัณฑ์หนังหรือไวนิล เช่น เรียบหรือหยาบ
    leather_type:
      name: ประเภทหนัง
      description: ระบุแหล่งที่มาของสัตว์หรือประเภทของหนังที่ใช้ในผลิตภัณฑ์ (เช่น
        หนังวัว หนังลูกวัว หนังจระเข้ หนังงูเหลือม หนังสังเคราะห์)
    lectern_mounting_type:
      name: ประเภทการติดตั้งแท่นโพเดียม
      description: ระบุรูปแบบการจัดวางของแท่นบรรยาย เช่น บนโต๊ะหรือพื้น
    led_light_mode:
      name: โหมดไฟ LED
      description: แสดงรายการโหมดการทำงานที่เลือกได้ที่รวมสเปกตรัมหรือความเข้มที่แตกต่างกัน
        (เช่น สีน้ำเงิน สีแดง สีน้ำเงินและสีแดง)
    leg_color:
      name: สีของขา
      description: ระบุเฉดสีขาของผลิตภัณฑ์ เช่น สีขาว สีน้ำตาล
    leg_lock_type:
      name: ประเภทล็อคขา
      description: ระบุประเภทของการล็อคขาที่ใช้ในอุปกรณ์อิเล็กทรอนิกส์ ซึ่งโดยทั่วไปคือไม้เซลฟี่
        เช่น ล็อกแบบหมุน
    leg_material:
      name: วัสดุสำหรับขา
      description: ระบุวัสดุที่ใช้ทำขาผลิตภัณฑ์ เช่น ไม้เชอร์รี่หรือไม้ไผ่
    leg_pattern:
      name: ลายขา
      description: 'ระบุดีไซน์หรือลายพิมพ์บนขาของผลิตภัณฑ์ เช่น รูปสัตว์หรือเรขาคณิต '
    leg_sections:
      name: ส่วนขา
      description: ระบุจำนวนท่อนของขาในอุปกรณ์อิเล็กทรอนิกส์ ซึ่งโดยทั่วไปคือไม้เซลฟี่
        เช่น 5+
    legend_type:
      name: ประเภทตำนาน
      description: ระบุว่าตัวทำเครื่องหมายเป็นแบบเปล่าหรือพิมพ์ไว้ล่วงหน้าด้วยตัวเลข
        ตัวอักษร สัญลักษณ์ หรือเครื่องหมายอื่นๆ
    length_adjustability:
      name: การปรับความยาว
      description: ระบุว่าผู้ใช้สามารถปรับความยาวของสายหรือโซ่ได้หรือคงที่
    lens/slide_material:
      name: วัสดุเลนส์/สไลด์
      description: ระบุวัสดุที่ใช้ในการผลิตเลนส์หรือแผ่นสไลด์ เช่น พลาสติกหรือแก้ว
    lens_cap_compatible_device:
      name: อุปกรณ์ที่รองรับฝาครอบเลนส์
      description: ระบุอุปกรณ์ที่เข้ากันได้กับฝาปิดเลนส์ เช่น กล้องตาเดียวหรือกล้องดิจิตอล
    lens_case_accessories_included:
      name: อุปกรณ์เสริมตลับเลนส์ที่รวมมากับผลิตภัณฑ์
      description: ระบุสิ่งของเพิ่มเติมที่บรรจุมากับตลับ (เช่น แหนบ ขวดน้ำยา)
    lens_characteristic:
      name: คุณลักษณะเลนส์
      description: แสดงรายการคุณลักษณะการทำงานพิเศษที่ใช้กับเลนส์ (เช่น การบล็อกแสงสีน้ำเงิน,
        UV400)
    lens_coating:
      name: การเคลือบเลนส์
      description: ระบุประเภทของการเคลือบเลนส์แว่นตา เช่น ป้องกันแสงสะท้อน ป้องกันรอยขีดข่วน
    lens_color:
      name: สีเลนส์
      description: ระบุสีของเลนส์แว่นตา เช่น สีเหลืองหรือสีดำ
    lens_color_combination:
      name: การผสมสีเลนส์
      description: ระบุการจับคู่สีเลนส์ที่ใช้สำหรับแว่นตา 3D แบบอนากลิฟ
    lens_configuration:
      name: รูปร่างภายนอกของเลนส์
      description: ระบุการตั้งค่าเลนส์ในรายการต่างๆ เช่น แว่นขยาย เช่น รายการเดียวหรือหลายรายการ
    lens_filter_category:
      name: หมวดหมู่ฟิลเตอร์เลนส์
      description: ระบุหมวดหมู่ฟิลเตอร์มาตรฐานยุโรป (0–4) ที่จำแนกเลนส์ตามความเข้มของสีย้อมและสภาวะแสงที่เหมาะสม
    lens_filter_effects:
      name: เอฟเฟกต์ฟิลเตอร์เลนส์
      description: อธิบายเอฟเฟกต์เฉพาะที่ฟิลเตอร์เลนส์มอบให้ เช่น การแก้ไขสีหรือมาโคร
    lens_filter_type:
      name: ประเภทฟิลเตอร์เลนส์
      description: ระบุหมวดหมู่ฟิลเตอร์สำหรับเลนส์กล้อง เช่น การไล่ระดับสี ความหนาแน่นเป็นกลาง
    lens_kit_accessories_included:
      name: รวมอุปกรณ์เสริมชุดเลนส์
      description: แสดงรายการสินค้าเสริมที่ให้มาพร้อมกับเลนส์โทรศัพท์หรือชุดฟิลเตอร์
        เพื่อให้ผู้ซื้อทราบแน่ชัดว่าจะได้รับอะไร และสามารถเปรียบเทียบชุดผลิตภัณฑ์ต่างๆ
        ได้
    lens_material:
      name: วัสดุสำหรับเลนส์
      description: ระบุวัสดุหลักที่ใช้สำหรับองค์ประกอบออปติคัลหรือตัวเรือนของเลนส์
        เช่น กระจกออปติคัล พลาสติก หรือโลหะผสมอลูมิเนียม
    lens_pattern:
      name: รูปแบบเลนส์
      description: อธิบายการออกแบบหรือลักษณะที่ปรากฏบนเลนส์แว่นตา เช่น แบบเรียบหรือมีพื้นผิว
    lens_polarization:
      name: เลนส์โพลาไรเซชัน
      description: ระบุประเภทของโพลาไรเซชันของเลนส์ในแว่นตา เช่น โฟโต้โพลาไรซ์
    lens_protector_coverage_style:
      name: สไตล์การปกป้องเลนส์แบบครอบ
      description: กำหนดรูปแบบทางกายภาพหรือการออกแบบการครอบคลุมของตัวป้องกันเลนส์กล้องโทรศัพท์มือถือ
    lens_protector_features:
      name: คุณสมบัติตัวป้องกันเลนส์
      description: แสดงรายการคุณสมบัติการทำงานพิเศษที่นำเสนอโดยตัวป้องกัน
    lens_refractive_index:
      name: ดัชนีหักเหแสงของเลนส์
      description: ระบุดัชนีหักเหแสงเชิงตัวเลข (เช่น 1.50, 1.60, 1.67) ซึ่งสัมพันธ์โดยตรงกับความหนาและน้ำหนักของเลนส์
    lens_storage_type:
      name: ประเภทการจัดเก็บเลนส์
      description: อธิบายประเภทการจัดเก็บเลนส์กล้อง เช่น กล่องใส่เลนส์หรือกระเป๋าใส่เลนส์
    lens_tint_type:
      name: ประเภทสีย้อมเลนส์
      description: อธิบายสีย้อมที่ใช้กับเลนส์เพื่อการมองเห็นในการจับหรือเพื่อวัตถุประสงค์ด้านความงาม
    lens_type:
      name: ประเภทเลนส์
      description: ระบุประเภทของเลนส์ในผลิตภัณฑ์แว่นตา เช่น โพลาไรซ์หรือโปรเกรสซีฟ
    license_type:
      name: ประเภทใบอนุญาต
      description: ระบุประเภทของลิขสิทธิ์ซอฟต์แวร์ เช่น โอเพ่นซอร์สหรือการซื้อครั้งเดียว
    lid_material:
      name: วัสดุสำหรับฝาปิด
      description: ระบุประเภทของวัสดุที่ใช้ในฝาผลิตภัณฑ์ เช่น แก้ว หรือสแตนเลส
    lid_type:
      name: ประเภทฝา
      description: ระบุชนิดของฝาที่ใช้ เช่น แบบเปิดฝาด้านบนหรือแบบสแนปออน
    life_jacket_features:
      name: คุณลักษณะของเสื้อชูชีพ
      description: เน้นลักษณะเฉพาะของเสื้อชูชีพ เช่น แบบสะท้อนแสงหรือแบบลอยตัว
    light_attachment_type:
      name: ประเภทอุปกรณ์ติดไฟ
      description: อธิบายวิธีการติดไฟหนังสือ เช่น แบบยืดหยุ่นหรือแบบยึดตายตัว
    light_color:
      name: สีไฟ
      description: ระบุสีหรือเฉดสีของแสง เช่น สีขาวหรือหลายสี
    light_control:
      name: การควบคุมแสง
      description: ระบุระดับการปิดกั้นแสงจากการตกแต่งหน้าต่าง เช่น มืดทึบหรือบางและโปร่งใส
    light_design:
      name: การออกแบบแสง
      description: อธิบายประเภทของการออกแบบแสงในอุปกรณ์เสริมของกล้อง เช่น LED หรือวงแหวน
    light_exposure_modes:
      name: โหมดการรับแสง
      description: ระบุตัวเลือกการปรับแสงในกล้อง เช่น เน้นชัตเตอร์ AE หรือเน้นรูรับแสง
        AE
    light_filtering:
      name: การกรองแสง
      description: ระบุความสามารถในการกรองแสงของผลิตภัณฑ์ เช่น การแพร่กระจายหรือการปิดทึบ
    light_options:
      name: ตัวเลือกแสง
      description: ระบุคุณสมบัติการจัดแสงของผลิตภัณฑ์ เช่น แสงนวลหรือการเปลี่ยนสี
    light_pattern:
      name: รูปแบบแสง
      description: ระบุธีมภาพของผลิตภัณฑ์ไฟส่องสว่าง เช่น เรขาคณิตหรือสายรุ้ง
    light_rejection_type:
      name: ประเภทการป้องกันแสง
      description: ระบุว่าจอป้องกันแสงแวดล้อมหรือแสงเพดานหรือไม่และอย่างไร ปรับปรุงความคมชัดของภาพในสภาพแวดล้อมที่มีแสงสว่าง
    light_source:
      name: แหล่งกำเนิดแสง
      description: ระบุชนิดของหลอดไฟที่ใช้ในผลิตภัณฑ์ เช่น LED หรือฟลูออเรสเซนต์
    light_spectrum:
      name: สเปกตรัมของแสง
      description: ระบุช่วงความยาวคลื่นแสงที่ผลิตภัณฑ์สามารถผลิตได้ เช่น แสงสีน้ำเงิน
        แสงอินฟราเรด
    light_temperature:
      name: อุณหภูมิแสง
      description: ระบุลักษณะสีของแหล่งกำเนิดแสง เช่น วอร์มไวท์หรือเดย์ไลท์
    light_therapy_device_form_factor:
      name: รูปทรงอุปกรณ์บำบัดด้วยแสง
      description: อธิบายสไตล์ทางกายภาพหรือการกำหนดค่าของอุปกรณ์ (เช่น แผง มาสก์ แบบถือ)
    light_type:
      name: ประเภทแสง
      description: ระบุประเภทเฉพาะของแสงที่ใช้ในทางน้ำ เช่น การนำทาง ใต้น้ำ
    lighting_features:
      name: คุณลักษณะด้านแสงสว่าง
      description: อธิบายลักษณะพิเศษของแสง เช่น ความสว่างที่ปรับได้หรือไฟ LED
    lighting_options:
      name: ตัวเลือกแสงสว่าง
      description: ระบุประเภทการส่องสว่างสำหรับป้าย เช่น แบบเรืองแสงหรือไม่เรืองแสง
    lighting_type:
      name: ประเภทไฟ
      description: อธิบายคุณสมบัติไฟในตัวของหูฟัง
    line/rope_type:
      name: ประเภทเส้น/เชือก
      description: ระบุรูปแบบการก่อสร้างของเส้นสมอหรือเชือก เช่น เกลียวสามเกลียวหรือเกลียวคู่
    line_spacing_options:
      name: ตัวเลือกระยะห่างระหว่างบรรทัด
      description: ระบุตัวเลือกระยะห่างระหว่างบรรทัด โดยทั่วไปใช้กับเครื่องพิมพ์ดีด
        เช่น สองเท่า ปรับได้
    liner_features:
      name: คุณลักษณะของไลเนอร์
      description: อธิบายลักษณะเฉพาะของไลเนอร์ เช่น ป้องกันการรั่วซึมหรือย่อยสลายได้ทางชีวภาพ
    lip_balm_tint_level:
      name: ระดับสีของลิปบาล์ม
      description: จำแนกระดับสีหรือปริมาณสีที่มีในบาล์ม
    lip_gloss_applicator_type:
      name: ประเภทอุปกรณ์ทาลิปกลอส
      description: ระบุสไตล์ของอุปกรณ์ทาที่มาพร้อมกับลิปกลอส ซึ่งส่งผลต่อความง่ายในการใช้และความชอบของผู้ใช้
    lip_gloss_effect:
      name: เอฟเฟกต์ลิปกลอส
      description: อธิบายถึงผลลัพธ์ของการทาลิปกลอส เช่น ช่วยให้ริมฝีปากเรียบเนียน
        ช่วยให้ริมฝีปากอวบอิ่ม
    lip_gloss_formulation:
      name: สูตรลิปกลอส
      description: กำหนดพื้นผิวหรือรูปแบบหลักของลิปกลอส
    lip_liner_design:
      name: การออกแบบที่เขียนขอบปาก
      description: ระบุประเภทของที่เขียนขอบปาก เช่น แบบยืดหดได้หรือแบบตายตัว
    lip_makeup_opacity:
      name: ความทึบของเครื่องสำอางริมฝีปาก
      description: ระบุระดับการปกปิดหรือความทึบของผลิตภัณฑ์เมื่อใช้
    lip_plate_material:
      name: วัสดุส่วนวางปากของฟลูต
      description: ระบุวัสดุที่ใช้ทำแผ่นปากฟลุต เช่น เงินหรือไม้
    lipstick_coverage:
      name: การปกปิดของลิปสติก
      description: อธิบายระดับความทึบของสีที่ได้จากลิปสติก (เช่น บางเบา ปานกลาง เต็ม)
    lipstick_effect:
      name: เอฟเฟกต์ลิปสติก
      description: อธิบายถึงผลลัพธ์ของการทาลิปสติก เช่น ช่วยให้ริมฝีปากเรียบเนียน
        ช่วยให้ริมฝีปากอวบอิ่ม
    liqueur_variety:
      name: ลักษณะเหล้า
      description: แยกประเภทลิเคียวร์ตามโปรไฟล์รสชาติหลัก เช่น รสถั่ว รสครีม
    livestock_food_ingredients:
      name: ส่วนผสมอาหารปศุสัตว์
      description: ระบุส่วนผสมหลักในอาหารสัตว์ เช่น ข้าวบาร์เลย์หรือกากถั่วเหลือง
    lnb_output:
      name: เอาท์พุท LNB
      description: ระบุจำนวนการเชื่อมต่อเครื่องรับสัญญาณดาวเทียม เช่น การเชื่อมต่อแบบเดี่ยวหรือแบบ
        Quad
    lnb_technology:
      name: เทคโนโลยี LNB
      description: จำแนกประเภทของเทคโนโลยีใน LNB ดาวเทียม เช่น แบบสากลหรือแบบสัญญาณรบกวนต่ำ
    load_capacity:
      name: กำลังรับน้ำหนัก
      description: ระบุขีดจำกัดน้ำหนักที่ผลิตภัณฑ์สามารถรองรับได้ เช่น งานเบาหรืองานหนัก
    loading_ramp_type:
      name: ประเภทสะพานลาดขึ้นสินค้า
      description: ระบุรูปแบบของทางลาดบรรทุกของยานพาหนะ เช่น พับเดี่ยวหรือพับสามทบ
    loading_type:
      name: ประเภทการโหลด
      description: ระบุวิธีการใส่เครื่องซักผ้า เช่น ฝาหน้าหรือฝาบน
    lock_placement:
      name: การวางตำแหน่งกุญแจ
      description: ระบุตำแหน่งล็อคบนชิ้นส่วนเครื่องยนต์ของเรือ เช่น ด้านนอกหรือด้านใน
    lock_type:
      name: ประเภทล็อค
      description: ระบุกลไกการล็อคที่สินค้านี้ใช้ เช่น กุญแจหรือรหัส
    locking_mechanism:
      name: กลไกการล็อค
      description: ระบุประเภทของล็อคที่ใช้ โดยทั่วไปใช้สำหรับผลิตภัณฑ์ด้านความปลอดภัย
        เช่น ปิดอัตโนมัติ สไลด์
    logic_family:
      name: ตระกูลลอจิก
      description: ระบุตระกูลลอจิกเซมิคอนดักเตอร์หรือเทคโนโลยีของ IC
    lovibond:
      name: โลวิบอนด์
      description: ระบุความเข้มของสีของเมล็ดการกลั่นเบียร์และมอลต์ เช่น สว่างหรือเข้ม
    lubricant_application:
      name: การใช้น้ำมันหล่อลื่น
      description: ระบุพื้นที่การใช้งานที่เหมาะสมสำหรับเจลหล่อลื่น เช่น การนวดหรือช่องคลอด
    lubricant_composition:
      name: องค์ประกอบของน้ำมันหล่อลื่น
      description: ระบุส่วนผสมพื้นฐานของเจลหล่อลื่น เช่น สูตรน้ำหรือซิลิโคน
    lubricant_dispenser_type:
      name: ประเภทเครื่องจ่ายสารหล่อลื่น
      description: ระบุประเภทบรรจุภัณฑ์หรือภาชนะบรรจุสำหรับสารหล่อลื่น เช่น ถังหรือขวด
    lubricant_effect:
      name: ผลของสารหล่อลื่น
      description: ระบุผลการทำงานหรือสไตล์ใด ๆ ที่ให้โดยการหล่อลื่นของถุงยางอนามัย
    lubricant_form:
      name: รูปแบบน้ำมันหล่อลื่น
      description: อธิบายความสม่ำเสมอของสารหล่อลื่น เช่น เจลหรือเพสต์
    luggage/bag_closure:
      name: ที่ปิดกระเป๋าเดินทาง/กระเป๋า
      description: ระบุประเภทของตัวปิดที่ใช้กับกระเป๋าเดินทางหรือกระเป๋า เช่น ซิปหรือตัวล็อค
    lumber/wood_type:
      name: ประเภทท่อนไม้
      description: ระบุประเภทเฉพาะของไม้หรือไม้แปรรูปที่ใช้ในผลิตภัณฑ์ เช่น ไม้โอ๊คหรือไม้สน
    lyre/flip_folder_attachment_type:
      name: ประเภทที่หนีบ/แฟ้มโน้ตดนตรี
      description: ระบุประเภทของไฟล์แนบสำหรับพิณดนตรีและแฟ้มพลิก เช่น สายรัดหรือที่หนีบพิณ
    m_2_drive_length_supported:
      name: ความยาวไดรฟ์ M.2 ที่รองรับ
      description: ระบุว่าตู้หรืออะแดปเตอร์สามารถรองรับการ์ด M.2 ความยาวใดได้บ้าง
    magnet_type:
      name: ประเภทแม่เหล็ก
      description: ระบุประเภทของแม่เหล็กที่ใช้ในผลิตภัณฑ์ เช่น เซรามิก ไทเทเนียม
    magnification:
      name: กำลังขยาย
      description: ระบุกำลังขยายของผลิตภัณฑ์ เช่น 1x หรือ 100x
    magsafe_compatibility:
      name: ความเข้ากันได้กับ MagSafe
      description: ระบุว่าอุปกรณ์เสริมรองรับการติดแม่เหล็ก MagSafe ของ Apple หรือระบบนิเวศการชาร์จหรือไม่
    makeup_brush_application:
      name: การใช้งานแปรงแต่งหน้า
      description: ระบุการใช้เครื่องสำอางหลักหรือพื้นที่ที่แปรงออกได้รับการออกแบบมาโดยเฉพาะ
        (เช่น รองพื้น อายแชโดว์ คอนทัวร์)
    makeup_features:
      name: คุณลักษณะของเครื่องสำอาง
      description: เน้นคุณลักษณะสำคัญของเครื่องสำอาง เช่น เม็ดสีเข้มข้นหรือปราศจากน้ำหอม
    makeup_shade:
      name: เฉดสีแต่งหน้า
      description: อธิบายเฉดสีของเครื่องสำอาง เช่น สีชมพูปานกลางหรือสีน้ำตาลเข้ม
    mallet_material:
      name: วัสดุที่ใช้ทำมัลเลท
      description: ระบุประเภทของวัสดุที่ใช้ในค้อนตอก เช่น ทองเหลืองหรือยาง
    management_type:
      name: ประเภทการจัดการ
      description: อธิบายระดับการจัดการของอุปกรณ์ (เช่น จัดการเต็มรูปแบบ จัดการอัจฉริยะ
        ไม่มีการจัดการ) เพื่อให้ผู้ซื้อสามารถจับคู่ความสามารถของผลิตภัณฑ์กับข้อกำหนดของเครือข่ายได้
    mandibular_device_fitting_method:
      name: วิธีการติดตั้งอุปกรณ์ขากรรไกรล่าง
      description: อธิบายวิธีการติดตั้งหรือหล่ออุปกรณ์ให้เข้ากับฟันของผู้ใช้
    mandolin_back_shape:
      name: ทรงด้านหลังแมนโดลิน
      description: ระบุความโค้งและการออกแบบของส่วนหลังของแมนโดลิน เช่น หลังแบนหรือส่วนโค้งด้านบน
    manufacturer_type:
      name: ประเภทผู้ผลิต
      description: ระบุแหล่งที่มาของชิ้นส่วนหรืออุปกรณ์ตกแต่งรถยนต์ เช่น ของแท้หรือบุคคลที่สาม
    map_update_policy:
      name: นโยบายการอัปเดตแผนที่
      description: ระบุว่าการอัปเดตแผนที่ถูกจัดหาหรือกำหนดราคาสำหรับอุปกรณ์อย่างไร
    marine_navigator_features:
      name: คุณลักษณะนาวิเกเตอร์สำหรับเดินเรือ
      description: ระบุความสามารถของเครื่องมือนำทางทางทะเล เช่น หน้าจอสัมผัสหรือกันน้ำ
    marker_format:
      name: รูปแบบตัวทำเครื่องหมาย
      description: กำหนดรูปแบบทางกายภาพหรือการสร้างของตัวทำเครื่องหมาย
    marker_text_color:
      name: สีข้อความตัวทำเครื่องหมาย
      description: ระบุสีของตำนานหรือข้อความที่พิมพ์บนพื้นผิวตัวทำเครื่องหมาย (แตกต่างจากสีตัวเครื่องหมาย)
    marker_tip_design:
      name: การออกแบบปลายหัวปากกาเคมี
      description: อธิบายรูปร่างของปลายมาร์กเกอร์ เช่น กระสุนหรือสิ่ว
    marquee_substrate:
      name: วัสดุพื้นผิวป้าย
      description: ระบุสื่อทางกายภาพที่ใช้พิมพ์หรือนำเสนองานศิลปะ (เช่น ฟิล์มแทรนสไลต์
        อะคริลิกพิมพ์ย้อนกลับ สติกเกอร์ไวนิล)
    mascara_brush_shape:
      name: รูปทรงแปรงมาสคาร่า
      description: ระบุรูปทรงหรือการออกแบบของแท่งหรือแปรงไพรเมอร์ในตัว ซึ่งมีอิทธิพลอย่างมากต่อการใช้และผลลัพธ์
    mascara_effect:
      name: มาสคาร่าเอฟเฟ็กต์
      description: อธิบายผลลัพธ์หรือคุณลักษณะที่กำหนดไว้ของมาสคาร่า เช่น เพิ่มความโค้งงอน
        เพิ่มความยาว
    mascara_formulation:
      name: สูตรมาสคาร่า
      description: ระบุองค์ประกอบพื้นฐานหรือเทคโนโลยีพิเศษของผลิตภัณฑ์ (เช่น ของเหลว
        ผสมไฟเบอร์ แบบหลอด) ที่ส่งผลต่อพื้นผิว การสวมใส่ และการล้างออก
    mask_cushion_material:
      name: วัสดุคัชชันหน้ากาก
      description: รายละเอียดวัสดุเฉพาะที่ใช้สำหรับคัชชันหรือซีลของมาสก์
    mask_size:
      name: ขนาดมาสก์
      description: ระบุขนาดที่กำหนดโดยผู้ผลิต
    mask_type:
      name: ประเภทหน้ากาก
      description: ระบุการออกแบบหน้ากาก โดยทั่วไปสำหรับการดูแลระบบทางเดินหายใจ เช่น
        ช่องปาก จมูก
    masonry_material:
      name: วัสดุที่ใช้ทำผนัง
      description: ระบุองค์ประกอบของวัสดุก่ออิฐ เช่น ซีเมนต์หรือหินปูน
    masonry_product_form:
      name: รูปแบบผลิตภัณฑ์งานก่อ
      description: ระบุรูปแบบของผลิตภัณฑ์ก่ออิฐ เช่น ปูนหรือผง
    massage_area:
      name: บริเวณที่นวด
      description: ระบุส่วนของร่างกายที่ผลิตภัณฑ์ออกแบบมาเพื่อการนวดโดยเฉพาะ เช่น
        เท้าหรือคอ
    massage_mechanism_dimensionality:
      name: มิติกลไกการนวด
      description: ระบุจำนวนแกนการเคลื่อนไหวที่ลูกกลิ้งนวดทำงาน (เช่น 2D, 3D, 4D,
        5D)
    massage_stone_texture:
      name: เนื้อสัมผัสของหินนวด
      description: อธิบายความรู้สึกพื้นผิวของหินนวด เช่น เรียบหรือหยาบ
    massage_technique:
      name: เทคนิคการนวด
      description: ระบุวิธีการนวดที่นำเสนอโดยผลิตภัณฑ์ เช่น การนวดด้วยการตี การนวดเนื้อเยื่อส่วนลึก
    mat/rug_shape:
      name: รูปทรงเสื่อ/พรม
      description: อธิบายลักษณะของเสื่อหรือพรม เช่น ทรงกลมหรือสี่เหลี่ยม
    mat_base_material:
      name: วัสดุพื้นฐานของเสื่อ
      description: ระบุประเภทของวัสดุที่ใช้ทำฐานเสื่อ กล่าวคือ ไม้คอร์ก เมมโมรีโฟม
    mat_features:
      name: คุณลักษณะของเสื่อ
      description: อธิบายลักษณะเฉพาะของเสื่อบ้านหรือสำนักงาน เช่น ฐานกันลื่นหรือกันน้ำ
    material:
      name: วัสดุ
      description: ระบุวัสดุหลักของสินค้า เช่น ผ้าฝ้ายหรือขนสัตว์
    material_firmness:
      name: ความแน่นของวัสดุ
      description: อธิบายความแข็งหรือความอ่อนของผลิตภัณฑ์ เช่น แข็ง ยืดหยุ่น
    material_hardness:
      name: ความแข็งของวัสดุ
      description: ระบุความแน่นของผลิตภัณฑ์ โดยทั่วไปสำหรับอุปกรณ์กีฬาหรือฟิตเนส เช่น
        นุ่มเป็นพิเศษ มีความทนทานสูง
    material_origin:
      name: แหล่งที่มาของวัสดุ
      description: ระบุรูปแบบหรือสถานะของวัสดุมีค่าที่มีให้ (เช่น แบบหลวม/ยังไม่ได้ประกอบ
        เครื่องประดับสำเร็จรูป บัตรของขวัญแบบพิมพ์/ดิจิทัล)
    material_treatment:
      name: การบำรุงรักษาวัสดุ
      description: ระบุการบำรุงรักษาทางเคมีหรือทางกายภาพที่ใช้กับวัสดุเพื่อการเก็บรักษาหรือความปลอดภัย
        (เช่น การอบด้วยความร้อน การรมควัน การบำบัดด้วยสารเคมี)
    maternity_clothing_features:
      name: คุณลักษณะเสื้อผ้าสตรีมีครรภ์
      description: อธิบายคุณลักษณะเฉพาะของชุดคลุมท้อง เช่น พื้นที่สำหรับการเติบโตของหน้าท้อง
        ถ้วยรองรับ
    maternity_sleepwear_style:
      name: สไตล์ชุดนอนสตรีมีครรภ์
      description: ระบุสไตล์ของชุดนอนสตรีมีครรภ์ เช่น ชุดหมีหรือเสื้อนอน
    mattress_features:
      name: คุณลักษณะของที่นอน
      description: เน้นคุณลักษณะพิเศษของที่นอน เช่น ฟังก์ชั่นป้องกันภูมิแพ้หรือความเย็น
    maximum_bit_depth:
      name: ความลึกบิตสูงสุด
      description: กำหนดความยาวคำดิจิทัลสูงสุด (ในหน่วยบิต) ที่ตัวแปลงรองรับ ซึ่งส่งผลต่อช่วงไดนามิกและความละเอียด
    maximum_magnification:
      name: กำลังขยายสูงสุด
      description: ระบุปัจจัยการขยายสูงสุดที่กล้องจุลทรรศน์สามารถทำได้ เช่น 10x หรือ
        100x
    maximum_reel_diameter_supported:
      name: เส้นผ่านศูนย์กลางรีลสูงสุดที่รองรับ
      description: ระบุเส้นผ่านศูนย์กลางรีลที่ใหญ่ที่สุดที่เด็คสามารถรองรับได้
    measured_parameters:
      name: พารามิเตอร์ที่วัดได้
      description: แสดงรายการตัวชี้วัดทางไฟฟ้าหรือแบตเตอรี่ที่อุปกรณ์สามารถวัดหรือแสดงได้
    measuring_method:
      name: วิธีการวัด
      description: ระบุเทคนิคที่ใช้ในการวัดปริมาณไขมันในร่างกาย เช่น ออปติคัล คาลิเปอร์
    measuring_tool_features:
      name: คุณลักษณะของเครื่องมือวัด
      description: อธิบายลักษณะพิเศษของเครื่องมือวัด เช่น กล้องในตัวหรือแบบพกพา
    measuring_type:
      name: ประเภทการวัด
      description: ระบุวิธีการวัดสำหรับอุปกรณ์ด้านสุขภาพ เช่น หน้าผาก นิ้ว
    meat_cut:
      name: การตัดเนื้อสัตว์
      description: ช่วยระบุชิ้นเนื้อหรือลักษณะเฉพาะของเนื้อ เช่น เบอร์เกอร์ ปีก
    meat_type:
      name: ประเภทเนื้อสัตว์
      description: ระบุแหล่งที่มาของเนื้อสัตว์ เช่น เนื้อทำจากพืช เนื้อไก่
    media_access:
      name: การเข้าถึงสื่อ
      description: ระบุวิธีที่ลูกค้าสามารถเข้าถึงสื่อ เช่น การสมัครสมาชิกดิจิทัล สิ่งพิมพ์
        และออนไลน์
    media_content_type:
      name: ประเภทเนื้อหาสื่อ
      description: ระบุประเภทหรือหมวดหมู่ของเนื้อหาสื่อ เช่น เรียลลิตีทีวีหรือสแตนด์อัพคอมเมดี้
    media_format:
      name: รูปแบบสื่อ
      description: ระบุรูปแบบสื่อที่เข้ากันได้สำหรับอุปกรณ์ เช่น แผ่นเสียงหรือ VHS
    media_physical_size:
      name: ขนาดทางกายภาพของสื่อ
      description: ระบุขนาดทางกายภาพหรือรูปแบบมาตรฐานของสื่อเปล่า
    media_player_form_factor:
      name: รูปแบบของเครื่องเล่นสื่อ
      description: อธิบายสไตล์ทางกายภาพของอุปกรณ์ ช่วยให้ผู้ซื้อเลือกระหว่างสติ๊กขนาดกะทัดรัดและกล่องรับสัญญาณขนาดใหญ่
    media_section:
      name: ส่วนสื่อ
      description: ระบุหมวดหมู่เฉพาะของหนังสือพิมพ์หรือนิตยสาร เช่น กีฬาหรือการเมือง
    media_theme:
      name: ธีมสื่อ
      description: จัดหมวดหมู่เนื้อหาสื่อตามจุดเน้นหลัก เช่น การเดินทางหรือการเล่นเกม
    medical_alarm_features:
      name: คุณลักษณะของระบบสัญญาณเตือนทางการแพทย์
      description: อธิบายความสามารถของระบบสัญญาณเตือนภัยทางการแพทย์ เช่น อายุการใช้งานแบตเตอรี่ที่ยาวนานหรือการสื่อสารสองทาง
    medical_device_certification:
      name: การรับรองอุปกรณ์ทางการแพทย์
      description: แสดงรายการการอนุมัติด้านกฎระเบียบหรือมาตรฐานที่เครื่องตรวจสอบไบโอเมตริกปฏิบัติตาม
        (เช่น CE, FDA 510(k))
    medical_identification_type:
      name: ประเภทการระบุข้อมูลสุขภาพ
      description: ระบุรูปแบบของบัตรประจำตัวทางการแพทย์ เช่น สร้อยข้อมือหรือสร้อยคอ
    medical_symbol:
      name: สัญลักษณ์ทางการแพทย์
      description: ระบุสัญลักษณ์ที่แสดงบนเครื่องประดับหรือแท็ก ช่วยให้ผู้ตอบสนองเหตุฉุกเฉินจดจำได้อย่างรวดเร็ว
    medical_syringe_purpose:
      name: วัตถุประสงค์ของเข็มฉีดยาทางการแพทย์
      description: ระบุจุดประสงค์ในการใช้เข็มฉีดยาทางการแพทย์ เช่น การฉีดหรือการชลประทาน
    medical_tape_material:
      name: วัสดุที่ใช้ทำเทปกาวทางการแพทย์
      description: ระบุองค์ประกอบของเทปทางการแพทย์ เช่น พลาสติกหรือลาเท็กซ์
    medicine/drug_form:
      name: รูปแบบยา
      description: ระบุรูปแบบทางกายภาพของยาหรือยา เช่น ยาเม็ดหรือของเหลว
    medicine/supplement_form:
      name: รูปแบบยา/อาหารเสริม
      description: ระบุรูปแบบทางกายภาพของยาหรืออาหารเสริม เช่น แคปซูลหรือของเหลว
    medium:
      name: สื่อ
      description: ระบุประเภทของของสะสม เช่น ของที่ระลึกหรือบัตรสะสม
    melodica_style:
      name: สไตล์ของเมโลดิกา
      description: ระบุสไตล์เค้าโครงของเครื่องดนตรีเมโลดิกา เช่น สไตล์เปียโนหรือสไตล์คีย์บอร์ด
    memory_channels:
      name: ช่องหน่วยความจำ
      description: ระบุความสามารถในการส่งข้อมูลของโปรเซสเซอร์คอมพิวเตอร์ เช่น Dual
        หรือ Quad
    memory_form_factor:
      name: ฟอร์มแฟคเตอร์หน่วยความจำ
      description: ระบุเค้าโครงทางกายภาพของโมดูลหน่วยความจำ เช่น DIMM หรือ micro-DIMM
    memory_rank:
      name: อันดับหน่วยความจำ
      description: ระบุการจัดวางอันดับของโมดูล (วิธีการจัดระเบียบชิป) ซึ่งส่งผลต่อความเข้ากันได้และการปรับประสิทธิภาพ
    memory_storage_type:
      name: ประเภทการจัดเก็บหน่วยความจำ
      description: ระบุประเภทของหน่วยความจำที่ใช้ในกล้อง เช่น การ์ด Micro SD หรือหน่วยความจำภายใน
    memory_technology:
      name: เทคโนโลยีหน่วยความจำ
      description: ระบุประเภทของหน่วยความจำที่ใช้ในอุปกรณ์อิเล็กทรอนิกส์ เช่น DDR
        หรือ SDRAM
    menstrual_cup_shape:
      name: รูปร่างของถ้วยอนามัย
      description: อธิบายรูปทรงของถ้วยรองประจำเดือน เช่น รูปกระดิ่ง รูปตัววี
    menstrual_cup_size:
      name: ขนาดถ้วยอนามัย
      description: ระบุหมวดหมู่ขนาดที่ติดฉลากโดยผู้ผลิต (เช่น เล็ก ขนาด 1)
    menstrual_cup_stem_type:
      name: ประเภทก้านถ้วยอนามัย
      description: ระบุการออกแบบของก้านหรือที่จับสำหรับถอดถ้วย
    mesh_networking_technology:
      name: เทคโนโลยีเครือข่ายแบบเมช
      description: ระบุว่าจุดเชื่อมต่อรองรับความสามารถแบบเมชหรือไม่และมาตรฐานหรือโปรโตคอลที่ใช้
    mesh_type:
      name: ประเภทตาข่าย
      description: ระบุรูปแบบหรือโครงสร้างของผ้าตาข่าย โดยระบุถึงการใช้งานหรือคุณลักษณะที่ต้องการ
        เช่น เหมาะกับกีฬา ปัดขน
    metal_detector_features:
      name: คุณลักษณะของเครื่องตรวจจับโลหะ
      description: เน้นคุณลักษณะเฉพาะของเครื่องตรวจจับโลหะ เช่น ซองหนัง กันน้ำ
    metal_molding_application:
      name: การใช้งานคิ้วโลหะ
      description: ระบุจุดประสงค์การใช้งานแม่พิมพ์หล่อโลหะ เช่น เครื่องประดับหรือตุ๊กตา
    meter_type:
      name: ประเภทมิเตอร์
      description: ระบุประเภทของมิเตอร์ที่ใช้ในระบบเชื้อเพลิงของเรือ เช่น ดิจิทัลหรือแอนะล็อก
    metrics_supported:
      name: รองรับเมตริก
      description: ระบุประเภทของการตรวจวัดไบโอเมตริกซ์ที่ผลิตภัณฑ์มีให้ เช่น มวลกระดูก
        มวลกล้ามเนื้อ
    micrometer_type:
      name: ประเภทของครมิเตอร์
      description: ระบุการใช้งานเฉพาะหรือการออกแบบของไมโครมิเตอร์ เช่น ใบมีดหรือรูเจาะ
    microphone_design:
      name: การออกแบบไมโครโฟน
      description: กำหนดหมวดหมู่การออกแบบสำหรับไมโครโฟน เช่น คอนเดนเซอร์ ไดนามิก
    microphone_preamp_form_factor:
      name: รูปแบบของปรีแอมป์ไมโครโฟน
      description: ระบุสไตล์ทางกายภาพหรือรูปแบบตัวเรือนของปรีแอมป์ไมโครโฟนสำหรับการติดตั้งหรือใช้งาน
    microphone_thread:
      name: เธรดไมโครโฟน
      description: ระบุขนาดเกลียวสำหรับไมโครโฟน เช่น 1/4"-20, M6
    microphone_type:
      name: ประเภทไมโครโฟน
      description: ระบุเทคโนโลยีไมโครโฟนที่ใช้ เช่น คอนเดนเซอร์หรือไดนามิก
    microphone_windshield_type:
      name: ประเภทที่กันลมไมโครโฟน
      description: ระบุสไตล์การสร้างของที่กันลม (เช่น โฟมแบบสวม, ขนสัตว์แบบ deadcat,
        blimp, ตะกร้า) เพื่อให้ผู้ใช้สามารถเลือกวิธีแก้ปัญหาเสียงรบกวนจากลมที่เหมาะสมได้อย่างรวดเร็ว
    microscope_features:
      name: คุณลักษณะของกล้องจุลทรรศน์
      description: เน้นลักษณะเฉพาะของกล้องจุลทรรศน์ เช่น การพกพาหรือฟังก์ชันหน่วยความจำ
    microscope_slide_material:
      name: วัสดุที่ใช้ทำกระจกสไลด์
      description: ระบุประเภทของวัสดุที่ใช้ในสไลด์กล้องจุลทรรศน์ เช่น แก้วหรือพลาสติก
    midi_connectivity:
      name: การเชื่อมต่อ MIDI
      description: ระบุประเภทของการเชื่อมต่อ MIDI บนเครื่องดนตรี เช่น MIDI in หรือ
        USB midi
    mimo_technology:
      name: เทคโนโลยี MIMO
      description: ระบุเทคโนโลยีไร้สายแบบ Multiple-Input Multiple-Output ที่เราเตอร์รองรับ
    mineral_class:
      name: คลาสแร่ธาตุ
      description: ระบุหมวดหมู่เฉพาะของแร่ธาตุ เช่น ออกไซด์หรือซิลิเกต
    mineral_compound_form:
      name: รูปแบบสารประกอบแร่ธาตุ
      description: ระบุรูปแบบทางเคมีหรือคีเลตของแร่ธาตุ (เช่น ซิเตรต ไกลซิเนต) ซึ่งมีผลต่อการดูดซึม
    minimum_magnification:
      name: กำลังขยายขั้นต่ำ
      description: ระบุระดับกำลังขยายต่ำสุดของเลนส์กล้องจุลทรรศน์ เช่น 1x หรือ 0.5x
    mirror_handle_design:
      name: การออกแบบด้ามกระจกส่องฟัน
      description: อธิบายลักษณะของด้ามจับบนกระจกทันตกรรม เช่น ปลายคู่หรือปลายเดี่ยว
    mirror_sides:
      name: ด้านกระจก
      description: ระบุจำนวนหรือการกำหนดค่าของพื้นผิวสะท้อนแสงที่กระจกมี (เช่น ด้านเดียว
        สองด้าน พับสาม)
    mist_application_area:
      name: พื้นที่ใช้มิสต์
      description: ระบุพื้นที่ที่ตั้งใจไว้สำหรับการใช้มิสต์ (เช่น ร่างกาย ผม ห้อง
        ผ้าลินิน)
    mixer_type:
      name: ประเภทมิกเซอร์
      description: จำแนกประเภทมิกเซอร์ DJ ตามการออกแบบ เช่น ดิจิทัลหรือสแครช
    mobile_mounting_type:
      name: ประเภทการติดตั้งแบบเคลื่อนที่
      description: ระบุตำแหน่งที่สามารถติดมือถือสำหรับเด็กได้ เช่น เปล รถเข็นเด็ก
    mobile_movement:
      name: การเคลื่อนไหวแบบเคลื่อนที่
      description: อธิบายกลไกของโมบายล์เด็กอ่อน เช่น ใช้พลังงานแบตเตอรี่หรือไขลาน
    mobile_phone_accessories_included:
      name: อุปกรณ์เสริมโทรศัพท์มือถือที่รวมอยู่
      description: ระบุรายการสิ่งของเสริมที่มาในชุดอุปกรณ์เสริมโทรศัพท์มือถือเพื่อให้ผู้ซื้อทราบว่ามีส่วนประกอบอะไรบ้าง
    mobile_phone_case_features:
      name: คุณลักษณะของเคสโทรศัพท์มือถือ
      description: อธิบายลักษณะเฉพาะของเคสโทรศัพท์มือถือ เช่น กันกระแทกหรือกระชับพอดี
    mobile_phone_connector_type:
      name: ประเภทขั้วต่อโทรศัพท์มือถือ
      description: ระบุมาตรฐานอินเทอร์เฟซของโมดูลพอร์ตการชาร์จหรือข้อมูลทดแทน
    mobile_phone_form_factor:
      name: ปัจจัยรูปแบบโทรศัพท์มือถือ
      description: รูปแบบการออกแบบทางกายภาพของตัวเครื่อง
    mobility/accessibility_equipment_features:
      name: คุณลักษณะของอุปกรณ์ช่วยการเข้าถึงพิเศษ/การเคลื่อนไหว
      description: อธิบายลักษณะเฉพาะของเครื่องช่วยการเข้าถึง เช่น อายุการใช้งานแบตเตอรี่ที่ยาวนาน
        หรือการหยุดฉุกเฉิน
    mobility_scooter_type:
      name: ประเภทสกูตเตอร์ไฟฟ้า
      description: แยกความแตกต่างระหว่างสกูตเตอร์ไฟฟ้าประเภทต่างๆ เช่น แบบพกพา แบบ
        3 ล้อ
    mobility_type:
      name: ประเภทการเคลื่อนย้าย
      description: ระบุสไตล์ฐานที่ส่งผลต่อการเคลื่อนย้าย แยกความแตกต่างระหว่างขาตั้งแบบติดตั้ง,
        ล้อเลื่อน หรือตัวเลือกที่เปลี่ยนได้
    model_control_technology:
      name: เทคโนโลยีการควบคุมโมเดล
      description: ระบุประเภทของระบบควบคุมสำหรับรถไฟจำลอง เช่น ไร้สายหรือดิจิทัล
    model_gender_representation:
      name: การแสดงเพศของโมเดล
      description: ระบุว่าโมเดลมนุษย์แสดงกายวิภาคชาย หญิง หรือยูนิเซ็กซ์
    model_train_accessory_type:
      name: ประเภทอุปกรณ์เสริมรถไฟจำลอง
      description: จัดหมวดหมู่อุปกรณ์เสริมของรถไฟจำลอง เช่น แสงหรือวัสดุฉาก
    model_train_theme:
      name: ธีมโมเดลรถไฟ
      description: ระบุสถานที่หรือยุคสมัยของชุดรถไฟจำลอง เช่น สมัยใหม่หรือไซไฟ
    modem_form_factor:
      name: รูปแบบโมเด็ม
      description: อธิบายสไตล์การออกแบบทางกายภาพของโมเด็ม (เช่น ดองเกิล USB หน่วยตั้งโต๊ะ
        โมดูล M.2)
    modem_technology:
      name: เทคโนโลยีโมเด็ม
      description: ระบุสื่อการส่งผ่านหลักหรือเทคโนโลยีเครือข่ายที่โมเด็มใช้ในการเข้าถึงเครือข่ายผู้ให้บริการ
        (เช่น Cable/DOCSIS, DSL, เซลลูลาร์)
    modulation_method:
      name: วิธีการมอดูเลต
      description: ระบุเทคนิคที่ใช้ปรับเปลี่ยนสัญญาณในอุปกรณ์อิเล็กทรอนิกส์ เช่น AM
        หรือ PCM
    moisturizer_type:
      name: ประเภทมอยเจอร์ไรเซอร์
      description: ระบุระยะเวลาการใช้มอยเจอร์ไรเซอร์ เช่น แบบดูแลตลอดวันหรือดูแลช่วงกลางคืน
    mold/cut_shape:
      name: รูปร่างแบบที่หล่อออกมา/ส่วนตัด
      description: อธิบายรูปร่างหรือการออกแบบของแม่พิมพ์หรือการตัดงานฝีมือ เช่น รูปดาวหรือรูปสัตว์
    mold_shape:
      name: รูปร่างแม่พิมพ์
      description: อธิบายรูปร่างหรือรูปแบบของแม่พิมพ์งานฝีมือ เช่น ทรงกลมหรือตัวอักษร
    molding_application:
      name: การใช้งานคิ้วบนผนังหรือมุมตึก
      description: ระบุประเภทของการขึ้นรูปที่ใช้ในการก่อสร้าง เช่น โครงหรือราวเก้าอี้
    molding_shape:
      name: รูปร่างคิ้วบนผนังหรือมุมตึก
      description: อธิบายรูปร่างหรือรูปแบบของแบบหล่อคอนกรีต เช่น บล็อกหรือเสา
    monitor/screen_specialized_features:
      name: คุณลักษณะพิเศษของจอภาพ
      description: ระบุรายละเอียดคุณลักษณะเฉพาะของหน้าจอ เช่น ลำโพงในตัวหรือเหมาะสำหรับการเล่นเกม
    monitor_mounting_type:
      name: ประเภทการติดตั้งจอภาพ
      description: ระบุวิธีการติดตั้งเครื่องตรวจสอบความปลอดภัย เช่น ผนังหรือแบบตั้งพื้น
    monitor_shape:
      name: รูปร่างจอภาพ
      description: ระบุรูปร่างของหน้าจอมอนิเตอร์ เช่น แบนหรือโค้ง
    monitor_specialized_features:
      name: คุณลักษณะพิเศษของจอภาพ
      description: เน้นคุณลักษณะเฉพาะของจอคอมพิวเตอร์ เช่น การรองรับ 3D หรือมุมมองที่ปรับได้
    monitor_type:
      name: ประเภทจอภาพ
      description: ระบุประเภทของจอภาพบนกล้อง เช่น หน้าจอสัมผัส HDR
    monitoring_method:
      name: วิธีการตรวจสอบ
      description: ระบุเทคนิคทางสรีรวิทยาที่อุปกรณ์ใช้เพื่อรับค่ากลูโคส
    monitoring_service_type:
      name: ประเภทบริการตรวจสอบ
      description: ระบุว่าระบบได้รับการตรวจสอบโดยมืออาชีพตลอด 24 ชั่วโมงทุกวัน (24/7),
        ตรวจสอบด้วยตนเอง, หรือไม่ได้รับการตรวจสอบ
    monocular_design:
      name: การออกแบบกล้องส่องทางไกลแบบตาเดียว
      description: ระบุการทำงานของตาข้างเดียว เช่น การซูมหรือการมองเห็นตอนกลางคืน
    motherboard_chipset_family:
      name: ตระกูลชิปเซ็ตเมนบอร์ด
      description: ระบุประเภทของชิปเซ็ตในเมนบอร์ด เช่น Intel หรือ NVIDIA
    motherboard_form_factor:
      name: ฟอร์มแฟกเตอร์ของเมนบอร์ด
      description: ระบุขนาดทางกายภาพและมาตรฐานของเมนบอร์ด เช่น ATX, Mini-ITX
    motherboard_memory_features:
      name: คุณลักษณะของหน่วยความจำเมนบอร์ด
      description: อธิบายคุณลักษณะหน่วยความจำของมาเธอร์บอร์ด เช่น ECC หรือไม่มีบัฟเฟอร์
    motion:
      name: การเคลื่อนไหว
      description: ระบุประเภทการเคลื่อนไหวของอุปกรณ์สำหรับทารก เช่น การโยกหรือการแกว่ง
    motion_sensor_type:
      name: ประเภทเซนเซอร์การเคลื่อนไหว
      description: ระบุเทคโนโลยีที่ใช้ในเซ็นเซอร์ตรวจจับความเคลื่อนไหว เช่น อินฟราเรดหรือเลเซอร์
    motor_starting_method:
      name: วิธีการสตาร์ทมอเตอร์
      description: ระบุวิธีการที่ใช้ในการสตาร์ทมอเตอร์ เช่น DOL หรือหม้อแปลงไฟฟ้าอัตโนมัติ
    motor_type:
      name: ประเภทมอเตอร์
      description: ระบุว่าเครื่องเจาะใช้มอเตอร์แบบมีแปรงหรือไร้แปรง ซึ่งส่งผลต่อเสียงรบกวน
        อายุการใช้งาน และราคา
    motor_vehicle_placement:
      name: การจัดวางยานยนต์
      description: ระบุตำแหน่งบนยานพาหนะที่ชิ้นส่วนได้รับการออกแบบให้พอดี เช่น ด้านหน้าหรือด้านหลัง
    motor_vehicle_type:
      name: ประเภทยานยนต์
      description: ระบุหมวดหมู่ของยานยนต์ เช่น รถยนต์หรือ SUV
    motorcycle/scooter_type:
      name: ประเภทรถจักรยานยนต์/สกูตเตอร์
      description: จำแนกประเภทรถจักรยานยนต์หรือสกู๊ตเตอร์ เช่น รถออฟโรดหรือรถมอเตอร์ไซค์ขนาดเล็ก
    motorcycle_drive_type:
      name: ประเภทการขับเคลื่อนของรถจักรยานยนต์
      description: ระบุกลไกการส่งกำลังของรถจักรยานยนต์ เช่น เพลาหรือโซ่
    motorcycle_glove_purpose:
      name: วัตถุประสงค์ของถุงมือมอเตอร์ไซค์
      description: ระบุจุดประสงค์ในการใช้ถุงมือมอเตอร์ไซค์ เช่น ออฟโรดหรือทัวร์ริ่ง
    motorcycle_tire_type:
      name: ประเภทยางรถจักรยานยนต์
      description: จำแนกประเภทยางรถจักรยานยนต์ตามการใช้งาน เช่น ยางรถแข่งหรือสกู๊ตเตอร์
    mount/stand_features:
      name: คุณลักษณะของอุปกรณ์ยึด/ขาตั้ง
      description: ให้รายละเอียดลักษณะเฉพาะของส่วนยึดหรือขาตั้งของผลิตภัณฑ์ เช่น มุมที่ปรับได้หรือแบบพับได้
    mount_installation_point:
      name: จุดติดตั้งขาตั้ง
      description: ระบุว่าขาตั้งติดตั้งอยู่ที่ใดบนยานพาหนะหรืออุปกรณ์
    mount_interface_system:
      name: ระบบอินเทอร์เฟซการติดตั้ง
      description: ระบุแพลตฟอร์มการเชื่อมต่อที่เป็นกรรมสิทธิ์หรือมาตรฐานอุตสาหกรรม
        ที่รวมอยู่ในขาตั้ง (เช่น รูปแบบ RAM AMPS, Quad Lock)
    mount_material:
      name: วัสดุที่ใช้ทำตัวยึด
      description: ระบุองค์ประกอบของส่วนยึดของผลิตภัณฑ์ เช่น สแตนเลสหรือพลาสติก
    mounting_hardware:
      name: ฮาร์ดแวร์สำหรับติดตั้ง
      description: ระบุประเภทของฮาร์ดแวร์ที่ใช้ในการติดตั้งหรือยึดผลิตภัณฑ์ เช่น สกรูหรือถ้วยดูด
    mounting_interface_pattern:
      name: รูปแบบอินเทอร์เฟซการติดตั้ง
      description: ระบุอินเทอร์เฟซเชิงกลหรือรูปแบบรูที่ใช้เชื่อมต่อตัวยึดกับแท่นวางวิทยุ
        ขายึด หรือระบบบอล
    mounting_interface_standard:
      name: มาตรฐานอินเทอร์เฟซการติดตั้ง
      description: ระบุรูปแบบการติดตั้งหรืออินเทอร์เฟซที่ที่วางหรือขาตั้งรองรับ (เช่น
        AMPS, VESA 75, RAM B ball)
    mounting_mechanism:
      name: กลไกการติดตั้ง
      description: กำหนดวิธีการติดโทรศัพท์หรือกล้องเข้ากับแท่งหรือตัวยึด
    mounting_style:
      name: รูปแบบการติดตั้ง
      description: ระบุวิธีการยึดปุ่มกดกับแผงควบคุม ซึ่งส่งผลต่อวิธีการติดตั้งและความเข้ากันได้กับความหนาของแผง
    mounting_technology:
      name: เทคโนโลยีการติดตั้ง
      description: ระบุว่า IC ออกแบบมาสำหรับการประกอบแบบ through-hole หรือ surface-mount
    mounting_thread_size:
      name: ขนาดเกลียวยึด
      description: ระบุขนาดเกลียวขาตั้งกล้องหรืออุปกรณ์เสริมมาตรฐานที่มีบนผลิตภัณฑ์
        (เช่น 1/4"-20)
    mounting_type:
      name: ประเภทการขับขี่
      description: ระบุวิธีการติดตั้งหรือประกอบสินค้า เช่น แบบหนีบหรือแบบยางดูด
    mouse/trackball_features:
      name: คุณลักษณะของเมาส์/แทร็กบอล
      description: อธิบายลักษณะพิเศษของเมาส์/แทร็กบอล เช่น การออกแบบตามหลักสรีรศาสตร์หรือน้ำหนักที่ปรับได้
    mouse_pad_features:
      name: คุณลักษณะของแผ่นรองเมาส์
      description: อธิบายลักษณะเฉพาะของแผ่นรองเมาส์ เช่น แสงหรือการเย็บขอบ
    mouse_port_type:
      name: ประเภทพอร์ตเมาส์
      description: ระบุประเภทการเชื่อมต่อสำหรับเมาส์คอมพิวเตอร์ เช่น UBS, ไร้สาย,
        บลูทูธ
    mouse_technology:
      name: เทคโนโลยีเมาส์
      description: ระบุการทำงานหรือการออกแบบของเมาส์คอมพิวเตอร์ เช่น ไร้สายหรือเล่นเกม
    mouthgard_design:
      name: การออกแบบฟันยางกันกระแทก
      description: ระบุการออกแบบฟันยางสำหรับเล่นกีฬา เช่น แบบเดี่ยวหรือแบบคู่
    mouthpiece:
      name: หน้ากาก
      description: ระบุประเภทของกระบอกเสียงสำหรับเครื่องดนตรี เช่น A หรือเบส
    moving/shipping_box_material:
      name: วัสดุที่ใช้ทำกล่องสำหรับย้ายและขนส่ง
      description: ระบุวัสดุที่ใช้ในการเคลื่อนย้ายหรือกล่องขนส่ง เช่น กระดาษแข็งหรือพลาสติก
    mp3_player_accessories_included:
      name: รวมอุปกรณ์สำหรับเครื่องเล่น MP3
      description: ระบุอุปกรณ์เสริมเพิ่มเติมที่มาพร้อมกับเครื่องเล่น MP3 เช่น เคสหรือที่ชาร์จในรถยนต์
    mpaa_rating:
      name: เรตติ้ง Mpaa
      description: ระบุการจัดเรตของสมาคมภาพยนตร์แห่งอเมริกา (MPAA) สำหรับสื่อ เช่น
        G หรือ PG-13
    multi_gpu_technology:
      name: เทคโนโลยีมัลติ GPU
      description: 'ระบุความสามารถของเมนบอร์ดในการรองรับ GPU หลายตัว เช่น ไม่รองรับ
        CrossFireX '
    multiplexer_technology:
      name: เทคโนโลยีมัลติเพล็กเซอร์
      description: ระบุสัญญาณหรือเทคโนโลยีความยาวคลื่นพื้นฐานที่มัลติเพล็กเซอร์ใช้
        (เช่น CWDM, DWDM)
    muscle_stimulator_design:
      name: การออกแบบเครื่องกระตุ้นกล้ามเนื้อด้วยไฟฟ้า
