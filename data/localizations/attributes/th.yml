    opening_direction:
      name: ทิศทางการเปิด
      description: ระบุทิศทางที่ผลิตภัณฑ์เปิด โดยทั่วไปจะเป็นประตู เช่น แบบเปิดทางเดียว
    opening_mechanism:
      name: กลไกการเปิด
      description: ระบุวิธีการเปิดผลิตภัณฑ์ โดยทั่วไปจะเป็นประตูสำหรับเด็กทารกหรือสัตว์เลี้ยง
        เช่น คันโยก แป้นเหยียบ
    operating_mode:
      name: โหมดการทำงาน
      description: ระบุวิธีการปฏิบัติงาน โดยทั่วไปใช้กับอุปกรณ์ทางการแพทย์ เช่น กึ่งอัตโนมัติ
    operating_system:
      name: ระบบการทำงาน
      description: ระบุซอฟต์แวร์ระบบที่อุปกรณ์ใช้ เช่น iOS หรือ ChromeOS
    operating_system_compatibility:
      name: ความเข้ากันได้ของระบบปฏิบัติการ
      description: ระบุระบบปฏิบัติการที่ชัตเตอร์ระยะไกลรองรับตั้งแต่แกะกล่อง
    operation_mechanism:
      name: กลไกการทำงาน
      description: อธิบายว่าเครื่องมือใช้แรงดึงและตัดเคเบิลไทอย่างไร (เช่น แบบแมนนวล,
        นิวเมติก, อัตโนมัติ)
    operation_method:
      name: วิธีการทำงาน
      description: ระบุวิธีการทำงานของผลิตภัณฑ์ โดยทั่วไปใช้สำหรับอุปกรณ์เปิดปิดประตูโรงรถ
        เช่น สายพานขับ ไฮดรอลิก
    optical_disc_recordability:
      name: ความสามารถในการบันทึกแผ่นออปติคัล
      description: กำหนดว่าแผ่นออปติคัลเป็นแบบเขียนครั้งเดียวหรือเขียนซ้ำได้ และเป็นแบบชั้นเดียวหรือสองชั้น
    optical_drive_form_factor:
      name: รูปแบบไดรฟ์ออปติคัล
      description: กำหนดขนาดทางกายภาพและรูปแบบการติดตั้งของไดรฟ์
    optical_drive_loading_mechanism:
      name: กลไกการโหลดไดรฟ์ออปติคัล
      description: ระบุวิธีการใส่แผ่นดิสก์เข้าไปในไดรฟ์ (เช่น โหลดแบบถาด, โหลดแบบช่อง,
        โหลดแบบด้านบน)
    optical_drive_type:
      name: ประเภทออปติคัลไดรฟ์
      description: ระบุรูปแบบสื่อที่ออปติคอลไดรฟ์ของอุปกรณ์สามารถอ่านและเขียนได้ เช่น
        CD-ROM, DVD-ROM
    optical_frame_design:
      name: ออกแบบกรอบแว่นสายตา
      description: ระบุว่าแว่นตามีกรอบหรือไม่ เช่น ไม่มีขอบ หรือเต็มกรอบ
    optical_zoom:
      name: ออปติคัลซูม
      description: ระบุความสามารถในการซูมของกล้อง เช่น ไม่ซูม มากกว่า 30 เท่า
    oral_care_function:
      name: ฟังก์ชันการดูแลช่องปาก
      description: เน้นย้ำถึงประโยชน์หลักด้านทันตกรรมหรือสุขภาพช่องปากที่ผลิตภัณฑ์แก้ไข
        (เช่น ฟอกขาว บรรเทาอาการเสียวฟัน สุขภาพเหงือก)
    oral_care_items_included:
      name: สินค้าดูแลช่องปากที่รวมอยู่
      description: แสดงรายการประเภทของผลิตภัณฑ์ดูแลช่องปากที่รวมอยู่ในชุด
    organizer_type:
      name: ประเภทออแกไนเซอร์
      description: ระบุหมวดหมู่การจัดเก็บยานพาหนะ เช่น ที่วางแก้วหรือกล่องเก็บของ
    orientation:
      name: ปฐมนิเทศ
      description: ระบุตำแหน่งที่กำหนดไว้ของผลิตภัณฑ์ เช่น แนวนอน แนวตั้ง
    orthotic_coverage_length:
      name: ความยาวการปกคลุมของออร์โธติก
      description: กำหนดว่าที่รองรับอุ้งเท้าปกคลุมพื้นเท้ามากเพียงใด (เช่น เต็มความยาว
        3/4 ความยาว ถ้วยส้น)
    outdoor_equipment_features:
      name: คุณลักษณะอุปกรณ์กลางแจ้ง
      description: ระบุลักษณะเฉพาะของอุปกรณ์กลางแจ้ง เช่น ทนทานต่อสภาพอากาศหรือพกพาได้
    outdoor_furniture_items_included:
      name: รวมเฟอร์นิเจอร์กลางแจ้ง
      description: ระบุรายการผลิตภัณฑ์ที่รวมอยู่ในชุดเฟอร์นิเจอร์กลางแจ้ง เช่น เก้าอี้หรือโต๊ะ
    outdoor_power_accessories_included:
      name: อุปกรณ์เสริมสำหรับไฟฟ้ากลางแจ้งที่รวมอยู่
      description: ระบุสิ่งของเพิ่มเติมที่มาพร้อมกับเครื่องมือไฟฟ้ากลางแจ้ง เช่น เลื่อยไฟฟ้า
        ที่อุดหู
    outdoor_walking_activity:
      name: กิจกรรมการเดินกลางแจ้ง
      description: จำแนกประเภทสินค้าตามจุดประสงค์ของการเดินกลางแจ้ง เช่น การเดินป่า
        การวิ่งเทรล
    outerwear_clothing_features:
      name: คุณลักษณะเสื้อผ้าชั้นนอก
      description: ระบุลักษณะพิเศษของเสื้อผ้าตัวนอก เช่น หุ้มฉนวนหรือกันน้ำ
    outlet_type:
      name: ประเภทเต้าเสียบ
      description: ระบุประเภทปลั๊กสำหรับอุปกรณ์อิเล็กทรอนิกส์ เช่น Type A, Type L
    output_connection:
      name: การเชื่อมต่อเอาท์พุต
      description: ระบุประเภทการเชื่อมต่อเอาท์พุตสำหรับสายสัญญาณเสียง เช่น 3.5 มม.
        หรือ RCA
    output_connection_type:
      name: ประเภทการเชื่อมต่อขาออก
      description: ระบุขั้วต่อหรือมาตรฐานอินเทอร์เฟซที่มีบนด้านเอาต์พุตของตัวแปลงนี้
    output_level:
      name: ระดับเอาท์พุท
      description: อธิบายระดับเอาต์พุตของอุปกรณ์เครื่องดนตรี เช่น ต่ำหรือสูง
    output_signal_interface:
      name: อินเทอร์เฟซสัญญาณขาออก
      description: ระบุประเภทของการเชื่อมต่อขาออกที่มีในตัวแปลงนี้
    output_video_interface:
      name: อินเทอร์เฟซวิดีโอขาออก
      description: ระบุประเภทของขั้วต่อวิดีโอที่ตัวแปลงสแกนนี้มีให้ในขาออก
    output_waveform:
      name: รูปคลื่นเอาท์พุต
      description: ระบุประเภทของสัญญาณที่วงจรกำเนิดความถี่แบบอิเล็กทรอนิกส์สร้างขึ้น
        เช่น รูปแบบฟันเลื่อยหรือไซน์
    oven_accessories_included:
      name: อุปกรณ์เสริมสำหรับเตาอบที่รวมอยู่
      description: ให้รายละเอียดเกี่ยวกับส่วนประกอบเพิ่มเติมของเตาอบ เช่น ถาดปิ้งย่างหรือตะแกรง
    overclock_profile_support:
      name: การรองรับโปรไฟล์โอเวอร์คล็อก
      description: ระบุโปรไฟล์โอเวอร์คล็อกมาตรฐานที่เก็บในโมดูล (เช่น Intel XMP, AMD
        EXPO)
    oxygen_cylinder_outlet_standard:
      name: มาตรฐานช่องทางออกของถังออกซิเจน
      description: ระบุมาตรฐานการเชื่อมต่อช่องทางออก CGA ของวาล์วถัง
    oxygen_tank_valve_type:
      name: ประเภทวาล์วถังออกซิเจน
      description: ระบุวาล์วที่ใช้ในถังออกซิเจน เช่น แบบสลับ โพสต์วาล์ว
    pa_rating:
      name: ระดับ PA
      description: ระบุระดับการป้องกัน UVA ของครีมกันแดด (เช่น PA+, PA+++, PA++++)
        ตามวิธี Persistent Pigment Darkening (PPD)
    pacifier/teether_design:
      name: การออกแบบจุกนมหลอก/ยางกัด
      description: อธิบายการออกแบบจุกนมปลอมและยางกัดสำหรับทารก เช่น รูปทรงวงแหวน แบบเสริมพัฒนาการ
    package_type:
      name: ประเภทบรรจุภัณฑ์
      description: ระบุประเภทของบรรจุภัณฑ์สำหรับผลิตภัณฑ์ เช่น โหลแก้ว ปั๊ม
    packing_materials_included:
      name: วัสดุสำหรับการบรรจุหีบห่อที่รวมอยู่
      description: ระบุประเภทของวัสดุบรรจุภัณฑ์ที่มีให้ เช่น หมอนลมหรือพลาสติกกันกระแทก
    pad_display_profile:
      name: โปรไฟล์จอแสดงผลแพด
      description: อธิบายการแสดงสีของแผ่นจับภาพลายเซ็น เช่น ขาวดำหรือสี
    pad_thickness:
      name: ความหนาของผ้าอนามัย
      description: จำแนกโปรไฟล์ความหนาโดยรวมของผ้าอนามัย (เช่น บางพิเศษ แม็กซี่)
    pad_type:
      name: ประเภทเบาะ
      description: ระบุประเภทแผ่นรองของผลิตภัณฑ์ เช่น ซักด้วยเครื่องได้ หรือเปลี่ยนได้
    pad_wing_style:
      name: รูปแบบปีกผ้าอนามัย
      description: ระบุว่าผ้าอนามัยมีปีกด้านข้างสำหรับการยึดติดและป้องกันการรั่วหรือไม่
    paddle/oar_material:
      name: วัสดุไม้พาย/ไม้กรรเชียง
      description: ระบุวัสดุที่ใช้ทำพายหรือไม้พาย เช่น อะลูมิเนียมหรือไม้
    paddle_equipment_included:
      name: รวมอุปกรณ์พายเรือ
      description: ระบุอุปกรณ์เสริมในชุดไม้พาย เช่น เสาหรือลูกพาย
    paddleboard_features:
      name: คุณลักษณะของแพดเดิลบอร์ด
      description: อธิบายลักษณะเฉพาะของแพดเดิลบอร์ด เช่น แพดเดิลบอร์ดแบบเป่าลมหรือหลังคาแข็ง
    page_layout:
      name: เลย์เอาต์หน้า
      description: ระบุเค้าโครงของหน้า โดยทั่วไปจะอยู่ในสมุดที่อยู่ เช่น ว่างเปล่า
        แบบแท็บ
    page_size:
      name: ขนาดหน้า
      description: ระบุขนาดของผลิตภัณฑ์ เช่น 11" x 17" หรือ A4
    pager_application:
      name: การใช้งานเพจเจอร์
      description: ระบุรูปแบบการใช้งานหลักหรือสภาพแวดล้อมที่กำหนดไว้สำหรับเพจเจอร์นี้
    pain_reduction_technology:
      name: เทคโนโลยีลดความเจ็บปวด
      description: ระบุคุณสมบัติเพื่อความสบายใดๆ ที่ช่วยลดความรู้สึกไม่สบายระหว่างการกำจัดขน
        (เช่น ระบบทำความเย็น ลูกกลิ้งนวด)
    paint/dye_form:
      name: รูปแบบการทาสี/ย้อม
      description: อธิบายความสม่ำเสมอหรือประเภทของสีหรือสีย้อม เช่น เจลหรือสเปรย์
    paint_brush_design:
      name: การออกแบบแปรงทาสี
      description: อธิบายรูปร่างหรือลักษณะของแปรงทาสี เช่น กลมหรือแบน
    paint_finish:
      name: การเคลือบสี
      description: ระบุประเภทของการเคลือบสี โดยทั่วไปใช้กับรถยนต์ เช่น โลหะ เงา
    paint_form:
      name: รูปแบบการทาสี
      description: ระบุรูปแบบของสีสำหรับงานฝีมือ เช่น เจลหรือผง
    paint_medium_type:
      name: ประเภทตัวผสมสี
      description: ระบุชนิดของสื่อสีในรายการงานฝีมือ เช่น น้ำยาเคลือบเงาหรือสีน้ำ
    paint_type:
      name: ประเภทสี
      description: ระบุความหลากหลายของสีในงานศิลปะและงานฝีมือ เช่น เคลือบฟันหรือสีน้ำ
    paintball/airsoft_equipment_included:
      name: รวมอุปกรณ์เพนท์บอล/ปืนแอร์ซอฟต์
      description: ระบุอุปกรณ์เพนท์บอลหรือปืนอัดลมที่รวมอยู่ เช่น แว่นตาป้องกันหรือเสื้อกั๊กยุทธวิธี
    paintball_equipment_included:
      name: รวมอุปกรณ์เพนท์บอล
      description: ระบุรายการเพิ่มเติมที่มาพร้อมกับผลิตภัณฑ์เพนท์บอล เช่น แบตเตอรี่หรือเครื่องชาร์จ
    painting_canvas_material:
      name: วัสดุที่ใช้ทำผ้าใบวาดภาพ
      description: ระบุประเภทของวัสดุที่ใช้ในผืนผ้าใบวาดภาพ เช่น ผ้าฝ้ายหรือผ้าลินิน
    painting_medium:
      name: สื่อในงานจิตรกรรม
      description: ระบุถึงวัสดุหรือเทคนิคหลักที่ใช้ในงานจิตรกรรม เช่น สีอะครีลิค สีน้ำมัน
    pairing_method:
      name: วิธีการจับคู่
      description: 'ระบุวิธีที่ผลิตภัณฑ์เชื่อมต่อหรือเชื่อมโยงกับอุปกรณ์อื่นๆ เช่น
        บลูทูธ, Wi-Fi '
    palette_design:
      name: การออกแบบจานสี
      description: อธิบายเค้าโครงหรือสไตล์ของจานสีของศิลปิน เช่น แบบพับได้หรือรูนิ้วหัวแม่มือ
    palette_knife_shape:
      name: รูปร่างเกรียงผสมสี
      description: อธิบายรูปทรงของมีดจานสีที่ใช้ในงานศิลปะและงานฝีมือ เช่น มีดตรงหรือมีดกลม
    panel_specification:
      name: ข้อมูลจำเพาะแผง
      description: ระบุประเภทของแผงแพทช์สำหรับการจัดการสายเคเบิล เช่น ไฟเบอร์ออปติก
        หรือ Cat6
    panel_termination:
      name: การสิ้นสุดแผง
      description: ระบุวิธีการเข้าหัวสายเคเบิลสำหรับแผงแพทช์ เช่น RJ-45 หรือ 110 Punch
        Down
    panel_transparency:
      name: ความโปร่งใสของแผง
      description: อธิบายว่าเต็นท์มีแผงใสหรือหน้าต่างบนหลังคาหรือด้านข้างเพื่อให้แสงเข้าขณะอาบแดดหรือไม่
    pants_length_type:
      name: ประเภทความยาวของกางเกง
      description: ใช้เพื่อระบุความยาวของกางเกง เช่น ขาเต่อหรือขายาว
    panty_liner_style:
      name: รูปแบบผ้าอนามัยแบบบาง
      description: กำหนดรูปทรงหรือสไตล์ของผ้าอนามัยแบบบาง (เช่น ทรงตรง, โค้ง, ยาว)
    pantyhose_style:
      name: รูปแบบถุงน่อง
      description: อธิบายการออกแบบหรือการใช้งานของถุงน่อง เช่น แบบไม่มีเท้า แบบสำหรับหญิงตั้งครรภ์
    paper_finish:
      name: การตกแต่งผิวกระดาษ
      description: อธิบายพื้นผิวหรือความมันเงาของผลิตภัณฑ์กระดาษ เช่น ผ้าซาตินหรือด้าน
    paper_format:
      name: รูปแบบกระดาษ
      description: ระบุประเภทของรูปแบบกระดาษสำหรับงานศิลปะและงานฝีมือ เช่น บล็อกหรือแผ่นหลวม
    paper_size:
      name: ขนาดกระดาษ
      description: ระบุขนาดของผลิตภัณฑ์กระดาษ เช่น A4 หรือ Letter
    paper_texture:
      name: เนื้อกระดาษ
      description: อธิบายความรู้สึกและการตกแต่งของกระดาษอาร์ต เช่น เรียบหรือหยาบ
    paper_type:
      name: ประเภทกระดาษ
      description: ระบุรูปแบบของอุปกรณ์สำนักงานที่เป็นกระดาษ เช่น ตารางหรือฟลิปชาร์ต
    paperweight_design:
      name: การออกแบบที่ทับกระดาษ
      description: อธิบายความสวยงามหรือสไตล์ของที่ทับกระดาษ เช่น การตกแต่งหรือธรรมดา
    papier_mache_shape:
      name: รูปร่างของเปเปอร์มาเช่
      description: ระบุการออกแบบผลิตภัณฑ์เปเปอร์มาเช่ เช่น กล่องหรือตุ๊กตา
    parachuting_activity:
      name: กิจกรรมกระโดดร่ม
      description: ระบุการฝึกกระโดดร่มที่ผลิตภัณฑ์นี้ได้รับการออกแบบมาโดยเฉพาะ เช่น
        การดิ่งพสุธาหรือพาราไกลดิ้ง
    parallel_processing_technology_support:
      name: รองรับเทคโนโลยีการประมวลผลแบบขนาน
      description: ระบุความสามารถในการประมวลผลแบบขนานของเมนบอร์ด เช่น multi-GPU, Multi-core
    parking_camera_features:
      name: คุณลักษณะของกล้องถอยจอด
      description: อธิบายความสามารถของกล้องจอดรถ เช่น การรองรับ GPS หรือวิดีโอ HD
    parking_sign_design:
      name: การออกแบบป้ายที่จอดรถ
      description: ระบุวัตถุประสงค์ของป้ายจอดรถ เช่น โซนขนของ ที่จอดรถสงวน
    pass_duration:
      name: ระยะเวลาบัตรผ่าน
      description: ระบุระยะเวลาที่ใช้ได้หรืออายุการใช้งานของบัตรผ่านการเดินทางหรือตั๋ว
    passband:
      name: พาสแบนด์
      description: ระบุย่านความถี่ที่ตัวกรองอิเล็กทรอนิกส์อนุญาตให้ผ่านได้ เช่น High-pass
    pasta_shape_type:
      name: ประเภทรูปทรงของพาสต้า
      description: จำแนกประเภทผลิตภัณฑ์พาสต้าตามรูปร่าง เช่น สปาเก็ตตี้ ตอร์เตลลินี
    pasta_type:
      name: ประเภทพาสต้า
      description: จำแนกผลิตภัณฑ์พาสต้าตามรูปร่างหรือรูปแบบเฉพาะ เช่น มักกะโรนี เพนเน่
    patch_shape:
      name: รูปร่างของแผ่นแปะ
      description: อธิบายรูปร่างหรือดีไซน์ของแผ่นแปะ เช่น สัตว์หรือเรขาคณิต
    patella_opening_design:
      name: การออกแบบช่องเปิดสะบ้า
      description: ระบุว่าเฝือกมีบริเวณสะบ้าเปิดหรือปิดหรือวงแหวนคงที่
    pattern:
      name: ลวดลาย
      description: อธิบายการออกแบบหรือลวดลายของผลิตภัณฑ์ เช่น ลายดอกไม้หรือลายแถบ
    pattern_distribution_format:
      name: รูปแบบการกระจายลวดลาย
      description: ระบุวิธีการจัดส่งรูปแบบ เช่น PDF หรือบทช่วยสอนออนไลน์
    payment_mechanism_type:
      name: ประเภทกลไกการชำระเงิน
      description: ระบุวิธีที่ผู้เล่นเปิดใช้งานเครื่อง (เช่น หยอดเหรียญ รูดบัตร)
    pbx_system_type:
      name: ประเภทระบบ PBX
      description: กำหนดสถาปัตยกรรมโดยรวมของผลิตภัณฑ์ PBX
    pcb_surface_finish:
      name: การเคลือบพื้นผิว PCB
      description: ระบุสารเคลือบป้องกันที่ใช้กับแผ่นทองแดงที่เปิดอยู่
    pcb_type:
      name: ประเภท PCB
      description: ระบุประเภทของบอร์ดวงจรพิมพ์ (PCB) เช่น แบบแข็งหรือแบบยืดหยุ่น
    pcie_lane_configuration:
      name: การกำหนดค่าเลน PCIe
      description: ระบุความกว้างเลนทางกายภาพที่ไรเซอร์รองรับ (เช่น x1, x4, x8, x16)
        ซึ่งระบุขนาดสล็อตและแบนด์วิดท์ทางไฟฟ้า
    pedal_polarity:
      name: ขั้วแป้นเหยียบ
      description: ระบุวิธีการทำงานของกลไกการสลับแป้นเหยียบแป้นพิมพ์ในสถานะเริ่มต้นที่ไม่มีการกด
        เช่น NC (ปกติปิด)
    pegi_rating:
      name: เรตติ้ง PEGI
      description: ระบุการจัดระดับข้อมูลเกมของ Pan European (PEGI) สำหรับวิดีโอเกม
        เช่น 3, 12
    pen/felt_tip_design:
      name: การออกแบบส่วนปลายปากกา/ปากกาเมจิค
      description: อธิบายความหนาและสไตล์ของปลายปากกา เช่น หนาหรือละเอียด
    pen/pencil_features:
      name: คุณลักษณะของปากกา/ดินสอ
      description: ระบุคุณลักษณะพิเศษของเครื่องเขียน เช่น มียางลบหรือเติมได้
    pen_color:
      name: สีปากกา
      description: ระบุสีของหมึกปากกา เช่น แดง น้ำเงิน
    pen_features:
      name: คุณลักษณะของปากกา
      description: อธิบายลักษณะเฉพาะของปากกา เช่น หดได้หรือมีกลิ่นหอม
    pen_pattern:
      name: รูปแบบปากกา
      description: ระบุธีมภาพบนปากกา เช่น ลายพรางหรือลายตารางหมากรุก
    pen_tip_design:
      name: การออกแบบปลายหัวปากกา
      description: อธิบายลักษณะของปลายปากกา เช่น ขนาดกลางหรือละเอียด
    pen_type:
      name: ประเภทปากกา
      description: ระบุประเภทของปากกาหรือเครื่องเขียน เช่น เจลหรือน้ำพุ
    pencil_features:
      name: คุณลักษณะของดินสอ
      description: ระบุลักษณะเฉพาะของดินสอ เช่น ยางลบหรือแบบหดได้
    pencil_sharpener_design:
      name: การออกแบบเครื่องเหลาดินสอ
      description: ระบุลักษณะการออกแบบของกบเหลาดินสอ เช่น มีที่ใส่เศษกบเหลา แบบธรรมดา
    pencil_type:
      name: ประเภทดินสอ
      description: ระบุประเภทของดินสอ เช่น ดินสอกลหรือไม้
    percussion_stand_design:
      name: การออกแบบขาตั้งเครื่องเคาะจังหวะ
      description: อธิบายสไตล์ของขาตั้งเครื่องเพอร์คัชชัน เช่น ชั้นวางหรือที่ยึด
    percussion_tip_shape:
      name: รูปร่างปลายหัวเครื่องเคาะจังหวะ
      description: ระบุรูปร่างของไม้ตีกลองหรือปลายค้อน เช่น ลูกโอ๊กและลำกล้อง
    performance_metrics:
      name: เครื่องมือชี้วัดประสิทธิภาพ
      description: เน้นด้านประสิทธิภาพและประสิทธิผลที่สำคัญของซอฟต์แวร์ AI และการเรียนรู้ของเครื่อง
        เช่น เวลาการฝึกอบรมและความเร็วในการอนุมาน
    perfumery_instruments_included:
      name: อุปกรณ์ทำน้ำหอมรวมอยู่ด้วย
      description: ระบุอุปกรณ์ที่ให้มาในชุดทำน้ำหอม เช่น แถบกลิ่นหรือปิเปต
    peroxide_content:
      name: ปริมาณเปอร์ออกไซด์
      description: ระบุประเภทของเปอร์ออกไซด์ที่ใช้ในผลิตภัณฑ์ดูแลส่วนบุคคล เช่น คาร์บาไมด์หรือปราศจากเปอร์ออกไซด์
    personal_watercraft_type:
      name: ประเภทเรือส่วนตัว
      description: ระบุสไตล์การพายเรือส่วนตัว เช่น การยืนหรือนั่ง
    personalization_design:
      name: การออกแบบที่ปรับให้เหมาะกับแต่ละบุคคล
      description: อธิบายตัวเลือกการปรับแต่งสำหรับผลิตภัณฑ์ โดยทั่วไปจะเป็นกระดาษโน้ต
        เช่น ว่างเปล่า พิมพ์แล้ว
    personalization_options:
      name: ตัวเลือกส่วนบุคคล
      description: ระบุตัวเลือกการปรับแต่งที่พร้อมใช้งาน เช่น อักษรย่อหรือข้อความแบบกำหนดเอง
    pest_control_method:
      name: วิธีการควบคุมศัตรูพืช
      description: ระบุรูปแบบของสารกำจัดสัตว์รังควาน เช่น ผง เม็ดเล็ก
    pet_apparel/bedding_features:
      name: คุณลักษณะของเสื้อผ้า/เครื่องนอนสัตว์เลี้ยง
      description: เน้นคุณลักษณะเฉพาะของสินค้าสัตว์เลี้ยง เช่น เพื่อกระดูกและข้อ หรือเป็นมิตรกับสิ่งแวดล้อม
    pet_apparel_features:
      name: คุณลักษณะของเสื้อผ้าสัตว์เลี้ยง
      description: เน้นลักษณะพิเศษของเสื้อผ้าสัตว์เลี้ยง เช่น เป็นมิตรกับสิ่งแวดล้อม
        หรือกันน้ำได้
    pet_bedding_features:
      name: คุณลักษณะของเครื่องนอนสัตว์เลี้ยง
      description: อธิบายคุณลักษณะเฉพาะของที่นอนสัตว์เลี้ยง เช่น เพื่อกระดูกและข้อหรือกันน้ำ
    pet_control_accessory_features:
      name: คุณลักษณะอุปกรณ์ควบคุมสัตว์เลี้ยง
      description: อธิบายคุณลักษณะพิเศษของอุปกรณ์ควบคุมสัตว์เลี้ยง เช่น ปรับได้หรือเรืองแสงในที่มืด
    pet_dietary_preferences:
      name: การเลือกอาหารสัตว์เลี้ยง
      description: ระบุความต้องการหรือข้อจำกัดด้านอาหารของสัตว์เลี้ยง เช่น ปราศจากธัญพืชหรือไม่ใช่จีเอ็มโอ
    pet_dietary_requirements:
      name: ข้อกำหนดด้านอาหารสัตว์เลี้ยง
      description: ระบุคุณประโยชน์ทางโภชนาการที่ได้รับจากผลิตภัณฑ์สำหรับสัตว์เลี้ยง
        เช่น การควบคุมน้ำหนักหรือสุขภาพฟัน
    pet_food_flavor:
      name: รสชาติอาหารสัตว์เลี้ยง
      description: ระบุโปรไฟล์รสชาติของผลิตภัณฑ์อาหารสัตว์เลี้ยง เช่น กล้วย ไก่งวง
    pet_food_form:
      name: รูปแบบอาหารสัตว์เลี้ยง
      description: บ่งบอกถึงระดับความเหนียวข้นของผลิตภัณฑ์อาหารสัตว์เลี้ยง เช่น แบบเปียกหรือแบบแห้ง
    pet_food_supplements:
      name: อาหารเสริมสำหรับสัตว์เลี้ยง
      description: ระบุสารเติมแต่งในอาหารสัตว์เลี้ยงเพื่อประโยชน์ทางโภชนาการ เช่น
        น้ำมันปลาหรือโปรไบโอติก
    pet_hair_dryer_design:
      name: การออกแบบไดร์เป่าขนสัตว์เลี้ยง
      description: อธิบายลักษณะของเครื่องเป่าผมสำหรับสัตว์เลี้ยง เช่น แบบกรงหรือแบบมือถือ
    pet_hair_dryer_speed_settings:
      name: การตั้งค่าความเร็วเครื่องเป่าขนสัตว์เลี้ยง
      description: อธิบายการตั้งค่าความเร็วที่ปรับได้บนเครื่องเป่าผมสำหรับสัตว์เลี้ยง
        เช่น ปรับความเร็วได้ ความเร็วตายตัว
    pet_medical_collar_design:
      name: การออกแบบปลอกคอทางการแพทย์สำหรับสัตว์เลี้ยง
      description: อธิบายสไตล์ของปลอกคอทางการแพทย์สำหรับสัตว์เลี้ยง เช่น กรวยหรือแบบเป่าลม
    pet_medical_supply_type:
      name: ประเภทเวชภัณฑ์สำหรับสัตว์เลี้ยง
      description: ระบุประเภทของสิ่งของทางการแพทย์สำหรับสัตว์เลี้ยง เช่น ผ้าพันแผลแบบยืดหยุ่น
        ผ้าพันแผลแบบผ้ากอซ
    pet_monitor_items_included:
      name: รวมรายการเฝ้าติดตามสัตว์เลี้ยง
      description: ระบุส่วนประกอบที่มาพร้อมกับเครื่องวัดระดับน้ำตาลในเลือดของสัตว์เลี้ยง
        เช่น กล่องใส่หรือแถบทดสอบ
    pet_nail_tool_type:
      name: ประเภทอุปกรณ์ทำเล็บสัตว์เลี้ยง
      description: ระบุประเภทของเครื่องมือตัดแต่งเล็บของสัตว์เลี้ยง เช่น กรรไกรตัดเล็บแบบกิโยตินหรือเครื่องตะไบเล็บ
    pet_pad_features:
      name: คุณลักษณะของแผ่นรองซับปัสสาวะสัตว์เลี้ยง
      description: เน้นคุณลักษณะของแผ่นรองฝึกสัตว์เลี้ยง เช่น ไม่ก่อให้เกิดภูมิแพ้หรือทำความสะอาดง่าย
    pet_spray/solution_type:
      name: ชนิดสเปรย์/สารละลายสำหรับสัตว์เลี้ยง
      description: ระบุวัตถุประสงค์ของสเปรย์หรือสารละลายสำหรับสัตว์เลี้ยง เช่น เพื่อทำให้สงบหรือระงับกลิ่น
    pet_supply_product_form:
      name: รูปแบบผลิตภัณฑ์อุปกรณ์สัตว์เลี้ยง
      description: ระบุรูปแบบของผลิตภัณฑ์สำหรับสัตว์เลี้ยง เช่น ของเหลว เม็ด หรือสเปรย์
    pet_thermometer_design:
      name: การออกแบบเครื่องวัดอุณหภูมิสัตว์เลี้ยง
      description: อธิบายประเภทของเทอร์โมมิเตอร์สำหรับสัตว์เลี้ยง เช่น อนาล็อกหรือดิจิทัล
    pet_trainer_type:
      name: ประเภทเทรนเนอร์สัตว์เลี้ยง
      description: ระบุประเภทของอุปกรณ์ช่วยฝึกสัตว์เลี้ยง เช่น คลิกเกอร์แบบมาตรฐานหรือเครื่องจ่ายขนมอัตโนมัติ
    pet_treat_texture:
      name: เนื้อสัมผัสของอาหารสัตว์เลี้ยง
      description: ระบุลักษณะหรือความสม่ำเสมอของขนมสำหรับสัตว์เลี้ยง เช่น นุ่มหรือกรุบกรอบ
    pet_treat_type:
      name: ประเภทอาหารสัตว์เลี้ยง
      description: ระบุประเภทของขนมสำหรับสัตว์เลี้ยง เช่น แบบเหนียวนุ่มหรือแบบกรุบกรอบ
    ph_level:
      name: ระดับ pH
      description: ระบุความเป็นกรดหรือด่างของสาร โดยวัดในระดับ 0 ถึง 14 เช่น 6.5 (เป็นกรดเล็กน้อย)
        หรือ 7.0 (เป็นกลาง)
    phase_type:
      name: ประเภทเฟส
      description: ระบุประเภทเฟสของตัวควบคุมมอเตอร์ เช่น เฟสเดียวหรือสองเฟส
    phone_camera_position:
      name: ตำแหน่งกล้องโทรศัพท์
      description: ระบุตำแหน่งทางกายภาพหรือหน้าที่ของโมดูลกล้องภายในโทรศัพท์
    phone_card_delivery_format:
      name: รูปแบบการจัดส่งบัตรโทรศัพท์
      description: ระบุว่าเครดิตเติมเงินนั้นมาในรูปแบบบัตรขูดจริงหรือเป็นรหัส/บัตรกำนัลดิจิทัล
    phone_skin_coverage:
      name: ความครอบคลุมสกินโทรศัพท์
      description: ระบุว่าสกินหรือแรปได้รับการออกแบบมาเพื่อหุ้มส่วนใดของโทรศัพท์
    phone_strap_accessories_included:
      name: อุปกรณ์เสริมสายคล้องโทรศัพท์รวมอยู่ด้วย
      description: แสดงรายการส่วนประกอบพิเศษที่มาพร้อมชุดเครื่องรางหรือสายรัด เช่น
        แถบอะแดปเตอร์ เคสโทรศัพท์ กระเป๋า หรือสายคล้องข้อมือ
    photo_effects_type:
      name: ประเภทเอฟเฟกต์ภาพถ่าย
      description: ระบุประเภทของเอฟเฟ็กต์ภาพถ่ายที่กล้องสามารถสร้างได้ เช่น วินเทจ
        ซีเปีย
    photographic_chemical_form:
      name: รูปแบบสารเคมีด้านการถ่ายภาพ
      description: ระบุรูปแบบของสารเคมีในการถ่ายภาพ เช่น ผงหรือของเหลว
    photographic_paper_size:
      name: ขนาดกระดาษอัดรูป
      description: ระบุขนาดของกระดาษภาพถ่าย เช่น 4" x 6" หรือ A3
    photographic_paper_type:
      name: ประเภทกระดาษอัดรูป
      description: ระบุประเภทของกระดาษภาพถ่ายที่ใช้ เช่น ผ้าซาตินหรือโลหะ
    piano_additional_features:
      name: คุณลักษณะเพิ่มเติมของเปียโน
      description: เน้นฟังก์ชันพิเศษของเปียโน เช่น ลำโพงในตัวหรือเครื่องเมตรอนอม
    piano_pedals:
      name: คันเหยียบเปียโน
      description: ระบุประเภทของแป้นเหยียบบนเปียโน เช่น ซัสเทนหรือโซสเตนูโต
    piano_size:
      name: ขนาดเปียโน
      description: ระบุประเภทและขนาดของเปียโน เช่น เบบี้แกรนด์หรืออัปไรต์
    pick_design:
      name: การออกแบบปิ๊ก
      description: ระบุการออกแบบปิ๊กกีตาร์ เช่น ทรงหยดน้ำ Jazz III
    pickup_design:
      name: การออกแบบรถกระบะ
      description: ระบุการออกแบบพิกอัปในเครื่องสาย เช่น แบบถาวรหรือแบบชั่วคราว
    pickup_mounting_type:
      name: ประเภทการติดตั้งพิกอัป
      description: ระบุวิธีการติดตั้งปิ๊กอัพกีตาร์ เช่น แบบติดหรือแบบคลิปออน
    pickup_position:
      name: ตำแหน่งพิกอัป
      description: ระบุตำแหน่งของปิ๊กอัพบนกีตาร์ไฟฟ้า เช่น บริดจ์ คอ
    pickup_type:
      name: ประเภทพิกอัป
      description: ระบุสไตล์ของปิ๊กอัพกีตาร์ เช่น แม่เหล็กหรือแอคทีฟ
    pig_feed_stage:
      name: ระยะอาหารหมู
      description: ระบุช่วงชีวิตของสุกรที่ต้องการอาหาร เช่น ผู้เลี้ยงหรือผู้เลี้ยงสุกร
    pile_type:
      name: ประเภทเสาเข็ม
      description: ระบุพื้นผิวและรูปแบบของพรม พรมขนสัตว์และเสื่อ เช่น ขนนุ่ม เบอร์เบอร์
    pillbox_schedule:
      name: ตารางกล่องยา
      description: อธิบายระบบเวลาหรือรูปแบบการติดฉลากที่กล่องยาได้รับการออกแบบมาโดยเฉพาะ
        (เช่น รายวัน รายสัปดาห์ เช้า/เย็น)
    pillow_shape:
      name: รูปร่างของหมอน
      description: ระบุรูปแบบหรือรูปทรงของหมอนรองให้นม เช่น รูปตัว U
    pin_size:
      name: ขนาดพิน
      description: ระบุขนาดของหมุดนิรภัย เช่น 0 หรือ 00
    pin_tip_type:
      name: ประเภทปลายกิ๊บ
      description: อธิบายการออกแบบปลายของกิ๊บ ซึ่งมีผลต่อความสบาย ความปลอดภัย และการยึด
    pinata_design:
      name: การออกแบบปิญญาตา
      description: อธิบายรูปแบบภาพของปิญาตา เช่น รูปแบบดั้งเดิมหรือรูปสัตว์
    pinball_machine_edition:
      name: รุ่นเครื่องพินบอล
      description: ระบุระดับการผลิตหรือรุ่นนักสะสมเฉพาะของเครื่องพินบอล
    pinball_machine_format:
      name: รูปแบบเครื่องพินบอล
      description: ระบุรูปแบบทางกายภาพหรือดิจิทัลของผลิตภัณฑ์ (เช่น กลไก เสมือนจริง
        ตั้งโต๊ะ ชุดประกอบ)
    ping_pong_equipment_included:
      name: รวมอุปกรณ์ปิงปอง
      description: ระบุประเภทของอุปกรณ์ปิงปองที่รวมอยู่ในชุด เช่น ตาข่ายหรือไม้ตีปิงปอง
    ping_pong_robot_features:
      name: คุณลักษณะของหุ่นยนต์ตีปิงปอง
      description: อธิบายฟังก์ชันการทำงานของหุ่นยนต์ปิงปอง เช่น การจัดกลุ่มสว่านหรือการควบคุมระยะไกล
    pipe_clamp_design:
      name: การออกแบบแคลมป์ท่อ
      description: อธิบายการออกแบบแคลมป์รัดท่อ เช่น แบบ snap หรือ C-clamp
    pipe_shape:
      name: รูปทรงท่อ
      description: ระบุรูปแบบของไปป์สูบบุหรี่ เช่น Gourd, Billiard
    placement_supported:
      name: รองรับตำแหน่ง
      description: ระบุตำแหน่งที่สามารถติดตั้งหรือใช้งานผลิตภัณฑ์ เช่น ผนัง พื้น
    plan_service_type:
      name: ประเภทบริการวางแผน
      description: กำหนดว่าแผน SIM จะเป็นแบบข้อมูลเท่านั้นหรือรวมบริการเสียงและ/หรือ
        SMS
    plant_characteristics:
      name: ลักษณะของพืช
      description: ระบุลักษณะพิเศษของพืช เช่น มีดอก กินได้
    plant_class:
      name: คลาสพืช
      description: จำแนกพืชออกเป็นกลุ่มอนุกรมวิธานเฉพาะ เช่น พืชใบเลี้ยงเดี่ยว และอันดับผักกาด
    plant_material:
      name: วัสดุจากพืช
      description: ระบุว่าวัสดุจากพืชนั้นเป็นของสด เก็บรักษาไว้แบบพรีเซิร์ฟ หรือเป็นของประดิษฐ์
    plant_name:
      name: ชื่อพืช
      description: ระบุชื่อทางพฤกษศาสตร์หรือชื่อสามัญของพืช เช่น กุหลาบ ใบโหระพา หรือแตงกวา
    plant_stage:
      name: ระยะของพืช
      description: ระบุระยะเฉพาะของวงจรการเจริญเติบโตของพืชที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อรองรับ
        เช่น ต้นกล้า การเจริญเติบโต
    plant_support_material:
      name: วัสดุที่ใช้ทำอุปกรณ์พยุงต้นไม้
      description: ระบุวัสดุที่ใช้ในกรงพืชหรือส่วนรองรับ เช่น ดินเผาหรือหิน
    plate_type:
      name: ประเภทแผ่น
      description: ระบุประเภทของแผ่นวัสดุในอุปกรณ์จัดแต่งทรงผม เช่น ไทเทเนียม เซรามิก
    play_equipment_items_included:
      name: รวมอุปกรณ์เครื่องเล่นต่างๆ
      description: ระบุรายการผลิตภัณฑ์อื่นๆ ที่รวมอยู่ในเครื่องเล่น เช่น โมบายแขวนหรือกระจก
    play_slide_design:
      name: การออกแบบอุปกรณ์การเล่นสไลด์
      description: อธิบายการออกแบบเครื่องเล่นสไลเดอร์ เช่น แบบเกลียววนหรือแบบท่อ
    play_vehicle_propulsion:
      name: การขับเคลื่อนของยานพาหนะสำหรับสไลด์
      description: ระบุวิธีการขับเคลื่อนยานพาหนะของเล่น เช่น แบบใช้แรงเสียดทานหรือการควบคุมระยะไกล
    play_yard_design_features:
      name: คุณลักษณะของแบบสนามเด็กเล่น
      description: ระบุลักษณะพิเศษของคอกกั้นเด็ก เช่น ด้านข้างเป็นตาข่ายหรือแบบมีช่องกระเป๋า
    playback_disc_formats:
      name: รูปแบบการเล่นแผ่นดิสก์
      description: ระบุรูปแบบแผ่นดิสก์ที่เข้ากันได้กับเครื่องเล่น DVD หรือ Blu-Ray
        เช่น ซีดีเพลง, JPEG
    playback_speed_supported:
      name: ความเร็วการเล่นที่รองรับ
      description: ระบุความเร็วการหมุนแผ่นเสียงที่เครื่องเล่นแผ่นเสียงหรือเครื่องเล่นเรคคอร์ดสามารถทำงานได้
    player/recorder_specialized_features:
      name: คุณลักษณะพิเศษของเครื่องเล่น/เครื่องบันทึก
      description: เน้นคุณลักษณะของเครื่องเล่นวิดีโอหรือเครื่องบันทึก เช่น ขับเคลื่อนโดย
        AI หรือการควบคุมโดยผู้ปกครอง
    player_drive_type:
      name: ประเภทไดรฟ์เครื่องเล่น
      description: ระบุกลไกที่หมุนเครื่องเล่นแผ่นเสียง เช่น สายพานหรือลูกยางไอเดลอร์
    player_position:
      name: ตำแหน่งผู้เล่น
      description: ระบุตำแหน่งผู้เล่นที่กำหนดไว้สำหรับสินค้านี้ เช่น ผู้รักษาประตู
        กองกลาง
    player_specialized_features:
      name: คุณลักษณะพิเศษของเครื่องเล่น
      description: ระบุความสามารถเฉพาะตัวของเครื่องเล่นวิดีโอ เช่น การรองรับ 4K หรือ
        HDR
    playhouse_design:
      name: การออกแบบบ้านเด็กเล่น
      description: ระบุประเภทของโรงละคร เช่น บ้านต้นไม้ หรือโรงละครตั้งพื้น
    playset_features:
      name: คุณลักษณะของชุดของเล่น
      description: เน้นลักษณะพิเศษของชุดของเล่น เช่น รุ่นลิมิเต็ด กันน้ำ
    plug_type:
      name: ประเภทปลั๊ก
      description: ระบุความเข้ากันได้ในระดับภูมิภาคของปลั๊ก เช่น US, FR
    plug_type_input:
      name: ประเภทปลั๊ก (อินพุต)
      description: ระบุปลั๊กที่อะแดปเตอร์แปลงไฟหรือตัวแปลงไฟสามารถรองรับได้ โดยขึ้นอยู่กับรหัสประเทศหรือเขตพื้นที่
        เช่น US, EU
    plug_type_output:
      name: ประเภทปลั๊ก (เอาต์พุต)
      description: ระบุปลั๊กที่อะแดปเตอร์แปลงไฟหรือตัวแปลงไฟสามารถรองรับเป็นเอาต์พุตได้
        โดยขึ้นอยู่กับรหัสประเทศหรือเขตพื้นที่ เช่น US, EU
    plumbing_primer_application:
      name: การลงสีรองพื้นท่อประปา
      description: ระบุตำแหน่งที่สามารถใช้ไพรเมอร์ประปาได้ เช่น บนท่อหรือข้อต่อ
    plumbing_trap_design:
      name: การออกแบบท่อดักน้ำเสีย
      description: ระบุประเภทของกับดักท่อประปา เช่น ถังหรือขวด
    plunger_shape:
      name: รูปร่างลูกสูบ
      description: ระบุรูปทรงของหัวลูกสูบ เช่น ถ้วยหรือหีบเพลง
    plywood_grade:
      name: เกรดแผ่นไม้อัด
      description: ระบุการจำแนกประเภทของไม้อัดสำหรับวัสดุก่อสร้าง เช่น เกรด C หรือ
        D
    pneumatic_conveyor_operation:
      name: การทำงานของสายพานลำเลียงแบบนิวเมติก
      description: ระบุโหมดการทำงานของสายพานลำเลียงแบบนิวแมติก เช่น เฟสนิเวศหรือเฟสหนาแน่น
    poe_standard:
      name: มาตรฐาน PoE
      description: ระบุโปรโตคอล Power over Ethernet (PoE) ที่ผลิตภัณฑ์ยึดเกณฑ์ เช่น
        Passive, IEEE 802.3af
    point_design:
      name: การออกแบบจุด
      description: อธิบายลักษณะปลายของอุปกรณ์สำนักงาน เช่น หมุดหรือหมุด เช่น คม ทื่อ
    pointing_device:
      name: อุปกรณ์ชี้ตำแหน่ง
      description: ระบุอุปกรณ์ที่ใช้สำหรับการนำทางบนหน้าจอคอมพิวเตอร์ เช่น ปุ่มเมาส์
        ทัชแพด
    polar_pattern:
      name: รูปแบบขั้ว
      description: ระบุทิศทางการรับเสียงของไมโครโฟน เช่น รอบทิศทางหรือคาร์ดิออยด์
    polarity_configuration:
      name: การกำหนดค่าขั้ว
      description: อธิบายการจัดเรียงขั้วภายในที่เกี่ยวข้องกับ LED, โมดูลแสดงผล และอุปกรณ์ที่คล้ายกัน
    polarization:
      name: โพลาไรซ์
      description: ระบุทิศทางคลื่นของเสาอากาศ เช่น แนวตั้ง วงกลม
    pole/post_material:
      name: วัสดุที่ใช้ทำเสา
      description: ระบุวัสดุที่ใช้สร้างร่มกันแดดหรือเสาร่ม เช่น ไฟเบอร์กลาสหรือเหล็กกล้า
    pole_color:
      name: สีของเสา
      description: ระบุสีของเสาในผลิตภัณฑ์ เช่น ร่ม เช่น สีดำ บรอนซ์
    pole_material:
      name: วัสดุสำหรับเสา
      description: ระบุวัสดุที่ใช้ในโครงสร้างของก้าน เช่น เหล็ก ไม้
    pole_pattern:
      name: รูปแบบเสา
      description: อธิบายการออกแบบหรือลวดลายบนเสาร่ม เช่น ลายดอกไม้หรือเรขาคณิต
    policy_sign_design:
      name: การออกแบบป้ายนโยบาย
      description: อธิบายข้อความเฉพาะที่แสดงบนป้ายนโยบาย เช่น ห้ามสูบบุหรี่ ห้ามโทรศัพท์มือถือ
    polish_dry_form:
      name: รูปแบบการทำให้ยาขัดเงาแห้ง
      description: ระบุสูตรผลิตภัณฑ์ทาเล็บแห้ง เช่น ตัวทำละลาย ซิลิโคน
    polish_remover_form:
      name: รูปแบบของน้ำยาล้างเล็บ
      description: ระบุประเภทของผลิตภัณฑ์น้ำยาล้างเล็บ เช่น แบบน้ำ แผ่นฟอยล์สำหรับห่อ
    polish_remover_formulation:
      name: สูตรน้ำยาล้างยาทาเล็บ
      description: ระบุองค์ประกอบทางเคมีของน้ำยาล้าง โดยเฉพาะปริมาณอะซีโตนหรือฐานทางเลือก
    polish_type:
      name: ประเภทน้ำยาทาเล็บ
      description: ระบุประเภทของยาขัดเงาเฉพาะที่ใช้สำหรับการดูแลทางน้ำ เช่น โลหะหรือไวนิล
    polyphony:
      name: การมีหลายเสียง
      description: ระบุความจุโน้ตพร้อมกันของซินธิไซเซอร์ เช่น โพลีโฟนิก มัลติทิมบราล
    portability:
      name: การพกพา
      description: ระบุความสะดวกในการเคลื่อนย้ายหรือถือผลิตภัณฑ์ โดยทั่วไปแล้วสำหรับเครื่องปั๊มนม
        เช่น ขนาดพกพา ขนาดกะทัดรัด
    post_material:
      name: วัสดุที่ใช้ทำเสา
      description: ระบุประเภทของวัสดุสำหรับเสาประเภทต่างๆ เช่น อลูมิเนียมหรือไฟเบอร์กลาส
    postage_stamp_features:
      name: คุณลักษณะของแสตมป์
      description: ระบุลักษณะพิเศษของแสตมป์ เช่น พิมพ์ทับหรือลายน้ำ
    postpartum_stage:
      name: ระยะหลังคลอด
      description: ระบุกรอบเวลาหลังคลอดที่ผ้าอนามัยออกแบบมาสำหรับ
    potential_extract:
      name: สารสกัดที่มีศักยภาพ
      description: บ่งชี้ระดับสารสกัดที่เป็นไปได้ในการกลั่นเมล็ดธัญพืชและมอลต์ เช่น
        ต่ำหรือสูง
    pottery/sculpting_project_type:
      name: ประเภทโครงการเครื่องปั้นดินเผา/การปั้นโมเดล
      description: ระบุประเภทเฉพาะของเครื่องปั้นดินเผาหรือโครงการแกะสลัก เช่น การสร้างแบบจำลองหรือการทำหน้ากาก
    potty/toilet_seat_design:
      name: การออกแบบฝารองนั่งชักโครก/โถส้วม
      description: ระบุรูปแบบหรือโครงสร้างของกระโถนเด็กหรือเบาะรองนั่งชักโครก เช่น
        แบบพับหรือแบบมาตรฐาน
    potty_training_kit_components:
      name: ส่วนประกอบชุดกระโถนฝึก
      description: ระบุสิ่งของที่รวมอยู่ในชุดกระโถนหัดนั่ง เช่น สติ๊กเกอร์ ม้านั่งบันได
    power_connector_type:
      name: ประเภทขั้วต่อพลังงาน
      description: ระบุขั้วต่อพลังงานเสริมที่จำเป็นหรือมีมาให้ในไรเซอร์หรืออะแดปเตอร์
    power_conversion_semiconductor_type:
      name: ประเภทสารกึ่งตัวนำการแปลงพลังงาน
      description: ระบุวัสดุสารกึ่งตัวนำหลักที่ใช้ในขั้นตอนพลังงานของเครื่องชาร์จ
        ซึ่งมีผลต่อขนาด ประสิทธิภาพ และการสร้างความร้อน
    power_source:
      name: แหล่งพลังงาน
      description: ระบุแหล่งพลังงานที่ผลิตภัณฑ์ใช้ในการทำงาน เช่น พลังงานแสงอาทิตย์หรือแบตเตอรี่
    power_supply_efficiency_rating:
      name: อันดับประสิทธิภาพแหล่งจ่ายไฟ
      description: ระบุระดับการรับรองประสิทธิภาพ 80 Plus ของ PSU ของเดสก์ท็อป
    power_supply_form_factor:
      name: รูปแบบแหล่งจ่ายไฟ
      description: ระบุขนาดทางกายภาพและมาตรฐานการติดตั้งของ PSU (เช่น ATX, SFX)
    power_supply_modularity:
      name: ความเป็นโมดูลของแหล่งจ่ายไฟ
      description: ระบุว่าสายเคเบิลของ PSU ถอดไม่ได้ ถอดได้บางส่วน หรือถอดได้ทั้งหมด
    pregnancy_test_sensitivity:
      name: ความไวของการตรวจสอบการตั้งครรภ์
      description: ระบุความสามารถของการทดสอบในการระบุการตั้งครรภ์ เช่น การตรวจพบในระยะเริ่มต้น
        การตรวจพบในระยะมาตรฐาน
    prescription_status:
      name: สถานะใบสั่งยา
      description: ระบุว่ายาหยอดหูสามารถซื้อได้โดยไม่ต้องใช้ใบสั่งแพทย์หรือต้องมีใบสั่งจากผู้เชี่ยวชาญด้านการดูแลสุขภาพ
    presentation_supply_features:
      name: คุณลักษณะของอุปกรณ์สำหรับการนำเสนอ
      description: อธิบายลักษณะเฉพาะของอุปกรณ์การนำเสนอ เช่น ความสูงที่ปรับได้หรือพื้นผิวที่ลบได้
    preservation_type:
      name: ประเภทการเก็บรักษา
      description: ระบุวิธีการที่ใช้ในการเก็บรักษาตัวอย่างในห้องปฏิบัติการ เช่น แบบคงที่หรือแบบแห้ง
    pretend_electronics_toy_type:
      name: ประเภทของเล่นแนวอิเล็กทรอนิกส์
      description: ระบุหมวดหมู่ของของเล่นแนวอิเล็กทรอนิกส์ เช่น กล้องถ่ายรูป โทรศัพท์มือถือ
    pretend_housekeeping_toy_type:
      name: ประเภทของเล่นอุปกรณ์ดูแลความสะอาดบ้าน
      description: ระบุประเภทของของเล่นอุปกรณ์ดูแลความสะอาดบ้าน เช่น ชุดทำความสะอาดหรือเครื่องใช้ในครัว
    primary_pcie_slot_version:
      name: เวอร์ชันสล็อต PCIe หลัก
      description: ระบุรุ่น PCI Express ที่สล็อต x16 หลักรองรับซึ่งโดยทั่วไปใช้สำหรับการ์ดกราฟิก
    primary_region:
      name: ภูมิภาคหลัก
      description: ระบุตลาดหลักหรือที่ตั้งสำหรับซอฟต์แวร์หรือบริการคลาวด์ เช่น อเมริกาเหนือ
        เอเชียแปซิฟิก
    primer_use:
      name: การใช้ไพรเมอร์
      description: ระบุการทำงานของไพรเมอร์ เช่น สีรองพื้นหรือน้ำยาซีล
    print_orientation:
      name: ทิศทางการพิมพ์
      description: ระบุด้านของวัสดุที่กราฟิกพิมพ์อยู่
    print_server_form_factor:
      name: รูปแบบของพรินต์เซิร์ฟเวอร์
      description: ระบุรูปแบบทางกายภาพของพรินต์เซิร์ฟเวอร์ (เช่น กล่องภายนอก, การ์ดภายใน,
        ดองเกิล USB)
    print_technology:
      name: เทคโนโลยีการพิมพ์
      description: ระบุกระบวนการที่ใช้โดยเครื่องพิมพ์ เช่น อิงค์เจ็ทหรือเลเซอร์
    printer/copier_specialized_features:
      name: คุณลักษณะพิเศษของเครื่องพิมพ์/เครื่องถ่ายเอกสาร
      description: เน้นคุณลักษณะเฉพาะของเครื่องพิมพ์/เครื่องถ่ายเอกสาร เช่น การรองรับการพิมพ์ผ่านมือถือหรือการควบคุมด้วยเสียง
    printer_accessories_included:
      name: รวมอุปกรณ์เครื่องพิมพ์
      description: ให้รายละเอียดส่วนประกอบเสริมที่มาพร้อมกับเครื่องพิมพ์ เครื่องถ่ายเอกสาร
        หรือแฟกซ์ เช่น ถาดกระดาษ ฟิวเซอร์
    printer_color_capability:
      name: ความสามารถด้านสีของเครื่องพิมพ์
      description: ระบุว่าอุปกรณ์พิมพ์เป็นแบบขาวดำเท่านั้นหรือรองรับการพิมพ์และถ่ายเอกสารสีเต็มรูปแบบ
    printer_connection_interface:
      name: อินเทอร์เฟซการเชื่อมต่อเครื่องพิมพ์
      description: กำหนดประเภทของพอร์ตที่พรินต์เซิร์ฟเวอร์ใช้เชื่อมต่อกับเครื่องพิมพ์
    printer_form_factor:
      name: รูปแบบของเครื่องพิมพ์
      description: จำแนกสไตล์ทางกายภาพหรือความสามารถในการพกพาของอุปกรณ์
    printer_functions:
      name: ฟังก์ชันเครื่องพิมพ์
      description: ระบุความสามารถของเครื่องพิมพ์ เครื่องถ่ายเอกสาร และเครื่องแฟกซ์
        เช่น สแกน พิมพ์รูปถ่าย
    printing_color:
      name: สีการพิมพ์
      description: ระบุเอาต์พุตสีของผงหมึกและตลับหมึกอิงค์เจ็ท เช่น สีดำ สีฟ้า
    printing_method:
      name: วิธีการพิมพ์
      description: ระบุกระบวนการพิมพ์ เช่น การพิมพ์ออฟเซตหรือการแกะสลัก
    privacy_filtering_direction:
      name: ทิศทางการกรองความเป็นส่วนตัว
      description: ระบุว่าฟิลเตอร์บล็อกการมองเห็นจากทิศทางใด (เช่น สองทางแนวนอน, สี่ทาง)
    processor_cores:
      name: แกนประมวลผล
      description: ระบุจำนวนคอร์ในโปรเซสเซอร์ของคอมพิวเตอร์ เช่น Dual
    processor_family:
      name: กลุ่มประมวลผล
      description: ระบุซีรีส์หรือแบรนด์ของ CPU ของอุปกรณ์อิเล็กทรอนิกส์ เช่น Intel
        Core i7
    processor_socket:
      name: ซ็อกเก็ตผู้ประมวลผล
      description: ระบุประเภทซ็อกเก็ตโปรเซสเซอร์ที่เข้ากันได้ในระบบอิเล็กทรอนิกส์
        เช่น LGA 1151 (ซ็อกเก็ต H4) หรือซ็อกเก็ต AM4
    processor_technology:
      name: เทคโนโลยีโปรเซสเซอร์
      description: ระบุเทคโนโลยีของตัวประมวลผล โดยทั่วไปสำหรับอุปกรณ์เครื่องเสียง
        เช่น แบบใช้ซอฟต์แวร์ แบบหลอดสุญญากาศ
    product_benefits:
      name: ประโยชน์ของผลิตภัณฑ์
      description: อธิบายคุณประโยชน์ที่ผลิตภัณฑ์มอบให้ โดยทั่วไปใช้กับสุขภาพและความงาม
        เช่น ช่วยให้ริมฝีปากเรียบเนียน ช่วยให้ดูกระชับ
    product_certifications_standards:
      name: การรับรองและมาตรฐานผลิตภัณฑ์
      description: ระบุถึงการรับรองหรือมาตรฐานที่สินค้ามีคุณสมบัติตรง เช่น ออร์แกนิกหรือไม่ทดลองในสัตว์
    product_classification:
      name: การจำแนกประเภทผลิตภัณฑ์
      description: ระบุประเภทของวัสดุมีค่า สกุลเงิน หรือสิ่งของมีค่า (เช่น สกุลเงิน
        ทองคำแท่ง อัญมณี บัตรของขวัญ NFT)
    product_form:
      name: รูปแบบผลิตภัณฑ์
      description: ระบุรูปแบบหรือการนำเสนอของผลิตภัณฑ์ โดยทั่วไปเพื่อสุขภาพและความงาม
        เช่น โลชั่น เซรั่ม
    product_format:
      name: รูปแบบผลิตภัณฑ์
      description: ระบุว่าสินค้าถูกส่งมอบเป็นผลิตภัณฑ์ทางกายภาพหรือดาวน์โหลดดิจิทัล
    product_formulation:
      name: สูตรผลิตภัณฑ์
      description: ระบุองค์ประกอบของวัสดุสิ้นเปลืองในอาคาร เช่น สารพื้นฐาน ผสมเสร็จ
    product_manual_area:
      name: พื้นที่คู่มือผลิตภัณฑ์
      description: ระบุหัวข้อคู่มือผลิตภัณฑ์ เช่น กล้องและเลนส์ เครื่องใช้สำนักงาน
    product_sterility:
      name: ความปลอดเชื้อของผลิตภัณฑ์
      description: ระบุว่าผลิตภัณฑ์ผ่านการฆ่าเชื้อเพื่อสุขภาพและความปลอดภัยหรือไม่
    product_use:
      name: การใช้ผลิตภัณฑ์
      description: ระบุวัตถุประสงค์การใช้งานหลักหรือวัตถุประสงค์ของวัสดุมีค่าหรือของสะสม
        (เช่น สกุลเงิน/เงินที่ชำระหนี้ได้ตามกฎหมาย ของสะสม เครื่องประดับ บัตรของขวัญ)
    program_format:
      name: รูปแบบของโปรแกรม
      description: อธิบายเค้าโครงของโปรแกรมกิจกรรม เช่น หนังสือเล่มเล็กหรือแผ่นเดียว
    projection_design:
      name: การออกแบบการฉายภาพ
      description: อธิบายรูปแบบหรือภาพที่ฉายโดยฟิลเตอร์แสงหรือโกโบ เช่น ข้อความหรือโลโก้
    projector_light_source:
      name: แหล่งกำเนิดแสงของโปรเจคเตอร์
      description: ระบุประเภทของแหล่งกำเนิดแสงในโปรเจ็กเตอร์ เช่น LED หรือเลเซอร์
    prop_theme:
      name: ธีมอุปกรณ์ประกอบฉาก
      description: ระบุสไตล์หรือประเภทของอุปกรณ์ประกอบฉากภาพยนตร์และโทรทัศน์ เช่น
        ประวัติศาสตร์หรือไซไฟ
    propane_application:
      name: การใช้งานโพรเพน
      description: ระบุวัตถุประสงค์ของโพรเพน เช่น การทำความร้อนหรือการย่าง
    propeller_blade_design:
      name: การออกแบบใบพัด
      description: อธิบายโครงร่างของใบพัดบนใบพัดเรือ เช่น ใบพัด 3 ใบหรือ 4 ใบ
    prophy_cup_design:
      name: การออกแบบหัวขัดทำความสะอาดฟัน
      description: อธิบายการออกแบบถ้วยทำนายที่ใช้ในงานทันตกรรม เช่น แปรงหรือยาง
    propulsion_type:
      name: ประเภทแรงขับ
      description: ระบุวิธีการเคลื่อนย้ายอุปกรณ์กลางแจ้ง เช่น การดัน การลาก
    protected_component:
      name: ส่วนประกอบที่ได้รับการป้องกัน
      description: ระบุส่วนของเครื่องพินบอลที่ฝาครอบป้องกัน
    protection_type:
      name: ประเภทการคุ้มครอง
      description: ระบุระดับการป้องกันที่นำเสนอโดยอุปกรณ์นิรภัย เช่น Type I หรือ Type
        II
    protective_gear_features:
      name: คุณลักษณะของอุปกรณ์ป้องกัน
      description: ระบุลักษณะเฉพาะของอุปกรณ์ป้องกัน เช่น กันกระแทกหรือกันฝ้า
    protective_mask_design:
      name: การออกแบบหน้ากากป้องกัน
      description: ระบุการออกแบบหน้ากากป้องกัน เช่น หน้ากากแบบเต็มหน้าหรือครึ่งหน้า
    protective_mask_features:
      name: คุณลักษณะของหน้ากากป้องกัน
      description: ระบุรายละเอียดคุณลักษณะของหน้ากากป้องกัน เช่น สายรัดแบบปรับได้หรือมีวาล์ว
    protein_processing_type:
      name: ประเภทการแปรรูปโปรตีน
      description: ระบุว่าโปรตีนถูกกลั่นหรือแปรรูปอย่างไร (เช่น ไอโซเลต เทียบกับ คอนเซนเทรต)
        มีผลต่อความบริสุทธิ์ อัตราการย่อย และความชอบของผู้บริโภค
    protein_source:
      name: แหล่งโปรตีน
      description: ระบุแหล่งโปรตีนหลักที่ใช้ในอาหารเสริม
    pstn_connectivity_options:
      name: ตัวเลือกการเชื่อมต่อ Pstn
      description: ระบุอินเทอร์เฟซเครือข่ายโทรศัพท์สาธารณะ (PSTN) ที่ผลิตภัณฑ์รองรับ
        เช่น FXO, POTS
    publication_frequency:
      name: ความถี่ในการตีพิมพ์
      description: ระบุความถี่ในการตีพิมพ์นิตยสารหรือหนังสือพิมพ์ เช่น รายวันหรือรายเดือน
    publication_type:
      name: ประเภทสิ่งพิมพ์
      description: ระบุประเภทของสิ่งพิมพ์ทางวิชาการหรืองานวิจัย เช่น บทความในวารสารหรือวิทยานิพนธ์
    pull_up_bar:
      name: บาร์ดึงข้อ
      description: ระบุประเภทของด้ามจับสำหรับอุปกรณ์ฟิตเนส เช่น มาตรฐาน หรือ Raw
    pump_accessories:
      name: อุปกรณ์ปั๊ม
      description: ระบุสิ่งของที่มาพร้อมกับเครื่องปั๊มนม เช่น กระเป๋าหรือขวดนม
    pump_speed_settings:
      name: การตั้งค่าความเร็วปั๊ม
      description: ระบุคุณสมบัติการควบคุมความเร็ว โดยทั่วไปสำหรับเครื่องปั๊มนม เช่น
        ปรับความเร็วได้
    punching/training_bag_material:
      name: วัสดุที่ใช้ทำกระสอบทราย
      description: ระบุวัสดุหลักที่ใช้ในกระสอบทราย/ฝึกซ้อม เช่น หนังหรือผ้าใบ
    puppet_theme:
      name: ธีมหุ่นเชิด
      description: จัดหมวดหมู่หุ่นเชิดตามธีมการออกแบบ เช่น มนุษย์หรือสิ่งมหัศจรรย์
    puppet_type:
      name: ประเภทหุ่น
      description: ระบุลักษณะของหุ่นเชิด เช่น หุ่นมือหรือหุ่นเชิด
    push_button_terminal_type:
      name: ประเภทขั้วปุ่มกด
      description: ระบุสไตล์การเชื่อมต่อไฟฟ้าบนปุ่ม เพื่อให้แน่ใจว่าเข้ากันได้กับสายไฟและแท็บเชื่อมต่อด่วนระหว่างการติดตั้ง
    puzzle_theme:
      name: ธีมปริศนา
      description: อธิบายหัวเรื่องหรือแนวคิดหลักของปริศนา เช่น สัตว์หรืออวกาศ
    puzzle_type:
      name: ประเภทปริศนา
      description: ระบุประเภทของเกมไขปริศนา เช่น เกม 3 มิติหรือเกมพัฒนาสมอง
    quiver_style:
      name: สไตล์การสั่น
      description: ระบุสไตล์ของซองใส่ลูกธนูในการยิงธนู เช่น คาดสะโพก คาดหลัง
    rack_design:
      name: การออกแบบชั้นวาง
      description: อธิบายเค้าโครงหรือโครงสร้างของชั้นวางกระจก เช่น ช่องเปิดหรือช่องใส่ของ
    rack_format:
      name: รูปแบบแร็ค
      description: กำหนดตัวเรือนทางกายภาพหรือมาตรฐานขนาดของแชนเนลสตริปสำหรับการวางแร็คหรือเดสก์ท็อป
    rack_mounting_style:
      name: สไตล์การติดตั้งแร็ค
      description: อธิบายสไตล์โครงสร้างของตัวยึดแร็ค (เช่น ชั้นวางคงที่, ชั้นวางเลื่อน,
        ราง, แผงเปล่า)
    rack_type:
      name: ประเภทชั้นวาง
      description: ระบุสไตล์ของชั้นวางของในรถ เช่น ท้ายรถหรือหลังคา
    rack_width_standard:
      name: มาตรฐานความกว้างแร็ค
      description: กำหนดความกว้างการติดตั้งแนวนอนมาตรฐานอุตสาหกรรมที่ผลิตภัณฑ์ปฏิบัติตาม
    racket_balance:
      name: ความสมดุลของแร็กเกต
      description: บ่งบอกถึงการกระจายน้ำหนักของแร็กเก็ต เช่น หัวหนัก และสมดุลที่สม่ำเสมอ
    racket_gauge:
      name: แร็คเก็ตเกจ
      description: ระบุความหนาของเอ็นไม้เทนนิส เช่น 16
    racket_head_shape:
      name: รูปทรงหัวแร็กเกต
      description: แร็กเก็ตทรงของหัวแร็กเก็ต เช่น วงรี ไอโซเมตริก
    racket_material:
      name: วัสดุที่ใช้ทำแร็กเก็ต
      description: ระบุประเภทของวัสดุที่ใช้ผลิตแร็คเกตสปอร์ต เช่น ไม้หรือคาร์บอนไฟเบอร์
    racket_string_design:
      name: การออกแบบเอ็นไม้แร็กเก็ต
      description: ระบุโครงสร้างของเอ็นในไม้เทนนิส เช่น เส้นใยเดี่ยวและเส้นใยหลายเส้น
    racket_string_material:
      name: วัสดุที่ใช้ทำเอ็นไม้แร็กเก็ต
      description: ระบุส่วนประกอบของสายไม้เทนนิส เช่น เคฟล่าร์ หรือ โพลียูรีเทน (PU)
    radar_bands:
      name: เรดาร์แบนด์
      description: ระบุย่านความถี่ที่อุปกรณ์เรดาร์สามารถตรวจจับได้ เช่น X, K
    radar_technology:
      name: เทคโนโลยีเรดาร์
      description: ระบุเทคโนโลยีเรดาร์ที่ใช้ในผลิตภัณฑ์ เช่น พัลส์ โซลิดสเตต
    radio_case_design:
      name: การออกแบบเคสวิทยุ
      description: ระบุสไตล์หรือฟังก์ชันการทำงานของกระเป๋าใส่วิทยุ เช่น แบบตายตัวหรือแบบหมุนได้
    radio_features:
      name: คุณลักษณะของวิทยุ
      description: ระบุความสามารถเฉพาะของวิทยุ เช่น การรองรับ GPS หรือการเล่น MP3
    radio_form_factor:
      name: รูปแบบของวิทยุ
      description: ระบุคลาสทางกายภาพของเครื่องรับส่งวิทยุสมัครเล่น มีอิทธิพลต่อตัวเลือกการติดตั้ง,
        ความต้องการพลังงาน และสถานการณ์การใช้งานทั่วไป
    radio_scanner_form_factor:
      name: รูปแบบของสแกนเนอร์วิทยุ
      description: ระบุการกำหนดค่าทางกายภาพหรือสไตล์การติดตั้งของสแกนเนอร์วิทยุ (เช่น
        มือถือ, ฐาน, เดสก์ท็อป, ติดตั้งในรถยนต์)
    radiology_compatibility:
      name: ความเข้ากันได้ทางรังสีวิทยา
      description: ระบุว่าเฝือกสามารถคงอยู่บนผู้ป่วยระหว่างขั้นตอนการถ่ายภาพ (เช่น
        MRI, CT, X-ray)
    raid_levels_supported:
      name: ระดับ RAID ที่รองรับ
      description: แสดงรายการการกำหนดค่า RAID ทั้งหมดที่อาร์เรย์ฮาร์ดไดรฟ์สามารถสร้าง
        หรือจัดการได้
    ramp_type:
      name: ประเภททางลาด
      description: ระบุการออกแบบหรือรูปแบบของทางลาดสำหรับสเก็ตบอร์ด เช่น ฮาล์ฟไปป์หรือฟันบ็อกซ์
    range_type:
      name: ประเภทช่วง
      description: ระบุพื้นที่ครอบคลุมของอุปกรณ์ต่างๆ อย่างกล้องดูลูก เช่น ระยะไกล
    rarity:
      name: ความหายาก
      description: ระบุเอกลักษณ์ของรายการ โดยทั่วไปจะเป็นของสะสม เช่น รุ่นลิมิเต็ด
        หายากมาก
    razor_flexibility:
      name: ความยืดหยุ่นของใบมีดโกน
      description: บ่งบอกถึงความยืดหยุ่นหรือมีดโกนและทริมเมอร์ เช่น ปรับได้หรือตายตัว
    razor_head_design:
      name: ออกแบบหัวมีดโกน
      description: ระบุจำนวนใบมีดในมีดโกน เช่น ใบเดี่ยว สามใบ
    razor_type:
      name: ประเภทมีดโกน
      description: 'ระบุการออกแบบมีดโกน เช่น แบบสะบัดหนังหรือแบบสังเคราะห์ '
    read/write_speed:
      name: ความเร็วในการอ่าน/เขียน
      description: ระบุอัตราหรือความเร็วการถ่ายโอนข้อมูล โดยทั่วไปแล้วสำหรับเครื่องทำสำเนาดิสก์
        เช่น 4x, 52x
    reading_toy_type:
      name: ประเภทของเล่นเสริมสร้างการอ่าน
      description: ระบุประเภทของของเล่นเสริมการอ่าน เช่น เกมสะกดคำ แท็บเล็ตอ่านหนังสือ
    receipt_paper_features:
      name: คุณลักษณะของกระดาษใบเสร็จรับเงิน
      description: ระบุคุณลักษณะเฉพาะของกระดาษใบเสร็จรับเงิน เช่น ตัวระบุการสิ้นสุดม้วนหรือโลโก้ที่พิมพ์ไว้ล่วงหน้า
    reclining_function:
      name: ฟังก์ชันการเอนกาย
      description: อธิบายคุณลักษณะเฉพาะของการเอน เช่น การเอนเต็มที่หรือแรงโน้มถ่วงเป็นศูนย์
    recommended_age_group:
      name: กลุ่มอายุที่แนะนำ
      description: ระบุช่วงอายุที่เหมาะสมสำหรับผลิตภัณฑ์ ซึ่งโดยทั่วไปคือของเล่นและเกม
        เช่น เด็กทารก วัยรุ่น
    recommended_skill_level:
      name: ระดับทักษะที่แนะนำ
      description: ระบุระดับทักษะ เช่น ระดับเริ่มต้น ระดับมืออาชีพ
    recommended_use:
      name: การใช้งานที่แนะนำ
      description: ระบุการใช้งานหลักหรือโดเมนที่ผลิตภัณฑ์ฮาร์ดแวร์ได้รับการออกแบบมาเพื่อใช้งาน
        เช่น อุตสาหกรรม ที่พักอาศัย
    record_cleaning_components_included:
      name: ส่วนประกอบทำความสะอาดแผ่นเสียงที่รวมอยู่
      description: ระบุรายการสิ่งของเฉพาะที่มาในชุดเพื่อให้ลูกค้าสามารถเปรียบเทียบชุดได้ในคราวเดียว
        (เช่น แปรง, น้ำยา, ผ้า)
    recorder_fingering_system:
      name: ระบบนิ้วของรีคอร์เดอร์
      description: ระบุประเภทของระบบการวางนิ้วของเครื่องบันทึก เช่น เยอรมัน พิสดาร
    recorder_specialized_features:
      name: คุณลักษณะพิเศษของเครื่องบันทึก
      description: ระบุคุณลักษณะขั้นสูงในเครื่องบันทึกวิดีโอ เช่น อัจฉริยะ รองรับระบบเสียง
        Dolby Atmos
    recording_accessories_included:
      name: รวมอุปกรณ์เสริมสำหรับสำหรับบันทึกเสียง
      description: ให้รายละเอียดเกี่ยวกับส่วนประกอบเพิ่มเติมที่รวมอยู่ในชุดการบันทึก
        เช่น หูฟังหรือไมโครโฟน
    recording_capability_type:
      name: ประเภทความสามารถในการบันทึก
      description: ระบุว่าเครื่องรับสามารถบันทึกเนื้อหาทีวีได้หรือไม่และวิธีที่ใช้
        (เช่น USB PVR, HDD ภายใน, คลาวด์)
    recording_functionality:
      name: ฟังก์ชันการบันทึก
      description: ระบุว่าเครื่องรับสามารถบันทึกเนื้อหาทีวีได้หรือไม่และอย่างไร (เช่น
        DVR ไปยัง HDD ภายใน, USB ภายนอก)
    recording_mode:
      name: โหมดการบันทึก
      description: ระบุโหมดการทำงานที่เครื่องบันทึกรองรับ (เช่น ต่อเนื่อง, บันทึกตามเวลา)
    recording_quality:
      name: คุณภาพการบันทึก
      description: อธิบายความชัดเจนของเสียงของผู้ถอดเสียงและระบบการเขียนตามคำบอก เช่น
        เสียงต่ำหรือสูง
    recording_speed_modes_supported:
      name: โหมดความเร็วการบันทึกที่รองรับ
      description: ระบุโหมดความเร็วเทปที่ VCR สามารถบันทึกหรือเล่นได้ ส่งผลต่อเวลาบันทึกและคุณภาพรูปภาพ
    recreational_vehicle_type:
      name: ประเภทรถบ้าน
      description: ระบุหมวดหมู่ของยานพาหนะเพื่อการพักผ่อนหย่อนใจ เช่น ประเภท A หรือรถพ่วงสำหรับเดินทาง
    reed_strength:
      name: ความแข็งของลิ้น
      description: บ่งบอกถึงความยืดหยุ่นของกกลมไม้ เช่น อ่อน ปานกลาง หรือแข็ง
    reel_capacity:
      name: ความจุม้วน
      description: ระบุความจุของรอกในถังที่กำลังพัฒนา เช่น เดี่ยวหรือสี่ล้อ
    reflector_design:
      name: การออกแบบแผ่นสะท้อนแสง
      description: อธิบายการออกแบบตัวสะท้อนแสงแฟลช เช่น รวงผึ้งหรือร่ม
    regenerative_braking_features:
      name: คุณลักษณะของระบบเบรกสร้างพลังงานคืน
      description: อธิบายคุณลักษณะของโมดูลเบรกแบบรีเจนเนอเรทีฟ EV เช่น ทนต่อสภาพอากาศ
        ติดตั้งง่าย
    region:
      name: ภูมิภาค
      description: ระบุสถานที่ที่เป็นแหล่งกำเนิดของผลิตภัณฑ์ โดยทั่วไปสำหรับไวน์และสุรา
        เช่น แคลิฟอร์เนีย บอร์กโดซ์
    region_code:
      name: รหัสภูมิภาค
      description: ระบุภูมิภาคที่ซอฟต์แวร์วิดีโอเกมได้รับอนุญาตให้ใช้ เช่น เอเชีย
        (AS) หรือทั่วโลก (GL)
    release_mechanism:
      name: กลไกการปล่อย
      description: ระบุเทคโนโลยีการส่งมอบหรือการดูดซึมของวิตามิน (เช่น ปลดปล่อยแบบต่อเนื่อง,
        ไลโปโซม, เคี้ยวได้)
    release_schedule:
      name: กำหนดการเปิดตัว
      description: ระบุความถี่ในการออกตอนใหม่หรือการอัปเดต เช่น รายสัปดาห์ รายปักษ์
    remote_control_functions:
      name: ฟังก์ชั่นการควบคุมระยะไกล
      description: แสดงรายการการดำเนินการเฉพาะที่ชัตเตอร์ระยะไกลสามารถสั่งการได้นอกเหนือจากการถ่ายภาพ
    remote_shutter_form_factor:
      name: รูปแบบชัตเตอร์ระยะไกล
      description: ระบุรูปแบบทางกายภาพหรือตัวเครื่องของรีโมทชัตเตอร์ เช่น พวงกุญแจ/ปุ่ม
        ตัวควบคุมแบบแหวน หรือไม้เซลฟี่ที่มีชัตเตอร์ในตัว
    remote_technology:
      name: เทคโนโลยีรีโมต
      description: ระบุเทคโนโลยีที่ใช้ในรีโมทคอนโทรลของกล้อง เช่น บลูทูธหรือแบบเชื่อมต่ออินเทอร์เน็ต
    removable_storage_formats_supported:
      name: รองรับรูปแบบการจัดเก็บข้อมูลแบบถอดได้
      description: ระบุรูปแบบการจัดเก็บข้อมูลแบบถอดได้ที่อุปกรณ์สามารถใช้งานร่วมกันได้
        เช่น SD, microUSB
    removal_target:
      name: เป้าหมายการล้างออก
      description: ระบุผลิตภัณฑ์เล็บใดที่น้ำยาล้างออกแบบมาเพื่อละลาย (เช่น ยาทาเล็บเจล
        เล็บอะคริลิก ผงดิป)
    replacement_lamp_type:
      name: ประเภทหลอดไฟทดแทน
      description: จำแนกสไตล์ของชิ้นส่วนทดแทนที่ให้มา (เช่น โมดูลหลอดและตัวเรือน,
        แถบ LED แบ็คไลท์, ชุดประกอบ CCFL)
    reptile/amphibian_food_form:
      name: รูปแบบอาหารสำหรับสัตว์เลื้อยคลานและสัตว์สะเทินน้ำสะเทินบก
      description: ระบุรูปแบบของอาหารสัตว์เลื้อยคลาน/สัตว์ครึ่งบกครึ่งน้ำ เช่น แบบฟรีซดรายหรือแบบเม็ด
    reptile/amphibian_habitat_supply_type:
      name: ประเภทวัสดุสำหรับที่อยู่อาศัยของสัตว์เลื้อยคลานและสัตว์สะเทินน้ำสะเทินบก
      description: ระบุประเภทของการให้ความร้อนหรือแสงสว่างสำหรับแหล่งที่อยู่อาศัยของสัตว์เลื้อยคลาน/สัตว์ครึ่งบกครึ่งน้ำ
        เช่น โคมไฟ.shความร้อนหรือหลอด UVB
    research_focus:
      name: มุ่งเน้นการวิจัย
      description: ระบุสาขาวิชาหลักของการศึกษาในเอกสารทางวิชาการ เช่น ชีววิทยาหรือเศรษฐศาสตร์
    research_methodology:
      name: ระเบียบวิธีวิจัย
      description: ระบุประเภทของวิธีการวิจัยที่ใช้ในรายงานทางวิชาการ เช่น แบบสำรวจหรือเชิงคุณภาพ
    resistance_level:
      name: ระดับการต้านทาน
      description: ระบุระดับความแรงต้านของสินค้า ซึ่งโดยทั่วไปสำหรับยางยืดออกกำลังกาย
        เช่น หนักมาก
    resistance_system:
      name: ระบบต้านทาน
      description: ระบุกลไกที่ใช้สร้างแรงต้านในอุปกรณ์ออกกำลังกาย เช่น น้ำ อากาศ
    resistance_tolerance:
      name: ความคลาดเคลื่อนความต้านทาน
      description: กำหนดค่าเบี่ยงเบนที่อนุญาตของความต้านทานจริงจากค่าที่ระบุ แสดงเป็นเปอร์เซ็นต์
        (เช่น ±1%)
    restrictor_gate_shape:
      name: รูปทรงเกตจำกัด
      description: กำหนดรูปทรงเรขาคณิตของเกตจำกัดที่รวมหรือต้องการโดยจอยสติ๊ก
    result_display:
      name: การแสดงผลลัพธ์
      description: ระบุรูปแบบของชุดทดสอบการตั้งครรภ์ เช่น แบบขีด ดิจิทัล
    retail/sale_sign_design:
      name: การออกแบบป้ายขายปลีก/ลดราคา
      description: ระบุประเภทของข้อความบนป้ายขายปลีกหรือป้ายขาย เช่น ลดราคา ข้อเสนอพิเศษ
    reticle_plane:
      name: ระนาบของศูนย์เล็ง
      description: ระบุระนาบโฟกัสของเส้นเล็งในกล้องและศูนย์เล็งติดอาวุธ เช่น เส้นแรกหรือเส้นที่สอง
    reticle_type:
      name: ประเภทเรติเคิล
      description: ระบุประเภทของเส้นเล็งในกล้องติดอาวุธ เช่น แบบดูเพล็กซ์หรือมิลดอต
    rewinder_operation_mode:
      name: โหมดการทำงานของเครื่องกรอ
      description: กำหนดโหมดการทำงานที่เครื่องกรอรองรับ (เช่น กรอกลับอย่างเดียว, กรอกลับและเร่งเร็ว)
    rf_output_standard:
      name: มาตรฐานขาออก RF
      description: ระบุมาตรฐานการออกอากาศโทรทัศน์หรือวิทยุที่ตัวมอดูเลเตอร์ส่งออก
    rfid_frequency:
      name: ความถี่ Rfid
      description: ระบุความถี่การทำงานของผลิตภัณฑ์ RFID เช่น ต่ำ สูงพิเศษ
    riding_style:
      name: สไตล์การขี่
      description: ระบุวัตถุประสงค์การใช้งานหรือสไตล์การขี่สำหรับอุปกรณ์กีฬาฤดูหนาว
        เช่น สลาลม ฟรีสไตล์
    riding_toy_propulsion_type:
      name: ประเภทแรงขับของเล่นแบบขี่
      description: ระบุว่าของเล่นขี่ขับเคลื่อนอย่างไร เช่น ไฟฟ้าหรือคันเหยียบ
    rim/wheel_design:
      name: การออกแบบขอบ/ล้อ
      description: อธิบายสไตล์หรือโครงสร้างของขอบล้อ/ล้อรถ เช่น โลหะผสมหรือซี่ล้อ
    ring_design:
      name: การออกแบบแหวน
      description: อธิบายลักษณะของแหวน เช่น แหวนเพชรแถวหรือแหวนเพชรชู
    ring_size:
      name: ขนาดแหวน
      description: ระบุขนาดของแหวน เช่น L หรือ 6.5
    rinse_requirement:
      name: ข้อกำหนดการล้างออก
      description: อธิบายว่าคลีนเซอร์ต้องล้างออก สามารถทิ้งไว้ หรือไม่ต้องล้าง (เช่น
        น้ำไมเซลลาร์)
    rise_height_class:
      name: ระดับความสูงที่เพิ่มขึ้น
      description: จำแนกว่าที่จับนิ้วหัวแม่มือเพิ่มความสูงเพิ่มเติมเท่าใดเทียบกับ
        แท่งควบคุมมาตรฐาน (เช่น ต่ำ, กลาง, สูง)
    riser_color:
      name: สีของไรเซอร์
      description: ระบุสีของไรเซอร์ในคันธนู เช่น สีดำหรือสีน้ำเงิน
    riser_material:
      name: วัสดุไรเซอร์
      description: ระบุวัสดุในด้ามของคันธนูหรือหน้าไม้ เช่น คาร์บอนไฟเบอร์หรือไม้
    riser_pattern:
      name: รูปแบบไรเซอร์
      description: อธิบายการออกแบบหรือลวดลายบนไรเซอร์ของคันธนูและหน้าไม้ เช่น ลายพรางหรือมีพื้นผิว
    rivet_form:
      name: รูปแบบหมุดย้ำ
      description: อธิบายรูปแบบของฮาร์ดแวร์รีเวท เช่น แข็ง หรือแยก
    road_sign_design:
      name: การออกแบบป้ายถนน
      description: ระบุประเภทของข้อมูลที่แสดงบนป้ายจราจร เช่น หยุด การจำกัดความเร็ว
    robe_style:
      name: สไตล์เสื้อคลุม
      description: ระบุประเภทการออกแบบโดยรวมหรือสไตล์การตัดเย็บของเสื้อคลุม เช่น เสื้อคลุมสปาหรือแบบพัน
    rock_composition:
      name: องค์ประกอบของหิน
      description: ระบุองค์ประกอบทางธรณีวิทยาของหิน เช่น หินอ่อนหรือหินปูน
    rock_formation:
      name: การก่อตัวของหิน
      description: ระบุการจำแนกประเภททางธรณีวิทยาของหิน เช่น หินอัคนีหรือตะกอน
    rocker_type:
      name: ประเภทเครื่องร่อนแร่
      description: ระบุรูปแบบความโค้งของสโนว์บอร์ดหรือสกี เช่น แบบราบ ร็อคเกอร์
    rod_color:
      name: สีก้าน
      description: ระบุสีของคันเบ็ด เช่น สีดำหรือสีน้ำเงิน
    rod_material:
      name: วัสดุสำหรับท่อ
      description: ระบุวัสดุที่ใช้ในอุปกรณ์กีฬาที่ใช้คันเบ็ด เช่น กราไฟท์หรือไฟเบอร์กลาส
    rod_pattern:
      name: ลายก้าน
      description: อธิบายการออกแบบหรือลายพิมพ์บนคันเบ็ด เช่น ลายพรางหรือลายทาง
    rod_shape:
      name: รูปทรงของท่อ
      description: ระบุรูปแบบหรือโครงสร้างของรางผ้าม่านอาบน้ำ เช่น แบบตรง รูปตัว U
    roller_head:
      name: หัวลูกกลิ้ง
      description: ระบุจำนวนหัวบนลูกกลิ้ง โดยทั่วไปสำหรับเครื่องมือดูแลผิว เช่น หัวเดียว
        หัวคู่
    roller_material:
      name: วัสดุลูกกลิ้ง
      description: ระบุวัสดุที่ใช้ในลูกกลิ้ง โดยทั่วไปสำหรับเครื่องมือดูแลผิว เช่น
        หยก ซิลิโคน
    roller_type:
      name: ประเภทลูกกลิ้ง
      description: ระบุประเภทของลูกกลิ้ง โดยทั่วไปสำหรับเครื่องมือดูแลผิว เช่น น้ำแข็ง
        ไมโครนีดเดิล
    roof_decor_shape:
      name: รูปทรงการตกแต่งหลังคา
      description: ระบุการออกแบบหรือรูปแบบของการตกแต่งหลังคา เช่น รูปม้าหรือเรือใบ
    room_correction_technology:
      name: เทคโนโลยีการปรับแก้ห้อง
      description: ระบุระบบการปรับเทียบอะคูสติกอัตโนมัติหรือการแก้ไขห้องที่รวมอยู่ในเครื่องรับ
    rosin_form:
      name: รูปแบบยางสน
      description: อธิบายรูปร่างหรือรูปแบบของคันธนูสำหรับเครื่องสาย เช่น บล็อกหรือเค้ก
    rosin_grade:
      name: เกรดโรซิน
      description: ระบุประเภทของขัดสนที่ใช้กับเครื่องสาย เช่น เข้ม ปานกลาง
    rotating_direction:
      name: ทิศทางการหมุ่น
      description: ระบุทิศทางการหมุนของสว่านและดอกไขควง เช่น ซ้ายหรือขวา
    rotation_direction:
      name: ทิศทางการหมุน
      description: ระบุว่าเครื่องเจาะเล็บรองรับการหมุนไปข้างหน้า การหมุนย้อนกลับ หรือทั้งสองอย่าง
    rotator_control_technology:
      name: เทคโนโลยีการควบคุมโรเตอร์
      description: กำหนดกลไกการควบคุมของตัวหมุนเสาอากาศ เช่น แบบแมนนวลหรือแบบขับเคลื่อนด้วยมอเตอร์
    route_of_administration:
      name: วิถีการให้ยา
      description: ระบุว่าผลิตภัณฑ์ถูกใช้หรือบริโภคอย่างไร มีอิทธิพลต่อประสิทธิภาพและความปลอดภัย
        (เช่น ทางปาก ทาภายนอก แผ่นแปะผิวหนัง ใต้ลิ้น ฉีดเข้ากล้ามเนื้อ)
    rug/mat_features:
      name: คุณลักษณะของพรม/เสื่อ
      description: อธิบายลักษณะพิเศษของพรม/เสื่อ เช่น ฐานกันลื่นหรือแห้งเร็ว
    rug/mat_material:
      name: วัสดุที่ใช้ทำพรม/เสื่อ
      description: ระบุประเภทของวัสดุที่ใช้ในพรมหรือเสื่อ เช่น ยางหรือไมโครไฟเบอร์
    rug/mat_shape:
      name: รูปทรงของพรม/เสื่อ
      description: ระบุรูปทรงของเสื่อและพรม เช่น แบบปูทางเดิน แบบสี่เหลี่ยม
    rug_features:
      name: คุณลักษณะของพรม
      description: อธิบายลักษณะเฉพาะของพรม เช่น พื้นกันลื่น หรือสีกันยูวี
    rug_material:
      name: วัสดุที่ใช้ทำพรม
      description: ระบุวัสดุที่ใช้ในโครงสร้างของพรม เช่น ขนสัตว์หรือปอกระเจา
    rug_shape:
      name: รูปทรงของพรม
      description: ระบุการออกแบบทางเรขาคณิตของพรม เช่น สี่เหลี่ยมจัตุรัสหรือพรมรองชนะเลิศ
    rum_grade:
      name: เกรดเหล้ารัม
      description: แยกประเภทเหล้ารัมตามคุณลักษณะหรือเกรด เช่น พรีเมียม หมักเครื่องเทศ
    saddle_base_color:
      name: สีของฐานยึดอาน
      description: ระบุสีหลักของฐานรองอานจักรยาน เช่น สีดำหรือสีน้ำเงิน
    saddle_base_material:
      name: วัสดุที่ใช้ทำฐานยึดอาน
      description: ระบุวัสดุที่ใช้เป็นฐานของอานจักรยาน เช่น เหล็กหรือคาร์บอนไฟเบอร์
    saddle_base_pattern:
      name: รูปแบบของฐานยึดอาน
      description: อธิบายการออกแบบหรือลายพิมพ์บนฐานของอานจักรยาน เช่น แนวแอบสแตรกต์หรือโลโก้
    saddle_material:
      name: วัสดุสำหรับอาน
      description: ระบุวัสดุที่ใช้ในอานจักรยาน เช่น ยางหรือหนัง
    saddle_seat_color:
      name: สีของเบาะนั่ง
      description: ระบุสีของเบาะนั่งอานจักรยาน เช่น สีเงินหรือสีแดง
    saddle_seat_material:
      name: วัสดุที่ใช้ทำเบาะนั่ง
      description: ระบุวัสดุที่ใช้ในโครงสร้างของอานจักรยาน เช่น หนังหรือไนลอน
    saddle_seat_pattern:
      name: รูปแบบของเบาะนั่ง
      description: อธิบายการออกแบบหรือลายพิมพ์บนเบาะอานจักรยาน เช่น ลายดอกไม้หรือเรขาคณิต
    safety_certifications:
      name: ใบรับรองความปลอดภัย
      description: ระบุการปฏิบัติตามมาตรฐานความปลอดภัยของผลิตภัณฑ์ โดยทั่วไปใช้สำหรับผลิตภัณฑ์สำหรับเด็ก
        เช่น ปลอดสาร BPA
    safety_device_installation:
      name: การติดตั้งอุปกรณ์ความปลอดภัย
      description: ระบุวิธีการติดตั้งหรือยึดผลิตภัณฑ์เพื่อความปลอดภัย เช่น การยึดด้วยกาว
        การยึดด้วยสกรู
    safety_equipment_material:
      name: วัสดุที่ใช้ทำอุปกรณ์ความปลอดภัย
      description: ระบุประเภทของวัสดุในรายการความปลอดภัยของยานพาหนะ เช่น ไนลอนหรือไฟเบอร์กลาส
    safety_rail_installation:
      name: การติดตั้งรางนิรภัย
      description: ระบุวิธีการติดตั้งคอกกั้นเด็ก เช่น แบบปรับได้หรือแบบถาวร
    sailboat_type:
      name: ประเภทเรือใบ
      description: ระบุการออกแบบหรือรุ่นเฉพาะของเรือใบ เช่น สลุบหรือคัตเตอร์
    sandal_style:
      name: สไตล์รองเท้าแตะ
      description: ระบุสไตล์ของรองเท้าแตะ เช่น สายรัดข้อเท้าหรือแบบผูกเชือก
    sandblaster_application:
      name: การใช้งานเครื่องพ่นทราย
      description: ระบุฟังก์ชั่นที่ต้องการของเครื่องมือพ่นทราย เช่น การขัดหรือพ่นทราย
    sander_type:
      name: ประเภทซานเดอร์
      description: จำแนกประเภทของเครื่องมือขัดทราย เช่น สายพาน ชนิดหมุนแบบสั่น
    sanding_application:
      name: การใช้งานการขัดกระดาษทราย
      description: ระบุวัตถุประสงค์ของอุปกรณ์ขัดทราย เช่น งานตกแต่ง หรือการลอกสี
    satellite_coverage_area:
      name: พื้นที่ครอบคลุมดาวเทียม
      description: ระบุภูมิภาคทางภูมิศาสตร์ที่โทรศัพท์ผ่านดาวเทียมสามารถเข้าถึงได้
        เช่น ออสเตรเลียหรือแอฟริกา
    satellite_messaging_capability:
      name: ความสามารถในการส่งข้อความผ่านดาวเทียม
      description: ระบุว่าผลิตภัณฑ์รองรับการส่งข้อความผ่านดาวเทียมแบบทางเดียว (ส่งออกเท่านั้น)
        หรือสองทาง (ส่งและรับ)
    satellite_navigation_systems_supported:
      name: รองรับระบบนำทางผ่านดาวเทียม
      description: ระบุว่าโทรศัพท์สามารถรับระบบดาวเทียมนำทางทั่วโลก (GNSS) ใดเพื่อการระบุตำแหน่งและการติดตาม
    satellite_network_type:
      name: ประเภทเครือข่ายดาวเทียม
      description: ระบุผู้ให้บริการโทรศัพท์ผ่านดาวเทียม เช่น Inmarsat, Iridium
    sauna_accessories_included:
      name: รวมอุปกรณ์ซาวน่า
      description: ระบุรายการผลิตภัณฑ์อื่นๆ ที่มาพร้อมกับซาวน่า เช่น กระบวยหรือหินสำหรับซาวน่า
    scaffolding_mounting_type:
      name: ประเภทการติดตั้งนั่งร้าน
      description: ระบุรูปแบบการติดตั้งนั่งร้าน เช่น โครง อุปกรณ์เคลื่อนที่
    scale_material:
      name: วัสดุสำหรับสเกล
      description: ระบุวัสดุที่ใช้ในเครื่องชั่ง ซึ่งโดยทั่วไปคือคาลิปเปอร์แบบต้นไม้
        เช่น สแตนเลส พลาสติก
    scale_model_accessory_type:
      name: ประเภทอุปกรณ์เสริมโมเดลจำลอง
      description: ระบุประเภทของอุปกรณ์เสริมสำหรับแบบจำลองขนาด เช่น อาคารหรือตัวเลข
    scale_model_kit_type:
      name: ประเภทชุดต่อโมเดลจำลอง
      description: ระบุหมวดหมู่ของชุดโมเดลจำลอง เช่น รถถังหรือยานอวกาศ
    scale_model_material:
      name: วัสดุที่ใช้ทำชุดต่อโมเดลจำลอง
      description: ระบุวัสดุหลักที่ใช้ในแบบจำลองขนาด เช่น ไม้หรือกระดาษแข็ง
    scale_model_theme:
      name: ธีมโมเดลจำลอง
      description: ระบุธีมของแบบจำลองขนาด เช่น แฟนตาซีหรือประวัติศาสตร์
    scalp_concern:
      name: ความกังวลหนังศีรษะ
      description: ระบุปัญหาหนังศีรษะหรือผมหลักที่การรักษาถูกสร้างสูตรเพื่อแก้ไข
    scalpel_blade_material:
      name: วัสดุที่ใช้ทำใบมีดผ่าตัด
      description: ระบุองค์ประกอบของใบมีดผ่าตัด เช่น สแตนเลสหรือไทเทเนียม
    scalpel_blade_number:
      name: หมายเลขใบมีดผ่าตัด
      description: ระบุจำนวนเฉพาะหรือประเภทของใบมีดผ่าตัด เช่น 10 หรือ 15A
    scalpel_blade_shape:
      name: รูปร่างใบมีดผ่าตัด
      description: อธิบายลักษณะของใบมีดผ่าตัด เช่น โค้งหรือตรง
    scalpel_handle_number:
      name: หมายเลขด้ามมีดผ่าตัด
      description: ระบุหมายเลขด้ามจับเฉพาะสำหรับมีดผ่าตัด เช่น 4 หรือ 3L
    scan_converter_features:
      name: คุณลักษณะตัวแปลงรูปแบบสัญญาณ
      description: เน้นคุณลักษณะของตัวแปลงรูปแบบสัญญาณ เช่น การปรับเทียบภาพอัตโนมัติหรือรีโมทคอนโทรล
    scanner_features:
      name: คุณลักษณะของสแกนเนอร์
      description: เน้นฟังก์ชันพิเศษของเครื่องสแกน เช่น ขับเคลื่อนด้วย AI หรือสแกนไปยังคลาวด์
    scanner_grip_compatibility:
      name: ความเข้ากันได้ของที่จับสแกนเนอร์
      description: ระบุว่าเคสเหมาะกับสแกนเนอร์ที่มีด้ามจับแบบปืน/ทริกเกอร์, รูปแบบมือถือมาตรฐาน
        หรือทั้งคู่
    scanner_maintenance_kit_type:
      name: ประเภทชุดบำรุงรักษาสแกนเนอร์
      description: จำแนกประเภทของผลิตภัณฑ์เพื่อให้ผู้ซื้อสามารถแยกแยะระหว่างการ์ดทำความสะอาด
        ชุดอุปกรณ์ครบชุด ชุดปรับเทียบ ชุดลูกกลิ้ง ผ้าเช็ดทำความสะอาด และสารละลายได้อย่างรวดเร็ว
    scanner_sensor_type:
      name: ประเภทเซ็นเซอร์เครื่องสแกน
      description: ระบุประเภทของเซนเซอร์ในสแกนเนอร์ เช่น เครื่องสร้างภาพ 2 มิติ หรือเลเซอร์
    scarf/shawl_style:
      name: สไตล์ผ้าพันคอ/ผ้าคลุมไหล่
      description: ระบุลักษณะของผ้าพันคอและผ้าคลุมไหล่ เช่น แบบผ้าห่ม แบบผูก
    scene_modes:
      name: โหมดฉาก
      description: ระบุโหมดของกล้องสำหรับถ่ายภาพสถานการณ์ต่างๆ เช่น กลางคืนหรือใต้น้ำ
    scent:
      name: กลิ่น
      description: ระบุกลิ่นหอมหรือความหอมของผลิตภัณฑ์ เช่น วานิลลาหรือซิตรัส
    scissor_blade_type:
      name: ประเภทใบมีดของกรรไกร
      description: อธิบายรูปทรงและลักษณะของใบมีดกรรไกร เช่น โค้งหรือหอยเชลล์
    scooter_brake_type:
      name: ประเภทเบรคสกู๊ตเตอร์
      description: ระบุกลไกและการออกแบบของเบรคสกู๊ตเตอร์ เช่น ดิสก์ หรือ ดรัม
    scope/sight_design:
      name: การออกแบบกล้องเล็ง/กล้องส่อง
      description: อธิบายประเภทของการออกแบบกล้องหรือศูนย์เล็งติดอาวุธ เช่น แบบมองเห็นตอนกลางคืน
        แบบเลเซอร์
    scope/sight_features:
      name: คุณลักษณะของขอบเขต/การมองเห็น
      description: อธิบายคุณลักษณะพิเศษของกล้องหรือศูนย์เล็งติดปืน เช่น เส้นเล็งเรืองแสง
        หรือการบันทึกเสียง
    scope_design:
      name: การออกแบบกล้องส่อง
      description: ระบุประเภทการออกแบบของกล้องเล็งแบบออปติก เช่น แบบงอทำมุมหรือแบบตรง
    scope_lens_type:
      name: ประเภทเลนส์ของกล้องส่อง
      description: ระบุประเภทของเลนส์ที่ใช้ในกล้องเล็ง เช่น HD หรือแบบมุมกว้าง
    scoreboard_features:
      name: คุณลักษณะของสกอร์บอร์ด
      description: อธิบายลักษณะพิเศษของป้ายบอกคะแนน เช่น แบบพกพาหรือทนทานต่อสภาพอากาศ
    scrapbook_paper_type:
      name: ประเภทกระดาษสมุดบันทึกทำมือ
      description: ระบุสไตล์หรือการออกแบบกระดาษสมุดเรื่องที่สนใจ เช่น กระดาษพิเศษหรือมีลวดลาย
    screen/display_design:
      name: การออกแบบหน้าจอ/จอแสดงผล
      description: ระบุคุณลักษณะการออกแบบของหน้าจอผลิตภัณฑ์ โดยทั่วไปใช้กับกล้อง เช่น
        ช่องมองภาพ
    screen_assembly_components_included:
      name: ส่วนประกอบของชุดหน้าจอที่รวมอยู่
      description: ชี้แจงว่าชิ้นส่วนใดมาประกอบไว้ล่วงหน้ากับหน้าจอ
    screen_curvature_rating:
      name: ระดับความโค้งของหน้าจอ
      description: ระบุรัศมีความโค้งของจอมอนิเตอร์โค้ง (เช่น 1000R) บ่งบอกว่าเส้นโค้งชัดเจนแค่ไหน
    screen_material:
      name: วัสดุสำหรับหน้าจอ
      description: ระบุประเภทของวัสดุที่ใช้สำหรับฉากกั้นของผลิตภัณฑ์ เช่น กระจก โพลีคาร์บอเนต
    screen_operation_type:
      name: ประเภทการทำงานของจอ
      description: อธิบายสไตล์โครงสร้างหรือการติดตั้งของจอ (เช่น กรอบคงที่ ดึงลงด้วยมือ
        ใช้มอเตอร์ ขาตั้งสามขา เป่าลม)
    screen_protection_features:
      name: คุณสมบัติการป้องกันหน้าจอ
      description: รายละเอียดว่าเคสป้องกันหน้าจอโทรศัพท์อย่างไรนอกเหนือจากการครอบคลุมพื้นฐาน
    screen_protector_adhesion_type:
      name: ประเภทการยึดเกาะของฟิล์มกันรอย
      description: ระบุกาวหรือวิธีการติดที่ใช้เพื่อติดตัวป้องกันกับหน้าจอโทรศัพท์
    screen_protector_coverage_style:
      name: รูปแบบการปกคลุมของแผ่นป้องกันหน้าจอ
      description: กำหนดการออกแบบการปกคลุมทางกายภาพหรือรูปแบบของตัวป้องกันเทียบกับหน้าจออุปกรณ์
    screen_protector_features:
      name: คุณสมบัติแผ่นป้องกันหน้าจอ
      description: เน้นคุณลักษณะการทำงานพิเศษที่ตัวป้องกันมีให้นอกเหนือจากการป้องกันรอยขีดข่วนพื้นฐาน
    screen_protector_finish:
      name: พื้นผิวฟิล์มกันรอย
      description: ระบุพื้นผิวออปติคัลของตัวป้องกัน (เช่น มันวาว, ด้าน, ป้องกันการมอง,
        ป้องกันแสงสะท้อน)
    screen_specialized_features:
      name: คุณลักษณะพิเศษของจอภาพ
      description: ระบุความสามารถเฉพาะของหน้าจอคอมพิวเตอร์ เช่น การป้องกันแสงสะท้อนหรือหน้าจอสัมผัส
    screen_surface_finish:
      name: พื้นผิวหน้าจอ
      description: อธิบายการดูแลพื้นผิวของกระจกหน้าจอ ซึ่งมีผลต่อแสงสะท้อนและความรู้สึก
    seafood_type:
      name: ประเภทอาหารทะเล
      description: จำแนกผลิตภัณฑ์อาหารทะเลตามสายพันธุ์ เช่น ปลาทูน่าหรือกุ้งล็อบสเตอร์
    seal_stamp_design:
      name: การออกแบบตราประทับ
      description: ระบุรูปแบบของตราประทับ เช่น อักษรย่อหรืออักษรวิจิตร
    season:
      name: ฤดูกาล
      description: ระบุฤดูกาลที่ผลิตภัณฑ์เหมาะที่สุด เช่น ฤดูร้อนหรือฤดูใบไม้ร่วง
    seat_color:
      name: สีเบาะนั่ง
      description: ระบุสีของบริเวณที่นั่งของผลิตภัณฑ์ เช่น สีดำหรือสีเขียว
    seat_cushioning:
      name: เบาะนั่ง
      description: อธิบายประเภทของวัสดุกันกระแทกในผลิตภัณฑ์เบาะนั่ง เช่น แบบมีเบาะหรือไม่มีเบาะ
    seat_pattern:
      name: รูปแบบที่นั่ง
      description: ระบุลวดลายบนผลิตภัณฑ์ที่นั่ง เช่น รูปดาวหรือจุด
    seat_reservation:
      name: การจองที่นั่ง
      description: ระบุว่าตั๋วรวมการกำหนดที่นั่งหรือต้องจองล่วงหน้า
    seat_rotation:
      name: การหมุนที่นั่ง
      description: ระบุว่าที่นั่งหมุนได้และตำแหน่งล็อคที่มี
    seat_shape:
      name: รูปร่างที่นั่ง
      description: อธิบายรูปทรงของบริเวณที่นั่งของผลิตภัณฑ์ เช่น ทรงกลมหรือสี่เหลี่ยม
    seat_structure:
      name: โครงสร้างที่นั่ง
      description: ระบุโครงสร้างของที่นั่ง เช่น เครื่องจักรสาน ของแข็ง
    seat_swivel_mechanism:
      name: กลไกการหมุนที่นั่ง
      description: ระบุว่าและอย่างไรที่นั่งสามารถหมุนที่จุดขึ้น-ลงเพื่อการเคลื่อนย้ายที่ปลอดภัยกว่า
    seat_type:
      name: ประเภทที่นั่ง
      description: 'อธิบายการออกแบบเก้าอี้หรือม้านั่ง เช่น แบบบุนวมหรือแบบบัคเก็ต '
    seat_upholstery_color:
      name: สีของเบาะนั่ง
      description: ระบุสีเบาะนั่งของผลิตภัณฑ์เฟอร์นิเจอร์ เช่น สีเบจหรือสีน้ำเงิน
    seat_upholstery_material:
      name: วัสดุสำหรับหุ้มเบาะนั่ง
      description: ระบุสิ่งทอหรือวัสดุที่ใช้หุ้มโซฟา เช่น ไมโครไฟเบอร์หรือหนังเทียม
    seat_upholstery_pattern:
      name: ลวดลายเบาะนั่ง
      description: ระบุการออกแบบหรือลวดลายบนผ้าหุ้มโซฟา เช่น ลายเพสลีย์หรือลายเส้นขดงอ
    security_algorithms:
      name: อัลกอริธึมความปลอดภัย
      description: 'ระบุวิธีการเข้ารหัสที่ใช้โดยอุปกรณ์อิเล็กทรอนิกส์ เช่น AES '
    security_level:
      name: ระดับความปลอดภัย
      description: ระบุมาตรฐานความปลอดภัยของรายการต่างๆ เช่น ล็อคและสลัก เช่น ต่ำ
        กลาง สูง
    selfie_stick_functionality_type:
      name: ประเภทฟังก์ชันไม้เซลฟี่
      description: กำหนดค่าฟังก์ชันหลักของผลิตภัณฑ์ (เช่น แบบแท่งอย่างเดียว แบบแท่งพร้อมขาตั้งกล้อง
        แบบกันสั่น)
    semiconductor_material:
      name: วัสดุเซมิคอนดักเตอร์
      description: ระบุวัสดุพื้นผิวเซมิคอนดักเตอร์พื้นฐานที่ใช้ในส่วนประกอบ ส่งผลต่อความเร็วการสวิตช์,
        แรงดันไฟฟ้าพังทลาย และพฤติกรรมความร้อน
    sensation_effect:
      name: ผลความรู้สึก
      description: อธิบายผลทางประสาทสัมผัสเพิ่มเติมใดๆ ที่ได้รับจากสารหล่อลื่น (เช่น
        ความอุ่น ความเสียวซ่าน)
    sensor/measuring_tool_features:
      name: คุณลักษณะของเซ็นเซอร์/เครื่องมือวัด
      description: อธิบายลักษณะเฉพาะของเซนเซอร์หรือเครื่องมือวัด เช่น แบบพกพาหรือสมาร์ท
    sensor_features:
      name: คุณลักษณะของเซ็นเซอร์
      description: อธิบายคุณลักษณะของเซนเซอร์ของผลิตภัณฑ์ เช่น ไฟแบ็คไลท์หรือกล้องในตัว
    sensor_type:
      name: ประเภทเซนเซอร์
      description: ระบุประเภทของเซ็นเซอร์ที่ใช้ในอุปกรณ์รักษาความปลอดภัยหรืออุปกรณ์นิรภัย
        เช่น อินฟราเรด อัลตราโซนิก
    sensory_effect:
      name: ผลทางประสาทสัมผัส
      description: ระบุความรู้สึกทางกายภาพที่ได้รับโดยตรงเมื่อใช้ผลิตภัณฑ์
    sequin/glitter_shape:
      name: รูปร่างเลื่อม/แวววาว
      description: อธิบายลักษณะของเลื่อมหรือกลิตเตอร์ เช่น กลมหรือสี่เหลี่ยม
    sequin_shape:
      name: รูปร่างเลื่อม
      description: ระบุรูปทรงของเลื่อม เช่น ทรงกลมหรือดอกไม้
    serum_target_areas:
      name: บริเวณเป้าหมายของเซรั่ม
      description: ระบุบริเวณที่กำหนดให้ใช้เซรั่ม เช่น ดวงตาหรือใบหน้า
    service_type:
      name: ประเภทบริการ
      description: ระบุหมวดหมู่ของบริการคลาวด์ เช่น Platform as a service (PaaS) หรือ
        Software as a service (SaaS)
    sewing_foot_type:
      name: ประเภทตีนผี
      description: ระบุสไตล์การเย็บ เช่น การร้อยลูกปัดหรือขอบตะเข็บซ่อน
    sewing_machine_part_category:
      name: หมวดหมู่ชิ้นส่วนจักรเย็บผ้า
      description: จำแนกประเภทของส่วนประกอบของจักรเย็บผ้า เช่น สายพานมอเตอร์หรือตีนผีจักร
    sfx_control_technology:
      name: เทคโนโลยีการควบคุม SFX
      description: ระบุวิธีการทำงานของอุปกรณ์เอฟเฟกต์พิเศษ เช่น DMX หรือการเปิดใช้งานด้วยเสียง
    shaft_color:
      name: สีเพลา
      description: ระบุสีของด้ามบนสิ่งของต่างๆ เช่น ลูกสูบ เช่น สีเงินหรือสีแดง
    shaft_flex:
      name: เพลาเฟล็กซ์
      description: ระบุระดับความยืดหยุ่นของก้านไม้กอล์ฟ เช่น แข็ง สุภาพสตรี
    shaft_material:
      name: วัสดุเพลา
      description: ระบุวัสดุที่ใช้ในด้ามเครื่องมือ เช่น ไม้หรือโลหะ
    shaft_orientation:
      name: การวางแนวเพลา
      description: ระบุทิศทางของเพลาในเครื่องยนต์ขนาดเล็ก เช่น แนวนอนหรือแนวตั้ง
    shaft_pattern:
      name: รูปแบบเพลา
      description: ระบุลวดลายที่มองเห็นได้บนด้ามของผลิตภัณฑ์ โดยทั่วไปใช้กับก้านปรับแรงกด
        เช่น ลายใบไม้ ลายนก
    shampoo/conditioner_effect:
      name: ผลของแชมพู/ครีมนวดผม
      description: อธิบายผลลัพธ์ที่ต้องการจากการใช้แชมพูหรือครีมนวดผม เช่น ป้องกันรังแคหรือเพิ่มความชุ่มชื้น
    shampoo/conditioner_items_included:
      name: รวมรายการแชมพู/ครีมนวดผม
      description: ระบุประเภทของรายการผลิตภัณฑ์ที่รวมอยู่ในชุดแชมพูและครีมนวดผม เช่น
        แชมพูแบบ 2 in 1
    shampoo_type:
      name: ประเภทแชมพู
      description: แบ่งประเภทแชมพูตามสูตรการผลิต เช่น แบบผงหรือทูอินวัน
    shape:
      name: รูปร่าง
      description: อธิบายรูปแบบหรือรูปทรงทางเรขาคณิตของสินค้า เช่น ทรงกลมหรือรูปหัวใจ
    shapewear_support_level:
      name: ระดับการรองรับของชุดกระชับสัดส่วน
      description: ระบุระดับการกระชับตัวของเสื้อผ้ากระชับสัดส่วน เช่น ระดับ 1
    shaving_cream_formulation:
      name: สูตรครีมโกนหนวด
      description: ระบุเนื้อสัมผัสของครีมโกนหนวด เช่น เจลหรือโฟม
    shaving_kit_components:
      name: ส่วนประกอบชุดโกนหนวด
      description: ระบุรายการที่รวมอยู่ในชุดโกนหนวด เช่น มีดโกนหรือแปรง
    sheen/gloss_level:
      name: ระดับความแวววาว/ความเงา
      description: ระบุระดับความเงางามของสีหรือผลิตภัณฑ์เคลือบเงา เช่น กึ่งเงาหรือซาติน
    sheet_color:
      name: สีแผ่น
      description: ระบุสีของผลิตภัณฑ์กระดาษ เช่น สีขาว สีฟ้า
    sheet_mask_material:
      name: วัสดุมาสก์แผ่น
      description: ระบุวัสดุหรือซับสเตรตหลักของมาสก์แผ่นหรือไฮโดรเจล
    sheet_pattern:
      name: รูปแบบแผ่น
      description: 'อธิบายการออกแบบหรือลายพิมพ์บนผลิตภัณฑ์กระดาษ เช่น ลายสก๊อตหรือสีรุ้ง '
    shelf_color:
      name: สีชั้นวาง
      description: อธิบายสีของชั้นวางผลิตภัณฑ์ เช่น สีเบจหรือสีดำ
    shelf_material:
      name: วัสดุสำหรับชั้นวาง
      description: ระบุประเภทของวัสดุที่ใช้ในการก่อสร้างชั้นวาง เช่น ไม้หรือโลหะ
    shelf_pattern:
      name: รูปแบบชั้นวาง
      description: อธิบายการออกแบบหรือลวดลายบนชั้นวางสินค้าอุตสาหกรรม เช่น แนวแอบสแตรกต์หรือรูปตัววี
    shell/frame_color:
      name: สีของเปลือก/กรอบ
      description: ระบุสีของเปลือกหรือโครงภายนอกในผลิตภัณฑ์จำพวกรองเท้าสเก็ตหรือหมวกกันน็อค
        เช่น สีดำ สีน้ำเงิน
    shell/frame_material:
      name: วัสดุที่ใช้ทำเปลือก/กรอบ
      description: ระบุส่วนประกอบของโครงภายนอกหรือโครงของผลิตภัณฑ์ โดยทั่วไปใช้กับโรลเลอร์หรืออินไลน์สเก็ต
        เช่น ยาง คอมโพสิต
    shell/frame_pattern:
      name: รูปแบบของเปลือก/กรอบ
      description: อธิบายการออกแบบหรือการพิมพ์บนเปลือกหรือโครงของผลิตภัณฑ์ โดยทั่วไปใช้กับรองเท้าอินไลน์สเก็ต
    shingle/tile_material:
      name: วัสดุที่ใช้ทำแผ่นมุงหลังคา/กระเบื้อง
      description: ระบุองค์ประกอบของงูสวัดหรือกระเบื้องมุงหลังคา เช่น ซีเมนต์หรือยาง
    shoe_binding_type:
      name: ประเภทการผูกรองเท้า
      description: ระบุกลไกที่ใช้ในการยึดรองเท้าเข้ากับอุปกรณ์ เช่น Step-in หรือ Speed
        Entry
    shoe_features:
      name: คุณลักษณะของรองเท้า
      description: ระบุลักษณะพิเศษของรองเท้า เช่น กันน้ำหรือน้ำหนักเบา
    shoe_fit:
      name: พอดีกับรองเท้า
      description: ระบุความกว้างของรองเท้า เช่น หน้าแคบหรือหน้ากว้าง
    shoe_size:
      name: ขนาดรองเท้า
      description: ใช้เพื่อระบุขนาดของรองเท้า เช่น ขนาดใหญ่พิเศษ (XL), 9.5
    shooting_modes:
      name: โหมดการถ่ายภาพ
      description: ระบุการตั้งค่าการทำงานของกล้อง เช่น โหมดฉากหรือภาพยนตร์
    shopping_bag_material:
      name: วัสดุที่ใช้ทำถุงช้อปปิ้ง
      description: ระบุประเภทของวัสดุที่ใช้ในถุงช้อปปิ้ง เช่น กระดาษ วัสดุที่ย่อยสลายได้ทางชีวภาพ
    shower_base_design:
      name: การออกแบบฐานฝักบัว
      description: ระบุการออกแบบฐานฝักบัว เช่น เชิงมุมหรือควอแดรนท์
    shower_cap_lining_material:
      name: วัสดุซับในหมวกอาบน้ำ
      description: ระบุวัสดุที่ใช้บนซับในที่สัมผัสผม ซึ่งส่งผลต่อความสบาย สุขภาพเส้นผม
        และการควบคุมผมหยิก
    shower_curtain_mounting_type:
      name: ประเภทการติดตั้งม่านอาบน้ำ
      description: ระบุวิธีการติดม่านห้องน้ำ เช่น วงแหวนหรือแหวน
    shower_design:
      name: การออกแบบฝักบัว
      description: ระบุการกำหนดค่าคอกและชุดอาบน้ำ เช่น แบบซุ้มหรือเข้ามุม
    shower_features:
      name: คุณลักษณะของฝักบัว
      description: อธิบายองค์ประกอบที่เป็นเอกลักษณ์ของฝักบัว เช่น ที่นั่งในตัวหรือฝักบัวแบบถือ
    shower_opening_type:
      name: ประเภทเปิดฝักบัว
      description: ระบุรูปแบบการเปิดประตูห้องอาบน้ำ เช่น แบบบานพับหรือบานเลื่อน
    shrink_ratio:
      name: อัตราส่วนการหดตัว
      description: ระบุอัตราการหดตัวของท่อหดด้วยความร้อน เช่น 2:1
    shutter_finish:
      name: การตกแต่งผิวหน้าต่างบานเกล็ด
      description: อธิบายการตกแต่งพื้นผิวของบานประตูหน้าต่าง เช่น ทาสีหรือลงสีรองพื้น
    side_panel_style:
      name: รูปแบบแผงข้าง
      description: อธิบายรูปแบบหรือวัสดุของแผงข้างหลัก (เช่น หน้าต่างกระจกนิรภัย,
        ตาข่าย, เหล็กทึบ)
    siding_material:
      name: วัสดุที่ใช้ทำไซดิ้ง
      description: ระบุประเภทของวัสดุที่ใช้ในผลิตภัณฑ์ผนัง เช่น ไม้หรือไวนิล
    signal_path_technology:
      name: เทคโนโลยีเส้นทางสัญญาณ
      description: ระบุโครงสร้างวงจรหลัก (เช่น หลอด, โซลิดสเตต, ไฮบริด) ที่กำหนดลักษณะเสียงของแชนเนลสตริป
    signal_technology:
      name: เทคโนโลยีสัญญาณ
      description: ระบุเทคโนโลยีไร้สายหรือข้อมูลหลักที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อขยายหรือต่อสัญญาณ
    signal_types_blocked:
      name: ประเภทสัญญาณที่บล็อก
      description: แสดงรายการสัญญาณไร้สายหรือแม่เหล็กไฟฟ้าเฉพาะที่ผลิตภัณฑ์ ได้รับการออกแบบมาเพื่อบล็อกหรือป้องกัน
    signature_placement:
      name: ตำแหน่งลายเซ็น
      description: ระบุว่าลายเซ็นอยู่ที่ใดบนของสะสม เช่น ด้านหน้าหรือหลายที่
    silencer/blimp_type:
      name: ประเภทท่อเก็บเสียง/เรือเหาะ
      description: ระบุชนิดของอุปกรณ์กันเสียงสำหรับกล้อง เช่น อุปกรณ์ครอบเลนส์กันเสียง
    sim_card_capability:
      name: ความสามารถของซิมการ์ด
      description: ระบุประเภทของการกำหนดค่าซิมการ์ดในอุปกรณ์เคลื่อนที่ เช่น แบบคู่
        แบบฝัง
    sim_card_type:
      name: ประเภทซิมการ์ด
      description: ระบุขนาดและรูปแบบของซิมการ์ด เช่น eSIM หรือ microSIM
    sim_card_type_1:
      name: ประเภทซิมการ์ด 1
      description: ระบุรูปแบบซิมการ์ดที่รองรับสำหรับช่องที่ 1 ของโทรศัพท์มือถือ เช่น
        นาโนซิม
    sim_card_type_2:
      name: ประเภทซิมการ์ด 2
      description: ระบุรูปแบบซิมการ์ดที่รองรับสำหรับช่องที่ 2 ของโทรศัพท์มือถือ เช่น
        นาโนซิม
    sink_mounting_type:
      name: ประเภทการติดตั้งอ่างล้างหน้า
      description: ระบุวิธีการติดตั้งอ่างล้างจาน เช่น เคาน์เตอร์ แบบแขวนผนัง
    sink_shape:
      name: รูปร่างอ่างล้างหน้า
      description: ระบุการออกแบบทางเรขาคณิตของอ่างล้างจาน เช่น รูปไข่หรือสี่เหลี่ยม
    sink_type:
      name: ประเภทอ่างล้างหน้า
      description: ระบุการออกแบบอ่างล้างจานหรืออ่างล้างจานอเนกประสงค์ เช่น อ่างครึ่งหลุม
    sinker_material:
      name: วัสดุที่ใช้ทำซิงค์เกอร์
      description: ระบุองค์ประกอบของทุ่นตกปลา เช่น ตะกั่วหรือสังกะสี
    size:
      name: ขนาด
      description: ใช้เพื่อระบุขนาดของสินค้า เช่น 0-3 เดือน หรือ ใหญ่พิเศษ (XL)
    skate_shape:
      name: รูปร่างแผ่นรอง
      description: อธิบายรูปแบบทางกายภาพของแผ่นรองที่มาในแพ็คเกจ
    skateboarding_style:
      name: สไตล์ของการสเกตบอร์ด
      description: ระบุประเภทของสเก็ตบอร์ดที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ เช่น
        ฟรีสไตล์หรือออฟโรด
    ski_construction:
      name: โครงสร้างของสกี
      description: ระบุประเภทของโครงสร้างสกี เช่น Hybrid Cap หรือ Partial Cap
    skiing_style:
      name: สไตล์ของการเล่นสกี
      description: จำแนกผลิตภัณฑ์ตามเทคนิคและสไตล์การเล่นสกี เช่น ดาวน์ฮิลล์หรือนอร์ดิก
    skill_level:
      name: ระดับทักษะ
      description: ระบุความสามารถที่จำเป็นในการใช้ผลิตภัณฑ์ เช่น ผู้เริ่มต้นหรือผู้เชี่ยวชาญ
    skin_care_effect:
      name: ผลการดูแลผิว
      description: ระบุคุณประโยชน์ที่กำหนดไว้ของผลิตภัณฑ์ดูแลผิว เช่น ลดเลือนริ้วรอย
        ช่วยให้ริมฝีปากอวบอิ่ม
    skin_care_features:
      name: คุณลักษณะของผลิตภัณฑ์ดูแลผิว
      description: ระบุถึงคุณประโยชน์ของผลิตภัณฑ์ดูแลผิว เช่น การติดทนนานหรือการป้องกันรังสี
        UVA/UVB
    skin_care_mask_type:
      name: ประเภทมาส์กบำรุงผิว
      description: ระบุประเภทของมาสก์ดูแลผิว เช่น แบบโคลนหรือแบบลอกออก
    skin_care_tool_features:
      name: คุณสมบัติเครื่องมือดูแลผิว
      description: เน้นคุณสมบัติการทำงานหรือความสะดวกที่โดดเด่นของเครื่องมือ (เช่น
        กันน้ำ ปรับความเข้มได้)
    skin_tone:
      name: สีผิว
      description: จับคู่ผลิตภัณฑ์ให้เข้ากับสีผิวเฉพาะ เช่น ผิวสีน้ำผึ้ง ผิวสีอ่อน
    skin_undertone:
      name: อันเดอร์โทนผิว
      description: ช่วยจับคู่ผลิตภัณฑ์ให้เข้ากับอันเดอร์โทนของผิว เช่น สีโทนกลาง สีโทนอุ่น
    skirt/dress_length_type:
      name: ประเภทความยาวของกระโปรง/ชุดเดรส
      description: ระบุความยาวของกระโปรงหรือเดรส เช่น มินิหรือแมกซี่
    skirt_style:
      name: สไตล์กระโปรง
      description: อธิบายดีไซน์หรือการตัดเย็บของกระโปรง เช่น ทรงดินสอหรือทรงพลีท
    slat_color:
      name: สีของบานเกล็ด
      description: ระบุสีของระแนงในฐานรองที่นอน เช่น สีเบจหรือสีดำ
    slat_material:
      name: วัสดุสำหรับไม้ระแนง
      description: ระบุประเภทของวัสดุที่ใช้ในเตียงหรือระแนงเฟอร์นิเจอร์ เช่น ไม้หรือไม้สน
    slat_pattern:
      name: รูปแบบของบานเกล็ด
      description: ระบุลวดลายที่มองเห็นบนแผ่นระแนงในผลิตภัณฑ์จำพวกฐานรองที่นอน เช่น
        ลายทาง ลายดอกไม้
    sleeve_length_type:
      name: ประเภทความยาวแขนเสื้อ
      description: ระบุสไตล์แขนเสื้อสำหรับรายการเสื้อผ้า เช่น แขนสั้นหรือแขนกุด
    sleeving_style:
      name: รูปแบบปลอก
      description: จำแนกการสร้างหรือการออกแบบโครงสร้างของปลอก (เช่น ถัก, เกลียว, หดความร้อน)
    slip_texture:
      name: พื้นผิวลื่น
      description: อธิบายลักษณะของสลิปเคลือบเครื่องปั้นดินเผา เช่น ปานกลางหรือเรียบ
    slipper_style:
      name: สไตล์สลิปเปอร์
      description: ระบุสไตล์ของรองเท้าสลิปเปอร์ เช่น ทรงนักบัลเลต์หรือรองเท้า Flip-flop
    slot_machine_type:
      name: ประเภทสล็อตแมชชีน
      description: ระบุรูปแบบของสล็อตแมชชีน เช่น แบบแปลกใหม่หรือแบบดั้งเดิม
    small_animal_dietary_requirements:
      name: ข้อกำหนดด้านอาหารสำหรับสัตว์เล็ก
      description: ระบุอาหารพิเศษสำหรับสัตว์ขนาดเล็ก เช่น สูตรควบคุมปัญหาก้อนขนหรือสูตรดูแลไต
    small_animal_food_form:
      name: รูปแบบอาหารสำหรับสัตว์เล็ก
      description: ระบุรูปแบบของอาหารสัตว์ขนาดเล็ก เช่น แบบสด หญ้าแห้ง
    small_animal_food_ingredients:
      name: ส่วนผสมของอาหารสำหรับสัตว์เล็ก
      description: ระบุส่วนประกอบหลักในอาหารสัตว์ขนาดเล็ก เช่น ถั่วอัลฟัลฟาหรือข้าวบาร์เลย์
    small_animal_habitat/cage_type:
      name: ประเภทที่อยู่/กรงสำหรับสัตว์เล็ก
      description: ระบุประเภทของที่อยู่อาศัยหรือกรงของสัตว์ขนาดเล็ก เช่น กรงหรือตู้ปลา
    smart_glasses_features:
      name: คุณสมบัติแว่นตาอัจฉริยะ
      description: แสดงรายการความสามารถในตัวที่โดดเด่น (เช่น จอแสดง AR, การควบคุมแบบสัมผัส,
        เสียงผ่านกระดูก)
    smart_tv_platform:
      name: แพลตฟอร์มสมาร์ททีวี
      description: ระบุแพลตฟอร์มซอฟต์แวร์ที่ใช้โดยสมาร์ททีวี เช่น Android หรือ Roku
        TV
    smart_watch_features:
      name: คุณลักษณะของนาฬิกาสมาร์ทวอช
      description: อธิบายความสามารถของนาฬิกาอัจฉริยะ เช่น แบบติดตามกิจกรรมออกกำลังกายหรือกันน้ำ
    sneaker_style:
      name: สไตล์รองเท้าผ้าใบ
      description: ระบุดีไซน์หรือประเภทของรองเท้าสนีกเกอร์ เช่น แบบสำหรับนักกีฬาหรือแบบหุ้มข้อสูง
    snorkel_shape:
      name: รูปร่างของสนอร์เกิล
      description: อธิบายรูปทรงของอุปกรณ์ดำน้ำตื้น เช่น รูปตัว J หรือแบบยืดหยุ่น
    snowboard_construction:
      name: โครงสร้างของสโนว์บอร์ด
      description: ระบุรูปแบบโครงสร้างของสโนว์บอร์ด เช่น แคมเบอร์หรือร็อคเกอร์
    snowboard_design:
      name: การออกแบบสโนว์บอร์ด
      description: ระบุรูปร่างและสไตล์ของสโนว์บอร์ด เช่น Twin Tip หรือ Directional
        Twin
    snowboarding_style:
      name: สไตล์การสโนว์บอร์ด
      description: ระบุประเภทของการเล่นสโนว์บอร์ดที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ
        เช่น Backcountry หรือ Freeriding
    snowmobile_type:
      name: ประเภทสโนว์โมบิล
      description: ระบุวัตถุประสงค์การใช้งานหรือการออกแบบรถสโนว์โมบิล เช่น อเนกประสงค์หรือสำหรับการเดินทาง
    soap_making_method:
      name: วิธีการทำสบู่
      description: ระบุกระบวนการผลิตหลักที่ใช้ในการสร้างสบู่ก้อน
    socket_driver_tip:
      name: ปลายหัวไขควงหัวบ็อกซ์
      description: ระบุประเภทของปลายบนไขควงหัวบ็อกซ์ เช่น แบบสี่เหลี่ยมหรือหกเหลี่ยม
    socket_type:
      name: ประเภทซ็อกเก็ต
      description: ระบุประเภทของซ็อกเก็ตในปลั๊กไฟ เช่น USB หรืออีเทอร์เน็ต
    soda_maker_accessories_included:
      name: อุปกรณ์สำหรับเครื่องทำน้ำอัดลมที่รวมอยู่
      description: ระบุสิ่งของเพิ่มเติมที่มาพร้อมกับเครื่องทำโซดา เช่น ขวดแบบใช้ซ้ำได้หรือไซรัป
    soda_variety:
      name: ลักษณะโซดา
      description: จำแนกผลิตภัณฑ์โซดาตามประเภทหรือรสชาติ เช่น รสมะนาวผสม รสส้ม
    sofa_features:
      name: คุณลักษณะของโซฟา
      description: อธิบายลักษณะพิเศษของโซฟา เช่น ที่วางแขนแบบปรับได้ หรือเป็นมิตรกับสัตว์เลี้ยง
    softball_discipline:
      name: รูปแบบกีฬาซอฟท์บอล
      description: 'ระบุประเภทของซอฟท์บอลโดยเฉพาะ เช่น ฟาสต์พิตช์หรือสโลว์พิตช์ '
    softbox_mounting_type:
      name: ประเภทการติดตั้งซอฟต์บ็อกซ์
      description: ระบุความเข้ากันได้ของซอฟต์บ็อกซ์กับระบบไฟส่องสว่างต่างๆ เช่น Elinchrom
        หรือ Profoto
    softbox_shape:
      name: รูปร่างซอฟต์บ็อกซ์
      description: ระบุรูปทรงเรขาคณิตของซอฟต์บ็อกซ์ เช่น สี่เหลี่ยมหรือแปดเหลี่ยม
    software_features:
      name: คุณลักษณะของซอฟต์แวร์
      description: ระบุฟังก์ชันการทำงานที่สำคัญของผลิตภัณฑ์ซอฟต์แวร์ เช่น การปกป้องความเป็นส่วนตัวหรือการสำรองข้อมูลอัตโนมัติ
    software_tool_type:
      name: ประเภทเครื่องมือซอฟต์แวร์
      description: จำแนกประเภทประเภทของเครื่องมือพัฒนาซอฟต์แวร์ เช่น โปรแกรมแก้ไขซอร์สโค้ดหรือระบบควบคุมเวอร์ชัน
    softwood_lumber_grade:
      name: เกรดไม้อัดเนื้ออ่อน
      description: ระบุคุณภาพของไม้เนื้ออ่อน เช่น ไม้เกรด C คัดพิเศษ หรือเบอร์ 1
    solar_cell_type:
      name: ประเภทเซลล์แสงอาทิตย์
      description: ระบุเทคโนโลยีโซลาร์เซลล์ เช่น ฟิล์มบางหรือซิลิคอนชนิดโมโนคริสตัลไลน์
    solar_panel_connections:
      name: การเชื่อมต่อแผงโซลาร์เซลล์
      description: ระบุขั้วต่อที่ใช้กับแผงโซลาร์เซลล์ เช่น ปากคีบจระเข้หรือขั้วต่อ
        DC
    solar_panel_design:
      name: การออกแบบแผงโซลาร์เซลล์
      description: อธิบายรูปแบบการติดตั้งแผงโซลาร์เซลล์ เช่น แบบตั้งพื้นหรือแบบติดหลังคา
    solder/flux_application:
      name: การใช้งานบัดกรี/ฟลักซ์
      description: ระบุพื้นที่การใช้งานสำหรับผลิตภัณฑ์บัดกรี/น้ำยาประสาน เช่น อุปกรณ์อิเล็กทรอนิกส์
        ระบบท่อประปา
    soleplate_type:
      name: ประเภทแผ่นความร้อน
      description: ระบุประเภทของแผ่นความร้อนที่ใช้ในเตารีด เช่น เซรามิกหรือสแตนเลส
    solubility:
      name: ความสามารถในการละลาย
      description: ระบุว่าผลิตภัณฑ์จะละลายในของเหลวได้ดีเพียงใด เช่น ไม่ละลายน้ำ ละลายได้บางส่วน
    solution_type:
      name: ประเภทสารละลาย
      description: ระบุประเภทของสารละลายสำหรับผลิตภัณฑ์ดูแลสายตา เช่น น้ำเกลือหรือไฮโดรเจนเปอร์ออกไซด์
    solvent/thinner_application:
      name: การใช้งานสารตัวทำละลาย/ทินเนอร์
      description: ระบุวัสดุเคลือบหรือวัสดุติดยึดที่ผลิตภัณฑ์ได้รับการออกแบบให้ทำละลายหรือทำให้จาง
        เช่น อีพ็อกซี่ สี
    solvent_application:
      name: การใช้งานสารตัวทำละลาย
      description: ระบุวัสดุเคลือบหรือวัสดุติดยึดที่ผลิตภัณฑ์ได้รับการออกแบบให้ทำละลาย
        เช่น อีพ็อกซี่ สี
    sonar_imaging_modes:
      name: โหมดภาพโซนาร์
      description: ระบุเทคโนโลยีมุมมองโซนาร์ที่เครื่องหาปลารองรับ
    soothing_sounds:
      name: เสียงที่ผ่อนคลาย
      description: ระบุความหลากหลายของเสียงผ่อนคลายที่นำเสนอ เช่น เสียงหัวใจเต้น เสียงสีขาว
    sound_controls:
      name: การควบคุมเสียง
      description: ระบุคุณลักษณะการควบคุมเสียงบนเครื่องดนตรีหรือเครื่องขยายเสียง เช่น
        เสียงสะท้อน อีควอไลเซอร์
    sound_effects:
      name: เสียงประกอบ
      description: ระบุประเภทของเอฟเฟกต์เสียง โดยทั่วไปใช้กับเครื่องดนตรีและอุปกรณ์เสริม
        เช่น การสวิงเสียง เสียงดีเลย์
    sound_insulation:
      name: ฉนวนกันเสียง
      description: ระบุความสามารถในการกันเสียงของผลิตภัณฑ์ เช่น แบบอะคูสติกหรือไม่ได้หุ้มฉนวน
    sound_options:
      name: ตัวเลือกเสียง
      description: ระบุตัวเลือกเสียงต่างๆ ที่ใช้ได้ โดยทั่วไปใช้กับเครื่องเมโทรโนม
        เช่น ตัวนับจังหวะเสียง เสียงคลิก
    speaker_configuration:
      name: การกำหนดค่าลำโพง
      description: อธิบายการติดตั้งลำโพง โดยทั่วไปใช้กับตู้แอมป์เครื่องดนตรี เช่น
        แบบปิด
    speaker_design:
      name: การออกแบบลำโพง
      description: ระบุการออกแบบทางกายภาพและการทำงานของลำโพง เช่น ซับวูฟเฟอร์หรือทาวเวอร์
    speaker_enclosure_type:
      name: ประเภทตู้ลำโพง
      description: อธิบายหลักการตู้อะคูสติกที่ตู้ลำโพงใช้
    speaker_features:
      name: คุณลักษณะของลำโพง
      description: ระบุความสามารถพิเศษของลำโพงเสียง เช่น การตัดเสียงรบกวนหรือการควบคุมเสียง
    speaker_position_in_laptop:
      name: ตำแหน่งลำโพงในแล็ปท็อป
      description: ระบุว่าชุดลำโพงติดตั้งอยู่ที่ใดภายในแล็ปท็อป
    speaker_technology:
      name: เทคโนโลยีลำโพง
      description: ระบุเทคโนโลยีที่ใช้ในการออกแบบลำโพง เช่น ไดนามิก ไฟฟ้าสถิต
    speakerphone_type:
      name: ประเภทสปีกเกอร์โฟน
      description: ระบุการทำงานของสปีกเกอร์โฟนในยานพาหนะ เช่น แบบไร้สายหรือแฮนด์ฟรี
    speed_settings:
      name: การตั้งค่าความเร็ว
      description: ระบุตัวเลือกระดับความเร็วสำหรับผลิตภัณฑ์ เช่น ระดับเดียว ปรับได้
    spf_level:
      name: ระดับ SPF
      description: ระบุระดับการป้องกัน UVB ที่ผลิตภัณฑ์นำเสนอ เช่น SPF 50
    spike_design:
      name: การออกแบบเดือยแหลม
      description: ระบุลักษณะของหมุด เช่น เต็นท์หรือผ้าสำหรับงานจัดสวน
    spinner_type:
      name: ประเภทเครื่องปั่น
      description: ระบุจำนวนล้อบนกระเป๋าเดินทางหรือกระเป๋าเสื้อผ้า เช่น 2 ล้อ หรือ
        4 ล้อ
    spirit_dilution:
      name: การเจือจางเหล้า
      description: ระบุระดับความเข้มข้นของเหล้าสปิริต เช่น เจือจางหรือไม่เจือจาง
    splint/stay_configuration:
      name: การกำหนดค่าเฝือก/สเตย์
      description: อธิบายการมีอยู่และประเภทของสเตย์แข็งหรือกึ่งแข็งหรือเฝือกที่ใช้ในเฝือก
    splitter/switch_features:
      name: คุณลักษณะของตัวแยกสัญญาณ/สวิตช์
      description: อธิบายความสามารถของตัวแยกหรือสวิตช์เสียง/วิดีโอ เช่น รองรับ 3 มิติ
        หรือการแยกเสียง
    splitter_use:
      name: การใช้ตัวแยกสัญญาณ
      description: ระบุประเภทการเชื่อมต่อที่ตัวแยกสัญญาณรองรับ เช่น HDMI หรืออีเทอร์เน็ต
    sponge_shape:
      name: รูปร่างฟองน้ำ
      description: อธิบายรูปทรงของฟองน้ำ โดยทั่วไปใช้สำหรับการแต่งหน้า เช่น ทรงโค้งมน
        ทรงหยดน้ำ
    spool_color:
      name: สีของสปูล
      description: ระบุสีของสปูลในรอกตกปลา เช่น สีใสหรือสีเขียว
    spool_material:
      name: วัสดุสำหรับสปูล
      description: ระบุวัสดุที่ใช้ในหลอดเก็บสายของรอกสปินนิ่ง เช่น พลาสติกหรือกราไฟท์
    spool_pattern:
      name: รูปแบบของสปูล
      description: อธิบายการออกแบบหรือลวดลายบนสปูลของรอกตกปลา เช่น ลายพรางหรือสีทึบ
    sport:
      name: กีฬา
      description: ระบุกีฬาที่กำหนดให้นำสินค้านี้ไปใช้ เช่น บาสเก็ตบอลหรือสกี
    sports_logo:
      name: โลโก้กีฬา
      description: ระบุตราสินค้าหรือเครื่องราชอิสริยาภรณ์บนรายการต่างๆ เช่น NBA, NFL
        หรือสโมสรฟุตบอล
    sports_theme:
      name: ธีมกีฬา
      description: ระบุกีฬาเฉพาะที่เกี่ยวข้องกับผลิตภัณฑ์ เช่น เบสบอลหรือฟุตบอล
    spout_type:
      name: ประเภทพวยกา
      description: ระบุประเภทของพวยกา ซึ่งโดยทั่วไปสำหรับถ้วยหัดดื่ม เช่น แบบหลอดดูด
        แบบอ่อน
    spray_purpose:
      name: วัตถุประสงค์ของสเปรย์
      description: ระบุการใช้งานหลักที่ตั้งใจไว้ของมิสต์ใบหน้า (เช่น เซ็ต ไพรมมิ่ง
        ให้ความชุ่มชื้น)
    spreader_type:
      name: ประเภทเครื่องกระจาย
      description: ระบุหมวดหมู่ของยางสามแฉกสำหรับขาตั้งกล้อง เช่น บนพื้นหรือระดับกลาง
    sprinkler_head_type:
      name: ประเภทหัวสปริงเกอร์
      description: ระบุรูปแบบของละอองน้ำ เช่น ทรงกรวย เจ็ท
    sprinkler_shape:
      name: รูปร่างสปริงเกอร์
      description: อธิบายลักษณะของสปริงเกอร์ของเล่น เช่น กลม หรือ สี่เหลี่ยม
    squeegee_blade_design:
      name: การออกแบบใบมีดยางปาดสี
      description: อธิบายรูปทรงของยางรีดน้ำ เช่น ขอบตรงหรือขอบมน
    stack_configuration:
      name: การกำหนดค่าสแต็ก
      description: ระบุโครงร่างของเซลล์เชื้อเพลิงในอุปกรณ์กำลัง เช่น อนุกรม และขนาน
    stage:
      name: เวที
      description: ระบุความเหมาะสมของผลิตภัณฑ์สำหรับระยะพัฒนาการ โดยทั่วไปจะเป็นผลิตภัณฑ์สำหรับเด็ก
        เช่น ทารกแรกเกิด ระยะที่ 1
    stair_lifts_control_type:
      name: ประเภทการควบคุมลิฟท์บันได
      description: ระบุประเภทการควบคุมที่ใช้สำหรับเก้าอี้เลื่อนขึ้นบันได เช่น รีโมทแบบพกพาหรือสวิตช์ติดผนัง
    staircase_features:
      name: คุณลักษณะของบันได
      description: เน้นลักษณะเฉพาะของบันได เช่น บั้งขึ้นแบบเปิดหรือแท่นพักบันได
    staircase_type:
      name: ประเภทบันได
      description: ระบุการออกแบบบันได เช่น โค้ง กลางแจ้ง
    stamp_theme:
      name: ธีมแสตมป์
      description: ระบุหัวเรื่องหรือธีมการออกแบบของแสตมป์ เช่น สัตว์หรือประวัติศาสตร์
    stamp_type:
      name: ประเภทแสตมป์
      description: ระบุประเภทของตราประทับในสำนักงาน เช่น แบบดั้งเดิมหรือแบบหมึกในตัว
    stand/display_type:
      name: ประเภทขาตั้ง/จอแสดงผล
      description: อธิบายสไตล์ของขาตั้งหรือตู้โชว์สำหรับของสะสม เช่น ยึดกับผนังหรือตั้งโต๊ะ
    staple_wire_gauge:
      name: เกจวัดลวดเย็บกระดาษ
      description: ระบุความหนาของลวดที่ใช้ในลวดเย็บกระดาษ เช่น ปานกลางหรือแบบใช้งานหนัก
    stapler_features:
      name: คุณลักษณะของเครื่องเย็บกระดาษ
      description: อธิบายลักษณะพิเศษของเครื่องเย็บกระดาษ เช่น การทำงานแบบไม่ให้ลวดเย็บค้างอยู่
    star_rating:
      name: การให้ดาว
      description: ระบุการให้ดาวของผลิตภัณฑ์ เช่น 1, 5
    start_type:
      name: ประเภทการเริ่ม
      description: ระบุวิธีการสตาร์ทเครื่องยนต์ขนาดเล็ก เช่น ใช้ไฟฟ้าหรือกระตุก
    station_type:
      name: ประเภทสถานี
      description: ระบุประเภทของสถานีชาร์จสำหรับยานพาหนะไฟฟ้า เช่น การชาร์จที่บ้านหรือที่สาธารณะ
    stationery_binding_type:
      name: ประเภทการเข้าเล่มเครื่องเขียน
      description: ระบุวิธีการที่ใช้ในการยึดหน้าต่างๆ เข้าด้วยกัน โดยทั่วไปจะใช้ในอัลบั้มภาพถ่าย
        เช่น ตะเข็บอาน
    steam_inhaler_design:
      name: การออกแบบเครื่องพ่นไอน้ำสำหรับสูดดม
      description: อธิบายสไตล์ทางกายภาพและรูปแบบความสะดวกในการพกพาของเครื่องพ่นไอน้ำสำหรับสูดดม
    stem_length:
      name: ความยาวก้าน
      description: ระบุความยาวของก้านดอกไม้ เช่น สั้น กลาง หรือยาว
    stencil/cut_shape:
      name: ลายฉลุ/ตัดเป็นรูปร่าง
      description: อธิบายรูปร่างหรือดีไซน์ของลายฉลุและไดคัต เช่น ทรงกลมหรือผีเสื้อ
    step_type:
      name: ประเภทขั้นตอน
      description: ระบุจำนวนขั้นบันไดในอุปกรณ์เชื่อมต่อและจอดเทียบ เช่น สองขั้นหรือขั้นเดียว
    sterilization_cycle_time:
      name: รอบเวลาฆ่าเชื้อ
      description: ระบุระยะเวลาที่จะต้องใช้เครื่องอบฆ่าเชื้อ โดยปกติแล้วจะใช้สำหรับผลิตภัณฑ์สำหรับเด็ก
        เช่นแบบมาตรฐาน แบบเร็ว
    sterilization_instructions:
      name: คำแนะนำในการฆ่าเชื้อ
      description: อธิบายวิธีการฆ่าเชื้อผลิตภัณฑ์ เช่น การต้มหรือสามารถเข้าไมโครเวฟได้
    sterilization_method:
      name: วิธีการฆ่าเชื้อ
      description: ระบุประเภทของกระบวนการฆ่าเชื้อที่ใช้ โดยทั่วไปจะเป็นผลิตภัณฑ์สำหรับเด็ก
        เช่น ไอน้ำ รังสียูวี
    stethoscope_design:
      name: การออกแบบหูฟังแพทย์
      description: อธิบายประเภทของหูฟังของแพทย์ เช่น แบบหัวคู่หรือหัวเดียว
    stethoscope_technology:
      name: เทคโนโลยีหูฟังแพทย์
      description: ระบุประเภทของเทคโนโลยีที่ใช้ในหูฟังของแพทย์ เช่น อิเล็กทรอนิกส์หรืออะคูสติก
    stick_material:
      name: วัสดุที่ใช้ทำก้าน
      description: ระบุองค์ประกอบของไม้เล่นกีฬา เช่น ไม้หรือคาร์บอนไฟเบอร์
    stiffness:
      name: ความแข็ง
      description: แสดงถึงความแข็งของผลิตภัณฑ์ โดยทั่วไปสำหรับรองเท้าสโนว์บอร์ด เช่น
        อ่อน, แข็ง
    stimulant_profile:
      name: โปรไฟล์สารกระตุ้น
      description: จำแนกประเภทอาหารเสริมโดยพิจารณาว่ามีสารกระตุ้นหรือไม่และมีประเภทหลักใดบ้าง
    stimulator_tip_shape:
      name: รูปร่างปลายหัวของเครื่องนวด
      description: อธิบายรูปร่างของปลายบนเครื่องนวดเหงือก เช่น ทรงกรวยหรือตัดเฉียง
    stone_material:
      name: วัสดุที่ใช้ทำหิน
      description: ระบุประเภทของหินที่ใช้ในผลิตภัณฑ์การนวด เช่น หินบะซอลต์หรือหินอ่อน
    stone_name:
      name: ชื่อหิน
      description: ระบุประเภทของหินที่ใช้ในผลิตภัณฑ์เพื่อสุขภาพและความงาม เช่น โรสควอตซ์หรือออบซิเดียน
    stone_shape:
      name: รูปร่างของหิน
      description: ระบุรูปทรงเรขาคณิตของหิน เช่น รูปหัวใจ หกเหลี่ยม
    stone_type:
      name: ประเภทหิน
      description: แยกความแตกต่างของประเภทหินในชุดเครื่องมือที่ใช้ในการทำให้ผ่อนคลาย
        เช่น หินเย็นหรือหินร้อน
    stopband:
      name: แถบหยุด
      description: ระบุช่วงความถี่ที่ตัวกรองอิเล็กทรอนิกส์ลดทอนหรือทำให้ลดลง เช่น
        ความถี่สูง
    stopwatch_features:
      name: คุณลักษณะของนาฬิกาจับเวลา
      description: เน้นคุณลักษณะของนาฬิกาจับเวลา เช่น มีไฟส่องสว่าง ฟังก์ชันหน่วยความจำ
    storage_drive_interface_type:
      name: ประเภทอินเทอร์เฟซของไดรฟ์จัดเก็บข้อมูล
      description: ระบุประเภทการเชื่อมต่อของอุปกรณ์จัดเก็บข้อมูล เช่น SATA, NVMe
    storage_drive_interfaces_supported:
      name: รอบรับไดรฟ์จัดเก็บข้อมูล
      description: ระบุอินเทอร์เฟซไดรฟ์จัดเก็บข้อมูลที่เข้ากันได้ เช่น SATA หรือ NVMe
    storage_drive_type_installed:
      name: ติดตั้งประเภทไดรฟ์จัดเก็บข้อมูลแล้ว
      description: ระบุเทคโนโลยีการจัดเก็บข้อมูล โดยทั่วไปอยู่ในระบบจัดเก็บข้อมูลเครือข่าย
        เช่น ฮาร์ดดิสก์ไดรฟ์ (HDD)
    storage_media_type:
      name: ประเภทสื่อจัดเก็บข้อมูล
      description: ระบุประเภทของสื่อจัดเก็บข้อมูลที่แท่นเชื่อมต่อฮาร์ดไดรฟ์สามารถรองรับได้
        เช่น SATA, HDD
    storage_tank_application:
      name: การใช้งานถังเก็บน้ำ
      description: ระบุสิ่งที่ถังเก็บได้รับการออกแบบเพื่อกักเก็บ เช่น เชื้อเพลิงหรือของเสีย
    storage_types_supported:
      name: รองรับประเภทพื้นที่จัดเก็บข้อมูล
      description: ระบุระบบจัดเก็บข้อมูลที่รองรับสำหรับอุปกรณ์อิเล็กทรอนิกส์ เช่น
        ฮาร์ดดิสก์ไดรฟ์ (HDD)
    stove_airflow:
      name: การไหลเวียนของอากาศในเตา
      description: ระบุการไหลเวียนอากาศของเตาเผาฟืน เช่น อากาศปฐมภูมิหรือตติยภูมิ
    stove_top_type:
      name: ประเภทเตาตั้งพื้น
      description: ระบุประเภทของเตาที่ใช้เป็นอุปกรณ์ในครัว เช่น แก๊สหรือเซรามิก
    strap_design:
      name: การออกสาย
      description: อธิบายลักษณะที่ปรากฏของสายรัดของผลิตภัณฑ์ เช่น ลายพิมพ์หรือลวดลาย
    strap_wearing_style:
      name: รูปแบบการสวมใส่สาย
      description: ระบุวิธีที่สายได้รับการออกแบบให้สวมใส่หรือพกพา
    straw/stirrer_design:
      name: การออกแบบหลอด/ที่คน
      description: อธิบายการออกแบบหรือลักษณะของหลอดหรือไม้คน เช่น แบบตรงหรือแบบยืดหยุ่น
    stretcher/gurney_intended_use:
      name: วัตถุประสงค์การใช้เปลหาม/เตียงเคลื่อนที่
      description: ระบุวัตถุประสงค์เฉพาะของเตียงเคลื่อนย้ายผู้ป่วยหรือเตียงเคลื่อนที่สำหรับย้ายคนไข้
        เช่น รถพยาบาลหรือ MRI
    string_color:
      name: สีของสาย
      description: ระบุสีของสายธนูและหน้าไม้ เช่น สีใส
    string_instrument_size:
      name: ขนาดเครื่องสาย
      description: ระบุขนาดของเครื่องสาย เช่น 3/4 หรือขนาดมาตรฐาน
    string_material:
      name: วัสดุสำหรับสาย
      description: ระบุวัสดุที่ใช้ในเครื่องสายยิงธนู เช่น Dacron หรือ Fastflight
    string_pattern:
      name: รูปแบบของสาย
      description: อธิบายการออกแบบสายธนู เช่น ลายทาง
    strip/patch_technology:
      name: เทคโนโลยีแผ่นแปะ/แพทช์
      description: อธิบายวัสดุหรือเทคโนโลยีหลักที่ใช้สำหรับแผ่นแปะหรือแพทช์รูขุมขน
    stripper_application:
      name: การใช้งานตัวลอก
      description: ระบุวัสดุเคลือบหรือวัสดุติดยึดที่ผลิตภัณฑ์ได้รับการออกแบบให้ขจัดออกหรือทำละลาย
        เช่น อีพ็อกซี่ สี
    stroller_features:
      name: คุณลักษณะของรถเข็นเด็ก
      description: ระบุลักษณะเฉพาะของรถเข็นเด็ก เช่น การออกแบบแบบพับได้หรือล้อแบบล็อคได้
    stroller_wheel_type:
      name: ประเภทล้อรถเข็นเด็ก
      description: ระบุประเภทของล้อในรถเข็นเด็ก เช่น แบบลุยทุกพื้นที่หรือแบบหมุนได้
    style:
      name: สไตล์
      description: อธิบายสไตล์ของผลิตภัณฑ์ ซึ่งโดยทั่วไปใช้สำหรับการตกแต่งหน้าต่าง
        เช่น ม่านปรับแสงแนวตั้ง ผ้าม่านจีบ
    stylus_holder_type:
      name: ประเภทที่เก็บปากกาสไตลัส
      description: ระบุว่าเคสมีที่เก็บสำหรับปากกาสไตลัสหรือไม่และที่เก็บนั้นมีรูปแบบใด
    stylus_support:
      name: การรองรับปากกาสไตลัส
      description: ระบุว่าอีรีดเดอร์รองรับปากกาดิจิทัลสำหรับการจดบันทึกหรือไม่ และมีปากกามาให้หรือไม่
    stylus_support_type:
      name: ประเภทการรองรับปากกาสไตลัส
      description: อธิบายว่าแท็บเล็ตรองรับปากกาสไตลัสหรือไม่และอย่างไร (เช่น ดิจิไทเซอร์แบบแอคทีฟ,
        คาปาซิทีฟแบบพาสซีฟ)
    stylus_technology:
      name: เทคโนโลยีปากกาสไตลัส
      description: กำหนดเทคโนโลยีพื้นฐานหรือวิธีการจ่ายพลังงานที่ปากกาสไตลัสใช้
    stylus_type:
      name: ประเภทสไตลัส
      description: ระบุรูปร่างของเข็มบนอุปกรณ์เสริมของเครื่องเล่นแผ่นเสียง เช่น ทรงกรวยหรือทรงรี
    subject_area:
      name: สาขาวิชา
      description: ระบุสาขาวิชาของเอกสารทางวิชาการหรือการศึกษา เช่น วิทยาศาสตร์หรือศิลปะ
    subscription_type:
      name: ประเภทการสมัครใช้งาน
      description: ระบุประเภทของการสมัครใช้งาน โดยทั่วไปสำหรับอุปกรณ์มือถือ เช่น จ่ายตามการใช้งาน
        ชำระเงินล่วงหน้า
    subsonic_filter:
      name: ตัวกรองซับโซนิก
      description: ระบุว่าหน่วยอุปกรณ์มีตัวกรองแบบซับโซนิกหรือแบบวาร์ปเพื่อกำจัดเสียงครืดความถี่ต่ำที่เกิดจากการบิดงอของแผ่นเสียงหรือไม่
    substrate_features:
      name: คุณลักษณะของวัสดุรองพื้น
      description: อธิบายลักษณะของพื้นผิวในตู้ปลา เช่น แบบมีการเจริญเติบโตของแบคทีเรียที่เป็นประโยชน์
        หรือมีการล้างมาเบื้องต้นแล้ว
    subwoofer_configuration:
      name: การกำหนดค่าซับวูฟเฟอร์
      description: ระบุว่ามีซับวูฟเฟอร์รวมอยู่หรือไม่และเป็นแบบในตัว แบบมีสาย หรือแบบไร้สาย
    suction_cup_color:
      name: สียางดูด
      description: ระบุสีของยางดูด เช่น สีดำหรือสีน้ำเงิน
    suction_cup_material:
      name: วัสดุยางดูด
      description: ระบุวัสดุที่ใช้ในยางดูด เช่น ยางหรือซิลิโคน
    suction_cup_pattern:
      name: รูปแบบยางดูด
      description: อธิบายการออกแบบหรือลวดลายบนยางดูดของเครื่องมือจำพวกก้านปรับแรงกด
        เช่น ลายดอกไม้ เรขาคณิต
    suction_levels:
      name: ระดับการดูด
      description: ระบุความแรงในการดูดในเครื่องปั๊มนม เช่น แบบปรับได้หรือแบบตายตัว
    suitable_for_angling_type:
      name: เหมาะสำหรับประเภทการตกปลา
      description: ระบุประเภทของการตกปลาที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ เช่น
        Deep Sea หรือ Fly
    suitable_for_animal_type:
      name: เหมาะสำหรับประเภทสัตว์
      description: ระบุประเภทของสัตว์ที่ผลิตภัณฑ์นี้ออกแบบมาเพื่อใช้งาน เช่น ม้าหรือแพะ
    suitable_for_art_technique:
      name: เหมาะสำหรับเทคนิคศิลปะ
      description: ระบุวิธีการทางศิลปะที่เหมาะกับผลิตภัณฑ์กระดาษ เช่น การวาดภาพสีน้ำ
    suitable_for_bird_type:
      name: เหมาะสำหรับประเภทนก
      description: จับคู่ผลิตภัณฑ์กับนกสายพันธุ์เฉพาะ เช่น นกคานารี นกแก้ว
    suitable_for_boat_type:
      name: เหมาะกับประเภทเรือ
      description: ระบุประเภทของเรือที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อใช้งาน เช่น
        เรือคายัคหรือแพ
    suitable_for_body/facial_hair:
      name: เหมาะกับขนตามร่างกาย/ใบหน้า
      description: ระบุว่าผลิตภัณฑ์เหมาะสำหรับขนตามร่างกายหรือบนใบหน้า
    suitable_for_breed_size:
      name: เหมาะกับขนาดสายพันธุ์
      description: ระบุขนาดสายพันธุ์ที่เหมาะสมสำหรับผลิตภัณฑ์สัตว์เลี้ยง เช่น ขนาดใหญ่หรือขนาดกลาง
    suitable_for_bug_type:
      name: เหมาะสำหรับประเภทแมลง
      description: ระบุว่าผลิตภัณฑ์ไล่แมลงชนิดใดได้บ้าง เช่น ยุง เห็บ
    suitable_for_camera/optics_device:
      name: อุปกรณ์เหมาะสำหรับกล้อง/ออปติก
      description: ระบุกล้องหรืออุปกรณ์เลนส์ที่ผลิตภัณฑ์ใช้งานร่วมกันได้ เช่น กล้องดิจิตอล
        ไม้เซลฟี่
    suitable_for_camera_type:
      name: เหมาะสำหรับประเภทกล้อง
      description: ระบุรุ่นของกล้องที่ผลิตภัณฑ์ใช้งานร่วมกันได้ เช่น SLR หรือกล้องวิดีโอ
    suitable_for_camping_activity:
      name: เหมาะสำหรับกิจกรรมแคมป์ปิ้ง
      description: ระบุความเข้ากันได้กับกิจกรรมการตั้งแคมป์ โดยทั่วไปใช้สำหรับเต็นท์
        เช่น ชายหาด การแบกเป้เที่ยว
    suitable_for_chair_type:
      name: เหมาะสำหรับประเภทของเก้าอี้
      description: ระบุประเภทเก้าอี้ที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ เช่น ม้านั่งหรือตั่ง
    suitable_for_container_type:
      name: เหมาะกับประเภทภาชนะ
      description: ระบุประเภทของบรรจุภัณฑ์ที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อใช้งาน
        เช่น ขวดหรือกระป๋อง
    suitable_for_crafting_material:
      name: วัสดุเหมาะสำหรับงานหัตถกรรม
      description: ระบุวัสดุการประดิษฐ์ที่ใช้งานร่วมกันได้กับผลิตภัณฑ์ เช่น โลหะหรือแก้ว
    suitable_for_door_type:
      name: เหมาะสำหรับประเภทประตู
      description: ระบุประเภทของประตูที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อใช้งาน เช่น
        ประตูบานคู่ หรือบานเดี่ยว
    suitable_for_egg_type:
      name: เหมาะกับประเภทไข่
      description: ระบุประเภทของไข่ที่ตู้ฟักสามารถรองรับได้ เช่น ไก่หรือเป็ด
    suitable_for_fabric_type:
      name: เหมาะสำหรับประเภทผ้า
      description: ระบุประเภทของผ้าที่เหมาะกับผลิตภัณฑ์ เช่น ผ้าใยสังเคราะห์หรือผ้าธรรมชาติ
    suitable_for_fire_class:
      name: เหมาะสำหรับคลาสการดับเพลิง
      description: ระบุว่าผลิตภัณฑ์สามารถดับไฟประเภทใดได้ เช่น A, D
    suitable_for_fish_type:
      name: เหมาะสำหรับประเภทปลา
      description: ระบุประเภทของปลาที่ผลิตภัณฑ์กำหนดไว้โดยเฉพาะ เช่น ปลาในบ่อ ปลาเขตร้อน
    suitable_for_food_processor_type:
      name: เหมาะสำหรับประเภทเครื่องเตรียมอาหาร
      description: ระบุประเภทของเครื่องเตรียมอาหารที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ
        เช่น เครื่องปั่นอาหาร
    suitable_for_furniture_type:
      name: เหมาะกับประเภทเฟอร์นิเจอร์
      description: ระบุประเภทของเฟอร์นิเจอร์ที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ
        โดยทั่วไปสำหรับผ้าสำหรับคลุมเครื่องเรือน เช่น ทั่วไป เก้าอี้นวมยาวปกติ
    suitable_for_gas_type:
      name: ประเภทที่เหมาะสำหรับแก๊ส
      description: ระบุประเภทของก๊าซที่ใช้ร่วมกับผลิตภัณฑ์ได้ เช่น โพรเพนหรือเอทานอล
    suitable_for_hair_type:
      name: เหมาะสำหรับประเภทผม
      description: ระบุความต้องการของเส้นผมที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ เช่น
        ผมหยิก เส้นเล็ก
    suitable_for_material_type:
      name: เหมาะสำหรับประเภทวัสดุ
      description: ระบุวัสดุที่เหมาะกับผลิตภัณฑ์ โดยทั่วไปใช้กับเครื่องมือ เช่น เซรามิก
        หิน
    suitable_for_pest_type:
      name: เหมาะสำหรับประเภทศัตรูพืช
      description: ระบุชนิดของสัตว์รังควานที่เป็นเป้าหมายของผลิตภัณฑ์ เช่น หนู ไวรัส
    suitable_for_pipe_type:
      name: เหมาะสำหรับประเภทท่อ
      description: ระบุประเภทของท่อที่เครื่องมือสามารถใช้ได้ เช่น PVC หรือทองแดง
    suitable_for_pool_type:
      name: เหมาะสำหรับประเภทสระน้ำ
      description: ระบุประเภทของสระน้ำที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ เช่น สระน้ำเป่าลม
        สระว่ายน้ำแบบลอย
    suitable_for_power_equipment_type:
      name: เหมาะกับประเภทอุปกรณ์ไฟฟ้า
      description: ระบุประเภทของอุปกรณ์ไฟฟ้ากลางแจ้งที่ออกแบบมาให้ใช้กับผลิตภัณฑ์
        เช่น เครื่องตัดหญ้าหรือเครื่องเป่าใบไม้
    suitable_for_precious_material:
      name: เหมาะกับวัสดุล้ำค่า
      description: ระบุว่าผลิตภัณฑ์เหมาะสมที่จะใช้งานกับวัสดุล้ำค่าหรือไม่ เช่น ทองหรือเงิน
    suitable_for_printer_type:
      name: เหมาะสำหรับประเภทเครื่องพิมพ์
      description: ระบุประเภทของเครื่องพิมพ์ที่ผลิตภัณฑ์เข้ากันได้ เช่น เครื่องพิมพ์ใบจ่าหน้า
        เครื่องแฟกซ์
    suitable_for_skin_tone:
      name: เหมาะสำหรับสีผิว
      description: จับคู่ผลิตภัณฑ์ให้เข้ากับสีผิว เช่น ผิวขาวหรือผิวคล้ำ
    suitable_for_skin_type:
      name: เหมาะสำหรับประเภทผิว
      description: ระบุผลิตภัณฑ์สำหรับสภาพผิว เช่น ผิวแห้ง มีริ้วรอย หรือแพ้ง่าย
    suitable_for_snowshoeing_activity:
      name: เหมาะสำหรับกิจกรรมเดินบนหิมะ
      description: ระบุความเข้ากันได้กับการเดินบนหิมะประเภทต่างๆ เช่น การวิ่งหรือการทำงาน
    suitable_for_storage_type:
      name: เหมาะสำหรับประเภทพื้นที่จัดเก็บ
      description: ระบุสิ่งของต่างๆ ที่ผลิตภัณฑ์สามารถจัดเก็บได้ เช่น ขยะ อุปกรณ์ทำสวน
    suitable_for_toothbrush:
      name: เหมาะสำหรับแปรงสีฟัน
      description: ระบุประเภทแปรงสีฟันที่ผลิตภัณฑ์เข้ากันได้ เช่น หัวแปรงสีฟันไฟฟ้า
    suitable_for_user_sensitivity_level:
      name: เหมาะสำหรับผู้ใช้ที่มีฟันไว
      description: ระบุว่าสูตรนี้เหมาะสำหรับผู้ใช้ที่มีอาการเสียวฟันหรือไม่
    suitable_for_vehicle_type:
      name: เหมาะสำหรับประเภทยานพาหนะ
      description: ระบุประเภทของยานพาหนะที่ใช้งานร่วมกับผลิตภัณฑ์ได้ เช่น รถยนต์หรือรถบรรทุก
    suitable_for_water_feature_type:
      name: เหมาะสำหรับประเภทคุณสมบัติน้ำ
      description: ระบุประเภทคุณลักษณะน้ำที่เหมาะกับผลิตภัณฑ์ เช่น บ่อน้ำหรือน้ำพุ
    suitable_for_water_type:
      name: เหมาะสำหรับประเภทน้ำ
      description: ระบุว่าผลิตภัณฑ์เหมาะสำหรับน้ำจืด น้ำเค็ม หรือทั้งสองอย่าง
    suitable_for_weapon_type:
      name: ประเภทเหมาะสำหรับอาวุธ
      description: ระบุประเภทของอาวุธที่ใช้กับกล้องส่องหรือศูนย์เล็ง เช่น ปืนพก ปืนลูกซอง
    suitable_installation:
      name: การติดตั้งที่เหมาะสม
      description: ระบุวิธีการติดตั้งที่เหมาะสมสำหรับผลิตภัณฑ์ เช่น เหนือพื้นดินหรือใต้พื้นดิน
    suitable_location:
      name: ตำแหน่งที่ตั้งที่เหมาะสม
      description: 'ระบุตำแหน่งที่เหมาะสมที่สุดในบ้านสำหรับผลิตภัณฑ์นี้ เช่น ห้องนอน
        ลานบ้าน '
    suitable_space:
      name: พื้นที่ที่เหมาะสม
      description: ระบุสถานที่ที่เหมาะสมที่สุดสำหรับการใช้งานสินค้า เช่น ในอาคาร บนพื้นดิน
    suitcase_handle_type:
      name: ประเภทหูหิ้วกระเป๋าเสื้อผ้า
      description: ระบุรูปแบบของที่จับกระเป๋าเดินทาง เช่น สำหรับจับด้านข้างหรือสำหรับจับด้านบน
    sulfur_content:
      name: ปริมาณซัลเฟอร์
      description: ระบุความเข้มข้นของกำมะถันในน้ำมันให้ความร้อนสำหรับใช้ในบ้าน เช่น
        ต่ำมากหรือสูง
    sunlight:
      name: แสงแดด
      description: ระบุปริมาณแสงแดดที่จำเป็นสำหรับพืช เช่น ในที่ร่มหรือแสงแดดจัด
    sunscreen_filter_type:
      name: ประเภทฟิลเตอร์ครีมกันแดด
      description: ระบุประเภทของฟิลเตอร์ยูวีที่ใช้ในสูตร (เคมี แร่ธาตุ หรือผสม)
    supplement_health_focus:
      name: จุดเน้นสุขภาพของอาหารเสริม
      description: ระบุว่าอาหารเสริมนี้มีวัตถุประสงค์เพื่อช่วยเหลือการดูแลสุขภาพหลักในมิติใดโดยเฉพาะ
    support/brace_material:
      name: วัสดุที่ใช้ทำอุปกรณ์รองรับ/ค้ำ
      description: ระบุวัสดุที่ใช้ในอุปกรณ์รองรับหรือค้ำยัน เช่น นีโอพรีนหรือโฟม
    support_cushion_features:
      name: คุณสมบัติหมอนรองรับ
      description: เน้นฟังก์ชันเสริมหรือการปรับปรุงพิเศษที่เบาะรองนั่งมอบให้
    support_level:
      name: ระดับการสนับสนุน
      description: ระบุระดับความเสถียรโดยรวมหรือการรองรับที่อุปกรณ์พยุงมอบให้สำหรับความรุนแรงของการบาดเจ็บหรือระดับกิจกรรมที่แตกต่างกัน
    support_rigidity_level:
      name: ระดับความแข็งของการรองรับ
      description: อธิบายความแข็งหรือการรองรับโครงสร้างโดยรวมที่แผ่นรองเท้ามอบให้
        ตั้งแต่การรองรับที่นุ่มจนถึงการรองรับแบบออร์โธติกที่แข็ง
    supported_audio_sources:
      name: แหล่งเสียงที่รองรับ
      description: ระบุแหล่งเล่นหรืออินพุตที่หน่วยสามารถจัดการได้
    supported_countries:
      name: ประเทศที่รองรับ
      description: ระบุรายชื่อประเทศหรือเขตพื้นที่เฉพาะที่ SIM/eSIM หรือแผนเติมเงินให้บริการ
    supported_display_technologies:
      name: เทคโนโลยีการแสดงผลที่รองรับ
      description: ระบุประเภทของจอแสดงผลหรือเทคโนโลยีหน้าจอที่เครื่องปรับเทียบสามารถโปรไฟล์หรือวัดได้
    supported_dvi_link_type:
      name: ประเภทลิงก์ DVI ที่รองรับ
      description: ระบุว่าอุปกรณ์จัดการมาตรฐานสัญญาณ DVI แบบลิงก์เดียว ลิงก์คู่ หรือทั้งสองแบบ
    supported_erase_modes:
      name: โหมดการลบที่รองรับ
      description: แสดงรายการมาตรฐานการลบแบบปลอดภัยที่เครื่องทำสำเนาสามารถทำได้บนไดรฟ์เป้าหมาย
    supported_input_types:
      name: ประเภทอินพุตที่รองรับ
      description: ระบุประเภทของอินพุตเสียงที่แชนเนลสตริปรับได้ (เช่น ไมค์, ไลน์,
        อินสตรูเมนต์ Hi-Z)
    supported_language:
      name: ภาษาที่รองรับ
      description: ระบุภาษาที่ผลิตภัณฑ์ซอฟต์แวร์สนับสนุน เช่น อังกฤษหรือสเปน
    supported_media_sources:
      name: แหล่งสื่อที่รองรับ
      description: กำหนดอินพุตสื่อทางกายภาพหรือดิจิทัลที่หน่วยสามารถเล่นเพลงได้
    supported_raid_levels:
      name: ระดับ RAID ที่รองรับ
      description: แสดงรายการการกำหนดค่าดิสก์อาร์เรย์ที่ตัวควบคุมหน่วยเก็บข้อมูลรวมสามารถใช้ได้
    supported_scan_media_type:
      name: ประเภทสื่อสแกนที่รองรับ
      description: ระบุประเภทของต้นฉบับที่สแกนเนอร์สามารถจัดการได้ (เช่น ประเภทฟิล์มต่างๆ,
        ภาพพิมพ์สะท้อนแสง)
    supported_sdi_standards:
      name: มาตรฐาน SDI ที่รองรับ
      description: ระบุอัตราข้อมูล/มาตรฐาน SDI (SD-SDI, HD-SDI, 3G-SDI เป็นต้น) ที่อุปกรณ์รองรับสำหรับการส่งสัญญาณ
    supported_usb_device_types:
      name: ประเภทอุปกรณ์ USB ที่รองรับ
      description: ระบุประเภทของอุปกรณ์จัดเก็บ USB ที่เครื่องทำสำเนาสามารถจัดการได้
    surface_sides:
      name: ด้านพื้นผิว
      description: ระบุว่าแท่นพิมพ์สามารถใช้งานได้ด้านเดียวหรือสองด้าน
    surface_texture:
      name: เนื้อสัมผัสพื้นผิว
      description: อธิบายลักษณะหรือลวดลายบนพื้นผิวของผลิตภัณฑ์ โดยทั่วไปใช้กับถุงยางอนามัย
        เช่น ผิวเรียบ ผิวไม่เรียบ
    surfboard_features:
      name: คุณลักษณะของกระดานโต้คลื่น
      description: ระบุคุณลักษณะเฉพาะของกระดานโต้คลื่น เช่น แบบเติมลมหรือพื้นแข็ง
    surveillance_camera_design:
      name: การออกแบบกล้องวงจรปิด
      description: ระบุประเภทการออกแบบของกล้องรักษาความปลอดภัย เช่น กล้องความร้อนหรือพาโนรามา
    surveillance_camera_mounting_type:
      name: ประเภทการติดตั้งกล้องวงจรปิด
      description: ระบุวิธีการติดตั้งกล้องวงจรปิด เช่น ติดผนัง ติดเพดาน
    surverying_accessories_included:
      name: รวมอุปกรณ์เสริมสำหรับการสำรวจ
      description: ระบุส่วนประกอบพิเศษที่บรรจุมาพร้อมกับเครื่องมือสำรวจ เช่น แคลมป์หรือคันปรับระดับ
    suspender_style:
      name: สไตล์ของสายเอี๊ยม
      description: 'ระบุสไตล์สายเอี๊ยม เช่น X-back, Y-back '
    sustainability:
      name: ความยั่งยืน
      description: ไฮไลต์ผลิตภัณฑ์ที่สนับสนุนแนวทางปฏิบัติที่ยั่งยืน เช่น การค้าที่เป็นธรรม
        การจัดหาวัตถุดิบอย่างมีความรับผิดชอบ
    swab_end_configuration:
      name: การกำหนดค่าปลายไม้พันสำลี
      description: ระบุว่าไม้พันสำลีมีปลายที่ใช้งานได้หนึ่งหรือสองปลาย และปลายต่างกันหรือไม่
    swab_material:
      name: วัสดุที่ใช้ทำเครื่องเช็ดล้าง
      description: ระบุผ้าที่ใช้เช็ดทำความสะอาดเครื่องดนตรี เช่น ผ้าไหม ผ้าสักหลาด
    swimwear_features:
      name: คุณลักษณะของชุดว่ายน้ำ
      description: ระบุลักษณะพิเศษของชุดว่ายน้ำ เช่น แห้งเร็วหรือป้องกันแสงแดด UPF
    swing_style:
      name: สไตล์สวิง
      description: จำแนกประเภทตามเทคนิคการสวิง โดยทั่วไปสำหรับไม้เทนนิส เช่น สโตรกยาว
    swing_weighting:
      name: การถ่วงน้ำหนักแบบสวิง
      description: ระบุการกระจายน้ำหนักของไม้เบสบอลหรือไม้ซอฟต์บอล เช่น สมดุล เอนด์โหลด
    switch_control_type:
      name: ประเภทตัวควบคุมสวิตช์
      description: อธิบายวิธีการควบคุมสวิตช์ไฟ เช่น ปุ่มหรือเซ็นเซอร์
    switch_management_type:
      name: ประเภทการจัดการสวิตช์
      description: จำแนกระดับหรือสไตล์ของการจัดการและการกำหนดค่าที่สวิตช์รองรับ (เช่น
        ไม่มีการจัดการ อัจฉริยะ จัดการผ่านเว็บ จัดการเต็มรูปแบบ)
    switch_mechanism:
      name: กลไกสวิตช์
      description: ระบุเทคโนโลยีการกระตุ้นภายในของปุ่ม (เช่น ไมโครสวิตช์ แสง) ซึ่งส่งผลต่อความรู้สึก
        อายุการใช้งาน และการตอบสนอง
    switch_stem_compatibility:
      name: ความเข้ากันได้ของก้านสวิตช์
      description: ระบุรูปแบบก้านสวิตช์แมคคานิคัลหรืออื่นๆ ที่คีย์แคปหรือชุดคีย์พอดี
    switching_layer:
      name: ชั้นสวิตชิ่ง
      description: ระบุชั้น OSI สูงสุดที่สวิตช์ทำงานโดยธรรมชาติ (เช่น Layer 2, Layer
        3, ลูกผสม)
    switching_method:
      name: วิธีการสลับ
      description: ระบุวิธีการที่ใช้ในการสลับระหว่างอินพุตต่างๆ ในผลิตภัณฑ์อิเล็กทรอนิกส์
        เช่น การควบคุมระยะไกล
    synthesis_method:
      name: วิธีการสังเคราะห์
      description: ระบุวิธีการสังเคราะห์เสียงในเครื่องมืออิเล็กทรอนิกส์ เช่น อะนาล็อกเสมือนหรือโมดูลาร์
    system/power_cable_connector_type_end_a:
      name: ประเภทขั้วต่อสายเคเบิลระบบ/พลังงาน (ปลาย A)
      description: ระบุมาตรฐานขั้วต่อที่แน่นอนที่อยู่บนปลายแรกของสายเคเบิล (เช่น IEC
        C14, NEMA 5-15P, USB-C)
    system/power_cable_connector_type_end_b:
      name: ประเภทขั้วต่อสายเคเบิลระบบ/พลังงาน (ปลาย B)
      description: ระบุมาตรฐานขั้วต่อที่แน่นอนที่อยู่บนปลายที่สองของสายเคเบิล (เช่น
        IEC C13, DC 5.5 × 2.1 มม., ปลั๊กกล้วย)
    system_components_included:
      name: ส่วนประกอบระบบที่รวมอยู่
      description: ระบุชิ้นส่วนฮาร์ดแวร์หลักที่มาพร้อมกับระบบเพื่อให้ผู้ซื้อเข้าใจว่าอะไรเป็นหรือไม่เป็นส่วนหนึ่งของชุด
    system_of_measurement:
      name: ระบบวัด
      description: ระบุหน่วยการวัดที่ใช้ในผลิตภัณฑ์ เช่น อิมพีเรียลหรือเมตริก
    system_range:
      name: ช่วงของระบบ
      description: ระบุพื้นที่การใช้งานของระบบสัญญาณเตือนทางการแพทย์ เช่น ที่บ้าน
        GPS
    systems_supported:
      name: รองรับระบบ
      description: ระบุแพลตฟอร์มเกมที่ผลิตภัณฑ์เข้ากันได้ เช่น Xbox, Nintendo Switch
    tab_style:
      name: สไตล์แท็บ
      description: ระบุรูปแบบของแถบบนแฟ้ม เช่น พิมพ์ไว้ล่วงหน้า มีหมายเลข
    tablet_case_functional_features:
      name: คุณสมบัติการทำงานของเคสแท็บเล็ต
      description: เน้นส่วนเสริมการทำงานสำคัญที่มาพร้อมกับเคสแท็บเล็ต
    tabletop_color:
      name: สีส่วนบนของโต๊ะ
      description: ระบุสีของพื้นผิวด้านบนของโต๊ะ เช่น สีดำหรือสีขาว
    tabletop_material:
      name: วัสดุสำหรับส่วนบนของโต๊ะ
      description: ระบุองค์ประกอบของพื้นผิวด้านบนโต๊ะ เช่น ไม้อัด คอนกรีต
    tabletop_pattern:
      name: ลวดลายสำหรับส่วนบนของโต๊ะ
      description: ระบุการออกแบบหรือการพิมพ์บนพื้นผิวโต๊ะ เช่น ลายคริสต์มาสหรือแบบสีเดียว
    tabletop_shape:
      name: รูปทรงของส่วนบนของโต๊ะ
      description: อธิบายรูปทรงเรขาคณิตของพื้นโต๊ะ เช่น ทรงสี่เหลี่ยม รูปไต
    tableware_material:
      name: วัสดุที่ใช้ทำเครื่องใช้บนโต๊ะอาหาร
      description: ระบุส่วนประกอบของเครื่องใช้บนโต๊ะอาหาร เช่น โบนไชน่าหรือเครื่องปั้นดินเผา
    tack/pushpin_head_design:
      name: การออกแบบหัวตะปูแหลมสั้นและหัวแบน/หมุดปัก
      description: อธิบายรูปร่างของหมุดยึดหรือหัวหมุด เช่น ทรงกลมหรือมีการประดับตกแต่ง
    tag_fastening:
      name: ตัวยึดป้าย
      description: อธิบายวิธีการที่ใช้ในการยึดแท็กไว้กับสัมภาระ เช่น หัวเข็มขัดหรือห่วง
    talc_content:
      name: ปริมาณแป้งทัลก์
      description: ระบุว่าสูตรมีแป้งทัลก์ ปราศจากแป้งทัลก์ หรือใช้ระดับแป้งทัลก์ที่ลดลง
    tampon_absorbency_level:
      name: ระดับการดูดซึมของผ้าอนามัยแบบสอด
      description: ระบุความสามารถในการดูดซับของผ้าอนามัยแบบสอด เช่น แบบมาน้อยหรือแบบมามาก
    tampon_features:
      name: คุณลักษณะของแทมปอน
      description: อธิบายลักษณะเฉพาะของผ้าอนามัยแบบสอด เช่น การออกแบบเพื่อความสบายหรือป้องกันการซึมเปื้อน
    tan_type:
      name: ประเภทแทน
      description: ระบุความเข้มของสีและขั้นตอนการใช้ผลิตภัณฑ์ฟอกหนัง เช่น สีเข้ม ทันที
    tank_color:
      name: สีแท็งก์น้ำ
      description: ระบุสีของผลิตภัณฑ์ โดยทั่วไปคือถังน้ำของโถส้วม เช่น สีดำ สีขาว
    tank_material:
      name: วัสดุสำหรับถัง
      description: ระบุวัสดุของถังของผลิตภัณฑ์ โดยทั่วไปใช้สำหรับเครื่องมือทำสวน เช่น
        โลหะ พลาสติก
    tank_pattern:
      name: รูปแบบถัง
      description: ระบุลวดลายที่มองเห็นได้บนถังน้ำของโถส้วม เช่น สีทึบหรือแนวแอบสแตรกต์
    tape_cartridge_format:
      name: รูปแบบตลับเทป
      description: ระบุเทคโนโลยีตลับเทป (เช่น LTO, DAT, DLT) ที่ไดรฟ์สามารถอ่านหรือเขียนได้
    tape_cartridge_generation:
      name: รุ่นตลับเทป
      description: ระบุรุ่นหรือเวอร์ชันเฉพาะภายในตระกูลเทคโนโลยีเทป (โดยทั่วไปคือรุ่น
        LTO) ที่ไดรฟ์รองรับ
    tape_material:
      name: วัสดุเทป
      description: ระบุประเภทของวัสดุที่ใช้ในผลิตภัณฑ์เทป เช่น ไวนิลหรือพลาสติก
    tape_speed_supported:
      name: ความเร็วเทปที่รองรับ
      description: ระบุความเร็วเทปการเล่นและการบันทึก (นิ้วต่อวินาที) ที่หน่วยรีลทูรีลสามารถทำงานได้
    target_audience:
      name: กลุ่มเป้าหมาย
      description: ระบุว่าผลิตภัณฑ์เหมาะสำหรับใคร เช่น เด็กหรือทุกวัย
    target_facial_zone:
      name: โซนใบหน้าเป้าหมาย
      description: ระบุโซนใบหน้าที่แผ่นแปะรูขุมขนออกแบบมาเพื่อรักษา (เช่น จมูก คาง
        โซน T)
    target_gender:
      name: เพศเป้าหมาย
      description: ระบุเพศที่กำหนดไว้สำหรับสินค้า เช่น ผู้หญิง ผู้ชาย หรือไม่จำกัดเพศ
    targeted_pests:
      name: ศัตรูพืชที่เป็นเป้าหมาย
      description: ระบุชนิดของศัตรูพืชที่ผลิตภัณฑ์มีประสิทธิภาพในการต่อต้าน เช่น เชื้อรา
        สาหร่าย
    targeted_skin_concern:
      name: ปัญหาผิวที่มุ่งเป้า
      description: ระบุรอยโรคหรือสภาวะผิวเฉพาะที่ผลิตภัณฑ์ถูกสร้างขึ้นเพื่อรักษา
    targeted_stains:
      name: คราบที่เป็นเป้าหมาย
      description: ระบุประเภทของคราบที่ผลิตภัณฑ์ได้รับการออกแบบมาให้จัดการ เช่น อาหารหรือโคลน
    tea_input_type:
      name: ประเภทอินพุตชา
      description: ระบุรูปแบบการชงชา เช่น ถุง, K-cup
    technology_level:
      name: ระดับเทคโนโลยี
      description: ระบุความซับซ้อนของเทคโนโลยีของผลิตภัณฑ์ เช่น ขั้นพื้นฐาน ขั้นสูง
    teeth_material:
      name: วัสดุสำหรับฟัน
      description: ระบุวัสดุที่ใช้ในฟัน ซึ่งมักใช้กับเครื่องมือทำสวน เช่น พลาสติก
        โลหะ
    telephone_cable_interface:
      name: อินเตอร์เฟซสายเคเบิลโทรศัพท์
      description: ระบุประเภทปลั๊กที่ใช้ในสายโทรศัพท์ เช่น RJ-10
    telephone_cable_second_interface:
      name: อินเทอร์เฟซที่สองของสายโทรศัพท์
      description: กำหนดประเภทขั้วต่อบนปลายตรงข้ามของสายเคเบิลเมื่อแตกต่างจาก อินเทอร์เฟซหลัก
        (เช่น RJ45 ไป RJ11)
    telephone_cord_style:
      name: รูปแบบสายโทรศัพท์
      description: ระบุรูปแบบทางกายภาพของสายโทรศัพท์ เพื่อช่วยเหลือลูกค้าที่ต้องการสายตรง
        สายขด หรือสายพิเศษสำหรับหูฟังทดแทนและสายยึดผนัง
    telephone_style:
      name: สไตล์โทรศัพท์
      description: ระบุการออกแบบหรือความสวยงามของโทรศัพท์ เช่น วินเทจ แปลกใหม่
    telescope_level:
      name: ระดับของกล้อง
      description: ระบุระดับความซับซ้อนหรือทักษะที่จำเป็นสำหรับกล้องโทรทรรศน์ เช่น
        ระดับเริ่มต้นหรือระดับสูง
    telescope_tracking_system:
      name: ระบบการติดตามเป้าของกล้อง
      description: ระบุประเภทของระบบติดตามในกล้องโทรทรรศน์ เช่น แบบแมนนวล แบบขับเคลื่อนด้วยมอเตอร์
    television_circuit_board_type:
      name: ประเภทแผงวงจรโทรทัศน์
      description: ระบุบทบาทการทำงานของแผงวงจรภายในชุดโทรทัศน์ (เช่น บอร์ดหลัก, บอร์ดจ่ายไฟ,
        บอร์ด T-Con)
    television_shape:
      name: รูปทรงของโทรทัศน์
      description: ระบุโครงร่างทางกายภาพของหน้าจอโทรทัศน์ เช่น โค้งหรือแบน
    television_speaker_position:
      name: ตำแหน่งลำโพงโทรทัศน์
      description: ระบุตำแหน่งทางกายภาพหรือบทบาทของลำโพงภายในชุดประกอบทีวี (เช่น ซ้าย,
        ขวา, กลาง, ซับวูฟเฟอร์)
    television_specialized_features:
      name: คุณลักษณะพิเศษของโทรทัศน์
      description: ระบุความสามารถเฉพาะตัวของทีวี เช่น การควบคุมด้วยเสียงหรือซาวด์บาร์ในตัว
    temperature:
      name: อุณหภูมิ
      description: ระบุการตั้งค่าความร้อนสำหรับอุปกรณ์จำพวกปืนกาว เช่น แบบเลือกได้สองระดับ
        แบบใช้อุณหภูมิสูง
    temperature_control:
      name: การควบคุมอุณหภูมิ
      description: 'ระบุความสามารถในการปรับอุณหภูมิของผลิตภัณฑ์ ซึ่งโดยปกติจะใช้กับเครื่องอุ่นขวดนม
        เช่น ปรับได้ ตั้งค่าไว้ล่วงหน้า '
    temperature_measurement:
      name: การวัดอุณหภูมิ
      description: ระบุว่าผลิตภัณฑ์วัดเป็นฟาเรนไฮต์หรือเซลเซียส
    template_type:
      name: ประเภทเทมเพลต
      description: ระบุหมวดหมู่ของเทมเพลตเอกสาร เช่น นามบัตร ใบปลิว
    temple_color:
      name: สีสะดึง
      description: ระบุสีของขาแว่นตา เช่น สีแดง หรือสีใส
    temple_pattern:
      name: รูปแบบของขาแว่น
      description: อธิบายการออกแบบหรือลวดลายบนขาแว่น เช่น โลโก้หรือลายตารางหมากรุก
    tension:
      name: ความเครียด
      description: อธิบายระดับความตึงของสายสำหรับเครื่องดนตรี เช่น ตึงมากเป็นพิเศษ
    tensioning_system:
      name: ระบบการตึงผ้า
      description: รายละเอียดกลไกที่ใช้เพื่อรักษาพื้นผิวหน้าจอให้เรียบและไม่มีรอยยับ
    tent_setup_style:
      name: รูปแบบการตั้งเต็นท์
      description: ระบุวิธีการกางหรือประกอบเต็นท์
    tequila_variety:
      name: ลักษณะเตกิล่า
      description: ระบุประเภทของเตกิล่า เช่น สีทอง ผ่านการบ่ม
    terminal_operation:
      name: การทำงานของเครื่องอ่าน
      description: ระบุประเภทการทำงานของเครื่องบันทึกเงินสด เช่น แบบแมนวลหรืออิเล็กทรอนิกส์
    termination_method:
      name: วิธีการเข้าสาย
      description: ระบุเทคนิคที่ใช้ในการติดตัวนำไปยังหน้าสัมผัสของขั้วต่อ (เช่น ย้ำ,
        บัดกรี, IDC)
    terrain:
      name: ภูมิประเทศ
      description: ระบุประเภทของพื้นผิวที่ผลิตภัณฑ์ได้รับการออกแบบมาโดยเฉพาะ โดยทั่วไปสำหรับอุปกรณ์กลางแจ้ง
        เช่น ภูเขา ลูกคลื่น
    test_format:
      name: รูปแบบการทดสอบ
      description: ระบุประเภทของการทดสอบสำหรับผลิตภัณฑ์ด้านสุขภาพและความงาม เช่น ดิจิทัล
        ชุดทดสอบ
    test_method:
      name: วิธีการทดสอบ
      description: ระบุขั้นตอนการดำเนินการทดสอบทางการแพทย์ เช่น การทดสอบที่บ้าน การวิเคราะห์ในห้องปฏิบัติการ
    test_sample:
      name: ตัวอย่างการทดสอบ
      description: ระบุประเภทของตัวอย่างที่จำเป็นสำหรับการทดสอบด้านสุขภาพและทางการแพทย์
        เช่น ก้านสำลี น้ำลาย
    tetherball_equipment_included:
      name: รวมอุปกรณ์เทเธอร์บอล
      description: ระบุสิ่งของสำคัญที่รวมอยู่ในชุดเทเธอร์บอล เช่น เชือกหรือเทเธอร์บอล
    tethering_policy:
      name: นโยบายการแชร์อินเทอร์เน็ต
      description: ชี้แจงว่าอนุญาตให้ใช้ฮอตสปอตมือถือหรือการแชร์อินเทอร์เน็ตภายใต้
        เงื่อนไขแผน eSIM หรือไม่
    text_plate_material:
      name: วัสดุแผ่นข้อความ
      description: ระบุวัสดุของแผ่นข้อความบนตราประทับสำหรับสำนักงาน เช่น โลหะหรือยาง
    textile_craft_machine_features:
      name: คุณลักษณะของเครื่องทองานฝีมือ
      description: อธิบายคุณลักษณะพิเศษของเครื่องทองานฝีมือ เช่น ปรับความตึงได้หรือแบบพกพา
    textile_craft_project_type:
      name: ประเภทโครงการหัตถกรรมสิ่งทอ
      description: ระบุประเภทของโครงการหัตถกรรมสิ่งทอ เช่น การถักนิตติงหรือการควิลท์
    texture:
      name: พื้นผิว
      description: ระบุความรู้สึกหรือความสม่ำเสมอของผลิตภัณฑ์ เช่น เนื้อครีม เนื้อแมตต์
        หรือซึมซับได้
    texture_level:
      name: ระดับพื้นผิว
      description: ระบุความเรียบหรือหยาบของผลิตภัณฑ์ โดยทั่วไปใช้สำหรับพูเรอาหารที่มีคุณค่าทางโภชนาการ
        เช่น ระดับ 1 (บด), ระดับ 2 (สับ)
    theme:
      name: ธีม
      description: อธิบายธีมหรือแนวคิดหลักของสินค้า เช่น กีฬา อวกาศ หรือวันหยุด
    therapeutic_features:
      name: คุณสมบัติการรักษา
      description: แสดงรายการวิธีการรักษาเพิ่มเติมที่รวมเข้ากับเฝือกคอ
    therapeutic_swing_accessories_included:
      name: อุปกรณ์เสริมชิงช้าบำบัดที่รวมอยู่
      description: แสดงรายการฮาร์ดแวร์หรืออุปกรณ์เสริมเพิ่มเติมที่มาพร้อมกับชิงช้า
    therapy_mode_supported:
      name: โหมดการรักษาที่รองรับ
      description: แสดงรายการอัลกอริทึมการบำบัดด้วยการหายใจที่อุปกรณ์สามารถทำงานได้
        นอกเหนือจาก APAP มาตรฐาน
    therapy_temperature_type:
      name: ประเภทอุณหภูมิการรักษา
      description: ระบุว่าผลิตภัณฑ์ให้การบำบัดด้วยความร้อน การบำบัดด้วยความเย็น หรือทั้งสองอย่าง
    thermal_detector_type:
      name: ประเภทอุปกรณ์ตรวจจับความร้อน
      description: ระบุเทคโนโลยีที่ใช้สำหรับการตรวจจับความร้อนในอุปกรณ์ เช่น เครื่องตรวจจับซิลิคอนอสัณฐาน
        (a Si)
    thermal_sensation:
      name: ความรู้สึกอุณหภูมิ
      description: อธิบายผลอุณหภูมิที่รับรู้บนผิวหนังหลังจากใช้
    thermocouple_type:
      name: ประเภทเทอร์โมคัปเปิล
      description: ระบุหมวดหมู่เทอร์โมคัปเปิลในเซนเซอร์ เช่น Type J, Type S
    thickness_type:
      name: ประเภทความหนา
      description: ระบุระดับความหนาของสินค้า เช่น บาง ปานกลาง หรือหนา
    thinner_application:
      name: การใช้งานทินเนอร์
      description: อธิบายประเภทของสารที่ใช้ทินเนอร์ เช่น สีหรืออีพ็อกซี่
    thread_direction:
      name: ทิศทางของเกลียว
      description: ระบุทิศทางของเกลียวบนสินค้าฮาร์ดแวร์ เช่น ด้านซ้ายหรือด้านขวา
    threaded_rod_size:
      name: ขนาดสตัดเกลียวตลอดเส้น
      description: ระบุเส้นผ่านศูนย์กลางของสตัดเกลียวตลอดเส้น เช่น M10, M20
    throw_pillow_shape:
      name: รูปร่างของหมอนอิง
      description: ระบุรูปทรงของหมอนตกแต่ง เช่น หมอนข้างหรือสี่เหลี่ยม
    thumb_grip_profile:
      name: โปรไฟล์ที่จับนิ้วหัวแม่มือ
      description: อธิบายพื้นผิวหรือรูปแบบรูปทรงของด้านบนของที่จับนิ้วหัวแม่มือ (เช่น
        เว้า, โดม) ซึ่งส่งผลต่อการจับและความรู้สึกในการควบคุม
    ticket_additional_features:
      name: คุณลักษณะเพิ่มเติมของฉลาก
      description: ไฮไลท์สิทธิประโยชน์พิเศษที่ได้รับจากตั๋ว เช่น การพบปะและทักทายหรือกิจกรรมหลังจบงาน
    ticket_class:
      name: ชั้นตั๋ว
      description: ระบุระดับการบริการหรือชั้นที่นั่งที่ให้มากับตั๋ว
    ticket_type:
      name: ประเภทตั๋ว
      description: ระบุหมวดหมู่ของตั๋วเข้าชมงาน เช่น ตั๋วแบบไม่กำหนดที่นั่งหรือที่นั่งที่จองไว้
    tile_design:
      name: การออกแบบกระเบื้อง
      description: อธิบายลวดลายหรือสไตล์ของกระเบื้อง เช่น เรขาคณิต หรือก้างปลา
    tile_game_type:
      name: ประเภทไทล์เกม
      description: ระบุประเภทของไทล์เกม เช่น โดมิโนหรือไพ่นกกระจอก
    tile_installation_method:
      name: วิธีการติดตั้งกระเบื้อง
      description: อธิบายวิธีการติดตั้งผลิตภัณฑ์ โดยทั่วไปคือเพดานหรือกระเบื้องบุผนัง
        เช่น การติดตั้งแบบวางได้เลย
    tile_look:
      name: ลักษณะกระเบื้อง
      description: อธิบายลักษณะหรือรูปแบบของกระเบื้อง เช่น หินอ่อน หรือ 3 มิติ
    tile_material:
      name: วัสดุที่ใช้ทำกระเบื้อง
      description: ระบุองค์ประกอบของกระเบื้อง เช่น เซรามิกหรือหิน
    tile_texture:
      name: พื้นผิวกระเบื้อง
      description: อธิบายลักษณะพื้นผิวของกระเบื้อง เช่น แบบเรียบหรือแบบมีพื้นผิว
    time_period:
      name: ช่วงเวลา
      description: ระบุกรอบเวลาที่เกี่ยวข้องกับเอกสารทางวิชาการหรือการศึกษา เช่น การปฏิวัติในยุคกลางหรือการปฏิวัติอุตสาหกรรม
    time_signatures:
      name: เครื่องหมายกำหนดจังหวะ
      description: ระบุโครงสร้างจังหวะ โดยทั่วไปแล้วใช้กับเครื่องเมโทรโนม เช่น 4/4,
        3/4
    time_weighting:
      name: การถ่วงน้ำหนักเวลา
      description: ใช้เพื่อระบุความเร็วที่เครื่องวัดเสียงตอบสนองต่อความผันผวนของเสียง
        เช่น ช้า เร็ว
    timepiece_features:
      name: คุณลักษณะของอุปกรณ์บอกเวลา
      description: ระบุลักษณะพิเศษของนาฬิกา เช่น ปรับระยะเวลาได้ หรือมีแสงส่องสว่าง
    timer_design:
      name: การออกแบบตัวจับเวลา
      description: อธิบายประเภทของตัวจับเวลาที่ใช้ในอุปกรณ์ห้องมืด เช่น ดิจิทัลหรือแอนะล็อก
    timer_features:
      name: คุณลักษณะของตัวจับเวลา
      description: อธิบายฟังก์ชันพิเศษของตัวจับเวลา เช่น ปรับระยะเวลาได้หรือมีจอแสดงผลในตัว
    timer_type:
      name: ประเภทตัวจับเวลา
      description: ระบุการตั้งค่าความถี่สำหรับอุปกรณ์ในการตั้งเวลา เช่น รายวัน รายสัปดาห์
    tingle_intensity:
      name: ความเข้มของความรู้สึกจี๊ด
      description: อธิบายระดับความร้อนหรือความรู้สึกจี๊ดที่เกิดขึ้นเมื่อทาผลิตภัณฑ์
    tip_design:
      name: การออกแบบส่วนปลาย
      description: ระบุประเภทของส่วนปลายเข็มและหลอดฉีดยาทางการแพทย์ เช่น ลูเออร์ล็อกหรือปลายสลิป
    tip_material:
      name: วัสดุสำหรับปลายหัว
      description: ระบุวัสดุที่ใช้ในปลายของผลิตภัณฑ์ เช่น ผ้าฝ้าย ซิลิโคน
    tip_opening:
      name: การเปิดส่วนปลาย
      description: อธิบายความกว้างของช่องปากเป่าของเครื่องดนตรีเป่าลม เช่น ขนาดกลางหรือใหญ่
    tip_style:
      name: สไตล์ส่วนปลาย
      description: อธิบายการออกแบบส่วนปลายของผลิตภัณฑ์ เช่น ทำมุม หรือโค้ง
    tip_type:
      name: ประเภทส่วนปลาย
      description: ระบุประเภทของปลายลูกดอกยิงปลา เช่น Chisel หรือ Double Barb
    tire_bead_type:
      name: ประเภทดอกยาง
      description: ระบุประเภทของขอบยางในยางรถจักรยาน เช่น ขอบพับหรือแบบแข็ง
    tobacco_type:
      name: ประเภทยาสูบ
      description: ระบุประเภทของยาสูบ เช่น พันธุ์เตอร์กิซ พันธุ์เวอร์จิเนีย
    toddler_bed_features:
      name: คุณลักษณะเตียงเด็กเล็ก
      description: อธิบายลักษณะพิเศษของเตียงเด็กเล็ก เช่น ปรับความสูงได้หรือไฟกลางคืนในตัว
    toe_spacer_design:
      name: ออกแบบสเปเซอร์นิ้วเท้า
      description: อธิบายการออกแบบซิลิโคนคั่นนิ้วเท้าที่ใช้ในการดูแลเท้า เช่น โค้งมน
        ดีไซน์แบบห่วง
    toe_strap_type:
      name: ประเภทสายรัดนิ้วเท้า
      description: ระบุการออกแบบสายรัดนิ้วเท้า ซึ่งโดยทั่วไปใช้สำหรับไบน์ดิ้งของสโนว์บอร์ดหรือรองเท้าเดินหิมะ
        เช่น หมวกรองเท้าหรือแบบดั้งเดิม
    toe_style:
      name: สไตล์นิ้วเท้า
      description: ระบุรูปทรงหรือดีไซน์ของหัวรองเท้า เช่น หัวเปิดหรือแหลม
    toilet/bidet_mounting_type:
      name: ประเภทการติดตั้งโถสุขภัณฑ์/โถชำระล้าง
      description: ระบุวิธีการติดตั้งโถสุขภัณฑ์หรือโถชำระล้าง เช่น ตั้งพื้นหรือติดผนัง
    toilet_cover_design:
      name: การออกแบบฝาครอบโถสุขภัณฑ์
      description: อธิบายรูปทรงของฝาชักโครก เช่น กลมหรือยาวรี
    toilet_cover_features:
      name: คุณลักษณะของฝาชักโครก
      description: อธิบายลักษณะพิเศษของฝาชักโครก เช่น ข้อต่อสั้นหรือปิดแบบนุ่มนวล
    toilet_mounting_type:
      name: ประเภทการติดตั้งโถสุขภัณฑ์
      description: ระบุวิธีการติดตั้งโถสุขภัณฑ์ เช่น ยึดกับผนัง แบบตั้งพื้น
    toilet_shape:
      name: รูปร่างโถสุขภัณฑ์
      description: อธิบายรูปทรงของโถส้วม เช่น ทรงกลมหรือสี่เหลี่ยม
    tom_tom_design:
      name: การออกแบบกลองทอม
      description: อธิบายประเภทของกลองทอม เช่น แบบตั้งพื้นหรือแบบแร็ค
    tonearm_type:
      name: ประเภทโทนอาร์ม
      description: อธิบายรูปทรงเรขาคณิตของโทนอาร์ม ซึ่งส่งผลต่อประสิทธิภาพการติดตามและความสามารถในการใช้งานสำหรับดีเจ
    tool/utensil_material:
      name: วัสดุที่ใช้ทำเครื่องมือ/เครื่องใช้
      description: ระบุวัสดุหลักที่ใช้ในเครื่องมือหรือเครื่องใช้ เช่น สแตนเลสหรือไม้สัก
    tool_key_tip:
      name: ปลายหัวประแจ
      description: ระบุประเภทของหัวประแจเครื่องมือ เช่น หัวฟิลลิปส์หรือหัวสแปนเนอร์
    tool_mobility:
      name: ความคล่องตัวของเครื่องมือ
      description: อธิบายว่าเครื่องมือเป็นแบบมีสายหรือไร้สาย โดยทั่วไปใช้สำหรับผลิตภัณฑ์ทางทันตกรรม
    tool_operation:
      name: การทำงานของเครื่องมือ
      description: อธิบายวิธีการทำงานของเครื่องมือ เช่น ด้วยมือหรือขับเคลื่อนด้วยไฟฟ้า
    toothbrush_head_size:
      name: ขนาดหัวแปรงสีฟัน
      description: ระบุขนาดสัมพัทธ์ของหัวแปรงเพื่อให้เหมาะกับขนาดปากและความต้องการทำความสะอาดที่แตกต่างกัน
    toothbrush_head_type:
      name: ประเภทหัวแปรงสีฟัน
      description: จัดประเภทรูปแบบการทำงานของหัวแปรง (เช่น ฟอกขาว ดูแลเหงือก สำหรับเด็ก)
    toothpaste_type:
      name: ประเภทยาสีฟัน
      description: ระบุฟังก์ชันเฉพาะของยาสีฟัน เช่น ป้องกันฟันผุหรือทำให้ฟันขาวขึ้น
    toothpick_design:
      name: ออกแบบไม้จิ้มฟัน
      description: ระบุรูปทรงของไม้จิ้มฟัน เช่น กลมหรือแบน
    top_color:
      name: สีส่วนบน
      description: ระบุสีหลักของพื้นผิวด้านบนของผลิตภัณฑ์ เช่น สีใส สีบรอนซ์
    top_length_type:
      name: ประเภทความยาวของเสื้อ
      description: ระบุความยาวของเสื้อหรือเสื้อเชิ้ต เช่น เสื้อครอปหรือตัวยาว
    top_material:
      name: วัสดุสำหรับส่วนบน
      description: ระบุวัสดุของพื้นผิวด้านบนของผลิตภัณฑ์ เช่น ไม้ แผ่นกระจก
    top_pattern:
      name: ลวดลายส่วนบน
      description: อธิบายการออกแบบหรือลายพิมพ์บนพื้นผิวของผลิตภัณฑ์ เช่น ลายดอกไม้หรือลายทาง
    top_surface_material:
      name: วัสดุสำหรับพื้นผิวด้านบน
      description: ระบุวัสดุที่ใช้บนพื้นผิวด้านบนของผลิตภัณฑ์ เช่น สแตนเลสหรือแก้วเซรามิก
    top_up_method:
      name: วิธีการเติมเงิน
      description: ระบุวิธีที่ลูกค้าสามารถเพิ่มเครดิตเพิ่มเติมหรือต่ออายุแผนบนบัตรเติมเงินหรือซิมได้
    tote_handle_type:
      name: ประเภทหูหิ้วกระเป๋าทรงถุง
      description: ระบุสไตล์ของหูจับบนกระเป๋าโท้ต เช่น แบบสั้นหรือแบบยาว
    totem_design:
      name: การออกแบบรูปสลักบนเสา
      description: ระบุการออกแบบป้ายโทเท็มในงานแสดงสินค้า เช่น ด้านเดียวหรือสองด้าน
    touch_capabilities:
      name: ความสามารถในการสัมผัส
      description: ระบุประเภทของการโต้ตอบแบบสัมผัสที่ระบบอิเล็กทรอนิกส์รองรับ เช่น
        Single หรือ Dual
    touchpad_form_factor:
      name: รูปแบบทัชแพด
      description: กำหนดรูปแบบการติดตั้งหรือการใช้งานที่ตั้งใจของทัชแพด
    touchscreen_technology:
      name: เทคโนโลยีหน้าจอสัมผัส
      description: ระบุเทคโนโลยีหน้าจอสัมผัสสำหรับอุปกรณ์แบบโต้ตอบ เช่น แบบ Capacitive
        หรือ Resistive
    touchscreen_wire_configuration:
      name: การกำหนดค่าสายหน้าจอสัมผัส
      description: ระบุจำนวนสายหรือเส้นที่ใช้โดยดิจิไทเซอร์แบบความต้านทาน ซึ่งส่งผลต่อความเข้ากันได้กับตัวควบคุม
    toy/game_material:
      name: วัสดุที่ใช้ทำของเล่น/เกม
      description: ระบุวัสดุหลักที่ใช้ในของเล่นหรือเกม เช่น พลาสติกหรือไม้
    toy_figure_features:
      name: คุณลักษณะของฟิกเกอร์ของเล่น
      description: เน้นลักษณะพิเศษของฟิกเกอร์ของเล่น เช่น ข้อต่อแบบประกบหรือแบบรายละเอียดที่สมจริง
    toy_figure_theme:
      name: ธีมของฟิกเกอร์ของเล่น
      description: ระบุธีมหรือหมวดหมู่ของฟิกเกอร์ของเล่น เช่น สัตว์หรือกีฬา
    toy_tool_type:
      name: ประเภทของเครื่องมือของเล่น
      description: ระบุประเภทของเครื่องมือของเล่นในชุดของเล่นบทบาทสมมุติ เช่น สว่านหรือค้อน
    track_configuration:
      name: การกำหนดค่าแทร็ก
      description: ระบุรูปแบบแทร็กเทปและช่องสัญญาณที่เครื่องสามารถบันทึกหรือเล่นได้
        (เช่น สเตอริโอเทียบกับโมโน จำนวนแทร็ก)
    tracker_form_factor:
      name: รูปแบบอุปกรณ์ติดตาม
      description: กำหนดสไตล์และรูปทรงทางกายภาพของฮาร์ดแวร์ติดตาม
    tracking_metrics:
      name: ตัวชี้วัดการติดตาม
      description: ระบุข้อมูลสุขภาพและการออกกำลังกายที่ผลิตภัณฑ์ตรวจสอบ เช่น การนอนหลับ
        จำนวนก้าว
    tracking_purpose:
      name: วัตถุประสงค์ในการติดตาม
      description: ระบุวัตถุประสงค์การใช้งานอุปกรณ์ติดตาม GPS เช่น การติดตามทรัพย์สินหรือการติดตามสัตว์เลี้ยง
    tractor_accessories_included:
      name: รวมอุปกรณ์รถแทรกเตอร์
      description: ระบุคุณลักษณะพิเศษที่มาพร้อมกับรถแทรกเตอร์ เช่น ชุดอุปกรณ์คลุมดินหรือไถหิมะ
    trade_show_display_features:
      name: คุณลักษณะของตู้จัดแสดงในงานแสดงสินค้า
      description: ระบุลักษณะพิเศษของตู้จัดแสดงในงานแสดงสินค้า เช่น หน้าจอสัมผัสหรือแสงไฟ
    trading_card_packaging:
      name: บรรจุภัณฑ์การ์ดสะสม
      description: ระบุวิธีการบรรจุการ์ดสะสม เช่น บลิสเตอร์แพ็คหรือซองการ์ด
    traffic_control_device_features:
      name: คุณลักษณะของอุปกรณ์ควบคุมการจราจร
      description: ระบุคุณลักษณะเฉพาะของเครื่องหมายควบคุมการจราจร เช่น ฐานแบบวางซ้อนกันได้หรือแบบถ่วงน้ำหนัก
    trail_camera_design:
      name: การออกแบบกล้องส่องสัตว์
      description: อธิบายประเภทของกล้องดักถ่ายภาพสัตว์ป่า เช่น แบบมาตรฐานหรือแบบเครือข่ายมือถือ
    trailer_type:
      name: ประเภทรถพ่วง
      description: ระบุการออกแบบหรือรูปแบบของรถพ่วงยานยนต์ เช่น แบบเปิดหรือแบบปิดรอบ
    training_data_requirements:
      name: ข้อกำหนดข้อมูลการฝึกอบรม
      description: ระบุประเภทข้อมูลและคุณภาพที่จำเป็นสำหรับการฝึก AI หรือซอฟต์แวร์
        Machine Learning ที่มีประสิทธิภาพ เช่น ข้อมูลที่มีป้ายกำกับ
    trampoline_design:
      name: การออกแบบแทรมโพลีน
      description: อธิบายโครงสร้างของแทรมโพลีน เช่น ไร้สปริงหรือคอยล์สปริง
    transceiver_form_factor:
      name: รูปแบบตัวรับส่งสัญญาณ
      description: กำหนดมาตรฐานโมดูลทางกายภาพของตัวรับส่งสัญญาณเครือข่าย (เช่น SFP,
        QSFP28)
    transcriber/dictation_system_features:
      name: คุณลักษณะของระบบถอดเสียง/เขียนตามคำบอก
      description: ระบุคุณลักษณะพิเศษของเครื่องถอดเสียงหรือระบบเขียนตามคำบอก เช่น
        ขับเคลื่อนด้วย AI หรือการลดเสียงรบกวน
    transfer_aid_type:
      name: ประเภทอุปกรณ์ช่วยเคลื่อนย้าย
      description: จำแนกรูปแบบของอุปกรณ์ช่วยเหลือ โดยแยกแผ่นย้ายผู้ป่วยแบบแข็งจากแผ่นย้ายผู้ป่วยแบบยืดหยุ่นและแผ่นย้ายผู้ป่วยแบบเป่าลม
    transfer_board_shape:
      name: รูปร่างกระดานเคลื่อนย้าย
      description: ระบุโปรไฟล์ทางเรขาคณิตของกระดานหรือแผ่น ซึ่งส่งผลต่อเส้นทางการเคลื่อนย้ายและความเข้ากันได้กับความสูงของที่นั่งหรือเตียงที่แตกต่างกัน
    transfer_boards_surface_type:
      name: ประเภทพื้นผิวแผ่นขนย้าย
      description: ระบุพื้นผิวของกระดานช่วยในการเคลื่อนย้าย เช่น บุนวมหรือเรียบ
    transfer_paper_technique:
      name: เทคนิคการใช้กระดาษลอกลาย
      description: ระบุวิธีการที่ใช้กับกระดาษทรานสเฟอร์ เช่น สำหรับเครื่องอิงค์เจ็ตหรือแบบรีดร้อน
    transmission_type:
      name: ประเภทการส่ง
      description: ระบุประเภทของระบบเกียร์ในยานพาหนะหรือชิ้นส่วน เช่น เกียร์ธรรมดาหรืออัตโนมัติ
    transmitter_form_factor:
      name: รูปแบบของเครื่องส่ง
      description: จำแนกสไตล์ทางกายภาพหรือตัวเรือนของหน่วยเครื่องส่งเพื่อช่วยให้ผู้ซื้อค้นหารูปแบบที่เหมาะกับแอปพลิเคชันของพวกเขาได้อย่างรวดเร็ว
    transport_type:
      name: ประเภทการขนส่ง
      description: ระบุรูปแบบการขนส่งสาธารณะที่ตั๋วหรือบัตรผ่านสามารถใช้ได้
    trash_can_features:
      name: คุณลักษณะของถังขยะ
      description: อธิบายลักษณะพิเศษของถังขยะ เช่น การควบคุมกลิ่นหรือมีแป้นเหยียบ
    travel_pillow_features:
      name: คุณสมบัติหมอนเดินทาง
      description: ระบุลักษณะการทำงานพิเศษ อุปกรณ์เสริม หรือการปรับปรุงการออกแบบของหมอนเดินทาง
    travel_pillow_shape:
      name: รูปร่างของหมอนรองคอ
      description: 'อธิบายรูปร่างของหมอนพกพา เช่น รูปตัว J '
    tray_compatibility:
      name: ความเข้ากันได้ของถาด
      description: ระบุสไตล์ของถาดฟอกสีฟันหรือปากเทียมที่เคสออกแบบมาให้พอดี
    treatment_area:
      name: พื้นที่การรักษา
      description: ระบุส่วนของร่างกายที่เป็นเป้าหมายของสินค้า โดยทั่วไปใช้สำหรับอุปกรณ์การนวด
        เช่น หลัง คอ
    treatment_method:
      name: วิธีการรักษา
      description: อธิบายกลไกหรือเทคโนโลยีการส่งที่ผลิตภัณฑ์ใช้เพื่อกำจัดรอยโรค (เช่น
        ไครโอเทอราพี กรดเคมี แผ่นไมโครนีดเดิล)
    treatment_modes:
      name: โหมดการรักษา
      description: ระบุโหมดการทำงานที่อุปกรณ์รองรับ (เช่น HR, SHR, SR)
    treatment_objective:
      name: วัตถุประสงค์ของการรักษา
      description: ระบุปัญหาที่ผลิตภัณฑ์จัดการได้ โดยทั่วไปสำหรับผลิตภัณฑ์ดูแลส่วนบุคคล
        เช่น การกรน เป็นไข้
    treatment_target_area:
      name: พื้นที่เป้าหมายการรักษา
      description: ระบุว่าผลิตภัณฑ์ถูกสร้างขึ้นสำหรับขนตา คิ้ว หรือทั้งสองอย่าง
    treatment_texture:
      name: เนื้อสัมผัสการบำรุง
      description: ระบุความเหนียวข้นของผลิตภัณฑ์รักษาต่างๆ อย่างครีมผื่นผ้าอ้อม เช่น
        ข้น แป้ง
    treatment_type:
      name: ประเภทการรักษา
      description: ระบุวิธีการรักษา โดยทั่วไปสำหรับการรักษาผมร่วง เช่น เลเซอร์ เฉพาะที่
    tree_stand_material:
      name: วัสดุที่ใช้ทำที่วางต้นไม้
      description: ระบุว่าขาตั้งทำจากอะไร เช่น พลาสติกหรือโลหะ
    trellis_design:
      name: การออกแบบโครงสร้างบังตาที่เป็นช่อง
      description: ระบุการออกแบบโครงตาข่ายในรั้วหรือสิ่งกีดขวาง เช่น สี่เหลี่ยมจัตุรัส
        ข้าวหลามตัด
    tricycle_design:
      name: การออกแบบรถสามล้อ
      description: อธิบายลักษณะของรถสามล้อ เช่น แบบตั้งตรงหรือแบบเอนปั่น
    tricycle_propulsion_type:
      name: ประเภทการขับเคลื่อนของรถสามล้อ
      description: ระบุวิธีการขับเคลื่อนรถสามล้อ เช่น การปั่นหรือขับเคลื่อนล้อหน้า
    trip_type:
      name: ประเภทการเดินทาง
      description: ระบุประเภทการตัดวงจรในเซอร์กิตเบรกเกอร์ เช่น เปลี่ยนชิ้นส่วนไม่ได้
    tripod/monopod_attachment_type:
      name: ประเภทอุปกรณ์ยึดของขาตั้งสามขา/ขาตั้งเดี่ยว
      description: ระบุประเภทการเชื่อมต่อสำหรับอุปกรณ์เสริมขาตั้งสามขาหรือขาโมโนพอด
        เช่น 3/8 หรือแบบสากล
    tripod/monopod_head_type:
      name: ประเภทส่วนหัวขาตั้งกล้องสามขา/โมโนพอด
      description: ระบุกลไกส่วนหัวของขาตั้งสามขา/ขาโมโนพอด เช่น แบบฟันเฟืองหรือกิมบอล
    tripod_handle_type:
      name: ประเภทด้ามจับของขาตั้งสามขา
      description: ระบุการทำงานของที่จับขาตั้ง เช่น ด้ามรูปปืน แบบมัลติฟังก์ชั่น
    trophy_design:
      name: การออกแบบถ้วยรางวัล
      description: อธิบายลักษณะหรือรูปร่างของถ้วยรางวัล เช่น รูปถ้วยหรือดาว
    truck_type:
      name: ประเภทรถบรรทุก
      description: จำแนกประเภทของรถบรรทุก เช่น รถดัมพ์ หรือรถบรรทุกพื้นเรียบ
    tube_component:
      name: ส่วนประกอบท่อ
      description: ระบุประเภทของหลอดในเครื่องขยายเสียงดนตรี เช่น แบบตู้ แบบขาตั้ง
    tube_configuration:
      name: การกำหนดค่าท่อ
      description: อธิบายการจัดเรียงหลอดในเครื่องขยายเสียงเครื่องดนตรี เช่น หลอดเดียวหรือแบบคู่
    tuner_design:
      name: การออกแบบจูนเนอร์
      description: อธิบายสไตล์ของเครื่องตั้งสายแบบอิเล็กทรอนิกส์สำหรับเครื่องดนตรี
        เช่น แบบคลิปออนหรือคันเหยียบ
    tuner_type:
      name: ประเภทตัวปรับเสียง
      description: ระบุประเภทของความถี่วิทยุที่ได้รับ เช่น AM/FM หรือวิทยุดาวเทียม
    tuning_fork_design:
      name: การออกแบบส้อมเสียง
      description: อธิบายการออกแบบของส้อมเสียง เช่น แบบถ่วงน้ำหนักหรือไม่ถ่วงน้ำหนัก
    tuning_fork_frequency:
      name: ความถี่ส้อมเสียง
      description: ระบุความถี่ของส้อมเสียง เช่น 128 Hz หรือ 256 Hz
    tuning_modes:
      name: โหมดการปรับเสียง
      description: ระบุการตั้งค่าเครื่องดนตรีสำหรับเครื่องปรับแต่งเสียงแบบอิเล็กทรอนิกส์
        เช่น กีตาร์หรือไวโอลิน
    tuning_pitch:
      name: ระดับการปรับเสียง
      description: ระบุระดับเสียงของเครื่องดนตรี เช่น C# หรือ Ab
    tuning_range:
      name: ช่วงการปรับเสียง
      description: ระบุช่วงของตัวเลือกการปรับแต่งที่มี เช่น มาตรฐานหรือแบบเปิด
    tv_broadcast_standards_supported:
      name: มาตรฐานการออกอากาศทีวีที่รองรับ
      description: แสดงรายการมาตรฐานการออกอากาศโทรทัศน์หรือเคเบิล/ดาวเทียมเฉพาะ ที่การ์ดหรืออะแดปเตอร์สามารถถอดรหัสหรือรับได้
    uc_platform_certification:
      name: การรับรองแพลตฟอร์ม UC
      description: ระบุแพลตฟอร์มการสื่อสารแบบครบวงจรหรือการประชุมที่อุปกรณ์ได้รับการรับรองอย่างเป็นทางการ
    ultrasound_probe_type:
      name: ประเภทหัววัดอัลตราซาวนด์
      description: ระบุลักษณะการออกแบบของหัววัดที่มาพร้อมกับจอภาพ (เช่น กันน้ำ, ใช้งานภายในโพรงกาย)
    undershirt_style:
      name: สไตล์เสื้อซับใน
      description: อธิบายดีไซน์หรือการตัดเย็บของเสื้อซับใน เช่น คอกลมหรือคอวี
    underwear_style:
      name: ประเภทของชุดชั้นใน
      description: ระบุดีไซน์และการตัดของกางเกงใน เช่น บิกินี่หรือกางเกงชั้นในเอวสูง
    units_of_measurement:
      name: หน่วยวัด
      description: ระบุระบบการวัดที่ใช้กับผลิตภัณฑ์ เช่น มิลลิเมตร (มม.) ฟาเรนไฮต์
        (°F)
    update_frequency:
      name: ความถี่ในการอัปเดต
      description: ระบุความสม่ำเสมอของการอัปเดตซอฟต์แวร์หรือข้อมูล เช่น แบบเรียลไทม์
        รายปี
    upholstery_color:
      name: สีเบาะ
      description: ระบุสีเบาะของผลิตภัณฑ์ เช่น สีแดงหรือสีเบจ
    upholstery_material:
      name: วัสดุที่ใช้ทำเครื่องเบาะ
      description: ระบุผ้าที่ใช้ทำเบาะ เช่น หนังหรือกำมะหยี่
    upholstery_pattern:
      name: รูปแบบเครื่องเบาะ
      description: อธิบายการออกแบบภาพบนผ้าหุ้มเฟอร์นิเจอร์ เช่น ลายทางหรือลายตารางหมากรุก
    uplink_port_type:
      name: ประเภทพอร์ตอัปลิงก์
      description: กำหนดตัวเชื่อมต่ออัปลิงก์ความเร็วสูงสุดที่มีอยู่บนสวิตช์ (เช่น
        SFP+, QSFP28, 10GBase-T)
    ups_topology:
      name: โทโพโลยี UPS
      description: ระบุแนวทางการออกแบบภายในที่ UPS ใช้ในการปรับสภาพและจ่ายไฟ (เช่น
        สแตนด์บาย, ไลน์อินเตอร์แอคทีฟ, ออนไลน์)
    urinal_mounting_type:
      name: ประเภทการติดตั้งโถปัสสาวะ
      description: ระบุวิธีการติดตั้งโถปัสสาวะชาย เช่น ยึดกับผนังหรือแบบตั้งพื้น
    usage_conditions:
      name: เงื่อนไขการใช้งาน
      description: ระบุว่าผลิตภัณฑ์เหมาะสำหรับการใช้งานในสภาพแห้งหรือเปียก โดยทั่วไปใช้สำหรับมีดโกน
    usage_environment:
      name: สภาพแวดล้อมการใช้งาน
      description: ระบุว่าผลิตภัณฑ์ทำผิวสีแทนนี้มีวัตถุประสงค์ให้ใช้ที่ใด
    usage_frequency:
      name: ความถี่ในการใช้งาน
      description: ระบุความถี่ในการใช้ผลิตภัณฑ์ที่แนะนำ เช่น รายวันหรือรายสัปดาห์
    usage_type:
      name: ประเภทการใช้งาน
      description: ระบุการหมุนเวียนใช้งานที่กำหนดไว้ของสินค้า เช่น ใช้ซ้ำได้ เติมได้
    usb_connector_type:
      name: ประเภทขั้วต่อ USB
      description: ระบุขั้วต่อ USB ทางกายภาพที่ให้มาบนอุปกรณ์สำหรับข้อมูลและ/หรือพลังงาน
    usb_standard:
      name: มาตรฐาน Usb
      description: ระบุเวอร์ชัน USB สำหรับอุปกรณ์อิเล็กทรอนิกส์ เช่น USB 2.0 หรือ
        USB 3.1 Gen 1
    user_type:
      name: ประเภทผู้ใช้
      description: ระบุผู้ใช้ผลิตภัณฑ์ซอฟต์แวร์ที่กำหนดไว้ เช่น บุคคลหรือธุรกิจขนาดเล็ก
    utility/maintenance_task_type:
      name: ประเภทงานยูทิลิตี้/บำรุงรักษา
      description: จัดหมวดหมู่งานที่ดำเนินการโดยซอฟต์แวร์ เช่น การล้างข้อมูลบนดิสก์หรือเครื่องมือเพิ่มประสิทธิภาพระบบ
    uv_blocking_class:
      name: ระดับการป้องกันรังสียูวี
      description: ระบุระดับการป้องกันรังสียูวีที่สร้างไว้ในคอนแทคเลนส์ตามที่กำหนดโดยมาตรฐาน
        ISO
    uv_protection:
      name: ป้องกันรังสียูวี
      description: ระบุความสามารถของผลิตภัณฑ์ในการป้องกันรังสียูวี โดยทั่วไปใช้สำหรับแว่นกันแดด
        เช่น UV400
    uva_protection_grade:
      name: ระดับการป้องกัน UVA
      description: ระบุระดับการป้องกัน UVA ของผลิตภัณฑ์ ซึ่งมักแสดงเป็นระดับ PA
    vacuum_air_filtering_technology:
      name: เทคโนโลยีการกรองอากาศแบบสูญญากาศ
      description: ระบุประเภทของการกรองอากาศที่ใช้ในเครื่องดูดฝุ่น เช่น HEPA หรือสัตว์เลี้ยง
    valve_type:
      name: ประเภทวาล์ว
      description: ระบุประเภทของวาล์วในชิ้นส่วนจักรยาน เช่น Presta, Schrader
    van_type:
      name: ประเภทรถตู้
      description: จำแนกความแตกต่างระหว่างรถตู้ประเภทต่างๆ เช่น รถตู้โดยสาร หรือรถตู้ดัดแปลง
    vaping_style:
      name: สไตล์ของการทำไอระเหย
      description: 'ระบุเทคนิคการสูบไอสำหรับบุหรี่ไฟฟ้า เช่น สูบโดยตรงสู่ปอด ปากสู่ปอด '
    varnish/finish_application:
      name: การใช้งานเคลือบเงา/เคลือบสี
      description: ระบุพื้นที่การใช้งานที่เหมาะสมสำหรับการเคลือบเงาหรือการตกแต่ง เช่น
        ผนังหรือประตู
    vase_shape:
      name: รูปทรงแจกัน
      description: อธิบายแจกันที่มีรูปทรงเรขาคณิตหรือรูปทรงอิสระ เช่น ทรงกลมหรือขวด
    vcr_configuration:
      name: การกำหนดค่า VCR
      description: ระบุว่าสินค้าเป็นเครื่อง VCR แบบสแตนด์อโลนหรืออุปกรณ์คอมโบที่มีไดรฟ์หรือจูนเนอร์พิเศษ
    vdi_protocol_support:
      name: รองรับโปรโตคอล Vdi
      description: ระบุโปรโตคอล Virtual Desktop Infrastructure (VDI) ที่รองรับ เช่น
        PCoIP, RDP
    vehicle_alarm/lock_features:
      name: คุณลักษณะของสัญญาณกันขโมย/ล็อครถ
      description: ระบุคุณลักษณะเฉพาะของระบบรักษาความปลอดภัยของยานพาหนะ เช่น การสตาร์ทจากระยะไกล
        หรือทนต่อสภาพอากาศ
    vehicle_application_area:
      name: พื้นที่ใช้งานยานพาหนะ
      description: ระบุส่วนของยานพาหนะที่จะนำผลิตภัณฑ์ไปใช้ เช่น เบาะหรือภายนอก
    vehicle_audio_system_features:
      name: คุณลักษณะของระบบเครื่องเสียงรถยนต์
      description: ระบุคุณลักษณะพิเศษของระบบเครื่องเสียงของรถยนต์ เช่น เพิ่มเสียงเบสหรือจอแสดงผล
        LED
    vehicle_braking_features:
      name: คุณลักษณะของระบบเบรกยานยนต์
      description: อธิบายคุณลักษณะของชิ้นส่วนเบรกรถยนต์ เช่น ทนต่อการกัดกร่อนหรือการเจาะ
    vehicle_cleaning_item_features:
      name: คุณลักษณะของอุปกรณ์ทำความสะอาดยานรถยนต์
      description: เน้นถึงคุณประโยชน์ของผลิตภัณฑ์ทำความสะอาดยานพาหนะ เช่น การใช้เชื้อเพลิงประสิทธิภาพดีขึ้นหรือมีความมันวาวสูง
    vehicle_decor_features:
      name: คุณลักษณะของอุปกรณ์ตกแต่งรถยนต์
      description: อธิบายลักษณะของอุปกรณ์ตกแต่งรถยนต์ เช่น กันรังสียูวีหรือกันน้ำ
    vehicle_drive/handling_features:
      name: คุณลักษณะของอุปกรณ์ขับขี่/ควบคุมรถ
      description: อธิบายคุณลักษณะของชิ้นส่วนยานยนต์ โดยทั่วไปจะใช้ในระบบส่งกำลัง
        ระบบขับเคลื่อน การลากจูง และระบบล้อ เช่น ประสิทธิภาพสูง ทนความร้อน
    vehicle_engine/part_features:
      name: คุณลักษณะของเครื่องยนต์/ชิ้นส่วนรถยนต์
      description: บ่งบอกถึงคุณลักษณะเฉพาะของชิ้นส่วนเครื่องยนต์ของยานยนต์ เช่น การประหยัดน้ำมันเชื้อเพลิง
        หรือการอัปเกรดสมรรถนะ
    vehicle_engine_features:
      name: คุณลักษณะของเครื่องยนต์
      description: อธิบายลักษณะเฉพาะของเครื่องยนต์ของยานพาหนะ เช่น สมรรถนะสูงหรือการประหยัดเชื้อเพลิง
    vehicle_exhaust_type:
      name: ประเภทท่อไอเสียรถยนต์
      description: ระบุประเภทของระบบไอเสียในยานพาหนะ เช่น ระบบ Axle-back หรือ ระบบ
        Turbo-back
    vehicle_features:
      name: คุณลักษณะของยานยนต์
      description: อธิบายลักษณะพิเศษหรืออุปกรณ์ในยานพาหนะ เช่น เบาะนั่งปรับอุณหภูมิไฟฟ้าหรือระบบนำทาง
    vehicle_floor_configuration:
      name: การกำหนดค่าพื้นรถ
      description: ระบุรูปแบบและเค้าโครงของพื้นรถสำหรับผู้โดยสาร เช่น พื้นต่ำหรือพื้นกึ่งต่ำ
    vehicle_fluid_features:
      name: คุณลักษณะของของเหลวในรถยนต์
      description: อธิบายคุณลักษณะพิเศษของน้ำยาสำหรับยานยนต์ เช่น สารป้องกันการแข็งตัวหรือย่อยสลายได้ทางชีวภาพ
    vehicle_fluid_type:
      name: ประเภทของของเหลวในรถยนต์
      description: ระบุประเภทของของเหลวที่ใช้ในการบำรุงรักษายานพาหนะ เช่น แบบเข้มข้นหรือแบบเจือจาง
    vehicle_frame/body_features:
      name: คุณลักษณะของโครง/ตัวถังรถยนต์
      description: อธิบายคุณลักษณะพิเศษของชิ้นส่วนตัวถังรถ เช่น มีการทำสีหรือผ่านการชุบโครเมียม
    vehicle_mirror_design:
      name: การออกแบบของกระจกรถยนต์
      description: ระบุคุณลักษณะการออกแบบของกระจกรถยนต์ เช่น แบบขยายออกได้หรือแบบพับได้
    vehicle_mirror_features:
      name: คุณลักษณะของกระจกรถยนต์
      description: อธิบายคุณลักษณะพิเศษของกระจกรถ เช่น ปรับลดแสงอัตโนมัติหรือปรับความร้อนได้
    vehicle_mirror_type:
      name: ประเภทของกระจกรถยนต์
      description: ระบุประเภทของกระจกรถยนต์ เช่น มุมมองด้านหลังหรือมุมมองด้านข้าง
    vehicle_mounting_location:
      name: ตำแหน่งติดตั้งในรถยนต์
      description: ระบุพื้นที่ในยานพาหนะที่ต้องการติดตั้งตัวยึด
    vehicle_oil_features:
      name: คุณลักษณะของน้ำมันรถยนต์
      description: อธิบายคุณลักษณะของน้ำมันเครื่อง เช่น การป้องกันการสึกหรอหรือประสิทธิภาพการกรองสูง
    vehicle_paint_type:
      name: ประเภทสีรถยนต์
      description: ระบุหมวดหมู่ของสีรถยนต์ เช่น ชุดสีหรือสีตัวถังรถยนต์
    vehicle_placement:
      name: การจัดวางยานพาหนะ
      description: ระบุตำแหน่งบนจักรยานที่สามารถใส่ผลิตภัณฑ์ได้ เช่น เฟรม ด้านหน้า
    vehicle_seating_features:
      name: คุณลักษณะของที่นั่งในรถยนต์
      description: อธิบายคุณลักษณะพิเศษของเบาะรถยนต์ เช่น แบบปรับอุณหภูมิหรือปรับเอนได้
    vehicle_suspension_features:
      name: คุณลักษณะของระบบกันสะเทือนรถยนต์
      description: ระบุคุณลักษณะเฉพาะของชิ้นส่วนช่วงล่างของรถยนต์ เช่น แบบปรับได้หรือแบบไฮดรอลิก
    vehicle_tire_type:
      name: ประเภทยางรถยนต์
      description: ระบุความเหมาะสมตามฤดูกาลหรือภูมิประเทศของยางรถยนต์ เช่น ฤดูหนาวหรือทุกสภาพภูมิประเทศ
    vehicle_type:
      name: ประเภทยานพาหนะ
      description: จำแนกประเภทของยานพาหนะ เช่น SUV หรือเรือใบ
    ventilation_type:
      name: ประเภทการระบายอากาศ
      description: อธิบายรูปแบบช่องระบายอากาศหลักหรือคุณสมบัติการไหลของอากาศของตู้
        ที่จัดการอุณหภูมิภายใน
    verification_technology:
      name: เทคโนโลยีการตรวจสอบ
      description: ระบุเทคโนโลยีที่ใช้ในเครื่องตรวจสอบธนบัตร เช่น แม่เหล็กหรืออินฟราเรด
    vesa_mounting_pattern:
      name: รูปแบบการติดตั้ง VESA
      description: ระบุระยะห่างของรู VESA ที่ด้านหลังของจอมอนิเตอร์เพื่อให้เข้ากันได้กับตัวยึด
        แขน และขาตั้ง
    vg/pg_ratio:
      name: อัตราส่วน VG/PG
      description: ระบุอัตราส่วนกลีเซอรีนจากพืชต่อโพรพิลีนไกลคอลในน้ำยาบุหรี่ไฟฟ้า
        เช่น 30:70
    video_codecs/formats_supported:
      name: รองรับตัวแปลงสัญญาณวิดีโอ/รูปแบบ
      description: ระบุตัวแปลงสัญญาณวิดีโอและรูปแบบที่อุปกรณ์รองรับ เช่น MP4 หรือ
        H.264
    video_game_content_features:
      name: คุณลักษณะของเนื้อหาวิดีโอเกม
      description: ระบุคุณลักษณะพิเศษของซอฟต์แวร์วิดีโอเกม เช่น เนื้อหาที่ดาวน์โหลดได้
        (DLC), สิทธิ์เข้าถึงก่อนใคร
    video_game_format:
      name: รูปแบบวิดีโอเกม
