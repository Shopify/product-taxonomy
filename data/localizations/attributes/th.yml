      description: อธิบายน้ำหนักของสินค้า เช่น เบา ปานกลาง หรือหนัก
    weight_unit_supported:
      name: หน่วยน้ำหนักที่รองรับ
      description: ระบุหน่วยน้ำหนักที่ผลิตภัณฑ์ใช้ในการวัด เช่น ปอนด์ สโตน
    welding_helmet_features:
      name: คุณลักษณะของหน้ากากเชื่อม
      description: ระบุคุณลักษณะพิเศษของหน้ากากงานเชื่อม เช่น สีจริง โหมดการเจียร
    wet_bag_features:
      name: คุณลักษณะของกระเป๋ากันน้ำ
      description: อธิบายลักษณะของถุงใส่ผ้าอ้อมแบบกันน้ำ เช่น ป้องกันการรั่วซึมหรือเป็นมิตรกับสิ่งแวดล้อม
    wheel_hardness:
      name: ความแข็งของล้อ
      description: ระบุระดับความแข็งของล้อสเก็ตบอร์ด เช่น 75A
    wheel_hub_placement:
      name: ตำแหน่งดุมล้อ
      description: ระบุตำแหน่งของดุมล้อในสเก็ตบอร์ด เช่น ศูนย์กลางหรือออฟเซ็ต
    wheel_part_type:
      name: ประเภทชิ้นส่วนล้อ
      description: ระบุส่วนประกอบของระบบล้อของยานพาหนะ เช่น ลูกปืนล้อหรือดุมล้อ
    wheel_style:
      name: รูปแบบพวงมาลัย
      description: อธิบายรูปร่างขอบพวงมาลัยทางกายภาพหรือรูปแบบระเบียบวินัยการขับขี่
    wheel_type:
      name: ประเภทล้อ
      description: ระบุชนิดของล้อสำหรับผลิตภัณฑ์การปั่นจักรยาน เช่น แบบเติมลมหรือแบบยางตัน
    wheelchair_type:
      name: ประเภทวีลแชร์
      description: แยกความแตกต่างระหว่างเก้าอี้รถเข็นประเภทต่างๆ เช่น แบบไฟฟ้า แบบธรรมดา
    whiskey_style:
      name: สไตล์วิสกี้
      description: ระบุประเภทเฉพาะของวิสกี้ เช่น ซิงเกิลมอลต์ เบลนด์มอลต์
    whiskey_variety:
      name: ลักษณะวิสกี้
      description: จำแนกประเภทวิสกี้ตามประเภทหรือสไตล์ของธัญพืช เช่น ข้าวโพด ข้าวไรย์
    wi_fi_band:
      name: แบนด์ไวไฟ
      description: ระบุช่วงความถี่ไร้สายของอุปกรณ์ เช่น 2.4 GHz
    wi_fi_standard:
      name: มาตรฐานไวไฟ
      description: ระบุโปรโตคอลเครือข่ายไร้สาย เช่น 802.11ac
    width_adjustment:
      name: การปรับความกว้าง
      description: ระบุว่าความกว้างของอุปกรณ์สามารถปรับเปลี่ยนเพื่อให้พอดีกับอุปกรณ์ติดตั้ง
        เตียง หรือผู้ใช้ที่แตกต่างกันได้หรือไม่
    winder_features:
      name: คุณลักษณะของกล่องหมุน
      description: อธิบายลักษณะพิเศษของที่ขันสายกีตาร์ เช่น มีที่ถอนหมุดกีตาร์หรือมีที่ตัดสายกีตาร์ในตัว
    windlass_design:
      name: การออกแบบเครื่องกว้าน
      description: อธิบายการวางแนวของเครื่องกว้านสมอ เช่น แนวนอนหรือแนวตั้ง
    window_treatment_material:
      name: วัสดุที่ใช้ทำผลิตภัณฑ์ตกแต่งหน้าต่าง
      description: ระบุองค์ประกอบของมู่ลี่หรือบังแดด เช่น อลูมิเนียมหรือพลาสติก
    windsurfing_board_style:
      name: สไตล์กระดานวินเซอร์ฟ
      description: ระบุประเภทของกระดานวินด์เซิร์ฟ เช่น ฟรีสไตล์ หรือสลาลม
    wine_rack_design:
      name: การออกแบบชั้นเก็บไวน์
      description: ระบุสไตล์หรือความสวยงามของชั้นวางไวน์ เช่น โมเดิร์นหรือแบบดั้งเดิม
    wine_sweetness:
      name: ความหวานของไวน์
      description: ช่วยจัดหมวดหมู่ไวน์ตามระดับความหวาน เช่น ดราย หวาน
    wine_variety:
      name: ลักษณะไวน์
      description: ช่วยแยกแยะระหว่างไวน์ประเภทต่างๆ เช่น ไวน์ขาว และโรเซ่
    wing_style:
      name: รูปแบบปีก
      description: ระบุว่าผ้าอนามัยมีปีกเสริมความมั่นคงหรือไม่ และถ้ามี เป็นสไตล์ใด
    wipe_dispenser/warmer_features:
      name: คุณลักษณะของเครื่องจ่าย/เครื่องอุ่นทิชชู่เปียก
      description: อธิบายคุณลักษณะพิเศษของเครื่องจ่ายทิชชู่เปียกและเครื่องอุ่น กล่าวคือ
        เหมาะกับการเดินทาง
    wipe_dispenser_features:
      name: คุณลักษณะของเครื่องจ่ายทิชชู่เปียก
      description: อธิบายลักษณะพิเศษของเครื่องจ่ายทิชชู่เปียก เช่น ใช้กลไกการจ่ายหรือมีไฟ
        LED แสดงสถานะ
    wipe_fragrance:
      name: ผ้าเช็ดที่มีน้ำหอม
      description: ระบุกลิ่นของผลิตภัณฑ์เช็ดทำความสะอาด เช่น ไม่มีกลิ่นหรือลาเวนเดอร์
    wipe_packaging:
      name: บรรจุภัณฑ์ทิชชู่เปียก
      description: ระบุรูปแบบที่ใส่หรือบรรจุภัณฑ์สำหรับทิชชู่เปียก เช่น แพ็ครีฟิล
        ขนาดเดินทาง
    wipe_purpose:
      name: วัตถุประสงค์ของผ้าเช็ด
      description: ระบุการใช้งานหรือประโยชน์หลักที่ตั้งใจไว้ของผ้าเช็ด
    wipe_warmer_features:
      name: คุณลักษณะของเครื่องอุ่นทิชชู่เปียก
      description: ระบุรายละเอียดเกี่ยวกับคุณลักษณะของเครื่องอุ่นทิชชู่เปียก เช่น
        เหมาะกับการเดินทางหรือกักเก็บความชื้น
    wire/rope_material:
      name: วัสดุที่ใช้ทำลวด/เชือก
      description: ระบุวัสดุที่ใช้ในผลิตภัณฑ์สายไฟหรือเชือก เช่น ทองแดงหรือโพลีเอสเตอร์
    wire_thickness:
      name: ความหนาของลวด
      description: ระบุความหนาของลวด เช่น เส้นใหญ่หรือเส้นเล็ก
    wireless_charging_standard:
      name: มาตรฐานการชาร์จแบบไร้สาย
      description: ระบุโปรโตคอลการชาร์จแบบเหนี่ยวนำที่โทรศัพท์รองรับ
    wireless_multi_room_platform:
      name: แพลตฟอร์มไร้สายหลายห้อง
      description: ระบุระบบนิเวศที่เป็นกรรมสิทธิ์หรือของบุคคลที่สามที่ใช้สำหรับการสตรีมเสียงแบบหลายห้อง
    wireless_streaming_protocols_supported:
      name: โปรโตคอลการสตรีมไร้สายที่รองรับ
      description: ระบุมาตรฐานหรือบริการสตรีมมิ่งแบบไร้สายที่สเตอริโอสามารถรับได้
    wood_finish:
      name: การเคลือบผิวไม้
      description: อธิบายวิธีการเคลือบผิวหรือวิธีการสร้างที่ใช้กับผลิตภัณฑ์ไม้ (เช่น
        ไม้จริง ไม้วีเนียร์ ไม้แปรรูป ไม้เคลือบน้ำมัน ไม้เคลือบแล็กเกอร์ ไม้ทาสี)
    woodwind_care_items_included:
      name: รายการอุปกรณ์ดูแลรักษาเครื่องเป่าลมไม้ที่รวมอยู่
      description: ระบุอุปกรณ์ดูแลที่มาพร้อมกับเครื่องเป่าลมไม้ เช่น แปรงทำความสะอาดหรือขี้ผึ้งสำหรับไม้ก๊อก
    work_capacity:
      name: ความสามารถในการทำงาน
      description: อธิบายระดับประสิทธิภาพของผลิตภัณฑ์ เช่น การใช้งานหนักหรือการใช้งานเบา
    wreath_design:
      name: การออกแบบพวงหรีด
      description: ระบุวัสดุหลักหรือรูปร่างของหรีด เช่น โลหะหรือแบบห่วง
    wrist_rest_features:
      name: คุณสมบัติที่พักข้อมือ
      description: แสดงรายการคุณลักษณะการทำงานหรือการออกแบบพิเศษที่เพิ่มมูลค่า
    wrist_rest_type:
      name: ประเภทที่พักข้อมือ
      description: ระบุการจับคู่อุปกรณ์ที่ตั้งใจหรือการกำหนดค่าชุดของที่พักข้อมือ
        (เช่น คีย์บอร์ดเท่านั้น, เมาส์เท่านั้น, ชุดรวม)
    xlr_pin_count:
      name: จำนวนพิน XLR
      description: ระบุการกำหนดค่าพินเฉพาะ (จำนวนพิน) ของขั้วต่อ XLR
    yacht_type:
      name: ประเภทเรือยอชท์
      description: จำแนกประเภทเรือยอชท์ เช่น แบบเครื่องยนต์หรือแบบเดินทางสำรวจ
    yarn_weight_category:
      name: หมวดหมู่น้ำหนักเส้นด้าย
      description: ระบุความหนาของเส้นไหม เช่น ขนาดใหญ่พิเศษหรือสำหรับงานฝีมือ
    zipper_pull_style:
      name: สไตล์ดึงซิป
      description: อธิบายดีไซน์หรือการตกแต่งบนตัวดึงซิป เช่น แบบมีพื้นผิวหรือลายนูน
    zoom_type:
      name: ประเภทการซูม
      description: ระบุประเภทของฟังก์ชันซูมในเครื่องฉายเอกสาร เช่น แบบดิจิทัลหรือออปติคัล
    air_fryer_accessory_type:
      name: อุปกรณ์เสริมสำหรับหม้อทอดไร้น้ำมัน
      description: ระบุประเภทของอุปกรณ์เสริมที่กำลังจำหน่ายอย่างเฉพาะเจาะจง
    air_purifier_filter_technology:
      name: เทคโนโลยีตัวกรองเครื่องฟอกอากาศ
      description: ระบุวิธีหลักในการกรองหรือการทำให้บริสุทธิ์ที่อุปกรณ์นี้ใช้
    air_purifier_filtration_rating:
      name: ระดับการกรองของเครื่องฟอกอากาศ
      description: ระบุระดับประสิทธิภาพการกรองที่ได้รับการรับรองของวัสดุตัวกรอง
    animal_care_set_components_included:
      name: ส่วนประกอบของชุดดูแลสัตว์ที่รวมอยู่ในชุดนี้
      description: ระบุรายการอุปกรณ์และเครื่องมือสำหรับดูแลหรือทำความสะอาดแต่ละชิ้นที่ให้มาในชุด
        เพื่อให้ผู้ซื้อทราบว่าพวกเขาจะได้รับอะไรบ้าง
    apron_features:
      name: คุณสมบัติของผ้ากันเปื้อน
      description: เน้นคุณลักษณะการใช้งานพิเศษของผ้ากันเปื้อน
    apron_style:
      name: รูปแบบผ้ากันเปื้อน
      description: ระบุรูปแบบหรือโครงสร้างโดยรวมของผ้ากันเปื้อน
    aquatic_plant_growth_habit:
      name: ลักษณะการเจริญเติบโตของพืชน้ำ
      description: จำแนกพืชน้ำตามตำแหน่งและรูปแบบการเจริญเติบโตโดยทั่วไปภายในมวลน้ำ
    arbor_top_design:
      name: การออกแบบส่วนบนของซุ้มไม้เลื้อย
      description: ระบุรูปทรงหรือสไตล์ของส่วนบนสุดของซุ้มไม้เลื้อย ช่วยให้ลูกค้าสามารถเลือกให้ตรงกับความชอบทางสถาปัตยกรรมได้
    ashtray_type:
      name: ประเภทที่เขี่ยบุหรี่
      description: จำแนกที่เขี่ยบุหรี่ตามการใช้งานหลักหรือบริบทการใช้งาน
    attractant_type:
      name: ประเภทสารล่อ
      description: ระบุกลไกการล่อที่รวมอยู่ในกาว (ถ้ามี) เพื่อช่วยให้ลูกค้าเลือกกับดักที่มีประสิทธิภาพมากที่สุดสำหรับสถานการณ์ของตน
    awning_operation_type:
      name: ประเภทการใช้งานกันสาด
      description: อธิบายกลไกที่ใช้ในการกางและพับเก็บกันสาด
    bag_clip_style:
      name: รูปแบบตัวล็อคกระเป๋า
      description: อธิบายถึงรูปแบบเชิงกลของกลไกการปิดของตัวล็อค
    bag_configuration:
      name: รูปแบบถุง
      description: อธิบายจำนวนและรูปแบบของถุงที่รวมอยู่ในระบบเก็บหญ้า
    bag_insulation:
      name: ฉนวนกันความร้อนของกระเป๋า
      description: ระบุว่ากระเป๋าใส่ไวน์มีฉนวนกันความร้อนเพื่อช่วยรักษาอุณหภูมิของขวดหรือไม่
    baking_liner_size:
      name: ขนาดของถ้วยรองอบ
      description: หลักเกณฑ์การกำหนดขนาดแบบแบ่งกลุ่มที่ผู้ทำเบเกอรี่ใช้เพื่ออธิบายความจุของถ้วยรองอบโดยสัมพันธ์กับขนาดคัพเค้กมาตรฐาน
    baking_sheet_style:
      name: รูปแบบของถาดอบ
      description: ระบุรูปแบบการผลิตของถาด เช่น มีขอบหรือมีรูพรุน
    ballast_material:
      name: วัสดุถ่วงน้ำหนัก
      description: แสดงรายการวัสดุที่สามารถใช้ถ่วงน้ำหนัก (เติม) ดรัมลูกกลิ้ง ช่วยให้ผู้ซื้อเลือกแบบที่เข้ากันได้กับวัสดุเติมที่ต้องการ
    base_features:
      name: คุณสมบัติของฐาน
      description: เน้นความเสถียรหรือคุณสมบัติการยึดเกาะของฐาน ช่วยเหลือผู้ใช้ที่ต้องการคุณสมบัติกันลื่นหรือดูดติดพื้นผิวการทำงาน
    baster_tip_type:
      name: ประเภทหัวดูดของเหลว
      description: จำแนกประเภทของหัวดูดหรืออุปกรณ์เสริมบนเครื่องดูดของเหลว ช่วยให้ผู้ซื้อสามารถกรองระหว่างหัวดูดแบบลูกบอลมาตรฐาน
        เข็มฉีด และหัวแปรงได้
    bathroom_accessories_included:
      name: อุปกรณ์ห้องน้ำที่รวมอยู่ในชุด
      description: ระบุรายการอุปกรณ์ห้องน้ำที่รวมอยู่ในชุดอย่างชัดเจน เพื่อให้ผู้ซื้อทราบว่ามีชิ้นส่วนใดบ้าง
    bathroom_accessory_compatibility:
      name: ความเข้ากันได้กับอุปกรณ์ห้องน้ำ
      description: ระบุว่าตัวยึดนี้ออกแบบมาเพื่อยึดกับอุปกรณ์หรือสุขภัณฑ์ห้องน้ำชนิดใด
    battery_backup_support:
      name: การรองรับระบบสำรองไฟจากแบตเตอรี่
      description: ระบุว่ามีระบบสำรองไฟจากแบตเตอรี่ฉุกเฉินรวมอยู่ด้วยหรือไม่ เป็นอุปกรณ์เสริม
        หรือไม่รองรับ
    bedskirt_corner_style:
      name: รูปแบบมุมผ้าคลุมเตียง
      description: ระบุลักษณะการตกแต่งมุมของผ้าคลุมเตียง ซึ่งส่งผลต่อความพอดีกับเตียงที่มีหัวเตียงหรือเสา
    bedskirt_style:
      name: สไตล์ผ้าคลุมเตียง
      description: อธิบายถึงโครงสร้างและการออกแบบของผ้าคลุมเตียง ช่วยให้ผู้ซื้อเลือกได้ระหว่างสไตล์ต่างๆ
        เช่น แบบมีระบายหรือแบบเรียบๆ
    beer_glass_type:
      name: ประเภทแก้วเบียร์
      description: ระบุรูปแบบหรือรูปทรงเฉพาะของแก้วเบียร์ ช่วยให้ผู้ซื้อหาแก้วที่เหมาะสมกับเบียร์ที่ตนชื่นชอบได้
        (เช่น แก้วไพนต์ แก้วพิลส์เนอร์ แก้วไวเซน)
    belt_profile:
      name: รายละเอียดของสายพาน
      description: ระบุขนาดหน้าตัดหรือรูปแบบของสายพานเพื่อให้แน่ใจว่าพอดีกับมูเลย์อย่างถูกต้อง
    beverage_tub_features:
      name: คุณสมบัติของอ่างแช่เครื่องดื่ม
      description: เน้นคุณสมบัติการออกแบบที่โดดเด่นหรือส่วนประกอบที่เพิ่มฟังก์ชันการใช้งานหรือความสะดวกสบายให้กับอ่างแช่เครื่องดื่ม
    blade_construction_method:
      name: วิธีการผลิตใบมีด
      description: ระบุวิธีการผลิตใบมีด
    blade_finish:
      name: การตกแต่งผิวใบมีด
      description: การเคลือบผิวหรือการตกแต่งเพื่อความสวยงามที่ใช้กับใบมีด
    blade_shape:
      name: รูปทรงใบพลั่ว
      description: อธิบายรูปทรงเรขาคณิต/ลักษณะของใบพลั่ว
    blade_sidedness:
      name: ลักษณะด้านของใบมีด
      description: ระบุว่าใบมีดของเครื่องตัดแต่งพุ่มไม้มีฟันตัดอยู่ด้านเดียวหรือมีทั้งสองด้าน
    bleach_formulation:
      name: สูตรน้ำยาฟอกขาว
      description: ระบุส่วนประกอบทางเคมีของผลิตภัณฑ์น้ำยาฟอกขาว (เช่น คลอรีนหรือออกซิเจน)
    bleach_type:
      name: ประเภทน้ำยาฟอกขาว
      description: ระบุว่ามีสารฟอกขาวหรือสารทำให้ขาวชนิดใดที่ใช้ในผลิตภัณฑ์ขจัดคราบ
    blender_jar_material:
      name: วัสดุของโถปั่น
      description: ระบุวัสดุที่ใช้สำหรับภาชนะ/โถปั่นหลัก
    blooming_season:
      name: ฤดูออกดอก
      description: ระบุฤดูกาลที่พืชชนิดนี้มักออกดอก
    booster_pump_requirement:
      name: ความต้องการปั๊มเพิ่มแรงดัน
      description: ชี้แจงว่าจำเป็นต้องใช้ปั๊มเพิ่มแรงดันแยกต่างหากเพื่อให้เครื่องกวาดทำงานได้หรือไม่
    bore_type:
      name: ประเภทรูเจาะ
      description: ระบุรูปแบบรูเจาะหรือส่วนต่อประสานที่ใช้ในการติดตั้งรอกเข้ากับเพลา
    bottle_cap_gasket_material:
      name: วัสดุของปะเก็นฝาขวด
      description: ระบุวัสดุของปะเก็นซีลที่สัมผัสกับขอบขวด
    bottle_cap_liner_type:
      name: ประเภทของแผ่นรองฝาขวด
      description: ระบุประเภทหรือวัสดุของแผ่นรองด้านในฝาขวด ซึ่งส่งผลต่อความแน่นหนาในการป้องกันการรั่วซึมและความเข้ากันได้กับผลิตภัณฑ์
    bottle_fill_state:
      name: สถานะการบรรจุขวด
      description: ระบุว่าขวดนั้นจำหน่ายแบบเปล่าหรือบรรจุน้ำดื่มไว้แล้ว
    bottle_stopper_mechanism:
      name: กลไกจุกปิดขวด
      description: อธิบายกลไกหรือรูปแบบการปิดผนึกที่ใช้โดยจุกปิดขวดหรือตัวป้องกันขวด
    bowl_type:
      name: ประเภทชาม
      description: จำแนกการใช้งานหลักหรือรูปแบบของชาม
    bread_storage_ventilation:
      name: การระบายอากาศสำหรับการเก็บรักษาขนมปัง
      description: อธิบายว่าภาชนะบรรจุมีการระบายอากาศหรือไม่ และอย่างไร เพื่อรักษาความสดของขนมปัง
    brew_strength_options:
      name: ตัวเลือกความเข้มของการชงกาแฟ
      description: แสดงรายการระดับความเข้มของการชงกาแฟที่สามารถเลือกได้ ซึ่งจะปรับเวลาการสกัดหรืออัตราการไหลเพื่อให้ได้กาแฟที่อ่อนหรือเข้มข้นขึ้น
    bridge_railing_style:
      name: รูปแบบราวสะพาน
      description: ระบุลักษณะและรูปแบบของราวบนสะพาน ซึ่งส่งผลต่อความปลอดภัยและรูปลักษณ์
    briquette_ignition_type:
      name: ประเภทการจุดไฟของถ่านอัดแท่ง
      description: ระบุว่าถ่านอัดแท่งนั้นมีสารช่วยจุดไฟหรือไม่ หรือเป็นแบบมาตรฐาน
        เพื่อช่วยให้ผู้ใช้เข้าใจถึงความสะดวกในการจุดไฟ
    bristle_stiffness:
      name: ความแข็งของขนแปรง
      description: ระบุความแข็งของขนแปรง ซึ่งส่งผลต่อประสิทธิภาพในการขัดถูและความเหมาะสมสำหรับพื้นผิวโถสุขภัณฑ์แบบต่างๆ
    bristle_tip_type:
      name: ประเภทปลายขนแปรง
      description: ระบุว่าปลายขนแปรงแยกเป็นแฉก (มีแถบ) สำหรับการเก็บฝุ่นละอองขนาดเล็ก
        หรือไม่แยกเป็นแฉกสำหรับการเก็บเศษฝุ่นขนาดใหญ่
    bucket_features:
      name: คุณสมบัติของถัง
      description: เน้นคุณลักษณะพิเศษหรือการปรับปรุงฟังก์ชันการใช้งานของถัง เพื่อให้ผู้ซื้อสามารถค้นหาสินค้าที่ต้องการได้อย่างรวดเร็วและสะดวกสบาย
    bulb_finish:
      name: ผิวเคลือบหลอดไฟ
      description: อธิบายถึงการเคลือบหรือผิวเคลือบภายนอกของกระจกหลอดไฟ ซึ่งส่งผลต่อการกระจายแสงและรูปแบบ
    burner_shape:
      name: รูปทรงหัวเตา
      description: อธิบายถึงการออกแบบทางเรขาคณิตของหัวเตาสำหรับย่าง ซึ่งเป็นตัวกำหนดความพอดีและการกระจายความร้อนภายในเตาย่าง
    burr_shape:
      name: รูปทรงของเฟืองบด
      description: ระบุรูปทรงเรขาคณิตของเฟืองบดสำหรับเครื่องบดแบบเฟือง ซึ่งมีผลต่อความสม่ำเสมอของการบดและการสร้างความร้อน
    butterfly_feeder_food_type:
      name: ประเภทอาหารที่ใช้กับที่ให้อาหารผีเสื้อ
      description: ระบุชนิดของอาหารหรือสารดึงดูดที่เครื่องให้อาหารนั้นออกแบบมาเพื่อบรรจุ
    cabinet_light_fixture_style:
      name: สไตล์โคมไฟตู้
      description: อธิบายถึงลักษณะทางกายภาพหรือรูปทรงของโคมไฟตู้
    candle_container_material:
      name: วัสดุของภาชนะใส่เทียน
      description: ระบุวัสดุของภาชนะหรือกล่องใส่เทียน (สำหรับเทียนในโหล/กระป๋อง)
    canner_type:
      name: ประเภทเครื่องกระป๋อง
      description: ระบุวิธีการหรือรูปแบบการบรรจุกระป๋องที่ออกแบบมาสำหรับเครื่องกระป๋องนั้น
    canopy_shape:
      name: รูปทรงของหลังคา
      description: ระบุรูปทรงเรขาคณิตของหลังคาที่กางออก
    canopy_venting:
      name: การระบายอากาศของหลังคา
      description: ระบุรูปแบบการระบายอากาศของหลังคา ซึ่งส่งผลต่อความต้านทานลมและการระบายความร้อน
    car_cleaning_kit_items_included:
      name: รายการอุปกรณ์ทำความสะอาดรถยนต์ที่รวมอยู่ในชุด
      description: ระบุเครื่องมือและอุปกรณ์เสริมที่ให้มาในชุดอย่างชัดเจน เพื่อให้ผู้ซื้อทราบว่าพวกเขาจะได้รับอะไรบ้างและสามารถเปรียบเทียบชุดต่างๆ
        ได้
    carbonation_level_adjustment:
      name: การปรับระดับความซ่า
      description: ระบุว่าเครื่องทำโซดาให้ระดับความซ่าแบบคงที่หรือปรับได้
    catalytic_combustor_type:
      name: ประเภทเตาเผาแบบเร่งปฏิกิริยา
      description: ระบุว่าเตาใช้ระบบเผาไหม้แบบเร่งปฏิกิริยา แบบไม่ใช้ตัวเร่งปฏิกิริยา
        หรือแบบผสม ซึ่งส่งผลต่อประสิทธิภาพและการปล่อยมลพิษ
    ceiling_light_fixture_style:
      name: รูปแบบโคมไฟเพดาน
      description: อธิบายรูปแบบโครงสร้าง/การจัดวางหลักของโคมไฟเพดาน
    center_hole_shape:
      name: รูปทรงรูตรงกลาง
      description: อธิบายรูปทรงเรขาคณิตของรูยึด/รูตรงกลางของใบมีด ซึ่งเป็นตัวกำหนดความเข้ากันได้กับแกนหมุนของเครื่องตัดหญ้าแต่ละรุ่น
    chainsaw_bar_mount_type:
      name: ประเภทการติดตั้งบาร์เลื่อยยนต์
      description: ระบุรูปแบบการติดตั้งหรือลักษณะร่องของบาร์เลื่อยยนต์เพื่อให้แน่ใจว่าเข้ากับหัวเครื่องของเลื่อยได้อย่างพอดี
    chainsaw_bar_nose_type:
      name: ประเภทหัวบาร์เลื่อยยนต์
      description: ระบุรูปแบบของหัวบาร์ ซึ่งส่งผลต่อประสิทธิภาพการตัดและการบำรุงรักษา
    chainsaw_bar_type:
      name: ประเภทบาร์เลื่อยยนต์
      description: จำแนกตามโครงสร้างหรือวัตถุประสงค์ของบาร์
    chainsaw_cutter_type:
      name: ประเภทใบมีดเลื่อยโซ่ยนต์
      description: ระบุรูปทรง/การออกแบบของใบมีดบนโซ่ ซึ่งส่งผลต่อความเร็วในการตัด
        ความทนทาน และลักษณะการดีดกลับ
    champagne_glass_type:
      name: ประเภทของแก้วแชมเปญ
      description: ระบุดีไซน์เฉพาะของแก้วแชมเปญ ช่วยให้ผู้ซื้อสามารถแยกแยะรูปทรงที่เหมาะสมกับประสบการณ์การดื่มที่แตกต่างกันได้
    chandelier_shape:
      name: รูปทรงโคมระย้า
      description: อธิบายรูปแบบโครงสร้างโดยรวมของโคมระย้า
    charcoal_chimney_features:
      name: คุณสมบัติของถังจุดถ่าน
      description: แสดงรายการคุณสมบัติการใช้งานที่โดดเด่นของถังจุดถ่าน
    charcoal_ignition_type:
      name: ประเภทการจุดถ่าน
      description: ระบุว่าถ่านนั้นได้รับการปรับปรุงหรือดัดแปลงเพื่อให้จุดติดง่ายขึ้นหรือเผาไหม้สะอาดขึ้นหรือไม่
    chopstick_style:
      name: รูปแบบตะเกียบ
      description: ระบุรูปแบบตะเกียบตามภูมิภาคหรือวัฒนธรรม ซึ่งอาจส่งผลต่อความยาว
        รูปทรง และการตกแต่ง
    chopstick_trainer_design:
      name: การออกแบบอุปกรณ์ฝึกใช้ตะเกียบ
      description: อธิบายถึงการออกแบบเชิงกลหรือวิธีการช่วยเหลือที่อุปกรณ์ฝึกนี้ใช้
    cigar_cutter_type:
      name: ประเภทที่ตัดซิการ์
      description: ระบุกลไกหรือรูปแบบการตัดที่ใช้ในการตัดส่วนปลายของซิการ์
    cigar_punch_type:
      name: ประเภทของที่เจาะซิการ์
      description: ระบุกลไกหรือรูปแบบของที่เจาะซิการ์
    clay_pot_material:
      name: วัสดุที่ใช้ทำหม้อดิน
      description: ระบุส่วนประกอบของดินหรือรูปแบบของหม้อ เช่น เครื่องปั้นดินเผาหรือดินสโตนแวร์
    cleaner_concentration:
      name: ความเข้มข้นของน้ำยาทำความสะอาด
      description: ระบุว่าน้ำยาทำความสะอาดจำหน่ายในรูปแบบพร้อมใช้งานหรือแบบเข้มข้นที่ต้องเจือจางก่อนใช้งาน
    cleaning_cloth_features:
      name: คุณสมบัติของผ้าทำความสะอาด
      description: เน้นคุณลักษณะพิเศษด้านประสิทธิภาพของผ้า
    cleaning_solution_concentration:
      name: ความเข้มข้นของน้ำยาทำความสะอาด
      description: ระบุว่าผลิตภัณฑ์นี้จำหน่ายในรูปแบบพร้อมใช้งาน แบบเข้มข้น หรือในรูปแบบเจือจางอื่นๆ
    clock_chime_melody:
      name: ทำนองเสียงระฆังนาฬิกา
      description: ระบุทำนองหรือรูปแบบการตีระฆังที่นาฬิกาจะเล่นทุกชั่วโมงหรือทุก 15
        นาที
    clock_display_type:
      name: ประเภทการแสดงเวลา
      description: ระบุวิธีการแสดงเวลา ซึ่งมีประโยชน์สำหรับลูกค้าที่ต้องการแบบดิจิทัล
        อนาล็อก หรือแบบพลิกเปลี่ยนเวลา เป็นต้น
    clock_hand_mounting_type:
      name: ประเภทการติดตั้งเข็มนาฬิกา
      description: อธิบายรูปแบบส่วนต่อประสานที่ใช้ในการยึดเข็มนาฬิกาเข้ากับกลไก
    clock_hand_style:
      name: รูปแบบเข็มนาฬิกา
      description: ระบุการออกแบบรูปลักษณ์ของเข็มนาฬิกา ช่วยให้ผู้ซื้อสามารถเลือกเข็มนาฬิกาที่เข้ากับสไตล์ของนาฬิกาของตนได้
    clock_movement_type:
      name: ประเภทกลไกนาฬิกา
      description: ระบุกลไกการบอกเวลาภายในของนาฬิกา
    clothespin_type:
      name: ประเภทของที่หนีบผ้า
      description: ระบุลักษณะการออกแบบโครงสร้าง/รูปแบบของที่หนีบผ้า
    co2_cylinder_compatibility:
      name: ความเข้ากันได้กับถัง CO2
      description: ระบุประเภทหรือขนาดของถัง CO2 ที่เครื่องทำโซดาใช้ เพื่อให้ผู้ซื้อสามารถหาหลอดเติมที่เข้ากันได้
    co2_supplementation_requirement:
      name: ความต้องการในการเสริม CO2
      description: ระบุระดับการเสริมคาร์บอนไดออกไซด์ที่จำเป็นต่อสุขภาพที่ดีที่สุดของพืชในตู้ปลา
    coaster_features:
      name: คุณลักษณะของแผ่นรองแก้ว
      description: ระบุคุณสมบัติเฉพาะของแผ่นรองแก้ว เช่น ฐานที่ดูดซับน้ำได้หรือกันลื่น
    cocktail_strainer_type:
      name: ประเภทของที่กรองค็อกเทล
      description: ระบุดีไซน์ของที่กรองค็อกเทล ซึ่งส่งผลต่อความเข้ากันได้กับเชคเกอร์และรูปแบบการใช้งาน
    code_technology:
      name: เทคโนโลยีรหัส
      description: ระบุเทคโนโลยีรหัสหรือเทคโนโลยีความปลอดภัยที่รีโมทใช้ในการสื่อสารกับเครื่องเปิดประตูโรงรถ
    coffee_decanter_warmer_features:
      name: คุณสมบัติของเครื่องอุ่นเหยือกกาแฟ
      description: เน้นคุณสมบัติการใช้งานหรือความปลอดภัยที่โดดเด่นเฉพาะของเครื่องอุ่นเหยือกกาแฟ
    coffee_filter_basket_size:
      name: ขนาดตะแกรงกรองกาแฟ
      description: ระบุขนาดมาตรฐานที่ตะแกรงรองรับ เพื่อให้มั่นใจได้ว่าสามารถใช้งานร่วมกับกระดาษกรองและเครื่องชงกาแฟได้
    coffee_filter_shape:
      name: รูปทรงของกระดาษกรองกาแฟ
      description: ระบุรูปทรงเรขาคณิตของกระดาษกรองกาแฟเพื่อให้แน่ใจว่าจะสามารถใช้งานร่วมกับเครื่องชงกาแฟรุ่นต่างๆ
        ได้
    coffee_filter_type:
      name: ประเภทกระดาษกรองกาแฟ
      description: ระบุรูปแบบของกระดาษกรองที่เครื่องชงกาแฟแบบหยดรองรับหรือมีให้ ซึ่งอาจส่งผลต่อรสชาติและค่าใช้จ่ายในการเปลี่ยนกระดาษกรองอย่างต่อเนื่อง
    coffee_grinder_accessory_type:
      name: ประเภทอุปกรณ์เสริมเครื่องบดกาแฟ
      description: จำแนกประเภทของอุปกรณ์เสริมเฉพาะชนิดที่จะช่วยในการเลือกและค้นหา
    colander_style:
      name: รูปแบบของตะแกรงกรอง
      description: จำแนกประเภทการออกแบบโครงสร้างของตะแกรงกรอง เช่น แบบมีฐาน หรือแบบวางบนอ่างล้างจาน
    compatible_air_conditioner_type:
      name: ประเภทเครื่องปรับอากาศที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบของเครื่องปรับอากาศที่อุปกรณ์เสริมนี้ได้รับการออกแบบมาให้ใช้งานร่วมกันได้
    compatible_awning_rail_type:
      name: ประเภทรางกันสาดที่ใช้งานร่วมกันได้
      description: ระบุรางกันสาดหรือระบบท่อที่คลิปแขวนได้รับการออกแบบมาให้ใช้งานร่วมกันได้
    compatible_beverage_type:
      name: ประเภทเครื่องดื่มที่ใช้งานร่วมกันได้
      description: ระบุประเภทของเครื่องดื่มที่จุกปิดหรือตัวกันรั่วนี้ถูกออกแบบมาเพื่อใช้ในการรักษาคุณภาพ
    compatible_can_size:
      name: ขนาดกระป๋องที่ใช้งานร่วมกันได้
      description: แสดงรายการขนาดกระป๋องเครื่องดื่มที่เครื่องบดสามารถรองรับได้
    compatible_cigarette_size:
      name: ขนาดบุหรี่ที่ใช้งานร่วมกันได้
      description: แสดงรายการความยาวหรือรูปแบบบุหรี่มาตรฐานที่พอดีกับที่ใส่บุหรี่
    compatible_coffee_capsule_system:
      name: ระบบแคปซูลกาแฟที่ใช้งานร่วมกันได้
      description: ระบุระบบแคปซูลหรือพ็อดที่อะแดปเตอร์ได้รับการออกแบบมาเพื่อรองรับ
        เพื่อให้ผู้ซื้อเลือกอะแดปเตอร์ที่เหมาะสมกับรูปแบบกาแฟที่ต้องการ
    compatible_coffee_maker_type:
      name: ประเภทเครื่องชงกาแฟที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบของเครื่องชงกาแฟหรือเครื่องเอสเปรสโซที่อุปกรณ์เสริมนี้ได้รับการออกแบบมาเพื่อใช้งานร่วมกัน
    compatible_cooking_thermometer_type:
      name: ประเภทเทอร์โมมิเตอร์อาหารที่ใช้งานร่วมกันได้
      description: ระบุประเภทของเทอร์โมมิเตอร์อาหารที่เครื่องมือสอบเทียบนี้ออกแบบมาเพื่อปรับหรือตรวจสอบ
    compatible_coupler_size:
      name: ขนาดหัวต่อที่เข้ากันได้
      description: ระบุขนาดหัวต่อที่ถุงบีบครีมสามารถใช้ได้โดยไม่ต้องตัดแต่ง
    compatible_dehumidifier_technology:
      name: เทคโนโลยีเครื่องลดความชื้นที่ใช้งานร่วมกันได้
      description: ระบุเทคโนโลยีเครื่องลดความชื้นที่ตัวกรองสามารถใช้งานร่วมกันได้
        เช่น แบบคอมเพรสเซอร์หรือแบบสารดูดความชื้น
    compatible_feeder_type:
      name: ประเภทตัวป้อนที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบตัวป้อนที่ถาดนี้ออกแบบมาให้ใช้งานร่วมกันได้
    compatible_footwear_material:
      name: วัสดุของรองเท้าที่ใช้งานร่วมกันได้
      description: ระบุประเภทวัสดุของรองเท้าที่เหมาะสมกับน้ำยาขัดเงาหรือแว็กซ์นี้แต่ละชนิด
    compatible_fuel_type:
      name: ประเภทเชื้อเพลิงที่ใช้งานร่วมกันได้
      description: ระบุประเภทเชื้อเพลิงที่อุปกรณ์เสริมนี้ได้รับการออกแบบให้ใช้งานร่วมกันได้
        เพื่อให้มั่นใจได้ว่าสามารถใช้งานร่วมกับเครื่องทำความร้อนกลางแจ้งที่ใช้แก๊สโพรเพน
        ก๊าซธรรมชาติ ไฟฟ้า หรือเชื้อเพลิงประเภทอื่นๆ ได้อย่างเหมาะสม
    compatible_garment_steamer_design:
      name: รูปแบบเครื่องรีดผ้าไอน้ำที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบเครื่องรีดผ้าไอน้ำที่ตัวยึดสายไฟได้รับการออกแบบมาให้ใช้งานร่วมกันได้
    compatible_grill_type:
      name: ประเภทเตาปิ้งย่างที่ใช้งานร่วมกันได้
      description: ระบุประเภทของเตาปิ้งย่างที่อุปกรณ์เสริมนี้ออกแบบมาให้ใช้งานร่วมกันได้
    compatible_hazardous_waste_type:
      name: ประเภทของเสียอันตรายที่รองรับได้
      description: ระบุประเภทของเสียอันตรายที่ภาชนะบรรจุนี้ออกแบบมาเพื่อบรรจุ
    compatible_ironing_board_type:
      name: ประเภทของโต๊ะรีดผ้าที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบของโต๊ะรีดผ้าที่ชิ้นส่วนนั้นใช้ร่วมกันได้ เพื่อช่วยให้ผู้ซื้อตรวจสอบความเข้ากันได้
    compatible_lawn_mower_type:
      name: ประเภทเครื่องตัดหญ้าที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบของเครื่องตัดหญ้าที่ชุดสร้างลายหญ้านี้ออกแบบมาให้ใช้งานร่วมกันได้
    compatible_leaf_blower_style:
      name: รูปแบบเครื่องเป่าใบไม้ที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบของเครื่องเป่าใบไม้ที่อุปกรณ์เสริมนี้สามารถใช้งานร่วมกันได้
    compatible_mailbox_size:
      name: ขนาดตู้จดหมายที่ใช้งานร่วมกันได้
      description: ระบุขนาดตู้จดหมายที่อุปกรณ์เสริมนี้ออกแบบมาให้ใช้งานร่วมกันได้
        โดยอิงตามการจำแนกประเภททั่วไปของ USPS/อุตสาหกรรม
    compatible_mailbox_type:
      name: ประเภทกล่องจดหมายที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบของกล่องจดหมายที่พอดีกับภายในหรือเข้ากันได้กับโครงตู้จดหมาย
        ช่วยให้ผู้ซื้อตรวจสอบความเหมาะสมได้
    compatible_napkin_size:
      name: ขนาดผ้าเช็ดปากที่ใช้งานร่วมกันได้
      description: ระบุขนาดหรือรูปแบบของผ้าเช็ดปากที่ที่วาง/ที่จ่ายผ้าเช็ดปากได้รับการออกแบบมาให้ใช้งานได้
    compatible_outdoor_grill_style:
      name: รูปแบบเตาย่างกลางแจ้งที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบหรือโครงสร้างของเตาย่างกลางแจ้งที่ฝาครอบได้รับการออกแบบมาให้เข้ากัน
    compatible_radiator_style:
      name: รูปแบบเครื่องทำความร้อนที่ใช้งานร่วมกันได้
      description: แสดงรายการรูปแบบเครื่องทำความร้อนที่อุปกรณ์เสริมนี้ได้รับการออกแบบมาใช้งานร่วมกันได้
        เช่น เครื่องทำความร้อนแบบแผง เครื่องทำความร้อนแบบแถว เครื่องทำความร้อนแบบราวแขวนผ้า
        หรือเครื่องทำความร้อนแบบติดผนัง
    compatible_refrigerator_compartment:
      name: ช่องแช่เย็นที่ใช้งานร่วมกันได้
      description: ระบุตำแหน่งในตู้เย็นที่อุปกรณ์เสริมนี้ควรใช้งาน
    compatible_stove_fuel_type:
      name: ประเภทเชื้อเพลิงสำหรับเตาที่ใช้งานร่วมกันได้
      description: ระบุประเภทเชื้อเพลิงที่อุปกรณ์เสริมสำหรับเตาพกพาสามารถใช้ร่วมกันได้
        ช่วยให้ลูกค้าเลือกสินค้าให้เหมาะสมกับเตาของตน (เช่น แก๊สกระป๋องหรือแอลกอฮอล์)
    compatible_stove_type:
      name: ประเภทเตาที่ใช้งานร่วมกันได้
      description: ระบุประเภทของเตาปรุงอาหารแบบพกพาที่ฐานนี้ออกแบบมาเพื่อใช้งานร่วมกัน
    compatible_tissue_box_type:
      name: ประเภทกล่องทิชชูที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบ/ขนาดของกล่องทิชชูที่ที่วางนี้ออกแบบมาให้ใช้ร่วมกันได้
    compatible_tractor_type:
      name: ประเภทรถแทรกเตอร์ที่ใช้งานร่วมกันได้
      description: ระบุประเภทของรถแทรกเตอร์ที่ชิ้นส่วน/อุปกรณ์เสริมนี้ได้รับการออกแบบมาเพื่อใช้งานร่วมกัน
    compatible_umbrella_type:
      name: ประเภทร่มที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบของร่มกลางแจ้งที่ผ้าคลุมนี้ออกแบบมาให้พอดี
    compatible_washing_machine_type:
      name: ประเภทเครื่องซักผ้าที่ใช้งานร่วมกันได้
      description: ระบุว่าน้ำยาทำความสะอาดนี้เหมาะสำหรับเครื่องซักผ้าแบบใด (เช่น ฝาหน้า
        ฝาบน ประสิทธิภาพสูง)
    compatible_waste_container_type:
      name: ประเภทถังขยะที่ใช้งานร่วมกันได้
      description: ระบุประเภทของถังขยะที่อุปกรณ์เสริมนี้ออกแบบมาให้ใช้งานร่วมกันได้
    compatible_water_cooler_type:
      name: ประเภทเครื่องทำน้ำเย็นที่ใช้งานร่วมกันได้
      description: ระบุว่าอุปกรณ์เสริมนี้สามารถใช้งานร่วมกับเครื่องทำน้ำเย็นรุ่นใด
        ช่วยให้ลูกค้าเลือกชิ้นส่วนที่ถูกต้องสำหรับเครื่องของตนได้
    compatible_water_heater_type:
      name: ประเภทเครื่องทำน้ำอุ่นที่ใช้งานร่วมกันได้
      description: ระบุประเภทของเครื่องทำน้ำอุ่นที่ผลิตภัณฑ์นี้สามารถใช้งานร่วมกันได้
    compatible_wrap_material:
      name: วัสดุห่ออาหารที่ใช้งานร่วมกันได้
      description: แสดงรายการประเภทของวัสดุห่ออาหารที่เครื่องจ่ายนี้ออกแบบมาให้ใช้งานได้
    compost_aerator_design:
      name: การออกแบบเครื่องเติมอากาศสำหรับปุ๋ยหมัก
      description: ระบุการออกแบบเชิงกลหรือรูปแบบของเครื่องเติมอากาศ อธิบายว่ามันช่วยกวนปุ๋ยหมักอย่างไร
    compost_form:
      name: รูปแบบปุ๋ยหมัก
      description: อธิบายถึงลักษณะทางกายภาพหรือรูปแบบบรรจุภัณฑ์ของผลิตภัณฑ์ปุ๋ยหมัก
    compost_source_material:
      name: วัตถุดิบตั้งต้นในการทำปุ๋ยหมัก
      description: ระบุวัตถุดิบอินทรีย์หลักที่ใช้ในการผลิตปุ๋ยหมัก
    compression_method:
      name: วิธีการบีบอัด
      description: ระบุเทคนิคที่ใช้ในการไล่อากาศออกหรือประหยัดพื้นที่ในถุง
    cooking_gel_fuel_base:
      name: ส่วนประกอบหลักของเชื้อเพลิงเจลสำหรับทำอาหาร
      description: ระบุส่วนประกอบทางเคมีหลักของเชื้อเพลิงเจล ช่วยให้ผู้ใช้สามารถเลือกได้ระหว่างเชื้อเพลิงที่มีเอทานอลเป็นส่วนประกอบ
        เมทานอลเป็นส่วนประกอบ ไกลคอลเป็นส่วนประกอบ และสูตรเชื้อเพลิงอื่นๆ ที่แตกต่างกันในด้านกลิ่น
        ปริมาณความร้อน และความเหมาะสมสำหรับการใช้งานภายใน/ภายนอกอาคาร
    cooking_surface_texture:
      name: พื้นผิวของเตาปรุงอาหาร
      description: ระบุลักษณะพื้นผิวของเตาปรุงอาหาร เช่น เรียบ เป็นร่อง หรือใช้งานได้สองวัตถุประสงค์
    cooking_thermometer_design:
      name: การออกแบบเทอร์โมมิเตอร์วัดอุณหภูมิอาหาร
      description: ระบุรูปแบบการทำงานของเทอร์โมมิเตอร์วัดอุณหภูมิอาหาร เช่น แบบอนาล็อกหรือแบบดิจิทัล
    cookware_coating_material:
      name: วัสดุเคลือบผิวเครื่องครัว
      description: ระบุประเภทของสารเคลือบผิวภายในหรือภายนอกที่ใช้กับเครื่องครัว ซึ่งให้ข้อมูลเชิงลึกเกี่ยวกับประสิทธิภาพในการไม่ติดกระทะ
        ความทนทาน และข้อกำหนดในการดูแลรักษา
    cookware_coating_type:
      name: ประเภทของการเคลือบเครื่องครัว
      description: ระบุการเคลือบด้านในหรือด้านนอกของเครื่องครัว
    cookware_lid_style:
      name: รูปแบบฝาปิดเครื่องครัว
      description: อธิบายถึงรูปแบบโดยรวมหรือโครงสร้างการใช้งานของฝาปิด
    cooler_style:
      name: รูปแบบของกล่องเก็บความเย็น
      description: ระบุการออกแบบโครงสร้างของกล่องเก็บความเย็นพกพาสำหรับอาหาร/เครื่องดื่ม
        ช่วยให้ผู้ซื้อเลือกได้ระหว่างกล่องเก็บความเย็นแบบแข็ง แบบนุ่มนวล หรือแบบเป้สะพายหลัง
        เป็นต้น
    corkscrew_accessories_included:
      name: อุปกรณ์เสริมสำหรับที่เปิดขวดไวน์ที่รวมอยู่ในชุด
      description: ระบุส่วนประกอบเพิ่มเติมที่บรรจุมาพร้อมกับที่เปิดขวดไวน์
    corkscrew_hinge_type:
      name: ประเภทบานพับของที่เปิดขวดไวน์
      description: ระบุว่าที่เปิดขวดไวน์ใช้กลไกบานพับเดี่ยวหรือบานพับคู่
    corkscrew_tools_included:
      name: อุปกรณ์ที่มาพร้อมกับที่เปิดขวดไวน์
      description: ระบุรายการเครื่องมือและอุปกรณ์เสริมที่บรรจุมาพร้อมกับที่เปิดจุกไวน์
        (เช่น ที่ตัดฟอยล์ ที่เปิดขวด ใบมีด) เพื่อให้ผู้ซื้อเห็นว่ามีอะไรบ้าง
    crushing_method:
      name: วิธีการบีบอัด
      description: อธิบายกลไกที่ใช้ในการบีบอัดกระป๋อง
    crust_browning_level:
      name: ระดับความเหลืองกรอบของเปลือกขนมปัง
      description: ระบุตัวเลือกสี/ความเข้มของเปลือกขนมปังที่เครื่องทำขนมปังมีให้เลือก
    cultivar_type:
      name: ประเภทพันธุ์
      description: ระบุประเภทการผสมพันธุ์ของพันธุ์นั้นๆ ว่าเป็นพันธุ์ดั้งเดิม พันธุ์ลูกผสม
        พันธุ์ผสมเปิด หรือพันธุ์ดัดแปลงพันธุกรรม
    cultivator_type:
      name: ประเภทของเครื่องพรวนดิน
      description: จำแนกตามโครงสร้างของเครื่องพรวนดิน เช่น แบบฟันหน้าหรือแบบฟันหลัง
    cup_warmer_features:
      name: คุณสมบัติของเครื่องอุ่นถ้วย
      description: เน้นคุณสมบัติการออกแบบพิเศษหรือคุณสมบัติอำนวยความสะดวกเฉพาะของเครื่องอุ่นถ้วย
    curtain_heading_style:
      name: สไตล์หัวผ้าม่าน
      description: ระบุรูปแบบของขอบบน/หัวผ้าม่านที่ใช้สำหรับแขวนผ้าม่าน ซึ่งจะกำหนดอุปกรณ์ที่จำเป็นและรูปลักษณ์โดยรวม
    curtain_lining_type:
      name: ประเภทของซับในผ้าม่าน
      description: ระบุว่าผ้าม่านมีซับในหรือไม่ และใช้ซับในชนิดใด ซึ่งส่งผลต่อฉนวนกันความร้อน
        ความเป็นส่วนตัว และความพลิ้วไหวของผ้าม่าน
    curtain_rod_type:
      name: ประเภทของราวผ้าม่าน
      description: จำแนกรูปแบบโครงสร้างของราว ช่วยให้ผู้ซื้อสามารถค้นหาราวที่เหมาะสมกับความต้องการในการติดตั้งได้อย่างรวดเร็ว
    cutting_disc_function:
      name: หน้าที่ของแผ่นตัด
      description: อธิบายการทำงานเฉพาะด้านของการแปรรูปอาหารที่แผ่นตัดนั้นทำ
    cutting_head_type:
      name: ประเภทหัวตัด
      description: ระบุรูปแบบขององค์ประกอบการตัดที่ใช้โดยอุปกรณ์เสริม
    cutting_mechanism_type:
      name: ประเภทกลไกการตัด
      description: อธิบายรูปแบบของใบมีดตัดที่ติดตั้งอยู่ในเครื่องจ่าย
    cylinder_connector_type:
      name: ประเภทตัวเชื่อมต่อถัง
      description: ระบุการเชื่อมต่อหรือส่วนต่อประสานเกลียวของถัง ซึ่งเป็นตัวกำหนดความเข้ากันได้กับเครื่องทำโซดาแต่ละรุ่น
    decorating_bag_features:
      name: คุณสมบัติของถุงบีบครีม
      description: เน้นคุณสมบัติการออกแบบพิเศษหรือฟังก์ชันการใช้งานของถุงบีบครีม
    dehumidifier_refill_form:
      name: รูปแบบน้ำยาเติมเครื่องลดความชื้น
      description: อธิบายรูปแบบ/ลักษณะทางกายภาพของน้ำยาเติม เพื่อให้ลูกค้าสามารถเลือกรูปแบบที่เข้ากันได้
    desiccant_material:
      name: สารดูดความชื้น
      description: ระบุสารดูดความชื้นที่ใช้ ซึ่งมีความสำคัญต่อประสิทธิภาพ การนำกลับมาใช้ใหม่
        และข้อควรพิจารณาด้านความปลอดภัย
    dial_finish:
      name: ลักษณะพื้นผิวหน้าปัด
      description: อธิบายถึงลักษณะพื้นผิวของหน้าปัด ซึ่งมีผลต่อแสงสะท้อนและสไตล์
    dinnerware_features:
      name: คุณสมบัติของชุดจานชาม
      description: เน้นคุณสมบัติการใช้งานพิเศษของชุดจานชามแต่ละชิ้น
    dish_detergent_features:
      name: คุณสมบัติของน้ำยาล้างจาน
      description: ระบุคุณสมบัติเด่นด้านส่วนผสมหรือคุณสมบัติที่เป็นมิตรต่อสิ่งแวดล้อม
        ซึ่งช่วยให้ผู้ซื้อสามารถคัดกรองและเปรียบเทียบผลิตภัณฑ์ได้
    dishwasher_accessory_type:
      name: ประเภทอุปกรณ์เสริมเครื่องล้างจาน
      description: จำแนกประเภทอุปกรณ์เสริมเฉพาะ ทำให้ผู้ซื้อสามารถกรองได้อย่างรวดเร็ว
    dishwasher_wash_programs:
      name: โปรแกรมการล้างของเครื่องล้างจาน
      description: แสดงรายการโปรแกรมการล้างที่ตั้งไว้ล่วงหน้าที่มีให้เลือกใช้ในเครื่องล้างจาน
        ช่วยให้ลูกค้าสามารถกรองตามความหลากหลายของโปรแกรมได้
    dispensing_mechanism:
      name: กลไกการจ่าย
      description: อธิบายวิธีการจ่ายเครื่องดื่มจากกระติกน้ำร้อน ซึ่งมีผลต่อการใช้งานในสถานการณ์ต่างๆ
    dispensing_temperature_options:
      name: ตัวเลือกอุณหภูมิในการจ่ายน้ำ
      description: ระบุตัวเลือกอุณหภูมิที่เครื่องทำน้ำเย็นสามารถจ่ายได้
    displayed_character:
      name: อักขระที่แสดง
      description: ระบุอักขระตัวอักษรและตัวเลขที่แทนชิ้นส่วนแต่ละชิ้น
    diving_board_surface_texture:
      name: พื้นผิวของกระดานกระโดดน้ำ
      description: อธิบายถึงพื้นผิวด้านบนของกระดาน ซึ่งส่งผลต่อการยึดเกาะและความต้านทานการลื่นไถล
    door_configuration:
      name: การจัดเรียงประตูทางเข้า
      description: ระบุจำนวนประตูทางเข้าของกับดัก
    door_hinge_orientation:
      name: ทิศทางการติดตั้งบานพับประตู
      description: ระบุตำแหน่งบานพับหรือทิศทางการเปิดของประตูหรือฝาปิดตู้แช่แข็ง
    door_hinge_position:
      name: ตำแหน่งบานพับประตู
      description: ระบุด้านของประตูที่ต้องการติดตั้งบานพับ หรือหากสามารถติดตั้งกลับด้านได้
        จะส่งผลต่อการติดตั้งและการวางแผนพื้นที่
    draft_gas_type:
      name: ประเภทแก๊สเครื่องดื่ม
      description: ระบุประเภทของระบบแก๊สที่ใช้ในการจ่ายเครื่องดื่ม ซึ่งมีความสำคัญต่อการอัดแก๊สและรูปแบบของเครื่องดื่ม
    drainage_design:
      name: การออกแบบระบบระบายน้ำ
      description: แสดงให้เห็นว่าที่วางสบู่จัดการการระบายน้ำอย่างไรเพื่อให้สบู่แห้งอยู่เสมอ
    drainage_method:
      name: วิธีการระบายน้ำ
      description: อธิบายวิธีการระบายน้ำที่สะสมไว้ โดยระบุว่าจำเป็นต้องระบายน้ำออกด้วยมือหรือไม่
    drawer_organizer_features:
      name: คุณลักษณะของถาดเก็บของในลิ้นชัก
      description: เน้นคุณสมบัติการใช้งานที่โดดเด่นของถาดเก็บของในลิ้นชัก
    drinkware_crystal_composition:
      name: ส่วนประกอบแก้วคริสตัลในทำภาชนะเครื่องดื่ม
      description: ระบุส่วนผสมเฉพาะของแก้ว/คริสตัลที่ใช้ โดยเน้นปริมาณตะกั่วและลักษณะความใส
    drinkware_holder_style:
      name: รูปแบบของที่วางภาชนะเครื่องดื่ม
      description: จำแนกประเภทการออกแบบหรือโครงสร้างโดยทั่วไปของที่วางภาชนะเครื่องดื่ม
    drinkware_insulation:
      name: ฉนวนกันความร้อนของภาชนะเครื่องดื่ม
      description: ระบุโครงสร้างของฉนวนกันความร้อนของภาชนะเครื่องดื่ม ซึ่งส่งผลต่อการรักษาอุณหภูมิ
    dripper_design:
      name: การออกแบบดริปเปอร์
      description: ระบุรูปทรงโดยรวมของดริปเปอร์หรือรูปแบบการไหลออกของน้ำ ซึ่งส่งผลต่อคุณลักษณะของกาแฟที่ชง
    drum_grating_styles_included:
      name: รูปแบบของดรัมขูดที่มีให้เลือก
      description: แสดงรายการดรัมขูดหรือหั่นแบบต่างๆ ที่มีให้ในชุด เพื่อให้ผู้ใช้สามารถดูฟังก์ชันการใช้งานได้อย่างรวดเร็ว
    dryer_drum_material:
      name: วัสดุของถังอบผ้า
      description: ระบุวัสดุที่ใช้ในการสร้างโครงสร้างภายในถังอบผ้า ซึ่งส่งผลต่อความทนทาน
        การสะสมไฟฟ้าสถิต และเสียงรบกวน
    dryer_sheet_features:
      name: คุณสมบัติของแผ่นอบผ้า
      description: เน้นคุณลักษณะพิเศษหรือประโยชน์ของแผ่นอบผ้า
    dryer_venting_type:
      name: ประเภทการระบายอากาศของเครื่องอบผ้า
      description: จำแนกวิธีการระบายอากาศที่เครื่องอบผ้าใช้ ซึ่งส่งผลต่อข้อกำหนดในการติดตั้งและประสิทธิภาพการใช้พลังงาน
    drying_system:
      name: ระบบอบแห้ง
      description: ระบุเทคโนโลยีที่เครื่องล้างจานใช้ในการอบแห้งจานชามเมื่อสิ้นสุดรอบการทำงาน
    duster_head_material:
      name: วัสดุของหัวแปรงปัดฝุ่น
      description: ระบุวัสดุของหัวปัดฝุ่นเพื่อประสิทธิภาพและข้อควรพิจารณาเกี่ยวกับสารก่อภูมิแพ้
    dustpan_type:
      name: ประเภทของที่ตักขยะ
      description: จำแนกรูปแบบ/ลักษณะโดยรวมของที่ตักขยะ
    edge_finish:
      name: การตกแต่งขอบ
      description: อธิบายถึงเทคนิคการตกแต่งขอบที่ใช้กับรันเนอร์ ซึ่งส่งผลต่อความสวยงามและความทนทาน
    egg_cooker_functions:
      name: ฟังก์ชั่นของเครื่องต้มไข่
      description: แสดงรายการโหมดการทำอาหารที่เครื่องต้มไข่รองรับ
    egg_cup_design:
      name: การออกแบบถ้วยวางไข่
      description: ระบุรูปแบบโครงสร้างของถ้วยวางไข่ เช่น มีฐานหรือไม่มีฐาน
    electric_kettle_features:
      name: คุณสมบัติของกาต้มน้ำไฟฟ้า
      description: ระบุคุณสมบัติเด่นด้านความสะดวกสบายหรือความปลอดภัยที่มีอยู่ในกาต้มน้ำ
    emergency_blanket_features:
      name: คุณสมบัติของผ้าห่มฉุกเฉิน
      description: เน้นคุณลักษณะการใช้งานพิเศษของผ้าห่ม
    emergency_lighting_operating_mode:
      name: โหมดการทำงานของไฟฉุกเฉิน
      description: ระบุวิธีการทำงานของโคมไฟฉุกเฉินในสภาวะไฟฟ้าปกติและขณะไฟฟ้าดับ
    entrance_slot_design:
      name: การออกแบบช่องทางเข้า
      description: อธิบายถึงรูปแบบของช่องเปิดที่ช่วยให้ผีเสื้อสามารถเข้าไปในบ้านได้
    espresso_boiler_type:
      name: ประเภทหม้อต้มเอสเปรสโซ
      description: อธิบายถึงการกำหนดค่าระบบทำความร้อนที่ใช้ในการผลิตกาแฟและไอน้ำ
    fabric_care_product_form:
      name: แบบฟอร์มผลิตภัณฑ์ดูแลผ้า
      description: ระบุรูปแบบทางกายภาพของผลิตภัณฑ์ดูแลผ้า เช่น น้ำยาปรับผ้านุ่ม หรือสารเติมแต่งสำหรับเครื่องอบผ้า
    fabric_softener_features:
      name: คุณสมบัติของน้ำยาปรับผ้านุ่ม
      description: เน้นคุณลักษณะพิเศษหรือประโยชน์ของผลิตภัณฑ์ปรับผ้านุ่ม
    fabric_stiffness_level:
      name: ระดับความแข็งของผ้า
      description: บ่งบอกถึงระดับความแข็งหรือความกรอบของผ้าที่เกิดจากแป้งหลังการรีด
    fabric_weave:
      name: ลักษณะการทอผ้า
      description: บ่งบอกถึงโครงสร้างการทอเฉพาะของผ้า ซึ่งส่งผลต่อสัมผัสและลักษณะที่ปรากฏ
    feeder_design:
      name: การออกแบบตัวป้อน
      description: ระบุรูปแบบโครงสร้างของตัวป้อน
    fermentation_crock_type:
      name: ประเภทของหม้อหมัก
      description: ระบุโครงสร้างพื้นฐานของหม้อดินเผา
    filament_style:
      name: รูปแบบเส้นใย
      description: กำหนดการจัดเรียงเส้นใยภายใน ซึ่งมีผลต่อความสวยงามและการกระจายแสง
    film_reusability:
      name: ความสามารถในการนำฟิล์มกลับมาใช้ใหม่
      description: ระบุว่าฟิล์มนั้นออกแบบมาสำหรับการใช้งานครั้งเดียว หรือสามารถถอดเก็บและนำกลับมาใช้ใหม่ได้
    filter_bleaching_method:
      name: วิธีการฟอกขาวแผ่นกรอง
      description: ระบุสถานะและกระบวนการฟอกขาวที่ใช้สำหรับแผ่นกรอง ซึ่งเป็นข้อมูลประกอบการตัดสินใจเกี่ยวกับรสชาติและความยั่งยืน
    filter_technology:
      name: เทคโนโลยีการกรอง
      description: ระบุเทคโนโลยีควบคุมกลิ่นหรือการกรองที่ใช้
    fire_alarm_panel_type:
      name: ประเภทแผงควบคุมสัญญาณเตือนไฟไหม้
      description: ระบุโครงสร้างระบบของแผงควบคุม
    fire_protection_class:
      name: ระดับการป้องกันไฟ
      description: ระบุระดับการรับรองที่กำหนดอุณหภูมิภายในสูงสุดที่อนุญาตในระหว่างการทดสอบการทนไฟ
        (เช่น UL Class 350)
    fire_starter_type:
      name: ประเภทอุปกรณ์จุดไฟ
      description: ระบุรูปแบบหรือกลไกหลักของผลิตภัณฑ์จุดไฟ ช่วยให้ผู้ซื้อค้นหารูปแบบการจุดไฟที่ต้องการได้อย่างแม่นยำ
    fireplace_fuel_form:
      name: รูปแบบเชื้อเพลิงสำหรับเตาผิง
      description: ระบุรูปแบบหรือลักษณะของเชื้อเพลิง ทำให้ผู้ซื้อสามารถเลือกได้ระหว่างท่อนไม้
        เม็ดเชื้อเพลิง ก้อนเชื้อเพลิง กระป๋องเจล และตัวเลือกอื่นๆ ที่เหมาะสมกับเตาผิงของตน
    fireplace_tool_items_included:
      name: รายการอุปกรณ์สำหรับเตาผิงที่รวมอยู่ในชุด
      description: ระบุรายการอุปกรณ์หรือเครื่องมือสำหรับเตาผิงที่ให้มาในชุดสินค้า
        เพื่อให้ผู้ซื้อทราบว่าตนจะได้รับอะไรบ้าง และสามารถเปรียบเทียบชุดสินค้าได้อย่างง่ายดาย
    firewood_seasoning:
      name: การผึ่งฟืน
      description: บ่งบอกถึงสถานะการแห้งของฟืน ซึ่งส่งผลต่อปริมาณความชื้น ความง่ายในการจุดไฟ
        และประสิทธิภาพในการให้ความร้อน
    flag_attachment_style:
      name: รูปแบบการติดตั้งธง
      description: อธิบายวิธีการติดตั้งธงหรือถุงบอกทิศทางลมเข้ากับเสาหรือจุดติดตั้ง
    flame_adjustment:
      name: การปรับเปลวไฟ
      description: ระบุว่าสามารถปรับความเข้มของเปลวไฟได้หรือไม่ และอย่างไร
    flask_insulation_type:
      name: ประเภทฉนวนกันความร้อนของกระติก
      description: ระบุโครงสร้างฉนวนกันความร้อนของกระติก ซึ่งส่งผลต่อการรักษาอุณหภูมิ
    flatware_finish:
      name: การตกแต่งพื้นผิวของเครื่องใช้บนโต๊ะอาหาร
      description: อธิบายถึงการเคลือบผิวหรือความเงาของเครื่องใช้บนโต๊ะอาหาร ซึ่งส่งผลต่อความสวยงามและการมองเห็นรอยขีดข่วน
    floor_protection_transparency_level:
      name: ระดับความโปร่งใสของแผ่นป้องกันพื้น
      description: ระบุความโปร่งแสงของแผ่นฟิล์มหรือแผ่นปูพื้น ตั้งแต่ใสจนถึงทึบแสง
    floor_scrubber_brush_type:
      name: ประเภทแปรงสำหรับเครื่องขัดพื้น
      description: อธิบายรูปแบบแปรงหรือแผ่นขัดหลักที่ใช้โดยเครื่องขัดพื้น
    floor_surface_compatibility:
      name: ความเข้ากันได้กับพื้นผิว
      description: ระบุวัสดุพื้นผิวที่ผลิตภัณฑ์ปกป้องนี้ปลอดภัยและออกแบบมาเพื่อปกป้อง
    flow_control_type:
      name: ประเภทการควบคุมการไหล
      description: อธิบายว่าหัวฉีดมีกลไกปรับปริมาณน้ำที่ปล่อยออกมาหรือไม่
    flue_outlet_position:
      name: ตำแหน่งช่องระบายควัน
      description: ระบุตำแหน่งที่ควันออกจากตัวเตา ซึ่งมีผลต่อรูปแบบการติดตั้งและการเชื่อมต่อปล่องไฟ
    flue_pipe_connection_type:
      name: ประเภทการเชื่อมต่อปล่องระบายควัน
      description: อธิบายกลไกการเชื่อมต่อที่ใช้ในการเชื่อมต่อส่วนต่อขยายเข้ากับส่วนประกอบอื่นๆ
        ของระบบจัดการควัน
    fluorescent_tube_output_type:
      name: ประเภทเอาต์พุตของหลอดฟลูออเรสเซนต์
      description: ระบุประเภทย่อยของเอาต์พุตของหลอดฟลูออเรสเซนต์ ซึ่งสำคัญต่อความเข้ากันได้กับบัลลาสต์และความสว่าง
    fly_swatter_type:
      name: ประเภทของไม้ตีแมลงวัน
      description: ระบุรูปแบบการใช้งานหรือกลไกของไม้ตีแมลงวัน
    foil_duty_rating:
      name: ระดับความแข็งแรงของฟอยล์
      description: จำแนกความแข็งแรงหรือเกรดของฟอยล์ตามการใช้งานที่ต้องการ
    foliage_color:
      name: สีของใบ
      description: ระบุสีหลักของใบพืช ซึ่งช่วยในการตัดสินใจเลือกไม้ประดับนอกเหนือจากสีของดอกไม้
    fondue_pot_type:
      name: ประเภทของหม้อฟองดู
      description: จำแนกตามรูปแบบการให้ความร้อนหรือวัตถุประสงค์การใช้งานของชุดหม้อฟองดู
    fondue_set_pieces_included:
      name: อุปกรณ์สำหรับชุดฟองดูที่รวมอยู่ในชุดนี้
      description: ระบุส่วนประกอบที่รวมอยู่ในชุดฟองดู เช่น หม้อฟองดูหรือส้อม
    food_carrier_insulation_type:
      name: ประเภทฉนวนกันความร้อนของภาชนะบรรจุอาหาร
      description: ระบุว่าผลิตภัณฑ์นั้นมีฉนวนกันความร้อนหรือไม่ และใช้เทคโนโลยีฉนวนกันความร้อนแบบใด
    food_dehydrator_surface_type:
      name: ประเภทพื้นผิวของเครื่องอบแห้งอาหาร
      description: อธิบายลักษณะพื้นผิวของแผ่น/ถาด ซึ่งมีผลต่อการไหลเวียนของอากาศและการติดของอาหาร
    food_dehydrator_tray_type:
      name: ประเภทของถาดอบแห้งอาหาร
      description: ระบุรูปแบบหรือการออกแบบการใช้งานเฉพาะของถาด
    food_grater_type:
      name: ประเภทที่ขูดอาหาร
      description: ระบุรูปแบบโครงสร้างของที่ขูดอาหาร
    food_processor_attachments_included:
      name: อุปกรณ์เสริมสำหรับเครื่องเตรียมอาหารที่รวมอยู่ในชุด
      description: ระบุประเภทอุปกรณ์เสริมที่ให้มาในชุดอย่างชัดเจน เพื่อให้ลูกค้าทราบว่าพวกเขาจะได้รับฟังก์ชันใดบ้างจากการซื้อ
    food_storage_bag_features:
      name: คุณสมบัติของถุงเก็บอาหาร
      description: เน้นคุณลักษณะการใช้งานที่โดดเด่นของถุง
    food_storage_bag_type:
      name: ประเภทของถุงเก็บอาหาร
      description: ระบุรูปแบบหลักหรือการจำแนกประเภทการใช้งานที่กำหนดไว้ของถุงเก็บอาหาร
    food_storage_features:
      name: คุณสมบัติการเก็บรักษาอาหาร
      description: เน้นคุณลักษณะพิเศษที่เพิ่มฟังก์ชันการใช้งานหรือความสะดวกสบายให้กับผลิตภัณฑ์เก็บรักษาอาหาร
    food_wrap_features:
      name: คุณสมบัติของแผ่นห่ออาหาร
      description: เน้นคุณลักษณะพิเศษที่มีผลต่อการใช้งานและความยั่งยืน
    footwear_type_compatibility:
      name: ความเข้ากันได้กับรองเท้าประเภทต่างๆ
      description: ระบุประเภทของรองเท้าที่อุปกรณ์จัดทรงนี้ออกแบบมาสำหรับใช้งานร่วมกัน
    formulation_concentration:
      name: ความเข้มข้นของสูตร
      description: ระบุว่าผลิตภัณฑ์นั้นเป็นแบบเข้มข้นหรือแบบพร้อมใช้
    fountain_design:
      name: การออกแบบน้ำพุ
      description: จำแนกประเภทโครงสร้างหรือรูปทรงของน้ำพุ
    fragrance_oil_application:
      name: การใช้งานน้ำมันหอมระเหย
      description: ระบุการใช้งานที่แนะนำหรือการใช้งานทั่วไปสำหรับน้ำมันหอมระเหย เพื่อช่วยให้ลูกค้าที่ชื่นชอบงาน
        DIY และงานอดิเรกสามารถเลือกสูตรที่เหมาะสมได้
    fragrance_oil_composition:
      name: ส่วนประกอบของน้ำมันหอมระเหย
      description: ระบุว่าสูตรดังกล่าวเป็นน้ำมันหอมระเหยจากธรรมชาติล้วนๆ น้ำมันหอมระเหยสังเคราะห์
        หรือเป็นส่วนผสมของทั้งสองอย่าง
    fragrance_refill_type:
      name: ประเภทของรีฟิลน้ำหอม
      description: อธิบายรูปแบบของรีฟิลน้ำหอมที่เครื่องกระจายกลิ่นรองรับ
    freezer_configuration:
      name: การจัดวางช่องแช่แข็ง
      description: ระบุทิศทางการจัดวาง/รูปแบบการออกแบบของช่องแช่แข็ง
    freezing_method:
      name: วิธีการแช่แข็ง
      description: ระบุเทคโนโลยีที่ใช้ในการแช่แข็งส่วนผสมในเครื่องทำไอศกรีม ช่วยให้ผู้ซื้อสามารถแยกแยะความแตกต่างระหว่างรุ่นคอมเพรสเซอร์
        รุ่นที่มีชามแช่แข็งล่วงหน้า รุ่นใช้มือหมุนพร้อมเกลือและน้ำแข็ง และแบบอื่นๆ
        ได้
    fuel_compatibility:
      name: ความเข้ากันได้ของเชื้อเพลิง
      description: ระบุประเภทของเชื้อเพลิงที่ตะแกรงได้รับการออกแบบมาให้รองรับได้อย่างปลอดภัย
    funnel_type:
      name: ประเภทของกรวย
      description: จำแนกประเภทของกรวยตามการออกแบบหรือวัตถุประสงค์การใช้งาน
    furnace_configuration:
      name: โครงร่างของเตาเผา
      description: ระบุทิศทางการไหลของอากาศภายในตู้เตาเผาสำหรับการติดตั้ง
    furniture_anchor_type:
      name: ประเภทตัวยึดเฟอร์นิเจอร์
      description: ระบุรูปแบบโครงสร้างของชุดตัวยึดเฟอร์นิเจอร์ โดยแสดงกลไกการทำงานของชุดดังกล่าว
    garage_floor_mat_style:
      name: รูปแบบของแผ่นปูพื้นโรงรถ
      description: ระบุรูปแบบสินค้าหรือสไตล์ของแผ่นปูพื้นโรงรถ
    garbage_disposal_feed_type:
      name: ประเภทการป้อนเครื่องกำจัดขยะ
      description: ระบุวิธีการป้อนเศษอาหารเข้าเครื่องกำจัดขยะ—ป้อนอย่างต่อเนื่องขณะที่เครื่องทำงาน
        หรือป้อนเป็นชุดๆ
    garbage_disposal_stopper_style:
      name: รูปแบบจุกปิดเครื่องกำจัดขยะ
      description: ระบุรูปแบบการใช้งานของจุกปิด
    garden_hose_design:
      name: การออกแบบสายยางรดน้ำ
      description: ระบุรูปแบบโครงสร้างของสายยาง ซึ่งเป็นตัวกำหนดการใช้งานและลักษณะการใช้งานที่เหมาะสม
    garden_hose_fitting_type:
      name: ประเภทข้อต่อสายยางรดน้ำ
      description: ระบุรูปแบบหรือฟังก์ชันของข้อต่อสายยางรดน้ำ เช่น อะแดปเตอร์หรือตัวแยกรูปตัว
        Y เพื่อช่วยในการค้นหาและตัดสินใจเลือก
    gardening_fork_type:
      name: ประเภทของส้อมพรวนดิน
      description: จำแนกตามรูปแบบหรือวัตถุประสงค์การใช้งานของส้อม
    garland_style:
      name: สไตล์ของพวงมาลัย
      description: จำแนกประเภทโครงสร้างหรือรูปแบบการตกแต่งของพวงมาลัย
    gas_type:
      name: ประเภทก๊าซ
      description: ระบุประเภทของก๊าซอัดที่บรรจุอยู่ในกระบอกชาร์จ
    gasket_profile_type:
      name: ประเภทของรูปแบบปะเก็น
      description: ระบุรูปทรงหรือรูปแบบหน้าตัดตามมาตรฐานอุตสาหกรรมของปะเก็น
    gazebo_roof_material:
      name: วัสดุสำหรับทำหลังคาศาลา
      description: ระบุวัสดุของแผ่นหลังคาหรือวัสดุหุ้มหลังคาแข็งของศาลา
    glass_and_surface_cleaner_features:
      name: คุณสมบัติของผลิตภัณฑ์ทำความสะอาดกระจกและพื้นผิว
      description: เน้นคุณลักษณะพิเศษหรือประโยชน์ของผลิตภัณฑ์ทำความสะอาดกระจกและพื้นผิว
    glass_cleaner_features:
      name: คุณสมบัติของน้ำยาทำความสะอาดกระจก
      description: เน้นคุณสมบัติพิเศษด้านประสิทธิภาพหรือสูตรเฉพาะของน้ำยาทำความสะอาดกระจก
    glazing_material:
      name: วัสดุทำกระจก
      description: ระบุวัสดุที่ปิดคลุมพื้นที่ภาพถ่าย (เช่น กระจก อะคริลิก หรือไม่มีวัสดุปิดคลุม)
    globe_map_content:
      name: เนื้อหาแผนที่โลก
      description: อธิบายเนื้อหาแผนที่หลักที่แสดงบนลูกโลก
    glue_trap_design:
      name: การออกแบบกับดักกาว
      description: ระบุรูปแบบหรือลักษณะทางกายภาพของกับดัก ช่วยให้เลื่อกใช้ได้อย่างเหมาะสมกับพื้นที่ติดตั้งและชนิดของแมลง
    grab_bar_shape:
      name: รูปทรงของราวจับ
      description: อธิบายการออกแบบโครงสร้างของราวจับ ซึ่งส่งผลต่อตำแหน่งการติดตั้งและรูปแบบการรองรับผู้ใช้
    grass_discharge_type:
      name: ประเภทการปล่อยเศษหญ้า
      description: ระบุวิธีการที่เครื่องตัดหญ้าปล่อยเศษหญ้าออก (เช่น ปล่อยออกด้านข้าง
        เก็บใส่ถุงด้านหลัง)
    grate_design:
      name: การออกแบบตะแกรง
      description: ระบุรูปแบบโครงสร้างของตะแกรง
    grater_design:
      name: การออกแบบอุปกรณ์ขูด
      description: จำแนกประเภทการออกแบบทางกายภาพหรือกลไกของเครื่องขูดหรือเครื่องปอกเปลือกมะนาว
    grating_surface_coarseness:
      name: ความหยาบของพื้นผิวสำหรับขูด
      description: ระบุขนาด/ลักษณะของรูหรือสันตัดบนพื้นผิวสำหรับขูด
    grill_grate_material:
      name: วัสดุตะแกรงย่าง
      description: ระบุวัสดุหรือสารเคลือบของตะแกรงย่างหลัก
    grill_thermometer_type:
      name: ประเภทของเทอร์โมมิเตอร์สำหรับย่าง
      description: ระบุการออกแบบหรือเทคโนโลยีหลักของเทอร์โมมิเตอร์สำหรับย่าง ซึ่งจะช่วยให้ผู้ซื้อค้นหาสไตล์ที่เหมาะสมกับอุปกรณ์ย่างของตนได้อย่างรวดเร็ว
    grinding_mechanism_material:
      name: วัสดุของกลไกการบด
      description: ระบุวัสดุของกลไกการบด/ใบมีดภายในที่ใช้บดเครื่องเทศจริงๆ
    grinding_mechanism_type:
      name: ประเภทกลไกการบด
      description: ระบุกลไกภายในที่รับผิดชอบในการบดหรือโม่
    growing_media_buffering:
      name: การปรับสภาพความเป็นกรดด่างของวัสดุปลูก
      description: บ่งชี้ว่าใยมะพร้าวได้รับการปรับสภาพความเป็นกรดด่างเพื่อกำจัดเกลือส่วนเกินซึ่งส่งผลต่อการจัดการธาตุอาหารหรือไม่
    growing_media_form:
      name: รูปแบบของวัสดุปลูก
      description: ระบุลักษณะทางกายภาพของใยมะพร้าว ช่วยให้ผู้ปลูกเข้าใจถึงวิธีการจัดการและความต้องการความชุ่มชื้น
    growing_medium_type:
      name: ประเภทของวัสดุปลูก
      description: ระบุวัสดุตั้งต้นที่ใช้ในการงอกและการเจริญเติบโตของเมล็ด
    growth_habit:
      name: ลักษณะการเจริญเติบโต
      description: อธิบายรูปทรงโดยรวมของพืช ช่วยให้ลูกค้าตัดสินใจเรื่องระยะห่างและการเลือกภาชนะปลูกได้
    hand_dryer_accessory_type:
      name: ประเภทอุปกรณ์เสริมเครื่องเป่ามือ
      description: ระบุประเภทเฉพาะของอุปกรณ์เสริมเครื่องเป่ามือ เพื่อให้ผู้ซื้อเข้าใจผลิตภัณฑ์ได้อย่างรวดเร็ว
    handle_connection_type:
      name: ประเภทการเชื่อมต่อด้ามจับ
      description: ระบุกลไกที่ใช้ในการเชื่อมต่อด้ามจับกับไม้กวาด ไม้ถูพื้น หรือหัวทำความสะอาดอื่นๆ
        เพื่อให้มั่นใจถึงความเข้ากันได้
    handle_grip_style:
      name: รูปแบบปลอกหุ้มด้าม
      description: อธิบายรูปทรงหรือหลักการออกแบบตามหลักสรีรศาสตร์ของด้ามจับคราด
    handle_length_adjustability:
      name: ความสามารถในการปรับความยาวด้ามจับ
      description: อธิบายว่าสามารถปรับความยาวด้ามจับได้หรือไม่ และอย่างไร ช่วยให้ผู้ซื้อสามารถเลือกระหว่างตัวเลือกแบบด้ามจับคงที่และแบบยืดหดได้
    handle_position:
      name: ตำแหน่งด้ามจับ
      description: อธิบายถึงตำแหน่งหรือรูปแบบของด้ามจับบนบัวรดน้ำ ซึ่งมีผลต่อหลักสรีรศาสตร์ในการเทและการจัดเก็บ
    handrail_configuration:
      name: การจัดวางราวบันได
      description: ระบุว่าผลิตภัณฑ์มีราวบันไดหรือไม่ และการจัดวางราวบันไดเป็นอย่างไร
    hanging_attachment_type:
      name: ประเภทอุปกรณ์สำหรับแขวน
      description: ระบุอุปกรณ์หรือวิธีการที่ใช้ในการแขวนโมบายสะท้อนแสงอาทิตย์
    hardiness_zone:
      name: เขตความทนทาน
      description: ระบุเขตภูมิอากาศของ USDA (หรือเทียบเท่า) ที่พืชสามารถอยู่รอดได้กลางแจ้ง
    hazards_detected:
      name: อันตรายที่ตรวจพบได้
      description: ระบุอันตรายเฉพาะที่อุปกรณ์นี้ได้รับการออกแบบมาเพื่อตรวจจับ
    heating_stages:
      name: ขั้นตอนการทำความร้อน
      description: ระบุจำนวนขั้นตอนการทำความร้อนหรือระดับการปรับอุณหภูมิที่เครื่องรองรับ
    home_alarm_features:
      name: คุณสมบัติของระบบสัญญาณกันขโมย
      description: ระบุฟังก์ชันพิเศษของระบบสัญญาณกันขโมย เช่น ระบบสำรองไฟจากแบตเตอรี่
        หรือการตรวจสอบโดยผู้เชี่ยวชาญ
    hook_style:
      name: รูปแบบของตะขอ
      description: จำแนกประเภทการออกแบบ/ฟังก์ชันของตะขอ เพื่อให้ง่ายต่อการจับคู่ทั้งในด้านรูปลักษณ์และการใช้งาน
    humidifier_features:
      name: คุณสมบัติของเครื่องเพิ่มความชื้น
      description: เน้นฟังก์ชันหรือตัวเลือกพิเศษที่โดดเด่นซึ่งทำให้เครื่องเพิ่มความชื้นแต่ละรุ่นแตกต่างกัน
        และช่วยในการตัดสินใจเลือก
    humidifier_filter_type:
      name: ประเภทของแผ่นกรองเครื่องเพิ่มความชื้น
      description: ระบุรูปแบบหรือโครงสร้างของแผ่นกรอง เพื่อให้ลูกค้าสามารถเลือกซื้อแผ่นกรองทดแทนที่ถูกต้องสำหรับเครื่องเพิ่มความชื้นของตนได้
    humidor_accessory_type:
      name: ประเภทอุปกรณ์เสริมสำหรับกล่องเก็บซิการ์
      description: จำแนกประเภทอุปกรณ์เสริมเฉพาะ ทำให้ผู้ซื้อสามารถกรองได้อย่างรวดเร็วภายในหมวดหมู่เดียวกัน
    hydroponic_nutrient_system:
      name: ระบบธาตุอาหารไฮโดรโปนิกส์
      description: ระบุจำนวนส่วนประกอบในระบบธาตุอาหารไฮโดรโปนิกส์ (เช่น หนึ่งส่วน
        สองส่วน) ที่ต้องผสมเข้าด้วยกันก่อนใช้งาน
    hygrometer_type:
      name: ประเภทของไฮโกรมิเตอร์
      description: ระบุรูปแบบของไฮโกรมิเตอร์ที่มาพร้อมกับกล่องเก็บซิการ์ หากมี
    ice_bucket_accessories_included:
      name: อุปกรณ์เสริมสำหรับถังใส่น้ำแข็งที่รวมอยู่ในชุด
      description: แสดงรายการอุปกรณ์บาร์เพิ่มเติมที่ให้มาพร้อมกับถังใส่น้ำแข็ง
    ice_bucket_insulation:
      name: ฉนวนกันความร้อนของถังใส่น้ำแข็ง
      description: ระบุโครงสร้างผนังหรือระดับฉนวนกันความร้อนของถังใส่น้ำแข็ง ซึ่งส่งผลต่อระยะเวลาที่น้ำแข็งจะคงสภาพเป็นน้ำแข็งอยู่ได้
    ice_cream_maker_accessories_included:
      name: อุปกรณ์เสริมสำหรับเครื่องทำไอศกรีมที่รวมอยู่ในชุดนี้
      description: ระบุรายการเพิ่มเติมที่รวมอยู่ในชุดอุปกรณ์เสริมหลายชิ้น เพื่อให้ลูกค้าทราบว่าพวกเขาจะได้รับอะไรบ้าง
    ice_shape:
      name: รูปทรงน้ำแข็ง
      description: อธิบายรูปทรงของน้ำแข็งที่เครื่องทำน้ำแข็งผลิตออกมา ช่วยให้ผู้ใช้เลือกเครื่องที่สร้างน้ำแข็งในสไตล์ที่ต้องการได้
    incense_holder_style:
      name: รูปแบบของที่วางธูป
      description: ระบุรูปแบบโครงสร้างของที่วางธูป ช่วยให้ผู้ซื้อเลือกได้ระหว่างรูปแบบการใช้งานและความสวยงามที่แตกต่างกัน
    infuser_type:
      name: ประเภทของที่กรอง
      description: ระบุว่ามีที่กรองผลไม้หรือที่กรองชาให้มาด้วยหรือไม่ และเป็นแบบไหน
    inner_pot_coating:
      name: การเคลือบหม้อด้านใน
      description: ระบุประเภทของสารเคลือบผิวภายในหม้อ ซึ่งบ่งบอกถึงคุณสมบัติไม่ติดกระทะและทำความสะอาดง่าย
    insulation_capability:
      name: ความสามารถในการเป็นฉนวน
      description: ระบุว่าปลอกหุ้มสามารถเป็นฉนวนกันความร้อนให้กับเครื่องดื่มได้หรือไม่
        และอย่างไร โดยแยกความแตกต่างระหว่างปลอกหุ้มเพื่อความสวยงามอย่างเดียวกับปลอกหุ้มที่ควบคุมอุณหภูมิได้
    insulation_status:
      name: สถานะฉนวนกันความร้อน
      description: ระบุว่ากระติกน้ำมีฉนวนกันความร้อนเพื่อช่วยรักษาอุณหภูมิของเครื่องดื่มหรือไม่
    insulation_technology:
      name: เทคโนโลยีฉนวนกันความร้อน
      description: ระบุโครงสร้างของฉนวนกันความร้อนที่ใช้ในการรักษาอุณหภูมิ
    insulation_type:
      name: ประเภทฉนวน
      description: ระบุว่าถังเครื่องดื่มหรือเครื่องทำความเย็นมีฉนวนหุ้มหรือไม่และอย่างไร
        ซึ่งส่งผลต่อประสิทธิภาพการกักเก็บน้ำแข็งและการควบคุมการควบแน่น
    intended_beverage_type:
      name: ประเภทเครื่องดื่มที่ตั้งใจใช้
      description: ระบุเครื่องดื่มหลักที่ออกแบบมาสำหรับเหยือกนี้ หรือเครื่องดื่มที่ใช้บ่อยที่สุด
    internal_membrane_type:
      name: ชนิดเยื่อหุ้มภายใน
      description: ระบุการออกแบบการแยกส่วนภายในที่ช่วยแยกน้ำและอากาศออกจากกันภายในถัง
    iron_cleaner_purpose:
      name: วัตถุประสงค์ของน้ำยาทำความสะอาดเหล็ก
      description: ระบุการใช้งานหลักที่ตั้งใจไว้ของน้ำยาทำความสะอาด
    ironing_board_form_factor:
      name: รูปทรงของโต๊ะรีดผ้า
      description: จำแนกรูปแบบ/การติดตั้งโดยรวมของโต๊ะรีดผ้า เพื่อช่วยให้ผู้ซื้อหาประเภทที่ถูกต้องได้ง่ายขึ้น
    ironing_board_pad_shape:
      name: รูปทรงของแผ่นรองรีด
      description: ระบุรูปทรงโดยรวมของแผ่นรองรีดเพื่อให้เข้ากับดีไซน์ของโต๊ะรีดผ้าแบบต่างๆ
    jar_shape:
      name: รูปทรงของโถ
      description: อธิบายถึงรูปทรงเรขาคณิตโดยรวมหรือรูปทรงแบบดั้งเดิมของโถตกแต่ง
    juicer_type:
      name: ประเภทเครื่องคั้นน้ำผลไม้
      description: จำแนกกลไกที่เครื่องคั้นน้ำผลไม้ใช้ในการสกัดน้ำผลไม้
    key_blade_type:
      name: ประเภทของดอกกุญแจ
      description: จำแนกรูปแบบทางกายภาพของดอกกุญแจ เช่น แบบแบน/มีร่อง แบบทรงกระบอก
        หรือแบบมีรอยบุ๋ม
    kitchen_layout:
      name: การจัดวางห้องครัว
      description: อธิบายรูปแบบโดยรวมของห้องครัวสำเร็จรูป (เช่น แบบผนังเดี่ยวหรือรูปตัว
        L) เพื่อช่วยให้ผู้ซื้อหาชุดที่เหมาะสมกับรูปทรงห้องและรูปแบบการทำงานที่ต้องการได้
    kitchen_linen_items_included:
      name: รายการผ้าปูในครัวที่รวมอยู่ในชุดนี้
      description: ระบุรายการผ้าปูในครัวแต่ละชิ้นที่รวมอยู่ในชุด ช่วยให้ผู้ซื้อเข้าใจได้อย่างชัดเจนว่ากำลังซื้อสินค้าอะไรบ้าง
    label_content_type:
      name: ประเภทเนื้อหาของฉลาก
      description: อธิบายว่าพื้นผิวของฉลากว่างเปล่า พิมพ์ล่วงหน้าด้วยแม่แบบ หรือมีการจัดรูปแบบอื่นๆ
    lamp_arm_style:
      name: สไตล์แขนโคมไฟ
      description: อธิบายถึงการออกแบบแขน/คอของโคมไฟ ซึ่งส่งผลต่อการปรับแต่งและการจัดวาง
        (เช่น คอห่านเทียบกับแขนหมุน)
    lamp_post_base_mounting_type:
      name: ประเภทการติดตั้งฐานเสาไฟ
      description: ระบุวิธีการติดตั้งหรือยึดฐานเข้ากับพื้นหรือพื้นผิว
    lamp_shade_fitter_type:
      name: ประเภทของตัวยึดโป๊ะโคมไฟ
      description: กำหนดกลไกการยึดระหว่างโป๊ะโคมไฟกับตัวโคมไฟ เพื่อให้มั่นใจถึงความเข้ากันได้โดยไม่ต้องคาดเดา
    lamp_shade_shape:
      name: รูปทรงของโคมไฟ
      description: ระบุรูปทรงเรขาคณิตของโคมไฟ ช่วยให้ลูกค้าค้นหารูปทรงที่ต้องการได้อย่างรวดเร็ว
    lamp_shade_translucency:
      name: ความโปร่งแสงของโคมไฟ
      description: อธิบายถึงปริมาณแสงที่ส่องผ่านโคมไฟ ช่วยให้ผู้ใช้เลือกบรรยากาศที่ต้องการได้
    lampshade_shape:
      name: รูปทรงของโคมไฟ
      description: อธิบายถึงรูปทรงเรขาคณิตของโคมไฟ
    laundry_ball_texture:
      name: พื้นผิวของลูกบอลซักผ้า
      description: อธิบายถึงลักษณะพื้นผิวของลูกบอล ซึ่งมีผลต่อการขัดถูผ้าและการขจัดเศษผ้า
    laundry_wash_accessory_type:
      name: ประเภทอุปกรณ์เสริมสำหรับการซักผ้า
      description: ระบุประเภทเฉพาะของถุงหรือโครงสำหรับซักผ้า
    lawn_aerator_type:
      name: ประเภทของเครื่องเติมอากาศสนามหญ้า
      description: จำแนกเครื่องเติมอากาศสนามหญ้าตามการออกแบบการทำงานหลักหรือรูปทรง
    lawn_mower_belt_type:
      name: ประเภทของสายพานเครื่องตัดหญ้า
      description: จำแนกประเภทโครงสร้างหรือรูปทรงของสายพาน
    lawn_mower_blade_type:
      name: ประเภทใบมีดเครื่องตัดหญ้า
      description: ระบุการออกแบบการตัดหรือการยกของใบมีดเครื่องตัดหญ้า และวัตถุประสงค์การใช้งาน
    lawn_spreader_type:
      name: ประเภทเครื่องพ่นปุ๋ยสนามหญ้า
      description: ระบุรูปแบบกลไกหรือการกำหนดค่าของเครื่องพ่นปุ๋ยสนามหญ้า/สวน เช่น
        แบบกระจายหรือแบบหยอด
    lawn_tractor_tread_type:
      name: ประเภทดอกยางของรถตัดหญ้า
      description: อธิบายถึงรูปแบบดอกยางที่ออกแบบมาสำหรับพื้นผิวหรือความต้องการแรงยึดเกาะเฉพาะอย่าง
    lid_features:
      name: คุณสมบัติของฝาปิด
      description: เน้นส่วนประกอบการใช้งานพิเศษของฝาปิดที่ช่วยให้การปรุงอาหารหรือการทำความสะอาดสะดวกยิ่งขึ้น
    lid_vent_type:
      name: ประเภทช่องระบายอากาศของฝาปิด
      description: ระบุว่าฝาสามารถระบายไอน้ำได้หรือไม่ และอย่างไร
    lift_mechanism:
      name: กลไกยก
      description: ระบุกลไกการทำงานที่ใช้ในการยก ลด หรือเอียงม่านหรือมู่ลี่
    light_exposure_requirement:
      name: ข้อกำหนดด้านปริมาณแสง
      description: ระบุระดับแสงที่ระบบนิเวศต้องการเพื่อให้คงความสมบูรณ์โดยไม่ทำให้สิ่งมีชีวิตร้อนเกินไปหรือเกิดความเครียด
    liner_installation_method:
      name: วิธีการติดตั้งแผ่นรองกันซึม
      description: อธิบายวิธีการยึดแผ่นรองกันซึมให้อยู่กับที่บนพื้นผิว
    lint_roller_type:
      name: ประเภทของลูกกลิ้งกำจัดฝุ่น
      description: จำแนกกลไกการทำความสะอาดหรือการออกแบบของลูกกลิ้งกำจัดฝุ่น
    live_trap_design:
      name: การออกแบบกับดักแบบขัง
      description: จำแนกประเภทโครงสร้างโดยรวมของกับดัก
    lock_keying_option:
      name: ตัวเลือกการไขกุญแจ
      description: ระบุวิธีการไขกุญแจ เพื่อช่วยผู้ซื้อที่ต้องการไขแม่กุญแจหลายตัวด้วยลูกกุญแจดอกเดียว
        หรือต้องการใช้ลูกกุญแจที่ไม่ซ้ำกันสำหรับแม่กุญแจแต่ละตัว
    lubricant_requirement:
      name: ข้อกำหนดเกี่ยวกับสารหล่อลื่น
      description: ระบุประเภทของสารหล่อลื่นที่แนะนำหรือจำเป็นต้องใช้ในระหว่างการลับคม
    lunch_set_items_included:
      name: รายการอุปกรณ์ที่รวมอยู่ในชุดกล่องอาหารกลางวัน
      description: แสดงรายการส่วนประกอบแต่ละอย่างที่รวมอยู่ในชุดกล่องอาหารกลางวัน
    machete_blade_style:
      name: รูปแบบใบมีดมาเชเต้
      description: ระบุรูปแบบใบมีดมาเชเต้แบบดั้งเดิมตามภูมิภาคหรือตามการใช้งาน
    map_style:
      name: รูปแบบแผนที่
      description: อธิบายรูปแบบแผนที่หรือจุดเน้นตามหัวข้อที่แสดงบนลูกโลก
    masher_head_design:
      name: การออกแบบหัวบด
      description: จำแนกประเภทการออกแบบพื้นผิวการบด ซึ่งส่งผลต่อเนื้อสัมผัสและแรงที่ต้องใช้
    mattress_protector_features:
      name: คุณสมบัติของผ้าคลุมที่นอน
      description: เน้นคุณลักษณะด้านการใช้งานหรือการป้องกันที่เฉพาะเจาะจงสำหรับผ้าคลุมที่นอน
        ช่วยให้ผู้ซื้อสามารถกรองคุณสมบัติต่างๆ เช่น การกันน้ำ หรือวัสดุที่ไม่ก่อให้เกิดอาการแพ้ได้
    measuring_spoon_features:
      name: คุณสมบัติของช้อนตวง
      description: เน้นคุณลักษณะการออกแบบพิเศษหรือคุณสมบัติการใช้งานของช้อนตวง
    meat_tenderizer_face_type:
      name: ประเภทหน้าสัมผัสของค้อนทุบเนื้อ
      description: อธิบายถึงลักษณะพื้นผิวการใช้งานของค้อนทับเนื้อนุ่ม
    meat_tenderizer_mechanism:
      name: กลไกของทับเนื้อนุ่ม
      description: จำแนกกลไกการทำงานหลักของเครื่องทับเนื้อนุ่ม
    medical_specialty:
      name: ความเชี่ยวชาญทางการแพทย์
      description: ระบุสาขาทางการแพทย์หรือสาขาการดูแลสุขภาพที่อุปกรณ์นั้นได้รับการออกแบบมาโดยเฉพาะ
    merv_rating:
      name: ระดับ MERV
      description: กำหนดค่าประสิทธิภาพการกรองขั้นต่ำ (MERV) ซึ่งบ่งชี้ถึงความสามารถของตัวกรองในการดักจับอนุภาคขนาดต่างๆ
    microwave_compatibility:
      name: ความเข้ากันได้กับไมโครเวฟ
      description: ระบุว่าสินค้าชิ้นนี้สามารถใช้ในเตาไมโครเวฟได้อย่างปลอดภัยหรือไม่
    microwave_oven_functions:
      name: ฟังก์ชั่นของเตาไมโครเวฟ
      description: แสดงรายการโหมดการปรุงอาหารแบบสำเร็จรูปหรือขั้นสูงที่มีให้เลือก
        ช่วยให้ลูกค้าสามารถค้นหารุ่นที่มีฟังก์ชั่นต่างๆ เช่น การอบลมร้อน การย่าง การทำอาหารด้วยระบบเซ็นเซอร์
        เป็นต้น
    milk_frother_type:
      name: ประเภทของเครื่องตีฟองนม
      description: จำแนกผลิตภัณฑ์ตามกลไกการตีฟองหรือรูปแบบของเครื่อง
    milk_frothing_method:
      name: วิธีการตีฟองนม
      description: ระบุเทคโนโลยีหรือกลไกที่ใช้ในการตีฟองนม
    milk_frothing_system:
      name: ระบบตีฟองนม
      description: ระบุประเภทของกลไกการตีฟองนมหรือการทำไอน้ำที่เครื่องมีให้
    mirror_curvature:
      name: ความโค้งของกระจก
      description: ระบุความโค้งของพื้นผิวสะท้อนแสง ซึ่งส่งผลต่อมุมมองและการบิดเบือนของภาพ
    mirror_type:
      name: ประเภทกระจก
      description: จำแนกประเภทตามรูปแบบทั่วไปหรือหมวดหมู่การใช้งานของกระจก
    mist_output_mode:
      name: โหมดการพ่นหมอก
      description: แสดงรูปแบบการพ่นหมอกหรือระดับความเข้มข้นที่สามารถเลือกได้บนตัวพ่นหมอก
    mixing_bowl_features:
      name: คุณสมบัติของชามผสม
      description: เน้นคุณลักษณะการใช้งานพิเศษของชามที่มีผลต่อการใช้งานและการดูแลรักษา
    mixing_mechanism:
      name: กลไกการผสม
      description: อธิบายกลไกภายในที่ใช้ในการผสมส่วนผสมของน้ำสลัด
    mochi_maker_functions:
      name: ฟังก์ชั่นของเครื่องทำโมจิ
      description: แสดงรายการโหมดการทำงานหรือโปรแกรมในตัวที่เครื่องรองรับ
    mode_of_action:
      name: กลไกการออกฤทธิ์
      description: ระบุวิธีการทำงานของสารฆ่าเชื้อรา โดยแยกแยะสารป้องกันเชื้อราแบบสัมผัสออกจากผลิตภัณฑ์แบบดูดซึมหรือแบบแทรกซึมผ่านใบ
    moisture_absorber_form:
      name: รูปแบบผลิตภัณฑ์ดูดความชื้น
      description: อธิบายรูปแบบทางกายภาพของผลิตภัณฑ์ ช่วยให้ผู้ซื้อสามารถเลือกถุงแขวน
        ถัง บรรจุภัณฑ์ ฯลฯ ได้
    money_retrieval_method:
      name: วิธีการนำเงินออกมา
      description: อธิบายวิธีการนำเงินที่เก็บออมไว้ออกจากกระปุกออมสิน
    mop_head_type:
      name: ประเภทหัวไม้ถูพื้น
      description: ระบุการออกแบบโครงสร้างของหัวไม้ถูพื้นหรืออะไหล่ ช่วยให้ผู้ซื้อหาแบบที่เหมาะสมกับความต้องการในการทำความสะอาดของตนเองได้
    mop_wringing_mechanism:
      name: กลไกการบิดน้ำของไม้ถูพื้น
      description: ระบุวิธีการกำจัดของเหลวส่วนเกินออกจากไม้ถูพื้น ช่วยให้ผู้ซื้อเลือกรูปแบบการบิดน้ำที่ต้องการได้
    mounting_bolt_pattern:
      name: รูปแบบรูยึด
      description: ระบุจำนวนและรูปแบบของรูยึดสลักบนตัวเรือนแกนหมุน (เช่น แบบสามเหลี่ยม
        3 รู, แบบสี่เหลี่ยม 4 รู)
    mouthpiece_shape:
      name: รูปทรงของหัวกรองสูบบุหรี่
      description: ระบุรูปทรงส่วนปลายหัวกรองของท่อสูบบุหรี่
    mower_deck_material:
      name: วัสดุของแท่นตัดหญ้า
      description: ระบุวัสดุที่ใช้ในการผลิตแท่นตัดหญ้า ซึ่งส่งผลต่อความทนทานและน้ำหนัก
    mulch_form:
      name: รูปแบบของวัสดุคลุมดิน
      description: อธิบายถึงลักษณะทางกายภาพหรือความสม่ำเสมอของวัสดุคลุมดิน
    nap_mat_items_included:
      name: รายการสิ่งของที่มาพร้อมกับที่นอนพกพา
      description: อธิบายรายละเอียดส่วนประกอบหรืออุปกรณ์เสริมเฉพาะที่มาพร้อมกับที่นอนพกพา
    napkin_edge_finish:
      name: การตกแต่งขอบผ้าเช็ดปาก
      description: ระบุการเย็บหรือการตกแต่งตามขอบหรือชายผ้าเช็ดปาก
    noodle_core_design:
      name: ลักษณะแกนกลางของเส้นบะหมี่
      description: อธิบายว่าเส้นบะหมี่มีแกนกลางทึบหรือกลวง
    nozzle_adjustability:
      name: ความสามารถในการปรับหัวฉีด
      description: ระบุว่าสามารถปรับหัวฉีดเพื่อเปลี่ยนรูปแบบการฉีดพ่นหรืออัตราการไหลได้หรือไม่
    nozzle_material:
      name: วัสดุของหัวฉีด
      description: ระบุวัสดุที่ใช้ทำหัวฉีดพ่นละอองน้ำเพื่อความทนทานและป้องกันการอุดตัน
    nozzle_style:
      name: รูปแบบหัวฉีด
      description: ระบุรูปทรงหรือรูปแบบการใช้งานของปลายหัวฉีดของท่อ
    nozzle_types_included:
      name: ประเภทของหัวฉีดที่ให้มา
      description: แสดงรายการรูปทรง/รูปแบบของหัวฉีดที่ให้มากับปืนทำเนื้ออบแห้ง ช่วยให้ผู้ซื้อทราบว่าสามารถสร้างผลิตภัณฑ์ในรูปแบบใดได้บ้าง
    number_of_compartments:
      name: จำนวนช่องแบ่ง
      description: ระบุจำนวนช่องแบ่งที่ถังขยะมีสำหรับคัดแยกขยะหรือวัสดุรีไซเคิล
    numeral_style:
      name: รูปแบบตัวเลข
      description: อธิบายรูปแบบการแสดงผลหรือลักษณะของตัวเลขบนหน้าปัดนาฬิกา
    oil_dispenser_spout_design:
      name: การออกแบบหัวจ่ายน้ำมัน
      description: อธิบายถึงรูปแบบของหัวจ่ายหรือหัวฉีด ซึ่งมีผลต่อการควบคุมการไหลและการป้องกันการหยด
    organizer_application:
      name: การใช้งานอุปกรณ์จัดระเบียบ
      description: ระบุประเภทหลักของสิ่งของที่ออกแบบมาเพื่อจัดเก็บในช่องเก็บของ
    ornament_hook_style:
      name: รูปแบบของตะขอแขวนของตกแต่ง
      description: ระบุรูปแบบหรือรูปทรงของตะขอแขวนของตกแต่งที่ใช้สำหรับแขวนของตกแต่งต่างๆ
    oscillation_mode:
      name: โหมดการส่าย
      description: อธิบายว่าพัดลมส่ายเพื่อกระจายอากาศหรือไม่ และส่ายอย่างไร
    oscillation_type:
      name: ประเภทการส่าย
      description: ระบุว่าพัดลมจะส่ายหรือไม่ และส่ายอย่างไร เพื่อช่วยในการตัดสินใจให้กับผู้ซื้อที่ต้องการการหมุนเวียนอากาศทั่วถึง
    outdoor_grill_rack_type:
      name: ประเภทของตะแกรงย่างกลางแจ้ง
      description: ระบุรูปแบบการใช้งานของตะแกรงเพื่อให้เข้าใจถึงการใช้งานในการปรุงอาหารได้ชัดเจนยิ่งขึ้น
    oxygen_indicator_type:
      name: ประเภทตัวแสดงสถานะออกซิเจน
      description: ระบุว่ามีตัวแสดงสถานะแบบมองเห็นได้หรือไม่ เพื่อแสดงว่าชุดดูดซับยังทำงานอยู่หรือไม่
        และมีรูปแบบใด
    pad_cleaning_action:
      name: ลักษณะการทำความสะอาดของแผ่นขัด
      description: อธิบายถึงหน้าที่หลักในการทำความสะอาดหรือผลลัพธ์สุดท้ายของแผ่นขัด
    pan_bottom_type:
      name: ประเภทก้นกระทะ
      description: ระบุว่ากระทะมีก้นถอดได้หรือเป็นก้นแข็งติดแน่น
    pan_perforation_type:
      name: ประเภทการเจาะรูของกระทะ
      description: ระบุว่าก้น/ด้านข้างของกระทะเป็นแบบทึบหรือมีรูพรุนเพื่อระบายของเหลว
    parasol_opening_mechanism:
      name: กลไกการกาง/หุบร่มกันแดด
      description: อธิบายวิธีการกาง/หุบหลังคาร่มกันแดด
    parchment_paper_coating:
      name: การเคลือบกระดาษพาร์ชเมนต์
      description: ระบุถึงการเคลือบผิวที่ใช้กับกระดาษพาร์ชเมนต์ เพื่อให้มีคุณสมบัติไม่ติดถาด
    particle_size_grade:
      name: ระดับขนาดอนุภาค
      description: อธิบายการจำแนกขนาดเม็ดของเวอร์มิคูไลต์ ซึ่งส่งผลต่อคุณลักษณะการระบายอากาศและการอมน้ำ
    patio_heater_safety_features:
      name: คุณสมบัติด้านความปลอดภัยของเครื่องทำความร้อนกลางแจ้ง
      description: เน้นกลไกความปลอดภัยในตัวที่ออกแบบมาเพื่อป้องกันอุบัติเหตุและรับประกันการใช้งานที่ปลอดภัย
    pattern_match_type:
      name: ประเภทการจับคู่ลวดลาย
      description: ระบุวิธีการจัดแนวลวดลายระหว่างแถบต่างๆ ในระหว่างการติดตั้ง
    pendulum_compatibility:
      name: ความเข้ากันได้กับลูกตุ้ม
      description: ระบุว่ากลไกนี้สามารถขับเคลื่อนลูกตุ้มได้หรือไม่ และมีลูกตุ้มรวมอยู่ด้วยหรือไม่
    perch_design:
      name: การออกแบบคอนเกาะ
      description: อธิบายถึงรูปแบบโครงสร้างหรือรูปทรงของคอนเกาะ
    perch_surface_texture:
      name: พื้นผิวของคอนเกาะ
      description: อธิบายความรู้สึก/ผิวสัมผัสของพื้นผิวคอนเกาะ ซึ่งส่งผลต่อการยึดเกาะและการสึกหรอของกรงเล็บ
    pet_safety:
      name: ความปลอดภัยสำหรับสัตว์เลี้ยง
      description: ระบุว่าพืชชนิดนี้เป็นพิษหรือไม่เป็นพิษต่อสัตว์เลี้ยงในบ้านทั่วไป
    pet_toxicity:
      name: ความเป็นพิษต่อสัตว์เลี้ยง
      description: ระบุว่าพืชชนิดนี้เป็นพิษต่อสัตว์เลี้ยงในบ้านทั่วไปหรือไม่ เพื่อความปลอดภัยของลูกค้าที่เป็นเจ้าของสัตว์เลี้ยง
    ph_adjustment_direction:
      name: ทิศทางการปรับค่า pH
      description: ระบุว่าผลิตภัณฑ์นี้ถูกออกแบบมาเพื่อเพิ่ม (pH Up) หรือลด (pH Down)
        ระดับ pH ของสารละลาย
    pie_pan_edge_style:
      name: รูปแบบขอบถาดอบพาย
      description: อธิบายถึงการออกแบบขอบถาด ซึ่งส่งผลต่อลักษณะของเปลือกพายและความง่ายในการนำพายออกจากถาด
    pin_shape:
      name: รูปทรงของเข็มหมุด
      description: อธิบายถึงรูปทรงโดยรวมของเข็มหมุดที่ใช้ยึดผ้า
    pipe_connection_method:
      name: วิธีการเชื่อมต่อท่อ
      description: ระบุรูปแบบการเชื่อมต่อที่ปลายท่อโค้ง (เช่น ตัวผู้ ตัวเมีย แบบสวมล็อค
        แบบเกลียว) เพื่อให้มั่นใจได้ว่าสามารถติดตั้งได้
    piping_tip_shape:
      name: รูปทรงหัวบีบครีม
      description: อธิบายรูปทรงหรือดีไซน์ของหัวบีบครีม/หัวตกแต่ง
    pitcher_spout_style:
      name: รูปแบบของปากเหยือก
      description: อธิบายการออกแบบของปากเหยือก ซึ่งส่งผลต่อความแม่นยำในการตกแต่งลาเต้อาร์ตและการควบคุมการเท
    pizza_cutter_design:
      name: การออกแบบที่ตัดพิซซ่า
      description: ระบุรูปแบบโครงสร้างของที่ตัดพิซซ่า ช่วยให้ลูกค้าเลือกกลไกการตัดที่แตกต่างกันได้
    pizza_pan_style:
      name: รูปแบบของกระทะพิซซ่า
      description: ระบุรูปแบบการผลิต/การออกแบบของกระทะพิซซ่า ซึ่งบ่งบอกถึงวิธีการอบแป้งและประเภทของพิซซ่าที่เหมาะสม
    plant_care_difficulty:
      name: ความยากลำบากในการดูแลต้นไม้
      description: บ่งบอกถึงระดับการดูแลที่จำเป็นในการดูแลรักษาต้นไม้ ช่วยให้ทั้งผู้เริ่มต้นและผู้เชี่ยวชาญเลือกได้อย่างเหมาะสม
    plant_container_type:
      name: ประเภทของภาชนะปลูก
      description: ระบุประเภทของภาชนะที่มาพร้อมกับไม้พุ่มเทียม หากมี
    plant_life_cycle:
      name: วงจรชีวิตของพืช
      description: ระบุว่าพืชชนิดนั้นเป็นพืชปีเดียว พืชสองปี หรือพืชยืนต้น
    planter_material:
      name: วัสดุของกระถาง
      description: ระบุวัสดุของกระถาง/ภาชนะปลูกต้นไม้ที่ให้มาด้วย หากมี
    plate_coupling_pattern:
      name: รูปแบบการเชื่อมต่อแผ่นรอง
      description: ระบุการจัดวางดุมด้านล่างที่ประกบเข้ากับตัวเชื่อมต่อมอเตอร์จานหมุนของไมโครเวฟ
        เพื่อให้มั่นใจว่าการหมุนถูกต้อง
    plate_purpose:
      name: วัตถุประสงค์ของแผ่นเพลต
      description: อธิบายบทบาทการทำงานของแผ่นเพลตภายในระบบเครื่องตัดหญ้า
    plate_style:
      name: รูปแบบจาน
      description: ระบุรูปแบบเฉพาะหรือวัตถุประสงค์การใช้งานของจานชาม
    pole_construction_type:
      name: ประเภทโครงสร้างเสา
      description: อธิบายรูปแบบโครงสร้างของเสา ซึ่งส่งผลต่อการติดตั้งและการเคลื่อนย้าย
    pool_chemical_type:
      name: ประเภทสารเคมีสำหรับสระว่ายน้ำ
      description: จำแนกตามหน้าที่หลักหรือคุณสมบัติทางเคมีของผลิตภัณฑ์บำบัดสระว่ายน้ำ
    pool_filter_type:
      name: ประเภทถังกรองสระว่ายน้ำ
      description: ระบุเทคโนโลยีการกรองหรือรูปแบบโครงสร้างที่ใช้โดยถังกรองสระว่ายน้ำหรืออ่างสปา
    pool_game_type:
      name: ประเภทเกมในสระว่ายน้ำ
      description: ระบุประเภทของเกมหรือกีฬาที่ผลิตภัณฑ์นี้รองรับในสระว่ายน้ำ
    pool_ladder_design:
      name: การออกแบบบันไดสระว่ายน้ำ
      description: จำแนกประเภทการออกแบบโครงสร้างโดยรวมของบันไดสระว่ายน้ำ
    pool_liner_installation_style:
      name: รูปแบบการติดตั้งแผ่นปูสระว่ายน้ำ
      description: ระบุวิธีการยึดที่ใช้ในการยึดแผ่นปูเข้ากับผนังสระว่ายน้ำ
    pool_lounge_style:
      name: สไตล์พื้นที่นั่งเล่นริมสระว่ายน้ำ
      description: จำแนกรูปแบบโครงสร้างของพื้นที่นั่งเล่นริมสระว่ายน้ำ เพื่อให้ผู้ซื้อตัดสินใจเลือกตามความสวยงามหรือการใช้งาน
    pool_lounger_features:
      name: คุณสมบัติของเก้าอี้พักผ่อนริมสระว่ายน้ำ
      description: เน้นคุณสมบัติพิเศษที่ติดตั้งมาในตัว ซึ่งเพิ่มฟังก์ชันการใช้งานหรือความสะดวกสบายให้กับเก้าอี้พักผ่อน
    pool_skimmer_type:
      name: ประเภทของสกิมเมอร์สระน้ำ
      description: จำแนกประเภทการออกแบบของอุปกรณ์ตักเศษสิ่งสกปรก ช่วยให้ผู้ซื้อเปรียบเทียบระหว่างอุปกรณ์ตักเศษสิ่งสกปรกแบบใช้มือ
        กับอุปกรณ์ตักเศษสิ่งสกปรกอัตโนมัติ หรือแบบลอยน้ำ
    pool_toy_features:
      name: คุณสมบัติของของเล่นในสระว่ายน้ำ
      description: เน้นคุณสมบัติการใช้งานหรือการออกแบบที่โดดเด่นเฉพาะของของเล่นในสระว่ายน้ำ
    pool_type:
      name: ประเภทสระว่ายน้ำ
      description: จำแนกประเภทโครงสร้างของสระว่ายน้ำ
    pool_vacuum_type:
      name: ประเภทเครื่องดูดฝุ่นสระว่ายน้ำ
      description: ระบุรูปแบบการทำงานหรือกลไกการขับเคลื่อนของเครื่องดูดฝุ่นสระว่ายน้ำ
    popcorn_kernel_variety:
      name: สายพันธุ์เมล็ดข้าวโพดคั่ว
      description: ระบุสายพันธุ์หรือรูปร่างตามธรรมชาติของเมล็ดข้าวโพดคั่ว
    portafilter_type:
      name: ประเภทของด้ามชงกาแฟ
      description: ระบุรูปแบบโครงสร้างของด้ามชงกาแฟ ซึ่งส่งผลต่อวิธีการสกัดและขั้นตอนการทำงาน
    post_installation_method:
      name: วิธีการติดตั้งเสา
      description: ระบุวิธีการติดตั้งหรือยึดเสาตู้จดหมายให้อยู่กับที่
    pour_spout_design:
      name: การออกแบบปากเท
      description: ระบุคุณสมบัติพิเศษหรือรูปแบบของปากเทที่มีผลต่อการควบคุมการไหล
    pour_spout_style:
      name: รูปแบบปากเท
      description: อธิบายถึงการออกแบบปากเทของอุปกรณ์จ่ายของเหลว ซึ่งส่งผลต่อการควบคุมการไหลและการป้องกันการหยด
    power_equipment_hitch_type:
      name: ประเภทจุดต่ออุปกรณ์กำลัง
      description: ระบุส่วนต่อประสานการเชื่อมต่อที่อุปกรณ์เสริมใช้ในการติดตั้งบนรถแทรกเตอร์หรือเครื่องยนต์
    predator_guard_style:
      name: รูปแบบอุปกรณ์ป้องกันสัตว์นักล่า
      description: จัดหมวดหมู่การออกแบบโครงสร้างของอุปกรณ์ป้องกัน ช่วยให้ผู้ซื้อค้นหาอุปกรณ์ป้องกันแบบกรวย
        แบบแผ่น แบบกรง หรือแบบแผ่นเจาะรูได้อย่างรวดเร็ว
    preferred_soil_type:
      name: ประเภทดินที่เหมาะสม
      description: ระบุองค์ประกอบของดินที่พืชเจริญเติบโตได้ดี
    preparation_type:
      name: ประเภทการเตรียม
      description: อธิบายขั้นตอนที่จำเป็นในการเตรียมอาหารให้พร้อมรับประทาน
    preservation_method:
      name: วิธีการถนอมรักษา
      description: อธิบายรายละเอียดเกี่ยวกับเทคนิคที่ใช้ในการอบแห้งหรือถนอมดอกไม้
    pressure_cooker_handle_type:
      name: ประเภทด้ามจับหม้อแรงดัน
      description: ระบุรูปแบบหรือตำแหน่งของด้ามจับหม้อแรงดันที่ต้องการเปลี่ยน
    pressure_cooker_safety_features:
      name: คุณสมบัติเพื่อความปลอดภัยของหม้อหุงความดัน
      description: ระบุกลไกความปลอดภัยในตัวที่ป้องกันอุบัติเหตุ เช่น ฝาปิดแบบล็อคได้
        หรือวาล์วระบายความดัน
    pressure_settings:
      name: การตั้งค่าแรงดัน
      description: ระบุจำนวนระดับแรงดันที่แตกต่างกันที่หม้อหุงความดันมีให้ผู้ใช้เลือกใช้
    pressure_washer_outlet_connector_type:
      name: ประเภทตัวเชื่อมต่อช่องจ่ายน้ำของเครื่องฉีดน้ำแรงดันสูง
      description: ระบุข้อมูลจำเพาะของตัวเชื่อมต่อที่ด้านหน้าของหัวปืนฉีดน้ำที่ใช้สำหรับต่อท่อฉีดหรือหัวฉีด
    pressure_washer_spray_pattern:
      name: รูปแบบการฉีดน้ำของเครื่องฉีดน้ำแรงดันสูง
      description: ระบุองศาหรือรูปแบบการฉีดพ่นที่เกิดจากหัวฉีดเครื่องฉีดน้ำแรงดันสูง
    print_edition_type:
      name: ประเภทของฉบับพิมพ์
      description: จำแนกประเภทของฉบับพิมพ์ เพื่อบ่งบอกถึงความหายากและมูลค่า
    printed_sides:
      name: ด้านที่พิมพ์
      description: ระบุว่าผลิตภัณฑ์นั้นพิมพ์ด้านเดียวหรือสองด้าน
    procedure:
      name: ขั้นตอน
      description: ระบุขั้นตอนทางการแพทย์หรือประเภทการฝึกอบรมที่อุปกรณ์นั้นได้รับการออกแบบมาโดยเฉพาะ
    protected_item_type:
      name: ประเภทสิ่งของที่ได้รับการปกป้อง
      description: ระบุประเภทของเอกสารหรือวัตถุที่ฝาครอบ RFID ออกแบบมาเพื่อปกป้อง
    pulley_groove_profile:
      name: รูปทรงร่องรอก
      description: อธิบายรูปแบบการเชื่อมต่อสายพานของรอกตัวปรับความตึง
    pulp_ejection_type:
      name: ประเภทการดันเยื่อกระดาษออก
      description: ระบุวิธีการดันเยื่อกระดาษออกจากเครื่อง
    pump_type:
      name: ประเภทปั๊ม
      description: ระบุการออกแบบกลไกปั๊มของเครื่องฉีดน้ำแรงดันสูง
    punch_bowl_components_included:
      name: ส่วนประกอบของชามพันช์ที่รวมอยู่ในชุด
      description: แสดงรายการสิ่งของเพิ่มเติมที่มาพร้อมกับชามพันช์ ช่วยให้ผู้ซื้อเข้าใจสิ่งของในชุดได้อย่างรวดเร็ว
    quilt_construction_type:
      name: ประเภทการเย็บผ้าห่ม
      description: อธิบายถึงวิธีการเย็บภายในหรือวิธีการกั้นที่ใช้ในผ้าห่ม ซึ่งส่งผลต่อการกระจายความอบอุ่นและความทนทาน
    radiator_design_type:
      name: ประเภทการออกแบบหม้อน้ำ
      description: ระบุรูปแบบโครงสร้างของหม้อน้ำ
    rain_barrel_design:
      name: การออกแบบถังเก็บน้ำฝน
      description: จำแนกประเภทโครงสร้างของถังเก็บน้ำฝน
    rain_chain_style:
      name: รูปแบบโซ่ระบายน้ำฝน
      description: ระบุการออกแบบโครงสร้างของโซ่ระบายน้ำฝน เพื่อให้ลูกค้าสามารถเลือกตามความชอบด้านรูปลักษณ์และประสิทธิภาพการไหลของน้ำได้
    range_hood_filter_type:
      name: ประเภทของแผ่นกรองเครื่องดูดควัน
      description: จำแนกประเภทของแผ่นกรองทดแทนเพื่อให้แน่ใจว่าเหมาะสมและใช้งานได้อย่างมีประสิทธิภาพ
    range_installation_type:
      name: ประเภทการติดตั้งเตา
      description: อธิบายรูปแบบการติดตั้งเตาในห้องครัว
    recorder_type:
      name: ประเภทเครื่องบันทึก
      description: ระบุเทคโนโลยีการบันทึกที่ใช้ (เช่น DVR, NVR) เพื่อช่วยในการเปรียบเทียบโซลูชันแบบอนาล็อกและแบบ
        IP
    refrigerator_configuration:
      name: โครงสร้างตู้เย็น
      description: ระบุรูปแบบโดยรวมของการจัดวางประตูและช่องต่างๆ ของตู้เย็น
    release_type:
      name: ประเภทการปลดปล่อยธาตุอาหาร
      description: บ่งบอกถึงความเร็วในการปลดปล่อยธาตุอาหารจากปุ๋ย
    relief_style:
      name: รูปแบบภาพนูนต่ำ
      description: ระบุว่าพื้นผิวบนลูกโลกนั้นนูนขึ้น เว้าลง หรือเรียบ
    repellent_mechanism:
      name: กลไกการไล่แมลง
      description: ระบุกลไกหลักในการไล่แมลงที่ผลิตภัณฑ์ใช้ เช่น กลิ่นสารเคมี เสียงอัลตราโซนิก
        หรือแสงไฟกะพริบ
    replaceable_brush_head:
      name: หัวแปรงแบบถอดเปลี่ยนได้
      description: ระบุว่าหัวแปรงสามารถถอดและเปลี่ยนได้หรือไม่เมื่อสึกหรอ
    rib_material:
      name: วัสดุของซี่ร่ม
      description: ระบุวัสดุที่ใช้สำหรับซี่ร่มหรือแกนร่ม เช่น ไฟเบอร์กลาสหรืออลูมิเนียม
    rice_cooker_functions:
      name: ฟังก์ชั่นของหม้อหุงข้าว
      description: แสดงรายการโปรแกรมหรือโหมดการหุงข้าวที่ตั้งไว้ล่วงหน้าที่มีให้เลือกในหม้อหุงข้าว
        ช่วยให้ผู้ซื้อสามารถเปรียบเทียบความหลากหลายในการใช้งานได้
    roaster_oven_functions:
      name: ฟังก์ชั่นของเตาอบย่าง
      description: แสดงรายการฟังก์ชั่นการทำอาหารที่ตั้งไว้ล่วงหน้าหรือที่รองรับในเตาอบย่าง
    roasting_rack_shape:
      name: รูปทรงของตะแกรงย่าง
      description: ระบุรูปทรงหรือการออกแบบโครงสร้างของตะแกรง ซึ่งส่งผลต่อความพอดีและประสิทธิภาพในการปรุงอาหาร
    rockwool_form:
      name: รูปแบบของฉนวนเส้นใยหิน
      description: ระบุรูปแบบทางกายภาพหรือโครงสร้างของผลิตภัณฑ์ฉนวนเส้นใยหิน
    roof_style:
      name: รูปแบบหลังคา
      description: อธิบายรูปแบบทางสถาปัตยกรรมหรือรูปทรงของหลังคา
    rose_attachment:
      name: หัวฉีดสเปรย์
      description: ระบุว่ากระป๋องมีปลายหัว/หัวฉีดสเปรย์แบบถอดได้หรือไม่ เป็นแบบติดตายตัว
        หรือไม่มีหัวฉีดสเปรย์เลย
    safety_mirror_features:
      name: คุณสมบัติของกระจกนิรภัย
      description: เน้นคุณสมบัติพิเศษที่ช่วยเพิ่มความทนทานหรือทัศนวิสัย
    salad_spinner_mechanism:
      name: กลไกสลัดน้ำออกจากผัก
      description: ระบุกลไกการหมุนที่ใช้ในการทำให้ผักแห้ง ช่วยให้ผู้ซื้อเลือกรูปแบบการใช้งานที่ต้องการได้
    sand_color:
      name: สีของทราย
      description: ระบุสีของทรายหรือเม็ดวัสดุที่บรรจุอยู่ภายในนาฬิกาทราย โดยไม่ขึ้นอยู่กับสีของกรอบภายนอก
    sand_type:
      name: ประเภทของทราย
      description: ระบุประเภทของทรายตามองค์ประกอบหรือการใช้งานทั่วไป
    saucer_functionality:
      name: ฟังก์ชันการใช้งานของจานรอง
      description: ระบุรูปแบบการใช้งานของจานรองหรือถาด เช่น แบบรดน้ำอัตโนมัติหรือแบบมีอ่างเก็บน้ำ
    sauna_form_factor:
      name: รูปแบบห้องซาวน่า
      description: อธิบายรูปแบบโครงสร้างโดยทั่วไปของห้องซาวน่า
    sauna_heater_type:
      name: ประเภทเครื่องทำความร้อนสำหรับซาวน่า
      description: ระบุประเภทของเครื่องทำความร้อนที่รวมอยู่ในชุดซาวน่าหรือรองรับโดยชุดซาวน่า
    scoop_release_mechanism:
      name: กลไกการปล่อยผลิตภัณฑ์จากช้อนตัก
      description: อธิบายลักษณะของกลไกการปล่อยผลิตภัณฑ์ที่ติดตั้งอยู่ในช้อนตัก
    scoop_surface_design:
      name: การออกแบบพื้นผิวของกระบวยตัก
      description: อธิบายว่าพื้นผิวของกระบวยตักเป็นแบบทึบหรือมีรูพรุนเพื่อช่วยในการระบายน้ำมัน
    scoop_wall_design:
      name: การออกแบบผนังของที่ตัก
      description: อธิบายว่าพื้นผิวของที่ตักเป็นแบบทึบหรือมีรูพรุน/ช่องเพื่อให้เศษเล็กๆ
        หรือน้ำมันสามารถผ่านได้
    scrubber_head_type:
      name: ประเภทของหัวขัด
      description: อธิบายการทำงานเชิงกลหรือการออกแบบของหัวขัด
    scrubbing_strength:
      name: ความแรงในการขัด
      description: บ่งบอกถึงระดับการขัดถู/ความหยาบกร้านของผลิตภัณฑ์
    seafood_utensil_items_included:
      name: รายการอุปกรณ์สำหรับอาหารทะเลที่รวมอยู่ในชุดนี้
      description: รายการอุปกรณ์สำหรับอาหารทะเลเพิ่มเติมที่มาพร้อมกับที่แกะเปลือก
        ทำให้ผู้ซื้อสามารถเปรียบเทียบที่แกะเปลือกแบบเดี่ยวกับชุดอุปกรณ์ครบชุดได้
    sealing_modes:
      name: โหมดการปิดผนึก
      description: แสดงรายการโปรแกรมการปิดผนึกที่ใช้งานได้บนอุปกรณ์
    security_sensor_subtype:
      name: ชนิดย่อยของเซ็นเซอร์รักษาความปลอดภัย
      description: อธิบายหน้าที่/ประเภทเฉพาะของเซ็นเซอร์รักษาความปลอดภัย
    seed_treatment:
      name: การเคลือบเมล็ดพันธุ์
      description: ระบุถึงกระบวนการแปรรูปพิเศษใดๆ ที่ใช้กับเมล็ดพันธุ์
    self_cleaning_method:
      name: วิธีการทำความสะอาดตัวเอง
      description: ระบุประเภทของเทคโนโลยีการทำความสะอาดตัวเองที่เตาอบใช้
    serveware_pieces_included:
      name: จำนวนชิ้นของเครื่องใช้บนโต๊ะอาหารที่รวมอยู่ในชุด
      description: แสดงรายการส่วนประกอบต่างๆ ของอุปกรณ์เสิร์ฟอาหารที่มาพร้อมชุดอุปกรณ์เสิร์ฟอาหารแบบหลายชิ้น
    shaker_set_pieces_included:
      name: ส่วนประกอบต่างๆ ที่รวมอยู่ในชุดขวดเกลือพริกไทยนี้
      description: แสดงรายการส่วนประกอบแต่ละชิ้นที่มาพร้อมกับชุดนี้ นอกเหนือจากขวดใส่เกลือและพริกไทยทั่วไป
    sheath_material:
      name: วัสดุหุ้ม
      description: วัสดุที่ใช้ทำปลอกหุ้มหัววัดเทอร์โมคัปเปิล มีผลต่อความต้านทานการกัดกร่อนและอุณหภูมิใช้งานสูงสุด
    shelf_location_in_appliance:
      name: ตำแหน่งชั้นวางในเครื่องใช้ไฟฟ้า
      description: ระบุตำแหน่งภายในเครื่องใช้ไฟฟ้าที่ต้องการติดตั้งชั้นวาง
    shoe_brush_type:
      name: ประเภทของแปรงขัดรองเท้า
      description: จำแนกประเภทการใช้งานของแปรงขัดรองเท้า ช่วยให้ผู้ซื้อสามารถหาแปรงที่ออกแบบมาสำหรับงานเฉพาะได้
    shoe_dryer_technology:
      name: เทคโนโลยีเครื่องอบรองเท้า
      description: ระบุเทคโนโลยีการอบแห้งหลักที่ใช้ในเครื่องอบรองเท้า
    shoe_organizer_design:
      name: การออกแบบกล่องเก็บรองเท้า
      description: ระบุรูปแบบหรือสไตล์โดยรวมของกล่องเก็บรองเท้า เพื่อช่วยให้ผู้ซื้อคัดกรองสินค้าได้ง่ายขึ้น
    shoe_polish_form:
      name: รูปแบบของน้ำยาขัดรองเท้า
      description: ระบุรูปแบบทางกายภาพหรือวิธีการจัดส่งของผลิตภัณฑ์น้ำยาขัดรองเท้า
    shoe_treatment_purpose:
      name: วัตถุประสงค์ของการดูแลรักษารองเท้า
      description: ระบุหน้าที่หลักหรือประโยชน์ของผลิตภัณฑ์ดูแลรักษารองเท้า
    shoe_tree_design:
      name: การออกแบบที่ดันทรงรองเท้า
      description: ระบุรูปแบบโครงสร้างหรือกลไกของที่ดันทรงรองเท้า ซึ่งส่งผลต่อการปรับแต่ง
        ประเภทของรองเท้าที่ต้องการ และประโยชน์ใช้สอย
    shot_glass_style:
      name: รูปแบบของแก้วช็อต
      description: จำแนกประเภทหรือรูปแบบเฉพาะของแก้วช็อต
    shovel_handle_grip_type:
      name: รูปแบบด้ามจับพลั่ว
      description: ระบุรูปแบบด้ามจับที่ปลายด้ามจับ
    shovel_head_type:
      name: ประเภทของหัวพลั่ว
      description: จำแนกรูปทรง/รูปแบบการใช้งานของหัวพลั่วหรือจอบ
    shower_curtain_ring_type:
      name: ประเภทของห่วงม่านอาบน้ำ
      description: ระบุรูปแบบการใช้งานของห่วงม่านอาบน้ำ
    shrub_shape:
      name: รูปทรงพุ่มไม้
      description: อธิบายถึงรูปทรงโดยรวมของการตัดแต่ง/ดัดแต่งทรงของพุ่มไม้เทียม
    signature_presence:
      name: การระบุลายเซ็น
      description: ระบุว่าภาพวาดนั้นมีลายเซ็นของศิลปินหรือไม่ และลงนามอย่างไร
    sink_caddy_features:
      name: คุณสมบัติของที่วางอุปกรณ์ล้างจาน
      description: เน้นองค์ประกอบการใช้งานพิเศษของที่วางอุปกรณ์ล้างจาน
    size_adjustability:
      name: ความสามารถในการปรับขนาด
      description: ระบุว่าความยาว/ความกว้างของผลิตภัณฑ์สามารถปรับให้พอดีกับขนาดรองเท้าหลายขนาดได้หรือไม่
    skewer_tip_type:
      name: ประเภทปลายไม้เสียบ
      description: อธิบายประเภทของปลายไม้เสียบ ซึ่งส่งผลต่อความง่ายในการเสียบอาหารและการจัดตกแต่งอาหารโดยรวม
    sleeping_position_suitability:
      name: ความเหมาะสมของท่าทางการนอน
      description: ระบุว่าหมอนนี้ออกแบบมาสำหรับท่าทางการนอนใดบ้าง
    sleeve_insulation:
      name: ฉนวนกันความร้อนของปลอกหุ้ม
      description: ระบุว่าปลอกหุ้มนั้นให้ฉนวนกันความร้อนเพื่อรักษาอุณหภูมิของเครื่องดื่มให้เย็นหรือร้อน
    slice_style:
      name: รูปแบบการหั่น
      description: ระบุรูปแบบการหั่นหลักที่เครื่องหั่นในครัวผลิตได้ เช่น หั่นแบบจูเลียนหรือแบบวาฟเฟิล
    slipcover_stretch_type:
      name: ประเภทการยืดของผ้าคลุมโซฟา
      description: ระบุระดับและทิศทางการยืดตัวของผ้าที่ใช้ในผ้าคลุมโซฟา
    smoker_type:
      name: ประเภทของอุปกรณ์รมควัน
      description: จำแนกอุปกรณ์รมควันตามโครงสร้างหรือวิธีการรมควัน
    smoking_chip_size:
      name: ขนาดของชิ้นไม้รมควัน
      description: ระบุขนาด/ลักษณะการตัดของเศษไม้รมควัน ซึ่งส่งผลต่ออัตราการเผาไหม้และความเหมาะสมสำหรับเตาย่างหรือเตารมควันแบบต่างๆ
    snow_blower_stage_type:
      name: ประเภทขั้นตอนของเครื่องเป่าหิมะ
      description: ระบุจำนวนขั้นตอนของใบพัด/เกลียวลำเลียงที่ใช้ในการเคลื่อนย้ายและปล่อยหิมะ
        ซึ่งเป็นข้อกำหนดหลักที่ใช้ในการแยกแยะเครื่องจักรแบบขั้นตอนเดียว สองขั้นตอน
        และสามขั้นตอน
    soap_dispenser_operation_type:
      name: ประเภทการทำงานของเครื่องจ่ายสบู่
      description: ระบุกลไกการเปิดใช้งานที่ใช้ในการจ่ายสบู่หรือโลชั่น
    soil_texture:
      name: เนื้อดิน
      description: อธิบายถึงขนาดอนุภาค/องค์ประกอบหลักของดิน ซึ่งส่งผลต่อการระบายน้ำและการระบายอากาศ
    spa_installation_type:
      name: ประเภทการติดตั้งสปา
      description: จำแนกสปาตามวิธีการติดตั้งหรือรูปแบบการจัดวาง ณ สถานที่ติดตั้ง
    space_heater_safety_features:
      name: คุณลักษณะด้านความปลอดภัยของเครื่องทำความร้อนแบบพกพา
      description: เน้นกลไกความปลอดภัยในตัวที่ปกป้องผู้ใช้และทรัพย์สิน
    spice_organizer_features:
      name: คุณสมบัติของชั้นวางเครื่องปรุง
      description: เน้นคุณลักษณะการใช้งานพิเศษของชั้นวางเครื่องปรุง
    spray_pattern:
      name: รูปแบบการฉีดพ่น
      description: อธิบายประเภทของการกระจายตัวของน้ำมันที่เกิดจากหัวฉีดสเปรย์
    sprayer_operation_mechanism:
      name: กลไกการทำงานของเครื่องพ่น
      description: ระบุวิธีการสร้างแรงดันเพื่อพ่นน้ำมันออกจากเครื่องพ่น
    spring_type:
      name: ประเภทสปริง
      description: ระบุประเภทของสปริงที่ใช้ในกลไกเครื่องทำขอบ
    sprinkle_opening_style:
      name: รูปแบบของช่องเปิดโรย
      description: ระบุความละเอียดหรือรูปแบบของรู/ตาข่ายที่ใช้ในการโรยผงโกโก้ (ตาข่ายละเอียดเทียบกับรูขนาดใหญ่
        เป็นต้น)
    sprinkler_orientation:
      name: ทิศทางการติดตั้งหัวฉีดดับเพลิง
      description: ระบุทิศทางการติดตั้งและรูปแบบของหัวฉีดดับเพลิง
    sprinkler_response_type:
      name: ประเภทการตอบสนองของหัวฉีดน้ำดับเพลิง
      description: ระบุลักษณะการตอบสนองทางความร้อนของหัวฉีดน้ำดับเพลิง
    sprinkler_type:
      name: ประเภทของหัวฉีดน้ำ
      description: จำแนกตามการทำงานเชิงกลหรือรูปแบบการกระจายของหัวฉีดน้ำ เพื่อให้ง่ายต่อการเปรียบเทียบและการตัดสินใจเลือก
    sprinkler_valve_type:
      name: ประเภทวาล์วสปริงเกลอร์
      description: ระบุประเภทการทำงานหรือการกระตุ้นการทำงานของวาล์วสปริงเกลอร์
    squirrel_feed_type:
      name: ประเภทอาหารกระรอก
      description: ระบุชนิดของอาหารที่เครื่องให้อาหารนี้ออกแบบมาเพื่อจ่าย เพื่อให้มั่นใจว่าเข้ากันได้กับอาหารที่กระรอกชื่นชอบ
    squirrel_resistance:
      name: การป้องกันกระรอก
      description: ระบุว่ากรงใส่มันแข็งมีคุณสมบัติที่ออกแบบมาเพื่อป้องกันไม่ให้กระรอกเข้าถึงมันแข็งหรือไม่
    stackability:
      name: ความสามารถในการวางซ้อน
      description: ระบุว่าสามารถวางซ้อนหลายชิ้นได้อย่างปลอดภัยเพื่อประหยัดพื้นที่จัดเก็บหรือไม่
    stackable_design:
      name: ดีไซน์แบบวางซ้อนกันได้
      description: ระบุว่าภาชนะได้รับการออกแบบให้สามารถวางซ้อนกันได้อย่างปลอดภัยหรือไม่
        ไม่ว่าจะบรรจุเต็มหรือว่างเปล่า
    stacking_capability:
      name: ความสามารถในการซ้อน
      description: ระบุว่าภาชนะนี้สามารถวางซ้อนกัน ซ้อนกันแบบแยกส่วน ยุบรวม หรือไม่สามารถวางซ้อนกับภาชนะอื่นได้หรือไม่
    stainless_steel_cleaner_features:
      name: คุณสมบัติของน้ำยาทำความสะอาดสแตนเลส
      description: ระบุคุณลักษณะการทำงานพิเศษของผลิตภัณฑ์ที่ไม่เหมือนใครหรือมีความเกี่ยวข้องเป็นพิเศษกับการดูแลรักษาสแตนเลส
    staple/pin_shape:
      name: รูปทรงของลวดเย็บ/หมุด
      description: กำหนดรูปทรงโดยรวมของอุปกรณ์ยึด ช่วยให้ลูกค้าเลือกใช้ระหว่างลวดเย็บรูปตัว
        U หมุดหัวกลม เป็นต้น
    staple_coating:
      name: การเคลือบลวดเย็บกระดาษ
      description: อธิบายถึงสารเคลือบป้องกันใดๆ ที่ใช้กับลวดเย็บกระดาษหรือหมุดยึด
        เพื่อป้องกันสนิมหรือเพิ่มอายุการใช้งาน
    steam_nozzle_type:
      name: ประเภทหัวฉีดไอน้ำ
      description: ระบุรูปแบบการใช้งานของหัวฉีดเครื่องทำความสะอาดด้วยไอน้ำ
    steam_table_pan_cover_features:
      name: คุณสมบัติของฝาปิดอ่างใส่อาหาร
      description: เน้นคุณลักษณะการใช้งานพิเศษของฝาปิดอ่างใส่อาหารที่ช่วยอำนวยความสะดวกในการดำเนินงานด้านบริการอาหาร
    steam_table_pan_size:
      name: ขนาดของอ่างใส่อาหาร
      description: ระบุเศษส่วนมาตรฐานของอ่างใส่อาหารแบบ Gastronorm/Hotel-pan (เช่น
        เต็ม, 1/2, 1/3) ที่ภาชนะหรือฝาปิดนั้นออกแบบมาให้ปิดได้พอดี
    steam_table_pan_size_compatibility:
      name: ความเข้ากันได้กับขนาดอ่างใส่อาหาร
      description: แสดงรายการขนาดอ่างแกสโตรนอร์มหรืออ่างมาตรฐานที่ภาชนะนี้สามารถรองรับได้
    steam_table_pan_type:
      name: ประเภทของถาดสำหรับอุ่นอาหาร
      description: ระบุรูปแบบโครงสร้างของอ่างใส่อาหาร ซึ่งส่งผลต่อประสิทธิภาพการระบายน้ำและการให้ความร้อน
    stemware_design:
      name: การออกแบบเครื่องแก้วมีก้าน
      description: ระบุว่าแก้วเครื่องดื่มนั้นมีก้านแบบดั้งเดิมหรือไม่มีก้าน
    stick_tip_style:
      name: รูปแบบของปลายไม้เสียบ
      description: อธิบายการออกแบบของปลายไม้เสียบ ซึ่งส่งผลต่อวิธีการเสียบหรือรองรับอาหาร
    stocking_toe_orientation:
      name: ทิศทางการหันปลายถุงน่อง
      description: ระบุทิศทางที่ปลายถุงน่องชี้ไปเมื่อแขวน ซึ่งส่งผลต่อความสมมาตรทางสายตาเมื่อจัดแสดงถุงน่องหลายชิ้น
    stopper_type:
      name: ประเภทจุกปิด
      description: ระบุชนิดของจุกปิดที่ให้มาพร้อมกับเหยือก หากมี
    strainer_style:
      name: รูปแบบของตะแกรง
      description: จำแนกประเภทการออกแบบของตะแกรงหรือกระชอน
    strainer_type:
      name: ประเภทของตะแกรงกรอง
      description: ระบุรูปแบบหรือดีไซน์ของตะแกรงกรอง โดยบ่งบอกถึงการใช้งานด้านการทำอาหารและโครงสร้างตาข่าย
    strap_end_fitting_type:
      name: ประเภทอุปกรณ์ยึดปลายสายรัด
      description: ระบุฮาร์ดแวร์หรืออุปกรณ์ที่อยู่ตรงปลายสายดึง ซึ่งใช้สำหรับเชื่อมต่อ
        ยึด หรือปรับแต่ง
    straw_dispensing_mechanism:
      name: กลไกการจ่ายหลอด
      description: อธิบายวิธีการจ่ายหลอด เพื่อช่วยผู้ซื้อที่ต้องการคุณสมบัติด้านสุขอนามัยหรือความสะดวกสบายเป็นพิเศษ
    sugar_dispenser_mechanism:
      name: กลไกการจ่ายน้ำตาล
      description: อธิบายรายละเอียดวิธีการจ่ายน้ำตาลจากภาชนะ ช่วยให้ผู้ซื้อเลือกวิธีการเทที่ต้องการได้
    suitable_for_pool_shape:
      name: เหมาะสำหรับรูปทรงสระว่ายน้ำ
      description: ระบุว่าอุปกรณ์เสริมนี้สามารถใช้กับสระว่ายน้ำรูปทรงใดได้บ้าง ช่วยให้ผู้ใช้มั่นใจได้ว่าอุปกรณ์นั้นพอดีกับสระว่ายน้ำ
    suitable_pool_surface_type:
      name: ประเภทพื้นสระว่ายน้ำที่เหมาะสม
      description: ระบุวัสดุของพื้นสระว่ายน้ำที่แปรง/ไม้กวาดได้รับการออกแบบมาให้ใช้งานร่วมกัน
        เพื่อป้องกันความเสียหายของพื้นผิวและรับประกันการทำความสะอาดอย่างมีประสิทธิภาพ
    suitable_spread_material:
      name: วัสดุที่เหมาะสมสำหรับการโรย
      description: ระบุประเภทของวัสดุที่เครื่องโรยได้รับการออกแบบมาให้โรย
    sundial_type:
      name: ประเภทของนาฬิกาแดด
      description: ระบุรูปแบบการออกแบบหรือโครงสร้างทางวิทยาศาสตร์ของนาฬิกาแดด
    supplement_function:
      name: หน้าที่หลักของธาตุอาหารเสริม
      description: จำแนกประเภทธาตุอาหารเสริมตามวัตถุประสงค์หลัก ช่วยให้เกษตรกรเลือกธาตุอาหารเสริมที่เหมาะสมสำหรับความต้องการเฉพาะของพืช
    surface_reflectivity:
      name: การสะท้อนแสงของพื้นผิว
      description: ระบุว่าพื้นผิวป้ายได้รับการออกแบบมาเพื่อสะท้อนแสงเพื่อเพิ่มทัศนวิสัยในเวลากลางคืนหรือไม่
    sweetener_type:
      name: ประเภทของสารให้ความหวาน
      description: ระบุสารให้ความหวานหลักที่ใช้ในน้ำเชื่อม
    table_skirt_pleat_style:
      name: รูปแบบการจับจีบของผ้าคลุมโต๊ะ
      description: อธิบายรูปแบบการจับจีบหรือการรวบผ้าเพื่อตกแต่งผ้าคลุมโต๊ะ ช่วยให้ผู้ซื้อสามารถเลือกสีที่เข้ากับธีมความสวยงามได้
    tablecloth_clip_design:
      name: การออกแบบคลิปหนีบผ้าปูโต๊ะ
      description: อธิบายกลไกหรือรูปแบบของคลิปหนีบผ้าปูโต๊ะ
    tablecloth_features:
      name: คุณสมบัติของผ้าปูโต๊ะ
      description: เน้นคุณสมบัติพิเศษด้านประสิทธิภาพหรือการออกแบบของผ้าปูโต๊ะ
    tamper_evident_feature:
      name: คุณสมบัติป้องกันการแกะ
      description: ระบุถึงการมีอยู่และรูปแบบของฟังก์ชันป้องกันการแกะที่รวมอยู่ในฝาปิด
    tang_type:
      name: ประเภทของก้านมีด
      description: ระบุลักษณะการออกแบบก้านมีด โดยระบุว่าโลหะของใบมีดนั้นยื่นเข้าไปในด้ามจับมากน้อยเพียงใด
    teapot_spout_style:
      name: รูปแบบพวยกาน้ำชา
      description: อธิบายถึงการออกแบบพวยกาน้ำชา ซึ่งส่งผลต่อการควบคุมการเทและสุนทรียภาพ
    temperature_zones:
      name: โซนอุณหภูมิ
      description: ระบุจำนวนโซนอุณหภูมิที่สามารถควบคุมได้อย่างอิสระในตู้แช่ไวน์
    thermocouple_junction_type:
      name: ชนิดของจุดเชื่อมต่อเทอร์โมคัปเปิล
      description: ระบุถึงโครงสร้างการเชื่อมต่อปลายของเซนเซอร์ ซึ่งส่งผลต่อเวลาตอบสนองและการแยกทางไฟฟ้า
    thermometer_design:
      name: การออกแบบเทอร์โมมิเตอร์
      description: ระบุรูปแบบการทำงานพื้นฐานหรือเทคโนโลยีของเทอร์โมมิเตอร์สำหรับใช้ในครัวเรือน
    thermos_handle_type:
      name: ประเภทของหูหิ้วกระติกน้ำร้อน
      description: อธิบายถึงรูปแบบของหูหิ้วหรืออุปกรณ์ช่วยในการพกพาที่ติดตั้งมากับกระติกน้ำร้อน
    thread_standard:
      name: มาตรฐานของเกลียว
      description: ระบุข้อกำหนดเกลียวที่ใช้ในการเชื่อมต่ออุปกรณ์เสริม เพื่อให้มั่นใจได้ว่าสามารถใช้งานร่วมกับอุปกรณ์ประปาชนิดต่างๆ
        ได้
    tilt_mechanism:
      name: กลไกการปรับเอียง
      description: ระบุกลไกที่ช่วยให้หลังคาบังแดดสามารถปรับเอียงเพื่อจัดตำแหน่งร่มเงาได้อย่างเหมาะสม
    time_format:
      name: รูปแบบเวลา
      description: ระบุว่านาฬิกาสามารถแสดงเวลาในรูปแบบ 12 ชั่วโมง 24 ชั่วโมง หรือทั้งสองรูปแบบได้หรือไม่
    timer_mechanism:
      name: กลไกจับเวลา
      description: ระบุกลไกพื้นฐานที่ใช้ในการวัดเวลา
    tine_position:
      name: ตำแหน่งของซี่คราด
      description: อธิบายถึงการจัดวางของซี่คราดเมื่อเทียบกับล้อ/เครื่องยนต์ ซึ่งส่งผลต่อความคล่องตัวและการเจาะดิน
    tire_construction:
      name: โครงสร้างของยางรถยนต์
      description: ระบุวิธีการสร้างโครงสร้างภายในของโครงยางรถยนต์
    tire_construction_type:
      name: ประเภทโครงสร้างของยางรถยนต์
      description: ระบุว่ายางนี้เป็นโครงสร้างแบบไบแอสพลายหรือเรเดียล ซึ่งส่งผลต่อความยืดหยุ่น
        ความสามารถในการรับน้ำหนัก และคุณภาพการขับขี่
    tire_tread_pattern:
      name: ลายดอกยาง
      description: อธิบายลักษณะของดอกยาง ซึ่งบ่งบอกถึงความเหมาะสมสำหรับสภาพพื้นหญ้าและความต้องการแรงยึดเกาะที่แตกต่างกัน
    tissue_lotion_content:
      name: ส่วนประกอบของโลชั่นในกระดาษทิชชู
      description: ระบุว่ากระดาษทิชชูนั้นผสมโลชั่นหรือสารบำรุงผิวอื่นๆ หรือไม่
    toaster_features:
      name: คุณสมบัติของเครื่องปิ้งขนมปัง
      description: แสดงรายการฟังก์ชันพิเศษและองค์ประกอบการออกแบบที่มีอยู่ในเครื่องปิ้งขนมปัง
    tong_type:
      name: ประเภทของที่คีบ
      description: ระบุรูปแบบหลักหรือวัตถุประสงค์การใช้งานของที่คีบ
    toothbrush_holder_features:
      name: คุณสมบัติของที่เก็บแปรงสีฟัน
      description: เน้นฟังก์ชั่นพิเศษหรือองค์ประกอบการออกแบบที่แตกต่างไปจากที่เก็บแปรงสีฟันทั่วไป
    toothpick_dispensing_mechanism:
      name: กลไกการจ่ายไม้จิ้มฟัน
      description: ระบุกลไกที่ใช้ในการจ่ายไม้จิ้มฟัน
    topographical_relief:
      name: ลักษณะความสูงต่ำของภูมิประเทศ
      description: ระบุว่าพื้นผิวโลกมีลักษณะภูมิประเทศที่ยกสูงขึ้นหรือไม่
    towel_holder_design:
      name: การออกแบบที่แขวนผ้าเช็ดตัว
      description: อธิบายรูปแบบโครงสร้างของที่แขวนผ้าเช็ดตัว เช่น แบบราวหรือแบบห่วง
    towel_weave:
      name: ลักษณะการทอผ้าขนหนู
      description: อธิบายถึงโครงสร้างหรือรูปแบบการทอของผ้าขนหนู ซึ่งส่งผลต่อเนื้อสัมผัส
        การดูดซับ และเวลาในการแห้ง
    track_lighting_rail_type:
      name: ประเภทรางของโคมไฟราง
      description: ระบุมาตรฐานทางกล/ไฟฟ้าของราง ซึ่งจะช่วยกำหนดได้ว่าโคมไฟและอุปกรณ์หัวต่อใดที่ใช้งานร่วมกันได้
    track_lighting_system_compatibility:
      name: ความเข้ากันได้ของระบบโคมไฟราง
      description: ระบุมาตรฐานทางไฟฟ้าและทางกลของรางที่โคมไฟหรืออุปกรณ์เสริมได้รับการออกแบบมาให้ใช้งานร่วมกัน
    track_rail_circuit_configuration:
      name: การกำหนดค่าวงจรของรางติดตั้ง
      description: ระบุจำนวนหรือรูปแบบของวงจรไฟฟ้าที่รางรองรับ ซึ่งส่งผลต่อการควบคุมกลุ่มโคมไฟแต่ละกลุ่มอย่างอิสระ
    track_system_standard:
      name: มาตรฐานของระบบราง
      description: ระบุมาตรฐานรางทางกายภาพที่สายส่งไฟฟ้าสามารถใช้งานร่วมกันได้ ช่วยให้ผู้ซื้อสามารถเลือกชิ้นส่วนให้เข้ากับรางที่ต้องการได้
        (เช่น รางรูปตัว H, J หรือ L)
    tractor_tire_application:
      name: การใช้งานยางรถแทรกเตอร์
      description: ระบุการใช้งานหลักหรือสภาพแวดล้อมที่ยางได้รับการออกแบบมา
    tractor_tire_tread_classification:
      name: การจำแนกประเภทดอกยางรถแทรกเตอร์
      description: จำแนกรูปแบบดอกยางรถแทรกเตอร์ตามมาตรฐานทางการเกษตรและอุตสาหกรรม
    tree_shape:
      name: รูปทรงต้นไม้
      description: อธิบายถึงรูปทรงโดยรวมหรือลักษณะของต้นไม้เทียม
    trigger_type:
      name: ประเภทของไก
      description: ระบุกลไกของไกที่ใช้ควบคุมการไหลของน้ำบนหัวฉีด
    trimmer_line_feed_system:
      name: ระบบป้อนเอ็นตัดหญ้า
      description: อธิบายวิธีการเลื่อนเอ็นตัดหญ้าจากหัวตัดระหว่างการใช้งาน
    trimmer_line_shape:
      name: รูปทรงของสายเอ็นตัดหญ้า
      description: อธิบายถึงรูปทรงหน้าตัดของสายเอ็นตัดหญ้า ซึ่งมีผลต่อประสิทธิภาพการตัดและเสียงรบกวน
    turntable_type:
      name: ประเภทของจานหมุน
      description: ระบุรูปแบบของพื้นที่วางอาหาร โดยแยกความแตกต่างระหว่างจานแก้วหมุนแบบดั้งเดิมกับแบบแผ่นเรียบหรือแบบไม่หมุน
    ultrasonic_cleaner_accessories_included:
      name: อุปกรณ์เสริมสำหรับเครื่องล้างอัลตราโซนิกที่รวมอยู่ในชุด
      description: ระบุรายการส่วนประกอบเพิ่มเติมที่มาพร้อมกับเครื่องทำความสะอาด เพื่อให้ผู้ซื้อทราบว่ามีอะไรอยู่ในกล่องบ้าง
    umbrella_base_type:
      name: ประเภทของฐานร่ม
      description: อธิบายรูปแบบโครงสร้างหรือการออกแบบการติดตั้งของฐาน
    umbrella_opening_mechanism:
      name: กลไกการกางร่ม
      description: อธิบายวิธีการกางและพับเก็บร่ม
    umbrella_type:
      name: ประเภทของร่ม
      description: ระบุการออกแบบโดยรวมหรือรูปทรงของร่ม
    upf_rating:
      name: ค่า UPF
      description: ระบุค่าความสามารถในการป้องกันรังสียูวี (UPF) ของผ้าใบกันแดด ซึ่งเป็นการวัดประสิทธิภาพในการป้องกันรังสียูวีที่เป็นอันตราย
    utensil_flexibility:
      name: ความยืดหยุ่นของอุปกรณ์
      description: บ่งบอกถึงความแข็งหรือความยืดหยุ่นของตัวใบมีดขูด ซึ่งส่งผลต่อความเหมาะสมในการใช้งานกับชามโค้งหรือแป้งที่แข็ง
    utensil_holder_features:
      name: คุณสมบัติของที่ใส่อุปกรณ์ครัว
      description: อธิบายลักษณะการใช้งานพิเศษของที่ใส่อุปกรณ์ครัว
    utensil_tray_features:
      name: คุณสมบัติของถาดเก็บช้อนส้อม
      description: เน้นคุณลักษณะพิเศษที่ช่วยเพิ่มประสิทธิภาพการใช้งานของถาด
    vacuum_hose_connection_type:
      name: ประเภทการเชื่อมต่อท่อดูดฝุ่น
      description: อธิบายรูปแบบของตัวเชื่อมต่อที่ปลายท่อ เพื่อให้มั่นใจได้ว่าสามารถเชื่อมต่อกับเครื่องดูดฝุ่นหรืออุปกรณ์เสริมได้อย่างถูกต้อง
    valance_style:
      name: สไตล์ผ้าม่านระบาย
      description: ระบุรูปแบบการตกแต่งของผ้าม่านระบาย ช่วยให้ลูกค้าเลือกสไตล์ที่เข้ากับการตกแต่งบ้านได้
    valet_organizer_features:
      name: คุณลักษณะของที่แขวนกุญแจสำหรับจอดรถ
      description: เน้นคุณลักษณะเฉพาะด้านการจัดระเบียบที่ผสานรวมเข้ากับระบบรับจอดรถที่คิดค่าบริการ
    valve_configuration:
      name: รูปแบบของวาล์ว
      description: อธิบายรูปแบบการทำงานของวาล์วสายยางรดน้ำ ช่วยให้ผู้ซื้อเลือกโซลูชันที่เหมาะสมสำหรับการติดตั้งระบบรดน้ำได้อย่างรวดเร็ว
    valve_stem_angle:
      name: มุมของจุ๊บเติมลม
      description: ระบุทิศทาง/มุมของจุ๊บเติมลมยางเทียบกับยางใน ซึ่งส่งผลต่อความสะดวกในการเติมลมและความพอดีกับขอบล้อ
    vase_filler_type:
      name: ประเภทของวัสดุสำหรับตกแต่งแจกัน
      description: จัดหมวดหมู่ผลิตภัณฑ์ตามชนิดของวัสดุหรือรูปทรงที่ใช้ตกแต่ง
    vent_pipe_type:
      name: ประเภทท่อระบายอากาศ
      description: จำแนกประเภทโครงสร้างของปล่องระบายอากาศหรือท่อระบายอากาศ
    vent_style:
      name: รูปแบบช่องระบายอากาศ
      description: จำแนกประเภทโครงสร้างหรือวัตถุประสงค์ของส่วนประกอบช่องระบายอากาศ
    waffle_style:
      name: รูปแบบวาฟเฟิล
      description: ระบุรูปแบบหรือลวดลายของวาฟเฟิลที่เกิดจากแผ่นพิมพ์
    wallpaper_removal_type:
      name: ประเภทการลอกวอลเปเปอร์
      description: บ่งบอกถึงความง่ายในการลอกออกเมื่อต้องการตกแต่งใหม่
    wallpaper_washability_rating:
      name: ระดับความสามารถในการล้างทำความสะอาดของวอลเปเปอร์
      description: ระบุว่าพื้นผิววอลเปเปอร์สามารถทำความสะอาดได้มากน้อยเพียงใดหลังจากติดตั้งแล้ว
    warmer_type:
      name: ประเภทเครื่องให้ความร้อน
      description: ระบุกลไกการให้ความร้อนหลักหรือวัตถุประสงค์การใช้งานของเครื่องให้ความร้อนเทียนหรือน้ำมันหอมระเหย
    warmth_level:
      name: ระดับความอบอุ่น
      description: จำแนกระดับความอบอุ่นโดยรวมหรือความเหมาะสมตามฤดูกาลของผ้าห่มหรือผ้านวม
    warmth_rating:
      name: ระดับความอบอุ่น
      description: บ่งบอกถึงระดับการเป็นฉนวนของผ้าห่ม คล้ายกับค่า TOG ในเครื่องนอน
    waste_container_lid_features:
      name: คุณสมบัติของฝาถังขยะ
      description: เน้นฟังก์ชันพิเศษหรือการปรับปรุงเพิ่มเติมที่ติดตั้งมาในฝาถังขยะ
    waste_container_sign_message:
      name: ข้อความบนป้ายถังขยะ
      description: ระบุประเภทของขยะที่เฉพาะเจาะจง หรือข้อความเตือนที่พิมพ์บนฉลากหรือป้าย
    water_filtration_technology:
      name: เทคโนโลยีการกรองน้ำ
      description: อธิบายถึงเทคโนโลยีหลักหรือกลไกที่ใช้ในการทำให้น้ำบริสุทธิ์
    water_heater_element_connection_type:
      name: ประเภทการเชื่อมต่อของตัวทำความร้อนเครื่องทำน้ำอุ่น
      description: ระบุรูปแบบการติดตั้งของตัวทำความร้อน โดยแยกความแตกต่างระหว่างแบบขันสกรูและแบบหน้าแปลนต่างๆ
    water_sensor_design:
      name: การออกแบบเซ็นเซอร์น้ำ
      description: ระบุรูปแบบทางกายภาพของตัวเซ็นเซอร์น้ำ
    water_supply_type:
      name: ประเภทแหล่งจ่ายน้ำ
      description: ระบุวิธีการที่เครื่องใช้ไฟฟ้าได้รับน้ำ โดยแยกความแตกต่างระหว่างถังเก็บน้ำแบบเติมด้วยตนเองและท่อน้ำประปา
    watering_needs:
      name: ความต้องการน้ำ
      description: อธิบายถึงปริมาณน้ำที่พืชชนิดนี้ต้องการโดยทั่วไป
    wax_paper_form:
      name: รูปแบบกระดาษไข
      description: ระบุว่ากระดาษไขจำหน่ายเป็นม้วนต่อเนื่องหรือเป็นแผ่นตัดสำเร็จ
    weather_guard_mounting_method:
      name: วิธีการติดตั้งฝาครอบกันฝน
      description: ระบุวิธีการยึดฝาครอบเข้ากับที่ให้อาหารหรือโครงสร้างรองรับ
    wheel_bearing_type:
      name: ประเภทของตลับลูกปืนล้อ
      description: ระบุโครงสร้างตลับลูกปืนหรือบูชภายในของล้อ ซึ่งส่งผลต่อความราบรื่นในการหมุนและข้อกำหนดในการบำรุงรักษา
    wheel_tread_style:
      name: รูปแบบดอกยางของล้อ
      description: ระบุรูปแบบดอกยางของล้อ ซึ่งส่งผลต่อการยึดเกาะ ระดับเสียง และโอกาสที่จะเกิดรอยบนพื้น
    whistling:
      name: เสียงหวีด
      description: ระบุว่ากาต้มน้ำจะส่งเสียงหวีดเมื่อน้ำเดือดหรือไม่
    wick_material:
      name: วัสดุไส้เทียน
      description: ระบุส่วนประกอบของไส้เทียนที่ใช้ (เช่น ฝ้าย ใยแก้ว)
    window_film_installation_surface:
      name: พื้นผิวสำหรับติดตั้งฟิล์มกรองแสง
      description: ระบุว่าฟิล์มนั้นออกแบบมาสำหรับการใช้งานภายใน ภายนอก หรือใช้งานได้ทั้งสองพื้นผิว
    window_film_type:
      name: ประเภทของฟิล์มกรองแสง
      description: จำแนกตามรูปแบบการใช้งานของฟิล์ม (เช่น ฟิล์มเพื่อความเป็นส่วนตัว
        กับ ฟิล์มเพื่อความปลอดภัย)
    window_rod_type:
      name: ประเภทของราวผ้าม่าน
      description: จำแนกตามรูปแบบการใช้งานของราวผ้าม่าน
    window_screen_type:
      name: ประเภทของมุ้งลวดหน้าต่าง
      description: อธิบายรูปแบบโครงสร้างหรือวิธีการใช้งานของมุ้งลวด
    window_treatment_lining_type:
      name: ประเภทของซับหลังตกแต่งหน้าต่าง
      description: ระบุว่าม่านระบายหรือม่านบังตามีซับหลังหรือไม่ และใช้ผ้าซับชนิดใด
    wine_aerator_type:
      name: ประเภทของอุปกรณ์เติมอากาศไวน์
      description: ระบุรูปทรงหรือรูปแบบการใช้งานของอุปกรณ์เติมอากาศไวน์
    wine_glass_style:
      name: รูปแบบแก้วไวน์
      description: ระบุประเภทไวน์ที่ต้องการหรือดีไซน์ของแก้วเพื่อให้ได้กลิ่นและรสชาติที่ดีที่สุด
    wok_bottom_type:
      name: ประเภทก้นกระทะ
      description: อธิบายรูปทรงของก้นกระทะ ซึ่งเป็นตัวกำหนดความเข้ากันได้กับเตาและแหวนรองกระทะแบบต่างๆ
    wood_grain_orientation:
      name: ทิศทางลายไม้
      description: ระบุทิศทางของลายไม้ในผลิตภัณฑ์ เช่น ลายหน้าตัดขวางของไม้ ลายไม้ด้านข้าง
        หรือลายไม้ด้านกว้าง ทิศทางของลายไม้มีผลต่อความทนทานและความเหมาะสมในการใช้งานกับมีด
    wood_seasoning_method:
      name: วิธีการอบแห้งไม้
      description: ระบุวิธีการอบแห้งหรือผึ่งไม้เชื้อเพลิง ซึ่งมีผลต่อปริมาณความชื้นและคุณภาพการเผาไหม้
    wrap_format:
      name: รูปแบบการห่อ
      description: ระบุรูปแบบทางกายภาพของบรรจุภัณฑ์อาหาร เช่น แบบม้วนหรือแบบแผ่นตัดสำเร็จ
    abacus_bead_material:
      name: วัสดุลูกปัดลายลูกคิด
      description: วัสดุหลักของลูกปัดลายลูกคิด
    abec_rating:
      name: ระดับมาตรฐาน ABEC
      description: ระบุระดับความแม่นยำของตลับลูกปืนตามมาตรฐาน ABEC ซึ่งบ่งบอกถึงความลื่นไหลในการหมุนและค่าความคลาดเคลื่อนของตลับลูกปืน
    abrasive_level:
      name: ระดับความหยาบ
      description: ความสามารถในการขัดเงาของผลิตภัณฑ์ขัดเงา/สารขัดผิวต่างๆ บนพื้นผิวสีรถยนต์
    absinthe_accessories_included:
      name: อุปกรณ์ที่มาพร้อมกับเหล้าแอ็บซินท์
      description: แจ้งรายละเอียดเกี่ยวกับอุปกรณ์เสริมที่มาพร้อมกับสินค้า เช่น ช้อน
        แก้ว หรือก้อนน้ำตาล
    ac_compressor_mounting_style:
      name: รูปแบบการติดตั้งคอมเพรสเซอร์แอร์รถยนต์
      description: อธิบายรูปแบบการติดตั้ง/ขายึดเชิงกลสำหรับยึดคอมเพรสเซอร์เข้ากับเครื่องยนต์/ระบบขับเคลื่อนอุปกรณ์เสริมของรถยนต์
    ac_compressor_oil_type:
      name: ประเภทน้ำมันคอมเพรสเซอร์แอร์รถยนต์
      description: ระบุองค์ประกอบทางเคมีของน้ำมันหล่อลื่นที่จำเป็นสำหรับคอมเพรสเซอร์แอร์รถยนต์
        (ประเภทที่พบบ่อย ได้แก่ PAG และ POE)
    accent_modes:
      name: โหมดการเน้นเสียง
      description: ระบุวิธีการที่เมโทรนอมสามารถเน้นจังหวะภายใน 1 ห้องเพลง (นอกเหนือจากเสียงคลิกพื้นฐาน)
    access_mechanism:
      name: วิธีการขึ้นเตียงยกสูง
      description: อธิบายวิธีการที่ผู้ใช้ขึ้นไปถึงเตียงยกสูง
    accessibility_features:
      name: คุณสมบัติเพื่อการเข้าถึง
      description: ระบุอุปกรณ์และการติดตั้งที่เกี่ยวข้องในการเข้าถึงสำหรับผู้ใช้งานรถมินิบัส
    accessories_included:
      name: อุปกรณ์เสริมที่มาพร้อมสินค้า
      description: ระบุอุปกรณ์เสริมที่มาพร้อมกับเก้าอี้ (เช่น ที่พักเท้า หมอนรองเอว)
        เพื่อให้นักช้อปมองเห็นมูลค่าเพิ่มของสินค้าอย่างชัดเจน
    accessory_pieces_included:
      name: รายการเครื่องประดับที่รวมอยู่ในชุด
      description: ระบุรายการอุปกรณ์เสริมที่รวมอยู่ในชุดของขวัญหรือชุดรวมสินค้าเครื่องประดับเสื้อผ้าแบบหลายชิ้น
    acoustic_amplifier_feedback_control_features:
      name: คุณสมบัติการควบคุมเสียงไมค์หอนของแอมป์อะคูสติก
      description: ระบุเครื่องมือป้องกันเสียงไมค์หอนที่มีมาในตัวสำหรับเครื่องดนตรีอะคูสติก
        (เช่น ตัวกรองนอตช์ สวิตช์ปรับเฟส ระบบลดเสียงไมค์หอนอัตโนมัติ)
    acoustic_drum_kit_components_included:
      name: รวมส่วนประกอบของชุดกลองอะคูสติก
      description: ระบุส่วนประกอบหลักที่มีมาให้ในชุด (เช่น เฉพาะชุดกลอง หรือชุดเต็มพร้อมฉาบและฮาร์ดแวร์ต่างๆ)
    acoustic_guitar_body_shape:
      name: รูปทรงกีตาร์โปร่ง
      description: อธิบายรูปทรง/โครงกีตาร์โปร่ง ซึ่งส่งผลต่อโทนเสียง ความสบายในการเล่น
        และลักษณะการใช้งานทั่วไป
    acoustic_guitar_string_core_design:
      name: โครงสร้างแกนสายกีตาร์โปร่ง
      description: โครงสร้างแกนสายแบบพันลวด
    acoustic_piano_key_material:
      name: วัสดุคีย์เปียโนอะคูสติก
      description: ระบุวัสดุหลักที่ใช้สำหรับแผ่นปิดส่วนบน/งาช้างของแป้นเปียโน
    acoustic_piano_lid_type:
      name: ประเภทฝาปิดเปียโนอะคูสติก
      description: ระบุรูปแบบกลไกของฝาปิดที่ใช้กับเปียโนอะคูสติก (เพื่อแยกความแตกต่างระหว่างฝาบนกับฝาคีย์ของเปียโนแกรนด์และอัปไรต์)
    acoustic_piano_plate_frame_material:
      name: วัสดุแผ่นโครง/เฟรมของเปียโนอะคูสติก
      description: ระบุวัสดุหลักของแผ่นโครงหรือเฟรมของเปียโน (ฮาร์ป) ซึ่งโดยทั่วไปมักทำจากเหล็กหล่อ
    acoustic_piano_soundboard_material:
      name: วัสดุซาวด์บอร์ดของเปียโนอะคูสติก
      description: ระบุวัสดุหลักที่ใช้สำหรับซาวด์บอร์ดของเปียโน
    action_figure_scale:
      name: สเกลของแอ็กชันฟิกเกอร์
      description: ระบุอัตราส่วนสเกลสำหรับนักสะสม (เช่น 1:12) ที่ออกแบบอุปกรณ์เสริมนี้มาให้ใช้ร่วมกันได้
    action_type:
      name: ประเภทกลไก
      description: อธิบายกลไกการยิงปืนหรือการขึ้นลำปืน (เช่น ระบบลูกเลื่อน หักลำกล้อง
        หรือคันโยก)
    actuation_mechanism:
      name: กลไกการควบคุม
      description: ระบุกลไกของคันเบรกในการควบคุมระบบเบรก เช่น สายเคเบิลเชิงกลล้วน
        ไฮดรอลิกเต็มรูปแบบ ไฮดรอลิกที่ใช้สายเคเบิลควบคุม หรือระบบอิเล็กทรอนิกส์/ไร้สาย
    actuation_method:
      name: วิธีการสั่งการ
      description: ระบุวิธีการเปิดใช้งานหรือปิดใช้งานระบบดับเพลิง
    adapter_orientation:
      name: การวางแนวหัวแปลงจุ๊บลม
      description: ระบุองศาหรือการจัดวางหัวแปลงจุ๊บลมยางรถจักรยาน ซึ่งมีผลต่อความสะดวกในการใช้งานปั๊มลม
        (เช่น แบบตรง หรือแบบงอ 90°)
    additive_application_stage:
      name: ขั้นตอนการใช้สารเติมแต่ง
      description: ระบุขั้นตอนในกระบวนการที่ออกแบบสินค้ามาให้ใช้งาน
    adhesive_backing:
      name: แผ่นกาวด้านหลัง
      description: ระบุว่าผ้าไหมสำหรับพิมพ์ลายมีแผ่นกาวด้านหลังหรือไม่ เพื่อให้สามารถลอกแล้วติดได้ทันที
    adhesive_formulation:
      name: สูตรของกาว
      description: ระบุประเภทฐานเคมีหรือสูตรของกาวที่ใช้ เช่น ไซยาโนอะคริเลต หรืออีพ็อกซี่
    adhesive_sides:
      name: ด้านที่มีกาว
      description: ระบุว่ากาวชนิดหลอมติดอยู่บนด้านเดียวหรือทั้งสองด้านของเทป/แผ่นใยสังเคราะห์
    adjunct_grain_processing_form:
      name: รูปแบบการแปรรูปธัญพืชเสริม
      description: ระบุรูปแบบทางกายภาพ/การแปรรูปของธัญพืชเสริมที่จำหน่ายสำหรับการผลิตเบียร์
        (เช่น แบบแผ่นอัด อบพอง มอลต์ หรือดิบ)
    adjustability_type:
      name: ประเภทการปรับตั้ง
      description: ระบุประเภทการปรับตั้งที่สตรัทสามารถรองรับได้ (ถ้ามี)
    adjustable_cup_mutes:
      name: ที่ปิดเสียงแบบถ้วยที่ปรับระดับได้
      description: ระบุว่าสามารถปรับ/ถอดถ้วยออกได้หรือไม่ รวมถึงรูปแบบการปรับตั้ง
    adjustable_zones:
      name: โซนที่ปรับได้
      description: ระบุส่วนต่างๆ ของฐานที่สามารถปรับได้อย่างอิสระจากกัน
    adjustment_type:
      name: ประเภทการปรับตั้ง
      description: ระบุว่าสามารถปรับวาล์วแรงดันได้หรือไม่ รวมถึงวิธีการปรับตั้ง
    administration_method:
      name: วิธีการให้ยาแก่สัตว์
      description: ระบุวิธีการให้ยาถ่ายพยาธิแก่ม้า (เช่น แบบกิน หรือแบบฉีด) เพื่อช่วยให้นักช้อปปฏิบัติตามคำแนะนำของสัตวแพทย์
        และเลือกวิธีการใช้งานที่เหมาะสมได้
    advice_card_prompt_type:
      name: ประเภทข้อความบนการ์ดคำแนะนำ
      description: ระบุประเภทข้อความที่พิมพ์อยู่บนการ์ด (หรือไม่มีข้อความ)
    aeration_method:
      name: วิธีการเติมอากาศ
      description: อธิบายประเภทการเติมอากาศที่ตู้ปลารองรับหรือมีมาให้ เพื่อให้มีออกซิเจนเพียงพอสำหรับเหยื่อมีชีวิต
    aero_package_components:
      name: ส่วนประกอบชุดอากาศพลศาสตร์
      description: ระบุส่วนประกอบสำคัญด้านอากาศพลศาสตร์ที่ติดตั้งในยานยนต์ (เลือกได้หลายรายการ)
    aerodynamic_elements_included:
      name: องค์ประกอบอากาศพลศาสตร์ที่มีให้
      description: ระบุชิ้นส่วนด้านอากาศพลศาสตร์ที่ติดตั้งอยู่ในรถแข่งฟอร์มูล่า (เลือกได้หลายรายการ
        หากรองรับ)
    aftertouch_support:
      name: รองรับ Aftertouch
      description: ระบุว่าคอนโทรลเลอร์รองรับฟังก์ชัน Aftertouch (เช่น Channel หรือ
        Polyphonic) บนคีย์/ปุ่มหรือไม่
    agave_content_classification:
      name: การจำแนกประเภทตามสัดส่วนอะกาเว
      description: ระบุว่าผลิตเหล้าเตกีลาจากอะกาเว Blue Weber 100% หรือเป็นแบบผสม
        ที่มีน้ำตาลจากอะกาเวอย่างน้อย 51%
    aida_cloth_count:
      name: จำนวนช่องตะเข็บของผ้า Aida
      description: ระบุจำนวนช่องตะเข็บของผ้า Aida (จำนวนช่อง/ฝีเข็มต่อนิ้ว) ซึ่งมีผลต่อขนาดฝีเข็มและสเกลงานปักลาย
    aida_cloth_pre_cut_format:
      name: รูปแบบผ้า Aida ที่จำหน่าย
      description: ระบุรูปแบบการจำหน่ายผ้า Aida ว่าเป็นแบบชิ้นตัดสำเร็จ ตัดจากม้วนต่อเนื่อง
        หรือแบบทั้งม้วน
    air_bag_material:
      name: วัสดุถุงลม
      description: ระบุวัสดุสำหรับทำถุงลม/ถังลมที่ใช้กับปี่ไอริช
    air_bed_internal_construction:
      name: โครงสร้างภายในของที่นอนลม
      description: อธิบายโครงสร้างรองรับภายในหรือเทคโนโลยีที่ใช้ภายในที่นอนลม ช่วยให้ใช้งานได้สบายและมั่นคง
    air_dry_clay_color_form:
      name: รูปแบบสีของดินปั้นแห้งเอง
      description: ระบุว่าดินปั้นที่ขายเป็นรูปแบบผสมสีล่วงหน้า สีขาว/สีพื้นสำหรับนำไประบายสี
        หรือเป็นแบบผสม/คละสี
    air_hockey_items_included:
      name: อุปกรณ์ที่รวมมาในชุดแอร์ฮอกกี้
      description: ระบุอุปกรณ์เสริมที่รวมอยู่ภายในชุดอย่างละเอียด เพื่อให้ลูกค้าทราบว่าจะได้รับอะไรบ้าง
        (เช่น ไม้ผลัก 2 อัน, ลูกฮอกกี้ 4 ลูก, แผ่นสักหลาด 2 แผ่น)
    air_intake_temperature_sensor_mounting_style:
      name: รูปแบบการติดตั้งเซ็นเซอร์วัดอุณหภูมิอากาศไอดี
      description: ลักษณะการติดตั้งทางกายภาพของเซ็นเซอร์วัดอุณหภูมิอากาศไอดี (IAT)
        ภายในระบบไอดีของเครื่องยนต์
    air_integration_capability:
      name: ความสามารถในการเชื่อมต่อระบบลม
      description: ระบุว่าคอมพิวเตอร์ดำน้ำรองรับการเชื่อมต่อกับตัวส่งสัญญาณแรงดันถังแบบไร้สายหรือไม่
        และรองรับในลักษณะใด
    air_mattress_valve_type:
      name: ประเภทวาล์วของที่นอนลม
      description: ระบุรูปแบบวาล์วที่อุปกรณ์เสริมรองรับหรือมีอยู่ เพื่อให้มั่นใจว่าสามารถใช้งานร่วมกับปั๊ม
        วาล์ว และชิ้นส่วนซ่อมแซมได้อย่างเข้ากันได้
    air_water_rocket_kit_items_included:
      name: อุปกรณ์ที่รวมอยู่ในชุดจรวดอากาศและน้ำ
      description: ส่วนประกอบสำคัญที่รวมอยู่ในชุดจรวด (เช่น แท่นยิง ปั๊ม ครีบ และชิ้นส่วนสำหรับเติมเชื้อเพลิง)
    air_water_rocket_launch_method:
      name: วิธีการยิงจรวดอากาศและน้ำ
      description: วิธีการอัดแรงดัน/ยิงจรวด (ลักษณะการใช้งานของผู้ใช้และรูปแบบอุปกรณ์ที่ใช้ยิง)
    airbag_position:
      name: ตำแหน่งถุงลมนิรภัย
      description: ระบุตำแหน่งหรือจุดป้องกันภายในรถที่ออกแบบชิ้นส่วนถุงลมนิรภัยมาให้รองรับ
    aircraft_ads_b_capability:
      name: ความสามารถด้าน ADS-B ของอากาศยาน
      description: ระบุว่าอากาศยานติดตั้งระบบที่รองรับมาตรฐาน ADS-B Out หรือไม่
    aircraft_airframe_material:
      name: วัสดุโครงสร้างลำตัวอากาศยาน
      description: วัสดุหลักที่ใช้ในการสร้างโครงสร้างลำตัวอากาศยาน
    aircraft_cabin_configuration:
      name: รูปแบบห้องโดยสารของเครื่องบิน
      description: ระบุการจัดวางห้องโดยสารของอากาศยาน (เช่น ห้องประชุม โซฟายาว หรือห้องโดยสารแบบ
        4 โซน)
    aircraft_documentation_included:
      name: เอกสารเกี่ยวกับอากาศยานที่มีให้
      description: ระบุเอกสารที่มีให้พร้อมกับชิ้นส่วน (เช่น 8130-3)
    aircraft_galley_configuration:
      name: รูปแบบห้องครัวบนเครื่องบิน
      description: การมีอยู่และประเภทของพื้นที่ครัว/อุปกรณ์จัดเตรียมอาหารภายในห้องโดยสาร
    aircraft_installation_location:
      name: ตำแหน่งที่ติดตั้งบนอากาศยาน
      description: ตำแหน่งบนอากาศยานที่ติดตั้งหรือใช้งานชิ้นส่วนหรืออุปกรณ์เสริม
    aircraft_internet_connection:
      name: การเชื่อมต่ออินเทอร์เน็ตบนอากาศยาน
      description: ระบุว่ามีการเชื่อมต่ออินเทอร์เน็ตภายในห้องโดยสารหรือไม่/ประเภทใดบ้าง
    aircraft_landing_gear_type:
      name: ประเภทล้อลงจอดของอากาศยาน
      description: ระบุการจัดวางล้อลงจอดของออโตไจโร (Autogyro)
    aircraft_lavatory_configuration:
      name: การจัดวางห้องน้ำในอากาศยาน
      description: ประเภทการจัดวางห้องน้ำในอากาศยาน
    aircraft_maintenance_program_enrollment:
      name: การเข้าร่วมโปรแกรมบำรุงรักษาอากาศยาน
      description: ระบุว่าอากาศยานเข้าร่วมโปรแกรมบำรุงรักษาเครื่องยนต์และ/หรือโครงสร้างอากาศยานหรือไม่
        และหากเข้าร่วม ระบุประเภทสิ่งที่ครอบคลุม (เครื่องยนต์ โครงสร้างอากาศยาน หรือทั้งสองอย่าง)
    aircraft_operational_certification:
      name: การรับรองปฏิบัติการของอากาศยาน
      description: ระบุหลักเกณฑ์การรับรองด้านกฎระเบียบหรือปฏิบัติการที่ใช้สำหรับอากาศยาน
        (ขึ้นอยู่กับเขตอำนาจศาล เช่น FAA Part 91/135/121 หรือ EASA AOC)
    aircraft_protective_gear_certification:
      name: การรับรองอุปกรณ์ป้องกันอากาศยาน
      description: ระบุมาตรฐานด้านการบิน/ข้อบังคับ หรืออุตสาหกรรมที่อุปกรณ์ป้องกันผ่านการรับรองว่าเป็นไปตามข้อกำหนด
    aircraft_system_application:
      name: การใช้งานในระบบอากาศยาน
      description: ระบุว่าชิ้นส่วน/อุปกรณ์เสริมอยู่ในระบบใดหรือส่วนใดของอากาศยาน (ใช้สำหรับการเรียกดูและกรองชิ้นส่วนอากาศยานที่หลากหลาย)
    airflow_resistance_level:
      name: ระดับความต้านทานการไหลของอากาศ
      description: ระบุระดับความต้านทานของมิวต์ขณะใช้งานในแง่ของแรงดันย้อนกลับ/ความต้านทานอากาศ
    airship_envelope_material:
      name: วัสดุโครงหุ้มเรือเหาะ
      description: วัสดุหลักของโครงหุ้มเรือเหาะ (พื้นผิว)
    airsoft_part_type:
      name: ประเภทชิ้นส่วนแอร์ซอฟต์
      description: ระบุประเภทชิ้นส่วนหรืออุปกรณ์เสริมตามหน้าที่การใช้งานสำหรับปืนแอร์ซอฟต์
        (เช่น แม็กกาซีน ลำกล้อง กระโจมมือ)
    airworthiness_approval_basis:
      name: หลักเกณฑ์การอนุมัติความสมควรเดินอากาศ
      description: ระบุหลักเกณฑ์การอนุมัติ/การรับรองสำหรับชิ้นส่วนในกรณีที่เกี่ยวข้อง
        (เช่น PMA, TSO, STC)
    alarm_volume_adjustability:
      name: การปรับระดับเสียงสัญญาณเตือน
      description: ระบุว่าผู้ใช้สามารถปรับระดับเสียงสัญญาณเตือนได้หรือไม่ และปรับอย่างไร
    alcohol_ink_finish_effect:
      name: เอฟเฟกต์พื้นผิวจากหมึกแอลกอฮอล์
      description: อธิบายเอฟเฟกต์/พื้นผิวลักษณะภายนอกที่เกิดจากสูตรหมึกแอลกอฮอล์ (นอกเหนือจากสี)
        เช่น แบบเมทัลลิกหรือมุกเงา
    alignment_aid_style:
      name: รูปแบบอุปกรณ์ช่วยจัดแนว
      description: อธิบายประเภทของเส้นหรือเครื่องหมายช่วยจัดแนวที่พิมพ์หรือฝังอยู่บนพื้นผิวแผ่นรอง
        (เช่น เส้นตรง เครื่องหมายระยะทาง)
    alternator_cooling_type:
      name: ประเภทการระบายความร้อนของไดชาร์จ
      description: อธิบายวิธีการระบายความร้อนและระบายอากาศของไดชาร์จ
    alternator_marine_ignition_protection_rating:
      name: ระดับการป้องกันการจุดระเบิดของไดชาร์จสำหรับการใช้งานทางทะเล
      description: ระบุว่าไดชาร์จมีการป้องกันการจุดระเบิดสำหรับห้องเครื่องยนต์ในเรือหรือไม่
        (เช่น เป็นไปตามมาตรฐาน SAE J1171 / ISO 8846)
    alternator_mounting_configuration:
      name: รูปแบบการติดตั้งไดชาร์จ
      description: ระบุรูปแบบการติดตั้งเชิงกายภาพที่ใช้ยึดไดชาร์จเข้ากับขายึดเครื่องยนต์
    alternator_pulley_type:
      name: ประเภทพูลเลย์ของไดชาร์จ
      description: ระบุลักษณะการออกแบบพูลเลย์/คลัตช์ของไดชาร์จ (หรือระบุว่าไม่มีพูลเลย์รวมอยู่)
    alternator_regulator_type:
      name: ประเภทตัวควบคุมแรงดันไฟฟ้าของไดชาร์จ
      description: ระบุว่าติดตั้งตัวควบคุมแรงดันไฟฟ้าไว้ภายในหรือภายนอกไดชาร์จ และเป็นแบบควบคุมโดย
        OEM (คอมพิวเตอร์/PCM) หรือไม่
    alternator_terminal_connection_type:
      name: ประเภทการเชื่อมต่อขั้วไดชาร์จ
      description: รูปแบบการเชื่อมต่อไฟฟ้าหลักของขั้วเอาต์พุต/ขั้วกระตุ้นของไดชาร์จ
        เพื่อช่วยให้มั่นใจว่าสามารถใช้งานร่วมกับชุดสายไฟได้อย่างเหมาะสม
    altitude_suitability:
      name: ความเหมาะสมในการใช้งานตามระดับความสูง
      description: ระบุว่าออกแบบลูกบอลให้เหมาะกับสภาวะระดับความสูงเฉพาะหรือไม่ ซึ่งส่งผลต่อความเร็วและการกระดอน
    ambulance_stretcher_mount_type:
      name: ประเภทการยึดเปลพยาบาลในรถพยาบาล
      description: ระบุประเภทระบบการโหลด/การยึดเปลพยาบาลที่รถพยาบาลรองรับ
    american_football_safety_certification:
      name: การรับรองด้านความปลอดภัยสำหรับอเมริกันฟุตบอล
      description: ระบุการรับรองด้านความปลอดภัยหรือมาตรฐานเฉพาะสำหรับอเมริกันฟุตบอลที่สินค้านี้เป็นไปตามข้อกำหนด
    amplifier_tube_function:
      name: ฟังก์ชันของหลอดแอมพลิฟายเออร์
      description: ระบุฟังก์ชันการทำงานของหลอดภายในวงจรแอมพลิฟายเออร์ของเครื่องดนตรี
        (เช่น ภาคพรีแอมป์ หรือภาคขยายกำลัง)
    analog_synthesizer_cv_gate_i_o:
      name: อินพุต/เอาต์พุต CV/Gate สำหรับซินธิไซเซอร์แบบอนาล็อก
      description: ระบุประเภทการเชื่อมต่อแรงดันไฟฟ้าควบคุมและสัญญาณเกตที่รองรับสำหรับการผสานกับอุปกรณ์โมดูลาร์/อนาล็อก
    analog_synthesizer_keybed_configuration:
      name: การจัดวางคีย์เบดของซินธิไซเซอร์แบบอนาล็อก
      description: อธิบายว่าซินธิไซเซอร์มีคีย์เบดในตัวหรือไม่ และหากมี ให้ระบุจำนวนคีย์
    anchor_configuration:
      name: รูปแบบการจัดวางจุดยึด
      description: ระบุว่าระบบช่วงล่างใช้จุดยึดกลางเพียงจุดเดียวหรือจุดยึดแยกอิสระหลายจุด
        ซึ่งส่งผลต่อรูปแบบการออกกำลังกายที่หลากหลายและความซับซ้อนในการติดตั้ง
    animal_raising_method:
      name: วิธีการเลี้ยงสัตว์
      description: อธิบายแนวทางการทำฟาร์มหรือการเลี้ยงสัตว์ที่ใช้สำหรับแหล่งที่มาของสัตว์
    animal_species:
      name: สัตว์ชนิดต่างๆ
      description: ระบุสัตว์หรือสิ่งมีชีวิตต่างๆ ที่นำเสนอโดยตุ๊กตาผ้า (เช่น หมี กระต่าย
        ไดโนเสาร์)
    animal_trap_jaw_style:
      name: รูปแบบก้ามหนีบของกับดักสัตว์
      description: รูปแบบการจัดวางก้ามหนีบของกับดัก ซึ่งส่งผลต่อแรงยึดจับและสวัสดิภาพของสัตว์
    animal_trap_type:
      name: ประเภทกับดักสัตว์
      description: จัดประเภทลักษณะ/การออกแบบเชิงกลของกับดัก เพื่อให้นักช้อปสามารถค้นหารูปแบบการจับสัตว์ที่ต้องการหรือเป็นไปตามข้อกำหนดได้อย่างรวดเร็ว
    ankle_collar_style:
      name: รูปแบบปลอกข้อเท้า
      description: อธิบายรูปแบบหรือโครงสร้างของส่วนปลอกข้อเท้าของรองเท้า เช่น ทรงต่ำ
        ทรงกลาง ทรงสูง แบบถุงเท้า หรือแบบไม่มีเชือก ซึ่งส่งผลต่อการรองรับ ความพอดี
        และความสวยงาม
    ankle_guard_protection_level:
      name: ระดับการป้องกันของสนับข้อเท้า
      description: ประเมินระดับการป้องกันแรงกระแทกโดยรวมที่สนับข้อเท้าให้การปกป้อง
    ankle_strap_padding_type:
      name: ประเภทวัสดุรองรับแรงกระแทกของสายรัดข้อเท้า
      description: อธิบายวัสดุหรือรูปแบบการรองรับแรงกระแทกภายในสายรัด ซึ่งส่งผลต่อความสบายในการสวมใส่
    ankle_strap_type:
      name: ประเภทของสายรัดข้อเท้า
      description: จำแนกประเภทโครงสร้างหรือการออกแบบของสายรัดข้อเท้าสำหรับผูกยึดสโนว์บอร์ด
    ant_farm_habitat_medium_type:
      name: ประเภทวัสดุเลี้ยงมดในฟาร์มมด
      description: ระบุวัสดุหลักสำหรับการขุดอุโมงค์/การสังเกตในฟาร์มมดที่ให้มาหรือจำเป็นต้องใช้
    ant_farm_kit_contents:
      name: รายการอุปกรณ์ในชุดฟาร์มมด
      description: ระบุส่วนประกอบที่รวมอยู่ในชุดฟาร์มมด (เช่น ภาชนะที่อยู่อาศัย ทราย/เจล
        บัตรแลกมด อุปกรณ์ให้อาหาร)
    ant_farm_lighting_type:
      name: ประเภทแสงสว่างในฟาร์มมด
      description: ระบุประเภทแสงสว่าง/ระบบไฟส่องสว่างในตัว (ถ้ามี) ที่ใช้สำหรับสังเกตการณ์
    antenna_fit_type:
      name: ประเภทการติดตั้งเสาอากาศ
      description: ระบุรูปแบบโครงสร้างที่ลูกบอลเสาอากาศถูกออกแบบให้ใช้งานร่วมด้วย
    anti_caking_agent:
      name: สารป้องกันการจับตัวเป็นก้อน
      description: ระบุประเภทของสารป้องกันการจับตัวเป็นก้อนที่เติมเข้าไปเพื่อป้องกันการเกาะตัว
        ซึ่งมีความสำคัญต่อการพิจารณาเรื่องสารก่อภูมิแพ้และความแม่นยำของสูตรอาหาร
    anti_g_suit_bladder_material:
      name: วัสดุของถุงลมในชุดป้องกันแรงจี
      description: วัสดุที่ใช้สำหรับถุงลมภายในชุดป้องกันแรงจี (Anti-G suit) หากมีหลายชนิดให้ระบุทั้งหมดที่เกี่ยวข้อง
    anti_g_suit_connector_type:
      name: ประเภทขั้วต่อของชุดป้องกันแรงจี
      description: ระบุรูปแบบ/มาตรฐานของขั้วต่อสายลม/แรงดันที่ใช้เชื่อมต่อกับอากาศยานหรือเรกูเลเตอร์
    anti_g_suit_inflation_method:
      name: วิธีการพองตัวของชุดป้องกันแรงจี
      description: ระบุวิธีการเพิ่มแรงดันให้ถุงลมของชุดเพื่อให้การป้องกันแรงจี
    anti_g_suit_size_system:
      name: ระบบกำหนดขนาดของชุดป้องกันแรงจี
      description: มาตรฐานการกำหนดขนาดที่ใช้ระบุระบบไซส์/ความพอดีของชุด
    anti_reverse_type:
      name: ประเภทระบบกันการหมุนย้อนกลับ
      description: ระบุประเภทกลไกกันการหมุนย้อนกลับ ซึ่งส่งผลต่อการเกี่ยวเบ็ดและการเกิดระยะย้อนของรอก
    anti_theft_feature:
      name: คุณสมบัติป้องกันการโจรกรรม
      description: ระบุว่าตัวยึด/ที่ยึดมีคุณสมบัติป้องกันการโจรกรรมหรือไม่ เช่น สกรูล็อกหรือการออกแบบที่ป้องกันการงัดแงะ
    antique_gun_ignition_system:
      name: ระบบจุดชนวนปืนโบราณ
      description: ระบุระบบการจุดชนวน/การยิงแบบดั้งเดิมที่ใช้ในอาวุธปืนโบราณ
    apple_variety:
      name: สายพันธุ์แอปเปิล
      description: ระบุสายพันธุ์หรือพันธุ์เพาะปลูกของแอปเปิล (เช่น Gala, Fuji, Granny
        Smith) เพื่อช่วยให้ลูกค้าเลือกตามรสชาติ เนื้อสัมผัส และการนำไปใช้ปรุงอาหาร
    applique_edge_finish:
      name: รูปแบบการตกแต่งขอบแอปพลิเค
      description: อธิบายวิธีการตกแต่งขอบ ซึ่งมีผลต่อรูปลักษณ์และความทนทานต่อการหลุดลุ่ยของขอบผ้า
    arbor_type:
      name: ประเภทแกนหมุน
      description: จัดประเภทรอกตามรูปแบบแกนหมุน ซึ่งส่งผลต่อความเร็วในการเก็บสาย ความจุสายสำรอง
        และการคงรูปของสาย
    archery_accessory_type:
      name: ประเภทอุปกรณ์เสริมการยิงธนู
      description: ระบุประเภทอุปกรณ์เสริมสำหรับอุปกรณ์ยิงธนู เพื่อให้นักช้อปสามารถกรองสินค้าได้อย่างรวดเร็ว
    archery_part_type:
      name: ประเภทชิ้นส่วนธนู
      description: ระบุฮาร์ดแวร์หรือชิ้นส่วนอะไหล่ที่จำหน่ายโดยเฉพาะ (เช่น ด้ามธนู
        ปีกธนู สายธนู) ช่วยให้สามารถกรองสินค้าได้อย่างแม่นยำโดยไม่ทำให้หมวดหมู่มีโครงสร้างซับซ้อนเกินไป
    archery_range_accessory_type:
      name: ประเภทอุปกรณ์สนามยิงธนู
      description: จัดประเภทอุปกรณ์เสริมเฉพาะที่ใช้ในสนามยิงธนู ช่วยให้นักช้อปสามารถกรองสินค้าที่ต้องการได้อย่างรวดเร็ว
    archery_target_features:
      name: คุณสมบัติของเป้าธนู
      description: ระบุคุณสมบัติด้านประสิทธิภาพหรือความสะดวกในการใช้งานเฉพาะทางที่ไม่ได้ครอบคลุมอยู่ในคุณลักษณะอื่นๆ
        (เช่น โฟมซ่อมแซมตัวเอง หรือมือจับสำหรับพกพา)
    archery_tool_type:
      name: ประเภทอุปกรณ์ยิงธนู
      description: จัดประเภทเครื่องมือหรืออุปกรณ์ยิงธนูแต่ละชนิดโดยเฉพาะ
    armband_features:
      name: คุณสมบัติของปลอกแขน
      description: ระบุคุณสมบัติพิเศษด้านการใช้งานหรือรูปลักษณ์ที่ช่วยเสริมความโดดเด่นให้กับปลอกแขน
    armguard_style:
      name: สไตล์ที่ป้องกันแขน
      description: ระบุสไตล์การออกแบบหรือโครงสร้างของที่ป้องกันแขน เพื่อให้เข้าใจขอบเขตการป้องกัน
        และรูปลักษณ์แบบดั้งเดิมเทียบกับสมัยใหม่ได้ชัดเจนยิ่งขึ้น
    armor_protection_type:
      name: ประเภทการป้องกันของเกราะ
      description: ประเภทการป้องกันที่ระบบเกราะของยานพาหนะให้การปกป้อง
    armrest_adjustability:
      name: สามารถในการปรับระดับที่วางแขน
      description: กำหนดความสามารถในการปรับระดับและรูปแบบที่วางแขนเก้าอี้ (เช่น แบบคงที่,
        ปรับได้ 2 มิติ, 3 มิติ หรือแบบพับขึ้น)
    armrest_type:
      name: ประเภทที่วางแขน
      description: อธิบายลักษณะและความสามารถในการปรับระดับที่วางแขนเก้าอี้ (เช่น ไม่มีที่วางแขน
        แบบคงที่ แบบปรับได้ หรือแบบถอดออกได้)
    arrow_bolt_point_type:
      name: ประเภทปลายลูกธนู/หน้าไม้
      description: กำหนดรูปแบบของปลายหรือหัวที่ติดตั้งบนลูกธนูหรือหน้าไม้
    arrow_component_type:
      name: ประเภทชิ้นส่วนลูกธนู
      description: จัดประเภทชิ้นส่วนหรืออุปกรณ์เสริมเฉพาะของลูกธนู (เช่น อินเสิร์ต
        แรป บุชชิ่ง กาว เป็นต้น) เพื่อให้ลูกค้าสามารถกรองสินค้าได้โดยไม่ต้องสร้างหมวดหมู่ย่อยจำนวนมาก
    arrow_containment_level:
      name: ระดับการยึดเก็บลูกธนู
      description: อธิบายว่าที่รองลูกธนูมีการครอบคลุมลูกธนูเต็มรูปแบบ บางส่วน หรือไม่มีการครอบคลุมเลย
    arrow_fletching_orientation:
      name: ทิศทางการจัดวางปีกลูกธนู
      description: ระบุทิศทางการวางปีกหรือการเยื้องศูนย์ของขนลูกธนู (เช่น ปีกซ้าย
        ปีกขวา หรือแบบเกลียว) ซึ่งกำหนดทิศทางการหมุนของลูกธนู
    arrow_nock_groove_size:
      name: ขนาดร่องน็อกลูกธนู
      description: ระบุการจัดประเภทขนาดของร่อง/คอสายธนูของน็อก (nock) ซึ่งกำหนดความเข้ากันได้กับขนาดเส้นผ่านศูนย์กลางของสายธนูที่แตกต่างกัน
    arrow_nock_type:
      name: ประเภทน็อกลูกธนู
      description: การออกแบบ/รูปแบบของน็อกลูกธนูที่ใช้สัมผัสและเชื่อมต่อกับสายธนู
    arrow_rest_style:
      name: รูปแบบที่รองลูกธนู
      description: ระบุรูปแบบการทำงาน/กลไกของที่รองลูกธนู (เช่น แบบดรอปอะเวย์ ใบมีด
        หรือวิสเกอร์บิสกิต) รูปแบบเป็นตัวกำหนดวิธีซึ่งที่รองลูกธนูรองรับ ยึด และปล่อยลูกธนู
        และเป็นปัจจัยหลักที่นักช้อปใช้ในการแยกความแตกต่างของสินค้า
    arrow_shaft_compatibility:
      name: ความเข้ากันได้ของก้านลูกธนู
      description: ระบุมาตรฐานของก้านลูกธนู/บุชชิ่งที่น็อกแบบมีไฟรองรับ (เช่น X, H,
        S, GT)
    art_crafting_tool_tip_style:
      name: รูปแบบปลายหัวเครื่องมือศิลปะ/งานประดิษฐ์
      description: อธิบายรูปทรง/ลักษณะของปลายหัวเครื่องมือ (เช่น ปลายแหลม หรือปลายกลม)
        เพื่อระบุชนิดของรอยนูนหรือรอยประทับที่เกิดขึ้น
    art_ink_lightfastness_rating:
      name: ระดับความคงทนต่อแสงของหมึกศิลปะ
      description: ระบุความทนทานของหมึกต่อการซีดจางเมื่อสัมผัสแสง โดยมักแสดงในรูปแบบระดับมาตรฐาน
    art_ink_opacity:
      name: ความทึบแสงของหมึกศิลปะ
      description: ระบุระดับการปกปิดของหมึกหลังจากการใช้งาน
    art_security_rating:
      name: ระดับการรักษาความปลอดภัย ART
      description: ระบุระดับดาวมาตรฐาน ART ของเนเธอร์แลนด์ (1-5 ดาว) ที่กุญแจล็อกได้รับ
    artichoke_cut:
      name: รูปแบบการตัดอาร์ติโชก
      description: ระบุส่วนหรือรูปแบบการเตรียมอาร์ติโชกที่จำหน่าย (เช่น ทั้งหัว ใจกลาง
        หรือฐาน) เพื่อให้ลูกค้าเข้าใจปริมาณที่ได้และวัตถุประสงค์การนำไปใช้ปรุงอาหาร
    artichoke_variety:
      name: สายพันธุ์อาร์ติโชก
      description: ระบุสายพันธุ์หรือพันธุ์พฤกษศาสตร์ของอาร์ติโชก เพื่อช่วยให้นักช้อปแยกความแตกต่างด้านขนาด
        สี รสชาติ และประโยชน์ในการปรุงอาหาร
    articulation_features:
      name: คุณสมบัติการขยับข้อต่อ
      description: ระบุว่าโมเดลไดโนเสาร์มีชิ้นส่วนที่ขยับได้หรือไม่ (เช่น ขากรรไกร
        แขนขา หรือหาง) รวมถึงความสามารถในการจัดท่าทางโดยรวม
    artificial_bait_form:
      name: รูปแบบเหยื่อปลอม
      description: ระบุรูปแบบทางกายภาพหรือสไตล์การนำเสนอของเหยื่อหรือเหยื่อล่อสำหรับการตกปลา
    asa_mounting_type:
      name: ประเภทการติดตั้ง ASA
      description: ระบุรูปแบบของอินเทอร์เฟซ Air Source Adapter (ASA) หรือมาตรฐานการติดตั้งที่ดรอปฟอร์เวิร์ดใช้
        (เช่น แบบหางนก ราง หรือติดตั้งโดยตรง)
    ascender_descender_type:
      name: ประเภทอุปกรณ์ไต่เชือกขึ้น/ลง
      description: จัดประเภทอุปกรณ์ไต่เชือกชนิดปีนขึ้นหรือปีนลง เพื่อการกรองสินค้าอย่างแม่นยำมากขึ้น
    aspiration_type:
      name: ประเภทระบบอัดอากาศ
      description: ระบุรูปแบบการอัดอากาศ/เพิ่มแรงดันอากาศของเครื่องยนต์
    assembly_state:
      name: สถานะการประกอบ
      description: ระบุว่าจัดส่งตู้ในรูปแบบพร้อมสำหรับประกอบเอง ประกอบสำเร็จแล้ว หรือในรูปแบบอื่น
    assistance_mechanism:
      name: กลไกช่วยผ่อนแรง
      description: ระบุระบบช่วยผ่อนแรงหรือต้านแรงที่ติดตั้งมาในตัวที่เครื่องพาวเวอร์ทาวเวอร์มีให้
        ซึ่งใช้สำหรับการฝึกดึงข้อ ดิป หรือการออกกำลังกายอื่นๆ
    atemoya_cultivar:
      name: สายพันธุ์อะเตโมย่า
      description: ระบุชื่อพันธุ์/สายพันธุ์ของผลอะเตโมย่า เพื่อให้นักช้อปสามารถเลือกผลไม้ตามรูปแบบที่ต้องการ
        เช่น รสชาติ ขนาด หรือลักษณะเมล็ด
    athletic_cup_size:
      name: ขนาดของกระจับนักกีฬา
      description: ระบุขนาดกระจับนักกีฬาตามที่ผู้ผลิตกำหนด เพื่อให้เหมาะสมกับสรีระและการสวมใส่ของนักกีฬา
    attachment_position:
      name: ตำแหน่งการติดตั้ง
      description: ระบุตำแหน่งที่กระเป๋าถูกออกแบบมาให้ติดตั้งกับอานม้าหรือตัวผู้ขี่
    attractant_scent_profile:
      name: ลักษณะกลิ่นดึงดูดใจ
      description: อธิบายกลิ่นหรือรสชาติเฉพาะที่ใช้เพื่อดึงดูดสัตว์ป่า หรือช่วยกลบกลิ่นของมนุษย์
    atv_utv_intended_use:
      name: วัตถุประสงค์การใช้งาน ATV/UTV
      description: วัตถุประสงค์หลัก/รูปแบบการใช้งาน ATV/UTV
    audio_channel_configuration:
      name: รูปแบบช่องสัญญาณเสียง
      description: จำนวนช่องสัญญาณเสียงแบบแยกอิสระที่อีควอไลเซอร์/DSP รองรับ (เช่น
        สเตอริโอ 2 แชนเนล, หน้า/หลัง 4 แชนเนล หรือ 6 แชนเนล)
    audio_inputs:
      name: อินพุตเสียง
      description: ระบุประเภทช่องเชื่อมต่อสัญญาณเสียงขาเข้า (audio input) ที่รองรับสำหรับการสุ่มตัวอย่าง/บันทึกเสียง
        (เช่น 1/4 อินไลน์, XLR, 3.5 มม., ไมค์พรีแอมป์, โฟโน)
    audio_output:
      name: เอาต์พุตเสียง
      description: ระบุว่าของเล่นนั้นมีเสียงหรือไม่ และส่งเสียงออกมาอย่างไร
    audio_outputs:
      name: เอาต์พุตเสียง
      description: ระบุช่องเชื่อมต่อสัญญาณเสียงขาออก (audio output) ที่มีให้ รวมถึงเอาต์พุตหลัก
        และเอาต์พุตเสริม/เอาต์พุตที่สามารถกำหนดค่าได้
    audio_playback_source:
      name: แหล่งที่มาของการเล่นเสียง
      description: แหล่งสื่อหลักที่ชุดคาราโอเกะสามารถเล่นเพลงได้
    autograph_authentication:
      name: การตรวจสอบลายเซ็น
      description: ระบุสถานะ/ประเภทการตรวจสอบความถูกต้องของลายเซ็นบนบัตร
    autograph_format:
      name: รูปแบบลายเซ็น
      description: อธิบายว่าลายเซ็นเป็นลายเซ็นจริงที่ลงนามด้วยมือ ลายเซ็นจำลองแบบประทับ/พิมพ์
        หรือข้อความจารึก/ส่วนเพิ่มเติม
    autogyro_cockpit_enclosure:
      name: รูปแบบห้องนักบินของออโตไจโร
      description: ระบุว่าห้องนักบินเป็นแบบเปิดหรือแบบปิดล้อม
    available_firing_modes:
      name: โหมดการยิงที่รองรับ
      description: ระบุโหมดการยิงที่เลือกใช้งานได้ ซึ่งมีมาร์กเกอร์มาให้จากโรงงานโดยไม่ต้องดัดแปลงเพิ่มเติม
    avocado_variety:
      name: สายพันธุ์อะโวคาโด
      description: ระบุชื่อสายพันธุ์หรือพันธุ์อะโวคาโด เพื่อช่วยให้นักช้อปแยกความแตกต่างด้านรสชาติ
        เนื้อสัมผัส ขนาด และปริมาณน้ำมันได้
    award_customization_included:
      name: มีการปรับแต่งรางวัลรวมอยู่
      description: ระบุว่าการปรับแต่งเฉพาะบุคคล/การปรับแต่งรูปแบบใดบ้างที่รวมอยู่ในรางวัลที่ซื้อ
    award_material:
      name: วัสดุของรางวัล
      description: ระบุวัสดุหลักของรางวัล (เช่น ถ้วยรางวัล โล่รางวัล เหรียญรางวัล
        เข็มกลัด หรือชุดสายริบบิ้น)
    award_mounting_display_type:
      name: ประเภทการติดตั้ง/จัดแสดงรางวัล
      description: ระบุวิธีการจัดแสดงหรือติดตั้งรางวัล (เช่น แบบติดผนัง ตั้งโต๊ะ หรือสวมใส่ได้)
    award_plaque_plate_material:
      name: วัสดุโล่รางวัล
      description: ระบุวัสดุทำแผ่นป้ายชื่อ/แผ่นสลักข้อความที่ติดอยู่กับแผ่นโลหะ (แตกต่างจากวัสดุแผ่นรองหรือฐานด้านหลัง)
    award_ribbon_attachment_type:
      name: ประเภทการติดริบบิ้นรางวัล
      description: ระบุวิธีการติดหรือสวมริบบิ้นที่ถูกต้อง
    award_ribbon_imprint_method:
      name: วิธีการพิมพ์ลายบนริบบิ้นรางวัล
      description: ระบุวิธีการนำข้อความ/กราฟิกไปพิมพ์ลงบนริบบิ้น
    award_ribbon_material:
      name: วัสดุริบบิ้นรางวัล
      description: วัสดุหลักของผ้าที่ใช้ทำริบบิ้น (เช่น ผ้าซาติน ผ้าโพลีเอสเตอร์)
    award_ribbon_placement_title:
      name: ตำแหน่ง/ข้อความบนริบบิ้นรางวัล
      description: ระบุตำแหน่งมาตรฐานหรือข้อความที่ปรากฏบนริบบิ้น (เช่น อันดับ 1 หรือผู้เข้าร่วม)
    axle_compatibility:
      name: ความเข้ากันได้ของเพลา
      description: ระบุมาตรฐานของเพลาที่ล้อรองรับ เพื่อให้มั่นใจว่าสามารถใช้งานร่วมกับเฟรมและตะเกียบจักรยานได้อย่างเหมาะสม
    back_beam_type:
      name: ประเภทคานหลัง
      description: ระบุประเภท/ความสามารถในการปรับคานหลัง (เช่น ธรรมดา หรือปรับความสูงได้)
    back_design:
      name: ดีไซน์ด้านหลัง
      description: ระบุโครงสร้างหรือดีไซน์บริเวณด้านหลังที่โดดเด่นของเสื้อผ้า ซึ่งมีผลต่อสไตล์และการรองรับ/สวมใส่กระชับ
    back_panel_type:
      name: ประเภทแผงด้านหลัง
      description: ระบุรูปแบบหรือวัสดแผงด้านหลังของตู้ ซึ่งส่งผลต่อการมองเห็นสิ่งของภายในและความเข้ากันได้กับสไลต์การตกแต่ง
    back_sides_material:
      name: วัสดุด้านหลังและด้านข้าง
      description: ระบุวัสดุที่ใช้สำหรับด้านหลังและด้านข้างของกีตาร์คลาสสิก
    backing_type:
      name: ประเภทการยึดติด
      description: อธิบายลักษณะของแผ่นรอง/วิธีการติดตั้งชิ้นงานพลอยเทียมที่จำหน่าย
        (โดยใช้สำหรับสินค้าที่เป็นแบบมีกาวในตัว)
    backup_camera_mounting_location:
      name: ตำแหน่งติดตั้งกล้องมองหลัง
      description: ระบุตำแหน่งติดตั้งที่ออกแบบไว้สำหรับกล้องมองหลังในยานยนต์
    backup_camera_video_interface:
      name: อินเทอร์เฟซวิดีโอของกล้องมองหลัง
      description: ระบุเอาต์พุตวิดีโอ/อินเทอร์เฟซ/ขั้วต่อที่กล้องมองหลังใช้สำหรับเชื่อมต่อกับจอภาพ,
        DVR หรือชุดควบคุมหลัก (เช่น Composite RCA, LVDS OEM, IP over Ethernet)
    badminton_set_components_included:
      name: อุปกรณ์ที่รวมมาในชุดแบดมินตัน
      description: ระบุรายการอุปกรณ์แต่ละชิ้นที่รวมมาในชุดแบดมินตัน
    bag_attachment_method:
      name: วิธีการยึดติดชิ้นส่วนในงานทำกระเป๋า
      description: ระบุวิธีการหลักที่ใช้ในการยึดถุงน้ำ/ที่ใส่ถุงน้ำเข้ากับอุปกรณ์อื่นๆ
        (เช่น สายรัด MOLLE, ห่วงเข็มขัด, คาราบิเนอร์)
    bag_case_carrying_style:
      name: รูปแบบการพกพากระเป๋า/เคส
      description: ระบุรูปแบบการพกพาหลักโดยรวมของเคส/กระเป๋าใส่เครื่องดนตรี (่ออกแบบโครงสร้างมาให้ถือหรือสะพายอย่างไร)
    bag_cover_material:
      name: วัสดุหุ้มกระเป๋า
      description: ระบุวัสดุฝาครอบกระเป๋า (ฝาครอบด้านนอก) ซึ่งมีผลต่อความทนทาน การยึดจับ
        และรูปลักษณ์ภายนอก
    bag_embellishment:
      name: การตกแต่งกระเป๋า
      description: อธิบายองค์ประกอบตกแต่งที่โดดเด่นบนพื้นผิวด้านนอกของกระเป๋า เช่น
        พู่ หมุด หรือการเย็บแบบควิลท์
    bag_fill_medium:
      name: วัสดุยัดภายในกระเป๋า
      description: ระบุสารหรือวัสดุที่ใช้ในการบรรจุหรือทำให้กระเป๋ามีแรงดัน (เช่น
        อากาศ น้ำ หรือทราย)
    bag_material:
      name: วัสดุของกระเป๋า
      description: วัสดุของถุงลมนิรภัย/ถุงบรรจุลม
    bag_padding_level:
      name: ระดับการรองรับแรงกระแทกของกระเป๋า
      description: ระบุระดับหรือรูปแบบของวัสดุบุนวมที่ใช้ภายในกระเป๋าหรือฝาครอบ
    bag_size_descriptor:
      name: ตัวบ่งชี้ขนาดกระเป๋า
      description: ระดับขนาดเชิงการตลาดของกระเป๋าทรงบัคเก็ต (เช่น มินิ ใหญ่) ซึ่งใช้เพื่อเสริมข้อมูลจากขนาดจริงโดยละเอียด
    bagel_size:
      name: ขนาดเบเกิล
      description: ระบุขนาดโดยทั่วไปของเบเกิล เช่น มินิ บาง มาตรฐาน ใหญ่ ใหญ่พิเศษ
        หรือจัมโบ้
    bagpipe_accessories_included:
      name: อุปกรณ์เสริมสำหรับปี่สกอตที่รวมอยู่ด้วย
      description: แสดงรายการส่วนประกอบ/อุปกรณ์เสริมหลักที่มาพร้อมกับปี่สก็อต (นอกเหนือจากปี่หลัก)
        เช่น เคส ปี่ซ้อม ผ้าคลุม สายรัด หรือระบบควบคุมความชื้น
    bagpipes_playing_mode:
      name: โหมดการเล่นปี่สก็อต
      description: ระบุวิธีการจ่ายลมให้กับเครื่องดนตรีระหว่างการเล่น
    bait_compatibility:
      name: ความเข้ากันได้ของเหยื่อ
      description: ระบุประเภทเหยื่อที่อุปกรณ์เสริมเม็ดเหยื่อถูกออกแบบมาให้ใช้งานร่วมกันได้
        เพื่อช่วยให้นักตกปลาเลือกอุปกรณ์ให้ตรงกับชนิดเหยื่อที่ต้องการใช้
    bait_species:
      name: ชนิดของเหยื่อตกปลา
      description: ระบุสิ่งมีชีวิตหลักที่ใช้เป็นเหยื่อ เพื่อช่วยให้นักตกปลาเลือกเหยื่อให้เหมาะสมกับชนิดปลาที่ต้องการจับ
        และถูกต้องตามกฎหมายที่เกี่ยวข้อง
    baking_chip_form:
      name: รูปแบบช็อกโกแลตชิปสำหรับการอบ
      description: อธิบายขนาดหรือรูปทรงทางกายภาพของช็อกโกแลตชิปสำหรับการอบ ซึ่งมีผลต่อพฤติกรรมการละลายและลักษณะของขนมในสูตรอาหาร
    balance_board_style:
      name: รูปแบบของบอร์ดทรงตัว
      description: จัดประเภทบอร์ดทรงตัวตามกลไกหรือโครงสร้าง เพื่อระบุลักษณะการเคลื่อนไหวของบอร์ดและระดับความท้าทายในการฝึกที่แตกต่างกัน
    balance_cushion_accessories_included:
      name: อุปกรณ์เสริมที่รวมมากับเบาะทรงตัว
      description: ระบุรายการอุปกรณ์เสริมที่บรรจุมาพร้อมกับเบาะ เพื่อช่วยให้นักช้อปสามารถเปรียบเทียบความคุ้มค่าของชุดสินค้าได้
    balance_type:
      name: ประเภทการทรงตัว
      description: ระบุสถานะ/ระดับการถ่วงสมดุลของเพลาขับตามที่จำหน่าย (เช่น ถ่วงสมดุลจากโรงงาน
        ถ่วงสมดุลสำหรับรอบสูง หรือไม่ได้ถ่วงสมดุล)
    ball_bladder_material:
      name: วัสดุยางในลูกบอล
      description: ระบุวัสดุที่ใช้ทำยางในสำหรับลูกแฮนด์บอล ซึ่งมีผลต่อการเก็บลม การเด้ง
        และความทนทานโดยรวม
    ball_certification:
      name: การรับรองลูกบอล
      description: ระบุการรับรองหรือการอนุมัติด้านประสิทธิภาพที่ลูกบอลได้รับอย่างเป็นทางการ
    ball_construction:
      name: โครงสร้างลูกบอล
      description: ระบุวิธีการผลิตที่ใช้ในการประกอบแผ่นชิ้นส่วนของลูกบอล ซึ่งมีผลต่อความทนทาน
        การสัมผัส การดูดซึมน้ำ และราคา
    ball_core_construction:
      name: โครงสร้างแกนกลางลูกบอล
      description: ระบุโครงสร้างภายในของลูกบอล ซึ่งมีผลต่อการเด้งและสัมผัสในขณะเล่น
    ball_core_type:
      name: ประเภทแกนกลางลูกบอล
      description: ระบุโครงสร้างภายในของลูกบอล ซึ่งมีผลต่อการเด้งและการกระจายน้ำหนัก
    ball_cup_game_included_pieces:
      name: สิ่งที่มีในเกมลูกบอลและถ้วย
      description: ระบุว่ามีส่วนประกอบใดบ้างที่รวมอยู่ในชุดสินค้าเกมลูกบอลและถ้วย
    ball_drilling_state:
      name: สถานะการเจาะลูกบอล
      description: ระบุว่าลูกบอลมีการเจาะรูสำหรับสอดนิ้วหรือไม่ และหากมี เจาะไว้ลึกเพียงใด
    ball_holder_type:
      name: ประเภทที่วางลูกบอล
      description: ระบุรูปแบบโครงสร้างหรือลักษณะการออกแบบที่วางลูกบอล
    ball_pit_ball_surface_finish:
      name: พื้นผิวของลูกบอลในบ่อบอล
      description: อธิบายลักษณะพื้นผิวสัมผัส/การมองเห็นของลูกบอล ซึ่งส่งผลต่อการจับ
        ความรู้สึกในการเล่น และการทำความสะอาด
    ball_pit_safety_features:
      name: คุณสมบัติเพื่อความปลอดภัยของบ่อบอล
      description: คุณสมบัติการออกแบบที่เกี่ยวข้องกับความปลอดภัยสำหรับบ่อบอล
    ball_pump_accessory_type:
      name: ประเภทอุปกรณ์เสริมที่สูบลมลูกบอล
      description: กำหนดประเภทเฉพาะของอุปกรณ์เสริมที่สูบลมลูกบอล เพื่อให้ผู้ขายสามารถระบุเกจวัดแรงดัน
        สายลมยาง สารหล่อลื่น และชิ้นส่วนเสริมอื่นๆ ภายใต้หมวดหมู่หลักเดียวกันได้
    ball_return_mechanism:
      name: กลไกการส่งลูกบอลกลับ
      description: ระบุรูปแบบของระบบส่งลูกบอลกลับที่รวมอยู่ในแผ่นรอง หากมี
    ball_return_type:
      name: ประเภทการส่งลูกบอลกลับ
      description: ประเภทของช่องเก็บ/ระบบส่งกลับที่ใช้รวบรวมลูกบอลระหว่างการเล่น
    ball_speed_rating:
      name: ระดับความเร็วของลูกบอล
      description: หมวดหมู่ความเร็วที่ผู้ผลิตกำหนด เพื่อระบุว่าลูกบอลมีความเร็วในการเล่นมากน้อยเพียงใดภายใต้สภาวะมาตรฐาน
    ball_surface_texture:
      name: ลวดลายพื้นผิวลูกบอล
      description: อธิบายพื้นผิวภายนอกหรือลวดลายของลูกบอล ซึ่งส่งผลต่อการจับและความสวยงาม
    ball_surface_type:
      name: ประเภทพื้นผิวลูกบอล
      description: อธิบายพื้นผิวภายนอกหรือวัสดุรองรับแรงกระแทกของลูกบอล เพื่อบ่งบอกถึงความรู้สึกขณะกระทบและการจับ
    ballonet_configuration:
      name: รูปแบบของระบบบอลโลเน็ต
      description: ประเภท/รูปแบบการจัดวางของระบบบัลโลเนต์ที่ใช้สำหรับการปรับสมดุลและควบคุมแรงดันอากาศ
        (สำหรับเรือเหาะชนิดไม่แข็งตัว/กึ่งแข็งตัว)
    balloon_closure_valve_type:
      name: ประเภทการปิดผนึก/วาล์วของบอลลูน
      description: ระบุวิธีการปิดผนึกบอลลูนหลังการเติมลม (เช่น การผูก หรือวาล์วปิดผนึกอัตโนมัติ)
    balloon_kit_finish:
      name: พื้นผิวของชุดบอลลูน
      description: อธิบายพื้นผิว/ลักษณะการตกแต่งภายนอกของบอลลูนที่รวมอยู่ในชุด
    balloon_kit_material:
      name: วัสดุชุดบอลลูน
      description: ระบุวัสดุหลักของบอลลูนที่รวมอยู่ในชุด
    banana_variety:
      name: กล้วยสายพันธุ์ต่างๆ
      description: ระบุสายพันธุ์หรือประเภทของกล้วยที่จำหน่าย
    banjo_head_type:
      name: ประเภทหัวแบนโจ
      description: ประเภท/วัสดุของหัวแบนโจ ซึ่งมีผลต่อเสียงที่ใส ความดัง และสัมผัสในการเล่น
    banjo_neck_material:
      name: วัสดุที่ใช้ทำคอแบนโจ
      description: วัสดุที่ใช้ทำคอเครื่องดนตรี ซึ่งส่งผลต่อสัมผัส ความมั่นคง และโทนเสียง
    banjo_pickup_configuration:
      name: รูปแบบการติดตั้งปิ๊กอัพแบนโจ
      description: ระบุว่าแบนโจมีปิ๊กอัพในตัวหรือไม่ และโดยทั่วไปใช้เทคโนโลยีปิ๊กอัพประเภทใด
    banjo_rim_material:
      name: วัสดุขอบของแบนโจ
      description: วัสดุขอบ/กล่องเสียงแบนโจ (ส่วนที่เป็นทรงกลม) ซึ่งมีผลอย่างมากต่อโทนเสียงและน้ำหนัก
    banjo_tone_ring_type:
      name: ประเภทโทนริงของแบนโจ
      description: ระบุลักษณะการออกแบบ/กลุ่มวัสดุโทนริงของแบนโจ ซึ่งมีผลต่อโทนเสียงและความดัง
    banjo_tuning_machine_type:
      name: ประเภทของลูกบิดตั้งสายแบนโจ
      description: ประเภทของลูกบิดที่ใช้ตั้งสายแบนโจ
    banknote_authentication_grading:
      name: การตรวจสอบความแท้/ประเมินเกรดธนบัตร
      description: บริการจากภายนอก (ถ้ามี) ที่ใช้ตรวจสอบความแท้/ประเมินเกรดธนบัตร
    banknote_grade:
      name: เกรดธนบัตร
      description: เกรดมาตรฐานของธนบัตรตามระบบการประเมินสำหรับนักสะสมธนบัตร
    banknote_holder_type:
      name: ประเภทซอง/ที่เก็บธนบัตร
      description: ระบุสภาพที่เก็บธนบัตรทางกายภาพ (เช่น แบบแยกเดี่ยว หรืออยู่ในซองที่ประเมินเกรดแล้ว)
    banknote_material:
      name: วัสดุธนบัตร
      description: วัสดุหลัก/เนื้อวัสดุที่ใช้ผลิตธนบัตร
    banknote_security_features:
      name: คุณสมบัติการรักษาความปลอดภัยของธนบัตร
      description: คุณลักษณะด้านความปลอดภัย/การออกแบบที่โดดเด่นที่มีอยู่บนธนบัตร
    banknote_serial_number_type:
      name: ประเภทหมายเลขซีเรียลธนบัตร
      description: ระบุว่าธนบัตรมีหมายเลขซีเรียลหรือไม่ และ/หรือมีลักษณะพิเศษที่น่าสะสมหรือไม่
        (ไม่ใช่หมายเลขจริง)
    banner_display_location:
      name: ตำแหน่งการแสดงแบนเนอร์
      description: ระบุสภาพแวดล้อมสำหรับตำแหน่งที่แสดงแบนเนอร์ (เช่น ทางเข้า ผนัง
        หรือฉากหลังโต๊ะ)
    banner_hanging_hardware_type:
      name: ประเภทอุปกรณ์แขวนแบนเนอร์
      description: ระบุอุปกรณ์หลักสำหรับแขวน/ติดตั้งที่มีมาให้หรือรวมอยู่กับแบนเนอร์
        (เช่น ตาไก่ ปลอกสอดเสา หรือเชือก)
    banner_message_type:
      name: ประเภทข้อความแบนเนอร์
      description: ระบุว่าข้อความบนแบนเนอร์เป็นแบบพิมพ์สำเร็จ (กำหนดตายตัว) หรือเป็นแบบว่างที่สามารถปรับแต่งได้
    banner_shape:
      name: รูปทรงแบนเนอร์
      description: ระบุรูปทรงหรือรูปแบบการตัดโดยรวมของแบนเนอร์เชียร์กีฬา
    banquette_configuration:
      name: รูปแบบการจัดวางม้านั่งยาว
      description: รูปแบบหรือทิศทางการจัดวางโดยรวมของม้านั่งยาว
    bar_coating:
      name: สารเคลือบแท่งขนม
      description: ระบุสารเคลือบภายนอกที่รับประทานได้ซึ่งใช้เคลือบแท่งขนม (ถ้ามี)
    bar_pad_style:
      name: รูปแบบแผ่นรองแท่งขนม
      description: ลักษณะการออกแบบแผ่นรองแท่งขนมและบรรจุภัณฑ์
    bar_texture:
      name: เนื้อสัมผัสแท่งขนม
      description: อธิบายเนื้อสัมผัสโดยรวมหรือความรู้สึกขณะกัดแท่งขนม
    barb_type:
      name: ประเภทเงี่ยง
      description: ระบุว่าตะขอมีเงี่ยงหรือไม่ และมีรูปแบบอย่างไร
    barbell_finish:
      name: การเคลือบผิวบาร์เบล
      description: ระบุการเคลือบหรือตกแต่งพื้นผิวบาร์เบลเพื่อปกป้องหรือความสวยงาม
        และ/หรือปลอกบาร์เบล ซึ่งมีผลต่อความทนทานการกัดกร่อน ความรู้สึกในการจับ และระดับราคา
    barbell_knurling_pattern:
      name: ลวดลายบนพื้นผิวบาร์เบล
      description: ระบุรูปแบบและระดับความหยาบของลายเซาะร่องบริเวณด้ามจับบาร์เบล รวมถึงสัญลักษณ์มาตรฐานสำหรับการยกน้ำหนักแบบพาวเวอร์ลิฟติ้งหรือเวทลิฟติ้ง
    barista_suitability:
      name: ความเหมาะสมสำหรับบาริสต้า
      description: ระบุว่าสินค้านี้ถูกออกแบบมาเพื่อใช้ในการชงกาแฟและการตีฟองนมหรือไม่
    barre_rail_configuration:
      name: การจัดวางราวบาร์
      description: ระบุจำนวนราวบาร์แนวนอนที่มาพร้อมกับราวฝึกบัลเลต์
    barrel_or_cask_type:
      name: ประเภทถังบ่มหรือถังไม้
      description: ระบุประเภทถังบ่มหรือถังไม้ที่ใช้ในการบ่มหรือปรุงแต่งเหล้าเตกีลา
        (เช่น โอ๊กอเมริกัน, ถังเบอร์เบินเก่า, ถังเชอร์รี)
    barrel_profile:
      name: รูปแบบแกนกลางลูกดอกปาเป้า
      description: อธิบายรูปทรงโดยรวมหรือสมดุลสำหรับแกนกลางลูกดอกปาเป้า
    barrel_thread_standard:
      name: มาตรฐานเกลียวของลำกล้อง
      description: ระบุชนิดเกลียวลำกล้องที่ใช้กับปืนมาร์กเกอร์ เพื่อให้สามารถใช้งานร่วมกับลำกล้องสำรองที่มีจำหน่ายทั่วไปได้
    base_anchoring_method:
      name: วิธีการยึดฐานกับพื้น
      description: ระบุวิธีการยึดฐานกับพื้น ซึ่งแสดงถึงความเหมาะสมกับพื้นผิวและสภาพการใช้งานที่แตกต่างกัน
    base_ballast_method:
      name: วิธีการถ่วงน้ำหนักให้ฐาน
      description: ระบุวิธีการถ่วงน้ำหนักให้ฐานเทรนเนอร์ (หรือไม่ถ่วง) เพื่อความมั่นคง
        (เช่น การเติมน้ำหรือทราย)
    base_configuration:
      name: โครงสร้างฐาน
      description: ระบุโครงสร้างหรือรูปแบบการจัดวางฐานแผง
    base_fill_material:
      name: วัสดุที่ใช้ถ่วงน้ำหนักภายในฐาน
      description: ระบุวัสดุที่ใช้ถ่วงน้ำหนักภายในฐานหุ่นฝึกบาสเกตบอล ซึ่งมีผลต่อความมั่นคงและความยากในการติดตั้ง
    base_ingredient:
      name: วัตถุดิบพื้นฐาน
      description: ระบุวัตถุดิบหลักทางการเกษตรที่ใช้ในการกลั่นเหล้าโชจูหรือโซจู
    base_oil_type:
      name: ประเภทน้ำมันพื้นฐาน
      description: ระบุสูตรน้ำมันพื้นฐานในน้ำมันเกียร์ (เช่น สังเคราะห์แท้ กึ่งสังเคราะห์
        หรือแบบดั้งเดิม)
    base_storage_type:
      name: ประเภทช่องเก็บของใต้ฐานรองที่นอน
      description: ระบุว่าฐานมีพื้นที่จัดเก็บในตัวหรือไม่ และใช้กลไกการจัดเก็บแบบใด
    baseball_glove_type:
      name: ประเภทถุงมือเบสบอล
      description: จัดหมวดหมู่ถุงมือหรือนวมตามตำแหน่งผู้เล่นหรือวัตถุประสงค์การใช้งาน
    baseball_softball_league_certification:
      name: การรับรองลีกเบสบอลและซอฟต์บอล
      description: ระบุหน่วยงานกำกับดูแลหรือมาตรฐานของลีกที่สินค้าผ่านการรับรอง
    baseball_softball_usage_role:
      name: บทบาทการใช้งานในกีฬาเบสบอล/ซอฟต์บอล
      description: ระบุบทบาทในสนามหรือประเภทผู้ใช้งานที่สวมใส่สนับเข่า/สนับขา (เช่น
        แคตเชอร์ ผู้ตี ผู้ตัดสิน หรือผู้เล่นตำแหน่งฟิลเดอร์)
    baseball_toy_set_components_included:
      name: ส่วนประกอบของชุดของเล่นเบสบอลที่รวมอยู่ในชุด
      description: ระบุว่ามีอุปกรณ์การเล่นเบสบอลชนิดใดบ้างที่รวมอยู่ในชุดสินค้า (เช่น
        ไม้เบสบอล ลูกบอล แท่นวางลูก ฐานเบสบอล)
    baseplate_construction:
      name: โครงสร้างแผ่นฐาน
      description: ระบุวิธีการผลิตแผ่นฐานรถบรรทุก ซึ่งมีผลต่อความแข็งแรงและน้ำหนัก
    basketball_hoop_accessory_type:
      name: ประเภทอุปกรณ์เสริมของห่วงบาสเกตบอล
      description: จัดประเภทชิ้นส่วนหรืออุปกรณ์เสริมของห่วงบาสเกตบอลโดยเฉพาะ เพื่อใช้ในการกรองและเปรียบเทียบสินค้า
    basketball_padding_location:
      name: ตำแหน่งการติดตั้งแผ่นรองสำหรับบาสเกตบอล
      description: ระบุส่วนของระบบบาสเกตบอลที่ออกแบบแผ่นรองมาเพื่อครอบหรือปกป้อง
    basketball_rim_type:
      name: ประเภทห่วงบาสเกตบอล
      description: ระบุลักษณะโครงสร้างหรือประสิทธิภาพของห่วงบาสเกตบอล เพื่อให้นักช้อปเลือกดีไซน์ที่เหมาะกับระดับการเล่นและความต้องการในการติดตั้งได้
    basketball_toy_features:
      name: คุณลักษณะของเล่นบาสเกตบอล
      description: เน้นคุณลักษณะการใช้งาน/ฟังก์ชันพิเศษที่โดดเด่นของของเล่นบาสเกตบอล
        นอกเหนือจากขนาดพื้นฐาน
    bass_clarinet_body_material:
      name: วัสดุตัวเครื่องคลาริเน็ตเบส
      description: วัสดุหลักของตัวเครื่องคลาริเน็ตเบส (ไม่รวมกลไกคีย์ เดือย และชิ้นส่วนโลหะอื่นๆ)
    bass_clarinet_lowest_written_note:
      name: โน้ตที่เขียนไว้ต่ำที่สุดของคลาริเน็ตเบส
      description: โน้ตต่ำสุดที่คลาริเน็ตเบสสามารถเล่นได้ (ผู้เล่นมักอธิบายว่าเป็นโน้ต
        E♭ ต่ำ, D ต่ำ, C ต่ำ หรือ B ต่ำโดยใช้กลไกต่อขยาย)
    bass_drum_beater_head_shape:
      name: รูปทรงหัวกระเดื่องกลองเบส
      description: อธิบายรูปทรง/ลักษณะทางเรขาคณิตของพื้นผิวหัวกระเดื่องที่ใช้ตีกลองเบส
        (ด้านที่สัมผัสกับหนังกลอง)
    bass_drum_beater_shaft_material:
      name: วัสดุก้านหัวกระเดื่องกลองเบส
      description: ระบุวัสดุที่ใช้ทำก้านหัวกระเดื่อง (ไม่ใช่หัวกระเดื่อง)
    bass_drum_head_built_in_muffling:
      name: ระบบลดเสียงในตัวของหนังกลองเบส
      description: ประเภทของระบบลดเสียงสะท้อนที่ติดตั้งมาในตัวจากการออกแบบหนังกลอง
    bass_drum_head_configuration:
      name: การจัดวางหนังกลองเบส
      description: อธิบายว่ามีหนังกลองแบบใดบ้างที่ติดตั้งมาให้บนกลองเบสตั้งแต่แรก
    bass_drum_head_surface_finish:
      name: การตกแต่งพื้นผิวหนังกลองเบส
      description: ลักษณะพื้นผิว/ผิวสัมผัสของหนังกลองเบส
    bass_drum_head_type:
      name: ประเภทหนังกลองเบส
      description: ประเภทการออกแบบหรือโครงสร้างพิเศษของหนังกลองเบส
    bass_drum_hoop_material:
      name: วัสดุที่ใช้ทำขอบกลองเบส
      description: ระบุวัสดุที่ใช้ทำขอบ (counterhoop) กลองเบส ซึ่งมีผลต่อความทนทาน
        ความสวยงาม และน้ำหนัก
    bass_drum_mounting_style:
      name: รูปแบบการติดตั้งกลองเบส
      description: ระบุรูปแบบการรองรับ/ใช้งานกลองเบส (เช่น ขาสเปอร์ส โครงรองรับ/ขาตั้ง
        หรือสายสะพายสำหรับเดินแถว)
    bass_harmonica_comb_material:
      name: วัสดุของหวี/ตัวของฮาร์โมนิกาเบส
      description: วัสดุที่ใช้ทำหวี/ตัวเครื่อง (บล็อกห้องอากาศ) ของฮาร์โมนิกาเบส
    bass_harmonica_mouthpiece_style:
      name: รูปแบบปากเป่าฮาร์โมนิกาเบส
      description: ระบุตำแหน่งการจัดวางปากเป่าฮาร์โมนิกาเบส
    bass_harmonica_reed_material:
      name: วัสดุลิ้นเสียงฮาร์โมนิกาเบส
      description: วัสดุที่ใช้ทำลิ้นเสียงในฮาร์โมนิกาเบส
    bass_harmonica_tuning_system:
      name: ระบบการตั้งเสียงฮาร์โมนิกาเบส
      description: ระบุระบบการตั้งเสียง/อารมณ์เสียงที่ใช้สำหรับฮาร์โมนิกาเบส
    bass_recorder_bocal_type:
      name: ประเภทโบคัลของรีคอร์เดอร์เบส
      description: ระบุประเภทของโบคัล/ช่องลมที่ใช้เชื่อมต่อไปยังปากเป่าของรีคอร์เดอร์เบส
    bass_recorder_included_accessories:
      name: อุปกรณ์เสริมที่มีให้ในรีคอร์เดอร์เบส
      description: แสดงรายการอุปกรณ์เสริมที่รวมอยู่ในชุดรีคอร์เดอร์เบส
    bass_recorder_keywork_material:
      name: วัสดุกลไกคีย์ของรีคอร์เดอร์เบส
      description: ระบุวัสดุที่ใช้ทำกลไกคีย์ของรีคอร์เดอร์เบส (ถ้ามี)
    bass_trombone_slide_material:
      name: วัสดุสไลด์ของทรอมโบนเบส
      description: ระบุวัสดุหลัก/การเคลือบผิวของท่อสไลด์ด้านนอก (และ/หรือชุดสไลด์)
        สำหรับทรอมโบนเบส
    bass_trombone_valve_wrap_style:
      name: รูปแบบการจัดวางท่อวาล์วของทรอมโบนเบส
      description: ระบุดีไซน์การจัดวางท่อวาล์วที่ใช้ในเครื่องดนตรี
    bass_ukulele_string_type:
      name: ประเภทสายอูคูเลเล่เบส
      description: ระบุประเภททั่วไปของสายที่ใช้กับอูคูเลเล่เบส
    bassinet_cradle_accessory_features:
      name: คุณสมบัติของเปลเด็กและเปลไกว
      description: เน้นคุณสมบัติการใช้งานหรือคุณภาพที่โดดเด่นของอุปกรณ์เสริมสำหรับเปลเด็กอ่อนและเปลไกว
        (เช่น กันน้ำ ผ่านการรับรองออร์แกนิก ความเสี่ยงต่ำต่ออาการแพ้)
    bassoon_bell_material:
      name: วัสดุเบลของบาสซูน
      description: ระบุวัสดุที่ใช้ทำเบลของบาสซูน
    bassoon_bocal_system:
      name: ระบบโบคัลของบาสซูน
      description: ประเภท/รูปแบบของบอคัลที่ใช้กับบาสซูนตามระบบและกรณีการใช้งานที่แตกต่างกัน
    bassoon_case_shell_type:
      name: ประเภทเคสสำหรับบาสซูน
      description: ระบุโครงสร้างการป้องกันของเคส (แบบนิ่ม แข็ง หรือไฮบริด)
    bassoon_keywork_material:
      name: วัสดุกลไกคีย์ของบาสซูน
      description: วัสดุและ/หรือการเคลือบผิวที่ใช้กับกลไกคีย์ของบาสซูน (คีย์และชิ้นส่วนกลไกโลหะ)
    bassoon_model_level:
      name: ระดับรุ่นของบาสซูน
      description: ระบุระดับผู้เล่นที่เหมาะสมสำหรับเครื่องดนตรีบาสซูน
    bassoon_performance_level:
      name: ระดับประสิทธิภาพของบาสซูน
      description: ระบุระดับผู้เล่นที่เหมาะสมสำหรับบาสซูนรุ่นนี้
    bassoon_reed_scrape_style:
      name: รูปแบบการแต่งลิ้นเสียงของบาสซูน
      description: ระบุรูปแบบการแต่ง/โปรไฟล์ของลิ้นเสียงบาสซูน
    bassoon_reed_thread_color:
      name: สีด้ายพันลิ้นเสียงบาสซูน
      description: สีของด้ายที่ใช้พันกับลิ้นเสียงบาสซูน
    bassoon_reed_type:
      name: ประเภทลิ้นเสียงบาสซูน
      description: ระบุประเภทย่อยของลิ้นเสียงบาสซูนที่สินค้ารองรับ (ในกรณีที่เกี่ยวข้อง)
    bassoon_system:
      name: ระบบบาสซูน
      description: ระบุระบบคีย์/แนวการออกแบบของบาสซูนที่ใช้ในเครื่องดนตรี
    bat_construction:
      name: โครงสร้างไม้คริกเก็ต
      description: ระบุจำนวนชิ้นส่วนหรือส่วนที่ยึดติดกันของลำตัวไม้คริกเก็ต (เช่น
        แบบชิ้นเดียว สองชิ้น หรือไฮบริด) ซึ่งมีผลต่อความยืดหยุ่น การควบคุมแรงสั่นสะเทือน
        และประสิทธิภาพโดยรวม
    bat_handle_size_compatibility:
      name: ความเข้ากันได้ของขนาดด้ามจับไม้คริกเก็ต
      description: ระบุขนาดด้ามจับไม้คริกเก็ต เพื่อออกแบบกริปพันด้ามมาให้รองรับได้
    bath_book_interactive_features:
      name: คุณสมบัติอินเทอร์แอคทีฟของหนังสืออาบน้ำ
      description: มีฟีเจอร์การเล่น/เรียนรู้ที่ออกแบบให้รวมอยู่ในหนังสืออาบน้ำในตัว
    bath_bubble_machine_features:
      name: ฟีเจอร์เครื่องทำฟองสบู่ในอ่างอาบน้ำ
      description: ฟีเจอร์การทำงานหลักของเครื่องทำฟองสบู่ในอ่างอาบน้ำ นอกเหนือจากการสร้างฟองสบู่พื้นฐาน
    bath_crayon_features:
      name: คุณสมบัติของสีเทียนอาบน้ำ
      description: คุณสมบัติหลักด้านการใช้งาน/ความปลอดภัยของสีเทียนอาบน้ำ
    bath_squirter_spray_pattern:
      name: รูปแบบปืนฉีดน้ำสำหรับอ่างอาบน้ำ
      description: อธิบายรูปแบบการฉีดน้ำของปืนฉีดน้ำสำหรับอ่างอาบน้ำ (รูปแบบน้ำที่ฉีด)
        เมื่อบีบหรือใช้งาน
    bath_toy_molded_drain_design:
      name: ของเล่นอาบน้ำแบบมีช่องระบายน้ำในตัว
      description: ระบุว่าของเล่นได้รับการออกแบบให้ระบายน้ำ/แห้งได้ เพื่อลดการสะสมน้ำภายใน
    bath_toy_water_play_function:
      name: ฟังก์ชันการเล่นน้ำสำหรับของเล่นอาบน้ำ
      description: ระบุกลไกหลักในการโต้ตอบกับน้ำ/เล่นน้ำสำหรับของเล่น
    baton_size_standard:
      name: ขนาดไม้ส่งวิ่งผลัดมาตรฐาน
      description: การจัดประเภทขนาดไม้ส่งวิ่งผลัดตามระดับการแข่งขัน (รุ่นเยาวชน หรือรุ่นผู้ใหญ่)
    battery_case_certification_standard:
      name: การรับรอง/มาตรฐานเคสแบตเตอรี่
      description: ระบุการรับรองด้านความปลอดภัย การขนส่ง หรือมาตรฐานการทดสอบที่เกี่ยวข้อง
        ซึ่งเคสผ่านการรับรองสำหรับการขนส่งหรือจัดเก็บแบตเตอรี่
    battery_case_interior_padding_material:
      name: วัสดุบุกันกระแทกภายในเคสแบตเตอรี่
      description: ระบุวัสดุหลักที่ใช้สำหรับบุรองหรือกันกระแทกภายในเคสแบตเตอรี่ (ถ้ามี)
    battery_configuration:
      name: การกำหนดค่าแบตเตอรี่
      description: ระบุรูปแบบหรือโครงสร้างทางกายภาพของแบตเตอรี่ (ฟอร์มแฟคเตอร์) เพื่อช่วยให้ผู้ใช้เลือกแบตเตอรี่ที่พอดีกับพื้นที่ช่องใส่แบตเตอรี่ที่มีจำกัดในปืนแอร์ซอฟต์แต่ละรุ่น
    battery_group_size:
      name: ขนาดกลุ่มแบตเตอรี่
      description: ขนาดมาตรฐานของเคสแบตเตอรี่ (เช่น BCI Group 24F หรือ H6) ที่ใช้เพื่อให้ติดตั้งเข้ากับยานยนต์หลายรุ่นได้อย่างเหมาะสม
    battery_polarity:
      name: ขั้วแบตเตอรี่
      description: ระบุขั้วหรือทิศทางของขั้วแบตเตอรี่ (ตำแหน่งขั้วบวก) ซึ่งเป็นข้อจำกัดสำคัญด้านความเข้ากันได้สำหรับแบตเตอรี่รถยนต์และยานยนต์สมรรถนะสูงหลายประเภท
    battery_standards_supported:
      name: มาตรฐานแบตเตอรี่ที่รองรับ
      description: ระบุมาตรฐานการจัดอันดับแบตเตอรี่ที่เครื่องทดสอบรองรับ สำหรับการทดสอบสมรรถนะการสตาร์ตหรือสภาพแบตเตอรี่
    battery_voltage_class:
      name: ระดับแรงดันไฟฟ้าของแบตเตอรี่
      description: ระดับระบบแรงดันไฟฟ้ามาตรฐานของชุดแบตเตอรี่รถยนต์ไฟฟ้า (EV) ที่ใช้สำหรับการกรองสินค้าอย่างรวดเร็ว
        (เช่น ระบบ 400V เทียบกับ 800V)
    batting_cage_components_included:
      name: ส่วนประกอบของกรงฝึกตีเบสบอล
      description: ระบุชิ้นส่วนต่างๆ ที่มาพร้อมกับสินค้า เพื่อช่วยให้ผู้ซื้อสามารถตรวจสอบได้ว่าสินค้านั้นเป็นอุปกรณ์ครบชุด
        หรือมีเฉพาะชิ้นส่วนอะไหล่ที่ต้องการเท่านั้น
    batting_helmet_accessories_included:
      name: อุปกรณ์เสริมหมวกเบสบอลที่รวมอยู่ในชุด
      description: ระบุอุปกรณ์เสริมเพื่อความปลอดภัยหรือความสวยงามที่มาพร้อมกับหมวกเบสบอล
    batting_stuffing_form_factor:
      name: รูปแบบวัสดุยัดไส้และวัสดุอัด
      description: ระบุว่าจำหน่ายสินค้าในรูปแบบใด เช่น วัสดุยัดไส้แบบหลวม แผ่น ม้วน
        ชิ้นตัดสำเร็จ หรือรูปทรงต่างๆ
    batting_stuffing_loft_level:
      name: ระดับความฟูของวัสดุยัดไส้และวัสดุอัด
      description: ระบุระดับความฟูของวัสดุยัดไส้หรือวัสดุอัด (ความนูน/ความสูงสัมพัทธ์)
        โดยทั่วไปใช้สำหรับเลือกวัสดุในงานควิลท์และงานเสริมฟองน้ำ
    batting_stuffing_thermal_insulation_level:
      name: ระดับฉนวนกันความร้อนของวัสดุยัดไส้และวัสดุอัด
      description: ระดับความอบอุ่นหรือประสิทธิภาพการกันความร้อนของวัสดุอัดที่ใช้ในผ้านวม
        เสื้อแจ็กเก็ต และผ้าห่ม
    batting_tee_base_design:
      name: การออกแบบฐานของแท่นวางลูกเบสบอล
      description: อธิบายรูปแบบหรือโครงสร้างฐานของแท่นวางลูก ซึ่งส่งผลต่อความมั่นคงและความเหมาะสมกับพื้นผิวการเล่นประเภทต่างๆ
    battle_top_arena_stadium_compatibility:
      name: ความเข้ากันได้กับเวที/สนามแบทเทิลท็อป
      description: ระบุว่าออกแบบสินค้านี้มาให้ใช้ร่วมกับระบบเวที/สนามแบบใด (โดยเฉพาะสำหรับชุดเซ็ตหรือเวทีรูปทรงพิเศษ)
    battle_top_items_included:
      name: รวมรายการสินค้าแบทเทิลท็อปแล้ว
      description: ระบุว่าในบรรจุภัณฑ์มีสินค้าแบทเทิลท็อปรายการใดบ้าง (เช่น ลูกข่าง
        ตัวปล่อย สนาม/เวที เชือกดึง อะไหล่สำรอง)
    battle_top_performance_type:
      name: ประเภทประสิทธิภาพของแบทเทิลท็อป
      description: อธิบายรูปแบบการเล่นโดยทั่วไปของลูกข่างต่อสู้ ซึ่งมักจะสะท้อนให้เห็นถึงลักษณะการต่อสู้ในเวทีการแข่งขัน
        (เช่น เน้นการโจมตีอย่างดุดัน หรือเน้นความทนทาน เป็นต้น)
    bayan_included_accessories:
      name: อุปกรณ์เสริมที่มาพร้อมกับบายัน
      description: อุปกรณ์เสริมที่รวมมาในชุดของบายัน (ภายในกล่อง)
    bayan_tuning_system_type:
      name: ประเภทระบบการตั้งเสียงบายัน
      description: อธิบายว่าบายันมีระบบการขันตึง/ตั้งเสียงอย่างไร (ลักษณะโครงสร้าง)
        ซึ่งส่งผลต่อความสะดวกในการพกพาและความง่ายในการตั้งเสียง
    bb_gun_action_type:
      name: ประเภทการทำงานของปืนบีบี
      description: ระบุกลไกการบรรจุหรือการทำงานของปืนบีบี (เช่น แบบคันโยก แบบปั๊ม
        แบบหักลำกล้อง)
    bb_gun_caliber:
      name: ขนาดลำกล้องปืนบีบีกัน
      description: ระบุเส้นผ่านศูนย์กลางของลำกล้องปืนบีบีกันที่ออกแบบมาให้ใช้ยิง เพื่อให้มั่นใจว่าสามารถใช้งานร่วมกับกระสุนได้อย่างเหมาะสม
    bb_gun_part_type:
      name: ประเภทชิ้นส่วนปืนบีบีกัน
      description: จัดประเภทชิ้นส่วนหรืออุปกรณ์เสริมเฉพาะที่ออกแบบมาสำหรับปืนบีบีกัน
        ช่วยให้นักช้อปค้นหาชิ้นส่วนทดแทน อุปกรณ์อัปเกรด หรืออุปกรณ์เสริมที่ตรงรุ่นได้อย่างรวดเร็ว
        (เช่น ลำกล้อง ซีลลูกสูบ หรือสปีดโหลดเดอร์)
    beach_ball_features:
      name: คุณสมบัติของลูกบอลชายหาด
      description: คุณสมบัติเด่นเฉพาะของลูกบอลชายหาด
    beach_bucket_features:
      name: คุณสมบัติของถังชายหาด
      description: คุณสมบัติการใช้งานของถังชายหาดที่ส่งผลต่อการใช้งาน ความทนทาน และความสะดวกสบาย
    beach_sand_toy_items_included:
      name: ของเล่นชายหาดและทรายรวมอยู่ในชุด
      description: มีของเล่นชายหาด/ทรายเพิ่มเติมรวมอยู่ในถัง (หากซื้อเป็นชุด)
    bead_breaker_type:
      name: ประเภทตัวแยกลูกปัด
      description: ประเภท/การออกแบบของกลไกตัวถอดขอบยาง
    bead_hole_style:
      name: รูปแบบรูลูกปัด
      description: ระบุรูปแบบหรือลักษณะของรู/ช่องในลูกปัด ซึ่งส่งผลต่อการวางตัวของลูกปัดบนตะขอหรือสายเบ็ด
    bead_type:
      name: ประเภทลูกปัด
      description: ประเภทลูกปัดหลักที่จำเป็นสำหรับแบบแพทเทิร์น
    bead_type_patch_embellishment:
      name: ประเภทลูกปัด (สำหรับตกแต่งแพตช์)
      description: ประเภทหลักของลูกปัดที่ใช้บนพื้นผิวของแผ่นปัก
    beaded_accessory_project_type:
      name: ประเภทงานประดิษฐ์เครื่องประดับจากลูกปัด
      description: แบบแพทเทิร์นนี้ใช้ทำเครื่องประดับอะไร
    beading_needle_flexibility:
      name: ความยืดหยุ่นของเข็มร้อยลูกปัด
      description: ความยืดหยุ่นของเข็ม เพื่อให้เคลื่อนผ่านรูลูกปัดที่แคบได้อย่างเหมาะสม
    beading_pattern_bead_size:
      name: ขนาดลูกปัดตามแบบลายลูกปัด
      description: ระบุขนาดลูกปัดที่แนะนำตามลวดลาย (โดยทั่วไปเป็นขนาดเม็ดลูกปัด เช่น
        11/0 หรือ 8/0)
    beading_pattern_chart_format:
      name: รูปแบบแผนผังลวดลายงานลูกปัด
      description: วิธีการแสดงลายลูกปัดในรูปแบบภาพ (เช่น แผนผังเทียบกับภาพถ่ายทีละขั้นตอน)
    beading_pattern_stitch_technique:
      name: รูปแบบลวดลายและเทคนิคการร้อยลูกปัด
      description: เทคนิคการร้อยลูกปัดหลักที่ใช้ในแบบแพทเทิร์น
    beading_technique_stitch:
      name: เทคนิคการร้อยลูกปัด / การเย็บ
      description: ระบุเทคนิคการร้อยลูกปัดหรือลายเย็บหลักที่ใช้ในแบบแพทเทิร์น (เช่น
        ลายเย็บแบบเปโยเต้ ลายเย็บแบบอิฐ)
    beading_thread_fiber_type:
      name: ประเภทเส้นใยของด้ายลูกปัด
      description: ระบุประเภทย่อยของเส้นใย/วัสดุด้ายร้อยลูกปัด (เฉพาะเจาะจงมากกว่าวัสดุทั่วไป)
        ซึ่งเกี่ยวข้องกับประสิทธิภาพการใช้งาน
    beading_thread_size:
      name: ขนาดด้ายร้อยลูกปัด
      description: ระบุขนาดหรือรหัสมาตรฐานของผู้ผลิต/อุตสาหกรรมที่ใช้กับด้ายร้อยลูกปัด
        (เฉพาะตามแบรนด์/ไลน์สินค้า) เช่น ขนาด D หรือ 00
    beading_thread_use_case:
      name: การใช้งานของด้ายร้อยลูกปัด
      description: ระบุการใช้งานหลักที่แนะนำสำหรับด้ายร้อยลูกปัด ช่วยให้ผู้ซื้อเลือกผลิตภัณฑ์ที่เหมาะสมสำหรับโครงการของตน
    beading_wire_coating_material:
      name: วัสดุเคลือบเส้นลวดร้อยลูกปัด
      description: ระบุวัสดุเคลือบผิวด้านนอกของลวดร้อยลูกปัด (ถ้ามี) ซึ่งมีผลต่อสัมผัส
        ความทนทาน และความต้านทานการหักงอ
    beading_wire_strand_count:
      name: จำนวนเส้นลวดที่ถักรวมกันสำหรับร้อยลูกปัด
      description: ระบุจำนวนเส้นลวดในลวดร้อยลูกปัดแบบหลายเส้น (เช่น 7 เส้น, 19 เส้น,
        49 เส้น) ซึ่งส่งผลต่อความยืดหยุ่นและการทิ้งตัวของชิ้นงาน
    beadlock_type:
      name: ประเภทตัวล็อกลูกปัด
      description: ระบุว่าล้อเป็นแบบบีดล็อคหรือไม่ และเป็นแบบใด (ช่วยผู้ซื้อรถออฟโรด/UTV)
    beam_material:
      name: วัสดุคาน
      description: วัสดุหลักของคาน/แกน (ซึ่งมักแตกต่างจากส่วนหัวหรืออุปกรณ์ต่อพ่วง)
    beam_pattern:
      name: รูปแบบของคาน
      description: รูปแบบการกระจายแสงที่ใช้สำหรับการขับขี่/การส่องสว่างนอกถนน
    bean_bag_fabric_material:
      name: วัสดุผ้าสำหรับเบาะบีนแบ็ก
      description: ระบุชนิดของผ้าที่ใช้ทำด้านนอกของถุงบีนแบ็กที่มาพร้อมกับชุด
    bean_paste_variety:
      name: เต้าเจี้ยวชนิดต่างๆ
      description: จำแนกประเภทของเต้าซี่ซอสตามวิธีการผลิตหรือส่วนผสมหลัก
    bean_preparation:
      name: การเตรียมถั่ว
      description: ระบุวิธีการเตรียมหรือแปรรูปถั่วก่อนจำหน่าย (เช่น ฝักเต็ม ปอกเปลือก
        หั่น หรือเพาะงอก)
    bean_variety:
      name: พันธุ์ถั่ว
      description: ระบุสายพันธุ์ทางพฤกษศาสตร์หรือชนิดทางการตลาดของถั่ว (เช่น ถั่วแขก
        ถั่วแระญี่ปุ่น หรือถั่วฝักยาว)
    beanie_style:
      name: สไตล์หมวกบีนนี่
      description: ระบุดีไซน์ โครงสร้าง หรือรูปทรงโดยรวมของหมวกบีนนี่ เพื่อให้นักช้อปเลือกรูปแบบต่างๆ
        ที่พบทั่วไปได้อย่างรวดเร็ว
    bearing_clearance:
      name: ระยะห่างภายในตลับลูกปืน
      description: ระบุคลาสระยะห่างแนวรัศมีภายในตลับลูกปืน (ระยะความหลวมภายใน) โดยคลาส
        C0 ซึ่งเรียกอีกชื่อว่า CN หรือระยะห่างมาตรฐาน
    bearing_construction_type:
      name: ประเภทโครงสร้างของตลับลูกปืน
      description: ระบุการออกแบบหรือรูปแบบโครงสร้างของตลับลูกปืนที่ใช้ในดุมล้อ (เช่น
        ตลับลูกปืนแบบตลับ หรือตลับลูกปืนแบบหลวม)
    bearing_edge_type:
      name: ขอบของตัวถังกลอง
      description: ประเภท/รูปทรงของขอบตัวถังกลอง ซึ่งมีผลต่อความชัดเจนของเสียงแรกที่ตีลงไปและหางเสียง
    bearing_lubrication:
      name: การหล่อลื่นตลับลูกปืน
      description: ระบุประเภทของสารหล่อลื่นที่ใช้กับตลับลูกปืนในระหว่างการผลิต เช่น
        จาระบีหรือน้ำมัน
    bearing_material:
      name: วัสดุของลูกปืน
      description: ระบุวัสดุที่ใช้ในการผลิตลูกปืน (เช่น เหล็ก เซรามิกไฮบริด) ช่วยให้ผู้ขับขี่เลือกตัวเลือกที่เหมาะสมระหว่างความทนทาน
        ต้นทุน และประสิทธิภาพ
    bearing_rating:
      name: ค่าพิกัดการรับโหลดของตลับลูกปืน
      description: ระบุค่าความคลาดเคลื่อนหรือระดับประสิทธิภาพของลูกปืนที่ใช้ในรองเท้าสเก็ต
        (เช่น ABEC 7, ILQ 9, Swiss)
    bearing_seal_code:
      name: รหัสซีลตลับลูกปืน
      description: ระบุรูปแบบซีลที่ใช้กับตลับลูกปืน ซึ่งส่งผลต่อความทนทานและแรงต้านการหมุน
    bearing_seal_type:
      name: ประเภทซีลตลับลูกปืน
      description: ระบุรูปแบบซีลหรือแผ่นป้องกันที่ใช้ปกป้องภายในตลับลูกปืนจากสิ่งสกปรก
        และมีผลต่อแรงต้านการหมุน (เช่น 2RS, ZZ, LLU หรือแบบเปิด)
    bearing_shield_type:
      name: ประเภทแผ่นป้องกันตลับลูกปืน
      description: รูปแบบของแผ่นป้องกันหรือซีลที่ปกป้องชิ้นส่วนภายในของตลับลูกปืน
    bearing_size_code:
      name: รหัสขนาดตลับลูกปืน
      description: การกำหนดมาตรฐานของตลับลูกปืน (เช่น 608, 688) ที่รวมเส้นผ่านศูนย์กลางภายใน
        เส้นผ่านศูนย์กลางภายนอก และความกว้างเข้าด้วยกัน
    bearing_type:
      name: ประเภทตลับลูกปืน
      description: ระบุรูปแบบโครงสร้างตลับลูกปืนที่ใช้ในชุดคอพวงมาลัย
    beater_head_material:
      name: วัสดุหัวตีกลองเบส
      description: ระบุวัสดุที่ใช้สัมผัส/ส่วนหัวของไม้ตีกลองเบส (เช่น สักหลาด ไม้
        ยาง)
    beaters_included:
      name: รวมหัวตีกลองแล้วหรือไม่
      description: ระบุจำนวนหัวตีกลองที่รวมอยู่/ติดตั้งมาพร้อมกับแป้นเหยียบกลอง (เช่น
        หัวตีเดี่ยวหรือหัวตีคู่) หรือระบุว่าไม่มีหัวตีกลองรวมอยู่ด้วย
    bed_base_type:
      name: ประเภทฐานเตียง
      description: กำหนดรูปแบบโครงสร้างของฐานเตียงหรือฐานโซฟา (เช่น ฐานเรียบ ฐานรองที่นอนแบบมีสปริง
        ฐานปรับระดับได้)
    bed_storage_type:
      name: ประเภทช่องเก็บของใต้เตียง
      description: อธิบายกลไกการจัดเก็บของแบบรวมอยู่ในตัวโครงเตียง
    bedroom_furniture_items_included:
      name: รายการเฟอร์นิเจอร์ห้องนอนที่รวมอยู่ในชุด
      description: ระบุรายการเฟอร์นิเจอร์แต่ละชิ้นที่รวมอยู่ในชุดห้องนอน (เช่น เตียง
        โต๊ะเครื่องแป้ง โต๊ะข้างเตียง) ช่วยให้นักช้อปเห็นว่าในชุดประกอบด้วยอะไรบ้างอย่างรวดเร็ว
        โดยไม่ต้องอ่านคำอธิบายยาวๆ
    bedroom_vanity_items_included:
      name: รายการสิ่งที่รวมอยู่ในชุดโต๊ะเครื่องแป้งในห้องนอน
      description: แสดงรายการชิ้นส่วนหรืออุปกรณ์ที่มาพร้อมกับชุดโต๊ะเครื่องแป้งสำหรับห้องนอน
        เพื่อให้ลูกค้าทราบอย่างชัดเจนว่าสินค้าที่ได้รับมีอะไรบ้าง (เช่น กระจก เก้าอี้สตูล
        ไฟส่องสว่าง)
    beer_based_cocktail_variety:
      name: ประเภทของค็อกเทลที่ทำจากเบียร์
      description: จัดประเภทค็อกเทลที่ทำจากเบียร์ตามชนิดเฉพาะ เช่น Radler, Shandy,
        Michelada
    beet_variety:
      name: พันธุ์บีทรูท
      description: ระบุสายพันธุ์หรือพันธุ์ปลูกของบีตรูต ช่วยให้นักช้อปสามารถระบุรสชาติ
        สี และการนำมาใช้ปรุงอาหาร (เช่น สีแดง สีทอง หรือ Chioggia)
    bell_actuation_mechanism:
      name: กลไกการกดกริ่ง
      description: ระบุการกระทำของผู้ใช้ที่จำเป็นในการกดกริ่ง ช่วยให้ผู้ซื้อเลือกรูปแบบการใช้งานที่เหมาะสมได้
    bell_guard_coverage_area:
      name: พื้นที่การป้องกันของเบลการ์ด
      description: ระบุส่วนใดของกระดิ่งที่อุปกรณ์ป้องกันนี้ได้รับการออกแบบมาเพื่อปกป้อง
    bell_material:
      name: วัสดุที่ใช้ทำส่วนเบลล์
      description: วัสดุของส่วนที่เป็นเบลล์ (หากระบุแยกต่างหากจากวัสดุโดยรวมของเครื่องดนตรี)
    bellhousing_bolt_pattern:
      name: รูปแบบรูยึดของเรือนเกียร์
      description: ระบุรูปแบบมาตรฐานหรือกลุ่มรูปแบบของตำแหน่งรูน็อตฝั่งกระดิ่ง/ฝั่งเครื่องยนต์
        ที่ใช้กับตัวเรือนเกียร์
    bellows_material:
      name: วัสดุที่ใช้ทำเบลโลว์
      description: วัสดุของตัวเบลโลว์/ฝาครอบ (ถ้ามี)
    bellows_orientation:
      name: ทิศทางการติดตั้งเบลโลว์
      description: ระบุรูปแบบการติดตั้งเบลโลว์ที่ใช้ในการจ่ายอากาศให้กับท่อของเครื่องดนตรี
    belly_panel_style:
      name: สไตล์แผงหน้าท้อง
      description: อธิบายโครงสร้างของเอวหรือแผงหน้าท้องที่ออกแบบมาเพื่อรองรับการขยายตัวของหน้าท้อง
        (เช่น ระหว่างตั้งครรภ์)
    belt_buckle_type:
      name: หัวเข็มขัดประเภทต่างๆ
      description: อธิบายกลไกหรือการออกแบบหัวเข็มขัดเฉพาะที่ใช้กับเข็มขัด
    beret_style:
      name: สไตล์หมวกเบเร่ต์
      description: ระบุดีไซน์เฉพาะของหมวกเบเร่ต์หรือรูปแบบทางวัฒนธรรม
    berry_species:
      name: พันธุ์เบอร์รี่
      description: ระบุชนิดของผลเบอร์รี่ที่อยู่ในผลิตภัณฑ์ เพื่อให้ผู้ซื้อสามารถกรองหาผลเบอร์รี่ที่ต้องการได้อย่างรวดเร็ว
    beta_casein_variant:
      name: เบต้าเคซีนชนิดต่างๆ ในโปรตีนของน้ำนม
      description: ระบุว่านมนั้นมีโปรตีนเบต้าเคซีนชนิดใด (เช่น A2) สำหรับผู้บริโภคที่กังวลเรื่องการย่อยอาหาร
    beverage_sweetness_level:
      name: ระดับความหวานของเครื่องดื่ม
      description: จำแนกเครื่องดื่มตามระดับความหวานหรือปริมาณน้ำตาลที่เติมลงไป
    bezel_graduation_units:
      name: หน่วยวัดบนขอบหน้าปัด
      description: ระบุหน่วยวัดบนขอบหน้าปัดหมุนได้ (องศา มิลลิเมตร หรือมาตราส่วนคู่)
    bicycle_brake_set_components_included:
      name: ส่วนประกอบต่างๆ ของชุดเบรกจักรยาน
      description: แสดงรายการชิ้นส่วนแต่ละชิ้นที่ให้มาในชุด เพื่อให้ผู้ซื้อทราบอย่างชัดเจนว่ามีอะไรบ้าง
        และสามารถเปรียบเทียบชุดต่างๆ ได้
    bicycle_cage_mounting_position:
      name: ตำแหน่งติดตั้งขากระติกน้ำบนจักรยาน
      description: ระบุจุดติดตั้งที่ออกแบบมาสำหรับใส่ขวดน้ำบนจักรยาน
    bicycle_computer_mount_placement:
      name: ตำแหน่งการติดตั้งขายึดคอมพิวเตอร์บนจักรยาน
      description: ระบุจุดติดตั้งขายึดคอมพิวเตอร์บนจักรยาน เช่น ด้านหน้าที่ก้านแฮนด์
        หรือบนฝาครอบคอแฮนด์
    bicycle_folding_mechanism:
      name: กลไกการพับจักรยาน
      description: ระบุระบบการพับเชิงกลที่ใช้กับเฟรมจักรยาน (เช่น การพับครึ่ง การพับแนวตั้ง)
    bicycle_frame_design:
      name: การออกแบบเฟรมจักรยาน
      description: ระบุรูปแบบโดยรวมของเฟรมจักรยาน ซึ่งส่งผลต่อการใช้งาน ความจุในการบรรทุกสัมภาระ
        และที่เก็บของ
    bicycle_frame_style:
      name: รูปแบบเฟรมจักรยาน
      description: อธิบายรูปแบบโครงสร้างเฟรมจักรยาน (เช่น แบบก้าวขึ้นขี่ง่าย ทรงต่ำ
        แบบยาวทรงช้อปเปอร์ ฯลฯ) ซึ่งมีผลต่อท่าทางการขี่และรูปลักษณ์ของจักรยาน
    bicycle_handlebar_type:
      name: ประเภทของแฮนด์จักรยาน
      description: ระบุรูปแบบหรือรูปทรงของแฮนด์จักรยานโดยเฉพาะ ช่วยให้ผู้ขี่เลือกแฮนด์ที่เหมาะสมกับท่าทางการขี่และประเภทการขี่ของตนเอง
    bicycle_headset_configuration:
      name: รูปแบบโครงสร้างของถ้วยคอจักรยาน
      description: ระบุรูปแบบโครงสร้างหรือมาตรฐานขอถ้วยคอจักรยานตามการจัดเรียงเบ้าลูกปืน
        (เช่น ถ้วยคอยื่นออกนอกเฟรม, ZeroStack, แบบผสมผสาน, แบบมีเกลียว)
    bicycle_hub_type:
      name: ประเภทดุมล้อจักรยาน
      description: อธิบายถึงกลไกของดุมล้อที่มาพร้อมกับล้อ ซึ่งส่งผลต่อความเข้ากันได้ของระบบขับเคลื่อนและสไตล์การขี่
    bicycle_lock_security_certification:
      name: ใบรับรองความปลอดภัยของล็อคจักรยาน
      description: ใบรับรองจากหน่วยงานอิสระภายนอกที่ตรวจสอบประสิทธิภาพด้านการป้องกันโจรกรรม
        (เช่น Sold Secure, ART, Varefakta)
    bicycle_pedal_type:
      name: ประเภทของบันไดจักรยาน
      description: ระบุรูปแบบการใช้งานโดยรวมหรือการออกแบบของแป้นเหยียบ เช่น แป้นเหยียบแบบธรรมดา
        แป้นเหยียบแบบไม่มีคลิป หรือแป้นเหยียบแบบผสม ช่วยให้นักปั่นเลือกตัวต่อประสานที่เหมาะสมกับสไตล์การปั่นของตนได้
    bicycle_propulsion_type:
      name: ประเภทการขับเคลื่อนของจักรยาน
      description: ระบุวิธีการขับเคลื่อนของจักรยาน เช่น การปั่นด้วยมือ การใช้ระบบไฟฟ้าช่วย
        หรือการใช้เครื่องยนต์สันดาปภายใน
    bicycle_pump_type:
      name: ประเภทปั๊มลมจักรยาน
      description: ระบุรูปแบบโครงสร้างของปั๊มลม ช่วยให้ผู้ซื้อเลือกดีไซน์ที่เหมาะสมที่สุดกับการใช้งาน
        การจัดเก็บ หรือความต้องการในกรณีฉุกเฉิน
    bicycle_rack_mounting_type:
      name: ประเภทการติดตั้งแร็คจักรยาน
      description: อธิบายวิธีการหลักหรือจุดติดตั้งที่ใช้ยึดตะแกรงบรรทุกเข้ากับจักรยาน
        เพื่อช่วยให้ผู้ใช้ตรวจสอบความเข้ากันได้กับเฟรมและอุปกรณ์
    bicycle_suspension_type:
      name: ประเภทระบบกันสะเทือนของจักรยาน
      description: ระบุการมีอยู่และการจัดวางระบบกันสะเทือนบนจักรยาน
    bicycle_tire_tread_pattern:
      name: ลายดอกยางจักรยาน
      description: ระบุรูปแบบดอกยาง ซึ่งมีผลต่อการยึดเกาะและแรงต้านการหมุนบนพื้นผิวต่างๆ
    bidirectional_charging_capability:
      name: ความสามารถในการชาร์จแบบสองทิศทาง
      description: ะบุว่ารถยนต์ไฟฟ้าคันนั้นรองรับโหมดการชาร์จแบบสองทิศทาง เช่น V2G
        และ/หรือ V2H หรือไม่
    bike_rack_mounting_style:
      name: รูปแบบการติดตั้งแร็คจักรยาน
      description: วิธีการที่แร็คช่วยรองรับ/ยึดจักรยานให้แน่น
    bike_rack_tilt_function:
      name: ฟังก์ชันการเอียงของตะแกรงบรรทุกจักรยาน
      description: มีฟังก์ชันการเอียงแบบใดบ้างเพื่อเข้าถึงพื้นที่เก็บสัมภาระด้านหลังขณะติดตั้งแร็ค
    bikini_top_style:
      name: สไตล์ของเสื้อบิกินี่
      description: ระบุดีไซน์หรือการตัดเย็บส่วนบนของบิกินี เพื่อช่วยให้นักช้อปเลือกทรงและรูปแบบการสวมใส่ที่ต้องการได้ง่ายขึ้น
    billiard_brush_type:
      name: ประเภทแปรงปัดโต๊ะบิลเลียต
      description: ระบุรูปแบบเฉพาะของอุปกรณ์ทำความสะอาดโต๊ะบิลเลียด (เช่น แปรงโต๊ะ
        แปรงขอบโต๊ะ บล็อกสำหรับรีดผ้าสักหลาด)
    billiard_glove_finger_coverage:
      name: การปกคลุมของนิ้วในถุงมือบิลเลียด
      description: ระบุว่าถุงมือมีดีไซน์ให้ครอบคลุมนิ้วใดบ้าง ช่วยให้กรองสินค้าและจำแนกสไตล์ถุงมือสำหรับเล่นบิลเลียดได้อย่างแม่นยำ
    billiard_pocket_style:
      name: รูปแบบหลุมลูกบิลเลียด
      description: ระบุรูปแบบโครงสร้างหรือสไตล์การออกแบบของหลุม ซึ่งมีผลต่อความเข้ากันได้และการตกแต่งโต๊ะบิลเลียด
    billiard_rack_style:
      name: รูปแบบของแร็คบิลเลียด
      description: อธิบายลักษณะทางกายภาพหรือกลไกของสามเหลี่ยมจัดลูก (เช่น แบบโครงสร้างดั้งเดิม
        แผ่นเทมเพลต หรือแบบพับได้)
    billiard_table_type:
      name: ประเภทของโต๊ะบิลเลียด
      description: ระบุประเภทกีฬาบิลเลียดหรือรูปแบบการใช้งานที่โต๊ะนั้นได้รับการออกแบบมา
        (เช่น พูล สนุกเกอร์ คารอม)
    billiards_discipline:
      name: ประเภทกีฬาบิลเลียด
      description: ระบุรูปแบบกีฬาบิลเลียด (ประเภทเกม) ที่ผลิตภัณฑ์นี้ออกแบบมาเพื่อใช้หรือใช้งานร่วมกันได้
    binding_compatibility_standard:
      name: มาตรฐานความเข้ากันได้ของตัวล็อก
      description: ระบุตัวล็อกรองเท้าสกี (มาตรฐานพื้นรองเท้า) ที่ได้รับการรับรองสำหรับรองเท้าสกี
        เพื่อให้มั่นใจได้ว่าการจับคู่กับอุปกรณ์ยึดรองเท้าสกีนั้นปลอดภัยและถูกต้อง
    binding_inclusion:
      name: การรวมอุปกรณ์ยึดล็อก
      description: ระบุว่าสกีจำหน่ายแบบไม่มีอุปกรณ์ยึดรองเท้าสกี มีระบบยึดรองเท้าสกีในตัว
        หรือมีอุปกรณ์ยึดรองเท้าสกีแยกต่างหาก
    binding_interface:
      name: อินเทอร์เฟซการยึด
      description: ระบุมาตรฐานแผ่นยึดหรืออินเทอร์เฟซสำหรับสกีที่ติดตั้งไว้ล่วงหน้า
        หรือที่สกีรองรับ เพื่อให้สามารถใช้งานร่วมกับรองเท้า/อุปกรณ์ยึดสกีได้
    binding_liner_type:
      name: ประเภทของซับในอุปกรณ์ยึดรองเท้าสกี
      description: อธิบายรูปแบบของซับในที่ใช้ในอุปกรณ์ยึดรองเท้าสกี/รองเท้า (เช่น
        ถอดได้ เดินได้สะดวก ปรับรูปทรงด้วยความร้อน)
    binding_mounting_system:
      name: ระบบการติดตั้งตัวล็อกรองเท้าสกี
      description: ระบุประเภทของอินเทอร์เฟซที่ใช้ในการยึดอุปกรณ์เข้ากับสกี (เช่น ติดตั้งบนผิวเรียบ
        ราง/ร่อง แผ่นรอง ฯลฯ)
    binding_position:
      name: อุปกรณ์ยึดรองเท้าสกี
      description: ระบุตำแหน่งหรือการกำหนดค่าการติดตั้งที่ต้องการสำหรับอุปกรณ์ยึดรองเท้าสกี
        (เช่น รองเท้าด้านหน้า รองเท้าด้านหลัง ARTP)
    binding_strap_position:
      name: ตำแหน่งสายรัดอุปกรณ์ยึดรองเท้าสกี
      description: ระบุตำแหน่งที่ออกแบบมาให้ติดตั้งสายรัด
    bingo_components_included:
      name: ส่วนประกอบที่รวมมาในชุดบิงโก
      description: แสดงรายการส่วนประกอบที่บรรจุมาพร้อมกับชุดบิงโก เช่น ลูกบิงโก การ์ด
        และตัวทำเครื่องหมาย
    bingo_number_range:
      name: ช่วงหมายเลขบิงโก
      description: ระบุช่วงหมายเลขบิงโก/ตัวเลือกที่ชุดบิงโกรองรับ
    bingo_set_features:
      name: คุณสมบัติของชุดบิงโก
      description: อธิบายรูปแบบผลิตภัณฑ์หลักของชุดบิงโก (แบบกระดาษ / แบบเล่นด้วยตนเอง
        หรือ แบบอิเล็กทรอนิกส์/แบบโต้ตอบ)
    bipod_mounting_interface:
      name: อินเทอร์เฟซจุดยึดสำหรับขาตั้งสองขา
      description: อธิบายส่วนต่อประสานที่ใช้ในการเชื่อมต่อขาตั้งปืนเข้ากับปืนหรือระบบราง
    bit_attachment_type:
      name: ประเภทการยึดบังเหียน
      description: อธิบายวิธีการเชื่อมต่อส่วนหัวบังเหียนเข้ากับปากม้า (เช่น สายผูก
        ปลายหัวเข็มขัด ปลายหมุดสกรูชิคาโก)
    bit_mouthpiece_design:
      name: การออกแบบส่วนที่สัมผัสในปากของบังเหียนม้า
      description: ระบุรูปแบบโครงสร้างหรือการจัดวางข้อต่อของปากเป่า ซึ่งควบคุมการกระจายแรงกด
        ระยะยกเพดานปาก และระดับความแรงลมที่เป่าโดยรวม
    bit_ring_style:
      name: รูปแบบของห่วงเหล็กบังเหียน
      description: ระบุรูปแบบส่วนแก้มของเหล็กปากม้าหรือห่วงที่ใช้ยึดกับสายบังเหียนม้า
        ซึ่งมีผลต่อการควบคุม บังคับทิศทางด้านข้าง และความรู้สึกในการบังคับม้า
    bladder_material:
      name: วัสดุที่ใช้ทำถุงลม
      description: ระบุวัสดุที่ใช้สำหรับถุงลมภายในที่กักเก็บอากาศ
    blade_attachment_type:
      name: ประเภทการยึดใบมีด
      description: ระบุว่ารองเท้าสเก็ตใช้กลไกแบบบานพับหรือแบบยึดใบมีดตายตัว
    blade_finish_coating:
      name: ผิว/การเคลือบใบมีด
      description: การเคลือบพื้นผิวใบมีดเพื่อความสวยงามหรือป้องกันการกัดกร่อน
    blade_hosel_type:
      name: ประเภทคอใบมีดไม้ฮอกกี้
      description: ระบุรูปแบบการเชื่อมต่อของหัวต่อใบมีดที่เข้ากับด้าม ซึ่งส่งผลต่อความเข้ากันได้
        (เช่น มาตรฐาน หรือ เรียว)
    blade_length_type:
      name: ประเภทความยาวใบฟิน
      description: แบ่งความยาวใบฟินออกเป็น สั้น กลาง และยาว ซึ่งแต่ละแบบมีผลต่อจังหวะการเตะและเป้าหมายการฝึกฝน
    blade_lie:
      name: มุมเอียงของใบมีด
      description: ระบุค่าองศาของใบมีดไม้ฮอกกี้ ซึ่งแสดงตำแหน่งที่ใบมีดสัมผัสน้ำแข็งเมื่อเทียบกับก้านไม้
    blade_sharpness:
      name: ความคมของใบมีด
      description: ระบุว่าด้านคมของอาวุธมีการลับคมไว้หรือทื่อเพื่อใช้สำหรับฝึกซ้อม
    blade_size_category:
      name: หมวดหมู่ขนาดใบดาบ
      description: รหัสขนาดใบดาบซาเบอร์มาตรฐานสากล (0-5) ที่ใช้แยกความแตกต่างระหว่างใบดาบสำหรับเยาวชนและผู้ใหญ่
    blade_size_class:
      name: คลาสขนาดใบดาบ
      description: จำแนกใบมีดตามเกณฑ์สรีระของผู้เล่น โดยจะสอดคล้องกับขนาดของด้ามจับ
        เช่น ระดับเด็กเล็ก เด็กโต ระดับเยาวชนขั้นสูง หรือระดับผู้ใหญ่
    blade_size_number:
      name: หมายเลขขนาดใบดาบ
      description: รหัสขนาดแบบตัวเลขมาตรฐาน (0-5) ตามข้อกำหนดกีฬาฟันดาบ ซึ่งใช้กำหนดความยาวใบดาบและการจัดกลุ่มตามอายุนักกีฬา
    blaster_mechanism:
      name: กลไกของปืนเจล
      description: อธิบายกลไกการทำงานภายในของปืนเจล (เช่น GBB, AEG, สปริง)
    block_edge_style:
      name: รูปแบบขอบบล็อก
      description: อธิบายวิธีการตกแต่งขอบ/มุมของบล็อกไม้ เพื่อสัมผัสที่ดีและความปลอดภัย
    blocking_mat_features:
      name: คุณสมบัติของแผ่นรองบล็อก
      description: คุณสมบัติการใช้งานเฉพาะของแผ่นรองตัด (การจัดเก็บ การพกพา การใช้งาน)
    blocking_mat_grid_unit:
      name: หน่วยตารางบนแผ่นรองตัด
      description: ระบบหน่วยที่ใช้บนกริดสำหรับพิมพ์ ซึ่งช่วยให้ผู้ใช้จับคู่ลวดลายและการวัดได้อย่างถูกต้อง
    blocking_mat_surface_markings:
      name: เครื่องหมายบนพื้นผิวแผ่นบล็อกงาน
      description: ประเภทของเครื่องหมายวัด/บอกระยะที่พิมพ์หรือขึ้นรูปไว้บนพื้นผิวของแผ่นรอง
    blocking_wire_coating:
      name: การเคลือบผิวลวดที่ใช้สำหรับบล็อกงาน
      description: การปรับสภาพพื้นผิว/การเคลือบผิวบนลวดที่ใช้สำหรับบล็อกงาน ซึ่งทำให้ไม่เกิดสนิม
        มีความเรียบ และไม่ความเสี่ยงต่อการเกี่ยวหรือฉีกขาด
    blocking_wire_end_cap_type:
      name: ชนิดของฝาปิดปลายลวดที่ใช้สำหรับบล็อกงาน
      description: ระบุชนิดของวัสดุป้องกัน/เคลือบผิวที่ใช้กับปลายลวดที่ใช้สำหรับบล็อกงานเพื่อความปลอดภัยและการปกป้องเนื้อผ้า
    blocking_wire_set_includes:
      name: สิ่งของที่รวมมาในชุดลวดลวดที่ใช้สำหรับบล็อกงาน
      description: ระบุว่ามีส่วนประกอบใดบ้างที่รวมอยู่ในชุดลวดบล็อกงาน (เช่น หมุดรูปตัว
        T, หลอดเก็บ)
    blocking_wire_usage:
      name: การใช้ลวดสำหรับบล็อกงาน
      description: กรณีการใช้งานหลักที่ลวดบล็อกงานชนิดยืดหยุ่นได้รับการออกแบบมา
    bloom_stage:
      name: ระยะการบาน
      description: แสดงถึงระดับการบานของดอกเดซี่ ณ เวลาจัดส่ง/ส่งมอบ
    blower_motor_bearing_type:
      name: ประเภทตลับลูกปืนมอเตอร์พัดลม
      description: ระบุการออกแบบตลับลูกปืนที่ใช้ในมอเตอร์พัดลม
    blower_motor_mounting_position:
      name: ตำแหน่งการติดตั้งมอเตอร์โบลเวอร์
      description: ระบุตำแหน่งที่ติดตั้งมอเตอร์โบลเวอร์ในโมดูล HVAC/ยานยนต์ (เช่น
        ด้านหน้า หรือด้านหลัง)
    blowpipe_valve_type:
      name: ประเภทวาล์วในท่อเป่าลม
      description: ระบุรูปแบบลิ้นเป่าลมที่รวมมาในชุด (ถ้ามี)
    bo_staff_style:
      name: รูปแบบการใช้อาวุธไม้พลอง
      description: อธิบายรูปแบบโครงสร้างหรือโครงสร้างของไม้พลอง (เช่น ตรง เรียว บุโฟม
        พับได้)
    board_game_theme:
      name: ธีมเกมกระดาน
      description: ธีมเรื่องราว/ฉากของเกมกระดาน (ใช้สำหรับการค้นหาและสำรวจ)
    board_rail_shape:
      name: รูปทรงรางบอร์ด
      description: ระบุรูปทรงของรางบอร์ด (เช่น แบบนุ่ม แข็ง หรือ 50/50) ซึ่งมีผลต่อการยึดเกาะและควบคุมแรงขับเคลื่อนขณะเล่นคลื่น
    board_size_classification:
      name: การจัดประเภทขนาดบอร์ด
      description: จัดประเภทขนาดมาตรฐานของบอร์ด/ชุดคอร์นโฮลโดยทั่วไป
    board_type_compatibility:
      name: ความเข้ากันได้ของประเภทบอร์ด
      description: ระบุประเภทบอร์ดที่มีการออกแบบมาให้ใช้ร่วมกับสายรัดข้อเท้า
    boat_construction_type:
      name: ประเภทการสร้างเรือ
      description: อธิบายลักษณะโครงสร้างหรือรูปแบบเรือพาย (เช่น เรือยาง หรือโครงแข็ง)
    boat_hook_flotation:
      name: การลอยตัวของตะขอเกี่ยวเรือ
      description: ระบุว่าตะขอเกี่ยวเรือนั้นได้รับการออกแบบให้ลอยน้ำได้หรือไม่หากตกน้ำ
    boat_ladder_stowage_style:
      name: รูปแบบการจัดเก็บบันไดเรือ
      description: อธิบายวิธีการจัดเก็บบันไดเมื่อไม่ได้ใช้งาน (เช่น แบบพับได้ เลื่อนเก็บได้
        หรือถอดออกได้)
    boat_trailer_construction_type:
      name: ประเภทโครงสร้างของเทรลเลอร์ลากเรือ
      description: ระบุว่าเทรลเลอร์รองรับเรือด้วยแท่นรอง ลูกกลิ้ง หรือระบบผสมผสาน
    boat_weaving_shuttle_weft_exit_type:
      name: แบบทางออกของด้ายพุ่งในกระสวยทอผ้าแบบเรือ
      description: วิธีการที่ด้ายพุ่งออกจากกระสวยระหว่างการทอผ้า
    bobbin_loading_type:
      name: ประเภทการใส่กระสวย
      description: ระบุวิธีการใส่/บรรจุกระสวยด้ายเข้ากับจักรเย็บผ้า
    bobbin_system:
      name: ระบบกระสวย
      description: ระบบ/ประเภทการใส่กระสวยที่ใช้ในจักรเย็บผ้า
    bobbin_type:
      name: ประเภทกระสวย
      description: ระบุรูปแบบของตัวนำเส้นด้ายที่กระสวยได้รับการออกแบบให้ใช้ (หรือมีมาให้)
        ซึ่งเป็นตัวกำหนดความเข้ากันได้และการใช้งานทั่วไป (เช่น กระสวยแบบเรือมักใช้หลอดด้าย
        กระสวยทอผ้าจากเศษผ้าอาจเป็นแบบเปิดสำหรับใส่แถบผ้า)
    bobbin_winder_winding_direction:
      name: ทิศทางการพันด้ายของเครื่องพันด้าย
      description: ระบุทิศทางการพัน/การหมุนที่เครื่องพันด้ายรองรับ
    bobble_mechanism:
      name: กลไกการโยก
      description: ระบุรูปแบบกลไกการโยกซึ่งมีผลต่อการเคลื่อนไหวและความทนทาน
    bocal_material:
      name: วัสดุของโบคัล
      description: ระบุวัสดุที่ใช้ทำโบคัลที่มาพร้อมกับสินค้า
    bodhr_n_head_material:
      name: วัสดุที่ใช้ทำหนังกลองโบดราน
      description: วัสดุของหนังกลอง (เมมเบรน) ซึ่งมีผลอย่างมากต่อโทนเสียงและข้อกำหนดในการบำรุงรักษา
    bodhr_n_tuning_system_type:
      name: รูปแบบระบบปรับความตึงของกลองโบดราน
      description: รูปแบบของกลไกปรับความตึงในตัวที่ใช้ปรับความตึงของหนังกลอง (ถ้าปรับได้)
    body_armor_coverage_area:
      name: พื้นที่การปกป้องของเกราะป้องกันร่างกาย
      description: ระบุว่าผลิตภัณฑ์ปกป้องส่วนใดของตัวถัง
    body_armor_intended_use:
      name: วัตถุประสงค์การใช้งานของเกราะป้องกันตัวถัง
      description: ระบุสถานการณ์การขับขี่หรือการใช้งานหลักที่เกราะป้องกันตัวถังสำหรับ
        ATV/UTV ได้รับการออกแบบมา
    body_cord_connector_style:
      name: รูปแบบตัวเชื่อมต่อระหว่างตัวดาบและเครื่องแต่งกาย
      description: อธิบายรูปแบบตัวเชื่อมต่อที่ปลายสาย (เช่น จำนวนขา หรือรูปแบบเขี้ยวล็อก)
        ซึ่งกำหนดความเข้ากันได้กับอาวุธและกล่องให้คะแนน
    body_panel_finish_state:
      name: สภาพพื้นผิวของแผงด้านข้างตัวถัง
      description: อธิบายสภาพการเตรียมพื้นผิว/การตกแต่งพื้นผิวของแผงด้านข้างตัวถัง
        ณ เวลาที่จำหน่าย เพื่อการทำสี/การติดตั้ง
    body_shape:
      name: รูปทรงตัวกีตาร์
      description: ระบุรูปทรง/สไตล์โดยทั่วไปของกีตาร์ไฟฟ้า
    bodysuit_bottom_coverage:
      name: ระดับการปกปิดส่วนล่างของบอดี้สูท
      description: อธิบายรูปแบบและการปกปิดส่วนล่างของบอดี้สูท ซึ่งส่งผลต่อความสบายและการเข้ากันได้กับชุดอื่นๆ
    boilie_shape:
      name: รูปทรงของเหยื่อโบอีลี่
      description: ระบุรูปทรงของเหยื่อบอลลีส์ที่ผลิตโดยใช้เครื่องรีดเหยื่อ เพื่อให้นักตกปลาเลือกโปรไฟล์เหยื่อที่แตกต่างกันได้
    boilie_stop_buoyancy:
      name: การลอยตัวของตัวหยุดเหยื่อแบบโบอีลี่
      description: ระบุว่าตัวหยุดเหยื่อแบบโบอีลี่ได้รับการออกแบบให้ลอย จม หรือลอยตัวเป็นกลาง
        ซึ่งส่งผลต่อการกระจายตัวของเหยื่อในมวลน้ำ
    bok_choy_variety:
      name: ผักกวางตุ้งสายพันธุ์ต่างๆ
      description: ระบุสายพันธุ์ ชื่อทางการตลาด หรือพันธุ์ของผักกาดขาว (เช่น เบบี้
        เซี่ยงไฮ้ ไน่ไป๋ ทัตโซอิ เพอร์เพิลเลดี้) ช่วยให้ผู้ซื้อสามารถเลือกรสชาติ ขนาด
        และลักษณะที่ต้องการได้
    bolt_drive_style:
      name: รูปแบบหัวน็อต
      description: ระบุรูปแบบหัวน็อตของสลักยึดสเก็ตบอร์ด โดยแยกความแตกต่างระหว่างหัวน็อต/ประเภทตัวขับทั่วไป
        เช่น หัวหกเหลี่ยม (Allen) หรือหัวฟิลลิปส์ (Phillips)
    bone_content:
      name: ปริมาณกระดูก
      description: ระบุว่าเนื้อสัตว์นั้นมีกระดูกหรือไม่
    bongo_center_block_material:
      name: วัสดุที่ใช้ทำเซ็นเตอร์บล็อกของกลองบองโก้
      description: วัสดุที่ใช้ทำเซ็นเตอร์บล็อกที่เชื่อมต่อตัวกลองบองโกทั้งสองใบเข้าด้วยกัน
        (ถ้ามี)
    bongo_shell_material:
      name: วัสดุตัวกลองบองโก
      description: วัสดุที่ใช้ทำกลองบองโก (ตัวกลอง) ไม่รวมหนังกลองและฮาร์ดแวร์
    bongo_tuning_system:
      name: ระบบตั้งเสียงกลองบองโก
      description: วิธีการปรับเสียง/โครงสร้างของบองโก (เช่น การปรับเสียงแบบใช้ตัวยึดแบบดั้งเดิมเทียบกับการปรับเสียงแบบใช้เชือก)
        ซึ่งส่งผลต่อการบำรุงรักษาและความถูกต้องตามต้นฉบับ
    boning_type:
      name: ประเภทของโครงเสริมทรง
      description: ระบุระบบโครงสร้างภายในของเข็มขัดรัดเอว ซึ่งรวมถึงทั้งวัสดุและรูปแบบ/รูปทรงของโครงเสริมทรงที่ใช้
        ซึ่งส่งผลโดยตรงต่อระดับการรองรับ ความยืดหยุ่น และความทนทาน
    boot_liner_type:
      name: ประเภทซับในรองเท้า
      description: อธิบายโครงสร้างหรือความสามารถในการปรับแต่งซับด้านในรองเท้าสโนว์บอร์ด
        (เช่น สามารถขึ้นรูปด้วยความร้อน หรือถอดออกได้)
    boot_sole_compatibility:
      name: ความเข้ากันได้ของพื้นรองเท้าบูท
      description: แสดงรายการมาตรฐานพื้นรองเท้าหรือระบบเชื่อมต่อที่ตัวยึดรองรับ
    boot_support_level:
      name: ระดับการรองรับของรองเท้าบู๊ต
      description: อธิบายถึงระดับความแข็ง/การรองรับโดยรวมของข้อเท้าหรือรองเท้าสเก็ต
    boot_width_code:
      name: รหัสความกว้างของรองเท้าบู๊ต
      description: การกำหนดความกว้างโดยใช้ตัวอักษรของผู้ผลิต ซึ่งใช้เฉพาะในการกำหนดขนาดรองเท้าสเก็ตลีลา
        (เช่น AAA, AA, B, C, D)
    booth_configuration:
      name: การจัดวางบูธ
      description: ระบุรูปแบบการจัดที่นั่งโดยรวมของบูธ (เช่น นั่งด้านเดียว เข้ามุม
        หรือโมดูลาร์)
    bootie_toe_design:
      name: ดีไซน์ส่วนปลายรองเท้าหุ้มข้อ
      description: ระบุรูปแบบโครงสร้างส่วนปลายของรองเท้าสำหรับเล่นเซิร์ฟและรองเท้าสำหรับกิจกรรมทางทะเล
    border_type:
      name: ประเภทขอบ
      description: ลักษณะขอบ/สไตล์ขอบของป้ายปัก (ส่งผลต่อรูปลักษณ์ ความทนทานต่อการหลุดลุ่ย
        และคุณภาพที่รับรู้)
    bore_cleaner_format:
      name: รูปแบบผลิตภัณฑ์ทำความสะอาดท่อ
      description: ระบุลักษณะทางกายภาพของผลิตภัณฑ์ทำความสะอาดท่อ (เครื่องมือและวัสดุสิ้นเปลือง)
    bore_cleaner_safe_for_finish:
      name: น้ำยาทำความสะอาดท่อลมที่ปลอดภัยสำหรับผิวเคลือบ
      description: ระบุประเภทเครื่องดนตรีทองเหลืองที่มีผิวเคลือบที่สามารถใช้น้ำยาทำความสะอาดท่อได้อย่างปลอดภัย
    bottle_cage_loading_direction:
      name: ทิศทางการบรรจุขวดด้วยที่ยึดขวด
      description: อธิบายทิศทางในการใส่หรือถอดขวดน้ำออกจากที่วาง
    bottle_neck_finish_closure_size:
      name: ขนาดปากขวด / ขนาดฝาปิด
      description: ขนาดมาตรฐานของปากขวดเพื่อให้ใช้งานร่วมกับฝาขวด จุกคอร์ก และอุปกรณ์ปิดผนึกได้อย่างเข้ากัน
        (เช่น ขนาดคราวน์ฟินิช 26 มม.)
    bottle_style:
      name: รูปแบบขวด
      description: รูปแบบขวดบรรจุทั่วไปที่ใช้ในการผลิตเบียร์และไวน์ในครัวเรือน
    bottom_bracket_interface:
      name: รูปแบบการเชื่อมต่อกับกระโหลกจักรยาน
      description: ระบุมาตรฐานแกน/กระโหลกที่ขาจานได้รับการออกแบบมา เพื่อให้มั่นใจว่าเข้ากันได้กับเฟรมและกระโหลก
    bottom_bracket_standard:
      name: มาตรฐานกระโหลกจักรยาน
      description: กระโหลกจานหน้า/ส่วนต่อประสานกระโหลกจานหน้าที่เฟรมรองรับ จะเป็นตัวกำหนดความเข้ากันได้ของชุดจานหน้าและจานปั่น
    bottom_type_suitability:
      name: ความเหมาะสมกับสภาพพื้นทะเล
      description: ระบุลักษณะพื้นท้องน้ำที่สมอเรือยึดเกาะได้ดีที่สุด
    bounce_level:
      name: ระดับการเด้ง
      description: ระบุระดับการเด้งของลูกบอลเมื่อปล่อยตกหรือขว้าง เพื่อช่วยให้ผู้ใช้เลือกบอลที่เหมาะสมสำหรับการออกกำลังกาย
        เช่น ขว้างกับกำแพงหรือทุ่มบอล
    bouncy_ball_surface_finish:
      name: ลักษณะพื้นผิวของลูกบอลเด้ง
      description: ระบุพื้นผิวสัมผัสและ/หรือลักษณะภายนอกของลูกบอลเด้ง (เช่น ผิวเรียบ
        ผิวหนาม หรือแบบสะท้องแสง)
    boundary_marker_type:
      name: ประเภทเครื่องหมายเส้นสนาม
      description: ระบุรูปแบบทางกายภาพของวัสดุที่ใช้กำหนดเส้นสนามหรือคอร์ต (เช่น กรวย
        เทป สี สเตนซิล หรือเครื่องพ่น/ทำเครื่องหมาย)
    bouquet_size_tier:
      name: ระดับขนาดช่อดอกไม้
      description: ะดับขนาดมาตรฐานสำหรับช่อดอกไม้/พวงดอกไม้ โดยไม่ขึ้นอยู่กับจำนวนก้าน
        (มีประโยชน์เมื่อใช้ดอกไม้หลายชนิดผสมกัน)
    bow_and_yo_yo_edge_finish:
      name: การตกแต่งขอบโบว์และโยโย่
      description: อธิบายถึงลักษณะการตกแต่งขอบ/การตกแต่งผิวของโบว์/โยโย่ (โดยเฉพาะโบว์ที่ทำจากริบบิ้น)
    bow_case_shell_type:
      name: ประเภทของเปลือกนอกกล่องใส่คันธนู
      description: อธิบายโครงสร้างภายนอกของกล่องใส่คันชัก (เช่น กล่องแข็งเทียบกับกล่องอ่อน)
    bow_compatibility:
      name: ความเข้ากันได้กับคันธนู
      description: ระบุประเภทของคันธนูที่หัวลูกธนูนั้นออกแบบมาให้ใช้ หรือสามารถใช้งานได้
    bow_hair_color:
      name: สีขนคันชัก
      description: ระบุสี/ลักษณะของขนที่ใช้กับคันชักเครื่องดนตรีประเภทสายสำหรับวงออร์เคสตรา
        (เช่น สีขาว/ฟอกขาว, สีขาวธรรมชาติ, สีดำ)
    bow_stick_material:
      name: วัสดุของด้ามคันธนู
      description: ระบุวัสดุที่ใช้ทำคันชัก (ส่วนแกนหลัก) ซึ่งส่งผลอย่างมากต่อน้ำหนัก
        ความรู้สึก และราคา
    bow_type:
      name: ประเภทคันชัก
      description: ระบุการออกแบบโครงสร้างของธนูสำหรับเยาวชน (เช่น ธนูทดกำลัง ธนูโค้ง
        ธนูยาว) ซึ่งมีผลอย่างมากต่อรูปแบบการยิง อุปกรณ์เสริมที่จำเป็น และโปรแกรมการฝึกอบรม
    bow_winding_material:
      name: วัสดุสำหรับพันคันชัก
      description: ระบุวัสดุที่ใช้สำหรับพัน/หุ้มคันชัก ซึ่งมีผลต่อการยึดจับและสมดุล
    bow_yo_yo_embellishment_style:
      name: รูปแบบการตกแต่งโบว์/โยโย่
      description: ระบุรูปแบบการขึ้นรูปของวัสดุตกแต่งผ้า (การขึ้นรูปโบว์หรือการเย็บโยโย่จากเศษผ้า)
    bowling_ball_core_type:
      name: ประเภทแกนกลางของลูกโบว์ลิ่ง
      description: ระบุการออกแบบแกนภายในหรือความสมมาตรของลูกโบว์ลิ่ง ซึ่งมีผลต่อการเคลื่อนที่ของลูกและศักยภาพในการโยนลูกโค้ง
    bowling_ball_coverstock_type:
      name: ประเภทของวัสดุหุ้มลูกโบว์ลิ่ง
      description: รระบุวัสดุหรือเทคโนโลยีที่ใช้ทำวัสดุหุ้มชั้นนอกของลูกโบว์ลิ่ง ซึ่งเป็นตัวกำหนดแรงเสียดทานและศักยภาพในการโยนลูกโค้ง
    bowling_set_style:
      name: สไตล์ชุดโบว์ลิ่ง
      description: อธิบายสไตล์ทั่วไปหรือลักษณะการใช้งานของชุดโบว์ลิ่ง
    box_lid_type:
      name: ประเภทฝากล่อง
      description: ประเภทของกลไกการเปิด/ปิดที่ใช้กับกล่องของขวัญหรือกระป๋อง
    box_spring_profile:
      name: ลักษณะฐานรองที่นอนแบบสปริง
      description: จำแนกความสูงโดยรวมของฐานรองที่นอนแบบสปริงออกเป็นหมวดหมู่ที่ง่ายต่อการเลือกซื้อ
        (เช่น ทรงเตี้ย ทรงมาตรฐาน ทรงสูง) เพื่อให้คุณสามารถกรองข้อมูลได้อย่างรวดเร็วโดยไม่ต้องทราบขนาดที่แน่นอน
    box_spring_requirement:
      name: ข้อกำหนดสำหรับฐานรองที่นอนแบบบ็อกซ์สปริง
      description: ระบุว่าจำเป็นต้องใช้ฐานรองที่นอนหรือโครงรองที่นอนเพิ่มเติมหรือไม่
    boxing_ring_style:
      name: สไตล์เวทีมวย
      description: จำแนกรูปแบบโครงสร้างโดยรวมหรือสถานการณ์การใช้งานที่ตั้งใจไว้ของเวที
        (เช่น การแข่งขันเทียบกับการฝึกซ้อม เวทีแบบยกสูงเทียบกับแบบพื้น)
    bra_length_type:
      name: ประเภทความยาวของบรา
      description: อธิบายการจำแนกความยาวของบราตามระดับการปกปิดในแนวตั้ง เช่น มาตรฐาน
        ยาวปานกลาง หรือสั้น
    bra_padding_type:
      name: ประเภทของแผ่นเสริมทรงในบรา
      description: อธิบายระดับหรือการมีอยู่ของแผ่นเสริมในคัป
    braces_compatibility:
      name: ความเข้ากันได้กับอุปกรณ์จัดฟัน
      description: ระบุว่าสามารถใส่เฝือกยางกันกระแทกฟันร่วมกับเหล็กดัดฟันได้หรือไม่
        และในระดับใด
    brake_band_form:
      name: รูปแบบของสายเบรก
      description: ระบุว่าใช้สายเบรกแบบวงโค้งต่อเนื่อง (ไม่มีจุดหักงอ) หรือแบบตัดเป็นท่อนที่ต้องนำไปติดตั้ง
    brake_band_material_type:
      name: ประเภทวัสดุที่ใช้ทำสายเบรก
      description: ระบุวัสดุที่ใช้ทำสายเบรก (เช่น เชือกฝ้าย เชือกไนลอน หรือเหล็กสปริง)
        ซึ่งมีผลต่อความทนทาน แรงยึดเกาะ ความยืดหยุ่น และเสียงรบกวนขณะใช้งาน
    brake_band_style:
      name: รูปแบบสายเบรก
      description: ระบุระบบ/รูปแบบการปรับแรงตึงของสายเบรกที่ใช้กับจักรยานออกกำลังกาย
        ซึ่งใช้ควบคุมแรงตึงของฟลายเออร์หรือบ็อบบิน
    brake_bleeding_method:
      name: วิธีการไล่ลมเบรก
      description: แนวทางการไล่ลมเบรกที่แนะนำในชุดอุปกรณ์
    brake_booster_assist_type:
      name: ประเภทระบบช่วยเสริมหม้อลมเบรก
      description: ระบุกลไกการช่วยเสริมแรงเบรกของหม้อลมเบรก
    brake_booster_diaphragm_configuration:
      name: การจัดเรียงไดอะแฟรมในหม้อลมเบรก
      description: แสดงจำนวน/ประเภทของไดอะแฟรมที่ใช้ในหม้อลมเบรก
    brake_caliper_bleeder_screw_position:
      name: ตำแหน่งสกรูไล่ลมคาลิเปอร์เบรก
      description: ระบุตำแหน่งของสกรูไล่ลมบนก้ามปูเบรกเมื่อติดตั้ง (เพื่อให้มั่นใจว่าสกรูไล่ลมอยู่ที่ตำแหน่งสูงสุดสำหรับการไล่ลมอย่างถูกต้อง)
    brake_caliper_finish:
      name: การตกแต่งผิวคาลิเปอร์เบรก
      description: ระบุลักษณะพื้นผิวหรือสารเคลือบป้องกันที่ใช้กับตัวคาลิเปอร์เบรก
        (เช่น สี การชุบ การชุบอะโนไดซ์)
    brake_caliper_included_hardware:
      name: อุปกรณ์ที่มาพร้อมกับก้ามปูเบรก
      description: ระบุสิ่งที่รวมอยู่ในชุดประกอบคาลิเปอร์เบรก
    brake_caliper_mount_type:
      name: ประเภทการติดตั้งคาลิเปอร์เบรก
      description: รูปแบบอินเทอร์เฟซที่ใช้สำหรับยึดก้ามปูเบรกเข้ากับดุมล้อ/ขายึด
    brake_caliper_paint_base_chemistry:
      name: เคมีพื้นฐานของสีทาคาลิเปอร์เบรก
      description: ระบบสี/ชนิดของเรซิน หรือกลุ่มสารเคมีที่ใช้
    brake_caliper_paint_kit_contents:
      name: รายการส่วนประกอบในชุดสีสำหรับก้ามปูเบรก
      description: ระบุว่ามีอะไรบ้างในแพ็คเกจนอกเหนือจากสีทา
    brake_circuit_type:
      name: ประเภทวงจรเบรก
      description: รูปแบบวงจรไฮดรอลิกที่รองรับโดยแม่ปั๊มเบรก
    brake_clutch_fluid_base_chemistry:
      name: องค์ประกอบทางเคมีพื้นฐานของน้ำมันเบรก/คลัตช์
      description: ส่วนประกอบทางเคมีหลักของน้ำมันไฮดรอลิกสำหรับเบรก/คลัตช์ ซึ่งส่งผลต่อความเข้ากันได้และการผสมเข้าด้วยกัน
    brake_clutch_fluid_dot_specification:
      name: ข้อกำหนด DOT สำหรับน้ำมันเบรก/คลัตช์
      description: การจำแนกประเภทประสิทธิภาพ DOT สำหรับน้ำมันเบรก/คลัตช์ไฮดรอลิก (เช่น
        DOT 3, DOT 4)
    brake_drum_finish_coating:
      name: การเคลือบผิว/ตกแต่งผิวของดรัมเบรก
      description: การตกแต่งพื้นผิวหรือการเคลือบป้องกันที่ใช้กับดรัมเบรก (เช่น การเคลือบด้วยไฟฟ้า
        การทาสี การเคลือบสังกะสี)
    brake_drum_type:
      name: ประเภทของดรัมเบรก
      description: ประเภทการออกแบบของดรัมเบรก (มีหรือไม่มีดุม/ลูกปืนในตัว)
    brake_fluid_base:
      name: ส่วนผสมของน้ำมันเบรก
      description: ระบุสูตรของน้ำมันเบรกไฮดรอลิกที่ต้องการหรือมีอยู่ในผลิตภัณฑ์
    brake_fluid_base_chemistry:
      name: องค์ประกอบทางเคมีพื้นฐานของน้ำมันเบรก
      description: ระบุสารเคมีกลุ่มเบสของน้ำมันเบรก ซึ่งกำหนดความเข้ากันได้และกฎในการผสม
    brake_fluid_dot_specification:
      name: ข้อกำหนด DOT ของน้ำมันเบรก
      description: ระบุระดับ/มาตรฐาน DOT ของน้ำมันเบรก (เช่น DOT 3, DOT 4) สำหรับผลิตภัณฑ์น้ำมันเบรก
    brake_fluid_standards_compliance:
      name: การปฏิบัติตามมาตรฐานน้ำมันเบรก
      description: มาตรฐานอุตสาหกรรมที่น้ำมันเบรกอ้างว่าตรงตามข้อกำหนด (นอกเหนือจากมาตรฐาน
        DOT)
    brake_fluid_type:
      name: ประเภทของน้ำมันเบรก
      description: ระบุชนิดของน้ำมันเบรกที่จำเป็นสำหรับคาลิเปอร์เบรกไฮดรอลิกของจักรยาน
    brake_hose_end_fitting_type:
      name: ประเภทข้อต่อปลายสายท่ออ่อนเบรก
      description: รูปแบบการเชื่อมต่อที่ปลายแต่ละด้านของท่อเบรก (เช่น ข้อต่อแบบแบนโจ,
        ข้อต่อแบบบาน, เกลียวตัวเมีย/ตัวผู้) ใช้เพื่อให้แน่ใจว่าเข้ากันได้กับคาลิเปอร์/ท่อเบรก
    brake_lever_pull_type:
      name: ประเภทการดึงคันเบรก
      description: ระบุอัตราส่วนการดึงสาย/กลไกคันเบรกที่ผ่านการออกแบบมา เพื่อให้ใช้งานร่วมกับก้ามปูเบรกที่เหมาะสม
        (เช่น เบรกขอบล้อแบบดึงสั้น หรือแบบดึงยาวสำหรับวีเบรก) ได้อย่างถูกต้อง
    brake_light_switch_actuation_type:
      name: ประเภทการทำงานของสวิตช์ไฟเบรก
      description: ระบุว่าเหตุการณ์ทางกายภาพใดที่ทำให้สวิตช์ทำงาน (เช่น การเหยียบแป้น/ลูกสูบ
        หรือแรงดันไฮดรอลิก เป็นต้น)
    brake_light_switch_connector_type:
      name: ประเภทขั้วต่อสวิตช์ไฟเบรก
      description: ระบุรูปแบบ/โครงสร้างของขั้วต่อไฟฟ้าที่สวิตช์ไฟเบรกใช้ในการเชื่อมต่อกับชุดสายไฟของรถยนต์
    brake_light_switch_contact_type:
      name: ประเภทของหน้าสัมผัสสวิตช์ไฟเบรก
      description: ระบุการจัดวาง/พฤติกรรมหน้าสัมผัสทางไฟฟ้าของสวิตช์ไฟเบรก (เช่น แบบปกติเปิด/ปิด
        สลับการทำงาน หรือหลายวงจร)
    brake_light_switch_mounting_style:
      name: รูปแบบการติดตั้งสวิตช์ไฟเบรก
      description: วิธีการติดตั้งสวิตช์ไฟเบรกบนตัวรถหรือระบบเบรก (เช่น แบบหนีบ, แบบยึดด้วยขายึด,
        แบบใช้สลักเกลียว Banjo )
    brake_master_cylinder_mounting_type:
      name: ประเภทการติดตั้งแม่ปั๊มเบรก
      description: วิธีการยึดแม่ปั๊มเบรกเข้ากับรถยนต์/หม้อลมเบรก (เช่น รูปแบบสลักเกลียว
        / หน้าแปลน)
    brake_master_cylinder_reservoir_type:
      name: ชนิดของกระปุกน้ำมันเบรกสำหรับแม่ปั๊มเบรก
      description: ประเภท/รูปแบบของกระปุกน้ำมันเบรกที่มีให้หรือที่แม่ปั๊มเบรกต้องใช้
    brake_mount_type:
      name: ประเภทการติดตั้งเบรก
      description: ระบุอินเทอร์เฟซระบบเบรกที่ติดตั้งมากับตะเกียบ เพื่อให้ผู้ขี่สามารถตรวจสอบความเข้ากันได้กับระบบเบรกอย่างถูกต้อง
    brake_mounting_flange_bolt_pattern:
      name: รูปแบบสลักเกลียวของหน้าแปลนติดตั้งเบรก
      description: ระบุรูปแบบรู/สลักเกลียวของหน้าแปลนสำหรับติดตั้ง ที่ใช้ยึดแผ่นรองเบรกหรือขายึดก้ามปูเบรกเข้ากับเพลารถพ่วง
        (เช่น สลักเกลียว 4 ตัว)
    brake_pad_backing_plate_material:
      name: วัสดุแผ่นรองหลังผ้าเบรก
      description: ระบุวัสดุแผ่นรองหลังผ้าเบรก ซึ่งมีผลต่อการระบายความร้อนและน้ำหนักของชิ้นส่วน
    brake_pad_compatible_rotor_type:
      name: ประเภทจานเบรกที่เข้ากันได้กับผ้าเบรก
      description: ระบุประเภทพื้นผิวของโรเตอร์/ดิสก์ที่มีการออกแบบผ้าเบรกมาให้ใช้งานร่วมกัน
    brake_pad_compound:
      name: สารประกอบของผ้าเบรก
      description: ระบุสูตรวัสดุเสียดทานของผ้าเบรก
    brake_pad_form_factor:
      name: รูปทรงของผ้าเบรก
      description: ระบุระบบเบรก/รูปทรงที่ผ้าเบรกนั้นได้รับการออกแบบมาสำหรับการใช้งาน
        (เช่น ดิสก์เบรก ดรัมเบรก เบรกมือ)
    brake_pad_material:
      name: วัสดุที่ใช้ทำผ้าเบรก
      description: ระบุชนิดของสารประกอบ/วัสดุเสียดทานที่ใช้สำหรับด้านในของผ้าเบรก
    brake_pad_shim_included:
      name: มีแผ่นรองผ้าเบรกมาให้ด้วย
      description: ระบุว่ามีแผ่นรองลดเสียงรบกวนมาให้ด้วย หรือติดตั้งไว้ล่วงหน้าหรือไม่
    brake_pad_wear_indicator_type:
      name: ประเภทของตัวบ่งชี้การสึกหรอของผ้าเบรก
      description: ระบุประเภทตัวบ่งชี้การสึกหรอที่มาพร้อมกับผ้าเบรก (เช่น แถบโลหะแบบกลไก
        หรือเซ็นเซอร์อิเล็กทรอนิกส์)
    brake_position:
      name: ตำแหน่งเบรก
      description: ระบุตำแหน่งที่ควรติดตั้งชิ้นส่วนเบรกบนยานยนต์
    brake_rotor_mount_type:
      name: ประเภทการติดตั้งจานเบรก
      description: ระบุรูปแบบอินเทอร์เฟซที่ใช้ยึดจานเบรกเข้ากับดุมล้อ (ถ้ามี)
    brake_service_kit_components_included:
      name: รายการส่วนประกอบที่รวมอยู่ในชุดซ่อมบำรุงเบรก
      description: รายการเครื่องมือ/อะแดปเตอร์/วัสดุสิ้นเปลืองที่รวมอยู่ในชุดซ่อมเบรก
    brake_shoe_friction_material:
      name: วัสดุผิวเสียดทานก้ามเบรกแบบดรัม
      description: สารประกอบผิวเสียดทาน/สารบุรองที่ใช้กับก้ามเบรกแบบดรัม (วัสดุที่สัมผัสกับดรัมเบรกโดยตรง)
    brake_shoe_set_contents:
      name: ส่วนประกอบที่มีให้ในชุดก้ามเบรกแบบดรัม
      description: สิ่งที่รวมอยู่ในบรรจุภัณฑ์ (เช่น ก้ามเบรกเท่านั้น หรือก้ามเบรกพร้อมฮาร์ดแวร์/สปริง)
    brake_system_type:
      name: ประเภทระบบเบรก
      description: ระบุเทคโนโลยีกลไกการเบรกที่ใช้ควบคุมการหมุนของตัวเก็บสายในขณะที่เหวี่ยงเหยื่อ
    brake_type:
      name: ประเภทเบรก
      description: ประเภทของกลไกเบรก/ปรับความตึงของสลิงลากอวน
    brandy_age_classification:
      name: การจำแนกอายุของบรั่นดี
      description: จัดประเภทบรั่นดีโดยใช้เกณฑ์คุณภาพ/อายุมาตรฐานอุตสาหกรรม (เช่น VS,
        VSOP, XO) ซึ่งสะท้อนถึงข้อกำหนดระยะเวลาการบ่มขั้นต่ำ
    brass_cleaning_tool_type:
      name: ประเภทอุปกรณ์ทำความสะอาดเครื่องเป่าทองเหลือง
      description: ระบุประเภทของเครื่องมือที่ใช้ในการทำความสะอาดหรือบำรุงรักษาเครื่องดนตรีทองเหลือง
    brass_instrument_application_area:
      name: ขอบเขตการใช้เครื่องเป่าทองเหลือง
      description: สเปรย์ฆ่าเชื้อที่ออกแบบมาสำหรับใช้ทำความสะอาดชิ้นส่วนเครื่องเป่าทองเหลือง
    brass_instrument_care_kit_purpose:
      name: วัตถุประสงค์ของชุดดูแลรักษาเครื่องเป่าทองเหลือง
      description: อธิบายถึงสถานการณ์การใช้งานที่ตั้งใจไว้สำหรับชุดอุปกรณ์ (การบำรุงรักษาตามปกติ
        การทำความสะอาดอย่างละเอียด การเดินทาง/กรณีฉุกเฉิน ชุดเริ่มต้นสำหรับนักเรียน
        ฯลฯ)
    brass_instrument_case_shell_material:
      name: วัสดุเคสเครื่องเป่าทองเหลือง
      description: วัสดุหลักของโครง/เฟรมแข็ง (ถ้ามี) แยกจากวัสดุโดยทั่วไปของกระเป๋า/เคส
    brass_instrument_lubricant_additives_features:
      name: สารเติมแต่ง/คุณสมบัติของสารหล่อลื่นสำหรับเครื่องเป่าทองเหลือง
      description: คุณสมบัติการใช้งานที่โดดเด่นของสูตรสารหล่อลื่น
    brass_instrument_lubricant_base_composition:
      name: ส่วนประกอบพื้นฐานของสารหล่อลื่นสำหรับเครื่องดนตรีทองเหลือง
      description: ส่วนประกอบ/เคมีพื้นฐานของสารหล่อลื่นที่ใช้สำหรับหล่อลื่นเครื่องดนตรีทองเหลือง
    brass_instrument_lubricant_viscosity_grade:
      name: ระดับความหนืดของสารหล่อลื่นสำหรับเครื่องเป่าทองเหลือง
      description: ระบุระดับความหนืด/การไหลตัวของสารหล่อลื่นที่ออกแบบมาสำหรับเครื่องเป่าทองเหลือง
    brass_instrument_replacement_part_type:
      name: ประเภทอะไหล่สำหรับเครื่องดนตรีทองเหลือง
      description: ระบุประเภทของชิ้นส่วนอะไหล่สำหรับเครื่องดนตรีทองเหลือง (ส่วนประกอบวาล์ว/สไลด์/วาล์วน้ำ,
        จุกไม้ก๊อก/สักหลาด, ตัวป้องกัน ฯลฯ)
    brass_instrument_valve_configuration:
      name: การจัดวางวาล์วของเครื่องเป่าทองเหลือง
      description: วิธีการที่เครื่องดนตรีเปลี่ยนระดับเสียง (กลไกวาล์ว/สไลด์)
    brass_lubricant_application_area:
      name: บริเวณที่ใช้งานน้ำมันหล่อลื่นสำหรับเครื่องดนตรีทองเหลือง
      description: สารหล่อลื่นที่ออกแบบมาให้ใช้กับกลไกเครื่องเป่าทองเหลือง
    brass_mouthpiece_backbore:
      name: ลักษณะภายในของปากเป่าทองเหลือง
      description: ลักษณะ/ประเภทของลักษณะภายในปากเป่า (รูปทรง/ขนาดของลักษณะภายใน)
        มีผลต่อโทนเสียงและระดับเสียง
    brass_mouthpiece_cup_depth:
      name: ความลึกของถ้วยปากเป่าสำหรับเครื่องเป่าทองเหลือง
      description: การจำแนกประเภทความลึกของถ้วยปากเป่า (ความลึกของถ้วย) ซึ่งส่งผลต่อโทนเสียงและการตอบสนอง
    brass_polishing_cloth_abrasiveness_level:
      name: ระดับความหยาบของผ้าขัดทองเหลือง
      description: บ่งบอกถึงระดับความหยาบและการกร่อนของผ้าที่ใช้เพื่อการขจัดคราบหมอง
        เทียบกับการให้ความเงางามอย่างอ่อนโยน
    bread_crumb_base_ingredient:
      name: ส่วนผสมหลักของเกล็ดขนมปัง
      description: ระบุส่วนผสมหลักที่ใช้ทำเกล็ดขนมปัง เช่น ข้าวสาลี ข้าว หนังหมู หรืออัลมอนด์
    bread_variety:
      name: ประเภทของขนมปัง
      description: ระบุรูปแบบหรือประเภทของขนมปังหรือบัน ช่วยให้ผู้ซื้อหาขนมปังประเภทที่ต้องการได้ง่ายขึ้น
        (เช่น บริออช บาแกตต์ นาน)
    breadstick_style:
      name: สไตล์ขนมปังแท่ง
      description: ระบุสไตล์หรือรูปแบบดั้งเดิมเฉพาะของขนมปังแท่ง
    bridge_head_material:
      name: วัสดุที่ใช้ทำหัวไม้เรสต์
      description: วัสดุที่ใช้เฉพาะสำหรับหัวไม้เรสต์ ซึ่งมีผลต่อ น้ำหนัก ความรู้สึก
        และความทนทาน
    bridge_head_type:
      name: ประเภทหัวสะพาน
      description: ระบุรูปแบบของหัวไม้เรสต์ ช่วยให้ผู้ซื้อเลือกรูปทรงที่วางไม้คิวที่ต้องการได้
    bridle_part_type:
      name: ประเภทชิ้นส่วนบังเหียน
      description: ระบุชิ้นส่วนเฉพาะของบังเหียนที่ต้องการอะไหล่ไปเปลี่ยน เพื่อช่วยให้ลูกค้าเลือกชิ้นส่วนที่ต้องการได้อย่างถูกต้อง
    bridle_style:
      name: รูปแบบบังเหียน
      description: จัดประเภทรูปแบบหรือโครงสร้างโดยรวมของบังเหียน เพื่อช่วยให้นักขี่ม้าสามารถค้นหาอุปกรณ์ที่เหมาะกับความต้องการหรือประเภทการขี่ของตนได้อย่างรวดเร็ว
    broadhead_field_point_attachment_style:
      name: รูปแบบการติดตั้งหัวลูกธนู/หัวลูกธนูฝึกซ้อม
      description: ระบุวิธีการติดหัวลูกธนูเข้ากับก้านลูกธนู
    broadhead_thread_size:
      name: ขนาดเกลียวหัวลูกธนู
      description: ระบุข้อมูลจำเพาะของเกลียวที่ใช้สำหรับยึดหัวลูกธนูเข้ากับข้อต่อหรือก้านลูกธนู
    broadhead_tip_type:
      name: ประเภทปลายหัวลูกธนู
      description: ระบุลักษณะของปลาย/ปลอกโลหะหัวลูกธนูที่ทำหน้าที่เจาะทะลุเป้าหมายในขั้นแรก
        ซึ่งส่งผลต่อประสิทธิภาพการล่าสัตว์แต่ละประเภท
    broccoli_cut:
      name: รูปแบบการหั่นบรอกโคลี
      description: ระบุวิธีการหั่นหรือการเตรียมบรอกโคลีก่อนบรรจุหีบห่อ (เช่น ทั้งหัว
        แบ่งเป็นช่อ หรือหั่นเป็นชิ้นเล็ก)
    broccoli_variety:
      name: พันธุ์บรอกโคลี
      description: ระบุสายพันธุ์หรือพันธุ์ทางการค้าของบรอกโคลีโดยเฉพาะ (เช่น เทนเดอร์สเต็ม,
        โรมาเนสโก)
    broom_head_material:
      name: วัสดุที่ใช้ทำหัวไม้กวาด
      description: ระบุองค์ประกอบของวัสดุที่ใช้ทำหัวไม้กวาด ซึ่งส่งผลต่อความทนทานและลักษณะการเล่นกีฬาเคอร์ลิง
    brush_format:
      name: รูปแบบแปรง
      description: ระบุรูปแบบทางกายภาพของแปรงสำหรับสกีหรือสโนว์บอร์ด โดยแยกความแตกต่างระหว่างแปรงแบบมือถือและแบบหมุนที่ใช้สว่าน
        เช่น แปรงขนแกะหรือแปรงสักหลาดทรงกระบอก
    brush_shape:
      name: รูปทรงแปรง
      description: ระบุรูปทรงหรือลักษณะทางกายภาพของตัวแปรงหรือหัวแปรง ซึ่งส่งผลต่อพื้นที่สัมผัสและความสะดวกในการจับใช้งาน
    brussel_sprout_preparation:
      name: รูปแบบการเตรียมกะหล่ำดาว
      description: อธิบายถึงวิธีการเตรียมหรือรูปแบบการหั่นกะหล่ำดาวที่จัดส่งให้
    brussels_sprout_variety:
      name: พันธุ์กะหล่ำดาว
      description: ระบุสายพันธุ์หรือพันธุ์เพาะปลูกของกะหล่ำดาว เพื่อรองรับทั้งสายพันธุ์ที่มีอยู่ในปัจจุบันและสายพันธุ์ใหม่ในอนาคต
    bubble_blower_features:
      name: คุณสมบัติของปืนเป่าฟองสบู่
      description: ระบุคุณสมบัติการใช้งานทั่วไปของปืนเป่าฟองสบู่
    bubble_gun_bubble_output_modes:
      name: โหมดการปล่อยฟองของปืนเป่าฟองสบู่
      description: ระบุโหมดการทำงานของปืนเป่าฟอง เช่น เป่าฟองเดี่ยว เป่าต่อเนื่อง
        หรือปรับความเร็วได้หลายระดับ
    bubble_machine_features:
      name: คุณสมบัติของเครื่องทำฟองสบู่
      description: เน้นคุณสมบัติการใช้งานทั่วไปของเครื่องทำฟองสบู่ นอกเหนือจากการใช้งานพื้นฐาน
    bubble_machine_items_included:
      name: อุปกรณ์สำหรับเครื่องทำฟองสบู่ที่รวมอยู่ในชุด
      description: ระบุรายการสิ่งของสำคัญที่รวมอยู่ในกล่อง (เช่น น้ำยาฟองสบู่ แท่งเป่าฟองสบู่สำรอง
        สายคล้อง รีโมตคอนโทรล)
    bubble_output_rate:
      name: อัตราการปล่อยฟองสบู่
      description: ระบุอัตราการผลิตฟองสบู่โดยประมาณ/เชิงคุณภาพของปืนเป่าฟอง (เช่น
        ต่ำ/ปานกลาง/สูง) รวมถึงระบุว่าปริมาณฟองนั้นแปรผันได้หรือไม่
    bubble_solution_container_type:
      name: ประเภทภาชนะบรรจุน้ำยาทำฟองสบู่
      description: ระบุวิธีการจ่าย/ใช้น้ำยาฟองสบู่กับปืนเป่าฟอง (เช่น ช่องเก็บน้ำยาภายในปืน
        ขวดที่ติดมากับปืน ถาดแยกต่างหากสำหรับจุ่มน้ำยา)
    bubble_toy_included_accessories:
      name: อุปกรณ์เสริมที่มาพร้อมของเล่นเป่าฟองสบู่
      description: รายการอุปกรณ์ทั่วไปที่มักมาพร้อมกับของเล่นเป่าฟองสบู่ (เช่น ขวดน้ำยา,
        ถาด, ไม้เป่าฟองสบู่สำรอง)
    buckwheat_processing_method:
      name: วิธีการแปรรูปบัควีท
      description: อธิบายกระบวนการแปรรูปที่ใช้กับบัควีทก่อนจำหน่าย (เช่น คั่ว เพาะให้งอก
        ทำให้พอง)
    buckwheat_product_form:
      name: รูปแบบผลิตภัณฑ์บัควีท
      description: ลักษณะทางกายภาพเฉพาะของบัควีทที่ครอบคลุมรูปแบบต่างๆ ที่ไม่ได้ระบุไว้ในรายการทั่วไป
        (เช่น เกล็ด พัฟ ซองสำเร็จรูป)
    bug_collecting_kit_items_included:
      name: อุปกรณ์ที่รวมมาในชุดเก็บแมลง
      description: เครื่องมือและสื่อการเรียนรู้ที่รวมอยู่ในชุดเก็บรวบรวมแมลง
    built_in_storage_type:
      name: ประเภทของที่เก็บของแบบบิวท์อิน
      description: ระบุประเภทของที่เก็บของที่ติดตั้งอยู่ในโครงเตียงสองชั้น (เช่น ลิ้นชัก
        ชั้นวางของ ที่เก็บของใต้บันได)
    bumper_finish:
      name: พื้นผิวเคลือบของกันชน
      description: ระบุการเคลือบพื้นผิวหรือการตกแต่งที่ใช้กับกันชน
    bumper_sensor_cutouts:
      name: ช่องเปิดสำหรับเซ็นเซอร์บนกันชน
      description: ระบุว่ากันชนมีหรือรองรับช่อง/รูที่เจาะจากโรงงานผู้ผลิตแบบใด
    bunk_bed_configuration:
      name: รูปแบบโครงสร้างเตียงสองชั้น
      description: ระบุการจัดวางโครงสร้างและการเลือกขนาดที่นอนของเตียงสองชั้น
    buoyancy:
      name: การลอยตัว
      description: ระบุลักษณะการลอยตัวของเหยื่อตกปลาหรือเหยื่อล่อในน้ำ เช่น ลอย จม
        หรือลอยนิ่ง
    burkini_pieces_included:
      name: ชิ้นส่วนที่รวมมาในชุดเบอร์กินี
      description: ระบุชิ้นส่วนเครื่องแต่งกายที่รวมอยู่ในชุดบูร์กีนี เพื่อให้ลูกค้าทราบอย่างชัดเจนว่ากำลังซื้ออะไร
    burn_rate:
      name: อัตราการเผาไหม้
      description: อธิบายความเร็วในการเผาไหม้ของกระดาษมวนบุหรี่เมื่อจุดไฟแล้ว
    bus_model_type:
      name: ประเภทโมเดลรถบัส
      description: ระบุรูปแบบ/ประเภทของรถบัสในโลกแห่งความเป็นจริงที่แสดงโดยโมเดลจำลอง
        (ตัวถัง/ประเภทการใช้งาน)
    bust_design:
      name: การออกแบบบริเวณหน้าอก
      description: อธิบายลักษณะการออกแบบบริเวณหน้าอกและการปกปิดบริเวณคอเสื้อของบอดี้สูท
        (เช่น แบบเปิดหน้าอก, มีบราในตัว, คอวีลึก)
    butter_variety:
      name: ประเภทของเนย
      description: ระบุรูปแบบการผลิตหรือประเภทที่โดดเด่นของเนย เช่น เนยหมัก เนยครีมหวาน
        เนยสไตล์ยุโรป เนยใส (Ghee) หรือเนยเวย์
    buttermilk_variety:
      name: ประเภทของบัตเตอร์มิลค์
      description: ระบุสไตล์หรือรูปแบบเฉพาะของบัตเตอร์มิลค์ที่จำหน่าย (เช่น แบบหมัก
        แบบดั้งเดิม แบบผง)
    button_application:
      name: ลักษณะการใช้งานกระดุม
      description: ระบุการใช้งานหรือประเภทโครงการที่ตั้งใจให้นำกระดุมมาใช้ (เช่น เสื้อผ้า
        เบาะ)
    button_attachment_type:
      name: ประเภทการติดกระดุม
      description: ระบุโครงสร้างของกระดุมสำหรับติดเข้ากับผ้า (เช่น แบบเจาะรูเย็บทะลุ
        หรือแบบก้านกระดุม) โดยไม่เกี่ยวกับสไตล์การติดกระดุม
    button_finish:
      name: ลักษณะพื้นผิวของกระดุม
      description: อธิบายพื้นผิว/ลักษณะภายนอกของกระดุม (เช่น แบบด้าน หรือแบบมันเงา)
    buttonhole_elastic_application:
      name: การใช้งานยางยืดสำหรับทำรังดุม
      description: การใช้งาน/ประยุกต์ใช้หลักของยางยืดประดับแบบพับทบ
    cab_type:
      name: ประเภทห้องโดยสาร
      description: ระบุรูปแบบห้องโดยสารของรถบรรทุก
    cabasa_construction_type:
      name: ประเภทโครงสร้างของคาบาซา
      description: ระบุโครงสร้าง/รูปแบบทางกายภาพของตัวเรือนคาบาซ่าและชุดโซ่/ลูกปัด
    cabbage_variety:
      name: พันธุ์กะหล่ำปลี
      description: ระบุสายพันธุ์หรือประเภทของกะหล่ำปลี (เช่น สีเขียว นาปา ซาวอย) เพื่อให้นักช้อปสามารถกรองตามรสชาติ
        เนื้อสัมผัส และการใช้เพื่อปรุงอาหาร
    cabinet_door_style:
      name: รูปแบบบานประตูตู้
      description: ระบุรูปแบบการออกแบบของแผงบานตู้ เช่น สไตล์เชคเกอร์ หรือแบบบานนูน
        เพื่อช่วยให้เข้ากับสุนทรียภาพของห้องครัว
    cabinet_overlay_type:
      name: ประเภทการวางซ้อนของตู้
      description: ระบุลักษณะการวางซ้อนหรือตำแหน่งของบานประตูเมื่อเทียบกับโครงตู้
    cable_end_type:
      name: ประเภทหัวต่อสายเคเบิล
      description: อธิบายรูปทรงหรือรูปแบบข้อต่อที่ปลายสายเคเบิล ซึ่งเชื่อมต่อกับคันเบรกหรือคันเกียร์
    cable_housing_construction:
      name: โครงสร้างของปลอกสายเคเบิล
      description: อธิบายถึงการออกแบบโครงสร้างของปลอกสายเคเบิล เช่น แบบขดขดลวด แบบไม่ยุบตัว
        หรือแบบข้อต่อ ซึ่งมีผลต่อการทานการบีบอัด ความยืดหยุ่น และสัมผัสของเบรก/เกียร์
    cable_housing_liner_type:
      name: ประเภทของซับในปลอกสายเคเบิล
      description: ระบุว่าปลอกสายมีซับในและ/หรือการเคลือบสารหล่อลื่นหรือไม่ รวมถึงวัสดุหรือเทคโนโลยีที่ใช้
        ซึ่งส่งผลต่อการลดแรงเสียดทานและความทนทานต่อสภาพอากาศ
    cable_management_type:
      name: ประเภทการจัดการสายเคเบิล
      description: ระบุประเภทของระบบจัดการสายเคเบิลหรือพลังงานแบบบิวท์อินที่โต๊ะประชุมมีให้
    cable_surface_treatment:
      name: การเคลือบพื้นผิวสายเคเบิล
      description: ระบุถึงสารเคลือบหรือผิวเคลือบพิเศษใดๆ ที่ใช้กับสายเคเบิลเพื่อลดแรงเสียดทานหรือป้องกันการกัดกร่อน
    cabochon_back_type:
      name: ประเภทด้านหลังของพลอยหลังเบี้ย
      description: ระบุลักษณะด้านหลัง/การตกแต่งด้านหลังของพลอยหลังเบี้ย ซึ่งมีผลต่อวิธีการติดตั้ง/ติดกาว
        และความเข้ากันได้กับชิ้นงาน
    cacao_bean_variety:
      name: สายพันธุ์เมล็ดโกโก้
      description: ระบุพันธุ์หรือสายพันธุ์ทางพฤกษศาสตร์ของเมล็ดโกโก้ที่ใช้
    cacao_roast_level:
      name: ระดับการคั่วโกโก้
      description: อธิบายถึงระดับการคั่วของเมล็ดโกโก้ก่อนนำไปบด
    cage_package_type:
      name: ประเภทชุดกรง
      description: ระบุว่าสินค้าที่รวมมาในการสั่งซื้อมีอะไรบ้าง (เช่น เฉพาะตาข่าย
        ชุดโครง หรือครบชุด)
    cajon_body_shell_material:
      name: วัสดุตัวกลอง/เปลือกกลองคาฮอง
      description: ระบุวัสดุที่ใช้ทำตัวกลอง/เปลือกกลองคาฮอง (ไม่รวมแผ่นไม้ด้านหน้า)
    cajon_corner_control_system:
      name: ระบบควบคุมเสียงมุมกล่องคาฮอง
      description: ระบุว่ากลองคาฮองรองรับการปรับเสียงที่มุม (เช่น สกรูที่มุม) เพื่อปรับเปลี่ยนการตอบสนองของการตีหรือไม่
    cajon_corner_edge_design:
      name: การออกแบบมุม/ขอบของกล่องคาฮอง
      description: อธิบายโครงสร้างมุม/ขอบที่มีผลต่อความสะดวกสบายและประสิทธิภาพในการเล่น
    cajon_feet_type:
      name: ประเภทขาของคาฮอง
      description: ระบุประเภทของขาที่ใช้กับคาฮอง ซึ่งส่งผลต่อความมั่นคงและการสั่นสะเทือน
    cajon_snare_adjustability:
      name: ความสามารถในการปรับระดับสแนร์ของคาฮอง
      description: ระบุว่าสามารถปรับเอฟเฟกต์กลองสแนร์ได้หรือไม่ และปรับในลักษณะใด
        (ความตึง การเปิด/ปิดสายสแนร์ หรือทั้งสองอย่าง)
    cajon_snare_system_type:
      name: ประเภทระบบสแนร์ของคาฮอง
      description: ระบุกลไกสแนร์ภายในที่ใช้สร้างเอฟเฟกต์สแนร์
    cake_shape:
      name: รูปทรงเค้ก
      description: อธิบายลักษณะทางกายภาพของเค้กกาแฟที่อบเสร็จแล้ว
    cake_topping:
      name: หน้าเค้ก
      description: ระบุส่วนประกอบหลักที่ใช้ตกแต่งหรือตกแต่งหน้าเค้กกาแฟ
    cake_type:
      name: ประเภทเค้ก
      description: อธิบายรูปแบบหรือชนิดของเค้ก (เช่น เค้กปอนด์ เค้กสปองจ์ ชีสเค้ก)
    caliper_mount_type:
      name: ประเภทการติดตั้งคาลิเปอร์
      description: ระบุมาตรฐานการติดตั้งกับเฟรมหรือตะเกียบที่ก้ามปูเบรกใช้ (เช่น แนวดิ่ง
        หรือแนบไปกับเฟรม)
    caliper_mounting_standard:
      name: มาตรฐานการติดตั้งก้ามปูเบรก
      description: ระบุรูปแบบการเชื่อมต่อ/มาตรฐานการติดตั้ง (เช่น Flat Mount, Post
        Mount, IS เป็นต้น) ที่ใช้ในการยึดคาลิเปอร์เบรกเข้ากับเฟรมหรือตะเกียบจักรยาน
    camera_mounting_location_vehicle_exterior:
      name: ตำแหน่งที่ติดตั้งกล้อง (ภายนอกยานยนต์)
      description: ตำแหน่งที่ต้องการติดตั้งกล้องบนตัวรถ (เช่น กระจังหน้า ด้านหลัง
        กระจกมองข้าง)
    camouflage_environment_type:
      name: ประเภทสภาพแวดล้อมของลายพราง
      description: ระบุสภาพแวดล้อมหลักที่เหมาะกับการใช้ลายพราง เช่น ป่าไม้ ทะเลทราย
        หรือพื้นที่ชุ่มน้ำ
    camping_oil_application:
      name: การใช้งานน้ำมันสำหรับตั้งแคมป์
      description: ระบุุวัตถุประสงค์หลักของการใช้น้ำมันสำหรับการตั้งแคมป์ (เช่น ใช้เป็นเชื้อเพลิงตะเกียง
        หรือเชื้อเพลิงเตา)
    camshaft_construction:
      name: โครงสร้างเพลาลูกเบี้ยว
      description: รูปแบบการผลิต/ชิ้นงานตั้งต้นของเพลาลูกเบี้ยว
    camshaft_material:
      name: วัสดุที่ใช้ทำเพลาลูกเบี้ยว
      description: วัสดุหลักของแกน/เพลาลูกเบี้ยว (วัสดุพื้นฐาน)
    camshaft_position:
      name: ตำแหน่งเพลาลูกเบี้ยว
      description: ระบุตำแหน่ง/ประเภทเพลาลูกเบี้ยวภายในเครื่องยนต์ (เช่น ฝั่งไอดีหรือไอเสีย
        หรือแถว/ตำแหน่งในเครื่องยนต์ที่เฉพาะเจาะจง)
    candle_container_type_included:
      name: ประเภทของภาชนะใส่เทียนที่รวมอยู่ในชุด
      description: ระบุประเภทของภาชนะใส่เทียนที่รวมอยู่ในชุด (ถ้ามี)
    candle_dye_form:
      name: รูปแบบของสีย้อมเทียน
      description: ระบุรูปแบบทางกายภาพของสีย้อม/สารให้สีที่ใช้ในการทำเทียน
    candle_fragrance_form:
      name: รูปแบบของน้ำหอมสำหรับทำเทียน
      description: ระบุประเภท/รูปแบบของส่วนผสมน้ำหอมที่ใช้ในการทำเทียน
    candle_making_tool_type:
      name: ประเภทของอุปกรณ์ทำเทียน
      description: ระบุว่าผลิตภัณฑ์นั้นเป็นอุปกรณ์ทำเทียนประเภทใด (เช่น หม้อเทน้ำมัน
        อุปกรณ์จัดตำแหน่งไส้เทียน เทอร์โมมิเตอร์)
    candy_texture:
      name: เนื้อสัมผัสแบบลูกอม
      description: อธิบายถึงความรู้สึกหรือความสม่ำเสมอของลูกอมเมื่อรับประทาน โดยไม่คำนึงถึงรสชาติหรือรูปร่าง
    candying_method:
      name: วิธีการเชื่อมผลไม้
      description: อธิบายวิธีการทำผลไม้เชื่อมหรือถนอมอาหารด้วยน้ำตาล (เช่น ทำให้เป็นผลึก
        เคลือบน้ำตาล หรือแช่ในน้ำเชื่อม)
    canned_meat_form:
      name: รูปแบบเนื้อกระป๋อง
      description: จำแนกรูปแบบการแปรรูปหรือนำเสนอเนื้อสัตว์ภายในบรรจุภัณฑ์
    canoe_construction_type:
      name: ประเภทการสร้างเรือแคนู
      description: อธิบายความแตกต่างระหว่างรูปแบบการสร้างตัวเรือแคนู เช่น แบบเปลือกแข็ง
        แบบเป่าลม และแบบพับได้
    canoe_hull_shape:
      name: รูปทรงตัวเรือแคนู
      description: อธิบายรูปทรงหน้าตัดหลักของตัวเรือหรือรูปทรงด้านล่าง ซึ่งส่งผลต่อความเสถียรและการควบคุม
    canoe_stern_design:
      name: การออกแบบท้ายเรือแคนู
      description: ระบุรูปแบบท้ายเรือ ซึ่งส่งผลต่อความเข้ากันได้กับมอเตอร์และการควบคุมเรือ
    canopy_type:
      name: ประเภทของหลังคา
      description: อธิบายรูปแบบของหลังคาหรือสิ่งปกคลุมด้านบนที่มาพร้อมกับเตียงคาบาน่า
    canvas_compatible_media:
      name: สื่อศิลปะที่ใช้กับผ้าใบ
      description: ระบุว่าผ้าใบนี้ออกแบบมาเพื่อใช้กับสื่อศิลปะ/งานฝีมือประเภทใด
    canvas_format:
      name: รูปแบบผ้าใบ
      description: ระบุว่าผ้าใบสำหรับพิมพ์นั้นจำหน่ายเป็นแผ่น ม้วน หรือแผ่นตัดสำเร็จ
    canvas_mounting_format:
      name: การติดตั้ง/รูปแบบผ้าใบ
      description: รูปแบบทางกายภาพ/วิธีการติดตั้งของผลิตภัณฑ์ผ้าใบสำหรับวาดภาพ
    canvas_stretcher_assembly_type:
      name: ประเภทการประกอบโครงขึงผ้าใบ
      description: ระบุว่าจำหน่ายโครงขึงผ้าใบในรูปแบบประกอบสำเร็จ หรือเป็นชิ้นส่วน/ชุดที่ต้องประกอบเอง
    canvas_stretcher_corner_joint_type:
      name: ประเภทของข้อต่อมุมสำหรับโครงขึงผ้าใบ
      description: วิธีการเชื่อมต่อ/สร้างมุมของโครงไม้ (เช่น ข้อต่อเดือยและร่อง ข้อต่อแบบนิ้วมือ
        การเย็บด้วยลวดเย็บ การใช้ลิ่ม)
    canvas_surface_tone:
      name: โทนสีพื้นผิวผ้าใบ
      description: โทนสี/สีพื้นฐานของพื้นผิวผ้าใบที่ลงสีรองพื้นแล้ว (พื้น) ไม่ใช่ลวดลายหรือแบบพิมพ์ใดๆ
        (เช่น สีขาว สีดำ สีโทนต่างๆ)
    canvas_weave_type:
      name: ประเภทการทอผ้าใบ
      description: อธิบายโครงสร้างการทอของพื้นผิวผ้าใบ ซึ่งส่งผลต่อพื้นผิวสัมผัสและการลงสี
    cap_attachment_style:
      name: รูปแบบการยึดฝาครอบ
      description: ระบุโครงสร้าง/รูปแบบการยึดฝาครอบปากเป่าแซ็กโซโฟน ซึ่งอาจส่งผลต่อการป้องกันและความพอดีกับกล่องใส่
    cap_construction:
      name: โครงสร้างของหมวกวิก
      description: ระบุวิธีการผลิตหมวกวิก (เช่น แบบลูกไม้ด้านหน้า, แบบลูกไม้เต็มใบ,
        แบบถักมือ) ซึ่งส่งผลต่อความสมจริง ความสบาย และความหลากหลายในการจัดแต่งทรงผม
    cap_crown_structure:
      name: โครงสร้างส่วนบนของหมวก
      description: ระบุว่าส่วนบนของหมวกมีโครงสร้าง (แข็ง) หรือไม่มีโครงสร้าง (อ่อน)
    cap_fit_type:
      name: ประเภทของทรงหมวกวิก
      description: ระบุวิธีการสวมใส่หรือปรับขนาดหมวกแก๊ปบนศีรษะผู้สวมใส่ (เช่น แบบพอดีศีรษะ
        หรือแบบปรับได้)
    cap_seal_type:
      name: ประเภทซีลฝาปิด
      description: ระบุส่วนประกอบที่ใช้ในการซีลเพื่อป้องกันการรั่วไหลของน้ำมันและไอระเหย
        (เช่น โอริง ปะเก็น)
    cap_size:
      name: ขนาดหมวก
      description: ป้ายขนาดมาตรฐานที่ระบุขนาดศีรษะโดยรวมที่เหมาะสมสำหรับหมวกวิก
    cap_type:
      name: ประเภทฝาปิด
      description: ประเภทฝาปิด/อินเทอร์เฟซการปิดที่ใช้กับถังพักน้ำล้น
    caper_size_grade:
      name: การจัดเกรดขนาดของเคเปอร์
      description: จำแนกเคเปอร์ตามชื่อเกรดมาตรฐานอุตสาหกรรม ซึ่งสอดคล้องกับขนาดเส้นผ่านศูนย์กลางของดอกตูม
    capo_clamping_mechanism:
      name: กลไกการหนีบคาโป
      description: ระบุรูปแบบการหนีบ/การทำงานที่ใช้ในการกดทับสายกีตาร์ (วิธีการใช้งานคาโป้)
    capo_finish:
      name: การตกแต่งผิวคาโป
      description: ผิวสัมผัสของตัวคาโป (ด้านรูปลักษณ์/ความรู้สึก) โดยไม่ขึ้นอยู่กับสี
        (เช่น แบบด้าน หรือแบบมันเงา)
    capo_fit_type:
      name: ประเภทการติดตั้งคาโป้
      description: ระบุรูปทรงคอที่คาโป้ได้รับการออกแบบมาให้พอดี (รวมถึงแขนยึด/ความแบน)
        ซึ่งส่งผลต่อการหนีบที่ปราศจากเสียงรบกวนและการตั้งเสียงให้ถูกต้อง
    capo_pad_material:
      name: วัสดุของแผ่นรองคาโป้
      description: ระบุวัสดุของแผ่นรองสัมผัสที่สัมผัสกับสายกีตาร์/ฟิงเกอร์บอร์ด (มีผลต่อการยึดเกาะ
        ความเสถียรในการปรับจูน และรอยขีดข่วนที่อาจเกิดขึ้นกับผิวเคลือบ)
    capo_tension_mechanism:
      name: กลไกปรับความตึงของคาโป้
      description: ระบุวิธีการใช้และปรับแรงกด/ความตึงบนสายสำหรับคาโปแบบเลื่อน
    capture_method:
      name: วิธีการจับ
      description: ระบุว่ากับดักนี้มีไว้สำหรับจับสัตว์เป็นๆ หรือฆ่าให้ตาย
    car_ev_conversion_kit_motor_type:
      name: ประเภทมอเตอร์ของชุดแปลงรถยนต์ไฟฟ้า
      description: ระบุเทคโนโลยีมอเตอร์ขับเคลื่อนที่รวมอยู่ในชุดแปลงหรือที่จำเป็น
        (เช่น มอเตอร์เหนี่ยวนำกระแสสลับ เทียบกับ มอเตอร์แม่เหล็กถาวร)
    car_playset_items_included:
      name: รายการชิ้นส่วนที่รวมอยู่ในชุดของเล่นรถยนต์
      description: แสดงรายการชิ้นส่วนหลักที่รวมอยู่ในชุดของเล่นรถยนต์ นอกเหนือจากโครงสร้างพื้นฐาน
        (เช่น รถ ฟิกเกอร์ ป้ายต่างๆ)
    car_shampoo_application_method:
      name: วิธีการใช้แชมพูล้างรถ
      description: วิธีการใช้แชมพูอย่างถูกต้องขณะสระผม
    car_wash_solution_form:
      name: รูปแบบของน้ำยาล้างรถ
      description: ระบุรูปแบบทางกายภาพของผลิตภัณฑ์ล้างรถยนต์ (เช่น ของเหลว โฟม ผ้าเช็ดทำความสะอาด)
    car_wash_solution_scent:
      name: กลิ่นน้ำยาล้างรถยนต์
      description: ระบุกลิ่นของน้ำยาล้างรถ (หากมีกลิ่น)
    carbonated_water_variety:
      name: ประเภทของน้ำอัดลม
      description: จำแนกประเภทของน้ำอัดลมตามประเภทและสูตรที่พบได้ทั่วไปในตลาด (เช่น
        โทนิค เซลเซอร์ น้ำอัดลมเพื่อสุขภาพ)
    carbonation:
      name: ความซ่า
      description: อธิบายระดับหรือรูปแบบของการอัดแก๊สในเครื่องดื่ม (เช่น น้ำนิ่ง น้ำอัดลมเล็กน้อย
        น้ำอัดลม น้ำไนโตร)
    carburetor_barrel_count:
      name: จำนวนท่ออากาศในคาร์บูเรเตอร์
      description: ระบุจำนวนรู/บาร์เรลลิ้นปีกผีเสื้อในคาร์บูเรเตอร์
    carburetor_choke_type:
      name: ประเภทโช้กของคาร์บูเรเตอร์
      description: ระบุรูปแบบการทำงานของโช้กที่ใช้ในคาร์บูเรเตอร์
    carburetor_mounting_flange_type:
      name: ประเภทหน้าแปลนยึดคาร์บูเรเตอร์
      description: ระบุรูปแบบจุดยึดคาร์บูเรเตอร์ เพื่อให้แน่ใจว่าเข้ากันได้กับท่อไอดี/ท่อร่วมไอดี
        (เช่น แบบท่อสอดเข้า หรือหน้าแปลน/ยึดด้วยน็อต)
    card_binder_page_type:
      name: รูปแบบหน้าของแฟ้มเก็บไพ่
      description: 'สำหรับแฟ้ม/กระเป๋าเก็บไพ่: รูปแบบหน้าที่ใช้เก็บไพ่'
    card_box_holder_type:
      name: ประเภทกล่อง/ที่ใส่การ์ด
      description: ระบุรูปแบบการใช้งานของผลิตภัณฑ์สำหรับการรวบรวมหรือจัดเก็บการ์ดในงาน
        (เช่น กล่อง, กล่องแบบตู้จดหมาย, ตะกร้า, ขาตั้งใส่การ์ด)
    card_game_accessory_features:
      name: คุณสมบัติของอุปกรณ์เสริมเกมไพ่
      description: คุณสมบัติการใช้งานที่โดดเด่นของอุปกรณ์เสริมเกมไพ่
    card_lot_type:
      name: ประเภทล็อตไพ่
      description: ระบุว่าสินค้าเป็นการ์ดแบบแยกจำหน่ายทีละใบ หรือเป็นการขายแบบยกชุด/คละรวมหลายใบ
    card_sleeve_size_format_compatibility:
      name: ขนาดซองไพ่/ความเข้ากันได้กับรูปแบบไพ่
      description: ระบุขนาดไพ่ที่มีการออกแบบซองไพ่/หน้าไพ่/กล่องสำรับไพ่มาให้รองรับ
    carding_surface_pin_material:
      name: วัสดุของซี่หวีสำหรับสาง
      description: วัสดุสำหรับทำเข็ม/ฟันที่ใช้สำหรับสางและคลายเส้นใย
    care_durability:
      name: ความทนทานต่อการดูแลรักษา
      description: ระบุถึงความทนทานต่อการซัก/ความร้อนของป้ายชื่อหลังจากติดแล้ว
    care_label_attachment_type:
      name: ประเภทการติดป้ายดูแลรักษา
      description: วิธีการออกแบบป้ายดูแลรักษาเพื่อติดลงบนสินค้า (เช่น เย็บติด, รีดร้อน/ถ่ายเทความร้อน,
        กาวแปะ)
    care_label_format:
      name: รูปแบบป้ายดูแลรักษา
      description: รูปแบบทางกายภาพ/สิ่งพิมพ์ของผลิตภัณฑ์ป้ายดูแลรักษา
    care_label_symbol_system:
      name: ระบบสัญลักษณ์ฉลากการดูแลรักษา
      description: ชุดมาตรฐาน/สัญลักษณ์ที่ใช้กับฉลาก (เช่น สัญลักษณ์การดูแลรักษาตามมาตรฐาน
        ISO, สัญลักษณ์ ASTM/US)
    cargo_area_configuration:
      name: รูปแบบพื้นที่บรรทุกสินค้า
      description: ระบุรูปแบบโครงสร้างหรือพื้นที่บรรทุกสินค้าบนจักรยานขนส่ง (เช่น
        แบบท้ายยาว บรรทุกด้านหน้า หรือรถสามล้อ)
    cargo_net_adjustability:
      name: ความสามารถในการปรับระดับของตาข่ายบรรทุกสินค้า
      description: ระบุว่าสามารถปรับความตึง/ความพอดีของตาข่ายคลุมสินค้าได้หรือไม่
        และปรับด้วยวิธีใด
    cargo_net_position:
      name: ตำแหน่งตาข่ายบรรทุกสินค้า
      description: ตำแหน่งที่จะติดตั้งหรือใช้งานตาข่ายในพื้นที่เก็บสัมภาระท้ายรถ/ห้องเก็บสัมภาระ
    cargo_net_stretch_type:
      name: ตาข่ายบรรทุกสินค้าแบบยืดหยุ่น
      description: ตาข่ายคลุมสัมภาระท้ายรถนั้นเป็นแบบยืดหยุ่นได้หรือแบบตายตัวไม่ยืดหยุ่น
    cargo_net_style:
      name: รูปแบบตาข่ายบรรทุกสินค้า
      description: ระบุรูปแบบโครงสร้างหรือสไตล์การออกแบบตาข่ายคลุมสินค้า (เช่น สายรัดยางยืด
        สายรัด แบบกั้น หรือแบบเปล)
    cargo_rack_finish:
      name: การตกแต่งพื้นผิวแร็คบรรทุกสัมภาระ
      description: การตกแต่งผิวภายนอก/การเคลือบชั้นวางสินค้า
    carpet_cleaner_application_method:
      name: วิธีใช้น้ำยาทำความสะอาดพรม
      description: ระบุวิธีการที่ต้องการใช้และขัดถูผลิตภัณฑ์ลงบนพรม (นอกเหนือจากรูปแบบทั่วไป)
    carrier_style:
      name: รูปแบบการขนส่ง
      description: กลไก/รูปแบบการขนส่งที่ใช้ในการรองรับเรือบนยานยนต์
    carrot_size:
      name: ขนาดแครอท
      description: จำแนกขนาดโดยทั่วไปของสินค้าแครอท
    carrot_variety:
      name: สายพันธุ์แครอท
      description: ระบุพันธุ์หรือสายพันธุ์เฉพาะของแครอท
    carrying_capacity_pairs_boards:
      name: ความจุในการบรรทุก (คู่/แผ่น)
      description: ระบุจำนวนสกี (คู่) หรือสโนว์บอร์ดที่อุปกรณ์เสริมรองรับหรือออกแบบมาเพื่อรองรับเมื่อใช้ร่วมกับแร็ค
        (เช่น ชุดต่อขยาย)
    cartridge_thread_compatibility:
      name: ความเข้ากันได้ของเกลียวตลับ
      description: ระบุมาตรฐานเกลียวที่เครื่องพ่นไอน้ำหรือแบตเตอรี่รองรับ เพื่อให้มั่นใจว่าตลับและแบตเตอรี่เข้ากันได้พอดี
    case_capacity_butts_shafts:
      name: ความจุของกล่อง (ด้ามไม้คิว × ไม้ชาฟท์)
      description: ระบุจำนวนด้ามคิวและส่วนปลายที่สามารถใส่ลงกล่องได้ โดยแสดงในรูปแบบด้ามคูณส่วนปลาย
        (เช่น 2x4 = 2 ด้ามและ 4 ส่วนปลาย)
    case_features:
      name: คุณสมบัติของเคส
      description: เน้นคุณสมบัติการใช้งานของเคสสำหรับใส่ฉาบ/กลองชุดที่เกี่ยวข้องกับการป้องกันและการขนส่ง
    case_humidifier_refill_type:
      name: ประเภทการเติมสารเพิ่มความชื้นสำหรับกล่อง
      description: ระบุว่าเครื่องเพิ่มความชื้นใช้สารเพิ่มความชื้นแบบนำกลับมาใช้ใหม่ได้
        (สามารถทำให้เปียก/ฟื้นฟูสภาพได้) หรือแบบใช้แล้วทิ้ง
    case_lining_material:
      name: วัสดุบุภายในเคส
      description: ระบุวัสดุหลักที่บุอยู่ด้านในเคสหรือกระเป๋าใส่เครื่องดนตรี ซึ่งสัมผัสและปกป้องเครื่องดนตรีหรือสิ่งของภายใน
    case_material:
      name: วัสดุตัวเรือน
      description: ระบุวัสดุหลักของตัวเรือนนาฬิกา ซึ่งมีผลต่อความทนทาน น้ำหนัก และความสวยงาม
    case_mounting_method:
      name: วิธีการติดตั้งเคสเครื่องดนตรี
      description: วิธีการวางตำแหน่งหรือติดตั้งเครื่องเพิ่มความชื้นภายในเคสเครื่องดนตรี
    case_structure:
      name: โครงสร้างตัวเคส
      description: ระบุความแข็งแรงของโครงสร้างเคส
    case_style_cymbal_drum:
      name: รูปแบบเคส (ฉาบ/กลอง)
      description: ระบุว่าสินค้าเป็นกระเป๋าแบบนุ่ม กระเป๋าแบบแข็ง หรือแบบผสมผสาน สำหรับขนส่งฉาบหรือชุดกลอง
    casing_material:
      name: วัสดุที่ใช้ทำโครงยาง
      description: ระบุวัสดุหลักที่ใช้ในการผลิตโครงยาง ซึ่งส่งผลต่อน้ำหนัก ความรู้สึกในการขับขี่
        และป้องกันการเจาะทะลุ
    casino_set_chip_material:
      name: วัสดุที่ใช้ทำชิปในชุดคาสิโน
      description: วัสดุหลักของชิปที่รวมอยู่ในชุด (ถ้ามี)
    casino_set_layout_included:
      name: เลย์เอาต์การเล่นเกมคาสิโนที่รวมมาในชุด
      description: ระบุว่ามีแผนผัง/เลย์เอาต์การเล่นเกมประเภทใดบ้างที่รวมอยู่ในชุด
    cask_finish:
      name: การบ่มในถังไม้โอ๊ค
      description: ระบุถังไม้โอ๊คที่ใช้ในการบ่มสุราหรือปรับแต่งให้มีรสชาติดีขึ้น เช่น
        ถังไม้โอ๊คที่เคยใช้บ่มเหล้าเบอร์เบิน หรือถังไม้โอ๊คที่เคยใช้บ่มเหล้าเชอร์รี่
    cassava_variety:
      name: พันธุ์มันสำปะหลัง
      description: ระบุสายพันธุ์หรือพันธุ์เฉพาะของมันสำปะหลังที่นำเสนอ ซึ่งส่งผลต่อรสชาติ
        สี และคุณสมบัติในการปรุงอาหาร
    cassette_body_type:
      name: ประเภทตัวเฟืองหลัง
      description: มาตรฐานโม่หรือไดรเวอร์ที่ดุมล้อหลังหรือล้อรองรับ (เช่น HG 11, XDR,
        Microspline)
    cassette_deck_feature_set:
      name: ชุดคุณสมบัติของเครื่องเล่นเทปคาสเซ็ตต์
      description: แสดงคุณสมบัติการขับเคลื่อนและการเล่นเทปคาสเซ็ตต์ที่พบได้ทั่วไปในเครื่องเล่นเทปคาสเซ็ตต์แบบติดตั้งในแผงหน้าปัด
    cassette_speed_compatibility:
      name: ความเข้ากันได้ของความเร็วเฟืองหลัง
      description: ระบุจำนวนสปีด (เช่น 7 สปีด, 12 สปีด) ที่มีการออกแบบเฟืองหลังหรือเฟืองอิสระมาให้ใช้งานร่วมกันได้
        เพื่อให้เข้ากันได้กับโซ่ คันเกียร์ และตีนผี
    castanet_shell_size_class:
      name: คลาสขนาดของกรับสเปน
      description: ขนาดมาตรฐานของตัวกรับ ที่ผู้เล่น/ครูใช้กันทั่วไปในการเลือกขนาดที่พอดีและเสียง
    castanets_included_pieces:
      name: อุปกรณ์ที่รวมมากับกรับสเปน
      description: ระบุสิ่งที่รวมอยู่ในข้อเสนอสินค้า (ขายเป็นคู่หรือเดี่ยว หรือรวมอุปกรณ์เสริมหรือไม่)
    castanets_pitch:
      name: ระดับเสียงของกรับสเปน
      description: ระบุป้ายระดับเสียง/ขนาดโดยทั่วไปที่ผู้ผลิตใช้เพื่ออธิบายช่วงเสียง
    castanets_type:
      name: ประเภทกรับสเปน
      description: ระบุรูปแบบของกรับสเปนหรือประเภทการใช้งานที่ตั้งใจไว้
    caster_type:
      name: ประเภทล้อเลื่อน
      description: ระบุรูปแบบของล้อเลื่อนที่ติดตั้งบนรถเข็น (เช่น ล้อหมุนได้ ล้อล็อค)
        ซึ่งส่งผลต่อความคล่องตัวและความมั่นคง
    castle_playset_included_items:
      name: รายการชิ้นส่วนที่รวมอยู่ในชุดของเล่นปราสาท
      description: แสดงส่วนประกอบหลักที่รวมอยู่ในชุดของเล่นปราสาท เพื่อให้ผู้ซื้อสามารถเปรียบเทียบชุดต่างๆ
        ได้ (เช่น ฟิกเกอร์ เฟอร์นิเจอร์ ยานพาหนะ อุปกรณ์เสริม)
    catcher_equipment_included:
      name: อุปกรณ์สำหรับผู้รับลูกเบสบอล
      description: ระบุส่วนประกอบที่รวมอยู่ในชุดอุปกรณ์สำหรับผู้รับลูกเบสบอล เช่น
        หมวกกันน็อคหรืออุปกรณ์ป้องกันหน้าอก
    catcher_helmet_style:
      name: รูปแบบหมวกของแคชเชอร์
      description: ระบุรูปแบบการออกแบบโดยรวมของอุปกรณ์ป้องกันศีรษะสำหรับผู้รับลูกเบสบอล
    cattle_breed:
      name: สายพันธุ์วัว
      description: ระบุสายพันธุ์ของโคที่ใช้ในการผลิตเนื้อวัว (เช่น แองกัส วากิว เฮเรฟอร์ด)
    cauliflower_variety:
      name: สายพันธุ์ดอกกะหล่ำ
      description: ระบุสายพันธุ์ สี หรือชนิดพิเศษของดอกกะหล่ำที่จำหน่าย
    celery_form:
      name: รูปแบบขึ้นฉ่ายฝรั่ง
      description: ระบุรูปแบบทางกายภาพหรือรูปแบบการตัดแต่งขึ้นฉ่ายที่จำหน่าย
    celery_variety:
      name: พันธุ์ขึ้นฉ่าย
      description: บันทึกพันธุ์ปลูกหรือสายพันธุ์เฉพาะของขึ้นฉ่ายฝรั่ง เพื่อให้นักช้อปสามารถเลือกตามโปรไฟล์รสชาติ
        สี หรือการใช้เพื่อปรุงอาหาร
    cereal_bar_texture:
      name: เนื้อสัมผัสของซีเรียลบาร์
      description: อธิบายถึงความรู้สึกในปากและความหนาแน่นของซีเรียลบาร์ (เช่น เหนียว
        นุ่ม กรอบ)
    cereal_type:
      name: ประเภทซีเรียล
      description: จำแนกรูปร่างหรือรูปแบบของซีเรียลหรือกราโนลา (เช่น เกล็ด, พัฟ, กราโนลาคลัสเตอร์,
        มูสลี่ ฯลฯ) เพื่อช่วยให้ผู้ซื้อหาเนื้อสัมผัสหรือวิธีการเตรียมที่ต้องการได้ง่ายขึ้น
    certificate_border_style:
      name: รูปแบบกรอบใบรับรอง
      description: อธิบายลักษณะการตกแต่งขอบที่ใช้กับใบรับรอง
    certificate_personalization_type:
      name: ประเภทการปรับแต่งใบรับรอง
      description: ระบุวิธีการปรับแต่งใบรับรอง (แบบว่างสำหรับเขียนด้วยลายมือ, แม่แบบสำหรับพิมพ์,
        แบบพิมพ์ล่วงหน้าพร้อมช่องกรอกข้อมูลที่เปลี่ยนแปลงได้ ฯลฯ)
    certification_service:
      name: บริการออกใบรับรอง
      description: บริษัทตรวจสอบ/รับรองคุณภาพจากภายนอก (ถ้ามี)
    certification_standard:
      name: มาตรฐานการรับรอง
      description: ระบุมาตรฐานการรับรองด้านความปลอดภัยและการทนไฟ หรือมาตรฐานการปฏิบัติตามข้อกำหนดที่ผ้าคลุมหน้าได้รับการจัดอันดับให้ตรงตามนั้น
    chain_coating_finish:
      name: การเคลือบ/การตกแต่งผิวโซ่
      description: ระบุการเคลือบหรือตกแต่งพื้นผิวที่ใช้กับโซ่เพื่อเพิ่มความทนทาน ลดแรงเสียดทาน
        ป้องกันการกัดกร่อน หรือเปลี่ยนรูปลักษณ์ (เช่น ไทเทเนียมไนไตรด์, DLC, นิกเกิล,
        EPT ป้องกันสนิม)
    chain_connection_type:
      name: ประเภทการเชื่อมต่อโซ่
      description: ระบุวิธีการล็อกเพื่อเชื่อมต่อปลายโซ่เข้าด้วยกัน
    chain_tier_configuration:
      name: การจัดระดับชั้นของโซ่
      description: ระบุจำนวน/การจัดเรียงชั้นของโซ่ในชุดจับยึด (ชั้นเดียว สองชั้น หรือสามชั้น)
    chain_tool_type:
      name: ประเภทเครื่องมือโซ่
      description: จำแนกประเภทของเครื่องมือถอดโซ่จักรยานอย่างละเอียด เพื่อให้ผู้ซื้อสามารถหาอุปกรณ์ที่ถูกต้องได้อย่างรวดเร็ว
    chainring_shape:
      name: รูปทรงของจานหน้า
      description: ระบุรูปทรงของจานหน้า เช่น วงกลม หรือวงรี/วงรีเชิงกล
    chair_accessories_included:
      name: อุปกรณ์เสริมที่รวมอยู่ในชุดเก้าอี้
      description: ระบุรายการอุปกรณ์เสริมที่ติดตั้งมาในตัวหรือรวมอยู่ในชุด ซึ่งช่วยเพิ่มฟังก์ชันการใช้งานของเก้าอี้
    chair_sash_care_instructions:
      name: คำแนะนำการดูแลรักษาผ้าคาดเก้าอี้
      description: อธิบายวิธีการทำความสะอาด/บำรุงรักษาผ้าคาดเก้าอี้ที่แนะนำ
    chair_sash_finish:
      name: ลักษณะพื้นผิวของผ้าคาดเก้าอี้
      description: อธิบายลักษณะความเงา/พื้นผิวของผ้าคาดเก้าอี้
    chair_storage_design:
      name: การออกแบบที่จัดเก็บเก้าอี้
      description: ระบุวิธีการจัดเก็บเก้าอี้ผ้าใบ (เช่น พับได้ วางซ้อนกันได้ ไม่สามารถพับได้)
        เพื่อช่วยให้ลูกค้าประเมินการจัดเก็บและการพกพาได้สะดวก
    chaise_or_sectional_orientation:
      name: การจัดวางส่วนที่เป็นเก้าอี้เอนหรือส่วนต่อขยาย
      description: ระบุด้านที่เก้าอี้เอนหรือส่วนต่อขยายอยู่เมื่อหันหน้าเข้าหาโซฟา
    chamber_size:
      name: ขนาดโพรงภายในปากเป่า
      description: ระบุขนาด/ปริมาตรของโพรงภายในปากเป่า ซึ่งมีผลต่อแรงต้านลมและโทนเสียง
    chanter_finger_spacing:
      name: ระยะห่างระหว่างนิ้วบนตัวเป่า
      description: ระบุระยะห่าง/ขนาดของนิ้วที่ใช้กดเครื่องดนตรีประเภทเป่า (มักอธิบายว่าเป็นแบบมาตรฐาน
        สำหรับมือเล็ก หรือสำหรับมือใหญ่)
    chanter_type:
      name: ประเภทชานเตอร์
      description: รูปแบบ/โครงสร้างของแชนเตอร์ที่รวมมากับเครื่องดนตรี (หรือที่เครื่องดนตรีใช้)
        เช่น แบบปลายเปิด ปลายปิด สำหรับฝึกหัด หรือแบบมีคีย์
    chard_variety:
      name: สายพันธุ์ผักชาร์ด
      description: ระบุสายพันธุ์หรือสีเฉพาะของผักชาร์ดที่จำหน่าย
    charging_port_location:
      name: ตำแหน่งพอร์ตชาร์จไฟ
      description: ตำแหน่งทางกายภาพของช่องเสียบชาร์จหลักภายนอกของรถยนต์ (พอร์ตชาร์จ)
    chassis_construction_type:
      name: ประเภทโครงสร้างแชสซี
      description: อธิบายวิธีการสร้างโครงสร้างแชสซีหลักที่ใช้สำหรับยานพาหนะ
    checkbook_loading_orientation:
      name: ทิศทางการใส่เช็คในปกสมุดเช็ค
      description: ระบุว่าปกสมุดเช็คนี้ใช้ได้กับเช็คแบบใส่จากด้านบน ใส่จากด้านข้าง
        หรือแบบทั่วไป
    cheekpiece_style:
      name: รูปแบบของห่วงแก้มบังเหียน
      description: อธิบายประเภทของห่วงแก้ม/ห่วงบนบังเหียนแบบสแนฟเฟิล ซึ่งเป็นตัวกำหนดการทำงานของบังเหียนและความมั่นคงด้านข้าง
    cheese_alternative_form:
      name: รูปแบบผลิตภัณฑ์ทดแทนชีส
      description: ระบุรูปแบบหรือลักษณะการตัดที่ใช้ในการจำหน่ายผลิตภัณฑ์ทดแทนชีส
    cheese_form:
      name: รูปแบบของชีส
      description: อธิบายรูปแบบทางกายภาพของสินค้าชีส (เช่น วงกลม ก้อน หั่นแผ่น หรือขูดฝอย)
    cheese_texture:
      name: เนื้อสัมผัสของชีส
      description: จำแนกประเภทชีสตามเนื้อสัมผัสหรือความแน่นโดยทั่วไป
    cheese_variety:
      name: ชีสชนิดต่างๆ
      description: ระบุประเภทชีสที่ใช้เป็นส่วนผสมหลักในการปรุงแต่งรสชาติของขนมขบเคี้ยว
    cherimoya_variety:
      name: สายพันธุ์น้อยหน่าออสเตรเลีย
      description: ระบุสายพันธุ์/พันธุ์ย่อยเฉพาะของน้อยหน่าออสเตรเลีย (เช่น Fino de
        Jete, El Bumpo)
    cherry_variety:
      name: พันธุ์เชอร์รี่
      description: ระบุสายพันธุ์หรือพันธุ์ของเชอร์รี่ ช่วยให้ผู้ซื้อเลือกชนิดที่ต้องการได้ตามรสชาติ
        สี ขนาด หรือการนำไปใช้ในการประกอบอาหาร
    chest_pocket_style:
      name: รูปแบบกระเป๋าหน้าอก
      description: ระบุว่ามีกระเป๋าหน้าอกหรือไม่ และจัดวางอย่างไรบนเสื้อเชิ้ต
    chewing_tobacco_form:
      name: รูปแบบของยาสูบเคี้ยว
      description: ระบุรูปแบบทางกายภาพ รูปแบบการตัด หรือขนาดซองของผลิตภัณฑ์ยาสูบแบบเคี้ยว
        (เช่น แบบใบ ฉีกเป็นเส้นยาว หรือซองบาง)
    chicory_variety:
      name: สายพันธุ์ชิโครี่
      description: ระบุพันธุ์หรือสายพันธุ์เฉพาะของชิโครี่ที่จำหน่าย (เช่น ราดิชชิโอ,
        เอนไดฟ์เบลเยียม, เอสคาโรล)
    chiffon_recommended_use:
      name: การใช้งานผ้าชีฟองที่แนะนำ
      description: การใช้งานหลักที่แนะนำสำหรับการเย็บ/งานฝีมือสำหรับผ้าชีฟอง
    child_seat_accessory_type:
      name: ประเภทอุปกรณ์เสริมสำหรับเบาะนั่งเด็ก
      description: ระบุประเภทอุปกรณ์เสริมหรืออะไหล่สำหรับคาร์ซีทโดยเฉพาะ (เช่น เบาะรองนั่ง
        ที่วางเท้า หรืออะแดปเตอร์ยึดติด) เพื่อช่วยให้นักช้อปค้นหาได้ตรงจุดอย่างรวดเร็วโดยไม่ต้องสร้างหมวดหมู่ย่อยจำนวนมาก
    child_seat_mounting_type:
      name: ประเภทการติดตั้งที่นั่งเด็ก
      description: ระบุวิธีการติดตั้งที่นั่งเด็กสำหรับจักรยานเข้ากับเฟรม ตะแกรง หรือบริเวณแฮนด์
    chime_sound_character:
      name: ลักษณะเสียงกระดิ่ง
      description: อธิบายลักษณะเสียง/โทนเสียงของกระดิ่ง
    chin_cup_type:
      name: ประเภทของที่รองคาง
      description: ระบุรูปแบบหรือโครงสร้างของที่รองคาง ซึ่งส่งผลต่อความสบายและการป้องกันแรงกระแทก
    chin_strap_type:
      name: ประเภทสายรัดคาง
      description: ระบุประเภทของสายรัดคางของหมวก—ไม่มี, แบบติดตายตัว, แบบปรับได้ หรือแบบถอดได้—เพื่อช่วยให้ผู้ซื้อเลือกสไตล์ที่กระชับในสภาพอากาศที่มีลมแรงหรือขณะเคลื่อนไหว
    china_cymbal_edge_shape:
      name: รูปทรงขอบฉาบจีน
      description: อธิบายถึงรูปทรงขอบ/ปีกฉาบจีนโดยทั่วไป (ความโค้งของขอบ) ซึ่งส่งผลต่อสัมผัสและเสียง
    china_cymbal_sound_character:
      name: ลักษณะเสียงฉาบจีน
      description: คำอธิบายลักษณะเสียง/โทนเสียงหลักของฉาบจีนที่ใช้ในการค้นหาและคัดกรอง
        (เช่น เสียงหยาบ เสียงทึบ เสียงแหลม) อาจใช้ค่าได้หลายค่า
    chinstrap_type:
      name: แบบสายรัดคาง
      description: รูปแบบของสายรัดคางที่ให้มาพร้อมกับหมวกกันน็อค
    chip_cut_style:
      name: รูปแบบการตัดมันฝรั่งทอดแบบชิ้น
      description: ระบุรูปแบบการหั่นหรือพื้นผิวของมันฝรั่งทอด (เช่น แบบมีร่อง แบบทอดในหม้อใหญ่
        แบบป๊อปคอร์น)
    chip_denomination:
      name: มูลค่าชิป
      description: ชิปมูลค่าใดบ้างที่รวมอยู่ในชุด (พิมพ์ไว้หรือกำหนดไว้)
    chocolate_form:
      name: รูปแบบของช็อกโกแลต
      description: อธิบายถึงลักษณะทางกายภาพของช็อกโกแลตที่ใช้ในการทำขนมที่วางจำหน่าย
    choy_sum_variety:
      name: สายพันธุ์ผักกวางตุ้ง
      description: ระบุตลาดเฉพาะหรือสายพันธุ์ทางพฤกษศาสตร์ของผักกวางตุ้งที่จำหน่าย
    cigar_wrapper_color:
      name: สีของใบห่อซิการ์
      description: การจำแนกสีมาตรฐานของใบห่อซิการ์
    cigarette_filter_type:
      name: ประเภทไส้กรองบุหรี่
      description: ระบุว่าบุหรี่มีไส้กรองหรือไม่ และถ้ามี โครงสร้างหรือคุณสมบัติพิเศษของไส้กรองนั้นเป็นอย่างไร
    cigarette_size:
      name: ขนาดบุหรี่
      description: จำแนกประเภทบุหรี่ตามความยาวหรือรูปแบบมาตรฐานของอุตสาหกรรม (เช่น
        คิงไซส์, 100s, สลิม)
    cigarette_strength_descriptor:
      name: ตัวระบุระดับความเข้มของบุหรี่
      description: ป้ายระบุระดับความเข้มที่ใช้ในการตลาดซึ่งแบรนด์ใช้มาตั้งแต่ดั้งเดิมเพื่อบ่งบอกความเข้มข้นของทาร์/นิโคติน
        (เช่น ไลท์ โบลด์ หรือซิลเวอร์)
    cinch_liner_material:
      name: วัสดุซับในของสายรัด
      description: ระบุวัสดุที่ใช้ทำซับในหรือบุรองภายในที่สัมผัสกับตัวม้าโดยตรง
    circular_knitting_needle_cable_type:
      name: ประเภทสายเคเบิลของไม้นิตติ้งแบบวงกลม
      description: วัสดุ/ลักษณะและโครงสร้างของสายเคเบิล (เช่น เหล็กเคลือบ ไนลอน) มีผลต่อการคืนตัว/การบิดงอ
        และการหมุนของสายเคเบิล
    circular_knitting_needles_tip_material:
      name: วัสดุสำหรับปลายไม้นิตติ้งแบบวงกลม
      description: วัสดุปลายเข็มทั้งสองด้าน (ซึ่งแยกจากวัสดุสายเคเบิล)
    circumference_adjustment_mechanism:
      name: กลไกปรับเส้นรอบวง
      description: กลไกที่ใช้ปรับหรือล็อกเส้นรอบวงของไจด้าย/กลุ่มไหมพรม
    clamp_design:
      name: การออกแบบแคลมป์
      description: อธิบายถึงรูปแบบโครงสร้างหรือกลไกของแคลมป์
    clamp_sheet_music_clip_features:
      name: คุณสมบัติของคลิปหนีบโน้ตเพลง
      description: คุณสมบัติการใช้งานและการป้องกันของคลิปหนีบโน้ตเพลง (เช่น แผ่นรองกันกระแทก
        กันลื่น หมุนได้)
    clamping_closure_type:
      name: ประเภทการหนีบ/การปิด
      description: ระบุกลไกที่ใช้ในการขันหรือยึดห่วงปักผ้าให้แน่นรอบผ้า
    clarinet_bell_acoustic_design:
      name: การออกแบบอะคูสติกของปากลำโพงคลาริเน็ต
      description: อธิบายการออกแบบด้านเสียง/การระบายอากาศของปากลำโพง ที่มีผลต่อการตอบสนองและความเที่ยงตรงของระดับเสียง
    clarinet_bell_adjustment_mechanism:
      name: กลไกการปรับปากลำโพงคลาริเน็ต
      description: อธิบายวิธีการปรับความยาว/รูปทรงของปากลำโพง
    clarinet_bell_ring_material:
      name: วัสดุที่ใช้ทำวงแหวนขอบปากลำโพงคลาริเน็ต
      description: ระบุวัสดุของวงแหวน/แถบป้องกันที่ขอบปากลำโพงคลาริเน็ต หากมี
    clarinet_bell_tuning_effect:
      name: เอฟเฟกต์การปรับเสียงของปากลำโพงคลาริเน็ต
      description: ระบุว่าออกแบบปากลำโพงมาให้มีผลต่อการตั้งเสียง/ความเที่ยงตรงของระดับเสียงอย่างไร
        (โดยเฉพาะเสียงช่วงคอและเสียงย่านต่ำ) เมื่อเทียบกับปากลำโพงมาตรฐาน
    clarinet_body_type:
      name: ประเภทตัวเครื่องคลาริเน็ต
      description: ระบุประเภทโครงสร้างตัวเครื่องหลักสำหรับคลาริเน็ตตระกูล A
    clarinet_bore_type:
      name: ประเภทท่อลมด้านในของคลาริเน็ต
      description: อธิบายถึงการออกแบบท่อลมด้านในของอัลโตคลาริเน็ต
    clarinet_cap_style:
      name: รูปแบบฝาครอบคลาริเน็ต
      description: รูปแบบการออกแบบฝาครอบที่มาพร้อมกับสายรัดลิ้นคลาริเน็ตและ/หรือฝาครอบปากเป่า
        (เช่น แบบกลับหัว หรือแบบมีรูระบายอากาศ)
    clarinet_care_kit_intended_use:
      name: วัตถุประสงค์การใช้งานชุดอุปกรณ์ดูแลรักษาคลาริเน็ต
      description: บริบทการใช้งานหลักที่มีการออกแบบชุดอุปกรณ์มา (เช่น การอบแห้งอย่างรวดเร็วในแต่ละวัน
        หรือการทำความสะอาดแบบล้ำลึก/การบำรุงรักษา)
    clarinet_included_accessories:
      name: อุปกรณ์เสริมที่มาพร้อมกับคลาริเน็ต
      description: ระบุสิ่งของที่มีมาในกล่องพร้อมกับบีแฟลตคลาริเน็ต
    clarinet_keywork_material:
      name: วัสดุที่ใช้ทำกลไกคีย์ของคลาริเน็ต
      description: ระบุวัสดุกลไกคีย์ของคลาริเน็ต (เช่น ทองเหลือง นิกเกิลซิลเวอร์ หรือชุบเงิน)
    clarinet_keywork_plating:
      name: การชุบผิวกลไกคีย์ของคลาริเน็ต
      description: ระบุการชุบ/การตกแต่งวัสดุกลไกคีย์ของคลาริเน็ต
    clarinet_mouthpiece_baffle_profile:
      name: โปรไฟล์ของแผ่นกั้นในปากเป่าคลาริเน็ต
      description: อธิบายถึงรูปทรงของแผ่นสะท้อนอากาศ/หลังคาด้านในของปากเป่าคลาริเน็ต
        ซึ่งมีผลต่อความสว่างและการพุ่งของเสียง
    clarinet_mouthpiece_beak_shape:
      name: รูปทรงของปลายปากเป่าคลาริเน็ต
      description: ระบุรูปทรง/มุมของจงอยปากด้านนอกเพื่อความสบายของผู้เล่นและความรู้สึกในการเป่า
    clarinet_mouthpiece_chamber_size:
      name: ขนาดโพรงภายในปากเป่าคลาริเน็ต
      description: อธิบายขนาดโพรงในปากเป่าคลาริเน็ต (ตามที่ผู้ผลิตกำหนด) ซึ่งมีผลต่อสีสันโทนเสียงและแรงต้านในการเป่า
    clarinet_mouthpiece_intended_tone:
      name: ลักษณะเสียงที่คาดหวังของปากเป่าคลาริเน็ต
      description: อธิบายเป้าหมายโทนเสียงโดยรวมที่ผู้ผลิตใช้ทำการตลาดสำหรับปากเป่า
    clarinet_mouthpiece_player_level:
      name: ระดับผู้เล่นสำหรับปากเป่าคลาริเน็ต
      description: ระบุระดับผู้ใช้งานเป้าหมายทั่วไปสำหรับปากเป่า
    clarinet_reed_cut:
      name: รูปทรงของลิ้นคลาริเน็ต
      description: ระบุรูปแบบการตัด/โปรไฟล์ของลิ้น (เช่น แบบตะไบหรือไม่ตะไบ และรูปแบบการตัดอื่นๆ
        ที่ใช้ในการตลาด) ซึ่งส่งผลต่อการตอบสนองและโทนเสียง
    clarinet_reed_material_type:
      name: ประเภทวัสดุทำลิ้นคลาริเน็ต
      description: ระบุว่าลิ้นทำมาจากอะไร (อ้อย เทียบกับ วัสดุสังเคราะห์ และชนิดย่อยของวัสดุสังเคราะห์ทั่วไป)
    clarinet_thumb_rest_type:
      name: ประเภทของที่วางนิ้วโป้งสำหรับคลาริเน็ต
      description: ประเภท/คุณลักษณะของที่วางนิ้วโป้งสำหรับมือขวา
    classical_guitar_string_3rd_string_type:
      name: ประเภทสายกีตาร์คลาสสิกสายที่ 3
      description: สาย G (สายที่ 3) เป็นแบบเส้นเดี่ยว (โมโนฟิลาเมนต์) หรือแบบพันเกลียว
    classical_guitar_string_bass_winding_material:
      name: วัสดุที่ใช้พันสายเบสของกีตาร์คลาสสิก
      description: วัสดุที่ใช้หุ้ม/พันรอบแกนสายเบสกีตาร์คลาสสิก (โดยทั่วไปคือสายที่
        4-6)
    classical_guitar_string_set_configuration:
      name: การจัดประเภทชุดสายกีตาร์คลาสสิก
      description: ระบุว่าสินค้าเป็นสายแบบครบชุด หรือเป็นสายที่เฉพาะเจาะจง (โดยทั่วไปคือฝั่งเสียงแหลมหรือฝั่งเสียงทุ้ม)
        สำหรับกีตาร์คลาสสิก
    clay_modeling_dough_base_material:
      name: วัสดุพื้นฐานสำหรับปั้นดินเหนียวและแป้งปั้น
      description: สูตรพื้นฐาน/ประเภทพื้นฐานของวัสดุสำหรับการสร้างแบบจำลอง
    clay_modeling_dough_curing_method:
      name: วิธีการอบดินเหนียวและแป้งปั้น
      description: ลักษณะการคงสภาพ/แข็งตัวของวัสดุ (หรือสามารถนำกลับมาใช้ซ้ำได้) ซึ่งมีผลต่อเครื่องมือที่ต้องใช้และกรณีการใช้งานทั่วไป
    clay_paintability:
      name: ความสามารถในการทาสีของดินเหนียว
      description: ระบุว่าพื้นผิวของดินเหนียวที่แห้งแล้วสามารถทาสีได้หรือไม่ และแนะนำสีประเภทใด
    clay_primary_composition:
      name: องค์ประกอบหลักของดินเหนียว
      description: วัสดุพื้นฐาน/ตัวประสานหลักของดินปั้นแบบแห้งเอง (เช่น ผสมเยื่อกระดาษ
        หรือแบบแร่ธาตุ)
    clay_shooting_discipline:
      name: ประเภทกีฬายิงเป้าบิน
      description: ระบุประเภทกีฬายิงเป้าบิน หรือรายการแข่งขันที่สามารถนำสินค้านี้ไปใช้
    cleaner_format:
      name: รูปแบบผลิตภัณฑ์ทำความสะอาด
      description: รูปแบบบรรจุภัณฑ์ของผลิตภัณฑ์ทำความสะอาดสไลด์
    cleaner_sanitizer_intended_area:
      name: พื้นที่ที่ต้องการใช้ผลิตภัณฑ์ทำความสะอาด/ฆ่าเชื้อ
      description: ส่วนหลักของเครื่องดนตรีทองเหลืองที่ผลิตภัณฑ์นี้ออกแบบมาเพื่อทำความสะอาด/ฆ่าเชื้อ
    cleaning_formula:
      name: สูตรทำความสะอาด
      description: ระบุกลุ่มสารเคมีหลักในการทำความสะอาด/ฆ่าเชื้อของสินค้า (ไม่ใช่แบรนด์)
        เพื่อรองรับการกรองด้านความปลอดภัย ความเข้ากันได้ และการใช้งาน
    cleaning_task_focus:
      name: ประเภทของงานทำความสะอาด
      description: ระบุปัญหาการทำความสะอาดหลักที่การล้างแบบไม่ใช้น้ำมุ่งแก้ไข
    cleanup_method:
      name: วิธีการทำความสะอาด
      description: ระบุวิธีการทำความสะอาดกาว (ขณะที่ยังเปียกอยู่) จากมือ/เครื่องมือ/พื้นผิวต่างๆ
    clear_glue_application_method:
      name: วิธีการทากาวใส
      description: ระบุรูปแบบหัวจ่าย/หัวทาที่มาพร้อมกับบรรจุภัณฑ์กาวใส
    clear_glue_finish_after_drying:
      name: ลักษณะผิวของกาว (หลังแห้ง)
      description: อธิบายลักษณะของกาวหลังจากแห้ง/แข็งตัวแล้ว (เช่น ใสเหมือนคริสตัลหรือโปร่งแสง,
        เงาหรือด้าน)
    cleat_bolt_pattern:
      name: รูปแบบรูยึดแผ่นคลีท
      description: ระบุรูปแบบรูยึดที่ใช้ในการติดตั้งคลีทกับบันไดจักรยาน ซึ่งเป็นตัวกำหนดความเข้ากันได้ระหว่างบันไดและรองเท้า
        (เช่น จักรยานเสือภูเขาแบบ 2 รู เทียบกับจักรยานถนนแบบ 3 รู)
    cleat_compatibility:
      name: ความเข้ากันได้ของคลีท
      description: ระบุว่าปลอกรองเท้าใช้ได้กับบันไดหรือระบบคลีทแบบใด
    cleat_finish:
      name: การตกแต่งผิวตัวยึดเชือกเทียบท่า
      description: ระบุการตกแต่งผิว/การเคลือบผิวของตัวยึดเชือกเทียบท่า ซึ่งส่งผลต่อความต้านทานการกัดกร่อนและรูปลักษณ์
    cleat_receptacle_system:
      name: ระบบรองรับแผ่นคลีทของรองเท้า
      description: ระบุอินเทอร์เฟซการยึดปุ่ม/คลีทที่ใช้งานร่วมกับรองเท้ากอล์ฟแบบมีปุ่มได้
    cleat_release_mechanism:
      name: กลไกการปลดคลีท
      description: ระบุวิธีการปลดคลีทจักรยานออกจากบันได (เช่น การปลดแบบทิศทางเดียว
        หรือการปลดแบบหลายทิศทาง)
    cleat_stud_type:
      name: ประเภทปุ่มสตั๊ด
      description: ระบุโครงสร้างหรือรูปแบบการติดตั้งของปุ่มสตั๊ดบนพื้นรองเท้าของรองเท้าอเมริกันฟุตบอล
    climate_control_module_function:
      name: ฟังก์ชันของโมดูลควบคุมสภาพอากาศ
      description: ระบุบทบาทหลักของโมดูลในระบบปรับอากาศของรถยนต์
    climbing_hold_mounting_type:
      name: ประเภทการติดตั้งที่จับปีนเขา
      description: ระบุวิธีการยึดอุปกรณ์ปีนผนังเข้ากับผนังหรือแผ่นฝึกซ้อม
    climbing_hold_type:
      name: ประเภทของหินปีนผาจำลอง
      description: จำแนกประเภทตามรูปทรงหรือรูปแบบอุปกรณ์ปีนผนัง ซึ่งเป็นตัวกำหนดวิธีการจับยึด
    climbing_protection_device_type:
      name: ประเภทของอุปกรณ์ป้องกันในการปีนเขา
      description: ระบุรูปแบบของอุปกรณ์ป้องกันการปีนเขา (เช่น แคม, น็อต, พีทอน) ช่วยให้นักปีนเขาเลือกอุปกรณ์ที่เหมาะสมกับลักษณะหินหรือรูปแบบการปีนเขาได้อย่างรวดเร็ว
    climbing_rope_middle_marking:
      name: การทำเครื่องหมายกึ่งกลางเชือกปีนเขา
      description: อธิบายวิธีการระบุจุดกึ่งกลาง (และ/หรือปลายเชือก) เพื่อช่วยในการโรยตัวและลดระดับอย่างปลอดภัย
    climbing_rope_treatment:
      name: การดูแลรักษาเชือกปีนเขา
      description: ระบุถึงสารเคลือบกันน้ำ กันความชื้น หรือสารป้องกันใดๆ ที่ใช้กับปลอกและ/หรือแกนของเชือก
    climbing_rope_type:
      name: ประเภทของเชือกปีนเขา
      description: จัดประเภทเชือกตามการรับรอง UIAA และการใช้งานที่ตั้งใจไว้ (เช่น
        เชือกไดนามิกแบบเดี่ยว แบบครึ่ง แบบคู่ เชือกคงที่ หรือเชือกเสริม) ช่วยให้นักช้อปค้นหาเชือกที่เหมาะกับกิจกรรมได้อย่างรวดเร็ว
    climbing_safety_certifications:
      name: การรับรองความปลอดภัยสำหรับอุปกรณ์ปีนเขา
      description: แสดงรายการมาตรฐานความปลอดภัยในการปีนเขาและอุตสาหกรรมที่อุปกรณ์นั้นผ่านมาตรฐาน
    clip_color:
      name: สีของคลิปหนีบ
      description: สีหลักของคลิปหนีบโน้ตเพลง
    clip_mechanism_type:
      name: ประเภทกลไกการหนีบ
      description: ระบุกลไกการยึดที่ใช้ในคลิปเงินหรือกระเป๋าคลิปเงิน เพื่อช่วยให้นักช้อปเลือกประเภทที่เหมาะสม
        เช่น แบบแม่เหล็ก สปริงบาร์ คันโยก หรือรูปแบบอื่นๆ
    clip_style:
      name: รูปแบบคลิป
      description: ระบุกลไกคลิปเฉพาะที่ใช้สำหรับติดตั้งที่ยึด เพื่อบ่งบอกความเข้ากันได้
        (เช่น คลิปจระเข้ คาราบิเนอร์)
    clipper_motor_technology:
      name: เทคโนโลยีมอเตอร์ของเครื่องตัดผม
      description: ระบุการออกแบบมอเตอร์ที่ใช้ในเครื่องตัดผม ซึ่งส่งผลต่อกำลังขับ เสียง
        ความทนทาน และการบำรุงรักษา
    closet_configuration:
      name: รูปแบบการจัดวางตู้เสื้อผ้า
      description: อธิบายรูปทรงหรือเค้าโครงโดยรวมของระบบตู้เสื้อผ้าแบบวอล์กอิน (เช่น
        รูปตัว L, รูปตัว U, แบบเกาะกลาง)
    closing_mechanism:
      name: กลไกการปิด
      description: ระบุรูปแบบการปิดลิ้นชัก เช่น แบบปกติ แบบนุ่มนวล แบบปิดเอง หรือแบบกดเปิด
    cloth_construction:
      name: โครงสร้างของผ้า
      description: บ่งบอกถึงลักษณะการทอหรือการตกแต่งของผ้า ซึ่งส่งผลต่อความเร็วและความทนทาน
        (เช่น ผ้าขนสัตว์แบบ Worsted เทียบกับผ้าขนสัตว์แบบ Woolen)
    cloth_thickness:
      name: ความหนาของผ้า
      description: ระบุระดับความหนา/น้ำหนักของผ้าขัดเงา
    club_head_material:
      name: วัสดุหัวไม้กอล์ฟ
      description: ระบุวัสดุหลักที่ใช้ในการผลิตหัวไม้กอล์ฟ
    clutch_hydraulic_system_type:
      name: ประเภทระบบไฮดรอลิกคลัตช์
      description: ระบุความเข้ากันได้ของระบบสั่งงานคลัตช์/ระบบไฮดรอลิก (เช่น คลัตช์ไฮดรอลิก
        หรือการแปลงจากระบบสายสลิง)
    clutch_line_connection_type:
      name: ประเภทการเชื่อมต่อสายคลัตช์
      description: ระบุอินเทอร์เฟซการเชื่อมต่อ/ข้อต่อส่วนปลายที่ใช้โดยสายคลัตช์ (ซึ่งมีความสำคัญต่อความเข้ากันได้กับแม่ปั๊ม/ปั๊มตัวล่าง
        และท่อแข็ง)
    clutch_pressure_plate_actuation_type:
      name: ประเภทการทำงานของแผ่นกดคลัตช์
      description: ระบุว่าคลัตช์ถูกปลดด้วยกลไกแบบกดหรือแบบดึง (การทำงานด้วยสปริงไดอะแฟรม)
    clutch_pressure_plate_release_mechanism_type:
      name: ประเภทกลไกการปลดแผ่นกดคลัตช์
      description: รูปแบบของระบบเชื่อมต่อการปลด/การทำงานที่ใช้โดยแผ่นกดคลัตช์
    clutch_pressure_plate_surface_type:
      name: ประเภทพื้นผิวของแผ่นกดคลัตช์
      description: รูปแบบพื้นผิวสัมผัสแบบแรงเสียดทานของแผ่นกดคลัตช์
    clutch_slave_cylinder_connection_type:
      name: ประเภทการเชื่อมต่อกระบอกสูบคลัตช์
      description: ระบบการเชื่อมต่อท่อไฮดรอลิกบนกระบอกสูบคลัตช์ (พอร์ตเกลียว, ตัวเชื่อมต่อแบบเร็ว,
        แบนโจ ฯลฯ)
    clutch_slave_cylinder_mounting_type:
      name: ประเภทการติดตั้งกระบอกสูบคลัตช์รอง
      description: วิธีการติดตั้งกระบอกสูบคลัตช์รองเข้ากับเกียร์/เรือนคลัตช์ (เช่น
        แบบขันน็อต แบบคลิปอิน หรือแบบรวมศูนย์)
    coating_type:
      name: ประเภทการเคลือบ
      description: ระบุสารเคลือบภายนอก การราด หรือการเคลือบผิวที่ใช้กับซีเรียลบาร์
        (เช่น ช็อกโกแลต หรือโยเกิร์ต)
    cocking_mechanism:
      name: กลไกการขึ้นสาย
      description: ระบุวิธีการหลักหรืออุปกรณ์ที่ใช้ในการขึ้นสายหรือคลายสายหน้าไม้
    cocktail_garnish_form:
      name: รูปแบบการตกแต่งค็อกเทล
      description: อธิบายวิธีการนำเสนอ/แปรรูปเครื่องตกแต่งก่อนนำไปใช้ (เช่น สด หรือ
        แห้ง)
    cocktail_mix_variety:
      name: ค็อกเทลมิกซ์หลากหลายชนิด
      description: ระบุชื่อค็อกเทลเฉพาะที่ออกแบบมาเพื่อสร้างส่วนผสม (เช่น Margarita,
        Mojito หรือ Piña Colada)
    cocktail_napkin_features:
      name: คุณสมบัติของกระดาษเช็ดปากค็อกเทล
      description: ระบุคุณสมบัติด้านการใช้งาน ความสะดวก และเป็นมิตรต่อสิ่งแวดล้อมของกระดาษเช็ดปากค็อกเทล
    cocktail_pick_tip_style:
      name: ลักษณะของปลายไม้จิ้มค็อกเทล
      description: อธิบายถึงรูปทรง/ลักษณะของปลายไม้จิ้มที่ใช้สำหรับเจาะหรือยึดเครื่องตกแต่งค็อกเทล
    cocktail_pick_top_handle_style:
      name: รูปทรงของหัวไม้จิ้มค็อกเทล/ด้ามจับ
      description: อธิบายรูปแบบส่วนตกแต่งด้านบนหรือด้ามจับที่ใช้สำหรับการจับถือหรือนำเสนอ
    cocktail_type:
      name: ประเภทค็อกเทล
      description: ระบุสูตรหรือรูปแบบของค็อกเทลเฉพาะที่แสดงโดยผลิตภัณฑ์สำเร็จรูป (เช่น
        มาร์การิตา เนโกรนี พินาโคลาดา)
    cocktail_umbrella_handle_pick_material:
      name: วัสดุที่ใช้ทำด้ามจับหรือไม้เสียบของร่มค็อกเทล
      description: วัสดุที่ใช้ทำส่วนด้าม/ส่วนปลาย (ไม่รวมส่วนที่เป็นหลังคาร่ม) ของร่มค็อกเทล
    cocoa_processing_method:
      name: วิธีการแปรรูปโกโก้
      description: ระบุวิธีการแปรรูปผงโกโก้ (เช่น โกโก้ธรรมชาติ โกโก้แปรรูปแบบดัตช์
        โกโก้แบบผสม)
    cocoa_product_form:
      name: รูปแบบผลิตภัณฑ์โกโก้
      description: ระบุรูปแบบทางกายภาพในการขายผลิตภัณฑ์โกโก้
    coconut_husk_status:
      name: สถานะเปลือกมะพร้าว
      description: ระบุระดับการลอกเปลือกนอกของมะพร้าว ซึ่งส่งผลต่อความสะดวกในการใช้งาน
        การเก็บรักษา และปริมาณของเสีย
    coconut_maturity_stage:
      name: ระยะความสุกของมะพร้าว
      description: ระบุระยะการเจริญเติบโตของมะพร้าวขณะเก็บเกี่ยว ซึ่งมีผลต่อรสชาติ
        ปริมาณน้ำ และการนำไปใช้ประกอบอาหารอย่างมาก (เช่น ใช้ดื่ม หรือใช้ปรุงอาหาร)
    coconut_oil_refinement_type:
      name: ประเภทการกลั่นน้ำมันมะพร้าว
      description: ระบุระดับการกลั่นหรือเกรดของน้ำมันมะพร้าว เช่น บริสุทธิ์, ผ่านการกลั่น,
        MCT หรือแบบแยกส่วน
    coconut_preparation_form:
      name: รูปแบบการเตรียมมะพร้าว
      description: ระบุลักษณะการเตรียมหรือการหั่นมะพร้าว (เช่น ทั้งลูก หั่นเป็นชิ้น
        ขูดฝอย บดละเอียด ฯลฯ) ช่วยให้นักช้อปสามารถค้นหารูปแบบที่ต้องการสำหรับสูตรอาหารหรือรับประทานเป็นของว่างได้อย่างรวดเร็ว
    coffee_bean_species:
      name: สายพันธุ์เมล็ดกาแฟ
      description: ระบุชนิดของเมล็ดกาแฟที่ใช้ในสินค้า
    coffee_beverage_variety:
      name: เครื่องดื่มกาแฟหลากหลายชนิด
      description: จำแนกประเภทเครื่องดื่มกาแฟพร้อมดื่มหรือกาแฟผสมตามสไตล์
    coffee_processing_method:
      name: วิธีการแปรรูปกาแฟ
      description: ระบุถึงเทคนิคการแปรรูปหลังการเก็บเกี่ยวที่ใช้กับเมล็ดกาแฟ
    coil_material:
      name: วัสดุของขดลวด
      description: ระบุวัสดุหลักหรือชนิดของตาข่ายที่ใช้ในขดลวดทำความร้อน ซึ่งมีผลต่อรสชาติ
        อายุการใช้งาน และความเข้ากันได้กับการควบคุมอุณหภูมิ
    coil_spring_design:
      name: การออกแบบสปริงขดลวด
      description: ระบุอัตรา/การออกแบบรูปทรงของสปริงขด ซึ่งมีผลต่อลักษณะการขับขี่
    coil_spring_finish_coating:
      name: ผิวเคลือบ/การตกแต่งสปริงขด
      description: การตกแต่งพื้นผิวหรือการเคลือบที่ใช้เพื่อป้องกันการกัดกร่อน
    coil_spring_material:
      name: วัสดุสปริงขด
      description: วัสดุ/ส่วนประกอบหลักของสปริงขด
    coil_system_type:
      name: ประเภทของระบบสปริง
      description: รายละเอียดเกี่ยวกับระบบสปริงหรือขดลวดที่ใช้ในที่นอนแต่ละประเภท
        เช่น สปริงแบบพ็อกเก็ตคอยล์ หรือสปริงแบบบอนเนลล์คอยล์
    coil_type:
      name: ประเภทคอยล์
      description: อธิบายโครงสร้างหรือเทคโนโลยีของคอยล์ที่ใช้ ซึ่งส่งผลต่อการผลิตไอน้ำและรสชาติ
    coin_grade_numismatic:
      name: ระดับการจัดเกรดเหรียญ (เหรียญที่ระลึก)
      description: เกรดมาตรฐานของเหรียญ (เช่น ตามสเกล Sheldon หรือใช้คำบรรยายคุณภาพ)
    coin_strike_or_finish:
      name: ลักษณะการผลิตหรือผิวของเหรียญ
      description: ประเภทการผลิตหรือผิวของเหรียญ (เช่น เหรียญธรรมดา, เหรียญคุณภาพสูง)
    coin_strike_type:
      name: ประเภทการผลิตเหรียญ
      description: อธิบายประเภทการผลิต/ผิวของเหรียญ (เช่น เหรียญคุณภาพสูง, เหรียญธรรมดา)
    collar_style:
      name: รูปแบบปกเสื้อ
      description: กำหนดรูปแบบปกเสื้อหรือคอเสื้อของเสื้อผ้า
    collectible_gun_accessories_included:
      name: อุปกรณ์เสริมสำหรับปืนสะสมที่รวมอยู่ในชุด
      description: ระบุรายการอุปกรณ์เสริมและเอกสารที่รวมอยู่กับปืนสะสม (เช่น ซองปืน
        กล่องใส่ปืน ดาบปลายปืน เอกสารต่างๆ)
    collectible_gun_firing_mechanism:
      name: กลไกการยิงของปืนสะสม
      description: ระบุประเภทกลไกการยิง/จุดระเบิดของปืนสำหรับปืนสะสม (โดยเฉพาะปืนโบราณและปืนที่มีคุณค่าทางประวัติศาสตร์)
    collectible_knife_blade_finish:
      name: การตกแต่งผิวใบมีดสำหรับมีดสะสม
      description: อธิบายลักษณะพื้นผิว/การเคลือบผิวใบมีดเพื่อความสวยงาม (และบางครั้งช่วยเพิ่มความทนทานต่อการกัดกร่อน)
    color_code_system:
      name: ระบบรหัสสี
      description: ระบุระบบรหัสสีที่ใช้สำหรับการอ้างอิงสีตัวเลขของด้าย (เช่น DMC,
        Anchor) หากมี
    color_coding_standard:
      name: มาตรฐานการกำหนดรหัสสี
      description: ระบุว่าป้ายทะเบียนนั้นใช้รหัสสีสากล (เช่น IWF หรือ IPF) หรือระบบสีอื่น
    color_effect:
      name: เอฟเฟกต์สี
      description: ระบุเทคนิคการทำสีหรือเอฟเฟ็กต์พิเศษที่ใช้กับผมต่อ
    color_family:
      name: กลุ่มสี
      description: กลุ่มสีระดับสูงสำหรับหมึกซูมิ (มีประโยชน์เมื่อสีมีความละเอียดมากเกินไป
        เช่น สีดำโทนอุ่นเทียบกับสีดำโทนน้ำเงิน)
    color_finish:
      name: สีของพื้นผิว
      description: ระบุพื้นผิวของส่วนประกอบที่มองเห็นได้ของที่ครอบมือ (เช่น ด้าน หรือ
        เงา) เมื่อสีอย่างเดียวไม่เพียงพอ
    coloring_finish:
      name: การตกแต่งสี
      description: ระบุลักษณะพื้นผิวหรือเอฟเฟกต์พิเศษที่เกิดจากการลงสี เช่น สีเมทัลลิกหรือสีนีออน
    comb_material:
      name: วัสดุของหวี
      description: วัสดุของหวีฮาร์โมนิกา (ส่วนที่เป็นโครงสร้างห้องอากาศ)
    comb_type:
      name: ประเภทของหวี
      description: จัดประเภทหวีสำหรับดูแลขนม้าตามรูปแบบการใช้งานหลัก (เช่น หวีสำหรับแปรงขน
        หวีสำหรับแผงคอ หวีสำหรับดึงขน) ช่วยให้ผู้ซื้อค้นหาเครื่องมือที่เหมาะสมกับความต้องการในการดูแลขนม้าได้อย่างรวดเร็ว
    combat_shorts_cut_style:
      name: รูปแบบการตัดเย็บกางเกงขาสั้นสำหรับกีฬาต่อสู้
      description: ระบุรูปแบบการตัดเย็บหรือทรงที่เฉพาะเจาะจงสำหรับกางเกงขาสั้นกีฬาต่อสู้
        (เช่น ทรงสูง ทรงย้อนยุค ทรงรัดรูป)
    comic_creator_role:
      name: บทบาทของผู้สร้างการ์ตูน
      description: ระบุบทบาทของผู้สร้างที่ได้รับเครดิตซึ่งเกี่ยวข้องกับรายการ (เช่น
        นักเขียน นักวาด)
    commemorative_coin_finish:
      name: ลักษณะพื้นผิวของเหรียญที่ระลึก
      description: อธิบายถึงลักษณะการผลิต/พื้นผิวของเหรียญที่ระลึก
    commemorative_coin_mint_mark:
      name: เครื่องหมายโรงกษาปณ์ของเหรียญที่ระลึก
      description: ระบุเครื่องหมายโรงกษาปณ์ (หรือไม่มีเครื่องหมายโรงกษาปณ์) บนเหรียญ
    commemorative_subject:
      name: หัวข้อที่ใช้ในการรำลึก
      description: หัวข้อหลักที่ถูกจัดทำขึ้นเพื่อระลึกถึง (เช่น เหตุการณ์ บุคคล สถานที่
        วันครบรอบ หรือองค์กร เป็นต้น)
    commercial_vehicle_class:
      name: ประเภทรถยนต์เพื่อการพาณิชย์
      description: การจัดประเภทตามกฎหมาย/มาตรฐานอุตสาหกรรมที่อ้างอิงค่า GVWR (Gross
        Vehicle Weight Rating) เพื่อระบุประเภทน้ำหนักของรถเชิงพาณิชย์ ใช้สำหรับการค้นหาและกรองสินค้า
    compass_damping_medium:
      name: สารหน่วงการเคลื่อนที่ของเข็มทิศ
      description: ระบุวัสดุที่ใช้ในการรักษาเสถียรภาพการเคลื่อนที่ของเข็มภายในแคปซูลเข็มทิศ
    compass_illumination_type:
      name: ประเภทการส่องสว่างของเข็มทิศ
      description: ระบุวิธีการทำให้เครื่องหมายบนเข็มทิศมองเห็นได้ชัดเจนในสภาพแสงน้อย
        (เช่น สีเรืองแสง ทริเทียม ไฟแบ็คไลท์ LED)
    compass_mounting_style:
      name: รูปแบบการติดตั้งเข็มทิศ
      description: อธิบายวิธีการพกพา สวมใส่ หรือติดตั้งเข็มทิศ
    compass_scale_units:
      name: หน่วยมาตราส่วนของเข็มทิศ
      description: ระบุหน่วยวัด (องศา มิล หรือทั้งสองอย่าง) ที่ระบุไว้บนตัวเรือนเข็มทิศ
    compatible_abs_system:
      name: ระบบ ABS ที่ใช้งานร่วมกันได้
      description: ระบุว่าแม่ปั๊มเบรกมีไว้สำหรับรถยนต์ที่ติดตั้งระบบเบรก ABS หรือไม่
    compatible_adapter_brand:
      name: แบรนด์อะแดปเตอร์ที่ใช้งานร่วมกันได้
      description: ระบุแบรนด์หัวไม้กอล์ฟที่ก้านไม้ถูกตั้งค่ามาให้ใช้งานร่วมกับอะแดปเตอร์ของแบรนด์นั้นได้โดยตรง
    compatible_airbag_system_type:
      name: ประเภทระบบถุงลมนิรภัยที่เข้ากันได้
      description: ระบุรุ่น/ชุดคุณสมบัติของระบบถุงลมนิรภัยที่ชิ้นส่วนนั้นใช้งานร่วมกันได้
        (เช่น แบบขั้นตอนเดียว หรือ แบบสองขั้นตอน)
    compatible_amplifier_fit_method:
      name: วิธีการตรวจสอบความเข้ากันได้ของฝาครอบ/เคส
      description: ระบุรูปแบบการกำหนดความเข้ากันได้ของฝาครอบ/เคส (เช่น แบบใช้งานได้ทั่วไป
        แบบเฉพาะรุ่น หรือแบบอิงตามขนาด)
    compatible_apparatus:
      name: อุปกรณ์ที่ใช้งานร่วมกันได้
      description: ระบุอุปกรณ์ยิมนาสติกหรือกิจกรรมที่ด้ามจับได้รับการออกแบบมาให้ใช้งาน
    compatible_archery_tool:
      name: อุปกรณ์ยิงธนูที่ใช้งานร่วมกันได้
      description: ระบุเครื่องมือหรืออุปกรณ์ยิงธนูหลักที่ออกแบบอุปกรณ์เสริมมาให้ใช้งานร่วมกันได้
    compatible_axle_size:
      name: ขนาดเพลาที่เข้ากันได้
      description: ระบุขนาดเส้นผ่านศูนย์กลางดุมล้อ/เพลา หรือมาตรฐานเกลียว ซึ่งที่วางเท้าได้รับการออกแบบมาให้ใช้ร่วมได้
        (เช่น 10 มม./3⁄8 นิ้ว, 14 มม., หรือ 3/8 นิ้ว 26 TPI)
    compatible_axle_type:
      name: ประเภทเพลาที่เข้ากันได้
      description: ระบุมาตรฐานการติดตั้งเพลาล้อหลังที่เทรนเนอร์รองรับ เช่น ขนาดเพลาแบบปลดเร็วหรือแบบทะลุ
    compatible_axle_weight_rating:
      name: พิกัดน้ำหนักเพลาที่ใช้งานร่วมกันได้
      description: ระบุพิกัดน้ำหนักเพลาเทรลเลอร์ (ความจุต่อเพลา) ที่ชุดเบรกเทรลเลอร์ได้รับการออกแบบมาให้ใช้งานได้
    compatible_bait_type:
      name: ประเภทเหยื่อที่ใช้งานร่วมกันได้
      description: ระบุประเภทของเหยื่อตกปลาที่สว่านเจาะเหยื่อนี้ใช้งานร่วมกันได้ เพื่อให้นักตกปลาสามารถเลือกเครื่องมือที่ตรงกับเหยื่อที่ตนเองชื่นชอบได้
    compatible_bass_scale_length:
      name: ความยาวสเกลของเบสที่ใช้งานร่วมกันได้
      description: ระบุความยาวสเกลเบสที่ชุดสายนี้ออกแบบมาให้ใช้ (สำคัญสำหรับความยาวการพันสายและการติดตั้งที่ถูกต้อง)
    compatible_battle_top_system:
      name: ระบบลูกข่างต่อสู้ที่เข้ากันได้
      description: ระบุระบบนิเวศของผลิตภัณฑ์ลูกข่างต่อสู้หรือซีรี่ส์ที่ออกแบบมาสำหรับลูกข่างนั้น
        (ใช้เพื่อให้แน่ใจว่าชิ้นส่วนและสนามต่อสู้เข้ากันได้)
    compatible_bb_size:
      name: ขนาดลูกกระสุน BB ที่ใช้งานร่วมกันได้
      description: ระบุขนาดเส้นผ่านศูนย์กลางของลูกกระสุนแอร์ซอฟต์ที่ผลิตภัณฑ์รองรับ
    compatible_bed_frame_style:
      name: รูปแบบโครงเตียงที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบเตียงหรือโครงเตียงที่อุปกรณ์เสริมนี้ออกแบบมาให้ใช้งานร่วมกันได้
    compatible_bicycle_tire_type:
      name: ประเภทของยางจักรยานที่ใช้งานร่วมกันได้
      description: ระบุประเภทยางจักรยานที่ผลิตภัณฑ์สามารถซ่อมแซมหรืออุดรอยรั่วได้
    compatible_bike_component:
      name: ชิ้นส่วนจักรยานที่เข้ากันได้
      description: ระบุชิ้นส่วนของจักรยานที่เครื่องมือหรือผลิตภัณฑ์ถูกออกแบบมาเพื่อซ่อมบำรุงได้
    compatible_billiard_game:
      name: เกมบิลเลียดที่เข้ากันได้
      description: ระบุรูปแบบเกมบิลเลียดที่แร็คได้รับการออกแบบมา เพื่อให้ลูกค้าเลือกแร็คที่เหมาะสมกับเกมของตน
    compatible_billiard_table_size:
      name: ขนาดโต๊ะบิลเลียดที่เข้ากันได้
      description: ระบุความยาวโต๊ะมาตรฐานที่ผ้าคลุมได้รับการออกแบบมาให้พอดี เพื่อให้มั่นใจว่าลูกค้าสามารถเลือกผ้าคลุมที่มีขนาดเหมาะสมกับโต๊ะพูลของตนได้
    compatible_bit_type:
      name: ประเภทดอกสว่านที่ใช้งานร่วมกันได้
      description: ประเภทของดอกสว่านที่สามารถใช้ร่วมกับอุปกรณ์ป้องกันได้
    compatible_blade_hosel:
      name: ส่วนหัวใบมีดที่เข้ากันได้
      description: ระบุรูปแบบคอ/ส่วนเรียวของใบมีดที่ก้านรองรับ เพื่อให้แน่ใจว่าก้านและใบมีดเข้ากันได้อย่างเหมาะสม
    compatible_blade_system:
      name: ระบบใบมีดที่ใช้งานร่วมกันได้
      description: 'ระบุระบบ/รูปแบบใบมีดสำรองที่ใช้กับมีด (เช่น ใบมีดมาตรฐานสำหรับงานอดิเรก
        #11, ใบมีดคัตเตอร์แบบหักข้อ)'
    compatible_boat_weaving_shuttle_loom:
      name: เครื่องทอผ้าแบบกระสวยที่เข้ากันได้
      description: ระบุประเภทเครื่องทอผ้าที่กระสวยทอผ้าถูกออกแบบมาให้ใช้งานร่วมได้
    compatible_bobbin_type:
      name: ประเภทกระสวยที่ใช้งานร่วมกันได้
      description: ระบุประเภทของกระสวยด้าย/หลอดด้ายที่กระสวยทอผ้าออกแบบมาให้ใช้ร่วมได้
    compatible_bottle_mouth:
      name: ปากขวดที่เข้ากันได้
      description: ระบุชนิดหรือเส้นผ่านศูนย์กลางของปากขวดที่หลอดดูดหรือฝาปิดถูกออกแบบมาให้ใช้ร่วมได้
    compatible_bow_attachment_system:
      name: ระบบยึดคันธนูที่ใช้งานร่วมกันได้
      description: ระบุส่วนต่อประสานระหว่างชิ้นส่วนกับแขนกลหรืออุปกรณ์เสริมที่ออกแบบมาสำหรับชิ้นส่วนนั้น
        (เช่น ILF, แบบขันสกรู, แบบถอดเร็ว)
    compatible_bow_crossbow_type:
      name: ประเภทคันธนู/หน้าไม้ที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบคันธนูหรือหน้าไม้ที่อุปกรณ์เสริมถูกออกแบบมาให้ใช้ร่วมกันได้
    compatible_brake_fluid:
      name: น้ำมันเบรกที่เข้ากันได้
      description: ระบุข้อมูลจำเพาะ DOT ของน้ำมันเบรกที่ซีล/วัสดุภายในแม่ปั๊มเบรกถูกออกแบบมาให้ใช้งานร่วมกันได้
    compatible_brake_pad:
      name: ผ้าเบรกที่ใช้งานร่วมกันได้
      description: ระบุว่าจานเบรกนั้นรองรับผ้าเบรกชนิดใด เพื่อความปลอดภัยและการสึกหรอที่เหมาะสมที่สุด
    compatible_brake_service_system:
      name: ชุดระบบเบรกหลักที่ใช้งานร่วมกันได้
      description: ระบุว่าออกแบบชิ้นส่วนมาสำหรับระบบดิสก์เบรก ดรัมเบรก หรือทั้งสองแบบ
    compatible_brake_system:
      name: ระบบเบรกที่ใช้งานร่วมกันได้
      description: ระบุหมายเหตุสำคัญเกี่ยวกับการใช้งานน้ำมันเบรกที่เหมาะสมกับระบบ
    compatible_brake_type:
      name: ประเภทเบรกที่ใช้งานร่วมกันได้
      description: ระบุประเภทระบบเบรกที่แร็กใช้งานร่วมได้ เช่น ดิสก์เบรก หรือริมเบรก
    compatible_brass_instrument_finish:
      name: พื้นผิวของเครื่องดนตรีทองเหลืองที่ใช้งานร่วมกันได้
      description: ระบุว่าน้ำยาทำความสะอาดนี้ปลอดภัยที่จะใช้กับผิวเคลือบเครื่องดนตรีทองเหลืองประเภทใดบ้างโดยไม่ทำให้ผิวเคลือบเสียหาย
    compatible_building_toy_system:
      name: ระบบตัวต่อของเล่นที่เข้ากันได้
      description: ระบุว่าของเล่นนั้นเข้ากันได้กับระบบ/มาตรฐานตัวต่อแบบใด (หรือขนาดที่เทียบเท่า)
        เช่น เข้ากันได้กับ LEGO หรือเป็นระบบเฉพาะของผู้ผลิต
    compatible_capo_fretboard_radius:
      name: รัศมีความโค้งของฟิงเกอร์บอร์ดที่คาโปสามารถใช้งานร่วมได้
      description: ระบุรัศมี/รูปทรงฟิงเกอร์บอร์ดที่คาโป้ได้รับการออกแบบมาให้พอดี เพื่อการสัมผัสที่ดีที่สุดและความเสถียรในการปรับแต่ง
    compatible_capo_number_of_strings:
      name: จำนวนสายที่ใช้ได้กับคาโป
      description: ระบุจำนวนสายที่คาโปได้รับการออกแบบมาเพื่อหนีบ (ใช้ได้กับเครื่องดนตรี
        6, 7, 8, 12 สาย และเครื่องดนตรีพิเศษ)
    compatible_cardio_machine_type:
      name: ประเภทเครื่องออกกำลังกายแบบคาร์ดิโอที่ใช้งานร่วมกันได้
      description: ระบุประเภทของเครื่องออกกำลังกายแบบคาร์ดิโอที่อุปกรณ์เสริมหรือชิ้นส่วนได้รับการออกแบบมาให้ใช้งานร่วมกัน
    compatible_chain_link_type:
      name: ประเภทข้อต่อโซ่ที่เข้ากันได้
      description: ระบุรูปแบบข้อต่อโซ่ที่เครื่องมือรองรับ (มาตรฐาน, ข้อต่อครึ่งข้อ,
        ข้อต่อแบบเร็ว ฯลฯ)
    compatible_chain_size:
      name: ขนาดโซ่ที่ใช้งานร่วมกันได้
      description: ระบุความกว้างของโซ่หรือมาตรฐานระยะพิทช์ (เช่น 1/8 นิ้ว, 3/32 นิ้ว)
        ที่เครื่องมือรองรับ
    compatible_chain_width:
      name: ความกว้างของโซ่ที่ใช้งานร่วมกันได้
      description: ระบุขนาดของโซ่ที่เฟืองท้ายแบบฟรีวีลถูกออกแบบมาให้ใช้งานร่วมได้
    compatible_chip_denomination:
      name: มูลค่าบนชิปที่ใช้งานร่วมกันได้
      description: ระบุว่าถาด/กล่องนั้นมีช่องสำหรับจัดเก็บชิปชนิดใดบ้าง โดยมีช่องที่ติดป้ายกำกับหรือช่องเฉพาะสำหรับชิปชนิดใดบ้าง
        (หรือมีวัตถุประสงค์เพื่อจัดระเบียบชิปเหล่านั้น)
    compatible_clarinet_mouthpiece_ligature:
      name: ตัวรัดปากเป่าคลาริเน็ตที่เข้ากันได้
      description: ระบุมาตรฐานการรัดลิ้นหรือโน้ตที่เข้ากันได้สำหรับปากเป่า
    compatible_classical_guitar_string_scale_length:
      name: ความยาวสเกลสายกีตาร์คลาสสิกที่เหมาะสม
      description: ระบุความยาวสเกลของกีตาร์/ความยาวสายที่เข้ากันได้กับชุดสาย
    compatible_clay_target_size:
      name: ขนาดเป้าบินที่เหมาะสม
      description: ระบุขนาดหรือรูปทรงของเป้าบินที่เครื่องยิงรองรับได้ เพื่อให้พอดีและทำงานได้อย่างมีประสิทธิภาพ
    compatible_cleat_system:
      name: ระบบยึดรองเท้าที่เข้ากันได้
      description: ระบุรูปแบบการเชื่อมต่อหรือรูยึดที่บันไดรองรับ เพื่อให้นักปั่นสามารถเลือกใช้รองเท้าให้เข้ากับระบบที่ถูกต้องได้
    compatible_clipless_pedal_system:
      name: ระบบบันไดแบบคลิปเลสที่ใช้งานร่วมกันได้
      description: ระบุมาตรฐานบันได/คลีทแบบคลิปเลสเฉพาะที่ผลิตภัณฑ์ได้รับการออกแบบมาให้ใช้งานร่วมกันได้
    compatible_clutch_type:
      name: ประเภทคลัตช์ที่เข้ากันได้
      description: ความเข้ากันได้ของอินเทอร์เฟซคลัตช์กับล้อช่วยแรง (ในกรณีที่เกี่ยวข้อง)
    compatible_coffee_pod_system:
      name: ระบบแคปซูลกาแฟที่ใช้งานร่วมกันได้
      description: ระบุเครื่องชงกาแฟหรือระบบชงกาแฟที่ออกแบบมาสำหรับแคปซูลกาแฟนั้นๆ
    compatible_construction_set_system:
      name: ระบบชุดบล็อกประกอบที่ใช้งานร่วมกันได้
      description: ระบุว่าชุดตัวต่อนี้เข้ากันได้กับระบบตัวต่อ/แบรนด์ใด (เช่น เข้ากันได้กับ
        LEGO, เข้ากันได้กับ DUPLO)
    compatible_contra_bass_clarinet_peg_stand:
      name: ขาตั้ง/เดือยรองรับสำหรับคลาริเน็ตคอนทราเบสที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบการเชื่อมต่อขาตั้ง/เดือยรองรับ หรือรูปแบบตัวรองรับที่ต้องใช้
    compatible_coolant_chemistry:
      name: สารเคมีของน้ำยาหล่อเย็นที่ใช้งานร่วมกันได้
      description: ระบุว่าสารเติมแต่งนี้ได้รับการคิดค้นสูตรมาเพื่อให้สามารถใช้งานร่วมกับกลุ่มเคมีของน้ำหล่อเย็นกลุ่มใดได้บ้าง
    compatible_cooling_system_material:
      name: วัสดุระบบระบายความร้อนที่ใช้งานร่วมกันได้
      description: ระบุว่าน้ำยาทำความสะอาดหม้อน้ำชนิดใดที่ปลอดภัยสำหรับระบบระบายความร้อน/วัสดุต่างๆ
        (เช่น หม้อน้ำอะลูมิเนียม ระบบโลหะผสม)
    compatible_crib_format:
      name: รูปแบบเปลเด็กที่ใช้งานร่วมกันได้
      description: กำหนดขนาดหรือรูปทรงโดยทั่วไปของที่นอนหรือผ้าปูที่นอนที่อุปกรณ์เสริมนี้ออกแบบมาให้ใช้ร่วมกันได้
    compatible_cross_stitch_fabric_count:
      name: จำนวนเส้นด้ายที่เหมาะสมกับงานปักครอสติช
      description: จำนวนเส้นด้ายที่แนะนำสำหรับการปักลายนี้
    compatible_cross_stitch_frame:
      name: กรอบปักครอสติชที่ใช้งานร่วมกันได้
      description: ระบุว่ากรอบนี้ออกแบบมาเพื่อใช้กับอะไร (ถือด้วยมือ, ตั้งบนโต๊ะ,
        ตั้งพื้น หรือใช้งานได้ทั่วไป)
    compatible_crossbar:
      name: คานขวางที่ใช้งานร่วมกันได้
      description: การใช้งานร่วมกันได้ของชั้นวางกับคานขวางชั้นวางบนหลังคาของยานยนต์
        (หากติดตั้งบนหลังคา) รวมถึงมาตรฐานรูปทรง/โปรไฟล์ของคานขวาง
    compatible_cycling_cleat:
      name: ตัวยึดรองเท้าปั่นจักรยานที่ใช้ร่วมกันได้
      description: ระบุระบบคลีทหรือระบบบันไดที่รองเท้าปั่นจักรยานคู่นี้ถูกออกแบบมาให้ใช้งานร่วมกัน
    compatible_cymbal_size:
      name: ขนาดฉาบที่ใช้งานร่วมกันได้
      description: ระบุขนาดเส้นผ่านศูนย์กลางของฉาบที่เหมาะสม (หรือขนาดสูงสุด) ที่เคสนี้รองรับ
        โดยนี่คือการเช็กความเข้ากันได้กับขนาดของฉาบ ไม่ใช่ขนาดภายนอกของเคส
    compatible_device_type:
      name: ประเภทอุปกรณ์ที่ใช้งานร่วมกันได้
      description: ระบุประเภทอุปกรณ์ที่รองรับการใช้ตัวยึด (เช่น จอภาพ/ทีวี แท็บเล็ต
        สมาร์ทโฟน เครื่องเล่นดีวีดีแบบพกพา)
    compatible_dock_structure_type:
      name: ประเภทโครงสร้างแท่นเชื่อมต่อที่ใช้งานร่วมกันได้
      description: โครงสร้างท่าเทียบเรือที่ออกแบบมาสำหรับติดตั้งขั้นบันได
    compatible_dough_type:
      name: ประเภทแป้งที่ใช้งานร่วมกันได้
      description: ระบุประเภท/ยี่ห้อของแป้งที่เครื่องมือต่างๆ ออกแบบมาให้ใช้งาน (เช่น
        แป้งปั้นทั่วไป ดินปั้นแบบต่างๆ)
    compatible_drawing_ink_surface:
      name: พื้นผิวหมึกวาดภาพที่ใช้งานร่วมกันได้
      description: ระบุพื้นผิว/วัสดุรองรับที่แนะนำเพื่อให้ได้ประสิทธิภาพสูงสุด
    compatible_drivetrain_brand:
      name: ยี่ห้อระบบขับเคลื่อนที่ใช้งานร่วมกันได้
      description: ระบุแบรนด์ระบบส่งกำลังหรือระบบเบรกที่สายเคเบิลได้รับการออกแบบมาให้ใช้งานร่วมกันได้
    compatible_drivetrain_speeds:
      name: ความเร็วของระบบขับเคลื่อนที่รองรับ
      description: ระบุจำนวนความเร็วของระบบขับเคลื่อน (เช่น 10-ความเร็ว) ที่ขาจานหรือจานโซ่รองรับ
    compatible_equipment:
      name: อุปกรณ์ที่ใช้งานร่วมกันได้
      description: ระบุประเภทของอุปกรณ์กีฬาฤดูหนาวที่ออกแบบมาเพื่อยึดด้วยปากจับนี้
    compatible_evap_system:
      name: ระบบ EVAP ที่ใช้งานร่วมกันได้
      description: ระบุว่าฝาถังน้ำมันได้รับการออกแบบให้ตรงตามข้อกำหนดของระบบ EVAP
        (เช่น การซีลตามมาตรฐาน OEM) และช่วยลดไฟเตือนเครื่องยนต์หรือไม่
    compatible_exercise_bike_style:
      name: รุ่นจักรยานออกกำลังกายที่ใช้งานร่วมกันได้
      description: ระบุว่าอุปกรณ์เสริมหรือชิ้นส่วนอะไหล่ถูกออกแบบมาให้ใช้ได้กับจักรยานออกกำลังกายรุ่นใดบ้าง
    compatible_fencing_weapon:
      name: อาวุธฟันดาบที่ใช้งานร่วมกันได้
      description: ระบุว่าเสื้อแจ็กเก็ตหรือผ้าเมทัลลิคนั้นออกแบบมาสำหรับกีฬาฟันดาบประเภทใดหรือชนิดใด
    compatible_fiber_type:
      name: ประเภทเส้นใยที่ใช้งานร่วมกันได้
      description: ประเภทเส้นใยหลักที่เครื่องปั่นเส้นใยแบบดรัมออกแบบมาเพื่อจัดการอย่างมีประสิทธิภาพ
    compatible_fin_box_system:
      name: ระบบกล่องครีบที่ใช้งานร่วมกันได้
      description: ระบุกล่องครีบหรือระบบการติดตั้งที่ออกแบบมาให้ใช้กับครีบ ช่วยให้นักโต้คลื่นซื้อครีบที่เข้ากันได้กับกระดานโต้คลื่นของตน
        (เช่น FCS II, Futures, US Box)
    compatible_fingerboard_radius:
      name: ความโค้งมนของฟิงเกอร์บอร์ดที่เข้ากันได้
      description: ระบุความโค้งมนของฟิงเกอร์บอร์ด (แบน โค้ง หรือผสมผสาน) ที่คาโปได้รับการออกแบบมาให้เข้ากันได้
        เพื่อให้แรงกดสม่ำเสมอและลดเสียงรบกวน
    compatible_finish_type:
      name: ประเภทพื้นผิวที่ใช้งานร่วมกันได้
      description: ระบุว่าสเปรย์นี้ปลอดภัยสำหรับพื้นผิวของเครื่องดนตรีประเภทใดบ้าง
    compatible_fishing_reel_type:
      name: ประเภทรอกตกปลาที่ใช้งานร่วมกันได้
      description: ระบุประเภทรอกตกปลาที่อุปกรณ์เสริมนี้ถูกออกแบบมาให้ใช้งานร่วมกันได้
        (เช่น รอกสปินนิ่ง รอกเบทคาสติ้ง รอกฟลาย)
    compatible_fly_line_weight:
      name: น้ำหนักสายฟลายที่ใช้งานร่วมกันได้
      description: ระบุค่าน้ำหนักสายฟลายตามมาตรฐาน AFTMA ที่สปูลได้รับการออกแบบมาให้รองรับได้
    compatible_flywheel_type:
      name: ประเภทล้อตุนกำลังที่เข้ากันได้
      description: ระบุประเภทล้อช่วยแรงที่แผ่นกดคลัตช์ออกแบบมาให้ใช้งานด้วย
    compatible_football_kick_type:
      name: ประเภทการเตะฟุตบอลที่เข้ากันได้
      description: ระบุสถานการณ์การเตะที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อรองรับ (เช่น
        การเตะเปิดเกม การเตะกินเปล่า) เพื่อช่วยให้นักกีฬาค้นหาอุปกรณ์ที่เหมาะสมได้อย่างรวดเร็ว
    compatible_fuel_system_type:
      name: ประเภทระบบเชื้อเพลิงที่ใช้งานร่วมกันได้
      description: ระบุระบบจ่ายเชื้อเพลิงที่น้ำยาทำความสะอาดนี้ได้รับการออกแบบมาให้ใช้งานด้วยได้
    compatible_gas_type:
      name: ประเภทแก๊สที่ใช้งานร่วมกันได้
      description: ระบุประเภทก๊าซอัดที่ถังลมเพนต์บอลถูกออกแบบมาให้บรรจุและใช้งานได้
    compatible_gel_wax_additives:
      name: สารเติมแต่งแว็กซ์เจลที่ใช้ร่วมกันได้
      description: ระบุประเภทของสารเติมแต่งที่เข้ากันได้กับเจลแว็กซ์นี้ (เช่น ประเภทของสีย้อม
        สารฝังตัว)
    compatible_glaze_layering:
      name: การเคลือบชั้นที่เข้ากันได้
      description: ระบุว่าสารเคลือบนี้ออกแบบมาให้ใช้ทาทับร่วมกับสารเคลือบชนิดอื่นเพื่อสร้างเอฟเฟกต์หรือไม่
    compatible_golf_bag_type:
      name: ประเภทถุงกอล์ฟที่ใช้งานร่วมกันได้
      description: ระบุว่าฝาครอบหรือเคสนี้ใช้ได้กับถุงกอล์ฟประเภทใดบ้าง
    compatible_ground_polarity:
      name: ขั้วกราวด์ที่เข้ากันได้
      description: ระบุว่าตัวควบคุมแรงดันไฟฟ้าถูกออกแบบมาสำหรับระบบไฟฟ้ายานยนต์แบบกราวด์ลบ
        หรือกราวด์บวก (หรือไม่คำนึงถึงขั้วไฟฟ้า)
    compatible_guitar_body_shape:
      name: รูปทรงตัวกีตาร์ที่ใช้งานด้วยได้
      description: ระบุว่าเคสนี้ถูกออกแบบมาให้รองรับรูปทรง/รูปแบบตัวกีตาร์ประเภทใด
    compatible_guitar_case:
      name: เคสกีตาร์ที่ใช้งานด้วยได้
      description: ระบุว่าเครื่องเพิ่มความชื้นได้รับการออกแบบมาให้มีขนาดพอดีและใช้งานได้อย่างเหมาะสมกับเคสกีตาร์แบบใด
    compatible_guitar_scale_length:
      name: ความยาวสเกลกีตาร์ที่ใช้งานร่วมกันได้
      description: ระบุว่าชุดสายกีตาร์นี้เหมาะสำหรับความยาวสเกลกีตาร์ใดบ้าง (โดยพิจารณาจากความยาวของการพันสาย/ความยาวโดยรวม)
    compatible_gun_platform:
      name: แท่นติดตั้งปืนที่ใช้งานร่วมกันได้
      description: ระบุแพลตฟอร์มการทำงานหรือแหล่งพลังงานที่ผลิตภัณฑ์ใช้งานด้วยได้
        (เช่น AEG, GBB, HPA)
    compatible_hair_length:
      name: ความยาวผมที่เหมาะกับผลิตภัณฑ์
      description: ระบุความยาวหรือปริมาณเส้นผมสูงสุดที่หมวกสามารถรองรับได้อย่างสบาย
    compatible_head_and_neck_restraint_system:
      name: ระบบยึดศีรษะและคอที่ใช้งานร่วมกันได้
      description: ระบุว่าหมวกกันน็อคมีจุดยึดและ/หรือใช้งานร่วมกับระบบยึดศีรษะและคอ
        (เช่น HANS) ได้หรือไม่ รวมถึงสถานะการติดตั้ง/การมีจุดยึด
    compatible_helmet_certification_standard:
      name: มาตรฐานการรับรองหมวกกันน็อกที่ใช้งานร่วมกันได้
      description: ระบุมาตรฐานความปลอดภัยของหมวกกันน็อคหรือบริบทการรับรองใดๆ ที่อุปกรณ์เสริมได้รับการออกแบบมาเพื่อรองรับ
        (เช่น แผ่นฟิล์มกันฝุ่นสำหรับใช้ในการแข่งขันมักอ้างอิงถึงกฎข้อบังคับเฉพาะ)
    compatible_helmet_shell_size:
      name: ขนาดเปลือกหมวกกันน็อกที่เข้ากันได้
      description: ระบุขนาดเปลือกหมวกกันน็อคที่ชิ้นส่วนภายในที่ใช้ทดแทนนั้นเหมาะสม
        (ขนาดเปลือกหมวกกันน็อคมักจะตรงกับช่วงขนาด เช่น XS–S, M, L–XL)
    compatible_helmet_size:
      name: ขนาดหมวกกันน็อคที่ใช้งานร่วมกันได้
      description: ระบุขนาดหมวกกันน็อคที่สามารถใช้ร่วมกับหน้ากากได้
    compatible_helmet_type:
      name: ประเภทหมวกกันน็อคที่ใช้งานร่วมกันได้
      description: หมวดหมู่หมวกกันน็อคที่ออกแบบมาเพื่อใช้งานร่วมกับอุปกรณ์รองรับคอ
    compatible_hitch_receiver_size:
      name: ขนาดช่องรับตะขอเกี่ยวที่ใช้งานร่วมกันได้
      description: ขนาดช่องเปิดของตะขอเกี่ยวที่อุปกรณ์เสริมได้รับการออกแบบมาให้พอดี
        (สำหรับอุปกรณ์แร็คที่ติดตั้งกับตะขอเกี่ยว)
    compatible_hook_size:
      name: ขนาดเข็มโครเชต์ที่ใช้งานร่วมกันได้
      description: ระบบขนาดเข็มโครเชต์และ/หรือช่วงขนาดที่กล่องจัดเก็บนี้ออกแบบมาให้ใช้งานได้
        (เช่น ขนาดตัวอักษร/ตัวเลขแบบอเมริกัน ช่วงขนาดมิลลิเมตรของระบบเมตริก)
    compatible_horse_coat_type:
      name: ประเภทขนม้าที่เหมาะสม
      description: ระบุลักษณะขนม้าที่เครื่องกำจัดขนเหมาะสมที่สุด (เช่น ขนหนาในฤดูหนาว
        หรือขนที่บอบบาง)
    compatible_host_platform:
      name: แพลตฟอร์มโฮสต์ที่เข้ากันได้
      description: ระบุว่าตัวควบคุมแพดนั้นใช้งานร่วมกับแพลตฟอร์มโฮสต์หรือประเภทอุปกรณ์ใดได้บ้าง
        (เช่น Windows, macOS, iOS, Android) หรือสามารถใช้งานแบบสแตนด์อโลนได้โดยไม่ต้องใช้คอมพิวเตอร์หรือไม่
    compatible_inflation_gas:
      name: ก๊าซเติมลมที่เข้ากันได้
      description: ระบุว่าออกแบบลูกโป่งมาให้ใช้เติมด้วยก๊าซประเภทใด (ลม ฮีเลียม หรือใช้ได้ทั้งสองอย่าง)
    compatible_injection_type:
      name: ประเภทหัวฉีดที่ใช้งานร่วมกันได้
      description: ระบุว่าสินค้านี้ได้รับการออกแบบให้ทำความสะอาดระบบฉีดเชื้อเพลิงประเภทใด
    compatible_instrument_surface_material:
      name: พื้นผิว/วัสดุของเครื่องดนตรีที่ใช้งานร่วมกันได้
      description: ระบุว่าน้ำยาขัดเงาชนิดนี้เหมาะสำหรับใช้กับพื้นผิว/วัสดุของเครื่องดนตรีประเภทใด
    compatible_intercom_system:
      name: ระบบอินเตอร์คอมที่ใช้งานร่วมกันได้
      description: ระบุความพร้อม/ความเข้ากันได้ของหมวกกันน็อคสำหรับการติดตั้งระบบอินเตอร์คอม/ระบบสื่อสารภายในหมวกกันน็อค
    compatible_interior_material:
      name: วัสดุภายในรถที่ใช้งานร่วมกันได้
      description: ระบุว่าน้ำยาขจัดคราบนี้ปลอดภัย/มีประสิทธิภาพสำหรับวัสดุภายในรถยนต์ประเภทใดบ้าง
        (เช่น พรม เบาะผ้า หนัง ไวนิล)
    compatible_kayak_type:
      name: ประเภทเรือคายัคที่เข้ากันได้
      description: ระบุว่าใบเรือนี้ได้รับการออกแบบให้ติดตั้งกับเรือคายัคทั่วไปรูปแบบใด
    compatible_license_plate_hole_pattern:
      name: รูปแบบรูยึดป้ายทะเบียนที่เข้ากันได้
      description: ระบุรูปแบบรูยึดที่รองรับโดยตัวยึด/ฐานยึด (ด้านตัวรถและ/หรือด้านแผ่นฐาน)
    compatible_license_plate_size:
      name: ขนาดป้ายทะเบียนที่เข้ากันได้
      description: ระบุขนาดป้ายทะเบียนรถยนต์ตามภูมิภาคหรือขนาดมาตรฐานที่ตัวยึด/กรอบป้ายได้รับการออกแบบมาให้รองรับได้
    compatible_loom:
      name: เครื่องทอผ้าที่ใช้งานร่วมกันได้
      description: ระบุประเภทเครื่องทอผ้าที่มีการออกแบบไม้ตีด้ายแบบแบนมาให้ใช้งานร่วมกันได้
    compatible_loom_type:
      name: ประเภทเครื่องทอที่ใช้งานร่วมกันได้
      description: ระบุประเภทอุปกรณ์ทอผ้าที่มีการออกแบบไม้ตีด้ายมาให้ใช้งานร่วมกันได้
        (เช่น เครื่องทอผ้าแบบแข็ง หรือเครื่องทอผ้าแบบพรม)
    compatible_machine_type:
      name: ประเภทเครื่องที่ใช้งานร่วมกันได้
      description: ระบุประเภทการเย็บผ้านวมที่มีการออกแบบโครงมาให้รองรับ (เช่น การเย็บด้วยมือเท่านั้น
        จักรเย็บผ้าทั่วไป จักรเย็บผ้านวมแบบแขนยาว)
    compatible_mast_type:
      name: ประเภทเสากระโดงที่ใช้งานร่วมกันได้
      description: 'ระบุว่าออกแบบใบเรือมาสำหรับเสากระโดงขนาดใด: เส้นผ่านศูนย์กลางลดลง
        (RDM), เส้นผ่านศูนย์กลางมาตรฐาน (SDM) หรือทั้งสองแบบ'
    compatible_model_system_train_scale:
      name: ระบบโมเดลที่รองรับ (รถไฟขยายสเกล)
      description: ระบุสเกล/ระบบโมเดลรถไฟที่อุปกรณ์เสริมนี้รองรับ (เช่น HO, N, O)
        หากเกี่ยวข้อง
    compatible_mounting_surface:
      name: พื้นผิวการติดตั้งที่เข้ากันได้
      description: พื้นผิวหรือวัตถุที่ออกแบบคลิปมาให้หนีบติดได้โดยเฉพาะ
    compatible_mouthpiece_patch:
      name: แผ่นปิดปากที่เข้ากันได้
      description: ระบุว่าออกแบบปากเป่านี้มาเพื่อใช้กับแผ่นรอง/ยางรองปากเป่าหรือไม่
        รวมถึงช่วงความหนาของยางรองที่แนะนำ
    compatible_mouthpiece_type:
      name: ประเภทปากเป่าที่ใช้งานร่วมกันได้
      description: ระบุประเภทของปากเป่า/ก้านที่ออกแบบมาสำหรับเมโลโฟน (โดยทั่วไปจะเป็นแบบเฟรนช์ฮอร์นหรือแบบทรัมเป็ต
        ขึ้นอยู่กับรุ่น)
    compatible_neck_profile_width:
      name: โปรไฟล์/ความกว้างส่วนคอกีตาร์ที่เข้ากันได้
      description: ระบุโปรไฟล์/ความกว้างส่วนคอกีตาร์ที่ออกแบบคาโปมาให้รองรับ (เช่น
        คอแคบสำหรับกีตาร์ไฟฟ้า หรือคอกว้างสำหรับกีตาร์คลาสสิก)
    compatible_needle_size:
      name: ขนาดเข็มที่ใช้งานร่วมกันได้
      description: ระบุขนาด/ประเภทของเข็มที่ออกแบบเคสมาให้รองรับ (เช่น งานปัก พรม
        ความยาวของเข็มแบบเย็บมือ)
    compatible_needle_system:
      name: ระบบเข็มที่ใช้งานร่วมกันได้
      description: ระบบเข็มที่จักรเย็บผ้ารองรับ (เช่น 130/705H)
    compatible_parking_brake_mechanism:
      name: กลไกเบรกมือที่ใช้งานร่วมกันได้
      description: ระบุว่าออกแบบก้ามปูเบรกมาให้ทำงานร่วมกับกลไกเบรกมือที่มีมาให้ในตัวหรือไม่
    compatible_pedal_instrument_type:
      name: ประเภทเครื่องดนตรีแป้นเหยียบที่เข้ากันได้
      description: ระบุว่าจะใช้คันเหยียบกับอะไร (เช่น เปียโนดิจิทัล, คีย์บอร์ด/ซินธ์,
        MIDI คอนโทรลเลอร์)
    compatible_pedal_type:
      name: ประเภทแป้นเหยียบที่เข้ากันได้
      description: ระบุรูปแบบหรือระบบของแป้นเหยียบที่สายรัดหรือคลิปได้รับการออกแบบมาให้ใช้งานร่วมกันได้
        (เช่น แป้นเหยียบแบบแพลตฟอร์ม, SPD, Look Keo)
    compatible_pin_type:
      name: ประเภทพินที่ใช้งานร่วมกันได้
      description: ประเภทหมุดที่มีการออกแบบแผ่นรองมาให้ใช้ร่วมกัน (หรือระบุว่าสามารถปักหมุดได้หรือไม่)
    compatible_pipe_filter_size:
      name: ขนาดตัวกรองท่อที่เข้ากันได้
      description: ระบุขนาดหรือรูปแบบของตัวกรองที่ท่อได้รับการออกแบบมาให้รองรับ (หรือระบุว่าไม่จำเป็นต้องใช้ตัวกรอง)
    compatible_plate_size:
      name: ขนาดแผ่นฐานที่เข้ากันได้
      description: ขนาดหรือมาตรฐานของแผ่นเกราะกันกระสุนที่เสื้อกั๊กสามารถรองรับได้
    compatible_play_vehicle_scale:
      name: มาตราส่วนรถของเล่นที่เข้ากันได้
      description: ระบุว่าของเล่นขยายสเกลอุปกรณ์เสริมได้รับการออกแบบให้พอดี (เช่น
        1:64) ปรับปรุงความพอดี/ความเข้ากันได้สำหรับนักสะสมและระบบติดตาม
    compatible_playing_surface:
      name: พื้นผิวสนามที่เหมาะสม
      description: ระบุประเภทของสนามหรือพื้นผิวที่รองเท้าอเมริกันฟุตบอลได้รับการออกแบบมาให้ใช้งาน
    compatible_pole_dimensions:
      name: เสาที่รองรับข้อมูล
      description: ระบุขนาดหน้าตัดของเสาที่อุปกรณ์เสริมนี้รองรับ
    compatible_pole_shape:
      name: รูปทรงเสาที่เข้ากันได้
      description: ระบุรูปทรงภาคตัดขวางของเสาหรือคอลัมน์ที่แผ่นนวมซับแรงกระแทกนี้ออกแบบมาให้ใส่ได้พอดี
    compatible_power_steering_system:
      name: ระบบพวงมาลัยเพาเวอร์ที่ใช้งานร่วมกันได้
      description: ระบุประเภทของระบบเลี้ยวที่เหมาะสำหรับการใช้งานของเหลวนี้
    compatible_powerplant_type:
      name: ประเภทโรงไฟฟ้าที่เข้ากันได้
      description: ระบุระบบขับเคลื่อนของปืนบีบีกันที่มีการออกแบบอะไหล่ชิ้นนี้มาให้ใช้งานร่วมกัน
        (เช่น สปริง-ลูกสูบ, CO2, PCP)
    compatible_presser_foot:
      name: ตีนผีเย็บผ้าที่เข้ากันได้
      description: ระบุระบบการติดตั้ง/ความเข้ากันได้ของตีนผีที่จักรเย็บผ้ารองรับ (เช่น
        แบบกดล็อก หรือแบบขันสกรู ได้แก่ ก้านตีนผีต่ำ/สูง/เอียง) ใช้ตัวเลือก 'Universal/Multiple'
        หากรองรับหลายระบบหรือมีอะแดปเตอร์ให้ด้วย
    compatible_protective_gear:
      name: อุปกรณ์ป้องกันที่ใช้งานร่วมกันได้
      description: ระบุว่าอุปกรณ์พยุงคอชิ้นนี้ออกแบบมาให้ใช้งานร่วมกับอุปกรณ์ป้องกันอื่นๆ
        อะไรบ้าง
    compatible_protective_gear_integration:
      name: การประกอบอุปกรณ์ป้องกันที่ใช้งานร่วมกันได้
      description: อธิบายวิธีการใช้งานหรือการประกอบอุปกรณ์ป้องกันเข้ากับอุปกรณ์อื่นๆ
        (เช่น ใส่ในช่องใส่ หรือใช้เป็นสายรัดแยกต่างหาก)
    compatible_punching_bag_type:
      name: ประเภทกระสอบทรายที่ใช้งานร่วมกันได้
      description: ระบุว่าผลิตภัณฑ์นี้สามารถใช้งานร่วมกับกระสอบทรายหรือกระสอบฝึกซ้อมแบบใดได้บ้าง
    compatible_racing_discipline:
      name: ประเภทการแข่งขันที่เข้ากันได้
      description: ระบุประเภทกีฬาแข่งรถที่มีการออกแบบ/รับรองหมวกกันน็อกนี้มาสำหรับใช้งาน
    compatible_rc_scale:
      name: สเกล RC ที่รองรับ
      description: ระบุอัตราส่วนสเกล RC (เช่น 1:10) ที่อุปกรณ์เสริมหรือชิ้นส่วนได้รับการออกแบบให้ใส่ได้พอดี
    compatible_recorder_size:
      name: ขนาดรีคอร์เดอร์ที่ใช้งานร่วมกันได้
      description: ระบุขนาดรีคอร์เดอร์ที่มีการออกแบบเคสนี้มาให้รองรับ
    compatible_recorder_type:
      name: ประเภทรีคอร์เดอร์ที่ใช้งานร่วมกันได้
      description: ระบุประเภท (ซีรีส์/ขนาด) รีคอร์เดอร์ที่อุปกรณ์เสริมนี้รองรับ (เช่น
        โซปราโน, อัลโต)
    compatible_reed_cut:
      name: รูปแบบการตัดลิ้นที่เข้ากันได้
      description: ระบุรูปแบบการตัดแต่งลิ้นที่มีการออกแบบที่รัดลิ้นมาให้รองรับ (เช่น
        ตัดแต่งแบบตะไบ/ฝรั่งเศส หรือแบบไม่ตะไบ/อเมริกัน)
    compatible_reed_type:
      name: ชนิดของลิ้นที่เข้ากันได้
      description: ระบุการตัดแต่ง/ประเภทลิ้นที่มีการออกแบบปากเป่ามาให้รองรับ
    compatible_reel_type:
      name: ประเภทรอกที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบของรอกตกปลาที่กระเป๋า เคส หรือฝาครอบที่ได้รับการออกแบบมาให้ใส่ได้พอดี
    compatible_refrigerant_type:
      name: ประเภทสารทำความเย็นที่ใช้งานร่วมกันได้
      description: ระบุว่าคอยล์เย็นของเครื่องปรับอากาศนั้นออกแบบมาเพื่อใช้กับสารทำความเย็นชนิดใด
    compatible_ride_equipment:
      name: อุปกรณ์สำหรับขี่ที่เข้ากันได้
      description: ประเภทอุปกรณ์กีฬาแบบมีล้อที่มีการออกแบบทางลาดนี้มาให้รองรับ
    compatible_roof_height:
      name: ความสูงหลังคาที่เหมาะสม
      description: ระบุว่าฝาครอบนี้ออกแบบมาสำหรับหลังคาแบบใด (หลังคามาตรฐาน หรือ หลังคาสูง/แบบยื่น)
    compatible_roof_rail_type:
      name: ประเภทรางหลังคาที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบหลังคารถที่ชุดแร็คหลังคาตัวฐานออกแบบมาให้ติดตั้งร่วมด้วย
    compatible_rope_count:
      name: จำนวนเชือกที่เข้ากันได้
      description: ระบุรูปแบบเชือกของเวทีชกมวยที่ชิ้นส่วนนั้นได้รับการออกแบบมาให้ใช้งานด้วย
        เช่น เวทีแบบ 3-เชือก เวทีแบบ 4-เชือก หรือใช้ได้กับทุกแบบ
    compatible_rope_type:
      name: ประเภทเชือกที่ใช้งานร่วมกันได้
      description: ระบุว่าสามารถใช้เชือกประเภทใดบ้างกับอุปกรณ์นี้
    compatible_saddle_type:
      name: ประเภทอานที่เข้ากันได้
      description: ระบุุรูปแบบอานม้าหรือประเภทการขี่ม้าที่มีการออกแบบอุปกรณ์เสริมนี้มาให้รองรับ
        เพื่อให้ใช้งานร่วมกับอานม้าแบบอังกฤษ แบบตะวันตก และอานม้าประเภทอื่นๆ ได้อย่างเหมาะสม
    compatible_saxophone_size:
      name: ขนาดแซกโซโฟนที่ใช้งานร่วมกันได้
      description: ระบุว่าสินค้าเข้ากันได้กับแซกโซโฟนขนาดใด (เช่น โซปราโน อัลโต เทเนอร์)
    compatible_saxophone_type:
      name: ประเภทแซกโซโฟนที่ใช้งานร่วมกันได้
      description: ระบุว่าตัวรัดลิ้น/ฝาครอบนี้ออกแบบมาสำหรับแซกโซโฟนรุ่นใด
    compatible_scale_length:
      name: ความยาวสเกลที่เข้ากันได้
      description: ระบุช่วงความยาวขยายสเกลของกีต้าร์ที่ ตั้งชื่อไว้ (เช่น ขยายสเกลแบบสั้น,
        มาตรฐาน, บาริโทน)
    compatible_seat_airbag:
      name: ถุงลมนิรภัยที่นั่งที่เข้ากันได้
      description: ระบุว่าเบาะนั่งรองรับ/มีถุงลมนิรภัยด้านข้างหรือไม่ รวมถึงสามารถใช้งานร่วมกับรถยนต์ที่ติดตั้งถุงลมนิรภัยบริเวณเบาะนั่งได้หรือไม่
    compatible_seating_capacity:
      name: จำนวนที่นั่งในรถยนต์ที่รองรับการใช้งาน
      description: ระบุจำนวนที่นั่งหรือรูปแบบที่อุปกรณ์เสริมได้รับการออกแบบมาให้ใช้งานได้
    compatible_sensor_port_type:
      name: ประเภทพอร์ตเซ็นเซอร์ที่เข้ากันได้
      description: ระบุว่าอ่างน้ำมันเครื่องรองรับเซ็นเซอร์ระดับน้ำมันและ/หรือเซ็นเซอร์อุณหภูมิน้ำมันหรือไม่
        รวมถึงประเภทพอร์ต หากมี
    compatible_shifter_type:
      name: ประเภทคันเกียร์ที่เข้ากันได้
      description: ระบุประเภทหรือรูปแบบคันเกียร์ที่มีการออกแบบปลอกหุ้มคันเกียร์นี้มาให้รองรับ
    compatible_shis:
      name: SHIS ที่ใช้งานร่วมกันได้
      description: แสดงรายการรหัสระบบระบุชุดหูฟังมาตรฐาน (SHIS) ที่ชิ้นส่วนนั้นใช้ร่วมกันได้
        (เช่น IS42, EC34, ZS44/28.6)
    compatible_skating_discipline:
      name: ประเภทการเล่นสเก็ตที่ใช้งานร่วมกันได้
      description: ระบุประเภทกีฬาสเก็ตที่ชิ้นส่วนหรืออุปกรณ์เสริมนั้นได้รับการออกแบบมาให้ใช้งานได้
    compatible_snowshoe_deck_type:
      name: ประเภทของพื้นรองเท้าสำหรับรองเท้าหิมะที่ใช้งานร่วมกันได้
      description: ระบุรูป Frame หรือพื้นรองเท้าสำหรับรองเท้าหิมะที่สามารถใช้งานร่วมกับอุปกรณ์ยึดติดได้
    compatible_special_effects_lighting_features:
      name: คุณสมบัติแสงเอฟเฟกต์พิเศษที่ใช้งานร่วมกันได้
      description: Highlight ความสามารถทั่วไปที่ขับเคลื่อนการตัดสินใจเลือกซื้อเอฟเฟกต์แสง
        (Beyond สี/รูปแบบ) เช่น การเชื่อมโยงหน่วยหรือการตอบสนองต่อเสียง
    compatible_spinning_wheel_drive_system:
      name: ระบบขับเคลื่อนล้อหมุนที่เข้ากันได้
      description: ระบุว่าระบบขับเคลื่อนสปินนิ่งวีลประเภทใดที่อุปกรณ์เสริมนี้รองรับ
    compatible_spoke_gauge:
      name: ขนาดเกจซี่ล้อที่รองรับการใช้งานร่วมกัน
      description: ระบุขนาดเกจลวดซี่ล้อที่เกลียวนิปเปิลรองรับ เพื่อช่วยให้ผู้ซื้อเลือกจับคู่ซี่ล้อกับนิปเปิลได้อย่างถูกต้อง
    compatible_steering_wheel_airbag:
      name: ถุงลมนิรภัยที่ใช้งานร่วมกับพวงมาลัยได้
      description: ระบุว่าพวงมาลัย ความช่วยเหลือ ยึด Modules ถุงลมนิรภัย OEM ไว้หรือไม่
        (หรือมีไว้สำหรับแอปพลิเคชันที่ไม่มีถุงลมนิรภัย)
    compatible_steering_wheel_control_button:
      name: ปุ่มควบคุมพวงมาลัยที่ใช้งานร่วมกันได้
      description: ระบุความเข้ากันได้กับปุ่มควบคุมที่ติดตั้งบนพวงมาลัยมาจากโรงงาน
        (เช่น ระบบเสียง/ครูซคอนโทรล/โทรศัพท์) และสายไฟที่เกี่ยวข้อง
    compatible_stencil_material:
      name: วัสดุสเตนซิลที่เข้ากันได้
      description: วัสดุที่เครื่องสามารถใช้สร้างหรือประมวลผลสเตนซิลได้ (เช่น กระดาษ
        ฟิล์มพลาสติก ไมลาร์)
    compatible_stencil_media_format:
      name: รูปแบบสื่อสเตนซิลที่เข้ากันได้
      description: 'ระบุว่าปัจจัยรูปแบบสื่อลายฉลุใดที่เครื่องให้ความช่วยเหลือ: แผ่น
        ม้วน หรือทั้งสองอย่าง'
    compatible_strap_retractor:
      name: ตัวดึงสายรัดที่ใช้งานร่วมกันได้
      description: ระบุว่าสายรัดนั้นใช้ได้กับระบบดึงกลับอัตโนมัติหรือไม่ หรือออกแบบมาสำหรับเข็มขัดนิรภัยแบบคงที่
        (ไม่สามารถดึงกลับอัตโนมัติ)
    compatible_string_instrument_finish:
      name: พื้นผิวของเครื่องดนตรีประเภทสายที่ใช้งานร่วมกันได้
      description: ระบุว่าน้ำยาขัดเงาชนิดนี้ปลอดภัยที่จะใช้กับพื้นผิวของเครื่องดนตรีประเภทใดบ้าง
    compatible_substrate_material:
      name: วัสดุพื้นผิวที่เหมาะสำหรับการใช้งาน
      description: วัสดุพื้นผิวที่สีทาถูกออกแบบมาให้ยึดเกาะได้ดี
    compatible_surface:
      name: พื้นผิวที่เข้ากันได้
      description: ระบุพื้นผิว/วัสดุที่แผ่นตีนตุ๊กแกจะใช้ยึดติด
    compatible_surface_material:
      name: วัสดุพื้นผิวที่เหมาะสำหรับนำผลิตภัณฑ์ไปใช้
      description: วัสดุพื้นผิวยานพาหนะที่ผลิตภัณฑ์ออกแบบมาให้ใช้งานด้วยได้
    compatible_tear_off_system:
      name: ระบบฉีกออกที่ใช้งานร่วมกันได้
      description: ระบุว่าแว่นตารองรับแผ่นเทียร์ออฟและ/หรือโรลออฟหรือไม่ รวมถึงมีหมุดยึดสำหรับติดตั้งแผ่นเทียร์ออฟหรือไม่
    compatible_thermostat_type:
      name: ประเภทเทอร์โมสตัทที่ใช้งานร่วมกันได้
      description: ตรวจสอบว่าคอท่อน้ำ/ตัวเรือนได้รับการออกแบบให้รองรับปรอทวัดอุณหภูมิหรือไม่
        และหากรองรับ จะเป็นปรอทวัดอุณหภูมิชนิดใดและขนาดใด
    compatible_thread:
      name: รูปแบบเส้นด้ายที่ใช้งานด้วยได้
      description: ระบุประเภทเส้นด้าย/เส้นไหมที่มีการออกแบบอุปกรณ์ร้อยด้ายมาให้รองรับ
        (ตามความหนา/ประเภท)
    compatible_thread_spool_format:
      name: รูปแบบเส้นด้ายหรือหลอดด้ายที่ใช้งานด้วยได้
      description: ระบุรูปแบบเส้นด้ายที่มีการออกแบบกล่องมาสำหรับจัดเก็บ (หลอดด้าย
        กระสวย กระสวย/แผ่นพันด้าย กรวยด้าย ฯลฯ)
    compatible_thread_yarn_tool:
      name: รูปแบบเส้นด้ายหรือเครื่องมือถักที่ใช้งานด้วยได้
      description: การใช้งานร่วมกันได้ของเครื่องจักร/ระบบสำหรับเครื่องมือที่ติดตั้งหรือใช้งานร่วมกับอุปกรณ์อื่นๆ
        (เช่น จักรเย็บผ้า, จักรโอเวอร์ล็อก, เครื่องทอผ้า, เครื่องปั่นด้าย)
    compatible_tire_application:
      name: การใช้งานล้อรถที่เข้ากันได้
      description: ระบุยาง/ล้อ เครื่องมือกลุ่มที่เบรกเกอร์ขอบยางถูกออกแบบมาเพื่อให้ใช้งานด้วย
        (ขึ้นอยู่กับยาง/ล้อที่กำลังเข้ารับบริการ ไม่ใช่รุ่นของยานพาหนะ)
    compatible_tom_pad_mounting:
      name: การติดตั้งแผ่นรองทอมที่เข้ากันได้
      description: ระบุว่ากลองทอมอิเล็กทรอนิกส์จะติดตั้งกับอะไร (เช่น ตัวยึดแบบหนีบ/แท่ง,
        แท่งรูปตัว L, ขาตั้ง) ซึ่งส่งผลต่อว่าจะสามารถติดตั้งกับระบบที่มีอยู่ได้หรือไม่
    compatible_toy_vehicle_scale:
      name: มาตราส่วนรถของเล่นที่เข้ากันได้
      description: ระบุสเกลรถของเล่นหรือขนาดรถโดยประมาณที่ชุดของเล่นนี้รองรับการใช้งานร่วมกันได้
    compatible_tpms_sensor_type:
      name: ประเภทเซ็นเซอร์ TPMS ที่ใช้งานร่วมกันได้
      description: ระบุว่าล้อช่วยเหลือเซ็นเซอร์ TPMS และ/หรือวาล์ว/เซ็นเซอร์ประเภทใดที่จำเป็น
    compatible_training_equipment:
      name: อุปกรณ์ฝึกซ้อมที่ใช้งานร่วมกันได้
      description: ระบุประเภทอุปกรณ์ฝึกซ้อมหรืออุปกรณ์ฟิตเนสที่สามารถติดตั้งเข้ากับตัวยึดได้
    compatible_treadmill_design:
      name: ดีไซน์ลู่วิ่งที่เข้ากันได้
      description: ระบุดีไซน์ของลู่วิ่งที่อุปกรณ์เสริมรองรับ เช่น รุ่นพับเก็บได้ หรือรุ่นพับเก็บไม่ได้
    compatible_tube:
      name: ท่อที่เข้ากันได้
      description: ระบุประเภทยางในหรือยางนอกที่มีการออกแบบแผ่นปะนี้มาให้ใช้กันได้
        เช่น บิวทิล ลาเท็กซ์, TPU หรือแบบไม่ใช้ยางใน
    compatible_valve_type:
      name: ประเภทวาล์วที่ใช้งานร่วมกันได้
      description: ระบุว่าสารหล่อลื่นนั้นสามารถใช้กับวาล์วทองเหลืองประเภทใดได้บ้าง
    compatible_vaporizing_material:
      name: วัสดุทำระเหยที่รองรับการใช้งานร่วมกัน
      description: ระบุประเภทของวัสดุที่ตัวเครื่องออกแบบมาเพื่อใช้ทำระเหย
    compatible_vehicle_windshield_fluid:
      name: น้ำยาเช็ดกระจกรถยนต์ที่ใช้งานด้วยได้
      description: การระบุข้อมูลการใช้งานร่วมกันได้ที่เกี่ยวกับอุปกรณ์รถยนต์หรือการเคลือบกระจก
        (เช่น ปลอดภัยต่อสารเคลือบกระจกกันน้ำ, ปลอดภัยต่อระบบฉีดน้ำล้างไฟหน้า)
    compatible_visor_system:
      name: ระบบบังแดดที่ใช้งานร่วมกันได้
      description: ระบุว่าหมวกกันน็อคมอเตอร์ไซค์รุ่นนี้สามารถใช้งานร่วมกับระบบบังแดด/แผ่นบังลมแบบใดได้บ้าง
    compatible_water_board_type:
      name: ประเภทกระดานกีฬาทางน้ำที่ใช้งานร่วมกันได้
      description: ระบุประเภทบอร์ดกีฬาทางน้ำที่ชั้นวางบนหลังคานี้ออกแบบมาเพื่อใช้บรรทุก
    compatible_water_sport_board_type:
      name: ประเภทของบอร์ดกีฬาทางน้ำที่ใช้งานร่วมกันได้
      description: ระบุประเภทของแผ่นไม้ที่ชั้นวางนี้ออกแบบมาเพื่อขนส่ง
    compatible_watercraft_communication_standard:
      name: มาตรฐานการสื่อสารทางน้ำที่ใช้งานร่วมกันได้
      description: ระบุมาตรฐานการสื่อสาร/ระบบเครือข่ายทางทะเล หรือโปรโตคอลการเชื่อมต่อที่รองรับ
        เพื่อการร่วมกับระบบอิเล็กทรอนิกส์บนเรือ
    compatible_watercraft_engine_type:
      name: ประเภทเครื่องยนต์เรือที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบระบบส่งกำลังของเครื่องยนต์เรือที่ชิ้นส่วนนี้ออกแบบมาให้ใส่ได้พอดี
        (เครื่องยนต์ท้ายเรือ/เครื่องยนต์วางในเรือ/เครื่องยนต์ท้ายเรือแบบอินบอร์ด-เอาท์บอร์ด/เครื่องยนต์เจ็ทไดรฟ์)
    compatible_weight_plate_diameter:
      name: เส้นผ่านศูนย์กลางของแผ่นน้ำหนักที่เข้ากันได้
      description: ระบุขนาดเส้นผ่านศูนย์กลางของแผ่นน้ำหนักที่เครื่องรองรับ
    compatible_wheel_finish:
      name: สีล้อที่เข้ากันได้
      description: ระบุพื้นผิว/วัสดุของล้อที่น้ำยาทำความสะอาดนี้สามารถใช้ได้อย่างปลอดภัย
        (ตามที่ผู้ผลิตกล่าวอ้าง)
    compatible_whorl_drive_band_type:
      name: ประเภทของสายพานขับเคลื่อนและล้อหมุนที่รองรับการใช้งานร่วมกัน
      description: ระบุรูปแบบสายพานขับที่มีการออกแบบรอกมาให้ใช้งานร่วมกันได้
    compatible_wick_series:
      name: ซีรี่ส์ไส้ตะเกียงที่เข้ากันได้
      description: ระบุซีรีส์/ประเภทไส้ตะเกียงที่มีการออกแบบแผ่นแท็บมาให้รองรับ (ตามชื่อเรียกในอุตสาหกรรม)
        หากผู้ขายระบุไว้
    compatible_winder_head_bit:
      name: หัว/ดอกสว่านของเครื่องม้วนที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบหัวแกนเสียบหรือปุ่มลูกบิดตั้งสายที่เครื่องหมุนลูกบิดนี้รองรับการใช้งานร่วมด้วย
        (เช่น หัวแบบร่อง, แบบเปลี่ยนหัวเปลี่ยนได้, หรือหัวแบบสากล)
    compatible_windlass_rode:
      name: ประเภทของสมอและเชือกที่ใช้งานด้วยได้
      description: ระบุประเภทของสายสมอเรือที่เครื่องกว้านสมอออกแบบมาให้ใช้งานด้วยได้
    compatible_windshield_type:
      name: ประเภทกระจกหน้ารถที่ใช้งานร่วมกันได้
      description: ระบุรูปแบบการติดตั้งกระจกหน้ารถที่มีการออกแบบโครงครอบมาให้ใช้งานร่วมกันได้
    compatible_wood:
      name: ไม้ที่เหมาะสม
      description: ระบุประเภทเนื้อไม้ของฟิงเกอร์บอร์ดที่น้ำยาเคลือบเงา/น้ำยาทำความสะอาดนี้แนะนำให้ใช้หรือปลอดภัยต่อการใช้งาน
    compatible_writing_surface:
      name: พื้นผิวสำหรับเขียนที่ใช้งานด้วยได้
      description: ระบุพื้นผิว/กระดาษที่มีการออกแบบหมึกมาให้ใช้งานร่วมกันได้ดีที่สุด
    compatible_zipper_size:
      name: ขนาดซิปที่ใช้งานร่วมกันได้
      description: 'ระบุขนาดซิปที่มีการออกแบบตัวดึงซิปมาให้ใช้งานร่วมกันได้ (มักระบุเป็น
        #3, #5, #8, #10) เพื่อช่วยเพิ่มประสิทธิภาพในการกรองความเข้ากันได้'
    compliance_certification:
      name: 123ใบรับรองการปฏิบัติตามข้อกำหนด
      description: ไฟสัญญาณจราจรนี้ผ่านมาตรฐานการปฏิบัติตาม/การอนุมัติสำหรับการใช้งานบนท้องถนนและความเข้ากันได้ทางแม่เหล็กไฟฟ้า
    component_position:
      name: ตำแหน่งของส่วนประกอบ
      description: ระบุตำแหน่งสัมพัทธ์ของชิ้นส่วนภายในชุดระบบตั้งจังหวะเครื่องยนต์
        (เช่น ฝาครอบด้านหน้า/ด้านหลัง หรือส่วนบน/ส่วนล่าง) โดยไม่อ้างอิงตำแหน่งด้านหน้า/หลังของรถยนต์
    concentration_level:
      name: ระดับความเข้มข้น
      description: การระบุระดับความเข้มข้นของมะเขือเทศเข้มข้น (แบบเข้มข้นเท่าตัว,
        สองเท่า, หรือสามเท่า) เพื่อประโยชน์ในการเลือกใช้ให้ตรงตามที่สูตรอาหารกำหนด
    concentration_type:
      name: ประเภทความเข้มข้น
      description: ระบุว่าผลิตภัณฑ์เป็นแบบพร้อมใช้หรือแบบเข้มข้น และ (หากเป็นแบบเข้มข้น)
        คำแนะนำในการเจือจางโดยทั่วไป
    concert_bass_drum_mounting_stand_type:
      name: ขาตั้งกลองเบสคอนเสิร์ต
      description: วิธีการรองรับหรือติดตั้งกลองเบสคอนเสิร์ตเพื่อประสิทธิภาพ
    concert_pitch_standard:
      name: มาตรฐานระดับเสียงคอนเสิร์ต
      description: ระบุความถี่อ้างอิงของเสียงคอนเสิร์ตพิทช์ (A4) ที่เปียโนถูกปรับตั้งไว้
        ณ เวลาที่ขาย (เช่น A440, A442, A444)
    condiment_form:
      name: รูปแบบเครื่องปรุงรส
      description: ระบุรูปแบบทางกายภาพหรือเนื้อสัมผัสของสินค้าฮอร์สแรดิช (เช่น แบบขูดละเอียด
        ผง หรือครีม)
    condiment_texture:
      name: เนื้อสัมผัสของเครื่องปรุง
      description: อธิบายลักษณะทางกายภาพของเครื่องเคียงหรือแยม (เช่น เป็นชิ้นๆ หรือเนียนละเอียด)
    confetti_format:
      name: รูปแบบคอนเฟตติ
      description: ระบุรูปแบบสินค้ากระดาษโปรย โดยพิจารณาจากลักษณะการบรรจุหรือวิธีการปล่อย
        (เช่น แบบโปรยธรรมดา หรือแบบดึงเชือก/บิดกระบอก)
    conga_head_tensioning_system:
      name: ระบบปรับความตึงหัวคองก้า
      description: ประเภทฮาร์ดแวร์ที่ใช้ในการปรับความตึง/ปรับแต่งกลองคองกา (เช่น ระบบลูกบิดแบบดั้งเดิม
        หรือกลไกปรับจูนรวดเร็วแบบสมัยใหม่)
    conga_set_included_drum_types:
      name: ประเภทของกลองที่รวมอยู่ในชุดกลองคองกา
      description: ระบุประเภทของกลองคองก้าที่มีมาให้ในชุด (เช่น ควิงโต + คองก้า +
        ทุมบา)
    connector_case_style:
      name: รูปแบบเคสตัวเชื่อมต่อ
      description: จำแนกรูปแบบโครงสร้างโดยรวมของเคสใส่หัวต่อ (เช่น เคสแบบแข็ง เทียบกับ
        กระเป๋าแบบนุ่ม) เพื่อสะท้อนถึงระดับการปกป้องและความสะดวกในการพกพา
    console_cover_installation_method:
      name: วิธีการติดตั้งฝาครอบคอนโซล
      description: ระบุวิธีการยึดฝาครอบคอนโซลเข้ากับคอนโซล/ที่วางแขน (เช่น แบบสวม
        สายรัดยางยืด ตีนตุ๊กแก กาว คลิปหนีบ)
    console_display_type:
      name: ประเภทจอแสดงผลคอนโซล
      description: ระบุรูปแบบการแสดงผลของผู้ใช้บนเครื่อง (เช่น LCD, LED, หน้าจอสัมผัส)
    construction_design:
      name: การออกแบบโครงสร้าง
      description: ระบุจำนวนชิ้นส่วนแบบข้อต่อของแผ่นรอง ซึ่งส่งผลต่อความคล่องตัวในการใช้งาน
        (เช่น แบบชิ้นเดียว หรือแบบ 3 ชิ้น)
    contact_angle:
      name: มุมสัมผัส
      description: ระบุค่ามุมสัมผัสของรางลูกปืน โดยแสดงเป็นมุมเดียวหรือชุดมุมคู่ (เช่น
        36°/45°)
    contact_juggling_ball_fill_type:
      name: ประเภทของวัสดุที่ใช้เติมในลูกบอลคอนแทคจั๊กกลิ้ง
      description: ระบุว่าลูกบอลเป็นแบบตันหรือแบบบรรจุวัสดุภายใน (และหากมีการบรรจุ
        จะเป็นวัสดุประเภทใด) ซึ่งมีผลต่อการกระจายน้ำหนักและความทนทาน
    contact_juggling_ball_transparency:
      name: ระดับความโปร่งแสงของลูกบอลคอนแทคจั๊กกลิ้ง
      description: ระบุระดับความโปร่งแสง/ลักษณะทางทัศนศาสตร์ของลูกบอล
    contact_surface_material:
      name: วัสดุพื้นผิวจุดสัมผัส
      description: ระบุวัสดุที่ใช้บริเวณจุดสัมผัสกับเครื่องดนตรี (เช่น ไม้คอร์ก/ยาง)
        เพื่อป้องกันรอยขีดข่วนและเพิ่มการยึดเกาะ
    container_material:
      name: วัสดุที่ใช้ทำบรรจุภัณฑ์
      description: ระบุวัสดุหลักที่ใช้ทำบรรจุภัณฑ์สำหรับค้าปลีก (เช่น แก้ว, พลาสติก
        PET หรืออะลูมิเนียม)
    contaminant_removal:
      name: การกำจัดสารปนเปื้อน
      description: ระบุประเภทของสารปนเปื้อนที่ผลิตภัณฑ์ได้รับการรับรองว่าสามารถกำจัดหรือลดลงได้
    contra_alto_clarinet_body_configuration:
      name: รูปทรงตัวคลาริเน็ตคอนทราอัลโต
      description: อธิบายรูปแบบโครงสร้างทางกายภาพของคลาริเน็ตคอนทราอัลโต (เช่น แบบตรงเทียบกับแบบพับ)
    contra_alto_clarinet_lowest_note_extension:
      name: การขยายเสียงต่ำสุดของคลาริเน็ตคอนทราอัลโต
      description: ระบุช่วงเสียงโน้ตต่ำสุดที่เครื่องดนตรีสามารถเล่นได้ (ขอบเขตโน้ตต่ำสุดของกลไกคีย์)
        ซึ่งมักใช้แยกความแตกต่างของโมเดลเสียง เช่น Low E♭, Low D หรือ Low C
    contra_bass_clarinet_bell_type:
      name: คลาริเน็ตคอนทราเบสแบบปากลำโพง
      description: รูปแบบการจัดเรียงปากลำโพงที่ใช้กับคลาริเน็ตเบส (contra-bass clarinet)
    contra_bass_clarinet_bore_type:
      name: ประเภทรูภายในของคลาริเน็ตคอนทราเบส
      description: การออกแบบรูภายในของเครื่องมือ
    contra_bass_clarinet_lowest_written_note:
      name: โน้ตที่เขียนต่ำที่สุดของคลาริเน็ตคอนทราเบส
      description: โน้ตที่เขียนไว้ต่ำสุดที่เครื่องดนตรีนั้นสามารถเล่นได้ (มักขึ้นอยู่กับว่าโน้ต
        C ต่ำหรือโน้ต Eb ต่ำนั้นแตกต่างกันอย่างไร)
    control_arm_bushing_material:
      name: วัสดุของบูชปีกนก
      description: ระบุวัสดุของบูชที่รวมอยู่/ติดตั้งไว้ หากมี
    control_arm_bushings_included:
      name: รวมบูชปีกนก
      description: ระบุว่าแขนควบคุมจัดส่งพร้อมบูชที่ติดตั้งแล้วหรือไม่
    control_arm_finish:
      name: พื้นผิวเคลือบของปีกนก
      description: ระบุสารเคลือบผิวป้องกันที่พ่นบนปีกนก (เพื่อป้องกันการกัดกร่อนและความสวยงาม)
    control_arm_grease_fitting_type:
      name: ประเภทของหัวอัดจาระบีของปีกนก
      description: ระบุว่าชุดปีกนก/ลูกหมากมีหัวอัดจาระบี (หัวเซอร์ก) มาให้ด้วยหรือไม่
        และเป็นรุ่นที่สามารถถอดบำรุงรักษาได้หรือไม่
    control_arm_material:
      name: วัสดุแขนควบคุม
      description: ระบุวัสดุหลักและกรรมวิธีการผลิตของตัวโครงปีกนก
    control_arm_position:
      name: ตำแหน่งการติดตั้งของปีกนก
      description: ระบุตำแหน่งการติดตั้งในระบบช่วงล่างที่ปีกนกนี้ถูกออกแบบมาเพื่อใช้งาน
        โดยพิจารณาตามตำแหน่งของแกนเพลาและฝั่งของตัวรถ (เช่น บน/ล่าง, หน้า/หลัง, ซ้าย/ขวา)
    control_arm_style:
      name: สไตล์แขนควบคุม
      description: ระบุรูปแบบทรงเรขาคณิตหรือสไตล์การออกแบบของปีกนกที่ใช้ในโครงสร้างระบบช่วงล่าง
    control_cable_connector_type:
      name: ประเภทขั้วต่อสายควบคุม
      description: ระบุรูปแบบปลายสายหรือหัวต่อของสายเคเบิลควบคุม ที่ใช้เชื่อมต่อระหว่างชุดควบคุมและเครื่องยนต์
        (เช่น หัวต่อเฉพาะตามมาตรฐาน OEM)
    control_voltage_or_gate_connectivity:
      name: การเชื่อมต่อระบบแรงดันไฟควบคุมหรือเกต
      description: ระบุการรองรับการเชื่อมต่อแรงดันควบคุม/เกตสำหรับการรวมเข้ากับอุปกรณ์แบบโมดูลาร์/อนาล็อก
    controller_function:
      name: ฟังก์ชันของตัวควบคุม
      description: ระบุหน้าที่หลักของแผงควบคุมลู่วิ่ง เช่น ควบคุมมอเตอร์ จ่ายไฟ หรือขับเคลื่อนอินเวอร์เตอร์
    controller_type:
      name: ประเภทตัวควบคุม
      description: ระบุมอเตอร์ผู้ควบคุม/ระบบควบคุมที่มาพร้อมกับสกู๊ตเตอร์ EV คอนเนลการควบคุม
        (หรือจำเป็นสำหรับการใช้งาน) โดยเน้นที่คุณลักษณะผู้ควบคุมที่เกี่ยวข้องกับความเข้ากันได้และประสิทธิภาพ
    conversion_kit_cooling_method:
      name: ระบบระบายความร้อนของชุดอุปกรณ์ดัดแปลง
      description: แนวทางการจัดการความร้อนหลักที่ใช้สำหรับการรวมมอเตอร์/อินเวอร์เตอร์/แบตเตอรี่
    conversion_kit_installation_complexity:
      name: ระดับความซับซ้อนในการติดตั้งชุดแปลง
      description: ระดับความยากในการติดตั้งโดยประมาณ โดยขึ้นอยู่กับทักษะ/เครื่องมือที่ลูกค้าโดยทั่วไปต้องใช้
    converted_bed_size:
      name: ขนาดเตียงที่ปรับเปลี่ยนแล้ว
      description: ระบุขนาดเตียงหรือโครงร่างที่เปลจะคอนเดนเสทเมื่อติดตั้งการบันทึกนี้
    convertible_configuration:
      name: การกำหนดค่าแบบปรับเปลี่ยนได้
      description: ระบุจำนวนรูปแบบเตียงที่ผลิตภัณฑ์นี้สามารถปรับเปลี่ยนได้ (เช่น เตียงเด็กอ่อนแบบ
        3-in-1 → ปรับเป็นเตียงเด็กโต → ปรับเป็นโซฟาเตียง)
    convertible_high_chair_modes:
      name: โหมดเก้าอี้ทานอาหารเด็กแบบปรับเปลี่ยนได้
      description: ระบุรูปแบบที่นั่งที่เก้าอี้นี้สามารถปรับเปลี่ยนได้
    cookie_decorating_kit_items_included:
      name: รวมการตกแต่งคุกกี้ในรายการด้วย
      description: ระบุรายการอุปกรณ์ตกแต่งแต่ละชิ้นที่รวมอยู่ในชุด เพื่อให้ลูกค้าทราบว่าสินค้าในกล่องมีอะไรบ้างอย่างชัดเจน
        (เช่น หลอดบีบไอซิ่ง เกล็ดน้ำตาล หรือพิมพ์คุกกี้)
    cookie_variety:
      name: คุกกี้หลากหลายชนิด
      description: ระบุรูปแบบหรือประเภทเฉพาะของคุกกี้ เพื่อช่วยให้ผู้ซื้อสามารถค้นหาชนิดที่ตนเองชอบได้อย่างรวดเร็ว
    cooking_state:
      name: สถานะการปรุงอาหาร
      description: ระบุระดับความพร้อมทานหรือความสุกของผลิตภัณฑ์ไก่ ณ ขณะที่วางจำหน่าย
        (เช่น ไก่สด, ปรุงสุกพร้อมทาน, หมักซอส เป็นต้น)
    coolant_additive_purpose:
      name: วัตถุประสงค์ของสารเติมแต่งน้ำหล่อเย็น
      description: ระบุฟังก์ชันหลักของสารเติมแต่งน้ำยาหล่อเย็น (ไม่รวมผลิตภัณฑ์ล้างหม้อน้ำ
        หรือสารอุดรอยรั่วโดยเฉพาะ)
    coolant_base_fluid:
      name: น้ำยาหล่อเย็นพื้นฐาน
      description: ระบุสารตั้งต้นกลุ่มไกลคอลหลักที่ใช้ในสูตรน้ำยาหล่อเย็น/น้ำยาป้องกันเยือกแข็ง
    coolant_outlet_connection_style:
      name: รูปแบบการเชื่อมต่อช่องระบายความร้อน
      description: รูปแบบหัวต่อฝั่งทางออกที่ใช้สำหรับเชื่อมต่อกับท่อยางหม้อน้ำหรือท่อน้ำยาหล่อเย็น
    coolant_outlet_neck_angle:
      name: องศาของคอห่อน้ำยาหล่อเย็น
      description: องศาหรือทิศทางของคอท่อน้ำยาหล่อเย็นเมื่อเทียบกับหน้าแปลนยึดหรือตัวเครื่องยนต์
        สำหรับใช้ในการจัดแนวของท่อยางหม้อน้ำตัวบน
    coolant_technology:
      name: เทคโนโลยีน้ำยาหล่อเย็น
      description: ระบุประเภทเคมีหรือตระกูลเทคโนโลยีของน้ำยาหล่อเย็นที่ใช้ (ตามที่ระบุไว้ทั่วไปบนบรรจุภัณฑ์)
    coolant_temperature_sensor_port:
      name: ช่องต่อเซ็นเซอร์อุณหภูมิน้ำหล่อเย็น
      description: ระบุว่าคอท่อน้ำมีช่องสำหรับติดตั้งเซนเซอร์หรือสวิตช์วัดอุณหภูมิน้ำยาหล่อเย็นมาให้ด้วยหรือไม่
        และใช้หัวต่อรูปแบบใด
    coolant_temperature_sensor_seal_type:
      name: ประเภทซีลเซ็นเซอร์อุณหภูมิน้ำหล่อเย็น
      description: ประเภทของวิธีการซีลกันรั่วที่ใช้ระหว่างตัวเซนเซอร์กับเครื่องยนต์หรือช่องทางเดินน้ำยาหล่อเย็น
    cooling_system_component_included:
      name: ส่วนประกอบระบบหล่อเย็นที่รวมอยู่ในสินค้า
      description: ระบุรายการชิ้นส่วนระบบหล่อเย็นเพิ่มเติมที่รวมมากับปั๊มน้ำ
    cooling_system_flush_application_step:
      name: ขั้นตอนการล้างทำความสะอาดระบบหล่อเย็น
      description: ระบุตำแหน่งการใช้งานของผลิตภัณฑ์ในกระบวนการซ่อมบำรุง (เช่น น้ำยาทำความสะอาดก่อนล้างระบบ
        เทียบกับ น้ำยากล้างสารเคมีตกค้าง/น้ำยาปรับสภาพขั้นสุดท้าย)
    cooling_system_type:
      name: ประเภทระบบระบายความร้อน
      description: ระบุรูปแบบระบบหล่อเย็นที่ใช้ในเครื่องยนต์วางในเรือ (เช่น ระบบน้ำดิบ/ระบบเปิด,
        ระบบปิด/ระบบน้ำจืดพร้อมตัวแลกเปลี่ยนความร้อน, ระบบระบายความร้อนใต้ท้องเรือ)
    cord_material:
      name: วัสดุที่ใช้ทำเชือก
      description: ระบุวัสดุของเชือกที่ใช้ดึงสำลีผ่านแซกโซโฟน
    core_type_bass_strings:
      name: ประเภทของแกนสาย (สำหรับสายเบส)
      description: ระบุรูปทรงของแกนสาย ซึ่งส่งผลต่อความรู้สึกและการยืดหยุ่นของสาย
    cork_grease_base_material:
      name: วัสดุฐานของจาระบีทาไม้ก๊อก
      description: ส่วนประกอบหลักของสูตรจาระบีทาไม้ก๊อก (เช่น มีลาโนลินเป็นส่วนประกอบหลัก)
    cork_grease_form:
      name: รูปแบบจาระบีไม้ก๊อก
      description: รูปแบบทางกายภาพของผลิตภัณฑ์จาระบีทาไม้ก๊อก
    corn_presentation:
      name: การนำเสนอข้าวโพด
      description: ระบุลักษณะทางกายภาพหรือรูปแบบของผลิตภัณฑ์ข้าวโพด (เช่น ข้าวโพดทั้งฝักพร้อมเปลือก
        เมล็ดข้าวโพด หรือผงข้าวโพด)
    corn_syrup_variety:
      name: น้ำเชื่อมข้าวโพดชนิดต่างๆ
      description: ระบุรูปแบบเฉพาะหรือกรรมวิธีการแปรรูปของน้ำเชื่อม
    corn_variety:
      name: พันธุ์ข้าวโพด
      description: ระบุสายพันธุ์ทางพฤกษศาสตร์หรือชื่อเรียกทางการตลาดเฉพาะของข้าวโพดที่นำมาจำหน่าย
        เพื่อช่วยให้ผู้ซื้อสามารถแยกแยะความแตกต่างระหว่างสายพันธุ์ที่มีรสชาติ เนื้อสัมผัส
        สีสัน และการนำไปใช้ในการประกอบอาหารที่แตกต่างกันได้
    corner_compatibility:
      name: ความเข้ากันได้กับมุม
      description: ระบุ Shapes มุมโต๊ะ (สี่เหลี่ยมหรือกลม) ที่ผ้าคลุมได้รับการออกแบบมาให้ใช้
    corner_flag_features:
      name: คุณสมบัติเฉพาะของธงมุมสนาม
      description: ไฮไลท์คุณลักษณะเด่นทางฟังก์ชันหรือส่วนเสริมประสิทธิภาพของธงมุมสนาม
        (เช่น เสาแบบพับเก็บได้, วัสดุสะท้อนแสง)
    cornet_mouthpiece_shank_type:
      name: ปากเป่าคอร์เน็ตแบบก้าน
      description: ระบุมาตรฐานปลอก/ก้านเสียบของปากเป่าที่คอร์เนตรองรับ เพื่อความเข้ากันได้ในการใช้งาน
    cornhole_league_certification:
      name: การรับรองโดยลีกคอร์นโฮล
      description: ระบุการรับรองอย่างเป็นทางการหรือการอนุมัติโดยลีกกีฬาที่ผลิตภัณฑ์นี้ผ่านมาตรฐาน
    corrosion_resistance:
      name: ความทนทานต่อการกัดกร่อน
      description: ระบุการเคลือบหรือระดับความต้านทานการกัดกร่อนของตัวยึด/ขาตั้ง สำหรับการใช้งานกลางแจ้ง
    corrosion_resistance_level:
      name: ระดับความต้านทานการกัดกร่อน
      description: ระบุระดับการป้องกันการกัดกร่อนที่เหมาะสำหรับสภาพแวดล้อมน้ำจืด/น้ำเค็ม
    costume_components_included:
      name: ส่วนประกอบของเครื่องแต่งกาย ได้แก่
      description: ระบุรายละเอียดของเสื้อผ้าและเครื่องประดับที่รวมอยู่ในชุด โดยชี้แจงว่าสิ่งใดเป็นส่วนหนึ่งของชุด
    cotton_weave_type:
      name: ประเภทการทอผ้าฝ้าย
      description: อธิบายโครงสร้างการทอ/ถักของพื้นผิวผ้าฝ้ายที่สามารถพิมพ์ได้ ซึ่งส่งผลต่อพื้นผิวและความคมชัดของการพิมพ์
    counter_type:
      name: ประเภทตัวนับ
      description: ระบุการมีอยู่และรูปแบบของระบบนับจำนวนครั้งซ้ำหรือระบบติดตามแรงในตัว
    counterweight_fill_material:
      name: วัสดุสำหรับบรรจุตุ้มถ่วง
      description: ระบุสารที่สามารถใช้เติมลงในตุ้มถ่วงหรือเติมล่วงหน้าในตุ้มถ่วงได้
    counterweight_type:
      name: ประเภทตุ้มถ่วง
      description: ระบุรูปแบบการออกแบบหรือโครงสร้างของตัวถ่วงน้ำหนัก เช่น ถุงทราย
        หรือ แผ่นเหล็ก เพื่อช่วยในเรื่องความเข้ากันได้และการติดตั้ง
    coupler_system:
      name: ระบบข้อต่อ
      description: รูปแบบหรือระบบของข้อต่อพ่วงที่ติดตั้งกับตัวหัวรถจักรโมเดล เพื่อความเข้ากันได้ในการต่อพ่วงกับตู้รถไฟ
    court_surface_suitability:
      name: ความเหมาะสมของพื้นสนาม
      description: ระบุพื้นสนามบาสเก็ตบอลที่พื้นรองเท้าได้รับการออกแบบมา ช่วยให้เลือกซื้อรองเท้าที่มีการยึดเกาะและความทนทานที่เหมาะสมสำหรับสนามในร่มที่เป็นไม้
        สนามกลางแจ้งที่เป็นแอสฟัลต์/คอนกรีต หรือทั้งสองอย่าง
    cover_fit_style:
      name: รูปแบบการคลุมของผ้าคลุม
      description: อธิบายวิธีการที่ผ้าคลุมครอบลงบนโต๊ะ ซึ่งส่งผลต่อรูปลักษณ์และระดับการป้องกัน
    cover_fit_type:
      name: ประเภทการหุ้ม
      description: ระบุว่าผ้าคลุมนั้นเป็นแบบสั่งทำพิเศษ (สั่งตัด/กึ่งสั่งทำ) หรือแบบทั่วไป
        และมีวัตถุประสงค์เพื่อใช้สำหรับการจอดเรือในน้ำหรือสำหรับการจัดเก็บ/ขนส่งบนรถพ่วง
    cowbell_beater_type:
      name: ประเภทของไม้ตีคาวเบลล์
      description: ประเภทของอุปกรณ์ตีที่แนะนำสำหรับเสียง/พื้นผิวเคลือบของคาวเบลล์
        (หากผลิตภัณฑ์มีการระบุไว้)
    cowbell_mounting_method:
      name: วิธีการติดตั้งคาวเบลล์
      description: รูปแบบที่คาวเบลล์ออกแบบมาสำหรับการติดตั้งหรือการใช้งาน (แบบถือด้วยมือ
        เทียบกับ แบบยึดเข้ากับฮาร์ดแวร์/ขาตั้ง)
    cowbell_sound_character:
      name: ลักษณะเสียงกระดิ่งวัว
      description: ลักษณะโทนเสียงโดยรวมที่ใช้ในรายการสินค้า (เพื่อช่วยในการค้นหาข้อมูลที่นอกเหนือจากเรื่องของขนาด)
    cradle_capacity:
      name: ความจุของเปล
      description: ระบุว่าเปลนั้นออกแบบมาสำหรับทารกคนเดียวหรือแฝด
    craft_cutter_embosser_machine_operation:
      name: การใช้งานเครื่อง Craft /ปั๊มลายนูนงานฝีมือ
      description: ระบุรูปแบบการทำงานของเครื่องตัด/เครื่องปั๊มนูนในมุมมองขั้นตอนการใช้งานของผู้ใช้
        (เช่น แบบแกนหมุนด้วยมือ, แบบปุ่มกดไฟฟ้า, แบบควบคุมผ่านแอปพลิเคชัน)
    craft_decoration_maker_accessories_included:
      name: อุปกรณ์เสริมที่มีมาให้ในชุดของเครื่องทำของตกแต่งงานฝีมือ
      description: ระบุรายการอุปกรณ์เสริมหลักที่มีมาให้ในชุดของเครื่องทำของตกแต่งงานฝีมือ
        (เช่น เทป/ฟิล์มเริ่มต้น, สติกเกอร์รีฟิล, ตลับกากเพชร, อุปกรณ์ทำความสะอาด)
    craft_foil_application_method:
      name: วิธี Craft คราฟฟอยล์
      description: ระบุวิธีการใช้งานหรือการทำให้แผ่นฟอยล์งานฝีมือติดแน่น (เช่น ใช้กาว,
        ใช้ความร้อน, ใช้โทนเนอร์/ทำปฏิกิริยาเคมี)
    craft_foil_format:
      name: รูปแบบของแผ่นฟอยล์งานฝีมือ
      description: ระบุรูปแบบทางกายภาพของแผ่นฟอยล์งานฝีมือตามที่วางจำหน่าย (เช่น แบบม้วน
        เทียบกับ แบบแผ่น)
    craft_glue_finish:
      name: ตกแต่งด้วยกาว Craft
      description: อธิบายลักษณะของกาวหลังจากการทำให้แห้ง (เช่น เบล, สีฟ้า/ทึบแสง,
        โปร่งแสง, มันเงา/ด้าน)
    craft_magnet_application:
      name: การใช้งานแม่เหล็กงานฝีมือ
      description: กรณีการใช้งานหลักสำหรับงานฝีมือ หรือพื้นผิวการติดตั้งที่กำหนดไว้สำหรับผลิตภัณฑ์แม่เหล็ก
    craft_magnet_holding_strength_level:
      name: ระดับความแรงในการยึดเกาะของแม่เหล็กงานฝีมือ
      description: หมวดหมู่ความแข็งแรงสัมพัทธ์ของแม่เหล็ก Craft เพื่อช่วยแนะนำการเลือกซื้อแม่เหล็กที่มีแรงยึดเกาะที่เหมาะสมสำหรับโครงการของคุณ
    craft_organizer_storage_features:
      name: คุณสมบัติการจัดเก็บอุปกรณ์ Craft
      description: อธิบายคุณลักษณะการจัดเก็บและชิ้นส่วนจัดเก็บภายในของอุปกรณ์จัดระเบียบงานฝีมือ
        (เช่น แผ่นกั้นแบบปรับได้, ลิ้นชัก, ช่องเก็บของแบบใส)
    craft_scoring_board_included_accessories:
      name: กระดานให้คะแนน Craft พร้อมอุปกรณ์เสริม
      description: อุปกรณ์เสริมที่มาพร้อมกับกระดานบันทึกคะแนน (เช่น ปากกาบันทึกคะแนน/ที่พับกระดาษ
        ไม้บรรทัดสามเหลี่ยม หรือเครื่องมือทำซองจดหมาย)
    craft_scoring_board_measurement_system:
      name: ระบบวัดคะแนน Craft
      description: ระบุระบบวัดขนาดที่ทำเครื่องหมายไว้บนกระดานทำรอยพับ (หน่วยนิ้ว/อิมพีเรียล,
        หน่วยเมตริก, ระบบคู่, หรือไม่มีเครื่องหมายวัด)
    craft_wire_finish_coating:
      name: Craft /เคลือบผิวลวดงานฝีมือ
      description: ระบุประเภทการเคลือบหรือพื้นผิวที่ใช้กับสายไฟ เพื่อให้มีสี ป้องกันการหมอง
        หรือเพิ่มการปกป้องผิวสายไฟ
    craft_wood_surface_preparation:
      name: การเตรียมพื้นผิวไม้ Craft
      description: ระบุว่าผิวไม้มีความพร้อมสำหรับการเคลือบเงา/ทำสีแล้ว หรือยังคงต้องผ่านขั้นตอนการเตรียมผิว
        (เช่น การขัดกระดาษทราย/การทารองพื้น)
    crank_spindle_interface:
      name: ส่วนต่อประสานแกนข้อเหวี่ยง
      description: ระบุระบบสปินเดิลข้อเหวี่ยงที่วงเล็บด้านล่าง ความช่วยเหลือ (เช่น
        SRAM DUB, Square Taper) เพื่อให้มั่นใจถึงความเข้ากันได้ระหว่างชุดข้อเหวี่ยงและกะโหลก
    crankshaft_balance_type:
      name: เพลาข้อเหวี่ยงยังคงมีเหลือแบบ
      description: ระบุว่าเพลาข้อเหวี่ยงเป็นแบบถ่วงสมดุลภายใน (แบบสมดุลเป็นกลาง) หรือแบบถ่วงสมดุลภายนอก
        (จำเป็นต้องใช้ตุ้มถ่วงน้ำหนักที่ตัวลดการสั่นสะเทือนฮาร์มอนิก/ล้อตื้อ)
    crankshaft_bolt_pattern:
      name: รูปแบบรูยึดเพลาข้อเหวี่ยง
      description: รูปแบบรูน็อตบนหน้าแปลนท้ายสำหรับยึดล้อตื้อ/แผ่นส่งกำลัง
    crankshaft_sensor_reluctor_type:
      name: ประเภทล้อเฟืองสำหรับเซ็นเซอร์เพลาข้อเหวี่ยง
      description: รูปแบบฟันเฟืองส่งสัญญาณหรือล้อส่งสัญญาณของเซนเซอร์ตำแหน่งเพลาข้อเหวี่ยงที่ใช้
        (ในกรณีที่มีการติดตั้ง)
    craps_accessories_included:
      name: อุปกรณ์เสริมสำหรับเกมแครปส์ที่รวมมาในชุด
      description: ระบุอุปกรณ์เสริมเฉพาะลูกเต๋าเพิ่มเติมที่รวมอยู่ด้วย Beyond dice/chips/ไลเอาต์
    crash_cymbal_profile:
      name: รูปทรงส่วนโค้งและความนูนของฉาบแครช
      description: รูปทรงส่วนโค้งหรือความนูนโดยรวมของฉาบ (ระดับความนูนของตัวฉาบ) ซึ่งส่งผลต่อระดับเสียงและการตอบสนอง
    crash_cymbal_sound_character:
      name: ลักษณะเสียงฉาบ
      description: วรรณยุกต์หลักชื่อผู้บรรยายถึงเสียงฉิ่งชน
    crash_pad_size_class:
      name: ระดับขนาดของเบาะรองกันตก
      description: ระบุหมวดหมู่ขนาดโดยรวมของเบาะรองกันตกสำหรับปีนผา เพื่อช่วยให้ผู้ซื้อทราบถึงพื้นที่ครอบคลุมของเบาะได้อย่างรวดเร็วโดยไม่จำเป็นต้องดูขนาดมิติกว้างยาวที่แน่ชัด
    crate_engine_assembly_level:
      name: ระดับความสมบูรณ์ในการประกอบของเครื่องยนต์สำเร็จรูป
      description: เครื่องยนต์ที่บรรจุในกล่องนั้นมีความสมบูรณ์มากแค่ไหนเมื่อจัดส่ง
        (มีส่วนประกอบหลักอะไรบ้าง)
    cream_base_ingredient:
      name: ส่วนผสมหลักของครีม
      description: ระบุแหล่งที่มาหลักของครีม ซึ่งครอบคลุมทั้งจากสายพันธุ์สัตว์นมและวัตถุดิบทางเลือกจากพืช
    cream_cheese_base:
      name: ส่วนผสมหลักของครีมชีส
      description: ระบุแหล่งที่มาหลักของนมหรือพืชที่ใช้ในการผลิตครีมชีส ช่วยให้/เลือกซื้อสินค้าโดยคำนึงถึงข้อจำกัดด้านอาหาร
        สารก่อภูมิแพ้ และ Taste
    cream_cheese_form:
      name: รูปแบบของครีมชีส
      description: อธิบายรูปแบบทางกายภาพหรือลักษณะเนื้อสัมผัสของครีมชีส (เช่น แบบก้อน,
        แบบตีฟู/วิป, แบบดิป/ซอสจิ้ม) ซึ่งส่งผลต่อความง่ายในการป้ายทาและการนำไปใช้ตามวัตถุประสงค์
    cream_variety:
      name: ครีมหลากหลายชนิด
      description: ระบุรูปแบบเฉพาะของครีมตามปริมาณไขมัน รูปแบบการแปรรูป หรือวัตถุปะสงค์ในการปรุงอาหาร
        (เช่น ฮาล์ฟแอนด์ฮาล์ฟ, ดับเบิ้ลครีม, ครีมทำอาหาร)
    crib_accessory_features:
      name: คุณสมบัติของอุปกรณ์เสริมสำหรับเปลเด็ก
      description: ระบุคุณสมบัติที่เน้นการใช้งานหรือความสะดวกสบายโดยเฉพาะสำหรับอุปกรณ์เสริมสำหรับเปลเด็กและเตียงเด็กเล็ก
        เช่น การระบายอากาศหรือขอบยางยืด
    crib_bumper_features:
      name: คุณสมบัติเฉพาะของนวมกันกระแทกเตียงเด็กอ่อน
      description: เน้นคุณลักษณะการใช้งานพิเศษของกันกระแทกเตียงเด็ก
    crib_conversion_kit_components:
      name: ส่วนประกอบของชุดแปลงเตียงเด็ก
      description: ระบุรายการชิ้นส่วนหลักที่มีมาให้ในชุดอุปกรณ์ เพื่อให้ผู้ซื้อสามารถตรวจสอบได้ว่ามีทุกสิ่งที่จำเป็นสำหรับการติดตั้งครบถ้วนแล้ว
    cricket_ball_grade:
      name: ระดับเกรดของลูกคริกเก็ต
      description: ระบุระดับคุณภาพหรือมาตรฐานการเล่นที่กำหนดไว้ของลูกบอล
    cricket_ball_piece_construction:
      name: รูปแบบโครงสร้างจำนวนชิ้นส่วนของลูกคริกเก็ต
      description: ระบุจำนวนชิ้นส่วนเปลือกนอกหรือส่วนขึ้นรูปที่ใช้ในการประกอบตัวลูกบอล
        ซึ่งเป็นตัวชี้วัดสำคัญของระดับคุณภาพและราคา
    cricket_ball_type:
      name: ประเภทลูกคริกเก็ต
      description: ระบุประเภทของลูกคริกเก็ตที่มีมาให้พร้อมกับผลิตภัณฑ์ หรือระบุในกรณีที่ไม่มีลูกคริกเก็ตมาให้ในชุด
    cricket_bat_accessory_type:
      name: ประเภทอุปกรณ์เสริมไม้คริกเก็ต
      description: ระบุประเภทของอุปกรณ์เสริมหรืออุปกรณ์บำรุงรักษาไม้ตีคริกเก็ต เพื่อช่วยให้ผู้ซื้อสามารถกรองค้นหาผลิตภัณฑ์ที่ต้องการได้อย่างรวดเร็ว
    cricket_bat_size:
      name: ขนาดไม้คริกเก็ต
      description: ระบุการจัดหมวดหมู่มาตรฐานของขนาดไม้คริกเก็ต (เช่น หมายเลข 0-6,
        Harrow, SH, LH) ซึ่งมักเลือกตามอายุและส่วนสูงของผู้เล่น
    cricket_bat_size_compatibility:
      name: ความเข้ากันได้ของขนาดไม้คริกเก็ต
      description: ระบุขนาดไม้คริกเก็ตที่มีการออกแบบอุปกรณ์เสริมนี้มาให้รองรับ เพื่อให้มั่นใจว่าเข้ากันได้อย่างเหมาะสม
    cricket_helmet_role:
      name: บทบาทของหมวกกันน็อคคริกเก็ต
      description: ระบุตำแหน่งหรือบทบาทการเล่นที่หมวกนิรภัยนี้ออกแบบมาเพื่อใช้งาน
        (เช่น ตำแหน่งผู้ตี หรือ ตำแหน่งผู้รักษาประตู/ผู้รักษาฝั่ง)
    cricket_leg_guard_type:
      name: อุปกรณ์ป้องกันขาสำหรับกีฬาคริกเก็ต
      description: ระบุรูปแบบเฉพาะของอุปกรณ์ป้องกันขาสำหรับกีฬาคริกเก็ต
    cricket_player_role:
      name: บทบาทของสนับขาคริกเก็ต
      description: ระบุบทบาทหรือตำแหน่งการเล่นหลักที่รองเท้าคู่นี้ออกแบบมาเพื่อใช้งาน
    cricket_protection_grade:
      name: ระดับการป้องกันคริกเก็ต
      description: ระบุระดับชั้นการป้องกันที่กำหนดขึ้นโดยผู้ผลิตอุปกรณ์กีฬาคริกเก็ต
    cricket_stump_base_type:
      name: ประเภทฐานเสาคริกเก็ต
      description: ระบุรูปแบบฐานหรือวัสดุของฐานที่มีมาให้พร้อมกับหลักคริกเก็ต (Stumps)
        ซึ่งส่งผลต่อความมั่นคงและความเหมาะสมกับพื้นผิวสนามที่ใช้เล่น
    cricket_stump_target_features:
      name: คุณสมบัติเฉพาะของเป้าซ้อมหลักคริกเก็ต
      description: Highlight คุณลักษณะการใช้งานที่โดดเด่นซึ่งช่วยเพิ่มประสิทธิภาพในการใช้งาน
        การมองเห็น ความทนทาน หรือความเสถียรของการฝึกอบรม
    cricket_stump_type:
      name: ประเภทของหลักคริกเก็ต
      description: จัดหมวดหมู่รูปแบบหรือโครงสร้างของตอไม้เพื่อช่วยนักช้อปเลือกระหว่างตอไม้ขีดแบบดั้งเดิม
        การฝึกอบรมสินค้า หรือโมเดลเรืองแสงสมัยใหม่
    cricket_training_focus:
      name: จุดเน้นการฝึกคริกเก็ต
      description: อุปกรณ์นี้ออกแบบมาเพื่อช่วยพัฒนาทักษะหรือระเบียบวินัยพื้นฐานในการเล่นคริกเก็ต
    croquet_set_components_included:
      name: ส่วนประกอบของชุดคร็อกเก้ที่รวมอยู่ในชุด
      description: ระบุส่วนประกอบสำคัญทั้งหมด Supply ในชุด (เช่น ไม้ตี, เสาปัก, กระเป๋าสำหรับพกพา)
        เพื่อให้ลูกค้าเข้าใจอย่างชัดเจนว่ากำลังซื้ออะไร
    cross_country_binding_system:
      name: ระบบผูกมัดข้ามประเทศ
      description: ระบุมาตรฐานของอุปกรณ์ยึดรองเท้าของสกีข้ามทุ่งที่ผลิตภัณฑ์นี้เจาะรูรองรับหรือใช้งานร่วมกันได้
    cross_stitch_chart_symbol_type:
      name: สัญลักษณ์แผนผังปักครอสติช
      description: รูปแบบการแสดงผลของผังลาย (เช่น การใช้สัญลักษณ์, การใช้สี, หรือใช้ทั้งสองอย่าง)
    cross_stitch_finishing_type:
      name: ประเภทการตกแต่งแบบปักครอสติช
      description: รูปแบบการตกแต่ง/การแสดงผลที่ต้องการสำหรับชิ้นงานเย็บปักถักร้อย
    cross_stitch_frame_fabric_holding_mechanism:
      name: กลไกยึดผ้าบนกรอบปักครอสติช
      description: ระบุวิธีการยึดหรือขึงผ้าให้แน่น/ตึงเข้ากับเฟรม (เช่น ตัวคลิปล็อก,
        ตัวหนีบ, หมุดปัก) ซึ่งส่งผลต่อความง่ายในการใช้งานและความเข้ากันได้กับประเภทของผ้า
    cross_stitch_frame_included_components:
      name: ส่วนประกอบที่มีมาให้ในชุดของเฟรมปักครอสติส
      description: ระบุรายการสิ่งของที่มีมาให้ในกล่อง (เช่น เฉพาะตัวเฟรม เทียบกับ
        เฟรม + ตัวหนีบ + ขาตั้ง) เพื่อลดความสับสนและลดการส่งคืนสินค้า
    cross_stitch_frame_type:
      name: ประเภทกรอบปักครอสติช
      description: ระบุโครงสร้าง/ประเภทของ Frame ปักครอสติช (วิธีการยึดผ้า) ซึ่งส่งผลต่อการใช้งานและความเข้ากันได้ของโครงการ
    cross_stitch_pattern_technique:
      name: เทคนิคการปักครอสติช
      description: เทคนิค/รูปแบบการปักครอสติชที่ระบุในแผนผังลาย
    crossbar_shape_profile:
      name: Shapesคานขวาง / โปรไฟล์
      description: ระบุรูปทรงตามหลักอากาศพลศาสตร์/ Shapes ของคานขวาง
    crossbar_style:
      name: สไตล์คานขวาง
      description: ระบุรูปแบบโครงสร้างของคานขวาง โดยแยกความแตกต่างระหว่างคานแบบแข็งสำหรับใช้แข่งขัน
        กับคานแบบยืดหยุ่นหรือแบบไฮบริดสำหรับใช้ฝึกซ้อม
    crossbow_type:
      name: ประเภทหน้าไม้
      description: ระบุรูปแบบการออกแบบพื้นฐานของหน้าไม้ เช่น หน้าไม้คอมปาวด์ หน้าไม้รีเคิร์ฟ
        หรือหน้าไม้ปืนพก รูปแบบการก่อสร้างขับเคลื่อนประสิทธิภาพ ขนาด และใช้เคส ดังนั้นนักช้อปจึงมักกรองตามมัน
    crossover_component_type:
      name: ส่วนประกอบครอสโอเวอร์
      description: ระบุโทโพโลยีส่วนประกอบหลักที่ใช้ในเครือข่ายครอสโอเวอร์แบบพาสซีฟ
    crossover_configuration:
      name: การกำหนดค่าครอสโอเวอร์
      description: ระบุว่าทางแยกใช้จุดแยกเดียวหรือหลายจุด (เช่น แบบ 2 ทาง เทียบกับแบบ
        3 ทาง)
    crossover_type:
      name: ประเภทครอสโอเวอร์
      description: ประเภทของเครือข่ายครอสโอเวอร์ที่มาพร้อมกับชุดส่วนประกอบ
    crown_profile:
      name: รูปทรงส่วนยอดของชิ้นส่วน
      description: ระบุความสูง/รูปทรงของส่วนบนของหมวกเหนือปีกหมวก
    crown_style:
      name: สไตล์มงกุฎ
      description: กำหนดรูปทรงโดยรวมหรือลักษณะของส่วนบนของหมวกทรงโบว์เลอร์
    crust_taste_profile:
      name: ลักษณะเด่นของรสชาติแป้งพาย
      description: ระบุว่ารสชาติโดยพื้นฐานของแป้งพายนั้นหวาน เค็ม หรือเป็นกลาง
    crystal_finish:
      name: ผิวเคลือบคริสตัล
      description: อธิบายการตกแต่งพื้นผิว การเคลือบ หรือการประมวลผลของคริสตัลหลวม
        (เช่น ดิบ ขัดเงา ร่วงลง หมวดหมู่หูฟัง ฝ้า เคลือบออร่า ย้อม อบด้วยความร้อน)
    crystal_material:
      name: วัสดุคริสตัล
      description: ระบุวัสดุที่ใช้สำหรับกระจกหน้าปัดนาฬิกา
    crystalline_finish_style:
      name: สไตล์ผิวเคลือบคริสตัล
      description: ลักษณะผลึก/เส้นใยคล้ายขนนกที่เกิดขึ้นจากขี้ผึ้งปาล์มในเทียนสำเร็จรูป
    cucumber_variety:
      name: แตงกวาพันธุ์ต่างๆ
      description: ระบุพันธุ์หรือกลุ่มพันธุ์ของแตงกวา (เช่น อังกฤษ, เปอร์เซีย, เคอร์บี้)
    cue_compatibility:
      name: ความเข้ากันได้ของไม้คิว
      description: ระบุรูปแบบข้อต่อไม้คิวที่มีการออกแบบเคสนี้มาเพื่อรองรับ เช่น ไม้คิวแบบชิ้นเดียว
        หรือไม้คิวแบบข้อต่อ 3/4
    cue_construction:
      name: โครงสร้างของไม้คิว
      description: ระบุรูปแบบโครงสร้างของไม้คิว (จำนวนชิ้นส่วน หรือระบุว่าเป็นส่วนประกอบแยกขาย
        เช่น เฉพาะด้ามจับ หรือ เฉพาะปลายไม้คิว) ซึ่งส่งผลต่อความสะดวกในการพกพาและความเข้ากันได้ในการใช้งานร่วมกัน
    cue_head_material:
      name: วัสดุที่ทำหัวไม้คิว
      description: ระบุวัสดุของหัวไม้คิว (ส่วนที่สัมผัสกับลูกพัค) ซึ่งส่งผลต่อความทนทานและการปกป้องพื้นผิวสนาม
    cue_sport_compatibility:
      name: ความเข้ากันได้กับประเภทกีฬาที่ใช้ไม้คิว
      description: ระบุประเภทกีฬาที่ใช้ไม้คิวที่อุปกรณ์เสริมชิ้นนี้ออกแบบมาเพื่อใช้งาน
    cue_thread_size:
      name: ขนาดเกลียวของไม้คิว
      description: ระบุข้อกำหนดเฉพาะของเกลียวที่ใช้กับท่อนต่อคิว, ตัวป้องกันข้อต่อ,
        น็อตถ่วงน้ำหนัก และอุปกรณ์เสริมอื่นๆ ของไม้คิว เพื่อให้มั่นใจว่าสามารถประกอบเข้ากันได้อย่างถูกต้อง
    cue_tip_hardness:
      name: ความแข็งของหัวคิว
      description: ให้คะแนนความแน่นของปลายไม้คิวซึ่ง Influence การควบคุมลูกคิวและตัวเกม
    cuff_height:
      name: ความสูงของขอบข้อมือ
      description: ระบุความสูงของขอบรองเท้าบู๊ท (เช่น แบบเตี้ย ปานกลาง สูง หรือแบบถอดได้/ปรับได้)
        ซึ่งมีผลต่อการรองรับและความยืดหยุ่น
    cuff_position:
      name: ตำแหน่งของข้อมือ
      description: ระบุตำแหน่งบนตัวผู้ขี่ที่สายรัดข้อเท้าได้รับการออกแบบมาเพื่อยึดติด
    cultivation_method:
      name: วิธีการเพาะปลูก
      description: ระบุรูปแบบการเพาะปลูกของผักใบเขียว ซึ่งครอบคลุมถึงเทคนิคการปลูกและกรรมวิธีการทำฟาร์ม
    cup_type:
      name: ประเภทถ้วย
      description: ระบุลักษณะรูปทรงพื้นผิวของเลื่อม (แบบแบน เทียบกับ แบบทรงถ้วย) และความลึกของทรงถ้วย
        ซึ่งส่งผลต่อการสะท้อนแสงประกาย เนื้อสัมผัส และการจัดวางตำแหน่งเมื่อนำไปเย็บหรือติดกาว
    cupcake_size:
      name: ขนาดคัพเค้ก
      description: ระบุหมวดหมู่ขนาดทางกายภาพของคัพเค้กที่จำหน่าย (เช่น ขนาดมินิ, ขนาดมาตรฐาน,
        ขนาดจัมโบ้)
    curd_size:
      name: ขนาดลิ่มน้ำนม
      description: ระบุขนาดหรือเนื้อสัมผัสของเม็ดคอทเทจชีส
    cure_method:
      name: วิธีการบ่ม
      description: อธิบายกระบวนการที่จำเป็นสำหรับการเซ็ตตัวหรือการบ่มแข็งของกาว (เช่น
        แสง UV, ความชื้นในอากาศ, ความร้อน)
    curing_or_preparation_method:
      name: วิธีการบ่มหรือการเตรียม
      description: ระบุวิธีการบ่มหรือกรรมวิธีการเตรียมมะกอก (เช่น การบ่มในน้ำเกลือ,
        การบ่มในน้ำมัน, การย่าง)
    curling_broom_head_material:
      name: วัสดุของหัวไม้กวาดเคอร์ลิง
      description: ระบุส่วนประกอบวัสดุหลักของหัวไม้กวาดหรือแผ่นรองไม้กวาดเคอร์ลิง
    curling_broom_head_type:
      name: ประเภทของหัวไม้กวาดเคอร์ลิง
      description: ระบุรูปแบบหรือโครงสร้างของหัวกวาด/แผ่นรองกวาด
    curling_shoe_slider_material:
      name: วัสดุของแผ่นสไลด์รองเท้าเคอร์ลิง
      description: ระบุวัสดุหลักของพื้นรองเท้าที่ใช้ในรองเท้าสำหรับกีฬาลอนโบว์ลิ่ง
    curling_training_aid_type:
      name: อุปกรณ์ช่วยฝึกซ้อมกีฬาเคอร์ลิง
      description: ระบุประเภทของอุปกรณ์ช่วยฝึกซ้อมกีฬาเคอร์ลิง
    curry_variety:
      name: ประเภทของแกงกะหรี่
      description: จัดประเภทสินค้าน้ำพริกแกงตามสไตล์หรือสูตรแกงที่ตั้งใจน้ำมาปรุงอาหารโดยเฉพาะ
        เช่น ติกก้ามาซาลา มัสมั่น หรือแกงเขียวหวาน เพื่อช่วยให้สามารถกรองรสชาติ/สไตล์ได้อย่างแม่นยำ
    cushion_rubber_profile:
      name: โปรไฟล์ยางกันกระแทก
      description: รหัสรูปทรงหรือโปรไฟล์ของชิ้นยางรองราง
    cushioning_level:
      name: ระดับของระบบรองรับแรงกระแทก
      description: ระบุปริมาณของแผ่นรองใต้ฝ่าเท้าของถุงเท้า เพื่อใช้ในการป้องกันแรงกระแทกและเพิ่มความสบายในการสวมใส่
    custom_label_content_type:
      name: ประเภทเนื้อหาฉลากแบบกำหนดเอง
      description: ระบุข้อมูลที่ต้องการปรับแต่งบน Label เย็บ (เช่น ชื่อ, เอกสาร, ข้อความ,
        ขนาด, สัญลักษณ์การดูแล, ข้อมูลการติดต่อ)
    customization_type:
      name: ประเภทการปรับแต่ง
      description: ระบุว่าเสื้อเป็นเสื้อเปล่า เสื้อที่ผู้เล่นแจก หรือเสื้อสั่งทำพิเศษพร้อมชื่อและหมายเลขส่วนตัว
    cut_or_preparation_style:
      name: รูปแบบการหั่นหรือการเตรียมวัตถุดิบ
      description: ระบุรูปแบบการหั่นหรือการเตรียมชิ้นผักภายในกระป๋องหรือโหลแก้ว (เช่น
        แบบเต็มชิ้น, แบบเต๋า, แบบแท่งยาว)
    cut_resistance_rating:
      name: ระดับความต้านทานการตัด
      description: ระบุระดับความทนทานต่อการบาดเฉือนของผลิตภัณฑ์ที่ผ่านการทดสอบมาตรฐานอย่างเป็นทางการ
    cut_type:
      name: ประเภทการตัด
      description: ระบุรูปแบบการจำหน่ายผ้า เช่น เป็นเมตร/หลา แบบตัดสำเร็จ หรือแบบม้วน/แบบม้วนพับ
    cutting_application:
      name: การใช้งานสำหรับการตัด
      description: วัตถุประสงค์หลักหรือลักษณะการตัดที่กำหนดไว้สำหรับกรรไกร
    cutting_mat_grid_style:
      name: แผ่นรองตัดแบบ Grid
      description: รูปแบบของเส้นไกด์นำแนวที่พิมพ์บนพื้นผิวเสื่อ
    cutting_mat_intended_use:
      name: แผ่นรองตัดมีวัตถุประสงค์การใช้งานอย่างไร
      description: ระบุการใช้งานหลักของพื้นผิวสำหรับงานประดิษฐ์ที่มีการออกแบบแผ่นรองตัดมาให้รองรับการใช้งาน
    cv_boot_clamp_type:
      name: ประเภทของสายรัดยางหุ้มเพลาขับ
      description: ระบุรูปแบบของแคลมป์/สายรัดที่ใช้ในการยึดบูท CV
    cv_boot_kit_contents:
      name: ส่วนประกอบภายในชุดยางหุ้มเพลาขับ
      description: ระบุสิ่งของที่รวมอยู่ในชุดยางหุ้มเพลาขับ (เช่น แคลมป์ ซองจาระบี
        แถบรัด)
    cv_boot_material:
      name: วัสดุหุ้มเพลาขับ
      description: ระบุวัสดุหลักที่ใช้ในการผลิตยางหุ้มเพลาขับ
    cv_boot_position:
      name: ตำแหน่งยางหุ้มเพลาขับ
      description: ระบุว่ายางหุ้มเพลาขับใช้สำหรับตำแหน่งข้อต่อเพลาขับด้านใน (ฝั่งติดกับเกียร์)
        หรือด้านนอก (ฝั่งติดกับล้อ) บนเพลา
    cycling_apparel_fit:
      name: ความกระชับของชุดปั่นจักรยาน
      description: อธิบายทรงการตัดเสื้อผ้า ซึ่งบ่งบอกระดับความกระชับและความเหมาะสมด้านอากาศพลศาสตร์
        (เช่น ทรงแนบเนื้อ หรือทรงหลวม)
    cylinder_head_assembly:
      name: ชุดฝาสูบ
      description: ระบุระดับความสมบูรณ์ของฝาสูบที่จำหน่าย (เช่น ประกอบเสร็จสมบูรณ์พร้อมติดตั้งชิ้นส่วนระบบวาล์วแล้ว
        เทียบกับฝาสูบเปล่า/ยังไม่ได้ประกอบ)
    cylinder_head_material_grade:
      name: เกรดวัสดุของฝาสูบ
      description: ระบุวัสดุและเกรดที่ใช้สำหรับการหล่อฝาสูบ
    cylinder_head_position:
      name: ตำแหน่งของฝาสูบ
      description: ระบุฝั่ง/ข้าง หรือทิศทางการติดตั้งของฝาสูบในเครื่องยนต์แบบหลายตลับสูบ
        (เช่น ฝั่งซ้าย/ฝั่งขวา หรือ แถบสูบที่ 1/แถบสูบที่ 2)
    cymbal_alloy:
      name: โลหะผสมฉาบ
      description: โลหะผสม/ส่วนผสมของฉาบ (หรือชุดฉาบ) ในชุด
    cymbal_application:
      name: การใช้งานฉาบ
      description: วัตถุประสงค์หรือลักษณะการเล่นหลักที่ฉาบนี้ถูกออกแบบหรือทำการตลาดมาเพื่อรองรับ
    cymbal_arm_mounting_interface:
      name: รูปแบบข้อต่อสำหรับการติดตั้งแขนจับฉาบ
      description: ระบุรูปแบบการยึดต่อของขาจับฉาบเข้ากับฮาร์ดแวร์ส่วนอื่นๆ ของชุดกลอง
        (เช่น ตัวแคลมป์หนีบ, ราวแร็ก, หรือช่องรับบนขาตั้ง)
    cymbal_arm_rotation_positioning_features:
      name: คุณลักษณะด้านการหมุนและการจัดวางตำแหน่งของขาจับฉาบ
      description: ระบุคุณลักษณะการกำหนดตำแหน่งที่มีผลต่อวิธีการปรับมุม/หมุนและการล็อกแขนกล
    cymbal_arm_style:
      name: รูปแบบของแขนจับฉาบ
      description: ระบุว่าแขนจับฉาบเป็นแบบตรงหรือแบบบูม เพื่อรองรับระยะเอื้อมและการจัดวางตำแหน่งตามต้องการ
    cymbal_drum_case_wheel_configuration:
      name: รูปแบบและการจัดวางล้อของกระเป๋าใส่ฉาบและกลอง
      description: ระบุว่านาฬิกามีล้อหรือไม่ และ (ถ้ามี) รูปแบบล้อสำหรับการขนส่งแบบกลิ้ง
    cymbal_hammering_style:
      name: สไตล์การตีฉาบ
      description: กระบวนการหรือลักษณะของการตอกฉาบ ซึ่งส่งผลต่อความซับซ้อนของเนื้อเสียงและความรู้สึกขณะเล่น
    cymbal_kit_components_included:
      name: ส่วนประกอบของชุดฉาบที่รวมมาด้วย
      description: ระบุประเภทฉาบที่จะรวมอยู่ใน Ride cymbal ผู้ให้บริการ/แพ็ค (นอกเหนือจากตัวฉาบ
        Ride เอง)
    cymbal_kit_items_included:
      name: รายการฉาบที่รวมอยู่อยู่ในชุด
      description: ระบุประเภทของฉาบที่มีมาให้ในชุด/แพ็ก (แยกตามประเภทของฉาบ)
    cymbal_lathing:
      name: การกลึงฉาบ
      description: ระบุลักษณะและปริมาณการกลึงเงา (เซาะร่อง) บนพื้นผิวฉาบ เทียบกับแบบไม่กลึงเงา/ผิวรอดิบ
    cymbal_playing_style_genre:
      name: สไตล์/แนวเพลงการเล่นฉาบ
      description: ระบุบริบทการแสดงทั่วไปที่ฉาบนั้นถูกออกแบบมาเพื่อใช้งาน (เช่น ฉาบนิ้วสำหรับระบำหน้าท้อง
        เทียบกับ ฉาบมือสำหรับวงโยธวาทิต/วงออร์เคสตรา)
    cymbal_set_configuration:
      name: การกำหนดค่าชุดฉาบ
      description: ระบุว่าผลิตภัณฑ์นี้วางจำหน่ายในรูปแบบฉาบเดี่ยว ฉาบคู่ที่จับคู่กันมา
        หรือชุดแบบหลายคู่ (เช่น สำหรับการเรียนการสอนแบบกลุ่ม)
    cymbal_sound_character:
      name: ลักษณะเสียงฉาบ
      description: อธิบายลักษณะโทนเสียงโดยรวมของฉาบที่ใช้ในการสำรวจ (เช่น เสียงแหลมเทียบกับเสียงทุ้ม)
    cymbal_sustain:
      name: ความกังวานของเสียงฉาบ
      description: ระบุระยะเวลาที่เสียงฉาบกังวานหลังจากถูกตี
    cymbal_type:
      name: ประเภทฉาบ
      description: ระบุบทบาทการทำงานของฉาบที่แผ่นกลองไฟฟ้าได้รับการออกแบบมาเพื่อจำลองเสียงและลักษณะการใช้งาน
    cymbal_volume_level:
      name: ระดับเสียงฉาบ
      description: ระดับความดังเสียงหรือหมวดหมู่กำลังเสียงที่รับรู้ได้ของฉาบ
    cymbal_weight_class:
      name: คลาสน้ำหนักฉาบ
      description: ระบุระดับน้ำหนักของฉาบ ซึ่งส่งผลต่อโทนเสียง ความดัง และการตอบสนอง
    dairy_heat_treatment:
      name: วิธีการให้ความร้อนกับผลิตภัณฑ์นม
      description: ระบุระดับของการแปรรูปหรือการพาสเจอไรซ์ที่ใช้กับครีม (เช่น แบบดิบ,
        แบบพาสเจอไรซ์, แบบยูเอชที) ซึ่งส่งผลต่ออายุการเก็บรักษา รสชาติ และประสิทธิภาพในการตีฟู
    damage_type:
      name: ประเภทความเสียหาย
      description: ระบุประเภทของความเสียหายบนกระจกหน้ารถที่ชุดซ่อมนี้ซ๋อมแซมได้
    damper_pedal_style:
      name: แป้นเหยียบแดมเปอร์
      description: อธิบายรูปแบบทางกายภาพของแป้นเหยียบควบคุมความกังวานที่ใช้ร่วมกับคีย์บอร์ด/ดิจิตอลเปียโน
    damping_adjustability:
      name: ความสามารถในการปรับการหน่วง
      description: ระบุว่าพารามิเตอร์การหน่วงและ/หรือความสูง Rideใดบ้างที่สามารถปรับได้บนโช้คอัพ
    damping_level:
      name: ระดับการหน่วง
      description: ระบุระดับการลดทอนความดังและความกังวานของเสียงที่อุปกรณ์ลดเสียงมอบให้
    dance_occasion:
      name: งานเต้นรำ
      description: ระบุบริบทการใช้งานเสื้อผ้าสำหรับการฝึกเต้น หรือการแสดง
    darbuka_accessories_included:
      name: อุปกรณ์เสริมที่รวมมากับดาร์บูกา
      description: ระบุรายการอุปกรณ์เสริมทั่วไปที่มีมาให้พร้อมกับกลองดาร์บูกา
    darbuka_body_finish_type:
      name: ประเภทการตกแต่งตัวถัง Darbuka
      description: อธิบายการตกแต่งภายนอก การเคลือบ หรือการตกแต่งทรีตเมนต์ของตัวดาร์บูก้า
    darbuka_head_material:
      name: วัสดุของหนังกลองดาร์บูกา
      description: ระบุวัสดุของแผ่นหนังกลองบนกลองดาร์บูกา
    dart_barrel_material:
      name: วัสดุของบาร์เรลลูกดอก
      description: ระบุวัสดุหลักของบาร์เรลลูกดอก ซึ่งส่งผลต่อการกระจายน้ำหนัก ความทนทาน
        และราคา
    dart_shaft_design:
      name: การออกแบบก้านลูกดอก
      description: จำแนกการออกแบบทางกลของเพลา เช่น เป็นแบบคงที่ หมุนได้ ยืดหดได้ หรือรวมอยู่ในตัวปีก
        ซึ่งส่งผลต่อประสิทธิภาพและราคา
    dart_shaft_thread_type:
      name: ประเภทเกลียวของก้านลูกดอก
      description: ระบุประเภท/ชนิดที่ใช้ในการขันแกนเข้ากับกระบอกลูกดอก เพื่อให้มั่นใจว่าแกนและกระบอกลูกดอกเข้ากันได้
    dart_thread_size:
      name: ขนาดเกลียวของลูกดอก
      description: ระบุขนาดหรือมาตรฐานของเกลียวที่ชิ้นส่วนนั้นสามารถใช้งานร่วมกันได้
        เพื่อให้มั่นใจว่าจะประกอบเข้ากันได้อย่างพอดีระหว่างก้านลูกดอก หัวลูกดอก และบาร์เรล
    dart_tip_compatibility:
      name: ความเข้ากันได้ของหัวลูกดอก
      description: ระบุว่าชิ้นส่วนลูกดอกนั้นออกแบบมาสำหรับลูกดอกหัวเหล็ก ลูกดอกหัวนิ่ม
        หรือใช้ได้กับลูกดอกทั้งสองรูปแบบ
    dart_tip_connection_type:
      name: ประเภทการเชื่อมต่อของหัวลูกดอก
      description: อธิบายข้อกำหนดเฉพาะของเกลียวหรือระบบยึดที่หัวลูกดอกใช้ในการประกอบเข้ากับบาร์เรลหรือก้านลูกดอก
        เพื่อให้มั่นใจในความเข้ากันได้ในการใช้งานร่วมกัน
    dartboard_tournament_approval:
      name: การรับรองกระดานปาเป้าสำหรับการแข่งขันอย่างเป็นทางการ
      description: ระบุว่ากระดานปาลูกดอกนั้นได้รับการรับรองอย่างเป็นทางการจากสมาคมหรือลีกปาลูกดอกใดบ้าง
    dartboard_type:
      name: ประเภทของกระดานปาเป้า
      description: จำแนกประเภทกระดานปาลูกดอกตามเทคโนโลยีการผลิตและความเข้ากันได้กับลูกดอก
        (เช่น ลูกดอกแบบขนแปรง ลูกดอกอิเล็กทรอนิกส์ ลูกดอกแม่เหล็ก)
    dash_cover_construction_type:
      name: ประเภทการผลิตฝาครอบแผงหน้าปัด
      description: อธิบายรูปแบบโครงสร้างและการขึ้นรูปของพรมปูคอนโซลหน้า (เช่น แบบขึ้นรูปชิ้นเดียว
        เทียบกับ แบบเย็บประกอบชิ้นส่วน) ซึ่งส่งผลต่อความแม่นยำในการเข้ารูปและความสวยงาม
    dash_cover_cutout_configuration:
      name: การกำหนดค่าช่องตัดฝาครอบแผงหน้าปัด
      description: ระบุช่องเปิดหรือตำแหน่งเซนเซอร์เดิมจากโรงงาน (OEM) บนคอนโซลหน้า
        ที่ตัวพรมได้รับการตัดเจาะหรือขึ้นรูปเตรียมไว้ให้รองรับ
    dashboard_accessory_position:
      name: ตำแหน่งการติดตั้งอุปกรณ์เสริมบนคอนโซลหน้า
      description: ระบุตำแหน่งบนหรือรอบคอนโซลหน้าที่อุปกรณ์เสริมนั้นถูกกำหนดให้ใช้วางหรือติดตั้ง
    date_variety:
      name: พันธุ์อินทผลัม
      description: ระบุพันธุ์/สายพันธุ์ของอินทผลัม (เช่น เมดจูล เดกเล็ต นูร์ อัจวา)
        สายพันธุ์ส่งผลอย่างมากต่อรสชาติ ขนาด เนื้อสัมผัส และมักถูกเน้นย้ำในชื่อรวมถึงรายละเอียดสินค้าส่วนใหญ่
        ดังนั้นการเก็บข้อมูลนี้จึงช่วยเพิ่มประสิทธิภาพในการกรองค้นหาและการค้นพบสินค้าได้ดียิ่งขึ้น
    dayan_head_material:
      name: วัสดุหน้ากลองดายัน
      description: วัสดุของหน้ากลอง (Pudi) เช่น ประเภทหนังสัตว์แท้หรือหนังซินเธติก
        (หนังกลองสังเคราะห์)
    dayan_strap_material:
      name: วัสดุสายรัดของกลองดายัน
      description: วัสดุของสายรัด (baddhi) ที่ใช้ผูกเชือก dayan
    dayan_syahi_type:
      name: ประเภทของย่านจุดดำ (Syahi) บนหน้ากลองดายัน
      description: ประเภทของการทาย่านจุดดำ (Syahi) บนหน้ากลองดายัน
    decaffeination_method:
      name: วิธีการกำจัดคาเฟอีน
      description: ระบุกระบวนการที่ใช้ในการสกัดคาเฟอีนออกจากกาแฟดีแคมป์ (กาแฟสกัดคาเฟอีน)
    decal_installation_method:
      name: วิธีการติดตั้งสติกเกอร์ดีคอล
      description: วิธีการติดสติกเกอร์ดีคอลลงบนพื้นผิวตัวถังรถยนต์ (เช่น แบบติดแห้ง
        แบบติดเปียก) รายละเอียดของเครื่องมือหรือข้อกำหนดที่จำเป็น (เช่น เทปยกสติกเกอร์
        หรือปืนเป่าลมร้อน) ควรระบุไว้ในคำแนะนำการใช้งานหรือคุณลักษณะของเครื่องมือที่เกี่ยวข้องเมื่อสามารถนำมาใช้ได้
    decal_orientation:
      name: ทิศทางการจัดวางสติกเกอร์ดีคอล
      description: ไม่ว่าสติ๊กเกอร์นี้มีไว้สำหรับแอพพลิเคชั่นที่ติดกระจกด้านในหรือบนพื้นผิวด้านนอกก็ตาม
    decal_placement_type:
      name: ประเภทตำแหน่งการติดสติกเกอร์ดีคอล
      description: ระบุตำแหน่งบนตัวรถที่ต้องการติดสติ๊กเกอร์ (เช่น แผงตัวถัง กันชน
        ฝากระโปรงหน้า)
    decal_visibility_property:
      name: คุณสมบัติการมองเห็นของสติ๊กเกอร์
      description: ระบุคุณสมบัติทางแสง/การมองเห็นของสติ๊กเกอร์ที่ออกแบบมาเพื่อเพิ่มการมองเห็นหรือการตอบสนองต่อแสง
        (เช่น แบบสะท้อนแสง เรืองแสง เรืองแสงในที่มืด หรือโปร่งใส)
    deck_concave_level:
      name: ระดับความโค้งเว้าของแผ่นสเกตบอร์ด
      description: ระบุระดับความลึกหรือความชันของส่วนเว้าลึกบนแผ่นสเก็ตบอร์ด (เช่น
        ชันน้อย, ปานกลาง, ชันมาก)
    deck_flex_rating:
      name: ระดับความยืดหยุ่นของพื้นดาดฟ้า
      description: ระดับความยืดหยุ่นหรือความแข็งของแผ่นสเก็ตบอร์ดตามการประเมินเชิงคุณภาพ
    deck_material:
      name: วัสดุของแผ่นสเก็ตบอร์ด
      description: ระบุวัสดุหลักที่ใช้ในการผลิตแผ่นสเก็ตบอร์ด
    decoder_interface_socket_type:
      name: อินเทอร์เฟซตัวถอดรหัส / ประเภทซ็อกเก็ต
      description: ประเภทของพอร์ตเชื่อมต่อดีโค้ดเดอร์ดิจิทัล หรือรูปแบบการติดตั้งดีโค้ดเดอร์ในตัวสำหรับรถไฟจำลองซิมูเลเตอร์
    decoration_technique:
      name: เทคนิคการตกแต่ง
      description: ระบุวิธีการหลักที่ใช้ในการพิมพ์ลวดลายหรือตกแต่งเสื้อยืด
    decorative_stamp_form_factor:
      name: รูปแบบของตัวปั๊มตกแต่ง
      description: ระบุรูปแบบของแสตมป์และวิธีการพิมพ์ลวดลาย (แสตมป์เดี่ยว ชุด ลูกกลิ้ง
        พื้นหลัง ฯลฯ)
    decorative_tape_application:
      name: เทปตกแต่งการใช้งาน
      description: ระบุการใช้งานหลักด้านงานฝีมือที่มีการออกแบบหรือวางตลาดเทปตกแต่งนี้มาให้รองรับ
    decorative_tape_format:
      name: รูปแบบเทปตกแต่ง
      description: ระบุรูปแบบการจัดจำหน่ายหรือบรรจุภัณฑ์ของเทปตกแต่งเพื่อการใช้งาน
    decoy_buoyancy:
      name: การลอยตัวของเหยื่อปลอม
      description: อธิบายลักษณะการลอยตัวของหุ่นเป็ดหรือเหยื่อปลอมในน้ำ (แบบลอยน้ำ
        แบบลอยทรงตัวกลางน้ำ หรือแบบจมน้ำ)
    decoy_joint_type:
      name: ประเภทข้อต่อเหยื่อปลอม
      description: ระบุว่าตัวล่อเป็นแบบตันหรือแบบข้อต่อ ซึ่งจะมีผลต่อการเคลื่อนไหวในการว่ายน้ำ
    decoy_motion_mechanism:
      name: กลไกการเคลื่อนไหวของเหยื่อล่อ
      description: อธิบายลักษณะของหุ่นเป็ดหรือเหยื่อปลอมในการสร้างการเคลื่อนไหวหรือการกระเพื่อมของน้ำเพื่อดึงดูดสัตว์ล่า
        (ถ้ามี)
    decoy_posture:
      name: ท่าล่อ
      description: ระบุท่าทางหรือกิจกรรมของสัตว์ที่จำลองโดยหุ่นเหยื่อปลอม (เช่น กำลังกินอาหาร
        กำลังพักผ่อน กำลังเฝ้าระวัง)
    decoy_size_class:
      name: ขนาดของเหยื่อล่อ
      description: จัดหมวดหมู่ขนาดของหุ่นเหยื่อปลอมเมื่อเปรียบเทียบกับขนาดของสัตว์จริง
        (เช่น ขนาดมาตรฐาน ขนาดแม็กนั่ม ขนาดใหญ่พิเศษ)
    decoy_style:
      name: สไตล์ของเหยื่อปลอม
      description: ระบุรูปแบบทางกายภาพหรือประเภทการออกแบบเหยื่อล่อ เพื่อช่วยให้นักล่าเลือกเตรียมการได้เหมาะสม
    deli_meat_variety:
      name: เนื้อเดลี่หลากหลายชนิด
      description: จำแนกประเภทของเนื้อเดลี่ (เช่น ซาลามี่ โบโลญญา โปรsciutto เนื้ออบ)
    delivery_form:
      name: รูปแบบที่นำไปใช้งาน
      description: รูปแบบทางกายภาพของน้ำยาล้างหัวฉีด
    denim_composition:
      name: ส่วนประกอบของผ้ายีนส์
      description: องค์ประกอบเส้นใยหลักของผ้ายีนส์ (เส้นใยพื้นฐาน ไม่รวมสีย้อม/สารตกแต่ง)
    denim_finish:
      name: ผิวสัมผัสแบบยีนส์
      description: การตกแต่งพื้นผิว/กระบวนการตกแต่งที่ใช้กับผ้ายีนส์
    denim_intended_use:
      name: วัตถุประสงค์การใช้งานผ้าเดนิม
      description: โครงการทั่วไป/การใช้งานผ้าเดนิมเพื่อการตลาด
    denim_stretch_type:
      name: ผ้ายีนส์ยืด
      description: ระบุว่าผ้ายีนส์นั้นมีความยืดหยุ่นทางโครงสร้างผ้ามีการผสมผสานผ้ายืดอีลาสเทน/สแปนเด็กซ์
        หรือเป็นผ้าที่ไม่ยืดเลย
    denim_wash:
      name: ประเภทการฟอกผ้ายีนส์
      description: ระบุเฉดสีหรือการซัก ทรีตเมนต์ที่ใช้กับผ้าเดนิม (เช่น สว่าง เข้ม
        ดิบ กรด)
    derailleur_cage_length:
      name: ความยาวของกรงตีนผี
      description: ระบุความยาวของกรงตีนผี ซึ่งเป็นตัวกำหนดความสามารถในการรับน้ำหนักของโซ่
        (ส่วนใหญ่ใช้กับตีนผีหลัง)
    derailleur_mounting_style:
      name: รูปแบบการติดตั้งตีนผี
      description: ระบุวิธีการยึดตีนผีเข้ากับเฟรมจักรยานหรือหางตีนผี (เช่น เชื่อมติด
        ใช้แคลมป์ ติดตั้งโดยตรง หรือ UDH)
    derailleur_type:
      name: ประเภทของตีนผี
      description: ระบุว่าสินค้าเป็นสับจานหน้าหรือหลัง
    deshedder_tool_type:
      name: ประเภทของอุปกรณ์แปรงขนร่วง
      description: จำแนกประเภทโครงสร้างของเครื่องกำจัดขน เพื่อให้ร้านค้าสามารถเลือกวิธีการดูแลขนที่ต้องการได้
        (เช่น ใบมีด บล็อก หวี หรือถุงมือ)
    diabolo_axle_system:
      name: ระบบแกนของลูกดิ่งดิอาโบล
      description: ระบุระบบหรือรูปแบบแกนของลูกดิ่งดิอาโบล ซึ่งส่งผลต่อการเล่นท่าไถลความมั่นคง
        และการสึกหรอของเชือก
    diagnostic_functions_supported:
      name: ฟังก์ชันการวินิจฉัยที่รองรับ
      description: ระบุฟังก์ชันการวินิจฉัย/บำรุงรักษาที่เครื่องสแกนสามารถทำได้
    diagnostic_interface_type:
      name: ประเภทอินเทอร์เฟซการวินิจฉัย
      description: การเชื่อมต่อ/อินเทอร์เฟซที่ใช้ในการสื่อสารกับยานพาหนะหรืออุปกรณ์
        (เช่น OBD-II, Bluetooth, Wi-Fi, USB)
    diamond_color_grade:
      name: ระดับสีเพชร
      description: ระบุระดับสีของเพชร ตั้งแต่ D (ไม่มีสี) ถึง Z (สีอ่อน) หรือระบุเพชรสีแฟนซี
    diaper_cover_style:
      name: สไตล์ผ้าคลุมผ้าอ้อม
      description: กำหนดรูปทรงหรือสไตล์การตกแต่งของผ้าคลุมผ้าอ้อม เพื่อช่วยในการค้นหาและกรองตามสไตล์
    diastatic_power_unit:
      name: หน่วยวัดพลังงานไดแอสเตติก
      description: ระบุระบบหน่วยวัดที่ใช้สำหรับรายงานค่ากำลังไดแอสแตติกของผลิตภัณฑ์
        (เช่น องศาลินท์เนอร์ เทียบกับ วินดิช-โคลบัค)
    diatonic_harmonica_tuning_system:
      name: ระบบการปรับเสียงฮาร์โมนิกาแบบไดอาโทนิก
      description: ระบุระบบการจัดเรียงโน้ตหรือระบบการตั้งสายที่ใช้สำหรับไดอาโทนิกฮาร์โมนิกา
    dice_sides:
      name: ด้านของลูกเต๋า
      description: จำนวนด้าน (หน้า) ต่อลูกเต๋าสำหรับลูกเต๋าที่รวมอยู่ในสินค้า (เช่น
        d6, d20) สำหรับชุดข้อมูลแบบผสม ให้ใช้ค่าที่เด่นที่สุดหรือรายการเป็นค่าหลายค่าเมื่อรองรับ
    didgeridoo_construction_type:
      name: ประเภทโครงสร้างการผลิตดิดเจอริดู
      description: ระบุรูปแบบหรือกระบวนการขึ้นรูปในการสร้างดิดเจอรีดู (แนวทางการสร้างแบบดั้งเดิมหรือแบบร่วมสมัย)
    dietary_formulation_claim:
      name: คำกล่าวอ้างด้านสูตรโภชนาการ
      description: ระบุคุณลักษณะเด่นของสูตรอาหารหรือสารอาหารที่ยกเว้นซึ่งเกี่ยวข้องกับโภชนาการของม้า
        (เช่น ปราศจากธัญพืช แป้งต่ำ ออร์แกนิก)
    dinosaur_playset_scale_figure_size_class:
      name: หมวดหมู่มาตราส่วน/ขนาดของหุ่นโมเดลในชุดของเล่นไดโนเสาร์
      description: อธิบายลักษณะทั่วไปของไดโนเสาร์/ฟิกเกอร์ที่รวมอยู่ในชุด เพื่อช่วยให้สามารถนำไปประกอบกับชุดอื่นๆ
        ได้
    dinosaur_species_included:
      name: รวมถึงไดโนเสาร์สายพันธุ์ต่างๆ
      description: ระบุว่าไดโนเสาร์สายพันธุ์ใดบ้างที่ปรากฏอยู่ในชุดของเล่น (ฟิกเกอร์หรือแบบจำลองไดโนเสาร์)
    dipsy_diver_size_designation:
      name: ขนาดที่กำหนดของแผ่นทำระดับความลึกดิปซีไดเวอร์
      description: ระบุรหัสขนาดของแผ่นทำระดับความลึกที่กำหนดโดยผู้ผลิต ซึ่งมีความสัมพันธ์กับน้ำหนักและระดับความลึกในการดำน้ำ
    disc_brake_rotor_mount_type:
      name: ประเภทการติดตั้งจานเบรก
      description: ระบุวิธีการยึดจานดิสก์เบรกเข้ากับดุมล้อ (เช่น สลักเกลียว 6 ตัว
        หรือเซ็นทรัลล็อก)
    disc_lock_accessories_included:
      name: รวมอุปกรณ์ล็อคดิสก์แล้ว
      description: ระบุอุปกรณ์เพิ่มเติมที่บรรจุมาพร้อมกับแม่กุญแจล็อคดิสเบรกจักรยาน
        เช่น สายเคเบิลเตือนความจำ กระเป๋าพกพา ขายึดสำหรับติดตั้ง หรือแบตเตอรี่
    disco_ball_mirror_tile_material:
      name: วัสดุของแผ่นกระจกสะท้อนแสงบนลูกดิสโก้บอล
      description: วัสดุของแถบสะท้อนแสงบนลูกบอลดิสโก้ (ถ้ามี)
    disco_ball_mirror_tile_size:
      name: ขนาดไทล์กระจกบนดิสโก้บอล
      description: ขนาดโดยประมาณของบุคคลธรรมดา กระจกไทล์/สี่เหลี่ยมบนดิสโก้บอล
    display_backlight_color:
      name: สีไฟแบ็กไลต์ของจอแสดงผล
      description: ระบุสีไฟแบ็กไลต์/แสงส่องสว่างของหน้าจอ/หน้าปัดมิเตอร์
    disposable_compostable_claim:
      name: คำกล่าวอ้างเรื่องใช้แล้วทิ้ง/ย่อยสลายได้
      description: ระบุว่าผลิตภัณฑ์สามารถย่อยสลายได้ทางชีวภาพ สามารถสลายตัวได้ทางชีวภาพ
        สามารถนำกลับมาใช้ใหม่ได้ หรือไม่มีข้อใดเลย (ในกรณีที่มีข้อมูล)
    distillation_method:
      name: วิธีการกลั่น
      description: ระบุวิธีการกลั่นหรือประเภทของเครื่องกลั่นที่ใช้ในการผลิตสุรา
    distilled_water_intended_use:
      name: วัตถุประสงค์การใช้งานของน้ำกลั่น
      description: กำหนดแอปพลิเคชันหลักสำหรับน้ำกลั่น (เช่น การดื่ม เครื่อง CPAP เครื่องทำความชื้น
        เตารีดไอน้ำ)
    distress_transmission_frequency:
      name: ความถี่ในการส่งสัญญาณขอความช่วยเหลือ
      description: ความถี่วิทยุหลักที่ใช้สำหรับการแจ้งเตือนภัยฉุกเฉิน
    distressing_level:
      name: ระดับที่น่ากังวล
      description: ระบุระดับการตกแต่งให้ดูเก่า/ผ่านการใช้งาน เช่น รอยขาด หรือทำให้เนื้อผ้ารุ่ย
    distressing_style:
      name: สไตล์ที่ดูเก่าๆ
      description: ระบุประเภทหรือระดับของการตกแต่งให้ดูเก่า/ผ่านการใช้งานบนยีนส์ เช่น
        รอยขาด หรือรอยหนวดแมว
    distributor_advance_mechanism:
      name: กลไกการจ่ายล่วงหน้าของตัวกระจาย
      description: ระบุประเภทของกลไกการปรับจังหวะการจุดระเบิดที่ใช้โดยตัวจ่ายไฟ (distributor)
    distributor_cap_terminal_type:
      name: หมวกจำหน่ายเครื่องอ่านชนิด
      description: ระบุรูปแบบฝาจำหน่ายเครื่องอ่าน
    distributor_gear_material:
      name: วัสดุที่ใช้ผลิตเฟืองจานจ่าย
      description: ระบุวัสดุของเฟืองขับตัวกระจายไฟ
    distributor_ignition_type:
      name: ระบบจุดระเบิดแบบจานจ่าย
      description: ระบุว่าจานจ่ายถูกออกแบบมาสำหรับระบบหน้าทองขาว ระบบจุดระเบิดอิเล็กทรอนิกส์
        หรือระบบจุดระเบิดกำลังสูงแบบเอชอีไอ
    distributor_kit_contents:
      name: ส่วนประกอบภายในชุดจานจ่าย
      description: ระบุว่าส่วนประกอบใดบ้างที่รวมอยู่ในชุดจานจ่าย (เช่น ฝาครอบ โรเตอร์
        Modules ระเบิด ปะเก็น/โอริง เฟืองขับ สายไฟ/ขั้วต่อ)
    dive_computer_form_factor:
      name: รูปแบบโครงสร้างคอมพิวเตอร์ดำน้ำ
      description: ระบุการออกแบบทางกายภาพหรือวิธีการติดตั้งของคอมพิวเตอร์ดำน้ำ เช่น
        ติดตั้งบนคอนโซลหรือแบบนาฬิกาข้อมือ
    diving_mask_design:
      name: การออกแบบหน้ากากดำน้ำ
      description: กำหนดรูปแบบโครงสร้างโดยรวมของหน้ากากดำน้ำ ซึ่งส่งผลต่อความกระชับ
        ทัศนวิสัยในการมองเห็น และวัตถุประสงค์ในการใช้งาน
    divot_tool_prong_configuration:
      name: รูปแบบการจัดวางและจำนวนขาของอุปกรณ์ซ่อมรอยลูกกอล์ฟตก
      description: ระบุจำนวนและการจัดวางขาของอุปกรณ์ซ่อมรอยลูกกอล์ฟตกที่ใช้สำหรับซ่อมแซมความเสียหายบนพื้นหญ้า
    divot_tool_style:
      name: สไตล์เครื่องมือซ่อมรอยหญ้า
      description: กำหนดรูปแบบโครงสร้างโดยรวมหรือลักษณะการใช้งานของอุปกรณ์ซ่อมรอยลูกกอล์ฟตก
        เช่น แบบยึดตายตัว แบบดีด/พับเก็บ แบบมัลติทูล หรือแบบอุปกรณ์เสริมที่สามารถหนีบเข้ากับหมวกหรือไม้กอล์ฟได้
    djembe_shell_construction:
      name: โครงสร้างเปลือกกลองเจมเบ้
      description: อธิบายวิธีการขึ้นรูปหรือกระบวนการสร้างตัวถังของกลองเจ็มเบ้
    djembe_tuning_system:
      name: ระบบปรับเสียงกลองเจมเบ้
      description: ระบุวิธีการปรับความตึง/ตั้งเสียงกลองเจมเบ้
    dmx_output_connector_type:
      name: ประเภทขั้วต่อเอาต์พุต DMX
      description: รูปแบบขั้วต่อทางกายภาพที่ใช้สำหรับพอร์ตเอาต์พุต DMX ของคอนโทรลเลอร์
    doctor_playset_items_included:
      name: รายการอุปกรณ์ที่มีมาให้ในชุดของเล่นคุณหมอ
      description: ระบุเครื่องมือแพทย์จำลองและอุปกรณ์เสริมสำหรับการเล่นบทบาทสมมติที่รวมอยู่ในชุดของเล่นคุณหมอ
        (เช่น หูฟังแพทย์ เข็มฉีดยา หรือค้อนตรวจรีเฟล็กซ์)
    doctor_playset_role_play_setting:
      name: บริบทหรือสถานการณ์จำลองสำหรับการเล่นบทบาทสมมติในชุดของเล่นคุณหมอ
      description: ระบุ Context ชุดของเล่นหมอแสดงถึง
    doctor_playset_wearable_items_included:
      name: รายการชิ้นส่วนเครื่องแต่งกายที่รวมมาในชุดของเล่นคุณหมอ
      description: ระบุชิ้นส่วนเครื่องแต่งกายแบบสวมใส่ได้ที่มีมาให้ในชุดของเล่น
    doll_accessory_type:
      name: ประเภทอุปกรณ์เสริมสำหรับตุ๊กตา
      description: กำหนดประเภทของอุปกรณ์เสริมสำหรับตุ๊กตาหรือฟิกเกอร์ (เช่น เสื้อผ้า
        รองเท้า เฟอร์นิเจอร์ ขาตั้งโชว์) ช่วยให้ผู้ซื้อสามารถเลือกดูและกรองค้นหาภายในหมวดหมู่อุปกรณ์เสริมนี้ได้
    doll_eye_type:
      name: ประเภทดวงตาของตุ๊กตา
      description: ระบุรูปแบบการสร้างดวงตาของตุ๊กตา (เช่น อะคริลิกฝัง, ทาสี, ไฟ LED
        ส่องสว่าง)
    doll_hair_fiber_type:
      name: ประเภทเส้นใยผมของตุ๊กตา
      description: ประเภทของเส้นผมหรือเส้นใยที่ใช้กับตุ๊กตา (หรือไม่มี) ซึ่งส่งผลต่อความสมจริง
        การจัดแต่งทรง และการดูแลรักษา
    doll_making_kit_components_included:
      name: ส่วนประกอบที่รวมมาในชุดทำตุ๊กตา
      description: ระบุรายการวัสดุหลักและเครื่องมือที่มีมาให้ในชุดอุปกรณ์ทำตุ๊กตา
        เพื่อให้ผู้ซื้อสามารถเปรียบเทียบชุดสินค้าและทราบว่าต้องจัดหาอะไรเพิ่มเติมด้วยตัวเองบ้าง
    dollhouse_installation_placement_type:
      name: การติดตั้ง Dollhouse/ตำแหน่งสำหรับวางประเภท
      description: ลักษณะการใช้งานหรือการจัดวางบ้านตุ๊กตา (เช่น วางบนโต๊ะ วางบนพื้น
        หรือติดผนัง)
    dollhouse_items_included:
      name: รวมรายการสิ่งของในบ้านตุ๊กตาแล้ว
      description: ระบุสิ่งของที่อยู่ในกล่องบ้านตุ๊กตา (เฟอร์นิเจอร์ ตุ๊กตา อุปกรณ์เสริม)
    dollhouse_lighting_type:
      name: ประเภทไฟบ้านตุ๊กตา
      description: ประเภทของระบบไฟส่องสว่างที่ติดตั้งหรือรองรับโดยบ้านตุ๊กตา
    dollhouse_room_type:
      name: ห้องแบบบ้านตุ๊กตา
      description: ระบุห้อง/พื้นที่ภายในบ้านตุ๊กตาที่โดยทั่วไปมีการใช้อุปกรณ์เสริมนี้
    dollhouse_scale:
      name: สเกลบ้านตุ๊กตา
      description: อัตราส่วนของบ้านตุ๊กตาหรืออุปกรณ์บ้านตุ๊กตา (เช่น 1:12) เพื่อให้แน่ใจว่าบ้าน
        เฟอร์นิเจอร์ และหุ่นต่างๆ เข้ากันได้
    dollhouse_style_theme:
      name: สไตล์/ธีมบ้านตุ๊กตา
      description: สไตล์โดยรวมหรือธีมของบ้านตุ๊กตาสำหรับการเรียกดูและการให้ของขวัญ
        (เช่น สมัยใหม่กับวิคตอเรียน)
    donnos_playing_technique:
      name: เทคนิคการเล่นของดอนโนส
      description: ระบุวิธีการเล่น/ทำให้ดอนโนสเกิดเสียง (ใช้มือเล่นเท่านั้น หรือใช้ไม้ตี)
        เพื่อให้ตรงกับความคาดหวังของผู้ซื้อและอุปกรณ์เสริมที่ให้มาด้วย
    donnos_tuning_system:
      name: ระบบปรับเสียงของดอนโนส
      description: วิธีการหลักที่ใช้ในการปรับหรือเปลี่ยนระดับเสียง (เช่น เชือกดึง/กลไกบีบ)
    door_assembly_type:
      name: ประเภทของชุดประกอบประตู
      description: 'ระบุสิ่งที่รวมอยู่ด้วย: เฉพาะโครงประตู ผิวประตู หรือชุดประตูครบชุด'
    door_closure_mechanism:
      name: กลไกการปิดประตู
      description: อธิบายกลไกที่ควบคุมการปิดประตู (เช่น ระบบปิดแบบนุ่มนวล กลอนแม่เหล็ก)
    door_handle_components_included:
      name: ส่วนประกอบมือจับประตูรวมอยู่ด้วย
      description: ระบุว่าส่วนสำคัญใดบ้างที่รวมอยู่ในประตู แฮนสไลด์ (เช่น กระบอกล็อค
        ปะเก็น/ซีล ฝาครอบขอบ อุปกรณ์ยึดฮาร์ดแวร์ หางเปียสายไฟ สลัก/แอคชูเอเตอร์)
    door_handle_operation:
      name: การใช้งานมือจับประตู
      description: ระบุรูปแบบการทำงาน/การใช้งานหลักของชุดมือจับประตูรถยนต์ (เช่น กลไกเชื่อมต่อ
        กระบอกกุญแจ ระบบสัมผัส/ปุ่มกดแบบไม่ใช้กุญแจ ระบบงัดแงะด้วยไฟฟ้า)
    door_lock_knob_attachment_method:
      name: วิธีการติดตั้งลูกบิดล็อคประตู
      description: ระบุวิธีการยึดลูกบิดล็อคประตูเข้ากับแกนล็อค (เช่น แบบเกลียว หรือแบบกด)
    door_lock_position:
      name: ตำแหน่งล็อคประตู
      description: ระบุตำแหน่งประตู/ช่องเปิดที่ตัวล็อกประตูหรือชิ้นส่วนล็อกประตูได้รับการออกแบบมาให้พอดีกับรถยนต์
    door_seal_feature_set:
      name: ชุดซีลประตู
      description: คุณสมบัติการใช้งานของซีลประตู
    door_seal_material_type:
      name: ประเภทวัสดุซีลประตู
      description: กลุ่มอีลาสโตเมอร์/วัสดุหลักที่ใช้ผลิตซีลประตู (นอกเหนือจากวัสดุทั่วไป)
    door_seal_product_form:
      name: ซีลประตูแบบสินค้า
      description: ระบุรูปแบบการขาย/บรรจุภัณฑ์ของซีลประตู
    door_window_operation:
      name: การทำงานของประตูและหน้าต่าง
      description: ระบุว่าระบบหน้าต่างของประตูนั้นออกแบบมาสำหรับการใช้งานด้วยมือหรือด้วยระบบไฟฟ้า
        หรือว่าประตูนั้นไม่มีหน้าต่าง
    double_decker_bus_deck_configuration:
      name: การกำหนดค่าชั้นโดยสารรถบัสสองชั้น
      description: ระบุรูปแบบการเข้าถึงดาดฟ้า/หลังคาของรถโดยสารสองชั้น
    double_drum_pedal_linkage_medium:
      name: การเชื่อมต่อแป้นเหยียบกลองคู่ขนาดกลาง
      description: ระบุสื่อกลางที่ใช้เชื่อมต่อแป้นเหยียบรองเข้ากับแป้นเหยียบหลัก (เช่น
        เพลาขับ โซ่ สายพาน)
    double_end_bag_core_type:
      name: ประเภทแกนถุงแบบสองด้าน
      description: ระบุโครงสร้างแกนกลางภายในที่ส่งผลต่อความเร็วในการเด้งกลับ ความรู้สึก
        และความต้องการในการบำรุงรักษา
    double_pointed_needle_point_style:
      name: รูปแบบปลายเข็มถักสองปลาย
      description: อธิบายถึงความคมของปลายเข็ม/Shapes ที่ออกแบบมาสำหรับเส้นด้ายและสไตล์การถักที่แตกต่างกัน
    dough_extruder_accessories_included:
      name: อุปกรณ์เสริมสำหรับเครื่องอัดแป้งรวมอยู่ด้วย
      description: ส่วนประกอบเพิ่มเติมที่มาพร้อมกับเครื่องอัดแป้ง
    dough_extruder_operation_type:
      name: ประเภทการทำงานของเครื่องอัดแป้ง
      description: ขั้นตอนการดันแป้งผ่านเครื่องอัดขึ้นรูปเพื่อขึ้นรูปทรงต่างๆ
    dough_extruder_shape_disc_included:
      name: รวมแผ่นดิสก์รูปทรงเครื่องอัดแป้ง
      description: Shapesต่างๆ ที่เครื่องอัดรีดสามารถผลิตได้โดยใช้แผ่นดิสก์/หัวฉีดที่ให้มาด้วย
    dough_format:
      name: รูปแบบแป้ง
      description: ระบุลักษณะ/รูปทรงของแป้งภายในบรรจุภัณฑ์ (เช่น ก้อน แผ่น แผ่นกลม
        หรือเส้นฝอย)
    doumbek_accessories_included:
      name: อุปกรณ์เสริมที่มาพร้อมกับกลองดุมเบค
      description: อุปกรณ์เสริมที่มาพร้อมกับกลองดูมเบ็ก (เช่น กุญแจปรับเสียง เคสใส่กลอง)
    doumbek_head_material:
      name: วัสดุของหนังกลองดุมเบค
      description: วัสดุที่ใช้ทำหนังกลอง (เมมเบรน) ของกลองดุมเบก
    doumbek_head_type:
      name: ประเภทของหนังกลองดุมเบก
      description: โครงสร้าง/ประเภทหนังกลองดูมเบ็ก (วิธีการผลิตหรือติดตั้งแผ่นหนังกลอง)
    doumbek_playing_style_technique:
      name: สไตล์/เทคนิคการเล่นกลองดูมเบ็ก
      description: ระบุบริบทหรือสไตล์การเล่นที่มักเกี่ยวข้องกับกลองดูมเบ็ก
    doumbek_tuning_system:
      name: ระบบปรับเสียงกลองดุมเบค
      description: วิธีการปรับความตึง/ตั้งเสียงกลองดูมเบ็ก (หรือในกรณีที่ไม่สามารถตั้งเสียง)
    dowel_end_style:
      name: รูปแบบปลายเดือย
      description: อธิบายลักษณะการตัดหรือรูปทรงของปลายหมุดไม้ ซึ่งส่งผลต่อความง่ายในการสอดใส่
        ความปลอดภัย และวัตถุประสงค์ในการใช้งานสำหรับงานฝีมือ
    dowel_surface_texture:
      name: ลักษณะพื้นผิวของหมุดไม้
      description: อธิบายสภาพพื้นผิวของหมุดไม้ เช่น แบบเรียบหรือแบบเซาะร่อง ซึ่งส่งผลต่อรูปลักษณ์และการยึดเกาะของกาว
    drafting_compass_adjustment_mechanism:
      name: กลไกการปรับตั้งของวงเวียนเขียนแบบ
      description: กลไกการปรับละเอียดหลักที่ใช้สำหรับตั้งค่ารัศมีอย่างแม่นยำ
    drafting_compass_fine_adjustment_mechanism:
      name: กลไกปรับละเอียดของวงเวียนเขียนแบบ
      description: ประเภทของการปรับละเอียดที่ใช้ในการกำหนดรัศมีอย่างแม่นยำ (ถ้ามี)
    drafting_compass_lead_holder_type:
      name: ประเภทของปลอกจับไส้ดินสอของวงเวียนเขียนแบบ
      description: ประเภทของตัวแทรก/ที่ยึดสำหรับวาดภาพที่รวมอยู่หรือรองรับโดยวงเวียน
    drag_system_material:
      name: วัสดุระบบลาก
      description: ระบุวัสดุหรือเทคโนโลยีที่ใช้ในระบบผ้าเบรกซึ่งส่งผลต่อความทนทานต่อความร้อนและความราบรื่นในการทำงาน
    drag_system_type:
      name: ประเภทระบบเบรก
      description: ระบุรูปแบบของกลไกเบรกที่ใช้ในรอกตกปลา เช่น เบรกหน้า เบรกท้าย เบรกแบบคานโยก
        เบรกแบบดาวกระจาย เบรกแม่เหล็ก หรือเบรกแบบแผ่นดิสก์
    drag_type:
      name: ประเภทระบบลาก
      description: ระบุรูปแบบของกลไกระบบลากที่ใช้ในรอก (ตามตำแหน่งหรือวิธีการทำงาน)
    drawer_features:
      name: คุณสมบัติของลิ้นชัก
      description: รายละเอียดเกี่ยวกับองค์ประกอบหรือฟังก์ชันการทำงานพิเศษของการสร้างลิ้นชัก
        (เช่น ระบบปิดแบบนุ่มนวล บุด้วยสักหลาด)
    drawer_slide_type:
      name: แบบรางเลื่อนลิ้นชัก
      description: ระบุรูปแบบการติดตั้งและการยืดหดของรางเลื่อนลิ้นชัก (เช่น ติดตั้งใต้ลิ้นชัก
        หรือยืดหดได้เต็มที่)
    drawing_ink_compatible_tools:
      name: อุปกรณ์ที่ใช้กับหมึกวาดภาพ
      description: ระบุเครื่องมือในการลงสีหรือเขียนที่น้ำหมึกนี้ถูกออกแบบมาเพื่อใช้งาน
        (เช่น ปากกาคอแร้ง เทียบกับ พู่กัน)
    drawing_ink_permanence:
      name: ความคงทนถาวรของหมึกวาดเขียน
      description: ระบุลักษณะความคงทนซึ่งมีความสำคัญต่อผลงานศิลปะที่เสร็จสมบูรณ์และการทำสำเนา
    dress_embellishment:
      name: การตกแต่งเสริมบนชุดเดรส
      description: ระบุองค์ประกอบหลักในการตกแต่งที่รวมอยู่ในการออกแบบชุดเดรส
    dress_train_type:
      name: ประเภทชายลากของชุดเดรส
      description: บ่งบอกถึงการมีอยู่และความยาว/รูปแบบของชายกระโปรงชุดแต่งงาน ซึ่งช่วยบ่งบอกถึงระดับความเป็นทางการและความเหมาะสม
        Venue
    dried_surface_finish:
      name: พื้นผิวที่แห้งสนิท
      description: อธิบายลักษณะพื้นผิวที่ปรากฏตามปกติหลังจากแห้งตัว (ความเงา/เนื้อสัมผัส)
    drink_tube_insulation:
      name: ฉนวนกันความร้อนของท่อเครื่องดื่ม
      description: ระบุว่าหลอดเครื่องดื่มมีฉนวนกันความร้อนหรือปลอกหุ้มกันความร้อนเพื่อป้องกันไม่ให้ของเหลวร้อนหรือเย็นจัดหรือไม่
    drive_band_cross_section_shape:
      name: รูปทรงหน้าตัดของแถบขับเคลื่อน
      description: รูปทรงของสายพานขับ (กลม แบน ฯลฯ)
    drive_band_join_type:
      name: ประเภทการเชื่อมต่อแถบขับเคลื่อน
      description: วิธีการเชื่อมต่อ/ประกอบสายพานขับ (แบบไร้รอยต่อ หรือแบบต้องผูก ฯลฯ)
    drive_band_material_type:
      name: ประเภทวัสดุของสายพานขับ
      description: ระบุวัสดุ/ประเภทของสายพานขับที่ใช้ในเครื่องปั่นด้าย
    drive_location:
      name: ขับรถโซล
      description: ระบุตำแหน่งของล้อช่วยแรง/กลไกขับเคลื่อนบนเครื่องออกกำลังกายแบบวงรี
        ซึ่งมีผลต่อพื้นที่ Influence และความรู้สึก Motion
    drive_mechanism:
      name: กลไกขับเคลื่อน
      description: ระบุประเภทของระบบขับเคลื่อนที่ใช้ในการส่งกำลังจากแป้นเหยียบไปยังล้อต้านน้ำหนัก
    drive_shaft_material:
      name: วัสดุเพลาขับ
      description: ระบุวัสดุหลักที่ใช้ผลิตท่อเพลาขับหรือชุดเพลาขับแบบครบชุด
    drive_system:
      name: ระบบขับเคลื่อน
      description: ระบุกลไกที่ให้แรงเหยียบกับระบบต้านทาน
    drivetrain_configuration:
      name: การกำหนดค่าระบบขับเคลื่อน
      description: ระบุการตั้งค่าระบบขับเคลื่อนของจักรยาน เพื่อบ่งบอกว่าดุมหลังเป็นแบบฟิกซ์เกียร์
        เกียร์เดี่ยวแบบปล่อยฟรี หรือแบบฟลิปฟลอป
    drivetrain_speed_compatibility:
      name: ความเข้ากันได้ของความเร็วระบบขับเคลื่อน
      description: ระบุจำนวนสปีดของเฟืองหลังที่มีการออกแบบจานหน้ามาให้ใช้งานร่วมกันได้
        เพื่อให้มั่นใจว่ารูปทรงและระยะห่างของฟันเฟืองเหมาะสม
    drone_positioning_system:
      name: ระบบกำหนดตำแหน่งโดรน
      description: เทคโนโลยีการระบุตำแหน่ง/การรักษาระดับในตัวที่โดรนรองรับ เพื่อการนำทางและการบินนิ่งอยู่นับกับที่อย่างมั่นคง
    drone_transmission_type:
      name: ประเภทการส่งสัญญาณโดรน
      description: วิธีการหลักที่ใช้ในการควบคุมและ/หรือการเชื่อมต่อสัญญาณภาพระหว่างโดรนกับคอนโทรลเลอร์หรืออุปกรณ์
    drop_spindle_whorl_position:
      name: ตำแหน่งแผ่นน้ำหนักบนแกนปั่นด้าย
      description: ตำแหน่งของแป้นหมุนบนก้านเครื่องปั่นด้าย
    drum_carder_accessories_included:
      name: อุปกรณ์เสริมสำหรับเครื่องปั่นด้ายแบบดรัม
      description: อุปกรณ์ที่มักรวมอยู่ในชุดเครื่องมือสางและจัดเรียงเส้นใยธรรมชาติ
    drum_clamp_locking_mechanism:
      name: กลไกล็อคของแคลมป์จับกลอง
      description: ระบุวิธีที่แคลมป์ล็อคหรือขันแน่นเข้ากับท่อหรือขอบกลอง (เช่น น็อตหางปลา
        น็อตใช้กุญแจกลองขัน ตัวปลดเร็ว)
    drum_clamp_mount_interface:
      name: ประเภทอินเทอร์เฟซตัวหนีบยึดกับกลอง
      description: ระบุสิ่งที่แคลมป์มีให้สำหรับยึดต่ออุปกรณ์เสริม (เช่น ช่องรับแกนแอล
        ข้อต่อแบบลูกบอล ตัวปรับองศาฉาบ)
    drum_clamp_type:
      name: ประเภทของแคลมป์จับกลอง
      description: ระบุรูปแบบการใช้งานของแคลมป์จับที่ใช้ในอุปกรณ์ติดตั้งชุดกลอง (เช่น
        แคลมป์จับขอบกลอง เทียบกับ แคลมป์จับแร็คหรือท่อ)
    drum_head_application_batter_resonant:
      name: หนังกลองสำหรับตำแหน่งติดตั้ง (ด้านตี/ด้านล่างระบายเสียง)
      description: ระบุว่าหนังกลองถูกออกแบบมาสำหรับติดตั้งในตำแหน่งใด/ด้านใดของกลอง
        (ด้านบนสำหรับตี เทียบกับ ด้านล่างสำหรับระบายเสียงหรือฝั่งสายสแนร์)
    drum_head_collar_type:
      name: ประเภทของบ่าหนังกลอง
      description: ระบุว่าหนังกลองมีลักษณะบ่าแบบมาตรฐาน บ่าเตี้ย หรือบ่าแบบพิเศษ เพื่อให้สอดรับกับขอบตัวถังหรือขอบแบริ่งเอจของกลองบางรุ่น
    drum_head_damping_control:
      name: การควบคุมการหม่นเสียงของหนังกลอง
      description: คุณลักษณะการควบคุมเสียงสะท้อนในตัว หรือรูปแบบการหม่นเสียงที่รวมอยู่ในการออกแบบหนังกลอง
    drum_head_film_material:
      name: วัสดุแผ่นฟิล์มของหนังกลอง
      description: วัสดุหลักแผ่นหนังกลอง (โดยทั่วไปคือ PET/Mylar แต่อาจรวมถึงวัสดุพิเศษอื่นๆ
        ด้วย)
    drum_head_hoop_collar_type:
      name: ประเภทของขอบ/คอหนังกลอง
      description: ระบุโครงสร้างขอบและคอของหนังกลอง (เช่น รูปทรงคอและวัสดุของขอบ)
        ซึ่งอาจส่งผลต่อความพอดีในการติดตั้งและความเสถียรในการตั้งเสียงกับตัวกลองและขอบกลองบางประเภท
    drum_head_hoop_rim_material:
      name: วัสดุของขอบ/ขอบลวดหนังกลอง
      description: วัสดุของขอบ/ขอบลวดหนังกลอง (ขอบที่ฝังอยู่ภายในโครงสร้างหนังกลอง)
        ซึ่งสามารถส่งผลต่อความทนทานและความมั่นคงในการตั้งสาย
    drum_head_included:
      name: รวมหนังกลองมาด้วย
      description: ระบุว่ามีหนังกลองด้านตีและ/หรือหนังกลองด้านล่างระบายเสียงรวมมาให้พร้อมกับกลองหรือไม่
    drum_head_muffling_feature:
      name: คุณสมบัติการลดเสียงสะท้อนของหนังกลอง
      description: คุณลักษณะการควบคุมเสียงสะท้อนในตัวที่รวมอยู่ภายในโครงสร้างหนังกลอง
    drum_head_muffling_type:
      name: ประเภทการลดเสียงสะท้อนของหนังกลอง
      description: ระบุว่าหนังกลองมีองค์ประกอบควบคุม/ลดเสียงสะท้อนในตัวหรือไม่
    drum_head_ply_count:
      name: จำนวนชั้นของหนังกลอง
      description: จำนวนชั้นของแผ่นฟิล์มที่ใช้ในการผลิตหนังกลอง (เช่น ชั้นเดียว, สองชั้น)
    drum_head_position:
      name: ตำแหน่งหนังกลอง
      description: ระบุว่าหนังกลองถูกกำหนดให้ใช้เป็นด้านตี (ด้านบน) ด้านระบายเสียง
        (ด้านล่าง) ฝั่งสายสแนร์ (ด้านล่าง) หรือสามารถใช้งานได้ทั้งสองแบบ
    drum_head_reinforcement_type:
      name: ประเภทการเสริมแรงหนังกลอง
      description: ระบุว่าหนังกลองสแนร์มีคุณสมบัติเสริมความแข็งแรง เช่น จุดเสริมตรงกลางหรือวงแหวนควบคุมเสียง
        เพื่อเพิ่มความทนทานและทำให้โทนเสียงมีความชัดเจนมากขึ้นหรือไม่
    drum_head_surface_finish:
      name: ผิวสัมผัสของหนังกลอง
      description: พื้นผิว/ลักษณะการเคลือบของหนังกลอง ซึ่งส่งผลต่อการตอบสนองของการตีและการใช้แส้
    drum_head_type:
      name: ประเภทหนังกลอง
      description: ระบุโครงสร้าง/ประเภทของหนังกลองที่ใช้ (โดยหลักๆ คือหนังกลองด้านตี/ด้านสะท้อนเสียงตามที่มาพร้อมตัวกลอง)
    drum_key_design_type:
      name: ประเภทการออกแบบกุญแจตั้งกลอง
      description: ใช้อธิบายรูปแบบการทำงานของกุญแจตั้งกลอง (เช่น แบบมาตรฐาน แบบมีเฟืองล็อก
        หรือแบบด้ามจับตัว T)
    drum_key_drive_type:
      name: รูปแบบหัวต่อกุญแจตั้งกลอง
      description: ระบุรูปแบบหัวต่อ/การเชื่อมต่อของกุญแจตั้งกลองที่ใช้กับหลักดึงหนังกลองหรือฮาร์ดแวร์จับยึด
    drum_key_handle_style:
      name: รูปแบบด้ามจับของกุญแจตั้งกลอง
      description: อธิบายถึงลักษณะด้ามจับ/รูปแบบตามหลักสรีรศาสตร์ของกุญแจตั้งกลอง
        ซึ่งส่งผลต่อความสบายในการใช้งานและการผ่อนแรงขณะปรับเสียงกลอง
    drum_kit_included_items:
      name: อุปกรณ์ที่รวมมาในชุดกลอง
      description: ระบุรายการอุปกรณ์หลักที่รวมอยู่ในชุดกลองนอกเหนือจากตัวถังกลอง/แป้นกลอง
        (เช่น ฮาร์ดแวร์ต่างๆ ฉาบ/แฉ เก้าอี้กลอง)
    drum_kit_portability:
      name: ความสะดวกในการพกพาชุดกลอง
      description: ระบุว่าชุดอุปกรณ์ได้รับการออกแบบมาเพื่อการจัดเก็บ/ขนส่งสะดวกหรือไม่
        (เช่น แบบสำหรับเดินทาง/แบบกะทัดรัด/แบบพับได้)
    drum_kit_shell_construction_features:
      name: คุณลักษณะโครงสร้างลำตัวของชุดกลอง
      description: วิธีการผลิตตัวกลอง (จำนวนชั้นไม้/ประเภทวัสดุ) ส่งผลต่อโทนเสียงและความทนทาน
    drum_mount_clamp_type:
      name: ประเภทแคลมป์ยึดดรัม
      description: อธิบายรูปแบบโครงสร้างของแคลมป์ที่ใช้ในฮาร์ดแวร์สำหรับติดตั้งกลอง
    drum_multi_clamp_clamp_type:
      name: ประเภทแคลมป์ในอุปกรณ์ Multi-Clamp สำหรับกลอง
      description: รูปแบบฟังก์ชันการใช้งาน/การจัดวางโครงสร้างของแคลมป์อเนกประสงค์
        (ลักษณะการยึดจับและใช้ต่ออุปกรณ์ใดบ้าง)
    drum_mute_material:
      name: วัสดุของอุปกรณ์ลดเสียงกลอง
      description: ระบุวัสดุหลักของอุปกรณ์ลดเสียงกลองที่สัมผัสกับหนังกลองและ/หรือช่วยลดแรงสั่นสะเทือน
    drum_pad_triggering_zones:
      name: โซนรับสัญญาณของแป้นกลอง
      description: ระบุจำนวน/ประเภทของโซนทริกเกอร์ที่รองรับบนแผ่นกลองทอม (เช่น หนังกลองอย่างเดียว
        หรือหนังกลอง+ขอบ) ซึ่งส่งผลต่อความหลากหลายในการแสดงออกและความเข้ากันได้กับโมดูล
    drum_pedal_accessories_included:
      name: อุปกรณ์เสริมสำหรับกระเดื่องกลองที่รวมอยู่ในชุด
      description: แสดงรายการอุปกรณ์เสริมและส่วนประกอบสำคัญที่บรรจุมาพร้อมกับกระเดื่องกลอง
    drum_pedal_baseplate_type:
      name: ประเภทแผ่นโลหะฐานกระเดื่องกลอง
      description: ระบุว่ากระเดื่องใช้โครงสร้างแบบมีฐานรอง หรือแบบลอยตัว/ไร้กรอบ
    drum_pedal_bearing_type:
      name: ประเภทตลับลูกปืนของกระเดื่องกลอง
      description: ระบุกลไกตลับลูกปืนที่ใช้ในจุดหมุนหลักต่างๆ (เช่น ชุดก้านโยก จุดหมุนส้นเท้า
        หรือจุดหมุนก้านแคม)
    drum_pedal_cam_type:
      name: ประเภทแคมของกระเดื่องกลอง
      description: ระบุรูปทรง/ลักษณะของแคมในกระเดื่องกลอง ซึ่งมีผลต่อความรู้สึกและการตอบสนองในการเหยียบ
        (เช่น แบบ Linear หรือ Accelerator )
    drum_pedal_chain_configuration:
      name: รูปแบบการจัดวางโซ่ของกระเดื่องกลอง
      description: ระบุรูปแบบการจัดเรียงโซ่ที่ใช้ในกระเดื่องกลองแบบขับเคลื่อนด้วยโซ่
        (เช่น โซ่เดี่ยว โซ่คู่ หรือโซ่เยื้องศูนย์)
    drum_pedal_chain_type:
      name: ประเภทโซ่ของกระเดื่องกลอง
      description: ระบุรูปแบบของโซ่ที่ใช้ในระบบขับเคลื่อน (เช่น โซ่ลูกกลิ้งเทียบกับโซ่แบบจักรยาน)
        ซึ่งอาจส่งผลต่อความลื่นไหลและความทนทาน
    drum_pedal_clamp_type:
      name: ประเภทแคลมป์ของกระเดื่องกลอง
      description: ระบุวิธีการยึดกระเดื่องเข้ากับขอบกลองเบส
    drum_pedal_intended_use:
      name: วัตถุประสงค์การใช้งานของกระเดื่องกลอง
      description: ระบุบริบทการใช้งานหลักของกระเดื่องกลองที่ระบบสายพานนี้ถูกออกแบบหรือทำตลาดมาเพื่อรองรับ
    drum_pedal_spring_adjustment_method:
      name: วิธีการปรับสปริงของกระเดื่องกลอง
      description: ระบุวิธีการปรับความตึงของสปริงบนกระเดื่องกลอง
    drum_pedal_spring_type:
      name: ประเภทของสปริงกระเดื่องกลอง
      description: ระบุกลไกสปริงที่ใช้ในการคืนตัวของกระเดื่องกลอง
    drum_shell_material:
      name: วัสดุที่ใช้ทำตัวกลอง
      description: ระบุวัสดุหลักที่ใช้ในการผลิตตัวกลองอะคูสติก (เช่น ไม้เมเปิล ไม้เบิร์ช
        อะคริลิก)
    drum_shell_wood_species:
      name: ชนิดของไม้ที่ใช้ทำตัวถังกลอง
      description: ระบุชนิดของไม้ที่ใช้ทำตัวถังกลอง ซึ่งมีผลต่อโทนเสียงและการก้องกังวาน
    drumhead_type:
      name: ประเภทหนังกลอง
      description: รูปแบบ/ประเภทหนังกลองที่ใช้กับกลองอ็อกโทบัน
    drumstick_model:
      name: รุ่นของไม้กลอง
      description: รหัสรุ่น/ขนาดมาตรฐานของไม้กลองที่หลายแบรนด์ใช้ร่วมกัน (เช่น 5A,
        7A)
    drumstick_taper:
      name: ความเรียวของไม้กลอง
      description: อธิบายลักษณะความเรียวจากโคนไปจนถึงปลายไม้ ซึ่งส่งผลต่อการเด้งกลับและสมดุลในการเล่น
    drysuit_footwear_style:
      name: รูปแบบรองเท้าของชุดดรายสูท
      description: อธิบายถึงลักษณะส่วนปลายขาของชุดดำน้ำแบบดรายสูท (เช่น บูทในตัว ถุงเท้านีโอพรีน
        ถุงเท้าแบบ stockingfoot หรือซีลข้อเท้าแบบเปลือย)
    dumbbell_style:
      name: รูปแบบดัมเบล
      description: ระบุดีไซน์พื้นฐานของดัมเบล ว่าเป็นแบบน้ำหนักคงที่ แบบปรับน้ำหนักได้
        หรือแบบด้ามสำหรับใส่น้ำหนักเพิ่ม ซึ่งมีผลอย่างมากต่อการตัดสินใจซื้อและรูปแบบในการใช้ออกกำลังกาย
    dundun_playing_position:
      name: ตำแหน่งการวางกลองดุนดุนขณะเล่น
      description: ตำแหน่งการเล่น/การถือกลอง
    dye_status:
      name: สถานะการย้อมสี
      description: ระบุว่าเส้นใยนั้นย้อมสี ไม่ย้อมสี/สีธรรมชาติ หรือมีหลายสี/หลายชนิด
    dye_style:
      name: สไตล์การย้อมสี
      description: ระบุว่าด้ายมีลักษณะสีพื้น ไล่เฉด/หลากสี หรือผ่านการย้อมสีแบบพิเศษอื่นๆ
    dye_technique:
      name: เทคนิคการย้อมสี
      description: วิธีการที่ใช้ในการย้อมสีเส้นใย (เช่น การย้อมด้วยมือ การย้อมในหม้อ
        การย้อมแบบไล่สีเป็นช่วง)
    dye_type_needlecraft_fabric:
      name: ประเภทสีย้อม (ผ้าสำหรับงานเย็บปักถักร้อย)
      description: ระบุว่าผ้าลินินเป็นสีพื้น ย้อมด้วยมือ หรือย้อมด้วยสีพิเศษ
    dyeing_color_processing:
      name: การย้อมสี /กระบวนการปรับแต่งสี
      description: อธิบายว่าย้อมสีเส้นใยหรือไม่ และย้อมด้วยวิธีใด (เช่น ไม่ย้อมสี
        ฟอกขาว/ย้อมสีขาว หรือเทคนิคการย้อมสีเฉพาะทาง)
    e_bike_certification_class:
      name: ระดับการรับรองจักรยานไฟฟ้า
      description: ระบุค่าความเร็วอย่างเป็นทางการของยางสำหรับจักรยานไฟฟ้า (เช่น E-25,
        E-50)
    e_bike_speed_rating:
      name: ระดับความเร็วจักรยานไฟฟ้า
      description: ระบุระดับการรับรองมาตรฐานอย่างเป็นทางการสำหรับยางจักรยานไฟฟ้า (เช่น
        E25 สำหรับความเร็ว ≤25 กม./ชม., E50 สำหรับความเร็ว ≤50 กม./ชม.)
    e_scooter_connector_type:
      name: ประเภทขั้วต่อสกูตเตอร์ไฟฟ้า
      description: ระบุรูปแบบขั้วต่อไฟฟ้าหรือปลั๊กที่ชิ้นส่วนใช้สำหรับการเชื่อมต่อพลังงานหรือสัญญาณ
    e_scooter_throttle_type:
      name: ประเภทคันเร่งสกูตเตอร์ไฟฟ้า
      description: ระบุประเภทของคันเร่งที่ใช้ควบคุมการเร่งความเร็วของสกูตเตอร์ไฟฟ้า
    ear_coverage:
      name: การปกปิดใบหู
      description: ระบุว่าหมวกกันน็อกมีอุปกรณ์ป้องกันหูหรือไม่ และสามารถถอดออกได้หรือไม่
    ear_coverage_style:
      name: รูปแบบการปกปิดใบหู
      description: อธิบายลักษณะหรือรูปแบบการปกปิดใบหูของหน้ากากกันแมลง
    ear_coverage_type:
      name: ประเภทการปกปิดใบหู
      description: ระบุวิธีการที่หมวกปกปิดหรือป้องกันหู รวมถึงการมีอยู่และรูปแบบของที่ปิดหู
    ear_guard_type:
      name: ประเภทสนับป้องกันใบหู
      description: อธิบายรูปแบบอุปกรณ์ป้องกันหูที่ติดตั้งมากับหมวก เช่น พลาสติกแข็ง
        บุด้วยวัสดุนุ่ม หรือแผ่นแบบถอดได้
    earmuff_style:
      name: รูปแบบที่ครอบหู
      description: ระบุวิธีการสวมที่ครอบหูหรือรูปแบบดีไซน์โครงสร้าง (เช่น แบบสวมคลุมศีรษะ
        หรือแบบพันรอบศีรษะ)
    earring_closure_type:
      name: ประเภทตัวล็อกต่างหู
      description: ระบุกลไกที่ใช้ในการยึดต่างหูไว้กับใบหู (เช่น แบบก้านเสียบพร้อมแป้นดัน
        แบบก้านล็อก แบบหนีบ)
    easel_art_desk_features:
      name: คุณลักษณะของขาตั้งวาดรูปและโต๊ะศิลปะ
      description: ระบุคุณสมบัติการใช้งานทั่วไปที่รวมอยู่กับขาตั้งหรือโต๊ะวาดรูป
    easel_art_desk_surface_type:
      name: ประเภทพื้นผิวขาตั้งและโต๊ะวาดรูป
      description: ระบุพื้นผิวสำหรับวาด/เขียนสามารถที่ใช้งานได้ (เช่น กระดานดำ กระดานไวท์บอร์ด
        ม้วนกระดาษ กระดานแม่เหล็ก)
    eb_clarinet_body_type:
      name: ประเภทของโครงสร้างของคลาริเน็ตชนิด Eb
      description: ระบุว่าอีแฟลตคลาริเน็ตเป็นประเภทโซปราโนหรืออัลโต
    eco_material_type:
      name: ประเภทวัสดุที่เป็นมิตรต่อสิ่งแวดล้อม
      description: เน้นเทคโนโลยีโฟมหรือวัสดุที่เป็นมิตรต่อสิ่งแวดล้อมที่ใช้ในแผ่นรอง
    edge_construction:
      name: โครงสร้างขอบสกี
      description: ระบุว่าสกีนั้นมีขอบโลหะตลอดความยาวหรือไม่ มีบางส่วน หรือทั้งหมด
        หรือไม่มีเลย
    edge_tuner_type:
      name: ประเภทอุปกรณ์แต่งขอบ
      description: จัดประเภทอุปกรณ์แต่งขอบสกีหรือสโนว์บอร์ด เช่น เครื่องแต่งขอบแบบยึดตะไบเข้าที่
        หรือแบบไฟฟ้า
    edible_plant_part:
      name: ส่วนของพืชที่กินได้
      description: ระบุว่าส่วนใดของพืชที่นำมาจำหน่ายเพื่อการบริโภค
    educational_guide_included:
      name: มีคู่มือการเรียนรู้รวมอยู่ด้วย
      description: ระบุว่ามีสื่อการเรียนรู้ใดบ้างที่รวมอยู่ในแบบจำลองนี้
    educational_topic:
      name: หัวข้อการศึกษา
      description: หัวข้อการเรียนรู้หลักที่สื่อการเรียนรู้สำหรับฟาร์มมดให้การสนับสนุน
    egg_component:
      name: ส่วนประกอบของไข่
      description: ระบุว่าสินค้าประกอบด้วยส่วนใดของไข่ เช่น ไข่ทั้งฟอง เฉพาะไข่ขาว
        ไข่แดง หรือส่วนผสม/สินค้าทดแทนไข่
    egg_component_replaced:
      name: ส่วนประกอบของไข่ที่ถูกแทนที่
      description: ระบุว่าผลิตภัณฑ์นั้นมีไว้ใช้ทดแทนส่วนใดของไข่ (เช่น ไข่ทั้งฟอง
        ไข่ขาว)
    egg_enrichment:
      name: การเสริมสารอาหารในไข่
      description: ระบุการเสริมคุณค่าทางโภชนาการที่เติมลงในไข่ เช่น การเสริมโอเมก้า
        3 หรือวิตามินดี
    egg_farming_method:
      name: วิธีการเลี้ยงไก่ไข่
      description: ระบุวิธีการผลิตหรือเลี้ยงไก่ที่ให้ไข่ (เช่น เลี้ยงแบบไม่ขังในกรง
        เลี้ยงแบบปล่อยอิสระ เลี้ยงแบบเกษตรอินทรีย์)
    egg_grade:
      name: ระดับคุณภาพไข่
      description: ระบุระดับคุณภาพที่หน่วยงานกำกับดูแลหรือหน่วยงานอุตสาหกรรมกำหนด
    egg_processing_state:
      name: สถานะการแปรรูปไข่
      description: ระบุถึงกรรมวิธีการแปรรูปที่ใช้กับไข่ก่อนนำมาจำหน่าย (เช่น ไข่สด
        ไข่เค็ม ไข่เยี่ยวม้า)
    egg_production_method:
      name: วิธีการผลิตไข่
      description: ระบุระบบการเลี้ยงหรือสถานที่เลี้ยงไก่ที่ใช้ผลิตไข่ (เช่น เลี้ยงแบบไม่ขังในกรง
        เลี้ยงในทุ่งหญ้า หรือเลี้ยงแบบออร์แกนิก)
    egg_replacer_main_ingredient:
      name: ส่วนผสมหลักของสารทดแทนไข่
      description: ระบุส่วนผสมหลักที่ใช้ในการผลิตสารทดแทนไข่ เพื่อช่วยผู้ใช้ที่มีข้อจำกัดด้านอาหาร
        หรือเลือกคุณสมบัติเฉพาะในการอบขนมที่ต้องการได้
    egg_size:
      name: ขนาดไข่
      description: จำแนกไข่ตามขนาดมาตรฐานที่จำหน่ายในตลาด
    egg_source_animal:
      name: ประเภทของสัตว์ที่ให้ไข่
      description: ระบุประเภทของสัตว์ที่ให้ไข่
    egg_white_processing_method:
      name: วิธีการแปรรูปไข่ขาว
      description: ระบุวิธีการแปรรูปไข่ขาวหลังจากเก็บรวบรวม (เช่น พาสเจอร์ไรซ์ หรืออบแห้งแบบพ่นฝอย)
        ซึ่งมีผลต่อความปลอดภัยของอาหาร อายุการเก็บรักษา และการใช้งาน
    eggplant_variety:
      name: สายพันธุ์มะเขือยาว
      description: ระบุพันธุ์หรือสายพันธุ์ของมะเขือม่วงที่วางจำหน่ายในท้องตลาด ทำให้ผู้ซื้อสามารถเลือกชนิดที่แตกต่างกันในด้านขนาด
        รสชาติ สี และการนำไปใช้ในการประกอบอาหารได้
    eggshell_color:
      name: สีเปลือกไข่
      description: ระบุสีเปลือกไข่ที่พบเห็นเป็นหลัก
    elastic_edge_finish_type:
      name: ประเภท/รูปแบบการเก็บขอบแบบยางยืด
      description: ระบุโครงสร้างการเก็บขอบยางยืดแบบทอ ซึ่งมีผลต่อความสบายในการสวมใส่และการใช้งาน
    elastic_intended_use:
      name: วัตถุประสงค์การใช้งานของยางยืด
      description: การใช้งานหลักที่ยางยืดถูกออกแบบมาให้ใช้งาน (ช่วยให้ค้นหาสินค้าได้ง่ายและลดการเลือกผิดประเภท)
    elastic_recovery_performance:
      name: ประสิทธิภาพการคืนตัวของยางยืด
      description: อธิบายถึงความสามารถในการคืนตัวสู่ความยาวเดิมหลังจากยืดออกของยางยืดแบบทอ
    elastic_recovery_quality:
      name: คุณภาพการคืนตัวของยางยืด
      description: ระบุความสามารถในการคืนตัวของยางยืดว่าสามารถคืนตัวสู่ความยาวเดิมได้ดีแค่ไหนหลังจากถูกยืดออก
    elastic_stretch_level:
      name: ระดับความยืดหยุ่น
      description: ยางยืดสามารถยืดออกได้มากน้อยแค่ไหนภายใต้แรงดึง (มักแสดงเป็นระดับเปรียบเทียบในกรณีที่ไม่มีการระบุเป็นเปอร์เซ็นต์ที่แน่นอน)
    elastic_structure:
      name: โครงสร้างของยางยืด
      description: ระบุโครงสร้างการผลิตของยางยืดสำหรับทำรังดุม (เช่น แบบถักนิตติ้ง
        แบบทอ แบบถักเปีย) ซึ่งอาจส่งผลต่อการยืด การคืนตัว และประสิทธิภาพในการเย็บ
    elastic_type:
      name: ประเภทของยางยืด
      description: ระบุประเภทโครงสร้างของยางยืด (เช่น ยางยืดแบบพับ (FOE), แบบถักเปีย
        แบบถักนิตติ้ง แบบทอ)
    electric_assist_type:
      name: ประเภทระบบช่วยไฟฟ้า
      description: ระบุว่าจักรยานมีระบบช่วยขับเคลื่อนด้วยมอเตอร์หรือไม่ และเป็นระบบช่วยแบบใด
    electric_bicycle_motor_position:
      name: ตำแหน่งมอเตอร์จักรยานไฟฟ้า
      description: ตำแหน่งมอเตอร์ขับเคลื่อนบนจักรยานไฟฟ้า เช่น มอเตอร์กลาง ดุมล้อหน้า
        ดุมล้อหลัง หรือดุมล้อคู่
    electric_bike_class:
      name: คลาสของจักรยานไฟฟ้า
      description: จัดประเภทจักรยานไฟฟ้าตามคลาสหรือข้อกำหนดทางกฎหมายซึ่งกำหนดขีดจำกัดความเร็ว
        และระบบช่วยผ่อนแรงแบบคันเร่ง
    electric_guitar_bridge_type:
      name: ประเภทของบริดจ์กีตาร์ไฟฟ้า
      description: ระบุประเภทของระบบบริดจ์/ไวเบรโตบนกีตาร์ไฟฟ้า
    electric_instrument_output_connection_type:
      name: ประเภทช่องต่อสัญญาณขาออกของเครื่องดนตรีไฟฟ้า
      description: ระบุช่องต่อสัญญาณเสียงขาออกทางกายภาพที่มีมาให้บนเชลโลไฟฟ้า
    electric_riding_vehicle_control_options:
      name: ตัวเลือกการควบคุมรถยนต์ไฟฟ้า
      description: ตัวเลือกการควบคุม/การใช้งานที่มีให้ผู้ขับขี่/ผู้ปกครอง (เช่น แป้นเหยียบ
        พวงมาลัย หรือการควบคุมจากระยะไกล)
    electric_spinning_wheel_speed_control_type:
      name: ประเภทการควบคุมความเร็วของวงล้อปั่นไฟฟ้า
      description: อธิบายวิธีการที่ผู้ใช้ปรับความเร็วในการหมุนของล้อไฟฟ้า
    electric_ukulele_output_jack_type:
      name: ประเภทช่องต่อสัญญาณเอาต์พุตของอูคูเลเล่ไฟฟ้า
      description: ระบุขั้วต่อเอาต์พุตทางกายภาพที่อูคูเลเล่ไฟฟ้าใช้
    electric_van_body_length_class:
      name: ประเภทความยาวตัวถังรถตู้ไฟฟ้า
      description: การกำหนดขนาดรถตู้โดยใช้ระยะฐานล้อ/ความยาวเป็นหลัก มักใช้ในการลงประกาศขาย
    electric_van_roof_height_class:
      name: ระดับความสูงของหลังคารถตู้ไฟฟ้า
      description: การจัดประเภทความสูงหลังคาที่ใช้ทั่วไปสำหรับรถตู้ (โดยเฉพาะรถตู้บรรทุกสินค้า)
    electric_vehicle_drivetrain_layout:
      name: รูปแบบการวางระบบขับเคลื่อนของรถยนต์ไฟฟ้า
      description: การจัดวางมอเตอร์/เพลา ซึ่งอธิบายจำนวนมอเตอร์และตำแหน่งที่ติดตั้งของมอเตอร์
        (นอกเหนือจากระบุ AWD/FWD/RWD แบบทั่วไป)
    electric_winder_accessories_included:
      name: อุปกรณ์เสริมที่มาพร้อมกับเครื่องพันแบบไฟฟ้า
      description: ระบุอุปกรณ์เสริมที่มาพร้อมกับเครื่องม้วนสายไฟแบบไฟฟ้า (เช่น แคลมป์
        อะแดปเตอร์)
    electrical_connector_type:
      name: ประเภทขั้วต่อไฟฟ้า
      description: ระบุรูปแบบหัวต่อที่ระบบล็อกประตูสำหรับการเชื่อมต่อระบบไฟฟ้า (ถ้ามี)
    electrical_system_voltage:
      name: แรงดันไฟฟ้าของระบบไฟฟ้า
      description: ระบุแรงดันไฟฟ้าปกติของระบบไฟฟ้าในรถยนต์ตามที่ตัวปรับแรงดันไฟได้รับการออกแบบมา
    electronic_cymbal_trigger_zones:
      name: โซนรับสัญญาณของฉาบไฟฟ้า
      description: ระบุจำนวนโซนทริกเกอร์อิสระที่แผ่นฉาบมีให้ (เช่น ส่วนโค้ง/ขอบ/ส่วนกลาง)
    electronic_drum_module_audio_interface_functionality:
      name: ฟังก์ชันอินเทอร์เฟซเสียงของโมดูลกลองไฟฟ้า
      description: ระบุว่าโมดูลนี้สามารถทำหน้าที่เป็นอินเทอร์เฟซเสียง USB สำหรับการบันทึก/เล่น
        (นอกเหนือจาก MIDI) ได้หรือไม่
    electronic_drum_module_metronome_features:
      name: ฟีเจอร์เมโทรโนมของโมดูลกลองไฟฟ้า
      description: ระบุความสามารถในการซ้อม/เมโทรโนมที่ติดตั้งมาในตัว
    electronic_drum_module_power_source:
      name: แหล่งจ่ายไฟของโมดูลกลองไฟฟ้า
      description: ระบุแหล่งจ่ายไฟที่รองรับหรือจำเป็นสำหรับโมดูลควบคุม
    electronic_drum_module_sample_import_support:
      name: ตัวอย่างการนำเข้า Modules กลองอิเล็กทรอนิกส์ ความช่วยเหลือ
      description: ระบุว่าโมดูลสามารถนำเข้าตัวอย่างเสียงของผู้ใช้ได้หรือไม่ และนำเข้าด้วยวิธีการใด
    electronic_drum_pad_playing_surface_type:
      name: ประเภทพื้นผิวของแป้นกลองไฟฟ้า
      description: อธิบายโครงสร้างพื้นผิวการเล่นของแผ่นรองกลองทอม (เช่น หัวตาข่ายเทียบกับหัวยาง)
        ซึ่งส่งผลต่อการเด้งกลับ เสียง และความรู้สึกในการตี
    electronic_features:
      name: คุณลักษณะทางอิเล็กทรอนิกส์
      description: ระบุคุณลักษณะทางอิเล็กทรอนิกส์/แบบอินเทอร์แอคทีฟที่มีมาให้ในของเล่นเกี่ยวกับการธนาคาร
        (ถ้ามี)
    electronic_lights_and_sound:
      name: แสงและเสียงอิเล็กทรอนิกส์
      description: ระบุว่าชุดของเล่นบ้านตุ๊กตามีไฟอิเล็กทรอนิกส์และ/หรือเสียงประกอบหรือไม่
        (เช่น ไฟ เสียงกริ่งประตู เสียงดนตรี เอฟเฟกต์เสียงต่างๆ)
    electronics_power_source:
      name: แหล่งจ่ายไฟอิเล็กทรอนิกส์
      description: ระบุวิธีการจ่ายพลังงานให้กับวงจรอิเล็กทรอนิกส์แบบแอคทีฟ (หากมีใช้งาน)
    eligible_race_series:
      name: ซีรีส์การแข่งขันที่มีสิทธิ์
      description: รายการแข่งขันหรือองค์กรที่กำกับดูแลการแข่งขันที่รถคันนี้ได้รับสิทธิ์เข้าร่วมแข่งขัน
    elliptical_trainer_part_type:
      name: ประเภทชิ้นส่วนเครื่องออกกำลังกายแบบวงรี
      description: จัดหมวดหมู่อุปกรณ์เสริมหรืออะไหล่สำหรับเครื่องออกกำลังกายแบบวงรี
        (เช่น สายพาน คอนโซล แป้นเหยียบ) เพื่อให้ร้านค้าสามารถกรองหารายการที่ต้องการได้อย่างรวดเร็วโดยไม่ต้องค้นหาในหมวดหมู่ย่อยจำนวนมาก
    embellishment_technique:
      name: เทคนิคการตกแต่ง
      description: อธิบายรายละเอียดเกี่ยวกับงานตกแต่งหลักหรือพื้นผิวที่ใช้กับเสื้อผ้า
        เช่น งานปัก งานพิมพ์ลาย หรืองานประดับลูกปัด
    embellishment_type:
      name: ประเภทการประดับตกแต่ง
      description: ระบุประเภทขององค์ประกอบตกแต่งที่ใช้กับสายรัดถุงน่อง เช่น ลูกไม้
        โบว์ หรือไข่มุก
    embossing_pen_ink_color:
      name: สีหมึกปากกาปั๊มลายนูน
      description: ระบุสีของหมึกที่ฝากไว้ด้วยปากกาลายนูน (อาจเป็นสีซีด/ไม่มีรสนิยมที่ดีหรือเม็ดสี)
        แตกต่างจากสีของตัวปากกา/ด้ามปากกา
    embossing_stylus_tip_shape:
      name: รูปทรงปลายหัวปากกาสไตลัสแบบนูน
      description: อธิบายรูปทรงเรขาคณิตของหัวปั๊มลายนูนที่ใช้สร้างเอฟเฟ็กต์ต่างๆ (เช่น
        หัวกลมหรือหัวแหลม)
    embroidered_coverage_level:
      name: ระดับพื้นที่ในการปักลาย
      description: ปริมาณการปักโดยประมาณ ครอบคลุมบนพื้นผิวของป้าย
    embroidered_patch_backing_type:
      name: ประเภทแผ่นรองปัก
      description: ชั้นรองรับ/วัสดุด้านหลังของแพทช์ปักที่ส่งผลต่อความทนทานและวิธีการติดเพื่อใช้งาน
    embroidery_hoop_type:
      name: ประเภทของห่วงปักผ้า
      description: ระบุรูปแบบการสร้างห่วงปักและกลไกหลักที่ใช้ในการขึงผ้าให้ตึง
    embroidery_machine_bobbin_type:
      name: ประเภทกระสวยด้ายของจักรปัก
      description: ประเภท/รูปแบบการบรรจุของระบบกระสวย
    emergency_lighting_configuration:
      name: รูปแบบการจัดวางไฟฉุกเฉิน
      description: ระบุรูปแบบการติดตั้งไฟสัญญาณเตือนภัยฉุกเฉินหลักในรถยนต์ (เช่น แถบไฟบนหลังคา
        ไฟกระจังหน้า)
    emergency_lighting_package:
      name: ชุดไฟฉุกเฉิน
      description: ระบุประเภทของไฟสัญญาณเตือนภัยฉุกเฉินที่ติดตั้งไว้
    emissions_compliance_standard:
      name: มาตรฐานการปฏิบัติตามข้อกำหนดด้านการปล่อยมลพิษ
      description: ระบุใบรับรอง/การปฏิบัติตามมาตรฐานการปล่อยมลพิษของเครื่องยนต์ (หากมี)
    emissions_standard:
      name: มาตรฐานการปล่อยมลพิษ
      description: มาตรฐานการปล่อยมลพิษของรถยนต์ (แตกต่างกันไปตามภูมิภาคและปี)
    enclosure_panel_configuration:
      name: การกำหนดค่าแผงหุ้ม
      description: ระบุแผงกั้นหรือด้านของโครงผ้าใบที่มีมาให้ (รูปแบบความครอบคลุมในการปิดกั้น)
        เช่น ปิดมิดชิดทั้งหมด มีเฉพาะม่านด้านข้าง หรือแบบ 3 ด้าน (เปิดด้านหน้า/ด้านหลัง)
    enclosure_window_material:
      name: วัสดุสำหรับหน้าต่างของโครงผ้าใบ
      description: ระบุวัสดุที่ใช้ทำแผงหน้าต่างแบบใสของโครงผ้าใบครอบ
    end_fitting_type:
      name: ประเภทหัวต่อส่วนปลาย
      description: รูปแบบของหัวต่อที่อยู่ตรงปลายแต่ละด้านของเหล็กค้ำยัน (ด้านตัวรถและด้านฝากระโปรง)
        จะเป็นตัวกำหนดความเข้ากันได้ในการติดตั้ง
    end_type:
      name: ประเภทสุดท้าย
      description: ระบุรูปแบบการยึด/การติดตั้งที่ปลายสายลากจูงสำหรับเชื่อมต่อกับจุดยึดเพื่อการช่วยเหลือ
    ends_style_blocking_wires:
      name: รูปแบบปลายสาย (ลวดกันหลุด)
      description: ลักษณะการตกแต่งปลายของลวดกันหลุด เพื่อความปลอดภัยและช่วยให้ร้อยผ่านขอบเชือกหรือขอบผ้าได้ง่ายขึ้น
    enduro_bike_suspension_adjustability:
      name: ความสามารถในการปรับตั้งระบบกันสะเทือนของรถเอนดูโร
      description: ระบุว่าสามารถปรับตั้งระบบกันสะเทือนแบบใดได้บ้าง (โดยทั่วไปสำหรับโช้คหน้าและโช้คหลัง)
    engine_bay_mounting_location:
      name: แท่นยึดเครื่องยนต์เบย์
      description: ตำแหน่งที่จะติดตั้งถังพักน้ำล้นภายในห้องเครื่อง (ตำแหน่งสัมพัทธ์)
    engine_bearing_coating:
      name: การเคลือบผิวแบริ่งเครื่องยนต์
      description: ระบุการเคลือบผิวใดๆ บนตลับลูกปืน (เพื่อความทนทานต่อการสึกหรอ การฝังตัว
        หรือลดแรงเสียดทาน)
    engine_bearing_position:
      name: ตำแหน่งตลับลูกปืนเครื่องยนต์
      description: ระบุตาราง/Functions ของลูกปืนภายในเครื่องยนต์
    engine_bearing_size:
      name: ขนาดตลับลูกปืนเครื่องยนต์
      description: ระบุว่าตลับลูกปืนเป็นขนาดมาตรฐานหรือขนาดเล็กกว่า/ใหญ่กว่าปกติ (ซึ่งมักเกี่ยวข้องกับการเจียรและการปรับระยะห่างของเพลาข้อเหวี่ยง)
    engine_configuration:
      name: รูปแบบการจัดวางเครื่องยนต์
      description: อธิบายกระบอกสูบของเครื่องยนต์ ไลเอาต์/การกำหนดค่า (เช่น อินไลน์,
        V, แฟลต/บ็อกเซอร์)
    engine_cooling_type:
      name: ประเภทระบบระบายความร้อนของเครื่องยนต์
      description: ระบุวิธีการระบายความร้อนของเครื่องยนต์
    engine_degreaser_form:
      name: รูปแบบน้ำยาขจัดคราบไขมันเครื่องยนต์
      description: รูปแบบทางกายภาพ / รูปแบบการส่งของน้ำยาล้างไขมันในเครื่องยนต์
    engine_degreaser_rinse_requirement:
      name: ข้อกำหนดในการล้างด้วยน้ำยาขจัดคราบไขมันเครื่องยนต์
      description: ระบุว่าต้องล้างน้ำยาขจัดคราบไขมันออกด้วยน้ำสะอาดหลังการใช้งานหรือไม่
    engine_mount_type:
      name: ประเภทของแท่นเครื่องยนต์
      description: ระบุการออกแบบตามลักษณะการทำงานของแท่นเครื่องยนต์ (เช่น แบบไฮดรอลิก
        แบบเหล็กตัน หรือแบบแกนยึดกันสะบัด)
    engine_oil_formulation:
      name: สูตรน้ำมันเครื่อง
      description: ระบุถึงจุดเด่นของสูตรน้ำมันเครื่อง เช่น การใช้งานทั่วไป การดูแลเครื่องยนต์รถระยะทางสูง
        การยืดระยะเวลาการเปลี่ยนถ่ายน้ำมันเครื่อง หรือการใช้งานสำหรับรถบรรทุกขนาดใหญ่/รถใช้งานหนัก
    engine_oil_specification:
      name: ข้อกำหนดน้ำมันเครื่องยนต์
      description: ข้อมูลจำเพาะ/มาตรฐานที่น้ำมันเครื่องผ่านการรับรอง (เช่น API SP,
        API SN Plus, API CK-4, ACEA C3, ILSAC GF-6A)
    engine_rebuild_kit_contents:
      name: อุปกรณ์ในชุดโอเวอร์ฮอลเครื่องยนต์
      description: ระบุชิ้นส่วนหลักที่อยู่ในชุดโอเวอร์ฮอลเครื่องยนต์
    engine_rotation_direction:
      name: ทิศทางการหมุนของเครื่องยนต์
      description: ระบุทิศทางการหมุนของเครื่องยนต์ที่ใช้ในงานทางทะเล
    engine_timing_system_drive_type:
      name: ประเภทระบบขับเคลื่อนชุดไทมิ่งเครื่องยนต์
      description: ระบุว่าระบบไทมิ่งของเครื่องยนต์ขับเคลื่อนด้วยสายพาน โซ่ หรือเฟือง
        เพื่อให้จับคู่กันได้อย่างลงตัว
    engine_valve_coating:
      name: การเคลือบผิววาล์วเครื่องยนต์
      description: ระบุรูปแบบการเคลือบผิวหรือการปรับสภาพพื้นผิวที่ใช้กับวาล์วเพื่อเพิ่มความทนทานต่อการสึกหรอ/ความร้อน
    engine_valve_position:
      name: ตำแหน่งวาล์วเครื่องยนต์
      description: ระบุว่าวาล์วเครื่องยนต์ดังกล่าวออกแบบมาสำหรับใช้เป็นวาล์วฝั่งไอดีหรือฝั่งไอเสีย
    engine_valve_stem_tip_type:
      name: ปลายก้านวาล์วเครื่องยนต์
      description: ระบุรูปแบบหรือโครงสร้างของปลายก้านวาล์วตรงจุดที่ต้องสัมผัสกับกระเดื่องกดวาล์วหรือสลักตั้งวาล์ว
    engine_valvetrain_type:
      name: ประเภทระบบวาล์วของเครื่องยนต์
      description: รูปแบบการจัดวางระบบขับเคลื่อนวาล์ว/เพลาลูกเบี้ยว
    enhancement_level:
      name: ระดับการเสริมประสิทธิภาพ
      description: 'ปริมาตรของหน้าอกที่เพิ่มขึ้นโดยประมาณจากการใช้แผ่นเสริมทรง แสดงเป็น
        ขนาดของคัพ: เล็กน้อย (ไม่เกิน 1 คัพ), ปานกลาง (1-2 คัพ), เห็นได้ชัดเจน (2
        คัพขึ้นไป)'
    entry_zipper_location:
      name: ซิปทางเข้า
      description: ระบุตำแหน่งของซิปหรือช่องเปิดหลักสำหรับสวมใส่ชุด (เช่น ด้านหน้า
        ด้านหลัง หัวไหล่ หรือแนวเฉียง)
    epee_point_type:
      name: ประเภทของปลายดาบเอเป้
      description: ระบุผู้ผลิตหรือมาตรฐานของปลายที่ติดตั้งบนใบดาบ ซึ่งมีผลต่อความเข้ากันได้และการบำรุงรักษา
    equestrian_discipline:
      name: ประเภทกีฬาขี่ม้า
      description: ระบุประเภทของกีฬาขี่ม้าที่เดือยนั้นถูกออกแบบมาให้เหมาะสมหรือตั้งใจนำไปใช้งานมากที่สุด
    equestrian_helmet_safety_certification:
      name: การรับรองความปลอดภัยของหมวกนิรภัยสำหรับขี่ม้า
      description: ระบุมาตรฐานหรือใบรับรองด้านความปลอดภัยที่หมวกนิรภัยนั้นผ่านการรับรอง
    equine_application_area:
      name: พื้นที่การใช้งานสำหรับม้า
      description: ระบุขอบเขตของตัวเครื่องหรือวัสดุที่สินค้ามีไว้สำหรับ (เช่น กีบ
        แผงคอ แทค)
    equipment_contact_material_brew_wine:
      name: วัสดุสัมผัสอุปกรณ์ (เบียร์/ไวน์)
      description: วัสดุหลักของส่วนที่สัมผัสกับของเหลว (เช่น แก้ว สแตนเลส พลาสติก)
    eu_children_clothing_size:
      name: ขนาดของเสื้อผ้าเด็กของสหภาพยุโรป
      description: ระบุขนาดของเสื้อผ้าเด็กในสหภาพยุโรปตามส่วนสูง เช่น 104 หรือ 140
    eu_clothing_size:
      name: EU สิ่งเสื้อผ้า
      description: ระบุขนาดเสื้อผ้าของสหภาพยุโรป เช่น 38 หรือ 46
    eu_cup_size:
      name: ขนาดของคัพในสหภาพยุโรป
      description: ระบุขนาดของคัพบราในสหภาพยุโรป เช่น C หรือ E
    eu_ring_size:
      name: ขนาดของแหวนในสหภาพยุโรป
      description: ระบุขนาดของแหวนในสหภาพยุโรปตามเส้นรอบวง เช่น 52 หรือ 63
    eu_shoe_size:
      name: ขนาดของรองเท้าในสหภาพยุโรป
      description: ระบุขนาดรองเท้ามาตรฐานยุโรป เช่น 42 หรือ 42 แบบหน้ากว้าง
    euphonium_included_accessories:
      name: อุปกรณ์เสริมสำหรับยูโฟเนียม
      description: ระบุอุปกรณ์ที่รวมมาในชุดซึ่งมักมาพร้อมยูโฟเนียม (เช่น เมาท์พีซ
        กล่องใส่เครื่องดนตรี)
    euphonium_valve_configuration:
      name: รูปแบบการจัดวางวาล์วยูโฟเนียม
      description: ระบุจำนวนวาล์ว และระบุว่าวาล์วตัวที่ 4 นั้นควบคุมด้วยมือหรือด้วยกลไกการทำงานด้านข้าง
    european_sword_historical_period:
      name: ยุคประวัติศาสตร์ของดาบยุโรป
      description: ยุคประวัติศาสตร์หลักที่ใช้เป็นต้นแบบของลวดลายดาบ/ดาบจำลอง (หรือยุคของดาบต้นฉบับ)
    european_sword_pattern_type:
      name: รูปแบบ/ประเภทดาบยุโรป
      description: รูปแบบ/ประเภทเฉพาะของดาบยุโรป (ประเภท) ที่แสดงโดยดาบสะสม
    ev_connector_adapter_direction:
      name: ทิศทางของตัวเชื่อมต่อ/อะแดปเตอร์ EV
      description: ระบุว่าอะแดปเตอร์ทำการแปลง "จาก" อะไร "ไปเป็น" อะไร (ด้านช่องเสียบรถยนต์เทียบกับด้านเครื่องชาร์จ/สายชาร์จ)
        เพื่อให้สามารถกรองข้อมูลความเข้ากันได้อย่างถูกต้องแม่นยำ
    ev_conversion_kit_completeness_level:
      name: ระดับความครบถ้วนของชุดแปลงเป็นรถไฟฟ้า
      description: ระบุว่าสินค้าเป็นคอนเนลคอนโซลแบบเต็มหรือสแกนเนอร์/ชุดบางส่วน (เช่น
        มอเตอร์+ผู้ควบคุมเท่านั้น)
    ev_conversion_kit_drivetrain_configuration:
      name: รูปแบบระบบขับเคลื่อนของชุดแปลงรถยนต์ EV
      description: ระบุสถาปัตยกรรมระบบขับเคลื่อนของ EV คอนเนลเก็บข้อมูล รวมถึงตำแหน่งมอเตอร์ที่วาง/ไดรฟ์ไลเอาต์
        และจะรักษาระบบเกียร์ที่มีอยู่หรือไม่
    ev_conversion_kit_voltage_class:
      name: ระดับแรงดันไฟฟ้าของชุดแปลงรถยนต์ EV
      description: ระดับแรงดันไฟฟ้ามาตรฐานของระบบ (กลุ่มข้อมูล) ที่ชุดแปลงรถ EV ถูกออกแบบมาให้รองรับ
        ใช้สำหรับกรองตามระดับแรงดันไฟฟ้ามาตรฐานทั่วไปเพิ่มเติมจากค่าการวัดแรงดันไฟฟ้าแบบละเอียด
    evaporator_core_type:
      name: ประเภทแกนระเหย
      description: ระบุโครงสร้างการออกแบบคอยล์เย็นในระบบปรับอากาศรถยนต์
    evenweave_fabric_finish_treatment:
      name: ผ้าเรียบสม่ำเสมอ/ทรีตเมนต์
      description: ระบุการตกแต่งหรือกระบวนการปรับสภาพที่ทำกับเนื้อผ้าล่วงหน้า ซึ่งส่งผลต่อการใช้งานหรือรูปลักษณ์ของผ้า
    evenweave_fabric_package_format:
      name: รูปแบบบรรจุภัณฑ์ของผ้า Evenweave
      description: วิธีการจำหน่ายผ้า (ขายเป็นชิ้น หรือขายเป็นเมตร/หลา)
    exercise_bike_accessory_part_type:
      name: อุปกรณ์เสริม/ชิ้นส่วนสำหรับจักรยานออกกำลังกาย
      description: อธิบายหน้าที่หลักหรือประเภทชิ้นส่วนของสินค้า (เช่น แป้นเหยียบ สายพานขับเคลื่อน
        ที่วางขวดน้ำ ฝาครอบหน้าจอ ขาจาน)
    exercise_bike_cushion_component:
      name: ส่วนประกอบเบาะรองสำหรับจักรยานออกกำลังกาย
      description: ระบุอุปกรณ์ส่วนเบาะนั่งที่มีให้ เช่น แผ่นรองเบาะ อานนั่ง หรือปลอกหุ้มเบาะ
    exercise_bike_metrics_tracked:
      name: ติดตามจักรยานออกกำลังกายของคุณ
      description: แสดงรายการฟิลด์ข้อมูลการออกกำลังกายที่คอมพิวเตอร์สามารถวัดและแสดงผลได้แบบเรียลไทม์
    exercise_mat_accessories_included:
      name: อุปกรณ์เสริมที่มาพร้อมกับแผ่นรองออกกำลังกาย
      description: ระบุส่วนประกอบเพิ่มเติม Supply พร้อมกับเสื่อ เช่น สายรัดหรือแผ่นรองเข่า
    exhaust_cooling_type:
      name: ประเภทระบบระบายความร้อนท่อไอเสีย
      description: ระบุว่าออกแบบชิ้นส่วนท่อไอเสียมาสำหรับระบบท่อไอเสียแบบเปียก (ระบายความร้อนด้วยน้ำ/ฉีดน้ำ)
        หรือระบบท่อไอเสียแบบแห้ง
    exhaust_installation_position:
      name: ตำแหน่งการติดตั้งท่อไอเสีย
      description: ระบุตำแหน่งบนตัวรถที่ติดตั้งชิ้นส่วนดังกล่าว
    exhaust_outlet_configuration:
      name: รูปแบบปลายท่อไอเสีย
      description: ระบุรูปแบบการจัดวางปลายท่อไอเสียบริเวณด้านหลังของรถยนต์
    expansion_tank_cap_connection_type:
      name: ประเภทของข้อต่อฝาปิดถังพักน้ำ
      description: รูปแบบข้อต่อเชิงกลที่ใช้ในการยึดและปิดผนึกฝาปิดเข้ากับคอถังพักน้ำ
    expansion_tank_cap_pressure_relief_feature:
      name: คุณลักษณะการระบายแรงดันของฝาปิดถังพักน้ำ
      description: ระบุว่าฝาปิดนั้นมีฟังก์ชันการระบายแรงดัน/สุญญากาศหรือไม่ และทำงานอย่างไร
    expansion_tank_cap_seal_material:
      name: วัสดุซีลฝาถังขยายตัว
      description: วัสดุของปะเก็น/ซีลที่สัมผัสกับคอถังขยายตัว
    extension_attachment_method:
      name: วิธีการติดตั้งบาร์เสริม
      description: ระบุวิธีการยึดต่อของบาร์เสริมกับชุดแฮนด์หรือคอแฮนด์ของจักรยาน เพื่อช่วยให้ผู้ใช้งานตรวจสอบความเข้ากันได้กับอุปกรณ์ที่มีอยู่
    extension_bend_type:
      name: ประเภทการดัดโค้งของบาร์เสริม
      description: อธิบายถึงรูปทรงเรขาคณิตหรือส่วนโค้งงอของบาร์เสริมของแฮนด์ ซึ่งส่งผลต่อท่าทางการปั่นตามหลักสรีรศาสตร์และความลู่ลมของผู้ปั่น
    extension_mechanism:
      name: กลไกการเพิ่มพื้นที่
      description: อธิบายวิธีการที่โต๊ะใช้ในการขยายความยาวหรือพื้นที่ผิว (ถ้ามี)
    extension_table_features:
      name: คุณสมบัติของโต๊ะต่อขยาย
      description: เน้นย้ำถึงคุณลักษณะและฟังก์ชันการใช้งานเฉพาะของโต๊ะเพิ่มพื้นที่สำหรับจักรเย็บผ้า
    eyelet_grommet_installation_method:
      name: วิธีการติดตั้งห่วงตาไก่และห่วงแบบมีแหวนรอง
      description: ระบุวิธีการติดตั้ง/ยึดห่วงตาไก่และห่วงแบบมีแหวนรองเข้ากับวัสดุ
    eyewear_lens_shape:
      name: รูปทรงเลนส์แว่นตา
      description: ระบุรูปทรงเรขาคณิตของเลนส์ เช่น ทรงกระบอกหรือทรงกลม ซึ่งส่งผลต่อทัศนวิสัย
        ภาพผิดเพี้ยน และสไตล์
    eyewear_strap_material:
      name: วัสดุที่ใช้ทำสายคล้องแว่นตา
      description: ระบุวัสดุของสายรัดปรับได้ที่ใช้ยึดแว่นตาหรือแว่นกันลมเข้ากับศีรษะของผู้ใช้
    fabric_backing_type:
      name: ประเภทผ้ารองด้านหลัง
      description: ระบุว่าผ้าฝ้ายสำหรับพิมพ์ลายนั้นมีแผ่นรองกระดาษเสริมความคงตัวหรือไม่
        (และเป็นชนิดใด) ซึ่งเป็นตัวกำหนดว่าจะสามารถป้อนผ้าเข้าเครื่องพิมพ์มาตรฐานทั่วไปได้หรือไม่
    fabric_cut_format:
      name: รูปแบบการตัดผ้า
      description: ระบุรูปแบบการตัดหรือรูปแบบชิ้นงานของผ้าแคนวาสสำหรับงานเย็บปักถักร้อย
    fabric_end_use:
      name: วัตถุประสงค์การใช้งานผ้า
      description: ระบุวัตถุประสงค์หลักในการนำผ้าไปใช้งาน (ผ้าชนิดนี้เหมาะที่สุดสำหรับนำไปทำอะไร)
    fabric_finish:
      name: การตกแต่งผิวเนื้อผ้า
      description: การตกแต่งพื้นผิว/ทรีตเมนต์ใช้กับผ้าไหมที่ส่งผลต่อความมันเงา สัมผัสมือ
        และประสิทธิภาพ
    fabric_intended_use:
      name: วัตถุประสงค์การใช้งานของผ้า
      description: ระบุประเภทของการใช้งานหลักที่แนะนำสำหรับผ้าลินิน
    fabric_opacity_level:
      name: ระดับความทึบแสงของผ้า
      description: บ่งบอกถึงความโปร่งแสงของผ้า ซึ่งส่งผลต่อการเลือกใช้ผ้าหลายชั้นและซับใน
    fabric_patch_shape:
      name: Shapesผ้าปะติด
      description: อธิบาย Shapes ของแพตช์ที่รวมอยู่ในไฟล์
    fabric_repair_kit_application_method:
      name: การซ่อมแซมผ้าตามคำขอวิธีการ
      description: ระบุวิธีการซ่อมแซมที่ใช้กับผ้า (เช่น การรีดติด การเย็บติด การใช้กาว)
    fabric_repair_kit_components_included:
      name: ส่วนประกอบที่มีมาให้ในชุดซ่อมแซมผ้า
      description: ระบุรายการชิ้นส่วนที่รวมอยู่ในชุด (เช่น แผ่นแปะ ด้าย เข็ม หรือกาว)
    fabric_repair_kit_intended_use:
      name: วัตถุประสงค์การใช้งานของชุดซ่อมแซมผ้า
      description: ระบุงานซ่อมแซมทั่วไปที่เคสได้รับการออกแบบมา (เช่น การฉีกขาด รู
        การเย็บริม)
    fabric_selling_format:
      name: รูปแบบการขายผ้า
      description: ระบุวิธีการจำหน่ายผ้า (ตัดแบ่งตามความยาวต่อเนื่อง ผ้าชิ้นสำเร็จรูป
        ขายยกม้วน/ยกพับ หรือผ้าตัวอย่าง)
    fabric_stretch_level:
      name: ระดับความยืดหยุ่นของผ้า
      description: อธิบายระดับความยืด/ความยืดหยุ่นของเนื้อผ้า เพื่อช่วยให้นักช้อปสามารถเลือกผ้าที่เหมาะสมสำหรับเสื้อผ้าทรงเข้ารูปหรืองานที่ต้องการเน้นโครงสร้างรูปทรง
    fabric_stretch_type:
      name: ประเภทความยืดหยุ่นของผ้า
      description: แสดงประสิทธิภาพการยืดของผ้ากางเกงใส่เล่นน้ำขาสั้น ซึ่งมีความสำคัญต่อการขยับตัวในขณะโต้คลื่นหรือว่ายน้ำ
    fabric_texture:
      name: เนื้อสัมผัสของผ้า
      description: อธิบายผิวสัมผัสหรือโครงสร้างการถักทอผ้าที่ใช้ทำเสื้ออยู่บ้าน
    fabric_use_case:
      name: การใช้ผ้า
      description: วัตถุประสงค์หลักในการใช้งานผ้าซาตินชิ้น/ม้วน
    fabric_weight_class:
      name: ระดับน้ำหนักผ้า
      description: จัดหมวดหมู่ผ้าสักหลาดตามช่วงน้ำหนักการใช้งานทั่วไป เพื่อช่วยกรองสินค้าในการเลือกซื้อสินค้าโดยไม่ต้องทราบค่า
        GSM/oz ที่แน่นอน
    face_mask_material:
      name: วัสดุสำหรับทำหน้ากากผ้า
      description: ส่วนประกอบของวัสดุที่ใช้ทำหน้ากากป้องกันใบหน้าซึ่งมาพร้อมกับหมวกกันน็อค
        หรือสามารถใช้ร่วมกับหมวกกันน็อคได้
    face_mask_style:
      name: สไตล์ของหน้ากากอนามัย
      description: ระบุรูปทรงโดยรวมหรือรูปแบบโครงสร้างของหน้ากากผ้าแฟชั่น เพื่อช่วยให้นักช้อปเลือกหน้ากากที่พอดีกับใบหน้าและเข้ากับสไตล์ความสวยงามที่ต้องการได้
    face_mask_style_code:
      name: รหัสรูปแบบหน้ากากผ้า
      description: ระบุรูปแบบโครงสร้างของแกนลวด หรือกลุ่มรหัสมาตรฐานอุตสาหกรรมของหน้ากากผ้า
        (เช่น ROPO, OPO, RJOP)
    face_protection_type:
      name: ประเภทอุปกรณ์ปกป้องใบหน้า
      description: ระบุประเภทของอุปกรณ์ปกป้องใบหน้าที่มาพร้อมกับหมวกนิรภัยหรือติดตั้งมาในตัว
        เช่น ตะแกรงหรือกระบังหน้า
    faceplate_security_features:
      name: คุณสมบัติการรักษาความปลอดภัยของแผงหน้าปัด
      description: บันทึกคุณลักษณะการป้องกันการโจรกรรมและการเข้าถึงที่เกี่ยวข้องกับแผ่นหน้ากาก
        นอกเหนือจากการออกแบบพื้นฐาน
    facing_length:
      name: ความยาวด้านหน้า
      description: ระบุความยาวตามแนวขอบปากเป่า (ความยาวด้านโค้ง) ของเมาท์พีซ ซึ่งส่งผลต่อการตอบสนองของเสียงและการเลือกใช้ลิ้นเป่า
    fan_shroud_type:
      name: ประเภทฝาครอบพัดลม
      description: ระบุรูปแบบการครอบคลุม/รูปทรงเรขาคณิตของฝาครอบพัดลม (เช่น แบบเต็ม
        แบบครึ่ง หรือแบบวงแหวน)
    farming_method:
      name: วิธีการทำฟาร์มเลี้ยง
      description: เน้นย้ำถึงแนวทางปฏิบัติเกี่ยวกับสวัสดิภาพสัตว์หรือวิธีการเลี้ยงที่ใช้ในการเลี้ยงสัตว์
        เช่น เลี้ยงแบบปล่อยอิสระ หรือแบบเกษตรอินทรีย์
    farming_practice:
      name: แนวทางการทำเกษตรกรรม
      description: ระบุวิธีการเพาะปลูกหลักที่ใช้สำหรับผลิตภัณฑ์ (เช่น แบบดั้งเดิม
        แบบเกษตรอินทรีย์ แบบไฮโดรโปนิกส์)
    fascinator_style:
      name: สไตล์เครื่องประดับศีรษะ
      description: อธิบายโครงสร้างหรือ Shapes ของเครื่องประดับศีรษะ เพื่อให้ร้านค้าสามารถกรองสินค้าตามสไตล์เครื่องประดับศีรษะยอดนิยมได้อย่างรวดเร็ว
    fastener_grade:
      name: เกรดของตัวยึด
      description: ระบุระดับความแข็งแรง/ชั้นของสลักเกลียว เช่น เกรด 8 หรือ คลาส 10.9
        ซึ่งเป็นตัวกำหนดความสามารถในการรับน้ำหนัก
    fat_rendering_state:
      name: สถานะการแปรสภาพของไขมัน
      description: ระบุว่าไขมันถูกแปรสภาพแล้ว ยังไม่แปรสภาพ หรือแปรสภาพบางส่วน ซึ่งส่งผลต่ออายุการเก็บรักษาและการนำไปใช้ในการปรุงอาหาร
    fat_source:
      name: แหล่งที่มาของไขมัน
      description: ระบุแหล่งที่มาหลักของไขมันที่ใช้ในการผลิตเนย เนยกี หรือมาการีน
        (จากสัตว์หรือพืช) เพื่อช่วยในการคัดกรองข้อมูลสำหรับผู้ที่แพ้อาหารและเลือกรับประทานอาหารตามข้อจำกัดเฉพาะ
    faucet_hole_configuration:
      name: ตำแหน่งการเจาะรูก๊อกน้ำ
      description: แสดงจำนวนและตำแหน่งของรูก๊อกน้ำที่มีการเจาะไว้ล่วงหน้าบนเคาน์เตอร์อ่างล้างหน้า
    feather_application:
      name: รูปแบบการนำขนนกไปใช้งาน
      description: การใช้หรือการประยุกต์ใช้ขนไก่งวงตามวัตถุประสงค์เบื้องต้นสำหรับ
        Craft หรืองานประดิษฐ์
    feather_attachment_format:
      name: การแนบ/รูปแบบของขนนก
      description: วิธีการเตรียม/จำหน่ายขนสังเคราะห์เพื่อการใช้งาน (แบบแยกชิ้น แบบติดบนแผ่นรอง
        แบบติดบนเทป ฯลฯ)
    feather_coloration_style:
      name: สไตล์การทำสีขนนก
      description: อธิบายวิธีการลงสี/การปรากฏของสีบนขน (เช่น สีพื้น สีที่ปลายขน สีไล่ระดับ)
        โดยไม่ขึ้นอยู่กับค่าสีพื้นฐาน
    feather_component:
      name: ส่วนประกอบของขนนก
      description: ระบุว่าส่วนหรือรูปแบบใดของขนหางนกยูงที่กำลังจำหน่าย (เช่น ขนนกยูงส่วนตา
        หรือ ขนเส้นฝอย)
    feather_curvature:
      name: ความโค้งของขนนก
      description: รูปทรงโดยรวม/เส้นแนวความโค้งของขนนก
    feather_finish:
      name: ขนนก
      description: ระบุว่าขนนกกระจอกเทศนั้นเป็นสีธรรมชาติ หรือผ่านกระบวนการปรับสภาพมาแล้ว
        (เช่น การย้อมสีหรือฟอกขาว) เพื่อใช้ในการตกแต่ง
    feather_form:
      name: รูปทรงขนนก
      description: ระบุลักษณะทางกายภาพของชิ้นขนห่านที่จำหน่าย
    feather_grade:
      name: เกรดของขน
      description: คุณภาพโดยรวม/เกรดการคัดเลือกขนนกสำหรับการนำไปใช้ในงานฝีมือหรือการนำไปแสดงโชว์
    feather_part:
      name: ส่วนของขน
      description: ส่วน/โครงสร้างของขนไก่งวงที่จำหน่าย (พบได้ทั่วไปใน Craft and fly-tying
        Supply สำหรับรายการสินค้า)
    feather_processing_type:
      name: ประเภทการแปรรูปขนสัตว์
      description: วิธีการแปรรูป/ปรับสภาพขนนกสำหรับการนำไปใช้ในงานฝีมือ (เช่น การย้อมสี
        การฟอกสี แบบธรรมชาติ/ไม่ย้อมสี)
    feather_product_form:
      name: รูปแบบของผลิตภัณฑ์ขนนก
      description: รูปแบบทางกายภาพหรือลักษณะการตัดแต่งของผลิตภัณฑ์ขนนกที่นำมาจำหน่าย
        (เช่น ขนนกแบบเส้นเดี่ยว หรือผ้าพันคอขนนก หรือแบบชายครุย)
    feather_quantity_unit:
      name: หน่วยนับจำนวนขนนก
      description: กำหนดวิธีการขายผลิตภัณฑ์ (เช่น โดยชิ้น โดยน้ำหนัก โดยพวง) เพื่อช่วยในการเปรียบเทียบที่แม่นยำระหว่างรายการสินค้า
    feather_source:
      name: แหล่งที่มาของขนนก
      description: ระบุแหล่งที่มาของขนสัตว์ที่ใช้ทำลูกแบดมินตัน
    feather_stiffness:
      name: ความแข็งของขนนก
      description: ความแข็ง/ความยืดหยุ่นสัมพัทธ์ของขน/โครงสร้างขน
    feed_mechanism:
      name: กลไกป้อน
      description: ระบุวิธีการป้อนลูกบอลเข้าสู่เครื่องขว้างลูก
    feed_purpose:
      name: วัตถุประสงค์การให้อาหาร
      description: อธิบายถึงเป้าหมายหลักทางโภชนาการหรือการใช้งานของอาหารสัตว์หรืออาหารเสริมนั้นๆ
    feeder_mechanism_type:
      name: ประเภทกลไกการป้อนวัสดุ
      description: ระบุประเภทกลไกการจ่ายอาหารที่เครื่องให้อาหารสัตว์ใช้เพื่อปล่อยอาหารออกมา
    feijoa_cultivar:
      name: สายพันธุ์ฟิโจอา
      description: ระบุสายพันธุ์เฉพาะของผลฟิโจอา เนื่องจากสายพันธุ์ที่ต่างกันจะให้รสชาติ
        ขนาดผล และช่วงเวลาในการเก็บเกี่ยวที่แตกต่างกันออกไป
    felt_duty:
      name: ประเภทความหนาของผิวสักหลาด
      description: ระบุระดับการจำแนกความหนาของผิวสักหลาดของลูกเทนนิส (เช่น หนาพิเศษ
        หนาปกติ) ซึ่งส่งผลต่ออายุการใช้งานของลูกเทนนิสบนสภาพพื้นสนามต่างๆ
    felting_mold_intended_use:
      name: จุดประสงค์การใช้งานแม่พิมพ์ผ้าสักหลาดใยขนแกะ
      description: แม่พิมพ์แบบใดมีไว้เพื่อสร้างหรือนำไปใช้ในงานประดิษฐ์ตุ๊กตาขน
    felting_pad_surface_material:
      name: วัสดุแผ่นรองการประดิษฐ์ตุ๊กตาขน
      description: วัสดุที่ใช้บนพื้นผิวหน้างานของแผ่นรองปักใยขนแกะ ซึ่งเป็นส่วนที่ต้องสัมผัสกับเส้นใย/เข็มโดยตรง
    fencing_certification:
      name: การรับรองด้านกีฬาฟันดาบ
      description: รายชื่อหน่วยงานกำกับดูแลอย่างเป็นทางการของการแข่งขันฟันดาบที่อุปกรณ์ดาบชิ้นนั้นๆ
        ผ่านมาตรฐาน (เช่น FIE, USFA) โดยระบุถึงความถูกต้องตามกฎการแข่งขันและมาตรฐานคุณภาพความปลอดภัย
    fencing_connector_type:
      name: ประเภทตัวเชื่อมต่อรั้ว
      description: ระบุรูปแบบของขั้วต่อที่ใช้ในการเชื่อมต่อสายไฟฟันดาบ เต้ารับ หรือรอกม้วนสายไฟ
        (เช่น 2-pin, 3-pin, แบบเขี้ยวล็อก) เพื่อให้มั่นใจว่าส่วนประกอบต่างๆ สามารถใช้งานร่วมกันได้
    fencing_discipline:
      name: กีฬาฟันดาบ
      description: ระบุประเภทของอุปกรณ์ดาบหรือประเภทกีฬาฟันดาบที่ผลิตภัณฑ์ชิ้นนั้นได้รับการออกแบบมา
        หรือสามารถใช้งานร่วมกันได้
    fencing_weapon_type:
      name: ประเภทอุปกรณ์ดาบ
      description: ระบุประเภทของอุปกรณ์ดาบหรือดาบสำหรับฝึกซ้อมที่อุปกรณ์ช่วยฝึกนั้นรองรับหรือจำลองขึ้นมา
        เพื่อช่วยให้ผู้ใช้งานเลือกซื้ออุปกรณ์ที่เหมาะสมได้ง่ายขึ้น
    fender_finish_state:
      name: สถานะการตกแต่งผิวของบังโคลน
      description: ระบุพื้นผิว Supply /เสร็จสิ้นส่วนใหญ่เป็นสินค้าของบังโคลนสำหรับการทาสีและความพร้อมในการติดตั้ง
    fender_pieces_included:
      name: ชิ้นส่วนบังโคลนที่รวมอยู่ชุด
      description: ชี้แจงรายการส่วนประกอบที่มาพร้อมกับสินค้า เพื่ออธิบายว่าเป็นบังโคลนเดี่ยวหรืออุปกรณ์เสริมครบชุด
    fender_type:
      name: ประเภทบังโคลน
      description: จำแนกประเภทการออกแบบหรือสไตล์โดยรวมของบังโคลน
    fennel_trimming:
      name: ลักษณะการตัดแต่งฟีนเนล
      description: ระบุว่าส่วนใดบ้างที่ยังติดอยู๋หัวฟีนเนลบ้าง (เช่น มีใบติดมาด้วย
        หรือถูกตัดแต่งส่วนยอดและรากออกแล้ว)
    fennel_variety:
      name: สายพันธุ์ฟีนเนล
      description: ระบุพันธุ์หรือกลุ่มสายพันธุ์ของหัวยี่หร่าที่จำหน่าย
    fermentation_application:
      name: รูปแบบกระบวนการหมัก
      description: บ่งบอกอาหารหรือเครื่องดื่มหลักที่เชื้อจุลินทรีย์นั้นถูกออกแบบมาเพื่อใช้หมัก
        (เช่น ชีส โยเกิร์ต นมเคเฟอร์ ขนมปังซาวร์โดว์)
    fermentation_method:
      name: วิธีการหมัก
      description: ระบุวิธีการผลิตหรือหมักซอสถั่วเหลือง (เช่น การหมักบ่มตามธรรมชาติ
        กระบวนการย่อยสลายด้วยสารเคมี)
    fermentation_vessel_material:
      name: วัสดุภาชนะหมัก
      description: วัสดุหลักของถังหมักที่รวมอยู่ในชุดอุปกรณ์ (ถ้ามี)
    ferrule_material:
      name: วัสดุปลอกปลายก้าน
      description: ระบุวัสดุที่ใช้สำหรับปลอกปลายก้าน (เช่น Juma, Phenolic, โพลิคาร์บอเนต,
        XTC หรือไม่มีเลย) ซึ่งส่งผลต่อความทนทานและความรู้สึกในจังหวะที่แทงกระทบเป้า
    fia_homologation_certification:
      name: การรับรองมาตรฐานอย่างเป็นทางการ FIA
      description: ระบุว่ารถยนต์ (หรือห้องโดยสารนิรภัย) ได้รับการรับรอง/อนุมัติหรือไม่
        และเป็นไปตามมาตรฐานใด
    fiber_animal_source_type:
      name: ประเภทสัตว์/แหล่งที่มาของเส้นใย
      description: แหล่งที่มาของเส้นใย (หรือเส้นใยสังเคราะห์) เช่น ขนแกะเมริโน ขนอัลปากา
        หรือเส้นใยจากพืช
    fiber_luster_level:
      name: ระดับความเงางามของเส้นใย
      description: ความเงางามของเส้นใย มีตั้งแต่แบบด้านไปจนถึงเงางามสูง
    fiber_preparation_processing_stage:
      name: ขั้นตอนการเตรียม/แปรรูปเส้นใย
      description: ระบุวิธีการเตรียม/แปรรูปเส้นใยก่อนนำไปใช้ (เช่น เส้นใยแบบธรรมดา
        เทียบกับเส้นใยแบบหวี เส้นใยแบบผสม เส้นใยแบบซักพิเศษ)
    fiber_preparation_type:
      name: ประเภทการเตรียมเส้นใย
      description: ระบุวิธีการเตรียมเส้นใยสำหรับนำไปใช้ในงานฝีมือ (เช่น แผ่นใยสางปูซ้อน
        ใยสางม้วน แผ่นใยอัดกึ่งสำเร็จรูป)
    field_hockey_ball_playing_surface:
      name: พื้นผิวสำหรับการเล่นของลูกฮอกกี้สนาม
      description: ระบุพื้นผิวหรือสภาพแวดล้อมในการเล่นที่ลูกบอลได้รับการออกแบบมาให้ใช้งาน
    field_hockey_ball_type:
      name: ประเภทของลูกฮอกกี้สนาม
      description: จำแนกประเภทลูกฮอกกี้สนามตามวัตถุประสงค์การใช้งานหรือคุณลักษณะพิเศษ
    field_hockey_goal_size_standard:
      name: ขนาดมาตรฐานของประตูฮอกกี้สนาม
      description: จัดหมวดหมู่ของประตูตามมาตรฐานฮอกกี้สนามหรือขนาดสำหรับการฝึกซ้อมทั่วไป
        (เช่น ขนาดมาตรฐานกลางแจ้งของ FIH, ขนาดสำหรับเยาวชน, ขนาดมินิ)
    field_hockey_training_objective:
      name: วัตถุประสงค์การฝึกซ้อมฮอกกี้สนาม
      description: กำหนดทักษะหลักหรือด้านที่ต้องการมุ่งเน้นพัฒนา ซึ่งอุปกรณ์ช่วยซ้อมชิ้นนั้นได้รับการออกแบบมาเพื่อเสริมสร้างทักษะดังกล่าว
    field_point_attachment_method:
      name: รูปแบบการติดตั้งหัวลูกธนูซ้อม
      description: แสดงวิธีการยึดหัวธนูเข้ากับก้านธนูหรือหัวต่อธนู (เช่น แบบขันสกรู
        แบบติดกาว)
    field_point_tip_style:
      name: รูปแบบปลายหัวลูกธนูซ้อม
      description: กำหนดรูปทรงเรขาคณิตหรือลักษณะการใช้งานของปลายหัวไขควง ซึ่งส่งผลต่อการเจาะทะลุ
        แรงดึง และความถูกต้องตามกฎหมาย
    fielding_glove_position:
      name: ตำแหน่งถุงมือรับลูก
      description: ระบุตำแหน่งการป้องกันหรือการใช้งานที่ถุงมือได้รับการออกแบบมาเพื่อใช้ในการเล่นเบสบอลหรือซอฟต์บอล
    fielding_training_focus:
      name: การฝึกซ้อมภาคสนามเน้นที่การรับลูก
      description: ระบุทักษะหลักที่อุปกรณ์ช่วยฝึกนั้นมุ่งเน้นพัฒนาในระหว่างการฝึกซ้อม
    fig_variety:
      name: พันธุ์ลูกฟิก
      description: ระบุสายพันธุ์หรือพันธุ์เฉพาะของลูกฟิกที่จำหน่าย
    figure_8_device_design:
      name: รูปแบบดีไซน์ของอุปกรณ์เลข 8
      description: บ่งบอกการกำหนดค่าเฉพาะของอุปกรณ์รูปที่ 8 ซึ่งมีผลต่อลักษณะขนย้ายและการใช้งานตามที่ต้องการ
    figure_finish_type:
      name: ประเภทการตกแต่งรูป
      description: ระบุลักษณะพื้นผิว/การตกแต่งสีของโมเดลรูปม้า (ลักษณะที่ดู/รู้สึกได้ในฐานะของสะสม)
    figurine_scale:
      name: หุ่นขยายสเกล
      description: ส่วนขยายสเกล/อัตราส่วนของตุ๊กตาที่สัมพันธ์กับของจริงนั้นยังคงบังคับ
        (ถ้ามี) เช่น 1:6
    fill_status:
      name: กรอกสถานะ
      description: ระบุว่าหุ่นซ้อมวางจำหน่ายในสภาพแบบใด เช่น แบบบรรจุไส้ไว้แล้ว ยังไม่บรรจุ
        หรือบรรจุแล้วบางส่วน ซึ่งมีผลต่อค่าจัดส่งและความสะดวกของผู้ซื้อ
    filling_consistency:
      name: ความสม่ำเสมอของไส้ผลิตภัณฑ์
      description: อธิบายลักษณะเนื้อสัมผัสหรือความข้นหนืดของไส้ผลิตภัณฑ์ที่จำหน่าย
        (เช่น ครีมเนียนละเอียด, ผลไม้หั่นชิ้น หรือเนื้อข้น)
    filling_type:
      name: ประเภทการบรรจุ
      description: ระบุไส้หรือครีมหลักที่อยู่ด้านในคุกกี้ หากมี
    filtration_and_mother_status:
      name: การกรองและสถานะของเหลวที่ถูกกรอง
      description: ระบุว่าน้ำส้มสายชูนั้นผ่านการกรอง ไม่ผ่านการกรอง แบบธรรมชาติ หรือมี
        "ตะกอนธรรมชาติ" อยู่หรือไม่ เพื่อตอบโจทย์ผู้บริโภคที่มองหาทางเลือกน้ำส้มสายชูที่มีโปรไบโอติกหรือน้ำส้มสายชูสด
    filtration_method:
      name: วิธีการกรอง
      description: วัสดุหรือเทคนิคที่ใช้ในการกรองและทำให้วอดก้าบริสุทธิ์หลังจากกระบวนการกลั่น
    fin_box_system:
      name: ระบบกล่องฟิน
      description: ระบุประเภทของกล่องใส่ฟินที่ตัวกระดานใช้ ซึ่งจะเป็นตัวกำหนดความเข้ากันได้ในการเลือกซื้อฟินคัสตอมหรือฟินแบรนด์อื่นๆ
        มาเปลี่ยนในภายหลัง
    fin_buoyancy:
      name: แรงลอยตัวของครีบ
      description: ระบุว่าครีบนั้นลอยตัวในน้ำเป็นบวก เป็นกลาง หรือเป็นลบ Impact diver
        trim and gear .
    fin_flex_rating:
      name: ระดับความยืดหยุ่นของครีบ
      description: ระบุระดับความแข็งหรือความยืดหยุ่นสัมพัทธ์ของฟิน ซึ่งส่งผลต่อประสิทธิภาพโดยรวมในการใช้งาน
    fin_mounting_system:
      name: ระบบติดตั้งครีบ
      description: กำหนดอินเทอร์เฟซหรือมาตรฐานการยึดที่ใช้ในการติดตั้งครีบเข้ากับกระดานไคท์บอร์ด
        (เช่น FCS II, แบบขันสกรู, แบบ 4 รู) เพื่อให้มั่นใจได้ว่าครีบและกระดานจะสามารถใช้งานร่วมกันได้
    fin_position:
      name: ตำแหน่งครีบ
      description: ระบุตำแหน่งที่ต้องการติดตั้งฟินบนกระดาน
    fin_strap_type:
      name: ประเภทสายรัดฟิน
      description: ระบุรูปแบบของสายรัดหรือระบบยึดเกาะที่ใช้ยึดฟินกับส้นเท้า/เท้า
    fin_template:
      name: ฟิน ทิชชู่
      description: จำแนกประเภทตามหลักไฮโดรไดนามิกส์หรือรูปทรงของฟินกระดานโต้คลื่น
        ที่ส่งผลต่อรูปแบบการเลี้ยว ความเร็ว และความรู้สึกโดยรวมของกระดาน
    finger_count:
      name: การนับนิ้ว
      description: แสดงจำนวนนิ้วที่ช่องเก็บของหน้ารถ แถบดึง และคันโยกปลดล็อกได้รับการออกแบบมาให้รองรับ
    finger_coverage:
      name: การปกคลุมนิ้วมือ
      description: ระบุว่านิ้วมือถูกปกคลุมมากน้อยแค่ไหน
    finger_grip_adjustability:
      name: ความสามารถในการปรับการจับนิ้ว
      description: ระบุวิธีการยึดหรือปรับที่จับนิ้วเพื่อให้พอดีกับขนาดมือที่แตกต่างกัน
    finger_hole_configuration:
      name: รูปทรงรูนิ้ว
      description: ระบุทิศทางการใส่นิ้วตามรูสำหรับสอดนิ้ว (สำหรับคนถนัดขวา คนถนัดซ้าย
        หรือใช้ทั้งสองมือ)
    finger_hole_count:
      name: จำนวนรูนิ้ว
      description: ระบุจำนวนรูนิ้วบนหนังที่ใช้ทำด้ามจับ ซึ่งเป็นความแตกต่างที่สำคัญระหว่างรุ่นที่ไม่มีรูนิ้ว
        รุ่น 2 รู รุ่น 3 รู และรุ่น 4 รู
    finger_pick_band_style:
      name: สไตล์สายคาดปิ๊กสวมนิ้ว
      description: รูปแบบของสายรัด/ห่วงที่ติดกับนิ้ว มีผลต่อความสบายและการปรับขนาดได้
    finger_pick_blade_length:
      name: ความยาวของส่วนปลายปิ๊ก
      description: ความยาวของปลายที่ยื่นออกมาจากสายคาดนิ้ว
    finger_pick_blade_shape:
      name: รูปทรงของปิ๊กสวมนิ้ว
      description: รูปทรง/โครงร่างของพื้นผิวของปิ๊กสวมนิ้ว (ส่วนปลาย) ที่สัมผัสกับสาย
    finger_pick_size:
      name: ขนาดนิ้วจิ้ม
      description: การปรับขนาดของสายคาด/ห่วงของปิ๊กสวมนิ้วให้พอดีกับขนาดเส้นรอบวงของนิ้วหรือนิ้วโป้งที่แตกต่างกัน
        (ไม่ใช่ขนาดของเครื่องดนตรี)
    finger_pick_wear_location:
      name: ตำแหน่งการสวมปิ๊กสวมนิ้ว
      description: ระบุว่าควรใช้ปิ๊กสวมนิ้วกับนิ้วใด หรือว่าเป็นปิ๊กสวมนิ้วแบบใช้กับนิ้วโป้งและนิ้วอื่นๆ
        ได้
    finger_protection:
      name: การป้องกันนิ้วมือ
      description: ระบุว่าถุงมือมีส่วนป้องกันปลายนิ้วหรือไม่ และส่วนป้องกันนั้นสามารถถอดออกได้หรือไม่
    fingerboard_bearing_type:
      name: ประเภทลูกปืนสำหรับฟิงเกอร์บอร์ด
      description: ระบุประเภทของตลับลูกปืนที่ใช้ในล้อของฟิงเกอร์บอร์ด
    fingerboard_grip_type:
      name: ประเภทการจับฟิงเกอร์บอร์ด
      description: ระบุวัสดุ/ประเภทพื้นผิวที่ใช้สำหรับจับยึดบนแผ่นสเก็ตบอร์ดนิ้ว
    fining_agent_active_ingredient:
      name: สารตกตะกอนที่ออกฤทธิ์
      description: สารตกตะกอนหรือช่วยให้ใสที่ใช้ในสินค้า
    fining_agent_type:
      name: ประเภทสารตกตะกอน
      description: ระบุสารเคมีในการปรับ/ทำให้ใส หรือวัสดุสำหรับผลิตภัณฑ์ที่ให้ความกระจ่างในไวน์สีแดง
    finish_after_baking:
      name: เสร็จสิ้นหลังจากอบเสร็จ
      description: อธิบายลักษณะพื้นผิวโดยทั่วไปหลังจากผ่านกระบวนการอบแห้ง/อบ
    finish_effect:
      name: เอฟเฟกต์การตกแต่ง
      description: อธิบายเทคนิคพิเศษในการตกแต่งพื้นผิว/คุณสมบัติทางแสงของเพชรเทียม
    finish_type:
      name: ประเภทการตกแต่ง
      description: ตกแต่งพื้นผิวให้กับอูคูเลเล่
    finished_product_format:
      name: รูปแบบสินค้าสำเร็จรูป
      description: ระบุชนิดของน้ำหอมที่ชุดอุปกรณ์นี้ทำ
    fire_pit_accessories_included:
      name: รวมอุปกรณ์เสริมสำหรับเตาผิง
      description: ระบุอุปกรณ์เสริมที่สำคัญ Supply พร้อมกับเตาผิง เช่น ตะแกรง Spark
        หรือหินลาวา เพื่อให้เข้าใจชัดเจนว่ามีอะไรอยู่ในกล่องบ้าง
    firework_assortment_launch_type:
      name: ประเภท Launch และดอกไม้ไฟ
      description: อธิบายวิธีการโดยทั่วไปในการจุดหรือปล่อยดอกไม้ไฟที่รวมอยู่
    firework_assortment_types_included:
      name: ประเภทของดอกไม้ไฟคละแบบที่รวมอยู่
      description: ระบุประเภทพลุหลักที่รวมอยู่ในชุดสินค้าเพื่อช่วยนักช้อปเปรียบเทียบของในชุดนั้น
        (เช่น พลุแบบน้ำพุ, ดอกไม้ไฟทรงกระบอก, ประทัด)
    firework_effect_types:
      name: ประเภทของเอฟเฟกต์ดอกไม้ไฟ
      description: กลุ่มเอฟเฟกต์หลักด้านภาพและ/หรือประสาทสัมผัสหลักที่เกิดจากชุดสินค้า
        (เลือกทั้งหมดที่เกี่ยวข้อง)
    firework_ignition_method:
      name: วิธีการจุดพลุ
      description: ระบุวิธีการจุดหรือจุดชนวนดอกไม้ไฟ (เช่น ฟิวส์ หรือไม้ขีดไฟไฟฟ้า)
    firework_visual_intensity_level:
      name: ระดับความเข้มข้นด้านภาพของดอกไม้ไฟ
      description: ความเข้มข้น/ปริมาณด้านภาพโดยรวมของประกาายไฟสำหรับเอฟเฟกต์น้ำพุ
    firing_mode:
      name: Modeการยิง
      description: แสดงรายการโหมดการยิงหลักหรือที่เลือกได้ที่ปืนแอร์ซอฟต์รองรับ
    first_day_cover_cachet_type:
      name: ประเภทของตราประทับบนซองวันแรกจำหน่าย
      description: ประเภทของตราประทับบนซองจดหมายวันแรก (เช่น พิมพ์, วาดด้วยมือ)
    first_day_cover_cancellation_type:
      name: ประเภทการประทับตราวันแรกจำหน่าย
      description: ประเภท/รูปแบบของประทับตราทางไปรษณีย์ที่ใช้กับวันแรก (เช่น การประทับตราด้วยเครื่องจักร
        การประทับตราด้วยมือ)
    first_day_cover_set_type:
      name: ซองวันแรกจำหน่าย
      description: ระบุว่าซองนั้นเป็นตราประทับเดี่ยว ครบชุด หรือชุดย่อย/ผสมกัน
    fishing_hook_size:
      name: ขนาดของตะขอตกปลา
      description: 'ระบุการกำหนดขนาดมาตรฐานของเบ็ดตกปลา (เช่น #4, 1/0, 10/0) ช่วยให้นักตกปลาจับคู่ข้อมูลตะขอเพื่อกำหนดเป้าหมายสายพันธุ์และเหยื่อ'
    fishing_hook_style:
      name: รูปแบบของเบ็ดตกปลา
      description: ระบุการออกแบบเฉพาะหรือรูปแบบการโค้งงอของตะขอเดี่ยว ซึ่งส่งผลต่อการนำเสนอ
        ประสิทธิภาพในการขอตะขอ และแอปพลิเคชันที่ต้องการ
    fishing_hook_type:
      name: ประเภทของเบ็ดตกปลา
      description: อธิบายลักษณะของตะขอที่มาพร้อมกับกับเหยื่อแบบ Spoon (ถ้ามี)
    fishing_line_application:
      name: การใช้สายเบ็ด
      description: ระบุวัตถุประสงค์การใช้งานของสายเบ็ดหรือวัสดุที่ใช้ทำสายหน้า (เช่น
        สายหน้า สายหลัก สายปลาย)
    fishing_line_buoyancy_type:
      name: สายเบ็ดแบบลอยน้ำ
      description: จำแนกลักษณะของสายเบ็ดเมื่ออยู่น้ำ ระยะ (เช่น ลอยตัว กึ่งจม จม)
        เพื่อช่วยให้นักตกปลาเลือกความลึกที่เหมาะสมสำหรับการตกปลาได้
    fishing_needle_purpose:
      name: วัตถุประสงค์ของเข็มตกปลา
      description: ระบุแอปพลิเคชันหลักของเข็มในงานอุปกรณ์ตกปลา
    fishing_needle_types_included:
      name: มีเข็มตกปลาประเภทต่างๆ รวมอยู่ด้วย
      description: แสดงลักษณะรูปแบบเข็มหรือเครื่องมือยึดนั้นๆ ที่อยู่ในชุดเพื่อให้สามารถดูเนื้อหาได้อย่างรวดเร็ว
    fit_profile:
      name: พอดีกับรูปทรง
      description: อธิบายรูปทรงและลักษณะโดยรวมของแผ่นซับ ซึ่งส่งผลต่อความคล่องตัวและการปกปิด
    fit_volume_classification:
      name: พอดีกับการจำแนกปริมาตร
      description: จัดหมวดหมู่ปริมาตรภายในโดยรวมของรองเท้าบู๊ตตามที่แบรนด์ทำการตลาด
        (เช่น LV สำหรับปริมาตรต่ำ)
    fitting_angle:
      name: มุมที่เหมาะสม
      description: ระบุองศาการโค้งงอของตัวข้อต่อ (เช่น ตรง, 45°, 90°) ใช้ตัวเลือก
        “ปรับได้ / หมุนได้” สำหรับอุปกรณ์ที่มีมุมแปรผัน และ “อื่นๆ” สำหรับมุมที่ไม่ปกติ
    flag_base_type:
      name: ประเภทฐานธง
      description: กำหนดรูปแบบการยึดหรือฐานที่ใช้เพื่อยึดธงมุมสนามบนพื้นสนามที่แตกต่างกัน
    flag_design_theme:
      name: ธีมการออกแบบธง
      description: อธิบายธีมการออกแบบหลักที่ปรากฏบนธง (เช่น ประเทศ/ชาติ ทีมกีฬา วันหยุด)
        เพื่อสนับสนุนการค้นหาและการกรองสำหรับการช้อปปิ้งตามความตั้งใจ
    flag_mounting_method:
      name: วิธีการติดตั้งธง
      description: ระบุวิธีการติดตั้งธงกับตัวรถ (เช่น ติดตั้งกับเสาอากาศ ติดตั้งกับขอเกี่ยว
        หรือติดตั้งด้วยแม่เหล็ก)
    flag_type:
      name: ประเภทธง
      description: จำแนกวัตถุประสงค์หรือลักษณะเฉพาะของธงกอล์ฟ เช่น ธงพิน ธงสำหรับรถกอล์ฟ
        หรือธงฝึกซ้อม
    flame_resistance_standard:
      name: มาตรฐานความทนไฟ
      description: ระบุมาตรฐาน/การรับรองด้านความทนไฟหรือความทนประกายไฟที่เสื้อผ้าชิ้นนั้นผ่านมาตรฐาน
    flamenco_cajon_snare_system:
      name: ระบบกลองสแนร์คาฮอนฟลาเมงโก
      description: ระบุกลไกสแนร์ภายในที่ใช้สร้างเสียงหึ่งอันเป็นเอกลักษณ์ของดนตรีฟลาเมงโก
        (หรือไม่มีเลย)
    flammability_compliance:
      name: การปฏิบัติตามข้อกำหนดด้านความไวไฟ
      description: ระบุมาตรฐานความทนไฟที่เกี่ยวข้องซึ่งผ้าชนิดนี้ตรงตามข้อกำหนดสำหรับการตกแต่งภายในรถยนต์
    flannel_brushing_finish:
      name: ผิวสัมผัสแบบผ้าสักหลาดที่ผ่านการแปรง
      description: ระบุว่าผ้าสักหลาดนั้นผ่านการแปรงหรือไม่ และแปรงด้านใดบ้าง ซึ่งจะส่งผลต่อความนุ่ม
        ความอบอุ่น และรูปลักษณ์
    flannel_use_type:
      name: ประเภทการใช้งานผ้าแฟลนเนล
      description: แอปพลิเคชันหลักสำหรับการตัด/สลักเกลียวผ้าสักหลาด
    flap_configuration:
      name: รูปแบบของปีกอาน
      description: ระบุรูปแบบของแผ่นรองอาน เช่น แผ่นรองอานเดี่ยว หรือ แผ่นรองอานคู่
    flare_color:
      name: สีแฟลร์
      description: สีของแสง/เปลวไฟที่เปล่งออกมา (หรือสีของเลนส์สำหรับแฟลร์ LED)
    flash_card_included_features:
      name: ฟีเจอร์แฟลชรวมอยู่ด้วย
      description: ไฮไลต์คุณสมบัติการเรียนรู้/การใช้งานเชิงฟังก์ชันที่รวมอยู่ในแฟลชการ์ด
    flavor_intensity:
      name: ความเข้มข้นของรสชาติ
      description: ระบุระดับความเข้มข้นของผลิตภัณฑ์ปรุงแต่งรส เพื่อช่วยให้ผู้ใช้สามารถกำหนดปริมาณที่เหมาะสมได้
        (เช่น ความเข้มข้นมาตรฐาน ความเข้มข้นสูง)
    flavor_solvent_base:
      name: ตัวทำละลายแต่งกลิ่นรส
      description: ระบุสารปรุงแต่งรสหรือตัวทำละลายหลักที่ใช้ในการปรุงแต่งรส (เช่น
        แอลกอฮอล์ โพรพิลีนไกลคอล กลีเซอรีน)
    fleece_fiber_animal_type:
      name: ประเภทเส้นใยขนแกะ
      description: แหล่งที่มาของเส้นใยขนแกะจากสัตว์ (สายพันธุ์)
    fleece_finish_surface:
      name: พื้นผิว/ผิวสัมผัสแบบขนแกะ
      description: อธิบายพื้นผิว/การตกแต่งของผ้าฟลีซ (เช่น กันขนขึ้นขุย, ปัดขนแล้ว)
        ซึ่งส่งผลต่อประสิทธิภาพการขึ้นขุย ความนุ่มนวล และความสวยงาม
    fleece_preparation_method:
      name: วิธีการเตรียมขนแกะ
      description: ขั้นตอนการเตรียม/แปรรูปขนแกะสำหรับการคราฟต์และการปั่น (สถานะของเส้นใย)
    flesh_color:
      name: สีเนื้อ
      description: ระบุสีเนื้อด้านในของเมลอน
    fletching_orientation:
      name: ทิศทางการติดขนลูกศร
      description: ระบุวิธีการติดตั้งปีกธนูบนก้านธนู (เช่น ตรง เอียง หรือเป็นเกลียว)
        ซึ่งส่งผลต่อการหมุนและการพุ่งของลูกธนู
    fletching_profile:
      name: ลักษณะการติดปีกธนู
      description: กำหนดรูปทรงเรขาคณิตหรือการตัดของปีกธนู ซึ่งส่งผลต่อแรงต้าน ระยะห่าง
        เสียง และลักษณะการบินโดยรวมของลูกธนู
    flight_system_type:
      name: ประเภทระบบการพุ่ง
      description: ระบุรูปแบบการพุ่งตัว โดยแยกแยะระหว่างระบบพับได้ ระบบขึ้นรูป และระบบปีกและแกนหมุนแบบรวมเป็นชิ้นเดียว
    float_attachment_method:
      name: วิธีการติดทุ่น
      description: อธิบายวิธีการติดทุ่นเข้ากับสายเบ็ด (เช่น แบบเลื่อนได้หรือแบบยึดติด)
        ซึ่งช่วยให้นักตกปลาสามารถกรองตามรูปแบบการผูกสายเบ็ดได้
    float_design:
      name: ดีไซน์ลอยน้ำ
      description: จำแนกประเภทหรือรูปแบบโดยรวมของทุ่นตกปลา (เช่น ทุ่นลอย, ทุ่นถ่วงน้ำหนัก,
        ทุ่นทรงดินสอ) เพื่อให้นักตกปลาสามารถเลือกแบบที่เหมาะสมกับเทคนิคและปลาของตนได้อย่างรวดเร็ว
    float_raft_use_environment:
      name: สภาพแวดล้อมการใช้งานแพ/ทุ่นลอยน้ำ
      description: ลักษณะหลักของน้ำสำหรับอุปกรณ์เป่าลม (สระน้ำ หรือทะเลเปิดน้ำนิ่ง
        หรือโต้คลื่น) ซึ่งสะท้อนถึงความทนทานและความคาดหวังในการออกแบบ
    floatation:
      name: การลอยตัว
      description: สัญญาณไฟถูกออกแบบมาให้ลอยน้ำหรือไม่
    floor_construction_type:
      name: ประเภทโครงสร้างพื้น
      description: ระบุการออกแบบพื้นแพ (เช่น การประกันตัวเอง การเย็บแบบ Drop ) ซึ่งส่งผลต่อการระบายน้ำ
        ความแข็งแกร่ง และประสิทธิภาพ
    floor_design:
      name: การออกแบบพื้น
      description: ชนิดของวัสดุปูพื้นที่มาพร้อมกับรั้วกั้น
    floor_inclusion:
      name: การรวมพื้น
      description: ระบุว่าห้องโถงทางเข้ามีพื้นหรือไม่ และพื้นนั้นสามารถถอดออกได้หรือไม่
    floor_mat_cleaning_method:
      name: วิธีการทำความสะอาดพรมปูพื้น
      description: ระบุวิธีการทำความสะอาดหลักที่ผู้ผลิตแนะนำสำหรับพรมปูพื้น
    floor_mat_edge_style:
      name: รูปแบบขอบพรมปูพื้น
      description: อธิบายว่าแผ่นรองมีขอบยกสูง/สันนูนเพื่อป้องกันการหกหรือเศษสิ่งสกปรกหรือไม่
    floor_mat_format:
      name: รูปแบบพรมปูพื้น
      description: กำหนดรูปแบบทางกายภาพหรือลักษณะของผลิตภัณฑ์ป้องกันพื้น (เช่น เสื่อเดี่ยว
        กระเบื้องแบบล็อกเข้าด้วยกัน เสื่อม้วน)
    floor_mat_retention_system:
      name: ระบบล็อกพรมปูพื้น
      description: ระบุวิธีการยึดเสื่อให้อยู่กับที่
    floor_mat_set_configuration:
      name: การกำหนดค่าชุดพรมปูพื้น
      description: ระบุว่าตำแหน่งใดบ้างที่รวมอยู่ในแพ็คเกจ (เช่น ด้านหน้า เฉพาะ, ชุดครบเซ็ต)
    floss_sugar_granulation_grade:
      name: ระดับความละเอียดของน้ำตาลสำหรับทำสายไหม
      description: อธิบายขนาดผลึกของน้ำตาลผสม (ละเอียด ปานกลาง หยาบ) ซึ่งอาจส่งผลต่อประสิทธิภาพการทำงานของเครื่องและเนื้อสัมผัสสุดท้าย
    floss_sugar_product_form:
      name: รูปแบบสินค้าน้ำตาลสำหรับทำสายไหม
      description: แสดงว่าสายไหมพร้อมใช้งานเลยหรือไม่ หัวเชื้อแต่งกลิ่นต้องผสมกับน้ำตาลทรายขาวหรือน้ำตาลทรายขาวที่ไม่แต่งสี
    flour_grind_texture:
      name: เนื้อสัมผัสของแป้งบด
      description: ระบุขนาดของการบดหรือเนื้อสัมผัสของแป้ง เช่น ละเอียดมาก ปานกลาง
        หยาบ หรือบดด้วยหิน ซึ่งอาจส่งผลต่อประสิทธิภาพของสูตรอาหาร
    flour_processing_method:
      name: วิธีการแปรรูปแป้ง
      description: บันทึกกระบวนการแปรรูปหรือวิธีการต่างๆ ที่สำคัญที่ใช้กับแป้ง (เช่น
        การบดด้วยหิน การฟอกแป้ง แป้งจากต้นอ่อน การเสริมคุณค่า) ที่ส่งผลต่อรสชาติ สี
        หรือคุณค่าทางโภชนาการ
    flower_care_instructions:
      name: คำแนะนำในการดูแลดอกไม้
      description: ให้คำแนะนำขั้นตอนการดูแลรักษาดอกไม้ที่เพิ่งตัดโดยเฉพาะ (เช่น การตัดแต่งก้าน
        ความถี่ในการเปลี่ยนน้ำ)
    flugelhorn_leadpipe_material:
      name: วัสดุท่อนำของฟลูเกลฮอร์น
      description: วัสดุของส่วนประกอบท่อลม (หากระบุแยกต่างหากจากวัสดุของเครื่องดนตรีโดยรวม)
    flugelhorn_trigger_type:
      name: ประเภทกลไกที่ช่วยปรับความยาวท่อจูนเสียง
      description: ระบุว่าฟลูเกลฮอร์นมีตัวปรับจูนหรือไม่ และสไลด์/วาล์วใดทำหน้าที่ปรับจูน
    fluorescence_grade:
      name: เกรดการเรืองแสง
      description: แสดงความเข้มของการเรืองแสงของเพชรเมื่อสัมผัสกับแสงยูวี
    fluorescence_under_uv:
      name: การเรืองแสงภายใต้รังสียูวี
      description: ระบุว่าตัวอย่างนั้นแสดงการเรืองแสงภายใต้แสงอัลตราไวโอเลตหรือไม่
        และเป็นแบบใด
    fluorocarbon_content:
      name: สารประกอบฟลูออโรคาร์บอน
      description: ระบุว่าแว็กซ์นั้นมีสารเติมแต่งฟลูออโรคาร์บอนหรือไม่ และมีปริมาณเท่าใด
    flute_case_capacity:
      name: ความจุกล่องใส่ฟลุต
      description: ระบุว่าฝาครอบนี้ออกแบบมาเพื่อบรรจุอะไร Beyond ตัวฟลุตหลัก (เช่น
        ฟลุต + ปิคโคโล, หัวฟลุตเสริม)
    flute_cleaning_rod_tip_type:
      name: ประเภทปลายก้านทำความสะอาดฟลุต
      description: อธิบายลักษณะการออกแบบของปลายก้านที่ยึดผ้า/สำลี หรือสัมผัสกับเครื่องมือ
        (เช่น แบบร่อง แบบเกลียว แบบรูห่วง)
    flute_footjoint_type:
      name: ฟลุตชนิดข้อต่อปลาย
      description: ระบุรูปแบบการติดตั้งข้อต่อปลายฟลุต
    flute_headjoint_cork_type:
      name: ประเภทหัวจุกของฟลุต
      description: ระบุวัสดุ/ประเภทของชุดจุก/ตัวปิดหัวก๊อก ที่มาพร้อมกับหัวก๊อก
    flute_key_system:
      name: ระบบคีย์ของฟลุต
      description: บ่งบอกระบบกลไก/คีย์ที่ใช้โดยฟลุต (เช่น ระบบโบห์ม) หากจำเป็น
    flute_keywork_material:
      name: วัสดุที่ใช้ทำกลไกคีย์ฟลุต
      description: วัสดุและ/หรือการชุบปุ่มกด (กลไกปุ่มกด) เมื่อระบุแยกต่างหากจากวัสดุของตัวเรือน
    flute_offset_g:
      name: คีย์ตัว G ของฟลุตยื่นเอียงออกมาด้านหน้า
      description: ระบุว่าฟลุตมีคีย์ออฟเซ็ต G เลย์เอาต์หรือไม่
    flute_wall_thickness:
      name: ความหนาของผนังฟลุต
      description: ประเภทความหนาของผนังท่อฟลูต (ผนังบาง, ผนังมาตรฐาน, ผนังหนา)
    fly_pattern_type:
      name: ประเภทของเหยื่อปลอม
      description: จัดประเภทเหยื่อปลอมตามสไตล์การตกปลาหรือการเลียนแบบแมลง/เหยื่อ เพื่อช่วยให้นักตกปลาเลือกเหยื่อที่เหมาะสมได้อย่างรวดเร็ว
    fly_rod_style:
      name: สไตล์คันเบ็ดฟลาย
      description: จำแนกประเภทคันเบ็ดตามลักษณะการใช้งานหรือการตีเหยื่อที่ตั้งใจไว้
        (เช่น คันเบ็ดมือเดียว, คันเบ็ดสลับมือ, คันเบ็ดสองมือ)
    fly_style:
      name: รูปแบบซิป
      description: ระบุประเภทของซิปหรือช่องเปิดด้านหน้าของกางเกงขาลองจอน
    fly_tying_tools_included:
      name: มีอุปกรณ์ผูกเหยื่อปลอมรวมอยู่ด้วย
      description: ระบุรายการเครื่องมือผูกเหยื่อปลอมที่ให้มาในชุด เพื่อให้นักช้อปทราบว่ามีอะไรบ้างและสามารถเปรียบเทียบกับชุดอื่นๆ
        ได้
    fly_type:
      name: ประเภทซิป
      description: ระบุว่ากางเกงลองจอห์นมีซิปแบบใช้งานได้จริงหรือไม่ และซิปนั้นมีรูปแบบใด
    flyer_hook_mounting_method:
      name: วิธีการติดตั้งขอเกี่ยวฟลายเออร์
      description: วิธีการยึดตะขอเข้ากับฟลายเออร์ (เช่น แบบขันสกรูหรือแบบกดให้ลงล็อก)
        ซึ่งส่งผลต่อความสามารถในการติดตั้งและความเข้ากันได้
    flyer_hook_orientation:
      name: การวางแนวตะขอเกี่ยวเครื่องปั่นด้าย
      description: ตะขอออกแบบมาสำหรับด้านซ้ายหรือด้านขวาของฟลายเออร์ หรือสามารถใช้ได้ทั้งสองด้าน/ใช้ได้กับทุกด้านหรือไม่
    flyer_kit_finish_coating:
      name: การเคลือบ/พื้นผิวชุดฟลายเออร์
      description: พื้นผิวที่ใช้กับส่วนประกอบของชุดฟลายเออร์
    flyer_kit_included_components:
      name: ชุดฟลายเออร์รวมถึงส่วนประกอบต่างๆ
      description: ระบุว่าส่วนใดบ้างที่รวมอยู่ในการบันทึก
    flyer_orifice_type:
      name: ประเภทรูของฟลายเออร์
      description: ระบุรูปแบบของรูที่ใช้บนใบปลิว
    flying_disc_feature_set:
      name: ชุดคุณสมบัติจานบิน
      description: คุณสมบัติการใช้งานที่สำคัญของจานร่อน
    flysheet_material:
      name: วัสดุผ้าคลุมกันแมลง
      description: ระบุชนิดของผ้าหลักที่ใช้สำหรับผ้าคลุมเต็นท์ชั้นนอก/แผ่นกันฝน น้ำหนัก
        Impact ความทนทาน และความสามารถในการทนต่อสภาพอากาศ
    flywheel_balance_type:
      name: ประเภทการถ่วงมู่เล่
      description: บ่งชี้ว่ามู่เล่เป็นกลางยังคงเหลืออยู่หรือใช้น้ำหนักที่ไม่สมดุลภายนอก
    foam_blocks_size_class:
      name: ขนาดของบล็อกโฟม
      description: ระบุขนาดโดยทั่วไปของบล็อกในชุดนั้น
    foam_blocks_surface_texture:
      name: พื้นผิวของบล็อกโฟมมีลักษณะเฉพาะ
      description: อธิบายลักษณะผิวสัมผัส/ผิวสัมผัสภายนอกของบล็อกโฟม
    foam_surface_effect:
      name: เอฟเฟกต์พื้นผิวโฟม
      description: อธิบายถึงเทคนิคการตกแต่งพื้นผิวทั่วไปที่ใช้กับโฟม Craft หรือโฟมสไตรอฟอร์ม
        เช่น การเคลือบด้วยกลิตเตอร์ โลหะ หรือโฮโลแกรม
    foil_color:
      name: สีฟอยล์
      description: ระบุสีเน้นฟอยล์ที่ใช้ในใบรับรอง (ถ้ามี)
    foil_curtain_mounting_method:
      name: วิธีการติดตั้งม่านฟอยล์
      description: วิธีการติดตั้งหรือแขวนม่านฟอยล์ (เช่น แถบกาว ห่วงโลหะ)
    foil_discipline:
      name: ประเภทฟอยล์
      description: บ่งบอกรูปแบบหรือกฎเกณฑ์ในการเล่นที่ออกแบบมาสำหรับฟอยล์
    foil_mast_board_mounting_type:
      name: ประเภทการติดตั้งเสาฟอยล์
      description: กำหนดส่วนเชื่อมต่อที่ด้านบนของเสาซึ่งเชื่อมต่อกับบอร์ดหรือฟอยล์แทร็กเกอร์
    foil_mast_fuselage_connection_type:
      name: ประเภทการเชื่อมต่อเสาฟอยล์กับส่วนนอก
      description: ระบุวิธีการเชื่อมต่อเสาเข้ากับลำตัวเครื่องบินหรือชุดปีกด้านหน้า
    foil_mounting_interface:
      name: พื้นผิวการติดตั้งฟอยล์
      description: ระบุมาตรฐานการเชื่อมต่อที่ชิ้นส่วนนั้นใช้ในการยึดติดกับแผงวงจรหรือส่วนประกอบฟอยล์อื่นๆ
    foil_mounting_system:
      name: ระบบการติดตั้งฟอยล์
      description: ระบุอินพื้นผิวการติดตั้งสำหรับฟอยล์หรือฟินบนบอร์ด เพื่อให้มั่นใจว่าเข้ากันได้กับบอร์ดที่ผู้เล่นมี
    foil_mounting_type:
      name: ประเภทการติดตั้งฟอยล์
      description: ระบุระบบอินเทอร์เฟซที่ใช้ในการยึดแผ่นฟอยล์เข้ากับแผงวงจร เพื่อให้มั่นใจถึงความเข้ากันได้ระหว่างส่วนประกอบต่างๆ
    fold_over_elastic_application:
      name: การใช้งานยืดหยุ่นแบบพับได้
      description: การใช้งาน/การนำไปใช้หลักสำหรับยางยืดรังดุม
    foldability:
      name: ความสามารถในการพับ
      description: อธิบายว่าแผ่นกั้นนั้นพับหรือกางออกได้หรือไม่และอย่างไร เพื่อการจัดเก็บหรือการปรับเปลี่ยนรูปแบบ
    foldability_stow:
      name: ความสามารถในการพับ (เก็บ)
      description: ชั้นวางพับเก็บ/จัดเก็บเมื่อไม่ใช้งาน (เช่น พับติดกับยานพาหนะ) ได้หรือไม่
    folding_style:
      name: แบบพับได้
      description: ระบุวิธีการพับแผ่นรองกันกระแทกสำหรับการขนส่งและการจัดเก็บ ซึ่งส่งผลต่อความสม่ำเสมอของพื้นผิวแผ่นรองและความสะดวกในการพับเก็บ
    food_basket_items_included:
      name: รวมตะกร้าอาหารแล้ว
      description: แสดงรายการประเภทอาหารหลักที่รวมอยู่ในตะกร้า เพื่อช่วยให้นักช้อปเลือกตะกร้าที่ตรงกับรสนิยมหรือความต้องการด้านอาหารของผู้รับ
    food_coloring_form:
      name: สีผสมอาหารชนิดต่างๆ
      description: ระบุรูปแบบทางกายภาพหรือรูปแบบการจัดส่งที่ใช้กับสีผสมอาหาร (เช่น
        เจล ของเหลว ผง สเปรย์)
    food_contact_material:
      name: วัสดุที่สัมผัสกับอาหาร
      description: วัสดุหลักของอุปกรณ์การผลิตไวน์ (ถังหมัก กาลักน้ำ กรวย) ที่ใช้กับสิ่งที่ต้องมี/ไวน์
    food_packing_medium:
      name: วิธีห่ออาหาร
      description: ระบุตัวกลางที่ใช้บรรจุผลไม้หรือผัก (เช่น น้ำ น้ำเกลือ น้ำเชื่อม
        น้ำมัน)
    foosball_rod_type:
      name: ประเภทก้านฟุตบอลโต๊ะ
      description: ระบุโครงสร้างทางกลของคันเบ็ดที่มีผลต่อความรู้สึกในการเล่นและความปลอดภัย
    foot_arch_type_compatibility:
      name: ความเข้ากันได้ของรูปทรงของอุ้งเท้า
      description: ระบุรูปทรงอุ้งเท้าที่แผ่นรองออกแบบมาให้ใช้
    foot_arch_type_suitability:
      name: ความเหมาะสมของรูปทรงอุ้งเท้า
      description: ระบุว่าโปรไฟล์ส่วนโค้งส่วนเท้าใดที่ส่วนแทรกมีไว้เพื่อความช่วยเหลือ
    foot_coverage:
      name: การปกคลุมเท้า
      description: ระบุว่ากางเกงนั้นเป็นแบบสวมคลุมเท้า ไม่มีสวมคลุมเท้า แบบ Stirrup
        หรือแบบเปิดส้น
    foot_guard_type:
      name: ประเภทอุปกรณ์ป้องกันเท้า
      description: ระบุว่าอุปกรณ์ป้องกันขาประกอบด้วยส่วนปิดนิ้วเท้า/ฝ่าเท้าหรือไม่
        และระบุว่าส่วนปิดนั้นเป็นแบบติดถาวรหรือถอดได้
    foot_support_level:
      name: ระดับการรองรับเท้า
      description: ระบุระดับความช่วยเหลือเชิงโครงสร้างหรือความแน่นที่ส่วนเสริมรองเท้ามอบให้
        เช่น ต่ำ ปานกลาง สูง หรือสูงเป็นพิเศษ
    footbag_play_style:
      name: สไตล์การเล่นฟุตแบ็ก
      description: รูปแบบการเล่นหลักที่ตั้งใจไว้สำหรับฟุตแบ็ก
    football_ball_type:
      name: ประเภทลูกฟุตบอล
      description: ระบุวัตถุประสงค์หลักหรือบริบทหลักของการใช้งานลูกฟุตบอล เช่น การแข่งขัน
        การฝึกซ้อม หรือเพื่อจัดแสดงของสะสม
    football_dummy_type:
      name: ประเภทหุ่นจำลองฟุตบอล
      description: จำแนกรูปแบบหรือการออกแบบเชิงการใช้งานของหุ่นจำลอง เพื่อให้สอดคล้องกับวัตถุประสงค์การฝึกฝนเฉพาะด้าน
    football_glove_certification:
      name: การรับรองถุงมือฟุตบอล
      description: แสดงการรับรองหรือการปฏิบัติตามมาตรฐานที่จำเป็นสำหรับการแข่งขัน
        (เช่น SFIA, NFHS, NCAA)
    footboard_mounting_type:
      name: ประเภทการติดตั้งแผ่นปิดปลายเตียง
      description: ระบุว่าแผ่นปลายเตียงยึดติดกับ Frame เตียงหรือพื้นเตียงอย่างไร โดยช่วยในการเลือกฮาร์ดแวร์ที่เข้ากันได้และวิธีการติดตั้ง
    footboard_style:
      name: รูปแบบแผ่นปิดปลายเตียง
      description: กำหนดรูปแบบโครงสร้างหรือการออกแบบเชิงสุนทรียภาพของส่วนปลายเตียง
    footrest_adjustability:
      name: ความสามารถในการปรับที่วางเท้า
      description: ระบุว่าสามารถปรับที่วางเท้าเพื่อรองรับความยาวขาที่แตกต่างกันของเด็กได้หรือไม่
        และอย่างไร
    footrest_type:
      name: ที่วางเท้า
      description: ระบุการมีอยู่และการออกแบบของที่วางเท้าบนเก้าอี้สตูล
    footstrap_configuration:
      name: การกำหนดค่าสายรัดเท้า
      description: ระบุรูปแบบการติดตั้งสายรัดเท้าบนพื้นผิวของบอร์ด
    footswitch_action_style:
      name: สไตล์การทำงานของสวิตช์เท้าเหยียบ
      description: ระบุว่าการทำงานของสวิตช์เป็นแบบชั่วขณะหรือแบบล็อค และช่วยทั้งสองอย่างหรือไม่
    footswitch_power_source:
      name: แหล่งจ่ายไฟสวิตช์เท้า
      description: ระบุวิธีการจ่ายไฟให้กับฟุตสวิตช์ หากมี (แบบพาสซีฟผ่านแจ็คแอมป์
        แบตเตอรี่ อะแดปเตอร์ภายนอก USB เป็นต้น)
    footwear_construction_method:
      name: วิธีการผลิตรองเท้า
      description: กำหนดเทคนิคที่ใช้เพื่อติดส่วนบนเข้ากับพื้นรองเท้า ซึ่งจะส่งผลต่อความทนทาน
        ความเป็นไปได้ในการซ่อมแซมพื้นรองเท้า และราคา
    footwear_cut:
      name: การตัดรองเท้า
      description: ระบุความสูงของส่วนหุ้มข้อเท้า (ทรงต่ำ,ทรงกลาง,ทรงสูง) ความคล่องตัวและการซัพพอร์ตที่สมดุลกัน
    footwear_size_system:
      name: ระบบการกำหนดขนาดรองเท้า
      description: ระบุมาตรฐานขนาดตามภูมิภาคที่ใช้สำหรับขนาดของรองเท้าที่ระบุ (เช่น
        US, EU, UK)
    footwear_support_type:
      name: ประเภทซัพพอร์ดของรองเท้า
      description: ระบุความช่วยเหลือทางชีวกลศาสตร์หรือระดับการควบคุมการออกเสียงของรองเท้า
        (เช่น เป็นกลาง ความเสถียร การควบคุม Motion )
    fork_material:
      name: วัสดุสำหรับโช๊คหน้า
      description: ระบุวัสดุที่ใช้สำหรับโช๊คหน้าของจักรยาน ซึ่งส่งผลต่อความแข็ง น้ำหนัก
        และคุณภาพการขี่
    form_factor:
      name: ฟอร์มแฟคเตอร์
      description: ปัจจัยด้านรูปแบบของฮาร์ดแวร์หลักของผู้ควบคุม DMX
    formula_car_series_class:
      name: ซีรีส์/ประเภทรถฟอร์มูล่า
      description: ระบุซีรีส์การแข่งขันหรือประเภทการแข่งขันที่รถฟอร์มูล่าถูกสร้างขึ้นเพื่อเข้าร่วมแข่งขัน
    formulation_style:
      name: รูปแบบการคิดค้นสูตร
      description: ไฮไลต์สูตรเฉพาะที่ออกแบบสำหรับการใช้งานเฉพาะหรือลักษณะเฉพาะ (เช่น
        Barista, Extra Creamy)
    formulation_type:
      name: ประเภทสูตร
      description: รูปแบบสูตรสำหรับสเปรย์ฆ่าเชื้อโรค
    fossil_preparation_level:
      name: ระดับการเตรียมฟอสซิล
      description: ระดับการเตรียม/ทำความสะอาดชิ้นงาน (เช่น ชิ้นงานที่ไม่ได้เตรียมในเมทริกซ์
        เทียบกับ ชิ้นงานที่เตรียมอย่างสมบูรณ์)
    fossil_preservation_type:
      name: ประเภทการเก็บรักษาฟอสซิล
      description: ประเภทของการเก็บรักษาฟอสซิล (เช่น กระบวนการเกิดแร่ในช่องว่าง รูปหล่อ
        รอยพิมพ์ ฟิล์ม)
    fossil_restoration_status:
      name: สถานะการฟื้นฟูฟอสซิล
      description: ระบุว่าชิ้นงานได้รับการซ่อมแซม/บูรณะหรือไม่และอย่างไร (เช่น การติดกาว
        การสร้างใหม่ การประกอบ)
    foundation_configuration:
      name: การกำหนด Foundations
      description: ระบุว่าโครงสร้างฐานเป็นการผลิตแบบชิ้นเดียวหรือแยกส่วน/สองชิ้นสำหรับที่นอนที่มีขนาดใหญ่ขึ้น
    foundation_profile:
      name: ข้อมูลพื้นฐาน
      description: จำแนกหมวดหมู่ความสูงโดยรวมของ Foundationsเช่น ต่ำมาก ต่ำ มาตรฐาน
        หรือสูง เพื่อให้นักช้อปสามารถจับคู่ความสูงของที่นอนได้อย่างรวดเร็ว ลักษณะเฉพาะ
        และขนาดผ้าปูที่นอน
    frame_adjustability:
      name: ความสามารถในการปรับแต่งโครง
      description: ระบุว่าสามารถปรับแต่ง Frame ได้หรือไม่และอย่างไร (เช่น การปรับความกว้าง/ความสูง
        การหมุน/การเอียง) ซึ่งส่งผลต่อหลักสรีรศาสตร์และความเหมาะสมของชิ้นงาน
    frame_drum_jingle_configuration:
      name: การกำหนดค่าเสียงลูกกระพรวนของกลองเฟรม
      description: Frame Drum มีจิงเกิลหรือไม่ และถ้ามี รูปแบบโดยทั่วไปเป็นอย่างไร
    frame_drum_tuning_system:
      name: ระบบปรับแต่ง Frame Drum
      description: วิธีการปรับ Frame Drum หรือ สามารถ Frame Drum ได้หรือไม่
    frame_finish:
      name: การตกแต่งกลองเฟรม
      description: ระบุสารเคลือบป้องกันหรือวัสดุตกแต่งที่ใช้กับ Frame Influence ความทนทานและความสวยงาม
    frame_mounting_standard:
      name: มาตรฐานการติดตั้งเฟรม
      description: กำหนดข้อกำหนดอินเทอร์เฟซของ Boot-to-Frame (เช่น 195 มม. 2 จุด,
        Trinity 3 จุด) ซึ่งมีความสำคัญต่อความเข้ากันได้ Frame
    frame_steel_gauge:
      name: ความหนาของเหล็ก Frame
      description: ระบุความหนา (เกจ) ของท่อเหล็กที่ใช้ในเสาตั้งของชั้นวาง ซึ่งเป็นตัวบ่งชี้ที่สำคัญของความแข็งแรงและความมั่นคง
    frame_suspension_type:
      name: ระบบกันสะเทือน Frame
      description: บ่งบอกการออกแบบระบบกันสะเทือนของโครงสร้างจักรยาน เช่น แบบแข็ง แบบไม่มีโช้คหลัง
        หรือแบบมีโช้คหน้าและหลัง เพื่อให้ผู้ซื้อเลือกโครงสร้างที่ตรงความต้องการในการประกอบจักรยาน
    free_reed_instrument_orientation:
      name: การวางแนวเครื่องดนตรีแบบไม่มีลิ้น
      description: ระบุวิธีการจับ/เล่นเครื่องดนตรี (ถือด้วยมือโดยใช้ลูกสูบ สะพายไหล่
        ฯลฯ) เพื่อหลักสรีรศาสตร์และการกรองการใช้งาน
    free_weight_rack_type:
      name: ประเภทโต๊ะทานอาหารแบบฟรีน้ำหนัก
      description: แยกประเภทโครงสร้างหรือ Functions ของห้องอาหาร (เช่น โต๊ะบาร์เบล
        โต๊ะเคตเทิลเบลล์ จานทรี)
    freehub_body_type:
      name: ประเภทตัวเรือนฟรีฮับ
      description: ระบุมาตรฐานของตัวฟรีฮับหรือตัวขับคาสเซ็ตที่ดุมล้อหลังของจักรยานรองรับ
    freehub_driver_standard:
      name: มาตรฐานตัวขับฟรีฮับ
      description: ระบุอินเทอร์เฟซคาสเซ็ตต์/ไดรเวอร์ที่ส่วนฮับรองรับ (เช่น Shimano
        HG, SRAM XD)
    freewheel_thread_standard:
      name: มาตราฐานร่องยางของ Freewheel
      description: ระบุมาตรฐานฮับเเธรดหรือขนาดที่ Freewheel เข้ากันได้
    french_horn_bell_construction:
      name: โครงสร้างปากแตรเฟร้นช์ฮอร์น
      description: ระบุวิธีการสร้างปากแตร และระบุว่าสามารถถอดออกเพื่อการขนส่ง/ซ่อมบำรุงได้หรือไม่
    french_horn_bell_material:
      name: วัสดุที่ใช้ทำปากลำโพงของเฟรนช์ฮอร์น
      description: ระบุวัสดุหรือโลหะผสมที่ใช้ทำปากลำโพง (และมักรวมถึงส่วนปลายปากลำโพง)
        ของเฟรนช์ฮอร์น
    french_horn_bell_type:
      name: ประเภทปากแตรเฟร้นช์ฮอร์น
      description: รูปแบบการสร้างของปากแตร
    french_horn_finish:
      name: พื้นผิวของแตรเฟร้นช์ฮอร์น
      description: การตกแต่ง/การชุบผิวภายนอกของเครื่องดนตรี
    french_horn_included_accessories:
      name: แตรฝรั่งเศส (รวมอุปกรณ์เสริม)
      description: อุปกรณ์เสริมที่มาพร้อมกับแตรเฟรนช์ฮอร์น (แตร, ปากเป่า ฯลฯ)
    french_horn_leadpipe_material:
      name: วัสดุท่อลมของแตรเฟร้นช์ฮอร์น
      description: ระบุวัสดุ/โลหะผสมของท่อนำ
    french_horn_wrap_type:
      name: รูปแบบการการขดท่อของเฟรนช์ฮอร์น
      description: ลักษณะโดยรวม/รูปทรงของแตรเฟร้นช์ฮอร์น
    fretboard_radius_fit:
      name: รัศมีฟิงเกอร์บอร์ดพอดี
      description: ระบุว่าความโค้งของแผ่นรองคาโป้ได้รับการออกแบบมาสำหรับฟิงเกอร์บอร์ดแบบเรียบหรือแบบโค้ง
        หรือสามารถปรับได้เพื่อรองรับรัศมีฟิงเกอร์บอร์ดหลายแบบ
    friction_surface_included:
      name: รวมถึงพื้นผิวเสียดทาน
      description: ไม่ว่าล้อช่วยแรงจะมีพื้นผิวเสียดทานที่สามารถเปลี่ยน/ติดตั้งได้
        (เช่น ชิ้นส่วนแทรก วงแหวน) หรือเป็นพื้นผิวเสียดทานแบบชิ้นเดียว
    fringe_curtain_finish:
      name: การตกแต่งม่านมีระบาย
      description: อธิบายลักษณะพื้นผิวของพู่ (ความเงา/พื้นผิวสัมผัส)
    fringe_curtain_material:
      name: วัสดุม่านมีระบาย
      description: ระบุวัสดุหลักของแถบผ้าม่าน (เช่น โพลิเอทิลีนเทเรฟทาเบลล์ ฟอยล์,
        พลาสติก, Paper, ผ้า)
    fringe_curtain_use_location:
      name: ตำแหน่งการใช้งานม่านจีบ
      description: แสดงว่าม่านมีระบายนี้มีไว้สำหรับใช้ภายในอาคาร ภายนอกอาคาร หรือทั้งสองอย่าง
    fringe_trim_style:
      name: สไตล์ขอบระบาย
      description: ระบุลักษณะการสร้าง/รูปแบบของขอบระบาย (วิธีการขึ้นรูปและจัดวางเส้นหรือห่วง)
    front_axle_standard:
      name: มาตรฐานเพลาหน้า
      description: ระบุขนาดเส้นผ่านศูนย์กลางและระยะห่างของแกนล้อที่ง่ามออกแบบมาให้รองรับ
        (เช่น Boost ขนาด 15 x 110 มม.) เพื่อให้มั่นใจว่าสามารถใช้งานร่วมกับดุมล้อได้
    front_button_configuration:
      name: การจัดวางกระดุมด้านหน้า
      description: ระบุรูปแบบด้านหน้าของแจ็คเก็ต โดยระบุว่าเป็นแบบกระดุมแถวเดียวหรือสองแถว
        และจำนวนกระดุมด้านหน้า
    front_closure_style:
      name: แบบปิดด้านหน้า
      description: แสดงรูปแบบการตัดเย็บเสื้อโค้ทตัวยาวด้านหน้า เช่น เรียงกระดุมแถวเดียว,
        เรียงกระดุมสองแถว, ผ่าหน้า, พับทบ หรือติดซิป
    front_decoration_type:
      name: ประเภทการตกแต่งด้านหน้า
      description: ระบุประเภทของเครื่องประดับหรือตราสัญลักษณ์ที่ติดอยู่ด้านหน้าของหมวก
        (เช่น ตราสัญลักษณ์ปัก, ตราสัญลักษณ์หนัง)
    front_point_configuration:
      name: รูปแบบหัวลูกศร
      description: ระบุการออกแบบหัวลูกศร (แบบหัว Mono , แบบสองหัว, Modular, แบบถอดเปลี่ยนได้)
        Influence ความแม่นยำในการเจาะทะลุน้ำแข็งและภูมิประเทศแบบผสม
    front_seat_position:
      name: ตำแหน่งที่นั่งด้านหน้า
      description: ที่นั่งนี้มีไว้สำหรับด้านใด/ตำแหน่งใดในแถวหน้า
    front_style:
      name: สไตล์ด้านหน้า
      description: อธิบายลักษณะการตัดเย็บด้านหน้าของกางเกงชิโน โดยระบุว่ากางเกงเป็นแบบเรียบด้านหน้า
        มีจีบ หรือมีรายละเอียดอื่นๆ
    frosting_or_icing_type:
      name: ประเภทของน้ำตาลไอซิ่ง
      description: ระบุประเภทของน้ำตาลไอซิ่งที่ใช้ตกแต่งเค้กหรือขนมหวาน
    fruit_cultivar_or_variety:
      name: พันธุ์ปลูกหรือสายพันธุ์ของผลไม้
      description: ระบุชื่อพันธุ์หรือสายพันธุ์เฉพาะของผลไม้ (เช่น กาลา, แกรนนี่สมิธ,
        มอนทง, คาเวนดิช)
    fruit_cut_style:
      name: สไตล์การหั่นผลไม้
      description: อธิบายวิธีการเตรียมหรือหั่นผลไม้ (เช่น ทั้งลูก, ฝาน, หั่นเป็นลูกเต๋า)
    fruit_mix_variety:
      name: ผลไม้รวมนานาชนิด
      description: ระบุชื่อส่วนผสมตามธีมหรือพันธุ์ผลไม้รวมโดยทั่วไป (เช่น ผลไม้รวมเขตร้อน
        ผลไม้รวมเบอร์รี่)
    fruit_piece_form:
      name: รูปทรงชิ้นผลไม้
      description: อธิบายลักษณะการตัดหรือการจัดวางชิ้นผลไม้แห้ง เช่น แบบทั้งชิ้น แบบฝานเป็นชิ้น
        หรือแบบบดเป็นผง
    fruit_snack_form:
      name: รูปแบบของขนมผลไม้
      description: จำแนกตามรูปแบบหรือลักษณะการนำเสนอของผลไม้กินเล่น
    fruit_topping_format:
      name: รูปแบบท็อปปิ้งผลไม้
      description: อธิบายรูปแบบทางกายภาพ เนื้อสัมผัส หรือรูปแบบของท็อปปิ้ง เพื่อให้นักช้อปสามารถเลือกได้ระหว่างซอส
        น้ำเชื่อม ผลไม้ชิ้นใหญ่ ไข่มุกแบบแตกในปาก ฯลฯ
    fruit_variety:
      name: พันธุ์ผลไม้
      description: ระบุผลไม้หลักที่ใช้สำหรับสูตร/ชุด/การจัดเตรียมไวน์ผลไม้ (เช่น แอปเปิ้ล
        เชอร์รี่ แบล็คเบอร์รี่)
    fuel_cap_gasket_seal_material:
      name: วัสดุปะเก็น/ซีลฝาถังน้ำมันเชื้อเพลิง
      description: ระบุวัสดุที่ใช้สำหรับปะเก็น/โอริงซีลบนฝาถังน้ำมันเชื้อเพลิง
    fuel_cap_locking_mechanism:
      name: กลไกการล็อกฝาปิดถังน้ำมัน
      description: ระบุวิธีการล็อกที่ใช้โดยฝาปิดถังน้ำมันแบบล็อกได้
    fuel_cap_type:
      name: ประเภทฝาปิดถังน้ำมัน
      description: ระบุประเภทการใช้งาน/การออกแบบของฝาปิดถังน้ำมันที่ใช้สำหรับท่อเติมน้ำมันของรถยนต์
    fuel_cap_venting:
      name: การระบายอากาศฝาถังน้ำมันเชื้อเพลิง
      description: ระบุว่าฝาถังน้ำมันมีช่องระบายอากาศหรือไม่ และถ้ามี ช่องระบายอากาศนั้นเป็นแบบใด
    fuel_filter_features:
      name: คุณสมบัติตัวกรองน้ำมันเชื้อเพลิง
      description: ชี้แจงคุณสมบัติการทำงานที่สำคัญของตัวกรองน้ำมันเชื้อเพลิง (การแยกน้ำ
        วาล์วระบายน้ำ ช่องต่อเซ็นเซอร์ ฯลฯ)
    fuel_filter_media_material:
      name: วัสดุกรองน้ำมันเชื้อเพลิง
      description: ระบุวัสดุกรองหลักที่ใช้ภายในไส้กรองน้ำมันเชื้อเพลิง
    fuel_filter_mounting_connection_type:
      name: ประเภทการติดตั้ง/การเชื่อมต่อตัวกรองน้ำมันเชื้อเพลิง
      description: ระบุวิธีการเชื่อมต่อ/ติดตั้งตัวกรองน้ำมันเชื้อเพลิง (แบบเกลียว/แบบหมุน,
        แบบ Quick-Connect, แบบมีหนาม, Banjo ฯลฯ)
    fuel_injection_cleaning_method:
      name: วิธีการทำความสะอาดหัวฉีดน้ำมันเชื้อเพลิง
      description: ระบุวิธีการใช้ชุดเครื่องมือเพื่อทำความสะอาดระบบฉีดน้ำมันเชื้อเพลิง
    fuel_injector_electrical_connector_type:
      name: ประเภทขั้วต่อไฟฟ้าหัวฉีดน้ำมันเชื้อเพลิง
      description: ระบุมาตรฐาน/Shapes ของขั้วต่อไฟฟ้าของหัวฉีด
    fuel_injector_seat_type:
      name: ประเภทฝาหัวฉีดน้ำมันเชื้อเพลิง
      description: ระบุรูปแบบการเชื่อมต่อระหว่างปลายหัวฉีดและฝาหัวฉีดที่ใช้สำหรับการซีลที่ท่อไอดี/รางหัวฉีด
    fuel_injector_spray_pattern:
      name: รูปแบบการฉีดน้ำมันเชื้อเพลิงของหัวฉีด
      description: ระบุรูปแบบการสเปรย์/แจกจ่ายน้ำมันเชื้อเพลิงของหัวฉีด โดยใช้คำศัพท์เฉพาะทางจากผู้ผลิตหรือที่ใช้ในอุตสาหกรรม
        (เช่น กรวย, พัดลม, Pencil Stream, หลายรู)
    fuel_level_sensor_mounting_type:
      name: ประเภทการติดตั้งเซ็นเซอร์ระดับน้ำมันเชื้อเพลิง
      description: ระบุอินเทอร์เฟซการติดตั้งทางกายภาพที่ใช้ในการเชื่อมต่อเซ็นเซอร์/ตัวส่งสัญญาณระดับน้ำมันเชื้อเพลิงเข้ากับถังน้ำมันเชื้อเพลิงหรือโมดูลปั้ม
    fuel_level_sensor_sensing_mechanism:
      name: กลไกการตรวจจับเซ็นเซอร์ระดับน้ำมันเชื้อเพลิง
      description: ระบุกลไก/เทคโนโลยีการตรวจวัดที่ใช้ในการวัดระดับน้ำมันเชื้อเพลิงในเซ็นเซอร์หรือชุดส่งสัญญาณระดับน้ำมันเชื้อเพลิง
    fuel_line_compliance_standard:
      name: มาตรฐานการปฏิบัติตามข้อกำหนดท่อน้ำมันเชื้อเพลิง
      description: ระบุกฎระเบียบหรือมาตรฐานอุตสาหกรรมที่ท่อน้ำมันเชื้อเพลิงเป็นไปตามกฎหรือมาตรฐานนั้น
        (มักพบในการใช้งานทางทะเล)
    fuel_line_connector_interface_type:
      name: ประเภทอินเทอร์เฟซตัวเชื่อมต่อท่อน้ำมันเชื้อเพลิง
      description: ระบุรูปแบบการเชื่อมต่อ/อินเทอร์เฟซที่ปลายท่อส่งเชื้อเพลิงหรือข้อต่อ
    fuel_pressure_regulator_body_material:
      name: วัสดุของตัวควบคุมแรงดันน้ำมันเชื้อเพลิง
      description: ระบุวัสดุตัวเรือน/ตัวปรับแรงดันเพื่อความทนทานและต้านทานการกัดกร่อน
    fuel_pressure_regulator_mounting_type:
      name: ประเภทการติดตั้งตัวควบคุมแรงดันน้ำมันเชื้อเพลิง
      description: ระบุวิธีการติดตั้งหรือยึดตัวควบคุมแรงดันน้ำมันเชื้อเพลิง ซึ่งส่งผลต่อความพอดีและความเข้ากันได้
    fuel_pump_inlet_type:
      name: ประเภทท่อขาเข้าของปั๊มเชื้อเพลิง
      description: รูปแบบการเชื่อมต่อที่ท่อขาเข้าของปั๊ม
    fuel_pump_mounting_location:
      name: การติดปั๊มน้ำมันเชื้อเพลิง...
      description: ตำแหน่งที่ติดตั้งปั๊มน้ำมันเชื้อเพลิงบน/ในระบบน้ำมันเชื้อเพลิงของรถยนต์
    fuel_pump_outlet_connection_type:
      name: ประเภทการเชื่อมต่อทางออกของปั๊มเชื้อเพลิง
      description: ระบุรูปแบบการเชื่อมต่อทางกายภาพที่ท่อขาออกของปั๊มเชื้อเพลิงเพื่อให้เข้ากันได้พอดีสำหรับการติดตั้ง
    fuel_system_application:
      name: แอพพลิเคชั่นระบบเชื้อเพลิง
      description: สถาปัตยกรรมระบบส่งน้ำมันเชื้อเพลิงที่ออกแบบมาเพื่อรองรับปั๊มน้ำมันเชื้อเพลิง
        (เช่น ระบบคาร์บูเรเตอร์, EFI, GDI, ระบบยก/ส่งน้ำมันดีเซล)
    fuel_system_connection_type:
      name: ประเภทการเชื่อมต่อระบบน้ำมันเชื้อเพลิง
      description: ระบุระบบเชื้อเพลิงที่ต้องการมาตรฐานหรืออินเทอร์เฟซของอะแดปเตอร์ที่รองรับโดยการบันทึก
    fuel_system_type:
      name: ประเภทระบบเชื้อเพลิง
      description: ระบุระบบการส่งเชื้อเพลิงของเครื่องยนต์ (เช่น โครงสร้างคาร์บูเรเตอร์หรือการฉีดเชื้อเพลิง)
    fuel_tank_installation_position:
      name: ตำแหน่งการติดตั้งถังน้ำมันเชื้อเพลิง
      description: ระบุตำแหน่งติดตั้งถังน้ำมันเชื้อเพลิงโดยทั่วไปบนรถยนต์
    fuel_tank_orientation:
      name: การวางแนวถังน้ำมันเชื้อเพลิง
      description: ระบุว่าถังเชื้อเพลิงจะติดตั้งในแนวนอนหรือแนวตั้ง
    fuel_tank_shape:
      name: รูปทรงถังเชื้อเพลิง
      description: อธิบายรูปทรงโดยรวมของถังเชื้อเพลิงเพื่อรองรับการติดตั้งและการจับคู่ชิ้นส่วนทดแทน
    fur_type:
      name: ประเภทขนสัตว์
      description: ระบุชนิดของขนสัตว์หรือวัสดุสังเคราะห์ที่ใช้ทำขนสัตว์ภายนอกของกระเป๋าคลัทช์หรือกระเป๋าถือ
    furniture_finish:
      name: การตกแต่งเฟอร์นิเจอร์
      description: อธิบายพื้นผิวทรีตเมนต์หรือการตกแต่งที่ใช้กับรายการเฟอร์นิเจอร์
        ซึ่งส่งผลต่อลักษณะและข้อกำหนดในการบำรุงรักษา
    fuse_form_factor:
      name: รูปแบบฟิวส์
      description: ระบุรูปแบบ/ขนาดของฟิวส์เพื่อให้แน่ใจว่าพอดีกับช่องใส่ฟิวส์หรือกล่องฟิวส์ที่ต้องการ
        (เช่น ฟิวส์แบบใบมีดเทียบกับแบบตลับ)
    fuse_terminal_or_mount_style:
      name: ฟิวส์เครื่องอ่านหรือแบบติด
      description: ระบุว่าฟิวส์เชื่อมต่อทางกลไก/ไฟฟ้าอย่างไร (ฟอยล์เทียบกับสลักเกลียวและอินไลน์)
    fusible_application_method:
      name: วิธีการใช้งานกาวแบบหลอมละลาย
      description: ระบุวิธีการเปิดใช้งาน/ใช้งานกาวแบบหลอมละลาย (เช่น การใช้ความร้อนจากเตารีด
        การกด การเย็บเสริมแรง)
    fusible_hem_tape_application_method:
      name: วิธีการติดเทปปิดขอบผ้าแบบหลอมละลาย
      description: อธิบายวิธีการใช้งาน/ติดเทป (เช่น การรีดด้วยเตารีด การใช้เครื่องรีดความร้อน)
    fusible_seam_tape_activation_method:
      name: วิธีการกระตุ้นเทปกาวรีดร้อน
      description: ระบุวิธีการเปิดใช้งานกาวระหว่างแอปพลิเคชัน
    fusible_seam_tape_application:
      name: การติดเทปปิดรอยต่อแบบหลอมละลาย
      description: ระบุวัตถุประสงค์การใช้งานหลักสำหรับเทปกาวปิดรอยต่อแบบหลอมละลาย
    fusible_seam_tape_material:
      name: วัสดุเทปปิดรอยต่อแบบหลอมละลาย
      description: วัสดุหรือส่วนประกอบของเทป/แผ่น/ตัวนำ (ไม่ใช่เนื้อผ้าที่ยึดติด)
    fusible_seam_tape_washability:
      name: เทปปิดตะเข็บแบบรีดติด สามารถซักได้
      description: ระบุว่าตะเข็บที่เชื่อมติดกันยังคงสภาพเดิมหรือไม่หลังจากซักหรือทำความสะอาด
    fusible_seam_tape_waterproof_rating:
      name: เทปปิดรอยต่อแบบติดกาว กันน้ำ
      description: ระบุว่าเทปตะเข็บมีจุดประสงค์เพื่อสร้างตะเข็บกันน้ำหรือกันน้ำหลังจากใช้งาน
    fusible_tape_backing_type:
      name: ประเภทแผ่นรองเทปกาวหลอมละลาย
      description: ระบุว่าเทปมีกระดาษรอง/แผ่นรองหรือไม่ และมีรูปแบบใด ซึ่งส่งผลต่อการใช้งานและการติดตั้ง
    futon_frame_conversion_mechanism:
      name: กลไกที่ใช้ปรับเปลี่ยนโครงสร้างของโซฟาฟูก
      description: ระบุว่าเทปมีกระดาษรอง/แผ่นรองหรือไม่ และมีรูปแบบใด ซึ่งส่งผลต่อการใช้งานและการติดตั้ง
    gaiter_height_type:
      name: ความสูงของสนับแข้ง
      description: จำแนกประเภทของสนับแข้งตามความสูงที่ปกคลุมขา เช่น สนับแข้งถึงข้อเท้า
        สนับแข้งถึงกลางน่อง สนับแข้งถึงเข่า หรือสนับแข้งถึงต้นขา
    game_variation:
      name: รูปแบบเกม
      description: ระบุรูปแบบการเล่นที่ออกแบบมาสำหรับชุดอุปกรณ์นั้น (เช่น เทเทอร์บอลแบบคลาสสิก
        เทเทอร์เทนนิส สปีดบอล)
    garlic_preparation_style:
      name: วิธีการเตรียมกระเทียม
      description: ระบุวิธีการเตรียมหรือแปรรูปกระเทียมก่อนการอบ (เช่น กระเทียมทั้งหัว
        กระเทียมสับ กระเทียมผง)
    garlic_variety:
      name: กระเทียมหลากหลายสายพันธุ์
      description: ระบุพันธุ์ทางพฤกษศาสตร์หรือพันธุ์ทางการค้าของกระเทียมที่จำหน่าย
    garment_back_style:
      name: สไตล์ด้านหลังของเสื้อผ้า
      description: บ่งบอกลักษณะหรือรูปแบบด้านหลังของเสื้อผ้า (เช่น หลังเปลือย, เว้าหลัง
        สายไขว้ด้านหลัง)
    garment_pattern_type:
      name: ประเภทแพทเทิร์นเสื้อผ้า
      description: ระบุประเภทของเสื้อผ้าที่แบบตัดเย็บนี้ต้องการตัดเย็บ
    garnish_type:
      name: ประเภทเครื่องตกแต่ง
      description: ระบุว่าเครื่องตกแต่งนั้นคืออะไร (ส่วนผสมหรือรูปแบบการตกแต่ง) ที่ใช้ตกแต่งค็อกเทลให้เสร็จสมบูรณ์
    gas_lift_class:
      name: ระดับตัวยกแก๊ส
      description: ระบุระดับความปลอดภัยและความแข็งแรงของกระบอกสูบไฮดรอลิกที่ใช้สำหรับปรับความสูงของเบาะนั่ง
    gas_propellant_type:
      name: ประเภทก๊าซขับเคลื่อน
      description: ระบุประเภทของก๊าซขับดันที่แนะนำหรือเหมาะสมสำหรับปืนของเล่นที่ใช้ก๊าซเป็นพลังงาน
    gatta_tabla_tuning_block_material:
      name: วัสดุของกัตตา (บล็อกไม้สำหรับตั้งสายกลองทับลา)
      description: วัสดุของบล็อกปรับสาย (กัตตา) ที่ใช้ระหว่างสายปรับสายกับตัวกีตาร์
    gauge_mounting_type:
      name: ประเภทการติดตั้งเกจวัด
      description: วิธีการติดตั้งมาตรวัดน้ำมันเชื้อเพลิงบนเรือ
    gauge_style:
      name: รูปแบบเกจ
      description: วัสดุของบล็อกปรับสาย (กัตตา) ที่ใช้ระหว่างสายปรับสายกับตัวกีตาร์
    gear_oil_api_classification:
      name: การจำแนกประเภท API ของน้ำมันเกียร์
      description: การจำแนกประเภท API GL สำหรับน้ำมันเกียร์ที่ใช้ในเฟืองท้าย/เกียร์ธรรมดา
    gel_wax_density_grade:
      name: ระดับความหนาแน่นของเจลแว็กซ์
      description: บ่งบอกถึงระดับความหนาแน่นของเจลแว็กซ์ ซึ่งส่งผลต่อความใส ปริมาณน้ำหอม
        และความเหมาะสมสำหรับการฝังลงในสิ่งของต่างๆ
    gel_wax_transparency_level:
      name: ระดับความโปร่งใสของเจลแว็กซ์
      description: อธิบายความใส/ความทึบของเจลแว็กซ์เมื่อใช้งานตามวัตถุประสงค์
    gelatin_form:
      name: รูปแบบเจลาติน
      description: อธิบายลักษณะทางกายภาพของเจลาตินอย่างละเอียด เพื่อให้ผู้ใช้สามารถเลือกรูปแบบที่ถูกต้องสำหรับสูตรอาหารและการใช้งานในอุตสาหกรรมได้
    gelatin_or_gelling_agent_source:
      name: แหล่งที่มาของเจลาตินหรือสารก่อเจล
      description: ระบุแหล่งที่มาหรือประเภทของสารก่อเจลที่ใช้ในผลิตภัณฑ์ ซึ่งมีความสำคัญต่อข้อควรพิจารณาด้านอาหารและศาสนา
    gelatin_source:
      name: แหล่งที่มาของเจลาติน
      description: ระบุแหล่งที่มาของเจลาตินว่าเป็นจากสัตว์ พืช หรือสารสังเคราะห์ เพื่อให้ผู้ซื้อสามารถตรวจสอบความเข้ากันได้กับข้อกำหนดด้านอาหาร
        จริยธรรม หรือศาสนา
    gelling_agent:
      name: สารก่อเจล
      description: ระบุสารหลักที่ใช้ในการทำให้ขนมหวานจับตัวเป็นก้อนหรือข้นขึ้น ซึ่งมีความสำคัญต่อความเหมาะสมด้านอาหารและเนื้อสัมผัส
    gemstone_clarity_grade:
      name: ระดับความใสของอัญมณี
      description: ระดับความใสของอัญมณี (เมื่อมีการประเมิน)
    gemstone_creation_method:
      name: วิธีการสร้างอัญมณี
      description: ระบุว่าอัญมณีนั้นเป็นอัญมณีธรรมชาติ อัญมณีสังเคราะห์ หรืออัญมณีเลียนแบบ/ของปลอม
    gemstone_cut_style:
      name: สไตล์การเจียระไนอัญมณี
      description: อธิบายลักษณะการเจียระไน/การตกแต่งผิวของอัญมณีชิ้นนั้น
    gemstone_treatment_status:
      name: สถานะการบำบัดอัญมณี
      description: บ่งบอกว่าอัญมณีนั้นได้รับการปรับปรุง/เพิ่มคุณภาพหรือไม่และอย่างไร
    geological_period:
      name: ยุคทางธรณีวิทยา
      description: ช่วงเวลาทางธรณีวิทยา (และอาจรวมถึงยุค) ของฟอสซิล หากทราบ (เช่น
        ยุคจูราสสิก ยุคครีเทเชียส ยุคอีโอซีน)
    gift_box_tin_insert_type:
      name: กล่องของขวัญ/กล่องโลหะแบบใส่ด้านใน
      description: การออกแบบแผ่นรองด้านในเพื่อจัดระเบียบ/ปกป้องสิ่งของภายในกล่อง/กระป๋อง
    gift_box_tin_sustainability_features:
      name: คุณสมบัติที่เป็นมิตรต่อสิ่งแวดล้อมของกล่องของขวัญ/กระป๋อง
      description: ลักษณะที่เกี่ยวข้องกับความยั่งยืนของกล่องของขวัญ/หมายเลขทะเบียนผู้เสียภาษีบรรจุภัณฑ์
    gift_box_tin_window_type:
      name: กล่องของขวัญ/กล่องโลหะแบบมีหน้าต่าง
      description: ว่ากล่องของขวัญจะมีช่องโชว์หรือไม่และมีลักษณะอย่างไร
    gift_message_option:
      name: ตัวเลือกข้อความของขวัญ
      description: ระบุว่าสามารถใส่ข้อความ/โน้ตสำหรับของขวัญได้หรือไม่ และอย่างไร
        (ไม่มี, ใส่มาแล้ว, ปรับแต่งได้)
    ginger_maturity:
      name: ความสุกของขิง
      description: ระบุระยะการเก็บเกี่ยวของขิง เช่น ขิงอ่อนหรือแก่ ซึ่งส่งผลต่อความเข้มข้นของรสชาติและแอปพลิเคชันในการทำอาหารที่ต้องการ
    ginger_variety:
      name: พันธ์ขิง
      description: ระบุสายพันธุ์ ชนิด หรือเหง้าที่เกี่ยวข้องภายในวงศ์ขิง เพื่อแยกแยะรสชาติและการนำไปใช้ในการประกอบอาหาร
    glass_kiln_controller_type:
      name: ประเภทตัวควบคุมเตาเผาแก้ว
      description: ประเภทของอุปกรณ์ควบคุมอุณหภูมิ/การเผาไหม้ที่มาพร้อมกับเตาเผา
    glass_kiln_firing_application:
      name: การใช้งานเตาเผาแก้ว
      description: งานกระจกเบื้องต้นแอปพลิเคชันที่เตาเผาได้รับการออกแบบมา
    glass_stone_application_method:
      name: วิธีการติดพลอยกระจก
      description: ระบุวิธีการติด/ใช้งานพลอยกระจกในชิ้นงาน (เช่น ติดด้วยกาว ติดด้วยความร้อน
        เย็บติด)
    glass_tint:
      name: สีเคลือบแก้ว
      description: สีของแก้ว/พลาสติกที่ใช้สำหรับขวดเพื่อควบคุมการสัมผัสแสง (พบได้ทั่วไปในการผลิตเบียร์/ไวน์)
    glaze_firing_atmosphere:
      name: บรรยากาศการเผาเคลือบ
      description: สภาวะบรรยากาศการเผาที่เหมาะสมสำหรับเคลือบชนิดนี้
    glaze_opacity:
      name: ความทึบแสงของเคลือบ
      description: ความโปร่งใสของผิวเคลือบหลังจากเผาเป็นอย่างไร
    glaze_product_form:
      name: รูปแบบผลิตภัณฑ์เคลือบเงา
      description: รูปแบบทางกายภาพที่ผลิตภัณฑ์เคลือบถูกจัดจำหน่าย (เช่น ของเหลว ผงแห้ง
        สารเข้มข้น สเปรย์)
    glider_avionics_package:
      name: ชุดอุปกรณ์อิเล็กทรอนิกส์สำหรับเครื่องร่อน
      description: ระบุระดับโดยรวมของ และอุปกรณ์การบินที่ติดตั้งในเครื่องร่อน
    glider_certification_rating:
      name: การจัดอันดับการรับรองเครื่องร่อน
      description: ระดับการรับรองอย่างเป็นทางการที่บ่งบอกถึงระดับความปลอดภัยและประสิทธิภาพของเครื่องร่อน
        (เช่น EN-A, EN-B)
    glider_landing_gear_configuration:
      name: การจัดวางระบบฐานล้อของเครื่องร่อน
      description: ระบุรูปแบบการติดตั้งล้อลงจอดของเครื่องร่อน
    glider_launch_method:
      name: วิธี Launch เครื่องร่อน
      description: ระบุวิธี Launch หรือLaunch อัตโนมัติของเครื่องร่อนตามปกติ
    glider_performance_class:
      name: คลาสประสิทธิภาพเครื่องร่อน
      description: ประเภทหรือหมวดหมู่การแข่งขัน/สมรรถนะที่ใช้กันทั่วไปสำหรับเครื่องร่อน
    glitter_application_method:
      name: วิธีการใช้กลิตเตอร์
      description: แสดงเทคนิคที่แนะนำในการติดหรือใช้กากเพชรสำหรับงานฝีมือ (เช่น โรย/เขย่า
        ผสมรวม ขัดถู ทาลงบนกาว ใช้แปรงปัด ฉีดพ่น อบร้อน/ปั๊มนูน)
    glitter_eco_friendly_claim:
      name: การอ้างว่ากลิตเตอร์เป็นมิตรต่อสิ่งแวดล้อม
      description: ข้อกล่าวอ้างด้านสิ่งแวดล้อม/นิเวศน์ที่เฉพาะเจาะจงสำหรับสูตรกลิตเตอร์แบบผง
    glitter_effect_type:
      name: ประเภทเอฟเฟกต์กลิตเตอร์
      description: อธิบายเอฟเฟกต์การมองเห็นของกากเพชร/เลื่อมที่นอกเหนือไปจากสีพื้นฐาน
        (เช่น แบบโฮโลแกรม แบบเหลือบสีรุ้ง)
    glitter_glue_base_solvent_type:
      name: กาวกลิตเตอร์ชนิดตัวทำละลาย/ฐานกาว
      description: อธิบายถึงส่วนประกอบหลักของกาวติดกลิตเตอร์ (ซึ่งเป็นข้อกังวลทั่วไปของผู้ซื้อเกี่ยวกับเรื่องการทำความสะอาดและความเข้ากันได้กับวัสดุต่างๆ)
    glitter_opacity_coverage:
      name: ความทึบแสง/การปกปิดของกลิตเตอร์
      description: ระบุระดับความทึบแสงของประกายกลิตเตอร์เมื่อทาลงไป
    glitter_use_suitability:
      name: ความเหมาะสมในการใช้กากเพชร
      description: แสดงเนื้อหาการใช้งานหลักที่ตั้งใจไว้หรือได้รับอนุมัติสำหรับผงกากเพชร
        (เช่น ใช้เพื่องานฝีมือเท่านั้น เกรดเครื่องสำอาง/ปลอดภัยสำหรับร่างกาย หรือปลอดภัยสำหรับอาหาร)
    glove_armor_placement:
      name: ตำแหน่งของเกราะป้องกันบนถุงมือ
      description: ระบุตำแหน่งของเกราะป้องกันบนถุงมือ
    glove_cuff_length:
      name: ความยาวของข้อมือถุงมือ
      description: ระบุความยาวของส่วนหุ้มข้อมือ/ปลายแขนของถุงมือแข่งรถ
    glove_finger_coverage:
      name: การคลุมนิ้วด้วยถุงมือ
      description: อธิบายระดับการปกคลุมนิ้วมือของถุงมือ ซึ่งมีตั้งแต่แบบปกคลุมเต็มนิ้วไปจนถึงแบบไม่ปกคลุมนิ้ว
    glove_finger_design:
      name: การออกแบบนิ้วถุงมือ
      description: ระบุลักษณะนิ้วของถุงมือ เช่น ถุงมือห้านิ้ว หรือถุงมือแบบ Mitten
    glove_fit_profile:
      name: รูปทรงความกระชับของถุงมือ
      description: อธิบาย Shapes ภายในและรูปทรงโดยรวมของถุงมือ เพื่อให้ผู้เล่นสามารถเลือกสัมผัสที่ตนเองชื่นชอบได้
    glove_insulation:
      name: ฉนวนกันความร้อนของถุงมือ
      description: ระบุโครงสร้างฉนวน/ความร้อน หรือระบบทำความร้อนของถุงมือ (เช่น ระดับฉนวน
        เทคโนโลยีซับใน/ฉนวน หรือชนิดทำความร้อน)
    glove_palm_material:
      name: วัสดุบริเวณฝ่ามือของถุงมือ
      description: ระบุวัสดุหลักที่ใช้บริเวณฝ่ามือของถุงมือ (พื้นผิวสัมผัส/จับหลัก)
        ซึ่งอาจแตกต่างจากหลังมือ
    glove_size:
      name: ขนาดถุงมือ
      description: ระบุขนาดมือโดยทั่วไปที่ถุงมือสำหรับชกมวยออกแบบมาให้พอดี มักระบุด้วยรหัสขนาดแบบเดียวกับเสื้อผ้า
        หรือขนาดสำหรับเด็ก
    glove_webbing_style:
      name: รูปแบบตาข่ายของถุงมือ
      description: อธิบายการออกแบบของตาข่ายหรือบริเวณจับลูกบอลของถุงมือ ซึ่งส่งผลต่อการควบคุมลูกบอล
        ความเหมาะสมของตำแหน่งการเล่น และความชอบของผู้เล่น
    glow_effect:
      name: เอฟเฟกต์เรืองแสง
      description: ระบุว่าลูกบอลเจลมีคุณสมบัติเรืองแสงในที่มืดหรือมีคุณสมบัติติดตามแสงสำหรับการเล่นในที่แสงน้อยหรือไม่
    glow_plug_connector_type:
      name: ประเภทขั้วต่อหัวเทียนเรืองแสง
      description: เครื่องอ่านไฟฟ้า/แบบขั้วต่อบนหัวเผาที่ใช้เชื่อมต่อกับชุดสายไฟรถยนต์
    glow_plug_heating_element_type:
      name: ชนิดขององค์ประกอบความร้อนหัวเทียนเรืองแสง
      description: ประเภท/เทคโนโลยีของตัวทำความร้อนที่ใช้ในหัวเทียนเรืองแสง
    glue_application_format:
      name: รูปแบบการใช้งานกาว
      description: ระบุรูปแบบหัวจ่าย/บรรจุภัณฑ์ที่ใช้ในการติดกาวสำหรับโรงเรียน
    glue_applicator_type:
      name: ประเภทอุปกรณ์ทากาว
      description: ระบุรูปแบบหัวจ่าย/ปลายหัวฉีดในตัวที่ใช้สำหรับจ่ายกาวเหลว
    glue_base_formulation:
      name: สูตรส่วนประกอบหลักของกาว
      description: บ่งบอกสูตรทางเคมี/เบสหลักของกาวเหลวในงานฝีมือ (เพื่อประสิทธิภาพ
        ความปลอดภัย และความคาดหวังในการทำความสะอาด)
    glue_gun_nozzle_style:
      name: รูปแบบหัวฉีดปืนกาว
      description: ระบุรูปแบบหัวฉีดของปืนกาว ซึ่งส่งผลต่อความแม่นยำในการใช้งานและการปกคลุมของกาว
    glue_safety_standard:
      name: มาตรฐานความปลอดภัยของกาว
      description: แสดงว่ากาวนั้นปลอดสารพิษ/ปลอดภัยสำหรับเด็กหรือไม่ ตามฉลากและมาตรฐานทั่วไป
    goal_frame_material:
      name: วัสดุโครงสร้างประตู
      description: ระบุวัสดุของเสา/โครงประตูฟุตบอล ซึ่งส่งผลต่อ น้ำหนัก การพกพา และความทนทานต่อสภาพอากาศ
    goal_size:
      name: ขนาดประตูฟุตบอล
      description: จำแนกประเภทประตูฟุตบอลออกเป็นกลุ่มขนาดมาตรฐานสำหรับแข่งขันหรือขนาดสำหรับฝึกซ้อม
        เพื่อการเลือกซื้อที่รวดเร็วขึ้นกว่าการดูจากขนาดเพียงอย่างเดียว
    goal_size_classification:
      name: การจำแนกขนาดประตูฟุตบอล
      description: แสดงถึงขนาดมาตรฐานของประตู (เช่น ขนาดมาตรฐานทั่วไป ขนาดเยาวชน ขนาดเล็ก)
        เพื่อให้ผู้ใช้สามารถเลือกอุปกรณ์ที่เหมาะสมกับระดับการเล่นของตนได้อย่างรวดเร็ว
    goal_size_standard:
      name: มาตรฐานขนาดประตู
      description: ระบุว่าประตูนั้นตรงตามมาตรฐานอย่างเป็นทางการหรือมาตรฐานกลุ่มอายุใด
        (เช่น ข้อบังคับของสหพันธ์กีฬาทางน้ำโลก, รุ่นอายุต่ำกว่า 12 ปี)
    goalie_configuration:
      name: การจัดตำแหน่งผู้รักษาประตู
      description: ระบุจำนวนผู้รักษาประตูต่อฝ่ายที่จัดวางไว้บนโต๊ะ (แบบอเมริกันใช้ผู้รักษาประตู
        3 คน เทียบกับแบบยุโรปใช้ผู้รักษาประตู 1 คน)
    goalie_playing_surface:
      name: พื้นที่หน้าประตู
      description: ระบุพื้นผิวหรือสภาพแวดล้อมหลักที่ชุดอุปกรณ์ผู้รักษาประตูฮอกกี้ได้รับการออกแบบมาเพื่อใช้งาน
    goalkeeper_glove_cut:
      name: รูปทรงของถุงมือผู้รักษาประตู
      description: ระบุรูปแบบการตัดเย็บ (โครงสร้าง) ของฝ่ามือ/นิ้วในถุงมือผู้รักษาประตู
        ซึ่งมีผลต่อความกระชับ การสัมผัสลูกบอล และการควบคุม
    goalkeeper_training_aid_type:
      name: ประเภทอุปกรณ์ช่วยฝึกซ้อมผู้รักษาประตู
      description: ระบุรูปแบบของอุปกรณ์ช่วยฝึกซ้อมผู้รักษาประตู ทำให้สามารถกรองข้อมูลได้อย่างแม่นยำ
    goblet_drum_playing_style:
      name: สไตล์การตีกลองโกเบลต์
      description: ไม่ว่าเครื่องดนตรีนั้นจะออกแบบมาเพื่อการเล่นด้วยมือเป็นหลัก หรือเพื่อใช้กับไม้ตี/ค้อนก็ตาม
    gobo_format:
      name: รูปแบบโกโบ
      description: ระบุขนาด/มาตรฐานของโกโบที่เครื่องฉายรองรับ (ตระกูลเส้นผ่านศูนย์กลางและความหนา)
        เพื่อให้มั่นใจถึงความเข้ากันได้กับโกโบสำรอง/โกโบแบบกำหนดเอง
    gobo_root_variety:
      name: พันธุ์รากโกโบ
      description: ระบุพันธุ์หรือสายพันธุ์เฉพาะของรากโกโบ (รากหญ้าเจ้าชู้)
    gobo_rotation:
      name: การหมุนของโกโบ
      description: ระบุว่าโกโบสามารถหมุนได้หรือไม่ และรองรับทิศทางการหมุนแบบใดบ้าง
    goggle_accessory_type:
      name: ประเภทอุปกรณ์เสริมแว่นตากันลม
      description: จำแนกประเภทอุปกรณ์เสริม (เช่น ฝาครอบ เคส สายรัด) เพื่อให้นักช้อปสามารถกรองชุดสินค้าที่หลากหลายภายในหมวดหมู่ร่มนี้ได้
    goggle_features:
      name: คุณสมบัติของแว่นตากันลม
      description: ระบุคุณสมบัติพิเศษด้านการใช้งานหรือการออกแบบที่แว่นตากันลมมีให้
    goggle_fit_design:
      name: การออกแบบความกระชับของแว่นตา
      description: อธิบายวิธีการออกแบบให้แว่นตานิรภัยพอดีกับใบหน้าหรือสวมใส่ รวมถึงความเข้ากันได้กับแว่นตานิรภัยแบบสวมทับ
        (OTG)
    goggle_gasket_material:
      name: วัสดุขอบยางของแว่นตา
      description: วัสดุของขอบยางที่แนบกับใบหน้า มีผลต่อความสบาย การแพ้ และการป้องกันการรั่วซึม
    goggle_integration:
      name: การผสานรวมของแว่นตา
      description: ไม่ว่าหมวกกันน็อคได้รับการออกแบบให้ใช้กับแว่นตาและ/หรือมีคุณสมบัติบูรณาการสำหรับแว่นตารัศมีของลูกค้าก็ตาม
    goggle_lens_shape:
      name: รูปทรงเลนส์แว่นตา
      description: กำหนดลักษณะความโค้งของเลนส์ทดแทน ซึ่งส่งผลต่อการบิดเบี้ยวและขอบเขตการมองเห็น
        (เช่น ทรงกระบอก ทรงกลม ทรงทอริก)
    goggle_lens_tint:
      name: สีของเลนส์แว่นตา
      description: กำหนดเฉดสีหรือพื้นผิวของเลนส์ ซึ่งส่งผลต่อการส่งผ่านแสง การรับรู้สี
        และรูปลักษณ์ที่สวยงาม
    goggle_strap_material:
      name: วัสดุสายรัดแว่นตา
      description: วัสดุหลักที่ใช้ทำสายรัดศีรษะมีผลต่อความทนทานและความสบายในการสวมใส่
    golf_accessory_set_purpose:
      name: วัตถุประสงค์ของชุดอุปกรณ์กอล์ฟ
      description: ระบุการใช้งานหลักหรือธีมของชุดอุปกรณ์กอล์ฟ
    golf_bag_style:
      name: สไตล์กระเป๋าใส่ไม้กอล์ฟ
      description: ระบุรูปแบบการออกแบบหรือการใช้งานหลักของถุงกอล์ฟ (เช่น แบบตั้งพื้น
        แบบมีล้อเลื่อน หรือแบบมีที่วางแขน)
    golf_ball_alignment_design:
      name: การออกแบบการจัดแนวลูกกอล์ฟ
      description: ระบุอุปกรณ์ช่วยจัดแนวภาพในตัวที่พิมพ์หรือขึ้นรูปไว้บนพื้นผิวของลูกบอล
    golf_ball_construction:
      name: โครงสร้างของลูกกอล์ฟ
      description: ระบุจำนวนชั้น/ชิ้นส่วนที่ใช้ในการผลิตลูกกอล์ฟ ซึ่งส่งผลต่อการหมุน
        ความรู้สึก และระยะทาง
    golf_ball_cover_material:
      name: วัสดุหุ้มลูกกอล์ฟ
      description: ระบุวัสดุที่ใช้ทำเปลือกนอกของลูกกอล์ฟ ซึ่งส่งผลต่อการหมุน ความทนทาน
        และสัมผัสในการตี
    golf_cart_cover_climate_use:
      name: การใช้งานผ้าคลุมรถกอล์ฟในสภาพอากาศต่างๆ
      description: ระบุสภาพอากาศ/ฤดูกาลหลักที่ผ้าคลุมนี้ได้รับการออกแบบมาให้ทนทาน
    golf_cart_enclosure_fit_type:
      name: ประเภทการติดตั้งโครงกั้นที่นั่งสำหรับรถกอล์ฟ
      description: ระบุว่าโครงสร้างนั้นออกแบบมาสำหรับจำนวนที่นั่ง/รูปทรงเฉพาะ หรือเป็นแบบปรับได้ตามขนาดที่นั่งทั่วไป
    golf_cart_intended_use:
      name: วัตถุประสงค์การใช้งานรถกอล์ฟ
      description: วัตถุประสงค์การใช้งานหลักที่รถกอล์ฟได้รับการออกแบบหรือกำหนดค่าไว้
    golf_club_number:
      name: หมายเลขไม้กอล์ฟ
      description: ระบุหมายเลขเฉพาะหรือรหัสเวดจ์ที่พิมพ์อยู่บนไม้กอล์ฟ (เช่น 5, PW,
        GW)
    golf_club_part_type:
      name: ประเภทชิ้นส่วนไม้กอล์ฟ
      description: จัดหมวดหมู่ชิ้นส่วนหรืออุปกรณ์เสริมของไม้กอล์ฟออกเป็นประเภทย่อยทั่วไป
        (เช่น อะแดปเตอร์ เฟอร์รูล หมุดถ่วงน้ำหนัก)
    golf_grip_size:
      name: ขนาดด้ามจับไม้กอล์ฟ
      description: ระบุประเภทขนาดภายนอกโดยรวมของด้ามจับไม้กอล์ฟ ซึ่งบ่งบอกถึงความหนาของด้ามจับเมื่อสัมผัสด้วยมือ
    golf_shoe_spike_type:
      name: ประเภทของปุ่มรองเท้ากอล์ฟ
      description: ระบุประเภทของระบบยึดเกาะที่ใช้บนพื้นรองเท้ากอล์ฟ (เช่น แบบมีปุ่มหรือไม่มีปุ่ม)
    golf_tee_style:
      name: รูปแบบของทีตั้งลูกกอล์ฟ
      description: อธิบายถึงรูปแบบโครงสร้างหรือการใช้งาน/การออกแบบของทีตั้งลูกกอล์ฟ
        ซึ่งส่งผลต่อความสูงของลูก ความทนทาน หรือการลดการหมุนของลูก
    golf_training_focus:
      name: จุดเน้นในการฝึกซ้อมกอล์ฟ
      description: แยกประเภททักษะหลักหรือลักษณะสินค้าที่ต้องการปรับปรุง
    golf_training_objective:
      name: วัตถุประสงค์การฝึกซ้อมกอล์ฟ
      description: ระบุทักษะหรือแง่มุมหลักของกีฬากอล์ฟที่อุปกรณ์ช่วยฝึกซ้อมนี้ออกแบบมาเพื่อปรับปรุง
    gong_profile_type:
      name: ประเภทรูปทรงของฆ้อง
      description: อธิบายลักษณะทางกายภาพของฆ้องโอเปร่า (เช่น ส่วนกลางแบนหรือนูน) ซึ่งมีผลอย่างมากต่อโทนเสียงและสไตล์การเล่น
    grading_scale:
      name: การให้คะแนนขยายสเกล
      description: ระบบการให้คะแนนที่ใช้กับเหรียญทองคำแท่งที่ได้รับการประเมินเกรด
        (เช่น Sheldon 1–70)
    grading_service:
      name: บริการจัดเกรด
      description: บริการตรวจสอบ/รับรองคุณภาพเหรียญหรือธนบัตรจากหน่วยงานภายนอก (เช่น
        PCGS, NGC)
    graduation_increment:
      name: ขีดบอกระยะ
      description: ระบุหน่วยย่อยที่พิมพ์/สลักไว้เล็กที่สุดบนระบบเกจวัดตะเข็บ (ความละเอียดของเครื่องหมาย)
    grain_processing_method:
      name: วิธีการแปรรูปธัญพืช
      description: ระบุวิธีการแปรรูปหลักที่ใช้กับเมล็ดธัญพืช (เช่น การต้ม การรีด การงอก)
        ซึ่งส่งผลต่อเวลาในการปรุงอาหาร เนื้อสัมผัส และคุณค่าทางโภชนาการ
    grand_piano_soundboard_material:
      name: วัสดุที่ใช้ทำซาวด์บอร์ดของแกรนด์เปียโน
      description: วัสดุหลักที่ใช้ทำแผ่นเสียงของเปียโน (แผ่นสะท้อนเสียง) Impact โทนเสียงและความทนทาน
    grappling_dummy_pose:
      name: ท่าโพสของหุ่นฝึกซ้อม
      description: อธิบายถึงท่าทางเริ่มต้นของหุ่นฝึกซ้อม ซึ่งเป็นตัวกำหนดว่าหุ่นนั้นรองรับการฝึกซ้อมและเทคนิคใดบ้าง
    grease_application:
      name: การใช้งานจาระบี
      description: ระบุส่วนประกอบหลักของยานพาหนะหรือการใช้งานที่จาระบีนั้นมีไว้สำหรับ
    grease_consistency_grade_nlgi:
      name: ระดับความข้นของจาระบี (NLGI)
      description: ระบุหมายเลขมาตรฐานความข้น NLGI ที่บ่งบอกถึงความแน่นของจาระบี (เช่น
        NLGI 2 คือจาระบีอเนกประสงค์ทั่วไป)
    grease_thickener_type:
      name: ประเภทสารเพิ่มความข้นของจาระบี
      description: ระบุระบบสารเพิ่มความข้น/สบู่ที่ใช้ในสูตรการผลิตจาระบี
    great_highland_bagpipes_blowpipe_valve_type:
      name: ประเภทวาล์วท่อเป่าของปี่สก็อตขนาดใหญ่
      description: ระบุระบบวาล์วกันกลับที่ใช้ในท่อเป่าลม
    great_highland_bagpipes_drone_configuration:
      name: รูปแบบท่อของปี่สก็อตไฮแลนด์
      description: ระบุประเภทของโดรนที่รวมอยู่ในชุด
    great_highland_bagpipes_mounting_material:
      name: วัสดุสำหรับติดตั้งปี่สก็อตไฮแลนด์
      description: ระบุวัสดุที่ใช้ทำส่วนตกแต่งบนปี่สก็อต (เช่น นิกเกิลเงิน งาช้างเทียม)
    greens_maturity_stage:
      name: ระยะการเจริญเติบโตของสีเขียว
      description: บ่งบอกถึงระยะการเจริญเติบโตของผักเมื่อเก็บเกี่ยว
    greens_preparation_state:
      name: สถานะการเตรียมผักใบเขียว
      description: อธิบายถึงวิธีการแปรรูปหรือบรรจุภัณฑ์ของผักใบเขียว (เช่น ล้างแล้ว
        หั่นแล้ว พร้อมรับประทาน)
    grenade_effect_type:
      name: ประเภทเอฟเฟกต์ระเบิดมือ
      description: ระบุถึงผลลัพธ์หลักที่เกิดจากระเบิดเพนต์บอลเมื่อถูกใช้งาน (เช่น
        ควัน สี แสงวาบ)
    grid_unit:
      name: หน่วย Grid
      description: ระบบการวัดหลักที่พิมพ์บนแผ่นรอง (หากมี Grid/ขยายสเกล)
    grille_emblem_provision:
      name: ช่องสำหรับติดตราสัญลักษณ์กระจังหน้า
      description: ระบุว่ากระจังหน้าสามารถติดตราสัญลักษณ์/ป้ายโลโก้ของ OEM ได้หรือไม่
        และอย่างไร
    grille_mounting_method:
      name: วิธีการติดตั้งกระจังหน้า
      description: ระบุวิธีการติดตั้งกระจังหน้าเข้ากับตัวรถ (เช่น การเปลี่ยนโดยตรงเทียบกับการสอด/การติดตั้งแบบเสียบ;
        แบบขันน็อตเทียบกับแบบคลิป/สแนป; ต้องเจาะรูเทียบกับไม่ต้องเจาะรู)
    grille_style:
      name: รูปแบบกระจังหน้า
      description: ระบุรูปแบบ/ดีไซน์ของกระจังหน้าของรถยนต์
    grip_chalk_form:
      name: รูปทรงชอล์กจับ
      description: ระบุลักษณะทางกายภาพของชอล์กที่ให้มาหรือใช้ร่วมกับถุงชอล์ก
    grip_coverage:
      name: การครอบคลุมการยึดเกาะ
      description: ระบุการมีอยู่และตำแหน่งของส่วนประกอบซิลิโคนหรือยางที่ช่วยให้จับถนัดมือบนถุงเท้า
    grip_design:
      name: ดีไซน์ด้ามจับ
      description: ระบุรูหรือรูปแบบรูของแผ่นน้ำหนักเพื่อความสะดวกในการพกพาและความหลากหลายในการออกกำลังกาย
    grip_enhancer_effect:
      name: เพิ่มประสิทธิภาพการยึดเกาะ
      description: อธิบายคุณลักษณะประสิทธิภาพหลักที่สินค้ามีให้ (เช่น การดูดซับความชื้น
        หรือการเคลือบเรซินแบบเหนียว)
    grip_enhancer_form:
      name: แบบฟอร์มเพิ่มประสิทธิภาพการยึดจับ
      description: ระบุรูปแบบหรือลักษณะทางกายภาพของผลิตภัณฑ์เพิ่มประสิทธิภาพการยึดเกาะ
        เพื่อให้นักกีฬาเลือกวิธีการใช้งานที่เหมาะสมได้
    grip_features:
      name: คุณสมบัติของมือจับ
      description: บ่งชี้ถึงคุณสมบัติการยึดเกาะในตัวที่ออกแบบมาเพื่อเพิ่มการยึดเกาะ
        ความสบาย หรือการควบคุมระหว่างการเล่น
    grip_material:
      name: วัสดุสำหรับยึดจับ
      description: ระบุวัสดุที่ใช้สำหรับพื้นผิวที่ยึดเกาะของกางเกง
    grip_shape:
      name: รูปร่างมือจับ
      description: อธิบายรูปทรงหรือรูปแบบของด้ามจับเมื่อมองจากด้านข้าง โดยเฉพาะอย่างยิ่งสำหรับด้ามจับไม้พัตเตอร์
    grip_surface_type:
      name: ประเภทพื้นผิวจับยึด
      description: อธิบายถึงการออกแบบพื้นผิวหน้าแป้นเหยียบ/พื้นผิวการยึดเกาะที่มีผลต่อการยึดเกาะและความรู้สึกในการควบคุม
    grip_tackiness_level:
      name: ระดับความเหนียวในการยึดเกาะ
      description: ให้คะแนนการยึดเกาะหรือความหนึบของพื้นผิวด้ามจับ ที่จะช่วยให้ผู้เล่นเลือกได้ระหว่างสัมผัสที่แห้งสบายหรือการจับที่เหนียวแน่นเป็นพิเศษ
    grip_tape_form:
      name: รูปแบบเทปกันลื่น
      description: ระบุรูปแบบการจัดส่งของผลิตภัณฑ์เทปกันลื่น (เช่น แผ่น ม้วน ชุดสเปรย์)
    grip_wax_form:
      name: รูปแบบของแว็กซ์สำหรับด้ามจับ
      description: จำแนกประเภทรูปแบบทางกายภาพที่จำหน่ายแว็กซ์สำหรับด้ามจับ
    gripper_coverage:
      name: การครอบคลุมของตัวจับยึด
      description: ระบุรูปแบบของตัวจับยึดบนรองเท้ากันลื่น โดยแสดงถึงพื้นที่ครอบคลุมและคุณสมบัติในการถอดออกได้
    grommet_application_material:
      name: วัสดุสำหรับติดตั้งห่วงโลหะ
      description: วัสดุหลักที่ต้องการติดตั้งห่วงโลหะ (เช่น ผ้า หนัง ไวนิล ผ้าใบกันน้ำ)
    grommet_duty_rating:
      name: เกร์มเม็ตดิวตี้เรตติ้ง
      description: ระบุระดับความแข็งแรง/การใช้งานที่ตั้งใจไว้ของวงแหวน
    grommet_style:
      name: รูปแบบห่วงตาไก่
      description: รูปแบบการประกอบ/การใช้งานของชุดห่วงตาไก่
    grooming_glove_texture_type:
      name: ประเภทพื้นผิวของถุงมือสำหรับดูแลขนสัตว์
      description: ระบุลักษณะพื้นผิวหลักที่ใช้ในการดูแลขนสัตว์ โดยบ่งบอกถึงวัตถุประสงค์
        เช่น การขัด การขัดเงา หรือการล้าง
    groove_orientation:
      name: ทิศทางการวางร่อง
      description: อธิบายทิศทาง/เลย์เอาต์ของร่องหรือสันบนเครื่องดนตรี
    groove_sampler_onboard_effects:
      name: เอฟเฟ็กต์ในตัวของ Groove sampler
      description: ระบุหมวดหมู่ของการประมวลผลเอฟเฟ็กต์ในตัวที่มีให้ใช้งานบน Groove
        Sampler (แบบแทรก/แบบหลัก) เช่น รีเวิร์บ ดีเลย์ คอมเพรสชั่น ดิสทอร์ชั่น อีควอไลเซอร์
        และฟิลเตอร์
    groove_sampler_storage_expansion_type:
      name: ประเภทการขยายพื้นที่จัดเก็บข้อมูลของ Groove Sampler
      description: ระบุตัวเลือกหน่วยความจำแบบถอดได้/ขยายได้ที่รองรับโดย groove sampler
    ground_attachment_method:
      name: วิธีการยึดกับพื้นดิน
      description: อธิบายถึงวิธีการยึดอาร์กส่งลูกเข้ากับพื้นสนาม ซึ่งส่งผลต่อความเสถียรและความเข้ากันได้กับพื้นผิว
    groupset_components_included:
      name: ส่วนประกอบชุดเกียร์ที่รวมอยู่ในชุด
      description: แสดงรายการส่วนประกอบระบบขับเคลื่อนเฉพาะที่รวมอยู่ใน groupset เพื่อให้เข้าใจชุดเนื้อหา
    gt_racing_class:
      name: คลาสแข่งรถ GT
      description: ระบุประเภท/คลาส GT ที่รถยนต์คันนั้นถูกสร้างหรือได้รับการรับรอง
    guard_construction_type:
      name: ประเภทโครงสร้างของอุปกรณ์ป้องกัน
      description: ไม่ว่าจะเป็นอุปกรณ์ป้องกันแบบแข็ง แบบมีแผ่นเกราะอ่อน หรือแบบปลอก/สายรัดก็ตาม
    guard_size_measurement_basis:
      name: หลักเกณฑ์การวัดขนาดการ์ด
      description: ขนาดสินค้าอ้างอิงจากการวัดแบบใด (เช่น เส้นรอบวงข้อศอก เส้นรอบวงข้อมือ
        เส้นรอบวงปลายแขน)
    guard_style:
      name: รูปแบบการปกป้อง
      description: จำแนกโครงสร้างหรือประเภทของที่ครอบใบมีดสเก็ต เพื่อช่วยให้/ร้านค้าสามารถแยกแยะความแตกต่างระหว่างที่ครอบใบมีดแบบแข็ง
        ที่ครอบใบมีดแบบนุ่ม ที่ครอบใบมีดแบบสปริง และแบบอื่นๆ ได้อย่างรวดเร็ว
    guava_flesh_color:
      name: สีเนื้อฝรั่ง
      description: ระบุสีเนื้อด้านในของผลฝรั่ง
    guava_variety:
      name: พันธุ์ฝรั่ง
      description: ระบุพันธุ์หรือสายพันธุ์เฉพาะของฝรั่งที่จำหน่าย (เช่น ฝรั่งแอปเปิ้ล
        ฝรั่งครีมเม็กซิกัน ฝรั่งไทย ฝรั่งสีชมพู ฝรั่งไร้เมล็ด ฝรั่งสีขาว)
    guide_material:
      name: วัสดุที่ใช้ทำตัวนำสาย
      description: วัสดุที่ใช้สำหรับตัวนำสายหรือส่วนแทรกของคันเบ็ด
    guide_type:
      name: ประเภทคู่มือ
      description: ระบุรูปแบบของตัวนำที่ติดตั้งบนคันเบ็ด เช่น แบบขาเดียว แบบลูกกลิ้ง
        หรือแบบงู
    guideline_markings:
      name: เครื่องหมายบอกแนว
      description: เครื่องหมายแสดงแนวการมองเห็นที่พิมพ์หรือฝังลงบนพื้นผิวของแผ่นรองขว้าง
        เพื่อช่วยในการฝึกซ้อมการขว้าง
    guiro_scraper_material:
      name: วัสดุขูดกวีโร
      description: วัสดุที่ใช้ทำที่ขูด/ที่ตีที่แถมมาให้หรือแนะนำให้ใช้กับกวีโร
    guiro_surface_style:
      name: สไตล์พื้นผิว Guiro
      description: อธิบายรูปแบบ/รูปทรงเรขาคณิตของพื้นผิวการเล่นที่ใช้ขูดเพื่อสร้างเสียง
    guitar_body_finish_type:
      name: ประเภทการตกแต่งตัวกีตาร์
      description: ระบุสีเคลือบที่ใช้กับตัวกีตาร์
    guitar_bridge_system_type:
      name: ประเภทของระบบสะพานสายของกีตาร์
      description: ระบบ Bridge/เทลพีซได้รับการออกแบบมาเพื่อรองรับการใช้งานร่วมกันและการค้นหาข้อมูลอย่างสะดวก
    guitar_case_style:
      name: สไตล์เคสกีตาร์
      description: ระบุรูปแบบการป้องกัน/โครงสร้างโดยรวมของกระเป๋าใส่กีตาร์หรือกระเป๋าใส่กีต้าร์
    guitar_humidifier_placement:
      name: ตำแหน่งการวางเครื่องเพิ่มความชื้นสำหรับกีตาร์
      description: ระบุตำแหน่งที่ควรใช้/วางเครื่องเพิ่มความชื้น โดยสัมพันธ์กับเครื่องดนตรีหรือสภาพแวดล้อม
    guitar_pedal_i_o_configuration:
      name: การกำหนดค่าอินพุต/เอาต์พุตของแป้นเหยียบกีตาร์
      description: ระบุว่าแป้นเหยียบรองรับการกำหนดเส้นทางการรับ/ส่งสัญญาณแบบโมโนหรือสเตอริโอ
    guitar_pedal_output_connector_type:
      name: ขั้วต่อเอาต์พุตเอฟเฟ็กต์กีตาร์
      description: ระบุประเภทขั้วต่อเอาต์พุตเสียงที่ใช้โดยแป้นเหยียบ
    guitar_slide_finish:
      name: จบด้วยการสไลด์กีตาร์
      description: การตกแต่งพื้นผิวของสไลด์ที่มีผลต่อผิวสัมผัสและแรงเสียดทานของเส้นสาย
    guitar_slide_style:
      name: รูปแบบสไลด์สายกีตาร์
      description: บ่งบอกการกำหนดรูปทรงของสไลด์กีตาร์หรือแท่งปรับเสียง และวิธีการสวมใส่/ใช้งาน
    guitar_stand_type:
      name: ขาตั้งกีตาร์แบบต่างๆ
      description: ระบุการกำหนดรูปทรงหลักของขาตั้งกีตาร์ (วิธีการซัพพอร์ต/จัดเก็บกีตาร์)
    guitar_strap_attachment_type:
      name: ประเภทการยึดสายสะพายกีตาร์
      description: ระบุวิธีการติดสายสะพายเข้ากับกีตาร์ (หรือปุ่มยึดสายสะพาย) รวมถึงการใช้ปลายสายแบบดั้งเดิมหรือระบบปลดเร็ว
    guitar_strap_end_material:
      name: วัสดุปลายสายสะพายกีตาร์
      description: วัสดุที่ใช้กับปลายสายรัด/ พอดี (ส่วนที่ติดกับสายรัดหรือระบบล็อคสายรัด)
    guitar_strap_features:
      name: คุณสมบัติของสายสะพายกีตาร์
      description: คุณสมบัติการใช้งานที่โดดเด่นของสายสะพายกีตาร์นอกเหนือจากขนาด/วัสดุพื้นฐาน
        (สามารถเลือกได้หลายแบบ)
    guitar_string_coating:
      name: การเคลือบสายกีตาร์
      description: ระบุว่าสายกีตาร์มีสารเคลือบป้องกันหรือไม่ และหากมี ให้ระบุรูปแบบของสารเคลือบด้วย
    guitar_string_gauge_type:
      name: ประเภทของขนาดสายกีตาร์
      description: ประเภทของขนาดสายกีตาร์โปร่งที่วางจำหน่าย (เช่น เบามาก เบา ปานกลาง)
        โดยทั่วไปจะประมาณขนาดจากความหนาของสาย E สูงสุด แต่ช่วงขนาดที่แน่นอนอาจแตกต่างกันไปตามผู้ผลิต
    guitar_string_set_gauge_category:
      name: กีต้าร์ หรือ ตั้งเกจหมวด
      description: ขนาดสายกีตาร์ที่นิยมใช้กันทั่วไป (โดยปกติจะนับจากสาย E สูง / สายที่
        1)
    guitar_string_winding_type:
      name: ประเภทการพันสายกีตาร์
      description: ระบุลักษณะการพันด้านนอกของแผล ในชุด
    guitar_tuning_peg_button_shape:
      name: รูปทรงปุ่มลูกบิดปรับสายกีตาร์
      description: รูปทรง/สไตล์ของลูกบิดปรับสาย/ปุ่มปรับสาย
    guitar_tuning_peg_configuration:
      name: การจัดเรียงลูกบิดปรับสายกีตาร์
      description: ชุดจูนเนอร์ไลเอาต์สำหรับเฮดสต็อก
    guitar_tuning_peg_mounting_style:
      name: รูปแบบการติดตั้งลูกบิดปรับสายกีตาร์
      description: วิธีการติดตั้งลูกบิดปรับสายเข้ากับหัวกีตาร์ (แบบใช้บูชและแบบป้องกันการหมุน)
    guitar_tuning_peg_shaft_type:
      name: การจัดเรียงลูกบิดปรับสายกีตาร์
      description: แกนพันสายเป็นแบบทึบหรือแบบผ่าซีก และวิธีการยึดล็อกสายเป็นอย่างไร
    guitar_tuning_peg_style:
      name: รูปแบบลูกบิดปรับสายกีตาร์
      description: รูปแบบและโครงสร้างการติดตั้งของลูกบิดปรับสายกีตาร์ที่ใช้กับส่วนหัวของเครื่องดนตรี
        (เช่น เฟืองปิดสนิท เทียบกับ เฟืองเปิด, แบบล็อค, แบบแยกเสา)
    gum_condition:
      name: หมากฝรั่งอีกครั้งสินค้า
      description: สภาพ/สถานะของกาวด้านหลังแสตมป์ (เช่น ไม่เคยติด, ติดแล้ว, ไม่มีกาว)
    gun_action_type:
      name: ประเภทกลไกการทำงานของปืน
      description: ประเภทกลไกที่ใช้ในการบรรจุ/ยิง (เช่น ระบบลูกเลื่อน, ระบบคันโยก)
    gun_operational_status:
      name: สถานะการทำงานของปืน
      description: ระบุว่าปืนสะสมนั้นถูกทำให้ใช้งานไม่ได้/ยิงไม่ได้แล้วหรือไม่ (และลักษณะการนำเสนอ)
    gun_type:
      name: ประเภทปืน
      description: บ่งบอกการกำหนดรูปแบบอาวุธโดยทั่วไปของปืนโบราณ
    gusset_material:
      name: วัสดุส่วนเป้ากางเกง
      description: ระบุวัสดุที่ใช้ทำซับในเป้ากางเกง ซึ่งส่งผลต่อการระบายอากาศ สุขอนามัย
        และความสบายในการสวมใส่
    gymnastics_discipline:
      name: ประเภทกีฬายิมนาสติก
      description: ระบุสาขาของกีฬายิมนาสติกที่ผลิตภัณฑ์นี้มีไว้สำหรับ (เช่น ยิมนาสติกศิลป์
        ยิมนาสติกลีลา ยิมนาสติกกายกรรม)
    hair_extension_texture:
      name: เท็กซ์เจอร์ของเส้นผมต่อ
      description: อธิบายถึงลักษณะการม้วนงอ การหยัก หรือลวดลายของเส้นผมต่อ
    hair_net_style:
      name: รูปแบบตาข่ายคลุมผม
      description: ระบุรูปแบบหรือโครงสร้างของตาข่ายคลุมผม (เช่น ตาข่ายคลุมผมทรงพอง
        ตาข่ายคลุมผมทรงหลวม ตาข่ายคลุมผมมวย)
    hair_quality_grade:
      name: ระดับคุณภาพของเส้นผม
      description: ระบุถึงมาตรฐานคุณภาพ/แหล่งกำเนิดของเส้นผมในระดับอุตสาหกรรม
    halter_style:
      name: สไตล์คล้องคอ
      description: ระบุรูปแบบการใช้งานหรือการออกแบบของบังเหียน (เช่น เชือก, แบบปลดได้,
        สำหรับการแสดง) ช่วยให้ผู้ซื้อเลือกบังเหียนที่เหมาะสมกับการใช้งานที่ต้องการ
    hammock_style:
      name: สไตล์เปลญวน
      description: อธิบายรูปแบบโครงสร้างหรือวิธีการสร้างเปลญวน
    hand_and_foot_coverage:
      name: การปกคลุมมือและเท้า
      description: อธิบายถึงถุงมือและรองเท้าหุ้มข้อแบบแยกชิ้นหรือแบบติดมากับตัวรองเท้า
        ซึ่งปกคลุมมือและ/หรือเท้า
    hand_cymbal_set_configuration:
      name: รูปแบบชุดฉาบมือ
      description: ระบุว่าสินค้าจำหน่ายเป็นคู่ ฉาบเดี่ยว หรือเป็นชุดใหญ่
    hand_drum_head_material:
      name: วัสดุหน้ากลองของกลองมือ
      description: วัสดุที่ใช้ทำหนังกลอง (เมมเบรน) สำหรับกลองแก้วทรงสูง
    hand_exerciser_style:
      name: แบบอุปกรณ์บริหารมือ
      description: จำแนกประเภทโดยรวมของรูปแบบหรือกลไกการทำงานของอุปกรณ์บริหารมือ
    hand_guard_backbone_material:
      name: วัสดุโครงสร้างหลักของการ์ดป้องกันมือ
      description: วัสดุที่ใช้ทำโครงสร้างกระดูกสันหลัง (ถ้ามี) ซึ่งเป็นตัวกำหนดความแข็งแรงและการป้องกัน
    hand_guard_coverage_style:
      name: รูปแบบการครอบคลุมของการ์ดป้องกันมือ
      description: อธิบายถึงลักษณะการครอบคลุม/รูปทรงของการ์ดป้องกันมือ ซึ่งส่งผลต่อการป้องกันลม/แรงกระแทก
    hand_guard_mounting_type:
      name: ประเภทการติดตั้งการ์ดป้องกันมือ
      description: ระบุวิธีการติดตั้งการ์ดป้องกันมือเข้ากับรถจักรยานยนต์ (เช่น แบบติดปลายแฮนด์พร้อมแคลมป์ด้านใน
        หรือแบบใช้แคลมป์อย่างเดียว)
    hand_guard_set_configuration:
      name: รูปแบบชุดการ์ดป้องกันมือ
      description: ไม่ว่าสินค้าจะขายแบบซ้าย/ขวาหรือแบบด้านเดียวก็ตาม
    hand_guard_style:
      name: สไตล์การ์ดป้องกันมือ
      description: อธิบายลักษณะการออกแบบหรือรูปแบบของที่ครอบฟัน (เช่น แบบปิด แบบเปิด
        แบบเต็ม แบบบาง แบบมาตรฐาน)
    hand_guard_weather_protection:
      name: การป้องกันสภาพอากาศของการ์ดป้องกันมือ
      description: ระบุระดับการป้องกันสภาพอากาศที่การ์ดป้องกันมือมีให้
    hand_paddle_strap_type:
      name: สายรัดแบบพายมือ
      description: ระบุประเภทของสายรัด หรือการไม่มีสายรัด ที่ใช้ยึดแผ่นพายมือเข้ากับมือของผู้ใช้
    hand_percussion_mount_attachment_mechanism:
      name: กลไกยึดแท่นตีมือ
      description: ระบุวิธีการติดตั้งฐานยึดเข้ากับขาตั้ง ชั้นวาง หรืออุปกรณ์อื่นๆ
        (เช่น แบบหนีบ หรือแบบยึดกับแกน)
    hand_percussion_mounting_handling:
      name: การติดตั้ง/การถือเครื่องดนตรีประเภทเคาะด้วยมือ
      description: ไม่ว่าเครื่องมือนั้นจะอยู่ในรูปแบบถือด้วยมือ สวมใส่ ติดตั้ง หรือวางบนโต๊ะ/พื้นระหว่างการใช้งานตามปกติก็ตาม
    hand_percussion_pitch_type:
      name: ประเภทระดับเสียงของเครื่องดนตรีประเภทเคาะด้วยมือ
      description: ระบุว่าเครื่องดนตรีนั้นให้เสียงที่มีระดับเสียงแน่นอน (ปรับได้/โน้ต)
        หรือเสียงที่ไม่มีระดับเสียงแน่นอน
    hand_percussion_playing_method:
      name: วิธีการเล่นเครื่องดนตรีประเภทเคาะด้วยมือ
      description: วิธีการเล่นเครื่องดนตรีโดยทั่วไปเพื่อให้เกิดเสียง (เช่น การเขย่า
        หรือการขูด)
    hand_percussion_set_configuration:
      name: รูปแบบชุดเครื่องดนตรีประเภทเคาะด้วยมือ
      description: ไม่ว่าสินค้าจะเป็นเครื่องดนตรีชิ้นเดียว จับคู่ หรือชุดหลายชิ้น
    hand_percussion_size_class:
      name: ประเภทขนาดของเครื่องดนตรีประเภทเคาะด้วยมือ
      description: ขนาดโดยทั่วไปของเครื่องดนตรี ในกรณีที่ไม่มีการวัดค่าที่แม่นยำไว้หรือเพื่อความสะดวกในการกรองข้อมูล
    hand_sewing_needle_point_type:
      name: ชนิดของปลายเข็มเย็บมือ
      description: Shapes/ลักษณะของปลายเข็มเย็บผ้าที่ใช้เจาะวัสดุต่าง ๆ (เช่น ผ้าทอ
        ผ้าถัก หนัง) หรือเส้นด้าย
    hand_support_level:
      name: ระดับการรองรับมือ
      description: ระบุระดับการรองรับหรือการบีบอัดที่ถุงมือ ผ้าพันมือ หรือสายรัดให้ไว้
    hand_support_size:
      name: ขนาดของอุปกรณ์พยุงมือ
      description: ขนาดของถุงมือ สายรัด หรือผ้าพันมือที่ผู้ผลิตระบุ (XS-XXL หรือขนาดเดียว)
    handball_ball_type:
      name: ประเภทของลูกแฮนด์บอล
      description: ระบุประเภทการใช้งานที่ตั้งใจไว้ของลูกแฮนด์บอล เช่น การแข่งขัน การฝึกซ้อม
        หรือการเล่นบนชายหาด
    handball_playing_surface:
      name: พื้นสนามสำหรับเล่นแฮนด์บอล
      description: ระบุพื้นผิวการเล่นที่เหมาะสมที่สุดสำหรับกีฬาแฮนด์บอล
    handball_target_type:
      name: เป้าหมายแฮนด์บอล
      description: ระบุรูปแบบหรือดีไซน์ของเป้าสำหรับฝึกซ้อมแฮนด์บอลแบบทีม
    handbrake_actuation_type:
      name: ประเภทการทำงานของเบรกมือ
      description: ระบุวิธีการใช้งานเบรกมือ
    handbrake_orientation:
      name: การวางแนวเบรกมือ
      description: ระบุว่าเบรกมือนี้ออกแบบมาสำหรับรถยนต์พวงมาลัยซ้ายหรือพวงมาลัยขวา
        หรือเป็นแบบใช้ได้กับรถยนต์ทุกรุ่น
    handgun_grip_material:
      name: วัสดุสำหรับด้ามจับปืนพก
      description: วัสดุหลักของด้ามจับ/แผ่นด้ามปืนพก
    handle_configuration:
      name: รูปแบบโครงสร้างด้ามจับ
      description: อธิบายรูปแบบโครงสร้างของด้ามจับเวคบอร์ด (เช่น ด้ามจับเดี่ยว ด้ามจับคู่
        ทรงตัววีลึก ทรงตัวที) เพื่อให้ผู้ซื้อสามารถเลือกให้เหมาะสมกับทักษะ ทริค หรือประเภทของบอร์ดได้
    handle_ergonomics:
      name: หลักการออกแบบตามหลักสรีรศาสตร์ของด้ามจับ
      description: อธิบายถึงคุณลักษณะตามหลักสรีรศาสตร์ของด้ามจับที่ออกแบบมาเพื่อเพิ่มความสะดวกสบายและการควบคุม
    handle_grip_material:
      name: วัสดุที่ใช้ทำด้ามจับ
      description: ระบุวัสดุที่ใช้ทำพื้นผิวด้ามจับ ซึ่งส่งผลต่อความสบายและการยึดเกาะ
        โดยเฉพาะอย่างยิ่งเมื่อเปียก
    handle_grip_type:
      name: ประเภทด้ามจับ
      description: ระบุวัสดุหุ้มด้ามจับหรือรูปแบบพื้นผิวที่ออกแบบมาเพื่อเพิ่มความสบายและการควบคุม
    handle_shape:
      name: รูปทรงด้ามจับ
      description: รูปร่างหน้าตัดหรือรูปทรงของด้ามจับ
    handlebar_design:
      name: การออกแบบแฮนด์
      description: ระบุประเภทของราวจับบนเครื่องสเต็ปเปอร์ เช่น ไม่มี, แบบคงที่, ปรับความสูงได้,
        พับได้ หรือแบบใช้ยางยืด
    handlebar_type:
      name: ประเภทแฮนด์
      description: ระบุรูปแบบของแฮนด์จักรยานที่ติดตั้งอยู่บนรถ ซึ่งมีผลต่อท่าทางการขี่
        การควบคุม และความสบายในการขี่
    handslide_bore_type:
      name: ประเภทรูของสไลด์มือ
      description: ระบุว่าทรอมโบนเบสใช้สไลด์แบบรูเดียวหรือสองรู
    handwear_cuff_style:
      name: รูปแบบข้อมือของถุงมือ
      description: อธิบายถึงรูปแบบการเย็บข้อมือหรือขอบถุงมือ ซึ่งส่งผลต่อการปกปิดและความกระชับพอดี
    handwear_insulation_material:
      name: วัสดุฉนวนสำหรับถุงมือ
      description: ระบุวัสดุฉนวนหรือวัสดุบุภายในที่ใช้สำหรับถุงมือหรือถุงมือแบบไม่มีนิ้ว
    handwear_size:
      name: ขนาดถุงมือ
      description: ระบุขนาดของถุงมือหรืออุปกรณ์สวมมืออื่นๆ เพื่อให้สวมใส่ได้พอดี
    hang_glider_design:
      name: การออกแบบเครื่องร่อน
      description: จำแนกประเภทโครงสร้างของเครื่องร่อน (เช่น ปีกอ่อน ปีกแข็ง เครื่องร่อนติดเครื่องยนต์)
    hanger_thread_size:
      name: ขนาดเกลียวของตัวแขวน
      description: ระบุขนาดเกลียว/มาตรฐานที่ใช้ในการติดตั้งตัวแขวนเข้ากับขาตั้งคันเบ็ดหรืออุปกรณ์แจ้งเตือนการกัดเหยื่อ
        เพื่อให้มั่นใจถึงความเข้ากันได้
    hanging_suspension_method:
      name: วิธีการแขวน
      description: ระบุฮาร์ดแวร์หรือระบบหลักที่ใช้ในการแขวนชิงช้า (เช่น เชือก โซ่
        โครงขาตั้ง)
    hardtop_finish_type:
      name: ประเภทการตกแต่งหลังคาแข็ง
      description: ระบุสถานะการตกแต่งภายนอกของหลังคาแข็ง (เช่น ลงสีรองพื้นแล้ว หรือทาสีแล้ว)
        ซึ่งส่งผลต่อความพร้อมในการติดตั้งและรูปลักษณ์
    hardtop_shell_material:
      name: วัสดุเปลือกแข็ง
      description: ระบุวัสดุหลักของโครงสร้างแข็งของหลังคาแข็งของรถยนต์ (ไม่ใช่ผ้าคลุม)
        เช่น ไฟเบอร์กลาสหรืออลูมิเนียม
    hardtop_window_configuration:
      name: การกำหนดค่าหน้าต่างหลังคาแข็ง
      description: อธิบายว่ามีหน้าต่างแบบใดบ้างที่มาพร้อมกับหลังคาแข็ง และการจัดวางหน้าต่างเหล่านั้นเป็นอย่างไร
    harmonica_comb_material:
      name: วัสดุที่ใช้ทำตัวหวีของฮาร์โมนิกา
      description: วัสดุที่ใช้ทำตัวหวีของฮาร์โมนิกา (ตัวห้องอากาศ)
    harmonica_cover_plate_finish:
      name: แผ่นปิดฮาร์โมนิกาสำเร็จรูป
      description: ระบุลักษณะพื้นผิวหรือการเคลือบผิวของแผ่นปิดฮาร์โมนิกา
    harmonica_cover_plate_material:
      name: วัสดุแผ่นปิดฮาร์โมนิกา
      description: วัสดุที่ใช้สำหรับแผ่นปิดด้านนอก
    harmonica_finish:
      name: ฮาร์โมนิกาจบ
      description: ลักษณะพื้นผิวของแผ่นปิด/ตัวฮาร์โมนิกา
    harmonica_included_accessories:
      name: อุปกรณ์เสริมที่มาพร้อมกับฮาร์โมนิกา
      description: บ่งบอกว่าอุปกรณ์เสริมใดบ้างที่มาพร้อมกับฮาร์โมนิกา
    harmonica_note_range:
      name: ช่วงเสียงของฮาร์โมนิกา
      description: การจำแนกช่วงเสียงของเครื่องดนตรีที่ใช้ในบริบทของวงออร์เคสตรา (เช่น
        เบส บาริโทน เทเนอร์)
    harmonica_reed_plate_material:
      name: วัสดุแผ่นลิ้นฮาร์โมนิกา
      description: วัสดุที่ใช้ทำแผ่นลิ้น (เช่น ทองเหลือง สแตนเลส อลูมิเนียม)
    harmonica_system_type:
      name: ระบบ/ประเภทฮาร์โมนิกา
      description: ระบุระบบหรือรูปแบบเฉพาะของฮาร์โมนิกาในวงออร์เคสตรา (เช่น คอร์ด
        เบส บาริโทน โพลีโฟเนีย)
    harmonica_tuning_system:
      name: ระบบการปรับเสียงฮาร์โมนิกา
      description: ระบุการปรับจูนไลเอาต์/ระบบที่ใช้โดยฮาร์โมนิก้า (เช่น การปรับแต่ง
        Richter, Solo, Orchestra)
    harness_shell_type:
      name: ประเภทเปลือกหุ้มสายรัด
      description: อธิบายถึงความแข็งแรงของโครงสร้างเปลือกหุ้มของสายรัด (เช่น ซอฟต์เชลล์,
        ฮาร์ดเชลล์, ไฮบริด)
    harness_style:
      name: สไตล์สายรัด
      description: กำหนดรูปแบบโครงสร้าง/การออกแบบของอุปกรณ์พยุงตัว เช่น แบบคาดเอว
        แบบคาดสะโพก แบบคาดหน้าอก/เสื้อกั๊ก แบบเข็มขัดปีก แบบกางเกงขาสั้น หรือแบบผสมผสาน
    harness_type:
      name: ประเภทของสายรัดนิรภัย
      description: จำแนกประเภทโครงสร้างของสายรัดนิรภัยสำหรับการปีนเขา เช่น แบบนั่ง
        แบบคลุมทั้งตัว หรือแบบรัดเฉพาะหน้าอก
    harp_action_type:
      name: ประเภทการทำงานของพิณ
      description: กลไกหลักที่ใช้ในการเปลี่ยนระดับเสียง/เครื่องหมายกำกับเสียงบนพิณ
    harp_finish:
      name: การตกแต่งพื้นผิวพิณ
      description: ลักษณะพื้นผิวของตัวพิณ (เช่น ผิวไม้ธรรมชาติ ย้อมสี ทาสี เคลือบเงา)
    harp_included_accessories:
      name: อุปกรณ์เสริมที่มาพร้อมพิณ
      description: ระบุอุปกรณ์เสริมที่แถมมากับการซื้อพิณเท้าเหยียบ
    harvest_method:
      name: วิธีการเก็บเกี่ยว
      description: ระบุว่าอาหารทะเลนั้นได้มาจากการจับในธรรมชาติ การเลี้ยงในฟาร์ม หรือได้มาด้วยวิธีอื่น
    harvest_stage:
      name: ขั้นตอนการเก็บเกี่ยว
      description: ระบุระยะการเจริญเติบโตของผักร็อกเก็ตที่เก็บเกี่ยว เช่น ไมโครกรีน
        ใบอ่อน หรือช่อที่โตเต็มที่
    hat_style:
      name: สไตล์หมวก
      description: การออกแบบ/รูปแบบของหมวกปาร์ตี้ (เช่น หมวกทรงกรวย หมวกมงกุฎ หมวกทรงสูง
        หมวกบังแดด) เพื่อสะท้อนให้เห็นถึงลักษณะพื้นฐานของสิ่งของชิ้นนั้น
    hazard_signal_mode:
      name: โหมดสัญญาณอันตราย
      description: รูปแบบ/โหมดการส่องสว่างที่เลือกได้สำหรับไฟสัญญาณฉุกเฉินบนถนนแบบ
        LED/อิเล็กทรอนิกส์
    head_configuration:
      name: การกำหนดค่าหัว
      description: ระบุว่าหัวขวานมีลักษณะเป็นคมหยัก ค้อน ทั้งสองอย่าง หรือไม่มีเลย
        ซึ่งส่งผลโดยตรงต่อการใช้งานบนพื้นน้ำแข็งและภูมิประเทศแบบผสม
    head_material:
      name: วัสดุที่ใช้ทำหน้ากลอง
      description: วัสดุที่ใช้ทำหัวกลองที่มาพร้อมกับควินโต
    head_movement_type:
      name: ประเภทการเคลื่อนไหวส่วนหัว
      description: ความสามารถในการเคลื่อนที่ไปในทิศทางต่างๆ ของขาตั้งกล้องหรือส่วนหัวขาตั้งกล้อง
        (เช่น การหมุนแนวนอน การเอียง การแกว่ง)
    head_side:
      name: ด้านหัวกลอง
      description: ระบุว่าหน้ากลองนั้นเป็นฝั่งที่ไว้สำหรับตี (ด้านที่ใช้ไม้ตี) ด้านก้อง
        (ด้านหน้า) หรือด้านใดด้านหนึ่งก็ได้
    head_weight_style:
      name: สไตล์หัวถ่วง
      description: ระบุการกำหนดค่าน้ำหนักที่ส่วนหัวของเหยื่อปลอม ซึ่งส่งผลต่ออัตราการจมและลักษณะที่ปรากฎ
    headband_embellishment:
      name: เครื่องประดับคาดผม
      description: ระบุองค์ประกอบตกแต่งที่ติดอยู่กับที่คาดผม (เช่น โบว์ ไข่มุก คริสตัล
        หูสัตว์)
    headboard_style:
      name: สไตล์หัวเตียง
      description: อธิบายลักษณะการออกแบบหรือรูปแบบการก่อสร้างของหัวเตียง Supply พร้อมกับเตียง
    headgear_strap_configuration:
      name: การกำหนดรูปแบบสายรัดหมวก
      description: ระบุจำนวนสายรัดที่ใช้ยึดอุปกรณ์ป้องกันศีรษะสำหรับนักมวยปล้ำ
    headjoint_crown_style:
      name: ทรงหัวข้อต่อแบบมงกุฎ
      description: ระบุรูปแบบหรือดีไซน์ของส่วนหัวฟลุต (ฝาปิดปลาย) ซึ่งอาจส่งผลต่อความสวยงามและน้ำหนัก/ความสมดุล
    headjoint_pitch_standard:
      name: มาตรฐานระดับเสียงหัวข้อต่อ
      description: ระบุมาตรฐานการปรับแต่งการออกแบบของส่วนหัว (เช่น A=440 เทียบกับ
        A=442)
    headliner_product_form:
      name: รูปแบบผลิตภัณฑ์แผ่นบุหลังคา
      description: ระบุว่าผลิตภัณฑ์นั้นเป็นชุดประกอบแผ่นบุหลังคาขึ้นรูปสำเร็จรูป ผ้าสำหรับเปลี่ยน
        หรือชิ้นส่วนสำหรับซ่อมแซม/ตกแต่ง
    headrest_mount_attachment_method:
      name: วิธีการยึดล็อกกับขาหมอนรองคอ
      description: ระบุวิธีการติดตั้งตัวยึดเข้ากับพนักพิงศีรษะ/เสาเบาะนั่ง
    headrest_provision:
      name: การจัดเตรียมพนักพิงศีรษะ
      description: ระบุว่ามีพนักพิงศีรษะรวมอยู่ด้วยหรือไม่ และ/หรือมีจุดสำหรับติดตั้งพนักพิงศีรษะหรือไม่
    headset_standard:
      name: มาตรฐานชุดหูฟัง
      description: ประเภทของการเชื่อมต่อระหว่างท่อคอจักรยานกับชุดถ้วยคอที่เฟรมนั้นๆ
        รองรับ
    headstall_style:
      name: สไตล์หัวบังเหียน
      description: จำแนกประเภทโครงสร้างหรือรูปทรงของหู/คิ้วของบังเหียน
    headwear_intended_use:
      name: วัตถุประสงค์การใช้งานอุปกรณ์สวมศีรษะ
      description: ระบุวัตถุประสงค์หลักหรือบริบทในการสวมผ้าโพกศีรษะ (เช่น ผมร่วงจากเคมีบำบัด
        การว่ายน้ำ พิธีกรรมทางศาสนา)
    hearing_enhancer_style:
      name: สไตล์เครื่องช่วยฟัง
      description: อธิบายลักษณะทางกายภาพของอุปกรณ์เพื่อให้ผู้ใช้สามารถเลือกได้ระหว่างแบบครอบหู
        แบบใส่ในหู แบบคล้องหลังศีรษะ และดีไซน์อื่นๆ
    heart_rate_monitoring_method:
      name: วิธีการตรวจสอบอัตราการเต้นของหัวใจ
      description: อธิบายวิธีการที่เครื่องบันทึกข้อมูลอัตราการเต้นของหัวใจระหว่างการออกกำลังกาย
    heart_rate_sensing_technology:
      name: เทคโนโลยีตรวจวัดอัตราการเต้นของหัวใจ
      description: ระบุวิธีการวัดทางสรีรวิทยาที่เครื่องตรวจวัดใช้ในการตรวจจับอัตราการเต้นของหัวใจ
        (เช่น ECG แบบไฟฟ้า เทียบกับ PPG แบบออปติคอล)
    heart_rate_sensor_placement:
      name: เซ็นเซอร์วัดอัตราการเต้นของหัวใจตำแหน่งวางตรงนั้น
      description: ระบุตำแหน่งที่สวมใส่หรือวางเซ็นเซอร์ (บนร่างกายหรือจักรยาน) ซึ่งส่งผลต่อความสะดวกสบายและความแม่นยำในการวัด
    heat_retention_technology:
      name: ความร้อนคำนึงเทคโนโลยีของลูกค้า
      description: อธิบายถึงเทคโนโลยี สารเคลือบ หรือวัสดุใดๆ ที่ช่วยเพิ่มการขับเหงื่อหรือการสร้างความร้อนสำหรับกางเกงรัดรูปที่เน้นการออกกำลังกาย
        (เช่น เอฟเฟกต์ซาวน่าของนีโอพรีน)
    heated_glass_feature:
      name: คุณสมบัติกระจกทำความร้อน
      description: ระบุว่ากระจกหน้าต่างมีองค์ประกอบทางไฟฟ้าในตัวหรือไม่ เช่น ตะแกรงไล่ฝ้าด้านหลัง
        และ/หรือเสาอากาศที่ฝังอยู่ในกระจก
    heater_control_actuation_method:
      name: วิธีควบคุมการทำงานของฮีตเตอร์
      description: ระบุวิธีการที่ระบบควบคุมฮีตเตอร์/ระบบปรับอากาศสั่งการกล่องควบคุมระบบปรับอากาศของรถยนต์
        (เช่น การควบคุมด้วยสายเคเบิล การควบคุมด้วยระบบสุญญากาศ หรือการส่งสัญญาณทางอิเล็กทรอนิกส์)
    heater_control_electrical_connector_type:
      name: ขั้วต่อไฟฟ้าควบคุมฮีตเตอร์
      description: ระบุรูปแบบ/อินเทอร์เฟซของขั้วต่อไฟฟ้าที่ใช้โดยชุดควบคุมฮีตเตอร์
        (เช่น แบบสายไฟต่อพ่วง หรือแบบปลั๊ก)
    heating_technology:
      name: เทคโนโลยีการให้ความร้อน
      description: ระบุกลไกการให้ความร้อนหลักที่เครื่องสร้างไอระเหยใช้เพื่อคอนเทนต์วัสดุให้กลายเป็นไอ
    heel_shape:
      name: รูปทรงส้นรองเท้า
      description: ระบุรูปแบบเรขาคณิตหรือรูปทรงของส้นรองเท้า ช่วยให้ผู้ซื้อสามารถกรองตามลักษณะโครงสร้างและความมั่นคงที่ต้องการ
        (เช่น ส้นเข็มหรือส้นบล็อก)
    helicopter_mission_type:
      name: ประเภทภารกิจเฮลิคอปเตอร์
      description: วัตถุประสงค์หลัก/บทบาทการใช้งานของเฮลิคอปเตอร์
    helicopter_rotor_configuration:
      name: การกำหนดค่าใบพัดเฮลิคอปเตอร์
      description: ระบุเลย์เอาต์ระบบใบพัดเฮลิคอปเตอร์ (การจัดเรียงใบพัดหลัก/ใบพัดหาง)
        เช่น ใบพัดหลักเดี่ยว + ใบพัดหาง, ใบพัดแกนร่วม, ใบพัดเรียงกัน หรือใบพัดประสานกัน
    helmet_accessory_type:
      name: ประเภทอุปกรณ์เสริมหมวกกันน็อค
      description: บ่งบอกชิ้นส่วนหรืออุปกรณ์เสริมของหมวกกันน็อคจักรยานโดยเฉพาะ เพื่อให้นักช้อปสามารถค้นหารายการที่ถูกต้องได้ทันที
    helmet_audio_connector_type:
      name: ประเภทขั้วต่อเสียงของหมวกกันน็อค
      description: ระบุประเภทตัวเชื่อมต่อเสียงของเครื่องบินที่ใช้โดยการสื่อสารของหมวกกันน็อค
        ลูกค้ากลุ่มเป้าหมาย (ถ้ามี)
    helmet_communication_system_readiness:
      name: ความพร้อมของระบบสื่อสารในหมวกกันน็อค
      description: หมวกกันน็อคนั้นได้รับการออกแบบให้รองรับระบบสื่อสารภายใน/บลูทูธหรือไม่
    helmet_construction_type:
      name: ประเภทโครงสร้างของหมวกนิรภัย
      description: อธิบายรูปแบบการผลิตของเปลือกและซับในหมวกกันน็อค (เช่น โฟม, เปลือกแข็ง,
        แบบผสม)
    helmet_fit_head_shape:
      name: ความกระชับของหมวกกันน็อค (รูปทรงศีรษะ)
      description: รูปทรงภายในที่ออกแบบมาเพื่อให้พอดีกับรูปทรงศีรษะที่แตกต่างกัน
    helmet_interior_liner_type:
      name: ซับในหมวกกันน็อคแบบใด
      description: ประเภทของแผ่นรองด้านใน และสามารถถอดซักได้หรือไม่
    helmet_liner_material:
      name: วัสดุซับในหมวกกันน็อค
      description: ระบุวัสดุของซับในหรือแผ่นรองด้านในที่ให้ความสบายและช่วยดูดซับแรงกระแทก
    helmet_retention_closure_type:
      name: ประเภทตัวล็อกยึดหมวกกันน็อค
      description: ระบุกลไกการปิด/ยึดสายรัดคางของหมวกกันน็อค (เช่น ห่วงรูปตัว D สองชั้น,
        กลไกแบบไมโครเมตริก)
    helmet_safety_certification:
      name: การรับรองความปลอดภัยของหมวกนิรภัย
      description: ระบุมาตรฐานความปลอดภัยหรือใบรับรองที่หมวกนิรภัยนั้นผ่านมาตรฐาน
    helmet_safety_certification_standard:
      name: มาตรฐานการรับรองความปลอดภัยของหมวกกันน็อค
      description: มาตรฐานความปลอดภัย/การรับรองที่หมวกกันน็อครถจักรยานยนต์ได้รับการรับรองว่าผ่านมาตรฐาน
    helmet_shell_material:
      name: วัสดุที่ใช้ทำเปลือกหมวกกันน็อค
      description: วัสดุหรือโครงสร้างเปลือกนอกหลักที่ใช้สำหรับหมวกนิรภัย
    helmet_size_system:
      name: ระบบขนาดหมวกกันน็อค
      description: ระบบการกำหนดขนาดที่ใช้ในการระบุขนาดหมวกนิรภัย
    helmet_sun_visor_type:
      name: แผ่นบังแดดสำหรับหมวกกันน็อค
      description: ระบุว่าหมวกกันน็อคมีแผ่นบังแดดแบบพับลงด้านใน แผ่นบังแดดด้านนอกแบบมีสี
        ทั้งสองอย่าง หรือไม่มีเลย
    helmet_vehicle_fit:
      name: หมวกกันน็อคพอดีกับรถ
      description: ประเภทของยานพาหนะ/การใช้งานในการขับขี่ที่หมวกกันน็อคนี้ออกแบบมาให้ใช้
    helmet_ventilation_adjustability:
      name: การปรับระดับการระบายอากาศของหมวกกันน็อค
      description: ระบุวิธีการควบคุมการระบายอากาศของหมวกกันน็อคโดยผู้ขับขี่
    helmet_ventilation_configuration:
      name: การกำหนดค่าการระบายอากาศของหมวกกันน็อค
      description: อธิบายลักษณะการจัดวางช่องระบายอากาศและการปรับแต่งของหมวกกันน็อค
        (เช่น ช่องระบายอากาศที่คาง ช่องระบายอากาศที่หน้าผาก/ช่องรับอากาศ ช่องระบายอากาศที่ปิดได้)
    helmet_visor_peak_adjustability:
      name: การปรับระดับกระบังหน้า/ปีกหมวกกันน็อค
      description: ส่วนบังแดด/กระบังหน้าของหมวกกันน็อคสำหรับขับขี่ออฟโรดนั้นสามารถปรับได้และ/หรือถอดออกได้หรือไม่
    helmet_visor_shield_optical_features:
      name: คุณสมบัติทางแสงของกระบังหน้าหมวกกันน็อค (ชิลด์)
      description: คุณสมบัติทางด้านทัศนศาสตร์และความเข้ากันได้ของแผ่นบังหน้า/กระบังหน้าหลัก
    helmet_visor_shield_type:
      name: ประเภทของกระบังหน้า/แผ่นบังตาหมวกกันน็อค
      description: แผ่นบังหน้า/กระบังหน้าหลักมีมาให้พร้อมกับหมวกกันน็อค
    hem_style:
      name: สไตล์ชายกางเกง
      description: ระบุรูปแบบการตกแต่งขอบขากางเกง เช่น เรียบ พับ หรือแบบไม่เย็บ ซึ่งมีผลอย่างมากต่อรูปลักษณ์ของเสื้อผ้า
    hemisphere_compatibility:
      name: ความเข้ากันได้กับซีกโลก
      description: ระบุว่าแผนที่ดาวนี้ออกแบบมาสำหรับซีกโลกใด โดยอิงจากกลุ่มดาวที่มองเห็นได้
    hemline_style:
      name: สไตล์ชายกระโปรง
      description: กำหนดรูปแบบหรือดีไซน์ของขอบล่างของชุดเดรส
    herbal_infusion_function:
      name: สรรพคุณการชงสมุนไพร
      description: บ่งบอกประโยชน์หลักด้านสุขภาพหรือการออกฤทธิ์สำหรับตลาดของการให้ยาทางหลอดเลือดดำ
    hex_size:
      name: ขนาดประแจหกเหลี่ยม
      description: ขนาดประแจหกเหลี่ยมที่จำเป็นสำหรับการติดตั้ง/ถอดหัวเทียน
    hi_hat_pair_type:
      name: รูปแบบการจับคู่ฉาบไฮแฮท
      description: ระบุว่ารายการสินค้านั้นมีไว้สำหรับการจับคู่เสียงบน/ล่าง หรือบุคคลธรรมดาที่เป็นส่วนประกอบของฉิ่ง
    hi_hat_sound_character:
      name: ลักษณะเสียงไฮแฮท
      description: อธิบายลักษณะเสียงโดยรวมเพื่อช่วยให้ผู้ซื้อคัดกรองตามเสียงที่ต้องการ
    high_visibility_class:
      name: ระดับการเห็นได้ชัดเจน
      description: ระบุระดับการจำแนกประเภทการมองเห็นตามมาตรฐาน ANSI/ISEA 107 ของเสื้อผ้า
    highback_style:
      name: สไตล์พนักพิงสูง
      description: อธิบายถึงรูปแบบโครงสร้าง/การออกแบบของพนักพิงสูงที่ Influence ลักษณะ
        Ride
    hitch_ball_diameter:
      name: เส้นผ่านศูนย์กลางของลูกบอลหัวต่อ
      description: เส้นผ่านศูนย์กลางของหัวบอล (ทรงกลม) ที่ประกบเข้ากับข้อต่อรถพ่วง
        (เช่น 1 7/8 นิ้ว, 2 นิ้ว, 2 5/16 นิ้ว, 50 มม.)
    hitch_ball_mounting_style:
      name: รูปแบบการติดตั้งหัวบอลลาก
      description: หัวบอลลากพ่วงเป็นแบบยึดด้วยน็อตมาตรฐาน แบบอัดแน่นตายตัวสำหรับชุดหัวลากเฉพาะ
        หรือแบบมีอุปกรณ์ยึดประกอบมาในตัว
    hobby_horse_handle_type:
      name: ประเภทด้ามจับม้าโยก
      description: ระบุโครงสร้างด้ามจับที่ใช้ในการจับหรือบังคับทิศทางม้าโยก
    hobby_horse_sound_features:
      name: คุณสมบัติเสียงของม้าโยก
      description: ระบุว่าม้าโยกมีเสียงประกอบหรือไม่ และเป็นเสียงประเภทใด
    hockey_goal_type:
      name: ประเภทของประตูฮอกกี้
      description: ระบุรูปแบบหรือวัตถุประสงค์การใช้งานของประตูฮอกกี้ (เช่น สนามน้ำแข็งมาตรฐาน,
        สนามกลางแจ้ง, สนามขนาดเล็ก)
    hockey_size_category:
      name: หมวดหมู่ขนาดฮอกกี้
      description: ระบุกลุ่มขนาดอุปกรณ์มาตรฐานที่ชิ้นส่วนนั้นเหมาะสม (เยาวชน, รุ่นจูเนียร์,
        รุ่นกลาง, รุ่นอาวุโส)
    hockey_size_segment:
      name: ขนาดอุปกรณ์ฮอกกี้
      description: ระบุอุปกรณ์ฮอกกี้มาตรฐาน ขนาดกลุ่ม ที่กำหนดแผ่นข้อมูลโดยรวมและความพอดี
    hold_surface_texture:
      name: ลักษณะพื้นผิวของที่จับ
      description: อธิบายถึงความหยาบหรือลักษณะผิวสัมผัสของพื้นผิวที่ใช้จับยึด
    home_decor_sewing_pattern_project_type:
      name: แบบแพทเทิร์นเย็บปักถักร้อยสำหรับตกแต่งบ้าน
      description: ระบุประเภทของของตกแต่งบ้านที่แบบตัดเย็บนั้นสามารถนำไปทำได้ (เช่น
        ปลอกหมอน ผ้าม่าน ผ้าปูโต๊ะ)
    homologation_rule_set:
      name: การรับรองมาตรฐาน / ชุดกฎเกณฑ์
      description: ระบุหน่วยงานที่ให้การรับรองหรือชุดกฎเกณฑ์ที่รถยนต์นั้นเป็นไปตามมาตรฐาน
        (ถ้ามี)
    honey_form:
      name: รูปแบบของน้ำผึ้ง
      description: ระบุรูปแบบทางกายภาพหรือการนำเสนอผลิตภัณฑ์ Honey
    honey_processing_method:
      name: วิธีการแปรรูปน้ำผึ้ง
      description: ระบุว่าน้ำผึ้งได้รับการแปรรูปหรือจัดการอย่างไรก่อนบรรจุภัณฑ์
    honey_variety:
      name: ชนิดของน้ำผึ้ง
      description: ระบุแหล่งที่มาของพืชหรือดอกไม้ที่ใช้ทำน้ำผึ้ง ว่าเป็นน้ำผึ้งจากดอกไม้ชนิดเดียวหรือหลายชนิด
        ซึ่งส่งผลโดยตรงต่อรสชาติ สี และราคา
    hood_configuration:
      name: รูปแบบโครงสร้างฮูด
      description: อธิบายการออกแบบและคุณสมบัติการปรับแต่งของฝาครอบเครื่องยนต์
    hood_design:
      name: การออกแบบฮู้ด
      description: ระบุลักษณะและรูปแบบของฮู้ดบนเสื้อผ้า
    hood_style:
      name: สไตล์ฮูด
      description: ระบุว่ามีฮู้ดหรือไม่ และรูปแบบของฮู้ดบนเสื้อผ้าชิ้นนั้นเป็นอย่างไร
    hood_type:
      name: ประเภทฮูด
      description: บ่งบอกลักษณะการออกแบบเป็นพิเศษของส่วนฮู้ดของเสื้อผ้า
    hook_and_eye_size_hook_number:
      name: ขนาดตะขอและห่วง (เบอร์ตะขอ)
      description: การกำหนดขนาด/หมายเลขตะขอและห่วงแบบมาตรฐาน (หากมี) ที่ใช้บนบรรจุภัณฑ์เพื่อระบุขนาดโดยรวมของตะขอและห่วง
    hook_and_loop_fastener_duty_rating:
      name: ระดับการใช้งานของตัวยึดแบบตีนตุ๊กแก
      description: ระบุระดับความแข็งแรง/การใช้งานที่ต้องการของตัวยึดแบบตีนตุ๊กแก
    hook_and_loop_fastener_format:
      name: รูปแบบตัวยึดแบบตีนตุ๊กแก
      description: ระบุรูปแบบทางกายภาพหรือรูปแบบบรรจุภัณฑ์ของผลิตภัณฑ์ตัวยึดแบบตีนตุ๊กแก
        (เช่น ม้วน/เทป จุด แถบ)
    hook_and_loop_fastener_side:
      name: ด้านตีนตุ๊กแก
      description: ระบุว่าผลิตภัณฑ์นั้นมีเฉพาะด้านขอเกี่ยว เฉพาะด้านห่วง หรือเป็นชุดที่มีทั้งสองด้าน
    hook_coating_finish:
      name: การเคลือบ/ผิวสำเร็จของตะขอ
      description: พื้นผิวทรีตเมนต์หรือการชุบที่ใช้กับตะขอเพื่อต้านทานการกัดกร่อน
        การซ่อนตัว หรือสี (เช่น นิกเกิลสีดำ หมายเลขประจำตัวผู้เสียภาษี)
    hook_configuration:
      name: การกำหนดค่าตะขอ
      description: อธิบายถึงลักษณะและรูปแบบของตะขอที่มาพร้อมกับเหยื่อล่อ
    hook_eye_style:
      name: รูปแบบของห่วงตะขอ
      description: ระบุรูปทรงหรือทิศทางของรูเบ็ด ซึ่งส่งผลต่อวิธีการผูกหรือติดเบ็ด
    hook_eye_type:
      name: ประเภทห่วงตะขอ
      description: ระบุการออกแบบของรูตะขอ ซึ่งมีผลต่อการเลือกเงื่อนและวิธีการผูกเบ็ด
    hook_loop_format:
      name: รูปแบบตีนตุ๊กแก
      description: ระบุรูปแบบทางกายภาพของตัวยึดแบบตีนตุ๊กแกสำหรับเย็บติด
    hook_loop_side:
      name: ด้านตีนตุ๊กแก
      description: ระบุว่าสินค้าเป็นแบบด้านขอเกี่ยว ด้านห่วง หรือเป็นชุดขอเกี่ยวและห่วงที่เข้าคู่กัน
    hook_material:
      name: วัสดุตะขอ
      description: ระบุวัสดุที่ใช้สำหรับตะขอ/หัวตะขอโดยเฉพาะ ซึ่งเป็นปัจจัยสำคัญต่อความแข็งแรงและความทนทานต่อการกัดกร่อนในการใช้งานในน้ำเค็ม
    hook_organizer_style:
      name: สไตล์ที่จัดระเบียบแบบตะขอ
      description: รูปแบบหรือลักษณะทางกายภาพของอุปกรณ์จัดเก็บแบบตะขอ (เช่น กล่อง ม้วน
        หรือซอง) ที่ใช้เพื่อรองรับการค้นหาและการกรองตามประเภทของอุปกรณ์จัดเก็บ
    hook_point_configuration:
      name: รูปแบบปลายตะขอ
      description: ระบุว่าตะขอมีสองจุด (แบบสองแฉก) หรือสามจุด (แบบสามแฉก)
    hook_point_type:
      name: แบบตะขอ
      description: อธิบายถึงลักษณะการลับคมหรือรูปทรงของปลายเบ็ดตกปลา ซึ่งส่งผลต่อความสามารถในการเจาะทะลุและยึดจับเหยื่อ
    hook_shank_length:
      name: ความยาวของก้านเบ็ด
      description: ระบุการจำแนกความยาวสัมพัทธ์ของก้านเบ็ด (เช่น สั้น ยาว) เพื่อให้เปรียบเทียบได้ง่ายทั้งในด้านการมองเห็นและการใช้งาน
    hooks_eyes_attachment_method:
      name: วิธีการยึดติดแบบตะขอและห่วง
      description: วิธีการติดตะขอและห่วงเข้ากับเสื้อผ้าหรือชิ้นงาน
    hop_up_type:
      name: ประเภทฮอปอัพ
      description: อธิบายระบบฮอปอัพที่ใช้ในการเพิ่มแรงหมุนให้กับลูกกระสุน BB เพื่อเพิ่มระยะและความแม่นยำ
    horse_blanket_type:
      name: ประเภทผ้าห่มม้า
      description: ระบุรูปแบบหลักหรือวัตถุประสงค์การใช้งานของผ้าห่มหรือผ้าคลุมม้า
    horse_brush_type:
      name: ประเภทแปรงสำหรับม้า
      description: จำแนกประเภทแปรงตามสไตล์การจัดแต่งทรงผมหรือวัตถุประสงค์เฉพาะ ทำให้ลูกค้าสามารถกรองข้อมูลได้โดยไม่ต้องแบ่งหมวดหมู่ให้ซับซ้อนขึ้น
    horse_care_purpose:
      name: วัตถุประสงค์ในการดูแลม้า
      description: วัตถุประสงค์หลักในการใช้งานของผลิตภัณฑ์นี้คือการดูแลม้า ครอบคลุมถึงสุขภาพ
        การดูแลขน และการจัดการต่างๆ
    horse_feed_stage:
      name: ขั้นตอนการให้อาหารม้า
      description: แสดงช่วงวัยหรือสถานะทางสรีรวิทยาของม้าที่ใช้ในการกำหนดสูตรอาหาร
    horse_groomer_type:
      name: ประเภทผู้ดูแลม้า
      description: จัดประเภทเครื่องมือตัดแต่งขนสัตว์เลี้ยง เพื่อให้ร้านค้าสามารถค้นหาเครื่องมือที่ต้องการได้อย่างรวดเร็ว
    horse_leg_protection_type:
      name: อุปกรณ์ป้องกันขาของม้า
      description: จำแนกประเภทตามรูปแบบหรือหน้าที่เฉพาะของรองเท้าสำหรับม้า ผ้าพันขา
        หรือผ้าพันแผล
    horse_model_breed:
      name: สายพันธุ์ม้าต้นแบบ
      description: ระบุสายพันธุ์ม้าที่แสดงในแบบจำลอง (ถ้ามี)
    hosiery_toe_style:
      name: สไตล์ปลายเท้าถุงน่อง
      description: อธิบายโครงสร้างของบริเวณปลายเท้าของถุงเท้า ซึ่งมีความสำคัญต่อความทนทานและการใช้งานร่วมกับรองเท้าเปิดปลายเท้าได้
    hot_air_balloon_basket_type:
      name: ประเภทตะกร้าบอลลูนอากาศร้อน
      description: ระบุรูปแบบ/โครงสร้างหลักของกระเช้า (เช่น แบบสปอร์ตมาตรฐาน, แบบพาณิชย์ความจุสูง,
        แบบแบ่งช่อง, แบบมีประตูเปิดเข้า) ที่ใช้สำหรับการขึ้นกระเช้าและการปฏิบัติงานที่กำหนด
    hot_air_balloon_burner_type:
      name: ประเภทหัวเผาบอลลูนลมร้อน
      description: ประเภท/การกำหนดค่าของระบบหัวเผาที่ติดตั้งบนบอลลูน
    hot_air_balloon_envelope_material:
      name: วัสดุหุ้มบอลลูนอากาศร้อน
      description: ผ้า/วัสดุหลักที่ใช้สำหรับตัวบอลลูน (ผ้าใบ)
    hotfix_application_tool:
      name: เครื่องมือแอปพลิเคชันโปรแกรมแก้ไขด่วน
      description: แนะนำให้ใช้เครื่องมือหรือแหล่งความร้อนใดในการติดพลอยเทียมแบบใช้ความร้อน
    hub_axle_type:
      name: ประเภทเพลาดุมล้อ
      description: บ่งบอกระบบการเชื่อมต่อ/ยึดแกนล้อที่ดุมล้อได้รับการออกแบบมา (แบบปลดเร็ว
        แกนล้อแบบทะลุ ฯลฯ)
    hub_motor_type:
      name: มอเตอร์ดุมล้อ
      description: อธิบายรูปแบบการสร้างมอเตอร์ดุมล้อ (แบบมีเกียร์, แบบขับตรง, แบบมีแปรงถ่าน,
        แบบไม่มีแปรงถ่าน) เพื่อให้ข้อมูลแก่ผู้ซื้อเกี่ยวกับลักษณะแรงบิด น้ำหนัก และประสิทธิภาพ
    hula_hoop_construction_type:
      name: ประเภทการสร้างห่วงฮูล่าฮูป
      description: อธิบายวิธีการสร้าง/ประกอบห่วง
    hula_hoop_features:
      name: คุณสมบัติของห่วงฮูล่าฮูป
      description: เน้นคุณสมบัติการใช้งานหรือการออกแบบที่โดดเด่นของห่วงฮูล่าฮูป
    hull_design:
      name: การออกแบบตัวเรือ
      description: อธิบาย Shapes ตัวเรือที่ Influence ประสิทธิภาพและลักษณะขนย้าย
    hull_type:
      name: ประเภทตัวเรือ
      description: อธิบายถึงรูปทรงของตัวเรือที่มีผลต่อสมรรถนะและความเสถียร
    humidifier_refill_medium_type:
      name: ประเภทของสารในเครื่องเพิ่มความชื้นในเคส
      description: ระบุชนิดของสารกักเก็บความชื้น/สารเติมแต่งที่ใช้ในเครื่องเพิ่มความชื้นในเคส
        (ส่วนที่ถูกทำให้เปียกหรือเปลี่ยนใหม่)
    humidifier_refill_method:
      name: วิธีการเติมน้ำในเครื่องทำความชื้น
      description: อธิบายวิธีการเติมความชื้นหรือเปลี่ยนวัสดุทำความชื้นในเครื่องเพิ่มความชื้น
    humidifying_medium:
      name: สารเพิ่มความชื้น
      description: ระบุส่วนประกอบ/ตัวกลางที่ทำให้เกิดความชื้นซึ่งใช้ในผลิตภัณฑ์ (ส่วนที่จะเปียก/ถูกกระตุ้น)
    hummus_base_ingredient:
      name: ส่วนผสมหลักของฮัมมัส
      description: ระบุพืชตระกูลถั่วหรือผักหลักที่ใช้ในการทำฮัมมัส
    hunting_call_type:
      name: ประเภทเสียงเรียกสัตว์
      description: จำแนกประเภทรูปแบบการทำงานหลักหรือกลไกของอุปกรณ์เรียกสัตว์ (เช่น
        แบบเป่าด้วยปาก แบบอิเล็กทรอนิกส์ แบบกล่อง) เพื่อให้นักล่าสามารถเลือกรูปแบบที่เหมาะสมกับความต้องการและระดับทักษะของตนได้อย่างรวดเร็ว
    hunting_dog_collar_function:
      name: ฟังก์ชั่นปลอกคอสุนัขล่าสัตว์
      description: จำแนกประเภทการใช้งานหลักหรือวัตถุประสงค์ของปลอกคอ ช่วยให้ผู้ซื้อสามารถคัดกรองผลิตภัณฑ์ตามฟังก์ชันต่างๆ
        เช่น การติดตาม การฝึกฝน การมองเห็น หรือการใช้งานทั่วไป
    hvac_control_functions:
      name: ฟังก์ชันควบคุมระบบปรับอากาศ
      description: ระบุว่า Functions ใดบ้างของระบบปรับอากาศ/ละลายน้ำแข็ง/การไหลเวียนของอากาศที่ถูกควบคุมโดยตัวเครื่อง
        (แบบกลไกหรือแบบอิเล็กทรอนิกส์)
    hybrid_drivetrain_configuration:
      name: การกำหนดค่าระบบขับเคลื่อนแบบไฮบริด
      description: ระบุสถาปัตยกรรมระบบ PHEV ที่อธิบายว่ามอเตอร์ไฟฟ้าและเครื่องยนต์สันดาปภายในให้แรงขับเคลื่อนอย่างไร
    hybrid_system_type:
      name: ระบบไฮบริดชนิด
      description: จำแนกประเภทสถาปัตยกรรมไฮบริดที่ใช้ในรถยนต์
    hybrid_truck_cab_type:
      name: ประเภทห้องโดยสารของรถบรรทุกไฮบริด
      description: ระบุรูปแบบห้องโดยสารของรถบรรทุก ซึ่งส่งผลต่อจำนวนที่นั่งและพื้นที่ภายใน
    hydration_bag_features:
      name: คุณสมบัติของกระเป๋าใส่น้ำดื่ม
      description: Highlight คุณสมบัติเด่นด้านการออกแบบหรือฟังก์ชันการใช้งานที่เฉพาะเจาะจงของกระเป๋าใส่น้ำดื่ม
    hydration_belt_features:
      name: คุณสมบัติของเข็มขัดใส่น้ำดื่ม
      description: ระบุคุณสมบัติเด่นที่ช่วยเพิ่มการใช้งาน ความปลอดภัย หรือความสะดวกสบายของเข็มขัดสำหรับใส่น้ำดื่ม
    hydration_bladder_compatibility:
      name: การใช้งานร่วมกันกับถุงน้ำดื่ม
      description: ระบุว่าเสื้อกั๊กนี้มีระบบถุงน้ำดื่มหรือรองรับระบบถุงน้ำดื่มหรือไม่
    hydration_mouthpiece_style:
      name: รูปแบบของหัวดื่มสำหรับระบบให้ความชุ่มชื้น
      description: ระบุการออกแบบหรือรูปแบบการใช้งานของปากเป่าหรือวาล์วของระบบส่งน้ำดื่ม
        ช่วยให้นักช้อปเลือกซื้ออุปกรณ์ดื่มน้ำได้ตามที่ต้องการและมั่นใจได้ถึงการใช้งานร่วมกันได้
    hydration_pack_style:
      name: สไตล์กระเป๋าใส่น้ำ
      description: ระบุรูปแบบโครงสร้างของกระเป๋าใส่น้ำ เช่น เป้สะพายหลังหรือเสื้อกั๊ก
        เพื่อช่วยในการคัดกรองความพอดีและการใช้งาน
    hydration_system_insulation:
      name: ฉนวนกันความร้อนของระบบน้ำ
      description: ระบุว่าถังเก็บน้ำและ/หรือท่อดื่มมีฉนวนกันความร้อนหรือไม่ เพื่อช่วยรักษาอุณหภูมิของน้ำในสภาพอากาศร้อนหรือเย็น
    hydration_valve_type:
      name: ประเภทวาล์วน้ำ
      description: ระบุรูปแบบของวาล์วสำหรับดื่มหรือปากดื่มที่มาพร้อมกับระบบหรือขวด
        โดยครอบคลุมทั้งแบบวาล์วกัดและแบบหัวฉีดที่มีอัตราการไหลสูง
    hydraulic_fluid_type:
      name: ชนิดของน้ำมันไฮดรอลิก
      description: ระบุประเภทของน้ำมันเบรกที่ใช้กับคันเบรกไฮดรอลิกของจักรยาน ข้อมูลนี้มีความสำคัญอย่างยิ่งต่อการบำรุงรักษาและความปลอดภัย
    hydrogenation_level:
      name: ระดับการเติมไฮโดรเจน
      description: ระบุว่าไขมันนั้นไม่ผ่านกระบวนการไฮโดรจีเนชั่น ผ่านกระบวนการไฮโดรจีเนชั่นบางส่วน
        หรือผ่านกระบวนการไฮโดรจีเนชั่นอย่างสมบูรณ์ ซึ่งส่งผลต่อปริมาณไขมันทรานส์และประสิทธิภาพในการอบ
    hydrophobicity_level:
      name: ระดับการกันน้ำ
      description: อธิบายถึงระดับการเกาะตัวของน้ำ/การไหลเป็นแผ่นของน้ำตามที่ผลิตภัณฑ์โฆษณาไว้
    ice_cream_format:
      name: รูปแบบไอศกรีม
      description: อธิบายรูปแบบทางกายภาพหรือการนำเสนอของสินค้าไอศกรีม (เช่น ไพนต์
        บาร์ โมจิ)
    ice_skate_sharpener_type:
      name: ประเภทของเครื่องลับคมรองเท้าสเก็ตน้ำแข็ง
      description: จำแนกประเภทการออกแบบหรือรูปแบบโดยรวมของอุปกรณ์ลับมีด (หินลับมีดแบบมือถือ
        เครื่องลับมีดไฟฟ้า อุปกรณ์จับยึด ฯลฯ)
    ice_temperature_suitability:
      name: ความเหมาะสมของอุณหภูมิน้ำแข็ง
      description: แสดงช่วงอุณหภูมิน้ำแข็งที่ใช้ในสูตรการผลิตแว็กซ์สำหรับไม้ฮอกกี้
        ซึ่งส่งผลต่อประสิทธิภาพและคุณสมบัติในการกันหิมะ
    icing_sugar_variety:
      name: ประเภทของน้ำตาลไอซิ่ง
      description: จำแนกตามสูตรหรือประเภทการใช้งานของน้ำตาลไอซิ่ง (เช่น น้ำตาลไอซิ่งสำหรับทำฟองดองต์
        น้ำตาลไอซิ่งผงที่ไม่ละลาย น้ำตาลไอซิ่งสี น้ำตาลไอซิ่งปรุงแต่งรส)
    ignition_coil_configuration:
      name: รูปแบบคอยล์จุดระเบิด
      description: ระบุรูปแบบคอยล์จุดระเบิด (คอยล์เดี่ยว/คอยล์บนหัวเทียน, คอยล์หลายเสา)
        ตามจำนวนกระบอกสูบ, รางคอยล์/ตลับคอยล์ หรือแบบจานจ่าย
    ignition_lead_compliance_standard:
      name: มาตรฐานการปฏิบัติตามข้อกำหนดของสายนำจุดระเบิด
      description: มาตรฐานอุตสาหกรรมอย่างเป็นทางการหรือการรับรองที่สายไฟจุดระเบิดเป็นไปตามมาตรฐานนั้น
        ตามที่ผู้ผลิตกล่าวอ้าง (เช่น SAE J2031, ISO 3808)
    ignition_lead_insulation_material:
      name: ระบบจุดระเบิด (วัสดุฉนวนของเป้าหมาย
      description: วัสดุฉนวน/ปลอกหุ้มหลักที่ใช้กับสายไฟจุดระเบิด (ฉนวนสายเคเบิลด้านนอก)
    ignition_lead_set_type:
      name: ชุดสายไฟจุดระเบิด
      description: ไม่ว่าจะเป็นสายหัวเทียนเส้นเดียวหรือเป็นชุดครบชุด และชุดนั้นมีจุดประสงค์เพื่ออะไร
    ignition_lead_terminal_type:
      name: ขั้วต่อสายไฟจุดระเบิด
      description: รูปแบบขั้วต่อ/ตัวเชื่อมต่อที่ใช้ที่ส่วนปลายของสายไฟจุดระเบิด (เช่น
        ขั้วต่อหัวเทียนและขั้วต่อคอยล์/จานจ่าย)
    illumination_type:
      name: ประเภทของแสงสว่าง
      description: ระบุว่าลูกบอลจะส่องสว่างสำหรับการเล่นในเวลากลางคืนหรือไม่ และอย่างไร
        (เช่น การเรืองแสงฟอสฟอเรสเซนต์, ไฟ LED ที่ทำงานเมื่อสัมผัสโดน)
    immobilizer_installation_type:
      name: ประเภทการติดตั้งระบบอิมโมบิไลเซอร์
      description: ระบุวิธีการติดตั้งหรือเชื่อมต่อระบบกันขโมยกับตัวรถ
    immobilizer_unlock_method:
      name: วิธีการปลดล็อคระบบกันขโมย
      description: ระบุวิธีการเปิด/ปิด หรือปลดล็อกระบบกันขโมย
    impact_protection_certifications:
      name: การรับรองการป้องกันผลกระทบ
      description: ระบุมาตรฐานความปลอดภัยเฉพาะที่แผ่นรองป้องกันนี้ตรงตามหรือเกินกว่ามาตรฐานเหล่านั้น
    impact_protection_level:
      name: ระดับการป้องกันแรงกระแทก
      description: ระบุระดับการป้องกันแรงกระแทกหรือเทคโนโลยีที่อุปกรณ์ป้องกันอวัยวะเพศชายชนิดสวมในกีฬา
        (athletic cup) มีให้
    impact_protection_rating:
      name: ระดับการป้องกันแรงกระแทก
      description: ระบุระดับการป้องกันแรงกระแทกที่ได้รับการรับรองตามมาตรฐาน (เช่น
        EN 1621-1 ระดับ 1, EN 14120 ระดับ 2) ช่วยให้ผู้ขับขี่สามารถคัดกรองหาอุปกรณ์ป้องกันที่มีคุณภาพสูงขึ้นได้
    impact_surface_material:
      name: วัสดุพื้นผิวรับแรงกระแทก
      description: อธิบายวัสดุหลักที่ใช้เป็นพื้นผิว Impactกระแทก/สัมผัส เพื่อความปลอดภัยและความรู้สึก
        (เช่น โฟม พลาสติก)
    incense_base_material:
      name: วัสดุฐานสำหรับทำธูป
      description: วัสดุฐาน/สารยึดเกาะหลักที่ใช้ทำกำยาน (ฐานผง) ในชุดอุปกรณ์
    incense_making_method:
      name: วิธีการทำธูป
      description: ขั้นตอนการทำธูปที่แนะนำในชุดอุปกรณ์
    incense_tool_type:
      name: ประเภทอุปกรณ์จุดกำยาน
      description: ระบุว่าผลิตภัณฑ์นี้เป็นอุปกรณ์ทำธูปประเภทใด (ใช้สำหรับขึ้นรูป ตวง
        อัด ผสม หรืออบแห้งธูป)
    incline_adjustment_type:
      name: ประเภทการปรับความลาดเอียง
      description: อธิบายวิธีการ (หรือหากว่า) ความลาดเอียงสามารถเปลี่ยนแปลงได้ระหว่างการออกกำลังกาย
    included_accessories:
      name: อุปกรณ์เสริมที่รวมอยู่ในชุด
      description: ระบุรายการอุปกรณ์เสริมต่างๆ เช่น หัว/ดอกสว่านสำรอง กล่องเก็บ สายชาร์จ
        หรืออะแดปเตอร์ AC
    included_case_type:
      name: ประเภทเคสที่ให้มาพร้อมสินค้า
      description: ประเภทของอุปกรณ์พกพา/จัดเก็บที่มาพร้อมกับแซกโซโฟนเบส (ถ้ามี)
    included_components:
      name: ส่วนประกอบที่รวมอยู่
      description: แสดงรายการสิ่งที่รวมอยู่ในแพ็กเกจ (มีประโยชน์สำหรับชุดเครื่องมือและชุดรวม)
    included_fastener_components:
      name: รวมส่วนประกอบสำหรับยึดด้วย
      description: ระบุว่าผลิตภัณฑ์นั้นเป็นชุดตะขอและห่วง ตะขออย่างเดียว ห่วงอย่างเดียว
        หรือเป็นรูปแบบการปิดเสื้อผ้าที่เกี่ยวข้อง
    included_hydration_vessel_type:
      name: ประเภทของภาชนะบรรจุน้ำดื่มที่มาในชุด
      description: ระบุรูปแบบของการให้ความชุ่มชื้น คอนเทนเนอร์ Supply หรือรองรับโดยสายพาน
    included_items_woodwind_instrument:
      name: รายการที่รวมอยู่ (เครื่องดนตรีประเภทเครื่องเป่าลมไม้)
      description: ชี้แจงว่ารายการอุปกรณ์ใดที่มักรวมอยู่ในชุดแซ็กโซโฟนเบส
    included_materials:
      name: วัสดุที่รวมอยู่
      description: ระบุว่าส่วนประกอบใดบ้างที่รวมอยู่ในการซื้อแพทเทิร์น (เฉพาะแพทเทิร์น
        หรือ แพทเทิร์น + วัสดุ)
    included_mounting_accessories:
      name: รวมอุปกรณ์สำหรับติดตั้งด้วย
      description: ระบุอุปกรณ์ติดตั้ง/ยึดที่แถมมาให้พร้อมกับลำโพงโทรศัพท์
    included_pump_type:
      name: ประเภทปั๊มที่รวมมาในชุด
      description: ระบุประเภทของปั๊ม Supply อากาศหรือปั๊มที่ติดตั้งมาพร้อมกับที่นอนลม
    included_scraper_implement_type:
      name: ประเภทเครื่องมือขูดที่รวมมาในชุด
      description: ระบุว่าอุปกรณ์เล่นดนตรีใดบ้างที่รวมอยู่กับเครื่องดนตรีประเภทขูด
        (เช่น ไม้ขูด/แท่งขูด แปรงลวด)
    indicator_design:
      name: การออกแบบอุปกรณ์แจ้งเตือน
      description: จำแนกประเภทรูปร่างหรือรูปแบบของอุปกรณ์แจ้งเตือนเมื่อปลากินเบ็ด
    indicator_functions_tracked:
      name: ฟังก์ชันอุปกรณ์ช่วยนับที่ติดตาม
      description: ชี้แจงรายการดัชนีชี้วัดหรือสถิติต่างๆ ของเกมที่ตัวนับนี้สามารถบันทึกได้
        เช่น บอล, สไตรค์, เอาต์, อินนิง, จำนวนลูกขว้าง, โอเวอร์, วิกเก็ต, สกอร์ หรือดาวน์
    indoor_outdoor_use:
      name: ใช้ได้ทั้งภายในและภายนอกอาคาร
      description: ระบุว่าของเล่นโบว์ลิ่งนี้มีไว้สำหรับใช้งานภายในอาคาร ภายนอกอาคาร
        หรือทั้งสองอย่าง
    inflatable_decoration_items_included:
      name: รายการอุปกรณ์ตกแต่งเป่าลมที่รวมอยู่ในชุด
      description: ระบุอุปกรณ์เสริมที่สำคัญที่รวมอยู่ในชุดของตกแต่งเป่าลม (เช่น พัดลมเป่าลม
        หมุดยึด เชือกผูก)
    inflatable_decoration_type:
      name: ประเภทของตกแต่งแบบเป่าลม
      description: ระบุประเภทของของตกแต่งงานปาร์ตี้แบบเป่าลม (รูปทรง/รูปแบบ) เพื่อรองรับการค้นหาและการกรองข้อมูล
    inflatable_raft_float_features:
      name: คุณสมบัติของแพยาง/ห่วงยาง
      description: คุณสมบัติการใช้งานที่มีอยู่ในแพยาง/ห่วงยางลอยน้ำ
    inflation_method_included:
      name: วิธีการเติมลมยางที่มาในชุด
      description: ระบุประเภทของน้ำยาปะยางที่รวมอยู่ในชุดซ่อม (ถ้ามี)
    infused_scent:
      name: กลิ่นที่ผสมอยู่
      description: ระบุสารปรุงแต่งกลิ่นหรือรสชาติที่ผสมอยู่ในวัสดุเหยื่อตกปลา
    ingredient_base_type:
      name: ประเภทส่วนผสมหลัก
      description: ระบุวัตถุดิบหลักที่ใช้ในการหมัก (เช่น น้ำองุ่นเข้มข้น เทียบกับน้ำผลไม้สด
        เทียบกับน้ำผลไม้เข้มข้น)
    ingredient_physical_form:
      name: รูปแบบทางกายภาพของส่วนผสม
      description: ระบุรูปแบบทางกายภาพของส่วนผสมน้ำหอม (ใช้สำหรับการจัดการ การวัด
        และการผสม)
    ingredient_processing_method:
      name: วิธีการแปรรูปส่วนผสม
      description: ระบุเทคนิคการแปรรูปหลักที่ใช้กับส่วนผสม (เช่น การแช่แข็งแบบแห้ง
        การคั่ว การหมัก)
    ink_colors_included:
      name: สีหมึกที่รวมอยู่ตัวสินค้า
      description: ระบุ Colors หมึกที่รวมอยู่ในแผ่นหมึกปั๊มในชุด
    ink_pad_application_method:
      name: วิธีการใช้งานแผ่นหมึก
      description: วิธีการใช้งานหมึกจากแผ่นหมึก (แผ่นหมึกปั๊มแบบดั้งเดิม เทียบกับแบบแตะหมึก
        เทียบกับแบบแปรง)
    ink_pad_permanence:
      name: ความคงทนของแผ่นหมึก
      description: หมึกที่ประทับนั้นเป็นหมึกถาวรและ/หรือหมึกเก็บรักษาได้นาน (ทนต่อการซีดจางและน้ำเมื่อแห้งแล้ว)
        หรือไม่
    ink_pad_size:
      name: ขนาดแผ่นหมึก
      description: ขนาด/รูปทรงมาตรฐานของพื้นผิว/ตัวเรือนแผ่นหมึก
    ink_pad_special_effects:
      name: เอฟเฟกต์พิเศษของแผ่นหมึก
      description: เอฟเฟกต์พิเศษทางด้านภาพ/การใช้งานของหมึกเมื่อประทับตรา (เช่น โลหะ,
        ประกายแวววาว)
    ink_permanence:
      name: ความคงทนของหมึก
      description: ระบุว่าหมึกซูมิแห้งนั้นมีจุดประสงค์เพื่อให้ติดทนนาน/เก็บรักษาได้นาน
        หรือล้างออกได้/ไม่ติดทนนาน
    ink_preparation_required:
      name: การเตรียมหมึกที่กำหนด
      description: ระบุว่าหมึกซูมิพร้อมใช้งานหรือไม่ หรือต้องเจือจางด้วยน้ำหรือบดก่อนใช้งาน
    inline_skate_brake_type:
      name: ประเภทเบรกสเก็ตอินไลน์
      description: ระบุรูปแบบระบบเบรกที่มาพร้อมกับรองเท้าสเก็ตอินไลน์ เช่น เบรกส้นเท้าแบบถอดได้
        หรือไม่มีเบรกเลย
    inner_tent_configuration:
      name: การจัดวางเต็นท์ด้านใน
      description: ระบุรูปแบบหรือโครงสร้างของเต็นท์ด้านใน เช่น แบบเต็มพื้นที่ แบบตาข่าย
        หรือแบบฉนวนกันความร้อน
    innerspring_coil_type:
      name: แบบขดลวดสปริงด้านใน
      description: ระบุรูปแบบโครงสร้างของระบบสปริงภายในที่นอน ซึ่งส่งผลต่อการรองรับ
        การแยกการเคลื่อนไหว และราคา
    input_connector_type:
      name: ประเภทขั้วต่ออินพุต
      description: ระบุประเภทขั้วต่อสัญญาณเสียงขาเข้าที่ใช้โดยแป้นเหยียบ (โดยทั่วไปคือ
        1/4 นิ้ว TS)
    input_valve_type:
      name: ประเภทวาล์วขาเข้า
      description: ระบุมาตรฐานวาล์วที่มีอยู่บนยางใน/ล้อจักรยานที่อะแดปเตอร์เชื่อม
        FROM
    insecticide_treatment:
      name: การเคลือบสารฆ่าแมลง
      description: ระบุว่าตาข่ายได้รับการเคลือบสารฆ่าแมลงจากโรงงานหรือไม่ และหากได้รับการเคลือบ
        สารฆ่าแมลงชนิดใดที่ใช้เพื่อการป้องกันเพิ่มเติม
    insert_coverage_area:
      name: ระบุพื้นที่ให้บริการ
      description: ระบุว่าแผ่นรองฝ่าเท้าชิ้นนี้ออกแบบมาเพื่อคลุมส่วนใดของเท้า (เช่น
        คลุมทั้งเท้า หรือคลุมเฉพาะส้นเท้า)
    insert_length_type:
      name: ประเภทแผ่นรองพื้นรองเท้า
      description: ระบุว่าส่วนรองรับส่วนโค้งของความช่วยเหลือครอบคลุมเท่าใด
    inside_message_type:
      name: ประเภทข้อความภายใน
      description: แสดงว่าบัตรมีข้อความพิมพ์ไว้ล่วงหน้าด้านในหรือไม่ และสามารถปรับแต่งได้หรือไม่
    insole_attachment_method:
      name: วิธีการติดพื้นรองเท้า
      description: ระบุวิธีการวางแผ่นซัพพอร์ตส่วนโค้งไว้ภายในรองเท้า (แบบใส่หลวมๆ
        มีกาวในตัว แบบตีนตุ๊กแก ฯลฯ)
    insole_material:
      name: วัสดุพื้นรองเท้า
      description: อธิบายวัสดุของแผ่นรองฝ่าเท้าหรือพื้นรองเท้าด้านในที่ REST เท้าสวม
        ระบบรองรับ Impact และความช่วยเหลือ
    installation_fabrication_level:
      name: ระดับการผลิตเพื่อการติดตั้ง
      description: ระบุจำนวนการผลิตหรือการดัดแปลงแบบกำหนดเองโดยทั่วไปซึ่งจำเป็นสำหรับการติดตั้งโปรแกรม
    installation_location:
      name: ตำแหน่งการติดตั้ง
      description: ระบุจุดติดตั้งทั่วไปสำหรับเซ็นเซอร์วัดแรงดันน้ำมันในระบบน้ำมันเครื่องยนต์
        (เช่น ช่องทางเดินน้ำมันในบล็อกเครื่องยนต์ ตัวเรือนกรองน้ำมัน แผ่นประกบ หรือการติดตั้งบนท่อระยะไกล)
    installation_method:
      name: วิธีการติดตั้ง
      description: ระบุวิธีการยึดหรือติดตั้งเสื่อหรือพรมปูพื้นบนพื้น
    instant_coffee_form:
      name: รูปแบบกาแฟสำเร็จรูป
      description: อธิบายรูปแบบทางกายภาพของกาแฟสำเร็จรูปที่ Supply ซึ่งส่งผลต่อวิธีการเตรียมและอายุการใช้งาน
    instep_coverage:
      name: การปกคลุมหลังเท้า
      description: ระบุว่าผลิตภัณฑ์นั้นปกป้องเฉพาะหน้าแข้ง หรือปกป้องทั้งหน้าแข้งและหลังเท้า/ฝ่าเท้าด้วย
    instruction_format:
      name: รูปแบบคำแนะนำ
      description: รูปแบบของคำแนะนำที่แนบมากับชุดอุปกรณ์
    instrument_cleaning_swab_form_factor:
      name: การกำหนดรูปแบบผ้าทำความสะอาดเครื่องดนตรี
      description: ระบุรูปแบบทางกายภาพของอุปกรณ์ทำความสะอาด (เช่น ผ้าแบบดึงผ่าน หรือ
        ระบบแปรง/แท่ง) เพื่อให้ตรงกับความชอบของผู้เล่นและข้อจำกัดของเครื่องดนตรี
    instrument_dimensions_unit_context:
      name: บริบทของหน่วยวัดขนาดเครื่องมือ
      description: อธิบายให้ชัดเจนว่าค่าความสูง/ความกว้าง/ความยาวที่ระบุไว้นั้นหมายถึงอะไร
        (เช่น ขนาดโดยรวมของเครื่องมือ ความยาวท่อเดี่ยว ความสูงของขาตั้ง)
    instrument_electronics_type:
      name: ประเภทอุปกรณ์อิเล็กทรอนิกส์
      description: แสดงว่าระบบปิ๊กอัป/พรีแอมป์ของเครื่องดนตรีเป็นแบบแอ็กทีฟหรือพาสซีฟ
    instrument_key:
      name: คีย์เครื่องดนตรี
      description: ระบุการกำหนดคีย์เครื่องดนตรีของเครื่องบันทึกที่ใช้ในแค็ตตาล็อก
        (โดยทั่วไปคือ C หรือ F สำหรับเครื่องบันทึกขนาดใหญ่)
    instrument_level:
      name: ระดับเครื่องดนตรี
      description: ระดับผู้เล่นเป้าหมายสำหรับเครื่องดนตรีที่นำเสนอ
    instrument_part_mounting_method:
      name: วิธีการติดตั้งชิ้นส่วนเครื่องมือ
      description: ระบุวิธีการยึดหรือติดตั้งชิ้นส่วน (เช่น แบบหนีบ แบบใช้กาว หรือแบบขันสกรู)
    instrument_parts_included:
      name: ชิ้นส่วนเครื่องมือดนตรีที่รวมอยู่ในชุด
      description: ระบุส่วนประกอบ/ชิ้นส่วนหลักที่รวมอยู่ในกล่องสำหรับคลาริเน็ต A
    instrument_playing_technique:
      name: เทคนิคการเล่นเครื่องดนตรี
      description: วิธีการเล่น/ใช้งานเครื่องดนตรีโดยทั่วไป (เช่น เขย่า ตี หรือกระทบ)
    instrument_size_class:
      name: สิ่งคลาสดนตรี
      description: ขนาดโดยรวมของเครื่องดนตรีจะแสดงเป็นขนาดที่ผู้ซื้อสามารถเข้าใจได้ง่าย
        ไม่ใช่ขนาดที่แน่นอน
    insulation_fill_material:
      name: วัสดุบุฉนวน
      description: ระบุวัสดุหลักที่ใช้สำหรับเป็นฉนวนกันความร้อนของเสื้อแจ็คเก็ตหรือเสื้อกั๊ก
    integrated_bottom_type:
      name: ประเภทกางเกงในตัว
      description: แสดงว่าเสื้อผ้าตัวนั้นมีกางเกงซับใน กางเกงขาสั้น ชุดรัดรูป หรือชั้นในที่คล้ายกันเพื่อปกปิดขณะเคลื่อนไหวหรือไม่
    integrated_charging_options:
      name: ตัวเลือกการชาร์จในตัว
      description: แสดงรายการพอร์ตจ่ายไฟหรือพอร์ตชาร์จในตัวที่มีอยู่บนโต๊ะข้างเตียง
    integrated_furniture_function:
      name: ฟังก์ชันเฟอร์นิเจอร์แบบบูรณาการ
      description: ระบุองค์ประกอบเฟอร์นิเจอร์ในตัวเพิ่มเติมที่มาพร้อมกับเตียงติดผนังหรือ
        Frame (เช่น โต๊ะทำงาน โซฟา ชั้นวางของ)
    integrated_locking:
      name: ระบบล็อคแบบบูรณาการ
      description: ตรวจสอบว่าแร็คมีระบบล็อคในตัวสำหรับล็อคแร็คกับตัวรถและ/หรือล็อคจักรยานกับแร็คหรือไม่
    integrated_power_options:
      name: ตัวเลือกพลังงานแบบบูรณาการ
      description: ระบุประเภทของระบบจ่ายไฟหรือระบบชาร์จในตัวที่อ่างล้างหน้ามีให้
    integrated_storage_features:
      name: คุณสมบัติการจัดเก็บในตัว
      description: ระบุคุณสมบัติการจัดเก็บเพิ่มเติมหรืออุปกรณ์เสริมที่ชั้นวางไม้คิวบิลเลียดมีนอกเหนือจากช่องเสียบไม้คิว
    integrated_tool_functions:
      name: Functionsเครื่องมือแบบบูรณาการ
      description: ฟังก์ชั่นเครื่องมือเพิ่มเติมที่รวมอยู่ในคันโยก (เช่น ตะขอเกี่ยวซี่ล้อ,
        ที่ถอดแกนวาล์ว, ที่ถอดขอบยาง)
    intended_board_type:
      name: ประเภทบอร์ดที่ต้องการใช้งาน
      description: ระบุรูปแบบของไคท์บอร์ดที่ครีบนั้นได้รับการออกแบบมาสำหรับการใช้งาน
        (เช่น ทวินทิป, เซิร์ฟไดเร็กชัน, ไฮโดรฟอยล์)
    intended_consumption:
      name: การบริโภคที่ตั้งใจไว้
      description: ระบุวิธีการบริโภคผลิตภัณฑ์อย่างถูกต้อง เช่น รับประทานดิบได้ ต้องนำไปอบ
        หรืออบมาแล้วบางส่วน
    intended_craft:
      name: งานฝีมือที่ตั้งใจไว้
      description: บริบทงานฝีมือหลักที่ตัวนำเส้นใยนี้ได้รับการออกแบบมา
    intended_culinary_use:
      name: วัตถุประสงค์ในการนำไปใช้ประกอบอาหาร
      description: ระบุการใช้งานหลักทางด้านการทำอาหารของซอส เช่น การจิ้ม การปรุงอาหาร
        หรือการเคลือบ
    intended_handlebar_style:
      name: รูปแบบแฮนด์ที่ต้องการใช้งาน
      description: อธิบายลักษณะหรือรูปแบบการใช้งานของคันโยก (เช่น แฮนด์ตรง, แฮนด์ดรอป
        , แฮนด์แอโร่) วิธีนี้ช่วยจำกัดความเข้ากันได้อย่างรวดเร็วโดยไม่ต้องสร้างหมวดหมู่ย่อยเพิ่มเติม
    intended_player_role:
      name: บทบาทของผู้เล่นที่ตั้งใจไว้
      description: ระบุบทบาทในสนามที่อุปกรณ์สวมศีรษะนั้นเหมาะสมที่จะใช้ (เช่น ผู้รับลูก,
        กรรมการ)
    intended_playing_surface:
      name: พื้นผิวสนามที่ตั้งใจไว้
      description: พื้นผิวที่ออกแบบมาสำหรับลูกฮอกกี้ ลูกบอล หรือห่วง เช่น น้ำแข็ง
        แอสฟัลต์ พื้นโรงยิม หรือน้ำแข็งสังเคราะห์
    intended_repair_location:
      name: ตำแหน่งที่ต้องการซ่อมแซม
      description: 'ตำแหน่งที่ต้องการซ่อมแซม: บริเวณใดบนยางที่ชุดซ่อมนี้มีไว้สำหรับซ่อมแซม'
    intended_seating_position:
      name: ตำแหน่งที่นั่งที่ตั้งใจไว้
      description: ระบุตำแหน่งที่นั่งในรถยนต์ที่สายเข็มขัดนิรภัยควรติดตั้งหรือใช้งาน
    intended_sewing_application:
      name: การใช้งานเย็บผ้าที่จะนำไปใช้งาน
      description: การใช้งานเย็บผ้าที่ด้ายนี้ได้รับการออกแบบมา (เช่น การเย็บเสื้อผ้าทั่วไป
        การเย็บผ้าห่ม การหุ้มเบาะ)
    intended_technique:
      name: เทคนิคที่จะนำไปใช้กับสินค้านี้
      description: เทคนิคหลักในการทำสักหลาดที่แผ่นรอง/เสื่อนี้ได้รับการออกแบบมา
    intended_use:
      name: วัตถุประสงค์การใช้งาน
      description: 'การใช้งานหลัก: Context สำหรับการใช้งานเครื่องมือ'
    intended_use_fleece_fabric:
      name: วัตถุประสงค์การใช้งาน (ผ้าฟลีซ)
      description: โครงการ/การใช้งานหลักที่นำผ้าฟลีซไปใช้ทำการตลาด
    intended_user:
      name: กลุ่มเป้าหมาย
      description: ระบุว่าอุปกรณ์ป้องกันภัยบนเครื่องบินนี้ออกแบบมาเพื่อใคร
    intended_yarn_form:
      name: วัตถุประสงค์ของรูปแบบเส้นด้าย
      description: ระบุรูปแบบการจัดเรียงเส้นด้ายที่เหมาะสมที่สุดสำหรับชามใส่เส้นด้าย
    interaction_mode:
      name: Modeการโต้ตอบ
      description: วิธีการโต้ตอบหลักที่ใช้ในการกระตุ้นเสียงหรือกิจกรรมต่างๆ
    interactive_effects:
      name: เอฟเฟกต์แบบโต้ตอบ
      description: ระบุถึงเอฟเฟ็กต์อิเล็กทรอนิกส์หรือกลไกแบบโต้ตอบที่รวมอยู่ในชุดของเล่นครัว
    interfacing_application_area:
      name: พื้นที่ใช้งานการเชื่อมต่อ
      description: ระบุถึงงานเย็บปักถักร้อย/งานฝีมือทั่วไปที่วัสดุเสริมความแข็งแรงนี้ออกแบบมาเพื่อรองรับ
    interfacing_color_family:
      name: ตระกูลสีผ้าซับใน
      description: ระบุสีพื้นฐานทั่วไปที่ใช้สำหรับรองใต้ผ้าสีอ่อนหรือสีเข้ม
    interfacing_selling_format:
      name: รูปแบบการขายผ้าซับใน
      description: อธิบายรูปแบบการขายผ้าซับใน (เช่น การตัดต่อเนื่องตามความยาว การตัดเป็นชิ้นสำเร็จรูป
        ม้วน หรือตัวอย่างผ้า)
    interfacing_stiffness_level:
      name: ระดับความแข็งของผ้าซับใน
      description: อธิบายระดับความแข็ง/ความแน่นของผ้าซับใน
    interior_padding_type:
      name: ภายในแบบเว้นขอบอื่นๆ
      description: ประเภทของวัสดุรองกันกระแทกหรือระบบแทรกภายในกระเป๋าที่ใช้เพื่อปกป้องและจัดระเบียบสิ่งของภายใน
    interior_stall_configuration:
      name: โครงสร้างรูปแบบภายในคอกม้า
      description: ระบุเลย์เอาต์ภายใน/รูปแบบการขนส่งสัตว์ (ทิศทางของคอกและรูปแบบของช่องกั้น)
    invitation_printing_coverage:
      name: ขอบเขตงานพิมพ์บัตรเชิญ
      description: การ์ดเชิญจะพิมพ์ด้านใดบ้าง (ด้านหน้าอย่างเดียว หรือ พิมพ์สองด้าน)
    iodization:
      name: การเติมไอโอดีน
      description: ระบุว่ามีการเติมไอโอดีนลงในเกลือหรือไม่ และในปริมาณเท่าใด
    iridescence_level:
      name: ระดับความระยิบระยับ
      description: อธิบายถึงความเข้มของประกายสีรุ้งตามธรรมชาติ/ที่ผ่านการปรับแต่ง
        ซึ่งเป็นลักษณะเฉพาะของขนนกยูง
    irish_warpipe_set_configuration:
      name: การจัดวางชุดปี่สงครามไอริช
      description: ระบุว่าสินค้าที่จำหน่ายเป็นแบบใด (เครื่องดนตรีครบชุด หรือ ชิ้นส่วน/ชุดบางส่วน)
        โดยเฉพาะสำหรับปี่สงครามไอริช
    iron_on_applique_application_method:
      name: วิธีการติดเกอร์รีดร้อน
      description: ระบุวิธีการติดสติ๊กเกอร์รีดร้อนลงบนพื้นผิวที่ต้องการ
    ironing_center_features:
      name: สิ่งอำนวยความสะดวกสำหรับรีดผ้า
      description: ระบุคุณสมบัติพิเศษของศูนย์บริการรีดผ้าที่ช่วยเพิ่มความสะดวกในการใช้งาน
    jacket_breast_style:
      name: รูปแบบกระดุมเสื้อสูท
      description: ระบุว่าเสื้อสูทเป็นแบบกระดุมแถวเดียวหรือสองแถว
    jacket_vent_style:
      name: สไตล์ช่องระบายอากาศของแจ็คเก็ต
      description: แสดงประเภทส่วนระบายอากาศ (ช่องเปิด) ที่ด้านหลังของเสื้อสูท
    jam_and_jelly_consistency:
      name: ความข้นเหมือนแยมและเยลลี่
      description: อธิบายลักษณะเนื้อสัมผัสของแยมหรือเนยทาขนมปัง โดยระบุว่ามีชิ้นผลไม้หรือเมล็ดพืชอยู่หรือไม่
    jaw_shape:
      name: รูปทรงขากรรไกร
      description: รูปทรงของขากรรไกรหรือปลายหัวกรรไวย์ (เช่น ตรง โค้ง ปลายยาว) มีผลต่อความแม่นยำและระยะการใช้งาน
    jerky_form:
      name: รูปแบบเนื้อแห้ง
      description: อธิบายลักษณะทางกายภาพหรือการตัดชิ้นเนื้อ Jerky (เช่น เป็นเส้นยาว
        เป็นแท่ง เป็นชิ้นพอดีคำ)
    jersey_style:
      name: รูปแบบเสื้อเจอร์ซีย์
      description: ระบุรูปแบบหรือสไตล์การสวมใส่ของเสื้อเจอร์ซีย์สำหรับแฟนบอล
    jew_harp_accessories_included:
      name: อุปกรณ์สำหรับฮาร์ปปากที่รวมอยู่ในชุด
      description: รายการดังกล่าวรวมถึงสิ่งของที่บรรจุมาพร้อมกับฮาร์โมนิกา (เช่น กล่องใส่เครื่องดนตรี
        ถุงใส่เครื่องดนตรี คู่มือการใช้งาน)
    jew_s_harp_frame_style:
      name: สไตล์กรอบพิณยิว
      description: อธิบายถึงรูปแบบการสร้างโครง/ตัวเครื่องของพิณปาก ซึ่งมีผลต่อความรู้สึก
        ความทนทาน และหลักสรีรศาสตร์ในการเล่น
    jew_s_harp_tongue_profile:
      name: ลักษณะของลิ้นจิวฮาร์พ
      description: อธิบายถึงรูปทรง/โครงสร้างของลิ้น (กก) ของพิณปาก ซึ่งส่งผลต่อการตอบสนองและคุณภาพเสียง
    jewelry_pieces_included:
      name: เครื่องประดับที่รวมอยู่ในชุด
      description: ระบุรายละเอียดของเครื่องประดับแต่ละชิ้นที่รวมอยู่ในชุด เพื่อให้ผู้ซื้อทราบได้อย่างแน่ชัดว่ากำลังซื้อเครื่องประดับชิ้นใดบ้าง
    jigsaw_puzzle_piece_shape:
      name: Shapesทรงชิ้นส่วนจิ๊กซอว์
      description: ลักษณะการตัด/รูปทรงโดยทั่วไปของชิ้นงานและรูปทรงขอบ
    jockstrap_design_features:
      name: คุณสมบัติการออกแบบของจ็อกสแตรป
      description: รวบรวมองค์ประกอบการออกแบบพิเศษเฉพาะของกางเกงในรัดรูปสำหรับนักกีฬา
        ซึ่ง Influence Functions หรือความสวยงาม
    juggling_club_construction_type:
      name: ประเภทโครงสร้างคลับเล่นกล
      description: ระบุประเภทโครงสร้างโดยรวมของไม้สำหรับเล่นกล (เช่น แบบหล่อขึ้นรูปชิ้นเดียว
        หรือแบบประกอบหลายชิ้น) ซึ่งอาจส่งผลต่อความทนทาน ความรู้สึกในการใช้งาน และการบำรุงรักษา
    juggling_club_core_material:
      name: เนื้อหาหลักของชมรมการเล่นกล
      description: วัสดุหลักที่ใช้ภายในไม้กอล์ฟ (แตกต่างจากวัสดุห่อหุ้ม/เทปด้านนอก)
    juggling_prop_set_size:
      name: ขนาดชุดอุปกรณ์เล่นกล
      description: จำนวนอุปกรณ์หลักที่รวมอยู่ในชุด (เช่น ชุดลูกบอล 3 ลูก, ลูกบอลไฟคู่)
    juggling_ring_edge_style:
      name: สไตล์ขอบห่วงเล่นกล
      description: รูปทรงขอบของแหวน Influence ความสบายในการสวมใส่และการจับยึด
    juice_form:
      name: รูปแบบน้ำผลไม้
      description: ระบุรูปแบบทางกายภาพหรือขั้นตอนการแปรรูปของผลิตภัณฑ์ (เช่น ของเหลวความเข้มข้นคงที่
        สารเข้มข้น ผง)
    juice_processing_method:
      name: วิธีการแปรรูปน้ำผลไม้
      description: ระบุเทคนิคกระบวนการหลักที่ใช้กับน้ำผลไม้หรือเครื่องดื่ม รสชาติที่โดนใจ
        การเก็บรักษาสารอาหาร และอายุการใช้งาน
    jump_rope_style:
      name: สไตล์การกระโดดเชือก
      description: จำแนกประเภทโครงสร้างของเชือก/สายเคเบิล (เช่น แบบมีลูกปัด แบบผ้า
        แบบสายเคเบิลความเร็วสูง) ซึ่งส่งผลอย่างมากต่อการใช้งานและประสิทธิภาพที่ต้องการ
    kale_variety:
      name: พันธุ์ผักคะน้า
      description: ระบุสายพันธุ์หรือพันธุ์เฉพาะของผักคะน้า (เช่น คะน้าใบหยิก, คะน้าลาซินาโต/ไดโนเสาร์,
        คะน้ารัสเซีย) สิ่งนี้ช่วยให้การเลือกซื้อสินค้าเป็นไปตามรสชาติ เนื้อสัมผัส
        และการนำไปใช้ในการปรุงอาหาร
    kaleidoscope_viewing_type:
      name: ประเภทการดูแบบคาไลโดสโคป
      description: บ่งบอกรูปแบบการรับชมหรือวิธีการใช้งานของกล้องคาไลโดสโคป (เช่น แบบคลาสสิกที่ใช้ปล่องมองภาพ
        แบบใช้เลนส์เทเลไอโดสโคป แบบหมุนปรับ หรือแบบฉายภาพ)
    kayak_construction_type:
      name: ประเภทการสร้างเรือคายัค
      description: ระบุรูปแบบโครงสร้างหลักของเรือคายัค เช่น แบบแข็งหรือแบบเป่าลม
    kayak_design_type:
      name: ประเภทการออกแบบเรือคายัค
      description: จำแนกวัตถุประสงค์หลักในการออกแบบเรือคายัค (เช่น เรือโต้คลื่น, เรือเล่นน้ำ,
        เรือท่องเที่ยว)
    kayak_hull_design:
      name: การออกแบบตัวเรือคายัก
      description: บ่งบอกรูปทรงหลักของตัวเรือ ซึ่งมีอิทธิพลต่อลักษณะการจัดการ เช่น
        ความเสถียร และความคล่องตัวในสภาพคลื่นลมแรง
    kayak_storage_bag_type:
      name: ประเภทของกระเป๋าเก็บเรือคายัค
      description: ระบุรูปแบบหรือประเภทของถุงเก็บเรือคายัค เช่น ถุงกันน้ำ หรือถุงใส่ไม้พาย
    kayak_style:
      name: สไตล์เรือคายัค
      description: ระบุรูปแบบการออกแบบหรือการใช้งานหลักของเรือคายัค (เช่น เพื่อการพักผ่อน
        การท่องเที่ยว หรือแบบเป่าลม)
    keel_type:
      name: ประเภทกระดูกงู
      description: ระบุลักษณะการวางตัวของกระดูกงูเรือใบ
    kettlebell_style:
      name: สไตล์เคettlebell
      description: ระบุโครงสร้างหรือรูปแบบต่างๆ ของเคตเทิลเบล (เช่น เคตเทิลเบลสำหรับการแข่งขัน
        แบบปรับน้ำหนักได้ แบบนุ่ม) ช่วยให้ผู้ซื้อเลือกเคตเทิลเบลที่เหมาะสมกับความต้องการในการฝึกฝนของตนได้
    key_attachment_mechanism:
      name: กลไกการยึดกุญแจ
      description: ระบุฮาร์ดแวร์ที่ใช้ยึดกุญแจไว้ภายในกล่อง เช่น ห่วง คลิป หรือสกรูยึด
    key_retention_when_unlocked:
      name: คีย์คำทักทายของลูกค้าเมื่อปลดล็อค
      description: ระบุว่าสามารถถอดกุญแจออกจากแม่กุญแจได้หรือไม่เมื่ออยู่ในตำแหน่งปลดล็อค
    keyboard_amplifier_inputs:
      name: อินพุตแอมพลิฟายเออร์คีย์บอร์ด
      description: อินพุตแอมพลิฟายเออร์คีย์บอร์ด
    keyboard_amplifier_output_types:
      name: ประเภทเอาต์พุตของแอมป์คีย์บอร์ด
      description: ระบุประเภทขั้วต่อเอาต์พุตหลักที่รองรับโดยเครื่องขยายเสียงคีย์บอร์ดสำหรับการส่งสัญญาณเสียงไปยังระบบอื่นๆ
    keyboard_case_handle_type:
      name: ประเภทของหูหิ้วสำหรับเคสคีย์บอร์ด
      description: ระบบหูหิ้วหลักใช้สำหรับเคลื่อนย้าย/ถือเคสคีย์บอร์ด (นอกเหนือจากสายสะพาย)
    keyboard_case_interior_padding_type:
      name: ประเภทของวัสดุบุภายในเคสคีย์บอร์ด
      description: วิธีการหลักในการบุ/รองรับแรงกระแทกภายในที่ใช้ภายในเคสแข็ง
    keyboard_case_protection_level:
      name: ระดับการป้องกันของเคสคีย์บอร์ด
      description: ระดับการป้องกัน/ความแข็งแรงโดยรวมของเคสแข็ง ซึ่งเป็นตัวแยกแยะเคสแข็งแบบขึ้นรูปออกจากเคสสำหรับงานหนักแบบที่ใช้ในเครื่องบิน/มาตรฐาน
        ATA
    keyboard_case_wheel_type:
      name: ประเภทล้อสำหรับเคสคีย์บอร์ด
      description: การจัดวางล้อสำหรับกระเป๋าเดินทางแบบแข็งที่มีล้อ
    keyboard_pedal_connector_type:
      name: ประเภทขั้วต่อแป้นเหยียบคีย์บอร์ด
      description: ระบุประเภทของขั้วต่อ/ปลั๊กที่ใช้เชื่อมต่อแป้นเหยียบซัสเทนกับคีย์บอร์ดหรือเปียโนดิจิทัล
    keyboard_power_supply_type:
      name: ประเภทแหล่งจ่ายไฟคีย์บอร์ด
      description: แหล่งจ่ายไฟหลักสำหรับคีย์บอร์ด (แบตเตอรี่, อะแดปเตอร์ AC, พอร์ต
        USB)
    keyboard_stand_tier_type:
      name: ประเภทขาตั้งคีย์บอร์ดแบบหลายชั้น
      description: แสดงว่าขาตั้งจำหน่ายเป็นแบบเฉพาะขาตั้งฐานเท่านั้น หรือมีอุปกรณ์เสริมหรือเพิ่มการวางบนชั้นสองได้ด้วย
    keyboard_stand_tiers:
      name: จำนวนชั้นของขาตั้งคีย์บอร์ด
      description: จำนวนชั้นวางสำหรับเล่นที่รองรับโดยขาตั้งแบบ Z (เช่น ชั้นเดียวหรือสองชั้น)
    keychain_attachment_type:
      name: ประเภทของที่ติดพวงกุญแจ
      description: ระบุอุปกรณ์หลักที่ใช้ในการยึดพวงกุญแจเข้ากับกุญแจ กระเป๋า หรือเข็มขัด
    keychain_style:
      name: พวงกุญแจ
      description: อธิบายลักษณะโดยรวมของพวงกุญแจ (รูปร่างหน้าตา)
    keywork_finish:
      name: การตกแต่งชิ้นงานสำคัญ
      description: อธิบายถึงการตกแต่ง/การชุบผิวเฉพาะส่วนของกลไกปุ่มกด (คีย์) ซึ่งแยกจากการตกแต่งตัวเครื่องดนตรี
    kick_point:
      name: จุดเตะ
      description: ระบุตำแหน่งจุดหักงอของด้ามไม้ฮอกกี้ ซึ่งส่งผลต่อความเร็วและความรู้สึกในการปล่อยลูก
    kick_zone_grip_system:
      name: ระบบจับยึดบริเวณเตะ
      description: ระบุเทคโนโลยีที่ใช้ในบริเวณจุดเตะของสกีเพื่อเพิ่มแรงยึดเกาะ
    kickboard_features:
      name: คุณสมบัติของบอร์ดเตะ
      description: คุณลักษณะพิเศษที่โดดเด่นของแผ่นฝึกว่ายน้ำที่ช่วยเพิ่มประสิทธิภาพการฝึกฝนหรือความสะดวกสบาย
        รวมถึงตัวเลือกพื้นผิวและด้ามมือจับ
    kickboard_handle_style:
      name: Kickboard แฮนสลิงสไตล์
      description: ระบุว่ากระดานเตะให้มือจับหรือพื้นผิวทรีตเมนต์ที่ Influence การขนย้ายและความสะดวกสบายหรือไม่และอย่างไร
    kickstand_mounting_position:
      name: ตำแหน่งการติดตั้งขาตั้ง
      description: ระบุตำแหน่งบนเฟรมจักรยานที่ขาตั้งจะยึดติด (เช่น ติดตั้งตรงกลาง
        ติดตั้งที่โซ่ ติดตั้งที่แกนล้อหลัง)
    kickstand_type:
      name: ประเภทขาตั้ง
      description: อธิบายรูปแบบโครงสร้างหรือกลไกของขาตั้ง (เช่น ขาตั้งข้างแบบขาเดียว
        ขาตั้งกลางแบบสองขา ขาตั้งแบบยืดหดได้)
    kidney_belt_support_level:
      name: ระดับการรองรับของเข็มขัดพยุงหลัง
      description: ระดับการรองรับโดยรวมที่ผู้ผลิตกำหนดไว้สำหรับเข็มขัดพยุงหลัง เพื่อช่วยพยุงหลังส่วนล่างและหน้าท้อง
    kiln_firing_atmosphere:
      name: บรรยากาศการเผาในเตาเผา
      description: ระบุบรรยากาศการเผาที่เตาเผาสามารถรองรับได้ในระหว่างการทำงาน (เช่น
        ออกซิเดชันหรือรีดักชัน)
    kiln_heating_element_type:
      name: ประเภทขององค์ประกอบความร้อนเตาเผา
      description: ประเภท/วัสดุของชิ้นส่วนทำความร้อนที่ใช้ในเตาเผา
    kingpin_design:
      name: การออกแบบสลักยึด
      description: อธิบายรูปแบบการก่อสร้างของฮาร์ดแวร์ที่สำคัญนั้นเอง น้ำหนัก Impact
        และการบดล้างสต็อก
    kingpin_orientation:
      name: ทิศทางการติดตั้งสลักยึด
      description: บ่งบอกทิศทางของสลักยึดของรถบรรทุก ซึ่งส่งผลต่อลักษณะการขับขี่และความเข้ากันได้ของแผ่นล้อ
    kit_components_included:
      name: ส่วนประกอบในชุดอุปกรณ์
      description: ระบุชิ้นส่วนฮาร์ดแวร์แต่ละชิ้นที่ให้มาในชุดอุปกรณ์ (เช่น เสาปักพื้น
        สลักเกลียว สายรัด เครื่องมือติดตั้ง) เพื่อให้ผู้ซื้อทราบว่ากำลังซื้ออะไรอยู่
    kit_format:
      name: รูปแบบชุดอุปกรณ์
      description: ระบุวิธีการบรรจุและพกพาชุดอุปกรณ์ (เช่น ซอง กระเป๋า กล่อง)
    kit_items_included:
      name: รายการอุปกรณ์ที่รวมอยู่ในชุด
      description: ชี้แจงรายการอุปกรณ์หลักและวัสดุที่รวมอยู่ในชุดการทำไวน์ เพื่อให้นักช้อปสามารถแยกแยะความแตกต่างของชุดเริ่มต้นใช้งานจากการเติมเฉพาะส่วนผสมเท่านั้น
    kit_pouch_case_type:
      name: กระเป๋า Kit /กระเป๋าแบบ
      description: ระบุประเภทของอุปกรณ์จัดเก็บที่รวมอยู่ในชุดปฐมพยาบาล (ถ้ามี)
    kit_tools_included:
      name: เครื่องมือ Kit ประกอบด้วย
      description: ระบุรายการเครื่องมือหลักที่ให้มาในชุดอุปกรณ์ (ถ้ามี) เพื่อใช้ในการประกอบชิ้นงาน
    kite_inflation_system:
      name: ระบบการสูบลมว่าว
      description: อธิบายวิธีการสูบลมที่ขอบด้านหน้าและโครงของว่าว
    kite_line_configuration:
      name: การกำหนดค่าสายว่าว
      description: ระบุจำนวนสายควบคุม/สายบินที่ใช้สำหรับปีกว่าว ซึ่งเป็นข้อกำหนดพื้นฐานที่สำคัญมากในการเลือกจับคู่บาร์ควบคุมกับสายว่าวให้ถูกต้อง
    kite_type:
      name: ประเภทว่าว
      description: กำหนดประเภทโครงสร้างของว่าว (Shapes และรูปแบบสายบังคับว่าว)
    kiteboard_bag_style:
      name: สไตล์กระเป๋าใส่ไคท์บอร์ด
      description: รูปแบบหรือประเภทย่อยเฉพาะของกระเป๋าใส่ไคท์บอร์ด (เช่น กระเป๋าใส่กระดานโต้คลื่น,
        ถุงกอล์ฟ, กระเป๋าเดินทาง, กระเป๋าใส่อุปกรณ์กีฬาทางน้ำ)
    kiwifruit_variety:
      name: กีวีหลากหลายสายพันธุ์
      description: ระบุสายพันธุ์หรือสีเฉพาะของกีวี (สีเขียว สีทอง สีแดง ฯลฯ)
    knee_pad_pocket_type:
      name: ประเภทช่องใส่แผ่นรองเข่า
      description: ระบุว่าเสื้อผ้าชิ้นนี้สามารถใส่แผ่นรองเข่าป้องกันได้หรือไม่ และอย่างไร
    knee_pad_style:
      name: รูปแบบแผ่นรองเข่า
      description: อธิบายรูปแบบหรือโครงสร้างของอุปกรณ์ป้องกันหัวเข่า (เช่น ปลอกหุ้ม,
        ที่รัดเข่า, แผ่นป้องกัน)
    knee_protection_design:
      name: การออกแบบเพื่อป้องกันหัวเข่า
      description: ระบุจำนวนข้อต่อหัวเข่าที่ติดตั้งอยู่ในอุปกรณ์ป้องกันขา
    kneeboard_construction:
      name: โครงสร้างของบอร์ดนั่ง
      description: ระบุเทคนิคการผลิตหลักหรือวัสดุผสมที่ใช้ในการสร้างบอร์ด (เช่น พลาสติกขึ้นรูปด้วยระบบโรโตโมลด์
        ขึ้นรูปด้วยเรซิน คาร์บอนไฟเบอร์)
    kneeboard_strap_type:
      name: ประเภทแผ่นรองเข่าแบบมีสายรัด
      description: อธิบายถึงรูปแบบของสายรัดเข่าที่ใช้ยึดผู้เล่นไว้กับบอร์ด
    knife_lock_mechanism:
      name: กลไกการล็อกมีด
      description: ระบุกลไกที่ใช้ในการยึดใบมีดพับให้อยู่ในตำแหน่งเปิด หรือบ่งชี้ถึงการออกแบบที่ไม่มีระบบล็อค
    knife_locking_mechanism:
      name: กลไกการล็อกใบมีด
      description: ระบุประเภทของกลไกที่ยึดใบมีดให้อยู่ในตำแหน่งเปิด ซึ่งเป็นตัวกำหนดความปลอดภัย
        ความแข็งแรง และความสะดวกในการใช้งานสำหรับมีดพับแบบล็อคใบมีดโดยตรง
    knife_opening_mechanism:
      name: กลไกการเปิดใบมีด
      description: อธิบายว่าใบมีดนั้นมาจากแฮนสไลด์อย่างไร ซึ่งแยกความแตกต่างระหว่างรูปแบบการเปิดแบบแมนนวล
        ระบบช่วย อัตโนมัติ และแบบพิเศษ
    knife_system:
      name: ระบบมีด
      description: กลไกการทำงานของใบมีดตัดบนจักรเย็บผ้าแบบโอเวอร์ล็อกเป็นอย่างไร และทำงานอย่างไร
    knit_elastic_application:
      name: วิธีการเย็บยางยืดแบบถัก
      description: ระบุการใช้งานด้านการเย็บ/งานฝีมือที่ต้องการสำหรับขอบยางยืดแบบถัก
    knit_pattern:
      name: แพทเทิร์นถัก
      description: ระบุลายถักหลักหรือเนื้อผ้าที่ใช้ในผ้าคาร์ดิแกน เช่น ลายถักเคเบิล
        ลายถักริบ หรือลายวาฟเฟิล ช่วยให้ผู้ซื้อสามารถหาเนื้อผ้าและคุณสมบัติทางความอบอุ่นที่ต้องการได้
    knit_style:
      name: สไตล์ถัก
      description: รูปแบบการถัก ระบุโครงสร้างการถักหลัก เนื้อสัมผัส หรือลวดลายตกแต่งที่ปรากฏบนผ้าสเวตเตอร์
    knitting_marker_counter_type:
      name: เครื่องหมาย/ตัวนับสำหรับงานถัก
      description: ระบุประเภทผลิตภัณฑ์ตามฟังก์ชันการใช้งานภายในกลุ่มเครื่องหมายและตัวนับงานถัก
    knitting_needle_tip_style:
      name: สไตล์ปลายเข็มถัก
      description: ความคม/รูปทรงของปลายเข็มได้รับการปรับให้เหมาะสมกับเส้นด้ายและเทคนิคการถักที่แตกต่างกัน
    knock_sensor_technology:
      name: เทคโนโลยีเซ็นเซอร์ตรวจจับการน็อค
      description: เทคโนโลยีการตรวจจับที่ใช้ในเซ็นเซอร์ตรวจจับการเคาะเครื่องยนต์
    knurl_aggressiveness:
      name: ความคมของลายกันลื่น
      description: อธิบายถึงความคมหรือพื้นผิวของลายกันลื่นบนด้ามบาร์ ซึ่งมีผลต่อความสบายและความมั่นคงในการจับ
    knurl_marking_standard:
      name: มาตรฐานการทำเครื่องหมายลายกันลื่น
      description: ระบุตำแหน่งของวงแหวนอ้างอิงลายกันลื่นที่ใช้สำหรับการวางมือ (เช่น
        เครื่องหมาย IPF หรือ IWF)
    kohlrabi_variety:
      name: โคลราบีหลากหลายชนิด
      description: ระบุสายพันธุ์หรือพันธุ์ที่วางจำหน่ายของกะหล่ำปลีหัวกลม ทำให้ลูกค้าสามารถเลือกได้ตามรสชาติ
        ขนาด และสีที่แตกต่างกัน
    koji_mold_type:
      name: ชนิดของราโคจิ
      description: ระบุชนิดหรือสายพันธุ์ของราโคจิที่ใช้ในระหว่างกระบวนการหมัก ซึ่งส่งผลต่อกลิ่นและรสชาติ
    kumquat_variety:
      name: พันธุ์ส้มจี๊ด
      description: ระบุสายพันธุ์หรือพันธุ์ของส้มจี๊ดที่วางจำหน่าย ช่วยให้ผู้ซื้อสามารถเลือกผลไม้ตามรสชาติ
        ขนาด หรือการนำไปใช้ในการประกอบอาหารได้
    label_edge_type:
      name: ประเภทขอบ Label
      description: ระบุรูปแบบการตกแต่งขอบที่ใช้เพื่อป้องกันการลุ่ยและเพิ่มความสวยงาม
    label_finish:
      name: ลักษณะพื้นผิวของฉลาก
      description: ระบุลักษณะพื้นผิว ลวดลาย หรือการเคลือบ/การบำบัดป้องกันที่ใช้กับฉลาก
    label_finish_edge_style:
      name: ลักษณะการตกแต่ง/ขอบของ Label
      description: วิธีการตกแต่งขอบ ซึ่งส่งผลต่อความสบายและความทนทาน (เช่น ขอบถักทอเทียบกับขอบตัดด้วยเลเซอร์)
    label_fold_type:
      name: รูปแบบการพับป้าย
      description: ระบุวิธีการเย็บป้ายลงบนสินค้า (เช่น พับด้านปลาย หรือ พับตรงกลาง)
        ซึ่งส่งผลต่อวิธีการติดและตำแหน่งที่ป้ายอยู่
    label_text_type:
      name: ประเภทข้อความบนฉลาก
      description: ระบุว่า Label เป็นฉลากเปล่า พิมพ์สำเร็จ หรือต้องการปรับแต่ง/ระบุชื่อ
    lace_area_size:
      name: ขนาดบริเวณลูกไม้
      description: กำหนดขนาดหรือรูปแบบของส่วนลูกไม้ (เช่น แผ่นปิด 4x4, แผ่นปิดด้านหน้า
        13x6) ซึ่งจะกำหนดพื้นที่สำหรับแบ่งผม
    lace_tightener_style:
      name: สไตล์รัดลูกไม้
      description: ระบุการออกแบบทางกลไกหรือรูปทรงของอุปกรณ์รัดเชือกรองเท้า
    lace_type:
      name: ประเภทลูกไม้
      description: อธิบายถึงวัสดุหรือลักษณะของลูกไม้บริเวณแนวผม/ฐานวิก ซึ่งมีผลต่อความสมจริงและการจับคู่สีผิว
    lacrosse_ball_certification:
      name: การรับรองลูกลาครอส
      description: ระบุการอนุมัติหรือมาตรฐานที่ลูกลาครอสผ่านมาตรฐานจากหน่วยงานกำกับดูแลกีฬา
    lacrosse_goal_regulation_certification:
      name: การรับรองมาตรฐานของเสาและตาข่ายประตูลาครอส
      description: ระบุว่าประตูหรือตาข่ายลาครอสเป็นไปตามข้อกำหนดเฉพาะของหน่วยงานกำกับดูแล
        (เช่น NCAA หรือ NFHS) หรือไม่
    lacrosse_pocket_type:
      name: ประเภทกระเป๋าลาครอส
      description: ระบุรูปแบบทั่วไปของช่องใส่ลูกบอลหรือตาข่ายที่ร้อยอยู่บนหัวไม้ ซึ่งมีผลต่อการควบคุมและการปล่อยลูกบอล
    lacrosse_string_type:
      name: ลาครอส
      description: แยกประเภทรูปแบบที่แน่นอนหรือการใช้งานตามวัตถุประสงค์ของรายการหรือรายการตาข่าย
        ดังนั้นใบรับรองจึงสามารถแยกความแตกต่างระหว่างชิ้นตาข่าย ฟิล และรายการเจาะจงภายในกระเป๋าได้
    ladder_position:
      name: ตำแหน่งบันได
      description: ระบุตำแหน่งของบันไดหรือทางขึ้นลงบนเตียงสองชั้นสำหรับเด็กวัยหัดเดิน
    lanyard_attachment_hardware:
      name: อุปกรณ์ยึดเชือกคล้อง ฮาร์ดแวร์
      description: แสดงรูปแบบของฮาร์ดแวร์ที่ปลายสายคล้องคอ ซึ่งใช้เชื่อมต่อกับกุญแจ
        บัตร โทรศัพท์ หรืออุปกรณ์เสริมอื่นๆ
    lanyard_style:
      name: รูปแบบสายคล้องคอ
      description: ระบุวิธีการสวมหรือพกพาสายคล้องคอ
    lanyard_type:
      name: แบบสายคล้องคอ
      description: อธิบายรูปแบบของสายคล้องคอที่ให้มาด้วยหรือสามารถใช้ร่วมกับนกหวีดได้
    lap_hand_loom_accessories_included:
      name: รวมอุปกรณ์เสริมสำหรับเครื่องทอมือแบบตัก
      description: อุปกรณ์เสริมที่รวมอยู่ในชุดเครื่องทอผ้าแบบวางบนตัก
    lapel_style:
      name: สไตล์ปกเสื้อ
      description: ระบุรูปแบบปกเสื้อสูท (เช่น ปกเว้า ปกแหลม ปกโค้ง)
    laser_safety_class:
      name: ระดับความปลอดภัยของเลเซอร์
      description: การจำแนกความปลอดภัยของเลเซอร์ของสินค้า (เช่น Class 2, 3R, 3B, 4)
        ตามที่ระบุไว้ในเอกสารประกอบอุปกรณ์/Label
    latex_processing_method:
      name: วิธีการแปรรูปน้ำยาง
      description: ระบุถึงกระบวนการผลิตที่ใช้ในการผลิตโฟมลาเท็กซ์ ซึ่งโดยทั่วไปจะเป็นกระบวนการผลิตของ
        Dunlop หรือ Talalay ซึ่งส่งผลต่อสัมผัส การตอบสนอง และราคา
    latex_type:
      name: ประเภทลาเท็กซ์
      description: ระบุแหล่งที่มาและส่วนประกอบของน้ำยางที่ใช้ในที่นอน (ธรรมชาติ ออร์แกนิก
        สังเคราะห์ หรือผสม) เพื่อแจ้งให้ผู้ซื้อทราบถึงความทนทาน ความเป็นมิตรต่อสิ่งแวดล้อม
        และสารก่อภูมิแพ้ที่อาจเกิดขึ้น
    launch_profile:
      name: รูปแบบการปล่อยลูก
      description: อธิบายวิถีการปล่อยลูกโดยทั่วไป (ต่ำ กลาง สูง) ที่ก้านไม้กอล์ฟได้รับการออกแบบมาให้สร้างขึ้น
    launcher_mounting_configuration:
      name: รูปแบบการติดตั้งเครื่องยิง
      description: ระบุวิธีการติดตั้งหรือการกำหนดค่าการใช้งานของเครื่องยิงจรวด เพื่อช่วยผู้ซื้อที่ต้องการตัวเลือกแบบตั้งเดี่ยว
        แบบติดตั้งใต้ลำกล้อง หรือแบบติดตั้งบนราง
    layer_construction:
      name: โครงสร้างชั้น
      description: ระบุโครงสร้างการเคลือบผ้า (เช่น 2 ชั้น, 2.5 ชั้น, 3 ชั้น) ซึ่งส่งผลต่อน้ำหนัก
        ความสะดวกในการพับเก็บ และความทนทาน
    layer_design:
      name: การออกแบบเลเยอร์
      description: อธิบายโครงสร้างของตาข่ายคลุมผมในแง่ของชั้นต่างๆ หรือความสามารถในการกลับด้านใช้ได้
    lazy_kate_tension_control_type:
      name: ระบบควบคุมแรงตึงด้าย Lazy Kate
      description: วิธีการที่ Lazy Kate ใช้แรงดึง/แรงตึงกับแกนด้ายระหว่างการปั่นหรือการม้วนด้าย
    lead_hardware_type:
      name: ประเภทของอุปกรณ์ยึดสายจูง
      description: อธิบายรูปแบบการยึดหรือตัวยึดที่ปลายสายจูง (เช่น ตัวล็อกแบบกด, คลิป,
        ห่วง, โซ่ ฯลฯ) ซึ่งส่งผลต่อความสะดวกในการใช้งาน ความปลอดภัย และความเหมาะสมในการใช้งานแต่ละประเภท
    leaf_gelatin_grade:
      name: เจลาตินใบไม้เกรดดี
      description: ระบุเกรดความแข็งแรงมาตรฐานที่ใช้สำหรับแผ่นเจลาติน
    leaf_preparation:
      name: การเตรียมใบไม้
      description: อธิบายวิธีการเตรียมใบไม้ก่อนบรรจุ เช่น การสับ การหั่นฝอย หรือการหั่นเป็นเส้นยาว
    leaf_spring_material:
      name: วัสดุที่ใช้ทำแหนบสปริง
      description: วัสดุก่อสร้างเบื้องต้นของแหนบแพ็ค
    leak_protection_layer:
      name: ชั้นป้องกันการรั่วซึม
      description: ระบุว่ากางเกงว่ายน้ำแบบมีซับในใช้ระบบชั้นเดียวหรือสองชั้นเพื่อป้องกันการรั่วซึม
    leash_clip_type:
      name: ประเภทของตัวล็อกสายจูง
      description: ระบุประเภทของตัวล็อกหรืออุปกรณ์ที่ใช้สำหรับติดสายจูงเข้ากับปลอกคอหรือสายรัดอก
        (เช่น ตัวล็อกแบบสลัก, คาราบิเนอร์, ตัวล็อกแบบหมุนได้)
    leash_style:
      name: สไตล์สายจูง
      description: อธิบายลักษณะการจัดเรียงหรือรูปแบบการม้วนของสายจูง
    leash_type:
      name: ประเภทของสายจูง
      description: จำแนกประเภทรูปแบบโดยรวมหรือการออกแบบตามวัตถุประสงค์ของสายจูง เพื่อให้สามารถกรองตามการใช้งานที่ต้องการได้อย่างรวดเร็ว
    leavening_action_type:
      name: ประเภทการขึ้นฟู
      description: ระบุสูตรทางเคมีหรือรูปแบบการทำให้ขึ้นฟูของผงฟู (เช่น แบบออกฤทธิ์ครั้งเดียว
        แบบออกฤทธิ์สองครั้ง ปราศจากอะลูมิเนียม) สิ่งนี้ส่งผลโดยตรงต่อประสิทธิภาพในการอบและความเหมาะสมของสูตรอาหาร
    leavening_agent:
      name: สารช่วยให้ขึ้นฟู
      description: ระบุกลไกหลักในการทำให้แป้งขึ้นฟู
    led_color_options:
      name: ตัวเลือกสี LED
      description: ชี้แจงสี LED ที่สามารถเลือกใช้ได้บนอุปกรณ์เตือนภัย เพื่อใช้เป็นตัวบ่งชี้การกัดด้วยภาพ
    led_indicator_color:
      name: สีของไฟแสดงสถานะ LED
      description: ระบุสีของไฟแสดงสถานะ LED ของผลิตภัณฑ์ ช่วยให้นักตกปลาจับคู่สัญญาณเตือนต่างๆ
        หรือเลือกตามความชอบส่วนตัวได้
    led_light_color:
      name: สีของแสง LED
      description: ระบุสีของไฟ LED ในตัว
    leek_variety:
      name: พันธุ์ต้นหอม
      description: ระบุสายพันธุ์หรือพันธุ์ของต้นหอม เพื่อให้สามารถแยกแยะได้ตามรสชาติ
        ขนาด และฤดูกาลปลูก
    leg_coverage:
      name: ความยาวช่วงขา
      description: ระบุว่าชุดว่ายน้ำคลุมขามากน้อยแค่ไหน (เช่น แบบสั้น หรือแบบยาวเต็มตัว)
    leg_cuff_style:
      name: สไตล์ขอบขา
      description: ระบุรูปแบบการเย็บเก็บขอบบริเวณข้อเท้าของกางเกง
    leg_cut_height:
      name: ความสูงของการตัดขา
      description: ระบุความสูงของช่องเปิดขาของกางเกงบิกินี่
    leg_cut_style:
      name: สไตล์ตัดขา
      description: อธิบายรูปทรงของช่องเว้าขากางเกง ซึ่งส่งผลต่อรูปลักษณ์ ความสบายในการสวมใส่
        และรอยไหม้แดด
    leg_length:
      name: ความยาวขา
      description: จัดหมวดหมู่กางเกงว่ายน้ำตามความยาวขา (สั้น กลาง ยาว) เพื่อให้ผู้ซื้อสามารถเลือกการปกปิดที่ต้องการได้โดยไม่ต้องแบ่งหมวดหมู่ซ้ำ
    leg_loop_type:
      name: ประเภทของห่วงรัดต้นขา
      description: อธิบายถึงการออกแบบห่วงรัดขา
    leg_opening_style:
      name: สไตล์เปิดขา
      description: ระบุลักษณะการตกแต่งขอบขาของกางเกงจ็อกเกอร์ เช่น ขอบยางยืด ปลายขาซิป
        หรือปลายขาแบบเปิด
    leg_style:
      name: สไตล์ขา
      description: กำหนดรูปแบบการออกแบบหรือโครงสร้างของขาหรือฐานม้านั่ง
    legging_foot_design:
      name: ดีไซน์กางเกงเลกกิ้งแบบมีที่คลุมเท้า
      description: ระบุว่าเลกกิ้งเป็นแบบไม่มีส่วนเท้า มีส่วนเท้า หรือสามารถปรับเปลี่ยนได้ระหว่างสองแบบ
    leggings_waistband_style:
      name: กางเกงเลกกิ้งทรงขอบเอว
      description: บ่งบอกการออกแบบโครงสร้างของขอบเอวกางเกงเลกกิ้ง ซึ่งมีผลต่อความสบาย
        การซัพพอร์ต และความสวยงาม
    lei_closure_style:
      name: รูปแบบการปิดของพวงมาลัย
      description: อธิบายว่าพวงมาลัยนั้นเป็นแบบวนเป็นวงต่อเนื่องหรือมีปลายเปิดที่สามารถผูกหรือติดริบบิ้นได้
    lemon_variety:
      name: พันธุ์มะนาว
      description: ระบุสายพันธุ์หรือพันธุ์เฉพาะของมะนาว (เช่น ยูเรก้า เมเยอร์ อมาลฟี)
    length_adjustment_method:
      name: วิธีการปรับความยาว
      description: ระบุว่าสามารถปรับความยาวของเชือกกระโดดให้เหมาะสมกับผู้ใช้ได้หรือไม่
        และปรับอย่างไร
    lens_color_tint:
      name: สี/โทนสีของเลนส์
      description: สีหรือเฉดสีของเลนส์แว่นตานิรภัยที่มาพร้อมกับผลิตภัณฑ์
    lens_construction:
      name: โครงสร้างเลนส์
      description: ระบุโครงสร้างของเลนส์ (เช่น เลนส์แผ่นเดียว เลนส์สองชั้นแบบกันความร้อน)
        เพื่อบ่งบอกถึงความต้านทานต่อการเกิดฝ้าและประสิทธิภาพทางแสง
    lens_tint_category:
      name: ประเภทโทนสีของเลนส์ย้อมสี
      description: จำแนกความเข้มของเลนส์ตามมาตรฐานความเข้มของเลนส์สากล ช่วยให้ลูกค้าเลือกเลนส์ที่เหมาะสมกับสภาพแสงต่างๆ
        ได้
    lettuce_variety:
      name: ผักกาดหอมหลากหลายชนิด
      description: ระบุพันธุ์ผักกาดหอมเฉพาะสายพันธุ์ (เช่น ไอซ์เบิร์ก โรเมน บัตเตอร์เฮด)
        ทำให้สามารถกรองและเปรียบเทียบได้อย่างแม่นยำ
    level_of_play:
      name: ระดับการเล่น
      description: ระดับประสิทธิภาพตามที่ระบุไว้ซึ่ง Align กับความสามารถในการแข่งขันและงบประมาณของผู้เล่น
    lever_configuration:
      name: รูปแบบคันโยก
      description: ระบุรูปแบบคันโยก/คันบังคับของระบบควบคุมเครื่องยนต์เรือ (เช่น คันโยกเดี่ยว
        หรือ คันโยกคู่)
    lever_type:
      name: ประเภทคันโยก
      description: ประเภท/กลไกของคันโยกเปลี่ยนระดับเสียงที่ติดตั้งบนพิณ
    license_plate_cover_style:
      name: สไตล์ฝาครอบป้ายทะเบียน
      description: ระบุรูปแบบโครงสร้างฝาครอบป้ายทะเบียน (เช่น ฝาครอบแบบเต็ม vs ฝาครอบแบบขันสกรู)
    license_plate_personalization_type:
      name: ประเภทการกำหนดป้ายทะเบียนแบบเฉพาะบุคคล
      description: ระบุว่าป้ายทะเบียนว่างเปล่า พิมพ์ไว้ล่วงหน้า หรือความช่วยเหลือที่มีให้พารามิเตอร์
        (ข้อความและ/หรือกราฟิก)
    license_usage_terms:
      name: เงื่อนไขการอนุญาต/การใช้งาน
      description: สิทธิ์ในการใช้งานสำหรับแบบ (เช่น การใช้งานส่วนบุคคลเท่านั้น เทียบกับ
        การใช้งานเชิงพาณิชย์แบบจำกัด)
    licensed_sports_property:
      name: สถานที่กีฬาที่ได้รับอนุญาต
      description: ระบุว่าสินค้าได้รับอนุญาตอย่างเป็นทางการจากลีก/ทีม/องค์กรหรือไม่
    lid_hinge_mechanism:
      name: กลไกบานพับฝาปิด
      description: ระบุกลไกบานพับที่ใช้สำหรับฝาปิด ซึ่งส่งผลต่อความปลอดภัยและความสะดวกในการใช้งาน
    lid_support_positions:
      name: ตำแหน่งการรองรับฝาปิด
      description: ระบุตำแหน่งการรองรับก้านฝาปิดสำหรับแกรนด์เปียโน (ระยะการเปิดฝาปิด)
    lie_angle_color_code:
      name: รหัสสีแสดงมุมองศาของหน้าไม้
      description: แสดงถึงระบบการกำหนดมุมองศาหน้าไม้ด้วยรหัสสีที่ผู้ผลิตใช้กับไม้กอล์ฟบางรุ่น
        (เช่น จุดสีดำ จุดสีเขียว)
    life_jacket_certification_standard:
      name: มาตรฐานการรับรองเสื้อชูชีพ
      description: การจำแนกประเภทความปลอดภัยอย่างเป็นทางการหรือมาตรฐานที่ผลิตภัณฑ์นั้นตรงตามข้อกำหนด
        เช่น ประเภท USCG หรือระดับ ISO/AS
    life_raft_certification_standard:
      name: มาตรฐานการรับรองแพชูชีพ
      description: มาตรฐานความปลอดภัย/ใบรับรองที่ใช้ในการผลิตและบำรุงรักษาแพยาง
    life_raft_container_type:
      name: ประเภทของภาชนะสำหรับแพชูชีพ
      description: วิธีการบรรจุแพชูชีพสำหรับการจัดเก็บและการใช้งาน
    life_vest_approval_standard:
      name: มาตรฐานการอนุมัติเสื้อชูชีพ
      description: ระบุมาตรฐานการรับรอง/การอนุมัติที่เสื้อชูชีพนั้นเป็นไปตามข้อกำหนด
    life_vest_intended_user:
      name: ผู้ใช้งานเสื้อชูชีพที่เหมาะสม
      description: ระบุประเภทผู้สวมใส่ที่เหมาะสมสำหรับการปรับแต่งและจัดเตรียมอุปกรณ์
    lifebuoy_approval_standard:
      name: มาตรฐานการอนุมัติห่วงชูชีพ
      description: การอนุมัติด้านความปลอดภัยหรือมาตรฐานที่ห่วงชูชีพนั้นเป็นไปตามข้อกำหนด
        (เช่น USCG/SOLAS)
    lifebuoy_features:
      name: คุณสมบัติห่วงชูชีพ
      description: ความปลอดภัยในการใช้งาน การติดตั้ง/การใช้งาน และอุปกรณ์เสริมที่ให้มาในชุดห่วงชูชีพ
    lift_mechanism_type:
      name: ประเภทกลไกการยก
      description: ระบุกลไกที่ช่วยในการยก/ลดระดับ หรือเปิด/ปิดเตียงติดผนัง
    lift_stand_support_point:
      name: จุดช่วยเหลือการยก/ยืน
      description: ตรงจุดที่ตัวยก/ขาตั้งสัมผัส/รองรับตัวรถ
    lifting_gas_type:
      name: ประเภทก๊าซยก
      description: ระบุแก๊สยกตัวหลักหรือสารช่วยลอยตัวที่ใช้โดยเรือเหาะ
    lifting_support_type:
      name: ประเภทของระบบยก
      description: ระบุว่าลิฟต์ถูกขับเคลื่อนขึ้นไปโดยใช้ราง หรือยกขึ้นโดยใช้แขน/แผ่นรองสัมผัสกับโครง/จุดยก
    ligature_and_cap_component_type:
      name: ประเภทของส่วนประกอบตัวรัดลิ้นและฝาครอบ
      description: ระบุว่าผลิตภัณฑ์เป็นตัวรัดลิ้น ฝาครอบ หรือชุดที่รวมทั้งสองอย่าง
    ligature_material:
      name: วัสดุรัด
      description: วัสดุหลักของตัวรัดลิ้นที่สัมผัสและยึดลิ้นไว้ (เช่น โลหะ หนัง ผ้า)
    ligature_plating_or_finish:
      name: การชุบหรือการตกแต่งตัวผูก
      description: ระบุการชุบและ/หรือการตกแต่งพื้นผิวที่ใช้กับตัวรัดลิ้นและ/หรือฝาครอบโลหะของคลาริเน็ต
    ligature_reed_contact_style:
      name: รูปแบบการสัมผัสลิ้นลิ้นแบบลิเกเจอร์
      description: ระบุลักษณะการสัมผัสระหว่างตัวรัดลิ้นกับลิ้นเป่า (เช่น สัมผัสน้อยที่สุด,
        สัมผัสหลายจุด, แบบพันรอบ)
    ligature_screw_position_relative_to_reed:
      name: ตำแหน่งสกรูยึดลิ้น (เทียบกับลิ้นเป่า)
      description: แสดงตำแหน่งของสกรูขันรัดลิ้น (หรือหลายสกรู) เทียบกับด้านที่หันเข้าหาลิ้น/ผู้เล่น
        เมื่อติดตั้งบนปากเป่า
    ligature_tension_adjustment_mechanism:
      name: กลไกปรับความตึงของสายรัด
      description: อธิบายวิธีการที่ตัวรัดลิ้นใช้/ปรับแรงกดบนลิ้น (การออกแบบการยึด)
    ligature_tightening_mechanism_type:
      name: กลไกการรัดสายแบบใด
      description: ระบุกลไกที่ใช้ในการรัดสายรัดรอบปากเป่าและลิ้นเป่า (เช่น สกรูเดี่ยว
        สกรูคู่ คันโยก/แบบปลดเร็ว)
    light_bar_housing_material:
      name: วัสดุตัวเรือนไฟแท่ง
      description: วัสดุหลักของตัวเรือน/โครงไฟส่องสว่าง มีผลต่อความทนทานและการระบายความร้อน
    light_bar_lens_material:
      name: วัสดุที่ใช้ทำเลนส์ของไลท์บาร์
      description: วัสดุหลักของเลนส์/ฝาครอบแถบไฟ ซึ่งสามารถส่งผลต่อความทนทานต่อแรงกระแทกและความคมชัดของภาพได้
    light_bar_mounting_location:
      name: ตำแหน่งติดตั้งไลท์บาร์
      description: ตำแหน่งติดตั้งหลักที่ตั้งใจไว้บนตัวรถ
    light_stand_style:
      name: สไตล์ขาตั้งไฟ
      description: ระบุรูปแบบโครงสร้างหรือรูปทรงของขาตั้งที่ใช้สำหรับไฟเอฟเฟกต์พิเศษ
        (เช่น ขาตั้งสามขา, ขาตั้งรูปตัว T, ขาตั้งแบบหมุน) ไม่ใช่พื้นผิวการติดตั้ง
        (ผนัง/เพดาน) ซึ่งกำหนดโดยประเภทการติดตั้ง
    light_switch_function:
      name: หน้าที่ของสวิตช์ไฟ
      description: ระบุว่าสวิตช์นั้นควบคุมวงจรไฟหรือฟังก์ชันใดบ้าง
    lighting_control_protocols_supported:
      name: รองรับโปรโตคอลควบคุมแสงสว่าง
      description: โปรโตคอลควบคุม/เครือข่ายที่ตัวควบคุมรองรับ นอกเหนือจากหรือแทนที่
        DMX512
    lighting_effects:
      name: เอฟเฟกต์แสง
      description: ระบุคุณสมบัติแสงไฟแบบบูรณาการใด ๆ ที่ช่วยเพิ่มประสิทธิภาพการเล่นเกมหรือความสวยงาม
    lighting_mode:
      name: โหมดการให้แสงสว่าง
      description: ระบุรูปแบบไฟแสดงสถานะการทำงานที่มีให้เลือก เช่น ไฟสว่างคงที่ ไฟกระพริบ
        ไฟแฟลช หรือไฟ SOS
    lily_variety:
      name: พันธุ์ลิลลี่
      description: ระบุพันธุ์ลิลลี่เชิงพาณิชย์/พฤกษศาสตร์ที่จำหน่ายเป็นดอกไม้ตัดสด
        (เช่น ลิลลี่เอเชียติก ลิลลี่โอเรียนทัล)
    limb_articulation:
      name: ข้อต่อแขนขา
      description: ระบุระดับความยืดหยุ่นหรือการขยับของแขนขาในหุ่นจำลอง (ไม่มี, คงที่,
        ยืดหยุ่นได้บางส่วน, ขยับได้เต็มที่)
    limb_material:
      name: วัสดุที่ใช้ทำส่วนประกอบของคันธนู
      description: วัสดุหลักที่ใช้ในการผลิตส่วนประกอบของคันธนูหรือหน้าไม้ มีผลต่อ
        น้ำหนัก ความทนทาน การสั่นสะเทือน และประสิทธิภาพโดยรวม
    lime_variety:
      name: พันธุ์มะนาว
      description: บ่งบอกสายพันธุ์เฉพาะทางพฤกษศาสตร์หรือเชิงพาณิชย์ของมะนาวที่จำหน่าย
    line_buoyancy:
      name: แรงลอยตัวของเส้น
      description: อธิบายว่าสายถักลอยหรือจมตามธรรมชาติ และในอัตราใด ซึ่งส่งผลต่อการล่อเหยื่อและการจัดการสายเบ็ด
    line_purpose:
      name: วัตถุประสงค์ของสาย
      description: กำหนด Functions ที่ตั้งใจไว้ของสายต่างๆ ภายในระบบว่าว (เช่น สายบังคับทิศทางด้านหน้า
        สายลดแรงดึง สายบังคับทิศทาง)
    linen_finish_treatment:
      name: การตกแต่ง/การปรับสภาพผ้าลินิน
      description: กระบวนการตกแต่งใดๆ ที่ใช้กับผ้าลินิน ซึ่งเปลี่ยนแปลงสัมผัส รูปลักษณ์
        หรือคุณสมบัติการใช้งาน
    linen_weave_type:
      name: ประเภทการทอผ้าลินิน
      description: ระบุโครงสร้างการทอของผ้าลินิน ซึ่งส่งผลต่อเนื้อสัมผัส การระบายอากาศ
        และความพลิ้วไหวของผ้า
    liner_padding_type:
      name: ประเภทแผ่นรองซับ
      description: ระบุลักษณะการผลิตหรือวัสดุบุรองของซับใน (เช่น ตาข่าย, บุบางๆ, เย็บเป็นลายตาราง)
    liner_shape:
      name: รูปทรงซับใน
      description: อธิบายรูปทรงโดยรวมของผ้าบุถุงนอน เพื่อให้ลูกค้าสามารถเลือกให้เข้ากับถุงนอนและความชอบด้านความสบายของตนเองได้
    liner_type:
      name: ประเภทไลเนอร์
      description: ระบุว่ากางเกงขาสั้นมีซับในหรือไม่ และถ้ามี เป็นแบบใด
    lining:
      name: ซับใน
      description: แสดงว่าชุดว่ายน้ำมีซับในหรือไม่และอย่างไร รวมถึงขอบเขตการปกปิดของซับในภายในตัวชุดด้วย
    lining_material:
      name: วัสดุซับใน
      description: ระบุวัสดุที่ใช้สำหรับบุภายในรองเท้า ซึ่งส่งผลต่อความสบาย การระบายอากาศ
        และความอบอุ่น
    lining_type:
      name: ประเภทซับใน
      description: ระบุว่าชุดว่ายน้ำมีซับในหรือไม่ และมีซับในมากน้อยเพียงใด
    link_connection_style:
      name: รูปแบบการเชื่อมต่อของข้อต่อ
      description: จำแนกวิธีการเชื่อมต่อข้อต่อเข้ากับโซ่ (เช่น ข้อต่อแบบเร็ว, หมุดเชื่อมต่อ)
        ช่วยให้ผู้ขับขี่สามารถเลือกวิธีการติดตั้งหรือชิ้นส่วนอะไหล่ที่ถูกต้องได้
    live_bait_form:
      name: รูปแบบเหยื่อสด
      description: ระบุรูปแบบทางกายภาพหรือสถานะการเก็บรักษาของเหยื่อ เช่น เหยื่อสด
        เหยื่อแช่แข็ง หรือเหยื่อแห้ง
    living_room_furniture_items_included:
      name: รายการเฟอร์นิเจอร์ห้องนั่งเล่นที่รวมมาในชุด
      description: ระบุบุคคลธรรมดาชิ้นเฟอร์นิเจอร์ที่เป็นส่วนหนึ่งของชุดห้องนั่งเล่น
        ช่วยให้นักช้อปเข้าใจได้อย่างรวดเร็วว่าส่วนประกอบใดบ้าง (เช่น โซฟา เบาะนั่ง
        โต๊ะกาแฟ) ที่รวมอยู่ด้วย
    load_mechanism:
      name: กลไกการรับน้ำหนัก
      description: ระบุวิธีการหลักที่ใช้ในการสร้างหรือเพิ่มแรงต้านให้กับเครื่อง (เช่น
        ชุดน้ำหนักแบบปรับได้, แผ่นน้ำหนัก, ยางยืด)
    lock_cylinder_type:
      name: ประเภทไส้กุญเจ
      description: ระบุประเภทของไส้กุญแจ/แกนกุญแจที่ใช้ (มีความสำคัญต่อความต้านทานการงัดแงะและกุญแจสำรอง)
    lock_security_level:
      name: ระดับความปลอดภัยของแม่กุญแจล็อค
      description: อธิบายคุณสมบัติการต้านทานการงัดแงะและการเจาะของตัวล็อค/กระบอกล็อค
    lock_system:
      name: ระบบล็อค
      description: ประเภทของระบบล็อกเพื่อความปลอดภัยที่ใช้ในการยึดลิฟต์ไว้ที่ความสูงระดับหนึ่ง
    locker_bench_configuration:
      name: การจัดวางม้านั่งล็อกเกอร์
      description: อธิบายลักษณะการวางแนวหรือโครงสร้างของม้านั่งล็อกเกอร์ (เช่น แบบด้านเดียว
        แบบสองด้าน แบบติดผนัง)
    locomotive_prototype_power_type:
      name: ต้นแบบหัวรถจักรประเภทพลังงาน
      description: ระบุประเภทระบบขับเคลื่อนหัวรถจักรในโลกแห่งความเป็นจริงที่แบบจำลองแสดงอยู่
    locomotive_wheel_arrangement_whyte_notation:
      name: การจัดเรียงล้อของหัวรถจักร (ตามแบบของไวท์)
      description: การจัดเรียงล้อของหัวรถจักรต้นแบบ (เช่น 4-6-2 แปซิฟิก)
    loft_bed_height_classification:
      name: การจำแนกความสูงของเตียง Loft
      description: ระบุความสูงโดยรวมของเตียง Loft (ต่ำ กลาง สูง สูงพิเศษ) ช่วยให้การเลือกซื้อเตียงลอฟท์เข้ากับความสูงของเพดานและพื้นที่ใต้เตียงได้อย่างลงตัว
    logo_application_method:
      name: วิธีการติดโลโก้
      description: อธิบายวิธีการติดตราสัญลักษณ์หรือโลโก้ของโรงเรียนลงบนเสื้อผ้า (เช่น
        การปักหรือการพิมพ์)
    logo_label_compatible_fabric_weight:
      name: น้ำหนักผ้าที่เหมาะสมสำหรับการติดป้ายโลโก้
      description: แนะนำให้เลือกผ้าที่มีความหนาเหมาะสมสำหรับการติด Label โดยไม่ทำให้ผ้าเสียทรงหรือดูหนาเกินไป
    logo_label_edge_finish:
      name: การตกแต่งของฉลากโลโก้
      description: ระบุโครงสร้าง/การตกแต่งขอบของ Label ซึ่ง Impact ความทนทานต่อการหลุดลุ่ยและความสบายเมื่อสัมผัสกับผิวหนัง
    logo_label_print_production_method:
      name: การพิมพ์ Label /วิธีการผลิต
      description: วิธีการใช้/ขึ้นรูปบนพื้น Label
    long_block_completeness:
      name: ความสมบูรณ์ของบล็อกยาว
      description: ระบุส่วนประกอบหลักที่รวมอยู่ในชุดประกอบเครื่องยนต์แบบยาว
    long_john_pieces_included:
      name: เสื้อผ้าที่มาพร้อมชุดลองจอห์น
      description: ระบุว่าสินค้าประกอบด้วยเฉพาะส่วนล่าง เฉพาะส่วนบน หรือทั้งสองส่วนของชุดกางเกงลองจอห์น
    longan_variety:
      name: พันธุ์ลำไย
      description: ระบุพันธุ์หรือพันธุ์ลำไยในเชิงพาณิชย์ (เช่น โกฮาล่า บิวกิว) ช่วยให้นักช้อประบุ
        Taste ขนาด และความหวานที่ต้องการได้
    loom_accessories_included:
      name: อุปกรณ์เสริมที่รวมมาในเครื่องทอผ้า
      description: อุปกรณ์สำคัญที่รวมอยู่ในกล่อง/บรรจุภัณฑ์พร้อมกับเครื่องทอผ้า
    loom_finish:
      name: การตกแต่งผิวเครื่องทอผ้า
      description: การตกแต่งพื้นผิวของเครื่องทอผ้า (ส่วนใหญ่ใช้กับเครื่องทอผ้าไม้)
    loom_folding_portability_design_type:
      name: ประเภทการออกแบบเครื่องทอผ้าแบบพับได้/พกพาได้
      description: วิธีการพับ/ยุบเก็บเครื่องทอผ้าเป็นอย่างไร เพื่อการขนส่งหรือการจัดเก็บแบบกะทัดรัด
    loom_frame_folding_design:
      name: Frame ทอผ้าแบบพับได้
      description: ระบุว่าโครงเครื่องทอผ้าแบบตั้งโต๊ะสามารถพับ ยุบ หรือถอดประกอบเพื่อการจัดเก็บหรือขนส่งได้หรือไม่
        และทำอย่างไร
    loom_tension_adjustment_method:
      name: วิธีการปรับความตึงของเครื่องทอผ้า
      description: วิธีการหลักที่ใช้ในการปรับความตึงของเส้นด้ายยืนบนเครื่องทอผ้า
    loom_tie_up_system:
      name: ระบบผูกมัดเครื่องทอผ้า
      description: ประเภทของระบบผูก/เชื่อมต่อที่ใช้ระหว่างแป้นเหยียบ/คันโยก/เพลา (เช่น
        Texsolv หรือโซ่โลหะ)
    loquat_variety:
      name: พันธุ์ลูกพลับ
      description: ระบุสายพันธุ์หรือพันธุ์ของลูกพลับ ซึ่งสะท้อนให้เห็นถึงความแตกต่างในขนาด
        รสชาติ ฤดูกาลสุก และลักษณะภายนอก
    lubricant_features:
      name: คุณสมบัติของสารหล่อลื่น
      description: เน้นคุณลักษณะพิเศษ สารเติมแต่ง หรือข้อดีของสารหล่อลื่น
    lubrication_requirement:
      name: ข้อกำหนดการหล่อลื่น
      description: ระบุว่าสายพานลู่วิ่งได้รับการเตรียมการไว้แล้ว/ไม่ต้องบำรุงรักษา
        หรือจำเป็นต้องมีการหล่อลื่นหรือเคลือบแว็กซ์อย่างต่อเนื่อง
    lubrication_type:
      name: ประเภทการหล่อลื่น
      description: ระบุคุณสมบัติการหล่อลื่น/การอัดจาระบีของบูช และระบุว่าได้รับการออกแบบมาให้ใช้จาระบีหรือไม่
        (เช่น ร่องหรือข้อต่อแบบ Zerk)
    lug_nut_seat_profile:
      name: รูปทรงของเบาะน็อตล้อ
      description: ระบุรูปทรงของเบ้าสำหรับน็อตล้อที่ต้องการ เพื่อให้มั่นใจได้ว่าน็อตล้อเข้ากันได้อย่างถูกต้องและติดตั้งได้อย่างปลอดภัย
    lumbar_support_type:
      name: ประเภทแผ่นซัพพอร์ตเอว
      description: อธิบายลักษณะของอุปกรณ์รองรับหลังที่มาพร้อมกับเก้าอี้ (เช่น หมอนถอดได้
        กลไกปรับระดับ หรือระบบนวด)
    lunge_trainer_style:
      name: สไตล์การฝึกแบบลันจ์
      description: อธิบายโครงสร้างการออกแบบของอุปกรณ์ฝึกท่าลันจ์ (Lunge Trainer)
    lure_buoyancy:
      name: แรงลอยตัวของเหยื่อ
      description: ระบุว่าเหยื่อมีพฤติกรรมอย่างไรในน้ำเมื่ออยู่ที่ REST หรือระหว่าง
        (เช่น ลอยอยู่บนผิวน้ำ ลอยน้ำ MID หรือการจม)
    luster:
      name: ความมันวาว
      description: อธิบายลักษณะการทำปฏิกิริยาของแสงกับพื้นผิวของชิ้นงานทดสอบ (เช่น
        วัสดุที่เป็นแก้ว โลหะ)
    lychee_cultivar:
      name: พันธุ์ลิ้นจี่
      description: ระบุพันธุ์หรือสายพันธุ์ของลิ้นจี่โดยเฉพาะ เช่น บรูว์สเตอร์ ฮัก
        อิป หรือมอริเชียส ซึ่งอาจแตกต่างกันในด้านรสชาติ ขนาดเมล็ด ฤดูกาลเก็บเกี่ยว
        และราคา
    lyre_flip_folder_mounting_location:
      name: ตำแหน่งการติดตั้งโฟลเดอร์ Lyre/flip
      description: ในกรณีที่พิณหรืออุปกรณ์พับพับได้นั้นมีไว้สำหรับติดตั้งบนเครื่องดนตรีหรืออุปกรณ์เสริม
        (เช่น ปากแตร ท่อลม ขาตั้ง)
    lyrics_display_type:
      name: ประเภทการแสดงเนื้อเพลง
      description: วิธีการแสดงเนื้อเพลง (หากรองรับ) ระหว่างการร้องคาราโอเกะ
    magazine_compatibility:
      name: ความเข้ากันได้ของนิตยสาร
      description: บ่งบอกขนาดกระสุนหลักหรือประเภทแม็กกาซีนหลักที่ซองใส่แม็กกาซีนในตัวของเสื้อกั๊กได้รับการออกแบบมาให้บรรจุได้
    magnet_requirement:
      name: ข้อกำหนดของแม่เหล็ก
      description: ระบุว่าเซ็นเซอร์ต้องการแม่เหล็กภายนอกในการทำงานหรือไม่
    magnet_toy_storage_included:
      name: กล่องเก็บของเล่นแม่เหล็กที่มาในชุด
      description: ประเภทของกล่องเก็บของ/เคสที่มาพร้อมกับของเล่นแม่เหล็ก สำหรับจัดระเบียบโต๊ะทำงานและพกพาเดินทาง
    malanga_variety:
      name: พันธุ์มะลังกา
      description: ระบุพันธุ์มะลังกา/เผือกที่จำหน่าย เพื่อช่วยให้ผู้ซื้อเลือกได้ตามรสชาติ
        สี หรือการนำไปใช้ในการประกอบอาหารที่ต้องการ
    malt_color_rating_system:
      name: ระบบการให้คะแนนสีของมอลต์
      description: ระบุว่าสีขยายสเกลใดที่สีที่ระบุอ้างถึง (Lovibond, SRM หรือ EBC)
    malt_crush:
      name: มอลต์ครัช
      description: ระบุว่ามอลต์พื้นฐานจำหน่ายในรูปแบบเมล็ดเต็ม/ไม่บด หรือบดแล้ว และหากบดแล้ว
        จะระบุวิธีการบดด้วย
    malt_form:
      name: รูปแบบมอลต์
      description: ระบุว่าผลิตภัณฑ์นั้นจำหน่ายเป็นเมล็ดพืชทั้งเมล็ดหรือแปรรูปเพื่อการบด
        (เช่น บดละเอียด)
    malt_intended_use:
      name: วัตถุประสงค์การใช้งานของมอลต์
      description: วัตถุประสงค์หลักในการใช้มอลต์ (เพื่อการผลิตเบียร์ การกลั่น หรือการใช้งานทั้งสองแบบ)
    malt_treatment:
      name: มอลต์ทรีตเมนต์
      description: อธิบายถึงวิธีการแปรรูปเมล็ดธัญพืช/มอลต์ นอกเหนือจากการอบแห้งแบบมาตรฐาน
        (กระบวนการพิเศษทั่วไป)
    malt_usage_purpose:
      name: วัตถุประสงค์การใช้งานของมอลต์
      description: อธิบายถึงหน้าที่หลักของมอลต์ชนิดพิเศษในสูตรการผลิตเบียร์
    man_overboard_system_type:
      name: ระบบคนตกน้ำ
      description: ระบุประเภทโซลูชันหลักสำหรับการช่วยเหลือผู้ตกน้ำ (MOB) ที่ผลิตภัณฑ์นั้นมีให้
    mandolin_back_sides_wood:
      name: ไม้ด้านหลังและด้านข้างของแมนโดลิน
      description: ระบุชนิดของไม้ที่ใช้สำหรับด้านหลังและด้านข้างของแมนโดลิน
    mandolin_body_top_wood:
      name: ไม้ด้านบนตัวแมนโดลิน
      description: ไม้/วัสดุหลักที่ใช้ทำแผ่นเสียง (ด้านบน) ของแมนโดลิน
    mandolin_bridge_type:
      name: ประเภทของสะพานแมนโดลิน
      description: ระบุรูปแบบของสะพานที่ใช้กับแมนโดลิน
    mandolin_pickup_configuration:
      name: รูปแบบระบบรับเสียงของแมนโดลิน
      description: ระบุว่าแมนโดลินนั้นมีอุปกรณ์อิเล็กทรอนิกส์หรือไม่ และติดตั้งระบบรับสัญญาณแบบใด
    mandolin_string_configuration:
      name: โครงสร้างรูปแบบสายของแมนโดลิน
      description: ระบุการกำหนดค่าแมนโดลินตามจำนวนคอร์สทั้งหมดและจำนวนคอร์ส (เช่น
        8 คอร์ส / 4 คอร์ส)
    mangosteen_variety:
      name: พันธุ์มังคุด
      description: ระบุชนิดหรือสายพันธุ์เฉพาะของมังคุดหรือผลไม้ในวงศ์ Garcinia ที่ใกล้เคียงกันที่กำลังจำหน่าย
    mannequin_style:
      name: สไตล์หุ่นจำลอง
      description: อธิบายถึงการออกแบบโครงสร้างหรือรูปแบบการก่อสร้างของหุ่นฝึกหัด
    manufacturing_process:
      name: กระบวนการผลิต
      description: วิธีการผลิตหลักของตัวรอกหรือแกนรอก (เช่น การขึ้นรูปด้วยเครื่อง
        CNC, การหล่อขึ้นรูป)
    map_coverage_sky_planet_body:
      name: ขอบเขตการครอบคลุมของแผนที่ (ท้องฟ้า/ดาวเคราะห์)
      description: 'ระบุว่าแผนที่นั้นแสดงถึงอะไร: ท้องฟ้ายามค่ำคืน (กลุ่มดาว) หรือดาวเคราะห์ดวงใดดวงหนึ่งโดยเฉพาะ'
    map_format:
      name: รูปแบบแผนที่
      description: กำหนดรูปแบบการนำเสนอแผนที่และคู่มือการล่าสัตว์ทั้งในรูปแบบกายภาพหรือดิจิทัล
    map_sensor_output_signal_type:
      name: ประเภทสัญญาณเอาต์พุตของเซ็นเซอร์ MAP
      description: ระบุประเภทของสัญญาณเอาต์พุตที่เซ็นเซอร์ MAP ส่งไปยังหน่วยควบคุมเครื่องยนต์
        (ECU)
    map_size_sheet:
      name: ขนาดแผนที่ (แผ่น)
      description: ระบุขนาดสำเร็จของแผนที่/โปสเตอร์/แผนที่ดาว เพื่อช่วยในการจัดแสดงและการใช้งานร่วมกับอุปกรณ์อื่น
        (ขนาดกรอบ, พื้นที่บนผนัง)
    marabou_feather_form:
      name: รูปแบบขนนกมาลาบู
      description: ลักษณะรูปทรงของผลิตภัณฑ์ขนนกมาลาบูที่วางจำหน่าย
    marabou_feather_treatment:
      name: การแปรรูปขนนกมาราบู
      description: วิธีการแปรรูปหรือตกแต่งขนนกมาราบูเพื่อใช้ในงานประดิษฐ์
    marble_track_set_feature_modules:
      name: โมดูลคุณลักษณะชุดติดตามลูกแก้ว
      description: เน้นส่วนประกอบฟังก์ชันพิเศษที่รวมอยู่ในชุด (เช่น ลิฟต์ ตัวปล่อย
        สวิตช์)
    marine_flare_certification_standard:
      name: การรับรอง/มาตรฐานพลุสัญญาณทางทะเล
      description: ระบุว่าพลุสัญญาณดังกล่าวได้รับการรับรองหรือผ่านมาตรฐานความปลอดภัยทางทะเลใดบ้าง
    marine_safety_standard_compliance:
      name: การปฏิบัติตามมาตรฐานความปลอดภัยทางทะเล
      description: แสดงว่ามาตรฐานความปลอดภัยทางน้ำอย่างเป็นทางการหรือการอนุมัติแบบใดที่อุปกรณ์เสริมตรงตามเกณฑ์
    marine_transmission_type:
      name: ประเภทระบบส่งกำลังสำหรับเรือ
      description: ระบุประเภทของระบบส่งกำลังทางทะเลที่ใช้คู่กับเครื่องยนต์ภายในเรือ
        (เช่น ระบบส่งกำลังแบบขับตรง หรือ ระบบส่งกำลังแบบวีไดรฟ์)
    marker_action_type:
      name: ประเภทการทำงานของปืนมาร์คเกอร์
      description: อธิบายกลไกการยิง/การทำงานพื้นฐานของปืนมาร์คเกอร์
    marker_caliber:
      name: ขนาดลำกล้องปืนเพนท์บอล
      description: ระบุขนาดเส้นผ่านศูนย์กลางของลูกเพนต์บอลที่มาร์กเกอร์ออกแบบมาให้ยิงได้
    marking_durability:
      name: ความทนทานของการทำเครื่องหมาย
      description: ระบุระยะเวลาที่คาดว่าเส้นสีจะยังคงมองเห็นได้ภายใต้สภาวะปกติ เช่น
        ชั่วคราว (ไม่เกิน 3 สัปดาห์), กึ่งถาวร (ไม่เกิน 6 เดือน) หรือถาวร (มากกว่า
        6 เดือน)
    marking_tip_type:
      name: ประเภทหัวทำเครื่องหมาย
      description: ประเภทของการทำเครื่องหมายที่เข็มทิศใช้ในการวาด (เช่น กลุ่มเป้าหมายเทียบกับหมึกและจุดเขียน)
    marshmallow_processing_method:
      name: วิธีการแปรรูปมาร์ชเมลโลว์
      description: อธิบายถึงกระบวนการแปรรูปพิเศษใดๆ ที่ใช้กับมาร์ชเมลโลว์ ซึ่งส่งผลต่อเนื้อสัมผัส
        อายุการเก็บรักษา หรือ Taste
    marshmallow_size:
      name: ขนาดมาร์ชเมลโลว์
      description: จำแนกขนาดสัมพัทธ์ของบุคคลธรรมดาชิ้นมาร์ชแมลโลว์
    martial_arts_belt_rank:
      name: ระดับสายคาดศิลปะการต่อสู้
      description: บ่งบอกถึงระดับทักษะ/ยศที่แสดงโดยสีของเข็มขัดหรือการผสมสีพิเศษ
    mask_bib_type:
      name: ผ้ากันเปื้อนแบบหน้ากาก
      description: ระบุประเภทของผ้าปิดหน้าอกบนหน้ากากฟันดาบ เช่น ผ้าธรรมดา ผ้าแบบนำไฟฟ้า
        ผ้าแบบถอดได้ หรือไม่มีผ้าปิดหน้าอก
    mask_cage_material:
      name: วัสดุโครงหน้ากาก
      description: วัสดุที่ใช้เฉพาะสำหรับโครงครอบใบหน้าหรือ Frame หน้ากาก
    mask_goggle_design:
      name: การออกแบบหน้ากาก/แว่นตา
      description: กำหนดโครงสร้างโดยรวมหรือรูปแบบการปกคลุมของอุปกรณ์ป้องกัน
    mask_skirt_material:
      name: วัสดุที่ใช้ทำขอบหน้ากาก
      description: ระบุวัสดุของกระโปรงผ้านุ่มที่ช่วยให้หน้ากากแนบสนิทกับใบหน้าและกันน้ำได้
    mask_strap_material:
      name: วัสดุสายรัดหน้ากาก
      description: ระบุวัสดุของสายรัดที่ใช้ยึดหน้ากากกับศีรษะ
    mass_air_flow_sensor_measurement_type:
      name: ประเภทการวัดของเซ็นเซอร์วัดปริมาณอากาศ
      description: ระบุเทคโนโลยีการตรวจจับ/รูปแบบเอาต์พุตที่ใช้โดยเซ็นเซอร์ MAF
    mass_air_flow_sensor_mounting_type:
      name: ประเภทการติดตั้งเซ็นเซอร์วัดปริมาณอากาศ
      description: วิธีการติดตั้งเซ็นเซอร์ MAF หรือชุดเซ็นเซอร์ในระบบไอดี
    massage_feature:
      name: คุณสมบัติการนวด
      description: ระบุว่าฐานปรับระดับได้นั้นมีฟังก์ชันนวดในตัวหรือไม่ และถ้ามี จะมีโซนการนวดกี่โซน
    mast_attachment_interface:
      name: อินเทอร์เฟซสำหรับยึดเสา
      description: ระบุมาตรฐานการเชื่อมต่อระหว่างลำตัวเครื่องบินและเสากระโดง ช่วยให้ผู้ซื้อสามารถตรวจสอบความพอดีของชิ้นส่วนได้
    mast_base_type:
      name: ประเภทฐานเสา
      description: ระบุส่วนเชื่อมต่อที่ใช้ยึดเสาเข้ากับบอร์ดหรืออะแดปเตอร์
    mast_bend_curve:
      name: เส้นโค้งมนของเสา
      description: รูปแบบการโค้งงอของเสากระโดงที่กำหนดความเข้ากันได้ของใบเรือและการขนย้าย
    mast_diameter_type:
      name: ประเภทเส้นผ่านศูนย์กลางเสา
      description: การจำแนกขนาดเส้นผ่านศูนย์กลางมาตรฐานของเสาวินด์เซิร์ฟ (เช่น RDM,
        SDM, MDM) ใช้สำหรับการตรวจสอบความเข้ากันได้
    mat_backing_type:
      name: ประเภทแผ่นรอง
      description: ระบุประเภทของวัสดุรองด้านล่างของพรมที่ช่วยให้พรมอยู่กับที่บนพื้นผิวต่างๆ
    mat_installation_method:
      name: วิธีการติดตั้งเสื่อ
      description: ระบุวิธีการติดตั้งหรือยึดเสื่อให้อยู่กับที่
    mat_style:
      name: สไตล์เสื่อ
      description: อธิบายรูปแบบโครงสร้างหรือรูปทรงของเสื่อ (เช่น เสื่อพับได้, เสื่อต่อกัน,
        แผ่นรองรับแรงกระแทก)
    maternity_panel_type:
      name: ประเภทแผงสำหรับคุณแม่
      description: ระบุรูปแบบของแผงผ้ายืดหรือขอบเอวที่ออกแบบมาเพื่อรองรับการเปลี่ยนแปลงของขนาดตัวระหว่างตั้งครรภ์
    maternity_waistband_style:
      name: สไตล์ขอบเอวสำหรับคุณแม่
      description: ระบุการออกแบบและตำแหน่งที่วางของขอบเอวหรือแผงหน้าท้องโดยเฉพาะสำหรับกางเกงคนท้อง
        โดยอธิบายว่าเสื้อผ้ามีส่วนช่วยในการเพิ่มจำนวนขึ้นได้อย่างไร
    mattress_top_type:
      name: ประเภทท็อปเปอร์ที่นอน
      description: ระบุรูปแบบของชั้นบนสุดหรือโครงสร้างพื้นผิวของที่นอน เช่น ที่นอนแบบมีหมอนรอง
        หรือที่นอนแบบเรียบสนิท
    maturation_vessel_material:
      name: วัสดุของภาชนะสำหรับบ่ม
      description: ระบุวัสดุหลักของภาชนะหรือถังที่ใช้สำหรับบ่มเหล้าโชจู
    maximum_quilt_size_supported:
      name: ขนาดผ้าห่มสูงสุดที่รองรับ
      description: ผ้านวม/โครงการสูงสุดขนาดที่ Frame สามารถรองรับได้ (โดยทั่วไปจะอธิบายด้วยขนาดเตียงหรือความกว้างสูงสุด)
    meal_course:
      name: หลักสูตรอาหาร
      description: ระบุโอกาสการรับประทานอาหารโดยทั่วไปสำหรับสินค้า
    meal_preparation_state:
      name: สถานะการเตรียมอาหาร
      description: ระบุว่าต้องเตรียมการมากน้อยเพียงใดก่อนบริโภค (เช่น พร้อมรับประทาน,
        มื้ออาหาร)
    meat_processing_state:
      name: สถานะการแปรรูปเนื้อสัตว์
      description: แสดงระดับการปรุงอาหารหรือการบ่มที่ใช้กับสินค้าประเภทเนื้อสัตว์ก่อนวางจำหน่าย
    meat_quality_grade:
      name: เกรดคุณภาพเนื้อสัตว์
      description: ระบุระดับคุณภาพหรือการจัดประเภทที่กำหนดให้กับเนื้อสัตว์โดยหน่วยงานจัดระดับคุณภาพที่เป็นที่ยอมรับ
        (เช่น USDA, MSA, Wagyu)
    meat_raising_claim:
      name: การอ้างสิทธิ์ในการเลี้ยงเนื้อสัตว์
      description: เน้นย้ำถึงข้อกล่าวอ้างทั่วไปเกี่ยวกับสวัสดิภาพสัตว์หรือวิธีการทำฟาร์มที่เกี่ยวข้องกับเนื้อสัตว์
        (เช่น เลี้ยงด้วยหญ้า ปล่อยเลี้ยงตามธรรมชาติ)
    mechanical_loom_assembly_status:
      name: สถานะการประกอบเครื่องทอผ้าเชิงกล
      description: วิธีการจัดส่งหรือส่งมอบเครื่องทอผ้าในแง่ของการประกอบที่จำเป็น
    mechanical_loom_weaving_type:
      name: ประเภทการทอผ้าด้วยเครื่องทอเชิงกล
      description: กลไก/ประเภทการทอผ้าหลักที่รองรับโดยเครื่องทอผ้า
    mechanical_puzzle_primary_mechanism:
      name: กลไกหลักของปริศนาเชิงกล
      description: ปฏิสัมพันธ์/กลไกหลักที่ใช้ในการแก้ปริศนาเชิงกล
    mechanical_puzzle_solution_format:
      name: รูปแบบการแก้ปริศนาเชิงกล
      description: รูปแบบที่ระบุคำแนะนำ/วิธีแก้ปัญหา (หากมี)
    medal_attachment_style:
      name: รูปแบบการติดเหรียญรางวัล
      description: ระบุวิธีการสวมใส่หรือจัดแสดงเหรียญรางวัล (เช่น ริบบิ้นคล้องคอ,
        เข็มกลัดติดหลัง)
    medal_award_level:
      name: ระดับการมอบเหรียญรางวัล
      description: ระบุระดับรางวัลที่แสดงโดยเหรียญรางวัล (เช่น อันดับ 1, ผู้เข้าร่วม)
    medal_finish:
      name: จบการแข่งขันด้วยเหรียญรางวัล
      description: ระบุลักษณะพื้นผิวของเหรียญ (ความเงา/พื้นผิวที่มองเห็นได้) โดยไม่ขึ้นอยู่กับวัสดุ
    medal_packaging:
      name: บรรจุภัณฑ์เหรียญรางวัล
      description: ระบุประเภทของบรรจุภัณฑ์ที่ใช้สำหรับมอบเหรียญรางวัล
    melodica_accessory_set_included:
      name: รวมชุดอุปกรณ์เสริมสำหรับเมโลดิกา
      description: อุปกรณ์เสริมทั่วไปใดบ้างที่มักรวมอยู่ในชุดเมโลดิกา
    melodica_air_chamber_material:
      name: วัสดุห้องอากาศของเมโลดิกา
      description: วัสดุที่ใช้ทำห้องอากาศ/ตัวเครื่องของเมโลดิกา (เช่น ABS, ไม้ ฯลฯ)
        คือสิ่งที่ผู้ขายใช้แยกแยะออกจากชิ้นส่วนอื่นๆ
    melodica_included_accessories:
      name: อุปกรณ์เสริมที่มาพร้อมกับเมโลดิกา
      description: อุปกรณ์เสริมที่มาพร้อมกับเมโลดิกาในกล่อง
    melodica_key_color_scheme:
      name: ชุดสีคีย์เมโลดิกา
      description: โทนสีของปุ่ม (ไม่ใช่ตัวคีย์บอร์ด) ส่งผลต่อความง่ายในการอ่าน (โดยเฉพาะสำหรับเด็ก/ผู้เริ่มต้น)
    melodica_mouthpiece_configuration:
      name: การกำหนดค่าปากเป่าเมโลดิกา
      description: ระบุว่ามีส่วนต่อประสานการเป่าลมแบบใดบ้างที่รวมอยู่/ใช้สำหรับการเล่นเมโลดิกา
    melodica_mouthpiece_type:
      name: ชนิดของปากเป่าเมโลดิกา
      description: อุปกรณ์เชื่อมต่อการเป่าลมที่มาพร้อมกับเมโลดิกา (ปากเป่าและ/หรือท่ออ่อน)
    melodica_reed_plate_material:
      name: วัสดุแผ่นลิ้นเมโลดิกา
      description: วัสดุที่ใช้ทำแผ่นลิ้น (ซึ่งแตกต่างจากวัสดุที่ใช้ทำตัวเครื่องโดยรวม)
        อาจส่งผลต่อความทนทานและคุณภาพเสียง
    melodica_size_class:
      name: คลาสขนาดเมโลดิกา
      description: โดยทั่วไปแล้ว การแบ่งประเภทขนาด/ความสะดวกในการพกพาของเมโลดิกา จะพิจารณาจากจำนวนคีย์และรูปทรง
        (เช่น รุ่น Shop Mini/สำหรับนักเรียน เทียบกับรุ่นมาตรฐาน เทียบกับรุ่นช่วงเสียงกว้าง)
    melon_variety:
      name: พันธุ์แตง
      description: ระบุชนิดของแตงในผลิตภัณฑ์อย่างเฉพาะเจาะจง เพื่อช่วยให้ผู้ซื้อสามารถระบุพันธุ์ที่ต้องการได้อย่างรวดเร็ว
    memory_foam_infusion_material:
      name: วัสดุผสมเมมโมรี่โฟม
      description: ระบุสารพิเศษที่ผสมลงในเมมโมรี่โฟมเพื่อวัตถุประสงค์ในการระบายความร้อน
        ควบคุมกลิ่น หรือต้านเชื้อแบคทีเรีย
    memory_wire_gauge:
      name: ขนาดลวดเมมโมรี่
      description: ระบุขนาดลวดเมมโมรี่ตามมาตรฐาน American Wire Gauge (AWG)
    memory_wire_project_size:
      name: ขนาดโครงการลวดหน่วยความจำ
      description: ระบุรูปแบบเครื่องประดับ/ขนาดขดลวดที่ต้องการขึ้นรูปด้วยลวดเมมโมรี่
        (เช่น กำไล สร้อยคอ แหวน)
    metal_purity:
      name: ความบริสุทธิ์ของโลหะ
      description: บ่งบอกถึงความละเอียดหรือความบริสุทธิ์ของโลหะที่ใช้ในการทำเครื่องประดับ
        โดยทั่วไปจะแสดงเป็นกะรัต (K) หรือส่วนต่อพัน
    metrics_counted:
      name: ตัวชี้วัดที่นับได้
      description: แสดงรายการสถิติหรือ Event ส่วนบุคคลที่ตัวนับได้รับการออกแบบให้ติดตาม
    metronome_display_style:
      name: รูปแบบการแสดงผลเมโทรโนม
      description: ระบุวิธีการแสดง/บ่งบอกจังหวะให้ผู้ใช้ทราบ (เข็ม/ลูกตุ้ม เทียบกับ
        ตัวเลข LED/LCD เทียบกับ ไฟกระพริบ)
    metronome_output_method:
      name: วิธีส่งออกเมโทรโนม
      description: ระบุวิธีการแสดง/บ่งบอกจังหวะให้ผู้ใช้ทราบ (เข็ม/ลูกตุ้ม เทียบกับ
        ตัวเลข LED/LCD เทียบกับ ไฟกระพริบ)
    microphone_toy_feature_set:
      name: ชุดของเล่นไมโครโฟน
      description: ไมโครโฟนที่เน้นการเล่นคีย์ความสามารถสำหรับไมโครโฟนของเล่น (เอฟเฟกต์เสียง
        การขยายเสียง การบันทึก ฯลฯ)
    midi_output_type:
      name: ประเภทเอาต์พุต MIDI
      description: ระบุประเภทของเอาต์พุต MIDI ที่โมดูลทริกเกอร์จัดให้
    military_branch:
      name: สาขาทหาร
      description: ระบุสังกัดหรือแรงบันดาลใจในการออกแบบเครื่องแบบนี้ในกองทัพ
    milk_base_type:
      name: นมชนิดพื้นฐาน
      description: ระบุชนิดของนมหรือนมทางเลือกหลักที่ใช้ในเครื่องดื่มนั้น ๆ (ถ้ามี)
    milk_feeding_method:
      name: วิธีการป้อนนม
      description: ระบุว่าสัตว์ที่เป็นแหล่งที่มาของวัตถุดิบนั้นได้รับอาหารอย่างไร
        (เช่น กินหญ้าหรือกินธัญพืช) ซึ่งอาจ Influence รสชาติและคุณค่าทางโภชนาการ
    milk_processing_method:
      name: วิธีการแปรรูปนม
      description: ระบุทรีตเมนต์หรือเทคนิคการประมวลผลของนมที่ได้เกิดขึ้น ซึ่งส่งผลต่อความปลอดภัย
        อายุการใช้งานของอาหาร และคุณสมบัติทางโภชนาการ
    milk_source_animal:
      name: แหล่งที่มาของนมจากสัตว์
      description: ระบุแหล่งที่มาของนม ช่วยให้ผู้บริโภคสามารถเลือกนมจากวัว แพะ ควาย
        หรือสัตว์ชนิดอื่นๆ ได้
    millet_processing_method:
      name: วิธีการแปรรูปข้าวฟ่าง
      description: ระบุวิธีการแปรรูปหลักหรือสถานะของเมล็ดข้าวฟ่าง (เช่น ไม่ขัดสี กะเทาะเปลือก
        งอก)
    millet_variety:
      name: พันธุ์ข้าวฟ่าง
      description: ระบุชนิดของเมล็ดข้าวฟ่างที่อยู่ในผลิตภัณฑ์ (เช่น ข้าวฟ่างไข่มุก
        ข้าวฟ่างหางสุนัข ข้าวฟ่างนิ้ว)
    milling_process:
      name: กระบวนการกัด
      description: ระบุวิธีการผลิตที่ใช้ในการบดเมล็ดธัญพืช ซึ่งอาจ Influence รสชาติ
        การสัมผัสความร้อน และคุณค่าทางโภชนาการ
    mint_mark:
      name: เครื่องหมายโรงกษาปณ์
      description: เครื่องหมายโรงกษาปณ์ตามที่ปรากฏบนเหรียญ (ถ้ามี)
    mirror_configuration:
      name: รูปแบบโครงสร้างของกระจก
      description: ระบุรูปแบบหรือโครงสร้างของกระจกที่มาพร้อมกับชุดโต๊ะเครื่องแป้ง
    mirror_coverage:
      name: การรายงานข่าวของมิเรอร์
      description: อธิบายขอบเขตของแผงกระจกบนประตูบานเลื่อน
    mirror_curvature_type:
      name: ประเภทความโค้งของกระจก
      description: ระบุว่าพื้นผิวกระจกเป็นแบบนูน แบน หรือเว้า รวม Impact ขอบเขตการมองเห็น
    mirror_mounting_location:
      name: การติดกระจกเงา
      description: ระบุตำแหน่งที่ต้องการติดตั้งกระจกมองหลังบนจักรยานหรือตัวผู้ขี่
    mirror_shape:
      name: รูปทรงกระจก
      description: ระบุ Shapes เรขาคณิตหรือรูปแบบของกระจกหลักที่มาพร้อมกับชุดโต๊ะเครื่องแป้ง
    mix_ratio:
      name: อัตราส่วนการผสม
      description: ระบุอัตราส่วนการเจือจางสารหล่อเย็นต่อน้ำที่แนะนำ (สำหรับสารเข้มข้น)
        หรือยืนยันอัตราส่วนการผสมล่วงหน้าที่กำหนดไว้สำหรับผลิตภัณฑ์ที่เจือจางแล้ว
    mma_glove_type:
      name: ประเภทถุงมือ MMA
      description: ระบุวัตถุประสงค์หลักในการใช้งานหรือรูปแบบของถุงมือในการฝึกซ้อมหรือการแข่งขัน
        MMA
    mobility_features:
      name: คุณสมบัติการเคลื่อนที่
      description: บ่งบอกถึงองค์ประกอบที่ช่วยให้เคลื่อนย้ายหรือพกพาได้สะดวก เช่น ล้อเลื่อน
        หรือขาพับได้
    model_aircraft_assembly_level:
      name: ระดับการประกอบโมเดลเครื่องบิน
      description: ระบุว่าต้องมีการก่อสร้างมากแค่ไหนก่อนที่เครื่องบินจะสามารถใช้งานได้
    model_making_kit_items_included:
      name: อุปกรณ์ประกอบโมเดลประกอบด้วย
      description: ระบุสิ่งของที่รวมอยู่ในชุดอุปกรณ์หรือแพ็คเกจสำหรับทำโมเดล (เช่น
        สี กาว แปรง)
    model_making_product_type:
      name: การทำโมเดล ประเภทสินค้า
      description: ระบุว่าสินค้าชิ้นนั้นคืออะไรในหมวดหมู่การทำโมเดล (ชุดอุปกรณ์ อุปกรณ์เสริม
        เครื่องมือ หรือวัสดุสิ้นเปลือง) เพื่อปรับปรุงการค้นหาและการกรองสินค้าในหมวดหมู่สินค้าที่หลากหลายภายในหมวดการทำโมเดล
    model_rocket_kit_contents:
      name: สิ่งของในชุดจรวดจำลอง
      description: ระบุว่าสินค้าเป็นจรวดแบบจำลองหลายขั้นตอนที่สมบูรณ์หรือตัวควบคุม/Modules/ชิ้นส่วนการถ่ายภาพ
        (เช่น ส่วนประกอบบูสเตอร์หรือค้ำจุน)
    model_rocket_kit_format:
      name: รูปแบบชุดประกอบจรวดจำลอง
      description: ระบุว่าจรวดจำหน่ายเป็นชุดหรือไม่ และระดับความพร้อมในการประกอบ
    model_rocket_motor_impulse_class:
      name: ระดับแรงขับเคลื่อนมอเตอร์จรวดจำลอง
      description: แสดงระดับแรงขับเคลื่อนรวมของมอเตอร์จรวดจำลองมาตรฐาน (เช่น A, B,
        C ...)
    model_rocket_motor_mount_size:
      name: ขนาดฐานยึดมอเตอร์จรวดจำลอง
      description: ระบุขนาดเส้นผ่านศูนย์กลางของตัวเรือนมอเตอร์ที่ฐานยึดมอเตอร์ของจรวดได้รับการออกแบบมาให้รองรับ
    model_rocket_power_source_required:
      name: ต้องใช้แหล่งพลังงานสำหรับจรวดจำลอง
      description: ระบุว่าผลิตภัณฑ์นี้ต้องใช้แบตเตอรี่/แหล่งจ่ายไฟภายนอกหรือไม่ และเป็นแบตเตอรี่ชนิดใด
    model_rocket_propellant_type:
      name: ประเภทเชื้อเพลิงสำหรับจรวดจำลอง
      description: บ่งบอกระบบเชื้อเพลิง/เครื่องยนต์ที่ใช้ในการขับเคลื่อนในผลิตภัณฑ์จรวดจำลอง
    model_rocket_recommended_launch_rod_or_rail_size:
      name: ขนาดของก้านส่งหรือรางปล่อยจรวดที่แนะนำสำหรับจรวดจำลอง
      description: ระบุขนาดเส้นผ่านศูนย์กลางของแท่งปล่อยหรือรางที่ใช้สำหรับจรวด (เช่น
        แท่งขนาด 1/8 นิ้ว รางปล่อย 1010)
    model_rocket_recovery_method:
      name: วิธีการกู้คืนจรวดจำลอง
      description: ระบบกู้คืนหลักที่ใช้ในการนำจรวดกลับสู่ฐานอย่างปลอดภัยหลังจากการบิน
    model_rocket_recovery_system_type:
      name: ประเภทระบบกู้คืนจรวดจำลอง
      description: ระบุวิธีการกู้คืนหลักที่ใช้ในการนำจรวดกลับสู่ฐานอย่างปลอดภัยหลังจากบิน
    model_rocket_staging:
      name: การจัดเตรียมจรวดจำลอง
      description: แสดงจำนวนขั้นขับเคลื่อนที่จรวดจำลองได้รับการออกแบบมาให้บินได้
    model_train_accessory_electrical_connection_type:
      name: ประเภทการเชื่อมต่อไฟฟ้าสำหรับอุปกรณ์เสริมรถไฟจำลอง
      description: ระบุตัวเชื่อมต่อหรือรูปแบบเครื่องอ่านที่ใช้เชื่อมต่ออุปกรณ์เสริมรถไฟจำลองแบบขับเคลื่อนเข้ากับไลเอาต์
        (ถ้ามี)
    model_train_coupler_type:
      name: ประเภทข้อต่อรถไฟจำลอง
      description: ระบุมาตรฐานขอพ่วงขบวนที่ติดตั้งอยู่บนตู้รถไฟจำลองหรือหัวรถจักร
    model_train_gauge:
      name: ขนาดรางรถไฟจำลอง
      description: ระบุระบบมาตรวัดรางรถไฟจำลองที่อุปกรณ์เสริมนั้นออกแบบมาให้ใช้ (หากมี)
        เพื่อช่วยให้มั่นใจได้ถึงความเข้ากันได้ทางกายภาพกับรางและแบบจำลองของผู้ใช้
    model_train_lighting_features:
      name: คุณสมบัติไฟส่องสว่างของรถไฟจำลอง
      description: ระบุฟังก์ชันการให้แสงสว่างที่มีอยู่ในรถไฟจำลอง/หัวรถจักร
    model_train_power_pickup_method:
      name: วิธีการรับพลังงานสำหรับรถไฟจำลอง
      description: ระบุวิธีที่รถไฟจำลองได้รับพลังงานเพื่อการใช้งาน (พลังงานติดตาม
        แบตเตอรี่ ฯลฯ)
    model_train_scale:
      name: มาตราส่วนรถไฟจำลอง
      description: ระบุมาตราส่วน/ขนาดมาตรฐานของรถไฟจำลอง (ความสัมพันธ์ระหว่างรถไฟจำลองกับรถไฟจริง)
    model_train_sound_features:
      name: คุณสมบัติเสียงของรถไฟจำลอง
      description: ระบุว่ารุ่นนั้นมีเอฟเฟ็กต์เสียงในตัวหรือไม่ และมีเอฟเฟ็กต์เสียงประเภทใด
    model_train_track_gauge:
      name: โมเดลรถไฟติดตามเกจ
      description: ระบุมาตรฐานเกจติดตาม/ระบบติดตามที่รถไฟจำลองได้รับการออกแบบมาให้ทำงาน
        (เช่น เกจมาตรฐาน ตัวเลือกเกจแบบแคบ หรือเกจตามแบรนด์/เกจเฉพาะระบบ หากมี)
    modeling_dough_base_material:
      name: วัสดุพื้นฐานสำหรับปั้นดินน้ำมัน
      description: ส่วนประกอบหลักของแป้งปั้น (เช่น แป้งสาลี/แป้งสาลี เทียบกับ แป้งโพลีเมอร์)
    modeling_dough_features:
      name: คุณสมบัติของดินปั้น
      description: คุณลักษณะการใช้งานหลักของดินปั้นที่ผู้ซื้อส่วนใหญ่มักใช้เป็นเกณฑ์ในการเลือกซื้อสินค้า
    modification_level:
      name: ระดับการปรับเปลี่ยน
      description: บ่งบอกถึงระดับการดัดแปลงมอลต์ (ความละเอียดในการย่อยสลายเอนโดสเปิร์ม/โปรตีนของข้าวบาร์เลย์)
        ซึ่งมักสรุปได้เป็น ดัดแปลงน้อย/ดัดแปลงมาก/ดัดแปลงมากเกินไป
    molasses_base_ingredient:
      name: ส่วนผสมหลักกากน้ำตาล
      description: ระบุแหล่งที่มาหลักของพืชหรือผลไม้ที่ใช้ในการผลิตกากน้ำตาล
    molasses_grade:
      name: เกรดของกากน้ำตาล
      description: จำแนกประเภทกากน้ำตาลตามขั้นตอนการสกัด/การกลั่น ซึ่งส่งผลโดยตรงต่อความเข้มข้นของรสชาติ
        สี และคุณค่าทางโภชนาการ
    mold_material:
      name: วัสดุที่ใช้ทำแม่พิมพ์
      description: องค์ประกอบวัสดุหลักของแม่พิมพ์ (เช่น ซิลิโคน พลาสติก โลหะ)
    molle_compatibility:
      name: ความเข้ากันได้กับระบบ MOLLE
      description: ระบุว่าเสื้อกั๊กมีระบบ MOLLE/PALS สำหรับติดกระเป๋าและอุปกรณ์เสริมแบบโมดูลาร์หรือไม่
    motor_belt_type:
      name: ประเภทสายพานมอเตอร์
      description: กำหนดรูปแบบ/ลักษณะของสายพานที่ใช้ในระบบขับเคลื่อนของลู่วิ่งไฟฟ้า
    motor_configuration:
      name: การกำหนดรูปแบบมอเตอร์
      description: ระบุจำนวนมอเตอร์ขับเคลื่อนอิสระที่สกูตเตอร์ใช้
    motor_mounting_configuration:
      name: การกำหนดค่าการติดตั้งมอเตอร์
      description: อธิบายวิธีการติดตั้ง/ใช้งานมอเตอร์ในชุดแปลงสำหรับสกู๊ตเตอร์
    motor_mounting_position:
      name: ตำแหน่งการติดตั้งมอเตอร์
      description: ระบุตำแหน่งที่ติดตั้งมอเตอร์บนสกูตเตอร์ไฟฟ้า เช่น ดุมล้อหน้า ดุมล้อหลัง
        ดุมล้อคู่ หรือแบบติดตั้งตรงกลาง
    motor_position:
      name: ตำแหน่งมอเตอร์
      description: ระบุตำแหน่งของมอเตอร์บนจักรยานไฟฟ้า ที่จะส่งผลต่อการจัดการและการบำรุงรักษา
    motor_vehicle_a_v_integration_features:
      name: คุณสมบัติการบูรณาการระบบเสียงและวิดีโอในรถยนต์
      description: คุณสมบัติการผสานการทำงานระหว่างสมาร์ทโฟนและระบบภายในรถยนต์ที่รองรับโดยชุดควบคุมหลัก
        (เช่น Apple CarPlay, Android Auto, MirrorLink)
    motor_vehicle_bulb_application_position:
      name: การติดตั้ง/ตำแหน่งหลอดไฟรถยนต์
      description: ระบุตำแหน่งหรือฟังก์ชันการให้แสงสว่างของรถยนต์ที่หลอดไฟนั้นได้รับการออกแบบมา
        (เช่น ไฟต่ำ ไฟเบรก)
    motor_vehicle_bulb_approval_standard:
      name: มาตรฐานการอนุมัติหลอดไฟรถยนต์
      description: ระบุการปฏิบัติตามกฎระเบียบ/เครื่องหมายการอนุมัติสำหรับการใช้งานบนท้องถนนในตลาดเป้าหมาย
    motor_vehicle_oxygen_sensor_bank:
      name: ตำแหน่งเซ็นเซอร์วัดออกซิเจนสำหรับรถยนต์
      description: ระบุว่าเซ็นเซอร์ออกซิเจนติดตั้งอยู่ที่ฝั่งกระบอกสูบใดของเครื่องยนต์
        (เช่น ฝั่ง 1 หรือ ฝั่ง 2) สำหรับเครื่องยนต์แบบ V-type/boxer; ไม่สามารถใช้ได้กับเครื่องยนต์แบบแถวเรียง
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: เซ็นเซอร์ออกซิเจนในรถยนต์ จำนวนสายไฟ
      description: จำนวนสายไฟในชุดสายไฟของเซ็นเซอร์ออกซิเจน
    motor_vehicle_oxygen_sensor_position:
      name: ตำแหน่งเซ็นเซอร์ออกซิเจนในรถยนต์
      description: ระบุตำแหน่งการติดตั้งเซ็นเซอร์ออกซิเจน (O2) ในระบบไอเสียเมื่อเทียบกับตัวแปลงไอเสียแบบเร่งปฏิกิริยา
    motor_vehicle_oxygen_sensor_sensor_number:
      name: หมายเลขเซ็นเซอร์ออกซิเจนในรถยนต์
      description: ระบุหมายเลขเซ็นเซอร์ (เช่น เซ็นเซอร์ 1 หรือ เซ็นเซอร์ 2) ภายในกลุ่ม/ตำแหน่งที่กำหนด
    motor_vehicle_oxygen_sensor_type:
      name: ประเภทเซ็นเซอร์วัดออกซิเจนสำหรับรถยนต์
      description: ระบุการออกแบบ/เทคโนโลยีของเซ็นเซอร์ออกซิเจน
    motor_vehicle_paint_application_method:
      name: วิธีการพ่นสีรถยนต์
      description: วิธีการทาสีที่ถูกต้องควรทาลงบนพื้นผิวรถยนต์
    motor_vehicle_paint_system_step:
      name: ขั้นตอนระบบสีรถยนต์
      description: ระบุว่าผลิตภัณฑ์นั้นเหมาะสำหรับขั้นตอนหรือส่วนประกอบใดของระบบสีพ่นรถยนต์
        (เช่น สีรองพื้น สีชั้นกลาง สีเคลือบใส)
    motor_vehicle_speaker_mounting_type:
      name: ประเภทการติดตั้งลำโพงในรถยนต์
      description: วิธีการติดตั้งลำโพงในรถยนต์ตามที่ออกแบบไว้ (การกำหนดรูปแบบการติดตั้ง)
    motor_vehicle_subwoofer_size:
      name: ขนาดดอกลำโพงซับวูฟเฟอร์สำหรับรถยนต์
      description: ขนาดเส้นผ่านศูนย์กลางปกติของไดร์เวอร์ซับวูฟเฟอร์ (เช่น 8 นิ้ว,
        10 นิ้ว, 12 นิ้ว) ที่ถูกใช้เพื่อกำหนดขนาดให้เหมาะสมกับพื้นที่ในรถยนต์และตู้ลำโพง
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: การกำหนดค่าคอยล์เสียงของซับวูฟเฟอร์ในรถยนต์
      description: จำนวน/การจัดเรียงคอยล์เสียงใช้เพื่อจับคู่กับตัวเลือกการเดินสายแอมพลิฟายเออร์
        (เช่น SVC เทียบกับ DVC)
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: ค่าความต้านทานของขดลวดเสียงซับวูฟเฟอร์ในรถยนต์ (ต่อขดลวด)
      description: ค่าความต้านทานของขดลวดเสียงแต่ละขด (ไม่ใช่ค่าโหลดที่ต่อสายเสร็จแล้ว)
        ใช้สำหรับการคำนวณการเดินสาย
    motor_vehicle_voltage_regulator_type:
      name: ประเภทตัวควบคุมแรงดันไฟฟ้าสำหรับรถยนต์
      description: ระบุเทคโนโลยี/รูปแบบของตัวควบคุมที่ใช้ในยานยนต์
    motorcycle_armor_certification_standard:
      name: มาตรฐานการรับรองชุดเกราะมอเตอร์ไซค์
      description: ระบุมาตรฐานความปลอดภัยอย่างเป็นทางการที่อุปกรณ์ป้องกันได้รับการรับรองว่าตรงตามข้อกำหนด
        (เช่น EN 1621-2 สำหรับอุปกรณ์ป้องกันหลัง, EN 1621-3 สำหรับอุปกรณ์ป้องกันหน้าอก)
    motorcycle_cover_size_class:
      name: ขนาดของผ้าคลุมรถจักรยานยนต์
      description: ถังขนาดมาตรฐานสำหรับเก็บผ้าคลุมรถจักรยานยนต์ โดยกำหนดขนาดตามประเภท/ช่วงความยาวของรถจักรยานยนต์ทั่วไปที่เหมาะสม
    motorcycle_glove_certification_standard:
      name: มาตรฐานการรับรองถุงมือมอเตอร์ไซค์
      description: ระบุมาตรฐาน/การรับรองด้านการป้องกันที่ถุงมือเป็นไปตามข้อกำหนด (เช่น
        ระดับ EN 13594)
    motorcycle_glove_waterproof_construction:
      name: ถุงมือมอเตอร์ไซค์กันน้ำ
      description: ระบุประเภทของวิธีการกันน้ำที่ใช้ในถุงมือ (ถ้ามี)
    motorcycle_guard_coverage_area:
      name: พื้นที่ครอบคลุมของชุดการ์ดป้องกันรถจักรยานยนต์
      description: พื้นที่ความคุ้มครองหลักตามสินค้า (ข้อศอก ข้อมือ ปลายแขน คอมโบ)
    motorcycle_kidney_belt_construction_type:
      name: โครงสร้างแบบเข็มขัดพยุงไตสำหรับรถจักรยานยนต์
      description: รูปแบบการผลิตของเข็มขัดพยุงไตส่งผลต่อความแข็งแรง การระบายอากาศ
        และการป้องกัน
    motorcycle_kidney_belt_purpose:
      name: เข็มขัดพยุงหลังสำหรับมอเตอร์ไซค์ วัตถุประสงค์ของการใช้งาน
      description: ระบุรูปแบบการขับขี่หลักหรือสถานการณ์ที่เข็มขัดพยุงหลังสำหรับรถจักรยานยนต์ได้รับการออกแบบมาเพื่อรองรับ
    motorcycle_luggage_capacity_class:
      name: ระดับความจุสัมภาระของรถจักรยานยนต์
      description: ระบุปริมาตรความจุของกระเป๋าเดินทางสำหรับรถจักรยานยนต์ โดยแสดงเป็นช่วงปริมาตร
        (ลิตร)
    motorcycle_luggage_mounting_system:
      name: ระบบติดตั้งสัมภาระสำหรับรถจักรยานยนต์
      description: ระบบยึด/ติดตั้งที่ใช้ยึดกระเป๋า/กระเป๋าข้างเข้ากับรถจักรยานยนต์
        (เช่น สายรัดแบบคล้อง, ตัวล็อคแบบปลดเร็วที่ติดตั้งบนแฮนด์)
    motorcycle_luggage_side:
      name: กระเป๋าเดินทางข้างรถจักรยานยนต์
      description: สำหรับกล่องสัมภาระ/กระเป๋าข้าง ให้ระบุว่าสิ่งของที่ใช้อยู่ด้านซ้าย
        ด้านขวา หรือทั้งสองข้าง/ชุด
    motorcycle_protective_gear_size_system:
      name: ระบบขนาดอุปกรณ์ป้องกันสำหรับรถจักรยานยนต์
      description: ระบุระบบการกำหนดขนาดที่ใช้กับผลิตภัณฑ์ (เช่น การกำหนดขนาดด้วยตัวอักษร
        ตัวเลข หรือขนาดเดียว)
    motorcycle_rack_carrier_style:
      name: สไตล์แร็คที่เก็บของรถมอเตอร์ไซค์
      description: อธิบายรูปแบบการใช้งานของอุปกรณ์ขนส่งสำหรับรถจักรยานยนต์หรือสกูตเตอร์
        (แบบพื้นราบ เทียบกับแบบราง เทียบกับแบบมีระบบยกช่วย เป็นต้น)
    motorcycle_riding_discipline:
      name: วินัยการขับขี่รถจักรยานยนต์
      description: ระบุประเภทการขับขี่/การใช้งานหลักที่อุปกรณ์พยุงคอได้รับการออกแบบมาเพื่อรองรับ
    motorcycle_tire_speed_rating:
      name: อัตราความเร็วของยางรถจักรยานยนต์
      description: บ่งบอกความเร็วสูงสุดที่ยางสามารถรับได้ โดยใช้รหัสตัวอักษรมาตรฐาน
        (เช่น H, V, W)
    motorsport_window_net_certification:
      name: การรับรองตาข่ายหน้าต่างสำหรับมอเตอร์สปอร์ต
      description: ใบรับรองความปลอดภัยในการแข่งขันหรือการรับรองมาตรฐานที่เครือข่ายกำหนด
        (เช่น SFI หรือ FIA) รวมถึงหมายเลขข้อกำหนดหากมี
    mound_usage_type:
      name: ประเภทการใช้งานเนินดิน
      description: ระบุสภาพแวดล้อมการใช้งานที่เหมาะสมของเนินขว้าง เช่น การฝึกซ้อม
        การแข่งขัน บูลเพน หรืออเนกประสงค์
    mount_attachment_method:
      name: วิธีการติดตั้ง
      description: ระบุวิธีการยึดอุปกรณ์เข้ากับพื้นผิว/โครงสร้างของตัวรถ
    mountainboard_truck_type:
      name: ทรัคบอร์ดแบบ Mountainboard
      description: จำแนกประเภทของทรัคที่มาพร้อมกับบอร์ด ซึ่งส่งผลต่อการตอบสนองในการเลี้ยวและความทนทาน
    mounting_attachment_method:
      name: วิธีการติดตั้ง/ยึด
      description: วิธีการออกแบบที่ยึด/ถุงสำหรับติดกับถัง ขาตั้ง เข็มขัด หรือพื้นผิวอื่นๆ
    mounting_attachment_type:
      name: ประเภทการติดตั้ง/การยึดติด
      description: วิธีการเชื่อมต่อหรือต่ออุปกรณ์ปรับอัตราส่วนเข้ากับเครื่องปั่นด้าย
    mounting_hardware_included_for_installation:
      name: ฮาร์ดแวร์สำหรับติดตั้ง (สำหรับการติดตั้ง) ที่รวมมาในชุด
      description: ระบุว่าต้องใช้ฮาร์ดแวร์สำหรับติดตั้งในการติดตั้งเบาะหลัง (เช่น
        ฉากยึด สลักเกลียว ราง) รวมอยู่กับสินค้าหรือไม่
    mounting_location:
      name: ตำแหน่งการติดตั้ง
      description: ระบุตำแหน่งที่ต้องการวางในบริเวณบนอุปกรณ์หรือตัวถังสำหรับไฟ/ตัวสะท้อนแสง
        (เช่น ตะเกียบหน้า หมวกกันน็อค ซี่ล้อ)
    mounting_method:
      name: วิธีการติดตั้ง
      description: วิธีการติดตั้งหรือยึดที่ยึดไม้แปรง (เช่น แบบหนีบ, แบบรัด, แบบติดกาว)
    mounting_position:
      name: ตำแหน่งการติดตั้ง
      description: ระบุตำแหน่งที่ต้องการติดตั้งคันเบรกมือในห้องโดยสารของรถยนต์
    mounting_rail_type:
      name: ประเภทรางยึด
      description: ระบุมาตรฐานรางหรืออินเทอร์เฟซที่อุปกรณ์เสริมจะติดตั้ง เช่น Picatinny
        หรือ M-LOK
    mounting_receiver_size:
      name: ขนาดตัวรับการติดตั้ง
      description: ขนาดของขอเกี่ยวรับน้ำหนักที่จำเป็นสำหรับแร็คบรรทุกสัมภาระแบบติดตั้งกับขอเกี่ยว
    mounting_storage_type:
      name: ประเภทการติดตั้ง/จัดเก็บ
      description: วิธีการติดตั้งหรือจัดเก็บอุปกรณ์บนเรือ/บุคคลตามที่ตั้งใจไว้
    mouth_grip_type:
      name: ประเภทการพันปาก
      description: อธิบายลักษณะของที่จับหรือที่ครอบปากบนนกหวีด เพื่อความสบายและสุขอนามัย
    mouthguard_mold_type:
      name: แม่พิมพ์เมาท์การ์ด
      description: อธิบายวิธีการติดตั้งอุปกรณ์ป้องกันฟันให้พอดีกับฟันของนักกีฬา (เช่น
        แบบต้มแล้วกัดให้เข้ารูป, แบบสั่งทำเฉพาะบุคคลตามรูปทรงฟัน)
    mouthpiece_facing_length:
      name: ความยาวด้านหน้าของปากเป่า
      description: ระบุประเภทความยาวส่วนโค้ง (lay) ของปากเป่า (ไม่ใช่ความยาวโดยรวมของปากเป่า)
        ซึ่งส่งผลต่อการตอบสนอง ความต้านทาน และความเข้ากันได้กับลิ้นเป่า
    mouthpiece_material:
      name: วัสดุปากเป่า
      description: ระบุวัสดุของส่วนปาก/ปลายที่สัมผัสกับปากของอุปกรณ์เป่าลม (เช่น ที่เป่าลมสำหรับงานปาร์ตี้)
        ซึ่งอาจแตกต่างจากวัสดุของตัวเครื่องหลักได้
    mouthpiece_shank_receiver_size:
      name: ขนาดก้าน/ตัวรับของปากเป่า
      description: ระบุมาตรฐานตัวรับ/ก้านปากเป่าที่เข้ากันได้กับฟลูเกลฮอร์น
    mouthpiece_shank_size:
      name: ขนาดก้านของปากเป่า
      description: ระบุมาตรฐานการประกอบส่วนปากเป่า/ตัวรับ เพื่อให้มั่นใจได้ว่าสามารถใช้งานร่วมกับเครื่องดนตรีทองเหลืองที่ต้องการได้
    mouthpiece_shank_type:
      name: ประเภทก้านของปากเป่า
      description: ระบุมาตรฐานของตัวรับ/ก้านปากเป่าเพื่อความเข้ากันได้ (ในกรณีที่เกี่ยวข้อง)
    mouthpiece_style:
      name: สไตล์ของส่วนปากบังเหียน
      description: จำแนกการออกแบบ/รูปทรงของส่วนปากของบังเหียน ซึ่งมีผลต่อจุดกด ความรุนแรง
        และความชอบของม้า
    mouthpiece_type:
      name: ประเภทของปากเป่า
      description: ชนิดของปากเป่าที่ปลายด้านที่ใช้เป่า (แบบติดตั้งในตัว แบบถอดได้
        หรือแบบติดตั้งเพิ่มเติม)
    movement_mechanism:
      name: กลไกการเคลื่อนไหว
      description: กำหนดลักษณะการเคลื่อนที่ของม้านั่งขณะใช้งาน (แกว่งไปมา เลื่อนไปมา
        โยกไปมา ฯลฯ)
    muffin_size:
      name: ขนาดมัฟฟิน
      description: จำแนกขนาดของผลิตภัณฑ์มัฟฟิน (เช่น มินิ มาตรฐาน จัมโบ้)
    mushroom_variety:
      name: พันธุ์เห็ด
      description: ระบุชนิดหรือสายพันธุ์ของเห็ดหรือทรัฟเฟิลที่อยู่ในผลิตภัณฑ์ (เช่น
        เห็ดชิตาเกะ เห็ดนางฟ้า เห็ดทรัฟเฟิลดำ)
    music_stand_desk_tilt_adjustment:
      name: ขาตั้งโน้ตเพลงปรับระดับเอียงได้
      description: ระบุว่าสามารถปรับมุมของโต๊ะได้หรือไม่ และปรับอย่างไร
    music_stand_intended_use:
      name: ขาตั้งโน้ตเพลงมีวัตถุประสงค์เพื่อการใช้งานอย่างไร
      description: แสดงการติดตั้งหลัก/กรณีการใช้งานที่ตั้งใจไว้สำหรับขาตั้ง
    musical_block_pitch_type:
      name: ประเภทระดับเสียงของบล็อกดนตรี
      description: อธิบายว่าบล็อกดนตรีนั้นให้เสียงที่มีระดับเสียงแน่นอน (ปรับเสียงแล้ว)
        หรือเสียงที่มีระดับเสียงไม่แน่นอน
    musical_box_mechanism_type:
      name: ประเภทกลไกกล่องดนตรี
      description: กลไกการสร้าง/เล่นเสียงของกล่องดนตรี (เช่น กลไกไขลานเทียบกับการเล่นด้วยระบบอิเล็กทรอนิกส์)
    musical_keyboard_case_fit_type:
      name: เคสคีย์บอร์ดดนตรีแบบพอดีตัว
      description: อธิบายวิธีการกำหนดขนาดของเคสให้เหมาะสมกับเครื่องดนตรี (เช่น ขนาดมาตรฐานทั่วไป
        หรือ ขนาดที่ออกแบบมาเฉพาะรุ่น)
    musical_ratchet_sound_character:
      name: ลักษณะเสียงแรตเช็ตแบบดนตรี
      description: คำอธิบายทั่วไปเกี่ยวกับลักษณะเสียง/ความดังของกลไกเฟือง
    musical_scraper_groove_surface_material:
      name: วัสดุพื้นผิวร่องขูดดนตรี
      description: ระบุวัสดุของพื้นผิวขูดที่เป็นร่อง/สัน (อาจแตกต่างจากวัสดุของตัวเครื่อง)
    musical_scraper_type:
      name: ประเภทเครื่องดนตรีประเภทขูด
      description: ระบุรูปแบบ/ดีไซน์ของเครื่องดนตรีประเภทขูด (เช่น กุยโร กับ เรโค-เรโค)
        ซึ่งส่งผลต่อเสียงและเทคนิคการเล่น
    mute_attachment_method:
      name: วิธีการติดตั้งตัวลดเสียงฉาบ
      description: ระบุวิธีการติดหรือยึดอุปกรณ์ลดเสียงฉาบไว้กับฉาบ (เช่น เจล, ไฟฟ้าสถิต,
        แม่เหล็ก, คลิป)
    mute_attenuation_level:
      name: ระดับการลดทอนเสียงเงียบ
      description: ระบุว่าอุปกรณ์ลดเสียงช่วยลดระดับเสียงที่รับรู้ได้มากน้อยเพียงใด
        โดยเฉพาะอย่างยิ่งสำหรับอุปกรณ์ลดเสียงเพื่อการฝึกใช้งาน
    mute_cork_padding_material:
      name: ไม้ก๊อกปิดเสียง/การเว้นขอบด้านล่างวัสดุ
      description: ระบุวัสดุหน้าสัมผัสของคนปิดเสียง การเว้นขอบในพื้นที่ (เช่น แถบไม้ก๊อก/แผ่นรอง)
        ใช้สำหรับยึดจับ/พอดี และป้องกันกระดิ่ง
    mute_coverage_type:
      name: ประเภทการปกปิดแบบปิดเสียง
      description: ระบุรูปแบบ/การครอบคลุมของอุปกรณ์ลดเสียงบนพื้นผิวการเล่น ตั้งแต่อุปกรณ์ลดเสียงเฉพาะจุดขนาดเล็กไปจนถึงอุปกรณ์ลดเสียงแบบเต็มพื้นผิวสำหรับการฝึกซ้อม
    mute_finish:
      name: จบแบบเงียบ
      description: การตกแต่งพื้นผิวของอุปกรณ์ลดเสียงอาจส่งผลต่อความทนทานและความสวยงาม
        (เช่น ผิวมันเงา vs ผิวด้าน)
    name_label_text_template:
      name: เทมเพลตชื่อ Label ข้อความ
      description: ระบุข้อความหรือเทมเพลตที่กำหนดไว้ล่วงหน้าที่จะพิมพ์บนป้ายชื่อ (เช่น
        ‘เป็นของ’, ‘ผลิตโดย’)
    napkin_ply:
      name: ชั้นผ้าเช็ดปาก
      description: ระบุความหนาของผ้าเช็ดปากค็อกเทลด้วยจำนวนชั้น (plies)
    neck_brace_fit_system:
      name: ระบบปรับความพอดีของอุปกรณ์พยุงคอ
      description: ระบุวิธีการหลักที่ใช้ในการปรับและยึดอุปกรณ์พยุงคอให้เข้ากับผู้ขี่
    neck_brace_size_basis:
      name: ขนาดของปลอกคอพยุงคอเป็นเกณฑ์ในการเลือก
      description: ระบุเกณฑ์การกำหนดขนาดที่ใช้ในการเลือกขนาดอุปกรณ์พยุงคอที่ถูกต้อง
    neck_configuration:
      name: รูปทรงและการออกแบบคอ
      description: ระบุรูปแบบ/โครงสร้างของคอแซ็กโซโฟนที่ให้มา ซึ่งส่งผลต่อหลักสรีรศาสตร์และความสามารถในการเล่น
    neck_coverage_type:
      name: ประเภทการคลุมคอ
      description: ระบุรูปแบบการคลุมคอที่มาพร้อมกับผ้าห่ม
    neck_support_size_system:
      name: คอ ความช่วยเหลือ ขนาด system
      description: ระบุระบบการกำหนดขนาดที่ใช้สำหรับอุปกรณ์พยุง/รัดคอสำหรับการแข่งรถ
        (เช่น ขนาดผู้ใหญ่ ขนาดเยาวชน หรือขนาดเดียว)
    necklace_length_type:
      name: ประเภทความยาวสร้อยคอ
      description: ระบุประเภทความยาวสร้อยคอแบบมาตรฐาน เช่น สร้อยคอแบบรัดคอ หรือสร้อยคอแบบโอเปร่า
        เพื่อช่วยในการเลือกซื้อสินค้าตามสไตล์
    needle_balance_zone:
      name: โซนสมดุลของเข็มทิศ
      description: แสดงเขตสมดุลแม่เหล็กหรือซีกโลกที่เข็มทิศถูกปรับตั้งค่าไว้ เพื่อให้หน้าปัดแสดงค่าได้อย่างแม่นยำทั่วโลก
    needle_case_format:
      name: รูปแบบกล่องใส่เข็ม
      description: การกำหนดรูปแบบโดยรวมของอุปกรณ์จัดเก็บเข็ม
    needle_damping_type:
      name: ประเภทการลดการสั่นสะเทือนของเข็มทิศ
      description: อธิบายวิธีการทำให้เข็มทิศมีความเสถียร (เช่น บรรจุของเหลว ใช้แบบแห้ง
        หรือใช้ระบบอิเล็กทรอนิกส์) ซึ่งส่งผลต่อเวลาในการปรับตัวและอายุการใช้งาน
    needle_felting_needle_profile:
      name: รูปทรงเข็มสำหรับงานสักใยขนสัตว์
      description: ภาพตัดขวาง/รูปทรงของเข็มสำหรับงานสักหลาด ซึ่งมีผลต่อการขยับเส้นใยและลักษณะของผิวสัมผัสที่ได้
    needle_holder_features:
      name: คุณสมบัติของที่จับเข็ม
      description: คุณสมบัติการใช้งานที่โดดเด่นของที่จับเข็ม
    needle_holder_mounting_attachment_method:
      name: วิธีการติดตั้ง/ยึดที่จับเข็ม
      description: วิธีการติดตั้งหรือใช้งานที่เก็บเข็มระหว่างการจัดเก็บ (เช่น แม่เหล็ก
        คลิป สายรัด)
    needle_holder_style:
      name: รูปแบบของที่เก็บเข็ม
      description: รูปแบบ/ดีไซน์การจัดเก็บหรือพกพาที่จับเข็มเย็บผ้า
    needle_pushing_surface_type:
      name: ประเภทพื้นผิวการดันเข็ม
      description: ประเภท/การออกแบบของพื้นผิวสำหรับดันเข็มบนปลอกมือเย็บผ้า (เช่น หลุมโลหะ,
        เหรียญ หรือแผ่นเสริมความแข็งแรง)
    needle_requirement_beading_pattern:
      name: ปริมาณเข็มที่ต้องการ (สำหรับลายลูกปัด)
      description: ขนาดและชนิดของเข็มที่แนะนำโดยแบบแพทเทิร์น
    needle_size_system:
      name: ระบบแบ่งขนาดเข็ม
      description: มาตรฐานการกำหนดขนาดที่ใช้สำหรับ Label
    needle_threader_compatible_needle_type:
      name: เข็มชนิดที่ใช้ร่วมกับอุปกรณ์สนเข็มได้
      description: ระบุว่าอุปกรณ์ร้อยด้ายนี้ออกแบบมาให้ใช้กับเข็มประเภทใดบ้าง (ตามประเภท/การใช้งานของเข็ม)
    needle_threader_mechanism_type:
      name: ประเภทกลไกการสนเข็ม
      description: อธิบายวิธีการที่อุปกรณ์ช่วยร้อยด้ายดึง/เกี่ยวด้ายผ่านรูเข็ม
    needle_threader_packaging_type:
      name: ประเภทบรรจุภัณฑ์อุปกรณ์ร้อยด้ายเข็ม
      description: วิธีการจำหน่าย/บรรจุภัณฑ์ของผลิตภัณฑ์ (แบบชิ้นเดียว แบบหลายชิ้น
        หรือแบบเซ็ต)
    needlecraft_fabric_color_family:
      name: กลุ่มสีผ้าสำหรับงานเย็บปักถักร้อย
      description: ตระกูลสีมาตรฐานสำหรับผ้าทอสม่ำเสมอ (ใช้ควบคู่กับสีสำหรับหมวดโลหะ)
    needlecraft_fabric_composition:
      name: ส่วนประกอบของผ้าสำหรับงานเย็บปักถักร้อย
      description: ระบุส่วนประกอบ/ส่วนผสมของเส้นใยในผ้าสำหรับงานเย็บปักถักร้อย (เช่น
        ผ้าฝ้าย 100%, ผ้าลินินผสมฝ้าย)
    needlecraft_fabric_weave_type:
      name: ประเภทการทอผ้าสำหรับงานเย็บปักถักร้อย
      description: ระบุลักษณะการทอ/โครงสร้างของผ้าลินินสำหรับงานเย็บปักถักร้อย (เช่น
        ผ้าลินินทอแบบสม่ำเสมอ vs ผ้าลินินแบบดั้งเดิม) ซึ่งส่งผลต่อลักษณะและรูปลักษณ์ของตะเข็บ
    needlecraft_kit_items_included:
      name: อุปกรณ์งานฝีมือประกอบด้วย
      description: แสดงรายการส่วนประกอบหลักที่รวมอยู่ในงานเย็บปักถักร้อย (เครื่องมือและวัสดุสิ้นเปลือง)
    needlecraft_kit_project_type:
      name: โครงการนีดเดิ้ลคราฟท์มอง
      description: ระบุว่าชุดอุปกรณ์นี้ผลิตสินค้าสำเร็จรูปอะไร (ผลลัพธ์ของโครงการ)
    needlecraft_stitching_coverage:
      name: การเย็บปักถักร้อย
      description: ระบุว่าผ้าถูกเย็บทับ 1 รู/ตารางเมตร หรือ 2 รู (โดยทั่วไปสำหรับผ้าทอละเอียดและผ้าลินิน)
    needlepoint_canvas_mesh_count:
      name: จำนวนตาข่ายของผ้าปักเข็ม
      description: ขนาดตาข่าย/จำนวนเส้นด้ายต่อตารางนิ้ว (stack/count) ที่ต้องการใช้ในการออกแบบ
        (โดยทั่วไปเรียกว่า canvas count)
    needlepoint_frame_canvas_attachment_method:
      name: วิธีการยึดผ้าใบ Frame ครอสติช
      description: อธิบายวิธีการยึดผ้าปักเข้ากับ Frame ปัก
    needlepoint_frame_compatible_stand_type:
      name: ขาตั้งที่เข้ากันได้กับกรอบงานปักครอสติช
      description: หากตัวเฟรมได้รับการออกแบบให้ติดตั้งกับขาตั้ง ให้ระบุประเภทของขาตั้งที่ใช้งานร่วมกันได้
    needlepoint_frame_contents:
      name: เนื้อหา Frame เข็ม
      description: ระบุส่วนประกอบและอุปกรณ์เสริมที่รวมอยู่ในชุดโครงปักผ้า (เช่น โครง,
        แท่ง/แกนสำรอง, ตะปู/หมุด, แถบจับ, กระเป๋าสำหรับพกพา)
    needlepoint_frame_tension_adjustment_type:
      name: ประเภทการปรับความตึง Frame ปักเข็ม
      description: ระบุวิธีการ (หรือความเป็นไปได้) ในการปรับความตึงของกรอบระหว่างการใช้งาน
    needlepoint_pattern_chart_format:
      name: รูปแบบตารางลายปัก
      description: วิธีการแสดงแบบลายปักสำหรับงานเย็บ (แบบแผนผังเทียบกับแบบพิมพ์/ระบายสีตามแบบ)
    needlepoint_project_type:
      name: ประเภทงานปักผ้า
      description: สินค้า/ประเภทสำเร็จรูปที่ต้องการใช้สำหรับงานปักเข็มนี้
    net_design:
      name: การออกแบบตาข่าย
      description: บ่งบอกรูปแบบโครงสร้างตาข่าย โดยระบุว่าสามารถหดหรือพับเก็บได้เพื่อความสะดวกในการพกพา
    net_mesh_pattern:
      name: รูปแบบตาข่าย
      description: ระบุรูปทรงเรขาคณิตของช่องเปิดตาข่าย ซึ่งอาจส่งผลต่อทัศนวิสัยและความแข็งแรง
    net_twine_gauge:
      name: เกจวัดเชือกตาข่าย
      description: บ่งบอกถึงความหนาหรือความแข็งแรงของเส้นใยที่ใช้ทำแห ซึ่งโดยทั่วไปจะแสดงเป็นตัวเลขเกจ
        (เช่น 18, 36)
    nicotine_source:
      name: แหล่งที่มาของนิโคติน
      description: ระบุว่านิโคตินในผลิตภัณฑ์นั้นได้มาจากยาสูบ สังเคราะห์ หรือไม่มีนิโคตินเลย
    nipple_drive_interface:
      name: รูปแบบหัวขับของหมุดยึดซี่ลวด
      description: บ่งบอกรูปแบบ/มาตรฐานของหัวขับหรือหมุดยึดซี่ลวด (แบบภายนอกหรือภายใน)
        ซึ่งเป็นตัวกำหนดเครื่องมือที่ต้องใช้และวิธีการขึ้นซี่ลวดล้อ
    nock_activation_method:
      name: วิธีการเปิดใช้งานน็อค
      description: ระบุกลไกที่ใช้ในการเปิดหรือปิดไฟ LED ของหัวลูกศร (เช่น แรงดึงจากสายธนู
        เซ็นเซอร์ตรวจจับการเคลื่อนไหว สวิตช์แบบแมนนวล)
    nock_fitment_code:
      name: รหัสการติดตั้งน็อค
      description: รหัสของผู้ผลิตหรือรหัสอุตสาหกรรมที่ใช้ระบุตระกูล/ซีรีส์ของลูกศรนั้นๆ
    nock_throat_size:
      name: ขนาดคอของน็อค
      description: ระบุขนาดของร่อง (nock throat) ที่จะประกบเข้ากับสายธนู
    nock_transparency_level:
      name: ระดับความโปร่งใสของหัวลูกศร
      description: อธิบายถึงระดับความโปร่งใสของวัสดุที่ใช้ทำหัวลูกศร—โปร่งใส โปร่งแสง
        ทึบแสง หรือเรืองแสงในที่มืด—ซึ่งส่งผลต่อการมองเห็นและความสวยงาม
    nock_type:
      name: ประเภทน็อค
      description: ระบุรูปแบบร่องท้ายลูกศรหรือลูกธนู เช่น ร่องท้าย, ครึ่งวงกลม หรือแบบมีไฟ
    noise_reduction_type:
      name: ประเภทการลดเสียงรบกวน
      description: ระบุเทคโนโลยีลดเสียงรบกวนที่ใช้ (หรือไม่ใช้) ในชุดหูฟังแบบติดตั้งในตัวของหมวกกันน็อค
        หากมี
    noise_suppression_technology:
      name: เทคโนโลยีลดเสียงรบกวน
      description: ระบุว่าผลิตภัณฑ์นั้นใช้ระบบลดแรงสั่นสะเทือนแบบพาสซีฟหรือวงจรไฟฟ้าแบบแอคทีฟที่บีบอัดเสียงดังและ/หรือขยายเสียงรอบข้าง
    non_slip_base_features:
      name: คุณสมบัติฐานกันลื่น
      description: ระบุคุณสมบัติกันลื่นที่มีให้เพื่อป้องกันไม่ให้แป้นเคลื่อนที่ระหว่างประสิทธิภาพ
    nose_bridge_type:
      name: สันจมูก
      description: บ่งบอกถึงการออกแบบสันจมูก ซึ่งส่งผลต่อความพอดีของแว่นตาสำหรับรูปหน้าแต่ละขนาด
    nose_clip_accessories_included:
      name: รวมอุปกรณ์หนีบจมูกแล้ว
      description: ระบุอุปกรณ์เสริมเพิ่มเติมที่มาพร้อมกับที่หนีบจมูกสำหรับว่ายน้ำ
        (เช่น ที่อุดหู กล่องเก็บ)
    nose_clip_features:
      name: คุณสมบัติคลิปหนีบจมูก
      description: เน้นจุดเด่นคุณสมบัติการใช้งานทั่วไปหรือความสะดวกสบายของคลิปหนีบจมูก
    nose_coverage_style:
      name: รูปแบบการปกปิดจมูก
      description: ระบุว่ามีแผ่นป้องกันจมูกหรือปากบนหน้ากากกันแมลงหรือไม่ และมีประเภทใดบ้าง
    noseband_type:
      name: แบบสายรัดจมูก
      description: ระบุแบบของสายรัดจมูก (ถ้ามี) Supply พร้อมกับบังเหียน
    number_of_canvas_meshes:
      name: จำนวนตาข่ายผ้าใบ
      description: ขนาดตาข่ายของแผ่นผ้าใบพลาสติก ซึ่งแสดงเป็นจำนวนรูต่อนิ้ว (HPI)
        หรือจำนวนนับ จะเป็นตัวกำหนดขนาดของฝีเข็มและรายละเอียดของชิ้นงาน
    number_of_chainrings:
      name: จำนวนจานหน้า
      description: ระบุจำนวนจานหน้า (chinickers) ที่ขาจานได้รับการออกแบบให้ติดตั้ง
        หรือที่มาพร้อมกับขาจาน
    number_of_control_stations:
      name: จำนวนสถานีควบคุม
      description: แสดงจำนวนสถานีควบคุม/บังคับเลี้ยวที่ชุดควบคุมรองรับ (สถานีเดียว
        หรือ สองสถานี เป็นต้น)
    number_of_digits:
      name: จำนวนตัวเลข
      description: ตัวนับแสดงจำนวนหลักกี่หลัก (เช่น 1 หลัก, 2 หลัก, 3 หลัก)
    number_of_guitar_slots:
      name: จำนวนช่องสำหรับกีตาร์
      description: ระบุจำนวนกีตาร์ที่กระเป๋าใส่กีตาร์/เคสนี้ออกแบบมาเพื่อบรรจุ
    number_of_needlecraft_fabrics:
      name: จำนวนผ้าสำหรับงานเย็บปักถักร้อย
      description: ระบุจำนวนช่องผ้าสำหรับผ้าปัก/ผ้าสำหรับงานเย็บปักถักร้อย โดยทั่วไปจะแสดงเป็นช่องสี่เหลี่ยมต่อหนึ่งนิ้ว
        (เช่น 14-count)
    number_of_plastic_canvas_meshes:
      name: จำนวนผ้าใบตาข่ายพลาสติก
      description: ระบุจำนวนตาข่ายของแผ่นพลาสติก (รูต่อหนึ่งนิ้ว) ซึ่งเป็นตัวกำหนดขนาดของตะเข็บและระดับรายละเอียดของชิ้นงาน
    number_of_quilting_frame_rails:
      name: จำนวนราง Frame สำหรับงานควิลท์
      description: จำนวนราง/ลูกกลิ้งที่ติดตั้งบนโครงเย็บผ้า (เช่น ระบบ 2 ราง เทียบกับ
        ระบบ 3 ราง)
    number_of_rope_slots:
      name: จำนวนช่องเชือก
      description: แสดงว่าอุปกรณ์ควบคุมเชือกนั้นออกแบบมาสำหรับใช้กับเชือกเส้นเดียวหรือเชือกสองเส้น
    number_of_switch_poles:
      name: จำนวนขั้วสวิตช์
      description: จำนวนราง/ลูกกลิ้งที่ติดตั้งบนโครงเย็บผ้า (เช่น ระบบ 2 ราง เทียบกับ
        ระบบ 3 ราง)
    number_of_switch_throws:
      name: จำนวนการโยกสวิตช์
      description: จำนวนเส้นทางเอาต์พุต (การโยก) ต่อขั้ว (เช่น SPDT)
    number_of_timing_chain_rows:
      name: จำนวนแถวของโซ่ราวลิ้น
      description: ระบุว่าโซ่ไทม์มิ่งเป็นแบบแถวเดียวหรือหลายแถว
    number_of_trailer_axles:
      name: จำนวนเพลาของรถพ่วง
      description: จำนวนเพลาของรถพ่วง
    number_of_wheel_pieces:
      name: จำนวนชิ้นส่วนล้อ
      description: ระบุว่าล้อนั้นเป็นแบบชิ้นเดียว สองชิ้น หรือสามชิ้น
    numbering_style:
      name: รูปแบบการกำหนดหมายเลข
      description: ระบุว่าหมายเลขประจำตัวนักกีฬา (bib) มีการติดไว้ล่วงหน้าเพื่อระบุทีมหรือไม่
        และอย่างไร (เช่น ไม่มีหมายเลข, 1-10, กำหนดเอง)
    nunchuck_connector_type:
      name: ประเภทขั้วต่อของนันชัก
      description: รูปแบบการเชื่อมต่อระหว่างด้ามนุนชักทั้งสองข้าง (เช่น เชือก โซ่
        โซ่หมุนได้)
    nursing_access:
      name: การเข้าถึงการพยาบาล
      description: ระบุวิธีการเข้าถึงการให้นมบุตรที่รวมอยู่ในชุดว่ายน้ำ หากมี
    nursing_access_type:
      name: ประเภทการเข้าถึงการพยาบาล
      description: ระบุวิธีการที่เสื้อผ้าชิ้นนั้นช่วยให้เข้าถึงเต้านมสำหรับการให้นมหรือการปั๊มนมได้
    nut_butter_texture:
      name: เนื้อสัมผัสของเนยถั่ว
      description: อธิบายลักษณะทางกายภาพของเนยถั่ว เพื่อให้ผู้ซื้อสามารถเลือกได้ง่ายระหว่างแบบเนียน
        แบบมีเนื้อสัมผัส หรือแบบมีเนื้อหยาบ เป็นต้น
    nutrient_fortification:
      name: การเสริมคุณค่าทางโภชนาการ
      description: ระบุสารอาหารหลักที่เสริมเข้าไปในเครื่องดื่มหรือผลิตภัณฑ์อาหารนั้นๆ
    oak_product_form:
      name: รูปแบบผลิตภัณฑ์จากไม้โอ๊ค
      description: ระบุลักษณะทางกายภาพของไม้โอ๊คที่ใช้ในการบ่ม/ปรุงแต่งรสชาติผลิตภัณฑ์
    oak_toast_level:
      name: ระดับการอบโอ๊ค
      description: ระบุระดับการคั่วของผลิตภัณฑ์ไม้โอ๊ค
    oboe_case_capacity:
      name: ความจุของกล่องใส่โอโบ
      description: แสดงว่ากระเป๋าใบนี้ออกแบบมาเพื่อบรรจุเครื่องดนตรีและส่วนประกอบหลักใดบ้าง
    oboe_case_carry_configuration:
      name: การจัดวางกระเป๋าใส่โอโบ
      description: ระบุรูปแบบการพกพาหลักที่เคส/กระเป๋าใส่โอโบมีให้เลือก
    oboe_case_design:
      name: การออกแบบเคสสำหรับโอโบ
      description: จำแนกประเภทโครงสร้าง/ความแข็งของกล่องใส่โอโบหรือกระเป๋าใส่เครื่องดนตรี
        (เช่น แข็ง กึ่งแข็ง อ่อน) เพื่อระบุระดับการป้องกัน
    oboe_case_internal_fit_type:
      name: ประเภทการจัดวางภายในของเคสโอโบ
      description: ระบุว่าภายในได้รับการขึ้นรูปให้เหมาะกับการจัดวางอุปกรณ์เฉพาะ หรือใช้ช่องเก็บของที่ปรับเปลี่ยนได้
    oboe_keywork_plating:
      name: การชุบโลหะของกลไกคีย์โอโบ
      description: ระบุการชุบ/การตกแต่งผิวของกลไกคีย์ (กุญแจ) ของโอโบ โดยแยกจากวัสดุตัวเครื่อง
    oboe_strap_padding:
      name: สายโอโบ การเว้นขอบบริเวณ
      description: อธิบายถึงการมีอยู่หรือประเภทของแผ่นรองซับ บริเวณจุดสัมผัสของสายสะพายหรือส่วนรองรับ
        เพื่อความสะดวกสบายในการใช้งาน (เช่น แผ่นรองซับบริเวณบ่า/คอ)
    oboe_swab_style:
      name: สไตล์ไม้กวาดโอโบ
      description: ระบุรูปแบบการใช้งาน/โครงสร้างของผ้าเช็ดทำความสะอาดโอโบ (เช่น แบบดึงผ่าน
        หรือแบบไหมถ่วงน้ำหนัก)
    observation_window_material:
      name: วัสดุหน้าต่างสังเกตการณ์
      description: ระบุวัสดุของแผง/หน้าต่างสำหรับรับชม (ซึ่งมักส่งผลต่อความคมชัดและความทนทาน)
    ocarina_accessories_included:
      name: อุปกรณ์เสริมที่มาพร้อมโอคาริน่า
      description: อุปกรณ์เสริมที่มาพร้อมกับโอคาริน่า เช่น กระเป๋า สายคล้องคอ หรือแผนผังการวางนิ้ว
    ocarina_chamber_count:
      name: จำนวนห้องโอคาริน่า
      description: ระบุจำนวนห้องภายในของโอคาริน่าแบบอินไลน์ ซึ่งส่งผลต่อช่วงเสียงและความซับซ้อนในการเล่น
        (ห้องเดียว/สองห้อง/สามห้อง เป็นต้น)
    ocarina_fingering_system:
      name: ระบบการวางนิ้วสำหรับโอคาริน่า
      description: ระบุระบบการวางนิ้ว/มาตรฐานที่ใช้กับโอคาริน่าแบบห้อย (ถ้ามี)
    ocarina_finish_type:
      name: ประเภทการตกแต่งโอคาริน่า
      description: ลักษณะพื้นผิวของตัวโอคาริน่ามีผลต่อสัมผัสและความสวยงาม
    occupant_classification_sensor_support:
      name: การรองรับเซ็นเซอร์จำแนกประเภทผู้โดยสาร
      description: ระบุว่าเบาะนั่งนั้นมีเซ็นเซอร์จำแนกประเภทผู้โดยสาร/น้ำหนักหรือไม่
        หรือมีช่องสำหรับย้าย/ติดตั้งเซ็นเซอร์เดิมจากโรงงาน (โดยทั่วไปสำหรับเบาะผู้โดยสารด้านหน้า)
    octave_harmonica_cover_plate_material:
      name: วัสดุที่ใช้ทำฝาครอบฮาร์โมนิกาประเภทอ็อกเทฟ
      description: วัสดุที่ใช้ทำแผ่นปิดด้านนอกของฮาร์โมนิกาอ็อกเทฟ
    octave_harmonica_tuning_system:
      name: ระบบปรับเสียงฮาร์โมนิกาอ็อกเทฟ
      description: ระบบการปรับเสียง/จังหวะที่ใช้สำหรับฮาร์โมนิกาอ็อกเทฟ
    octoban_mounting_system_type:
      name: ระบบการติดตั้งแบบอ็อกโทบัน
      description: วิธีการติดตั้งหรือจัดวางตำแหน่งของกลองออกโทแบนระหว่างการเล่น (การติดตั้ง/ยึดจับ/ขาแขวน/ขาตั้ง)
    odor_control_features:
      name: คุณสมบัติควบคุมกลิ่น
      description: ระบุว่าผลิตภัณฑ์มีคุณสมบัติในการกำจัด/ระงับกลิ่นหรือไม่ และด้วยวิธีการใด
    office_furniture_items_included:
      name: รายการเฟอร์นิเจอร์สำนักงานที่รวมอยู่ในชุด
      description: ระบุรายการเฟอร์นิเจอร์สำนักงานที่รวมอยู่ในชุด เช่น โต๊ะทำงานหรือตู้เก็บเอกสาร
    oil_cooler_core_type:
      name: ประเภทแกนระบายความร้อนน้ำมัน
      description: ระบุโครงสร้างแกนภายในของตัวระบายความร้อนน้ำมัน ซึ่งส่งผลต่อประสิทธิภาพการระบายความร้อน
        การลดลงของแรงดัน และความทนทาน
    oil_cooler_mounting_style:
      name: รูปแบบการติดตั้งตัวระบายความร้อนน้ำมัน
      description: อธิบายวิธีการติดตั้ง/ยึดตัวระบายความร้อนน้ำมันเครื่องบนตัวรถ
    oil_dipstick_component_type:
      name: ส่วนประกอบก้านวัดระดับน้ำมันเครื่อง
      description: ระบุว่ากำลังจำหน่ายชิ้นส่วนวัดระดับน้ำมันชนิดใด (เช่น เฉพาะใบ/ก้านวัดระดับน้ำมัน,
        เฉพาะด้ามจับ, ชุดประกอบครบชุด, ท่อวัดระดับน้ำมัน ฯลฯ)
    oil_dipstick_measurement_markings:
      name: เครื่องหมายวัดระดับบนก้านวัดน้ำมันเครื่อง
      description: ระบุว่ามีเครื่องหมาย/มาตราส่วนใดบ้างบนก้านวัดระดับน้ำมันเครื่อง
        สำหรับใช้ในการอ่านระดับน้ำมันเครื่อง
    oil_dipstick_tube_mounting_type:
      name: ประเภทการติดตั้งท่อวัดระดับน้ำมันเครื่อง
      description: ระบุวิธีการยึดหรือติดตั้งท่อวัดระดับน้ำมันเครื่องเข้ากับเครื่องยนต์หรือเสื้อเครื่องยนต์
    oil_drain_plug_head_drive_type:
      name: หัวขับปลั๊กถ่ายน้ำมันเครื่อง
      description: ระบุส่วนต่อประสานการใช้งานเครื่องมือบนหัวปลั๊กถ่ายน้ำมันเครื่องที่ใช้สำหรับการติดตั้งและถอดออก
    oil_drain_plug_magnet_type:
      name: ประเภทแม่เหล็กของปลั๊กถ่ายน้ำมันเครื่อง
      description: ระบุว่าปลั๊กถ่ายน้ำมันเครื่องเป็นแม่เหล็กหรือไม่ และถ้าเป็นแม่เหล็ก
        จะเป็นแบบไหน
    oil_fill_cap_type:
      name: ฝาปิดช่องเติมน้ำมันชนิดต่างๆ
      description: รูปแบบ/ชนิดของฝาปิดช่องเติมน้ำมันที่ใช้กับฝาครอบวาล์ว (ถ้ามี)
    oil_filler_cap_attachment_type:
      name: ประเภทการติดตั้งฝาปิดช่องเติมน้ำมัน
      description: ระบุวิธีการยึดฝาปิดช่องเติมน้ำมันที่ตัวเครื่องยนต์หรือคอถังเติมน้ำมัน
        (เช่น แบบเกลียวหมุน, แบบสลักล็อก/หมุน 1/4 รอบ, แบบกด)
    oil_filler_cap_installation_position:
      name: ตำแหน่งการติดตั้งฝาปิดช่องเติมน้ำมันเครื่อง
      description: ระบุตำแหน่งที่ใช้ฝาปิดเมื่อมีจุดเติมน้ำมันหลายจุด (เช่น ฝาครอบวาล์ว
        ท่อเติมน้ำมันระยะไกล)
    oil_filler_cap_locking_type:
      name: ประเภทการล็อกฝาปิดช่องเติมน้ำมันเครื่อง
      description: ระบุว่าฝาปิดช่องเติมน้ำมันเป็นแบบไม่ล็อค หรือใช้ระบบล็อค/วิธีการถอดที่ปลอดภัย
        (เช่น ใช้กุญแจหรือต้องใช้เครื่องมือ) เพื่อช่วยป้องกันการดัดแปลง/การขโมย หรือการเปิดโดยไม่ตั้งใจ
    oil_filler_cap_tether_type:
      name: ประเภทสายคล้องฝาปิดช่องเติมน้ำมันเครื่อง
      description: ระบุว่าฝาปิดช่องเติมน้ำมันเครื่องมีสายรัด/ยึดไว้เพื่อป้องกันการสูญหายหรือไม่
        และใช้สายรัดแบบใด
    oil_filler_cap_venting_type:
      name: ฝาปิดช่องเติมน้ำมันเครื่องแบบมีรูระบายอากาศ
      description: ระบุว่าฝาปิดมีช่องระบายอากาศหรือไม่ และกลไกการระบายอากาศ (ถ้ามี)
    oil_filter_style:
      name: แบบกรองน้ำมันเครื่อง
      description: ระบุรูปทรงและรูปแบบการติดตั้งของไส้กรองน้ำมันเครื่องเพื่อให้เข้ากันได้กับจุดยึดไส้กรองของเครื่องยนต์
    oil_pan_baffle_windage_features:
      name: คุณสมบัติแผ่นกั้น/กันน้ำมันในอ่างน้ำมันเครื่อง
      description: ระบุคุณสมบัติการควบคุมน้ำมันภายในที่รวมอยู่ในอ่างน้ำมันเครื่อง
    oil_pan_finish_coating:
      name: ผิวเคลือบอ่างน้ำมันเครื่อง
      description: อธิบายลักษณะพื้นผิวหรือการเคลือบผิวของอ่างน้ำมันเครื่อง (ทาสี,
        เคลือบผง, ชุบ, ผิวดิบ ฯลฯ)
    oil_pressure_sensor_function_type:
      name: ประเภทการทำงานของเซ็นเซอร์แรงดันน้ำมัน
      description: ระบุว่าชิ้นส่วนเป็นตัวส่งแรงดันน้ำมันแบบแปรผันสำหรับเกจ/ECU หรือสวิตช์แรงดันน้ำมันเปิด/ปิดที่มีไฟเตือน
    oil_pressure_sensor_signal_output_type:
      name: ประเภทเอาต์พุตสัญญาณเซ็นเซอร์แรงดันน้ำมัน
      description: ระบุรูปแบบเอาต์พุตไฟฟ้า/สัญญาณที่ผลิตโดยเซ็นเซอร์/ตัวส่งสัญญาณแรงดันน้ำมันเครื่อง
    oil_processing_method:
      name: วิธีการแปรรูปน้ำมัน
      description: ระบุวิธีการผลิตหรือกลั่นน้ำมัน (เช่น สกัดเย็น, น้ำมันบริสุทธิ์,
        น้ำมันกลั่น) ซึ่ง Influence รสชาติ คุณค่าทางโภชนาการ และความเหมาะสมในการปรุงอาหาร
    oil_pump_drive_method:
      name: วิธีการขับเคลื่อนปั๊มน้ำมัน
      description: ระบุว่าอะไรเป็นตัวขับเคลื่อนปั๊มน้ำมันภายในเครื่องยนต์
    oil_pump_mounting_style:
      name: รูปแบบการติดตั้งปั๊มน้ำมัน
      description: ระบุตำแหน่งและวิธีการติดตั้งปั๊มน้ำมันในเครื่องยนต์ (เช่น ติดตั้งภายในหรือภายนอก/แยกส่วน
        ติดตั้งบนฝาครอบ ติดตั้งบนอ่างน้ำมันเครื่อง)
    oil_system_connection_thread_standard:
      name: ระบบจ่ายน้ำมันเป็นไปตามมาตรฐาน
      description: ระบุมาตรฐานเกลียว/การเชื่อมต่อที่ใช้โดยส่วนต่อประสานระบบน้ำมันของชิ้นส่วนสำหรับการติดตั้ง/ความเข้ากันได้
        (เช่น M12x1.5, 1/8-27 NPT, BSPP)
    oil_viscosity_grade:
      name: ระดับความหนืดของน้ำมัน
      description: อธิบายถึงความหนืดสัมพัทธ์ของน้ำมันหล่อลื่นสำหรับอุปกรณ์งานฝีมือ
        (ไม่ใช่เกรด SAE สำหรับยานยนต์)
    okra_variety:
      name: พันธุ์กระเจี๊ยบ
      description: ระบุพันธุ์หรือสายพันธุ์เฉพาะของกระเจี๊ยบที่วางจำหน่าย เช่น Clemson
        Spineless, Red Burgundy หรือ Baby Okra
    olfactory_arts_material_form:
      name: รูปแบบวัสดุในศิลปะแห่งกลิ่น
      description: ระบุลักษณะทางกายภาพของวัสดุที่จำหน่าย
    olfactory_arts_tool_kit_content:
      name: เนื้อหาชุดเครื่องมือศิลปะการดมกลิ่น
      description: รายการส่วนประกอบที่รวมไว้เมื่อมีการขายสินค้าเป็นแบบพกพาหรือชุดสำหรับทำเทียน/ธูป/น้ำหอม
    olive_variety:
      name: มะกอกหลากหลายสายพันธุ์
      description: ระบุพันธุ์มะกอกที่ใช้ ซึ่งส่งผลต่อ Taste เนื้อสัมผัส สี และความเป็นเอกลักษณ์ของแต่ละภูมิภาค
    onion_variety:
      name: พันธุ์หัวหอม
      description: ระบุประเภทเฉพาะของหัวหอม เพื่อให้นักช้อปสามารถค้นหาสี รส และโปรไฟล์การใช้งานที่ต้องการได้อย่างรวดเร็ว
        ในขณะเดียวกันก็ช่วยให้ผู้ขายแสดงรายการผลิตภัณฑ์ได้อย่างถูกต้อง
    opacity_level:
      name: ระดับความทึบแสง
      description: บ่งบอกถึงความบางหรือความทึบของผ้า
    operating_modes:
      name: โหมดการทำงาน
      description: เอฟเฟกต์หลักในตัว/ Mode Motion ที่รองรับโดยแสงเลเซอร์
    operating_voltage:
      name: แรงดันไฟฟ้าใช้งาน
      description: ระบุแรงดันไฟฟ้าของระบบที่ตัวฉีดได้รับการออกแบบมาให้ใช้งานได้
    optical_toy_features:
      name: คุณสมบัติของของเล่นออปติคอล
      description: เน้นผลกระทบทางสายตา/เชิงแสงหลักที่เกิดจากของเล่นชิ้นนี้
    orchestral_string_core_material:
      name: เนื้อหาหลักสำหรับเครื่องสายวงออร์เคสตรา
      description: ระบุวัสดุหลักที่ใช้ในการผลิตสายกีตาร์ (แกนกลาง) ซึ่งมีผลอย่างมากต่อความรู้สึก
        การตอบสนอง และโทนเสียง
    orchestral_string_end_type:
      name: ประเภทปลายสายของเครื่องดนตรีสากลประเภทเครื่องสาย
      description: ระบุรูปแบบการยึดติดที่ปลายสายกีตาร์
    orchestral_string_included_strings:
      name: ชุดเครื่องสายออร์เคสตราที่รวมอยู่ในชุด
      description: ชี้แจงว่าเส้นสายเฉพาะเส้นใดที่รวมอยู่ในแพ็คบ้าง (แตกต่างกันไปตามเครื่องดนตรี)
    orchestral_string_instrument_fitting_part_type:
      name: ประเภทอุปกรณ์ประกอบหรือชิ้นส่วนของเครื่องดนตรีสากลประเภทเครื่องสาย
      description: ระบุประเภทของข้อต่อ/ชิ้นส่วนของสินค้า (เช่น สะพาน ท่อไอเสีย ที่วางคาง)
    orchestral_string_instrument_mute_type:
      name: ประเภทของอุปกรณ์ลดเสียงสำหรับเครื่องสายออร์เคสตรา
      description: ระบุประเภทการใช้งานของอุปกรณ์ลดเสียงสำหรับเครื่องดนตรีประเภทสายในวงออร์เคสตรา
        (เช่น สำหรับฝึกซ้อม/โรงแรม เทียบกับ สำหรับการแสดง/คอนเสิร์ต) และ/หรือรูปแบบการออกแบบทั่วไป
    orchestral_string_instrument_part_position:
      name: วงออร์เคสตราเลียตำแหน่งชิ้นส่วนเครื่องดนตรี
      description: ระบุว่าชิ้นส่วนนั้นอยู่ที่ใดบนอุปกรณ์ (มีประโยชน์เมื่อชิ้นส่วนอยู่ในด้านบน/ล่าง
        หรือซ้าย/ขวา ติดตามสินค้า)
    orchestral_string_winding_material:
      name: วัสดุสำหรับพันสายเครื่องสายวงออร์เคสตรา
      description: ระบุวัสดุที่ใช้พัน/ห่อหุ้มด้านนอกของสายกีตาร์
    organza_finish_sheen:
      name: ผิวสัมผัส/ความเงาแบบผ้าออร์แกนซ่า
      description: อธิบายลักษณะพื้นผิวของผ้าออร์แกนซ่า (ด้านหรือมันเงา/เหลือบสี)
    organza_ribbon_transparency_level:
      name: ระดับความโปร่งใสของริบบิ้นผ้าออร์แกนซ่า
      description: อธิบายถึงความโปร่งแสงของริบบิ้นผ้าออร์แกนซ่า
    organza_transparency_level:
      name: ระดับความโปร่งใสของผ้าออร์แกนซ่า
      description: อธิบายถึงความบางเบาของผ้าออร์แกนซ่าเมื่อนำมาซ้อนทับกันเพียงชั้นเดียว
    origami_paper_shape:
      name: Shapes Paper โอริกามิ
      description: ระบุรูปทรงของแผ่นกระดาษที่ใช้ในการพับ
    origami_paper_sidedness:
      name: ด้าน Paper โอริกามิ
      description: ระบุว่า Paper โอริกามิมีสี/ลวดลายเดียวกันทั้งสองด้าน หรือมีสี/ลวดลายที่ตัดกัน
    ostrich_feather_part:
      name: ส่วนของขนนกกระจอกเทศ
      description: บ่งบอกลักษณะ/ส่วนของขนนกกระจอกเทศที่ใช้ (เช่น ขนสวยฟูฟ่อง vs ขนสีเรียบๆ)
        ซึ่งมีผลต่อความความนุ่มนวล ความหนาแน่น และการใช้งานในงานฝีมือทั่วไป
    outboard_motor_shaft_type:
      name: ประเภทเพลามอเตอร์เรือนอก
      description: ขนาดความยาวเพลามาตรฐานที่ใช้กับเครื่องยนต์เรือ (รูปแบบ Label ที่ใช้ในอุตสาหกรรมทางทะเล)
    outboard_motor_steering_type:
      name: ประเภทระบบบังคับเลี้ยวของเครื่องยนต์เรือหางยาว
      description: ระบุอินเทอร์เฟซ/กลไกการบังคับเลี้ยวที่ใช้โดยเครื่องยนต์เรือ (เช่น
        คันบังคับ หรือระบบบังคับเลี้ยวระยะไกล)
    outdoor_table_functionality:
      name: ฟังก์ชันการใช้งานของโต๊ะกลางแจ้ง
      description: ระบุฟังก์ชันในตัวเฉพาะที่เหนือกว่าพื้นผิวโต๊ะธรรมดา (เช่น ช่องแช่เย็น
        ชั้นวางของ ฝาครอบถังแก๊ส ฐานร่มกันแดด ตัวเชื่อมต่อเก้าอี้ ดีไซน์พับได้ ตู้เซฟในสระว่ายน้ำ
        ความสูงที่ปรับได้ ล้อในตัว ไฟ LED)
    outerwear_length_type:
      name: ประเภทความยาวภายนอก
      description: จำแนกความยาวโดยรวมของเสื้อผ้าชั้นนอกออกเป็นช่วงความยาวมาตรฐานต่างๆ
    outerwear_pieces_included:
      name: เสื้อผ้าชั้นนอกที่รวมอยู่ในชุด
      description: แสดงรายการชิ้นส่วนของเสื้อผ้าที่ให้มาเมื่อขายสินค้าเป็นชุด
    outfit_attachment_mechanism:
      name: กลไกการติดชุด
      description: ระบุวิธีการติดชิ้นส่วนเสื้อผ้าหรือเครื่องประดับเข้ากับตุ๊กตา (เช่น
        กาว, แม่เหล็ก)
    outfit_items_included:
      name: รายการเครื่องแต่งกายที่อยู่ในชุด
      description: ชี้แจงรายการเสื้อผ้าเฉพาะที่รวมอยู่ในชุด (เช่น บอดี้สูท กางเกงขาสั้น
        ผ้าคาดผม)
    outlet_thread_type:
      name: ประเภทเต้ารับ
      description: ระบบมาตรฐานที่ใช้ที่พอร์ตทางออกของสายเบรกแม่ปั๊มเบรก (เช่น Bubble
        Flare vs SAE Inverted Flare)
    output_jack_type_instrument:
      name: ประเภทแจ็คเอาต์พุต (เครื่องดนตรี)
      description: ระบุประเภทของแจ็คเสียงเอาต์พุตบนแมนโดลินไฟฟ้า
    output_signal_type:
      name: ประเภทสัญญาณเอาต์พุต
      description: ลักษณะ/ประเภทของสัญญาณไฟฟ้าที่ส่งออกโดยเซ็นเซอร์ (เช่น ความต้านทานอนาล็อกของเทอร์มิสเตอร์
        NTC)
    outsole_marking_type:
      name: ประเภทการทำเครื่องหมายบนพื้นรองเท้า
      description: แสดงว่าพื้นรองเท้าชั้นนอกทิ้งรอยไว้บนพื้นสนามหรือไม่ ซึ่งเป็นสิ่งสำคัญที่ต้องพิจารณาสำหรับกีฬาประเภทแร็กเกตในร่ม
    outsole_material:
      name: วัสดุพื้นรองเท้า
      description: ระบุวัสดุของพื้นรองเท้าส่วนที่สัมผัสกับพื้น ซึ่งส่งผลต่อการยึดเกาะ
        ความยืดหยุ่น และความทนทาน
    outsole_stud_type:
      name: ประเภทปุ่มสตั๊ดที่พื้นรองเท้า
      description: อธิบายถึงลักษณะการจัดวางปุ่มหรือพื้นรองเท้าชั้นนอก (เช่น ปุ่มหล่อขึ้นรูป,
        ปุ่มยางหนา หรือปุ่มละเอียดสำหรับสนามหญ้าเทียม) ที่ช่วยในการยึดเกาะบนพื้นสนามที่เลือกเล่น
    oven_bake_clay_formulation:
      name: สูตรดินเหนียวอบในเตาอบ
      description: ระบุประเภทของดินเหนียวอบ (เช่น ดินโพลิเมอร์เทียบกับดินเรซิน) ซึ่งส่งผลต่อการใช้งาน
        พฤติกรรมการบ่ม และคุณสมบัติของชิ้นงานสำเร็จรูป
    oven_housing_configuration:
      name: การกำหนดค่าตัวเรือนเตาอบ
      description: กำหนดเครื่องใช้ไฟฟ้าที่ต้องการติดตั้งในตู้ (เช่น เตาอบเดี่ยว เตาอบคู่
        หรือเตาอบและไมโครเวฟแบบรวม)
    overhead_mount_installation_method:
      name: วิธีการติดตั้งแบบแขวนเหนือศีรษะ
      description: วิธีการยึดโครงยึดเหนือศีรษะเข้ากับตัวรถ (อุปกรณ์/รูปแบบการติดตั้ง)
    oversize_or_undersize_grade:
      name: เกรดขนาดใหญ่เกินไปหรือเล็กเกินไป
      description: ระบุขนาดของชุดอุปกรณ์ (ลูกสูบ/แหวนลูกสูบขนาดใหญ่เกินไป และ/หรือแบริ่งขนาดเล็กเกินไป)
        เมื่อเทียบกับขนาดมาตรฐานของชิ้นส่วนเดิมจากโรงงานผู้ผลิต
    p_tex_application_method:
      name: วิธีการใช้งาน P-Tex
      description: อธิบายวิธีการนำวัสดุ P-Tex มาใช้กับฐานของสกีหรือสโนว์บอร์ด
    p_tex_form:
      name: รูปแบบ P-Tex
      description: ระบุรูปแบบทางกายภาพของวัสดุซ่อมแซมที่ Supply
    packability:
      name: ความสามารถในการบรรจุ
      description: ระบุว่าสามารถพับหรือเก็บเสื้อกั๊กอย่างไรเมื่อไม่ได้ใช้งาน
    packaging_format:
      name: รูปแบบบรรจุภัณฑ์
      description: วิธีการบรรจุ/จำหน่ายสายกีตาร์ (ซองแยกชิ้น จำหน่ายเป็นจำนวนมาก ฯลฯ)
    packaging_material:
      name: วัสดุบรรจุภัณฑ์
      description: ระบุวัสดุหลักของขวดหรือคอนเทนเนอร์ที่กักเก็บน้ำ
    packaging_type:
      name: ประเภทบรรจุภัณฑ์
      description: อธิบายวิธีการบรรจุตุ๊กตาหัวสั่นสำหรับ Retail/จัดแสดง/เก็บรักษาโดยนักสะสม
    packing_medium:
      name: วิธีการบรรจุ
      description: ระบุถึงของเหลวหรือตัวกลาง (เช่น น้ำ น้ำเชื่อมชนิดต่างๆ น้ำผลไม้
        หรือน้ำเกลือ) ที่ใช้ในการถนอมผลไม้ภายในภาชนะ
    pad_components_included:
      name: ส่วนประกอบแผ่นรองป้องกันที่รวมมาในชุด
      description: ระบุว่าชิ้นส่วนใดบ้างที่รวมอยู่ในชุดเมื่อจำหน่ายสินค้าเป็นเซ็ต
        (เช่น แผ่นรองเข่าและข้อศอก ที่ปกป้องข้อมือ)
    pad_controller_additional_control:
      name: ตัวควบคุมแพดควบคุมเพิ่มเติม
      description: ประเภทของปุ่มควบคุมทางกายภาพเพิ่มเติม นอกเหนือจากแป้นหมุน (ลูกบิด,
        ตัวเลื่อน, ปุ่มกด) ที่มีอยู่บนตัวเครื่อง
    pad_controller_performance_features:
      name: แพดผู้ควบคุมคุณสมบัติประสิทธิภาพ
      description: คุณสมบัติหลักของแป้นควบคุมที่เกี่ยวข้องกับประสิทธิภาพการเล่นและการควบคุมการแสดงออก
    pad_coverage_area:
      name: พื้นที่ครอบคลุมของแผ่นรอง
      description: ระบุบริเวณร่างกายที่แผ่นรองในตัวของชุดรัดเอวช่วยปกป้อง
    pad_material_or_technology:
      name: วัสดุหรือเทคโนโลยีของแผ่นรอง
      description: ระบุเทคโนโลยีดูดซับ Impactหรือวัสดุแบรนด์ที่ใช้ในแผ่นรอง
    pad_mounting_or_holding_style:
      name: รูปแบบการติดตั้งหรือยึดแผ่นรอง
      description: ระบุวิธีการจับ สวมใส่ หรือติดตั้งแผ่นรองขณะใช้งาน
    pad_saver_style:
      name: สไตล์ประหยัดแผ่นรอง
      description: ระบุรูปแบบ/ดีไซน์ของอุปกรณ์ถนอมผ้าเบรกที่ใช้สำหรับทำให้ผ้าเบรกและลำกล้องแห้ง
    pad_shape:
      name: รูปทรงแผ่นรอง
      description: กำหนดรูปทรงเรขาคณิตหรือความโค้งของพื้นผิวที่ใช้ตีหรือตัวแผ่นรองทั้งหมด
        (เช่น กลม โค้ง สี่เหลี่ยม แบน) ช่วยให้ผู้ใช้เลือกแผ่นรองให้เหมาะสมกับเป้าหมายการฝึกและประเภทการตี
    pad_shell_type:
      name: ประเภทเปลือกแผ่นรอง
      description: จำแนกประเภทโครงสร้างของพื้นผิวด้านนอกของแผ่นรอง (เช่น เปลือกแข็ง
        เปลือกอ่อน แผ่นรองด้านใน)
    pad_style:
      name: สไตล์แผ่นรอง
      description: ระบุประเภทหรือรูปแบบของแผ่นรองที่มาพร้อมกับเลื่อน
    padding_layers:
      name: การเว้นขอบด้านบนเลเยอร์
      description: ระบุจำนวนชั้นของโฟมที่ใช้ในการดูดซับแรงกระแทก
    padding_level:
      name: การเว้นขอบในระดับ
      description: ระบุปริมาณวัสดุรองรับที่เสริมเข้าไปในบริเวณที่สายรัด/ส่วนรองรับสัมผัส
        (คอ/ไหล่/หลัง)
    padding_material:
      name: การเว้นขอบด้านวัสดุ
      description: ระบุวัสดุที่ใช้เป็นไส้ในหรือวัสดุรองกันกระแทกภายในกระเป๋า โล่ ถุงมือ
        และหุ่นฝึกซ้อม
    paddle_ball_attachment_type:
      name: ประเภทอุปกรณ์เสริมสำหรับไม้พายลูกปิงปอง
      description: ระบุวิธีการเชื่อมต่อลูกบอลกับไม้ตี (หรือกรณีที่ไม่ได้เชื่อมต่อ)
    paddle_leash_style:
      name: สายจูงแบบพาย
      description: ระบุรูปแบบหรือดีไซน์ของสายรัดไม้พาย
    paddle_shape:
      name: รูปทรงของไม้พาย
      description: กำหนดรูปทรงโดยรวมของหัว/ตัวไม้ปิงปอง (เช่น แบบมาตรฐาน แบบยาว แบบตัวกว้าง)
        ซึ่งส่งผลต่อระยะการเอื้อมถึง ขนาดจุดกระทบที่เหมาะสม และความคล่องตัว
    paddleboard_intended_use:
      name: วัตถุประสงค์การใช้งานของแพดเดิลบอร์ด
      description: จำแนกวัตถุประสงค์หลักในการออกแบบหรือกิจกรรมที่ใช้ในการผลิตบอร์ด
        (เช่น การท่องเที่ยว โยคะ การแข่งขัน)
    paint_application_method:
      name: วิธีการทาสี
      description: วิธีหลักที่สินค้ามีจุดประสงค์เพื่อนำไปใช้กับคาลิเปอร์
    paint_by_number_surface_type:
      name: ประเภทพื้นผิวระบายสีตามหมายเลข
      description: พื้นผิวที่พิมพ์ลวดลายที่มีหมายเลขกำกับ (เช่น ผ้าใบ กระดาษ แผ่นไม้)
    paint_medium_application_method:
      name: วิธีการใช้เพ้นท์ขนาดกลาง
      description: ระบุวิธีการใช้งานที่แนะนำ
    paint_medium_intended_effect:
      name: สีทาชนิดต่างๆ ให้ผลลัพธ์ที่ตั้งใจไว้
      description: บันทึกผลลัพธ์หลักที่สื่อนั้นตั้งใจจะสร้างขึ้น (เช่น พื้นผิว ความมันเงา
        การเคลือบ การไหล ฯลฯ)
    paint_safe_bristles:
      name: ขนแปรงที่ไม่เป็นอันตรายต่อสี
      description: ระบุว่าขนแปรงมีตามท้องตลาดว่าปลอดภัยสำหรับใช้กับสีรถยนต์/เคลือบสีหรือไม่
        (ไร้รอยขีดข่วน)
    paintable_surface:
      name: พื้นผิวที่สามารถทาสีได้
      description: ระบุว่าชิ้นงานปั้นกระดาษนั้นพร้อมทาสีได้เลย (เช่น ลงสีรองพื้น/เคลือบเงาแล้ว)
        หรือต้องเตรียมพื้นผิวเพิ่มเติม
    paintball_caliber:
      name: ขนาดกระสุนเพนท์บอล
      description: ระบุขนาดเส้นผ่านศูนย์กลาง/ลำกล้องของลูกเพนท์บอลหรืออุปกรณ์ที่ใช้งานร่วมกันได้
    paintball_feed_system:
      name: ระบบป้อนลูกเพนท์บอล
      description: กำหนดวิธีการป้อนลูกเพนต์บอลเข้าสู่ปืนเพนต์บอล
    paintball_fill_color:
      name: สีเติมเพนท์บอล
      description: ระบุสีของวัสดุที่ใช้เติมภายใน ซึ่งอาจแตกต่างจากสีของเปลือกนอก และเป็นตัวกำหนดสีที่เหลืออยู่หลัง
        Impact
    paintball_fill_type:
      name: ประเภทการบรรจุกระสุนเพนต์บอล
      description: อธิบายสูตรหรือคุณสมบัติพิเศษใดๆ ของวัสดุอุด (เช่น (ผงที่ล้างออกได้และเรืองแสงในที่มืด)
    paintball_grade:
      name: ระดับของเพนต์บอล
      description: อธิบายระดับประสิทธิภาพหรือวัตถุประสงค์การใช้งาน (เช่น ระดับเริ่มต้น,
        ระดับใช้งานภาคสนาม, ระดับแข่งขัน, ระดับฤดูหนาว)
    paintball_mask_coverage_level:
      name: ระดับการปกปิดของหน้ากากเพนท์บอล
      description: ระบุว่าแว่นตาหรือหน้ากากสำหรับเล่นเพนต์บอลนั้นปกป้องส่วนใดของใบหน้าหรือศีรษะ
        (เฉพาะแว่นตา, ครึ่งหน้า, เต็มหน้า หรือเต็มศีรษะ)
    paintball_tank_valve_type:
      name: ประเภทวาล์วถังเพนท์บอล
      description: อธิบายถึงส่วนต่อประสานของวาล์วหรือตัวควบคุมที่อยู่บนถัง
    painting_surface_priming_type:
      name: ประเภทของสีรองพื้นสำหรับทาสี
      description: ระบุการลงรองพื้น/เคลือบผิวบนพื้นผิวที่จะทาสี (นอกเหนือจากแค่ลงรองพื้น/ไม่ลงรองพื้น)
        ซึ่งส่งผลต่อการยึดเกาะของสีและความเข้ากันได้กับเทคนิคการทาสีต่างๆ
    palette_knife_blade_edge_profile:
      name: ลักษณะขอบใบมีดของมีดเกรียง
      description: อธิบายถึงลักษณะขอบคมของใบมีดเกรียง (ไม่ใช่ความคม) ซึ่งมีผลต่อการสร้างรอยและการผสมสี
    palette_knife_flexibility:
      name: ความยืดหยุ่นของมีดเกรียง
      description: อธิบายถึงความแข็ง/ความยืดหยุ่นของใบมีดเกรียงสำหรับผสมสี
    palette_surface_finish:
      name: พื้นผิวพาเลท
      description: อธิบายถึงพื้นผิว/สารเคลือบผิวที่ใช้ในการผสม ซึ่งมีผลต่อความต้านทานต่อคราบสกปรกและความง่ายในการทำความสะอาด
    palm_padding_level:
      name: ระดับความหนาของวัสดุรองรับฝ่ามือ
      description: อธิบายถึงปริมาณวัสดุรองรับแรงกระแทกบริเวณฝ่ามือของถุงมือหรือแผ่นรองจับ
    palm_padding_type:
      name: ประเภทแผ่นรองฝ่ามือ
      description: ระบุวัสดุหรือโครงสร้างที่ใช้ในการรองรับฝ่ามือ (เช่น เจล โฟม วัสดุสองชั้น)
    palm_wax_blend_readiness:
      name: ความพร้อมของส่วนผสมขี้ผึ้งปาล์ม
      description: ไม่ว่าจะเป็นสินค้าที่เป็นไขปาล์มบริสุทธิ์หรือสูตรผสมล่วงหน้าสำหรับคุณลักษณะด้านประสิทธิภาพเฉพาะ
    palm_wax_form:
      name: ขี้ผึ้งปาล์ม
      description: ลักษณะทางกายภาพของขี้ผึ้งปาล์มที่จำหน่ายนั้น มีผลต่อความสะดวกในการวัด
        ความเร็วในการละลาย และการใช้งาน
    pan_flute_tuning_standard:
      name: มาตรฐานการปรับเสียงขลุ่ยแพน
      description: ความถี่อ้างอิงที่ใช้ในการปรับเสียง (เช่น A4 = 440 เฮิรตซ์) ซึ่งสำคัญสำหรับการเล่นร่วมกับเครื่องดนตรีอื่นๆ
    pannier_configuration:
      name: รูปแบบกระเป๋าข้างจักรยาน
      description: ระบุว่าสินค้าจำหน่ายเป็นกระเป๋าเดี่ยว กระเป๋าคู่ หรือชุดกระเป๋าข้างสองหรือสามใบ
    pannier_mounting_system:
      name: ระบบติดตั้งกระเป๋าข้าง
      description: กำหนดกลไกที่ใช้ในการยึดกระเป๋าข้างเข้ากับแร็คหรือเฟรมจักรยาน เพื่อให้มั่นใจได้ว่าสามารถใช้งานร่วมกับอุปกรณ์ต่างๆ
        ได้
    pant_cuff_style:
      name: สไตล์ปลายขากางเกง
      description: ระบุลักษณะการตกแต่งหรือการปรับแต่งบริเวณข้อเท้าของกางเกง (เช่น
        ขอบยางยืดที่ข้อเท้า ซิปที่ข้อเท้า ชายกางเกงแบบเปิด)
    pant_leg_conversion_type:
      name: ประเภทการแปลงขากางเกง
      description: ระบุว่าสามารถปรับเปลี่ยนหรือดัดแปลงความยาวขากางเกงได้หรือไม่ และอย่างไร
    pantyhose_crotch_style:
      name: สไตล์เป้ากางเกงรัดรูป
      description: กำหนดรูปแบบการออกแบบบริเวณเป้ากางเกง โดยแยกแยะระหว่างแบบเป้าปิดมาตรฐาน
        แบบไม่มีเป้า หรือแบบเสริมผ้าเสริมเป้า
    papaya_variety:
      name: พันธุ์มะละกอ
      description: ระบุพันธุ์หรือสายพันธุ์ที่วางจำหน่ายของมะละกอ (เช่น โซโล, มาราดอล)
    paper_and_magnetic_doll_format:
      name: รูปแบบตุ๊กตา กระดาษ และแม่เหล็ก
      description: ระบุว่าสินค้าเป็นชุดตุ๊กตา Paper แบบดั้งเดิม ชุดตุ๊กตาแม่เหล็ก
        หรือรูปแบบผสมผสาน
    paper_color_family:
      name: กลุ่มสีของกระดาษ
      description: ระบุว่าแพ็คนั้นเป็นสีเดียว คละสี หรือผสมสีพิเศษ (มีประโยชน์เมื่อสีเป็นแบบต่อชิ้น
        แต่แพ็คเป็นแบบผสมสี)
    paper_magnetic_doll_set_contents:
      name: ตุ๊กตาทำจากกระดาษและแม่เหล็กที่รวมอยู่ในชุด
      description: ระบุว่าชุดนี้มีส่วนประกอบหลักอะไรบ้าง
    paper_opacity:
      name: ความทึบแสงของกระดาษ
      description: ระบุระดับความโปร่งใสของกระดาษ ตั้งแต่โปร่งใสมากไปจนถึงทึบแสง (มีประโยชน์สำหรับการลอกลาย)
    paraglider_certification_rating:
      name: ระดับการรับรองร่มร่อน
      description: ระบุระดับความเหมาะสมในการบินอย่างเป็นทางการที่กำหนดให้กับปีกร่มร่อน
        (เช่น ระดับ EN หรือ LTF)
    parasite_types_controlled:
      name: ชนิดของปรสิตที่ถูกควบคุม
      description: ระบุรายชื่อปรสิตภายในที่ผลิตภัณฑ์มีประสิทธิภาพในการกำจัด เพื่อให้ผู้ซื้อสามารถปรับโปรแกรมการถ่ายพยาธิให้เหมาะสมกับการระบาดเฉพาะจุดได้
    parking_camera_mounting_location:
      name: ติดกล้องจอดรถ
      description: ตำแหน่งที่ต้องการติดตั้งกล้องบนตัวรถ (เช่น บริเวณป้ายทะเบียน, ติดตั้งแบบติดลอยด้านหลัง,
        ติดตั้งแบบฝังเรียบ)
    parking_camera_night_vision_technology:
      name: เทคโนโลยีกล้องจอดรถกลางคืน
      description: วิธีการช่วยถ่ายภาพในที่แสงน้อยที่กล้องใช้
    parking_camera_orientation:
      name: การวางแนวกล้องจอดรถ
      description: ไม่ว่ากล้องจะออกแบบมาสำหรับการมองด้านหลัง (ถอยหลัง) การมองด้านหน้า
        หรือการใช้งานแบบเลือกได้/สะท้อนภาพก็ตาม
    parking_sensor_finish:
      name: เซ็นเซอร์จอดรถเสร็จสิ้น
      description: ระบุลักษณะพื้นผิวของหน้า/ฝาครอบเซ็นเซอร์จอดรถ (เช่น สามารถทาสี/ลงสีรองพื้นได้,
        ผิวด้าน, ผิวมันเงา) เพื่อช่วยให้เข้ากับรูปลักษณ์ของกันชน
    parking_sensor_type:
      name: ประเภทเซ็นเซอร์จอดรถ
      description: ระบุเทคโนโลยีการตรวจจับที่ใช้โดยเซ็นเซอร์จอดรถ (เช่น อัลตราโซนิก
        แม่เหล็กไฟฟ้า เรดาร์ ออปติคอล)
    parsley_root_variety:
      name: พันธุ์รากผักชีฝรั่ง
      description: ระบุพันธุ์หรือสายพันธุ์ของรากผักชีฝรั่งเมื่อผู้จำหน่ายระบุไว้
    parsnip_variety:
      name: พันธุ์พาร์สนิป
      description: ระบุพันธุ์หรือสายพันธุ์เฉพาะของพาร์สนิป เช่น ฮอลโลว์คราวน์ หรือ
        ไวท์เจม ทำให้ผู้ซื้อสามารถเลือกได้ตามรสชาติ ความหวาน หรือขนาดที่แตกต่างกัน
    part_condition:
      name: ส่วนสินค้าอีกครั้ง
      description: ระบุว่าชิ้นส่วนนั้นเป็นของใหม่ ของใช้แล้ว หรือได้รับการซ่อมแซมใหม่
        เป็นต้น
    part_placement:
      name: ส่วนตำแหน่งวาง
      description: ระบุตำแหน่งที่ติดตั้งชิ้นส่วนนั้นบนเครื่องออกกำลังกาย (เช่น เครื่องปีนบันไดหรือเครื่องสเต็ปเปอร์)
        เช่น ด้านซ้าย ด้านขวา ด้านหน้า หรือด้านหลัง
    partial_capo_covered_strings:
      name: คาโป้บางส่วนครอบคลุมอยู่
      description: ระบุช่วงสายที่คาโป้แบบบางส่วนครอบคลุม โดยใช้หมายเลขสายกีตาร์ 6
        สายมาตรฐาน (1 = สาย E สูง, 6 = สาย E ต่ำ)
    parting_style:
      name: สไตล์การจากลา
      description: ระบุว่าวิกผมนั้นถูกแบ่งผมอย่างไร (เช่น แบ่งกลาง แบ่งข้าง หรือแบ่งอิสระ)
        ซึ่งส่งผลต่อความยืดหยุ่นในการจัดแต่งทรงผม
    party_favor_type:
      name: ของชำร่วยงานปาร์ตี้
      description: ระบุประเภทของของชำร่วยงานปาร์ตี้ (เช่น สติกเกอร์, ของเล่นจิ๋ว,
        ฟองสบู่) เพื่อให้สามารถเรียกดู/กรองข้อมูลภายในหมวดของชำร่วยงานปาร์ตี้ได้
    party_game_format:
      name: รูปแบบเกมปาร์ตี้
      description: รูปแบบทางกายภาพหลักของเกมปาร์ตี้
    party_horn_mouthpiece_type:
      name: ปากเป่าแตรปาร์ตี้แบบต่างๆ
      description: ระบุโครงสร้างของอุปกรณ์ที่ใช้กับปาก ซึ่งส่งผลต่อสุขอนามัยและความสะดวกสบาย
    party_horn_style:
      name: สไตล์แตรปาร์ตี้
      description: อธิบายลักษณะโครงสร้าง/พฤติกรรมของแตรปาร์ตี้ (วิธีการขยายหรือสร้างเสียง)
    passenger_car_type:
      name: ประเภทรถยนต์โดยสาร
      description: ระบุประเภทของรถโดยสาร (ตู้โดยสาร) ที่เฉพาะเจาะจงสำหรับโมเดล (เช่น
        รถโดยสารธรรมดา รถนอน) ซึ่งใช้สำหรับการเรียกดูและการสร้างชุดโมเดล
    passion_fruit_variety:
      name: เสาวรสหลากหลายสายพันธุ์
      description: ระบุ/จำแนกพันธุ์ทางพฤกษศาสตร์หรือเชิงพาณิชย์ของเสาวรสที่จำหน่าย
        (เช่น สีม่วง สีเหลือง เสาวรสกรานาดิลลา)
    pasta_sauce_texture:
      name: เนื้อสัมผัสของซอสพาสต้า
      description: อธิบายลักษณะความข้นของซอส (เช่น เนียนละเอียด เป็นชิ้นๆ หรือข้น)
        เพื่อให้ตรงกับความชอบของผู้บริโภคในด้านสัมผัสในปาก
    pasta_sauce_variety:
      name: ซอสพาสต้าหลากหลายชนิด
      description: จัดหมวดหมู่ซอสพาสต้าตามสูตรหรือสไตล์ เพื่อให้ผู้ซื้อสามารถค้นหาซอสคลาสสิกอย่างมารินารา
        หรือซอสพิเศษอย่างวอดก้าหรือเพสโต้ได้อย่างรวดเร็ว
    pastry_crust_state:
      name: สถานะของเปลือกขนมอบ
      description: อธิบายสภาพการเตรียมหรือการอบของแป้งพาย ณ เวลาที่ซื้อ
    pastry_crust_style:
      name: รูปแบบของแป้งพาย
      description: ระบุรูปแบบขนมอบหรือประเภทแป้งที่ใช้ทำเปลือกขนมอบโดยเฉพาะ
    pastry_filling_type:
      name: ประเภทไส้ขนมอบ
      description: ระบุไส้หลักด้านในของขนมอบหรือสโคน
    patch_adhesion_method:
      name: วิธีการยึดติดแผ่นแปะ
      description: ระบุวิธีการยึดติดของแผ่นปะกับยางในหรือยางนอก (เช่น แบบมีกาวในตัว
        แบบวัลคาไนซ์ด้วยซีเมนต์ หรือแบบใช้ความร้อน)
    patch_backing_material:
      name: วัสดุรองด้านหลังอาร์มปักลาย
      description: วัสดุที่ใช้ด้านหลัง/ฐานของป้าย (เช่น สักหลาด ผ้าทวิลล์) ที่สัมผัสกับสิ่งของที่ต้องการตกแต่ง
    patch_backing_type:
      name: ประเภทวัสดุรองด้านหลังอาร์มปักลาย
      description: วัสดุรองรับที่ใช้กับแผ่นแปะ (เช่น แบบรีดร้อน/ติดด้วยความร้อน, กาวแบบลอกแล้วติด,
        ตีนตุ๊กแก, ไม่มีวัสดุรองรับ)
    patch_base_material:
      name: วัสดุที่ใช้เป็นฐานของอาร์ม
      description: วัสดุพื้นฐาน/วัสดุรองด้านหลังของแผ่นปักลาย (ไม่รวมส่วนตกแต่ง)
    patch_border_edge_finish:
      name: การตกแต่งขอบ/ขอบแบบแพทช์
      description: วิธีการตกแต่งขอบของแผ่นปะ (เช่น ขอบเย็บแบบเมอร์โรว์/โอเวอร์ล็อก
        ขอบตัดด้วยเลเซอร์) ส่งผลต่อความทนทานและรูปลักษณ์
    patch_placement_area:
      name: แพทช์สำหรับพื้นที่วาง
      description: จุดประสงค์ทั่วไปในการวางพื้นที่สำหรับแพทช์บนเครื่องแต่งกาย/อุปกรณ์เสริม
    pathogen_removal_capability:
      name: ความสามารถในการกำจัดเชื้อโรค
      description: ระบุว่าปั๊มได้รับการรับรองว่าสามารถกำจัดจุลินทรีย์ประเภทใดบ้าง
        (แบคทีเรีย โปรโตซัว ไวรัส)
    pattern_sizing_system:
      name: ระบบการกำหนดขนาดแพทเทิร์น
      description: ระบุระบบการกำหนดขนาดหรือมาตรฐานระดับภูมิภาคที่ใช้สำหรับตารางขนาดของแพทเทิร์น
        (เช่น สหรัฐอเมริกา สหราชอาณาจักร สหภาพยุโรป)
    peak_style:
      name: สไตล์พีค
      description: ระบุรูปแบบของกระบังหน้าหรือส่วนยื่นบนหมวกกันน็อค ซึ่งส่งผลต่อการปกปิด
        ความสวยงาม และกฎระเบียบต่างๆ
    pear_variety:
      name: ลูกแพร์หลากหลายสายพันธุ์
      description: ระบุสายพันธุ์หรือพันธุ์ของลูกแพร์ (เช่น บาร์ตเลตต์ บอสค์ คอนเฟอเรนซ์)
        ทำให้ผู้ซื้อสามารถเลือกได้ตามรสชาติ เนื้อสัมผัส และการนำไปใช้ในการประกอบอาหารที่ตนเองชื่นชอบ
    pearl_luster_grade:
      name: เกรดความแวววาวมุก
      description: ระดับความแวววาว/ความเงางามของพื้นผิวไข่มุก
    pearl_matching_level:
      name: ระดับการจับคู่ไข่มุก
      description: บ่งบอกถึงความเข้ากันของไข่มุกแต่ละเม็ดในล็อตหรือสร้อย (เช่น สี
        ขนาด และความแวววาว)
    pearl_shape:
      name: รูปทรงไข่มุก
      description: รูปทรงโดยรวมของไข่มุก
    pearl_surface_condition:
      name: พื้นผิวมุกเป็นเวลานานสินค้า
      description: บ่งบอกถึงพื้นผิวที่มองเห็นได้ในเวลาสินค้าของไข่มุก โดยขึ้นอยู่กับการมีอยู่และความรุนแรงของรอยตำหนิหรือจุดต่างๆ
    pearl_treatment:
      name: เพิร์ลทรีตเมนต์
      description: เปิดเผยวิธีการใดๆ ที่ใช้กับไข่มุกซึ่งส่งผลต่อสี/ลักษณะของไข่มุก
    pearl_type:
      name: ประเภทไข่มุก
      description: ระบุชนิด/แหล่งกำเนิดของไข่มุก (เช่น ไข่มุกน้ำจืด ไข่มุกอะโกย่า
        ไข่มุกตาฮิติ ไข่มุกทะเลใต้) สำหรับไข่มุกที่ไม่ได้ผูกปม
    peat_level:
      name: ระดับพีท
      description: อธิบายถึงระดับความเข้มข้นของอิทธิพลควันพีทในวิสกี้ ตั้งแต่แบบไม่มีกลิ่นพีทไปจนถึงแบบมีกลิ่นพีทเข้มข้น
    pedal_and_cleat_system_compatibility:
      name: ความเข้ากันได้ของระบบบันไดและคลีท
      description: ระบุมาตรฐานของแป้นเหยียบหรือคลีทที่แผ่นรองหรือลิ่มได้รับการออกแบบมาให้ใช้งานร่วมกับ
        เพื่อให้มั่นใจว่าการเลือกผลิตภัณฑ์ที่เหมาะสมกับแป้นเหยียบและรองเท้าของพวกเขา
    pedal_configuration:
      name: การกำหนดค่าแป้นเหยียบ
      description: ระบุว่าเก้าอี้มีแป้นเหยียบเดี่ยว แป้น Split/อิสระ หรือแบบปรับเปลี่ยนได้
    pedal_mounting_style:
      name: รูปแบบการติดตั้งแป้นเหยียบ
      description: ระบุวิธีการติดตั้งแป้นเหยียบหรือแผ่น/ปลอกแป้นเหยียบเข้ากับตัวรถ
        (วิธีการติดตั้ง/การยึดติด)
    pedal_set_components:
      name: ส่วนประกอบชุดแป้นเหยียบ
      description: ระบุว่าแป้นเหยียบใดบ้างที่รวมอยู่ในชุด
    pedal_spindle_material:
      name: วัสดุแกนแป้นเหยียบ
      description: วัสดุที่ใช้สำหรับแกน/ตัวหมุนของแป้นเหยียบ มีผลต่อความแข็งแรง น้ำหนัก
        และความต้านทานการกัดกร่อน
    pedal_spindle_thread_size:
      name: แกนเหยียบสำหรับขนาด
      description: ระบุมาตรฐานเกลียวของแกนบันไดที่ขันเข้ากับขาจาน
    pedal_type:
      name: ประเภทแป้นเหยียบ
      description: อธิบายรูปแบบของบันไดจักรยาน Supply พร้อมกับจักรยาน โดยระบุถึงความเหมาะสมกับรองเท้าและสไตล์การขี่
    pellet_accessory_type:
      name: ประเภทอุปกรณ์เสริมสำหรับเหยื่อเม็ด
      description: ระบุประเภทของอุปกรณ์เสริมเม็ดเหยื่ออย่างเฉพาะเจาะจง เพื่อให้นักตกปลาสามารถค้นหาสว่าน
        ตัวรัด หรือตัวหยุดได้ตามความต้องการในการประกอบชุดอุปกรณ์ตกปลาของตนได้อย่างรวดเร็ว
    pellet_grade:
      name: เกรดเม็ด
      description: บ่งบอกถึงความแม่นยำในการผลิตหรือระดับประสิทธิภาพของกระสุนปืนอัดลม
    pen_ink_color:
      name: สีหมึกปากกา
      description: ระบุสีหมึกจริงที่ปากกาพ่นออกมา ซึ่งอาจแตกต่างจากสีตัวปากกาภายนอก
    penalty_card_accessories_included:
      name: รวมอุปกรณ์เสริมสำหรับบัตรโทษแล้ว
      description: ระบุอุปกรณ์เสริมเพิ่มเติมที่ผู้ตัดสินใช้ซึ่งมาพร้อมกับบัตรลงโทษ
        เช่น กระเป๋าเงิน สมุดจดคะแนน ดินสอ เหรียญ นกหวีด หรือซองใส่บัตร
    penalty_card_colors_included:
      name: สีของใบลงโทษที่รวมอยู่ในชุดสินค้า
      description: แสดงรายการสีของใบโทษที่อยู่ในชุดผลิตภัณฑ์
    penalty_flag_throw_distance:
      name: ระยะการโยนธงโทษ
      description: การจำแนกประเภทการออกแบบที่ระบุระยะการขว้างธงที่ตั้งใจไว้
    pendant_cutter_safety_features:
      name: คุณสมบัติความปลอดภัยของเครื่องตัดจี้
      description: ระบุองค์ประกอบด้านความปลอดภัยแบบบูรณาการที่ช่วยลดการบาดเจ็บจากของมีคมขณะพกพา/สวมใส่
    pendant_cutter_wear_method:
      name: วิธีการสึกหรอของหัวตัดจี้
      description: ระบุวิธีการพกพาหรือสวมใส่เครื่องตัดจี้อย่างถูกต้อง
    pepper_variety:
      name: พริกหลากหลายชนิด
      description: ระบุพันธุ์หรือสายพันธุ์ของพริกที่ใช้ในผลิตภัณฑ์ ทำให้ผู้ซื้อสามารถแยกแยะรสชาติและระดับความเผ็ดที่แตกต่างกันได้
    percussion_case_style:
      name: สไตล์เคสเครื่องดนตรีประเภทเคาะ
      description: จำแนกประเภทรูปแบบ/โครงสร้างโดยรวมของเคส (กระเป๋าแบบนุ่ม เทียบกับ
        เคสแบบแข็ง/แบบยืดหยุ่น เทียบกับ แบบผสม)
    percussion_instruments_included:
      name: เครื่องดนตรีประเภทเครื่องกระทบที่รวมอยู่ในชุด
      description: ระบุประเภทของเครื่องดนตรีประเภทเคาะที่รวมอยู่ในชุดของเล่นที่มีเครื่องดนตรีหลายชนิด
    percussion_mallet_handle_grip_style:
      name: รูปแบบการพันด้ามจับของไม้ตีกระทบ
      description: ระบุประเภทของวัสดุที่ใช้ทำด้ามจับ (นอกเหนือจากพื้นผิว) เช่น ไม้เปลือย
        เคลือบแล็กเกอร์ ด้ามจับยาง หรือหุ้มด้วยวัสดุอื่น
    percussion_mallet_head_construction:
      name: โครงสร้างหัวไม้ตีกลอง
      description: อธิบายถึงรูปแบบการสร้าง/โครงสร้างของหัวค้อน (เช่น หุ้มด้วยเส้นด้าย
        หุ้มด้วยสักหลาด หุ้มด้วยยาง หรือทำจากไม้ดิบ) ซึ่ง Impact ต่อเสียงและความทนทาน
    perfumery_base_carrier_type:
      name: ฐานน้ำหอม ผู้ขนส่งประเภทขนส่ง
      description: ระบุระบบผู้ขนส่ง/ตัวทำละลายของฐานน้ำหอม (สิ่งที่ฐานทำขึ้นเพื่อการเจือจางและประสิทธิภาพเป็นหลัก)
    perfumery_base_intended_application:
      name: การทาเบสน้ำหอมที่แนะนำ
      description: ระบุรูปแบบการใช้งานขั้นสุดท้ายที่ออกแบบมาสำหรับฐานผลิตภัณฑ์ (เช่น
        สเปรย์น้ำหอม หรือ โรลออน)
    perfumery_ingredient_carrier_solvent:
      name: ส่วนผสมน้ำหอม ผู้ขนส่ง/ตัวทำละลาย
      description: ระบุตัวพา/ตัวทำละลายที่ใช้ในการจัดส่งส่วนผสม หากมีการเจือจาง (เช่น
        เอทานอล, DPG, น้ำมันโจโจ้บา)
    perfumery_ingredient_form:
      name: รูปแบบของส่วนผสมน้ำหอม
      description: ระบุตัวพา/ตัวทำละลายที่ใช้ในการจัดส่งส่วนผสม หากมีการเจือจาง (เช่น
        เอทานอล, DPG, น้ำมันโจโจ้บา)
    perfumery_ingredient_type:
      name: ประเภทส่วนผสมน้ำหอม
      description: จำแนกส่วนผสมน้ำหอมตามการใช้งานจริงในอุตสาหกรรมน้ำหอม (เช่น น้ำมันหอมระเหย
        สารเคมีให้กลิ่นหอม)
    perfumery_ingredient_usage_note:
      name: หมายเหตุเกี่ยวกับการใช้ส่วนผสมในน้ำหอม
      description: ระบุบทบาททั่วไปในโครงสร้างของน้ำหอม (กลิ่นบน กลิ่นกลาง/กลิ่นหลัก
        กลิ่นฐาน) โดยยอมรับว่าส่วนผสมต่างๆ สามารถครอบคลุมกลิ่นที่หลากหลายได้
    perfumery_ingredients:
      name: ส่วนผสมของน้ำหอม
      description: ระบุประเภทของวัตถุดิบน้ำหอมที่ใช้ในชุดอุปกรณ์ (เช่น น้ำมันหอมระเหย
        น้ำมันหอม แอลกอฮอล์พื้นฐาน)
    perfumery_note_position:
      name: ตำแหน่งของโน้ตน้ำหอม
      description: ระบุบทบาททั่วไปของส่วนผสมนั้นในโครงสร้างของน้ำหอม (กลิ่นแรก/กลิ่นกลาง/กลิ่นฐาน)
    persimmon_variety:
      name: พันธุ์ลูกพลับ
      description: ระบุสายพันธุ์หรือพันธุ์ของลูกพลับ เนื่องจากสายพันธุ์ต่างๆ เช่น
        ฟูยุ หรือ ฮาจิยะ มีความแตกต่างกันในด้านเนื้อสัมผัส รสชาติ ความฝาด และการนำไปใช้ในการประกอบอาหาร
    personalization_type:
      name: จะให้เหมาะกับแต่ละบุคคลประเภท
      description: ระบุว่าจะปรับแต่งสินค้าสำหรับ Event ได้หรือไม่และอย่างไร (เช่น
        ชื่อย่อ ชื่อ/วันที่ การแทรกรูปภาพ)
    phonics_focus:
      name: การเน้นการออกเสียง
      description: ระบุว่าของเล่นฝึกอ่านนี้มุ่งเน้นทักษะการออกเสียงและการอ่านคำด้านใดบ้าง
    physalis_variety:
      name: พันธุ์ฟิซาลิส
      description: ระบุชนิดทางพฤกษศาสตร์ พันธุ์ปลูก หรือพันธุ์ทั่วไปของต้นฟิซาลิสที่กำลังจำหน่ายอย่างเฉพาะเจาะจง
    pi_ata_filler_type_included:
      name: มีไส้ปิญาตาแบบต่างๆ รวมอยู่ด้วย
      description: หากมีวัสดุอุดช่องว่าง ให้ระบุประเภทของวัสดุที่อุดช่องว่างนั้นด้วย
    pi_ata_hanging_method:
      name: วิธีการแขวนปิญาตา
      description: วิธีการออกแบบสำหรับการแขวนหรือตั้งปิญาตา (เช่น ห่วง ตะขอ เชือก
        เป็นต้น)
    pi_ata_opening_type:
      name: ประเภทการเปิดปิญาตา
      description: วิธีการเปิด/ปิดช่องเติม (แบบพับ, ตีนตุ๊กแก, ซิป, แบบปิดผนึกสำเร็จรูป
        ฯลฯ)
    piccolo_key_system:
      name: ระบบแป้นพิคโคโล
      description: ระบุระบบ/การออกแบบกลไกคีย์ที่ใช้ในปิคโคโล (โดยทั่วไปคือระบบโบห์มสำหรับปิคโคโลสมัยใหม่)
    piccolo_keywork_features:
      name: คุณสมบัติของกลไกคีย์ Piccolo
      description: ระบุกลไกการกดแป้นที่สำคัญและตัวเลือกต่างๆ บนพิคโคโล
    pick_grip_aid:
      name: อุปกรณ์ช่วยจับยึด
      description: ระบุถึงอุปกรณ์ช่วยจับยึดหลักที่ติดตั้งมากับปิ๊ก นอกเหนือจากความรู้สึก/พื้นผิวโดยทั่วไป
        (เช่น รูจับ โลโก้นูน แผ่นยางเสริม)
    pickleball_construction_type:
      name: ประเภทการผลิตลูกบอลพิคเคิลบอล
      description: กระบวนการผลิตลูกกอล์ฟ เช่น แบบชิ้นเดียวไร้รอยต่อ หรือแบบสองชิ้นเชื่อมต่อกัน
        Impact ความทนทานและความสม่ำเสมอในการบิน
    pickling_method:
      name: วิธีการดอง
      description: ระบุตัวกลางหรือเทคนิคการถนอมอาหารที่ใช้ในการดอง เช่น น้ำดองน้ำส้มสายชู
        หรือการหมักด้วยแบคทีเรียแลคโตบาซิลลัส
    pickup_and_preamp_configuration:
      name: การรับและการกำหนดค่าปรีแอมป์
      description: ระบุว่า Viola มีการรับเรื่องการรับและ/หรือปรีแอมป์ที่ใช้งานอยู่เพื่อขยายประสิทธิภาพหรือการบันทึกหรือไม่
    pickup_configuration:
      name: การกำหนดค่าการรับ
      description: อธิบายการรับไลเอาต์โดยรวมของกีตาร์ไฟฟ้าโดยใช้ตัวย่อทั่วไป (เช่น
        SSS, HSS, HH)
    pickup_cover_material:
      name: วัสดุที่ใช้ทำฝาครอบปิ๊กอัพ
      description: ระบุวัสดุหลักของฝาครอบปิ๊กอัพ (ถ้ามี) รวมถึงการเคลือบผิวแบบทั่วไปเมื่อผู้ผลิตระบุไว้เช่นนั้น
    pickup_cover_type:
      name: ประเภทฝาครอบรถกระบะ
      description: ระบุว่าปิ๊กอัพกีตาร์ไฟฟ้ามีฝาครอบหรือไม่ และวัสดุ/รูปแบบของฝาครอบ
        (เช่น โลหะ หรือ พลาสติก)
    pickup_string_spacing:
      name: การรับการเว้นระยะห่าง
      description: ระยะห่างระหว่างแกนแม่เหล็ก/สายที่เป็นมาตรฐานที่ใช้ในการผลิตปิ๊กอัพ
        (เช่น Fender/F-spaced เทียบกับ Gibson/standard) มีผลต่อการจัดตำแหน่งบนกีตาร์ที่มีระบบเทรโมโล
    pie_crust_type:
      name: ประเภทของเปลือกพาย
      description: ระบุรูปแบบหรือประเภทของแป้งที่ใช้สำหรับพายหรือทาร์ต เช่น แป้งพายกรอบ
        แป้งแครกเกอร์ หรือแป้งปราศจากกลูเตน
    piece_configuration:
      name: การจัดเรียงชิ้นส่วน
      description: ระบุจำนวนชิ้นส่วนแยกกันที่ประกอบเป็นไม้คิว ด้าม หรือสะพานไม้คิว
        ซึ่งส่งผลต่อความสะดวกในการพกพาและรูปแบบการเล่น
    pillow_form_size:
      name: ขนาดของหมอน
      description: การกำหนดขนาดสำเร็จรูปมาตรฐานสำหรับไส้หมอน (เช่น 18" x 18")
    pilot_helmet_communications_integration:
      name: การบูรณาการระบบสื่อสารในหมวกนักบิน
      description: ระบุว่าหมวกกันน็อคมีส่วนประกอบสำหรับการสื่อสารทางการบินหรือไม่
        หรือได้รับการกำหนดค่าไว้ล่วงหน้าสำหรับส่วนประกอบเหล่านั้นหรือไม่
    pilot_helmet_visor_configuration:
      name: การกำหนดค่ากระบังหน้าหมวกนักบิน
      description: ระบุรูปแบบกระบังหน้า/แผ่นบังตาที่มาพร้อมกับหมวกนักบิน
    pin_attachment_type:
      name: ประเภทการติดเข็มกลัด
      description: ระบุกลไกยึด/ตัวล็อกด้านหลังของเข็มกลัดที่ใช้สำหรับติดเข็มกลัดกับเสื้อผ้าหรือพื้นผิว
        (เช่น ตัวล็อกแบบผีเสื้อ, ตัวล็อกแม่เหล็ก)
    pin_backing_type:
      name: ประเภทตัวยึดเข็มกลัด
      description: ระบุกลไกการยึด/รองรับที่ใช้ในการยึดเข็มกลัดเข้ากับเสื้อผ้าหรือเครื่องประดับ
    pin_cushion_attachment_style:
      name: พินแล้วแบบติดเบาะ
      description: วิธีการสวมใส่ ติดตั้ง หรือจัดวางเบาะรองนั่งขณะใช้งาน
    pin_cushion_features:
      name: คุณสมบัติของเบาะรองนั่งพินแล้ว
      description: คุณสมบัติการใช้งานที่นอกเหนือไปจากการยึดหมุดขั้นพื้นฐาน
    pin_face_customization_method:
      name: พินแล้วเผชิญกับวิธี
      description: ระบุวิธีการผลิตลวดลายด้านหน้า (เช่น เคลือบแข็ง เคลือบอ่อน การพิมพ์)
    pin_type:
      name: ประเภทพิน
      description: ระบุรูปแบบหรือรูปแบบพินแล้วสินค้าที่ใช้สำหรับสะสมแฟนกีฬา
    ping_pong_certification:
      name: ใบรับรองปิงปอง
      description: ระบุมาตรฐานอย่างเป็นทางการหรือระดับการอนุมัติจากหน่วยงานกำกับดูแลของผลิตภัณฑ์
    ping_pong_competition_certification:
      name: ใบรับรองการแข่งขันปิงปอง
      description: ระบุสถานะการรับรองอย่างเป็นทางการของลูกปิงปองสำหรับการแข่งขันที่ได้รับอนุญาต
        (เช่น ได้รับการอนุมัติจาก ITTF)
    ping_pong_paddle_handle_style:
      name: ไม้ Ping ปิงปอง สไตล์แฮนโซล
      description: กำหนดรูปทรง/สไตล์ของด้ามไม้พาย ซึ่งมีผลต่อความสบายในการจับและเทคนิคการเล่น
    ping_pong_robot_accessory_type:
      name: ประเภทอุปกรณ์เสริมหุ่นยนต์ปิงปอง
      description: ระบุประเภทย่อยการใช้งานของอุปกรณ์เสริม เพื่อให้การช้อปปิ้งสามารถจำกัดผลลัพธ์ได้อย่างรวดเร็ว
        (เช่น มุ้งเทียบกับอะแดปเตอร์แปลงไฟ)
    ping_pong_rubber_surface_type:
      name: พื้นผิวยางไม้ปิงปอง
      description: ระบุรูปแบบ/พื้นผิวของยางที่ใช้ทำไม้ปิงปอง ซึ่งส่งผลต่อลักษณะการหมุนและความเร็วของลูก
    ping_pong_rubber_type:
      name: ประเภทยางปิงปอง
      description: ระบุรูปแบบโครงสร้างพื้นผิวของแผ่นยางปิงปอง ซึ่งส่งผลต่อคุณลักษณะในการเล่น
    ping_pong_table_type:
      name: ประเภทโต๊ะปิงปอง
      description: แยกประเภทสไตล์หรือรูปแบบของตารางโดยรวมเพื่อให้เปรียบเทียบได้ง่ายขึ้น
        (เช่น การแข่งขัน คอนแทคเลนส์ Shop Mini)
    pipe_instrument_voicing_sound_production_method:
      name: วิธีการปรับเสียง/สร้างเสียงของเครื่องดนตรีประเภทเป่า
      description: ระบุวิธีการที่เครื่องดนตรีสร้างเสียง (กลไกการไหลของอากาศ) ซึ่งช่วยในการแยกแยะประเภทของขลุ่ยแพน
        ขลุ่ยลิ้น และเครื่องดนตรีประเภทท่อออร์แกนในตัวกรอง
    piston_application_type:
      name: ประเภทการใช้งานลูกสูบ
      description: วัตถุประสงค์การใช้งาน/เป้าหมายของลูกสูบ (สำหรับเปลี่ยนทดแทน เทียบกับ
        สำหรับเพิ่มประสิทธิภาพ/การแข่งขัน เทียบกับ สำหรับงานหนัก)
    piston_crown_dish_style:
      name: ลูกสูบแบบหัวกลม/ทรงจาน
      description: รูปทรงของหัวลูกสูบที่ส่งผลต่อปริมาตรและความหนืดของห้องเผาไหม้ (เช่น
        หัวแบน หัวโดม หัวเว้า)
    piston_pin_retention_type:
      name: ประเภทการยึดสลักลูกสูบ
      description: ระบุวิธีการยึดสลักข้อมือ (สลักลูกสูบ) ในชุดลูกสูบ/ก้านสูบ
    pit_configuration:
      name: รูปแบบเบาะรองรับ
      description: กำหนดรูปแบบโครงสร้างของพื้นที่ลงจอด (ชิ้นเดียวหรือหลายโมดูล) และโดยนัยเดียวกัน
        จำนวนส่วนหรือโมดูลที่จัดส่ง
    pit_cover_type:
      name: ประเภทผ้าคลุมเบาะรองรับ
      description: ระบุพื้นผิวหรือแผ่นป้องกัน Supply กับหลุม ส่งผลต่อความต้านทานของเหล็กแหลม
        การป้องกันสภาพอากาศ และลักษณะของนักกีฬา
    pitahaya_flesh_color:
      name: สีเนื้อแก้วมังกร
      description: ระบุสีเนื้อด้านในของแก้วมังกร (เช่น สีขาว สีแดง สีม่วงแดง) ซึ่งเป็นลักษณะสำคัญที่ส่งผลต่อรสชาติ
        รูปลักษณ์ และคุณค่าทางโภชนาการที่รับรู้ได้
    pitch_mat_coverage_length:
      name: ความยาวการครอบคลุมของเสื่อปูพื้นสนาม
      description: จำแนกประเภทแผ่นรองสนามคริกเก็ตตามส่วนของสนามที่ครอบคลุม (เช่น สนามเต็มหรือสนามครึ่ง)
    pitch_range:
      name: ช่วงระดับเสียง
      description: อธิบายช่วงระดับเสียง/ความสว่างของเสียงเขย่าที่รับรู้ได้
    pitch_standard:
      name: มาตรฐานสนาม
      description: ระบุมาตรฐานระดับเสียง (การปรับจูนอ้างอิง) ที่เครื่องบันทึกเสียงถูกสร้างขึ้น
        (เช่น A=440, A=442, A=415)
    pitching_rubber_size_designation:
      name: การกำหนดขนาดของยางขว้าง
      description: ระบุขนาดสนามมาตรฐานสำหรับการจำแนกประเภทยางขว้าง ทำให้การเลือกง่ายขึ้นโดยไม่จำเป็นต้องทราบขนาดที่แน่นอน
    pitching_screen_style:
      name: สไตล์หน้าจอการนำเสนอ
      description: กำหนดโครงสร้างของหน้าจอเพื่อให้ผู้ซื้อสามารถเลือกรูปแบบการป้องกันที่เหมาะสมสำหรับสถานการณ์การฝึกอบรมของตนได้อย่างรวดเร็ว
    pitching_target_design:
      name: การออกแบบเป้าหมายการขว้าง
      description: จำแนกประเภทรูปแบบโดยรวมหรือโครงสร้างของเป้าหมายการขว้างลูก
    pitching_wheel_count:
      name: จำนวนวงล้อหมุน
      description: ระบุจำนวนล้อขับเคลื่อนที่เครื่องขว้างลูกเบสบอลใช้
    pivot_adjustability:
      name: ความสามารถในการปรับแกนหมุน
      description: ระบุว่ากรรไกรมีสกรูปรับความตึงในการตัดหรือไม่
    pivot_piece_type:
      name: ประเภทชิ้นส่วนหมุน
      description: แยกแยะความแตกต่างระหว่างรูปทรงของข้อต่อหมุนแบบต่างๆ ที่มีให้เลือก
        เช่น แบบถ้วยหรือแบบท่อแบบดั้งเดิม
    place_card_holder_closure_mechanism:
      name: วางกลไกการปิดที่ยึดด้ามจับ
      description: ระบุวิธีการที่ตัวยึดจับหรือยึดบัตรไว้
    place_card_orientation:
      name: วางแนวปฐมนิเทศ
      description: ระบุทิศทางของการ์ดระบุที่นั่งเมื่อใช้งาน/แสดงผล
    place_card_printing_status:
      name: วางสถานะการพิมพ์เฉพาะ
      description: ระบุว่าป้ายชื่อที่นั่งนั้นเป็นแบบว่างเปล่าสำหรับเขียนด้วยลายมือ/พิมพ์
        หรือพิมพ์ชื่อไว้ล่วงหน้า (ชื่อไม่ได้ปรับแต่ง) หรือพิมพ์ชื่อตามสั่ง/ปรับแต่งแล้ว
    placket_type:
      name: แบบกระดุม
      description: ระบุรูปแบบของช่องเปิดด้านหน้าของเสื้อโปโล รวมถึงจำนวนกระดุมหรือวิธีการปิดแบบอื่น
        ๆ
    planetarium_content_theme:
      name: ธีมเนื้อหาของท้องฟ้าจำลอง
      description: เนื้อหาหลักที่แสดงโดยเครื่องฉายภาพท้องฟ้าจำลอง
    planetarium_projection_content_format:
      name: รูปแบบเนื้อหาการฉายภาพท้องฟ้าจำลอง
      description: ระบุกลไกการฉายภาพที่ท้องฟ้าจำลองใช้ (แผ่นดิสก์/สไลด์จริง เทียบกับ
        เอฟเฟกต์ดิจิทัล/LED)
    plant_fiber_type:
      name: เส้นใยพืชชนิด
      description: ระบุประเภทเส้นใยจากพืชโดยเฉพาะ เมื่อแหล่งที่มาของเส้นใยหลักคือพืช
    plaster_gauze_finish:
      name: ฉาบปูน
      description: ส่งผลให้เกิดแนวโน้มการตกแต่งพื้นผิวหลังจากการทาและการเกลี่ยให้เรียบ
    plaster_gauze_grade:
      name: เกรดผ้าก๊อซปูนปลาสเตอร์
      description: ระดับการใช้งานที่ต้องการของผ้าก๊อซสำหรับฉาบปูน (เช่น งานฝีมือ/นักเรียน
        เทียบกับ มืออาชีพ)
    plaster_gauze_weave_density:
      name: ความหนาแน่นของการทอผ้ากอซปูนปลาสเตอร์
      description: ความโปร่ง/ความแน่นของเส้นใยผ้ากอซ มีผลต่อความแข็งแรงและการยึดเกาะของปูนปลาสเตอร์
    plastic_canvas_finish:
      name: พื้นผิวผ้าใบพลาสติก
      description: พื้นผิว/การตกแต่ง ทรีตเมนต์ของม้วนผ้าใบพลาสติก
    plastic_canvas_sheet_finish:
      name: แผ่นผ้าใบพลาสติกสำเร็จรูป
      description: การตกแต่งพื้นผิว/ขอบของแผ่นผ้าใบพลาสติก
    plastic_canvas_transparency:
      name: แผ่นพลาสติกใสสำหรับผ้าใบ
      description: แผ่นพลาสติกที่ใช้เป็นผืนผ้าใบนั้นมีความโปร่งใส/ทึบแสงมากน้อยแค่ไหน
    plate_bottom_design:
      name: การออกแบบฐานจาน
      description: อธิบายถึงโครงสร้างด้านล่างของแผ่น ซึ่งส่งผลต่อการยึดเกาะ ความมั่นคง
        และความปลอดภัยบนพื้นผิวการเล่นที่แตกต่างกัน
    plate_compatibility_standard:
      name: มาตรฐานความเข้ากันได้ของแผ่น
      description: ระบุขนาดมาตรฐานของแผ่นน้ำหนักที่ออกแบบมาสำหรับบาร์นั้น (เช่น โอลิมปิก
        50 มม., มาตรฐาน 25 มม.)
    plate_installation_type:
      name: ประเภทการติดตั้งแผ่น
      description: ระบุวิธีการยึดหรือวางแผ่นฐานในสนาม (เช่น ฝังพื้น, ตอกหมุด, โยนลงพื้น)
        ทำให้ผู้ซื้อสามารถเลือกระหว่างตัวเลือกแบบถาวรและแบบพกพาได้
    plate_size_category:
      name: หมวดหมู่ขนาดจาน
      description: จำแนกแผ่นเพลทตามระดับการเล่นหรือมาตรฐานข้อบังคับ เพื่อให้ผู้ซื้อสามารถค้นหาอุปกรณ์ที่ตรงตามข้อกำหนดของลีกได้อย่างรวดเร็ว
    play_dough_putty_kit_contents:
      name: เล่นแป้ง & ฉาบ ติดตามเนื้อหา
      description: ระบุส่วนประกอบหลักที่รวมอยู่ นอกเหนือจากตัวสารประกอบเอง (เช่น เครื่องมือ
        แม่พิมพ์ เครื่องอัดรีด อุปกรณ์จัดเก็บ)
    play_dough_tool_set_items_included:
      name: ชุดเครื่องมือเล่นแป้งโดว์ รายการรวมอยู่ด้วย
      description: ระบุประเภทของเครื่องมือและอุปกรณ์เสริมที่รวมอยู่ในชุดเครื่องมือสำหรับปั้นดินน้ำมัน
        (เช่น ลูกกลิ้ง ที่ตัด แม่พิมพ์)
    play_environment_suitability:
      name: ความเหมาะสมของสภาพแวดล้อมในการเล่น
      description: ระบุสภาพแวดล้อมการเล่นที่ต้องการสำหรับชุดของเล่น (เช่น ในร่ม กลางแจ้ง
        หรือในน้ำ)
    play_food_features:
      name: ของเล่นอาหาร
      description: คุณสมบัติพิเศษด้านการใช้งานหรือความสมจริงของของเล่นอาหาร
    play_food_items_included:
      name: รวมรายการอาหารเล่น
      description: ระบุประเภทของอาหารจำลองที่รวมอยู่ในชุดของเล่นครัว
    play_food_size_scale:
      name: เล่นอาหารขนาดขยายสเกล
      description: ระบุขนาดขยายสเกลโดยประมาณของชิ้นส่วนอาหารปลอมที่เข้ากันได้กับครัวของเล่น
        ตุ๊กตา และชุดของเล่น
    play_money_set_components_included:
      name: ส่วนประกอบของชุดเงินเล่นที่รวมอยู่ในชุด
      description: ระบุประเภทส่วนประกอบที่รวมอยู่ในชุดเงินเล่น/ระบบธนาคาร
    play_pattern:
      name: รูปแบบการเล่น
      description: วิธีการใช้งานหลักของของเล่น (เช่น ของเล่นคลายเครียด/คลายความกังวล,
        ประติมากรรม/งานศิลปะบนโต๊ะ, การก่อสร้าง/การประกอบ หรือปริศนา)
    play_sprinkler_mounting_type:
      name: ประเภทการติดตั้งสปริงเกลอร์สำหรับเล่น
      description: วิธีการจัดวาง/ยึดหัวฉีดน้ำสำหรับเด็กเล่นขณะใช้งาน
    play_vehicle_lights_and_sounds:
      name: เล่นไฟและเสียงของยานพาหนะ
      description: ระบุว่ารถของเล่นนั้นมีเอฟเฟกต์การเล่นแบบอิเล็กทรอนิกส์ เช่น แสงและ/หรือเสียงหรือไม่
    play_vehicle_scale:
      name: เล่นรถขยายสเกล
      description: ระบุอัตราส่วนสเกลของยานพาหนะของเล่น (โดยทั่วไปใช้สำหรับยานพาหนะของเล่นที่ทำจากโลหะหล่อและแบบจำลอง)
    player_size_category:
      name: หมวดหมู่ขนาดผู้เล่น
      description: ระบุขนาด/ช่วงอายุของผู้เล่นที่ชุดอุปกรณ์สำหรับผู้รับลูกนั้นเหมาะสม
        (เช่น ทีบอล, เยาวชน, ​​ระดับกลาง, ผู้ใหญ่)
    player_size_range:
      name: ช่วงขนาดผู้เล่น
      description: ระบุช่วงขนาดของผู้ใช้ที่ต้องการสำหรับสายรัด/ความช่วยเหลือ (เช่น
        เด็ก ผู้ใหญ่ สากล)
    playing_environment:
      name: สภาพแวดล้อมการเล่น
      description: ระบุพื้นผิวการเล่นหลักหรือบริบทที่ลูกฮอกกี้ได้รับการออกแบบมาเพื่อใช้เล่น
    playing_method:
      name: วิธีการเล่น
      description: วิธีหลักในการเล่น/ใช้งานเครื่องดนตรีชนิดนี้
    playing_surface_material:
      name: วัสดุที่ใช้ทำพื้นผิวสำหรับเล่น
      description: ระบุวัสดุของพื้นผิวด้านหน้า (ทาปา) ของคาฮอน ซึ่งมีผลอย่างมากต่อโทนเสียงและสัมผัส
    playing_surface_type:
      name: ประเภทพื้นสนาม
      description: อธิบายลักษณะโครงสร้าง/สัมผัสของพื้นผิวสำหรับฝึกซ้อม
    playset_activities_included:
      name: กิจกรรมในชุดของเล่นประกอบด้วย
      description: ระบุถึงกิจกรรมหลัก/ส่วนประกอบต่างๆ ที่ติดตั้งอยู่ในชุดชิงช้า/ชุดสนามเด็กเล่น
        เพื่อช่วยให้ผู้ซื้อสามารถคัดกรองสินค้าตามสิ่งที่เด็กๆ สามารถทำได้บนโครงสร้างนั้น
    playset_installation_type:
      name: ประเภทการติดตั้งชุดสนามเด็กเล่น
      description: ระบุวิธีการติดตั้งหรือยึดชุดชิงช้า/ชุดสนามเด็กเล่น
    playset_items_included:
      name: รายการสิ่งของที่อยู่ในชุดของเล่น
      description: ระบุประเภทของสิ่งของสำหรับการเล่นสมมติที่รวมอยู่ในชุดของเล่นปิกนิก
        (อาหาร เครื่องใช้บนโต๊ะอาหาร ผ้าห่ม ตะกร้า ฯลฯ)
    pliers_jaw_style:
      name: คีมแบบปากคีบ
      description: อธิบายลักษณะการออกแบบขากรรไกรหลักหรือรูปแบบการใช้งานของคีม
    plum_variety:
      name: พลัมพันธุ์ต่างๆ
      description: ระบุประเภทของสิ่งของสำหรับการเล่นสมมติที่รวมอยู่ในชุดของเล่นปิกนิก
        (อาหาร เครื่องใช้บนโต๊ะอาหาร ผ้าห่ม ตะกร้า ฯลฯ)
    plumcot_variety:
      name: พันธุ์พลัมคอต
      description: ระบุพันธุ์เฉพาะหรือสายพันธุ์ทางการค้าของพลัมคอต (เช่น Flavor King,
        Dapple Dandy) ซึ่งอาจส่งผลต่อรสชาติ สี และฤดูกาล
    plunger_mute_handle_type:
      name: ด้ามจับแบบปิดเสียงชนิดลูกสูบ
      description: ระบุรูปแบบการจับหรือสไตล์การจับที่ใช้ในการจับและควบคุมตัวลดเสียงแบบลูกสูบสำหรับเอฟเฟกต์เสียง
        "วา-วา"
    pocket_closure_type:
      name: ประเภทการปิดกระเป๋า
      description: อธิบายวิธีการล็อกกระเป๋าแต่ละช่อง ช่วยให้ผู้ใช้ค้นหากางเกงที่มีช่องเก็บของปลอดภัยขณะทำกิจกรรม
    pocket_knife_opening_mechanism:
      name: กลไกการเปิดมีดพับ
      description: วิธีการเปิดใบมีด (แบบใช้เล็บเปิด, แบบใช้หัวแม่มือเปิด, แบบเปิดด้วยคันโยก,
        แบบช่วยเปิด, แบบอัตโนมัติ ฯลฯ)
    pocket_style:
      name: สไตล์พกพา
      description: ระบุลักษณะการออกแบบกระเป๋าหลักบนกางเกง
    pocket_type:
      name: แบบพกพา
      description: ระบุรูปแบบหรือการมีอยู่ของกระเป๋าบนเสื้อผ้า
    pod_retention_system:
      name: ระบบพ็อดภักดีของลูกค้า
      description: อธิบายวิธีการยึดและปล่อยพ็อดเพนท์บอลออกจากสายรัดหรือ สายรัด
    pogo_stick_footrest_type:
      name: ที่วางเท้าแบบไม้กระโดด
      description: อธิบายถึงการออกแบบแท่นวางเท้า/หมุดที่ใช้สำหรับยืนบนไม้กระโดด (pogo
        stick)
    pogo_stick_suspension_type:
      name: ระบบกันสะเทือนแบบไม้กระโดด
      description: ระบุกลไกการดีดกลับของไม้กระโดด ความรู้สึกเมื่อกระทบพื้น ความทนทาน
        และการบำรุงรักษา
    poi_handle_type:
      name: ประเภทด้ามจับลูกโปย
      description: ระบุรูปแบบของด้ามจับ/ที่จับ/อุปกรณ์ยึดที่ใช้สำหรับถือลูกโปย
    poi_light_source:
      name: แหล่งกำเนิดแสงปอย
      description: สำหรับไฟประดับแบบปอย ให้ระบุเทคโนโลยีการให้แสงสว่าง
    poi_tether_type:
      name: ประเภทสายยึด Poi
      description: ระบุประเภทของเชือกที่เชื่อมต่อหัวของลูกไฟกับด้ามจับ ปุ่ม หรือห่วงข้อมือ
        (เช่น เชือก ด้าย โซ่)
    poi_type:
      name: ประเภท POI
      description: ระบุประเภทการสร้าง/การใช้งานหลักของลูกไฟ (เช่น สำหรับฝึกฝน, LED,
        ไฟ)
    point_type:
      name: ประเภทจุด
      description: Shapes/ลักษณะของปลายเข็มปัก
    pointe_shoe_shank_length:
      name: ความยาวของแกนรองเท้าบัลเล่ต์
      description: ส่วนของความยาวรองเท้าที่ก้านช่วยเหลือ เช่น ความยาวเต็มหรือ 3/4
    pointe_shoe_shank_strength:
      name: ความแข็งแรงของแกนรองเท้าบัลเล่ต์
      description: ระดับความแข็งของแกนรองเท้าบัลเล่ต์ มีผลต่อการรองรับและระยะเวลาในการปรับให้เข้ากับรูปเท้า
    poker_accessory_storage_included:
      name: มีช่องเก็บอุปกรณ์เสริมสำหรับเล่นโป๊กเกอร์
      description: ระบุว่าอุปกรณ์เสริมชิ้นนี้มีพื้นที่จัดเก็บเฉพาะสำหรับอุปกรณ์โป๊กเกอร์เพิ่มเติมใดบ้าง
    poker_chip_tray_rack_configuration:
      name: การจัดวางถาด/ชั้นวางชิปโป๊กเกอร์
      description: อธิบายรูปแบบการจัดระเบียบภายในของถาด/ชั้นวางชิป (จำนวนแถวและความจุต่อแถว)
    pole_anchoring_method:
      name: วิธีการยึดเสา
      description: ระบุวิธีการยึดเสาเข้ากับพื้นหรือพื้นผิวสนาม
    pole_basket_type:
      name: ประเภทแป้นปลายไม้สกี
      description: จำแนกประเภทหรือขนาดของตะกร้าที่ติดตั้งไว้ใกล้ปลายไม้สกี ซึ่งบ่งบอกถึงสภาพหิมะที่ต้องการใช้งาน
    pole_connection_system:
      name: ระบบขั้วโลก
      description: ระบุกลไกที่เชื่อมต่อส่วนเสาเข้าด้วยกัน เช่น ระบบเชือกยางยืด ระบบเกลียว
        หรือระบบดุม ช่วยให้ผู้ใช้ประเมินความเร็วในการติดตั้งและความเข้ากันได้
    pole_system_type:
      name: ระบบเสาแบบ
      description: อธิบายระบบโครงสร้างหรือรูปแบบการกางเต็นท์ที่ใช้ (เช่น เสาอะลูมิเนียม
        ท่อลมแบบเป่าลม การกางด้วยไม้เท้าเดินป่า)
    police_equipment_fitment:
      name: การติดตั้งอุปกรณ์ตำรวจ
      description: ระบุว่ารถคันนี้ได้รับการกำหนดค่าหรือติดตั้งสายไฟไว้เพื่อรองรับอุปกรณ์บังคับใช้กฎหมายใดบ้าง
    police_vehicle_equipment_package:
      name: ชุดอุปกรณ์สำหรับรถตำรวจ
      description: ระบุถึงอุปกรณ์/การดัดแปลงเฉพาะสำหรับตำรวจที่ติดตั้งมาพร้อมกับรถขณะจำหน่าย
    police_vehicle_light_siren_equipment:
      name: อุปกรณ์ไฟ/ไซเรนสำหรับรถตำรวจ
      description: ระบุว่ารถตำรวจติดตั้งอุปกรณ์เตือนภัยฉุกเฉินอะไรบ้าง
    police_vehicle_upfit_level:
      name: ระดับการดัดแปลงรถตำรวจ
      description: อธิบายถึงอุปกรณ์/การดัดแปลงเฉพาะสำหรับตำรวจที่ติดตั้งบนรถบรรทุก
    polish_formulation:
      name: สูตรจากโปแลนด์
      description: ระบุส่วนประกอบพื้นฐาน/เคมีของน้ำยาเคลือบฟิงเกอร์บอร์ด (ไม่ใช่กรรมวิธีในการใช้งาน)
    polish_purpose:
      name: วัตถุประสงค์ของชาวโปแลนด์
      description: ผลลัพธ์หลักที่คาดหวังจากการขัดเงาพื้นผิวเครื่องดนตรี
    pollen_level:
      name: ระดับละอองเกสร
      description: บ่งบอกถึงปริมาณ/โอกาสที่ละอองเกสรจากดอกลิลลี่แต่ละสายพันธุ์จะเปื้อนสี
    polymer_clay_firmness_level:
      name: ระดับความแข็งของดินโพลิเมอร์
      description: ความแข็ง/ความอ่อนของดินโพลิเมอร์ก่อนอบ (ความสามารถในการขึ้นรูป)
    polymer_clay_translucency:
      name: ความโปร่งแสงของดินโพลิเมอร์
      description: ความทึบแสง/ความโปร่งใสของดินโพลิเมอร์เมื่อแข็งตัวแล้ว
    pom_pom_handle_style:
      name: รูปแบบด้ามจับของพู่ไหมพรม
      description: อธิบายลักษณะหรือโครงสร้างของด้ามจับ/ที่จับที่ใช้สำหรับถือพู่เชียร์
    pom_pom_trim_backing_tape_material:
      name: วัสดุรอง/เทปตกแต่งพู่
      description: ระบุวัสดุของเทปเย็บหรือถักเปียที่เอาโพลิออกซิเมทิลีน-ออกซิเมทิลีนติดอยู่
        (ฐานตัดแต่ง)
    pom_pom_type:
      name: โพรดิออกซิเมทิลีน-โพลิออกซิเมทิลีนชนิด
      description: ระบุว่ามีพู่หรือลูกตุ้มประดับอยู่บนหมวกหรือไม่ และเป็นแบบไหน
    pomegranate_product_form:
      name: รูปแบบผลิตภัณฑ์ทับทิม
      description: อธิบายลักษณะทางกายภาพของสิ่งที่นำเสนอ (ผลไม้ทั้งลูก, เมล็ดที่ปอกเปลือกแล้ว,
        เมล็ดข้างใน, เมล็ดแช่แข็ง)
    pomegranate_variety:
      name: พันธุ์ทับทิม
      description: ระบุสายพันธุ์หรือพันธุ์เฉพาะของผลทับทิม (เช่น Wonderful, Bhagwa,
        Kandhari)
    ponytail_holder_style:
      name: สไตล์ยางรัดผมหางม้า
      description: อธิบายโครงสร้างหรือรูปทรงเฉพาะของยางรัดผม เพื่อให้ผู้ซื้อสามารถเลือกสไตล์ที่ต้องการได้
    popcorn_form:
      name: ป๊อปคอร์น
      description: ระบุรูปแบบทางกายภาพหรือรูปแบบการเตรียมการของผลิตภัณฑ์ป๊อปคอร์น
        เช่น แบบพร้อมรับประทาน เมล็ดป๊อปคอร์น แบบสำหรับไมโครเวฟ ชุดเครื่องปรุง หรือกล่องของขวัญ
    pork_rind_form:
      name: รูปทรงหนังหมู
      description: จัดหมวดหมู่ลักษณะทางกายภาพหรือรูปแบบของขนมขบเคี้ยวจากหนังหมู (เช่น
        หนังหมูแผ่น, หนังหมูกรอบ, หนังหมูพอง, หนังหมูอัดเม็ด ฯลฯ)
    portability_features:
      name: คุณสมบัติการพกพา
      description: แสดงรายการส่วนประกอบในตัวที่ช่วยในการเคลื่อนย้าย ยก หรือจัดเก็บเก้าอี้พักผ่อน
    portability_frame_type:
      name: ความสะดวกในการพกพา/ประเภทFrame
      description: ระฆังวงออร์เคสตราเป็นแบบพกพา/ตั้งพื้น หรือติดตั้งถาวร/ตั้งบนเวที
    portable_electronic_game_features:
      name: คุณสมบัติของเกมอิเล็กทรอนิกส์พกพา
      description: คุณสมบัติหลักของเกมเพลย์/ฮาร์ดแวร์ที่อุปกรณ์รองรับ
    post_surgery_stage_suitability:
      name: ความเหมาะสมในระยะหลังการผ่าตัด
      description: ระบุว่าชุดบอดี้สูทนี้ออกแบบมาสำหรับระยะการฟื้นตัวใด (ถ้ามี) ซึ่งเป็นสิ่งสำคัญสำหรับผู้ที่กำลังมองหาชุดกระชับสัดส่วนทางการแพทย์
    postage_stamp_format:
      name: รูปแบบแสตมป์ไปรษณีย์
      description: วิธีการจัดจำหน่าย/บรรจุภัณฑ์ของแสตมป์ชุดมาตรฐาน (เดี่ยว คู่ แถบ
        บล็อก แผ่น สมุดแสตมป์ ม้วน ฯลฯ)
    postmark_type:
      name: ประเภทตราประทับไปรษณีย์
      description: ประเภทของตราประทับ/รอยยกเลิกที่ปรากฏบนแสตมป์ชุดที่ใช้แล้ว
    potato_cut_style:
      name: สไตล์การหั่นมันฝรั่ง
      description: ระบุลักษณะการหั่นหรือการเตรียมมันฝรั่งเมื่อไม่ได้ขายเป็นลูกเต็ม
    potato_intended_use:
      name: วัตถุประสงค์การใช้งานของมันฝรั่ง
      description: แยกแยะมันฝรั่งที่รับประทานทันทีออกจากมันฝรั่งที่ใช้เป็นเมล็ดพันธุ์หรือผลิตภัณฑ์แปรรูปแช่แข็ง
    potato_variety:
      name: มันฝรั่งพันธุ์ต่างๆ
      description: ระบุสายพันธุ์หรือพันธุ์ปลูกของมันฝรั่ง เพื่อช่วยให้นักช้อปสามารถค้นหาชนิดเฉพาะได้
        เช่น ยูคอนโกลด์, แมริส ไพเพอร์ หรือ เพอเพิล มาเจสตี
    pottery_clay_firing_required:
      name: จำเป็นต้องเผาเครื่องปั้นดินเผา
      description: วัสดุนั้นจำเป็นต้องผ่านการเผาในเตาเผาเพื่อให้ได้ความแข็ง/ผิวสัมผัสตามที่ต้องการหรือไม่
    pottery_slip_application_method:
      name: วิธีการสมัครสลิปเครื่องปั้นดินเผา
      description: ระบุเทคนิคใช้งานที่ต้องการสำหรับสลิป
    pottery_slip_compatible_clay_body:
      name: เนื้อดินที่เข้ากันได้กับน้ำเคลือบเครื่องปั้นดินเผา
      description: ระบุประเภทของเนื้อดินเหนียวที่น้ำเคลือบนี้ออกแบบมาเพื่อให้เข้ากันหรือใช้งานร่วมกับมันได้
    pottery_slip_form:
      name: แม่พิมพ์ดินเผา
      description: ระบุว่าผลิตภัณฑ์นั้นจำหน่ายในรูปแบบของเหลวพร้อมใช้ หรือในรูปแบบผงแห้งที่ต้องผสมก่อนใช้งาน
    pouch_design:
      name: การออกแบบกระเป๋า
      description: อธิบายรายละเอียดเกี่ยวกับโครงสร้างหรือคุณสมบัติเสริมของบริเวณกระเป๋าด้านหน้า
    pouch_style:
      name: สไตล์กระเป๋า
      description: ระบุรายละเอียดการออกแบบบริเวณกระเป๋าด้านหน้า โดยคำนึงถึงความสบาย
        การรองรับ และความสวยงามตามความต้องการ
    powdered_beverage_variety:
      name: เครื่องดื่มผงหลากหลายชนิด
      description: จำแนกผลิตภัณฑ์ตามประเภทของเครื่องดื่มที่ใช้เตรียม (เช่น น้ำมะนาว
        เครื่องดื่มเกลือแร่ เครื่องดื่มโปรตีน)
    power_rack_style:
      name: สไตล์โต๊ะทานอาหารไฟฟ้า
      description: ระบุรูปแบบของแร็กโดยรวม เพื่อช่วยให้ลูกค้าแยกความแตกต่างระหว่างกรงเต็ม
        แร็กครึ่ง และรุ่นประหยัดพื้นที่ได้
    power_steering_fluid_formulation:
      name: สูตรน้ำมันพาวเวอร์พวงมาลัย
      description: กลุ่มสูตรทั่วไปของของเหลว (แบบ ATF เทียบกับแบบไฮดรอลิก/CHF โดยเฉพาะ
        เทียบกับแบบอเนกประสงค์) ที่ใช้สำหรับการกรองที่มีความเข้ากันได้สูง
    practice_mute_audio_output:
      name: ฝึกปิดเสียงเอาต์พุต
      description: ระบุประเภทของช่องต่อสัญญาณเสียงออกที่มีให้ใช้งานบนอุปกรณ์ลดเสียงฝึกซ้อม
        สำหรับการตรวจสอบและ/หรือบันทึกเสียง (ซึ่งพบได้ทั่วไปในอุปกรณ์ลดเสียงฝึกซ้อมแบบเงียบ/อิเล็กทรอนิกส์)
    practice_mute_intonation_impact:
      name: ฝึกการออกเสียงโดยไม่ใช้เสียง Impact
      description: อธิบายถึงผลลัพธ์ที่คาดหวังจากการปรับเสียง/ระดับเสียงเมื่อใช้ที่ลดเสียงสำหรับฝึกซ้อม
    practice_mute_venting_valve_type:
      name: ฝึกการระบายอากาศแบบเงียบ/แบบวาล์ว
      description: ระบุว่าอุปกรณ์ลดเสียงสำหรับฝึกซ้อมนั้นมีการระบายอากาศหรือไม่ และมีวาล์วปรับได้เพื่อเปลี่ยนความต้านทาน/ระดับเสียงหรือไม่
        และอย่างไร
    practice_pad_features:
      name: คุณสมบัติของแผ่นฝึกซ้อม
      description: เน้นคุณสมบัติการใช้งานของแผ่นฝึกซ้อม นอกเหนือจากขนาดและวัสดุ
    practice_pad_mounting_style:
      name: รูปแบบการติดตั้งแผ่นรองฝึกซ้อม
      description: ระบุวิธีการวางหรือติดตั้งแผ่นฝึกซ้อมอย่างถูกต้องขณะใช้งาน
    practice_pad_rebound_level:
      name: ระดับการกระดอนของแผ่นรองฝึกซ้อม
      description: แสดงถึงการคืนตัว/การตอบสนองของแผ่นฝึกซ้อมเมื่อเทียบกับหนังกลองทั่วไป
    practice_pad_surface_configuration:
      name: การกำหนดค่าพื้นผิวของแผ่นรองฝึกซ้อม
      description: อธิบายว่าแผ่นรองเล่นมีพื้นผิวสำหรับเล่นเพียงพื้นผิวเดียวหรือหลายพื้นผิว
        และพื้นผิวเหล่านั้นให้ความรู้สึกแตกต่างกันหรือไม่
    pregnancy_stage_suitability:
      name: ความเหมาะสมของระยะการตั้งครรภ์
      description: ระบุว่าเสื้อผ้าชิ้นนี้ออกแบบมาสำหรับช่วงตั้งครรภ์หรือหลังคลอดระยะใดบ้าง
    preparation_state:
      name: สถานะการเตรียมการ
      description: บ่งบอกถึงระดับการเตรียมหรือการปรุงอาหารที่จำเป็นก่อนรับประทาน
    preparation_style:
      name: รูปแบบการจัดเตรียม
      description: ระบุลักษณะการตัดหรือการแปรรูปของแห้วเมื่อจำหน่าย (เช่น ทั้งลูก
        หั่นเป็นชิ้น อบ แช่แข็ง)
    preservation_medium:
      name: สารละลายสำหรับเก็บรักษา
      description: ระบุของเหลวหรือตัวกลางหลักที่ใช้ในการถนอมมะกอกหรือเคเปอร์ (เช่น
        น้ำเกลือ น้ำมันมะกอก น้ำส้มสายชู)
    presser_foot_attachment_method:
      name: วิธีการติดตั้งตีนเย็บ
      description: ระบุวิธีการยึดตีนผีของจักรเย็บผ้าเข้ากับตัวยึด/ก้านตีนผี (เช่น
        แบบกดล็อก หรือแบบขันสกรู) ซึ่งส่งผลต่อความเข้ากันได้
    pressure_gauge_type:
      name: ประเภทเกจวัดแรงดัน
      description: ระบุประเภทของมาตรวัดความดันที่มาพร้อมกับปั๊มลมจักรยาน หากมี
    pressure_measurement_unit:
      name: หน่วยวัดความดัน
      description: ระบุหน่วยที่ใช้ในการอ่านค่าหรือสอบเทียบเซ็นเซอร์ความดัน ซึ่งมีประโยชน์สำหรับการเปรียบเทียบผลิตภัณฑ์และตรวจสอบความเข้ากันได้ระหว่างเกจวัดและ
        ECU
    pressure_plate_balance_type:
      name: แผ่นดันเหลือแบบคงเหลือ
      description: ระบุว่าแผ่นกดคลัตช์มีการปรับสมดุลภายในหรือไม่ หรือต้องการ/สันนิษฐานว่ามีการปรับสมดุลภายนอกให้เข้ากับการตั้งค่าเครื่องยนต์/ล้อช่วยแรง
    pressure_plate_components_included:
      name: ส่วนประกอบของแผ่นแรงดัน ได้แก่
      description: สิ่งที่มาพร้อมกับแผ่นดันสำหรับรายการสินค้า
    pressure_sensor_application:
      name: เซ็นเซอร์วัดแรงดัน แอปพลิเคชัน
      description: ระบุระบบ/จุดวัดของยานยนต์ที่เซ็นเซอร์วัดแรงดันได้รับการออกแบบมาสำหรับการใช้งานนั้น
    pressure_sensor_port_thread_standard:
      name: พอร์ตเซ็นเซอร์ความดัน / รองรับมาตรฐาน
      description: ระบุพอร์ตเชิงกล/มาตรฐานพอร์ตที่ใช้ในการติดตั้งเซ็นเซอร์เข้ากับระบบของรถยนต์
    pressurization_method:
      name: วิธีการเพิ่มแรงดัน
      description: ระบุวิธีการสร้างหรือรักษาแรงดันภายในอุปกรณ์
    pretend_housekeeping_set_items_included:
      name: แกล้งทำเป็นชุดแม่บ้านรวมอยู่ด้วย
      description: ระบุรายการอุปกรณ์ทำความสะอาดบ้านที่รวมอยู่ในชุด (เช่น ไม้ถูพื้น
        ไม้กวาด ที่ตักฝุ่น ขวดสเปรย์)
    pretend_play_electronic_features:
      name: คุณสมบัติอิเล็กทรอนิกส์สำหรับการเล่นสมมุติ
      description: คุณสมบัติอิเล็กทรอนิกส์/โต้ตอบรวมอยู่ในสินค้าแกล้งทำเป็น
    pretend_play_set_pieces_included:
      name: ชุดของเล่นสมมุติประกอบด้วยชิ้นส่วนต่างๆ
      description: อุปกรณ์/ส่วนประกอบสำคัญที่รวมอยู่ในชุดของเล่นสมมุติ (เช่น เครื่องคิดเงิน
        อาหารของเล่น เครื่องมือ)
    pretend_play_set_theme:
      name: ธีมชุดของเล่นสมมุติ
      description: สถานการณ์/ธีมหลักในการเล่นสมมติที่ผลิตภัณฑ์นี้นำเสนอ (มีประโยชน์สำหรับการค้นพบแบบบูรณาการสำหรับเด็กทุกช่วงวัยที่เล่นสมมติ)
    pretzel_coating:
      name: เคลือบเพรทเซล
      description: ระบุเครื่องปรุงหรือสารเคลือบภายนอกที่ใช้กับเพรทเซล ทั้งแบบคาว (เค็ม
        ปรุงรส) และแบบหวาน (ช็อกโกแลต โยเกิร์ต คาราเมล)
    pretzel_shape:
      name: Shapesเพรทเซล
      description: ระบุลักษณะทางกายภาพของเพรทเซล (เช่น แบบบิด แบบแท่ง แบบกัด) ซึ่งเป็นตัวแยกแยะสำคัญที่ลูกค้าใช้ในการค้นหาหรือกรองข้อมูล
    primary_component_material:
      name: วัสดุส่วนประกอบหลัก
      description: วัสดุหลักของเสื้อสูบเครื่องยนต์
    primary_dish_application:
      name: แอปพลิเคชันจานหลัก
      description: ระบุเมนูหลักหรือการเตรียมอาหารที่ใช้แป้งโดว์นั้น
    primary_plant_base:
      name: ฐานพืชหลัก
      description: ระบุส่วนผสมหลักที่ไม่ใช่นมที่ใช้ในการสร้างทางเลือกชีส
    primary_plant_protein_source:
      name: แหล่งโปรตีนจากพืชหลัก
      description: ระบุส่วนผสมหลักของพืชที่ให้โปรตีนในสินค้า
    primary_sweetener_source:
      name: แหล่งสารให้ความหวานหลัก
      description: ระบุชนิดของพืชหรือวัตถุดิบที่ใช้ในการผลิตน้ำเชื่อม
    print_placement:
      name: พิมพ์ในเวลาวาง
      description: ระบุตำแหน่งที่วางกราฟิก/โลโก้หลักบนเสื้อยืด
    print_technique:
      name: เทคนิคการพิมพ์
      description: ระบุวิธีการตกแต่ง/การพิมพ์ที่ใช้กับกราฟิกบนเสื้อยืด
    printable_canvas_intended_use:
      name: ผ้าใบสำหรับพิมพ์ มีวัตถุประสงค์เพื่อการใช้งาน
      description: แอปหลักที่รองรับการใช้งานแคนวาสสำหรับพิมพ์ได้ดีที่สุด
    printable_fabric_format:
      name: รูปแบบผ้าสำหรับพิมพ์
      description: ระบุวิธีการจัดส่งผ้าฝ้ายสำหรับพิมพ์ (แผ่นเดี่ยวหรือม้วนต่อเนื่อง)
        ซึ่งส่งผลต่อการป้อนกระดาษของเครื่องพิมพ์และขั้นตอนการทำงานของโครงการ
    prism_material:
      name: วัสดุปริซึม
      description: ระบุวัสดุของชิ้นส่วนทางแสง (ปริซึม) ซึ่งส่งผลต่อความคมชัด ความทนทาน
        และความต้านทานต่อรอยขีดข่วน
    prisoner_transport_configuration:
      name: การกำหนดค่าการขนส่งนักโทษ
      description: ระบุว่ารถตู้ได้รับการดัดแปลงสำหรับการขนส่งผู้ถูกควบคุมตัว/นักโทษหรือไม่
        และอย่างไร
    prisoner_transport_partition_type:
      name: ประเภทแผงกั้นสำหรับการขนส่งนักโทษ
      description: ประเภทของฉากกั้น/โครงภายในที่แยกส่วนหน้าและส่วนหลังออกจากกัน
    privacy_or_acoustic_feature:
      name: คุณสมบัติเพื่อความเป็นส่วนตัวหรือด้านเสียง
      description: ระบุองค์ประกอบเพื่อความเป็นส่วนตัวหรือลดเสียงรบกวนในตัว เช่น แผงกั้น
        ฉากกั้นเสียง หรือห้องปิดมิดชิด
    processing_state:
      name: สถานะการประมวลผล
      description: ไม่ว่าขนนกจะผ่านการฆ่าเชื้อ/ล้าง หรือเตรียมไว้สำหรับการใช้งานในการประดิษฐ์งานฝีมือแล้วหรือไม่ก็ตาม
    produce_grade:
      name: เกรดผลผลิต
      description: จัดระดับคุณภาพของกีวีโดยพิจารณาจากขนาด รูปร่าง และสภาพของผล
    produce_growth_stage:
      name: ผลิตระยะการเจริญเติบโต
      description: ระบุระยะการเจริญเติบโตที่จำหน่ายผลผลิต (เช่น ไมโครกรีน ใบอ่อน ใบแก่
        ต้นไม้มีชีวิต เมล็ด)
    produce_washing_state:
      name: ผลิตในสภาพการซัก
      description: แสดงว่ากรีนล้างแล้วพร้อมรับประทานหรือไม่
    profile_shape:
      name: รูปทรง/Shapes
      description: ความโค้ง/รูปทรงโดยรวมของฉาบ (ความชันที่ฉาบยกตัวขึ้นจากขอบถึงส่วนกลาง)
    projectile_ammunition_type:
      name: ประเภทกระสุน/ลูกปืน
      description: ระบุประเภทของกระสุนหรือวัสดุสิ้นเปลืองที่ใช้โดยอาวุธของเล่น หากมี
    projectile_finish:
      name: การจบของกระสุน
      description: ระบุการเคลือบผิวใดๆ ที่ใช้กับ BB เพื่อช่วยเพิ่มความต้านทานการกัดกร่อนหรือเพิ่มความชัดเจน
        (เช่น เคลือบทองแดง ชุบสังกะสี ทาสี)
    projectile_type:
      name: ประเภทของกระสุน
      description: ระบุชนิดของกระสุนปืนที่สินค้าใช้หรือมีวัตถุประสงค์เพื่อ
    pronation_support:
      name: ความช่วยเหลือด้านการออกเสียง
      description: ระบุลักษณะการเดินหรือรูปแบบการลงน้ำหนักเท้าที่รองเท้าผ้าใบได้รับการออกแบบมาเพื่อรองรับ
    propellant_type:
      name: ประเภทเชื้อเพลิง
      description: ระบุชนิดของเชื้อเพลิงที่ชิ้นส่วนหรืออุปกรณ์เสริมนั้นได้รับการออกแบบมาให้ใช้งาน
    propeller_blade_cup:
      name: ถ้วยใบพัด
      description: บ่งบอกถึงปริมาณความโค้ง (ความโค้งของขอบด้านท้าย) บนใบเลื่อย
    propeller_hub_type:
      name: ประเภทดุมใบพัด
      description: ระบุระบบดุม/บุชชิ่งที่ใช้โดยใบพัด (บันทึกดุมแบบเปลี่ยนได้เทียบกับแบบกดเข้า)
    propeller_rotation:
      name: การหมุนของใบพัด
      description: ระบุทิศทางการหมุนของใบพัด
    protectant_formula_base:
      name: สูตรปกป้องผิว
      description: ระบุส่วนประกอบพื้นฐานของสารปกป้อง ซึ่งส่งผลต่อความเงางาม ความรู้สึกสัมผัส
        และการทำความสะอาด (เช่น สูตรน้ำเทียบกับสูตรตัวทำละลาย)
    protection_coverage_area:
      name: พื้นที่คุ้มครอง
      description: ระบุว่าอุปกรณ์ป้องกันนี้ครอบคลุมส่วนใดของนาฬิกาบ้าง
    protection_level:
      name: ระดับการป้องกัน
      description: ระบุระดับการป้องกันที่กล่องนั้นออกแบบมาเพื่อใช้ในการขนส่งและจัดเก็บเครื่องดนตรี
    protective_case_interior_protection_type:
      name: เคสป้องกันภายในแบบป้องกัน
      description: อธิบายวิธีการป้องกันภายในหลักที่ใช้เพื่อยึดและกันกระแทกเนื้อหา
    protective_case_shell_type:
      name: เคสป้องกันแบบเปลือกหุ้ม
      description: ระบุรูปแบบโครงสร้างโดยรวมของตัวเคสภายนอก (ความแข็งแรง) ที่ส่งผลต่อการป้องกันการกระแทกและความสะดวกในการพกพา
    protective_contact_padding_material:
      name: หน้าสัมผัสป้องกัน การเว้นขอบในวัสดุ
      description: วัสดุที่ใช้ในจุดสัมผัสของเครื่องดนตรี (ส่วนยึด/ส่วนแทรกของปากลำโพง)
        เพื่อป้องกันรอยขีดข่วน (เช่น สักหลาด ยาง)
    protective_cup_configuration:
      name: การกำหนดค่าถ้วยป้องกัน
      description: ระบุว่ามีอุปกรณ์ป้องกันอวัยวะเพศชายมาให้ด้วยหรือไม่ สามารถถอดออกได้
        หรือมีเพียงช่องสำหรับใส่อุปกรณ์ป้องกันเท่านั้น
    protective_eyewear_standard_compliance:
      name: การปฏิบัติตามมาตรฐานแว่นตาป้องกัน
      description: ระบุมาตรฐานความปลอดภัยหรือความทนทานต่อแรงกระแทก หรือใบรับรองที่แว่นตาตรงตามหรือเกินกว่ามาตรฐานสำหรับการใช้งานด้านกีฬา
    protective_gear_certification_standard:
      name: มาตรฐานการรับรองอุปกรณ์ป้องกัน
      description: 'ระบุมาตรฐานความปลอดภัย/การรับรองที่อุปกรณ์นั้นเป็นไปตามมาตรฐาน
        (แตกต่างกันไปตามประเภทของสินค้า: มาตรฐานหมวกนิรภัย มาตรฐานชุด มาตรฐานเกราะกันกระแทก)'
    protective_gear_items_included:
      name: รวมอุปกรณ์ป้องกันแล้ว
      description: แสดงรายการชิ้นส่วนแต่ละชิ้นที่ประกอบเป็นชุดอุปกรณ์ป้องกันแบบหลายชิ้น
    protective_gear_padding_type:
      name: อุปกรณ์ป้องกันประเภทการเว้นขอบในส่วน
      description: ระบุประเภทของการเว้นขอบที่ใช้ในอุปกรณ์ป้องกัน Impact
    protective_gear_safety_certifications:
      name: ใบรับรองความปลอดภัยของอุปกรณ์ป้องกัน
      description: ระบุมาตรฐานความปลอดภัยหรือประสิทธิภาพเฉพาะด้านกีฬาที่เป็นที่ยอมรับ
        ซึ่งผลิตภัณฑ์นั้นตรงตามข้อกำหนด เช่น มาตรฐานหมวกกันน็อคสำหรับกีฬาฮอกกี้สนามของ
        NOCSAE หรือ ASTM
    protective_pad_components_included:
      name: ส่วนประกอบแผ่นรองป้องกันรวมอยู่ด้วย
      description: ระบุรายละเอียดว่าอุปกรณ์ป้องกันชิ้นใดบ้างที่รวมอยู่ในชุดอุปกรณ์ป้องกันหลายชิ้น
        เพื่อให้ผู้ซื้อทราบได้อย่างแน่ชัดว่าส่วนใดของร่างกายได้รับการปกป้อง
    protective_shorts_intended_use:
      name: กางเกงขาสั้นป้องกันที่ออกแบบมาเพื่อการใช้งาน
      description: กางเกงป้องกันนี้ออกแบบมาเพื่อการขี่/แข่งขันจักรยานเป็นหลัก
    protective_shorts_padding_type:
      name: ประเภทแผ่นรองในกางเกงซับในกันกระแทก
      description: ระบุโครงสร้าง/รูปแบบขององค์ประกอบป้องกันที่ใช้ในกางเกงขาสั้น
    protective_shorts_padding_zones:
      name: บริเวณแผ่นรองในกางเกงซับในกันกระแทก
      description: ระบุว่าส่วนใดของร่างกายที่มีการบูรณาการการเว้นขอบหน้าจอ/เกราะในกางเกงขาสั้นป้องกัน
    protective_treatment:
      name: ทรีตเมนต์ป้องกัน
      description: ระบุสารเคลือบป้องกันหรือ ทิฟฟรอนต์เซท ที่ใช้สำหรับป้องกันคราบ น้ำ
        หรือรังสียูวี (เช่น Teflon)
    protector_coverage_area:
      name: พื้นที่ครอบคลุมของอุปกรณ์ป้องกัน
      description: ระบุว่าอุปกรณ์ป้องกันนี้ออกแบบมาเพื่อปกป้องบริเวณลำตัวส่วนใดบ้าง
        (เช่น หน้าอก หลัง ด้านข้าง)
    puck_bottom_style:
      name: สไตล์ก้นพัค
      description: อธิบายถึงรูปทรงด้านล่างของลูกพัค ซึ่งมีผลต่อความเร็วและการควบคุมบนพื้นผิวสนามชัฟเฟิลบอร์ดที่แตกต่างกัน
    puck_type:
      name: ประเภทพัค
      description: จำแนกประเภทการใช้งานหรือวัตถุประสงค์ของลูกฮอกกี้ ตั้งแต่การแข่งขันอย่างเป็นทางการไปจนถึงของที่ระลึกสำหรับสะสม
    pull_buoy_style:
      name: สไตล์ทุ่นลาก
      description: ระบุรูปแบบการใช้งานหรือโครงสร้างของทุ่นลอยน้ำ เช่น แบบมาตรฐาน แบบผูกข้อเท้า
        หรือแบบผสมผสานสำหรับใช้กับขา
    pull_through_weight_material:
      name: วัสดุที่มีน้ำหนักดึงผ่าน
      description: สำหรับไม้พันสำลีแบบดึงผ่าน ให้ระบุวัสดุของตุ้มน้ำหนักที่ใช้ช่วยนำทางไม้พันสำลีผ่านเครื่องมือ
    pulp_content:
      name: ปริมาณเนื้อผลไม้
      description: ระบุปริมาณของเนื้อผลไม้หรือผักที่มีอยู่ในเครื่องดื่ม
    pump_accessories_included:
      name: อุปกรณ์เสริมที่รวมมาพร้อมปั๊ม
      description: ระบุรายการสิ่งของเพิ่มเติมที่มาพร้อมกับปั๊มลม เพื่อให้ผู้ซื้อเข้าใจถึงสิ่งของในชุดอุปกรณ์
    pumping_compatibility:
      name: ความเข้ากันได้ของปั๊ม
      description: ระบุว่าเสื้อชั้นในสำหรับให้นมบุตรนั้นออกแบบมาเพื่อการปั๊มนมแบบไม่ต้องใช้มือ
        รวมถึงการให้นมบุตรด้วยหรือไม่
    punch_pad_type:
      name: แผ่นเจาะรู
      description: ระบุดีไซน์หรือรูปแบบของเป้าซ้อมชกมวย เพื่อให้ร้านค้าสามารถเลือกเป้าซ้อมที่เหมาะสมกับความต้องการในการฝึกซ้อมได้
    punching_training_bag_shape:
      name: Shapesของกระสอบทราย/กระสอบฝึกซ้อม
      description: ระบุรูปทรงเรขาคณิตของกระสอบทราย ช่วยให้เลือกซื้อรุ่นที่เหมาะสมกับการฝึกซ้อมการชกแต่ละแบบ
        (เช่น อัปเปอร์คัต, ชกเข้าลำตัว)
    puncture_protection_technology:
      name: เทคโนโลยีป้องกันการเจาะ
      description: ระบุเทคโนโลยีเสริมความแข็งแรงบริเวณแก้มยาง/โครงยาง หรือชั้นป้องกันการเจาะทะลุที่เป็นกรรมสิทธิ์หรือทั่วไปที่ใช้ในยาง
        (เช่น EXO, SnakeSkin, เข็มขัดเคฟลาร์)
    puppet_features:
      name: คุณสมบัติของหุ่นกระบอก
      description: ไฮไลต์คุณลักษณะด้านการทำงานหรือประสิทธิภาพของหุ่นเชิด (เช่น ปากที่ขยับได้
        เอฟเฟกต์เสียง กลับด้านได้)
    puppet_puppet_theater_accessory_type:
      name: ประเภทหุ่นเชิดและอุปกรณ์โรงละครหุ่นเชิด
      description: ระบุว่าสินค้าเป็นอุปกรณ์เสริมประเภทใด (เช่น อุปกรณ์ประกอบฉาก เครื่องแต่งกายหุ่นกระบอก
        แถบควบคุม อะไหล่ทดแทน)
    purity_unit:
      name: หน่วยความบริสุทธิ์
      description: วิธีการแสดงความบริสุทธิ์ของเหรียญ (ความบริสุทธิ์ของวัสดุเทียบกับกะรัต)
    push_up_bar_design:
      name: การออกแบบบาร์สำหรับวิดพื้น
      description: ระบุรูปแบบการออกแบบตามฟังก์ชันการใช้งานของบาร์สำหรับวิดพื้น (เช่น
        แบบคงที่ แบบหมุนได้ และแบบพาราเล็ต)
    pushrod_end_type:
      name: แบบปลายก้านดัน
      description: ระบุรูปแบบของปลายก้านดัน/จุดยึดที่ใช้ที่แป้นเหยียบหรือส่วนต่อประสานกับกระบอกสูบหลัก
    putty_glow_activation_method:
      name: วิธีการกระตุ้นการเรืองแสงของดินปั้น
      description: วิธีการชาร์จ/กระตุ้นให้ดินปั้นเรืองแสง (เช่น แสงแดด รังสียูวี/แสงแบล็กไลท์)
    putty_glow_color:
      name: สีเรืองแสงของดินปั้น
      description: ระบุสีที่ดินปั้นเปล่งออกมาเมื่อเรืองแสงในที่มืด
    putty_inclusions:
      name: ส่วนผสมเพิ่มเติมในดินปั้น
      description: ส่วนผสมเพิ่มเติมที่น่าสนใจในดินปั้น (เช่น กากเพชร ลูกปัดกระดาษ
        ลูกปัดโฟม)
    putty_texture:
      name: เนื้อดินเหนียว
      description: พฤติกรรมการขนย้ายเบื้องต้นของสีโป๊ว (เช่น ความเด้ง ยืด คล้ายของเหลว)
    puzzle_accessory_features:
      name: คุณสมบัติของอุปกรณ์เสริมสำหรับตัวต่อ
      description: คุณสมบัติการใช้งานและองค์ประกอบการออกแบบของอุปกรณ์เสริมสำหรับจิ๊กซอว์
        (แตกต่างกันไปตามประเภทของอุปกรณ์เสริม)
    pyrometric_cone_range:
      name: ช่วงกรวยไพโรมิเตอร์
      description: ค่าอุณหภูมิเผาที่แนะนำสำหรับเคลือบ (เช่น Cone 06–04, Cone 5–6)
    quarter_panel_coverage_type:
      name: แบบครอบคลุมแผงบริเวณนี้
      description: ระบุว่าผลิตภัณฑ์นี้ใช้ทดแทน/ซ่อมแซมส่วนใดของแผงด้านข้างตัวถังรถ
    quarter_panel_set_contents:
      name: ไตรมาสแผงชุดเนื้อหา
      description: ระบุการกำหนดค่าแผงไตรมาสที่รวมอยู่ในรายการสินค้า (ด้านเดียว, สแกนเนอร์
        หรือส่วนการซ่อมแซมเพิ่มเติม)
    quilting_ruler_markings:
      name: เครื่องหมายบนไม้บรรทัดสำหรับงานควิลท์
      description: ระบุประเภทของเครื่องหมายที่พิมพ์บนไม้บรรทัดสำหรับงานควิลท์ที่ใช้สำหรับการตัด/จัดแนว
    quilting_ruler_non_slip_feature:
      name: ไม้บรรทัดเย็บผ้าควิลท์แบบกันลื่น
      description: ระบุว่าไม้บรรทัดมีแผ่นรอง/พื้นผิวกันลื่นหรือไม่ เพื่อลดการเลื่อนบนผ้า
    quilting_ruler_transparency:
      name: ไม้บรรทัดเย็บผ้าแบบโปร่งใส
      description: บ่งบอกถึงความโปร่งใส/ความชัดเจนของวัสดุไม้บรรทัดสำหรับการมองเห็นเนื้อผ้าและเครื่องหมายที่อยู่ด้านล่าง
    quilting_thread_usage:
      name: การใช้ด้ายเย็บผ้าควิลท์
      description: บ่งบอกถึงจุดประสงค์ในการควิ้ลท์แอปพลิเคชันสำหรับ (วัตถุประสงค์การใช้งาน)
    quilting_thread_weight_system:
      name: ระบบน้ำหนักด้ายเย็บผ้าควิลท์
      description: ระบุระบบวัดขนาด/น้ำหนักของเส้นด้ายที่ใช้แสดงความหนา (เช่น wt, Tex,
        Denier) เพื่อให้ตีความค่าตัวเลขได้อย่างถูกต้อง
    quince_variety:
      name: พันธุ์ควินซ์
      description: ระบุสายพันธุ์หรือพันธุ์เฉพาะของผลควินซ์ เนื่องจากรสชาติ กลิ่น และความเหมาะสมในการนำไปประกอบอาหารอาจแตกต่างกันไปตามสายพันธุ์
    quinoa_variety:
      name: พันธุ์ควินัว
      description: ระบุสีหรือสายพันธุ์ของควินัวอย่างเฉพาะเจาะจง เนื่องจากควินัวแต่ละสายพันธุ์มีรสชาติ
        เนื้อสัมผัส และเวลาในการปรุงที่แตกต่างกัน
    quinto_tuning_system:
      name: ระบบปรับแต่งควินโต
      description: วิธีการตั้งสาย/ปรับความตึงของสายควินโต
    race_car_class:
      name: คลาสรถแข่ง
      description: ประเภท/กลุ่มการแข่งขันที่รถคันนี้ถูกสร้างขึ้นมาเพื่อเข้าร่วม (กฎเกณฑ์/กลุ่มการรับรองมาตรฐาน)
    racing_balaclava_face_opening_style:
      name: ผ้าคลุมหน้าแบบแข่งรถ เปิดปิดใบหน้าได้
      description: การออกแบบช่องเปิดใบหน้าของผ้าคลุมศีรษะแบบบาลาคลาวา มีผลต่อความกระชับ
        การปิดผนึก และความสบายในการสวมใส่หมวกกันน็อค
    racing_balaclava_neck_coverage_length:
      name: ความยาวของผ้าคลุมคอแบบบาลาคลาวาสำหรับแข่งรถ
      description: ความยาวของผ้าคลุมคอ/กระโปรงที่ออกแบบมาเพื่อสอดเข้าไปในชุด/อุปกรณ์รัดคอเพื่อการปิดผนึกและปกป้อง
    racing_balaclava_ventilation_zones:
      name: ช่องระบายอากาศของหมวกคลุมหน้าสำหรับแข่งรถ
      description: กำหนดตำแหน่งของบริเวณที่ระบายอากาศได้ดี/เป็นตาข่าย หรือมีช่องระบายอากาศ
        เพื่อเพิ่มการไหลเวียนของอากาศใต้หมวกกันน็อค
    racing_chest_guard_intended_use:
      name: วัตถุประสงค์การใช้อุปกรณ์ป้องกันหน้าอกสำหรับแข่งรถ
      description: ประเภทกีฬามอเตอร์สปอร์ตหลัก หรือบริบทอุปกรณ์ป้องกันหน้าอกได้รับการออกแบบมา
    racing_chest_guard_size_type:
      name: ขนาดและประเภทของอุปกรณ์ป้องกันหน้าอกสำหรับแข่งรถ
      description: ระบุว่าผลิตภัณฑ์นั้นมีขนาดสำหรับเด็ก ผู้ใหญ่ หรือเป็นแบบปรับขนาดได้/ใช้ได้กับทุกคน
    racing_glove_certification_standard:
      name: มาตรฐานการรับรองถุงมือแข่งรถ
      description: ระบุใบรับรอง/มาตรฐานความปลอดภัยที่ถุงมือแข่งรถนั้นเป็นไปตามมาตรฐาน
        (เช่น FIA, SFI, CE) และอาจระบุระดับ/การรับรองหากมี
    racing_goggles_lens_system:
      name: ระบบเลนส์แว่นตาแข่งรถ
      description: ระบุระบบการเปลี่ยนเลนส์/แผ่นฟิล์มกันรอยที่แว่นตารองรับ
    racing_helmet_certification_standard:
      name: มาตรฐานการรับรองหมวกกันน็อคสำหรับการแข่งขัน
      description: ใบรับรองความปลอดภัยที่หมวกกันน็อคสำหรับแข่งรถนั้นผ่านมาตรฐาน
    racing_kart_brake_type:
      name: ประเภทเบรกสำหรับรถโกคาร์ท
      description: ประเภทระบบเบรกหลักที่ติดตั้งในรถโกคาร์ท
    racing_kart_class:
      name: คลาสแข่งรถโกคาร์ท
      description: ประเภทการแข่งขันหรือกฎกติกาที่รถโกคาร์ทถูกสร้างขึ้นเพื่อให้เป็นไปตามนั้น
    racing_kart_frame_material:
      name: วัสดุ Frame รถโกคาร์ท
      description: วัสดุ Frame/ตัวถังหลักสำหรับรถโกคาร์ท
    racing_kart_seat_size:
      name: ขนาดเบาะรถโกคาร์ท
      description: ขนาดเบาะรถโกคาร์ทที่ใช้สำหรับการติดตั้ง
    racing_neck_support_style:
      name: คอแข่ง ความช่วยเหลือสไตล์
      description: รูปแบบโครงสร้างของอุปกรณ์พยุงคอ/ปลอกคอสำหรับรถแข่ง และวิธีการเชื่อมต่อกับลำตัว/หมวกกันน็อคของผู้ขับขี่
    racing_suit_certification_standard:
      name: มาตรฐานการรับรองชุดแข่ง
      description: ระบุมาตรฐานการรับรองความปลอดภัยสำหรับการแข่งขันที่ชุดนั้นผ่านมาตรฐาน
        (เช่น มาตรฐาน FIA หรือ SFI)
    racing_suit_cuff_design:
      name: ดีไซน์ข้อมือชุดแข่งรถ
      description: อุปกรณ์รัดข้อเท้า/ข้อมือชนิดที่ใช้เชื่อมต่อกับถุงมือ/รองเท้าบู๊ต
        เพื่อเพิ่มประสิทธิภาพในการปิดผนึกและความสบายในการสวมใส่
    racing_suit_size_system:
      name: ระบบการกำหนดขนาดชุดแข่งรถ
      description: ระบบการกำหนดขนาดที่ใช้สำหรับชุด (เช่น Alpha S-XXL, ตัวเลข EU/US,
        สำหรับเด็กและเยาวชน)
    racing_truck_discipline:
      name: การแข่งขันรถบรรทุก
      description: ระบุประเภทการแข่งขันหลัก/รูปแบบการแข่งขันที่รถบรรทุกคันนี้ถูกสร้างขึ้นมาเพื่อเข้าร่วม
    rack_side_configuration:
      name: รูปแบบโครงสร้างด้านข้างของชั้นวาง
      description: ระบุว่าชั้นวางสินค้าวางด้านใดด้านหนึ่งหรือทั้งสองด้าน ส่งผลต่อประสิทธิภาพของพื้นที่และการเข้าถึง
    rack_system_configuration:
      name: การกำหนดค่าระบบห้องอาหาร
      description: อธิบายลักษณะโดยรวม/รูปทรงของระบบแร็คกลอง
    racket_dampener_type:
      name: ประเภทตัวลดแรงสั่นสะเทือนของแร็กเก็ต
      description: ระบุกลไกการติดตั้งหรือรูปแบบการทำงานของอุปกรณ์ลดแรงสั่นสะเทือนของไม้แร็กเก็ต
    racket_grip_size:
      name: ขนาดด้ามจับแร็กเก็ต
      description: ระบุการจำแนกขนาดด้ามไม้แร็กเก็ตตามเส้นรอบวง (เช่น G1–G6) เพื่อให้แน่ใจว่าพอดีกับมือและใช้งานได้อย่างสบาย
    racket_sport_shoe_court_surface:
      name: รองเท้ากีฬาแร็กเก็ตสำหรับพื้นสนาม
      description: ระบุพื้นสนามเทนนิสที่รองเท้าได้รับการออกแบบหรือปรับให้เหมาะสม ช่วยให้ผู้เล่นเลือกรองเท้าที่มีรูปแบบพื้นรองเท้าและส่วนผสมของยางที่เหมาะสมกับพื้นสนามที่พวกเขาเล่นเป็นประจำ
    racket_string_pattern:
      name: รูปแบบการขึ้นเอ็นไม้แร็กเก็ต
      description: ระบุจำนวนเส้นเอ็นหลักและเส้นเอ็นขวางในหน้าไม้เทนนิส (เช่น 16 x
        18) ซึ่งมีผลต่อการควบคุม การหมุน และความทนทาน
    racket_stringing_status:
      name: สถานะการขึ้นเอ็นไม้แร็กเก็ต
      description: แสดงว่าไม้เทนนิสถูกขายแล้ว, คลายสาย, หรือก่อน.
    racket_weight_class:
      name: คลาสน้ำหนักแร็กเก็ต
      description: มีการกำหนดประเภทน้ำหนักมาตรฐาน "U" สำหรับแบดมินตัน ทำให้ผู้เล่นสามารถเลือกแร็กเก็ตในช่วงน้ำหนักที่ตนเองต้องการได้
    racquet_toy_set_equipment_included:
      name: ชุดอุปกรณ์ของเล่นแร็กเก็ต ประกอบด้วย
      description: ระบุรายการสิ่งของที่รวมอยู่ในของเล่นหรือชุด (เช่น ตาข่าย ลูกบอล
        ไม้ตี/แร็กเก็ต)
    racquetball_squash_training_aid_type:
      name: ประเภทอุปกรณ์ช่วยฝึกซ้อมแร็กเก็ตบอลและสควอช
      description: แยกประเภทเครื่องช่วยฝึกหรืออุปกรณ์เสริมเฉพาะเพื่อให้นักช้อปสามารถค้นหารายการที่ต้องการได้อย่างรวดเร็ว
    radiator_cap_gasket_material:
      name: วัสดุของปะเก็นฝาหม้อน้ำ
      description: วัสดุของปะเก็นที่ใช้กับฝาหม้อน้ำ
    radiator_cap_pressure_relief_style:
      name: รูปแบบฝาหม้อน้ำระบายแรงดัน
      description: ระบุรูปแบบการระบายแรงดัน/การระบายอากาศ/การทำงานของฝาหม้อน้ำ ซึ่งอาจส่งผลต่อการควบคุมรถ
        ความปลอดภัย และการใช้งานที่ตั้งใจไว้
    radiator_expansion_tank_cap_application:
      name: ฝาหม้อน้ำ/ขยายถังแอปพลิเคชัน
      description: ระบุว่าฝาปิดนั้นใช้สำหรับช่องเติมน้ำหล่อเย็นของหม้อน้ำหรือสำหรับถังพักน้ำหล่อเย็น
    radiator_fan_control_type:
      name: ประเภทการควบคุมพัดลมหม้อน้ำ
      description: ระบุวิธีการควบคุมพัดลมหม้อน้ำ/ไม่จำเป็นต้อง
    radiator_fan_mounting_pattern:
      name: รูปแบบการติดตั้งพัดลมหม้อน้ำ
      description: ระบุรูปแบบการติดตั้งที่ใช้ในการยึดพัดลมหรือชุดพัดลม
    radiator_fan_type:
      name: ประเภทพัดลมหม้อน้ำ
      description: ระบุประเภทการทำงาน/การกำหนดค่าของชุดพัดลมระบายความร้อน
    radiator_hose_end_type:
      name: ชนิดปลายท่อหม้อน้ำ
      description: ระบุรูปแบบการเชื่อมต่อ/การซีลหลักที่ใช้ที่ปลายท่อหม้อน้ำเพื่อเชื่อมต่อกับพอร์ตหม้อน้ำ/เครื่องยนต์
    radiator_hose_position:
      name: ตำแหน่งท่อหม้อน้ำ
      description: ตำแหน่ง/ประเภทของท่อหม้อน้ำภายในระบบระบายความร้อน
    radiator_hose_shape:
      name: Shapesของท่อหม้อน้ำ
      description: รูปทรง/โครงสร้างโดยรวมของท่อที่ใช้สำหรับการติดตั้งและการประกอบ
    radiator_overflow_tank_level_sensor_provision:
      name: การติดตั้งเซ็นเซอร์ระดับน้ำในถังพักน้ำล้นหม้อน้ำ
      description: ระบุว่าถังมีหรือช่วยเหลือเซ็นเซอร์ระดับน้ำหล่อเย็นหรือไม่
    radiator_overflow_tank_shape:
      name: รูปทรงถังพักน้ำล้นหม้อน้ำ
      description: รูปทรงโดยรวมของตัวถังถังพักน้ำล้น
    radish_variety:
      name: หัวไชเท้าพันธุ์ต่างๆ
      description: ระบุพันธุ์หรือชนิดของหัวไชเท้า เพื่อให้นักช้อปสามารถเลือกรสชาติ
        สี หรือลักษณะเฉพาะได้ (เช่น Daikon, Watermelon, French Breakfast)
    radius_of_hollow:
      name: รัศมีของโพรง
      description: ระบุลักษณะโปรไฟล์กลวงของใบมีดที่ผลิตโดยเครื่องลับคม โดยแสดงเป็นขนาดมาตรฐานทั่วไปหรือแบบแบน
    rail_coverage_configuration:
      name: การกำหนดค่าการครอบคลุมทางรถไฟ
      description: ระบุว่าชุดผ้าคลุมนี้ปกป้องส่วนใดบ้างของเปลเด็ก โดยชี้แจงว่าสินค้าที่ซื้อเป็นผ้าคลุมด้านหน้าชิ้นเดียวหรือเป็นชุดผ้าคลุมรอบด้านหลายชิ้น
    rail_mount_standard:
      name: มาตรฐานการติดตั้งราง
      description: ระบุมาตรฐานรางหรือส่วนต่อประสานการติดตั้งที่ใช้สำหรับติดอุปกรณ์เสริม
        (เช่น กล้องเล็ง ไฟฉาย) เข้ากับปืนบีบี
    rail_side:
      name: ริมรางรถไฟ
      description: ระบุว่ารางอะไหล่เป็นสำหรับด้านซ้าย ด้านขวา หรือขายเป็นคู่
    rail_style:
      name: รูปแบบของราว
      description: จำแนกประเภทของการออกแบบหรือโครงสร้างโดยรวมของราว (เช่น ทรง A, ทรงสะพานโค้ง,
        ทรงหักมุม) ซึ่งเป็นตัวกำหนดท่วงท่าในการเล่นที่สามารถทำได้ รวมถึงพื้นที่ที่จำเป็นต้องใช้
    rail_system:
      name: ระบบราง
      description: ระบุอินเทอร์เฟซสำหรับติดตั้งอุปกรณ์เสริมที่มีอยู่บนปืน (เช่น Picatinny,
        M-LOK)
    rain_sensor_technology:
      name: เทคโนโลยีเซ็นเซอร์วัดปริมาณน้ำฝน
      description: หลักการตรวจจับที่ใช้ในการตรวจจับน้ำบนกระจกหน้ารถ
    rain_suit_configuration:
      name: การจัดเตรียมชุดกันฝน
      description: ระบุว่าผลิตภัณฑ์นั้นเป็นชุดคลุมแบบชิ้นเดียว ชุดคลุมแบบหลายชิ้น
        หรือรูปแบบอื่นๆ
    rainstick_construction_type:
      name: ประเภทโครงสร้าง Rainstick
      description: อธิบายวิธีการสร้างแท่งเสียงฝน (แบบดั้งเดิมทำจากกระบองเพิง/ท่อไม้
        เทียบกับแบบสมัยใหม่)
    rainstick_fill_material:
      name: วัสดุสำหรับบรรจุแท่งฝน
      description: ระบุวัสดุเติมภายในที่ใช้สร้างเสียงต่อเนื่อง (เช่น เมล็ดพืช ลูกปัด)
    rainstick_playing_technique:
      name: เทคนิคการเล่นเรนสติ๊ก
      description: ระบุเทคนิคการเล่นที่แนะนำ หรือรูปแบบการบรรเลงเสียงฝนที่ใช้เพื่อให้ได้เอฟเฟ็กต์ตามที่ต้องการบนเรนสติ๊ก
    rainstick_sound_character:
      name: ลักษณะเสียงของไม้ฝน
      description: อธิบายลักษณะเสียงโดยรวมที่เกิดจากเครื่องดนตรีเรนสติ๊ก
    raising_method:
      name: วิธีการยก
      description: อธิบายวิธีการเลี้ยงและดูแลสัตว์จนโตเต็มที่ก่อนนำไปแปรรูป (เช่น
        เลี้ยงด้วยหญ้า เลี้ยงในทุ่งหญ้า เลี้ยงด้วยธัญพืช)
    rally_competition_class:
      name: การแข่งขันแรลลี่
      description: หน่วยงานที่ให้การรับรองหรือประเภทของกฎเกณฑ์ที่ใช้ในการสร้างรถแรลลี่
        (หากทราบ)
    rally_surface_setup:
      name: ภูมิประเทศสำหรับการแข่งขันแรลลี่
      description: อธิบายลักษณะพื้นผิวหรือระดับการยึดเกาะของทางลาด เพื่อช่วยเลือกใช้งานให้เหมาะสม
    ramp_surface_texture:
      name: ลวดลายพื้นผิวทางลาด
      description: อธิบายถึงลักษณะพื้นผิวหรือระดับการยึดเกาะของพื้นผิวทางลาดสำหรับเล่นสเก็ตบอร์ด
    ratchet_mounting_style:
      name: รูปแบบการติดตั้งแบบแรตเช็ต
      description: วิธีการจับหรือติดตั้งกลไกเฟืองดนตรีขณะเล่นหรือขณะจัดเตรียม
    rattle_element_material:
      name: วัสดุขององค์ประกอบเขย่า
      description: วัสดุของชิ้นส่วนที่ทำให้เกิดเสียงดัง (เช่น ฟัน/กระดิ่ง/ลูกปัด)
        ซึ่งสร้างเสียงหึ่งๆ/เสียงดังกรุ๊งกริ๊งที่เป็นเอกลักษณ์
    rattle_type:
      name: ประเภทเขย่า
      description: ระบุว่าเหยื่อล่อมีลูกปัดเสียงหรือห้องเสียงภายในหรือไม่ และถ้ามี
        ให้ใช้ลูกปัดเสียงแบบใด
    rc_airship_lifting_gas_type:
      name: ประเภทแก๊สยกเรือเหาะ RC
      description: ระบุว่าตัวเรือเหาะ/บอลลูนนั้นตั้งใจจะบรรจุด้วยก๊าซชนิดใด (ถ้ามี)
    rc_helicopter_control_frequency:
      name: ความถี่ควบคุมเฮลิคอปเตอร์บังคับวิทยุ
      description: แถบความถี่วิทยุที่ใช้ระหว่างวิทยุและเฮลิคอปเตอร์ ซึ่งส่งผลต่อความต้านทานต่อสัญญาณรบกวนและความเข้ากันได้
        (เช่น 2.4 GHz)
    rc_helicopter_stabilization_features:
      name: คุณสมบัติการทรงตัวของเฮลิคอปเตอร์บังคับวิทยุ
      description: แสดงรายการคุณสมบัติช่วยรักษาเสถียรภาพ/ควบคุมการบิน ที่ทำให้การบินง่ายขึ้นหรือเพิ่มขีดความสามารถ
    rc_motorcycle_controller_type:
      name: ประเภทของชุดควบคุมรถจักรยานยนต์วิทยุบังคับ
      description: รูปแบบของตัวควบคุมที่ให้มาด้วย
    rc_plane_takeoff_launch_method:
      name: วิธีการขึ้นบิน/ปล่อยเครื่องบินบังคับวิทยุ
      description: ลักษณะการปล่อยตัว/การขึ้นบินของเครื่องบินโดยทั่วไป มีผลต่อสถานที่และวิธีการใช้งาน
    rc_vehicle_controller_type:
      name: ประเภทตัวควบคุมรถบังคับวิทยุ
      description: ระบุฟอร์มแฟคเตอร์ของผู้ควบคุมที่ใช้ในการควบคุมยานพาหนะ RC
    rc_vehicle_scale:
      name: รถบังคับวิทยุขนาดจำลอง
      description: ระบุอัตราส่วนมาตราส่วน (ระดับขนาด) ของรถบังคับวิทยุ (เช่น 1:10,
        1:16)
    rc_vehicle_terrain_type:
      name: รูปแบบภูมิประเทศของรถบังคับวิทยุ
      description: ระบุภูมิประเทศหลักที่รถบังคับวิทยุ/รถบรรทุกได้รับการออกแบบมาเพื่อใช้งาน
    reach_adjustment_type:
      name: ประเภทการปรับระยะเอื้อม
      description: ระบุว่าระยะห่างระหว่างใบคันโยกกับแฮนด์สามารถปรับได้หรือไม่ และหากปรับได้
        การปรับนั้นไม่ต้องใช้เครื่องมือหรือต้องใช้เครื่องมือ
    rear_axle_spacing:
      name: ระยะห่างของเพลาหลัง
      description: ดรอปเอาท์/แกนล้อ จุดที่ด้านหลังของ Frame ออกแบบมาเพื่อรองรับ ซึ่งส่งผลต่อความเข้ากันได้ของล้อ
    rear_axle_standard:
      name: มาตรฐานเพลาล้อหลัง
      description: ระบุรูปแบบ/อินเตอร์เฟซของเพลาล้อหลังที่ใช้ (เช่น แบบปลดเร็ว, เพลาแบบทะลุขนาดต่างๆ)
    rear_axle_type:
      name: ประเภทเพลาหลัง
      description: ระบุระบบยึดและเส้นผ่านศูนย์กลางเพลาที่ใช้ในการยึดล้อหลังเข้ากับเฟรม
    rear_coverage:
      name: การปกปิดด้านหลัง
      description: ระบุว่ากางเกงบิกินี่ปกปิดบั้นท้ายมากน้อยแค่ไหน (เช่น แบบเว้าสูง
        หรือแบบปิดมิดชิด)
    rear_opening_type:
      name: แบบเปิดด้านหลัง
      description: อธิบายรูปแบบการเข้าถึงด้านหลังหรือ "ช่องเปิดสำหรับก้น" เพื่อความสะดวกในการใช้งานในห้องน้ำ
        เช่น ฝารองนั่งแบบพับลง หรือซิปด้านหลังแบบเต็มตัว
    rear_seat_configuration:
      name: การจัดวางเบาะหลัง
      description: ระบุการกำหนดค่าของชุดประกอบเบาะหลังเพื่อรองรับการเลือกอุปกรณ์และการตกแต่งภายในไลเอาต์
    rear_view_mirror_ornament_attachment_type:
      name: ประเภทอุปกรณ์ตกแต่งกระจกมองหลัง
      description: ระบุวิธีการยึดติดอุปกรณ์ตกแต่งกับก้านหรือตัวเรือนกระจกมองหลัง (เช่น
        ห่วงเชือก คลิป ตะขอ)
    rearview_mirror_mount_attachment_type:
      name: ประเภทการติดตั้งฐานยึดกระจกมองหลัง
      description: ระบุวิธีการยึดติดของฐานยึดกับชุดกระจกมองหลัง (ตัวกระจกหรือก้านกระจก)
        เช่น ตัวหนีบ คลิป สายรัด แผ่นกาว หรือขายึดแบบขันน็อต
    rebound_board_face_type:
      name: ประเภทของพื้นผิวแผ่นกระดานเด้งกลับ
      description: อธิบายถึงลักษณะพื้นผิวที่กำหนดพฤติกรรมการเด้งกลับ เช่น พื้นผิวเรียบ
        พื้นผิวเอียง หรือพื้นผิวหลายด้าน
    rebound_level:
      name: ระดับการกระดอน
      description: ระบุว่าลูกบอลจะกระดอนกลับมากน้อยแค่ไหนหลังจากการกระทบกับผนัง ช่วยให้ผู้ใช้เลือกได้ระหว่างแบบที่ไม่กระดอนและแบบที่กระดอนปานกลาง
    rebound_surface_configuration:
      name: รูปแบบพื้นผิวการกระดอน
      description: ระบุรูปแบบของพื้นผิวรับลูกและลักษณะการกระดอนที่คาดการณ์ได้ (ด้านเดียว
        สองด้าน หรือหลายด้าน; คาดการณ์ได้หรือไม่คาดการณ์ได้)
    rebounder_design:
      name: การออกแบบรีบาวน์เดอร์
      description: กำหนดลักษณะโครงสร้างหรือการกำหนดค่าพื้นผิวเด้งกลับของสินค้า
    rebounder_design_type:
      name: ประเภทการออกแบบรีบาวน์เดอร์
      description: ระบุกลไกการเด้งกลับหลักหรือรูปแบบโครงสร้างของเทรนเนอร์ (เช่น ฐานยางยืด
        ตาข่าย Frame ร้านป๊อปอัพ เป้าหมาย)
    rebounder_sides:
      name: ด้านข้างของรีบาวน์เดอร์
      description: ระบุว่าผู้รับลูกรีบาวด์สามารถรับลูกจากด้านเดียวหรือทั้งสองด้านได้หรือไม่
    rebounding_mechanism_type:
      name: ประเภทกลไกการเด้งกลับ
      description: ระบุเทคโนโลยีที่ใช้ในการส่งลูกฮอกกี้หรือลูกบอลกลับ (เช่น กันชนยาง
        เชือกยางยืด)
    recipient_relationship:
      name: ความสัมพันธ์ของผู้รับ
      description: ระบุความสัมพันธ์ของผู้รับ (เช่น แม่ พ่อ เพื่อน) สำหรับการ์ดอวยพร
    recliner_control_type:
      name: ประเภทการควบคุมเก้าอี้ปรับเอน
      description: ระบุวิธีการใช้งานกลไกการปรับเอน (เช่น คันโยกแบบแมนนวล แผงปุ่มกดไฟฟ้า
        รีโมท)
    recliner_motion_type:
      name: ประเภทการเคลื่อนไหวของเก้าอี้ปรับเอน
      description: กำหนดความสามารถในการเคลื่อนไหวหลักของเก้าอี้ปรับเอน (เช่น เก้าอี้โยก
        เก้าอี้เลื่อน เก้าอี้หมุน เก้าอี้ติดผนัง เก้าอี้ยก)
    reclining_mechanism:
      name: กลไกการปรับเอน
      description: ระบุกลไกที่ใช้ในการปรับ Functions โซฟา
    recommended_candle_format:
      name: รูปแบบแท่งเทียนที่แนะนำ
      description: ระบุรูปแบบเทียนที่แนะนำสำหรับแถบกาวติดไส้เทียนเหล่านี้
    recommended_container_type:
      name: ประเภทภาชนะที่แนะนำ
      description: วัสดุภาชนะที่แนะนำ/ปลอดภัยสำหรับเทียนไขเจล
    recommended_fabric_type:
      name: ประเภทผ้าที่แนะนำ
      description: ผ้าที่แนะนำเพื่อให้ได้ผลลัพธ์ที่ดีที่สุดเมื่อใช้แพทเทิร์นการเย็บนี้
    recommended_fabric_weight:
      name: น้ำหนักผ้าที่แนะนำ
      description: แสดงหมวดหมู่น้ำหนักผ้าที่แนะนำสำหรับแพทเทิร์นนี้
    recommended_food_pairing:
      name: อาหารที่แนะนำให้ทานคู่กัน
      description: ระบุโปรตีนหลักหรืออาหารที่เหมาะกับซอสนี้ (เช่น ไก่ หมู เนื้อ ปลา
        ผัก)
    recommended_lane_condition:
      name: สภาพเลนที่แนะนำ
      description: ระบุลายน้ำมันหรือเลนสำหรับสินค้าที่ลูกได้รับการออกแบบ
    recommended_motor_impulse_class:
      name: ระดับแรงขับมอเตอร์ที่แนะนำ
      description: ระบุระดับอิมพัลส์รวมของมอเตอร์จรวดจำลองที่แนะนำสำหรับการบินที่ปลอดภัยและเหมาะสม
    recommended_reading_level:
      name: ระดับการอ่านที่แนะนำ
      description: ระบุระดับ/ความสามารถในการอ่านที่แนะนำสำหรับสินค้า เพื่อช่วยให้นักช้อปจับคู่กับพัฒนาการการอ่านของเด็กในปัจจุบัน
    recommended_sleep_position:
      name: ท่านอนที่แนะนำ
      description: ระบุว่าที่นอนนั้นออกแบบมาเพื่อรองรับท่าทางการนอนแบบใดได้อย่างสบาย
        (เช่น ผู้ที่นอนตะแคงหรือนอนหงาย)
    recommended_storage:
      name: การเก็บรักษาที่แนะนำ
      description: ระบุวิธีการเก็บรักษาผลิตภัณฑ์เพื่อคงความสดใหม่
    recommended_surfaces:
      name: พื้นผิวที่แนะนำ
      description: ระบุพื้นผิว/ประเภทวัสดุที่กาวออกแบบมาให้ใช้งานได้ นอกเหนือจากงานประดิษฐ์ทั่วไป
        (เช่น ใช้ได้เฉพาะกระดาษหรือใช้ได้กับหลายพื้นผิว)
    recommended_use_case:
      name: กรณีการใช้งานที่แนะนำ
      description: สถานการณ์การใช้งานหลักที่ตั้งใจไว้สำหรับน้ำยาอุดรอยรั่ว (ชั่วคราว/ฉุกเฉิน
        เทียบกับ การซ่อมแซมระยะยาว)
    recommended_use_location:
      name: สถานที่ใช้งานที่แนะนำ
      description: สภาพแวดล้อมที่เหมาะสมสำหรับการติดตั้งกระดานหก (เช่น สนามหลังบ้าน
        หรือ สนามเด็กเล่นเชิงพาณิชย์ เป็นต้น)
    recommended_vehicle_surfaces:
      name: พื้นผิวรถที่แนะนำ
      description: ระบุพื้นผิว/วัสดุของรถที่แปรงนี้ออกแบบมาให้ใช้งานได้อย่างปลอดภัย
        (เช่น เคลือบสีรถ, สีด้าน/สีซาติน, ฟิล์มไวนิล/PPF, กระจก, ล้อ)
    recorder_accessories_included:
      name: อุปกรณ์เสริมเครื่องรีคอร์เดอร์ที่รวมมาในชุด
      description: แสดงรายการอุปกรณ์เสริมที่รวมอยู่ในแพ็คเกจเดียวกับเครื่องดนตรีเบสรีคอร์เดอร์คุณภาพเยี่ยมนี้
    recorder_bore_design:
      name: การออกแบบท่อลมเครื่องรีคอร์เดอร์
      description: การออกแบบรูปทรงรูภายในของตัวเครื่องบันทึกเสียง
    recorder_bore_type:
      name: ประเภทท่อลมเครื่องรีคอร์เดอร์
      description: ระบุรูปแบบรูเจาะของเครื่องบันทึกเสียง
    recorder_case_shell_type:
      name: เคสเครื่องบันทึกเสียงแบบเปลือกหุ้ม
      description: อธิบายถึงความแข็งแรงของโครงสร้างเคส
    recorder_finish:
      name: เครื่องบันทึกเสร็จสิ้น
      description: การตกแต่งพื้นผิว/ทรีตเมนต์ของตัวเครื่องบันทึก (โดยเฉพาะที่เกี่ยวข้องกับเครื่องบันทึกอัลโตแบบไม้)
    recorder_hole_type:
      name: ประเภทรูรีคอร์เดอร์
      description: ไม่ว่ารูเสียงจะเป็นรูเดี่ยว (ไม่มีรูคู่) หรือมีรูคู่เพื่อการวางนิ้วแบบโครมาติกที่ดีขึ้น
    recorder_joint_configuration:
      name: การจัดเรียงข้อต่อของรีคอร์เดอร์
      description: อธิบายจำนวนส่วนประกอบของตัวรีคอร์เดอร์ ซึ่งส่งผลต่อการพกพา การทำความสะอาด
        และการเปลี่ยนชิ้นส่วน
    recorder_joint_style:
      name: รูปแบบข้อต่อเครื่องบันทึก
      description: รูปแบบข้อต่อ/การเชื่อมต่อระหว่างส่วนต่างๆ ของรีคอร์เดอร์ หากมี
    recorder_keywork:
      name: การทำงานของเครื่องบันทึก
      description: ระบุว่ารีคอร์เดอร์นั้นมีคีย์ (กลไกโลหะ/พลาสติก) สำหรับโน้ตเสียงต่ำหรือไม่
        ซึ่งโดยทั่วไปจะพบในรีคอร์เดอร์เทเนอร์/เบส/ขนาดใหญ่
    recorder_mouthpiece_type:
      name: ชนิดของปากเป่าขลุ่ยรีคอร์เดอร์
      description: อธิบายว่าปากเป่า/หัวรีคอร์เดอร์เป็นแบบชิ้นเดียว (รวมเป็นชิ้นเดียว)
        หรือสามารถถอดเปลี่ยนได้
    recorder_pitch_standard_a4:
      name: มาตรฐานระดับเสียงของเครื่องบันทึกเสียง (A4)
      description: ระบุระดับเสียงอ้างอิงที่ใช้ในการสร้างรีคอร์เดอร์ (เช่น A=440 Hz
        ระดับเสียงสมัยใหม่ เทียบกับ A=415 Hz ระดับเสียงบาโรก)
    recorder_thumb_hole_type:
      name: ประเภทรูนิ้วโป้งของขลุ่ยรีคอร์เดอร์
      description: ระบุว่าเครื่องบันทึกเสียงมีรูนิ้วโป้งเดียวหรือสองรู
    recreational_vehicle_holding_tank_type:
      name: ประเภทถังเก็บของเสียสำหรับรถบ้าน
      description: ระบุว่ารถบ้านคันนี้มีถังเก็บของเสียประเภทใดบ้าง
    recreational_vehicle_leveling_system:
      name: ระบบปรับระดับรถบ้าน
      description: ประเภทของระบบปรับระดับ/รักษาเสถียรภาพที่ติดตั้ง
    recycled_material_content:
      name: เนื้อหาเกี่ยวกับ วัสดุรีไซเคิล
      description: ระบุสัดส่วนของเสื้อผ้าที่ทำจากเส้นใยหรือเส้นด้ายรีไซเคิล
    reed_dent_material:
      name: วัสดุสำหรับทำซี่หวีทอผ้า
      description: วัสดุของซี่หวีทอผ้า (ส่วนที่แยกปลายเส้นด้ายยืน) ซึ่งส่งผลต่อความทนทานและการเสียดสีของเส้นด้าย
    reed_type:
      name: ประเภทของลิ้นเป่า
      description: ระบุประเภทโครงสร้างของลิ้นเป่าที่ใช้สำหรับส่วนเป่าหลักและส่วนเป่ารองของปี่สกอต
    reeds_included:
      name: ลิ้นเป่าที่รวมอยู่ในชุด
      description: ระบุว่าชุดปี่สก็อตแบบ Great Highland ประกอบด้วยลิ้นปี่แบบใดบ้าง
        (ลิ้นปี่สำหรับเสียงสูง และ/หรือ ลิ้นปี่สำหรับเสียงต่ำ) และระบุว่าเป็นลิ้นปี่ที่ทำจากอ้อยหรือสังเคราะห์
    reefing_method:
      name: วิธีการลดขนาดใบเรือ
      description: ระบุกลไก (ถ้ามี) สำหรับลดหรือเก็บใบเรือขณะอยู่บนน้ำ
    reel_profile:
      name: ลักษณะโครงสร้างรอก
      description: จำแนกประเภทโครงสร้าง/ลักษณะของตัวรอกเบทคาสติ้ง
    reel_seat_material:
      name: วัสดุที่ใช้ทำฐานยึดรอก
      description: ระบุวัสดุที่ใช้ในการผลิตฐานยึดรอก ซึ่งส่งผลต่อ น้ำหนัก ความไว และความต้านทานการกัดกร่อน
    reel_seat_type:
      name: ประเภทฐานยึดรอก
      description: ระบุรูปแบบกลไกการล็อกที่ใช้ยึดรอกตกปลาเข้ากับคันเบ็ด
    reel_size_class:
      name: ขนาดของรอก
      description: ขนาดที่ผู้ผลิตกำหนด (เช่น 1000, 3000, 5000) ซึ่งบ่งบอกถึงความจุของสปูลและโครงสร้างโดยรวมของรอก
    referee_wallet_accessories_included:
      name: อุปกรณ์เสริมที่พร้อมกระเป๋าผู้ตัดสิน
      description: แสดงรายการรายการพิเศษชุดกับผู้ตัดสินกระเป๋าเงินดิจิทัล เช่น สีเหลือง/สีเหลืองมัส
        แผ่นคะแนน หรือเครื่องมือการเขียน ดังนั้นหลายๆ คนจึงรู้ว่ากระเป๋าเงินดิจิทัลขายเป็นกระเป๋าถือที่สมบูรณ์หรือไม่
    refinement_level:
      name: ระดับความละเอียด
      description: บ่งบอกถึงระดับการกลั่นที่น้ำมันได้รับการปรับปรุง ซึ่งส่งผลต่อรสชาติ
        สี คุณค่าทางโภชนาการ และจุดเกิดควัน
    reflective_finish:
      name: พื้นผิวสะท้อนแสง
      description: ระบุการเคลือบพื้นผิวสะท้อนแสงของลูกบอลดิสโก้ (เช่น กระเบื้องกระจกเทียบกับเอฟเฟกต์โฮโลแกรม/สีรุ้ง)
    reflective_or_glow_effect:
      name: เอฟเฟกต์สะท้อนแสงหรือเรืองแสง
      description: ระบุว่าลูกบอลเสาอากาศมีคุณสมบัติในการเพิ่มการมองเห็นหรือไม่ เช่น
        วัสดุสะท้อนแสง เรืองแสงในที่มืด หรือมีองค์ประกอบเรืองแสง/LED
    reflective_tape_pattern:
      name: ลวดลายเทปสะท้อนแสง
      description: อธิบายลักษณะการติดแถบสะท้อนแสงบนเสื้อผ้าเพื่อให้เป็นไปตามข้อกำหนดด้านการมองเห็น
    regulation_standard:
      name: มาตรฐานข้อบังคับ
      description: ระบุขนาด/การรับรองตามมาตรฐานอย่างเป็นทางการหรือหน่วยงานกำกับดูแลที่ตาข่ายนั้นตรงตามข้อกำหนด
    regulator_diaphragm_material:
      name: วัสดุของไดอะแฟรมควบคุมแรงดัน
      description: ระบุวัสดุของไดอะแฟรม ซึ่งมีผลต่อความเข้ากันได้กับเชื้อเพลิง/เอทานอล
        (เช่น E85) และความทนทาน
    regulator_port_thread_standard:
      name: พอร์ตเรกูเลเตอร์มาตรฐาน
      description: ระบุมาตรฐานเกลียว/การเชื่อมต่อที่ใช้กับตัวควบคุมแรงดันสำหรับพอร์ตทางเข้า/ทางออก/ทางกลับ
    rein_features:
      name: คุณสมบัติของสายบังเหียน
      description: เน้นคุณสมบัติพิเศษด้านการใช้งานหรือความปลอดภัยที่มีอยู่ในสายบังเหียน
    rein_style:
      name: รูปแบบสายบังเหียน
      description: ระบุโครงสร้างหรือรูปแบบของสายบังเหียน ทำให้ผู้ขี่สามารถเลือกประเภทที่เหมาะสมกับประเภทการขี่และความชอบส่วนตัวได้
    reinforced_areas:
      name: พื้นที่เสริมแรง
      description: ระบุว่าส่วนใดของเสื้อผ้าได้รับการเสริมความแข็งแรงเพื่อความทนทานต่อการเสียดสี
    reinforcement_type:
      name: ประเภทการเสริมแรง
      description: การเสริมแรงโครงสร้างที่ใช้ในท่อหม้อน้ำเพื่อเพิ่มความแข็งแรงและทนต่ออุณหภูมิ/ความดัน
    release_activation_method:
      name: วิธีการเปิดใช้งานการปล่อย
      description: ระบุวิธีการที่นักยิงธนูใช้เปิดใช้งานอุปกรณ์ช่วยปล่อยลูกธนู
    release_bearing_material:
      name: วัสดุแบริ่งแบบปลด
      description: วัสดุหลักของส่วนประกอบแบริ่ง/หน้าสัมผัส (ตามที่ผู้ผลิตกำหนด)
    release_jaw_style:
      name: ลักษณะของหัวปล่อยลูกธนู
      description: อธิบายถึงการออกแบบของก้ามปูหรือขอเกี่ยวของหัวปล่อย
    release_strap_type:
      name: ประเภทของสายรัดปล่อยลูกธนู
      description: ระบุสายรัดหรือระบบเชื่อมต่อที่มาพร้อมกับอุปกรณ์ช่วยปล่อยลูกธนู
    remote_control_airship_envelope_material:
      name: วัสดุหุ้มเรือเหาะควบคุมระยะไกล
      description: ระบุวัสดุหลักของตัวเรือเหาะ/เรือบิน (ถุงแก๊ส) ซึ่งแตกต่างจากวัสดุโดยรวมของของเล่น
    remote_control_motorcycle_scale:
      name: สเกลของรถจักรยานยนต์บังคับวิทยุ
      description: ระบุสัดส่วนโมเดลของรถจักรยานยนต์บังคับวิทยุเมื่อเทียบกับรถจริง
    remote_control_motorcycle_terrain_suitability:
      name: ความเหมาะสมของรถจักรยานยนต์บังคับวิทยุต่อสภาพภูมิประเทศ
      description: ภูมิประเทศหลักที่รถจักรยานยนต์บังคับวิทยุได้รับการออกแบบมาให้ใช้งาน
    remote_control_motorcycle_water_resistance:
      name: ความสามารถในการกันน้ำของรถจักรยานยนต์บังคับวิทยุ
      description: ระดับการป้องกันน้ำสำหรับรถจักรยานยนต์ RC ผลิตภัณฑ์อิเล็กทรอนิกส์
    remote_control_plane_kit_completion_level:
      name: เครื่องบินควบคุมระยะไกลสำหรับการสอบสวนระดับงาน
      description: ระบุว่ามีอะไรบ้างและชุดนั้นครบถ้วนสมบูรณ์แค่ไหน (เช่น พร้อมบินได้ทันที
        หรือ ต้องซื้อเครื่องส่งสัญญาณ/เครื่องรับสัญญาณ/แบตเตอรี่แยกต่างหาก)
    remote_control_plane_landing_gear_type:
      name: แบบล้อลงจอดของเครื่องบินบังคับวิทยุ
      description: ระบุรูปแบบการจัดวางล้อลงจอด ซึ่งส่งผลต่อความทนทานและพื้นผิวการขึ้น/ลงจอด
    remote_control_plane_power_type:
      name: ประเภทพลังงานของเครื่องบินควบคุมระยะไกล
      description: ระบุแหล่งพลังงาน/ระบบขับเคลื่อนของเครื่องบิน (ไฟฟ้า เทียบกับ เครื่องยนต์สันดาปภายใน/แก๊ส/ไนโตร)
        ซึ่งส่งผลต่อการบำรุงรักษา เสียง และสถานที่ที่สามารถบินได้
    remote_control_watercraft_features:
      name: คุณสมบัติของเรือบังคับวิทยุ
      description: เน้นคุณสมบัติสำคัญเฉพาะของเรือบังคับวิทยุที่มีผลต่อการใช้งานและความทนทาน
    remote_control_watercraft_propulsion_drive_type:
      name: ประเภทการขับเคลื่อน/ระบบส่งกำลังของเรือบังคับวิทยุ
      description: ระบุวิธีการขับเคลื่อนเรือบังคับวิทยุในน้ำ
    remote_control_watercraft_water_environment:
      name: สภาพแวดล้อมทางน้ำของเรือบังคับวิทยุ
      description: ระบุปริมาณน้ำที่ต้องการสำหรับสินค้าที่เรือ RC ทำงานได้ดีที่สุด
    remote_keyless_system_programming_method:
      name: วิธีการตั้งโปรแกรมระบบกุญแจรีโมทแบบไร้สาย
      description: วิธีการตั้งค่าหรือจับคู่รีโมท/ระบบกับรถยนต์ (เช่น ขั้นตอนในรถยนต์เทียบกับเครื่องมือสำหรับมืออาชีพ)
    repair_compound_type:
      name: ประเภทของสารซ่อมแซม
      description: ประเภท/สูตรของวัสดุซ่อมแซมที่ใช้แล้วหมดไป (เช่น วัสดุอุดรอยแตกตัวถังรถยนต์,
        เรซินสำหรับกระจกหน้ารถ, กาว/สารอุดรอยรั่วยาง)
    repair_kit_components:
      name: ส่วนประกอบของชุดซ่อม
      description: แสดงรายการอุปกรณ์เฉพาะที่รวมอยู่ในชุดซ่อม ทำให้ผู้ซื้อเข้าใจเนื้อหาและเปรียบเทียบชุดสินค้าได้
    repair_method:
      name: วิธีการซ่อมแซม
      description: ระบุวิธีการซ่อมหลักที่ชุดซ่อมนี้ใช้ เช่น แผ่นแปะกาว หรือการเปลี่ยนวาล์ว
    replacement_part_purpose:
      name: วัตถุประสงค์ของชิ้นส่วนอะไหล่
      description: ระบุว่ารายการเป็นอะไหล่ทดแทน OEM, การอัพเกรด/อะไหล่ หรืออุปกรณ์เสริม
    replacement_part_type:
      name: ประเภทอะไหล่ทดแทน
      description: ระบุประเภทการใช้งานของชิ้นส่วนเครื่องออกกำลังกายแบบวงรี ช่วยให้สามารถกรองหาชิ้นส่วนที่ต้องการได้
    replacement_parts_availability:
      name: ความพร้อมของอะไหล่
      description: ระบุว่ามีอะไหล่สิ้นเปลือง/อะไหล่เปลี่ยนได้สำหรับอุปกรณ์ร้อยด้ายหรือไม่
        (เช่น ตะขอ/ลวดสำรอง)
    replica_gun_action_type:
      name: ปืนจำลองแบบกลไก
      description: ระบุประเภทการทำงาน/กลไกของปืนจำลอง (ตามที่แสดง) เช่น ระบบลูกเลื่อน
        หรือระบบคันโยก
    replica_gun_firing_mechanism:
      name: กลไกการยิงปืนจำลอง
      description: ระบุว่าโมเดลนี้สามารถจำลองการยิงหรือเอฟเฟกต์ต่างๆ (ที่ไม่เป็นอันตราย)
        ได้หรือไม่ และทำงานอย่างไร
    replica_gun_moving_parts:
      name: ชิ้นส่วนขยับได้ของปืนจำลอง
      description: ระบุว่าส่วนใดบ้างที่ใช้งานได้/เคลื่อนไหวได้ในแบบจำลอง
    reservoir_orientation:
      name: การวางตำแหน่งถุงเก็บน้ำ
      description: ระบุทิศทางหรือรูปทรงที่ต้องการของกระเพาะปัสสาวะภายใน
    reservoir_type:
      name: ประเภทอ่างเก็บน้ำ
      description: รูปแบบโครงสร้างอ่างเก็บน้ำสำหรับแม่ปั๊มคลัตช์
    resin_suitability:
      name: ความเหมาะสมกับเรซิน
      description: ระบุว่าลูกแฮนด์บอลนั้นออกแบบมาเพื่อใช้กับเรซิน (กาว) หรือไม่ หรือว่าไม่ใช้เรซิน
    resistance_adjustability:
      name: การปรับความต้านทาน
      description: ระบุว่าผู้ใช้สามารถเปลี่ยนแปลงค่าความต้านทานการหายใจได้หรือไม่
    resistance_band_design:
      name: การออกแบบแถบต้านทาน
      description: อธิบายรูปทรงหรือรูปแบบของยางยืดออกกำลังกาย (เช่น แบบห่วง แบบท่อมีหูจับ
        แบบเลข 8) ช่วยให้ผู้ซื้อเลือกดีไซน์ที่เหมาะสมกับกิจวัตรการออกกำลังกายของตนได้
    resistance_loading_type:
      name: ประเภทการรับแรงต้านทาน
      description: ระบุวิธีการให้แรงต้าน/น้ำหนัก หรือการโหลดน้ำหนักลงบนเครื่องสมิธ
        (เช่น แบบใช้แผ่นน้ำหนัก หรือแบบปรับน้ำหนักได้)
    response_fields_included:
      name: ช่องสำหรับตอบกลับประกอบด้วย
      description: ระบุว่าช่อง/ตัวเลือกการตอบมาตรฐานใดบ้างที่มีอยู่ในบัตรตอบ (เช่น
        ยอมรับ/ปฏิเสธ การเลือกอาหาร)
    restoration_status:
      name: สถานะการบูรณะ
      description: ระบุว่ารถตู้คันนั้นอยู่ในสภาพเดิม บูรณะใหม่ ปรับแต่งใหม่ หรืออยู่ในสภาพที่ต้องปรับปรุงแก้ไข
    rhinestone_base_color_family:
      name: กลุ่มสีพื้นฐานของพลอยเทียม
      description: ระบุตระกูลสีของฐานพลอยเทียม (เช่น สีเหลือง/คริสตัล, สีทอง/สีเหลือง,
        สีฟ้า)
    rhinestone_facet_style:
      name: รูปแบบเหลี่ยมมุมของพลอยเทียม
      description: รูปแบบเหลี่ยมมุมของพลอยเทียมส่งผลต่อความแวววาวและรูปลักษณ์ (เช่น
        เหลี่ยมกุหลาบซิเลียน เหลี่ยมเจียระไนแบบบริลเลียนต์ เหลี่ยมมุม หรือ ผิวเรียบ)
    rhinestone_hole_reinforcement_material:
      name: วัสดุเสริมความแข็งแรงสำหรับรูพลอยเทียม
      description: วัสดุบริเวณรูเจาะ (เช่น ห่วงโลหะ พลาสติกขึ้นรูป) ซึ่งมีผลต่อความทนทานระหว่างการเย็บ
    rhinestone_setting_type:
      name: ประเภทการตั้งค่าพลอยเทียม
      description: วิธีการติดตั้ง/ยึดขอบพลอยเพื่อการเย็บ (เช่น การติดตั้งแบบหนามเตย
        การติดตั้งแบบขอบล้อม การติดตั้งแบบมีขอบ)
    rhubarb_product_cut_type:
      name: รูบาร์บ สินค้า ชนิดตัด
      description: อธิบายการเตรียมทางกายภาพหรือการตัดผักชนิดหนึ่ง สินค้า
    ribbon_construction:
      name: โครงสร้างริบบิ้น
      description: อธิบายคุณลักษณะสำคัญของโครงสร้างริบบิ้นกรอสเกรน เช่น การมีลวดหรือความยืดหยุ่น
        ซึ่งส่งผลต่อการใช้งาน (เช่น การทำโบว์เทียบกับการเย็บ)
    ribbon_packaging_type:
      name: ประเภทบรรจุภัณฑ์ของริบบิ้น
      description: ระบุวิธีการจัดจำหน่าย/ขายริบบิ้น
    ribbon_pattern_style:
      name: รูปแบบริบบิ้น
      description: จำแนกประเภทวิธีการสร้างลวดลายที่ใช้กันทั่วไปบนริบบิ้นผ้ากรอสเกรน
    ribbon_sheen_level:
      name: ระดับความเงาของริบบิ้น
      description: บ่งบอกถึงความเงางามของพื้นผิวริบบิ้นผ้าซาติน
    ribbon_style:
      name: สไตล์ริบบิ้น
      description: ระบุรูปแบบ/สไตล์ของริบบิ้น (เช่น สีพื้น ลายทาง สามสี)
    ribbon_trim_backing_type:
      name: ประเภทริบบิ้น/วัสดุตกแต่งด้านหลัง
      description: ระบุว่าผ้าหมึก/ขอบมีแผ่นรองด้านหลังหรือไม่ และเป็นแบบใด (สำหรับการใช้งานแบบง่าย)
    ribbon_trim_edge_finish:
      name: การตกแต่งขอบด้วยริบบิ้น/ขอบตกแต่ง
      description: อธิบายลักษณะการสร้าง/การตกแต่งขอบของริบบิ้น/วัสดุตกแต่ง (มีประโยชน์สำหรับลักษณะการลุ่ยและวัตถุประสงค์การใช้งาน)
    ric_rac_wave_size:
      name: ขนาดคลื่นริค-แร็ก
      description: อธิบายความกว้างของคลื่น/ขยายสเกลของ ric-rac (ขนาดของซิกแซก/คลื่น)
    rice_grain_length:
      name: ความยาวของเมล็ดข้าว
      description: จำแนกประเภทผลิตภัณฑ์ข้าวตามความยาวของเมล็ด เช่น เมล็ดสั้น เมล็ดกลาง
        หรือเมล็ดยาว ซึ่งมีผลต่อลักษณะการหุงและการนำไปใช้ในการประกอบอาหาร
    rice_processing_method:
      name: วิธีการแปรรูปข้าว
      description: อธิบายถึงวิธีการแปรรูปหรือเตรียมข้าว (เช่น ข้าวต้ม ข้าวงอก ข้าวเกล็ด)
        ซึ่งส่งผลต่อเวลาในการหุง คุณค่าทางโภชนาการ และการใช้งาน
    rice_variety:
      name: พันธุ์ข้าว
      description: ระบุพันธุ์หรือสายพันธุ์ข้าวที่เฉพาะเจาะจง ช่วยให้สามารถเลือกเมล็ดข้าวที่มีรสชาติ
        กลิ่น เนื้อสัมผัส และลักษณะการทำอาหารที่ต้องการได้
    riding_toy_features:
      name: ของเล่นสำหรับขี่ มีคุณสมบัติ
      description: เน้นคุณสมบัติการใช้งาน/ความปลอดภัยทั่วไปที่พบได้ในของเล่นสำหรับขี่
    rifle_action_type:
      name: ปืนไรเฟิลแบบกลไก
      description: กลไกการทำงานของปืนไรเฟิล (วิธีการบรรจุ/ยิง/ดีดปลอกกระสุน) มีความสำคัญต่อการระบุรุ่นและเป็นที่สนใจของนักสะสม
    rifle_finish:
      name: ปืนไรเฟิล
      description: การตกแต่งผิวภายนอกขั้นต้นของชิ้นส่วนโลหะ
    rifle_magazine_type:
      name: แม็กกาซีนปืนไรเฟิล
      description: ประเภทระบบป้อนกระสุนสำหรับปืนไรเฟิล
    rifle_stock_material:
      name: วัสดุสำหรับพานท้ายปืนไรเฟิล
      description: วัสดุหลักที่ใช้สำหรับพานท้ายปืน/ส่วนประกอบต่างๆ (เช่น ไม้วอลนัท
        โพลีเมอร์)
    rim_clamping_method:
      name: วิธีการยึดขอบล้อ
      description: วิธีที่เครื่องจักรยึดล้อ/ขอบล้อให้แน่นระหว่างการติดตั้งและถอดออก
    rim_strip_type:
      name: ประเภทของเทปรองขอบล้อ
      description: จำแนกแถบ/เทปตามรูปแบบ โครงสร้าง หรือการใช้งานเฉพาะ (เช่น เทปพันขอบล้อแบบไม่มียางใน
        กับ แถบยางป้องกัน)
    rim_tubeless_compatibility:
      name: ขอบล้อที่รองรับยางแบบไม่ใช้ยางใน
      description: ระบุว่าขอบล้อ เทป หรือล้อนั้นได้รับการออกแบบมาสำหรับใช้กับยางแบบไม่ใช้ยางในหรือไม่
    ripeness_stage:
      name: ระยะสุกงอม
      description: ระบุระดับความสุกของผลไม้ ณ เวลาที่จำหน่าย (เช่น ยังไม่สุก สุก พร้อมรับประทาน)
    riser_pad_type:
      name: แผ่นรองยกสูง
      description: จำแนกประเภทการใช้งานของแผ่นรอง (เช่น แผ่นรองมาตรฐาน, แผ่นรองกันกระแทก,
        แผ่นรองทรงลิ่มเอียง)
    roasted_malt_processing_type:
      name: ประเภทการแปรรูปมอลต์คั่ว
      description: วิธีการประมวลผลเฉพาะหรือรับสัญญาณสินค้าที่ใช้ในการสร้างมอลต์คั่วหรือเมล็ดคั่ว
        (เช่น ข้าวบาร์เลย์คั่วที่ไม่มอลต์, สีดำมอลต์, เดบิตหรือเอาเปลือกออก)
    robotic_toy_interaction_mode:
      name: Modeการโต้ตอบของเล่นหุ่นยนต์
      description: อธิบายวิธีการหลักที่หุ่นยนต์โต้ตอบหรือเคลื่อนไหวระหว่างการเล่น
    robotic_toy_light_features:
      name: คุณสมบัติไฟของของเล่นหุ่นยนต์
      description: ระบุว่าของเล่นนั้นใช้แสงเป็นส่วนหนึ่งของการเล่นหรือไม่ และใช้อย่างไร
        (เช่น ไฟ LED, การฉายภาพ)
    robotic_toy_programming_supported:
      name: รองรับการเขียนโปรแกรมของเล่นหุ่นยนต์
      description: ระบุวิธีการเขียนโปรแกรมที่ของเล่นรองรับ (ถ้ามี)
    robotic_toy_skill_level:
      name: ระดับทักษะของเล่นหุ่นยนต์
      description: บ่งบอกถึงระดับความซับซ้อนของการใช้งาน/การเขียนโปรแกรมที่คาดหวังจากผู้ใช้
    robotic_toy_sound_features:
      name: คุณสมบัติเสียงของของเล่นหุ่นยนต์
      description: ระบุความสามารถด้านเสียงของของเล่นหุ่นยนต์
    rod_butt_style:
      name: สไตล์ปลายคันเบ็ด
      description: อธิบายรูปแบบปลายด้ามคันเบ็ดที่ใช้ในการตกปลาแบบลากเหยื่อ
    rod_construction_type:
      name: ประเภทโครงสร้างของคันเบ็ด
      description: บ่งบอกถึงรูปแบบการสร้างโดยรวมของคันเบ็ดในแง่ของจำนวนชิ้นส่วนและความสามารถในการพับเก็บได้
    rod_guide_material:
      name: วัสดุตัวนำคันเบ็ด
      description: ระบุวัสดุที่ใช้สำหรับตัวนำสายหรือส่วนแทรกของคันเบ็ด ซึ่งส่งผลต่อความทนทาน
        น้ำหนัก และแรงเสียดทานของสาย
    rod_guide_type:
      name: ประเภทไกด์คันเบ็ด
      description: ระบุรูปแบบหลักของตัวนำสายที่ติดตั้งบนคันเบ็ด
    rod_handle_type:
      name: ประเภทด้ามจับคันเบ็ด
      description: ระบุลักษณะการจับของคันเบ็ดตกปลา เพื่อช่วยให้จับถนัดมือและเลือกใช้เทคนิคได้เหมาะสมยิ่งขึ้น
    roll_cage_tubing_material:
      name: วัสดุท่อโครงเหล็กกันกระแทก
      description: ระบุวัสดุ/โลหะผสมของท่อที่ใช้สำหรับโครงเหล็กกันกระแทก/เหล็กกันพลิกคว่ำ
        (เช่น เหล็ก DOM เทียบกับเหล็กโครโมลี 4130)
    roller_skate_brake_shape:
      name: รูปทรงเบรกของรองเท้าสเก็ต
      description: อธิบาย Shapesเรขาคณิต /โปรไฟล์ของหัวเบรกเพื่อประสิทธิภาพหรือความสวยงามในการกำหนดลักษณะ
    roller_skate_brake_type:
      name: ประเภทเบรกของรองเท้าสเก็ต
      description: ระบุระบบเบรกที่ใช้ในรองเท้าสเก็ต
    roller_ski_technique:
      name: เทคนิคการเล่นสกีลูกล้อ
      description: ระบุเทคนิคการเล่นสกีข้ามประเทศที่โรลเลอร์สกีได้รับการออกแบบ
    roller_technology:
      name: เทคโนโลยีลูกกลิ้ง
      description: บ่งชี้ถึงเทคโนโลยีแบบบูรณาการที่ช่วยเพิ่มประสิทธิภาพการนวด เช่น
        การสั่นสะเทือนหรือความร้อน
    rolling_case_wheel_configuration:
      name: การกำหนดค่าล้อเคสกลิ้ง
      description: ระบุรูปแบบการจัดวางล้อที่ใช้กับกล่องใส่คีย์บอร์ดดนตรีแบบมีล้อ
    rolling_paper_format:
      name: รูปแบบกระดาษม้วน
      description: ระบุลักษณะทางกายภาพของผลิตภัณฑ์ (เช่น แผ่นเรียบ กรวยม้วนสำเร็จรูป
        บรรจุภัณฑ์)
    rolling_paper_gum_type:
      name: Paper ม้วนแบบมีกาว
      description: ระบุกาว (หมากฝรั่ง) ที่ใช้บนขอบ Paper สำหรับการปิดผนึก ซึ่งอาจส่งผลต่อ
        Taste และประสิทธิภาพ
    rolling_paper_size:
      name: การกลิ้งเรื่องของกระดาษ
      description: ระบุขนาดมาตรฐานของกระดาษม้วนบุหรี่หรือกรวย ทำให้ผู้ซื้อสามารถเลือกความกว้าง/ความยาวที่เหมาะสมกับความต้องการได้อย่างรวดเร็ว
    rolling_stock_type:
      name: ประเภทของรถไฟ
      description: ระบุประเภทของรถไฟ/ยานพาหนะทางรางที่เป็นแบบจำลอง (หัวรถจักร เทียบกับ
        รถโดยสาร/รถขนส่งสินค้า และประเภทย่อยของรถทั่วไป)
    roof_cargo_net_hook_fastener_style:
      name: แบบตะขอ/ตัวยึดสำหรับตาข่ายบรรทุกสัมภาระบนหลังคา
      description: ระบุรูปแบบของอุปกรณ์ยึดปลายที่ใช้เชื่อมต่อตาข่ายกับจุดยึด (เช่น
        ตะขอรูปตัว S, คาราบิเนอร์, ตะขอรูปตัว J)
    roof_height_class:
      name: ระดับความสูงของหลังคา
      description: จัดประเภทความสูงของหลังคาที่ใช้กันทั่วไปสำหรับรถตู้ (โดยเฉพาะอย่างยิ่งสำหรับงานดัดแปลง/สร้างรถบ้าน)
    roof_type:
      name: ประเภทหลังคา
      description: รูปแบบของส่วนหลังคาหรือฝ้าเพดานของโครงสร้างปิด
    root_variety:
      name: พันธุ์ราก
      description: ระบุสายพันธุ์หรือชนิดทั่วไปของราก (เช่น หัวไชเท้าเทียบกับวาซาบิแท้)
    rope_buoyancy:
      name: ความลอยตัวของเชือก
      description: ระบุว่าเชือกนั้นได้รับการออกแบบให้ลอยน้ำได้หรือไม่ เพื่อช่วยให้นักปั่นจักรยานหลีกเลี่ยงการพันกันและทำให้การดึงเชือกกลับง่ายขึ้น
    rope_construction:
      name: โครงสร้างเชือก
      description: ระบุรายละเอียดโครงสร้างของเส้นใยที่นอกเหนือจากรูปแบบการถัก เช่น
        แกน/ปลอกแบบบิดหรือแบบถัก และเชือกเป็นแบบเคอร์นแมนเทิลหรือไม่
    rope_material:
      name: วัสดุเชือก
      description: ระบุวัสดุของเชือก/สายสำหรับปรับเสียง
    rope_strand_compatibility:
      name: ความเข้ากันได้ของเส้นใยเชือก
      description: แสดงว่าอุปกรณ์ควบคุมการปีนสามารถรองรับการจัดเรียงเชือกแบบใด (เส้นเดี่ยว,
        เส้นครึ่ง/คู่, เส้นคู่ หรือแบบผสม)
    rope_stretch_type:
      name: เชือกยืดได้
      description: อธิบายคุณลักษณะการยืดตัวของเชือก โดยแยกแยะระหว่างเชือกที่ไม่ยืด
        เชือกยืดน้อย เชือกมาตรฐาน และเชือกบันจี้
    rose_bloom_stage:
      name: ระยะการบานของดอกกุหลาบ
      description: บ่งบอกว่าดอกกุหลาบบานเมื่อส่ง/มาถึงอย่างไร (ตูมเพื่อเปิดเต็มที่)
    rose_grade:
      name: เกรดกุหลาบ
      description: กุหลาบตัดดอกคุณภาพระดับเชิงพาณิชย์
    rosette_center_type:
      name: แบบศูนย์กลางรูปดอกกุหลาบ
      description: ระบุประเภทของรายละเอียดหรือส่วนแทรกตรงกลางด้านหน้าของดอกกุหลาบ
    rosin_dust_level:
      name: ระดับฝุ่นเรซิน
      description: ระบุปริมาณฝุ่นเรซินที่คาดว่าจะเกิดขึ้นระหว่างการใช้งานปกติ
    rosin_formula_additives:
      name: สูตรเรซิน / สารเติมแต่ง
      description: ระบุคุณลักษณะเด่นของสูตร เช่น สูตรที่ไม่ก่อให้เกิดอาการแพ้ สูตรที่มีฝุ่นน้อย
        หรือสูตรที่มีส่วนผสมของโลหะ
    rosin_hardness:
      name: ความแข็งของเรซิน
      description: บ่งบอกถึงความแข็ง/ความอ่อนของยางสนที่ใช้กับคันธนู ซึ่งอาจส่งผลต่อการยึดเกาะและการเกิดฝุ่นผงในสภาพอากาศและสไตล์การเล่นที่แตกต่างกัน
    rotation_mechanism_type:
      name: กลไกการหมุน
      description: ระบุกลไกที่ช่วยให้เชือกหมุน ซึ่งส่งผลต่อความราบรื่นและความเร็วที่ทำได้
        (เช่น ตลับลูกปืนเทียบกับบูช)
    rotation_motion_features:
      name: คุณลักษณะเกี่ยวกับการหมุน/การเคลื่อนที่
      description: ระบุว่าดาวเคราะห์/วงโคจรหมุนรอบตัวเองหรือเคลื่อนที่ และเคลื่อนที่อย่างไร
    rotor_configuration_type:
      name: ประเภทรูปแบบใบพัด
      description: ระบุรูปแบบการจัดเรียงใบพัดและการควบคุมของเฮลิคอปเตอร์บังคับวิทยุ
        (เช่น ใบพัดแกนร่วม ใบพัดเดี่ยวแบบปรับมุมคงที่ เทียบกับ ใบพัดหลายใบแบบปรับมุมได้)
        ซึ่งส่งผลกระทบอย่างมากต่อลักษณะการบินและความเหมาะสมสำหรับระดับทักษะที่แตกต่างกัน
    rotor_construction_type:
      name: ประเภทโครงสร้างใบพัด
      description: ระบุรูปแบบการสร้างใบพัด ซึ่งมีผลต่อ น้ำหนัก ความแข็งแรง และการระบายความร้อน
    rotor_mounting_interface:
      name: อินเทอร์เฟซการติดตั้งใบพัด
      description: กำหนดมาตรฐานอินเทอร์เฟซดุมล้อที่ใช้ในการเชื่อมต่อโรเตอร์เข้ากับล้อ
    rotor_mounting_standard:
      name: มาตรฐานการติดตั้งใบพัด
      description: ระบุมาตรฐานรูปแบบการเชื่อมต่อที่ใช้ในการยึดโรเตอร์เข้ากับดุมล้อ
        (เช่น 6 รู หรือ Center Lock)
    roulette_set_components_included:
      name: ส่วนประกอบของชุดรูเล็ตที่รวมอยู่ในชุด
      description: ส่วนประกอบสำคัญที่เกี่ยวข้องกับเกมรูเล็ตที่รวมอยู่ในชุด/วงล้อ
    roulette_wheel_ball_track_type:
      name: รูปแบบรางลูกบอลบนวงล้อรูเล็ต
      description: อธิบายถึงรูปแบบของรางลูกบอลที่ใช้บนวงล้อ ซึ่งส่งผลต่อความสมจริงและความรู้สึกในการเล่น
    roulette_wheel_numbering_system:
      name: ระบบการกำหนดหมายเลขวงล้อรูเล็ต
      description: ระบุหมายเลขวงล้อรูเล็ตและการกำหนดค่าศูนย์เพื่อให้เข้ากันได้กับการเล่นเกม/อัตราต่อรอง
    rounders_equipment_included:
      name: อุปกรณ์สำหรับเล่นราวน์เดอร์สที่รวมอยู่ในชุด
      description: ระบุรายการอุปกรณ์หรือชิ้นส่วนเฉพาะที่ให้มาในชุดหรือแพ็คอุปกรณ์ฝึกซ้อม
        เพื่อให้ผู้ซื้อทราบว่ามีอะไรอยู่ในกล่องบ้าง
    rounders_governing_body_approval:
      name: การอนุมัติจากหน่วยงานกำกับดูแลกีฬาราวน์เดอร์ส
      description: แสดงการรับรองหรือการอนุมัติจากหน่วยงานกำกับดูแลกีฬาราวน์เดอร์สหรือกีฬาประเภทอื่นอย่างเป็นทางการ
    row_counter_format:
      name: รูปแบบตัวนับแถว
      description: ระบุรูปแบบ/สไตล์ของเครื่องนับแถวถัก (เช่น วงแหวน โซ่ เสียงคลิก
        ดิจิทัล)
    row_counter_mechanism:
      name: กลไกตัวนับแถว
      description: ระบุวิธีการเพิ่ม/บันทึกจำนวนแถวในเครื่องมือ
    row_counter_mounting_method:
      name: วิธีการติดตั้งตัวนับแถว
      description: วิธีการติดตัวนับ/เครื่องหมายระหว่างการใช้งาน (กับเข็ม กับนิ้ว กับชิ้นงาน
        ฯลฯ)
    rowel_type:
      name: ประเภทของโรเวล
      description: อธิบายรูปทรงหรือโปรไฟล์ของขอบกรรเชียงบก ซึ่งส่งผลต่อลักษณะการขี่และการตอบสนองของม้า
    rowing_machine_part_type:
      name: ประเภทชิ้นส่วนเครื่องพายเรือ
      description: ระบุส่วนประกอบเฉพาะที่ผลิตภัณฑ์นั้นมีไว้เพื่อใช้ทดแทนในเครื่องพายเรือ
        เพื่อให้ผู้ซื้อสามารถค้นหาชิ้นส่วนที่ต้องการได้อย่างรวดเร็วโดยไม่ต้องสร้างหมวดหมู่ย่อยจำนวนมาก
    rubber_ducky_character_theme:
      name: ตัวละคร/ธีมเป็ดน้อยยาง
      description: รูปแบบหรือสไตล์ตัวละครของตุ๊กตาเป็ดยาง (เหมาะสำหรับตุ๊กตาเป็ดยางของเล่น/ของสะสม)
    rubber_ducky_features:
      name: เป็ดน้อยยาง
      description: คุณสมบัติการใช้งาน/การออกแบบเฉพาะของของเล่นเป็ดลอยน้ำสำหรับอาบน้ำ
    rubber_ducky_size_class:
      name: ขนาดของเป็ดน้อยยาง
      description: รูปแบบหรือสไตล์ตัวละครของตุ๊กตายางเป็ด (เหมาะสำหรับตุ๊กตายางเป็ดของเล่น/ของสะสม)
    ruffle_style:
      name: สไตล์ระบาย
      description: อธิบายลักษณะการสร้างหรือรูปแบบทาง視覚ของระบายบนผ้าคาดเก้าอี้
    rugby_headgear_safety_certification:
      name: การรับรองความปลอดภัยของอุปกรณ์สวมศีรษะสำหรับกีฬารักบี้
      description: ระบุว่าหมวกนิรภัยนั้นเป็นไปตามมาตรฐานความปลอดภัยอย่างเป็นทางการของกีฬารักบี้หรือกีฬาทั่วไปหรือไม่
    rugby_size:
      name: ขนาดรักบี้
      description: จัดหมวดหมู่อุปกรณ์ตามขนาด Label เฉพาะรักบี้ทั่วไปที่ใช้ในชื่อแท็ก
    rugby_variant:
      name: รักบี้เห็นสินค้า
      description: ระบุรูปแบบ (รหัสหรือประเภท) ของกีฬารักบี้ที่ผลิตภัณฑ์นี้มีไว้สำหรับใช้งาน
    ruler_edge_type:
      name: ประเภทขอบไม้บรรทัด
      description: ระบุลักษณะขอบหรือฟังก์ชันที่ใช้สำหรับการวัดหรือทำเครื่องหมาย (เช่น
        ขอบตรง ขอบเอียง ขอบยื่น)
    ruler_marking_style:
      name: รูปแบบการทำเครื่องหมายด้วยไม้บรรทัด
      description: อธิบายเครื่องหมายหรือเส้นไกด์ที่พิมพ์บนไม้บรรทัด นอกเหนือจากเครื่องหมายพื้นฐาน
    runner_configuration:
      name: รูปแบบแคร่เลื่อน
      description: อธิบายจำนวนและการจัดเรียงของแผ่นรองวิ่งบนเลื่อน
    runner_material:
      name: วัสดุที่ใช้ทำแคร่เลื่อน
      description: ระบุวัสดุที่ใช้สำหรับรางเลื่อนหรือแถบนำทางของเลื่อน
    saddle_cover_style:
      name: สไตล์ผ้าคลุมอานม้า
      description: จำแนกประเภทการออกแบบหรือรูปแบบการใช้งานของผลิตภัณฑ์ (เช่น ผ้าคลุมจัดเก็บ
        ผ้าคลุมสำหรับขี่ กระเป๋าถือ)
    saddle_design:
      name: การออกแบบอานม้า
      description: จำแนกประเภทการออกแบบ/รูปแบบโดยรวมของอานม้าตามหลักสรีรศาสตร์หรือการลดแรงกดทับ
        (เช่น อานแบบเว้า อานแบบไม่มีส่วนหน้า อานแบบแยกส่วนหน้า อานแบบมีสปริง)
    saddle_discipline:
      name: ประเภทอานม้า
      description: ระบุประเภทการขี่ม้าหลักหรือการใช้งาน/รูปแบบที่ตั้งใจไว้ของอานม้า
    saddle_mounting_type:
      name: ประเภทการติดตั้งอาน
      description: ระบุรูปแบบการเชื่อมต่อระหว่างอานและหลักอานเพื่อความเข้ากันได้ (เช่น
        แบบมีราง แบบหมุนได้ แบบคานรูปตัว I)
    saddle_pad_shape:
      name: รูปทรงแผ่นรองอาน
      description: อธิบายถึงรูปทรง/โครงร่างของแผ่นรอง ซึ่งส่งผลต่อความเข้ากันได้กับอานม้าและความชอบด้านสุนทรียภาพ
    saddle_pad_style:
      name: รูปแบบแผ่นรองอาน
      description: ระบุรูปแบบการใช้งานหรือประเภทการใช้งานที่ตั้งใจไว้ของแผ่นรอง ทำให้ผู้ขี่สามารถเลือกดีไซน์ที่เหมาะสมกับกิจกรรมหรือประเภทอานม้าของตนได้
    saddle_padding_material:
      name: วัสดุรองอานม้า
      description: ระบุวัสดุหรือเทคโนโลยีหลักที่ใช้รองรับแรงกระแทกภายในอานจักรยาน
        ซึ่ง Influence ความสบายและสัมผัส Ride
    saddle_rail_material:
      name: วัสดุที่ใช้ทำรางอาน
      description: ระบุวัสดุที่ใช้สำหรับรางใต้เบาะจักรยาน ซึ่งส่งผลต่อความแข็งแรง
        ความสบาย น้ำหนัก และราคา
    saddle_tree_material:
      name: วัสดุโครงอาน
      description: ระบุวัสดุที่ใช้ทำโครงอานม้า ซึ่งเป็นโครงสร้างภายในของอานม้า
    saddle_tree_width:
      name: ความกว้างของโครงอาน
      description: อธิบายการจำแนกประเภทความกว้างของโครงอานม้า ซึ่งเป็นตัวกำหนดความพอดีกับโคนคอของม้า
    safety_documentation_available:
      name: เอกสารด้านความปลอดภัยมีให้ดูได้
      description: ระบุเอกสารการปฏิบัติตามข้อกำหนด/ความปลอดภัยสำหรับส่วนผสมนั้นๆ (เช่น
        เอกสารข้อมูลความปลอดภัย ใบรับรอง/คำแถลงของ IFRA คำแถลง/การประกาศเกี่ยวกับสารก่อภูมิแพ้)
    safety_equipment_included:
      name: อุปกรณ์ความปลอดภัยที่รวมมาในชุด
      description: รายการความปลอดภัย/การป้องกันรวมอยู่ในบันทึก
    safety_features:
      name: คุณสมบัติเพื่อความปลอดภัย
      description: แสดงถึงคุณสมบัติความปลอดภัยในตัวที่ออกแบบมาเพื่อลดการบาดเจ็บจากอุบัติเหตุ
        หรือปกป้องใบมีดระหว่างการจัดเก็บ
    safety_harness_type:
      name: ประเภทสายรัดนิรภัยแบบรัดตัว
      description: ระบุรูปแบบและโครงสร้างของเข็มขัดนิรภัยสำหรับเด็กที่มาพร้อมกับเบาะนั่ง
    safety_mechanism_type:
      name: ประเภทของกลไกความปลอดภัย
      description: อธิบายถึงรูปแบบของระบบความปลอดภัยในตัวที่ใช้ในการจับบาร์เบลระหว่างการยกที่ไม่สำเร็จ
    safety_restraint_type:
      name: ประเภทอุปกรณ์ยึดเหนี่ยวเพื่อความปลอดภัย
      description: ระบุประเภทของอุปกรณ์ยึดเด็กในตัวที่นั่งชิงช้า (ถ้ามี)
    safety_warning:
      name: คำเตือนด้านความปลอดภัย
      description: ระบุว่าสินค้าดังกล่าวมีคำเตือนด้านความปลอดภัยของเล่นทั่วไปที่เกี่ยวข้องกับ
        Marble หรือไม่ (เช่น อันตรายจากการสำลัก)
    sail_shape:
      name: รูปทรงใบเรือ
      description: อธิบายถึงรูปทรงเรขาคณิตของใบเรือเรือคายัค ซึ่งมีผลต่อประสิทธิภาพ
        การควบคุม และวิธีการติดตั้ง
    salad_dressing_type:
      name: ประเภทของน้ำสลัด
      description: ระบุรูปแบบหรือเนื้อสัมผัสพื้นฐานของน้ำสลัด (เช่น แบบครีม แบบน้ำสลัดวินาเกรต
        แบบโยเกิร์ต) ช่วยให้ผู้ซื้อสามารถแยกแยะความแตกต่างระหว่างน้ำสลัดที่มีส่วนผสมและเนื้อสัมผัสต่างกันได้
    salad_topping_base_ingredient:
      name: ส่วนผสมหลักสำหรับโรยหน้าสลัด
      description: ระบุกลุ่มส่วนผสมหลักที่ใช้ทำหน้าสลัด ช่วยให้ลูกค้าสามารถกรองตามความชอบด้านโภชนาการ
        ข้อกังวลเกี่ยวกับสารก่อภูมิแพ้ หรือเนื้อสัมผัสที่ต้องการได้
    salt_level:
      name: ระดับเกลือ
      description: ระบุปริมาณเกลือหรือโซเดียมที่เติมลงในถั่วหรือเมล็ดพืช
    sand_cup_features:
      name: คุณสมบัติของถ้วยทราย
      description: คุณลักษณะเชิงฟังก์ชัน/ทางกายภาพของถ้วยทรายที่มีผลต่อการเล่นและการใช้งาน
    sand_shovel_handle_style:
      name: พลั่วทรายแฮนสลิงสไตล์
      description: อธิบายรูปทรงของด้ามจับ/ส่วนที่ใช้จับตรงปลายด้ามพลั่ว/จอบ
    sand_toy_set_pieces_included:
      name: ชิ้นส่วนของชุดของเล่นทรายที่รวมอยู่ในชุด
      description: แสดงรายการประเภทของส่วนประกอบของเล่นทรายที่รวมอยู่ในชุด (เช่น ถัง
        พลั่ว แม่พิมพ์) เพื่อช่วยนักช้อปเปรียบเทียบบันทึกตามสิ่งที่มีอยู่
    sand_water_mill_items_included:
      name: รวมรายการโรงสีทรายและน้ำแล้ว
      description: ระบุส่วนประกอบอุปกรณ์เสริมหลักที่มาพร้อมกับของชุดเล่นน้ำเล่นทราย
        (ถัง, ที่ตัก, แม่พิมพ์ ฯลฯ)
    sandbag_style:
      name: แบบกระสอบทราย
      description: ระบุการออกแบบเฉพาะและวัตถุประสงค์การใช้งานในการฝึกฝนของกระสอบทราย
        (เช่น การฝึกแบบบัลแกเรียน การฝึกแบบสตรองแมน การฝึกแบบพาวเวอร์) ช่วยให้ผู้ซื้อเลือกรูปแบบการออกกำลังกายที่เหมาะสมได้ง่ายขึ้น
    sandbox_bottom_type:
      name: ประเภทก้นกระบะทราย
      description: ประเภทของฐาน/โครงสร้างด้านล่างที่ใช้ใต้ทราย
    sandbox_drainage_type:
      name: ประเภทการระบายน้ำของกระบะทราย
      description: วิธีการระบายน้ำของกระบะทราย (ถ้ามี) เช่น รูระบายน้ำหรือจุกปิดที่ถอดได้
    sandbox_seating_type:
      name: รูปแบบที่นั่งในกระบะทราย
      description: มีการติดตั้งที่นั่งในบริเวณสนามเด็กเล่นหรือไม่ และเป็นที่นั่งแบบไหน
    sapodillo_variety:
      name: พันธุ์ซาโปดิลโล
      description: ระบุสายพันธุ์หรือพันธุ์ย่อยเฉพาะของละมุด (เช่น "Alano", "Prolific")
        ทำให้ผู้ที่ชื่นชอบสามารถเลือกโปรไฟล์รสชาติและลักษณะที่ต้องการได้
    sapote_variety:
      name: พันธุ์ซาโปเต้
      description: ระบุสายพันธุ์/ประเภทของ sapote ที่นำเสนอ (เช่น สีดำ, สีขาว, mamey)
        ทำให้นักช้อปสามารถแยกแยะระหว่างประเภทต่างๆ ได้
    satin_ribbon_face_type:
      name: ชนิดของริบบิ้นผ้าซาติน
      description: ระบุว่าริบบิ้นมีผิวสัมผัสแบบซาตินด้านเดียวหรือทั้งสองด้าน
    sauce_consistency:
      name: ความข้นของซอส
      description: อธิบายถึงเนื้อสัมผัสหรือความหนาของซอสพิซซ่า
    sauce_product_form:
      name: รูปแบบผลิตภัณฑ์ซอส
      description: ระบุลักษณะทางกายภาพของผลิตภัณฑ์ซอส เช่น ของเหลว น้ำมัน เพสต์ ผง
        เกล็ด หรือน้ำเชื่อม
    sauce_variety:
      name: ประเภทของซอส
      description: ระบุรูปแบบหรือตระกูลสูตรเฉพาะของซอสครีมหรือซอสราด (เช่น อัลเฟรโด,
        เบชาเมล, ฮอลแลนเดส)
    saxophone_body_finish:
      name: การตกแต่งตัวเครื่องแซกโซโฟน
      description: อธิบายถึงการเคลือบผิว/ชุบผิวหลักบนตัวเครื่องแซกโซโฟน (แยกจากส่วนประกอบกลไก)
    saxophone_body_type:
      name: ประเภทตัวเครื่องแซกโซโฟน
      description: อธิบายถึงลักษณะทางกายภาพโดยรวมของตัวเครื่องและทิศทางการวางปากลำโพงของแซกโซโฟนเบส
    saxophone_construction_style:
      name: รูปแบบโครงสร้างแซกโซโฟน
      description: ระบุคุณลักษณะโครงสร้างแซกโซโฟนทั่วไปที่มีผลต่อความทนทาน เสียงก้อง
        และการซ่อมบำรุง
    saxophone_included_accessories:
      name: อุปกรณ์เสริมที่รวมอยู่ในชุดแซ็กโซโฟน
      description: รายการอุปกรณ์เสริมที่มักจัดส่งมาพร้อมกับชุดแซ็กโซโฟนอัลโต
    saxophone_key_system:
      name: ระบบคีย์แซ็กโซโฟน
      description: ระบุระบบกลไกการกดคีย์ (รูปแบบ/มาตรฐานกลไก) ของแซกโซโฟนที่ใช้ในเครื่องดนตรีนั้น
    saxophone_key_touch_material:
      name: วัสดุสัมผัสแป้นกดแซ็กโซโฟน
      description: ระบุวัสดุที่ใช้สำหรับปุ่มกดของแซกโซโฟน (เช่น ปุ่มกดที่ทำจากไข่มุก)
    saxophone_mouthpiece_baffle_type:
      name: ปากเป่าแซกโซโฟนแบบแผ่นกั้น
      description: อธิบายถึงการออกแบบแผ่นกั้นที่ช่วยกำหนดทิศทางการไหลของอากาศและความพุ่งของเสียง
    saxophone_neck_type:
      name: ประเภทคอแซกโซโฟน
      description: ระบุลักษณะคอของแซ็กโซโฟนเบส Supply ด้วย
    saxophone_package_contents:
      name: รายการอุปกรณ์ในกล่องแซ็กโซโฟน
      description: รายการอุปกรณ์สำคัญที่มาพร้อมกับแซ็กโซโฟน (เช่น เคส, ปากเป่า, สายรัด,
        สายคล้องคอ, การทำความสะอาดกล้อง)
    saxophone_reed_cut:
      name: รูปทรงของลิ้นแซ็กโซโฟน
      description: ระบุรูปทรง/สไตล์ของลิ้นแซ็กโซโฟน ซึ่งมีผลต่อการตอบสนอง โทนเสียง
        และสัมผัส
    saxophone_reed_material_type:
      name: ประเภทวัสดุของลิ้นแซกโซโฟน
      description: ระบุประเภทวัสดุของกก (เช่น กกจริง หรือ กกสังเคราะห์)
    saxophone_reed_strength_scale:
      name: แซ็กโซโฟนกก ความแรงขยายสเกล
      description: ระบุระบบ/มาตราส่วนการกำหนดระดับความแข็งแรงที่ใช้สำหรับลิ้นเป่า
        (มักขึ้นอยู่กับยี่ห้อ) ทำให้สามารถเปรียบเทียบข้อมูลระหว่างรายการต่างๆ ได้ชัดเจนยิ่งขึ้น
    saxophone_small_part_thread_size:
      name: ขนาดเกลียวสำหรับชิ้นส่วนขนาดเล็กของแซกโซโฟน
      description: ระบุขนาดเกลียว/มาตรฐานสำหรับชิ้นส่วนขนาดเล็กที่มีเกลียวของแซกโซโฟน
        (โดยหลักคือสกรู) เพื่อให้สามารถเลือกขนาดที่เหมาะสมได้
    saxophone_swab_application_area:
      name: ไม้กวาดแซ็กโซโฟนแอปพลิเคชันบริเวณ
      description: ระบุว่าไม้พันสำลีนี้ใช้สำหรับทำความสะอาด/เช็ดแห้งส่วนใดของแซกโซโฟน
    scabbard_material:
      name: วัสดุฝักดาบ
      description: ระบุวัสดุหลักของฝักดาบ/ปลอกดาบที่ให้มาด้วย (ถ้ามี)
    scale_model_assembly_status:
      name: สถานะการประกอบโมเดลขยายสเกล
      description: ระบุว่าโมเดล รางสลาก พร้อมจัดแสดง หรือต้องประกอบ/ทาสีเพิ่มเติม
    scale_model_car_features:
      name: คุณสมบัติของโมเดลรถยนต์
      description: คุณสมบัติเด่นของรถโมเดล แฮงสวิก เช่น ประตู/ฝากระโปรงเปิดได้ ล้อบังคับทิศทางได้
        ระบบกันสะเทือน ฯลฯ
    scale_model_kit_assembly_requirements:
      name: ขยายสเกลโมเดลข้อกำหนดในการประกอบ
      description: ระบุขั้นตอนการประกอบ/อุปกรณ์เสริมเพิ่มเติมที่มักจำเป็นนอกเหนือจากการประกอบแบบสแนปฟิตพื้นฐาน
    scale_model_kit_components_included:
      name: ขยายสเกลโมเดลพร้อมส่วนประกอบรวมอยู่ด้วย
      description: ระบุสิ่งของที่รวมอยู่ในชุดโมเดล/ชุดประกอบรถถัง (เช่น สติ๊กเกอร์,
        ฟิกเกอร์, ชิ้นส่วนโลหะกัดลาย)
    scale_model_paint_status:
      name: สถานะการทาสีโมเดลจำลอง
      description: ระบุว่าเฮลิคอปเตอร์รุ่นนี้ทาสีเสร็จแล้วหรือยัง หรือต้องทาสีเพิ่มเติม
    scale_model_pose:
      name: ท่าทางของโมเดลจำลอง
      description: ระบุท่าทางของโมเดลม้าที่แสดงไว้สำหรับการจัดแสดง/การจัดฉากจำลอง
    scale_model_rotor_configuration:
      name: รูปแบบใบพัดของแบบจำลองขนาดเล็ก
      description: ระบุรูปแบบใบพัดของเฮลิคอปเตอร์ตามที่แสดงในแบบจำลอง
    scale_model_truck_era:
      name: ยุคของโมเดลรถบรรทุก
      description: ระบุยุค/ช่วงเวลาของรถบรรทุกในโลกแห่งความเป็นจริงที่โมเดลนั้นจำลองขึ้น
        (มีประโยชน์สำหรับนักสะสมที่กำลังมองหารถบรรทุกวินเทจเทียบกับรถบรรทุกสมัยใหม่)
    scale_model_truck_propulsion_type:
      name: ขยายสเกลโมเดลรถบรรทุกชนิดขับเคลื่อน
      description: ระบุว่ารถบรรทุกที่แสดงเป็นแบบดีเซล เบนซิน ไฟฟ้า ไฮบริด หรือแบบอื่นๆ
        (ตามที่แสดง/โฆษณาโดยรุ่นนั้นๆ)
    scale_units:
      name: หน่วยขยายสเกล
      description: หน่วยวัดที่พิมพ์/แกะสลักบนลำแสงสำหรับรัศมี/เส้นผ่านศูนย์กลาง
    scent_function:
      name: Functionsชั่นกลิ่น
      description: อธิบาย Functions หลักของผลิตภัณฑ์กลิ่น เพื่อให้นักล่าสามารถเลือกใช้เครื่องมือที่เหมาะสมได้อย่างรวดเร็ว
        (เช่น สารดึงดูดสัตว์ หรือ สารกำจัดกลิ่น)
    scent_source:
      name: แหล่งที่มาของกลิ่น
      description: ชี้แจงแหล่งที่มาทางชีวภาพหรือกลิ่นหอมหลักที่ใช้ในการกำหนดสูตรสินค้า
        ครอบคลุมถึงกลิ่นประเภทต่างๆ เช่น กลิ่นปัสสาวะ กลิ่นอาหาร กลิ่นจากพืช เป็นต้น
    school_bus_body_type:
      name: ประเภทตัวถังรถบัสโรงเรียน
      description: จำแนกประเภทรถบัสโรงเรียนตามรูปแบบตัวถัง/ประเภทที่ใช้กันทั่วไปในตลาด
        (เช่น ประเภท A–D)
    school_bus_safety_feature:
      name: คุณสมบัติความปลอดภัยของรถโรงเรียน
      description: อุปกรณ์ความปลอดภัยที่โดดเด่นซึ่งติดตั้งอยู่บนรถโรงเรียน
    school_glue_washability:
      name: กาวสำหรับโรงเรียน ล้างออกได้หรือไม่
      description: บ่งบอกถึงความง่ายในการล้างกาวแห้ง/เปียกออกจากผิวหนัง/เสื้อผ้า/พื้นผิวต่างๆ
    scissors_application:
      name: การใช้งานกรรไกร
      description: วัตถุประสงค์หลักในการตัดแอปพลิเคชัน/วัสดุสำหรับกรรไกร
    scooter_brake_pad_material:
      name: วัสดุผ้าเบรกสำหรับสกูตเตอร์
      description: ระบุส่วนประกอบที่ใช้ในผ้าเบรก ซึ่งส่งผลต่อประสิทธิภาพ เสียง และอายุการใช้งาน
    scoring_method:
      name: วิธีการให้คะแนน
      description: ระบุวิธีการติดตามคะแนนบนโต๊ะฟุตบอลโต๊ะเล็ก เช่น การนับลูกปัดด้วยมือ
        หรือกระดานคะแนนอิเล็กทรอนิกส์
    scoring_pattern:
      name: รูปแบบการให้คะแนน
      description: ผังแสดงโซนทำคะแนนที่พิมพ์อยู่บนสนามแข่งขัน
    scoring_system_type:
      name: ประเภทระบบการให้คะแนน
      description: อธิบายรูปแบบกลไกการบันทึกคะแนนที่มาพร้อมกับโต๊ะ เช่น ตัวเลื่อนแบบแมนนวล
        หรือจอแสดงผลอิเล็กทรอนิกส์แบบต่างๆ
    scottish_smallpipes_bag_material:
      name: วัสดุทำถุงสำหรับปี่สก็อตขนาดเล็ก
      description: ระบุวัสดุของถุง (ถังเก็บอากาศ) ที่ให้มาพร้อมกับท่อขนาดเล็ก
    scottish_smallpipes_drone_tuning_configuration:
      name: การกำหนดค่าการปรับแต่งเสียงโดรนสำหรับปี่สก็อตขนาดเล็ก
      description: ระบุการปรับจูนโดรนต้องใช้เวลา/การจ่าย Supply ด้วยเครื่องมือ (ระดับเสียง/บทบาทของโดรนที่สัมพันธ์กับโทนิค)
    scottish_smallpipes_reed_type:
      name: ลิ้นเป่าแบบสกอตติชสมอลล์ไพพ์
      description: ระบุประเภทของลิ้นเป่าที่ใช้สำหรับส่วนเป่าหลัก (และ/หรือว่าลิ้นเป่าเป็นแบบสังเคราะห์หรือทำจากไม้ไผ่)
    scraping_surface_type:
      name: ประเภทพื้นผิวขูด
      description: ระบุโครงสร้าง/รูปทรงเรขาคณิตของพื้นผิวขูดที่ทำให้เกิดเสียง (เช่น
        ร่อง, หวี/ฟัน, ลอน)
    screw_drive_type:
      name: ประเภทของหัวสกรู
      description: ระบุรูปแบบร่องสำหรับใส่สกรูหรือน็อต เพื่อระบุเครื่องมือที่จำเป็นในการขันหรือถอด
        (เช่น หกเหลี่ยม/อัลเลน, ทอร์กซ์)
    screw_thread_size:
      name: ขนาดเกลียวสกรู
      description: ระบุขนาดเกลียวมาตรฐานของสกรูที่ให้มาหรือสกรูที่ใช้งานร่วมกันได้
        (เช่น M4, M5, M6)
    sculpting_clay_base_type:
      name: ฐานดินเหนียวสำหรับปั้น
      description: อธิบายถึงสูตรพื้นฐาน/ส่วนประกอบหลักของดินเหนียวสำหรับปั้น
    seafood_cut:
      name: อาหารทะเลหั่น
      description: อธิบายลักษณะทางกายภาพหรือการนำเสนอผลิตภัณฑ์อาหารทะเล (เช่น ทั้งตัว
        เนื้อ สเต็ก)
    seafood_processing_method:
      name: วิธีการแปรรูปอาหารทะเล
      description: ระบุวิธีการถนอมหรือแปรรูปหลักที่ใช้กับอาหารทะเล เช่น การรมควัน
        การดองเกลือ หรือการแช่แข็งแบบแห้ง
    seafood_source:
      name: แหล่งที่มาของอาหารทะเล
      description: แสดงว่าอาหารทะเลนั้นจับจากธรรมชาติ เลี้ยงในฟาร์ม ผลิตจากพืช หรือมาจากแหล่งอื่น
        เพื่อช่วยนักช้อปในการประเมินความยั่งยืนและคุณภาพ
    seal_material:
      name: วัสดุปิดผนึก
      description: วัสดุที่ใช้สำหรับซีลหรือปะเก็นบริเวณคอ ข้อมือ และข้อเท้า ซึ่งช่วยให้ชุดกันน้ำได้
    seal_type:
      name: ประเภทซีล
      description: ระบุวิธีการซีลที่ใช้โดยข้อต่อเพื่อป้องกันการรั่วไหลของน้ำหล่อเย็น
    sealant_formulation:
      name: สูตรน้ำยาอุดรอยรั่ว
      description: ระบุสูตรทางเคมีหลักหรือเทคโนโลยีสารเติมแต่งของน้ำยาอุดรอยรั่วยางจักรยาน
        (เช่น แบบน้ำยาง, แบบเสริมใยไฟเบอร์, แบบอะคริลิก)
    seals_leak_type:
      name: ซีลชนิดรั่ว
      description: ประเภท/พื้นที่ของระบบระบายความร้อนรั่ว สินค้ามีไว้เพื่อปิดผนึก
    seam_construction:
      name: การเย็บตะเข็บ
      description: อธิบายถึงวิธีการสร้างตะเข็บของลูกกอล์ฟ ซึ่งส่งผลต่อการเหวี่ยง ความทนทาน
        และความรู้สึกในการตี
    seam_design:
      name: การออกแบบตะเข็บ
      description: ระบุโครงสร้างตะเข็บหรือลักษณะตะเข็บตกแต่งของถุงน่อง
    seam_gauge_scale_type:
      name: ประเภทสเกลวัดระยะตะเข็บ
      description: ระบุว่าขยายสเกล/เครื่องหมายใดบ้างที่รวมอยู่ในเกจตะเข็บ Beyond ไม้บรรทัดฐาน
        ขยายสเกล
    seam_gauge_slider_material:
      name: วัสดุตัวเลื่อนเกจวัดตะเข็บ
      description: ระบุวัสดุของชิ้นส่วนตัวเลื่อน/ตัวชี้ที่ปรับได้ หากมีอยู่
    seam_ripper_tip_style:
      name: ปลายแบบเลาะตะเข็บ
      description: อธิบายการออกแบบปลายที่ใช้งานได้จริงซึ่งใช้สอดใต้ตะเข็บและตัดได้อย่างปลอดภัย
    seam_sealing_type:
      name: ประเภทการปิดผนึกตะเข็บ
      description: อธิบายวิธีการป้องกันน้ำซึมเข้าตามตะเข็บของชุดกันฝน (เช่น การปิดผนึกด้วยเทปอย่างสมบูรณ์
        การเชื่อมตะเข็บ)
    seam_type:
      name: ประเภทตะเข็บ
      description: อธิบายถึงรูปแบบการเย็บตะเข็บบนลูกเบสบอล ซึ่งส่งผลต่อการยึดเกาะ
        หลักอากาศพลศาสตร์ และระดับการเล่นที่ตั้งใจไว้
    season_condition_protection:
      name: ฤดูกาล/สภาพสินค้าคุ้มครอง
      description: ระบุสภาพอากาศ/สภาพสินค้าเบื้องต้นที่ฝาครอบกระจกบังลมมีไว้เพื่อป้องกัน
    season_rating:
      name: ระดับความเหมาะสมของฤดูกาล
      description: ระบุระดับความเหมาะสมของเต็นท์สำหรับสภาพอากาศที่แตกต่างกัน (เช่น
        3 ฤดู, 4 ฤดู, 5 ฤดู/การเดินทางไกล)
    seasoning_variety:
      name: เครื่องปรุงรสหลากหลาย
      description: จำแนกเครื่องปรุงรสตามวิธีการเตรียมหรือการใช้งานแบบดั้งเดิมในการทำอาหาร
    seat_adjustment_power_type:
      name: ประเภทการปรับเบาะนั่งด้วยระบบไฟฟ้า
      description: ระบุวิธีการทำงานของกลไกการปรับเบาะ (คันโยกแบบแมนนวลหรือมอเตอร์ไฟฟ้า)
        ซึ่งอาจส่งผลต่อการเดินสายไฟ/ความเข้ากันได้
    seat_belt_attachment_type:
      name: ประเภทการยึดเข็มขัดนิรภัย
      description: ระบุวิธีการยึดสายรัดเข้ากับตัวรถ/อุปกรณ์เข็มขัดนิรภัย
    seat_belt_buckle_electrical_connector_type:
      name: ขั้วต่อไฟฟ้าแบบหัวเข็มขัดนิรภัย
      description: ระบุตัวเชื่อมต่อ/อินเทอร์เฟซที่ใช้สำหรับการเดินสายสวิตช์หัวเข็มขัด/ตัวปรับความตึงเข็มขัดนิรภัย
        หากมี
    seat_belt_buckle_mounting_type:
      name: ประเภทการติดตั้งหัวเข็มขัดนิรภัย
      description: อธิบายวิธีการติดตั้งหัวเข็มขัด/ตัวรับเข้ากับตัวรถ เบาะ หรือก้านเข็มขัดนิรภัย
        (เช่น แบบขันน็อต แบบหนีบ)
    seat_belt_buckle_release_button_color:
      name: สีของปุ่มปลดหัวเข็มขัดนิรภัย
      description: ระบุสีของปุ่มปลดล็อกหัวเข็มขัด
    seat_belt_cover_placement:
      name: ที่หุ้มเข็มขัดนิรภัยตำแหน่งวางของ
      description: ระบุตำแหน่งบนเข็มขัดนิรภัยที่ควรใช้ปลอกหุ้มนี้
    seat_belt_integration:
      name: การติดตั้งเข็มขัดนิรภัย
      description: ระบุว่าเบาะนั่งมีเข็มขัดนิรภัยและ/หรือช่องสำหรับหัวเข็มขัดในตัวหรือไม่
        หรือต้องถอดช่องสำหรับหัวเข็มขัดของรถยนต์เดิมออกก่อนติดตั้ง
    seat_belt_provision:
      name: การคาดเข็มขัดนิรภัย
      description: ระบุว่าเข็มขัดนิรภัยและ/หรืออุปกรณ์ที่เกี่ยวข้องกับเข็มขัดนิรภัย
        (เช่น หัวเข็มขัด) รวมอยู่ในชุดเบาะหลังหรือไม่ หรือต้องย้ายมาจากเบาะเดิม
    seat_belt_strap_installation_location:
      name: ตำแหน่งติดตั้งสายเข็มขัดนิรภัย
      description: ระบุตำแหน่งที่ติดตั้งสายรัดภายในระบบเข็มขัด
    seat_cover_placement:
      name: ตำแหน่งการติดตั้งผ้าคลุมเบาะ
      description: ระบุว่าผ้าคลุมนี้เหมาะสำหรับที่นั่งตำแหน่งใดบ้างในรถยนต์
    seat_cover_securement_method:
      name: วิธีการยึดผ้าคลุมเบาะ
      description: ระบุวิธีการหลักในการยึดผ้าคลุมเบาะเข้ากับเบาะนั่ง หากมีการใช้วิธีการหลายวิธี
        ให้เลือกวิธีการหลัก/สำคัญที่สุด
    seat_cover_set_contents:
      name: เนื้อหาชุดหุ้มเบาะ
      description: อธิบายว่ามีชิ้นส่วนใดบ้างที่รวมอยู่ในแพ็คเกจ (เช่น เฉพาะเบาะรองนั่ง
        หรือ เบาะนั่งครบชุดพร้อมพนักพิงศีรษะ)
    seat_fabric:
      name: ผ้าหุ้มเบาะ
      description: ผ้าหลักที่ใช้สำหรับทำเบาะนั่งและพนักพิงของเก้าอี้
    seat_height_category:
      name: หมวดหมู่ความสูงของที่นั่ง
      description: จัดประเภทเก้าอี้ตามช่วงความสูงของที่นั่งทั่วไป (เช่น ความสูงระดับเคาน์เตอร์หรือบาร์)
        เพื่อให้เลือกได้ง่ายขึ้น
    seat_material:
      name: วัสดุที่ใช้ทำที่นั่ง
      description: ระบุวัสดุหลักของพื้นผิวที่นั่งของม้านั่ง
    seat_mounting_type:
      name: ประเภทการติดตั้งเบาะนั่ง
      description: การกำหนดค่าการติดตั้ง/การติดตามใช้เพื่อติดเบาะนั่งกับพื้นรถ
    seating_surface_material:
      name: วัสดุพื้นผิวที่นั่ง
      description: ระบุวัสดุของบริเวณที่บุคคลเอนกายลง (เช่น ผ้าตาข่าย Textilene, ผ้าสลิง,
        หวาย, เบาะรองนั่ง)
    seatpost_clamp_mechanism:
      name: กลไกยึดหลักอาน
      description: ประเภทของระบบหนีบ/ปิดที่ใช้ยึดหลักอาน
    section_orientation_compatibility:
      name: ความเข้ากันได้ในการวางแนวส่วน
      description: ระบุว่าอุปกรณ์เสริมนี้เหมาะกับส่วนที่หันไปทางแขนซ้าย แขนขวา หรือแบบใช้งานได้ทั้งสองข้าง
    sectional_configuration:
      name: รูปแบบการแบ่งส่วน
      description: อธิบายโมดูลหรือทิศทางเฉพาะของชุดเฟอร์นิเจอร์ (เช่น มุม ด้านซ้ายสุด
        หรือแบบยาว) เพื่อให้ผู้ซื้อสามารถประกอบเฟอร์นิเจอร์ตามแบบที่ต้องการได้
    sectional_shape:
      name: รูปทรงหน้าตัด
      description: กำหนดโครงร่างเรขาคณิตโดยรวม/ไลเอาต์ของโซฟาแบบแบ่งส่วน
    secured_components:
      name: ส่วนประกอบที่ปลอดภัย
      description: ระบุชิ้นส่วนจักรยานเฉพาะที่ตัวล็อคแกนล้อหรือน็อตนิรภัยช่วยปกป้อง
        (เช่น ล้อหน้า ล้อหลัง หลักอาน)
    seed_content:
      name: เนื้อหาเมล็ดพันธุ์
      description: ระบุว่าผลไม้ตระกูลส้มนั้นไม่มีเมล็ด มีเมล็ดน้อย หรือมีเมล็ดอยู่เต็มผล
    seed_size_classification:
      name: การจำแนกขนาดเมล็ด
      description: บ่งบอกถึงขนาดสัมพัทธ์ของเมล็ดที่ไม่สามารถรับประทานได้ภายในลิ้นจี่
        ซึ่งส่งผลต่อปริมาณเนื้อที่รับประทานได้
    self_adhesive_backing_format:
      name: รูปแบบแผ่นกาวในตัว
      description: รูปแบบทางกายภาพของแผ่นกาวที่ให้มาพร้อมกับแถบดูดน้ำ (แผ่นกาวที่ติดมาแล้ว
        หรือ สติกเกอร์แยกต่างหาก เป็นต้น)
    self_adhesive_hook_loop_backing_type:
      name: ประเภทแผ่นหลังแบบตีนตุ๊กแกมีกาวในตัว
      description: ระบุโครงสร้างของแผ่นรอง/แผ่นรองพื้น และระบบกาวที่ใช้กับด้านที่มีกาวในตัว
    self_adhesive_hook_loop_fastener_shape:
      name: รูปทรงของตัวยึดแบบตีนตุ๊กแกที่มีกาวในตัว
      description: ระบุรูปทรงหรือรูปแบบการตัดของชิ้นส่วนยึด
    self_hardening_clay_finish:
      name: ผิวเคลือบดินเหนียวแข็งตัวได้เอง
      description: อธิบายลักษณะพื้นผิว/ความเงาเมื่อแห้งสนิทแล้ว (มีประโยชน์ในการเลือกระหว่างพื้นผิวด้านธรรมชาติ
        พื้นผิวซาติน เป็นต้น)
    self_hardening_clay_water_resistance_after_curing:
      name: ดินเหนียวแข็งตัวได้เอง ทนทานต่อน้ำหลังการบ่ม
      description: แสดงถึงความทนทานต่อน้ำเมื่อแห้งสนิทแล้ว (โดยไม่ต้องใช้สารเคลือบเพิ่มเติม)
    sensor_functions:
      name: ฟังก์ชันของเซ็นเซอร์
      description: ระบุว่าเซ็นเซอร์วัดค่าตัวชี้วัดการปั่นจักรยานใดบ้าง
    sensor_measurement_mode:
      name: โหมดการวัดเซ็นเซอร์
      description: ระบุว่าเซ็นเซอร์สามารถบันทึกค่าใดได้บ้าง (เช่น เฉพาะจังหวะการปั่น,
        เฉพาะความเร็ว, ทั้งความเร็วและจังหวะการปั่น)
    sensor_mounting_position:
      name: ตำแหน่งการติดตั้งเซ็นเซอร์
      description: ระบุระยะทางบนจักรยานหรือผู้ขี่ที่ติดตั้งเซ็นเซอร์ เช่น ขาจาน ดุมล้อ
        หรือรองเท้า สิ่งนี้ส่งผลต่อความเข้ากันได้กับจักรยานยนต์อื่น ๆ เป็นเวลานาน/ยังคงมีอยู่
    sensor_mounting_type:
      name: ประเภทการติดตั้งเซ็นเซอร์
      description: ระบุวิธีการติดตั้งเซ็นเซอร์ MAP เข้ากับท่อร่วมไอดีหรือเครื่องยนต์
        (เช่น แบบยึดด้วยสลักเกลียว หรือแบบเสียบด้วยยางรอง)
    sensor_or_gauge_mounting_location:
      name: เซนเซอร์หรือเกจยึดติด
      description: ระบุตำแหน่งที่ต้องการติดตั้งเซ็นเซอร์หรือเกจบนยานพาหนะ (ระดับระบบ/ตาราง
        ไม่ใช่ซ้าย/ขวา)
    sensory_modality:
      name: รูปแบบการรับรู้ทางประสาทสัมผัส
      description: ประสบการณ์ทางประสาทสัมผัสหลักที่ของเล่นชิ้นนี้ออกแบบมาเพื่อมอบให้
        (อาจเป็นประสบการณ์ทางประสาทสัมผัสหลายด้าน)
    sensory_toy_fidget_mechanism:
      name: ของเล่นเสริมพัฒนาการทางประสาทสัมผัสพร้อมกลไกคลายเครียด
      description: ปฏิสัมพันธ์/กลไกหลักที่ใช้ในการควบคุมพฤติกรรมอยู่ไม่สุขและการควบคุมตนเอง
    sensory_toy_light_features:
      name: ของเล่นเสริมพัฒนาการที่มีไฟส่องสว่าง
      description: ลักษณะ/เอฟเฟกต์แสงที่ของเล่นชิ้นนี้มีให้
    sensory_toy_texture_type:
      name: ของเล่นเสริมพัฒนาการประเภทพื้นผิว
      description: องค์ประกอบพื้นผิว/สัมผัสที่โดดเด่นซึ่งใช้ในการกระตุ้นการสัมผัส
    sequin_application_method:
      name: วิธีการติดเลื่อม
      description: วิธีการใช้งาน/ติดเลื่อมที่ถูกต้อง (เย็บติด ติดกาว หรือติดด้วยความร้อน
        ฯลฯ)
    sequin_finish:
      name: ตกแต่งด้วยเลื่อม
      description: คำอธิบายนี้กล่าวถึงพื้นผิว/ลักษณะที่ปรากฏและคุณสมบัติการสะท้อนแสงของเลื่อมที่ใช้บนแผ่นป้าย
        (เช่น ผิวด้าน ผิวโลหะ ผิวโฮโลแกรม) ไม่ใช่รายละเอียดของวัสดุรองด้านหลังแผ่นป้ายหรือวิธีการติด
    serger_stitch_functions:
      name: ฟังก์ชั่นการเย็บแบบโอเวอร์ล็อก
      description: ตะเข็บ Functions เย็บ Serger ความช่วยเหลือ (รูปแบบการเย็บแบบ overlock/overedge
        และการเย็บแบบพิเศษ)
    serger_thread_count:
      name: จำนวนเส้นด้ายของจักรเย็บผ้าแบบโอเวอร์ล็อก
      description: จำนวนเส้นด้ายที่จักรเย็บผ้าโอเวอร์ล็อกสามารถใช้ในการเย็บ (เช่น
        ความสามารถในการเย็บ 2/3/4/5 เส้นด้าย)
    service_interval:
      name: ช่วงเวลาการบำรุงรักษา
      description: ระยะเวลาสูงสุดที่แนะนำระหว่างการตรวจสอบ/บำรุงรักษาที่จำเป็นโดยสถานีบริการที่ได้รับการรับรอง
    serving_temperature:
      name: อุณหภูมิในการเสิร์ฟ
      description: จำนวนเส้นด้ายที่จักรเย็บผ้าโอเวอร์ล็อกสามารถใช้ในการเย็บ (เช่น
        ความสามารถในการเย็บ 2/3/4/5 เส้นด้าย)
    sesame_seed_hull_status:
      name: สถานะเปลือกเมล็ดงา
      description: ระบุว่าทาฮินีทำจากเมล็ดงาที่ปอกเปลือกแล้วหรือยังไม่ปอกเปลือก ซึ่งส่งผลต่อสี
        รสชาติ และคุณค่าทางโภชนาการ
    sesame_seed_roast_level:
      name: ระดับการคั่วเมล็ดงา
      description: ระบุระดับการคั่วของเมล็ดงาก่อนบด ช่วยให้ผู้ซื้อเลือกความเข้มข้นของรสชาติที่ต้องการได้
    sesame_seed_variety:
      name: พันธุ์เมล็ดงา
      description: ระบุสีหรือพันธุ์ของเมล็ดงาที่ใช้ทำน้ำมันงา
    set_classification:
      name: การจำแนกประเภทชุด
      description: กำหนดระดับการเล่นหรือรูปแบบการใช้งานของชุดโครเกต์ที่ต้องการ (เช่น
        การแข่งขัน การเล่นเพื่อสันทนาการ การเดินทาง)
    set_components:
      name: ส่วนประกอบชุด
      description: ระบุว่ารายการใดรวมอยู่ในสินค้า (เช่น เฉพาะแท่งกลางเทียบกับครบชุด)
    set_items_included:
      name: รายการสินค้าที่รวมอยู่ในชุด
      description: ระบุเสื้อผ้าหรือเครื่องประดับที่รวมอยู่ในชุด เช่น ผ้าสำหรับทำส่ารี
        ผ้าคลุมไหล่ หรือเข็มขัด
    setup_mechanism:
      name: กลไกการติดตั้ง
      description: อธิบายวิธีการปรับใช้หลักของเต็นท์ (เช่น ร้านป๊อปอัพ, พอง/ลำแสง,
        ฝาพับบนหลังคา)
    setup_type:
      name: ประเภทการติดตั้ง
      description: วิธีการประกอบเต็นท์เด็กเล่น/อุโมงค์หรืออย่างไร
    sew_in_interfacing_elasticity:
      name: ความยืดหยุ่นของผ้าซับในเย็บติด
      description: ระบุว่าผ้าซับในเย็บติดนั้นยืดหยุ่นได้หรือไม่ และถ้าได้ จะยืดหยุ่นได้ในทิศทางใดบ้าง
        เพื่อให้เข้ากับชิ้นงานถักหรือทอ
    sew_in_label_placement:
      name: Sew-in Label ส่วนใหญ่วาง
      description: ระบุวันที่ตั้งใจไว้สำหรับวางในรายการที่เสร็จสมบูรณ์
    sew_on_edge_finish:
      name: การตกแต่งขอบด้วยการเย็บ
      description: ระบุว่าขอบตีนตุ๊กแกเป็นแบบดิบ/ตัด หรือแบบสำเร็จรูปเพื่อป้องกันการลุ่ย
    sew_on_rhinestone_hole_orientation:
      name: ทิศทางการเจาะรูสำหรับติดพลอยเทียมแบบเย็บ
      description: การจัดเรียง/การวางแนวของรูที่สัมพันธ์กับหิน (เช่น เคียงข้างกัน,
        ตรงข้าม, กากบาท) เพื่อช่วยเหลือรูปแบบตะเข็บที่แตกต่างกัน
    sewing_kit_components_included:
      name: ส่วนประกอบของชุดเย็บผ้า
      description: แสดงรายการอุปกรณ์/เครื่องมือเย็บผ้าที่รวมอยู่ในชุดเย็บผ้า เพื่อให้ผู้ซื้อสามารถเปรียบเทียบสิ่งที่อยู่ในแต่ละชุดได้
    sewing_machine_bobbin_class:
      name: คลาสกระสวยจักรเย็บผ้า
      description: ระบุประเภท/ระบบของกระสวยที่เข้ากันได้กับจักรเย็บผ้า สำหรับกระสวยและกล่องกระสวย
    sewing_machine_buttonhole_type:
      name: ประเภทรังดุมจักรเย็บผ้า
      description: วิธีการสร้างรังดุมที่รองรับโดยเครื่องจักร
    sewing_machine_display_type:
      name: ประเภทจอแสดงผลจักรเย็บผ้า
      description: ประเภทของส่วนควบคุม/แสดงผลบนจักรเย็บผ้า
    sewing_machine_needle_point_type:
      name: ประเภทปลายเข็มจักรเย็บผ้า
      description: กำหนดรูปทรง/ประเภทปลายเข็ม ซึ่งเป็นตัวกำหนดวิธีการเจาะผ้าชนิดต่างๆ
        (เช่น ปลายแหลม ปลายกลม หรือปลายลิ่ม)
    sewing_machine_needle_system:
      name: ระบบเข็มจักรเย็บผ้า
      description: หมายเลขระบบเข็ม/รุ่นมาตรฐานที่ใช้กำหนดความเข้ากันได้กับเครื่องจักร
        (มักเขียนเป็น 130/705 H, HAx1, DBx1, 15x1 เป็นต้น)
    sewing_machine_needle_type:
      name: ประเภทเข็มจักรเย็บผ้า
      description: ระบุแอปพลิเคชัน/รูปแบบของเข็มที่ต้องการ (เช่น สากล ปากกาลูกลื่น
        ยีนส์/เดนิม) ซึ่งส่งผลต่อคุณภาพของตะเข็บและความเหมาะสมของเนื้อผ้า
    sewing_machine_shank_type:
      name: ประเภทก้านตีนผีจักรเย็บผ้า
      description: ระบุมาตรฐานการเชื่อมต่อระหว่างก้านและข้อเท้าของตีนผีที่ออกแบบมาสำหรับตีนผีนั้นๆ
        เพื่อให้มั่นใจได้ว่าสามารถใช้งานร่วมกับจักรเย็บผ้าได้ (เช่น ก้านต่ำ ก้านสูง
        ก้านเอียง)
    sewing_pattern_accessory_type:
      name: ประเภทอุปกรณ์เสริมแพทเทิร์นเย็บผ้า
      description: ระบุว่าแบบตัดเย็บนี้ใช้ทำเครื่องประดับอะไร
    sewing_pattern_notions_required:
      name: อุปกรณ์เย็บผ้าที่จำเป็น
      description: แสดงรายการวัสดุ/ฮาร์ดแวร์เพิ่มเติมที่โดดเด่นที่จำเป็นในการดำเนินโครงการให้เสร็จสิ้น
        (Beyond Fabric และติดตาม)
    sewing_pattern_recommended_fabric:
      name: ผ้าที่แนะนำสำหรับแพทเทิร์นการตัดเย็บ
      description: ระบุประเภท/น้ำหนักผ้าที่แนะนำสำหรับแพทเทิร์นการเย็บ (ตามที่ผู้ออกแบบแพทเทิร์นกำหนด)
    sewing_pattern_size_range:
      name: ช่วงขนาดของแพทเทิร์นเย็บผ้า
      description: ระบุช่วงขนาดที่ต้องการซึ่งครอบคลุมตามรูปแบบ (เช่น ตั้งแต่เด็กจนถึงผู้ใหญ่,
        Shopify Plus ขนาด)
    sewing_thread_size_system:
      name: จักรเย็บผ้าและระบบขนาด
      description: มาตรฐานการกำหนดขนาดที่ใช้ในการระบุขนาดเส้นด้าย (เช่น Tex, Denier,
        Ticket, หมายเลขน้ำหนัก, ขนาด V)
    shaft_curvature:
      name: ความโค้งของเพลา
      description: อธิบาย Shapes โดยรวมของก้านไม้กอล์ฟ ซึ่ง Influence การสวิง การตี
        และหลักสรีรศาสตร์
    shaft_kick_point:
      name: จุดเตะเพลา
      description: ระบุตำแหน่งตามแนวก้านไม้กอล์ฟที่โค้งงอมากที่สุดระหว่างการสวิง ซึ่งมีผลต่อวิถีการบินของลูกกอล์ฟ
    shaft_length_type:
      name: ประเภทความยาวเพลา
      description: การกำหนดขนาดตามมาตรฐานอุตสาหกรรมสำหรับก้านลูกดอก (เช่น สั้น กลาง)
        ใช้ในกรณีที่ไม่มีการระบุขนาดเป็นมิลลิเมตรที่แน่นอน
    shaft_shape:
      name: Shapesทรงเพลา
      description: กำหนดรูปทรงหน้าตัดของด้ามกระบอง (เช่น กลม สี่เหลี่ยม แปดเหลี่ยม)
    shaker_fill_material:
      name: วัสดุบรรจุภายในกระบอกเขย่า
      description: ระบุวัสดุหลักที่ใช้เติมภายในเพื่อสร้างเสียงเขย่า (หากมี) เช่น ลูกปัด
        เมล็ดพืช หรือลูกปืน
    shaker_shell_material:
      name: วัสดุของตัวเรือนเครื่องเขย่าไข่
      description: ระบุวัสดุหลักของตัวเครื่อง/เปลือกของเครื่องเขยาไข่ (ตัวเรือนภายนอก)
    shallot_variety:
      name: พันธุ์หอมแดง
      description: ระบุสายพันธุ์ ประเภททางการตลาด หรือพันธุ์เฉพาะของผลิตภัณฑ์หอมแดง
    shank_style:
      name: สไตล์ก้าน
      description: อธิบายรูปทรง/ลักษณะโดยรวมของก้านเหล็กสำหรับบังเหียน (เช่น ตรง โค้ง
        หรือแบบเฉียด)
    shapewear_enhancement_feature:
      name: คุณสมบัติเสริมของชุดกระชับสัดส่วน
      description: เน้นย้ำถึงคุณสมบัติหลักที่ช่วยเพิ่มประสิทธิภาพในการสวมใส่ (เช่น
        การกระชับหน้าท้อง การยกกระชับสะโพก ซับในกันซึม)
    sheath_type:
      name: ประเภทปลอก
      description: ประเภทของฝัก/ปลอกมีดที่มาพร้อมกับมีดสะสม
    sheet_music_clip_padding_material:
      name: แผ่นโน้ตเพลง การเว้นขอบด้านวัสดุ
      description: วัสดุของขากรรไกร/ด้ามจับ การเว้นขอบในตำแหน่งที่สัมผัสกับ Paper
        หรือขอบขาตั้งเพื่อป้องกันการฉีกขาดและลื่นไถล
    sheet_music_clip_spring_tension_level:
      name: คลิปโน้ตเพลง ระดับความตึงของสปริง
      description: ความแข็งแรงสัมพัทธ์ของสปริงคลิป / แรงหนีบ
    sheet_music_clip_use_environment:
      name: สภาพแวดล้อมการใช้งานคลิปโน้ตเพลง
      description: การตั้งค่าหลักที่ออกแบบมาเพื่อให้คลิปทำงานได้ดีที่สุด
    shell_construction:
      name: โครงสร้างเปลือก
      description: ระบุวิธีการสร้างตัวถังกลองเบส ซึ่งมีผลอย่างมากต่อโทนเสียงและน้ำหนัก
    shell_finish:
      name: การตกแต่งเปลือกหอย
      description: การตกแต่งภายนอก ทรีตเมนต์ของเปลือก doumbek
    shell_hull_status:
      name: สถานะเปลือก/ตัวเรือ
      description: ระบุว่าถั่วหรือเมล็ดพืชนั้นจำหน่ายโดยมีเปลือกหรือเอาเปลือกออกแล้ว
    shift_boot_attachment_method:
      name: วิธีการติดตั้งปลอกหุ้มคันเกียร์
      description: ระบุวิธีการติดตั้งปลอกหุ้มคันเกียร์เข้ากับแผงคอนโซล/แผงตกแต่งคันเกียร์ของรถ
        (เช่น การติดคลิปเข้ากับแผงตกแต่ง, แหวนยึด, กาว)
    shift_boot_installation_hardware_included:
      name: รวมการติดตั้ง Shift boot ไว้ด้วย
      description: แสดงรายการฮาร์ดแวร์และส่วนประกอบที่ติดตั้งมาพร้อมกับปลอกหุ้มคันเกียร์
    shift_knob_illumination:
      name: ไฟส่องสว่างหัวเกียร์
      description: ระบุว่าปุ่มเปลี่ยนเกียร์มีไฟส่องสว่างหรือไม่ และวิธีการ/ประเภทของไฟส่องสว่าง
        (เช่น ไฟเรืองแสง, LED, ไฟเบอร์ออปติก, รูปแบบแสงส่องจากด้านหลัง)
    shift_knob_installation_method:
      name: วิธีการติดตั้งหัวเกียร์
      description: ระบุวิธีการยึดหัวเกียร์เข้ากับคันเกียร์/ก้านเกียร์
    shift_knob_shape:
      name: รูปทรงของหัวเกียร์
      description: อธิบายถึงรูปทรงโดยรวมตามหลักสรีรศาสตร์ของหัวเกียร์
    shift_pattern_type:
      name: ประเภทรูปแบบการเปลี่ยนเกียร์
      description: ระบุรูปแบบของเครื่องหมายบอกตำแหน่งเกียร์บนหัวเกียร์ (ถ้ามี)
    shifter_compatibility:
      name: ความเข้ากันได้ของตัวเปลี่ยนเกียร์
      description: ระบุว่าส่วนต่อขยายแฮนด์นั้นใช้งานร่วมกับระบบเปลี่ยนเกียร์อิเล็กทรอนิกส์
        ระบบเปลี่ยนเกียร์แบบกลไก ทั้งสองแบบ หรือไม่สามารถใช้งานร่วมกับระบบเปลี่ยนเกียร์ใดๆ
        ได้เลย
    shifter_mounting_interface:
      name: ส่วนต่อประสานการติดตั้งตัวเปลี่ยนเกียร์
      description: อธิบายวิธีการติดตั้งตัวเปลี่ยนเกียร์เข้ากับจักรยาน (เช่น ขนาดแคลมป์เฉพาะ,
        I-Spec, MatchMaker, แบบติดปลายแฮนด์, แบบติดเฟรม หรือแบบไร้สาย)
    shifting_actuation_type:
      name: ประเภทการทำงานแบบเปลี่ยนตำแหน่ง
      description: ระบุกลไกที่ใช้ในการเปลี่ยนเกียร์ในชุดเกียร์ (แบบกลไก, แบบอิเล็กทรอนิกส์มีสาย,
        แบบอิเล็กทรอนิกส์ไร้สาย, แบบไฮดรอลิก)
    shifting_mechanism:
      name: กลไกการเปลี่ยนเกียร์
      description: ระบุว่าคันเกียร์ทำงานด้วยระบบกลไกหรือระบบอิเล็กทรอนิกส์ และเป็นแบบใช้ดัชนีหรือแบบใช้แรงเสียดทาน
    shim_purpose:
      name: วัตถุประสงค์ของชิม
      description: กำหนดประเภทการใช้งานของผลิตภัณฑ์ (เช่น แผ่นรองปรับระดับ, ลิ่ม,
        ตัวเว้นระยะ) เพื่อให้นักปั่นจักรยานสามารถค้นหาวิธีแก้ปัญหาการปรับแต่งที่เหมาะสมได้อย่างรวดเร็วโดยไม่ต้องมีหมวดหมู่ย่อยแยกต่างหาก
    shin_guard_attachment_method:
      name: วิธีการติดตั้งสนับแข้ง
      description: จำแนกรูปแบบการออกแบบโดยรวมของสนับแข้ง รวมถึงการรวมส่วนป้องกันข้อเท้าหรือโครงสร้างแบบถุงเท้า
    shirt_cuff_style:
      name: สไตล์ข้อมือเสื้อเชิ้ต
      description: อธิบายถึงโครงสร้างของข้อมือเสื้อ ซึ่งส่งผลต่อความเหมาะสมในการแต่งกาย
        การจับคู่กับกระดุมข้อมือ และความสบายในการสวมใส่
    shochu_base_ingredient:
      name: ส่วนผสมหลักของโชจู
      description: ระบุแหล่งที่มาหลักของแป้งหรือน้ำตาลที่ใช้ในการผลิตเหล้าโชจู
    shochu_soju_variety:
      name: โชจูและโซจูหลากหลาย
      description: จำแนกประเภทสินค้าตามรูปแบบหรือประเภทการผลิตที่เป็นที่ยอมรับ
    shock_absorber_bushing_material:
      name: วัสดุบูชโช้คอัพ
      description: วัสดุของบูช/ตัวแยกชิ้นส่วนสำหรับติดตั้ง Supply พร้อมกับโช้คอัพ
        หรือติดตั้งมาในตัวโช้คอัพอยู่แล้ว
    shock_absorber_charge_type:
      name: โช้คอัพรับแรงกระแทก
      description: ระบุเทคโนโลยีการบรรจุ/ลดแรงกระแทกของโช้คอัพ (เช่น ไฮดรอลิก/น้ำมัน,
        แก๊สอัด, อากาศ) และ/หรือการออกแบบท่อที่เกี่ยวข้องตามความเหมาะสม
    shock_absorber_mount_type_lower:
      name: ประเภทการติดตั้งโช้คอัพ (ด้านล่าง)
      description: รูปแบบการติดตั้งโช้คอัพแบบยึดด้านล่างเพื่อความลงตัวในการติดตั้ง
    shock_absorber_mount_type_upper:
      name: ประเภทการติดตั้งโช้คอัพ (ด้านบน)
      description: ระบุรูปแบบส่วนต่อประสานการติดตั้งด้านบน (ด้านหัว) ของโช้คอัพรถยนต์
        เพื่อให้สามารถติดตั้งและใช้งานร่วมกันได้
    shock_absorber_position:
      name: ตำแหน่งโช้คอัพ
      description: ระบุว่าโช้คอัพมีไว้สำหรับตำแหน่งด้านหน้า, ด้านหลัง, ซ้ายหรือขวาบนยานพาหนะ
        (มีรายละเอียดมากกว่าตำแหน่งที่วางเฉพาะเพลา)
    shock_absorption_system:
      name: ระบบดูดซับแรงกระแทก
      description: อธิบายกลไกที่ใช้ในการลดการสั่นสะเทือนและเสียงรบกวนขณะเด้งกลับ
    shoe_collar_height:
      name: ความสูงของขอบรองเท้า
      description: จำแนกรองเท้าตามส่วนหุ้มข้อ/ส่วนสูง (หุ้มข้อต่ำ สวมปานกลาง สวมสูง)
        เพื่อระบุการครอบคลุมข้อเท้าและความช่วยเหลือ
    shoe_cover_height:
      name: ความสูงของถุงครอบรองเท้าปั่นจักรยาน
      description: ระบุระดับการปกคลุมของที่คลุมรองเท้าจักรยาน โดยแยกความแตกต่างระหว่างที่คลุมนิ้วเท้ากับที่คลุมรองเท้าแบบเต็มทรงสูง
    shoe_sizing_system:
      name: ระบบไซซ์รองเท้า
      description: ระบุขนาดมาตรฐาน (US, UK, EU, JP, Mondopoint ฯลฯ) ที่ใช้สำหรับเนื้อหารองเท้าที่ระบุ
    shoelace_aglet_material:
      name: วัสดุสำหรับทำปลายเชือกรองเท้า
      description: ระบุวัสดุที่ใช้ทำส่วนปลายเชือกผูกรองเท้า (aglets) ซึ่งมีผลต่อความทนทานและสไตล์
    shooting_rest_design:
      name: การออกแบบแท่นพาดปืน
      description: จำแนกประเภทโครงสร้างของ REST (เช่น อุปกรณ์ REST แบบถุง, แบบเลื่อน,
        อุปกรณ์รองรับ REST แบบสามขา, ที่หนีบปืน ฯลฯ)
    shooting_stick_yoke_design:
      name: การออกแบบโครงยึดไม้ยิงปืน
      description: ระบุรูปแบบของแท่นรองหรือโครงยึดที่ใช้เชื่อมต่อกับปืนหรืออุปกรณ์เล็งเป้า
    shooting_target_style:
      name: สไตล์การยิงเป้า
      description: จำแนกประเภทเป้ายิงตามโครงสร้าง วัสดุ หรือการออกแบบ (เช่น เป้าเหล็ก
        เป้ากระดาษ เป้าหมุน) เพื่อช่วยให้เลือกใช้งานได้เหมาะสม
    shooting_target_type:
      name: เป้าสำหรับยิง
      description: จำแนกเป้าหมายการยิงตามรูปแบบโครงสร้าง วัสดุ หรือการออกแบบ (เช่น
        เป้าเหล็ก เป้าเงา เป้า Paper เป้าหมุน) ช่วยให้ผู้ยิงสามารถค้นหาเป้าหมายที่ถูกต้องสำหรับประเภทการยิงและประเภทปืนของตนได้อย่างรวดเร็ว
    short_block_assembly_balance_type:
      name: ประเภทสมดุลชุดประกอบบล็อกสั้น
      description: ระบุว่าชุดประกอบหมุนนั้นมีการปรับสมดุลภายในหรือภายนอก
    short_block_intended_use:
      name: บล็อกสั้นมีวัตถุประสงค์เพื่อการใช้งาน
      description: กรณีการใช้งานหลักสำหรับบล็อกขนาดสั้น
    short_block_rotating_assembly_included:
      name: รวมชุดประกอบหมุนบล็อกสั้น
      description: ระบุว่าส่วนประกอบหลักของชุดประกอบหมุนได้ใดบ้างที่รวมอยู่ในชุดเครื่องยนต์แบบบล็อกสั้น
    shot_size:
      name: ขนาดลูกปืน
      description: ระบุขนาดลูกปืนสำหรับลูกปืนหรือส่วนประกอบกระสุนปืนแบบแยกชิ้น
    shotgun_action_type:
      name: ประเภทการทำงานแบบปืนลูกซอง
      description: ระบุกลไกการทำงาน/การทำงานของปืนลูกซอง
    shotgun_choke_type:
      name: โช้คปืนลูกซอง
      description: ระบุการตั้งค่าโช้คของลำกล้องปืนลูกซอง
    shotgun_gauge:
      name: เกจปืนลูกซอง
      description: ระบุขนาดลำกล้องปืนลูกซอง (และขนาด .410 ในกรณีที่เกี่ยวข้อง) เพื่อใช้ในการระบุและกรองรายการสินค้าสะสม
    shotgun_stock_material:
      name: วัสดุสำหรับด้ามปืนลูกซอง
      description: ระบุวัสดุหลักของส่วนหน้า/ส่วนท้าย (เฟอร์นิเจอร์)
    shuffleboard_speed_rating:
      name: ระดับความเร็วของชัฟเฟิลบอร์ด
      description: ระบุความเร็วในการลื่นไถลสัมพัทธ์ที่ผงสำหรับโต๊ะชัฟเฟิลบอร์ดหรือผลิตภัณฑ์บำรุงรักษาอื่นๆ
        ให้บนโต๊ะ ทำให้ผู้เล่นสามารถเลือกความเร็วที่เหมาะสมกับระดับทักษะและความยาวของโต๊ะได้
    shuffleboard_table_length_compatibility:
      name: ความเข้ากันได้ของความยาวโต๊ะชัฟเฟิลบอร์ด
      description: ความยาวมาตรฐานของโต๊ะเล่นชัฟเฟิลบอร์ดที่ผลิตภัณฑ์ได้รับการออกแบบมาให้พอดีหรือเข้ากันได้ดี
    shuttlecock_base_material:
      name: วัสดุที่ใช้ทำส่วนหัวของลูกแบดมินตัน
      description: ระบุวัสดุที่ใช้ทำส่วนหัว/ฐานของลูกแบดมินตัน ซึ่งส่งผลต่อความทนทาน
        ความรู้สึก และการกระดอนกลับ
    shuttlecock_feather_material:
      name: วัสดุขนนกสำหรับลูกแบดมินตัน
      description: ระบุแหล่งที่มาหลักของขนหรือประเภทการผลิตที่ใช้ทำกระโปรงลูกแบดมินตัน
        ซึ่งมีผลต่อความทนทาน ความสม่ำเสมอ และราคา
    shuttlecock_grade:
      name: ลูกแบดมินตันเกรด
      description: ระบุระดับการเล่นหรือการจัดประเภทคุณภาพที่ต้องการ (เช่น การฝึกซ้อม
        สโมสร การแข่งขัน)
    shuttlecock_speed_rating:
      name: ระดับความเร็วของลูกแบดมินตัน
      description: ระบุความเร็วหรือระดับความเร็วที่ผู้ผลิตกำหนดไว้สำหรับลูกแบดมินตัน
        ทำให้ผู้เล่นสามารถเลือกความเร็วในการบินที่เหมาะสมกับสภาพการเล่น อุณหภูมิ และระดับความสูงได้
    side_panel_installation_state:
      name: สถานะการติดตั้งแผงด้านข้าง
      description: ระบุว่าแผงด้านข้างนั้น Supply เปล่าๆ ทาสีรองพื้น ทาสีแล้ว หรือเคลือบ/เตรียมพื้นผิวอื่นๆ
        สำหรับการติดตั้ง
    side_wall_mechanism:
      name: กลไกผนังด้านข้าง
      description: อธิบายวิธีการเปิดหรือลดระดับผนังด้านข้างของเปลเด็กเพื่อเข้าถึงตัวทารก
    signal_source:
      name: แหล่งสัญญาณ
      description: ระบุวิธีการที่มาตรวัดระยะทางรับ/ประมวลผลข้อมูลระยะทางหรือเวลา
    silk_fiber_type:
      name: เส้นใยไหมชนิด
      description: ชนิด/แหล่งที่มาของเส้นใยไหมที่ใช้ในการผลิตผ้า (เช่น ไหมหม่อนหรือไหมทัสซาห์)
        ส่งผลต่อเนื้อสัมผัส ความสม่ำเสมอ และราคา
    simulated_game_species:
      name: สายพันธุ์เกมจำลอง
      description: ระบุชนิดของนกหรือสัตว์ป่าที่หุ่นจำลองนั้นเลียนแบบ เพื่อการฝึกที่สมจริง
    singlet_cut_style:
      name: สไตล์เสื้อกล้าม
      description: ระบุรูปแบบ/สไตล์ของชุดมวยปล้ำ โดยคำนึงถึงความสูงของสายรัด รูปทรงด้านหลัง
        และความแตกต่างตามเพศ/เยาวชน
    sink_material:
      name: วัสดุอ่างล้างหน้า
      description: ระบุวัสดุของอ่างล้างหน้าแบบติดตั้งในตัวที่มาพร้อมกับเคาน์เตอร์อ่างล้างหน้า
    sinker_attachment_style:
      name: รูปแบบการยึดตะกั่ว
      description: อธิบายกลไกที่ติดตั้งอยู่บนลูกตุ้มถ่วงสายเบ็ดสำหรับใช้ยึดติดกับสายเบ็ดหรือชุดเบ็ดตกปลา
    sinker_finish:
      name: จมน้ำ
      description: ระบุการเคลือบภายนอกหรือการปรับสภาพพื้นผิวของลูกตุ้มถ่วงน้ำหนัก
    sinker_shape:
      name: รูปทรงตะกั่วตกปลา
      description: กำหนดรูปทรงเรขาคณิตของลูกตุ้มถ่วงน้ำหนัก (เช่น ทรงกระสุน ทรงกระบอก
        ทรงหยดน้ำ) เพื่อให้นักตกปลาสามารถเลือกรูปแบบการนำเสนอและการต้านทานการติดสิ่งกีดขวางที่เหมาะสมที่สุดได้
    siren_system_included:
      name: รวมระบบไซเรน
      description: ระบุว่ามีการติดตั้งระบบไซเรน/ระบบPA หรือไม่ และเป็นประเภทใด
    siren_system_type:
      name: ระบบไซเรนแบบต่างๆ
      description: ระบุการตั้งค่าไซเรนหรือระบบประกาศเสียง PA ที่ติดตั้งบนรถตำรวจ
    size_designation:
      name: การกำหนดขนาด
      description: Label ขนาดมาตรฐานสำหรับเครื่องดนตรีสามเหลี่ยม
    size_system:
      name: ระบบขนาด
      description: ระบุระบบการวัดหรือมาตรฐานภูมิภาคที่ใช้กับป้ายไซซ์ (เช่น US, UK,
        EU หรือไซซ์สากล)
    sizzle_mechanism:
      name: กลไกเสียงซ่า
      description: ระบุวิธีการที่ฉาบสร้างเสียงซ่า (เช่น การติดตั้งหมุดย้ำในฉาบ โซ่/อุปกรณ์สร้างเสียงซ่าที่สามารถติดได้
        หรือไม่มีอุปกรณ์เสริมใดๆ)
    skate_blade_discipline:
      name: วินัยใบมีดสเก็ต
      description: ระบุประเภทกีฬาหรือการใช้งานที่ใบมีดออกแบบมา เช่น ฮอกกี้หรือสเก็ตลีลา
        ช่วยให้ผู้ซื้อสามารถกรองหาใบมีดที่ตรงกับความต้องการได้
    skate_brake_type:
      name: ประเภทเบรกสเก็ต
      description: ระบุรูปแบบของกลไกการหยุดที่ติดตั้งมากับรองเท้าสเก็ต
    skateboard_nut_thread_size:
      name: น็อตสเก็ตบอร์ด ขนาด
      description: ระบุขนาดเกลียว (เส้นผ่านศูนย์กลางและระยะห่างของเกลียว) ของน็อตเพื่อให้มั่นใจได้ว่าสามารถใช้งานร่วมกับแกนล้อ
        คิงพิน หรืออุปกรณ์ยึดของสเก็ตบอร์ดได้
    skein_winder_bearing_bushing_type:
      name: ตลับลูกปืน/บูชสำหรับเครื่องม้วนด้าย
      description: ระบุประเภทของตลับลูกปืนหรือบูชที่ใช้ในชุดประกอบหมุนของเครื่องม้วนด้าย
    skein_winder_drive_type:
      name: ประเภทไดรฟ์ม้วนด้าย
      description: วิธีการหมุน/จ่ายพลังงานให้กับเครื่องม้วนเส้นด้ายขณะใช้งาน
    ski_binding_mechanism:
      name: กลไกการยึดสกี
      description: กำหนดรูปแบบการออกแบบเชิงกลพื้นฐานหรือประเภทของอุปกรณ์ยึด (เช่น
        สกีอัลไพน์, สกีเทคนิค/พิน, สกีเทเลมาร์ค)
    ski_binding_part_type:
      name: ประเภทชิ้นส่วนยึดสกี
      description: ระบุส่วนประกอบหรืออุปกรณ์เสริมเฉพาะสำหรับอุปกรณ์ยึดรองเท้าสกี ทำให้สามารถกรองชิ้นส่วนประเภทต่างๆ
        ได้อย่างรวดเร็ว
    ski_boot_sole_standard:
      name: พื้นรองเท้าสกีมาตรฐาน
      description: ระบุมาตรฐานเดียวหรือมาตรฐานความเข้ากันได้ของอุปกรณ์ยึดที่รองเท้าสกีได้รับการรับรอง
    skill_focus:
      name: การมุ่งเน้นทักษะ
      description: ระบุทักษะบาสเก็ตบอลหลักที่อุปกรณ์ฝึกซ้อมนี้มุ่งหวังที่จะพัฒนา
    skimboard_construction:
      name: โครงสร้างของสกีมบอร์ด
      description: อธิบายโครงสร้างหลักของบอร์ด โดยเน้นที่แกนกลางและเทคนิคการวางชั้นวัสดุ
        (เช่น แกนโฟม แกนไม้)
    skin_presence:
      name: การมีอยู่ของผิวหนัง
      description: ระบุว่าไก่ที่ขายนั้นจำหน่ายแบบมีหนังติดอยู่ ไม่มีหนัง หรือไม่มีหนัง
        หรือไม่มีหนังบางส่วน
    slapstick_handle_type:
      name: หวดแฮนสลิงประเภท
      description: อธิบายลักษณะการพัน/ด้ามจับที่ประกอบเข้ากับไม้ตีตลก ซึ่งส่งผลต่อหลักสรีรศาสตร์และความสะดวกสบายในการเล่น
    slapstick_playing_surface_material:
      name: วัสดุสำหรับพื้นสนามเล่นตลก
      description: ระบุวัสดุของส่วนประกอบที่กระทบกันเพื่อสร้างเสียง
    sled_brake_type:
      name: ประเภทเบรกของเลื่อน
      description: ระบุกลไกการเบรกที่ติดตั้งอยู่บนเลื่อน หากมี
    sled_towing_method:
      name: วิธีการลากเลื่อน
      description: ระบุวิธีการหลักในการดึงหรือลากเลื่อน
    sleep_position_suitability:
      name: ความเหมาะสมของท่าทางการนอน
      description: ระบุว่าที่นอนนี้ออกแบบมาเพื่อรองรับท่าทางการนอนใดได้อย่างมีประสิทธิภาพที่สุด
    sleeping_bag_shape:
      name: Shapesของถุงนอน
      description: รูปทรงโดยรวมของถุงนอนส่งผลต่อความอบอุ่น น้ำหนัก และความกว้างขวาง
    sleeping_pad_type:
      name: แผ่นรองนอน
      description: ระบุรูปแบบการผลิตของแผ่นรองนอน เช่น โฟมเซลล์ปิดหรือแบบเป่าลม ซึ่ง
        Impact โดยตรงต่อความสบาย น้ำหนัก และฉนวนกันความร้อน
    sleepwear_set_pieces_included:
      name: สินค้าชุดนอนที่รวมมาชุด
      description: แสดงรายการส่วนประกอบแต่ละชิ้นที่อยู่ในชุดนอนหรือชุดลำลองแบบหลายชิ้น
    sleeve_bearing_type:
      name: ประเภทของตลับลูกปืนแบบปลอก
      description: ระบุเทคโนโลยีที่ช่วยให้ปลอกหมุนได้ ซึ่งส่งผลต่อคุณภาพการหมุนในการยกน้ำหนักโอลิมปิก
    sleeve_style:
      name: รูปแบบแขนเสื้อ
      description: ระบุรูปแบบแขนเสื้อนอกเหนือจากความยาว (เช่น แขนเสื้อแบบแร็กแลน)
    slide_board_accessories_included:
      name: อุปกรณ์เสริมสำหรับกระดานสไลด์รวมอยู่ด้วย
      description: แสดงรายการเสริมที่บรรจุมาพร้อมกับกระดานสไลด์ เพื่อให้นักช้อปทราบแน่ชัดว่ามีอะไรรวมอยู่และสามารถเปรียบเทียบชุดได้
    slide_installation_type:
      name: ประเภทการติดตั้งสไลเดอร์
      description: วิธีการติดตั้งหรือยึดสไลเดอร์ (แบบตั้งเดี่ยว แบบติดกับชุดสนามเด็กเล่น
        ฯลฯ)
    slide_intended_finger:
      name: เลื่อนนิ้วที่ต้องการ
      description: ระบุว่าควรสวมตัวเลื่อนที่นิ้วใด หรือระบุว่าไม่สามารถใช้งานได้ (เช่น
        แถบเสียง)
    slide_safety_features:
      name: คุณสมบัติความปลอดภัยของสไลด์
      description: องค์ประกอบการออกแบบที่เกี่ยวข้องกับความปลอดภัยที่แสดงอยู่ในสไลด์นี้
    slide_type:
      name: ประเภทสไลด์
      description: ระบุประเภทของกลไกเลื่อนทองเหลืองที่ผลิตภัณฑ์นี้ออกแบบมาเพื่อทำความสะอาด
    slide_water_use_capability:
      name: ความสามารถในการใช้น้ำของสไลด์
      description: สไลด์ได้รับการออกแบบให้ใช้กับน้ำหรือไม่ (เช่น การตรวจสอบสายยาง)
        และอย่างไร
    slime_putty_kit_components_included:
      name: ส่วนประกอบที่รวมอยู่ในชุดสไลม์และพัตตี้
      description: แสดงรายการเครื่องมือและส่วนประกอบเพิ่มเติมที่รวมอยู่ในผลิตภัณฑ์สไลม์/พัตตี้
        (โดยเฉพาะสำหรับชุด/แพ็คเกจ)
    sling_material:
      name: วัสดุที่ใช้ทำสายโยง
      description: ระบุชนิดของเส้นใยหรือสิ่งทอที่ใช้ในสายรัดของควิกดรอว์
    smith_machine_bar_path:
      name: เส้นทางบาร์เครื่องสมิธ
      description: อธิบายเส้นทางการเคลื่อนที่คงที่ของแท่งเหล็ก โดยแจ้งให้ผู้ใช้ทราบเกี่ยวกับกลไกทางชีวภาพและข้อกำหนดด้านพื้นที่
    smoke_color:
      name: สีควัน
      description: สีของควันที่เกิดจากแฟลร์หรือสัญญาณควัน (แตกต่างจากสีของตัวสินค้า)
    smoked_malt_smoking_material:
      name: วัสดุสำหรับสูบมอลต์รมควัน
      description: สำหรับมอลต์รมควัน จะระบุวัสดุที่ใช้ในการรมควัน (เช่น ชนิดของไม้หรือพีท)
    snack_mix_variety:
      name: ขนมขบเคี้ยวหลากหลายชนิด
      description: จำแนกประเภทสินค้าตามลักษณะการผสม (เช่น ผสมเทรล ผสมถั่ว น้ำคีน เจ็ด)
    snack_processing_method:
      name: วิธีการแปรรูปทำขนมขบเคี้ยว
      description: ระบุเทคนิคการแปรรูปหรือการถนอมอาหารหลักที่ใช้ในการผลิตขนมขบเคี้ยว
        (เช่น การแช่แข็งแบบแห้ง การอบ การย่าง)
    snack_texture:
      name: เนื้อสัมผัสของขนมขบเคี้ยว
      description: บ่งบอกถึงลักษณะการกัดหรือสัมผัสในปากของแท่งงา
    snap_installation_method:
      name: วิธีการติดตั้งกระดุมแป๊ก
      description: วิธีการติดตั้ง/ยึดกระดุมแป๊กเข้ากับวัสดุชิ้นงาน
    snare_drum_bearing_edge_profile:
      name: โปรไฟล์ขอบแบริ่งกลองสแนร์
      description: ขอบรับแรงกระแทก/รูปทรงของตัวกลองสแนร์
    snare_drum_finish_type:
      name: ประเภทการตกแต่งผิวกลองสแนร์
      description: โครงสร้าง/ประเภทการตกแต่งระดับสูงที่ใช้กับตัวกลองสแนร์
    snare_drum_hoop_type:
      name: ประเภทของขอบกลองสแนร์
      description: ประเภทของขอบ/ห่วงที่ใช้กับกลองสแนร์
    snare_drum_mounting_type:
      name: ประเภทการติดตั้งกลองสแนร์
      description: วิธีการติดตั้ง/ใช้งานกลองสแนร์ที่ถูกต้อง
    snare_drum_shell_material:
      name: วัสดุที่ใช้ทำตัวกลองสแนร์
      description: ระบุชนิดของโลหะ/โลหะผสมที่ใช้ทำตัวกลองสแนร์ (ส่วนหลัก) ซึ่งมีผลอย่างมากต่อโทนเสียง
        น้ำหนัก และความทนทาน
    snare_drum_strainer_mechanism:
      name: กลไกปรับความตึงของกลองสแนร์
      description: ประเภทของกลไกปรับความตึง/ปลดสายสแนร์ที่ใช้ในการดึง/ปลดสายสแนร์
    snare_drum_strainer_type:
      name: ตัวปรับความตึงกลองสแนร์
      description: ประเภทของกลไกปรับความตึง/ปลดสายสแนร์ที่ใช้ในการดึง/ปลดสายสแนร์
    snare_hoop_type:
      name: ห่วงสแนร์
      description: ประเภทของขอบ/ห่วงบนกลองสแนร์
    snare_throw_off_type:
      name: ประเภทตัวโยนสแนร์
      description: ประเภทของกลไกปรับความตึง/ปลดสายสแนร์ที่ใช้ในการดึง/ปลดสายสแนร์
    snip_cutter_spring_mechanism:
      name: กลไกสปริงของคีมตัด
      description: ระบุว่ากรรไกรตัดลวดใช้กลไกสปริง/กลไกคืนตัวหรือไม่ และเป็นแบบไหน
    snorkel_mount_position:
      name: ตำแหน่งติดตั้งสนอร์เกิล
      description: อธิบายตำแหน่งของท่อหายใจบนศีรษะของผู้ใช้ขณะใช้งาน
    snorkel_top_type:
      name: แบบสนอร์เกิลด้านบน
      description: อธิบายลักษณะการป้องกันการเข้าสู่ผิวน้ำบริเวณส่วนบนของท่อหายใจที่รวมอยู่ในชุด
    snow_condition_suitability:
      name: ความเหมาะสมของสภาพหิมะ
      description: อธิบายหิมะหลักที่สินค้าที่มีไว้สำหรับขี้ผึ้ง
    snow_sports_helmet_safety_certification:
      name: การรับรองความปลอดภัยของหมวกกันน็อคสำหรับกีฬาหิมะ
      description: ระบุมาตรฐานความปลอดภัยที่หมวกกันน็อคนี้ผ่านมาตรฐานสำหรับการเล่นสกีและสโนว์บอร์ด
    snowboard_base_material:
      name: วัสดุฐานสโนว์บอร์ด
      description: ระบุส่วนประกอบพื้นฐานหรือพื้นผิว (เกรดขึ้นรูปด้วยการอัดรีด การเผาผนึก
        สูตรเฉพาะ) ที่ส่งผลต่อความเร็ว ความทนทาน และการบำรุงรักษา
    snowboard_width_class:
      name: บอร์ดสโนว์บอร์ด คลาสความกว้าง
      description: จำแนกความกว้างโดยรวมของบอร์ดตามขนาดรองเท้า (เช่น ปกติ, กว้าง)
    soccer_ball_compartment_type:
      name: ประเภทช่องใส่ลูกฟุตบอล
      description: ระบุว่ากระเป๋าเป้สะพายหลังสามารถใส่ลูกฟุตบอลได้หรือไม่ (หรือใส่ได้ในลักษณะใด)
    soccer_ball_type:
      name: ประเภทลูกฟุตบอล
      description: ระบุวัตถุประสงค์การใช้งานหรือรูปแบบของลูกฟุตบอล (เช่น สำหรับการแข่งขัน
        การฝึกซ้อม ฟุตซอล) เพื่อให้ผู้ซื้อสามารถค้นหาลูกฟุตบอลที่ต้องการได้อย่างรวดเร็วโดยไม่ต้องค้นหาในหมวดหมู่ย่อยมากมาย
    soccer_dummy_base_type:
      name: หุ่นจำลองนักฟุตบอลแบบฐาน
      description: อธิบายรูปแบบของฐานหรือกลไกการยึดที่หุ่นจำลองใช้
    soccer_dummy_design:
      name: การออกแบบหุ่นฝึกซ้อมฟุตบอล
      description: ระบุรูปแบบการสร้างหุ่นฝึกซ้อมประตูฟุตบอล เช่น แบบแข็งหรือแบบเป่าลม
    soccer_goal_target_style:
      name: รูปแบบของเป้าฝึกซ้อมฟุตบอล
      description: กำหนดรูปทรงหรือดีไซน์ของเป้าฝึกซ้อม เพื่อให้ผู้ซื้อสามารถเลือกรูปแบบที่เหมาะสมกับการฝึกซ้อมของตนได้มากที่สุด
    soccer_goal_type:
      name: ประเภทของประตูฟุตบอล
      description: ระบุรูปแบบโครงสร้างหรือวัตถุประสงค์การใช้งานของเป้าหมาย (เช่น ป๊อปอัพ,
        รีบาวน์เดอร์, สตรีท)
    sock_cushioning:
      name: การรองรับแรงกระแทกของถุงเท้า
      description: ระบุจำนวนและรูปแบบของวัสดุกันกระแทกใต้ฝ่าเท้าหรือการเว้นขอบที่รวมอยู่ในถุงเท้า
    sock_cushioning_level:
      name: ระดับการรองรับแรงกระแทกของถุงเท้า
      description: ระบุปริมาณของวัสดุรองรับแรงกระแทกใต้ฝ่าเท้าที่ผสานอยู่ในถุงเท้า
    sock_grip_type:
      name: ประเภทการยึดเกาะถุงเท้า
      description: อธิบายถึงคุณสมบัติการยึดเกาะหรือกันลื่นที่ใช้กับพื้นรองเท้าของถุงเท้า
    sock_toe_style:
      name: รูปแบบปลายถุงเท้า
      description: อธิบายรูปแบบการตัดเย็บบริเวณปลายเท้าของถุงเท้า
    soft_bait_style:
      name: ประเภทของเหยื่ออ่อน
      description: จำแนกประเภทการออกแบบหรือรูปทรงของเหยื่อพลาสติกอ่อน (เช่น หนอน,
        เหยื่อว่ายน้ำ, เหยื่อตัวอ่อน)
    soft_top_attachment_type:
      name: ประเภทการยึดหลังคาผ้าใบ
      description: ระบุวิธีการติดตั้งหลังคาผ้าใบเข้ากับตัวรถ (เช่น ราง ตัวล็อก ตีนตุ๊กแก
        เป็นต้น)
    soft_top_includes_frame_hardware:
      name: ซอฟท์ท็อปมี Frame/ฮาร์ดแวร์
      description: ระบุว่าสินค้ามี Frameหลังคาอ่อน /คันธนู และ/หรือ ฮาร์ดแวร์สำหรับติดตั้งหรือไม่
    soft_top_installation_type:
      name: ประเภทการติดตั้งหลังคาผ้าใบ
      description: ระบุวิธีการติดตั้ง/ยึดหลังคาผ้าใบของรถยนต์ โดยแสดงวิธีการติดตั้งที่คาดไว้และความพยายามที่ต้องใช้
    soft_top_window_configuration:
      name: รูปแบบโครงสร้างหน้าต่างหลังคาผ้าใบ
      description: ระบุจำนวนหน้าต่างของหลังคาผ้าใบ และตำแหน่งของหน้าต่างเหล่านั้น
    softball_certification:
      name: การรับรองลูกซอฟต์บอล
      description: แสดงรายการตราประทับหรือการอนุมัติจากหน่วยงานกำกับดูแลที่พิมพ์อยู่บนลูกบอล
        ซึ่งเป็นตัวกำหนดคุณสมบัติในการเข้าร่วมลีก/การแข่งขัน
    softness_level:
      name: ระดับความนุ่ม
      description: บ่งบอกถึงความนุ่ม/ความบางของด้านที่เป็นห่วง ซึ่งมีความสำคัญต่อความสบายเมื่อสัมผัสกับผิวหนังและการใช้งานที่ไม่ทำให้รู้สึกเทอะทะ
    solar_system_model_included_bodies:
      name: แบบจำลองระบบสุริยะที่ประกอบด้วยวัตถุต่างๆ
      description: ระบุว่าวัตถุทางดาราศาสตร์ใดบ้างที่ปรากฏอยู่ในชุดแบบจำลอง
    solar_system_model_scaling:
      name: การปรับขนาดแบบจำลองระบบสุริยะ
      description: ระบุว่าแบบจำลองระบบสุริยะเป็นการขยายสเกลสำหรับดาวเคราะห์ขนาด ระยะทาง/วงโคจร
        ทั้งสองอย่าง หรือเป็นการแสดงแผนผัง/ไม่ขยายสเกล
    sold_secure_certification_level:
      name: ระดับการรับรอง Sold Secure
      description: ระบุระดับ Sold Secure ที่ตัวล็อกได้รับจากหน่วยงานทดสอบอิสระของสหราชอาณาจักร
        (Bronze, Silver, Gold, Diamond)
    sold_secure_rating:
      name: เรตติ้ง Sold Secure
      description: ระบุระดับการรับรอง Sold Secure ที่กำหนดให้กับตัวล็อค
    sole_construction:
      name: โครงสร้างพื้นรองเท้า
      description: บ่งบอกถึงโครงสร้างของพื้นรองเท้า (แบบเต็มแผ่น แบบแยกแผ่น แบบสองชิ้น
        ฯลฯ) ซึ่งส่งผลโดยตรงต่อความยืดหยุ่น การสัมผัสพื้น และความเหมาะสมสำหรับเทคนิคการเต้นเฉพาะด้าน
    sole_type:
      name: ประเภทพื้นรองเท้า
      description: อธิบายรูปแบบโครงสร้างของพื้นรองเท้า โดยระบุถึงความยืดหยุ่นและการใช้งานที่ตั้งใจไว้
    soprano_saxophone_body_style:
      name: รูปแบบตัวเครื่องของแซ็กโซโฟนโซปราโน
      description: อธิบายลักษณะทางกายภาพของตัวเครื่องแซกโซโฟนโซปราโน
    soprano_saxophone_mouthpiece_baffle_type:
      name: แบบแผ่นกั้นภายในปากเป่าแซกโซโฟนโซปราโน
      description: อธิบายถึงการออกแบบแผ่นกั้น/หลังคาของปากเป่า (ส่วนโค้งด้านหลังปลายปากเป่า)
        ซึ่งส่งผลต่อความสว่าง การส่งเสียง และการตอบสนอง
    soprano_saxophone_mouthpiece_chamber_size:
      name: ขนาดโพรงด้านในของปากเป่าแซกโซโฟนโซปราโน
      description: อธิบายขนาดของช่องภายในของปากเป่าแซกโซโฟนโซปราโน ซึ่งมีผลต่อแรงต้านและโทนเสียง
    soprano_saxophone_mouthpiece_finish:
      name: การตกแต่งผิวปากเป่าแซกโซโฟนโซปราโน
      description: การตกแต่งผิว/การชุบผิวที่ใช้กับปากเป่า (ถ้ามี)
    soprano_saxophone_mouthpiece_included_accessories:
      name: อุปกรณ์เสริมประกอบด้วย ปากเป่าแซ็กโซโฟนโซปราโน
      description: ระบุว่าอุปกรณ์เสริมใดบ้างที่รวมมากับปากเป่า
    soprano_saxophone_mouthpiece_tonal_character:
      name: ลักษณะเสียงของปากเป่าแซกโซโฟนโซปราโน
      description: ลักษณะเสียงระดับสูงที่มักพบได้ในการออกแบบปากเป่า
    sound_character:
      name: ลักษณะเสียง
      description: อธิบายถึงโทนเสียงโดยรวมที่เกิดจากการแสดงตลกแบบใช้ไม้ตี
    sound_expansion_method:
      name: วิธีการขยายเสียง
      description: ระบุวิธีการที่โมดูลสามารถเพิ่มหรือขยายคลังเสียงภายในนอกเหนือจากเสียงที่มาจากโรงงาน
        (เช่น ชุดเนื้อหา การนำเข้าตัวอย่างเสียง การ์ดขยาย)
    sound_module_sound_library_focus:
      name: ไลบรารีเสียง Sound Modules โฟกัส
      description: เน้นไปที่ชุดเสียงจากโรงงานเป็นหลักเพื่อช่วยให้นักช้อปค้นหา Modules
        ที่เหมาะกับสไตล์/การใช้งานเคสของพวกเขา
    sound_port_type:
      name: ประเภทช่องเสียง
      description: อธิบายถึงการออกแบบช่องเสียง/พอร์ตด้านหลังของคาฮอน ซึ่งมีผลต่อการกระจายเสียงและการตอบสนองเสียงต่ำ
    sound_sensitivity_control:
      name: การควบคุมความไวต่อเสียง
      description: ระบุว่าสามารถปรับความไวต่อเสียงได้หรือไม่ และอย่างไร
    sound_synthesizer_patch_memory:
      name: หน่วยความจำแพทช์เครื่องสังเคราะห์เสียง
      description: ระบุว่าซินเธไซเซอร์สามารถบันทึกและเรียกใช้ค่าที่ตั้งไว้ล่วงหน้า
        (แพทช์) ได้หรือไม่
    sound_type:
      name: ประเภทเสียง
      description: ประเภทเสียงหลักหรือเอาต์พุตเสียงที่แผ่นรองสร้างขึ้น (เช่น เครื่องดนตรี
        เพลง เสียงแนะนำ) เพื่อเป็นแนวทางในการเล่น
    soundboard_material:
      name: วัสดุที่ใช้ทำแผ่นเสียงของพิณ
      description: วัสดุที่ใช้ทำแผ่นเสียง (ด้านบน) ของพิณ ซึ่งเป็นส่วนที่ทำให้เกิดเสียงสะท้อนและโทนเสียง
    soup_or_broth_variety:
      name: ประเภทของซุปหรือน้ำซุป
      description: ระบุรูปแบบ สูตร หรือวิธีการปรุงซุปหรือน้ำซุป เพื่อให้ผู้ซื้อสามารถค้นหาประเภทที่ต้องการได้อย่างรวดเร็ว
    sour_cream_variety:
      name: ครีมเปรี้ยวหลากหลายชนิด
      description: จำแนกประเภทผลิตภัณฑ์ครีมเปรี้ยวตามชนิดหรือรูปแบบทางวัฒนธรรมเฉพาะ
        เช่น ครีมเฟรช หรือ ครีมเม็กซิกัน
    soy_sauce_variety:
      name: ประเภทของซอสถั่วเหลือง
      description: ระบุรูปแบบหรือสูตรเฉพาะของซีอิ๊ว (เช่น ซีอิ๊วอ่อน ซีอิ๊วเข้ม ทามาริ
        พอนซู) ช่วยให้สามารถกรองตามรสชาติและการใช้งานในการทำอาหารได้อย่างรวดเร็ว
    spark_plug_electrode_material:
      name: วัสดุของขั้วไฟฟ้าหัวเทียน
      description: วัสดุ/เทคโนโลยีของปลายขั้วอิเล็กโทรดจุดระเบิด (ตรงกลางและ/หรือกราวด์)
        ของหัวเทียน ตามที่วางจำหน่าย (เช่น ทองแดง แพลทินัม อิริเดียม)
    spark_plug_seat_type:
      name: ประเภทเบาะ Spark
      description: รูปแบบการซีล/เบาะรองที่ใช้โดย Spark บริเวณส่วนต่อประสานของฝาสูบ
    spark_plug_terminal_type:
      name: ประเภทขั้วหัวเทียน
      description: ขั้วต่อแบบด้านบนใช้สำหรับเชื่อมต่อสายไฟ/ปลั๊กจุดระเบิด
    sparkler_shape:
      name: รูปทรงพลุไฟ
      description: รูปทรงหรือลักษณะโดยรวมของพลุไฟ
    speaker_cone_material:
      name: วัสดุของกรวยลำโพง
      description: วัสดุหลักของกรวยลำโพง (กรวยวูฟเฟอร์/กรวยเสียงกลาง)
    speaker_size:
      name: ขนาดลำโพง
      description: ขนาดไดร์เวอร์/ขนาดติดตั้งโดยประมาณสำหรับลำโพงแบบแยกชิ้น (เช่น 6.5
        นิ้ว, 6x9 นิ้ว) ใช้เพื่อจับคู่กับตำแหน่งติดตั้งจากโรงงานและอะแดปเตอร์ลำโพง
    special_effects_output_interface:
      name: อินเทอร์เฟซเอาต์พุตเอฟเฟกต์พิเศษ
      description: ระบุขั้วต่อ/อินเทอร์เฟซเอาต์พุตที่ใช้ควบคุมอุปกรณ์เอฟเฟกต์พิเศษ
    special_effects_stand_stability_features:
      name: คุณสมบัติพิเศษด้านความเสถียรของขาตั้งเอฟเฟ็กต์พิเศษ
      description: ระบุคุณสมบัติด้านความมั่นคงและความปลอดภัยที่ช่วยป้องกันการพลิกคว่ำหรือลื่นไถลระหว่างการใช้งาน
    specialty_malt_name_type:
      name: ชื่อ/ประเภทของมอลต์พิเศษ
      description: ระบุประเภทมอลต์พิเศษที่มีชื่อเฉพาะ (มักใช้เป็นชื่อทางการค้า)
    specimen_presentation:
      name: การนำเสนอตัวอย่าง
      description: ระบุวิธีการเตรียมหรือนำเสนอตัวอย่างสะสม (เช่น ดิบ/ไม่ผ่านการเตรียมการ
        ขัดเงา ตัด หรือติดบนแผ่นรอง)
    speed_bag_accessories_included:
      name: อุปกรณ์เสริมสำหรับกระสอบทรายแบบเร็วรวมอยู่ด้วย
      description: แสดงรายการอุปกรณ์เสริมเพิ่มเติม Supply พร้อมกับกระสอบทราย เช่น
        ถุงมือ ปั๊มลม ข้อต่อหมุน โซ่ หรือขาตั้ง
    speed_rating:
      name: ระดับความเร็ว
      description: ระบุความเร็วของพื้นผิวการเล่นที่กำหนดโดยผ้าปูโต๊ะบิลเลียด (เช่น
        ช้า ปานกลาง หรือเร็ว)
    speedometer_backlight_type:
      name: ประเภทไฟแบ็คไลท์มาตรวัดความเร็ว
      description: ระบุว่ามาตรวัดความเร็วจะมีไฟส่องสว่างด้านหลังหรือไม่ และอย่างไร
        เพื่อให้มองเห็นได้ชัดเจนในเวลากลางคืน
    speedometer_display_type:
      name: ประเภทการแสดงผลมาตรวัดความเร็ว
      description: 'ระบุรูปแบบการแสดงความเร็วของมาตรวัดความเร็ว: เข็ม/หน้าปัดแบบอนาล็อก,
        ตัวเลขดิจิทัล หรือการผสมผสานระหว่างองค์ประกอบอนาล็อกและดิจิทัล'
    speedometer_unit_of_measure:
      name: หน่วยวัดความเร็ว
      description: ระบุหน่วยความเร็วที่แสดงบนหน้าปัด/หน้าจอแสดงผล
    spike_replaceability:
      name: ความสามารถในการเปลี่ยนเดือย
      description: ระบุว่าปุ่มรองเท้าสามารถถอดเปลี่ยนได้ ติดแน่น หรือเป็นรองเท้าแบบไม่มีปุ่ม
    spike_shape:
      name: Shapesทรงหนามแหลม
      description: ระบุรูปแบบทางเรขาคณิตของปลายแหลมพินแล้ว ซึ่ง Influence การยึดเกาะและความเหมาะสมสำหรับพื้นผิวที่แตกต่างกัน
    spike_thread_size:
      name: ขนาดเกลียวของเดือย
      description: ระบุขนาดหรือมาตรฐานของฐานที่ขันเข้ากับฐานรองเท้า (เช่น 1/4-20)
    spin_classification:
      name: การจำแนกประเภทการหมุน
      description: ระบุรูปแบบการหมุนที่ออกแบบมาสำหรับจานร่อน (หมุนต่ำ หมุนปานกลาง
        หมุนสูง หมุนเร็วมาก)
    spin_profile:
      name: โปรไฟล์การหมุน
      description: ระบุลักษณะการหมุนสัมพัทธ์ที่ก้านไม้กอล์ฟส่งเสริม
    spin_types_supported:
      name: ประเภทการหมุนที่รองรับ
      description: แสดงรายการประเภทการหมุนที่เครื่องสามารถสร้างให้กับลูกบอลได้ เพื่อให้ผู้เล่นสามารถฝึกฝนกับสไตล์การตีที่แตกต่างกันได้
    spinach_preparation_style:
      name: รูปแบบการเตรียมผักโขม
      description: อธิบายถึงวิธีการเตรียมใบผักโขมหรือรูปแบบของผลิตภัณฑ์ (เช่น ใบทั้งใบ
        สับละเอียด หรือหั่นเป็นลูกเต๋า)
    spinach_variety:
      name: ผักโขมหลากหลายชนิด
      description: ระบุสายพันธุ์ทางพฤกษศาสตร์หรือสายพันธุ์ทางการตลาดของผักโขม (เช่น
        ผักโขมอ่อน ผักโขมซาวอย ผักโขมน้ำ ผักโขมแดง) ช่วยให้ผู้ซื้อสามารถเลือกชนิดที่ต้องการได้อย่างแม่นยำ
    spindle_bearing_surface_material:
      name: วัสดุพื้นผิวของตลับลูกปืนแกนหมุน
      description: วัสดุของจุด/พื้นผิวแบริ่งที่ใช้ในสปินเดิลความช่วยเหลือ (ปลาย/ด้านล่าง)
        ซึ่งส่งผลต่อความเรียบและการสึกหรอ
    spindle_bearing_type:
      name: ชนิดของตลับลูกปืนแกนหมุน
      description: ประเภทของปลายแกนหมุน/ส่วนต่อประสานแบริ่งที่ช่วยลดแรงเสียดทานต่อ
        ความช่วยเหลือ ชาม/ถ้วย
    spindle_finish:
      name: ขัดเงาแกนหมุน
      description: การตกแต่งพื้นผิว/การเคลือบผิวของแกนหมุน มีผลต่อสัมผัส ความทนทาน
        และความสวยงาม
    spindle_hook_type:
      name: ตะขอแกนหมุน
      description: กลไกจับเส้นด้ายที่อยู่ด้านบนของแกนหมุน ใช้สำหรับยึดเส้นด้ายนำ/เส้นด้ายหลักให้แน่น
    spindle_support_method:
      name: วิธีช่วยเหลือ Spindle
      description: วิธีการรองรับแกนหมุนขณะปั่นด้าย
    spindle_tip_style:
      name: สไตล์ปลายแกนหมุน
      description: Shapes/การออกแบบของจุดที่ REST ในชาม/ถ้วย (พื้นผิวรองรับ) มีผลต่อแรงเสียดทานและความราบรื่นในการหมุน
    spindle_whorl_position:
      name: ตำแหน่งของลูกตุ้มแกนหมุน
      description: ตำแหน่งที่วงล้อหมุนอยู่บนแกนหมุน
    spinner_blade_shape:
      name: Shapesทรงใบพัดหมุน
      description: ระบุรูปทรงใบพัดหลักที่ใช้ในเหยื่อปลอมแบบหมุน ซึ่งมีผลต่อการสั่นสะเทือน
        แสงสะท้อน และความลึกในการเคลื่อนที่
    spinner_control_card_design_type:
      name: Spinner control ออกแบบ/ประเภทเฉพาะ
      description: อธิบายประเภทของการควบคุมสปินเนอร์โดยเฉพาะในแง่ของวิธีการนำเสนอข้อมูลการควบคุม
        (เช่น การอ้างอิงอัตราส่วน การอ้างอิงความตึง คอนเบลแผนภูมิ)
    spinner_subtype:
      name: ประเภทย่อยของเหยื่อหมุน
      description: จำแนกประเภทโดยรวมของดีไซน์หรือตระกูลของเหยื่อหมุน (เช่น เหยื่อหมุนแบบอินไลน์,
        เหยื่อหมุนแบบเบท)
    spinning_oil_application_area:
      name: พื้นที่ใช้งานน้ำมันหล่อลื่นสำหรับล้อหมุน
      description: ระบุจุดที่ต้องการใช้งานบนล้อหมุนสำหรับน้ำมันหล่อลื่น
    spinning_oil_application_tool:
      name: อุปกรณ์สำหรับหยอดน้ำมันหล่อลื่นแบบหมุน
      description: ระบุรูปแบบของหัวฉีด/ปลายบรรจุภัณฑ์ที่ใช้ในการทาน้ำมันหล่อลื่นลงบนชิ้นส่วนล้อหมุน
        เพื่อควบคุมปริมาณการใช้งาน
    spinning_oil_features:
      name: คุณสมบัติของน้ำมันหล่อลื่นสำหรับเครื่องปั่นด้าย
      description: เน้นคุณสมบัติเชิงฟังก์ชันที่เกี่ยวข้องกับน้ำมันหล่อลื่นสำหรับเครื่องปั่นด้าย
        (สารตกค้าง การเกิดคราบ การเกิดออกซิเดชัน และความสามารถในการชะล้าง)
    spinning_top_features:
      name: คุณสมบัติของลูกข่าง
      description: ลูกข่างนี้มีคุณสมบัติพิเศษในการเล่นนอกเหนือจากการหมุนแบบพื้นฐาน
    spinning_top_launch_mechanism:
      name: กลไกการปล่อยลูกข่าง
      description: วิธีการเริ่มต้น/ผลักดันให้ลูกข่างหมุน
    spinning_wheel_brake_tension_system_type:
      name: ระบบเบรก/แรงตึงแบบล้อหมุน
      description: ระบุระบบเบรก/แรงดึงที่ใช้ในการควบคุมการดึงเส้นด้าย
    spinning_wheel_drive_system:
      name: ระบบขับเคลื่อนล้อหมุน
      description: ระบุระบบขับเคลื่อนที่ออกแบบมาสำหรับแกนม้วนด้ายนี้
    spinning_wheel_hook_system:
      name: ระบบขอเกี่ยวล้อหมุน
      description: ระบุวิธีการนำเส้นด้ายพาดไปตามแกนเครื่องปั่นด้าย
    spinning_wheel_part_application:
      name: ส่วนล้อหมุนแอปพลิเคชัน
      description: ระบุว่าน้ำมันชนิดนี้มีไว้สำหรับส่วนประกอบใดของล้อหมุน
    spinning_wheel_portability_foldability:
      name: ความสะดวกในการพกพา/การพับของเครื่องปั่นด้าย
      description: ระบุว่าล้อได้รับการออกแบบให้พับได้เพื่อการขนส่งหรือไม่
    spinning_wheel_tension_adjustment_type:
      name: ประเภทการปรับความตึงของล้อหมุน
      description: วิธีการปรับความตึงของล้อเพื่อควบคุมการดึงด้าย
    splice_termination_type:
      name: ประเภทการเชื่อมต่อ/การสิ้นสุด
      description: ระบุวิธีการต่อปลายเชือกยึด (เช่น ห่วงต่อเชือก, ปลอกโลหะ, ตะขอโซ่)
    split_shot_cut_type:
      name: ประเภทการตัดแบบ Split
      description: ระบุรูปแบบร่องหรือช่องเปิดที่ช่วยให้สามารถยึดติดกับสายได้
    split_shot_shape:
      name: รูปทรงของตะกั่วเม็ดผ่าซีก
      description: อธิบายถึงรูปทรงทางกายภาพของตะกั่วทรงแยก ซึ่งส่งผลต่อพลศาสตร์ของไหลและความต้านทานต่อการติดขัด
    split_shot_size:
      name: Split ช็อต
      description: รหัสขนาดมาตรฐานที่เป็นตัวอักษรและตัวเลข (เช่น SSG, AAA, BB, 1)
        เป็นคำที่ผู้ผลิตและนักตกปลาใช้ในการจำแนกประเภทของตะกั่วถ่วงแบบแยกชิ้น ช่วยเสริมความแม่นยำในการวัดน้ำหนัก
    spoiler_adjustability:
      name: ความสามารถในการปรับแต่งสปอยเลอร์
      description: ระบุว่าสามารถปรับมุม/ความสูงของสปอยเลอร์ได้หรือไม่
    spoke_accessory_function:
      name: หน้าที่ของอุปกรณ์เสริมบนซี่ล้อ
      description: จำแนกหน้าที่หลักของอุปกรณ์เสริมบนวงล้อ เช่น เพื่อการตกแต่ง สะท้อนแสง
        หรือให้แสงสว่าง
    spoke_butting_profile:
      name: ลักษณะการชนกันของซี่ล้อ
      description: อธิบายถึงวิธีการเปลี่ยนแปลงเส้นผ่านศูนย์กลางของซี่ล้อตามความยาว
        (แบบเรียบ แบบมีแกนเดียว สองแกน สามแกน หรือสี่แกน) ซึ่งส่งผลต่อน้ำหนักและความแข็งแรง
    spoke_gauge:
      name: เกจวัดซี่ล้อ
      description: ระบุขนาดลวด (ระดับความหนา) ของซี่ล้อที่หัวน็อตสามารถใช้งานร่วมกันได้
    spoke_interface_type:
      name: ประเภทการเชื่อมต่อซี่ล้อ
      description: ระบุรูปแบบหัวซี่ลวดที่ดุมล้อได้รับการออกแบบมา (แบบ J-bend, แบบตรง,
        แบบ T-head)
    spoke_shape:
      name: รูปทรงซี่ล้อ
      description: ระบุขนาดหน้าตัดภายนอกของลวดซี่ล้อ ซึ่งมีผลต่อหลักอากาศพลศาสตร์และความสวยงาม
    spool_form_factor:
      name: รูปทรงของแกนม้วนด้าย
      description: รูปทรงทางกายภาพของตัวม้วนด้ายและวิธีการเก็บเส้นด้าย (เช่น แบบมีขอบหรือแบบกรวย)
    spoon_style:
      name: สไตล์ช้อน
      description: ระบุประเภทหรือรูปแบบการใช้งานของเหยื่อปลอมแบบช้อน เช่น การเหวี่ยง
        การกระพือ หรือการลากเหยื่อ
    sports_bra_padding_type:
      name: ประเภทแผ่นรองในสปอร์ตบรา
      description: ระบุชนิดของการเว้นขอบที่มีให้ในสปอร์ตบรา
    sports_cap_style:
      name: สไตล์หมวกกีฬา
      description: ระบุรูปแบบหรือสไตล์ของหมวกโดยรวม (เช่น หมวกเบสบอล หมวกสแนปแบ็ก)
        โดยไม่อิงแบรนด์หรือทีม
    sports_governing_body_certification:
      name: การรับรองจากหน่วยงานกำกับดูแลกีฬา
      description: แสดงถึงการรับรองหรือการอนุมัติอย่างเป็นทางการจากหน่วยงานกำกับดูแลกีฬาที่เป็นที่ยอมรับ
        ซึ่งยืนยันว่าผลิตภัณฑ์นั้นตรงตามมาตรฐานการแข่งขัน
    sports_surface_compatibility:
      name: ความเข้ากันได้กับพื้นผิวสนามกีฬา
      description: ระบุประเภทพื้นผิวหรือประเภทการใช้งานที่สามารถทาสีได้อย่างปลอดภัย
    sports_toy_set_contents:
      name: รายการอุปกรณ์ในชุดของเล่นกีฬา
      description: ระบุว่าชุดของเล่นกีฬาประกอบด้วยส่วนประกอบอะไรบ้าง (เช่น ลูกบอล
        ไม้ตี ตาข่าย เป้าหมาย)
    spray_string_cleanup_method:
      name: วิธีการทำความสะอาดคราบสเปรย์
      description: วิธีแนะนำในการกำจัด/ทำความสะอาดคราบสเปรย์
    spray_string_finish_effect:
      name: รูปแบบของสเปรย์หรือเอฟเฟกต์พื้นผิว
      description: เอฟเฟกต์ภาพของสเปรย์ เอฟเฟกต์เมื่อพ่นแล้ว (ความเงา/การสะท้อนแสงและเอฟเฟกต์พิเศษ)
    spray_string_formulation_type:
      name: ประเภทของสเปรย์ฉีดผม
      description: ลักษณะการทำงานของผลิตภัณฑ์ระหว่างและหลังการฉีดพ่น (เช่น ล้างออกได้
        หรือ ติดทนถาวร)
    spray_string_recommended_surface:
      name: พื้นผิวที่แนะนำสำหรับสายฉีดน้ำ
      description: ประเภทของพื้นผิวที่สายฉีดน้ำนี้ออกแบบมาเพื่อใช้ทำความสะอาด (และมีแนวโน้มที่จะทำความสะอาดได้)
    spray_string_scent:
      name: สเปรย์ กลิ่น
      description: รายละเอียดกลิ่นหอมหรือกลิ่น (ถ้ามี) ของสเปรย์ค่ะ
    spray_string_suitable_age_group:
      name: สเปรย์ฉีดน้ำเหมาะสำหรับกลุ่มอายุที่เหมาะสม
      description: แนะนำอายุผู้ใช้ขั้นต่ำ/กลุ่มอายุที่ปลอดภัยสำหรับการใช้งาน
    spread_consistency:
      name: ความสม่ำเสมอของเนื้อสัมผัส
      description: อธิบายลักษณะเนื้อสัมผัส/ความหนาแน่นของน้ำจิ้มหรือน้ำสเปรด เพื่อกำหนดความคาดหวังเกี่ยวกับรสสัมผัสในปากและการใช้งาน
        (เช่น เนียนละเอียด เป็นชิ้นๆ หรือตีขึ้นฟู)
    spread_variety:
      name: จำแนกประเภทของแยมและครีมทาขนมปัง
      description: จำแนกประเภทของผลิตภัณฑ์แยมผลไม้ (เช่น แยม เยลลี่ มาร์มาเลด ครีมเปรี้ยว)
        เพื่อให้ร้านค้าสามารถแยกแยะความแตกต่างระหว่างวิธีการเตรียมและเนื้อสัมผัสต่างๆ
        ได้
    spreader_bar_type:
      name: ประเภทของคานกระจายน้ำหนัก
      description: ระบุประเภทของคานกระจายแรงหรือระบบขอเกี่ยวที่ให้มาหรือสามารถใช้งานร่วมกับสายรัดนิรภัยได้
    sprint_canoe_class:
      name: คลาสเรือแคนูสปรินต์
      description: ระบุประเภทการแข่งขันเรือแคนูสปรินต์อย่างเป็นทางการ
    sprout_presentation:
      name: ลักษณะการนำเสนอผลิตภัณฑ์ต้นอ่อ
      description: ระบุลักษณะทางกายภาพของผลิตภัณฑ์ (เช่น ต้นอ่อนสด ไมโครกรีน กระถางปลูกสด
        ผง)
    squash_and_gourd_variety:
      name: พันธุ์ฟักทองและบวบ
      description: ช่วยระบุสายพันธุ์หรือพันธุ์ที่วางจำหน่ายในตลาดของพืชตระกูลฟักทองหรือบวบ
        ช่วยให้ผู้ซื้อสามารถค้นหาชนิดที่ต้องการได้อย่างรวดเร็ว
    stability_class:
      name: ระดับความเสถียร
      description: การจัดประเภทความเสถียรโดยทั่วไปได้มาจากคะแนนการบินหรือคำกล่าวอ้างทางการตลาด
    stabilizer_thread_size:
      name: โคลง ขนาด
      description: ข้อกำหนดที่ใช้ในการติดอุปกรณ์กันสั่นหรืออุปกรณ์เสริมเข้ากับคันธนูหรือหน้าไม้
    stabilizer_type:
      name: ประเภทตัวกันสั่น
      description: ระบุรูปแบบหรือการจัดประเภทตำแหน่งของอุปกรณ์ช่วยทรงตัวสำหรับคันธนูหรือหน้าไม้
    stages_supported:
      name: เวทีที่ได้รับการสนับสนุน
      description: ระบุจำนวนขั้นตอนที่จรวดหรือชุดอุปกรณ์ได้รับการออกแบบให้บินได้
    stain_remover_format:
      name: รูปแบบน้ำยาขจัดคราบ
      description: ระบุรูปแบบ/บรรจุภัณฑ์ของผลิตภัณฑ์ที่ใช้ในการขจัดคราบสกปรกบนรถยนต์
        (ขวดสเปรย์, กระป๋องอัดอากาศ, โฟม, เจล, ผง, ผ้าเช็ดทำความสะอาด, ปากกา/เครื่องหมาย)
    stake_shape:
      name: รูปทรงของเสาปักเต็นท์
      description: กำหนดรูปทรงหน้าตัดหรือรูปแบบการออกแบบของหมุดเต็นท์ ซึ่งส่งผลต่อแรงยึดเกาะในพื้นดินประเภทต่างๆ
    stamp_block_features:
      name: คุณสมบัติของบล็อกแสตมป์
      description: เน้นคุณสมบัติการใช้งานของบล็อกปั๊ม เช่น ตารางวัดระยะ ด้ามจับ หรือพื้นผิวกันลื่น
    stamp_block_type:
      name: ประเภทของบล็อกสำหรับติดแสตมป์
      description: ระบุโครงสร้าง/รูปแบบของบล็อกสำหรับยึดแสตมป์เพื่อทำการประทับตรา
        (เช่น บล็อกอะคริลิกใส บล็อกไม้ หรือบล็อกสำหรับจัดตำแหน่ง)
    stamp_set_pieces_included:
      name: รายการสินค้าที่รวมอยู่ในชุดแสตมป์
      description: ระบุว่าสินค้าในชุดตรายางและแผ่นหมึกประกอบด้วยอะไรบ้าง (เช่น ตรายาง
        แผ่นหมึก ปากกา)
    stand_padding_material:
      name: วัสดุรองขาตั้ง
      description: วัสดุที่ใช้บริเวณจุดสัมผัสเพื่อปกป้องพื้นผิวของเครื่องดนตรี (เช่น
        โฟม ยาง ซิลิโคน)
    staple_fiber_animal_fiber_type:
      name: เส้นใยหลัก เส้นใยจากสัตว์
      description: ระบุชนิดเส้นใยที่มาจากสัตว์โดยเฉพาะ เมื่อแหล่งที่มาของเส้นใยหลักคือ
        สัตว์
    staple_fiber_crimp_level:
      name: ระดับการหยิกงอของเส้นใยหลัก
      description: ระดับความหยิก/เป็นลอนตามธรรมชาติของเส้นใย
    staple_fiber_preparation_type:
      name: ประเภทการเตรียมเส้นใยหลัก
      description: สภาพการเตรียม/แปรรูปเส้นใยที่จำหน่าย (วิธีการจัดเรียง/จัดการ) ซึ่งส่งผลกระทบอย่างมากต่อวิธีการปั่น
        ความง่ายในการดึง และผลลัพธ์ขั้นสุดท้าย
    staple_fiber_source_type:
      name: แหล่งใยอาหารหลัก
      description: หมวดหมู่ Broad Origin สำหรับเนื้อหาไฟเบอร์
    starch_processing_type:
      name: ประเภทการแปรรูปแป้ง
      description: ระบุว่าแป้งนั้นเป็นแป้งธรรมชาติหรือได้รับการดัดแปลงทางกายภาพหรือทางเคมี
        (เช่น แป้งสำเร็จรูป แป้งที่ผ่านการเจลาติไนซ์แล้ว) เพื่อให้ได้คุณสมบัติการใช้งานเฉพาะ
        เช่น ความเร็วในการทำให้ข้น หรือความทนทานต่ออุณหภูมิ
    starch_source:
      name: แหล่งที่มาของแป้ง
      description: ระบุแหล่งที่มาทางพฤกษศาสตร์ของแป้งปรุงอาหารหรือสารเพิ่มความข้น
        (เช่น ข้าวโพด มันฝรั่ง มันสำปะหลัง) แหล่งที่มาเป็นปัจจัยสำคัญที่ทำให้แป้งสำหรับปรุงอาหารแตกต่างกัน
        และส่งผลโดยตรงต่อความเหมาะสมของสูตรอาหาร การพิจารณาเรื่องสารก่อภูมิแพ้ และพฤติกรรมการค้นหาของผู้บริโภค
    starfruit_variety:
      name: มะเฟืองหลากหลายสายพันธุ์
      description: บ่งบอกพันธุ์ปลูกเฉพาะหรือสายพันธุ์ของมะเฟือง (เช่น พันธุ์อาร์คิน,
        พันธุ์ฟวางตง)
    starter_drive_type:
      name: ประเภทกลไกขับสตาร์ทเตอร์
      description: กลไกขับเคลื่อน/เชื่อมต่อสตาร์ทเตอร์แบบที่ใช้ในการเชื่อมต่อเฟืองตัวเล็กกับเฟืองตัวใหญ่
    starter_pistol_action_type:
      name: ปืนพกแบบ Shopify Starter
      description: ระบุกลไกการยิง/การทำงานของปืนพก Shopify Starter (เช่น ซิงเกิลแอ็กชัน
        ดับเบิลแอ็กชัน เซมิออโต้)
    starter_pistol_caliber:
      name: ขนาดลำกล้องปืนพก Shopify Starter
      description: ระบุขนาดกระสุนเปล่าหรือปลอกกระสุนที่ปืนพกสตาร์ตเตอร์รองรับ
    starter_terminal_type:
      name: ประเภทขั้วต่อสตาร์ทเตอร์
      description: ระบุรูปแบบขั้วต่อ/ตัวเชื่อมต่อที่ใช้สำหรับการเชื่อมต่อทางไฟฟ้าบนมอเตอร์สตาร์ทหรือโซลินอยด์สตาร์ท
        (เช่น ขั้วต่อแบบสตั๊ด, แบบแผ่น, แบบปลั๊ก)
    starting_block_anchoring_method:
      name: วิธีการยึดบล็อกเริ่มต้น
      description: อธิบายวิธีการยึดบล็อกเข้ากับพื้นผิวของอุปกรณ์ติดตาม (เช่น หนามแหลม
        ตัวดูด แผ่นยาง)
    steerer_tube_design:
      name: การออกแบบท่อแกนบังคับเลี้ยว
      description: อธิบายถึงการออกแบบโครงสร้างของท่อแกนบังคับเลี้ยว—แบบตรง แบบเรียว
        แบบมีเกลียว ฯลฯ—ซึ่งเป็นตัวกำหนดความเข้ากันได้ระหว่างชุดลูกปืนคอและเฟรม
    steering_cable_end_fitting_type:
      name: ข้อต่อปลายสายเคเบิลพวงมาลัย
      description: ระบุรูปแบบการต่อ/ยึดที่ปลายสายเคเบิลบังคับเลี้ยวของเรือ (ปลายด้านพวงมาลัยและปลายด้านเครื่องยนต์/คันบังคับ)
        เพื่อให้มั่นใจได้ว่าเข้ากันได้กับจุดเชื่อมต่อของพวงมาลัยและเครื่องยนต์ ให้ใช้มาตรฐานหรือชื่อผู้ผลิตตามความเหมาะสม
    steering_column_adjustability_features:
      name: คุณสมบัติการปรับแต่งคอลัมน์พวงมาลัย
      description: ระบุว่า Functions การปรับใดที่สร้างไว้ในพวงมาลัย
    steering_column_ignition_provision:
      name: ช่องสำหรับติดตั้งระบบสตาร์ทเครื่องยนต์ที่คอพวงมาลัย
      description: ระบุว่าคอลัมน์พวงมาลัยได้รับการออกแบบมาเพื่อรองรับกระบอก/สวิตช์ล็อคสตาร์ทและ/หรือล็อคพวงมาลัยหรือไม่
    steering_column_shaft_end_interface_type:
      name: ประเภทอินเทอร์เฟซปลายเพลาคอลัมน์พวงมาลัย
      description: ระบุรูปแบบการเชื่อมต่อปลายเพลาคอพวงมาลัย (เช่น แบบร่องฟัน แบบตัว
        D คู่ หรือแบบมีร่องลิ่ม)
    steering_column_shift_type:
      name: คันเกียร์แบบคอลัมน์พวงมาลัย
      description: ระบุว่าคอลัมน์พวงมาลัยมีกลไกเปลี่ยนเกียร์แบบติดตั้งบนคอลัมน์หรือไม่
        และเป็นประเภทระบบส่งกำลังแบบใด
    steering_component_drive_type:
      name: ประเภทการขับเคลื่อนส่วนประกอบพวงมาลัย
      description: ระบุกลไกขับเคลื่อน/ช่วยเหลือที่เกี่ยวข้องกับส่วนประกอบพวงมาลัย
        (โดยเฉพาะปั๊มและระบบโพลิสไตรีนขยาย)
    steering_position:
      name: ตำแหน่งพวงมาลัย
      description: ระบุว่ารถตู้เป็นพวงมาลัยซ้ายหรือพวงมาลัยขวา
    steering_pump_pulley_type:
      name: แบบพูลเลย์ปั๊มพวงมาลัย
      description: ระบุประเภท/อินเทอร์เฟซของระบบขับเคลื่อนรอกที่ใช้กับปั๊มพวงมาลัย
    steering_rack_finish_coating:
      name: การบังคับเลี้ยวผิวเคลือบ/เคลือบอาหาร
      description: ระบุวัสดุเคลือบผิวภายนอกเพื่อป้องกันการกัดกร่อน
    steering_rack_position:
      name: ตำแหน่งของแร็คพวงมาลัย
      description: ระบุตำแหน่งที่ติดตั้ง/ใช้งานแร็คในระบบบังคับเลี้ยวของรถยนต์
    steering_wheel_cover_installation_type:
      name: วิธีการติดตั้งปลอกหุ้มพวงมาลัย
      description: วิธีการติดตั้ง/ยึดปลอกหุ้มพวงมาลัยเข้ากับพวงมาลัย
    steering_wheel_grip_material:
      name: วัสดุหุ้มพวงมาลัย
      description: ระบุวัสดุที่ใช้ทำขอบล้อ/ส่วนที่มือสัมผัส ซึ่งอาจแตกต่างจากวัสดุที่ใช้ทำแกนล้อ/ซี่ล้อ
    steering_wheel_mounting_pattern:
      name: รูปแบบการติดตั้งพวงมาลัย
      description: ระบุรูปแบบการติดตั้งแบบใช้สลักเกลียว/รู เพื่อยึดพวงมาลัยเข้ากับดุมหรืออะแดปเตอร์
        (เช่น 3 สลักเกลียว, 5 สลักเกลียว)
    steering_wheel_rim_material_grip_surface:
      name: วัสดุขอบพวงมาลัย (พื้นผิวจับ)
      description: ระบุรูปแบบการติดตั้งแบบใช้สลักเกลียว/รู เพื่อยึดพวงมาลัยเข้ากับดุมหรืออะแดปเตอร์
        (เช่น 3 สลักเกลียว, 5 สลักเกลียว)
    stem_material:
      name: วัสดุที่ใช้ทำก้านท่อ
      description: ระบุวัสดุที่ใช้สำหรับก้านหรือปากท่อโดยเฉพาะ (เช่น อะคริลิก อีโบไนท์
        ลูไซต์)
    stencil_machine_consumable_type:
      name: วัสดุสิ้นเปลืองสำหรับเครื่องทำสเตนซิล
      description: ระบุวัสดุสิ้นเปลืองที่จำเป็นสำหรับการใช้งาน (ถ้ามี)
    step_surface_texture:
      name: ลักษณะพื้นผิวของขั้นบันได
      description: ระบุลักษณะร่องบนขั้นบันไดหรือการออกแบบ/วัสดุพื้นผิวที่ออกแบบมาเพื่อเพิ่มการยึดเกาะและความสบายเมื่อเปียก
    stepper_motion_type:
      name: ประเภทการเคลื่อนที่แบบสเต็ปเปอร์
      description: กำหนดรูป Motion การเคลื่อนที่หลักที่เครื่องจักรมีให้
    stick_bow_profile:
      name: รูปทรงคันธนู
      description: ระบุลักษณะความโค้ง (หรือ "ประเภทคันธนู") ของด้ามไม้ฮอกกี้ ซึ่งเป็นปัจจัยสำคัญที่
        Influence การควบคุมลูก การดีดลูก และสไตล์การเล่น
    stick_construction:
      name: โครงสร้างของไม้ฮอกกี้
      description: ระบุรูปแบบการผลิตของไม้ฮอกกี้ เช่น ไม้คอมโพสิตชิ้นเดียว ไม้คอมโพสิตสองชิ้น
        หรือไม้แท้
    stick_curvature_type:
      name: ประเภทความโค้งของแท่ง
      description: อธิบายถึงลักษณะความโค้งของไม้ขว้าง ซึ่งส่งผลต่อระยะและความแม่นยำในการขว้าง
    stick_head_shape:
      name: Shapesทรงหัวแท่ง
      description: กำหนด Shapes ของหัวไม้ฮอกกี้ ซึ่งส่งผลต่อการรับลูก การตีลูก และการควบคุมลูกในระยะใกล้
    stick_size_compatibility:
      name: ความเข้ากันได้ของขนาดไม้ฮอกกี้
      description: ระบุกลุ่มขนาดไม้ฮอกกี้ที่ผลิตภัณฑ์นั้นใช้งานร่วมกันได้ (เช่น เยาวชน,
        ​​รุ่นจูเนียร์, รุ่นกลาง, รุ่นอาวุโส, ผู้รักษาประตู, ขนาดอเนกประสงค์)
    sticker_decal_features:
      name: คุณสมบัติของสติ๊กเกอร์/สติ๊กเกอร์ติดตกแต่ง
      description: แสดงคุณลักษณะการใช้งานและประสิทธิภาพเฉพาะของสติ๊กเกอร์/สติ๊กเกอร์ติดตกแต่ง
        (เช่น ไม่มีฟองอากาศ สามารถติดใหม่ได้)
    sticker_finish:
      name: ลักษณะพื้นผิวของสติกเกอร์
      description: อธิบายลักษณะพื้นผิว/ผลลัพธ์ทาง視覚ของสติกเกอร์
    sticker_format:
      name: รูปแบบสติกเกอร์
      description: ระบุรูปแบบ Retail ของสติ๊กเกอร์ตกแต่ง (เช่น แผ่น ม้วน บุคคลธรรมดา
        หนังสือ)
    sticker_material_type:
      name: ประเภทวัสดุของสติกเกอร์
      description: ระบุวัสดุหลักของสติกเกอร์ตกแต่ง (ไม่ใช่ส่วนตกแต่งเพิ่มเติม)
    stilt_foot_attachment_type:
      name: ประเภทการยึดขาค้ำยัน
      description: ระบุวิธีการที่เท้าของผู้ใช้ติดกับไม้ค้ำยัน (เช่น สายรัดแบบหัวเข็มขัด,
        ตีนตุ๊กแก, เชือกผูก)
    stirrup_style:
      name: รูปแบบของโกลน
      description: จำแนกประเภทของเหล็กปลอกตามการออกแบบหรือสาขาวิชาเฉพาะ โดยครอบคลุมถึงความปลอดภัย
        สาขาวิชา และรูปแบบการก่อสร้างที่แตกต่างกัน
    stirrup_tread_material:
      name: วัสดุที่ใช้ทำที่เหยียบโกลน
      description: ระบุวัสดุที่ใช้สำหรับแผ่นรองเท้าหรือพื้นเหยียบของโกลน ซึ่งส่งผลต่อการยึดเกาะ
        ความสบาย และความทนทาน
    stitch_marker_and_counter_style:
      name: รูปแบบหรือขนาดของเครื่องหมายบอกตำแหน่งตะเข็บและตัวนับจำนวนตะเข็บ/แถว
      description: ระบุรูปแบบหรือลักษณะของตัวมาร์คตำแหน่งตะเข็บหรือตัวนับตะเข็บ/แถว
        (เช่น ตัวมาร์คแบบล็อคได้, ตัวมาร์คแบบวงแหวนแยก, ตัวนับแบบวงแหวน, ตัวนับแบบดิจิทัล)
    stitch_types:
      name: ประเภทของตะเข็บ
      description: ประเภทของตะเข็บ (ทั้งแบบใช้งานได้จริงและแบบตกแต่ง) ที่เครื่องจักรสามารถผลิตได้
    stitching_method:
      name: วิธีการเย็บ
      description: แสดงวิธีการเชื่อมต่อแผ่นลูกบอลเข้าด้วยกัน
    stitching_state:
      name: สถานะการเย็บ
      description: ระบุว่าชิ้นส่วนของเสื้อผ้าที่จัดส่งมานั้นเป็นแบบยังไม่เย็บ แบบเย็บครึ่งๆ
        กลางๆ แบบเย็บเสร็จแล้ว หรือแบบพร้อมสวมใส่
    stock_car_race_series:
      name: การแข่งขันรถสต็อกคาร์
      description: ระบุหน่วยงานที่กำกับดูแลหรือรายการแข่งขัน/ประเภทการแข่งขันที่รถสต็อกคาร์ถูกสร้างขึ้นเพื่อเข้าร่วมแข่งขัน
    stone_adhesion:
      name: การยึดเกาะของหิน
      description: ระบุว่าเมล็ดพีชหรือเนคทารีนเป็นแบบแยกเมล็ดได้ง่าย แบบติดเมล็ด หรือแบบแยกเมล็ดได้บางส่วน
    stone_creation_method:
      name: วิธีการผลิตหิน
      description: ระบุว่าหินนั้นเป็นหินธรรมชาติ หินสังเคราะห์ หินจำลอง หรือหินรีไซเคิล
    stone_cut_grade:
      name: เกรดการเจียระไนหิน
      description: บ่งบอกถึงการประเมินคุณภาพการเจียระไนโดยรวมของหิน
    stone_cut_style:
      name: รูปแบบการเจียระไนหิน
      description: รูปแบบการเจียระไนของหินแก้ว (เช่น แบบเหลี่ยมเจียระไน หรือแบบคาโบชอง)
    stone_fruit_cultivar:
      name: พันธุ์ไม้ผลมีเมล็ดแข็ง
      description: แสดงพันธุ์ปลูกเฉพาะ/สายพันธุ์ของลูกพีชหรือลูกเนคทารีน
    stone_fruit_variety:
      name: พันธุ์ผลไม้มีเมล็ดแข็ง
      description: แยกแยะชนิดย่อยภายในหมวดหมู่ (เช่น ลูกพีช ลูกเนคทารีน ลูกพีชทรงโดนัท/ทรงแบน)
    stone_setting_type:
      name: ประเภทหินนั่นเอง
      description: ระบุวิธีการยึดอัญมณีแต่ละเม็ดในชิ้นงาน (เช่น ขอบล้อม, หนามเตย,
        พลอยเรียง ฯลฯ)
    stone_transparency:
      name: ความโปร่งใสของหิน
      description: ความโปร่งใส/ความทึบแสงของหินแก้ว
    storage_case_type:
      name: ประเภทการจัดเก็บ
      description: ระบุประเภทของภาชนะที่เข้ามาสำหรับจัดเก็บและขนส่ง (เช่น กล่อง เคส
        กระเป๋า)
    storage_compartment_type:
      name: ประเภทช่องเก็บของ
      description: ระบุประเภทของช่องเก็บของที่ห่วงยางสำหรับว่ายน้ำมีให้สำหรับเก็บสิ่งของส่วนตัว
    storage_media_and_transfer_methods_supported:
      name: รองรับวิธีการจัดเก็บข้อมูลและสื่อสีขาว
      description: วิธีการเชื่อมต่อหรือสื่อที่รองรับสำหรับการนำเข้า/ส่งออกตัวอย่าง
        และการบันทึก/โหลดโปรเจกต์
    storage_requirements:
      name: ข้อกำหนดในการจัดเก็บ
      description: ระบุว่าสินค้าควรเป็นร้านค้าก่อนและ/หรือหลังการเปิดอย่างไร เพื่อรักษาคุณภาพและความปลอดภัย
    stove_jack_compatibility:
      name: ความเข้ากันได้ของช่องต่อเตา
      description: ระบุว่าเต็นท์มีช่องเปิดที่ทนไฟสำหรับปล่องเตาหรือไม่
    straight_pin_application:
      name: การใช้งานเข็มหมุดตรง
      description: ระบุวัตถุประสงค์การใช้งานสำหรับเข็มหมุดตรง
    straight_pin_finish:
      name: ลักษณะพื้นผิวเข็มตรง
      description: อธิบายถึงลักษณะพื้นผิวหรือการเคลือบผิวของรางเลื่อน (เช่น ชุบนิกเกิล)
        ซึ่งส่งผลต่อความต้านทานการกัดกร่อนและการเลื่อน
    straight_pin_head_material:
      name: วัสดุหัวพินตรงแล้ว
      description: ระบุวัสดุของหัวเข็มนาฬิกา (ถ้ามี) เช่น พลาสติกหรือแก้ว
    straight_pin_head_shape:
      name: รูปทรงของหัวหมุดตรง
      description: อธิบายรูปทรง/รูปแบบของหัวเข็มหมุด เพื่อความสะดวกในการใช้งานและการมองเห็น
    strand_configuration:
      name: การจัดเรียงเส้นโซ่
      description: ระบุจำนวนแถวหรือเส้นใยที่ประกอบกันเป็นโซ่กระเป๋าสตางค์ (แถวเดียว
        สองแถว สามแถว)
    strand_material:
      name: วัสดุเส้นใย
      description: ระบุวัสดุที่ใช้สำหรับบุคคลธรรมดาเส้น/ริ้ว
    strap_attachment_hardware:
      name: อุปกรณ์ยึดสายสะพาย
      description: ระบุประเภท/การออกแบบฮาร์ดแวร์ที่ใช้ติดสายรัดเข้ากับอุปกรณ์/จุดช่วยเหลือ
    strap_configuration:
      name: การกำหนดค่าสายรัด
      description: ระบุจำนวนจุดยึดหมวกกันน็อคบนสายรัด (เช่น 2 จุด, 4 จุด) ซึ่งมีความสำคัญต่อความพอดี
        ความปลอดภัย และข้อกำหนดของลีก
    strap_functionality:
      name: ฟังก์ชันสายรัด
      description: ระบุวัตถุประสงค์หลักในการใช้งานหรือการออกแบบของสายรัดเสื่อโยคะ
    strap_padding:
      name: ความนุ่มของสายสะพาย
      description: ระบุระดับการบุรองของสายรัดที่ออกแบบมาเพื่อเพิ่มความสบายและกระจายน้ำหนัก
    strap_side:
      name: ด้านสายรัด
      description: ระบุว่าสายรัดได้รับการออกแบบสำหรับเข้าด้านซ้าย เข้าด้านขวา หรือจำหน่ายเป็นชุด
    strap_width:
      name: ความกว้างของสายสะพาย
      description: ระบุความกว้างของสายสะพายไหล่ (บาง ปานกลาง กว้าง) เพื่อเป็นแนวทางให้ผู้ซื้อเลือกขนาดที่เหมาะสมกับการปกปิดหรือการรองรับที่ต้องการ
    strength_classification:
      name: การจำแนกระดับความแข็งแกร่ง
      description: ความแข็งแกร่งของการตลาด Label แบรนด์ใช้กันทั่วไป (เช่น Light, Strong,
        Extra Strong)
    strength_grade:
      name: ระดับความแข็งแรง
      description: อธิบายถึงระดับความแข็งแรง/ความสามารถในการยึดเกาะที่ต้องการของตัวยึดแบบตะขอและห่วง
    stretch_level:
      name: ระดับการยืด
      description: บ่งบอกถึงระดับการยืดตัวของผ้าขณะใช้งาน
    stretch_type:
      name: ประเภทยืดหยุ่น
      description: ระบุว่าผ้ามีคุณสมบัติการยืดตัวเชิงกลหรือเชิงยืดหยุ่น และในทิศทางใดบ้าง
    stretcher_bar_material:
      name: วัสดุโครงไม้สำหรับขึงผ้าใบ
      description: วัสดุที่ใช้สำหรับโครง/คานยึด (เช่น ไม้สน ไม้เฟอร์ ไม้ป็อปลาร์ ไม้เบิร์ช
        MDF/ไม้แปรรูป)
    strike_shield_shape:
      name: Shapesทรงโล่โจมตี
      description: ระบุรูปทรงโดยรวมของพื้นผิวรับแรงกระแทกของแผ่นป้องกันแรงกระแทก
    string_core_shape:
      name: รูปทรงแกนสาย
      description: ระบุ Shapes ลวดแกนกลางที่ใช้ในการพัน รูปทรง ซึ่งส่งผลต่อความรู้สึกและความมั่นคง
    string_coverage:
      name: การครอบคลุมสาย
      description: ระบุว่า คาโป้แบบบางส่วนนี้ออกแบบมาเพื่อครอบ/ปิดเฟร็ตใด (ตามจำนวนหรือชุดทั่วไป)
    string_end_type:
      name: ประเภทปลายสาย
      description: ระบุตำแหน่งที่สายสิ้นสุดที่บริดจ์/เทลพีซ เพื่อความเข้ากันได้ (สำคัญอย่างยิ่งสำหรับกีตาร์โปร่ง/ไฟฟ้า
        และเบสบางรุ่น)
    string_set_type:
      name: ประเภทชุดสตริง
      description: ระบุว่าสินค้าเป็นชุดครบเซ็ตหรือเป็นสายกีตาร์สำรองแต่ละเส้น
    strung_status:
      name: สถานะการขึ้นเอ็น
      description: ระบุว่าหัวไม้ลาครอสขึ้นเอ็นมาพร้อมช่องใส่ลูก หรือจำหน่ายแบบยังไม่ขึ้นเอ็น
    strut_placement:
      name: ตำแหน่งการติดตั้งโช้คอัพสตรัท
      description: ระบุว่าหัวไม้ลาครอสมาพร้อมกับเชือกที่ขึงไว้แล้วและมีช่องใส่ลูก
        หรือจำหน่ายแบบไม่มีเชือก
    stud_attachment_type:
      name: ประเภทการยึดติดของปุ่มสตั๊ด
      description: ระบุวิธีการยึดติดหรือจัดวางปุ่มสตั๊ดบนพื้นรองเท้า ซึ่งส่งผลต่อการยึดเกาะ
        การบำรุงรักษา และการปฏิบัติตามกฎระเบียบของลีก
    stud_configuration:
      name: รูปแบบปุ่มสตั๊ด
      description: กำหนดรูปทรงและการจัดเรียงของปุ่ม/ซี่ปุ่มบนพื้นรองเท้า ซึ่งส่งผลต่อการยึดเกาะและประสิทธิภาพในการใช้งานบนพื้นผิวต่างๆ
    stud_material:
      name: วัสดุของปุ่มสตั๊ด
      description: ระบุวัสดุหลักของหมุด/แผ่นยึด ซึ่งให้ข้อมูลเกี่ยวกับความทนทาน น้ำหนัก
        และการปฏิบัติตามกฎระเบียบด้านความปลอดภัย
    stuffed_animal_features:
      name: คุณสมบัติของตุ๊กตาผ้า
      description: จุดเด่นอยู่ที่ฟีเจอร์การเล่นและความสะดวกสบายในตัวของตุ๊กตาผ้า
    stump_base_type:
      name: ประเภทฐานเสาคริกเก็ต
      description: ระบุรูปแบบของฐานหรือระบบการติดตั้งที่ใช้กับเสาคริกเก็ต (เช่น แบบมีเดือย
        แบบสปริง แบบยางถ่วงน้ำหนัก เป็นต้น)
    stump_mechanism:
      name: กลไกการติดตั้งเสาคริกเก็ต
      description: ระบุกลไกการคืนตัวหรือการติดตั้งของเสาคริกเก็ต (เช่น แบบสปริงคืนตัว
        แบบยึดตายตัว)
    stump_size:
      name: ขนาดของเสาประตู
      description: ป้ายขนาดแบบแบ่งประเภทที่ใช้สำหรับเสาประตูคริกเก็ต ระบุความสูงโดยทั่วไปและกลุ่มอายุผู้เล่นที่เหมาะสม
    subwoofer_installation_type:
      name: ประเภทการติดตั้งซับวูฟเฟอร์
      description: วิธีการติดตั้งซับวูฟเฟอร์ในระบบเสียงรถยนต์ที่ถูกต้อง
    sugar_cane_variety:
      name: พันธุ์อ้อย
      description: แสดงพันธุ์ปลูกเฉพาะ/สายพันธุ์ทางการตลาดของอ้อย ซึ่งอาจส่งผลต่อสี
        ความหวาน และเนื้อเส้นใย
    sugar_content_level:
      name: ระดับปริมาณน้ำตาล
      description: จัดประเภทระดับน้ำตาลโดยรวมหรือสูตรส่วนผสมของเครื่องดื่มเข้มข้น
        ช่วยให้ร้านค้าสามารถค้นหาตัวเลือกแบบปกติ ลดน้ำตาล หรือปราศจากน้ำตาลได้อย่างรวดเร็ว
    sugar_refinement_level:
      name: ระดับการกลั่นน้ำตาล
      description: บ่งบอกถึงระดับหรือรูปแบบของการกลั่น (สี ปริมาณกากน้ำตาล หรือระดับการแปรรูป)
    sugar_source:
      name: แหล่งที่มาของน้ำตาล
      description: ระบุแหล่งที่มาทางพฤกษศาสตร์หรือวัตถุดิบที่ใช้ในการผลิตน้ำตาล
    suit_fit:
      name: สูทพอดีตัว
      description: ทรงโดยรวมของชุดสูท บ่งบอกถึงความกระชับของชุดต่อสรีระ
    suit_pieces:
      name: จำนวนชิ้นในชุดสูท
      description: ระบุจำนวนชิ้นที่เข้าชุดกันในชุดสูท (เช่น 2 ชิ้น, 3 ชิ้น, 4 ชิ้น)
    suitable_for_anchoring_use:
      name: เหมาะสำหรับใช้ในการยึดตรึง
      description: ระบุการใช้งานที่เกี่ยวข้องกับการยึดตรึงสำหรับเชือก/สาย
    suitable_for_craft_type:
      name: เหมาะสำหรับงานฝีมือประเภทต่างๆ
      description: ลวดสำหรับจัดทรงชิ้นงานนี้มีจุดประสงค์หลักเพื่อใช้ในงานเย็บปักถักร้อย
    suitable_for_paint_type:
      name: เหมาะสำหรับประเภทสี
      description: ระบุว่าผ้าใบชนิดนี้เหมาะที่จะใช้กับสีประเภทใด/ปลอดภัยที่จะใช้กับสีประเภทใด
    suitable_for_swim_stroke:
      name: เหมาะสำหรับท่าว่ายน้ำ
      description: ระบุว่าแผ่นพายมือนี้ได้รับการออกแบบหรือปรับให้เหมาะสมกับท่าว่ายน้ำใดบ้าง
    suitable_mounting_surface_material:
      name: วัสดุพื้นผิวสำหรับติดตั้งที่เหมาะสม
      description: ระบุพื้นผิว/วัสดุที่ต้องการติดตั้ง ซึ่งแผ่นกาวด้านหลังได้รับการออกแบบมาให้ยึดติดได้
    suitable_play_location:
      name: สถานที่เล่นที่เหมาะสม
      description: สภาพแวดล้อมการเล่นหลักที่ตั้งใจไว้สำหรับของเล่นกังหานทรายและน้ำ
    suitable_riding_conditions:
      name: เหมาะที่จะขี่สินค้า
      description: ระบุสภาพการขี่ (เช่น แห้ง เปียก ฤดูหนาว) ที่น้ำมันหล่อลื่นหรือน้ำยาทำความสะอาดจักรยานนั้นได้รับการออกแบบมาให้ใช้งานได้
    suitable_snow_conditions:
      name: สภาพหิมะที่เหมาะสม
      description: ระบุสภาพหิมะหลักที่แว็กซ์สำหรับยึดเกาะนี้ได้รับการออกแบบมาเพื่อรองรับ
    suitable_surface_type:
      name: พื้นผิวที่เหมาะสม
      description: ระบุพื้นผิวการเดินที่ออกแบบมาเพื่อใช้กับแผ่นกันลื่น
    suitable_table_size:
      name: ขนาดโต๊ะที่เหมาะสม
      description: ระบุความยาวของโต๊ะพูล/สนุ๊กเกอร์ที่ไฟดวงนี้ออกแบบมาเพื่อส่องสว่าง
    sun_protection_rating_upf:
      name: ระดับการป้องกันแสงแดด (UPF)
      description: ระบุระดับการป้องกันแสงแดด UPF ที่ได้รับการรับรองของเสื้อผ้าชิ้นนั้น
    sun_shade_attachment_method:
      name: วิธีการติดตั้งบังแดด
      description: วิธีการยึดม่านบังแดดเข้ากับกระจกหน้าต่าง/กระจกหน้ารถ
    sun_shade_style:
      name: สไตล์ร่มกันแดด
      description: โครงสร้าง/รูปแบบของสินค้าสำหรับเสื้อผ้าและที่บังแดด
    sunchoke_variety:
      name: พันธุ์ซันโชก
      description: ระบุสายพันธุ์หรือพันธุ์เฉพาะของเยรูซาเล็มอาร์ติโชค โดยให้ข้อมูลโดยละเอียดสำหรับนักทำสวน
        เชฟ และผู้ซื้อที่พิถีพิถัน
    sunflower_oil_variety:
      name: ประเภทของน้ำมันดอกทานตะวัน
      description: จำแนกประเภทของกรดไขมันหรือสายพันธุ์ของน้ำมันดอกทานตะวัน (เช่น น้ำมันโอเลอิกสูง
        น้ำมันโอเลอิกปานกลาง น้ำมันลิโนเลอิก)
    sunflower_variety:
      name: ทานตะวันหลากหลายสายพันธุ์
      description: พันธุ์/สายพันธุ์ของดอกทานตะวัน (พันธุ์ที่นิยมจำหน่ายทั่วไปสำหรับใช้เป็นดอกไม้ตัดดอก)
    support_brace_features:
      name: ความช่วยเหลือคุณสมบัติรั้ง
      description: ชี้แจงรายการคุณสมบัติการทำงานที่โดดเด่นของอุปกรณ์ซัพพอร์ตข้อมือ
        เช่น ผ้าสามารถระบายอากาศได้ เฝือกสามารถถอดออกได้ หรือแผ่นโลหะสามารถปรับเปลี่ยนได้
    support_leg_count:
      name: ช่วยเหลือการนับขา
      description: จำนวนขาที่สัมผัสพื้นเมื่อใช้ขาตั้งกล้อง (เช่น ขาตั้งกล้องขาเดียว
        ขาตั้งกล้องสองขา ขาตั้งกล้องสามขา)
    support_padding:
      name: แผ่นรองกันกระแทก
      description: ระบุว่าสายรัดหรืออุปกรณ์พยุงมีแผ่นรองบริเวณจุดสัมผัส (คอ/ไหล่/นิ้วหัวแม่มือ)
        หรือไม่
    support_structure_type:
      name: ประเภทโครงสร้างความช่วยเหลือ
      description: ระบุวิธีการก่อสร้างที่ใช้เพื่อให้แนวกันลมตั้งตรงอยู่ได้
    supported_bowling_delivery_types:
      name: ประเภทการส่งลูกโบว์ลิ่งที่รองรับ
      description: ระบุรูปแบบการขว้างลูกคริกเก็ตที่เครื่องสามารถจำลองได้ เช่น การขว้างแบบอินสวิง
        เอาท์สวิง และการหมุนลูก
    supported_dive_modes:
      name: โหมดดำน้ำที่รองรับ
      description: ระบุโหมดการดำน้ำที่คอมพิวเตอร์ดำน้ำรองรับ เช่น โหมดอากาศ โหมดไนตร็อกซ์
        หรือโหมดเกจวัดแรงดัน
    supported_equipment_type:
      name: ประเภทอุปกรณ์ที่รองรับ
      description: ระบุอุปกรณ์กีฬาฤดูหนาวที่ชั้นวางนี้ออกแบบมาเพื่อจัดเก็บ (เช่น สกี
        สโนว์บอร์ด ไม้สกี)
    supported_spin_types:
      name: ประเภทการหมุนที่รองรับ
      description: ระบุรูปแบบการหมุนของลูกบอลที่เครื่องยิงสามารถใช้ได้
    supported_spool_bobbin_types:
      name: ประเภทของแกนด้าย/กระสวยที่รองรับ
      description: ระบุรูปแบบของแกนด้าย/หลอดด้ายที่เครื่องม้วนด้ายไฟฟ้าได้รับการออกแบบมาให้รองรับ
    surf_wax_temperature_rating:
      name: ระดับอุณหภูมิของแว็กซ์สำหรับเล่นเซิร์ฟ
      description: ระบุช่วงอุณหภูมิน้ำที่เหมาะสมสำหรับการผลิตแว็กซ์ เพื่อให้มั่นใจได้ถึงการยึดเกาะที่ดีที่สุดในสภาพอากาศที่แตกต่างกัน
    surface_coating_or_finish:
      name: การเคลือบผิวหรือการตกแต่งพื้นผิว
      description: ระบุพื้นผิวป้องกันหรือเพิ่มประสิทธิภาพใดๆ ก็ตามที่ใช้กับคีม
    surface_coating_or_wrap:
      name: การเคลือบผิวหรือการห่อหุ้ม
      description: การเคลือบผิวภายนอกที่ใช้เพื่อเพิ่มการยึดเกาะ/ควบคุมบนจอยสติ๊กส่วนกลาง
        (และบางครั้งก็รวมถึงจอยสติ๊กส่วนมือด้วย)
    surface_finish:
      name: การตกแต่งพื้นผิว
      description: อธิบายถึงความรู้สึก/พื้นผิวของลูกบอลที่ Impact การจับและการเคลื่อนไหวระหว่างการเล่นจั๊กกลิ้งแบบสัมผัส
    surface_finish_prep:
      name: การตกแต่งพื้นผิว/การเตรียมพื้นผิว
      description: ระบุสภาพพื้นผิวเสียดทาน (เช่น ปรับผิวใหม่ กลึง หรือหล่อขึ้นรูป)
        ณ เวลาจำหน่าย
    surface_types_included:
      name: ประเภทพื้นผิวที่รวมอยู่
      description: ระบุว่าชุดอุปกรณ์ประกอบด้วยพื้นผิวสำหรับวาด/ระบายสีแบบใด (ถ้ามี)
        เช่น ผ้าใบ กระดาษ แผ่นไม้ หรือไม่มีเลย
    surfboard_construction:
      name: โครงสร้างของกระดานโต้คลื่น
      description: ระบุเทคโนโลยีการผลิตหลักหรือโครงสร้างชั้นวัสดุของกระดานโต้คลื่น
    surfboard_tail_shape:
      name: Shapesทรงหางกระดานโต้คลื่น
      description: กำหนดรูปทรงของส่วนท้ายของกระดาน ซึ่ง Influence ความคล่องตัวและการยึดเกาะ
    suspension_bushing_type:
      name: บูชช่วงล่างชนิด
      description: ระบุรูปแบบการทำงาน/การติดตั้งของบูชช่วงล่าง
    suspension_configuration:
      name: การกำหนดค่าช่วงล่าง
      description: อธิบายว่ารถสามล้อคันนี้มีระบบกันสะเทือนหรือไม่ และอยู่ตรงตำแหน่งใด
    suspension_material:
      name: วัสดุแขวนลอย
      description: ระบุวัสดุของโซ่ เชือก หรือสายเคเบิลที่ใช้แขวนชิงช้า
    suspension_trainer_accessories_included:
      name: อุปกรณ์เสริมสำหรับเครื่องฝึกแบบแขวนรวมอยู่ด้วย
      description: ระบุรายการสิ่งของเพิ่มเติมที่มาพร้อมกับชุดฝึก (เช่น ตัวยึดประตู
        สายรัดต่อขยาย ถุงเก็บของ) ช่วยให้ผู้ซื้อเข้าใจว่ามีอะไรอยู่ในกล่องบ้างและเปรียบเทียบมูลค่าของชุดสินค้าได้
    suspension_trainer_anchor_type:
      name: แบบยึดสำหรับเครื่องฝึกแบบแขวน
      description: ระบุรูปแบบการติดตั้งหรือจุดยึดที่ออกแบบมาสำหรับสายรัด (เช่น ประตู
        เพดาน ต้นไม้) เพื่อแจ้งให้ทราบถึงความเข้ากันได้กับสภาพแวดล้อมของผู้ใช้
    suspension_type:
      name: ประเภทระบบกันสะเทือน
      description: ระบุว่าโช้คหน้าเป็นแบบแข็งหรือใช้ระบบกันสะเทือนแบบใด (ลม, สปริง,
        ไฮบริด, อีลาสโตเมอร์ ฯลฯ) ช่วยให้ผู้ขี่เลือกโช้คหน้าที่เหมาะสมกับสไตล์การขี่ของตนได้
    sustain_pedal_form_factor:
      name: รูปทรงแป้นเหยียบซัสเทน
      description: อธิบายลักษณะทางกายภาพของแป้นเหยียบซัสเทน (เช่น แป้นเหยียบแบบเปียโนเทียบกับสวิตช์เท้าขนาดกะทัดรัด)
        ซึ่ง Impact ความรู้สึกและวัตถุประสงค์ในการใช้งาน
    sustain_pedal_switch_type:
      name: สวิตช์เหยียบซัสเทน
      description: ระบุว่าแป้นเหยียบส่งสัญญาณแบบชั่วขณะ (คงเสียงไว้ขณะกด) หรือแบบล็อค
        (สลับสถานะ)
    sustainability_certification:
      name: การรับรองด้านความยั่งยืน
      description: ใบรับรองด้านสิ่งแวดล้อมหรือแหล่งที่มาของวัสดุไม้
    swab_intended_bassoon_section:
      name: สำลีที่ตั้งใจไว้สำหรับส่วนบาสซูน
      description: ระบุว่าไม้ทำความสะอาดนั้นออกแบบมาเพื่อทำความสะอาดส่วนใดของบาสซูน
        (รู/ส่วนต่างๆ ต้องการรูปทรงและขนาดของไม้ทำความสะอาดที่แตกต่างกัน)
    swab_style:
      name: สไตล์สำลี
      description: อธิบายถึงการออกแบบ/รูปแบบทางกายภาพของสำลีที่ใช้ในการสอดเข้าไปหรือเข้าถึงบริเวณต่างๆ
        ของแซกโซโฟน
    swab_weight_material:
      name: วัสดุถ่วงน้ำหนักสำลี
      description: วัสดุของตุ้มถ่วง/สายนำ (ถ้ามี) ซึ่งส่งผลต่อความเสี่ยงในการเกิดรอยขีดข่วนและความทนทาน
    swab_weight_style:
      name: สไตล์น้ำหนักสำลี
      description: ระบุวิธีการถ่วงน้ำหนักสำลีเพื่อให้สามารถลอดผ่านรูของบาสซูนได้
    sway_bar_adjustability:
      name: การปรับเหล็กกันโคลง
      description: สามารถปรับความแข็งของเหล็กกันโคลงได้หรือไม่ และปรับอย่างไร (โดยทั่วไปจะปรับผ่านรูยึดปลายเหล็กกันโคลงหลายรู)
    sway_bar_coating:
      name: การเคลือบเหล็กกันโคลง
      description: การเคลือบผิวหรือการปรับสภาพพื้นผิวของเหล็กกันโคลงเพื่อป้องกันการกัดกร่อนและเพิ่มความสวยงาม
    sway_bar_fitment_front_rear_kit:
      name: การติดตั้งเหล็กกันโคลง (ด้านหน้า/ด้านหลัง/ชุดอุปกรณ์)
      description: ระบุว่าเหล็กกันโคลงนั้นออกแบบมาสำหรับเพลาหน้า เพลาหลัง หรือจำหน่ายเป็นชุดสำหรับทั้งหน้าและหลัง
    sweatshirt_pocket_type:
      name: แบบกระเป๋าเสื้อสเวตเตอร์
      description: อธิบายลักษณะของกระเป๋าบนเสื้อสเวตเตอร์
    sweet_potato_variety:
      name: พันธุ์มันเทศ
      description: พันธุ์มันเทศระบุสายพันธุ์หรือพันธุ์ที่จำหน่ายในตลาดของมันเทศโดยเฉพาะ
    sweet_spot_position:
      name: ตำแหน่งจุดที่เหมาะสมที่สุด
      description: ระบุว่าจุดหวานของไม้ตีอยู่ตรงจุดใดของไม้ตี ซึ่งส่งผลต่อสไตล์การเล่นและระดับเสียงของไม้ตีตามปกติสินค้า
    sweetener_presence:
      name: การมีอยู่ของสารให้ความหวาน
      description: ระบุว่ามีการเติมสารให้ความหวานลงในเนยถั่วหรือไม่ และมีปริมาณเท่าใด
    sweetening_type:
      name: ประเภทสารให้ความหวาน
      description: อธิบายว่าสินค้ามีรสหวานหรือระดับความหวานอย่างไร
    swim_armband_construction_type:
      name: ประเภทโครงสร้างของปลอกแขนว่ายน้ำ
      description: กำหนดรูปแบบโครงสร้างหรือกลไกการลอยตัวของปลอกแขน (แบบเป่าลม เทียบกับแบบโฟมแข็ง
        แบบผสม ฯลฯ)
    swim_belt_purpose:
      name: วัตถุประสงค์ของเข็มขัดว่ายน้ำ
      description: การจำแนกประเภทการใช้งานของเข็มขัดว่ายน้ำ (เช่น การช่วยลอยตัว การวิ่งในน้ำ
        การฝึกความแข็งแรง การผูกยึดแบบอยู่กับที่ การติดร่มชูชีพเพื่อลาก การถ่วงน้ำหนัก
        การเดินลุยน้ำเพื่อความปลอดภัย)
    swim_board_features:
      name: คุณสมบัติของบอร์ดว่ายน้ำ
      description: เน้นคุณลักษณะพิเศษหรือการปรับปรุงของบอร์ดว่ายน้ำที่ช่วยเพิ่มความสะดวกในการใช้งานหรือความปลอดภัย
    swim_bottom_length:
      name: ความยาวของกางเกงว่ายน้ำ
      description: จำแนกประเภทความยาวโดยรวมของกางเกงว่ายน้ำ (เช่น กางเกงขาสั้น หรือ
        กางเกงยาวถึงเข่า)
    swim_buoy_features:
      name: คุณสมบัติของห่วงยางว่ายน้ำ
      description: ระบุคุณลักษณะเพิ่มเติมที่น่าสนใจหรือส่วนเสริมที่ช่วยเพิ่มการมองเห็น
        ความปลอดภัย หรือประโยชน์ใช้สอยของทุ่นว่ายน้ำ
    swim_cap_style:
      name: สไตล์หมวกว่ายน้ำ
      description: กำหนดรูปแบบการสร้างหรือการออกแบบของหมวกว่ายน้ำ (เช่น หมวกสำหรับผมยาว
        หมวกทรงโดม/สำหรับแข่ง หมวกทรงฟอง/ทรงโพกหัว)
    swim_diaper_feature:
      name: คุณสมบัติของผ้าอ้อมสำหรับว่ายน้ำ
      description: ระบุว่ากางเกงว่ายน้ำมีคุณสมบัติกันรั่วซึมในตัวหรือไม่ หรือต้องใช้/ไม่ต้องใช้ผ้าอ้อมว่ายน้ำแยกต่างหาก
    swim_trainer_features:
      name: คุณสมบัติของเครื่องฝึกว่ายน้ำ
      description: เน้นคุณสมบัติเพิ่มเติมด้านการใช้งานหรือความสะดวกสบายของเครื่องฝึกว่ายน้ำ
    swim_trainer_type:
      name: ประเภทของอุปกรณ์ฝึกว่ายน้ำ
      description: กำหนดรูปแบบโครงสร้างหรือโครงสร้างของอุปกรณ์ฝึกว่ายน้ำ เพื่อช่วยในการกรองข้อมูลตามการออกแบบและวัตถุประสงค์ในการฝึกฝน
    swim_training_focus:
      name: การฝึกว่ายน้ำเน้นที่การฝึกซ้อม
      description: ระบุเป้าหมายหลักในการฝึกที่ไม้พายมุ่งเน้น (เช่น เทคนิค ความแข็งแรง
        การแยกส่วนกล้ามเนื้อ)
    swim_weight_style:
      name: รูปแบบของอุปกรณ์ถ่วงน้ำหนักสำหรับฝึกว่ายน้ำ
      description: จำแนกประเภทของตุ้มถ่วงน้ำหนักสำหรับว่ายน้ำ ช่วยให้ผู้ซื้อสามารถแยกแยะความแตกต่างระหว่างผลิตภัณฑ์ประเภทต่างๆ
        ที่แตกต่างกันอย่างสิ้นเชิง แม้ว่าจะยังคงอยู่ในหมวดหมู่เดียวกันก็ตาม
    swimbait_buoyancy:
      name: การลอยตัวของเหยื่อปลอมแบบว่ายน้ำ
      description: ระบุว่าเหยื่อปลอมแบบว่ายน้ำมีพฤติกรรมอย่างไรในน้ำ (ลอยตัว ลอยอยู่กลางน้ำ
        จมลง ฯลฯ) ช่วยให้นักตกปลาเลือกเหยื่อที่เหมาะสมกับความลึกและสไตล์การดึงเหยื่อที่ต้องการได้
    swimbait_style:
      name: สไตล์เหยื่อปลอมแบบว่ายน้ำ
      description: จำแนกประเภทโครงสร้างหรือการออกแบบการเคลื่อนไหวของเหยื่อปลอมแบบว่ายน้ำ
        เช่น เหยื่อแบบหางพาย หรือเหยื่อแบบร่อน
    swimwear_pieces_included:
      name: ชุดว่ายน้ำที่รวมอยู่ในชุด
      description: แสดงรายการส่วนประกอบแต่ละชิ้นของชุดว่ายน้ำแบบบุรกินี เพื่อให้ผู้ซื้อทราบอย่างชัดเจนว่ามีอะไรอยู่ในแพ็คเกจบ้าง
    swimwear_set_pieces_included:
      name: รายการสินค้าที่รวมอยู่ในชุดว่ายน้ำ
      description: แสดงรายการส่วนประกอบของชุดบุรกินีเพื่อให้ผู้ซื้อทราบว่าพวกเขาจะได้รับอะไรบ้าง
        (เช่น เสื้อ กางเกงเลกกิ้ง ผ้าคลุมศีรษะ/หมวก)
    swing_attachment_connection_type:
      name: สิ่งที่แนบมาแบบสวิง / ประเภทสิ่งอำนวยความสะดวก
      description: ประเภทของการเชื่อมต่อที่ใช้แขวนชิงช้ากับจุดรองรับ (เช่น เชือก โซ่
        สายรัด)
    swing_trainer_type:
      name: ประเภทของอุปกรณ์ฝึกสวิง
      description: จัดประเภทรูปแบบหรือกลไกของอุปกรณ์ฝึกแกว่งแขน เพื่อให้ผู้ซื้อสามารถค้นหาอุปกรณ์ที่ตรงกับเป้าหมายการฝึกฝนของตนได้อย่างรวดเร็ว
    swing_training_objective:
      name: วัตถุประสงค์ของการฝึกสวิง
      description: จำแนกประเภทจุดเน้นหลัก กลไก หรือวัตถุประสงค์ของการฝึกวงสวิง (เช่น
        จังหวะ ความเร็ว การจับ)
    switch_electrical_positions:
      name: สลับตำแหน่งทางไฟฟ้า
      description: ระบุจำนวนและลักษณะการทำงานของตำแหน่งทางไฟฟ้าบนสวิตช์ (เช่น สวิตช์
        3 ตำแหน่ง, สวิตช์เปิด/ปิดชั่วขณะ)
    swivel_type:
      name: แบบหมุนได้
      description: ระบุรูปแบบการหมุนที่ใช้เพื่อลดปัญหาการพันกันของสายจูง
    sword_scabbard_material:
      name: วัสดุทำฝักดาบ
      description: ระบุวัสดุหลักของฝักดาบ/ปลอกดาบที่ให้มาด้วย (ถ้ามี)
    synthesizer_form_factor:
      name: รูปแบบตัวสังเคราะห์เสียง
      description: อธิบายรูปแบบอินเทอร์เฟซทางกายภาพ/การใช้งานของซินเธไซเซอร์
    synthetic_feather_style:
      name: สไตล์ขนนกสังเคราะห์
      description: ลักษณะ/รูปทรงของขนนกสังเคราะห์ที่ใช้เพื่อรูปลักษณ์และเทคนิคการทำงานฝีมือที่แตกต่างกัน
    synthetic_formulation_type:
      name: ประเภทสูตรสังเคราะห์
      description: ระบุประเภทของสารตั้งต้นสังเคราะห์/สูตรผสม (เช่น PAO, เอสเตอร์,
        ไฮโดรแคร็กกลุ่ม III)
    syrup_base_ingredient:
      name: ส่วนผสมหลักของน้ำเชื่อม
      description: ระบุพืชหลักหรือแหล่งที่มาของน้ำตาลที่ใช้ในการผลิตน้ำเชื่อมหรือน้ำหวาน
        (เช่น เมเปิล อะกาเว น้ำตาลอ้อย)
    syrup_variety:
      name: น้ำเชื่อมชนิดต่างๆ
      description: กำหนดรูปแบบหรือประเภททั่วไปของน้ำเชื่อมโดยพิจารณาจากสูตรหรือการใช้งานแบบดั้งเดิม
        (เช่น น้ำเชื่อมเมเปิล น้ำเชื่อมแต่งกลิ่นกาแฟ น้ำเชื่อมผลไม้ น้ำเชื่อมสมุนไพร)
    t_shirt_fit:
      name: ทรงเสื้อยืด
      description: อธิบายถึงทรง/แบบโดยรวมของเสื้อยืดที่ต้องการ
    tabla_included_components:
      name: ส่วนประกอบที่มาพร้อมกลองตะบลา
      description: ระบุว่ารายการสินค้าหลักใดบ้างที่รวมอยู่ในชุดกลองทับลา (กลองเดี่ยวหรือชุด,
        ฝาครอบ/กล่องใส่, ค้อนปรับเสียง ฯลฯ)
    tabla_set_pieces_included:
      name: อุปกรณ์ที่รวมอยู่ชุดกลองตะบลา
      description: ระบุว่าชุดกลองทับลาประกอบด้วยส่วนประกอบใดบ้าง (เช่น ดายัน บายัน
        แหวน ฝาครอบ เครื่องมือปรับเสียง กระเป๋า)
    tabla_tonal_pitch_range_bayan:
      name: วช่วงเสียง/ระดับเสียงของกลองตะบลา (กลองบายัน)
      description: อธิบายประเภทช่วงเสียง/โทนเสียงทั่วไปของกลองบาหยาน (กลองเบส) โดยพิจารณาจากขนาดและโครงสร้าง
    table_base_material:
      name: วัสดุที่ใช้ทำฐานโต๊ะ
      description: ระบุวัสดุหลักของฐานหรือแท่นรองโต๊ะ (แตกต่างจากขาโต๊ะหรือหน้าโต๊ะ)
        เพื่อช่วยในการกรองข้อมูลตามวัสดุโดยเฉพาะ
    table_base_type:
      name: ฐานโต๊ะแบบ
      description: ระบุโครงสร้างที่รองรับพื้นโต๊ะ (เช่น ฐานตั้ง ขาตั้ง ฐานรูปตัว X)
    table_coverage_position:
      name: ตำแหน่งการครอบคลุมตาราง
      description: 'ระบุว่าผ้าคลุมนี้ออกแบบมาให้พอดีกับตำแหน่งใดของโต๊ะปิงปอง: พับเก็บ
        เล่น หรือทั้งสองอย่าง'
    table_hockey_part_type:
      name: ประเภทชิ้นส่วนฮอกกี้โต๊ะ
      description: ระบุประเภทของส่วนประกอบเฉพาะภายในระบบฮอกกี้แบบโต๊ะ/ลม/แท่ง/ฟองอากาศ
    table_leg_design:
      name: การออกแบบขาโต๊ะ
      description: ช่วยระบุโครงสร้างหรือรูปทรงเรขาคณิตของขา ทำให้ผู้ซื้อสามารถเลือกสินค้าที่ตรงกับความต้องการด้านความสวยงามและการรองรับได้ตามต้องการ
    table_size:
      name: ขนาดโต๊ะ
      description: ขนาดโดยรวมของโต๊ะบิลเลียด (หน่วยเป็นฟุต) ที่ระบุไว้ในเชิงพาณิชย์
        ช่วยให้ผู้ซื้อสามารถเลือกตัวเลือกทั่วไปได้อย่างรวดเร็ว เช่น โต๊ะบาร์ขนาด 7
        ฟุต หรือโต๊ะแข่งขันขนาด 9 ฟุต
    table_size_category:
      name: หมวดหมู่ขนาดโต๊ะ
      description: จัดหมวดหมู่โต๊ะฟุตบอลตามขนาดโดยรวม เพื่อช่วยให้ผู้ซื้อสามารถเลือกโต๊ะที่เหมาะสมกับพื้นที่ที่มีอยู่ได้โดยไม่ต้องคำนวณขนาดเอง
    table_tennis_certification:
      name: ใบรับรองเทเบิลเทนนิส
      description: แสดงมาตรฐานหรือการรับรองจากหน่วยงานกำกับดูแลที่ผลิตภัณฑ์ผ่าน (เช่น
        ITTF, EN 14468-2)
    tabletop_tilt_function:
      name: ฟังก์ชันการเอียงของโต๊ะ
      description: ระบุว่าโต๊ะสามารถเอียง พลิก หรือหมุนไปในมุมต่างๆ ได้หรือไม่
    tackle_components_included:
      name: อุปกรณ์ตกปลาที่รวมอยู่ในชุด
      description: ระบุรายการอุปกรณ์ตกปลาเฉพาะที่รวมอยู่ในชุด เพื่อให้ผู้ซื้อทราบว่ามีอะไรบ้างอย่างแน่นอน
    talking_drum_accessories_included:
      name: อุปกรณ์เสริมกลองพูดได้รวมอยู่ด้วย
      description: ระบุอุปกรณ์เสริมที่รวมอยู่ในกล่องพร้อมกับกลองพูดได้
    talking_drum_cord_material:
      name: วัสดุเชือกกลองพูดได้
      description: วัสดุที่ใช้สำหรับเชือก/สายดึงที่เชื่อมต่อหนังกลองเข้าด้วยกัน
    talking_drum_tuning_mechanism:
      name: กลไกการปรับแต่งกลองพูดได้
      description: วิธีการเปลี่ยนระดับเสียง/ปรับความตึงของกลองขณะเล่น (หรือขณะตั้งค่า)
    tam_tam_construction_style:
      name: รูปแบบการก่อสร้างแบบแทมแทม
      description: รูปแบบการสร้าง/การตีกลองแทมแทม
    tam_tam_items_included:
      name: สิ่งของที่รวมอยู่ในชุดฆ้อง
      description: อุปกรณ์เสริมที่มาพร้อมกับกลองทัมทัม (เช่น ไม้ตี ขาตั้ง ฝาครอบ)
    tamarillo_variety:
      name: พันธุ์ทามาริลโล
      description: ระบุสายพันธุ์หรือสีที่แตกต่างกันของผลมะเขือเทศป่าโดยเฉพาะ
    tamarind_variety:
      name: มะขามพันธุ์ต่างๆ
      description: ระบุสายพันธุ์ทางพฤกษศาสตร์หรือสายพันธุ์ทางการค้าของมะขาม ซึ่งอาจส่งผลต่อรสชาติ
        เนื้อสัมผัส และการนำไปใช้ในการประกอบอาหาร
    tambourine_frame_style:
      name: Frame แทมบูรีน
      description: อธิบายถึงลักษณะทางกายภาพของโครงสร้าง Frame พกพาที่ใช้ในการถือ/เล่นแทมบูรีน
    tambourine_head_material:
      name: วัสดุที่ใช้ทำหน้ากลองแทมบูรีน
      description: ระบุวัสดุของแผ่นหนังด้านหน้า (เมมเบรน) บนแทมบูรีนแบบมีหนัง
    tambourine_jingle_configuration:
      name: การกำหนดค่าเสียงกระดิ่งแทมบูรีน
      description: วิธีการเรียบเรียงหรือสร้างเสียงกระดิ่งบนแทมบูรีน
    tambourine_jingle_material:
      name: เนื้อหาเพลงจิงเกิลสำหรับแทมบูรีน
      description: ระบุวัสดุของกระดิ่ง (แผ่นโลหะ) ในแทมบูรีน ซึ่งส่งผลต่อโทนเสียงและความทนทาน
    tambourine_mounting_type:
      name: ประเภทการติดตั้งแทมบูรีน
      description: รูปแบบการถือหรือการติดตั้งแทมบูรีนระหว่างเล่น
    tambourine_tuning_mechanism:
      name: กลไกปรับเสียงแทมบูรีน
      description: ระบุระบบการปรับเสียงที่ใช้กับแทมบูรีนแบบพกพาที่สามารถปรับเสียงได้
        (ถ้ามี)
    tank_model_scale:
      name: โมเดลรถถัง ขยายสเกล
      description: ระบุอัตราส่วนมาตราส่วนของแบบจำลองรถถัง (เช่น 1:35, 1:72)
    tank_top_back_style:
      name: เสื้อกล้ามแบบเปิดหลัง
      description: ระบุ Shapes หรือการตัดด้านหลังของเสื้อกล้าม ซึ่ง Influence ความช่วยเหลือ
        ความคล่องตัว และความสวยงาม
    tape_application_area:
      name: บริเวณที่ติดเทป
      description: ระบุส่วนของอุปกรณ์หรือเครื่องเล่นที่ต้องการติดเทป ช่วยให้เลือกซื้อเทปได้อย่างถูกต้อง
    tape_finish:
      name: เทปปิดผิว
      description: ลักษณะพื้นผิว/รูปลักษณ์ (ความมันเงาหรือพื้นผิวสัมผัส) ของเทป
    tape_purpose:
      name: วัตถุประสงค์ของเทป
      description: ระบุการใช้งานหลักของเทปภายในการบำรุงรักษาแร็กเก็ตหรือข้อมูล
    tape_type:
      name: ประเภทเทป
      description: จำแนกประเภทการใช้งานหรือโครงสร้างของเทปพันด้ามฮอกกี้ เช่น เทปผ้า
        เทปโพลีเอทิลีนใส เทปกันลื่น เทปยืดหยุ่น เทปสำหรับรองหน้าแข้ง หรือเทปหนังกลับ
    tapenade_main_ingredients:
      name: ส่วนประกอบหลักของทาปาเนด
      description: ระบุส่วนผสมหลักที่ใช้กำหนดลักษณะของทาปาเนด (เช่น มะกอก มะเขือเทศ
        มะเขือม่วง พริก ฯลฯ) ซึ่งเป็นประโยชน์สำหรับผู้ซื้อที่มีความต้องการหรือข้อจำกัดเกี่ยวกับส่วนผสม
    tapestry_loom_loom_format:
      name: รูปแบบเครื่องทอพรม
      description: รูปทรงโดยรวม/รูปแบบการตั้งวางของเครื่องทอพรมด้วยมือ
    tapestry_loom_shedding_method:
      name: วิธีการแยกเส้นด้ายบนเครื่องทอพรม
      description: วิธีที่เครื่องทอผ้าสร้างช่องว่าง (แยกเส้นด้ายยืน) เพื่อให้เส้นด้ายพุ่งผ่านได้
    tapestry_loom_tensioning_system:
      name: ระบบปรับความตึงของเครื่องทอพรม
      description: วิธีการที่ใช้ในการดึงและยึดเส้นด้ายยืนบนเครื่องทอพรม
    tar_head_material:
      name: วัสดุของหนังกลอง
      description: ระบุวัสดุของหนังกลอง (เมมเบรน) ซึ่งมีอิทธิพลอย่างมากต่อสัมผัส ความทนทาน
        และโทนเสียง
    tar_playing_style:
      name: สไตล์การเล่นของทาร์
      description: ระบุตำแหน่ง/เทคนิคการเล่นหลักที่ออกแบบมาสำหรับเครื่องดนตรีชนิดนี้
    tar_tuning_system:
      name: ระบบปรับแต่งทาร์
      description: ระบุวิธีการปรับแต่งยางมะตาร์ (วิธีการปรับความตึงของหัวยาง)
    target_components:
      name: ส่วนประกอบเป้าหมาย
      description: ระบุว่าผลิตภัณฑ์นี้ออกแบบมาเพื่อทำความสะอาดส่วนประกอบใดในระบบเชื้อเพลิง/ระบบไอดี
    target_relative_humidity_rh:
      name: ความชื้นสัมพัทธ์เป้าหมาย (RH)
      description: ระดับความชื้นสัมพัทธ์เป้าหมายที่ผลิตภัณฑ์ได้รับการออกแบบให้คงไว้ภายในสภาพแวดล้อมของเครื่องมือ/กล่องบรรจุ
    target_resetting_mechanism:
      name: กลไกการรีเซ็ตเป้าหมาย
      description: อธิบายว่าเป้าหมายจะกลับไปยังตำแหน่งเดิมได้อย่างไร หรือจะกลับได้หรือไม่หลังจากถูกยิง
    target_trainer_type:
      name: ประเภทเป้าฝึกซ้อม
      description: จำแนกประเภทสไตล์หรือรูปแบบโดยรวมของอุปกรณ์ฝึกซ้อมกีฬาแร็กเก็ตบอลหรือสควอช
    targeted_contaminants:
      name: สารปนเปื้อนเป้าหมาย
      description: ประเภทของจุลินทรีย์หรือปรสิตที่สินค้าได้รับการรับรองในการกำจัด
    targeted_muscle_group:
      name: กลุ่มกล้ามเนื้อเป้าหมาย
      description: กลุ่มกล้ามเนื้อหลักที่อุปกรณ์เสริมนี้ออกแบบมาเพื่อฝึกฝนหรือเสริมสร้าง
    taro_variety:
      name: พันธุ์เผือก
      description: ระบุพันธุ์ สายพันธุ์ หรือชื่อตลาดของรากเผือกที่นำเสนอ (เช่น สีม่วง
        Taro, Eddoe, Dasheen)
    tassel_trim_header_type:
      name: ส่วนหัวตกแต่งด้วยพู่
      description: ระบุโครงสร้างของส่วนหัว/ส่วนยึดด้านบนที่ใช้สำหรับติดพู่ประดับเข้ากับพื้นผิว
        (เช่น เทป, เชือกถัก, เชือก)
    tassel_trim_use_case:
      name: การตกแต่งด้วยพู่
      description: พื้นที่แอปพลิเคชันหลักที่ตั้งใจไว้สำหรับการตัดแต่งพู่
    taste_profile:
      name: ลักษณะ Taste
      description: อธิบายลักษณะรสชาติเด่นของแอปเปิลพันธุ์นี้
    tea_variety:
      name: พันธุ์ชา
      description: จำแนกประเภทหรือรูปแบบของชา (เช่น ชาดำ ชาเขียว มัทฉะ รอยบอส) เพื่อช่วยให้ผู้ซื้อเลือกได้ง่ายขึ้น
    teasing_tool_style:
      name: สไตล์เครื่องมือล้อเล่น
      description: ลักษณะทางกายภาพหรือรูปทรงของอุปกรณ์ที่ใช้ในการเปิดและผสมเส้นใยผม
        (เช่น แปรง คราด หวี)
    tee_base_style:
      name: สไตล์เสื้อยืดพื้นฐาน
      description: ระบุโครงสร้างการออกแบบของฐานแท่นเตะรักบี้ที่รองรับลูกบอล
    temper_hardness:
      name: ความแข็ง/ความเหนียว
      description: บ่งบอกถึงความอ่อนหรือความแข็งของลวด (ความสามารถในการคงรูปทรง)
    temperature_control_type:
      name: ประเภทการควบคุมอุณหภูมิ
      description: วิธีการควบคุม/ปรับอุณหภูมิของเครื่องมือ
    tenkara_action_ratio:
      name: อัตราส่วนแอคชั่นเทนคาร่า
      description: ระบุอัตราส่วนการโค้งงอแบบดั้งเดิมของคันเบ็ดเทนคาร่า ซึ่งอธิบายถึงจุดที่คันเบ็ดโค้งงอเมื่อรับน้ำหนัก
        (เช่น 6:4)
    tennis_ball_court_surface:
      name: พื้นสนามเทนนิส
      description: ระบุพื้นสนามที่ลูกบอลได้รับการออกแบบมาให้ใช้งาน เพื่อให้ได้ประสิทธิภาพและความทนทานสูงสุด
    tennis_ball_pressure_type:
      name: ประเภทแรงดันลูกเทนนิส
      description: ระบุแรงดันภายในหรือโครงสร้างของลูกบอล (มีแรงดัน, ไม่มีแรงดัน, แรงดันต่ำ,
        โฟม) ที่ส่งผลต่อการเด้งและความทนทาน
    tennis_racket_grip_size:
      name: ขนาดด้ามจับไม้เทนนิส
      description: ระบุขนาดเส้นรอบวงมาตรฐานของด้ามจับแร็กเก็ต (L0-L5 หรือเทียบเท่าเป็นนิ้ว)
        เพื่อความกระชับมือและสวมใส่อย่างสบาย
    tenor_flutophone_fingering_system:
      name: ระบบการวางนิ้วสำหรับฟลูโตโฟนเทเนอร์
      description: ระบุระบบการวางนิ้วที่ใช้สำหรับฟลูโตโฟนเทเนอร์ (หลักสูตร/ธรรมเนียมการเขียนโน้ต)
    tenor_recorder_joint_type:
      name: ข้อต่อรีคอร์เดอร์เทเนอร์
      description: ระบุประเภทข้อต่อ/การเชื่อมต่อระหว่างส่วนต่างๆ ของรีคอร์เดอร์เสียงเทเนอร์
    tenor_saxophone_key_system:
      name: ระบบคีย์แซ็กโซโฟนเทเนอร์
      description: ระบุระบบ/มาตรฐานการทำงานของคีย์ที่ใช้ (มักอ้างถึงในรูปแบบฝรั่งเศส/โบห์มสำหรับแซกโซโฟน)
    tenor_saxophone_pad_material:
      name: วัสดุรองนั่งสำหรับแซกโซโฟนเทเนอร์
      description: ระบุวัสดุหลักที่ใช้สำหรับแผ่นรองนิ้วของเครื่องดนตรี
    tenor_trombone_slide_type:
      name: ทรอมโบนเทเนอร์แบบสไลด์
      description: ประเภทของสไลด์ที่ใช้กับเทเนอร์ทรอมโบน (เช่น Standard/straight vs
        ®/axis Flow)
    tenor_trombone_valve_configuration:
      name: การจัดเรียงวาล์วของทรอมโบนเทเนอร์
      description: ระบุว่าทรอมโบนเทเนอร์มีวาล์ว/โรเตอร์หรือไม่ และใช้การกำหนดค่าแบบใด
    tension_control_type:
      name: ประเภทการควบคุมแรงตึง
      description: ระบุว่ากระสวยสามารถปรับแรงต้าน/แรงตึงบนแกนด้าย/ก้านด้ายขณะป้อนด้ายได้อย่างไร
        (หรือว่าสามารถปรับได้หรือไม่)
    tension_mechanism:
      name: กลไกแรงตึง
      description: รูปแบบการปรับความตึงที่ใช้ควบคุมการป้อนเส้นด้ายพุ่งจากกระสวย/แกนด้ายขณะทอผ้า
    tension_pitch_modulation_system:
      name: ระบบปรับความตึง/ระดับเสียง
      description: วิธีที่กลองพูดได้เปลี่ยนระดับเสียง/ความตึงระหว่างการเล่น (ตัวอย่างเช่น
        โดยการบีบเชือกปรับความตึง)
    tension_system:
      name: ระบบปรับความตึง
      description: ระบบดึง/ปรับความตึงของล้อปั่นด้ายที่ชุดอุปกรณ์นี้ออกแบบมาเพื่อใช้งาน
    tent_fabric_material:
      name: วัสดุผ้าเต็นท์
      description: ระบุชนิดของผ้าหลักที่ใช้ในผ้าคลุมหรือตัวเต็นท์ ซึ่งส่งผลต่อ น้ำหนัก
        การระบายอากาศ และความทนทานต่อสภาพอากาศ
    tent_season_rating:
      name: การจัดอันดับฤดูกาลกางเต็นท์
      description: จำแนกประเภทเต็นท์ตามจำนวนฤดูกาลหรือสภาพอากาศที่ออกแบบมาให้เหมาะสม
        (เช่น เต็นท์ 3 ฤดู, เต็นท์ 4 ฤดู, เต็นท์สำหรับการเดินทางสำรวจ)
    tent_setup_type:
      name: ประเภทการติดตั้งเต็นท์
      description: ระบุรูปแบบการกางโครงสร้างของเต็นท์ เช่น แบบตั้งได้เอง แบบกึ่งตั้งได้เอง
        แบบมีโครงสร้าง แบบเป่าลม หรือแบบกางออกได้
    tent_style:
      name: สไตล์เต็นท์
      description: อธิบายโครงสร้างของเต็นท์ (เช่น ทรงโดม ทรงอุโมงค์ ทรงเอเฟรม)
    test_result_output_method:
      name: วิธีการแสดงผลลัพธ์การทดสอบ
      description: ระบุวิธีการที่เครื่องทดสอบแบตเตอรี่รถยนต์แสดงหรือส่งผลการทดสอบแก่ผู้ใช้
        (เช่น ตัวบ่งชี้ หน้าจอ เอกสารสิ่งพิมพ์ แอป หรือรายงานซอฟต์แวร์)
    tether_strap_system:
      name: ระบบสายรัด/สายยึด
      description: ประเภทของระบบสายรัดหรือสายยึดที่ใช้เชื่อมต่ออุปกรณ์พยุงคอเข้ากับหมวกกันน็อค/สายรัดนิรภัย
        (ถ้ามี)
    text_color:
      name: สีตัวอักษร
      description: สีของข้อความที่พิมพ์หรือปักบนฉลาก ต้องแตกต่างจากสีพื้นหลังของฉลาก
    textile_craft_machine_operation_type:
      name: ประเภทการทำงานของเครื่องจักรงานฝีมือสิ่งทอ
      description: วิธีการใช้งานเครื่องจักร (ใช้แรงมือ เทียบกับ ใช้แรงเท้า เทียบกับ
        ใช้มอเตอร์/ไฟฟ้า)
    textile_finish_treatment:
      name: การตกแต่งสิ่งทอ / ทรีตเมนต์
      description: ระบุลักษณะเด่นของทรีตเมนต์ที่ใช้กับวัสดุสิ่งทอ
    texture_inclusions:
      name: ส่วนประกอบของเนื้อสัมผัส
      description: ระบุส่วนประกอบที่เพิ่มเข้ามาเพื่อเพิ่มเนื้อสัมผัส เช่น เนื้อว่านหางจระเข้
        เมล็ดโหระพา นาตาเดโคโค่ บับเบิ้ลที หรือชิ้นผลไม้
    therapeutic_technology:
      name: เทคโนโลยีการรักษา
      description: ระบุฟังก์ชันการรักษาแบบบูรณาการใดๆ เช่น เจลทำความเย็น แถบแม่เหล็ก
        หรือเซรามิกอินฟราเรด
    thermal_set_components:
      name: ส่วนประกอบชุดควบคุมอุณหภูมิ
      description: ระบุว่าผลิตภัณฑ์นั้นประกอบด้วยเฉพาะส่วนล่าง เฉพาะส่วนบน หรือเป็นชุดเดียวกันทั้งสองชิ้น
    thermal_weight:
      name: น้ำหนักความร้อน
      description: ระบุระดับความอบอุ่นของผ้าที่ใช้ทำหมวกคลุมหน้า
    thermostat_type:
      name: ประเภทเทอร์โมสตัท
      description: การออกแบบการทำงานหรือรูปแบบการควบคุมของเทอร์โมสตัทระบบระบายความร้อนของรถยนต์
    thimble_guide_size:
      name: ขนาดปลอกนิ้ว
      description: การกำหนดขนาดของปลอกนิ้ว (ขนาดที่พอดี/ครอบคลุม) โดยทั่วไปจะจำหน่ายเป็นขนาดเล็ก/กลาง/ใหญ่
        มากกว่าการวัดขนาดจริง
    thread_connection_size:
      name: จะต้องคำนึงถึงขนาด
      description: กำหนด ข้อกำหนดที่เชื่อมต่อเพลา ปลาย และอะแดปเตอร์ (เช่น 6 มม.,
        5/16"-24)
    thread_construction:
      name: โครงสร้างเกลียว
      description: วิธีการสร้างหรือการจัดการเส้นใย (เช่น ไหมปักแบบเส้นเดี่ยวเทียบกับเส้นใยแบบยึดติด)
    thread_cord_type_beading_pattern:
      name: ใช้สำหรับ/ชนิดสายไฟ (ลายประดับด้วยลูกปัด)
      description: แนะนำให้ใช้ด้ายหรือเชือกชนิดใดในการถักชิ้นงานตามแบบ
    thread_cutter_form_factor:
      name: รูปแบบของอุปกรณ์ตัดเกลียว
      description: ระบุรูปแบบทางกายภาพของเครื่องตัดด้าย เช่น กรรไกรตัดด้ายแบบมือถือ
        แบบห้อย หรือแบบแหวน
    thread_cutter_mechanism:
      name: กลไกตัด
      description: อธิบายการทำงานหรือกลไกการตัดที่ใช้โดยเครื่องตัด
    thread_cutter_safety_features:
      name: คุณสมบัติเพื่อความปลอดภัยของเครื่องตัดเกลียว
      description: ระบุคุณสมบัติความปลอดภัยในตัวที่ช่วยลดความเสี่ยงจากการบาดเจ็บโดยไม่ตั้งใจ
        หรือปกป้องใบมีดระหว่างการจัดเก็บ
    thread_cutter_usage_application:
      name: ติดตามการใช้งานเครื่องตัด/แอปพลิเคชัน
      description: ระบุงานประดิษฐ์หลักที่เครื่องตัดออกแบบมาเพื่อใช้งาน
    thread_finish_treatment:
      name: การตกแต่ง/การทรีตเมนต์เส้นด้าย
      description: การตกแต่งพื้นผิวหรือทรีตเมนต์นำไปใช้กับพื้นที่ที่ส่งผลต่อการขนย้ายและประสิทธิภาพ
        (เช่น แว็กซ์ บอนด์ เมอร์เซอร์ไรซ์)
    thread_material:
      name: วัสดุที่ใช้ทำเส้นด้าย
      description: ส่วนประกอบหลักของเส้นใย/วัสดุในเส้นด้าย/ไหม (ไม่ใช่ผ้า)
    thread_material_fiber:
      name: วัสดุ (เส้นใย)
      description: ระบุเส้นใย/วัสดุหลักของ เอง (ไม่ใช่ผ้า)
    thread_package_format:
      name: รูปแบบบรรจุภัณฑ์เส้นด้าย
      description: รูปแบบบรรจุภัณฑ์ของด้ายเย็บผ้า (เช่น ม้วนด้าย, กรวยด้าย, กระสวยด้าย)
    thread_rack_compatible_spool_type:
      name: อาหารประเภทสปูลที่รองรับ
      description: ประเภทของบรรจุภัณฑ์ที่ห้องอาหารได้รับการออกแบบให้รองรับได้ (หลอดหรือกรวย
        ฯลฯ)
    thread_standard_size:
      name: ขนาดเกลียวมาตรฐาน
      description: ระบุขนาด/น้ำหนักมาตรฐานของเส้นด้ายที่ใช้บนฉลากผลิตภัณฑ์ (เช่น wt,
        Tex, denier)
    thread_type:
      name: ประเภท
      description: ระบุโครงสร้าง/ประเภทของการปักครอสติช เส้นด้าย/ไหมปัก
    thread_weight_system:
      name: ระบบน้ำหนัก
      description: มาตรฐานที่ใช้ในการแสดงความหนา/น้ำหนัก
    thread_yarn_guide_mounting_attachment_style:
      name: รูปแบบการติดตั้ง/ยึดตัวนำด้ายและเส้นด้าย
      description: อธิบายวิธีการสวมใส่หรือติดตั้งอุปกรณ์นำทางขณะใช้งาน
    thread_yarn_guide_tension_control:
      name: ควบคุมความตึงของรางนำ & เส้นด้าย
      description: ระบุว่าไกด์สามารถปรับความตึง/แรงต้านบนเส้นด้ายได้หรือไม่และอย่างไร
    thread_yarn_organizer_features:
      name: คุณสมบัติของผู้จัดเส้นด้ายและเส้นด้าย
      description: เน้นคุณสมบัติการจัดระเบียบและการพกพาที่สะดวก ซึ่งเหมาะสำหรับการจัดเก็บด้าย/ไหมพรมโดยเฉพาะ
    threader_intended_use:
      name: วัตถุประสงค์การใช้งานของอุปกรณ์ร้อยด้วย
      description: ระบุบริบทงานคราฟต์หลักที่เครื่องสนเข็มมือถือออกแบบมาให้ใช้งาน
    threading_system:
      name: ระบบเกลียว
      description: ระบุวิธีการและอุปกรณ์ช่วยที่ใช้ในการร้อยด้ายจักรเย็บผ้าโอเวอร์ล็อก
        (เช่น การร้อยด้ายด้วยมือ การร้อยด้ายโดยใช้รหัสสี การร้อยด้ายแบบมีตัวนำ การร้อยด้ายด้วยลม)
    threading_type:
      name: ประเภทเกลียว
      description: ระบุว่าเครื่องประดับใช้เกลียวภายใน เกลียวภายนอก ไม่มีเกลียว หรือไม่เกี่ยวข้อง
    throttle_type_scooter_conversion:
      name: ห้ามจำกัดความเร็วประเภท (สกู๊ตเตอร์ คอนคอน)
      description: ระบุการใช้งานจำกัดความเร็วฟอร์มแฟคเตอร์/อินเทอร์เฟซที่รวมหรือกำหนดโดยคอนแชร์บันทึก
    throw_rope_end_attachment:
      name: อุปกรณ์ยึดปลายเชือกสำหรับโยน
      description: การสิ้นสุด/อุปกรณ์เสริมฮาร์ดแวร์หรือห่วงที่มีให้ที่ปลายการทำงานของเชือกโยน
    throw_rope_storage_packaging_type:
      name: ประเภทการจัดเก็บ/บรรจุภัณฑ์เชือกขว้าง
      description: วิธีการจัดเก็บหรือใช้งานเชือกขว้าง (เช่น ในถุงหรือม้วนเก็บ)
    throw_rope_visibility_features:
      name: คุณสมบัติการมองเห็นของเชือกโยน
      description: คุณสมบัติการมองเห็นและการระบุตัวตนที่ออกแบบมาเพื่อให้มองเห็นเชือกได้ง่ายขึ้นในน้ำ/สภาพแสงน้อย
    thrower_operation_type:
      name: ประเภทการทำงานของเครื่องยิ่งเป้าบิน
      description: จำแนกประเภทกลไก/การทำงานของเครื่องขว้าง เพื่อคัดกรองอย่างรวดเร็วระหว่างกลไกแบบใช้มือและแบบอัตโนมัติ
    thumb_design:
      name: การออกแบบนิ้วหัวแม่มือ
      description: อธิบายถึงวิธีการออกแบบนิ้วโป้งให้รวมอยู่ในถุงมือ ซึ่งส่งผลต่อความปลอดภัยและการยึดจับ
    tiara_design:
      name: ดีไซน์มงกุฎ
      description: ระบุรูปแบบโครงสร้างโดยรวมหรือรูปทรงของมงกุฎ
    tie_down_points_straps_included:
      name: มีจุดยึด/สายรัดให้มาด้วย
      description: ระบุว่าสายรัดมีจุดยึดในตัวและ/หรือสายรัดสำหรับยึดรถจักรยานยนต์/สกูตเตอร์หรือไม่
    tiling_format:
      name: รูปแบบการเรียงต่อกัน
      description: ระบุรูปแบบไฟล์ PDF ของเลย์เอาต์สำหรับการจัดหน้า
    time_current_characteristic:
      name: ลักษณะเวลา-กระแส
      description: ระบุลักษณะการทำงานตามเวลาและกระแสของฟิวส์ (เช่น ฟิวส์ทำงานเร็วหรือฟิวส์หน่วงเวลา)
        ซึ่งส่งผลต่อความเหมาะสมสำหรับวงจรที่มีกระแสไฟกระชากสูง
    timer_count_mode:
      name: Modeนับเวลา
      description: ระบุโหมดการนับของตัวจับเวลา เช่น นับถอยหลัง นับขึ้น (นาฬิกาจับเวลา)
        ทั้งสองอย่าง หรือแบบช่วงเวลา/วนซ้ำ
    timer_display_type:
      name: ประเภทการแสดงผลตัวจับเวลา
      description: ระบุวิธีการแสดงเวลาที่เหลืออยู่ของตัวจับเวลาเกม (เช่น หน้าจอดิจิทัล,
        หน้าปัดแบบอนาล็อก, นาฬิกาทราย หรือไม่มีการแสดงผลใดๆ)
    timer_operating_modes:
      name: โหมดการทำงานของตัวจับเวลา
      description: รองรับพฤติกรรมของตัวจับเวลาเพื่อเรียกใช้เอฟเฟกต์ต่างๆ
    timing_belt_construction_material_rubber_compound:
      name: วัสดุที่ใช้ในการผลิตสายพานไทม์มิ่ง (สารประกอบยาง)
      description: ส่วนประกอบยางหลักที่ใช้สำหรับสายพาน (เช่น HNBR) มีผลต่อความทนทานต่อความร้อน/น้ำมัน
        และอายุการใช้งาน
    timing_belt_profile:
      name: โปรไฟล์สายพานไทม์มิ่ง
      description: มาตรฐานรูปทรง/ลักษณะฟันของสายพานไทม์มิ่ง (เช่น รูปทรงสี่เหลี่ยมคางหมูเทียบกับรูปทรงโค้ง)
    timing_belt_reinforcement_cord_material:
      name: วัสดุเสริมแรงสายพานไทม์มิ่ง
      description: ระบุวัสดุของเส้นใยเสริมแรงภายในสายพานไทม์มิ่ง (เช่น ใยแก้ว อะรามิด)
        ซึ่งส่งผลต่อความแข็งแรงและการยืดตัว
    timing_component_material:
      name: วัสดุที่ใช้ทำชิ้นส่วนระบบตั้งเวลา
      description: วัสดุหลักของชิ้นส่วนระบบตั้งเวลา (ส่วนผสมของสายพาน โลหะของโซ่/เฟือง
        วัสดุหุ้ม)
    tin_whistle_body_material:
      name: หมายเลขประจำตัวผู้เสียภาษีวัสดุตัวนกหวีด
      description: รวบรวมหมายเลขประจำตัวของผู้เสียภาษีอย่างเจาะจงมากกว่ารายการวัสดุเครื่องมือแบบกว้างๆ
        เมื่อจำเป็น
    tin_whistle_bore_type:
      name: ประเภทรูเป่าขลุ่ยดีบุก
      description: ระบุการออกแบบรูเป่าของขลุ่ยดีบุก
    tin_whistle_included_accessories:
      name: หมายเลขประจำตัวผู้เสียภาษีนกหวีดรวมอุปกรณ์เสริม
      description: อุปกรณ์เสริมที่มาพร้อมกับหมายเลขประจำตัวผู้เสียภาษีนกหวีด (เช่น
        เคส, ก้านทำความสะอาด)
    tip_finish_coating:
      name: การตกแต่ง/เคลือบผิวปลายหัวไขควง
      description: ระบุการเคลือบผิวที่ปลายใช้งาน (เช่น ชุบโครเมียม เคลือบสีฝุ่น) ซึ่งส่งผลต่อความต้านทานการกัดกร่อนและการเกิดรอยขีดข่วนที่ขอบ
    tip_shape:
      name: รูปทรงปลาย
      description: อธิบายถึงรูปทรงหรือความคมของปลายปิ๊กกีตาร์ ซึ่งส่งผลต่อการออกเสียงและสัมผัสในการดีด
    tippet_rating:
      name: ค่าระดับทิปเป็ต
      description: ความแข็งแรงของสายหน้า (tippet) ที่แนะนำสูงสุดจะแสดงเป็นหน่วย X
        สำหรับการตกปลาแบบฟลายฟิชชิ่ง (เช่น 4X)
    tire_changer_operation_type:
      name: ประเภทการทำงานของเครื่องเปลี่ยนยาง
      description: ระบุวิธีการทำงาน/การใช้งานของเครื่องเปลี่ยนยาง (เช่น แบบใช้มือ
        แบบใช้ลม แบบไฮดรอลิก) แตกต่างจากคุณลักษณะ "แหล่งพลังงาน" ทั่วไป ใช้เมื่ออธิบายวิธีการทำงานของเครื่องจักร
    tire_changer_type:
      name: ประเภทเครื่องเปลี่ยนยาง
      description: ลักษณะการทำงานโดยทั่วไป การออกแบบ หรือระดับ Automation ของเครื่องเปลี่ยนยาง
    tire_compound_type:
      name: ประเภทของส่วนผสมยาง
      description: ระบุการจำแนกประเภทของส่วนผสมยางที่ใช้ในยางรถยนต์ (เช่น ยางนุ่ม
        ยางสำหรับฝน ยางเรียบ) ซึ่ง Influence การยึดเกาะและความทนทานภายใต้สภาพพื้นผิวที่แตกต่างกัน
    tire_load_range:
      name: ช่วงรับน้ำหนักของยาง
      description: ระบุระดับความแข็งแรงของชั้นยาง/ช่วงรับน้ำหนัก (โดยทั่วไปสำหรับยาง
        LT) ซึ่งสะท้อนถึงความสามารถในการรับน้ำหนัก
    tire_position:
      name: ตำแหน่งยาง
      description: ตำแหน่งการติดตั้งที่แนะนำบนตัวรถ
    tire_repair_kit_components:
      name: ซ่อมยางมองส่วนประกอบ
      description: ระบุรายการที่รวมอยู่ในบันทึก ทำให้ใบรับรองสามารถเปรียบเทียบชุดความสมบูรณ์ได้
    tire_sidewall_type:
      name: ประเภทของแก้มยาง
      description: ระบุรูปแบบหรือลักษณะโครงสร้างของผนังด้านข้าง
    tire_speed_rating:
      name: ระดับความเร็วของยาง
      description: ตัวอักษรระบุระดับความเร็วของยาง (เช่น H, V, W) ซึ่งบ่งบอกถึงความสามารถในการทำความเร็วสูงสุดอย่างต่อเนื่อง
    tire_spoon_type:
      name: แบบช้อนยาง
      description: จำแนกประเภทของช้อนงัดยางตามรูปทรงของปลายและวัตถุประสงค์การใช้งาน
    tire_system_compatibility:
      name: ความเข้ากันได้ของระบบยาง
      description: ระบุว่าน้ำยาซีลยางนั้นเหมาะสำหรับยางแบบไม่ใช้ยางใน ยางแบบใช้ยางใน
        หรือทั้งสองแบบ
    tire_temperature_rating_utqg:
      name: ระดับอุณหภูมิของยาง (UTQG)
      description: ระดับความทนทานต่ออุณหภูมิ UTQG สำหรับยางรถยนต์ (เช่น A, B, C)
    tire_traction_rating_utqg:
      name: ค่าการยึดเกาะของยาง (UTQG)
      description: ค่าการยึดเกาะ UTQG สำหรับประสิทธิภาพการเบรกบนพื้นเปียก
    tire_tread_style:
      name: รูปแบบดอกยาง
      description: อธิบายถึงรูปแบบดอกยางโดยทั่วไปของยางแบบท่อ ซึ่งสะท้อนถึงลักษณะการใช้งานและแรงยึดเกาะที่ตั้งใจไว้
    tire_tube_type:
      name: ยางในชนิดยางใน
      description: ไม่ว่ายางนั้นจะออกแบบมาสำหรับการใช้งานแบบไม่ใช้ยางในหรือแบบใช้ยางในก็ตาม
    title_status:
      name: สถานะชื่อเรื่อง
      description: สถานะทางกฎหมาย/การจดทะเบียนของรถยนต์
    tobacco_application:
      name: ยาสูบแอปพลิเคชัน
      description: ระบุวิธีการบริโภคหรืออุปกรณ์การสูบที่ออกแบบมาสำหรับยาสูบแบบใบ
    tobacco_cut_type:
      name: ประเภทการตัดยาสูบ
      description: ระบุลักษณะการตัดหรือการเตรียมยาสูบแบบหลวม ซึ่งส่งผลต่ออัตราการเผาไหม้
        วิธีการบรรจุ และประสบการณ์การสูบโดยรวม
    tobacco_strength:
      name: ความแรงของยาสูบ
      description: บ่งบอกถึงความรู้สึกถึงสารนิโคตินหรือความเข้มข้นของยาสูบเมื่อสูบ
        ช่วยให้ผู้ซื้อเลือกความเข้มข้นที่ตรงกับความชอบของตนเองได้
    toe_construction:
      name: โครงสร้างส่วนปลายเท้า
      description: ระบุรูปแบบการจัดวางบริเวณปลายเท้าของรองเท้าเวทสูท ซึ่งส่งผลต่อการทรงตัว
        ความรู้สึกเมื่อสัมผัสกับบอร์ด และความอบอุ่น
    toe_coverage:
      name: การปกคลุมปลายเท้า
      description: ระบุระดับการปกคลุมนิ้วเท้าของถุงเท้า
    toe_pick_style:
      name: สไตล์ปลายนิ้วเท้า
      description: อธิบายถึงการออกแบบส่วนปลายแหลมของใบมีดรองเท้าสเก็ตลีลา
    toe_protection_type:
      name: ประเภทการป้องกันปลายเท้า
      description: ระบุว่าบริเวณปลายรองเท้ามีการเสริมความแข็งแรงเพื่อความปลอดภัยหรือไม่
        และอย่างไร (เช่น หัวเหล็ก หัวอ่อน)
    toe_reinforcement_type:
      name: ประเภทการเสริมความแข็งแรงบริเวณปลายเท้า
      description: อธิบายรายละเอียดเกี่ยวกับการออกแบบบริเวณปลายเท้า ซึ่งมีผลต่อความทนทานและความเข้ากันได้กับรองเท้า
    toe_stop_stem_thread_size:
      name: ขนาดเกลียวก้านหยุดนิ้วเท้า
      description: ระบุขนาดเกลียวของก้านกันกระแทกนิ้วเท้าเพื่อให้แน่ใจว่าสามารถใช้งานร่วมกับแผ่นรองได้
    tofu_preparation_style:
      name: วิธีการเตรียมเต้าหู้
      description: จำแนกประเภทเต้าหู้ตามรูปแบบดั้งเดิมหรือชนิดย่อย นอกเหนือจากความนุ่มหรือความแข็ง
        (เช่น เต้าหู้เนื้อเนียน เต้าหู้ก้อน เต้าหู้พอง เต้าหู้ผิว เต้าหู้เป็นปม เต้าหู้หมัก)
    tom_mount_adjustment_features:
      name: คุณสมบัติการปรับแต่งฐานยึดทอม
      description: ระบุว่าขาตั้งกลองทอมสามารถปรับแต่งอะไรได้บ้างเพื่อจัดตำแหน่งกลอง
        (เช่น การเอียง การหมุน ความสูง)
    tom_mount_components_included:
      name: ส่วนประกอบของขาตั้งกลองทอมที่รวมอยู่ในชุด
      description: ระบุว่าชิ้นส่วนใดบ้างที่รวมอยู่ในชุดติดตั้งกลองทอม (ตัวรับสัญญาณ
        แขน ลูกบอล ตัวหนีบ ตัวล็อคหน่วยความจำ ฯลฯ)
    tom_mount_mounting_position:
      name: ตำแหน่งการติดตั้งตัวยึดกลองทอม
      description: ระบุตำแหน่งที่ต้องการติดตั้งขาตั้งกลองทอม (เช่น กลองเบส ขาตั้งฉาบ
        หรือแร็ค)
    tonneau_cover_mounting_style:
      name: รูปแบบการติดตั้งฝาครอบกระบะท้าย
      description: แสดงวิธีการติดตั้ง/ยึดฝาครอบกระบะท้ายเข้ากับรางกระบะท้ายรถบรรทุก
    tool_case_form_factor:
      name: เครื่องมือ รูปแบบ
      description: ระบุรูปแบบทางกายภาพของเครื่องมือกระแทกเพื่อความสะดวกในการพกพาและจัดเก็บ
        (เช่น กระเป๋าเอกสาร กล่องแข็ง)
    tool_functions_included:
      name: Functions ของเครื่องมือประกอบด้วย
      description: ระบุฟังก์ชันการซ่อมหรือบำรุงรักษาที่เครื่องมืออเนกประสงค์หรือชุดเครื่องมือสามารถทำได้
    top_bunk_access_method:
      name: วิธีเข้าถึงเตียงสองชั้นด้านบน
      description: ระบุวิธีที่ผู้พักอาศัยขึ้นไปนอนบนเตียงสองชั้นด้านบน ซึ่งช่วยในเรื่องความปลอดภัยและการใช้พื้นที่
    top_fit:
      name: พอดีตัว
      description: ระบุรูปทรงโดยรวมหรือความพอดีของเสื้อเมื่อสวมใส่ (เช่น ทรงเข้ารูปหรือทรงหลวม)
    top_hat_style:
      name: สไตล์หมวกทรงสูง
      description: ระบุรูปแบบเฉพาะของหมวกทรงสูง
    top_soundboard_material:
      name: วัสดุแผ่นหน้า (แผ่นเสียง)
      description: ระบุวัสดุของแผ่นหน้า/แผ่นเสียงของกีตาร์ (แผ่นหลักที่สร้างเสียง)
    topping_form:
      name: แบบฟอร์มท็อปปิ้ง
      description: กำหนดรูปแบบทางกายภาพหรือความสม่ำเสมอของท็อปปิ้งของหวานเพื่อช่วยให้นักช้อปแคบลงไปยังแอปพลิเคชันที่ต้องการได้อย่างรวดเร็ว
    topping_type:
      name: ประเภทท็อปปิ้ง
      description: ระบุส่วนผสมหรือหน้าเคลือบภายนอกหลักที่ใช้กับโดนัท
    tow_hook_type:
      name: แบบขอเกี่ยวลากจูง
      description: ระบุว่าแผ่นรองเข่าสำหรับเล่นกระดานโต้คลื่นมีขอเกี่ยวลากจูงในตัวหรือไม่
        และระบุรูปแบบกลไกของขอเกี่ยวลากจูงนั้น
    tow_point_configuration:
      name: การกำหนดค่าจุดลากจูง
      description: ระบุรูปแบบจุดลากจูง (เดี่ยว คู่ หลายจุด) ที่ท่อลากจูงมีให้สำหรับท่าทางการขี่ที่แตกต่างกัน
    tow_strap_protective_features:
      name: คุณสมบัติการป้องกันของสายลากจูง
      description: สายลากจูงนี้ได้รับการออกแบบโดยคำนึงถึงความปลอดภัยและความทนทานเป็นสำคัญ
    tow_strap_type:
      name: ประเภทของสายลากจูง
      description: ระบุโครงสร้างการใช้งานของสายลากจูง เช่น สายลากจูงแบบคงที่เทียบกับสายลากจูงแบบเคลื่อนไหว
    towable_tube_style:
      name: แบบท่อลากจูง
      description: ระบุลักษณะการออกแบบทั่วไปหรือรูปทรงของท่อลากจูง ซึ่งเป็นตัวกำหนดตำแหน่งของผู้ขี่และประสบการณ์
        Ride
    towed_water_sport_discipline:
      name: กีฬาทางน้ำประเภทลากจูง
      description: ระบุประเภทกิจกรรมทางน้ำหลักที่ถุงมือนี้ได้รับการออกแบบมาเพื่อรองรับ
    towel_features:
      name: คุณสมบัติของผ้าขนหนู
      description: ระบุคุณลักษณะพิเศษหรือสิ่งเพิ่มเติมที่มาพร้อมกับผ้าขนหนู
    towel_style:
      name: สไตล์ผ้าขนหนู
      description: จำแนกประเภทการออกแบบหรือรูปแบบการใช้งานของผ้าเช็ดตัวสำหรับเล่นกอล์ฟ
    toy_airplane_control_type:
      name: เครื่องบินของเล่นแบบควบคุม
      description: ระบุวิธีการควบคุมเครื่องบินของเล่นโดยผู้ใช้
    toy_airplane_features:
      name: คุณสมบัติของเครื่องบินของเล่น
      description: เน้นคุณสมบัติเด่นๆ ในการเล่นของเครื่องบินของเล่นลำนี้
    toy_airplane_flight_capability:
      name: ความสามารถในการบินของเครื่องบินของเล่น
      description: ระบุว่าเครื่องบินของเล่นนั้นออกแบบมาให้บิน/ร่อนได้จริง หรือออกแบบมาเพื่อเล่นบนพื้นดิน/ตั้งโชว์เป็นหลัก
    toy_audio_features:
      name: คุณสมบัติเสียงของของเล่น
      description: แสดงรายการความสามารถด้านเสียงและเอฟเฟ็กต์เสียงที่มีอยู่ในของเล่นชิ้นนี้
    toy_boat_play_features:
      name: คุณสมบัติการเล่นเรือของเล่น
      description: เน้นคุณสมบัติเชิงโต้ตอบที่โดดเด่นของเรือของเล่นสำหรับการสำรวจและการคัดกรอง
    toy_boat_recommended_play_environment:
      name: เรือของเล่น เหมาะสำหรับสภาพแวดล้อมการเล่น
      description: ระบุลักษณะการเล่นของเรือของเล่นเพื่อช่วยให้ผู้ซื้อเข้าใจการใช้งานและความปลอดภัย
        (เช่น อ่างอาบน้ำ vs น้ำเปิด)
    toy_bowling_equipment_included:
      name: รวมอุปกรณ์โบว์ลิ่งของเล่น
      description: ระบุว่าชุดของเล่นโบว์ลิ่งประกอบด้วยชิ้นส่วนใดบ้าง (เช่น พิน ลูกโบว์ลิ่ง
        เลน/แผ่นรอง กระเป๋าสำหรับพกพา)
    toy_car_features:
      name: คุณสมบัติของรถของเล่น
      description: จุดเด่นอยู่ที่ฟีเจอร์การเล่นที่ผสานรวมอยู่ในรถของเล่น (แยกจากระบบขับเคลื่อน)
        เช่น ไฟ เสียง หรือชิ้นส่วนที่เปิดได้
    toy_drawing_tablet_accessories_included:
      name: อุปกรณ์เสริมสำหรับแท็บเล็ตวาดภาพของเล่นที่รวมอยู่ในชุด
      description: อุปกรณ์เสริมเพิ่มเติมที่นอกเหนือจากตัวแท็บเล็ต (เช่น ปากกาสไตลัสสำรอง
        แสตมป์)
    toy_drawing_tablet_erase_method:
      name: วิธีการลบแท็บเล็ตวาดภาพของเล่น
      description: วิธีการล้าง/ลบพื้นผิวสำหรับวาดภาพ
    toy_drawing_tablet_screen_type:
      name: แท็บเล็ตวาดภาพของเล่นแบบหน้าจอ
      description: ประเภทของพื้นผิวสำหรับวาด/แสดงผลที่ใช้ (เช่น แท็บเล็ตเขียน LCD
        เทียบกับแบบแม่เหล็ก)
    toy_drawing_tablet_writing_drawing_instrument:
      name: อุปกรณ์เขียน/วาดภาพสำหรับของเล่น
      description: เครื่องมือหลักที่ใช้ในการวาดบนแท็บเล็ต (แบบสไตลัส)
    toy_figure_sound_feature:
      name: ของเล่นฟิกเกอร์ที่มีเสียง
      description: ระบุว่ารูปสัตว์นั้นส่งเสียงได้หรือไม่ และเป็นเสียงประเภทใด (เช่น
        เสียงคำราม เสียงสัตว์สมจริง)
    toy_game_features:
      name: คุณสมบัติของเล่น/เกม
      description: เน้นคุณลักษณะเด่นด้านการเล่นหรือการสร้างที่เกี่ยวข้องกับของเล่นชายหาดและของเล่นทราย
    toy_gift_basket_items_included:
      name: รายการของเล่นที่รวมอยู่ในตะกร้าของขวัญ
      description: แสดงรายการประเภทของเล่นหลักๆ ที่รวมอยู่ในตะกร้าของขวัญ (เช่น ตุ๊กตา
        ชุดตัวต่อ ปริศนา)
    toy_glider_launch_method:
      name: วิธีการปล่อยเครื่องร่อนของเล่น
      description: ระบุวิธีการปล่อยเครื่องร่อนของเล่น ซึ่งส่งผลต่อรูปแบบการเล่นและความคาดหวังของผู้ซื้อ
    toy_helicopter_control_type:
      name: เฮลิคอปเตอร์ของเล่นแบบบังคับ
      description: วิธีการควบคุม/ใช้งานเฮลิคอปเตอร์ของเล่น (โดยไม่ขึ้นอยู่กับระบบขับเคลื่อน)
        เช่น รีโมทคอนโทรลแบบถือด้วยมือ การควบคุมผ่านแอปพลิเคชัน หรือไม่มีการควบคุม
        (บินอิสระ)
    toy_helicopter_features:
      name: เฮลิคอปเตอร์ของเล่น มีคุณสมบัติ
      description: คุณสมบัติการใช้งานหลักของเฮลิคอปเตอร์ของเล่น (โดยเฉพาะรุ่นบังคับวิทยุ)
        ที่ Impact การใช้งานและคุณค่าในการเล่น
    toy_jacks_set_items_included:
      name: ชุดแจ็คของเล่นรวมอยู่ด้วย
      description: ระบุว่าชุดของเล่นแจ็คประกอบด้วยอุปกรณ์หลักอะไรบ้าง (เช่น ลูกแจ็ค
        ลูกบอล ถุง)
    toy_keyboard_learning_mode:
      name: โหมดการเรียนรู้คีย์บอร์ดของเล่น
      description: ระบุแนวทางการศึกษา/การเรียนรู้ที่รองรับโดยคีย์บอร์ดของเล่น (เช่น
        ปุ่มเรืองแสง เพลงประกอบการเล่น บทเรียนแบบมีผู้แนะนำ การเรียนรู้โดยใช้แอปพลิเคชันช่วย)
    toy_keyboard_sound_theme:
      name: ธีมเสียงคีย์บอร์ดของเล่น
      description: ประเภทของเสียงเครื่องดนตรี/ธีมเสียงสำเร็จรูปที่มีให้เลือก (นอกเหนือจากเสียงเปียโนธรรมดา)
    toy_kitchen_appliances_included:
      name: เครื่องใช้ในครัวของเล่นรวมอยู่ด้วย
      description: ระบุเครื่องใช้ในครัวที่ปรากฏในชุดของเล่น เมื่อผลิตภัณฑ์นั้นเป็นชุดของเล่นเกี่ยวกับเครื่องใช้ไฟฟ้า
        หรือชุดของเล่นที่เน้นเครื่องใช้ไฟฟ้าเป็นหลัก
    toy_kitchen_assembly_requirement:
      name: ข้อกำหนดในการประกอบชุดครัวของเล่น
      description: ระบุว่าจำเป็นต้องประกอบชิ้นส่วนหรือไม่ และความซับซ้อนของการประกอบโดยประมาณ
    toy_kitchen_interactive_features:
      name: ชุดครัวของเล่นแบบโต้ตอบได้
      description: เน้นองค์ประกอบแบบโต้ตอบที่พบได้ทั่วไปในครัวของเล่นและอุปกรณ์เสริมที่เกี่ยวข้อง
    toy_motorcycle_feature_set:
      name: ชุดอุปกรณ์รถจักรยานยนต์ของเล่น
      description: คุณสมบัติหลักในการเล่นของรถจักรยานยนต์ของเล่น (เลือกทั้งหมดที่เกี่ยวข้อง)
    toy_motorcycle_scale:
      name: ของเล่นมอเตอร์ไซค์ ขยายสเกล
      description: อัตราส่วนขยายสเกลสำหรับของเล่น/รถจักรยานยนต์สะสม (เช่น 1:12)
    toy_parachute_launch_method:
      name: วิธีปล่อยร่มชูชีพของเล่น
      description: ของเล่นมีจุดมุ่งหมายให้ Launch/ ขณะบินอย่างไร
    toy_piano_and_keyboard_accessories_included:
      name: รวมเปียโนของเล่นและอุปกรณ์เสริมคีย์บอร์ด
      description: อุปกรณ์เสริมที่มาพร้อมกับเปียโนของเล่นหรือคีย์บอร์ดของเล่น
    toy_playset_assembly_required:
      name: ชุดของเล่นต้องประกอบเอง
      description: ระบุว่าจำเป็นต้องมีการประกอบโดยผู้ใหญ่ก่อนเล่นหรือไม่ (Beyond การประกอบแบบง่ายๆ)
    toy_playset_items_included:
      name: รายการชุดของเล่นรวมอยู่ด้วย
      description: ระบุส่วนประกอบหลักที่รวมอยู่ในชุดของเล่น (สิ่งที่อยู่ในกล่อง)
    toy_safety_certification:
      name: การรับรองความปลอดภัยของของเล่น
      description: มาตรฐาน/เครื่องหมายความปลอดภัยและการปฏิบัติตามข้อกำหนดที่ใช้กับของเล่นในตลาดของนักช้อป
        (เช่น EN 71, ASTM F963, UKCA)
    toy_spaceship_features:
      name: ยานอวกาศของเล่น
      description: ระบุคุณสมบัติเชิงโต้ตอบ/การเล่นทั่วไปที่ติดตั้งอยู่ในยานอวกาศของเล่น
    toy_spaceship_size_class:
      name: ยานอวกาศของเล่นขนาดคลาส
      description: ระบุคลาสขนาดหยาบสำหรับยานอวกาศของเล่นเพื่อช่วยกรองข้อมูลอย่างรวดเร็ว
        โดยแยกจากมิติข้อมูลที่แน่นอน (ความยาว/ความกว้าง/ความสูง) และไม่ใช่อัตราส่วนขยายสเกลของแบบจำลองตัวเลข
        (เช่น 1:72)
    toy_tableware_pieces_included:
      name: เครื่องใช้บนโต๊ะอาหารของเล่นที่รวมอยู่ในชุด
      description: ระบุว่าชุดเครื่องใช้บนโต๊ะอาหารสำหรับเด็กเล่นชุดใดบ้าง (จาน ถ้วย
        ช้อนส้อม อุปกรณ์เสิร์ฟ)
    toy_tool_electronic_features:
      name: ของเล่นเครื่องมือ คุณสมบัติทางอิเล็กทรอนิกส์
      description: อธิบายฟังก์ชันการทำงานแบบโต้ตอบ/อิเล็กทรอนิกส์ของของเล่น (เช่น
        แสงไฟ เสียง การหมุน เป็นต้น)
    toy_tool_set_components_included:
      name: ส่วนประกอบของชุดเครื่องมือของเล่นที่รวมอยู่ในชุด
      description: ระบุรายการเครื่องมือจำลองการเล่นที่รวมอยู่ในแพ็กเกจ (โดยเฉพาะชุดเครื่องมือ)
    toy_train_scale:
      name: มาตราส่วนรถไฟของเล่น
      description: ระบุของเล่น/โมเดลรถไฟขยายสเกลมาตรฐาน (หรือระบบติดตามขนาด) เพื่อให้มั่นใจว่าเข้ากันได้กับรถไฟและแทร็กที่มีอยู่
    toy_train_track_layout_type:
      name: รูปแบบรางรถไฟของเล่น
      description: อธิบายรูปแบบ/รูปทรงของรางรถไฟที่รวมอยู่ในชุดรถไฟหรือชุดรางเสริม
    toy_weapon_gadget_features:
      name: คุณสมบัติของอาวุธและอุปกรณ์ของเล่น
      description: เน้นคุณสมบัติเชิงโต้ตอบและฟังก์ชันการใช้งานทั่วไปที่พบในของเล่นอาวุธและอุปกรณ์สายลับ
    tpms_sensor_frequency_band:
      name: ย่านความถี่ของเซ็นเซอร์ TPMS
      description: แถบความถี่วิทยุที่รองรับโดยอุปกรณ์เสริมที่เกี่ยวข้องกับ TPMS (หากมี)
    track_and_field_discipline:
      name: การติดตามและวินัยในสนาม
      description: ระบุ Event กีฬาหรือชนิดกีฬาที่ผลิตภัณฑ์นั้นมีจุดประสงค์เพื่อใช้
        (เช่น ขว้างลูกเหล็ก กระโดดค้ำถ่อ วิ่งระยะสั้น)
    track_event_specialization:
      name: ความเชี่ยวชาญเฉพาะด้านของ Event ติดตาม
      description: ระบุประเภทของกิจกรรมที่เหมาะสมที่สุดสำหรับรองเท้าสตั๊ดรุ่นนี้
    track_field_event_suitability:
      name: ความเหมาะสมสำหรับการแข่งขันกรีฑา
      description: ระบุอุปกรณ์ติดตามและ Eventภาคสนามที่เฉพาะเจาะจงซึ่งอุปกรณ์ช่วยฝึกอบรมนี้มีไว้สำหรับใช้งาน
    track_set_special_features:
      name: ติดตามตั้งค่าคุณสมบัติพิเศษ
      description: เน้นคุณสมบัติเด่นๆ ของชุดรางรถไฟที่นอกเหนือจากรางและรถพื้นฐาน
    track_surface_compatibility:
      name: ความเข้ากันได้กับพื้นลู่วิ่ง
      description: ระบุพื้นผิวการวิ่งที่รองเท้าวิ่งหรือรองเท้าที่มีปุ่มนั้นได้รับการออกแบบมา
    tracking_aid_type:
      name: ประเภทอุปกรณ์ช่วยติดตาม
      description: ระบุว่าเรือคายัคมีอุปกรณ์ที่ช่วยให้แล่นตรงไปข้างหน้าได้ดีหรือไม่
    traction_pattern_type:
      name: รูปแบบการยึดเกาะ
      description: อธิบายถึงร่องหรือลวดลายบนพื้นผิวหลักที่ช่วยให้แผ่นรองยึดเกาะได้ดี
    trading_card_league:
      name: ลีกการซื้อขาย
      description: ระบุลีกกีฬาที่เกี่ยวข้องกับชุดโปรแกรมหรือยังคงบังคับ (ถ้ามี)
    trailer_construction:
      name: การสร้างรถพ่วง
      description: บ่งบอกวัสดุประกอบหลักของโครงสร้างและตัวถังของรถพ่วง (เช่น อลูมิเนียม,
        เหล็ก หรือโครงสร้างแบบผสม)
    trailer_coupler_size:
      name: ขนาดข้อต่อรถพ่วง
      description: ระบุข้อต่อพ่วงบางส่วนที่จำเป็นสำหรับการลากจูง
    trailer_hitch_mounting_location_method:
      name: ตำแหน่ง/วิธีการติดตั้งขอเกี่ยวลากรถพ่วง
      description: ระบุตำแหน่งและวิธีติดตั้งชุดลากพ่วงเข้ากับรถ (เช่น ขอเกี่ยวท้ายรถ
        ขอเกี่ยวหน้ารถ ติดกับโครงสร้าง ติดกับกันชน ติดกับกระบะท้ายรถ)
    trailer_light_function:
      name: ฟังก์ชันของไฟท้ายรถพ่วง
      description: ฟังก์ชันหลักหรือตำแหน่งของไฟท้ายรถพ่วง
    trailer_suspension_type:
      name: ประเภทระบบกันสะเทือนของรถพ่วง
      description: ระบุประเภทของระบบกันสะเทือนที่ใช้ในรถพ่วงจักรยาน เช่น สปริงขดหรือสปริงแผ่น
        เพื่อเพิ่มความสะดวกสบายในการขับขี่และการปกป้องสินค้า
    trailer_wiring_circuit:
      name: วงจรสายไฟรถพ่วง
      description: แสดงรายการวงจรไฟส่องสว่าง เบรก และวงจร/สัญญาณเสริมต่างๆ ที่ส่งผ่านโดยระบบสายไฟของรถพ่วง
        (เช่น สายไฟเลี้ยง/สายดิน และสายสัญญาณต่างๆ ที่มีอยู่)
    trailer_wiring_connector_type:
      name: ขั้วต่อสายไฟรถพ่วง
      description: ระบุมาตรฐานปลั๊กด้านตัวรถพ่วง/ด้านตัวรถที่ใช้สำหรับชุดสายไฟและอะแดปเตอร์ของรถพ่วง
    train_whistle_intended_use:
      name: วัตถุประสงค์การใช้งานของหวีดรถไฟ
      description: บริบทการใช้งานหลักที่ตั้งใจไว้สำหรับนกหวีด
    train_whistle_sound_character:
      name: ลักษณะเสียงหวีดรถไฟ
      description: อธิบายลักษณะโทนเสียงที่รับรู้ได้ของเสียงนกหวีด (คุณภาพเสียง)
    trainer_mounting_type:
      name: ประเภทการติดตั้งเทรนเนอร์จักรยาน
      description: อธิบายวิธีการเชื่อมต่อจักรยานกับเครื่องฝึกปั่น (เช่น แบบล้อสัมผัส
        หรือแบบขับตรง)
    training_dummy_shape:
      name: รูปทรงหุ่นฝึกซ้อม
      description: ระบุการออกแบบโดยรวมหรือรูปทรงของหุ่นฝึก ซึ่งส่งผลต่อการจับยึดของสุนัขและความสมจริงในการฝึก
    training_focus:
      name: จุดเน้นของการฝึกอบรม
      description: อธิบายถึงทักษะหลักที่อุปกรณ์ช่วยฝึกมุ่งเป้าไป (เช่น ปฏิกิริยาตอบสนอง
        การเคลื่อนไหวเท้า การประสานงานระหว่างมือและตา)
    training_focus_area:
      name: ขอบเขตการฝึกอบรม
      description: ระบุทักษะหลักในการเล่นลาครอสที่อุปกรณ์ช่วยเล่นนี้ออกแบบมาเพื่อพัฒนา
    training_objective:
      name: วัตถุประสงค์การฝึกอบรม
      description: ระบุทักษะหรือเทคนิคหลักที่ผลิตภัณฑ์ได้รับการออกแบบมาเพื่อพัฒนา
    training_surface_suitability:
      name: ความเหมาะสมของพื้นผิวการฝึกซ้อม
      description: ระบุว่าสามารถใช้เครื่องฝึกซ้อมบนพื้นผิวใดได้บ้าง
    training_surface_usage:
      name: การใช้งานพื้นผิวฝึกซ้อม
      description: ระบุกิจกรรมหลักที่พื้นผิวการฝึก ความช่วยเหลือ โดยแยกแผงน้ำแข็งสังเคราะห์ที่เล่นสเก็ตได้ออกจากเสื่อบนพื้นแห้งหรือเสื่อมัลติสปอร์ต
    training_usage_type:
      name: ประเภทการใช้งานการฝึกอบรม
      description: ระบุช่วงเวลาการใช้งานหลักหรือ Context เหมาะสมสำหรับกางเกงฝึกหัด
        เช่น การฝึกหัดในเวลากลางวันหรือกลางคืน
    trampoline_enclosure_type:
      name: ประเภทของรั้วกั้นแทรมโพลีน
      description: ระบุรูปแบบการติดตั้งรั้วรอบแทรมโพลีน รวมถึงวิธีการและตำแหน่งการติดตั้งตาข่าย
    trampoline_safety_certifications:
      name: ใบรับรองความปลอดภัยของแทรมโพลีน
      description: แสดงว่าผลิตภัณฑ์อ้างอิงการปฏิบัติตามมาตรฐานความปลอดภัย/การรับรองใดที่เกี่ยวข้องกับแทรมโพลีน
    transfer_application_method:
      name: วิธีการสกรีนแบบทรานเฟอร์
      description: ระบุวิธีการติดสติกเกอร์ลงบนผ้า (เช่น การรีดด้วยเตารีด หรือ การใช้เครื่องรีดความร้อน)
    transfer_method:
      name: วิธีนี้
      description: ระบุวิธีการถ่ายทอดลวดลายลงบนผ้า
    transfer_peel_temperature:
      name: อุณหภูมิเปลือก
      description: ระบุอุณหภูมิที่แนะนำ (ร้อน อุ่น หรือเย็น) ที่ควรนำแผ่นรองออกหลังจากกดเสร็จแล้ว
    transmission_cooler_construction:
      name: โครงสร้างตัวระบายความร้อนเกียร์
      description: ระบุแบบการออกแบบโครงสร้างของแกนระบายความร้อนเกียร์
    transmission_fluid_specification:
      name: ข้อกำหนดของน้ำมันเกียร์
      description: มาตรฐาน OEM/ข้อกำหนดที่น้ำมันเกียร์ตรงตาม (เช่น ตระกูล Dexron/Mercon,
        ATF+4, JWS 3309)
    transmission_mount_bushing_material:
      name: วัสดุบูชยึดเกียร์
      description: ระบุวัสดุอีลาสโตเมอร์หรือวัสดุฉนวนที่ใช้ในบูช/ฉนวนยึด (ส่วนประกอบลดแรงสั่นสะเทือน)
    transmission_mount_type:
      name: ประเภทการติดตั้งระบบส่งกำลัง
      description: ระบุโครงสร้าง/การออกแบบของแท่นยึดเกียร์ (เช่น แบบไฮดรอลิกเทียบกับแบบแข็ง)
        เพื่อช่วยในการพิจารณาความพอดี คุณลักษณะด้านเสียงและการสั่นสะเทือน และการใช้งานที่ต้องการ
    transparency_level:
      name: ระดับความโปร่งใส
      description: อธิบายว่าผนังถังขยะมีความโปร่งใส ช่วยให้ผู้ซื้อตัดสินใจได้ระหว่างการมองเห็นที่ชัดเจนกับการจัดเก็บที่ปกปิด
    transport_case_type:
      name: ประเภทกล่องขนส่ง
      description: จำแนกประเภทโครงสร้าง/ความแข็งแรงของโซลูชันการขนส่ง ซึ่งสะท้อนถึงระดับการป้องกันและวิธีการบรรจุหีบห่อ
    transposition_modes:
      name: โหมดการสลับตำแหน่ง
      description: ระบุ Mode การขนย้าย/ระดับเสียงคอนเสิร์ตของจูนเนอร์ ความช่วยเหลือ
        (เช่น ระดับเสียงคอนเสิร์ตและคีย์การขนย้าย เช่น B♭ หรือ E♭)
    trap_design:
      name: การออกแบบกับดัก
      description: ระบุรูปแบบโครงสร้างหรือกลไกของกับดัก ซึ่งเป็นตัวกำหนดวิธีการติดตั้งและชนิดของสัตว์หรือสภาพแวดล้อมที่เหมาะสมที่สุด
    trap_spring_configuration:
      name: การกำหนดค่าสปริงดักจับ
      description: ระบุจำนวนหรือการจัดเรียงของสปริงที่ขับเคลื่อนกับดัก ซึ่งส่งผลต่อความแข็งแรงและความถูกต้องตามกฎหมาย
    travel_bassinet_accessories_included:
      name: รวมอุปกรณ์เสริมสำหรับเปลพกพา
      description: แสดงรายการสิ่งของเพิ่มเติมที่ให้มาพร้อมกับเปลพกพา
    travel_spinning_wheel_assembly_required:
      name: ต้องประกอบเครื่องปั่นด้ายสำหรับเดินทาง
      description: จำเป็นต้องประกอบ/ติดตั้งอุปกรณ์เพิ่มเติมหรือไม่ นอกเหนือจากการกางออก
        (เช่น การติดใบพัด การปรับความตึง การเหยียบแป้นเหยียบ) ก่อนใช้งาน
    travel_spinning_wheel_portability_features:
      name: คุณสมบัติการพกพาของเครื่องปั่นด้ายสำหรับเดินทาง
      description: องค์ประกอบการออกแบบที่เกี่ยวข้องกับการพกพาสำหรับล้อปั่นท่องเที่ยว
        เช่น โครงสร้างแบบพับได้ และวิธีการขนส่งที่รวมอยู่ด้วย
    travel_trailer_appliances_fuel_type:
      name: ประเภทเชื้อเพลิงของอุปกรณ์รถพ่วงสำหรับเดินทาง
      description: เชื้อเพลิงหลักที่ใช้สำหรับอุปกรณ์/ระบบทำความร้อน/การทำอาหารบนรถ
        (ไม่ใช่รถลากจูง)
    travel_trailer_holding_tank_type:
      name: ถังเก็บน้ำเสียแบบรถพ่วงสำหรับเดินทาง
      description: ระบุว่ามีถังเก็บของเสียประเภทใดบ้างในรถบ้าน (เลือกทั้งหมดที่เกี่ยวข้อง)
    travel_trailer_power_hookup_shore_power:
      name: จุดเชื่อมต่อไฟสำหรับรถพ่วง (ไฟจากฝั่ง)
      description: มาตรฐานการเชื่อมต่อไฟฟ้าที่รองรับสำหรับการเชื่อมต่อกับแหล่งจ่ายไฟบนฝั่ง
    tread_pattern_type:
      name: ประเภทของลายดอกยาง
      description: จำแนกประเภทการออกแบบดอกยางโดยรวม เช่น ดอกยางเรียบ ดอกยางกึ่งเรียบ
        หรือดอกยางเป็นปุ่ม ซึ่งส่งผลต่อแรงยึดเกาะ แรงต้านการหมุน และพื้นผิวที่ต้องการใช้งาน
    treadmill_key_type:
      name: ประเภทปุ่มลู่วิ่ง
      description: อธิบายลักษณะทางกายภาพหรือกลไกการทำงาน/การเชื่อมต่อของกุญแจนิรภัย
        (เช่น แบบแม่เหล็กทรงกลม แบบมีแท่งพลาสติก แบบหนีบ)
    treadmill_part_type:
      name: ประเภทชิ้นส่วนลู่วิ่ง
      description: ระบุส่วนประกอบเฉพาะของลู่วิ่งไฟฟ้าที่สินค้าตั้งใจจะเปลี่ยน เพื่อให้นักช้อปสามารถยืนยันความพอดีได้อย่างรวดเร็ว
        (เช่น สายพานกับมอเตอร์)
    treadmill_position:
      name: ตำแหน่งลู่วิ่ง
      description: ระบุตำแหน่งการติดตั้งของชิ้นส่วนบนลู่วิ่ง (ด้านหน้า ด้านหลัง ด้านบน
        ด้านล่าง หรือตรงกลาง)
    triangle_striker_material:
      name: วัสดุสำหรับตีรูปสามเหลี่ยม
      description: วัสดุของไม้ตี/ไม้ตีที่ให้มาด้วย
    trigger_input_connector:
      name: ขั้วต่ออินพุตทริกเกอร์
      description: ระบุมาตรฐานขั้วต่อทางกายภาพที่ใช้สำหรับอินพุตทริกเกอร์
    trigger_input_connector_type:
      name: ประเภทขั้วต่ออินพุตทริกเกอร์
      description: ระบุประเภทขั้วต่อทางกายภาพที่ใช้สำหรับอินพุตทริกเกอร์
    trigger_input_zone_support:
      name: สำหรับอินพุตโซน ความช่วยเหลือ
      description: ระบุว่าอินพุตทริกเกอร์รองรับทริกเกอร์แบบโซนเดียวและ/หรือสองโซน
        (เช่น หัว/ขอบ) และการใช้งานแบบหลายโซนที่คล้ายกันหรือไม่
    trim_application_method:
      name: วิธีการตัดแต่ง
      description: ระบุวิธีการติดวัสดุตกแต่งเข้ากับชิ้นงาน (เช่น เย็บติด, รีดติด,
        กาว)
    trim_detail:
      name: รายละเอียดการตกแต่ง
      description: ระบุขอบหรือส่วนตกแต่งที่โดดเด่นบนเสื้อผ้า (เช่น พู่ประดับ ขอบระบาย
        ขอบลูกไม้)
    trim_elasticity:
      name: ความยืดหยุ่นของการตกแต่ง
      description: ระบุว่าขอบริบบิ้น ric-rac มีความยืดหยุ่นสำหรับใช้กับเสื้อผ้าถักหรือชุดออกกำลังกายหรือไม่
    trim_finish:
      name: การตกแต่งขอบ
      description: การตกแต่งพื้นผิวหรือการเคลือบที่ใช้กับวัสดุตกแต่งขอบ (เช่น โลหะ
        กากเพชร สะท้อนแสง)
    trim_tilt_type:
      name: ประเภทปรับระดับและเอียง
      description: ไม่ว่าและอย่างไรมอเตอร์ ความช่วยเหลือ การปรับทริม/เอียง
    trolleybus_power_supply_type:
      name: ประเภทแหล่งจ่ายไฟรถราง
      description: ระบุวิธีการที่รถรางไฟฟ้าได้รับพลังงานขับเคลื่อนจากเครือข่ายไฟฟ้า
    truck_bed_body_type:
      name: ประเภทกระบะ/ตัวถังรถบรรทุก
      description: การจัดวางกระบะบรรทุกหรือตัวถังด้านหลังห้องโดยสาร
    truck_bed_length_class:
      name: คลาสความยาวกระบะรถบรรทุก
      description: ระบุประเภทความยาวของกระบะรถบรรทุกที่ตาข่ายบรรทุกสินค้าได้รับการออกแบบมาให้ใช้งานได้
        (โดยทั่วไปจะเรียกว่า กระบะสั้น/มาตรฐาน/ยาว)
    truck_mounting_hole_pattern:
      name: รูปแบบรูยึดสำหรับรถบรรทุก
      description: ระบุรูปแบบรูที่ใช้สำหรับติดตั้งทรัคเข้ากับแผ่นสเก็ตบอร์ด (เช่น
        แบบเก่า แบบใหม่ แบบอเนกประสงค์)
    truck_mounting_style:
      name: รูปแบบการติดตั้งทรัค
      description: วิธีการติดตั้งทรัคเข้ากับแผ่นสเก็ตบอร์ด (แบบติดด้านบน แบบดรอป ฯลฯ)
        ซึ่งมีผลต่อความสูงและเสถียรภาพในการขี่
    truck_profile:
      name: รายละเอียดรถบรรทุก
      description: ระบุการจำแนกความสูงของแกนล้อส Ride ตบอร์ดเมื่อเทียบกับแผ่นบอร์ด
        ซึ่งส่งผลต่อการทรงตัวของล้อและสัมผัสของบอร์ด
    trumpet_bell_material:
      name: วัสดุสำหรับทำปากแตร
      description: วัสดุที่ใช้สำหรับส่วนปากลำโพง (บางครั้งอาจแตกต่างจากส่วนอื่นๆ ของเครื่องดนตรี)
    trumpet_leadpipe_material:
      name: วัสดุที่ใช้ทำท่อลมของทรัมเป็ต
      description: วัสดุหรือ ห่วงท่อที่ใช้สำหรับท่อนำ (ท่อหลักจากปากเป่าไปยังวาล์ว)
    trundle_mechanism:
      name: กลไกล้อเลื่อน
      description: อธิบายวิธีการติดตั้งส่วนประกอบเตียงเสริมจากโครงหลัก
    trunk_part_type:
      name: ประเภทส่วนท้ายรถ
      description: ระบุว่าชิ้นส่วนตัวถังที่เกี่ยวข้องกับห้องเก็บสัมภาระใดที่กำลังจำหน่าย
        (เช่น ฝากระโปรงท้าย บานพับ ตัวล็อค)
    tuba_leadpipe_material:
      name: วัสดุท่อเป่าทูบา
      description: ระบุวัสดุที่ใช้สำหรับส่วนท่อเป่า (ท่อปากเป่า) ของทูบา
    tube_base_type:
      name: ประเภทฐานหลอด
      description: ระบุกลุ่มฐาน/ซ็อกเก็ตของท่อที่ใช้สำหรับความพอดีทางกายภาพ/ทางไฟฟ้า
        (เช่น Octal, Noval/9-PIN แล้ว)
    tube_matching_grade:
      name: เกรดการจับคู่ท่อ
      description: ระบุว่าหลอดทดลองได้รับการทดสอบ/จับคู่เป็นชุดหรือไม่ และประเภทของการจับคู่ที่ให้มา
    tube_weight_category:
      name: ประเภทน้ำหนักของท่อ
      description: จำแนกประเภทท่อตามโครงสร้าง/น้ำหนัก (เช่น เบามาก มาตรฐาน อากรหนัก)
        เพื่อการเปรียบเทียบความทนทานเทียบกับประสิทธิภาพอย่างรวดเร็ว
    tubeless_compatible:
      name: รองรับระบบไร้ท่อ
      description: ระบุว่าล้อได้รับการออกแบบให้ใช้งานโดยไม่ต้องใช้ยางในเมื่อใช้ร่วมกับยางแบบไม่ใช้ยางในหรือไม่
    tubing_shape:
      name: รูปทรงท่อ
      description: ระบุ Shapes หน้าตัดของท่อ ความช่วยเหลือ ของขาตั้ง
    tubular_construction_type:
      name: ประเภทโครงสร้างแบบท่อ
      description: ระบุรูปแบบการผลิตยางจักรยานแบบท่อ โดยแยกความแตกต่างระหว่างยางแบบท่อที่ใช้กาวแบบดั้งเดิมและแบบใหม่ๆ
    tulip_type_flower_form:
      name: ดอกทิวลิป (รูปทรงดอกไม้)
      description: ระบุประเภททางพืชสวน/รูปทรงของดอกทิวลิปในช่อ (เช่น ดอกเดี่ยว ดอกซ้อน
        ดอกนกแก้ว)
    tuner_input_method:
      name: วิธีการป้อนข้อมูลจูนเนอร์
      description: ระบุวิธีการที่จูนเนอร์ตรวจจับระดับเสียง (ไมโครโฟน, เซ็นเซอร์การสั่นสะเทือน/การตัดสัญญาณ,
        อินพุตสายเคเบิลเครื่องดนตรี, ตัวรับสัญญาณแบบสัมผัส)
    tuning_mechanism:
      name: กลไกการปรับแต่ง
      description: วิธีการปรับความตึง/ตั้งสายหนังกลองบองโก้
    tuning_system:
      name: ระบบปรับแต่ง
      description: วิธีการตั้งเสียงกลองทรงถ้วย หรือว่ามันสามารถปรับเสียงได้หรือไม่
    turn_signal_lens_color:
      name: สีของเลนส์ไฟเลี้ยว
      description: สีของเลนส์/ฝาครอบที่มองเห็นได้บนตัวเรือนไฟเลี้ยว (ไม่ใช่สีของแสงที่เปล่งออกมา)
    turn_signal_lighting_style:
      name: สไตล์ไฟเลี้ยว
      description: รูปแบบ/แอนิเมชั่นการแสดงผลทางภาพที่ใช้โดยสัญญาณไฟเลี้ยว
    turnip_and_rutabaga_variety:
      name: พันธุ์หัวผักกาดและรูตาบากา
      description: บ่งบอกพันธุ์ปลูกเฉพาะ/สายพันธุ์ของหัวผักกาดหรือหัวผักกาดรูตาบากา
    tweeter_crossover_type:
      name: ทวีตเตอร์ครอสโอเวอร์ชนิด
      description: ระบุประเภทของครอสโอเวอร์ความถี่สูงและ/หรือส่วนประกอบป้องกันที่รวมอยู่กับทวีตเตอร์
        หากมี
    tweeter_material:
      name: เนื้อหาทวีตเตอร์
      description: วัสดุหลักของไดอะแฟรม/โดมของทวีตเตอร์
    tweeter_mount_type:
      name: ประเภทการติดตั้งทวีตเตอร์
      description: ระบุวิธีการติดตั้งทวีตเตอร์ในรถยนต์ (วิธีการติดตั้ง/ฮาร์ดแวร์)
    twill_direction:
      name: ทิศทางการทอ
      description: แสดงทิศทางเส้นใยทวิลล์ของการทอผ้ายีนส์
    twist_direction:
      name: ทิศทางการบิด
      description: ทิศทางการบิดเกลียวของเส้นด้าย (S-twist หรือ Z-twist)
    u_joint_series_size:
      name: ข้อต่อยูซีรีส์/ขนาด
      description: ระบุซีรี่ส์หรือขนาดมาตรฐานของข้อต่อยูที่ใช้ (เช่น ซีรี่ส์ 1310)
    uilleann_pipes_bag_material:
      name: วัสดุทำถุงสำหรับปี่อูเลียน
      description: วัสดุที่ใช้ทำส่วนประกอบของถุงลมนิรภัย (ถ้ามี) ซึ่งส่งผลต่อความรู้สึกในการใช้งาน
        ความทนทาน และการบำรุงรักษา
    uilleann_pipes_handedness:
      name: ความถนัดมือของปี่ไอริช
      description: ระบุว่าชุดได้รับการกำหนดค่าสำหรับผู้เล่นถนัดขวาหรือถนัดซ้าย การเล่นแบบเอาต์
    uilleann_pipes_set_configuration:
      name: รูปแบบการจัดชุดองค์ประกอบของปี่ไอริช
      description: ระบุรูปแบบการจัดเรียงท่ออูเลียนที่รวมอยู่ โดยพิจารณาจากการมีอยู่ของตัวควบคุมเสียงและท่อเสียงโดรน
    uk_childrens_shoe_size:
      name: ขนาดรองเท้าเด็กแบบอังกฤษ
      description: ระบุขนาดรองเท้าเด็กแบบอังกฤษ เช่น 4 หรือ 4 แบบกว้าง
    uk_clothing_size:
      name: ขนาดเสื้อผ้าแบบอังกฤษ
      description: ระบุขนาดเสื้อผ้าแบบอังกฤษ เช่น 12 หรือ 18
    uk_cup_size:
      name: ขนาดคัพแบบอังกฤษ
      description: ระบุขนาดคัพของชุดชั้นในแบบอังกฤษ เช่น C หรือ FF
    uk_mens_shoe_size:
      name: ขนาดรองเท้าผู้ชายแบบอังกฤษ
      description: ระบุขนาดรองเท้าผู้ชายแบบอังกฤษ เช่น 9 หรือ 9 แบบกว้าง
    uk_womens_shoe_size:
      name: ขนาดรองเท้าผู้หญิงแบบอังกฤษ
      description: ระบุขนาดรองเท้าสตรีแบบอังกฤษ เช่น 6 หรือ 6 แบบกว้าง
    ukulele_back_and_sides_wood:
      name: ไม้ด้านหลังและด้านข้างของอูคูเลเล่
      description: ระบุชนิดของไม้/วัสดุที่ใช้ทำด้านหลังและด้านข้างของอูคูเลเล่
    ukulele_body_cutaway:
      name: ภาพตัดขวางตัวเครื่องอูคูเลเล
      description: ระบุว่าตัวอูคูเลเล่คอนเสิร์ตมีส่วนเว้าเพื่อช่วยให้เข้าถึงเฟร็ตด้านบนได้ง่ายขึ้นหรือไม่
    ukulele_body_shape:
      name: รูปทรงของอูคูเลเล่
      description: รูปทรง/Shapes โดยทั่วไปของอูคูเลเล่
    ukulele_bridge_material:
      name: วัสดุสำหรับสะพานอูคูเลเล่
      description: ระบุวัสดุที่ใช้สำหรับสะพานสายอูคูเลเล่
    ukulele_construction_type:
      name: ประเภทโครงสร้างของอูคูเลเล่
      description: วิธีการสร้างส่วนบน/หลัง/ด้านข้างของเครื่องดนตรี (แบบชิ้นเดียวหรือแบบหลายชั้น)
    ukulele_electronics_configuration:
      name: Ukulele การออกแบบอิเล็คทรอนิกส์
      description: ระบุว่าอูคูเลเล่เป็นแบบอะคูสติกเท่านั้นหรือมีการรับเรื่องผลิตภัณฑ์อิเล็กทรอนิกส์
        (การรับและ/หรือปรีแอมป์) สำหรับการขยายเสียงหรือไม่
    ukulele_string_re_entrant_tuning:
      name: ระบบการจูนของอูคูเลเล่
      description: ไม่ว่าอูคูเลเล่จะถูกตั้งค่าด้วยการปรับจูนผู้เข้าใหม่ (high-G) เทียบกับ
        linear/low-G หรือไม่ ห้างสรรพสินค้าทั่วไปมีลักษณะและส่งผลต่อเสียง
    ukulele_top_wood:
      name: ไม้หน้าอูคูเลเล่
      description: ระบุชนิดของไม้/วัสดุที่ใช้ทำแผ่นหน้า/แผ่นเสียงของอูคูเลเล่
    ukulele_tuner_mechanism:
      name: กลไกปรับสายอูคูเลเล่
      description: ระบุรูปแบบ/กลไกการปรับสายที่ใช้กับอูคูเลเล่
    ukulele_tuner_type:
      name: ประเภทจูนเนอร์อูคูเลเล่
      description: รูปแบบของลูกบิดปรับสายที่ใช้กับหัวกีตาร์อูคูเลเล่
    ukulele_tuning:
      name: การตั้งสายอูคูเลเล่
      description: ระบุค่าการตั้งสายมาตรฐานที่ต้องการสำหรับอูคูเลเล่ขนาดพกพา
    ultralight_aircraft_wing_configuration:
      name: การกำหนดค่าปีกของเครื่องบินเบาพิเศษ
      description: ตำแหน่งการวางและการกำหนดค่าของปีกหลักสัมพันธ์กับลำตัว/โครงสร้าง
    under_bed_features:
      name: คุณสมบัติใต้เตียง
      description: ระบุองค์ประกอบการทำงานหลักที่อยู่ใต้ฐานเตียง
    underfoot_strap_type:
      name: ประเภทสายรัดใต้ฝ่าเท้า
      description: ระบุวัสดุหรือการออกแบบที่ใช้สำหรับสายรัดที่อยู่ใต้รองเท้า
    underwear_fit:
      name: กางเกงชั้นในพอดีตัว
      description: ระบุลักษณะทรงโดยรวมของกางเกงบ็อกเซอร์ (เช่น ทรงเข้ารูป ทรงหลวม
        หรือทรงรัดรูป)
    underwear_pieces_included:
      name: รายการชุดชั้นในที่รวมอยู่ในชุด
      description: ระบุว่ามีการจัดหาเสื้อผ้าชิ้นใดบ้าง (บน ล่าง ทั้งสองชุด หรือชุดยูเนี่ยนชิ้นเดียว)
        เพื่อให้รู้ว่าพวกเขากำลังซื้อชุดครบชุดหรือบุคคลธรรมดารายการ
    uniform_pieces_included:
      name: ประกอบด้วยชิ้นส่วนเครื่องแบบ
      description: ระบุส่วนประกอบของเสื้อผ้าที่จัดส่ง (เช่น เสื้อเชิ้ต กางเกง เสื้อกั๊ก)
        เพื่อชี้แจงรายละเอียดของสินค้าในแต่ละชุด สำหรับการสั่งซื้อจำนวนมากหรือเป็นเซ็ต
    uniform_role:
      name: บทบาทเครื่องแบบ
      description: ระบุผู้ประกอบวิชาชีพหรือหน่วยงานที่เครื่องแบบรายการมีไว้สำหรับ
        (เช่น ตำรวจ นายอำเภอ EMS)
    update_method:
      name: วิธีการอัปเดต
      description: วิธีส่งมอบเฟิร์มแวร์/การอัปเดตการอัปเดตสำหรับเครื่องสแกนโค้ด
    upholstery_fabric_backing_type:
      name: ประเภทวัสดุเสริมด้านหลังผ้าหุ้มเฟอร์นิเจอร์
      description: ระบุวัสดุรอง/เคลือบผิวบนผ้าหุ้มเบาะ ซึ่งมีผลต่อการติดตั้งและสัมผัส
    upholstery_fabric_water_resistance:
      name: คุณสมบัติกันน้ำของผ้าหุ้มเบาะ
      description: แสดงคุณสมบัติการกันน้ำและการหกเลอะเทอะสำหรับพื้นผิวผ้าหุ้มเฟอร์นิเจอร์
    upper_material:
      name: วัสดุส่วนบน
      description: ระบุวัสดุหลักที่ใช้ในส่วนบนของรองเท้าผ้าใบ ซึ่งส่งผลต่อการระบายอากาศ
        ความทนทาน และความสวยงาม
    upright_bass_pickup_system:
      name: ระบบการรับเสียงเบสแบบตรง
      description: ระบุว่าเบสตั้งพื้นมีระบบปรีแอมป์/พรีแอมป์ติดตั้งไว้เพื่อใช้ในการขยายเสียงหรือไม่
    upright_piano_power_source:
      name: แหล่งจ่ายไฟสำหรับเปียโนตั้งตรง
      description: วิธีการจ่ายพลังงานให้กับเปียโนตั้งตรง ซึ่งรวมถึงเปียโนตั้งตรงแบบอะคูสติกที่ไม่ใช้ไฟฟ้า
        รวมถึงเปียโนตั้งตรงแบบเงียบ/ไฮบริดที่ต้องใช้ไฟฟ้า
    urination_device_features:
      name: คุณสมบัติของอุปกรณ์ปัสสาวะ
      description: เน้นคุณลักษณะการออกแบบพิเศษที่ช่วยเพิ่มฟังก์ชันการใช้งานหรือความสะดวกสบาย
    us_childrens_shoe_size:
      name: ขนาดรองเท้าเด็กของสหรัฐอเมริกา
      description: ระบุขนาดรองเท้าเด็กแบบสหรัฐอเมริกา เช่น 5 หรือ 5 แบบกว้าง
    us_clothing_size:
      name: ขนาดเสื้อผ้าแบบสหรัฐอเมริกา
      description: ระบุสหรัฐอเมริกาเป็นสิ่งที่เสื้อผ้า เช่น 8 หรือ 14
    us_cup_size:
      name: ขนาดคัพแบบสหรัฐอเมริกา
      description: ระบุชุดชั้นในของสหรัฐอเมริกาสำหรับถ้วย เช่น C หรือ DDD
    us_mens_shoe_size:
      name: ขนาดรองเท้าผู้ชายแบบสหรัฐอเมริกา
      description: ระบุขนาดของรองเท้าบุรุษ US เช่น 10 หรือ 10 Wide
    us_ring_size:
      name: ขนาดแหวนของสหรัฐอเมริกา
      description: ระบุขนาดแหวนแบบอเมริกัน เช่น 7 หรือ 9.5
    us_womens_shoe_size:
      name: ขนาดรองเท้าผู้หญิงแบบสหรัฐอเมริกา
      description: ระบุขนาดของรองเท้าของผู้หญิงในสหรัฐฯ เช่น 8 หรือ 8 Wide
    usage:
      name: การใช้งาน
      description: อธิบายวัตถุประสงค์การใช้งาน เคส/การปรับแต่งของเพลาลูกเบี้ยว
    usda_honey_grade:
      name: น้ำผึ้งเกรด USDA
      description: ระบุเกรดมาตรฐานที่กระทรวงเกษตรสหรัฐฯ (USDA) กำหนดให้กับน้ำผึ้ง
    user_control_method:
      name: วิธีการควบคุมโดยผู้ใช้
      description: ระบุวิธีการที่ผู้ใช้มีปฏิสัมพันธ์กับเครื่อง (เช่น แผงควบคุมบนตัวเครื่อง
        รีโมท แอปพลิเคชัน การสั่งงานด้วยเสียง) ซึ่งเป็นข้อมูลที่ใช้ในการพิจารณาถึงความสะดวกในการใช้งาน
    vacuum_boost_reference_port:
      name: พอร์ตอ้างอิงสุญญากาศ/Boost
      description: ระบุว่าตัวควบคุมแรงดันมีพอร์ตอ้างอิงสำหรับแรงดันสุญญากาศ/Boost
        หรือไม่ และเป็นพอร์ตแบบใด
    valve_base_shape:
      name: รูปทรงฐานวาล์ว
      description: ระบุรูปทรงเรขาคณิตของส่วนต่อประสานระหว่างฐานวาล์วและขอบ (กลม ทรงกรวย
        ช่องด้านข้าง รูปตัว T เป็นต้น) ซึ่งส่งผลต่อการซีลและความเข้ากันได้ของแผ่นโฟม
    valve_core_type:
      name: ประเภทไส้วาล์ว
      description: ระบุว่าแกนของวาล์วสามารถถอดออกได้ ติดตั้งถาวร หรือไม่มีแกน ซึ่งข้อมูลนี้มีผลต่อขั้นตอนการบำรุงรักษาและความเข้ากันได้กับเครื่องมือฉีดสารซีล
    valve_cover_gasket_material:
      name: วัสดุปะเก็นฝาครอบวาล์ว
      description: ระบุวัสดุของปะเก็นฝาครอบวาล์วที่มาพร้อมกับฝาครอบวาล์ว หรือวัสดุปะเก็นที่แนะนำเมื่อจำหน่ายโดยไม่มีปะเก็น
        (ถ้ามี)
    valve_cover_material:
      name: วัสดุที่ใช้ทำฝาครอบวาล์ว
      description: วัสดุหลักที่ใช้ในการผลิตฝาครอบวาล์ว
    valve_design:
      name: การออกแบบวาล์ว
      description: ระบุโครงสร้าง/การออกแบบของวาล์วเครื่องยนต์
    valve_guard_coverage_area:
      name: พื้นที่ครอบคลุมของตัวป้องกันวาล์ว
      description: ระบุว่าตัวป้องกันนี้ปกป้องส่วนใดของวาล์ว
    valvetrain_configuration:
      name: รูปแบบขบวนเปิดปิดลิ้น
      description: ระบุลูกเบี้ยว/วาล์ว ไลเอาต์.
    varnish_formulation_base:
      name: ฐานสูตรน้ำยาเคลือบเงา
      description: ระบุสูตร/ส่วนประกอบทางเคมีหลักของน้ำยาเคลือบเงาสำหรับเครื่องดนตรี
        ซึ่งส่งผลต่อลักษณะที่ปรากฏ ความสามารถในการลอกออก และความเข้ากันได้กับสีเคลือบที่มีอยู่เดิม
    varnish_transparency_tint:
      name: ความโปร่งใส/สีของน้ำยาเคลือบเงา
      description: อธิบายว่าน้ำยาเคลือบเงาเป็นแบบธรรมดาหรือแบบมีสี และหากมีสี ให้ระบุกลุ่มสีโดยทั่วไป
    vegetable_matter_vm_content:
      name: เนื้อหาเรื่องผัก (VM)
      description: ปริมาณเศษพืช/สิ่งเจือปนที่พบในเส้นใย
    vegetable_preparation_style:
      name: สไตล์การเตรียมผัก
      description: อธิบายวิธีการจัดวาง หั่น หรือเตรียมผักก่อนการปรุง (เช่น ทั้งชิ้น
        หั่นเต๋า หั่นเป็นช่อ)
    vehicle_audio_dsp_form_factor:
      name: รูปแบบ DSP สำหรับระบบเสียงในรถยนต์
      description: ระบุรูปแบบทางกายภาพ/การติดตั้งของหน่วยประมวลผลสัญญาณดิจิทัล (DSP)
    vehicle_battery_charger_features:
      name: คุณสมบัติของเครื่องชาร์จแบตเตอรี่รถยนต์
      description: แสดงโหมดการทำงานและเวลาในการชาร์จของเครื่องชาร์จแบตเตอรี่รถยนต์
        (เช่น โหมดลอยตัว, การขจัดซัลเฟต)
    vehicle_body_filler_form:
      name: รูปแบบสารอุดตัวถังรถยนต์
      description: ลักษณะทางกายภาพ/ลักษณะบรรจุภัณฑ์ของตัวเติมสินค้า
    vehicle_coaxial_speaker_nominal_size:
      name: ขนาดระบุของลำโพงโคแอกเซียลในรถยนต์
      description: ขนาดลำโพงมาตรฐานที่ใช้ในการติดตั้ง (เช่น 6.5 นิ้ว, 6x9 นิ้ว)
    vehicle_cover_size_class:
      name: ขนาดของผ้าคลุมรถ
      description: การจัดกลุ่มขนาดโดยทั่วไปจะระบุว่าฝาครอบนั้นออกแบบมาให้เหมาะกับรถยนต์ขนาดใด
    vehicle_decor_set_items_included:
      name: รวมชุดตกแต่งรถแล้ว
      description: แสดงรายการประเภทการตกแต่งรายการที่รวมอยู่ในชุดอุปกรณ์เสริม (การมองเห็นระดับส่วนประกอบสำหรับนักช้อป)
    vehicle_door_lock_actuation_method:
      name: วิธีการทำงานของระบบล็อกประตูรถยนต์
      description: ระบุวิธีการทำงานหรือการควบคุมของระบบล็อกประตูรถยนต์
    vehicle_door_lock_actuator_kit_contents:
      name: ตัวกระตุ้นการล็อคประตูรถยนต์ รายละเอียด
      description: ระบุว่ามีอะไรบ้างที่รวมอยู่ในชุดแอคชูเอเตอร์ (เฉพาะแอคชูเอเตอร์
        หรือ พร้อมฮาร์ดแวร์/แกน/ขายึด/สายไฟ)
    vehicle_door_lock_actuator_wiring_configuration:
      name: การกำหนดค่าการเดินสายไฟของกลไกการล็อกประตูรถยนต์
      description: ระบุรูปแบบการเดินสายไฟที่จำเป็นสำหรับการติดตั้ง (จำนวนสายไฟและ
        ความกว้าง)
    vehicle_door_lock_included_components:
      name: ส่วนประกอบของระบบล็อคประตูรถยนต์
      description: แสดงรายการส่วนประกอบใดบ้างที่รวมอยู่ในแพ็คเกจ (มีประโยชน์สำหรับการถ่ายโอน/แอสเซมบลี)
    vehicle_electrical_connector_type:
      name: ประเภทขั้วต่อไฟฟ้าของยานยนต์
      description: ระบุรูปแบบขั้วต่อไฟฟ้าหรือปลั๊กของตัวควบคุม/สนามแม่เหล็กของอัลเทอร์เนเตอร์
        (ไม่รวมขั้วต่อเอาต์พุตหลัก B+)
    vehicle_equipment_fit_out_level:
      name: ระดับการติดตั้งอุปกรณ์ยานพาหนะ
      description: ระบุระดับการดัดแปลงเพื่อใช้งานในสภาพรถตำรวจที่ติดตั้งมากับรถตู้
    vehicle_glass_cleaner_form:
      name: น้ำยาทำความสะอาดกระจกรถยนต์
      description: รูปแบบผลิตภัณฑ์น้ำยาทำความสะอาดกระจกรถยนต์ (เช่น สเปรย์ โฟม ผ้าเช็ดทำความสะอาด
        เจล สารเข้มข้น)
    vehicle_hitch_cover_illumination_type:
      name: ประเภทไฟส่องสว่างฝาครอบหัวต่อรถยนต์
      description: ระบุว่าฝาครอบหัวลากมีไฟส่องสว่างหรือไม่ และเป็นไฟชนิดใด
    vehicle_hitch_cover_mounting_type:
      name: ประเภทการติดตั้งฝาครอบหัวบอลลากจูง
      description: ระบุวิธีการยึด/ติดตั้งฝาครอบหัวลากเข้ากับตัวรับหัวลาก
    vehicle_license_plate_finish:
      name: การตกแต่งป้ายทะเบียนรถ
      description: ลักษณะพื้นผิวของแผ่นโลหะ
    vehicle_license_plate_frame_anti_theft_design:
      name: การออกแบบกรอบป้ายทะเบียนรถที่ป้องกันการโจรกรรม
      description: องค์ประกอบการออกแบบที่เกี่ยวข้องกับความปลอดภัย ซึ่งมีจุดประสงค์เพื่อป้องกันการถอดหรือการดัดแปลงแก้ไข
    vehicle_license_plate_frame_plate_standard:
      name: ป้ายทะเบียนรถ Frame เพลท มาตรฐาน
      description: กรอบป้ายทะเบียนที่มีขนาดพอดีกับมาตรฐาน/ภูมิภาคที่กำหนด
    vehicle_license_plate_frame_profile:
      name: รูปทรงกรอบป้ายทะเบียนรถยนต์
      description: ลักษณะของ Frame ล้อมรอบแผ่นป้าย (การครอบคลุม/Shapes) ซึ่ง Impact
        ความชัดเจนในการอ่านและการปฏิบัติตามข้อกำหนด
    vehicle_license_plate_mounting_hole_count:
      name: จำนวนรูยึดป้ายทะเบียนรถยนต์
      description: จำนวนรูยึดบนแผ่นโลหะ
    vehicle_license_plate_mounting_hole_pattern:
      name: รูปแบบรูยึดป้ายทะเบียนรถ
      description: วิธีการวางลวดลายของรูยึดบนจาน
    vehicle_license_plate_reflectivity:
      name: การสะท้อนแสงของป้ายทะเบียนรถยนต์
      description: พื้นผิวแผ่นโลหะสะท้อนแสงหรือไม่ และอย่างไร (ซึ่งสำคัญต่อการมองเห็นและการปฏิบัติตามข้อกำหนดในแผ่นโลหะแปลกใหม่บางประเภท)
    vehicle_license_plate_size_standard:
      name: ขนาดมาตรฐานป้ายทะเบียนรถยนต์
      description: ระบุมาตรฐานภูมิภาค/ยานยนต์ที่แผ่นป้ายทะเบียนมีขนาดพอดี (ระยะห่างของรูยึดและขนาดโดยรวม)
    vehicle_license_plate_text_style:
      name: รูปแบบข้อความป้ายทะเบียนรถ
      description: รูปแบบของตัวอักษรบนแผ่นพิมพ์ (ถ้ามี) รวมถึงแบบนูนหรือแบบพิมพ์
    vehicle_license_plate_theme:
      name: ธีมป้ายทะเบียนรถยนต์
      description: การออกแบบระดับสูงสำหรับงานศิลปะบนจาน
    vehicle_lift_actuation_method:
      name: วิธีการทำงานของลิฟต์ยกยานยนต์
      description: วิธีการขับเคลื่อน/การทำงานของแม่แรงยกเพื่อยกตัวรถขึ้น
    vehicle_lift_mounting_type:
      name: ประเภทการติดตั้งยกยานพาหนะ
      description: ระบุวิธีการติดตั้งหรือยึดลิฟต์ในพื้นที่ทำงาน
    vehicle_lift_type:
      name: ประเภทของลิฟต์ยกยานยนต์
      description: ระบุรูปแบบโครงสร้างของลิฟต์ยกยานยนต์ที่ใช้สำหรับการซ่อมบำรุงหรือการจัดเก็บ
        (เช่น แบบ 2 เสา, แบบ 4 เสา, แบบกรรไกร)
    vehicle_magnet_attachment_type:
      name: ประเภทการยึดแม่เหล็กสำหรับยานพาหนะ
      description: ระบุวิธีการยึด/ติดตั้งหลักสำหรับผลิตภัณฑ์ที่จำหน่ายเป็นแม่เหล็กสำหรับยานยนต์
        (ตัวอย่างเช่น แม่เหล็กอย่างเดียว หรือ แม่เหล็กที่มีกาวช่วยยึด)
    vehicle_magnet_intended_use:
      name: วัตถุประสงค์การใช้งานแม่เหล็กติดรถยนต์
      description: ระบุวัตถุประสงค์การใช้งานหลักของแม่เหล็กติดรถยนต์
    vehicle_mirror_adjustment_type:
      name: ประเภทการปรับกระจกมองข้างรถยนต์
      description: ระบุวิธีการปรับ/ควบคุมกระจก
    vehicle_mirror_glass_type:
      name: ประเภทกระจกมองข้างรถยนต์
      description: ระบุประเภททางแสง/รูปทรงของพื้นผิวกระจกเงา
    vehicle_organizer_features:
      name: คุณสมบัติของอุปกรณ์จัดระเบียบในรถยนต์
      description: คุณสมบัติหลักในการใช้งานของอุปกรณ์จัดระเบียบในรถยนต์ เช่น การพับเก็บได้
        ซับในกันน้ำ ช่องเก็บของเก็บความเย็น หรือฐานกันลื่น
    vehicle_paint_chemistry_base:
      name: เคมี/พื้นฐานของสีรถยนต์
      description: ระบุสูตร/ส่วนประกอบทางเคมีของสีที่ใช้ในสีรถยนต์
    vehicle_polish_application_method:
      name: วิธีการสมัครขัดสีรถยนต์
      description: ระบุวิธีการหรือเครื่องมือที่แนะนำสำหรับการลงน้ำยาขัดเงารถยนต์
    vehicle_pursuit_package:
      name: ชุดอุปกรณ์ติดตามยานพาหนะ
      description: ระบุว่ารถยนต์มีการติดตั้งแพ็คเกจ Pursuit- อากรประสิทธิภาพที่มีไว้สำหรับการใช้งานของตำรวจหรือไม่
        (เช่น การอัปเกรดการระบายความร้อน เบรก ระบบกันสะเทือน และการสอบเทียบ)
    vehicle_safety_equipment_position:
      name: ตำแหน่งอุปกรณ์ความปลอดภัยของยานพาหนะ
      description: ระบุตำแหน่งบนหรือภายในยานพาหนะที่ต้องการใช้งานหรือติดตั้งอุปกรณ์ความปลอดภัย
    vehicle_safety_equipment_visibility_features:
      name: คุณสมบัติการมองเห็นอุปกรณ์ความปลอดภัยของยานพาหนะ
      description: ระบุคุณสมบัติที่ช่วยเพิ่มทัศนวิสัย ซึ่งออกแบบมาเพื่อเพิ่มความโดดเด่น
    vehicle_seat_row:
      name: แถวที่นั่งในรถยนต์
      description: ระบุว่าเป็นที่นั่งแถวหลังใด (แถวที่สองและแถวที่สาม) รวมถึงแอปพลิเคชันเบาะนั่งด้านหลัง
    vehicle_steering_assist_type:
      name: ประเภทการช่วยบังคับเลี้ยวของยานพาหนะ
      description: ระบุระบบช่วยบังคับเลี้ยวที่ชิ้นส่วนนั้นได้รับการออกแบบมาเพื่อใช้งานร่วมกัน
    vehicle_steering_wheel_lock_form_factor:
      name: รูปแบบการล็อกพวงมาลัยรถยนต์
      description: อธิบายลักษณะทางกายภาพของตัวล็อกและวิธีการเชื่อมต่อกับพวงมาลัย (และอาจรวมถึงปุ่มควบคุมอื่นๆ
        ด้วย)
    vehicle_wax_polish_product_form:
      name: แว๊กซ์/ขัดเงารถยนต์ สินค้าฟอร์ม
      description: ลักษณะทางกายภาพ/รูปแบบการบรรจุของแว็กซ์ น้ำยาขัดเงา น้ำยาปกป้อง
        หรือน้ำยาเคลือบผิว
    vehicle_wheel_valve_stem_type:
      name: ประเภทวาล์วเติมลมล้อรถยนต์
      description: ระบุประเภทของก้านวาล์วที่รองรับหรือรวมอยู่ด้วย
    vehicle_windshield_fluid_formula:
      name: สูตรน้ำยาเช็ดกระจกรถยนต์
      description: หน้าที่หลักของน้ำยาเช็ดกระจกคือการทำความสะอาด/ขจัดคราบ
    veil_length_type:
      name: ประเภทความยาวผ้าคลุมหน้า
      description: จำแนกประเภทผ้าคลุมหน้าโดยใช้คำศัพท์ความยาวมาตรฐานแทนการวัดเป็นตัวเลข
    vellum_opacity_level:
      name: ระดับความทึบแสงของกระดาษไข
      description: บ่งบอกถึงความโปร่งแสงหรือความทึบแสงของแผ่นกระดาษไข
    ventilation_configuration:
      name: รูปแบบระบบระบายอากาศ
      description: การจัดวางระบบระบายอากาศหลัก/ช่องรับอากาศและช่องระบายอากาศของหมวกกันน็อค
    ventilation_control_type:
      name: ประเภทการควบคุมการระบายอากาศ
      description: ระบุรูปแบบการจัดการการไหลเวียนของอากาศที่ติดตั้งอยู่ในหมวกกันน็อค
    ventilation_level:
      name: ระดับการระบายอากาศ
      description: บ่งบอกถึงการออกแบบการไหลเวียนของอากาศ/การระบายอากาศของเกราะ
    venting_design:
      name: การออกแบบช่องระบายอากาศ
      description: ระบุว่าฝาครอบมีการระบายอากาศหรือไม่ และอย่างไร เพื่อลดการเกิดไอน้ำและเชื้อราในระหว่างการเก็บรักษา
    vestibule_type:
      name: ประเภทห้องโถงทางเข้า
      description: จำแนกห้องโถงของไลเอาต์ให้สัมพันธ์กับเต็นท์
    vibraphone_bar_material:
      name: วัสดุแท่งไวบราโฟน
      description: วัสดุที่ใช้ทำแท่งเสียง/คีย์ (แท่งที่สร้างเสียง) ของไวบราโฟน
    vibraphone_motor_type:
      name: ประเภทมอเตอร์แบบไวบราโฟน
      description: ประเภทของมอเตอร์ที่ใช้ขับเคลื่อนพัดลมเรโซเนเตอร์แบบหมุนเพื่อสร้างเสียงสั่น
        (ถ้ามี)
    vibraphone_range_octaves:
      name: ช่วงเสียงของไวบราโฟน (อ็อกเทฟ)
      description: ช่วงเสียงของไวบราโฟนจะแสดงเป็นอ็อกเทฟ (เช่น 3 อ็อกเทฟ, 3.5 อ็อกเทฟ)
    vibraphone_resonator_tube_material:
      name: วัสดุท่อเรโซเนเตอร์ของไวบราโฟน
      description: วัสดุที่ใช้ทำท่อเรโซเนเตอร์ของไวบราโฟนใต้แท่งโลหะ
    vibraphone_tuning_standard:
      name: มาตรฐานการปรับเสียงไวบราโฟน
      description: ระดับเสียงอ้างอิงที่ใช้ในการปรับจูน (A = 440 เฮิรตซ์ เป็นต้น)
    viewing_sides:
      name: ด้านการมองเห็น
      description: ระบุจำนวนด้านของกระดานคะแนนที่แสดงข้อมูล (ด้านเดียว สองด้าน สี่ด้าน
        ฯลฯ)
    vintage_advertisement_decade:
      name: โฆษณาโบราณระบุทศวรรษ
      description: ระบุทศวรรษที่โฆษณานั้นถูกพิมพ์หรือผลิตขึ้นครั้งแรก (โดยประมาณหากไม่ทราบปีที่แน่นอน)
    vintage_advertisement_format:
      name: รูปแบบโฆษณาแบบวินเทจ
      description: ระบุรูปแบบทางกายภาพหรือสื่อของของสะสมโฆษณาวินเทจ
    vintage_advertisement_subject_category:
      name: โฆษณาวินเทจยังคงอยู่ในหมวดหมู่บังคับ
      description: ระบุหมวดหมู่สินค้า/บริการที่โฆษณา (โฆษณานั้นเกี่ยวกับอะไร)
    vintage_classic_truck_cab_type:
      name: รถบรรทุกแบบห้องโดยสารวินเทจและคลาสสิก
      description: รูปแบบห้องโดยสาร/โครงสร้างตัวถังของห้องโดยสารผู้โดยสารของรถบรรทุก
    virginia_tech_helmet_star_rating:
      name: การให้คะแนนดาวของหมวกกันน็อคเวอร์จิเนียเทค
      description: ระดับความปลอดภัยที่กำหนดโดยห้องปฏิบัติการหมวกนิรภัยของเวอร์จิเนียเทค
        (0–5 ดาว)
    virtual_analog_synthesizer_form_factor:
      name: รูปแบบเครื่องสังเคราะห์เสียงอนาล็อกเสมือนจริง
      description: ระบุรูปแบบทางกายภาพของตัวเครื่องสังเคราะห์เสียง (แบบแป้นพิมพ์ หรือแบบโมดูล/แร็ค)
    viscosity_thickness:
      name: ความหนืด/ความข้น
      description: อธิบายถึงความข้นหรือความเหลวของน้ำมันดินในขณะที่จำหน่าย หรือที่ความข้นตามที่แนะนำสำหรับการใช้งาน
    vise_configuration:
      name: โครงสร้างปากจับชิ้นงาน
      description: ระบุโครงสร้าง จำนวนชิ้น หรือจำนวนชิ้นส่วนในชุดจับยึด ซึ่งส่งผลต่อความสะดวกในการพกพาและความซับซ้อนในการติดตั้ง
    visibility_features:
      name: คุณสมบัติเพิ่มทัศนวิสัย
      description: Highlight องค์ประกอบการออกแบบที่ช่วยเพิ่มทัศนวิสัยของผู้ขับขี่ในย่านร้านค้า
    visor_brim_type:
      name: ประเภทของกระบังหน้า/ปีกหมวก
      description: ระบุว่าหมวกกันน็อคมีกระบังหน้าหรือปีกหมวกหรือไม่ และมีรูปแบบใด
    visor_configuration:
      name: รูปแบบของกระบังหน้า
      description: อธิบายถึงลักษณะและรูปแบบของกระบังหน้าหรือแผ่นป้องกันใบหน้าที่ติดตั้งมากับตัวหมวก
    visor_lens_finish:
      name: พื้นผิวเลนส์บังแดด
      description: ระบุเฉดสี พื้นผิวเลนส์ หรือรูปแบบกราฟิกที่ใช้กับเลนส์บังแดด
    visor_style:
      name: สไตล์หมวกบังแดด
      description: ระบุว่าฮู้ดมีปีก/กระบังหน้าหรือไม่ และลักษณะของปีก/กระบังหน้าเป็นอย่างไร
    voc_compliance_standard:
      name: มาตรฐานการปฏิบัติตาม VOC
      description: การเรียกร้องการปฏิบัติตามกฎระเบียบ VOC สำหรับสินค้า (ถ้ามี)
    voc_regulatory_class:
      name: ประเภทการควบคุม VOC
      description: ระบุประเภทการควบคุม/การปฏิบัติตามข้อกำหนดของสารประกอบอินทรีย์ระเหยง่าย
        (VOC) สำหรับผลิตภัณฑ์ (ตาม Label/เอกสารข้อมูลความปลอดภัย) ซึ่งใช้สำหรับข้อจำกัดด้านกฎระเบียบและสิ่งแวดล้อมในระดับภูมิภาค
    vodka_base_ingredient:
      name: ส่วนผสมหลักของวอดก้า
      description: วัตถุดิบทางการเกษตรหลักที่ใช้ในการกลั่นวอดก้า (เช่น ข้าวสาลี มันฝรั่ง
        ข้าวโพด)
    voice_coil_configuration:
      name: การกำหนดค่าคอยล์เสียง
      description: จำนวน/การจัดเรียงขดลวดเสียงเพื่อความยืดหยุ่นในการเดินสายและตัวเลือกค่าความต้านทาน
    voice_effects:
      name: เอฟเฟ็กต์เสียง
      description: ประเภทเอฟเฟ็กต์เสียงร้องในตัวที่รองรับโดยชุดคาราโอเกะ
    voltage_rating_type:
      name: ประเภทพิกัดแรงดันไฟฟ้า
      description: ระบุว่าพิกัดแรงดันของฟิวส์นั้นใช้ได้กับกระแสสลับ (AC) กระแสตรง
        (DC) หรือทั้งสองอย่าง
    voltage_regulator_connector_type:
      name: ประเภทขั้วต่อตัวควบคุมแรงดันไฟฟ้า
      description: ระบุรูปแบบที่ต้องการ/เครื่องอ่านที่ใช้ในการเชื่อมต่อตัวควบคุมกับสายไฟ/เครื่องกำเนิดไฟฟ้ากระแสสลับ/เครื่องกำเนิดไฟฟ้าของยานพาหนะ
    wader_foot_type:
      name: ประเภทของส่วนเท้าสำหรับชุดลุยน้ำ
      description: ระบุว่าชุดลุยน้ำมีบูทในตัวหรือเป็นแบบถุงเท้าแยกต่างหาก
    wader_sole_type:
      name: พื้นรองเท้าแบบลุยน้ำ
      description: ระบุวัสดุพื้นรองเท้าหรือประเภทการยึดเกาะที่ใช้กับรองเท้าลุยน้ำหรือชุดลุยน้ำแบบมีส่วนหุ้มปลายเท้า
    waistband_style:
      name: สไตล์ขอบเอว
      description: อธิบายถึงโครงสร้างของขอบเอวและวิธีการยึดหรือปรับให้พอดีและสวมใส่สบาย
    wakeboard_binding_mounting_pattern:
      name: รูปแบบการติดตั้งอุปกรณ์ยึดสำหรับเวคบอร์ด
      description: ระบุรูปแบบของแผ่นยึด/แผ่นรองบนเวคบอร์ดที่เข้ากันได้กับอุปกรณ์ยึดรองเท้า
    wakeboard_riding_style:
      name: สไตล์การเล่นเวคบอร์ด
      description: จำแนกสภาพแวดล้อมหรือรูปแบบการใช้งานที่ตั้งใจไว้สำหรับเวคบอร์ด
    wall_decal_style:
      name: สไตล์สติ๊กเกอร์ติดผนัง
      description: ระบุวิธีการผลิต/ติดสติ๊กเกอร์ (เช่น การตัดด้วยเครื่อง, สติ๊กเกอร์,
        แผ่นสติ๊กเกอร์)
    wallyball_equipment_included:
      name: อุปกรณ์วอลลี่บอลที่รวมอยู่ในชุด
      description: ระบุชิ้นส่วนเฉพาะ Supply ในชุดวอลลี่บอล เพื่อให้ผู้ซื้อทราบว่ากำลังซื้ออะไร
        และสามารถเปรียบเทียบชุดได้
    warp_beam_type:
      name: ประเภทลำแสงวาร์ป
      description: ระบุการกำหนดค่าคานด้ายยืนที่มาพร้อมกับเครื่องทอผ้า (การตั้งค่าคานด้ายยืนที่ให้มาพร้อมกับเครื่องทอผ้า)
    washability:
      name: ความสามารถในการล้างออก
      description: ระบุว่ากาวทำความสะอาดด้วยน้ำและ/หรือล้างทำความสะอาดได้หลังจากใช้งาน
    watch_band_design:
      name: ดีไซน์สายนาฬิกา
      description: อธิบายรูปแบบการผลิตหรือดีไซน์ของสายนาฬิกา (เช่น NATO, Milanese,
        Link)
    watch_movement:
      name: กลไกนาฬิกา
      description: ระบุกลไกที่ขับเคลื่อนนาฬิกา ซึ่งเป็นปัจจัยสำคัญที่ผู้ซื้อใช้ในการแยกแยะความแตกต่างระหว่างรุ่นต่างๆ
    water_activation:
      name: การกระตุ้นด้วยน้ำ
      description: สัญญาณขอความช่วยเหลือสามารถเปิดใช้งานโดยอัตโนมัติเมื่อจมน้ำได้หรือไม่
        (ซึ่งเป็นเรื่องปกติสำหรับ EPIRB ประเภท I/II)
    water_chamber_configuration:
      name: การกำหนดค่าห้องน้ำ
      description: อธิบายถึงโครงสร้างภายในของที่นอน เช่น แบบช่องเดียวหรือสองช่อง ซึ่งส่งผลต่อการรองรับ
        การควบคุมอุณหภูมิ และการรบกวนคู่ครอง
    water_dispensing_mechanism:
      name: กลไกการจ่ายน้ำ
      description: กำหนดวิธีการปล่อยน้ำออกจากตัวเครื่อง เช่น ก๊อกน้ำ หัวฉีดสเปรย์
        หรือการไหลตามแรงโน้มถ่วง
    water_exposure_protection_level:
      name: ระดับการป้องกันการสัมผัสน้ำ
      description: ระบุระดับการป้องกันของผลิตภัณฑ์เมื่อสัมผัสกับน้ำ (เช่น การกระเด็นของน้ำ
        เทียบกับการจุ่มน้ำชั่วคราว) ให้ใช้ค่าการป้องกันน้ำและฝุ่น (IP) เมื่อมีรหัส
        IP อย่างเป็นทางการระบุไว้
    water_fed_design:
      name: การออกแบบที่จ่ายน้ำ
      description: ระบุว่าแปรงได้รับการออกแบบให้ใช้กับน้ำที่ไหลผ่าน Flowผ่านแฮนสไลด์หรือการตัดสินใจของสายยาง
    water_gun_features:
      name: คุณสมบัติของปืนฉีดน้ำ
      description: คุณสมบัติการใช้งานที่โดดเด่นและฟังก์ชันการทำงานของปืนฉีดน้ำ
    water_gun_operating_mechanism:
      name: กลไกการทำงานของปืนฉีดน้ำ
      description: วิธีที่ปืนฉีดน้ำสร้างแรงดันและพ่นน้ำออกมาขณะใช้งาน
    water_gun_spray_pattern:
      name: รูปแบบการฉีดน้ำของปืนฉีดน้ำ
      description: ลักษณะของลำน้ำที่พุ่งออกมาจากหัวฉีดขณะทำการพ่นน้ำ
    water_heating_method:
      name: วิธีการให้ความร้อนแก่น้ำ
      description: อธิบายวิธีการ หรือการให้ความร้อนแก่น้ำก่อนใช้งาน เช่น การดูดซับพลังงานแสงอาทิตย์
        เตาแก๊สโพรเพน ตัวทำความร้อนไฟฟ้า ระบบทำความร้อนด้วยแบตเตอรี่ ฉนวนกันความร้อน
        หรือไม่ให้ความร้อนเลย
    water_mattress_construction:
      name: การก่อสร้างที่นอนน้ำ
      description: ระบุรูปแบบโครงสร้างของที่นอนน้ำ (เช่น แบบแข็งหรือแบบนุ่ม) ซึ่งจะกำหนดความเข้ากันได้กับโครงและสัมผัสโดยรวม
    water_play_features:
      name: สิ่งอำนวยความสะดวกสำหรับเล่นน้ำ
      description: ส่วนประกอบกิจกรรมทางน้ำที่รวมอยู่ในสวนน้ำ/สไลเดอร์
    water_polo_competition_approval:
      name: การอนุมัติการแข่งขันโปโลน้ำ
      description: ระบุหน่วยงานกำกับดูแลหรือระดับการแข่งขันที่ลูกบอลได้รับการอนุมัติหรือรับรองอย่างเป็นทางการ
    water_polo_goal_type:
      name: ประตูโปโลน้ำ
      description: จำแนกประเภทโครงสร้างหรือการติดตั้งของเป้าหมาย (เช่น แบบลอยน้ำ แบบติดตั้งบนดาดฟ้า
        แบบพกพา)
    water_pump_drive_type:
      name: ประเภทการขับเคลื่อนปั๊มน้ำ
      description: ระบุวิธีการขับเคลื่อน/การทำงานของปั๊มน้ำในระบบระบายความร้อนของรถยนต์
    water_pump_housing_material:
      name: วัสดุตัวเรือนปั๊มน้ำ
      description: วัสดุที่ใช้ทำตัวเรือน/ตัวถังปั๊มน้ำ
    water_pump_impeller_material:
      name: วัสดุใบพัดปั๊มน้ำ
      description: ระบุวัสดุของใบพัดปั๊มน้ำ (โรเตอร์/ใบพัดภายในที่เคลื่อนย้ายน้ำหล่อเย็น)
    water_pump_mounting_type:
      name: ประเภทการติดตั้งปั๊มน้ำ
      description: ระบุรูปแบบการติดตั้ง/รูปทรงของปั๊มน้ำให้เหมาะสมกับเครื่องยนต์ (เช่น
        ตัวเรือนแบบยึดด้วยสลักเกลียว เทียบกับ แบบตลับ/แบบสอด)
    water_purification_method:
      name: วิธีการทำน้ำให้บริสุทธิ์
      description: ระบุกลไกหลักที่ผลิตภัณฑ์ใช้ในการทำให้บริการน้ำปลอดภัยสำหรับการดื่มในภาคสนาม
        (เช่น การใช้ปั๊ม เทียบกับการใช้แรงโน้มถ่วง เทียบกับแสง UV)
    water_resistance:
      name: การกันน้ำ
      description: ระบุระดับการป้องกันสภาพอากาศ เช่น กันน้ำ หรือ ทนน้ำ
    water_resistance_level:
      name: ระดับการกันน้ำ
      description: ระบุว่าผ้าชนิดนั้นกันน้ำได้หรือไม่ และกันน้ำได้ในระดับใด
    water_resistance_rating_case_protection_level:
      name: ระดับการกันน้ำ (ระดับการป้องกันน้ำ)
      description: ระบุระดับการกันน้ำ/การป้องกันน้ำของกระเป๋าเดินทางแบบล้อลาก (ระดับการตลาด
        ไม่ใช่มาตรฐานการกันน้ำระดับ IP สำหรับอุปกรณ์อิเล็กทรอนิกส์) เช่น กันน้ำได้ในระดับหนึ่ง
        เทียบกับ กันน้ำได้สนิท
    water_rocket_kit_items_included:
      name: อุปกรณ์ชุดจรวดน้ำประกอบด้วย
      description: ส่วนประกอบหลักที่รวมอยู่ในแพ็คเกจผลิตภัณฑ์
    water_rocket_propulsion_type:
      name: ระบบขับเคลื่อนจรวดน้ำ
      description: แหล่งพลังงานหรือแรงขับเคลื่อนหลักที่ใช้ในการปล่อยจรวด
    water_rocket_recovery_system:
      name: ระบบกู้คืนจรวดน้ำ
      description: วิธีการที่ใช้ในการกู้คืนจรวดหลังจากปล่อยขึ้นสู่ท้องฟ้า
    water_ski_base_design:
      name: การออกแบบฐานสกีน้ำ
      description: ระบุรูปทรงด้านล่างของตัวเรือสำหรับสกีน้ำ ซึ่งมีผลต่อลักษณะการควบคุม
    water_ski_fin_type:
      name: ครีบสกีน้ำ
      description: ระบุรูปแบบครีบของสกีน้ำ ซึ่งส่งผลต่อการทรงตัวและความคล่องตัว
    water_source:
      name: แหล่งน้ำ
      description: ระบุแหล่งที่มาของน้ำก่อนการอัดแก๊สคาร์บอนไดออกไซด์
    water_sports_safety_standard:
      name: มาตรฐานความปลอดภัยสำหรับกีฬาทางน้ำ
      description: ระบุมาตรฐานความปลอดภัยหรือมาตรฐานการลอยตัวอย่างเป็นทางการที่ผลิตภัณฑ์นั้นตรงตามข้อกำหนด
        (เช่น CE EN 1385 สำหรับหมวกนิรภัย, ISO 12402-5 สำหรับอุปกรณ์ช่วยลอยตัว, USCG
        Type III)
    water_table_feature_set:
      name: ชุดอุปกรณ์เสริมสำหรับโต๊ะเล่นน้ำ
      description: ระบุจุดเด่นของฟังก์ชั่นการเล่นในตัวของโต๊ะเล่นน้ำ เช่น น้ำตก เครื่องพ่นน้ำ
        ปั๊ม หรืออ่างน้ำหลายระดับ
    water_table_items_included:
      name: รวมตารางน้ำแล้ว
      description: ระบุว่าอุปกรณ์เสริมใดบ้างที่มาพร้อมกับชุดโต๊ะเล่นน้ำ (เช่น เรือ
        ถ้วย กรวย รูปปั้น)
    water_table_water_source_type:
      name: ประเภทแหล่งน้ำใต้ดิน
      description: ระบุวิธีการเติมหรือจัดหาน้ำให้กับแหล่งน้ำใต้ดิน
    waterbed_stabilization_level:
      name: ระดับการทรงตัวของที่นอนน้ำ
      description: บ่งบอกถึงระดับการลดคลื่นหรือการควบคุม Motion ของที่นอนน้ำ
    watercolor_ink_water_resistance_after_drying:
      name: หมึกสีน้ำกันน้ำ (หลังจากแห้งแล้ว)
      description: ระบุว่าหมึกสีน้ำจะกันน้ำได้หรือไม่หลังจากแห้งแล้ว (ตามที่ผู้ผลิตกล่าวอ้าง)
    watercraft_care_application_area:
      name: พื้นที่แอปพลิเคชันการดูแลทางน้ำ
      description: ระบุวิธีการเติมหรือจัดหาน้ำให้กับแหล่งน้ำใต้ดิน
    watercraft_drive_mechanism:
      name: กลไกขับเคลื่อนเรือ
      description: อธิบายถึงกลไกการขับเคลื่อนบนตัวเรือที่ติดตั้งหรือรองรับไว้โดยเฉพาะ
    watercraft_fuel_tank_sending_unit_pattern:
      name: รูปแบบหน่วยส่งสัญญาณระดับน้ำมันเชื้อเพลิงของเรือ
      description: ระบุรูปแบบ/มาตรฐานการติดตั้งสำหรับชุดส่งสัญญาณระดับน้ำมันเชื้อเพลิงและมาตรวัดที่เข้ากันได้
        (เช่น รูปแบบรูยึดแบบทั่วไปสำหรับเรือเดินทะเล)
    watercraft_fuel_tank_shape:
      name: ระบุวิธีการเติมหรือจัดหาน้ำให้กับแหล่งน้ำใต้ดิน
      description: อธิบายลักษณะโดยรวมของถังเชื้อเพลิงเพื่อสนับสนุนการวางแผนพื้นที่/การติดตั้ง
    watercraft_hull_material:
      name: วัสดุตัวเรือ
      description: ระบุวัสดุหลักที่ใช้ในการสร้างตัวเรือ
    watercraft_ignition_part_voltage:
      name: แรงดันไฟฟ้าของชิ้นส่วนจุดระเบิดของเรือ
      description: ระบุค่าแรงดันไฟฟ้า/ข้อกำหนดสำหรับส่วนจุดระเบิด (ถ้ามี) เช่น ระบบ
        12 โวลต์
    watercraft_impeller_material_grade:
      name: เกรดวัสดุใบพัดเรือ
      description: ระบุวัสดุของใบพัดเรือ (เช่น ยางนีโอพรีน ไนไตรล์ สีกล้องถ่ายรูป)
    watercraft_lighting_certification_compliance:
      name: การรับรอง/การปฏิบัติตามข้อกำหนดด้านระบบไฟส่องสว่างสำหรับเรือ
      description: ระบุถึงการปฏิบัติตามกฎระเบียบ/มาตรฐานที่ไฟได้รับการรับรองสำหรับการใช้งานทางทะเล
        (เช่น เป็นไปตามข้อกำหนดของ USCG/ABYC/COLREGs)
    watercraft_motor_mount_adjustment_features:
      name: คุณสมบัติการปรับฐานยึดมอเตอร์เรือ
      description: ความสามารถในการปรับแต่งของฐานยึด (เช่น การเอียง การยก การเลื่อน)
        ที่ส่งผลต่อการใช้งานและความพอดี
    watercraft_piston_part_type:
      name: ประเภทลูกสูบเรือ
      description: ระบุว่ารายการนี้หมายถึงชิ้นส่วนที่เกี่ยวข้องกับลูกสูบชิ้นใด
    watercraft_propeller_blade_rake:
      name: มุมเอียงของใบพัดเรือ
      description: ระบุค่าความเอียงของใบพาย (มุมของใบพายเทียบกับดุม) ซึ่งส่งผลต่อการยกตัวของหัวเรือและประสิทธิภาพการทำงาน
    watercraft_propeller_rotation_direction:
      name: ทิศทางการหมุนของใบพัดเรือ
      description: ระบุทิศทางการหมุน/ความถนัดของใบพัดที่จำเป็นสำหรับความเข้ากันได้ของระบบขับเคลื่อน
        (เช่น หมุนขวา/มาตรฐาน เทียบกับ หมุนซ้าย/หมุนสวนทาง)
    watercraft_pump_stage_impeller_role:
      name: บทบาทของปั๊ม/ใบพัดในเรือ
      description: ระบุว่าใบพัดนั้นถูกออกแบบมาเพื่อใช้งานในบทบาทเฉพาะของปั๊มหรือไม่
        (เช่น ปั๊มน้ำดิบ/น้ำทะเล ปั๊มหมุนเวียนน้ำหล่อเย็น ปั๊มเจ็ท)
    watercraft_registration_status:
      name: สถานะการจดทะเบียนเรือ
      description: ระบุว่าเรือใบนั้นมีเอกสารแสดงกรรมสิทธิ์และ/หรือเอกสารการจดทะเบียนหรือไม่
    watercraft_safety_equipment_activation_type:
      name: ประเภทการเปิดใช้งานอุปกรณ์ความปลอดภัยของเรือ
      description: วิธีการหลักในการเปิดใช้งานอุปกรณ์ความปลอดภัย (สำหรับสัญญาณไฟ/สัญญาณเตือนภัยคนตกน้ำ/อุปกรณ์ระบุตำแหน่งส่วนบุคคล)
        แตกต่างจากการเป่าลม
    watercraft_steering_cable_core_material:
      name: วัสดุแกนสายเคเบิลบังคับเลี้ยวเรือ
      description: ระบุวัสดุของสายเคเบิล/แกนด้านในที่ส่งแรง
    watercraft_steering_cable_hardware_included:
      name: รวมสายพวงมาลัยเรือฮาร์ดแวร์แล้ว
      description: ระบุว่าฮาร์ดแวร์และอุปกรณ์ติดตั้งใดบ้างที่รวมอยู่ในชุดสายเคเบิลพวงมาลัย
    watercraft_steering_cable_system_type:
      name: ระบบสายเคเบิลบังคับเลี้ยวเรือ
      description: ระบุสถาปัตยกรรมระบบบังคับเลี้ยวที่สายเคเบิลได้รับการออกแบบ (เช่น
        แบบหมุน ห้องอาหาร)
    watercraft_steering_wheel_hub_bore_type:
      name: ประเภทดุม/รูตรงกลางของพวงมาลัยเรือ
      description: ระบุรูปแบบการเชื่อมต่อตรงกลาง/รู (เช่น แบบเรียว แบบร่อง) ที่ล้อจะประกบเข้ากับดุมล้อหรืออะแดปเตอร์
    watercress_variety:
      name: ผักวอเตอร์เครสหลากหลายสายพันธุ์
      description: ระบุพันธุ์หรือชนิดของผักเครสที่จำหน่ายอย่างเฉพาะเจาะจง
    waterproof_level:
      name: ระดับการกันน้ำ
      description: ระบุระดับการป้องกันน้ำของรองเท้า รวมถึงคำกล่าวอ้างเรื่องการกันน้ำที่ได้รับการรับรองภายใต้การรับประกัน
    wax_blend_composition:
      name: ส่วนประกอบของแว็กซ์ผสม
      description: ระบุส่วนผสมของแว็กซ์ที่ใช้ในผลิตภัณฑ์ และ/หรือ ประเภทของส่วนผสมที่วางจำหน่ายในตลาด
    wax_coat_type:
      name: ประเภทเคลือบแว็กซ์
      description: ระบุว่าแว็กซ์นั้นมีไว้สำหรับใช้เป็นชั้นรองพื้น ชั้นเคลือบ หรือสูตรอเนกประสงค์/เคลือบชั้นเดียว
    wax_hardness:
      name: ความแข็งของขี้ผึ้ง
      description: บ่งบอกถึงความแข็งสัมพัทธ์ของแว็กซ์ ซึ่งส่งผลต่อความทนทานและการลื่นไถลบนหิมะประเภทต่างๆ
    wax_physical_form:
      name: ขี้ผึ้งรูปทรงกายภาพ
      description: ระบุลักษณะทางกายภาพ/Shapes ขี้ผึ้งเทียนดิบที่ Supply มา
    wax_recommended_candle_application:
      name: แว๊กซ์แนะนำแอพพลิเคชั่นเทียน
      description: ระบุรูปแบบเทียนหลักที่ใช้ในการผลิตขี้ผึ้งชนิดนี้
    wax_tackiness_level:
      name: ระดับความเหนียวของแว็กซ์
      description: อธิบายถึงระดับความเหนียว/การยึดเกาะที่แว็กซ์ให้แก่ใบมีด
    weapon_system_integration:
      name: การบูรณาการระบบอาวุธ
      description: ระบุว่ายานพาหนะมีระบบอาวุธในตัวหรือแท่นติดตั้งอาวุธหรือไม่
    weather_suitability:
      name: ความเหมาะสมของสภาพอากาศ
      description: บ่งบอกถึงสิ่งแวดล้อมที่สินค้าที่ถุงมือได้รับการออกแบบมาสำหรับ เช่น
        สภาพอากาศหนาวเย็นหรือการเล่นในสภาพอากาศเปียก
    weave_finish:
      name: การทอ/การตกแต่ง
      description: อธิบายถึงลักษณะการทอผ้าหลักหรือการตกแต่งพื้นผิวที่มีผลต่อเนื้อสัมผัสและความเงางามของเนคไท
    weave_style:
      name: สไตล์การทอ
      description: ระบุรูปแบบการทอแบบดั้งเดิมที่ใช้ในการทำหมวกปานามา ซึ่งมีผลต่อการระบายอากาศ
        ความยืดหยุ่น รูปลักษณ์ และราคา
    weave_type:
      name: ประเภทการทอ
      description: ระบุรูปแบบการทอ/โครงสร้างของผ้า (ชื่อทางการค้าของการทอ) ซึ่งมีผลต่อเนื้อสัมผัส
        ความเงางาม และการทิ้งตัวของผ้า
    weaving_beater_edge_type:
      name: ประเภทขอบตีแบบสาน
      description: อธิบายลักษณะขอบการทำงานของหัวตีแบนที่สัมผัสกับเส้นด้ายพุ่ง (เช่น
        แบบตรงหรือแบบหยัก)
    weaving_beater_style:
      name: รูปแบบเครื่องมือตีเส้นด้ายแบบแบน
      description: ระบุรูปแบบ/ลักษณะการใช้งานของไม้ตีผ้าแบบแบน
    weaving_shuttle_tip_style:
      name: สไตล์ปลายกระสวยทอผ้า
      description: ระบุลักษณะการออกแบบปลาย/จมูกด้านหน้าของกระสวย ซึ่งส่งผลต่อการเคลื่อนที่ผ่านช่องว่างระหว่างเส้นด้าย
        และโอกาสที่จะเกี่ยวเส้นด้ายยืน
    weaving_shuttle_use_case:
      name: การใช้กระสวยทอผ้า
      description: ระบุแอปพลิเคชันการทอที่ต้องการซึ่งกระสวยได้รับการออกแบบหรือปรับให้เหมาะสม
    webbing_construction_type:
      name: ประเภทโครงสร้างสายรัด
      description: อธิบายถึงลักษณะการทอหรือการถักเปียของสายรัด ซึ่งส่งผลต่อการถักทอ
        ความแข็งแรง และวัตถุประสงค์การใช้งาน
    webbing_design:
      name: การออกแบบสายรัด
      description: อธิบายลักษณะของพังผืดระหว่างนิ้ว ซึ่งส่งผลต่อการฝึกความต้านทานและการส่งแรงผลัก
    weight_adjustability:
      name: สามารถปรับน้ำหนักได้
      description: อธิบายว่าผู้ใช้สามารถเปลี่ยนค่าความต้านทานของผลิตภัณฑ์ได้หรือไม่
        (เช่น แบบเลือกปรับค่าได้ หรือแบบปรับน้ำหนักได้) หรือค่าความต้านทานคงที่อยู่ที่ค่าเดียว
    weight_integration_system:
      name: ระบบการรวมน้ำหนัก
      description: อธิบายว่ามีการรวมตุ้มถ่วงน้ำหนักเข้ากับ BCD หรือไม่และอย่างไร (เช่น
        ช่องใส่ตุ้มถ่วงน้ำหนักแบบถอดได้ ไม่มี เป็นตัวเลือก)
    weight_plate_compatibility:
      name: ความเข้ากันได้ของแผ่นน้ำหนัก
      description: กำหนดขนาดเส้นผ่านศูนย์กลางของแผ่นน้ำหนักที่เครื่องรองรับ (โอลิมปิก
        มาตรฐาน หรือทั้งสองแบบ)
    weight_plate_style:
      name: แบบแผ่นน้ำหนัก
      description: จำแนกประเภท/ดีไซน์ของแผ่นน้ำหนัก (เช่น แผ่นน้ำหนักโอลิมปิก แผ่นน้ำหนักกันกระแทก
        แผ่นน้ำหนักปรับน้ำหนักได้) เพื่อให้สามารถกรองหาความเข้ากันได้อย่างรวดเร็ว
    weightlifting_belt_style:
      name: สไตล์เข็มขัดยกน้ำหนัก
      description: จำแนกประเภทการออกแบบโดยรวมหรือการกำหนดค่าตามวัตถุประสงค์ของสายพาน
        (เช่น สายพานแบบคันโยก สายพานแบบจุ่ม สายพานแบบเรียว)
    weightlifting_federation_certification:
      name: ใบรับรองจากสหพันธ์ยกน้ำหนัก
      description: การอนุมัติอย่างเป็นทางการหรือการปฏิบัติตามผลิตภัณฑ์โดยสหพันธ์กีฬาความแข็งแกร่ง
        เช่น IPF หรือ IWF
    wetsuit_boot_height:
      name: ความสูงของรองเท้าดำน้ำ
      description: จำแนกความสูง/ทรงของรองเท้าบูทที่สวมใส่กับขา Influence การปกคลุม
        การเคลื่อนไหว และการกันน้ำ
    wetsuit_entry_system:
      name: ระบบการใส่ชุดดำน้ำ
      description: อธิบายประเภทและตำแหน่งของช่องเปิด/ซิปที่ใช้สำหรับสวมชุดดำน้ำ
    wetsuit_seam_construction:
      name: โครงสร้างตะเข็บของชุดดำน้ำ
      description: ระบุวิธีการเย็บและการปิดผนึกตะเข็บ ซึ่งส่งผลต่อความอบอุ่น ความยืดหยุ่น
        และความทนทาน
    wheat_product_form:
      name: รูปแบบผลิตภัณฑ์ข้าวสาลี
      description: ระบุรูปแบบทางกายภาพหรือการประมวลผลของผลิตภัณฑ์ข้าวสาลี
    wheel_arrangement:
      name: การจัดเรียงล้อ
      description: ระบุการจัดเรียงล้อของหัวรถจักรไอน้ำ (ตามระบบ Whyte) ซึ่งเป็นลักษณะเฉพาะและเป็นคำค้นหา/คำที่นักสะสมใช้กันทั่วไป
    wheel_brake_type:
      name: ประเภทเบรกแบบล้อ
      description: รายละเอียดการกำหนดค่าการเบรกที่มีให้บนล้อหรือล้อเลื่อนของตะกร้าสินค้า
    wheel_chock_grip_features:
      name: คุณสมบัติการยึดของตัวล็อกล้อ
      description: คุณสมบัติการออกแบบที่ช่วยเพิ่มแรงยึดเกาะและประสิทธิภาพในการยึดจับบนพื้นผิวต่างๆ
        รวมถึงยางรถยนต์
    wheel_cleaner_acidity_ph_category:
      name: ระดับความเป็นกรดหรือค่า pH ของน้ำยาทำความสะอาดล้อ
      description: ระบุว่าน้ำยาทำความสะอาดล้อมีความเป็นกรด เป็นกลาง หรือเป็นด่าง (และเป็นทางเลือกว่าจะมีราคาตลาดเป็น
        pH-ยอดคงเหลือหรือไม่)
    wheel_cleaner_formula_type:
      name: สูตรน้ำยาทำความสะอาดล้อรถยนต์
      description: สำหรับน้ำยาทำความสะอาดล้อและน้ำยาล้างที่เกี่ยวข้อง ระบุหมวดหมู่สูตรหลักของสินค้า
        (เช่น ที่เป็นกรด ไม่เป็นกรด pH เป็นกลาง/ยอดคงเหลือ หรือทำปฏิกิริยากับเหล็ก)
    wheel_construction_type:
      name: ประเภทโครงสร้างล้อ
      description: ระบุวิธีการผลิต/โครงสร้างของล้อ
    wheel_contaminant_target:
      name: เป้าหมายการปนเปื้อนของล้อ
      description: ระบุประเภทการปนเปื้อนหลักที่น้ำยาทำความสะอาดนี้ได้รับการออกแบบมาเพื่อกำจัด
    wheel_core_type:
      name: ประเภทแกนล้อ
      description: อธิบายถึงรูปแบบการสร้างแกนล้อ ซึ่งมีผลต่อ น้ำหนัก ความแข็งแรง และการส่งถ่ายพลังงาน
    wheel_cylinder_inlet_port_thread_standard:
      name: เกลียวพอร์ตทางเข้ากระบอกล้อแบบมาตรฐาน
      description: ระบุมาตรฐานเกลียวของพอร์ตทางเข้าท่อเบรกบนกระบอกเบรก (เช่น เกลียวแบบเมตริก
        หรือเกลียวแบบ SAE)
    wheel_fastener_seat_type:
      name: ประเภทที่นั่งยึดล้อ
      description: ระบุรูปแบบของฐานรองน็อตล้อ/สลักเกลียวที่เข้ากับล้อ (เช่น ทรงกรวย/เรียว,
        ทรงกลม/โค้งมน, ทรงแบน, ทรงแม็กนีเซียม/ทรงก้าน)
    wheel_illumination:
      name: ไฟส่องล้อ
      description: ระบุว่าล้อมีไฟส่องสว่างในตัวหรือคุณสมบัติเรืองแสงหรือไม่
    wheel_material:
      name: วัสดุล้อ
      description: ระบุส่วนประกอบหลักของล้อ ซึ่งส่งผลต่อความทนทาน การยึดเกาะ และการลดแรงสั่นสะเทือน
    wheel_profile:
      name: รูปทรงล้อ
      description: อธิบายถึง Shapes หน้าตัดของล้อที่มีผลต่อความเร็ว การยึดเกาะ และความคล่องตัว
    wheel_setup_type:
      name: ประเภทการติดตั้งล้อ
      description: กำหนดรูปแบบการจัดเรียงล้อที่ใช้กับรองเท้าสเก็ต
    wheel_system_finish:
      name: การตกแต่งระบบล้อ
      description: การตกแต่งพื้นผิว/การเคลือบผิวของขอบล้อ/ล้อ และชิ้นส่วน/อุปกรณ์เสริมล้อบางชนิด
    whip_style:
      name: สไตล์แส้
      description: จำแนกประเภทผลิตภัณฑ์ตามรูปแบบของแส้หรือไม้ตีม้า หรือตามประเภทการใช้งานที่ต้องการ
    whipped_cream_base:
      name: ฐานวิปครีม
      description: ระบุส่วนผสมหลักที่ใช้ในการทำวิปครีม เช่น ครีมจากนมหรือมะพร้าว
    whipped_cream_form:
      name: รูปแบบของวิปครีม
      description: ระบุรูปแบบบรรจุภัณฑ์ที่ใช้ในการจำหน่ายวิปครีม
    whistle_head_material:
      name: วัสดุที่ใช้ทำหัวนกหวีด
      description: ระบุวัสดุของส่วนหัว/ปากเป่าของนกหวีด (บล็อก/ส่วนหัวของฟิปเปิล)
    whistle_light_features:
      name: คุณสมบัติไฟนกหวีด
      description: ระบุว่านกหวีดนั้นมีเอฟเฟกต์แสงในตัวสำหรับงานปาร์ตี้หรือไม่ (เช่น
        ไฟ LED)
    whistle_purpose:
      name: จุดประสงค์ของนกหวีด
      description: ระบุวัตถุประสงค์หลักของนกหวีด (การฝึกสอนกีฬา ความปลอดภัยทางทะเล
        การฝึกสุนัข ฯลฯ)
    whistle_sound_style:
      name: สไตล์เสียงนกหวีด
      description: อธิบายรูปแบบ/ลักษณะของเสียงนกหวีด (เช่น เสียงโทนเดียว หรือ เสียงหลายโทน)
    white_glue_finish_appearance_when_dry:
      name: เมื่อแห้งแล้วจะมีลักษณะเป็นสีขาวคล้ายกาว
      description: ระบุว่ากาวจะมีลักษณะอย่างไรหลังจากการทำให้แห้งสำหรับใช้ Craft/ในสำนักงาน
        (เช่น เก็บรักษา vs ทึบแสง)
    white_glue_washability:
      name: ความสามารถในการล้างคราบกาวขาว
      description: ระบุว่ากาวแห้งสามารถล้างออก/ทำความสะอาดออกจากผ้าหรือผิวหนังได้หรือไม่
    whitewater_kayak_style:
      name: สไตล์เรือคายัคล่องแก่ง
      description: จุดประสงค์หลักในการออกแบบคือภายในกลุ่มเรือสำหรับล่องแก่ง (เช่น
        เรือครีกโบ๊ท, เรือริเวอร์รันเนอร์, เรือเพลย์โบ๊ท)
    whitewater_rating_class:
      name: ระดับความยากของกระแสน้ำเชี่ยว (ระดับชั้น)
      description: ระดับความยากระดับนานาชาติสูงสุดขยายสเกลของแม่น้ำ แพได้รับการจัดอันดับให้เป็นแฮนเดิล
    whorl_mounting_interface:
      name: ส่วนต่อประสานการติดตั้งแบบเกลียว
      description: วิธีที่วงล้อหมุนยึดติดกับแกนหมุน (รูปแบบ/การเชื่อมต่อของเพลา)
    wick_construction_type:
      name: ประเภทโครงสร้างไส้เทียน
      description: ลักษณะโครงสร้าง/รูปแบบของไส้เทียน (แบบถักเปีย, แบบแบน, แบบถักเปียสี่เหลี่ยม,
        แบบมีแกน, แบบไม้ ฯลฯ)
    wick_core_type:
      name: ประเภทแกนไส้ตะเกียง
      description: ไม่ว่าไส้เทียนจะไม่มีแกนหรือมีวัสดุแกนกลาง (เช่น แกน Paperหรือแกนสังกะสี)
        จะส่งผลต่อความแข็งและลักษณะการเผาไหม้
    wick_tab_crimp_type:
      name: ไส้ตะเกียง ชนิดจีบ
      description: วิธีที่ไส้เทียนยึดไส้เทียน (โครงสร้าง/แบบบีบ)
    wick_tab_material:
      name: วัสดุที่ใช้ทำฐานรองไส้เทียน
      description: วัสดุของ ap/sustainer ที่แนบมา (โดยทั่วไปคือแผ่นเหล็กวิลาด) ที่เกี่ยวข้องกับความต้านทานการกัดกร่อนและการกำหนดลักษณะตามกฎระเบียบ
        (เช่น การหลีกเลี่ยงกลุ่มเป้าหมาย)
    wick_tab_shape:
      name: รูปทรงแถบไส้ตะเกียง
      description: รูปทรง/ลักษณะของแผ่นยึดไส้ตะเกียง
    wick_type_included:
      name: รวมถึงประเภทไส้ตะเกียง
      description: ระบุวัสดุ/ประเภทของไส้ตะเกียงที่รวมอยู่ในไฟล์บันทึก
    wig_fiber_material:
      name: วัสดุเส้นใยสำหรับวิกผม
      description: ระบุเส้นใยหลักที่ใช้ทำวิกผม เพื่อให้ร้านค้าสามารถเลือกระหว่างวิกผมที่ทำจากผมจริงและวิกผมสังเคราะห์ที่มีคุณสมบัติในการจัดแต่งทรงและอายุการใช้งานแตกต่างกันได้อย่างง่ายดาย
    wildlife_attractant_scent:
      name: กลิ่นดึงดูดสัตว์ป่า
      description: ระบุกลิ่นหลักที่ใช้ล่อสัตว์ป่า ครอบคลุมทั้งกลิ่นอาหารตามธรรมชาติและกลิ่นประเภทฟีโรโมน
    willow_grade:
      name: เกรดวิลโลว์
      description: ระบุเกรดคุณภาพของไม้หลิวที่ใช้ โดยบ่งบอกถึงโครงสร้างของเนื้อไม้และระดับประสิทธิภาพโดยรวม
    willow_type:
      name: ประเภทวิลโลว์
      description: ระบุชนิดของไม้หลิวหรือวัสดุทางเลือกที่ใช้ทำใบไม้เบสบอล ซึ่งมีผลอย่างมากต่อประสิทธิภาพ
        ความทนทาน และราคา
    wind_up_mechanism_type:
      name: ประเภทกลไกไขลาน
      description: ระบุวิธีการไขลานหรือเปิดใช้งานของเล่น
    wind_up_toy_movement_pattern:
      name: รูปแบบการเคลื่อนไหวของของเล่นไขลาน
      description: อธิบายการเคลื่อนไหวหลักที่เกิดขึ้นเมื่อไขลาน
    windbreak_purpose:
      name: จุดประสงค์ในการป้องกันลม
      description: กำหนดวัตถุประสงค์การใช้งานหลักของแนวกันลม
    windfoil_board_mounting_system:
      name: ระบบติดตั้งบอร์ดวินด์ฟอยล์
      description: ระบุช่องหรือเบ้ายึดติดฟอยล์ที่ติดตั้งอยู่ในกระดานวินเซิร์ฟแบบติดฟอยล์
    windfoil_sail_style:
      name: สไตล์ใบเรือวินด์ฟอยล์
      description: จำแนกประเภทของใบเรือตามสไตล์การขี่หรือประเภทกีฬาที่ตั้งใจไว้
    winding_direction:
      name: ทิศทางการคดเคี้ยว
      description: ระบุรูปแบบการหมุนที่รองรับโดยเครื่องไขลานนาฬิกา (ตามเข็มนาฬิกา
        ทวนเข็มนาฬิกา หรือหมุนได้ทั้งสองทิศทาง)
    winding_method:
      name: วิธีการพัน
      description: วิธีการม้วน/บรรจุเส้นด้ายพุ่งเพื่อใช้ในกระสวย
    winding_speed_control_type:
      name: ประเภทควบคุมความเร็วในการหมุน
      description: ระบุวิธีการควบคุมความเร็วในการหมุนขณะใช้งาน
    winding_type:
      name: ประเภทขดลวด
      description: ระบุโครงสร้างการพันสายเบส (รูปทรงการพันรอบนอก)
    windlass_control_station_type:
      name: ประเภทสถานีควบคุมกว้าน
      description: ประเภทของอินเทอร์เฟซควบคุมที่รวมอยู่หรือรองรับสำหรับการใช้งานเครื่องกว้าน
    windlass_mount_type:
      name: แบบติดตั้งกว้าน
      description: ตำแหน่ง/วิธีการติดตั้งกว้านบนเรือ
    window_component_location:
      name: ส่วนประกอบหน้าต่างโซล
      description: ระบุว่าชิ้นส่วนนั้นใช้กับหน้าต่าง/ช่องเปิดใดภายในรถ (เช่น กระจกหน้ารถ
        กระจกประตู กระจกหลัง หรือกระจกข้าง)
    window_configuration:
      name: การกำหนดค่าหน้าต่าง
      description: ระบุถึงการมีอยู่และขนาดสัมพัทธ์ของช่องมองโปร่งใสบนปีกเครื่องบิน
    window_glass_construction:
      name: การก่อสร้างกระจกหน้าต่าง
      description: ระบุโครงสร้างด้านความปลอดภัย/การเคลือบของกระจกหน้าต่างรถยนต์
    window_glass_features:
      name: คุณสมบัติของกระจกหน้าต่าง
      description: บ่งชี้ว่ากระจกช่วยเหลือบูรณาการเทคโนโลยียานพาหนะ (เช่น แผ่นเซ็นเซอร์ฝน
        วงเล็บกล้อง)
    window_glass_finish:
      name: การตกแต่งกระจกหน้าต่าง
      description: ระบุการเคลือบ/สี/ความเป็นส่วนตัว ทรีตเมนต์ของกระจกหน้าต่างรถยนต์-รถยนต์
    window_glass_tint_color:
      name: สีของกระจกสีตัดแสงหน้าต่าง
      description: ระบุเฉดสีของสีที่มีอยู่ในกระจก (ไม่ใช่สีสินค้าทั่วไป)ระบุเฉดสีของสีที่ปรากฏในเนื้อแก้ว
        (ไม่ใช่สีโดยรวมของผลิตภัณฑ์)
    window_glass_tint_level:
      name: ระดับความเข้มของฟิล์มกรองแสงหน้าต่าง
      description: ระบุระดับความเข้มของฟิล์มกรองแสงจากโรงงาน (ไม่ใช่ฟิล์มที่ติดตั้งเพิ่มเติมภายหลัง)
        ให้ใช้ระดับการอธิบายเมื่อไม่ทราบค่า VLT ที่แน่นอน
    window_net_latch_mechanism:
      name: กลไกตัวล็อคตาข่ายหน้าต่าง
      description: ระบุกลไกการล็อก/ปลดล็อกที่ใช้สำหรับมุ้งลวดหน้าต่าง (เช่น ปุ่มกด
        คันโยก หัวเข็มขัดแบบเข็มขัดนิรภัย)
    window_net_mounting_hardware:
      name: ฮาร์ดแวร์ติดมุ้งลวดหน้าต่าง
      description: ระบุประเภทของอุปกรณ์ติดตั้งหรือวิธีการยึดที่ใช้ในการติดตั้งมุ้งลวด
        (เช่น แบบหนีบ, สกรู, แบบขอเกี่ยว/แท่ง) หรือระบุว่ามีอุปกรณ์ติดตั้งมาให้ด้วยหรือไม่
    window_net_opening_direction:
      name: ทิศทางการเปิดมุ้งลวดหน้าต่าง
      description: ระบุวิธีการเปิด/ปิดมุ้งลวดหน้าต่างโดยสัมพันธ์กับผู้ใช้งาน เพื่อความสะดวกในการหนีไฟและการปฏิบัติตามกฎระเบียบ
    window_regulator_operation:
      name: การทำงานของกลไกปรับระดับกระจก
      description: ระบุวิธีการใช้งานกลไกปรับระดับกระจก (แบบหมุนมือหรือแบบไฟฟ้า)
    windshield_coverage_area:
      name: พื้นที่ครอบคลุมของกระจกหน้ารถ
      description: ระบุว่าแผ่นบังลมด้านหน้าได้รับการออกแบบมาเพื่อปกป้องส่วนใดบ้างของตัวรถด้านหน้า
        (เช่น เฉพาะกระจกหน้ารถ หรือรวมถึงที่ปัดน้ำฝน กระจกมองข้าง กระจกข้าง หรือขอบฝากระโปรงหน้า)
    windshield_mount_attachment_method:
      name: วิธีการติดตั้งอุปกรณ์เสริมแบบยึดกระจกหน้ารถ
      description: ระบุวิธีการที่ตัวยึดติดหรือยึดกับพื้นผิวกระจกหน้ารถ
    windshield_washer_fluid_seasonality:
      name: ฤดูกาลของน้ำยาฉีดกระจกหน้ารถ
      description: ระบุฤดูกาล/สภาพอากาศที่ต้องการ หรือการใช้งานหลักของน้ำยาฉีดกระจก
        (เช่น น้ำยาละลายน้ำแข็งในฤดูหนาว น้ำยาล้างแมลงในฤดูร้อน น้ำยาใช้ได้ทุกฤดู)
    windsurf_fin_style:
      name: สไตล์ครีบวินด์เซิร์ฟ
      description: จำแนกครีบตามประเภทการแล่นเรือหรือรูปแบบการใช้งานที่ต้องการ (เช่น
        โต้คลื่น สลาลอม ฝ่าดงวัชพืช)
    windsurfing_connection_standard:
      name: มาตรฐานการเชื่อมต่อวินด์เซิร์ฟ
      description: อินเตอร์เฟซเชิงกลหรือแบบกล่องที่ใช้สำหรับยึดชิ้นส่วนเข้ากับแผงวงจรหรืออุปกรณ์
    windsurfing_sail_style:
      name: สไตล์การแล่นเรือวินด์เซิร์ฟ
      description: จำแนกประเภทการใช้งานหรือวัตถุประสงค์ของใบเรือ เช่น เวฟ ฟรีไรด์
        หรือฟอยล์
    wine_additive_type:
      name: ประเภทสารเติมแต่งไวน์
      description: ระบุว่าเป็นผลิตภัณฑ์ที่ผลิตไวน์สีแดงประเภทใด (ส่วนผสม สารเติมแต่ง
        ยีสต์ สารช่วยปรับสภาพ ถ่ายทำ ฯลฯ)
    wine_body:
      name: ตัวไวน์
      description: อธิบายถึงความรู้สึกถึงน้ำหนักและรสสัมผัสของไวน์ในปาก
    wine_carbonation:
      name: การอัดแก๊สในไวน์
      description: ระบุว่าไวน์นั้นเป็นไวน์นิ่ง ไวน์กึ่งมีฟอง หรือไวน์มีฟอง และหากเกี่ยวข้อง
        จะระบุความเข้มข้นของฟองด้วย
    wine_making_ingredient_type:
      name: ส่วนผสมในการผลิตไวน์
      description: ระบุหมวดหมู่ส่วนประกอบเชิงฟังก์ชันสำหรับสารเติมแต่งและส่วนผสมที่ใช้ในการผลิตไวน์
    wine_making_stage:
      name: ขั้นตอนการผลิตไวน์
      description: ระบุว่าผลิตภัณฑ์นั้นเหมาะสำหรับขั้นตอนใดในกระบวนการผลิตไวน์
    wine_style:
      name: สไตล์ไวน์
      description: จำแนกประเภทรูปแบบการผลิตไวน์อย่างกว้างๆ Beyond สี เช่น ไวน์นิ่ง
        ไวน์มีฟอง หรือไวน์เสริมแอลกอฮอล์
    winemaking_process_stage:
      name: ขั้นตอนการผลิตไวน์
      description: ระบุขั้นตอนหลักของกระบวนการผลิตไวน์ที่วัสดุนี้มีไว้สำหรับ Supply
    wing_count:
      name: จำนวนปีก
      description: จำนวนปีก/แขนของบูมเมอแรง
    wing_handle_type:
      name: ประเภทด้ามจับปีก
      description: ระบุรูปแบบของระบบจับมือบนปีกวิงฟอยล์
    wing_part_type:
      name: ประเภทชิ้นส่วนปีก
      description: บ่งบอกส่วนประกอบเฉพาะหรือชิ้นส่วนทดแทนสำหรับปีกกระดานวินเซิร์ฟแบบติดฟอยล์
    wingfoiling_style:
      name: สไตล์วิงฟอยล์
      description: ระบุประเภทกีฬาวิงฟอยล์หรือสไตล์การเล่นที่ผลิตภัณฑ์นั้นมุ่งเป้าหมายโดยเฉพาะ
    wiper_arm_finish:
      name: การตกแต่งก้านปัดน้ำฝน
      description: การตกแต่งพื้นผิวหรือการเคลือบป้องกันที่ใช้กับก้านปัดน้ำฝน ความทนทาน
        Impact และการกัดกร่อน และรูปลักษณ์ที่สวยงาม
    wiper_arm_pivot_mount_type:
      name: แบบติดตั้งแกนหมุนแขนปัดน้ำฝน
      description: ระบุวิธีการติดตั้งแขนปัดน้ำฝนเข้ากับกลไกหรือจุดหมุนของตัวรถ
    wiper_blade_attachment_type:
      name: ประเภทการติดตั้งใบปัดน้ำฝน
      description: ระบุรูปแบบตัวเชื่อมต่อ/การยึดที่ใช้ในการติดตั้งใบปัดน้ำฝนเข้ากับแขนปัดน้ำฝน
    wiper_blade_rubber_material:
      name: วัสดุยางใบปัดน้ำฝน
      description: วัสดุของชิ้นส่วนเช็ดทำความสะอาด (ชิ้นส่วนเปลี่ยน/ชิ้นส่วนสำรอง)
        ที่สัมผัสกับกระจก
    wiper_system_position:
      name: ตำแหน่งระบบปัดน้ำฝน
      description: ระบุตำแหน่งการติดตั้งระบบปัดน้ำฝนบนตัวรถ
    wire_coating_material:
      name: วัสดุหุ้มลวด
      description: ระบุวัสดุหุ้มภายนอก/ปลอกที่ใช้กับลวด (ไม่ใช่ตัวลวดแกนกลาง) ซึ่งอาจส่งผลต่อความทนทานต่อการเสียดสีและความราบรื่นในการลอดผ่านรูลูกปัด
    wire_coating_type:
      name: ประเภทการเคลือบสายไฟ
      description: ระบุว่าสายไฟนั้นมีการหุ้ม/เคลือบหรือไม่ และอย่างไร (เพื่อสี การป้องกัน
        และพื้นผิว)
    wire_construction_type:
      name: ประเภทโครงสร้างของลวด
      description: ระบุโครงสร้างทางกายภาพของลวดสำหรับร้อยลูกปัด เช่น ลวดตีเกลียวหรือลวดเส้นเดียว
        และว่ามีการเคลือบหรือไม่
    wire_finish:
      name: ลวดเคลือบ
      description: ระบุลักษณะพื้นผิว การเคลือบ หรือการชุบที่ใช้กับลวด (เช่น ขัดเงา
        เคลือบอีนาเมล ชุบสังกะสี ชุบโลหะ) ซึ่งส่งผลต่อรูปลักษณ์และความต้านทานต่อการหมอง/การกัดกร่อน
    wire_gauge_awg:
      name: ขนาดลวด (AWG)
      description: ขนาดมาตรฐาน American Wire Gauge (AWG) ของตัวนำที่ใช้ในชุดสายไฟ
    wire_insulation_material:
      name: วัสดุหุ้มสายไฟ
      description: วัสดุของฉนวน/ปลอกหุ้มสายไฟที่ใช้ในชุดสายไฟ (อุณหภูมิ Impact /ความทนทานต่อสารเคมี)
    wire_packaging_type:
      name: ประเภทบรรจุภัณฑ์ของสายไฟ
      description: ระบุวิธีการจำหน่าย/บรรจุภัณฑ์ของสายไฟ
    wire_shape_profile:
      name: รูปทรงหรือลักษณะของลวด
      description: อธิบาย Shapes หน้าตัดของลวด
    wiring_configuration:
      name: การกำหนดค่าการเดินสายไฟ
      description: ระบุว่าดาบเอเป้สำหรับฟันดาบนั้น Supply พร้อมกับสายไฟสำหรับระบบให้คะแนนไฟฟ้า
        ไม่มีสายไฟ ไร้สาย หรือออกแบบมาเพื่อการฝึกซ้อมโดยไม่ใช้ไฟฟ้า
    wobbler_style:
      name: สไตล์วอบเบลอร์
      description: กำหนดลักษณะการออกแบบ/รูปแบบการเคลื่อนไหวเฉพาะของเหยื่อประเภทวอบเบลอร์
        เช่น แคร้งเบท หรือ เจิร์กเบท
    wood_block_surface_preparation:
      name: การเตรียมพื้นผิวบล็อกไม้
      description: แสดงถึงสภาพพื้นผิวที่พร้อมใช้งานของบล็อกไม้สำหรับการตกแต่งและ Craft
    wood_grain_direction:
      name: ทิศทางลายไม้
      description: ทิศทางของลายไม้สัมพันธ์กับข้อมูลที่ยาวที่สุดของสินค้า (สำคัญสำหรับความแข็งแกร่ง
        พฤติกรรมการตัด และรูปลักษณ์)
    wood_slice_edge_style:
      name: ขอบแผ่นไม้สไตล์
      description: สภาพขอบของชิ้นไม้ เช่น ขอบที่มีเปลือกไม้ตามธรรมชาติ กับขอบที่เรียบ/ขัดแล้ว
    wooden_block_special_features:
      name: คุณสมบัติพิเศษของบล็อกไม้
      description: คุณสมบัติการใช้งานที่โดดเด่นของชุดบล็อกไม้
    woodwind_body_construction:
      name: โครงสร้างตัวเครื่องเครื่องเป่าลมไม้
      description: ระบุว่าเครื่องดนตรีนั้นทำจากชิ้นเดียวหรือหลายส่วน (เช่น 2 ชิ้น/3
        ชิ้น) ซึ่งส่งผลต่อการทำความสะอาด การจัดเก็บ และการพกพา
    woodwind_polishing_cloth_intended_use:
      name: ผ้าสำหรับขัดเครื่องเป่าลมไม้ วัตถุประสงค์การใช้งาน
      description: ระบุว่าผ้าชนิดนี้ออกแบบมาเพื่อทำความสะอาด/ขัดเงาเครื่องดนตรีประเภทเครื่องเป่าลมไม้เป็นหลัก
    woodwind_small_part_type:
      name: ประเภทเครื่องเป่าลมไม้ขนาดเล็ก
      description: ระบุประเภทของชิ้นส่วนอะไหล่ขนาดเล็กสำหรับคลาริเน็ต (เช่น ชิ้นส่วนกลไกการกดคีย์,
        แผ่นรอง/จุก/สักหลาด, วงแหวน)
    woofer_mounting_type:
      name: ประเภทการติดตั้งวูฟเฟอร์
      description: วิธีการติดตั้ง/ใช้งานวูฟเฟอร์ (แบบเปิดโล่งเทียบกับแบบมีตู้) และรูปแบบการติดตั้งทั่วไปในรถยนต์
    woofer_surround_material:
      name: วัสดุขอบลำโพงวูฟเฟอร์
      description: วัสดุที่ใช้ทำขอบลำโพงวูฟเฟอร์ (วงแหวนรองรับด้านนอก)
    worn_on_finger:
      name: นิ้วที่สึกหรอ
      description: ระบุว่าควรใช้ตัวนำปลอกนิ้วกับนิ้วใด
    wrap_style:
      name: สไตล์การห่อ
      description: ระบุจำนวนครั้งที่เข็มขัดสามารถพันรอบเอวได้
    wrapping_occasion:
      name: โอกาสพิเศษ
      description: การให้ของขวัญหลัก/โอกาสเฉลิมฉลองที่ Paper ห่อของขวัญมีไว้สำหรับ
    wrapping_paper_features:
      name: คุณสมบัติของ Paper ห่อของขวัญ
      description: คุณสมบัติเชิงฟังก์ชันและที่เกี่ยวข้องกับความยั่งยืนของกระดาษห่อของขวัญ
        เช่น ความทนทานต่อการฉีกขาด ปริมาณวัสดุรีไซเคิล หรือรูปแบบแผ่นกระดาษที่ตัดสำเร็จแล้ว
    wrestling_dummy_design:
      name: การออกแบบหุ่นฝึกซ้อมมวยปล้ำ
      description: Shapes โดยรวมหรือท่าทางของหุ่นฝึกซ้อม เช่น Shapes ของมนุษย์ที่ยืน
        หรือรูปร่างของกระสอบทราย ซึ่งเป็นตัวกำหนดแบบฝึกหัดที่เหมาะสม
    wrestling_mat_safety_certifications:
      name: ใบรับรองความปลอดภัยสำหรับเสื่อมวยปล้ำ
      description: แสดงมาตรฐานหรือการรับรองด้านความปลอดภัยจากหน่วยงานอุตสาหกรรมหรือองค์กรกีฬาที่เสื่อรองรับ
    wrist_strap_style:
      name: รูปแบบสายรัดข้อมือ
      description: อธิบายลักษณะของสายรัดข้อมือ (หรือขาดไป) ที่ส่งผลต่อความช่วยเหลือและความพอดี
    wrist_support_style:
      name: ข้อมือช่วยเหลือสไตล์
      description: ระบุโครงสร้างหรือรูปแบบของความช่วยเหลือข้อมือ เช่น อุปกรณ์พยุง
        ถุงมือ เทป หรือผ้าห่อตัว เพื่อช่วยเหลือผู้ใช้การกำหนดลักษณะและการเลือกประสิทธิภาพ
    xylophone_range_octaves:
      name: ช่วงเสียงของระนาด (อ็อกเทฟ)
      description: ช่วงเสียงทั้งหมดของระนาดแสดงเป็นอ็อกเทฟ (เช่น 2.5 อ็อกเทฟ, 3 อ็อกเทฟ,
        4 อ็อกเทฟ)
    xylophone_resonator_type:
      name: ระนาดชนิดเรโซเนเตอร์
      description: ประเภทของระบบเรโซเนเตอร์ที่ใช้ในการขยายเสียง (ถ้ามี)
    yam_variety:
      name: พันธุ์มันเทศ
      description: ระบุพันธุ์หรือสายพันธุ์ทั่วไปของมันเทศที่จำหน่าย (เช่น มันเทศสีม่วง
        มันเทศสีเหลือง มันเทศเท้าช้าง)
    yarn_cutter_physical_style:
      name: สไตล์ทางกายภาพของเครื่องตัดเส้นด้าย
      description: ระบุรูปแบบทางกายภาพของเครื่องตัดเส้นด้าย (เช่น แบบจี้ แบบวงแหวน
        แบบกรรไกร) เพื่อช่วยในการเรียกดูและกรองข้อมูลภายในหมวดหมู่นี้
    yarn_finish_or_effect:
      name: การตกแต่งหรือลักษณะของเส้นด้าย
      description: Highlight พิเศษด้านภาพหรือฟังก์ชันการใช้งานที่ใช้กับเส้นด้าย เช่น
        การเรืองแสงหรือประกายโลหะ
    yarn_guide_style:
      name: สไตล์คู่มือเส้นด้าย
      description: ลักษณะทางกายภาพของส่วนประกอบนำทางเส้นด้าย
    yarn_swift_adjustability:
      name: ความสามารถในการปรับระดับของรอกด้าย
      description: ระบุว่าสามารถปรับความตึงของด้ายได้หรือไม่และอย่างไร (ขยายได้ พับเก็บ/พับได้)
        ซึ่งส่งผลต่อการจัดเก็บและช่วงของเส้นด้ายที่สามารถใช้งานกับด้ายม้วนได้
    yarn_swift_bearing_type:
      name: ตลับลูกปืนแบบสวิฟท์เส้นด้าย
      description: อธิบายกลไกช่วยการหมุน (เช่น ตลับลูกปืน) ที่ส่งผลต่อความราบรื่นและความเร็วในการหมุน
    yeast_application:
      name: การใช้ยีสต์
      description: ระบุวัตถุประสงค์หลักในการทำอาหารหรือการหมักของผลิตภัณฑ์ยีสต์
    yo_yo_accessory_part_type:
      name: ประเภทอุปกรณ์เสริม/ชิ้นส่วนโยโย่
      description: ระบุว่าสินค้าเป็นอะไหล่หรืออุปกรณ์เสริมโยโย่ประเภทใด (เช่น แบริ่ง,
        แผ่นตอบสนอง)
    yo_yo_axle_system_type:
      name: ประเภทของระบบแกนโยโย่
      description: วิธีการออกแบบโครงสร้างของแกนล้อโยโย่ (เช่น แกนล้อแบบตายตัวเทียบกับแกนล้อแบบเปลี่ยนเกียร์)
        ส่งผลต่อความรู้สึกในการเล่นและการบำรุงรักษา
    yo_yo_bearing_size_class:
      name: ขนาดของลูกปืนโยโย่
      description: ขนาดตลับลูกปืนมาตรฐานที่ใช้ในโยโย่ (ถ้ามี)
    yo_yo_bearing_type:
      name: ลูกปืนโยโย่
      description: การกำหนดค่าของตลับลูกปืนที่ Influence การตอบสนองและลักษณะการหมุน
    yo_yo_play_style:
      name: รูปแบบการเล่นโยโย่
      description: รูปแบบการเล่นที่ตั้งใจไว้เบื้องต้นของโยโย่ สะท้อนถึงรูปแบบ/ทริคที่สินค้าถูกออกแบบมา
    yo_yo_response_system:
      name: ระบบตอบสนองแบบโยโย่
      description: ระบุกลไกการตอบสนองแบบโยโย่ที่ชิ้นส่วนนี้ได้รับการออกแบบมาเพื่อรองรับ
        (ความเข้ากันได้)
    yo_yo_responsiveness:
      name: การตอบสนองแบบโยโย่
      description: ไม่ว่าโยโย่จะกลับมาที่มือด้วยการดึง (แบบตอบสนอง) หรือต้องใช้การผูกเชือก
        (แบบไม่ตอบสนอง)
    yo_yo_string_material:
      name: โยโย่วัสดุ
      description: ส่วนประกอบของวัสดุที่ใช้ทำเชือกโยโย่
    yogurt_base_ingredient:
      name: ส่วนผสมหลักของโยเกิร์ต
      description: ระบุแหล่งที่มาหลักของนมหรือพืชที่ใช้ในการผลิตโยเกิร์ต ซึ่งมีความสำคัญต่อความชอบด้านอาหารและการพิจารณาเรื่องสารก่อภูมิแพ้
    yoke_type:
      name: ประเภทของโครงยึด
      description: ระบุรูปแบบของโครงยึดหรือแอกที่รองรับปืนบนขาตั้งกล้องแบบขาเดียว
    zill_playing_style:
      name: สไตล์การเล่นซิลล์
      description: Contextการเล่นที่ตั้งใจไว้ /สไตล์ (โดยทั่วไปคือระบำหน้าท้อง vs
        ออร์เคสตรา/วัฒนธรรมการรับรู้สินค้า)
    zill_strap_material:
      name: 'วัสดุสายรัด Zill '
      description: วัสดุของสายรัดนิ้ว/ยางยืดที่ใช้ยึดซี่กลอง (ถ้ามี) ความสบาย Impact
        ความทนทาน และการยึดเกาะ
    zills_strap_adjustability:
      name: ความสามารถในการปรับสายรัดของ Zills
      description: สามารถปรับสายรัด/ยางยืดที่ให้มาอย่างไร และปรับให้พอดีกับรูปร่างได้หรือไม่
    zipper_application:
      name: แอปพลิเคชั่นซิป
      description: ระบุโครงการที่ต้องการหรือแอปพลิเคชันที่ซิปได้รับการออกแบบ
    zipper_chain_type:
      name: แบบโซ่ซิป
      description: ระบุโครงสร้าง/ประเภทของโซ่/ฟันซิป
    zipper_end_type:
      name: แบบซิปปิดปลาย
      description: ระบุว่าซิปสิ้นสุดอย่างไร และเป็นแบบแยกปลาย (ปลายเปิด) หรือแบบปลายปิด
        (ไม่แยกปลาย) รวมถึงซิปแบบแยกปลายทั่วไปที่ใช้ในซิป Craft
    zipper_gauge:
      name: ขนาดเกจซิป
      description: 'ระบุขนาดเกจ/ขนาดของโซ่ซิป โดยทั่วไปจะแสดงเป็นตัวเลขพร้อมเครื่องหมาย
        # (เช่น #3 หรือ #5) ซึ่งสัมพันธ์กับความกว้างของฟัน/ขดลวด และการใช้งานที่ต้องการ'
    zipper_opening_length:
      name: ความยาวของช่องเปิดซิป
      description: กำหนดว่าส่วนใดของช่องเปิดด้านหน้าที่มีซิป เพื่อแยกความแตกต่างระหว่างแบบซิปเต็มตัว
        แบบซิปครึ่งตัว หรือแบบซิปหนึ่งในสี่
    zipper_pull_material:
      name: วัสดุดึงซิป
      description: ระบุวัสดุของตัวดึงซิป (ส่วนที่ใช้จับ) ซึ่งแตกต่างจากฟันซิป/โซ่ซิปและแถบซิป
    zipper_pull_side:
      name: ด้านดึงซิป
      description: ระบุว่าสามารถดึงแถบดึงซิปได้จากด้านใดบ้าง
    zipper_pull_strap_cord_tab_material:
      name: สายดึงซิป/เชือก/วัสดุ
      description: วัสดุของสายรัด/สายไฟ/ อุปกรณ์เสริม/พู่ที่ติดกับตัวดึงซิป (ถ้ามี)
        ไม่รวมตัวดึงซิปหลักฮาร์ดแวร์/ตัวเครื่อง
    zipper_reversibility_mechanism:
      name: กลไกซิปแบบกลับด้านได้
      description: ระบุลักษณะการใช้งานซิปแบบกลับด้านได้ (เช่น ซิปแบบเลื่อนสองด้าน
        หรือซิปแบบพลิก/ล็อคอัตโนมัติที่ออกแบบมาสำหรับเสื้อผ้าที่ใส่ได้สองด้าน)
    zipper_separating_type:
      name: ประเภทซิปแยก
      description: ระบุว่าซิปแยกออกจากกันที่ด้านล่าง/ด้านบน หรือเป็นแบบปิดปลาย เพื่อให้พอดีกับแจ็คเก็ต
        ถุงนอน กระเป๋า ฯลฯ
    zipper_side:
      name: ซิปด้านข้าง
      description: ระบุด้านที่ซิปหลักอยู่เมื่อถุงนอนหงายขึ้น
    zipper_slider_material:
      name: วัสดุสำหรับตัวเลื่อนซิป
      description: ระบุวัสดุของตัวเลื่อนซิป (กลไกการเคลื่อนที่) ซึ่งสามารถ Impact
        ความแข็งแรงต่อแรงกระแทกและความต้านทานต่อการกัดกร่อนได้
    zipper_slider_pull_configuration:
      name: การกำหนดค่าตัวเลื่อน/ดึงซิป
      description: ระบุว่าซิปมีตัวเลื่อน/ตัวดึงหนึ่งตัวหรือสองตัว และตัวดึงอยู่ด้านเดียวหรือทั้งสองด้านของตัวเลื่อน
    zipper_style:
      name: สไตล์ซิป
      description: ระบุความยาวของซิปหรือการมีอยู่ของซิปบนเสื้อผ้า (เช่น ไม่มีซิป,
        ซิปสั้น, ซิปครึ่งตัว, ซิปเต็มตัว)
    zipper_tape_material:
      name: วัสดุที่ใช้ทำเทปซิป
      description: ระบุวัสดุหลักของแถบซิป (ด้านผ้า) ที่จะเย็บติดกับชิ้นงาน
    zipper_teeth_type:
      name: ประเภทฟันซิป
      description: ระบุรูปแบบการผลิตของโซ่/ฟันซิป (เช่น แบบขดลวด พลาสติกขึ้นรูป โลหะ
        แบบซ่อน) ซึ่งส่งผลต่อความยืดหยุ่น ความแข็งแรง และการใช้งานทั่วไป
