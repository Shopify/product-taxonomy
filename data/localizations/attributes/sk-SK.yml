    lid_vent_type:
      name: Typ vetracieho otvoru na pokrievke
      description: Označuje, či a ako pokrievka umožňuje únik pary.
    lift_mechanism:
      name: Zdvíhací mechanizmus
      description: Označuje ovládací mechanizmus používaný na zdvíhanie, spúšťanie
