    lamp_shade_fitter_type:
      name: Typ montáže tienidla lampy
      description: Definuje mechanizmus upevnenia medzi tienidlom a lampou, čím zabezpečuje
        kompatibilitu bez dohadov.
    lamp_shade_shape:
      name: Tvar tienidla lampy
      description: Určuje geometrický tvar tienidla, čo zákazníkom umožňuje rýchlo
        nájsť požadované siluety.
    lamp_shade_translucency:
      name: Priesvitnosť tienidla lampy
      description: Popisuje, koľko svetla prechádza cez tienidlo, a pomáha používateľom
