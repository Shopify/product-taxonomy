      description: Označuje spôsob prevádzky alebo mechanizmus pohonu bazénového vysávača.
    popcorn_kernel_variety:
      name: Odroda zrna popcornu
      description: Určuje prirodzenú odrodu alebo tvar zrna popcornu.
    portafilter_type:
