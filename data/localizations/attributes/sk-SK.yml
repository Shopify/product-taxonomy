      name: Vhodný typ povrchu bazéna
      description: Stanovuje materiály povrchu bazéna, pre ktoré je kefa/metla určená,
        čím zabraňuje poškodeniu povrchu a zabezpečuje optimálne čistenie.
    suitable_spread_material:
      name: Vhodný posypový materiál
      description: Označuje typy materiálov, na ktoré je rozmetadlo určené.
    sundial_type:
      name: Typ slnečných hodín
      description: Označuje štýl dizajnu alebo vedeckú konfiguráciu slnečných hodín.
    supplement_function:
      name: Funkcia doplnku
      description: Klasifikuje doplnky podľa ich primárneho účelu a pomáha pestovateľom
        vybrať si správnu prísadu pre špecifické potreby rastlín.
    surface_reflectivity:
      name: Povrchová odrazivosť
      description: Označuje, či je povrch značky navrhnutý tak, aby odrážal svetlo
        pre lepšiu viditeľnosť v noci.
    sweetener_type:
      name: Typ sladidla
      description: Označuje hlavné sladidlo použité v sirupe.
    table_skirt_pleat_style:
      name: Štýl skladania alebo riasenia sukne
      description: Definuje dekoratívny štýl skladania alebo riasenia sukne, čím pomáha
        zákazníkom pri zlaďovaní estetických motívov.
    tablecloth_clip_design:
      name: Dizajn spony na obrus
      description: Opisuje mechanizmus alebo dizajn spony na obrus.
    tablecloth_features:
      name: Vlastnosti obrusu
      description: Zdôrazňuje špeciálne vlastnosti alebo dizajn obrusu.
    tamper_evident_feature:
      name: Funkcia ochrany pred neoprávnenou manipuláciou
      description: Označuje prítomnosť a štýl funkcie ochrany proti neoprávnenej manipulácii
        zabudovanej do uzáveru.
    tang_type:
      name: Typ stopky
      description: Označuje dizajn čepele noža, ktorý špecifikuje, ako ďaleko zasahuje
        kov čepele do rukoväte.
    teapot_spout_style:
      name: Štýl výlevky čajníka
      description: Opisuje dizajn nalievacieho hrdla kanvice na čaj, ktorý ovplyvňuje
        ovládanie nalievania a vzhľad.
    temperature_zones:
      name: Teplotné pásma
      description: Určuje, koľko nezávisle ovládateľných teplotných zón ponúka chladnička
        na víno.
    thermocouple_junction_type:
      name: Typ termočlánkového spoja
      description: Označuje konštrukciu snímacieho spoja, ktorá ovplyvňuje čas odozvy
        a elektrickú izoláciu.
    thermometer_design:
      name: Dizajn teplomera
      description: Špecifikuje základný spôsob fungovania alebo technológiu domáceho
        teplomeru.
    thermos_handle_type:
      name: Typ rukoväte termosky
      description: Opisuje štýl rukoväte alebo pomôcky na prenášanie integrovanej
        do termosky.
    thread_standard:
      name: Štandard závitu
      description: Označuje špecifikáciu závitu použitú na pripojeniach príslušenstva,
        aby sa zabezpečila vzájomná kompatibilita s inštalatérskymi komponentmi.
    tilt_mechanism:
      name: Mechanizmus preklápania
      description: Určuje mechanizmus, ktorý umožňuje nakloneniu striešky pre optimálne
        nastavenie tienidla.
    time_format:
      name: Formát času
      description: Označuje, či hodiny dokážu zobrazovať čas v 12-hodinovom, 24-hodinovom
        alebo oboch formátoch.
    timer_mechanism:
      name: Mechanizmus časovača
      description: Udáva základný mechanizmus používaný na meranie času.
    tine_position:
      name: Poloha hrotov
      description: Opisuje konfiguráciu hrotov vzhľadom na kolesá/motor, ktorá ovplyvňuje
        manévrovateľnosť a prenikanie do pôdy.
    tire_construction:
      name: Konštrukcia pneumatiky
      description: Označuje metódu vnútornej konštrukcie kostry pneumatiky.
    tire_construction_type:
      name: Typ konštrukcie pneumatiky
      description: Uvádza, či má pneumatika diagonálnu alebo radiálnu konštrukciu,
        čo ovplyvňuje flexibilitu, nosnosť a kvalitu jazdy.
    tire_tread_pattern:
      name: Vzor dezénu pneumatiky
      description: Popisuje štýl behúňa pneumatiky, ktorý udáva vhodnosť pre rôzne
        povrchy a potreby trakcie.
    tissue_lotion_content:
      name: Obsah telového mlieka
      description: Označuje, či sú obrúsky napustené telový mliekom alebo inými upokojujúcimi
        prísadami.
    toaster_features:
      name: Funkcie hriankovača
      description: Zoznam špeciálnych funkcií a dizajnových prvkov dostupných na hriankovači.
    tong_type:
      name: Typ klieští
      description: Určuje primárny štýl alebo zamýšľané použitie klieští.
    toothbrush_holder_features:
      name: Funkcie držiaka na zubnú kefku
      description: Zdôrazňuje špeciálne funkcie alebo dizajnové prvky, ktoré odlišujú
        držiak.
    toothpick_dispensing_mechanism:
      name: Mechanizmus dávkovania špáradla
      description: Označuje mechanizmus, ktorým sa špáradlá vydávajú.
    topographical_relief:
      name: Topografický reliéf
      description: Označuje, či povrch glóbusu vykazuje vyvýšenú topografiu.
    towel_holder_design:
      name: Dizajn držiaka na uteráky
      description: Opisuje vzhľad držiaka na uteráky, napríklad tyč alebo krúžok.
    towel_weave:
      name: Tkanina uterákov
      description: Opisuje druh tkaniny uteráka, ktorý ovplyvňuje textúru, savosť
        a čas schnutia.
    track_lighting_rail_type:
      name: Typ koľajnice pre koľajnicové osvetlenie
      description: Definuje mechanický/elektrický štandard koľajnice a určuje, ktoré
        upevňovacie prvky a konektory sú kompatibilné.
    track_lighting_system_compatibility:
      name: Kompatibilita systému koľajnicového osvetlenia
      description: Určuje elektrický a mechanický štandard koľajnice, pre ktorú je
        svietidlo alebo príslušenstvo určené.
    track_rail_circuit_configuration:
      name: Konfigurácia obvodu koľajnice
      description: Označuje počet alebo typ elektrických obvodov, ktoré koľajnica
        podporuje, čo ovplyvňuje nezávislé ovládanie skupín svietidiel.
    track_system_standard:
      name: Štandard koľajnicového systému
      description: Označuje fyzický štandard koľajnice, na ktorú sa napájací zdroj
        hodí, čo umožňuje zákazníkom prispôsobiť komponenty ich koľajnici (napr. H,
        J alebo L-koľajnica).
    tractor_tire_application:
      name: Použitie pneumatík pre traktory
      description: Označuje primárne použitie alebo prostredie, pre ktoré je pneumatika
        určená.
    tractor_tire_tread_classification:
      name: Klasifikácia dezénu pneumatík traktorov
      description: Klasifikuje dezén pneumatík traktorov podľa poľnohospodárskych
        a priemyselných noriem.
    tree_shape:
      name: Tvar stromu
      description: Opisuje celkovú siluetu alebo profil umelého stromčeka.
    trigger_type:
      name: Typ spúšťača
      description: Určuje spúšťací mechanizmus používaný na reguláciu prietoku vody
        v tryske.
    trimmer_line_feed_system:
      name: Spôsob vysúvania struny krovinorezu
      description: Udáva spôsob, akým sa počas prevádzky vysúva rezacia struna z hlavy
        zariadenia.
    trimmer_line_shape:
      name: Tvar struny krovinorezu
      description: Opisuje priečny rez strunou krovinorezu, ktorý ovplyvňuje rezný
        výkon a hlučnosť.
    turntable_type:
      name: Typ otočného taniera
      description: Označuje štýl varného povrchu, rozlišuje medzi tradičnými otočnými
        sklenenými otočnými taniermi a plochými alebo neotočnými konštrukciami.
    ultrasonic_cleaner_accessories_included:
      name: Súčasťou balenia je príslušenstvo ultrazvukového čističa
      description: Uvádza ďalšie komponenty dodávané s čistiacim prostriedkom, aby
        zákazníci presne vedeli, čo je v škatuli.
    umbrella_base_type:
      name: Typ základne dáždnika
      description: Definuje štrukturálny štýl alebo montážny dizajn základne.
    umbrella_opening_mechanism:
      name: Mechanizmus otvárania dáždnika
      description: Určuje spôsob otvárania a zatvárania striešky dáždnika.
    umbrella_type:
      name: Typ dáždnika
      description: Určuje celkový dizajn alebo tvar dáždnika.
    upf_rating:
      name: Hodnotenie UPF
      description: Označuje faktor ochrany pred ultrafialovým žiarením (UPF) tkaniny
        slnečníka, ktorý kvantifikuje jej účinnosť pri blokovaní škodlivého UV žiarenia.
    utensil_flexibility:
      name: Flexibilita nástrojov
      description: Uvádza, aká je tuhosť alebo ohybnosť tela škrabky, čo ovplyvňuje
        jej vhodnosť pre zakrivené misy alebo tuhé cesto.
    utensil_holder_features:
      name: Funkcie držiaka na kuchynské náčinie
      description: Opisuje špeciálne funkčné vlastnosti držiaka kuchynského náčinia.
    utensil_tray_features:
      name: Funkcie organizéra kuchynského náčinia.
      description: Zdôrazňuje špeciálne vlastnosti, ktoré zlepšujú funkčnosť organizéra.
    vacuum_hose_connection_type:
      name: Typ pripojenia vákuovej hadice
      description: Opisuje štýl konektora na koncoch hadice, ktorý zabezpečuje správne
        mechanické uloženie s vysávačmi alebo príslušenstvom.
    valance_style:
      name: Štýl volánu
      description: Identifikuje dekoratívny dizajn volánu a pomáha zákazníkom vybrať
        si štýl, ktorý ladí s ich interiérom.
    valet_organizer_features:
      name: Vlastnosti organizéra vešiakov
      description: Zdôrazňuje špecifické organizačné funkcie integrované do nabíjacieho
        organizéra.
    valve_configuration:
      name: Konfigurácia ventilu
      description: Definuje funkčný štýl ventilu záhradnej hadice a pomáha kupujúcim
        rýchlo vybrať správne riešenie pre ich zavlažovacie zariadenie.
    valve_stem_angle:
      name: Uhol ventilu
      description: Určuje orientáciu/uhol ventilu vzhľadom na dušu, čo ovplyvňuje
        ľahkosť nahustenia a prispôsobenie ráfiku.
    vase_filler_type:
      name: Typ výplne do vázy
      description: Kategorizuje produkt podľa konkrétneho druhu výplňového materiálu
        alebo formy.
    vent_pipe_type:
      name: Typ vetracieho potrubia
      description: Klasifikuje konštrukčný štýl komína alebo vetracieho potrubia.
    vent_style:
      name: Štýl vetracieho komponentu
      description: Klasifikuje konštrukčný štýl alebo účel vetracieho komponentu.
    waffle_style:
      name: Vzor vafle
      description: Označuje mriežku alebo vzor vaflí vytvorený platňami.
    wallpaper_removal_type:
      name: Spôsob odstraňovania tapety
      description: Označuje ľahkosť odstránenia pri maľovaní.
    wallpaper_washability_rating:
      name: Stupeň umývateľnosti tapety
      description: Definuje, ako sa dá povrch tapety čistiť po nalepení.
    warmer_type:
      name: Typ ohrievača
      description: Určuje primárny mechanizmus ohrevu alebo zamýšľané použitie ohrievača
        na sviečky alebo olej.
    warmth_level:
      name: Úroveň tepelného komfortu
      description: Klasifikuje celkovú úroveň tepelného komfortu alebo sezónnu vhodnosť
        prikrývky alebo paplóna.
    warmth_rating:
      name: Stupeň tepelného komfortu
      description: Označuje úroveň izolácie prikrývky, podobne ako hodnoty TOG v posteľnej
        bielizni.
    waste_container_lid_features:
      name: Vlastnosti veka odpadkového koša
      description: Zdôrazňuje špeciálne funkcie alebo vylepšenia zabudované do veka.
    waste_container_sign_message:
      name: Správa na značke kontajnera na odpad
      description: Definuje konkrétny prúd odpadu alebo výstražný text vytlačený na
        štítku alebo značke.
    water_filtration_technology:
      name: Technológia filtrácie vody
      description: Opisuje základnú technológiu alebo mechanizmus používaný na čistenie
        vody.
    water_heater_element_connection_type:
      name: Typ pripojenia ohrievača vody
      description: Identifikuje spôsob montáže prvku, pričom rozlišuje medzi skrutkovaním
        a rôznymi typmi prírub.
    water_sensor_design:
      name: Dizajn snímača vody
      description: Určuje fyzikálny štýl prvku na snímanie vody.
    water_supply_type:
      name: Typ zásobovania vodou
      description: Určuje spôsob, akým spotrebič prijíma vodu, pričom rozlišuje medzi
        ručne plnenými zásobníkmi a napojenými vodovodnými potrubiami.
    watering_needs:
      name: Potreba zavlažovania
      description: Opisuje typické požiadavky rastliny na vodu.
    wax_paper_form:
      name: Forma voskového papiera
      description: Určuje, či sa voskový papier predáva ako nepretržitá rolka alebo
        ako vopred narezané listy.
    weather_guard_mounting_method:
      name: Spôsob montáže ochrany pred poveternostnými vplyvmi
      description: Určuje, ako sa ochranný kryt pripevňuje k podávaču alebo nosnej
        konštrukcii.
    wheel_bearing_type:
      name: Typ ložiska kolesa
      description: Označuje konštrukciu vnútorného ložiska alebo puzdra kolesa, ktorá
        ovplyvňuje plynulosť odvaľovania a požiadavky na údržbu.
    wheel_tread_style:
      name: Štýl dezénu kolesa
      description: Určuje dezén kolesa, ktorý ovplyvňuje trakciu, hladinu hluku a
        potenciálne značenie podlahy.
    whistling:
      name: Pískanie
      description: Určuje, či kanvica vydáva pískací zvuk, keď voda dosiahne bod varu.
    wick_material:
      name: Materiál knôtu
      description: Označuje zloženie použitého knôtu (napr. bavlna, sklolaminát).
    window_film_installation_surface:
      name: Povrch na inštaláciu okennej fólie
      description: Určuje, či je fólia určená na vnútorné, vonkajšie alebo obojstranné
        použitie.
    window_film_type:
      name: Typ okennej fólie
      description: Kategorizuje funkčný štýl filmu (napr. súkromie vs. bezpečnosť).
    window_rod_type:
      name: Typ okennej tyče
      description: Klasifikuje funkčný štýl okennej tyče.
    window_screen_type:
      name: Typ okennej mriežky
      description: Definuje štrukturálny štýl alebo spôsob ovládania obrazovky.
    window_treatment_lining_type:
      name: Typ podšívky okenných záclon
      description: Označuje, či je volán alebo okraj podšitý a aký druh podšívky je
        použitý.
    wine_aerator_type:
      name: Typ prevzdušňovača vína
      description: Určuje tvar alebo spôsob ovládania prevzdušňovača vína.
    wine_glass_style:
      name: Štýl pohárov na víno
      description: Uvádza zamýšľaný druh vína alebo dizajn pohára na optimalizáciu
        arómy a chuti.
    wok_bottom_type:
      name: Typ dna woku
      description: Určuje tvar základne woku, čím sa stanovuje kompatibilita s rôznymi
        typmi sporákov a wokových krúžkov.
    wood_grain_orientation:
      name: Orientácia drevených vlákien
      description: Určuje orientáciu drevených vlákien v produkte, ako napríklad koncové
        vlákno, okrajové vlákno alebo lícne vlákno. Orientácia vlákien ovplyvňuje
        odolnosť a vhodnosť pre nože.
    wood_seasoning_method:
      name: Metóda sušenia dreva
      description: Uvádza, ako bolo drevné palivo sušené alebo vyzreté, čo ovplyvňuje
        obsah vlhkosti a kvalitu spaľovania.
    wrap_format:
      name: Formát balenia
      description: Určuje fyzickú formu, v akej je potravinová fólia dodávaná, napríklad
        v rolkách alebo vopred narezaných listoch.
    abacus_bead_material:
      name: Materiál korálikov počítadla
      description: Primárny materiál korálikov počítadla.
    abec_rating:
      name: Hodnotenie ABEC
      description: Určuje stupeň presnosti ložísk na základe klasifikácie ABEC, pričom
        udáva úrovne hladkosti a tolerancie.
    abrasive_level:
      name: Úroveň abrazíva
      description: Relatívna rezná sila leštidla/zmesi na automobilových povrchových
        úpravách.
    absinthe_accessories_included:
      name: Vrátane príslušenstva k absintu
      description: podrobne opíšte akékoľvek príslušenstvo, ktoré je súčasťou balenia
        produktu, ako sú lyžičky, poháre alebo kocky cukru.
    ac_compressor_mounting_style:
      name: Spôsob montáže kompresora klimatizácie
      description: Opisuje spôsob mechanickej montáže/upevnenia alebo rozhranie konzoly
        kompresora k systému pohonu motora/príslušenstva.
    ac_compressor_oil_type:
      name: Typ oleja kompresora klimatizácie
      description: Určuje chemické zloženie mazacieho oleja vyžadované/používané kompresorom
        klimatizácie (medzi bežné typy patria PAG a POE).
    accent_modes:
      name: Režimy zvýraznenia
      description: Určuje, ako môže metronóm zvýrazňovať doby v takte (kliknutie na
        Beyond Basic Shopify ).
    access_mechanism:
      name: Prístupový mechanizmus
      description: Opisuje, ako sa používateľ dostane na spaciu plošinu Loft .
    accessibility_features:
      name: Funkcie prístupnosti
      description: Špecifikuje vybavenie a konfigurácie mikrobusu súvisiace s prístupnosťou.
    accessories_included:
      name: Vrátane príslušenstva
      description: Uvádza doplnkové položky, ktoré sa dodávajú s kreslom (napr. taburetka,
        bedrový vankúš), čo poskytuje nakupujúcim jasný prehľad o pridanej hodnote.
    accessory_pieces_included:
      name: Vrátane dielov príslušenstva
      description: Uvádza doplnkové položky, ktoré sú súčasťou viacdielnej darčekovej
        súpravy doplnkov oblečenia alebo balíka.
    acoustic_amplifier_feedback_control_features:
      name: Ovládacie prvky akustického zosilňovača spätná väzba
      description: Označuje vstavané nástroje proti spätnej väzbe pre akustické nástroje
        (napr. zárezový filter, fázový spínač, automatické potlačenie spätnej väzby).
    acoustic_drum_kit_components_included:
      name: Súčasťou balenia súpravy akustických bicích
      description: Označuje, ktoré hlavné komponenty sú zahrnuté v súprave (len korpusy
        alebo kompletná súprava; vrátane činelov/hardvér).
    acoustic_guitar_body_shape:
      name: Tvar tela akustickej gitary
      description: Opisuje Shapes/obrys tela akustickej gitary, ktoré ovplyvňujú tón,
        pohodlie a typické použitie.
    acoustic_guitar_string_core_design:
      name: Dizajn jadra struny na akustickú gitaru
      description: Jadrová konštrukcia navinutého reťazca.
    acoustic_piano_key_material:
      name: Materiál klávesov akustického klavíra
      description: Uvádza základný materiál použitý na hornú časť klávesov/klávesy
        klavíra.
    acoustic_piano_lid_type:
      name: Typ veka pre akustické klavíry
      description: Určuje štýl mechanizmu veka/krytu použitého na akustickom klavíri
        (pre rozlíšenie medzi krídlovým/zvislým sklopným krytom/horným vekom).
    acoustic_piano_plate_frame_material:
      name: Materiál dosky/rámu akustického klavíra
      description: Určuje hlavný materiál klavírnej dosky/Frame (harfy), bežne liatina.
    acoustic_piano_soundboard_material:
      name: Materiál rezonančnej dosky akustického klavíra
      description: Určuje primárny materiál použitý na rezonančnú dosku klavíra.
    action_figure_scale:
      name: Mierka akčnej figúrky
      description: Označuje pomer mierky pre zberateľov (napr. 1:12), pre ktorú je
        toto príslušenstvo určené.
    action_type:
      name: Typ akcie
      description: Opisuje mechanizmus streľby alebo napínania zbrane (napr. záverový
        mechanizmus, mechanizmus s prelamovaním hlavne, pákový mechanizmus).
    actuation_mechanism:
      name: Ovládací mechanizmus
      description: 'Označuje, ako páka ovláda brzdový systém: čisto mechanický lankový,
        plne hydraulický, hydraulicky ovládaný lankom alebo elektronický/bezdrôtový.'
    actuation_method:
      name: Metóda spustenia
      description: Ako sa aktivuje alebo uvoľňuje systém tlmenia.
    adapter_orientation:
      name: Orientácia adaptéra
      description: Určuje uhol alebo konfiguráciu adaptéra ventilu pneumatiky bicykla,
        čo ovplyvňuje prístupnosť pumpy (napr. rovný, 90°).
    additive_application_stage:
      name: Fáza aditívnej aplikácie
      description: Označuje, v ktorej fáze procesu je produkt určený na použitie.
    adhesive_backing:
      name: Lepiaca podložka
      description: Či má potlačiteľný hodváb lepiacu podložku pre aplikáciu metódou
        odlepovania a lepenia.
    adhesive_formulation:
      name: Lepidlo
      description: Označuje chemickú bázu alebo zloženie lepidla, napríklad kyanoakrylát
        alebo epoxid.
    adhesive_sides:
      name: Lepiace strany
      description: Označuje, či je taviteľné lepidlo na jednej alebo oboch stranách
        pásky/rúna.
    adjunct_grain_processing_form:
      name: Doplnkový formulár na spracovanie obilia
      description: Označuje fyzickú/spracovateľskú formu prídavného zrna predávaného
        na varenie piva (napr. vločkové, torifikované, sladované, surové).
    adjustability_type:
      name: Typ nastaviteľnosti
      description: Určuje, aký druh prípadného nastavenia vzpera podporuje.
    adjustable_cup_mutes:
      name: Nastaviteľné košíčkové tlmiče
      description: Označuje, či je košíček nastaviteľný/odnímateľný a aký je spôsob
        nastavenia.
    adjustable_zones:
      name: Nastaviteľné zóny
      description: Identifikuje, ktoré časti základne je možné nastaviť nezávisle.
    adjustment_type:
      name: Typ úpravy
      description: Označuje, či je regulátor nastaviteľný a ako sa nastavenie vykonáva.
    administration_method:
      name: Spôsob podávania
      description: Uvádza, ako sa odčervovač podáva koňovi (napr. orálne alebo injekčne),
        čo pomáha nakupujúcim dodržiavať veterinárne pokyny a zvoliť si zvládnuteľnú
        metódu aplikácie.
    advice_card_prompt_type:
      name: Typ výzvy na zobrazenie karty prompt
      description: Typ promptu vytlačeného na karte (alebo absencia promptu).
    aeration_method:
      name: Metóda vetrania
      description: Opisuje typ prevzdušňovania poskytovaného alebo podporovaného kontajnerom,
        ktorý zabezpečuje dostatočné množstvo kyslíka pre živú návnadu.
    aero_package_components:
      name: Komponenty aerodynamického balíka
      description: Označuje, ktoré kľúčové aerodynamické komponenty sú nainštalované
        vo vozidle (vyberte všetky, ktoré pripadajú do úvahy).
    aerodynamic_elements_included:
      name: Vrátane aerodynamických prvkov
      description: Určuje, ktoré aerodynamické komponenty sú súčasťou formulového
        vozidla (vyberte všetky, ktoré sa vzťahujú na daný model, ak je to podporované).
    aftertouch_support:
      name: Podpora Aftertouch
      description: Či už ovládač podporuje aftertouch (kanálový alebo polyfónny) na
        klávesoch/padoch.
    agave_content_classification:
      name: Klasifikácia agáve Obsah
      description: Určuje, či je tequila vyrobená zo 100 % modrej agáve Weber alebo
        ide o zmes, ktorá obsahuje minimálne 51 % agávových cukrov.
    aida_cloth_count:
      name: Hustota látky Aida
      description: Určuje hustotu látky Aida (počet štvorcov/stehov na palec), ktorá
        určuje veľkosť stehu a mierku vzoru.
    aida_cloth_pre_cut_format:
      name: Predrezaný formát látky Aida
      description: Označuje, či sa plátno Aida predáva ako vopred narezaný kus, súvislý
        kus narezaný zo skrutiek alebo na kotúči.
    air_bag_material:
      name: Materiál airbagu
      description: Určuje materiál airbagu/nádrže použitej s írskou warpipe.
    air_bed_internal_construction:
      name: Vnútorná konštrukcia nafukovacej postele
      description: Opisuje vnútornú štruktúru podpery alebo technológiu použitú vo
        vnútri nafukovacieho lôžka pre pohodlie a stabilitu.
    air_dry_clay_color_form:
      name: Forma z hlinenej farby schnúcej na vzduchu
      description: Či sa hlina predáva vopred zafarbená, biela/neutrálna na maľovanie
        alebo ako zmes/asortiment.
    air_hockey_items_included:
      name: Súčasťou balenia je aj položka na vzdušný hokej
      description: Uvádza zoznam konkrétnych doplnkov obsiahnutých v sade, aby zákazníci
        presne vedeli, čo dostanú (napr. 2 tlačidlá, 4 puky, 2 plstené podložky).
    air_intake_temperature_sensor_mounting_style:
      name: Spôsob montáže snímača teploty nasávaného vzduchu
      description: Fyzický spôsob montáže snímača IAT v sacom systéme.
    air_integration_capability:
      name: Schopnosť integrácie vzduchu
      description: Označuje, či a ako potápačský počítač podporuje bezdrôtové vysielače
        tlaku v fľaši.
    air_mattress_valve_type:
      name: Typ ventilu nafukovacieho matraca
      description: Určuje typ ventilu, ku ktorému príslušenstvo pasuje alebo ho obsahuje,
        čím sa zabezpečuje kompatibilita medzi čerpadlami, ventilmi a dielmi na opravu.
    air_water_rocket_kit_items_included:
      name: Súprava vzduchovej a vodnej rakety v cene
      description: Kľúčové komponenty zahrnuté v raketovej sade (odpaľovač, čerpadlo,
        plutvy, náhradné diely).
    air_water_rocket_launch_method:
      name: Metóda Launch rakety vzduch-voda
      description: Ako je raketa natlakovaná/Launch (interakcia s používateľom a štýl
        vybavenia).
    airbag_position:
      name: Poloha airbagu
      description: Určuje zamýšľanú polohu/zónu zadržiavania, časť airbagu, podpora.
    aircraft_ads_b_capability:
      name: Reklama na lietadlá - schopnosť B
      description: Špecifikuje, či je lietadlo vybavené na zhodu s reklama-B Out.
    aircraft_airframe_material:
      name: Materiál draku lietadla
      description: Primárne materiály použité pri konštrukcii draku lietadla.
    aircraft_cabin_configuration:
      name: Konfigurácia kabíny lietadla
      description: Určuje rozloženie kabíny lietadla (napr. konferenčná skupina, diván,
        štvorzónová kabína).
    aircraft_documentation_included:
      name: Dokumentácia k lietadlu je súčasťou balenia
      description: Uvádza, ktoré dokumenty sú dodávané s dielom (napr. 8130-3).
    aircraft_galley_configuration:
      name: Konfigurácia kuchynky lietadla
      description: Prítomnosť a typ kuchynky/občerstvenia v kajute.
    aircraft_installation_location:
      name: Lokalita inštalácie lietadiel
      description: Kde v lietadle je súčiastka alebo príslušenstvo nainštalované alebo
        používané.
    aircraft_internet_connection:
      name: Pripojenie lietadiel k internetu
      description: Označuje prítomnosť/typ internetového pripojenia v kabíne.
    aircraft_landing_gear_type:
      name: Typ podvozku lietadla
      description: Špecifikuje konfiguráciu podvozku vírnika.
    aircraft_lavatory_configuration:
      name: Konfigurácia toaliet v lietadle
      description: Typ konfigurácie záchodov pre nástupné vozidlá.
    aircraft_maintenance_program_enrollment:
      name: Zápis do programu údržby lietadiel
      description: Označuje, či je lietadlo zapísané v programe údržby motora a/alebo
        draku lietadla, a ak áno, aký typ krytia sa uplatňuje (motor, drak lietadla
        alebo oboje).
    aircraft_operational_certification:
      name: Prevádzková certifikácia lietadla
      description: Špecifikuje regulačný alebo prevádzkový certifikačný základ, podľa
        ktorého sa lietadlo prevádzkuje (v závislosti od jurisdikcie, napr. FAA časť
        91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Certifikácia ochranných prostriedkov pre lietadlá
      description: Určuje leteckú/regulačnú alebo priemyselnú normu, ktorú má ochranné
        vybavenie podľa certifikátu spĺňať.
    aircraft_system_application:
      name: Aplikácia leteckého systému
      description: Identifikuje, do ktorého systému alebo oblasti lietadla patrí súčiastka/príslušenstvo
        (používa sa na prehliadanie a filtrovanie rôznych súčiastok lietadla).
    airflow_resistance_level:
      name: Úroveň odporu prúdenia vzduchu
      description: Označuje, ako obmedzujúci je pocit tlmenia z hľadiska protitlaku/odporu
        vzduchu.
    airship_envelope_material:
      name: Materiál plášťa vzducholode
      description: Primárny materiál obalu (plášťa) vzducholode.
    airsoft_part_type:
      name: Typ airsoftovej súčiastky
      description: Identifikuje funkčný komponent alebo typ príslušenstva pre airsoftové
        zbrane (napr. zásobník, hlaveň, predpažbie).
    airworthiness_approval_basis:
      name: Základ pre schválenie letovej spôsobilosti
      description: V prípade potreby určuje základ schválenia/certifikátu pre daný
        diel (napr. PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Nastaviteľnosť hlasitosti budíka
      description: Označuje, či a ako môže používateľ nastaviť hlasitosť budíka.
    alcohol_ink_finish_effect:
      name: Efekt povrchovej úpravy alkoholovým atramentom
      description: Opisuje vizuálny efekt/povrchovú úpravu vytvorenú alkoholovým atramentom
        (Beyond ako len farba), napríklad metalický alebo perleťový.
    alignment_aid_style:
      name: Štýl pomôcky na zarovnanie
      description: Opisuje typ zarovnania prievodcu vytlačeného alebo vloženého na
        povrch podložky (napr. priama čiara, značky vzdialenosti).
    alternator_cooling_type:
      name: Typ chladenia alternátora
      description: Opisuje, ako je alternátor chladený a vetraný.
    alternator_marine_ignition_protection_rating:
      name: Stupeň ochrany alternátora pred vznietením v námorných plavidlách
      description: Označuje, či je alternátor chránený pred zapálením pre priestory
        lodných motorov (napr. v súlade s normou SAE J1171 / ISO 8846).
    alternator_mounting_configuration:
      name: Konfigurácia montáže alternátora
      description: Určuje fyzickú montážnu konfiguráciu, ktorá sa používa na pripevnenie
        alternátora k držiaku motora.
    alternator_pulley_type:
      name: Typ remenice alternátora
      description: Určuje prevedenie remenice/spojky na alternátore (alebo označuje,
        že remenica nie je súčasťou balenia).
    alternator_regulator_type:
      name: Typ regulátora alternátora
      description: Označuje, či je regulátor napätia interný vzhľadom na alternátor
        alebo externý, a či je riadený výrobcom originálneho zariadenia (riadený počítačom/PCM).
    alternator_terminal_connection_type:
      name: Pripojenie medzi alternátorom a terminálom
      description: Hlavný typ elektrického pripojenia výstupných/budiacich svoriek
        alternátora, ktorý pomáha zabezpečiť kompatibilitu káblového zväzku.
    altitude_suitability:
      name: Vhodnosť pre nadmorskú výšku
      description: Označuje, či je lopta určená pre konkrétnu nadmorskú výšku, ktorá
        ovplyvňujú jej rýchlosť a odraz.
    ambulance_stretcher_mount_type:
      name: Typ pripevnenia nosidiel v sanitke
      description: Určuje typ systému naloženia/pripevnenia nosidiel, ktorý sanitka
        podporuje.
    american_football_safety_certification:
      name: Certifikácia bezpečnosti amerického futbalu
      description: Označuje konkrétne bezpečnostné certifikácie alebo normy pre americký
        futbal, ktoré produkt spĺňa.
    amplifier_tube_function:
      name: Funkcia elektrónky zosilňovača
      description: Určuje funkciu elektrónky v obvode zosilňovača prístroja (napr.
        predzosilňovač v porovnaní s výkonom).
    analog_synthesizer_cv_gate_i_o:
      name: Analógový syntetizátor CV/Gate I/O
      description: Označuje typy riadiaceho napätia a hradlového pripojenia podporovaného
        za účelom pripojenia s modulárnym/analógovým zariadením.
    analog_synthesizer_keybed_configuration:
      name: Konfigurácia kláves analógového syntetizátora
      description: Popisuje, či syntetizátor obsahuje vstavanú klaviatúru a ak áno,
        počet klávesov.
    anchor_configuration:
      name: Konfigurácia kotvy
      description: Označuje, či závesný systém používa jeden centralizovaný kotviaci
        bod alebo viacero nezávislých kotviacich bodov, čo ovplyvňuje rozmanitosť
        cvičení a zložitosť nastavenia.
    animal_raising_method:
      name: Spôsob chovu zvierat
      description: Opisuje poľnohospodárske alebo chovateľské postupy používané u
        hospodárskych zvierat.
    animal_species:
      name: Druhy zvierat
      description: Označuje zvieratko alebo postavičku vo forme plyšovej hračky (napr.
        medveď, zajačik, dinosaurus).
    animal_trap_jaw_style:
      name: Model zverákovej pasce na zver
      description: Konfigurácia čeľustí pasce ovplyvňujúca silu uchytenia a dobré
        životné podmienky zvierat.
    animal_trap_type:
      name: Typ pasce na zver
      description: Klasifikuje mechanický štýl/dizajn pasce, čo umožňuje nakupujúcim
        rýchlo nájsť presnú metódu odchytu, ktorú potrebujú alebo ktorú povoľujú predpisy.
    ankle_collar_style:
      name: Štýl členkovej manžety
      description: Opisuje štýl alebo konštrukciu členkovej manžety topánky, napríklad
        nízky strih, stredný strih, vysoký strih, ponožkový golier alebo bez šnúrok,
        ktoré majú vplyv na stabilitu, strih a estetický vzhľad.
    ankle_guard_protection_level:
      name: Úroveň ochrany chráničov členkov
      description: Hodnotí celkovú ochranu pred nárazom, ktorú chránič členku poskytuje.
    ankle_strap_padding_type:
      name: Typ polstrovania členkového popruhu
      description: Opisuje tlmiaci materiál alebo prístup k polstrovaniu použitý vo
        vnútri popruhu, ktorý ovplyvňuje pohodlie.
    ankle_strap_type:
      name: Typ popruhu na členok
      description: Klasifikuje konštrukciu alebo dizajn členkového popruhu na snowboardovom
        viazaní.
    ant_farm_habitat_medium_type:
      name: Typ biotopu mraveniska
      description: Určuje primárne prostredie na tvorenie tunelov/pozorovanie poskytované
        alebo požadované v rámci mraveniska.
    ant_farm_kit_contents:
      name: Obsah súpravy mraveniska
      description: Identifikuje, ktoré komponenty sú súčasťou súpravy mravčej farmy
        (napr. nádoba Habitat , piesok/gél, poukážka na mravce, nástroje na kŕmenie).
    ant_farm_lighting_type:
      name: Typ osvetlenia mraveniska
      description: Určuje typ vstavaného osvetlenia (ak existuje) použitého na pozorovanie.
    antenna_fit_type:
      name: Typ upevnenia antény
      description: Pre aký tvar antény je ozdobná koncovka na anténu určená.
    anti_caking_agent:
      name: Protihrudkujúca látka
      description: Špecifikuje typ protihrudkujúcej látky pridanej na zabránenie tvorby
        hrudiek, čo sú informácie dôležité z hľadiska alergénov a presnosti receptu.
    anti_g_suit_bladder_material:
      name: Materiál obleku anti-g
      description: Materiál použitý na vnútorné nafukovacie vaky vo vnútri obleku
        proti preťaženiu; uveďte všetky, ktoré sa vzťahujú na daný prípad, ak sa používa
        viacero materiálov.
    anti_g_suit_connector_type:
      name: Typ konektora pre oblek proti preťaženiu
      description: Určuje štýl/štandard konektora vzduchovej/tlakovej hadice používanej
        na prepojenie s lietadlom alebo regulátorom.
    anti_g_suit_inflation_method:
      name: Metóda nafukovania obleku Anti-G
      description: Označuje, ako sú vaky obleku natlakované, aby poskytovali ochranu
        proti preťaženiu.
    anti_g_suit_size_system:
      name: Systém veľkosti obleku proti preťaženiu
      description: Veľkostný štandard používaný na špecifikáciu systému veľkostí/strihov.
    anti_reverse_type:
      name: Typ s protispätným chodom
      description: Určuje typ mechanizmu proti spätnému chodu, ktorý ovplyvňuje nasadenie
        háku a spätný chod.
    anti_theft_feature:
      name: Funkcia ochrany proti krádeži
      description: Označuje, či držiak poskytuje ochranu proti krádeži, ako sú napríklad
        uzamykateľné upevňovacie prvky alebo odolnosť voči neoprávnenej manipulácii.
    antique_gun_ignition_system:
      name: Systém zapaľovania starožitných zbraní
      description: Určuje historický systém streľby/zapaľovania používaný starožitnou
        strelnou zbraňou.
    apple_variety:
      name: Odroda jabĺk
      description: Určuje kultivar alebo odrodu jablka (napr. Gala, Fuji, Granny Smith),
        čo pomáha zákazníkom pri výbere na základe chuti, textúry a kulinárskeho použitia.
    applique_edge_finish:
      name: Aplikovaná povrchová úprava okrajov
      description: Opisuje spôsob úpravy okrajov, čo ovplyvňuje vzhľad a odolnosť
        voči strapkaniu.
    arbor_type:
      name: Typ vretena
      description: Klasifikuje navijak podľa konštrukcie upínacieho hriadeľa cievky,
        čo ovplyvňuje rýchlosť navíjania vlasca, kapacitu podkladu a pamäť vlasca.
    archery_accessory_type:
      name: Typ príslušenstva pre lukostreľbu
      description: Určuje typ príslušenstva určeného pre lukostreleckú výstroj, aby
        si kupujúci mohli rýchlo filtrovať produkty.
    archery_part_type:
      name: Typ dielu pre lukostreľbu
      description: Identifikuje konkrétny predávané technické vybavenie alebo náhradný
        diel (napr. výstuž, vetvy, tetivu), čo umožňuje presné filtrovanie bez otvorenia
        podkategórií.
    archery_range_accessory_type:
      name: Typ príslušenstva sortimentu pre lukostreľbu
      description: Klasifikuje konkrétny druh príslušenstva používaného na strelnici,
        vďaka čomu môžu kupujúci rýchlo filtrovať presne ten produkt, ktorý potrebujú.
    archery_target_features:
      name: Prvky lukostreľby na terč
      description: Uvádza špecializované výkonnostné alebo úžitkové funkcie, ktoré
        nie sú zahrnuté v iných atribútoch (napr. pamäťová pena, rukoväť na prenášanie).
    archery_tool_type:
      name: Typ pomôcky na lukostreľbu
      description: Klasifikuje konkrétny druh lukostreleckého nástroja alebo vybavenia.
    armband_features:
      name: Funkcie pásky na ruku
      description: Uvádza špeciálne funkčné alebo vizuálne prvky, ktoré vylepšujú
        ramenný pás.
    armguard_style:
      name: Štýl chrániča paže
      description: Definuje konštrukčný štýl alebo veľkosť chrániča predlaktia, čím
        poskytuje poznatky o uplatnenom dizajne a o tom, či ide o tradičný alebo moderný
        vzhľad.
    armor_protection_type:
      name: Typ nepriestrelnej ochrany
      description: Typ ochrany poskytovanej systémom pancierovania vozidla.
    armrest_adjustability:
      name: Možnosť nastavenia lakťovej opierky
      description: Definuje možnosť nastavenia veľkosti a konfiguráciu lakťových opierok
        sedadla (napr. pevné, 2D, 3D, výklopné).
    armrest_type:
      name: Typ lakťovej opierky
      description: Opisuje, či sú lakťové opierky prítomné a nastaviteľné na sedadle
        (napr. bez lakťových opierok, pevné, nastaviteľné, odnímateľné).
    arrow_bolt_point_type:
      name: Typ hrotu šípu/šípky
      description: Definuje štýl hrotu alebo špičky nainštalovanej na šípe alebo šípke.
    arrow_component_type:
      name: Typ komponentu šípu
      description: Klasifikuje konkrétnu časť alebo príslušenstvo šípu (vložka, obal,
        puzdro, lepidlo atď.), aby zákazníci mohli filtrovať produkty bez otvorenia
        desiatok ďalších podkategórií.
    arrow_containment_level:
      name: Úroveň zachytávania šípu
      description: Opisuje, či opierka úplne obsahuje, čiastočne obsahuje alebo neobsahuje
        šíp.
    arrow_fletching_orientation:
      name: Orientácia pierok na šípe
      description: Určuje orientáciu krídla alebo odsadenia pierok (napr. ľavostranné,
        pravostranné, špirálové), ktorá určuje smer otáčania šípu.
    arrow_nock_groove_size:
      name: Veľkosť drážky zakončenia šípu
      description: Určuje klasifikáciu veľkosti drážky/hrdla tetivy zakončenia, ktorá
        určuje kompatibilitu s rôznymi priemermi tetivy.
    arrow_nock_type:
      name: Typ končeka šípu
      description: Dizajn/štýl končeka šípu, ktorý sa dotýka tetivy.
    arrow_rest_style:
      name: Štýl opierky šípu
      description: Určuje funkčný štýl/mechanizmus opierky šípu (napr. padacia základka,
        čepeľ, whisker biscuit). Štýl určuje, ako opierka podopiera, obsahuje a uvoľňuje
        šíp a je základom toho, ako zákazníci rozlišujú produkty.
    arrow_shaft_compatibility:
      name: Kompatibilita s telami šípu
      description: Označuje normu drieku/puzdra šípu, do ktorého zapadá svietiaci
        končík (napr. X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Štýl hrotu nástroja pre umenie/remeslá
      description: Opisuje tvar/profil pracovného hrotu (napr. špicatý vs. zaoblený
        guľôčkový) a označuje druh razených značiek, ktoré vyrába.
    art_ink_lightfastness_rating:
      name: Hodnotenie stálosti umeleckých atramentov na svetle
      description: Označuje odolnosť atramentu voči vyblednutiu pri vystavení svetlu,
        zvyčajne vyjadrená pomocou štandardných hodnotení.
    art_ink_opacity:
      name: Nepriehľadnosť umeleckého atramentu
      description: Určuje úroveň krytia atramentu po nanesení.
    art_security_rating:
      name: Hodnotenie bezpečnosti ART
      description: Uvádza holandské hodnotenie hviezdičkami ART (1 – 5 hviezdičiek),
        ktoré zámok získal.
    artichoke_cut:
      name: Rez artičoku
      description: Označuje, ktorá časť alebo úprava artičoku sa ponúka (napr. celá
        časť, stredná, spodná časť), aby zákazníci porozumeli výdatnosti a určenej
        kuchárskej príprave.
    artichoke_variety:
      name: Odroda artičoku
      description: Špecifikuje kultivar alebo botanickú odrodu artičoku, aby pomohol
        kupujúcim rozlišovať medzi veľkosťou, farbou, chuťou a kuchárskym využitím.
    articulation_features:
      name: Prvky kĺbových spojení
      description: Označuje, či má model dinosaura pohyblivé časti (polohovateľnú
        čeľusť, končatiny, chvost) a celkovú polohovateľnosť.
    artificial_bait_form:
      name: Umelá forma návnady
      description: Označuje fyzický tvar alebo prezentačný štýl rybárskej návnady.
    asa_mounting_type:
      name: Typ montáže ASA
      description: Označuje štýl rozhrania adaptéra zdroja vzduchu (ASA) alebo montážnu
        normu, ktorú montážny prvok "dole dopredu" používa (napr. rybinový, lištový,
        priama montáž).
    ascender_descender_type:
      name: Typ dolného doťahu a horného doťahu
      description: Klasifikuje štýl lezenia (výstup alebo zostup) pre presnejšie filtrovanie.
    aspiration_type:
      name: Typ ašpirácie
      description: Označuje, ako sa motor nasáva/naplňuje.
    assembly_state:
      name: Stav montáže
      description: Označuje, či sa skrinka dodáva pripravená na montáž, predmontovaná
        alebo v inej forme.
    assistance_mechanism:
      name: Mechanizmus asistenčného systému
      description: Určuje akýkoľvek zabudovaný asistenčný alebo odporový systém, ktorý
        posilňovacia hrazda poskytuje pri zhyboch, dipoch alebo iných cvikoch.
    atemoya_cultivar:
      name: Odroda ovocia atemoya
      description: Špecifikuje kultivar/odrodu plodu atemoya, čo umožňuje kupujúcim
        vybrať si plody s chuťou, veľkosťou alebo vlastnosťami, ktoré uprednostňujú.
    athletic_cup_size:
      name: Veľkosť suspenzora
      description: Označuje výrobcom určenú veľkosť suspenzora na zabezpečenie správneho
        strihu pre športovca.
    attachment_position:
      name: Poloha pripojenia
      description: Určuje, kde na sedle alebo tele jazdca sa má taška pripevniť.
    attractant_scent_profile:
      name: Profil atraktívnej vône
      description: Opisuje špecifický zápach alebo príchuť používanú na prilákanie
        divokej zveri alebo maskovanie ľudského zápachu.
    atv_utv_intended_use:
      name: Zamýšľané použitie štvorkoliek/úžitkových štvorkoliek
      description: Primárne zamýšľané použitie/štýl štvorkoliek/úžitkových štvorkoliek.
    audio_channel_configuration:
      name: Konfigurácia audio kanála
      description: Počet samostatných zvukových kanálov, ktoré ekvalizér/DSP podporuje
        (napr. 2-kanálový stereo, 4-kanálový predný/zadný, 6-kanálový).
    audio_inputs:
      name: Zvukové vstupy
      description: Určuje typy pripojení zvukových vstupov dostupných pre samplovanie/nahrávanie
        (napr. 1/4 linkový, XLR, 3,5 mm, mikrofónový predzosilňovač, phono).
    audio_output:
      name: Zvukový výstup
      description: Označuje, či hračka vydáva zvuk a ako sa tento zvuk prenáša.
    audio_outputs:
      name: Zvukové výstupy
      description: Určuje dostupné pripojenie zvukových výstupov vrátane hlavných
        výstupov a akýchkoľvek priraditeľných/aux výstupov.
    audio_playback_source:
      name: Zdroj prehrávania zvuku
      description: Primárne zdroje médií, z ktorých dokáže karaoke súprava prehrávať
        hudbu.
    autograph_authentication:
      name: Overenie autogramu
      description: Označuje stav/typ overenia autogramu na karte.
    autograph_format:
      name: Formát autogramu
      description: Popisuje, či ide o originálny vlastnoručný podpis (autogram), razenú/tlačenú
        faksimile alebo o venovanie/dodatok.
    autogyro_cockpit_enclosure:
      name: Kryt kokpitu vírnika
      description: Určuje, či je kokpit otvorený alebo uzavretý.
    available_firing_modes:
      name: Dostupné režimy aktivácie
      description: Zobrazuje zoznam voliteľných režimov aktivácie, ktoré marker podporuje
        hneď po vybalení z krabice.
    avocado_variety:
      name: Odroda avokáda
      description: Špecifikuje kultivar alebo odrodu avokáda, pomáha kupujúcim rozlišovať
        medzi rozdielmi v chuti, textúre, veľkosti a obsahu oleja.
    award_customization_included:
      name: Príspôsobenie ocenenia v cene
      description: Označuje, aká personalizácia/prispôsobenie je súčasťou ocenenia
        za nákup.
    award_material:
      name: Materiál ocenenia
      description: Označuje primárny materiál (materiály) produktu ocenenia (trofej,
        plaketa, medaila, odznak, kokarda).
    award_mounting_display_type:
      name: Typ upevnenia/zobrazenia ocenenia
      description: Určuje spôsob vystavenia alebo pripevnenia ocenenia (na stenu,
        na počítač, na oblečenie).
    award_plaque_plate_material:
      name: Materiál tabuľky plakety
      description: Určuje materiál tabuľky s menom/vygravírovanej tabuľky pripevnenej
        k plakete (odlišný od podkladového materiálu).
    award_ribbon_attachment_type:
      name: Typ uchytenia kokardy
      description: Určuje, ako sa má kokarda pripevniť alebo nosiť.
    award_ribbon_imprint_method:
      name: Metóda tiráže rozety
      description: Určuje spôsob aplikácie textu/grafiky na kokardu.
    award_ribbon_material:
      name: Materiál kokardy
      description: Primárny materiál stužkovej tkaniny (napr. satén, polyester).
    award_ribbon_placement_title:
      name: Umiestnenie/titul na kokarde
      description: Štandardné umiestnenie alebo titul uvedený na kokarde (napr. 1.
        miesto, účastník).
    axle_compatibility:
      name: Kompatibilita náprav
      description: Označuje štandard nápravy, ktorý koleso pojme, a zabezpečuje kompatibilitu
        s rámom a vidlicou bicykla.
    back_beam_type:
      name: Typ zadného nosníka
      description: Typ/nastaviteľnosť zadného nosníka (napr. obyčajný alebo výškovo
        nastaviteľný).
    back_design:
      name: Dizajn zadnej časti
      description: Označuje výrazné strihy na zadnej časti odevov, ktoré ovplyvňujú
        štýl a stabilitu.
    back_panel_type:
      name: Typ zadného panela
      description: Určuje štýl alebo materiál zadného panela skrinky, čo má vplyv
        na viditeľnosť displeja a zladenie dekorácií.
    back_sides_material:
      name: Materiál zadnej a bočnej časti
      description: Určuje materiál použitý na zadnú a bočnú časť tela klasickej gitary.
    backing_type:
      name: Typ zadnej časti
      description: Opisuje štýl podkladovej vrstvy/pripevnenia predávaného kamienkového
        produktu (v prípade samolepiacich produktov).
    backup_camera_mounting_location:
      name: Miesto upevnenia parkovacej kamery
      description: Označuje zamýšľané miesto upevnenia parkovacej kamery na vozidle.
    backup_camera_video_interface:
      name: Video rozhranie parkovacej kamery
      description: Určuje video výstup/rozhranie/konektor, ktorý používa parkovacia
        kamera na pripojenie k monitoru, DVR alebo hlavnej jednotke (napr. kompozitný
        RCA, LVDS OEM, IP cez Ethernet).
    badminton_set_components_included:
      name: Súčasťou balenia sú komponenty súpravy na bedminton
      description: Uvádza jednotlivé položky dodávané v bedmintonovej sade.
    bag_attachment_method:
      name: Spôsob pripojenia tašky
      description: Označuje primárny spôsob pripevnenia hydratačného vaku/držiaka
        k inej výbave (napr. popruh MOLLE, slučka na opasok, karabína).
    bag_case_carrying_style:
      name: Štýl nosenia tašky/príslušenstva
      description: Určuje primárny celkový tvar puzdra/tašky (ako je skonštruovaný
        na nosenie).
    bag_cover_material:
      name: Materiál poťahu tašky
      description: Určuje materiál krytu vrecka (vonkajšieho krytu), ktorý ovplyvňuje
        odolnosť, priľnavosť a vzhľad.
    bag_embellishment:
      name: Ozdoba tašky
      description: Opisuje výrazné dekoratívne prvky použité na vonkajšej strane tašky,
        ako sú strapce, cvočky alebo prešívanie.
    bag_fill_medium:
      name: Náplň vaku
      description: Identifikuje látku použitú na naplnenie alebo natlakovanie vaku
        (napr. vzduch, voda, piesok).
    bag_material:
      name: Materiál vaku
      description: Materiál airbagu/duše.
    bag_padding_level:
      name: Úroveň polstrovania vaku
      description: Určuje stupeň alebo štýl vnútorného okraja zabudovaného do vrecka
        alebo obalu.
    bag_size_descriptor:
      name: Deskriptor veľkosti vaku
      description: Marketingová veľkostná trieda pre kabelku v tvare vedierka (napr.
        mini, veľká), ktorá dopĺňa presné rozmery.
    bagel_size:
      name: Veľkosť bagelu
      description: Určuje všeobecnú veľkosť žemle, napr. mini, tenká, štandardná,
        veľká, extra veľká alebo jumbo.
    bagpipe_accessories_included:
      name: Vrátane príslušenstva ku gajdám
      description: Uvádza hlavné komponenty/príslušenstvo, ktoré je súčasťou gájd
        (okrem hlavnej časti gájd), napríklad puzdro, gajdica, kryt, šnúry, regulátor
        vlhkosti.
    bagpipes_playing_mode:
      name: Režim hry na gajdy
      description: Ako je nástroj počas hry zásobovaný vzduchom.
    bait_compatibility:
      name: Kompatibilita návnady
      description: Uvádza typy návnad, pre ktoré je príslušenstvo na pelety určené,
        čo pomáha rybárom zabezpečiť, aby zvolený nástroj zodpovedal ich preferovanej
        návnade.
    bait_species:
      name: Druhy návnad
      description: Identifikuje hlavný organizmus ponúkaný ako návnada, čo rybárom
        pomáha zaistiť legálnosť a účinnosť pre cieľový druh rýb.
    baking_chip_form:
      name: Pekáč na pečenie hranoliek
      description: Opisuje fyzickú veľkosť alebo tvar čipsov na pečenie, čo ovplyvňuje
        správanie sa pri roztápaní a vzhľad receptu.
    balance_board_style:
      name: Model balančnej dosky
      description: Klasifikuje balančné dosky podľa ich mechanizmu alebo konštrukčného
        štýlu, aby sa určil spôsob pohybu dosky a tréningová náročnosť, ktorú poskytuje.
    balance_cushion_accessories_included:
      name: Príslušenstvo k balančnému vankúšu v cene
      description: Uvádza všetko príslušenstvo pribalené k vankúšu, čo umožňuje nakupujúcim
        porovnať hodnotu balíka.
    balance_type:
      name: Typ vyváženia
      description: Označuje stav/triedu vyváženia hnacieho hriadeľa pri predaji (napr.
        vyvážený z výroby, vyvážený pri vysokých otáčkach, nevyvážený).
    ball_bladder_material:
      name: Materiál guľového mechu
      description: Identifikuje materiál použitý na vnútorný mechúr hádzanárskej lopty,
        ktorý ovplyvňuje schopnosť zadržiavania vzduchu, odraz a celkovú odolnosť.
    ball_certification:
      name: Certifikácia lopty
      description: Označuje oficiálnu certifikáciu výkonnosti alebo schválenie, ktoré
        lopta získala.
    ball_construction:
      name: Konštrukcia lopty
      description: Označuje výrobnú metódu použitú na spájanie panelov lopty, ktorá
        ovplyvňuje odolnosť, cit, absorpciu vody a cenu.
    ball_core_construction:
      name: Konštrukcia jadra lopty
      description: Konkretizuje vnútornú stavbu lopty, ktorá má vplyv na odraz a cit.
    ball_core_type:
      name: Typ jadra lopty
      description: Označuje vnútornú konštrukciu lopty, ktorá ovplyvňuje jej odraz
        a rozloženie hmotnosti.
    ball_cup_game_included_pieces:
      name: Loptové a pohárové hry v cene
      description: Identifikuje, ktoré komponenty sú súčasťou balenia produktu pre
        hru s loptičkou a pohárikom.
    ball_drilling_state:
      name: Stav vŕtania gulí
      description: Označuje, či sú v lopte vyvŕtané otvory pre prsty a ak áno, do
        akej miery.
    ball_holder_type:
      name: Typ držiaka lopty
      description: Identifikuje štrukturálny štýl alebo veľkosť držiaka lopty.
    ball_pit_ball_surface_finish:
      name: Povrchová úprava loptičky do suchého bazéna
      description: Opisuje hmatovú/vizuálnu úpravu povrchu lopty, ktorá ovplyvňuje
        priľnavosť, pocit z hry a čistenie.
    ball_pit_safety_features:
      name: Bezpečnostné prvky suchého bazéna s loptičkami
      description: Bezpečnostné konštrukčné prvky týkajúce sa suchého bazéna s loptičkami.
    ball_pump_accessory_type:
      name: Typ príslušenstva pre pumpu na loptu
      description: Určuje konkrétny typ príslušenstva k pumpám na nafukovanie lôpt,
        aby mohli obchodníci uviesť manometre, hadice, mazivá a ďalšie doplnky do
        jednej nadradenej kategórie.
    ball_return_mechanism:
      name: Mechanizmus vracania gule
      description: Určuje štýl odrazu lopty začlenenej do podložky, ak ju obsahuje.
    ball_return_type:
      name: Typ odrazu lopty
      description: Typ vreckového/odrazového systému, ktorý zbiera loptičky počas
        hry.
    ball_speed_rating:
      name: Index rýchlosti lopty
      description: Výrobcom označená rýchlostná kategória udávajúca, ako rýchlo guľa
        hrá pri štandardnom stave.
    ball_surface_texture:
      name: Textúra povrchu lopty
      description: Opisuje vonkajšiu textúru alebo vzor ryhovania lopty, ktorý môže
        ovplyvniť jej priľnavosť a estetický vzhľad.
    ball_surface_type:
      name: Typ povrchu lopty
      description: Opisuje vonkajšiu povrchovú úpravu alebo tlmenie lopty, ktoré indikuje
        pocit pri náraze a priľnavosť.
    ballonet_configuration:
      name: Konfigurácia vzduchového vaku
      description: Typ/konfigurácia systému vzduchového vaku používaného na riadenie
        vyváženia a tlaku (pre vzducholode s nepevným/polopevným krytom).
    balloon_closure_valve_type:
      name: Typ uzáveru/ventilu balóna
      description: Označuje, ako je balón po nafúknutí utesnený (napr. uzáver, samotesniaci
        ventil).
    balloon_kit_finish:
      name: Povrchová úprava súpravy balóna
      description: Opisuje povrchovú/vizuálnu úpravu balónov zahrnutých v súprave.
    balloon_kit_material:
      name: Materiál súpravy balónov
      description: Určuje primárny materiál balónov, ktoré sú súčasťou súpravy.
    banana_variety:
      name: Odroda banánov
      description: Určuje ponúkaný kultivar alebo druh banánu.
    banjo_head_type:
      name: Typ hlavy banja
      description: Typ/materiál hlavy bendža, ktorý ovplyvňuje jas, hlasitosť a cit.
    banjo_neck_material:
      name: Materiál krku bendža
      description: Materiál krku, ktorý ovplyvňuje cit, stabilitu a tón.
    banjo_pickup_configuration:
      name: Konfigurácia snímača bendža
      description: Či bendžo obsahuje zabudovaný snímač a akú všeobecnú technológiu
        snímačov používa.
    banjo_rim_material:
      name: Materiál obruče banja
      description: Materiál obruče (kruhového tela), ktorý vo veľkej miere ovplyvňuje
        tón a hmotnosť.
    banjo_tone_ring_type:
      name: Typ tónového zvončeka bendža
      description: Určuje typ konštrukcie a materiálový rad tónového prstenca banja,
        ktoré ovplyvňujú zafarbenie zvuku a hlasitosť.
    banjo_tuning_machine_type:
      name: Typ ladiacej mechaniky bendža
      description: Typ ladiacej mechaniky používanej na bendžo.
    banknote_authentication_grading:
      name: Overovanie pravosti/hodnotenie bankoviek
      description: Služba tretej strany (ak existuje), ktorá overila bankovku/určila
        triedu bankovky.
    banknote_grade:
      name: Trieda bankovky
      description: Štandardizovaná trieda bankoviek na zberateľskej stupnici bankoviek.
    banknote_holder_type:
      name: Typ držiaka bankoviek
      description: Označuje fyzický stav bankovky (napr. voľný vs. stupňovitý držiak).
    banknote_material:
      name: Materiál bankoviek
      description: Primárny materiál bankovky.
    banknote_security_features:
      name: Zabezpečovacie prvky bankoviek
      description: Bankovka má významné bezpečnostné/dizajnové prvky.
    banknote_serial_number_type:
      name: Typ sériového čísla bankovky
      description: Označuje, či je sériové číslo prítomné a/alebo má špeciálne zberateľské
        prvky (nie skutočné číslo).
    banner_display_location:
      name: Lokalita zobrazenia transparentu
      description: Určuje zamýšľané umiestnenie transparentu (napr. vchod, stena,
        pozadie stola).
    banner_hanging_hardware_type:
      name: Typ hardvéru na zavesenie transparentu
      description: Určuje primárny závesný/upevňovací hardvér, ktorý je zabudovaný
        do bannera alebo súčasťou súpravy bannera (napr. priechodky, objímka na tyč,
        lano).
    banner_message_type:
      name: Typ bannerovej správy
      description: Označuje, či je text/správa bannera predtlačená (pevná) alebo prázdna/prispôsobiteľná.
    banner_shape:
      name: Tvar bannera
      description: Určuje celkový tvar/strih transparentu pre športových fanúšikov.
    banquette_configuration:
      name: Tvar rohovej lavice
      description: Celkový tvar alebo orientácia rohovej lavice.
    bar_coating:
      name: Povrchová úprava tyče
      description: Označuje vonkajší jedlý náter nanesený na tyčinku.
    bar_pad_style:
      name: Štýl tyčovej podložky
      description: Štýl dizajnu tyčovej podložky a konštrukcie krytu.
    bar_texture:
      name: Textúra tyče
      description: Opisuje celkovú textúru alebo chuť tyčinky.
    barb_type:
      name: Typ ozubu
      description: Označuje, či má háčik ozub a aký má tvar.
    barbell_finish:
      name: Vyhotovenie činky
      description: Podrobnosti o ochrannej alebo estetickej povrchovej úprave/nátere
        aplikovanom na riadidlá a/alebo objímky, ktoré ovplyvňujú odolnosť proti korózii,
        pocit pri úchope a cenu.
    barbell_knurling_pattern:
      name: Vzor vrúbkovania činky
      description: Podrobne popisuje model a agresivitu vrúbkovanej časti úchopu na
        činke vrátane špecifických značiek pre powerlifting alebo vzpieranie.
    barista_suitability:
      name: Vhodnosť pre baristu
      description: Opisuje, či je výrobok určený na prípravu a napenenie kávy.
    barre_rail_configuration:
      name: Konfigurácia lyžiny na Barre
      description: Označuje počet vodorovných tyčí. dodaných s baletnou tyčou.
    barrel_or_cask_type:
      name: Typ valca alebo suda
      description: Určuje typ suda, v ktorom tequila zreje alebo sa v ňom dokončuje
        (napr. americký dub, sud po bourbone, sud po sherry).
    barrel_profile:
      name: Profil valca
      description: Opisuje celkový tvar alebo vyváženosť tela šípky.
    barrel_thread_standard:
      name: Štandardný závit valca
      description: Označuje závit hlavne použitý na značke pre kompatibilitu s hlavňami
        z trhu s náhradnými dielmi.
    base_anchoring_method:
      name: Metóda ukotvenia základne
      description: Označuje spôsob upevnenia základne k zemi, čo naznačuje jej vhodnosť
        pre rôzne povrchy a herné podmienky.
    base_ballast_method:
      name: Spôsob vyváženia základne
      description: Označuje, ako (alebo či) je základňa trenažéra zaťažená z hľadiska
        stability (napr. naplnená vodou, naplnená pieskom).
    base_configuration:
      name: Konfigurácia základne
      description: Označuje štrukturálnu konfiguráciu základne panelu.
    base_fill_material:
      name: Výplňový materiál základne
      description: Určuje látku použitú na vyplnenie alebo zaťaženie základne basketbalovej
        figuríny, ktorá ovplyvňuje stabilitu a úsilie pri nastavení.
    base_ingredient:
      name: Základná zložka
      description: Označuje primárnu poľnohospodársku surovinu, z ktorej sa destiluje
        šóčú alebo sodžu.
    base_oil_type:
      name: Typ základného oleja
      description: Identifikuje zloženie základného oleja prevodovej kvapaliny (napr.
        plne syntetický vs. syntetická zmes vs. konvenčný).
    base_storage_type:
      name: Typ úložného priestoru základne
      description: Určuje, či základňa poskytuje integrované úložisko a použitý mechanizmus.
    baseball_glove_type:
      name: Typ baseballovej rukavice
      description: Klasifikuje rukavice podľa pozície hráča alebo funkčného účelu.
    baseball_softball_league_certification:
      name: Certifikácia baseballovej a softbalovej ligy
      description: Určuje štandardy riadiaceho orgánu alebo ligy, ktoré produkt spĺňa.
    baseball_softball_usage_role:
      name: Pozícia pri hre bejzbalu/softbalu
      description: Určuje pozíciu na ihrisku alebo typ hráča, pre ktorého je chránič
        nôh určený (napr. chytač (catcher), pálkar, rozhodca, hráč v poli).
    baseball_toy_set_components_included:
      name: Vrátane súčastí hračkárskej baseballovej sady
      description: Určuje, ktoré komponenty na hranie baseballu sú súčasťou produktu
        (napr. pálka, loptička, odpalisko, podstavce).
    baseplate_construction:
      name: Konštrukcia základovej dosky
      description: Označuje spôsob výroby základnej dosky nákladného vozidla, ktorý
        má vplyv na pevnosť a hmotnosť.
    basketball_hoop_accessory_type:
      name: Typ príslušenstva basketbalového koša
      description: Uvádza konkrétny druh súčasti alebo príslušenstva basketbalového
        koša na účely filtrovania a porovnania.
    basketball_padding_location:
      name: Umiestnenie podložky na basketbalovom koši
      description: Označuje časť basketbalového systému, ktorú má podložka zakrývať.
    basketball_rim_type:
      name: Typ basketbalovej obruče
      description: Určuje konštrukčný alebo výkonnostný typ basketbalovej obruče,
        aby si nakupujúci mohli vybrať model, ktorý zodpovedá ich hernej úrovni a
        požiadavkám na inštaláciu.
    basketball_toy_features:
      name: Vlastnosti basketbalovej hračky
      description: Zdôrazňuje významné herné/funkčné vlastnosti basketbalových hračiek
        nad rámec základných rozmerov.
    bass_clarinet_body_material:
      name: Materiál tela basklarinetu
      description: Primárny materiál tela basklarinetu (okrem klávesov, stĺpikov a
        iných kovových prvkov).
    bass_clarinet_lowest_written_note:
      name: Najnižšia nota pre basklarinet
      description: Najnižšia nota, ktorú dokáže basklarinet zahrať (hráči ju často
        opisujú ako nízke E♭, nízke D, nízke C alebo nízke predĺženie B).
    bass_drum_beater_head_shape:
      name: Tvar hlavy paličiek na basový bubon
      description: Opisuje geometrický tvar/profil úderovej plochy blany basového
        bubna (plocha, ktorá sa dotýka blany bubna).
    bass_drum_beater_shaft_material:
      name: Tvar tela paličiek na basový bubon
      description: Určuje materiál tela/tyče paličiek (nie hlavy paličiek).
    bass_drum_head_built_in_muffling:
      name: Vstavané tlmenie blany basového bubna
      description: Typ integrovaného tlmenia zahrnutého v konštrukcii hlavy.
    bass_drum_head_configuration:
      name: Konfigurácia blany basového bubna
      description: Popisuje, ktoré blany sú súčasťou/namontované na basovom bubne
        pri nákupe.
    bass_drum_head_surface_finish:
      name: Povrchová úprava blany basového bubna
      description: Povrchová textúra/úprava blany basového bubna.
    bass_drum_head_type:
      name: Typ blany basového bubna
      description: Typ konštrukcie alebo špeciálna konštrukcia blany basového bubna.
    bass_drum_hoop_material:
      name: Materiál obruče basového bubna
      description: Označuje materiál obručí (protiobručí) basového bubna, ktorý ovplyvňuje
        odolnosť, estetický vzhľad a hmotnosť.
    bass_drum_mounting_style:
      name: Spôsob montáže basového bubna
      description: Označuje, ako je potrebné basový bubon podoprieť/používať (súprava
        ostroh, vidlica/stojan, nosiče atď.).
    bass_harmonica_comb_material:
      name: Materiál hrebeňa basovej harmoniky
      description: Materiál hrebeňa/tela (časti vzduchovej komory) basovej harmoniky.
    bass_harmonica_mouthpiece_style:
      name: Štýl náustku pre basovú harmoniku
      description: Označuje konfiguráciu náustku basovej harmoniky.
    bass_harmonica_reed_material:
      name: Materiál jazýčkov pre basovú harmoniku
      description: Materiál jazýčkov použitých v basovej harmonike.
    bass_harmonica_tuning_system:
      name: Systém ladenia basovej harmoniky
      description: Uvádza ladiaci systém použitý pre basovú harmoniku.
    bass_recorder_bocal_type:
      name: Typ krku basovej zobcovej flauty
      description: Určuje typ krku/vzduchovej komory, ktorá sa pripevňuje k náustku
        na basovej zobcovej flaute.
    bass_recorder_included_accessories:
      name: Príslušenstvo k basovej zobcovej flaute v cene
      description: Zoznam príslušenstva, ktoré je súčasťou basovej zobcovej flauty.
    bass_recorder_keywork_material:
      name: Materiál klávesov basovej zobcovej flauty
      description: Uvádza materiál klávesovej mechaniky zobcovej flauty (ak je prítomná).
    bass_trombone_slide_material:
      name: Materiál posunovača pre basový trombón
      description: Určuje primárny materiál/povrchovú úpravu vonkajších posuvných
        trubíc (a/alebo posuvnej zostavy) pre basový trombón.
    bass_trombone_valve_wrap_style:
      name: Model basového trombónu s ventilovým závitom
      description: Určuje dizajn ovinutia ventilu použitého na nástroji.
    bass_ukulele_string_type:
      name: Typ strún na basgitarové ukulele
      description: Označuje všeobecný typ strún používaných na basovom ukulele.
    bassinet_cradle_accessory_features:
      name: Funkcie príslušenstva k detským košíkom a kolískam
      description: Zdôrazňuje významné funkčné vlastnosti alebo kvality príslušenstva
        k detskej postieľke a kolíske (napr. vodeodolnosť, certifikácia organického
        pôvodu, hypoalergénnosť).
    bassoon_bell_material:
      name: Materiál zvončeka fagotu
      description: Určuje materiál fagotového zvončeka.
    bassoon_bocal_system:
      name: Systém krku fagotu
      description: Variant/typ esa používaný pre rôzne systémy a spôsoby použitia
        fagotu.
    bassoon_case_shell_type:
      name: Puzdro ochranného puzdra na fagot
      description: Označuje ochrannú štruktúru puzdra (mäkká, tvrdá alebo hybridná).
    bassoon_keywork_material:
      name: Materiál klapiek na fagote
      description: Materiál a/alebo pokovovanie použité na klávesy fagotu (klávesy
        a mechanické príslušenstvo).
    bassoon_model_level:
      name: Úroveň modelu fagotu
      description: Označuje určenú úroveň hráča na fagot.
    bassoon_performance_level:
      name: Úroveň výkonu fagotu
      description: Uvádza odporúčanú úroveň hráča pre daný model fagotu.
    bassoon_reed_scrape_style:
      name: Štýl orezania fagotovej trstiny
      description: Označuje štýl orezania/profilu fagotovej trstiny.
    bassoon_reed_thread_color:
      name: Farba prešívania fagotovej trstiny
      description: Farba viazacieho vlákna použitého na jazýčku.
    bassoon_reed_type:
      name: Typ jazýčka pre fagot
      description: Určuje podtyp jazýčka pre fagot, pre ktorý je produkt vhodný (ak
        je to relevantné).
    bassoon_system:
      name: Systém fagotu
      description: Označuje systém/dizajnovú tradíciu fagotu používanú pri tomto nástroji.
    bat_construction:
      name: Konštrukcia pálky
      description: Uvádza, koľko odlišných kusov alebo spojených sekcií tvorí telo
        pálky (napr. jednodielna, dvojdielna, hybridná), čo ovplyvňuje ohybnosť, kontrolu
        vibrácií a celkovú výkonnosť.
    bat_handle_size_compatibility:
      name: Kompatibilita veľkostí rukoväte pálky
      description: Označuje veľkosť(-ti) rukoväti kriketovej pálky, pre ktorú(-é)
        je úchop navrhnutý.
    bath_book_interactive_features:
      name: Interaktívne funkcie knihy o kúpeľniach
      description: Vstavané herné/vzdelávacie funkcie integrované do knihy do kúpeľa.
    bath_bubble_machine_features:
      name: Funkcie zariadenia na bublinky do kúpeľa
      description: Kľúčové funkčné vlastnosti bublinkovača do kúpeľa nad rámec základnej
        tvorby bublín.
    bath_crayon_features:
      name: Vlastnosti pasteliek do vane
      description: Kľúčové funkčné/bezpečnostné vlastnosti pasteliek do vane.
    bath_squirter_spray_pattern:
      name: Vzor rozstreku spreja do vane
      description: Opisuje, ako rozprašovač do kúpeľa dávkuje vodu (výstupný vzorec)
        pri stlačení alebo aktivácii.
    bath_toy_molded_drain_design:
      name: Dizajn hračky do kúpeľa s tvarovaným odtokom
      description: Označuje, či je hračka navrhnutá tak, aby voda odtekala/vysušila
        sa, aby sa znížilo zadržiavanie vody.
    bath_toy_water_play_function:
      name: Funkcia vodnej hry s hračkou do kúpeľa
      description: Identifikuje primárny mechanizmus interakcie/hry s vodou, ktorý
        hračka vykonáva.
    baton_size_standard:
      name: Štandardná veľkosť štafetového kolíka
      description: Klasifikácia súťažnej veľkosti štafetového kolíka (junior alebo
        senior).
    battery_case_certification_standard:
      name: Certifikácia/norma puzdra batérie
      description: Uvádza príslušné prepravné/bezpečnostné certifikáty alebo testovacie
        normy, ktoré puzdro spĺňa pre prepravu/skladovanie batérie.
    battery_case_interior_padding_material:
      name: Materiál výstelky vnútornej časti puzdra batérie
      description: Určuje primárny materiál výstelky/podšívky použitý vo vnútri puzdra
        (ak je to relevantné).
    battery_configuration:
      name: Konfigurácia batérie
      description: Označuje fyzické rozloženie/tvar (formát) balenia, aby si používatelia
        mohli prispôsobiť batériu obmedzenému priestoru v priehradke v konkrétnych
        Airsoftových replikách.
    battery_group_size:
      name: Veľkosť skupiny batérií
      description: Štandardná veľkosť puzdra batérie (napr. BCI skupina 24F, H6) používaná
        na montáž do mnohých vozidiel.
    battery_polarity:
      name: Polarita batérie
      description: Určuje polaritu/orientáciu pólov (kladná poloha pólu), čo je kľúčové
        obmedzenie pri montáži mnohých batérií do automobilov a športových automobilov.
    battery_standards_supported:
      name: Podporované normy batérií
      description: Určuje normy hodnotenia batérií, ktoré tester podporuje pri testovaní
        výkonu alebo stavu štartovania.
    battery_voltage_class:
      name: Trieda napätia batérie
      description: Spoločná trieda napäťového systému pre balenie batérií elektromobilov,
        používaná na rýchle filtrovanie (napr. systémy 400 V alebo 800 V).
    batting_cage_components_included:
      name: Vrátane súčastí odpaľovacej klietky
      description: Uvádza jednotlivé diely dodané s produktom, aby si kupujúci mohli
        overiť, či je súčasťou balenia kompletný systém alebo konkrétne náhradné diely.
    batting_helmet_accessories_included:
      name: Príslušenstvo na tlmiacu prilbu je súčasťou balenia
      description: Uvádza ochranné alebo kozmetické príslušenstvo dodávané s odpaľovacou
        prilbou.
    batting_stuffing_form_factor:
      name: Tvar vatelínu a výplne
      description: Označuje, či sa výrobok predáva ako sypká výplň, pásy, rolky, vopred
        narezané kusy alebo tvarované formy.
    batting_stuffing_loft_level:
      name: Tlmenie a vypchávky, úroveň Loft
      description: Označuje Loft/vzostup vatovania alebo vypchávky (relatívne nafúknutie/výška),
        spravidla sa používa na výber prešívania a vnútorného okraja.
    batting_stuffing_thermal_insulation_level:
      name: Úroveň tepelnej izolácie vatelínu a výplne
      description: Relatívna tepelná/izolačná výkonnosť vatelínu používaného v prešívaných
        prikrývkach, bundách a paplónoch.
    batting_tee_base_design:
      name: Dizajn základne odpaľovacieho stojana
      description: Opisuje štýl alebo konštrukciu základne odpaliska, ktorá ovplyvňuje
        stabilitu a typy hracích povrchov, na ktoré je vhodné.
    battle_top_arena_stadium_compatibility:
      name: Kompatibilita detských spinerov s arénou/štadiónom
      description: Označuje, na použitie s ktorým systémom arény/štadióna je produkt
        určený (najmä pre súpravy alebo špeciálne tvary arén).
    battle_top_items_included:
      name: Súčasťou balenia sú bojové vrchné položky
      description: Určuje, ktoré bojové vrchné položky sú súčasťou balenia (napr.
        vrch, odpaľovač, štadión/aréna, naťahovacia šnúra, náhradné diely).
    battle_top_performance_type:
      name: Výkonnostný typ detských spinerov
      description: Opisuje všeobecný výkon na zápasníckom povrchu, zvyčajne odráža,
        ako sa povrch správa priamo v aréne (agresívny vs. zameraný na výdrž atď.).
    bayan_included_accessories:
      name: Príslušenstvo zahrnuté v balení bajanu
      description: Príslušenstvo je súčasťou balenia bajanu (v krabici).
    bayan_tuning_system_type:
      name: Typ ladiaceho systému bajanu
      description: Spôsob napnutia/ladenia bajanu (konštrukčný štýl), čo má vplyv
        na prenosnosť a jednoduchosť ladenia.
    bb_gun_action_type:
      name: Typ mechanizmu vzduchovky
      description: Označuje mechanický mechanizmus nabíjania alebo cyklovania vzduchovky
        (napr. pákový mechanizmus, pumpa, lámanie hlavne).
    bb_gun_caliber:
      name: Kaliber BB zbrane
      description: Definuje priemer streliva, na ktoré je zbraň určená, a zabezpečuje
        kompatibilitu so strelivom.
    bb_gun_part_type:
      name: Typ dielu vzduchovky
      description: Klasifikuje konkrétny komponent alebo príslušenstvo určené pre
        vzduchovky, čo umožňuje nakupujúcim rýchlo nájsť presnú náhradu, upgrade alebo
        doplnok (napr. hlaveň, tesnenie piestu, rýchlonabíjač).
    beach_ball_features:
      name: Vlastnosti plážovej lopty
      description: Pozoruhodné funkčné vlastnosti špecifické pre plážové lopty.
    beach_bucket_features:
      name: Vlastnosti plážových vedierok
      description: Funkčné vlastnosti plážového vedierka, ktoré ovplyvňujú jeho používanie,
        odolnosť a praktickosť.
    beach_sand_toy_items_included:
      name: Hračka na pláž/do piesku v cene
      description: Ďalšie hračky na pláž/do piesku sú súčasťou vedierka (ak sa predáva
        ako sada).
    bead_breaker_type:
      name: Typ lámacieho nástroja na pneumatiky
      description: Typ/konštrukcia mechanizmu oddeľovača pätky pneumatík.
    bead_hole_style:
      name: Štýl dierky na muške
      description: Určuje štýl alebo konfiguráciu otvoru/štrbiny na muške, čo ovplyvňuje,
        ako sedí na háčiku alebo vlasci.
    bead_type:
      name: Typ korálok
      description: Typ(y) základných korálok, ktoré je potrebné použiť pri tomto vzore.
    bead_type_patch_embellishment:
      name: Typ korálok (zdobená záplata)
      description: Základný typ korálok použitých na povrchu záplaty.
    beaded_accessory_project_type:
      name: Typ projektu s korálkovým doplnkom
      description: Aký doplnok vznikne použitím tohto vzoru.
    beading_needle_flexibility:
      name: Flexibilita ihly na korálky
      description: Relatívna flexibilita tela ihly pre navigáciu pri úzkych stehoch
        pomocou korálok.
    beading_pattern_bead_size:
      name: Veľkosť korálok v korálkovom vzore
      description: Odporúčaná veľkosť (veľkosti) korálok určená(-é) vzorom (bežná
        veľkosť semienkových korálok, napr. 11/0, 8/0).
    beading_pattern_chart_format:
      name: Formát tabuľky korálkových vzorov
      description: Ako je vzor znázornený vizuálne (napr. graficky verzus fotografie
        krok za krokom).
    beading_pattern_stitch_technique:
      name: Steh/technika korálkového vzoru
      description: Základný steh alebo technika navliekania korálok použitá vo vzore.
    beading_technique_stitch:
      name: Technika / steh navliekania korálok
      description: Označuje primárnu techniku navliekania korálok alebo steh použitý
        vo vzore (napr. peyote steh, tehličkový steh).
    beading_thread_fiber_type:
      name: Typ vlákna na navliekanie korálok
      description: Špecifikuje podtyp vlákna/materiálu korálkového vlákna (špecifickejšie
        ako všeobecný materiál) relevantný pre výkon.
    beading_thread_size:
      name: Rozmery korálkovej priadze
      description: Označuje označenie veľkosti od výrobcu/z priemyslu používané pre
        korálkové vlákno (špecifická značka/rad), ako napríklad veľkosť D alebo 00.
    beading_thread_use_case:
      name: Prípad použitia korálkového vlákna
      description: Označuje základné odporúčané použitie vlákna na navliekanie korálok
        a pomáha kupujúcim vybrať si ten správny produkt pre ich projekt.
    beading_wire_coating_material:
      name: Povrchový materiál drôtu na na navliekanie korálok
      description: Určuje materiál vonkajšieho povlaku na korálkovom drôte (ak je
        prítomný), ktorý ovplyvňuje cit, trvanlivosť a odolnosť voči zalomeniu.
    beading_wire_strand_count:
      name: Počet prameňov drôtu na navíjanie korálok
      description: Označuje počet prameňov vo viacpramennom drôte na navliekanie korálok
        (napr. 7-pramenný, 19-pramenný, 49-pramenný), čo ovplyvňuje flexibilitu a
        splývavosť.
    beadlock_type:
      name: Typ korálkovej zámky
      description: Označuje, či je koleso vybavené beadlockom a aký je štýl (pomáha
        kupujúcim terénnych/úžitkových vozidiel).
    beam_material:
      name: Materiál nosníka
      description: Primárny materiál nosníka/tyče (často odlišný od hláv/príslušenstva).
    beam_pattern:
      name: Vzor lúča
      description: Rozloženie svetelného výkonu použitého na osvetlenie počas jazdy/jazdy
        v teréne.
    bean_bag_fabric_material:
      name: Materiál látky vrecka na fazuľky
      description: Označuje povrchovú látku použitú na sedacie vaky dodávané so súpravou.
    bean_paste_variety:
      name: Forma fazuľovej pasty
      description: Uvádza konkrétny typ fazuľovej pasty na základe spôsobu výroby
        alebo hlavnej zložky.
    bean_preparation:
      name: Príprava fazule
      description: Označuje, ako sú fazule pripravené alebo spracované pred predajom
        (napr. celé struky, lúpané, nasekané, naklíčené).
    bean_variety:
      name: Odroda fazule
      description: Označuje botanickú alebo trhovú odrodu fazule (napr. zelená fazuľa,
        edamame, ťahavá fazuľa).
    beanie_style:
      name: Štýl čiapky
      description: Určuje celkový dizajn, konštrukciu alebo siluetu čiapky, aby si
        nakupujúci mohli rýchlo vybrať medzi bežnými variáciami.
    bearing_clearance:
      name: Odstup ložiska
      description: Označuje triedu vnútorného radiálneho odstupu ložiska (veľkosť
        vnútornej vôle); trieda C0 sa označuje aj ako CN alebo normálny odstup.
    bearing_construction_type:
      name: Typ konštrukcie ložiska
      description: Identifikuje konštrukciu alebo konštrukčný štýl ložiska použitý
        v náboji (napr. kazetová, voľná s guľôčkou).
    bearing_edge_type:
      name: Typ hrany ložiska
      description: Typ/profil hrany ložiska, ktorá ovplyvňuje útok a výdrž.
    bearing_lubrication:
      name: Mazanie ložiska
      description: Označuje typ maziva aplikovaného na ložisko počas výroby, napríklad
        mazivo alebo olej.
    bearing_material:
      name: Materiál ložiska
      description: Označuje konštrukčný materiál ložiska (napr. oceľ, keramický hybrid),
        čo pomáha jazdcom vybrať si medzi možnosťami odolnosti, nákladu a výkonnosti.
    bearing_rating:
      name: Klasifikácia ložiska
      description: Určuje triedu tolerancie ložiska alebo výkonnosť použitú pri korčuliach
        (napr. ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Kód tesnenia ložiska
      description: Označuje typ tesnenia použitý na ložisku, ktorý ovplyvňuje trvanlivosť
        a valivý odpor.
    bearing_seal_type:
      name: Typ tesnenia ložiska
      description: Špecifikuje konštrukciu tesnenia alebo tienenia, ktorá chráni vnútorné
        časti ložiska pred kontaminantmi a ovplyvňuje odpor (napr. 2RS, ZZ, LLU, otvorené).
    bearing_shield_type:
      name: Typ ochranného krytu ložiska
      description: Typ ochranného krytu alebo tesnenia, ktoré chráni vnútorné časti
        ložiska.
    bearing_size_code:
      name: Kód veľkosti ložiska
      description: Štandardizované označenie ložiska (napr. 608, 688), ktoré spája
        vnútorný priemer, vonkajší priemer a šírku.
    bearing_type:
      name: Typ ložiska
      description: Určuje konštrukčný štýl ložísk použitých v náhlavnej súprave.
    beater_head_material:
      name: Materiál hlavy bubna
      description: Určuje materiál kontaktu/hlavy paličky basového bubna (napr. plsť,
        drevo, guma).
    beaters_included:
      name: Súčasťou súpravy sú paličky
      description: Určuje, koľko paličiek je súčasťou/nainštalovaných s bubnovým pedálom
        (napr. jedna alebo dve paličky), alebo či paličky nie sú súčasťou súpravy.
    bed_base_type:
      name: Typ základne postele
      description: Definuje konštrukciu základne postele alebo pohovky (napr. vrchná
        doska s plošinou, pružinový lamelový systém, nastaviteľná).
    bed_storage_type:
      name: Typ úložného priestoru základne
      description: Uvádza integrovaný úložný mechanizmus rámu postele.
    bedroom_furniture_items_included:
      name: Vrátane položiek kúpeľňového nábytku
      description: Určuje jednotlivé kusy nábytku, ktoré sú súčasťou spálňovej zostavy
        (napr. posteľ, komoda, nočné stolíky), čo umožňuje nakupujúcim bez čítania
        dlhých popisov rýchlo zistiť, čo je súčasťou balenia.
    bedroom_vanity_items_included:
      name: Toaletná súprava do spálne v cene
      description: Uvádza jednotlivé položky dodávané s toaletnou súpravou do spálne,
        aby zákazníci presne vedeli, čo sa dodáva (napr. zrkadlo, taburetka, súprava
        osvetlenia).
    beer_based_cocktail_variety:
      name: Druh koktailu na báze piva
      description: Klasifikuje koktaily na báze piva podľa ich špecifického typu,
        napr. Radler, Shandy, Michelada.
    beet_variety:
      name: Odroda repy
      description: Určuje kultivar alebo odrodu repy, čo pomáha nakupujúcim pri identifikácii
        chuti, farby a kulinárskeho využitia (napr. červená, zlatá, Chioggia).
    bell_actuation_mechanism:
      name: Mechanizmus spustenia zvončeka
      description: Určuje povinnosť používateľa stlačiť zvonček, čo pomáha kupujúcim
        vybrať si preferovanú ergonómiu.
    bell_guard_coverage_area:
      name: Oblasť pokrytia elektronického vrátnika
      description: Označuje, ktorú časť elektronického vrátnika má ochranný kryt chrániť.
    bell_material:
      name: Materiál zvončeka
      description: Materiál dielu elektronického vrátnika (ak je uvedený oddelene
        od celkového materiálu prístroja).
    bellhousing_bolt_pattern:
      name: Schéma skrutiek puzdra zvončeka
      description: Určuje štandard vzoru alebo skupinu vzorov skrutiek na strane spojkovej
        skrine/motora, ktoré používa prevodová skriňa.
    bellows_material:
      name: Materiál vlnovca
      description: Materiál tela/krytu vlnovca (ak je súčasťou balenia).
    bellows_orientation:
      name: Orientácia vlnovca
      description: Označuje konfiguráciu vlnovca použitého na prívod vzduchu do potrubia.
    belly_panel_style:
      name: Štýl pracky
      description: Opisuje konštrukciu pásu alebo brušného panelu, ktorý sa prispôsobuje
        rastúcemu bruchu.
    belt_buckle_type:
      name: Typ remeňovej pracky
      description: Opisuje konkrétny mechanizmus alebo dizajn pracky použitý na opasku.
    beret_style:
      name: Štýl baretky
      description: Označuje konkrétny dizajn baretky alebo kultúrny variant.
    berry_species:
      name: Druhy bobuľového ovocia
      description: Označuje druh bobuľového ovocia v produkte, aby si kupujúci mohli
        rýchlo pomocou filtra vybrať obľúbené bobuľové ovocie.
    beta_casein_variant:
      name: Variant beta-kazeínu
      description: Pre spotrebiteľov s intoleranciou uvádza, ktorý variant beta-kazeínového
        proteínu (napr. A2) je prítomný v mlieku.
    beverage_sweetness_level:
      name: Úroveň sladkosti nápoja
      description: Klasifikuje nápoj podľa stupňa pridaného sladidla alebo cukru.
    bezel_graduation_units:
      name: Jednotky stupňovania fazetky
      description: Určuje označenia jednotiek na otočnej fazetke (stupne, mily alebo
        dvojitá stupnica).
    bicycle_brake_set_components_included:
      name: Vrátane súčastí brzdiacej sady bicykla
      description: Uvádza jednotlivé diely dodávané v súprave, aby zákazníci presne
        vedeli, čo je súčasťou balenia, a mohli porovnať rôzne konfigurácie balíka.
    bicycle_cage_mounting_position:
      name: Montážna poloha rámu bicykla
      description: Určuje, na ktoré miesto na bicykli sa má držiak namontovať.
    bicycle_computer_mount_placement:
      name: Umiestnenie držiaka bicyklového počítača
      description: Identifikuje miesto na bicykli, kde sa inštaluje držiak počítača,
        napríklad vpredu na riadidlách alebo na hornom kryte predstavca.
    bicycle_folding_mechanism:
      name: Skladací mechanizmus bicykla
      description: Určuje mechanický systém zloženia rámu bicykla (napr. zloženie
        na polovicu, vertikálne zloženie).
    bicycle_frame_design:
      name: Dizajn rámu bicykla
      description: Určuje celkový štýl rámu bicykla, ktorý ovplyvňuje prístupnosť,
        nosnosť a úložný priestor.
    bicycle_frame_style:
      name: Štýl rámu bicykla
      description: Opisuje konštrukčný štýl rámu bicykla (step-through, lowrider,
        chopper stretch atď.), ktorý ovplyvňuje držanie tela a estetiku jazdca.
    bicycle_handlebar_type:
      name: Typ riadidiel bicykla
      description: Identifikuje špecifický štýl alebo geometriu riadidiel, pomocou
        ktorého si jazdci môžu vybrať riadidlá vhodné pre ich jazdnú polohu a disciplínu.
    bicycle_headset_configuration:
      name: Konfigurácia hlavového zloženia bicykla
      description: Označuje konštrukčný štýl alebo štandard hlavového zloženia bicykla
        podľa usporiadania tesniacej manžety (napr. externá manžeta, ZeroStack, integrovaná
        manžeta, manžeta so závitom).
    bicycle_hub_type:
      name: Typ náboja bicykla
      description: Opisuje mechanizmus náboja dodávaný s kolesom, ktorý ovplyvňuje
        kompatibilitu pohonu a štýl jazdy.
    bicycle_lock_security_certification:
      name: Certifikácia bezpečnosti zámku bicykla
      description: Nezávislá certifikácia tretej strany, ktorá potvrdzuje ochranu
        pred krádežou (napr. Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Typ pedálu bicykla
      description: Určuje celkový štýl ovládania alebo dizajn pedálu, ako je napríklad
        platforma, variant bez klipov alebo hybridy, čo pomáha jazdcom vybrať si správne
        rozhranie pre ich štýl jazdy.
    bicycle_propulsion_type:
      name: Typ pohonu bicykla
      description: Určuje spôsob pohonu bicykla, napríklad manuálne pedálovanie, elektrická
        asistencia alebo interný spaľovací motor.
    bicycle_pump_type:
      name: Typ pumpy na bicykel
      description: Identifikuje konštrukčný štýl čerpadla, ktorý pomáha zákazníkom
        vybrať si dizajn, ktorý najlepšie vyhovuje ich potrebám pri jazde, skladovaní
        alebo núdzových situáciách.
    bicycle_rack_mounting_type:
      name: Typ upevnenia stojanu na bicykel
      description: Opisuje primárnu metódu alebo miesto používané na pripevnenie nosiča
        k bicyklu, čo pomáha používateľom overiť kompatibilitu s ich rámom a hardvérom.
    bicycle_suspension_type:
      name: Typ odpruženia bicykla
      description: Identifikuje prítomnosť a konfiguráciu odpruženia na bicykli.
    bicycle_tire_tread_pattern:
      name: Vzor dezénu pneumatiky bicykla
      description: Uvádza štýl dezénu pneumatiky, ktorý má vplyv na trakciu a valivý
        odpor na rôznych povrchoch.
    bidirectional_charging_capability:
      name: Možnosť obojsmerného nabíjania
      description: Označuje, či elektromobil podporuje obojsmerné režimy nabíjania,
        ako napríklad V2G a/alebo V2H.
    bike_rack_mounting_style:
      name: Spôsob upevnenia nosiča na bicykel
      description: Ako stojan podopiera/zaisťuje bicykel.
    bike_rack_tilt_function:
      name: Funkcia nakláňania nosiča bicykla
      description: Či/aká je funkcia naklápania pre prístup do zadného batožinového
        priestoru, keď je nosič nainštalovaný.
    bikini_top_style:
      name: Štýl vrchného dielu bikín
      description: Určuje dizajn alebo strih vrchnej časti bikín, čo pomáha nakupujúcim
        vyhľadať preferované strihy a siluety.
    billiard_brush_type:
      name: Typ biliardovej kefky
      description: Definuje špecifický štýl nástroja na čistenie biliardového stola
        (napr. kefa na stôl, kefa na okraj, čistiaci blok).
    billiard_glove_finger_coverage:
      name: Krytie prstov biliardovej rukavice
      description: Identifikuje, ktoré prsty sú zakryté dizajnom rukavice, a poskytuje
        presné filtrovanie pre štýly rukavíc špecifické pre biliard.
    billiard_pocket_style:
      name: Štýl biliardových vreciek
      description: Určuje štrukturálny alebo estetický štýl vrecka, ktorý ovplyvňuje
        kompatibilitu a výzdobu stola.
    billiard_rack_style:
      name: Štýl biliardového stojana
      description: Opisuje fyzický štýl alebo mechanizmus stojana (napr. tradičný
        rám, šablóna, skladací).
    billiard_table_type:
      name: Typ biliardového stola
      description: Určuje disciplínu alebo štýl použitia pri hre s tágom, pre ktorý
        je stôl určený (napr. biliard, snooker, karambol).
    billiards_discipline:
      name: Disciplína biliardu
      description: Označuje konkrétnu variáciu (typ hry) hry s tágom, pre ktorú je
        produkt určený alebo s ktorou je kompatibilný.
    binding_compatibility_standard:
      name: Norma kompatibility viazania
      description: Identifikuje rozhranie viazania (jedinú normu), pre ktoré je lyžiarka
        certifikovaná, čím zabezpečuje bezpečné a správne párovanie s lyžiarskym viazaním.
    binding_inclusion:
      name: Viazanie v cene
      description: Určuje, či sa lyže predávajú rozložené, s integrovaným systémom
        alebo so samostatným viazaním.
    binding_interface:
      name: Rozhranie viazania
      description: Uvádza typ viazacej dosky alebo rozhrania, s ktorým sú lyže predmontované
        alebo s ktorým sú kompatibilné, čím sa zaručuje kompatibilita lyžiarok a viazania.
    binding_liner_type:
      name: Typ vložky viazania
      description: Opisuje štýl vnútornej vložky použitej vo viazaní/topánke (napr.
        odnímateľná, s možnosťou chôdze, tepelne tvarovateľná).
    binding_mounting_system:
      name: Systém upevnenia viazania
      description: Identifikuje rozhranie použité na pripevnenie viazania k lyži (plochá
        montáž, lišta/koľajnička, doska atď.).
    binding_position:
      name: Poloha pri viazaní
      description: Označuje určenú montážnu polohu alebo konfiguráciu viazania (napr.
        predná topánka, zadná topánka, ARTP).
    binding_strap_position:
      name: Poloha popruhu viazania
      description: Určuje, kam sa má na viazaní nainštalovať popruh.
    bingo_components_included:
      name: Vrátane súčastí hry Bingo
      description: Uvádza komponenty zabalené v bingo sade, ako sú bingo loptičky,
        karty a fixky.
    bingo_number_range:
      name: Rozsah čísel pre bingo
      description: Identifikuje rozsah/variant bingo čísel podporovaný súpravou.
    bingo_set_features:
      name: Funkcie bingo súpravy
      description: Identifikuje základnú formu bingo setu (fyzický/manuálny vs. elektronický/interaktívny).
    bipod_mounting_interface:
      name: Rozhranie pre montáž dvojnožky
      description: Určuje pripojovacie rozhranie používané na pripojenie dvojnožky
        k strelnej zbrani alebo koľajnicovému systému.
    bit_attachment_type:
      name: Typ uchytenia bitu
      description: Určuje, ako sa hlavový stojan pripája k vrtáku (napr. spojovacie
        konce, konce s prackou, konce so skrutkou Chicago).
    bit_mouthpiece_design:
      name: Dizajn náustku vrtáka
      description: Identifikuje štrukturálny štýl alebo konfiguráciu kĺbu náustku,
        ktorá riadi rozloženie tlaku, výdych podnebia a celkovú závažnosť.
    bit_ring_style:
      name: Štýl krúžku vrtáka
      description: Definuje typ bočníc alebo krúžkov udidla, ktoré sa pripájajú k
        uzde a ovplyvňujú účinok, bočné vedenie a pocit z oťaží.
    bladder_material:
      name: Materiál mechu
      description: Označuje materiál použitý na vnútornú vakuovú nádrž, ktorá zadržiava
        vzduch.
    blade_attachment_type:
      name: Typ upevnenia čepele
      description: Označuje, či korčule používajú mechanizmus s klapkami (kĺbový)
        alebo pevný držiak čepele.
    blade_finish_coating:
      name: Povrchová úprava/náter čepele
      description: Povrchová úprava aplikovaná na čepeľ z estetických dôvodov alebo
        na ochranu pred koróziou.
    blade_hosel_type:
      name: Typ krčka golfovej hlavy typu blade
      description: Určuje štýl pripojenia čepele, ktorá zapadá do násady, čo ovplyvňuje
        kompatibilitu (napr. štandardná alebo zúžená).
    blade_length_type:
      name: Typ dĺžky čepele
      description: Klasifikuje dĺžku čepele ako krátku, strednú alebo dlhú, pričom
        každá z nich ovplyvňuje kadenciu streľby a tréningové ciele.
    blade_lie:
      name: Umiestnenie čepele
      description: Určuje číslo sklonu čepele hokejky, ktoré indikuje, ako čepeľ sedí
        na ľade vzhľadom na palicu hokejky.
    blade_sharpness:
      name: Ostrosť čepele
      description: Označuje, či je ostrie zbrane nabrúsené alebo otupené na tréning.
    blade_size_category:
      name: Kategória veľkosti čepele
      description: Štandardizovaný medzinárodný kód veľkosti čepele šable (0–5) používaný
        na rozlíšenie čepelí pre mládež a dospelých.
    blade_size_class:
      name: Trieda veľkosti čepele
      description: Klasifikuje čepele podľa konvencie hráčov o veľkostiach, pričom
        zodpovedá veľkostiam násady ako napríklad pre mládež, juniorov, stredne pokročilých
        alebo seniorov.
    blade_size_number:
      name: Číslo veľkosti čepele
      description: Štandardný číselný kód veľkosti (0–5) definovaný šermiarskymi predpismi,
        ktorý určuje dĺžku čepele a oprávnenosť pre vekovú skupinu.
    blaster_mechanism:
      name: Mechanizmus pištole
      description: Definuje vnútorný mechanizmus gélovej pištole (napr. GBB, AEG,
        pružina).
    block_edge_style:
      name: Štýl blokového okraja
      description: Opisuje, ako sú hrany/rohy drevených kociek upravené pre lepší
        pocit a bezpečnosť.
    blocking_mat_features:
      name: Vlastnosti blokovacej podložky
      description: Funkčné vlastnosti špecifické pre blokovacie podložky (skladovanie,
        prenosnosť, použiteľnosť).
    blocking_mat_grid_unit:
      name: Jednotka blokovacej podložky s mriežkou
      description: Systém jednotiek použitý na tlačenej mriežke, ktorý pomáha používateľom
        porovnávať vzory a miery.
    blocking_mat_surface_markings:
      name: Značenie povrchu blokovacej rohože
      description: Typ merania/vodiacich označení vytlačených alebo vylisovaných do
        povrchu podložky.
    blocking_wire_coating:
      name: Povlak blokovacieho drôtu
      description: Povrchová úprava/náter blokovacích špendlíkov, ktorá ovplyvňuje
        odolnosť voči hrdzi, hladkosť a riziko zaseknutia.
    blocking_wire_end_cap_type:
      name: Typ koncovky blokovacieho špendlíka
      description: Určuje typ ochrany/povrchovej úpravy koncoviek blokovacích špendlíkov
        z dôvodu bezpečnosti a ochrany tkaniny.
    blocking_wire_set_includes:
      name: Obsah sady blokovacích špendlíkov
      description: Určuje, ktoré komponenty sú súčasťou produktu s blokovacími špendlíkmi
        (napr. T-kus, úložná rúrka).
    blocking_wire_usage:
      name: Použitie blokovacieho drôtu
      description: Základné použitie, pre ktoré je flexibilný blokovací špendlík určený.
    bloom_stage:
      name: Fáza kvitnutia
      description: Označuje, ako rozkvitnuté sú kvety sedmokrásky pri doručení/odoslaní.
    blower_motor_bearing_type:
      name: Typ ložiska motora ventilátora
      description: Určuje konštrukciu ložiska použitú v motore ventilátora.
    blower_motor_mounting_position:
      name: Montážna poloha motora ventilátora
      description: Miesto inštalácie motora ventilátora v module klimatizácie/vozidle
        (napr. vpredu, vzadu).
    blowpipe_valve_type:
      name: Typ ventilu dúchavky
      description: Určuje typ ventilu sklárskej píšťaly (ak existuje).
    bo_staff_style:
      name: Štýl zbrane bó
      description: Definuje štruktúru alebo konštrukciu tyče (napr. rovná, zúžená,
        s penovou výplňou, skladacia).
    board_game_theme:
      name: Motív stolovej hry
      description: Príbeh/prostredie stolovej hry (používa sa na objavovanie a prehliadanie).
    board_rail_shape:
      name: Tvar koľajnice dosky
      description: Určuje tvar hrany dosky (napr. mäkká, tvrdá, 50/50), ktorý ovplyvňuje
        priľnavosť a ovládateľnosť na vlne.
    board_size_classification:
      name: Klasifikácia podľa veľkosti dosky
      description: Rozdeľuje dosky alebo súpravy na hru cornhole do bežných štandardizovaných
        rozmerov.
    board_type_compatibility:
      name: Kompatibilita typov dosiek
      description: Určuje typ dosky, pre ktorú je popruh určený.
    boat_construction_type:
      name: Typ konštrukcie člna
      description: Opisuje konštrukčný štýl alebo formát veslice (napr. nafukovací,
        pevný).
    boat_hook_flotation:
      name: Flotácia bidla
      description: Označuje, či bidlo sa bude nadnášať pri hodení do vody.
    boat_ladder_stowage_style:
      name: Spôsob uloženia lodného rebríka
      description: Popisuje, ako sa rebrík skladuje, keď sa nepoužíva (napr. skladací,
        výsuvný, odnímateľný).
    boat_trailer_construction_type:
      name: Typ konštrukcie vozíka na loď
      description: Označuje, či vozík podopiera loď pomocou lôžka, valčekov alebo
        hybridného systému.
    boat_weaving_shuttle_weft_exit_type:
      name: Typ útkového výstupu pre tkáčsky člnok
      description: Ako útková priadza vychádza z člnka počas tkania.
    bobbin_loading_type:
      name: Typ vkladania cievky
      description: Určuje spôsob vloženia/nasadenia cievky do šijacieho stroja.
    bobbin_system:
      name: Systém cievky
      description: Systém/typ vkladania cievky používaný šijacím strojom.
    bobbin_type:
      name: Typ cievky
      description: Určuje formát prípravy priadze, na ktorý je člnok určený (alebo
        ktorý zahŕňa), čo určuje kompatibilitu a typické použitie (napr. člnky často
        používajú cievky; člnky na koberce môžu byť otvorené pre pásy).
    bobbin_winder_winding_direction:
      name: Smer navíjania navíjačky cievky
      description: Určuje smer navíjania/otáčania podporovaný navíjačkou cievky.
    bobble_mechanism:
      name: Hojdací mechanizmus
      description: Určuje štýl hojdacieho mechanizmu, ktorý ovplyvňuje pohyb a odolnosť.
    bocal_material:
      name: Materiál náustku
      description: Určuje materiál zahrnutých náustkov.
    bodhr_n_head_material:
      name: Materiál blany bodhranu
      description: Materiál hracej blany (membrány), ktorý silne ovplyvňuje tón a
        požiadavky na údržbu.
    bodhr_n_tuning_system_type:
      name: Typ ladiaceho systému bodhránu
      description: Štýl vstavaného ladiaceho mechanizmu používaného na nastavenie
        napnutia blany (ak je možné naladiť).
    body_armor_coverage_area:
      name: Oblasť pokrytia ochrannou vestou
      description: Označuje, ktoré časti tela produkt chráni.
    body_armor_intended_use:
      name: Určené použitie telového chrániča
      description: Určuje primárny scenár jazdy alebo použitia, pre ktorý je telový
        chránič pre štvorkolky/úžitkové štvorkolky určený.
    body_cord_connector_style:
      name: Typ konektora telového kábla
      description: Popisuje konfiguráciu konektorov na koncoch kábla (napr. počet
        kolíkov alebo bajonetový štýl), ktorá určuje kompatibilitu so zbraňami a bodovacími
        zariadeniami.
    body_panel_finish_state:
      name: Stav povrchovej úpravy panelov karosérie
      description: Opisuje stav prípravy/úpravy povrchu bočného panelu pred natieraním/inštaláciou.
    body_shape:
      name: Tvar tela
      description: Určuje všeobecný tvar/štýl tela elektrickej gitary.
    bodysuit_bottom_coverage:
      name: Pokrytie spodného dielu odevu
      description: Definuje strih a krytie spodnej časti overalu, čo ovplyvňuje pohodlie
        a kompatibilitu s oblečením.
    boilie_shape:
      name: Tvar zarážky návnady
      description: Identifikuje tvar boilies vyrábaných na rolovacej doske, čo rybárom
        umožňuje vybrať si medzi rôznymi profilmi návnad.
    boilie_stop_buoyancy:
      name: Vztlaku zarážky návnady
      description: Určuje, či je zarážka návnady navrhnutá tak, aby plávala, klesala
        alebo sa vznášala, čo ovplyvňuje predstavenie návnady vo vodnom stĺpci.
    bok_choy_variety:
      name: Odroda čínskej kapusty
      description: Určuje kultivar, trhový názov alebo odrodu bok choy (napr. Baby,
        Shanghai, Nai Bai, Tatsoi, Purple Lady), čo umožňuje kupujúcim vybrať si požadovanú
        chuť, veľkosť a vzhľad.
    bolt_drive_style:
      name: Štýl pohonu skrutiek
      description: Určuje štýl pohonu skrutiek na upevnenie skateboardu, pričom rozlišuje
        medzi bežnými typmi skrutkovačov, ako sú imbusové alebo krížové.
    bone_content:
      name: Obsah kostí
      description: Určuje, či mäso obsahuje kosti.
    bongo_center_block_material:
      name: Materiál stredového bloku bongo
      description: Materiál stredového bloku spájajúceho dva bubny bonga (ak je to
        relevantné).
    bongo_shell_material:
      name: Materiál korpusu bonga
      description: Materiál korpusov bong (telies bubnov), okrem hláv a hardvéru.
    bongo_tuning_system:
      name: Ladiaci systém bonga
      description: Spôsob ladenia/konštrukcie bonga (napr. tradičné ladenie s výstupkami
        verzus ladenie pomocou lana), čo má vplyv na údržbu a originalitu.
    boning_type:
      name: Typ vykosťovania
      description: Označuje štrukturálny podporný systém vo vnútri korzetu, spájajúci
        materiál aj štýl/tvar použitej kosti, čo priamo ovplyvňuje úroveň podpory,
        flexibilitu a odolnosť.
    boot_liner_type:
      name: Typ vložky do korčúľ
      description: Opisuje konštrukciu alebo spôsob fungovania vnútornej vložky vo
        vnútri snowboardovej topánky (napr. tepelne tvarovateľná, odnímateľná).
    boot_sole_compatibility:
      name: Kompatibilita podrážky topánok
      description: Uvádza normy pre podrážky alebo systémy medzičlánkov, ktoré viazanie
        akceptuje.
    boot_support_level:
      name: Úroveň podpory obuvi
      description: Popisuje celkovú tuhosť/oporu členku alebo korčule, ktorú korčule
        poskytujú.
    boot_width_code:
      name: Kód šírky obuvi
      description: Označenie šírky podľa písmen výrobcu, ktoré sa používa konkrétne
        pri určovaní veľkostí korčúľ na krasokorčuľovanie (napr. AAA, AA, B, C, D).
    booth_configuration:
      name: Konfigurácia búdky
      description: Určuje celkové usporiadanie sedenia v kabínke (napr. jednostranné,
        rohové, modulárne).
    bootie_toe_design:
      name: Dizajn špičky topánok
      description: Určuje typ konštrukcie špičky surfových a útesových topánok.
    border_type:
      name: Typ lemu
      description: Úprava okraja/štruktúra lemu vyšívanej nášivky (ovplyvňuje vzhľad,
        odolnosť proti strapkaniu a vnímanú kvalitu).
    bore_cleaner_format:
      name: Formát čističa otvorov
      description: Označuje fyzický tvar produktu na čistenie otvorov (nástroj alebo
        spotrebný materiál).
    bore_cleaner_safe_for_finish:
      name: Čistič otvorov bezpečný na konečnú úpravu
      description: Uvádza, na aké bežné povrchové úpravy mosadzných dychových nástrojov
        je čistič otvorov možné bezpečne použiť.
    bottle_cage_loading_direction:
      name: Smer vkladania držiaka na fľaše
      description: Opisuje smer, ktorým sa fľaša vkladá alebo vyberá z koša.
    bottle_neck_finish_closure_size:
      name: Povrchová úprava hrdla fľaše/veľkosť uzáveru
      description: Štandardizovaná veľkosť otvoru/ukončenia fľaše na zabezpečenie
        kompatibility s uzávermi, korkovými zátkami a krytmi (napr. korunkové ukončenie
        s priemerom 26 mm).
    bottle_style:
      name: Štýl fľaše
      description: Bežný tvar fliaš používaný pri domácej výrobe piva a vína.
    bottom_bracket_interface:
      name: Medzičlánok stredového ložiska
      description: Označuje normu vretena/stredového ložiska, pre ktorý je kľuka určená,
        čím sa zabezpečuje kompatibilita rámu a stredového ložiska.
    bottom_bracket_standard:
      name: Štandardné stredové zloženie
      description: Rám podopiera puzdro/medzičlánok stredového ložiska, čo určuje
        kompatibilitu kľukovej sady.
    bottom_type_suitability:
      name: Vhodnosť typu spodnej časti oblečenia
      description: Určuje podmienky morského dna, pre ktoré je kotva navrhnutá tak,
        aby v nich najlepšie držala.
    bounce_level:
      name: Úroveň odrazu
      description: Uvádza, do akej miery sa lopta odráža po dopade alebo hodení, čo
        pomáha používateľom vybrať si správnu loptu na cvičenia, ako sú hody o stenu
        alebo smeče.
    bouncy_ball_surface_finish:
      name: Povrchová úprava skákacej lopty
      description: Určuje hmatovú a/alebo vizuálnu úpravu povrchu skákacej loptičky
        (napr. hladký, s výstupkami, s trblietkami).
    boundary_marker_type:
      name: Typ vymedzovacej značky
      description: Určuje fyzickú podobu ohraničujúceho prvku ihriska, resp. ohraničujúceho
        prostriedku (napr. kužeľ, páska, farba, šablóna, stroj).
    bouquet_size_tier:
      name: Veľkosť kytice
      description: Štandardizovaná veľkosť kytice nezávisle od počtu stoniek (užitočné
        pri zmiešaných stonkách).
    bow_and_yo_yo_edge_finish:
      name: Mašľová a jojo úprava okrajov
      description: Opisuje lemovanie/úpravu okrajov pri mašľovej a jojo úprave (najmä
        pri mašliach zo stuhy).
    bow_case_shell_type:
      name: Typ puzdra na sláčik
      description: Opisuje štruktúru konštrukcie vonkajšej časti luku (napr. tvrdý
        obal vs. mäkký obal).
    bow_compatibility:
      name: Kompatibilita sláčika
      description: Určuje typ luku, pre ktorý je hrot luku určený alebo na ktorý je
        dimenzovaný.
    bow_hair_color:
      name: Farba vlásia sláčika
      description: Označuje farbu/vzhľad vlasu použitom na sláčiku orchestrálneho
        strunového nástroja (napr. biely/odfarbený, prírodná biela, čierna).
    bow_stick_material:
      name: Materiál prútu sláčika
      description: Určuje materiál, z ktorého je vyrobený prút sláčika (hlavná palička),
        čo výrazne ovplyvňuje hmotnosť, cit a cenu.
    bow_type:
      name: Typ sláčika
      description: Špecifikuje konštrukčný dizajn mládežníckeho luku (napr. kladkový,
        reflexný, dlhý luk), ktorý vo veľkej miere ovplyvňuje štýl streľby, požadované
        príslušenstvo a tréningové programy.
    bow_winding_material:
      name: Materiál na ovinutie sláčika
      description: Špecifikuje materiál použitý na ovinutie sláčika, ktorý ovplyvňuje
        uchopenie a vyváženie.
    bow_yo_yo_embellishment_style:
      name: Štýl zdobenia – sláčik/jojo
      description: Označuje spôsob výroby ozdoby (mašľová alebo látková jojo konštrukcia).
    bowling_ball_core_type:
      name: Typ jadra bowlingovej gule
      description: Určuje vnútornú konštrukciu jadra alebo symetriu bowlingovej gule,
        čo ovplyvňuje jej pohyb a schopnosť stáčania.
    bowling_ball_coverstock_type:
      name: Typ krycieho materiálu bowlingovej gule
      description: Uvádza materiál alebo technológiu vonkajšieho krycieho materiálu
        bowlingovej gule, ktorá určuje trakciu a potenciál háčika.
    bowling_set_style:
      name: Štýl bowlingovej súpravy
      description: Definuje všeobecný štýl alebo použitie bowlingovej súpravy.
    box_lid_type:
      name: Typ veka krabice
      description: Typ mechanizmu veka/otvárania použitého pri darčekovej krabici
        alebo plechovke.
    box_spring_profile:
      name: Profil pružinového rámu
      description: Klasifikuje celkovú výšku pružinového rámu do kategórií profilov
        vhodných pre kupujúcich (napr. nízky profil, štandardný, vysoký profil), aby
        zákazníci mohli rýchlo filtrovať bez toho, aby poznali presné rozmery.
    box_spring_requirement:
      name: Požiadavky na pružinový box
      description: Označuje, či je pre matrac potrebný ďalší pružinový rám alebo základ.
    boxing_ring_style:
      name: Štýl boxerského ringu
      description: Klasifikuje celkový konštrukčný štýl alebo určený scenár použitia
        ringu (napr. súťažný vs. tréningový, vyvýšený vs. podlahový).
    bra_length_type:
      name: Typ dĺžky podprsenky
      description: Definuje klasifikáciu dĺžky podprseniek na základe vertikálneho
        krytia, ako je napríklad štandardná, dlhá, midi alebo skrátená.
    bra_padding_type:
      name: Typ vypchávok podprsenky
      description: Popisuje úroveň alebo prítomnosť polstrovania u košíčkov.
    braces_compatibility:
      name: Kompatibilita svoriek
      description: Určuje, či je možné chránič zubov nosiť s ortodontickými strojčekmi,
        a do akej miery.
    brake_band_form:
      name: Tvar brzdového pásu
      description: Označuje, či sa brzdový pás dodáva ako súvislá slučka (nekonečná)
        alebo ako odrezaný kus, ktorý sa musí upevniť.
    brake_band_material_type:
      name: Typ materiálu brzdového pásu
      description: Určuje materiál, z ktorého je vyrobený brzdový pás (napr. bavlnená
        šnúra, nylonová šnúra alebo pružinová oceľ), čo má vplyv na životnosť, priľnavosť,
        rozťažnosť a hlučnosť.
    brake_band_style:
      name: Štýl brzdového pásu
      description: Určuje systém alebo typ napínania brzdového pásu používaný na kolovrátku
        na napínanie krídla a cievky.
    brake_bleeding_method:
      name: Metóda odvzdušnenia bŕzd
      description: Prístup odvzdušnenia podporený súpravou.
    brake_booster_assist_type:
      name: Typ posilňovača bŕzd
      description: Označuje pomocný mechanizmus používaný posilňovačom bŕzd.
    brake_booster_diaphragm_configuration:
      name: Konfigurácia membrány posilňovača bŕzd
      description: Označuje počet/typ membrán použitých v posilňovači.
    brake_caliper_bleeder_screw_position:
      name: Poloha odvzdušňovacej skrutky brzdového strmeňa
      description: Určuje polohu skrutky odvzdušňovača na strmeni po namontovaní (slúži
        na overenie, či je odvzdušňovač umiestnený v najvyššom bode, aby bolo odvzdušnenie
        správne).
    brake_caliper_finish:
      name: Povrchová úprava brzdového strmeňa
      description: Určuje povrchovú úpravu alebo ochranný náter aplikovaný na telo
        brzdového strmeňa (napr. farba, pokovovanie, eloxovanie).
    brake_caliper_included_hardware:
      name: Hardvér vo výbave brzdového strmeňa
      description: Určuje, čo je súčasťou zostavy strmeňa.
    brake_caliper_mount_type:
      name: Typ uchytenia brzdového strmeňa
      description: Typ montážneho rozhrania používaného na pripevnenie strmeňa k kĺbu/konzole.
    brake_caliper_paint_base_chemistry:
      name: Chemické zloženie farby brzdového strmeňa
      description: Použitý systém farieb/živic alebo skupina chemických zložiek.
    brake_caliper_paint_kit_contents:
      name: Obsah súpravy na farbenie brzdového strmeňa
      description: Označuje, čo je súčasťou balenia okrem samotnej farby.
    brake_circuit_type:
      name: Typ brzdového okruhu
      description: Konfigurácia hydraulického obvodu podporovaná hlavným valcom.
    brake_clutch_fluid_base_chemistry:
      name: Chemické zloženie základu brzdovej/spojkovej kvapaliny
      description: Základné chemické zloženie brzdovej/spojkovej hydraulickej kvapaliny,
        ktoré ovplyvňuje kompatibilitu a miešateľnosť.
    brake_clutch_fluid_dot_specification:
      name: DOT špecifikácia brzdovej/spojkovej kvapaliny
      description: DOT klasifikácia výkonnosti pre hydraulické brzdové/spojkové kvapaliny
        (napr. DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Povrchová úprava/náter brzdového bubna
      description: Povrchová úprava alebo ochranný náter nanesený na brzdový bubon
        (napr. elektrolytický náter, lakovaný, pozinkovaný).
    brake_drum_type:
      name: Typ brzdového bubna
      description: Typ konštrukcie brzdového bubna (s integrovaným nábojom/ložiskom
        alebo bez neho).
    brake_fluid_base:
      name: Základ brzdovej kvapaliny
      description: Špecifikuje zloženie požadovanej alebo zahrnutej hydraulickej brzdovej
        kvapaliny.
    brake_fluid_base_chemistry:
      name: Základné chemické zloženie brzdovej kvapaliny
      description: Definuje chemickú bázu brzdovej kvapaliny, ktorý určuje kompatibilitu
        a pravidlá miešania.
    brake_fluid_dot_specification:
      name: DOT špecifikácia brzdovej kvapaliny
      description: Uvádza klasifikáciu/špecifikáciu brzdovej kvapaliny podľa DOT (napr.
        DOT 3, DOT 4) pre produkty z kategórie brzdových kvapalín.
    brake_fluid_standards_compliance:
      name: Súlad s normami pre brzdové kvapaliny
      description: Priemyselné normy, ktoré brzdová kvapalina údajne spĺňa (nad rámec
        klasifikácie DOT).
    brake_fluid_type:
      name: Typ brzdovej kvapaliny
      description: Určuje brzdovú kvapalinu potrebnú pre hydraulický brzdový strmeň
        na bicykli.
    brake_hose_end_fitting_type:
      name: Typ koncovky brzdovej hadice
      description: Typ pripojenia na každom konci brzdovej hadičky (napr. banjo, rozšírené,
        vnútorný/vonkajší závit), používaný na zabezpečenie kompatibility s brzdovými
        strmeňmi/hadičkami.
    brake_lever_pull_type:
      name: Typ brzdovej páky s ťahom
      description: Určuje pomer ťahu lanka/mechaniku, pre ktorú je páka navrhnutá,
        čím sa zabezpečuje kompatibilita s konkrétnymi brzdovými strmeňmi (napr. ráfikové
        brzdy s krátkym ťahom alebo V-brzdy s dlhým ťahom).
    brake_light_switch_actuation_type:
      name: Typ aktivácie spínača brzdového svetla
      description: Označuje, ktorá fyzická udalosť aktivuje spínač (pedál/piest vs.
        hydraulický tlak atď.).
    brake_light_switch_connector_type:
      name: Typ konektora spínača brzdového svetla
      description: Určuje štýl/formu elektrického konektora, ktorý používa spínač
        brzdových svetiel na pripojenie ku káblovému zväzku vozidla.
    brake_light_switch_contact_type:
      name: Typ kontaktu spínača brzdového svetla
      description: Konfigurácia/správanie elektrických kontaktov spínača brzdových
        svetiel (napr. normálne otvorený/zatvorený, prepínací alebo viacobvodový).
    brake_light_switch_mounting_style:
      name: Spôsob montáže spínača brzdových svetiel
      description: Spôsob montáže/upevnenia spínača brzdových svetiel na vozidle alebo
        v brzdovom systéme (napr. závit, zacvaknutie, upevnenie konzolou, banjo skrutka).
    brake_master_cylinder_mounting_type:
      name: Typ upevnenia hlavného brzdového valca
      description: Ako sa hlavný brzdový valec upevňuje k vozidlu/posilňovaču bŕzd
        (rozloženie skrutiek/typ príruby).
    brake_master_cylinder_reservoir_type:
      name: Typ nádržky hlavného brzdového valca
      description: Typ/konfigurácia nádržky brzdovej kvapaliny, ktorá je súčasťou
        hlavného valca alebo je preň potrebná.
    brake_mount_type:
      name: Typ upevnenia brzdy
      description: Identifikuje brzdové rozhranie zabudované vo vidlici, aby si jazdci
        mohli overiť kompatibilitu brzdového systému.
    brake_mounting_flange_bolt_pattern:
      name: Rozloženie skrutiek na upevňovacej prírube bŕzd
      description: Určuje rozmiestnenie otvorov/skrutiek montážnej príruby použité
        na pripevnenie nosiča brzdy alebo konzoly strmeňa k náprave prívesu (napr.
        4-skrutková).
    brake_pad_backing_plate_material:
      name: Materiál nosiča brzdových doštičiek
      description: Určuje materiál nosiča brzdových doštičiek, ktorý ovplyvňuje odvod
        tepla a hmotnosť.
    brake_pad_compatible_rotor_type:
      name: Typ rotora kompatibilný s brzdovými doštičkami
      description: Určuje typ povrchu rotora/disku, na fungovanie s ktorým je doštička
        určená.
    brake_pad_compound:
      name: Zmes brzdových doštičiek
      description: Označuje zloženie trecieho materiálu brzdovej doštičky.
    brake_pad_form_factor:
      name: Tvar brzdových doštičiek
      description: Určuje brzdový systém/formu, pre ktorý je doštička určená (napr.
        kotúčová, bubnová, parkovacia brzda).
    brake_pad_material:
      name: Materiál brzdových doštičiek
      description: Určuje skupinu trecích zmesí/materiálov použitých v obložení brzdových
        doštičiek.
    brake_pad_shim_included:
      name: Podložka brzdových doštičiek je súčasťou balenia
      description: Uvádza, či sú podložky na tlmenie hluku súčasťou balenia alebo
        sú už namontované.
    brake_pad_wear_indicator_type:
      name: Typ indikátora opotrebovania brzdových doštičiek
      description: Uvádza, aký typ indikátora opotrebenia je súčasťou brzdových doštičiek
        (napr. mechanický pískací jazýček alebo elektronický senzor).
    brake_position:
      name: Poloha brzdy
      description: Označuje, kde na vozidle sa má brzdový komponent namontovať.
    brake_rotor_mount_type:
      name: Typ upevnenia rotora brzdy
      description: Definuje rozhranie používané na pripojenie brzdového rotora k náboju
        (ak je to relevantné).
    brake_service_kit_components_included:
      name: Komponenty v súprave na servis bŕzd
      description: Zoznam nástrojov/adaptérov/spotrebného materiálu, ktorý je súčasťou
        súpravy na servis bŕzd.
    brake_shoe_friction_material:
      name: Trecí materiál brzdových čeľustí
      description: Zmes na trecie plochy/obloženie použitá na brzdovej čeľusti (materiál,
        ktorý prichádza do styku s bubnom).
    brake_shoe_set_contents:
      name: Obsah súpravy brzdových čeľustí
      description: Čo je súčasťou balenia (napr. len pätky alebo pätky plus príslušenstvo/pružiny).
    brake_system_type:
      name: Typ brzdového systému
      description: Určuje technológiu brzdového mechanizmu používanú na ovládanie
        otáčania cievky počas nahadzovania.
    brake_type:
      name: Typ brzdy
      description: Typ mechanizmu na brzdenie/napínanie osnovného valca.
    brandy_age_classification:
      name: Klasifikácia veku Brandy
      description: Klasifikuje brandy pomocou štandardných označení kvality/veku (napr.
        VS, VSOP, XO), ktoré odrážajú minimálne požiadavky na zrenie.
    brass_cleaning_tool_type:
      name: Typ nástroja na čistenie mosadze
      description: Určuje typ nástroja používaného na čistenie alebo údržbu plechových
        hudobných nástrojov.
    brass_instrument_application_area:
      name: Oblasť aplikácie dychových nástrojov
      description: Časti dychového nástroja, na ktoré je dezinfekčný sprej určený.
    brass_instrument_care_kit_purpose:
      name: Účel súpravy na starostlivosť o dychové nástroje
      description: Opisuje zamýšľaný scenár použitia súpravy (bežná údržba, hĺbkové
        čistenie, cestovanie/núdzový stav, štartovacia súprava pre študentov atď.).
    brass_instrument_case_shell_material:
      name: Materiál plášťa dychového nástroja
      description: Primárny materiál pevného plášťa/rámu (ak je to relevantné), oddelený
        od všeobecného materiálu vrecka/puzdra.
    brass_instrument_lubricant_additives_features:
      name: Vlastnosti/prísady do mazív pre dychové nástroje
      description: Významné funkčné vlastnosti zloženia maziva.
    brass_instrument_lubricant_base_composition:
      name: Základné zloženie maziva pre dychové nástroje
      description: Základné zložky/chemické zloženie maziva na dychové hudobné nástroje.
    brass_instrument_lubricant_viscosity_grade:
      name: Trieda viskozity maziva pre dychové nástroje
      description: Relatívna viskozita/tekutosť maziva určeného pre dychové nástroje.
    brass_instrument_replacement_part_type:
      name: Typ náhradného dielu pre plechové dychové nástroje
      description: Určuje, o aký druh náhradného dielu ide pre plechové hudobné nástroje
        (komponenty ventilov/zásuviek/zátok, korky/plstené kryty, ochranné kryty atď.).
    brass_instrument_valve_configuration:
      name: Konfigurácia ventilu pre dychové nástroje
      description: Ako nástroj mení výšku tónu (mechanizmus ventilu/posuvníka).
    brass_lubricant_application_area:
      name: Oblasť použitia lubrikantu pri plechových dychových nástrojoch
      description: Mechanizmus dychových nástrojov, pre ktorý je mazivo určené.
    brass_mouthpiece_backbore:
      name: Mosadzný zadný otvor náustku
      description: Profil/kategória zadného otvoru náustku (tvar/veľkosť zadného otvoru),
        ovplyvňujúca tón a intonáciu.
    brass_mouthpiece_cup_depth:
      name: Hĺbka mosadzného náustkového kalicha
      description: Klasifikácia hĺbky manžety náustku (aká hlboká je manžeta), ktorá
        ovplyvňuje tón a odozvu.
    brass_polishing_cloth_abrasiveness_level:
      name: Úroveň abrazivity leštiacej handričky na mosadz
      description: Označuje, aká agresívna je handrička pri odstraňovaní zašpinenia
        v porovnaní s poskytovaním jemného lesku.
    bread_crumb_base_ingredient:
      name: Základná prísada strúhanky
      description: Označuje hlavnú zložku, z ktorej je strúhanka vyrobená, ako je
        pšenica, ryža, bravčová koža alebo mandle.
    bread_variety:
      name: Druh chleba
      description: Určuje druh alebo typ chleba alebo žemlí, čo pomáha kupujúcim pri
        vyhľadaní konkrétnych druhov pečiva (napr. brioška, bageta, naan).
    breadstick_style:
      name: Tvar chlebových tyčiniek
      description: Označuje konkrétny tradičný tvar alebo tvar tyčinky.
    bridge_head_material:
      name: Materiál hlavice mosta
      description: Materiál použitý výhradne na hlavu mostíka, čo ovplyvňuje hmotnosť,
        pocit a odolnosť.
    bridge_head_type:
      name: Typ hlavy mostíka
      description: Identifikuje tvar hlavy mostíka a pomáha kupujúcim vybrať si preferované
        tvary podstavcov tága.
    bridle_part_type:
      name: Typ uzdy
      description: Uvádza, ktorý komponent uzdy daná náhradná položka nahrádza, čím
        pomáha zákazníkom nájsť presne ten diel, ktorý potrebujú.
    bridle_style:
      name: Štýl uzdy
      description: Klasifikuje celkový štýl alebo konštrukciu uzdy, aby jazdci mohli
        rýchlo nájsť vybavenie vhodné pre ich potreby alebo disciplínu.
    broadhead_field_point_attachment_style:
      name: Typ uchytenia hlavy/hrotu šípu
      description: Určuje, ako sa šíp so širokou alebo úzkou hlavicou pripája k drieku
        šípu.
    broadhead_thread_size:
      name: Veľkosť závitu hlavy šípu
      description: Uvádza špecifikáciu vlákna používanú na pripevnenie šípu so širokou
        alebo úzkou hlavicou k vložke alebo drieku šípu.
    broadhead_tip_type:
      name: Typ hrotu hlavy šípu
      description: Definuje štýl hrotu/kovania šípu so širokou hlavicou, ktoré iniciuje
        penetráciu, čo ovplyvňuje výkonnosť u rôznych druhov zveri.
    broccoli_cut:
      name: Odroda brokolice
      description: Uvádza, ako bola brokolica nakrájaná alebo pripravená pred balením
        (napr. celá hlávka, ružičky, nakrájaná nadrobno).
    broccoli_variety:
      name: Odroda brokolice
      description: Určuje konkrétnu odrodu alebo na trhu ponúkaný druh brokolice (napr.
        Tenderstem, Romanesco).
    broom_head_material:
      name: Materiál hlavice metly
      description: Určuje materiálové zloženie hlavy metly, ktoré ovplyvňuje jej životnosť
        a herné vlastnosti.
    brush_format:
      name: Formát metly
      description: Označuje fyzickú formu lyžiarskej alebo snowboardovej kefy, pričom
        rozlišuje medzi ručne ovládanými blokmi a rotačnými formami poháňanými vŕtačkou,
        ako sú napríklad valce z rotačnej vlny alebo rotačnej plsti.
    brush_shape:
      name: Tvar kefy
      description: Určuje fyzické tvary alebo profil tela alebo hlavy kefy, čo ovplyvňuje
        kontaktnú plochu a manipuláciu.
    brussel_sprout_preparation:
      name: Príprava ružičkového kelu
      description: Opisuje fyzickú prípravu alebo spôsob rezania ružičkového kelu.
    brussels_sprout_variety:
      name: Odroda ružičkového kelu
      description: Určuje kultivar alebo odrodu ružičkového kelu, pričom zahŕňa súčasné
        aj budúce odrody.
    bubble_blower_features:
      name: Funkcie fúkača bublín
      description: Uvádza bežné funkčné vlastnosti fúkačov bublín.
    bubble_gun_bubble_output_modes:
      name: Režimy fúkania bublín z bublinkovej pištole
      description: Určuje prevádzkové režimy bublinkovej pištole, ako napríklad jednoduchý
        režim s bublinkami, kontinuálny režim alebo režim s viacerými rýchlosťami.
    bubble_machine_features:
      name: Funkcie stroja na bubliny
      description: Zdôrazňuje bežné funkčné vlastnosti bublinkových strojov nad rámec
        základnej obsluhy.
    bubble_machine_items_included:
      name: Vrátane strojčeka na bublinky
      description: Uvádza zoznam hlavných položiek obsiahnutých v balení (napr. roztok
        na bubliny, náhradné tyčinky, popruh na prenášanie, diaľkové ovládanie).
    bubble_output_rate:
      name: Rýchlosť výstupu bublín
      description: Uvádza približnú/kvalitatívnu rýchlosť produkcie bublín pre bublifuk
        (napr. nízka/stredná/vysoká) vrátane toho, či je výstup variabilný.
    bubble_solution_container_type:
      name: Typ nádoby na bublinový roztok
      description: Určuje spôsob dodávania/používania roztoku na tvorbu bublín v bublinkovej
        pištoli (napr. vnútorná nádržka, pripojená fľaša, samostatná miska/namáčanie).
    bubble_toy_included_accessories:
      name: Bublinová hračka je súčasťou príslušenstva
      description: Zoznam bežných produktov, ktoré sú súčasťou balenia bublinkovej
        hračky (napr. fľaša s roztokom, tácka, náhradné tyčinky).
    buckwheat_processing_method:
      name: Metóda spracovania pohánky
      description: Popisuje spôsob úpravy pohánky pred predajom (napr. pražená, naklíčená,
        nafúknutá).
    buckwheat_product_form:
      name: Forma produktu z pohánky
      description: Fyzická prezentácia špecifická pre pohánku zahŕňajúca formy, ktoré
        nie sú uvedené vo všeobecnom zozname (napr. vločky, chlebíky, instantné vrecká).
    bug_collecting_kit_items_included:
      name: Vrátane položiek sady na zbieranie chrobákov
      description: Nástroje a vzdelávacie materiály obsiahnuté v súprave na zber hmyzu.
    built_in_storage_type:
      name: Typ vstavaného úložného priestoru
      description: Identifikuje typy úložného priestoru zabudovaného do rámu poschodovej
        postele (napr. zásuvky, police, úložný priestor pod schodíkmi).
    bumper_finish:
      name: Povrchová úprava nárazníka
      description: Označuje povrchovú úpravu alebo náter aplikovaný na nárazníku.
    bumper_sensor_cutouts:
      name: Výrezy senzorov nárazníka
      description: Označuje otvory/výrezy od výrobcu originálneho nárazníka, ktoré
        nárazník obsahuje alebo podporuje.
    bunk_bed_configuration:
      name: Konfigurácia poschodovej postele
      description: Označuje konštrukčné rozloženie a veľkosť kombinácie matraca poschodovej
        postele.
    buoyancy:
      name: Buoyancy
      description: Označuje vztlakové správanie návnady alebo nástrahy vo vode, ako
        je napríklad plávanie, potopenie alebo vznášanie sa.
    burkini_pieces_included:
      name: Vrátane jednotlivých dielov burkini
      description: Uvádza komponenty odevu, ktoré sú súčasťou dodávky sady burkini,
        aby zákazníci presne vedeli, čo kupujú.
    burn_rate:
      name: Burn rate
      description: Popisuje, ako rýchlo sa cigaretový papier po zapálení spáli.
    bus_model_type:
      name: Typ modelu autobusu
      description: Identifikuje konfiguráciu/typ reálneho autobusu, ktorú predstavuje
        model v mierke (karoséria/trieda použitia).
    bust_design:
      name: Dizajn oblasti poprsia
      description: Opisuje konfiguráciu oblasti poprsia a výstrihu dámskeho body (napr.
        otvorené poprsie, vstavaná podprsenka, hlboký výstrih).
    butter_variety:
      name: Druh masla
      description: Určuje spôsob výroby alebo charakteristický typ masla, napríklad
        kultivované maslo, maslo zo smotany, maslo európskeho typu, prečistené maslo
        (ghí) alebo srvátkové maslo.
    buttermilk_variety:
      name: Druh cmaru
      description: Identifikuje konkrétny štýl alebo formu predávaného cmaru (napr.
        kultivovaný, tradičný, práškový).
    button_application:
      name: Aplikácia gombíka
      description: Označuje určené použitie alebo typ projektu s gombíkmi (napr. oblečenie,
        čalúnenie).
    button_attachment_type:
      name: Typ upevnenia tlačidla
      description: Určuje konštrukciu gombíka na jeho pripevnenie k tkanine (napr.
        prešívané otvory verzus očko), nie štýl zapínania.
    button_finish:
      name: Úprava gombíkov
      description: Popisuje povrchovú úpravu/vzhľad tlačidla (napr. matné alebo lesklé).
    buttonhole_elastic_application:
      name: Použitie pružnej gombíkovej dierky
      description: Hlavné určenie/použitie pre ohybnú ozdobnú gumičku.
    cab_type:
      name: Typ kabíny
      description: Určuje konfiguráciu kabíny nákladného vozidla.
    cabasa_construction_type:
      name: Typ konštrukcie cabasy
      description: Určuje fyzickú konštrukciu/tvar tela hudobného nástroja cabasa
        a zostavy retiazok/korálok.
    cabbage_variety:
      name: Odroda kapusty
      description: Uvádza odrodu alebo druh kapusty (napr. zelená, čínska, savojská),
        aby si nakupujúci mohli vybrať podľa chuti, konzistencie a spôsobu použitia
        v kuchyni.
    cabinet_door_style:
      name: Štýl dvierok skrine
      description: Označuje vizuálny dizajn dvierok skrinky, ako napríklad orámovaný
        alebo vyvýšený panel, ktorý pomôže esteticky zladiť kuchyňu.
    cabinet_overlay_type:
      name: Typ prekrytia skriniek
      description: Určuje prekrytie alebo umiestnenie dvierok vzhľadom na rám skrinky.
    cable_end_type:
      name: Typ ukončenia kábla
      description: Opisuje tvar alebo typ koncovky alebo spojky kábla, ktorá sa pripája
        k brzdovým alebo radiacim pákam.
    cable_housing_construction:
      name: Konštrukcia káblového puzdra
      description: Opisuje konštrukčné riešenie puzdra – napríklad navinutie cievkou,
        bezkompresné alebo segmentované spojenie – ktoré ovplyvňuje odolnosť voči
        stlačeniu, flexibilitu a pocit z jazdy.
    cable_housing_liner_type:
      name: Typ vložky káblového puzdra
      description: Označuje, či puzdro obsahuje vnútornú vložku a/alebo ošetrenie
        namazaním, a použitý materiál alebo technológiu, ktoré ovplyvňujú zníženie
        trenia a odolnosť voči poveternostným vplyvom.
    cable_management_type:
      name: Typ správy káblov
      description: Určuje typ vstavaných káblov alebo funkcií správy napájania, ktoré
        konferenčný stôl ponúka.
    cable_surface_treatment:
      name: Ošetrenie povrchu kábla
      description: Označuje akýkoľvek špeciálny náter alebo povrchovú úpravu aplikovanú
        na kábel na zníženie trenia alebo ochranu proti korózii.
    cabochon_back_type:
      name: Typ zadnej strany kabošonu
      description: Označuje profil/povrchovú úpravu zadnej strany kabošonu, ktorá
        ovplyvňuje metódy nastavenia/lepenia a kompatibilitu.
    cacao_bean_variety:
      name: Odroda kakaových bôbov
      description: Určuje botanickú odrodu alebo kultivar použitého kakaového bôbu.
    cacao_roast_level:
      name: Stupeň praženia kakaa
      description: Opisuje stupeň praženia kakaa pred mletím.
    cage_package_type:
      name: Typ klietkového balíka
      description: Definuje, ktoré komponenty sú súčasťou nákupu (napr. iba sieť,
        súprava rámu, kompletný balík).
    cajon_body_shell_material:
      name: Materiál tela/obalu cajonu
      description: Identifikuje materiál tela/obalu cajonu (okrem tapy).
    cajon_corner_control_system:
      name: Systém kontroly rohov cajónov
      description: Určuje, či cajon podporuje nastavenie zvuku v rohoch (napr. skrutky
        v rohoch) na zmenu odozvy na úder.
    cajon_corner_edge_design:
      name: Dizajn rohu/okraja cajonu
      description: Popisuje konštrukciu rohov a hrán, ktorá ovplyvňuje pohodlie a
        hrateľnosť.
    cajon_feet_type:
      name: Typ nožičiek cajonu
      description: Určuje typ nožičiek na cajone, ktoré ovplyvňujú stabilitu a rezonanciu.
    cajon_snare_adjustability:
      name: Nastaviteľnosť malého bubna cajonu
      description: Označuje, či a ako je možné upraviť efekt malého bubna (napnutie,
        zapojenie alebo oboje).
    cajon_snare_system_type:
      name: Typ systému malého bubna cajonu
      description: Určuje interný mechanizmus malého bubna použitý na vytvorenie efektu
        malého bubna.
    cake_shape:
      name: Tvar torty
      description: Opisuje fyzickú formu, v ktorej sa pečie kávový koláč.
    cake_topping:
      name: Poleva torty
      description: Označuje základnú polevu alebo povrchovú úpravu nanesenú na kávový
        koláč.
    cake_type:
      name: Typ koláča
      description: Opisuje štýl alebo druh koláča (napr. hrnčekový, piškótový, tvarohový).
    caliper_mount_type:
      name: Typ uchytenia strmeňa
      description: Definuje štandard rozhrania rámu alebo vidlice, ktorý používa brzdový
        strmeň (napr. montáž na stĺpik, plochá montáž).
    caliper_mounting_standard:
      name: Štandard montáže strmeňa
      description: Určuje montážne rozhranie/štandard (napr. plochá montáž, montáž
        na stĺpik, IS atď.) použitý na pripevnenie brzdového strmeňa k rámu alebo
        vidlici bicykla.
    camera_mounting_location_vehicle_exterior:
      name: Miesto montáže kamery (exteriér vozidla)
      description: Miesto montáže kamery (kamier) na vozidle (napr. predná mriežka,
        zadná časť, bočné zrkadlá).
    camouflage_environment_type:
      name: Typ maskovacieho prostredia
      description: Označuje základné prostredie, pre ktoré je maskovací vzor určený,
        napríklad les, púšť alebo močiar.
    camping_oil_application:
      name: Použitie kempingového oleja
      description: Určuje hlavné určenie oleja v kempingových podmienkach (napr. ako
        palivo do lampášov alebo do varičov).
    camshaft_construction:
      name: Konštrukcia vačkového hriadeľa
      description: Spôsob výroby/konštrukcia vačkového hriadeľa.
    camshaft_material:
      name: Materiál vačkového hriadeľa
      description: Hlavný materiál jadra/hriadeľa vačkového hriadeľa (základný materiál).
    camshaft_position:
      name: Poloha vačkového hriadeľa
      description: Určuje zamýšľané umiestnenie/typ vačkového hriadeľa v motore (napr.
        sací alebo výfukový, prípadne konkrétna strana motora/poloha).
    candle_container_type_included:
      name: Vrátane typu nádoby na sviečku
      description: Označuje typ nádoby (nádob) na sviečky, ktoré sú súčasťou súpravy.
    candle_dye_form:
      name: Forma farby na sviečky
      description: Určuje fyzickú formu farby/farbiva na sviečky používaného pri výrobe
        sviečok.
    candle_fragrance_form:
      name: Forma vône sviečky
      description: Určuje typ/formu vonnej zložky určenej na výrobu sviečok.
    candle_making_tool_type:
      name: Typ nástroja na výrobu sviečok
      description: Označuje, o aký druh nástroja na výrobu sviečok ide (napr. nalievacia
        nádoba, nástroj na centrovanie knôtu, teplomer).
    candy_texture:
      name: Textúra cukríkov
      description: Opisuje pocit v ústach alebo konzistenciu cukríka, nezávisle od
        chuti alebo tvoru.
    candying_method:
      name: Spôsob kandizovania
      description: Opisuje, ako bolo ovocie kandizované alebo konzervované cukrom
        (napr. kryštalizované, glazované, v sirupe).
    canned_meat_form:
      name: Forma konzervovaného mäsa
      description: Klasifikuje spracovanú formu alebo prezentáciu mäsa v rámci balenia.
    canoe_construction_type:
      name: Typ konštrukcie kanoe
      description: Rozlišuje medzi modelmi trupu kanoe, ako sú napríklad s pevným
        povrchom, nafukovacie a skladacie.
    canoe_hull_shape:
      name: Tvar trupu kanoe
      description: Definuje základný prierez trupu alebo profil spodnej časti, ktorý
        ovplyvňuje stabilitu a manipuláciu.
    canoe_stern_design:
      name: Dizajn kormidla kanoe
      description: Určuje tvar zadnej časti trupu, čo má vplyv na kompatibilitu motorov
        a ovládateľnosť.
    canopy_type:
      name: Typ prístrešku
      description: Opisuje štýl baldachýnu alebo stropného panelu, ktorá je súčasťou
        postele s baldachýnom.
    canvas_compatible_media:
      name: Produkty kompatibilné s plátnom
      description: Označuje, s akým umeleckým/remeselným produktom je plátno určené
        na použitie.
    canvas_format:
      name: Forma plátna
      description: Označuje, či sa tlačiteľné plátno predáva vo forme pásov, roliek
        alebo vopred narezaných panelov.
    canvas_mounting_format:
      name: Montáž/forma plátna
      description: Fyzický forma/spôsob montáže maliarskeho plátna.
    canvas_stretcher_assembly_type:
      name: Typ zostavy naťahovača plátna
      description: Či sa naťahovač predáva zmontovaný ako rám alebo ako tyče/súpravy
        vyžadujúce montáž.
    canvas_stretcher_corner_joint_type:
      name: Typ naťahovača plátna s upevnením na rohoch
      description: Spôsob spájania/konštrukcie rohov naťahovača (napr. drážkovaný
        a čapovaný spoj, prstový spoj, zošívanie, kľúčovanie).
    canvas_surface_tone:
      name: Odtieň povrchu plátna
      description: Základný odtieň/farba natretého povrchu plátna (podkladu), nie
        potlačený dizajn alebo vzor (napr. biely, čierny, tónovaný).
    canvas_weave_type:
      name: Typ tkania plátna
      description: Opisuje štruktúru väzby povrchu plátna, ktorá ovplyvňuje textúru
        a manipuláciu s farbou.
    cap_attachment_style:
      name: Štýl upevnenia viečka
      description: Určuje konštrukciu/spôsob upevnenia krytu náustku saxofónu, ktorý
        môže ovplyvniť ochranu a vloženie do puzdra.
    cap_construction:
      name: Konštrukcia viečka
      description: Určuje, ako je parochňa vyrobená (napr. čipkovaná predná časť,
        celá čipkovaná, ručne viazaná), čo ovplyvňuje realizmus, pohodlie a všestrannosť
        stylingu.
    cap_crown_structure:
      name: Štruktúra korunky viečka
      description: Označuje, či je korunka viečka štruktúrovaná (vystužená) alebo
        neštruktúrovaná (mäkká).
    cap_fit_type:
      name: Typ uchytenia viečka
      description: Určuje, ako čiapka sedí alebo sa prispôsobuje hlave nositeľa (napr.
        priliehavá alebo nastaviteľná).
    cap_seal_type:
      name: Typ tesnenia viečka
      description: Označuje tesniaci prvok použitý na zabránenie úniku oleja a pary
        (napr. O-krúžok, tesnenie).
    cap_size:
      name: Veľkosť viečka
      description: Štítky štandardnej veľkosti, ktoré označujú celkovú veľkosť hlavy
        vhodnú pre sieťku pod parochňu.
    cap_type:
      name: Typ viečka
      description: Typ rozhrania uzáveru použitý na vyrovnávacej nádrži.
    caper_size_grade:
      name: Trieda veľkosti kapár
      description: Klasifikuje kapary podľa štandardných názvov tried, ktoré zodpovedajú
        priemeru plodov.
    capo_clamping_mechanism:
      name: Upínací mechanizmus kapodastra
      description: Určuje spôsob upínania/ovládania použitý na vyvíjanie tlaku na
        struny (spôsob ovládania kapodastra).
    capo_finish:
      name: Povrchová úprava kapodastra
      description: Povrchová úprava tela kapodastra (vzhľad/pocit na dotyk), nezávisle
        od farby (napr. matná alebo lesklá).
    capo_fit_type:
      name: Typ uchytenia kapodastra
      description: Určuje profil krku, pre ktorý je kapodaster navrhnutý (vrátane
        polomeru/plochosti), čo ovplyvňuje upnutie bez škrípania a intonáciu.
    capo_pad_material:
      name: Materiál podložky kapodastra
      description: Určuje materiál kontaktnej podložky, ktorá sa dotýka strún/hmatníka
        (ovplyvňuje priľnavosť, stabilitu ladenia a potenciálne značenie povrchu).
    capo_tension_mechanism:
      name: Napínací mechanizmus kapodastra
      description: Určuje, ako sa na strunách pri posuvnom kapodastre vyvíja a nastavuje
        tlak/napätie.
    capture_method:
      name: Metóda snímania
      description: Označuje, či je pasca určená na odchyt živých zvierat alebo na
        ich smrteľnú likvidáciu.
    car_ev_conversion_kit_motor_type:
      name: Typ konverznej súpravy motora elektromobilu
      description: Špecifikuje technológiu trakčného motora, ktorú zahŕňa alebo vyžaduje
        konverzná súprava (napr. indukcia striedavého prúdu vs. permanentný magnet).
    car_playset_items_included:
      name: Komponenty hernej zostavy s autíčkom v cene
      description: Uvádza hlavné komponenty, ktoré sú súčasťou hernej súpravy s autíčkami,
        okrem základnej konštrukcie (napr. autíčka, figúrky, značky).
    car_shampoo_application_method:
      name: Metóda aplikácie autošampónu
      description: Ako sa má šampón používať pri umývaní vlasov.
    car_wash_solution_form:
      name: Forma prípravku na umývanie auta
      description: Určuje fyzikálnu formu prostriedku na umývanie áut (napr. kvapalina,
        pena, utierky).
    car_wash_solution_scent:
      name: Vôňa prostriedku na umývanie áut
      description: Určuje vôňu/arómu roztoku na umývanie auta (ak je parfumovaný).
    carbonated_water_variety:
      name: Druh sýtenej vody
      description: Klasifikuje sýtenú vodu na základe bežných druhov a zloženia na
        trhu (napr. tonik, sýtená voda, funkčná perlivá voda).
    carbonation:
      name: Karbonácia
      description: Opisuje úroveň alebo spôsob sýtenia oxidom uhličitým v nápoji (napr.
        neperlivá, mierne perlivá, perlivá, nitro).
    carburetor_barrel_count:
      name: Počet valcov karburátora
      description: Uvádza počet škrtiacich otvorov/barelov v karburátore.
    carburetor_choke_type:
      name: Typ sýtiča karburátora
      description: Uvádza spôsob ovládania sýtiča použitý v karburátore.
    carburetor_mounting_flange_type:
      name: Typ upevňovacej príruby karburátora
      description: Určuje štýl montážneho rozhrania karburátora, aby sa zabezpečilo
        lícovanie so sacím/zberným potrubím (napr. hrdlové vs. prírubové/skrutkové
        rozloženie).
    card_binder_page_type:
      name: Typ stránok zakladača kariet
      description: 'Pre zakladače/portfóliá: štýl stránok používaných na ukladanie
        kariet.'
    card_box_holder_type:
      name: Typ krabice/držiaka na karty
      description: Určuje funkčný tvar produktu na zbieranie alebo uchovávanie kariet
        na podujatí (napr. krabica, krabica v štýle poštovej schránky, košík, stojan).
    card_game_accessory_features:
      name: Vlastnosti príslušenstva pre kartové hry
      description: Pozoruhodné funkčné prvky príslušenstva pre kartové hry.
    card_lot_type:
      name: Typ balíčka kariet
      description: Označuje, či je produkt pozostáva z jednej karty alebo viackartovej
        sady/sortimentu.
    card_sleeve_size_format_compatibility:
      name: Veľkosť obalu na karty/kompatibilita formátov
      description: Určuje veľkosť kariet, pre ktoré sú obaly/balíčky/krabičky na karty
        určené.
    carding_surface_pin_material:
      name: Materiál kolíkov pri mykaní
      description: Materiál kolíkov/zubov slúžiacich na rozčesávanie a rozťahovanie
        vlákien.
    care_durability:
      name: Trvanlivosť podľa štítka s pokynmi na ošetrovanie
      description: Označuje očakávanú odolnosť voči praniu/tepelnú odolnosť uvedenú
        na štítku po aplikácii.
    care_label_attachment_type:
      name: Typ pripevnenia štítku s pokynmi na ošetrovanie
      description: Spôsob aplikácie štítku s pokynmi na ošetrovanie na produkt (napr.
        prišitím, nažehlením/tepelným pôsobením, nalepením).
    care_label_format:
      name: Forma štítka s pokynmi na ošetrovanie
      description: Fyzická/tlačená forma štítka s pokynmi na ošetrovanie produktu.
    care_label_symbol_system:
      name: Systém symbolov na štítkoch s pokynmi na údržbu
      description: Štandardy/súbor symbolov použitý na štítku (napr. symboly starostlivosti
        ISO, symboly ASTM/US).
    cargo_area_configuration:
      name: Konfigurácia batožinového priestoru
      description: Určuje konštrukčný typ alebo umiestnenie nákladného priestoru na
        nákladnom bicykli (napr. longtail, s predným nakladaním, trojkolka).
    cargo_net_adjustability:
      name: Nastaviteľnosť siete na batožinu
      description: Uvádza, či a ako je možné nastaviť napnutie/prispôsobenie nákladnej
        siete.
    cargo_net_position:
      name: Poloha siete na batožinu
      description: Miesto upevnenia alebo použitia siete v batožinovom/nákladnom priestore.
    cargo_net_stretch_type:
      name: Typ elastickej siete na batožinu
      description: Či je sieť do batožinového priestoru elastická/napínateľná alebo
        pevná/nenapínateľná.
    cargo_net_style:
      name: Štýl siete na batožinu
      description: Určuje konštrukčný typ alebo tvar nákladnej siete (napr. napínacie
        lanko, popruh, zábrana, hojdacie lôžko).
    cargo_rack_finish:
      name: Povrchová úprava stojana na batožinu
      description: Povrchová úprava/náter vonkajšej časti nosiča nákladu.
    carpet_cleaner_application_method:
      name: Spôsob použitia prostriedku na čistenie kobercov
      description: Určuje zamýšľaný spôsob aplikácie a zapracovania produktu do koberca
        (nad rámec všeobecného tvaru).
    carrier_style:
      name: Štýl nosiča
      description: Nosný mechanizmus/štýl používaný na upevnenie lode na vozidle.
    carrot_size:
      name: Veľkosť mrkvy
      description: Klasifikuje všeobecnú veľkosť výrobku z mrkvy.
    carrot_variety:
      name: Odroda mrkvy
      description: Označuje konkrétnu odrodu alebo kultivar mrkvy.
    carrying_capacity_pairs_boards:
      name: Nosnosť (páry/dosky)
      description: Označuje, koľko párov lyží alebo snowboardov príslušenstvo povoľuje
        alebo je určené na podporu pri použití so stojanom (napr. rozširujúce sady).
    cartridge_thread_compatibility:
      name: Kompatibilita závitov kazety
      description: Označuje normu závitu, ktorý vaporizér alebo batéria podporuje,
        čím sa zabezpečí fyzická kompatibilita kaziet a batérií.
    case_capacity_butts_shafts:
      name: Kapacita puzdra (terče × šípy)
      description: Definuje, koľko spodných dielov a špíc sa do puzdra na tágo zmestí,
        vyjadrené vo formáte spodný diel x špica (napr. 2x4 = 2 spodné diely a 4 špice).
    case_features:
      name: Vlastnosti kufríka
      description: Zdôrazňuje funkčné vlastnosti puzdra na činely/bicie súpravy týkajúce
        sa ochrany a prepravy.
    case_humidifier_refill_type:
      name: Typ náplne do zvlhčovača puzdra
      description: Označuje, či zvlhčovač používa opakovane použiteľné (možné znovu
        navlhčiť/znovu spracovať) prostriedky alebo jednorazové vymeniteľné náplne.
    case_lining_material:
      name: Materiál podšívky kufríka
      description: Označuje základný materiál, ktorý tvorí vnútro puzdra alebo gigbagu
        a ktorý je v kontakte s nástrojom alebo obsahom, a chráni ho.
    case_material:
      name: Materiál kufríka
      description: Označuje základný materiál puzdra hodiniek, ktorý ovplyvňuje odolnosť,
        hmotnosť a estetiku.
    case_mounting_method:
      name: Spôsob montáže puzdra
      description: Ako sa má zvlhčovač umiestniť alebo pripevniť vo vnútri puzdra
        na nástroj.
    case_structure:
      name: Štruktúra puzdra
      description: Označuje tuhosť konštrukcie plášťa.
    case_style_cymbal_drum:
      name: Štýl plášťa (činel/bubon)
      description: Určuje, či ide o mäkké puzdro, tvrdé puzdro alebo hybridný dizajn
        na prepravu činelov alebo bicích súprav.
    casing_material:
      name: Materiál puzdra
      description: Identifikuje primárnu tkaninu použitú v plášti pneumatiky, čo má
        vplyv na hmotnosť, pocit z jazdy a ochranu proti prepichnutiu.
    casino_set_chip_material:
      name: Materiál sady čipov pre kasíno
      description: Hlavný materiál priložených žetónov (v relevantnom prípade).
    casino_set_layout_included:
      name: Súčasťou balenia je plán rozloženia kasínovej súpravy
      description: Určuje, aký druh hracej plochy/rozloženia je súčasťou súpravy.
    cask_finish:
      name: Povrchová úprava suda
      description: Označuje sud alebo sud použitý na spracovanie alebo zrenie liehoviny,
        napríklad sud po bourbone alebo sud po sherry.
    cassava_variety:
      name: Odroda manioku
      description: Označuje konkrétny kultivar alebo odrodu ponúkanej juky/manioku,
        ktorá ovplyvňuje chuť, farbu a vlastnosti pri varení.
    cassette_body_type:
      name: Typ tela kazety
      description: Štandard voľnobežky alebo prevodníka, ktorý je kompatibilný so
        zadným nábojom alebo kolesom (napr. HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Sada funkcií kazetového prehrávača
      description: Označuje funkcie prenášania a prehrávania kaziet, ktoré sú bežné
        pre kazetové prehrávače zabudované do palubnej dosky.
    cassette_speed_compatibility:
      name: Kompatibilita rýchlosti kazety
      description: Uvádza počet rýchlostí (napr. 7-rýchlostná, 12-rýchlostná), na
        ktoré je kazeta alebo voľnobežka navrhnutá, čím sa zaručuje kompatibilita
        s reťazou, radením a prehadzovačkou.
    castanet_shell_size_class:
      name: Veľkostná trieda kastanetov
      description: Štandardizovaná trieda veľkosti obalu kastanetov, bežne používaná
        hráčmi/učiteľmi pri výbere prispôsobenia a tónu
    castanets_included_pieces:
      name: Kastanety sú súčasťou balenia
      description: Označuje, čo je zahrnuté v ponuke produktu (pár alebo jednotlivo,
        plus doplnky).
    castanets_pitch:
      name: Rozstup kastanetov
      description: Označuje bežné označenie výšky/veľkosti, ktoré výrobca používa
        na opis zvukového rozsahu.
    castanets_type:
      name: Typ kastanety
      description: Určuje štýl kastanetov alebo kategóriu určeného použitia.
    caster_type:
      name: Typ kolieska
      description: Označuje štýl koliesok alebo kolies namontovaných na vozíku (napr.
        otočné, aretačné), čo hovorí o ovládateľnosti a stabilite.
    castle_playset_included_items:
      name: Položky obsiahnuté v súprave hradu na hranie
      description: Zachytáva hlavné komponenty, ktoré sú súčasťou stavebnice hradu,
        aby si zákazníci mohli porovnať sady (napr. figúrky, nábytok, vozidlá, doplnky).
    catcher_equipment_included:
      name: Vrátane výbavy chytača
      description: Uvádza komponenty zahrnuté v súprave výstroja chytača, ako je napríklad
        prilba alebo chránič hrudníka chytača.
    catcher_helmet_style:
      name: Štýl prilby chytača
      description: Označuje celkový dizajn vybavenia a ochranu hlavy chytača.
    cattle_breed:
      name: Plemeno hovädzieho dobytka
      description: Označuje plemeno zabitého dobytka, z ktorého pochádza hovädzie
        mäso (napr. Angus, Wagyu, Hereford).
    cauliflower_variety:
      name: Odroda karfiolu
      description: Identifikuje kultivar, farbu alebo špeciálnu odrodu predávaného
        karfiolu.
    celery_form:
      name: Forma zeleru
      description: Uvádza fyzickú formu alebo štýl rezu, v ktorom sa zeler predáva.
    celery_variety:
      name: Odroda zeleru
      description: Uvádza konkrétnu odrodu alebo druh zeleru, čo umožňuje nakupujúcim
        vybrať si podľa chute, farby alebo kulinárskeho využitia.
    cereal_bar_texture:
      name: Textúra cereálnej tyčinky
      description: Opisuje pocit v ústach a konzistenciu cereálnej tyčinky (napr.
        naťahovacia, chrumkavá).
    cereal_type:
      name: Typ obilniny
      description: Klasifikuje tvar alebo formu cereálií alebo granoly (vločky, chrumky,
        zhluky granoly, müsli atď.), aby si kupujúci mohli vyhľadať preferovanú textúru
        alebo spôsob prípravy.
    certificate_border_style:
      name: Štýl orámovania certifikátu
      description: Opisuje dekoratívnu úpravu okraja použitú na certifikáte.
    certificate_personalization_type:
      name: Typ personalizácie certifikátu
      description: Uvádza, ako je možné certifikát prispôsobiť (prázdny s možnosťou
        písania rukou, tlačiteľná šablóna, predtlačený s variabilnými poľami atď.).
    certification_service:
      name: Certifikácia
      description: Externá spoločnosť vykonávajúca klasifikáciu/certifikáciu (ak je
        to relevantné).
    certification_standard:
      name: Certifikačná norma
      description: Určuje certifikáciu bezpečnosti a ohňovzdornosti alebo normu zhody,
        ktorú musí kukla spĺňať.
    chain_coating_finish:
      name: Povrchová úprava/náter reťaze
      description: Určuje akékoľvek ošetrenie povrchu alebo povrchovú úpravu aplikovanú
        na reťaz na zlepšenie odolnosti, zníženie trenia, zabránenie korózii alebo
        zmenu vzhľadu (napr. nitrid titánu, DLC, nikel, antikorózny EPT).
    chain_connection_type:
      name: Typ reťazového spojenia
      description: Určuje metódu uzatvárania poskytnutú alebo požadovanú na spojenie
        koncov reťazca.
    chain_tier_configuration:
      name: Konfigurácia úrovne reťaze
      description: Uvádza počet/usporiadanie úrovní reťaze v záchytnej zostave (jednoduchá,
        dvojitá alebo trojitá úroveň).
    chain_tool_type:
      name: Typ reťazového nástroja
      description: Klasifikuje konkrétny druh nástroja na reťaz bicykla, aby si kupujúci
        mohli rýchlo vyhľadať správne zariadenie.
    chainring_shape:
      name: Tvar ozubeného kolieska
      description: Označuje tvar reťazového kolesa, napríklad okrúhly alebo oválny/eliptický.
    chair_accessories_included:
      name: Vrátane príslušenstva k stoličke
      description: Uvádza zoznam vstavaného alebo zahrnutého príslušenstva, ktoré
        vylepšuje funkčnosť stoličky.
    chair_sash_care_instructions:
      name: Pokyny na ošetrovanie rámu stoličky
      description: Opisuje odporúčaný spôsob čistenia/údržby rámu stoličky.
    chair_sash_finish:
      name: Povrchová úprava šerpy na stoličku
      description: Opisuje lesk/úpravu látky šerpy.
    chair_storage_design:
      name: Konštrukcia úložného priestoru na stoličky
      description: Označuje, ako sa má závesná stolička skladovať (napr. skladacia,
        stohovateľná, neskladacia), aby zákazníci mohli posúdiť skladovanie a prenosnosť.
    chaise_or_sectional_orientation:
      name: Orientácia ležadlovej alebo predĺženej časti
      description: Určuje stranu, na ktorej sa nachádza integrovaná ležadlová alebo
        predĺžená časť pri pohľade na pohovku.
    chamber_size:
      name: Veľkosť komory
      description: Uvádza veľkosť/objem komory náustku, čo ovplyvňuje odpor a zafarbenie
        tónu.
    chanter_finger_spacing:
      name: Rozstup prstov na píšťale na gajdách
      description: Označuje rozostup prstov/veľkosť profilu píšťaly na gajdách (často
        opisovaný ako štandardný, malé ruky alebo veľké ruky).
    chanter_type:
      name: Typ melodickej píšťaly
      description: Typ/konfigurácia píšťaly, ktorá je súčasťou nástroja (alebo sa
        v ňom používa), napríklad s otvoreným alebo uzavretým koncom, cvičná alebo
        s klapkami.
    chard_variety:
      name: Odroda mangoldu
      description: Označuje konkrétny kultivar alebo farebnú odrodu predávaného mangoldu.
    charging_port_location:
      name: Umiestnenie nabíjacieho portu
      description: Fyzické umiestnenie primárneho externého nabíjacieho vstupu (nabíjacieho
        portu) vozidla.
    chassis_construction_type:
      name: Typ konštrukcie podvozku
      description: Opisuje primárnu metódu konštrukcie podvozku použitú pre vozidlo.
    checkbook_loading_orientation:
      name: Orientácia načítania šekovej knižky
      description: Označuje, či je obal šekovej knižky kompatibilný s formátmi šeku
        s horným načítaním, bočným načítaním alebo univerzálnym formátom šeku.
    cheekpiece_style:
      name: Štýl lícnice
      description: Definuje typ konfigurácie lícnice/krúžka na udidle, ktorá určuje
        pohyb pri ťahu a laterálnu stabilitu.
    cheese_alternative_form:
      name: Alternatívna forma syra
      description: Určuje fyzickú formu alebo rez, v ktorom sa alternatíva syra predáva.
    cheese_form:
      name: Forma syra
      description: Popisuje fyzický vzhľad syrového produktu (napr. bochník, blok,
        nakrájaný na plátky, strúhaný).
    cheese_texture:
      name: Textúra syra
      description: Klasifikuje syr podľa jeho všeobecnej textúry alebo pevnosti.
    cheese_variety:
      name: Odroda syra
      description: Identifikuje druh syra použitého ako hlavná príchuť v pochutine.
    cherimoya_variety:
      name: Odroda čerimoje
      description: Označuje konkrétny kultivar/odrodu cherimoye (napr. Fino de Jete,
        El Bumpo).
    cherry_variety:
      name: Odroda čerešne
      description: Určuje kultivar alebo odrodu čerešní, čo pomáha kupujúcim pri výbere
        konkrétnych druhov známych svojou chuťou, farbou, veľkosťou alebo určeným
        kulinárskym využitím.
    chest_pocket_style:
      name: Štýl náprsného vrecka
      description: Určuje prítomnosť a usporiadanie náprsných vreciek na košeli.
    chewing_tobacco_form:
      name: Forma žuvacieho tabaku
      description: Označuje fyzickú formu, štýl strihu alebo veľkosť vrecka žuvacieho
        tabakového výrobku (napr. voľný list, dlhý strih, úzke vrecko).
    chicory_variety:
      name: Odroda čakanky
      description: Označuje konkrétnu odrodu alebo kultivar čakanky, ktorá sa predáva
        (napr. radicchio, belgická endive, escarole).
    chiffon_recommended_use:
      name: Odporúčané použitie šifónu
      description: Primárne odporúčané spôsoby šitia/remeselného spracovania šifónovej
        látky.
    child_seat_accessory_type:
      name: Typ príslušenstva pre detskú sedačku
      description: Určuje konkrétny typ príslušenstva alebo náhradného dielu k detskej
        autosedačke (napr. sedák, opierka na nohy, montážny adaptér), čím umožňuje
        nakupujúcim rýchlo vyhľadať požadovanú položku bez nutnosti vytvárať množstvo
        podkategórií.
    child_seat_mounting_type:
      name: Spôsob upevnenia detskej autosedačky
      description: Určuje spôsob upevnenia detskej sedačky na rám bicykla, nosič alebo
        riadidlá.
    chime_sound_character:
      name: Charakter zvuku zvonkohry
      description: Popisuje zamýšľaný zvukový charakter/tón zvonkohry.
    chin_cup_type:
      name: Typ chrániča brady
      description: Určuje štýl alebo konštrukciu chrániča brady, čo ovplyvňuje pohodlie
        a ochranu pred nárazmi.
    chin_strap_type:
      name: Typ remienka pod bradu
      description: Určuje typ podbradného remienka klobúka – bez remienka, pevný,
        nastaviteľný alebo odnímateľný – na základe čoho si kupujúci môžu vybrať modely,
        ktoré ich ochránia vo veternom alebo aktívnom prostredí.
    china_cymbal_edge_shape:
      name: Tvar okraja čínskych činelov
      description: Opisuje profil hrany/príruby typický pre čínske činely (spôsob
        zahnutia okraja smerom nahor), ktorý ovplyvňuje pocit a zvuk.
    china_cymbal_sound_character:
      name: Charakter zvuku čínskych činelov
      description: Primárne deskriptory zvuku/tónu čínskych činelov používané na objavovanie
        a filtrovanie (napr. gýčový, tmavý, svetlý). Môže sa použiť viacero hodnôt.
    chinstrap_type:
      name: Typ podbradného remienka
      description: Typ podbradného remienka dodávaného s prilbou.
    chip_cut_style:
      name: Štýl čipového strihu
      description: Určuje fyzický štýl rezu alebo textúry hranoliek (napr. ryhované,
        varené v kotli, pražené).
    chip_denomination:
      name: Nominálna hodnota čipu
      description: Ktoré nominálne hodnoty čipov sú zahrnuté v sade (vytlačené alebo
        priradené).
    chocolate_form:
      name: Forma čokolády
      description: Opisuje fyzickú formu, v ktorej sa čokoláda na varenie predáva.
    choy_sum_variety:
      name: Odroda Choy sum
      description: Označuje konkrétny trh alebo botanickú odrodu choy sum, ktorá sa
        predáva.
    cigar_wrapper_color:
      name: Farba obalu na cigary
      description: Štandardná farebná klasifikácia obalu cigary.
    cigarette_filter_type:
      name: Typ cigaretového filtra
      description: Určuje, či má cigareta filter, a ak áno, konštrukciu alebo špeciálnu
        vlastnosť tohto filtra.
    cigarette_size:
      name: Veľkosť cigarety
      description: Klasifikuje cigarety podľa štandardnej dĺžky alebo formátu v danom
        odvetví (napr. kráľovská veľkosť, 100s, slim).
    cigarette_strength_descriptor:
      name: Deskriptor sily cigariet
      description: Označenie sily, ktoré značky tradične používajú na označenie obsahu
        dechtu a nikotínu (napr. Light, Bold, Silver).
    cinch_liner_material:
      name: Materiál podšívky podbrušníka
      description: Určuje materiál použitý na podšívku alebo vnútorný okraj, ktorý
        prichádza do styku s koňom.
    circular_knitting_needle_cable_type:
      name: Typ kábla pre kruhové pletacie ihlice
      description: Materiál/správanie a konštrukcia kábla (napr. potiahnutá oceľ,
        nylon) s vplyvom na pamäť/správanie pri ohýbaní a otáčaní.
    circular_knitting_needles_tip_material:
      name: Materiál hrotov kruhových pletacích ihlíc
      description: Materiál dvoch hrotov ihiel (líši sa od materiálu kábla).
    circumference_adjustment_mechanism:
      name: Mechanizmus nastavenia obvodu
      description: Mechanizmus používaný na nastavenie alebo zaistenie obvodu klbka.
    clamp_design:
      name: Konštrukcia svorky
      description: Opisuje konštrukčný štýl alebo mechanizmus svorky.
    clamp_sheet_music_clip_features:
      name: Vlastnosti sponového držiaku na noty
      description: Funkčné a ochranné vlastnosti sponových držiakov na noty (napr.
        vnútorný okraj, ochrana pred zošmyknutím, otáčanie).
    clamping_closure_type:
      name: Typ upnutia/uzáveru
      description: Určuje mechanizmus používaný na utiahnutie alebo zabezpečenie vyšívacieho
        rámčeka okolo látky.
    clarinet_bell_acoustic_design:
      name: Akustický dizajn ozvučníka klarinetu
      description: Opisuje zvukový/ventilačný dizajn zvona, ktorý má ovplyvňovať odozvu
        a intonáciu.
    clarinet_bell_adjustment_mechanism:
      name: Mechanizmus nastavenia ozvučníka klarinetu
      description: Opisuje, ako sa nastavuje dĺžka/geometria zvona.
    clarinet_bell_ring_material:
      name: Materiál ozvučníka klarinetu
      description: Určuje materiál ochranného krúžku/pásu na okraji ozvučníka klarinetu,
        ak je k dispozícii.
    clarinet_bell_tuning_effect:
      name: Efekt ladenia ozvučníka klarinetu
      description: Uvádza, akým spôsobom je ozvučník navrhnutý tak, aby ovplyvňoval
        ladenie/intonáciu (najmä hrdelné tóny a tóny v nízkom registri) v porovnaní
        so štandardným ozvučníkom.
    clarinet_body_type:
      name: Typ tela klarinetu
      description: Označuje primárny typ konštrukcie tela pre klarinet A.
    clarinet_bore_type:
      name: Typ vnútorného priemeru klarinetu
      description: Opisuje konštrukciu vnútorného priemeru altového klarinetu.
    clarinet_cap_style:
      name: Štýl krytky na klarinet
      description: Štýl dizajnu uzáveru, ktorý je súčasťou produktu s ligatúrou klarinetu
        a/alebo uzáverom náustku (napr. obrátený alebo vetraný).
    clarinet_care_kit_intended_use:
      name: Účel použitia súpravy starostlivosti o klarinet
      description: Primárny kontext použitia, na ktoré je súprava určená (napr. rýchle
        denné sušenie verzus hĺbkové čistenie/údržba).
    clarinet_included_accessories:
      name: Súčasťou klarinetu je príslušenstvo
      description: Uvádza, čo je súčasťou balenia klarinetu Bb.
    clarinet_keywork_material:
      name: Materiál klapiek klarinetu
      description: Určuje materiál, z ktorého je vyrobený mechanizmus klávesov klarinetu
        (napr. mosadz, niklové striebro, postriebrené).
    clarinet_keywork_plating:
      name: Pokovovanie klapiek klarinetu
      description: Určuje pokovovanie/povrchovú úpravu materiálu klávesov klarinetu.
    clarinet_mouthpiece_baffle_profile:
      name: Profil prepážky klarinetového náustku
      description: Opisuje profil vnútornej priečky/stropu náustku klarinetu, ktorý
        ovplyvňuje jasnosť a projekciu zvuku.
    clarinet_mouthpiece_beak_shape:
      name: Tvar zobáka klarinetového náustku
      description: Určuje profil a uhol vonkajšej časti náustku s ohľadom na pohodlie
        hráča a pocit pri nátisku.
    clarinet_mouthpiece_chamber_size:
      name: Veľkosť komory klarinetového náustku
      description: Opisuje relatívnu veľkosť komory náustku klarinetu (podľa údajov
        výrobcu), ktorá môže ovplyvňovať farbu tónu a odpor pri hre.
    clarinet_mouthpiece_intended_tone:
      name: Zamýšľaný tón náustku pre klarinet
      description: Popisuje všeobecný tónový charakter, ktorý je sa propaguje pre
        tento náustok.
    clarinet_mouthpiece_player_level:
      name: Úroveň hráča pri náustku na klarinet
      description: Označuje typickú cieľovú úroveň používateľa pre daný náustok.
    clarinet_reed_cut:
      name: Rez plátku pre klarinet
      description: Určuje tvar/profil plátku (napr. s pilníkovaním alebo bez pilníkovania
        a iné bežne dostupné tvary), čo ovplyvňuje odozvu a tón.
    clarinet_reed_material_type:
      name: Typ materiálu plátkov pre klarinet
      description: Označuje, z čoho je plátok vyrobený (trstina verzus syntetický
        materiál a bežné syntetické podtypy).
    clarinet_thumb_rest_type:
      name: Typ opierky palca na klarinete
      description: Typ/vlastnosť opierky pravého palca.
    classical_guitar_string_3rd_string_type:
      name: Typ 3. struny na klasickej gitare
      description: Či je G (3.) struna hladká (monofilná) alebo vinutá.
    classical_guitar_string_bass_winding_material:
      name: Materiál na ovíjanie basových strún pre klasickú gitaru
      description: Materiál použitý na obalenie/vinutie basových strún (zvyčajne strún
        č. 4 až 6).
    classical_guitar_string_set_configuration:
      name: Konfigurácia súpravy strún pre klasickú gitaru
      description: Určuje, či produkt predstavuje kompletnú sadu alebo konkrétne struny
        (zvyčajne výšková alebo basová strana) pre klasickú gitaru.
    clay_modeling_dough_base_material:
      name: Základný materiál hliny a modelovacej hmoty
      description: Primárne zloženie/základný typ modelovacej hmoty.
    clay_modeling_dough_curing_method:
      name: Metóda vytvrdzovania hliny a modelovacej hmoty
      description: Ako materiál tuhne/vytvrdzuje sa (alebo zostáva opakovane použiteľný),
        čo určuje potrebné nástroje a typické prípady použitia.
    clay_paintability:
      name: Natierateľnosť hliny
      description: Označuje, či je možné vytvrdený hlinený povrch natrieť a aké typy
        náteru sa odporúčajú.
    clay_primary_composition:
      name: Primárne zloženie hliny
      description: Hlavný základný materiál/pojivo na vzduchu schnúcej hliny (napr.
        na báze papiera, na báze minerálov).
    clay_shooting_discipline:
      name: Disciplína streľby na hlinené terče
      description: Určuje disciplínu alebo podujatie streľby na hlinené terče, pre
        ktorú je produkt určený.
    cleaner_format:
      name: Formát čistiaceho prostriedku
      description: Balenie/formát čističa výsuvu.
    cleaner_sanitizer_intended_area:
      name: Oblasť určená na použitie čističa/dezinfekčného prostriedku
      description: Primárna časť plechového dychového nástroja, na čistenie/dezinfekciu
        ktorej je produkt určený.
    cleaning_formula:
      name: Recept na čistenie
      description: Určuje hlavnú skupinu čistiacich/dezinfekčných prostriedkov, do
        ktorej produkt patrí (nie značku), s cieľom umožniť filtrovanie podľa bezpečnosti,
        kompatibility a spôsobu použitia.
    cleaning_task_focus:
      name: Zameranie na úlohu čistenia
      description: Identifikuje primárne problémy s čistením, ktoré má bezvodé umývanie
        riešiť.
    cleanup_method:
      name: Metóda čistenia
      description: Určuje, ako sa má lepidlo čistiť (za mokra) z rúk/náradia/povrchov.
    clear_glue_application_method:
      name: Metóda aplikácie priehľadného lepidla
      description: Určuje štýl dávkovania/aplikátora, ktorý je súčasťou balenia priehľadného
        lepidla.
    clear_glue_finish_after_drying:
      name: Povrchová úprava priehľadného lepidla (po zaschnutí)
      description: Opisuje vzhľad lepidla po zaschnutí/vytvrdnutí (napr. krištáľovo
        číre alebo priehľadné, lesklé alebo matné).
    cleat_bolt_pattern:
      name: Rozvrhnutie skrutiek zarážky
      description: Určuje konfiguráciu skrutiek topánky použitých na upevnenie zarážky,
        ktorá určuje kompatibilitu pedálov a topánok (napr. 2-skrutkový MTB vs. 3-skrutkový
        cestný bicykel).
    cleat_compatibility:
      name: Kompatibilita vystužovacej lišty
      description: Určuje, pre ktoré systémy pedálov alebo zarážok je návlek na obuv
        vhodný.
    cleat_finish:
      name: Povrchová úprava zarážok
      description: Určuje povrchovú úpravu/povlak kufra, ktoré ovplyvňujú odolnosť
        voči korózii a vzhľad.
    cleat_receptacle_system:
      name: Systém uchytenia kolíkov
      description: Identifikuje kompatibilné rozhranie na upevnenie hrotov/kolíkov
        používané na golfových topánkach s hrotmi.
    cleat_release_mechanism:
      name: Mechanizmus uvoľnenia zarážky
      description: Určuje, ako sa zarážka bicykla odpojí od pedálu (napr. jednoduché
        uvoľnenie alebo viacsmerové uvoľnenie).
    cleat_stud_type:
      name: Typ čapu kolíka
      description: Určuje konštrukciu alebo štýl upevnenia kolíkov/zarážok na podrážke
        kopačiek na americký futbal.
    climate_control_module_function:
      name: Funkcia modulu klimatizácie
      description: Určuje primárnu úlohu modulu v klimatizačnom systéme vozidla.
    climbing_hold_mounting_type:
      name: Typ upevnenia lezeckého chytu
      description: Určuje spôsob upevnenia chytu na stenu alebo tréningovú dosku.
    climbing_hold_type:
      name: Typ lezeckého chytu
      description: Klasifikuje tvar alebo štýl chytu, ktorý určuje spôsob uchopenia.
    climbing_protection_device_type:
      name: Typ horolezeckej ochrannej pomôcky
      description: Určuje štýl istiacej výstroje (napr. vačka, matica, skoba), čo
        pomáha horolezcom rýchlo nájsť správnu výstroj pre daný skalný prvok alebo
        štýl lezenia.
    climbing_rope_middle_marking:
      name: Stredné značenie lezeckého lana
      description: Opisuje, ako sa identifikuje stred (a/alebo konce) lana, aby sa
        uľahčilo bezpečné zlaňovanie a spúšťanie.
    climbing_rope_treatment:
      name: Ošetrenie lezeckého lana
      description: Označuje akúkoľvek vodoodpudivú, suchú alebo ochrannú povrchovú
        úpravu aplikovanú na plášť a/alebo jadro lana.
    climbing_rope_type:
      name: Typ lezeckého lana
      description: Klasifikuje lano podľa certifikácie UIAA a zamýšľaného použitia
        (napr. dynamické jednoduché, polovičné, dvojité, statické, pomocné lano),
        čo nakupujúcim umožňuje rýchlo nájsť správne lano pre ich aktivitu.
    climbing_safety_certifications:
      name: Certifikácie bezpečnosti lezenia
      description: Uvádza normy pre lezenie a priemyselnú bezpečnosť, ktoré zariadenie
        spĺňa.
    clip_color:
      name: Farba spony
      description: Primárna farba sponového držiaku na noty.
    clip_mechanism_type:
      name: Typ mechanizmu spony
      description: Definuje mechanizmus zapínania, ktorý sa používa na sponách na
        peniaze alebo v peňaženkách so sponami na peniaze, čo nakupujúcim pomáha vybrať
        si medzi magnetickým, pružinovým, pákovým a iným štýlom.
    clip_style:
      name: Štýl spony
      description: Určuje konkrétny mechanizmus svorky použitý na upevnenie držiaka
        a uvádza informácie o kompatibilite (napr. krokodílik, karabína).
    clipper_motor_technology:
      name: Technológia kliperového motora
      description: Identifikuje konštrukciu motora použitého v strojčeku s vplyvom
        na výkon, hluk, odolnosť a údržbu.
    closet_configuration:
      name: Konfigurácia skrine
      description: Určuje celkový tvar alebo rozloženie vstavaného šatníka (napr.
        tvar L, tvar U, ostrovček).
    closing_mechanism:
      name: Zatvárací mechanizmus
      description: Určuje spôsob zatvárania zásuvky, napríklad štandardné zatváranie,
        tiché zatváranie, samozatváranie alebo otváranie stlačením.
    cloth_construction:
      name: Konštrukcia látky
      description: Označuje väzbu alebo povrchovú úpravu látky, ktorá ovplyvňuje rýchlosť
        a trvanlivosť (napr. česaná vs. vlnená).
    cloth_thickness:
      name: Hrúbka látky
      description: Označuje hrúbku/hmotnostnú triedu utierky na leštenie.
    club_head_material:
      name: Materiál hlavy pálky
      description: Určuje hlavný materiál použitý pri výrobe hlavy palice.
    clutch_hydraulic_system_type:
      name: Typ hydraulického systému spojky
      description: Označuje kompatibilitu aktivácie spojky/hydraulického systému (napr.
        hydraulická spojka verzus aplikácie s konverziou na lanovú prevodovku).
    clutch_line_connection_type:
      name: Typ pripojenia hadice spojky
      description: Určuje koncové pripojenie/montážne rozhranie používané spojkovým
        vedením (dôležité pre kompatibilitu s hlavnými/podriadenými valcami a pevnými
        vedeniami).
    clutch_pressure_plate_actuation_type:
      name: Typ aktivácie prítlačných tanierov spojky
      description: Označuje, či sa spojka uvoľňuje tlačným alebo ťahovým uvoľňovacím
        mechanizmom (aktivácia membránovou pružinou).
    clutch_pressure_plate_release_mechanism_type:
      name: Typ mechanizmu uvoľnenia prítlačného taniera spojky
      description: Štýl rozhrania uvoľnenie/aktivácia používaného prítlačným tanierom.
    clutch_pressure_plate_surface_type:
      name: Typ povrchu prítlačného taniera spojky
      description: Štýl trecej kontaktnej plochy prítlačného taniera.
    clutch_slave_cylinder_connection_type:
      name: Typ pripojenia pomocných valcov spojky
      description: Rozhranie pripojenia hydraulickej hadice na brzdovom valčeku (port
        so závitom, rýchlospojka, Banjo, atď.).
    clutch_slave_cylinder_mounting_type:
      name: Spôsob upevnenia pomocného valca spojky
      description: Spôsob montáže brzdového valčeka k prevodovke/skrini spojky (napr.
        skrutkami, zacvaknutím, integrovaným koncentrickým upevnením).
    coating_type:
      name: Typ povlaku
      description: Uvádza akúkoľvek vonkajšiu polevu alebo posýpku na cereálnej tyčinke
        (napr. čokoláda, jogurt).
    cocking_mechanism:
      name: Napínací mechanizmus
      description: Určuje primárnu metódu alebo zariadenie používané na napnutie alebo
        uvoľnenie tetivy kuše.
    cocktail_garnish_form:
      name: Forma koktejlových ozdôb
      description: Opisuje, ako je ozdoba prezentovaná/spracovaná na použitie (napr.
        Fresh verzus dehydrovaná).
    cocktail_mix_variety:
      name: Výber koktailových zmesí
      description: Uvádza konkrétny koktail, na prípravu ktorého je zmes určená (napr.
        Margarita, Mojito, Piña Colada).
    cocktail_napkin_features:
      name: Vlastnosti koktejlových obrúskov
      description: Zdôrazňuje funkčnosť, praktickosť a ekologické vlastnosti koktejlových
        obrúskov.
    cocktail_pick_tip_style:
      name: Štýl hrotu koktejlového napichovadla
      description: Opisuje tvar/prvok hrotu používaný na prepichnutie alebo uchytenie
        ozdôb.
    cocktail_pick_top_handle_style:
      name: Štýl špičky/rúčky koktejlového napichovadla
      description: Popisuje dekoratívny vrchný diel alebo tvar rukoväte, ktorý slúži
        na uchopenie alebo na prezentáciu.
    cocktail_type:
      name: Typ koktailu
      description: Uvádza konkrétny recept na koktail alebo štýl, ktorý daný miešaný
        produkt reprezentuje (napr. Margarita, Negroni, Piña Colada).
    cocktail_umbrella_handle_pick_material:
      name: Materiál rukoväte/špajdle koktejlového dáždnika
      description: Materiál časti tyčky/napichovadla (okrem Canopy) koktailového dáždnika.
    cocoa_processing_method:
      name: Spôsob spracovania kakaa
      description: Určuje spôsob spracovania kakaového prášku (napr. prírodné, spracované
        v holandskom štýle, čierne kakao).
    cocoa_product_form:
      name: Forma kakaového produktu
      description: Definuje fyzickú formu, v ktorej sa kakaový produkt predáva.
    coconut_husk_status:
      name: Stav kokosovej škrupiny
      description: Označuje rozsah odstránenia vonkajšej šupy alebo škrupiny kokosu,
        čo ovplyvňuje jednoduchosť použitia, skladovanie a odpad.
    coconut_maturity_stage:
      name: Fáza zrelosti kokosového orecha
      description: Určuje vývojové štádium kokosového orecha v čase zberu, čo výrazne
        ovplyvňuje jeho chuť, obsah vody a kulinárske využitie (napr. na pitie alebo
        na varenie).
    coconut_oil_refinement_type:
      name: Typ rafinácie kokosového oleja
      description: Určuje rafináciu alebo triedu kokosového oleja, napr. panenský,
        rafinovaný, MCT, frakcionovaný.
    coconut_preparation_form:
      name: Forma na prípravu kokosu
      description: Uvádza, ako je kokos fyzicky spracovaný alebo krájaný (celý, nakrájaný
        na plátky, strúhaný, rozmixovaný atď.), čím pomáha nakupujúcim rýchlo nájsť
        formu, ktorú potrebujú na prípravu receptov alebo ako občerstvenie.
    coffee_bean_species:
      name: Druhy kávových zŕn
      description: Určuje druh kávových zŕn použitých v produkte.
    coffee_beverage_variety:
      name: Rôzne druhy kávových nápojov
      description: Klasifikuje podľa štýlu kávové nápoje pripravené na konzumáciu
        alebo miešané.
    coffee_processing_method:
      name: Spôsob spracovania kávy
      description: Označuje techniku spracovania kávových zŕn po zbere.
    coil_material:
      name: Materiál cievky
      description: Určuje primárny materiál alebo typ sieťoviny použitý vo výhrevnej
        špirále s vplyvom na chuť, životnosť a kompatibilitu regulácie teploty.
    coil_spring_design:
      name: Dizajn vinutej pružiny
      description: Určuje konštrukciu tuhostného priebehu vinutej pružiny, ktorá ovplyvňuje
        jazdné vlastnosti.
    coil_spring_finish_coating:
      name: Povrchová úprava/náter vinutých pružín
      description: Povrchová úprava alebo náter aplikovaný na ochranu pred koróziou.
    coil_spring_material:
      name: Materiál vinutej pružiny
      description: Primárny materiál/zloženie vinutej pružiny.
    coil_system_type:
      name: Typ systému vinutia
      description: Podrobne uvádza konkrétny systém pružín alebo vinutí používaný
        v príslušných matracoch, ako sú napríklad taštičkové pružiny alebo pružiny
        typu Bonnell.
    coil_type:
      name: Typ vinutia
      description: Opisuje použitú konštrukciu alebo technológiu vinutia s vplyvom
        na tvorbu pary a chuť.
    coin_grade_numismatic:
      name: Kvalita mince (numizmatická)
      description: Štandardizované hodnotenie mince (napr. podľa Sheldonovej stupnice
        alebo adjektívne hodnotenie).
    coin_strike_or_finish:
      name: Spôsob razby alebo povrchová úprava mince
      description: Typ razby alebo povrchová úprava mince (napr. obchodná razba, proof).
    coin_strike_type:
      name: Typ razby mince
      description: Opisuje typ razby/povrchovej úpravy mince (napr. proof, obchodná
        razba).
    collar_style:
      name: Štýl prstenca
      description: Definuje dizajn goliera alebo výstrihu na odeve.
    collectible_gun_accessories_included:
      name: Vrátane príslušenstva k zberateľským zbraniam
      description: Uvádza príslušenstvo a dokumentáciu, ktoré sú súčasťou zberateľskej
        zbrane (napr. puzdro, kufrík, bajonet, sprievodná dokumentácia).
    collectible_gun_firing_mechanism:
      name: Spúšťový mechanizmus zberateľskej zbrane
      description: Určuje typ spúšťového/zápalného mechanizmu zbrane pri zberateľských
        strelných zbraniach (najmä starožitné a historické kusy).
    collectible_knife_blade_finish:
      name: Povrchová úprava čepele zberateľského noža
      description: Opisuje povrchovú úpravu/ošetrenie čepele z hľadiska vzhľadu (a
        niekedy aj odolnosti voči korózii).
    color_code_system:
      name: Systém farebného kódovania
      description: Označuje prípadný systém farebného kódovania použitý pri číselnom
        odkaze na farbu nite (napr. DMC, Anchor).
    color_coding_standard:
      name: Štandard farebného kódovania
      description: Označuje, či doska zodpovedá medzinárodnému farebnému kódovaniu
        (napr. IWF alebo IPF) alebo inej schéme.
    color_effect:
      name: Farebný efekt
      description: Určuje špeciálne techniky alebo efekty farbenia použité pri príčeskoch.
    color_family:
      name: Skupina farieb
      description: Skupina kvalitných farieb pre atrament sumi (užitočná, keď je farba
        Color príliš zrnitá, napr. teplá čierna vs. modročierna).
    color_finish:
      name: Farebná povrchová úprava
      description: Určuje povrchovú úpravu viditeľných komponentov chrániča ruky (napr.
        matná vs. lesklá), keď samotná farba nestačí.
    coloring_finish:
      name: Farebná povrchová úprava
      description: Určuje vizuálny vzhľad alebo špeciálny efekt, ktorý farbenie vytvára,
        napríklad kovový alebo neónový.
    comb_material:
      name: Materiál hrebeňa
      description: Materiál hrebeňa harmoniky (telo, ktoré tvorí vzduchové komory).
    comb_type:
      name: Typ hrebeňa
      description: Klasifikuje hrebene na starostlivosť o kone podľa ich primárneho
        funkčného štýlu (napr. gumové hreblo, hrebeň na hrivu, pretrhávací hrebeň),
        čo pomáha kupujúcim rýchlo nájsť ten správny nástroj pre špecifické potreby
        starostlivosti o kone.
    combat_shorts_cut_style:
      name: Štýl strihu šortiek Combat
      description: Označuje konkrétny štýl strihu alebo prispôsobenia pre šortky na
        bojové športy (napr. vysoký strih, retro strih, kompresia).
    comic_creator_role:
      name: Úloha tvorcu komiksu
      description: Určuje úlohu tvorcu, ktorá sa vzťahuje na záznam, v ktorom je uvedený
        (napr. autor, výtvarník).
    commemorative_coin_finish:
      name: Úprava pamätnej mince
      description: Opisuje typ razby/povrchovej úpravy pamätnej mince.
    commemorative_coin_mint_mark:
      name: Značka mincovne pamätných mincí
      description: Označuje značku mincovne (alebo žiadnu značku mincovne) na minci.
    commemorative_subject:
      name: Pamätný predmet
      description: Primárny pamätný subjekt (udalosť, osoba, miesto, výročie, organizácia
        a pod.).
    commercial_vehicle_class:
      name: Trieda úžitkového vozidla
      description: Regulačná/odvetvová trieda vychádzajúca z celkovej hmotnosti vozidla
        (GVWR), ktorá sa používa na opis hmotnostnej triedy úžitkového vozidla na
        prehliadanie a filtrovanie.
    compass_damping_medium:
      name: Tlmiace médium Compass
      description: Určuje médium, ktoré sa používa na stabilizáciu pohybu ihly vo
        vnútri kompasovej kapsule.
    compass_illumination_type:
      name: Typ osvetlenia kompasu
      description: Určuje, ako sa dosahuje viditeľnosť značky kompasu pri slabom osvetlení
        (napr. luminiscenčná farba, trícium, LED podsvietenie).
    compass_mounting_style:
      name: Štýl montáže kompasu
      description: Opisuje, ako sa kompas prenáša, nosí alebo inštaluje.
    compass_scale_units:
      name: Jednotky stupnice kompasu
      description: Identifikuje merné jednotky (stupne, promile alebo oboje) vyznačené
        na puzdre kompasu.
    compatible_abs_system:
      name: Kompatibilný systém ABS
      description: Označuje, či je hlavný valec určený pre vozidlá vybavené ABS.
    compatible_adapter_brand:
      name: Značka kompatibilného adaptéra
      description: Určuje značku hlavy golfovej palice, pre ktorú je palica vopred
        prispôsobená.
    compatible_airbag_system_type:
      name: Typ kompatibilného systému airbagov
      description: Označuje generáciu/sadu funkcií systému airbagov, s ktorou je diel
        kompatibilný (napr. jednostupňový vs. dvojstupňový).
    compatible_amplifier_fit_method:
      name: Metóda prispôsobenia kompatibilného zosilňovača
      description: Označuje, ako je definovaná kompatibilita pre kryt/puzdro (univerzálne
        vs. pre špecifický model vs. podľa rozmerov).
    compatible_apparatus:
      name: Kompatibilný prístroj
      description: Určuje gymnastické náčinie alebo aktivitu, pre ktorú sú úchopy
        určené.
    compatible_archery_tool:
      name: Kompatibilný lukostrelecký nástroj
      description: Označuje hlavný lukostrelecký nástroj alebo súčasť výstroja, s
        ktorým je príslušenstvo určené na použitie.
    compatible_axle_size:
      name: Veľkosť kompatibilnej nápravy
      description: Určuje priemer náboja/nápravy alebo normu závitu, pre ktorú je
        stúpačka navrhnutá (napr. 10 mm/3⁄8 palca, 14 mm, 3/8 palca, 26 TPI).
    compatible_axle_type:
      name: Typ kompatibilnej nápravy
      description: Označuje štandardy upevnenia zadnej nápravy, ktoré podporuje trenažér,
        napríklad rýchloupínací systém alebo veľkosť priečneho upevnenia nápravy.
    compatible_axle_weight_rating:
      name: Povolené zaťaženie nápravy
      description: Určuje menovitú hmotnosť nápravy prívesu (nosnosť na nápravu),
        pre ktorú je brzdová zostava prívesu navrhnutá.
    compatible_bait_type:
      name: Typ kompatibilnej návnady
      description: Identifikuje typy rybárskych návnad, s ktorými je vrták kompatibilný,
        aby si rybári mohli vybrať nástroj, ktorý zodpovedá ich preferovanej návnade.
    compatible_bass_scale_length:
      name: Kompatibilná dĺžka basovej menzúry
      description: Označuje dĺžky menzúry basových gitár, pre ktorú je sada strún
        určená (dôležité pre správnu dĺžku navíjania a uchytenia).
    compatible_battle_top_system:
      name: Kompatibilný systém bojových spinningov
      description: Identifikuje ekosystém produktov alebo sériu, pre ktorú je bojový
        spinning určený (používa sa na zabezpečenie kompatibility dielov a arény).
    compatible_bb_size:
      name: Kompatibilná veľkosť BB guličiek
      description: Označuje priemer airsoftových brokov, ktoré tento výrobok podporuje.
    compatible_bed_frame_style:
      name: Kompatibilný štýl rámu postele
      description: Určuje štýl postele alebo rámu, pre ktorý je doplnok určený.
    compatible_bicycle_tire_type:
      name: Kompatibilný typ bicyklovej pneumatiky
      description: Určuje, ktoré typy bicyklových pneumatík je možné pomocou tohto
        produktu opraviť alebo utesniť.
    compatible_bike_component:
      name: Kompatibilný komponent na bicykel
      description: Určuje, na údržbu ktorého komponentu bicykla je nástroj alebo produkt
        určený.
    compatible_billiard_game:
      name: Kompatibilná biliardová hra
      description: Označuje formáty biliardovej hry, pre ktoré je trojuholník navrhnutý,
        aby si mohli zákazníci vybrať typ, ktorý zodpovedá ich hre.
    compatible_billiard_table_size:
      name: Kompatibilná veľkosť biliardového stola
      description: Určuje štandardné dĺžky stola, pre ktoré je kryt navrhnutý, aby
        si mohli kupujúci vybrať správnu veľkosť pre svoj biliardový stôl.
    compatible_bit_type:
      name: Kompatibilný typ bitu
      description: Typy bitov, s ktorými je možné tento ochranný kryt používať.
    compatible_blade_hosel:
      name: Kompatibilný krčok golfovej hlavy typu blade
      description: Označuje typ krčka golfovej hlavy typu blade/kužeľa, ktorý hriadeľ
        akceptuje, čím sa zabezpečuje, že hriadeľ a čepeľ k sebe správne zapadajú.
    compatible_blade_system:
      name: Kompatibilný systém golfovej hlavy typu blade
      description: Označuje systém/formát výmenných čepelí, ktoré sú pre nôž prípustné
        (napr. štandardná čepeľ č. 11, odlamovacie segmentové čepele).
    compatible_boat_weaving_shuttle_loom:
      name: Kompatibilný tkací stav na výrobu lodných plachiet
      description: S akými typmi tkáčskych stavov je určený člnok.
    compatible_bobbin_type:
      name: Kompatibilný typ cievky
      description: Uvádza, pre aký typ cievky je člnok navrhnutý.
    compatible_bottle_mouth:
      name: Kompatibilný otvor fľaše
      description: Typ hrdla fľaše alebo priemer, na ktorý sú slamka alebo viečko
        navrhnuté.
    compatible_bow_attachment_system:
      name: Kompatibilný systém upevnenia luku
      description: Označuje rozhranie končatiny alebo príslušenstva, pre ktoré je
        diel určený (napr. ILF, skrutkové upevnenie, rýchle odpojenie).
    compatible_bow_crossbow_type:
      name: Kompatibilný typ luku/kuše
      description: Označuje štýl luku alebo kuše, pre ktorý je príslušenstvo navrhnuté.
    compatible_brake_fluid:
      name: Kompatibilná brzdová kvapalina
      description: Špecifikácia(-e) brzdovej kvapaliny podľa DOT, na kompatibilitu
        s ktorou(-ými) sú navrhnuté tesnenia/materiály hlavného valca.
    compatible_brake_pad:
      name: Kompatibilná brzdová platnička
      description: Označuje, pre ktoré zmesi brzdových platničiek je rotor schválený,
        aby bola zaistená bezpečnosť a optimálne opotrebovanie.
    compatible_brake_service_system:
      name: Kompatibilný systém údržby bŕzd
      description: Určuje, či je diel určený pre kotúčové brzdy, bubnové brzdy alebo
        pre obidva typy.
    compatible_brake_system:
      name: Kompatibilný brzdový systém
      description: Určuje kľúčové poznámky o kompatibilite systému na používanie brzdovej
        kvapaliny.
    compatible_brake_type:
      name: Kompatibilný typ brzdy
      description: Určuje typ bŕzd, s ktorými je nosič kompatibilný, napríklad kotúčové
        alebo ráfikové.
    compatible_brass_instrument_finish:
      name: Kompatibilná úprava plechového dychového nástroja
      description: Určuje, na ktoré povrchové úpravy plechových dychových nástrojov
        je použitie čističa bezpečné bez poškodenia povrchovej úpravy.
    compatible_building_toy_system:
      name: Kompatibilný systém stavebných hračiek
      description: Označuje, s akým stavebným systémom/štandardom je hračka kompatibilná
        (alebo má ekvivalentnú veľkosť), napríklad kompatibilná s produktmi značky
        LEGO alebo patentovaná.
    compatible_capo_fretboard_radius:
      name: Menzúra hmatníka, s ktorou je kapodaster kompatibilný
      description: Určuje polomer/profil hmatníka, pre ktorý je kapodaster určený
        pre optimálny kontakt a udržateľnosť ladenia.
    compatible_capo_number_of_strings:
      name: Kompatibilný počet strún pre kapodaster
      description: Označuje, koľko strún má kapodaster obsiahnuť (užitočné pre 6-,
        7-, 8-, 12-strunové a špeciálne nástroje).
    compatible_cardio_machine_type:
      name: Kompatibilný typ kardio stroja
      description: Identifikuje typ kardio stroja, na fungovanie s ktorým je príslušenstvo
        alebo súčiastka určená.
    compatible_chain_link_type:
      name: Kompatibilný typ článku reťaze
      description: Označuje štýl článku reťaze, ktorý nástroj podporuje (štandardný,
        polovičný článok, rýchlospojka atď.).
    compatible_chain_size:
      name: Kompatibilná veľkosť reťaze
      description: Určuje štandardy šírky alebo rozstupu reťaze (napr. 1/8 palca,
        3/32 palca), ktoré nástroj podporuje.
    compatible_chain_width:
      name: Kompatibilná šírka reťaze
      description: Označuje veľkosť reťaze, na fungovanie s ktorou je voľnobežka určená.
    compatible_chip_denomination:
      name: Kompatibilná nominálna hodnota čipu
      description: Označuje, pre ktoré nominálne hodnoty čipov obsahuje zásobník/puzdro
        označené alebo určené polohy (alebo na organizáciu ktorých je určený).
    compatible_clarinet_mouthpiece_ligature:
      name: Kompatibilná ligatúra náustku pre klarinet
      description: Označuje štandard upevnenia ligatúry alebo poznámky o kompatibilite
        náustku.
    compatible_classical_guitar_string_scale_length:
      name: Kompatibilná dĺžka menzúry strún pre klasickú gitaru
      description: Kompatibilita určenej dĺžky menzúry gitary/dĺžky struny pre danú
        sadu.
    compatible_clay_target_size:
      name: Kompatibilná veľkosť asfaltového holuba
      description: Uvádza veľkosti alebo tvary asfaltového holuba, ktoré sú pre vrhacie
        zariadenie prípustné pre správne uchytenie a výkon.
    compatible_cleat_system:
      name: Kompatibilný systém vystužovacej lišty
      description: Určuje rozhranie zarážok alebo rozostup skrutiek, ktoré pedále
        podporujú, aby si jazdci mohli prispôsobiť topánky správnemu systému.
    compatible_clipless_pedal_system:
      name: Kompatibilný systém pedálov bez klipsov
      description: Označuje konkrétny štandard bezklipových pedálov/zarážok, s ktorým
        by mal produkt fungovať.
    compatible_clutch_type:
      name: Kompatibilný typ spojky
      description: Kompatibilita rozhrania spojky so zotrvačníkom (ak je to relevantné).
    compatible_coffee_pod_system:
      name: Systém kompatibilných kávových kapsúl
      description: Určuje kávovar alebo varný systém, pre ktorý sú kapsuly alebo pody
        určené.
    compatible_construction_set_system:
      name: Kompatibilný systém stavebníc
      description: Označuje, s ktorým stavebným systémom/ekosystémom značky je sada
        kompatibilná (napr. kompatibilná s produktmi značky LEGO, kompatibilná s s
        produktmi značky DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Kompatibilný držiak/stojan pre kontrabasový klarinet
      description: Označuje požadované rozhranie stojana/kolíka alebo štýl podpery.
    compatible_coolant_chemistry:
      name: Zloženie kompatibilnej chladiacej kvapaliny
      description: Určuje, s ktorými skupinami chladiacich chemikálií je namiešaná
        prísada kompatibilná.
    compatible_cooling_system_material:
      name: Kompatibilný materiál chladiaceho systému
      description: Určuje, pre ktoré chladiace systémy/materiály je preplachovanie
        chladiča bezpečné (napr. hliníkové chladiče, systémy so zmiešanými kovmi).
    compatible_crib_format:
      name: Kompatibilný formát detskej postieľky
      description: Definuje všeobecnú kategóriu veľkosti alebo tvaru matraca alebo
        plachty, pre ktorú je doplnok určený.
    compatible_cross_stitch_fabric_count:
      name: Kompatibilný počet látok na krížikovú výšivku
      description: Odporúčaný počet látok na vyšívanie vzoru.
    compatible_cross_stitch_frame:
      name: Kompatibilný rám na krížikovú výšivku
      description: Označuje, na použitie s čím je rám určený (ručné použitie, stolný
        stojan, podlahový stojan alebo univerzálny).
    compatible_crossbar:
      name: Kompatibilný priečnik
      description: Kompatibilita nosiča s priečnikmi strechy vozidla (ak je namontovaný
        na streche) vrátane štandardov tvaru/profilu priečnika.
    compatible_cycling_cleat:
      name: Kompatibilná cyklistická zarážka
      description: Určuje systém zarážok alebo pedálov, s ktorým by mali cyklistické
        topánky fungovať.
    compatible_cymbal_size:
      name: Kompatibilná veľkosť činela
      description: Určuje určený (alebo maximálny) priemer činelu, pre ktorý je puzdro
        určené; ide o kompatibilitu s veľkosťou činelu, nie s jeho vonkajším priemerom.
    compatible_device_type:
      name: Kompatibilný typ zariadenia
      description: Uvádza, na aký typ zariadenia je držiak určený (napr. monitor/televízor,
        tablet, smartfón, prenosný DVD prehrávač).
    compatible_dock_structure_type:
      name: Kompatibilný typ konštrukcie dokovacej stanice
      description: Konštrukcia doku, na montáž na ktorú sú schody určené.
    compatible_dough_type:
      name: Kompatibilný typ cesta
      description: Určuje, s akými typmi/značkami hmoty by mali nástroje pracovať
        (napr. štandardné plastelína, modelovacia hlina).
    compatible_drawing_ink_surface:
      name: Kompatibilný povrch na atrament na kreslenie
      description: Označuje odporúčané povrchy/substráty pre najlepší výkon.
    compatible_drivetrain_brand:
      name: Kompatibilná značka hnacieho ústrojenstva
      description: Uvádza značky hnacích alebo brzdových systémov, pre ktoré je lanko
        určené.
    compatible_drivetrain_speeds:
      name: Kompatibilné rýchlostné stupne hnacieho ústrojenstva
      description: Určuje počet rýchlostných stupňov hnacieho ústrojenstva (napr.
        10-rýchlostné), ktorý kľuka alebo reťazové koleso podporuje.
    compatible_equipment:
      name: Kompatibilné zariadenie
      description: Určuje typ zimného športového vybavenia, ktoré má zverák udržať.
    compatible_evap_system:
      name: Kompatibilný systém EVAP
      description: Označuje, či je uzáver palivovej nádrže navrhnutý tak, aby spĺňal
        požiadavky systému EVAP (napr. tesnenie podľa špecifikácie OEM) a znížil počet
        kontroliek motora.
    compatible_exercise_bike_style:
      name: Kompatibilný štýl rotopedu
      description: Uvádza, pre ktoré typy stacionárnych bicyklov sú príslušenstvo
        alebo náhradný diel určené.
    compatible_fencing_weapon:
      name: Kompatibilná šermiarska zbraň
      description: Určuje, pre ktorú šermiarsku zbraň alebo disciplínu sú bunda alebo
        lamé určené.
    compatible_fiber_type:
      name: Kompatibilný typ vlákna
      description: Primárne typy vlákien, ktoré má bubnový mykací stroj efektívne
        spracovať.
    compatible_fin_box_system:
      name: Kompatibilný systém uchytenia plutvy
      description: Označuje box na plutvy alebo montážny systém, pre ktorý je plutva
        určená, čo pomáha surferom pri nákupe plutiev kompatibilných s ich surfovou
        doskou (napr. FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Kompatibilný polomer zakrivenia hmatníka
      description: Určuje polomer hmatníka (plochý, zakrivený alebo zložený), ktorému
        by mal kapodaster zodpovedať pre rovnomerný tlak a zníženie bzučania.
    compatible_finish_type:
      name: Kompatibilný typ úpravy
      description: Uvádza, pre aké typy povrchových úprav nástrojov je sprej považovaný
        za bezpečný.
    compatible_fishing_reel_type:
      name: Typ kompatibilného rybárskeho navijaka
      description: Určuje typ rybárskeho navijaka, pre ktorý je príslušenstvo určené
        alebo s ktorým má fungovať (napr. prívlač, nahadzovanie návnady, muška).
    compatible_fly_line_weight:
      name: Hmotnosť kompatibilnej muškárskej šnúry
      description: Označuje hmotnosti muškárskeho vlasca AFTMA, na udržanie ktorých
        je cievka určená.
    compatible_flywheel_type:
      name: Kompatibilný typ zotrvačníka
      description: Určuje typ zotrvačníka, s ktorým sa má použiť prítlačný kotúč spojky.
    compatible_football_kick_type:
      name: Kompatibilný typ futbalového kopu
      description: Určuje situácie pri kope, na ktoré je produkt navrhnutý (napr.
        výkop, gól z hry), aby športovci rýchlo našli vhodné vybavenie.
    compatible_fuel_system_type:
      name: Kompatibilný typ palivového systému
      description: Určuje systém dodávania paliva, pre ktorý je čistič určený.
    compatible_gas_type:
      name: Kompatibilný typ plynu
      description: Identifikuje typ stlačeného plynu, na uchovávanie ktorého je paintballová
        tlaková fľaša určená.
    compatible_gel_wax_additives:
      name: Kompatibilné prísady do gélového vosku
      description: Určuje, ktoré typy prísad sú kompatibilné s týmto gélovým voskom
        (napr. typ farbiva, dekoratívne prvky).
    compatible_glaze_layering:
      name: Kompatibilné vrstvenie glazúry
      description: Či je glazúra určená na nanášanie vo vrstvách spolu s inými glazúrami
        na dosiahnutie určitých efektov.
    compatible_golf_bag_type:
      name: Kompatibilný typ golfovej tašky
      description: Uvádza, na aké typy golfových tašiek sa tento obal alebo puzdro
        hodí.
    compatible_ground_polarity:
      name: Kompatibilná polarita uzemnenia
      description: Udáva, či je regulátor napätia určený pre elektrické systémy vozidiel
        s negatívnym uzemnením (mínus na kostre) alebo pozitívnym uzemnením (plus
        na kostre), prípadne či nie je citlivý na polaritu.
    compatible_guitar_body_shape:
      name: Kompatibilný tvar tela gitary
      description: Uvádza, pre aký typ tela/tvaru gitary je puzdro určené.
    compatible_guitar_case:
      name: Kompatibilné puzdro na gitaru
      description: Určuje, pre ktoré štýly puzdra na gitaru je zvlhčovač určený a
        v ktorých správne funguje.
    compatible_guitar_scale_length:
      name: Kompatibilná dĺžka menzúry gitary
      description: Označuje, pre ktorú dĺžku (dĺžky) menzúry gitary je súprava strún
        určená (na základe dĺžky vinutia/celkovej dĺžky).
    compatible_gun_platform:
      name: Kompatibilná platforma pre zbrane
      description: Určuje operačnú platformu alebo zdroj napájania, s ktorým je produkt
        kompatibilný (napr. AEG, GBB, HPA).
    compatible_hair_length:
      name: Kompatibilná dĺžka vlasov
      description: Určuje maximálnu dĺžku alebo objem vlasov, ktoré pokrývka hlavy
        pohodlne pojme.
    compatible_head_and_neck_restraint_system:
      name: Kompatibilný systém fixácie hlavy a krku
      description: Označuje, či prilba obsahuje kotviace body a/alebo je kompatibilná
        so systémami na fixáciu hlavy a krku (napr. HANS), vrátane stavu začlenenia/inštalácie
        rozperiek.
    compatible_helmet_certification_standard:
      name: Norma certifikácie kompatibilnej prilby
      description: Označuje akúkoľvek bezpečnostnú normu alebo certifikačný kontext
        prilby, pre ktoré je toto príslušenstvo určené (napr. pretekárske tear-off
        fólie často odkazujú na konkrétne sankčné pravidlá).
    compatible_helmet_shell_size:
      name: Kompatibilná veľkosť škrupiny prilby
      description: Označuje, do ktorých veľkostí škrupiny prilby je náhradná vnútorná
        časť vhodná (veľkosti škrupín sa často zoskupujú do rozsahov ako XS–S, M,
        L–XL).
    compatible_helmet_size:
      name: Kompatibilná veľkosť prilby
      description: Označuje veľkosť prilby, s ktorou je maska kompatibilná.
    compatible_helmet_type:
      name: Kompatibilný typ prilby
      description: Kategória prilieb, pre ktorú je navrhnutá podpora krku.
    compatible_hitch_receiver_size:
      name: kompatibilná veľkosť ťažného zariadenia
      description: Veľkosť otvoru ťažného zariadenia, pre ktorú je príslušenstvo určené
        (v prípade nosičov montovaných na ťažné zariadenie).
    compatible_hook_size:
      name: Kompatibilná veľkosť vešiaka
      description: Systém veľkostí háčkoviek a/alebo rozsah veľkostí, pre ktoré je
        organizér navrhnutý (napr. americké veľkosti označené písmenom/číslom, metrický
        rozsah v mm).
    compatible_horse_coat_type:
      name: Kompatibilný typ konského kabáta
      description: Určuje vlastnosti konskej srsti, pre ktoré je odstraňovač prebytočnej
        srsti najvhodnejší (napr. hustá zimná srsť alebo citlivá srsť).
    compatible_host_platform:
      name: Kompatibilná hostiteľská platforma
      description: Určuje, s ktorými hostiteľskými platformami alebo typmi zariadení
        je ovládač s podložkou kompatibilný (napr. Windows, macOS, iOS, Android) alebo
        či môže fungovať samostatne bez počítača.
    compatible_inflation_gas:
      name: Kompatibilný nafukovací plyn
      description: Určuje, čím sa má balón nafúknuť (vzduchom, héliom alebo ľubovoľným
        z nich).
    compatible_injection_type:
      name: Kompatibilný typ vstrekovania
      description: Uvádza, na čistenie ktorého systému vstrekovania paliva je produkt
        určený.
    compatible_instrument_surface_material:
      name: Kompatibilný povrch/materiál nástroja
      description: Označuje, na ktoré povrchy/materiály nástrojov je leštidlo určené.
    compatible_intercom_system:
      name: Kompatibilný systém intercom
      description: Označuje pripravenosť/kompatibilitu prilby na montáž alebo inštaláciu
        interkomu/komunikačného systému prilby.
    compatible_interior_material:
      name: Kompatibilný interiérový materiál
      description: Uvádza, na ktoré materiály v interiéri vozidla je odstraňovač škvŕn
        bezpečný/účinný (napr. koberec, látkové čalúnenie, koža, vinyl).
    compatible_kayak_type:
      name: Kompatibilný typ kajaku
      description: Uvádza zoznam bežných typov kajakov, na ktoré je táto plachtová
        súprava určená.
    compatible_license_plate_hole_pattern:
      name: Kompatibilný vzor otvorov pre tabuľku s evidenčným číslom vozidla
      description: Určuje konfiguráciu montážnych otvorov, ktoré stojan/držiak podporuje
        (na vozidle a/alebo na tabuľke).
    compatible_license_plate_size:
      name: Kompatibilná veľkosť tabuľky s evidenčným číslom vozidla
      description: Uvádza rozmery regionálnych alebo rozmerových evidenčných čísel
        vozidla, pre ktoré je držiak určený.
    compatible_loom:
      name: Kompatibilný tkáčsky stav
      description: Určuje typy tkáčskych stavov, s ktorými je určené na použitie tkáčske
        kladivko na ploché tkanie.
    compatible_loom_type:
      name: Kompatibilný typ káblového zväzku
      description: Označuje nastavenie tkania, na používanie s ktorým je tkáčsky stroj
        určený (napr. krosná s pevnou priadzou verzus gobelínové krosná).
    compatible_machine_type:
      name: Kompatibilný typ stroja
      description: Označuje, na fungovanie s akým typom nastavenia prešívania je rám
        určený (iba ručné prešívanie, domáci šijací stroj, prešívací stroj s dlhým
        ramenom).
    compatible_mast_type:
      name: Kompatibilný typ stožiaru
      description: 'Určuje, pre aké priemery stožiarov je plachta určená: znížený
        priemer (RDM), štandardný priemer (SDM) alebo pre oba.'
    compatible_model_system_train_scale:
      name: Kompatibilný modelový systém (mierka vlaku)
      description: Určuje mierku/systém modelárskej železnice, pre ktorú je príslušenstvo
        určené (napr. HO, N, O).
    compatible_mounting_surface:
      name: Kompatibilná montážna plocha
      description: Povrch alebo predmet, na ktorý je svorka určená na uchytenie.
    compatible_mouthpiece_patch:
      name: Kompatibilná nálepka na náustok
      description: Označuje, či je náustok určený na použitie s vankúšikmi/náplasťami
        k náustku, a odporúčaný rozsah hrúbky náplasti.
    compatible_mouthpiece_type:
      name: Kompatibilný typ náustku
      description: Určuje, aký typ náustka/stopky je pre melofón určený (zvyčajne
        náustky typu pre lesný roh alebo trúbku v závislosti od modelu).
    compatible_neck_profile_width:
      name: Kompatibilný profil/šírka krku
      description: Uvádza triedu profilu/šírky krku gitary, pre ktorú je kapodaster
        určený (napr. úzky na elektrickej gitare alebo široký na klasickej gitare).
    compatible_needle_size:
      name: Kompatibilná veľkosť ihly
      description: Uvádza veľkosti/typy ihiel, pre ktoré je puzdro určené (napr. dĺžky
        ihiel na vyšívanie, gobelínových ihiel, ihiel na ručné šitie).
    compatible_needle_system:
      name: Kompatibilný systém ihly
      description: Systém(-y) ihiel, s ktorými je stroj kompatibilný (napr. 130/705H).
    compatible_parking_brake_mechanism:
      name: Kompatibilný mechanizmus parkovacej brzdy
      description: Označuje, či je strmeň určený na fungovanie s integrovaným mechanizmom
        parkovacej brzdy.
    compatible_pedal_instrument_type:
      name: Kompatibilný typ pedálového nástroja
      description: Určuje, s čím sa má pedál používať (napr. digitálne piano, klávesy/syntetizátor,
        MIDI kontrolér).
    compatible_pedal_type:
      name: Kompatibilný typ pedálu
      description: Označuje štýl pedálu alebo systém, pre ktorý je popruh alebo klip
        určený (napr. platforma, SPD, Look Keo).
    compatible_pin_type:
      name: Kompatibilný typ kolíka
      description: Na použitie s akým typom kolíkov je podložka určená (alebo či ju
        možno používať s kolíkmi).
    compatible_pipe_filter_size:
      name: Kompatibilná veľkosť potrubného filtra
      description: Označuje veľkosť alebo typ filtra, ktorý je navrhnutý pre fajku
        (alebo že filter nie je potrebný).
    compatible_plate_size:
      name: Kompatibilná veľkosť doštičky
      description: Rozmery balistických plátov alebo štandardné veľkosti, ktoré vesta
        pojme.
    compatible_play_vehicle_scale:
      name: Kompatibilná mierka hračkárskeho autíčka
      description: Označuje mierku hračky, pre ktorú je príslušenstvo navrhnuté (napr.
        1:64), čím sa zlepšuje prispôsobivosť/kompatibilita/ pre zberateľov a sledovacie
        systémy.
    compatible_playing_surface:
      name: Kompatibilná herná plocha
      description: Označuje typ hracej plochy alebo povrchu, pre ktorý sú kopačky
        na americký futbal určené.
    compatible_pole_dimensions:
      name: Kompatibilné rozmery tyče
      description: Určuje veľkosť prierezu stĺpa, na ktorý sa príslušenstvo hodí.
    compatible_pole_shape:
      name: Kompatibilný tvar tyče
      description: Určuje tvar prierezu tyče alebo stĺpa, na ktorý je čalúnenie určené.
    compatible_power_steering_system:
      name: Kompatibilný systém posilňovača riadenia
      description: Označuje typ(-y) systému riadenia, pre ktorý(-é) je kvapalina určená.
    compatible_powerplant_type:
      name: Typ kompatibilného pohonu
      description: Uvádza typ pohonu vzduchovky, pre ktorú je daná súčiastka určená
        (napr. pružinový piest, CO2, PCP).
    compatible_presser_foot:
      name: Kompatibilná prítlačná pätka
      description: Určuje systém upevnenia/kompatibility prítlačnej pätky, ktorý šijací
        stroj podporuje (napr. nacvakávací vs. skrutkovací; nízky/vysoký/šikmý driek).
        Ak je podporovaných viacero systémov alebo sú súčasťou balenia adaptéry, použite
        možnosť „Universal/Multiple“.
    compatible_protective_gear:
      name: Kompatibilné ochranné prostriedky
      description: Určuje, s akými ďalšími ochrannými prostriedkami je krčná ortéza
        určená na použitie.
    compatible_protective_gear_integration:
      name: Spojenie kompatibilných ochranných prostriedkov
      description: Opisuje určený spôsob nosenia alebo spojenia chrániča s iným vybavením
        (napr. všité vrecko, samostatný popruh).
    compatible_punching_bag_type:
      name: Kompatibilný typ boxovacieho vreca
      description: Určuje, s akými modelmi boxovacích alebo tréningových vriec je
        produkt kompatibilný.
    compatible_racing_discipline:
      name: Kompatibilná pretekárska disciplína
      description: Motoristické disciplíny, pre ktoré je prilba určená/certifikovaná.
    compatible_rc_scale:
      name: Kompatibilná mierka závodných automobilov
      description: Označuje pomer mierka závodných automobilov (napr. 1:10), pre ktorý
        je príslušenstvo alebo diel navrhnutý.
    compatible_recorder_size:
      name: Kompatibilná veľkosť rekordéra
      description: Určuje, pre akú(-é) veľkosť(-ti) záznamníka je puzdro určené.
    compatible_recorder_type:
      name: Kompatibilný typ rekordéra
      description: Určuje typ zobcovej flauty (produktový rad/veľkosť), s ktorou je
        príslušenstvo kompatibilné (napr. soprán, alt).
    compatible_reed_cut:
      name: Kompatibilný typ rezu plátku
      description: Určuje, s akým typom vyhotovenia plátku má byť ligatúra kompatibilná
        (napr. pilníkované/francúzske vyhotovenie alebo nepilníkované/americké vyhotovenie).
    compatible_reed_type:
      name: Kompatibilný typ plátku
      description: Určuje rez/typ jazýčka, pre ktorý je náustok určený.
    compatible_reel_type:
      name: Kompatibilný typ navijaka
      description: Určuje typ rybárskeho navijaka, pre ktorý je taška, prívesok alebo
        kryt navrhnutý.
    compatible_refrigerant_type:
      name: Kompatibilný typ chladiacej kvapaliny
      description: Označuje, s akou chladiacou kvapalinou sa výparník klimatizácie
        má používať.
    compatible_ride_equipment:
      name: Kompatibilné vybavenie na jazdu
      description: Typy športového vybavenia na kolieskach, pre ktoré je rampa určená.
    compatible_roof_height:
      name: Kompatibilná výška strechy
      description: Označuje, pre ktorý profil strechy je kryt určený (štandardná vs.
        vyvýšená/vysoká strecha).
    compatible_roof_rail_type:
      name: Kompatibilný typ dažďového žliabku strechy
      description: Určuje, na akú konfiguráciu strechy je základný stojanový systém
        určený na pripevnenie.
    compatible_rope_count:
      name: Kompatibilné množstvo lana
      description: Určuje konfiguráciu lana boxerského ringu, pre ktorú je diel navrhnutý,
        napríklad 3-lanové ringy, 4-lanové ringy alebo univerzálne uchytenie.
    compatible_rope_type:
      name: Kompatibilný typ lana
      description: Určuje, aké typy lán sa môžu používať s týmto zariadením.
    compatible_saddle_type:
      name: Kompatibilný typ sedla
      description: Určuje štýl sedla alebo jazdeckú disciplínu, pre ktorú je príslušenstvo
        určené, čím sa zabezpečuje správna kompatibilita s anglickými, westernovými
        a inými sedlami.
    compatible_saxophone_size:
      name: Kompatibilná veľkosť saxofónu
      description: Označuje, s akou veľkosťou saxofónu je produkt kompatibilný (napr.
        soprán, alt, tenor).
    compatible_saxophone_type:
      name: Kompatibilný typ saxofónu
      description: Určuje, pre aký saxofón je ligatúra/uzáver určený.
    compatible_scale_length:
      name: Kompatibilná dĺžka menzúry
      description: Identifikuje rozsah dĺžky menzúry gitary, pre ktorý sú struny určené
        (napr. krátka menzúra, štandardná menzúra, barytón).
    compatible_seat_airbag:
      name: Kompatibilný airbag sedadla
      description: Označuje, či sedadlo podporuje/obsahuje bočné airbagy alebo je
        kompatibilné s vozidlami vybavenými airbagmi namontovanými v sedadle.
    compatible_seating_capacity:
      name: Kompatibilná usadzovacia kapacita
      description: Určuje počet sedadiel alebo konfiguráciu, pre ktorú je príslušenstvo
        navrhnuté.
    compatible_sensor_port_type:
      name: Kompatibilný typ portu snímača
      description: Určuje, či olejová vaňa obsahuje snímače hladiny oleja a/alebo
        teploty oleja a prípadne aj typ otvoru.
    compatible_shifter_type:
      name: Kompatibilný typ radiacej páky
      description: Identifikuje typ radiacej páky alebo konfiguráciu, pre ktorú je
        manžeta radiacej páky určená.
    compatible_shis:
      name: Kompatibilný so systémom SHIS
      description: Uvádza kód(y) štandardizovaného systému identifikácie náhlavných
        súprav (SHIS), s ktorým je diel kompatibilný (napr. IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Kompatibilná korčuliarska disciplína
      description: Označuje disciplínu(y) korčuľovania, pre ktorú je diel alebo príslušenstvo
        určené.
    compatible_snowshoe_deck_type:
      name: Kompatibilný typ dosky snežnice
      description: Určuje rám snežníc alebo štýl dosky, s ktorým je viazanie kompatibilné.
    compatible_special_effects_lighting_features:
      name: Kompatibilné funkcie osvetlenia so špeciálnymi efektami
      description: Zdôrazňuje bežné charakteristiky, ktoré ovplyvňujú rozhodnutia
        pri nákupe osvetlenia so špeciálnymi efektami (okrem farby/vzoru), napríklad
        prepojenie jednotiek alebo reakcia na zvuk.
    compatible_spinning_wheel_drive_system:
      name: Kompatibilný systém pohonu rotujúcich kolies
      description: Určuje, ktorý(-é) systém(-y) pohonu kolovratov príslušenstvo podporuje.
    compatible_spoke_gauge:
      name: Kompatibilný rozchod špicov
      description: Uvádza rozmery drôtu špice, na ktoré sa hodia závity niplov, čím
        umožňuje kupujúcim správne zladiť špice a niple.
    compatible_steering_wheel_airbag:
      name: Kompatibilný airbag na volante
      description: Označuje, či volant podporuje uchytenie originálneho modulu airbagu
        (alebo je určený pre použitie bez airbagu).
    compatible_steering_wheel_control_button:
      name: Kompatibilné ovládacie tlačidlo na volante
      description: Označuje kompatibilitu s ovládacími prvkami na volante (audio/tempomat/telefón)
        a súvisiacou kabelážou z výroby.
    compatible_stencil_material:
      name: Kompatibilný materiál šablóny
      description: Materiály, z ktorých stroj dokáže vytvárať alebo spracovávať šablóny
        (napr. papier, plastová fólia, mylar).
    compatible_stencil_media_format:
      name: Formát kompatibilného materiálu pre šablónové médiá
      description: 'Označuje, ktoré formáty šablónových médií zariadenie podporuje:
        listy, kotúče alebo oboje.'
    compatible_strap_retractor:
      name: Kompatibilný navíjač popruhov
      description: Označuje, či je popruh kompatibilný s navíjacími systémami alebo
        je určený pre nenavíjacie (statické) pásy.
    compatible_string_instrument_finish:
      name: Kompatibilná úprava sláčikového nástroja
      description: Určuje, na ktoré typy povrchovej úpravy nástrojov je leštidlo bezpečné
        použiť.
    compatible_substrate_material:
      name: Kompatibilný materiál substrátu
      description: Povrchový materiál (materiály), ku ktorému má farba priľnúť.
    compatible_surface:
      name: Kompatibilný povrch
      description: Určuje povrch/materiál, na ktorý sa má suchý zips prilepiť.
    compatible_surface_material:
      name: Kompatibilný povrchový materiál
      description: Materiály povrchu vozidiel, na ktoré je výrobok určený.
    compatible_tear_off_system:
      name: Kompatibilný odtrhávací systém
      description: Uvádza, či okuliare podporujú odtrhávacie fólie a/alebo rolovacie
        fólie, vrátane toho, či sú vybavené upevňovacími úchytmi pre odtrhávacie fólie.
    compatible_thermostat_type:
      name: Kompatibilný typ termostatu
      description: Či je hrdlo/kryt prívodu vody určený na umiestnenie termostatu,
        a ak áno, aký typ/veľkosť.
    compatible_thread:
      name: Kompatibilné vlákno
      description: Označuje, na manipuláciu s akými druhmi vlákna/priadze je navliekač
        určený (podľa hrúbky/typu).
    compatible_thread_spool_format:
      name: Kompatibilný formát vlákna/cievky
      description: Uvádza, pre aké typy nití je škatuľa na skladovanie určená (cievky,
        špulky, kartičky/cievky na vyšívaciu priadzu, kužele atď.).
    compatible_thread_yarn_tool:
      name: Kompatibilný nástroj na vlákna a priadzu
      description: Kompatibilita strojov/systémov pre nástroje, ktoré sa montujú na
        iné zariadenia alebo sa s nimi používajú (napr. šijací stroj, šijací stroj
        overlock, tkáčsky stav, kolovrátok).
    compatible_tire_application:
      name: Použitie kompatibilných pneumatík
      description: Označuje použitie pneumatiky/kolesa, pre ktoré je nástroj na výmenu
        pneumatík určený (na základe opravovanej pneumatiky/kolesa, nie modelu vozidla).
    compatible_tom_pad_mounting:
      name: Montáž kompatibilných tom padov
      description: Určuje, na čo sa elektronický tom-tom upevňuje (napr. svorka/tyč,
        tyč v tvare L, stojan), čo ovplyvňuje, či sa zmestí do existujúcich stojanových
        systémov.
    compatible_toy_vehicle_scale:
      name: Kompatibilná veľkosť hračkárskeho autíčka
      description: Uvádza mierku modelárskeho vozidla alebo približnú veľkosť vozidla,
        s ktorým je táto súprava kompatibilná.
    compatible_tpms_sensor_type:
      name: Kompatibilný typ snímača TPMS
      description: Určuje, či koleso podporuje snímače systému monitorovania tlaku
        (TPMS) v pneumatikách a/alebo akýkoľvek požadovaný typ ventilu/snímača.
    compatible_training_equipment:
      name: Kompatibilné tréningové zariadenie
      description: Uvádza typy tréningového alebo fitness vybavenia, ktoré je možné
        pripevniť k držiaku.
    compatible_treadmill_design:
      name: Kompatibilný dizajn bežeckého pásu
      description: Určuje typ bežeckého pásu, s ktorým je príslušenstvo kompatibilné,
        napríklad skladacie alebo neskladacie modely.
    compatible_tube:
      name: Kompatibilná trubica
      description: Označuje konštrukciu duše alebo pneumatiky, pre ktorú je náplasť
        určená, napríklad butyl, latex, TPU alebo bezdušová.
    compatible_valve_type:
      name: Kompatibilný typ ventilu
      description: Určuje, s ktorým typom mosadzného ventilu je mazivo kompatibilné.
    compatible_vaporizing_material:
      name: Kompatibilný odparovací materiál
      description: Označuje typy materiálov, na odparovanie ktorých je zariadenie
        určené.
    compatible_vehicle_windshield_fluid:
      name: Kompatibilná kvapalina na čelné sklo vozidla
      description: Tvrdenia o kompatibilite týkajúce sa vybavenia vozidla alebo úpravy
        skla (napr. bezpečné pre dažďové nátery, bezpečné pre ostrekovače svetlometov).
    compatible_visor_system:
      name: Kompatibilný systém clony
      description: Označuje, s ktorými typmi systémov priezorov/vložiek je motocyklová
        prilba kompatibilná.
    compatible_water_board_type:
      name: Kompatibilný typ vodnej dosky
      description: Na prepravu akých dosiek na vodné športy je stojan určený?
    compatible_water_sport_board_type:
      name: Kompatibilný typ dosky na vodné športy
      description: Uvádza typy dosiek, na prepravu ktorých je stojan určený.
    compatible_watercraft_communication_standard:
      name: Kompatibilný komunikačný štandard vodného dopravného prostriedku
      description: Špecifikuje podporované štandardy námornej komunikácie/siete alebo
        integračné protokoly pre dotykovú prevádzkyschopnosť s palubnou elektronikou.
    compatible_watercraft_engine_type:
      name: Kompatibilný typ motora vodného dopravného prostriedku
      description: Označuje cieľovú konfiguráciu pohonnej jednotky, pre ktorú je diel
        vhodný (vonkajší/vnútorný/zadný pohon/prúdový pohon).
    compatible_weight_plate_diameter:
      name: Kompatibilný priemer závažia
      description: Určuje, aké priemery závažných kotúčov stroj podporuje.
    compatible_wheel_finish:
      name: Kompatibilná povrchová úprava kolies
      description: Určuje povrchovú úpravu/materiály kolies, ktoré zaisťujú bezpečnosť
        čistiaceho zariadenia (ako uvádza výrobca).
    compatible_whorl_drive_band_type:
      name: Kompatibilný typ hnacieho pásu vretena
      description: Určuje, s akým typom hnacieho remeňa je tento remenica určená na
        použitie.
    compatible_wick_series:
      name: Kompatibilná séria knôtov
      description: Uvádza bežné rady/typy knôtov, pre ktoré je táto vložka určená
        (odvetvové označenie), ak to predajca uviedol.
    compatible_winder_head_bit:
      name: Kompatibilná hlavica/bit navíjačky
      description: Určuje model rozhrania ladiacej hlavice/klávesa pre podporu navíjača
        (napr. drážkovaná hlavica, vymeniteľné bity, univerzálna hlavica).
    compatible_windlass_rode:
      name: Kompatibilný navijak
      description: Určuje, na aký typ kotvy je navijak určený.
    compatible_windshield_type:
      name: Kompatibilný typ čelného skla
      description: Určuje, na aké nastavenie čelného skla je kryt určený.
    compatible_wood:
      name: Kompatibilné drevo
      description: Určuje, pre aké typy dreva hmatníka je leštidlo odporúčané/bezpečné.
    compatible_writing_surface:
      name: Kompatibilná písacia plocha
      description: Určuje povrchy/papiere, na ktorých má atrament najlepšie fungovať.
    compatible_zipper_size:
      name: Kompatibilná veľkosť zipsu
      description: Označuje veľkosť zipsu, na ktorú má úchytka sedieť (často sa uvádza
        ako č. 3, č. 5, č. 8, č. 10), čím sa zlepšuje filtrovanie kompatibility.
    compliance_certification:
      name: Certifikát zhody
      description: Normy zhody/schvaľovania, ktoré svetelný panel spĺňa pre použitie
        na cestách a elektromagnetickú kompatibilitu.
    component_position:
      name: Poloha komponentu
      description: Určuje relatívnu polohu dielu v rámci rozvodovej zostavy motora
        (napr. predný verzus zadný kryt, horná verzus dolná časť). Nie umiestnenie
        vozidla vpredu/vzadu.
    concentration_level:
      name: Úroveň koncentrácie
      description: Kvalitatívny údaj o tom, aká koncentrácia paradajkového pretlaku
        (jednoduchá, dvojitá, trojitá) spĺňa požiadavky receptu.
    concentration_type:
      name: Typ koncentrácie
      description: Označuje, či je produkt pripravený na použitie alebo koncentrát,
        a (ak ide o koncentrát) bežné pokyny na riedenie.
    concert_bass_drum_mounting_stand_type:
      name: Typ stojana na koncertný basový bubon
      description: Ako je koncertný basový bubon podopretý alebo upevnený pre dosiahnutie
        výkonu.
    concert_pitch_standard:
      name: Norma koncertného ladenia
      description: Určuje referenčnú koncertnú výšku tónu (A4), na ktorú je klavír
        naladený v čase predaja (napr. A440, A442, A444).
    condiment_form:
      name: Forma ochucovadla
      description: Označuje fyzickú formu alebo konzistenciu chrenového produktu (napr.
        pasta, prášok, krém).
    condiment_texture:
      name: Textúra ochucovadla
      description: Opisuje fyzickú konzistenciu prísady alebo čatní (napr. s kúskami,
        hladká konzistencia).
    confetti_format:
      name: Forma konfiet
      description: Určuje formát konfiet na základe toho, ako sú konfety zabalené
        alebo sa vypúšťajú (napr. voľné rozptyľovacie konfety vs. vystreľovacie/kanóny).
    conga_head_tensioning_system:
      name: Systém napínania hlavy bicích nástrojov konga
      description: Typ technického vybavenia používaného na napnutie/ladenie blany
        konga (napr. tradičné ladenie strmeňom verzus moderné rýchloladiace mechanizmy).
    conga_set_included_drum_types:
      name: Typy bubnov obsiahnuté v súprave Conga
      description: Ktoré typy bicích nástrojov konga sú zahrnuté v súprave konga (napr.
        quinto + conga + tumba).
    connector_case_style:
      name: Typ puzdra konektora
      description: Vymedzuje celkový konštrukčný model konektora (napr. pevné vs.
        mäkké puzdro) tak, aby spĺňal úroveň ochrany a prenosnosť.
    console_cover_installation_method:
      name: Spôsob inštalácie krytu konzoly
      description: Určuje spôsob upevnenia krytu konzoly na konzolu/opierku ruky (napr.
        nasunutie, elastické pásky, suchý zips, lepidlo, zacvaknutie).
    console_display_type:
      name: Typ displeja na konzole
      description: Identifikuje model používateľského displeja na zariadení (napr.
        LCD, LED, dotyková obrazovka).
    construction_design:
      name: Konštrukčné riešenie
      description: Uvádza, z koľkých dielov sa podložka skladá, čo ovplyvňuje jej
        ohybnosť (napr. 1-dielna alebo 3-dielna).
    contact_angle:
      name: Kontaktný uhol
      description: Určuje kontaktný uhol ložiskových drážok, vyjadrený ako jeden uhol
        alebo dvojica uhlov (napr. 36°/45°).
    contact_juggling_ball_fill_type:
      name: Typ výplne kontaktnej žonglérskej loptičky
      description: Určuje, či je lopta plná alebo dutá (a ak je dutá, aký má druh
        výplne), čo ovplyvňuje distribúciu hmotnosti a životnosť.
    contact_juggling_ball_transparency:
      name: Priehľadnosť kontaktnej žonglérskej loptičky
      description: Určuje priehľadnosť/optický vzhľad loptičky.
    contact_surface_material:
      name: Materiál kontaktnej plochy
      description: Uvádza materiál použitý na miestach, ktoré prichádzajú do styku
        s nástrojom (napr. korok/guma), aby sa zabránilo poškriabaniu a zlepšila sa
        priľnavosť.
    container_material:
      name: Materiál zásobníka
      description: Určuje hlavný materiál obalu produktu určeného na predaj v maloobchode
        (napr. sklo, PET plast, hliník).
    contaminant_removal:
      name: Odstraňovanie znečisťujúcich látok
      description: Uvádza triedy kontaminantov, na odstránenie alebo zníženie ktorých
        je produkt certifikovaný.
    contra_alto_clarinet_body_configuration:
      name: Konfigurácia tela kontra-alt klarinetu
      description: Opisuje fyzický tvar a konštrukciu kontra-alt klarinetu (napr.
        rovný vs. zložený dizajn).
    contra_alto_clarinet_lowest_note_extension:
      name: Predĺženie najnižšieho tónu pre kontra-alt klarinet
      description: Špecifikuje najnižší hrateľný tón nástroja (najnižšiu notu, ktorú
        klapkový mechanizmus umožňuje zahrať), čo sa bežne používa na rozlíšenie modelov
        s nízkym Es (E♭), nízkym D alebo nízkym C.
    contra_bass_clarinet_bell_type:
      name: Typ zvončeka pre kontrabasový klarinet
      description: Konfigurácia ozvučníkov používaná na kontrabasovom klarinete.
    contra_bass_clarinet_bore_type:
      name: Typ vnútorného priemeru kontrabasového klarinetu
      description: Dizajn otvoru nástroja
    contra_bass_clarinet_lowest_written_note:
      name: Najnižšia písaná nota kontrabasového klarinetu
      description: Najnižšia nota, ktorú tento nástroj dokáže zahrať (často závisí
        od toho, či má rozsah až po nízke C alebo nízke Eb).
    control_arm_bushing_material:
      name: Materiál puzdra ovládacieho ramena
      description: Určuje materiál priložených/namontovaných puzdier, ak sú súčasťou
        dodávky.
    control_arm_bushings_included:
      name: Puzdrá ovládacích ramien sú súčasťou balenia
      description: Uvádza, či sa ovládacie rameno dodáva s namontovanými puzdrami.
    control_arm_finish:
      name: Povrchová úprava ovládacieho ramena
      description: Určuje ochrannú povrchovú úpravu aplikovanú na ovládacie rameno
        (ochrana proti korózii a vzhľad).
    control_arm_grease_fitting_type:
      name: Typ mazacej súpravy ovládacieho ramena
      description: Určuje, či zostava ovládacieho ramena/guľového kĺbu obsahuje mazaciu
        súpravu (zerk) a či je prevádzkyschopná.
    control_arm_material:
      name: Materiál ovládacieho ramena
      description: Určuje primárny materiál a výrobnú konštrukciu tela ovládacieho
        ramena.
    control_arm_position:
      name: Poloha ovládacieho ramena
      description: Určuje polohu zavesenia kolies, pre ktorú je ovládacie rameno navrhnuté
        v rámci rohu/boku nápravy (napr. horná/dolná, predná/zadná, ľavá/pravá).
    control_arm_style:
      name: Typ ovládacieho ramena
      description: Určuje geometrický/dizajnový tvar ovládacieho ramena použitého
        pri rozložení závesu kolies.
    control_cable_connector_type:
      name: Typ konektora ovládacieho kábla
      description: Určuje typ koncovky/konektora, ktorý používajú ovládacie káble
        na prepojenie s ovládaním a motorom (napr. koncové spoje pre konkrétneho výrobcu
        originálneho zariadenia).
    control_voltage_or_gate_connectivity:
      name: Riadiace napätie alebo pripojenie hradla
      description: Určuje podporu prepojenia riadiaceho napätia/gate na účely integrácie
        s modulárnym/analógovým zariadením.
    controller_function:
      name: Funkcia ovládača
      description: Vymedzuje hlavnú rolu riadiacej dosky bežeckého pásu, ako je riadenie
        motora, napájanie alebo riadenie meniča.
    controller_type:
      name: Typ ovládača
      description: Určuje systém ovládača/ovládania motora, ktorý je súčasťou súpravy
        na konverziu skútra na EV (alebo sa vyžaduje na použitie), pričom sa zameriava
        na charakteristiky ovládača relevantné pre kompatibilitu a výkonnosť.
    conversion_kit_cooling_method:
      name: Spôsob chladenia súpravy na konverziu
      description: Primárny prístup k tepelnému ovládaniu, ktorý sa používa na prepojenie
        motora/invertora/batérie.
    conversion_kit_installation_complexity:
      name: Zložitosť inštalácie súpravy na konverziu
      description: Očakávaná úroveň inštalácie na základe zručnosti/nástrojov určených
        pre bežného zákazníka.
    converted_bed_size:
      name: Veľkosť konverzného lôžka
      description: Uvádza rozmery alebo konfiguráciu postele, na ktorú sa konvertuje
        detská postieľka po inštalácii tejto súpravy.
    convertible_configuration:
      name: Konvertibilná konfigurácia
      description: Označuje, do koľkých rôznych konfigurácií lôžka je možné produkt
        prekonverovať (napr. postieľka 3 v 1 → postieľka pre batoľatá → denná postieľka).
    convertible_high_chair_modes:
      name: Režimy konvertibilnej vysokej stoličky
      description: Určuje konfigurácie sedenia, na ktoré je možné stoličku premeniť.
    cookie_decorating_kit_items_included:
      name: Položky súpravy na zdobenie sušienok súčasťou balenia
      description: Uvádza jednotlivé dekoračné komponenty, aby zákazníci presne vedeli,
        čo všetko balenie obsahuje (napr. vrecúška na polevu, posýpky, formičky na
        sušienky).
    cookie_variety:
      name: Rôzne druhy sušienok
      description: Identifikuje špecifický štýl alebo rozmanitosť súborov cookie a
        pomáha kupujúcim rýchlo nájsť ich preferovaný typ.
    cooking_state:
      name: Stav varenia
      description: Označuje stupeň pripravenosti výrobku z kuraciny pri predaji (surové,
        úplne uvarené, marinované atď.).
    coolant_additive_purpose:
      name: Účel prísady do chladiacej kvapaliny
      description: Hlavné určenie prísady do chladiacej kvapaliny (nie prostriedky
        na preplachovanie chladiča ani špeciálne tesniace prostriedky).
    coolant_base_fluid:
      name: Základná kvapalina chladiacej kvapaliny
      description: Určuje hlavný glykolový základ použitý v zložení nemrznúcej/chladiacej
        kvapaliny.
    coolant_outlet_connection_style:
      name: Typ pripojenia výstupu chladiacej kvapaliny
      description: Typ výstupného pripájacieho rozhrania používaný na pripojenie hadice
        chladiča alebo chladiaceho potrubia.
    coolant_outlet_neck_angle:
      name: Uhol výstupného hrdla chladiacej kvapaliny
      description: Uhol/orientácia výstupu hrdla na vodu vzhľadom na montážnu prírubu/motor
        (užitočné pre vedenie hornej hadice chladiča).
    coolant_technology:
      name: Technológia chladiacej kvapaliny
      description: Špecifikuje chemické zloženie/technológiu chladiacej kvapaliny
        použitú v nemrznúcej kvapaline/chladiacej kvapaline (ako sa bežne označuje
        na obale).
    coolant_temperature_sensor_port:
      name: Port snímača teploty chladiacej kvapaliny
      description: Či hrdlo chladiacej kvapaliny obsahuje port pre snímač alebo spínač
        teploty chladiacej kvapaliny a aké rozhranie používa.
    coolant_temperature_sensor_seal_type:
      name: Typ tesnenia snímača teploty chladiacej kvapaliny
      description: Typ použitej metódy tesnenia medzi snímačom a priechodom motora/chladiacej
        kvapaliny.
    cooling_system_component_included:
      name: Súčasťou balenia je komponent chladiaceho systému
      description: Uvádza ďalšie komponenty chladiaceho systému, ktoré sú súčasťou
        dodávky vodného čerpadla.
    cooling_system_flush_application_step:
      name: Krok aplikovania preplachovania chladiaceho systému
      description: Označuje, kde produkt zapadá do servisného procesu (napr. čistiaci
        prostriedok pred oplachovaním vs. konečné oplachovanie/neutralizátor).
    cooling_system_type:
      name: Typ chladiaceho systému
      description: Špecifikuje konfiguráciu chladiaceho systému používaného vnútorným
        lodným motorom (napr. surová voda/otvorený okruh, uzavretý okruh/sladká voda
        s výmenníkom tepla, chladenie kýlom).
    cord_material:
      name: Materiál kábla
      description: Určuje materiál šnúry/vlasca, ktorý sa používa na pretiahnutie
        tampónu cez saxofón.
    core_type_bass_strings:
      name: Typ jadra (basové struny)
      description: Určuje tvar jadra struny, ktorý ovplyvňuje pocit pri hre a flexibilitu.
    cork_grease_base_material:
      name: Základný materiál mazadla na korky
      description: Hlavný základ použitý v zložení maziva na korky (napr. na báze
        lanolínu).
    cork_grease_form:
      name: Forma maziva na korky
      description: Fyzická forma produktu maziva na korky.
    corn_presentation:
      name: Prezentácia kukurice
      description: Určuje fyzickú prezentáciu alebo formu kukuričného produktu (napr.
        celý v struku, zrná, prášok).
    corn_syrup_variety:
      name: Druh kukuričného sirupu
      description: Určuje konkrétny štýl alebo variant spracovania sirupu.
    corn_variety:
      name: Odroda kukurice
      description: Identifikuje konkrétnu botanickú alebo trhovú odrodu predávanej
        kukurice, čo umožňuje kupujúcim rozlišovať medzi druhmi, ktoré sa líšia chuťou,
        textúrou, farbou a kulinárskym využitím.
    corner_compatibility:
      name: Kompatibilita rohov
      description: Určuje tvar rohu stola (štvorcový alebo okrúhly), pre ktorý je
        kryt určený.
    corner_flag_features:
      name: Vlastnosti rohovej vlajky
      description: Zdôrazňuje špeciálne funkčné vlastnosti alebo vylepšenia rohovej
        vlajky (napr. skladacia tyč, reflexný materiál).
    cornet_mouthpiece_shank_type:
      name: Typ stopky náustku krídlovky
      description: Špecifikuje štandard stopky/prijímača nátrubku, ktorý kornet podporuje
        z dôvodu kompatibility.
    cornhole_league_certification:
      name: Certifikácia ligy Cornhole
      description: Označuje oficiálne certifikácie alebo schválenia ligy, ktoré produkt
        spĺňa.
    corrosion_resistance:
      name: Odolný voči korózii
      description: Určuje úpravu zabezpečujúcu odolnosť proti korózii alebo triedu
        odolnosti držiaka určeného na vonkajšie použitie.
    corrosion_resistance_level:
      name: Stupeň odolnosti voči korózii
      description: Označuje ochranu proti korózii vhodnú pre prostredie so sladkou
        aj slanou vodou.
    costume_components_included:
      name: Vrátane súčastí kostýmu
      description: Uvádza časti a doplnky odevu, ktoré sú súčasťou kostýmu, pričom
        objasňuje, čo je súčasťou súpravy.
    cotton_weave_type:
      name: Tkaninová štruktúra bavlny
      description: Opisuje tkaninovú/pleteninovú štruktúru potlačiteľného bavlneného
        povrchu, ktorá ovplyvňuje textúru a ostrosť potlače.
    counter_type:
      name: Typ počítadla
      description: Určuje prítomnosť a typ vstavaného sledovania opakovaní alebo sily.
    counterweight_fill_material:
      name: Výplňový materiál protizávažia
      description: Označuje látku, ktorú možno použiť na doplnenie záťaže alebo na
        predbežné naplnenie protizávažia.
    counterweight_type:
      name: Typ protizávažia
      description: Určuje konštrukčný alebo dizajnový typ protizávažia, napríklad
        vrece s pieskom alebo oceľová doska, na účely kompatibility a montáže.
    coupler_system:
      name: Spojovací systém
      description: Typ/systém spriahadla použitý na modelovej lokomotíve pre kompatibilitu
        so železničnými vozňami.
    court_surface_suitability:
      name: Vhodnosť povrchu ihriska
      description: Uvádza povrch basketbalového ihriska, pre ktorý je podrážka topánky
        určená, a pomáha tak nakupujúcim vybrať si správnu priľnavosť a odolnosť pre
        vnútorné drevené palubovky, vonkajšie asfaltové/betónové ihriská alebo pre
        obidva typy.
    cover_fit_style:
      name: Štýl upevnenia krytu
      description: Opisuje, ako sa kryt umiestňuje na stôl, čo ovplyvňuje vzhľad a
        úroveň ochrany.
    cover_fit_type:
      name: typ osadenia krytu
      description: Označuje, či je kryt vyrobený na mieru (na mieru/čiastočne na mieru)
        alebo univerzálny a či je určený na kotvenie vo vode alebo na skladovanie/použitie
        na prívese.
    cowbell_beater_type:
      name: Typ paličky na kravský zvonec
      description: Odporúčaný typ úderového nástroja pre zvuk/úpravu kravského zvonca
        (ak je uvedený výrobcom produktu).
    cowbell_mounting_method:
      name: Spôsob montáže kravského zvonca
      description: Ako je kravský zvonec určený na montáž/použitie (v ruke alebo upevnený
        na držiaku).
    cowbell_sound_character:
      name: Charakter zvuku kravského zvonca
      description: Všeobecný tónový charakter používaný v ponukách (umožňuje vyhľadávanie
        nad rámec veľkosti).
    cradle_capacity:
      name: Kapacita kolísky
      description: Uvádza, či je kočík určený pre jedno dieťa alebo pre dvojičky.
    craft_cutter_embosser_machine_operation:
      name: Obsluha remeselnej rezačky/nástroja na razenie
      description: Určuje spôsob, akým rezačka/raznica funguje z pohľadu používateľského
        postupu (napr. ručná kľuka, elektrické tlačidlo, ovládanie cez aplikáciu).
    craft_decoration_maker_accessories_included:
      name: S príslušenstvom zariadenia na výrobu ozdobných dekorácií
      description: Uvádza kľúčové príslušenstvo, ktoré je súčasťou zariadenie na výrobu
        ozdobných dekorácií (napr. štartovacia páska/fólia, náhradné náplne so samolepkami,
        kazety s trblietkami, čistiace nástroje).
    craft_foil_application_method:
      name: Spôsob nanášania remeselnej fólie
      description: Označuje spôsob aplikácie/aktivácie ozdobnej fólie (lepidlo, teplo,
        toner/reaktívna látka atď.).
    craft_foil_format:
      name: Formát ozdobnej fólie
      description: Označuje fyzický formát ozdobnej fólie v predaji (napr. kotúč verzus
        listy).
    craft_glue_finish:
      name: Povrchová úprava kreatívnym lepidlom
      description: Opisuje vzhľad lepidla po zaschnutí (napr. číre, biele/nepriehľadné,
        priehľadné, lesklé/matné).
    craft_magnet_application:
      name: Aplikácia ozdobného magnetu
      description: Primárne určené ozdobné puzdro na použitie alebo montážny povrch
        pre magnetický výrobok.
    craft_magnet_holding_strength_level:
      name: Úroveň sily držania ozdobného magnetu
      description: Kategória relatívnej sily remeselných magnetov, ktorá pomáha nakupujúcim
        vybrať si pre svoj projekt magnet s vhodnou priľnavou silou.
    craft_organizer_storage_features:
      name: Funkcie úložného priestoru pre kreatívne organizéry
      description: Opisuje organizačné prvky a vnútorné úložné prvky ozdobných organizérov
        (napr. nastaviteľné priečky, zásuvky, priehľadné vrecká).
    craft_scoring_board_included_accessories:
      name: Príslušenstvo ku kreatívnej vyrezávacej šablóne
      description: Príslušenstvo zahrnuté v balení ryhovacej podložky (napr. ryhovací
        nôž/kosť na hladenie papiera, trojuholník, nástroj na obálky).
    craft_scoring_board_measurement_system:
      name: Merací systém remeselnej ryhovacej podložky
      description: Určuje merací systém vyznačený na bodovacej tabuli (imperiálny,
        metrický, duálny alebo neoznačený).
    craft_wire_finish_coating:
      name: Povrchová úprava/náter kreatívneho drôtu
      description: Špecifikuje povrchovú úpravu alebo povlak aplikovaný na drôt kvôli
        farbe, odolnosti voči strate lesku alebo na ochranu.
    craft_wood_surface_preparation:
      name: Príprava kreatívneho dreveného povrchu
      description: Označuje, či je drevený povrch pripravený na konečnú úpravu/natieranie
        alebo vyžaduje prípravu (napr. brúsenie/penetrovanie).
    crank_spindle_interface:
      name: Rozhranie kľukového vretena
      description: Určuje systém kľukového vretena a podpery stredového zloženia (napr.
        SRAM DUB, Square Taper), čím sa zabezpečuje kompatibilita medzi kľukovou súpravou
        a stredovým zložením.
    crankshaft_balance_type:
      name: Typ vyvažovania kľukového hriadeľa
      description: Označuje, či je kľukový hriadeľ vnútorne vyvážený (neutrálny) alebo
        externe vyvážený (vyžaduje závažia v harmonickom tlmiči vibrácií/zotrvačníku).
    crankshaft_bolt_pattern:
      name: Rozloženie skrutiek kľukového hriadeľa
      description: Rozloženie skrutiek na zadnej prírube na upevnenie zotrvačníka/ohybnej
        dosky.
    crankshaft_sensor_reluctor_type:
      name: Typ impulzného krúžka snímača kľukového hriadeľa
      description: Konfigurácia spúšťacieho/reluktorového kotúča snímača polohy kľukového
        hriadeľa (ak je použiteľné).
    craps_accessories_included:
      name: Vrátane príslušenstva kociek
      description: Uvádza ďalšie príslušenstvo určené špeciálne pre hru craps, ktoré
        je súčasťou balenia okrem kociek, žetónov a hracej plochy.
    crash_cymbal_profile:
      name: Profil činela Crash
      description: Celková zakrivenosť/profil činela (aké výrazné je vypuknutie),
        čo ovplyvňuje výšku tónu a odozvu.
    crash_cymbal_sound_character:
      name: Charakter zvuku crash činela
      description: Primárny deskriptor tónového charakteru pre zvuk crash činelu.
    crash_pad_size_class:
      name: Trieda veľkosti tlmiacej podložky
      description: Označuje všeobecnú veľkostnú kategóriu lezeckej dopadovej podložky,
        aby si kupujúci rýchlo vedeli predstaviť plochu pokrytia bez potreby presných
        rozmerov.
    crate_engine_assembly_level:
      name: Úroveň zmontovania zostavy motora
      description: Nakoľko kompletný sa motor odosiela (aké hlavné komponenty sú súčasťou
        dodávky).
    cream_base_ingredient:
      name: Základná zložka krému
      description: Označuje hlavný pôvod smotany zahŕňajúci druh hospodárskeho zvieraťa
        aj rastlinné alternatívy.
    cream_cheese_base:
      name: Základ zo smotanového syra
      description: Identifikuje primárny mliečny alebo rastlinný zdroj použitý na
        výrobu nátierkového krému, čo pomáha nakupujúcim pri zohľadňovaní svojich
        stravovacích návykov, alergénov a chuti.
    cream_cheese_form:
      name: Forma smotanového syra
      description: Opisuje fyzickú formu alebo textúru smotanového syra (napr. blok,
        šľahaný, dip), ktoré ovplyvňujú roztierateľnosť a zamýšľané použitie.
    cream_variety:
      name: Druh smotany
      description: Identifikuje špecifický druh smotany na základe obsahu tuku, spôsobu
        spracovania alebo zamýšľaného kulinárskeho použitia (napr. polotučná, dvojitá
        smotana, smotana na varenie).
    crib_accessory_features:
      name: Funkcie príslušenstva detskej postieľky
      description: Uvádza funkčné alebo úžitkové vlastnosti typické pre príslušenstvo
        detských postieľok a postelí pre batoľatá, ako je priedušnosť alebo elastické
        okraje.
    crib_bumper_features:
      name: Funkcie mantinelov do postieľky
      description: Zdôrazňuje osobitné funkčné vlastnosti ochranného lemovania detskej
        postieľky.
    crib_conversion_kit_components:
      name: Súčasti súpravy na konverziu postieľky
      description: Uvádza hlavné časti zahrnuté v súprave, aby si nakupujúci mohli
        overiť, či majú všetko potrebné na montáž.
    cricket_ball_grade:
      name: Trieda kriketovej loptičky
      description: Určuje úroveň kvality alebo zamýšľaný herný štandard loptičky.
    cricket_ball_piece_construction:
      name: Konštrukcia dielov kriketovej loptičky
      description: Označuje počet vonkajších dielov alebo tvarovaných častí použitých
        na výrobu plášťa loptičky, čo je kľúčový ukazovateľ kvality a ceny.
    cricket_ball_type:
      name: Typ kriketovej lopty
      description: Určuje typ kriketovej loptičky dodávanej s produktom alebo označuje,
        že loptička nie je súčasťou balenia.
    cricket_bat_accessory_type:
      name: Typ príslušenstva ku kriketovej pálke
      description: Určuje typ príslušenstva ku kriketovej pálke alebo údržbovej položky,
        aby si nakupujúci mohli rýchlo vyfiltrovať produkt, ktorý potrebujú.
    cricket_bat_size:
      name: Veľkosť kriketovej pálky
      description: Označuje štandardizovanú klasifikáciu veľkosti kriketovej pálky
        (0–6, Harrow, SH, LH), ktorá sa zvyčajne vyberá na základe veku a výšky hráča.
    cricket_bat_size_compatibility:
      name: Kompatibilita veľkosti kriketovej pálky
      description: Uvádza veľkosti pálok, pre ktoré je príslušenstvo určené, čím sa
        zaručuje správna kompatibilita.
    cricket_helmet_role:
      name: Úloha kriketovej prilby
      description: Označuje hernú úlohu, pre ktorú je prilba určená, ako napríklad
        odpaľovanie alebo stráženie bránky.
    cricket_leg_guard_type:
      name: Typ chrániča na nohy pre kriket
      description: Označuje konkrétny typ chráničov nôh na kriket.
    cricket_player_role:
      name: Úloha hráča kriketu
      description: Určuje primárnu hernú úlohu, pre ktorú je topánka určená.
    cricket_protection_grade:
      name: Stupeň ochrany pre kriket
      description: Určuje stupeň ochrany, ktorú priraďuje výrobca kriketového vybavenia.
    cricket_stump_base_type:
      name: Typ základne kriketového kolíka
      description: Určuje základný typ alebo materiál dodávaný s kolíkmi, ktorý ovplyvňuje
        stabilitu a vhodnosť pre hraciu plochu.
    cricket_stump_target_features:
      name: Cieľové vlastnosti kriketových kolíkov
      description: Vyzdvihuje odlišné funkčné prvky, ktoré zvyšujú použiteľnosť pri
        tréningu, viditeľnosť, odolnosť alebo stabilitu.
    cricket_stump_type:
      name: Typ kriketových kolíkov
      description: Kategorizuje štýl alebo konštrukciu kolíkov s cieľom pomôcť nakupujúcim
        vybrať si medzi tradičnými zápasovými kolíkmi, tréningovými variantmi alebo
        modernými osvetlenými modelmi.
    cricket_training_focus:
      name: Tréningové zameranie na kriket
      description: Základná kriketová zručnosť alebo disciplína, na zlepšenie ktorej
        je pomôcka určená.
    croquet_set_components_included:
      name: Vrátane súčastí súpravy na kroket
      description: Uvádza zoznam všetkých hlavných komponentov dodávaných v súprave
        (napr. bránky, kolíky, taška na prenášanie), aby zákazníci presne vedeli,
        čo kupujú.
    cross_country_binding_system:
      name: Systém viazania na bežecké lyže
      description: Určuje štandard viazania pre bežecké lyže, pre ktorý je produkt
        navŕtaný alebo s ktorým je kompatibilný.
    cross_stitch_chart_symbol_type:
      name: Typ symbolu krížikovej výšivky
      description: Ako je graf znázornený (symboly, farby alebo oboje).
    cross_stitch_finishing_type:
      name: Typ krížikového prešívania
      description: Zamýšľaný typ dokončenia/zobrazenia pre projekt výšivky.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mechanizmus na uchytenie látky v ráme na krížikovú výšivku
      description: Označuje spôsob upevnenia/napnutia látky v ráme (napr. spony, svorky,
        pripináčiky), čo ovplyvňuje jednoduchosť použitia a kompatibilitu s látkou.
    cross_stitch_frame_included_components:
      name: Priložené komponenty rámu pre krížikovú výšivku
      description: Uvádza, čo je súčasťou balenia (napr. iba rám alebo rám + svorky
        + stojan), čím sa znižuje nejednoznačnosť a počet vrátených produktov.
    cross_stitch_frame_type:
      name: Typ rámu pre krížikovú výšivku
      description: Určuje konštrukciu/typ rámu na krížikové vyšívanie (spôsob uchytenia
        látky), čo ovplyvňuje použiteľnosť a kompatibilitu s projektom.
    cross_stitch_pattern_technique:
      name: Technika krížikovej výšivky
      description: Technika/štýl krížikovej výšivky požadovaný schémou.
    crossbar_shape_profile:
      name: Tvar/profil priečky
      description: Určuje aerodynamiku/tvar profilu priečky.
    crossbar_style:
      name: Štýl priečky
      description: Označuje konštrukčný štýl latky, čím rozlišuje pevné súťažné latky
        od flexibilných alebo hybridných tréningových latiek.
    crossbow_type:
      name: Typ kuše
      description: Určuje základný typ konštrukcie kuše, napríklad kompozitnú, reflexnú
        alebo pištoľovú.Štýl konštrukcie ovplyvňuje výkonnosť, veľkosť a možnosti
        využitia, preto ho nakupujúci často používajú ako kritérium pri filtrovaní.
    crossover_component_type:
      name: Typ komponentu deliča frekvencií
      description: Určuje topológiu primárnych komponentov použitú v sieti s pasívnym
        deličom frekvencií.
    crossover_configuration:
      name: Konfigurácia výhybky
      description: Uvádza, či delič frekvencií používa jeden alebo viacero deliacich
        bodov (napr. 2-pásmové alebo 3-pásmové konštrukcie).
    crossover_type:
      name: Typ prejazdu
      description: Typ prejazdu je súčasťou súpravy komponentov.
    crown_profile:
      name: Profil korunky
      description: Určuje výšku/profil koruny čiapky nad okrajom.
    crown_style:
      name: Štýl koruny
      description: Definuje celkovú siluetu alebo profil koruny na cylindri.
    crust_taste_profile:
      name: Profil chuti kôrky
      description: Označuje, či je chuťová orientácia kôrky sladká, slaná alebo neutrálna.
    crystal_finish:
      name: Krištáľová povrchová úprava
      description: Opisuje povrchovú úpravu, náter alebo stav spracovania voľného
        kryštálu (napr. surový, leštený, bubnom leštený, s brúsenou plochou, matný,
        s kovovým povlakom, farbený, tepelne upravený).
    crystal_material:
      name: Kryštálový materiál
      description: Určuje materiál použitý na sklíčko hodiniek, ktoré chráni ciferník.
    crystalline_finish_style:
      name: Kryštalická povrchová úprava
      description: Charakteristický kryštalický/perovitý vzhľad, ktorý vytvára palmový
        vosk v hotových sviečkach.
    cucumber_variety:
      name: Odroda uhorky
      description: Určuje kultivar alebo trhovú odrodu uhorky (napr. anglická, perzská,
        Kirby).
    cue_compatibility:
      name: Kompatibilita tága
      description: Označuje konfiguráciu spojov tág, pre ktorú je puzdro navrhnuté,
        napríklad jednodielne alebo 3/4 kĺbové tága.
    cue_construction:
      name: Konštrukcia tága
      description: Označuje, ako je tágo skonštruované – počet dielov alebo či ide
        o čiastkový komponent, napríklad iba spodná časť alebo špička – čo ovplyvňuje
        prenosnosť a kompatibilitu.
    cue_head_material:
      name: Materiál hlavy tága
      description: Označuje materiál hlavy tága (časť, ktorá sa dotýka puku), ktorý
        ovplyvňuje odolnosť a ochranu povrchu.
    cue_sport_compatibility:
      name: Kompatibilita s tágovým športom
      description: Označuje, pre ktorý tágový šport je príslušenstvo určené.
    cue_thread_size:
      name: Veľkosť závitu tága
      description: Určuje špecifikáciu závitu používaného na predĺženiach, chráničoch
        kĺbov, vyvažovacích skrutkách a inom príslušenstve tág na zabezpečenie správneho
        uchytenia.
    cue_tip_hardness:
      name: Tvrdosť hrotu tága
      description: Klasifikuje tvrdosť špičky tága, ktorá ovplyvňuje kontrolu bielej
        gule a spätnú väzbu.
    cuff_height:
      name: Výška manžety
      description: Uvádza výšku manžety topánky (nízka, stredná, vysoká, odnímateľná/nastaviteľná),
        čo ovplyvňuje oporu a flexibilitu.
    cuff_position:
      name: Poloha manžety
      description: Označuje miesto na tele jazdca, kam sa má pripevniť manžeta vôdzky.
    cultivation_method:
      name: Metóda kultivácie
      description: Uvádza, ako sa zelenina pestovala, vrátane pestovateľských techník
        a poľnohospodárskych postupov.
    cup_type:
      name: Typ flitra
      description: Označuje profil povrchu flitra (plochý vs. vyklenutý) a hĺbku vyklenutia,
        čo môže ovplyvniť trblietanie, textúru a to, ako fliter sedí pri šití alebo
        lepení.
    cupcake_size:
      name: Veľkosť koláčika
      description: Určuje fyzickú veľkostnú kategóriu predávaných košíčkov (napr.
        mini, štandardné, jumbo).
    curd_size:
      name: Veľkosť syreniny
      description: Určuje veľkosť alebo textúru tvarohových zŕn.
    cure_method:
      name: Metóda vytvrdzovania
      description: Opisuje proces potrebný na stuhnutie alebo vytvrdnutie lepidla
        (napr. UV svetlo, vlhkosť vzduchu, teplo).
    curing_or_preparation_method:
      name: Spôsob vytvrdzovania alebo prípravy
      description: Uvádza, akým spôsobom boli olivy konzervované alebo inak upravené
        (napr. konzervované v slanom náleve, konzervované v oleji, grilované).
    curling_broom_head_material:
      name: Materiál hlavy curlingovej metly
      description: Označuje primárne zloženie materiálu hlavy metly alebo podložky.
    curling_broom_head_type:
      name: Typ hlavy curlingovej metly
      description: Určuje štýl alebo konštrukciu zametacej hlavy/podložky.
    curling_shoe_slider_material:
      name: Materiál klznej časti curlingovej obuvi
      description: Identifikuje primárny materiál posuvnej podrážky používanej na
        topánkach na curling.
    curling_training_aid_type:
      name: Typ pomôcky na tréning curlingu
      description: Označuje typ pomôcky na tréning curlingu.
    curry_variety:
      name: Odroda kari
      description: Produkty s karí omáčkou sú rozdelené podľa konkrétneho druhu karí
        alebo receptu, na ktorý sú určené, napríklad Tikka Masala, Massaman alebo
        thajské zelené kari, aby bolo možné presne filtrovať podľa chuti a štýlu.
    cushion_rubber_profile:
      name: Gumový profil na tlmenie nárazov
      description: Kód tvaru alebo profilu gumových koľajových profilov na tlmenie
        nárazov.
    cushioning_level:
      name: Úroveň tlmenia
      description: Označuje mieru odpruženia pod chodidlom, ktorú ponožka poskytuje
        na tlmenie nárazov a zvýšenie pohodlia.
    custom_label_content_type:
      name: Vlastný typ obsahu štítku
      description: Určuje, aké prispôsobené informácie sa majú použiť na našitom štítku
        (napr. meno, logo, správa, veľkosť, symboly starostlivosti, kontaktné údaje).
    customization_type:
      name: Typ prispôsobenia
      description: Určuje, či je dres prázdny, vydaný hráčom alebo na mieru s personalizovaným
        menom/číslom.
    cut_or_preparation_style:
      name: Štýl rezu alebo prípravy
      description: Určuje, ako sú kúsky zeleniny nakrájané alebo pripravené v konzerve
        alebo skle (napr. celé, nakrájané na kocky, pozdĺžne).
    cut_resistance_rating:
      name: Hodnotenie odolnosti voči prerezaniu
      description: Určuje formálne testovanú úroveň odolnosti položky proti prerezaniu.
    cut_type:
      name: Typ rezu
      description: Uvádza, či sa látka predáva na metre, ako predrezaný kus alebo
        ako celý kotúč/balík.
    cutting_application:
      name: Použitie rezania
      description: Hlavný zamýšľaný účel použitia nožníc na strihanie.
    cutting_mat_grid_style:
      name: Mriežkový vzor rezacej podložky
      description: Štýl potlačenej vodiacej línie na povrchu podložky.
    cutting_mat_intended_use:
      name: Určenie použitia rezacej podložky
      description: Hlavný účel použitia pre remeselné alebo pracovné povrchy, na ktorý
        je rezacia podložka navrhnutá.
    cv_boot_clamp_type:
      name: Typ spony manžety homokinetického kĺbu
      description: Určuje typ svorky/pásu použitej na upevnenie manžety CV.
    cv_boot_kit_contents:
      name: Obsah súpravy manžety homokinetického kĺbu
      description: Uvádza, čo je súčasťou dodávky manžety CV (napr. svorky, balenie
        maziva, upevňovacie pásky).
    cv_boot_material:
      name: Materiál manžety CV
      description: Označuje primárnu konštrukciu materiálu manžety homokinetického
        kĺbu.
    cv_boot_position:
      name: Poloha manžety homokinetického kĺbu
      description: Určuje, či manžeta homokinetického kĺbu pasuje na vnútornú (internú)
        alebo vonkajšiu (externú) polohu homokinetického kĺbu na náprave.
    cycling_apparel_fit:
      name: Strih cyklistického oblečenia
      description: Opisuje strih odevu a uvádza určený stupeň priliehavosti a aerodynamiky
        (napr. závodný strih, voľný strih).
    cylinder_head_assembly:
      name: Súprava hlavy valcov
      description: Určuje úroveň kompletnosti hlavy valcov v predaji (napr. plne zmontovaná
        s nainštalovanými komponentmi ventilového rozvodu verzus holý/nezmontovaný
        odliatok).
    cylinder_head_material_grade:
      name: Trieda materiálu hlavy valcov
      description: Určuje materiál a triedu použitú na odliatok hlavy valcov.
    cylinder_head_position:
      name: Poloha hlavy valcov
      description: Označuje, do ktorého radu/ktorej strany alebo orientácie je hlava
        valcov vhodná pre viacradové motory (napr. ľavá/pravá strana alebo rad 1/rad
        2).
    cymbal_alloy:
      name: Zliatina činelov
      description: Zliatina/zloženie činela (činelov) v súprave.
    cymbal_application:
      name: Použitie činelov
      description: Hlavné herné využitie, na ktoré je činel navrhnutý/určený na trhu.
    cymbal_arm_mounting_interface:
      name: Montážne rozhranie ramena činela
      description: Určuje, ako sa rameno činela pripevňuje k zvyšku hardvéru bubna
        (napr. svorka, stojan, prijímač stojana).
    cymbal_arm_rotation_positioning_features:
      name: Funkcie otáčania/polohovania ramena činelu
      description: Určuje polohovacie prvky, ktoré ovplyvňujú, ako sa dá rameno nakloniť/otáčať
        a zaistiť.
    cymbal_arm_style:
      name: Štýl ramena činelu
      description: Určuje, či je rameno činelu z hľadiska dosahu a polohy rovné alebo
        vyčnievajúce.
    cymbal_drum_case_wheel_configuration:
      name: Konfigurácia kolies puzdra na činely a bubny
      description: Označuje, či má skrinka kolesá a (ak je to relevantné) konfiguráciu
        kolies pre valivú prepravu.
    cymbal_hammering_style:
      name: Štýl úderov na činely
      description: Spôsob/typ tepania a jeho vzhľad, ktorý ovplyvňuje komplexnosť
        zvuku a herný pocit.
    cymbal_kit_components_included:
      name: Vrátane súčastí sady činelov
      description: Určuje, aké typy činelov sú súčasťou súpravy/balenia ride činelov
        (okrem samotného ride činelu).
    cymbal_kit_items_included:
      name: Vrátane položiek sady činelov
      description: Označuje, ktoré činely sú zahrnuté v súprave/balení (podľa typu
        činelu).
    cymbal_lathing:
      name: Sústruženie činelov
      description: Určuje, či/aká časť povrchu činelu je opracovaná sústruhom (drážkovaná)
        alebo neopracovaná/surová.
    cymbal_playing_style_genre:
      name: Štýl hry na čineloch/žáner
      description: Označuje typický kontext použitia, pre ktorý sú činely určené (napr.
        činely na brušný tanec vs. pochodové/orchestrálne ručné činely).
    cymbal_set_configuration:
      name: Konfigurácia sady činelov
      description: Označuje, či sa produkt predáva ako jeden činel, pár činelov alebo
        viacpárová súprava (napr. na skupinovú výučbu).
    cymbal_sound_character:
      name: Charakter zvuku činela
      description: Popisuje celkový tónový profil/zvučnosť činelu slúžiace na posúdenie
        (napr. jasný alebo tmavý).
    cymbal_sustain:
      name: Dozvuk činelov
      description: Ako dlho činel znie po údere.
    cymbal_type:
      name: Typ činelov
      description: Určuje funkčnú úlohu činelu, ktorú má elektronická podložka činelu
        napodobňovať.
    cymbal_volume_level:
      name: Úroveň hlasitosti činelu
      description: Vnímaná hlasitosť/výstupná kategória činelu.
    cymbal_weight_class:
      name: Hmotnostná trieda činelov
      description: Uvádza hmotnostnú triedu činelu, ktorá ovplyvňuje tón, hlasitosť
        a odozvu.
    dairy_heat_treatment:
      name: Tepelné spracovanie mliečnych výrobkov.
      description: Identifikuje stupeň spracovania alebo pasterizácie smotany (napr.
        surová, pasterizovaná, UHT), ktorý ovplyvňuje jej trvanlivosť, chuť a účinok
        šľahania.
    damage_type:
      name: Typ poškodenia
      description: Určuje typy poškodenia čelného skla, na opravu ktorých je súprava
        určená.
    damper_pedal_style:
      name: Štýl tlmiaceho pedála
      description: Opisuje fyzický štýl tlmiaceho pedála používaného s klávesmi/digitálnymi
        pianami.
    damping_adjustability:
      name: Nastaviteľnosť tlmenia
      description: Označuje, ktoré parametre tlmenia a/alebo výšky jazdy sú nastaviteľné
        na tlmiči nárazov.
    damping_level:
      name: Úroveň tlmenia
      description: Označuje relatívne množstvo zníženia hlasitosti a dozvuku, ktoré
        poskytuje stlmenie.
    dance_occasion:
      name: Tanečná udalosť
      description: Uvádza kontext určeného použitia odevu v rámci tanečného tréningu
        alebo vystúpenia.
    darbuka_accessories_included:
      name: Vrátane príslušenstva k darbuke
      description: Uvádza bežné príslušenstvo, ktoré je súčasťou balenia darbuky.
    darbuka_body_finish_type:
      name: Typ povrchovej úpravy korpusu darbuky
      description: Opisuje vonkajšiu povrchovú úpravu, náter alebo dekoráciu tela
        darbuky.
    darbuka_head_material:
      name: Materiál hlavy darbuky
      description: Určuje materiál membrány bubna darbuka.
    dart_barrel_material:
      name: Materiál tela šípok
      description: Určuje primárny materiál tela šípky, čo ovplyvňuje rozloženie hmotnosti,
        odolnosť a cenu.
    dart_shaft_design:
      name: Dizajn drieku šípky
      description: Rozlišuje mechanickú konštrukciu hriadeľa, napríklad či je pevný,
        otočný, teleskopický alebo obsahuje letku, čo má vplyv na výkonnosť a cenu.
    dart_shaft_thread_type:
      name: Typ závitu drieku šípky
      description: Označuje veľkosť/typ závitu použitého na zaskrutkovanie stopky
        do tela šípky, čím sa zabezpečí kompatibilita medzi stopkami a telami.
    dart_thread_size:
      name: Veľkosť závitu šípky
      description: Určuje veľkosť/normu závitu, s ktorými je diel kompatibilný, a
        zabezpečuje tak uloženie medzi driekmi, hrotmi a telami.
    dart_tip_compatibility:
      name: Kompatibilita hrotov šípok
      description: Označuje, či je časť šípky určená pre oceľovú špičku, mäkkú špičku
        alebo oba typy šípok.
    dart_tip_connection_type:
      name: Typ pripojenia hrotu šípky
      description: Opisuje špecifikáciu závitu alebo montážny systém, ktorý hrot používa
        na pripevnenie k telu alebo drieku šípok, čím sa zabezpečí kompatibilita.
    dartboard_tournament_approval:
      name: Schválenie turnaja v šípkach
      description: Uvádza, či je terč oficiálne schválený konkrétnymi šípkarskými
        zväzmi alebo ligami.
    dartboard_type:
      name: Typ terča na šípky
      description: Klasifikuje terč na šípky podľa konštrukčnej technológie a kompatibility
        so šípkami (napr. štetinové, elektronické, magnetické).
    dash_cover_construction_type:
      name: Typ konštrukcie krytu palubnej dosky
      description: Určuje spôsob výroby a štruktúru krytu panela (napr. lisovaný/odlievaný
        vs. šitý), čo ovplyvňuje presnosť osadenia a vzhľad.
    dash_cover_cutout_configuration:
      name: Konfigurácia výrezu krytu palubnej dosky
      description: Určuje, pre ktoré otvory/snímače na paneli OEM je kryt vyrezaný
        alebo tvarovaný.
    dashboard_accessory_position:
      name: Poloha príslušenstva panela
      description: Určuje, kde na paneli/okolo neho sa má príslušenstvo umiestniť
        alebo namontovať.
    date_variety:
      name: Odroda datle
      description: Špecifikuje kultivar/odrodu datlí (napr. Medjool, Deglet Noor,
        Ajwa). Rozmanitosť silne Influence chuť, veľkosť, textúru a je Highlight vo
        väčšine názvov produktov a popisov, takže jej zachytenie zlepšuje filtrovanie
        a objavovanie.
    dayan_head_material:
      name: Materiál stredovej krytky Dayan
      description: Materiál hracej plochy (pudi), napríklad typ prírodnej alebo syntetickej
        kože.
    dayan_strap_material:
      name: Materiál remienka Dayan
      description: Materiál napínacích popruhov (baddhi), ktoré sa používajú na šnurovanie
        dayanu.
    dayan_syahi_type:
      name: Typ ladiacej pasty syahi na bubon Dayan
      description: Typ použitia syahi (čiernej ladiacej pasty) na bubon Dayan.
    decaffeination_method:
      name: Metóda odstraňovania kofeínu
      description: Označuje proces používaný na odstránenie kofeínu z bezkofeínovej
        kávy.
    decal_installation_method:
      name: Spôsob nanášania nálepky
      description: Spôsob nanášania nálepky na povrch vozidla (napr. nanášanie za
        sucha, nanášanie za mokra). Podrobnosti o nástroji/požiadavkách (napr. prenášacia
        páska alebo teplovzdušná pištoľ) by mali byť uvedené v návode alebo v príslušných
        atribútoch, ak je to relevantné.
    decal_orientation:
      name: Orientácia nálepky
      description: Či je nálepka určená na nalepenie na vnútornú stranu skla alebo
        na vonkajšiu stranu.
    decal_placement_type:
      name: Typ umiestnenia nálepky
      description: Uvádza, na ktoré miesto vozidla je nálepka určená (napr. karoséria,
        nárazník, kapota).
    decal_visibility_property:
      name: Vlastnosť viditeľnosti nálepky
      description: Optické vlastnosti a vlastnosti na zlepšenie viditeľnosti nálepky,
        ktorých účelom je zlepšiť viditeľnosť alebo reakciu na svetlo (napr. reflexné,
        fluorescenčné, svietiace v tme alebo priehľadné vlastnosti).
    deck_concave_level:
      name: Úroveň konkávnosti paluby
      description: Označuje hĺbku alebo intenzitu konkávneho prehnutia dosky (napr.
        jemné, stredné, hlboké).
    deck_flex_rating:
      name: Stupeň ohybnosti dosky
      description: Kvalitatívne hodnotenie flexibility/tuhosti dosky.
    deck_material:
      name: Materiál paluby
      description: Identifikuje primárny konštrukčný materiál dosky skateboardu.
    decoder_interface_socket_type:
      name: Rozhranie dekodéra/typ konektora
      description: Typ rozhrania digitálneho dekodéra alebo konfigurácia palubného
        dekodéra pre model lokomotívy.
    decoration_technique:
      name: Technika dekorácie
      description: Označuje primárnu metódu použitú na aplikáciu grafiky alebo dekoratívnych
        prvkov na tričko.
    decorative_stamp_form_factor:
      name: Formát dekoratívnej pečiatky
      description: Označuje formát fyzickej pečiatky a spôsob tlače návrhu (jedna
        pečiatka, súprava, valček, pozadie atď.).
    decorative_tape_application:
      name: Nanesenie dekoratívnej pásky
      description: Hlavné využitie pri ručných prácach, na ktoré je táto ozdobná páska
        určená alebo propagovaná.
    decorative_tape_format:
      name: Formát dekoratívnej pásky
      description: Určuje, ako sa dekoratívna páska dodáva/je balená na použitie.
    decoy_buoyancy:
      name: Vztlak vábničky
      description: Opisuje, ako sa vábnička správa vo vodnom stĺpci (pláva, vznáša
        sa alebo sa potápa).
    decoy_joint_type:
      name: Typ kĺbu vábničky
      description: Uvádza, či je telo nástrahy pevné alebo kĺbové, čo ovplyvňuje spôsob
        plávania.
    decoy_motion_mechanism:
      name: Mechanizmus pohybu návnady
      description: Opisuje, či a ako návnada vytvára pohyb alebo rušenie vody na prilákanie
        zveri.
    decoy_posture:
      name: Pozícia návnady
      description: Označuje zobrazený postoj alebo činnosť zvieraťa, ktoré vábnička
        modeluje (napr. kŕmenie, odpočinok, ostražitosť).
    decoy_size_class:
      name: Veľkostná trieda návnady
      description: Kategorizuje relatívnu veľkosť vábničky v porovnaní so skutočným
        zvieraťom (napr. štandardná, magnum, nadrozmerná).
    decoy_style:
      name: Štýl vábničky
      description: Určuje fyzický tvar alebo konštrukčnú triedu návnady, čo lovcom
        umožňuje vybrať si správnu zostavu.
    deli_meat_variety:
      name: Druh údeniny
      description: Klasifikuje jednotlivé druhy údenín (napr. saláma, mortadela, prosciutto,
        pečené hovädzie).
    delivery_form:
      name: Doručenie z
      description: Fyzická forma dodania čističa vstrekovačov.
    denim_composition:
      name: Zloženie džínsoviny
      description: Primárne zloženie vlákien džínsoviny (základné vlákna bez farbív/povrchových
        úprav).
    denim_finish:
      name: Úprava denimu
      description: Povrchová úprava alebo spracovanie džínsoviny.
    denim_intended_use:
      name: Účel použitia džínsoviny
      description: Typický projekt alebo účel, na ktorý je táto džínsovina určená.
    denim_stretch_type:
      name: Elastický typ denimu
      description: Či je denim mechanicky elastický, s pridaným elastanom/spandexom
        alebo nie je elastický.
    denim_wash:
      name: Pranie denimu
      description: Označuje odtieň alebo spôsob farbenia džínsoviny (napr. svetlá,
        tmavá, nespracovaná, ošetrená kyselinou).
    derailleur_cage_length:
      name: Dĺžka klietky prehadzovačky
      description: Označuje dĺžku klietky prehadzovačky, ktorá určuje kapacitu reťaze
        (predovšetkým pre zadné prehadzovačky).
    derailleur_mounting_style:
      name: Spôsob montáže prehadzovačky
      description: Určuje, ako sa prehadzovačka pripevňuje ku kostre bicykla alebo
        k závesu (napr. spájkovanie, svorka, priama montáž, UDH).
    derailleur_type:
      name: Typ prehadzovačky
      description: Označuje, či je produkt prednou alebo zadnou prehadzovačkou.
    deshedder_tool_type:
      name: Typ nástroja na odstraňovanie chlpov
      description: Klasifikuje konštrukčný typ odstraňovača srsti, aby si nakupujúci
        mohli vybrať svoj preferovaný spôsob starostlivosti o srsť (napr. čepeľ, blok,
        kefa alebo rukavica).
    diabolo_axle_system:
      name: Systém osky joja
      description: Určuje systém/konfiguráciu osky joja, ktorá ovplyvňuje točenie,
        stabilitu a opotrebovanie špagátu.
    diagnostic_functions_supported:
      name: Podporované diagnostické funkcie
      description: Určuje diagnostické a údržbárske funkcie, ktoré môže skener vykonávať.
    diagnostic_interface_type:
      name: Typ diagnostického rozhrania
      description: Pripojenie/rozhranie používané na komunikáciu s vozidlom alebo
        zariadením (napr. OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Trieda farby diamantu
      description: Označuje stupeň farbenia diamantov od D (bezfarebný) po Z (svetlá
        farba) alebo označuje efektné diamanty.
    diaper_cover_style:
      name: Štýl krycej vrstvy plienky
      description: Definuje dizajnovú siluetu alebo dekoratívny štýl nohavičiek na
        plienky, aby sa uľahčilo prehliadanie a filtrovanie na základe štýlu.
    diastatic_power_unit:
      name: Jednotka diastatického výkonu
      description: Určuje systém jednotiek používaný na hlásenie hodnoty diastatickej
        sily produktu (napr. °Lintner vs Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Systém ladenia diatonickej harmoniky
      description: Určuje ladenie/rozloženie tónov používané diatonickou harmonikou.
    dice_sides:
      name: Strany kocky
      description: Počet strán (líc) na kocku pre kocky zahrnuté v produkte (napr.
        d6, d20). V prípade zmiešaných súprav použite prevládajúci typ alebo zoznam
        ako viacero hodnôt, ak je to podporované.
    didgeridoo_construction_type:
      name: Typ konštrukcie didgeridoo
      description: Ako je didgeridoo skonštruované alebo tvarované (tradičný alebo
        moderný konštrukčný prístup).
    dietary_formulation_claim:
      name: Tvrdenie týkajúce sa zloženia výrobku
      description: Zdôrazňuje kľúčové atribúty zloženia alebo výnimky týkajúce sa
        výživy koní (napr. bez obilnín, s nízkym obsahom škrobu, organické).
    dinosaur_playset_scale_figure_size_class:
      name: Mierka hracej súpravy/veľkostná trieda figúrok dinosaurov
      description: Uvádza všeobecné mierky obsiahnutých dinosaurov/figúrok, aby sa
        zabezpečila kompatibilita s inými súpravami.
    dinosaur_species_included:
      name: Zahrnuté druhy dinosaurov
      description: Uvádza, ktoré druhy dinosaurov sú v súprave zastúpené (figúrky
        alebo odliatky dinosaurov).
    dipsy_diver_size_designation:
      name: Označenie veľkosti smerového potápacieho kotúča Dipsy Diver
      description: Označuje výrobcom definovanú veľkosť rybárskej návnady, ktorá ovplyvňuje
        hmotnosť a hĺbku ponoru.
    disc_brake_rotor_mount_type:
      name: Typ montáže rotora kotúčovej brzdy
      description: Uvádza, akým spôsobom je kotúč kotúčovej brzdy pripevnený k náboju
        (napr. 6 skrutiek, Center Lock).
    disc_lock_accessories_included:
      name: Súčasťou balenia je príslušenstvo na zaistenie kotúča
      description: Určuje dodatočné položky balenia dodávané s kotúčovým zámkom na
        bicykel, ako napríklad pripomínací kábel, puzdro na prenášanie, montážny držiak
        alebo batérie.
    disco_ball_mirror_tile_material:
      name: Materiál zrkadlových plôšok diskogule
      description: Materiál reflexnej dlaždice na disko guli (ak je to relevantné).
    disco_ball_mirror_tile_size:
      name: Veľkosť zrkadlových dlaždíc diskogule
      description: Približná veľkosť jednotlivých zrkadlových dlaždíc/štvorcov na
        diskoguli.
    display_backlight_color:
      name: Farba podsvietenia displeja
      description: Farba podsvietenia/osvetlenia displeja/číselníka meradla.
    disposable_compostable_claim:
      name: Tvrdenie týkajúce sa jednorazovosti/kompostovateľnosti
      description: Označuje, či je produkt kompostovateľný, biologicky odbúrateľný,
        recyklovateľný alebo nerecyklovateľný (ak je to relevantné).
    distillation_method:
      name: Destilačná metóda
      description: Označuje metódu destilácie alebo typ destilačného prístroja použitý
        na výrobu liehoviny.
    distilled_water_intended_use:
      name: Zamýšľané použitie destilovanej vody
      description: Určuje hlavné použitie destilovanej vody (napr. pitie, prístroj
        CPAP, zvlhčovač vzduchu, parná žehlička).
    distress_transmission_frequency:
      name: Frekvencia tiesňového vysielania
      description: Primárna rádiová frekvencia/frekvencie používané na tiesňové volanie.
    distressing_level:
      name: Úroveň umelého opotrebovania
      description: Určuje mieru úmyselného opotrebenia, roztrhania alebo oderu na
        tkanine.
    distressing_style:
      name: Štýl umelého opotrebovania
      description: Označuje typ alebo stupeň opotrebenia na džínsoch, napríklad roztrhané
        miesta alebo strapcovitý efekt.
    distributor_advance_mechanism:
      name: Mechanizmus predstihu rozdeľovača
      description: Určuje typ mechanizmu predstihu zapaľovania používaného rozdeľovačom.
    distributor_cap_terminal_type:
      name: Typ svoriek rozdeľovacieho viečka
      description: Určuje štýl svoriek rozdeľovacieho viečka.
    distributor_gear_material:
      name: Materiál rozvodového kolesa
      description: Určuje materiál hnacieho kolesa rozdeľovača.
    distributor_ignition_type:
      name: Typ zapaľovania s rozdeľovačom
      description: Určuje, či je rozdeľovač určený pre kontaktné zapaľovanie, elektronické
        zapaľovanie alebo systémy typu HEI.
    distributor_kit_contents:
      name: Obsah súpravy distribútora
      description: Uvádza, ktoré komponenty sú súčasťou rozdeľovača (napr. viečko,
        rotor, modul zapaľovania, tesnenie/O-krúžok, hnacie koleso, kabeláž/konektor).
    dive_computer_form_factor:
      name: Typ vyhotovenia potápačského počítača
      description: Určuje fyzickú konštrukciu alebo spôsob montáže potápačského počítača,
        napríklad montáž pomocou konzoly alebo v štýle hodiniek.
    diving_mask_design:
      name: Konštrukcia potápačskej masky
      description: Definuje celkový konštrukčný štýl potápačskej masky, ovplyvňuje
        prispôsobenie, zorné pole a zamýšľané použitie.
    divot_tool_prong_configuration:
      name: Konfigurácia hrotov nástroja na opravu jamiek
      description: Určuje počet a usporiadanie hrotov na nástroji na opravu jamiek,
        ktoré sa používajú na opravu poškodenia trávnika.
    divot_tool_style:
      name: Štýl nástroja na kultiváciu trávnika
      description: Definuje celkový štrukturálny alebo nasadený štýl nástroja na opravu
        jamiek, napríklad pevný, vyklápací/skladací, multifunkčný nástroj alebo príslušenstvo,
        ktoré sa pripína na klobúk alebo palicu.
    djembe_shell_construction:
      name: Konštrukcia korpusu djembe
      description: Opisuje metódu výroby tela/mušle bubna djembe.
    djembe_tuning_system:
      name: Ladiaci systém bubna djembe
      description: Určuje spôsob napínania/ladenia djembe.
    dmx_output_connector_type:
      name: Typ výstupného konektora DMX
      description: Formát fyzického konektora používaný pre výstupné porty DMX ovládača.
    doctor_playset_items_included:
      name: Vrátane položiek súpravy hry na doktora
      description: Uvádza hračkárske lekárske pomôcky a príslušenstvo na rolové hry,
        ktoré sú súčasťou lekárskej súpravy (napr. stetoskop, injekčná striekačka,
        reflexné kladivko).
    doctor_playset_role_play_setting:
      name: Prostredie rolovej hry pre lekárov v hracej súprave
      description: Určuje hlavný kontext rolovej hry, ktorý táto lekárska súprava
        reprezentuje.
    doctor_playset_wearable_items_included:
      name: Vrátane položiek súpravy hry na doktora, ktoré sa dajú nosiť
      description: Označuje nositeľné súčasti kostýmu, ktoré sú súčasťou hernej súpravy.
    doll_accessory_type:
      name: Typ príslušenstva pre bábiky
      description: Definuje, o aký druh doplnku pre bábiku alebo akčnú figúrku ide
        (napr. oblečenie, obuv, nábytok, stojany na výstavy), čo umožňuje nakupujúcim
        prehliadať si túto kategóriu doplnkov a filtrovať ju.
    doll_eye_type:
      name: Typ oka pre bábiky
      description: Určuje štýl konštrukcie očí bábiky (napr. vsadené akrylové, maľované,
        LED podsvietenie).
    doll_hair_fiber_type:
      name: Typ vlasového vlákna pre bábiky
      description: Typ vlasov/vlákien použitých na bábike (alebo žiadne), čo ovplyvňuje
        realizmus, štýl a starostlivosť.
    doll_making_kit_components_included:
      name: Vrátane súčastí súpravy na výrobu bábik
      description: Uvádza kľúčové materiály a nástroje v súprave na výrobu bábik,
        aby si nakupujúci mohli porovnať balíčky a vedieť, čo potrebujú na dodanie.
    dollhouse_installation_placement_type:
      name: Inštalácia/typ umiestnenia domčeka pre bábiky
      description: Ako sa má domček pre bábiky používať alebo umiestniť (napr. na
        stôl, na podlahu alebo na stenu).
    dollhouse_items_included:
      name: Súčasťou balenia je aj domček pre bábiky
      description: Označuje, čo sa nachádza v krabici s domčekom pre bábiky (nábytok,
        bábiky, doplnky).
    dollhouse_lighting_type:
      name: Typ osvetlenia domčeka pre bábiky
      description: Typ osvetlenia, ktoré je súčasťou domčeka pre bábiky alebo ktoré
        domček pre bábiky podporuje.
    dollhouse_room_type:
      name: Typ izby v domčeku pre bábiky
      description: Určuje miestnosť alebo priestor v domčeku pre bábiky, kde sa dané
        príslušenstvo zvyčajne používa.
    dollhouse_scale:
      name: Mierka domčeka pre bábiky
      description: Mierka domčeka pre bábiky alebo príslušenstva k domčeku pre bábiky
        (napr. 1:12) na zabezpečenie kompatibility medzi domčekmi, nábytkom a figúrkami.
    dollhouse_style_theme:
      name: Štýl/téma domčeka pre bábiky
      description: Celkový štýl alebo téma domčeka pre bábiky na prezeranie a darovanie
        (napr. moderný vs. viktoriánsky).
    donnos_playing_technique:
      name: Spôsob hry na Donnos
      description: Spôsob hry na donnos (iba rukou vs. paličkou/úderníkom), aby to
        zodpovedalo očakávaniam kupujúceho a zahrnutému príslušenstvu.
    donnos_tuning_system:
      name: Systém ladenia Donnos
      description: Primárna metóda používaná na ladenie alebo zmenu výšky tónu (napr.
        napínacie šnúry/stláčací mechanizmus).
    door_assembly_type:
      name: Typ montáže dverí
      description: 'Označuje, čo je súčasťou balenia: iba kryt dverí, plášť dverí
        alebo kompletná zostava dverí.'
    door_closure_mechanism:
      name: Mechanizmus zatvárania dverí
      description: Definuje mechanizmus, ktorý ovláda zatváranie dverí (napr. mäkké
        zatváranie, magnetická západka).
    door_handle_components_included:
      name: Vrátane komponentov kľučky dverí
      description: Uvádza, ktoré kľúčové komponenty sú súčasťou kľučky na dverách
        (napr. vložka zámky, tesnenie, kryt, montážny hardvér, káblový konektor, západka/aktuátor).
    door_handle_operation:
      name: Obsluha kľučky dverí
      description: Určuje hlavný spôsob ovládania/aktivácie mechanizmu kľučky dvier
        vozidla (napr. mechanická tiahlová väzba, zámková vložka, bezkľúčový dotyk/tlačidlo,
        elektrické vysúvanie).
    door_lock_knob_attachment_method:
      name: Spôsob upevnenia otočného gombíka zámku dverí
      description: Určuje, ako sa gombík zámku dverí pripevňuje k tyči zámku (napr.
        závit, natlačenie).
    door_lock_position:
      name: Poloha zámku dverí
      description: Určuje, pre ktorú polohu dverí/otvorenia sú zámok dverí alebo časť
        zámku dverí určené vo vozidle.
    door_seal_feature_set:
      name: Súbor vlastností tesnenia dverí
      description: Funkčné vlastnosti tesnenia dverí.
    door_seal_material_type:
      name: Typ materiálu tesnenia dverí
      description: Hlavná skupina elastomérov/materiálov na tesnení dverí (okrem generických
        materiálov).
    door_seal_product_form:
      name: Forma produktu na utesnenie dverí
      description: Označuje tvar tesnenia dverí v predaji/balení.
    door_window_operation:
      name: Obsluha dverného okna
      description: Určuje, či je okenný systém dverí určený na manuálne alebo elektrické
        ovládanie, alebo či dvere nemajú okno.
    double_decker_bus_deck_configuration:
      name: Konfigurácia poschodí dvojposchodového autobusu
      description: Určuje konfiguráciu prístupu na poschodie/strechu dvojposchodového
        autobusu.
    double_drum_pedal_linkage_medium:
      name: spojovací mechanizmus dvojitého pedála basového bubna (stredná dĺžka)
      description: Určuje prostriedok, ktorým je sekundárny pedál spojený s primárnym
        pedálom (napr. hnací hriadeľ, reťaz, remeň).
    double_end_bag_core_type:
      name: Typ jadra boxovacej lopty
      description: Označuje vnútornú konštrukciu úderového jadra, ktorá určuje rýchlosť
        odrazu, pocit a požiadavky na údržbu.
    double_pointed_needle_point_style:
      name: Štýl pletenia ihlou s dvojitým hrotom
      description: Opisuje ostrosť/tvar hrotu určené pre rôzne priadze a štýly pletenia.
    dough_extruder_accessories_included:
      name: Príslušenstvo k extrudéru cesta súčasťou balenia
      description: Ďalšie komponenty, ktoré sú súčasťou balenia zariadenia na vytláčanie
        cesta.
    dough_extruder_operation_type:
      name: Typ prevádzky zariadenia na vytláčanie cesta
      description: Ako sa cesto pretláča cez zariadenie na vytláčanie cesta na vytváranie
        tvarov.
    dough_extruder_shape_disc_included:
      name: Tvarovací kotúč zariadenia na vytláčanie cesta je súčasťou balenia
      description: Tvary, ktoré dokáže extrudér vytvárať pomocou priložených diskov/trysiek.
    dough_format:
      name: Formát cesta
      description: Uvádza fyzický vzhľad/tvar cesta vo vnútri balenia (napr. guľa,
        plát, kruh, drvené pramienky).
    doumbek_accessories_included:
      name: Vrátane príslušenstva k doumbeku
      description: Príslušenstvo dodávané s bubnom doumbek (napr. ladiaci kľúč, puzdro).
    doumbek_head_material:
      name: Materiál hlavy doumbeku
      description: Materiál blany (membrány) bubna na doumbeku.
    doumbek_head_type:
      name: Typ membrány bubna na doumbeku
      description: Konštrukcia/typ hlavy doumbeka (spôsob výroby alebo montáže blany).
    doumbek_playing_style_technique:
      name: Štýl/technika hry na dounbeku
      description: Zamýšľaný herný kontext/štýl bežne spájaný s doumbekom.
    doumbek_tuning_system:
      name: Systém ladenia doumbeku
      description: Ako sa doumbek napína/ladí (alebo či sa nedá ladiť).
    dowel_end_style:
      name: Typ konca kolíka
      description: Opisuje opracovanie/tvar koncov kolíkov (rozperiek), čo ovplyvňuje
        ľahkosť zasúvania, bezpečnosť a určené použitie pri remeselnej výrobe.
    dowel_surface_texture:
      name: Textúra povrchu spojovacieho kolíka
      description: Opisuje povrch rozperky, napríklad hladký alebo ryhovaný, čo ovplyvňuje
        vzhľad a priľnavosť lepidla.
    drafting_compass_adjustment_mechanism:
      name: Mechanizmus nastavenia kružidla
      description: Primárny mechanizmus jemného nastavenia slúži na presné nastavenie
        polomeru.
    drafting_compass_fine_adjustment_mechanism:
      name: Mechanizmus jemného nastavenia technického kružidla
      description: Typ jemného nastavenia použitého na presné nastavenie polomeru
        (ak je k dispozícii).
    drafting_compass_lead_holder_type:
      name: Typ držiaka tuhy rysovacieho kružidla
      description: Typ vložky/držiaka na kreslenie, ktorý je súčasťou kružidla alebo
        ktorý kružidlo podporuje.
    drag_system_material:
      name: Materiál navíjacieho systému
      description: Určuje materiál alebo technológiu použitú v brzdnej sústave, ktorá
        ovplyvňuje odolnosť voči teplu a plynulosť chodu.
    drag_system_type:
      name: Typ ťažného systému
      description: Identifikuje typ brzdného mechanizmu použitého v navijaku, napríklad
        predný, zadný, pákový, hviezdicový, magnetický alebo kotúčový brzdný mechanizmus.
    drag_type:
      name: Typ brzdného mechanizmu
      description: Určuje typ mechanizmu navíjania používaného navijakom (umiestnenie
        alebo spôsob ovládania).
    drawer_features:
      name: Funkcie zásuviek
      description: Uveďte konkrétne konštrukčné prvky alebo funkcie zásuviek (napr.
        tiché zatváranie, podšívka z plsti).
    drawer_slide_type:
      name: Typ vysúvania zásuvky
      description: Určuje spôsob montáže a typ výsuvu koľajničiek zásuvky (napr. montáž
        pod doskou, plný výsuv).
    drawing_ink_compatible_tools:
      name: Nástroje kompatibilné s tušom na kreslenie
      description: Určuje nástroje použitia, pre ktoré je atrament určený (napr. namáčacie
        pero vs. štetec).
    drawing_ink_permanence:
      name: Trvácnosť tušu na kreslenie
      description: Označuje charakteristiky stálosti dôležité pre hotové umelecké
        dielo a reprodukciu.
    dress_embellishment:
      name: Ozdoba šiat
      description: Zvýrazňuje výrazné dekoratívne prvky zakomponované do dizajnu šiat.
    dress_train_type:
      name: Typ vlečky na šatách
      description: Uvádza prítomnosť a dĺžku/štýl vlečky na šatách, čím poskytuje
        informácie o formálnosti a vhodnosti pre dané miesto konania.
    dried_surface_finish:
      name: Úprava vysušeného povrchu
      description: Opisuje typický vzhľad povrchu po zaschnutí (lesk/textúra).
    drink_tube_insulation:
      name: Izolácia pitnej hadičky
      description: Uvádza, či je hadička na pitie vybavená izoláciou alebo tepelným
        obalom, ktorý zabraňuje otepľovaniu alebo zamŕzaniu tekutín.
    drive_band_cross_section_shape:
      name: Tvar prierezu hnacieho pásu
      description: Tvary profilu hnacieho pásu (okrúhly, plochý atď.).
    drive_band_join_type:
      name: Typ spojenia hnacieho remeňa
      description: Ako je spojený/skonštruovaný hnací remeň (nekonečný vs. vyžadujúci
        viazanie atď.).
    drive_band_material_type:
      name: Typ materiálu hnacieho remeňa
      description: Určuje materiál/typ hnacieho pásu použitého na kolovrátkoch.
    drive_location:
      name: Umiestnenie pohonu
      description: Identifikuje umiestnenie zotrvačníka/pohonného mechanizmu na eliptickom
        trenažéri, čo ovplyvňuje plochu a pocit z pohybu.
    drive_mechanism:
      name: Pohonný mechanizmus
      description: Označuje typ pohonu použitého na prenos sily z pedálov na zotrvačník.
    drive_shaft_material:
      name: Materiál hnacieho hriadeľa
      description: Určuje hlavný konštrukčný materiál rúrky hnacieho hriadeľa alebo
        kompletnej zostavy.
    drive_system:
      name: Pohonný systém
      description: Určuje mechanizmus, ktorý prenáša silu vyvinutú na pedál do systému
        odporu.
    drivetrain_configuration:
      name: Konfigurácia hnacieho ústrojenstva
      description: Určuje nastavenie pohonu na bicykli, pričom uvádza, či je zadný
        náboj pevný, voľnobežný s jednou rýchlosťou alebo preklápací.
    drivetrain_speed_compatibility:
      name: Kompatibilita rýchlostí pohonu
      description: Uvádza rýchlosti kazety, na fungovanie s ktorými je reťazové koleso
        určené, čím sa zabezpečia správne profily zubov a rozstup.
    drone_positioning_system:
      name: Systém polohovania dronov
      description: Technológia polohovania/udržiavania pri navigácii a stabilnom vznášaní
        sa podporovaná dronom.
    drone_transmission_type:
      name: Typ prenosu drona
      description: Primárna metóda používaná na ovládanie a/alebo video spojenie medzi
        dronom a ovládačom/zariadením.
    drop_spindle_whorl_position:
      name: Poloha závitu sklopného vretena
      description: Umiestnenie závitu na drieku.
    drum_carder_accessories_included:
      name: Vrátane príslušenstva k bubnovej česačke
      description: Bežné položky v súprave na česanie vlny.
    drum_clamp_locking_mechanism:
      name: Zaisťovací mechanizmus svorky bubna
      description: Určuje, ako sa svorka upevňuje/uťahuje k rúrke/obruči (napr. krídlová
        skrutka, skrutka s bubnovým kľúčom, rýchloupínanie).
    drum_clamp_mount_interface:
      name: Montážne rozhranie svorky bubna
      description: Určuje, aký typ uchytenia pre príslušenstvo svorka poskytuje (napr.
        prijímač L-tyče, guľový kĺb, náklon činelu).
    drum_clamp_type:
      name: Typ bubnovej svorky
      description: Špecifikuje štýl funkčnej svorky použitej v súprave montáže bubna
        (napr. obručová svorka vs. stojan/svorka rúrky).
    drum_head_application_batter_resonant:
      name: Použitie blany bubna (úderová/rezonančná)
      description: Určuje, pre ktorú stranu/rolu je blana na bubne určená (horná hracia
        plocha vs. spodná rezonančná/struníková strana).
    drum_head_collar_type:
      name: Typ objímky blany bubna
      description: Určuje, či má blana profil so štandardným okrajom, nízkym okrajom
        alebo špeciálnym okrajom, aby zodpovedal určitým hranám/korpusom bubna.
    drum_head_damping_control:
      name: Ovládanie tlmenia blany bubna
      description: Integrované funkcie kontroly alikvótnych tónov alebo typ tlmenia
        zahrnutý v dizajne blany.
    drum_head_film_material:
      name: Materiál fólie na blanu bubna
      description: Primárny materiál hlavovej fólie (spravidla PET/Mylar, ale môže
        obsahovať aj špeciálne materiály).
    drum_head_hoop_collar_type:
      name: Typ obruče/prstenca bubnovej blany
      description: Identifikuje konštrukciu obruče a prstenca bubnovej blany (napr.
        profil prstenca a materiál obruče), ktorá môže ovplyvniť uloženie a stabilitu
        ladenia na určitých plášťoch a ráfikoch.
    drum_head_hoop_rim_material:
      name: Materiál obruče blany bubna
      description: Materiál vnútornej obruče/rámu (vložená obruč vnútri blany), ktorý
        môže ovplyvniť odolnosť a stabilitu ladenia.
    drum_head_included:
      name: Bubnová blana súčasťou balenia
      description: Označuje, či sú súčasťou balenia bubnové blany a/alebo rezonančné
        blany.
    drum_head_muffling_feature:
      name: Funkcia tlmenia bubnovej blany
      description: Vstavané funkcie ovládania alikvótnych tónov integrované do blany
        bubna.
    drum_head_muffling_type:
      name: Typ tlmenia blany bubna
      description: Označuje, či blana bubna obsahuje zabudované prvky na ovládanie
        alikvótneho tónu/tlmenia.
    drum_head_ply_count:
      name: Počet vrstiev blany bubna
      description: Počet vrstiev fólie použitých pri konštrukcii blany (napr. 1-vrstvová,
        2-vrstvová).
    drum_head_position:
      name: Poloha bubnovej blany
      description: Označuje, či je blana bubna určená ako úderová (horná/nárazová),
        rezonančná (spodná), struníková blana (spodná), alebo či sa dá použiť oboma
        spôsobmi.
    drum_head_reinforcement_type:
      name: Typ výstuže blany bubna
      description: Určuje, či blana malého bubna obsahuje výstužné prvky, ako je stredová
        bodka alebo kontrolný krúžok, ktoré zvyšujú odolnosť a zosilňujú tón.
    drum_head_surface_finish:
      name: Úprava povrchu bubnovej blany
      description: Textúra/povrchová úprava hlavy, ktorá ovplyvňuje úder a reakciu
        metličky.
    drum_head_type:
      name: Typ bubnovej blany
      description: Určuje konštrukciu/typ blany použitej na bubne (primárne pre úderové/rezonančné
        blany podľa dodávky).
    drum_key_design_type:
      name: Typ konštrukcie kľúča na bubon
      description: Popisuje funkčné vyhotovenie ladiaceho kľúča bubna (napr. štandardný,
        račňový, rukoväť v tvare T).
    drum_key_drive_type:
      name: Typ pohonu kláves bubna
      description: Určuje štýl pohonu/rozhrania ladiaceho kľúča na bubon použitého
        na zapojenie napínacej tyče alebo montážneho kovania.
    drum_key_handle_style:
      name: Štýl rukoväti ladiaceho kľúča na bubon
      description: Opisuje štýl rukoväte/ergonomický štýl klávesu bicieho nástroja,
        ktorý ovplyvňuje pohodlie a pákový efekt počas ladenia.
    drum_kit_included_items:
      name: Položky, ktoré sú súčasťou súpravy bubna
      description: Uvádza, aké hlavné položky sú súčasťou súpravy bicích okrem korpusov/podložiek
        (napr. hardvér, činely, bubenícka stolička).
    drum_kit_portability:
      name: Prenosnosť súpravy bicích
      description: Označuje, či je súprava určená na kompaktné skladovanie/prepravu
        (napr. cestovná/kompaktná/skladacia).
    drum_kit_shell_construction_features:
      name: Vlastnosti konštrukcie korpusu súpravy bicích
      description: Spôsob konštrukcie korpusov (počet/typ vrstiev), ktorý ovplyvňuje
        tón a trvanlivosť.
    drum_mount_clamp_type:
      name: Typ bubnovej montážnej svorky
      description: Popisuje tvar svorky používaný na montážnych prvkoch pre bubny.
    drum_multi_clamp_clamp_type:
      name: Typ svorky s viacerými svorkami na bubon
      description: Funkčný štýl/konfigurácia multifunkčnej svorky (ako sa upína a
        čo spája).
    drum_mute_material:
      name: Materiál dusítka na bubon
      description: Určuje hlavný materiál tlmiča bubna, ktorý prichádza do styku s
        blanou a/alebo tlmí vibrácie.
    drum_pad_triggering_zones:
      name: Spúšťacie zóny bubnového padu
      description: Označuje počet/typ spúšťacích zón podporovaných tom padom (napr.
        iba blana vs. blana + obruč), čo ovplyvňuje výraznosť a kompatibilitu modulu.
    drum_pedal_accessories_included:
      name: Vrátane príslušenstva k bubeníckej šľapke
      description: Uvádza zoznam hlavného príslušenstva a komponentov dodávaných spolu
        s pedálom bicích.
    drum_pedal_baseplate_type:
      name: Typ základnej dosky pedálu bicích
      description: Uvádza, či pedál využíva základnú dosku alebo plávajúcu/bezrámovú
        konštrukciu.
    drum_pedal_bearing_type:
      name: Typ ložiska bubnového pedála
      description: Určuje mechanizmus ložiska použitý v primárnych otočných bodoch
        (napr. vahadlo, päta, vačka).
    drum_pedal_cam_type:
      name: Typ vačkového mechanizmu bubeníckej šľapky
      description: Určuje tvar/geometriu vačky bubnového pedála, ktorá ovplyvňuje
        jeho chod a odozvu (napr. lineárna vs. zrýchľujúca).
    drum_pedal_chain_configuration:
      name: Konfigurácia reťaze pedálu bicích
      description: Určuje usporiadanie reťaze používané bubnovým pedálom s reťazovým
        pohonom (napr. jednoduchá reťaz, dvojitá reťaz alebo posunutá reťaz).
    drum_pedal_chain_type:
      name: Typ reťaze bubeníckej šľapky
      description: Označuje typ reťaze použitej v pohone (napr. valčeková reťaz vs.
        reťaz bicyklového typu), čo ovplyvňuje plynulosť chodu a odolnosť.
    drum_pedal_clamp_type:
      name: Typ svorky na bubnový pedál
      description: Určuje spôsob upevnenia pedálu k obruči veľkého bubna.
    drum_pedal_intended_use:
      name: Zamýšľané použitie bubnového pedála
      description: Označuje primárny kontext hrania, pre ktorý je pedál s remeňovým
        pohonom určený/pre ktorý sa predáva.
    drum_pedal_spring_adjustment_method:
      name: Metóda nastavenia pružiny bubnového pedála
      description: Označuje, ako sa nastavuje napätie pružiny na pedáli.
    drum_pedal_spring_type:
      name: Typ pružiny bubeníckej šľapky
      description: Určuje pružinový mechanizmus použitý pre návrat pedálu.
    drum_shell_material:
      name: Materiál korpusu bubna
      description: Určuje primárny materiál konštrukcie korpusu akustických bicích
        (napr. javor, breza, akryl).
    drum_shell_wood_species:
      name: Druhy dreva korpusu bubna
      description: Označuje druh dreva použitý na korpus bubna,čo ovplyvňuje tón a
        rezonanciu.
    drumhead_type:
      name: Typ blany bubna
      description: Konfigurácia/typ blany použitej na bubne octoban.
    drumstick_model:
      name: Model bubeníckej paličky
      description: Štandardizované označenie modelu/veľkosti paličiek používané mnohými
        značkami (napr. 5A, 7A).
    drumstick_taper:
      name: Zúženie paličky
      description: Opisuje profil zužovania od tela po špičku, čo ovplyvňuje odskok
        a vyváženosť.
    drysuit_footwear_style:
      name: Štýl obuvi k suchému obleku
      description: Opisuje integrovanú úpravu dolnej časti nohavíc suchého obleku
        (napr. vstavané topánky, neoprénové ponožky, pančuchy alebo tesnenia pri členkoch).
    dumbbell_style:
      name: Typ činky
      description: Určuje základnú konštrukciu činky – či ide o pevný celok, nastaviteľný
        systém alebo model s nastaviteľnou záťažou – čo výrazne ovplyvňuje nákupné
        rozhodnutia a možnosti využitia pri cvičení.
    dundun_playing_position:
      name: Poloha hrania na dundun
      description: Určená pozícia bubna pri hraní alebo nosení.
    dye_status:
      name: Stav farbenia
      description: Označuje, či je plsť farbená, nefarbená/prírodná alebo obsahuje
        viacero farieb/zmesí.
    dye_style:
      name: Štýl farbenia
      description: Určuje, či je farba vlákna jednoliata, melírovaná alebo inak špeciálne
        farbená.
    dye_technique:
      name: Technika farbenia
      description: Metóda použitá na farbenie vlákna (napr. ručné farbenie, farbenie
        v kotli, sekčné farbenie).
    dye_type_needlecraft_fabric:
      name: Typ farbiva (látka na vyšívanie)
      description: Označuje, či je ľanová tkanina jednofarebná, ručne farbená alebo
        špeciálne farbená.
    dyeing_color_processing:
      name: Farbenie/spracovanie farieb
      description: Opisuje, či a ako bolo vlákno farbené (napr. nefarbené, bielené/biele
        alebo špecifické techniky farbenia).
    e_bike_certification_class:
      name: Certifikačná trieda pre elektrobicykle
      description: Určuje oficiálnu rýchlostnú kategóriu pneumatiky pre elektrické
        bicykle (napr. E-25, E-50).
    e_bike_speed_rating:
      name: Rýchlostný index pre elektrobicykel
      description: Uvádza oficiálnu úroveň certifikácie pneumatiky pre elektrobicykel
        (napr. E25 pre ≤25 km/h, E50 pre ≤50 km/h).
    e_scooter_connector_type:
      name: Typ konektora pre e-kolobežku
      description: Identifikuje typ elektrického konektora alebo zástrčky používanej
        komponentom na napájanie alebo pripojenie signálu.
    e_scooter_throttle_type:
      name: Typ akcelerátora elektrickej kolobežky
      description: Určuje typ obmedzenia používaného na ovládanie zrýchlenia na elektrickej
        kolobežke.
    ear_coverage:
      name: Krytie uší
      description: Určuje, či prilba obsahuje ochranu sluchu a či je odnímateľná.
    ear_coverage_style:
      name: Štýl zakrytia uší
      description: Opisuje, ako alebo či sú uši zakryté maskou proti hmyzu.
    ear_coverage_type:
      name: Typ krytia uší
      description: Určuje, ako klobúk zakrýva alebo chráni uši, vrátane prítomnosti
        a štýlu ušných klapiek.
    ear_guard_type:
      name: Typ chrániča sluchu
      description: Opisuje typ ochrany sluchu integrovanej do pokrývky hlavy, napríklad
        tvrdé plastové, polstrované alebo odnímateľné chrániče.
    earmuff_style:
      name: Chránič sluchu v štýle slúchadiel
      description: Určuje spôsob nosenia chráničov sluchu alebo ich konštrukčné vyhotovenie
        (napr. cez hlavu alebo okolo hlavy).
    earring_closure_type:
      name: Typ zapínania náušníc
      description: Určuje mechanizmus používaný na uchytenie náušnice na uchu (napr.
        zatláčacie zapínanie, klapkové zapínanie, náušnice na klipsy).
    easel_art_desk_features:
      name: Vlastnosti stojana na maliarske plátno a umeleckého pracovného stola
      description: Zvýrazňuje bežné funkčné vlastnosti, ktoré sú súčasťou stojana
        alebo umeleckého stola.
    easel_art_desk_surface_type:
      name: Typ povrchu maliarskeho stojana a stola na výtvarné umenie
      description: Identifikuje použiteľnú plochu (plochy) na kreslenie/písanie (napr.
        tabuľa, biela tabuľa, kotúč papiera, magnetická tabuľa).
    eb_clarinet_body_type:
      name: Typ tela Es klarinetu
      description: Určuje, či ide pri klarinete v Eb o sopránovú alebo altovú verziu.
    eco_material_type:
      name: Typ ekologického materiálu
      description: Zvýrazňuje ekologicky šetrnú penu alebo materiálovú technológiu
        použitú v podložke.
    edge_construction:
      name: Konštrukcia okraja
      description: Označuje, či lyža nemá kovovú hranu po celej svojej dĺžke, má ju
        po časti alebo po celej dĺžke.
    edge_tuner_type:
      name: Typ brúsky na hrany
      description: Klasifikuje typ nástroja na brúsenie hrán lyží alebo snowboardov,
        ako je napríklad ručné vedenie pilníka alebo elektrická brúska.
    edible_plant_part:
      name: Jedlá časť rastliny
      description: Označuje, ktorá časť rastliny sa predáva na konzumáciu.
    educational_guide_included:
      name: Zahŕňa vzdelávacieho sprievodcu
      description: Označuje, aké vzdelávacie materiály sú súčasťou modelu.
    educational_topic:
      name: Vzdelávacia téma
      description: Primárna vzdelávacia téma podporená vzdelávacím obsahom mravčej
        farmy.
    egg_component:
      name: Vaječná zložka
      description: Identifikuje, ktorú časť vajca produkt obsahuje, napríklad celé
        vajce, iba bielky, žĺtky alebo zmesi/náhrady.
    egg_component_replaced:
      name: Nahradená vaječná zložka
      description: Označuje, ktorú časť vajca má výrobok nahradiť (napr. celé vajce,
        vaječný bielok).
    egg_enrichment:
      name: Obohacovanie vajec
      description: Uvádza akékoľvek výživové obohatenie pridané do vajec, napríklad
        obohatenie o omega-3 mastné kyseliny alebo vitamín D.
    egg_farming_method:
      name: Spôsob chovu sliepok
      description: Určuje spôsob produkcie alebo chovu použitý pri vajciach (napr.
        z voľného chovu, voľný výbeh, bio/ekologický chov).
    egg_grade:
      name: Trieda vajec
      description: Označuje stupeň kvality pridelený regulačnými orgánmi alebo odvetvovými
        organizáciami.
    egg_processing_state:
      name: Stav spracovania vajec
      description: Označuje akékoľvek spracovanie vajec pred predajom (napr. čerstvé,
        solené, storočné vajce).
    egg_production_method:
      name: Metóda produkcie vajec
      description: Určuje systém chovu alebo ustajnenia použitý na produkciu vajec
        (napr. bezklietkový chov, chov na pastvinách, ekologický chov).
    egg_replacer_main_ingredient:
      name: Hlavná zložka náhrady vajec
      description: Uvádza hlavnú základnú zložku, z ktorej je náhrada vajec vyrobená,
        čo pomáha používateľom so špeciálnymi požiadavkami na stravovanie alebo tým,
        ktorí hľadajú konkrétne vlastnosti pri pečení.
    egg_size:
      name: Veľkosť vajíčka
      description: Triedi vajcia podľa štandardných trhových veľkostí.
    egg_source_animal:
      name: Zviera, z ktorého pochádzajú vajcia
      description: Určuje druh zvieraťa, z ktorého pochádzajú vajcia.
    egg_white_processing_method:
      name: Spôsob spracovania vaječného bielka
      description: Uvádza, akým spôsobom boli bielka po získaní spracované (napr.
        pasterizované, sušené rozprašovaním), čo má vplyv na bezpečnosť potravín,
        trvanlivosť a možnosti použitia.
    eggplant_variety:
      name: Odroda baklažánu
      description: Špecifikuje kultivar alebo trhovú odrodu baklažánu, čo umožňuje
        nakupujúcemu vybrať si druhy, ktoré sa líšia veľkosťou, chuťou, farbou a kulinárskym
        využitím.
    eggshell_color:
      name: Farba vaječnej škrupiny
      description: Určuje prevládajúcu farbu škrupiny vajec.
    elastic_edge_finish_type:
      name: Povrchová úprava/typ okraja gumičky
      description: Určuje konštrukciu okrajov tkaného pružného materiálu, ktorá ovplyvňuje
        pohodlie a možnosti použitia.
    elastic_intended_use:
      name: Elastické zamýšľané použitie
      description: Primárna aplikácia, pre ktorú je gumička určená (pomáha objavovaniu
        a znižuje nesúlad).
    elastic_recovery_performance:
      name: Miera elastického zotavenia
      description: Opisuje, ako dobre sa elastická tkanina po natiahnutí vracia do
        pôvodnej dĺžky.
    elastic_recovery_quality:
      name: Kvalita elastického zotavenia
      description: Označuje zotavenie elastického materiálu z natiahnutia – ako dobre
        sa po natiahnutí vracia do pôvodnej dĺžky.
    elastic_stretch_level:
      name: Úroveň elastického natiahnutia
      description: O koľko sa elastický prvok môže natiahnuť pod napätím (často sa
        vyjadruje ako relatívne úrovne, ak nie je uvedené presné percento).
    elastic_structure:
      name: Elastická štruktúra
      description: Určuje štrukturálnu konštrukciu gumičky na gombíkové dierky (napr.
        pletená, tkaná, spletená), ktorá môže ovplyvniť roztiahnutie, stiahnutie a
        spracovanie pri šití.
    elastic_type:
      name: Elastický typ
      description: Určuje typ konštrukcie gumičky (napr. prekladaná elastická guma
        (FOE), spletaná, pletená, tkaná).
    electric_assist_type:
      name: Typ elektrickej asistencie
      description: Uvádza, či je bicykel vybavený motorom a aký typ podpory poskytuje.
    electric_bicycle_motor_position:
      name: Poloha motora elektrického bicykla
      description: Umiestnenie hnacieho motora na elektrickom bicykli, napríklad stredový
        pohon, predná nábojová jednotka, zadná nábojová jednotka alebo dvojitá nábojová
        jednotka.
    electric_bike_class:
      name: Trieda elektrických bicyklov
      description: Kategorizuje elektrobicykle podľa regulačných tried, ktoré definujú
        rýchlostné limity a asistenčné funkcie pri akcelerácii.
    electric_guitar_bridge_type:
      name: Typ kobylky elektrickej gitary
      description: Určuje typ systému kobylky/vibrato na elektrickej gitare.
    electric_instrument_output_connection_type:
      name: Typ výstupného konektora elektrického nástroja
      description: Určuje fyzické zvukové výstupné pripojenie (pripojenia) na elektrickom
        violončele.
    electric_riding_vehicle_control_options:
      name: Možnosti ovládania elektrického jazdného vozidla
      description: Možnosti ovládania, ktoré má k dispozícii jazdec/rodič (napr. pedál,
        volant, diaľkové ovládanie).
    electric_spinning_wheel_speed_control_type:
      name: Typ regulácie otáčok elektrického rotačného kolesa
      description: Opisuje, ako používateľ nastavuje rýchlosť otáčania na elektrickom
        kolese.
    electric_ukulele_output_jack_type:
      name: Typ výstupnej zdierky elektrického ukulele
      description: Určuje fyzický výstupný konektor používaný elektrickým ukulele.
    electric_van_body_length_class:
      name: Trieda dĺžky karosérie elektrickej dodávky
      description: Bežne používaná veľkostná trieda dodávok podľa rázvoru/dĺžky v
        inzerátoch
    electric_van_roof_height_class:
      name: Výšková trieda strechy elektrickej dodávky
      description: Bežná klasifikácia výšky strechy používaná pri dodávkach (najmä
        nákladných dodávkach).
    electric_vehicle_drivetrain_layout:
      name: Rozloženie hnacieho ústrojenstva elektrického vozidla
      description: Konfigurácia motora/nápravy, ktorá popisuje, koľko motorov a kde
        sú umiestnené (nad rámec jednoduchého pohonu všetkých kolies/predných kolies/zadných
        kolies).
    electric_winder_accessories_included:
      name: Súčasťou balenia je príslušenstvo k elektrickému navíjaču
      description: Uvádza príslušenstvo dodávané s elektrickým navijakom (napr. svorky,
        adaptéry).
    electrical_connector_type:
      name: Typ elektrického konektora
      description: Určuje typ konektora používaný systémom zámku/uzamykania dverí
        pre elektrickú integráciu (ak je to relevantné).
    electrical_system_voltage:
      name: Napätie v elektrickom systéme
      description: Označuje menovité napätie elektrického systému vozidla, pre ktoré
        je regulátor určený.
    electronic_cymbal_trigger_zones:
      name: Spúšťacie zóny elektronický činelov
      description: Určuje, koľko nezávislých aktivačných zón ponúka plocha činelu
        (napr. stred/okraj/zvon).
    electronic_drum_module_audio_interface_functionality:
      name: Funkcie zvukového rozhrania modulu elektrických bicích
      description: Označuje, či modul môže fungovať ako USB zvukové rozhranie na nahrávanie/prehrávanie
        (okrem MIDI).
    electronic_drum_module_metronome_features:
      name: Funkcie metronómu modulu elektronických bicích
      description: Určuje integrované možnosti na cvičenie/metronóm.
    electronic_drum_module_power_source:
      name: Zdroj napájania pre modul elektronických bicích
      description: Určuje požadovaný alebo podporovaný zdroj napájania pre riadiaci
        modul.
    electronic_drum_module_sample_import_support:
      name: Podpora importu vzoriek do modulu elektrických bicích
      description: Uvádza, či modul dokáže importovať používateľské vzorky a akou
        metódou.
    electronic_drum_pad_playing_surface_type:
      name: Typ hracieho povrchu údernej plochy elektronického bubna
      description: Opisuje konštrukciu hracej plochy tom padu (napr. sieťovaná blana
        verzus guma), čo ovplyvňuje odrážanie, hluk a pocit.
    electronic_features:
      name: Elektronické funkcie
      description: Označuje elektronické/interaktívne prvky zahrnuté v hračkárskom
        bankovom produkte (ak existujú).
    electronic_lights_and_sound:
      name: Elektronické svetlá a zvuk
      description: Označuje, či hracia súprava s domčekom pre bábiky obsahuje elektronické
        svetlá a/alebo zvukové prvky (napr. svetlá, zvonček, hudba, zvukové efekty).
    electronics_power_source:
      name: Zdroj napájania elektroniky
      description: Určuje spôsob napájania aktívnej elektroniky (ak je to relevantné).
    eligible_race_series:
      name: Séria pretekov, ktorá spĺňa podmienky
      description: Pretekárska séria alebo riadiaca organizácia, pre ktorú je vozidlo
        oprávnené súťažiť.
    elliptical_trainer_part_type:
      name: Typ dielu eliptického trenažéra
      description: Klasifikuje konkrétny druh príslušenstva alebo náhradného dielu
        pre eliptický trenažér (napr. remeň, konzola, pedál), aby si nakupujúci mohli
        rýchlo vyfiltrovať položku, ktorú potrebujú, bez toho, aby museli prechádzať
        mnohými mikrokategóriami.
    embellishment_technique:
      name: Technika zdobenia
      description: Popisuje hlavné ozdobné prvky alebo povrchovú úpravu odevu, ako
        sú výšivky, potlač alebo ozdobné koráliky.
    embellishment_type:
      name: Typ ozdoby
      description: Určuje typ ozdobného prvku použitého na podväzku, napríklad čipku,
        mašle alebo perly.
    embossing_pen_ink_color:
      name: Farba atramentu reliéfneho pera
      description: Určuje farbu atramentu naneseného embosovacím perom (môže byť číry/lepkavý
        alebo pigmentovaný). Odlišné od farby pera/suda.
    embossing_stylus_tip_shape:
      name: Tvar hrotu reliéfneho stylusu
      description: Opisuje geometriu reliéfneho hrotu používaného na vytvorenie rôznych
        efektov (napr. guľový vs. špicatý).
    embroidered_coverage_level:
      name: Rozsah pokrytia výšivkou
      description: Približná plocha pokrytia výšivkovou niťou na povrchu nášivky.
    embroidered_patch_backing_type:
      name: Typ podkladovej vrstvy vyšívanej nášivky
      description: Podkladová vrstva na zadnej strane vyšívanej nášivky, ktorá ovplyvňuje
        jej životnosť a spôsob aplikácie.
    embroidery_hoop_type:
      name: Typ vyšívacieho rámu
      description: Určuje konštrukčný štýl vyšívacieho rámu a jeho primárny napínací
        mechanizmus.
    embroidery_machine_bobbin_type:
      name: Typ cievky vyšívacieho stroja
      description: Typ/spôsob vkladania cievkového systému.
    emergency_lighting_configuration:
      name: Konfigurácia núdzového osvetlenia
      description: Určuje konfiguráciu primárneho nainštalovaného núdzového výstražného
        osvetlenia na vozidle (napr. strešná svetelná rampa, svetlá v mriežke).
    emergency_lighting_package:
      name: Balík núdzového osvetlenia
      description: Určuje typy nainštalovaných núdzových výstražných svetiel.
    emissions_compliance_standard:
      name: Zhoda s emisnými normami
      description: V prípade potreby uvádza certifikáciu emisií alebo súlad s emisnými
        normami pre daný motor.
    emissions_standard:
      name: Emisná norma
      description: Zhoda s emisnými normami pre vozidlo (líši sa v závislosti od regiónu
        a roka).
    enclosure_panel_configuration:
      name: Konfigurácia krycieho panela
      description: Určuje, ktoré panely alebo strany krytu sú zahrnuté (konfigurácia
        pokrytia), napríklad plný kryt, iba bočné závesy alebo 3-stranný (otvorený
        spredu/zozadu).
    enclosure_window_material:
      name: Materiál okienka krytu
      description: Identifikuje materiál použitý na priehľadné okenné panely krytu.
    end_fitting_type:
      name: Typ koncového kovania
      description: Typ konektora použitý na každom konci vzpery (na strane vozidla
        a na strane veka), ktorý určuje kompatibilitu montáže.
    end_type:
      name: Typ ukončenia
      description: Určuje typ ukončenia/upevnenia na koncoch ťažného popruhu na pripojenie
        k ťažným bodom.
    ends_style_blocking_wires:
      name: Typ zakončenia (blokovacie drôty)
      description: Spôsob úpravy koncov blokovacieho drôtu pre bezpečné používanie
        a jednoduché prevliekanie cez okraje čipky.
    enduro_bike_suspension_adjustability:
      name: Nastaviteľnosť odpruženia enduro bicykla
      description: Označuje, ktoré nastavenia odpruženia sú k dispozícii (zvyčajne
        pre prednú vidlicu a zadný tlmič).
    engine_bay_mounting_location:
      name: Miesto montáže v motorovom priestore
      description: Umiestnenie expanznej nádržky v motorovom priestore (relatívna
        poloha).
    engine_bearing_coating:
      name: Povlak ložísk motora
      description: Určuje prípadný povrchový náter na ložisku (z hľadiska odolnosti
        proti opotrebeniu, schopnosti integrácie, zníženia trenia).
    engine_bearing_position:
      name: Poloha ložiska motora
      description: Určuje umiestnenie/funkciu ložiska v motore.
    engine_bearing_size:
      name: Veľkosť ložiska motora
      description: Určuje, či ide o štandardnú veľkosť ložiska alebo variant s menším/väčším
        rozmerom (bežne sa spája s brúsením kľukového hriadeľa a vôľami ).
    engine_configuration:
      name: Konfigurácia motora
      description: Opisuje usporiadanie/konfiguráciu valcov motora (napr. radový,
        do tvaru písmena V, boxer).
    engine_cooling_type:
      name: Typ chladenia motora
      description: Určuje spôsob chladenia motora.
    engine_degreaser_form:
      name: Forma odmasťovača motora
      description: Fyzický formát/forma doručenia odmasťovača motora.
    engine_degreaser_rinse_requirement:
      name: Požiadavky na spláchnutie odmasťovača motora
      description: Či je odmasťovač určený na opláchnutie vodou po aplikácii.
    engine_mount_type:
      name: Typ uchytenia motora
      description: Určuje funkčnú konštrukciu uloženia motora (napr. hydraulické,
        pevné, so vzperou hnacej nápravy).
    engine_oil_formulation:
      name: Zloženie motorového oleja
      description: Určuje zameranie zloženia motorového oleja, napríklad pre štandardné
        použitie, úpravu na vyšší počet najazdených kilometrov, predĺžené výmenné
        intervaly alebo pre flotilové a ťažké nasadenie.
    engine_oil_specification:
      name: Špecifikácia motorového oleja
      description: Špecifikácia/norma, ktorú olej spĺňa (napr. API SP, API SN Shopify
        Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Obsah súpravy na generálnu opravu motora
      description: Určuje, ktoré hlavné komponenty sú zahrnuté v súprave na generálnu
        opravu motora.
    engine_rotation_direction:
      name: Smer otáčania motora
      description: Určuje smer otáčania motora používaný pri námorných použitiach.
    engine_timing_system_drive_type:
      name: Typ pohonu rozvodového mechanizmu motora
      description: Uvádza, či je rozvodový systém motora poháňaný remeňom, reťazou
        alebo ozubenými kolesami, na účely overenia kompatibility.
    engine_valve_coating:
      name: Povlak ventilov motora
      description: Určuje akúkoľvek povrchovú úpravu alebo náter použitý na ventile
        na zvýšenie odolnosti proti opotrebovaniu a teplu.
    engine_valve_position:
      name: Poloha ventilu motora
      description: Určuje, či je ventil motora určený pre nasávaciu alebo výfukovú
        stranu motora.
    engine_valve_stem_tip_type:
      name: Typ špičky drieku ventilu motora
      description: Určuje štýl alebo konštrukciu hrotu drieku ventilu v bode kontaktu
        s vahadlom alebo nastavovačom.
    engine_valvetrain_type:
      name: Typ ventilového rozvodu motora
      description: Usporiadanie ventilového rozvodu a vačkového hriadeľa.
    enhancement_level:
      name: Úroveň vylepšenia
      description: 'Približné zväčšenie objemu pomocou vložky, vyjadrené vo veľkostiach
        košíkov: jemné (do 1 košíka), stredné (1–2 košíky), výrazné (viac ako 2 košíky).'
    entry_zipper_location:
      name: Umiestnenie vstupného zipsu
      description: Určuje, kde sa nachádza primárny vstupný zips alebo otvor na obleku
        (napr. vpredu, vzadu, na ramene, diagonálne).
    epee_point_type:
      name: Typ hrotu kordu
      description: Určuje značku alebo štandard hrotu nainštalovaného na čepeli, čo
        ovplyvňuje kompatibilitu a údržbu.
    equestrian_discipline:
      name: Jazdecká disciplína
      description: Určuje jazdeckú disciplínu, pre ktorú je ostroha určená alebo najvhodnejšia.
    equestrian_helmet_safety_certification:
      name: Certifikácia bezpečnosti jazdeckej prilby
      description: Špecifikuje bezpečnostnú normu (normy) alebo certifikácie, ktoré
        prilba spĺňa.
    equine_application_area:
      name: Oblasť použitia pri chove koní
      description: Určuje časť tela alebo materiál, pre ktorý je výrobok určený (napr.
        kopyto, hriva, jazdecký výstroj).
    equipment_contact_material_brew_wine:
      name: Materiál, ktorý prichádza do styku s nápojmi (pivo/víno)
      description: Primárny materiál položky, ktorá prichádza do kontaktu s kvapalinou
        (napr. sklo, nehrdzavejúca oceľ, plast).
    eu_children_clothing_size:
      name: EÚ veľkosti detského oblečenia
      description: Určuje veľkosť detského oblečenia v EÚ podľa výšky, napríklad 104
        alebo 140
    eu_clothing_size:
      name: Veľkosť oblečenia používaná v EÚ,
      description: Uvádza veľkosť oblečenia používanú v EÚ, ako napr. 38 alebo 46
    eu_cup_size:
      name: Veľkosť košíka v EÚ
      description: Určuje veľkosť košíkov podprsenky v EÚ, napríklad C alebo E
    eu_ring_size:
      name: Veľkosť prsteňa EÚ
      description: Určuje veľkosť prsteňa v EÚ podľa obvodu, napríklad 52 alebo 63
    eu_shoe_size:
      name: Veľkosť topánok v EÚ
      description: Určuje veľkosť topánok podľa normy EÚ, napríklad 42 alebo 42 Wide
    euphonium_included_accessories:
      name: Príslušenstvo dodávané s eufóniom
      description: Uvádza položky bežne dodávané spolu s eufóniom (napr. náustok,
        puzdro).
    euphonium_valve_configuration:
      name: Konfigurácia ventilu eufónia
      description: Určuje počet ventilov a to, či sa 4. ventil ovláda ručne alebo
        pomocou bočného mechanizmu.
    european_sword_historical_period:
      name: Európske historické obdobie meča
      description: Hlavné historické obdobie, z ktorého vychádza vzor/replika meča
        (alebo obdobie pôvodného meča).
    european_sword_pattern_type:
      name: Európsky vzor/typ meča
      description: Špecifický európsky vzor/typ (typológia) meča reprezentovaný zberateľským
        mečom.
    ev_connector_adapter_direction:
      name: Smer konektora/adaptéra pre elektromobily
      description: Určuje, Z čoho a NA čo adaptér prevádza (strana vstupu vozidla
        vs. strana nabíjačky/kábla), čo umožňuje presné filtrovanie kompatibility.
    ev_conversion_kit_completeness_level:
      name: Úroveň kompletnosti súpravy na konverziu na elektrický pohon
      description: Označuje, či je produkt úplnou konverznou súpravou alebo čiastočnou
        súpravou/balíkom (napr. iba motor+ovládač).
    ev_conversion_kit_drivetrain_configuration:
      name: Konfigurácia pohonu súpravy na konverziu na elektromobil
      description: Určuje konštrukciu hnacieho ústrojenstva súpravy na konverziu na
        elektrický pohon, vrátane umiestnenia motora a usporiadania pohonu, ako aj
        to, či sa zachováva existujúca prevodovka.
    ev_conversion_kit_voltage_class:
      name: Napäťová trieda súpravy na konverziu na elektromobil
      description: Nominálna napäťová trieda systému, pre ktorú je súprava na konverziu
        elektromobilu navrhnutá. Použite to na filtrovanie podľa bežných tried napätia
        systému okrem presného merania napätia.
    evaporator_core_type:
      name: Typ jadra výparníka
      description: Určuje konštrukčný dizajn jadra výparníka automobilovej klimatizácie.
    evenweave_fabric_finish_treatment:
      name: Povrchová úprava/ošetrenie režnej látky
      description: Označuje akúkoľvek predbežnú úpravu alebo variant aplikovaný na
        látku, ktorý ovplyvňuje manipuláciu alebo vzhľad.
    evenweave_fabric_package_format:
      name: Formát balenia rovnomerne tkanej látky Evenweave
      description: Ako sa látka predáva (nastrihaný kus verzus súvislý kus na yard/meter).
    exercise_bike_accessory_part_type:
      name: Typ príslušenstva/časti rotopédu
      description: Opisuje hlavnú funkciu alebo typ komponentu danej položky (napr.
        pedál, hnací remeň, držiak na fľašu, kryt displeja, kľuka).
    exercise_bike_cushion_component:
      name: Komponent podušky na rotopéd
      description: Určuje dodávaný komponent súvisiaci so sedadlom, napríklad sedací
        vankúš, sedadlo alebo poťah sedadla.
    exercise_bike_metrics_tracked:
      name: Sledované ukazovatele na stacionárnom bicykli
      description: Zoznam polí s údajmi o tréningu, ktoré dokáže počítač merať a zobrazovať
        v reálnom čase.
    exercise_mat_accessories_included:
      name: Pribalené príslušenstvo k podložke na cvičenie
      description: Uvádza ďalšie komponenty dodávané spolu s podložkou, ako sú popruhy
        alebo chrániče kolien.
    exhaust_cooling_type:
      name: Typ chladenia výfuku
      description: Uvádza, či je výfukový komponent určený pre systémy s mokrým výfukom
        (vodou chladené/so vstrekovaním vody) alebo pre systémy so suchým výfukom.
    exhaust_installation_position:
      name: Montážna poloha výfuku
      description: Označuje, kde na vozidle je diel namontovaný.
    exhaust_outlet_configuration:
      name: Konfigurácia výfukového otvoru
      description: Určuje rozloženie výstupu výfukového potrubia v zadnej časti vozidla.
    expansion_tank_cap_connection_type:
      name: Typ pripojenia uzáveru expanznej nádržky
      description: Mechanický spôsob pripojenia a utesnenia uzáveru k hrdlu expanznej
        nádržky.
    expansion_tank_cap_pressure_relief_feature:
      name: Funkcia na zníženie tlaku v uzávere expanznej nádržky
      description: Či a ako uzáver zabezpečuje funkciu uvoľnenia tlaku/vákua.
    expansion_tank_cap_seal_material:
      name: Materiál tesnenia uzáveru expanznej nádrže
      description: Materiál tesnenia, ktoré prichádza do styku s hrdlom vyrovnávacej
        nádrže.
    extension_attachment_method:
      name: Spôsob pripevnenia predĺženia
      description: Označuje, ako sa predĺženie pripevňuje ku kokpitu/riadidlám bicykla,
        čo pomáha jazdcom overiť kompatibilitu s ich existujúcim nastavením.
    extension_bend_type:
      name: Typ predĺženého ohybu
      description: Opisuje geometrický štýl alebo ohyb predĺženia riadidiel, ktorý
        ovplyvňuje ergonómiu a aerodynamiku jazdca.
    extension_mechanism:
      name: Mechanizmus predĺženia
      description: Opisuje metódu, ktorú stôl používa na zväčšenie svojej dĺžky alebo
        plochy povrchu, ak je to relevantné.
    extension_table_features:
      name: Funkcie vysunovacieho stola
      description: Zvýrazňuje funkčné vlastnosti špecifické pre predlžovacie stoly
        šijacích strojov.
    eyelet_grommet_installation_method:
      name: Spôsob osadenia očiek a priechodiek
      description: Určuje, ako je očko/priechodka osadené/upevnené v materiáli.
    eyewear_lens_shape:
      name: Tvar šošoviek okuliarov
      description: Označuje geometrický tvar šošovky, napríklad cylindrické alebo
        sférické, čo ovplyvňuje zorné pole, skreslenie a štýl.
    eyewear_strap_material:
      name: Materiál remienka okuliarového rámu
      description: Určuje materiál nastaviteľného popruhu, ktorý upevňuje ochranné
        okuliare alebo okuliare k hlave používateľa.
    fabric_backing_type:
      name: Typ podkladovej látky
      description: Určuje, či potlačiteľná bavlna obsahuje stabilizačný papierový
        podklad (a aký typ), ktorý umožňuje jej podávanie cez bežné tlačiarne.
    fabric_cut_format:
      name: Formát strihu látky
      description: Určuje strih/formát plátna na vyšívanie.
    fabric_end_use:
      name: Konečné použitie látky
      description: Určuje primárne zamýšľané použitie látky (na čo sa najlepšie použije).
    fabric_finish:
      name: Povrchová úprava látky
      description: Povrchová úprava hodvábnej tkaniny, ktorá ovplyvňuje lesk, pocit
        na dotyk a vlastnosti.
    fabric_intended_use:
      name: Určené použitie tkaniny
      description: Primárne odporúčané použitia/projekty pre ľanové tkaniny.
    fabric_opacity_level:
      name: Stupeň nepriehľadnosti látky
      description: Označuje priehľadnosť látky, čo ovplyvňuje potreby vrstvenia a
        podšívky.
    fabric_patch_shape:
      name: Tvar látkovej záplaty
      description: Opisuje tvar záplat zahrnutých do súpravy.
    fabric_repair_kit_application_method:
      name: Spôsob použitia súpravy na opravu tkanín
      description: Určuje, ako sa oprava aplikuje na látku (napr. nažehľovaním, našívaním,
        lepením).
    fabric_repair_kit_components_included:
      name: Súčasťou sú komponenty súpravy na opravu tkaniny
      description: Uvádza konkrétne komponenty obsiahnuté v súprave (napr. záplaty,
        niť, ihla, lepidlo).
    fabric_repair_kit_intended_use:
      name: Účel použitia súpravy na opravu tkanín
      description: Určuje bežnú opravnú úlohu, na ktorú je súprava určená (napr. trhliny,
        diery, lemovanie).
    fabric_selling_format:
      name: Formát predaja tkanín
      description: Určuje, ako sa látka predáva (súvislá dĺžka, vopred narezaný kus,
        kotúč/rolka alebo vzorka).
    fabric_stretch_level:
      name: Stupeň pružnosti tkaniny
      description: Opisuje stupeň roztiahnutia/elasticity látky, čo pomáha nakupujúcim
        vybrať vhodné látky pre priliehavé odevy alebo štruktúrované projekty.
    fabric_stretch_type:
      name: Typ pružnosti tkaniny
      description: Uvádza pružnosť materiálu plaviek, ktorá je dôležitá pre voľnosť
        pohybu pri surfovaní alebo plávaní.
    fabric_texture:
      name: Textúra látky
      description: Popisuje povrchovú štruktúru alebo úpletovú štruktúru látky použitej
        na výrobu tohto domáceho topu.
    fabric_use_case:
      name: Prípad použitia tkaniny
      description: Hlavné určenie saténovej látky (kus/metráž).
    fabric_weight_class:
      name: Trieda gramáže tkaniny
      description: Kategorizuje flanel podľa typických pásiem úžitkovej hmotnosti,
        čo nakupujúcim pomáha filtrovať bez znalosti presného GSM/oz.
    face_mask_material:
      name: Materiál pleťovej masky
      description: Materiálové zloženie tvárovej masky, ktorá je súčasťou prilby alebo
        je s ňou kompatibilná.
    face_mask_style:
      name: Štýl pleťovej masky
      description: Definuje celkový tvar alebo konštrukčný štýl módneho rúška na tvár
        a pomáha nakupujúcim nájsť si preferovaný strih a estetiku.
    face_mask_style_code:
      name: Kód štýlu rúška na tvár
      description: Definuje typ konštrukčného rámu alebo kategóriu priemyselného kódu
        tvárovej masky (napr. ROPO, OPO, RJOP).
    face_protection_type:
      name: Typ ochrany tváre
      description: Označuje typ ochrany tváre. dodávaný s prilbou alebo do nej zabudovaný,
        napríklad klietky alebo priezory.
    faceplate_security_features:
      name: Bezpečnostné prvky čelného panelu
      description: Zahŕňa bezpečnostné prvky proti krádeži a prístupové funkcie súvisiace
        s čelným panelom nad rámec základného dizajnu.
    facing_length:
      name: Dĺžka čelnej plochy
      description: Určuje dĺžku nábehu (dĺžku krivky) náustku, ktorá ovplyvňuje odozvu
        a výber plátku.
    fan_shroud_type:
      name: Typ krytu ventilátora
      description: Určuje štýl pokrytia/geometrie krytu ventilátora (napr. plný vs.
        polovičný vs. kruhový).
    farming_method:
      name: Metóda pestovania
      description: Zdôrazňuje dobré životné podmienky zvierat alebo chovateľské postupy
        používané pri chove zvierat, ako napríklad voľný výbeh alebo ekologický chov.
    farming_practice:
      name: Poľnohospodárska prax
      description: Identifikuje primárnu metódu pestovania použitú pri produkte (napr.
        konvenčná, organická, hydroponická).
    fascinator_style:
      name: Štýl fascinátora
      description: Opisuje konštrukčný dizajn alebo tvar fascinátora, čo nakupujúcim
        umožňuje rýchlo filtrovať podľa populárnych módnych štýlov.
    fastener_grade:
      name: Trieda spojovacieho prvku
      description: Uvádza triedu pevnosti skrutky, napríklad trieda 8 alebo trieda
        10.9, ktorá určuje nosnosť.
    fat_rendering_state:
      name: Stav vyškvarenia tuku
      description: Určuje, či je tuk vyškvarený, nevyškvarený (surový) alebo čiastočne
        vyškvarený, čo ovplyvňuje životnosť a kulinárske využitie.
    fat_source:
      name: Zdroj tuku
      description: Určuje hlavný zdroj tuku použitý na výrobu masla, ghí alebo margarínu
        (živočíšny alebo rastlinný), čo podporuje filtrovanie podľa alergií a stravovacích
        obmedzení.
    faucet_hole_configuration:
      name: Rozloženie otvorov pre batérie
      description: Uvádza počet a umiestnenie predvŕtaných otvorov pre batérie na
        doske umývadla.
    feather_application:
      name: Použitie peria
      description: Primárne zamýšľané použitie alebo aplikácia morčacieho peria na
        výrobu alebo zhotovovanie.
    feather_attachment_format:
      name: Upevnenie/formát peria
      description: Ako sa umelé perie pripravuje/predáva na použitie (voľne, na šnúrke,
        na páske atď.).
    feather_coloration_style:
      name: Štýl sfarbenia peria
      description: Opisuje, ako sa farba nanáša/vyzerá na perí (napr. jednoliata,
        sfarbenie na koncoch, s farebným prechodom), nezávisle od hodnoty základnej
        farby.
    feather_component:
      name: Perová zložka
      description: Určuje, ktorá časť/ktorý štýl pávieho peria sa predáva (napr. očko
        alebo chvostové perie).
    feather_curvature:
      name: Zakrivenie peria
      description: Celkový tvar/profil zakrivenia peria.
    feather_finish:
      name: Úprava peria
      description: Označuje, či sú pštrosie peria prírodné alebo boli spracované (napr.
        farbené alebo bielené) na dekoratívne účely.
    feather_form:
      name: Tvar peria
      description: Určuje fyzickú podobu predávaných kusov husacieho peria.
    feather_grade:
      name: Trieda peria
      description: Celková kvalita/výberová trieda peria na ozdobné verzus výstavné
        účely.
    feather_part:
      name: Časť s perím
      description: Časť/štruktúra predávaného morčacieho peria (bežné v zoznamoch
        remesiel a viazania mušiek).
    feather_processing_type:
      name: Spôsob spracovania peria
      description: Ako bolo perie spracované/upravené na ozdobné použitie (napr. farbené,
        bielené, prírodné/nefarbené).
    feather_product_form:
      name: Forma produktu z peria
      description: Fyzická forma/strih produktu z peria v predaji (napr. voľné perie
        verzus boa verzus strapce).
    feather_quantity_unit:
      name: Jednotka množstva peria
      description: Definuje, ako sa produkt predáva (napr. po kusoch, podľa hmotnosti,
        po zväzkoch), aby sa podporilo presné porovnanie v rámci zoznamov.
    feather_source:
      name: Zdroj peria
      description: Určuje, z akého zvieraťa pochádza perie použité v košíkoch.
    feather_stiffness:
      name: Tuhosť peria
      description: Relatívna tuhosť/rigidita ostňov/štruktúry peria.
    feed_mechanism:
      name: Podávací mechanizmus
      description: Označuje, ako sa loptičky podávajú do nadhadzovacieho stroja.
    feed_purpose:
      name: Účel krmiva
      description: Opisuje primárny nutričný alebo funkčný cieľ krmiva alebo doplnku.
    feeder_mechanism_type:
      name: Typ podávacieho mechanizmu
      description: Označuje dávkovací mechanizmus, ktorý podávač používa na uvoľňovanie
        krmiva.
    feijoa_cultivar:
      name: Kultivar fejchoa
      description: Označuje konkrétny kultivar alebo odrodu fejchoa, keďže rôzne kultivary
        ponúkajú odlišné chute, veľkosť a čas zberu.
    felt_duty:
      name: Účel použitia plsti
      description: Určuje klasifikáciu plsti tenisovej loptičky (napr. na extra tvrdé
        povrchy, bežné/ mäkké povrchy), čo ovplyvňuje jej životnosť na rôznych povrchoch.
    felting_mold_intended_use:
      name: Určené použitie plstiacej formy
      description: Na čo je forma určená alebo na aké účely sa používa pri projektoch
        s plsťou.
    felting_pad_surface_material:
      name: Materiál povrchu plstiacej podložky
      description: Materiál použitý na pracovnej ploche plstenej podložky/rohože,
        ktorá prichádza do kontaktu s vláknom/ihlou.
    fencing_certification:
      name: Certifikácia v šerme
      description: Uvádza oficiálne schválenia riadiacich orgánov, ktoré šermiarska
        zbraň spĺňa (napr. FIE, USFA), čím určuje jej legálnosť pre súťaže a kvalitatívne
        štandardy.
    fencing_connector_type:
      name: Typ konektora oplotenia
      description: Určuje konfiguráciu konektora používanú na pripojenie šermiarskych
        káblov, zásuviek alebo navijakov (napr. 2-kolíkový, 3-kolíkový, bajonetový),
        čím zabezpečuje kompatibilitu komponentov.
    fencing_discipline:
      name: Šermiarska disciplína
      description: Určuje šermiarsku zbraň alebo disciplínu, pre ktorú je produkt
        určený alebo s ktorou je kompatibilný.
    fencing_weapon_type:
      name: Typ šermiarskej zbrane
      description: Určuje štýl šermiarskej alebo cvičnej zbrane, s ktorým je tréningová
        pomôcka kompatibilná alebo ktorý predstavuje, a pomáha používateľom nájsť
        vhodné vybavenie.
    fender_finish_state:
      name: Stav povrchovej úpravy blatníka
      description: Uvádza stav povrchu/úpravy blatníka v dodanom stave z hľadiska
        pripravenosti na lakovanie a montáž.
    fender_pieces_included:
      name: Vrátane súčastí značky Fender
      description: Uvádza zoznam komponentov dodávaných s produktom, aby sa objasnilo,
        či ide o jeden blatník alebo kompletnú súpravu s príslušenstvom.
    fender_type:
      name: Typ blatníka
      description: Klasifikuje celkový dizajn alebo štýl blatníka.
    fennel_trimming:
      name: Orezávanie feniklu
      description: Označuje, ktoré časti rastliny sú súčasťou cibule feniklu (napr.
        s listami, odrezaným vrchom a koreňom).
    fennel_variety:
      name: Odroda feniklu
      description: Určuje kultivar alebo na trhu ponúkanú odrodu predávaných feniklových
        cibuliek.
    fermentation_application:
      name: Použitie fermentácie
      description: Určuje hlavnú potravinu alebo nápoj, na ktorého fermentáciu je
        kultúra určená (napr. syr, jogurt, mliečny kefír, kvások).
    fermentation_method:
      name: Spôsob fermentácie
      description: Uvádza, ako bola sójová omáčka vyrobená alebo fermentovaná (napr.
        prirodzene varená, chemicky hydrolyzovaná).
    fermentation_vessel_material:
      name: Materiál fermentačnej nádoby
      description: Primárny materiál fermentačnej nádoby, ktorá je súčasťou súpravy
        (ak existuje).
    ferrule_material:
      name: Materiál feruly
      description: Určuje materiál použitý na objímku drieku (napr. Juma, fenolická
        živica, polykarbonát, XTC alebo žiaden), ktorý ovplyvňuje odolnosť a pocit
        pri údere.
    fia_homologation_certification:
      name: Homologizácia/certifikácia FIA
      description: Označuje, či je vozidlo (alebo bezpečnostná bunka) certifikované/homologované
        a podľa akej normy.
    fiber_animal_source_type:
      name: Živočíšny/zdrojový typ vlákna
      description: Živočíšny alebo primárny zdroj, z ktorého pochádza prameň (alebo
        je zo syntetického materiálu), ako sú merino vlna, alpaka alebo rastlinné
        vlákna.
    fiber_luster_level:
      name: Úroveň lesku vlákien
      description: Vizuálny lesk vlákna, od matného až po vysoký lesk.
    fiber_preparation_processing_stage:
      name: Fáza prípravy/spracovania vlákien
      description: Označuje, ako bol prameň pripravený/spracovaný na použitie (napr.
        mykaný verzus česaný, zmiešaný, superwash).
    fiber_preparation_type:
      name: Typ prípravy vlákien
      description: Určuje, ako bolo vlákno pripravené na spracovanie (napr. česaná
        plsť, plsť česaná bubnom, plát vopred vybavený plsťou).
    field_hockey_ball_playing_surface:
      name: Hracia plocha s loptou na pozemný hokej
      description: Identifikuje hraciu plochu alebo prostredie, pre ktoré je lopta
        určená.
    field_hockey_ball_type:
      name: Typ lopty na pozemný hokej
      description: Kategorizuje loptičku na pozemný hokej podľa jej zamýšľaného použitia
        alebo špeciálnej vlastnosti.
    field_hockey_goal_size_standard:
      name: Štandardná veľkosť bránky na pozemný hokej
      description: Klasifikuje cieľ podľa bežných noriem pozemného hokeja alebo tréningovej
        veľkosti (napr. predpis FIH pre vonkajšie športy, mládež, mini).
    field_hockey_training_objective:
      name: Cieľ tréningu pozemného hokeja
      description: Definuje primárnu zručnosť alebo oblasť zamerania, na zlepšenie
        ktorej je tréningová pomôcka určená.
    field_point_attachment_method:
      name: Spôsob uchytenia hrotu pre terčovú streľbu
      description: Označuje, ako je hrot pripevnený k drieku šípu alebo vložke (napr.
        naskrutkovaný, lepený).
    field_point_tip_style:
      name: Štýl hrotu na terčovú streľbu
      description: Určuje geometrický tvar alebo funkčný profil hrotu, čo ovplyvňuje
        penetráciu, námahu pri vyťahovaní a súlad s predpismi.
    fielding_glove_position:
      name: Pozícia baseballovej rukavice
      description: Identifikuje obrannú pozíciu alebo použitie, na ktoré je rukavica
        určená pri bejzbale alebo softbale.
    fielding_training_focus:
      name: Zameranie obranného tréningu
      description: Špecifikuje primárnu oblasť zručností, na ktorú sa pomoc zameriava
        počas nácvikov.
    fig_variety:
      name: Odroda figy
      description: Označuje konkrétnu predávanú odrodu alebo kultivar figy.
    figure_8_device_design:
      name: Obrázok 8, dizajn zariadenia
      description: Identifikuje špecifickú konfiguráciu zlaňovacej osmy, čo ovplyvňuje
        vlastnosti manipulácie a zamýšľané použitie.
    figure_finish_type:
      name: Typ vyhotovenia figuríny
      description: Označuje povrchovú úpravu/náter figúrky modelu koňa (ako vyzerá/pôsobí
        ako zberateľský predmet).
    figurine_scale:
      name: Mierka figúrky
      description: Mierka/pomer figúrky k skutočnému subjektu (ak je to relevantné),
        napr. 1:6.
    fill_status:
      name: Stav naplnenia
      description: Označuje, či sa zápasnícka figurína predáva vopred vyplnená, nenaplnená
        alebo čiastočne naplnená, čo ovplyvňuje náklady na dopravu a námahu kupujúceho.
    filling_consistency:
      name: Konzistencia náplne
      description: Popisuje textúru alebo viskozitu náplne v dodanom stave (napr.
        hladký krém, hrubé kúsky ovocia, pasta).
    filling_type:
      name: Typ náplne
      description: Určuje hlavnú plnku alebo krém vo vnútri sušienky, ak nejaká existuje.
    filtration_and_mother_status:
      name: Filtrácia a stav matky
      description: Označuje, či je ocot filtrovaný, nefiltrovaný, surový alebo obsahuje
        „matku“, čím vyhovuje spotrebiteľom hľadajúcim probiotické alebo surové varianty.
    filtration_method:
      name: Metóda filtrácie
      description: Materiál alebo technika používaná na filtrovanie a čistenie vodky
        po destilácii.
    fin_box_system:
      name: Systém uchytenia plutvy
      description: Udáva typ puzdra alebo uchytenia plutvy, ktoré doska používa, čím
        určuje kompatibilitu s náhradnými plutvami.
    fin_buoyancy:
      name: Vztlak plutiev
      description: Označuje, či je plutva kladne, neutrálne alebo záporne nadnášavá
        vo vode, čo ovplyvňuje orientáciu tela a výstroj potápača.
    fin_flex_rating:
      name: Stupeň ohybnosti plutvy
      description: Označuje relatívnu tuhosť alebo úroveň ohybnosti plutvy, ktorá
        ovplyvňuje celkovú výkonnosť.
    fin_mounting_system:
      name: Systém pripevnenia plutvy
      description: Definuje upevňovacie rozhranie alebo normu použité na upevnenie
        plutvy ku kitesurfingovej doske (napr. FCS II, naskrutkovanie, 4-dierové),
        čím sa zabezpečí kompatibilita medzi plutvami a doskami.
    fin_position:
      name: Poloha plutiev
      description: Určuje zamýšľanú montážnu polohu plutvy na doske.
    fin_strap_type:
      name: Typ remienka plutvy
      description: Určuje štýl popruhu alebo upevňovacieho systému používaného na
        upevnenie plutvy k päte/chodidlu.
    fin_template:
      name: Šablóna plutiev
      description: Kategorizuje hydrodynamickú šablónu alebo obrys plutvy surfingovej
        dosky, čo ovplyvňuje štýl otáčania, rýchlosť a celkový pocit z dosky.
    finger_count:
      name: Počet prstov
      description: Označuje počet prstov, ktoré má rukavica, ochranný jazýček alebo
        uvoľňovacia rukoväť podporovať.
    finger_coverage:
      name: Zakrytie prstov
      description: Označuje, aká časť prstov je zakrytá.
    finger_grip_adjustability:
      name: Nastaviteľnosť úchopu prstami
      description: Označuje, ako sa úchyt na prsty upevňuje alebo nastavuje tak, aby
        sa prispôsobil rôznym veľkostiam ruky.
    finger_hole_configuration:
      name: Konfigurácia otvorov na prsty
      description: Určuje orientáciu otvorov pre prsty na ruke (pravák, ľavák alebo
        obojruký).
    finger_hole_count:
      name: Počet otvorov na prsty
      description: Uvádza počet otvorov na prsty v koži rukoväte, čo je kľúčový štýlový
        rozdiel medzi modelmi bez prstov, 2-dierkovými, 3-dierkovými a 4-dierkovými
        modelmi.
    finger_pick_band_style:
      name: Štýl pásika brnkadla
      description: Štýl pásu/slučky, ktorá sa pripevňuje k prstu, čo ovplyvňuje pohodlie
        a nastaviteľnosť.
    finger_pick_blade_length:
      name: Dĺžka čepele prstového trsátka
      description: Dĺžka brnkacej čepele vyčnievajúcej z pásika
    finger_pick_blade_shape:
      name: Tvar brnkacej časti prstového trsátka
      description: Tvar/profil brnkacej plochy (čepele), ktorá sa dotýka strún.
    finger_pick_size:
      name: Veľkosť prstového brnkátka
      description: Veľkosť pásika/slučky brnkadla prispôsobená rôznym obvodom prstov
        alebo palcov (nie veľkosti nástroja).
    finger_pick_wear_location:
      name: Miesto nosenia brnkadla
      description: Označuje, na ktorom prste sa má brnkadlo nosiť, alebo či ide o
        súpravu na palec a prst.
    finger_protection:
      name: Ochrana prstov
      description: Označuje, či rukavice obsahujú ochrannú výstuhu prstov a či sú
        výstuhy odnímateľné.
    fingerboard_bearing_type:
      name: Typ uloženia hmatníka
      description: Určuje typ ložiska používaného v kolieskach hmatníka.
    fingerboard_grip_type:
      name: Typ úchopu hmatníka
      description: Určuje materiál/typ povrchu na uchopenie použitý na hornej doske
        hmatníka.
    fining_agent_active_ingredient:
      name: Účinná zložka číriaceho činidla
      description: Primárne číriace alebo dočisťovacie činidlo použité v produkte.
    fining_agent_type:
      name: Typ číriaceho činidla
      description: Určuje chemické zloženie alebo materiál číriaceho činidla pre prostriedky
        používané na čírenie červeného vína.
    finish_after_baking:
      name: Úprava po vypálení
      description: Popisuje typický vzhľad povrchu po vytvrdnutí/vypálení.
    finish_effect:
      name: Efekt povrchovej úpravy
      description: Opisuje špeciálne povrchové/optické efekty aplikované na štrasový
        kamienok.
    finish_type:
      name: Typ povrchovej úpravy
      description: Povrchová úprava korpusu ukulele.
    finished_product_format:
      name: Formát hotového produktu
      description: Určuje typ parfumového produktu, na výrobu ktorého je súprava určená.
    fire_pit_accessories_included:
      name: Vrátane príslušenstva k ohnisku
      description: Uvádza zoznam dôležitého príslušenstva dodávaného spolu s ohniskom,
        ako sú ochranné mriežky proti iskrám alebo lávové kamene, čím poskytuje prehľad
        o obsahu balenia.
    firework_assortment_launch_type:
      name: Typ odpaľovania sortimentu pyrotechniky
      description: Popisuje, ako sa obsiahnutá pyrotechnika zvyčajne zapaľuje/odpaľuje.
    firework_assortment_types_included:
      name: Zahrnuté typy pyrotechniky
      description: Označuje hlavné typy ohňostrojov zahrnuté v sortimente na pomoc
        kupujúcim pri porovnaní obsahu nákupných balíkov (napr. fontány, rímske sviečky,
        petardy).
    firework_effect_types:
      name: Typy ohňostrojných efektov
      description: Primárne skupiny vizuálnych a/alebo senzorických efektov, ktoré
        sortiment vytvára (vyberte všetky platné možnosti).
    firework_ignition_method:
      name: Metóda zapálenia ohňostroja
      description: Určuje, ako sa pyrotechnika zapaľuje alebo iniciuje (napr. zápalkou
        alebo elektrickou zápalkou).
    firework_visual_intensity_level:
      name: Úroveň vizuálnej intenzity ohňostroja
      description: Celková vizuálna intenzita/objem iskier pre efekt fontány.
    firing_mode:
      name: Spôsob odpaľovania
      description: Zobrazuje voliteľný alebo primárny režim streľby pre airsoftovú
        zbraň.
    first_day_cover_cachet_type:
      name: Typ prítlače na obálke prvého dňa
      description: Typ prítlače na obálke prvého dňa (napr. tlačený, ručne maľovaný).
    first_day_cover_cancellation_type:
      name: Typ zrušenia obálky prvého dňa
      description: Typ/štýl zrušovacej poštovej pečiatky použitej na obálke prvého
        dňa (napr. strojové zrušenie, ručné zrušenie).
    first_day_cover_set_type:
      name: Typ súpravy obálok prvého dňa
      description: Uvádza, či obálka predstavuje jedno vydanie, kompletnú sériu alebo
        jej časť/kombináciu.
    fishing_hook_size:
      name: Veľkosť rybárskeho háčika
      description: 'Určuje štandardizované označenie veľkosti rybárskeho háčika (napr.
        #4, 1/0, 10/0), čo pomáha rybárom priradiť rozmery háčika k cieľovému druhu
        a návnade.'
    fishing_hook_style:
      name: Štýl rybárskeho háčika
      description: Identifikuje konkrétny dizajn alebo vzor ohybu jednoduchého háčika,
        čo ovplyvňuje prezentáciu, účinnosť zaháknutia a zamýšľané použitia.
    fishing_hook_type:
      name: Typ rybárskeho háčika
      description: Opisuje konfiguráciu háčika. dodávaného s rybárskym blyskáčom (ak
        je k dispozícii).
    fishing_line_application:
      name: Použitie rybárskeho vlasca
      description: Identifikuje zamýšľané použitie rybárskeho vlasca alebo nadväzcového
        materiálu (napr. nadväzec, kmeňový vlasec, muškársky nadväzec).
    fishing_line_buoyancy_type:
      name: Typ vztlaku rybárskeho vlasca
      description: Klasifikuje správanie vlasca vo vodne (napr. plávajúci, stredne
        potápavý, potápavý), čo pomáha rybárom vybrať si vhodnú hĺbku vedenia návnady.
    fishing_needle_purpose:
      name: Účel rybárskej ihly
      description: Určuje hlavné použitie ihly pri montáži rybárskych zostáv.
    fishing_needle_types_included:
      name: Zahrnuté typy rybárskych ihiel
      description: Uvádza zoznam konkrétnych štýlov ihiel alebo naväzovacích nástrojov,
        dodávaných v súprave, aby si zákazníci mohli rýchlo pozrieť obsah súpravy.
    fit_profile:
      name: Profil vnútorného priestoru
      description: Opisuje celkový strih a tvar vložky, ktoré ovplyvňujú pohyb a krytie.
    fit_volume_classification:
      name: Klasifikácia objemu vnútorného priestoru
      description: Kategorizuje celkový vnútorný objem topánky podľa označenia výrobcov
        (napr. LV pre nízky objem).
    fitting_angle:
      name: Uhol montáže
      description: Určuje uhol ohybu telesa tvarovky (napr. rovné, 45°, 90°). Pre
        tvarovky s variabilným uhlom použite možnosť „Nastaviteľné/otočné“ a pre nezvyčajné
        uhly možnosť „Iné“.
    flag_base_type:
      name: Typ podstavca vlajky
      description: Definuje ukotvenie alebo štýl základne používaný na upevnenie rohovej
        vlajky na rôznych hracích plochách.
    flag_design_theme:
      name: Téma dizajnu vlajky
      description: Opisuje primárny motív dizajnu zobrazený na vlajke (napr. krajina/národný
        motív, športový tím, sviatok), čo podporuje vyhľadávanie a filtrovanie pri
        nákupoch na základe zámeru.
    flag_mounting_method:
      name: Metóda montáže vlajky
      description: Určuje, ako sa vlajka pripevňuje k vozidlu (napr. držiak antény,
        držiak na ťažné zariadenie, magnetický držiak).
    flag_type:
      name: Typ vlajky
      description: Klasifikuje konkrétny účel alebo štýl golfovej vlajky, napríklad
        jamková vlajka, vlajka na vozík alebo tréningová vlajka.
    flame_resistance_standard:
      name: Norma odolnosti voči ohňu
      description: Označuje špecifickú normu/certifikáciu odolnosti voči ohňu alebo
        elektrickému oblúku, ktorú odev spĺňa.
    flamenco_cajon_snare_system:
      name: Systém strunníka cajonu pre flamenco
      description: Určuje vnútorný mechanizmus malého bubna použitý na vytvorenie
        charakteristického flamencového bzučania (alebo žiadneho).
    flammability_compliance:
      name: Súlad s požiadavkami na horľavosť
      description: Určuje príslušné normy horľavosti, ktoré tkanina spĺňa pre interiéry
        vozidiel.
    flannel_brushing_finish:
      name: Flanelová česaná úprava povrchu
      description: Označuje, či je flanel česaný a na ktorej strane (stranách), čo
        ovplyvňuje mäkkosť, teplo a vzhľad.
    flannel_use_type:
      name: Typ použitia flanelu
      description: Primárne určená aplikácia na flanelový rez/skrutku.
    flap_configuration:
      name: Konfigurácia klapiek
      description: Určuje štýl chlopne sedla, napríklad monochlopňa alebo dvojitá
        chlopňa.
    flare_color:
      name: Rozšírená farba
      description: Farba vyžarovaného svetla/plameňa (alebo farba šošovky v prípade
        LED svetlíc).
    flash_card_included_features:
      name: Funkcie zahrnuté vo flash karte
      description: Zvýrazňuje funkčné vlastnosti učenia/používania, ktoré sú súčasťou
        flash kariet.
    flavor_intensity:
      name: Intenzita chuti
      description: Označuje koncentráciu ochucovadla, čo pomáha používateľom určiť
        vhodné dávkovanie (napr. štandardná intenzita, vysoká intenzita).
    flavor_solvent_base:
      name: Základ rozpúšťadla arómy
      description: Uvádza hlavnú nosnú látku alebo rozpúšťadlo použité v aróme (napr.
        alkohol, propylénglykol, glycerín).
    fleece_fiber_animal_type:
      name: Flísové vlákno zvieracieho typu
      description: Živočíšny pôvod flaušového vlákna (druh).
    fleece_finish_surface:
      name: Flísová úprava/povrch
      description: Popisuje povrchovú úpravu flaušu (napr. odolnosť voči vzniku žmolkov,
        kefovaná úprava), ktorá ovplyvňuje odolnosť voči vzniku žmolkov, mäkkosť a
        vzhľad.
    fleece_preparation_method:
      name: Metóda prípravy flísu
      description: Popisuje, ako je flís pripravený/spracovaný na tvorbu a spriadanie
        (stav vlákna).
    flesh_color:
      name: Telesná farba
      description: Určuje vnútornú farbu dužiny melóna.
    fletching_orientation:
      name: Orientácia pierok
      description: Určuje, ako sú perá na šípe osadené na drieku (napr. rovno, posunuté,
        špirálovito), čo ovplyvňuje rotáciu a let šípu.
    fletching_profile:
      name: Profil pier
      description: Definuje geometrický tvar alebo strih peria na šípe, ktorý ovplyvňuje
        odpor vzduchu, priechodnosť, hlučnosť a celkové letové vlastnosti šípu.
    flight_system_type:
      name: Typ systému letu
      description: Určuje konštrukčný štýl letu, rozlišuje medzi skladacími, lisovanými
        a integrovanými systémami letu a drieku.
    float_attachment_method:
      name: Metóda upevnenia plaváku
      description: Opisuje, ako je plavák pripevnený k vlascu (napr. sklzom alebo
        pevným uchytením), čo umožňuje rybárom filtrovať podľa štýlu namontovania.
    float_design:
      name: Dizajn plaváka
      description: Klasifikuje celkový štýl alebo typ rybárskeho plaváka (napr. bobber,
        waggler, pencil), aby si rybári mohli rýchlo vybrať model vhodný pre svoju
        techniku a podmienky.
    float_raft_use_environment:
      name: Prostredie používania plavidiel/raftov
      description: Primárne určené nastavenie vody pre nafukovací čln (bazén vs. pokojná
        otvorená voda vs. vlny), čo odráža očakávania o odolnosti a dizajne.
    floatation:
      name: Vztlak
      description: Či je maják navrhnutý tak, aby plával na vode.
    floor_construction_type:
      name: Typ konštrukcie podlahy
      description: Určuje konštrukciu podlahy raftu (napr. samovylievacia, drop-stitch),
        ktorá ovplyvňuje odvodnenie, pevnosť a výkonnosť.
    floor_design:
      name: Dizajn podlahy
      description: Štýl podlahovej krytiny dodávanej s ohradou.
    floor_inclusion:
      name: Zahrnutie podlahy
      description: Uvádza, či predsieň obsahuje podlahu a či je táto podlaha odnímateľná.
    floor_mat_cleaning_method:
      name: Spôsob čistenia podlahových rohoží
      description: Označuje primárnu metódu čistenia podlahovej rohože odporúčanú
        výrobcom.
    floor_mat_edge_style:
      name: Štýl okraja podlahovej rohože
      description: Popisuje, či má rohož vyvýšené okraje/okraje na zachytenie rozliatych
        tekutín a nečistôt.
    floor_mat_format:
      name: Formát podlahovej rohože
      description: Definuje fyzický formát alebo štýl produktu na ochranu podlahy
        (napr. jednoduchá rohož, zámková dlaždica, kotúč).
    floor_mat_retention_system:
      name: Systém upevnenia podlahovej rohože
      description: Určuje spôsob použitý na udržanie rohože na mieste.
    floor_mat_set_configuration:
      name: Konfigurácia súpravy podlahových rohoží
      description: Uvádza, ktoré pozície sú súčasťou balíka (napr. len predný pár,
        kompletná súprava).
    floss_sugar_granulation_grade:
      name: Stupeň granulácie cukru na výrobu cukrovej vaty
      description: Popisuje veľkosť kryštálov cukrovej zmesi (jemné, stredné, hrubé),
        ktorá môže ovplyvniť výkonnosť stroja a konečnú textúru.
    floss_sugar_product_form:
      name: Forma cukru na výrobu cukrovej vaty
      description: Udáva, či je cukor na cukrovú vatu pripravený na priame použitie,
        či ide o chuťový koncentrát, ktorý sa musí zmiešať so základným cukrom, alebo
        o bezfarebný základný cukor.
    flour_grind_texture:
      name: Textúra mletia múky
      description: Označuje stupeň mletia alebo textúru múky, napríklad veľmi jemná,
        stredná, hrubá alebo mletá na kamennom mlyne, čo môže ovplyvniť výsledok receptu.
    flour_processing_method:
      name: Spôsob spracovania múky
      description: Zachytáva významné metódy spracovania alebo úpravy použité na múku
        (napr. mletie na kamennom mlyne, bielenie, naklíčenie, obohatenie), ktoré
        ovplyvňujú chuť, farbu alebo nutričné hodnoty.
    flower_care_instructions:
      name: Pokyny na starostlivosť o kvety
      description: Poskytuje odporúčané kroky starostlivosti špecifické pre čerstvo
        rezané kvety (napr. strihanie stoniek, zmena frekvencie zavlažovania).
    flugelhorn_leadpipe_material:
      name: Materiál náustku krídlovej trúbky
      description: Materiál súčasti náustku (ak je uvedený oddelene od celkového materiálu
        nástroja).
    flugelhorn_trigger_type:
      name: Typ spúšťača krídlovky
      description: Označuje, či krídlovka obsahuje ladiaci spúšťač a ktorý ťah/ventil
        ním ovláda.
    fluorescence_grade:
      name: Fluorescenčný stupeň
      description: Označuje intenzitu fluorescencie diamantu pri vystavení UV svetlu.
    fluorescence_under_uv:
      name: Fluorescencia pod UV žiarením
      description: Udáva, či a aký typ fluorescencie vzorka vykazuje pod ultrafialovým
        svetlom.
    fluorocarbon_content:
      name: Obsah fluórovaných uhľovodíkov
      description: Označuje, či vosk obsahuje fluorokarbónové prísady a v akom množstve.
    flute_case_capacity:
      name: Kapacita puzdra na flautu
      description: Uvádza, na čo je puzdro určené okrem hlavnej časti flauty (napr.
        flauta + pikola, náhradná hlava).
    flute_cleaning_rod_tip_type:
      name: Typ hrotu čistiacej tyčky na flautu
      description: Opisuje konštrukciu koncovky tyčky, ktorá drží tampón alebo prichádza
        do styku s nástrojom (napr. s drážkou, so závitom, s očkom).
    flute_footjoint_type:
      name: Typ spodnej časti flauty
      description: Určuje konfiguráciu pätkového spoja flauty.
    flute_headjoint_cork_type:
      name: Hlavica flauty, korkový typ
      description: Špecifikuje materiál/typ zostavy korku/zátky hlavice dodávanej
        s hlavicou.
    flute_key_system:
      name: Systém klapiek na flaute
      description: V prípade potreby uvádza mechanický systém/systém klávesov používaný
        na flaute (napr. Boehmov systém).
    flute_keywork_material:
      name: Materiál klapiek na flaute
      description: Materiál a/alebo povrchová úprava klapiek (mechaniky), ak je špecifikovaná
        oddelene od materiálu tela nástroja.
    flute_offset_g:
      name: G klapka mimo osi flauty
      description: Určuje, či má flauta odsadené rozloženie klávesu G.
    flute_wall_thickness:
      name: Hrúbka steny flauty
      description: Kategória hrúbky steny drážkovanej rúrky (tenkostenná, štandardná,
        hrubostenná).
    fly_pattern_type:
      name: Typ muškárskej nástrahy
      description: Klasifikuje umelú mušku podľa štýlu lovu alebo imitácie hmyzu/potravy,
        aby si rybári mohli rýchlo vyfiltrovať správny typ mušky.
    fly_rod_style:
      name: Typ muškárskeho prúta
      description: Prút sa klasifikuje podľa zamýšľaného spôsobu nahadzovania alebo
        použitia (napr. jednoručný, striedavý, obojručný).
    fly_style:
      name: Štýl mušky
      description: Určuje typ rozparku alebo predného otvoru na dlhých spodkoch.
    fly_tying_tools_included:
      name: Súčasťou balenia sú aj nástroje na viazanie mušiek
      description: Uvádza zoznam konkrétnych nástrojov na viazanie mušiek, ktoré sú
        súčasťou súpravy, aby nakupujúci presne vedeli, čo je súčasťou balenia a mohli
        si porovnať balíky.
    fly_type:
      name: Typ rozparku
      description: Určuje, či majú dlhé spodky funkčný rozparok a aký má štýl.
    flyer_hook_mounting_method:
      name: Spôsob uchytenia háčika na krídlovom nadstavci
      description: Spôsob uchytenia háčika na krídlovom nadstavci (napr. naskrutkovanie
        alebo zalisovanie), čo ovplyvňuje montáž a kompatibilitu.
    flyer_hook_orientation:
      name: Orientácia háčika letky
      description: Či je háčik určený na ľavú alebo pravú stranu krídlového nadstavca,
        alebo je obojstranný/univerzálny.
    flyer_kit_finish_coating:
      name: Povrchová úprava/náter súpravy krídlového nadstavca
      description: Povrchová úprava aplikovaná na komponenty krídlového nadstavca.
    flyer_kit_included_components:
      name: Komponenty krídlového nadstavca
      description: Identifikuje, ktoré časti sú zahrnuté v súprave.
    flyer_orifice_type:
      name: Typ otvoru krídlového nadstavca
      description: Určuje štýl otvoru použitého na letáku.
    flying_disc_feature_set:
      name: Súbor funkcií lietajúceho disku
      description: Pozoruhodné funkčné vlastnosti lietajúceho kotúča.
    flysheet_material:
      name: Materiál tropika
      description: Identifikuje hlavnú tkaninu použitú na vonkajšom stane, čo ovplyvňuje
        hmotnosť, trvácnosť a odolnosť voči poveternostným vplyvom.
    flywheel_balance_type:
      name: Typ vyvažovania zotrvačníka
      description: Označuje, či je zotrvačník neutrálne vyvážený alebo či používa
        externé protizávažie.
    foam_blocks_size_class:
      name: Veľkostná trieda penových tvárnic
      description: Označuje všeobecnú veľkostnú triedu blokov v súbore.
    foam_blocks_surface_texture:
      name: Povrchová textúra penových blokov
      description: Opisuje povrchovú úpravu a pocit na dotyk vonkajšej strany penových
        blokov.
    foam_surface_effect:
      name: Efekt penového povrchu
      description: Opisuje bežné dekoratívne povrchové efekty aplikované na kreatívnu
        penu alebo polystyrén, ako sú trblietavé, metalické alebo holografické povrchové
        úpravy.
    foil_color:
      name: Farba fólie
      description: Určuje farbu fóliového zvýraznenia použitú na certifikáte (ak je
        to relevantné).
    foil_curtain_mounting_method:
      name: Metóda montáže fóliovej clony
      description: Ako sa má fóliový záves nainštalovať alebo zavesiť (napr. lepiaca
        páska, očká).
    foil_discipline:
      name: Disciplína s podvodným krídlom foil
      description: Označuje hlavný štýl jazdy alebo disciplínu, pre ktorú je podvodné
        krídlo určené.
    foil_mast_board_mounting_type:
      name: Typ montáže sťažňa na foil
      description: Definuje rozhranie na vrchu stožiara, ktoré sa pripája k doske
        alebo fóliovým koľajám.
    foil_mast_fuselage_connection_type:
      name: Typ spojenia medzi trupom a sťažňom foilu
      description: Určuje, ako sa stožiar pripája k trupu alebo zostave predného krídla.
    foil_mounting_interface:
      name: Montážne rozhranie fólie
      description: Označuje štandard pripojenia, ktorý diel používa na pripojenie
        k doske alebo iným komponentom foilu.
    foil_mounting_system:
      name: Systém pripevnenia fólie
      description: Určuje montážne rozhranie pre foily alebo plutvy na doske, čím
        sa zabezpečí kompatibilita s existujúcim hardvérom jazdca.
    foil_mounting_type:
      name: Typ pripevnenia fólie
      description: Určuje systém rozhrania, ktorý sa používa na pripevnenie fólie
        k doske, čím sa zabezpečuje kompatibilita medzi komponentmi.
    fold_over_elastic_application:
      name: Použitie skladacia elastickej lemovky
      description: Hlavné určené použitie/použitie na gumičku v gombíkových dierkach.
    foldability:
      name: Skladateľnosť
      description: Opisuje, či a ako sa dá deliaca priečka zložiť alebo zbaliť na
        uskladnenie alebo rekonfiguráciu.
    foldability_stow:
      name: Skladateľnosť (na uloženie)
      description: Či sa nosič dá sklopiť alebo uskladniť, keď sa nepoužíva (napr.
        sa sklopí k vozidlu)..
    folding_style:
      name: Štýl skladania
      description: Označuje, ako sa dopadová podložka skladá pri preprave a skladovaní,
        čo ovplyvňuje rovnomernosť a zbaliteľnosť dopadovej plochy.
    food_basket_items_included:
      name: Položky v balení potravinového koša
      description: Uvádza hlavné druhy potravín v košíku, aby pomohol nakupujúcim
        vybrať si košíky, ktoré zodpovedajú chuti alebo stravovacím potrebám príjemcov.
    food_coloring_form:
      name: Forma potravinárskeho farbiva
      description: Určuje fyzickú formu alebo spôsob dodania, v akej sa potravinárske
        farbivo dodáva (napr. gél, kvapalina, prášok, sprej).
    food_contact_material:
      name: Materiál prichádzajúci do kontaktu s potravinami
      description: Hlavný materiál položiek vinárskeho vybavenia (fermentačné nádoby,
        sifóny, lieviky) používaného pri mušte/víne.
    food_packing_medium:
      name: Médium na balenie potravín
      description: Určuje médium, v ktorom sú ovocie alebo zelenina zabalené (napr.
        voda, nálev, sirup, olej).
    foosball_rod_type:
      name: Typ tyče na stolný futbal
      description: Označuje mechanickú konfiguráciu tyče, ktorá ovplyvňuje pocit z
        hry a bezpečnosť.
    foot_arch_type_compatibility:
      name: Kompatibilita typu klenby chodidla
      description: Označuje profil klenby chodidla, pre ktorý je vložka určená.
    foot_arch_type_suitability:
      name: Vhodnosť pre typ klenby nohy
      description: Identifikuje, ktorý profil klenby chodidla má vložka podporovať.
    foot_coverage:
      name: Pokrytie chodidiel
      description: Označuje, či sú legíny/pančuchy s chodidlom, bez chodidla, s pásikom
        pod chodidlom alebo s otvorenou pätou.
    foot_guard_type:
      name: Typ chrániča nôh
      description: Označuje, či chránič nôh obsahuje krytk prstov/chodidiel a určuje,
        či je krytk pevný alebo odnímateľný.
    foot_support_level:
      name: Úroveň opory chodidla
      description: Označuje úroveň štrukturálnej podpory alebo pevnosti, ktorú vložka
        do topánky poskytuje, napríklad nízka, stredná, vysoká alebo extra vysoká.
    footbag_play_style:
      name: Štýl hry s loptičkou
      description: Hlavný zamýšľaný štýl hry s footbagom.
    football_ball_type:
      name: Typ futbalovej lopty
      description: Určuje hlavné určené použitie alebo kontext futbalovej lopty, napríklad
        hra, tréning alebo zberateľské vystavenie.
    football_dummy_type:
      name: Typ futbalovej figuríny
      description: Klasifikuje štýl alebo funkčný dizajn figuríny tak, aby odrážal
        jej špecifický tréningový účel.
    football_glove_certification:
      name: Certifikácia futbalových rukavíc
      description: Označuje certifikáciu alebo súlad s normami požadovanými pre súťažnú
        hru (napr. SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Typ upevnenia nášľapnej dosky
      description: Určuje, ako sa nožný panel postele pripevňuje k rámu postele alebo
        k podlahe,čo nakupujúcim pomáha vybrať kompatibilné technické vybavenie a
        spôsoby inštalácie.
    footboard_style:
      name: Štýl nášľapnej dosky
      description: Definuje štrukturálny alebo estetický štýl konštrukcie nožného
        panelu postele.
    footrest_adjustability:
      name: Nastaviteľnosť opierky na nohu
      description: Určuje, či a ako je možné nastaviť opierky nôh tak, aby vyhovovali
        rôznym dĺžkam nôh dieťaťa.
    footrest_type:
      name: Typ opierky na nohy
      description: Označuje prítomnosť a dizajn opierky na nohy na stoličke.
    footstrap_configuration:
      name: Konfigurácia popruhu na nohy
      description: Určuje rozloženie vkladacích otvorov pre nožné popruhy na palube
        dosky.
    footswitch_action_style:
      name: Typ fungovania nožného spínača
      description: Označuje, či je akcia spínača okamžitá alebo západková a či podporuje
        oboje.
    footswitch_power_source:
      name: Zdroj napájania nožného spínača
      description: Určuje, ako je nožný spínač napájaný, ak je to relevantné (pasívne
        cez konektor zosilňovača, batériu, externý adaptér, USB atď.).
    footwear_construction_method:
      name: Spôsob konštrukcie obuvi
      description: Definuje techniku použitú na pripevnenie zvršku k podrážke, čo
        ovplyvňuje trvanlivosť, možnosti výmeny podrážky a cenu.
    footwear_cut:
      name: Strih obuvi
      description: Označuje výšku členkovej manžety (nízky strih, stredný strih, vysoký
        strih), čo vyvažuje pohyblivosť a oporu.
    footwear_size_system:
      name: Systém veľkosti obuvi
      description: Označuje regionálnu normu veľkostí použitú pre uvedenú veľkosť
        obuvi (napr. USA, EÚ, Spojené kráľovstvo).
    footwear_support_type:
      name: Typ podpory obuvi
      description: Určuje biomechanickú podporu alebo úroveň kontroly pronácie, ktorú
        topánka poskytuje (napr. neutrálna, stabilita, kontrola pohybu).
    fork_material:
      name: Materiál vidlice
      description: Určuje materiál použitý na prednú vidlicu bicykla, čo ovplyvňuje
        tuhosť, hmotnosť a kvalitu jazdy.
    form_factor:
      name: Tvar
      description: Hlavný hardvérový tvar ovládača DMX.
    formula_car_series_class:
      name: Séria/trieda pretekárskych formúl
      description: Určuje pretekársku sériu alebo triedu, v ktorej je formula vyrobená.
    formulation_style:
      name: Štýl prípravku
      description: Zvýrazňuje špecializované receptúry navrhnuté pre konkrétne použitie
        alebo preferencie (napr. Barista, Extra krémové).
    formulation_type:
      name: Typ receptúry
      description: Štýl zloženia dezinfekčného spreja.
    fossil_preparation_level:
      name: Úroveň preparácie skamenelín
      description: Stupeň prípravy/čistenia vykonaný na vzorke (napr. nepripravená
        v matrici vs. plne pripravená).
    fossil_preservation_type:
      name: Typ konzervácie fosílií
      description: Typ konzervácie fosílií (napr. permineralizovaná, odliatok, odtlačok,
        vytlačenina).
    fossil_restoration_status:
      name: Stav obnovy fosílií
      description: Či a ako bol exemplár opravený/reštaurovaný (napr. zlepený, rekonštruovaný,
        doplnený kompozitným materiálom).
    foundation_configuration:
      name: Konfigurácia základu
      description: Určuje, či je základňa vyrobená ako jeden celok, alebo ako rozdelená/dvojdielna
        súprava pre matrace väčších rozmerov.
    foundation_profile:
      name: Profil základov
      description: Klasifikuje celkovú výškovú kategóriu základu – napr. ultranízky,
        nízky, štandardný alebo vysoký profil – takže nakupujúci môžu rýchlo zosúladiť
        preferencie výšky matraca a veľkosť plachty.
    frame_adjustability:
      name: Nastaviteľnosť rámu
      description: Označuje, či a ako je možné rám nastaviť (napr. nastavenie šírky/výšky,
        rotácia/náklon), čo ovplyvňuje ergonómiu a prispôsobenie projektu.
    frame_drum_jingle_configuration:
      name: Konfigurácia zvončekov na ráme bubna
      description: Či rámový bubon obsahuje rolničky a ak áno, ich všeobecnú konfiguráciu.
    frame_drum_tuning_system:
      name: Systém ladenia rámového bubna
      description: Ako je ladený rámový bubon alebo či ho možno ladiť.
    frame_finish:
      name: Povrchová úprava rámu
      description: Určuje ochranný náter alebo povrchovú úpravu rámu, ktorá ovplyvňuje
        jeho životnosť a vzhľad.
    frame_mounting_standard:
      name: Štandardná montáž rámu
      description: Definuje špecifikáciu rozhrania medzi topánkou a rámom (napr. 195
        mm 2-bodové, 3-bodové Trinity), čo je kľúčové pre kompatibilitu rámu.
    frame_steel_gauge:
      name: Hrúbka ocele rámu
      description: Identifikuje hrúbku (kaliber) oceľových rúrok použitých v stojanových
        stĺpikoch, čo je kritický ukazovateľ pevnosti a stability.
    frame_suspension_type:
      name: Typ zavesenia rámu
      description: Uvádza typ odpruženia rámu bicykla, napríklad pevný rám, hardtail
        alebo celoodpružený rám, aby sa pomohlo kupujúcim vybrať si rám, ktorý zodpovedá
        ich plánovanej konfigurácii.
    free_reed_instrument_orientation:
      name: Orientácia nástroja s voľným jazýčkom
      description: Určuje, ako sa nástroj drží/ako sa na ňom hrá (v ruke s mechom,
        upevnený popruhom na ramene atď.) z hľadiska ergonómie a filtrovania pri používaní.
    free_weight_rack_type:
      name: Stojan na uloženie činiek
      description: Klasifikuje konštrukčný typ alebo funkciu stojana (napr. stojan
        na činky, stojan na kettlebell, stojan na závažia).
    freehub_body_type:
      name: Typ telesa voľnobežky
      description: Určuje normu telesa voľného náboja alebo kazetového meniča podporovanú
        zadným nábojom bicykla.
    freehub_driver_standard:
      name: Typ štandardu orecha náboja
      description: Určuje rozhranie kazety/orecha, ktoré náboj podporuje (napr. Shimano
        HG, SRAM XD).
    freewheel_thread_standard:
      name: Norma závitu pre voľnobežku
      description: Určuje normu alebo veľkosť závitu náboja, s ktorou je voľnobežka
        kompatibilná.
    french_horn_bell_construction:
      name: Konštrukcia ozvučníka lesného rohu
      description: Určuje, ako je ozvučník skonštruovaný a či sa dá odstrániť na účely
        prepravy/servisu.
    french_horn_bell_material:
      name: Materiál lievika lesného rohu
      description: Určuje materiál/zliatinu ozvučníka (a často aj rozšírenie ozvučníka)
        použitého na lesnom rohu.
    french_horn_bell_type:
      name: Typ ozvučníka lesného rohu
      description: Štýl konštrukcie ozvučníka.
    french_horn_finish:
      name: Povrchová úprava lesného rohu
      description: Vonkajšia povrchová úprava/pokovovanie nástroja.
    french_horn_included_accessories:
      name: Príslušenstvo k lesnému rohu
      description: Príslušenstvo balenia lesného rohu (puzdro, náustok atď.).
    french_horn_leadpipe_material:
      name: Materiál náustku lesného rohu
      description: Určuje materiál/zliatinu náustku.
    french_horn_wrap_type:
      name: Typ ovinutia lesného rohu
      description: Celková konfigurácia zvinutia/tvaru lesného rohu.
    fretboard_radius_fit:
      name: Kompatibilita s rádiusom hmatníka
      description: Uvádza, či je zakrivenie podložky kapodastra určené pre rovné alebo
        zaoblené hmatníky, alebo či je nastaviteľné tak, aby vyhovovalo rôznym menzúram
        hmatníka.
    friction_surface_included:
      name: Trecia plocha je súčasťou balenia
      description: Či zotrvačník obsahuje vymeniteľnú/nainštalovanú treciu plochu
        (napr. vložku, krúžok) alebo ide o jednodielnu treciu plochu.
    fringe_curtain_finish:
      name: Povrchová úprava závesu so strapcami
      description: Opisuje vizuálnu úpravu povrchu strapcov (lesk/textúra).
    fringe_curtain_material:
      name: Materiál závesu so strapcami
      description: Určuje primárny materiál pásových závesov (napr. PET fólia, plast,
        papier, tkanina).
    fringe_curtain_use_location:
      name: Miesto použitia strapcovej záclony
      description: Uvádza, či je záves so strapcami určený na použitie v interiéri,
        v exteriéri alebo na oboje.
    fringe_trim_style:
      name: Štýl strapcového lemu
      description: Určuje konštrukciu/štýl strapcového lemu (spôsob, akým sú pramene
        alebo slučky vytvorené a usporiadané).
    front_axle_standard:
      name: Norma prednej nápravy
      description: Uvádza priemer a rozstup nápravy, pre ktoré je vidlica navrhnutá
        (napr. Boost 15 × 110 mm), čím sa zabezpečí kompatibilita s nábojom.
    front_button_configuration:
      name: Konfigurácia predných tlačidiel
      description: Označuje štýl predného gombíka bundy, pričom určuje, či má jednoradové
        alebo dvojradové zapínanie v oblasti hrudníka a počet predných gombíkov.
    front_closure_style:
      name: Štýl predného zapínania
      description: Uvádza typ zapínania na prednej strane trenčkotu, napríklad jedno-
        alebo dvojradové zapínanie, otvorený typ, prekrývajúci sa typ alebo na zips.
    front_decoration_type:
      name: Typ prednej dekorácie
      description: Určuje typ ozdoby alebo nášivky na prednej strane čiapky (napr.
        vyšívaná nášivka, kožená nášivka).
    front_point_configuration:
      name: Konfigurácia gombíkov
      description: Určuje dizajn predných hrotov (jednohrotový , dvojhrotový, modulárny,
        vymeniteľný), čo ovplyvňuje presnosť prieniku na ľade a zmiešanom teréne.
    front_seat_position:
      name: Poloha predného sedadla
      description: Pre ktorú stranu/polohu v prednom rade je sedadlo určené.
    front_style:
      name: Štýl prednej časti
      description: Opisuje riešenie prednej časti nohavíc typu chino a uvádza, či
        sú nohavice rovné, skladané alebo majú iné detaily.
    frosting_or_icing_type:
      name: Typ polevy alebo glazúry
      description: Určuje typ polevy alebo glazúry použitej na tortu alebo dezertnú
        tyčinku.
    fruit_cultivar_or_variety:
      name: Odroda alebo druh ovocia
      description: Určuje konkrétny kultivar alebo názov odrody ovocia (napr. Gala,
        Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Štýl nakrájania ovocia
      description: Opisuje, ako sa ovocie pripravuje alebo krája (napr. celé, nakrájané
        na plátky, na kocky).
    fruit_mix_variety:
      name: Typ ovocnej zmesi
      description: Uvádza názov tematického zmesového produktu alebo všeobecný druh
        ovocnej zmesi (napr. tropická zmes, zmes lesného ovocia).
    fruit_piece_form:
      name: Tvar kúska ovocia
      description: Opisuje fyzické nakrájanie alebo vzhľad kúskov sušeného ovocia,
        napr. celé, nakrájané na plátky, práškové.
    fruit_snack_form:
      name: Forma ovocného občerstvenia
      description: Klasifikuje fyzickú formu alebo štýl, v ktorom je ovocné občerstvenie
        prezentované.
    fruit_topping_format:
      name: Formát ovocnej polevy/posýpky
      description: Opisuje fyzický tvar, textúru alebo štýl polevy/posýpky, takže
        nakupujúci si môžu vyberať medzi omáčkami, sirupmi, hrubými kúskami ovocia,
        praskajúcimi guľôčkami atď.
    fruit_variety:
      name: Odroda ovocia
      description: Označuje hlavné ovocie použité v recepte/súprave/dodávke ovocného
        vína (napr. jablko, čerešňa, černica).
    fuel_cap_gasket_seal_material:
      name: Materiál tesnenia/uzáveru palivovej nádrže
      description: Určuje materiál použitý na tesnenie/tesniaci krúžok na uzávere
        palivovej nádrže.
    fuel_cap_locking_mechanism:
      name: Uzamykací mechanizmus viečka palivovej nádrže
      description: Označuje spôsob uzamknutia, ktorý používa uzamykateľný uzáver palivovej
        nádrže.
    fuel_cap_type:
      name: Typ viečka palivovej nádrže
      description: Určuje funkčný typ/konštrukciu uzáveru palivovej nádrže používaného
        pri plniacom hrdle palivovej nádrže vozidla.
    fuel_cap_venting:
      name: Odvzdušnenie palivového uzáveru
      description: Označuje, či je uzáver palivovej nádrže odvetrávaný, a ak je to
        relevantné, aj spôsob odvetrávania.
    fuel_filter_features:
      name: Vlastnosti palivového filtra
      description: Uvádza hlavné funkčné vlastnosti palivového filtra (odlučovanie
        vody, vypúšťací ventil, pripojenie pre snímač atď.).
    fuel_filter_media_material:
      name: Materiál média palivového filtra
      description: Určuje primárne filtračné médium použité vo vnútri vložky palivového
        filtra.
    fuel_filter_mounting_connection_type:
      name: Typ montáže/pripojenia palivového filtra
      description: Určuje spôsob pripojenia/inštalácie palivového filtra (na závit/skrutkovací,
        rýchlospojka, hadicová koncovka, spojka banjo atď.).
    fuel_injection_cleaning_method:
      name: Metóda čistenia vstrekovania paliva
      description: Označuje, ako sa súprava používa na čistenie systému vstrekovania
        paliva.
    fuel_injector_electrical_connector_type:
      name: Typ elektrického konektora vstrekovača paliva
      description: Určuje štandard/tvar elektrického konektora vstrekovača.
    fuel_injector_seat_type:
      name: Typ sedla vstrekovača paliva
      description: Určuje štýl rozhrania hrotu/sedla vstrekovača použitého na utesnenie
        sacieho potrubia/rozdeľovača paliva.
    fuel_injector_spray_pattern:
      name: Rozptylový vzor vstrekovacieho ventilu
      description: Označuje vzorec rozstreku/rozvodu paliva vstrekovača pomocou výrobnej
        alebo priemyselnej terminológie (napr. kužeľ, vejár, úzky prúd, viacotvorový).
    fuel_level_sensor_mounting_type:
      name: Typ montáže snímača hladiny paliva
      description: Určuje fyzické montážne rozhranie, ktoré sa používa na pripojenie
        snímača hladiny paliva k palivovej nádrži alebo k modulu čerpadla.
    fuel_level_sensor_sensing_mechanism:
      name: Mechanizmus snímania snímača hladiny paliva
      description: Určuje snímač alebo technológiu používanú na meranie hladiny paliva
        v snímači hladiny paliva alebo v jednotke odosielania.
    fuel_line_compliance_standard:
      name: Norma súladu palivového potrubia
      description: Označuje regulačnú alebo priemyselnú normu, ktorú spĺňa palivové
        potrubie (bežné v námornom použití).
    fuel_line_connector_interface_type:
      name: Typ rozhrania konektora palivového potrubia
      description: Určuje typ pripojenia/rozhrania na koncoch palivového potrubia
        alebo armatúry.
    fuel_pressure_regulator_body_material:
      name: Materiál tela regulátora tlaku paliva
      description: Určuje materiál puzdra/telesa regulátora z hľadiska trvanlivosti
        a odolnosti voči korózii.
    fuel_pressure_regulator_mounting_type:
      name: Typ montáže regulátora tlaku paliva
      description: Určuje, ako je regulátor tlaku paliva namontovaný alebo nainštalovaný,
        čo ovplyvňuje jeho vhodnosť a kompatibilitu.
    fuel_pump_inlet_type:
      name: Typ vstupu palivového čerpadla
      description: Štýl pripojenia na vstupe čerpadla.
    fuel_pump_mounting_location:
      name: Miesto montáže palivového čerpadla
      description: Miesto, kde je palivové čerpadlo namontované v palivovom systéme
        vozidla.
    fuel_pump_outlet_connection_type:
      name: Typ pripojenia výstupu palivového čerpadla
      description: Určuje štýl fyzického pripojenia na výstupe palivového čerpadla
        na účely kompatibility montáže/inštalácie.
    fuel_system_application:
      name: Aplikácia v palivovom systéme
      description: Architektúra palivového systému, pre ktorú je palivové čerpadlo
        navrhnuté (napr. karburátor, EFI, GDI, naftové prívodné/prečerpávacie čerpadlo).
    fuel_system_connection_type:
      name: Typ pripojenia palivového systému
      description: Určuje normu(-y) pripojenia palivového systému alebo rozhranie(-a)
        adaptéra, ktoré súprava podporuje.
    fuel_system_type:
      name: Typ palivového systému
      description: Určuje systém motora pre prívod paliva (napr. architektúra karburátora
        alebo vstrekovania paliva).
    fuel_tank_installation_position:
      name: Poloha montáže palivovej nádrže
      description: Určuje typickú polohu palivovej nádrže vo vozidle.
    fuel_tank_orientation:
      name: Orientácia palivovej nádrže
      description: Určuje, či je palivová nádrž určená na inštaláciu v horizontálnom
        alebo vertikálnom smere.
    fuel_tank_shape:
      name: Tvar palivovej nádrže
      description: Opisuje celkový formát/tvar palivovej nádrže na podporu fyzickej
        zhody a kompatibility pri výmene.
    fur_type:
      name: Typ srsti
      description: Označuje druh alebo umelý materiál akejkoľvek kožušiny na vonkajšej
        strane rukávnika alebo tašky.
    furniture_finish:
      name: Povrchová úprava nábytku
      description: Opisuje ošetrenie alebo povrchovú úpravu použitú na položke nábytku,
        ktorá ovplyvňuje jeho vzhľad a požiadavky na údržbu.
    fuse_form_factor:
      name: Konštrukčné vyhotovenie poistky
      description: Určuje fyzický typ/pôdorys poistky, aby sa zabezpečilo, že zodpovedá
        určenému držiaku poistky alebo poistkovému bloku (napr. čepeľová vs. kazetová).
    fuse_terminal_or_mount_style:
      name: Typ svorky poistky alebo spôsob montáže
      description: Určuje, akým spôsobom je poistka mechanicky/elektricky pripojená
        (zasúvací typ, skrutkovací typ alebo radový typ).
    fusible_application_method:
      name: Metóda nanášania pomocou tavnej fólie
      description: Určuje, ako sa aktivuje/aplikuje taviteľné lepidlo (napr. nažehľovaním,
        zalisovaním alebo vystužením zošitím).
    fusible_hem_tape_application_method:
      name: Spôsob aplikovania tavnej lemovacej pásky
      description: Opisuje, ako sa páska aktivuje/aplikuje (napr. nažehľovaním, tepelným
        lisovaním).
    fusible_seam_tape_activation_method:
      name: Spôsob aktivácie tavnej tesniacej pásky
      description: Označuje, ako sa lepidlo aktivuje počas aplikácie.
    fusible_seam_tape_application:
      name: Aplikácia taviteľnej švovej pásky
      description: Určuje hlavný zamýšľaný spôsob použitia tavnej pásky na švy.
    fusible_seam_tape_material:
      name: Materiál tavnej pásky na švy
      description: Materiál alebo zloženie pásky/tkaniva/nosiča (nie materiál látky,
        na ktorú sa lepí).
    fusible_seam_tape_washability:
      name: Umývateľnosť taviteľnej švovej pásky
      description: Označuje, či zatavený šev zostane po praní alebo čistení neporušený.
    fusible_seam_tape_waterproof_rating:
      name: Vodotesnosť taviteľnej švovej pásky
      description: Označuje, či je páska na švy určená na vytvorenie vodotesného alebo
        vodeodolného švu po aplikácii.
    fusible_tape_backing_type:
      name: Typ podložky z taviteľnej pásky
      description: Určuje, či má páska ochranný krycí papier/vrstvu a akú má formu,
        čo ovplyvňuje manipuláciu a aplikáciu.
    futon_frame_conversion_mechanism:
      name: Mechanizmus zmeny futónového rámu
      description: Definuje mechanizmus alebo konštrukčný štýl použitý na zmenu rámu
        z polohy pohovky, ležadla a postele.
    gaiter_height_type:
      name: Typ výšky návleku
      description: Návleky sa delia podľa dĺžky, ktorú pokrývajú na nohe, napríklad
        po členok, po polovicu lýtka, po kolená alebo po stehná.
    game_variation:
      name: Variácia hry
      description: Určuje štýl hry, pre ktorý je súprava určená (napr. klasický tetherball,
        tether tenis (indiánsky tenis), speedball).
    garlic_preparation_style:
      name: Štýl prípravy cesnaku
      description: Určuje, ako je cesnak pripravený alebo spracovaný pred predajom
        (napr. celý, mletý, práškový).
    garlic_variety:
      name: Odroda cesnaku
      description: Identifikuje ponúkanú botanickú alebo komerčnú odrodu/kultivar
        cesnaku.
    garment_back_style:
      name: Štýl chrbta odevu
      description: Určuje strih alebo konštrukciu chrbta odevu (napr. otvorený chrbát,
        chrbát závodného typu, krížový chrbát).
    garment_pattern_type:
      name: Typ strihu odevu
      description: Určuje typ odevu, na výrobu ktorého je šijací strih určený.
    garnish_type:
      name: Typ ozdoby
      description: Označuje, aká ozdoba (ingrediencia alebo druh ozdoby) sa používa
        na dokončenie kokteilu.
    gas_lift_class:
      name: Trieda plynových vzpier
      description: Špecifikuje bezpečnostné a pevnostné hodnotenie plynového zdvíhacieho
        valca používaného na nastavenie výšky sedadla.
    gas_propellant_type:
      name: Typ plynového hnacieho paliva
      description: Určuje typ odporúčaného alebo kompatibilného hnacieho plynu, keď
        je pištoľ poháňaná plynom.
    gatta_tabla_tuning_block_material:
      name: Materiál ladiacich valčekov Gatta
      description: Materiál ladiacich blokov (gatta) použitých medzi ladiacim pásom
        a korpusom gitary.
    gauge_mounting_type:
      name: Typ montáže meradla
      description: Ako sa palivomer montuje/inštaluje na vodné plavidlo.
    gauge_style:
      name: Štýl meradla
      description: Určuje typ tlakomeru, ktorý čerpadlo používa, napríklad analógový
        číselník, digitálny údaj alebo žiadny.
    gear_oil_api_classification:
      name: Klasifikácia API prevodového oleja
      description: Klasifikácia API GL pre prevodové oleje používané v diferenciáloch/manuálnych
        prevodovkách.
    gel_wax_density_grade:
      name: Stupeň hustoty gélového vosku
      description: Označuje stupeň hustoty gélového vosku, ktorý ovplyvňuje čírosť,
        nosnosť vône a vhodnosť na zapracovanie dekorácií.
    gel_wax_transparency_level:
      name: Úroveň priehľadnosti gélového vosku
      description: Opisuje čírosť/nepriehľadnosť gélového vosku pri použití podľa
        určenia.
    gelatin_form:
      name: Forma želatíny
      description: Podrobne opisuje fyzický vzhľad želatíny, aby si používatelia mohli
        vybrať správny formát pre recepty a priemyselné aplikácie.
    gelatin_or_gelling_agent_source:
      name: Želatína alebo zdroj želírujúcej látky
      description: Označuje pôvod alebo typ želírovacieho činidla použitého vo výrobku,
        čo je dôležité z hľadiska stravovania a náboženských zásad.
    gelatin_source:
      name: Zdroj želatíny
      description: Označuje živočíšny, rastlinný alebo syntetický pôvod želatíny,
        aby si nakupujúci mohli overiť jej kompatibilitu s diétnymi, etickými alebo
        náboženskými požiadavkami.
    gelling_agent:
      name: Želírujúce činidlo
      description: Identifikuje primárnu látku použitú na stuhnutie alebo zahustenie
        dezertu, dôležitú z hľadiska vhodnosti do stravy a textúry.
    gemstone_clarity_grade:
      name: Stupeň čistoty drahokamu
      description: Stupeň čistoty drahokamu (ak je klasifikovaný).
    gemstone_creation_method:
      name: Spôsob výroby drahých kameňov
      description: Označuje, či je drahokam prírodný, vyrobený v laboratóriu alebo
        ide o imitáciu/simuláciu.
    gemstone_cut_style:
      name: Štýl brúsenia drahokamu
      description: Opisuje štýl brúsenia/povrchovú úpravu vzorky drahokamu.
    gemstone_treatment_status:
      name: Stav úpravy drahokamu
      description: Označuje, či a ako bol drahokam upravený/vylepšený.
    geological_period:
      name: Geologické obdobie
      description: Geologické obdobie (a prípadne epocha) fosílie, ak je známe (napr.
        jura, krieda, eocén).
    gift_box_tin_insert_type:
      name: Typ vložky do darčekovej škatule/plechovky
      description: Konfigurácia vnútornej vložky na organizáciu/ochranu položky vnútri
        škatule/plechovky.
    gift_box_tin_sustainability_features:
      name: Prvky udržateľnosti darčekovej škatule/plechovky
      description: Vlastnosti darčekovej krabičky/plechového obalu súvisiace s trvalou
        udržateľnosťou.
    gift_box_tin_window_type:
      name: Darčeková krabička/plechová dóza s okienkom
      description: Či má darčeková krabička priehľadné okienko a aký má štýl.
    gift_message_option:
      name: Možnosť pridať darčekový odkaz
      description: Určuje, či je možné priložiť správu/poznámku o darovaní a ako (žiadna,
        priložená, prispôsobiteľná).
    ginger_maturity:
      name: Zrelosť zázvoru
      description: Označuje fázu zberu zázvoru, či je mladý alebo zrelý, čo ovplyvňuje
        intenzitu chuti a preferované kulinárske použitie.
    ginger_variety:
      name: Odroda zázvoru
      description: Určuje kultivar, typ alebo súvisiaci rizóm v rámci čeľade zázvorovitých
        na rozlíšenie chuťových profilov a kulinárskeho použitia.
    glass_kiln_controller_type:
      name: Typ ovládača sklárskej pece
      description: Typ ovládača teploty/vypaľovania je súčasťou dodávky pece.
    glass_kiln_firing_application:
      name: Použitie sklárskej pece na vypaľovania
      description: Hlavné oblasti spracovania skla, na ktoré je pec určená.
    glass_stone_application_method:
      name: Spôsob nanášania sklenených kamienkov
      description: Určuje, ako sa majú sklenené kamene pripevňovať/aplikovať v projektoch
        (napr. lepením, fixáciou na tepla, prišívaním).
    glass_tint:
      name: Tónovanie skla
      description: Sklenený/plastový odtieň používaný na fľašu na reguláciu vystavenia
        svetlu (bežné pri výrobe piva/vína).
    glaze_firing_atmosphere:
      name: Atmosféra pri vypaľovaní glazúry
      description: Vypaľovacia atmosféra (atmosféry), pre ktorú je glazúra určená.
    glaze_opacity:
      name: Nepriehľadnosť glazúry
      description: Ako priehľadná je glazúra po vypálení.
    glaze_product_form:
      name: Forma produktu glazúry
      description: Fyzikálna forma, v ktorej sa glazúrovací produkt dodáva (napr.
        kvapalina, suchý prášok, koncentrát, sprej).
    glider_avionics_package:
      name: Avionický balík pre vetroň
      description: Označuje celkovú úroveň navigačného a letového prístrojového vybavenia
        nainštalovaného vo vetroni.
    glider_certification_rating:
      name: Certifikačná klasifikácia vetroňov
      description: Oficiálna certifikačná trieda označujúca úroveň bezpečnosti a výkonnosti
        vetroňa (napr. EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Konfigurácia podvozku vetroňa
      description: Určuje konfiguráciu podvozku používaného vetroňom.
    glider_launch_method:
      name: Spôsob štartu vetroňa
      description: Určuje, ako sa vetroň spravidla vypúšťa samovoľne vypúšťa.
    glider_performance_class:
      name: Trieda výkonnosti vetroňa
      description: Súťažná/výkonnostná trieda alebo kategória bežne používaná pre
        vetroň.
    glitter_application_method:
      name: Spôsob použitia glitrov
      description: Uvádza odporúčaný spôsob nanášania/použitia remeselných trblietok
        (napr. posypanie/shaker, vmiešanie, vtlačenie, nanesenie na lepidlo, nanesenie
        štetcom, nanesenie sprejom, zafixovanie teplom/reliéfovanie).
    glitter_eco_friendly_claim:
      name: Tvrdenie týkajúce sa ekologickosti lesku
      description: Environmentálne/ekologické tvrdenia špecifické pre sypké trblietky.
    glitter_effect_type:
      name: Typ trblietavého efektu
      description: Popisuje vizuálny efekt trblietok/flitrov nad rámec základnej farby
        (napr. holografický, dúhový).
    glitter_glue_base_solvent_type:
      name: Typ bázy/rozpúšťadla glitrového lepidla
      description: Opisuje primárny základ trblietavého lepidla (bežné obavy nakupujúceho
        z čistenia a kompatibility materiálov).
    glitter_opacity_coverage:
      name: Nepriehľadnosť/krytie trblietok
      description: Označuje, ako nepriehľadne sa trblietavý efekt javí po nanesení.
    glitter_use_suitability:
      name: Vhodnosť použitia trblietok
      description: Uvádza primárny zamýšľaný alebo schválený spôsob použitia prášku
        s trblietkami (napr. výhradne na remeselné účely, kozmetická kvalita/bezpečný
        pre telo alebo vhodný pre styk s potravinami).
    glove_armor_placement:
      name: Umiestnenie ochranných prvkov na rukavici
      description: Identifikuje, kde sa na rukavici nachádza ochranný pancier.
    glove_cuff_length:
      name: Dĺžka manžety rukavice
      description: Označuje dĺžku krytia manžety/rukavice pretekárskej rukavice na
        zápästí/predlaktí.
    glove_finger_coverage:
      name: Krytie prstov v rukaviciach
      description: Opisuje úroveň krytia prstov, ktorú rukavica poskytuje, od vyhotovenie
        s plnými prstami až po vyhotovenie bez prstov.
    glove_finger_design:
      name: Dizajn prstov v rukaviciach
      description: Určuje konfiguráciu prstov rukavice, napríklad päťprstová alebo
        palčiaková.
    glove_fit_profile:
      name: Profil strihu rukavíc
      description: Popisuje vnútorný tvar a celkový obrys rukavice, aby si hráči mohli
        zvoliť pocit, ktorý im najviac vyhovuje.
    glove_insulation:
      name: Izolácia rukavíc
      description: Určuje izolačné/tepelné vlastnosti rukavíc alebo ich vyhrievanie
        (napr. stupeň izolácie, technológia podšívky/izolácie alebo typ vyhrievania).
    glove_palm_material:
      name: Materiál dlane rukavice
      description: Určuje hlavný materiál použitý na dlani rukavice (hlavný povrch
        kontaktu/úchopu), ktorý sa môže líšiť od chrbta rukavice.
    glove_size:
      name: Veľkosť rukavice
      description: Udáva všeobecnú veľkosť ruky, pre ktorú sú rukavice určené, často
        vyjadrenú veľkostnými kódmi ako pre oblečenie alebo detským číslovaním.
    glove_webbing_style:
      name: Štýl tkaniny rukavice
      description: Definuje dizajn tkaniny alebo vrecka rukavice, ktorý ovplyvňuje
        ovládanie lopty, vhodnosť pozície a preferencie hráča.
    glow_effect:
      name: Žiariaci efekt
      description: Uvádza, či gélové guľôčky svietia v tme alebo majú stopovacie vlastnosti
        pre hranie pri slabom osvetlení.
    glow_plug_connector_type:
      name: Typ konektora žeraviacej sviečky
      description: Typ elektrického vývodu/konektora na žeraviacej sviečke, ktorý
        slúži na pripojenie ku kabeláži vozidla.
    glow_plug_heating_element_type:
      name: Typ vykurovacieho telesa žeraviacej sviečky
      description: Typ/technológia ohrevného prvku používaného v žeraviacej sviečke.
    glue_application_format:
      name: Formát aplikácie lepidla
      description: Určuje spôsob nanášania školského lepidla.
    glue_applicator_type:
      name: Typ aplikátora lepidla
      description: Určuje štýl vstavaného aplikátora/dávkovacieho hrotu používaného
        na nanášanie tekutého lepidla.
    glue_base_formulation:
      name: Zloženie lepidlovej bázy
      description: Určuje základné chemické zloženie/základnú receptúru remeselného
        tekutého lepidla (z hľadiska očakávanej výkonnosti, bezpečnosti a možnosti
        čistenia).
    glue_gun_nozzle_style:
      name: Štýl dýzy lepiacej pištole
      description: Určuje fyzický štýl dýzy lepiacej pištole, ktorý ovplyvňuje presnosť
        aplikácie a pokrytie lepidlom.
    glue_safety_standard:
      name: Bezpečnostná norma lepidla
      description: Označuje, či je lepidlo netoxické/bezpečné pre deti podľa štítka
        a bežných noriem.
    goal_frame_material:
      name: Materiál rámu bránky
      description: Označuje materiál stĺpikov/rámu bránky, ktorý ovplyvňuje hmotnosť,
        prenosnosť a odolnosť voči poveternostným vplyvom.
    goal_size:
      name: Veľkosť cieľa
      description: Rozdeľuje futbalové bránky do skupín podľa štandardných rozmerov
        alebo tréningových rozmerov, čo umožňuje rýchlejší výber než pri použití samotných
        rozmerov.
    goal_size_classification:
      name: Klasifikácia veľkostí bránky
      description: Udáva štandardizovanú veľkostnú triedu bránky (napr. plná regulárna,
        mládežnícka, mini), aby si používatelia mohli rýchlo vybrať vybavenie vhodné
        pre ich úroveň hry.
    goal_size_standard:
      name: Norma veľkosti bránky
      description: Označuje, ktorú oficiálnu alebo vekovú normu bránka spĺňa (napr.
        nariadenie Svetovej plaveckej federácie, 12U).
    goalie_configuration:
      name: Konfigurácia brankára
      description: Udáva počet brankárov na každej strane pri stolnom futbale (napr.
        americký štýl s 3 brankármi vs európsky s 1 brankárom).
    goalie_playing_surface:
      name: Hracia plocha brankára
      description: Určuje primárny hrací povrch alebo prostredie, pre ktoré je súprava
        hokejového brankárskeho vybavenia určená.
    goalkeeper_glove_cut:
      name: Strih brankárskej rukavice
      description: Označuje štýl konštrukcie (strihu) dlane/prstov brankárskych rukavíc,
        ktorý ovplyvňuje strih, pocit z lopty a kontrolu.
    goalkeeper_training_aid_type:
      name: Typ tréningových pomôcok pre brankára
      description: Označuje štýl tréningovej pomôcky brankára a umožňuje presné filtrovanie.
    goblet_drum_playing_style:
      name: Štýl hry na pohárový bubon
      description: Či je nástroj určený predovšetkým na hranie rukami alebo na použitie
        s paličkami/kladivkami.
    gobo_format:
      name: Forma gobo vložky
      description: Určuje veľkosť/štandard gobo vložky, ktorý projektor akceptuje
        (skupina priemeru a hrúbky), čím sa zabezpečí kompatibilita s náhradnými/vlastnými
        gobami.
    gobo_root_variety:
      name: Odroda koreňa lopúcha
      description: Identifikuje konkrétny kultivar alebo odrodu koreňa lopúcha.
    gobo_rotation:
      name: Rotácia gobo vložky
      description: Určuje, či sa gobo môže otáčať a ktoré smery sú podporované.
    goggle_accessory_type:
      name: Typ príslušenstva k okuliarom
      description: Určuje typ príslušenstva (napr. obal, puzdro, remienok), aby nakupujúci
        mohli filtrovať bohatú ponuku produktov v rámci tejto hlavnej kategórie.
    goggle_features:
      name: Vlastnosti ochranných okuliarov
      description: Uvádza špeciálne funkčné alebo dizajnové vlastnosti, ktoré ponúkajú
        ochranné okuliare.
    goggle_fit_design:
      name: Dizajn prispôsobený ochranným okuliarom
      description: Opisuje, ako majú byť ochranné okuliare nasadené alebo nosené,
        vrátane kompatibility s OTG (nosenie na dioptrických okuliaroch).
    goggle_gasket_material:
      name: Materiál tesnenia ochranných okuliarov
      description: Materiál tesnenia, ktoré prilieha k tvári, čo ovplyvňuje pohodlie,
        obavy z alergií a predchádza úniku.
    goggle_integration:
      name: Integrácia s Googlom
      description: Či je prilba navrhnutá na použitie s okuliarmi a/alebo obsahuje
        integrované prvky na ich upevnenie.
    goggle_lens_shape:
      name: Tvar šošovky ochranných okuliarov
      description: Definuje profil zakrivenia náhradnej šošovky, čo ovplyvňuje skreslenie
        a zorné pole (napr. valcové, sférické, torické).
    goggle_lens_tint:
      name: Tónovanie šošoviek okuliarov
      description: Určuje odtieň alebo povrchovú úpravu šošovky, čo ovplyvňuje priepustnosť
        svetla, vnímanie farieb a estetický vzhľad.
    goggle_strap_material:
      name: Materiál popruhu na ochranné okuliare
      description: Primárny materiál použitý na výrobu hlavového popruhu, ktorý ovplyvňuje
        odolnosť a pohodlie.
    golf_accessory_set_purpose:
      name: Účel súpravy golfového príslušenstva
      description: Identifikuje hlavné zamýšľané použitie alebo tému súpravy golfového
        príslušenstva.
    golf_bag_style:
      name: Štýl golfového vaku
      description: Označuje hlavný dizajn alebo štýl použitia golfového vaku (napr.
        stojanový, na kolieskach, profesionálny).
    golf_ball_alignment_design:
      name: Konštrukcia zarovnávacích línií golfovej loptičky
      description: Určuje akúkoľvek vstavanú vizuálnu pomôcku na zarovnanie vytlačenú
        alebo vylisovanú na povrchu loptičky.
    golf_ball_construction:
      name: Konštrukcia golfovej loptičky
      description: Určuje počet vrstiev/kusov použitých v konštrukcii golfovej loptičky,
        čo ovplyvňuje rotáciu, dotyk a vzdialenosť.
    golf_ball_cover_material:
      name: Materiál obalu golfovej loptičky
      description: Určuje materiál vonkajšieho obalu golfovej loptičky, ktorý ovplyvňuje
        rotáciu, odolnosť a pocit pri údere.
    golf_cart_cover_climate_use:
      name: Použitie krytu golfového vozíka podľa klimatických podmienok
      description: Označuje hlavné klimatické podmienky/ročné obdobie, pre ktoré je
        úložný kryt navrhnutý.
    golf_cart_enclosure_fit_type:
      name: Typ krytu golfového vozíka
      description: Určuje, či je kryt navrhnutý pre konkrétny počet/formát sedadiel
        alebo ponúka univerzálne/nastaviteľné uloženie.
    golf_cart_intended_use:
      name: Zamýšľané použitie golfového vozíka
      description: Primárne zamýšľané použitie, na ktoré je golfový vozík navrhnutý
        alebo konfigurovaný.
    golf_club_number:
      name: Číslo golfovej palice
      description: Určuje konkrétne číslo alebo označenie typu palice vytlačené na
        palici (napr. 5, PW, GW).
    golf_club_part_type:
      name: Typ časti golfovej palice
      description: Kategorizuje príslušenstvo alebo komponent golfovej palice do bežných
        podtypov (napr. adaptér, objímka, ferula, závažie).
    golf_grip_size:
      name: Veľkosť golfového gripu
      description: Určuje celkovú kategóriu vonkajšej veľkosti golfového gripu, ktorá
        udáva, ako hrubo pôsobí grip v ruke.
    golf_shoe_spike_type:
      name: Typ hrotu pre golfovú obuv
      description: Určuje typ protisklzového systému použitý na podrážke golfových
        topánok (napr. s hrotmi alebo bez hrotov).
    golf_tee_style:
      name: Štýl golfového trička
      description: Opisuje štrukturálny alebo funkčný štýl/dizajn golfového odpaliska,
        ktorý ovplyvňuje výšku loptičky, odolnosť alebo zníženie rotácie.
    golf_training_focus:
      name: Zameranie na golfový tréning
      description: Klasifikuje primárnu zručnosť alebo aspekt, ktorý sa má produktom
        zlepšiť.
    golf_training_objective:
      name: Cieľ golfového tréningu
      description: Označuje základnú golfovú zručnosť alebo aspekt, ktorý sa má pomocou
        tréningových pomôcok zlepšiť.
    gong_profile_type:
      name: Typ profilu gongu
      description: Opisuje fyzický profil operného gongu (napr. plochý verzus vyvýšený
        stred), ktorý silne ovplyvňuje tón a štýl hry.
    grading_scale:
      name: Stupnica klasifikácie
      description: Hodnotiaca stupnica použitá pri klasifikovanej investičnej minci
        (napr. Sheldonova stupnica 1–70).
    grading_service:
      name: Služba klasifikácie
      description: Nezávislá hodnotiaca/certifikačná služba pre mincu alebo bankovku
        (e.g., PCGS, NGC).
    graduation_increment:
      name: Dielik stupnice
      description: Určuje najmenší tlačený/gravírovaný dielik na stupnici švového
        pravítka (rozlíšenie značiek).
    grain_processing_method:
      name: Spôsob spracovania obilia
      description: Určuje hlavný spôsob spracovania zrna (napr. predvarené, valcované,
        naklíčené), ktorý ovplyvňuje čas varenia, textúru a nutričné hodnoty.
    grand_piano_soundboard_material:
      name: Materiál rezonančnej dosky koncertného krídla
      description: Primárny materiál použitý na rezonančnú dosku klavíra, čo má vplyv
        na tón a trvácnosť.
    grappling_dummy_pose:
      name: Póza tréningovej figuríny
      description: Opisuje predvolenú polohu tela/postoj figuríny a určuje, ktoré
        cvičenia a techniky podporuje.
    grease_application:
      name: Aplikácia tuku
      description: Určuje primárny komponent vozidla alebo prípad použitia, pre ktorý
        je mazivo určené.
    grease_consistency_grade_nlgi:
      name: Stupeň konzistencie maziva (NLGI)
      description: Určuje číslo konzistencie podľa NLGI označujúce pevnosť maziva
        (napr. NLGI 2 je bežné viacúčelové).
    grease_thickener_type:
      name: Typ zahusťovadla tuku
      description: Identifikuje systém zahusťovadla/mydla použitý v receptúre plastického
        maziva.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Typ ventila dúchadla škótskych gájd
      description: Určuje systém jednosmerného ventilu použitý v dúchavke.
    great_highland_bagpipes_drone_configuration:
      name: Konfigurácia dronu pre škótske gajdy
      description: Určuje typy dronov zahrnutých v súprave.
    great_highland_bagpipes_mounting_material:
      name: Montážny materiál pre škótske gajdy
      description: Určuje materiál, z ktorého sú vyrobené ozdobné prvky na gajdách
        (napr. niklové striebro, imitácia slonoviny).
    greens_maturity_stage:
      name: Fáza zrelosti listovej zeleniny
      description: Označuje vývojové štádium listov pri zbere.
    greens_preparation_state:
      name: Stav prípravy greenov
      description: Opisuje, ako sa listová zelenina spracováva alebo balí (napr. vopred
        umytá, nasekaná, pripravená na konzumáciu).
    grenade_effect_type:
      name: Typ efektu granátu
      description: Označuje primárny funkčný efekt, ktorý paintballový granát vyvolá
        po aktivácii (napr. dym, farba, záblesk).
    grid_unit:
      name: Jednotka mriežky
      description: Primárny systém merania vytlačený na podložke (ak je k dispozícii
        mriežka/stupnica).
    grille_emblem_provision:
      name: Priestor na emblém na mriežke
      description: Určuje, či mriežka podporuje umiestnenie OEM emblému/značky a ako.
    grille_mounting_method:
      name: Metóda montáže grilu
      description: Určuje, ako sa mriežka inštaluje na vozidlo (napr. priama výmena
        verzus vloženie/prekrytie; priskrutkovanie verzus spona/nacvaknutie; potrebné
        vŕtanie verzus nie je potrebné vŕtanie).
    grille_style:
      name: Štýl grilu
      description: Určuje vizuálny/dizajnový štýl mriežky chladiča vozidla.
    grip_chalk_form:
      name: Forma športovej kriedy
      description: Určuje fyzickú podobu kriedy dodávanej alebo používanej spolu s
        vreckom.
    grip_coverage:
      name: Pokrytie úchopu
      description: Identifikuje prítomnosť a umiestnenie silikónových alebo pogumovaných
        uchopovacích prvkov na ponožke.
    grip_design:
      name: Dizajn rukoväte
      description: Určuje usporiadanie úchytov alebo otvorov na doske, čo uľahčuje
        prenášanie a rozširuje možnosti cvičenia.
    grip_enhancer_effect:
      name: Účinok zosilnenia priľnavosti
      description: Opisuje hlavnú funkčnú vlastnosť, ktorú produkt ponúka (napr. absorpciu
        vlhkosti alebo povrchovú úpravu lepivou živicou).
    grip_enhancer_form:
      name: Forma posilnenia úchopu
      description: Identifikuje fyzickú formu alebo formát produktu na zlepšenie priľnavosti,
        aby si športovci mohli vybrať vhodnú metódu aplikácie.
    grip_features:
      name: Vlastnosti rukoväte
      description: Označuje integrované prvky úchopu/rukoväte, ktoré slúžia na zlepšenie
        priľnavosti, pohodlia alebo kontroly počas hry.
    grip_material:
      name: Materiál úchopu
      description: Identifikuje materiál použitý na úchopovú plochu nohavíc.
    grip_shape:
      name: Tvar úchopu
      description: Opisuje prierezový tvar alebo štýl úchopu, čo je dôležité najmä
        v prípade rukovätí putterov.
    grip_surface_type:
      name: Typ povrchu rukoväte
      description: Opisuje dizajn dezénu/trakcie plochy pedálu, ktorý ovplyvňuje priľnavosť
        a pocit z jazdy.
    grip_tackiness_level:
      name: Úroveň priľnavosti úchopu
      description: Hodnotí, nakoľko je povrchová úprava rukoväte priľnavá alebo klzká,
        čím pomáha hráčom vybrať si medzi suchým pocitom a mimoriadne priľnavým vyhotovením.
    grip_tape_form:
      name: Forma protišmykovej pásky
      description: Uvádza formu doručenia protisklzovej pásky (napr. platňa, kotúč,
        sprejovacia súprava).
    grip_wax_form:
      name: Forma vosku na úchop
      description: Uvádza fyzickú formu, v akej sa vosk na úchop predáva.
    gripper_coverage:
      name: Dosah grippera
      description: Určuje štýl upínača na protišmykovej obuvi, čo označuje pokrytie
        povrchu a odstrániteľnosť.
    grommet_application_material:
      name: Materiál na aplikáciu priechodky
      description: Hlavné materiály, do ktorých sú priechodky určené na montáž (napr.
        textília, koža, vinyl, plachta/plátno).
    grommet_duty_rating:
      name: Trvácnosť priechodky
      description: Uvádza zamýšľanú pevnosť/triedu použitia priechodky.
    grommet_style:
      name: Štýl priechodky
      description: Štýl konštrukcie súpravy priechodiek (spôsob montáže/používania).
    grooming_glove_texture_type:
      name: Typ textúry rukavíc na úpravu srsti
      description: Identifikuje primárnu textúru povrchu použitú na úpravu srsti,
        pričom uvádza zamýšľaný účel, ako je drhnutie, leštenie alebo umývanie.
    groove_orientation:
      name: Orientácia drážok
      description: Opisuje smer/rozloženie drážok alebo výstupkov na nástroji.
    groove_sampler_onboard_effects:
      name: Vstavané efekty groove samplera
      description: Označuje kategórie vstavaných efektov spracovania dostupných na
        groove sampleri (insert/master), ako napríklad reverb, delay, kompresia, skreslenie,
        ekvalizér, filtrovanie.
    groove_sampler_storage_expansion_type:
      name: Typ rozšírenia úložiska groove samplera
      description: Určuje možnosti vymeniteľného/rozšíriteľného úložiska, ktoré vzorkovač
        drážok podporuje.
    ground_attachment_method:
      name: Spôsob upevnenia k zemi
      description: Opisuje, ako je tréningový oblúk upevnený k hracej ploche, čo ovplyvňuje
        stabilitu a kompatibilitu s povrchom.
    groupset_components_included:
      name: Vrátane súčastí skupinovej sady
      description: Uvádza zoznam konkrétnych komponentov pohonu zahrnutých v súprave,
        aby zákazníci rozumeli obsahu balenia.
    gt_racing_class:
      name: Pretekárska trieda GT
      description: Určuje kategóriu/triedu GT, pre ktorú je vozidlo vyrobené alebo
        homologizované.
    guard_construction_type:
      name: Typ konštrukcie zábrany
      description: Či ide o chránič s tvrdým plášťom, mäkkú vložku zbroje alebo dizajn
        v štýle rukávu/remienka.
    guard_size_measurement_basis:
      name: Základ pre meranie veľkosti chrániča
      description: Na akom rozmere sa zakladá veľkostná tabuľka (napr. obvod lakťa,
        obvod zápästia, obvod predlaktia).
    guard_style:
      name: Štýl chrániča
      description: Klasifikuje konštrukciu alebo typ chrániča čepele korčule, aby
        sa pomohlo nakupujúcim rýchlo rozlíšiť tvrdé chrániče na chôdzu, mäkké chrániče,
        pružinové chrániče a iné typy.
    guava_flesh_color:
      name: Farba dužiny guavy
      description: Označuje vnútornú farbu dužiny plodu guava.
    guava_variety:
      name: Odroda guavy
      description: Identifikuje konkrétny druh alebo odrodu guavy, ktorá sa predáva
        (napr. jablková guava, mexická smotanová, thajská, ružová, bezsemenná, biela).
    guide_material:
      name: Materiál zábrany
      description: Materiál použitý na vodiace očká alebo vložky prúta.
    guide_type:
      name: Typ vodiaceho očka
      description: Určuje typ vodiacich očiek na rybárskom prúte, napríklad s jednou
        nožičkou, ramienkom, valčekové alebo hadovité.
    guideline_markings:
      name: Orientačné značenie
      description: Druh vizuálnych orientačných značiek, ktoré sú vytlačené alebo
        vyryté na povrchu podložky na nadhadzovanie a slúžia na uľahčenie tréningu
        nadhadzovania.
    guiro_scraper_material:
      name: Materiál škrabky pre guiro
      description: Materiál priloženej alebo odporúčanej škrabky/úderníka používaného
        s guirom.
    guiro_surface_style:
      name: Štýl povrchu guira
      description: Opisuje vzor/geometriu hracej plochy, ktorá sa škrabe za účelom
        vytvorenia zvuku.
    guitar_body_finish_type:
      name: Typ povrchovej úpravy tela gitary
      description: Určuje povrchovú úpravu použitú na tele gitary.
    guitar_bridge_system_type:
      name: Typ systému gitarovej kobylky
      description: Rodina konštrukčných riešení kobyliek a strunníkov na účely kompatibility
        a prehľadávania.
    guitar_case_style:
      name: Štýl puzdra na gitaru
      description: Určuje celkový štýl ochrany/konštrukcie puzdra na gitaru alebo
        tašky na gitaru.
    guitar_humidifier_placement:
      name: Umiestnenie gitarového zvlhčovača
      description: Určuje, kam sa má zvlhčovač používať/umiestniť vzhľadom na nástroj
        alebo prostredie.
    guitar_pedal_i_o_configuration:
      name: Konfigurácia vstupov/výstupov gitarového pedálu
      description: Označuje, či pedál podporuje mono alebo stereo vstupno-výstupné
        smerovanie.
    guitar_pedal_output_connector_type:
      name: Typ výstupného konektora pre gitarový pedál
      description: Určuje typ výstupného audio konektora používaného pedálom.
    guitar_slide_finish:
      name: Úprava gitarového slajdu
      description: Povrchová úprava slidu, ktorá ovplyvňuje pocit pri dotyku a trení
        o struny.
    guitar_slide_style:
      name: Štýl gitarového slajdu
      description: Určuje tvar gitarového slidu alebo tónovej lišty a spôsob, akým
        sa nosí/používa.
    guitar_stand_type:
      name: Typ stojana na gitaru
      description: Určuje základný tvar stojana na gitaru (ako na ňom gitaru drží/uchováva).
    guitar_strap_attachment_type:
      name: Typ upevnenia gitarového popruhu
      description: Určuje, ako sa popruh pripevňuje ku gitare (alebo koncovému kolíku
        popruhu), vrátane toho, či používa tradičné konce alebo systémy rýchleho uvoľnenia.
    guitar_strap_end_material:
      name: Materiál koncovky gitarového popruhu
      description: Materiál použitý na koncoch popruhov/výstupkoch (časti, ktoré sa
        pripevňujú ku kolíku na popruh alebo systémom zámok popruhu).
    guitar_strap_features:
      name: Vlastnosti gitarového popruhu
      description: Významné funkčné vlastnosti gitarového popruhu okrem základných
        parametrov, ako sú veľkosť a materiál (možnosť výberu viacerých možností).
    guitar_string_coating:
      name: Povlak gitarovej struny
      description: Uvádza, či sú struny opatrené ochranným povlakom, a prípadne aj
        typ povlaku.
    guitar_string_gauge_type:
      name: Typ hrúbky strún na gitaru
      description: Kategória hrúbky strún v súprave strún pre akustickú gitaru (napr.
        extra ľahké, ľahké, stredné).Často sa odhaduje na základe hrúbky struny vysokého
        E; presné rozmery sa môžu líšiť v závislosti od výrobcu.
    guitar_string_set_gauge_category:
      name: Kategória hrúbky súpravy gitarových strún
      description: Bežné rozmerové rady strún v súprave gitarových strún (zvyčajne
        odvodené od vysokého E/1. struny).
    guitar_string_winding_type:
      name: Typ vinutia gitarových strún
      description: Určuje štýl vonkajšieho vinutia vinutých strún v súprave.
    guitar_tuning_peg_button_shape:
      name: Tvar koncovky ladiaceho kolíka gitary
      description: Tvar/štýl ladiaceho kľúča/koncovky.
    guitar_tuning_peg_configuration:
      name: Usporiadanie ladiacich kolíkov na gitare
      description: Umiestnenie súpravy ladiacich mechaník na hlave.
    guitar_tuning_peg_mounting_style:
      name: Štýl upevnenia ladiacich kolíkov na gitare
      description: Ako sa ladiaca mechanika upevňuje k hlave (typ puzdra a spôsob
        zaistenia proti otáčaniu).
    guitar_tuning_peg_shaft_type:
      name: Typ hriadeľa ladiaceho kolíka na gitare
      description: Či je kolík struny celistvý alebo rozdelený a ako je struna upevnená.
    guitar_tuning_peg_style:
      name: Štýl ladiacich kolíkov na gitare
      description: Typ mechaniky a spôsob upevnenia na hlave nástroja (napr. uzavretý
        alebo otvorený mechanizmus, s aretáciou, s rozdeleným kolíkom).
    gum_condition:
      name: Stav ďasien
      description: Stav lepiacej vrstvy na zadnej strane známky (napr. nikdy nebola
        nalepená, bola nalepená, bez lepiacej vrstvy).
    gun_action_type:
      name: Typ mechanizmu zbrane
      description: Typ mechanizmu používaného na nabíjanie/výstrel (napr. opakovací,
        pákový).
    gun_operational_status:
      name: Prevádzkový stav zbrane
      description: Uvádza, či je zberateľská zbraň deaktivovaná/neschopná streľby
        (a ako je prezentovaná).
    gun_type:
      name: Typ zbrane
      description: Určuje všeobecný tvar starožitnej zbrane.
    gusset_material:
      name: Materiál výstuhy
      description: Určuje materiál použitý na podšívku v rozkroku, ktorý ovplyvňuje
        priedušnosť, hygienu a pohodlie.
    gymnastics_discipline:
      name: Gymnastická disciplína
      description: Určuje druh gymnastiky, pre ktorý je produkt určený (napr. umelecká,
        rytmická, akrobatická).
    hair_extension_texture:
      name: Textúra predlžovaných vlasov
      description: Opisuje kučeravý, vlnitý alebo textúrovaný vzor predlžovaných prameňov.
    hair_net_style:
      name: Štýl sieťky na vlasy
      description: Určuje štýl dizajnu alebo konštrukcie sieťky na vlasy (napr. naberaná
        sieťka, sieťka kryjúca vlasy na zátylku, sieťka na drdol).
    hair_quality_grade:
      name: Stupeň kvality vlasov
      description: Označuje vymedzenia kvality a pôvodu vlasov používané v odvetví.
    halter_style:
      name: Štýl viazania okolo krku
      description: Určuje funkčný alebo dizajnový štýl ohlávky (napr. povrazová, s
        bezpečnostným mechanizmom, výstavná), čím pomáha nakupujúcim vybrať si ohlávku
        vhodnú na zamýšľané použitie.
    hammock_style:
      name: Štýl hojdacej siete
      description: Opisuje štrukturálny štýl alebo konštrukciu hojdacej siete.
    hand_and_foot_coverage:
      name: Pokrytie rúk a nôh
      description: Opisuje integrované alebo odnímateľné rukavice a topánky, ktoré
        zakrývajú ruky a/alebo nohy.
    hand_cymbal_set_configuration:
      name: Konfigurácia sady ručných čínelov
      description: Uvádza, či sa produkt predáva ako pár, ako samostatný činel alebo
        ako väčšia súprava.
    hand_drum_head_material:
      name: Materiál blany ručného bubna
      description: Materiál blany (membrány) používaný na bubne typu goblet.
    hand_exerciser_style:
      name: Typ posilňovača na ruky
      description: Klasifikuje celkový štýl alebo mechanizmus posilňovača rúk.
    hand_guard_backbone_material:
      name: Materiál nosnej konštrukcie chrániča rúk
      description: Materiál nosnej konštrukcie (ak je súčasťou výbavy), ktorý určuje
        pevnosť a ochranu.
    hand_guard_coverage_style:
      name: Štýl krytia chrániča rúk
      description: Opisuje rozsah krytia/tvar chrániča rúk, ktorý ovplyvňuje ochranu
        pred vetrom a nárazmi.
    hand_guard_mounting_type:
      name: Typ upevnenia chrániča rúk
      description: Určuje spôsob upevnenia chráničov rúk na motocykel (napr. upevnenie
        na koncoch riadidiel s vnútornou svorkou alebo iba so svorkou).
    hand_guard_set_configuration:
      name: Konfigurácia sady chráničov rúk
      description: Či sa produkt predáva ako ľavý/pravý pár alebo ako jedna strana.
    hand_guard_style:
      name: Štýl chrániča rúk
      description: Opisuje dizajn pokrytia alebo štýl ochranného krytu (napr. zatvorený,
        otvorený, plný, ľahký, štandardný).
    hand_guard_weather_protection:
      name: Chránič rúk na ochranu proti poveternostným vplyvom
      description: Označuje zamýšľanú ochranu pred poveternostnými vplyvmi, ktorú
        poskytujú chrániče rúk.
    hand_paddle_strap_type:
      name: Typ popruhu pre ručnú páčku
      description: Určuje typ popruhu alebo absenciu popruhu, ktorý sa používa na
        upevnenie ručnej lopatky k ruke používateľa.
    hand_percussion_mount_attachment_mechanism:
      name: Mechanizmus upevnenia držiaka na ručné perkusie
      description: Určuje, ako sa držiak pripevňuje k stojanu, podstavcu alebo inému
        hardvéru (napr. upínací držiak alebo držiak na tyč).
    hand_percussion_mounting_handling:
      name: Montáž/manipulácia s ručnými perkusiami
      description: Či je nástroj pri bežnom používaní držaný v ruke, nosený na tele,
        upevnený alebo umiestnený na stole či na podlahe.
    hand_percussion_pitch_type:
      name: Typ výšky tónu pre ručné perkusie
      description: Označuje, či nástroj produkuje jednoznačnú (laditeľnú/noty) alebo
        neurčitú výšku tónu.
    hand_percussion_playing_method:
      name: Metóda hry na ručné perkusie
      description: Ako sa na nástroji zvyčajne hrá, aby sa vytvoril zvuk (napr. trasenie
        alebo škrabanie).
    hand_percussion_set_configuration:
      name: Konfigurácia súpravy ručných perkusií
      description: Či ide o jeden nástroj, pár nástrojov alebo viacdielnu súpravu.
    hand_percussion_size_class:
      name: Veľkostná kategória ručných perkusií
      description: Všeobecná kategória veľkosti nástroja, keď nie je k dispozícii
        presný rozmer alebo na jednoduché filtrovanie.
    hand_sewing_needle_point_type:
      name: Typ hrotu ihly na ručné šitie
      description: Tvar/typ ihly na ručné šitie, ktorá sa používa na prepichovanie
        rôznych materiálov (napr. tkanín, úpletov, kože) alebo priadzí.
    hand_support_level:
      name: Úroveň opierky na ruku
      description: Určuje stupeň podpory alebo kompresie poskytovanej rukavicou, obalom
        alebo popruhom.
    hand_support_size:
      name: Veľkosť opierky na ruku
      description: Veľkosť rukavíc, remienkov alebo bandáží deklarovaná výrobcom (XS – XXL
        alebo univerzálna veľkosť).
    handball_ball_type:
      name: Typ hádzanárskej lopty
      description: Označuje zamýšľanú kategóriu použitia hádzanárskej lopty, napríklad
        zápas, tréning alebo pláž.
    handball_playing_surface:
      name: Hracia plocha hádzanárskej lopty
      description: Označuje hracie povrchy, pre ktoré je hádzanárska lopta optimalizovaná.
    handball_target_type:
      name: Typ terča na hádzanú
      description: Určuje štýl alebo dizajn streleckého terča určeného na tréning
        hádzanej.
    handbrake_actuation_type:
      name: Typ ovládania ručnej brzdy
      description: Určuje, ako sa aktivuje parkovacia brzda.
    handbrake_orientation:
      name: Orientácia ručnej brzdy
      description: Určuje, či je ručná brzda určená pre vozidlá s ľavostranným alebo
        pravostranným riadením, alebo je univerzálna.
    handgun_grip_material:
      name: Materiál rukoväte pištole
      description: Primárny materiál rukovätí/panelov pištole.
    handle_configuration:
      name: Konfigurácia rukovätí
      description: Opisuje konštrukčný štýl rukoväte na wakeboard (napr. jednoduchá,
        dvojitá, v tvare Deep-V, s T-vinutím), vďaka čomu si nakupujúci môžu vybrať
        model zodpovedajúci ich zručnostiam, trikom alebo typu dosky.
    handle_ergonomics:
      name: Ergonómia rukoväte
      description: Popisuje ergonomické vlastnosti rukoväte, ktoré majú zvýšiť pohodlie
        a zlepšiť ovládateľnosť.
    handle_grip_material:
      name: Materiál časti rukoväte určenej na úchop
      description: Určuje materiál použitý na úchopovej ploche rukoväte, ktorý ovplyvňuje
        pohodlie a priľnavosť, najmä za mokra.
    handle_grip_type:
      name: Typ časti rukoväte určenej na úchop
      description: Určuje povlak/materiál rukoväte alebo povrchovú úpravu, ktorých
        cieľom je zvýšiť pohodlie a ovládateľnosť.
    handle_shape:
      name: Tvar rukoväte
      description: Tvar alebo profil rukoväte v priečnom reze.
    handlebar_design:
      name: Konštrukcia uchopovacej lišty
      description: Určuje typ uchopovacích líšt na stepperi, napríklad žiadne, pevné,
        s nastaviteľnou výškou, skladacie alebo s úchytmi na odporové pásy.
    handlebar_type:
      name: Typ riadidiel
      description: Určuje typ riadidiel namontovaných na bicykli, čo ovplyvňuje jazdeckú
        polohu, ovládateľnosť a pohodlie.
    handslide_bore_type:
      name: Typ otvoru na znižec
      description: Určuje, či basový trombón používa jednootvorový alebo dvojotvorový
        znižec.
    handwear_cuff_style:
      name: Štýl manžety pokrývky rúk
      description: Opisuje spôsob spracovania manžety alebo zápästia u rukavíc alebo
        palčiakov, čo ovplyvňuje ich pokrytie a prispôsobenie sa ruke.
    handwear_insulation_material:
      name: Izolačný materiál pokrývky rúk
      description: Označuje izolačný alebo podšívkový materiál použitý vo vnútri rukavíc
        alebo palčiakov.
    handwear_size:
      name: Veľkosť rukavíc
      description: Určuje veľkosť rukavíc alebo inej pokrývky rúk pre zabezpečenie
        správneho prispôsobenia.
    hang_glider_design:
      name: Konštrukcia závesného klzáka
      description: Klasifikuje konštrukčný typ klzáka (napr. s ohybným krídlom, s
        tuhým krídlom, motorový).
    hanger_thread_size:
      name: Veľkosť závitu závesu
      description: Uvádza veľkosť závitu/normu použitú na upevnenie závesu k podperám
        alebo signalizátorom záberu, čím sa zaručuje kompatibilita.
    hanging_suspension_method:
      name: Metóda závesného upevnenia
      description: Určuje hlavný hardvér alebo systém používaný na zavesenie hojdačky
        (napr. lano, reťaz, rám stojana).
    hardtop_finish_type:
      name: Typ povrchovej úpravy pevnej strechy
      description: Určuje stav vonkajšej povrchovej úpravy pevnej strechy (napr. základný
        náter alebo lak), čo ovplyvňuje pripravenosť na inštaláciu a vzhľad.
    hardtop_shell_material:
      name: Materiál plášťa pevnej strechy
      description: Určuje primárny materiál pevného plášťa pevnej strechy vozidla
        (nie žiadnu kryciu látku), ako napríklad sklolaminát alebo hliník.
    hardtop_window_configuration:
      name: Konfigurácia okien pevnej strechy
      description: Opisuje, aké okná sú súčasťou pevnej strechy a ich konfiguráciu.
    harmonica_comb_material:
      name: Materiál hrebeňa harmoniky
      description: Materiál použitý na výrobu hrebeňa harmoniky (telo vzduchovej komory).
    harmonica_cover_plate_finish:
      name: Povrchová úprava krycej platničky harmoniky
      description: Určuje povrchovú úpravu alebo náter krycích platničiek harmoniky.
    harmonica_cover_plate_material:
      name: Materiál krycej dosky harmoniky
      description: Materiál použitý na vonkajšie krycie platničky.
    harmonica_finish:
      name: Úprava povrchu harmoniky
      description: Povrchová úprava krycích platničiek/tela harmoniky.
    harmonica_included_accessories:
      name: Súčasťou harmoniky je príslušenstvo
      description: Uvádza, aké príslušenstvo je súčasťou balenia harmoniky.
    harmonica_note_range:
      name: Tónový rozsah harmoniky
      description: Klasifikácia rozsahu nástroja používaná v orchestri (napr. bas,
        barytón, tenor).
    harmonica_reed_plate_material:
      name: Materiál plátku harmoniky
      description: Materiál použitý na výrobu jazýčkových dosiek (napr. mosadz, nehrdzavejúca
        oceľ, hliník).
    harmonica_system_type:
      name: Systém/typ harmoniky
      description: Určuje systém alebo typ orchestrálnej harmoniky (napr. akordová,
        basová, barytónová, polyfonická).
    harmonica_tuning_system:
      name: Systém ladenia harmoniky
      description: Určuje ladenie/systém ladenia používaný na harmonike (napr. Richterovo,
        sólové alebo orchestrálne ladenie).
    harness_shell_type:
      name: Typ plášťa postroja
      description: Opisuje tuhosť konštrukcie plášťa postroja (napr. mäkký plášť,
        tvrdý plášť, kombinácia).
    harness_style:
      name: Štýl postroja
      description: Definuje štrukturálny štýl/dizajn postroja, napr. pásový, sedací,
        hrudník/vesta, wing belt, boardshort alebo hybridný.
    harness_type:
      name: Typ postroja
      description: Rozdeľuje lezecké postroje podľa konštrukčného typu, napríklad
        sedacie, celotelové alebo hrudné.
    harp_action_type:
      name: Typ mechanizmu harfy
      description: Hlavný mechanizmus používaný na zmenu výšky tónu/posuviek na harfe.
    harp_finish:
      name: Povrchová úprava harfy
      description: Povrchová úprava tela harfy (napr. prírodná, morená, s náterom,
        lakovaná).
    harp_included_accessories:
      name: Súčasťou harfy je príslušenstvo
      description: Zoznam príslušenstva dodávaného v balení pedálovej harfy.
    harvest_method:
      name: Metóda zberu
      description: Označuje, či boli morské plody ulovené vo voľnej prírode, dochované
        na farme alebo získané iným spôsobom.
    harvest_stage:
      name: Fáza zberu
      description: Špecifikuje štádium rastu, v ktorom bola rukola zozbieraná, ako
        napríklad mikrobylinka, mladé lístky alebo zrelý zväzok.
    hat_style:
      name: Štýl klobúka
      description: Konštrukcia/štýl párty klobúčika alebo čiapky (napr. kužeľový klobúčik,
        korunka, cylinder, šilt), ktorý odráža to, ako daný predmet v zásade vyzerá.
    hazard_signal_mode:
      name: Režim výstražného signálu
      description: Voliteľné režimy svietenia/režimy pre LED/elektronické výstražné
        svetlá.
    head_configuration:
      name: Konfigurácia hlavy
      description: Určuje, či je hlava sekery vybavená teslicou, kladivom, oboma alebo
        žiadnym z nich, čo priamo ovplyvňuje jej funkčnosť na ľade a v zmiešanom teréne.
    head_material:
      name: Materiál hlavy
      description: Materiál hracej hlavy dodávanej s nástrojom quinto.
    head_movement_type:
      name: Typ pohybu hlavy
      description: Schopnosť smerového pohybu hlavy dvojnožky alebo tyče (napr. otáčanie,
        predozadný náklon, postranný náklon).
    head_side:
      name: Strana hlavy
      description: Určuje, či je blana určená pre stranu s paličkou, rezonančnú (prednú)
        stranu, alebo pre obe strany.
    head_weight_style:
      name: Štýl závažia hlavy
      description: Určuje rozloženie hmotnosti v oblasti hlavy mušky, čo ovplyvňuje
        rýchlosť klesania a prezentáciu.
    headband_embellishment:
      name: Ozdoba čelenky
      description: Označuje ozdobné prvky pripevnené k čelenke (napr. mašle, perly,
        kamienky, zvieracie uši).
    headboard_style:
      name: Štýl čelnej dosky
      description: Opisuje dizajn alebo štýl konštrukcie čela postele, ktoré je súčasťou
        dodávky.
    headgear_strap_configuration:
      name: Konfigurácia popruhov prilby
      description: Uvádza počet popruhov použitých na upevnenie zápasníckej prilby.
    headjoint_crown_style:
      name: Štýl korunky hlavy
      description: Určuje štýl alebo dizajn korunky hlavy flauty (koncovky), čo môže
        ovplyvniť vzhľad a hmotnosť/vyváženosť.
    headjoint_pitch_standard:
      name: Štandard ladenia hlavy
      description: Uvádza štandard ladenia hlavy (napr. A=440 alebo A=442).
    headliner_product_form:
      name: Forma hlavného produktu
      description: Špecifikuje, či je produkt kompletnou formovanou zostavou stropného
        čalúnenia, náhradnou látkou alebo komponentom na opravu či lemovanie.
    headrest_mount_attachment_method:
      name: Spôsob upevnenia držiaka opierky hlavy
      description: Určuje spôsob upevnenia držiaka k opierke hlavy alebo sedadlu.
    headrest_provision:
      name: Dodávka opierky hlavy
      description: Uvádza, či sú súčasťou výbavy opierky hlavy a/alebo či sú k dispozícii
        upevňovacie body pre opierky hlavy.
    headset_standard:
      name: Štandard hlavového zloženia
      description: Typ spojenia hlavovej trubky a hlavového zloženia použitý v ráme.
    headstall_style:
      name: Typ náčelníka
      description: Klasifikuje konštrukčný dizajn alebo konfiguráciu náčelníka v oblasti
        uší/čela.
    headwear_intended_use:
      name: Určenie použitia hlavového dielu
      description: Uvádza hlavný dôvod alebo kontext nosenia turbanu (napr. vypadávanie
        vlasov v dôsledku chemoterapie, plávanie, náboženské dôvody).
    hearing_enhancer_style:
      name: Typ pomôcky na zlepšenie sluchu
      description: Opisuje fyzický tvar zariadenia, aby si používatelia mohli vybrať
        medzi modelmi cez ucho, do ucha, poza hlavu a ďalšími prevedeniami.
    heart_rate_monitoring_method:
      name: Spôsob monitorovania srdcovej frekvencie
      description: Určuje, ako zariadenie zaznamenáva údaje o srdcovej frekvencii
        počas tréningov.
    heart_rate_sensing_technology:
      name: Technológia snímania srdcovej frekvencie
      description: Určuje fyziologickú metódu merania, ktorú monitorovacie zariadenie
        používa na detekciu srdcovej frekvencie (napr. elektrické EKG alebo optické
        meranie PPG).
    heart_rate_sensor_placement:
      name: Umiestnenie snímača srdcovej frekvencie
      description: Označuje, kde sa snímač nosí alebo je umiestnený (na tele alebo
        bicykli), čo ovplyvňuje pohodlie a presnosť merania.
    heat_retention_technology:
      name: Technológia udržiavania tepla
      description: Opisuje akúkoľvek technológiu, povrchovú úpravu alebo materiál,
        ktoré zvyšujú potenie alebo tepelnú aktivitu pri sťahovacích pásoch určených
        na cvičenie (napr. neoprénový saunový efekt).
    heated_glass_feature:
      name: Funkcia vyhrievaného skla
      description: Uvádza, či sklo okna obsahuje integrované elektrické prvky, ako
        je mriežka na odmrazovanie zadného skla a/alebo anténa zabudovaná do skla.
    heater_control_actuation_method:
      name: Spôsob ovládania vykurovacieho telesa
      description: Špecifikuje, ako ovládanie kúrenia/klimatizácie ovláda klimatizačnú
        skriňu vozidla (napr. ovládanie lankom, podtlakom alebo elektronickým signálom).
    heater_control_electrical_connector_type:
      name: Typ elektrického konektora pre ovládanie kúrenia
      description: Špecifikuje štýl/rozhranie elektrického konektora použitého na
        zostave ovládania kúrenia (napr. s vyvedeným káblovým zväzkom alebo zástrčkový
        typ).
    heating_technology:
      name: Technológia vykurovania
      description: Určuje primárny mechanizmus ohrevu, ktorý vaporizér používa na
        premenu materiálu na paru.
    heel_shape:
      name: Tvar podpätku
      description: Špecifikuje geometrický štýl alebo siluetu samotného podpätku,
        čo nakupujúcim pomáha filtrovať produkt podľa konštrukčného vzhľadu a preferovanej
        stability (napr. ihličkový alebo blokový/hrubý).
    helicopter_mission_type:
      name: Typ misie vrtuľníka
      description: Hlavné určenie/úloha vrtuľníka.
    helicopter_rotor_configuration:
      name: Konfigurácia rotora vrtuľníka
      description: Určuje usporiadanie rotorového systému vrtuľníka (rozloženie hlavného
        a chvostového rotora), napríklad konfigurácia s jedným hlavným a chvostovým
        rotorom, koaxiálna, tandemová alebo previazaná.
    helmet_accessory_type:
      name: Typ príslušenstva prilby
      description: Uvádza konkrétny typ časti alebo príslušenstva cyklistickej prilby,
        aby si nakupujúci vedeli ihneď nájsť tú správnu položku.
    helmet_audio_connector_type:
      name: Typ audio konektora na prilbe
      description: Určuje typ audio konektora v lietadle, ktorý sa používa pre komunikačný
        kábel prilby, ak je k dispozícii.
    helmet_communication_system_readiness:
      name: Pripravenosť komunikačného systému v prilbe
      description: Či je prilba navrhnutá tak, aby bola kompatibilná s interkomom
        alebo komunikačným systémom s rozhraním Bluetooth.
    helmet_construction_type:
      name: Typ konštrukcie prilby
      description: Opisuje štýl konštrukcie korpusu a vložky prilby (napr. pena, tvrdý
        korpus, hybrid).
    helmet_fit_head_shape:
      name: Tvar prilby (tvar hlavy)
      description: Vnútorný tvar prilby je prispôsobený rôznym tvarom hlavy.
    helmet_interior_liner_type:
      name: Typ vnútornej výstelky prilby
      description: Typ vnútornej výstelky a informácia, či je odnímateľná/prateľná.
    helmet_liner_material:
      name: Materiál podšívky prilby
      description: Určuje materiál vnútornej vložky alebo výplne, ktorý zaisťuje pohodlie
        a tlmenie nárazov.
    helmet_retention_closure_type:
      name: Typ zapínania prilby
      description: Určuje spôsob zapínania/upevnenia remienka pod bradu na prilbe
        (napr. dvojitý D-krúžok, mikrometrická západka).
    helmet_safety_certification:
      name: Certifikácia bezpečnosti prilby
      description: Uvádza bezpečnostné normy alebo certifikáty, ktoré prilba spĺňa.
    helmet_safety_certification_standard:
      name: Bezpečnostná certifikačná norma prilby
      description: Bezpečnostné normy a homologačné požiadavky, ktoré motocyklová
        prilba spĺňa.
    helmet_shell_material:
      name: Materiál korpusu prilby
      description: Primárny materiál alebo konštrukcia vonkajšieho plášťa prilby.
    helmet_size_system:
      name: Systém veľkostí prilby
      description: Systém veľkostí používaný na označenie veľkosti prilby.
    helmet_sun_visor_type:
      name: Typ slnečnej clony na prilbe
      description: Určuje, či je prilba vybavená vnútorným sklopným slnečným štítom,
        tónovaným vonkajším štítom, oboma alebo žiadnym z nich.
    helmet_vehicle_fit:
      name: Prispôsobenie prilby vozidlu
      description: Typ vozidla/používania pri jazde, pre ktoré je prilba určená.
    helmet_ventilation_adjustability:
      name: Možnosť nastavenia ventilácie prilby
      description: Určuje, ako môže jazdec ovládať ventiláciu prilby.
    helmet_ventilation_configuration:
      name: Konfigurácia vetrania prilby
      description: Popisuje systém vetrania prilby a možnosti jeho rozloženia (napr.
        vetrací otvor na brade, vetracie otvory v oblasti čela/prívod vzduchu, uzatvárateľné
        vetracie otvory).
    helmet_visor_peak_adjustability:
      name: Možnosť nastavenia priezoru/šiltu prilby
      description: Či je terénny šilt/priezor prilby nastaviteľný a/alebo odnímateľný.
    helmet_visor_shield_optical_features:
      name: Optické vlastnosti priezoru (štítu) prilby
      description: Optické vlastnosti a kompatibilita hlavného tvárového štítu/priezoru.
    helmet_visor_shield_type:
      name: Typ štítu/priezoru prilby
      description: Súčasťou prilby je základná konfigurácia ochranného štítu/priezoru.
    hem_style:
      name: Štýl manžety
      description: Identifikuje štýl zakončenia spodného okraja – napríklad začistený,
        zrolovaný alebo nezačistený – ktorý výrazne ovplyvňuje vzhľad odevu.
    hemisphere_compatibility:
      name: Kompatibilita s hemisférami
      description: Určuje, pre ktorú pologuľu je hviezdna mapa určená, na základe
        viditeľných súhvezdí.
    hemline_style:
      name: Dĺžka sukne
      description: Definuje strih alebo dizajn spodného okraja šiat.
    herbal_infusion_function:
      name: Funkcia bylinnej zmesi
      description: Uvádza hlavný zdravotný alebo funkčný benefit, pre ktorý je zmes
        uvádzaná na trh.
    hex_size:
      name: Veľkosť imbusu
      description: Veľkosť imbusového kľúča potrebného na montáž/demontáž žeraviacej
        sviečky.
    hi_hat_pair_type:
      name: Typ páru činelov hi-hat
      description: Uvádza, či sa ponuka týka súpravy zladených horných a spodných
        činelov, alebo jednotlivého činelového komponentu.
    hi_hat_sound_character:
      name: Charakter zvuku hi-hatu
      description: Opisuje celkový tónový profil, aby sa umožnilo nakupujúcim filtrovať
        podľa požadovaného zvuku.
    high_visibility_class:
      name: Trieda vysokej viditeľnosti
      description: Určuje úroveň klasifikácie viditeľnosti odevu podľa normy ANSI/ISEA
        107.
    highback_style:
      name: Štýl s vysokým chrbtom
      description: Opisuje štrukturálny štýl/konštrukciu sedadla highback, ktoré ovplyvňujú
        jazdné vlastnosti.
    hitch_ball_diameter:
      name: Priemer gule ťažného zariadenia
      description: Priemer guľovej hlavy ťažného zariadenia (gule), ktorá sa spája
        s prípojkou prívesu (napr. 1 7/8 palca, 2 palce, 2 5/16 palca, 50 mm).
    hitch_ball_mounting_style:
      name: Spôsob montáže ťažnej gule
      description: Či ide o štandardnú guľu upevnenú maticou, o pevný/lisovaný typ
        určený pre konkrétne hlavy ťažného zariadenia, alebo o guľu s integrovaným
        upevňovacím materiálom.
    hobby_horse_handle_type:
      name: Typ rukoväte koňa na hobby horsing
      description: Určuje konštrukciu rukoväte/držadla, ktoré slúži na držanie alebo
        ovládanie koňa na hobby horsing.
    hobby_horse_sound_features:
      name: Zvukové efekty koňa na hobby horsing
      description: Uvádza, či kôň na hobby horsing podporuje zvukové efekty a aké.
    hockey_goal_type:
      name: Typ hokejovej bránky
      description: Určuje štýl alebo zamýšľané použitie hokejovej bránky (napr. bežná
        ľadová plocha, pouličná, mini).
    hockey_size_category:
      name: Veľkostná kategória pri hokeji
      description: Označuje štandardizovanú veľkostnú kategóriu výstroja, do ktorej
        daná súčasť patrí (malé deti, mládež, dospievajúci, dospelí).
    hockey_size_segment:
      name: Segment hokejových veľkostí
      description: Určuje štandardizovanú veľkostnú kategóriu hokejovej výstroje,
        ktorá určuje celkové rozmery chráničov a ich strih.
    hold_surface_texture:
      name: Textúra povrchu držiaka
      description: Popisuje drsnosť alebo povrchovú štruktúru úchopovej plochy chytu.
    home_decor_sewing_pattern_project_type:
      name: Typ projektu strihu na šitie bytových doplnkov
      description: Určuje, na aký druh bytového doplnku slúži tento strih na šitie
        (napr. obliečka na vankúš, záclona, obrus).
    homologation_rule_set:
      name: Homologizácia/súbor pravidiel
      description: Určuje orgán, ktorý udeľuje sankcie, alebo súbor pravidiel, ktoré
        vozidlo spĺňa (v relevantnom prípade).
    honey_form:
      name: Forma medu
      description: Určuje fyzickú podobu alebo vzhľad produktu z medu.
    honey_processing_method:
      name: Spôsob spracovania medu
      description: Uvádza, akým spôsobom bol med pred balením upravený alebo spracovaný.
    honey_variety:
      name: Druh medu
      description: Určuje botanický alebo kvetinový pôvod medu – či ide o monoflorálny
        alebo polyflorálny med – čo má priamy vplyv na chuť, farbu a cenu.
    hood_configuration:
      name: Konfigurácia kapucne
      description: Opisuje dizajn kapucne a jej nastaviteľné prvky.
    hood_design:
      name: Dizajn kapucne
      description: Označuje, či má daný odev kapucňu a v akom štýle.
    hood_style:
      name: Štýl kapucne
      description: Označuje prítomnosť a štýl kapucne na odeve.
    hood_type:
      name: Typ kapucne
      description: Uvádza špeciálne konštrukčné vlastnosti kapucňovej časti odevu.
    hook_and_eye_size_hook_number:
      name: Veľkosť háčika a očka (číslo háčika)
      description: Štandardizované označenie veľkosti/číslovanie háčikov a očiek (ak
        je to relevantné), používané na balení na označenie celkovej veľkosti háčikov
        a očiek.
    hook_and_loop_fastener_duty_rating:
      name: Odolnosť suchého zipsu
      description: Uvádza predpokladanú pevnosť/odolnosť suchého zipsu.
    hook_and_loop_fastener_format:
      name: Formát suchého zipsu
      description: Špecifikuje fyzickú formu alebo formát balenia suchého zipsu (napríklad
        kotúč/páska, body alebo prúžky).
    hook_and_loop_fastener_side:
      name: Strana so suchým zipsom
      description: Určuje, či produkt obsahuje iba stranu s háčikmi, iba stranu so
        slučkami, alebo súpravu obsahujúcu obe strany.
    hook_coating_finish:
      name: Povrchová úprava háčika
      description: Povrchová úprava alebo pokovovanie háčika za účelom zabezpečenia
        odolnosti proti korózii, maskovania alebo zmeny farby (napr. čierny nikel,
        lesklý cín).
    hook_configuration:
      name: Konfigurácia háčikov
      description: Opisuje typ a vyhotovenie háčikov dodávaných spolu s návnadou.
    hook_eye_style:
      name: Štýl oka na háčiku
      description: Určuje tvar alebo orientáciu očka háčika, čo ovplyvňuje spôsob
        viazania alebo upevňovania háčika.
    hook_eye_type:
      name: Typ oka na háčiku
      description: Určuje tvar očka háčika, čo má vplyv na výber uzla a montáž.
    hook_loop_format:
      name: Formát zapínania na suchý zips
      description: Určuje fyzický tvar našívacieho suchého zipsu.
    hook_loop_side:
      name: Strana so suchým zipsom
      description: Určuje, či ide o produkt so stranou s háčikmi, stranou so slučkami
        alebo o súpravu s oboma stranami.
    hook_material:
      name: Materiál háku
      description: Určuje materiál použitý konkrétne na výrobu háčika/hlavy háčika,
        čo je kľúčový faktor pre pevnosť a odolnosť proti korózii pri používaní v
        slanej vode.
    hook_organizer_style:
      name: Štýl organizéra na háčiky
      description: Fyzický štýl alebo tvar organizéra na háčiky (napríklad puzdro,
        kotúč alebo vrecko), ktorý slúži na uľahčenie prehľadávania a filtrovania
        podľa typu organizéra.
    hook_point_configuration:
      name: Konfigurácia hrotu háčika
      description: Uvádza, či má háčik dva hroty (dvojitý) alebo tri hroty (trojitý).
    hook_point_type:
      name: Typ hrotu háčika
      description: Popisuje brúsenie alebo tvar hrotu rybárskeho háčika, čo ovplyvňuje
        jeho schopnosť preniknúť do tela ryby a udržať ju.
    hook_shank_length:
      name: Dĺžka drieku háčika
      description: Označuje relatívnu dĺžkovú klasifikáciu drieku háčika (napr. krátky,
        dlhý) na rýchle vizuálne a funkčné porovnávanie.
    hooks_eyes_attachment_method:
      name: Spôsob upevnenia háčikov a očiek
      description: Ako sa háčiky a očká pripevňujú na odev alebo výrobok.
    hop_up_type:
      name: Typ hop-up systému
      description: Definuje hop-up systém používaný na udelenie spätnej rotácie guľôčkam
        s cieľom zvýšiť dostrel a presnosť.
    horse_blanket_type:
      name: Typ deky pre kone
      description: Určuje primárny štýl alebo zamýšľané použitie deky alebo plachty
        pre kone.
    horse_brush_type:
      name: Typ kefy pre kone
      description: Klasifikuje kefy podľa konkrétneho štýlu starostlivosti alebo účelu
        použitia, čo zákazníkom umožňuje filtrovanie bez narušenia hierarchie kategórií.
    horse_care_purpose:
      name: Slúži na starostlivosť o kone
      description: Hlavný funkčný účel produktu v oblasti starostlivosti o kone, ktorý
        pokrýva potreby v oblasti zdravia, starostlivosti o srsť a chovu.
    horse_feed_stage:
      name: Fáza kŕmenia koní
      description: Uvádza fázu života alebo fyziologický stav koňa, pre ktorý je krmivo
        určené.
    horse_groomer_type:
      name: Typ česadla na kone
      description: Rozdeľuje pomôcky na úpravu srsti podľa typu, aby nakupujúci vedeli
        rýchlo nájsť konkrétny nástroj, ktorý potrebujú.
    horse_leg_protection_type:
      name: Typ chráničov na nohy koní
      description: Klasifikuje konkrétny štýl alebo funkciu chrániča, bandáže alebo
        obväzu pre kone.
    horse_model_breed:
      name: Plemeno koňa modelu
      description: Určuje plemeno koňa, ktoré model v mierke znázorňuje (ak je to
        relevantné).
    hosiery_toe_style:
      name: Štýl špičky pančúch
      description: Určuje konštrukciu špičky pančúch, ktorá je dôležitá pre ich odolnosť
        a kompatibilitu s obuvou s otvorenou špičkou.
    hot_air_balloon_basket_type:
      name: Typ koša teplovzdušného balóna
      description: Určuje základnú konfiguráciu/typ koša (napr. štandardný športový,
        komerčný s veľkou kapacitou, s priečkami, bezbariérový/s dvierkami), ktorý
        sa používa na nastupovanie a na určené použitie.
    hot_air_balloon_burner_type:
      name: Typ horáka pre teplovzdušný balón
      description: Typ/konfigurácia systému horákov namontovaného na balóne.
    hot_air_balloon_envelope_material:
      name: Materiál plášťa teplovzdušného balóna
      description: Hlavná tkanina/materiál použitý na výrobu plášťa (obalu) balóna.
    hotfix_application_tool:
      name: Nástroj na nažehľovaciu aplikáciu
      description: Odporúčaný nástroj alebo zdroj tepla používaný na aplikáciu nažehľovacích
        kamienkov.
    hub_axle_type:
      name: Typ nápravy náboja
      description: Určuje typ rozhrania/upevňovacieho systému nápravy, pre ktorý je
        náboj určený (rýchloupínací, priechodná os atď.).
    hub_motor_type:
      name: Typ motora v náboji
      description: Opisuje konštrukčný typ motora v náboji (s prevodovkou, s priamym
        pohonom, s komutátorom, bez komutátora), aby nakupujúci získali informácie
        o charakteristikách krútiaceho momentu, hmotnosti a účinnosti.
    hula_hoop_construction_type:
      name: Konštrukčný typ obruče
      description: Opisuje, ako je obruč skonštruovaná/zostavená.
    hula_hoop_features:
      name: Vlastnosti obruče
      description: Zdôrazňuje významné funkčné alebo dizajnové prvky hulahopky.
    hull_design:
      name: Dizajn trupu
      description: Opisuje tvar trupu, ktorý ovplyvňuje výkon a jazdné vlastnosti.
    hull_type:
      name: Typ trupu
      description: Popisuje tvar trupu, ktorý ovplyvňuje výkon a stabilitu.
    humidifier_refill_medium_type:
      name: Typ náplne/filtračného média do zvlhčovača vzduchu
      description: Identifikuje zvlhčovacie/plniace médium použité v puzdrovom zvlhčovači
        (čo sa navlhčuje alebo vymieňa).
    humidifier_refill_method:
      name: Spôsob doplňovania zvlhčovača
      description: Popisuje, ako sa zvlhčovač dopĺňa médiom alebo ako sa vymieňa.
    humidifying_medium:
      name: Zvlhčovacie médium
      description: Určuje zvlhčovací prvok/médium používané v produkte (čo sa zvlhčuje/aktivuje).
    hummus_base_ingredient:
      name: Základná ingrediencia pre hummus
      description: Uvádza hlavnú strukovinovú alebo zeleninovú zložku použitú na prípravu
        hummusu.
    hunting_call_type:
      name: Typ loveckého vábca
      description: Klasifikuje hlavný spôsob použitia alebo mechanizmus vábničky (napr.
        fúkacia, elektronická, skrinková), aby si lovci mohli rýchlo vybrať typ, ktorý
        najlepšie vyhovuje ich potrebám a úrovni zručností.
    hunting_dog_collar_function:
      name: Funkcia obojka pre loveckého psa
      description: Klasifikuje hlavný funkčný štýl alebo účel obojku, čím pomáha zákazníkom
        filtrovať produkty podľa funkcií, ako je stopovanie, výcvik, viditeľnosť alebo
        bežné použitie.
    hvac_control_functions:
      name: Ovládacie funkcie klimatizácie
      description: Uvádza, ktoré funkcie klimatizácie, odmrazovania a prúdenia vzduchu
        sú riadené týmto zariadením (mechanicky alebo elektronicky).
    hybrid_drivetrain_configuration:
      name: Konfigurácia hybridného pohonu
      description: Uvádza architektúru systému PHEV, ktorá opisuje, ako elektromotor(y)
        a spaľovací motor zabezpečujú pohon.
    hybrid_system_type:
      name: Typ hybridného systému
      description: Klasifikuje hybridnú architektúru používanú v danom vozidle.
    hybrid_truck_cab_type:
      name: Typ kabíny hybridného nákladného vozidla
      description: Určuje konfiguráciu kabíny nákladného vozidla, ktorá ovplyvňuje
        počet sedadiel a priestor v interiéri.
    hydration_bag_features:
      name: Vlastnosti hydratačného vaku
      description: Zdôrazňuje významné dizajnové alebo funkčné vlastnosti typické
        pre hydratačné vaky.
    hydration_belt_features:
      name: Vlastnosti hydratačného pásu
      description: Uvádza významné integrované funkcie, ktoré zvyšujú použiteľnosť,
        bezpečnosť alebo pohodlie hydratačného pásu.
    hydration_bladder_compatibility:
      name: Kompatibilita s hydratačným vakom
      description: Označuje, či vesta obsahuje alebo podporuje systém hydratačného
        vaku.
    hydration_mouthpiece_style:
      name: Štýl hydratačného náustku
      description: Určuje dizajn alebo funkčný štýl náustku alebo ventilu hydratačného
        systému, čím pomáha nakupujúcim vybrať si preferovaný spôsob pitia a zabezpečiť
        kompatibilitu.
    hydration_pack_style:
      name: Štýl hydratačného balíka
      description: Určuje konštrukčný typ hydratačného balíka (napr. batoh alebo vesta),
        čo uľahčuje výber podľa veľkosti a účelu použitia.
    hydration_system_insulation:
      name: Izolácia hydratačného systému
      description: Uvádza, či sú zásobník a/alebo hadička na pitie izolované, aby
        sa udržala teplota tekutiny v horúcich alebo chladných podmienkach.
    hydration_valve_type:
      name: Typ hydratačného ventilu
      description: Určuje typ ventilu alebo náustku na pitie dodávaného so systémom
        alebo fľašou, pričom zahŕňa bežné konštrukcie s ventilom na zahryznutie, ako
        aj s tryskou s vysokým prietokom.
    hydraulic_fluid_type:
      name: Typ hydraulickej kvapaliny
      description: Určuje typ brzdovej kvapaliny, pre ktorú je hydraulická brzdová
        páka na bicykli určená.Tieto informácie sú kľúčové pre údržbu a bezpečnosť.
    hydrogenation_level:
      name: Úroveň stuženia
      description: Vymedzuje, či je tuk nestužený, čiastočne stužený alebo plne stužený,
        čo ovplyvňuje obsah trans-mastných kyselín a vlastnosti pri pečení.
    hydrophobicity_level:
      name: Úroveň hydrofóbnosti
      description: Uvádza úroveň hydrofóbneho účinku – odvádzania vody vo forme kvapiek
        alebo celistvého filmu – udávanú výrobcom produktu.
    ice_cream_format:
      name: Formát zmrzliny
      description: Popisuje fyzickú podobu alebo formu zmrzlinového produktu (napr.
        pohár, tyčinka, mochi).
    ice_skate_sharpener_type:
      name: Typ brúsky na korčule
      description: Klasifikuje celkovú konštrukciu alebo typ brúsky (ručný brúsny
        kameň, elektrická brúska, brúsny stojan atď.).
    ice_temperature_suitability:
      name: Vhodnosť teploty ľadu
      description: Uvádza rozsah teplôt ľadu, pre ktorý je vosk na hokejky určený,
        čo ovplyvňuje jeho výkonnosť a schopnosť odpudzovať sneh.
    icing_sugar_variety:
      name: Druh práškového cukru
      description: Klasifikuje zloženie alebo funkčný typ práškového cukru (napr.
        fondán, práškový cukor, ktorý sa neroztápa, farebný, ochutený).
    ignition_coil_configuration:
      name: Konfigurácia zapaľovacej cievky
      description: Určuje typ zapaľovacej cievky (jednotlivá cievka/cievka na zapaľovacej
        sviečke, súprava viacerých cievok podľa počtu valcov, lišta/kazeta s cievkami
        alebo typ s rozdeľovačom).
    ignition_lead_compliance_standard:
      name: Norma týkajúca sa zapaľovacích káblov
      description: Formálny priemyselný štandard alebo certifikácia, ktorú zapaľovacie
        káble spĺňajú podľa tvrdenia výrobcu (napr. SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Izolačný materiál zapaľovacích káblov
      description: Hlavný materiál izolácie/plášťa použitý na zapaľovacom kábli (vonkajšia
        izolácia kábla).
    ignition_lead_set_type:
      name: Typ súpravy zapaľovacích káblov
      description: Či produkt predstavuje jeden zapaľovací kábel alebo kompletnú súpravu,
        a na čo je táto súprava určená.
    ignition_lead_terminal_type:
      name: Typ svorky zapaľovacieho kábla
      description: Typ koncovky/konektora použitý na koncoch zapaľovacieho kábla (napr.
        typ koncovky zapaľovacej sviečky a typ koncovky cievky/rozdeľovača).
    illumination_type:
      name: Typ osvetlenia
      description: Určuje, či a ako je lopta osvetlená pri nočnej hre (napr. fosforeskujúce
        svietenie, LED dióda aktivovaná nárazom).
    immobilizer_installation_type:
      name: Typ inštalácie imobilizéru
      description: Označuje, ako je imobilizér nainštalovaný alebo pripojený k vozidlu.
    immobilizer_unlock_method:
      name: Metóda odomknutia imobilizéra
      description: Určuje, ako sa imobilizér aktivuje/deaktivuje alebo odomyká.
    impact_protection_certifications:
      name: Certifikáty týkajúce sa ochrany proti nárazom
      description: Uvádza konkrétne bezpečnostné normy, ktoré ochranná podložka spĺňa
        alebo prekračuje.
    impact_protection_level:
      name: Úroveň ochrany Impact
      description: Určuje úroveň ochrany proti nárazom alebo technológiu, ktorú ponúka
        športový suspenzor.
    impact_protection_rating:
      name: Stupeň ochrany proti nárazom
      description: Určuje certifikovanú úroveň ochrany proti nárazom podľa noriem
        (napr. EN 1621-1 úroveň 1, EN 14120 úroveň 2), čo pomáha jazdcom vybrať si
        výbavu s vyššou úrovňou ochrany.
    impact_surface_material:
      name: Povrchový materiál Impact
      description: Opisuje materiál primárnej nárazovej plochy z hľadiska bezpečnosti
        a pocitu pri kontakte (napr. pena, plast).
    incense_base_material:
      name: Základná zložka kadidla
      description: Hlavná základná zložka/spojivo používané pri výrobe kadidla (prášková
        zmes) v súprave.
    incense_making_method:
      name: Metóda výroby kadidla
      description: Postup remeselnej výroby, ktorý táto súprava umožňuje.
    incense_tool_type:
      name: Typ kadidlového nástroja
      description: Určuje, na aký účel slúži tento výrobok pri výrobe kadidla (na
        tvarovanie, meranie, lisovanie, miešanie alebo sušenie kadidla).
    incline_adjustment_type:
      name: Typ nastavenia sklonu
      description: Popisuje, ako (alebo či vôbec) je možné počas tréningu meniť sklon.
    included_accessories:
      name: Vrátane príslušenstva
      description: Uvádza obsiahnuté doplnky, ako sú náhradné hlavice/bitové nástavce,
        úložné puzdro, nabíjací kábel alebo sieťový adaptér.
    included_case_type:
      name: Vrátane typu puzdra
      description: Typ puzdra na prenášanie/uskladnenie dodávaného spolu s basovým
        saxofónom (ak je súčasťou balenia).
    included_components:
      name: Zahrnuté komponenty
      description: Uvádza, čo je súčasťou balenia (užitočné pre súpravy náradia a
        balíky).
    included_fastener_components:
      name: Súčasťou balenia komponentov spojovacích prvkov
      description: Určuje, či produkt predstavuje súpravu háčikov a očiek, iba háčiky,
        iba očká alebo inú podobnú variantu zapínania odevov.
    included_hydration_vessel_type:
      name: Typ priloženej nádoby na tekutiny
      description: Určuje typ zásobníka na tekutiny, ktorá je súčasťou opasku alebo
        sa naň dá pripnúť.
    included_items_woodwind_instrument:
      name: Položky v balení (drevený dychový nástroj)
      description: Zoznam položiek, ktoré sa zvyčajne nachádzajú v balení basového
        saxofónu.
    included_materials:
      name: Zahrnuté materiály
      description: Uvádza, ktoré komponenty sú súčasťou nákupu strihu (len strih alebo
        strih + materiály).
    included_mounting_accessories:
      name: Dodávané montážne príslušenstvo
      description: Uvádza, ktoré montážne/upevňovacie príslušenstvo je súčasťou balenia
        hlasitého odposluchu.
    included_pump_type:
      name: Typ obsiahnutého čerpadla
      description: Určuje typ čerpadla, ktoré je súčasťou dodávky alebo je zabudované
        v nafukovacom matraci.
    included_scraper_implement_type:
      name: Typ priloženého prídavného škrabadla
      description: Uvádza, ktoré hracie pomôcky sú súčasťou hudobného škrabadla (napr.
        škrabacia palička/tyčka, drôtená kefka).
    indicator_design:
      name: Dizajn indikátora
      description: Klasifikuje fyzický tvar alebo štýl indikátora záberu pri rybolove.
    indicator_functions_tracked:
      name: Sledované funkcie indikátorov
      description: Uvádza konkrétne herné štatistiky, ktoré tento ukazovateľ sleduje,
        ako sú bally, striky, auty, inningy, počet nadhodov, overy, wickety, skóre
        alebo downy.
    indoor_outdoor_use:
      name: Použitie v interiéri/exteriéri
      description: Označuje, či je detský bowling určený na použitie v interiéri,
        v exteriéri alebo oboje.
    inflatable_decoration_items_included:
      name: Súčasťou balenia sú nafukovacie dekoračné položky
      description: Uvádza zoznam hlavného príslušenstva dodávaného spolu s nafukovacou
        dekoráciou (napr. kompresor, kolíky, upevňovacie laná).
    inflatable_decoration_type:
      name: Typ nafukovacej dekorácie
      description: Určuje typ nafukovacej dekorácie na oslavy (tvar/rozmery), aby
        sa uľahčilo prehliadanie a filtrovanie.
    inflatable_raft_float_features:
      name: Vlastnosti nafukovacieho člna/plavidla
      description: Funkčné vlastnosti nafukovacieho člna/plavidla.
    inflation_method_included:
      name: Súčasťou balenia je metóda nafukovania
      description: Určuje typ riešenia na nahustenie pneumatiky, ktoré je súčasťou
        súpravy na opravu, ak je k dispozícii.
    infused_scent:
      name: Vôňa s pridanou esenciou
      description: Označuje prísady dodávajúce vôňu alebo chuť, ktoré sú vtlačené
        do návnady.
    ingredient_base_type:
      name: Typ základnej zložky
      description: Určuje hlavnú surovinu použitú na fermentáciu (napr. koncentrát
        z hroznovej šťavy, čerstvá šťava alebo ovocný koncentrát).
    ingredient_physical_form:
      name: Fyzická forma zložky
      description: Určuje fyzickú formu, v akej sa vonná zložka dodáva (slúži na manipuláciu,
        meranie a prípravu zmesí).
    ingredient_processing_method:
      name: Spôsob spracovania prísady
      description: Určuje hlavnú techniku spracovania aplikovanú na danú zložku (napr.
        lyofilizovaná, pražená, fermentovaná).
    ink_colors_included:
      name: Farby atramentu v balení
      description: Určuje farby atramentu, ktoré sú súčasťou pečiatkových vankúšikov
        v súprave.
    ink_pad_application_method:
      name: Spôsob aplikácia atramentového vankúšika
      description: Ako sa atrament nanáša/používa z vankúšika (tradičný vankúšik,
        aplikátor alebo podložka so štetcovým hrotom).
    ink_pad_permanence:
      name: Trvácnosť atramentového vankúšika
      description: Či je atrament na pečiatke trvalý a/alebo archívny (odolnosť voči
        blednutiu a vode po zaschnutí).
    ink_pad_size:
      name: Veľkosť atramentového vankúšika
      description: Štandardizovaná veľkosť/tvar povrchu atramentového vankúšika/puzdra.
    ink_pad_special_effects:
      name: Špeciálne efekty atramentovej podložky
      description: Špeciálne vizuálne/funkčné efekty atramentu pri odtlačení (napr.
        metalický, trblietavý).
    ink_permanence:
      name: Trvanlivosť atramentu
      description: Uvádza, či je zaschnutý sumi atrament určený na trvalé použitie/archívnu
        úschovu, alebo je zmývateľný/dočasný.
    ink_preparation_required:
      name: Vyžaduje sa príprava atramentu
      description: Uvádza, či je sumi atrament pripravený na okamžité použitie, alebo
        či je pred použitím potrebné ho zriediť s vodou alebo rozmiešať.
    inline_skate_brake_type:
      name: Typ brzdy na kolieskových korčuliach
      description: Určuje konfiguráciu bŕzd, ktorou sú vybavené kolieskové korčule,
        napríklad odnímateľnou brzdou na päte alebo bez brzdy.
    inner_tent_configuration:
      name: Usporiadanie vnútorného stanu
      description: Určuje konfiguráciu alebo typ vnútorného stanu, napríklad celoplošná
        vložka, sieťovaná vložka alebo termovložka.
    innerspring_coil_type:
      name: Typ cievky s vnútornou pružinou
      description: Určuje konštrukčný typ systému pružinových cievok vo vnútri matraca,
        čo ovplyvňuje oporu, izoláciu pohybu a cenu.
    input_connector_type:
      name: Typ vstupného konektora
      description: Určuje typ vstupného audio konektora, ktorý pedál používa (zvyčajne
        1/4-palcový TS).
    input_valve_type:
      name: Typ vstupného ventilu
      description: Uvádza typ ventilu, ktorý sa nachádza na duši/kolese bicykla, ku
        ktorému sa adaptér pripája.
    insecticide_treatment:
      name: Ošetrenie insekticídmi
      description: Uvádza, či bola sieťovina v továrni ošetrená insekticídom, a ak
        áno, aký typ ošetrenia bol použitý na dodatočnú ochranu.
    insert_coverage_area:
      name: Oblasť pokrytia vložky
      description: Určuje, ktorú časť chodidla má vložka pokrývať (napr. celú dĺžku,
        iba pätu).
    insert_length_type:
      name: Typ dĺžky vložky
      description: Uvádza, akú časť stielky pokrýva opora klenby.
    inside_message_type:
      name: Typ odkazu vo vnútri
      description: Uvádza, či je na vnútornej strane karty vytlačený text a či je
        možné ho prispôsobiť.
    insole_attachment_method:
      name: Spôsob upevnenia vložky
      description: Určuje, ako sa stielka drží na mieste vo vnútri topánky (voľne
        vložená, s lepiacou vrstvou, na suchý zips atď.).
    insole_material:
      name: Materiál stielky
      description: Opisuje materiál stielky alebo vložky, na ktorej spočíva chodidlo,
        čo ovplyvňuje tlmenie nárazov a oporu.
    installation_fabrication_level:
      name: Úroveň montážneho vyhotovenia
      description: Uvádza typický rozsah prác na mieru alebo úprav potrebných na inštaláciu
        súpravy.
    installation_location:
      name: Lokalita inštalácie
      description: Určuje typické miesto inštalácie snímača tlaku oleja v olejovom
        systéme motora (napr. otvor v olejovom kanáli bloku, puzdro filtra, priechodka
        alebo montáž na vzdialený rozvod).
    installation_method:
      name: Spôsob inštalácie
      description: Určuje spôsob upevnenia alebo inštalácie rohože alebo dlaždice
        na podlahu.
    instant_coffee_form:
      name: Forma instantnej kávy
      description: Popisuje fyzickú formu, v akej sa instantná káva dodáva, čo má
        vplyv na spôsob prípravy a trvanlivosť.
    instep_coverage:
      name: Krytie priehlavku
      description: Určuje, či produkt chráni len holennú kosť, alebo holennú kosť
        aj priehlavok/chodidlo.
    instruction_format:
      name: Formát pokynov
      description: Formát pokynov priložených k súprave.
    instrument_cleaning_swab_form_factor:
      name: Tvar tampónu na čistenie nástroja
      description: Určuje fyzický typ čističa (napr. čistič s pretiahnuteľnou handričkou
        alebo systém s tyčkou/kefkou) tak, aby vyhovoval preferenciám hráča a obmedzeniam
        nástroja.
    instrument_dimensions_unit_context:
      name: Kontext jednotiek rozmerov nástroja
      description: Upresňuje, na čo sa vzťahujú uvedené rozmery výšky, šírky a dĺžky
        (napr. celkový rozmer nástroja, dĺžka jednej trubice, výška stojana).
    instrument_electronics_type:
      name: Typ elektroniky nástroja
      description: Uvádza, či je systém snímačov/predzosilňovača nástroja aktívny
        alebo pasívny.
    instrument_key:
      name: Klapka nástroja
      description: Určuje tóninu nástroja, v akej sa flauta uvádza v katalógoch (u
        väčších fláut je to zvyčajne C alebo F).
    instrument_level:
      name: Úroveň nástroja
      description: Cieľová úroveň hráča pre ponuku nástrojov.
    instrument_part_mounting_method:
      name: Spôsob upevnenia časti nástroja
      description: Určuje spôsob upevnenia alebo inštalácie dielu (napr. upínací,
        lepený, skrutkovací).
    instrument_parts_included:
      name: Diely v balení nástroja
      description: Uvádza hlavné komponenty/diely obsiahnuté v balení klarinetu A.
    instrument_playing_technique:
      name: Technika hry na nástroj
      description: Ako sa na nástroj zvyčajne hrá/ako sa aktivuje (napr. trasením,
        údermi, klepaním).
    instrument_size_class:
      name: Trieda veľkosti nástroja
      description: Celková veľkosť nástroja je vyjadrená veľkostnou kategóriou praktickou
        pre nakupujúceho, nie v presných rozmeroch.
    insulation_fill_material:
      name: Materiál izolačnej výplne
      description: Určuje hlavný materiál použitý na izoláciu bundy alebo vesty.
    integrated_bottom_type:
      name: Typ integrovaného dna
      description: Uvádza, či má odev v sebe zabudované slipy, šortky, tričko alebo
        podobné spodné vrstvy, ktoré zabezpečujú krytie pri pohybe.
    integrated_charging_options:
      name: Možnosti integrovaného nabíjania
      description: Zobrazuje zoznam integrovaných napájacích alebo nabíjacích rozhraní,
        ktoré sú k dispozícii na nočnom stolíku.
    integrated_furniture_function:
      name: Integrovaná funkcia nábytku
      description: Uvádza ďalšie vstavané prvky nábytku, ktoré sú súčasťou sklopnej
        postele alebo rámu (napr. písací stôl, pohovka, police).
    integrated_locking:
      name: Integrované zamykanie
      description: Či je nosič vybavený integrovanou zámkou na upevnenie nosiča k
        vozidlu a/alebo bicykla k nosiču.
    integrated_power_options:
      name: Možnosti integrovaného napájania
      description: Uvádza typ funkcií integrovaného napájania alebo nabíjania, ktoré
        táto toaletná skrinka ponúka.
    integrated_storage_features:
      name: Funkcie integrovaného úložného priestoru
      description: Uvádza ďalšie úložné priestory alebo doplnkové prvky, ktoré stojan
        na biliardové tága ponúka okrem priehradiek na tága.
    integrated_tool_functions:
      name: Integrované funkcie nástrojov
      description: Ďalšie funkcie nástroja integrované do páky (napr. háčik na špice,
        nástroj na vyberanie ventilových vložiek, nástroj na uvoľňovanie pätky).
    intended_board_type:
      name: Určený typ dosky
      description: Určuje typ kiteboardu, pre ktorý je plutva určená (napr. duálna
        špička, surferský smerový, hydrofoil).
    intended_consumption:
      name: Zamýšľaná spotreba
      description: Uvádza, ako sa má produkt konzumovať, a uvádza, či je bezpečné
        konzumovať ho surový, či si vyžaduje pečenie alebo je čiastočne upečený.
    intended_craft:
      name: Zamýšľané ručné práce
      description: Hlavná oblasť ručných prác, pre ktorú je vodidlo priadze určené.
    intended_culinary_use:
      name: Zamýšľané kulinárske použitie
      description: Uvádza hlavné kulinárske využitie omáčky, napríklad ako dip, na
        varenie alebo na glazovanie.
    intended_handlebar_style:
      name: Zamýšľaný štýl riadidiel
      description: Popisuje typ riadidiel alebo účel použitia páky (napr. rovné riadidlá,
        drop-bar, aerodynamické riadidlá).Toto rýchlo zúži kompatibilitu bez vynútenia
        ďalších podkategórií.
    intended_player_role:
      name: Zamýšľaná rola hráča
      description: Určuje, pre akú pozíciu na ihrisku je táto prilba určená (napr.
        chytač, rozhodca).
    intended_playing_surface:
      name: Určená hracia plocha
      description: Povrch, na ktorom sa puk, lopta alebo kruh má používať, napríklad
        ľad, asfalt, palubovka alebo umelý ľad.
    intended_repair_location:
      name: Zamýšľaná lokalita opravy
      description: Na opravu ktorého miesta na pneumatike je súprava určená.
    intended_seating_position:
      name: Zamýšľaná poloha sedenia
      description: Určuje miesto vo vozidle, na ktorom je popruh bezpečnostného pásu
        určený na inštaláciu alebo používanie.
    intended_sewing_application:
      name: Zamýšľané použitie pri šití
      description: Zamýšľané použitie pri šití, na ktoré je niť určená (napr. univerzálne
        šitie odevov, prešívanie, čalúnenie).
    intended_technique:
      name: Zamýšľaná technika
      description: Primárna technika plstenia, pre ktorú je podložka určená.
    intended_use:
      name: Určené použitie
      description: Hlavný kontext použitia tohto nástroja.
    intended_use_fleece_fabric:
      name: Zamýšľané použitie (flaušová tkanina)
      description: Hlavný projekt alebo oblasť použitia, na ktorú je táto flaušová
        tkanina určená.
    intended_user:
      name: Zamýšľaný používateľ
      description: Uvádza, pre koho je letecká ochranná výstroj určená.
    intended_yarn_form:
      name: Určená forma priadze
      description: Určuje spôsob navíjania priadze, ktorý je pre misku na priadzu
        najvhodnejší.
    interaction_mode:
      name: Režim interakcie
      description: Hlavný spôsob interakcie slúžiaci na aktiváciu zvukov alebo činností.
    interactive_effects:
      name: Interaktívne efekty
      description: Uvádza interaktívne elektronické alebo mechanické prvky, ktoré
        sú súčasťou kuchynskej súpravy.
    interfacing_application_area:
      name: Oblasť použitia rozhrania
      description: Uvádza bežné oblasti šitia a ručných prác, na ktoré je táto výstuž
        určená.
    interfacing_color_family:
      name: Skupina farieb podšívky
      description: Uvádza typickú základnú farbu podšívky, ktorá sa používa pod svetlými
        alebo tmavými látkami.
    interfacing_selling_format:
      name: Sprievodný formát podšívky
      description: Opisuje spôsob predaja podšívok (napríklad v metráži, v predrezaných
        kusoch, v rolkách alebo vo vzorkách).
    interfacing_stiffness_level:
      name: Úroveň tuhosti podšívky
      description: Opisuje úroveň tuhosti/pevnosti, ktorý poskytuje podšívka.
    interior_padding_type:
      name: Typ vnútornej výplne
      description: Typ vnútornej výstelky alebo systému vložiek použitých vo vnútri
        kufra na ochranu a usporiadanie obsahu.
    interior_stall_configuration:
      name: Usporiadanie vnútorného priestoru
      description: Určuje vnútorné rozloženie/konfiguráciu pre prepravu zvierat (orientáciu
        vnútorného priestoru a typ priehradiek).
    invitation_printing_coverage:
      name: Rozsah potlače pozvánok
      description: Ktoré strany pozvánky sú potlačené (len predná strana alebo obojstranne)?
    iodization:
      name: Jodizácia
      description: Označuje, či a v akom množstve bol do soli pridaný jód.
    iridescence_level:
      name: Úroveň dúhového lesku
      description: Popisuje intenzitu prirodzeného alebo umelo vyvolaného dúhového
        lesku, typického pre pávie perie.
    irish_warpipe_set_configuration:
      name: Nastavenie súpravy írskych gájd
      description: Uvádza, aká konfigurácia sa predáva (kompletný nástroj alebo diely/čiastočná
        súprava), a to konkrétne v prípade írskych gájd.
    iron_on_applique_application_method:
      name: Spôsob nanášania nažehľovacích nášiviek
      description: Určuje, akým spôsobom sa má na podklad nanášať nažehľovacia nášivka.
    ironing_center_features:
      name: Vlastnosti žehliaceho centra
      description: Uvádza špecializované funkcie žehliacich centier, ktoré zvyšujú
        praktickosť a pohodlie.
    jacket_breast_style:
      name: Spôsob zapínania saka v oblasti hrudníka
      description: Špecifikuje, či má sako jednoradové alebo dvojradové zapínanie
        v oblasti hrudníka.
    jacket_vent_style:
      name: Štýl vetrania bundy
      description: Označuje typ vetrania (otvoru) na zadnej strane saka.
    jam_and_jelly_consistency:
      name: Konzistencia džemu a želé
      description: Popisuje konzistenciu nátierky a uvádza, či obsahuje kúsky ovocia
        alebo semienka.
    jaw_shape:
      name: Tvar čeľuste
      description: Geometria čeľustí alebo špičky (napr. rovná, ohnutá, s dlhým hrotom)
        ovplyvňuje presnosť a dosah.
    jerky_form:
      name: Forma sušeného mäsa
      description: Popisuje fyzický tvar alebo rez častí sušeného mäsa (napr. pásiky,
        tyčinky, kúsky).
    jersey_style:
      name: Štýl dresu
      description: Určuje strih alebo štýl dresov pre fanúšikov.
    jew_harp_accessories_included:
      name: Vrátane príslušenstva k drumbli
      description: Uvádza obsiahnuté položky dodávané spolu s drumbľou (napr. puzdro,
        vrecko, návod).
    jew_s_harp_frame_style:
      name: Štýl rámu drumble
      description: Popisuje konštrukčný štýl rámu/korpusu drumble, ktorý ovplyvňuje
        pocit pri hre, odolnosť a ergonómiu hry.
    jew_s_harp_tongue_profile:
      name: Profil rezonančnej platničky na drumbli
      description: Opisuje profil/geometriu jazýčka (plátku) drumble, ktorý ovplyvňuje
        odozvu a zafarbenie tónu.
    jewelry_pieces_included:
      name: Vrátane jednotlivých dielov šperku
      description: Uvádza konkrétne šperky, ktoré sú súčasťou súpravy, aby nakupujúci
        presne vedeli, aké položky kupujú.
    jigsaw_puzzle_piece_shape:
      name: Tvar dielu dielika puzzle
      description: Celkový strih/tvar dielov a profil hrán.
    jockstrap_design_features:
      name: Dizajnové vlastnosti suspenzora
      description: Zachytáva špeciálne dizajnové prvky jedinečné pre otvorené slipy,
        ktoré ovplyvňujú funkcie alebo estetiku.
    juggling_club_construction_type:
      name: Konštrukčný typ žonglérskej paličky
      description: Určuje celkový typ konštrukcie žonglérskej paličky (napr. jednodielna
        lisovaná alebo viacdielna zostavená), čo môže ovplyvniť jej životnosť, pocit
        pri držaní a údržbu.
    juggling_club_core_material:
      name: Základný materiál žonglérskej paličky
      description: Hlavný materiál jadra použitý vo vnútri paličky (okrem vonkajšieho
        obalu/pásky).
    juggling_prop_set_size:
      name: Veľkosť žonglérskych rekvizít
      description: Počet základných rekvizít obsiahnutých v súprave (napr. súprava
        3 lôpt, pár poi).
    juggling_ring_edge_style:
      name: Štýl okraja žonglérskeho kruhu
      description: Profil okraja kruhu, ktorý ovplyvňuje pohodlie a uchopenie.
    juice_form:
      name: Forma šťavy
      description: Určuje fyzickú formu alebo stupeň spracovania produktu (napr. tekutina
        v plnej koncentrácii, koncentrát, prášok).
    juice_processing_method:
      name: Spôsob spracovania šťavy
      description: Určuje hlavnú technológiu spracovania, ktorá sa používa pri výrobe
        šťavy alebo nápoja a ktorá ovplyvňuje chuť, zachovanie živín a trvanlivosť.
    jump_rope_style:
      name: Štýl švihadla
      description: Klasifikuje konštrukčný typ lana/lanka (napr. s výstužnými krúžkami,
        s textilnou výstužou, rýchlostné lanko), čo výrazne ovplyvňuje jeho určené
        použitie a výkonnosť.
    kale_variety:
      name: Odroda kelu
      description: Určuje konkrétnu odrodu alebo druh kapusty (napr. kučeravá, lacinato/dinosaur,
        červená ruská).Nakupujúcim to pomáha vybrať si na základe chuti, textúry a
        kulinárskeho využitia.
    kaleidoscope_viewing_type:
      name: Typ zobrazenia kaleidoskopu
      description: Určuje formát zobrazenia alebo spôsob ovládania kaleidoskopu (napr.
        klasická okulárová trubica, teleidoskop s optickými šošovkami, s kolieskovým
        ovládaním, projekcia).
    kayak_construction_type:
      name: Typ konštrukcie kajaku
      description: Určuje hlavný typ konštrukcie kajaku, napríklad pevný alebo nafukovací.
    kayak_design_type:
      name: Typ konštrukcie kajaku
      description: Klasifikuje hlavný účel kajaku (napr. surfski, playboat, turistický
        kajak).
    kayak_hull_design:
      name: Konštrukcia trupu kajaku
      description: Určuje základný tvar trupu, ktorý ovplyvňuje jazdné vlastnosti,
        ako sú stabilita a manévrovateľnosť v podmienkach s vlnami.
    kayak_storage_bag_type:
      name: Typ úložnej tašky na kajak
      description: Určuje typ alebo formát tašky na kajak, napríklad nepremokavá taška
        alebo taška na pádlo.
    kayak_style:
      name: Štýl kajaku
      description: Určuje hlavný účel alebo spôsob použitia kajaku (napr. rekreačný,
        turistický, nafukovací).
    keel_type:
      name: Typ kýlu
      description: Určuje konfiguráciu kýlu plachetnice.
    kettlebell_style:
      name: Štýl kettlebellu
      description: Identifikuje konštrukciu alebo štýlový variant kettlebellu (napr.
        súťažný, nastaviteľný, mäkký), čo pomáha nakupujúcim vybrať si ten správny
        kettlebell pre svoje tréningové potreby.
    key_attachment_mechanism:
      name: Mechanizmus pripevnenia kľúča
      description: Určuje hardvér použitý na zabezpečenie kľúčov vo vnútri puzdra,
        ako sú krúžky, spony alebo skrutkové kolíky.
    key_retention_when_unlocked:
      name: Udržiavanie kľúča v otvorenej polohe
      description: Určuje, či je možné kľúč vybrať zo zámky, keď je v odomknutej polohe.
    keyboard_amplifier_inputs:
      name: Vstupy zosilňovača pre klávesy
      description: Uvádza zoznam vstupných pripojení, ktoré podporuje zosilňovač pre
        klávesy (napr. 1/4" TRS, vstup MIDI, Bluetooth).
    keyboard_amplifier_output_types:
      name: Typy výstupov zosilňovača pre klávesy
      description: Určuje typy primárnych výstupných konektorov, ktoré zosilňovač
        pre klávesy podporuje na prenos zvuku do iných systémov.
    keyboard_case_handle_type:
      name: Typ rukoväte puzdra na klávesy
      description: Hlavný systém úchytov slúžiaci na presúvanie/prenášanie puzdra
        na klávesy (okrem popruhov).
    keyboard_case_interior_padding_type:
      name: Typ výstelky vnútornej časti puzdra na klávesy
      description: Hlavný spôsob vyhotovenia vnútornej výstelky/podšívky použitý vo
        vnútri pevného kufra.
    keyboard_case_protection_level:
      name: Úroveň ochrany puzdra na klávesy
      description: Celková trieda ochrany/tuhosti pevného kufra, ktorá odlišuje lisované
        kufre s tvrdým plášťom od odolných leteckých kufrov typu ATA.
    keyboard_case_wheel_type:
      name: Typ koliesok na puzdro ku klávesu
      description: Konfigurácia koliesok pre tvrdé kufre vybavené kolieskami.
    keyboard_pedal_connector_type:
      name: Typ konektora pedálu pre klávesy
      description: Určuje typ konektora/zástrčky, ktorý sa používa na pripojenie sustain
        pedálu ku klávesom alebo digitálnemu klavíru.
    keyboard_power_supply_type:
      name: Typ napájania klávesov
      description: Hlavný spôsob napájania klávesov (batéria, sieťový adaptér, napájanie
        cez USB).
    keyboard_stand_tier_type:
      name: Typ poschodového stojana na klávesy
      description: Uvádza, či sa stojan predáva iba ako základný stojan, alebo obsahuje/doplňuje
        nadstavbu druhej úrovne.
    keyboard_stand_tiers:
      name: Úrovne stojanu na kláves
      description: Počet úrovní, ktoré stojan typu Z podporuje (napr. jedna úroveň
        alebo dve úrovne).
    keychain_attachment_type:
      name: Typ upevnenia kľúčenky
      description: Určuje hlavný upevňovací materiál, ktorý sa používa na pripevnenie
        kľúčenky na kľúče, tašky alebo opasky.
    keychain_style:
      name: Štýl kľúčenky
      description: Opisuje všeobecný tvar kľúčenky (ako fyzicky vyzerá).
    keywork_finish:
      name: Povrchová úprava klapiek
      description: Opisuje povrchovú úpravu/pokovovanie konkrétne na klapkovom mechanizme
        (klapkách), odhliadnuc od povrchovej úpravy korpusu nástroja.
    kick_point:
      name: Bod ohybu
      description: Určuje polohu bodu ohybu na palici hokejky, čo ovplyvňuje rýchlosť
        strely a pocit pri streľbe.
    kick_zone_grip_system:
      name: Systém priľnavosti v zóne kopu
      description: Označuje technológiu použitú v zóne ohybu lyže na zabezpečenie
        trakcie.
    kickboard_features:
      name: Funkcie kickboardu
      description: Zdôrazňuje špeciálne vlastnosti kickboardu, ktoré zlepšujú tréning
        alebo pohodlie, vrátane povrchovej štruktúry a možností uchopenia.
    kickboard_handle_style:
      name: Typ rukoväte kickboardu
      description: Určuje, či a akým spôsobom je kickboard vybavený úchytmi alebo
        povrchovou úpravou, ktoré ovplyvňujú ovládateľnosť a pohodlie.
    kickstand_mounting_position:
      name: Poloha upevnenia stojana
      description: Určuje, kde na ráme bicykla sa upevňuje stojan (napr. upevnenie
        uprostred, na zadnej vidlici alebo na zadnej osi).
    kickstand_type:
      name: Typ stojana
      description: Opisuje konštrukčný typ alebo mechanizmus stojana (napr. bočný
        stojan s jednou nohou, stredový stojan s dvoma nohami, teleskopický stojan).
    kidney_belt_support_level:
      name: Úroveň opory obličkového pásu
      description: Úroveň celkovej opory určená výrobcom, ktorú poskytuje obličkový
        pás na stabilizáciu dolnej časti chrbta a brucha.
    kiln_firing_atmosphere:
      name: Atmosféra pri vypaľovaní v peci
      description: Určuje atmosféru vypaľovania, ktorú pec dokáže počas prevádzky
        zabezpečiť (napr. oxidácia alebo redukcia).
    kiln_heating_element_type:
      name: Typ vykurovacieho telesa pece
      description: Typ/materiál vykurovacích telies použitých v peci.
    kingpin_design:
      name: Dizajn hlavnej stredovej skrutky
      description: Opisuje konštrukčný štýl samotného uchytenia hlavnej stredovej
        skrutky, ktorý ovplyvňuje hmotnosť a priestor na grindovanie.
    kingpin_orientation:
      name: Orientácia hlavného čapu
      description: Určuje orientáciu hlavného čapu návesu, ktorá ovplyvňuje jazdné
        vlastnosti a kompatibilitu plošiny.
    kit_components_included:
      name: Vrátane súčastí súpravy
      description: Uvádza jednotlivé hardvérové komponenty dodávané v súprave (napr.
        zemné kolíky, skrutky, popruhy, montážny nástroj), aby nakupujúci presne vedeli,
        čo kupujú.
    kit_format:
      name: Formát súpravy
      description: Určuje, ako je súprava zabalená a prepravovaná (napr. v taštičke,
        puzdre, krabici).
    kit_items_included:
      name: Vrátane položiek súpravy
      description: Uvádza zoznam hlavného vybavenia a príslušenstva obsiahnutého v
        súprave na výrobu vína, aby nakupujúci vedeli rozlíšiť základné súpravy od
        náhradných balení obsahujúcich len náplne.
    kit_pouch_case_type:
      name: Typ puzdra/tašky na súpravu
      description: Určuje typ priloženého úložného riešenia pre súpravu na starostlivosť
        (ak je súčasťou balenia).
    kit_tools_included:
      name: Súprava nástrojov v balení
      description: Uvádza hlavné nástroje, ktoré sú súčasťou súpravy (ak sú súčasťou
        balenia) a slúžia na realizáciu projektu.
    kite_inflation_system:
      name: Systém nafukovania draka
      description: Uvádza, ako sa fúkajú predná hrana a vzpery draka.
    kite_line_configuration:
      name: Konfigurácia šnúr šarkana
      description: Uvádza počet letových/ovládacích šnúr, na ktoré je plachta draka
        navrhnutá, čo je bežný údaj potrebný na správne spárovanie riadiacich tyčí
        a šnúr.
    kite_type:
      name: Typ draka
      description: Určuje konštrukčnú kategóriu draka (tvar a typ popruhov).
    kiteboard_bag_style:
      name: Štýl tašky na kiteboard
      description: Konkrétny typ alebo podtyp puzdra na kiteboard (napr. puzdro na
        dosku, golfová taška, cestovná taška, taška na foil).
    kiwifruit_variety:
      name: Odroda kivi
      description: Určuje konkrétnu odrodu alebo farebnú variantu kivi (zelené, zlaté,
        červené atď.).
    knee_pad_pocket_type:
      name: Typ vaku na chrániče kolien
      description: Uvádza, či a akým spôsobom je odev prispôsobený na nosenie ochranných
        chráničov kolien.
    knee_pad_style:
      name: Štýl chráničov kolien
      description: Opisuje konštrukčný štýl alebo tvar chrániča kolena (napr. návlek,
        ortéza, chránič).
    knee_protection_design:
      name: Dizajn chráničov kolien
      description: Uvádza počet ohybných kolenných dielov zabudovaných do chrániča
        dolnej končatiny.
    kneeboard_construction:
      name: Konštrukcia kolennej platne
      description: Určuje hlavnú konštrukčnú techniku alebo zloženie platne (napr.
        rotačne lisovaný plast, kompresné lisovanie, uhlíkové vlákno).
    kneeboard_strap_type:
      name: Typ popruhu kolennej platne
      description: Opisuje typ systému kolenných popruhov, ktorý slúži na upevnenie
        jazdca k doske.
    knife_lock_mechanism:
      name: Mechanizmus aretácie noža
      description: Určuje mechanizmus používaný na zaistenie čepele skladacieho noža
        v otvorenej polohe alebo označuje konštrukcie bez aretácie.
    knife_locking_mechanism:
      name: Mechanizmus aretácie noža
      description: Určuje typ mechanizmu, ktorý zaisťuje čepeľ v otvorenej polohe,
        čím priamo ovplyvňuje bezpečnosť, pevnosť a jednoduchosť používania nožov
        s aretáciou čepele.
    knife_opening_mechanism:
      name: Mechanizmus otvárania noža
      description: Opisuje, ako sa čepeľ vysúva z rukoväte, pričom rozlišuje medzi
        ručným, asistovaným, automatickým a špeciálnym spôsobom otvárania.
    knife_system:
      name: Systém noža
      description: Či a akým spôsobom funguje orezávací nôž na overlocku.
    knit_elastic_application:
      name: Aplikácia pružnej pleteniny
      description: Určuje zamýšľané použitie pleteného elastického lemovania pri šití
        alebo ručných prácach.
    knit_pattern:
      name: Vzor úpletu
      description: Identifikuje primárny vzor úpletu alebo textúru svetra na zapínanie,
        ako je napríklad vrkočový vzor, rebrovanie alebo vafľový vzor, čo nakupujúcim
        umožňuje vyhľadať špecifické textúry a termoregulačné vlastnosti.
    knit_style:
      name: Štýl úpletu
      description: Určuje základnú štruktúru úpletu, textúru alebo ozdobný vzor na
        materiáli svetra.
    knitting_marker_counter_type:
      name: Typ pletacieho značkovača/počítadla
      description: Špecifikuje funkčný typ produktu v rámci značkovačov a počítadiel
        na pletenie.
    knitting_needle_tip_style:
      name: Štýl špičky pletacej ihlice
      description: Ostrie a tvar špičky sú prispôsobené rôznym typom priadze a technikám.
    knock_sensor_technology:
      name: Technológia snímača klopania
      description: Technológia snímania použitá v senzore klepania.
    knurl_aggressiveness:
      name: Intenzita vrúbkovania
      description: Opisuje ostrosť alebo štruktúru vzoru vrúbkovania na drieku tyče,
        čo ovplyvňuje pohodlie a istotu pri uchopení.
    knurl_marking_standard:
      name: Norma pre vrúbkované značenie
      description: Určuje polohu referenčných krúžkov vrúbkovania, ktoré slúžia na
        umiestnenie rúk (napr. značenia IPF alebo IWF).
    kohlrabi_variety:
      name: Odroda kalerábu
      description: Určuje druh alebo komerčnú odrodu kalerábovej hlávky, čím umožňuje
        zákazníkom vybrať si medzi rôznymi chuťovými profilmi, veľkosťami a farbami.
    koji_mold_type:
      name: Typ plesne koji
      description: Uvádza typ alebo kmeň plesne koji použitej počas fermentácie, čo
        ovplyvňuje arómu a chuť.
    kumquat_variety:
      name: Odroda kumkvatov
      description: Uvádza názov druhu alebo odrody ponúkaných kumkvatov, čo umožňuje
        nakupujúcim vybrať si ovocie podľa svojho chuťového profilu, veľkosti alebo
        spôsobu použitia v kuchyni.
    label_edge_type:
      name: Typ okraja štítku
      description: Určuje spôsob úpravy okrajov, ktorý slúži na zabránenie strapkaniu
        a na dotvorenie estetického vzhľadu.
    label_finish:
      name: Povrchová úprava štítka
      description: Určuje povrchovú úpravu, štruktúru alebo ochranný náter/ošetrenie,
        ktorými je štítok opatrený.
    label_finish_edge_style:
      name: Povrchová úprava štítka/tvar okraja
      description: Ako sú spracované okraje, čo ovplyvňuje pohodlie a odolnosť (napr.
        tkaný okraj alebo laserom vyrezaný okraj).
    label_fold_type:
      name: Typ prehybu štítka
      description: Určuje spôsob, akým je všitý štítok navrhnutý na všitie do príslušnej
        položky (napr. preložený na konci alebo preložený uprostred), čo ovplyvňuje
        spôsob jeho aplikácie a umiestnenie.
    label_text_type:
      name: Typ textu na štítku
      description: Uvádza, či je štítok prázdny, vopred potlačený alebo určený na
        personalizáciu/prispôsobenie.
    lace_area_size:
      name: Veľkosť čipkovanej oblasti
      description: Určuje veľkosť alebo usporiadanie čipkovanej časti (napr.zapínanie
        4×4, predná časť 13×6), čo stanovuje dostupný priestor na oddelenie.
    lace_tightener_style:
      name: Štýl uťahovania na šnúrku
      description: Určuje mechanickú konštrukciu alebo tvar uťahovania na šnúrku.
    lace_type:
      name: Typ čipky
      description: Opisuje materiál šnúrky alebo povrchovú úpravu v oblasti vlasovej
        línie/pokrývky hlavy, čo ovplyvňuje realistický vzhľad a zladenie s odtieňom
        pleti.
    lacrosse_ball_certification:
      name: Certifikácia lakrosovej lopty
      description: Uvádza schválenia alebo normy príslušných športových zväzov, ktoré
        spĺňa lakrosová lopta.
    lacrosse_goal_regulation_certification:
      name: Certifikácia rozmerov bránky na lakros
      description: Označuje, či lakrosová bránka alebo sieť spĺňa špecifikácie konkrétneho
        regulačného orgánu (napr. NCAA alebo NFHS).
    lacrosse_pocket_type:
      name: Typ výpletu hlavy lakrosovej hokejky
      description: Identifikuje všeobecný štýl výpletu alebo sieťky na hlave lakrosovej
        hokejky, čo ovplyvňuje kontrolu nad loptičkou a jej vymrštenie.
    lacrosse_string_type:
      name: Typ výpletu na lakros
      description: Uvádza presný tvar alebo určenie danej výpletovej alebo sieťovinovej
        položky, aby zákazníci vedeli rozlišovať medzi jednotlivými sieťovinami, súpravami
        a výpletmi.
    ladder_position:
      name: Poloha rebríka
      description: Uvádza, kde sa nachádza rebrík alebo schody na detskej poschodovej
        posteli.
    lanyard_attachment_hardware:
      name: Upevňovacie prvky na šnúrke
      description: Označuje typ kovovej časti na konci šnúrky, ktorá slúži na pripevnenie
        kľúčov, preukazov, telefónov alebo iného príslušenstva.
    lanyard_style:
      name: Štýl šnúrok
      description: Určuje, ako sa šnúrka nosí.
    lanyard_type:
      name: Typ šnúrky
      description: Popisuje typ šnúrky, ktorá je súčasťou píšťalky alebo je s ňou
        kompatibilná.
    lap_hand_loom_accessories_included:
      name: Pribalené príslušenstvo k ručnému tkáčskemu stavu
      description: Príslušenstvo dodávané v balení ručného tkáčskeho stavu.
    lapel_style:
      name: Štýl klopy
      description: Špecifikuje dizajn klopy na saku (napr. stupňovitá klopa, špicatá
        klopa, šálový golier).
    laser_safety_class:
      name: Trieda bezpečnosti laseru
      description: Klasifikácia produktu z hľadiska laserovej bezpečnosti (napr. trieda
        2, 3R, 3B, 4) uvedená v dokumentácii alebo na štítku zariadenia.
    latex_processing_method:
      name: Spôsob spracovania latexu
      description: Určuje výrobný proces použitý pri výrobe latexovej peny – zvyčajne
        Dunlop alebo Talalay – ktorý ovplyvňuje pocit pri ležaní, pružnosť a cenu.
    latex_type:
      name: Typ latexu
      description: Uvádza pôvod a zloženie latexu použitého v matraci (prírodný, organický,
        syntetický alebo ich kombinácia), čím informuje nakupujúcich o trvanlivosti,
        ekologickosti a potenciálnych alergénoch.
    launch_profile:
      name: Profil odpalu
      description: Uvádza typickú trajektóriu odpalu (nízka, stredná, vysoká), na
        ktorú je konštrukcia drieku golfovej palice prispôsobená.
    launcher_mounting_configuration:
      name: Konfigurácia upevnenia štartovacieho zariadenia
      description: Identifikuje, ako je odpaľovacie zariadenie namontované alebo nakonfigurované
        na použitie, čo pomáha kupujúcim, ktorí potrebujú samostatne stojace, podhlavňové
        varianty alebo varianty s montážou na lištu.
    layer_construction:
      name: Konštrukcia vrstvy
      description: Určuje konštrukciu tkanivového laminátu (napr. 2-vrstvová, 2,5-vrstvová,
        3-vrstvová), ktorá ovplyvňuje hmotnosť, skladnosť a odolnosť.
    layer_design:
      name: Konštrukcia vrstiev
      description: Opisuje konštrukciu sieťky na vlasy z hľadiska vrstiev alebo obojstrannosti.
    lazy_kate_tension_control_type:
      name: Typ regulácie napnutia napínacieho stojana
      description: Ako napínací stojan vyvíja odpor/napätie na cievky počas splietania
        alebo navíjania priadze.
    lead_hardware_type:
      name: Typ hardvéru vodidla
      description: Určuje typ upevnenia alebo zapínania na konci vodidla (karabína,
        spona, slučka, reťaz atď.), čo ovplyvňuje jednoduchosť používania, bezpečnosť
        a vhodnosť pre danú disciplínu.
    leaf_gelatin_grade:
      name: Trieda listovej želatíny
      description: Určuje štandardizovanú triedu pevnosti používanú pre želatínové
        plátky.
    leaf_preparation:
      name: Príprava listu
      description: Popisuje, ako sa listy pred balením pripravujú, napríklad či sú
        sekané, strúhané alebo krájané na tenké plátky.
    leaf_spring_material:
      name: Materiál listovej pružiny
      description: Hlavný konštrukčný materiál sústavy listových pružín.
    leak_protection_layer:
      name: Ochranná vrstva proti úniku
      description: Uvádza, či má integrovaný systém plienky v plaveckých nohaviciach
        jedno- alebo dvojvrstvovú konštrukciu na ochranu proti pretečeniu.
    leash_clip_type:
      name: Typ karabíny na vôdzku
      description: Špecifikuje štýl karabíny alebo kovania použitého na pripevnenie
        vôdzky k obojku alebo postroju (napr. klasická piestová karabína, horolezecká
        karabína, otočná karabína).
    leash_style:
      name: Štýl vôdzky
      description: Opisuje konfiguráciu šnúrky alebo spôsob jej vinutia.
    leash_type:
      name: Typ vôdzky
      description: Klasifikuje všeobecný štýl alebo účelové vyhotovenie vôdzky, čo
        umožňuje rýchle vyhľadávanie podľa zamýšľaného použitia.
    leavening_action_type:
      name: Typ kypriaceho účinku
      description: Určuje chemické zloženie alebo spôsob účinku prášku do pečiva (napr.
        jednozložkový, dvojzložkový, bez obsahu hliníka).To priamo ovplyvňuje vlastnosti
        pri pečení a vhodnosť pre daný recept.
    leavening_agent:
      name: Kypiaca látka
      description: Určuje hlavný spôsob kysnutia použitý v ceste.
    led_color_options:
      name: Možnosti farieb LED diód
      description: Uvádza zoznam voliteľných farieb LED diód, ktoré sú k dispozícii
        na alarme na vizuálnu signalizáciu záberu.
    led_indicator_color:
      name: Farba LED indikátora
      description: Určuje farbu LED indikátora produktu, čo rybárom pomáha zosúladiť
        viacero signálov alebo prispôsobiť ich svojim osobným preferenciám.
    led_light_color:
      name: Farba LED svetla
      description: Určuje farbu akéhokoľvek integrovaného LED svetla.
    leek_variety:
      name: Odroda póru
      description: Určuje druh alebo odrodu póru, čo umožňuje rozlíšiť ich podľa chuti,
        veľkosti a vegetačného obdobia.
    leg_coverage:
      name: Prekrytie nôh
      description: Určuje, akú časť nohy zakrýva neoprénový diel (napr. krátky, na
        celú dĺžku).
    leg_cuff_style:
      name: Štýl manžety na nohaviciach
      description: Určuje spôsob zakončenia v oblasti členkov nohavíc.
    leg_cut_height:
      name: Výška výstrihu na nohe
      description: Uvádza, do akej výšky siaha výstrih na nohavičkách bikín.
    leg_cut_style:
      name: Strih s rozparkom na nohe
      description: Opisuje tvar otvoru na nohu, ktorý ovplyvňuje vzhľad, pohodlie
        a línie opálenia.
    leg_length:
      name: Dĺžka nohavice
      description: Kategórie plaviek sú rozdelené podľa dĺžky nohavice (krátke, stredne
        dlhé, dlhé), aby si nakupujúci mohli vybrať preferovaný strih bez toho, aby
        sa kategória ďalej členila.
    leg_loop_type:
      name: Typ stehenných popruhov
      description: Opisuje dizajn zakončenia nohavice.
    leg_opening_style:
      name: Štýl výrezu/otvoru na nohy
      description: Určuje, akým spôsobom sú zakončené nohavice na teplákoch, napríklad
        elastické manžety, lem so zipsom alebo otvorený lem.
    leg_style:
      name: Štýl nohy
      description: Určuje dizajn alebo konštrukčný štýl nôh alebo podstavca lavice.
    legging_foot_design:
      name: Dizajn chodidla na legínach
      description: Určuje, či sú legíny bez chodidla, s chodidlom alebo či sa dajú
        nosiť obomi spôsobmi.
    leggings_waistband_style:
      name: Štýl pásu legín
      description: Určuje konštrukčné riešenie pásu legín, čo ovplyvňuje pohodlie,
        oporu a vzhľad.
    lei_closure_style:
      name: Zapínanie v štýle havajského venca
      description: Opisuje, či má náhrdelník tvar uzavretej slučky, alebo má otvorené
        konce, ktoré sa zaväzujú alebo upevňujú stuhou.
    lemon_variety:
      name: Odroda citróna
      description: Uvádza konkrétnu odrodu alebo druh citrónov (napr. Eureka, Meyer,
        Amalfi).
    length_adjustment_method:
      name: Spôsob nastavenia dĺžky
      description: Označuje, či a ako je možné nastaviť dĺžku švihadla tak, aby vyhovovala
        používateľovi.
    lens_color_tint:
      name: Farba/odtieň skiel
      description: Farba alebo odtieň ochranných skiel okuliarov dodávaných spolu
        s produktom.
    lens_construction:
      name: Konštrukcia šošoviek
      description: Určuje konštrukciu skla (napr. jednovrstvové, dvojvrstvové izolačné
        sklo) s ohľadom na odolnosť proti zahmlievaniu a optické vlastnosti.
    lens_tint_category:
      name: Kategória sfarbenia šošoviek
      description: Klasifikuje stupeň tónovania skiel na základe medzinárodných kategórií
        tónovania, čím pomáha zákazníkom vybrať si sklá vhodné pre rôzne svetelné
        podmienky.
    lettuce_variety:
      name: Odroda šalátu
      description: Určuje konkrétnu pestovateľskú odrodu šalátu (napr. ľadový, rímsky,
        maslový), čo umožňuje presné filtrovanie a porovnávanie.
    level_of_play:
      name: Úroveň hry
      description: Výkonnostná úroveň stanovená výrobcom, ktorá zodpovedá konkurencieschopnosti
        a rozpočtu hráča.
    lever_configuration:
      name: Konfigurácia pák
      description: Uvádza konfiguráciu pák/rukovätí ovládania motora vodného skútra
        (napr. jednopákové alebo dvojpákové).
    lever_type:
      name: Typ páky
      description: Typ/mechanizmus pák na zmenu výšky tónu namontovaných na strunách
        harfy.
    license_plate_cover_style:
      name: Štýl krytu evidenčného čísla vozidla
      description: Určuje konštrukčný typ krytu evidenčného čísla vozidla (napr. celoplošný
        kryt alebo skrutkovacie viečka).
    license_plate_personalization_type:
      name: Typ personalizácie evidenčného čísla vozidla
      description: Určuje, či je evidenčné číslo vozidla prázdne, vopred potlačené
        alebo či umožňuje personalizáciu (text a/alebo grafiku) podľa požiadaviek
        kupujúceho.
    license_usage_terms:
      name: Licenčné podmienky/podmienky používania
      description: Práva na používanie vzoru (napr. výlučne na osobné účely alebo
        obmedzené komerčné využitie).
    licensed_sports_property:
      name: Licencované športové náčinie
      description: Uvádza, či má produkt oficiálnu licenciu od ligy/tímu/organizácie.
    lid_hinge_mechanism:
      name: Mechanizmus pántu veka
      description: Určuje typ pántového mechanizmu použitý na veku, čo má vplyv na
        bezpečnosť a jednoduchosť používania.
    lid_support_positions:
      name: Oporné polohy veka
      description: Určuje podporované polohy pák na otváranie veka klavíra (ako ďaleko
        sa dá veko otvoriť).
    lie_angle_color_code:
      name: Farebný kód uhla sklonu
      description: Označuje systém farebného kódovania uhla sklonu palice, ktorý výrobca
        používa na niektorých paliciach (napr. čierna bodka, zelená bodka).
    life_jacket_certification_standard:
      name: Certifikačná norma záchrannej vesty
      description: Oficiálna bezpečnostná klasifikácia alebo norma, ktorú produkt
        spĺňa, napríklad typ USCG alebo úrovne ISO/AS.
    life_raft_certification_standard:
      name: Certifikačná norma záchranného člna
      description: Bezpečnostná norma/certifikácia, podľa ktorej je čln vyrobený a
        servisovaný.
    life_raft_container_type:
      name: Typ kontajnera pre záchranný čln
      description: Ako sa záchranný čln balí na uskladnenie a nasadenie.
    life_vest_approval_standard:
      name: Schvaľovacia norma záchrannej vesty
      description: Určuje certifikačnú/schvaľovaciu normu, ktorú táto záchranná vesta
        spĺňa.
    life_vest_intended_user:
      name: Zamýšľaný používateľ záchrannej vesty
      description: Uvádza zamýšľanú kategóriu používateľa s ohľadom na strih a vybavenie.
    lifebuoy_approval_standard:
      name: Schvaľovací štandard záchranného kolesa
      description: Bezpečnostné schválenie alebo norma, ktorú záchranné koleso spĺňa
        (napr. USCG/SOLAS).
    lifebuoy_features:
      name: Funkcie záchranného kolesa
      description: Funkčná bezpečnosť, montáž/manipulácia a príslušenstvo dodávané
        so záchrannými kolesami.
    lift_mechanism_type:
      name: Typ zdvíhacieho mechanizmu
      description: Určuje mechanizmus, ktorý pomáha pri dvíhaní nahor/spúšťaní nadol
        alebo vyklápaní/zaklápaní nástennej postele.
    lift_stand_support_point:
      name: Oporný bod zdviháka/podpery
      description: Miesto, kde zdvihák/podpera prichádza do kontaktu s vozidlom alebo
        ho podopiera.
    lifting_gas_type:
      name: Typ nosného plynu
      description: Určuje primárny nosný plyn alebo nosné médium používané vzducholoďou.
    lifting_support_type:
      name: Typ zdvíhacej podpory
      description: Indikuje, či sa na zdvihák zachádza pomocou nájazdových plošín,
        alebo či dvíha vozidlo pomocou ramien/pätiek, ktoré sú v kontakte s rámom
        alebo opornými bodmi vozidla.
    ligature_and_cap_component_type:
      name: Komponent typu ligatúra a viečko
      description: Uvádza, či ide o ligatúru, viečko alebo súpravu, ktorá obsahuje
        oboje.
    ligature_material:
      name: Materiál ligatúry
      description: Hlavný materiál tela ligatúry, ktorý prichádza do styku s jazýčkom
        a drží ho na mieste (napr. kov, koža, textília).
    ligature_plating_or_finish:
      name: Pokovovanie alebo povrchová úprava ligatúry
      description: Určuje povrchovú úpravu a/alebo povrchovú vrstvu použitú na kovovej
        ligatúre a/alebo viečku klarinetu.
    ligature_reed_contact_style:
      name: Štýl kontaktu jazýčka s ligatúrou
      description: Určuje, akým spôsobom sa ligatúra dotýka jazýčka (napr. minimálny
        kontakt, viacbodový kontakt, obopínajúci kontakt).
    ligature_screw_position_relative_to_reed:
      name: Poloha skrutky ligatúry (vzhľadom na jazýček)
      description: Uvádza polohu upínacích skrutiek ligatúry vo vzťahu k jazýčku/strane
        smerujúcej k hráčovi pri inštalácii na náustok.
    ligature_tension_adjustment_mechanism:
      name: Mechanizmus na nastavenie napätia ligatúry
      description: Opisuje, ako ligatúra pôsobí/reguluje tlak na jazýček (systém uťahovania).
    ligature_tightening_mechanism_type:
      name: Typ mechanizmu uťahovania ligatúry
      description: Určuje mechanizmus, ktorým sa ligatúra utiahne okolo náustku a
        plátku (napr. s jedným skrutkovým upevnením, s dvoma skrutkovými upevneniami,
        s pákovým mechanizmom alebo s rýchloupínacím mechanizmom).
    light_bar_housing_material:
      name: Materiál krytu svetelnej lišty
      description: Primárny materiál krytu/telesa svetelnej lišty, odolnosť voči nárazom
        a odvádzanie tepla.
    light_bar_lens_material:
      name: Materiál šošoviek svetelnej lišty
      description: Hlavný materiál šošovky/krytu svetelnej lišty, ktorý môže ovplyvniť
        odolnosť proti nárazom a optickú čírosť.
    light_bar_mounting_location:
      name: Miesto upevnenia svetelnej lišty
      description: Primárna zamýšľaná montážna poloha na vozidle.
    light_stand_style:
      name: Štýl stojana na svetlá
      description: Určuje konštrukčný typ alebo tvar stojana slúžiaceho na uchytenie
        svetiel pre špeciálne efekty (napr. statív, T-tyč, zdvíhací mechanizmus),
        nie inštalačný povrch (stena/strop), ktorý charakterizuje typ upevnenia.
    light_switch_function:
      name: Funkcia spínača svetiel
      description: Uvádza, ktoré osvetľovacie obvody alebo funkcie spínač ovláda.
    lighting_control_protocols_supported:
      name: Podporované protokoly ovládania svetiel
      description: Riadiace/sieťové protokoly, ktoré ovládač podporuje popri protokole
        DMX512 alebo namiesto neho.
    lighting_effects:
      name: Svetelné efekty
      description: Uvádza všetky integrované svetelné prvky, ktoré vylepšujú pocit
        z hrania alebo vzhľad.
    lighting_mode:
      name: Režim osvetlenia
      description: Uvádza dostupné režimy svietenia, ako napríklad trvalé svietenie,
        blikanie, stroboskopické svietenie alebo SOS.
    lily_variety:
      name: Odroda ľalie
      description: Určuje komerčnú/botanickú odrodu ľalie, ktorá sa predáva ako čerstvo
        zrezaná kvetina (napr. ázijská, orientálna).
    limb_articulation:
      name: Kĺbový ohyb ramien
      description: Uvádza stupeň ohybnosti končatín alebo pohyblivosti kĺbov na figuríne
        (žiadna, fixná, čiastočne ohybná, plne pohyblivá).
    limb_material:
      name: Materiál ramena
      description: Hlavný materiál používaný na výrobu ramien luku alebo kuše, ktorý
        ovplyvňuje hmotnosť, odolnosť, vibrácie a celkový výkon.
    lime_variety:
      name: Odroda lipy
      description: Uvádza konkrétnu botanickú alebo komerčnú odrodu predávanej limetky.
    line_buoyancy:
      name: Vztlak linky
      description: Opisuje, či pletená šnúra prirodzene pláva alebo klesá ku dnu a
        akou rýchlosťou, čo ovplyvňuje prezentáciu návnady a vedenie vlasca.
    line_purpose:
      name: Účel linky
      description: Definuje zamýšľanú funkciu šnúry v rámci celého systému šarkana
        (napríklad predná riadiaca/ťažná šnúra, odľahčovacia šnúra alebo vyväzovacia
        šnúra).
    linen_finish_treatment:
      name: Povrchová úprava/ošetrenie ľanu
      description: Akýkoľvek proces povrchovej úpravy ľanovej tkaniny, ktorý mení
        jej pocit na dotyk, vzhľad alebo vlastnosti.
    linen_weave_type:
      name: Typ ľanovej väzby
      description: Určuje štruktúru väzby ľanovej tkaniny, ktorá ovplyvňuje textúru,
        priedušnosť a splývavosť.
    liner_padding_type:
      name: Typ výstelky vložky
      description: Označuje konštrukciu alebo typ výstelky vložky (napr. sieťovina,
        ľahko polstrovaná, prešívaná).
    liner_shape:
      name: Tvar vložky
      description: Opisuje všeobecný tvar vložky do spacieho vaku, aby si ju zákazníci
        mohli vybrať podľa svojho spacieho vaku a preferencií, pokiaľ ide o pohodlie.
    liner_type:
      name: Typ výstelky
      description: Uvádza, či majú šortky vnútornú podšívku, a ak áno, akého typu
        je.
    lining:
      name: Podšívka
      description: Uvádza, či a ako sú plavky podšité, vrátane rozsahu podšívky vo
        vnútri odevu.
    lining_material:
      name: Materiál podšívky
      description: Určuje materiál použitý na vnútornú výstelku topánky, ktorý ovplyvňuje
        pohodlie, priedušnosť a tepelnú izoláciu.
    lining_type:
      name: Typ výstelky
      description: Určuje, či sú plavky podšité a do akej miery.
    link_connection_style:
      name: Štýl pripojenia článku
      description: Určuje spôsob, akým sa článok pripája k reťazi (napr. rýchlospojka,
        spojovací kolík), čo umožňuje cyklistom vybrať si správny spôsob montáže alebo
        náhradný diel.
    live_bait_form:
      name: Forma živej návnady
      description: Určuje fyzický stav alebo spôsob konzervácie návnady, napríklad
        živá, mrazená alebo sušená.
    living_room_furniture_items_included:
      name: Vrátane položiek obývačkového nábytku
      description: Uvádza jednotlivé kusy nábytku, ktoré tvoria súčasť obývacej izby,
        čo pomáha nakupujúcim rýchlo zistiť, aké konkrétne komponenty (napr. pohovka,
        dvojmiestna pohovka, konferenčný stolík) sú v súprave zahrnuté.
    load_mechanism:
      name: Nakladací mechanizmus
      description: Určuje hlavný spôsob, akým sa na stroji vytvára alebo pridáva odpor
        (napr. závažia s voliteľnou záťažou, závažia v podobe platní, odporové pásy).
    lock_cylinder_type:
      name: Typ cylindrickej vložky
      description: Špecifikuje typ cylindrickej vložky/jadra zámky (dôležité z hľadiska
        odolnosti proti vypáčeniu/planžetovaniu a výroby náhradných kľúčov).
    lock_security_level:
      name: Úroveň zabezpečenia zámky
      description: Opisuje bezpečnostné vlastnosti zámky/vložky z hľadiska odolnosti
        voči vylomeniu a odvŕtaniu.
    lock_system:
      name: Systém blokovania
      description: Typ bezpečnostného blokovacieho systému, ktorý slúži na udržanie
        výťahu vo výške.
    locker_bench_configuration:
      name: Konfigurácia lavice so skrinkami
      description: Opisuje orientáciu alebo konštrukčné usporiadanie lavice so skrinkami
        (napr. jednostranná, obojstranná ostrovná, nástenná).
    locomotive_prototype_power_type:
      name: Typ pohonu prototypu lokomotívy
      description: Určuje typ pohonu lokomotívy v skutočnosti, ktorý model reprezentuje.
    locomotive_wheel_arrangement_whyte_notation:
      name: Usporiadanie kolies lokomotívy (Whyteho notácia)
      description: Usporiadanie kolies prototypu lokomotívy (napr. 4-6-2 Pacific).
    loft_bed_height_classification:
      name: Klasifikácia výšky poschodových postelí
      description: Uvádza celkovú výšku poschodovej postele (nízka, stredná, vysoká,
        extra vysoká), čo pomáha zákazníkom zosúladiť výšku stropu s požiadavkami
        na priestor pod posteľou.
    logo_application_method:
      name: Spôsob použitia loga
      description: Opisuje, akým spôsobom je školský znak alebo logo aplikované na
        odev (napr. výšivka alebo potlač).
    logo_label_compatible_fabric_weight:
      name: Gramáž látky vhodnej na výrobu štítkov s logom
      description: Odporúčaná gramáž látky pre prišitie štítku bez deformácie alebo
        nadmerného zväčšenia objemu.
    logo_label_edge_finish:
      name: Úprava okrajov štítku s logom
      description: Určuje konštrukciu a povrchovú úpravu okraja štítku, čo ovplyvňuje
        odolnosť proti roztrhaniu a príjemný pocit pri kontakte s pokožkou.
    logo_label_print_production_method:
      name: Tlač loga na štítky/spôsob výroby
      description: Ako sa logo nanáša/vytvára na povrchu štítka.
    long_block_completeness:
      name: Úplnosť dlhého bloku
      description: Uvádza, ktoré hlavné komponenty sú súčasťou zostavy dlhého bloku.
    long_john_pieces_included:
      name: Kusy termoprádla v balení
      description: Objasňuje, či produkt obsahuje iba spodný diel, iba vrchný diel,
        alebo obidva diely súpravy termoprádla.
    longan_variety:
      name: Odroda longanu
      description: Uvádza druh alebo komerčnú odrodu plodu longan (napr. Kohala, Biew
        Kiew), čím pomáha nakupujúcim zistiť požadované vlastnosti, ako sú chuť, veľkosť
        a sladkosť.
    loom_accessories_included:
      name: Vrátane príslušenstva k tkáčskemu stavu
      description: Hlavné príslušenstvo dodávané spolu s tkáčskym stavom v škatuli/balení.
    loom_finish:
      name: Úprava tkáčskeho stavu
      description: Povrchová úprava tkáčskeho stavu (predovšetkým u drevených tkáčskych
        stavov).
    loom_folding_portability_design_type:
      name: Typ konštrukcie so skladacím rámom/prenosná konštrukcia
      description: Či a ako sa tkáčsky stav dá zložiť/sklopiť na účely prepravy alebo
        úsporného skladovania.
    loom_frame_folding_design:
      name: Konštrukcia skladacieho tkáčskeho stavu
      description: Určuje, či a ako sa rám stolového tkáčskeho stavu sklápa, skladá
        alebo rozkladá na účely skladovania alebo prepravy.
    loom_tension_adjustment_method:
      name: Spôsob nastavenia napätia tkáčskeho stavu
      description: Hlavná metóda používaná na nastavenie napätia osnovy na tkáčskom
        stave.
    loom_tie_up_system:
      name: Systém viazania tkáčskeho stavu
      description: Typ systému viazania/spojenia použitého medzi podnožkami, podperami
        a listami (napr. Texsolv alebo kovová reťaz).
    loquat_variety:
      name: Odroda mišpule
      description: Určuje druh alebo odrodu mišpule, čím sa zohľadňujú rozdiely vo
        veľkosti, chuti, dobe zrenia a vzhľade.
    lubricant_features:
      name: Vlastnosti maziva
      description: Zdôrazňuje osobitné prevádzkové vlastnosti, prímesi alebo výhody
        maziva.
    lubrication_requirement:
      name: Požiadavka na mazanie
      description: Uvádza, či je bežecký pás ošetrený vopred/bezúdržbový, alebo si
        vyžaduje pravidelné mazanie či voskovanie.
    lubrication_type:
      name: Typ mazania
      description: Určuje mazateľnosť puzdra a to, či je navrhnuté na mazanie tukom
        (napr. drážky alebo maznica).
    lug_nut_seat_profile:
      name: Profil dosadacej plochy matice kolesa
      description: Určuje profil dosadacej plochy matice kolesa, ktorý je potrebný
        na zabezpečenie správnej kompatibility matíc a bezpečnej montáže.
    lumbar_support_type:
      name: Typ bedrovej opierky
      description: Opisuje typ bedrovej opierky, ktorou je stolička vybavená (napr.
        odnímateľný vankúš, nastaviteľný mechanizmus, masáž).
    lunge_trainer_style:
      name: Štýl výpadového trenažéra
      description: Definuje konštrukčný dizajn lonžovacieho trenažéra.
    lure_buoyancy:
      name: Vztlak návnady
      description: Určuje, ako sa návnada správa vo vodnom stĺpci v pokoji alebo pri
        navíjaní (napr. pláva na hladine, vznáša sa v strednej hĺbke alebo klesá ku
        dnu).
    luster:
      name: Luster
      description: Opisuje spôsob, akým svetlo interaguje s povrchom vzorky (napr.
        sklovitý, kovový).
    lychee_cultivar:
      name: Odroda liči
      description: Uvádza konkrétnu odrodu alebo druh liči – napríklad Brewster, Hak
        Ip alebo Mauritius – ktoré sa môžu líšiť chuťou, veľkosťou semien, obdobím
        zberu a cenou.
    lyre_flip_folder_mounting_location:
      name: Miesto upevnenia nôt alebo notového zápisu
      description: Miesto na nástroji alebo príslušenstve určené na montáž/upevnenie
        nôt alebo notového zápisu (napr. ozvučnica, nátrubková trubica, stojan).
    lyrics_display_type:
      name: Typ zobrazenia textu piesne
      description: Ako sa počas karaoke zobrazujú texty piesní (ak je táto funkcia
        podporovaná).
    magazine_compatibility:
      name: Kompatibilita so zásobníkmi
      description: Určuje hlavné kalibre zásobníkov alebo typy zásobníkov, na ktoré
        sú určené integrované vrecká na veste.
    magnet_requirement:
      name: Požiadavka na magnet
      description: Uvádza, či senzor na svoju činnosť potrebuje externý magnet.
    magnet_toy_storage_included:
      name: Vrátane úložného priestoru na magnetickú hračku
      description: Súčasťou balenia magnetickej hračky je úložný box na organizáciu
        pracovného stola a na cestovanie.
    malanga_variety:
      name: Odroda malangy
      description: Uvádza konkrétnu odrodu predávaného koreňa malanga/taro, aby sa
        pomohlo nakupujúcim vybrať si požadovanú chuť, farbu alebo spôsob použitia
        v kuchyni.
    malt_color_rating_system:
      name: Systém hodnotenia farby sladu
      description: Určuje, na ktorú farebnú škálu sa uvedená farba vzťahuje (Lovibond,
        SRM alebo EBC).
    malt_crush:
      name: Drvený slad
      description: Uvádza, či sa základný slad predáva v celku/nemletý alebo v preddrvenom
        stave, a ak áno, aký je spôsob drvenia.
    malt_form:
      name: Forma sladu
      description: Indikuje, či sa produkt predáva ako celé zrná, alebo spracovaný
        na rmutovanie (napr. drvený/šrotovaný).
    malt_intended_use:
      name: Určené použitie sladu
      description: Zamýšľané primárne použitie sladu (varenie piva, destilácia alebo
        dvojaký účel).
    malt_treatment:
      name: Variant sladu
      description: Popisuje, ako sa obilie/slad spracovávalo nad rámec bežného sušenia
        (bežné špeciálne postupy).
    malt_usage_purpose:
      name: Účel použitia sladu
      description: Opisuje hlavný funkčný prínos špeciálneho sladu pre receptúru piva.
    man_overboard_system_type:
      name: Typ systému pre prípad pádu človeka cez palubu
      description: Určuje hlavnú kategóriu riešení pre situácie, keď sa človek ocitne
        vo vode (MOB), ktorú tento produktu ponúka.
    mandolin_back_sides_wood:
      name: Drevo na zadnú dosku a bočnice mandolíny
      description: Určuje druh dreva použitý na zadnú dosku a bočnice mandolíny.
    mandolin_body_top_wood:
      name: Drevo na prednú dosku mandolíny
      description: Hlavné drevo/materiál použitý na výrobu rezonančnej dosky mandolíny
        (vrchná doska).
    mandolin_bridge_type:
      name: Typ kobylky na mandolíne
      description: Uvádza štýl mostíka použitého na mandolíne.
    mandolin_pickup_configuration:
      name: Konfigurácia snímačov na mandolínu
      description: Uvádza, či je mandolína vybavená elektronikou a aký typ snímača
        je v nej nainštalovaný.
    mandolin_string_configuration:
      name: Konfigurácia mandolínových strún
      description: Špecifikuje konfiguráciu strún mandolíny podľa celkového počtu
        strún a počtu zborov (napr. 8 strún/4 zbory).
    mangosteen_variety:
      name: Odroda mangostany
      description: Určuje konkrétny druh alebo odrodu predávanej mangostany alebo
        príbuzného plodu rodu Garcinia.
    mannequin_style:
      name: Štýl figuríny
      description: Popisuje konštrukčné riešenie alebo štýl konštrukcie výcvikovej
        figuríny.
    manufacturing_process:
      name: Výrobný proces
      description: Hlavná metóda výroby telesa navijaka alebo cievky (napr. CNC obrábanie,
        tlakové liatie).
    map_coverage_sky_planet_body:
      name: Pokrytie mapy (obloha/nebeské teleso)
      description: 'Uvádza, čo mapa znázorňuje: nočnú oblohu (súhvezdia) alebo konkrétne
        nebeské teleso.'
    map_format:
      name: Formát mapy
      description: Určuje fyzickú alebo digitálnu podobu loveckých máp a sprievodcov.
    map_sensor_output_signal_type:
      name: Typ výstupného signálu snímača MAP
      description: Určuje typ výstupného signálu, ktorý snímač MAP odosiela do riadiacej
        jednotky motora (ECU).
    map_size_sheet:
      name: Veľkosť mapy (hárok)
      description: Určuje konečný rozmer hárka mapy/plagátu/planisféry, čo pomáha
        pri umiestňovaní a zohľadňuje kompatibilitu (rozmery rámu, priestor na stene).
    marabou_feather_form:
      name: Forma marabuových pier
      description: Tvar predávaného produktu z marabuových pier.
    marabou_feather_treatment:
      name: Variant marabuových pier
      description: Ako bolo marabuovo perie spracované alebo upravené na použitie
        pri ručných prácach.
    marble_track_set_feature_modules:
      name: Moduly a funkčné prvky súpravy guľôčkovej dráhy
      description: Predstavuje špeciálne funkčné moduly, ktoré sú súčasťou súpravy
        (napr. zdvíhač, vystreľovač, spínače).
    marine_flare_certification_standard:
      name: Certifikácia/štandard pre námorné svetlice
      description: Uvádza, ktoré certifikáty alebo normy v oblasti námornej bezpečnosti
        má táto svetlica spĺňať.
    marine_safety_standard_compliance:
      name: Súlad s normami v oblasti námornej bezpečnosti
      description: Uvádza, ktoré formálne normy alebo schválenia týkajúce sa bezpečnosti
        na vode príslušenstvo spĺňa.
    marine_transmission_type:
      name: Typ lodnej prevodovky
      description: Určuje typ lodného prevodového systému, ktorý je spojený s vnútorným
        motorom (napr. priamy pohon alebo V-pohon).
    marker_action_type:
      name: Typ mechanizmu markéra
      description: Opisuje základný princíp streľby a fungovania markera.
    marker_caliber:
      name: Kaliber markera
      description: Určuje priemer paintballových guľôčok, na ktoré je marker určený.
    marking_durability:
      name: Trvanlivosť značenia
      description: Uvádza, ako dlho by mala byť namaľovaná čiara viditeľná za bežných
        podmienok, napríklad dočasne (do 3 týždňov), polo-trvalo (do 6 mesiacov) alebo
        trvalo (viac ako 6 mesiacov).
    marking_tip_type:
      name: Typ značkovacieho hrotu
      description: Typ značkovacej vložky, ktorú kružidlo používa (napr. držiak tuhy,
        atrament, rysovací hrot).
    marshmallow_processing_method:
      name: Metóda spracovania pochúťky marshmallow
      description: Opisuje akékoľvek špeciálne spracovanie pochúťky marshmallow, ktoré
        ovplyvňuje jej konzistenciu, trvanlivosť alebo chuť.
    marshmallow_size:
      name: Veľkosť penových cukríkov marshmallow
      description: Klasifikuje relatívnu veľkosť jednotlivých kúskov pochúťky marshmallow.
    martial_arts_belt_rank:
      name: Pás technickej zdatnosti v bojových umeniach
      description: Označuje úroveň zručnosti alebo technickej zdatnosti, ktorú reprezentuje
        farba opasku alebo špeciálna farebná kombinácia.
    mask_bib_type:
      name: Typ podbradníka šermiarskej masky
      description: Špecifikuje typ podbradníka na šermiarskej maske, ako je napríklad
        štandardný textilný, vodivý, odnímateľný alebo žiadny.
    mask_cage_material:
      name: Materiál klietky masky
      description: Materiál určený špeciálne na výrobu ochranného rámu na tvár alebo
        rámu masky.
    mask_goggle_design:
      name: Dizajn masky/okuliarov
      description: Určuje celkovú konštrukciu alebo typ krytia ochranného vybavenia.
    mask_skirt_material:
      name: Materiál lemovania masky
      description: Určuje materiál mäkkého lemovania, ktorý zabezpečuje vodotesné
        utesnenie medzi maskou a tvárou.
    mask_strap_material:
      name: Materiál remienka masky
      description: Určuje materiál popruhu, ktorým sa maska upevňuje na hlavu.
    mass_air_flow_sensor_measurement_type:
      name: Typ merania snímača hmotnostného prietoku vzduchu
      description: Určuje technológiu snímania/typ výstupu, ktoré používa snímač MAF.
    mass_air_flow_sensor_mounting_type:
      name: Typ upevnenia snímača hmotnostného prietoku vzduchu
      description: Ako sa snímač MAF alebo zostava snímačov montuje/inštaluje do sacieho
        systému.
    massage_feature:
      name: Funkcia masáže
      description: Uvádza, či má nastaviteľná základňa integrovanú masážnu funkciu
        a ak áno, koľko masážnych zón ponúka.
    mast_attachment_interface:
      name: Rozhranie pre upevnenie stožiara
      description: Určuje štandard spojenia medzi trupom a sťažňom, čím pomáha nakupujúcim
        zabezpečiť kompatibilitu komponentov.
    mast_base_type:
      name: Typ základne stožiara
      description: Určuje upevňovacie rozhranie, ktoré spája sťažeň s doskou alebo
        adaptérom.
    mast_bend_curve:
      name: Krivka ohybu sťažňa
      description: Ohybová charakteristika sťažňa, ktorá určuje kompatibilitu s plachtami
        a ovládateľnosť lode.
    mast_diameter_type:
      name: Typ priemeru sťažňa
      description: Štandardizovaná klasifikácia priemerov sťažňov na windsurfing (napr.
        RDM, SDM, MDM) používaná na overenie kompatibility.
    mat_backing_type:
      name: Typ podkladu rohože
      description: Určuje typ podložky na spodnej strane rohože, ktorá pomáha udržať
        ju na mieste na rôznych povrchoch.
    mat_installation_method:
      name: Spôsob inštalácie rohože
      description: Uvádza, ako sa rohož inštaluje alebo upevňuje na miesto.
    mat_style:
      name: Štýl rohože
      description: Určuje konštrukčný štýl alebo tvar rohože (napr. skladacia rohož,
        zaisťovacia dlaždica, ochranná podložka).
    maternity_panel_type:
      name: Typ tehotenského panelu
      description: Označuje typ elastického panelu alebo pásu, ktorý je navrhnutý
        tak, aby sa prispôsoboval rastu bruška počas tehotenstva.
    maternity_waistband_style:
      name: Štýl tehotenského pásu
      description: Uvádza dizajn a umiestnenie pásu alebo brušného panelu typického
        pre tehotenské nohavice a opisuje, ako sa tento odev prispôsobuje rastúcemu
        brušku.
    mattress_top_type:
      name: Typ vrchnej časti matraca
      description: Určuje štýl vrchnej vrstvy matraca alebo konštrukciu povrchu, napríklad
        s vankúšovou vrstvou alebo s pevným povrchom.
    maturation_vessel_material:
      name: Materiál zrecej nádoby
      description: Určuje hlavný materiál nádoby alebo suda používaného na zrenie
        šóču.
    maximum_quilt_size_supported:
      name: Maximálna podporovaná veľkosť deky
      description: Maximálna veľkosť dečky alebo projektu, ktorú rám pojme (zvyčajne
        sa uvádza podľa rozmerov lôžka alebo maximálnej šírky).
    meal_course:
      name: Chod
      description: Vymedzuje typickú príležitosť na konzumáciu daného produktu.
    meal_preparation_state:
      name: Stav prípravy jedla
      description: Uvádza, aká príprava je potrebná pred konzumáciou (napr. pripravené
        na konzumáciu, súprava na prípravu jedla).
    meat_processing_state:
      name: Stav spracovania mäsa
      description: Uvádza stupeň tepelnej úpravy alebo údenia, ktorému bol mäsový
        produkt podrobený pred predajom.
    meat_quality_grade:
      name: Trieda kvality mäsa
      description: Označuje triedu kvality alebo klasifikáciu, ktorú mäsu pridelil
        regulačný orgán na klasifikáciu (napr. USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Tvrdenie týkajúce sa chovu dobytka
      description: Uvádza tradičné tvrdenia týkajúce sa dôstojných životných podmienok
        zvierat alebo poľnohospodárskych postupov súvisiace s mäsom (napr. chované
        na pastve, vo voľnom výbehu).
    mechanical_loom_assembly_status:
      name: Stav zostavenia mechanického tkáčskeho stavu
      description: Ako sa tkáčsky stav expeduje alebo dodáva z hľadiska požiadaviek
        na montáž.
    mechanical_loom_weaving_type:
      name: Typ tkania na mechanickom tkáčskom stave
      description: Hlavný mechanizmus/typ tkania, ktorý tento tkáčsky stav podporuje.
    mechanical_puzzle_primary_mechanism:
      name: Hlavný mechanizmus mechanického hlavolamu
      description: Hlavný spôsob interakcie/mechanizmus používaný na riešenie mechanického
        hlavolamu.
    mechanical_puzzle_solution_format:
      name: Formát riešenia mechanického hlavolamu
      description: Formát, v ktorom sú uvedené tipy/riešenia, ak sú súčasťou balenia.
    medal_attachment_style:
      name: Štýl upevnenia medaily
      description: Určuje, ako sa má medaila nosiť alebo vystavovať (napr. na stuhe
        okolo krku, s pripínacím zapínaním).
    medal_award_level:
      name: Úroveň ocenenia medaily
      description: Určuje úroveň ocenenia, ktorú medaila reprezentuje (napr. 1. miesto,
        účastník).
    medal_finish:
      name: Úprava medaily
      description: Určuje povrchovú úpravu medaily (vizuálny lesk/štruktúru) bez ohľadu
        na materiál.
    medal_packaging:
      name: Obal na medailu
      description: Uvádza typ prezentačného balenia, ktoré je súčasťou medaily.
    melodica_accessory_set_included:
      name: Obsiahnutá súprava príslušenstva k melodike
      description: Aké bežné príslušenstvo je súčasťou balenia melodiky.
    melodica_air_chamber_material:
      name: Materiál vzduchovej komory melodiky
      description: Materiál vzduchovej komory alebo tela melodiky (napr. ABS plast,
        drevo atď.), ak ho predajcovia rozlišujú od ostatných častí nástroja.
    melodica_included_accessories:
      name: Súčasťou melodiky je príslušenstvo
      description: Príslušenstvo dodávané spolu s melodikou v balení.
    melodica_key_color_scheme:
      name: Farebná schéma klávesov melodiky
      description: Farebná schéma klávesov (nie korpusu), ktoré ovplyvňuje čitateľnosť
        (najmä pre deti a začiatočníkov).
    melodica_mouthpiece_configuration:
      name: Konfigurácia náustku melodiky
      description: Uvádza, ktoré fúkacie prostriedky sú súčasťou melodiky alebo sa
        pri hraní na ňu používajú.
    melodica_mouthpiece_type:
      name: Typ náustku melodiky
      description: Súčasťou melodiky je aj fúkací adaptér (náustok a/alebo pružná
        trubica).
    melodica_reed_plate_material:
      name: Materiál platničiek melodiky
      description: Materiál plátku jazýčka (odhliadnuc od všeobecného materiálu korpusu
        nástroja), ktorý môže ovplyvniť životnosť a tón.
    melodica_size_class:
      name: Veľkostná trieda melodiky
      description: Všeobecná klasifikácia veľkosti a prenosnosti melodiky, zvyčajne
        založená na rozdelení podľa počtu klávesov a tvaru (napr. modely typu mini/študentské,
        štandardné alebo modely s rozšíreným rozsahom).
    melon_variety:
      name: Odroda melóna
      description: Uvádza konkrétny druh melóna v produkte, aby si nakupujúci mohli
        rýchlo vybrať svoju obľúbenú odrodu.
    memory_foam_infusion_material:
      name: Prímes pamäťovej peny
      description: Uvádza špeciálne látky, ktoré sa pridávajú do pamäťovej peny na
        účely chladenia, potláčania zápachu alebo antimikrobiálnej ochrany.
    memory_wire_gauge:
      name: Hrúbka pamäťového drôtu
      description: Určuje veľkosť pamäťového drôtu podľa amerického systému merania
        prierezu drôtu (AWG).
    memory_wire_project_size:
      name: Veľkosť projektu s pamäťovým drôtom
      description: Určuje zamýšľaný tvar šperku alebo veľkosť špirály, pre ktorú je
        pamäťový drôt tvarovaný (napr. náramok, náhrdelník, prsteň).
    metal_purity:
      name: Čistota kovu
      description: Označuje rýdzosť alebo stupeň čistoty kovu použitého v šperkoch,
        zvyčajne vyjadrený v karátoch (K) alebo v dieloch na tisíc.
    metrics_counted:
      name: Počítané metriky
      description: Uvádza štatistiky jednotlivcov alebo udalostí, ktoré má počítadlo
        sledovať.
    metronome_display_style:
      name: Štýl zobrazenia metronómu
      description: Určuje, akým spôsobom sa používateľovi zobrazuje/signalizuje tempo
        (ručička/kyvadlo, numerický LED/LCD displej alebo blikajúce svetlo).
    metronome_output_method:
      name: Metóda výstupu metronómu
      description: Určuje dostupné spôsoby výstupu zvuku metronómu alebo signálu taktu.
    microphone_toy_feature_set:
      name: Funkcie súpravy hračkárskeho mikrofónu
      description: Kľúčové funkcie hračkárskeho mikrofónu zamerané na hru (napr. hlasové
        efekty, zosilnenie zvuku, nahrávanie atď.).
    midi_output_type:
      name: Typ MIDI výstupu
      description: Určuje typy MIDI výstupu, ktoré poskytuje spúšťací modul.
    military_branch:
      name: Zložka armády
      description: Identifikuje zložku armády, pre ktorú je uniforma určená alebo
        ktorou je inšpirovaná.
    milk_base_type:
      name: Typ mliečnej bázy
      description: Uvádza hlavnú zložku – mlieko alebo mliečnu náhradu – použitú v
        nápoji, ak je to relevantné.
    milk_feeding_method:
      name: Metóda kŕmenia mliekom
      description: Uvádza, akým spôsobom boli chovné zvieratá kŕmené (napr. trávou
        alebo obilím), čo môže ovplyvniť chuť a nutričný profil.
    milk_processing_method:
      name: Spôsob spracovania mlieka
      description: Uvádza spôsob úpravy alebo spracovania, ktorým mlieko prešlo, čo
        má vplyv na jeho bezpečnosť, trvanlivosť a výživové vlastnosti.
    milk_source_animal:
      name: Mlieko živočíšneho pôvodu
      description: Identifikuje zviera, z ktorého bolo mlieko získané, a pomáha spotrebiteľom
        vybrať si kravské, kozie, byvolie alebo iné mliečne výrobky živočíšneho pôvodu.
    millet_processing_method:
      name: Spôsob spracovania prosa
      description: Uvádza primárny spôsob spracovania alebo stav zrna prosa (napr.
        nelúpané, lúpané, naklíčené).
    millet_variety:
      name: Odroda prosa
      description: Uvádza konkrétny druh prosa obsiahnutého v produkte (napr. perlovité,
        liščí chvost, prstové).
    milling_process:
      name: Proces mletia
      description: Uvádza spôsob spracovania, ktorý sa používa pri výrobe múčky, čo
        môže ovplyvniť chuť, vystavenie teplu a nutričný profil.
    mint_mark:
      name: Značka mincovne
      description: Značka mincovne, ako je uvedená na minci (ak je to relevantné).
    mirror_configuration:
      name: Konfigurácia zrkadiel
      description: Určuje štýl alebo štruktúru zrkadla, ktoré je súčasťou kúpeľňovej
        súpravy.
    mirror_coverage:
      name: Pokrytie zrkadlom
      description: Opisuje rozsah zrkadlových panelov na posuvných dverách.
    mirror_curvature_type:
      name: Typ zakrivenia zrkadla
      description: Určuje, či je zrkadlový povrch konvexný, plochý alebo konkávny,
        čo má vplyv na zorné pole.
    mirror_mounting_location:
      name: Lokalita upevnenia zrkadla
      description: Určuje, na ktorú časť bicykla alebo na ktorú časť tela jazdca sa
        má zrkadlo namontovať.
    mirror_shape:
      name: Tvar zrkadla
      description: Uvádza geometrický tvar alebo štýl hlavného zrkadla, ktoré je súčasťou
        toaletnej súpravy.
    mix_ratio:
      name: Zmiešavací pomer
      description: Určuje odporúčaný pomer zriedenia chladiacej kvapaliny s vodou
        (v prípade koncentrátov) alebo uvádza pevný pomer zmesi v prípade vopred zriedených
        produktov.
    mma_glove_type:
      name: Typ rukavíc na MMA
      description: Uvádza hlavné určenie alebo štýl rukavíc v rámci tréningu alebo
        súťaží v MMA.
    mobility_features:
      name: Funkcie mobility
      description: Označuje integrované prvky slúžiace na presun alebo prenášanie,
        ako sú kolieska alebo sklopné nožičky.
    model_aircraft_assembly_level:
      name: Montážna náročnosť modelov lietadiel
      description: Uvádza, koľko modelárskej práce je potrebnej na to, aby bolo možné
        lietadlo používať.
    model_making_kit_items_included:
      name: Položky obsiahnuté v modelárskej súprave
      description: Uvádza, čo je súčasťou modelárskej súpravy alebo balíka (napr.
        farba, lepidlo, štetec).
    model_making_product_type:
      name: Typ produktu pre modelárstvo
      description: Určuje, o aký druh položky v rámci modelárstva ide (súpravu, príslušenstvo,
        náradie alebo spotrebný materiál), aby sa zlepšilo vyhľadávanie a filtrovanie
        medzi rôznymi typmi produktov v sekcii Modelárstvo.
    model_rocket_kit_contents:
      name: Obsah súpravy modelárskej rakety
      description: Uvádza, či ide o kompletnú modelársku súpravu viacstupňového modelu
        rakety, alebo o doplnok/modul/súpravu dielov (napr. komponenty štartovacieho
        alebo hlavného stupňa).
    model_rocket_kit_format:
      name: Formát súpravy hračkárskej rakety
      description: Určuje, či sa raketa predáva ako súprava, a uvádza stupeň pripravenosti
        na zostavenie.
    model_rocket_motor_impulse_class:
      name: Výkonnostná trieda impulzu motora modelárskej rakety
      description: Označuje triedu štandardizovaného celkového impulzu motora modelárskej
        rakety (napr. A, B, C atď.).
    model_rocket_motor_mount_size:
      name: Veľkosť úchytu motora modelárskej rakety
      description: Určuje priemer skrine motora, na ktorý je úchyt motora rakety navrhnutý.
    model_rocket_power_source_required:
      name: Požadovaný zdroj energie pre modelársku raketu
      description: Uvádza, či produkt vyžaduje batérie alebo externé napájanie a aké.
    model_rocket_propellant_type:
      name: Typ paliva pre modelársku raketu
      description: Určuje systém pohonných látok/motorov používaný na pohon v modelárskych
        raketách.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Odporúčaná veľkosť odpaľovacej rampy alebo koľají pre modelárske rakety
      description: Určuje priemer odpaľovacej rampy alebo rozmer koľaje, pre ktoré
        je raketa navrhnutá (napr. rampa s priemerom 1/8 palca, odpaľovacia koľaj
        1010).
    model_rocket_recovery_method:
      name: Spôsob návratu modelárskej rakety
      description: Systém primárnej obnovy slúži na bezpečný návrat rakety po lete.
    model_rocket_recovery_system_type:
      name: Typ návratového systému modelárskej rakety
      description: Určuje primárnu metódu návratu, ktorá sa používa na bezpečný návrat
        rakety po lete.
    model_rocket_staging:
      name: Model raketového stupňa
      description: Uvádza, s koľkými pohonnými stupňami je modelárska raketa navrhnutá
        letieť.
    model_train_accessory_electrical_connection_type:
      name: Typ elektrického pripojenia príslušenstva pre modelárske železnice
      description: Určuje typ konektora alebo svorky, ktorý sa používa na pripojenie
        napájaného príslušenstva modelárskej železnice k železničnej trati (ak je
        to relevantné).
    model_train_coupler_type:
      name: Typ spriahadla modelárskeho vlaku
      description: Špecifikuje štandard spriahadla nainštalovaného na koľajovom vozidle
        alebo lokomotíve modelárskej železnice.
    model_train_gauge:
      name: Rozchod koľají hračkárskeho vláčika
      description: Špecifikuje rozchod modelárskej železnice, pre ktorý je príslušenstvo
        určené (v relevantnom prípade), čo pomáha zabezpečiť fyzickú kompatibilitu
        s koľajiskom a zostavou používateľa.
    model_train_lighting_features:
      name: Vlastnosti osvetlenia hračkárskeho vláčika
      description: Určuje funkcie osvetlenia, ktorými je model vlaku/lokomotívy vybavený.
    model_train_power_pickup_method:
      name: Spôsob napájania modelárskych vlakov
      description: Určuje, akým spôsobom je model napájaný pri prevádzke (napájanie
        z koľajnice, batérie atď.).
    model_train_scale:
      name: Rozmery hračkárskeho vláčika
      description: Určuje mierku/veľkosť modelárskeho vlaku (pomer medzi modelom a
        skutočným vlakom).
    model_train_sound_features:
      name: Zvukové efekty modelárskych vlakov
      description: Uvádza, či model obsahuje integrované zvukové efekty a aký typ
        zvukových efektov ponúka.
    model_train_track_gauge:
      name: Rozchod koľajníc modelárskeho vlaku
      description: Špecifikuje rozchod koľajníc alebo systémový štandard trate, pre
        ktorý je model navrhnutý (napr. normálny rozchod, varianty úzkeho rozchodu,
        prípadne špecifické rozchody podľa značky alebo systému, v relevantnom prípade).
    modeling_dough_base_material:
      name: Základný materiál modelárskej hmoty
      description: Hlavná zložka modelárskej hmoty (napr. na báze pšenice/múky alebo
        na báze polymérov).
    modeling_dough_features:
      name: Vlastnosti modelárskej hmoty
      description: Kľúčové funkčné vlastnosti modelárskej hmoty, podľa ktorých nakupujúci
        zvyčajne vyhľadávajú.
    modification_level:
      name: Stupeň modifikácie
      description: Uvádza stupeň modifikácie sladu (ako dôkladne je rozložený endosperm/proteín
        jačmeňa), často zhrnutý ako nízko modifikovaný, modifikovaný alebo vysoko
        modifikovaný.
    molasses_base_ingredient:
      name: Základná zložka melasy
      description: Uvádza hlavnú rastlinu alebo ovocie, z ktorých sa melasa vyrába.
    molasses_grade:
      name: Trieda melasy
      description: Klasifikuje melasu podľa stupňa extrakcie/rafinácie, čo priamo
        ovplyvňuje intenzitu chuti, farbu a nutričný profil.
    mold_material:
      name: Materiál formy
      description: Zloženie základného materiálu samotnej formy (napr. silikón, plast,
        kov).
    molle_compatibility:
      name: Kompatibilita s MOLLE
      description: Uvádza, či vesta disponuje popruhmi MOLLE/PALS na pripevňovanie
        modulárnych vreciek a príslušenstva.
    motor_belt_type:
      name: Typ remeňa motora
      description: Definuje dizajn/profil remeňa použitého v systéme pohonu bežeckého
        pásu.
    motor_configuration:
      name: Konfigurácia motora
      description: Udáva, koľko nezávislých hnacích motorov skúter používa.
    motor_mounting_configuration:
      name: Konfigurácia upvenenia motora
      description: Popisuje, ako je motor namontovaný/zabudovaný v konverznej súprave
        skútra.
    motor_mounting_position:
      name: Poloha upevnenia motora
      description: Uvádza, kde na elektrickom skútri je motor umiestnený, napríklad
        v náboji predného kolesa, v náboji zadného kolesa, v náboji dvojitého kolesa
        alebo v strede.
    motor_position:
      name: Poloha motora
      description: Uvádza, kde sa na elektrickom bicykli nachádza motor, čo má vplyv
        na ovládateľnosť a údržbu.
    motor_vehicle_a_v_integration_features:
      name: Funkcie integrácie audiovizuálnych systémov do motorových vozidiel
      description: Funkcie prepojenia so smartfónom a integrované do vozidla, ktoré
        hlavná jednotka podporuje (napr. Apple CarPlay, Android Auto, MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Použitie/umiestnenie žiaroviek v motorových vozidlách
      description: Určuje, na akú polohu alebo funkciu osvetlenia vozidla je žiarovka
        určená (napr. tlmené svetlá, brzdové svetlo).
    motor_vehicle_bulb_approval_standard:
      name: Norma pre schvaľovanie žiaroviek do motorových vozidiel
      description: Označuje súlad s predpismi alebo schválenie pre prevádzku na cestných
        komunikáciách na cieľovom trhu.
    motor_vehicle_oxygen_sensor_bank:
      name: Sada kyslíkových senzorov pre motorové vozidlá
      description: Uvádza, na ktorú stranu valcov motora sa montuje kyslíkový senzor
        (napr. strana 1 alebo strana 2) v prípade motorov typu V alebo boxer; v prípade
        radových motorov použite označenie Nevzťahuje sa.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Počet vodičov kyslíkového senzora v motorovom vozidle
      description: Počet vodičov v káblovom zväzku kyslíkového senzora.
    motor_vehicle_oxygen_sensor_position:
      name: Poloha kyslíkového senzora v motorovom vozidle
      description: Určuje, kde je vo výfukovom systéme umiestnený kyslíkový senzor
        (O2) vo vzťahu ku katalyzátoru.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Číslo kyslíkového senzora v motorovom vozidle
      description: Označuje číslo senzora (napr. senzor 1 alebo senzor 2) v rámci
        daného označenia banky/polohy.
    motor_vehicle_oxygen_sensor_type:
      name: Typ kyslíkových senzorov pre motorové vozidlá
      description: Určuje konštrukciu/technológiu kyslíkového senzora.
    motor_vehicle_paint_application_method:
      name: Spôsob nanášania laku na motorové vozidlá
      description: Ako sa má lak nanášať na povrch vozidla.
    motor_vehicle_paint_system_step:
      name: Krok v procese lakovania motorových vozidiel
      description: Uvádza, pre ktorú fázu alebo komponent systému lakovania motorových
        vozidiel je produkt určený (napr. základný náter, vrchná vrstva, bezfarebný
        lak).
    motor_vehicle_speaker_mounting_type:
      name: Spôsob upevnenia reproduktora v motorovom vozidle
      description: Ako sa má reproduktor namontovať do vozidla (spôsob upevnenia).
    motor_vehicle_subwoofer_size:
      name: Veľkosť subwoofera motorového vozidla
      description: Menovitý priemer membrány subwoofera (napr. 8 palcov, 10 palcov,
        12 palcov), ktorý slúži na prispôsobenie priestoru vo vozidle a dosiahnutie
        kompatibility s ozvučnicou.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Konfigurácia hlasovej cievky subwoofera pre motorové vozidlá
      description: Počet/konfigurácia hlasových cievok, ktoré sa používajú na prispôsobenie
        sa možnostiam zapojenia zosilňovača (napr. SVC alebo DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedancia hlasovej cievky subwoofera v motorovom vozidle (na jednu cievku)
      description: Menovitá impedancia každej hlasovej cievky (nie konečné zaťaženie
        v zapojení), používaná pri výpočtoch zapojenia.
    motor_vehicle_voltage_regulator_type:
      name: Typ regulátora napätia pre motorové vozidlá
      description: Označuje technológiu/formu regulátora používanú v motorových vozidlách.
    motorcycle_armor_certification_standard:
      name: Certifikačná norma motocyklových chráničov
      description: Uvádza formálne bezpečnostné normy, na ktorých splnenie je chránič
        certifikovaný (napr. EN 1621-2 pre chrániče chrbta, EN 1621-3 pre chrániče
        hrudníka).
    motorcycle_cover_size_class:
      name: Trieda veľkosti plachty na motocykel
      description: Kryt s jednotnou veľkosťou určený na zakrytie motocyklov, navrhnutý
        pre typické kategórie motocyklov a rozsah dĺžok, na ktoré sa hodí.
    motorcycle_glove_certification_standard:
      name: Norma na certifikáciu motocyklových rukavíc
      description: Uvádza certifikát alebo normu týkajúcu sa ochrany, ktorú rukavice
        spĺňajú (napr. úrovne podľa normy EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Vodotesná konštrukcia motocyklových rukavíc
      description: Určuje typ hydroizolačnej metódy použitej v rukavici (ak je použitá).
    motorcycle_guard_coverage_area:
      name: Oblasť krytia ochranných krytov motocyklov
      description: Hlavné oblasti krytia, ktoré tento produkt poskytuje (lakte, zápästia,
        predlaktia, kombinácia).
    motorcycle_kidney_belt_construction_type:
      name: Konštrukčný typ bedrového pásu pre motocyklistov
      description: Konštrukčný štýl bedrového pásu, ktorý ovplyvňuje tuhosť, prúdenie
        vzduchu a ochranu.
    motorcycle_kidney_belt_purpose:
      name: Účel motocyklového bedrového pásu
      description: Určuje hlavný štýl jazdy alebo situáciu, pre ktorú je motocyklový
        bedrový pás určený.
    motorcycle_luggage_capacity_class:
      name: Trieda úložnej kapacity motocyklov
      description: Uvádza objem batožinového priestoru motocykla vyjadrený v litroch.
    motorcycle_luggage_mounting_system:
      name: Systém upevnenia batožiny na motocykel
      description: Upevňovací systém slúžiaci na pripevnenie tašky/kufra k motocyklu
        (napr. popruhy na prehodenie, rýchloupínací systém na nosič).
    motorcycle_luggage_side:
      name: Batožina na bočnej strane motocykla
      description: V prípade kufrov/sedlových tašiek uvádza, či ide o položku na ľavú
        stranu, na pravú stranu alebo o pár/súpravu.
    motorcycle_protective_gear_size_system:
      name: Systém veľkostí ochranného výstroja pre motocyklistov
      description: Uvádza systém veľkostí uvedený na produkte (napr. označenie písmenami,
        číselné označenie, univerzálna veľkosť).
    motorcycle_rack_carrier_style:
      name: Typ nosnej konštrukcie na motocykel
      description: Opisuje typy nosných konštrukcií určených na prepravu motocyklov
        alebo skútrov (plošinové, koľajnicové, zdvíhacie atď.).
    motorcycle_riding_discipline:
      name: Motocyklová disciplína
      description: Označuje hlavnú disciplínu jazdy alebo použitia, pre ktorú je krčná
        ortéza určená.
    motorcycle_tire_speed_rating:
      name: Index rýchlosti motocyklových pneumatík
      description: Uvádza maximálnu trvale udržiavanú rýchlosť, na ktorú je pneumatika
        určená, prostredníctvom štandardného kódu uvedeného písmenami (napr. H, V,
        W).
    motorsport_window_net_certification:
      name: Certifikácia ochranných sietí do okna pre motoristický šport
      description: Pretekárska bezpečnostná certifikácia alebo homologizácia, ktorú
        ochranná sieť do okna spĺňa (napr. SFI alebo FIA), vrátane čísla špecifikácie,
        ak je to relevantné.
    mound_usage_type:
      name: Typ využitia mohyly
      description: Určuje zamýšľané využitie ihriska, napríklad na tréning, zápas,
        rozcvičku alebo ako viacúčelové ihrisko.
    mount_attachment_method:
      name: Spôsob upevnenia držiaka
      description: Určuje spôsob upevnenia držiaka k povrchu alebo konštrukcii vozidla.
    mountainboard_truck_type:
      name: Typ truckov pre mountainboard
      description: Určuje typ truckov dodávaných s doskou, čo ovplyvňuje reakciu pri
        zatáčaní a životnosť.
    mounting_attachment_method:
      name: Spôsob montáže/upevnenia
      description: Ako je držiak/puzdro navrhnuté na pripevnenie k bubnu, stojanu,
        opasku alebo inému povrchu.
    mounting_attachment_type:
      name: Typ upevnenia/prichytenia
      description: Spôsob, akým sa toto príslušenstvo na zmenu prevodového pomeru
        pripája k pradiarskemu kolovratu alebo ako s ním spolupracuje.
    mounting_hardware_included_for_installation:
      name: Obsiahnutý montážny hardvér (na inštaláciu)
      description: Uvádza, či je súčasťou balenia produktu montážny materiál potrebný
        na inštaláciu zadného sedadla (napr. konzoly, skrutky, lišty).
    mounting_location:
      name: Lokalita montáže
      description: Určuje umiestnenie určené na upevnenie svietidla/odrazky na zariadení
        alebo na tele (napr. predná vidlica, prilba, špice kolies).
    mounting_method:
      name: Spôsob montáže
      description: Ako sa držiak na palicu/kefu upevňuje alebo pripája (napr. pomocou
        svorky, popruhu alebo lepidla).
    mounting_position:
      name: Poloha upevnenia
      description: Určuje, kde sa má ovládač ručnej brzdy namontovať/inštalovať v
        kabíne vozidla.
    mounting_rail_type:
      name: Typ montážnej lišty
      description: Určuje typ lišty alebo rozhrania, na ktoré sa príslušenstvo pripája,
        napríklad Picatinny alebo M-LOK.
    mounting_receiver_size:
      name: Veľkosť montážneho rámu
      description: Veľkosť ťažného zariadenia potrebná pre nosiče batožiny montované
        na ťažné zariadenie.
    mounting_storage_type:
      name: Typ montáže/skladovania
      description: Ako sa má zariadenie namontovať alebo umiestniť na plavidlo/osobu.
    mouth_grip_type:
      name: Typ ústneho úchopu
      description: Popisuje typ ústneho úchopu alebo ochranného krytu na píšťalke
        pre vyšší komfort a hygienu.
    mouthguard_mold_type:
      name: Typ formy na chránič zubov
      description: Opisuje spôsob, akým sa chránič zubov prispôsobuje chrupu športovca
        (napr. tvarovateľný varom, na mieru vyrobený zubárom).
    mouthpiece_facing_length:
      name: Dĺžka čelnej plochy náustku
      description: Uvádza kategóriu dĺžky zakrivenia dráhy hubičky – nie celkovú dĺžku
        hubičky – čo ovplyvňuje odozvu, odpor a kompatibilitu s plátkom.
    mouthpiece_material:
      name: Materiál náustku
      description: Určuje materiál náustku/konca fúkacieho prvku, ktorý prichádza
        do styku s ústami a ktorý sa môže líšiť od materiálu hlavnej časti.
    mouthpiece_shank_receiver_size:
      name: Veľkosť drieku náustku/prijímača
      description: Určuje štandard prijímača/drieku náustku, ktorý je kompatibilný
        s krídlovkou.
    mouthpiece_shank_size:
      name: Veľkosť stopky náustku
      description: Určuje štandardné rozmery prijímača/drieku náustku, čím sa zaručuje
        kompatibilita s príslušným dychovým nástrojom.
    mouthpiece_shank_type:
      name: Typ stopky náustku
      description: Určuje štandard prijímača/drieku náustku z hľadiska kompatibility
        (ak je to relevantné).
    mouthpiece_style:
      name: Štýl náustku
      description: Klasifikuje dizajn/tvar zubadlovej časti pákového zubadla, ktorý
        ovplyvňuje tlakové body, ostrosť zubadla a preferenciu koňa.
    mouthpiece_type:
      name: Typ náustku
      description: Typ náustku na strane na fúkanie (vstavaný, odnímateľný alebo dodatočne
        pripevniteľný).
    movement_mechanism:
      name: Pohybový mechanizmus
      description: Určuje, ako sa lavička pohybuje počas používania (kývanie, kĺzanie,
        hojdanie atď.).
    muffin_size:
      name: Veľkosť mafinu
      description: Určuje veľkosť muffinu (napr. mini, štandardný, jumbo).
    mushroom_variety:
      name: Odroda huby
      description: Uvádza konkrétny druh alebo odrodu huby alebo hľuzovky obsiahnutej
        v produkte (napr. šitake, hliva ustricová, čierna hľuzovka).
    music_stand_desk_tilt_adjustment:
      name: Nastavenie sklonu pultu na notový stojan
      description: Uvádza, či a ako je možné nastaviť sklon stola.
    music_stand_intended_use:
      name: Zamýšľané použitie notového stojana
      description: Uvádza hlavné zamýšľané prostredie/spôsob použitia stojana.
    musical_block_pitch_type:
      name: Typ ladenia hudobného bloku
      description: Uvádza, či hudobný blok vytvára určitú výšku tónu (naladený) alebo
        neurčitú výšku tónu.
    musical_box_mechanism_type:
      name: Typ mechanizmu hracej skrinky
      description: Ako hracia skrinka vytvára/prehráva zvuk (napr. mechanický pohon
        alebo elektronické prehrávanie).
    musical_keyboard_case_fit_type:
      name: Typ puzdra na hudobné klávesy
      description: Popisuje, ako je puzdro prispôsobené veľkosti nástroja (napr. univerzálny/štandardný
        rozmerový rozsah alebo rozmer špecifický pre daný model/na mieru).
    musical_ratchet_sound_character:
      name: Charakteristika zvuku rapkáča
      description: Všeobecný opis charakteru zvuku a hlasitosti rohatky.
    musical_scraper_groove_surface_material:
      name: Materiál povrchu drážky hudobného škrabáka
      description: Určuje materiál drážkovanej škrabacej plochy (môže sa líšiť od
        materiálu korpusu).
    musical_scraper_type:
      name: Typ hudobného škrabáka
      description: Určuje štýl/dizajn hudobného škrabáka (napr. guiro alebo reco-reco),
        ktorý ovplyvňuje zvuk a techniku hry.
    mute_attachment_method:
      name: Spôsob upevnenia tlmiča
      description: Určuje spôsob upevnenia tlmiča na činel alebo jeho udržiavanie
        na mieste (napr. gél, statická priľnavosť, magnet, spona).
    mute_attenuation_level:
      name: Úroveň útlmu tlmiča
      description: Uvádza, o koľko tlmič znižuje vnímanú hlasitosť, čo je dôležité
        najmä pri tlmičoch určených na cvičenie.
    mute_cork_padding_material:
      name: Tlmiaci korok/výplňový materiál
      description: Určuje materiál výstelky na kontaktnej ploche tlmiča (napr. korkový
        pruh/podložky), ktorý slúži na zlepšenie uchopenia a dosadnutia, ako aj na
        ochranu ozvučníka.
    mute_coverage_type:
      name: Typ prekrytia tlmiča
      description: Uvádza typ/rozsah tlmenia na hracej ploche, od malých bodových
        tlmičov až po tlmiče na celú plochu určené na cvičenie.
    mute_finish:
      name: Povrchová úprava tlmiča
      description: Povrchová úprava tlmiča, ktorá môže ovplyvniť jeho životnosť a
        vzhľad (napr. leštená alebo saténová).
    name_label_text_template:
      name: Šablóna textu pre menovku
      description: Určuje prednastavený text alebo šablónu, ktorá sa vytlačí na štítok
        (napr. „Vlastník:“, „Vyrobil:“).
    napkin_ply:
      name: Vrstva obrúska
      description: Uvádza hrúbku kokteilového obrúska podľa počtu vrstiev.
    neck_brace_fit_system:
      name: Systém nastavenia krčnej ortézy
      description: Uvádza hlavný spôsob, akým sa krčná ortéza nastavuje a upevňuje
        na telo jazdca.
    neck_brace_size_basis:
      name: Základ pre výber veľkosti krčnej ortézy
      description: Uvádza základ pre určenie veľkosti, podľa ktorého sa vyberá správna
        veľkosť krčnej ortézy.
    neck_configuration:
      name: Konfigurácia krku
      description: Určuje typ/konfiguráciu krku, s ktorým je saxofón dodávaný, čo
        ovplyvňuje ergonómiu a pocit pri hre.
    neck_coverage_type:
      name: Typ prekrytia krku
      description: Určuje typ pokrývky krku, ktorá je súčasťou deky.
    neck_support_size_system:
      name: Systém veľkostí opierok krku
      description: Uvádza systém veľkostí použitý pre závodnú oporu krku (napr. dospelí,
        mládež alebo univerzálna veľkosť).
    necklace_length_type:
      name: Typ dĺžky náramku
      description: Špecifikuje konvenčnú kategóriu dĺžky náhrdelníka, ako je napríklad
        obojok alebo opera, na zjednodušenie nákupu na základe štýlu.
    needle_balance_zone:
      name: Zóna vyváženia ihly
      description: Označuje magnetickú rovnovážnu zónu alebo hemisféru, na ktorú je
        ihla kompasu naladená, čím sa zabezpečujú presné merania po celom svete.
    needle_case_format:
      name: Formát puzdra na ihly
      description: Všeobecný tvar puzdra na ihly.
    needle_damping_type:
      name: Typ ihlového tlmenia
      description: Opisuje, ako je ihla kompasu stabilizovaná (napr. kvapalinou, suchou
        metódou alebo elektronicky), čo ovplyvňuje čas ustaľovania a životnosť.
    needle_felting_needle_profile:
      name: Profil ihly na plstenie
      description: Prierez/profil ihly na plstenie, ktorý ovplyvňuje pohyb vlákien
        a výsledný vzhľad výrobku.
    needle_holder_features:
      name: Funkcie držiaka ihly
      description: Hlavné funkčné vlastnosti držiaka ihly.
    needle_holder_mounting_attachment_method:
      name: Spôsob montáže/pripevnenia držiaka ihly
      description: Ako sa má držiak ihly pripevniť alebo používať pri skladovaní (napr.
        magneticky, pomocou spony alebo remienka).
    needle_holder_style:
      name: Štýl držiaka ihly
      description: Štýl/dizajn fyzického skladovania alebo prenášania držiaka ihly.
    needle_pushing_surface_type:
      name: Typ plochy na vtláčanie ihly
      description: Typ/konštrukcia plochy na vtláčanie ihly na šijacej dlani (napr.
        kovová jamka, minca alebo vystužená nášivka).
    needle_requirement_beading_pattern:
      name: Požadované ihly (vzor na korálkovanie)
      description: Typ/veľkosť ihly odporúčané pre daný vzor.
    needle_size_system:
      name: Systém veľkosti ihly
      description: Štandard veľkostí používaný pri označovaní veľkosti ihiel.
    needle_threader_compatible_needle_type:
      name: Typ ihly kompatibilný s navliekačom ihiel
      description: Určuje, s akými typmi ihiel je navliekač určený na použitie (podľa
        kategórie/účelu ihiel).
    needle_threader_mechanism_type:
      name: Typ mechanizmu navliekača ihly
      description: Opisuje, ako navliekač zachytáva/preťahuje niť cez uško ihly.
    needle_threader_packaging_type:
      name: Typ balenia navliekača ihiel
      description: Ako sa produkt predáva/balí (jednotlivo, balenie viacerých kusov
        alebo súprava).
    needlecraft_fabric_color_family:
      name: Farebná škála látok na ručné práce
      description: Normalizovaná farebná škála pre tkaninu s rovnomernou väzbou (používa
        sa spolu s funkciou „Farba“ na vytváranie odtieňov).
    needlecraft_fabric_composition:
      name: Zloženie látok na ručné práce
      description: Určuje zloženie vlákien alebo zmes vlákien tkaniny na ručné práce
        (napr. 100 % bavlna, zmes ľanu a bavlny).
    needlecraft_fabric_weave_type:
      name: Typ väzby textílie na ručné práce
      description: Určuje väzbu/konštrukciu plátna na vyšívanie (napr. plátno s rovnomernou
        väzbou alebo tradičné plátno), čo ovplyvňuje správanie pri tvorbe stehu a
        vzhľad výšivky.
    needlecraft_kit_items_included:
      name: Obsah súpravy na ručné práce
      description: Uvádza hlavné komponenty zahrnuté v súprave na vyšívanie (náradie
        a spotrebný materiál).
    needlecraft_kit_project_type:
      name: Typ projektu súpravy na ručné práce
      description: Určuje, aký hotový výrobok sa zo súpravy vyrobí (výsledok projektu).
    needlecraft_stitching_coverage:
      name: Rozsah vyšívania pri ručných prácach
      description: Uvádza, či je tkanina prešívaná cez 1 niť na štvorcový centimeter
        alebo cez 2 nite (bežné pri tkaninách s rovnomernou väzbou a ľane).
    needlepoint_canvas_mesh_count:
      name: Počet očiek na plátne pre vyšívanie
      description: Počet nití na palec plátna (bežne označovaný ako hustota plátna),
        pre ktorý je vzor navrhnutý.
    needlepoint_frame_canvas_attachment_method:
      name: Spôsob upevnenia plátna na rám na vyšívanie
      description: Opisuje, ako sa plátno na vyšívanie upevňuje na rám na vyšívanie.
    needlepoint_frame_compatible_stand_type:
      name: Stojan kompatibilný s rámom na vyšívanie
      description: Ak je rám určený na upevnenie na stojan, uveďte typy stojanov,
        s ktorými je kompatibilný.
    needlepoint_frame_contents:
      name: Obsah balenia rámu na vyšívanie
      description: Uvádza, ktoré komponenty a príslušenstvo sú súčasťou súpravy na
        vyšívanie (napr. rám, náhradné tyčinky, špendlíky, priľnavé pásky, taška na
        prenášanie).
    needlepoint_frame_tension_adjustment_type:
      name: Typ nastavenia napnutia rámu na vyšívanie
      description: Uvádza, ako (alebo či vôbec) je možné počas používania nastaviť
        napnutie rámu.
    needlepoint_pattern_chart_format:
      name: Formát schémy vzoru na vyšívanie
      description: Ako je vzor pre vyšívanie znázornený (v podobe schémy alebo vytlačený/maľovaný
        návod).
    needlepoint_project_type:
      name: Typ projektu vyšívania
      description: Zamýšľaná dokončená položka/kategória, pre ktorú je vzor na vyšívanie
        určený.
    net_design:
      name: Dizajn siete
      description: Určuje konštrukčný typ siete a uvádza, či je možné ju zložiť alebo
        zrolovať na ľahšie prenášanie.
    net_mesh_pattern:
      name: Vzor sieťoviny
      description: Určuje geometrický tvar otvorov v sieti, čo môže ovplyvniť priehľadnosť
        a pevnosť.
    net_twine_gauge:
      name: Hrubka sieťoviny
      description: Uvádza hrúbku vlákna alebo pevnosť siete, tradične vyjadrenú číselnou
        hodnotou hrúbky (napr. 18, 36).
    nicotine_source:
      name: Zdroj nikotínu
      description: Uvádza, či nikotín v produkte pochádza z tabaku, je syntetický,
        alebo či produkt neobsahuje žiadny nikotín.
    nipple_drive_interface:
      name: Rozhranie unášača nipla
      description: Identifikuje štýl/štandard unášača alebo hlavy nipla (vonkajší
        alebo vnútorný), čo určuje potrebný nástroj a metódu zapletania kolesa.
    nock_activation_method:
      name: Spôsob aktivácie končíka
      description: Určuje spôsob, akým sa LED dióda na osvetlenom končíku šípu zapína
        alebo vypína (napr. tlak na tetivu, pohybový senzor, ručný spínač).
    nock_fitment_code:
      name: Kód vyhotovenia končíka
      description: Kód výrobcu alebo odvetvový kód, ktorý identifikuje skupinu/sériu
        končíkov, do ktorej končík patrí.
    nock_throat_size:
      name: Veľkosť hrdla končíka
      description: Určuje veľkosť drážky v končíku, do ktorej sa zasúva tetiva.
    nock_transparency_level:
      name: Úroveň priehľadnosti hrotu
      description: Opisuje, do akej miery je materiál končíka priehľadný – či je číry,
        priesvitný, nepriehľadný alebo svieti v tme – a aký vplyv to má na viditeľnosť
        a vzhľad.
    nock_type:
      name: Typ končíka
      description: Určuje typ končíka používaného na šípe kuše alebo luku, napríklad
        kolíkový, polmesiacovitý alebo svietiaci.
    noise_reduction_type:
      name: Typ zníženia hluku
      description: Uvádza technológiu potlačenia hluku, ktorá sa používa (alebo nepoužíva)
        v integrovaných slúchadlách prilby, ak je to relevantné.
    noise_suppression_technology:
      name: Technológia potlačenia hluku
      description: Určuje, či produkt využíva pasívne tlmenie alebo aktívne elektronické
        obvody, ktoré utlmujú hlasné zvuky a/alebo zosilňujú zvuk z okolia.
    non_slip_base_features:
      name: Protišmykové vlastnosti základne
      description: Označuje protišmykové prvky, ktoré zabraňujú posúvaniu pedálu počas
        hrania.
    nose_bridge_type:
      name: Typ nosového mostíka
      description: Uvádza tvar nosového mostíka, ktorý ovplyvňuje prispôsobenie sa
        rôznym veľkostiam tváre.
    nose_clip_accessories_included:
      name: Príslušenstvo v balení nosovej spony
      description: Uvádza všetko ďalšie príslušenstvo dodávané spolu s plaveckou nosovou
        sponou (napr. ušné zátky, puzdro na uloženie).
    nose_clip_features:
      name: Funkcie nosovej spony
      description: Uvádza hlavné funkčné vlastnosti a charakteristiky komfortu nosovej
        spony.
    nose_coverage_style:
      name: Štýl prekrytia nosa
      description: Uvádza prítomnosť a typ ochranného panelu na nos alebo ňufák na
        maske proti hmyzu.
    noseband_type:
      name: Typ nánosníka
      description: Určuje typ nánosníka (ak je súčasťou uzdy).
    number_of_canvas_meshes:
      name: Počet očiek plátna
      description: Veľkosť očiek plastového plátna, vyjadrená počtom otvorov na palec
        (HPI) alebo hodnotou, ktorá určuje veľkosť stehu a jemnosť výšivky.
    number_of_chainrings:
      name: Počet prevodníkov
      description: Uvádza, na koľko prevodníkov je kľuka určená alebo s koľkými sa
        dodáva.
    number_of_control_stations:
      name: Počet riadiacich staníc
      description: Uvádza počet kormidlových/riadiacich staníc, ktoré ovládač podporuje
        (jedna stanica alebo dve stanice atď.).
    number_of_digits:
      name: Počet číslic
      description: Koľko číslic zobrazuje počítadlo (napr. 1-miestne, 2-miestne, 3-miestne).
    number_of_guitar_slots:
      name: Počet pozícií pre gitary
      description: Uvádza, na koľko gitár je puzdro/taška určená.
    number_of_needlecraft_fabrics:
      name: Číslo látky na ručné práce
      description: Určuje hustotu tkaniny plátna/látky na ručné práce, ktorá sa zvyčajne
        uvádza počtom štvorcov/vlákien na palec (napr. 14-početná).
    number_of_plastic_canvas_meshes:
      name: Počet očiek plastového plátna
      description: Určuje hustotu plastového plátna (počet otvorov na palec), ktorá
        ovplyvňuje veľkosť stehu a úroveň detailov výšivky.
    number_of_quilting_frame_rails:
      name: Počet lišt prešívacieho rámu
      description: Počet líšt/valčekov na prešívacom ráme (napr. systémy s 2 lištami
        alebo systémy s 3 lištami).
    number_of_rope_slots:
      name: Počet otvorov pre laná
      description: Uvádza, či je istiace zariadenie určené na použitie s jedným alebo
        dvoma lanami.
    number_of_switch_poles:
      name: Počet pólov spínača
      description: Počet samostatných obvodov (pólov), ktoré ovláda spínač (napr.
        SPST, DPST).
    number_of_switch_throws:
      name: Počet prepnutí spínača
      description: Počet výstupných dráh (polôh) na jeden pól (napr. SPDT).
    number_of_timing_chain_rows:
      name: Počet radov rozvodovej reťaze
      description: Uvádza, či je rozvodová reťaz jedno- alebo viacradová.
    number_of_trailer_axles:
      name: Počet náprav prívesu
      description: Počet náprav na prívese.
    number_of_wheel_pieces:
      name: Počet kusov kolies
      description: Určuje, či je koleso jednodielne, dvojdielne alebo trojdielne.
    numbering_style:
      name: Štýl číslovania
      description: Uvádza, či a ako sú štartové čísla vopred očíslované na účely identifikácie
        tímu (napr. bez čísiel, 1–10, podľa vlastného výberu).
    nunchuck_connector_type:
      name: Typ konektora nunčakov
      description: Spôsob spojenia medzi oboma rukoväťami nunčaku (napr. lano, reťaz,
        otočná reťaz).
    nursing_access:
      name: Prístup na dojčenie
      description: Uvádza spôsob prístupu na dojčenie, ktorý môže byť prípadne integrovaný
        do plaviek.
    nursing_access_type:
      name: Typ prístupu na dojčenie
      description: Určuje, akým spôsobom umožňuje tento odev prístup k prsníku pri
        dojčení alebo odsávaní mlieka.
    nut_butter_texture:
      name: Textúra orechového masla
      description: Opisuje konzistenciu orechového masla, aby si nakupujúci mohli
        ľahko vybrať medzi hladkou, chrumkavou atď.
    nutrient_fortification:
      name: Obohatenie o živiny
      description: Uvádza kľúčové živiny, ktorými je nápoj alebo potravinový produkt
        obohatený.
    oak_product_form:
      name: Forma produktu z dubového dreva
      description: Určuje druh dubového dreva používaného na zrenie/aromatizáciu produktov.
    oak_toast_level:
      name: Stupeň vypálenia dubového dreva
      description: Určuje stupeň vypálenia dubových produktov.
    oboe_case_capacity:
      name: Nosnosť hobojového puzdra
      description: Uvádza, na prepravu akých nástrojov a hlavných komponentov je puzdro
        určené.
    oboe_case_carry_configuration:
      name: Konfigurácia prenosného puzdra na hoboj
      description: Uvádza hlavný spôsob prenášania, ktorý ponúka puzdro/taška.
    oboe_case_design:
      name: Dizajn hoboja
      description: Klasifikuje konštrukciu/tuhosť puzdra alebo tašky na hoboj (napr.
        tvrdé, polotuhé, mäkké) s cieľom určiť úroveň ochrany.
    oboe_case_internal_fit_type:
      name: Typ vnútorného usporiadania puzdra na hoboj
      description: Uvádza, či je interiér tvarovaný pre konkrétnu konfiguráciu nástroja,
        alebo či využíva nastaviteľné priehradky.
    oboe_keywork_plating:
      name: Pokovovanie klapiek hoboja
      description: Určuje povrchovú úpravu klapiek hoboja, nezávisle od materiálu
        tela nástroja.
    oboe_strap_padding:
      name: Polstrovanie popruhu na hoboj
      description: Popisuje prítomnosť/typ výstelky v mieste kontaktu popruhu/opory
        s cieľom zvýšiť pohodlie (napr. polstrovaná oblasť ramien/krku).
    oboe_swab_style:
      name: Typ čistiacej tyčinky na hoboj
      description: Určuje funkčný štýl/konštrukciu čistiacej tyčinky na hoboj (napr.
        pretiahnuteľná, s ťažítkom z hodvábu).
    observation_window_material:
      name: Materiál pozorovacieho okienka
      description: Určuje materiál, z ktorého sú vyrobené priehľadné panely/okienka
        (často ovplyvňuje priehľadnosť a odolnosť).
    ocarina_accessories_included:
      name: Vrátane príslušenstva k okaríne
      description: Príslušenstvo dodávané spolu s okarínou, ako napríklad puzdro,
        popruh na krk alebo tabuľka prstokladu.
    ocarina_chamber_count:
      name: Počet komôr okaríny
      description: Uvádza, koľko komôr má radová okarína, čo ovplyvňuje rozsah a náročnosť
        hry (jednokomorová/dvojkomorová/trojkomorová atď.).
    ocarina_fingering_system:
      name: Systém prstokladu okaríny
      description: Určuje systém prstokladu/štandard, podľa ktorého sa hrá na prívesnú
        okarínu (ak je to relevantné).
    ocarina_finish_type:
      name: Typ povrchovej úpravy okaríny
      description: Povrchová úprava tela okaríny, ktorá ovplyvňuje pocit na dotyk
        a vzhľad.
    occupant_classification_sensor_support:
      name: Podpora snímača klasifikácie obsadenia sedadla
      description: Uvádza, či sedadlo obsahuje snímač na rozpoznanie typu cestujúceho/hmotnosti,
        alebo je pripravené na prepojenie/inštaláciu OEM snímača (bežne u sedadiel
        pasažierov).
    octave_harmonica_cover_plate_material:
      name: Materiál krycej dosky oktávovej harmoniky
      description: Materiál vonkajších krycích platničiek oktávovej harmoniky.
    octave_harmonica_tuning_system:
      name: Systém ladenia oktávovej harmoniky
      description: Ladenie používané pri oktávovej harmonike.
    octoban_mounting_system_type:
      name: Typ upevňovacieho systému oktobanu
      description: Ako sa oktoban upevňuje/umiestňuje počas hry (zostava držiaka/konzoly/stojana).
    odor_control_features:
      name: Funkcie neutralizácie zápachu
      description: Uvádza, či produkt disponuje funkciou neutralizácie zápachu/dezodorizácie
        a akým spôsobom.
    office_furniture_items_included:
      name: Vrátane položiek kancelárskeho nábytku
      description: Vymedzuje konkrétny kancelársky nábytok, ktorý je súčasťou súpravy,
        napríklad stôl alebo kartotéka.
    oil_cooler_core_type:
      name: Typ jadra chladiča oleja
      description: Určuje vnútornú konštrukciu jadra chladiča oleja, ktorá ovplyvňuje
        účinnosť chladenia, pokles tlaku a životnosť.
    oil_cooler_mounting_style:
      name: Štýl montáže chladiča oleja
      description: Opisuje, ako sa má olejový chladič namontovať/inštalovať do vozidla.
    oil_dipstick_component_type:
      name: Typ komponentu mierky oleja
      description: Určuje, ktorá súčasť na meranie hladiny oleja sa predáva (napr.
        len lišta/tyčka mierky hladiny oleja, len rukoväť, kompletná zostava, rúrka
        mierky oleja atď.).
    oil_dipstick_measurement_markings:
      name: Meracie značky na mierke oleja
      description: Určuje, aké značky/rysky sa nachádzajú na mierke na odčítanie hladiny
        oleja.
    oil_dipstick_tube_mounting_type:
      name: Typ upevnenia mierky oleja
      description: Určuje, ako je rúrka mierky oleja upevnená alebo namontovaná na
        motore alebo bloku motora.
    oil_drain_plug_head_drive_type:
      name: Typ pohonu hlavy vypúšťacej zátky oleja
      description: Špecifikuje rozhranie na nasadenie nástroja na hlave vypúšťacej
        zátky oleja, ktoré sa používa na montáž a demontáž.
    oil_drain_plug_magnet_type:
      name: Typ magnetu vypúšťacej zátky oleja
      description: Určuje, či je vypúšťacia zátka magnetická a ak áno, o aký typ ide.
    oil_fill_cap_type:
      name: Typ plniaceho uzáveru oleja
      description: Štýl/typ rozhrania plniaceho uzáveru oleja využívaný krytom ventilov
        (ak je to relevantné).
    oil_filler_cap_attachment_type:
      name: Typ upevnenia plniaceho uzáveru oleja
      description: Určuje, ako je plniaci uzáver oleja upevnený na motore/plniacom
        hrdle oleja (napr. závit, bajonet/otváranie na štvrť otočenia, nalisovanie).
    oil_filler_cap_installation_position:
      name: Poloha inštalácie plniaceho uzáveru oleja
      description: Určuje, kde sa používa uzáver, keď existuje viacero plniacich miest
        oleja (napr. kryt ventilu, rúrka na plnenie na diaľku).
    oil_filler_cap_locking_type:
      name: Typ uzamykania uzáveru plniaceho hrdla oleja
      description: Určuje, či je plniaci uzáver oleja neuzamykateľný alebo či používa
        uzamykateľnú/zabezpečenú metódu odstránenia (napr. kľúčom alebo pomocou nástroja),
        aby sa zabránilo neoprávnenej manipulácii/krádeži alebo neúmyselnému otvoreniu.
    oil_filler_cap_tether_type:
      name: Typ upevňovacej šnúrky plniaceho hrdla oleja
      description: Určuje, či je plniaci uzáver oleja upevnený/zaistený, aby sa zabránilo
        strate, a aký typ upevnenia sa používa.
    oil_filler_cap_venting_type:
      name: Typ odvetrávania plniaceho uzáveru oleja
      description: Určuje, či je uzáver odvetrávaný a aký je odvetrávací mechanizmus
        (ak je to relevantné).
    oil_filter_style:
      name: Štýl olejového filtra
      description: Určuje tvar olejového filtra a spôsob montáže/inštalácie pre kompatibilitu
        s držiakom filtra motora.
    oil_pan_baffle_windage_features:
      name: Vlastnosti prepážky olejovej vane a vetrolamu
      description: Označuje funkcie internej kontroly oleja, ktoré sú súčasťou vane.
    oil_pan_finish_coating:
      name: Povrchová úprava/náter olejovej vane
      description: Opisuje povrchovú úpravu alebo náter olejovej vane (s náterom,
        práškovo lakovaná, pokovovaná, bez povrchovej úpravy atď.).
    oil_pressure_sensor_function_type:
      name: Funkčný typ snímača tlaku oleja
      description: Uvádza, či ide o snímač tlaku oleja s variabilným výstupom pre
        manometer/ECU, alebo o spínač tlaku oleja typu zapnuté/vypnuté, ktorý aktivuje
        kontrolku.
    oil_pressure_sensor_signal_output_type:
      name: Typ výstupného signálu snímača tlaku oleja
      description: Určuje typ elektrického výstupu/signálu generovaného snímačom/vysielačom
        tlaku oleja.
    oil_processing_method:
      name: Spôsob spracovania oleja
      description: Uvádza spôsob výroby alebo rafinácie oleja (napr. lisovaný za studena,
        panenský, rafinovaný), čo ovplyvňuje chuť, výživovú hodnotu a vhodné spôsoby
        použitia pri varení.
    oil_pump_drive_method:
      name: Metóda pohonu olejového čerpadla
      description: Označuje, čo poháňa olejové čerpadlo v motore.
    oil_pump_mounting_style:
      name: Štýl upevnenia olejového čerpadla
      description: Určuje, kde a ako je olejové čerpadlo namontované v motore (napr.
        interné verzus externé/vzdialené, montáž na kryt, montáž na olejovú vaňu).
    oil_system_connection_thread_standard:
      name: Štandard závitu pre pripojenie olejového systému
      description: Určuje štandard závitu/pripojenia, ktorý používa rozhranie olejového
        systému dielu z hľadiska montáže/kompatibility (napr. M12x1,5, 1/8-27 NPT,
        BSPP).
    oil_viscosity_grade:
      name: Stupeň viskozity oleja
      description: Uvádza relatívnu viskozitu mazacieho oleja určeného na výrobu strojov
        (okrem automobilových tried SAE).
    okra_variety:
      name: Odroda okry
      description: Uvádza konkrétny druh alebo komerčnú odrodu ponúkanej okry, napríklad
        Clemson Spineless, Red Burgundy alebo Baby Okra.
    olfactory_arts_material_form:
      name: Forma vonného materiálu
      description: Určuje fyzickú podobu materiálu v stave, v akom sa predáva.
    olfactory_arts_tool_kit_content:
      name: Obsah súpravy pomôcok pre olfaktorické umenie
      description: Uvádza, ktoré komponenty sú súčasťou balenia, ak sa produkt predáva
        ako súprava na výrobu sviečok, vonných tyčiniek alebo parfumov.
    olive_variety:
      name: Odroda olív
      description: Určuje odrodu použitých olív, ktorá ovplyvňuje chuť, konzistenciu,
        farbu a regionálnu autenticitu.
    onion_variety:
      name: Odroda cibule
      description: Určuje konkrétny druh cibule, aby nakupujúci mohli rýchlo nájsť
        preferovanú farbu, chuť a profily použitia, pričom obchodníkom umožňuje presne
        uviesť produkty.
    opacity_level:
      name: Úroveň nepriehľadnosti
      description: Označuje, aká priehľadná alebo nepriehľadná je látka.
    operating_modes:
      name: Prevádzkové režimy
      description: Základné vstavané efekty a režimy pohybu podporované laserovým
        svetlom.
    operating_voltage:
      name: Prevádzkové napätie
      description: Určuje nominálne napätie systému, pre ktoré je vstrekovač určený.
    optical_toy_features:
      name: Vlastnosti optickej hračky
      description: Zdôrazňuje hlavný vizuálny/optický efekt, ktorý táto hračka vytvára.
    orchestral_string_core_material:
      name: Základný materiál orchestrálnej struny
      description: Určuje materiál, z ktorého je vyrobená struna (jadro), čo výrazne
        ovplyvňuje pocit pri hre, odozvu a tón.
    orchestral_string_end_type:
      name: Typ zakončenia orchestrálnej struny
      description: Určuje spôsob upevnenia na konci struny pri strunníku.
    orchestral_string_included_strings:
      name: Súčasťou orchestrálnych sláčikových nástrojov sú struny
      description: Uvádza, ktoré konkrétne struny sú súčasťou balenia (líši sa podľa
        nástroja).
    orchestral_string_instrument_fitting_part_type:
      name: Typ príslušenstva/súčiastky sláčikového nástroja
      description: Určuje, o aký druh príslušenstva/súčiastky ide (napr. kobylka,
        strunník, opierka na bradu).
    orchestral_string_instrument_mute_type:
      name: Typ tlmenia orchestrálnych sláčikových nástrojov
      description: Určuje funkčný typ tlmenia pre sláčikový nástroj (napr. na cvičenie/do
        hotela alebo na vystúpenie/koncert) a/alebo bežný štýl dizajnu.
    orchestral_string_instrument_part_position:
      name: Poloha dielu pre sláčikový nástroj
      description: Označuje, kam diel na nástroji patrí (užitočné, keď sú diely dostupné
        v hornom/dolnom alebo ľavom/pravom variante).
    orchestral_string_winding_material:
      name: Materiál vinutia strún pre orchestrálne sláčikové nástroje
      description: Určuje materiál vonkajšieho vinutia použitý na strune.
    organza_finish_sheen:
      name: Úprava/lesk organzy
      description: Opisuje vzhľad povrchu organzy (matný alebo lesklý/dúhový efekt).
    organza_ribbon_transparency_level:
      name: Stupeň priehľadnosti organzovej stuhy
      description: Opisuje, aká priehľadná je organzová stuha.
    organza_transparency_level:
      name: Stupeň priehľadnosti organzy
      description: Opisuje, aká priehľadná je organzová látka po jednom navrstvení.
    origami_paper_shape:
      name: Tvar hárka na origami
      description: Určuje tvar hárka používaného na skladanie.
    origami_paper_sidedness:
      name: Rozdielnosť strán papiera na origami
      description: Uvádza, či má papier na origami na oboch stranách rovnakú farbu/vzor,
        alebo či sú strany rôzne.
    ostrich_feather_part:
      name: Časť z pštrosieho peria
      description: Určuje použitý typ/časť z pštrosieho peria (napr. ozdobné alebo
        obyčajné), čo má vplyv na mäkkosť, hustotu a typické využitie pri ručných
        prácach.
    outboard_motor_shaft_type:
      name: Typ hriadeľa prívesného motora
      description: Štandardná trieda dĺžky hriadeľa používaná pri vonkajších motoroch
        (označenie používané v lodnom priemysle).
    outboard_motor_steering_type:
      name: Typ riadenia vonkajšieho motora
      description: Určuje typ riadiaceho rozhrania/mechanizmu používaného pri vonkajšom
        motore (napr. kormidlo alebo diaľkové ovládanie).
    outdoor_table_functionality:
      name: Funkcionalita stola do exteriéru
      description: Uvádza špecializované vstavané funkcie, ktoré presahujú rámec bežnej
        stolovej dosky (napr. chladiaci priestor, odkladacia polica, kryt na plynovú
        fľašu, podstavec na slnečník, spojovací prvok na stoličku, skladací dizajn,
        bezpečnosť pri použití v bazéne, nastaviteľná výška, integrované kolieska,
        LED osvetlenie).
    outerwear_length_type:
      name: Dĺžka vrchného dielu oblečenia
      description: Rozdeľuje celkovú dĺžku vrchného dielu oblečenia do štandardných
        popisných kategórií.
    outerwear_pieces_included:
      name: Vrchné oblečenie v cene
      description: Uvádza zoznam kusov odevu, ktoré sú súčasťou balenia, ak sa produkt
        predáva ako súprava.
    outfit_attachment_mechanism:
      name: Mechanizmus prichytenia oblečenia
      description: Určuje, akým spôsobom sa jednotlivé časti oblečenia alebo doplnkov
        upevňujú k bábike (napr. pútka, lepidlo, magnety).
    outfit_items_included:
      name: Kusy oblečenia v cene
      description: Uvádza konkrétne kusy odevu, ktoré sú súčasťou súpravy (napr. body,
        šortky, čelenka).
    outlet_thread_type:
      name: Typ závitu výstupu
      description: Špecifikuje štandard závitu použitý na výstupných portoch brzdového
        potrubia hlavného brzdového valca (napr. metrický s guľovým lemom alebo SAE
        s obráteným/kužeľovým lemom).
    output_jack_type_instrument:
      name: Typ výstupného konektora (nástroj)
      description: Určuje typ výstupného audio konektora na elektrickej mandolíne.
    output_signal_type:
      name: Typ výstupného signálu
      description: Charakteristika elektrického výstupu/typ signálu generovaného snímačom
        (napr. analógový odpor NTC termistora).
    outsole_marking_type:
      name: Typ stôp z podrážky
      description: Uvádza, či podrážka topánky zanecháva stopy na povrchu ihriska,
        čo je kľúčový faktor pri halových raketových športoch.
    outsole_material:
      name: Materiál podrážky
      description: Uvádza materiál podrážky topánky, ktorý prichádza do styku s podkladom
        a ovplyvňuje priľnavosť, pružnosť a odolnosť.
    outsole_stud_type:
      name: Typ štupľov na podrážke
      description: Popisuje konfiguráciu podrážky a štupľov (napr. lisované štuple,
        gumové štuple, štuple na umelý trávnik), ktorá zaisťuje priľnavosť na zvolenom
        povrchu ihriska.
    oven_bake_clay_formulation:
      name: Receptúra hliny určenej na vypaľovanie v rúre
      description: Určuje skupinu zložiek modelovacej hmoty vytvrdzovanej v rúre (napr.
        polymérová hmota alebo živicová hmota), čo má vplyv na manipuláciu, správanie
        pri vytvrdzovaní a vlastnosti hotového produktu.
    oven_housing_configuration:
      name: Konfigurácia zapuzdrenia rúry
      description: Určuje zamýšľané usporiadanie spotrebičov, ktoré skriňa pojme (napr.
        samostatná rúra, dvojitá rúra alebo kombinácia rúry a mikrovlnnej rúry).
    overhead_mount_installation_method:
      name: Spôsob montáže s upevnením na strop
      description: Ako je stropný držiak upevnený k vozidlu (spojovací materiál/spôsob
        upevnenia).
    oversize_or_undersize_grade:
      name: Stupeň nadrozmernej alebo podrozmernej veľkosti
      description: Určuje veľkostný stupeň súpravy (nadrozmerné piesty/krúžky a/alebo
        podrozmerné ložiská) v porovnaní so štandardnou OEM veľkosťou.
    p_tex_application_method:
      name: Metóda aplikácie P-Tex
      description: Opisuje, ako sa materiál P-Tex nanáša na sklznicu lyží alebo snowboardu.
    p_tex_form:
      name: Forma materiálu P-Tex
      description: Určuje fyzickú formu, v akej sa korekčný materiál dodáva.
    packability:
      name: Zbaliteľnosť
      description: Označuje, či a ako je možné vestu zbaliť alebo uložiť, keď sa nepoužíva.
    packaging_format:
      name: Formát balenia
      description: Ako sú struny balené/predávané (v jednotlivých obálkach, hromadné
        balenie atď.).
    packaging_material:
      name: Materiál balenia
      description: Určuje hlavný materiál fľaše alebo nádoby, v ktorej je voda.
    packaging_type:
      name: Typ balenia
      description: Opisuje spôsob balenia figúrky s pohyblivou hlavou na maloobchodný
        predaj, vystavenie alebo zberateľské uskladnenie.
    packing_medium:
      name: Baliace médium
      description: Označuje tekutinu alebo médium (napríklad vodu, rôzne sirupy, šťavu
        alebo slanú vodu), ktoré sa používajú na konzervovanie ovocia vo vnútri nádoby.
    pad_components_included:
      name: Komponenty podložky v cene
      description: Určuje, ktoré časti sú súčasťou balenia, ak sa produkt predáva
        ako súprava (napr. iba chrániče kolien a lakťov, chrániče zápästí).
    pad_controller_additional_control:
      name: Doplnkové ovládanie ovládača s ovládacími plochami
      description: Druhy doplnkových fyzických ovládacích prvkov okrem ovládacích
        plôch (otočné ovládače, posúvače, tlačidlá), ktoré sa nachádzajú na zariadení.
    pad_controller_performance_features:
      name: Funkcie ovládača s ovládacími plochami
      description: Kľúčové vlastnosti ovládacích plôch z hľadiska pocitu pri hre a
        expresívnej kontroly.
    pad_coverage_area:
      name: Oblasť pokrytia chrániča
      description: Špecifikuje zóny tela, ktoré chránia integrované chrániče hokejových
        nohavíc s trakmi.
    pad_material_or_technology:
      name: Materiál alebo technológia chrániča
      description: Uvádza patentovanú technológiu tlmenia nárazov alebo proprietárny
        materiál použitý v chráničoch.
    pad_mounting_or_holding_style:
      name: Spôsob upevnenia alebo uchytenia chrániča
      description: Uvádza, čo chránič drží a ako sa nosí alebo inštaluje počas používania.
    pad_saver_style:
      name: Štýl vytieracej pomôcky
      description: Indikuje fyzický štýl/dizajn vytieracej pomôcky, ktorá sa používa
        na vysúšanie klapiek a vnútra nástroja.
    pad_shape:
      name: Tvar podložky
      description: Určuje geometrický tvar alebo zakrivenie nárazovej plochy alebo
        celkového telesa chrániča (napr. guľatý, zakrivený, obdĺžnikový, plochý),
        čím pomáha používateľom zvoliť si chrániče zodpovedajúce ich tréningovým cieľom
        a typom úderov.
    pad_shell_type:
      name: Typ plášťa chrániča
      description: Klasifikuje konštrukčný typ vonkajšieho povrchu chrániča (napr.
        tvrdý plášť, mäkký plášť, vnútorná vložka).
    pad_style:
      name: Štýl chrániča
      description: Určuje typ alebo dizajn chrániča dodávaného so saňami.
    padding_layers:
      name: Vrstvy vypchávky
      description: Uvádza počet vrstiev peny použitých na tlmenie nárazov.
    padding_level:
      name: Úroveň výplne
      description: Uvádza množstvo výplne zabudovanej do kontaktných plôch popruhu/opory
        (krk/ramená/chrbát).
    padding_material:
      name: Materiál polstrovania
      description: Špecifikuje vnútornú výplň alebo tlmiaci materiál, ktorý absorbuje
        nárazy vo vnútri boxovacích vriec, lapov, blokovacích štítov, rukavíc a tréningových
        figurín.
    paddle_ball_attachment_type:
      name: Typ upevnenia lopty k pálke
      description: Určuje, akým spôsobom je lopta pripojená k pálke (alebo či nie
        je pripevnená).
    paddle_leash_style:
      name: Typ šnúry na pálke
      description: Určuje štýl alebo dizajn šnúry na pálke.
    paddle_shape:
      name: Tvar pádla
      description: Určuje celkový tvar hlavy/tela pálky (napr. štandardný, predĺžený,
        široký), čo ovplyvňuje dosah, veľkosť optimálnej úderovej plochy a ovládateľnosť.
    paddleboard_intended_use:
      name: Zamýšľané použitie paddleboardu
      description: Klasifikuje primárny účel dizajnu alebo aktivitu, pre ktorú je
        doska vyrobená (napr. turistika, joga, preteky).
    paint_application_method:
      name: Spôsob nanášania farby
      description: Hlavný spôsob, akým sa má produkt aplikovať na strmeň.
    paint_by_number_surface_type:
      name: Typ povrchu na maľovanie podľa čísel
      description: Povrch, na ktorom je vytlačený číslovaný vzor (napr. plátno, papier,
        drevená doska).
    paint_medium_application_method:
      name: Spôsob nanášania maliarskeho média
      description: Označuje odporúčaný spôsob aplikácie média.
    paint_medium_intended_effect:
      name: Zamýšľaný efekt maliarskeho média
      description: Vystihuje hlavný efekt, ktorý má daný materiál vytvoriť (textúru,
        lesk, glazúru, rozteč atď.).
    paint_safe_bristles:
      name: Štetiny, ktoré nepoškodzujú lak
      description: Uvádza, či sú štetiny štetca uvádzané na trh ako bezpečné pre použitie
        na lakoch a bezfarebných vrstvách automobilov (nezanechávajú škrabance).
    paintable_surface:
      name: Povrch vhodný na nanášanie náterov
      description: Uvádza, či je papierová forma pripravená na maľovanie v danom stave
        (napr. so základnou vrstvou/zapečatená), alebo si vyžaduje prípravu.
    paintball_caliber:
      name: Paintballový kaliber
      description: Určuje priemer/kaliber paintballových guľôčok alebo kompatibilného
        vybavenia.
    paintball_feed_system:
      name: Systém podávania pri paintbale
      description: Definuje, ako sa paintballové guľôčky podávajú do značkovača.
    paintball_fill_color:
      name: Farba náplne paintballovej guľôčky
      description: Určuje farbu vnútornej značkovacej náplne, ktorá sa môže líšiť
        od farby vonkajšieho plášťa a určuje farbu, ktorá zostane po náraze.
    paintball_fill_type:
      name: Typ paintballovej náplne
      description: Opisuje akékoľvek špeciálne zloženie alebo vlastnosti náplne (napr.prateľná,
        svietiaca v tme, prášok).
    paintball_grade:
      name: Úroveň painballu
      description: Opisuje výkonnostnú triedu alebo úroveň určeného použitia (napr.
        začiatočníci, v teréne, súťaže, zimné obdobie).
    paintball_mask_coverage_level:
      name: Úroveň krytia paintballovej masky
      description: Uvádza, ktoré časti tváre alebo hlavy chránia paintballové okuliare
        alebo maska (len okuliare, polovica tváre, celá tvár alebo celá hlava).
    paintball_tank_valve_type:
      name: Typ ventilu na paintballovej fľaši
      description: Opisuje rozhranie ventilu alebo regulátora na nádrži.
    painting_surface_priming_type:
      name: Typ základnej úpravy povrchu
      description: Určuje typ základnej úpravy/povlaku na povrchu, ktorý sa má opatriť
        náterom (nielen to, či je povrch natretý základnou farbou alebo nie), čo ovplyvňuje
        priľnavosť farby a kompatibilitu s danou technikou.
    palette_knife_blade_edge_profile:
      name: Profil ostria/hrany čepele maliarskej špachtle
      description: Opisuje profil pracovnej hrany čepele maliarskej špachtle (nie
        ostrosť), ktorý ovplyvňuje vytváranie stôp a miešanie farieb.
    palette_knife_flexibility:
      name: Pružnosť maliarskej špachtle
      description: Opisuje tuhosť/ohybnosť čepele maliarskej špachtle.
    palette_surface_finish:
      name: Povrchová úprava palety
      description: Opisuje povrchovú úpravu alebo povlak, ktorý ovplyvňuje odolnosť
        voči škvrnám a jednoduchosť čistenia.
    palm_padding_level:
      name: Úroveň polstrovania dlane
      description: Opisuje mieru polstrovania v oblasti dlane rukavice alebo na podložke
        na uchopenie.
    palm_padding_type:
      name: Typ polstrovania dlane
      description: Uvádza materiál alebo konštrukciu použitú na polstrovanie dlane
        (napr. gél, pena, dvojvrstvová konštrukcia).
    palm_wax_blend_readiness:
      name: Pripravenosť zmesi palmového vosku
      description: Či ide o čistý palmový vosk alebo o vopred namiešanú receptúru
        určenú na dosiahnutie špecifických úžitkových vlastností.
    palm_wax_form:
      name: Forma palmového vosku
      description: Fyzikálna forma palmového vosku v podobe, v akej sa predáva, čo
        ovplyvňuje jednoduchosť merania, rýchlosť topenia a manipuláciu.
    pan_flute_tuning_standard:
      name: Štandardné ladenie panovej flauty
      description: Referenčná frekvencia používaná na ladenie (napr. A4 = 440 Hz),
        dôležitá pre hru s inými nástrojmi.
    pannier_configuration:
      name: Konfigurácia tašky na bicykel
      description: Označuje, či sa produkt predáva ako samostatná taška, spojená dvojitá
        taška alebo súprava dvoch/trojitých brašní.
    pannier_mounting_system:
      name: Systém pripevnenia tašky na bicykel
      description: Určuje spôsob upevnenia bočnej brašne na nosič alebo rám bicykla,
        čím sa zaručuje kompatibilita s rôznymi konfiguráciami.
    pant_cuff_style:
      name: Štýl manžety nohavíc
      description: Označuje zakončenie alebo úpravu v oblasti členkov nohavíc (napr.
        elastické manžety, zipsy pri členkoch, otvorený lem).
    pant_leg_conversion_type:
      name: Konverzný typ nohavice
      description: Uvádza, či a ako je možné nohavice skrátiť alebo prispôsobiť na
        rôznu dĺžku.
    pantyhose_crotch_style:
      name: Štýl rozkroku na pančuchách
      description: Určuje konštrukciu v oblasti rozkroku, pričom rozlišuje medzi štandardným
        uzavretým rozkrokom, rozkrokom bez švov alebo verziami so zosilneným klinom.
    papaya_variety:
      name: Odroda papáje
      description: Určuje druh alebo odrodu papáje (napr. Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Papierový a magnetický formát bábik
      description: Určuje, či ide o tradičnú súpravu papierových bábik, súpravu magnetických
        bábik alebo hybridný formát.
    paper_color_family:
      name: Skupina farieb papiera
      description: Určuje, či ide o jednofarebné balenie, balenie s rôznymi farbami
        alebo špeciálne kombinácie (užitočné v prípade, keď sa farba určuje pre jednotlivé
        položky, ale balenia sú zmiešané).
    paper_magnetic_doll_set_contents:
      name: Obsah súpravy papierových a magnetických bábik
      description: Označuje, ktoré hlavné komponenty sú súčasťou súpravy.
    paper_opacity:
      name: Nepriehľadnosť papiera
      description: Uvádza, do akej miery je papier priehľadný, od úplne priehľadného
        po nepriehľadný (užitočné pri prekresľovaní).
    paraglider_certification_rating:
      name: Certifikačná kvalifikácia paraglidingu
      description: Uvádza oficiálne hodnotenie letovej spôsobilosti prisúdené krídlu
        na paragliding (napr. triedy EN alebo LTF).
    parasite_types_controlled:
      name: Druhy parazitov, proti ktorým pôsobí
      description: Uvádza vnútrotelové parazity, proti ktorým je prípravok účinný,
        aby si nakupujúci mohli prispôsobiť odčervovacie programy konkrétnym prípadom
        napadnutia.
    parking_camera_mounting_location:
      name: Miesto montáže parkovacej kamery
      description: Kam na vozidle sa má kamera nainštalovať (napr. evidenčné číslo
        vozidla, povrchová montáž na zadnej strane, zapustená montáž).
    parking_camera_night_vision_technology:
      name: Technológia nočného videnia pre parkovacie kamery
      description: Metóda kompenzácie slabého osvetlenia, ktorú kamera používa.
    parking_camera_orientation:
      name: Orientácia parkovacej kamery
      description: Či je kamera určená na sledovanie zadnej časti vozidla (pri cúvaní),
        prednej časti vozidla alebo na voliteľné/zrkadlové použitie.
    parking_sensor_finish:
      name: Povrchová úprava parkovacieho senzora
      description: Uvádza povrchovú úpravu priečelia/krytu parkovacieho senzora (napr.
        pripravené na lakovanie/so základnou vrstvou, matné, lesklé), aby bolo možné
        prispôsobenie vzhľadu nárazníka.
    parking_sensor_type:
      name: Typ parkovacieho senzora
      description: Určuje technológiu snímania používanú parkovacím senzorom (napr.
        ultrazvuková, elektromagnetická, radarová, optická).
    parsley_root_variety:
      name: Odroda petržlenu
      description: Uvádza druh alebo odrodu petržlenu, ak ju dodávateľ uvádza.
    parsnip_variety:
      name: Odroda paštrnáka
      description: Uvádza konkrétnu odrodu alebo druh paštrnáka, napríklad Hollow
        Crown alebo White Gem, čím umožňuje nakupujúcim vybrať si na základe chuti,
        sladkosti alebo veľkosti.
    part_condition:
      name: Stav dielu
      description: Označuje, či je diel nový, použitý, po generálnej oprave atď.
    part_placement:
      name: Umiestnenie dielu
      description: Uvádza, kde na stroji (napr. na schodovom trenažéri alebo steperi)
        je diel nainštalovaný, ako napríklad vľavo, vpravo, vpredu alebo vzadu.
    partial_capo_covered_strings:
      name: Struny zakryté čiastočným kapodastrom
      description: Určuje rozsah strún, ktoré zakrýva čiastočný kapodaster, pričom
        sa používa štandardné číslovanie 6-strunovej gitary (1 = vysoké E, 6 = nízke
        E).
    parting_style:
      name: Štýl rozdelenia
      description: Uvádza, ako je alebo môže byť parochňa rozdelená (napr. uprostred,
        na boku, voľné rozdelenie), čo ovplyvňuje možnosti úpravy účesu.
    party_favor_type:
      name: Typ darčeka pre hostí
      description: Určuje, o aký druh darčeka pre hostí ide (napr. nálepky, miniatúrne
        hračky, bublifuky), aby bolo možné prehliadať a filtrovať ponuku darčekov
        pre hostí.
    party_game_format:
      name: Formát párty hry
      description: Primárny fyzický formát párty hry.
    party_horn_mouthpiece_type:
      name: Typ náustku na party trúbku
      description: Určuje konštrukciu náustku, ktorá ovplyvňuje hygienu a pohodlie.
    party_horn_style:
      name: Štýl párty trúbky
      description: Opisuje konštrukciu alebo spôsob fungovania párty trúbky (ako sa
        rozťahuje alebo ako vydáva zvuk).
    passenger_car_type:
      name: Typ osobného železničného vozidla
      description: Určuje konkrétny typ osobného železničného vozidla (osobný vagón)
        pre daný model (napr. osobný vagón, lôžkový vagón), ktorý sa používa na prehľadávanie
        a zostavovanie súprav.
    passion_fruit_variety:
      name: Odroda mučenky
      description: Identifikuje/špecifikuje ponúkanú botanickú alebo komerčnú odrodu
        mučenky (napr. fialová, žltá, granadilla).
    pasta_sauce_texture:
      name: Konzistencia omáčky na cestoviny
      description: Opisuje konzistenciu omáčky (napr. hladká, s kúskami, krémová),
        aby zodpovedala preferenciám spotrebiteľov, pokiaľ ide o pocit v ústach.
    pasta_sauce_variety:
      name: Druh omáčky na cestoviny
      description: Omáčky na cestoviny sú roztriedené podľa receptúry alebo štýlu,
        aby si nakupujúci vedeli rýchlo nájsť klasické omáčky, ako je marinara, alebo
        špeciálne omáčky, ako je omáčka s vodkou alebo pestom.
    pastry_crust_state:
      name: Stav pečivového cesta
      description: Opisuje stav prípravy alebo upečenia kôrky v čase nákupu.
    pastry_crust_style:
      name: Typ lineckého cesta
      description: Určuje konkrétny štýl pečiva alebo druh cesta, z ktorého je kôrka.
    pastry_filling_type:
      name: Druh náplne pečiva
      description: Určuje hlavnú náplň pečiva alebo koláčika.
    patch_adhesion_method:
      name: Metóda priľnutia fľaku
      description: Určuje spôsob, akým sa fľak lepí na dušu alebo pneumatiku (napr.
        samolepiaci, vulkanizácia pomocou lepidla alebo aktivácia teplom).
    patch_backing_material:
      name: Podkladový materiál pre nášivky
      description: Materiál použitý na zadnej strane/spodnej časti nášivky (napr.
        filc, keprová tkanina), ktorý prichádza do styku so zdobeným predmetom.
    patch_backing_type:
      name: Typ podkladového materiálu pre nášivky
      description: Podklad použitý na nášivke (napr. nažehľovací, samolepiaci, suchý
        zips, žiadny).
    patch_base_material:
      name: Základný materiál pre nášivky
      description: Hlavný textilný materiál, z ktorého je vyrobená nášivka s motívom
        (nie dekoratívne ozdoby).
    patch_border_edge_finish:
      name: Povrchová úprava okraja/lemu nášivky
      description: Spôsob úpravy okrajov nášivky (napr. obšitý/zaistený okraj, laserom
        vyrezaný okraj) ovplyvňuje jej trvácnosť a vzhľad.
    patch_placement_area:
      name: Oblasť umiestnenia nášivky
      description: Bežné miesta na umiestnenie nášivky na odevoch a doplnkoch.
    pathogen_removal_capability:
      name: Schopnosť odstraňovať patogény
      description: Určuje, na odstraňovanie ktorých tried mikroorganizmov (baktérie,
        prvoky, vírusy) je čerpadlo certifikované.
    pattern_sizing_system:
      name: Systém veľkostí strihu
      description: Určuje regionálny systém veľkostí alebo normu použitú pre tabuľku
        veľkostí strihu (napr. USA, Veľká Británia, EÚ).
    peak_style:
      name: Štýl hrotu
      description: Určuje štýl šiltu alebo okraja prilby, čo má vplyv na krytie, vzhľad
        a pravidlá danej disciplíny.
    pear_variety:
      name: Odroda hrušky
      description: Uvádza odrodu alebo druh hrušiek (napr. Bartlett, Bosc, Conference),
        vďaka čomu si nakupujúci môžu vybrať podľa svojej preferovanej chuti, konzistencie
        a spôsobu použitia v kuchyni.
    pearl_luster_grade:
      name: Stupeň lesku perál
      description: Kvalitatívny stupeň lesku povrchu perál.
    pearl_matching_level:
      name: Úroveň zladenia perál
      description: Uvádza, do akej miery sa perly v rámci jednej šarže alebo náhrdelníka
        zhodujú (napr. farbou, veľkosťou a leskom).
    pearl_shape:
      name: Tvar perál
      description: Kategória celkového tvaru perál.
    pearl_surface_condition:
      name: Povrchový stav perál
      description: Uvádza stav viditeľného povrchu perly na základe prítomnosti a
        závažnosti nedokonalostí alebo škvŕn.
    pearl_treatment:
      name: Ošetrenie perál
      description: Uvádza akékoľvek ošetrenie perál, ktoré ovplyvňuje ich farbu alebo
        vzhľad.
    pearl_type:
      name: Typ perál
      description: Určuje druh/pôvod perál (napr. sladkovodné, Akoya, tahitské, juhomorské)
        v prípade voľných perál.
    peat_level:
      name: Úroveň rašelinového dymu
      description: Popisuje intenzitu vplyvu rašelinového dymu na chuť whisky, od
        nerašelinovej až po silne rašelinovú.
    pedal_and_cleat_system_compatibility:
      name: Kompatibilita s pedálmi a kuframi
      description: Určuje, s ktorými štandardmi pedálov alebo kufrov je podložka alebo
        klin kompatibilný, čím sa zabezpečí, že si nakupujúci vyberú produkt, ktorý
        pasuje k ich pedálom a obuvi.
    pedal_configuration:
      name: Konfigurácia pedálov
      description: Uvádza, či je stolička vybavená jedným pedálom, oddelenými/nezávislými
        pedálmi alebo má konvertibilnú konštrukciu.
    pedal_mounting_style:
      name: Štýl montáže pedálov
      description: Určuje spôsob upevnenia pedála alebo krytu/podložky pedála k vozidlu
        (spôsob montáže/upevnenia).
    pedal_set_components:
      name: Súčiastky v súprave pedálov
      description: Určuje, ktoré pedále sú súčasťou súpravy.
    pedal_spindle_material:
      name: Materiál hriadeľa pedálu
      description: Materiál použitý na výrobu osi/hriadeľa pedálu, ktorý ovplyvňuje
        pevnosť, hmotnosť a odolnosť proti korózii.
    pedal_spindle_thread_size:
      name: Veľkosť závitu hriadeľa pedálu
      description: Určuje typ závitu hriadeľa pedálu, ktorý sa skrutkuje do ramena
        kľuky.
    pedal_type:
      name: Typ pedálu
      description: Opisuje typ pedálov dodávaných s bicyklom, pričom uvádza kompatibilitu
        s obuvou a štýl jazdy.
    pellet_accessory_type:
      name: Typ príslušenstva na pelety
      description: Identifikuje konkrétny druh príslušenstva na pelety, aby rybári
        mohli rýchlo nájsť vrtáčiky, viazače alebo zarážky podľa svojich potrieb pri
        zostavovaní nadväzcov.
    pellet_grade:
      name: Trieda brokov
      description: Označuje presnosť výroby alebo výkonnostnú triedu airsoftových
        brokov.
    pen_ink_color:
      name: Farba atramentu do pera
      description: Uvádza skutočnú farbu atramentu, ktorý sa uvoľňuje z pera, a ktorá
        sa môže líšiť od farby vonkajšieho tela.
    penalty_card_accessories_included:
      name: Pribalené príslušenstvo trestných kariet
      description: Uvádza ďalšie príslušenstvo pre rozhodcov, ktoré je súčasťou balenia
        trestných kariet, ako napríklad peňaženka, blok na zapisovanie skóre, ceruzka,
        minca, píšťalka alebo vrecko.
    penalty_card_colors_included:
      name: Farby trestných kariet v cene
      description: Uvádza zoznam farieb trestných kariet obsiahnutých v súprave produktu.
    penalty_flag_throw_distance:
      name: Vzdialenosť doletu trestnej vlajky
      description: Klasifikácia podľa konštrukcie, ktorá udáva predpokladaný dolet
        vlajky.
    pendant_cutter_safety_features:
      name: Bezpečnostné prvky závesnej rezačky
      description: Určuje integrované bezpečnostné prvky, ktoré znižujú riziko náhodného
        porezania pri prenášaní/nosení.
    pendant_cutter_wear_method:
      name: Metóda merania opotrebenia závesnej rezačky
      description: Určuje, ako sa má závesná rezačka prenášať a nosiť.
    pepper_variety:
      name: Odroda papriky
      description: Uvádza odrodu alebo druh papriky použitej v produkte, čo umožňuje
        zákazníkom rozlíšiť rôzne chuťové profily a stupne pálivosti.
    percussion_case_style:
      name: Typ puzdra na perkusie
      description: Klasifikuje celkový štýl/konštrukciu puzdra (mäkké puzdro, tvrdé/pevné
        puzdro alebo hybridné puzdro).
    percussion_instruments_included:
      name: Bicie nástroje v cene
      description: Uvádza typy perkusií, ktoré sú súčasťou hračkárskej súpravy obsahujúcej
        viacero nástrojov.
    percussion_mallet_handle_grip_style:
      name: Štýl úchopu/rukoväte paličiek na perkusie
      description: Určuje typ povrchovej úpravy rukoväte (okrem jej štruktúry), napríklad
        holé drevo, lakované, pogumované alebo s omotávkou.
    percussion_mallet_head_construction:
      name: Konštrukcia hlavy paličky na perkusie
      description: Opisuje spôsob výroby alebo konštrukciu hlavy paličky (napr. obalená
        priadzou, obalená plsťou, z gumy, z neopracovaného dreva), čo má vplyv na
        zvuk a životnosť.
    perfumery_base_carrier_type:
      name: Typ nosnej zložky v parfumérii
      description: Určuje systém nosnej látky/rozpúšťadla bázy parfumu (z čoho je
        báza primárne vyrobená pre riedenie a výkonnosť).
    perfumery_base_intended_application:
      name: Spôsob aplikácie nosnej zložky parfumu
      description: Uvádza formát koncového použitia, pre ktorý je nosná zložka určená
        (napr. sprejový parfum alebo aplikácia guľôčkou).
    perfumery_ingredient_carrier_solvent:
      name: Nosná zložka/rozpúšťadlo v parfumérii
      description: Uvádza nosnú zložku/rozpúšťadlo, v ktorom je ingrediencia dodávaná,
        ak je zriedená (napr. etanol, DPG, jojobový olej).
    perfumery_ingredient_form:
      name: Forma prísady do parfumu
      description: Určuje fyzickú formu/stav zložky parfumu pri dodaní.
    perfumery_ingredient_type:
      name: Typ prísady do parfumu
      description: Klasifikuje zložku parfumu podľa toho, akú úlohu plní v parfumérskej
        praxi (napr. éterický olej, aromatická chemikália).
    perfumery_ingredient_usage_note:
      name: Tón použitia ingrediencií parfumu
      description: Indikuje typickú rolu v štruktúre vône (hlava, srdce, základ),
        pričom berie do úvahy, že vonné zložky/materiály môžu presahovať viaceré tóny.
    perfumery_ingredients:
      name: Prísady do parfumu
      description: Uvádza zoznam druhov spotrebných vonných látok obsiahnutých v súprave
        (napr. éterické oleje, vonné oleje, alkoholová báza).
    perfumery_note_position:
      name: Pozícia parfumérskych tónov
      description: Označuje typickú úlohu ingrediencie v štruktúre vône (hlava/srdce/základ).
    persimmon_variety:
      name: Odroda tomelu
      description: Určuje druh alebo odrodu tomelu, keďže rôzne odrody, ako napríklad
        Fuyu alebo Hachiya, sa líšia konzistenciou, chuťou, trpkosťou a spôsobom použitia
        v kuchyni.
    personalization_type:
      name: Typ personalizácie
      description: Určuje, či a ako je možné produkt prispôsobiť pre konkrétnu udalosť
        (napr. monogram, meno/dátum, vloženie fotografie).
    phonics_focus:
      name: Zameranie na foniku
      description: Určuje, na ktoré fonetické zručnosti a zručnosti čítania slov je
        čitateľská hračka zameraná.
    physalis_variety:
      name: Odroda machovky
      description: Uvádza konkrétny botanický druh, kultivar alebo bežnú odrodu predávanej
        machovky.
    pi_ata_filler_type_included:
      name: Obsiahnutá výplň piñaty
      description: Ak je súčasťou balenia výplň, typ vnútorného obsahu.
    pi_ata_hanging_method:
      name: Spôsob zavesenia piñaty
      description: Ako je piñata navrhnutá na zavesenie alebo upevnenie (s očkom,
        háčikom, priloženou šnúrkou atď.).
    pi_ata_opening_type:
      name: Typ otvárania piñaty
      description: Ako sa otvára/zatvára plniaci otvor (klapka, suchý zips, zips,
        vopred zapečatená atď.).
    piccolo_key_system:
      name: Systém klapiek na pikole
      description: Určuje systém ladenia/konštrukciu použitú na pikole (u moderných
        pikol ide zvyčajne o Boehmov systém).
    piccolo_keywork_features:
      name: Funkcie klapiek na pikole
      description: Špecifikuje dôležité mechanizmy a varianty klapiek na pikole.
    pick_grip_aid:
      name: Pomôcka na lepšie uchopenie trsátka
      description: Označuje primárny integrovaný prvok na zlepšenie uchopenia trsátka
        nad rámec bežnej textúry alebo povrchu materiálu (napr. otvory na uchopenie,
        reliéfne logo, gumená vložka).
    pickleball_construction_type:
      name: Typ konštrukcie pickleballu
      description: Výrobná konštrukcia lopty, napríklad bezšvová jednodielna alebo
        zváraná dvojdielna, ktorá ovplyvňuje odolnosť a konzistentnosť letu.
    pickling_method:
      name: Metóda morenia
      description: Určuje konzervačné médium alebo techniku použitú na nakladanie,
        napríklad octový nálev alebo laktofermentácia.
    pickup_and_preamp_configuration:
      name: Konfigurácia snímača a predzosilňovača
      description: Uvádza, či je viola vybavená vstavaným snímačom a/alebo aktívnym
        predzosilňovačom na hranie so zosilnením zvuku alebo nahrávanie.
    pickup_configuration:
      name: Konfigurácia snímača
      description: Opisuje celkové usporiadanie snímačov na elektrickej gitare pomocou
        bežných skratiek (napr. SSS, HSS, HH).
    pickup_cover_material:
      name: Materiál krytu snímača
      description: Určuje hlavný materiál krytu snímača (ak je prítomný), vrátane
        bežných povrchových úprav pokovovaním, ak to tak výrobca uvádza.
    pickup_cover_type:
      name: Typ krytu snímača
      description: Určuje, či má snímač elektrickej gitary kryt, a uvádza materiál
        alebo typ krytu (napr. kovový alebo plastový).
    pickup_string_spacing:
      name: Rozstup strún snímača
      description: Štandard rozstupu pólových nástavcov/strún, pre ktorý je snímač
        vyrobený (napr. Fender/F-spaced alebo Gibson/štandard), čo ovplyvňuje usporiadanie
        strún na gitarách s tremolom.
    pie_crust_type:
      name: Typ cesta na koláč
      description: Určuje štýl alebo druh cesta použitého na koláč alebo tortu, napríklad
        lístkové cesto, grahamové sušienky alebo bezlepkové cesto.
    piece_configuration:
      name: Konfigurácia dielov
      description: Uvádza, z koľkých samostatných dielov sa tágo, špica alebo opora
        skladá, čo ovplyvňuje prenosnosť a štýl hry.
    pillow_form_size:
      name: Veľkosť vankúšovej formy
      description: Štandardizované označenie konečných rozmerov vankúšových foriem/výplní
        (napr. 18 x 18 palcov).
    pilot_helmet_communications_integration:
      name: Integrácia komunikačných systémov do pilotnej prilby
      description: Uvádza, či je prilba vybavená komponentmi pre leteckú komunikáciu
        alebo je na ne vopred pripravená.
    pilot_helmet_visor_configuration:
      name: Konfigurácia priezoru pilotnej prilby
      description: Určuje konfiguráciu priezoru alebo tvárového štítu, ktoré sú súčasťou
        pilotnej prilby.
    pin_attachment_type:
      name: Typ uchytenia kolíkom
      description: Určuje typ zapínania, ktorý sa používa na pripevnenie pripínacieho
        produktu na odev alebo iný povrch (napr. motýľové zapínanie, magnetické zapínanie).
    pin_backing_type:
      name: Typ podložky kolíka
      description: Určuje spôsob upevnenia alebo podklad, ktoré slúžia na pripevnenie
        pripínacieho produktu na odev alebo doplnky.
    pin_cushion_attachment_style:
      name: Štýl uchytenia/pripevnenia vankúšika na pripínací produkt
      description: Ako sa vankúšik na pripínací produkt nosí, upevňuje alebo umiestňuje
        počas používania.
    pin_cushion_features:
      name: Vlastnosti vankúšika na pripínací produkt
      description: Funkčné vlastnosti nad rámec základného uchytenia pripínacích produktov.
    pin_face_customization_method:
      name: Spôsob prispôsobenia čelnej strany pripínacieho produktu
      description: Určuje, akým spôsobom sa vyrába dizajn čelnej strany (napr. tvrdý
        smalt, mäkký smalt, potlač).
    pin_type:
      name: Typ pripínacieho produktu
      description: Určuje štýl alebo formát pripínacieho produktu používaný pri zberateľských
        predmetoch pre fanúšikov športu.
    ping_pong_certification:
      name: Certifikácia stolného tenisu
      description: Uvádza úroveň schválenia produktu podľa oficiálnej normy alebo
        príslušným orgánom.
    ping_pong_competition_certification:
      name: Súťažná certifikácia stolného tenisu
      description: Indikuje oficiálny status certifikácie loptičky na stolný tenis
        pre turnajovú/oficiálnu hru (napr. schválené ITTF).
    ping_pong_paddle_handle_style:
      name: Štýl rukoväte rakety na stolný tenis
      description: Určuje tvar a štýl rukoväte rakety, čo ovplyvňuje pohodlie pri
        držaní a hernú techniku.
    ping_pong_robot_accessory_type:
      name: Typ príslušenstva pre robota na stolný tenis
      description: Určuje funkčný podtyp príslušenstva, aby si nakupujúci vedeli rýchlo
        zúžiť výsledky vyhľadávania (napr. siete alebo napájacie adaptéry).
    ping_pong_rubber_surface_type:
      name: Typ povrchu poťahu na stolný tenis
      description: Určuje štýl/štruktúru gumového poťahu na rakete, čo ovplyvňuje
        vlastnosti rotácie a rýchlosti.
    ping_pong_rubber_type:
      name: Typ poťahu na stolný tenis
      description: Určuje štruktúru povrchu poťahu na stolný tenis, ktorá ovplyvňuje
        herné vlastnosti.
    ping_pong_table_type:
      name: Typ pingpongového stola
      description: Klasifikuje celkový štýl alebo formát stola na jednoduchšie porovnávanie
        (napr. súťažný, predelový/konverzný, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Intonácia dychových nástrojov/metóda tvorby zvuku
      description: Určuje, akým spôsobom nástroj vytvára zvuk (mechanizmus prúdenia
        vzduchu), čo pomáha rozlišovať vo filtroch medzi skupinami nástrojov, ako
        sú panove flauty, jazýčkové píšťaly a skupiny organových píšťal.
    piston_application_type:
      name: Typ aplikácie piestu
      description: Určené použitie/zaťaženie piestu (náhradný, výkonnostný/závodný
        alebo pre vysoké zaťaženie).
    piston_crown_dish_style:
      name: Štýl dna/koruny piestu
      description: Tvar hlavy piestu, ktorý ovplyvňuje objem spaľovacej komory a kompresný
        pomer (napr. plochá hlava, kupolovitá hlava, miskovitá hlava).
    piston_pin_retention_type:
      name: Typ upevnenia piestneho čapu
      description: Špecifikuje, ako je piestny čap zaistený/uchytený v zostave piestu
        a ojnice.
    pit_configuration:
      name: Konfigurácia jamky
      description: Určuje konštrukčný formát doskočiska (jednodielne alebo viacmodulové)
        a z toho vyplývajúci počet dodávaných sekcií alebo modulov.
    pit_cover_type:
      name: Typ poťahu jamky
      description: Špecifikuje ochranný povrch alebo plachtu dodávanú s doskočiskom,
        čo ovplyvňuje odolnosť voči hrotom na tretrách, ochranu pred poveternostnými
        vplyvmi a preferencie atlétov.
    pitahaya_flesh_color:
      name: Farba dužiny dračieho ovocia
      description: Určuje farbu dužiny dračieho ovocia (napr. biela, červená, fuchsiová),
        čo je kľúčový rozlišovací znak, ktorý ovplyvňuje chuť, vzhľad a vnímanú výživovú
        hodnotu.
    pitch_mat_coverage_length:
      name: Dĺžka pokrytia nadhadzovacej podložky
      description: Klasifikuje podložku na kriketové ihrisko podľa časti bránky, ktorú
        pokrýva (napr. celé alebo polovičné ihrisko).
    pitch_range:
      name: Dosah nadhodu
      description: Opisuje vnímaný tónový rozsah alebo jas zvuku šejkra.
    pitch_standard:
      name: Štandard výšky tónu
      description: Určuje štandardné ladenie (referenčné ladenie), pre ktoré je flauta
        vyrobená (napr. A=440, A=442, A=415).
    pitching_rubber_size_designation:
      name: Označenie veľkosti nadhadzovacej podložky
      description: Uvádza štandardnú klasifikáciu veľkostí nadhadzovacej podložky,
        čím zjednodušuje výber bez toho, aby nakupujúci museli poznať presné rozmery.
    pitching_screen_style:
      name: Štýl nadhadzovacej podložky
      description: Určuje štruktúru podložky, aby si nakupujúci vedeli rýchlo vybrať
        správnu ochrannú zostavu pre svoj tréningový scenár.
    pitching_target_design:
      name: Dizajn terča na nadhadzovanie
      description: Určuje celkový štýl alebo konfiguráciu terča na nadhadzovanie.
    pitching_wheel_count:
      name: Počet nadhadzovacích kolies
      description: Uvádza počet hnacích kolies, ktoré využíva nadhadzovací stroj.
    pivot_adjustability:
      name: Možnosť nastavenia otočného čapu
      description: Uvádza, či majú nožnice nastaviteľnú otočnú skrutku na reguláciu
        napätia pri strihaní.
    pivot_piece_type:
      name: Typ otočného dielu
      description: Rozlišuje medzi rôznymi dodávanými tvarmi otočných čapov, ako sú
        tradičné kalichy alebo rúrkové vyhotovenie.
    place_card_holder_closure_mechanism:
      name: Uzatvárací mechanizmus držiaka menovky
      description: Určuje, akým spôsobom držiak drží alebo upevňuje menovku.
    place_card_orientation:
      name: Orientácia menovky
      description: Určuje orientáciu menovky pri jej použití/zobrazení.
    place_card_printing_status:
      name: Spôsob tlače menovky
      description: Uvádza, či je menovka prázdna na vlastné vyplnenie/vytlačenie,
        predtlačená (bez mena) alebo personalizovaná/tlačená na mieru.
    placket_type:
      name: Typ zapínania košele
      description: Určuje štýl predného zapínania na polokošeli, vrátane počtu gombíkov
        alebo alternatívnych spôsobov zapínania.
    planetarium_content_theme:
      name: Téma obsahu planetária
      description: Hlavný obsah premietaný projektorom planetária.
    planetarium_projection_content_format:
      name: Formát obsahu projekcie planetária
      description: Určuje mechanizmus projekcie, ktorý planetárium používa (fyzické
        disky/diapozitívy alebo digitálny/LED efekt).
    plant_fiber_type:
      name: Typ rastlinného vlákna
      description: Špecifický typ vlákna rastlinného pôvodu, ak je Typ zdroja strižových
        vlákien nastavený na možnosť Rastlina.
    plaster_gauze_finish:
      name: Povrchová úprava sadrovej gázy
      description: Výsledná tendencia povrchovej úpravy po aplikácii a vyhladení.
    plaster_gauze_grade:
      name: Trieda sadrovej gázy
      description: Určenie použitia sadrovej gázy (napr. na ručné práce/pre študentov
        alebo na profesionálne účely).
    plaster_gauze_weave_density:
      name: Hustota tkaniny sadrovej gázy
      description: Relatívna riedkosť/hustota väzby gázy, ktorá ovplyvňuje pevnosť
        a priľnavosť sadry.
    plastic_canvas_finish:
      name: Povrchová úprava plastového plátna
      description: Úprava/ošetrenie povrchu kotúča plastového plátna.
    plastic_canvas_sheet_finish:
      name: Povrchová úprava z plastového plátna
      description: Povrchová/okrajová úprava plastového plátna
    plastic_canvas_transparency:
      name: Priehľadnosť plastového plátna
      description: Aké priehľadné/nepriehľadné je plastové plátno.
    plate_bottom_design:
      name: Dizajn spodnej strany méty
      description: Opisuje konštrukciu spodnej strany méty, ktorá ovplyvňuje priľnavosť,
        stabilitu a bezpečnosť na rôznych hracích povrchoch.
    plate_compatibility_standard:
      name: Norma kompatibility platní
      description: Uvádza štandard závaží, pre ktorý je činka určená (napr. olympijský
        50 mm, štandardný 25 mm).
    plate_installation_type:
      name: Typ inštalácie méty
      description: Určuje spôsob upevnenia alebo umiestnenia méty na ihrisku (napr.
        zapustená do zeme, upevnená kolíkmi, položená na zem), čo kupujúcim umožňuje
        vybrať si medzi trvalou a prenosnou variantou.
    plate_size_category:
      name: Kategória veľkostí platní
      description: Klasifikuje dosku podľa úrovne hry alebo štandardu predpisov, aby
        kupujúci mohli rýchlo nájsť vybavenie kompatibilné s ligou.
    play_dough_putty_kit_contents:
      name: Obsah súpravy plastelíny a modelovacích hmôt
      description: Uvádza hlavné komponenty, ktoré sú súčasťou dodávky okrem samotnej
        zmesi (napr. nástroje, formy, extrudér, uskladnenie).
    play_dough_tool_set_items_included:
      name: Obsah položiek v súprave nástrojov na modelovanie
      description: Uvádza druhy nástrojov a príslušenstva, ktoré sú súčasťou súpravy
        na modelovanie (napr. valčeky, vykrajovačky, formičky).
    play_environment_suitability:
      name: Vhodnosť herného prostredia
      description: Určuje, v akom prostredí je súprava určená na používanie (napr.
        v interiéri, v exteriéri, vo vode).
    play_food_features:
      name: Vlastnosti hračkárskych potravín
      description: Špeciálne funkčné vlastnosti alebo realistické prvky hračkárskych
        potravín.
    play_food_items_included:
      name: Obsiahnuté položky hračkárskych potravín
      description: Uvádza druhy hračkárskych potravín, ktoré sú súčasťou kuchynskej
        súpravy.
    play_food_size_scale:
      name: Mierka hračkárskych potravín
      description: Uvádza približnú veľkosť hračkárskych potravín, aby boli kompatibilné
        s detskými kuchynkami, bábikami a hernými súpravami.
    play_money_set_components_included:
      name: Komponenty sady hry s peniazmi v cene
      description: Určuje, ktoré typy komponentov sú súčasťou súpravy pre hru s fiktívnymi
        peniazmi/hru na bankovníctvo.
    play_pattern:
      name: Šablóna hry
      description: Hlavný účel, na ktorý je hračka určená (napr. ako hračka na upokojenie,
        dekorácia na stôl, stavebnica alebo hlavolam).
    play_sprinkler_mounting_type:
      name: Typ upevnenia hračkárskeho rozstrekovača
      description: Ako je hračkársky rozstrekovač umiestnený/upevnený počas používania.
    play_vehicle_lights_and_sounds:
      name: Hračkárske svetlá a zvuky vozidla
      description: Uvádza, či hračkárske vozidlo obsahuje elektronické herné efekty,
        ako sú svetlá a/alebo zvuky.
    play_vehicle_scale:
      name: Mierka hračkárskeho vozidla
      description: Uvádza mierku modelu vozidla (bežne sa používa pri odliatkoch a
        hračkárskych modeloch).
    player_size_category:
      name: Kategória veľkostí hráča
      description: Určuje cieľovú vekovú skupinu hráčov, pre ktorú je súprava výstroja
        pre chytača určená (napr. malé deti, mládež, dorast, dospelí).
    player_size_range:
      name: Rozsah veľkostí hráčov
      description: Určuje rozsah veľkostí, pre ktoré je popruh/opora určená (napr.
        deti, dospelí, univerzálna).
    playing_environment:
      name: Herné prostredie
      description: Určuje hlavný hrací povrch alebo prostredie, pre ktoré je hokejová
        lopta určená.
    playing_method:
      name: Spôsob hry
      description: Hlavný spôsob, akým sa na nástroj má hrať/ako sa má aktivovať.
    playing_surface_material:
      name: Materiál hracej plochy
      description: Určuje materiál prednej hracej plochy cajonu (tapa), ktorý výrazne
        ovplyvňuje zvuk a pocit pri hre.
    playing_surface_type:
      name: Typ hracej plochy
      description: Opisuje konštrukciu a pocit z povrchu podložky na cvičenie.
    playset_activities_included:
      name: Aktivity obsiahnuté v hernej súprave
      description: Uvádza hlavné herné aktivity alebo komponenty zabudované do detského
        ihriska/hojdačkovej zostavy, čo nakupujúcim pomáha filtrovať produkty podľa
        toho, čo všetko môžu deti na konštrukcii robiť.
    playset_installation_type:
      name: Typ montáže hernej zostavy
      description: Určuje spôsob inštalácie alebo upevnenia hojdačky/detského ihriska.
    playset_items_included:
      name: Komponenty hernej zostavy v cene
      description: Uvádza typy predmetov na hranie na roly, ktoré sú súčasťou piknikovej
        hernej súpravy (potraviny, riad, deka, košík atď.).
    pliers_jaw_style:
      name: Typ čeľustí klieští
      description: Opisuje primárnu konfiguráciu čeľustí alebo funkčný typ klieští.
    plum_variety:
      name: Odroda slivky
      description: Identifikuje konkrétny kultivar alebo odrodu slivky, čo nakupujúcim
        umožňuje vybrať si na základe chuti, farby a zamýšľaného kulinárskeho použitia.
    plumcot_variety:
      name: Odroda sliviek
      description: Identifikuje konkrétny kultivar alebo komerčnú odrodu slivky (napr.
        Flavor King, Dapple Dandy), ktorá môže ovplyvniť chuť, farbu a sezónnosť.
    plunger_mute_handle_type:
      name: Typ rukoväte piestového dusítka
      description: Určuje štýl rukoväte alebo držiaka používaný na držanie a manipuláciu
        s piestovým dusítkom pre efekty wa-wa.
    pocket_closure_type:
      name: Typ zapínania vrecka
      description: Definuje, ako sa každé vrecko zaisťuje, a pomáha používateľom nájsť
        nohavice s bezpečným úložným priestorom počas aktivity.
    pocket_knife_opening_mechanism:
      name: Mechanizmus otvárania vreckového noža
      description: Ako sa čepeľ rozvinie/otvorí (zárez na necht na manuálne otváranie,
        kolík na palec, flipper, s asistenciou, automatické atď.).
    pocket_style:
      name: Štýl vreciek
      description: Určuje hlavnú konštrukciu vreciek na nohaviciach.
    pocket_type:
      name: Typ vrecka
      description: Identifikuje štýl alebo prítomnosť vreciek na odeve.
    pod_retention_system:
      name: Systém držania toboliek
      description: Opisuje, ako sa paintballové tobolky držia na mieste a uvoľňujú
        z postroja alebo balenia.
    pogo_stick_footrest_type:
      name: Typ opierky na nohy skákacej tyče Pogo
      description: Opisuje konštrukciu plošiny/držiaka na nohy používaného na státie
        na skákacej tyči Pogo.
    pogo_stick_suspension_type:
      name: Typ odpruženia skákacej tyče Pogo
      description: Určuje mechanizmus odrazu skákacej tyče Pogo, ktorý má vplyv na
        pocit, odolnosť a údržbu.
    poi_handle_type:
      name: Typ rukoväte Poi
      description: Určuje štýl rukoväti/úchopu/nadstavca používaného na držanie poi.
    poi_light_source:
      name: Zdroj svetla poi
      description: V prípade poi s osvetlením určuje technológiu osvetlenia.
    poi_tether_type:
      name: Typ popruhu poi
      description: Označuje typ popruhu, ktorým sa spája hlava poi s rukoväťou, gombíkom
        alebo slučkou na zápästí (napr. šnúra, povraz, reťaz).
    poi_type:
      name: Typ poi
      description: Určuje primárny typ konštrukcie/použitia poi (napr. tréningové,
        s LED diódou, ohňové).
    point_type:
      name: Typ hrotu
      description: Tvar/štýl hrotu použitého na ihle na vyšívanie.
    pointe_shoe_shank_length:
      name: Dĺžka holene špičky
      description: Časť dĺžky topánky, ktorú podopiera klenok, napríklad plná alebo
        3/4 dĺžka.
    pointe_shoe_shank_strength:
      name: Pevnosť klenku baletnej špičky
      description: Stupeň tuhosti klenku baletnej špičky, ktorý ovplyvňuje podopieranie
        a čas zabehnutia.
    poker_accessory_storage_included:
      name: Úložný priestor pre pokerové príslušenstvo súčasťou balenia
      description: Označuje, pre ktoré ďalšie pokerové položky poskytuje príslušenstvo
        vyhradený úložný priestor.
    poker_chip_tray_rack_configuration:
      name: Konfigurácia podnosu/stojana na pokerové žetóny
      description: Popisuje štýl vnútornej organizácie podnosu/stojana na žetóny (riadky
        a kapacita na riadok).
    pole_anchoring_method:
      name: Metóda ukotvenia stĺpu
      description: Definuje, ako je palica upevnená k zemi alebo hracej ploche.
    pole_basket_type:
      name: Typ koša na stĺp
      description: Klasifikuje štýl alebo veľkosť košíka umiestneného v blízkosti
        špičky lyžiarskej palice, čo označuje zamýšľané snehové podmienky.
    pole_connection_system:
      name: Systém pripojenia stĺpika
      description: Identifikuje mechanizmus, ktorý spája časti stĺpika, ako napríklad
        systémy s gumenou šnúrou, závitom alebo nábojom, čo pomáha používateľom posúdiť
        rýchlosť zostavenia a kompatibilitu.
    pole_system_type:
      name: Typ stĺpového systému
      description: Opisuje konštrukčný podperný systém alebo štýl postavenia stanu
        (napr. hliníkové tyče, nafukovacie vzduchové trubice, miesto pre trekingové
        palice).
    police_equipment_fitment:
      name: Inštalácia pre policajné vybavenie
      description: Určuje, na podporu akého vybavenia orgánov presadzovania práva
        je vozidlo nakonfigurované alebo vopred zapojené.
    police_vehicle_equipment_package:
      name: Balík vybavenia policajného vozidla
      description: Označuje špecifické policajné prispôsobené vybavenie/výbavu, ktorá
        je súčasťou vozidla v predaji.
    police_vehicle_light_siren_equipment:
      name: Svetelné/sirénové vybavenie policajného vozidla
      description: Určuje, ktoré núdzové výstražné zariadenia sú nainštalované na
        policajnom aute.
    police_vehicle_upfit_level:
      name: Úroveň prispôsobeného vybavenia policajného vozidla
      description: Opisuje, aké prispôsobené vybavenie/výbava špecifická pre políciu
        je nainštalovaná na vozidle.
    polish_formulation:
      name: Zloženie leštidla
      description: Označuje základné zloženie/chemické zloženie leštidla na hmatník
        (nie spôsob aplikácie).
    polish_purpose:
      name: Účel leštidla
      description: Primárny zamýšľaný výsledok leštidla na povrchu nástroja.
    pollen_level:
      name: Úroveň peľu
      description: Označuje množstvo/pravdepodobnosť zafarbenia peľom z odrody ľalie.
    polymer_clay_firmness_level:
      name: Stupeň pevnosti polymérnej hliny
      description: Relatívna pevnosť/mäkkosť polymérnej hliny pred vypálením (spracovateľnosť).
    polymer_clay_translucency:
      name: Priesvitnosť polymérnej hliny
      description: Vizuálna nepriehľadnosť/priehľadnosť polymérnej hliny po vytvrdnutí.
    pom_pom_handle_style:
      name: Štýl rukoväte s brmbolcom
      description: Opisuje štýl alebo konštrukciu rukoväti/úchopu používaného na držanie
        pompónu.
    pom_pom_trim_backing_tape_material:
      name: Materiál podkladu/pásky pompónového lemu
      description: Označuje materiál šitej pásky alebo lemovky, ku ktorej sú pompóny
        pripevnené (základný diel lemovania).
    pom_pom_type:
      name: Typ pompónu
      description: Označuje prítomnosť a konkrétny typ pompónu alebo brmbolca na klobúku.
    pomegranate_product_form:
      name: Forma produktu z granátového jablka
      description: Opisuje ponúkanú fyzickú formu (celé ovocie, olúpané semenné miešky,
        jadrá, mrazené semenné miešky).
    pomegranate_variety:
      name: Odroda granátového jablka
      description: Identifikuje konkrétny kultivar alebo odrodu granátového jablka
        (napr. Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Štýl držiaka na cop
      description: Opisuje konkrétnu konštrukciu alebo formát držiaka na cop, aby
        si nakupujúci mohli vybrať svoj preferovaný štýl.
    popcorn_form:
      name: Forma popcornu
      description: Označuje fyzickú formu alebo formu na prípravu produktov z popcornu,
        ako sú pripravené na konzumáciu, jadrá, balenie do mikrovlnnej rúry, súprava
        korenín alebo darčeková plechovka.
    pork_rind_form:
      name: Forma bravčovej kože
      description: Kategorizuje fyzickú formu alebo štýl pochutín z bravčovej kože
        (napr. koža, oškvarky, nadýchané, pelety atď.).
    portability_features:
      name: Funkcie prenosnosti
      description: Uvádza vstavané prvky, ktoré pomáhajú pri premiestňovaní, nosení
        alebo skladovaní ležadla.
    portability_frame_type:
      name: Prenosnosť/typ rámu
      description: Či sú orchestrové zvonkohry prenosné/v štýle terénneho rámu alebo
        pevné/v štýle koncertného rámu.
    portable_electronic_game_features:
      name: Funkcie prenosných elektronických hier
      description: Kľúčové herné/hardvérové funkcie podporované zariadením.
    post_surgery_stage_suitability:
      name: Vhodnosť v pooperačnom štádiu
      description: Označuje, pre ktorú fázu rekonvalescencie (ak nejaká existuje)
        je body určené, dôležité pre nakupujúcich zdravotníckeho tvarovacieho oblečenia.
    postage_stamp_format:
      name: Formát poštovej známky
      description: Ako je štandardná známka ponúkaná/balená (jednotlivo, pár, pásik,
        blok, hárok, brožúrka, kotúč atď.).
    postmark_type:
      name: Typ poštovej pečiatky
      description: Typ znehodnotenia/pečiatky prítomnej na použitých štandardných
        známkach.
    potato_cut_style:
      name: Štýl nakrájania zemiakov
      description: Označuje fyzický spôsob nakrájania alebo prípravy zemiakov, ak
        sa nepredávajú vcelku.
    potato_intended_use:
      name: Zamýšľané použitie zemiakov
      description: Rozlišuje zemiaky určené na okamžitú konzumáciu od zemiakov určených
        ako sadivo zemiakov alebo mrazené spracované produkty.
    potato_variety:
      name: Odroda zemiakov
      description: Určuje kultivar/odrodu zemiakov, čo nakupujúcim umožňuje nájsť
        konkrétne druhy, ako napríklad „Yukon Gold“, „Maris Piper“ alebo „Purple Majesty“.
    pottery_clay_firing_required:
      name: Vyžaduje sa vypaľovanie hrnčiarskej hliny
      description: Či materiál vyžaduje vypaľovanie v peci na dosiahnutie požadovanej
        konečnej tvrdosti/povrchovej úpravy.
    pottery_slip_application_method:
      name: Metóda aplikácie hrnčiarskej liacej hmoty
      description: Určuje zamýšľanú techniku aplikácie liacej hmoty.
    pottery_slip_compatible_clay_body:
      name: Hlinené teleso kompatibilné s hrnčiarskou liacou hmotou
      description: Označuje typ(y) hlineného telesa, s ktorým je liaca hmota kompatibilná
        alebo na prácu s ktorým je určená.
    pottery_slip_form:
      name: Forma hrnčiarskej liacej hmoty
      description: Označuje, či sa liaca hmota predáva ako tekutina pripravená na
        použitie alebo ako suchá zmes/prášok vyžadujúci miešanie.
    pouch_design:
      name: Dizajn vrecka
      description: Podrobne opisuje konštrukciu alebo vylepšenia prednej časti vrecka.
    pouch_style:
      name: Štýl vrecka
      description: Určuje dizajn prednej časti vrecka s ohľadom na pohodlie, podporu
        a estetické preferencie.
    powdered_beverage_variety:
      name: Druhy nápojových zmesí v prášku
      description: Klasifikuje produkt podľa typu nápoja, ktorý sa ním pripravuje
        (napr. limonáda, športový nápoj, proteínový kokteil).
    power_rack_style:
      name: Štýl posilňovacieho stojana
      description: Určuje celkovú konštrukciu/konfiguráciu stojanu, čo nakupujúcim
        pomáha rozlišovať medzi plnými klietkami, polovičnými stojanmi a priestorovo
        úspornými variantmi.
    power_steering_fluid_formulation:
      name: Zloženie kvapaliny posilňovača riadenia
      description: Všeobecná skupina zložení kvapaliny (na báze ATF vs. špecializovaná
        hydraulická/CHF vs. univerzálna) používaná na filtrovanie s kompatibilitou
        na vysokej úrovni.
    practice_mute_audio_output:
      name: Zvukový výstup cvičného dusítka
      description: Určuje typ pripojenia zvukového výstupu na cvičnom dusítku na monitorovanie
        a/alebo nahrávanie (bežné u tichých/elektronických cvičných tlmičov).
    practice_mute_intonation_impact:
      name: Intonačný ráz cvičného dusítka
      description: Opisuje očakávaný efekt ladenia/intonácie pri použití cvičného
        dusítka.
    practice_mute_venting_valve_type:
      name: Typ ventilácie/ventilu cvičného dusítka
      description: Určuje, či a ako sa cvičné dusítko odvetráva alebo či obsahuje
        nastaviteľný ventil na zmenu odporu/hlasitosti.
    practice_pad_features:
      name: Funkcie cvičebnej podložky
      description: Vyzdvihuje funkčné vlastnosti cvičnej podložky nad rámec veľkosti/materiálu.
    practice_pad_mounting_style:
      name: Spôsob montáže cvičnej podložky
      description: Označuje, ako sa má cvičná podložka počas používania umiestniť
        alebo pripevniť.
    practice_pad_rebound_level:
      name: Úroveň odskoku cvičnej podložky
      description: Označuje relatívny odskok/odozvu cvičnej podložky v porovnaní s
        typickými blanami bubnov.
    practice_pad_surface_configuration:
      name: Konfigurácia povrchu cvičnej podložky
      description: Opisuje, či má podložka jednu alebo viacero hracích plôch a či
        sa líšia v pocite pri hre.
    pregnancy_stage_suitability:
      name: Vhodnosť pre štádium tehotenstva
      description: Označuje, pre ktoré tehotenské alebo popôrodné obdobie je odev
        určený.
    preparation_state:
      name: Stav prípravy
      description: Označuje úroveň prípravy alebo tepelnej úpravy potrebnú pred konzumáciou.
    preparation_style:
      name: Štýl prípravy
      description: Definuje stav nakrájania alebo spracovania vodných gaštanov pri
        predaji (napr. celé, nakrájané na plátky, pečené, mrazené).
    preservation_medium:
      name: Konzervačné médium
      description: Určuje primárnu tekutinu alebo médium, v ktorom sa olivy alebo
        kapary konzervujú (napr. slaný nálev, olivový olej, ocot).
    presser_foot_attachment_method:
      name: Spôsob pripevnenia prítlačnej pätky
      description: Označuje, ako sa prítlačná pätka šijacieho stroja pripevňuje k
        držiaku/stopke prítlačnej pätky (napr. zacvakávací systém vs. skrutkovací
        systém), čo ovplyvňuje kompatibilitu.
    pressure_gauge_type:
      name: Typ tlakomeru
      description: Označuje typ prípadného tlakomeru, ktorý je súčasťou balenia bicyklovej
        pumpy.
    pressure_measurement_unit:
      name: Jednotka merania tlaku
      description: Označuje jednotku použitú na odčítanie hodnoty alebo kalibráciu
        tlakového senzora, čo je užitočné na porovnávanie produktov a zabezpečenie
        kompatibility meradla/ECU.
    pressure_plate_balance_type:
      name: Druh vyváženia prítlačnej dosky
      description: Označuje, či je prítlačná doska vnútorne vyvážená alebo vyžaduje/predpokladá
        vonkajšie vyváženie zodpovedajúce nastaveniu motora/zotrvačníka.
    pressure_plate_components_included:
      name: Komponenty zahrnuté do balenia prítlačnej dosky
      description: Čo je súčasťou zoznamu balenia prítlačnej dosky.
    pressure_sensor_application:
      name: Aplikácia tlakového senzora
      description: Identifikuje systém vozidla/merací bod, pre ktorý je tlakový senzor
        určený.
    pressure_sensor_port_thread_standard:
      name: Štandard portu/závitu tlakového senzora
      description: Špecifikuje štandard mechanického portu/závitu použitého na inštaláciu
        senzora do systému vozidla.
    pressurization_method:
      name: Metóda tlakovania
      description: Identifikuje, ako sa vytvára alebo udržiava tlak vo vnútri zariadenia.
    pretend_housekeeping_set_items_included:
      name: Položky zahrnuté do upratovacej súpravy na hranie
      description: Uvádza, ktoré príslušenstvo na upratovanie je súčasťou súpravy
        (napr. mop, metla, lopatka, rozprašovač).
    pretend_play_electronic_features:
      name: Elektronické prvky rolovej hry
      description: Elektronické/interaktívne prvky zahrnuté v produkte rolovej hry.
    pretend_play_set_pieces_included:
      name: Kusy súpravy rolovej hry
      description: Kľúčové rekvizity/komponenty zahrnuté do súpravy rolovej hry (napr.
        pokladňa, hračkárske jedlo, náradie).
    pretend_play_set_theme:
      name: Téma súpravy rolovej hry
      description: Primárny scenár/téma rolovej hry, ktorú produkt predstavuje (užitočné
        pre prierezové objavovanie všetkých detí zapojených do rolovej hry).
    pretzel_coating:
      name: Povlak praclíkov
      description: Označuje akékoľvek vonkajšie okorenenie alebo povlak aplikované
        na praclík, a to pre slané (solené, okorenené) aj sladké (čokoládové, jogurtové,
        karamelové) varianty.
    pretzel_shape:
      name: Tvar praclíka
      description: Určuje fyzickú formu praclíka (napr. skrútený, tyčinka, kúsok),
        čo je kľúčový rozlišovací znak, ktorý zákazníci používajú pri vyhľadávaní
        alebo filtrovaní.
    primary_component_material:
      name: Primárny materiál komponentu
      description: Primárny materiál bloku motora.
    primary_dish_application:
      name: Primárna pokrmová aplikácia
      description: Označuje hlavný pokrm alebo prípravu, na ktoré je cesto určené.
    primary_plant_base:
      name: Primárna rastlinná báza
      description: Označuje hlavnú nemliečnu zložku (zložky) použitú (použité) na
        vytvorenie alternatívy syra.
    primary_plant_protein_source:
      name: Primárny zdroj rastlinných bielkovín
      description: Identifikuje hlavnú rastlinnú zložku, ktorá poskytuje bielkoviny
        v produkte.
    primary_sweetener_source:
      name: Primárny zdroj sladidla
      description: Identifikuje rastlinu alebo surovinu, z ktorej sa sirup získava.
    print_placement:
      name: Umiestnenie tlače
      description: Označuje, kde je na tričku umiestnená hlavná grafika/logo.
    print_technique:
      name: Technika potlače
      description: Určuje spôsob zdobenia/potlače použitý na grafike trička.
    printable_canvas_intended_use:
      name: Zamýšľané použitie potlačiteľného plátna
      description: Primárna aplikácia, pre ktorú je potlačiteľné plátno optimalizované.
    printable_fabric_format:
      name: Formát potlačiteľnej tkaniny
      description: Určuje, ako sa dodáva nažehľovacia bavlna (jednotlivé pásy vs.
        súvislý kotúč), čo ovplyvňuje podávanie do tlačiarne a pracovný postup projektu.
    prism_material:
      name: Materiál hranola
      description: Určuje materiál samotného optického prvku (hranola), ktorý ovplyvňuje
        jasnosť, trvanlivosť a odolnosť voči poškriabaniu.
    prisoner_transport_configuration:
      name: Konfigurácia prepravy väzňov
      description: Určuje, či a ako je dodávka konfigurovaná na prepravu zadržaných
        osôb/väzňov.
    prisoner_transport_partition_type:
      name: Typ priečky na prepravu väzňov
      description: Typ vnútornej priečky/klietky oddeľujúcej predný a zadný priestor.
    privacy_or_acoustic_feature:
      name: Prvok na zachovanie súkromia alebo akustický prvok
      description: Určuje zabudované prvky na zachovanie súkromia alebo akustické
        prvky, ako sú deliace panely, akustické zásteny alebo úplné kryty.
    processing_state:
      name: Stav spracovania
      description: Či je perie sterilizované/umyté alebo inak pripravené na výrobné
        použitie.
    produce_grade:
      name: Trieda plodiny
      description: Klasifikuje triedu kvality priradenú kivi na základe veľkosti,
        vzhľadu a stavu.
    produce_growth_stage:
      name: Fáza rastu plodiny
      description: Špecifikuje štádium rastu, v ktorom sa plodina predáva (napr. mikrobylinka,
        mladé lístky, zrelé lístky, živá rastlina, semeno).
    produce_washing_state:
      name: Stav umytia plodiny
      description: Označuje, či bola zelenina umytá a je pripravená na konzumáciu.
    profile_shape:
      name: Profil/tvar
      description: Celkové zakrivenie/profil činelu (ako strmo stúpa od okraja k zvonu).
    projectile_ammunition_type:
      name: Typ projektilu/munície
      description: V prípade potreby určuje typ projektilov alebo spotrebného materiálu
        používaného hračkárskou zbraňou.
    projectile_finish:
      name: Povrchová úprava projektilu
      description: Určuje akýkoľvek povrchový náter aplikovaný na BB, ktorý zvyšuje
        odolnosť proti korózii alebo viditeľnosť (napr. pomedené, pozinkované, nalakované).
    projectile_type:
      name: Typ projektilu
      description: Identifikuje druh projektilu, ktorý sa v produkte používa alebo
        pre ktorý je určený.
    pronation_support:
      name: Podpora pronácie
      description: Označuje typ chôdze alebo pronácie, pre ktorý je teniska navrhnutá.
    propellant_type:
      name: Typ pohonnej hmoty
      description: Určuje pohonnú hmotu, pre ktorú je diel alebo príslušenstvo určené.
    propeller_blade_cup:
      name: Zakrivenie listu vrtule
      description: Označuje mieru zakrivenia (zvlnenia zadnej hrany) na listoch.
    propeller_hub_type:
      name: Typ náboja vrtule
      description: Určuje systém náboja/puzdra používaný vrtuľou (vymeniteľné súpravy
        nábojov vs. zalisovaný).
    propeller_rotation:
      name: Otáčanie vrtule
      description: Určuje smer otáčania vrtule.
    protectant_formula_base:
      name: Základ zloženia ochranného prostriedku
      description: Určuje základné zloženie ochranného prostriedku, ktoré ovplyvňuje
        lesk, pocit na dotyk a čistenie (napr. na báze vody vs. na báze rozpúšťadla).
    protection_coverage_area:
      name: Oblasť pokrytia ochrany
      description: Identifikuje, ktoré časti hodiniek ochranné príslušenstvo pokrýva.
    protection_level:
      name: Úroveň ochrany
      description: Označuje zamýšľanú úroveň ochrany puzdra pri preprave a skladovaní
        prístroja.
    protective_case_interior_protection_type:
      name: Typ vnútornej ochrany ochranného puzdra
      description: Opisuje hlavnú metódu vnútornej ochrany používanú na zabezpečenie
        a tlmenie obsahu.
    protective_case_shell_type:
      name: Typ plášťa ochranného puzdra
      description: Identifikuje celkový konštrukčný štýl vonkajšej časti puzdra (tuhosť),
        ktorý ovplyvňuje ochranu pred rozdrvením a prenosnosť.
    protective_contact_padding_material:
      name: Materiál ochranného polstrovania kontaktu
      description: Materiál použitý na kontaktných bodoch prístroja (vložka jarma/zvončeka)
        na zabránenie poškriabaniu (napr. plsť, guma).
    protective_cup_configuration:
      name: Konfigurácia suspenzora
      description: Určuje, či je suspenzor súčasťou, či je odnímateľný, alebo či má
        odev iba vrecko na držanie suspenzora.
    protective_eyewear_standard_compliance:
      name: Súlad ochranných okuliarov s normami
      description: Určuje bezpečnostné normy alebo normy odolnosti voči nárazom, ktoré
        okuliare spĺňajú alebo prekonávajú pri športovom použití.
    protective_gear_certification_standard:
      name: Certifikačná norma ochranného výstroja
      description: 'Označuje bezpečnostnú/certifikačnú normu, ktorú výstroj spĺňa
        (líši sa podľa typu položky: normy pre prilby, normy pre obleky, normy pre
        nárazový pancier).'
    protective_gear_items_included:
      name: Položky ochranného výstroja v cene
      description: Uvádza jednotlivé kusy obsiahnuté vo viacdielnej sade ochranného
        výstroja.
    protective_gear_padding_type:
      name: Typ polstrovania ochranného výstroja
      description: Určuje typ polstrovania použitého v ochrannom výstroji na ochranu
        pred nárazmi.
    protective_gear_safety_certifications:
      name: Bezpečnostné certifikácie ochranného výstroja
      description: Uvádza uznávané bezpečnostné alebo výkonnostné normy špecifické
        pre daný šport, ktoré výrobok spĺňa, ako napríklad normy NOCSAE alebo ASTM
        pre prilby na pozemný hokej.
    protective_pad_components_included:
      name: Komponenty ochrannej podložky v cene
      description: Určuje, ktoré konkrétne ochranné položky sú súčasťou viacdielnej
        sady, aby nakupujúci presne vedeli, aké časti tela sú zakryté.
    protective_shorts_intended_use:
      name: Určené použitie ochranných šortiek
      description: Primárna jazdecká/pretekárska disciplína, pre ktorú sú ochranné
        šortky určené.
    protective_shorts_padding_type:
      name: Typ polstrovania ochranných šortiek
      description: Určuje konštrukciu/formát ochranných prvkov použitých v šortkách.
    protective_shorts_padding_zones:
      name: Zóny polstrovania ochranných šortiek
      description: Identifikuje, ktoré časti tela majú integrované polstrovanie/pancier
        v ochranných šortkách.
    protective_treatment:
      name: Ochranné ošetrenie
      description: Určuje akúkoľvek aplikovanú ochrannú povrchovú úpravu alebo ošetrenie
        na odolnosť voči škvrnám, vode alebo UV žiareniu (napr. Teflon).
    protector_coverage_area:
      name: Oblasť pokrytia chrániča
      description: Určuje, ktorú časť (časti) trupu má chránič pokrývať (napr. hrudník,
        chrbát, boky).
    puck_bottom_style:
      name: Štýl dna puku
      description: Opisuje spodný profil puku, ktorý ovplyvňuje rýchlosť a kontrolu
        na rôznych povrchoch shuffleboardu.
    puck_type:
      name: Typ puku
      description: Klasifikuje funkčný štýl alebo zamýšľané použitie hokejového puku,
        od oficiálnej hry až po zberateľské suveníry.
    pull_buoy_style:
      name: Štýl ťahacej bóje
      description: Označuje funkčný štýl alebo konfiguráciu ťahacej bóje, napríklad
        štandardná, členková alebo kombinovaná Pull Kick.
    pull_through_weight_material:
      name: Materiál preťahovacieho závažia
      description: V prípade preťahovacích tampónov identifikuje materiál závažia
        použitého na prevedenie tampónu cez prístroj.
    pulp_content:
      name: Obsah dužiny
      description: Označuje množstvo ovocnej alebo zeleninovej dužiny prítomnej v
        nápoji.
    pump_accessories_included:
      name: Príslušenstvo k čerpadlu v cene
      description: Uvádza doplnkové položky dodané s pumpou na lopty tak, aby nakupujúci
        pochopili obsah balíka.
    pumping_compatibility:
      name: Kompatibilita s pumpovaním
      description: Označuje, či je podprsenka na dojčenie určená na pumpovanie, ako
        aj kŕmenie bez použitia rúk.
    punch_pad_type:
      name: Typ udieracej podložky
      description: Určuje dizajn alebo štýl udieracej/tréningovej podložky, aby si
        nakupujúci mohli vybrať správnu podložku pre svoje tréningové potreby.
    punching_training_bag_shape:
      name: Tvar boxovacieho/tréningového vreca
      description: Určuje geometrický štýl ťažkého vreca, čo nakupujúcim pomáha vybrať
        si modely vhodné pre nácviky konkrétnych úderov (napr. háky, údery do tela).
    puncture_protection_technology:
      name: Technológia ochrany pred prepichnutím
      description: Uvádza všetky proprietárne alebo generické vrstvy proti prepichnutiu
        alebo technológie výstuže bočníc/plášťa zabudované do pneumatiky (napr. EXO,
        SnakeSkin, kevlarový pás).
    puppet_features:
      name: Prvky bábky
      description: Vyzdvihuje funkčné alebo výkonnostné vlastnosti bábky (napr. pohyblivé
        ústa, zvukové efekty, otáčateľnosť).
    puppet_puppet_theater_accessory_type:
      name: Typ príslušenstva pre bábky a bábkové divadielka
      description: Určuje, akým druhom príslušenstva produkt je (napr. rekvizita,
        kostým bábky, ovládacia tyč, náhradná šnúrka).
    purity_unit:
      name: Jednotka čistoty
      description: Ako sa vyjadruje čistota mince (rýdzosť vs. karát).
    push_up_bar_design:
      name: Konštrukcia podpier na kliky
      description: Označuje funkčný štýl konštrukcie podpier na kliky (napr. pevné,
        otočné, rovnobežné).
    pushrod_end_type:
      name: Typ konca tlačnej tyče
      description: Určuje štýl konca/upevnenia tlačnej tyče použitého na rozhraní
        pedálu alebo hlavného valca.
    putty_glow_activation_method:
      name: Metóda aktivácie žiarenia tmelu
      description: Ako sa tmel nabíja/aktivuje, aby žiaril (napr. slnečné svetlo,
        UV/čierne svetlo).
    putty_glow_color:
      name: Farba žiarenia tmelu
      description: Identifikuje farbu, ktorú tmel vyžaruje pri žiarení v tme.
    putty_inclusions:
      name: Prímesi tmelu
      description: Významné prísady vo vnútri tmelu (napr. trblietky, konfety, penové
        korálky).
    putty_texture:
      name: Textúra tmelu
      description: Primárne manipulačné správanie tmelu (napr. skákavý, elastický,
        tekutý).
    puzzle_accessory_features:
      name: Funkcie príslušenstva k puzzle
      description: Funkčné vlastnosti a konštrukčné prvky príslušenstva k skladačke
        (líši sa podľa typu príslušenstva).
    pyrometric_cone_range:
      name: Rozsah pyrometrického kužeľa
      description: Odporúčaný pyrometrický kužeľ (kužele), na ktorý sa má glazúra
        vypaľovať (napr. kužeľ 06–04, kužeľ 5–6).
    quarter_panel_coverage_type:
      name: Typ pokrytia štvrťového panela
      description: Určuje, aká veľká časť plochy štvrťového panela sa produktom nahrádza/opravuje.
    quarter_panel_set_contents:
      name: Obsah súpravy štvrťového panela
      description: Určuje konfiguráciu štvrťového panela zahrnutú v zozname (jednostranný,
        párový alebo s dodatočnými opravnými sekciami).
    quilting_ruler_markings:
      name: Značenie prešívacieho pravítka
      description: Určuje typy tlačených značiek na prešívacom pravítku používanom
        na rezanie/zarovnávanie.
    quilting_ruler_non_slip_feature:
      name: Protišmykový prvok prešívacieho pravítka
      description: Označuje, či pravítko obsahuje protišmykovú spodnú stranu/povrchovú
        úpravu, ktorá znižuje jeho posúvanie na tkanine.
    quilting_ruler_transparency:
      name: Priehľadnosť prešívacieho pravítka
      description: Označuje priehľadnosť/viditeľnosť materiálu pravítka pre viditeľnosť
        tkaniny a značenia pod ním.
    quilting_thread_usage:
      name: Použitie vlákna na prešívanie
      description: Označuje zamýšľanú aplikáciu prešívania pre dané vlákno (ako sa
        má použiť).
    quilting_thread_weight_system:
      name: Hmotnostný systém vlákna na prešívanie
      description: Určuje systém hodnotenia veľkosti/hmotnosti vlákna používaný na
        vyjadrenie hrúbky vlákna (napr. wt, Tex, Denier), aby sa číselná veľkosť dala
        správne interpretovať.
    quince_variety:
      name: Odroda duly
      description: Identifikuje konkrétny kultivar alebo odrodu duly, pretože chuť,
        aróma a kulinárska vhodnosť sa môžu v závislosti od odrody líšiť.
    quinoa_variety:
      name: Odroda quinoy
      description: Identifikuje konkrétnu farbu alebo odrodu quinoy, pretože rôzne
        odrody majú odlišné chute, textúry a časy varenia.
    quinto_tuning_system:
      name: Systém ladenia Quinto
      description: Ako sa ladí/napína quinto.
    race_car_class:
      name: Trieda pretekárskeho auta
      description: Súťažná trieda/kategória, pre ktorú je auto vyrobené (súbor pravidiel/homologizačná
        skupina).
    racing_balaclava_face_opening_style:
      name: Štýl otvoru na tvár pretekárskej kukly
      description: Konfigurácia otvoru na tvár v kukle, ktorá ovplyvňuje sadnutie
        prilby, jej utesnenie a pohodlie.
    racing_balaclava_neck_coverage_length:
      name: Dĺžka pokrytia krku pretekárskej kukly
      description: Dĺžka pokrytia golieru/závesu okolo krku, ktorá sa dá zastrčiť
        do obleku/fixácie krku pre utesnenie a ochranu.
    racing_balaclava_ventilation_zones:
      name: Vetracie zóny pretekárskej kukly
      description: Umiestnenie priedušných/sieťovaných alebo vetraných zón určených
        na zlepšenie prúdenia vzduchu pod prilbou.
    racing_chest_guard_intended_use:
      name: Určené použitie pretekárskeho chrániča hrudníka
      description: Primárna motoristická disciplína alebo kontext, pre ktorý je chránič
        hrudníka určený.
    racing_chest_guard_size_type:
      name: Veľkostný typ pretekárskeho chrániča hrudníka
      description: Označuje, či je produkt určený pre mládež, dospelých alebo je univerzálny/nastaviteľný.
    racing_glove_certification_standard:
      name: Norma na certifikáciu pretekárskych rukavíc
      description: Určuje bezpečnostnú certifikáciu/normu, ktorú pretekárske rukavice
        spĺňajú (napr. FIA, SFI, CE) a voliteľne aj hodnotenie/úroveň, ak je to relevantné.
    racing_goggles_lens_system:
      name: Systém šošoviek pretekárskych okuliarov
      description: Určuje systém pripravenosti na výmenu/odtrhnutie šošoviek, ktorý
        okuliare podporujú.
    racing_helmet_certification_standard:
      name: Norma na certifikáciu pretekárskej helmy
      description: Bezpečnostná(-é) certifikácia(-e), ktorú(-é) pretekárska prilba
        spĺňa.
    racing_kart_brake_type:
      name: Typ brzdy pretekárskej motokáry
      description: Typ primárneho brzdového systému namontovaného na motokáre.
    racing_kart_class:
      name: Trieda pretekárskej motokáry
      description: Súťažná trieda alebo súbor pravidiel, na spĺňanie ktorých je motokára
        skonštruovaná.
    racing_kart_frame_material:
      name: Materiál rámu pretekárskej motokáry
      description: Primárny materiál rámu/podvozku pre motokáru.
    racing_kart_seat_size:
      name: Veľkosť sedadla pretekárskej motokáry
      description: Veľkostné označenie sedadla pretekárskej motokáry použité na montáž.
    racing_neck_support_style:
      name: Štýl pretekárskej podpery krku
      description: Štrukturálny štýl pretekárskej podpery/ortézy krku a jej prepojenie
        s trupom/prilbou jazdca.
    racing_suit_certification_standard:
      name: Norma na certifikáciu pretekárskej kombinézy
      description: Určuje certifikáciu/homologizáciu pretekárskej bezpečnosti, ktorú
        oblek spĺňa (napr. normy FIA alebo SFI).
    racing_suit_cuff_design:
      name: Dizajn manžety pretekárskeho obleku
      description: Typ členkovej/zápästnej manžety používanej na spojenie s rukavicami/topánkami
        a zlepšenie utesnenia/pohodlia.
    racing_suit_size_system:
      name: Tabuľka veľkostí pre pretekárske kombinézy
      description: Systém veľkostí použitý pre oblek (napr. Alpha S-XXL, numerický
        EÚ/US, mládež).
    racing_truck_discipline:
      name: Disciplína pretekárskych nákladných áut
      description: Určuje primárnu pretekársku disciplínu/formát, na pretekanie v
        ktorom je nákladné vozidlo vyrobené.
    rack_side_configuration:
      name: Konfigurácia bočnej časti stojana
      description: Označuje, či sú na stojane rohože uložené na jednej alebo oboch
        stranách, čo ovplyvňuje efektívnosť priestoru a prístup.
    rack_system_configuration:
      name: Konfigurácia systému stojana
      description: Opisuje celkové rozloženie/tvar systému stojana na bubny.
    racket_dampener_type:
      name: Typ tlmiča rakety
      description: Určuje mechanizmus inštalácie alebo funkčný štýl tlmiča vibrácií
        rakety.
    racket_grip_size:
      name: Veľkosť gripu rakety
      description: Určuje klasifikáciu veľkosti rukoväti rakety na základe obvodu
        (napr. G1 – G6), aby sa zabezpečilo správne sadnutie na ruku a pohodlie.
    racket_sport_shoe_court_surface:
      name: Povrch kurtu pre obuv na raketové športy
      description: Určuje povrch tenisového kurtu, pre ktorý je obuv navrhnutá alebo
        optimalizovaná, čo pomáha hráčom vybrať si obuv so správnym vzorom podrážky
        a gumovou zmesou pre ich typický hrací povrch.
    racket_string_pattern:
      name: Vzor výpletu rakety
      description: Určuje počet hlavných a priečnych výpletov vo výpletovom lôžku
        (napr. 16 x 18), čo ovplyvňuje ovládanie, rotáciu a trvácnosť.
    racket_stringing_status:
      name: Stav výpletu rakety
      description: Označuje, či sa raketa predáva s výpletom, bez výpletu alebo s
        vopred realizovaným výpletom.
    racket_weight_class:
      name: Hmotnostná trieda rakety
      description: Poskytuje štandardné váhové kategórie „U“ pre bedminton, čo umožňuje
        hráčom vybrať si rakety v rámci ich preferovaného hmotnostného rozsahu.
    racquet_toy_set_equipment_included:
      name: Sada hračkárskych rakiet v cene
      description: Uvádza, aké položky sú súčasťou hračky alebo sady (napr. sieť,
        loptičky, veslá/rakety).
    racquetball_squash_training_aid_type:
      name: Typ tréningových pomôcok na raketbal a squash
      description: Klasifikuje konkrétny druh tréningovej pomôcky alebo príslušenstva,
        aby mohli nakupujúci rýchlo nájsť položku, ktorú potrebujú.
    radiator_cap_gasket_material:
      name: Materiál tesnenia uzáveru chladiča
      description: Materiál tesnenia (tesnení) použitého (použitých) na uzávere chladiča.
    radiator_cap_pressure_relief_style:
      name: Štýl uvoľnenie tlaku uzáveru chladiča
      description: Určuje spôsob uvoľnenia tlaku/odvzdušnenia/ovládania uzáveru chladiča,
        ktorý môže ovplyvniť manipuláciu, bezpečnosť a zamýšľané použitie.
    radiator_expansion_tank_cap_application:
      name: Aplikácia uzáveru chladiča/expanznej nádrže
      description: Identifikuje, či je uzáver určený pre plniace hrdlo chladiča alebo
        pre expanznú/prepadovú nádržku chladiacej kvapaliny.
    radiator_fan_control_type:
      name: Typ ovládania ventilátora chladiča
      description: Určuje spôsob ovládania/spúšťania ventilátora chladiča.
    radiator_fan_mounting_pattern:
      name: Montážny vzor ventilátora chladiča
      description: Určuje spôsob/vzor montáže použitý na pripevnenie ventilátora alebo
        zostavy ventilátora.
    radiator_fan_type:
      name: Typ ventilátora chladiča
      description: Určuje funkčný typ/konfiguráciu zostavy ventilátora chladiča.
    radiator_hose_end_type:
      name: Typ konca hadice chladiča
      description: Určuje primárny štýl pripojenia/tesnenia použitý na konci (koncoch)
        hadice (hadíc) chladiča na prepojenie s portmi chladiča/motora.
    radiator_hose_position:
      name: Poloha hadice chladiča
      description: Funkčná poloha/typ hadice chladiča v chladiacom systéme.
    radiator_hose_shape:
      name: Tvar hadice chladiča
      description: Celková geometria/formát hadice použitý na smerovanie inštalácie
        a montáž.
    radiator_overflow_tank_level_sensor_provision:
      name: Vybavenie senzorom hladiny v prepadovej nádrži chladiča
      description: Označuje, či nádrž obsahuje alebo podporuje senzor hladiny chladiacej
        kvapaliny.
    radiator_overflow_tank_shape:
      name: Tvar prepadovej nádrže radiátora
      description: Celkový formát telesa prepadovej nádrže.
    radish_variety:
      name: Odroda reďkovky
      description: Určuje kultivar alebo typ reďkovky, aby si nakupujúci mohli vybrať
        konkrétnu príchuť, farbu alebo veľkosť (napr. Daikon, Vodný melón, Francúzske
        raňajky).
    radius_of_hollow:
      name: Polomer jamky
      description: Určuje profil jamky čepele vytvorený brúskou, vyjadrený ako bežné
        diskrétne veľkosti alebo plocha.
    rail_coverage_configuration:
      name: Konfigurácia pokrytia ohrádky
      description: Označuje, ktorú(-é) časť(-i) postieľky krycia sada chráni, a objasňuje,
        či nákup zahŕňa jeden predný panel alebo viacdielnu obvodovú sadu.
    rail_mount_standard:
      name: Štandardná montáž na držiak
      description: Identifikuje štandard držiaka alebo montážneho rozhrania používaného
        na pripevnenie príslušenstva (napr. mieridiel, baterky) k BB zbrani.
    rail_side:
      name: Strana držiaka
      description: Označuje, či je náhradný držiak určený pre ľavú stranu, pravú stranu
        alebo sa predáva ako pár.
    rail_style:
      name: Štýl držiaka
      description: Kategorizuje celkovú konštrukciu alebo konfiguráciu držiaka (napr.
        A-rám, dúha, zalomený), čo určuje možnosti trikov a potrebný priestor.
    rail_system:
      name: Systém držiaka
      description: Identifikuje rozhranie pre montáž príslušenstva na zbrani (napr.
        Picatinny, M-LOK).
    rain_sensor_technology:
      name: Technológia dažďového snímača
      description: Princíp snímania používaný na detekciu vody na čelnom skle.
    rain_suit_configuration:
      name: Konfigurácia obleku do dažďa
      description: Identifikuje, či je výrobok jednodielna kombinéza, viacdielna súprava
        alebo iná konfigurácia.
    rainstick_construction_type:
      name: Typ konštrukcie dažďovej palice
      description: Opisuje, ako je dažďová palica skonštruovaná (tradičná kaktusová/drevená
        trubica verzus moderné alternatívy).
    rainstick_fill_material:
      name: Výplňový materiál dažďovej palice
      description: Určuje vnútornú výplň použitú na vytvorenie kaskádovitého zvuku
        (napr. semienka, korálky).
    rainstick_playing_technique:
      name: Technika hry na dažďovú palicu
      description: Označuje odporúčanú(-é) techniku(-y) hry alebo štýl manipulácie
        používaný na dosiahnutie zamýšľaného efektu na dažďovej palici.
    rainstick_sound_character:
      name: Zvukový charakter dažďovej palice
      description: Opisuje celkový zvukový charakter produkovaný dažďovou palicou.
    raising_method:
      name: Metóda chovu
      description: Opisuje, ako boli zvieratá chované a vykŕmené pred spracovaním
        (napr. kŕmené trávou, chované na pastvinách, vykŕmené na obilnine).
    rally_competition_class:
      name: Trieda rally súťaží
      description: Trieda sankčného orgánu alebo súboru pravidiel, podľa ktorých je
        rally vozidlo vyrobené (ak je známe).
    rally_surface_setup:
      name: Konfigurácia povrchu rally
      description: Primárny povrch/terén, pre ktoré je určená konfigurácia alebo konštrukcia
        rally auta.
    ramp_surface_texture:
      name: Textúra povrchu rampy
      description: Opisuje povrchovú úpravu alebo úroveň priľnavosti jazdného povrchu
        rampy.
    ratchet_mounting_style:
      name: Typ montáže račne
      description: Ako sa rapkáč drží alebo upevňuje počas hry alebo nastavenia.
    rattle_element_material:
      name: Materiál hrkajúceho prvku
      description: Materiál hrkajúcich prvkov (napr. zuby/zvončeky/korálky), ktoré
        vytvárajú charakteristické bzučanie/hrkanie.
    rattle_type:
      name: Typ hrkálky
      description: Označuje, či návnada obsahuje vnútornú hrkálku alebo zvukovú komoru,
        a ak áno, štýl použitej hrkálky.
    rc_airship_lifting_gas_type:
      name: Typ nosného plynu diaľkovo ovládanej vzducholode
      description: Označuje, akým plynom má byť obal vzducholode/hliadkového balóna
        naplnený (ak je to relevantné).
    rc_helicopter_control_frequency:
      name: Frekvencia ovládania diaľkovo ovládaného vrtuľníka
      description: Rádiové frekvenčné pásmo používané medzi ovládačom a vrtuľníkom,
        ktoré ovplyvňuje odolnosť voči rušeniu a kompatibilitu (napr. 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Stabilizačné funkcie diaľkovo ovládaného vrtuľníka
      description: Uvádza funkcie podpory stability/ovládania, ktoré uľahčujú let
        alebo zvyšujú možnosti.
    rc_motorcycle_controller_type:
      name: Typ ovládača pretekárskeho motocykla
      description: Formát priloženého ovládača.
    rc_plane_takeoff_launch_method:
      name: Metóda vzletu/vypustenia diaľkovo ovládaného lietadla
      description: Ako sa lietadlo typicky vypúšťa/vzlieta, čo má vplyv na to, kde
        a ako sa môže používať.
    rc_vehicle_controller_type:
      name: Typ ovládača diaľkovo ovládaného vozidla
      description: Určuje formát ovládača používaného na ovládanie diaľkovo ovládaného
        vozidla.
    rc_vehicle_scale:
      name: Mierka pretekárskeho autíčka
      description: Určuje pomer mierky (triedu veľkosti) diaľkovo ovládaného auta/nákladného
        auta (napr. 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Typ diaľkovo ovládaného vozidla z hľadiska terénu
      description: Označuje primárny terén, pre ktorý je diaľkovo ovládané auto/nákladné
        auto určené.
    reach_adjustment_type:
      name: Typ nastavenia dosahu
      description: Označuje, či je možné nastaviť vzdialenosť medzi lopatkou páky
        a riadidlami, a ak je nastaviteľná, či je nastavenie bez použitia náradia
        alebo si ho vyžaduje.
    rear_axle_spacing:
      name: Rozstup zadnej osky
      description: Veľkosť pätky/osky, s ktorou je kompatibilná zadná časť rámu, čo
        ovplyvňuje kompatibilitu s kolesami.
    rear_axle_standard:
      name: Štandardná zadná oska
      description: Definuje rozhranie/formát osky používaný zadným kolesom (napr.
        rýchle uvoľnenie, rôzne veľkosti priechodnej osi).
    rear_axle_type:
      name: Typ zadnej osky
      description: Určuje upevňovací systém a priemer osky použité na upevnenie zadného
        kolesa k rámu.
    rear_coverage:
      name: Zadné krytie
      description: Určuje, akú časť zadku zakrýva spodný diel bikín (napr. drzý, plný).
    rear_opening_type:
      name: Typ otvárania zozadu
      description: Opisuje štýl zadného prístupu alebo funkciu „chlopne na zadku“
        pre pohodlné používanie kúpeľne, ako napríklad sklopné sedadlo alebo zips
        na celej zadnej strane.
    rear_seat_configuration:
      name: Konfigurácia zadných sedadiel
      description: Určuje konfiguráciu zostavy zadných sedadiel pre podporu montáže
        a výber rozloženia interiéru.
    rear_view_mirror_ornament_attachment_type:
      name: Typ upevnenia ozdoby spätného zrkadla
      description: Určuje, ako sa ozdoba pripevňuje k drieku alebo telesu spätného
        zrkadla (napr. šnúrová slučka, spona, háčik).
    rearview_mirror_mount_attachment_type:
      name: Typ upevnenia spätného zrkadla
      description: Definuje, ako sa držiak fyzicky pripevňuje k zostave spätného zrkadla
        (teleso alebo driek zrkadla), napríklad svorkou, sponou, popruhom, lepiacou
        podložkou alebo skrutkovou konzolou.
    rebound_board_face_type:
      name: Typ čelnej plochy odrazovej dosky
      description: Opisuje konfiguráciu povrchu, ktorá určuje správanie pri odraze,
        ako napríklad plochý, šikmý alebo prevedenia s viacerými konfiguráciami povrchu.
    rebound_level:
      name: Úroveň odrazu
      description: Označuje, o koľko sa loptička wall ball po náraze odrazí späť,
        čo pomáha používateľom vybrať si medzi prevedeniami s nulovým a miernym odrazom.
    rebound_surface_configuration:
      name: Konfigurácia odrazovej plochy
      description: Určuje rozloženie odrazových plôch a predvídateľnosť odrazov (jednostranné,
        obojstranné alebo viacstranné; predvídateľné vs. nepredvídateľné).
    rebounder_design:
      name: Dizajn trampolíny
      description: Definuje štrukturálny štýl alebo konfiguráciu odrazovej plochy
        produktu.
    rebounder_design_type:
      name: Typ konštrukcie odrazovej siete
      description: Určuje primárny mechanizmus odrazu alebo konštrukčný štýl trenažéra
        (napr. základňa z elastickej šnúry, rámová sieť, vyskakovací terč).
    rebounder_sides:
      name: Strany odrazovej siete
      description: Označuje, či odrazová sieť dokáže vracať lopty z jednej alebo z
        oboch strán.
    rebounding_mechanism_type:
      name: Typ trampolínového mechanizmu
      description: Určuje technológiu používanú na vracanie puku alebo lopty (napr.
        gumený nárazník, bungee šnúra).
    recipient_relationship:
      name: Vzťah príjemcu
      description: Zamýšľaný vzťah príjemcu (napr. mama, otec, priateľ) pre pohľadnicu
        s blahoželaním.
    recliner_control_type:
      name: Typ ovládania polohovacieho kresla
      description: Určuje, ako sa ovláda mechanizmus sklápania (napr. manuálna páka,
        elektrický panel s tlačidlami, diaľkové ovládanie).
    recliner_motion_type:
      name: Typ pohybu polohovacieho kresla
      description: Definuje primárnu možnosť pohybu polohovacieho kresla (napr. hojdacie,
        posuvné, otáčacie, relaxačné, zdvíhacie).
    reclining_mechanism:
      name: Sklápací mechanizmus
      description: Určuje mechanizmus používaný na ovládanie sklápacej funkcie pohovky.
    recommended_candle_format:
      name: Odporúčaný formát sviečky
      description: Označuje odporúčaný(-é) formát(-y) sviečok, pre ktoré sú tieto
        samolepiace knôty na výrobu sviečok určené.
    recommended_container_type:
      name: Odporúčaný typ nádoby
      description: Materiály nádoby, ktoré sú odporúčané/bezpečné pre gélové voskové
        sviečky.
    recommended_fabric_type:
      name: Odporúčaný typ látky
      description: Odporúčaná(-é) tkanina(-y) na dosiahnutie najlepších výsledkov
        so strihom na šitie.
    recommended_fabric_weight:
      name: Odporúčaná hmotnosť tkaniny
      description: Označuje odporúčanú hmotnostnú kategóriu tkaniny pre daný strih.
    recommended_food_pairing:
      name: Odporúčané párovanie s jedlom
      description: Identifikuje primárne bielkoviny alebo pokrmy, pre ktoré je omáčka
        určená (napr. kuracie, bravčové, hovädzie, rybie, zelenina).
    recommended_lane_condition:
      name: Odporúčaný stav dráhy
      description: Označuje vzorec oleja alebo stav dráhy, pre ktoré je guľa určená.
    recommended_motor_impulse_class:
      name: Odporúčaná trieda impulzu motora
      description: Určuje odporúčanú triedu impulzu motora modelárskej rakety pre
        bezpečný/optimálny let.
    recommended_reading_level:
      name: Odporúčaná úroveň čítania
      description: Označuje odporúčanú úroveň/schopnosť čítania pre produkt, aby sa
        pomohlo nakupujúcim usúdiť, či zodpovedá aktuálnemu čitateľskému vývoju dieťaťa.
    recommended_sleep_position:
      name: Odporúčaná poloha pri spánku
      description: Identifikuje, na pohodlnú podporu ktorých polôh pri spánku je matrac
        určený (napr. spanie na boku alebo na chrbte).
    recommended_storage:
      name: Odporúčané skladovanie
      description: Označuje, ako by sa mal výrobok skladovať, aby sa zachovala jeho
        čerstvosť.
    recommended_surfaces:
      name: Odporúčané povrchy
      description: Určuje zamýšľané adhézne povrchy/kategórie materiálov pre lepidlo
        nad rámec všeobecnej výrobnej kompatibility (napr. iba papier verzus viaceré
        druhy povrchov).
    recommended_use_case:
      name: Odporúčaný kryt na použitie
      description: Primárny zamýšľaný scenár použitia tmelu (dočasná/núdzová vs. dlhodobá
        oprava).
    recommended_use_location:
      name: Odporúčané miesto použitia
      description: Určené prostredie pre hojdačku (dvor pri dome vs. komerčné ihrisko
        atď.).
    recommended_vehicle_surfaces:
      name: Odporúčané povrchy vozidiel
      description: Určuje povrchy/povrchové úpravy vozidiel, na ktorých sa kefa môže
        bezpečne používať (napr. číry lak, matný/saténový lak, vinylová fólia/PPF,
        sklo, kolesá).
    recorder_accessories_included:
      name: Príslušenstvo k zobcovej flaute v cene
      description: Uvádza príslušenstvo, ktoré je súčasťou balenia veľkej basovej
        zobcovej flauty.
    recorder_bore_design:
      name: Dizajn otvoru zobcovej flauty
      description: Dizajn profilu vnútorného otvoru telesa zobcovej flauty.
    recorder_bore_type:
      name: Typ otvoru zobcovej flauty
      description: Určuje štýl otvoru zobcovej flauty.
    recorder_case_shell_type:
      name: Typ plášťa zobcovej flauty
      description: Opisuje štrukturálnu pevnosť plášťa.
    recorder_finish:
      name: Povrchová úprava zobcovej flauty
      description: Povrchová úprava/ošetrenie telesa zobcovej flauty (zvlášť dôležité
        pre drevené altové zobcové flauty).
    recorder_hole_type:
      name: Typ otvorov zobcovej flauty
      description: Či sú tónové otvory jednoduché (bez dvojitých otvorov) alebo zahŕňajú
        dvojité otvory pre vylepšené chromatické prstoklady.
    recorder_joint_configuration:
      name: Konfigurácia kĺbu zobcovej flauty
      description: Opisuje, koľko častí telesa má zobcová flauta, čo ovplyvňuje prenosnosť,
        čistenie a výmenu dielov.
    recorder_joint_style:
      name: Štýl kĺbu zobcovej flauty
      description: Štýl kĺbu/prepojenia medzi časťami zobcovej flauty, ak je to relevantné.
    recorder_keywork:
      name: Klapky zobcovej flauty
      description: Označuje, či zobcová flauta zahŕňa klapku(-y) (kovový/plastový
        mechanizmus) pre nízke tóny, typické pre tenorové/basové/veľké zobcové flauty.
    recorder_mouthpiece_type:
      name: Typ náustku zobcovej flauty
      description: Opisuje, či je náustok/hlavica zobcovej flauty integrovaná (jeden
        kus) alebo odnímateľná/vymeniteľná.
    recorder_pitch_standard_a4:
      name: Norma výšky tónu zobcovej flauty (A4)
      description: Označuje referenčnú výšku tónu, pre ktorú je zobcová flauta vyrobená
        (napr. moderná výška tónu A = 440 Hz vs. baroková výška tónu A = 415 Hz).
    recorder_thumb_hole_type:
      name: Typ otvoru pre palec zobcovej flauty
      description: Určuje, či má zobcová flauta konštrukciu s jedným alebo dvoma otvormi
        na palec.
    recreational_vehicle_holding_tank_type:
      name: Typ zbernej nádrže pre rekreačné vozidlá
      description: Označuje, ktorými nádržami na zber odpadu je vybavené rekreačné
        vozidlo.
    recreational_vehicle_leveling_system:
      name: Systém vyrovnávania rekreačného vozidla
      description: Typ nainštalovaného vyrovnávacieho/stabilizačného systému.
    recycled_material_content:
      name: Obsah recyklovaného materiálu
      description: Označuje podiel odevu vyrobeného z recyklovaných vlákien alebo
        priadzí.
    reed_dent_material:
      name: Materiál zubov brda
      description: Materiál zubov brda (prvky, ktoré oddeľujú osnovné nite), ktorý
        ovplyvňuje trvanlivosť a oder priadze.
    reed_type:
      name: Typ jazýčka
      description: Určuje typ konštrukcie jazýčka používaného na melodickej a bourdonovej
        píšťale gájd.
    reeds_included:
      name: Jazýčky v cene
      description: Určuje, ktoré jazýčky sú súčasťou súpravy škótskych gájd (melodická
        a/alebo bourdonová píšťala) a či sú z trstiny alebo syntetické.
    reefing_method:
      name: Metóda krátenia plachty
      description: Označuje mechanizmus (ak existuje) na stiahnutie alebo zloženie
        plachty počas plavby.
    reel_profile:
      name: Profil navijaka
      description: Klasifikuje štrukturálny štýl/profil tela navijaka na nahadzovanie
        návnady.
    reel_seat_material:
      name: Materiál sedla navijaka
      description: Určuje konštrukčný materiál sedla navijaka, ktorý ovplyvňuje hmotnosť,
        citlivosť a odolnosť voči korózii.
    reel_seat_type:
      name: Typ sedla navijaka
      description: Určuje štýl zaisťovacieho mechanizmu, ktorým sa upevňuje muškársky
        navijak k prútu.
    reel_size_class:
      name: Trieda veľkosti navijaka
      description: Výrobcom určená veľkosť (napr. 1000, 3000, 5000), ktorá udáva kapacitu
        cievky a celkovú konštrukciu cievky.
    referee_wallet_accessories_included:
      name: Príslušenstvo peňaženky pre rozhodcov v cene
      description: Uvádza extra položky, ktoré sú súčasťou balenia rozhodcovskej peňaženky,
        ako sú červené/žlté karty, výsledkové hárky alebo písacie potreby, aby nakupujúci
        vedeli, či sa peňaženka predáva ako kompletná súprava.
    refinement_level:
      name: Úroveň rafinácie
      description: Označuje stupeň rafinácie, ktorému bol olej podrobený a ktorý ovplyvňuje
        chuť, farbu, nutričné hodnoty a dymový bod.
    reflective_finish:
      name: Reflexná povrchová úprava
      description: Určuje ošetrenie reflexného povrchu diskotékovej gule (napr. zrkadlová
        dlaždica vs. holografické/dúhové efekty).
    reflective_or_glow_effect:
      name: Reflexný alebo žiariaci efekt
      description: Označuje, či má ozdobná koncovka na anténu efekty viditeľnosti,
        ako je reflexný materiál, prvky žiarenia v tme alebo svetelné/LED prvky.
    reflective_tape_pattern:
      name: Vzor reflexnej pásky
      description: Opisuje konfiguráciu reflexnej pásky na odeve používanej na splnenie
        požiadaviek na viditeľnosť.
    regulation_standard:
      name: Regulačná norma
      description: Určuje oficiálnu normu alebo certifikáciu/rozmery riadiaceho orgánu,
        ktoré sieť spĺňa.
    regulator_diaphragm_material:
      name: Materiál membrány regulátora
      description: Určuje materiál membrány, ktorý ovplyvňuje kompatibilitu s palivom/etanolom
        (napr. E85) a životnosť.
    regulator_port_thread_standard:
      name: Norma závitu portu regulátora
      description: Určuje normu závitu/pripojenia portu použitú na telese regulátora
        pre vstupné/výstupné/spätné porty.
    rein_features:
      name: Funkcie uzdy
      description: Vyzdvihuje špeciálne funkčné alebo bezpečnostné prvky, ktoré sú
        na opratách prítomné.
    rein_style:
      name: Štýl oprát
      description: Identifikuje konštrukčný dizajn alebo konfiguráciu oprát, čo jazdcom
        umožňuje vybrať si správny typ z hľadiska ich disciplíny a osobných preferencií.
    reinforced_areas:
      name: Spevnené miesta
      description: Identifikuje, ktoré časti odevu sú vystužené pre odolnosť voči
        oderu.
    reinforcement_type:
      name: Typ výstuže
      description: Konštrukčná výstuž použitá v hadici chladiča pre pevnosť a odolnosť
        voči teplote/tlaku.
    release_activation_method:
      name: Metóda aktivácie uvoľnenia
      description: Určuje, ako lukostrelec spúšťa lukostrelecké vypúšťače tetivy.
    release_bearing_material:
      name: Materiál vypínacieho ložiska spojky
      description: Primárny materiál ložiskových/čelných komponentov (ak je to špecifikované
        výrobcom).
    release_jaw_style:
      name: Štýl uvoľňovacej čeľuste
      description: Opisuje konštrukciu čeľustí alebo háku uvoľňovacej hlavy.
    release_strap_type:
      name: Typ uvoľňovacieho popruhu
      description: Identifikuje popruh alebo systém pripojenia. dodané s lukostreleckým
        vypúšťačom tetivy.
    remote_control_airship_envelope_material:
      name: Materiál obalu vzducholode na diaľkové ovládanie
      description: Špecifikuje primárny materiál obalu vyhliadkového balóna/vzducholode
        (plynový vak) odlišný od celkového materiálu hračky.
    remote_control_motorcycle_scale:
      name: Mierka motocykla na diaľkové ovládanie
      description: Mierka motocykla na diaľkové ovládanie v porovnaní so skutočným
        motocyklom (ak je modelovaný ako mierkové vozidlo).
    remote_control_motorcycle_terrain_suitability:
      name: Vhodnosť motocykla na diaľkové ovládanie do terénu
      description: Primárny terén, na ktorý je motocykel na diaľkové ovládanie určený.
    remote_control_motorcycle_water_resistance:
      name: Odolnosť motocykla na diaľkové ovládanie proti vode
      description: Úroveň ochrany elektroniky motocykla na diaľkové ovládanie pred
        vodou.
    remote_control_plane_kit_completion_level:
      name: Úroveň kompletnosti súpravy lietadla na diaľkové ovládanie
      description: Označuje, čo je súčasťou balenia a aká kompletná je sada (napr.
        Pripravené na let verzus vyžaduje samostatný vysielač/prijímač/batériu).
    remote_control_plane_landing_gear_type:
      name: Typ podvozku lietadla na diaľkové ovládanie
      description: Označuje konfiguráciu podvozku, ktorá ovplyvňuje odolnosť a vzletové/pristávacie
        plochy.
    remote_control_plane_power_type:
      name: Typ napájania lietadla na diaľkové ovládanie
      description: Určuje, ako je lietadlo poháňané (elektrické vs. žeraviace/plynové/nitro),
        čo ovplyvňuje údržbu, hluk a to, kde sa s ním dá lietať.
    remote_control_watercraft_features:
      name: Prvky plavidla na diaľkové ovládanie
      description: Vyzdvihuje kľúčové prvky špecifické pre plavidlá na diaľkové ovládanie,
        ktoré ovplyvňujú použiteľnosť a odolnosť.
    remote_control_watercraft_propulsion_drive_type:
      name: Typ pohonu plavidla na diaľkové ovládanie
      description: Určuje, ako sa plavidlo na diaľkové ovládanie poháňa vo vode.
    remote_control_watercraft_water_environment:
      name: Vodné prostredie plavidla na diaľkové ovládanie
      description: Označuje určené vodné podmienky, v ktorých plavidlo na diaľkové
        ovládanie podáva najlepší výkon.
    remote_keyless_system_programming_method:
      name: Metóda programovania diaľkového bezkľúčového systému
      description: Ako je diaľkový ovládač/systém naprogramovaný alebo spárovaný s
        vozidlom (napr. palubný postup verzus profesionálny nástroj).
    repair_compound_type:
      name: Typ opravnej hmoty
      description: Typ/zloženie použitého spotrebného opravného materiálu (napr. typ
        tmelu na opravu karosérie, typ živice na čelné sklo, typ cementu/tmelu na
        zátky pneumatík).
    repair_kit_components:
      name: Komponenty opravárskej súpravy
      description: Uvádza konkrétne položky zahrnuté do opravárskej súpravy, čo nakupujúcim
        umožňuje porozumieť obsahu a porovnať balíky.
    repair_method:
      name: Metóda opravy
      description: Určuje primárny prístup k oprave, ktorý sa so súpravou používa,
        ako napríklad samolepiace záplaty alebo výmena ventilu.
    replacement_part_purpose:
      name: Účel náhradných dielov
      description: Označuje, či ide o náhradný diel OEM, diel na vylepšenie/výkonnostný
        diel alebo doplnok.
    replacement_part_type:
      name: Typ náhradného dielu
      description: Identifikuje funkčnú kategóriu dielu eliptického trenažéra, čo
        nakupujúcim umožňuje vyfiltrovať komponent, ktorý potrebujú.
    replacement_parts_availability:
      name: Dostupnosť náhradných dielov
      description: Označuje, či sú pre navliekač podporované spotrebné/vymeniteľné
        diely (napr. náhradné háčiky/drôty).
    replica_gun_action_type:
      name: Typ mechanizmu repliky zbrane
      description: Určuje typ ovládania/fungovania repliky strelnej zbrane (ako je
        znázornené), napríklad opakovací alebo pákový.
    replica_gun_firing_mechanism:
      name: Mechanizmus streľby repliky zbrane
      description: Označuje, či a ako replika simuluje streľbu/funkciu (nesmrtiace),
        ako napríklad vystreľovanie zátky alebo nestrieľanie.
    replica_gun_moving_parts:
      name: Pohyblivé časti repliky zbrane
      description: Označuje, ktoré časti sú na replike funkčné/pohyblivé.
    reservoir_orientation:
      name: Orientácia nádržky
      description: Určuje zamýšľanú orientáciu alebo profil vaku vo vnútri batohu.
    reservoir_type:
      name: Typ nádržky
      description: Typ konfigurácie nádržky pre hlavný valec spojky.
    resin_suitability:
      name: Vhodnosť živice
      description: Určuje, či je hádzanárska lopta určená na použitie so živicou (lepidlom)
        alebo je bez živice.
    resistance_adjustability:
      name: Nastaviteľnosť odporu
      description: Určuje, či môže používateľ zmeniť odpor pri dýchaní.
    resistance_band_design:
      name: Dizajn odporového pásu
      description: Opisuje fyzickú formu alebo štýl odporového pásu (napr. slučka,
        trubica s rukoväťami, osmička), čo nakupujúcim pomáha vybrať si správny dizajn
        pre ich cvičebnú rutinu.
    resistance_loading_type:
      name: Typ pridania odporu
      description: Označuje, ako sa na posilňovacom stojane poskytne alebo pridá odpor/záťaž
        (napr. závažia v podobe platní alebo závažia s voliteľnou záťažou).
    response_fields_included:
      name: Zahrnuté polia na odpoveď
      description: Určuje, ktoré štandardné polia/možnosti odpovede sú prítomné na
        karte s odpoveďou (napr. prijať/odmietnuť, výber jedla).
    restoration_status:
      name: Stav obnovy
      description: Označuje, či je dodávka originálna, zreštaurovaná, restomod alebo
        v projektovom stave.
    rhinestone_base_color_family:
      name: Skupina farieb na báze kamienkov
      description: Identifikuje skupinu farieb na báze kamienkov (napr. číra/krištáľová,
        zlatá/žltá, modrá).
    rhinestone_facet_style:
      name: Štýl fazety kamienka
      description: Vzor čela/fazety kamienka ovplyvňujúci trblietanie a vzhľad (napr.
        Xilion rose, briliantový rez, fazetovaný verzus hladký).
    rhinestone_hole_reinforcement_material:
      name: Materiál na výstuž otvorov kamienkov
      description: Materiál okolo/pri otvoroch (napr. kovová priechodka, tvarovaný
        plast) ovplyvňujúci trvanlivosť počas šitia.
    rhinestone_setting_type:
      name: Typ nastavenia kamienka
      description: Ako je kamienok pripevnený/lemovaný na šitie (napr. nastavenie
        hrotu, nastavenie rámčeka, lemované nastavenie).
    rhubarb_product_cut_type:
      name: Typ nakrájania rebarborového produktu
      description: Opisuje fyzickú prípravu alebo nakrájanie rebarborového produktu.
    ribbon_construction:
      name: Konštrukcia stuhy
      description: Opisuje kľúčové konštrukčné prvky rypsovej stuhy, ako napríklad
        to, či je drôtená alebo elastická, čím sa mení jej použitie (napr. mašle verzus
        šitie).
    ribbon_packaging_type:
      name: Typ balenie stuhy
      description: Označuje, ako sa stuha dodáva/predáva.
    ribbon_pattern_style:
      name: Štýl vzoru stuhy
      description: Klasifikuje metódu aplikácie vzoru bežne používanú na rypsovej
        stuhe.
    ribbon_sheen_level:
      name: Úroveň lesku stuhy
      description: Označuje vizuálny lesk povrchu saténovej stuhy.
    ribbon_style:
      name: Štýl stuhy
      description: Určuje vizuálny vzor/štýl stuhy (napr. jednofarebná, pruhovaná,
        trojfarebná).
    ribbon_trim_backing_type:
      name: Typ podkladu stuhy/lemu
      description: Označuje, či má stuha/lem podklad a aký (pre jednoduchú aplikáciu).
    ribbon_trim_edge_finish:
      name: Povrchová úprava okraja stuhy/lemu
      description: Opisuje konštrukciu/povrchovú úpravu okraja stuhy/lemu (užitočné
        pre strapkanie a zamýšľané použitie).
    ric_rac_wave_size:
      name: Veľkosť vlnky Ric-rac
      description: Opisuje amplitúdu/mierku vlnky ric-rac (aké veľké sú cikcaky/vlnky).
    rice_grain_length:
      name: Dĺžka zrna ryže
      description: Klasifikuje ryžové produkty podľa dĺžky zrna, napríklad krátke,
        stredné alebo dlhé zrno, čo ovplyvňuje varné vlastnosti a kulinárske využitie.
    rice_processing_method:
      name: Metóda spracovania ryže
      description: Opisuje, ako bola ryža spracovaná alebo pripravená (napr. predvarená,
        naklíčená, vločky), čo má vplyv na čas varenia, nutričné hodnoty a použitie.
    rice_variety:
      name: Druh ryže
      description: Určuje konkrétnu odrodu alebo kultivar ryže, čo nakupujúcim umožňuje
        vybrať si zrná s preferovanou chuťou, arómou, textúrou a na zamýšľané kulinárske
        využitie.
    riding_toy_features:
      name: Funkcie jazdných hračiek
      description: Vyzdvihuje bežné funkčné/bezpečnostné prvky špecifické pre jazdné
        hračky.
    rifle_action_type:
      name: Typ mechanizmu pušky
      description: Ovládací mechanizmus pušky (spôsob nabíjania/strieľania/vyhadzovania
        nábojov), čo je dôležité pre identifikáciu a záujem zberateľov.
    rifle_finish:
      name: Povrchová úprava pušky
      description: Primárna vonkajšia povrchová úprava/náter kovových konštrukcií.
    rifle_magazine_type:
      name: Typ zásobníka pušky
      description: Typ podávacieho systému pre pušku.
    rifle_stock_material:
      name: Materiál pažby pušky
      description: Primárny materiál použitý na pažbu/vybavenie pušky (napr. orech,
        polymér).
    rim_clamping_method:
      name: Metóda upnutia ráfika
      description: Ako stroj zaisťuje koleso/ráfik počas montáže a demontáže.
    rim_strip_type:
      name: Typ pásu ráfika
      description: Klasifikuje pásik/pásku podľa štýlu, konštrukcie alebo špecifickej
        aplikácie (napr. páska na bezdušový ráfik vs. ochranný gumený pásik).
    rim_tubeless_compatibility:
      name: Kompatibilita s bezdušovými pneumatikami
      description: Označuje, či sú ráfik, páska alebo koleso určené pre inštaláciu
        s bezdušovými pneumatikami.
    ripeness_stage:
      name: Fáza zrelosti
      description: Označuje stupeň zrelosti ovocia v čase predaja (napr. nezrelé,
        zrelé, pripravené na konzumáciu).
    riser_pad_type:
      name: Typ podložky
      description: Klasifikuje funkčný štýl podložky (napr. štandardná rozpera, tlmiaca
        nárazy, šikmý klin).
    roasted_malt_processing_type:
      name: Typ spracovania praženého sladu
      description: Špecifický spôsob spracovania alebo variant použitý na vytvorenie
        praženého sladu alebo praženého zrna (napr. nesladový pražený jačmeň, čierny
        slad, variant zbavený horkosti alebo ošúpaný variant).
    robotic_toy_interaction_mode:
      name: Režim interakcie robotickej hračky
      description: Opisuje primárny spôsob interakcie robota alebo jeho pohybu počas
        hry.
    robotic_toy_light_features:
      name: Vlastnosti osvetlenia robotickej hračky
      description: Označuje, či a ako hračka používa svetlá ako súčasť hry (napr.
        LED diódy, projekcia).
    robotic_toy_programming_supported:
      name: Podporované programovanie robotickej hračky
      description: Určuje, aký programovací prístup, ak vôbec nejaký, hračka podporuje.
    robotic_toy_skill_level:
      name: Úroveň zručnosti robotickej hračky
      description: Označuje úroveň zložitosti ovládania/programovania očakávanú od
        používateľa.
    robotic_toy_sound_features:
      name: Zvukové funkcie robotickej hračky
      description: Označuje zvukové schopnosti robotickej hračky.
    rod_butt_style:
      name: Štýl koncovky prúta
      description: Definuje konfiguráciu koncovky prúta používanú pri aplikáciách
        rybárčenia na vlečenú návnadu.
    rod_construction_type:
      name: Typ konštrukcie tyče
      description: Označuje celkový štýl konštrukcie prútu z hľadiska kusov a skladateľnosti.
    rod_guide_material:
      name: Materiál vodiacich prvkov prúta
      description: Určuje materiál použitý na výrobu vodiacich očiek alebo vložiek
        rybárskeho prúta, čo ovplyvňuje odolnosť, hmotnosť a trenie vlasca.
    rod_guide_type:
      name: Typ vodiacich prvkov prúta
      description: Určuje primárny štýl vodiacich očiek nainštalovaných na prúte.
    rod_handle_type:
      name: Typ rukoväte tyče
      description: Určuje konfiguráciu úchopu rybárskeho prúta, čo napomáha pohodliu
        a výberu techniky.
    roll_cage_tubing_material:
      name: Materiál rúrok ochrannej klietky
      description: Určuje materiál/zliatinu rúrok použitú na ochrannú klietku/priečny
        stabilizátor (napr. oceľ DOM vs. chróm-molybdenová oceľ 4130).
    roller_skate_brake_shape:
      name: Tvar brzdy na kolieskových korčuliach
      description: Opisuje geometrický tvar/profil brzdovej hlavy z hľadiska výkonnosti
        alebo estetickej preferencie.
    roller_skate_brake_type:
      name: Typ brzdy na kolieskových korčuliach
      description: Určuje brzdový systém používaný na kolieskových korčuliach.
    roller_ski_technique:
      name: Technika jazdy na kolieskových bežkách
      description: Identifikuje techniku bežeckého lyžovania, pre ktorú sú kolieskové
        bežky určené.
    roller_technology:
      name: Technológia valcov
      description: Označuje integrovanú technológiu, ktorá zvyšuje výkonnosť masáže,
        ako napríklad vibrácie alebo teplo.
    rolling_case_wheel_configuration:
      name: Konfigurácie kolies puzdra na kolieskach
      description: Určuje konfiguráciu koliesok použitú na puzdrách na klávesy na
        kolieskach.
    rolling_paper_format:
      name: Formát cigaretového papiera
      description: Identifikuje fyzickú prezentáciu produktu (napr. ploché hárky,
        predvalcované kužele, obaly).
    rolling_paper_gum_type:
      name: Typ gumy na cigaretový papier
      description: Určuje lepidlo (gumu) použité na okraji papiera na utesnenie, ktoré
        môže ovplyvniť chuť a výkonnosť.
    rolling_paper_size:
      name: Veľkosť cigaretového papiera
      description: Označuje štandardnú veľkostnú klasifikáciu cigaretového papiera
        alebo kužeľa, čo nakupujúcim umožňuje rýchlo si vybrať správnu šírku/dĺžku
        pre ich potreby.
    rolling_stock_type:
      name: Typ železničného vozidla
      description: Určuje, o aký typ vlaku/koľajového vozidla ide (rušeň verzus osobné/nákladné
        vozne a bežné podtypy vozňov).
    roof_cargo_net_hook_fastener_style:
      name: Štýl háku/upevňovacieho prvku strešnej nákladnej siete
      description: Určuje štýl koncového kovania použitého na pripojenie siete ku
        kotviacim bodom (napr. S-hák, karabína, J-hák).
    roof_height_class:
      name: Trieda výšky strechy
      description: Kategorizuje výšku strechy bežne používanú pre dodávky (zvlášť
        relevantné pre konverzie/karavany).
    roof_type:
      name: Typ strechy
      description: Konfigurácia strechy alebo stropnej časti krytu.
    root_variety:
      name: Koreňová odroda
      description: Identifikuje odrodu alebo bežný typ koreňa (napr. chren verzus
        pravé odrody wasabi).
    rope_buoyancy:
      name: Vztlak lana
      description: Uvádza, či je lano navrhnuté tak, aby plávalo na vodnej hladine,
        čo jazdcom pomáha vyhnúť sa zamotaniu a zjednodušuje sa tým vyťahovanie.
    rope_construction:
      name: Konštrukcia lana
      description: Určuje detaily konštrukcie vlákien nad rámec štýlu pletenia, napríklad
        krútené alebo pletené jadro/plášť a či je lano horolezeckého štýlu.
    rope_material:
      name: Materiál lana
      description: Identifikuje materiál ladiaceho lana/šnúry.
    rope_strand_compatibility:
      name: Kompatibilita prameňov lana
      description: Označuje, ktoré konfigurácie lana a prameňa istiace zariadenie
        zvládne (jednoduché, polovičné/dvojité, dvojité alebo kombinácie).
    rope_stretch_type:
      name: Typ pružnosti lana
      description: Opisuje charakteristiky pružnosti lana a rozlišuje medzi nepružnými,
        nízkopružnými, štandardnými alebo bungee štýlmi.
    rose_bloom_stage:
      name: Fáza kvitnutia ruže
      description: Označuje, ako otvorené sú kvety ruže pri doručení/príchode (od
        puku po úplné otvorenie).
    rose_grade:
      name: Ružová trieda
      description: Trieda rezaných ruží komerčnej kvality.
    rosette_center_type:
      name: Typ stredu rozety
      description: Určuje typ stredového detailu alebo vložky na prednej strane rozety.
    rosin_dust_level:
      name: Hladina prachu z kolofónie
      description: Označuje očakávané množstvo prachu z kolofónie vytvoreného počas
        bežného používania.
    rosin_formula_additives:
      name: Zloženie/prísady kolofónie
      description: Identifikuje významné vlastnosti zloženia, ako sú hypoalergénne,
        nízkoprašné alebo kov obsahujúce zmesi.
    rosin_hardness:
      name: Tvrdosť kolofónie
      description: Označuje relatívnu tvrdosť/mäkkosť kolofónie na sláčik, ktorá môže
        ovplyvniť priľnavosť a prašnosť v rôznych klimatických podmienkach a štýloch
        hry.
    rotation_mechanism_type:
      name: Typ rotačného mechanizmu
      description: Určuje mechanizmus, ktorý umožňuje otáčanie povrazu, čo ovplyvňuje
        plynulosť a dosiahnuteľnú rýchlosť (napr. guľôčkové ložiská vs. puzdrá).
    rotation_motion_features:
      name: Rotačné/pohybové vlastnosti
      description: Označuje, či sa planéty/obežné dráhy otáčajú alebo pohybujú a ako.
    rotor_configuration_type:
      name: Typ konfigurácie rotora
      description: Identifikuje konfiguráciu rotora a štýl riadenia vrtuľníka na diaľkové
        ovládanie (napr. koaxiálny, jednorotorový s pevným uhlom nábehu vs. kolektívny
        uhol nábehu, viacrotorový), čo podstatne ovplyvňuje letové vlastnosti a vhodnosť
        pre rôzne úrovne zručnosti.
    rotor_construction_type:
      name: Typ konštrukcie rotora
      description: Určuje štýl konštrukcie rotora, ktorý ovplyvňuje hmotnosť, tuhosť
        a odvod tepla.
    rotor_mounting_interface:
      name: Montážne rozhranie rotora
      description: Definuje normu rozhrania náboja používanú na pripevnenie rotora
        ku kolesu.
    rotor_mounting_standard:
      name: Norma montáže rotora
      description: Určuje normu rozhrania použitú na pripevnenie rotora k náboju (napr.
        6-skrutkové alebo Center Lock).
    roulette_set_components_included:
      name: Komponenty ruletovej sady v cene
      description: Kľúčové komponenty súvisiace s ruletou, ktoré sú súčasťou balenia
        kolesa/sady.
    roulette_wheel_ball_track_type:
      name: Typ sledovania guľôčky ruletového kolesa
      description: Opisuje štýl sledovania loptičky použitý na kolese, ktorý ovplyvňuje
        realizmus a pocit z hry.
    roulette_wheel_numbering_system:
      name: Systém číslovania ruletového kolesa
      description: Označuje číslovanie ruletového kolesa a nulovú konfiguráciu pre
        kompatibilitu hry/kurzov.
    rounders_equipment_included:
      name: Vybavenie k hre s loptou do kruhu
      description: Uvádza konkrétne položky alebo príslušenstvo k hre rounders dodávané
        so súpravou alebo balením tréningovej pomôcky, aby kupujúci presne vedeli,
        čo je v krabici.
    rounders_governing_body_approval:
      name: Schválenie hry rounders riadiacim orgánom
      description: Označuje certifikáciu alebo schválenie oficiálnym riadiacim orgánom
        pre hru rounders alebo iné športy.
    row_counter_format:
      name: Formát počítadla riadkov
      description: Určuje formát/štýl počítadla riadkov pletenia (napr. krúžkové,
        retiazkové, klikrové, digitálne).
    row_counter_mechanism:
      name: Mechanizmus počítadla riadkov
      description: Určuje, ako počet riadkov postupuje/zaznamenáva sa na nástroji.
    row_counter_mounting_method:
      name: Spôsob montáže počítadla riadkov
      description: Ako sa počítadlo/značkovač pripevňuje počas používania (k ihle,
        k prstu, k výčnelku atď.).
    rowel_type:
      name: Typ kolieska
      description: Opisuje tvar alebo profil hrany kolieska pre preferencie jazdca
        a citlivosť koňa.
    rowing_machine_part_type:
      name: Typ dielu veslovacieho trenažéra
      description: Identifikuje konkrétny komponent, ktorý sa má produktom na veslovacom
        trenažéri vymeniť, aby mohli nakupujúci rýchlo nájsť presný diel, ktorý potrebujú,
        bez toho, aby sa muselo vytvárať veľké množstvo mikrokategórií.
    rubber_ducky_character_theme:
      name: Charakter/motív gumenej kačičky
      description: Motív alebo štýl charakteru gumenej kačičky (užitočné pre novinky/zberateľské
        kačičky).
    rubber_ducky_features:
      name: Prvky gumenej kačičky
      description: Funkčné/dizajnové prvky špecifické pre gumené kačičky ako hračky
        do kúpeľa.
    rubber_ducky_size_class:
      name: Veľkostná trieda gumenej kačičky
      description: Zoskupenie gumených kačičiek podľa veľkosti zrozumiteľné pre nakupujúcich
        založené na typickom použití (hračka do vaničky vs. ozdoba na vrch torty vs.
        jumbo).
    ruffle_style:
      name: Štýl nariasenia
      description: Opisuje konštrukciu alebo vizuálny štýl nariasenia na šerpe stoličky.
    rugby_headgear_safety_certification:
      name: Certifikácia bezpečnosti pokrývok hlavy na ragby
      description: Označuje, či pokrývka hlavy spĺňa oficiálne ragbyové alebo všeobecné
        bezpečnostné normy pre šport.
    rugby_size:
      name: Ragbyová veľkosť
      description: Kategorizuje vybavenie podľa bežných označení veľkosti špecifických
        pre rugby používaných v názvoch produktov.
    rugby_variant:
      name: Ragbyový variant
      description: Určuje ragbyový variant (kód alebo formát), pre ktorý je produkt
        určený.
    ruler_edge_type:
      name: Typ hrany pravítka
      description: Identifikuje profil/funkciu hrany používané na meranie alebo označovanie
        (napr. rovná hrana, skosená, obruba).
    ruler_marking_style:
      name: Štýl značenia pravítka
      description: Opisuje označovacie/vodiace rozloženie vytlačené na pravítku nad
        rámec základných značiek začiarknutia.
    runner_configuration:
      name: Konfigurácia bežca
      description: Opisuje počet a usporiadanie saníc na saniach.
    runner_material:
      name: Materiál sanice
      description: Určuje materiál použitý na sanice alebo klzné pásy saní.
    saddle_cover_style:
      name: Štýl poťahu sedla
      description: Klasifikuje celkový dizajn alebo štýl použitia produktu (napr.
        úložný poťah, poťah na jazdu, taška na prenášanie).
    saddle_design:
      name: Dizajn sedla
      description: Klasifikuje celkový ergonomický alebo reliéfny dizajn/štýl sedla
        (napr. výrez, bez nosa, rozdelený nos, odpružené).
    saddle_discipline:
      name: Sedlová disciplína
      description: Určuje primárnu jazdeckú disciplínu alebo zamýšľané použitie/štýl
        sedla.
    saddle_mounting_type:
      name: Typ pripevnenia sedla
      description: Určuje rozhranie medzi sedlom a sedlovkou z hľadiska kompatibility
        (napr. s koľajničkami, otočné, I-nosník).
    saddle_pad_shape:
      name: Tvar podložky pod sedlo
      description: Opisuje fyzický strih/obrys podložky, ktorý ovplyvňuje kompatibilitu
        so sedlom a estetický vzhľad.
    saddle_pad_style:
      name: Štýl postrovania jazdeckého sedla
      description: Identifikuje funkčný štýl podložky alebo zamýšľanú disciplínu,
        čo jazdcom umožňuje vybrať si správnu konštrukciu pre ich aktivitu alebo typ
        sedla.
    saddle_padding_material:
      name: Materiál polstrovania sedla
      description: Označuje primárny tlmiaci materiál alebo technológiu vo vnútri
        sedla, ktorá ovplyvňuje pohodlie a pocit z jazdy.
    saddle_rail_material:
      name: Materiál rámu jazdeckého sedla
      description: Určuje materiál použitý na koľajnice pod sedlom bicykla, ktorý
        ovplyvňuje pevnosť, pohodlie, hmotnosť a cenu.
    saddle_tree_material:
      name: Materiál kostry jazdeckého sedla
      description: Určuje materiál použitý na sedlovú kostru, vnútorný rám sedla.
    saddle_tree_width:
      name: Šírka sedlovej kostry
      description: Opisuje klasifikáciu šírky sedlovej kostry, ktorá určuje sadnutie
        na kohútiku koňa.
    safety_documentation_available:
      name: Dostupná bezpečnostná dokumentácia
      description: Označuje, ktoré dokumenty o zhode/bezpečnosti sú poskytnuté pre
        danú zložku (napr. karta bezpečnostných údajov, certifikát/vyhlásenie IFRA,
        vyhlásenie/deklarácia o alergénoch).
    safety_equipment_included:
      name: Bezpečnostná výbava v cene
      description: Bezpečnostné/ochranné položky zahrnuté do súpravy.
    safety_features:
      name: Bezpečnostné prvky
      description: Označuje zabudované bezpečnostné prvky určené na zníženie náhodných
        porezaní alebo na ochranu čepele počas skladovania.
    safety_harness_type:
      name: Typ bezpečnostného postroja
      description: Označuje štýl a konfiguráciu postroja na zadržiavanie dieťaťa dodávaného
        so sedadlom.
    safety_mechanism_type:
      name: Typ bezpečnostného mechanizmu
      description: Opisuje štýl zabudovaného bezpečnostného systému používaného na
        zachytenie činky počas neúspešných zdvihov.
    safety_restraint_type:
      name: Typ zadržiavacieho systému
      description: Typ zabudovaného detského zadržiavacieho systému na hojdačke, ak
        existuje.
    safety_warning:
      name: Bezpečnostná výstraha
      description: Označuje, či je výrobok vybavený bežnými bezpečnostnými výstrahami
        pre hračky, ktoré sa týkajú guličiek (napr. nebezpečenstvo udusenia).
    sail_shape:
      name: Tvar plachty
      description: Opisuje geometrický štýl kajakovej plachty, ktorý ovplyvňuje účinnosť,
        manipuláciu a montáž.
    salad_dressing_type:
      name: Typ šalátového dresingu
      description: Identifikuje základný štýl alebo textúru dresingu (napr. krémový,
        vinaigrette, na báze jogurtu), čo nakupujúcim pomáha rozlišovať medzi rôznymi
        základmi a konzistenciami.
    salad_topping_base_ingredient:
      name: Základná prísada na šalátovú zálievku
      description: Určuje skupinu primárnych prísad, ktoré tvoria zálievku, čo zákazníkom
        pomáha filtrovať podľa nutričných preferencií, obáv z alergénov alebo požadovanej
        textúry.
    salt_level:
      name: Hladina soli
      description: Označuje množstvo soli alebo sodíka pridaného do orechov alebo
        semien.
    sand_cup_features:
      name: Vlastnosti pohára do piesku
      description: Funkčné/fyzikálne vlastnosti pohára(-ov) do piesku, ktoré ovplyvňujú
        hru a používanie.
    sand_shovel_handle_style:
      name: Štýl rukoväti lopatky na piesok
      description: Opisuje tvar rukoväti/úchopu na konci rukoväti lopatky/rýľa.
    sand_toy_set_pieces_included:
      name: Kusy súpravy hračiek do piesku v cene
      description: Uvádza typy komponentov hračiek do piesku, ktoré sú súčasťou súpravy
        (napr. vedierko, lopatka, formičky), aby si nakupujúci mohli porovnať jednotlivé
        súpravy podľa toho, čo obsahujú.
    sand_water_mill_items_included:
      name: Vrátane položky pieskový a vodný mlyn
      description: Uvádza hlavné komponenty príslušenstva dodávané s hračkou mlyna
        (vedierka, naberačky, formičky atď.).
    sandbag_style:
      name: Štýl závažia s pieskom
      description: Identifikuje konkrétny dizajn a zamýšľané tréningové využitie závažia
        s pieskom (napr. bulharský, strongman, silový), čo pomáha nakupujúcim vybrať
        si medzi rôznymi typmi tréningu.
    sandbox_bottom_type:
      name: Typ dna pieskoviska
      description: Typ základnej/spodnej konštrukcie použitej pod pieskom.
    sandbox_drainage_type:
      name: Typ drenáže pieskoviska
      description: Spôsob ako pieskovisko odvádza vodu (ak je to relevantné), napríklad
        odtokové otvory alebo odnímateľná zátka.
    sandbox_seating_type:
      name: Typ sedenia v pieskovisku
      description: Či pieskovisko obsahuje integrované sedenie a aké.
    sapodillo_variety:
      name: Odroda sapodilly
      description: Identifikuje konkrétny kultivar alebo odrodu sapodilly/chikoo (napr.
        „Alano“, „Prolific“), čo umožňuje nadšencom vybrať si preferované chuťové
        profily a vlastnosti.
    sapote_variety:
      name: Odroda ovocia sapote
      description: Špecifikuje konkrétny druh/typ sapoty (napr. čierna, biela, mamey),
        čo umožňuje nakupujúcim rozlíšiť medzi rôznymi druhmi.
    satin_ribbon_face_type:
      name: Typ povrchu saténovej stuhy
      description: Špecifikuje, či má stuha saténovú povrchovú úpravu na jednej alebo
        na oboch stranách.
    sauce_consistency:
      name: Konzistencia omáčky
      description: Opisuje textúru alebo hustotu omáčky na pizzu.
    sauce_product_form:
      name: Forma omáčky
      description: Označuje fyzickú formu produktu omáčky, napríklad tekutina, olej,
        pasta, prášok, vločky alebo sirup.
    sauce_variety:
      name: Druh omáčky
      description: Identifikuje konkrétny štýl alebo typ receptúry bielej alebo smotanovej
        omáčky (napr. Alfredo, bešamel, holandská omáčka).
    saxophone_body_finish:
      name: Povrchová úprava tela saxofónu
      description: Opisuje primárnu povrchovú úpravu/pokovovanie tela saxofónu (oddelene
        od klapiek).
    saxophone_body_type:
      name: Typ tela saxofónu
      description: Opisuje celkové fyzické vyhotovenie tela basového saxofónu a orientáciu
        zvončeka.
    saxophone_construction_style:
      name: Štýl konštrukcie saxofónu
      description: Označuje bežné konštrukčné prvky saxofónu, ktoré ovplyvňujú odolnosť,
        rezonanciu a servisovateľnosť.
    saxophone_included_accessories:
      name: Príslušenstvo k saxofónu
      description: Uvádza príslušenstvo, ktoré sa bežne dodáva v balení so sadou altového
        saxofónu.
    saxophone_key_system:
      name: Systém klapiek saxofónu
      description: Identifikuje systém klapiek saxofónu (štandard rozloženia/mechanizmu)
        použitý na nástroji.
    saxophone_key_touch_material:
      name: Materiál povrchu klapiek saxofónu
      description: Špecifikuje materiál použitý na dotykové plochy klapiek saxofónu
        (napr. perleťové dotykové plochy).
    saxophone_mouthpiece_baffle_type:
      name: Typ prepážky náustku saxofónu
      description: Opisuje dizajn prepážky, ktorá ovplyvňuje prúdenie vzduchu a jas.
    saxophone_neck_type:
      name: Typ krku saxofónu
      description: Špecifikuje konfiguráciu krku dodávaného spolu s basovým saxofónom.
    saxophone_package_contents:
      name: Obsah balenia saxofónu
      description: Uvádza, ktoré hlavné príslušenstvo je súčasťou balenia saxofónu
        (napr. puzdro, náustok, ligatúra, popruh na krk, čistiaca súprava).
    saxophone_reed_cut:
      name: Rez plátku saxofónu
      description: Určuje rez/štýl plátku saxofónu, ktorý ovplyvňuje odozvu, tón a
        pocit z hry.
    saxophone_reed_material_type:
      name: Typ materiálu plátku pre saxofón
      description: Špecifikuje kategóriu materiálu plátku (napr. trstina verzus syntetická
        látka).
    saxophone_reed_strength_scale:
      name: Stupnica sily plátku saxofónu
      description: Určuje systém číslovania/stupnicu sily použitú pre jazýček (často
        závislý od značky), čo umožňuje jasnejšie porovnanie naprieč zoznamom.
    saxophone_small_part_thread_size:
      name: Veľkosť vlákna malej časti saxofónu
      description: Špecifikuje veľkosť vlákna/štandard malých vláknovitých dielov
        saxofónu (najmä skrutiek), čo umožňuje výber správne pasujúcej veľkosti.
    saxophone_swab_application_area:
      name: Oblasť použitia čistiaceho tampónu saxofónu
      description: Označuje, ktorú časť saxofónu má vatový tampón čistiť/sušiť.
    scabbard_material:
      name: Materiál puzdra
      description: Určuje primárny materiál priloženého puzdra (ak je súčasťou balenia).
    scale_model_assembly_status:
      name: Stav zostavy zmenšeného modelu
      description: Označuje, či je zmenšený model pripravený na vystavenie alebo vyžaduje
        montáž/natieranie.
    scale_model_car_features:
      name: Vlastnosti zmenšeného modelu auta
      description: Pozoruhodné vlastnosti zmenšeného modelu auta, ako sú otváracie
        dvere/kapota, ovládateľné kolesá, odpruženie atď.
    scale_model_kit_assembly_requirements:
      name: Požiadavky na zostavenie zmenšeného modelu
      description: Špecifikuje, aké dodatočné kroky zostavenia alebo materiály sú
        zvyčajne potrebné nad rámec jednoduchého zacvakávacieho zostavenia.
    scale_model_kit_components_included:
      name: Súprava komponentov súčasťou zmenšeného modelu
      description: Uvádza, čo je súčasťou zmenšeného modelu/súpravy tanku (napr. obtlačky,
        figúrky, fotoleptané diely).
    scale_model_paint_status:
      name: Stav farby zmenšeného modelu
      description: Označuje, či je model vrtuľníka natretý/upravený alebo vyžaduje
        natieranie.
    scale_model_pose:
      name: Zobrazenie modelu v mierke
      description: Špecifikuje zobrazenú pózu modelu koňa pre zladenie s výstavou/diorámou.
    scale_model_rotor_configuration:
      name: Konfigurácia zmenšeného modelu rotora
      description: Špecifikuje konfiguráciu rotora vrtuľníka zobrazenú modelom.
    scale_model_truck_era:
      name: Éra modelových nákladných vozidiel
      description: Označuje éru/časové obdobie skutočného nákladného vozidla, ktoré
        model predstavuje (užitočné pre zberateľov, ktorí hľadajú porovnanie historických
        a moderných nákladných vozidiel).
    scale_model_truck_propulsion_type:
      name: Typ pohonu zmenšeného modelu nákladného vozidla
      description: Špecifikuje, či je zobrazený nákladný automobil dieselový, benzínový,
        elektrický, hybridný alebo má iný typ pohonu (ako ho predstavuje/trhá model).
    scale_units:
      name: Jednotky mierky
      description: Merné jednotky vytlačené/gravírované na nosníku pre nastavenie
        polomeru/priemeru.
    scent_function:
      name: Funkcia vône
      description: Definuje primárnu funkciu vonného produktu, aby si poľovníci mohli
        rýchlo vybrať správny typ (napr. návnada/atraktant vs. eliminátor pachov).
    scent_source:
      name: Zdroj vône
      description: Uvádza hlavný biologický alebo aromatický zdroj použitý v zložení
        produktu, zahŕňajúci typy moču, potravinové vône, rastlinné arómy a pod.
    school_bus_body_type:
      name: Typ karosérie školského autobusu
      description: Klasifikuje školský autobus podľa bežných typov karosérie/tried
        používaných na trhu (napr. typ A–D).
    school_bus_safety_feature:
      name: Bezpečnostný prvok školského autobusu
      description: Dôležité bezpečnostné vybavenie inštalované v školskom autobuse.
    school_glue_washability:
      name: Umývateľnosť školského lepidla
      description: Určuje, ako ľahko sa dá zaschnuté alebo mokré lepidlo vyčistiť
        z pokožky, oblečenia alebo povrchov.
    scissors_application:
      name: Účel použitia nožníc
      description: Primárny určený účel strihania/materiál, na ktorý sú nožnice určené.
    scooter_brake_pad_material:
      name: Materiál brzdových doštičiek kolobežky
      description: Špecifikuje zloženie materiálu brzdových doštičiek, ktoré ovplyvňuje
        výkon, hlučnosť a životnosť.
    scoring_method:
      name: Metóda bodovania
      description: Špecifikuje spôsob zaznamenávania skóre na stolnom futbale, napríklad
        manuálne počítadlá guličiek alebo elektronické ukazovatele skóre.
    scoring_pattern:
      name: Spôsob bodovania
      description: Rozloženie bodovacích zón vytlačených na hracej ploche.
    scoring_system_type:
      name: Typ bodovacieho systému
      description: Opisuje typ mechanizmu na zaznamenávanie skóre dodaného so stolom,
        napríklad manuálne posuvné počítadlá alebo rôzne elektronické displeje.
    scottish_smallpipes_bag_material:
      name: Materiál mechu škótskych malých gájd
      description: Špecifikuje materiál mechu (zásobníka vzduchu) dodávaného so škótskymi
        malými gajdami.
    scottish_smallpipes_drone_tuning_configuration:
      name: Ladenie/drónová konfigurácia škótskych malých gájd
      description: Určuje nastavenie ladenia drónov dodávané s nástrojom (výšky/úlohy
        drónov vzhľadom na základný tón).
    scottish_smallpipes_reed_type:
      name: Typ plátku škótskych malých gájd
      description: Identifikuje typ plátku použitého pre chanter (a/alebo či ide o
        syntetický alebo trstinový plátok).
    scraping_surface_type:
      name: Typ povrchu na čistenie
      description: Špecifikuje konštrukciu/geometriu škrabacej plochy, ktorá vytvára
        zvuk (napr. drážkovaná, hrebeňová so zubami, zvlnená).
    screw_drive_type:
      name: Typ skrutkového pohonu
      description: Špecifikuje typ drážky/hlavy skrutky alebo skrutky, teda nástroj
        potrebný na jej utiahnutie alebo uvoľnenie (napr. šesťhran/imbus, Torx).
    screw_thread_size:
      name: Veľkosť závitu skrutky
      description: Špecifikuje štandard veľkosti závitu dodaných alebo kompatibilných
        skrutiek (napr. M4, M5, M6).
    sculpting_clay_base_type:
      name: Typ podkladu sochárskej hliny
      description: Opisuje základnú zložku/podklad sochárskej hliny.
    seafood_cut:
      name: Spôsob rezu morských plodov
      description: Opisuje fyzickú formu alebo spôsob spracovania morských plodov
        (napr. celé, filé, steak).
    seafood_processing_method:
      name: Spôsob spracovania morských plodov
      description: Špecifikuje hlavnú metódu konzervácie alebo spracovania morských
        plodov, napríklad údené, solené alebo lyofilizované (sušené mrazom).
    seafood_source:
      name: Zdroj morských plodov
      description: Uvádza, či ide o voľne ulovené, chované na farmách, rastlinnú alternatívu
        alebo iný zdroj morských plodov, čo pomáha kupujúcim posúdiť udržateľnosť
        a kvalitu.
    seal_material:
      name: Materiál tesnenia
      description: Materiál použitý na krčné, zápästné a členkové tesnenia alebo manžety,
        ktoré udržiavajú oblek vodotesný.
    seal_type:
      name: Typ tesnenia
      description: Určuje metódu tesnenia, ktorú armatúra používa na zabránenie úniku
        chladiacej kvapaliny.
    sealant_formulation:
      name: Zloženie tmelu
      description: Určuje základné chemické zloženie alebo typ prísad tesniaceho tmelu
        do bicyklových plášťov (napr. na báze latexu, vystužený vláknami, akrylový).
    seals_leak_type:
      name: Typ tesnenia úniku
      description: Typ/miesto úniku v chladiacom systéme, ktorý je produkt určený
        utesniť.
    seam_construction:
      name: Spracovanie švu
      description: Opisuje spôsob vyhotovenia švu lopty, ktorý ovplyvňuje rotáciu,
        odolnosť a pocit pri hre.
    seam_design:
      name: Dizajn švu
      description: Špecifikuje spracovanie švov alebo dekoratívne prvky švov pančuchového
        tovaru.
    seam_gauge_scale_type:
      name: Typ stupnice jemnosti švu
      description: Určuje, aké stupnice/označenia sú na švovej mierke pridané nad
        rámec základnej pravítkovej stupnice.
    seam_gauge_slider_material:
      name: Materiál posuvníka na meranie švov
      description: Určuje materiál nastaviteľného posuvníka/jazdca, ak je súčasťou.
    seam_ripper_tip_style:
      name: Štýl koncoviek odstraňovača švov
      description: Opisuje funkčný tvar koncovky, ktorá sa zasúva pod očká stehov
        a bezpečne prereže niť.
    seam_sealing_type:
      name: Typ utesnenia švov
      description: Opisuje metódu, ktorá sa používa na zabránenie prenikaniu vody
        cez švy nepremokavého obleku (napr. úplne podlepené švy, zvárané švy).
    seam_type:
      name: Typ švu
      description: Opisuje štýl šitia na bejzbalovej lopte, ktorý ovplyvňuje úchop,
        aerodynamiku a určenú úroveň hry.
    season_condition_protection:
      name: Ochrana proti sezónnym vplyvom/ochrana v rôznych podmienkach
      description: Označuje hlavný typ počasia alebo podmienok, pred ktorými je kryt
        čelného skla určený chrániť.
    season_rating:
      name: Sezónne hodnotenie
      description: Špecifikuje sezónne hodnotenie stanu, teda jeho vhodnosť pre rôzne
        poveternostné podmienky (napr. 3-sezónny, 4-sezónny alebo 5-sezónny/expedičný).
    seasoning_variety:
      name: Rozmanitosť dochucovadiel (korenín)
      description: Klasifikuje dochucovadlo podľa spôsobu jeho spracovania alebo tradičného
        kulinárskeho použitia.
    seat_adjustment_power_type:
      name: Typ napájania elektrického nastavenia sedadla
      description: Špecifikuje spôsob ovládania mechanizmov nastavenia sedadla (napr.
        manuálne páky vs. elektrické motory), čo môže ovplyvniť kabeláž/kompatibilitu.
    seat_belt_attachment_type:
      name: Typ upevnenia bezpečnostného pásu
      description: Špecifikuje spôsob uchytenia popruhu k vozidlu/k pásovému kovaniu.
    seat_belt_buckle_electrical_connector_type:
      name: Typ elektrického konektora spony bezpečnostného pásu
      description: Špecifikuje typ konektora alebo rozhrania použitého pre kabeláž
        spínača spony/prípadne predpínača, ak je to relevantné.
    seat_belt_buckle_mounting_type:
      name: Typ uchytenia spony bezpečnostného pásu
      description: Opisuje spôsob uchytenia spony/prijímača k vozidlu, sedadlu alebo
        kotviacemu bodu pásu (napr. skrutkované, zacvakávacie).
    seat_belt_buckle_release_button_color:
      name: Farba tlačidla uvoľnenia spony bezpečnostného pásu
      description: Špecifikuje farbu tlačidla na uvoľnenie spony.
    seat_belt_cover_placement:
      name: Umiestnenie krytu bezpečnostného pásu
      description: Špecifikuje, na ktorej časti bezpečnostného pásu je kryt určený
        na použitie.
    seat_belt_integration:
      name: Zapojenie bezpečnostných pásov
      description: Špecifikuje, či je sedadlo vybavené integrovaným bezpečnostným
        pásom a/alebo prijímačom spony, alebo či je potrebné pri montáži použiť (preniesť)
        originálny OEM prijímač spony vozidla.
    seat_belt_provision:
      name: Uchytenie bezpečnostného pásu
      description: Určuje, či sú bezpečnostné pásy a/alebo súvisiace komponenty (napr.
        spony) súčasťou zostavy zadného sedadla, alebo ich treba preniesť z pôvodného
        sedadla.
    seat_belt_strap_installation_location:
      name: Umiestnenie montáže popruhu bezpečnostného pásu
      description: Označuje, kde je popruh inštalovaný v rámci systému bezpečnostného
        pásu.
    seat_cover_placement:
      name: Umiestnenie poťahu na sedadlo
      description: Označuje, pre ktorú sedaciu pozíciu (pozície) vo vozidle je kryt
        určený.
    seat_cover_securement_method:
      name: Spôsob upevnenia poťahu sedadla
      description: Označuje hlavný spôsob, akým je poťah sedadla upevnený k sedadlu.
        Ak sa používa viacero metód, vyberte si hlavnú/primárnu.
    seat_cover_set_contents:
      name: Obsah súpravy poťahov sedadiel
      description: Opisuje, ktoré časti sú súčasťou balenia (napr. len sedacia časť
        vs. kompletný set sedadla vrátane opierok hlavy).
    seat_fabric:
      name: Materiál poťahu sedadla
      description: Hlavná tkanina použitá na sedaciu a operadlovú časť stoličky.
    seat_height_category:
      name: Kategória výšky sedadla
      description: Klasifikuje stoličku podľa typického rozsahu výšky sedadla (napr.
        pultová alebo barová výška) na jednoduchší výber.
    seat_material:
      name: Materiál sedadla
      description: Určuje hlavný materiál sedacej plochy lavice.
    seat_mounting_type:
      name: Typ pripevnenia sedadla
      description: Konfigurácia uchytenia/koľajníc používaná na pripevnenie sedadla
        k podlahe vozidla.
    seating_surface_material:
      name: Materiál poťahu na sedadlá
      description: Špecifikuje materiál plochy, na ktorej sa osoba opiera v ľahu (napr.
        sieťovina Textilene, popruhová tkanina, ratan, čalúnenie s výplňou).
    seatpost_clamp_mechanism:
      name: Mechanizmus objímky sedlovky
      description: Typ upínacieho/zatváracieho systému, ktorý upevňuje sedlovku.
    section_orientation_compatibility:
      name: Kompatibilita orientácie sekcie
      description: Uvádza, či je príslušenstvo kompatibilné s ľavostrannou, pravostrannou
        alebo univerzálnou orientáciou sekcie.
    sectional_configuration:
      name: Sekčná konfigurácia
      description: Určuje konkrétny modul alebo orientáciu sekčného dielu (napr. roh,
        ľavé ukončenie, leňoška), aby si zákazník mohol poskladať požadované usporiadanie.
    sectional_shape:
      name: Tvar sekčnej zostavy
      description: Určuje celkovú geometrickú konfiguráciu/usporiadanie sekčnej pohovky.
    secured_components:
      name: Komponenty zabezpečenia
      description: Uvádza konkrétne bicyklové komponenty, ktoré chráni uzamykateľná
        rýchloupinacia oska alebo bezpečnostné matice (napr. predné koleso, zadné
        koleso, sedlovka).
    seed_content:
      name: Obsah semien
      description: Uvádza, či je citrusové ovocie bezsemenné, s malým počtom semien
        alebo plne semenné.
    seed_size_classification:
      name: Klasifikácia veľkosti semien
      description: Určuje relatívnu veľkosť nejedlej semienka v liči, ktorá ovplyvňuje
        množstvo jedlej dužiny.
    self_adhesive_backing_format:
      name: Forma samolepiacej podložky
      description: Fyzická forma lepiacej vrstvy dodávanej s pútkom knôtu (napr. predaplikovaná
        podložka vs. samostatné nálepky a pod.).
    self_adhesive_hook_loop_backing_type:
      name: Typ samolepiacej podložky
      description: Špecifikuje konštrukciu podkladovej vrstvy a typ lepiaceho systému
        použitého na samolepiacej strane.
    self_adhesive_hook_loop_fastener_shape:
      name: Tvar samolepiaceho háčika a pásky
      description: Určuje spôsob vyrezania/tvar dodaných dielov spojovacieho prvku.
    self_hardening_clay_finish:
      name: Povrchová úprava samotvrdnúcej hliny
      description: Opisuje vzhľad/ lesk povrchu po úplnom vytvrdnutí (napr. prírodný
        matný, saténový a pod.), čo pomáha pri výbere finálneho vzhľadu.
    self_hardening_clay_water_resistance_after_curing:
      name: Odolnosť samotvrdnúcej hliny voči vode po vytvrdnutí
      description: Určuje odolnosť voči pôsobeniu vody po úplnom vytvrdnutí (bez dodatočného
        tesnenia alebo laku).
    sensor_functions:
      name: Funkcie senzorov
      description: Označuje, ktoré cyklistické metriky senzor meria.
    sensor_measurement_mode:
      name: Režim merania senzora
      description: Označuje, ktoré metriky dokáže senzor zaznamenávať (napr. iba kadenciu,
        iba rýchlosť alebo kombináciu rýchlosti a kadencie).
    sensor_mounting_position:
      name: Poloha upevnenia snímača
      description: Určuje umiestnenie senzora na bicykli alebo jazdcovi, napríklad
        na kľuke, náboji kolesa alebo tretre. Toto ovplyvňuje kompatibilitu s rôznymi
        nastaveniami bicyklov.
    sensor_mounting_type:
      name: Typ upevnenia snímača
      description: Špecifikuje spôsob montáže senzora MAP na sacie potrubie alebo
        motor (napr. prírubové uchytenie pomocou skrutiek alebo zasunutie do gumovej
        priechodky).
    sensor_or_gauge_mounting_location:
      name: Miesto montáže senzora alebo meracieho prístroja
      description: Špecifikuje, kde na vozidle sa má senzor alebo merací prístroj
        nainštalovať (na úrovni systému/umiestnenia, nie vľavo/vpravo).
    sensory_modality:
      name: Typ snímacej technológie senzora
      description: Hlavný zmyslový podnet alebo podnety, ktoré má hračka poskytovať
        (môže ísť o viaczmyslové pôsobenie).
    sensory_toy_fidget_mechanism:
      name: Mechanizmus antistresovej senzorickej hračky
      description: Hlavný spôsob interakcie/mechanizmus používaný na manipuláciu a
        sebareguláciu.
    sensory_toy_light_features:
      name: Svetelné funkcie senzorickej hračky
      description: Svetelné režimy/efekty, ktoré hračka poskytuje.
    sensory_toy_texture_type:
      name: Typ povrchu senzorickej hračky
      description: Prevládajúce povrchové vlastnosti/textúry používané na hmatovú
        stimuláciu.
    sequin_application_method:
      name: Metóda aplikácie flitrov
      description: Určuje spôsob aplikácie alebo použitia flitra (napr. na prišitie,
        nalepenie alebo nažehlenie a pod.).
    sequin_finish:
      name: Povrchová úprava flitra
      description: Opisuje povrchovú/vizuálnu úpravu a odrazový efekt flitrov použitých
        na nášivke (napr. matné, metalické, holografické), nie typ podkladu nášivky
        ani spôsob uchytenia.
    serger_stitch_functions:
      name: Funkcie overlockového stehu
      description: Typy stehov, ktoré overlockový stroj podporuje (variácie overlock/obnitkovacie
        stehy a špeciálne overlockové stehy).
    serger_thread_count:
      name: Počet nití používaných overlockovým strojom
      description: Počet nití, ktoré môže overlockový stroj použiť na šitie (napr.
        2/3/4 alebo 5-nitné šitie).
    service_interval:
      name: Servisný interval
      description: Maximálny odporúčaný časový interval medzi povinnými kontrolami
        alebo servisom v autorizovanom servisnom stredisku.
    serving_temperature:
      name: Teplota pri podávaní
      description: Udáva odporúčanú teplotu alebo stav produktu pri jeho konzumácii.
    sesame_seed_hull_status:
      name: Stav sezamových semienok
      description: Špecifikuje, či je tahini vyrobené z lúpaných alebo nelúpaných
        sezamových semienok, čo ovplyvňuje farbu, chuť a nutričné hodnoty.
    sesame_seed_roast_level:
      name: Stupeň praženia sezamových semienok
      description: Označuje, ako veľmi boli sezamové semienka pražené pred mletím,
        čo pomáha nakupujúcim zvoliť si preferovanú intenzitu chuti.
    sesame_seed_variety:
      name: Odroda sezamových semienok
      description: Identifikuje farbu alebo odrodu sezamových semienok použitých na
        výrobu oleja.
    set_classification:
      name: Klasifikácia sady
      description: Definuje úroveň alebo štýl použitia kroketovej súpravy (napr. turnajová,
        rekreačná, cestovná).
    set_components:
      name: Komponenty sady
      description: Označuje, ktoré položky sú súčasťou produktu (napr. iba stredová
        palica alebo kompletná sada).
    set_items_included:
      name: Kusy súpravy v cene
      description: Určuje odevy alebo doplnky, ktoré sú súčasťou súpravy, napríklad
        látka na sárí, dupattu alebo opasok.
    setup_mechanism:
      name: Mechanizmus nastavenia
      description: Popisuje hlavný spôsob postavenia stanu (napr. samorozkladací,
        nafukovací/vzduchový, strešné véčko).
    setup_type:
      name: Typ nastavenia
      description: Spôsob postavenia alebo rozloženia hracieho stanu/tunela.
    sew_in_interfacing_elasticity:
      name: Elasticita všitej medzivrstvy
      description: Označuje, či je všitá medzivrstva elastická, a ak áno, v ktorom
        smere (smeroch), aby zodpovedala pleteným alebo tkaným projektom.
    sew_in_label_placement:
      name: Umiestnenie prišívacej etikety
      description: Označuje zamýšľané umiestnenie lokality na hotovej položke.
    sew_on_edge_finish:
      name: Prišívaná úprava okraja
      description: Označuje, či sú okraje suchého zipsu surové/strihané alebo povrchovo
        upravené tak, aby sa netrhali.
    sew_on_rhinestone_hole_orientation:
      name: Orientácia otvorov na prišívacích kamienkoch
      description: Usporiadanie/orientácia otvorov vo vzťahu ku kamienku (napr. vedľa
        seba, oproti sebe, do kríža) na podporu rôznych typov šitia.
    sewing_kit_components_included:
      name: Komponenty súpravy na šitie v cene
      description: Uvádza šijacie pomôcky/nástroje obsiahnuté v šijacej sade, aby
        si kupujúci mohli porovnať, čo jednotlivé sady obsahujú.
    sewing_machine_bobbin_class:
      name: Trieda cievky pre šijací stroj
      description: Určuje triedu/systém cievky kompatibilný so šijacím strojom pre
        cievky a puzdrá cievok.
    sewing_machine_buttonhole_type:
      name: Typ gombíkovej dierky na šijacom stroji
      description: Metóda vytvárania gombíkových dierok podporovaná strojom.
    sewing_machine_display_type:
      name: Typ displeja šijacieho stroja
      description: Typ ovládacieho/zobrazovacieho rozhrania na šijacom stroji.
    sewing_machine_needle_point_type:
      name: Typ špičky ihiel pre šijací stroj
      description: Definuje geometriu/typ špičky ihly, ktorá určuje spôsob prenikania
        do rôznych materiálov (napr. ostrá, guľôčková alebo klinová).
    sewing_machine_needle_system:
      name: Systém ihiel pre šijací stroj
      description: Štandardizovaný systém/označenie ihly, ktoré určuje kompatibilitu
        so šijacím strojom (napr. 130/705 H, HAx1, DBx1, 15x1 a pod.).
    sewing_machine_needle_type:
      name: Typ ihiel pre šijací stroj
      description: Špecifikuje zamýšľané použitie/typ ihly (napr. univerzálna, guľôčková,
        na džínsovinu), ktoré ovplyvňuje kvalitu stehu a vhodnosť pre rôzne materiály.
    sewing_machine_shank_type:
      name: Typ stopky šijacieho stroja
      description: Špecifikuje štandard uchytenia pätky (držiaka pätky / adaptéra
        pätky), pre ktorý je pätka navrhnutá, čím sa zabezpečuje kompatibilita so
        šijacím strojom (napr. nízke uchytenie, vysoké uchytenie, šikmé uchytenie).
    sewing_pattern_accessory_type:
      name: Typ príslušenstva k šijaciemu strihu
      description: Špecifikuje, aké príslušenstvo sa podľa šijacieho strihu vyrába.
    sewing_pattern_notions_required:
      name: Potrebné krajčírske pomôcky pre šijací strih
      description: Uvádza ďalšie potrebné materiály alebo kovania potrebné na dokončenie
        projektu (okrem látky a nite).
    sewing_pattern_recommended_fabric:
      name: Odporúčaná látka pre šijací strih
      description: Uvádza odporúčané typy/gramáže látok pre šijací strih (podľa návrhára
        strihu).
    sewing_pattern_size_range:
      name: Rozsah veľkostí šijacieho strihu
      description: Špecifikuje rozsah veľkostí, pre ktoré je šijací strih určený (napr.
        detské, dospelé alebo plus size veľkosti).
    sewing_thread_size_system:
      name: Systém označovania veľkosti šijacej nite
      description: Štandard veľkosti používaný na označenie hrúbky nite (napr. Tex,
        Denier, Ticket, hmotnostné číslo, V-číslo).
    shaft_curvature:
      name: Zakrivenie drieku
      description: Opisuje celkový tvar drieku, ktorý ovplyvňuje svetlú výšku, rozsah
        pohybu a ergonómiu.
    shaft_kick_point:
      name: Bod ohybu drieku
      description: Určuje polohu pozdĺž drieku, kde sa pri švihu najviac ohýba, čo
        ovplyvňuje trajektóriu letu šípky.
    shaft_length_type:
      name: Typ dĺžky hriadeľa
      description: Štandardné označenie veľkosti šípok (napr. krátke, stredné) používané
        v prípade, že nie sú k dispozícii presné milimetrové rozmery.
    shaft_shape:
      name: Tvar drieku
      description: Definuje prierezový tvar drieku tonfy (napr. okrúhly, štvorcový,
        osemhranný).
    shaker_fill_material:
      name: Výplňový materiál šejkra
      description: Špecifikuje hlavný vnútorný materiál výplne použitý na vytvorenie
        zvuku trasidla (ak je relevantné), napríklad guľôčky, semienka alebo kovové
        broky.
    shaker_shell_material:
      name: Vonkajší materiál šejkra
      description: Špecifikuje hlavný materiál tela/obalu vajíčkového trasidla (vonkajšieho
        plášťa).
    shallot_variety:
      name: Odroda šalotky
      description: Identifikuje konkrétny kultivar, predávaný druh alebo odrodu šalotkového
        produktu.
    shank_style:
      name: Štýl stopky
      description: Opisuje celkový tvar/konfiguráciu ramien pákového udidla (napr.
        rovné, zakrivené, mierne sklonené).
    shapewear_enhancement_feature:
      name: Funkcia na vylepšenie tvarujúcej bielizne
      description: Zdôrazňuje hlavné funkčné vylepšenie, ktoré odev poskytuje (napr.
        stiahnutie brucha, zdvihnutie zadku, nepriepustná podšívka).
    sheath_type:
      name: Typ puzdra
      description: Typ puzdra/pošvy dodávanej so zberateľským nožom.
    sheet_music_clip_padding_material:
      name: Vnútorný okraj materiálu obalu klipu na noty
      description: Vnútorný materiál akéhokoľvek polstrovania čeľustí/ úchopu, ktoré
        sa dotýka papiera alebo hrany stojana, aby sa zabránilo trhaniu a zošmykovaniu.
    sheet_music_clip_spring_tension_level:
      name: Úroveň pružinového prítlaku klipu na noty
      description: Relatívna sila pružiny klipu/upínacej sily.
    sheet_music_clip_use_environment:
      name: Prostredie použitia klipu na noty
      description: Primárne určené prostredie, v ktorom je klip navrhnutý tak, aby
        fungoval najlepšie.
    shell_construction:
      name: Konštrukcia korpusu
      description: Špecifikuje spôsob konštrukcie korpusu basového bubna, čo výrazne
        ovplyvňuje tón a hmotnosť.
    shell_finish:
      name: Povrchová úprava korpusu
      description: Povrchová úprava vonkajšieho korpusu doumbeku.
    shell_hull_status:
      name: Stav korpusu/plášťa
      description: Špecifikuje, či sa orechy alebo semená predávajú so škrupinou alebo
        šupkou, alebo bez nich.
    shift_boot_attachment_method:
      name: Spôsob uchytenia manžety radiacej páky
      description: Špecifikuje spôsob uchytenia manžety radiacej páky k stredovej
        konzole alebo rámu radiacej páky (napr. zacvakávací rámček, upevňovací krúžok,
        lepidlo).
    shift_boot_installation_hardware_included:
      name: Súčasťou balenia je montážny materiál na inštaláciu manžety radiacej páky
      description: Uvádza montážny materiál a komponenty dodávané spolu s manžetou
        radiacej páky.
    shift_knob_illumination:
      name: Osvetlenie radiacej páky
      description: Špecifikuje, či je radiaca páka osvetlená a typ alebo spôsob osvetlenia
        (napr. fotoluminiscenčné, LED, optické vlákno, podsvietený vzor).
    shift_knob_installation_method:
      name: Spôsob inštalácie radiacej páky
      description: Špecifikuje spôsob uchytenia hlavice k radiacej páke.
    shift_knob_shape:
      name: Tvar radiacej páky
      description: Opisuje celkový ergonomický tvar hlavice radiacej páky.
    shift_pattern_type:
      name: Typ vzoru radenia prevodových stupňov
      description: Špecifikuje štýl označenia prevodových stupňov na hlavici radiacej
        páky (ak je prítomné).
    shifter_compatibility:
      name: Kompatibilita radiacej páky
      description: Určuje, či je predĺženie riadidiel kompatibilné s elektronickým
        radením, mechanickým radením, s oboma typmi, alebo s radením nie je kompatibilné.
    shifter_mounting_interface:
      name: Rozhranie pre montáž radiacej páky
      description: Opisuje spôsob uchytenia radenia na bicykel (napr. samostatná objímka
        určitej veľkosti, I-Spec, MatchMaker, bar-end, na rám, bezdrôtové).
    shifting_actuation_type:
      name: Typ aktivácie radenia
      description: Identifikuje mechanizmus používaný na radenie prevodov v sade komponentov
        (mechanické, elektronické s káblovým prepojením, elektronické bezdrôtové,
        hydraulické).
    shifting_mechanism:
      name: Mechanizmus radenia
      description: Identifikuje, či radiaca páka funguje mechanicky alebo elektronicky
        a či je indexovaná alebo založená na trení.
    shim_purpose:
      name: Účel vymedzovacej podložky
      description: Definuje funkčný typ produktu (napr. podložka, klin, dištančný
        prvok), aby cyklisti mohli rýchlo nájsť správne riešenie nastavenia bez potreby
        samostatných podkategórií.
    shin_guard_attachment_method:
      name: Spôsob uchytenia chráničov predkolenia
      description: Klasifikuje celkový dizajn chrániča holení vrátane integrácie chrániča
        členku alebo konštrukcie ponožky.
    shirt_cuff_style:
      name: Štýl manžety na košeli
      description: Určuje konštrukciu manžety rukáva, ktorá ovplyvňuje formálnosť,
        použitie manžetových gombíkov a pohodlie.
    shochu_base_ingredient:
      name: Základná zložka šóčú
      description: Identifikuje hlavnú škrobovú alebo cukornú surovinu použitú na
        výrobu šóčú.
    shochu_soju_variety:
      name: Druh šóčú a soju
      description: Klasifikuje produkt podľa jeho uznávaného štýlu alebo typu výroby.
    shock_absorber_bushing_material:
      name: Materiál puzdra tlmiča
      description: Materiál montážnych puzdier alebo izolačných vložiek dodávaných
        spolu s tlmičom alebo integrovaných v tlmiči.
    shock_absorber_charge_type:
      name: Typ plnenia tlmiča
      description: Určuje technológiu plnenia alebo tlmenia tlmiča (napr. hydraulický/olejový,
        plynový, vzduchový) a prípadne aj typ konštrukcie tlmiča.
    shock_absorber_mount_type_lower:
      name: Typ uchytenia tlmiča (dolný)
      description: Typ spodného montážneho uchytenia tlmiča pre správnu kompatibilitu
        pri montáži.
    shock_absorber_mount_type_upper:
      name: Typ uchytenia tlmiča (horný)
      description: Určuje typ horného montážneho uchytenia tlmiča motorového vozidla
        pre správnu kompatibilitu pri montáži.
    shock_absorber_position:
      name: Poloha tlmiča nárazov
      description: Určuje, či je tlmič určený pre prednú, zadnú, ľavú alebo pravú
        pozíciu na vozidle (podrobnejšie než len určenie podľa nápravy).
    shock_absorption_system:
      name: Systém tlmenia nárazov
      description: Definuje mechanizmus používaný na zníženie vibrácií a hluku pri
        odraze.
    shoe_collar_height:
      name: Výška členkovej časti obuvi
      description: Klasifikuje obuv podľa výšky strihu okolo členka (nízka, stredná,
        vysoká) na určenie miery zakrytia a opory členka.
    shoe_cover_height:
      name: Výška návleku na obuv
      description: Určuje mieru zakrytia návleku na cyklistickú obuv – od návlekov
        na špičku až po vysoké kompletné návleky na topánky.
    shoe_sizing_system:
      name: Systém číslovania obuvi
      description: Určuje štandard číslovania (US, UK, EU, JP, Mondopoint a pod.)
        použitý pre uvedenú veľkosť obuvi.
    shoelace_aglet_material:
      name: Materiál na konce šnúrok do topánok
      description: Určuje materiál koncoviek na koncoch šnúrok, ktorý ovplyvňuje ich
        odolnosť a vzhľad.
    shooting_rest_design:
      name: Dizajn streleckej opierky
      description: Klasifikuje konštrukčný typ opierky (napr. vaková opierka, sanice,
        trojnožka, zverák na zbraň atď.).
    shooting_stick_yoke_design:
      name: Dizajn vidlice streleckej palice
      description: Špecifikuje typ lôžka alebo vidlice, ktorá sa dotýka zbrane alebo
        optiky.
    shooting_target_style:
      name: Štýl streleckého terča
      description: Klasifikuje štýl alebo dizajn terčov na krasokorčuľovanie a hokej,
        aby si zákazníci mohli vybrať požadované zameranie tréningu.
    shooting_target_type:
      name: Typ streleckého terča
      description: Klasifikuje strelecké terče podľa konštrukčného typu, materiálu
        alebo dizajnu (napr. gong, silueta, papierový terč s bullseye, rotujúci terč),
        čo strelcom umožňuje rýchlo nájsť vhodný terč pre ich disciplínu a typ zbrane.
    short_block_assembly_balance_type:
      name: Typ vyváženia zostavy krátkeho bloku
      description: Určuje, či je rotujúca zostava vyvážená interne alebo externe.
    short_block_intended_use:
      name: Zamýšľané použitie krátkeho bloku
      description: Primárne zamýšľané použitie pre krátky blok.
    short_block_rotating_assembly_included:
      name: Súčasťou balenia je rotujúca zostava krátkeho bloku
      description: Špecifikuje, ktoré hlavné komponenty rotujúcej zostavy sú súčasťou
        krátkeho bloku.
    shot_size:
      name: Veľkosť streliva
      description: Špecifikuje veľkosť streliva pre voľne ložené strely alebo komponenty
        streliva.
    shotgun_action_type:
      name: Typ mechanizmu brokovnice
      description: Špecifikuje ovládací mechanizmus/činnosť brokovnice.
    shotgun_choke_type:
      name: Typ zúženia hlavne brokovnice
      description: Špecifikuje konfiguráciu zúženia hlavne brokovnice.
    shotgun_gauge:
      name: Kaliber brokovnice
      description: Určuje kalibráciu hlavne brokovnice (a .410 otvor (ak je to relevantné)
        na identifikáciu a filtrovanie v zberateľských záznamoch.
    shotgun_stock_material:
      name: Materiál pažby brokovnice
      description: Špecifikuje hlavný materiál pažby a predpažbia (výbavy zbrane).
    shuffleboard_speed_rating:
      name: Hodnotenie rýchlosti shuffleboardu
      description: Udáva relatívnu rýchlosť kĺzania, ktorú na stole poskytuje prášok
        do shuffleboardu alebo iný údržbový prípravok, čo umožňuje hráčom zvoliť vhodnú
        rýchlosť podľa ich úrovne zručnosti a dĺžky stola.
    shuffleboard_table_length_compatibility:
      name: Kompatibilita dĺžky stola shuffleboardu
      description: Štandardná dĺžka stola shuffleboardu, pre ktorú je produkt navrhnutý
        tak, aby vyhovoval alebo ju dopĺňal.
    shuttlecock_base_material:
      name: Základný materiál bedmintonového košíka
      description: Určuje materiál použitého na hlavičku/telo bedmintonového košíka,
        ktorý ovplyvňuje odolnosť, pocit pri hre a odraz.
    shuttlecock_feather_material:
      name: Materiál bedmintonového košíka
      description: Identifikuje primárny zdroj peria alebo typ konštrukcie použitý
        na sukničke bedmintonového košíka, ktorý ovplyvňuje trvanlivosť, konzistenciu
        a cenu.
    shuttlecock_grade:
      name: Trieda bedmintonového košíka
      description: Špecifikuje zamýšľanú úroveň hry alebo klasifikáciu kvality (napr.
        tréning, klub, súťaž).
    shuttlecock_speed_rating:
      name: Hodnotenie rýchlosti bedmintonového košíka
      description: Špecifikuje rýchlosť alebo rýchlostné hodnotenie bedmintonového
        košíka stanovené výrobcom, ktoré umožňuje hráčom zvoliť správnu rýchlosť letu
        podľa herných podmienok, teploty a nadmorskej výšky.
    side_panel_installation_state:
      name: Stav inštalácie bočného panela
      description: Špecifikuje, či je bočný panel dodávaný bez povrchovej úpravy,
        natretý základným náterom, namaľovaný alebo inak pokrytý/pripravený na inštaláciu.
    side_wall_mechanism:
      name: Mechanizmus bočnej steny
      description: Opisuje spôsob otvárania alebo spúšťania bočnej steny postieľky
        pre prístup k dieťaťu.
    signal_source:
      name: Zdroj signálu
      description: Určuje, akým spôsobom odometer prijíma alebo odvodzuje informácie
        o vzdialenosti alebo čase.
    silk_fiber_type:
      name: Typ hodvábneho vlákna
      description: Typ alebo pôvod hodvábneho vlákna použitého na výrobu tkaniny (napr.
        morušový alebo tussahový), ktorý ovplyvňuje textúru, rovnomernosť a cenu.
    simulated_game_species:
      name: Simulované druhy zveri
      description: Označuje konkrétny druh vtáka alebo zvieraťa, ktoré figurína napodobňuje
        pre realistický tréning.
    singlet_cut_style:
      name: Štýl strihu tielka
      description: Určuje strih/štýl zápasníckeho tielka s ohľadom na výšku ramienok,
        strih chrbta a rozdiely podľa pohlavia alebo veku.
    sink_material:
      name: Materiál dresu
      description: Špecifikuje materiál integrovaného umývadla (umývadiel), ktoré
        je súčasťou kúpeľňovej skrinky.
    sinker_attachment_style:
      name: Štýl pripevnenia závažia
      description: Opisuje mechanizmus na bankovom závaží určený na jeho pripevnenie
        k rybárskej šnúre alebo zostave.
    sinker_finish:
      name: Povrchová úprava závažia
      description: Určuje vonkajší náter alebo povrchovú úpravu závažia.
    sinker_shape:
      name: Tvar olovka
      description: Definuje geometrický tvar závažia (napr. guľka, valec, slza), aby
        si rybári mohli zvoliť optimálnu prezentáciu nástrahy a odolnosť proti zachytávaniu.
    siren_system_included:
      name: Sirénový systém je súčasťou balenia
      description: Určuje, či je nainštalovaná siréna/ozvučovací (PA) systém a aký
        je jeho typ.
    siren_system_type:
      name: Typ sirénového systému
      description: Určuje inštalovanú konfiguráciu sirény/ozvučovacieho (PA) systému
        na policajnom vozidle.
    size_designation:
      name: Označenie veľkosti
      description: Štandardizované označenie veľkosti triangla.
    size_system:
      name: Systém veľkosti
      description: Určuje systém veľkosti alebo regionálny štandard, ku ktorému označenie
        veľkosti patrí (napr. US, UK, EU, medzinárodné písmenové označenie).
    sizzle_mechanism:
      name: Mechanizmus sizzle efektu
      description: Špecifikuje, akým spôsobom činel vytvára sizzle efekt (napr. nity
        inštalované v čineli, pripojiteľná reťaz/sizzler alebo bez dodaného príslušenstva).
    skate_blade_discipline:
      name: Krasokorčuliarska disciplína
      description: Určuje korčuliarsku disciplínu alebo použitie, pre ktoré je čepeľ
        navrhnutá (napr. hokej alebo krasokorčuľovanie), aby si nakupujúci mohli filtrovať
        vhodné čepele.
    skate_brake_type:
      name: Typ brzdy korčule
      description: Identifikuje typ brzdového mechanizmu, ktorý je súčasťou korčúľ.
    skateboard_nut_thread_size:
      name: Rozmer závitu matice na skateboarde
      description: Špecifikuje veľkosť závitu (priemer a stúpanie) matice, aby bola
        zabezpečená kompatibilita s oskami skateboardu, hlavnými skrutkami alebo montážnym
        hardvérom.
    skein_winder_bearing_bushing_type:
      name: Typ ložiska/puzdra navíjača klbiek
      description: Určuje typ ložiska alebo puzdra použitého v rotačnej zostave navíjača
        klbka.
    skein_winder_drive_type:
      name: Typ pohonu navíjača klbka
      description: Ako sa navíjač klbka napája/otáča počas používania.
    ski_binding_mechanism:
      name: Mechanizmus viazania lyží
      description: Definuje základný mechanický dizajn alebo disciplínu viazania (napr.
        alpské, tech/pin, telemark).
    ski_binding_part_type:
      name: Typ dielu lyžiarskeho viazania
      description: Identifikuje konkrétny komponent alebo príslušenstvo lyžiarskeho
        viazania, čo umožňuje rýchle filtrovanie medzi rôznymi typmi dielov.
    ski_boot_sole_standard:
      name: Štandardná podrážka lyžiarskych topánok
      description: Identifikuje jedinú normu alebo štandard kompatibility viazania,
        pre ktorý je lyžiarska topánka certifikovaná.
    skill_focus:
      name: Zameranie na zručnosť
      description: Identifikuje primárnu basketbalovú zručnosť, ktorú má tréningová
        pomôcka rozvíjať.
    skimboard_construction:
      name: Konštrukcia skimboardu
      description: Opisuje primárnu konštrukciu dosky so zameraním na jadro a techniku
        vrstvenia (napr. penové jadro, drevené jadro).
    skin_presence:
      name: Prítomnosť kože
      description: Určuje, či sa kura predáva s kožou, bez kože alebo s čiastočne
        odstránenou.
    slapstick_handle_type:
      name: Typ rukoväte slapstick
      description: Opisuje štýl úchopu/rukoväte integrovaného do slapsticku, ktorý
        ovplyvňuje ergonómiu a komfort pri používaní.
    slapstick_playing_surface_material:
      name: Materiál povrchu slapsticku
      description: Špecifikuje materiál úderových prvkov, ktoré sa navzájom dotýkajú
        a vytvárajú zvuk.
    sled_brake_type:
      name: Typ brzdy sánok
      description: Špecifikuje brzdový mechanizmus saní, ak je súčasťou výbavy.
    sled_towing_method:
      name: Metóda ťahania saní
      description: Určuje hlavný spôsob ťahania saní.
    sleep_position_suitability:
      name: Vhodné polohy spánku
      description: Udáva, pre ktoré polohy spánku je matrac navrhnutý tak, aby poskytoval
        najlepšiu oporu.
    sleeping_bag_shape:
      name: Tvar spacieho vaku
      description: Celkový strih spacieho vaku, ktorý ovplyvňuje tepelný komfort,
        hmotnosť a vnútorný priestor.
    sleeping_pad_type:
      name: Typ karimatky
      description: Určuje konštrukčný typ karimatky (napr. penová s uzavretými bunkami
        alebo nafukovacia), ktorý ovplyvňuje komfort, hmotnosť a izolačné vlastnosti.
    sleepwear_set_pieces_included:
      name: Kusy v súprave pyžama v cene
      description: Uvádza jednotlivé časti, ktoré sú súčasťou viacdielneho pyžama
        alebo domáceho oblečenia.
    sleeve_bearing_type:
      name: Typ klzného ložiska
      description: Identifikuje technológiu umožňujúcu rotáciu puzdra, ktorá ovplyvňuje
        kvalitu otáčania pri olympijských zdvihoch.
    sleeve_style:
      name: Štýl rukáva
      description: Špecifikuje štýl rukáva okrem dĺžky (napr. raglán).
    slide_board_accessories_included:
      name: Vrátane príslušenstva ku slidu
      description: Uvádza doplnkové položky balené spolu so slidom, aby nakupujúci
        presne vedeli, čo je súčasťou balenia a mohli porovnávať jednotlivé balíky
        (sety).
    slide_installation_type:
      name: Typ montáže posuvných prvkov
      description: Ako sa má slide nainštalovať alebo namontovať (samostatne, pripevnená
        k hernej zostave atď.).
    slide_intended_finger:
      name: Nasaďte na určený prst
      description: Označuje, na ktorom prste sa má slide nosiť, alebo či sa naň nevzťahuje
        (napr. tónová lišta).
    slide_safety_features:
      name: Bezpečnostné prvky slidu
      description: Bezpečnostné dizajnové prvky zahrnuté na slide.
    slide_type:
      name: Typ slidu
      description: Špecifikuje, ktorý typ(y) mosadzného slide je výrobok určený na
        čistenie.
    slide_water_use_capability:
      name: Možnosť používania vody na šmýkačke
      description: Či je šmýkačka určená na použitie s vodou (napr. pripojenie hadice)
        a ako.
    slime_putty_kit_components_included:
      name: Súčasťou balenia súpravy je sliz a plastelína
      description: Uvádza nástroje a prídavné komponenty zahrnuté v produkte so slizom/plastelínou
        (najmä v súpravách a balíkoch).
    sling_material:
      name: Materiál popruhu
      description: Špecifikuje vlákno/textil použitý v slučke expresky.
    smith_machine_bar_path:
      name: Dráha tyče Smithovho stroja
      description: Opisuje pevne danú dráhu pohybu tyče a informuje používateľov o
        biomechanike a priestorových nárokoch.
    smoke_color:
      name: Dymová farba
      description: Farba dymu produkovaného svetlicou/dymovým signálom (odlišná od
        farby tela produktu).
    smoked_malt_smoking_material:
      name: Dymový materiál použitý na údenie sladu
      description: Pri údených sladoch určuje materiál použitý počas údenia (napr.
        konkrétny druh dreva alebo rašelina).
    snack_mix_variety:
      name: Rôzne druhy pochutín
      description: Klasifikuje produkt podľa druhu zmesi (napr. trail mix, nut mix,
        namkeen, sev).
    snack_processing_method:
      name: Metóda spracovania občerstvenia
      description: Uvádza hlavný spôsob spracovania alebo konzervácie použitý pri
        výrobe snacku (napr. lyofilizovaný, pečený, pražený).
    snack_texture:
      name: Textúra občerstvenia
      description: Uvádza fyzický pocit pri hryzení alebo textúru sezamových tyčiniek
        v ústach.
    snap_installation_method:
      name: Metóda inštalácie aplikácie Snap
      description: Ako sa cvok inštaluje alebo pripevňuje k materiálu projektu.
    snare_drum_bearing_edge_profile:
      name: Profil hrany rezonančnej dosky malého bubna
      description: Profil/tvar hrany korpusu malého bubna.
    snare_drum_finish_type:
      name: Typ povrchovej úpravy malého bubna
      description: Vysokokvalitná povrchová úprava/typ použitý na korpuse malého bubna.
    snare_drum_hoop_type:
      name: Typ obruče pre malý bubon
      description: Typ obručí/ráfikov použitých na malom bubne.
    snare_drum_mounting_type:
      name: Typ inštalácie malého bubna
      description: Ako sa má malý bubon namontovať/používať.
    snare_drum_shell_material:
      name: Materiál korpusu malého bubna
      description: Špecifikuje kov/zliatinu použitú na korpuse malého bubna (hlavnom
        tele), ktorá výrazne ovplyvňuje tón, hmotnosť a odolnosť.
    snare_drum_strainer_mechanism:
      name: Mechanizmus sitka malého bubna
      description: Typ mechanizmu výstuhy/odstránenie výstuhy malého bubna, ktorý
        sa používa na zapojenie/odpojenie drôtov malého bubna.
    snare_drum_strainer_type:
      name: Typ sitka pre malý bubon
      description: Typ mechanizmu výstuhy/odstránenie výstuhy malého bubna, ktorý
        sa používa na zapojenie/odpojenie drôtov malého bubna.
    snare_hoop_type:
      name: Typ obruče pre malý bubon
      description: Typ obručí/ráfikov na malom bubne.
    snare_throw_off_type:
      name: Typ mechanizmu vypínania strún malého bubna
      description: Typ mechanizmu na sťahovanie/vyhadzovanie používaného na zapojenie/odpojenie
        drôtov malého bubna.
    snip_cutter_spring_mechanism:
      name: Pružinový mechanizmus strihacieho noža
      description: Označuje, či strihací nôž používa pružinový/vratný mechanizmus
        a aký je jeho typ.
    snorkel_mount_position:
      name: Poloha uchytenia šnorchla
      description: Opisuje, kde je šnorchel umiestnený na hlave používateľa počas
        používania.
    snorkel_top_type:
      name: Typ vrchnej časti šnorchla
      description: Opisuje štýl ochrany proti vniknutiu vody v hornej časti šnorchla,
        ktorá je súčasťou súpravy.
    snow_condition_suitability:
      name: Vhodné do snehových podmienok
      description: Opisuje hlavné snehové podmienky, pre ktoré je vosk určený.
    snow_sports_helmet_safety_certification:
      name: Bezpečnostná certifikácia prilby pre zimné športy
      description: Uvádza bezpečnostnú normu (normy), ktoré prilba spĺňa pre použitie
        pri lyžovaní a snowboardingu.
    snowboard_base_material:
      name: Materiál sklznice snowboardu
      description: Určuje zloženie alebo povrchovú úpravu sklznice (extrudovaná, sintrovaná,
        vlastné zmesi), ktorá ovplyvňuje rýchlosť, odolnosť a náročnosť údržby.
    snowboard_width_class:
      name: Šírková kategória snowboardu
      description: Kategorizuje celkovú šírku dosky vzhľadom na veľkosť topánky (napr.
        štandardná, široká).
    soccer_ball_compartment_type:
      name: Typ priehradky na futbalovú loptu
      description: Určuje, ako (alebo či) sa do batohu zmestí futbalová lopta.
    soccer_ball_type:
      name: Typ futbalovej lopty
      description: Špecifikuje zamýšľané použitie alebo štýl futbalovej lopty (napr.
        zápasová, tréningová, futsalová), aby nakupujúci mohli rýchlo nájsť správny
        variant bez potreby mnohých podkategórií.
    soccer_dummy_base_type:
      name: Typ základne futbalovej figuríny
      description: Opisuje štýl základne alebo upevňovacieho mechanizmu, ktorý figurína
        používa.
    soccer_dummy_design:
      name: Dizajn futbalovej figuríny
      description: Určuje konštrukčný štýl figuríny futbalovej bránky, napríklad pevnú
        alebo nafukovaciu.
    soccer_goal_target_style:
      name: Štýl cieľovej plachty alebo terča na futbalovej bránke
      description: Definuje fyzickú formu alebo dizajn tréningového terča, aby si
        nakupujúci mohli vybrať štýl najvhodnejší pre ich tréningové cvičenia.
    soccer_goal_type:
      name: Typ futbalovej bránky
      description: Uvádza konštrukčný typ alebo určené použitie bránky (napr. skladacia,
        odrážacia, pouličná).
    sock_cushioning:
      name: Tlmenie v ponožke
      description: Uvádza množstvo a typ tlmenia alebo výplne pod chodidlom v ponožke.
    sock_cushioning_level:
      name: Úroveň tlmenia ponožky
      description: Určuje množstvo tlmenia pod chodidlom integrovaného do ponožky.
    sock_grip_type:
      name: Typ protišmykovej úpravy ponožky
      description: Opisuje protišmykové alebo trakčné prvky aplikované na podrážku
        ponožky.
    sock_toe_style:
      name: Štýl špičky ponožky
      description: Opisuje konštrukčný štýl špičkovej časti ponožky.
    soft_bait_style:
      name: Štýl mäkkej nástrahy
      description: Klasifikuje tvar alebo profil tela mäkkej plastovej nástrahy (napr.
        červ, swimbait, grub).
    soft_top_attachment_type:
      name: Typ upevnenia plátenej strechy
      description: Uvádza spôsob uchytenia mäkkej strechy k vozidlu (napr. lišty/kanály,
        cvoky, suchý zips a pod.).
    soft_top_includes_frame_hardware:
      name: Uvádza, či mäkká strecha obsahuje rám alebo montážne kovanie
      description: Uvádza, či produkt obsahuje rám mäkkej strechy a/alebo montážne
        kovanie.
    soft_top_installation_type:
      name: Typ montáže mäkkej strechy
      description: Určuje spôsob montáže/pripevnenia mäkkej strechy vozidla s uvedením
        očakávaného spôsobu montáže a požadovaného úsilia.
    soft_top_window_configuration:
      name: Konfigurácia pláteného okna
      description: Zobrazuje, koľko okien má mäkká strecha a aké sú prítomné polohy.
    softball_certification:
      name: Softbalová certifikácia
      description: Uvádza pečiatky alebo schválenia riadiacich orgánov vytlačené na
        lopte, ktoré určujú jej oprávnenie na použitie v lige alebo zápase.
    softness_level:
      name: Úroveň mäkkosti
      description: Označuje mäkkosť/nízkosť profilu strany so slučkou, čo je dôležité
        pre pohodlie pri priliehaní k pokožke a pre nízkoprofilové použitie.
    solar_system_model_included_bodies:
      name: Model slnečnej sústavy vrátane telies
      description: Označuje, ktoré nebeské telesá sú zastúpené v modelovej sade.
    solar_system_model_scaling:
      name: Mierka modelu slnečnej sústavy
      description: Uvádza, či je model slnečnej sústavy v mierke pre veľkosti planét,
        vzdialenosti/obežné dráhy, oboje, alebo ide o schematické zobrazenie bez mierky.
    sold_secure_certification_level:
      name: Úroveň certifikácie Sold Secure
      description: Uvádza hodnotenie Sold Secure, ktoré zámku udelila nezávislá britská
        testovacia organizácia (bronz, striebro, zlato, diamant).
    sold_secure_rating:
      name: Hodnotenie Sold Secure
      description: Uvádza úroveň certifikácie Sold Secure pridelenú zámku.
    sole_construction:
      name: Konštrukcia podrážky
      description: Uvádza, ako je skonštruovaná podrážka topánky (celá, delená, dvojdielna
        atď.), čo priamo ovplyvňuje flexibilitu, kontakt s podlahou a vhodnosť pre
        konkrétne tanečné techniky.
    sole_type:
      name: Typ podrážky
      description: Opisuje konštrukčný štýl podrážky, ktorý určuje jej flexibilitu
        a určené použitie.
    soprano_saxophone_body_style:
      name: Tvar tela soprán saxofónu
      description: Opisuje fyzickú konfiguráciu tela soprán saxofónu.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Typ náustku pre sopránový saxofón s prepážkou
      description: Opisuje dizajn prepážky/strechy náustku (obrys za hrotom), ktorý
        ovplyvňuje jas, projekciu a odozvu.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Veľkosť komory náustku pre sopránový saxofón
      description: Opisuje veľkosť vnútornej komory náustku soprán saxofónu, ktorá
        ovplyvňuje odpor a tónovú farbu.
    soprano_saxophone_mouthpiece_finish:
      name: Povrchová úprava náustku pre sopránový saxofón
      description: Povrchová úprava/pokovovanie aplikované na náustok (ak je relevantné).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Náustok pre soprán saxofón vrátane príslušenstva
      description: Identifikuje, ktoré príslušenstvo je súčasťou balenia náustku.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Tónový charakter náustku pre soprán saxofón
      description: Vysoký tónový profil bežne spojený s dizajnom náustku.
    sound_character:
      name: Charakter zvuku
      description: Opisuje všeobecný charakter zvuku (timbre), ktorý vytvára slapstick.
    sound_expansion_method:
      name: Metóda zvukovej expanzie
      description: Špecifikuje, akým spôsobom môže modul rozširovať alebo dopĺňať
        svoju internú zvukovú knižnicu nad rámec továrenských zvukov (napr. obsahové
        balíčky, import samplov, rozširujúce karty).
    sound_module_sound_library_focus:
      name: Zameranie zvukovej knižnice zvukového modulu
      description: Hlavné zameranie továrenskej sady zvukov, ktoré pomáha zákazníkom
        vybrať správny modul podľa štýlu alebo spôsobu použitia.
    sound_port_type:
      name: Typ zvukového portu
      description: Opisuje dizajn zvukového otvoru/portu na zadnej strane cajonu,
        ktorý ovplyvňuje projekciu zvuku a basovú odozvu.
    sound_sensitivity_control:
      name: Ovládanie citlivosti zvuku
      description: Uvádza, či a akým spôsobom možno nastavovať citlivosť zvuku.
    sound_synthesizer_patch_memory:
      name: Pamäť pre zvukové presety syntetizátora
      description: Uvádza, či syntetizátor dokáže ukladať a vyvolávať presety.
    sound_type:
      name: Typ zvuku
      description: Primárny(e) typ(y) zvuku alebo zvukové výstupy, ktoré podložka
        produkuje (napr. nástroje, piesne, hlasové pokyny) na spustenie hry.
    soundboard_material:
      name: Materiál rezonančnej dosky
      description: Materiál použitý na rezonančnú dosku harfy (hornú), ktorá riadi
        rezonanciu a tón.
    soup_or_broth_variety:
      name: Polievka alebo vývar rôznych druhov
      description: Špecifikuje štýl, recept alebo kulinársku úpravu polievky alebo
        vývaru, aby nakupujúci mohli rýchlo nájsť svoj preferovaný druh.
    sour_cream_variety:
      name: Druh kyslej smotany
      description: Klasifikuje produkty z kyslej smotany podľa konkrétneho druhu alebo
        kultúrneho štýlu, ako napríklad crème fraîche alebo mexická crema.
    soy_sauce_variety:
      name: Druh sójovej omáčky
      description: Identifikuje špecifický štýl alebo zloženie sójovej omáčky (napr.
        svetlá, tmavá, tamari, ponzu), čo umožňuje nakupujúcim rýchlo filtrovať podľa
        chuťového profilu a kulinárskeho použitia.
    spark_plug_electrode_material:
      name: Materiál elektródy zapaľovacej sviečky
      description: Materiál/technológia koncov elektród zapaľovacej sviečky (stredovej
        a/alebo uzemňovacej), ako je uvádzaná výrobcom (napr. meď, platina, irídium).
    spark_plug_seat_type:
      name: Typ sedla zapaľovacej sviečky
      description: Tesnenie/sedlo používané zapaľovacou sviečkou na rozhraní hlavy
        valcov.
    spark_plug_terminal_type:
      name: Typ svorky zapaľovacej sviečky
      description: Štýl vrchného kontaktu používaného na pripojenie zapaľovacieho
        kábla/konektora.
    sparkler_shape:
      name: Tvar prskaviek
      description: Celkový dekoratívny tvar/prevedenie prskavky.
    speaker_cone_material:
      name: Materiál membrány reproduktora
      description: Hlavný materiál membrány reproduktora (woofera/stredového reproduktora).
    speaker_size:
      name: Veľkosť reproduktora
      description: Menovitá veľkosť meniča/montážny rozmer komponentného reproduktora
        (napr. 6,5″, 6×9″), používaný v súlade s továrenskými montážnymi miestami
        a adaptérmi reproduktorov.
    special_effects_output_interface:
      name: Rozhranie pre výstup špeciálnych efektov
      description: Určuje výstupný konektor/rozhranie používané na ovládanie špeciálnych
        efektov zariadenia.
    special_effects_stand_stability_features:
      name: Funkcie stability stojana pre špeciálne efekty
      description: Špecifikuje zabudované prvky stability a bezpečnosti, ktoré majú
        zabrániť prevráteniu alebo šmýkaniu počas podujatí.
    specialty_malt_name_type:
      name: Názov/druh špeciálneho sladu
      description: Identifikuje konkrétny pomenovaný druh špeciálneho sladu (často
        používaný ako komerčný názov štýlu).
    specimen_presentation:
      name: Prezentácia vzorky
      description: Označuje, ako je zberateľský exemplár pripravený alebo prezentovaný
        (napr. surový/nepripravený, leštený, brúsený alebo zasadený).
    speed_bag_accessories_included:
      name: Príslušenstvo k boxovacím hruškám v cene
      description: Uvádza ďalšie položky dodávané so speed bagom, ako napr. rukavice,
        pumpy, otočné závesy, reťaze alebo stojany.
    speed_rating:
      name: Index rýchlosti
      description: Označuje rýchlosť hracej plochy, ktorú zabezpečuje súkno biliardového
        stola (napr. pomalá, stredná alebo rýchla).
    speedometer_backlight_type:
      name: Typ podsvietenia rýchlomera
      description: Špecifikuje, či a akým spôsobom je rýchlomer podsvietený pre viditeľnosť
        v noci.
    speedometer_display_type:
      name: Typ zobrazenia tachometra
      description: 'Uvádza typ zobrazenia rýchlosti na tachometri: analógová ručička/ciferník,
        digitálne číselné zobrazenie alebo kombinácia analógových a digitálnych prvkov.'
    speedometer_unit_of_measure:
      name: Jednotka tachometra
      description: Určuje jednotky rýchlosti zobrazené na číselníku/displeji.
    spike_replaceability:
      name: Vymeniteľnosť hrotov
      description: Uvádza, či sú hroty na obuvi vymeniteľné, pevné alebo či je obuv
        bez hrotov.
    spike_shape:
      name: Tvary hrotov
      description: Určuje geometrický tvar špičky hrotu, ktorý ovplyvňuje priľnavosť
        a vhodnosť pre rôzne povrchy dráhy.
    spike_thread_size:
      name: Veľkosť závitu hrotu
      description: Špecifikuje veľkosť alebo štandard závitovej základne, ktorá sa
        skrutkuje do obuvi (napr. 1/4-20).
    spin_classification:
      name: Klasifikácia vývrtiek
      description: Uvádza profil rotácie, pre ktorý je disk určený (nízka, stredná,
        vysoká, hyper rotácia).
    spin_profile:
      name: Profil vývrtky
      description: Špecifikuje relatívne rotačné vlastnosti, ktoré driek palice podporuje.
    spin_types_supported:
      name: Podporované typy rotácie
      description: Uvádza typy rotácie, ktoré dokáže stroj udeliť loptičkám, aby hráči
        mohli trénovať proti rôznym štýlom úderov.
    spinach_preparation_style:
      name: Štýl prípravy špenátu
      description: Opisuje spôsob spracovania špenátových listov alebo formát produktu
        (napr. celé listy, sekaný, kocky).
    spinach_variety:
      name: Odroda špenátu
      description: Identifikuje botanickú alebo trhovú odrodu špenátu (napr. baby,
        savoy, water, red), umožňujúcu nakupujúcim vybrať si presný druh, ktorý chcú.
    spindle_bearing_surface_material:
      name: Materiál povrchu ložiska vretena
      description: Materiál špičky alebo ložiskovej opornej plochy použitý vo vretenových
        podperách (horná/vrchná alebo spodná časť), ktorý ovplyvňuje hladkosť chodu
        a opotrebenie.
    spindle_bearing_type:
      name: Typ ložiska vretena
      description: Typ špičky vretena alebo rozhrania ložiska, ktoré znižuje trenie
        o opornú misku/šálku.
    spindle_finish:
      name: Povrchová úprava vretena
      description: Povrchová úprava/povlak vretena, ktorý ovplyvňuje pocit pri používaní,
        odolnosť a vzhľad.
    spindle_hook_type:
      name: Typ háku vretena
      description: Mechanizmus zachytávania nite v hornej časti vretena slúžiaci na
        zaistenie vodiaceho prvku/nite.
    spindle_support_method:
      name: Spôsob uloženia vretena
      description: Ako má byť vreteno uložené počas pradenia.
    spindle_tip_style:
      name: Štýl špičky vretena
      description: Tvar/dizajn špičky, ktorá sa opiera o misku/šálku (ložiskovú plochu),
        a ovplyvňuje trenie a plynulosť otáčania.
    spindle_whorl_position:
      name: Poloha valca vretena
      description: Umiestnenie vretenového kotúča na drieku vretena.
    spinner_blade_shape:
      name: Tvar lopatky rotačnej nástrahy
      description: Určuje hlavný tvar lopatky použitej na rotačnej nástrahe, ktorý
        ovplyvňuje vibrácie, odlesky a hĺbku vedenia.
    spinner_control_card_design_type:
      name: Dizajn/typ kontrolnej karty rotačnej nástrahy
      description: Opisuje typ kontrolnej karty rotačnej nástrahy podľa spôsobu zobrazenia
        informácií o ovládaní (napr. referenčný pomer, referenčné napätie, prevodná
        tabuľka).
    spinner_subtype:
      name: Podtyp odstredivky
      description: Klasifikuje celkový dizajn alebo typ rotačnej nástrahy (napr. inline
        spinner, spinnerbait).
    spinning_oil_application_area:
      name: Oblasť aplikácie pradiarenského oleja
      description: Špecifikuje určené miesto alebo miesta aplikácie oleja na kolovrátku.
    spinning_oil_application_tool:
      name: Nástroj na nanášanie pradiarenského oleja
      description: Uvádza typ aplikačného hrotu/balenia používaného na nanášanie oleja
        na časti kolovrátku pre presné dávkovanie.
    spinning_oil_features:
      name: Vlastnosti pradiarenského oleja
      description: Zdôrazňuje funkčné vlastnosti olejov pre kolovrátok (zvyšky, zafarbenie,
        oxidácia a zmývateľnosť).
    spinning_top_features:
      name: Funkcie vĺčika
      description: Špeciálne herné vlastnosti vĺčika nad rámec základného otáčania.
    spinning_top_launch_mechanism:
      name: Mechanizmus spúšťania vĺčika
      description: Ako sa vĺčik spúšťa/poháňa na pradenie.
    spinning_wheel_brake_tension_system_type:
      name: Typ brzdového/napínacieho systému kolovrátku
      description: Špecifikuje brzdový/napínací systém používaný na reguláciu navíjania
        priadze.
    spinning_wheel_drive_system:
      name: Pohon kolovratu
      description: Uvádza pohonný systém, pre ktorý je cievka určená.
    spinning_wheel_hook_system:
      name: Systém pohonu kolovratu
      description: Špecifikuje, ako je priadza vedená pozdĺž ramien kolovrátku.
    spinning_wheel_part_application:
      name: Použitie časti kolovrátku
      description: Špecifikuje, pre ktoré časti kolovrátku je olej určený.
    spinning_wheel_portability_foldability:
      name: Prenosnosť/skladanie kolovrátku
      description: Uvádza, či je kolovrátok navrhnutý tak, aby sa dal zložiť pri preprave.
    spinning_wheel_tension_adjustment_type:
      name: Typ nastavenia napnutia kolovrátku
      description: Ako sa na kolovrátku nastavuje napätie pre kontrolu navíjania priadze.
    splice_termination_type:
      name: Typ spoja/ukončenia
      description: Špecifikuje ukončenie na kotviacom lane (napr. spletené oko, očnica,
        reťazový hák).
    split_shot_cut_type:
      name: Typ rezu olovených brokov
      description: Špecifikuje typ drážky alebo otvoru, ktorý umožňuje pripevnenie
        na vlasec.
    split_shot_shape:
      name: Tvar olovených brokov
      description: Opisuje fyzickú formu oloveného broku, ktorá ovplyvňuje hydrodynamiku
        a odolnosť voči zachytávaniu.
    split_shot_size:
      name: Veľkosť olovených brokov
      description: Štandardizovaný alfanumerický kód veľkosti (napr. SSG, AAA, BB,
        1) používané výrobcami a rybármi na klasifikáciu olovených brokov. Dopĺňa
        presné merania hmotnosti.
    spoiler_adjustability:
      name: Nastaviteľnosť spojlera
      description: Označuje, či je uhol/výška spojlera nastaviteľná.
    spoke_accessory_function:
      name: Funkcia príslušenstva pre špice kolesa
      description: Klasifikuje hlavnú funkciu príslušenstva na koleso, napríklad dekoratívnu,
        reflexnú alebo osvetľovaciu.
    spoke_butting_profile:
      name: Profil zoslabovania špíc kolesa
      description: Opisuje, ako sa mení priemer špice pozdĺž jej dĺžky (hladká, jedno-,
        dvoj-, troj- alebo štvorstupňovo zoslabovaná), čo ovplyvňuje hmotnosť a pevnosť.
    spoke_gauge:
      name: Meradlo špíc
      description: Určuje hrúbku drôtu (hrúbku drôtu) špíc, s ktorými je nipl kompatibilný.
    spoke_interface_type:
      name: Typ rozhrania kolesa s výpletom
      description: Uvádza typ hlavičky špice, pre ktorý je náboj navrhnutý (J-bend,
        straight-pull, T-head).
    spoke_shape:
      name: Tvary špíc
      description: Špecifikuje vonkajší prierez špice, ktorý ovplyvňuje aerodynamiku
        a vzhľad.
    spool_form_factor:
      name: Tvarový faktor cievky
      description: Fyzický tvar tela cievky a spôsob, akým je na nej uchytená niť/priadza
        (napr. s prírubou alebo kužeľová).
    spoon_style:
      name: Lyžicový štýl
      description: Označuje funkčný podtyp alebo štýl lyžice, ako napríklad nahadzovanie,
        trepotanie alebo trolling.
    sports_bra_padding_type:
      name: Športová podprsenka s vnútorným okrajom
      description: Určuje typ vnútorného okraja športovej podprsenky.
    sports_cap_style:
      name: Štýl športovej čiapky
      description: Určuje celkový typ zhotovenie/štýl čiapky (napr. baseballová čiapka,
        snapback), nezávisle od tímovej značky.
    sports_governing_body_certification:
      name: Certifikácia športovej riadiacej organizácie
      description: Označuje oficiálne certifikáty alebo schválenia od uznávaných športových
        riadiacich orgánov, ktoré potvrdzujú, že produkt spĺňa súťažné štandardy.
    sports_surface_compatibility:
      name: Kompatibilita športových povrchov
      description: Uvádza typy hracích alebo povrchových úprav, na ktoré sa farba
        dá bezpečne aplikovať.
    sports_toy_set_contents:
      name: Obsah sady športových hračiek
      description: Identifikuje, aké komponenty sú súčasťou športovej hračkárskej
        sady (napr. lopta, pálka, sieť, terče).
    spray_string_cleanup_method:
      name: Spôsob čistenia pomocou spreja
      description: Odporúčaný spôsob odstránenia/čistenia zvyškov rozprašovača.
    spray_string_finish_effect:
      name: Povrchová úprava/efekt spreja
      description: Vizuálny efekt aplikovaného spreja (lesk/odrazivosť a špeciálne
        efekty).
    spray_string_formulation_type:
      name: Typ zloženia spreja
      description: Ako sa produkt správa počas a po striekaní (napr. umývateľný verzus
        permanentný).
    spray_string_recommended_surface:
      name: Odporúčaný povrch na aplikáciu spreja
      description: Typy povrchov, na ktoré je sprej určený (a ktoré pravdepodobne
        vyčistí).
    spray_string_scent:
      name: Vôňa spreja
      description: Profil vône alebo zápachu spreja, ak existuje.
    spray_string_suitable_age_group:
      name: Sprej vhodný pre vekovú kategóriu
      description: Odporúčaný minimálny vek/veková kategória používateľa pre bezpečné
        používanie.
    spread_consistency:
      name: Konzistencia nátierky
      description: Opisuje textúru/konzistenciu dipu alebo nátierky, aby bolo možné
        odhadnúť pocit v ústach a spôsob použitia (napr. hladká, s kúskami, vyšľahaná).
    spread_variety:
      name: Typ nátierky
      description: Klasifikuje konkrétny typ ovocnej nátierky (napr. džem, želé, marmeláda,
        curd), aby nakupujúci vedeli rozlíšiť rôzne spôsoby prípravy a textúry.
    spreader_bar_type:
      name: Typ rozpernej tyče
      description: Uvádza typ rozpernej tyče alebo hákového systému dodávaného s postrojom
        alebo s ním kompatibilného.
    sprint_canoe_class:
      name: Trieda rýchlostného kanoe
      description: Špecifikuje oficiálne označenie pretekárskej triedy v rýchlostnej
        kanoistike.
    sprout_presentation:
      name: Prezentácia klíčkov
      description: Určuje fyzickú formu prezentácie produktu (napr. čerstvé klíčky,
        mikrobylinky, živý pestovateľský črepník, prášok).
    squash_and_gourd_variety:
      name: Odroda tekvíc a tekvicových rastlín
      description: Určuje konkrétnu kultivovanú alebo trhovú odrodu tekvice alebo
        tekvicových rastlín, čo zákazníkom pomáha rýchlo nájsť požadovaný typ.
    stability_class:
      name: Trieda stability
      description: Všeobecná kategorizácia stability odvodená z letových hodnotení
        alebo marketingových tvrdení.
    stabilizer_thread_size:
      name: Veľkosť závitu stabilizátora
      description: Špecifikácia závitu používaného na pripevnenie stabilizátora alebo
        príslušenstva k luku alebo ku kuši.
    stabilizer_type:
      name: Typ stabilizátora
      description: Identifikuje štýl alebo pozičnú klasifikáciu stabilizátora luku
        alebo kuše.
    stages_supported:
      name: Podporované stupne
      description: Uvádza, s koľkými stupňami je raketa alebo súprava navrhnutá na
        let.
    stain_remover_format:
      name: Formát odstraňovača škvŕn
      description: Špecifikuje formu balenia a aplikácie produktu na odstraňovanie
        škvŕn z vozidiel (sprejová fľaša, aerosól, pena, gél, prášok, utierky, pero/marker).
    stake_shape:
      name: Tvar kolíka
      description: Definuje prierez alebo štýl dizajnu stanového kolíka, ktorý ovplyvňuje
        nosnosť v rôznych typoch terénu.
    stamp_block_features:
      name: Vlastnosti raziaceho bloku
      description: Zdôrazňuje funkčné vlastnosti raziacich blokov, ako sú meracie
        mriežky, rukoväte alebo protišmykové povrchy.
    stamp_block_type:
      name: Typ raziaceho bloku
      description: Špecifikuje konštrukciu alebo štýl raziaceho bloku používaného
        na upevnenie pečiatok pri razení (napr. priehľadný akrylový blok, drevený
        blok alebo pozičný blok).
    stamp_set_pieces_included:
      name: Kusy pečiatkovej súpravy v cene
      description: Uvádza, ktoré komponenty sú súčasťou sady pečiatok a podušiek (napr.
        pečiatky, atramentové podušky, fixky).
    stand_padding_material:
      name: Materiál na polstrovanie stojana
      description: Materiál použitý na kontaktných miestach na ochranu povrchovej
        úpravy nástroja (napr. pena, guma, silikón).
    staple_fiber_animal_fiber_type:
      name: Typ živočíšnej strižnej vlákniny
      description: Konkrétny typ vlákna živočíšneho pôvodu, ak je strižné vlákno má
        živočíšny pôvod.
    staple_fiber_crimp_level:
      name: Úroveň zvlnenia strižnej vlákniny
      description: Stupeň prirodzeného zvlnenia/zakrivenia vlákna.
    staple_fiber_preparation_type:
      name: Typ prípravy strižnej vlákniny
      description: Stav prípravy/spracovania vlákna pri predaji (miera jeho zarovnania
        a úpravy), ktorý výrazne ovplyvňuje spôsob spriadania, jednoduchosť ťahania
        a výsledné vlastnosti priadze.
    staple_fiber_source_type:
      name: Typ zdroja strižnej vlákniny
      description: Široká kategória pôvodu vláknového obsahu.
    starch_processing_type:
      name: Typ spracovania škrobu
      description: Označuje, či je škrob prírodný alebo bol fyzikálne či chemicky
        modifikovaný (napr. instantný, predželatínovaný) na dosiahnutie špecifických
        funkčných vlastností, ako je rýchlosť zahusťovania alebo teplotná tolerancia.
    starch_source:
      name: Zdroj škrobu
      description: Špecifikuje botanický zdroj, z ktorého pochádza kuchynský škrob
        alebo zahusťovadlo (napr. kukurica, zemiaky, tapioka). Zdroj je hlavným rozlišovacím
        faktorom kuchynských škrobov a priamo ovplyvňuje vhodnosť pre recepty, alergénové
        hľadiská a spôsob, akým ich spotrebitelia vyhľadávajú.
    starfruit_variety:
      name: Odroda karamboly
      description: Identifikuje konkrétny kultivar alebo odrodu karamboly (napr. Arkin,
        Fwang Tung).
    starter_drive_type:
      name: Typ pohonu štartéra
      description: Typ štartovacieho pohonu/záberového mechanizmu používaného na zapojenie
        pastorka do ozubeného kolesa.
    starter_pistol_action_type:
      name: Typ mechanizmu štartovacej pištole
      description: Identifikuje strelecký/mechanický systém štartovacej pištole (napr.
        single action, double action, poloautomatický).
    starter_pistol_caliber:
      name: Kaliber štartovacej pištole
      description: Špecifikuje kaliber slepého streliva alebo náboja, pre ktorý je
        štartovacia pištoľ určená.
    starter_terminal_type:
      name: Typ svorky štartéra
      description: Špecifikuje typ svorky/konektora používaného na elektrické pripojenie
        štartéra alebo štartovacieho solenoidu (napr. skrutkový čap, plochý konektor,
        zásuvný konektor).
    starting_block_anchoring_method:
      name: Spôsob ukotvenia štartovacích blokov
      description: Opisuje spôsob upevnenia blokov k povrchu dráhy (napr. hroty, prísavky,
        gumové podložky).
    steerer_tube_design:
      name: Konštrukcia stĺpika vidlice
      description: Opisuje konštrukčné vyhotovenie stĺpika vidlice — rovný, kužeľový,
        závitový atď. — ktoré určuje kompatibilitu s hlavovým zložením a rámom.
    steering_cable_end_fitting_type:
      name: Typ koncovky riadiaceho lanka
      description: Identifikuje typ zakončenia/pripojenia na koncoch riadiaceho lanka
        plavidla (na strane riadenia a na strane motora/kormidla) na zabezpečenie
        kompatibility s riadiacim mechanizmom a pripojovacími bodmi motora. V prípade
        potreby použite označenie štandard alebo výrobca.
    steering_column_adjustability_features:
      name: Funkcie nastaviteľnosti stĺpika riadenia
      description: Uvádza, ktoré funkcie nastavenia sú integrované do stĺpika riadenia.
    steering_column_ignition_provision:
      name: Príprava pre zapaľovanie na stĺpiku riadenia
      description: Uvádza, či je stĺpik riadenia navrhnutý na montáž vložky/spínača
        zapaľovania a/alebo zámku riadenia.
    steering_column_shaft_end_interface_type:
      name: Typ rozhrania na konci hriadeľa stĺpika riadenia
      description: Identifikuje typ rozhrania na konci hriadeľa stĺpika riadenia (napr.
        drážkované, dvojité D, pero a drážka).
    steering_column_shift_type:
      name: Typ radenia stupňov na stĺpiku riadenia
      description: Určuje, či stĺpik riadenia obsahuje radenie umiestnené na stĺpiku
        a aký typ prevodovky/riadenia radenia používa.
    steering_component_drive_type:
      name: Typ pohonu komponentov riadenia
      description: Špecifikuje typ pohonu/pomoci používaný pri komponentoch riadenia
        (najmä pri čerpadlách a systémoch elektrického posilňovača riadenia – EPS).
    steering_position:
      name: Poloha riadenia
      description: Určuje, či ide o vozidlo s ľavostranným alebo pravostranným riadením.
    steering_pump_pulley_type:
      name: Typ remenice čerpadla riadenia
      description: Špecifikuje typ pohonu/rozhrania remenice používaného na čerpadle
        riadenia.
    steering_rack_finish_coating:
      name: Povrchová úprava/náter riadiacej tyče
      description: Špecifikuje vonkajšiu povrchovú úpravu/náter na ochranu proti korózii.
    steering_rack_position:
      name: Poloha hrebeňa riadenia
      description: Špecifikuje, kde je hrebeň riadenia umiestnený/použitý v systéme
        riadenia vozidla.
    steering_wheel_cover_installation_type:
      name: Typ inštalácie poťahu na volant
      description: Ako sa poťah inštaluje/upevňuje na volant.
    steering_wheel_grip_material:
      name: Materiál úchopu volantu
      description: Špecifikuje materiál na obruči/úchopovej časti volantu (miesto
        kontaktu s rukami), ktorý sa môže líšiť od materiálu jadra/lúčov volantu.
    steering_wheel_mounting_pattern:
      name: Montážny vzor volantu
      description: Špecifikuje skrutkový/otvorový montážny vzor používaný na uchytenie
        volantu k náboju alebo adaptéru (napr. 3-skrutkový, 5-skrutkový).
    steering_wheel_rim_material_grip_surface:
      name: Materiál obruče volantu (úchopovej plochy)
      description: Špecifikuje hlavný materiál povrchového poťahu obruče/úchopovej
        časti volantu (odlišný od celkovej konštrukčnej materiálovej skladby).
    stem_material:
      name: Materiál drieku
      description: Špecifikuje materiál použitý konkrétne na náustok alebo náustkovú
        časť (napr. akryl, ebonit, lucit).
    stencil_machine_consumable_type:
      name: Typ spotrebného materiálu pre šablónovací stroj
      description: Špecifikuje spotrebný materiál potrebný na prevádzku (ak existuje).
    step_surface_texture:
      name: Textúra povrchu schodov
      description: Špecifikuje dizajn alebo materiál povrchu nášľapu/stupienka určený
        na zlepšenie priľnavosti a komfortu pri mokrom povrchu.
    stepper_motion_type:
      name: Typ pohybu steppera
      description: Definuje základný typ šliapacieho pohybu, ktorý zariadenie poskytuje.
    stick_bow_profile:
      name: Profil zahnutia drieku
      description: Špecifikuje krivkový profil (alebo „typ zahnutia“) drieku hokejky
        na pozemný hokej, ktorý výrazne ovplyvňuje kontrolu loptičky, výkon pri drag-flicku
        a herný štýl.
    stick_construction:
      name: Konštrukcia palice
      description: Špecifikuje konštrukčný štýl hokejky, napríklad jednodielny kompozit,
        dvojdielny kompozit alebo drevo.
    stick_curvature_type:
      name: Typ zakrivenia hokejky
      description: Opisuje profil zakrivenia hokejky, ktorý ovplyvňuje vzdialenosť
        vrhu a presnosť.
    stick_head_shape:
      name: Tvar hlavy hokejky
      description: Definuje tvar hlavy hokejky, ktorý ovplyvňuje zachytávanie loptičky,
        spôsob úderu a kontrolu loptičky na krátku vzdialenosť.
    stick_size_compatibility:
      name: Kompatibilita veľkosti palice
      description: Identifikuje veľkostnú kategóriu hokejky, pre ktorú je produkt
        určený alebo kompatibilný (napr. detská, juniorská, intermediálna, seniorská,
        brankárska, univerzálna).
    sticker_decal_features:
      name: Vlastnosti nálepiek/dekoratívnych samolepiek
      description: Zachytáva aplikačné a výkonové vlastnosti špecifické pre nálepky/dekoračné
        samolepky (napr. bez bublín, premiestniteľné).
    sticker_finish:
      name: Povrchová úprava nálepky
      description: Opisuje povrchovú úpravu/vizuálny efekt nálepiek.
    sticker_format:
      name: Formát nálepky
      description: Špecifikuje predajné balenie dekoračných foriem nálepiek (napr.
        hárok, rolka, jednotlivé kusy, knižka).
    sticker_material_type:
      name: Typ materiálu nálepky
      description: Určuje primárny podklad/materiál dekoratívnej nálepky (nie ozdôb).
    stilt_foot_attachment_type:
      name: Typ uchytenia nohy k chodúľom
      description: Špecifikuje spôsob, akým sa noha používateľa upevňuje k chodúľom
        (napr. prackový popruh, suchý zips, šnurovanie).
    stirrup_style:
      name: Strmeňový štýl
      description: Klasifikuje štýl strmeňov špecifický pre dizajn alebo disciplínu,
        zahŕňajúc bezpečnostné, disciplinárne a konštrukčné variácie.
    stirrup_tread_material:
      name: Materiál nášľapu strmeňa
      description: Špecifikuje materiál použitý na nášľapnej časti alebo pedáli strmeňa,
        ktorý ovplyvňuje priľnavosť, komfort a odolnosť voči opotrebeniu.
    stitch_marker_and_counter_style:
      name: Typ značkovača a počítadla stehov
      description: Špecifikuje štýl alebo tvarový faktor značkovača stehov alebo počítadla
        stehov/riadkov (napr. uzamykacia značka, delený krúžok, počítadlo krúžkov,
        digitálne počítadlo).
    stitch_types:
      name: Typy stehov
      description: Typy stehov (funkčných a dekoratívnych), ktoré stroj dokáže vytvoriť.
    stitching_method:
      name: Metóda šitia
      description: Uvádza metódu šitia spojov lopty.
    stitching_state:
      name: Stav šitia
      description: Označuje, či sú kusy odevu dodávané nešité, čiastočne šité, šité
        alebo pripravené na nosenie.
    stock_car_race_series:
      name: Séria pretekov áut
      description: Špecifikuje schvaľovací orgán alebo pretekársku sériu/triedu, v
        ktorej je vozidlo vyrobené.
    stone_adhesion:
      name: Priľnavosť kôstky
      description: Označuje, či je kôstka broskyne alebo nektárinky voľná, priľnavá
        alebo čiastočne voľná.
    stone_creation_method:
      name: Spôsob výroby kameňa
      description: Určuje, či je kôstka prírodná, laboratórne vypestovaná, simulovaná
        alebo recyklovaná.
    stone_cut_grade:
      name: Trieda rezania kameňa
      description: Označuje celkové hodnotenie kvality rezania kameňa.
    stone_cut_style:
      name: Typ rezania kameňa
      description: Štýl brúsenia/fazetovania sklenenej kamennej ozdoby (napr. fazetovaný
        alebo kabošon).
    stone_fruit_cultivar:
      name: Kultivar kôstkového ovocia
      description: Identifikuje konkrétny kultivar/odrodu broskyne alebo nektárinky.
    stone_fruit_variety:
      name: Odroda kôstkového ovocia
      description: Rozlišuje podtyp v rámci kategórie (napr. broskyňa, nektárinka,
        šiška/plochá broskyňa).
    stone_setting_type:
      name: Typ uchytenia kameňa
      description: Určuje, ako je kameň v kuse upevnený (luneta, hrot, pavé atď.).
    stone_transparency:
      name: Priehľadnosť kameňa
      description: Optická priehľadnosť/nepriehľadnosť skleneného kameňa.
    storage_case_type:
      name: Typ úložného priestoru
      description: Označuje typ kontajnera, v ktorom je sada dodávaná na skladovanie
        a prepravu (napr. krabica, puzdro, taška).
    storage_compartment_type:
      name: Typ úložnej priehradky
      description: Určuje typ úložného priestoru, ktorý plavecký bój poskytuje na
        osobné veci.
    storage_media_and_transfer_methods_supported:
      name: Podporované médiá na ukladanie a spôsoby prenosu údajov
      description: Podporované metódy médií alebo pripojenia na import/export vzoriek
        a ukladanie/načítavanie projektov.
    storage_requirements:
      name: Požiadavky na skladovanie
      description: Špecifikuje, ako by sa mal výrobok skladovať pred a/alebo po otvorení,
        aby sa zachovala kvalita a bezpečnosť.
    stove_jack_compatibility:
      name: Kompatibilita s vývodom na komín pre kachle
      description: Určuje, či výrobok obsahuje ohňovzdorný otvor pre vývod kachľovej
        rúry.
    straight_pin_application:
      name: Použitie rovného špendlíka
      description: Určuje zamýšľané použitie rovných špendlíkov.
    straight_pin_finish:
      name: Povrchová úprava rovného špendlíka
      description: Opisuje povrchovú úpravu alebo náter špendlíka (napr. poniklovaný),
        ktoré ovplyvňujú odolnosť proti korózii a kĺzavosť.
    straight_pin_head_material:
      name: Materiál hlavičky rovného špendlíka
      description: Špecifikuje materiál hlavičky špendlíka (ak je prítomná), napríklad
        plast alebo sklo.
    straight_pin_head_shape:
      name: Tvar hlavičky rovného špendlíka
      description: Opisuje tvar/štýl hlavičky špendlíka pre lepšiu použiteľnosť a
        viditeľnosť.
    strand_configuration:
      name: Konfigurácia lana
      description: Udáva počet samostatných radov alebo prameňov, z ktorých je reťaz
        na peňaženku zložená (jednoduchý, dvojitý, trojitý).
    strand_material:
      name: Materiál prameňa
      description: Špecifikuje materiál použitý na jednotlivé pramene/stuhy.
    strap_attachment_hardware:
      name: Upevňovacie prvky popruhu
      description: Špecifikuje typ/konštrukciu hardvéru použitého na pripevnenie popruhu
        k nástroju/podpornému bodu.
    strap_configuration:
      name: Konfigurácia popruhu
      description: Označuje počet bodov upevnenia prilby na popruhu (napr. 2-bodový,
        4-bodový), čo je rozhodujúce pre prispôsobenie sa, bezpečnosť a požiadavky
        súťaží.
    strap_functionality:
      name: Funkcia popruhu
      description: Špecifikuje primárne zamýšľané použitie alebo dizajn popruhu na
        podložku na jogu.
    strap_padding:
      name: Vnútorný okraj popruhu
      description: Označuje úroveň polstrovanej konštrukcie popruhu, ktorá má zlepšiť
        pohodlie a rozložiť hmotnosť.
    strap_side:
      name: Strana popruhu
      description: Označuje, či je popruh určený pre ľavé viazanie, pravé viazanie
        alebo sa predáva ako pár.
    strap_width:
      name: Šírka popruhu
      description: Udáva relatívnu šírku ramenných popruhov (tenké, stredné, široké),
        aby pomohla pri výbere podľa požadovaného zakrytia alebo opory.
    strength_classification:
      name: Klasifikácia pevnosti
      description: Marketingové označenie sily produktu používané značkami (napr.
        jemný, silný, extra silný).
    strength_grade:
      name: Stupeň pevnosti
      description: Opisuje zamýšľanú pevnosť/úroveň uchytenia suchého zipsu.
    stretch_level:
      name: Úroveň pružnosti
      description: Udáva, ako veľmi sa textília natiahne počas používania.
    stretch_type:
      name: Typ pružnosti
      description: Označuje, či má tkanina mechanickú alebo elastickú pružnosť a v
        ktorom smere (smeroch).
    stretcher_bar_material:
      name: Materiál napínacej lišty
      description: Materiál použitý na napínacie lišty/rám (napr. borovica, jedľa,
        topoľ, breza, MDF/drevovláknitá doska).
    strike_shield_shape:
      name: Tvar ochranného štítu proti nárazom
      description: Špecifikuje celkový tvarový faktor úderovej plochy ochranného štítu.
    string_core_shape:
      name: Tvar jadra struny
      description: Určuje tvar jadrového drôtu používaného vo vinutých strunách, ktorý
        ovplyvňuje pocit pri hre a stabilitu ladenia.
    string_coverage:
      name: Pokrytie struny
      description: Špecifikuje, ktoré struny je čiastočný kapodaster určený stláčať/pokryť
        (podľa počtu alebo bežnej sady strún).
    string_end_type:
      name: Typ konca struny
      description: Špecifikuje spôsob ukončenia struny pri kobylke/struníku pre kompatibilitu
        (dôležité najmä pri akustických a elektrických nástrojoch a niektorých basgitarách).
    string_set_type:
      name: Typ sady strún
      description: Špecifikuje, či je produkt kompletná sada alebo individuálny náhradný
        reťazec.
    strung_status:
      name: Stav výpletu
      description: Označuje, či je lakrosová hlava dodávaná s výpletom a vreckom alebo
        sa predáva bez výpletu.
    strut_placement:
      name: Umiestnenie podpery
      description: Špecifikuje zamýšľanú montážnu polohu vzpery na vozidle (vpredu/vzadu
        a vľavo/vpravo).
    stud_attachment_type:
      name: Typ pripevnenia klincov
      description: Špecifikuje, ako sú kolíky/zarážky pripevnené alebo usporiadané
        na podrážke, čo ovplyvňuje trakciu, údržbu a súlad s predpismi ligy.
    stud_configuration:
      name: Konfigurácia klinca
      description: Definuje tvar a usporiadanie kolíkov/zarážok na podrážke, čo ovplyvňuje
        trakciu a výkonnosť na rôznych povrchoch.
    stud_material:
      name: Materiál klinca
      description: Označuje primárny materiál kolíkov/zarážok, informuje o odolnosti,
        hmotnosti a súlade s bezpečnostnými predpismi.
    stuffed_animal_features:
      name: Vlastnosti plyšových zvieratiek
      description: Zdôrazňuje vstavané herné a pohodlné vlastnosti plyšového zvieratka.
    stump_base_type:
      name: Typ základne kolíka
      description: Definuje štýl základne alebo montážneho systému, ktorý kriketový
        kolík používa (hrot, pružinový návratový systém, zaťažená gumová základňa
        atď.).
    stump_mechanism:
      name: Mechanizmus stierky
      description: Špecifikuje mechanizmus návratu alebo montáže kriketových kolíkov
        (napr. pružinový, pevný).
    stump_size:
      name: Veľkosť kolíka
      description: Kategorické označenie veľkosti používané pre kriketové kolíky,
        ktoré označuje typickú výšku a vhodnú vekovú skupinu hráčov.
    subwoofer_installation_type:
      name: Typ inštalácie subwoofera
      description: Ako je subwoofer určený na inštaláciu v audiosystéme vozidla.
    sugar_cane_variety:
      name: Odroda cukrovej trstiny
      description: Identifikuje konkrétny kultivar alebo trhovú odrodu cukrovej trstiny,
        ktorá môže ovplyvniť farbu, sladkosť a obsah vlákniny.
    sugar_content_level:
      name: Obsah cukru
      description: Klasifikuje celkovú hladinu cukru alebo zloženie nápojového koncentrátu,
        čo umožňuje nakupujúcim rýchlo nájsť bežné, znížené alebo možnosti bez cukru.
    sugar_refinement_level:
      name: Stupeň rafinácie cukru
      description: Označuje stupeň alebo štýl rafinácie (farba, obsah melasy alebo
        úroveň spracovania).
    sugar_source:
      name: Zdroj cukru
      description: Označuje botanický alebo materiálový pôvod, z ktorého je cukor
        získaný.
    suit_fit:
      name: Strih obleku
      description: Celkový strih obleku, ktorý určuje, ako tesne prilieha k telu.
    suit_pieces:
      name: Diely obleku
      description: Špecifikuje, koľko zladených odevov je súčasťou súpravy obleku
        (napr. 2-dielny, 3-dielny, 4-dielny).
    suitable_for_anchoring_use:
      name: Vhodné na kotvenie
      description: Označuje zamýšľaný prípad použitia lana/šnúry súvisiaci s ukotvením.
    suitable_for_craft_type:
      name: Vhodné pre typ plavidla
      description: Blokovací drôt je určený na primárne vyšívanie.
    suitable_for_paint_type:
      name: Vhodné pre typ farby
      description: Označuje, s akými typmi farieb je plátno určené/bezpečné na použitie.
    suitable_for_swim_stroke:
      name: Vhodné pre plavecký štýl
      description: Označuje, pre ktorý plavecký štýl (štýly) je plavecké pádlo určené
        alebo optimalizované.
    suitable_mounting_surface_material:
      name: Vhodný materiál montážneho povrchu
      description: Špecifikuje zamýšľaný montážny povrch alebo materiál, na ktorý
        má lepiaca vrstva priľnúť.
    suitable_play_location:
      name: Vhodná poloha na hranie
      description: Primárne určené prostredie na hranie pre mlynček na piesok a vodu.
    suitable_riding_conditions:
      name: Vhodné jazdné podmienky
      description: Určuje jazdné podmienky (napr. suché, mokré, zimné), pre ktoré
        je cyklistické mazivo alebo čistič formulovaný.
    suitable_snow_conditions:
      name: Vhodné snehové podmienky
      description: Určuje primárne snehové podmienky, pre ktoré je stúpací vosk formulovaný.
    suitable_surface_type:
      name: Vhodný typ povrchu
      description: Špecifikuje povrchy, pre ktoré je rukoväť určená.
    suitable_table_size:
      name: Vhodná veľkosť stola
      description: Uvádza dĺžku(ky) biliardového/snookerového stola, pre ktorú je
        svetlo určené.
    sun_protection_rating_upf:
      name: Stupeň ochrany pred slnkom (UPF)
      description: Uvádza certifikovanú úroveň ochrany odevu proti slnečnému žiareniu
        UPF.
    sun_shade_attachment_method:
      name: Spôsob upevnenia slnečníka
      description: Ako je slnečná clona upevnená k oknu/čelnému sklu.
    sun_shade_style:
      name: Štýl slnečnej clony
      description: Konštrukcia alebo formát produktu pre nasadenie a skladovanie slnečnej
        clony.
    sunchoke_variety:
      name: Odroda topinamburu
      description: Označuje konkrétny kultivar alebo odrodu topinamburu (jeruzalemského
        artičoku) a poskytuje podrobné informácie pre záhradkárov, kuchárov a náročných
        nakupujúcich.
    sunflower_oil_variety:
      name: Druh slnečnicového oleja
      description: Klasifikuje profil mastných kyselín alebo kultivar slnečnicového
        oleja (napr. vysokoolejový, stredne olejový, linolový).
    sunflower_variety:
      name: Odroda Slnečnice
      description: Kultivar/odroda slnečnice (bežné trhové odrody na použitie ako
        rezané kvety).
    support_brace_features:
      name: Vlastnosti podpornej ortézy
      description: Uvádza významné funkčné vlastnosti opory zápästia, ako napríklad
        priedušný materiál, odnímateľnú dlahu alebo nastaviteľnú kovovú výstuhu.
    support_leg_count:
      name: Počet podporných nôh
      description: Počet nôh, ktoré sa dotýkajú zeme pri používaní streleckej palice
        (napr. monopod, dvojnožka, trojnožka).
    support_padding:
      name: Podpora vnútorného okraja
      description: Označuje, či remienok/podpora obsahuje integrovaný vnútorný okraj
        na kontaktných bodoch (krk/rameno/palec).
    support_structure_type:
      name: Typ podpornej konštrukcie
      description: Označuje konštrukčnú metódu použitú na udržanie vetrolamu vo zvislej
        polohe.
    supported_bowling_delivery_types:
      name: Podporované typy bowlingových hodov
      description: Špecifikuje typy bowlingových variácií v krikete, ktoré dokáže
        stroj simulovať, napríklad inswing, outswing a rôzne typy spinu.
    supported_dive_modes:
      name: Podporované režimy potápania
      description: Špecifikuje prevádzkové režimy ponoru, ktoré potápačský počítač
        podporuje, napríklad Air, Nitrox alebo Gauge.
    supported_equipment_type:
      name: Podporovaný typ zariadenia
      description: Označuje zimné športové vybavenie, na ktoré je stojan určený (napr.
        lyže, snowboardy, lyžiarske palice).
    supported_spin_types:
      name: Podporované typy rotácie
      description: Špecifikuje variácie rotácie lopty, ktoré môže odpaľovací prístroj
        použiť.
    supported_spool_bobbin_types:
      name: Podporované typy cievok/bobín
      description: Špecifikuje, aké formáty cievok/bobín je elektrický navíjač navrhnutý
        prijímať.
    surf_wax_temperature_rating:
      name: Teplotný rozsah vosku na surfovanie
      description: Špecifikuje rozsah teploty vody, pre ktorý je vosk navrhnutý, aby
        zabezpečil optimálnu priľnavosť v rôznych klimatických podmienkach.
    surface_coating_or_finish:
      name: Povrchový náter alebo úprava
      description: Špecifikuje akúkoľvek ochrannú alebo výkon zvyšujúcu povrchovú
        úpravu použitú na kliešte.
    surface_coating_or_wrap:
      name: Povrchový náter alebo obal
      description: Povrchová úprava vonkajšieho povrchu použitá na úchop a ovládanie
        stredovej páky (a niekedy aj ručnej páky).
    surface_finish:
      name: Povrchová úprava
      description: Opisuje pocit/textúru povrchu lopty, ktorá ovplyvňuje úchop a pohyb
        pri kontaktnom žonglovaní.
    surface_finish_prep:
      name: Povrchová úprava/príprava
      description: Označuje stav trecej plochy pri predaji (napr. prebrúsená, opracovaná,
        v pôvodnom odliatom stave).
    surface_types_included:
      name: Zahrnuté typy povrchov
      description: Špecifikuje, aký povrch je súčasťou sady na kreslenie/maľovanie
        (ak je nejaký), napríklad plátno, blok papiera, drevené panely alebo žiadny.
    surfboard_construction:
      name: Konštrukcia surfovej dosky
      description: Špecifikuje základnú konštrukčnú technológiu alebo skladbu vrstiev
        surfovej dosky.
    surfboard_tail_shape:
      name: Tvar zadnej časti surfovej dosky
      description: Definuje tvar obrysu chvostovej časti dosky, ktorý ovplyvňuje ovládateľnosť
        a držanie stopy.
    suspension_bushing_type:
      name: Typ závesného puzdra
      description: Špecifikuje funkčný/inštalačný štýl závesného puzdra.
    suspension_configuration:
      name: Konfigurácia zavesenia
      description: Opisuje, či má trojkolka zavesenie a kde sa nachádza.
    suspension_material:
      name: Materiál zavesenia
      description: Špecifikuje materiál reťazí, lán alebo káblov použitých na zavesenie
        hojdačky.
    suspension_trainer_accessories_included:
      name: Príslušenstvo pre závesný posilňovač je súčasťou balenia
      description: Uvádza dodatočné položky dodávané so súpravou príslušenstva (napr.
        kotva do dverí, predlžovací popruh, úložná taška), aby zákazníci lepšie pochopili
        obsah balenia a mohli porovnať hodnotu balíkov.
    suspension_trainer_anchor_type:
      name: Typ kotvy závesného trenažéra
      description: Definuje spôsob uchytenia alebo typ kotviaceho bodu, pre ktorý
        sú popruhy určené (napr. dvere, strop, strom), a tým informuje o kompatibilite
        s prostredím používateľa.
    suspension_type:
      name: Typ zavesenia
      description: Špecifikuje, či je vidlica pevná alebo využíva konkrétny systém
        zavesenia (vzduchový, pružinový, hybridný, elastomérový atď.), čím pomáha
        jazdcom zladiť vidlicu so štýlom jazdy.
    sustain_pedal_form_factor:
      name: Tvarové prevedenie sustain pedálu
      description: Opisuje fyzický štýl sustain pedálu (napr. klavírny nožný pedál
        vs. kompaktný nožný spínač), ktorý ovplyvňuje pocit pri používaní a určené
        využitie.
    sustain_pedal_switch_type:
      name: Typ spínača sustain pedálu
      description: Označuje, či pedál vysiela momentálny signál (sustain len počas
        stlačenia) alebo prepínací signál (zapnutie/vypnutie).
    sustainability_certification:
      name: Certifikát udržateľnosti
      description: Certifikácia životného prostredia alebo zdroja dreveného materiálu.
    swab_intended_bassoon_section:
      name: Určená časť fagota, pre ktorú je čistiaci tampón určený
      description: Určuje, ktorá časť fagota sa má čistiť čistiacim tampónom (rôzne
        otvory/časti nástroja vyžadujú odlišné tvary a veľkosti tampóna).
    swab_style:
      name: Štýl tampónu
      description: Opisuje fyzický dizajn/tvar čistiaceho tampónu určeného na prechod
        alebo dosiahnutie vnútorných častí saxofónu.
    swab_weight_material:
      name: Materiál závažia čistiaceho tampónu
      description: Materiál závažia/vedenia čistiaceho tampónu (ak je prítomné), ktorý
        ovplyvňuje riziko poškriabania a životnosť.
    swab_weight_style:
      name: Typ tampónu podľa hmotnosti
      description: Určuje, ako je čistiaci tampón vyvážený/závažený, aby prešiel otvormi
        fagota.
    sway_bar_adjustability:
      name: Nastaviteľnosť stabilizačnej tyče
      description: Či a akým spôsobom je možné nastaviť tuhosť stabilizačnej tyče
        (zvyčajne prostredníctvom viacerých montážnych otvorov na koncovkách).
    sway_bar_coating:
      name: Náter stabilizačnej tyče
      description: Povrchová úprava alebo náter na stabilizačnej tyči pre odolnosť
        voči korózii a vzhľad.
    sway_bar_fitment_front_rear_kit:
      name: Montáž stabilizačnej tyče (predná/zadná/súprava)
      description: Určuje, či je stabilizačná tyč určená pre prednú nápravu, zadnú
        nápravu, alebo sa predáva ako sada pre prednú aj zadnú nápravu.
    sweatshirt_pocket_type:
      name: Typ vrecka na mikine
      description: Opisuje štýl vreciek na mikine.
    sweet_potato_variety:
      name: Odroda sladkých zemiakov
      description: Identifikuje konkrétny kultivar alebo predávanú odrodu sladkého
        zemiaka.
    sweet_spot_position:
      name: Poloha optimálneho miesta zásahu
      description: Určuje, kde sa na čepeli nachádza optimálne miesto zásahu, čo ovplyvňuje
        herný štýl a podmienky odpalu.
    sweetener_presence:
      name: Prítomnosť sladidla
      description: Uvádza, či sú v orechovom masle prítomné pridané sladidlá a v akom
        množstve.
    sweetening_type:
      name: Typ sladidla
      description: Opisuje, ako je výrobok sladený alebo akú má úroveň sladkosti.
    swim_armband_construction_type:
      name: Typ konštrukcie plaveckých rukávnikov
      description: Určuje konštrukčný typ alebo mechanizmus nadnášania plaveckých
        rukávnikov (nafukovacie, penové, hybridné atď.).
    swim_belt_purpose:
      name: Účel plaveckého pásu
      description: Funkčná klasifikácia plaveckého pásu (napr. podpora vztlaku, aqua
        jogging, odporový tréning, statické uchytenie, upevnenie brzdného padáka,
        záťaž, bezpečné brodenie).
    swim_board_features:
      name: Funkcie plaveckej dosky
      description: Zvýrazňuje špeciálne vlastnosti alebo vylepšenia plaveckej dosky,
        ktoré zlepšujú použiteľnosť alebo bezpečnosť.
    swim_bottom_length:
      name: Dĺžka spodného dielu plaviek
      description: Klasifikuje celkové zakrytie nôh pri plaveckých boxerkách (napr.
        krátke trenírky vs. dĺžka po kolená).
    swim_buoy_features:
      name: Vlastnosti plaveckého bója
      description: Zahŕňa doplnkové alebo špeciálne vlastnosti, ktoré zvyšujú viditeľnosť,
        bezpečnosť alebo praktickosť plaveckého bója.
    swim_cap_style:
      name: Štýl plaveckej čiapky
      description: Definuje konštrukciu alebo dizajnový štýl plaveckej čiapky (napr.
        dlhé vlasy, kupolovitá/pretekárska, bublinová/turban).
    swim_diaper_feature:
      name: Funkcie plienky na plávanie
      description: Určuje, či majú plavecké slipy integrovanú nepriepustnú plienkovú
        vložku, alebo či vyžadujú/prípadne neobsahujú samostatnú plaveckú plienku.
    swim_trainer_features:
      name: Funkcie plaveckého trenažéra
      description: Zvýrazňuje doplnkové funkčné alebo komfortné vlastnosti plaveckého
        trenažéra.
    swim_trainer_type:
      name: Typ plaveckého trenažéra
      description: Definuje štrukturálny štýl alebo formát plaveckého trenažéra, ktorý
        pomáha filtrovať podľa dizajnu a tréningového účelu.
    swim_training_focus:
      name: Zameranie na plavecký tréning
      description: Určuje hlavný tréningový cieľ, na ktorý sú pádla zamerané (napr.
        technika, sila, izolácia svalov).
    swim_weight_style:
      name: Typ plaveckého závažia
      description: Klasifikuje tvar a konštrukčný typ plaveckej záťaže, čo pomáha
        nakupujúcim rozlíšiť zásadne odlišné typy produktov v rámci rovnakej kategórie.
    swimbait_buoyancy:
      name: Vztlak návnady
      description: Určuje, ako sa návnada správa vo vodnom stĺpci (plávajúci, neutrálne
        vztlakový, potápavý atď.), čo umožňuje rybárom vybrať správnu návnadu podľa
        hĺbky lovu a spôsobu vedenia.
    swimbait_style:
      name: Štýl návnady
      description: Klasifikuje konštrukciu alebo typ pohybu návnady, napríklad s lopatkovým
        chvostom alebo kĺzavý typ.
    swimwear_pieces_included:
      name: Kusy plaviek v cene
      description: Uvádza jednotlivé časti odevu obsiahnuté v súprave burkiny, aby
        zákazník presne vedel, čo je súčasťou balenia.
    swimwear_set_pieces_included:
      name: Kusy súpravy plaviek v cene
      description: Uvádza jednotlivé časti odevu obsiahnuté v súprave burkiny, aby
        zákazník presne vedel, čo dostane (napr. top, legíny, hidžáb/čiapka).
    swing_attachment_connection_type:
      name: Typ uchytenia/pripojenia hojdačky
      description: Typ uchytenia používaného na zavesenie hojdačky na jej nosnú konštrukciu
        (napr. lano, reťaz, popruhy).
    swing_trainer_type:
      name: Typ golfového trenažéra
      description: Klasifikuje štýl alebo mechanizmus tréningovej hojdačky, aby si
        nakupujúci mohli rýchlo vybrať zariadenia zodpovedajúce ich tréningovým cieľom.
    swing_training_objective:
      name: Na účely tréningu golfového švihu
      description: Klasifikuje hlavné tréningové zameranie, mechanizmus alebo cieľ
        tréningovej hojdačky (napr. tempo, rýchlosť, úchop).
    switch_electrical_positions:
      name: Elektrické polohy prepínača
      description: Špecifikuje počet a funkčné správanie elektrických polôh prepínača
        (napr. 3-polohový, momentálny kontakt).
    swivel_type:
      name: Typ otočného kĺbu
      description: Určuje typ otočného kĺbu používaného na zníženie zamotávania vôdzky.
    sword_scabbard_material:
      name: Materiál pošvy meča
      description: Určuje primárny materiál priloženého puzdra (ak je súčasťou balenia).
    synthesizer_form_factor:
      name: Formát syntetizátora
      description: Popisuje formát fyzického/prehrávacieho rozhrania syntetizátora.
    synthetic_feather_style:
      name: Štýl syntetického peria
      description: Štýl/strih syntetického pierka používaného pre rôzne vzhľady a
        techniky tvorby.
    synthetic_formulation_type:
      name: Typ syntetickej formulácie
      description: Špecifikuje typ syntetickej základovej olejovej bázy alebo formulácie
        (napr. PAO, ester, hydrokrakovaný Group III).
    syrup_base_ingredient:
      name: Základná zložka sirupu
      description: Určuje hlavný rastlinný alebo cukrový zdroj, z ktorého je sirup
        alebo nektár získaný (napr. javor, agáve, trstinový cukor).
    syrup_variety:
      name: Odroda sirupu
      description: Definuje všeobecný štýl alebo kategóriu sirupu na základe jeho
        zloženia alebo tradičného použitia (napr. javorový, kávová aróma, ovocný,
        liečivý).
    t_shirt_fit:
      name: Strih trička
      description: Opisuje zamýšľaný celkový strih trička.
    tabla_included_components:
      name: Obsahuje jednotlivé časti dodávané so súpravou tably
      description: Uvádza, ktoré kľúčové položky sú súčasťou balenia tably (napr.
        jednotlivý bubon vs. súprava, obaly/puzdrá, ladiaci kľúč atď.).
    tabla_set_pieces_included:
      name: Kusy prestierania na stôl v cene
      description: Uvádza, ktoré komponenty sú súčasťou súpravy tably (napr. dayan,
        bayan, krúžky, obaly, ladiace nástroje, taška).
    tabla_tonal_pitch_range_bayan:
      name: Rozsah tónov/výšky tably (bayan)
      description: Opisuje typickú kategóriu tónového rozsahu/výšky tónu bubna bayan
        (basového bubna) podľa veľkosti a konštrukcie.
    table_base_material:
      name: Základný materiál stola
      description: Určuje hlavný materiál podstavca alebo podnože stola (odlišný od
        nôh alebo stolovej dosky), čo umožňuje filtrovanie podľa materiálu.
    table_base_type:
      name: Typ základne stola
      description: Určuje konštrukčný typ nosnej konštrukcie, ktorá podopiera stolovú
        dosku (napr. podstavec, kozlíková konštrukcia, X-podstavec).
    table_coverage_position:
      name: Pozícia pokrytia stola
      description: 'Určuje, na akú polohu stolného tenisu je kryt určený: zložený,
        herný alebo obe.'
    table_hockey_part_type:
      name: Typ dielu stolného hokeja
      description: Identifikuje špecifický typ komponentu v systémoch stolového/vzduchového/tyčového/bublinového
        hokeja.
    table_leg_design:
      name: Dizajn nohy stola
      description: Určuje konštrukčný štýl alebo geometriu nohy, čo umožňuje nakupujúcim
        vybrať si podľa estetických preferencií a požiadaviek na stabilitu.
    table_size:
      name: Veľkosť stola
      description: Komerčne uvádzaná celková veľkosť biliardového stola (v stopách),
        čo umožňuje nakupujúcim rýchlo si vybrať bežné možnosti, ako sú 7-stopové
        barové stoly alebo 9-stopové turnajové stoly.
    table_size_category:
      name: Kategória veľkosti stola
      description: Kategorizuje stolný futbalový stôl podľa celkovej zastavanej plochy,
        aby ste si mohli nakúpiť dostupný priestor bez nutnosti výpočtu rozmerov.
    table_tennis_certification:
      name: Certifikácia stolného tenisu
      description: Uvádza oficiálne normy alebo schválenia riadiacimi orgánmi, ktoré
        výrobok spĺňa (napr. triedy ITTF, EN 14468-2).
    tabletop_tilt_function:
      name: Funkcia nakláňania stolovej dosky
      description: Špecifikuje, či sa stolová doska môže nakláňať, preklápať alebo
        otáčať do rôznych uhlov.
    tackle_components_included:
      name: Komponenty rybárskej výstroje v cene
      description: Uvádza zoznam konkrétnych komponentov rybárskeho náčinia, ktoré
        sú súčasťou súpravy, aby nakupujúci presne vedeli, čo je súčasťou balenia.
    talking_drum_accessories_included:
      name: Súčasťou balenia je príslušenstvo pre hovoriace bubny
      description: Uvádza príslušenstvo, ktoré je súčasťou balenia hovoriaceho bubna
        (v krabici).
    talking_drum_cord_material:
      name: Materiál šnúry hovoriaceho bubna
      description: Materiál použitý na napínacie šnúry/lana, ktoré spájajú blany bubna.
    talking_drum_tuning_mechanism:
      name: Mechanizmus ladenia hovoriaceho bubna
      description: Spôsob, akým sa mení výška tónu bubna alebo nastavuje napätie blán
        počas hry (alebo pri ladení).
    tam_tam_construction_style:
      name: Konštrukčný štýl gongu
      description: Štýl konštrukcie alebo kovania gongu.
    tam_tam_items_included:
      name: Obsah balenia gongu
      description: Príslušenstvo dodávané s gongom (napr. kladivo, stojan, kryt).
    tamarillo_variety:
      name: Druh ovocia tamarillo
      description: Určuje konkrétnu odrodu alebo farebnú variantu tamarilla.
    tamarind_variety:
      name: Odroda tamarindu
      description: Určuje botanickú alebo trhovú odrodu tamarindu, ktorá môže ovplyvniť
        chuť, textúru a kulinárske využitie.
    tambourine_frame_style:
      name: Štýl rámu tamburíny
      description: Opisuje fyzickú konštrukciu ručného rámu používaného na držanie
        a hru na tamburínu.
    tambourine_head_material:
      name: Materiál hlavy tamburíny
      description: Určuje materiál hracej blany (membrány) pri tamburínach s blanou.
    tambourine_jingle_configuration:
      name: Konfigurácia zvonkohier na tamburíne
      description: Ako sú zvonkohry usporiadané alebo zostavené na tamburíne.
    tambourine_jingle_material:
      name: Materiál zvonkohier na tamburíne
      description: Špecifikuje materiál zvonkohier tamburíny (kovových diskov), ktorý
        ovplyvňuje tón a trvanlivosť.
    tambourine_mounting_type:
      name: Typ montáže tamburíny
      description: Spôsob, ako sa má tamburína držať alebo upevniť počas hry.
    tambourine_tuning_mechanism:
      name: Mechanizmus ladenia tamburíny
      description: Špecifikuje systém ladenia používaný na laditeľných ručných tamburínach
        (ak je to relevantné).
    tank_model_scale:
      name: Mierka modelu tanku
      description: Špecifikuje mierku modelu tanku (napr. 1:35, 1:72).
    tank_top_back_style:
      name: Strih zadnej časti tielka
      description: Špecifikuje tvar alebo strih zadnej časti tielka, čo ovplyvňuje
        oporu, voľnosť pohybu a vzhľad.
    tape_application_area:
      name: Oblasť použitia pásky
      description: Špecifikuje časť výstroja alebo tela hráča, na ktorú je páska určená,
        čo pomáha nakupujúcim vybrať správny typ.
    tape_finish:
      name: Povrchová úprava pásky
      description: Povrchová/vizuálna úprava (lesk alebo textúra) pásky.
    tape_purpose:
      name: Účel použitia pásky
      description: Špecifikuje primárne funkčné použitie pásky pri údržbe alebo prispôsobení
        rakety.
    tape_type:
      name: Typ pásky
      description: Klasifikuje funkčný typ alebo konštrukciu hokejovej pásky, napríklad
        textilná, priehľadná polyetylénová, protišmyková, elastická súdržná, na chrániče
        holení alebo jelenicová.
    tapenade_main_ingredients:
      name: Hlavné ingrediencie tapenády
      description: Špecifikuje hlavnú základnú zložku, ktorá charakterizuje tapenádu
        (olivy, paradajky, baklažány, papriky atď.), čo je užitočné pre nakupujúcich
        s preferenciami alebo obmedzeniami týkajúcimi sa zložiek.
    tapestry_loom_loom_format:
      name: Formát tkáčskeho stavu na gobelíny
      description: Celkový tvar/štýl stojana ručného tkáčskeho stavu na gobelíny.
    tapestry_loom_shedding_method:
      name: Spôsob oddeľovania osnovných nití pri tkáčskom stave na gobelíny
      description: Spôsob, akým tkáčsky stav vytvára otvor v osnove (oddeľuje osnovné
        nite) na prevliekanie útkovej nite.
    tapestry_loom_tensioning_system:
      name: Systém napínania tkáčskeho stavu na gobelíny
      description: Spôsob napínania a upevnenia osnovy na tkáčskom stave na gobelíny.
    tar_head_material:
      name: Materiál dechtovej hlavy
      description: Určuje materiál blany (membrány) bubna tar, ktorý výrazne ovplyvňuje
        pocit pri hre, odolnosť a zvuk.
    tar_playing_style:
      name: Štýl hry na tar
      description: Špecifikuje hlavnú hráčsku polohu alebo techniku, pre ktorú je
        tar určený.
    tar_tuning_system:
      name: Ladiaci systém taru
      description: Špecifikuje spôsob ladenia taru (ako sa nastavuje napätie blany).
    target_components:
      name: Cieľové komponenty
      description: Určuje, ktoré komponenty nasávania paliva/vzduchu má produkt čistiť.
    target_relative_humidity_rh:
      name: Cieľová relatívna vlhkosť (RH)
      description: Zamýšľaná cieľová relatívna vlhkosť, ktorú má výrobok udržiavať
        vo vnútri prístroja/puzdra.
    target_resetting_mechanism:
      name: Mechanizmus resetovania terča
      description: Opisuje, ako alebo či sa terč po zásahu vráti do pôvodnej polohy.
    target_trainer_type:
      name: Typ terčov na tréning streľby
      description: Klasifikuje celkový štýl alebo formát raketbalového alebo squashového
        terčového trenažéra.
    targeted_contaminants:
      name: Cielenie na nečistoty
      description: Typy mikróbov alebo parazitov, na ktorých odstránenie je produkt
        certifikovaný.
    targeted_muscle_group:
      name: Cieľová svalová skupina
      description: Hlavná svalová skupina, ktorú má doplnok trénovať alebo podporovať.
    taro_variety:
      name: Druh koreňa taro
      description: Špecifikuje kultivar, druh alebo obchodný názov koreňa taro (napr.
        fialové taro, eddoe, dasheen).
    tassel_trim_header_type:
      name: Typ horného zakončenia s dekoratívnym strapcom
      description: Určuje konštrukciu hornej/montážnej časti používanú na pripevnenie
        strapcového lemu k povrchu (napr. páska, vrkoč, šnúra).
    tassel_trim_use_case:
      name: Použitie strapcového lemu
      description: Hlavná určená oblasť použitia strapcového lemu.
    taste_profile:
      name: Profil chuti
      description: Opisuje dominantné chuťové vlastnosti odrody jablka.
    tea_variety:
      name: Druh čaju
      description: Klasifikuje konkrétny typ alebo štýl čaju či nálevu (napr. čierny,
        zelený, matcha, rooibos), aby si nakupujúci mohli filtrovať podľa preferovanej
        odrody.
    teasing_tool_style:
      name: Štýl nástroja na česanie
      description: Fyzický štýl alebo konštrukčný formát nástroja na česanie, používaného
        na uvoľňovanie a miešanie vlákien (napr. kefa, hrable, hrebeň).
    tee_base_style:
      name: Štýl základne odpalísk
      description: Identifikuje konštrukčné riešenie základne kopacieho odpaliska
        na ragby, ktoré podporuje loptu.
    temper_hardness:
      name: Temper/tvrdosť
      description: Udáva, aký mäkký alebo tvrdý je drôt (ako dobre si drží tvar).
    temperature_control_type:
      name: Typ ovládača teploty
      description: Spôsob regulácie alebo nastavenia teploty nástroja.
    tenkara_action_ratio:
      name: Pomer akcie prútu Tenkara
      description: Určuje tradičný pomer ohybu prútu Tenkara, ktorý popisuje, kde
        sa prút ohýba pri zaťažení (napr. 6:4).
    tennis_ball_court_surface:
      name: Povrch tenisového kurtu
      description: Špecifikuje povrch(y) ihriska, pre ktorý(é) je loptička určená,
        aby sa zabezpečila optimálna výkonnosť a odolnosť.
    tennis_ball_pressure_type:
      name: Typ tlaku tenisovej loptičky
      description: Identifikuje vnútorný tlak alebo konštrukciu loptičky (tlaková,
        beztlaková, nízkokompresná, penová), ktorá ovplyvňuje odraz a trvanlivosť.
    tennis_racket_grip_size:
      name: Veľkosť úchopu tenisovej rakety
      description: Špecifikuje štandardizovaný obvod používateľskej karty rakety (L0–L5
        alebo palcové ekvivalenty) pre zabezpečenie správneho uchytenia a pohodlia
        v ruke.
    tenor_flutophone_fingering_system:
      name: Prstoklad pre tenorový flutofón
      description: Určuje systém prstokladov používaný tenorovým flutofónom (učebné
        osnovy/notačná konvencia).
    tenor_recorder_joint_type:
      name: Typ kĺbu tenorovej zobcovej flauty
      description: Určuje typ spojenia/pripojenia medzi sekciami tenorovej flauty.
    tenor_saxophone_key_system:
      name: Systém klapiek tenor saxofónu
      description: Špecifikuje systém klapiek/štandard mechaniky nástroja (často označovaný
        ako francúzsky/Boehmov štýl pri saxofónoch).
    tenor_saxophone_pad_material:
      name: Materiál podložky pre tenor saxofón
      description: Určuje primárny materiál použitý na výrobu podložiek pod nástroje.
    tenor_trombone_slide_type:
      name: Tenorový trombón s posuvníkom
      description: Typ posuvníka tenorového trombónu (napr. štandardný/rovný alebo
        s kvartventilom/s axiálnym rotačným ventilom).
    tenor_trombone_valve_configuration:
      name: Konfigurácia tenorového trombónového ventilu
      description: Označuje, či má tenorový trombón pripojenie k ventilu/rotoru a
        akú konfiguráciu používa.
    tension_control_type:
      name: Typ kontroly napínania
      description: Určuje, ako (alebo či) člnok poskytuje nastaviteľný odpor/napätie
        na cievke počas odvíjania priadze.
    tension_mechanism:
      name: Napínací mechanizmus
      description: Spôsob napínania používaný na riadenie posuvu útku z cievky/cievky
        počas tkania.
    tension_pitch_modulation_system:
      name: Systém modulácie napätia/výšky tónu
      description: Spôsob, akým sa mení výška tónu hovoriaceho bubna počas hry (napr.
        stláčaním napínacích šnúr).
    tension_system:
      name: Napínací systém
      description: Systém navíjania/napínania na kolovrátku, pre ktorý je sada s krídlom
        určená.
    tent_fabric_material:
      name: Materiál látky stanu
      description: Určuje hlavný materiál plášťa alebo tela stanu, ktorý ovplyvňuje
        hmotnosť, priedušnosť a odolnosť voči poveternostným vplyvom.
    tent_season_rating:
      name: Sezónne hodnotenie stanu
      description: Klasifikuje stan podľa počtu sezón alebo poveternostných podmienok,
        na ktoré je navrhnutý (napr. 3-sezónny, 4-sezónny, expedičný).
    tent_setup_type:
      name: Typ postavenia stanu
      description: Určuje konštrukčný spôsob stavania stanu, napr. samonosný, čiastočne
        samonosný, nesamonosný, nafukovací/airframe alebo samorozkladací.
    tent_style:
      name: Štýl stanu
      description: Opisuje konštrukčné riešenie stanu (napr. kupola, tunel, A-rán).
    test_result_output_method:
      name: Spôsob zobrazenia výsledkov testu
      description: Špecifikuje, akým spôsobom tester autobatérií zobrazuje alebo poskytuje
        výsledky testu používateľovi (napr. indikátor, displej, tlačový výstup, aplikácia
        alebo softvérová správa).
    tether_strap_system:
      name: Systém popruhov/upevňovacích prvkov
      description: Typ popruhového alebo upevňovacieho systému použitého na pripojenie
        krčnej opory k prilbe/postroju (ak je to relevantné).
    text_color:
      name: Farba textu
      description: Farba tlačeného alebo vyšívaného textu na etikete, odlišná od farby
        pozadia etikety.
    textile_craft_machine_operation_type:
      name: Typ obsluhy textilného remeselného stroja
      description: Spôsob pohonu stroja (ručný, nožný alebo motorový/elektrický).
    textile_finish_treatment:
      name: Textilná úprava/variant
      description: Špecifikuje významné povrchové úpravy aplikované na textilný materiál.
    texture_inclusions:
      name: Textúrové inklúzie
      description: Určuje pridané textúrne zložky, ako napríklad dužina aloe, bazalkové
        semienka, nata de coco, praskajúce guľôčky alebo kúsky ovocia.
    therapeutic_technology:
      name: Terapeutická technológia
      description: Špecifikuje akékoľvek integrované terapeutické funkcie, ako napríklad
        chladiaci gél, magnetické pásiky alebo infračervenú keramiku.
    thermal_set_components:
      name: Súprava termoprádla
      description: Objasňuje, či produkt obsahuje iba spodný diel, iba vrchný diel,
        alebo obidva diely súpravy.
    thermal_weight:
      name: Tepelná hmotnosť
      description: Určuje tepelnú kategóriu (hrejivosť) materiálu kukly.
    thermostat_type:
      name: Typ termostatu
      description: Funkčný dizajn alebo štýl ovládania termostatu chladiaceho systému
        motorového vozidla.
    thimble_guide_size:
      name: Veľkosť vodidla náprstka
      description: Označenie veľkosti vodidla náprstka (veľkosť prispôsobenia/pokrytia),
        zvyčajne uvádzané ako malé/stredné/veľké namiesto rozmerov.
    thread_connection_size:
      name: Veľkosť závitového pripojenia
      description: Určuje špecifikáciu závitu používaného na spojenie drieku, hrotov
        a adaptérov (napr. 6 mm, 5/16"-24).
    thread_construction:
      name: Zhotovenie vlákna
      description: Spôsob zhotovenia alebo ošetrenia vlákna (napr. spletená vyšívacia
        niť vs. lepené vlákno).
    thread_cord_type_beading_pattern:
      name: Typ vlákna/šnúrky (vzorka navliekania korálikov)
      description: Odporúčaný typ vlákna alebo šnúry použitý na dokončenie vzoru.
    thread_cutter_form_factor:
      name: Tvarový faktor rezačky závitov
      description: Identifikuje fyzický štýl rezačky vlákna, napríklad ručné nožnice,
        nožnice s príveskom alebo prstencové nožnice.
    thread_cutter_mechanism:
      name: Mechanizmus rezačky vlákna
      description: Opisuje reznú činnosť alebo mechanizmus používaný rezačkou vlákna.
    thread_cutter_safety_features:
      name: Bezpečnostné prvky rezačky závitov
      description: Označuje zabudované bezpečnostné prvky, ktoré znižujú riziko náhodného
        porezania alebo chránia čepele počas skladovania.
    thread_cutter_usage_application:
      name: Použitie/aplikácia rezačky vlákien
      description: Označuje primárne zamýšľané použitie rezačky vlákna v remeselnej
        činnosti.
    thread_finish_treatment:
      name: Povrchová úprava/ošetrenie závitu
      description: Povrchová úprava alebo variant aplikovaný na vlákno ovplyvňujúci
        manipuláciu a výkonnosť (napr. voskovaný, lepený, mercerovaný).
    thread_material:
      name: Vláknitý materiál
      description: Hlavné zloženie vlákna/materiálu nite (nie tkaniny).
    thread_material_fiber:
      name: Materiál nite (vlákno)
      description: Určuje primárne vlákno/materiál samotnej nite (nie tkaniny).
    thread_package_format:
      name: Formát balenia vlákna
      description: Tvarový faktor balenia šijacieho vlákna (napr. cievka, kužeľ, cievka).
    thread_rack_compatible_spool_type:
      name: Typ cievky kompatibilný s držiakom na nite
      description: Typ balenia nite, pre ktorý je stojan určený (napr. cievky, kužele
        a pod.).
    thread_standard_size:
      name: Štandardná veľkosť závitu
      description: Určuje štandard veľkosti/hmotnosti nite uvedený na etikete produktu
        (napr. wt, Tex, denier).
    thread_type:
      name: Typ vlákna
      description: Špecifikuje konštrukciu/typ vyšívacej nite pre krížikovú výšivku.
    thread_weight_system:
      name: Systém označenia hmotnosti vlákna
      description: Norma používaná na vyjadrenie hrúbky/hmotnosti vlákna.
    thread_yarn_guide_mounting_attachment_style:
      name: Spôsob montáže/upevnenia vodiča nite a priadze
      description: Opisuje spôsob, akým sa vodič nosí alebo upevňuje počas používania.
    thread_yarn_guide_tension_control:
      name: Regulácia napnutia vodiča nite a priadze
      description: Označuje, či a ako vodič poskytuje nastaviteľné napätie/odpor vlákna
        alebo priadze.
    thread_yarn_organizer_features:
      name: Funkcie organizéra na nite a priadzu
      description: Zdôrazňuje funkčné prvky organizácie a prenosnosti špecifické pre
        skladovanie nite a priadze.
    threader_intended_use:
      name: Určené použitie rezača závitov
      description: Označuje hlavný kontext remeselného použitia, pre ktorý je ručný
        navliekač ihiel určený.
    threading_system:
      name: Závitový systém
      description: Označuje metódu a pomôcky použité na navliekanie šijacieho stroja
        (napr. manuálne, farebne odlíšené, navádzané, vzduchové navliekanie).
    threading_type:
      name: Typ závitu
      description: Označuje, či šperk používa vnútorné vlákno, vonkajšie vlákno, je
        bez závitu alebo nie je použiteľný.
    throttle_type_scooter_conversion:
      name: Typ škrtiacej klapky (konverzia kolobežky)
      description: Určuje faktor/rozhranie škrtiacej klapky zahrnutý alebo vyžadovaný
        konverznou súpravou.
    throw_rope_end_attachment:
      name: Upevnenie konca vrhacieho lana
      description: Upevňovací hardvér alebo slučka na konci (koncoch) vrhacieho lana.
    throw_rope_storage_packaging_type:
      name: Úložný priestor/typ balenia na vrhacie lano
      description: Ako sa má vrhacie lano uložiť alebo nasadiť (napr. vrecko alebo
        cievka).
    throw_rope_visibility_features:
      name: Viditeľnosť vrhacieho lana
      description: Viditeľné a identifikačné prvky určené na uľahčenie viditeľnosti
        lana vo vode/za slabého osvetlenia.
    thrower_operation_type:
      name: Typ ovládania pradiarského stroja
      description: Klasifikuje mechanický/prevádzkový štýl vrhača pre rýchle filtrovanie
        manuálnych a automatických mechanizmov.
    thumb_design:
      name: Dizajn palca
      description: Opisuje, ako je palec začlenený do rukavice, čo ovplyvňuje bezpečnosť
        a uchopenie.
    tiara_design:
      name: Dizajn korunky do vlasov
      description: Určuje celkový štrukturálny štýl alebo siluetu korunky do vlasov.
    tie_down_points_straps_included:
      name: Uväzovacie body/popruhy sú súčasťou balenia
      description: Určuje, či stojan obsahuje integrované úchyty a/alebo popruhy na
        zabezpečenie motocykla/skútra.
    tiling_format:
      name: Formát dlaždíc
      description: Určuje štýl rozloženia PDF pre zostavovanie tlačených stránok.
    time_current_characteristic:
      name: Časovo-prúdová charakteristika
      description: Označuje správanie poistky v závislosti od časového prúdu (napr.
        rýchla reakcia vs. časové oneskorenie), čo ovplyvňuje vhodnosť pre obvody
        so zapínacím prúdom.
    timer_count_mode:
      name: Režim počítania časovača
      description: Určuje režim počítania časovača, napríklad odpočítavanie smerom
        nadol, odpočítavanie smerom nahor (stopky), oboje alebo intervalové/opakujúce
        sa počítanie.
    timer_display_type:
      name: Typ zobrazenia časovača
      description: Označuje, ako časovač hry zobrazuje zostávajúci čas (napr. digitálny
        displej, analógový ciferník, presýpacie hodiny alebo žiadny vizuálny displej).
    timer_operating_modes:
      name: Režim prevádzky časovača
      description: Správanie časovača je podporované pre spúšťacie efekty.
    timing_belt_construction_material_rubber_compound:
      name: Materiál konštrukcie rozvodového remeňa (gumová zmes)
      description: Použitá primárna gumová zmes remeňa (napr. HNBR), ktorá ovplyvňuje
        odolnosť voči teplu/oleju a dlhú životnosť.
    timing_belt_profile:
      name: Profil rozvodového remeňa
      description: Profil zubov/štandardný tvar rozvodového remeňa (napr. lichobežníkový
        vs. krivočiary).
    timing_belt_reinforcement_cord_material:
      name: Materiál kábla na vystuženie rozvodového remeňa
      description: Určuje materiál vnútornej výstuže remeňa vo vnútri rozvodového
        remeňa (napr. sklolaminát, aramid), ktorý ovplyvňuje pevnosť a pružnosť.
    timing_component_material:
      name: Materiál komponentov časovača
      description: Primárny materiál rozvodového komponentu (zmes remeňa, kov reťaze/prevodu,
        krycí materiál).
    tin_whistle_body_material:
      name: Plechový materiál tela píšťaly
      description: V prípade potreby zachytáva bežný plechový materiál tela píšťaly
        špecifickejšie ako široký zoznam materiálov nástroja.
    tin_whistle_bore_type:
      name: Plechový typ píšťalky
      description: Určuje dizajn vývrtu plechovej píšťalky.
    tin_whistle_included_accessories:
      name: Plechová píšťalka vrátane príslušenstva
      description: Príslušenstvo súčasťou plechovej píšťalky (napr. puzdro, čistiaca
        tyč).
    tip_finish_coating:
      name: Povrchová úprava/náter hrotu
      description: Špecifikuje variant povrchu na pracovnej strane (napr. pochrómovaný,
        lakovaný s práškom), ktorý ovplyvňuje odolnosť voči korózii a poškodeniu ráfika.
    tip_shape:
      name: Tvar hrotu
      description: Opisuje tvar alebo ostrosť hrotu brnkadla na gitare, ktorá ovplyvňuje
        artikuláciu a pocit pri hre.
    tippet_rating:
      name: Hodnotenie nadväzca
      description: Maximálna odporúčaná pevnosť nadväzca vyjadrená v označení X pre
        muškárenie (napr. 4X).
    tire_changer_operation_type:
      name: Typ operácie so strojom na výmenu pneumatík
      description: Určuje, ako sa stroj na výmenu pneumatík ovláda (napr. manuálne,
        pneumaticky, hydraulicky). Odlišné od všeobecného atribútu „zdroj energie“;
        používa sa pri opise spôsobu ovládania stroja.
    tire_changer_type:
      name: Typ stroja na výmenu pneumatík
      description: Všeobecný štýl prevádzky, dizajn alebo úroveň automatizácie stroja
        na výmenu pneumatík.
    tire_compound_type:
      name: Typ zmesi do pneumatiky
      description: Určuje klasifikáciu gumovej zmesi použitej v pneumatikách (napr.
        mäkká, dažďová, hladká), ktorá ovplyvňuje trakciu a trvanlivosť pri rôznych
        stavoch produktu.
    tire_load_range:
      name: Rozsah zaťaženia pneumatík
      description: Označuje rozsah hodnôt/typu pneumatiky (bežne pre pneumatiky LT)
        odrážajúci nosnosť.
    tire_position:
      name: Poloha pneumatiky
      description: Odporúčaná montážna poloha na vozidle.
    tire_repair_kit_components:
      name: Komponenty súpravy na opravu pneumatík
      description: Určuje položku zahrnutú v súprave, čím umožňuje zákazníkom porovnať
        úplnosť balíka.
    tire_sidewall_type:
      name: Typ bočnice pneumatiky
      description: Určuje štýl alebo konštrukčné prvky bočnej steny.
    tire_speed_rating:
      name: Index rýchlosti pneumatík
      description: Písmeno rýchlostného indexu pneumatiky (napr. H, V, W) udávajúce
        maximálnu schopnosť trvalej rýchlosti.
    tire_spoon_type:
      name: Typ montážnej lyžice na pneumatiky
      description: Kategorizuje montážnu lyžicu na pneumatiky podľa tvaru koncov a
        zamýšľaného použitia.
    tire_system_compatibility:
      name: Kompatibilita systémov pneumatík
      description: Označuje, či je tmel určený pre nastavenie bezdušových pneumatík,
        pneumatiky s dušou alebo oboje.
    tire_temperature_rating_utqg:
      name: Teplotný rozsah pneumatík (UTQG)
      description: Trieda teplotnej odolnosti UTQG pre automobilové pneumatiky (napr.
        A, B, C).
    tire_traction_rating_utqg:
      name: Hodnotenie trakcie pneumatík (UTQG)
      description: Trakčná trieda UTQG pre výkonnosť brzdenia na mokrom.
    tire_tread_style:
      name: Štýl dezénu pneumatiky
      description: Opisuje všeobecný dezén galuskovej pneumatiky, ktorý odráža zamýšľaný
        terén a trakčné vlastnosti.
    tire_tube_type:
      name: Typ duše pneumatiky
      description: Či je pneumatika určená na použitie s dušou alebo bezdušovou pneumatikou.
    title_status:
      name: Stav rýdzosti
      description: Právny/registračný stav vozidla.
    tobacco_application:
      name: Aplikácia tabaku
      description: Označuje zamýšľaný spôsob konzumácie alebo fajčiarske zariadenie,
        pre ktoré je sypaný tabak určený.
    tobacco_cut_type:
      name: Typ tabakového rezu
      description: Určuje fyzický spôsob rezania alebo úpravy sypaného tabaku, ktorý
        ovplyvňuje rýchlosť horenia, spôsob balenia a celkový fajčiarsky zážitok.
    tobacco_strength:
      name: Sila tabaku
      description: Označuje vnímaný účinok na telo alebo nikotínový zážitok pri konzumácii,
        pomáha nakupujúcemu vybrať intenzitu, ktorá zodpovedá ich preferencii.
    toe_construction:
      name: Konštrukcia špičky
      description: Určuje konfiguráciu oblasti prstov neoprénových čižiem, ktorá ovplyvňuje
        stav vyváženia, pocit z dosky a teplo.
    toe_coverage:
      name: Pokrytie špičky
      description: Označuje typ pokrytia prstov, ktoré poskytuje ponožka.
    toe_pick_style:
      name: Štýl špičky prstov na nohe
      description: Opisuje dizajn špičky na čepeliach na krasokorčuľovanie.
    toe_protection_type:
      name: Typ ochrany špičky
      description: Označuje, či a ako je oblasť špičky vystužená z bezpečnostných
        dôvodov (napr. oceľová špička, mäkká špička).
    toe_reinforcement_type:
      name: Typ výstuže špičky
      description: Detailne opisuje konštrukciu oblasti prstov, vplyv na odolnosť
        a kompatibilitu s obuvou.
    toe_stop_stem_thread_size:
      name: Veľkosť závitu skrutky stonky brzdovej pätky
      description: Veľkosť závitu skrutky stoniek brzdovej pätky pre zaistenie kompatibility
        s doskou.
    tofu_preparation_style:
      name: Štýl prípravy tofu
      description: Kategorizuje tradičný štýl alebo podtyp tofu nad pevnosťou (napr.
        jemné, blokové, nadýchané, s kožou, uzlové, kvasené).
    tom_mount_adjustment_features:
      name: Funkcie nastavenia držiaka tom
      description: Určuje, aké nastavenia umožňuje držiak tom na umiestnenie bubna
        (napr. sklon, rotácia, výška).
    tom_mount_components_included:
      name: Komponenty na montáž tom zostavy bubnov v cene
      description: Určuje, ktoré diely sú súčasťou držiaka tom (prijímač, rameno,
        guľa, svorky, pamäťové zámky atď.).
    tom_mount_mounting_position:
      name: Poloha upevnenia držiaka tom
      description: Určuje, kam sa má držiak tom pripevniť (napr. basový bubon, stojan
        na činely, stojan).
    tonneau_cover_mounting_style:
      name: Montáž krytu korby
      description: Označuje, ako sa kryt korby inštaluje/pripevňuje k nosníkom korby
        nákladného vozidla.
    tool_case_form_factor:
      name: Tvar kufríka na náradie
      description: Identifikuje fyzický štýl kufríka, vplyv na nosenie a skladovanie
        (napr. aktovka, pevný kufrík).
    tool_functions_included:
      name: Funkcie nástroja zahrnuté
      description: Uvádza zoznam špecifických funkcií opravy alebo údržby, ktoré dokáže
        vykonávať multifunkčný nástroj alebo súprava nástrojov.
    top_bunk_access_method:
      name: Metóda prístupu na horné poschodie
      description: Označuje, ako sa osoby dostanú na hornú korbu, čo pomáha z hľadiska
        bezpečnosti a priestoru.
    top_fit:
      name: Vrchný strih
      description: Určuje celkovú siluetu alebo strih vrchného dielu na tele (napr.
        úzky alebo nadrozmerný).
    top_hat_style:
      name: Štýl cylindra
      description: Identifikuje špecifickú štýlovú variáciu cylindra.
    top_soundboard_material:
      name: Materiál vrchnej dosky (rezonančnej dosky)
      description: Určuje materiál vrchnej dosky/rezonančnej dosky gitary (primárnej
        dosky vytvárajúcej tón).
    topping_form:
      name: Formulár na posýpku
      description: Definuje fyzickú formu alebo konzistenciu dezertnej polevy, aby
        pomohla nakupujúcim rýchlo zúžiť požadovanú aplikáciu.
    topping_type:
      name: Typ polevy
      description: Označuje primárnu vonkajšiu polevu alebo povrchovú úpravu aplikovanú
        na šišku.
    tow_hook_type:
      name: Typ ťažného háku
      description: Označuje, či kolenný schodík obsahuje integrovaný ťažný hák a špecifikuje
        typ jeho mechanizmu.
    tow_point_configuration:
      name: Konfigurácia ťažného bodu
      description: Určuje konfiguráciu ťažných bodov (jednoduchý, dvojitý, viacnásobný),
        ktoré ponúka vlečná duša pre rôzne polohy jazdy.
    tow_strap_protective_features:
      name: Ochranné prvky ťažného popruhu
      description: Pozoruhodné bezpečnostné a odolné konštrukčné prvky zabudované
        do ťažného popruhu.
    tow_strap_type:
      name: Typ ťažného popruhu
      description: Označuje funkčnú konštrukciu ťažného popruhu, napríklad statický
        ťažný popruh vs. kinetický ťahací popruh.
    towable_tube_style:
      name: Ťahané rúrkové prevedenie
      description: Identifikuje všeobecný dizajn alebo tvarový faktor ťažnej rúry,
        ktorý určuje polohu jazdca a zážitok z jazdy.
    towed_water_sport_discipline:
      name: Disciplína vlečného vodného športu
      description: Určuje primárnu vlečnú vodnú aktivitu, pre ktorú sú rukavice určené.
    towel_features:
      name: Vlastnosti uterákov
      description: Uvádza špeciálne vlastnosti alebo doplnky, ktoré sú súčasťou balenia
        uteráka.
    towel_style:
      name: Štýl uteráka
      description: Klasifikuje funkčný dizajn alebo formát golfového uteráka.
    toy_airplane_control_type:
      name: Typ ovládania hračkárskeho lietadla
      description: Určuje, ako používateľ ovláda hračkárske lietadlo.
    toy_airplane_features:
      name: Funkcie hračkárskeho lietadla
      description: Zvýrazňuje významné herné prvky, ktoré sa nachádzajú na hračkárskom
        lietadle.
    toy_airplane_flight_capability:
      name: Schopnosť letu hračkárskeho lietadla
      description: Označuje, či je hračkárske lietadlo určené na skutočné lietanie/kĺzanie,
        alebo je určené predovšetkým na hru/predstavenie na zemi.
    toy_audio_features:
      name: Zvukové funkcie hračky
      description: Uvádza zvukovú schopnosť a zvukové efekty zabudované v hračke.
    toy_boat_play_features:
      name: Funkcie hrania s hračkárskou loďkou
      description: Zvýrazňuje pozoruhodné interaktívne prvky hračkárskych lodí na
        účely objavovania a filtrovania.
    toy_boat_recommended_play_environment:
      name: Odporúčané herné prostredie pre hračkársku loďku
      description: Špecifikuje nastavenia zamýšľanej hry pre hračkársku loď na podporu
        očakávaní nakupujúceho a bezpečnosti (napr. vaňa verzus voľná voda).
    toy_bowling_equipment_included:
      name: Súčasťou balenia je aj vybavenie na bowling
      description: Špecifikuje, ktoré bowlingové komponenty sú súčasťou hračkárskej
        bowlingovej súpravy (napr. špendlíky, guľa, dráha/žinenka, prenosná taška).
    toy_car_features:
      name: Funkcie hračkárskeho auta
      description: Zvýrazňuje herné prvky integrované do autíčka (oddelene od pohonu),
        ako sú svetlá, zvuky alebo otvárateľné časti.
    toy_drawing_tablet_accessories_included:
      name: Príslušenstvo k hračkárskym tabletom na kreslenie v cene
      description: Ďalšie príslušenstvo nad samotný tablet (napr. extra stylus, pečiatky).
    toy_drawing_tablet_erase_method:
      name: Spôsob vymazania kresby z kresliaceho tabletu
      description: Ako sa vyčistí/vymaže kresliaca plocha.
    toy_drawing_tablet_screen_type:
      name: Typ obrazovky tabletu na kreslenie hračiek
      description: Typ použitého povrchu na kreslenie/zobrazenie (napr. LCD písací
        tablet vs. magnetický).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Hračkársky kresliaci tablet, písací/kresliaci nástroj
      description: Primárny nástroj používaný na kreslenie na tablete (typ pera).
    toy_figure_sound_feature:
      name: Zvuková funkcia hračkárskej figúrky
      description: Označuje, či figúrka zvieraťa vydáva zvuky a aké (napr. rev, realistický
        zvuk zvieraťa).
    toy_game_features:
      name: Vlastnosti hračky/hry
      description: Zvýrazňuje významné herné alebo konštrukčné prvky relevantné pre
        plážové a pieskové hračky.
    toy_gift_basket_items_included:
      name: Darčekové hračky v košíku v cene
      description: 'Uvádza hlavné typy hračiek, ktoré sú súčasťou darčekového košíka
        (napríklad: plyšová hračka, stavebnica, puzzle).'
    toy_glider_launch_method:
      name: Metóda spustenia hračkárskeho padáka
      description: Určuje, ako sa hračkársky vetroň spúšťa, čo ovplyvňuje herný štýl
        a očakávania nakupujúceho.
    toy_helicopter_control_type:
      name: Typ ovládania hračkárskeho vrtuľníka
      description: Spôsob ovládania/prevádzky hračkárskeho vrtuľníka (nezávisle od
        pohonu), napríklad ručné diaľkové ovládanie, ovládanie aplikáciou alebo žiadne
        ovládanie (voľný let).
    toy_helicopter_features:
      name: Funkcie hračkárskeho vrtuľníka
      description: Kľúčové funkčné vlastnosti hračkárskeho vrtuľníka (najmä RC modelov),
        ktoré ovplyvňujú použiteľnosť a hernú hodnotu.
    toy_jacks_set_items_included:
      name: Súprava hračkárskych zdvihákov v cene
      description: Určuje, ktoré základné položky sú súčasťou sady hračkárskych zdvihákov
        (napr. zdviháky, lopta, vrecko).
    toy_keyboard_learning_mode:
      name: Režim učenia na detskej klávesnici
      description: Označuje vzdelávací/učiaci prístup podporovaný detskou klávesnicou
        (napr. svietiace klávesy, sprievodné piesne, riadené lekcie, učenie s pomocou
        aplikácií).
    toy_keyboard_sound_theme:
      name: Zvuková téma detskej klávesnice
      description: Typy vstavaných nástrojových hlasov/zvukov, ktoré témy ponúka (viac
        než len klavír).
    toy_kitchen_appliances_included:
      name: Súčasťou balenia sú aj hračkárske kuchynské spotrebiče
      description: Určuje kuchynský spotrebič (spotrebiče) zastúpený (zastúpené) v
        hernej súprave, ak je produkt spotrebič alebo súprava zameraná na spotrebiče.
    toy_kitchen_assembly_requirement:
      name: Požiadavka na montáž hračkárskej kuchyne
      description: Označuje, či je potrebná montáž a približnú zložitosť montáže.
    toy_kitchen_interactive_features:
      name: Interaktívne prvky hračkárskej kuchynky
      description: Zvýrazňuje interaktívne prvky, ktoré sa bežne nachádzajú v hračkárskych
        kuchynkách a súvisiacom príslušenstve.
    toy_motorcycle_feature_set:
      name: Súprava prvkov pre hračkársku motorku
      description: Kľúčové herné vlastnosti hračkárskej motorky (vyberte všetky, ktoré
        sa vzťahujú).
    toy_motorcycle_scale:
      name: Váha na hračkársku motorku
      description: Mierka pre hračkárske/zberateľské motocykle (napr. 1:12).
    toy_parachute_launch_method:
      name: Metóda spustenia hračkárskeho padáka
      description: Ako sa má hračka spustiť/vypustiť do vzduchu.
    toy_piano_and_keyboard_accessories_included:
      name: Súčasťou balenia je príslušenstvo pre detský klavír a klávesy
      description: Príslušenstvo je súčasťou balenia hračkárskeho klavíra alebo hračkárskeho
        klávesu.
    toy_playset_assembly_required:
      name: Vyžaduje sa montáž hračkárskej súpravy
      description: Označuje, či je pred hrou potrebná montáž dospelou osobou (viac
        než len jednoduché zasunutie).
    toy_playset_items_included:
      name: Komponenty hernej zostavy v cene
      description: Uvádza hlavné komponenty zahrnuté v hernej súprave (čo je súčasťou
        balenia).
    toy_safety_certification:
      name: Bezpečnostná certifikácia hračky
      description: Bezpečnostné normy a normy zhody platné pre hračky na spotrebiteľskom
        trhu (napr. EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Funkcie hračkárskej vesmírnej lode
      description: Označuje bežné interaktívne/herné prvky zabudované do hračkárskej
        vesmírnej lode.
    toy_spaceship_size_class:
      name: Veľkostná trieda hračkárskych vesmírnych lodí
      description: Označuje hrubú veľkostnú triedu hračkárskej vesmírnej lode na podporu
        rýchleho filtrovania, oddelene od presných rozmerov (dĺžka/šírka/výška) a
        nie od číselného pomeru mierky modelu (napr. 1:72).
    toy_tableware_pieces_included:
      name: Hračkársky riad v cene
      description: Špecifikuje, ktoré hračkárske riady sú súčasťou balenia (taniere,
        šálky, príbory, servírovacie predmety).
    toy_tool_electronic_features:
      name: Elektronické funkcie hračkárskeho náradia
      description: Opisuje interaktívne/elektronické funkcie hračkárskeho náradia
        (svetlá, zvuky, rotačný pohyb atď.).
    toy_tool_set_components_included:
      name: Komponenty sady hračkárskeho náradia v cene
      description: Uvádza konkrétne predmety na role, ktoré sú súčasťou balíka (najmä
        v prípade súprav náradia).
    toy_train_scale:
      name: Mierka hračkárskeho vláčika
      description: Určuje štandard mierky hračkárskeho/modelového vlaku (alebo veľkosť
        koľajnicového systému), aby bola zaručená kompatibilita s existujúcimi vlakmi
        a koľajnicami.
    toy_train_track_layout_type:
      name: Typ rozloženia koľajníc pre detský vláčik
      description: Popisuje priložené rozloženie/tvar koľajníc pre vlakovú súpravu
        alebo doplnkové balenie koľajníc.
    toy_weapon_gadget_features:
      name: Funkcie hračkárskych zbraní a gadgetov
      description: Zvýrazňuje bežné interaktívne a funkčné prvky špecifické pre hračkárske
        zbrane a špionážne zariadenia.
    tpms_sensor_frequency_band:
      name: Frekvenčné pásmo snímača TPMS
      description: Rádiové frekvenčné pásmo podporované príslušenstvom súvisiacim
        s TPMS (ak je to relevantné).
    track_and_field_discipline:
      name: Atletická disciplína
      description: Identifikuje konkrétne atletické udalosti alebo disciplíny, pre
        ktoré je produkt určený (napr. vrh guľou, skok o žrdi, šprinty).
    track_event_specialization:
      name: Špecializácia na atletické disciplíny
      description: Označuje typ udalostí, pre ktoré je optimalizovaná bodcová topánka.
    track_field_event_suitability:
      name: Vhodnosť pre atletické disciplíny
      description: Určuje konkrétnu atletickú disciplínu (disciplíny), pre ktorú (ktoré)
        je tréningová pomôcka určená.
    track_set_special_features:
      name: Špeciálne vlastnosti súpravy koľajníc
      description: Zvýrazňuje pozoruhodné herné prvky, ktoré sú súčasťou sady okrem
        základných tratí a vozidiel.
    track_surface_compatibility:
      name: Kompatibilita povrchu trate
      description: Označuje bežecký povrch (povrchy), pre ktorý je hrot alebo topánka
        určená.
    tracking_aid_type:
      name: Typ sledovacej pomôcky
      description: Označuje, či kajak obsahuje zariadenia, ktoré zlepšujú sledovanie
        priamej línie.
    traction_pattern_type:
      name: Typ trakčného vzoru
      description: Opisuje primárnu povrchovú drážku alebo vzor dezénu, ktorý zabezpečuje
        priľnavosť k doštičke.
    trading_card_league:
      name: Liga obchodných kariet
      description: Identifikuje športovú ligu spojenú so súpravou kariet alebo predmetom
        (ak je to relevantné).
    trailer_construction:
      name: Konštrukcia prívesov
      description: Určuje hlavný konštrukčný materiál rámu/karosérie prívesu (napr.
        hliník, oceľ alebo kombinovaná konštrukcia).
    trailer_coupler_size:
      name: Veľkosť spojky návesu
      description: Určuje veľkosť gule spojky návesu potrebnú na ťahanie.
    trailer_hitch_mounting_location_method:
      name: Lokalita/spôsob montáže ťažného zariadenia
      description: Určuje, kde a ako je ťažné zariadenie namontované na vozidle (napr.
        zadné prijímače, predné prijímače, montážny rám, montáž na nárazníku, montáž
        na korbe).
    trailer_light_function:
      name: Funkcia svetla prívesu
      description: Primárne funkcie/umiestnenie svetla prívesu.
    trailer_suspension_type:
      name: Typ odpruženia prívesu
      description: Určuje typ systému odpruženia použitého v prívese na bicykel, napríklad
        vinuté pružiny alebo listové pružiny, na zlepšenie pohodlia jazdy a ochrany
        nákladu.
    trailer_wiring_circuit:
      name: Obvod zapojenia prívesu
      description: Uvádza zoznam obvodov/signálov osvetlenia, brzdy a pomocných obvodov/signálov
        prenášaných kabelážou prívesu (t. j. ktoré napájacie/uzemňovacie a signálne
        vedenia sú prítomné).
    trailer_wiring_connector_type:
      name: Typ konektora zapojenia prívesu
      description: Špecifikuje štandard zástrčky na strane prívesu/vozidla používaný
        pre káblové zväzky a adaptéry prívesu.
    train_whistle_intended_use:
      name: Zamýšľané použitie vlakovej píšťalky
      description: Hlavný kontext použitia píšťalky.
    train_whistle_sound_character:
      name: Zvuk vlakovej píšťalky
      description: Opisuje vnímaný tónový charakter zvuku píšťalky (zafarbenie).
    trainer_mounting_type:
      name: Typ upevnenia trenažéra
      description: Opisuje, ako sa bicykel prepojuje s trenažérom (napr. pohon s kolesom
        alebo priamy pohon).
    training_dummy_shape:
      name: Tvar tréningovej figuríny
      description: Určuje celkový dizajn alebo siluetu figuríny, ktorá ovplyvňuje
        držanie psa a realizmus výcviku.
    training_focus:
      name: Zameranie tréningu
      description: Opisuje primárnu oblasť zručnosti, na ktorú sa pomôcka zameriava
        (napr. reflexy, práca nôh, koordinácia ruka-oko).
    training_focus_area:
      name: Oblasť zamerania školenia
      description: Určuje primárnu lakrosovú zručnosť, ktorú má pomôcka rozvíjať.
    training_objective:
      name: Cieľ tréningu
      description: Určuje primárnu zručnosť alebo techniku, ktorú má produkt zlepšiť.
    training_surface_suitability:
      name: Vhodnosť tréningového povrchu
      description: Určuje, na ktorých povrchoch je možné trenažér použiť.
    training_surface_usage:
      name: Využitie tréningového povrchu
      description: Špecifikuje primárne aktivity, ktoré tréningový povrch podporuje,
        a rozlišuje medzi syntetickými ľadovými panelmi vhodnými na korčuľovanie od
        suchých alebo multišportových podložiek.
    training_usage_type:
      name: Typ použitia tréningu
      description: Určuje primárne zamýšľané obdobie používania alebo kontext tréningových
        nohavíc, napríklad tréning cez deň alebo v noci.
    trampoline_enclosure_type:
      name: Typ ohradenia trampolíny
      description: Určuje konfiguráciu krytu použitého na trampolíne vrátane spôsobu/miesta
        montáže siete.
    trampoline_safety_certifications:
      name: Bezpečnostné certifikácie trampolíny
      description: Označuje, s ktorými bezpečnostnými normami a certifikátmi týkajúcimi
        sa trampolín produkt deklaruje súlad.
    transfer_application_method:
      name: Spôsob prepravy
      description: Určuje, ako sa prevod aplikuje na látku (napr. nažehľovanie vs.
        tepelný lis).
    transfer_method:
      name: Metóda prevodu
      description: Určuje, ako sa má dizajn previesť na látku.
    transfer_peel_temperature:
      name: Teplota na výstupnej strane
      description: Určuje odporúčaný teplotný stav (horúci, teplý alebo studený),
        pri ktorom sa má prípravný plech po lisovaní odstrániť.
    transmission_cooler_construction:
      name: Konštrukcia chladiča prevodovky
      description: Špecifikuje konštrukčný návrh chladiča prevodovky.
    transmission_fluid_specification:
      name: Špecifikácia prevodovej kvapaliny
      description: Norma OEM/špecifikácia, ktorú prevodová kvapalina spĺňa (napr.
        rodiny Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Materiál puzdra upevnenia prevodovky
      description: Určuje elastomér alebo izolačný materiál použitý v puzdre/izolátore
        montáže (prvok tlmiaci vibrácie).
    transmission_mount_type:
      name: Typ uchytenia prevodovky
      description: Špecifikuje konštrukciu/dizajn uloženia prevodovky (napr. hydraulické
        vs. pevné) s cieľom pomôcť určiť uloženie, charakteristiky NVH a zamýšľané
        použitie.
    transparency_level:
      name: Úroveň transparentnosti
      description: Opisuje, aké priehľadné sú steny koša, čo pomáha nakupujúcim rozhodnúť
        sa medzi dobrou viditeľnosťou a skrytým úložným priestorom.
    transport_case_type:
      name: Typ dopravného puzdra
      description: Klasifikuje štrukturálny štýl/tuhosť prepravného riešenia, odrážajúc
        úroveň ochrany a spôsob balenia.
    transposition_modes:
      name: Režimy preloženia
      description: Určuje režimy transpozície a koncertného ladenia, ktoré ladička
        podporuje (napr. koncertné ladenie a transponujúce tóniny, ako sú B♭ alebo
        E♭).
    trap_design:
      name: Konštrukcia pasce
      description: Identifikuje štrukturálny štýl alebo mechanizmus pasce, ktorý určuje
        spôsob nasadenia a druhy alebo prostredia, pre ktoré je najvhodnejšia.
    trap_spring_configuration:
      name: Konfigurácia pružiny pasce
      description: Označuje počet alebo usporiadanie pružín poháňajúcich pascu, čo
        ovplyvňuje pevnosť a legálnosť.
    travel_bassinet_accessories_included:
      name: Príslušenstvo k cestovnej postieľke je súčasťou balenia
      description: Zoznam doplnkov dodávaných spolu s cestovnou postieľkou.
    travel_spinning_wheel_assembly_required:
      name: Je potrebná montáž cestovného kolovratu
      description: Či je potrebné koleso pred použitím okrem rozloženia ešte zmontovať
        alebo nastaviť (napr. pripevniť lopatku, nastaviť napnutie, pedále).
    travel_spinning_wheel_portability_features:
      name: Funkcie prenosnosti cestovného kolovratu
      description: Dizajnové prvky súvisiace s prenosnosťou pre cestovné kolovraty,
        ako napríklad skladacia konštrukcia a integrované prepravné riešenia.
    travel_trailer_appliances_fuel_type:
      name: Typ paliva pre spotrebiče obytných prívesov
      description: Primárne palivo používané na palubné spotrebiče/kúrenie/varenie
        (nie ťažné vozidlo).
    travel_trailer_holding_tank_type:
      name: Typ nádrže na obytný príves
      description: Označuje, ktoré zberné nádrže sa nachádzajú v obytnom prívese (vyberte
        všetky, ktoré sa vzťahujú).
    travel_trailer_power_hookup_shore_power:
      name: Pripojenie napájania pre cestovný príves (pobrežné napájanie)
      description: Podporované štandardy elektrického pripojenia pre pripojenie na
        pevninu.
    tread_pattern_type:
      name: Typ profilu pneumatiky
      description: Klasifikuje celkový dezén pneumatiky, ako napríklad hladký, polohladký
        alebo hrboľatý, čo ovplyvňuje trakciu, valivý odpor a zamýšľaný povrch.
    treadmill_key_type:
      name: Typ kľúča na bežecký pás
      description: Opisuje fyzický štýl alebo mechanizmus ovládania/pripojenia bezpečnostného
        kľúča (napr. magnetický okrúhly, s plastovou vložkou, s klipom).
    treadmill_part_type:
      name: Typ časti bežeckého pásu
      description: Identifikuje konkrétny komponent bežeckého pásu, ktorý má produkt
        nahradiť, aby si kupujúci mohli rýchlo overiť jeho vhodnosť (napr. remeň vs.
        motor).
    treadmill_position:
      name: Poloha bežeckého pásu
      description: Označuje montážnu polohu dielu na bežiacom páse (predná, zadná,
        horná, dolná, stredná).
    triangle_striker_material:
      name: Materiál trojuholníkového úderníka
      description: Materiál priloženého úderníka/kladiva.
    trigger_input_connector:
      name: Vstupný konektor spúšťača
      description: Určuje štandard fyzického konektora použitý pre vstupy spúšťača.
    trigger_input_connector_type:
      name: Typ vstupného konektora spúšťača
      description: Určuje typ fyzického konektora používaného pre spúšťacie vstupy.
    trigger_input_zone_support:
      name: Zóna podpory vstupov spúšťača
      description: Uvádza, či spúšťacie vstupy podporujú jednozónové a/alebo dvojzónové
        spúšťače (napr. hlava/obruč) a podobné viaczónové riešenia.
    trim_application_method:
      name: Spôsob orezania
      description: Označuje, ako sa má lem pripevniť k projektu (napr. prišitím, nažehľovaním,
        lepením).
    trim_detail:
      name: Detail lemu
      description: Označuje výrazné ozdobné okraje alebo povrchové úpravy na odeve
        (napr. strapcový lem, strapce, čipkovaný lem).
    trim_elasticity:
      name: Elasticita lemu
      description: Označuje, či je lem ric-rac strečový na použitie na úpletoch/aktívnom
        oblečení.
    trim_finish:
      name: Povrchová úprava lemu
      description: Variant povrchovej úpravy aplikovaný na lem (napr. metalická, trblietavá,
        reflexná).
    trim_tilt_type:
      name: Typ lemu a náklonu
      description: Či a ako motor podporuje nastavenie lemu/náklonu.
    trolleybus_power_supply_type:
      name: Typ napájania trolejbusu
      description: Určuje, ako trolejbus prijíma trakčnú energiu z elektrickej siete.
    truck_bed_body_type:
      name: Typ korby/karosérie nákladného vozidla
      description: Konfigurácia nákladnej plochy alebo karosérie za kabínou.
    truck_bed_length_class:
      name: Trieda dĺžky ložnej plochy
      description: Označuje triedu dĺžky ložnej plochy nákladného vozidla, pre ktorú
        je sieť na náklad určená (bežne označovaná ako krátka/štandardná/dlhá korba).
    truck_mounting_hole_pattern:
      name: Schéma montážnych otvorov pre nákladné vozidlo
      description: Určuje rozloženie otvorov použitých na montáž nákladných vozidiel
        na palubu (napr. Old school, New school, Universal).
    truck_mounting_style:
      name: Štýl montáže nákladného vozidla
      description: Spôsob upevnenia podvozkov k plošine (horná montáž, priechodná
        montáž, atď.) ovplyvňuje svetlú výšku a stabilitu vozidla.
    truck_profile:
      name: Profil nákladného vozidla
      description: Označuje klasifikáciu výšky podvozku skateboardu vo vzťahu k doske,
        čo ovplyvňuje odstup kolies a jazdné vlastnosti dosky.
    trumpet_bell_material:
      name: Materiál zvona trúbky
      description: Materiál použitý na zvonovú časť (niekedy sa líši od zvyšku nástroja).
    trumpet_leadpipe_material:
      name: Materiál náustku na trúbku
      description: Materiál alebo variant použitý pre prívodnú rúrku (hlavná rúrka
        od náustku k ventilom).
    trundle_mechanism:
      name: Výsuvný mechanizmus
      description: Popisuje, ako sa z hlavného rámu vysúva sekundárna časť korby.
    trunk_part_type:
      name: Typ časti kufra
      description: Špecifikuje, ktorý komponent karosérie súvisiaci s kufrom sa predáva
        (napr. veko kufra, pánt, západka).
    tuba_leadpipe_material:
      name: Materiál náustku tuby
      description: Identifikuje materiál použitý na olovenú (náustkovú) časť tuby.
    tube_base_type:
      name: Typ pätice elektrónky
      description: Určuje skupinu pätíc/zásuviek, ktoré sa používajú na fyzické a
        elektrické zapojenie (napr. Octal, Noval/9-pin).
    tube_matching_grade:
      name: Trieda zodpovedajúca duši
      description: Označuje, či sú duše testované/párované ako súprava a aký typ párovania
        je poskytnutý.
    tube_weight_category:
      name: Hmotnostná kategória pätice elektrónky
      description: Klasifikuje dušu podľa konštrukcie/hmotnosti (napr. ultraľahká,
        štandardná, ťažká) pre rýchle porovnanie odolnosti a výkonnosti.
    tubeless_compatible:
      name: Kompatibilné s bezdušovými pneumatikami
      description: Označuje, či je koleso určené na použitie bez duše pri použití
        s bezdušovými pneumatikami.
    tubing_shape:
      name: Tvary hadičiek
      description: Určuje tvar prierezu nosnej rúrky stojana.
    tubular_construction_type:
      name: Typ rúrkovitej konštrukcie
      description: Špecifikuje konštrukčný štýl galuskových pneumatík bicyklov, pričom
        rozlišuje medzi tradičnými lepenými galuskami a novšími variantmi.
    tulip_type_flower_form:
      name: Typ tulipánu (tvar kvetu)
      description: Určuje záhradnícky typ/tvar kvetu tulipánov v kytici (napr. jednoduchý,
        dvojitý, papagájový).
    tuner_input_method:
      name: Metóda vstupu tunera
      description: Určuje, ako ladička deteguje výšku tónu (mikrofón, senzor vibrácií/klipov,
        vstup nástrojového kábla, kontaktné vyzdvihnutie).
    tuning_mechanism:
      name: Ladiaci mechanizmus
      description: Ako sa napínajú/ladia blany na bongách.
    tuning_system:
      name: Ladiaci systém
      description: Ako sa ladí bubon tarabuka, alebo či sa dá naladiť.
    turn_signal_lens_color:
      name: Farba šošovky smerových svetiel
      description: Farba viditeľnej šošovky/krytu na telese smerových svetiel (farba
        nevyžarovaného svetla).
    turn_signal_lighting_style:
      name: Štýl osvetlenia smerových svetiel
      description: Štýl/animácia vizuálnej signalizácie poskytovanej smerovým svetlom.
    turnip_and_rutabaga_variety:
      name: Odroda repy a kvaky
      description: Identifikuje konkrétny kultivar alebo odrodu repy alebo kvaky.
    tweeter_crossover_type:
      name: Typ výhybky výškového reproduktora
      description: Označuje typ crossover vysokej priepustnosti a/alebo ochranného
        komponentu, ktorý je súčasťou výškového reproduktora, ak existuje.
    tweeter_material:
      name: Materiál výhybky reproduktora
      description: Materiál primárnej membrány/kupoly výškového reproduktora.
    tweeter_mount_type:
      name: Typ uchytenia výškového reproduktora
      description: Určuje, ako sa má výškový reproduktor nainštalovať do vozidla (spôsob
        montáže/hardvér).
    twill_direction:
      name: Smer kepru
      description: Označuje smer keprovej väzby charakteristickej pre denim.
    twist_direction:
      name: Smer otáčania
      description: Smer skrútenia vlákien v priadzi/niti (S-skrútenie alebo Z-skrútenie).
    u_joint_series_size:
      name: Séria/veľkosť kĺbových spojok
      description: Určuje použitú sériu alebo veľkosť normy U-kĺbu (napr. séria 1310).
    uilleann_pipes_bag_material:
      name: Materiál na výrobu vreciek na írske gajdy
      description: Materiál, z ktorého je vyrobený komponent airbagu (ak je súčasťou
        výbavy), ktorý ovplyvňuje pocit z jazdy, životnosť a údržbu.
    uilleann_pipes_handedness:
      name: Strana, na ktorej sa hrá na írske gajdy
      description: Označuje, či je súprava konfigurovaná pre hranie pravou alebo ľavou
        rukou (rozloženie).
    uilleann_pipes_set_configuration:
      name: Konfigurácia nastavenia írske gajdy
      description: Určuje, aká konfigurácia írskych gájd je zahrnutá na základe prítomnosti
        regulátorov a dronov.
    uk_childrens_shoe_size:
      name: Veľkosť detskej obuvi vo Veľkej Británii
      description: Označuje veľkosť detskej obuvi v Spojenom kráľovstve, napríklad
        4 alebo 4 široký strih.
    uk_clothing_size:
      name: Veľkosť oblečenia v Spojenom kráľovstve
      description: Označuje veľkosť oblečenia v Spojenom kráľovstve, napr. 12 alebo
        18
    uk_cup_size:
      name: Veľkosť košíka v Spojenom kráľovstve
      description: Označuje veľkosť košíka v Spojenom kráľovstve, napr. C alebo FF
    uk_mens_shoe_size:
      name: Veľkosť pánskej obuvi v Spojenom kráľovstve
      description: Označuje veľkosť pánskej obuvi v Spojenom kráľovstve, napr. 9 alebo
        9 široký strih
    uk_womens_shoe_size:
      name: Veľkosť dámskej obuvi vo Veľkej Británii
      description: Určuje veľkosť dámskej obuvi vo Veľkej Británii, napríklad 6 alebo
        6 Wide
    ukulele_back_and_sides_wood:
      name: Drevená zadná strana a boky ukulele
      description: Identifikuje drevo/materiál použitý na zadnú stranu a boky ukulele.
    ukulele_body_cutaway:
      name: Výrez pre telo ukulele
      description: Označuje, či má telo koncertného ukulele výrez pre ľahší prístup
        k hornému pražcu.
    ukulele_body_shape:
      name: Tvar tela ukulele
      description: Všeobecný štýl tela/tvar používaný pre ukulele.
    ukulele_bridge_material:
      name: Materiál mostíka ukulele
      description: Určuje materiál použitý na mostík ukulele.
    ukulele_construction_type:
      name: Typ konštrukcie ukulele
      description: Ako sú skonštruované vrchná/zadná doska/boky nástroja (masívne
        vs. laminátové).
    ukulele_electronics_configuration:
      name: Konfigurácia ukulele elektroniky
      description: Označuje, či je ukulele iba akustické alebo obsahuje integrovanú
        elektroniku (snímač a/alebo predzosilňovač) na zosilnenie zvuku.
    ukulele_string_re_entrant_tuning:
      name: Ladenie ukulele s vnútornými strunami
      description: Či je ukulele naladené s opakovaným vstupom (vysoké-G) verzus lineárnym/nízkym-G;
        ide o bežnú voľbu kupujúcich, ktorá ovplyvňuje zvuk.
    ukulele_top_wood:
      name: Drevená vrchná doska ukulele
      description: Identifikuje drevo/materiál použitý na vrchnú dosku/rezonančnú
        dosku ukulele.
    ukulele_tuner_mechanism:
      name: Ladiaci mechanizmus ukulele
      description: Určuje štýl/mechanizmus ladičky použitý na ukulele.
    ukulele_tuner_type:
      name: Typ ladičky pre ukulele
      description: Štýl ladiacej mechaniky používanej na hlave ukulele.
    ukulele_tuning:
      name: Ladenie ukulele
      description: Určuje zamýšľané štandardné ladenie pre vreckové ukulele.
    ultralight_aircraft_wing_configuration:
      name: Konfigurácia krídla ultraľahkého lietadla
      description: Umiestnenie a konfigurácia primárneho krídla vzhľadom na trup/konštrukciu.
    under_bed_features:
      name: Prvky úložných systémov pod posteľ
      description: Označuje primárny funkčný prvok umiestnený pod plošinou korby.
    underfoot_strap_type:
      name: Typ popruhu pod chodidlom
      description: Identifikuje materiál alebo dizajn použitý pre remienok, ktorý
        sa spúšťa pod obuvou.
    underwear_fit:
      name: Strih spodnej bielizne
      description: Označuje celkový strih boxeriek (napr. slim, voľné, kompresné).
    underwear_pieces_included:
      name: Súprava pyžama v cene
      description: Identifikuje, ktoré kusy odevu sú dodávané (vrchný, spodný, oba
        alebo jednodielne celotelové oblečenie), aby zákazníci vedeli, či kupujú kompletnú
        sadu alebo len jednu.
    uniform_pieces_included:
      name: Súčasťou sú aj jednotné kusy
      description: Uvádza, ktoré komponenty odevu sú súčasťou dodávky (napr. košeľa,
        nohavice, vesta), čím spresňuje obsah balíka pri hromadných nákupoch alebo
        nákupoch súprav.
    uniform_role:
      name: Jednotná rola
      description: Určuje profesionálnu rolu alebo agentúru, pre ktorú je jednotná
        položka určená (napr. polícia, šerif, záchranná služba).
    update_method:
      name: Metóda aktualizácie
      description: Ako sa dodávajú aktualizácie firmvéru/softvéru pre skener.
    upholstery_fabric_backing_type:
      name: Typ podkladovej látky na čalúnenie
      description: Určuje podkladovú vrstvu/lamináciu čalúnenej látky, ktorá ovplyvňuje
        inštaláciu a pocit pri používaní.
    upholstery_fabric_water_resistance:
      name: Odolnosť čalúnenej látky voči vode
      description: Označuje odolnosť čalúneného povrchu voči vode a rozliatiu.
    upper_material:
      name: Vrchný materiál
      description: Určuje primárny materiál použitý na vrchnej časti tenisky, ktorý
        ovplyvňuje priedušnosť, odolnosť a estetiku.
    upright_bass_pickup_system:
      name: Systém snímačov pre kontrabas
      description: Označuje, či je na kontrabase nainštalovaný systém snímačov/predzosilňovača
        určený na zosilnenie.
    upright_piano_power_source:
      name: Zdroj energie pre pianína
      description: Spôsob napájania pianína, čo platí pre akustické pianína bez napájania,
        ako aj pre pianína s tichými/hybridnými systémami vyžadujúcimi elektrinu.
    urination_device_features:
      name: Prvky pomôcky na močenie
      description: Zvýrazňuje špeciálne dizajnové charakteristiky, ktoré zvyšujú funkčnosť
        alebo pohodlie.
    us_childrens_shoe_size:
      name: Veľkosť detskej obuvi v USA
      description: Určuje veľkosť detskej obuvi v USA, napríklad 5 alebo 5 široký
        strih.
    us_clothing_size:
      name: Veľkosť oblečenia v USA
      description: Určuje veľkosť oblečenia v USA, napr. 8 alebo 14
    us_cup_size:
      name: Veľkosť košíka v USA
      description: Označuje veľkosť košíka v USA, napr. C alebo DDD
    us_mens_shoe_size:
      name: Veľkosť pánskej obuvi v USA
      description: Označuje veľkosť pánskej obuvi v USA, napr. 10 alebo 10 široký
        strih
    us_ring_size:
      name: Veľkosť prsteňa v USA
      description: Označuje veľkosť prsteňa v USA, napr. 7 alebo 9,5
    us_womens_shoe_size:
      name: Veľkosť dámskej obuvi v USA
      description: Označuje veľkosť dámskej obuvi v USA, napr. 8 alebo 8 široký strih
    usage:
      name: Použitie
      description: Opisuje zamýšľaný prípad použitia/nastavenie vačkového hriadeľa.
    usda_honey_grade:
      name: USDA stupeň medu
      description: Označuje oficiálnu triedu medu podľa klasifikácie Ministerstva
        poľnohospodárstva Spojených štátov amerických (USDA).
    user_control_method:
      name: Spôsob ovládania používateľa
      description: Označuje, ako používateľ komunikuje so zariadením (napr. pomocou
        integrovaného ovládacieho panela, diaľkového ovládania, aplikácie, hlasu),
        a informuje o aspektoch jednoduchosti používania.
    vacuum_boost_reference_port:
      name: Referenčný port pre vákuum/zosilnenie
      description: Označuje, či regulátor obsahuje referenčný otvor rozdeľovača pre
        podtlak/pretlak a aký typ to je.
    valve_base_shape:
      name: Tvar základne ventilu
      description: Identifikuje geometriu rozhrania medzi základňou ventilu a okrajom
        (okrúhla, kužeľovitá, bočný otvor, tvar T atď.), ktorá ovplyvňuje tesnenie
        a kompatibilitu penovej vložky.
    valve_core_type:
      name: Typ jadra ventilu
      description: Označuje, či je jadro ventilu odnímateľné, pevné alebo bez jadra,
        čo ovplyvňuje postupy údržby a kompatibilitu s nástrojmi na vstrekovanie tmelu.
    valve_cover_gasket_material:
      name: Materiál tesnenia veka ventilov
      description: Určuje materiál tesnenia veka ventilov, ktoré je súčasťou balenia,
        alebo odporúčaný materiál tesnenia, ak sa predáva bez tesnenia (ak je to relevantné).
    valve_cover_material:
      name: Materiál krytu ventilu
      description: Primárny konštrukčný materiál krytu ventilov.
    valve_design:
      name: Konštrukcia ventilu
      description: Identifikuje konštrukciu/dizajn ventilu motora.
    valve_guard_coverage_area:
      name: Chránená oblasť ventilu
      description: Označuje, ktoré časti ventilovej sekcie chráni ochranný kryt.
    valvetrain_configuration:
      name: Konfigurácia ventilového mechanizmu
      description: Určuje rozloženie vačkového hriadeľa/ventilového mechanizmu.
    varnish_formulation_base:
      name: Základ pre lak
      description: Určuje základné zloženie/chemické zloženie laku na sláčikové nástroje,
        ktoré ovplyvňuje vzhľad, možnosť odstránenia a kompatibilitu s existujúcimi
        povrchovými úpravami.
    varnish_transparency_tint:
      name: Priehľadnosť/odtieň laku
      description: Opisuje, či je lak číry alebo tónovaný, a ak je tónovaný, všeobecnú
        skupinu odtieňov.
    vegetable_matter_vm_content:
      name: Obsah rastlinnej hmoty (VM)
      description: Množstvo rastlinných zvyškov/nečistôt prítomných vo vlákne.
    vegetable_preparation_style:
      name: Štýl prípravy zeleniny
      description: Opisuje, ako je zelenina prezentovaná, krájaná alebo inak pripravená
        pred predajom (napr. celá, nakrájaná na kocky, ružičky).
    vehicle_audio_dsp_form_factor:
      name: Formát DSP pre automobilové audio systémy
      description: Určuje fyzický/inštalačný formát jednotky DSP.
    vehicle_battery_charger_features:
      name: Funkcie nabíjačky autobatérií
      description: Uvádza prevádzkové režimy a integrované funkcie nabíjačky autobatérií
        (napr. režim udržiavania napätia, desulfatácia).
    vehicle_body_filler_form:
      name: Formulár tmelu na opravu karosérie vozidla
      description: Fyzická forma/štýl balenia tmelu.
    vehicle_coaxial_speaker_nominal_size:
      name: Nominálna veľkosť koaxiálneho reproduktora vozidla
      description: Nominálna veľkosť reproduktora použitého v montáži (napr. 6,5 palca,
        6 x 9 palcov).
    vehicle_cover_size_class:
      name: Trieda veľkosti plachty na vozidlo
      description: Všeobecné zoskupenie veľkostí označujúce, na akú veľkosť vozidla
        je plachta navrhnutá.
    vehicle_decor_set_items_included:
      name: Súprava dekorácií vozidla v cene
      description: Zoznam typov dekorácií zahrnutých v sade príslušenstva (viditeľnosť
        na úrovni komponentov pre nakupujúcich).
    vehicle_door_lock_actuation_method:
      name: Spôsob ovládania zámku dverí vozidla
      description: Označuje, ako sa ovláda alebo zamyká zámok dverí vozidla.
    vehicle_door_lock_actuator_kit_contents:
      name: Obsah súpravy ovládača zámku dverí vozidla
      description: Označuje, čo je súčasťou balenia ovládača (iba ovládač vs. hardvér/tyče/konzoly/káblový
        zväzok).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Konfigurácia zapojenia ovládača zámku dverí vozidla
      description: Určuje spôsob zapojenia potrebný pre inštaláciu (počet vodičov
        a ich rola).
    vehicle_door_lock_included_components:
      name: Súčasťou balenia komponentov zámku dverí vozidla
      description: Uvádza, ktoré komponenty sú súčasťou balíka (užitočné pre súpravy/zostavy).
    vehicle_electrical_connector_type:
      name: Typ elektrického konektora vozidla
      description: Určuje typ konektora alebo zástrčky regulátora/elektrického poľa
        alternátora (okrem hlavného výstupného kolíka B+).
    vehicle_equipment_fit_out_level:
      name: Úroveň vybavenia vozidla
      description: Označuje úroveň policajnej výbavy dodávanej s dodávkou.
    vehicle_glass_cleaner_form:
      name: Formulár na čistenie skla vozidla
      description: Fyzický formát produktu čističa skla vozidla (napr. sprej, pena,
        utierky, gél, koncentrát).
    vehicle_hitch_cover_illumination_type:
      name: Typ osvetlenia krytu ťažného zariadenia
      description: Určuje, či má kryt ťažného zariadenia osvetlenie a aké.
    vehicle_hitch_cover_mounting_type:
      name: Typ upevnenia krytu na ťažné zariadenia
      description: Označuje metódu použitú na upevnenie/pripevnenie krytu ťažného
        zariadenia v držiaku ťažného zariadenia.
    vehicle_license_plate_finish:
      name: Povrchová úprava evidenčných čísiel vozidiel
      description: Povrchová úprava značky.
    vehicle_license_plate_frame_anti_theft_design:
      name: Rámček na evidenčné číslo vozidla s ochranou proti krádeži
      description: Bezpečnostné konštrukčné prvky určené na odradenie od odstránenia
        alebo neoprávnenej manipulácie.
    vehicle_license_plate_frame_plate_standard:
      name: Štandardný rámček na evidenčné číslo vozidla
      description: Štandard/región evidenčného čísla vozidla, pre ktoré je rámček
        navrhnutý.
    vehicle_license_plate_frame_profile:
      name: Profil rámčeka evidenčného čísla vozidla
      description: Ako rámček ohraničuje tabuľku (pokrytie/tvar), čo ovplyvňuje čitateľnosť
        a súlad s predpismi.
    vehicle_license_plate_mounting_hole_count:
      name: Počet montážnych otvorov evidenčného čísla vozidla
      description: Počet montážnych otvorov na doske.
    vehicle_license_plate_mounting_hole_pattern:
      name: Vzor otvorov pre tabuľku s evidenčným číslom vozidla
      description: Umiestnenie montážnych otvorov na doske.
    vehicle_license_plate_reflectivity:
      name: Odrazivosť evidenčného čísla vozidla
      description: Či a ako povrch dosky odráža svetlo (dôležité pre viditeľnosť a
        súlad s predpismi v prípade niektorých originálnych dosiek).
    vehicle_license_plate_size_standard:
      name: Štandardná veľkosť tabuľky s evidenčným číslom vozidla
      description: Označuje regionálnu/vozidlovú normu, ktorej je štítok vhodný (rozstup
        montážnych otvorov a celkový rozmer).
    vehicle_license_plate_text_style:
      name: Štýl textu na tabuľke s evidenčným číslom vozidla
      description: Štýl znakov na doske (ak existujú), vrátane reliéfnych a tlačených
        znakov.
    vehicle_license_plate_theme:
      name: Motív tabuľky s evidenčným číslom vozidla
      description: Téma dizajnu na vysokej úrovni pre umelecké dielo dosky.
    vehicle_lift_actuation_method:
      name: Spôsob ovládania zdviháka vozidla
      description: Ako sa výťah/zdvihák napája/ovláda na zdvihnutie vozidla.
    vehicle_lift_mounting_type:
      name: Typ montáže zdviháka vozidla
      description: Označuje, ako je výťah nainštalovaný alebo ukotvený v pracovnom
        priestore.
    vehicle_lift_type:
      name: Typ zdviháka vozidla
      description: Určuje konštrukčný typ zdvíhacieho zariadenia pre vozidlá používaného
        na servis alebo skladovanie (napr. 2-stĺpikový, 4-stĺpikový, nožnicový).
    vehicle_magnet_attachment_type:
      name: Typ uchytenia magnetu na vozidlo
      description: Určuje primárny spôsob upevnenia/montáže pre produkty predávané
        ako magnety na vozidlá (napríklad iba magnetické verzus magnetické s lepidlom).
    vehicle_magnet_intended_use:
      name: Použitie magnetu na vozidlo
      description: Označuje primárny zamýšľaný prípad použitia magnetu na vozidlo.
    vehicle_mirror_adjustment_type:
      name: Typ nastavenia spätného zrkadla vozidla
      description: Určuje, ako sa zrkadlo nastavuje/ovláda.
    vehicle_mirror_glass_type:
      name: Typ skla zrkadla vozidla
      description: Určuje optický typ/tvar zrkadlového skleneného povrchu.
    vehicle_organizer_features:
      name: Prvky organizéra vozidla
      description: Kľúčové funkčné vlastnosti organizérov do vozidiel, ako je skladacia
        schopnosť, nepremokavá podšívka, izolované vrecká alebo protišmyková základňa.
    vehicle_paint_chemistry_base:
      name: Chémia/základ laku vozidla
      description: Označuje zloženie/chemické zloženie farby použité v nátere vozidla.
    vehicle_polish_application_method:
      name: Metóda aplikácie laku na vozidlo
      description: Určuje odporúčanú metódu alebo nástroj na nanášanie laku na vozidlo.
    vehicle_pursuit_package:
      name: Balík na prenasledovanie vozidiel
      description: Označuje, či je vozidlo vybavené výkonným balíkom pre športové
        jazdenie určeným na použitie políciou (napríklad vylepšené chladenie, brzdy,
        odpruženie a kalibrácia).
    vehicle_safety_equipment_position:
      name: Umiestnenie bezpečnostného vybavenia vozidla
      description: Určuje, kde na vozidle alebo vo vozidle sa má bezpečnostné zariadenie
        používať alebo inštalovať.
    vehicle_safety_equipment_visibility_features:
      name: Viditeľnosť bezpečnostného vybavenia vozidla
      description: Označuje prvky zvyšujúce viditeľnosť, ktoré sú určené na zvýšenie
        nápadnosti.
    vehicle_seat_row:
      name: Rad sedadiel vo vozidle
      description: Označuje, pre ktorý zadný rad je sedadlo určené (druhý rad vs.
        tretí rad), vrátane aplikácie zadného výklopného sedadla.
    vehicle_steering_assist_type:
      name: Typ asistencie riadenia vozidla
      description: Určuje systém podpory riadenia, pre ktorý je komponent určený.
    vehicle_steering_wheel_lock_form_factor:
      name: Konštrukčný tvar zámku volantu vozidla
      description: Opisuje fyzický štýl zámku a jeho prepojenie s volantom (a voliteľne
        s ďalšími ovládacími prvkami).
    vehicle_wax_polish_product_form:
      name: Produktová forma vosku/leštidla na vozidlá
      description: Fyzická forma/formát dávkovania vosku, leštidla, ochranného prostriedku
        alebo tmelu.
    vehicle_wheel_valve_stem_type:
      name: Typ vretena ventilu kolesa vozidla
      description: Určuje podporovaný alebo zahrnutý typ vretena ventilu.
    vehicle_windshield_fluid_formula:
      name: Vzorec kvapaliny na čelné sklo vozidla
      description: Primárne zameranie na čistenie/odstraňovanie zloženia kvapaliny
        na čelné sklo.
    veil_length_type:
      name: Typ dĺžky závoja
      description: Klasifikuje závoj pomocou štandardnej dĺžkovej terminológie, a
        nie číselného merania.
    vellum_opacity_level:
      name: Stupeň nepriehľadnosti pergamenu
      description: Označuje, aká priesvitná alebo nepriehľadná je pergamenová fólia.
    ventilation_configuration:
      name: Konfigurácia ventilácie
      description: Konfigurácia primárneho vetrania/prívodu a odvodu vzduchu prilby.
    ventilation_control_type:
      name: Typ riadenia ventilácie
      description: Určuje štýl riadenia prúdenia vzduchu zabudovaného do prilby.
    ventilation_level:
      name: Úroveň ventilácie
      description: Označuje relatívne prúdenie vzduchu/vetranie panciera.
    venting_design:
      name: Dizajn vetrania
      description: Určuje, či a ako je kryt odvetrávaný, aby sa počas skladovania
        znížila kondenzácia a pleseň.
    vestibule_type:
      name: Typ predsiene
      description: Klasifikuje rozloženie predsiene vzhľadom na stan.
    vibraphone_bar_material:
      name: Materiál vibrafónovej tyče
      description: Materiál tónových tyčí/klávesov vibrafónu (tyčí produkujúcich zvuk).
    vibraphone_motor_type:
      name: Typ vibrafónového motora
      description: Typ motora použitého na pohon rotujúcich rezonančných ventilátorov
        pre vibrato (ak je súčasťou výbavy).
    vibraphone_range_octaves:
      name: Rozsah vibrafónu (oktávy)
      description: Výškový rozsah vibrafónu vyjadrený v oktávach (napr. 3 oktávy,
        3,5 oktávy).
    vibraphone_resonator_tube_material:
      name: Materiál duše rezonančného vibrafónu
      description: Materiál duše rezonančného vibrafónu pod tyčami.
    vibraphone_tuning_standard:
      name: Štandard ladenia vibrafónu
      description: Referenčná výška tónu použitá na ladenie (A=440 Hz atď.).
    viewing_sides:
      name: Pohľady z boku
      description: Určuje, na koľkých stranách výsledkovej tabule sa zobrazujú informácie
        (jednostranná, obojstranná, štvorstranná atď.).
    vintage_advertisement_decade:
      name: Desaťročie vintage reklám
      description: Určuje desaťročie, v ktorom bola reklama pôvodne vytlačená alebo
        vyrobená (približné, ak presné číslo nie je známe).
    vintage_advertisement_format:
      name: Formát vintage reklamy
      description: Určuje fyzický formát alebo médium zberateľského predmetu vintage
        reklamy.
    vintage_advertisement_subject_category:
      name: Kategória predmetu vintage reklamy
      description: Identifikuje kategóriu inzerovaného produktu/služby (na čo je reklama
        určená).
    vintage_classic_truck_cab_type:
      name: Typ kabíny nákladného vozidla v retro a klasickom štýle
      description: Konfigurácia kabíny/typ karosérie priestoru pre cestujúcich v nákladnom
        vozidle.
    virginia_tech_helmet_star_rating:
      name: Hodnotenie prilieb Virginia Tech hviezdičkami
      description: Hodnotenie bezpečnosti udelené laboratóriom Virginia Tech Helmet
        Lab (0–5 hviezdičiek).
    virtual_analog_synthesizer_form_factor:
      name: Tvarový faktor virtuálneho analógového syntetizátora
      description: Určuje fyzický formát šasi syntetizátora (klávesy vs. modul/stojan).
    viscosity_thickness:
      name: Viskozita/hustota
      description: Popisuje, aká hustá alebo riedka je hmota v stave, v akom sa predáva,
        alebo pri odporúčanej konzistencii na spracovanie.
    vise_configuration:
      name: Konfigurácia zveráka
      description: Určuje štrukturálne rozloženie alebo počet kusov v sade zverákov,
        čo ovplyvňuje prenosnosť a zložitosť nastavenia.
    visibility_features:
      name: Prvky viditeľnosti
      description: Zvýrazňuje dizajnové prvky, ktoré zvyšujú viditeľnosť jazdca pri
        návštevnosti.
    visor_brim_type:
      name: Typ zorníka/okraja
      description: Označuje prítomnosť a štýl priezoru alebo šiltu na prilbe.
    visor_configuration:
      name: Konfigurácia priezoru
      description: Opisuje prítomnosť a štýl akéhokoľvek zabudovaného zorníka alebo
        tvárového štítu.
    visor_lens_finish:
      name: Povrchová úprava skla zorníka
      description: Určuje odtieň, optickú úpravu alebo grafický štýl použitý na skle
        zorníka.
    visor_style:
      name: Štýl zorníka
      description: Označuje, či kapucňa obsahuje šilt/zorník a akú má konfiguráciu.
    voc_compliance_standard:
      name: Norma na dodržiavanie limitov emisií VOC
      description: Vyhlásenie o zhode s regulačnými VOC pre produkt (ak je to relevantné).
    voc_regulatory_class:
      name: Regulačná trieda VOC
      description: Uvedená regulačná trieda/trieda zhody s predpismi pre VOC pre daný
        produkt (podľa etikety/bezpečnostného listu), používaná na účely regionálnych
        regulačných a environmentálnych obmedzení.
    vodka_base_ingredient:
      name: Zložka na báze vodky
      description: Hlavná poľnohospodárska zložka, z ktorej sa vodka destiluje (napr.
        pšenica, zemiaky, kukurica).
    voice_coil_configuration:
      name: Konfigurácia hlasovej cievky
      description: Počet/usporiadanie hlasových cievok pre flexibilitu zapojenia a
        možnosti impedancie.
    voice_effects:
      name: Hlasové efekty
      description: Vstavané typy vokálnych efektov podporované karaoke súpravou.
    voltage_rating_type:
      name: Typ menovitého napätia
      description: Určuje, či sa menovité napätie poistky vzťahuje na striedavý prúd,
        jednosmerný prúd alebo oba.
    voltage_regulator_connector_type:
      name: Typ konektora regulátora napätia
      description: Určuje typ pripojenia/svorky použitý na pripojenie regulátora k
        elektroinštalácii/alternátoru/generátoru vozidla.
    wader_foot_type:
      name: Typ obuvi pre brodiace nohavice
      description: Určuje, či majú brodiace nohavice integrované topánky alebo samostatné
        pančuchy.
    wader_sole_type:
      name: Typ podrážky pre brodiace nohavice
      description: Určuje materiál podrážky alebo typ trakcie použitý na rybárskej
        obuvi alebo brodiacich nohaviciach.
    waistband_style:
      name: Štýl pásu
      description: Opisuje konštrukciu pásu a spôsob jeho zaistenia alebo nastavenia
        pre pohodlné nosenie.
    wakeboard_binding_mounting_pattern:
      name: Schéma montáže viazania na wakeboard
      description: Určuje vzor vložky/dosky na wakeboarde, s ktorým sú viazania kompatibilné.
    wakeboard_riding_style:
      name: Štýl jazdy na wakeboarde
      description: Klasifikuje zamýšľané prostredie alebo štýl používania wakeboardu.
    wall_decal_style:
      name: Štýl nálepky na stenu
      description: Určuje spôsob výroby/aplikácie nálepky (napr. vysekávaná, transferová,
        v hárku)
    wallyball_equipment_included:
      name: Vrátane vybavenia pre wallyball
      description: Uvádza konkrétne položky obsiahnuté v sade na wallyball, aby zákazníci
        presne vedeli, čo kupujú, a mohli porovnávať jednotlivé balíky.
    warp_beam_type:
      name: Typ osnovného vratidla
      description: Určuje konfiguráciu osnovného valca, ktorý je súčasťou tkáčskeho
        stavu alebo je na ňom nainštalovaný (konfigurácia valca dodávaná spolu s tkáčskym
        stavom).
    washability:
      name: Možnosť čistenia
      description: Označuje, či sa lepidlo dá čistiť vodou a/alebo je po aplikácii
        umývateľné.
    watch_band_design:
      name: Dizajn remienka hodiniek
      description: Opisuje konštrukčný štýl alebo dizajnový vzor remienka hodiniek
        (napr. NATO, Milanese, Link).
    watch_movement:
      name: Hodinkový stroj
      description: Určuje mechanizmus, ktorý poháňa hodinky, čo je kľúčový faktor,
        na základe ktorého si nakupujúci vyberajú medzi jednotlivými modelmi.
    water_activation:
      name: Aktivácia vodou
      description: Či sa maják dokáže automaticky aktivovať po ponorení do vody (bežné
        pre EPIRB kategórie I/II).
    water_chamber_configuration:
      name: Konfigurácia vodnej komory
      description: Opisuje vnútorné rozloženie vaku matraca, napríklad jednokomorové
        alebo dvojkomorové, ktoré ovplyvňuje podporu, reguláciu teploty a rušenie
        partnera.
    water_dispensing_mechanism:
      name: Mechanizmus dávkovania vody
      description: Definuje spôsob vypúšťania vody z jednotky, napríklad cez kohútiky,
        rozprašovacie dýzy alebo samospád.
    water_exposure_protection_level:
      name: Úroveň ochrany pred vodou
      description: Označuje úroveň ochrany produktu pri vystavení vode (napr. postriekaniu
        verzus dočasnému ponoreniu). Ak je k dispozícii oficiálny kód IP, použite
        stupeň krytia (IP).
    water_fed_design:
      name: Dizajn s napájaním vodou
      description: Označuje, či je kefa určená na používanie s tečúcou vodou prostredníctvom
        priechodnej rukoväti alebo pripojenia na hadicu.
    water_gun_features:
      name: Vlastnosti vodnej pištole
      description: Hlavné funkčné vlastnosti a funkcie vodnej pištole.
    water_gun_operating_mechanism:
      name: Ovládací mechanizmus vodnej pištole
      description: Ako vodná pištoľ počas používania natlakuje a vytláča vodu.
    water_gun_spray_pattern:
      name: Vzor striekania vodnej pištole
      description: Druh prúdu vody, ktorý vytvára dýza počas striekania.
    water_heating_method:
      name: Metóda ohrevu vody
      description: Opisuje, ako alebo či sa voda pred použitím ohrieva – napríklad
        solárnou absorpciou, propánovými horákmi, elektrickými článkami, batériovým
        kúrením, tepelne udržiavacou izoláciou alebo bez ohrievania.
    water_mattress_construction:
      name: Konštrukcia vodného matraca
      description: Určuje konštrukčný štýl vodného matraca (napr. tvrdá alebo mäkká
        strana), ktorý určuje kompatibilitu rámca a celkový pocit.
    water_play_features:
      name: Vlastnosti vodnej hry
      description: Komponenty vodného parku/šmýkačky, ktoré ovplyvňujú vodnú aktivitu.
    water_polo_competition_approval:
      name: Súťaž vo vodnom póle schválená
      description: Identifikuje riadiaci orgán alebo úroveň súťaže, pre ktorú je lopta
        oficiálne schválená alebo certifikovaná.
    water_polo_goal_type:
      name: Typ bránky pre vodné pólo
      description: Klasifikuje štrukturálnu alebo montážnu konfiguráciu bránky (napr.
        plávajúca, namontovaná na palube, prenosná).
    water_pump_drive_type:
      name: Typ pohonu vodného čerpadla
      description: Určuje, ako je vodné čerpadlo poháňané/ovládané v chladiacom systéme
        vozidla.
    water_pump_housing_material:
      name: Materiál telesa vodného čerpadla
      description: Materiál telesa/tela vodného čerpadla.
    water_pump_impeller_material:
      name: Materiál obežného kolesa vodného čerpadla
      description: Určuje materiál obežného kolesa vodného čerpadla (vnútorný rotor/lopatka,
        ktorá pohybuje chladiacou kvapalinou).
    water_pump_mounting_type:
      name: Typ montáže vodného čerpadla
      description: Určuje spôsob montáže/tvaru vodného čerpadla pre montáž do motora
        (napr. skrutkovací kryt vs. kazeta/vložka).
    water_purification_method:
      name: Metóda čistenia vody
      description: Identifikuje primárny mechanizmus, ktorým produkt zabezpečuje bezpečnosť
        pitnej vody v teréne (napr. čerpadlo verzus gravitačné zásobovanie verzus
        UV svetlo).
    water_resistance:
      name: Vodeodolnosť
      description: Oznamuje stupeň ochrany pred poveternostnými vplyvmi, napríklad
        vodotesnosť alebo odolnosť voči vode.
    water_resistance_level:
      name: Úroveň odolnosti voči vode
      description: Označuje, či textília odpudzuje vodu a do akej miery.
    water_resistance_rating_case_protection_level:
      name: Hodnotenie odolnosti voči vode (stupeň ochrany puzdra)
      description: Označuje úroveň odolnosti proti vode/ochrany poskytovanej rolovacím
        krytom (marketingová úroveň, nie elektronické IP tesnenie), napr. odolný proti
        vode vs. vodotesný.
    water_rocket_kit_items_included:
      name: Vrátane položiek súpravy vodnej rakety
      description: Hlavné komponenty zahrnuté v produktovom balíku.
    water_rocket_propulsion_type:
      name: Typ pohonu vodnej rakety
      description: Primárny pohon/zdroj energie používaný na spustenie rakety.
    water_rocket_recovery_system:
      name: Systém na záchranu vodných rakiet
      description: Postup používaný na získanie rakety späť po spustení.
    water_ski_base_design:
      name: Návrh základne pre vodné lyže
      description: Určuje profil spodnej časti trupu vodných lyží, ktorý ovplyvňuje
        manipulačné vlastnosti.
    water_ski_fin_type:
      name: Typ plutiev na vodné lyže
      description: Určuje konfiguráciu plutiev vodných lyží, ktorá ovplyvňuje smerovú
        stabilitu a manévrovateľnosť.
    water_source:
      name: Zdroj vody
      description: Určuje pôvod vody pred sýtením oxidom uhličitým.
    water_sports_safety_standard:
      name: Bezpečnostné normy pre vodné športy
      description: Uvádza formálne bezpečnostné alebo vztlakové normy, ktoré produkt
        spĺňa (napr. CE EN 1385 pre prilby, ISO 12402-5 pre vztlakové pomôcky, USCG
        typ III).
    water_table_feature_set:
      name: Súbor funkcií pre hladinu podzemnej vody
      description: Zvýrazňuje vstavané herné prvky podzemnej vody, ako sú vodopády,
        rozprašovače, čerpadlá alebo viacúrovňové nádrže.
    water_table_items_included:
      name: Súčasťou balenia sú nasledujúce položky
      description: Uvádza, aké príslušenstvo je súčasťou súpravy s vodnou hladinou
        (napr. loďky, poháriky, lieviky, figúrky).
    water_table_water_source_type:
      name: Typ zdroja podzemnej vody
      description: Určuje spôsob napĺňania alebo zásobovania vodnej hladiny vodou.
    waterbed_stabilization_level:
      name: Úroveň stabilizácie vodnej postele
      description: Označuje stupeň redukcie vĺn alebo ovládania pohybu, ktorý poskytuje
        matrac s vodnou posteľou.
    watercolor_ink_water_resistance_after_drying:
      name: Vodoodolnosť akvarelového atramentu (po zaschnutí)
      description: Označuje, či sa akvarelový atrament po zaschnutí stane odolným
        proti vode/vodotesným (podľa tvrdenia výrobcu).
    watercraft_care_application_area:
      name: Oblasť aplikácie starostlivosti o plavidlá
      description: Označuje hlavnú oblasť alebo komponent plavidla, na ktorý je produkt
        určený.
    watercraft_drive_mechanism:
      name: Pohonný mechanizmus plavidla
      description: Opisuje konkrétny nainštalovaný alebo podporovaný palubný pohonný
        mechanizmus.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Vzor jednotky na odosielanie palivovej nádrže plavidla
      description: Špecifikuje montážny vzor/normu pre snímače hladiny paliva v nádrži
        a kompatibilné meradlá (napr. bežné montážne rozmiestnenie skrutiek pre námorné
        vozidlá).
    watercraft_fuel_tank_shape:
      name: Tvar palivovej nádrže plavidla
      description: Opisuje celkový fyzický tvar palivovej nádrže na podporu plánovania
        priestoru/vhodnosti.
    watercraft_hull_material:
      name: Materiál trupu plavidla
      description: Určuje primárny materiál konštrukcie trupu.
    watercraft_ignition_part_voltage:
      name: Napätie v zapaľovacom systéme plavidla
      description: Menovité napätie/požiadavka pre zapaľovací systém (ak je to relevantné),
        napríklad 12 V systémy.
    watercraft_impeller_material_grade:
      name: Materiál obežného kolesa plavidla
      description: Špecifikuje materiál obežného kolesa plavidla (napr. neoprén, nitril,
        bronz).
    watercraft_lighting_certification_compliance:
      name: Certifikácia/súlad s predpismi osvetlenia plavidiel
      description: Označuje súlad s predpismi/normami, podľa ktorých je svetlo certifikované
        na námorné použitie (napr. v súlade s normami USCG/ABYC/COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Funkcie nastavenia držiaka motora plavidla
      description: Nastavenie schopnosti držiaka (napr. naklonenie, zdvihnutie, posunutie),
        ktoré ovplyvňujú použiteľnosť a uloženie.
    watercraft_piston_part_type:
      name: Typ piestovej časti plavidla
      description: Identifikuje, ktorý komponent súvisiaci s piestom záznam predstavuje.
    watercraft_propeller_blade_rake:
      name: Uhol sklonu lopatky lodnej vrtule
      description: Určuje sklon lopatky (uhol lopatky voči náboju), ktorý ovplyvňuje
        zdvih lopatky a výkon.
    watercraft_propeller_rotation_direction:
      name: Smer otáčania vrtule plavidla
      description: Označuje požadovaný smer/smer otáčania vrtule pre kompatibilitu
        s pohonom (napr. pravotočivá/štandardná vs. ľavotočivá/protibežná).
    watercraft_pump_stage_impeller_role:
      name: Stupeň čerpadla plavidla/rola obežného kolesa
      description: Určuje, či je obežné koleso určené na konkrétnu funkciu čerpadla
        (napr. čerpadlo na surovú vodu/morskú vodu, cirkuláciu chladiacej kvapaliny,
        prúdové čerpadlo).
    watercraft_registration_status:
      name: Stav registrácie plavidla
      description: Označuje, či plachetnica obsahuje doklady o vlastníctve a/alebo
        registráciu.
    watercraft_safety_equipment_activation_type:
      name: Typ aktivácie bezpečnostného vybavenia plavidla
      description: Primárna metóda aktivácie bezpečnostného zariadenia (pre majáky/MOB
        alarmy/PLB), odlišná od inflácie.
    watercraft_steering_cable_core_material:
      name: Materiál jadra kábla riadenia plavidla
      description: Určuje materiál vnútorného lanka/jadra, ktoré prenáša silu.
    watercraft_steering_cable_hardware_included:
      name: Súčasťou balenia je aj hardvér riadenia plavidla
      description: Určuje, ktorý inštalačný hardvér a príslušenstvo sú súčasťou balenia
        lanka riadenia.
    watercraft_steering_cable_system_type:
      name: Typ systému riadiaceho lanka plavidla
      description: Určuje architektúru systému riadenia, pre ktorú je kábel určený
        (napr. rotačný, stojan).
    watercraft_steering_wheel_hub_bore_type:
      name: Typ náboja/otvoru volantu plavidla
      description: Určuje typ stredového upevnenia/rozmeru otvoru (napr. kužeľový,
        drážkovaný), kde sa koleso spája s nábojom alebo adaptérom.
    watercress_variety:
      name: Odroda žeruchy
      description: Identifikuje konkrétnu odrodu alebo druh žeruchy, ktorá sa predáva.
    waterproof_level:
      name: Vodotesná úroveň
      description: Označuje úroveň odolnosti obuvi proti vode vrátane akýchkoľvek
        tvrdení o vodotesnosti, na ktoré sa vzťahuje záruka.
    wax_blend_composition:
      name: Zloženie voskovej zmesi
      description: Uvádza voskové materiály zmiešané v produkte a/alebo typ zmesi
        na trhu.
    wax_coat_type:
      name: Typ voskového náteru
      description: Označuje, či je vosk určený ako podkladový náter, vrchný náter
        alebo univerzálny/jednovrstvový náter.
    wax_hardness:
      name: Tvrdosť vosku
      description: Označuje relatívnu tvrdosť vosku, ktorá ovplyvňuje odolnosť a sklz
        na rôznych typoch snehu.
    wax_physical_form:
      name: Fyzikálna forma vosku
      description: Označuje fyzickú formu/tvary, v ktorých sa dodal surový vosk na
        sviečky.
    wax_recommended_candle_application:
      name: Odporúčaná aplikácia vosku na sviečky
      description: Označuje primárny štýl (štýly) sviečok, pre ktoré je vosk určený.
    wax_tackiness_level:
      name: Úroveň lepivosti vosku
      description: Opisuje úroveň lepivosti/priľnavosti, ktorú vosk poskytuje na čepeli.
    weapon_system_integration:
      name: Integrácia zbrojného systému
      description: Označuje, či vozidlo obsahuje integrované zbraňové systémy alebo
        držiaky.
    weather_suitability:
      name: Vhodnosť pre počasie
      description: Označuje environmentálny stav produktu, pre ktorý sú rukavice určené,
        napríklad pre hranie v chladnom alebo mokrom počasí.
    weave_finish:
      name: Tkanie/úprava
      description: Popisuje základnú väzbu tkaniny alebo povrchovú úpravu, ktorá ovplyvňuje
        štruktúru a lesk kravaty.
    weave_style:
      name: Štýl tkania
      description: Určuje tradičný vzor tkania používaný pri remeselnej tvorbe panamského
        klobúka, ktorý ovplyvňuje priedušnosť, flexibilitu, vzhľad a cenu.
    weave_type:
      name: Typ väzby
      description: Identifikuje štýl väzby/konštrukcie látky (obchodný názov väzby),
        ktorý ovplyvňuje textúru, lesk a splývavosť.
    weaving_beater_edge_type:
      name: Typ okraja tkáčskeho stroja
      description: Popisuje profil pracovnej hrany plochého úderníka, ktorý prichádza
        do styku s útkom (napr. rovný vs. zubatý).
    weaving_beater_style:
      name: Štýl tkania pomocou bidla
      description: Identifikuje funkčný štýl/formát plochého tkáčskeho stroja.
    weaving_shuttle_tip_style:
      name: Štýl špičky tkáčskeho člnka
      description: Určuje dizajn prednej špičky/nosa člnka, ktorý ovplyvňuje spôsob,
        akým prechádza cez priehlbinu a pravdepodobnosť zachytenia osnovného vlákna.
    weaving_shuttle_use_case:
      name: Prípad použitia tkáčskeho člnka
      description: Určuje zamýšľanú aplikáciu tkania, pre ktorú je člnok navrhnutý
        alebo optimalizovaný.
    webbing_construction_type:
      name: Typ konštrukcie siete
      description: Popisuje fyzickú väzbu alebo spôsob splietania popruhu, čo ovplyvňuje
        jeho manipuláciu, pevnosť a určené použitie.
    webbing_design:
      name: Dizajn popruhov
      description: Popisuje spôsob, akým sú prsty prepletené, čo má vplyv na silový
        tréning a odraz.
    weight_adjustability:
      name: Nastaviteľnosť hmotnosti
      description: Opisuje, či môže používateľ meniť odpor produktu (napr. pomocou
        voliča záťaže alebo pridaním závažia), alebo je pevne nastavený na jednu hmotnosť.
    weight_integration_system:
      name: Systém integrácie hmotnosti
      description: Opisuje, či a ako sú záťažové závažia integrované do zariadenia
        na úžitkovú hmotnosť (napr. odnímateľné vrecká na závažia, žiadne, voliteľný
        doplnok).
    weight_plate_compatibility:
      name: Kompatibilita závaží
      description: Definuje, aký priemer váhy dosky stroj akceptuje (olympijský, štandardný
        alebo oba).
    weight_plate_style:
      name: Štýl váhy dosky
      description: Klasifikuje konštrukciu/typ váhy dosky (napr. olympijská, bumperová,
        s voliteľnou hmotnosťou) na účely rýchleho filtrovania podľa kompatibility.
    weightlifting_belt_style:
      name: Štýl opasku na vzpieranie
      description: Kategorizuje celkový dizajn alebo účelovo riadenú konfiguráciu
        remeňa (napr. pákový remeň, ponorný remeň, kužeľový remeň).
    weightlifting_federation_certification:
      name: Certifikácia federácie vzpierania
      description: Oficiálne schválenie alebo súlad produktu s predpismi federácií
        silových športov, ako napríklad IPF alebo IWF.
    wetsuit_boot_height:
      name: Výška neoprénových čižiem
      description: Určuje výšku/strih topánky na nohe, čo ovplyvňuje krytie, pohyblivosť
        a prenikanie vody.
    wetsuit_entry_system:
      name: Systém vstupu do neoprénu
      description: Opisuje typ a lokalitu otváracieho/zipsového systému používaného
        na obliekanie do neoprénu.
    wetsuit_seam_construction:
      name: Konštrukcia švov neoprénu
      description: Určuje, ako sú švy vyrobené a utesnené, čo ovplyvňuje teplo, flexibilitu
        a odolnosť.
    wheat_product_form:
      name: Forma pšeničného produktu
      description: Určuje fyzickú alebo spracovanú formu pšeničného produktu.
    wheel_arrangement:
      name: Usporiadanie kolies
      description: Určuje usporiadanie kolies parnej lokomotívy (Whyteova notácia),
        čo je určujúca charakteristika a bežný zberateľský/vyhľadávací výraz.
    wheel_brake_type:
      name: Typ brzdy kolesa
      description: Detailne opisuje konfiguráciu brzdenia na kolieskach alebo kolieskach
        košíka.
    wheel_chock_grip_features:
      name: Funkcie uchytenia klinu pre kolesá
      description: Dizajnové prvky pre trakciu a priľnavosť, ktoré zlepšujú priľnavosť
        na povrchoch a k pneumatikám.
    wheel_cleaner_acidity_ph_category:
      name: Kategória kyslosti/pH čističa kolies
      description: Označuje, či je čistič kolies kyslý, neutrálny alebo zásaditý (prípadne
        či je trh ako pH-zostatok na účte).
    wheel_cleaner_formula_type:
      name: Typ zloženia čističa kolies
      description: Pri čistiacich prostriedkoch na kolesá a súvisiacich čistiacich
        roztokoch označuje kategóriu primárnej receptúry produktu (napr. kyslý, nekyslý,
        pH-Neutrálny/vyrovnaný alebo reaktívny so železom).
    wheel_construction_type:
      name: Typ konštrukcie kolesa
      description: Určuje spôsob výroby/konštrukcie kolesa.
    wheel_contaminant_target:
      name: Cieľ kontaminácie kolies
      description: Určuje hlavné druhy znečistenia, na odstraňovanie ktorých je čistič
        určený.
    wheel_core_type:
      name: Typ jadra kolesa
      description: Opisuje konštrukčný štýl jadra kolesa, ktorý ovplyvňuje hmotnosť,
        tuhosť a energiu.
    wheel_cylinder_inlet_port_thread_standard:
      name: Štandardný závit prívodného otvoru brzdového valca
      description: Určuje štandard závitu na vstupnom otvore brzdového potrubia na
        kolieskovom valci (napr. metrický bublinový závit vs. SAE s obráteným rozširujúcim
        sa koncom).
    wheel_fastener_seat_type:
      name: Typ upevnenia kolesa
      description: Určuje typ sedla matice/skrutky, ktorý je kompatibilný s kolesom
        (napr. kužeľový/zúžený, guľový/s polomerom, plochý, s drážkou/s dĺžkou).
    wheel_illumination:
      name: Osvetlenie kolies
      description: Označuje, či má koleso zabudované osvetlenie alebo funkciu žiarenia.
    wheel_material:
      name: Materiál kolies
      description: Identifikuje primárne zloženie kolies, ktoré ovplyvňuje odolnosť,
        priľnavosť a tlmenie vibrácií.
    wheel_profile:
      name: Profil kolesa
      description: Opisuje tvar prierezu kolesa, ktorý ovplyvňuje rýchlosť, priľnavosť
        a obratnosť.
    wheel_setup_type:
      name: Typ nastavenia kolesa
      description: Definuje štýl konfigurácie kolies použitý na korčuliach.
    wheel_system_finish:
      name: Povrchová úprava systému kolies
      description: Povrchová úprava/náter ráfikov/kolies a určitých častí/príslušenstva
        kolies.
    whip_style:
      name: Štýl biča
      description: Produkt je zaradený podľa konkrétneho typu jazdeckého biča alebo
        podľa disciplíny, pre ktorú je určený.
    whipped_cream_base:
      name: Šľahačkový základ
      description: Identifikuje primárnu základnú zložku použitú na výrobu šľahačky,
        ako je napríklad mliečna smotana alebo kokos.
    whipped_cream_form:
      name: Forma na šľahačku
      description: Označuje fyzický formát, v ktorom sa šľahačka predáva.
    whistle_head_material:
      name: Materiál hlavy píšťalky
      description: Určuje materiál hlavice/náustku píšťalky (hlavica/blok píšťalky).
    whistle_light_features:
      name: Funkcie svietiacej píšťalky
      description: Označuje, či píšťalka obsahuje integrované svetelné efekty pre
        párty (napr. LED).
    whistle_purpose:
      name: Účel píšťalky
      description: Identifikuje primárne zamýšľanú aplikáciu píšťalky (športový koučing,
        bezpečnosť na mori, výcvik psov atď.).
    whistle_sound_style:
      name: Štýl zvuku pískania
      description: Opisuje štýl/charakter zvuku pískania (napr. jednotónový vs. viactónový).
    white_glue_finish_appearance_when_dry:
      name: Povrchová úprava/vzhľad bieleho lepidla po zaschnutí
      description: Určuje, ako lepidlo vyzerá po zaschnutí pri umeleckých/kancelárskych
        použitiach (napr. číre vs. nepriehľadné).
    white_glue_washability:
      name: Možnosť čistenia bieleho lepidla
      description: Označuje, či je možné zaschnuté lepidlo umyť/vyčistiť z tkanín
        alebo pokožky.
    whitewater_kayak_style:
      name: Štýl kajaku na divokej vode
      description: Primárny zámer dizajnu v rámci segmentu divokej vody (napr. Creekboat,
        River Runner, Playboat).
    whitewater_rating_class:
      name: Hodnotenie divokej vody (trieda)
      description: Najvyššia medzinárodná stupnica náročnosti rieky, na ktorú je raft
        certifikovaný.
    whorl_mounting_interface:
      name: Montážne rozhranie závitu
      description: Ako sa závit pripevňuje k kolovrátku (spôsob pripevnenia hriadeľa/pripojenie).
    wick_construction_type:
      name: Typ konštrukcie knôtu
      description: Konštrukcia/štýl knôtu (pletený, plochý, štvorcový pletený, s jadrom,
        drevený atď.).
    wick_core_type:
      name: Typ knôtového jadra
      description: Či je knôt bezdutinový alebo obsahuje výstužný materiál (napr.
        s papierovou alebo zinkovou výstužou), čo ovplyvňuje jeho tuhosť a vlastnosti
        horenia.
    wick_tab_crimp_type:
      name: Typ s lisovaným výstupkom na knôte
      description: Ako je knôt upevnený pomocou úchytu (konštrukcia/spôsob zalisovania).
    wick_tab_material:
      name: Materiál jazýčka knôtu
      description: Materiál upevňovacej úchytky (zvyčajne pocínovaný plech), ktorý
        má vplyv na odolnosť proti korózii a splnenie legislatívnych požiadaviek (napr.
        vylúčenie olova).
    wick_tab_shape:
      name: Tvar jazýčka knôtu
      description: Faktor tvaru/formy dosky s úchytkami na knôt.
    wick_type_included:
      name: Typ knôtu je súčasťou balenia
      description: Určuje materiál/typ knôtu zahrnutý v súprave.
    wig_fiber_material:
      name: Materiál parochne
      description: Identifikuje primárne vlákno použité na výrobu parochne, takže
        nakupujúci si môžu ľahko vybrať medzi variantmi ľudských vlasov a syntetickými
        možnosťami s rôznymi vlastnosťami stylingu a dlhej životnosti.
    wildlife_attractant_scent:
      name: Vnadiaca aróma pre divú zver
      description: Identifikuje primárnu vôňu používanú na lákanie voľne žijúcich
        živočíchov, vrátane vôní prírodných potravín a vôní feromónového typu.
    willow_grade:
      name: Vŕbová trieda
      description: Určuje stupeň kvality použitej vŕby, pričom uvádza štruktúru vlákien
        a celkovú úroveň výkonnosti.
    willow_type:
      name: Typ vŕby
      description: Určuje druh vŕby alebo iného materiálu, z ktorého je vyrobená čepeľ
        palice, čo výrazne ovplyvňuje výkonnosť, odolnosť a cenu.
    wind_up_mechanism_type:
      name: Typ naťahovacieho mechanizmu
      description: Určuje, ako sa hračka navíja alebo aktivuje.
    wind_up_toy_movement_pattern:
      name: Vzor pohybu naťahovacej hračky
      description: Opisuje hlavný pohyb, ktorý vzniká pri navíjaní.
    windbreak_purpose:
      name: Účel vetrolamu
      description: Definuje primárny zamýšľaný prípad použitia vetrolamu.
    windfoil_board_mounting_system:
      name: Systém montáže dosky s veternou fóliou
      description: Určuje držiak fólie alebo montážne rozhranie zabudované do dosky
        na veternú fóliu.
    windfoil_sail_style:
      name: Štýl plachty s veternou fóliou
      description: Klasifikuje plachtu podľa zamýšľaného štýlu jazdy alebo disciplíny.
    winding_direction:
      name: Smer navíjania
      description: Označuje smer otáčania, ktorý navíjací strojček podporuje (v smere
        hodinových ručičiek, proti smeru hodinových ručičiek alebo obojsmerne).
    winding_method:
      name: Metóda navíjania
      description: Ako sa má útková niť navinúť/vložiť do člnka.
    winding_speed_control_type:
      name: Typ regulácie rýchlosti navíjania
      description: Označuje metódu použitú na ovládanie rýchlosti navíjania počas
        používania.
    winding_type:
      name: Typ vinutia
      description: Určuje konštrukciu vinutia basových strún (vonkajší profil vinutia).
    windlass_control_station_type:
      name: Typ ovládacej stanice navijaka
      description: Typ ovládacieho rozhrania zahrnutého alebo podporovaného na ovládanie
        navijaka.
    windlass_mount_type:
      name: Typ upevnenia navijaka
      description: Kde/ako sa má navijak namontovať na lodi.
    window_component_location:
      name: Lokalita komponentov okna
      description: Určuje, na ktoré okno/otvor sa diel vzťahuje vo vozidle (napr.
        čelné sklo vs. sklo dverí vs. zadné okno vs. sklo štvrtého okna).
    window_configuration:
      name: Konfigurácia okien
      description: Označuje prítomnosť a relatívnu veľkosť priehľadných okienok na
        profile krídla.
    window_glass_construction:
      name: Konštrukcia okenného skla
      description: Špecifikuje bezpečnostnú/laminovanú konštrukciu okenného skla motorového
        vozidla.
    window_glass_features:
      name: Vlastnosti okenného skla
      description: Označuje, či sklo podporuje integrované technológie vozidla (napr.
        podložka dažďového senzora, držiak kamery).
    window_glass_finish:
      name: Povrchová úprava okenného skla
      description: Určuje variant povrchovej úpravy/tónovania/ochrany súkromia okenného
        skla motorového vozidla.
    window_glass_tint_color:
      name: Farba tónovania okenného skla
      description: Určuje odtieň farby skla (nie všeobecnú farbu produktu).
    window_glass_tint_level:
      name: Stupeň tónovania okenného skla
      description: Označuje približnú tmavosť okenného skla z výroby/tónovanie v súkromí
        (nie dodatočne vyrobená fólia). Ak nie je známa presná hodnota VLT, použite
        popisné úrovne.
    window_net_latch_mechanism:
      name: Mechanizmus západky okennej sieťky
      description: Určuje mechanizmus západky/uvoľnenia použitý pre okennú sieťku
        (napr. tlačidlo, páka, pracka v štýle bezpečnostného pásu).
    window_net_mounting_hardware:
      name: Montážne kovanie na okenné sieťky
      description: Identifikuje typ montážneho kovania alebo spôsob upevnenia použitý
        na inštaláciu okennej sieťky (napr. pripínanie, skrutky, háčik/tyč), alebo
        či je kovanie súčasťou balenia.
    window_net_opening_direction:
      name: Smer otvárania okennej sieťky
      description: Určuje, ako sa sieťka na okno otvára/uvoľňuje vzhľadom na cestujúceho,
        aby sa zabezpečil súlad s pravidlami pri východe.
    window_regulator_operation:
      name: Ovládanie ovládača okna
      description: Určuje spôsob ovládania ovládača okna (manuálna kľuka alebo elektrický).
    windshield_coverage_area:
      name: Oblasť pokrytia čelného skla
      description: Určuje, ktoré časti prednej vonkajšej časti vozidla má kryt čelného
        skla chrániť (napr. iba čelné sklo vs. stierače, zrkadlá, bočné okná alebo
        okraj kapoty).
    windshield_mount_attachment_method:
      name: Spôsob upevnenia držiaka čelného skla
      description: Určuje, ako držiak priľne k povrchu čelného skla alebo ho uchopí.
    windshield_washer_fluid_seasonality:
      name: Sezónnosť kvapaliny do ostrekovačov
      description: Označuje zamýšľané ročné obdobie/podnebie alebo primárne použitie
        zloženia kvapaliny do ostrekovačov (napr. zimný odmrazovač, letný rozmrazovač,
        celoročný).
    windsurf_fin_style:
      name: Štýl windsurfingových plutiev
      description: Klasifikuje plutvu podľa zamýšľanej plavebnej disciplíny alebo
        štýlu použitia (napr. vlna, slalom, plachtenie).
    windsurfing_connection_standard:
      name: Štandardné pripojenie pre windsurfing
      description: Mechanické rozhranie alebo typ krabice používaný na pripevnenie
        súčiastky k doske alebo zostave.
    windsurfing_sail_style:
      name: Štýl plachty na windsurfing
      description: Klasifikuje zamýšľanú disciplínu alebo prípad použitia plachty,
        ako napríklad vlna, freeride alebo foil.
    wine_additive_type:
      name: Typ prísady do vína
      description: Špecifikuje, o aký druh produktu na výrobu červeného vína ide (zložka,
        prísada, kvasnice, číriaca látka, súprava atď.).
    wine_body:
      name: Víno
      description: Opisuje vnímanú hmotnosť a pocit v ústach z vína.
    wine_carbonation:
      name: Sýtenie vína oxidom uhličitým
      description: Označuje, či je víno tiché, perlivé alebo šumivé, a ak je to relevantné,
        intenzitu šumenia.
    wine_making_ingredient_type:
      name: Typ prísady na výrobu vína
      description: Špecifikuje kategóriu funkčných zložiek pre konzumovateľné prísady
        a zložky používané pri výrobe vína.
    wine_making_stage:
      name: Fáza výroby vína
      description: Identifikuje, pre ktorý krok procesu výroby vína je produkt určený.
    wine_style:
      name: Štýl vína
      description: Rozlišuje všeobecný spôsob výroby vína nad rámec farby, napríklad
        tiché, šumivé alebo likérové.
    winemaking_process_stage:
      name: Fáza procesu výroby vína
      description: Označuje primárnu fázu procesu výroby vína, pre ktorú je dodávka
        určená.
    wing_count:
      name: Počet krídel
      description: Počet krídel/ramien na bumerangu.
    wing_handle_type:
      name: Typ rukoväte krídla
      description: Určuje typ systému uchopenia na krídle wingfoil.
    wing_part_type:
      name: Typ časti krídla
      description: Identifikuje konkrétny komponent alebo náhradný diel pre krídlo
        s profilom krídla.
    wingfoiling_style:
      name: Štýl wingfoiling
      description: Označuje konkrétnu disciplínu alebo štýl jazdy wingfoilingu, na
        ktorú je produkt určený.
    wiper_arm_finish:
      name: Povrchová úprava ramienka stierača
      description: Povrchová úprava alebo ochranný náter nanesený na rameno stierača,
        ktorý ovplyvňuje odolnosť proti korózii a vzhľad.
    wiper_arm_pivot_mount_type:
      name: Typ otočného uchytenia ramena stierača
      description: Určuje, ako sa rameno stierača montuje na tiahlo alebo čap stierača
        vozidla.
    wiper_blade_attachment_type:
      name: Typ upevnenia stieracej lišty
      description: Určuje typ konektora/upevnenia použitého na montáž stieracej lišty
        k ramenu stierača.
    wiper_blade_rubber_material:
      name: Gumový materiál stieracej lišty
      description: Materiál stieracieho prvku (vložka/náplň), ktorý prichádza do kontaktu
        so sklom.
    wiper_system_position:
      name: Poloha systému stieračov
      description: Označuje montážnu polohu na vozidle pre systém stieračov.
    wire_coating_material:
      name: Materiál povrchovej úpravy drôtu
      description: Určuje materiál vonkajšieho povlaku/plášťa aplikovaného na drôt
        (nie materiál jadra drôtu), ktorý môže ovplyvniť odolnosť proti oderu a to,
        ako hladko prechádza cez otvory v guľôčkach.
    wire_coating_type:
      name: Typ povlaku drôtu
      description: Určuje, či a ako je drôt potiahnutý/obalený (pre farbu, ochranu
        a textúru).
    wire_construction_type:
      name: Typ konštrukcie drôtu
      description: Určuje fyzickú konštrukciu navíjacieho drôtu, napríklad či je lankový
        alebo plný a či je potiahnutý.
    wire_finish:
      name: Povrchová úprava drôtu
      description: Určuje povrchovú úpravu, náter alebo pokovovanie aplikované na
        drôt (napr. leštený, smaltovaný, pozinkovaný, pokovovaný), ktoré ovplyvňujú
        vzhľad a odolnosť voči zašpineniu/korózii.
    wire_gauge_awg:
      name: Prierez vodiča (AWG)
      description: Veľkosť vodičov použitých v káblovom zväzku podľa amerického systému
        merania prierezu vodičov (AWG).
    wire_insulation_material:
      name: Izolačný materiál drôtu
      description: Materiál izolácie/plášťa vodičov použitých v káblovom zväzku (ovplyvňuje
        teplotnú a chemickú odolnosť).
    wire_packaging_type:
      name: Typ balenia drôtu
      description: Určuje spôsob predaja/balenia drôtu.
    wire_shape_profile:
      name: Tvar drôtu/profil
      description: Opisuje tvar prierezu drôtu.
    wiring_configuration:
      name: Konfigurácia zapojenia
      description: Označuje, či je šermiarsky kord dodávaný s predinštalovaným zapojením
        pre elektronické zaznamenávanie bodov, bez zapojenia, bezdrôtová alebo určený
        na tréning bez elektronického zaznamenávania bodov.
    wobbler_style:
      name: Štýl voblera
      description: Určuje konkrétny dizajn alebo spôsob pohybu voblera, napríklad
        či ide o crankbait alebo jerkbait.
    wood_block_surface_preparation:
      name: Príprava povrchu drevených blokov
      description: Označuje stav povrchu dreveného bloku pripraveného na konečnú úpravu
        a remeselnú výrobu.
    wood_grain_direction:
      name: Smer vlákien dreva
      description: Smer drevených vlákien vzhľadom na najdlhší rozmer produktu (dôležitý
        pre pevnosť, vlastnosti pri rezaní a vzhľad).
    wood_slice_edge_style:
      name: Štýl hrany dreveného plátku
      description: Okrajový produkt rezu, napríklad okraj z prírodnej kôry vs. hladký/brúsený
        okraj.
    wooden_block_special_features:
      name: Špeciálne vlastnosti drevených blokov
      description: Súčasťou sady drevených blokov sú aj významné funkčné vlastnosti.
    woodwind_body_construction:
      name: Konštrukcia tela drevených dychových nástrojov
      description: Označuje, či je nástroj vyrobený z jedného kusu alebo z viacerých
        častí (napr. 2-dielny/3-dielny), čo ovplyvňuje čistenie, skladovanie a prenosnosť.
    woodwind_polishing_cloth_intended_use:
      name: Účel použitia leštiacej handričky na drevené dychové nástroje
      description: Určuje, na čo je handrička primárne určená na čistenie/leštenie
        drevených dychových nástrojov.
    woodwind_small_part_type:
      name: Malý typ dychových nástrojov
      description: Určuje, akého druhu malej náhradnej súčiastky pre klarinet sa položka
        týka (napr. hardvér kľučky, podložky/korok/plsť, krúžky).
    woofer_mounting_type:
      name: Typ montáže basového reproduktora
      description: Spôsob montáže/používania basového reproduktora (voľne stojaci
        vs. uzavretý) a bežné spôsoby montáže v automobiloch.
    woofer_surround_material:
      name: Materiál obloženia basového reproduktora
      description: Materiál použitý na obloženie basového reproduktora (vonkajší závesný
        krúžok).
    worn_on_finger:
      name: Nosí sa na prste
      description: Určuje, na ktorom prste sa má náprstok nosiť.
    wrap_style:
      name: Štýl obalu
      description: Označuje, koľkokrát sa má opasok omotať okolo pása.
    wrapping_occasion:
      name: Baliaca príležitosť
      description: Hlavná príležitosť, na ktorú je baliaci papier určený (darček alebo
        oslava).
    wrapping_paper_features:
      name: Vlastnosti baliaceho papiera
      description: Funkčné vlastnosti a vlastnosti súvisiace s udržateľnosťou baliaceho
        papiera, ako je odolnosť proti pretrhnutiu, obsah recyklovaného materiálu
        alebo formáty vopred narezaných listov.
    wrestling_dummy_design:
      name: Dizajn zápasníckej figuríny
      description: Celkový tvar tela alebo držanie tela figuríny, napríklad postava
        stojaceho človeka alebo hádzací vak, ktoré určujú vhodné tréningové cvičenia.
    wrestling_mat_safety_certifications:
      name: Certifikácie bezpečnosti zápasníckych podložiek
      description: Uvádza všetky bezpečnostné certifikáty alebo normy odvetvia alebo
        športových organizácií, ktoré podložka spĺňa.
    wrist_strap_style:
      name: Štýl popruhov na zápästie
      description: Opisuje štýl remienka na zápästie (alebo jeho absenciu), ktorý
        ovplyvňuje podporu a prispôsobenie.
    wrist_support_style:
      name: Štýl podpory zápästia
      description: Identifikuje konštrukciu alebo štýl podpory zápästia, ako je napríklad
        ortéza, rukavica, páska alebo návlek, aby sa uľahčil výber používateľom.
    xylophone_range_octaves:
      name: Rozsah xylofónu (oktávy)
      description: Celkový rozsah xylofónu vyjadrený v oktávach (napr. 2,5 oktávy,
        3 oktávy, 4 oktávy).
    xylophone_resonator_type:
      name: Typ rezonátora xylofónu
      description: Typ rezonančného systému použitého na zosilnenie tónu (ak existuje).
    yam_variety:
      name: Odroda koreňa yam
      description: Určuje kultivar alebo bežnú odrodu predávaného jamu (napr. fialový,
        žltý, slonia noha).
    yarn_cutter_physical_style:
      name: Fyzický štýl nožníc na priadzu
      description: Identifikuje fyzický štýl nožníc na priadzu (napr. prívesok, prsteň,
        nožnice) na podporu prehliadania a filtrovania v rámci tejto kategórie.
    yarn_finish_or_effect:
      name: Povrchová úprava alebo efekt priadze
      description: Zvýrazňuje špeciálne vizuálne alebo funkčné úpravy priadze, ako
        je fluorescencia alebo kovový lesk.
    yarn_guide_style:
      name: Štýl sprievodcu priadze
      description: Fyzický štýl komponentu na vedenie priadze.
    yarn_swift_adjustability:
      name: Možnosť nastavenia nástroja na odvíjanie priadze
      description: Označuje, či a ako je možné stojan na priadzu nastaviť (rozťahovateľný,
        sklopný/skladací), čo ovplyvňuje jeho skladovanie a rozsah veľkostí klbka,
        ktoré pojme.
    yarn_swift_bearing_type:
      name: Typ ložiska nástroja na odvíjanie priadze
      description: Opisuje mechanizmus rotačnej podpory (napr. guľôčkové ložisko),
        ktorý ovplyvňuje plynulosť a rýchlosť navíjania.
    yeast_application:
      name: Použitie kvasiniek
      description: Označuje primárne zamýšľané kulinárske alebo fermentačné použitie
        kvasinkového produktu.
    yo_yo_accessory_part_type:
      name: Typ príslušenstva/časti jojo
      description: Identifikuje, o aký druh náhradného dielu alebo príslušenstva pre
        jojo sa produkt jedná (napr. reťazec, ložisko, odpružené podložky).
    yo_yo_axle_system_type:
      name: Typ systému nápravy jojo
      description: Konštrukčné riešenie osi joja (napr. pevná os alebo priechodná
        os), ktoré ovplyvňuje herné vlastnosti a údržbu.
    yo_yo_bearing_size_class:
      name: Veľkosť ložiska jojo triedy
      description: Normalizovaná trieda veľkosti ložiska používaná jojo, ak je to
        relevantné.
    yo_yo_bearing_type:
      name: Typ ložiska jojo
      description: Konfigurácia ložiska, ktorá ovplyvňuje citlivosť a charakteristiky
        rotácie.
    yo_yo_play_style:
      name: Štýl hry s jojom
      description: Hlavný zamýšľaný štýl hry s jojo, ktorý odráža disciplínu v oblasti
        šnúry a trikov, pre ktorú je výrobok určený.
    yo_yo_response_system:
      name: Systém reakcie jojo
      description: Určuje mechanizmus odozvy jojo, pre ktorý je táto časť navrhnutá
        (kompatibilita).
    yo_yo_responsiveness:
      name: Citlivosť návratu joja
      description: Či sa jojo vracia do ruky ťahom (reagujúce) alebo vyžaduje zaviazanie
        (nereagujúce).
    yo_yo_string_material:
      name: Materiál šnúrky na jojo
      description: Materiálové zloženie šnúrky jojo.
    yogurt_base_ingredient:
      name: Základná zložka jogurtu
      description: Identifikuje primárny zdroj mlieka alebo rastlinných surovín použitých
        na výrobu jogurtu, čo je rozhodujúce pre výživové preferencie a alergény.
    yoke_type:
      name: Typ vidlice
      description: Určuje typ držiaka alebo ramena, ktoré drží zbraň na monopod.
    zill_playing_style:
      name: Štýl hry na prstové činely
      description: Zamýšľaný herný kontext/štýl (bežne brušný tanec verzus orchestrálny/kultúrny
        variant).
    zill_strap_material:
      name: Materiál pásikov na prstové činely
      description: Materiál prstového remienka/gumičky slúžiacej na uchytenie prstových
        činel (ak sú súčasťou balenia), ktorý ovplyvňuje pohodlie, odolnosť a priľnavosť.
    zills_strap_adjustability:
      name: Možnosť nastavenia popruhu prstových činel
      description: Či a ako je možné nastaviť priložený popruh/gumičku.
    zipper_application:
      name: Aplikácia zipsu
      description: Určuje zamýšľaný projekt alebo aplikáciu, pre ktorú je zips určený.
    zipper_chain_type:
      name: Typ zipsu s retiazkou
      description: Určuje konštrukciu/typ retiazky/zubov zipsu.
    zipper_end_type:
      name: Typ ukončenia zipsu
      description: Označuje, ako je zips ukončený a či je oddeľovací (s otvoreným
        koncom) alebo s uzavretým koncom (neoddeľovací), vrátane bežného kovania oddeľovacích
        koncov používaného v remeselných zipsoch.
    zipper_gauge:
      name: Rozmer zipsu
      description: 'Označuje hrúbku/veľkosť retiazky zipsu, zvyčajne vyjadrenú ako
        číslo s # (napríklad #3 alebo #5), ktoré zodpovedá šírke zuba/šnúry a zamýšľanému
        použitiu.'
    zipper_opening_length:
      name: Dĺžka otvorenia zipsu
      description: Určuje, aká časť predného otvoru je na zips, čím sa rozlišujú modely
        s celoprepínacím zipsom od modelov s polovičným alebo štvrtinovým zipsom.
    zipper_pull_material:
      name: Materiál zipsu
      description: Určuje materiál ťahadla zipsu alebo ťahacej karty (časti, ktorú
        uchopíte), odlišný od zubov/retiazky a pásky zipsu.
    zipper_pull_side:
      name: Strana zapínania zipsu
      description: Určuje, z ktorej strany (strán) zipsu je prístup k ťahacej karte.
    zipper_pull_strap_cord_tab_material:
      name: Materiál úchytu zipsu/šnúrky/pásky
      description: Materiál remienka/šnúrky/karty/strapca pripevneného k jazdcu zipsu
        (ak je prítomný), s výnimkou hlavného kovania/tela jazdca zipsu.
    zipper_reversibility_mechanism:
      name: Mechanizmus obojstranného zapínania zipsu
      description: Určuje, ako je zips obojstranný (napr. obojstranný jazdec vs. jazdec
        s preklopením/automatickým uzamknutím určený pre obojstranné odevy).
    zipper_separating_type:
      name: Typ oddeľovania zipsom
      description: Označuje, či sa zips oddeľuje v spodnej/hornej časti alebo je uzavretý,
        či je vhodný pre bundy, spacie vaky, tašky atď.
    zipper_side:
      name: Zips na boku
      description: Určuje stranu, na ktorej sa nachádza hlavný zips, keď je spací
        vak otočený lícom nahor.
    zipper_slider_material:
      name: Materiál zipsového jazdca
      description: Určuje materiál jazdca zipsu (pohyblivý mechanizmus), ktorý môže
        ovplyvniť odolnosť voči nárazu a korózii.
    zipper_slider_pull_configuration:
      name: Konfigurácia jazdca/ťahadla zipsu
      description: Označuje, či má zips jedného jazdca/ťahadlo alebo dva a či sú ťahadlá
        na jednej alebo oboch stranách jazdca.
    zipper_style:
      name: Štýl zipsu
      description: Označuje dĺžku zipsu alebo prítomnosť na odeve (napr. bez zipsu,
        s krátkym zipsom, s polovičným zipsom, s celoplošným zipsom).
    zipper_tape_material:
      name: Materiál zipsovej pásky
      description: Určuje primárny materiál zipsu (boky látky), ktorý je všitý do
        projektu.
    zipper_teeth_type:
      name: Typ zúbkov na zipse
      description: Určuje konštrukčný štýl retiazky/zubov zipsu (napr. špirálový,
        z lisovaného plastu, kovový, neviditeľný), ktorý ovplyvňuje flexibilitu, pevnosť
        a typickú aplikáciu.
