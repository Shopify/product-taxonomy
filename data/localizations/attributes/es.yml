    bicycle_features:
      name: Características de la bicicleta
      description: Especifica características especiales de una motocicleta, como,
        por ejemplo, neumáticos resistentes a pinchazos o portaequipajes.
    bidet_mounting_type:
      name: Tipo de montaje del bidé
      description: Especifica cómo se instala el bidé, como, por ejemplo, montado
        en la pared o en el suelo.
    binder_ring_shape:
      name: Forma de anillo de carpeta
      description: Describe los anillos de carpeta de los productos de suministros
