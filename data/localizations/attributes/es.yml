    signal_technology:
      name: Tecnología de señal
      description: Identifica la tecnología inalámbrica o de datos principal que el
        producto está diseñado para amplificar o extender.
    signal_types_blocked:
      name: Tipos de señales bloqueadas
      description: Enumera las señales inalámbricas o electromagnéticas específicas
