    bevel_type:
      name: Tipo de bisel
      description: Especifica el tipo de bisel de las herramientas, como simple o
        doble.
    beverage_product_form:
      name: Forma de producto de bebida
      description: Describe cómo se presenta o consume la bebida, como lista para
        beber o de cápsulas.
    bib_design:
      name: Diseño del babero
      description: Define el estilo o tipo de babero, como de bandana o con mangas.
    bicycle_brake_type:
      name: Tipo de freno para bicicletas
      description: Especifica el sistema de frenos de una bicicleta, como V-brake
