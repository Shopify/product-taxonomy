    seat_structure:
      name: Estructura del asiento
      description: Define la construcción de un asiento, como, por ejemplo de mimbre
        o macizo.
    seat_swivel_mechanism:
      name: Mecanismo giratorio del asiento
      description: Indica si y cómo el asiento puede girar en los descansos para transferencias
        más seguras.
    seat_type:
      name: Tipo de asiento
      description: 'Describe el diseño de una silla o banco, como acolchado o de tipo
        cubo. '
    seat_upholstery_color:
      name: Color de tapicería del asiento
      description: Identifica el color de la tapicería del asiento de un mobiliario,
        como beige o azul
    seat_upholstery_material:
      name: Material de tapicería del asiento
      description: Define el tejido o material utilizado para la funda del sofá, como
        microfibra o polipiel.
    seat_upholstery_pattern:
      name: Patrón de la tapicería del asiento
      description: Identifica el diseño o motivo de la tela de un sofá, como cachemir
        o remolino
    security_algorithms:
      name: Algoritmos de seguridad
      description: 'Especifica los métodos de cifrado que usa la electrónica, por
        ejemplo, AES. '
    security_level:
      name: Nivel de seguridad
      description: Especifica el estándar de seguridad de elementos como cerraduras
        y pestillos, por ejemplo, bajo, medio o alto.
    selfie_stick_functionality_type:
      name: Tipo de funcionalidad del palo de selfie
      description: Define la configuración funcional principal del producto (por ejemplo,
        solo palo, combinación de palo y trípode, cardán).
    semiconductor_material:
      name: Material semiconductor
      description: Identifica el material de sustrato semiconductor base utilizado
