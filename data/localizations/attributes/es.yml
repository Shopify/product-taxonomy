    binding_style:
      name: Estilo de encuadernación
      description: Describe el método utilizado para encuadernar documentos, como
        bobina o alambre.
    binocular/monocular_design:
      name: Diseño de prismáticos/monoculares
      description: Describe el uso específico de prismáticos o monoculares, como para
        la astronomía o la caza.
    binocular_design:
      name: Diseño binocular
      description: Describe el uso o propósito específicos de los prismáticos, como
        la caza o la astronomía.
    biometric_authentication_method:
      name: Método de autenticación biométrica
      description: Enumera las opciones de seguridad biométrica integradas disponibles
        en el teléfono, como el sensor de huellas dactilares o el reconocimiento facial.
    biometric_certifications:
      name: Certificaciones biométricas
      description: Enumera las certificaciones biométricas formales de la industria
        o del gobierno que el dispositivo cumple (p. ej., FBI PIV, FIPS 201).
    biometric_monitor_accessory_features:
      name: Características de accesorios de supervisión biométrica
      description: Identifica funciones especiales de los accesorios del monitor biométrico,
        como el monitor de frecuencia cardíaca o podómetro.
    bios_type:
      name: Tipo de BIOS
      description: Especifica el tipo de BIOS que se usa en las placas base, por ejemplo,
        híbrida o heredada.
    bird_cage/stand_design:
      name: Diseño de soporte/jaula para pájaros
      description: Identifica el estilo de jaula o soporte para pájaros, por ejemplo,
        jaula con forma de domo, soporte con ruedas
    bird_food_form:
      name: Forma de la comida para pájaros
      description: Describe la forma física del alimento para pájaros, como semillas
        o pélets
    bird_food_ingredients:
      name: Ingredientes de la comida para pájaros
      description: Especifica el tipo de ingredientes en el alimento para pájaros,
        como lombrices o semillas de girasol
    bird_treat_type:
      name: Tipo de golosina para pájaros
      description: Identifica la categoría de golosinas para pájaros, como galletas
        o frutas
    birthday_candle_design:
      name: Diseño de velas de cumpleaños
      description: Describe el tema visual de las velas de cumpleaños, como los animales
        o personajes de dibujos animados.
    birthday_candle_type:
      name: Tipo de vela de cumpleaños
      description: Identifica las características únicas de las velas de cumpleaños,
        por ejemplo, perfumadas, bengalas
    bitter_variety:
      name: Variedad de cerveza amarga
      description: Clasifica los amargos según sus perfiles de sabor, por ejemplo,
        florales o picantes.
    blade_coating:
      name: Recubrimiento de la cuchilla
      description: Especifica cualquier recubrimiento de rendimiento aplicado a la
        cuchilla para nitidez o deslizamiento (p. ej., platino, PTFE, titanio).
    blade_curve:
      name: Curva de la pala
      description: Especifica la curva de la pala de un palo de hockey, como, por
        ejemplo, abierta o en punta.
    blade_design:
      name: Diseño de la hoja
      description: Especifica el estilo del cutter, como de navaja o regulable.
    blade_edge_configuration:
      name: Configuración del borde de la cuchilla
      description: Especifica el formato del borde de una cuchilla individual (p.
        ej., borde simple, doble borde, sistema de cartucho, media cuchilla).
    blade_material:
      name: Material de la cuchilla
      description: Especifica el material que se usa para la fabricación de una hoja,
        como el acero o el aluminio.
    blade_type:
      name: Tipo de hoja
      description: Define la forma y el estilo de la hoja de un producto, como, por
        ejemplo, recta o de daga.
    blanket_color:
      name: Color de la manta
      description: Identifica el color primario de una manta, como azul marino o multicolor
    blanket_pattern:
      name: Patrón de la manta
      description: Describe el diseño o motivo de una manta, como floral o geométrico
    blending_type:
      name: Tipo de mezcla
      description: Identifica el método de mezcla utilizado en equipos de laboratorio,
        como continuo o por lotes.
    blind/shade_style:
      name: Estilo de persiana/parasol
      description: Identifica el diseño o tipo de persianas o cortinas, como enrollables
        o verticales.
    blocked_signal_types:
      name: Tipos de señales bloqueadas
      description: Especifica las categorías de señales inalámbricas que el bloqueador
        puede bloquear.
    blood_group_systems_detected:
      name: Sistemas de grupo sanguíneo detectados
      description: Identifica qué sistemas de grupo sanguíneo puede determinar el
        kit.
    blood_test_kit_components:
      name: Componentes del kit de análisis de sangre
      description: Especifica los artículos que incluye el kit de análisis de sangre,
        por ejemplo, apósitos o apósitos adhesivos.
    bluetooth_functionality:
      name: Funcionalidad Bluetooth
      description: Indica si el dispositivo actúa como transmisor, receptor o ambos
        (transceptor).
    board_concave_shape:
      name: Forma cóncava de la tabla
      description: Define la curva cóncava de las tablas de surf o paddle, como, por
        ejemplo, cóncava en V o plana.
    board_game_features:
      name: Características del juego de mesa
      description: Destaca aspectos únicos de un juego de mesa, como, por ejemplo,
        la rapidez de configuración o la disponibilidad de ampliación.
    board_game_mechanics:
      name: Mecánica de juegos de mesa
      description: Describe la tipología de un juego de mesa, como estrategia o cooperativo.
    board_material:
      name: Material del panel
      description: Especifica el tipo de material de las bandejas de presentación,
        como acrílico o porcelana.
    board_mounting_type:
      name: Tipo de montaje de tablero
      description: Especifica el estilo de configuración de las pizarras de presentación,
        como portátiles o con caballete.
    board_profile:
      name: Perfil de tabla
      description: Define el perfil de una tabla de surf, como plana o con curvatura.
    board_surface:
      name: Superficie del tablero
      description: Describe el tipo de superficie de un tablero de presentación, como
        tela o corcho.
    board_type:
      name: Tipo de tabla
      description: Clasifica los monopatines según su diseño y finalidad, como clásicos
        o cruiser.
    boat_type:
      name: Tipo de bote
      description: Identifica el diseño o modelo específico de una embarcación, como
        pontón o barco de cubierta.
    body/facial_hair_type:
      name: Tipo de vello corporal/facial
      description: Ayuda a emparejar los productos de cuidado con los tipos de cabello,
        como, por ejemplo, fino o grueso, normalmente para la decoloración.
    body_area:
      name: Área del cuerpo
      description: Especifica la parte del cuerpo para la que está diseñado el producto,
        por ejemplo, la cara o la línea del bikini.
    body_color:
      name: Color del cuerpo
      description: Especifica el color principal de vehículos o piezas, como, por
        ejemplo, blanco o plateado.
    body_jewelry_type:
      name: Tipo de joyería corporal
      description: Identifica el tipo específico de joyería corporal, por ejemplo,
        piercing en el ombligo, pendiente en la oreja
    body_material:
      name: Material del cuerpo
      description: Especifica la materia prima de un producto, normalmente cañas de
        pescar, como, por ejemplo, compuesto o aluminio.
    body_paint/foundation_type:
      name: Tipo de base y pintura corporal
      description: Especifica la categoría del producto de maquillaje corporal, como
        base o sangre falsa
    body_paint_formula_base:
      name: Base de fórmula de pintura corporal
      description: Identifica la base de formulación principal, que afecta la durabilidad,
        el acabado y el método de eliminación.
    body_pattern:
      name: Patrón corporal
      description: Describe el diseño visual o motivo en la superficie principal de
        un producto, por ejemplo, floral, geométrico
    body_side:
      name: Lado del cuerpo
      description: Define si el producto está diseñado para el lado izquierdo, lado
        derecho o es adecuado para uso bilateral.
    bodyboard_features:
      name: Características del bodyboard
      description: Describe aspectos únicos de una tabla de bodyboard, como de superficie
        rígida o inflable.
    boiler_system:
      name: Sistema de caldera
      description: Especifica el sistema de caldera de los electrodomésticos de calefacción,
        por ejemplo, combinada o sencilla.
    bolt_form:
      name: Forma del perno
      description: Describe la forma de los pernos, como, por ejemplo, hexagonales
        o mecánicos.
    bolt_material:
      name: Material del perno
      description: Identifica la composición de las flechas de caza, como, por ejemplo,
        el bambú o la fibra de vidrio.
    bone_anchored_interface_type:
      name: Tipo de interfaz anclada al hueso
      description: Define cómo el procesador se conecta al implante, distinguiendo
        entre sistemas de pilar percutáneo y sistemas magnéticos transcutáneos.
    book/file_cover_material:
      name: Material de la tapa de libro/archivo
      description: Identifica el material utilizado en las cubiertas de libros o archivos,
        como cartón o cuero.
    book_cover_material:
      name: Material de la tapa del libro
      description: Identifica el material utilizado para las tapas de los libros,
        como el cuero o el papel.
    book_cover_type:
      name: Tipo de cubierta de libro
      description: Identifica el tipo de tapa de un libro, como dura o blanda.
    bookmark_design:
      name: Diseño de marcalibros
      description: Describe el estilo o tipo de marcador, como magnético o con clip.
    bookmark_shape:
      name: Forma de marcalibros
      description: Describe la forma o el diseño del marcador, como redondo o cuadrado.
    boombox_lighting_effects:
      name: Efectos de iluminación del boombox
      description: Describe la presencia y el estilo de los espectáculos de luces
        LED o RGB integrados en el altavoz.
    boot_style:
      name: Estilo de bota
      description: Especifica el estilo de las botas, como, por ejemplo, los botines.
    boot_type:
      name: Tipo de bota
      description: Clasifica el estilo de bota, como bota suave o dura.
    borescope_design:
      name: Diseño de boroscopio
      description: Describe el tipo de boroscopio, como flexible, rígido o fibroscopio.
    bottle/container_closure:
      name: Cierre de botella/envase
      description: Identifica el tipo de cierre de recipientes contenedores, como
        de bomba o tapón abatible.
    bottle_closure_type:
      name: Tipo de cierre de botella
      description: Identifica el tipo de cierre utilizado en una botella, como de
        corcho o corona.
    bottle_design:
      name: Diseño de biberón
      description: Describe las características de un biberón, típicamente para productos
        para bebés, como, por ejemplo, fácil de sostener.
    bottle_material:
      name: Material del biberón
      description: Identifica la sustancia utilizada para la fabricación de una botella,
        como el vidrio o el plástico.
    bottle_sterilizer_features:
      name: Características del esterilizador de biberones
      description: Destaca funciones específicas de los esterilizadores de biberones,
        como el apagado automático o la función de descongelación.
    bottle_type:
      name: Tipo de frasco
      description: Especifica el tipo de cierre de una botella, como exprimible o
        pulverizador.
    bottle_warmer/sterilizer_features:
      name: Características del esterilizador/calentador de biberones
      description: Destaca las características especiales de los calentadores de biberones
        o esterilizadores, como el apagado automático o el temporizador.
    bottle_warmer_features:
      name: Características del calentador de biberones
      description: Destaca las características únicas de los calentadores de biberones,
        como la pantalla LCD o el temporizador.
    bottom_surface_material:
      name: Material de la superficie inferior
      description: Identifica el material de la superficie inferior del producto,
        como el metal o el vidrio.
    bow/crossbow_features:
      name: Características del arco/ballesta
      description: Describe características especiales de arcos/ballestas, como la
        tensión ajustable o la mira iluminada.
    bow_features:
      name: Características del arco
      description: Identifica las características únicas de los arcos de tiro con
        arco, como, por ejemplo, la tensión ajustable o la mira iluminada.
    bow_hair_material:
      name: Material del lazo para el pelo
      description: Especifica la composición de la cerda del arco de instrumentos
        de cuerda, como, por ejemplo, sintética o crin de caballo.
    bow_material:
      name: Material del arco
      description: Especifica el tipo de material utilizado en los arcos de tiro con
        arco, como aluminio o fibra de vidrio.
    box_type:
      name: Tipo de caja
      description: Identifica el estilo de las cajas de almacenamiento u organizadores
        para vehículos, como cofres o para crossover.
    bra_closure_type:
      name: Tipo de cierre del sujetador
      description: Identifica cómo se abrochan o abren los sujetadores, como, por
        ejemplo, frontal o pull-on (sin cierre).
    bra_coverage:
      name: Cobertura del sujetador
      description: Especifica el nivel de cobertura que ofrece un sujetador, como
        completa o media.
    bra_features:
      name: Características del sujetador
      description: Detalla las características únicas de los sujetadores, como, por
        ejemplo, el relleno extraíble o el tejido absorbente de sudor.
    bra_strap_type:
      name: Tipo de tira del sujetador
      description: Especifica el estilo y la funcionalidad de los tirantes del sujetador,
        como, por ejemplo, de espalda cruzada.
    bra_style:
      name: Estilo del sujetador
      description: Identifica el diseño o estilo de un sujetador, como push-up o sin
        tirantes
    bra_support_level:
      name: Nivel de soporte del sujetador
      description: Indica el nivel de sujeción que ofrece un sujetador, como, por
        ejemplo, bajo, medio o alto.
    brace_support_level:
      name: Nivel de soporte de la órtesis
      description: Indica el nivel general de soporte o protección designado por el
        fabricante que ofrece la órtesis.
    bracelet_design:
      name: Diseño de la pulsera
      description: Especifica el diseño de una pulsera, como dije o brazalete
    bracket/brace_design:
      name: Diseño de soporte/sujeción
      description: Describe el estilo de los soportes o sujeciones, como, por ejemplo,
        soportes en ángulo o sujeciones de esquina.
    bracket_profile:
      name: Perfil del soporte
      description: Indica el estilo físico del soporte suministrado con la tarjeta,
        determinando la compatibilidad con el chasis.
    brandy_variety:
      name: Variedad de brandy
      description: Distingue entre diferentes estilos de brandy, por ejemplo, coñac
        o grappa.
    breadboard_type:
      name: Tipo de protoboard
      description: Clasifica el protoboard por estilo fundamental de construcción
        o tamaño.
    breath_spray_benefit:
      name: Beneficio del aerosol para el aliento
      description: Identifica el beneficio principal del cuidado bucal que el aerosol
        para el aliento afirma proporcionar.
    breath_sprays_certifications:
      name: Certificaciones de espráis para el aliento
      description: Especifica los estándares que cumple un aerosol para el aliento,
        como de comercio justo o producto sin gluten.
    bridge/router_advanced_features:
      name: Características avanzadas del puente/enrutador
      description: Destaca las funcionalidades avanzadas de puentes/enrutadores, como
        la compatibilidad con VPN o la tecnología de IA.
    brightness_levels:
      name: Niveles de brillo
      description: Especifica el rango de salida de luz de productos, como medio o
        alto.
    bristle_grade:
      name: Grado de cerda
      description: Identifica la calidad o clasificación del pelo animal o sintético
        utilizado (p. ej., tejón plateado, fibra sintética plateada).
    bristle_hardness:
      name: Dureza de las cerdas
      description: Indica la firmeza de las cerdas del cepillo de dientes.
    bristle_material:
      name: Material de las cerdas
      description: Identifica la composición de las cerdas del cepillo, como el nailon
        o el pelo de caballo.
    bristle_shape:
      name: Forma de la cerda
      description: Define la forma de las cerdas del cepillo, como, por ejemplo, planas
        o en ángulo.
    broadcast_video_standard:
      name: Estándar de video de transmisión
      description: Indica los estándares de transmisión analógica con los que el VCR
        es compatible.
    broadcasting_standard_supported:
      name: Estándar de transmisión admitido
      description: Especifica los estándares de transmisión de televisión o modulación
        (satélite, cable, terrestre) que el producto puede decodificar o manejar.
    broadhead/field_point_material:
      name: Material de punta de caza/campo
      description: Identifica el material que se utiliza en las puntas de caza o campo
        de tiro con arco, como el acero inoxidable o el acero al carbono.
    broadhead_design:
      name: Diseño de punta ancha
      description: Indica el tipo de diseño de la punta ancha utilizada en tiro con
        arco, por ejemplo, hoja fija, mecánica.
    brush_application:
      name: Aplicación del pincel
      description: Describe el uso previsto de los pinceles artísticos, como acrílico
        o acuarela
    brush_end_type:
      name: Tipo de extremo de brocha
      description: Describe el formato estructural de los extremos de la brocha (p.
        ej., de un solo extremo, doble extremo, retráctil).
    brush_head_shape:
      name: Forma del cabezal del cepillo
      description: Define el factor de forma general del cabezal del cepillo, que
        afecta el alcance y la adecuación para diferentes usuarios.
    brush_head_usage:
      name: Uso del cabezal del cepillo
      description: Especifica el uso previsto de los cabezales de los cepillos, normalmente
        en cosméticos, como, por ejemplo, limpieza profunda o exfoliación.
    brush_material:
      name: Material del pincel
      description: Especifica el tipo de material empleado para la fabricación del
        pincel, como la silicona o el plástico.
    brush_size:
      name: Tamaño del pincel
      description: Especifica el tamaño de un pincel artístico, por ejemplo, 0 o 12.
    brush_type:
      name: Tipo de cepillo
      description: Especifica el material utilizado en una brocha de afeitar, como
        el pelo sintético o de tejón.
    brushing_mode:
      name: Modo de cepillado
      description: Enumera los programas de limpieza preestablecidos por los que el
        cepillo de dientes puede circular (p. ej., limpio, sensible, blanqueamiento).
    bug_type:
      name: Tipo de insecto
      description: Especifica los insectos a los que está dirigido el producto, como
        las hormigas o los avispones.
    building_board_material:
      name: Material del tablero de construcción
      description: Especifica el tipo de material empleado para la fabricación de
        los tableros de construcción, como la madera contrachapada o el cemento.
    building_consumable_form:
      name: Forma de consumibles de construcción
      description: Especifica la forma de los compuestos usados para reparar paredes,
        como líquidos o en polvo.
    building_toy_type:
      name: Tipo de juguete de construcción
      description: Especifica la categoría del juguete de construcción, por ejemplo,
        juegos de construcción STEM, azulejos magnéticos
    bulb_cap_type:
      name: Tipo de casquillo de bombilla
      description: Especifica el tipo de casquillo o base que tiene una bombilla o
        accesorio, por ejemplo, E12 o GU10.
    bulb_shape:
      name: Forma de la bombilla
      description: Describe la forma de los productos de iluminación, por ejemplo,
        en tubo o espiral.
    bulb_size:
      name: Tamaño de la bombilla
      description: Especifica el tamaño de las bombillas, como, por ejemplo, A19 o
        C7.
    bulb_type:
      name: Tipo de bombilla
      description: Especifica el tipo de bombilla que se usa en productos de iluminación,
        por ejemplo, LED o halógena.
    bulldozer_blade_type:
      name: Tipo de hoja de topadora
      description: Identifica el estilo de la hoja de un bulldozer, como angular o
        recta (hoja en S).
    bullet_protection_level:
      name: Nivel de protección balística
      description: Indica el nivel de protección contra las balas que ofrecen los
        chalecos, como, por ejemplo, IIA o IV.
    bullhorn_features:
      name: Características del megáfono
      description: Destaca las funcionalidades únicas de un megáfono, como la grabación
        de voz o la función de sirena.
    bullion_form:
      name: Forma del lingote
      description: Especifica el tipo de lingotes, como redondos o en barra.
    bungee_arm_mechanism:
      name: Mecanismo del brazo bungee
      description: Define la tecnología utilizada para suspender y guiar el cable
        del ratón (p. ej., brazo de resorte, cuerda elástica, suspensión magnética).
    burner_material:
      name: Material del quemador
      description: Identifica el material utilizado para la fabricación de un quemador
        de cocina o de parrilla, como el hierro fundido o el acero inoxidable.
    butt_cap_color:
      name: Color de la tapa posterior
      description: Especifica el color de la tapa de la culata de las cañas de pescar,
        como negro o azul
    butt_cap_material:
      name: Material de la tapa del extremo trasero
      description: Define la composición del extremo inferior del mango de equipamientos
        deportivos, como, por ejemplo, EVA (etileno acetato de vinilo) o corcho.
    butt_cap_pattern:
      name: Patrón de la capa posterior
      description: Describe el diseño o motivo en la tapa del extremo de una caña
        de pescar, como camuflado o floral
    button/snap_closure_type:
      name: Tipo de cierre con botón/broche a presión
      description: Describe el estilo del mecanismo de sujeción, como magnético o
        invisible.
    button_surface_profile:
      name: Perfil de superficie del botón
      description: Describe el contorno físico de la superficie del émbolo del botón,
        afectando la ergonomía y el estilo visual.
    cabinet_type:
      name: Tipo de gabinete
      description: Especifica el diseño y el factor de forma de los juegos arcade,
        como bartop o mini arcade.
    cable_form_factor:
      name: Factor de forma del cable
      description: Describe el estilo de diseño físico o forma del cable.
    cable_housing_material:
      name: Material de la carcasa del cable
      description: Identifica el material utilizado en la funda del cable, como el
        nailon o el PVC.
    cable_jacket_rating:
      name: Clasificación de la cubierta del cable
      description: Especifica la clasificación ambiental o de seguridad de la cubierta
        externa del cable (p. ej., plenum, entierro directo, resistente a UV).
    cable_shielding:
      name: Blindaje de los cables
      description: Especifica el tipo de protección que se usa en los cables, por
        ejemplo, trenzado (STP) o lámina (FTP).
    cable_style:
      name: Estilo del cable
      description: Describe el diseño físico del cable (p. ej., trenzado, plano, enrollado,
        retráctil).
    cable_tie_type:
      name: Tipo de brida para cables
      description: Especifica el estilo de construcción o mecanismo de sujeción de
        la brida para cables.
    cable_tray_style:
      name: Estilo de bandeja de cables
      description: Describe el estilo estructural de la sección de bandeja de cables
        que determina la ventilación y el método de soporte del cable.
    cable_type:
      name: Tipo de cable
      description: Clasifica el tipo de cable, normalmente de equipamiento de ciclista,
        como, por ejemplo, de freno o cambios.
    cache_level:
      name: Nivel de caché
      description: Indica la posición de jerarquía del caché (p. ej., L1, L2, L3),
        lo cual afecta el tamaño, la latencia y la proximidad a los núcleos del procesador.
    caffeine_content:
      name: Contenido de cafeína
      description: Indica la cantidad de cafeína presente en un producto, por ejemplo,
        descafeinado, bajo en cafeína.
    cage_type:
      name: Tipo de jaula
      description: Identifica el estilo de jaula de seguridad de vehículos, como la
        jaula completa o la media jaula.
    calculator_accessory_type:
      name: tipo de accesorio para calculadoras
      description: Especifica el tipo de accesorio de la calculadora, como rollo de
        papel o adaptador de impresora
    calculator_features:
      name: Características de la calculadora
      description: Describe las funciones que puede realizar una calculadora, como
        el cálculo de préstamos o el análisis estadístico.
    calendar/organizer_features:
      name: Características de calendario/organizador
      description: Describe características especiales de calendarios u organizadores,
        como espacios para citas o días festivos marcados.
    calendar_format:
      name: Formato de calendario
      description: Especifica el período de tiempo de un calendario, como diario o
        mensual.
    calibration_sensor_type:
      name: Tipo de sensor de calibración
      description: Especifica la tecnología de hardware subyacente o el factor de
        forma del calibrador.
    call_blocking_method:
      name: Método de bloqueo de llamadas
      description: Especifica cómo el dispositivo identifica y bloquea llamadas no
        deseadas.
    caller_id_compatibility:
      name: Compatibilidad con identificador de llamadas
      description: Indica si el teléfono admite los servicios de identificador de
        llamadas proporcionados por la red telefónica.
    caller_id_standard_compatibility:
      name: Compatibilidad con estándar de identificación de llamadas
      description: Indica qué formatos de señalización de identificación de llamadas
        puede decodificar el dispositivo.
    cam_system:
      name: Sistema de levas
      description: Especifica el sistema de levas utilizado en equipos de tiro con
        arco, por ejemplo, híbrido, individual
    camera_attachment:
      name: Accesorio de cámara
      description: Especifica la pieza o accesorio de la cámara, como un visor angular
        o un adaptador ocular.
    camera_button/knob_type:
      name: Tipo de botón y perilla de la cámara
      description: Identifica el botón o mando de una cámara, como, por ejemplo, el
        botón disparador o el mando de modo.
    camera_control_type:
      name: Tipo de control de cámara
      description: Especifica el tipo de control remoto de la cámara, por ejemplo,
        el interruptor remoto o el disparador.
    camera_display_technology:
      name: Tecnología de pantalla de cámara
      description: Especifica la tecnología de pantalla de una cámara, como, por ejemplo,
        OLED o Super AMOLED.
    camera_features:
      name: Características de la cámara
      description: Identifica las capacidades especiales de una cámara, como la estabilización
        de imagen o la detección de rostro.
    camera_gear_type:
      name: Tipo de engranaje para cámara
      description: Identifica el tipo específico de equipo de cámara, como la unidad
        de cámara o el enfoque de seguimiento.
    camera_hd_type:
      name: Tipo de cámara HD
      description: Especifica la calidad de vídeo de la cámara, como Quad HD u 8K
        ultra HD.
    camera_lens_material:
      name: Material del objetivo de la cámara
      description: Especifica la composición de los objetivos de una cámara o videocámara,
        como el vidrio o el plástico.
    camera_lens_type:
      name: Tipo de objetivo para cámaras
      description: Identifica el tipo de objetivo de la cámara, como macro o teleobjetivo.
    camera_mounting_type:
      name: Tipo de montaje móvil
      description: Especifica el método de fijación de la cámara, como, por ejemplo,
        un trípode o clip.
    camera_sensor_type:
      name: Tipo de sensor de cámara
      description: Identifica el tipo de sensor de las cámaras u ópticas, por ejemplo,
        CMOS o CCD.
    camera_shape:
      name: Forma de la cámara
      description: Describe el estilo de diseño de las cámaras de seguridad, como
        de tipo bullet o box.
    candle_kit_items_included:
      name: Artículos del kit de velas incluidos
      description: Especifica los artículos que se incluyen en un kit de velas, como
        mechas para velas o un fundidor de cera.
    candle_material:
      name: Material de la vela
      description: Especifica el tipo de cera o material utilizado en una vela, como
        la cera de parafina o de abejas.
    candle_shape:
      name: Forma de la vela
      description: Describe la forma de una vela, como cilíndrica o cuadrada.
    candle_type:
      name: Tipo de vela
      description: Especifica el diseño de las velas, como las velas cónicas o de
        té.
    cane_base_design:
      name: Diseño de la base del bastón
      description: Identifica la configuración de la base de apoyo del bastón.
    canned_meat_variety:
      name: Variedad de carne enlatada
      description: Distingue entre variedades de carnes en conserva, como el pavo
        o el jamón.
    canopy_color:
      name: Color del toldo
      description: Especifica el tono del dosel del paraguas o la sombrilla, como
        negro
    canopy_material:
      name: Material del dosel
      description: Especifica el material en el que están fabricados los toldos o
        sombrillas, como el algodón o el vinilo.
    canopy_pattern:
      name: Patrón del toldo
      description: Identifica el motivo visual en las marquesinas de sombrillas o
        parasoles de pabellón, como a cuadros o artístico
    cantilever_material:
      name: Material del voladizo
      description: Indica el material del voladizo que sostiene la aguja, impactando
        la capacidad de seguimiento y la firma sónica.
    canvas_finish:
      name: Acabado del lienzo
      description: Indica si un lienzo está listo para pintar, como, por ejemplo,
        con o sin imprimación.
    canvas_material:
      name: Material del lienzo
      description: Identifica el tipo de tela que se usa en la elaboración de lienzos,
        como el algodón o el lino.
    canvas_texture:
      name: Textura del lienzo
      description: Describe la sensación que ofrece la superficie de un lienzo, como
        de grano liso o medio.
    capacitance_tolerance:
      name: Tolerancia de capacitancia
      description: Indica la desviación permisible de la capacitancia real del valor
        nominal, expresada como porcentaje.
    capacitor_application:
      name: Aplicación del condensador
      description: Denota el uso previsto principal o la clase de aplicación del condensador
        (p. ej., arranque de motor, audio, supresor).
    capacitor_polarity:
      name: Polaridad del condensador
      description: Indica si el condensador es polarizado, no polarizado o bipolar,
        afectando la orientación de instalación y las posiciones adecuadas del circuito.
    car_freshener_fragrance:
      name: Fragancia de ambientador para auto
      description: Especifica el aroma de los ambientadores de vehículos, como de
        lavanda o coche nuevo.
    car_seat_installation:
      name: Instalación de silla de carro
      description: Especifica el método para instalar un asiento de seguridad para
        niños, como un pestillo o un cinturón de seguridad.
    car_seat_orientation:
      name: Orientación de silla de carro
      description: Especifica la dirección en la que mira un asiento de seguridad
        para niños, como hacia atrás o hacia adelante.
    car_type:
      name: Tipo de auto
      description: Especifica la categoría de un vehículo, como SUV o sedán.
    carabiner_gate_type:
      name: Tipo de gatillo de mosquetón
      description: Define el tipo de puerta de los mosquetones de escalada, como,
        por ejemplo, con cierre de seguridad o encajado.
    carabiner_shape:
      name: Forma del mosquetón
      description: Identifica la forma de los mosquetones que se usan en escalada,
        como HMS o de pera.
    card/adapter_installation:
      name: Instalación de tarjeta/adaptador
      description: Identifica cómo se instalan las tarjetas o adaptadores de E/S,
        como internos o externos
    card_attributes:
      name: Atributos de la tarjeta
      description: Describe las características especiales de las tarjetas coleccionables,
        como de lámina u holográficas.
    card_design:
      name: Diseño de tarjeta
      description: Especifica la forma de una tarjeta de ubicación o respuesta, como
        plegada o plana.
    card_format:
      name: Formato de tarjeta
      description: Describe el estilo de las invitaciones o tarjetas, como tarjeta
        plana o tarjeta plegada.
    card_holder_design:
      name: Diseño de tarjetero
      description: Describe el estilo o la forma de un portatarjetas de ubicación,
        como con clip o de pie.
    card_interface_type:
      name: Tipo de interfaz de tarjeta
      description: Describe si el lector se comunica mediante contactos físicos, RF
        sin contacto, o ambos.
    card_rechargeability:
      name: Recargabilidad de la tarjeta
      description: Indica si el saldo de la tarjeta se puede recargar después de utilizar
        el crédito inicial y el método principal de recarga.
    card_size:
      name: Tamaño de la tarjeta
      description: Se utiliza para indicar el tamaño de las tarjetas de felicitación
        o de notas, por ejemplo, A4 o carta.
    card_usage_status:
      name: Estado de uso de la tarjeta
      description: Indica si el crédito de la tarjeta telefónica ha sido usado o permanece
        intacto.
    care_instructions:
      name: Instrucciones de cuidado
      description: Proporciona directrices sobre el mantenimiento del producto, como
        la instrucción de lavar a mano o solo en seco.
    carry_options:
      name: Opciones de transporte
      description: Especifica los métodos de transporte disponibles para los artículos,
        como un asa o una correa de hombro.
    carrying_positions:
      name: Posiciones de transporte
      description: Especifica las diferentes formas en que se puede usar un portabebés,
        como llevarlo a la cadera o mirando hacia atrás.
    carrying_type:
      name: Tipo de transporte
      description: Describe el método de transporte de un producto, como de transporte
        a mano o mediante correa de hombro.
    cart_design:
      name: Diseño de carrito
      description: Describe el diseño o estructura de un carro médico, como de doble
        gancho o con base.
    cart_type:
      name: Tipo de carrito
      description: Identifica la fuente de energía de un carrito de golf, como la
        electricidad o el gas.
    cartridge_authenticity:
      name: Autenticidad del cartucho
      description: Identifica si el consumible es del fabricante original, compatible,
        remanufacturado o rellenado.
    cartridge_mounting_style:
      name: Estilo de montaje del cartucho
      description: Especifica cómo el cartucho se conecta al brazo o portacápsulas
        (p. ej., montaje de media pulgada, montaje P), asegurando compatibilidad mecánica.
    cartridge_type:
      name: Tipo de cartucho
      description: Identifica la tecnología del cartucho que se usa en tocadiscos,
        como cerámicos o magnéticos.
    cartridge_yield_type:
      name: Tipo de rendimiento del cartucho
      description: Indica la clase de capacidad definida por el fabricante del cartucho
        (p. ej., estándar, alto rendimiento).
    case_color:
      name: Color de la caja
      description: Especifica el color de la caja de un producto, como transparente
        o blanco.
    case_pattern:
      name: Patrón de la caja
      description: Describe el diseño o motivo de la caja de un producto, como floral
        o geométrico
    case_transparency_level:
      name: Nivel de transparencia de la funda
      description: Indica qué tan transparente es la funda.
    case_type:
      name: Tipo de funda
      description: Especifica el tipo de estuche para dispositivos electrónicos y
        accesorios, como de tipo billetera o libro.
    cassette_adapter_type:
      name: Tipo de adaptador de casete
      description: Identifica el tipo de adaptador de casete, como, por ejemplo, de
        3,5 mm a casete o de Bluetooth a casete.
    cat_age_group:
      name: Grupo de edad del gato
      description: Define productos adecuados para etapas específicas de la vida de
        los gatos, por ejemplo, cachorro o sénior.
    cat_litter_formula:
      name: Fórmula de arena para gatos
      description: Define la composición de la arena higiénica para gatos, como gránulos
        o arcilla.
    cbd_ingredients:
      name: Ingredientes de CBD
      description: Identifica los componentes específicos relacionados con el CBD
        en un producto, como el CBD de espectro completo o los edulcorantes.
    celebration_type:
      name: Tipo de celebración
      description: Especifica la ocasión para la cual el producto es adecuado, como
        Navidad o graduación.
    cellular_capability:
      name: Capacidad celular
      description: Indica si el modelo soporta redes móviles además de Wi-Fi.
    cervix_height_suitability:
      name: Adecuación según la altura del cérvix
      description: Indica para qué altura del cérvix (p. ej., bajo, promedio, alto)
        está optimizada la copa para garantizar un ajuste adecuado.
    chain_link_type:
      name: Tipo de eslabón de cadena
      description: Define el estilo del eslabón de la cadena de la joyería, como de
        cuerda o plano.
    chain_type:
      name: Tipo de cadena
      description: Identifica el tipo de cadena utilizada en piezas de embarcaciones,
        como BBB o High Test (HT).
    chair/sofa_features:
      name: Características de la silla/sofá
      description: Identifica las características únicas de los muebles de asiento,
        como la resistencia a las manchas o la reclinación eléctrica.
    chair_features:
      name: Características de la silla
      description: Destaca las funciones especiales de un sillón, como la función
        de masaje o el reclinado eléctrico.
    chalkboard_surface:
      name: Superficie de la pizarra
      description: Identifica el tipo de superficie de las pizarras, como magnética
        o tradicional.
    changing_mat/tray_features:
      name: Características del cambiador/bandeja
      description: Describe las características especiales de los cambiadores o bandejas,
        como compartimentos integrados o portátiles
    changing_mat_features:
      name: Características del cambiador
      description: Describe las características especiales de los cambiadores para
        bebés, como con compartimentos integrados o portátiles.
    changing_tray_features:
      name: Características de la bandeja de cambiador
      description: Describe las características especiales de las bandejas cambiadoras
        de bebés, como con compartimentos integrados o correa de seguridad.
    charcoal_source_material:
      name: Material de origen del carbón
      description: Especifica la materia prima de la cual se derivó el carbón activado.
    charger_style:
      name: Estilo del cargador
      description: Define el factor de forma físico o diseño general del cargador
        inalámbrico.
    charger_type:
      name: Tipo de cargador
      description: Identifica el tipo de cargador para baterías de vehículos, como
        manual o inteligente.
    charging_cable_type:
      name: Tipo de cable de carga
      description: Especifica el tipo de cable de carga de vehículos eléctricos, como
        de nivel 3 o adaptador.
    charging_interface_type:
      name: Tipo de interfaz de carga
      description: Especifica el puerto físico o el método utilizado para recargar
        el kit de iluminación (por ejemplo, USB-C, Micro-USB, carga inalámbrica).
    charging_level:
      name: Nivel de carga
      description: Especifica el nivel de potencia de las estaciones de carga de vehículos
        eléctricos, como el nivel 1 (120 V) o el nivel 2 (240 V).
    charging_method:
      name: Método de carga
      description: Especifica cómo se carga un dispositivo electrónico, por ejemplo,
        de forma inalámbrica o con cable.
    chassis_type:
      name: Tipo de carcasa
      description: Define el factor de forma de las cajas de equipos informáticos
        y servidores, como de tipo torre o montaje en bastidor.
    chemical_application:
      name: Aplicación química
      description: Identifica el uso principal de un producto químico, como, por ejemplo,
        la impermeabilización o la limpieza.
    chemical_container_type:
      name: Tipo de contenedor químico
      description: Especifica el tipo de recipiente para limpiadores de desagües,
        como, por ejemplo, un bidón o paquete en porciones.
    chemical_grade:
      name: Grado químico
      description: Indica la calidad y pureza de los productos químicos, como los
        de calidad alimentaria o de laboratorio.
    chemical_product_form:
      name: Forma de producto químico
      description: Especifica la forma de los productos químicos, como, por ejemplo,
        gel o gránulos.
    chemical_purity:
      name: Pureza química
      description: Indica el nivel de pureza de un producto químico, como >90 % o
        >95 %.
    chemical_safety_features:
      name: Características de seguridad química
      description: Destaca los aspectos de seguridad de los productos químicos, como
        los no inflamables o hipoalergénicos.
    chicken_feed_stage:
      name: Etapa de alimentación de pollos
      description: Identifica la etapa de vida del alimento para gallinas, como cría
        o puesta.
    child_seat_placement:
      name: Colocación del asiento para niños
      description: Especifica la ubicación del asiento para niños en una bicicleta,
        como delante o detrás.
    chin_strap_style:
      name: Estilo de correa de barbilla
      description: Especifica el diseño estructural o configuración de la correa (p.
        ej., correa simple, cabeza completa, halo).
    chipper_technology:
      name: Tecnología de astilladora
      description: Identifica el tipo de tecnología utilizada en las trituradoras,
        como de tornillo o tambor.
    chiropractic_table_design:
      name: Diseño de mesa quiropráctica
      description: Describe las características funcionales de una camilla quiropráctica,
        como de drops o con elevación.
    chocolate_type:
      name: Tipo de chocolate
      description: Define la variedad de chocolate en función de sus ingredientes
        y contenido de cacao, p. ej. chocolate negro, chocolate con leche.
    cholesterol_analyte_measured:
      name: Analito de colesterol medido
      description: Enumera los biomarcadores específicos que el dispositivo puede
        medir o calcular además del colesterol total.
    chuck_type:
      name: Tipo de mandril
      description: Especifica el tipo de mandril de las herramientas de bricolaje,
        como SDS o SDS max.
    cigar_body:
      name: Fortaleza de cigarro
      description: Indica el perfil de intensidad y sabor de los puros, por ejemplo,
        suaves, medios y plenos.
    circuit_board_features:
      name: Características de la placa de circuitos
      description: Describe aspectos únicos de una placa base, como los gráficos integrados
        o la compatibilidad con el overclocking.
    circuit_breaker_design:
      name: Diseño del panel del disyuntor
      description: Describe el estilo de montaje de un disyuntor, como atornillable
        o enchufable.
    circuit_breaker_panel_form:
      name: Forma del panel del disyuntor
      description: Identifica el tipo de panel de disyuntores, como en miniatura o
        de caja moldeada.
    circuit_breaker_type:
      name: Tipo de disyuntor
      description: Identifica el tipo de disyuntor, como estándar o AFCI.
    clarinet_key_system:
      name: Sistema de llaves del clarinete
      description: Identifica el sistema de teclas de un clarinete, como Albert o
        Boehm.
    clasp_type:
      name: Tipo de cierre
      description: Especifica el tipo de cierre de los accesorios, como de hebilla
        o mariposa.
    claw_design:
      name: Diseño de garra
      description: Define la forma de la garra del rascador de espalda, como redondeada
        o puntiaguda.
    clay/slip_texture:
      name: Textura de la arcilla/barbotina
      description: Describe el tacto y la consistencia de la arcilla o la barbotina,
        como áspera o suave
    clay_texture:
      name: Textura de la arcilla
      description: Describe la sensación y la consistencia de los productos de arcilla,
        como media o suave.
    cleaner_purpose:
      name: Propósito del limpiador
      description: Identifica el uso específico de un limpiador para embarcaciones,
        como para el casco o la cubierta.
    cleaning_instructions:
      name: Instrucciones de limpieza
      description: Ofrece información acerca del método de limpieza recomendado, como,
        por ejemplo, apto para lavavajillas o solo de lavado a mano.
    cleaning_kit_components_included:
      name: Componentes incluidos en el kit de limpieza
      description: Enumera los artículos específicos contenidos en el kit para que
        los clientes comprendan qué herramientas y consumibles se proporcionan.
    cleaning_mode:
      name: Modo de limpieza
      description: Enumera los modos específicos de limpieza o uso del hilo dental
        disponibles en el dispositivo.
    cleaning_purpose:
      name: Uso en limpieza
      description: Especifica el uso previsto de los productos de limpieza o lavandería,
        como, por ejemplo, refrescante o quitamanchas.
    cleaning_surfaces:
      name: Superficies de limpieza
      description: Identifica las superficies adecuadas para un producto de limpieza,
        como las superficies de vidrio o placas de cocina.
    cleaning_technology:
      name: Tecnología de limpieza
      description: Describe el movimiento o mecanismo principal que usa el cepillo
        de dientes para limpiar los dientes.
    cleanse_focus:
      name: Enfoque de limpieza
      description: Identifica el sistema corporal principal o propósito objetivo del
        producto de limpieza.
    cleanser_type:
      name: Tipo de limpiador
      description: Describe la textura o formato específico del limpiador.
    cleat_type:
      name: Tipo de cornamusa
      description: Especifica el estilo de las cornamusas utilizadas en el atraque,
        como de base abatible o abierta.
    climbing_activity:
      name: Actividad de escalada
      description: Especifica el tipo de escalada para la que está diseñado el producto,
        como el montañismo o la escalada en hielo.
    clip_type:
      name: Tipo de pinza
      description: Especifica el estilo de clips de los elementos portapapeles, como,
        por ejemplo, de alta capacidad.
    clipper/trimmer_type:
      name: Tipo de cortadora/recortadora
      description: Identifica la fuente de alimentación de las tijeras para mascotas
        o recortadoras, como las con cable o sin cable
    clipper_motor_type:
      name: Tipo de motor de cortadora
      description: Describe el diseño del motor mecánico que alimenta el dispositivo
        (p. ej., pivote, rotatorio, magnético, sin escobillas).
    clock_and_alarm_features:
      name: Características de reloj y alarma
      description: Detalla las capacidades integradas de reloj y despertar/dormir
        que ofrece la radio.
    closure_style:
      name: Estilo de cierre
      description: Especifica el método utilizado para cerrar un artículo, normalmente
        de ropa de cama, como, por ejemplo, tradicional u oculto.
    closure_type:
      name: Tipo de cierre
      description: Define el método utilizado para abrochar o sujetar un producto,
        como la cremallera o las hebillas.
    cloth_treatment:
      name: Tratamiento del paño
      description: Identifica si el paño está pretratado y, de ser así, la naturaleza
        del tratamiento.
    clothing_accessory_material:
      name: Material de los accesorios de ropa
      description: Identifica el material principal que se usa en accesorios de vestir,
        como el cuero o el lino.
    clothing_features:
      name: Características de la ropa
      description: Describe propiedades únicas de la ropa, como la impermeabilidad
        o la resistencia a las arrugas.
    club_subset:
      name: Subconjunto de palos
      description: 'Clasifica los palos de golf en subcategorías específicas, como,
        por ejemplo, cuña de arena o putter con cabeza blade. '
    club_type:
      name: Tipo de palo
      description: Clasifica los palos de golf según el uso específico, como driver
        o hierro.
    coating/sealant_application:
      name: Aplicación de recubrimiento/sellador
      description: Describe la función de los revestimientos protectores y selladores,
        como, por ejemplo, impermeabilización o prevención de la oxidación.
    coaxial_cable_series:
      name: Serie del cable coaxial
      description: Identifica la serie o designación estándar de la industria del
        cable (p. ej., RG-6, RG-58, LMR-400), que dicta las dimensiones físicas y
        el rendimiento eléctrico.
    cockpit_type:
      name: Tipo de cabina
      description: Especifica el diseño y la tecnología utilizados en la cabina de
        un avión, como analógico o híbrido.
    cocktail_decoration_design:
      name: Diseño de decoración de cócteles
      description: Identifica el patrón o estilo de los artículos para cócteles, como
        el estampado de lunares o las formas novedosas.
    cocktail_decoration_material:
      name: Material de las decoraciones para cócteles
      description: Especifica el material de fabricación de las decoraciones de cócteles,
        como el plástico o el papel.
    coffee/tea_set_pieces_included:
      name: Piezas de juego de café/té incluidas
      description: Detalla los artículos individuales de juegos de café o té, como
        tazas y platillos.
    coffee_creamer_variety:
      name: Variedad de leche para café
      description: Distingue entre diferentes tipos de leche para café, como, por
        ejemplo, en polvo o no láctea.
    coffee_input_type:
      name: Tipo de entrada de café
      description: Identifica el formato del café, como, por ejemplo, monodosis o
        granos.
    coffee_product_form:
      name: Forma de producto de café
      description: Especifica el tipo de producto de café, como molido o en grano.
    coffee_roast:
      name: Tueste del café
      description: Define el nivel de tueste de los productos de café, por ejemplo,
        claro, medio u oscuro.
    coil_connection:
      name: Conexión de bobina
      description: Define la reemplazabilidad de la bobina de los dispositivos de
        vapeo, por ejemplo, fija o intercambiable.
    coin_material:
      name: Material de la moneda
      description: Especifica el tipo de material del que está hecha una moneda coleccionable,
        por ejemplo, el bronce o el cobre.
    collagen_source:
      name: Fuente de colágeno
      description: Identifica el origen principal del colágeno usado en el suplemento
        (p. ej., bovino, marino, de origen vegetal).
    collagen_type:
      name: Tipo de colágeno
      description: Especifica el o los tipos moleculares de colágeno proporcionados
        por el producto (p. ej., Tipo I, II, III).
    collar/mount_compatible_device:
      name: Dispositivo compatible con collar/montaje
      description: Especifica el dispositivo compatible para soportes o collarines
        para trípode, como, por ejemplo, objetivos o cámaras.
    collar/mount_design:
      name: Diseño de collar/montaje
      description: Describe el diseño de soportes o collarines para trípode, como
        de anillo o liberación rápida.
    collar_lock_type:
      name: Tipo de cierre de collar
      description: Especifica el tipo de cierre de collarín del equipo de levantamiento
        de pesas, como Spinlock o la abrazadera de resorte.
    color:
      name: Color
      description: Define el patrón o color primario, como las rayas o el azul.
    color_accuracy_standards:
      name: Estándares de precisión del color
      description: Define los estándares de calibración del color, normalmente de
        monitores, como, por ejemplo, sRGB o Adobe RGB.
    color_depth:
      name: Profundidad de color
      description: Indica la profundidad de bits óptica/de salida del escáner (número
        de bits por píxel), que determina la precisión del color, la gradación y la
        latitud de edición.
    color_saturation:
      name: Saturación del color
      description: Indica la intensidad del color del carrete de la cámara, por ejemplo,
        alta o baja.
    comb/brush_size:
      name: Tamaño del peine/cepillo
      description: Clasifica el tamaño físico general del cepillo o peine.
    comb_features:
      name: Características del peine
      description: Enumera características notables de rendimiento o diseño del peine.
    comb_tooth_spacing:
      name: Espaciado de los dientes del peine
      description: Describe el espaciado o densidad de los dientes del peine.
    comic_edition:
      name: Edición de cómic
      description: Indica la versión o edición de lanzamiento específica de un cómic,
        que puede influir en su rareza y valor coleccionable, por ejemplo, primera
        edición, portada variante.
    comic_tradition:
      name: Tradición de cómic
      description: Indica la tradición cultural o regional de la que proviene el cómic,
        como el cómic chino o el manga.
    commode_opening_type:
      name: Tipo de abertura del inodoro
      description: Identifica la presencia y estilo de cualquier recorte para inodoro
        o compatibilidad con cubo en el asiento.
    communication_device_features:
      name: Características del dispositivo de comunicación
      description: Identifica las características únicas de los dispositivos de comunicación,
        como la pantalla táctil o el control por voz.
    communication_protocols:
      name: Protocolos de comunicación
      description: Especifica el protocolo de red utilizado, como Modbus o Profibus.
    compass_style:
      name: Estilo de la brújula
      description: Especifica el estilo de las brújulas de navegación, como la brújula
        de buceo o giroscópica.
    compatible_accessibility_equipment_type:
      name: Tipo de equipo de accesibilidad compatible
      description: Especifica el tipo de equipo de accesibilidad o movilidad con el
        que el accesorio está diseñado para funcionar.
    compatible_aircraft_type:
      name: Tipo de aeronave compatible
      description: Identifica el tipo de aeronave para la que es adecuado el producto,
        como el avión o el helicóptero.
    compatible_amplifier:
      name: Amplificador compatible
      description: Identifica el tipo de amplificador con el que es compatible un
        producto, como de bajo o teclado.
    compatible_aquarium:
      name: Acuario compatible
      description: Especifica para qué tipos de acuarios es adecuado un producto,
        como, por ejemplo, todos los acuarios o de agua salada.
    compatible_baby_bottle_design:
      name: Diseño de biberón compatible
      description: Indica los estilos de biberones con los que el producto es compatible,
        como los de cuello ancho.
    compatible_baby_carrier_type:
      name: Tipo de portabebés compatible
      description: Especifica el tipo de portabebés con el que es compatible el producto,
        como portabebés o mochila.
    compatible_baby_chair_type:
      name: Tipo de silla de bebé compatible
      description: Especifica el tipo de silla de bebé a la que se adapta el producto,
        como carrito de compras o restaurante.
    compatible_baby_transport_type:
      name: Tipo de transporte de bebé compatible
      description: Identifica artículos de transporte de bebé compatibles, como cochecito
        o silla de automóvil.
    compatible_ball_type:
      name: Tipo de pelota compatible
      description: Identifica los tipos de pelotas que se pueden usar con el producto,
        como por ejemplo, las de tenis o Wiffle.
    compatible_battery_size:
      name: Tamaño de batería compatible
      description: Identifica los tamaños de pila que admite un producto, por ejemplo,
        AAA o CR2032.
    compatible_battery_technology:
      name: Tecnología de batería compatible
      description: Especifica el tipo de tecnología de pila con la que es compatible
        un producto, como iones de litio o alcalinas.
    compatible_bench_positions:
      name: Posiciones del banco compatibles
      description: Especifica el rango de posiciones, normalmente de bancos de ejercicios,
        como, por ejemplo, plano o inclinado.
    compatible_bike_type:
      name: Tipo de bicicleta compatible
      description: Especifica el tipo de bicicleta para la que está diseñado el producto,
        como eléctrica o de carretera.
    compatible_brass_instrument:
      name: Instrumento de metal compatible
      description: Especifica el instrumento de viento con el que se puede utilizar
        el producto, como la trompeta o la tuba.
    compatible_cable_tie_material:
      name: Material de brida compatible
      description: Identifica el tipo de brida (p. ej., acero inoxidable, nailon)
        que la pistola está diseñada para instalar o quitar.
    compatible_chemical_treatment_strength_level:
      name: Nivel de fuerza del tratamiento químico compatible
      description: Indica la fuerza o potencia recomendada por el fabricante (p. ej.,
        suave, regular, súper) del tratamiento químico.
    compatible_clarinet_type:
      name: Tipo de clarinete compatible
      description: Identifica el tipo de clarinete con el que es compatible un producto,
        como el clarinete A o universal.
    compatible_contact_lens_type:
      name: Tipo de lente de contacto compatible
      description: Identifica qué categorías de lentes de contacto se pueden almacenar
        o limpiar en el estuche.
    compatible_contact_lenses:
      name: Lentes de contacto compatibles
      description: Indica los tipos o materiales de lentes de contacto con los que
        la solución se puede usar de manera segura.
    compatible_cosmetic_tools:
      name: Herramientas cosméticas compatibles
      description: Especifica con qué instrumento de belleza se puede utilizar el
        producto, por ejemplo, esponjas o pinzas.
    compatible_device:
      name: Dispositivo compatible
      description: Especifica los dispositivos que funcionan con un sistema electrónico,
        como un reloj inteligente o auriculares inalámbricos.
    compatible_drum_configuration:
      name: Configuración de batería compatible
      description: Identifica el set de batería para el que está diseñado el producto,
        como el contrabajo o charles.
    compatible_electric/acoustic_instrument:
      name: Instrumento eléctrico/acústico compatible
      description: Identifica el instrumento eléctrico o acústico para el que está
        diseñado el producto, como una guitarra eléctrica o un sintetizador.
    compatible_electronic_card_type:
      name: Tipo de tarjeta electrónica compatible
      description: Especifica los tipos de tarjetas electrónicas con las que el producto
        puede interactuar, como de banda magnética o biblioteca.
    compatible_equipment_type:
      name: Tipo de equipo compatible
      description: Especifica la categoría de equipo de piscina o spa para la cual
        está diseñada la placa de circuito (p. ej., calentador, bomba, clorador).
    compatible_exercise_machine_type:
      name: Tipo de máquina de ejercicio compatible
      description: Identifica el tipo de máquina de ejercicio para la cual está destinada
        la placa (p. ej., cinta de correr, elíptica).
    compatible_exercises:
      name: Ejercicios compatibles
      description: Especifica los ejercicios que se pueden realizar con el producto,
        como dominadas o fondos.
    compatible_eyewear_type:
      name: Tipo de gafas compatibles
      description: Identifica el tipo de gafas con las que el accesorio está diseñado
        para ajustarse o funcionar.
    compatible_filament:
      name: Filamento compatible
      description: Especifica los tipos de filamento que puede utilizar una impresora
        3D, como ácido poliláctico (PLA) o nailon.
    compatible_film_type:
      name: Tipo de película compatible
      description: Identifica el tipo de carrete que puede utilizar una cámara, como
        una película negativa o en color.
    compatible_flute_type:
      name: Tipo de flauta compatible
      description: Identifica el tipo de flauta con la que un producto es compatible,
        como, por ejemplo, la universal o el flautín.
    compatible_game_format:
      name: Formato de juego compatible
      description: Especifica el tipo de formato de juego admitido, como solo descarga
        digital o disco físico.
    compatible_gardening_tool:
      name: Herramienta de jardinería compatible
      description: Especifica con qué herramientas de jardinería se puede utilizar
        un producto, como un rastrillo o una pala.
    compatible_hair_color:
      name: Color de cabello compatible
      description: Empareja productos con colores de cabello específicos, por ejemplo,
        plateado o rubio.
    compatible_hammock_design:
      name: Diseño de hamaca compatible
      description: Especifica el tipo de hamaca con la que es compatible un producto,
        por ejemplo, colgante o marco.
    compatible_harmonica_type:
      name: Tipo de armónica compatible
      description: Identifica el tipo de armónica para el que está diseñado un producto,
        como la diatónica o cromática.
    compatible_hdcp:
      name: HDCP compatible
      description: Especifica la compatibilidad HDCP de los dispositivos electrónicos,
        como HDCP 2.2 o no compatible.
    compatible_instrument:
      name: Instrumento compatible
      description: Identifica el instrumento musical para el que está diseñado el
        producto, como una guitarra o un piano.
    compatible_keyboard_configuration:
      name: Configuración de teclado compatible
      description: Identifica la distribución del teclado compatible con un producto,
        como de 61 o 76 teclas.
    compatible_lock_type:
      name: Tipo de cerradura compatible
      description: Identifica los tipos de cerraduras con las que puede funcionar
        un producto, como las cerraduras de combinación o electrónicas.
    compatible_makeup:
      name: Maquillaje compatible
      description: Especifica productos de maquillaje compatibles, por ejemplo, el
        lápiz de labios o la sombra de ojos.
    compatible_mattress_size:
      name: Tamaño de colchón compatible
      description: Especifica el tamaño de colchón que admite el producto, como, por
        ejemplo, King o doble.
    compatible_memory_cards:
      name: Tarjetas de memoria compatibles
      description: Identifica los tipos de tarjetas de memoria que puede utilizar
        un producto, normalmente cámaras, como, por ejemplo, SD o microSDHC.
    compatible_microphone_thread:
      name: Rosca de micrófono compatible
      description: Especifica el tamaño de rosca compatible de productos de micrófono,
        por ejemplo, 5/8"-27.
    compatible_motherboard_form_factor:
      name: Factor de forma de placa base compatible
      description: Especifica los tamaños de placa base que el producto puede admitir,
        como ATX.
    compatible_oboe_type:
      name: Tipo de oboe compatible
      description: Identifica el tipo de oboe para el que está diseñado un producto,
        como el universal o corno inglés.
    compatible_operating_system:
      name: Sistema operativo compatible
      description: Define la compatibilidad de software de un producto, por ejemplo,
        Windows o macOS.
    compatible_orchestral_string_instrument:
      name: Instrumento de cuerda de orquesta compatible
      description: Identifica el instrumento de cuerda de orquesta específico para
        el que está diseñado el producto, como el violín o el violonchelo.
    compatible_paper_size:
      name: Tamaño de papel compatible
      description: Especifica los tamaños de papel que puede admitir un dispositivo,
        normalmente en impresoras, como, por ejemplo, A4 o tarjeta postal.
    compatible_patient_profile:
      name: Perfil de paciente compatible
      description: Identifica el grupo de pacientes adecuado para un producto médico,
        como los pacientes pediátricos o geriátricos.
    compatible_percussion_instrument:
      name: Instrumento de percusión compatible
      description: Identifica con qué instrumentos de percusión se puede utilizar
        un producto, como un tambor o un bongo.
    compatible_pinball_machine_edition:
      name: Edición de máquina de pinball compatible
      description: Especifica con qué edición o nivel de acabado de la máquina de
        pinball encaja el accesorio (p. ej., Pro, Premium, LE).
    compatible_play_vehicle_type:
      name: Tipo de vehículo de juego compatible
      description: Identifica el tipo de vehículo de juego para el que es adecuado
        el producto, como un coche o un barco.
    compatible_player:
      name: Reproductor compatible
      description: Identifica los dispositivos que se pueden utilizar con un adaptador
        de casete, por ejemplo, un iPad o una computadora portátil.
    compatible_polish_thinner_type:
      name: Tipo de diluyente de esmalte compatible
      description: Indica los sistemas de recubrimiento de uñas con los que el diluyente
        está diseñado para funcionar.
    compatible_power_supply_form_factor:
      name: Factor de forma de fuente de alimentación compatible
      description: Especifica el tamaño o estándar de la unidad de fuente de alimentación
        (PSU) que el gabinete está diseñado para alojar.
    compatible_printer:
      name: Impresora compatible
      description: Identifica el tipo de impresora con el que es compatible un producto,
        como la impresora láser o de inyección de tinta.
    compatible_processor_series:
      name: Serie de procesadores compatibles
      description: Especifica la serie de procesadores con los que el producto es
        compatible, como AMD Ryzen o Intel Core Solo.
    compatible_programming_languages:
      name: Lenguajes de programación compatibles
      description: Identifica los lenguajes de programación con los que puede trabajar
        un producto de software, como Python o Java.
    compatible_recipes:
      name: Recetas compatibles
      description: Especifica las recetas adecuadas para el producto, normalmente
        para heladeras, como, por ejemplo, sorbetes o helados.
    compatible_resin_type:
      name: Tipo de resina compatible
      description: Especifica las categorías de resina UV que puede utilizar una impresora
        SLA/MSLA.
    compatible_resolution:
      name: Resolución compatible
      description: Define la resolución de pantalla admitida, por ejemplo, 1080p o
        Full HD.
    compatible_satellite_radio_service:
      name: Servicio de radio satelital compatible
      description: Identifica los servicios de radio satelital con los que está diseñado
        para funcionar el receptor, asegurando compatibilidad con suscripciones existentes
        o previstas.
    compatible_seat_type:
      name: Tipo de silla compatible
      description: Especifica el tipo de asiento infantil para automóvil al que se
        adapta el producto, como un elevador o un asiento infantil para automóvil.
    compatible_shoe_size:
      name: Talla de zapato compatible
      description: Empareja productos con tallas de zapatos específicas, por ejemplo,
        12, 42.
    compatible_software_platform:
      name: Tipo de software compatible
      description: Identifica las plataformas de software con las que un producto
        es compatible, como Adobe Creative o Canva.
    compatible_special_effects_device:
      name: Dispositivo de efectos especiales compatible
      description: Identifica los dispositivos de efectos especiales con los que puede
        funcionar un producto, como las luces LED o las máquinas de humo.
    compatible_stove_top_type:
      name: Tipo de placa de cocina compatible
      description: Identifica el tipo de placas de cocina con las que se puede utilizar
        el producto, como las de gas o inducción.
    compatible_string_instrument:
      name: Instrumento de cuerda compatible
      description: Identifica para qué instrumento de cuerda está diseñado el producto,
        como un ukelele o un bajo.
    compatible_stroller_type:
      name: Tipo de cochecito compatible
      description: Especifica el tipo de cochecito al que se adapta el producto, como
        paraguas o jogging.
    compatible_vacuum_type:
      name: Tipo de aspiradora compatible
      description: Especifica el tipo de aspiradora con la que es compatible el producto,
        como portátil o de vapor.
    compatible_vehicle:
      name: Vehículo compatible
      description: Especifica el tipo de vehículo para el que está diseñado un producto,
        como automóvil o SUV.
    compatible_voice_assistant:
      name: Asistente de voz compatible
      description: Identifica las plataformas de control por voz que pueden operar
        el receptor.
    compatible_walking_aid_equipment:
      name: Equipos de ayuda para caminar compatibles
      description: Especifica para qué utensilios para andar está diseñado el producto,
        por ejemplo, muletas o andadores.
    compatible_wax_container_size:
      name: Tamaño de contenedor de cera compatible
      description: Enumera los tamaños estándar de cartucho, lata o recipiente que
        se pueden colocar directamente en el calentador sin decantarse.
    compatible_wax_form:
      name: Forma de cera compatible
      description: Especifica las formas de cera depilatoria que el calentador está
        diseñado para derretir.
    compatible_weight_lifting_accessory:
      name: Accesorio de levantamiento de pesas compatible
      description: Especifica el equipo de levantamiento de pesas con el que es compatible
        el producto, como las barras de pesas o mancuernas.
    compliance_certifications:
      name: Certificaciones de cumplimiento
      description: Especifica las certificaciones de cumplimiento de un producto,
        como HIPAA o FedRAMP.
    component_mounting_style:
      name: Estilo de montaje del componente
      description: Define el método principal mediante el cual un componente electrónico
        o placa se conecta a una placa de circuito, panel, chasis o riel.
    component_output_type:
      name: Tipo de salida de componente
      description: Especifica el tipo de señal de salida de los componentes electrónicos,
        como UART o analógica.
    component_package_type:
      name: Tipo de paquete de componentes
      description: Define el factor de forma o el embalaje de los componentes electrónicos,
        por ejemplo, SDM (dispositivo de montaje en superficie), DIP (paquete dual
        en línea).
    component_size_code:
      name: Código de tamaño del componente
      description: Especifica la designación de tamaño estandarizada SMD o de orificio
        pasante (p. ej., 0603, 0805) utilizada para el paquete del condensador.
    component_tolerance:
      name: Tolerancia del componente
      description: Define la desviación permisible del valor nominal (resistencia,
        capacitancia, inductancia, frecuencia, etc.) expresada como porcentaje.
    components_included:
      name: Componentes incluidos
      description: Enumera las partes de hardware suministradas en el kit de inicio.
    compression_circuit_type:
      name: Tipo de circuito de compresión
      description: Describe la tecnología subyacente de reducción de ganancia (p.
        ej., VCA, FET, óptico) que da forma al sonido y la respuesta del procesador.
    compression_format:
      name: Formato de compresión
      description: Define el tipo de compresión de archivos de vídeo utilizada, por
        ejemplo, MPEG-4 o AVI.
    compression_level:
      name: Nivel de compresión
      description: Indica la intensidad de la presión de los productos de compresión,
        por ejemplo, ligera o firme.
    computer_accessories_included:
      name: Accesorios para computadora incluidos
      description: Identifica los accesorios informáticos complementarios proporcionados,
        como el ratón o la bolsa para el equipo portátil.
    computer_form:
      name: Forma de computadora
      description: Define el diseño físico o la distribución de un equipo informático,
        como un equipo todo en uno o portátil.
    computer_server_features:
      name: Características del servidor informático
      description: Describe características especiales de un servidor, como la fuente
        de alimentación redundante o la compatibilidad con la virtualización.
    computer_specialized_features:
      name: Características especializadas del equipo informático
      description: Destaca características específicas de la computadora, como el
        sistema de refrigeración líquida o la iluminación RGB.
    concertina_button_configuration:
      name: Configuración del botón de la concertina
      description: Especifica el número y la disposición de los botones de una concertina,
        como la concertina anglosajona de 20 botones.
    condition:
      name: Estado
      description: Describe el estado o la calidad de un producto, como, por ejemplo,
        perfecto (M) o bajo (P).
    conditioner_effect:
      name: Efecto acondicionador
      description: Define los beneficios de un acondicionador para el cabello, como
        el efecto alisador o anticaspa.
    condom_compatibility:
      name: Compatibilidad con condones
      description: Especifica con qué materiales de condón el lubricante es seguro
        para usar.
    condom_fit_type:
      name: Tipo de ajuste del condón
      description: Describe el tamaño general o contorno anatómico diseñado para mejorar
        la comodidad y sensación.
    condom_type:
      name: Tipo de condón
      description: Diferencia si un condón está destinado a hombres o mujeres.
    conductivity_gel_application:
      name: Aplicación de gel de conductividad
      description: Especifica el procedimiento médico o diagnóstico para el que está
        destinado el gel o loción de conductividad.
    conductor_core_type:
      name: Tipo de núcleo del conductor
      description: Indica si el conductor interno es trenzado o de núcleo sólido.
    connecting_thread:
      name: Rosca de conexión
      description: Especifica el tipo de rosca para unir piezas de fontanería, como,
        por ejemplo, IPS de 1/2.
    connection_method:
      name: Método de conexión
      description: Especifica el tipo de conexión que utiliza un producto, como inalámbrica
        o por cable.
    connection_type:
      name: Tipo de conexión
      description: Especifica el tipo de conexión que usan los dispositivos electrónicos,
        como el cable o la conexión Bluetooth.
    connectivity_technology:
      name: Tecnología de conectividad
      description: Define el método de transferencia de datos en un producto, por
        ejemplo, Bluetooth o USB.
    connectivity_type:
      name: Tipo de conectividad
      description: Aclara si la placa es sin soldadura (estilo protoboard) o está
        diseñada para soldar.
    connector_1_type:
      name: Tipo de conector 1
      description: Especifica el conector o interfaz presente en el primer extremo
        del adaptador o acoplador.
    connector_2_type:
      name: Tipo de conector 2
      description: Especifica el conector o interfaz presente en el segundo extremo
        del adaptador o acoplador.
    connector_contact_plating:
      name: Recubrimiento de contactos del conector
      description: Especifica el recubrimiento o revestimiento superficial aplicado
        a los contactos eléctricos para mejorar la conductividad y resistencia a la
        corrosión.
    connector_design:
      name: Diseño de conector
      description: Identifica el diseño de los conectores o eslabones de cadena, como
        de extremo abierto o broche.
    connector_gender:
      name: Género del conector
      description: Especifica el género de los extremos de conectores en la electrónica,
        por ejemplo, macho o macho a hembra.
    connector_mounting_style:
      name: Estilo de montaje del conector
      description: Indica cómo se monta o integra mecánicamente el conector en un
        ensamblaje (p. ej., PCB, panel, chasis, cable, acoplador).
    connector_orientation:
      name: Orientación del conector
      description: Describe la orientación física de la interfaz de conexión relativa
        a la superficie de montaje o cable (p. ej., recto, ángulo recto, vertical).
    connector_position:
      name: Posición del conector
      description: Describe la ubicación del conector de video cuando la pantalla
        se ve desde el frente (p. ej., inferior derecha, superior izquierda).
    connector_type:
      name: Tipo de conector
      description: Especifica el estilo o estándar de conector presente en los extremos
        del cable puente.
    console_accessories_included:
      name: Accesorios de consola incluidos
      description: Enumera los accesorios o componentes clave empaquetados con la
        consola (p. ej., controladores, cables, base, juegos).
    console_system:
      name: Sistema de consola
      description: Define la marca específica de una consola de videojuegos, como
        Atari 2600 o Playstation.
    console_type:
      name: Tipo de consola
      description: Clasifica el factor de forma física de la consola y el entorno
        de uso previsto.
    constitutive_ingredients:
      name: Ingredientes constitutivos
      description: Especifica los componentes principales que se usan en la formulación
        de un producto, por ejemplo, cera de abeja o aceite de rosa mosqueta.
    construction:
      name: Construcción
      description: Indica el método o la técnica de construcción en metal utilizados
        en la fabricación de joyas (por ejemplo, chapado, vermeil, relleno, macizo).
    construction_set_theme:
      name: Tema del set de construcción
      description: Identifica el tema de un juego de construcción, como piratas o
        animales.
    contact_lens_case_accessories_included:
      name: Accesorios de estuche para lentes de contacto incluidos
      description: Enumera los artículos suplementarios empaquetados con el estuche
        para lentes de contacto.
    contact_lens_case_features:
      name: Características del estuche para lentes de contacto
      description: Destaca características funcionales notables o inclusiones del
        estuche.
    contact_lens_material:
      name: Material de lentes de contacto
      description: Especifica la formulación polimérica o familia de materiales (p.
        ej., hidrogel, hidrogel de silicona) de la que está hecha la lente.
    contact_material:
      name: Material de los contactos
      description: Identifica el metal o recubrimiento utilizado para los contactos
        de la batería dentro del soporte.
    contrast:
      name: Contraste
      description: Se utiliza para especificar el nivel de contraste del carrete de
        la cámara, como, por ejemplo, normal o alto.
    contrast_ratio_typical:
      name: Relación de contraste (típica)
      description: Indica la relación de contraste de la pantalla, por ejemplo, 3000:1.
    control_functions:
      name: Funciones de control
      description: Especifica las capacidades de control de los interruptores de pedal
        del amplificador, como la conmutación de canales.
    control_interface:
      name: Interfaz de control
      description: Identifica cómo se puede configurar o controlar la unidad (p. ej.,
        software de PC, aplicación móvil, LCD en el dispositivo, control remoto).
    control_method:
      name: Método de control
      description: Describe la técnica de control de los componentes de automatización,
        como de par directo o escalar (V/f).
    control_solution_level:
      name: Nivel de solución de control
      description: Indica el nivel de concentración de glucosa de la solución de control.
    control_technology:
      name: Tecnología de control
      description: Especifica el funcionamiento, generalmente de tratamientos de ventanas,
        como, por ejemplo, manual o motorizado.
    control_type:
      name: Tipo de control
      description: Especifica el tipo de mecanismo de control, como de sensor o botón.
    controller_design:
      name: Diseño del controlador
      description: Describe el factor de forma de los controladores de automatización,
        como compactos o montados en bastidor.
    controller_drive_type:
      name: Tipo de unidad del controlador
      description: Identifica el tipo de energía utilizada en los variadores de control
        de automatización, como la alimentación de CA o CC.
    conversion_direction:
      name: Dirección de conversión
      description: Describe el tipo y dirección de conversión que realiza el dispositivo.
    converter_functionality:
      name: Funcionalidad del convertidor
      description: Identifica la función específica de los convertidores de objetivos,
        como el acelerador de velocidad o el gran angular.
    conveyor_operation:
      name: Funcionamiento del transportador
      description: Identifica cómo funciona un sistema transportador, como motorizado
        o impulsado por gravedad.
    cooking_compartments:
      name: Compartimentos de cocción
      description: Especifica el número de áreas de cocción en electrodomésticos de
        cocina como freidoras de aire, por ejemplo, simples o dobles.
    cooking_method:
      name: Método de cocción
      description: Especifica la técnica de cocinado recomendada, por ejemplo, asar
        o freír.
    cooking_wine_variety:
      name: Variedad de vinos para cocinar
      description: Distingue entre diferentes variedades de vino para cocinar, por
        ejemplo, de arroz o Jerez.
    cookware/bakeware_features:
      name: Características de los utensilios para cocinar/hornear
      description: Identifica características especiales de utensilios de cocina o
        para hornear, como el revestimiento antiadherente o apto para horno.
    cookware/bakeware_material:
      name: Material de los utensilios para cocinar/hornear
      description: Identifica el material principal utilizado en utensilios de cocina
        o para hornear, como el acero inoxidable o la cerámica.
    cookware_features:
      name: Características de los utensilios para cocinar
      description: Destaca las características únicas de los utensilios de cocina,
        como el mango apto para horno o que mantiene la temperatura fría.
    cookware_items_included:
      name: Artículos de utensilios para cocinar bares incluidos
      description: Detalla los componentes de un juego de utensilios para cocinar,
        como una olla de hierro o una sartén
    cooling_technology:
      name: Tecnología de refrigeración
      description: Especifica el método que se usa para enfriar dispositivos electrónicos,
        como aire o disipador de calor.
    cord_fastening_system:
      name: Sistema de sujeción de cuerda
      description: Especifica el tipo de sistema de sujeción de las cuerdas elásticas,
        como, por ejemplo, la bola basculante o el gancho.
    cordless_phone_frequency_band:
      name: Banda de frecuencia de teléfonos inalámbricos
      description: Especifica las bandas de radiofrecuencia en las que funciona el
        sistema telefónico inalámbrico, lo que ayuda a los compradores a garantizar
        la compatibilidad regional y evitar interferencias.
    core_color:
      name: Color del núcleo
      description: Identifica el color primario del núcleo de un arco o ballesta,
        como negro o azul
    core_material:
      name: Material del núcleo
      description: Especifica el material principal utilizado, normalmente en arcos
        y ballestas, como, por ejemplo, la fibra de vidrio o la madera.
    core_pattern:
      name: Patrón del núcleo
      description: Describe el diseño principal del núcleo de un arco o ballesta,
        como camuflado o con aves
    corrector_features:
      name: Características del corrector
      description: Describe las características únicas de los líquidos correctores,
        bolígrafos y cintas, como, por ejemplo, sin tiempo de secado o con punta de
        precisión.
    corsage/boutonniere_design:
      name: Diseño de corsage/boutonniere
      description: Describe el estilo del ramillete o flor de ojal, como de mano o
        con alfiler.
    cosmetic_condition:
      name: Estado estético
      description: Define el desgaste y el estado de los componentes electrónicos,
        por ejemplo, nuevos o abierto-nunca usado.
    cosmetic_finish:
      name: Acabado cosmético
      description: Define el acabado cosmético de un producto, por ejemplo, mate o
        natural.
    cosmetic_function:
      name: Función cosmética
      description: Define el beneficio o efecto previsto de un producto cosmético,
        por ejemplo, calmante o curativo.
    cosmetic_set_type:
      name: Tipo de conjunto cosmético
      description: Clasifica el conjunto por su enfoque o tema principal.
    costume_theme:
      name: Tema de disfraz
      description: Identifica el tema o concepto principal de un disfraz, como terror
        o fantasía.
    cotton_ball_size:
      name: Tamaño de bola de algodón
      description: Denota la categoría de tamaño relativo de cada bola de algodón
        (p. ej., pequeño, grande, jumbo).
    counter_shape:
      name: Forma del mostrador
      description: Describe la forma de un mostrador o escritorio, como recto o curvo.
    country:
      name: País
      description: Especifica el país asociado con el producto, como Japón o Alemania.
    country_of_issue:
      name: País de origen
      description: Indica el país donde se emitió la tarjeta telefónica o donde está
        prevista su utilización.
    cover_closure_design:
      name: Diseño de cierre de la funda
      description: Especifica el diseño del cierre, normalmente de fundas de almohadas,
        como, por ejemplo, sobre o cremallera.
    cover_color:
      name: Color de la cubierta
      description: Especifica el color primario de la cubierta de un producto, como,
        por ejemplo, transparente o azul marino.
    cover_features:
      name: Características de la tapa
      description: Describe las características especiales de cubierta de un producto,
        como la impermeabilidad o la resistencia al calor.
    cover_material:
      name: Material de la cubierta
      description: Identifica el tipo de tejido o material que se usa en la funda
        del producto, como la seda o el algodón.
    cover_pattern:
      name: Patrón de la cubierta
      description: Especifica el motivo visual o diseño de la cubierta de un artículo,
        como floral o teñido anudado.
    cover_type:
      name: Tipo de cubierta
      description: Describe el estilo o la funcionalidad de la funda de un vehículo,
        como de cobertura completa o retráctil.
    coverage_area:
      name: Área de cobertura
      description: Indica los países o territorios de cobertura geográfica para el
        software GPS, como Estados Unidos o Canadá.
    coverage_country:
      name: País de cobertura
      description: Especifica el país principal en el que se puede utilizar el crédito
        prepago.
    coverage_level:
      name: Nivel de cobertura
      description: Indica la opacidad o intensidad de cobertura que proporciona el
        producto una vez aplicado (p. ej., transparente, medio, completo).
    coverage_region:
      name: Región de cobertura
      description: Indica la región de cobertura geográfica amplia del software GPS,
        como América del Norte u Oceanía.
    craft/sculpting_project_type:
      name: Tipo de proyecto de artesanía/escultura
      description: Identifica el tipo de manualidad o escultura, como el modelado
        o la fabricación de máscaras.
    craft_cutter/embosser_type:
      name: Tipo de cortador/estampador artesanal
      description: Especifica el tipo de cortadora o impresora para manualidades,
        por ejemplo, máquina troqueladora, troquel
    craft_decoration_maker_type:
      name: Tipo de herramientas de decoración
      description: Especifica el tipo de creador de decoración artesanal, como un
        estampador o un creador de pegatinas
    craft_knife_design:
      name: Diseño de cúter para manualidades
      description: Describe el estilo específico de un cúter, como recto o de precisión.
    craft_pipe_cleaner_design:
      name: Diseño de limpiapipas
      description: Describe el diseño o estilo de limpiapipas artesanales, como el
        tallo de chenilla o el palito de felpilla
    craft_project_type:
      name: Tipo de proyecto de manualidades
      description: Identifica el tipo de manualidad, como los álbumes de recortes
        o la fabricación de joyas.
    crafting_frame/stretcher_features:
      name: Características del marco/bastidor de manualidades
      description: Describe las características únicas de los marcos/bastidores de
        manualidades, como el agarre seguro o la superficie lisa.
    crafting_frame_features:
      name: Características del marco de manualidades
      description: Describe las características únicas de la elaboración de marcos,
        como la tensión ajustable o el bajo peso.
    crafting_hoop_features:
      name: Características del aro de manualidades
      description: Destaca las características de los bastidores de bordado, como,
        por ejemplo, el agarre seguro o la superficie lisa.
    crafting_mat/pad_features:
      name: Características de la base de corte
      description: Describe las características únicas de la base de corte, como el
        respaldo antideslizante o la facilidad de limpieza.
    crafting_stretcher_features:
      name: Características del bastidor de manualidades
      description: Describe las características clave de un bastidor de manualidades,
        como la tensión regulable o el bajo peso.
    crampon_attachment_type:
      name: Tipo de sujeción de crampón
      description: Identifica cómo se fijan los crampones al calzado, como el sistema
        híbrido o step-in.
    creatine_type:
      name: Tipo de creatina
      description: Especifica la forma química o formulación especializada de creatina
        usada en el suplemento.
    creative_art_project_type:
      name: Tipo de proyecto de arte creativo
      description: Identifica el tipo de proyecto de arte creativo, como el dibujo
        o los álbumes de recortes.
    crib/toddler_bed_features:
      name: Características de la cuna/cama para niños pequeños
      description: Describe aspectos únicos de las camas para bebés y niños pequeños,
        como el diseño convertible o el mecanismo de balanceo.
    crib_features:
      name: Características de la cuna
      description: Destaca las características únicas de las cunas para bebés, como
        las opciones de almacenamiento o de cuna convertible.
    cricket_equipment_included:
      name: Equipo de cricket incluido
      description: Identifica los artículos de cricket específicos incluidos en un
        conjunto, como el casco o los tocones.
    crutch_folding_type:
      name: Tipo de plegado de muleta
      description: Especifica si y cómo la muleta se pliega para transporte o almacenamiento.
    crutch_type:
      name: Tipo de muleta
      description: Distingue entre diferentes estilos de muletas, por ejemplo, de
        antebrazo o axila.
    crystal_system:
      name: Sistema cristalino
      description: Identifica la estructura geométrica de un cristal, como hexagonal
        o cúbica.
    cue_style:
      name: Estilo de taco
      description: Especifica el estilo de un palo de billar, por ejemplo, recto o
        cónico.
    cue_type:
      name: Tipo de taco
      description: Especifica el tipo de taco de un palo de billar, por ejemplo, de
        saque o salto.
    cue_wrap:
      name: Revestimiento de taco
      description: Identifica el tipo de envoltura de un taco de billar, como, por
        ejemplo, de lino irlandés o sin envoltura.
    cuff_connector_type:
      name: Tipo de conector del brazalete
      description: Define la interfaz mecánica que conecta el tubo del brazalete al
        monitor de presión arterial.
    cuff_size_category:
      name: Categoría de tamaño del brazalete
      description: Especifica la clase de tamaño estandarizado del brazalete (p. ej.,
        infantil, adulto, adulto grande).
    cuff_style:
      name: Estilo del puño
      description: Describe el diseño del puño de antebrazo en las muletas de antebrazo.
    cuisine:
      name: Cocina
      description: Clasifica productos por estilo culinario o región, por ejemplo,
        el suroeste de Estados Unidos o el Mediterráneo.
    culinary_botanical_name:
      name: Nombre botánico culinario
      description: Especifica el nombre científico de hierbas o plantas culinarias,
        por ejemplo, capsicum annuum o mentha.
    cup_size:
      name: Tamaño de la copa
      description: Especifica la talla del busto de los sujetadores, como AA o L.
    curing_method:
      name: Método de curado
      description: Indica cómo se fija o cura el pegamento (p. ej., secado al aire,
        lámpara UV/LED, calor).
    curler_pad_material:
      name: Material de la almohadilla del rizador
      description: Identifica el material de la almohadilla reemplazable que presiona
        contra las pestañas, afectando la comodidad, durabilidad y consideraciones
        alérgicas.
    curler_size_compatibility:
      name: Compatibilidad de tamaño del rizador
      description: Especifica el tamaño o estilo de almohadilla del rizador que encajan
        los repuestos (p. ej., estándar, mini, parcial).
    curler_type:
      name: Tipo de rizador
      description: Especifica el tipo de rizador de cabello, como varillas flexibles
        o ruleros calientes.
    currencies_supported:
      name: Monedas admitidas
      description: Identifica los tipos de divisa que acepta un producto, por ejemplo,
        el dólar canadiense (CAD) o el yuan chino (CNY).
    currency:
      name: Moneda
      description: Define el tipo de moneda que admite un producto, como el yuan chino
        (CNY) o el dólar estadounidense (USD).
    currency_type:
      name: Tipo de moneda
      description: Identifica el tipo de divisa que gestiona un producto, como las
        monedas o tokens.
    cushion_design:
      name: Diseño del cojín
      description: Describe el factor de forma o estilo general del cojín metatarsiano
        (p. ej., almohadilla, manga, cúpula).
    customer_support_channels:
      name: Canales de atención al cliente
      description: Especifica las formas en que los clientes pueden obtener ayuda,
        como la asistencia telefónica o los tutoriales de vídeo.
    customization:
      name: Personalización
      description: Identifica el tipo de personalización disponible en los sellos
        de oficina, como texto personalizado o grabado de logo
    cutter_options:
      name: Opciones de cortadora
      description: Identifica la característica del cortador en selladores de impulso,
        por ejemplo, cortador incorporado
    cutting_method:
      name: Método de corte
      description: Especifica la técnica de corte, normalmente de las herramientas
        de jardinería, como, por ejemplo, de hoja o yunque.
    cycling_style:
      name: Estilo de ciclismo
      description: Define el uso previsto o el estilo de conducción de los productos
        de ciclismo, como las carreras en carretera o BMX racing.
    cylinder_size_designation:
      name: Designación del tamaño del cilindro
      description: Identifica el código estándar de letra o número usado para identificar
        las dimensiones y capacidad del cilindro de oxígeno (p. ej., M6, D, E).
    daisy_chain_capability:
      name: Capacidad de conexión en cadena
      description: Indica si se pueden vincular varias unidades de conferencia (conexión
        en cadena) para expandir la cobertura de micrófono y altavoz, y el método
        de conexión utilizado.
    dance_style:
      name: Estilo de baile
      description: Indica el género o tipo de baile específico, por ejemplo, flamenco,
        ballet.
    data_network:
      name: Red de datos
      description: Especifica la compatibilidad de la red de datos de dispositivos
        móviles, como LTE o 3G.
    data_network_generation:
      name: Generación de redes de datos
      description: Indica la tecnología de red móvil más alta que admite la tarjeta
        prepaga o SIM (por ejemplo, 3G, 4G LTE, 5G).
    data_rollover_policy:
      name: Política de transferencia de datos
      description: Indica si los datos de alta velocidad no utilizados se transfieren
        al siguiente período de validez o expiran.
    decoder/encoder_function:
      name: Función de decodificador/codificador
      description: Especifica la función lógica implementada por el CI.
    decoration_material:
      name: Material de decoración
      description: Identifica el material utilizado para la decoración, como las lentejuelas
        o plumas.
    decorative_stamp_design:
      name: Diseño de sello decorativo
      description: Describe el diseño de los sellos decorativos, como de cuento de
        hadas o retro/vintage.
    denomination:
      name: Denominación
      description: Identifica el valor nominal de los artículos coleccionables como
        monedas y sellos, como, por ejemplo, 1000 dólares o 1 centavo.
    dental_appliance_compatibility:
      name: Compatibilidad con aparatos dentales
      description: Especifica con qué aparatos dentales o trabajo restaurativo la
        espuma es segura o está destinada (p. ej., alineadores, frenos, carillas).
    dental_floss_format:
      name: Formato del hilo dental
      description: Identifica el formato general del producto o estilo de entrega
        del hilo dental.
    dental_floss_shape:
      name: Forma del hilo dental
      description: Identifica la forma o el estilo del hilo dental, como cinta o seda
    dental_floss_thickness_level:
      name: Nivel de grosor del hilo dental
      description: Diferencia el hilo dental según el nivel de grosor, como fino o
        normal.
    dental_floss_type:
      name: Tipo de hilo dental
      description: Identifica el tipo de hilo dental, como sin cera o con cera
    dental_mouthgard_recommended_use:
      name: Uso recomendado de la férula dental
      description: Identifica el propósito de las férulas dentales, por ejemplo, reducción
        de ronquidos, protección ortodóncica
    dental_mouthguard_arch_coverage:
      name: Cobertura del arco del protector bucal dental
      description: Modos del irrigador dental
    dental_mouthguard_certifications:
      name: Certificaciones de protectores bucales dentales
      description: Indica certificaciones de seguridad y calidad de las férulas dentales,
        como sin BPA o con certificación CE.
    dental_paste_flavor:
      name: Sabor de pasta dental
      description: Identifica el sabor de la pasta de dientes, como, por ejemplo,
        sin sabor o chicle.
    dental_repair_kit_certifications:
      name: Certificaciones del kit de reparación dental
      description: Identifica las certificaciones que tiene un kit de reparación dental,
        como aprobado por la FDA o sin BPA
    dental_water_jet_operation:
      name: Funcionamiento del irrigador dental
      description: Especifica la fuente de alimentación para un chorro de agua dental,
        como con cable o sin cable
    dentistry_items_included:
      name: Artículos de odontología incluidos
      description: Identifica las herramientas dentales que incluye un juego, como
        un espejo dental o una herramienta de eliminación de placa.
    denture_arch_coverage:
      name: Cobertura del arco de la dentadura
      description: Identifica qué arco dental la dentadura (o carilla de presión)
        está destinada a cubrir.
    denture_base_color:
      name: Color base de la dentadura
      description: Define el tono de la encía artificial de dentaduras postizas, como
        la encía rosa o natural.
    denture_coverage:
      name: Cobertura de dentadura postiza
      description: Identifica el alcance de la cobertura de dentadura postiza, como
        total o parcial
    denture_design:
      name: Diseño de dentadura postiza
      description: Describe el tipo de dentadura postiza, por ejemplo, flexible, inmediata
    denture_retention_mechanism:
      name: Mecanismo de retención de la dentadura
      description: Especifica cómo la dentadura permanece en su lugar en los dientes
        o encías.
    denture_teeth_color:
      name: Color de los dientes de la dentadura
      description: Especifica el tono de color de los dientes de la dentadura postiza,
        como blanquecino o amarillo claro.
    deployment_type:
      name: Tipo de implementación
      description: Describe cómo se implementa el software de IA, como híbrido o basado
        en la nube.
    desk_organizer_features:
      name: Características del organizador de escritorio
      description: Describe las características específicas de un organizador de escritorio,
        como los divisores ajustables o los compartimentos integrados.
    desk_size:
      name: Tamaño del escritorio
      description: Indica la categoría de tamaño de un escritorio, como pequeño (S)
        o grande (L).
    detailed_ingredients:
      name: Ingredientes detallados
      description: Enumera componentes específicos que se usan en salud y belleza,
        por ejemplo, la vitamina C o los probióticos.
    detectable_drugs:
      name: Drogas detectables
      description: Especifica los tipos de drogas que una prueba puede identificar,
        por ejemplo, la marihuana o los opiáceos.
    detection_technology:
      name: Tecnología de detección
      description: Especifica el principio científico o marcador biológico que detecta
        la prueba de VIH (p. ej., anticuerpo, combo antígeno/anticuerpo, PCR de ARN).
    detector_operation_mode:
      name: Modo de funcionamiento del detector
      description: Describe cómo funciona un detector de seguridad, como interconectado
        o independiente
    detector_sensitivity:
      name: Sensibilidad del detector
      description: Describe la capacidad de ajuste de sensibilidad de un detector
        de metales, como ajustable o fija.
    detector_type:
      name: Tipo de detector
      description: Especifica el método de detección que se usa en dispositivos de
        seguridad, como, por ejemplo, de ionización, óptica o de muestreo de aire.
    developer_strength:
      name: Fuerza del oxidante
      description: Especifica la concentración de peróxido o volumen de oxidantes
        o kits para coincidir con la elevación deseada.
    developmental_features:
      name: Características de desarrollo
      description: Destaca los beneficios de desarrollo de un producto, como el desarrollo
        del lenguaje o el crecimiento emocional y social.
    device_interface:
      name: Interfaz del dispositivo
      description: Especifica el método de conexión entre dispositivos electrónicos,
        como, por ejemplo, HDMI o USB.
    device_technology:
      name: Tecnología del dispositivo
      description: Describe el tipo de tecnología que utilizan las herramientas de
        bricolaje, como la digital o analógica.
    dexterity_skills:
      name: Habilidades de destreza
      description: Identifica las habilidades de destreza específicas requeridas para
        un juego, como el equilibrio o la precisión
    dial_color:
      name: Color del dial
      description: Especifica el color de la esfera de un reloj, como dorado o multicolor.
    dial_pattern:
      name: Patrón de marcación
      description: Describe el diseño o motivo en la esfera de un reloj, como con
        lunares o teñido anudado
    dialing_method:
      name: Método de marcación
      description: Define el mecanismo que utiliza el teléfono para ingresar números.
    diaper_bag_additional_features:
      name: Características adicionales de la bolsa de pañales
      description: Especifica características adicionales en bolsas de bebé, por ejemplo,
        cambiador incluido, soporte para botellas
    diaper_bag_material:
      name: Material de la bolsa de pañales
      description: Especifica el tipo de material del que está hecha una bolsa de
        pañales, como el cuero o la lona.
    diaper_bag_style:
      name: Estilo de la bolsa de pañales
      description: Describe el diseño o la forma de una bolsa de bebés, como una mochila
        o una bandolera
    diaper_features:
      name: Características de los pañales
      description: Describe las características especiales de los pañales, como a
        prueba de fugas o hipoalergénicos.
    diaper_kit_components:
      name: Componentes del kit de pañales
      description: Especifica los artículos incluidos en un kit de pañales, como toallitas
        húmedas o cambiador de pañales.
    diaper_organizer_features:
      name: Características del organizador de pañales
      description: Destaca las características únicas de los organizadores de pañales,
        como múltiples compartimentos o el forro impermeable.
    diaper_size:
      name: Tamaño de pañal
      description: Especifica el tamaño de los pañales, como para bebés o niños pequeños.
    diaper_type:
      name: Tipo de pañal
      description: Distingue entre ayudas para la incontinencia, como compresas, Pull-Ups
        o pañales.
    dice_shape:
      name: Forma de dados
      description: Describe la forma geométrica de un dado, como un cubo (6 lados)
        o icosaedro (20 lados).
    dielectric_type:
      name: Tipo de dieléctrico
      description: Especifica el material dieléctrico o aislante que se usa en los
        condensadores, como cerámicos o electrolíticos.
    dietary_preferences:
      name: Preferencias alimentarias
      description: Ayuda a identificar productos adecuados para dietas específicas,
        por ejemplo, veganas y sin frutos secos.
    dietary_supplements:
      name: Suplementos dietéticos
      description: Identifica los nutrientes agregados de un producto, como el calcio
        o los probióticos.
    dietary_use:
      name: Uso nutricional
      description: Clasifica productos según sus beneficios dietéticos, como, por
        ejemplo, desarrollo muscular o productos bajos en carbohidratos.
    difficulty_level:
      name: Nivel de dificultad
      description: Indica la complejidad o el nivel de desafío de un puzzle o juego,
        como fácil o experto.
    diffuser_design:
      name: Diseño del difusor
      description: Describe la estructura de un difusor de flash, como anular o de
        cúpula.
    digestive_supplement_type:
      name: Tipo de suplemento digestivo
      description: Clasifica el tipo específico de suplemento digestivo (p. ej., probiótico,
        enzima, fibra).
    digital_sound_processing:
      name: Procesamiento de sonido digital
      description: Especifica las técnicas de modificación de sonido de componentes
        de audio, como el retardo o la reverberación.
    digitizer_surface_finish:
      name: Acabado de superficie del digitalizador
      description: Describe el recubrimiento o acabado superficial del vidrio del
        digitalizador.
    din_size:
      name: Tamaño DIN
      description: Especifica el tamaño de apertura estandarizado del tablero en el
        que encaja el receptor (p. ej., DIN simple, DIN doble).
    dinnerware_pieces_included:
      name: Piezas de vajilla incluidas
      description: Define los componentes de una colección de vajilla, como platos
        llanos o cuencos para servir.
    direct_box_type:
      name: Tipo de caja directa
      description: Especifica la configuración del circuito de la caja directa (DI),
        que afecta los requisitos de energía, el carácter del sonido y la aplicación
        prevista.
    direction_detection_capability:
      name: Capacidad de detección de dirección
      description: Indica si el radar puede reportar la dirección del objeto (p. ej.,
        acercándose, alejándose o ambos).
    dirt_separating_method:
      name: Método de separación de suciedad
      description: Describe la técnica que usa una aspiradora para separar la suciedad,
        por ejemplo, la tecnología ciclónica o de filtración.
    discharge_type:
      name: Tipo de descarga
      description: Especifica el tipo de descarga de volquetes, como lateral o de
        transferencia.
    disk_format_type:
      name: Tipo de formato de disco
      description: Identifica el tipo de formato de disco para productos de software,
        como Blu-ray o CD.
    dispenser_type:
      name: Tipo de dispensador
      description: Especifica el formato de aplicación del producto, normalmente en
        salud y belleza, como, por ejemplo, mediante palillo o frasco.
    dispensing_operation_type:
      name: Tipo de operación de dispensación
      description: Describe si la pasta de dientes se dispensa manualmente, semiautomáticamente
        o automáticamente.
    display_board_features:
      name: Características de la placa de la pantalla
      description: Describe las características únicas de los paneles de exposición,
        como la cara autoadhesiva o la resistencia.
    display_color_mode:
      name: Modo de color de pantalla
      description: Especifica el color de visualización del producto, por ejemplo,
        en color o en blanco y negro.
    display_features:
      name: Características de la pantalla
      description: Describe el tipo de pantalla de un producto, como la pantalla táctil
        o con controles de botones.
    display_interface:
      name: Interfaz de pantalla
      description: Especifica la interfaz de video o datos utilizada por el módulo
        de pantalla.
    display_mode:
      name: Modo de visualización
      description: Describe el método de visualización de un producto, como digital
        o analógico.
    display_recommended_use:
      name: Uso recomendado de la pantalla
      description: Recomienda el uso ideal para ferias comerciales según el formato
        y el diseño, como comerciales o educativas.
    display_resolution:
      name: Resolución de pantalla
      description: Define la resolución de una pantalla digital, como, por ejemplo,
        1280 x 1024, Full HD.
    display_sign_design:
      name: Diseño de letreros de exhibición
      description: Identifica el tipo de información que transmite una señal, como
        un baño, venta o salida.
    display_technology:
      name: Tecnología de pantalla
      description: Define el tipo de tecnología de pantalla que se utiliza en un producto,
        como, por ejemplo, LED o E-ink.
    disposable/reusable_bag_features:
      name: Características de la bolsa desechable/reutilizable
      description: Describe las características clave de las bolsas para excrementos
        de mascotas, como biodegradables o a prueba de fugas.
    disposable/reusable_item_material:
      name: Material del artículo desechable/reutilizable
      description: Identifica si el material de un producto es desechable o reutilizable,
        como materiales biodegradables o papel.
    disposable_bag_features:
      name: Características de la bolsa desechable
      description: Destaca las características únicas de los recambios de los cubos
        de pañales, como el control de olores o los aromas perfumados.
    disposable_bag_material:
      name: Material de la bolsa desechable
      description: Especifica la composición de las bolsas desechables, por ejemplo,
        el plástico o los materiales biodegradables.
    disposable_glove_features:
      name: Características de los guantes desechables
      description: Identifica características especiales de los guantes desechables,
        como de puño largo o libre de polvo.
    disposable_tableware_material:
      name: Material de la vajilla desechable
      description: Identifica el material utilizado en la vajilla desechable, como
        el plástico o el papel.
    dive_computer_items_included:
      name: Artículos de ordenador de buceo incluidos
      description: Especifica qué elementos se incluyen con una computadora de buceo,
        como un transmisor o una correa
    diving/snorkeling_equipment_included:
      name: Equipo de buceo/esnórquel incluido
      description: Especifica los accesorios de buceo/esnórquel incluidos, como el
        traje de neopreno o esnórquel.
    diving_regulator_style:
      name: Estilo del regulador de buceo
      description: Especifica el estilo del regulador de buceo, como de diafragma
        o pistón desequilibrado.
    dj_equipment_features:
      name: Características del equipo de DJ
      description: Especifica las características únicas del equipo de DJ, como el
        control MIDI o el funcionamiento independiente.
    dj_software_compatibility:
      name: Compatibilidad del software de DJ
      description: Identifica el software de DJ con el que el producto es compatible,
        por ejemplo, Rekordbox, Serato DJ
    docking_compatibility:
      name: Compatibilidad con base
      description: Indica si la consola puede acoplarse o cargarse sin quitar la funda.
    docsis_standard:
      name: Estándar DOCSIS
      description: Especifica la versión de DOCSIS compatible con los módems de cable.
    dog_age_group:
      name: Grupo de edad del perro
      description: Ayuda a clasificar los productos para perros según la etapa de
        vida del perro, por ejemplo, cachorro o sénior.
    dog_diaper_size:
      name: Tamaño de pañal para perros
      description: Especifica el tamaño de los pañales para perros, por ejemplo, Extra
        grande (XL), Pequeño (S)
    dog_diaper_type:
      name: Tipo de pañal para perros
      description: Identifica el tipo específico de pañal para perros, por ejemplo,
        hembra adulta, cachorro
    dog_house_features:
      name: Características de la caseta para perros
      description: Describe las características especiales de una casa para perros,
        como las dimensiones ajustables o la protección UV.
    dog_kennel/run_features:
      name: Características de la perrera/pista para perros
      description: Resalta las características únicas de una perrera/caseta para perros,
        como, por ejemplo, resistente a la intemperie o portátil.
    dog_kennel_features:
      name: Características de la perrera
      description: Describe las características específicas de una perrera, como si
        se puede cerrar con llave o si es plegable.
    dog_pen_features:
      name: Características de la jaula para perros
      description: Describe las características especiales de las jaulas para perros,
        como la protección contra los rayos UV o la resistencia a la intemperie.
    dog_toy_type:
      name: Tipo de juguete para perros
      description: Clasifica el tipo de juguete para perros, como de felpa o chirriante
    doll/playset_features:
      name: Características de la muñeca/parque infantil
      description: Describe características especiales de las muñecas o conjuntos
        de juego, como las articulaciones o la cualidad de artículos coleccionables.
    doll_features:
      name: Características de la muñeca
      description: Describe características especiales de las muñecas, como las articulaciones
        o los detalles realistas.
    doll_type:
      name: Tipo de muñeca
      description: Identifica la categoría de una muñeca, como bebé o coleccionable
    door/frame_application:
      name: Aplicación de la puerta/marco
      description: Identifica dónde se utilizará el marco de la puerta, por ejemplo,
        interno o externo.
    door_application:
      name: Aplicación de la puerta
      description: Especifica la aplicación de las puertas o bisagras, como internas
        o externas.
    door_closer_application:
      name: Aplicación de cierrapuertas
      description: Especifica la aplicación de los cierrapuertas, como internos o
        externos.
    door_closer_design:
      name: Diseño de cierrapuertas
      description: Identifica el estilo de diseño de los cierrapuertas, como de suelo
        u ocultos en el techo.
    door_color:
      name: Color de la puerta
      description: Especifica el color de la puerta de un producto, como el rojo o
        el negro.
    door_frame_finish:
      name: Acabado del marco de la puerta
      description: Especifica el acabado de la superficie del marco de una puerta,
        como preacabado o listo para terminar.
    door_glass_finish:
      name: Acabado del cristal de la puerta
      description: Especifica el tipo de acabado del vidrio de las puertas, como emplomado
        o con patrón.
    door_insulation:
      name: Aislamiento de la puerta
      description: Especifica el estado de aislamiento de las puertas, por ejemplo,
        con aislamiento, sin aislamiento
    door_knob_function:
      name: Función de perilla de puerta
      description: Especifica la función de los pomos y picaportes de las puertas,
        como para permitir o impedir la entrada.
    door_mat_base_color:
      name: Color de la base de la alfombrilla de la puerta
      description: Identifica el color primario de la base de un felpudo, como beige
        o negro
    door_mat_base_material:
      name: Material de la base de la alfombrilla de la puerta
      description: Especifica el material de la parte inferior de una alfombrilla,
        como el yute o el látex.
    door_mat_base_pattern:
      name: Patrón de la base de la alfombrilla de la puerta
      description: Describe el diseño o motivo en la base de un felpudo, como floral
        o geométrico
    door_mat_surface_material:
      name: Material de la superficie de la puerta
      description: Especifica el material de la superficie de una alfombrilla, como
        el pasto marino o el caucho.
    door_material:
      name: Material de la puerta
      description: Especifica el material de fabricación de una puerta, como el vidrio
        templado o los tableros de fibra de densidad media (MDF).
    door_pattern:
      name: Patrón de la puerta
      description: Describe el diseño o motivo de una puerta, normalmente para bufés
        y aparadores
    door_stop_placement:
      name: Colocación del tope de puerta
      description: Identifica dónde se instala el tope de puerta, como en el suelo
        o la pared.
    door_stopper_design:
      name: Diseño de protector anti cierre de puerta
      description: Especifica el estilo de un tope de puerta, como en forma de gancho
        o cuña.
    door_suitable_location:
      name: Ubicación adecuada de la puerta
      description: Identifica la ubicación ideal de una puerta, como de entrada a
        la vivienda o de patio.
    door_surface_finish:
      name: Acabado de la superficie de la puerta
      description: Especifica el acabado de la superficie de las puertas de la casa,
        como acristaladas y sin acristalar.
    door_type:
      name: Tipo de puerta
      description: Especifica el mecanismo de apertura de las puertas, como, por ejemplo,
        con bisagras o correderas.
    double_stroller_configuration:
      name: Configuración de cochecito doble
      description: Define la disposición de los asientos de cochecitos dobles, como
        en tándem o uno al lado del otro.
    download_format:
      name: Formato de descarga
      description: Especifica el formato de archivo para descargas de música digital,
        como MP3 o WAV.
    downstream_port_types:
      name: Tipos de puertos downstream
      description: Enumera los tipos de puertos de salida que ofrece el hub para conectar
        periféricos (p. ej., USB-A, USB-C, HDMI, Ethernet).
    drain_location:
      name: Ubicación del drenaje
      description: Especifica la ubicación del drenaje de bañeras o duchas, como en
        el centro o la izquierda.
    drainage_feature:
      name: Característica de drenaje
      description: Especifica cualquier diseño que permita el drenaje de líquidos
        o secado dentro del estuche.
    drawing/painting_kit_items_included:
      name: Artículos del kit de dibujo/pintura incluidos
      description: Identifica los artículos que incluye un kit de manualidades, como
        un bloc para colorear o un vaso para pintura.
    dress_form_features:
      name: Características de la forma del vestido
      description: Destaca las características clave de una forma de vestido, como
        la superficie pinchable o la base giratoria.
    dress_occasion:
      name: Ocasión de vestir
      description: Especifica la ocasión prevista para un vestido, por ejemplo, vacaciones,
        diario
    dress_style:
      name: Estilo de vestir
      description: Identifica el diseño de un vestido, como cruzado o de cintura imperio
    drill_features:
      name: Características del taladro
      description: Identifica características especiales de un taladro, como la velocidad
        ajustable o la iluminación incorporada.
    drilling_method:
      name: Método de perforación
      description: Identifica la técnica utilizada en la herramienta de perforación,
        como rotativa o de percusión.
    drilling_rig_orientation:
      name: Orientación de la plataforma de perforación
      description: Identifica la dirección de perforación de un equipo, como horizontal
        o vertical.
    drinkware_material:
      name: Material de cristalería
      description: Especifica la composición de la vajilla, como el vidrio o el plástico.
    drinkware_pieces_included:
      name: Piezas de recipientes para bebidas incluidas
      description: Identifica la variedad de piezas de cristalería incluidas en un
        juego, como jarras o copas de vino.
    drinkware_shape:
      name: Forma de cristalería
      description: Define el contorno o silueta de un artículo de cristalería, por
        ejemplo, curvo o cónico.
    drive_form_factor:
      name: Factor de forma de la unidad
      description: Especifica la altura o clase de tamaño del mecanismo de la unidad
        (p. ej., altura completa, media altura, delgada).
    drive_size:
      name: Tamaño de la llave
      description: Describe el tamaño de las llaves de vaso y dinamométricas, como,
        por ejemplo, de 1 pulgada.
    drive_type:
      name: Tipo de tracción
      description: Identifica el tipo de sistema de tracción de vehículos o maquinaria
        pesada, como 2WD o 4WD.
    driver_configuration:
      name: Configuración de controladores
      description: Especifica el número de vías de controladores discretos en el sistema
        de altavoces (p. ej., 2 vías, 3 vías).
    driver_technology:
      name: Tecnología del controlador
      description: Especifica el tipo de transductor utilizado para producir sonido
        (p. ej., dinámico, armadura equilibrada, magnético plano, híbrido).
    drone_board_function:
      name: Función de la placa del dron
      description: Describe el propósito principal de la placa de circuito dentro
        del sistema del dron.
    drone_features:
      name: Características del dron
      description: Especifica las diversas características funcionales y de diseño
        disponibles en un dron, como la navegación GPS o la evasión de obstáculos
    drum_configuration:
      name: Configuración de tambores
      description: Se utiliza para indicar la configuración de un kit de batería,
        como de 7 piezas o paquete de cascos.
    drum_hardware_adjustability:
      name: Capacidad de ajuste del herraje para batería
      description: Detalla las características ajustables de los accesorios de baterías
        e instrumentos de percusión, por ejemplo, el ángulo ajustable del mazo.
    drum_hardware_material:
      name: Material del herraje para batería
      description: Identifica el material utilizado en los herrajes de la batería,
        como el acero o el aluminio.
    dry/wet_cleaning:
      name: Limpieza en seco/húmedo
      description: Especifica si los productos son aptos para la limpieza en seco
        o en húmedo.
    dry_bean_variety:
      name: Variedad de frijoles secos
      description: Identifica la variedad de legumbres secas utilizadas, por ejemplo,
        garbanzos o frijoles negros.
    dryer_features:
      name: Características del secador
      description: Especifica características únicas de una secadora de ropa, como
        la tecnología de autolimpieza o inverter.
    dryer_technology:
      name: Tecnología de secador
      description: Especifica la tecnología de secado de los sistemas de climatización,
        como, por ejemplo, desecantes o refrigerados.
    drying_method:
      name: Método de secado
      description: Especifica cómo el dispositivo seca los cepillos de dientes después
        de la esterilización, si corresponde.
    drying_speed:
      name: Velocidad de secado
      description: Define la velocidad a la que un producto se seca o fragua, como
        secado de rápido o normal.
    dsl_standard_compatibility:
      name: Compatibilidad con el estándar DSL
      description: Identifica qué estándares DSL admite un filtro o accesorio para
        garantizar la supresión de ruido y la calidad de conexión adecuadas.
    duct_design:
      name: Diseño del conducto
      description: Identifica la forma de los conductos de aire en sistemas HVAC,
        por ejemplo, rígidos, flexibles
    duct_shape:
      name: Forma del conducto
      description: Describe la forma de los conductos de aire en los sistemas de climatización,
        como redondos o planos.
    duplex_component_type:
      name: Tipo de componente dúplex
      description: Define la forma específica de la pieza dúplex suministrada (p.
        ej., conjunto, bandeja, engranaje).
    duplexer_installation_type:
      name: Tipo de instalación del duplexor
      description: Aclara cómo el duplexor se conecta a la impresora (p. ej., ranura
        interna, fijación externa trasera).
    duplexing_technology:
      name: Tecnología de impresión dúplex
      description: Especifica si una impresora admite la impresión a doble cara, por
        ejemplo, no compatible o impresión dúplex automática.
    duplication_operation_mode:
      name: Modo de operación de duplicación
      description: Indica si el duplicador funciona de forma independiente, requiere
        conexión a una computadora, o soporta ambos modos.
    durability_features:
      name: Características de durabilidad
      description: Destaca la capacidad de un producto para resistir diversas condiciones,
        por ejemplo, el óxido o los golpes.
    dust_container_type:
      name: Tipo de recipiente para polvo
      description: Especifica el tipo de sistema de recolección de polvo de aspiradoras
        y electrodomésticos, como, por ejemplo, los sistemas sin bolsa o con bolsa.
    dust_mask_type:
      name: Tipo de máscara antipolvo
      description: Especifica el factor de forma de las máscaras antipolvo, como de
        copa o planas.
    dvi_connection_type:
      name: Tipo de conexión DVI
      description: Identifica el conector DVI específico y formato de enlace soportado
        (p. ej., DVI-D enlace simple, DVI-I enlace dual, Mini-DVI).
    dye_form:
      name: Forma de tinte
      description: Describe el estado físico de los tintes para manualidades, como
        en gel o polvo.
    dynamic_level:
      name: Nivel dinámico
      description: Clasifica las pelotas de ráquetbol y squash según la velocidad
        y el rebote, como de punto verde o rojo.
    dynamics_processing_function:
      name: Función de procesamiento dinámico
      description: Identifica las tareas principales de dinámica que realiza la unidad
        (p. ej., compresor, limitador, puerta de ruido, de-esser).
    e_book_formats_supported:
      name: Formatos de libros electrónicos compatibles
      description: Identifica la gama de formatos de libros electrónicos compatibles
        con el dispositivo, como PDF o EPUB.
    e_book_reader_part_location:
      name: Ubicación de la pieza del lector de libros electrónicos
      description: Especifica dónde en el dispositivo se instala o ubica la pieza.
    e_cigarette/vaporizer_style:
      name: Estilo de cigarrillo electrónico/vaporizador
      description: Clasifica los cigarrillos electrónicos y vaporizadores según su
        factor de forma, por ejemplo, desechables o de tipo bolígrafo.
    e_liquid_flavor:
      name: Sabor de líquido electrónico
      description: Especifica el sabor de los líquidos para atomizadores y cigarrillos
        electrónicos, por ejemplo, café o fresa.
    e_liquid_variety:
      name: Variedad de líquido electrónico
      description: Distingue entre diferentes opciones de líquido para cigarrillos
        electrónicos, por ejemplo, llenado corto, o Nicotine Shot.
    e_reader_display_technology:
      name: Tecnología de pantalla del libro electrónico
      description: Identifica el tipo de tecnología de pantalla que utilizan los libros
        electrónicos, como LCD o la tinta electrónica.
    ear_care_application_method:
      name: Método de aplicación del producto de cuidado de los oídos
      description: Especifica el método de aplicación de artículos para el cuidado
        del oído, como boquillas o goteros.
    ear_dryer_technology:
      name: Tecnología del secador de oídos
      description: Identifica el mecanismo de secado principal utilizado por el producto.
    ear_orientation:
      name: Orientación del auricular
      description: Especifica si el auricular está diseñado para el oído izquierdo,
        derecho o se puede usar en cualquiera.
    ear_pick_tip_style:
      name: Estilo de punta del limpiador de oídos
      description: Define la forma o diseño de la punta de trabajo que elimina el
        cerumen.
    ear_side:
      name: Lado del oído
      description: Especifica si el dispositivo está destinado para el oído izquierdo,
        oído derecho o para uso como par bilateral.
    ear_tip_size:
      name: Tamaño de la almohadilla auricular
      description: Proporciona la etiqueta de tamaño genérico comúnmente utilizada
        para almohadillas intrauriculares cuando no se proporcionan tamaños exactos
        en milímetros.
    ear_tip_style:
      name: Estilo de almohadilla auricular
      description: Define la forma geométrica de la almohadilla auricular que influye
        en el ajuste y el sellado acústico.
    earphone_features:
      name: Características de los auriculares
      description: Destaca características únicas de los auriculares, como el micrófono
        integrado o el control de volumen.
    earplug_cord_style:
      name: Estilo de cordón del tapón para los oídos
      description: Indica si los tapones para los oídos están conectados con un cordón,
        lo que ayuda a prevenir pérdidas y facilita la extracción.
    earplug_shape:
      name: Forma del tapón para los oídos
      description: Describe el perfil físico del tapón para los oídos, afectando la
        comodidad y el ajuste dentro de diferentes canales auditivos.
    earplug_type:
      name: Tipo de tapón para los oídos
      description: Clasifica el estilo de construcción de los tapones dispensados
        (p. ej., espuma, moldeados, filtrados).
    earplug_use:
      name: Uso de tapones para los oídos
      description: Define la actividad o el propósito específicos de los tapones para
        los oídos, como nadar o dormir.
    earring_design:
      name: Diseño de aretes
      description: Describe el estilo o la estructura de los pendientes, como aros
        o pernos
    edge_style:
      name: Estilo de borde
      description: Especifica la forma de los bordes de artículos como las encimeras,
        como, por ejemplo, de canto rodado o suavizados.
    edge_type:
      name: Tipo de borde
      description: Identifica el estilo del borde de las herramientas o utensilios,
        como microdentado o con muescas.
    education_level:
      name: Nivel de educación
      description: Especifica la etapa educativa para la que está diseñado el software,
        como la escuela primaria o secundaria.
    effects_processor_form_factor:
      name: Factor de forma del procesador de efectos
      description: Describe el formato físico o de entrega del procesador.
    egg_decorating_items_included:
      name: Artículos para decoración de huevos incluidos.
      description: Especifica los accesorios incluidos en los kits de decoración de
        huevos, como, por ejemplo, tabletas de tinte o canastitas para huevos.
    egg_turning:
      name: Giro de huevos
      description: Describe el método de rotación de huevos en incubadoras, como automático
        o manual
    electric_scooter_motor_type:
      name: Tipo de motor de scooter eléctrico
      description: Especifica el tipo y la configuración de los motores del scooter,
        como CC con escobillas o CC sin escobillas
    electrode_connector_type:
      name: Tipo de conector de electrodo
      description: Describe la interfaz física utilizada para conectar electrodos
        o almohadillas.
    electronic_drum_components:
      name: Componentes de batería electrónica
      description: Especifica los elementos de una batería electrónica, como un módulo
        de batería o almohadillas de batería.
    electronic_game_genre:
      name: Género de juegos electrónicos
      description: Identifica la categoría de un juego electrónico, como fitness o
        puzzle.
    electrotherapy_modality:
      name: Modalidad de electroterapia
      description: Especifica los tipos de tecnologías de estimulación que soporta
        el dispositivo (p. ej., TENS, EMS, IFC).
    embellishment/trim_material:
      name: Material de adorno/recorte
      description: Identifica el material utilizado para los detalles o acabados decorativos,
        como las lentejuelas o perlas.
    embellishments:
      name: Adornos
      description: Identifica los elementos decorativos que se añaden a un producto,
        como las lentejuelas o los botones.
    embossing_project_type:
      name: Tipo de proyecto de estampado
      description: Identifica el tipo de estampado, como los álbumes de recortes o
        la elaboración de tarjetas.
    embouchure_hole_shape:
      name: Forma del agujero de la embocadura
      description: Describe la forma del agujero de la cabeza de flauta, como redonda
        u ovalada.
    emergency/safety_sign_design:
      name: Diseño de señales de emergencia/seguridad
      description: Identifica el tipo de mensaje de seguridad o emergencia de una
        señal, como la salida de incendios o la presencia de un perro guardián.
    emergency_items_included:
      name: Artículos de emergencia incluidos
      description: Especifica los artículos incluidos en los kits de emergencia, como
        radios o pilas.
    enclosure_type:
      name: Tipo de carcasa
      description: Especifica el tipo de carcasa o cubierta para impresoras 3D, como
        de marco abierto o caja de bricolaje.
    end_design:
      name: Diseño del extremo
      description: Especifica el número de extremos funcionales y si son reemplazables
        o intercambiables.
    enema_device_type:
      name: Tipo de dispositivo de enema
      description: Clasifica el diseño principal o sistema de entrega del producto.
    enema_nozzle_type:
      name: Tipo de boquilla de enema
      description: Especifica el estilo o material de la boquilla o punta suministrada
        con el kit (p. ej., punta delgada, punta pediátrica, boquilla de acero inoxidable).
    energy_efficiency_class:
      name: Clase de eficiencia energética
      description: Define la calificación de eficiencia energética de un producto,
        por ejemplo, A+++.
    energy_efficiency_class_hdr:
      name: Clase de eficiencia energética (HDR)
      description: Especifica la eficiencia energética de los dispositivos compatibles
        con HDR, normalmente televisores, como, por ejemplo, A+++.
    energy_efficiency_class_sdr:
      name: Clase de eficiencia energética (SDR)
      description: Especifica la eficiencia energética de los dispositivos compatibles
        con SDR, normalmente televisores, como, por ejemplo, A+++.
    engine_design:
      name: Diseño del motor
      description: Describe la configuración del motor de un vehículo, por ejemplo,
        de 2 tiempos.
    engine_purpose:
      name: Propósito del motor
      description: Identifica el uso previsto de un motor pequeño, como para cortadora
        de césped o motosierra.
    engine_type:
      name: Tipo de motor
      description: Identifica el tipo de motor de un vehículo o pieza, como eléctrico
        o diésel.
    engraving:
      name: Grabado
      description: Detalla el tipo de grabado de un producto, como texto personalizado
        o grabado de logotipo.
    entry_orientation:
      name: Orientación de entrada
      description: Describe la dirección en que se insertan las monedas en el mecanismo
        (p. ej., frontal, superior, lateral, inferior).
    envelope_features:
      name: Características del sobre
      description: Describe características especiales de los sobres, como con cierre
        de broche o forrado.
    envelope_seal_design:
      name: Diseño de sello de sobre
      description: Describe la estética o el estilo de los sellos de los sobres, como
        florales o monogramas.
    equalizer_type:
      name: Tipo de ecualizador
      description: Clasifica la topología de ecualización o el estilo de procesamiento
        proporcionado por la unidad.
    equipment_operation:
      name: Operación del equipo
      description: Describe cómo funciona un equipo médico, como manual o motorizado.
    era:
      name: Era
      description: Se utiliza para clasificar objetos de colección o antigüedades
        por el período al que pertenecen, como el Oeste o la Segunda Guerra Mundial.
    error_correction_type:
      name: Tipo de corrección de errores
      description: Indica si el módulo de memoria incluye capacidad de corrección
        de errores y, de ser así, la tecnología ECC específica o estilo de búfer utilizado.
    esrb_rating:
      name: Clasificación ESRB
      description: Identifica la idoneidad de los videojuegos según la edad, como
        E (todos) o T (adolescente).
    ethernet_cable_category:
      name: Categoría del cable Ethernet
      description: Indica la clasificación de categoría TIA/EIA de cables Ethernet
        de par trenzado, definiendo ancho de banda y rendimiento.
    ethernet_lan_interface_type:
      name: Tipo de interfaz LAN Ethernet
      description: Especifica el tipo de conexión Ethernet que admite un producto,
        como LAN o rápida.
    ev_battery_features:
      name: Características de la batería del vehículo eléctrico
      description: Destaca las características de las baterías de vehículos eléctricos,
        como el ciclo de vida prolongado o el sistema de gestión inteligente de la
        batería.
    ev_battery_type:
      name: Tipo de batería EV
      description: Identifica el tipo de batería que se utilizan en los vehículos
        eléctricos, como las de iones de litio o ácido de plomo.
    ev_connector/adapter_type:
      name: Tipo de conector/adaptador EV
      description: Identifica el tipo de conector o adaptador para vehículos eléctricos,
        como CCS o Tesla.
    ev_conversion_kit_components:
      name: Componentes del kit de conversión EV
      description: Identifica las piezas que incluye un kit de conversión de vehículo
        eléctrico, como el motor o la batería.
    evaporation_technology:
      name: Tecnología de evaporación
      description: Define el sistema de evaporación que se usa en los dispositivos
        de control climático, como el natural o el ultrasónico.
    event_type:
      name: Tipo de evento
      description: Clasifica la naturaleza de un evento, como un concierto, seminario
        o festival.
    exercise_equipment_included:
      name: Equipo de ejercicio incluido
      description: Identifica los artículos de ejercicio específicos que se incluyen
        en un conjunto, como una estera de yoga o unas mancuernas.
    exercise_equipment_material:
      name: Material del equipo de ejercicio
      description: Identifica el material principal utilizado en los equipos de fitness,
        como el acero o el caucho.
    exercise_machine_board_function:
      name: Función de la placa de la máquina de ejercicio
      description: Describe la función principal o ubicación de la placa dentro de
        la máquina (p. ej., control del motor, pantalla).
    exercise_machine_features:
      name: Características de la máquina de ejercicio
      description: Describe las características especiales del equipo de ejercicio,
        como la velocidad ajustable o la pantalla incorporada.
    exercise_mat_material:
      name: Material de la colchoneta de ejercicio
      description: Especifica el tipo de material utilizado en las colchonetas de
        ejercicio, como el PVC o el corcho.
    exfoliating_agent_type:
      name: Tipo de agente exfoliante
      description: Identifica el principal exfoliante abrasivo o químico utilizado.
    exfoliation_level:
      name: Nivel de exfoliación
      description: Indica qué tan suave o firme es la acción exfoliante de la esponja.
    exfoliation_method:
      name: Método de exfoliación
      description: Indica si y cómo el limpiador exfolia la piel (p. ej., físico,
        químico, enzimático).
    expansion_slots:
      name: Ranuras de expansión
      description: Especifica las ranuras para agregar hardware en equipos informáticos
        o servidores, por ejemplo, PCIe o M.2.
    exposure_control:
      name: Control de exposición
      description: Define el método para ajustar la cantidad de luz de una fotografía,
        por ejemplo, la prioridad de obturación o de apertura.
    extended_saxophone_range:
      name: Rango extendido de saxofón
      description: 'Especifica el rango de notas extendido de un saxofón, como la
        tecla Fa # en un saxofón alto o la tecla La bemol en uno bajo.'
    external_antenna_connector_type:
      name: Tipo de conector de antena externa
      description: Define el conector físico utilizado para conectar antenas externas.
    external_defibrillator_features:
      name: Características del desfibrilador externo
      description: Destaca las características clave de los desfibriladores médicos,
        como la función pediátrica o el ECG en pantalla.
    extinguisher_rating:
      name: Clasificación del extintor
      description: Indica la clasificación de los extintores de incendios, como, por
        ejemplo, de Clase A o Clase B.
    extinguishing_agent_type:
      name: Tipo de agente extintor
      description: Especifica el tipo de sustancia extintora de los productos de seguridad
        contra incendios, como el agua o la espuma.
    extraction_method:
      name: Método de extracción
      description: Identifica la técnica utilizada para extraer cannabinoides del
        material de la planta de cáñamo.
    extraction_technology:
      name: Tecnología de extracción
      description: Describe el mecanismo principal que utiliza el producto para extraer
        impurezas.
    extraction_type:
      name: Tipo de extracción
      description: Especifica el método de extracción de aire de las campanas extractoras,
        como las sin ductos o las convertibles.
    extractor_items_included:
      name: Artículos extractores incluidos
      description: Enumera las diferentes herramientas o accesorios extractores incluidos
        en un conjunto.
    extractor_tip_style:
      name: Estilo de punta de extractor
      description: Define el diseño de la punta en herramientas de extracción, como,
        por ejemplo, la cuchara o la aguja.
    eye_care_applicator_type:
      name: Tipo de aplicador para el cuidado de ojos
      description: Define el estilo de aplicador incorporado o punta dispensadora
        proporcionada con el producto de tratamiento ocular.
    eye_condition_treated:
      name: Condición ocular tratada
      description: Indica el problema ocular principal que el producto está formulado
        para aliviar o tratar.
    eye_pillow_shape:
      name: Forma de almohada para los ojos
      description: Define la forma física de una almohadilla para los ojos, como contorneada
        o rectangular.
    eye_shadow_effect:
      name: Efecto de sombra de ojos
      description: Define el impacto visual de la sombra de ojos, por ejemplo, ahumada
        o con purpurina.
    eye_shadow_palette_size:
      name: Tamaño de paleta de sombra de ojos
      description: Clasifica productos por formatos de paleta comunes para navegación
        rápida.
    eyebrow_applicator_type:
      name: Tipo de aplicador de cejas
      description: Describe el aplicador o punta utilizada para aplicar el producto
        de cejas.
    eyebrow_enhancer_color:
      name: Color del lápiz para cejas
      description: Especifica el color de los productos para realzar las cejas, como
        negro o rubio claro
    eyebrow_stencil_shape:
      name: Forma de plantilla de cejas
      description: Describe la forma principal de cejas o estilo de arco que la plantilla
        está destinada a crear.
    eyelash_applicator_design:
      name: Diseño de aplicador de pestañas
      description: Define el estilo de los aplicadores para pestañas postizas, por
        ejemplo, rectos o curvos.
    eyelash_curl_type:
      name: Tipo de rizo de pestañas
      description: Especifica la clasificación de curvatura (p. ej., rizo-C, rizo-D)
        de las fibras de las pestañas.
    eyelash_curler_type:
      name: Tipo de rizador de pestañas
      description: Especifica el diseño o mecanismo del rizador de pestañas.
    eyelash_material:
      name: Material de las pestañas
      description: Identifica el tipo de material utilizado en las pestañas postizas,
        como la seda o el material sintético.
    eyelash_remover_formulation:
      name: Formulación del removedor de pestañas
      description: Identifica el tipo de fórmula principal del removedor.
    eyelash_style:
      name: Estilo de pestañas
      description: Describe el efecto visual general o diseño del conjunto de pestañas
        (p. ej., natural, ojo de gato, dramático).
    eyelash_type:
      name: Tipo de pestañas
      description: Especifica el tipo de pestañas postizas, por ejemplo, pestaña en
        tira, extensión
    eyepiece/adapter_material:
      name: Material de los adaptadores oculares
      description: Identifica el material utilizado en los adaptadores u oculares
        del microscopio, como el vidrio o el metal.
    eyewear_compatibility:
      name: Compatibilidad con gafas
      description: Indica el tipo de gafas para las que está destinada la correa.
    eyewear_frame_color:
      name: Color de la montura de las gafas
      description: Identifica el color del marco de las gafas, como negro o azul
    eyewear_frame_design:
      name: Diseño de la montura de las gafas
      description: Describe el estilo de las gafas de sol, como las de aviador u ojo
        de gato
    eyewear_frame_material:
      name: Material de la montura de las gafas
      description: Especifica el tipo de material utilizado para las monturas de las
        gafas, como el bambú o fibra de carbono.
    eyewear_frame_pattern:
      name: Patrón de la montura de las gafas
      description: Identifica el patrón en las monturas de gafas, por ejemplo, a rayas
        o a cuadros
    eyewear_frame_shape:
      name: Forma de la montura de las gafas
      description: Describe la forma de las gafas, como redondas o cuadradas
    eyewear_hinge_type:
      name: Tipo de bisagra de gafas
      description: Describe el mecanismo de bisagra utilizado en las varillas, influyendo
        en la durabilidad y flexibilidad.
    eyewear_lens_color:
      name: Color de los cristales de las gafas
      description: Identifica el color de la lente de las gafas, como transparente
        o naranja
    eyewear_lens_material:
      name: Material de los cristales de las gafas
      description: Especifica el tipo de material utilizado para los cristales de
        las gafas, por ejemplo, el plástico de alto índice o el cristal.
    eyewear_lens_pattern:
      name: Patrón de los cristales de las gafas
      description: Describe el diseño o la impresión en los lentes de las gafas, como
        corazones o cachemir
    eyewear_strap_features:
      name: Características de la correa para gafas
      description: Destaca características funcionales notables de la correa o cadena
        (p. ej., flotante, reflectante, liberación rápida).
    eyewear_strap_or_chain_style:
      name: Estilo de correa o cadena para gafas
      description: Especifica el estilo de construcción principal o factor de forma
        de la correa o cadena para gafas (p. ej., cordón de cuerda, cadena de eslabones
        metálicos, correa de neopreno).
    fabric:
      name: Tejido
      description: Identifica el tipo de tejido utilizado en un producto, por ejemplo,
        el algodón o la lona.
    fabric_structure:
      name: Estructura del tejido
      description: Indica la composición estructural del tejido, como tejido o no
        tejido.
    face_area:
      name: Área de la cara
      description: Especifica la zona del rostro a la que está destinado un producto
        de cuidado de la piel, como los ojos o el cuello.
    face_powder_color:
      name: Color de los polvos faciales
      description: Especifica el tono del polvo facial, como oro rosa o marrón oscuro
    face_powder_type:
      name: Tipo de polvo facial
      description: Identifica el tipo de polvo facial, como acabado o suelto
    faceplate_design:
      name: Diseño de la placa frontal
      description: Identifica el tipo de placa frontal en la electrónica del vehículo,
        como desmontable o fija
    facial_cleansing_kit_items_included:
      name: Artículos incluidos en el kit de limpieza facial
      description: Enumera los productos o herramientas específicos contenidos en
        el kit de limpieza facial (p. ej., limpiador, tónico, suero, cepillo, bolsa
        de viaje).
    facial_steamer_features:
      name: Características del vaporizador facial
      description: Enumera funcionalidades incorporadas clave que mejoran el tratamiento
        de vapor.
    facility_sign_design:
      name: Diseño de letreros de instalaciones
      description: Describe el área o habitación específica para la que está destinada
        la señal, como la cocina o la oficina.
    fader_type:
      name: Tipo de fader
      description: Identifica el estilo físico de los faders de canal en el mezclador.
    false_eyelash_adhesive_formulation:
      name: Formulación del adhesivo para pestañas postizas
      description: Especifica la formulación química principal del pegamento.
    false_nail_adhesive_type:
      name: Tipo de adhesivo para uñas postizas
      description: Identifica el tipo de opción adhesiva suministrada o requerida
        para las uñas (p. ej., pegamento, adhesivos, ambos, ninguno).
    false_nail_application_method:
      name: Método de aplicación de uñas postizas
      description: Identifica cómo se aplican las uñas postizas, como las de pegamento
        o presión
    fastener_finish:
      name: Acabado del sujetador
      description: Describe el revestimiento de la superficie de un accesorio de ferretería,
        como el latón o el cromo.
    fastener_material:
      name: Material de sujeción
      description: Especifica el tipo de material utilizado en los elementos de fijación,
        por ejemplo, el latón o el acero inoxidable.
    fastener_type:
      name: Tipo de sujetador
      description: Identifica el tipo de mecanismo de sujeción utilizado, como el
        magnético.
    fat_content:
      name: Contenido en grasas
      description: Especifica la cantidad de grasa de alimentos y bebidas, por ejemplo,
        producto graso o bajo en grasa.
    faucet_thread:
      name: Rosca del grifo
      description: Especifica el tipo de conexión de rosca del grifo, como doble o
        hembra.
    features:
      name: Características
      description: Describe cualidades o características adicionales de un producto,
        como el bajo peso o el plegado.
    feed_system:
      name: Sistema de alimentación
      description: Describe cómo se introduce el papel en un dispositivo, como de
        forma automática o manual.
    feet_type:
      name: Tipo de pies
      description: Especifica el tipo de pies de los accesorios electrónicos, normalmente
        de palos para selfies, como, por ejemplo, retráctil.
    felt_tip_design:
      name: Diseño de la punta del rotulador
      description: Describe el grosor de la punta de fieltro del bolígrafo, como medio
        o fino.
    feminine_sanitary_supply_features:
      name: Características de los productos de higiene femenina
      description: Describe características específicas de productos de higiene femenina,
        como, por ejemplo, el diseño transpirable o la absorción rápida.
    fencing_components:
      name: Componentes de cercado
      description: Identifica partes de un sistema de cercado, como un riel o panel.
    fertility_metrics_measured:
      name: Métricas de fertilidad medidas
      description: Enumera las métricas o parámetros biológicos que el producto proporciona
        al usuario.
    fiber_art_project_type:
      name: Tipo de proyecto de arte en fibra.
      description: Categoriza las manualidades con fibras textiles, como el bordado
        o el macramé.
    fiber_optic_mode:
      name: Modo de fibra óptica
      description: Especifica si un accesorio de fibra está diseñado para fibra óptica
        monomodo o multimodo.
    field_flatness:
      name: Planitud del campo
      description: Indica la planitud del campo en lentes de microscopio, por ejemplo,
        superplano, semiplano
    filament_type:
      name: Tipo de filamento
      description: Identifica el tipo de filamento utilizado en la impresión 3D, como
        resina o apto para alimentos
    file_format_type:
      name: Tipo de formato de archivo
      description: Especifica el formato de los archivos digitales, por ejemplo, GIF
        o PDF.
    file_shape:
      name: Forma de la lima
      description: Describe la forma de las limas para pies, como contorneadas u ovaladas.
    filler_material:
      name: Material de relleno
      description: Identifica el tipo de material que se usa para rellenar un producto,
        normalmente almohadas o cojines, como, por ejemplo, espuma con memoria o plumas.
    filler_support:
      name: Compatibilidad del relleno
      description: Especifica el nivel de firmeza o el estilo del interior de una
        almohada, como la espuma con memoria o la espuma suave.
    filler_type:
      name: Tipo de relleno
      description: Especifica el tipo de relleno utilizado en el mantenimiento de
        vehículos, como la fibra de vidrio o el material ligero.
    filling/padding_project_type:
      name: Tipo de proyecto de relleno/acolchado
      description: Especifica el uso previsto del material de relleno o acolchado,
        por ejemplo, la fabricación de juguetes de peluche.
    film_application_method:
      name: Método de aplicación de la película
      description: Especifica cómo se aplican las películas para ventanas, como, por
        ejemplo, mediante adhesivo estático o autoadhesivo.
    film_format:
      name: Formato de película
      description: Especifica el tipo de película fotográfica que se usa en cámaras,
        como de 35 mm o Instax mini.
    film_type:
      name: Tipo de película
      description: Identifica el tamaño y formato de la película fotográfica que se
        usa en las cámaras, como de 35 mm o 120 mm.
    filter_form_factor:
      name: Factor de forma del filtro
      description: Describe el estilo físico de la unidad de filtro para verificaciones
        de compatibilidad (p. ej., cartucho, filtro de ventilador, cápsula, disco,
        conjunto de filtros).
    filter_installation_type:
      name: Tipo de instalación del filtro
      description: Especifica el estilo físico y el método de instalación del filtro
        DSL.
    filter_material:
      name: Material del filtro
      description: Especifica el tipo de material utilizado en los filtros, normalmente
        para café, como, por ejemplo, el papel o el cáñamo.
    filter_slope:
      name: Pendiente del filtro
      description: Especifica la tasa de atenuación de los filtros del crossover,
        expresada en dB por octava.
    filter_topology:
      name: Topología del filtro
      description: Especifica la familia de respuesta del filtro, que determina la
        forma de la respuesta de frecuencia y las características de fase.
    filter_type:
      name: Tipo de filtro
      description: Distingue entre filtros, típicamente para acuarios, como, por ejemplo,
        mecánico o químico.
    filtering_modes:
      name: Modos de filtrado
      description: Define los modos operativos de los radares o detectores de velocidad,
        por ejemplo, modo autopista, bloqueos de GPS.
    filtration_class:
      name: Clase de filtración
      description: Clasifica el nivel de filtrado de los accesorios de los respiradores,
        como FFP1 o B3.
    filtration_technology:
      name: Tecnología de filtración
      description: Identifica la tecnología o etapa utilizada por el filtro para eliminar
        contaminantes en el aire producidos durante la impresión.
    fin_material:
      name: Material de la aleta
      description: Especifica el tipo de material de las aletas de buceo o esnórquel,
        como el plástico o el caucho.
    fin_pocket_type:
      name: Tipo de bolsillo de aleta
      description: Especifica el diseño del escarpín de las aletas de buceo, como,
        por ejemplo, de pie completo talón abierto.
    fin_profile:
      name: Perfil de aleta
      description: Clasifica la tabla de surf según la configuración de las aletas,
        como, por ejemplo, de cinco aletas o de dos.
    fingerboard_color:
      name: Color del diapasón
      description: Especifica el color del diapasón en instrumentos de cuerda, por
        ejemplo, plateado, blanco
    fingerboard_material:
      name: Material del diapasón
      description: Especifica el tipo de material utilizado para el diapasón de las
        guitarras, como la madera de ébano o el material sintético.
    fingerboard_pattern:
      name: Patrón del diapasón
      description: Describe el diseño o motivo en el diapasón de una guitarra, como
        floral o geométrico
    fingerprint_capture_method:
      name: Método de captura de huellas dactilares
      description: Define el tipo de método de detección de huellas dactilares utilizado,
        como capacitivo u óptico.
    finial_shape:
      name: Forma final
      description: Define el diseño o la forma de un remate decorativo, como una bellota
        o una bola.
    finish:
      name: Acabado
      description: Describe la calidad de la superficie de un producto, como el acabado
        satinado o mate.
    fire_extinguisher_items_included:
      name: Artículos de extintores incluidos
      description: Especifica los artículos adicionales incluidos con un extintor
        de incendios, como una manguera de descarga o un soporte de montaje
    firewire_standard:
      name: Estándar FireWire
      description: Identifica la especificación IEEE 1394 que soporta el cable, que
        determina la velocidad máxima y la compatibilidad del dispositivo.
    firmness:
      name: Firmeza
      description: Define el nivel de firmeza de artículos como el mobiliario o los
        colchones, como, por ejemplo, extrasuave o firme.
    first_aid_container_type:
      name: Tipo de contenedor de primeros auxilios
      description: Define el estilo principal de contenedor o estuche suministrado
        con el kit.
    first_aid_kit_compliance_standard:
      name: Estándar de cumplimiento del kit de primeros auxilios
      description: Especifica cualquier estándar formal o regulación que cumple el
        kit.
    first_aid_kit_components:
      name: Componentes del botiquín de primeros auxilios
      description: Detalla el contenido de los botiquines de primeros auxilios, como,
        por ejemplo, vendas o tijeras.
    first_aid_kit_usage:
      name: Uso del botiquín de primeros auxilios
      description: Especifica el uso previsto de kits de primeros auxilios, por ejemplo,
        viajes o deportes.
    first_steps/crawlers_style:
      name: Estilo de primeros pasos/gateadores
      description: Especifica el tipo de calzado para bebés que aprenden a caminar
        o gatear, por ejemplo, preandantes, zapatos de suela blanda
    fish_type:
      name: Tipo de pez
      description: Ayuda a emparejar con especies de peces específicas, como las de
        agua tropical o fría.
    fishing_rod_action:
      name: Acción de la caña de pescar
      description: Indica la capacidad de respuesta de una caña de pescar, como, por
        ejemplo, lenta o muy rápida.
    fishing_rod_power:
      name: Potencia de la caña de pescar
      description: Indica la fuerza de la caña de pescar, como, por ejemplo, ultraligera
        o muy pesada.
    fishing_wire_material:
      name: Material del hilo de pesca
      description: Identifica la composición del hilo de pesca, como el nailon o el
        acero inoxidable.
    fit:
      name: Encaje
      description: Describe el ajuste de una prenda, normalmente la forma del pantalón,
        como, por ejemplo, de pitillo o pierna ancha.
    fit_type:
      name: Tipo de ajuste
      description: Describe el tipo de ajuste para piezas y accesorios de vehículos,
        como personalizados o universales.
    fixation_type:
      name: Tipo de fijación
      description: Define el mecanismo de fijación, normalmente de soportes para árboles
        de Navidad, como, por ejemplo, pincho de fijación o tornillo de fijación.
    flag_shape:
      name: Forma de la bandera
      description: Define la forma geométrica de banderas y mangas de viento, como
        de lágrima o banderín.
    flammability_rating_ul_94:
      name: Clasificación de inflamabilidad (UL 94)
      description: Indica la clasificación retardante de llama UL 94 del material
        de la funda.
    flare_type:
      name: Tipo de baliza
      description: Identifica el tipo de balizas de emergencia de carretera, como
        LED o tradicionales.
    flash_card_theme:
      name: Tema de la tarjeta flash
      description: Especifica el tema de aprendizaje de las tarjetas didácticas, como
        el alfabeto o los números
    flash_cell_type:
      name: Tipo de celda flash
      description: Identifica el número de bits almacenados por celda flash dentro
        de la arquitectura de memoria (p. ej., SLC, MLC, TLC).
    flash_modes:
      name: Modos de flash
      description: Identifica las diferentes configuraciones de flash de una cámara,
        como automática o manual.
    flash_type:
      name: Tipo de flash
      description: Identifica el tipo de flash utilizado en las cámaras, como anular
        o macro.
    flashing_material:
      name: Material tapajuntas
      description: Identifica el material utilizado en los cubrejuntas de techos,
        como el plástico o el cobre.
    flat_shoe_style:
      name: Estilo de zapato plano
      description: Identifica el diseño específico de calzados planos, como de ballet
        o alpargatas
    flatware_material:
      name: Material de la cubertería
      description: Identifica la composición de los cubiertos, como el acero inoxidable
        o la plata.
    flatware_pieces_included:
      name: Piezas de cubiertos de mesa incluidas
      description: Especifica los tipos de utensilios que se incluyen en una cubertería,
        como el cuchillo para mantequilla o las cucharas soperas.
    flavor:
      name: Sabor
      description: Especifica el sabor o la nota de un producto, por ejemplo, vainilla
        o menta.
    flavor_profile:
      name: Perfil de sabor
      description: Identifica las notas de sabor específicas de los artículos, normalmente
        para elaboración de cerveza, como, por ejemplo, el caramelo o la nuez.
    flexibility_rating:
      name: Clasificación de flexibilidad
      description: Indica el nivel de flexibilidad de las fijaciones de snowboard
        o raquetas de nieve, como, por ejemplo, 4.
    floor_configuration:
      name: Configuración del piso
      description: Indica si la tienda incluye un piso y, de ser así, el tipo de piso
        proporcionado.
    floral_wire_design:
      name: Diseño de alambre de floristería
      description: Describe el tipo de alambre floral utilizado en las manualidades,
        como alambre de amarre o alambre cubierto de tela
    flour/grain_type:
      name: Tipo de harina o grano
      description: Especifica el tipo de grano o harina de un producto, por ejemplo,
        el maíz o el trigo.
    flow_rate_type:
      name: Tipo de tasa de flujo
      description: Define la velocidad a la que se dispensa el líquido, normalmente
        en biberones, como, por ejemplo, media o lenta.
    flower_color:
      name: Color de la flor
      description: Especifica el color de la flor, como rosa o multicolor.
    flower_pattern:
      name: Patrón de flor
      description: Describe el patrón que se encuentra en las flores, por ejemplo,
        a rayas, con lunares
    flue_type:
      name: Tipo de chimenea
      description: Identifica el tipo de sistema de humos en chimeneas, como equilibrado
        o convencional
    fluid_type:
      name: Tipo de líquido
      description: Especifica el líquido necesario para equipos de efectos especiales,
        como el hielo seco o el fluido de niebla.
    fluoride_content:
      name: Contenido de flúor
      description: Indica la presencia y concentración relativa de flúor en el enjuague
        bucal.
    flush_plate_color:
      name: Color del pulsador de descarga
      description: Identifica el color de la placa de accionamiento de las descargas
        de agua de inodoros, como el blanco o el plateado.
    flush_plate_pattern:
      name: Patrón del pulsador de descarga
      description: Describe el diseño o motivo de una placa de descarga de inodoro,
        como floral o a cuadros
    flush_system:
      name: Sistema de descarga
      description: Especifica el sistema de descarga utilizado en accesorios de fontanería,
        como simple o doble.
    flute_configuration:
      name: Configuración de la flauta
      description: Identifica la configuración específica de una flauta, como la articulación
        B Footjoint o G en línea.
    fm_transmitter_playback_source:
      name: Fuente de reproducción del transmisor FM
      description: Identifica las opciones de entrada de medios que el dispositivo
        puede reproducir, además de Bluetooth (p. ej., memoria USB, tarjeta microSD).
    foam_form:
      name: Forma de la espuma
      description: Identifica la forma o el tipo de producto de espuma artesanal,
        como bolas o láminas.
    focus_adjustment:
      name: Ajuste de enfoque
      description: Especifica cómo ajusta el enfoque la cámara, como, por ejemplo,
        de forma automática o manual.
    focus_device_type:
      name: Tipo de dispositivo de enfoque
      description: Identifica el tipo de dispositivo de enfoque que se usa en las
        cámaras, por ejemplo, la herramienta de asistencia para enfoque o la manivela
        de enfoque.
    focus_type:
      name: Tipo de enfoque
      description: Identifica el método de enfoque de cámaras, como TTL o TTL-CT-SIR.
    fold_type:
      name: Tipo de plegado
      description: Identifica el estilo de plegado de productos de papel, como el
        plegado en Z o doblez.
    folder/report_cover_material:
      name: Material de la tapa de la carpeta/informe
      description: Identifica el material utilizado en la confección de carpetas o
        portadas de informes, como el papel o el cuero.
    folding_mechanism:
      name: Mecanismo de plegado
      description: Define cómo se pliega un producto, normalmente cochecitos, como,
        por ejemplo, de diseño compacto o con una sola mano.
    font_style:
      name: Estilo de fuente
      description: Especifica el tipo de fuente que se usa en productos de software,
        como sans serif o script.
    food_bag_material:
      name: Material de la bolsa de comida
      description: Identifica el material utilizado en las bolsas de almacenamiento
        de alimentos, como el papel o la silicona.
    food_dispenser_type:
      name: Tipo de dispensador de alimentos
      description: Especifica el tipo de alimento para el que está diseñado el dispensador,
        como los cereales o la pasta.
    food_product_form:
      name: Forma de producto alimenticio
      description: Especifica la forma en que se presenta el producto alimenticio,
        como seco o congelado.
    food_storage_material:
      name: Material de almacenamiento de comida
      description: Identifica el material utilizado en los artículos de almacenamiento
        de alimentos, como el vidrio o el plástico.
    food_supplement_form:
      name: Forma del complemento alimenticio
      description: Especifica el formato de un complemento alimenticio para la salud,
        como líquido o en pastillas.
    foot_arch_type:
      name: Tipo de arco del pie
      description: Especifica el tipo de arco del pie que el producto está diseñado
        para soportar.
    foot_side:
      name: Lado del pie
      description: Indica si el soporte de tobillo está diseñado para el pie izquierdo,
        pie derecho o puede usarse en cualquier lado.
    footage_type:
      name: Tipo de stock
      description: Describe la categoría de fotografías de stock o secuencias de vídeo,
        por ejemplo, animaciones o texturas.
    footboard_type:
      name: Tipo de estribo
      description: Especifica el estilo del estribo de los pedales para baterías,
        como rígido o perforado.
    footwear_color:
      name: Color del calzado
      description: Especifica el color principal de un calzado, como blanco o rojo
    footwear_material:
      name: Material del calzado
      description: Especifica el tipo de material que se usa en el calzado, como el
        gamuzado o el caucho.
    footwear_pattern:
      name: Patrón del calzado
      description: Describe el motivo visual del calzado, por ejemplo, rayas u hojas
    force_feedback_type:
      name: Tipo de retroalimentación de fuerza
      description: Describe el mecanismo de accionamiento utilizado para generar retroalimentación
        de fuerza y resistencia de dirección.
    format_supported:
      name: Formato compatible
      description: Especifica las dimensiones compatibles, normalmente para álbumes
        de fotos, como, por ejemplo, 12 x 16 pulgadas o 13 x 18 cm
    formula_level:
      name: Nivel de fórmula
      description: Especifica la idoneidad para la edad de la fórmula infantil, por
        ejemplo, nivel 1 (0-6 meses).
    formulation_strength:
      name: Fuerza de la formulación
      description: Indica la potencia comparativa de la fórmula del producto.
    fossil_type:
      name: Tipo fósil
      description: Especifica el tipo de fósil, como los dientes de tiburón o huesos
        de dinosaurio.
    foundation_color:
      name: Color de base
      description: Identifica el color de la base del colchón, como beige o negro
    foundation_material:
      name: Material de base
      description: Identifica el material principal que se usa en los somieres de
        los colchones, como el metal o la madera.
    foundation_pattern:
      name: Patrón de base
      description: Describe el diseño o motivo de la base del colchón, como chevrón
        o damasco
    fragrance:
      name: Fragancia
      description: Define si un producto está perfumado o no, por ejemplo, floral
        o sin perfume.
    fragrance_level:
      name: Nivel de fragancia
      description: Especifica la intensidad del aroma de un producto, por ejemplo,
        sin perfume o ligeramente perfumado.
    frame_color:
      name: Color del marco
      description: Especifica el color del marco de un producto, como transparente
        o dorado.
    frame_design:
      name: Diseño del marco
      description: Describe el estilo o material del marco de un producto, como el
        metal o la madera.
    frame_material:
      name: Material del marco
      description: Define el material utilizado en el marco del producto, como la
        madera o el plástico.
    frame_pattern:
      name: Patrón del marco
      description: Describe el diseño visual o estilo del marco de un producto, como
        geométrico o a rayas.
    frame_style:
      name: Estilo de marco
      description: Describe el diseño o tipo de marco de la obra de arte, como moderno
        o rústico.
    frequency/radio_bands_supported:
      name: Frecuencia o bandas de radio compatibles
      description: Indica las bandas de radio con las que un dispositivo es compatible,
        por ejemplo, AM o UHF.
    frequency_type:
      name: Tipo de frecuencia
      description: Identifica la configuración de frecuencia en detectores de metales,
        por ejemplo, individual, simultánea
    frequency_weighting:
      name: Ponderación de frecuencia
      description: Describe la respuesta de frecuencia de un sonómetro, como la ponderación
        A.
    frog_material:
      name: Material del talón
      description: Identifica el material utilizado en la nuez de un arco de instrumento
        de cuerda, como la madera de ébano o la plata.
    fruit_source:
      name: Origen de fruta
      description: Identifica si la fruta de las bebidas procede o no de concentrados.
    fuel_additives:
      name: Aditivos para combustible
      description: Identifica el tipo de aditivo que se usa en los productos combustibles,
        como el antigélido o el inhibidor de corrosión.
    fuel_container_features:
      name: Características del depósito de combustible
      description: Describe características específicas de los depósitos de combustible,
        como el pico a prueba de derrames o el indicador de combustible.
    fuel_grade:
      name: Grado de combustible
      description: Especifica el grado de los productos combustibles, como, por ejemplo,
        biocalórico o 2-K.
    fuel_purity:
      name: Pureza del combustible
      description: Especifica el nivel de pureza del combustible propano, por ejemplo,
        HD-5 o comercial.
    fuel_source:
      name: Fuente de combustible
      description: Especifica la fuente de energía utilizada, normalmente en pilas
        de combustible, como, por ejemplo, hidrógeno o propano.
    fuel_supply:
      name: Suministro de combustible
      description: Especifica la fuente de combustible de vehículos o motores, como
        el diésel o los vehículos híbridos.
    furniture/fixture_color:
      name: Color de muebles/componentes
      description: Identifica el color de mobiliario o accesorios, como beige o negro
    furniture/fixture_features:
      name: Características de muebles/componentes
      description: Destaca las características especiales de muebles o accesorios,
        como los estantes ajustables o el espejo incorporado.
    furniture/fixture_material:
      name: Material de muebles/componentes
      description: Identifica el material principal que se usa en muebles o accesorios,
        como la madera o el metal.
    furniture/fixture_pattern:
      name: Patrón de muebles/componentes
      description: Identifica el tema visual de los muebles, como a rayas o a cuadros
    game_components:
      name: Componentes del juego
      description: Identifica las piezas que se incluyen en un juego, como los dados
        o el tablero de juego.
    game_console_skin_coverage:
      name: Cobertura de la funda para consola de juegos
      description: Indica qué partes del dispositivo cubre el conjunto de fundas.
    game_difficulty:
      name: Dificultad del juego
      description: Describe el nivel de desafío de un juego para fiestas, como medio
        o difícil.
    game_features:
      name: Características del juego
      description: Destaca las características especiales de un juego, como, por ejemplo,
        apto para viajes o personalizable.
    game_name:
      name: Nombre del juego
      description: Identifica el nombre específico de un juego de bebidas, como Beer
        Pong o Kings Cup.
    gameplay_skills:
      name: Habilidades de juego
      description: Identifica las habilidades que se potencian con un juego, como
        el pensamiento estratégico o la memoria.
    games_included:
      name: Juegos incluidos
      description: Enumera los juegos que se incluyen con el producto, como, las cartas
        o las damas.
    gaming_enhancement_features:
      name: Características de mejora para juegos
      description: Indica las tecnologías orientadas a juegos HDMI 2.1 admitidas por
        el receptor.
    garage_door_material:
      name: Material de la puerta de garaje
      description: Identifica el material de fabricación de las puertas de garaje,
        como el acero o la madera.
    gardening_use:
      name: Uso para jardinería
      description: Define el propósito de jardinería de un producto, por ejemplo,
        la cobertura con mantillo o el paisajismo.
    garment_steamer_design:
      name: Diseño de vaporizador de ropa
      description: Define el estilo o el tipo de vaporizador de prendas, como de mano
        o con cepillo de vapor.
    gases_detected:
      name: Gases detectados
      description: Identifica los gases específicos que un detector puede supervisar,
        como el metano o el radón.
    gate_mounting_type:
      name: Tipo de montaje de puerta
      description: Especifica dónde se instala una puerta para bebés o mascotas, como
        una pared o una puerta.
    gauge_type:
      name: Tipo de medidor
      description: Especifica el tipo de indicador del vehículo, como el de nivel
        de combustible o temperatura.
    gear_material:
      name: Material del equipo
      description: Especifica el material utilizado para la fabricación del equipo,
        como la fibra de carbono o el titanio.
    gear_ratio:
      name: Relación de transmisión
      description: Define la relación de transmisión de carretes de pesca, como, por
        ejemplo, 6:1 o 1:1.
    gearing_type:
      name: Tipo de transmisión
      description: Especifica el tipo de sistema de cambios de los productos de ciclismo,
        como de cadena o correa.
    gel_strength:
      name: Fuerza gelificante
      description: Indica la fuerza del gel o eflorescencia de los productos de gelatina,
        por ejemplo, eflorescencia alta o baja.
    gemstone_type:
      name: Tipo de piedra preciosa
      description: Especifica la piedra preciosa principal utilizada en el artículo,
        basada en la clasificación mineral o material de la piedra.
    genre:
      name: Género
      description: Clasifica la categoría o estilo de los medios, como de terror o
        fantasía.
    geological_era:
      name: Era geológica
      description: Clasifica la era de las rocas o fósiles coleccionables, como el
        Mesozoico o Cenozoico.
    gift_bag_handle_design:
      name: Diseño de asa de la bolsa de regalo
      description: Describe el estilo de las asas de las bolsas de regalo, como cuerdas
        o cintas.
    gift_set_format:
      name: Formato de set de regalo
      description: Especifica el estilo de presentación de los conjuntos de regalo,
        como la caja o bolsa de regalo.
    gimbal_stabilization_axes:
      name: Ejes de estabilización del cardán
      description: Identifica el número de ejes de estabilización electrónica o mecánica
        que se proporciona cuando el palo para selfies incluye una función de cardán.
    gin_variety:
      name: Variedad de ginebra
      description: Clasifica los productos de ginebra por su tipo específico, por
        ejemplo, aromatizadas o London Dry.
    glaze_finish:
      name: Acabado esmaltado
      description: Indica la textura y el brillo de un esmalte cerámico o de alfarería,
        como satinado o craquelado.
    glazing_type:
      name: Tipo de acristalamiento
      description: Identifica el tipo de acristalamiento de la ventana, como de doble
        panel o de panel único.
    glide_style:
      name: Estilo de deslizamiento
      description: Indica la característica de deslizamiento prevista de los patines
        (p. ej., velocidad, control).
    glitter_particle_size:
      name: Tamaño de partícula de brillo
      description: Categoriza el tamaño de partícula del brillo, impactando la intensidad
        del destello, la textura y la facilidad de aplicación.
    glitter_shape:
      name: Forma de la purpurina
      description: Define la forma de la purpurina, como de corazones o estrellas.
    glucose_measurement_units:
      name: Unidades de medición de glucosa
      description: Indica en qué unidades de medición (mg/dL o mmol/L) el medidor
        puede mostrar los resultados.
    glucose_meter_features:
      name: Características del medidor de glucosa
      description: Describe las características especiales de los medidores de glucosa,
        como la función portátil o de memoria.
    glue_gun_features:
      name: Características de la pistola de adhesivo
      description: Destaca aspectos únicos de una pistola de adhesivo, como el calentamiento
        rápido o las características de seguridad.
    glue_gun_operation:
      name: Funcionamiento de la pistola de adhesivo
      description: Identifica la fuente de alimentación de las tijeras de una pistola
        de pegamento, como las con cable o sin cable
    glue_gun_technology:
      name: Tecnología de pistola de adhesivo
      description: Especifica el tipo de tecnología utilizada en una pistola de pegamento,
        por ejemplo, fría, caliente
    glue_strength:
      name: Fuerza del pegamento
      description: Indica la capacidad de unión de un pegamento, por ejemplo, fuerte
        o suave.
    glue_viscosity:
      name: Viscosidad del pegamento
      description: Describe el grosor del pegamento, impactando el flujo y el control
        de aplicación.
    golf_ball_type:
      name: Tipo de pelota de golf
      description: Especifica las características de rendimiento de las pelotas de
        golf, como el rendimiento de giro o la distancia suave.
    golf_equipment_included:
      name: Equipo de golf incluido
      description: Identifica los artículos de golf adicionales que se incluyen en
        el juego, como una herramienta para piques o un estuche para pelotas de golf.
    gps_compatible_device:
      name: Dispositivo compatible GPS
      description: Especifica dispositivos que pueden utilizar software GPS, como
        los equipos portátiles o dispositivos de aviación.
    gps_device_features:
      name: Características del dispositivo GPS
      description: Describe las capacidades especiales de un dispositivo GPS, como
        una cámara incorporada o con tecnología de inteligencia artificial.
    gps_map_type:
      name: Tipo de mapa GPS
      description: Especifica el tipo de mapa utilizado en el software GPS, como cartas
        topográficas o náuticas
    gps_software_focus:
      name: Enfoque del software GPS
      description: Identifica el uso principal del software del GPS, como navegación
        con automóvil o análisis geoespacial
    grading:
      name: Calificación
      description: Indica la calidad o condición de las tarjetas coleccionables, como
        BCCG o PSA.
    grain:
      name: Grano
      description: Indica el nivel de granulosidad de la película fotográfica, como,
        por ejemplo, alto o fino.
    grape_variety:
      name: Variedad de uvas
      description: Identifica el tipo de uva utilizada en la elaboración del vino,
        como Cabernet Sauvignon o Chardonnay.
    graphics_card_type:
      name: Tipo de tarjeta gráfica
      description: Especifica el tipo de tarjeta gráfica que se usa en un equipo informático,
        como, por ejemplo, profesional o dedicada.
    graphics_tablet_accessories_included:
      name: Accesorios para tableta gráfica incluidos
      description: Identifica los elementos adicionales incluidos con una tableta
        gráfica, como portalápiz o sujeción para lápiz
    graphics_tablet_specialized_features:
      name: Características especializadas de la tableta gráfica
      description: Detalla las características especiales de una tableta gráfica,
        como la impermeabilidad o la retroiluminación LED
    gravel/substrate_material:
      name: Material de grava/sustrato
      description: Especifica la composición de la grava o el sustrato del acuario,
        como, por ejemplo, la arcilla o el cuarzo.
    gray_coverage_level:
      name: Nivel de cobertura de canas
      description: Indica el porcentaje o grado de cabello gris o blanco que el producto
        puede cubrir o mezclar.
    grease_filter_material:
      name: Material del filtro de grasa
      description: Especifica el material que se usa en el filtro de grasa del producto,
        como, por ejemplo, el metal o el acero inoxidable.
    grind_size:
      name: Tamaño de molienda
      description: Indica el grado de molienda de los granos de café, como extra grueso
        o fino.
    grip_or_holder_style:
      name: Estilo de agarre o soporte
      description: Identifica la forma física principal del producto, ayudando a los
        clientes a filtrar rápidamente por su diseño preferido.
    grip_texture:
      name: Textura del agarre
      description: Describe la sensación de la superficie del agarre de un producto,
        como suave o texturizada.
    grip_type:
      name: Tipo de empuñadura
      description: Define el tipo de empuñadura del equipo de esgrima, como la francesa
        o anatómica.
    grit_type:
      name: Tipo de grano
      description: Especifica el nivel de grano de las herramientas o productos dentales,
        como grueso o ultrafino.
    grooming_kit_format:
      name: Formato del kit de aseo
      description: Especifica el tipo de embalaje de los kits de aseo, por ejemplo,
        bolsa o caja.
    guitar_fitting/part_type:
      name: Tipo de accesorio/pieza de guitarra
      description: Especifica el tipo de pieza o accesorio de guitarra, como un golpeador
        o clavija de afinación
    guitar_size:
      name: Tamaño de la guitarra
      description: Especifica el tamaño de la guitarra, como tamaño completo o 3/4.
    gutter_fitting_type:
      name: Tipo de montaje de canalón
      description: Identifica el tipo de accesorio utilizado en los sistemas de canalones,
        como un conector de bajante o una tapa de extremo.
    gutter_style:
      name: Estilo de canalón
      description: Especifica el tipo de canalón, como profundo o industrial.
    habitat_material:
      name: Material del terrario
      description: Identifica el material principal de los terrarios de mascotas,
        como acrílico o madera.
    hair_care_effect:
      name: Efecto del cuidado del cabello
      description: Define los beneficios o resultados principales que el champú está
        formulado para proporcionar.
    hair_care_finish:
      name: Acabado para el cuidado capilar
      description: Define el aspecto o textura final del cabello después de su uso,
        por ejemplo, brillante o mate.
    hair_care_items_included:
      name: Artículos de cuidado del cabello incluidos
      description: Especifica los tipos de artículos para el cuidado del cabello incluidos
        en un conjunto, como sérum capilar o mascarilla para el pelo
    hair_care_technology:
      name: Tecnología para el cuidado capilar
      description: Define la tecnología utilizada en los productos para el cuidado
        del cabello, por ejemplo, vapor o termólisis.
    hair_color:
      name: Coloración
      description: Identifica el color o tono de los productos para el cuidado del
        cabello, como rubio o castaño oscuro.
    hair_color_formulation:
      name: Formulación del color del cabello
      description: Indica la longevidad o tipo funcional del efecto de color del producto
        (p. ej., tinte permanente, tóner, retoque de raíz).
    hair_concealer_fiber_material:
      name: Material de la fibra del corrector capilar
      description: Especifica el material principal de las fibras o polvos de construcción
        del producto.
    hair_dryer_motor_type:
      name: Tipo de motor del secador de pelo
      description: Especifica el tipo de motor usado en el secador de pelo, impactando
        la durabilidad, nivel de ruido y potencia del flujo de aire.
    hair_dye_type_removed:
      name: Tipo de tinte de cabello eliminado
      description: Especifica qué tipos de tinte de cabello el producto está diseñado
        para eliminar (p. ej., permanente, henna).
    hair_loss_type:
      name: Tipo de pérdida de cabello
      description: Organiza productos según el tipo de pérdida de cabello, por ejemplo,
        alopecia areata o calvicie masculina.
    hair_oil_application:
      name: Aplicación del aceite para el cabello
      description: Especifica cómo está destinado a usarse o aplicarse el aceite para
        el cabello.
    hair_oil_effect:
      name: Efecto del aceite para el cabello
      description: Indica los beneficios o resultados principales proporcionados por
        el aceite para el cabello.
    hair_shear_type:
      name: Tipo de tijeras para el cabello
      description: Define el estilo de tijeras de pelo utilizadas en el cuidado del
        cabello, por ejemplo, texturizadas, reductoras
    hair_styling_benefits:
      name: Beneficios del estilizado del cabello
      description: Destaca los beneficios o efectos clave de rendimiento que el producto
        proporciona al cabello.
    hair_styling_items_included:
      name: Artículos de peluquería incluidos
      description: Identifica los útiles de peluquería incluidos en un juego, como
        una plancha rizadora o un cepillo para el cabello
    hair_styling_tool_features:
      name: Características de los útiles de peluquería
      description: Identifica características especiales de los útiles de peluquería,
        como el termostato ajustable o el apagado automático.
    hair_treatment_effect:
      name: Efecto del tratamiento capilar
      description: Especifica el o los beneficios principales proporcionados por el
        sérum capilar.
    hair_type:
      name: Tipo de cabello
      description: Clasifica los productos según el tipo o estado del cabello, como
        rizado o seco.
    hammer_head_material:
      name: Material del cabezal del martillo
      description: Identifica la composición de la cabeza de un martillo, como el
        acero o la fibra de vidrio.
    hand_side:
      name: Lado
      description: Especifica la lateralidad para la que está diseñado un producto,
        como por ejemplo, la izquierda o ambos lados.
    hand_soap_features:
      name: Características del jabón de manos
      description: Destaca características o beneficios especiales del jabón de manos
        en polvo.
    hand_warmer_type:
      name: Tipo de calentador de manos
      description: Identifica el tipo de calentador de manos, como activado por aire
        o alimentado por batería.
    handcuff_lock_type:
      name: Tipo de bloqueo de esposas
      description: Identifica el mecanismo de bloqueo de los grilletes, como la llave
        o doble cerradura.
    handle_color:
      name: Color del mango
      description: Especifica el color del asa de un producto, como el negro o el
        azul.
    handle_design:
      name: Diseño de mango
      description: Describe el estilo del mango de una herramienta, como recto o de
        anatómico.
    handle_grip_texture:
      name: Textura de agarre del mango
      description: Define la sensación de la superficie del mango de un producto,
        como acanalada o lisa.
    handle_material:
      name: Material del mango
      description: Especifica el material utilizado en el mango del producto, como
        el bambú o el plástico.
    handle_pattern:
      name: Patrón del mango
      description: Describe el diseño o motivo en el mango de un producto, como floral
        o geométrico
    handle_style:
      name: Estilo del mango
      description: Define el diseño o forma del mango del bastón, influyendo en la
        comodidad del agarre, ergonomía y estética.
    handle_type:
      name: Tipo de mango
      description: Especifica la longitud o la presencia de un asa en un producto,
        por ejemplo, corta o sin asa.
    handset_type:
      name: Tipo de teléfono
      description: Define el auricular para teléfonos, como con cable o sin cables.
    handwear_features:
      name: Características de las prendas de manos
      description: Describe las características especiales de guantes o mitones, como
        el cierre ajustable o el agarre mejorado.
    handwear_material:
      name: Material de las prendas de manos
      description: Describe el tipo de material que se usa en guantes o mitones, como
        la piel sintética o la lana.
    handwear_type:
      name: Tipo de prendas de manos
      description: Clasifica el tipo de prendas de mano, por ejemplo, guantes sin
        dedos, guantes de nieve
    hanging_chair_design:
      name: Diseño de la silla colgante.
      description: Especifica si el sillón colgante incluye soporte o no.
    haptic_feedback_type:
      name: Tipo de retroalimentación háptica
      description: Describe el tipo de retroalimentación táctil o de movimiento que
        proporciona el controlador.
    hard_cider_variety:
      name: Variedad de sidra
      description: Especifica el perfil de sabor de la sidra, por ejemplo, ácida o
        dulce.
    hard_drive_features:
      name: Características del disco duro
      description: Identifica capacidades especiales de un disco duro, como la tecnología
        de IA o la resistencia a los golpes.
    hard_drive_form_factor:
      name: Factor de forma del disco duro
      description: Especifica el tamaño físico de un disco duro, por ejemplo, 2,5
        pulgadas, 3,5 pulgadas
    hard_drive_installation:
      name: Instalación del disco duro
      description: Identifica la ubicación de un disco duro en dispositivos electrónicos,
        como interno o externo
    hardhat_class:
      name: Clase de casco
      description: Identifica la clasificación de seguridad de los cascos, por ejemplo,
        C (conductivos) o E (eléctricos).
    hardness:
      name: Dureza
      description: Indica la firmeza de un producto, por ejemplo, suave, media o dura.
    hardness_rating_pencil_scale:
      name: Clasificación de dureza (escala de lápiz)
      description: Especifica la clasificación de dureza del vidrio templado según
        la escala de dureza del lápiz.
    hardware_finish:
      name: Acabado de hardware
      description: Describe el tratamiento de la superficie de un artículo de ferretería,
        como el latón o el cromo.
    hardware_material:
      name: Material de la herramienta
      description: Identifica la composición de los artículos de ferretería, como
        el metal o el acero inoxidable.
    hardware_mounting_type:
      name: Tipo de montaje de hardware
      description: Identifica cómo se instala o coloca un producto de ferretería,
        por ejemplo, montado en la pared o independiente.
    hardwood_lumber_grade:
      name: Grado de madera dura
      description: Clasifica la calidad de la madera dura, por ejemplo, n.º 2A común.
    harness_closure_type:
      name: Tipo de cierre del arnés
      description: Especifica el tipo de cierre utilizado en los arneses, como de
        hebilla de liberación lateral o cremallera.
    harp_size:
      name: Tamaño del arpa
      description: Especifica la categoría de tamaño de un arpa, por ejemplo, pequeña
        o de concierto.
    hatch_suitable_location:
      name: Ubicación adecuada de la escotilla
      description: Identifica la ubicación ideal de trampillas, como en el suelo o
        la pared.
    hazmat_suit_design:
      name: Diseño de traje contra materiales peligrosos
      description: Describe el estilo de los trajes para manipulación de materiales
        peligrosos, como monos o escafandras.
    hdmi_version_supported:
      name: Versión de HDMI soportada
      description: Especifica la versión de especificación HDMI más alta que el dispositivo
        soporta completamente (p. ej., HDMI 2.1 para 4K @ 120 Hz).
    hdr_format:
      name: Formato HDR
      description: Especifica el alto rango dinámico (HDR) para televisores, por ejemplo,
        HDR10 o Dolby Vision.
    headjoint_cut:
      name: Corte de cabezal
      description: Especifica el corte de la cabeza en flautas, por ejemplo, ondulado
        o corte en Z.
    headphone_cushion_shape:
      name: Forma de la almohadilla de los auriculares
      description: Describe el contorno físico de la almohadilla para ayudar a los
        clientes a coincidir con la geometría de la copa del oído.
    headphone_driver_technology:
      name: Tecnología del controlador de auriculares
      description: Define el tipo de transductor utilizado para crear sonido en los
        auriculares.
    headphone_jack_type:
      name: Tipo de conector para auriculares
      description: Especifica el tamaño del conector para auriculares, como 3,5 mm
        o USB tipo C.
    headphone_style:
      name: Estilo de auriculares
      description: Define el diseño de los auriculares, por ejemplo, detrás del cuello
        o audífonos.
    headset_connection_type:
      name: Tipo de conexión de auriculares
      description: Especifica las interfaces disponibles para conectar auriculares
        externos al teléfono.
    headwear_features:
      name: Características de los accesorios para la cabeza
      description: Destaca las características únicas de los sombreros, por ejemplo,
        plegables o versátiles.
    hearing_aid_compatibility:
      name: Compatibilidad con audífonos
      description: Especifica si el teléfono cumple con los requisitos de compatibilidad
        con audífonos (HAC) y, si corresponde, el nivel de clasificación.
    hearing_aid_ear_side:
      name: Lado del oído del audífono
      description: Especifica si el audífono está diseñado para el oído izquierdo,
        oído derecho o ambos oídos.
    hearing_aid_features:
      name: Características del audífono
      description: Destaca características especiales de los audífonos, como de batería
        recargable o digitales.
    hearing_aid_material:
      name: Material del audífono
      description: Identifica el principal material utilizado en la fabricación de
        audífonos, como el plástico o la silicona.
    hearing_loss_level:
      name: Nivel de pérdida auditiva
      description: Especifica el grado de pérdida auditiva que el audífono está diseñado
        para abordar.
    hearing_protection_class:
      name: Clase de protección auditiva
      description: Especifica la clase de certificación local que indica el rendimiento
        de atenuación según los estándares regionales.
    heat_function:
      name: Función de calor
      description: Indica si un producto tiene una función de calentamiento, generalmente
        en artículos de cuidado personal.
    heat_level:
      name: Nivel de calor
      description: Indica el sabor picante de los alimentos y bebidas, como suave
        o muy picante.
    heat_settings:
      name: Configuración de calor
      description: Especifica los niveles de control de temperatura de un producto,
        por ejemplo, bajo, medio, alto.
    heat_source:
      name: Fuente de calor
      description: Especifica el tipo de fuente de calor que se puede emplear para
        calentar las bolsas de calor, por ejemplo, el gel térmico o el microondas.
    heat_therapy_type:
      name: Tipo de terapia de calor
      description: Indica si el producto proporciona calor húmedo, calor seco o ambos.
    heating_instructions:
      name: Instrucciones de calentamiento
      description: Especifica cómo calentar adecuadamente el producto, por ejemplo,
        en el horno o placa de cocina.
    heating_method:
      name: Método de calentamiento
      description: Especifica la técnica utilizada para calentar, normalmente para
        calentadores de biberones, como, por ejemplo, mediante vapor o baño de agua.
    heating_pad_design:
      name: Diseño de la almohadilla térmica
      description: Especifica el estilo físico o factor de forma de la almohadilla
        térmica.
    heating_pad_features:
      name: Características de la almohadilla térmica
      description: Destaca características funcionales o de conveniencia especiales
        incorporadas en la almohadilla térmica.
    heating_speed:
      name: Velocidad de calentamiento
      description: Indica la velocidad a la que se calienta un producto, por ejemplo,
        rápido o lento.
    heel_height_type:
      name: Tipo de altura del tacón
      description: Define la altura del tacón de un zapato, como plano o alto.
    heel_shoe_type:
      name: Tipo de zapato de tacón
      description: Identifica el estilo del tacón de un calzado como tacones de plataforma
        o tacones de cuña
    height_adjustment:
      name: Ajuste de altura
      description: Especifica si la altura de un producto se puede modificar, por
        ejemplo, de altura fija o ajustable.
    helicobacter_pylori_detection_method:
      name: Método de detección de Helicobacter pylori
      description: Identifica el principio biológico o enfoque que usa el kit para
        detectar la infección por Helicobacter pylori.
    helmet_shade_design:
      name: Diseño de pantalla de careta
      description: Describe el tipo de mecanismo de sombra de las caretas de soldar,
        como fijo o de oscurecimiento automático.
    herbal_supplement_health_goal:
      name: Objetivo de salud del suplemento herbal
      description: Indica el objetivo principal de bienestar, sistema corporal o área
        fisiológica que el suplemento herbal está destinado a apoyar (p. ej., soporte
        inmunológico, alivio del estrés, soporte hepático y desintoxicación).
    hitch_class:
      name: Clase de enganche
      description: Identifica la capacidad de remolque del enganche de un vehículo,
        como de Clase I o Clase II.
    hitch_type:
      name: Tipo de enganche
      description: Especifica el método de montaje de remolques de bicicletas, como
        el montaje en el eje o en la tija del sillín.
    hiv_test_generation:
      name: Generación de prueba de VIH
      description: Indica la generación de la prueba diagnóstica de VIH, reflejando
        mejoras en la sensibilidad y ventana de detección.
    hockey_equipment_included:
      name: Equipo hockey incluido
      description: Especifica los artículos que incluye un conjunto de equipo de lacrosse,
        como un palo de lacrosse u hombreras.
    hold_level:
      name: Nivel de fijación
      description: Define la fuerza de los productos para el peinado del cabello,
        por ejemplo, leve o fuerte.
    hole_plating_type:
      name: Tipo de metalizado de orificios
      description: Indica si los orificios de la placa no están metalizados, están
        metalizados pasantes o tienen barriles de vía, lo que afecta la soldadura
        y la conectividad entre capas.
    hook_design:
      name: Diseño del gancho
      description: Identifica el diseño de ganchos, hebillas y elementos de fijación,
        por ejemplo, resorte o doble extremo.
    hook_grip_design:
      name: Diseño de agarre con gancho
      description: Describe el estilo de agarre de los ganchillos, como antideslizante
        o ergonómico.
    hook_size:
      name: Tamaño del ganchillo
      description: Identifica el tamaño de los ganchillos, como B, G o I.
    hook_type:
      name: Tipo de bichero
      description: Identifica el estilo de los bicheros para barcos, como fijos o
        telescópicos.
    hoop_shape:
      name: Forma del aro
      description: Describe la forma de un artículo basado en aros, normalmente redes
        de pesca, como, por ejemplo, en forma de D.
    horse_category:
      name: Categoría de caballo
      description: Clasifica los arreos para caballos según el tamaño y la raza del
        caballo, como, por ejemplo, pony o estándar.
    horse_grooming_accessories_included:
      name: Accesorios para el cuidado de caballos incluidos
      description: Identifica artículos adicionales incluidos con los productos de
        cuidado de caballos, como cuchillas o estuches de transporte.
    hose_material:
      name: Material de la manguera
      description: Especifica el tipo de material que se usa en las tuberías, como
        el PVC o el aluminio.
    host_interface:
      name: Interfaz de host
      description: Especifica el método utilizado para conectarse a discos duros,
        como Thunderbolt 3 o SATA.
    housing_color:
      name: Color de la carcasa
      description: Identifica el color de la carcasa exterior de un producto, como
        beige o transparente.
    housing_material:
      name: Material de la carcasa
      description: Especifica el material utilizado en la capa exterior del producto,
        por ejemplo, el acero inoxidable o la madera.
    housing_pattern:
      name: Patrón de la carcasa
      description: Describe el diseño o motivo en el exterior de un producto, como
        floral o geométrico
    hub/switch_storage_options:
      name: Opciones de almacenamiento de concentrador/conmutador
      description: Identifica las capacidades de almacenamiento de concentradores
        o conmutadores, como apilables o no apilables
    humidification_system:
      name: Sistema de humidificación
      description: Describe el tipo de opción de humidificación incluida o soportada
        por la máquina PAP.
    humidifier_design:
      name: Diseño del humidificador
      description: Describe el estilo de un humidificador, como acoplable o portátil.
    humidity_control:
      name: Control de humedad
      description: Indica la capacidad del producto para regular los niveles de humedad,
        normalmente de humidificadores de puros, como, por ejemplo, 0,65.
    humidity_control_method:
      name: Método de control de humedad
      description: Especifica el tipo de regulación de la humedad en dispositivos,
        por ejemplo, semiautomáticos, manuales
    hunting/survival_knife_design:
      name: Diseño del cuchillo de caza
      description: Identifica el diseño de un cuchillo de caza, como de punta de lanza
        o punta Tanto.
    hunting_blind_design:
      name: Diseño de la pantalla de caza
      description: Especifica el tipo de diseño de la pantalla de caza, por ejemplo,
        sin pantalla, transparente unidireccional
    hvac_control_type:
      name: Tipo de control de HVAC
      description: Identifica el tipo de control de climatización, como digital o
        manual.
    ice_pack_type:
      name: Tipo de compresa de hielo
      description: Especifica el material o la tecnología que utiliza la bolsa de
        hielo, por ejemplo, bolsa de gel o bolsa de espuma.
    icon_type:
      name: Tipo de ícono
      description: Especifica el tipo de icono del equipo informático, como carpeta
        o red social.
    identity_verification_requirement:
      name: Requisito de verificación de identidad
      description: Especifica si se requiere el registro con nombre real o la verificación
        de identidad eKYC antes de que la SIM o eSIM pueda ser utilizada.
    ignition_system:
      name: Sistema de encendido
      description: Identifica el tipo de sistema de encendido de los generadores,
        como manual o electrónico.
    illumination_technique:
      name: Técnica de iluminación
      description: Identifica el método de iluminación utilizado en los microscopios,
        como de campo claro o campo oscuro.
    image_formats_supported:
      name: Formatos de imagen compatibles
      description: Identifica los tipos de archivos de imagen que puede producir una
        cámara, como JPEG o RAW.
    image_sensor_size:
      name: Tamaño del sensor de imagen
      description: Indica el tamaño del sensor de imagen en las cámaras, como 1/1.7
        o Full Frame.
    immobilizer_type:
      name: Tipo de inmovilizador
      description: Especifica el tipo de dispositivo utilizado para evitar el robo
        del vehículo, por ejemplo, cepos de rueda o bloqueos para el volante.
    incense_fragrance:
      name: Fragancia de incienso
      description: Identifica el aroma de un producto de incienso, como la lavanda
        o sándalo.
    incense_kit_items_included:
      name: Artículos del kit incienso incluidos
      description: Identifica los elementos que incluye un kit para hacer incienso,
        por ejemplo, varitas de bambú o moldes.
    incense_type:
      name: Tipo de incienso
      description: Identifica la forma del incienso, como de cono o varilla.
    incontinence_aid_features:
      name: Características del artículo para la incontinencia
      description: Describe las características especiales de los artículos para la
        incontinencia, como a prueba de fugas o hipoalergénicos.
    incontinence_pad_type:
      name: Tipo de compresa para incontinencia
      description: Define el estilo o forma específica de la compresa (p. ej., protector,
        guarda, compresa reforzadora).
    inductance_tolerance:
      name: Tolerancia de inductancia
      description: Define la desviación porcentual permitida del valor de inductancia
        nominal.
    industry_focus:
      name: Enfoque de la industria
      description: Destaca los sectores objetivo de un producto, como la educación
        o la fabricación.
    infant_age_group:
      name: Grupo de edad de infantes
      description: Clasifica productos adecuados para rangos de edad específicos de
        bebés, por ejemplo, recién nacidos o de 0 a 6 meses.
    inflation_method:
      name: Método de inflado
      description: Identifica cómo se infla un producto, como automático o hidrostático
    ingredient_category:
      name: Categoría de ingrediente
      description: Clasifica el tipo de ingredientes de vitaminas y suplementos, por
        ejemplo, fibra o hierbas.
    ingredient_origin:
      name: Origen del ingrediente
      description: Especifica el origen de los ingredientes del producto, por ejemplo,
        naturales o sintéticos.
    ingredient_pathway:
      name: Ruta de los ingredientes
      description: Indica si los ingredientes de perfumería se derivan de forma natural
        mediante separación física de la biomasa sin alteración química o si se sintetizan
        por otros métodos
    ingredients:
      name: Ingredientes
      description: Especifica los componentes que se usan en la formulación de un
        producto, por ejemplo, óxido de zinc o aloe vera.
    ingress_protection_ip_rating:
      name: Clasificación de protección de entrada (IP)
      description: Proporciona la clasificación oficial de resistencia al agua y al
        polvo con la que cumple el estuche (por ejemplo, IP68).
    ink_application_technique:
      name: Técnica de aplicación de tinta
      description: Describe el método utilizado para aplicar tinta en artes y manualidades,
        como la serigrafía.
    ink_color:
      name: Color de la tinta
      description: Identifica el color de la tinta, normalmente de material de oficina,
        como, por ejemplo, negro, plateado.
    ink_form:
      name: Forma de la tinta
      description: Describe el embalaje o método de entrega de la tinta artística,
        como en bolígrafo o botella.
    ink_pattern:
      name: Patrón de tinta
      description: Identifica el tema visual de bolígrafos o sellos, por ejemplo,
        geométrico, navideño
    ink_type:
      name: Tipo de tinta
      description: Identifica el tipo de tinta que se usa en un producto, como a base
        de disolventes o colorantes.
    inline_skating_style:
      name: Estilo de patinaje en línea
      description: Define el estilo específico de patinaje en línea para el que está
        diseñado el producto, como el patinaje en línea de velocidad o recreativo.
    input/output_ports:
      name: Puertos de entrada o salida
      description: Identifica los tipos de puertos disponibles en un dispositivo,
        como USB o conector de salida.
    input_connection:
      name: Conexión de entrada
      description: Especifica el tipo de conexión de entrada para cables de audio,
        como 3,5 mm o RCA.
    input_connection_type:
      name: Tipo de conexión de entrada
      description: Especifica el conector o estándar de interfaz aceptado en el lado
        de entrada del convertidor.
    input_signal_interface:
      name: Interfaz de señal de entrada
      description: Especifica el tipo o tipos de conexiones de entrada que acepta
        el convertidor de audio.
    input_video_interface:
      name: Interfaz de video de entrada
      description: Especifica el tipo o tipos de conector de video aceptados como
        entrada por el convertidor de escaneo.
    insole_length_type:
      name: Tipo de longitud de plantilla
      description: Define el estilo de cobertura o longitud de la inserción.
    installation_accessories_included:
      name: Accesorios de instalación incluidos
      description: Identifica cualquier herramienta o material instructivo incluido
        con la batería para ayudar en la instalación.
    installation_tools_included:
      name: Herramientas de instalación incluidas
      description: Enumera cualquier herramienta o consumible incluido con la pieza
        para ayudar en la instalación.
    instruction_set_architecture:
      name: Arquitectura del conjunto de instrucciones
      description: Define la arquitectura del equipo informático que un procesador
        puede admitir, por ejemplo, 32 bits.
    instrument/accessory_finish:
      name: Acabado de instrumento/accesorio
      description: Describe el tratamiento de la superficie o el color de un instrumento
        o accesorio musical, como chapado en oro o lacado.
    instrument_accessory_material:
      name: Material del accesorio del instrumento
      description: Identifica el material utilizado en los accesorios de instrumentos
        musicales, como la madera o el latón.
    instrument_bow_material:
      name: Material del arco del instrumento
      description: Identifica el material utilizado en la fabricación del arco de
        un instrumento musical, como la fibra de carbono o el palo de Brasil.
    instrument_color:
      name: Color del instrumento
      description: Identifica el color de un instrumento musical, como negro o plateado
    instrument_controller_type:
      name: Tipo de controlador de instrumento
      description: Identifica el instrumento musical que simula un controlador de
        juego, como una guitarra o un micrófono.
    instrument_material:
      name: Material del instrumento
      description: Identifica el material principal utilizado en la fabricación de
        un instrumento musical, como la madera de arce o el latón.
    instrument_part_material:
      name: Material de la pieza del instrumento
      description: Especifica el tipo de material utilizado en las piezas de un instrumento,
        como la madera de ébano o chapadas en oro.
    instrument_pattern:
      name: Patrón del instrumento
      description: Describe el diseño visual o motivo de un instrumento musical, como
        rígido o con textura
    instrument_string_color:
      name: Color de la cuerda del instrumento
      description: Identifica el color de las cuerdas de los instrumentos musicales,
        como dorado o plateado
    instrument_string_material:
      name: Material de la cuerda del instrumento
      description: Especifica la composición de las cuerdas de instrumentos musicales,
        como el bronce o el fluorocarbono.
    instrument_string_pattern:
      name: Patrón de la cuerda del instrumento
      description: Indica el patrón de las cuerdas de la guitarra, como sólido o geométrico
    instrument_support_type:
      name: Tipo de soporte del instrumento
      description: Identifica el tipo de soporte utilizado para un instrumento musical,
        como una correa para el cuello o un atril para partituras
    insulation_material:
      name: Material de aislamiento
      description: Especifica la composición del aislamiento, como la lana mineral
        o el poliuretano (PU).
    integrated_led_lighting:
      name: Iluminación LED integrada
      description: Indica si el altavoz incorpora iluminación LED o RGB incorporada
        y su tipo.
    integrated_power/charging_options:
      name: Opciones integradas de alimentación/carga
      description: Especifica si el soporte incluye tomas de corriente integradas
        y/o puertos de carga USB, mejorando la utilidad para dispositivos conectados.
    integrated_stand_type:
      name: Tipo de soporte integrado
      description: Describe el estilo del soporte o mecanismo de apoyo incorporado
        en el estuche.
    intended_application:
      name: Aplicación prevista
      description: Identifica el uso específico de pinturas y tintes, por ejemplo,
        puertas o terrazas/cercas.
    intended_effect:
      name: Efecto previsto
      description: Describe el beneficio principal de bienestar que el suplemento
        de CBD está comercializado para proporcionar.
    intended_jewelry_type:
      name: Tipo de joya previsto
      description: Indica qué tipos de joyas el soporte está diseñado para sostener
        o exhibir.
    intended_surface:
      name: Superficie prevista
      description: Identifica la superficie principal que la almohadilla está diseñada
        para proteger.
    intercom_communication_type:
      name: Tipo de comunicación del intercomunicador
      description: Clasifica el formato de comunicación fundamental que admite la
        unidad.
    intercom_wiring_type:
      name: Tipo de cableado del intercomunicador
      description: Especifica el esquema de cableado o comunicación para el que está
        diseñada una unidad de altavoz de intercomunicador.
    interface_type:
      name: Tipo de interfaz
      description: Especifica el tipo de conexión que utiliza un producto, como Bluetooth
        o USB.
    interior_lining_material:
      name: Material del forro interior
      description: Identifica el material principal que forra el interior del joyero,
        protegiendo las joyas de rayones y desgaste.
    interior_texture:
      name: Textura interior
      description: Define el patrón de superficie interno que ayuda a crear espuma
        dentro del cuenco o taza.
    internal_drive_form_factor_supported:
      name: Factor de forma de unidad interna compatible
      description: Indica los tamaños de disco duro compatibles para un dispositivo,
        por ejemplo, 2,5 pulgadas.
    internet_radio_form_factor:
      name: Factor de forma de la radio por internet
      description: Define el estilo físico u orientación de montaje de la radio por
        internet.
    intimate_apparel_features:
      name: Características de la ropa íntima
      description: Describe características especiales de prendas íntimas, como el
        diseño transpirable o el ajuste cómodo.
    inverter_type:
      name: Tipo de inversor
      description: Identifica el tipo de inversor de potencia de las piezas de vehículos
        eléctricos, como de onda sinusoidal pura u onda cuadrada.
    invitation_personalization_design:
      name: Diseño de la personalización de invitaciones
      description: Define las características de diseño de una invitación, por ejemplo,
        SRC incluido o personalizable.
    ironing_features:
      name: Características de planchado
      description: Especifica las características especiales de una plancha o sistema
        de planchado, por ejemplo, el apagado automático o el golpe de vapor.
    item_condition:
      name: Estado del artículo
      description: Indica la calidad de un artículo, normalmente vehículos o piezas
        de vehículos, como, por ejemplo, usados certificados o reacondicionados.
    item_material:
      name: Material del artículo
      description: Especifica la sustancia principal de un artículo, normalmente piezas
        y accesorios de vehículos, como, por ejemplo, cobre o fibra de vidrio.
    item_style:
      name: Estilo del artículo
      description: Describe el tema estético o de diseño de un producto, como moderno
        o rústico.
    j_cup_type:
      name: Tipo de J-Cup
      description: Define el estilo de los ganchos en J de los equipos de levantamiento
        de pesas, como, por ejemplo, planos o tipo sándwich.
    jaw_advancement_adjustability:
      name: Ajustabilidad del avance mandibular
      description: Indica si y cómo el usuario puede ajustar la posición de la mandíbula
        inferior proporcionada por el dispositivo.
    jaw_material:
      name: Material de la mordaza
      description: Identifica el material utilizado en la mordaza de una herramienta,
        como el acero o titanio.
    jewelry_cleaning_accessories_included:
      name: Accesorios de limpieza de joyas incluidos
      description: Enumera cualquier herramienta o accesorio adicional suministrado
        con el limpiador (p. ej., cepillos, bandejas, paños de pulido).
    jewelry_cleaning_purpose:
      name: Propósito de limpieza de joyas
      description: Indica la función principal prevista del producto (p. ej., eliminación
        de deslustre, pulido, recubrimiento protector).
    jewelry_finding_type:
      name: Tipo de piezas de base para joyería
      description: Identifica el componente específico utilizado en la fabricación
        de joyas, como una tapa de cuentas o un anillo de salto
    jewelry_material:
      name: Material de joyería
      description: Identifica el material principal utilizado en artículos de joyería,
        como el oro o el esmalte.
    jewelry_project_type:
      name: Tipo de proyecto de joyería
      description: Especifica el tipo de proyecto de joyería, como fabricación de
        collares o trabajos con alambre.
    jewelry_set_type:
      name: Tipo de juego de joyas
      description: Identifica el tipo de joyería que incluye un kit de fabricación
        de joyas, como anillos o collares.
    jewelry_steam_cleaner_features:
      name: Características del limpiador de joyas a vapor
      description: Enumera características incorporadas notables o funciones de seguridad
        que diferencian los modelos.
    jewelry_type:
      name: Tipo de joyería
      description: Distingue entre tipos de joyería, como la joyería fina o de imitación.
    joint_connection:
      name: Conexión mediante junta
      description: Especifica la conexión conjunta de los tacos de billar, por ejemplo,
        compuestos o sin articulación.
    joint_face_type:
      name: Tipo de cara de junta
      description: Especifica el tipo de cara de junta de las flechas de los palos
        de billar, como completa o pilotada.
    joint_style:
      name: Estilo de junta
      description: Define el tipo de unión que se utiliza en los tacos de billar,
        como, por ejemplo, Uni-Loc o radial.
    journey_type:
      name: Tipo de viaje
      description: Especifica el tipo de viaje cubierto por el billete según el número
        de trayectos y la dirección del viaje.
    joystick_mounting_style:
      name: Estilo de montaje del joystick
      description: Indica cómo se asegura el conjunto del joystick a un panel de control
        o gabinete.
    joystick_sensor_technology:
      name: Tecnología del sensor del joystick
      description: Identifica la tecnología de detección principal utilizada para
        detectar movimiento o posición.
    jump_rope_design:
      name: Diseño de la comba
      description: Describe el tipo de soga para saltar, como regular o inteligente
    jumping_surface_color:
      name: Color de la superficie de salto
      description: Identifica el color de la superficie de salto del trampolín, como
        azul o negro
    jumping_surface_material:
      name: Material de la superficie de salto
      description: Especifica el tejido de la zona de salto del trampolín, por ejemplo,
        sintético o polipropileno.
    jumping_surface_pattern:
      name: Patrón de la superficie de salto
      description: Identifica el diseño o impresión en la superficie de salto de un
        trampolín, como con estrellas o con rayas
    karaoke_modes:
      name: Modos de karaoke
      description: Especifica el tipo de interpretación de karaoke, como individual
        o a dúo.
    kerosene_application:
      name: Aplicación de queroseno
      description: Identifica el uso específico del queroseno, como para calentadores
        o combustible para aviones.
    key_purpose:
      name: Propósito principal
      description: Especifica el tipo de cerradura para la que está diseñada una llave
        o una llave en bruto, por ejemplo, una puerta o un candado.
    keyboard_action:
      name: Acción del teclado
      description: Especifica la sensación de las teclas del piano, como acción martillo
        o teclas contrapesadas.
    keyboard_assembly_type:
      name: Tipo de ensamblaje del teclado
      description: Define el ensamblaje físico suministrado (p. ej., teclado independiente,
        reposamanos con teclado, conjunto de teclas individuales).
    keyboard_backlight_type:
      name: Tipo de retroiluminación del teclado
      description: Detalla la tecnología o estilo de iluminación utilizada para las
        teclas del teclado o carcasa.
    keyboard_format:
      name: Formato de teclado
      description: Define el tamaño y la distribución de un teclado, como de tamaño
        completo o compacto.
    keyboard_key_type:
      name: Tipo de tecla de teclado
      description: Describe la respuesta o sensación de las teclas de los teclados
        musicales, como contrapesadas o semicontrapesadas.
    keyboard_language:
      name: Idioma del teclado
      description: Especifica la distribución de idioma de un teclado, como ENG (inglés)
        o DEU (alemán).
    keyboard_layout:
      name: Diseño del teclado
      description: Especifica la disposición de las teclas de un teclado, por ejemplo,
        QWERTY o Workman.
    keyboard_mounting_style:
      name: Estilo de montaje del teclado
      description: Define el método de montaje de la placa interna que afecta el sonido
        y sensación de los teclados mecánicos.
    keyboard_port_type:
      name: Tipo de puerto del teclado
      description: Especifica el tipo de puerto para la conectividad del teclado,
        como USB tipo C.
    keyboard_specialized_features:
      name: Características especializadas del teclado
      description: Identifica características únicas de un teclado, como el ángulo
        ajustable o retroiluminación.
    keyboard_switch_type:
      name: Tipo de interruptor de teclado
      description: Especifica el estilo de respuesta del teclado, como táctil o de
        clic.
    keyboard_type:
      name: Tipo de teclado
      description: Especifica el diseño y la funcionalidad de un teclado, como, por
        ejemplo, estándar o retroiluminado.
    keycap_legend_printing_method:
      name: Método de impresión de leyenda de las teclas
      description: Describe cómo se aplican las leyendas a las teclas, impactando
        la longevidad y apariencia.
    keycap_material:
      name: Material de las teclas
      description: Indica el material principal o proceso de fabricación de las teclas
        que impacta la durabilidad, textura y leyendas.
    keycap_profile:
      name: Perfil de las teclas
      description: Especifica la familia de escultura o forma del conjunto de teclas,
        afectando la sensación de escritura y la estética.
    keypad_style:
      name: Estilo de teclado
      description: Define el método de introducción de teclados, como digital o alfanumérico.
    keystone_correction_type:
      name: Tipo de corrección trapezoidal
      description: Describe el tipo de corrección trapezoidal o geométrica que admite
        el proyector para eliminar la distorsión trapezoidal (p. ej., vertical manual,
        cuatro puntos automático).
    kiln_features:
      name: Características del horno
      description: Especifica las capacidades funcionales y características de diseño
        del horno.
    kiln_loading_style:
      name: Estilo de carga del horno
      description: Especifica el método por el cual los artículos se colocan y retiran
        de la cámara del horno.
    kit_construction_type:
      name: Tipo de kit de construcción
      description: Especifica el tejido del área de salto de un trampolín, por ejemplo,
        sintético o polipropileno.
    kitchen/dining_furniture_items_included:
      name: Artículos de mobiliario para cocinas y comedores incluidos
      description: Identifica el mobiliario específico incluido en un juego, como
        sillas de comedor o isla de cocina
    kitchen_utensil_items_included:
      name: Artículos de utensilios de cocina incluidos
      description: Identifica los utensilios que se incluyen en un juego de utensilios
        de cocina, como batidores o pinzas.
    kitesurfing_style:
      name: Estilo de kitesurf
      description: Define el estilo específico de kitesurf para el que está diseñado
        el producto, como, por ejemplo, montar olas.
    knee_brace_style:
      name: Estilo de órtesis de rodilla
      description: Define el diseño estructural de la órtesis, reflejando cómo se
        usa y el nivel de soporte proporcionado.
    kneeboard_features:
      name: Características de la rodillera
      description: Describe las características específicas de una rodillera, como
        de correa ajustable o antideslizante.
    knife_type:
      name: Tipo de cuchillo
      description: Clasifica las navajas según su diseño o uso previsto, como, por
        ejemplo, multiherramienta o EDC.
    knitting/padding_project_type:
      name: Tipo de proyecto de tejido/acolchado
      description: Identifica el uso previsto de materiales de tejido o acolchado,
        como colchas o confección de almohadas.
    knitting_project_type:
      name: Tipo de proyecto de tejido
      description: Especifica el tipo de proyecto de tejido, como la fabricación de
        almohadas o juguetes de peluche.
    knob/handle_design:
      name: Diseño de pomo/mango
      description: Describe el estilo de los tiradores del armario, como de perilla
        redonda o barra.
    knob_function:
      name: Función de perilla
      description: Especifica la función de los botones de mando del amplificador,
        como la ganancia o presencia.
    knob_style:
      name: Estilo de perilla
      description: Describe el diseño de los botones de mando de amplificadores de
        instrumentos musicales, como estándar o retro/vintage.
    knot_shape:
      name: Forma del nudo
      description: Especifica la forma o perfil general del nudo o cabeza del cepillo.
    labeling_project_type:
      name: Tipo de proyecto de etiquetado
      description: Especifica el propósito de las etiquetas de costura, como la elaboración
        de textiles para el hogar o de regalos personalizados.
    laboratory_freezer_design:
      name: Diseño de congeladores de laboratorio
      description: Describe la configuración de un congelador de laboratorio, como
        vertical o de tipo arcón.
    lacrosse_equipment_included:
      name: Equipo de lacrosse incluido
      description: Especifica los artículos que incluye un conjunto de equipo de lacrosse,
        como un palo de lacrosse u hombreras.
    ladder_type:
      name: Tipo de escalera
      description: Identifica el estilo de la escalera de la embarcación, como fija
        o telescópica.
    lamination_mode:
      name: Modo de laminación
      description: Identifica el tipo de proceso de laminación utilizado, como laminado
        en frío o laminado en caliente
    lamination_type:
      name: Tipo de laminación
      description: Identifica si la superficie del gráfico o modelo está laminada
        y, de ser así, si es de una cara o doble cara.
    lamp_assembly_type:
      name: Tipo de conjunto de lámpara
      description: Especifica si el producto es una bombilla desnuda, una lámpara
        con carcasa, un paquete doble u otra configuración de conjunto.
    lamp_quality_grade:
      name: Grado de calidad de la lámpara
      description: Indica si la lámpara es OEM original, utiliza una bombilla OEM
        en una carcasa compatible o es completamente del mercado secundario/compatible.
    lamp_type:
      name: Tipo de lámpara
      description: Especifica la fuente de luz que emplean las ampliadoras fotográficas,
        por ejemplo, la luz fría o dicroica.
    lancet_mechanism_type:
      name: Tipo de mecanismo de lanceta
      description: Define el mecanismo de operación o diseño de seguridad de las lancetas
        (p. ej., retráctil de seguridad, activado por presión).
    language:
      name: Idioma
      description: Especifica el idioma utilizado o compatible, por ejemplo, el inglés
        o multilingüe.
    language_version:
      name: Versión de idioma
      description: Especifica la versión de idioma de un producto multimedia, como
        ENG-US o ARA-árabe.
    laptop_cable_type:
      name: Tipo de cable del portátil
      description: Identifica el propósito funcional del cable dentro del portátil.
    laptop_housing_part_type:
      name: Tipo de pieza de carcasa del portátil
      description: Especifica qué componente exterior se proporciona (p. ej., base
        inferior, reposamanos, bisel).
    laser_color:
      name: Color del láser
      description: Identifica el color de un puntero láser, como rojo o verde.
    laser_light_source:
      name: Fuente de luz láser
      description: Especifica la tecnología de luz utilizada en los punteros láser,
        como la tecnología LED.
    laser_pattern:
      name: Patrón de láser
      description: Identifica el diseño o motivo producido por un láser, como estrellas
        o animales
    lathe_application:
      name: Aplicación del torno
      description: Especifica el tipo de trabajo para el que está diseñado un torno,
        como el torneado de acrílico o el trabajo con el vidrio.
    laundry_detergent_features:
      name: Características del detergente para la ropa
      description: Describe las características especiales del detergente para la
        ropa, como protección del color o la eliminación de manchas.
    lead_grade:
      name: Grado de mina
      description: Especifica el grado de plomo de los instrumentos de escritura,
        por ejemplo, H o 9B.
    leash_design:
      name: Diseño de la correa
      description: Describe la funcionalidad de las correas para mascotas, como desmontables
        o retráctiles
    leather/vinyl_texture:
      name: Textura del cuero/vinilo
      description: Describe la sensación de la superficie de los productos de cuero
        o vinilo, como suave o granulada.
    leather_type:
      name: Tipo de cuero
      description: Especifica la procedencia animal o el tipo del cuero utilizado
        en el producto (por ejemplo, piel de vaca, piel de becerro, cocodrilo, pitón,
        sintético).
    lectern_mounting_type:
      name: Tipo de montaje de atril
      description: Especifica el estilo de configuración de un atril, como de mesa
        o suelo.
    led_light_mode:
      name: Modo de luz LED
      description: Enumera los modos de operación seleccionables que combinan diferentes
        espectros o intensidades (p. ej., azul, rojo, azul y rojo).
    leg_color:
      name: Color de la pata
      description: Define el tono de las patas de un producto, por ejemplo, blanco
        o marrón.
    leg_lock_type:
      name: Tipo de bloqueo de patas
      description: Especifica el tipo de bloqueo de pata que se usa en los accesorios
        electrónicos, normalmente palos para selfies, como, por ejemplo, el cierre
        giratorio.
    leg_material:
      name: Material de la pata
      description: Especifica el material utilizado para las patas de un producto,
        como el cerezo o el bambú.
    leg_pattern:
      name: Patrón de las patas
      description: 'Define el diseño o estampado de las patas del producto, como animales
        o motivos geométricos. '
    leg_sections:
      name: Secciones de patas
      description: Indica el número de secciones de patas de accesorios electrónicos,
        normalmente palos para selfies, como, por ejemplo, 5+.
    legend_type:
      name: Tipo de leyenda
      description: Indica si el marcador está en blanco o preimpreso con números,
        letras, símbolos u otras marcas.
    length_adjustability:
      name: Ajustabilidad de longitud
      description: Indica si el usuario puede alterar la longitud de la correa o cadena
        o si es fija.
    lens/slide_material:
      name: Material de la lente/diapositiva
      description: Especifica el material utilizado en la fabricación de lentes o
        diapositivas, como plástico o vidrio.
    lens_cap_compatible_device:
      name: Dispositivo compatible con tapa de objetivo
      description: Especifica el equipo compatible con tapas de objetivos, como monocular
        o cámara digital.
    lens_case_accessories_included:
      name: Accesorios de estuche para lentes incluidos
      description: Enumera artículos adicionales empaquetados con el estuche (p. ej.,
        pinzas, botella de solución).
    lens_characteristic:
      name: Características de las lentes
      description: Enumera las características funcionales especiales aplicadas a
        las lentes (p. ej., bloqueo de luz azul, UV400).
    lens_coating:
      name: Recubrimiento de lentes
      description: Especifica el tipo de revestimiento de las lentes para gafas, como,
        por ejemplo, antirreflectante y resistente a los arañazos.
    lens_color:
      name: Color de lente
      description: Especifica el color de los cristales de las gafas, como amarillo
        o negro.
    lens_color_combination:
      name: Combinación de colores de lentes
      description: Especifica el emparejamiento de colores de lentes utilizado para
        gafas 3D anaglifas.
    lens_configuration:
      name: Configuración del objetivo
      description: Especifica la configuración de la lente de elementos como lupas,
        como sencilla o múltiple.
    lens_filter_category:
      name: Categoría de filtro de lente
      description: Especifica la categoría de filtro estándar europea (0–4) que clasifica
        las lentes por su densidad de tinte y las condiciones de iluminación para
        las que son adecuadas.
    lens_filter_effects:
      name: Efectos de filtro del objetivo
      description: Describe los efectos específicos que proporciona un filtro de objetivo,
        como la corrección de color o macro.
    lens_filter_type:
      name: Tipo de filtro del objetivo
      description: Especifica la categoría de filtro para objetivos de cámara, por
        ejemplo, el degradado o la densidad neutra.
    lens_kit_accessories_included:
      name: Accesorios para el kit de lentes incluidos
      description: Enumera los elementos complementarios proporcionados con el kit
        de lentes o filtros del teléfono para que los compradores sepan exactamente
        lo que obtendrán y puedan comparar paquetes.
    lens_material:
      name: Material de la lente
      description: Identifica el material principal utilizado para los elementos ópticos
        o la carcasa de la lente, como vidrio óptico, plástico o aleación de aluminio.
    lens_pattern:
      name: Patrón de la lente
      description: Describe el diseño o la apariencia visual de los lentes de las
        gafas, como sólidos o con textura
    lens_polarization:
      name: Polarización de lentes
      description: Indica el tipo de polarización de los cristales de las gafas, como,
        por ejemplo, fotocromáticos polarizados.
    lens_protector_coverage_style:
      name: Estilo de cobertura del protector de la lente
      description: Define el factor de forma física o el diseño de cobertura de un
        protector de lente de cámara de teléfono móvil.
    lens_protector_features:
      name: Características del protector de la lente
      description: Enumera las características funcionales especiales que ofrece el
        protector.
    lens_refractive_index:
      name: Índice de refracción de la lente
      description: Especifica el índice de refracción numérico (p. ej., 1.50, 1.60,
        1.67) que se correlaciona directamente con el grosor y peso de la lente.
    lens_storage_type:
      name: Tipo de almacenamiento de la lente
      description: Describe el tipo de almacenamiento para objetivos para cámaras,
        como maletín para objetivos o bolsas para objetivos
    lens_tint_type:
      name: Tipo de tinte de lente
      description: Describe el tinte aplicado a la lente para visibilidad de manipulación
        o propósitos cosméticos.
    lens_type:
      name: Tipo de lentes
      description: Especifica el tipo de lente de las gafas, como polarizadas o progresivas.
    license_type:
      name: Tipo de licencia
      description: Especifica el tipo de licencia de software, como de código abierto
        o compra única.
    lid_material:
      name: Material de la tapa
      description: Identifica el material principal utilizado en la tapa del producto,
        como el vidrio o el acero inoxidable.
    lid_type:
      name: Tipo de tapa
      description: Especifica el tipo de tapa utilizada, como abatible o a presión.
    life_jacket_features:
      name: Características del chaleco salvavidas
      description: Destaca las características únicas de los chalecos salvavidas,
        como reflectantes o flotantes.
    light_attachment_type:
      name: Tipo de sujeción de luz
      description: Describe cómo se fija una luz de lectura, como flexible o fija.
    light_color:
      name: Color de la luz
      description: Define el color o tono de la luz, como blanco o multicolor.
    light_control:
      name: Control de luz
      description: Define el nivel de bloqueo de luz de los tratamientos de ventana,
        como, por ejemplo, opaco o transparente.
    light_design:
      name: Diseño de luces
      description: Describe el tipo de diseño de luz de los accesorios de la cámara,
        como LED o anular.
    light_exposure_modes:
      name: Modos de exposición a la luz
      description: Especifica las opciones de ajuste de luz de las cámaras, como AE
        con prioridad de obturación o AE con prioridad de apertura.
    light_filtering:
      name: Filtrado de la luz
      description: Especifica las capacidades de filtrado de luz de un producto, como
        de difusión o de opacidad.
    light_options:
      name: Opciones de luz
      description: Especifica las características de iluminación de un producto, como
        de resplandor suave o con cambio de color.
    light_pattern:
      name: Patrón de luz
      description: Define el tema visual de los productos de iluminación, por ejemplo,
        geométrico o arcoíris
    light_rejection_type:
      name: Tipo de rechazo de luz
      description: Indica si y cómo la pantalla rechaza la luz ambiental o del techo,
        mejorando el contraste de la imagen en entornos brillantes.
    light_source:
      name: Fuente de luz
      description: Identifica el tipo de bombilla que se usa en un producto, como
        LED o fluorescente.
    light_spectrum:
      name: Espectro de luz
      description: Define el rango de longitudes de onda de luz que puede producir
        un producto, por ejemplo, luz azul o infrarroja.
    light_temperature:
      name: Temperatura de la luz
      description: Define las características de color de las fuentes de luz, como
        el blanco cálido o la luz diurna.
    light_therapy_device_form_factor:
      name: Factor de forma del dispositivo de fototerapia
      description: Describe el estilo físico o configuración del dispositivo (p. ej.,
        panel, máscara, portátil).
    light_type:
      name: Tipo de luz
      description: Identifica el tipo específico de luz utilizada en embarcaciones,
        por ejemplo, navegación o bajo el agua.
    lighting_features:
      name: Características de iluminación
      description: Describe características especiales de la iluminación, como el
        brillo ajustable o la iluminación LED.
    lighting_options:
      name: Opciones de iluminación
      description: Especifica el tipo de iluminación de la señalización, como iluminada
        o no iluminada.
    lighting_type:
      name: Tipo de iluminación
      description: Describe cualquier característica de iluminación integrada de los
        auriculares.
    line/rope_type:
      name: Tipo de cuerdas y sogas
      description: Identifica el estilo de fabricación de las líneas de anclaje o
        cuerdas, como de tres hilos o doble trenzado.
    line_spacing_options:
      name: Opciones de interlineado
      description: Identifica opciones de interlineado, normalmente en máquinas de
        escribir, como, por ejemplo, doble o ajustable.
    liner_features:
      name: Características del perfilador
      description: Describe las características especiales de los forros, como a prueba
        de fugas o biodegradables.
    lip_balm_tint_level:
      name: Nivel de tinte del bálsamo labial
      description: Clasifica el nivel de tinte o intensidad de color que proporciona
        el bálsamo.
    lip_gloss_applicator_type:
      name: Tipo de aplicador de brillo labial
      description: Identifica el estilo de aplicador incluido con el brillo labial,
        que afecta la facilidad de aplicación y la preferencia del usuario.
    lip_gloss_effect:
      name: Efecto de brillo labial
      description: Describe el efecto o acabado que proporciona un brillo labial,
        por ejemplo, suavizar o aumentar el volumen.
    lip_gloss_formulation:
      name: Formulación de brillo labial
      description: Define la textura o formato principal del brillo labial.
    lip_liner_design:
      name: Diseño del perfilador de labios
      description: Identifica el tipo de perfilador de labios, como retráctil o fijo
    lip_makeup_opacity:
      name: Opacidad del maquillaje de labios
      description: Indica el nivel de cobertura u opacidad del producto una vez aplicado.
    lip_plate_material:
      name: Material del protector de la embocadura
      description: Identifica el material utilizado para la placa labial de una flauta,
        como la plata o la madera.
    lipstick_coverage:
      name: Cobertura de lápiz labial
      description: Describe el nivel de opacidad del color que proporciona el lápiz
        labial (p. ej., transparente, medio, completo).
    lipstick_effect:
      name: Efecto de lápiz labial
      description: Describe el efecto o acabado que proporciona un lápiz labial, por
        ejemplo, suavizar o aumentar el volumen.
    liqueur_variety:
      name: Variedad de licor
      description: Clasifica los licores por sus perfiles de sabor primarios, por
        ejemplo, nuez o crema.
    livestock_food_ingredients:
      name: Ingredientes alimentarios para ganado
      description: Especifica los ingredientes principales de los piensos para animales,
        como la cebada o la harina de soja.
    lnb_output:
      name: Salida del LNB
      description: Especifica el número de conexiones del receptor de satélite, como
        simples o cuádruples.
    lnb_technology:
      name: Tecnología del LNB
      description: Clasifica el tipo de tecnología de los los LNB para satélite, como
        universal o de bajo ruido.
    load_capacity:
      name: Capacidad de carga
      description: Especifica el límite de peso que un producto puede soportar, como
        servicio ligero o pesado.
    loading_ramp_type:
      name: Tipo de rampa de carga
      description: Identifica el estilo de rampa de carga para vehículos, como sencillo
        o plegable en tres hojas.
    loading_type:
      name: Tipo de carga
      description: Especifica cómo se cargan los electrodomésticos de lavandería,
        como de carga frontal o superior.
    lock_placement:
      name: Colocación de bloqueo
      description: Identifica dónde está colocado el bloqueo en las piezas del motor
        de la embarcación, como fuera de borda o a bordo.
    lock_type:
      name: Tipo de cerradura
      description: Especifica el mecanismo de bloqueo que utiliza un producto, como
        una clave o un código.
    locking_mechanism:
      name: Mecanismo de cierre
      description: Especifica el tipo de cerradura utilizada, normalmente en productos
        de seguridad, como, por ejemplo, cierre automático o pestillo.
    logic_family:
      name: Familia lógica
      description: Identifica la familia lógica o tecnología de semiconductores del
        CI.
    lovibond:
      name: Lovibond
      description: Indica la intensidad del color de los granos y maltas de elaboración
        de cerveza, como clara u oscura.
    lubricant_application:
      name: Aplicación del lubricante
      description: Define las zonas de aplicación adecuadas del lubricante personal,
        como, por ejemplo, masaje o vaginal.
    lubricant_composition:
      name: Composición del lubricante
      description: Define el ingrediente base de los lubricantes personales, como
        los de base acuosa o silicona.
    lubricant_dispenser_type:
      name: Tipo de dispensador de lubricante
      description: Identifica el tipo de embalaje o contenedor de lubricantes, como
        un bidón o una botella.
    lubricant_effect:
      name: Efecto del lubricante
      description: Indica cualquier efecto funcional o estilo proporcionado por la
        lubricación del condón.
    lubricant_form:
      name: Forma de lubricante
      description: Describe la consistencia de un lubricante, como en gel o pasta.
    luggage/bag_closure:
      name: Cierre de equipaje/bolso
      description: Identifica el tipo de cierre utilizado en equipaje o bolsas, como
        de cremallera o broche.
    lumber/wood_type:
      name: Tipo de madera
      description: Identifica el tipo específico de madera utilizada en un producto,
        como de roble o pino.
    lyre/flip_folder_attachment_type:
      name: Tipo de montate para carpeta o abrazadera para partitura
      description: Especifica el tipo de fijación de liras musicales y carpetas plegables,
        como de correa o abrazadera para lira.
    m_2_drive_length_supported:
      name: Longitud de unidad M.2 soportada
      description: Especifica qué longitudes de tarjeta M.2 puede aceptar el gabinete
        o adaptador.
    magnet_type:
      name: Tipo de imán
      description: Identifica el tipo de imán que se usa en un producto, como, por
        ejemplo, cerámico o de titanio.
    magnification:
      name: Aumento
      description: Especifica el poder de aumento de un producto, como 1x o 100x.
    magsafe_compatibility:
      name: Compatibilidad con MagSafe
      description: Indica si el accesorio es compatible con el ecosistema de carga
        o la fijación magnética MagSafe de Apple.
    makeup_brush_application:
      name: Aplicación de brocha de maquillaje
      description: Especifica el uso cosmético principal o área para la que está diseñada
        la brocha (p. ej., base, sombra de ojos, contorno).
    makeup_features:
      name: Características del maquillaje
      description: Destaca las características clave de los cosméticos, como la alta
        pigmentación o la ausencia de fragancia.
    makeup_shade:
      name: Tono de maquillaje
      description: Describe el tono de los cosméticos, como el rosa medio o el marrón
        oscuro
    mallet_material:
      name: Material del mazo
      description: Identifica el tipo de material utilizado en los mazos de percusión,
        como el latón o el caucho.
    management_type:
      name: Tipo de gestión
      description: Describe el nivel de capacidad de gestión del dispositivo (p. ej.,
        completamente gestionado, gestión inteligente, no gestionado), para que los
        compradores puedan hacer coincidir las capacidades del producto con los requisitos
        de la red.
    mandibular_device_fitting_method:
      name: Método de ajuste del dispositivo mandibular
      description: Describe cómo se ajusta o moldea el dispositivo a los dientes del
        usuario.
    mandolin_back_shape:
      name: Forma del respaldo de la mandolina
      description: Especifica la curvatura y el diseño del respaldo de la mandolina,
        como respaldo plano o arqueado
    manufacturer_type:
      name: Tipo de fabricante
      description: Especifica el origen de las piezas o accesorios del vehículo, como
        originales o de terceros.
    map_update_policy:
      name: Política de actualización de mapas
      description: Indica cómo se proporcionan o tarifan las actualizaciones de mapas
        para el dispositivo.
    marine_navigator_features:
      name: Características del navegador marino
      description: Especifica las capacidades de las herramientas de navegación marítima,
        como la pantalla táctil o la impermeabilidad.
    marker_format:
      name: Formato del marcador
      description: Define el estilo físico o construcción del marcador.
    marker_text_color:
      name: Color del texto del marcador
      description: Especifica el color de la leyenda o texto impreso en la superficie
        del marcador (distinto del color del cuerpo del marcador).
    marker_tip_design:
      name: Diseño de la punta del marcador
      description: Describe la forma de la punta de un rotulador, como de bala o cincel.
    marquee_substrate:
      name: Sustrato de marquesina
      description: Especifica el medio físico en el que se imprime o suministra la
        obra de arte (p. ej., película translúcida, acrílico impreso al reverso, calcomanía
        de vinilo).
    mascara_brush_shape:
      name: Forma del cepillo de máscara de pestañas
      description: Especifica la forma o diseño de la varita o cepillo del primer
        incorporado, que influye fuertemente en la aplicación y los resultados.
    mascara_effect:
      name: Efecto del rímel
      description: Describe el resultado o característica deseada del rímel, por ejemplo,
        rizado o alargamiento.
    mascara_formulation:
      name: Formulación de máscara de pestañas
      description: Indica la composición base del producto o tecnología especial (p.
        ej., líquida, infundida con fibra, tubular) que afecta la textura, el uso
        y la eliminación.
    mask_cushion_material:
      name: Material del cojín de la mascarilla
      description: Detalla el material específico usado para el cojín o sello de la
        mascarilla.
    mask_size:
      name: Tamaño de la mascarilla
      description: Especifica la designación de tamaño proporcionada por el fabricante.
    mask_type:
      name: Tipo de máscara
      description: Especifica el diseño de mascarillas, típicamente para el cuidado
        respiratorio, como, por ejemplo, oral o nasal.
    masonry_material:
      name: Material de albañilería
      description: Especifica la composición de los artículos de albañilería, como
        el cemento o la piedra caliza.
    masonry_product_form:
      name: Forma de producto de mampostería
      description: Especifica la forma de los productos de albañilería, como en pasta
        o polvo.
    massage_area:
      name: Zona de masaje
      description: Especifica la parte del cuerpo que el producto puede masajear,
        por ejemplo, los pies o el cuello.
    massage_mechanism_dimensionality:
      name: Dimensionalidad del mecanismo de masaje
      description: Especifica el número de ejes de movimiento en los que operan los
        rodillos de masaje (p. ej., 2D, 3D, 4D, 5D).
    massage_stone_texture:
      name: Textura de la piedra de masaje
      description: Describe la sensación de la superficie de las piedras de masaje,
        como suave o rugosa.
    massage_technique:
      name: Técnica de masaje
      description: Define los métodos de masaje que ofrece un producto, por ejemplo,
        percusión o de tejido profundo.
    mat/rug_shape:
      name: Forma del tapete/alfombra
      description: Describe la forma o el diseño de tapetes o alfombras, como redondas
        o cuadradas.
    mat_base_material:
      name: Material de la base de la alfombrilla
      description: Especifica el tipo de material utilizado para la base de las colchonetas,
        como corcho o viscoelástica.
    mat_features:
      name: Características de la alfombrilla
      description: Describe características específicas de las alfombrillas para el
        hogar o la oficina, como la base antideslizante o impermeable.
    material:
      name: Material
      description: Define el material primario de un producto, como el algodón o la
        lana.
    material_firmness:
      name: Firmeza del material
      description: Describe la dureza o suavidad de un producto, por ejemplo, rígido
        o flexible.
    material_hardness:
      name: Dureza del material
      description: Define la firmeza del producto, sobre todo del material deportivo
        de fitness, como, por ejemplo, extra suave o alta resistencia.
    material_origin:
      name: Origen del material
      description: Indica la forma o el estado en que se suministran los materiales
        preciosos (p. ej., sueltos/sin montar, joyas terminadas, tarjeta de regalo
        impresa/digital).
    material_treatment:
      name: Tratamiento del material
      description: Especifica los tratamientos químicos o físicos aplicados a los
        materiales para su conservación o seguridad (p. ej., tratamiento térmico,
        fumigación, tratamiento químico).
    maternity_clothing_features:
      name: Características de la ropa de maternidad
      description: Describe las características únicas de la ropa de maternidad, por
        ejemplo, el espacio para el crecimiento del abdomen o las copas de apoyo.
    maternity_sleepwear_style:
      name: Estilo de la ropa de dormir de maternidad
      description: Especifica el estilo de la ropa de dormir de maternidad, como un
        mono o una camisa de dormir
    mattress_features:
      name: Características del colchón
      description: Destaca las características especiales de un colchón, como la función
        hipoalergénica o refrescante.
    maximum_bit_depth:
      name: Profundidad de bits máxima
      description: Define la longitud de palabra digital más alta (en bits) que soporta
        el convertidor, afectando el rango dinámico y la resolución.
    maximum_magnification:
      name: Aumento máximo
      description: Indica el factor de ampliación más alto que puede alcanzar un microscopio,
        como 10x o 100x.
    maximum_reel_diameter_supported:
      name: Diámetro máximo de bobina admitido
      description: Especifica el diámetro de bobina más grande que puede acomodar
        la platina.
    measured_parameters:
      name: Parámetros medidos
      description: Enumera las métricas eléctricas o de batería que el dispositivo
        puede medir o mostrar.
    measuring_method:
      name: Método de medición
      description: Define la técnica utilizada para cuantificar la grasa corporal,
        por ejemplo, óptica o mediante pinzas.
    measuring_tool_features:
      name: Características de la herramienta de medición
      description: Describe características especiales de herramientas de medición,
        como una cámara incorporada o portátil.
    measuring_type:
      name: Tipo de medición
      description: Especifica el método de medición de dispositivos de salud, por
        ejemplo, en la frente o el dedo.
    meat_cut:
      name: Corte de carne
      description: Ayuda a identificar el corte o estilo específico de carne, por
        ejemplo, hamburguesa o alitas.
    meat_type:
      name: Tipo de carne
      description: Identifica el origen de productos los cárnicos, por ejemplo, el
        pollo o el origen vegetal.
    media_access:
      name: Acceso a multimedia
      description: Define cómo los clientes pueden acceder a los medios, por ejemplo,
        mediante suscripción digital, impresión y en línea.
    media_content_type:
      name: Tipo de contenido multimedia
      description: Identifica el género o categoría del contenido multimedia, como
        reality shows o comedias en vivo.
    media_format:
      name: Formato multimedia
      description: Define los formatos multimedia compatibles para un dispositivo,
        como vinilo o VHS.
    media_physical_size:
      name: Tamaño físico del medio
      description: Especifica el tamaño físico estandarizado o factor de forma del
        medio en blanco.
    media_player_form_factor:
      name: Factor de forma del reproductor multimedia
      description: Describe el estilo físico del dispositivo, ayudando a los compradores
        a elegir entre dispositivos compactos tipo stick y cajas decodificadoras más
        grandes.
    media_section:
      name: Sección de medios
      description: Identifica la categoría específica de un periódico o revista, como
        los deportes o la política.
    media_theme:
      name: Tema de multimedia
      description: Clasifica el contenido multimedia según su enfoque principal, como
        viajes o juegos.
    medical_alarm_features:
      name: Características de la alarma médica
      description: Describe las capacidades de un sistema de alarma médica, como la
        batería de larga duración o la comunicación bidireccional.
    medical_device_certification:
      name: Certificación de dispositivo médico
      description: Enumera las aprobaciones regulatorias o estándares con los que
        cumple el monitor biométrico (p. ej., CE, FDA 510(k)).
    medical_identification_type:
      name: Tipo de identificación médica
      description: Identifica la forma de identificación médica, como una pulsera
        o un collar
    medical_symbol:
      name: Símbolo médico
      description: Especifica el símbolo mostrado en la joya o etiqueta, ayudando
        al reconocimiento rápido por parte de los socorristas.
    medical_syringe_purpose:
      name: Uso de la jeringa médica
      description: Identifica el uso previsto de una jeringa médica, como de inyección
        o irrigación.
    medical_tape_material:
      name: Material de la cinta médica
      description: Identifica la composición de la cinta médica, como el plástico
        o el látex.
    medicine/drug_form:
      name: Forma de la medicina/medicamento
      description: Identifica la forma física de un medicamento o fármaco, como en
        pastillas o líquido.
    medicine/supplement_form:
      name: Forma de la medicina/suplemento
      description: Identifica la forma física de un medicamento o suplemento, como
        en pastillas o líquido.
    medium:
      name: Medio
      description: Identifica el tipo de objeto coleccionable, como recuerdos o tarjetas
        coleccionables.
    melodica_style:
      name: Estilo melódica
      description: Especifica el estilo de diseño de un instrumento melódico, como
        estilo piano o estilo teclado.
    memory_channels:
      name: Canales de memoria
      description: Define la capacidad de transmisión de datos de los procesadores
        informáticos, como duales o cuádruples.
    memory_form_factor:
      name: Factor de forma de memoria
      description: Especifica el diseño físico de los módulos de memoria, como DIMM
        o micro-DIMM.
    memory_rank:
      name: Rango de memoria
      description: Indica la distribución de rangos del módulo (cómo se organizan
        los chips), afectando la compatibilidad y el ajuste del rendimiento.
    memory_storage_type:
      name: Tipo de almacenamiento de memoria
      description: Identifica el tipo de almacenamiento de memoria utilizado en las
        cámaras, como la tarjeta Micro SD o la memoria incorporada.
    memory_technology:
      name: Tecnología de memoria
      description: Especifica el tipo de memoria que se usa en dispositivos electrónicos,
        como DDR o SDRAM.
    menstrual_cup_shape:
      name: Forma de la copa menstrual
      description: Describe la forma de las copas menstruales, por ejemplo, de campana,
        en forma de V.
    menstrual_cup_size:
      name: Tamaño de copa menstrual
      description: Indica la categoría de tamaño etiquetada por el fabricante (p.
        ej., pequeña, talla 1).
    menstrual_cup_stem_type:
      name: Tipo de tallo de copa menstrual
      description: Especifica el diseño del tallo o asa de extracción de la copa.
    mesh_networking_technology:
      name: Tecnología de red de malla
      description: Especifica si el punto de acceso admite capacidad de malla y el
        estándar o protocolo utilizado.
    mesh_type:
      name: Tipo de malla
      description: Especifica el estilo o la construcción del tejido de malla, indicando
        su uso previsto o características, por ejemplo, atlética, satinada.
    metal_detector_features:
      name: Características del detector de metales
      description: Destaca las características únicas de los detectores de metales,
        por ejemplo, la funda o la resistencia al agua.
    metal_molding_application:
      name: Aplicación de moldura de metal
      description: Identifica el uso previsto de los moldes de fundición de metal,
        como la elaboración de joyas o figuritas.
    meter_type:
      name: Tipo de medidor
      description: Identifica el tipo de medidor utilizado en los sistemas de combustible
        de embarcaciones, como digital o analógico.
    metrics_supported:
      name: Métricas compatibles
      description: Especifica los tipos de mediciones biométricas que proporciona
        un producto, como, por ejemplo, masa ósea o muscular.
    micrometer_type:
      name: Tipo de micrómetro
      description: Identifica la aplicación o el diseño específico de un micrómetro,
        como de hoja o calibre.
    microphone_design:
      name: Diseño de micrófono
      description: Define la categoría de diseño de los micrófonos, por ejemplo, condensador,
        dinámico.
    microphone_preamp_form_factor:
      name: Factor de forma del preamplificador de micrófono
      description: Identifica el estilo físico o formato de carcasa del preamplificador
        de micrófono para instalación o uso.
    microphone_thread:
      name: Rosca de micrófono
      description: Especifica el tamaño de rosca de micrófonos, por ejemplo, 1/4"-20
        o M6.
    microphone_type:
      name: Tipo de micrófono
      description: Define la tecnología de micrófono utilizada, como de condensador
        o dinámica.
    microphone_windshield_type:
      name: Tipo de paravientos para micrófono
      description: Especifica el estilo de construcción del paravientos (p. ej., espuma
        deslizante, deadcat peludo, dirigible, canasta), para que los usuarios puedan
        seleccionar rápidamente la solución adecuada para el ruido del viento.
    microscope_features:
      name: Características del microscopio
      description: Destaca aspectos únicos de los microscopios, como la portabilidad
        o la función de memoria.
    microscope_slide_material:
      name: Material del portaobjetos de microscopio
      description: Especifica el tipo de material utilizado en los portaobjetos de
        microscopio, como el vidrio o el plástico.
    midi_connectivity:
      name: Conectividad MIDI
      description: Identifica el tipo de conexión MIDI de los instrumentos musicales,
        como MIDI in o USB midi.
    mimo_technology:
      name: Tecnología MIMO
      description: Indica la tecnología inalámbrica de múltiple entrada y múltiple
        salida admitida por el enrutador.
    mineral_class:
      name: Clase de minerales
      description: Identifica la categoría específica de un mineral, como óxidos o
        silicatos.
    mineral_compound_form:
      name: Forma del compuesto mineral
      description: Especifica la forma química o quelato del mineral (p. ej., citrato,
        glicinato) que afecta la absorción.
    minimum_magnification:
      name: Aumento mínimo
      description: Indica el nivel de aumento más bajo de una lente de microscopio,
        como 1x o 0,5x.
    mirror_handle_design:
      name: Diseño de mango de espejo
      description: Describe el estilo del mango de los espejos dentales, como los
        de doble extremo o de un solo extremo.
    mirror_sides:
      name: Lados del espejo
      description: Indica el número o configuración de superficies reflectantes que
        tiene un espejo (p. ej., de un solo lado, doble cara, triple).
    mist_application_area:
      name: Área de aplicación de la bruma
      description: Indica el área(s) de uso previsto para la bruma (p. ej., cuerpo,
        cabello, habitación, lino).
    mixer_type:
      name: Tipo de mezcladora
      description: Clasifica las mesas de mezcla de DJ según su diseño, como digitales
        o Scratch.
    mobile_mounting_type:
      name: Tipo de montaje móvil
      description: Especifica dónde se puede colocar un móvil para bebé como, por
        ejemplo, una cuna o un cochecito.
    mobile_movement:
      name: Movimiento del móvil
      description: Describe el mecanismo de los móviles para bebés, como los que funcionan
        con pilas o los de cuerda.
    mobile_phone_accessories_included:
      name: Accesorios para teléfono móvil incluidos
      description: Enumera los artículos suplementarios proporcionados en el conjunto
        de accesorios para teléfono móvil para que los compradores sepan exactamente
        qué componentes están incluidos.
    mobile_phone_case_features:
      name: Características de la funda para móviles
      description: Describe las características únicas de una funda para teléfono
        móvil, como la resistencia a golpes o el ajuste perfecto.
    mobile_phone_connector_type:
      name: Tipo de conector de teléfono móvil
      description: Identifica el estándar de interfaz de un módulo de puerto de datos
        o de carga de reemplazo.
    mobile_phone_form_factor:
      name: Factor de forma del teléfono móvil
      description: Estilo de diseño físico del teléfono.
    mobility/accessibility_equipment_features:
      name: Características del equipo de movilidad/accesibilidad
      description: Describe características únicas de los dispositivos de ayuda a
        la accesibilidad, como la batería de larga duración o la parada de emergencia.
    mobility_scooter_type:
      name: Tipo de scooter de movilidad
      description: Distingue entre diferentes tipos de scooters eléctricos, como,
        por ejemplo, portátiles o de 3 ruedas.
    mobility_type:
      name: Tipo de movilidad
      description: Indica el estilo de base que afecta la movilidad, distinguiendo
        entre pies estacionarios, ruedas rodantes u opciones intercambiables.
    model_control_technology:
      name: Tecnología de control de modelo
      description: Especifica el tipo de sistema de control de trenes en miniatura,
        como inalámbrico o digital.
    model_gender_representation:
      name: Representación de género del modelo
      description: Especifica si el modelo humano representa anatomía masculina, femenina
        o unisex.
    model_train_accessory_type:
      name: Tipo de accesorios para trenes en miniatura
      description: Clasifica los accesorios de los trenes en miniatura, como los materiales
        de iluminación o escenografía.
    model_train_theme:
      name: Tema de trenes en miniatura
      description: Identifica el entorno o la época de un tren en miniatura, como
        moderno o de ciencia ficción.
    modem_form_factor:
      name: Factor de forma del módem
      description: Describe el estilo de diseño físico del módem (p. ej., dongle USB,
        unidad de escritorio, módulo M.2).
    modem_technology:
      name: Tecnología del módem
      description: Especifica el medio de transmisión principal o la tecnología de
        red que utiliza el módem para acceder a la red del proveedor de servicios
        (p. ej., Cable/DOCSIS, DSL, Celular).
    modulation_method:
      name: Método de modulación
      description: Especifica la técnica que se usa para modificar una señal en dispositivos
        electrónicos, como AM o PCM.
    moisturizer_type:
      name: Tipo de crema hidratante
      description: Identifica el tiempo de uso de la crema hidratante, como cuidado
        de todo el día o nocturno
    mold/cut_shape:
      name: Forma del molde/corte
      description: Describe la forma o el diseño de un molde o corte artesanal, como
        una estrella o un animal.
    mold_shape:
      name: Forma del molde
      description: Describe la forma o patrón de un molde artesanal, como redondo
        o con de letra.
    molding_application:
      name: Aplicación de moldura
      description: Especifica el tipo de moldura que se usa en la construcción, como
        los revestimientos o guardasillas.
    molding_shape:
      name: Forma de moldura
      description: Describe la forma o patrón de un molde de cemento, como de bloque
        o columna.
    monitor/screen_specialized_features:
      name: Características especializadas del monitor/pantalla
      description: Detalla características específicas de una pantalla, como altavoces
        integrados o adecuados para juegos.
    monitor_mounting_type:
      name: Tipo de montaje del monitor
      description: Identifica cómo se instala un monitor de seguridad, como en la
        pared o independiente.
    monitor_shape:
      name: Forma del monitor
      description: Especifica el contorno de la pantalla de un monitor, como plano
        o curvo.
    monitor_specialized_features:
      name: Características especializadas del monitor
      description: Destaca las características únicas de un monitor de equipo informático,
        como la compatibilidad 3D o el ángulo de visión ajustable.
    monitor_type:
      name: Tipo de monitor
      description: Especifica el tipo de monitor de la cámara, por ejemplo, pantalla
        táctil o HDR.
    monitoring_method:
      name: Método de monitoreo
      description: Identifica la técnica fisiológica que usa el dispositivo para obtener
        lecturas de glucosa.
    monitoring_service_type:
      name: Tipo de servicio de monitoreo
      description: Indica si el sistema es monitoreado profesionalmente 24/7, automonitoreado
        o sin monitoreo.
    monocular_design:
      name: Diseño monocular
      description: Identifica la funcionalidad de un monocular, como el zoom o la
        visión nocturna.
    motherboard_chipset_family:
      name: Familia de chipset de placa base
      description: Especifica el tipo de chipset de una placa base, como Intel o NVIDIA.
    motherboard_form_factor:
      name: Factor de forma de placa base
      description: Especifica las dimensiones físicas y los estándares de la placa
        base, por ejemplo, ATX o Mini-ITX.
    motherboard_memory_features:
      name: Características de memoria de la placa base
      description: Describe las características de memoria de una placa base, como
        ECC o sin búfer.
    motion:
      name: Movimiento
      description: Define el tipo de movimiento del equipamiento para bebés, como
        vibración o rebote.
    motion_sensor_type:
      name: Tipo de sensor de movimiento
      description: Identifica la tecnología utilizada en los sensores de movimiento,
        como infrarrojos o láser.
    motor_starting_method:
      name: Método de arranque del motor
      description: Identifica el método utilizado para arrancar un motor, como DOL
        o por autotransformador.
    motor_type:
      name: Tipo de motor
      description: Especifica si el taladro utiliza un motor con escobillas o sin
        escobillas, impactando el ruido, la longevidad y el precio.
    motor_vehicle_placement:
      name: Colocación de vehículos de motor
      description: Identifica en qué parte de un vehículo encaja la pieza, como la
        parte delantera o trasera.
    motor_vehicle_type:
      name: Tipo de vehículo motorizado
      description: Especifica la categoría de vehículo a motor, como una berlina o
        SUV.
    motorcycle/scooter_type:
      name: Tipo de motocicleta/scooter
      description: Clasifica el tipo de motocicleta o scooter, como todoterreno o
        ciclomotor.
    motorcycle_drive_type:
      name: Tipo de tracción de motocicleta
      description: Especifica el mecanismo de transmisión de la motocicleta, como
        de eje o cadena.
    motorcycle_glove_purpose:
      name: Propósito del guante de motocicleta
      description: Identifica el uso previsto de los guantes de motocicleta, como
        todoterreno o turismo.
    motorcycle_tire_type:
      name: Tipo de neumáticos para motocicletas
      description: Clasifica el neumático de motocicleta en función de su uso, como
        de competición o scooter.
    mount/stand_features:
      name: Características de montaje/soporte
      description: Detalla las características específicas del soporte de un producto,
        como el ángulo ajustable o plegable.
    mount_installation_point:
      name: Punto de instalación del soporte
      description: Indica dónde en el vehículo o equipo se instala el soporte.
    mount_interface_system:
      name: Sistema de interfaz de montaje
      description: Identifica la plataforma de conexión patentada o estándar de la
        industria integrada en el soporte (p. ej., patrón RAM AMPS, Quad Lock).
    mount_material:
      name: Material del montaje
      description: Especifica la composición del soporte de un producto, como de acero
        inoxidable o plástico.
    mounting_hardware:
      name: Accesorios de montaje
      description: Identifica el tipo de artículo utilizado para instalar o montar
        un producto, como mediante tornillos o ventosas.
    mounting_interface_pattern:
      name: Patrón de interfaz de montaje
      description: Identifica la interfaz mecánica o el patrón de orificios utilizado
        para conectar el soporte a una base de radio, soporte o sistema de bola.
    mounting_interface_standard:
      name: Estándar de interfaz de montaje
      description: Especifica el patrón de montaje o interfaz que soporta el soporte
        o base (p. ej., AMPS, VESA 75, RAM B ball).
    mounting_mechanism:
      name: Mecanismo de montaje
      description: Define cómo se fija el teléfono o la cámara al palo o soporte.
    mounting_style:
      name: Estilo de montaje
      description: Especifica cómo se asegura el botón pulsador a un panel de control,
        afectando el método de instalación y la compatibilidad con el grosor del panel.
    mounting_technology:
      name: Tecnología de montaje
      description: Indica si el CI está diseñado para ensamblaje de orificio pasante
        o montaje superficial.
    mounting_thread_size:
      name: Tamaño de rosca de montaje
      description: Indica el tamaño de rosca estándar para trípode o accesorio proporcionado
        en el producto (p. ej., 1/4"-20).
    mounting_type:
      name: Tipo de montura
      description: Especifica cómo se instala o fija un producto, como mediante clip
        o ventosa.
    mouse/trackball_features:
      name: Características del ratón/bola de seguimiento
      description: Describe las características especiales de los ratones/bolas de
        seguimiento, como el diseño ergonómico o el peso ajustable.
    mouse_pad_features:
      name: Características de la alfombrilla de ratón
      description: Describe las características únicas de una alfombrilla de ratón,
        como la iluminación o los bordes cosidos.
    mouse_port_type:
      name: Tipo de puerto del ratón
      description: Especifica el tipo de conexión de un ratón de equipo informático,
        como, por ejemplo, USB inalámbrico o Bluetooth.
    mouse_technology:
      name: Tecnología del ratón
      description: Especifica la funcionalidad o el diseño de un ratón de equipo informático,
        como inalámbrico o para juegos.
    mouthgard_design:
      name: Diseño de la férula
      description: Especifica el diseño de protectores dentales para deportes, como
        individual o doble.
    mouthpiece:
      name: Boquilla
      description: Identifica el tipo de boquilla para instrumentos musicales, como
        de La o Bajo.
    moving/shipping_box_material:
      name: Material de la caja de mudanza/envío
      description: Identifica el material que se usa en las cajas de mudanza o envío,
        como el cartón o el plástico.
    mp3_player_accessories_included:
      name: Accesorios para reproductor MP3 incluidos
      description: Identifica los accesorios adicionales que se incluyen con un reproductor
        MP3, como un estuche o un cargador para automóvil.
    mpaa_rating:
      name: Clasificación de la MPAA
      description: Identifica la clasificación de la Motion Picture Association of
        America (MPAA) para los medios, como G o PG-13.
    multi_gpu_technology:
      name: Tecnología multi-GPU
      description: 'Indica la capacidad de una placa base para admitir múltiples GPU,
        por ejemplo, no compatible o CrossFireX. '
    multiplexer_technology:
      name: Tecnología del multiplexor
      description: Especifica la tecnología de señal o longitud de onda subyacente
        utilizada por el multiplexor (p. ej., CWDM, DWDM).
    muscle_stimulator_design:
      name: Diseño del estimulador muscular
      description: Identifica el tipo de estimulador muscular, como de banda para
        piernas o placa adhesiva.
    music_genre:
      name: Género musical
      description: Clasifica productos por su género musical específico, como navideño
        o pop rock.
    music_stand_design:
      name: Diseño de atril de música
      description: Describe el tipo de atril, como de suelo o pared.
    musical_key:
      name: Clave musical
      description: Especifica la clave musical de un instrumento, por ejemplo, do
        mayor o fa#.
    nail_art_items_included:
      name: Artículos de decoración de uñas incluidos
      description: Identifica los accesorios específicos para decoración de uñas en
        un kit, como calcomanías o herramienta de punteado
    nail_art_medium_type:
      name: Tipo de medio de arte de uñas
      description: Especifica el medio o formato de material principal del suministro
        de arte de uñas.
    nail_care_features:
      name: Características de los productos de cuidado de uñas
      description: Describe cualidades específicas de los productos para el cuidado
        de las uñas, como la resistencia al astillado o el secado rápido.
    nail_design:
      name: Diseño de uñas
      description: Define el patrón estético o el acabado de las uñas, por ejemplo,
        punta francesa u ombré.
    nail_polish_drying_form:
      name: Forma de secado del esmalte de uñas
      description: Identifica el método de aplicación de productos para secar el esmalte
        de uñas, como gotas o aerosoles
    nail_shape:
      name: Forma de la uña
      description: Describe el estilo de las puntas de las uñas de productos cosméticos,
        por ejemplo, almendradas o cuadradas.
    national/regional_rating:
      name: Calificación nacional/regional
      description: Especifica la clasificación nacional o regional de un videojuego,
        por ejemplo, MA 15+ o apto para todas las edades.
    native_aspect_ratio:
      name: Relación de aspecto nativa
      description: Especifica la relación de aspecto original de una pantalla, normalmente
        para proyectores, como, por ejemplo 16:8.
    nebulizer_design:
      name: Diseño del nebulizador
      description: Define el diseño y la portabilidad de un nebulizador, por ejemplo,
        portátil o de sobremesa.
    nebulizer_technology:
      name: Tecnología del nebulizador
      description: Especifica la tecnología utilizada en los nebulizadores, por ejemplo,
        de malla o chorro.
    neck_color:
      name: Color del cuello
      description: Identifica el color del área del mástil de una guitarra, como blanco
        o multicolor
    neck_material:
      name: Material del cuello
      description: Identifica el material utilizado en el mástil de los instrumentos
        de cuerda, como la madera de arce o el palisandro.
    neck_pattern:
      name: Patrón del cuello
      description: Identifica el diseño o estampado en el mástil de una guitarra,
        como floral o a rayas
    necklace_design:
      name: Diseño de collar
      description: Describe el estilo de un collar, como colgante o gargantilla
    neckline:
      name: Cuello
      description: Se utiliza para describir la forma del cuello de una prenda, como
        el cuello de pico o barco.
    needle_coating_type:
      name: Tipo de recubrimiento de aguja
      description: Especifica cualquier recubrimiento superficial aplicado al vástago
        de la aguja para mejorar el deslizamiento o las propiedades terapéuticas.
    needle_eye_type:
      name: Tipo de ojo de aguja
      description: Describe el tamaño y estilo del ojo de la aguja, como grande o
        dividido.
    needle_gauge:
      name: Calibre de la aguja
      description: Indica el grosor de las agujas utilizadas en prácticas médicas
        o de tatuaje, como 18 o 22.
    needle_housing_material:
      name: Material de la caja de agujas
      description: Identifica el material de la carcasa de la aguja, como el plástico
        o el acero inoxidable.
    needle_material:
      name: Material de la aguja
      description: Especifica la composición de las agujas, normalmente de acupuntura,
        como, por ejemplo, acero inoxidable o chapado en oro.
    needle_size:
      name: Tamaño de la aguja
      description: Describe el tamaño de las agujas para manualidades, por ejemplo,
        14 o 100/16.
    needlecraft_kit_type:
      name: Tipo de kit de bordado
      description: Identifica el tipo de kit de costura, como ganchillo o punto de
        cruz
    negative/slide_storage_type:
      name: Tipo de almacenamiento de negativos/diapositivas
      description: Especifica el método de almacenamiento de diapositivas o negativos
        fotográficos, por ejemplo, caja de almacenamiento de archivos o carrusel de
        diapositivas.
    nema_enclosure_rating:
      name: Clasificación de gabinete NEMA
      description: Especifica la clasificación de tipo NEMA que define la protección
        contra peligros ambientales (p. ej., Tipo 4X, Tipo 12).
    net_material:
      name: Material de la red
      description: Identifica el tipo de material utilizado en productos basados en
        redes, como el nailon o el poliéster.
    net_mounting_type:
      name: Tipo de montaje de red
      description: Identifica cómo se monta una red de tenis, como con clip o trípode.
    network_cable_interface:
      name: Interfaz de cable de red
      description: Especifica el tipo de conector de un cable de red, por ejemplo,
        BNC o MPO/MTP.
    network_layer_support:
      name: Soporte de capa de red
      description: Indica las características de conmutación o enrutamiento de la
        capa OSI más alta proporcionadas por el conmutador.
    network_protocols_supported:
      name: Protocolos de red compatibles
      description: Define los estándares de red que admite un dispositivo, por ejemplo,
        TCP/IP o DNS.
    networking_standards:
      name: Estándares de redes
      description: 'Especifica los protocolos que admite un dispositivo de red, por
        ejemplo, IEEE 802.3. '
    neutral_density_rating:
      name: Clasificación de densidad neutra
      description: Define la densidad óptica o la fuerza de un filtro ND, expresada
        por factores ND comunes o reducciones de pasos.
    nightgown_style:
      name: Estilo de camisón
      description: Especifica el estilo del camisón, como, por ejemplo, picardías
        o camisola.
    nipple_material:
      name: Material de la tetina
      description: Especifica el material utilizado para la tetina del biberón, por
        ejemplo, látex o goma.
    nipple_shape:
      name: Forma de la tetina
      description: Define la forma de las tetinas de los biberones, como planas o
        en ángulo.
    nipple_type:
      name: Tipo de tetina
      description: Especifica el tipo de tetina de los biberones, como de cuello ancho
        o estándar.
    nock_material:
      name: Material del culatín
      description: Especifica el tipo de material utilizado para los culatines de
        flecha, como el aluminio o el plástico.
    noise_cancellation_technology:
      name: Tecnología de cancelación de ruido
      description: Especifica el tipo de sistema de reducción de ruido utilizado en
        los auriculares, ayudando a los compradores a identificar modelos con control
        de ruido activo, pasivo o adaptativo.
    noise_intensity:
      name: Intensidad del ruido
      description: Describe el nivel de sonido que produce un producto, normalmente
        fuegos artificiales, como, por ejemplo, bajo o alto.
    noise_reduction_system:
      name: Sistema de reducción de ruido
      description: Especifica los estándares de reducción de ruido analógico integrados
        admitidos por la platina.
    notepad_cover_type:
      name: Tipo de tapa de bloc de notas
      description: Identifica el tipo de tapa de un bloc de notas, como dura o blanda
    notepad_design:
      name: Diseño del bloc de notas
      description: Describe la encuadernación o el diseño de un bloc de notas, como
        encuadernado en espiral o en disco
    nozzle_coating:
      name: Revestimiento de la boquilla
      description: Especifica cualquier tratamiento superficial aplicado a la boquilla
        para mejorar la resistencia al desgaste o reducir la adhesión del filamento.
    nozzle_thread_type:
      name: Tipo de rosca de la boquilla
      description: Define el estándar de rosca mecánica o montaje utilizado para fijar
        la boquilla (p. ej., M6, MK8, E3D V6, Volcano).
    nozzle_type:
      name: Tipo de boquilla
      description: Especifica el tipo de boquilla de los irrigadores dentales, como,
        por ejemplo, ortodoncia o limpiadora de lengua.
    nursery_theme:
      name: Tema de guardería
      description: Define el diseño o motivo de los productos relacionados con la
        guardería, como la selva o los dinosaurios.
    nursing_cover_coverage:
      name: Cobertura de funda para lactancia
      description: Define la cobertura que proporciona un paño de lactancia, como
        total o parcial.
    nursing_pad_design:
      name: Diseño de almohadilla de lactancia
      description: Describe las características físicas de los discos de lactancia,
        como gruesos o redondos.
    nursing_pillow_shape:
      name: Forma del cojín de lactancia
      description: Identifica el contorno de los cojines de lactancia, como en forma
        de C o U.
    nut/seed_type:
      name: Tipo de nuez/semilla
      description: Identifica el tipo específico de nuez o semilla de un producto,
        como las almendras o semillas de chía.
    nut_butter_variety:
      name: Variedad de manteca de frutos secos
      description: Identifica la variedad de nuez de productos para untar a base de
        nueces, por ejemplo, maní o almendra.
    nut_form:
      name: Forma de la tuerca
      description: Describe la forma de las tuercas, como cuadradas o de mariposa.
    nut_processing_method:
      name: Método de procesamiento de nueces
      description: Define cómo se preparan las nueces o semillas, por ejemplo, confitadas
        o crudas.
    nutrient_content:
      name: Contenido nutritivo
      description: Especifica los elementos nutricionales presentes, sobre todo para
        fertilizantes, como, por ejemplo, el nitrógeno o el fósforo.
    oboe_key_system:
      name: Sistema de llaves del oboe
      description: Identifica el sistema de llaves de un oboe, como el francés o de
        conservatorio.
    ocarina_style:
      name: Estilo ocarina
      description: Describe el estilo de las ocarinas, como, por ejemplo, transversal
        o colgante.
    occasion:
      name: Ocasión
      description: Especifica el evento o entorno adecuado para un producto, por ejemplo,
        informal o formal.
    occasion_style:
      name: Estilo de ocasión
      description: Ayuda a categorizar los productos según la ocasión, como, por ejemplo,
        informal o formal.
    odor_remover_application_area:
      name: Área de aplicación del eliminador de olores
      description: Especifica dónde está destinado a aplicarse el producto para eliminar
        olores.
    office_cart_features:
      name: Características del carrito de oficina
      description: Describe las características específicas de un carrito de oficina,
        como los estantes ajustables o las ruedas con freno integrado.
    office_instrument_material:
      name: Material de instrumento de oficina
      description: Especifica la composición de los útiles de oficina, por ejemplo,
        la madera o el acrílico.
    office_supply_material:
      name: Material de oficina
      description: Identifica el material principal del material de oficina, como
        el cuero o el cartón.
    oil_extraction_method:
      name: Método de extracción del aceite
      description: Especifica cómo se procesó o extrajo el aceite principal (p. ej.,
        prensado en frío, refinado).
    oil_type:
      name: Tipo de aceite
      description: Especifica el tipo de aceite utilizado en un producto, por ejemplo,
        parafina o queroseno.
    olfactory_family:
      name: Familia olfativa
      description: Define la categoría olfativa general a la que pertenece una fragancia,
        por ejemplo, aldehídica, animalica
    one_piece_style:
      name: Estilo de una pieza
      description: Identifica el estilo específico de una prenda de una sola pieza,
        como un mono o un mameluco
    open/closed_sign_design:
      name: Carteles de abierto y cerrado
      description: Especifica el estilo de un letrero de abierto/cerrado, como, por
        ejemplo, el horario de apertura o personalizado.
    opening_direction:
      name: Dirección de apertura
      description: Especifica la dirección en la que se abre un producto, normalmente
        puertas, como, por ejemplo, giro de una vía.
    opening_mechanism:
      name: Mecanismo de apertura
      description: Especifica cómo se abre un producto, normalmente puertas para bebés
        o mascotas, como, por ejemplo, palanca o pedal.
    operating_mode:
      name: Modo operativo
      description: Define el método de funcionamiento, normalmente de para equipos
        médicos, como, por ejemplo, semiautomático.
    operating_system:
      name: Sistema operativo
      description: Define el software del sistema que utiliza un dispositivo, como
        iOS o ChromeOS.
    operating_system_compatibility:
      name: Compatibilidad del sistema operativo
      description: Identifica los sistemas operativos que el obturador remoto admite
        de manera predeterminada.
    operation_mechanism:
      name: Mecanismo de operación
      description: Describe cómo la herramienta aplica tensión y corta la brida (p.
        ej., manual, neumático, automático).
    operation_method:
      name: Método de operación
      description: Define cómo se utiliza un producto, generalmente sistemas de apertura
        para puertas de garaje, como, por ejemplo, de transmisión por correa o hidráulico.
    optical_disc_recordability:
      name: Capacidad de grabación del disco óptico
      description: Define si un disco óptico es de escritura única o regrabable y
        si es de capa simple o doble.
    optical_drive_form_factor:
      name: Factor de forma de la unidad óptica
      description: Define el tamaño físico y estilo de instalación de la unidad.
    optical_drive_loading_mechanism:
      name: Mecanismo de carga de la unidad óptica
      description: Indica cómo se insertan los discos en la unidad (p. ej., carga
        por bandeja, carga por ranura, carga superior).
    optical_drive_type:
      name: Tipo de unidad de disco óptico
      description: Identifica los formatos de medios que la unidad óptica de un dispositivo
        puede leer y escribir, por ejemplo, CD-ROM o DVD-ROM.
    optical_frame_design:
      name: Diseño del marco óptico
      description: Define si las gafas tienen montura o no, como, por ejemplo, sin
        montura o con montura completa.
    optical_zoom:
      name: Zoom óptico
      description: Indica la capacidad de zoom de una cámara, por ejemplo, sin zoom
        o más de 30x.
    oral_care_function:
      name: Función del cuidado bucal
      description: Destaca el beneficio principal dental o de salud bucal que aborda
        el producto (p. ej., blanqueamiento, alivio de sensibilidad, salud de las
        encías).
    oral_care_items_included:
      name: Artículos de cuidado bucal incluidos
      description: Enumera los tipos de productos de cuidado bucal contenidos en el
        conjunto.
    organizer_type:
      name: Tipo de organizador
      description: Especifica la categoría de almacenamiento del vehículo, como los
        portavasos o la guantera.
    orientation:
      name: Orientación
      description: Especifica la posición prevista del producto, como, por ejemplo,
        horizontal o vertical.
    orthotic_coverage_length:
      name: Longitud de cobertura ortótica
      description: Define cuánto del pie cubre el soporte del arco (p. ej., longitud
        completa, 3/4 de longitud, copa del talón).
    outdoor_equipment_features:
      name: Características del equipo de exterior
      description: Identifica características únicas del equipo para actividades al
        aire libre, como la resistencia a la intemperie o la portabilidad.
    outdoor_furniture_items_included:
      name: Artículos de muebles de exterior incluidos
      description: Identifica los elementos específicos incluidos en un juego de mobiliario
        de exterior, como sillas o una mesa
    outdoor_power_accessories_included:
      name: Accesorios eléctricos para exteriores incluidos
      description: Especifica los artículos adicionales que se incluyen con los equipos
        eléctricos para exteriores, por ejemplo, motosierras, tapones para los oídos.
    outdoor_walking_activity:
      name: Actividad de caminar al aire libre
      description: Clasifica los productos según la actividad prevista de senderismo
        al aire libre, como, por ejemplo, el senderismo o la carrera por senderos.
    outerwear_clothing_features:
      name: Características de la ropa de abrigo
      description: Identifica características especiales de la ropa exterior, como
        el aislamiento o la impermeabilidad.
    outlet_type:
      name: Tipo de salida
      description: Especifica el tipo de enchufe de dispositivos electrónicos, por
        ejemplo, tipo A o L.
    output_connection:
      name: Conexión de salida
      description: Especifica el tipo de conexión de salida para cables de audio,
        como 3,5 mm o RCA.
    output_connection_type:
      name: Tipo de conexión de salida
      description: Especifica el conector o estándar de interfaz proporcionado por
        el convertidor en su lado de salida.
    output_level:
      name: Nivel de salida
      description: Describe el nivel de salida de los accesorios de instrumentos musicales,
        como bajo o alto.
    output_signal_interface:
      name: Interfaz de señal de salida
      description: Especifica el tipo o tipos de conexiones de salida proporcionadas
        por el convertidor.
    output_video_interface:
      name: Interfaz de video de salida
      description: Especifica el tipo o tipos de conector de video proporcionados
        como salida por el convertidor de escaneo.
    output_waveform:
      name: Forma de onda de salida
      description: Especifica el tipo de señal que genera un oscilador electrónico,
        como de diente de sierra o sinusoidal.
    oven_accessories_included:
      name: Accesorios para horno incluidos
      description: Detalla los componentes adicionales del horno, como la bandeja
        para hornear o el estante de alambre.
    overclock_profile_support:
      name: Soporte de perfiles de overclocking
      description: Identifica los perfiles de overclocking estandarizados almacenados
        en el módulo (p. ej., Intel XMP, AMD EXPO).
    oxygen_cylinder_outlet_standard:
      name: Estándar de salida del cilindro de oxígeno
      description: Especifica el estándar de conexión de salida CGA de la válvula
        del cilindro.
    oxygen_tank_valve_type:
      name: Tipo de válvula del tanque de oxígeno
      description: Especifica la válvula que se usa en las botellas de oxígeno, por
        ejemplo, válvula de palanca o poste.
    pa_rating:
      name: Clasificación PA
      description: Especifica el grado de protección UVA del protector solar (p. ej.,
        PA+, PA+++, PA++++) basado en el método de oscurecimiento de pigmento persistente
        (PPD).
    pacifier/teether_design:
      name: Diseño de chupete/mordedor
      description: Describe el diseño de chupetes y mordedores para bebés, por ejemplo,
        en forma de anillo o de ortodoncia.
    package_type:
      name: Tipo de embalaje
      description: Define el tipo de embalaje de un producto, por ejemplo, frasco
        o bomba.
    packing_materials_included:
      name: Materiales de embalaje incluidos
      description: Identifica el tipo de materiales de embalaje proporcionados, como
        bolsas de aire o el plástico de burbujas.
    pad_display_profile:
      name: Perfil de visualización del pad
      description: Describe la visualización en color de las tabletas de captura de
        firmas, como monocromáticas o en color.
    pad_thickness:
      name: Grosor de la almohadilla
      description: Clasifica el perfil de grosor general de la almohadilla (p. ej.,
        ultrafina, maxi).
    pad_type:
      name: Tipo de almohadilla
      description: Especifica el tipo de almohadilla del producto, por ejemplo, lavable
        a máquina o reemplazable.
    pad_wing_style:
      name: Estilo de alas de la almohadilla
      description: Indica si la almohadilla menstrual incluye alas laterales para
        sujeción y protección contra fugas.
    paddle/oar_material:
      name: Material de la pala/remo
      description: Identifica el material utilizado en la construcción de paletas
        o remos, como aluminio o madera
    paddle_equipment_included:
      name: Equipo de pala incluido
      description: Especifica el equipamiento complementario que se incluye en los
        juegos de pádel, como los postes o las pelotas de pádel.
    paddleboard_features:
      name: Características de la tabla de paddleboard
      description: Describe las características específicas de una tabla de remo,
        como inflable o con superficie dura.
    page_layout:
      name: Diseño de página
      description: Define el diseño de las páginas, normalmente de libretas de direcciones,
        como, por ejemplo, en blanco o con pestañas.
    page_size:
      name: Tamaño de página
      description: Determina las dimensiones de un producto, como de 11" x 17" o A4.
    pager_application:
      name: Aplicación del buscapersonas
      description: Identifica el caso de uso principal o el entorno para el que está
        destinado el buscapersonas.
    pain_reduction_technology:
      name: Tecnología de reducción de dolor
      description: Identifica cualquier característica orientada a la comodidad que
        reduce las molestias durante la depilación (p. ej., enfriamiento, rodillos
        de masaje).
    paint/dye_form:
      name: Forma de la pintura/tinte
      description: Describe la consistencia o el tipo de pintura o tinte, como gel
        o aerosol.
    paint_brush_design:
      name: Diseño de brocha de pintura
      description: Describe la forma o el estilo de un pincel, como redondo o plano.
    paint_finish:
      name: Acabado de pintura
      description: Indica el tipo de acabado de la pintura, normalmente de vehículos,
        como, por ejemplo, metalizado o brillo.
    paint_form:
      name: Forma de pintura
      description: Identifica el formato de la pintura de manualidades, por ejemplo,
        en gel o polvo.
    paint_medium_type:
      name: Tipo de medios de pintura
      description: Especifica el tipo de medio de pintura de los artículos de manualidades,
        como el barniz o la acuarela.
    paint_type:
      name: Tipo de pintura
      description: Especifica el tipo de pintura de los productos de artesanía o manualidades,
        como el esmalte o la acuarela.
    paintball/airsoft_equipment_included:
      name: Equipo de paintball/Airsoft incluido
      description: Especifica el equipo de paintball o Airsoft incluido, como las
        gafas protectoras o el chaleco táctico.
    paintball_equipment_included:
      name: Equipo de paintball incluido
      description: Especifica los artículos adicionales que se incluyen con un producto
        de paintball, como las baterías o los cargadores.
    painting_canvas_material:
      name: Material del lienzo para pintar
      description: Identifica el tipo de material que se usa en la pintura de lienzos,
        como el algodón o el lino.
    painting_medium:
      name: Medio de pintura
      description: Indica el material o técnica principal utilizada en una pintura,
        por ejemplo, acrílico, óleo.
    pairing_method:
      name: Método de emparejamiento
      description: 'Define cómo se conecta o vincula el producto con otros dispositivos,
        por ejemplo, Bluetooth o Wi-Fi. '
    palette_design:
      name: Diseño de paleta
      description: Describe el diseño o estilo de la paleta de pintor, como plegable
        o con orificio para el pulgar.
    palette_knife_shape:
      name: Forma de espátula de paleta
      description: Describe la forma de una espátula utilizada en artes y manualidades,
        como recta o redonda.
    panel_specification:
      name: Especificación del panel
      description: Define el tipo de paneles de conexión para la gestión de cables,
        como fibra óptica o Cat6.
    panel_termination:
      name: Terminación del panel
      description: Define el método de terminación para paneles de conexión, por ejemplo,
        RJ-45 o 110 inserción de cables.
    panel_transparency:
      name: Transparencia del panel
      description: Describe si la tienda incluye paneles transparentes o ventanas
        en el techo o los lados para permitir la entrada de luz durante el bronceado.
    pants_length_type:
      name: Tipo de largo de los pantalones
      description: Se utiliza para definir el largo de los pantalones, como cortos
        o largos.
    panty_liner_style:
      name: Estilo de protector diario
      description: Define la forma o estilo del protector diario (p. ej., tanga, curvado,
        largo).
    pantyhose_style:
      name: Estilo de medias-pantalón
      description: Describe el diseño o funcionalidad de medias-pantalón, por ejemplo,
        sin pies, de maternidad
    paper_finish:
      name: Acabado del papel
      description: Describe la textura o el brillo de los productos de papel, como
        satinado o mate.
    paper_format:
      name: Formato de papel
      description: Identifica el tipo de formato de papel para artes y manualidades,
        como bloques u hojas sueltas.
    paper_size:
      name: Tamaño de papel
      description: Especifica las dimensiones de un producto de papel, como A4 o carta.
    paper_texture:
      name: Textura de papel
      description: Describe la sensación y el acabado del papel artístico, como liso
        o rugoso.
    paper_type:
      name: Tipo de papel
      description: Especifica el estilo de los suministros de oficina en papel, como
        una cuadrícula o un rotafolio.
    paperweight_design:
      name: Diseño del pisapapeles
      description: Describe la estética o el estilo de un pisapapeles, como decorativo
        o sencillo.
    papier_mache_shape:
      name: Forma de papel maché
      description: Especifica el diseño de productos de papel maché, como cajas o
        figuras.
    parachuting_activity:
      name: Actividad de paracaidismo
      description: Define la disciplina de paracaidismo para la que está diseñado
        el producto, como el paracaidismo o el parapente.
    parallel_processing_technology_support:
      name: Compatibilidad de tecnología de procesamiento paralelo
      description: Especifica las capacidades de procesamiento paralelo de las placas
        base, por ejemplo, múltiples GPU o múltiples núcleos.
    parking_camera_features:
      name: Características de la cámara de estacionamiento
      description: Describe las capacidades de la cámara de estacionamiento de un
        vehículo, como la compatibilidad con GPS o el vídeo HD.
    parking_sign_design:
      name: Diseño de señales de estacionamiento
      description: Identifica el propósito de una señal de estacionamiento, por ejemplo,
        zona de carga o estacionamiento reservado.
    pass_duration:
      name: Duración del pase
      description: Especifica el período de validez o duración del pase de viaje o
        billete.
    passband:
      name: Banda de paso
      description: Especifica la banda de frecuencia que permite pasar un filtro electrónico,
        por ejemplo, de paso alto.
    pasta_shape_type:
      name: Tipo de forma de pasta
      description: Clasifica los productos para pasta según su forma, por ejemplo,
        espaguetis o tortellinis.
    pasta_type:
      name: Tipo de pasta
      description: Clasifica productos de pasta por su forma específica, por ejemplo,
        macarrones o penne.
    patch_shape:
      name: Forma de parche
      description: Describe la forma o el diseño de un parche, como de animales o
        geométrico.
    patella_opening_design:
      name: Diseño de la abertura patelar
      description: Especifica si la órtesis tiene un área patelar abierta o cerrada
        o un anillo estabilizador.
    pattern:
      name: Patrón
      description: Describe el diseño o motivo del interior de un producto, como floral
        o rayado.
    pattern_distribution_format:
      name: Formato de distribución de patrones
      description: Identifica cómo se entrega un patrón, como mediante PDF o tutoriales
        en línea.
    payment_mechanism_type:
      name: Tipo de mecanismo de pago
      description: Identifica cómo los jugadores activan la máquina (p. ej., operado
        por monedas, deslizamiento de tarjeta).
    pbx_system_type:
      name: Tipo de sistema PBX
      description: Define la arquitectura general del producto PBX.
    pcb_surface_finish:
      name: Acabado de superficie de PCB
      description: Especifica el revestimiento protector aplicado a las almohadillas
        de cobre expuestas.
    pcb_type:
      name: Tipo de placa de circuitos impresos
      description: Identifica el tipo de placa de circuito impreso (PCB), como rígida
        o flexible
    pcie_lane_configuration:
      name: Configuración de líneas PCIe
      description: Especifica el ancho de línea física que soporta el elevador (p.
        ej., x1, x4, x8, x16), indicando el tamaño de la ranura y el ancho de banda
        eléctrico.
    pedal_polarity:
      name: Polaridad del pedal
      description: Especifica el funcionamiento predeterminado del mecanismo de conmutación
        de un pedal para teclados sin presionar, como, por ejemplo, NC (normalmente
        cerrado).
    pegi_rating:
      name: Clasificación PEGI
      description: Especifica la clasificación Pan European Game Information (PEGI)
        de videojuegos, como, por ejemplo, 3 o 12.
    pen/felt_tip_design:
      name: Diseño de la punta del rotulador/fieltro
      description: Describe el grosor y el estilo de la punta de un bolígrafo, como
        gruesa o fina.
    pen/pencil_features:
      name: Características del rotulador/lápiz
      description: Identifica características especiales de artículos de escritura,
        como recargable o con borrador.
    pen_color:
      name: Color del bolígrafo
      description: Identifica el color de la tinta del bolígrafo, por ejemplo, rojo
        o azul.
    pen_features:
      name: Características del rotulador
      description: Describe las características únicas de los bolígrafos, como retráctiles
        o perfumados.
    pen_pattern:
      name: Patrón del rotulador
      description: Identifica el tema visual de los bolígrafos, como camuflado o a
        cuadros
    pen_tip_design:
      name: Diseño de la punta del bolígrafo
      description: Describe el estilo de la punta de un bolígrafo, como de grosor
        medio o fino.
    pen_type:
      name: Tipo de bolígrafo
      description: Identifica el tipo de pluma o artículo de escritura, como de gel
        o fuente.
    pencil_features:
      name: Características del lápiz
      description: Identifica características específicas de los lápices, como retráctil
        o con borrador.
    pencil_sharpener_design:
      name: Diseño del sacapuntas
      description: Especifica las características de diseño de un sacapuntas, p. ej.
        con recipiente para virutas, liso
    pencil_type:
      name: Tipo de lápiz
      description: Especifica el tipo de lápiz, como mecánico o de madera.
    percussion_stand_design:
      name: Diseño de la base para percusión
      description: Describe el estilo de un soporte de percusión, como de bastidor
        o soporte.
    percussion_tip_shape:
      name: Forma de la punta para percusión
      description: Identifica la forma de las puntas de las baquetas o los mazos,
        como las de bellota o barril.
    performance_metrics:
      name: Métricas de rendimiento
      description: Destaca áreas clave de la eficiencia de la inteligencia artificial
        y el software de aprendizaje automático, como el tiempo de formación y la
        velocidad de inferencia.
    perfumery_instruments_included:
      name: Instrumentos de perfumería incluidos
      description: Especifica los instrumentos que se proporcionan en un kit para
        hacer perfumes, como tiras aromáticas o pipetas
    peroxide_content:
      name: Contenido de peróxido
      description: Indica el tipo de peróxido utilizado en productos de cuidado personal,
        como carbamida o sin peróxidos.
    personal_watercraft_type:
      name: Tipo de embarcación personal
      description: Identifica el estilo de la moto acuática, como de pie o sentado.
    personalization_design:
      name: Diseño de personalización
      description: Describe las opciones de personalización de un producto, normalmente
        tarjetas de notas, como, por ejemplo, en blanco o impresas.
    personalization_options:
      name: Opciones de personalización
      description: Especifica las opciones de personalización disponibles, como un
        monograma o un mensaje personalizado.
    pest_control_method:
      name: Método de control de plagas
      description: Especifica la forma del producto disuasivo de plagas, como, por
        ejemplo, en polvo o gránulos.
    pet_apparel/bedding_features:
      name: Características de la ropa/ropa de cama para mascotas
      description: Destaca las características únicas de los artículos para mascotas,
        como los ortopédicos o ecológicos.
    pet_apparel_features:
      name: Características de la ropa para mascotas
      description: Destaca las características especiales de la ropa para mascotas,
        como la impermeabilidad o la cualidad de producto vegano.
    pet_bedding_features:
      name: Características de la ropa de cama para mascotas
      description: Describe las propiedades únicas de la ropa de cama para mascotas,
        como ortopédica o impermeable.
    pet_control_accessory_features:
      name: Características de los accesorios de control de mascotas
      description: Describe las características especiales de los accesorios para
        el control de mascotas, como ajustables o que brillan en la oscuridad.
    pet_dietary_preferences:
      name: Preferencias alimentarias de mascotas
      description: Identifica las necesidades o restricciones dietéticas de una mascota,
        como sin granos o no transgénico
    pet_dietary_requirements:
      name: Requisitos dietéticos para mascotas
      description: Define los beneficios nutricionales que ofrece un producto para
        mascotas, como el control de peso o la salud dental.
    pet_food_flavor:
      name: Sabor de comida para mascotas
      description: Especifica el perfil de sabor de los productos alimenticios para
        mascotas, por ejemplo, plátano o pavo.
    pet_food_form:
      name: Forma de la comida para mascotas
      description: Indica la consistencia de los productos alimenticios para mascotas,
        como húmedos o secos
    pet_food_supplements:
      name: Complementos alimenticios para mascotas
      description: Identifica aditivos en comidas para mascotas por sus beneficios
        nutricionales, como aceite de pescado o probióticos
    pet_hair_dryer_design:
      name: Diseño del secador de pelo para mascotas
      description: Describe el estilo de un secador de pelo para mascotas, como de
        jaula o de mano
    pet_hair_dryer_speed_settings:
      name: Configuración de velocidad del secador de pelo para mascotas
      description: Describe las configuraciones de velocidad ajustables en los secadores
        de pelo para mascotas, por ejemplo, velocidad variable, velocidad fija
    pet_medical_collar_design:
      name: Diseño del collar isabelino para mascotas
      description: Describe el estilo de un collar médico para mascotas, como cono
        o inflable
    pet_medical_supply_type:
      name: Tipo de productos médicos para mascotas
      description: Especifica el tipo de artículo médico para mascotas, por ejemplo,
        vendaje elástico, vendaje de gasa
    pet_monitor_items_included:
      name: Artículos de monitor de mascotas incluidos
      description: Especifica los componentes que incluye el medidor de glucosa para
        mascotas, como el estuche de transporte o las tiras reactivas.
    pet_nail_tool_type:
      name: Tipo de herramientas de manicura para mascotas
      description: Identifica el tipo de herramienta para el cuidado de las uñas de
        las mascotas, como cortaúñas de guillotina o limas eléctricas.
    pet_pad_features:
      name: Características de la alfombrilla para mascotas
      description: Destaca las características únicas de las almohadillas de adiestramiento
        para mascotas, como hipoalergénicas o fáciles de limpiar.
    pet_spray/solution_type:
      name: Tipo de spray/solución para mascotas
      description: Identifica el propósito de los aerosoles o soluciones para mascotas,
        como calmantes o desodorizantes
    pet_supply_product_form:
      name: Forma del producto de suministro para mascotas
      description: Define el formato de un producto para mascotas, como líquido, tableta
        o aerosol.
    pet_thermometer_design:
      name: Diseño del termómetro para mascotas
      description: Describe el tipo de termómetro para mascotas, como analógico o
        digital
    pet_trainer_type:
      name: Tipo de adiestrador de mascotas
      description: Identifica el tipo de ayuda para el adiestramiento de mascotas,
        como un contador estándar o un dispensador automático de premios
    pet_treat_texture:
      name: Textura de golosina para mascotas
      description: Define la sensación o consistencia de las golosinas para mascotas,
        como suaves o crujientes.
    pet_treat_type:
      name: Tipo de golosina para mascotas
      description: Identifica el tipo de golosina para mascotas, como masticable o
        crujiente
    ph_level:
      name: Nivel de PH
      description: Indica la acidez o alcalinidad de una sustancia, medida en una
        escala de 0 a 14, por ejemplo, 6,5 (ligeramente ácido) o 7,0 (neutro).
    phase_type:
      name: Tipo de fase
      description: Identifica el tipo de fase de los controladores de motor, como
        monofásicos o bifásicos.
    phone_camera_position:
      name: Posición de la cámara del teléfono
      description: Indica la posición física o función del módulo de cámara dentro
        del teléfono.
    phone_card_delivery_format:
      name: Formato de entrega de tarjetas telefónicas
      description: Indica si el crédito prepago se suministra como una tarjeta física
        para raspar o como un código/cupón digital.
    phone_skin_coverage:
      name: Cobertura de la funda del teléfono
      description: Especifica qué porciones del teléfono está diseñada para cubrir
        la funda o envoltura.
    phone_strap_accessories_included:
      name: Accesorios de correa de teléfono incluidos
      description: Enumera los componentes adicionales suministrados con el conjunto
        de dijes o correas, como pestaña adaptadora, estuche para teléfono, bolsa
        o muñequera.
    photo_effects_type:
      name: Tipo de efectos fotográficos
      description: Identifica el tipo de efectos fotográficos que puede producir una
        cámara, por ejemplo, vintage o sepia.
    photographic_chemical_form:
      name: Forma química fotográfica
      description: Identifica el formato de los productos químicos fotográficos, como
        en polvo o líquido.
    photographic_paper_size:
      name: Tamaño del papel fotográfico
      description: Especifica las dimensiones del papel fotográfico, como 4"x6" o
        A3.
    photographic_paper_type:
      name: Tipo de papel fotográfico
      description: Especifica el tipo de papel fotográfico utilizado, como satinado
        o metálico.
    piano_additional_features:
      name: Características adicionales del piano
      description: Destaca funcionalidades adicionales de los pianos, como los altavoces
        incorporados o el metrónomo.
    piano_pedals:
      name: Pedales de piano
      description: Identifica el tipo de pedales de un piano, como sostenido o sostenuto.
    piano_size:
      name: Tamaño del piano
      description: Define el tipo y tamaño de un piano, como el de media cola o vertical.
    pick_design:
      name: Diseño de la púa
      description: Identifica el diseño de las púas de guitarra, por ejemplo, en forma
        de lágrima o Jazz III.
    pickup_design:
      name: Diseño de camioneta
      description: Identifica el diseño de pastillas en instrumentos de cuerda, como
        permanentes o temporales.
    pickup_mounting_type:
      name: Tipo de montaje de la pastilla
      description: Especifica el método de montaje de una pastilla de guitarra, como
        adhesiva o con clip.
    pickup_position:
      name: Posición de la pastilla
      description: Indica dónde se ubica la pastilla en una guitarra eléctrica, por
        ejemplo en el puente o el mástil.
    pickup_type:
      name: Tipo de pastilla
      description: Especifica el estilo de las pastillas de guitarra, por ejemplo,
        magnéticas o activas.
    pig_feed_stage:
      name: Etapa de alimentación de cerdos
      description: Identifica la etapa de vida de los cerdos para la que está destinado
        el alimento, como crecimiento o cría.
    pile_type:
      name: Tipo de pelo
      description: Define la textura y el estilo de alfombras, tapetes y alfombrillas,
        como de felpa o bereberes.
    pillbox_schedule:
      name: Programación del pastillero
      description: Describe el régimen de tiempo o esquema de etiquetado para el que
        está diseñado el pastillero (p. ej., diario, semanal, AM/PM).
    pillow_shape:
      name: Forma de la almohada
      description: Define la forma o contorno de un cojín de lactancia, como, por
        ejemplo en forma de U.
    pin_size:
      name: Tamaño de imperdible
      description: Especifica el tamaño de los imperdibles, como 0 o 00.
    pin_tip_type:
      name: Tipo de punta del pasador
      description: Describe el diseño de las puntas del pasador, que afecta la comodidad,
        seguridad y sujeción.
    pinata_design:
      name: Diseño de la piñata
      description: Describe el tema visual de una piñata, como tradicional o animal.
    pinball_machine_edition:
      name: Edición de máquina de pinball
      description: Identifica el nivel de producción o edición de coleccionista específico
        de la máquina de pinball.
    pinball_machine_format:
      name: Formato de máquina de pinball
      description: Especifica el formato físico o digital del producto (p. ej., mecánico,
        virtual, de mesa, kit).
    ping_pong_equipment_included:
      name: Equipo de ping pong incluido
      description: Especifica el tipo de equipo de ping pong que incluye el set, como
        la red o las palas de ping pong.
    ping_pong_robot_features:
      name: Características del robot de ping pong
      description: Describe las funcionalidades de un robot de ping pong, como la
        agrupación de ejercicios o el control remoto.
    pipe_clamp_design:
      name: Diseño de la abrazadera de tubo
      description: Describe el diseño de una abrazadera para tuberías, como una abrazadera
        a presión o una abrazadera en C.
    pipe_shape:
      name: Forma de pipa
      description: Define la forma de las pipas de fumar, por ejemplo, Calabash o
        Billiard.
    placement_supported:
      name: Ubicación compatible
      description: Identifica dónde se puede instalar o utilizar un producto, por
        ejemplo, en la pared o el suelo.
    plan_service_type:
      name: Tipo de servicio del plan
      description: Define si el plan SIM es solo de datos o incluye servicios de voz
        y/o SMS.
    plant_characteristics:
      name: Características de la planta
      description: Define rasgos específicos de las plantas, como, por ejemplo, la
        floración o si es comestible.
    plant_class:
      name: Clase de planta
      description: Clasifica plantas en grupos taxonómicos específicos, como, por
        ejemplo, liliopsida o brassicales.
    plant_material:
      name: Material de la planta
      description: Especifica si los materiales vegetales son vivos, preservados o
        artificiales
    plant_name:
      name: Nombre de la planta
      description: Identifica el nombre botánico o común de la planta, como la rosa,
        la albahaca o el pepino.
    plant_stage:
      name: Fase de planta
      description: Identifica la fase específica del ciclo de crecimiento de una planta
        para la cual se ha diseñado un producto, por ejemplo, plántula, fase vegetativa.
    plant_support_material:
      name: Material del tutor para plantas
      description: Especifica el material utilizado en las jaulas o soportes de plantas,
        como la terracota o la piedra.
    plate_type:
      name: Tipo de plato
      description: Identifica el tipo de placa de los útiles de peluquería, por ejemplo,
        titanio o cerámica.
    play_equipment_items_included:
      name: Artículos de equipo de juego incluidos
      description: Enumera los elementos adicionales incluidos con el equipo de juego,
        como juguetes colgantes o espejos
    play_slide_design:
      name: Diseño del tobogán de juego
      description: Describe el diseño de un tobogán de juego, como espiral o tubo
    play_vehicle_propulsion:
      name: Propulsión del vehículo de juguete
      description: Identifica cómo se impulsa un vehículo de juego, por ejemplo, mediante
        fricción o control remoto
    play_yard_design_features:
      name: Características de diseño del patio de juegos
      description: Identifica características especiales de un patio de juegos, como
        laterales de malla o parches de césped
    playback_disc_formats:
      name: Formatos de disco de reproducción
      description: Define los formatos de disco compatibles con un reproductor de
        DVD o Blu-Ray, como, por ejemplo, CD de audio o JPEG.
    playback_speed_supported:
      name: Velocidad de reproducción admitida
      description: Enumera las velocidades de rotación del disco a las que puede funcionar
        el tocadiscos o reproductor de discos.
    player/recorder_specialized_features:
      name: Características especializadas del reproductor/grabador
      description: Destaca características específicas de reproductores o grabadores
        de vídeo, como el control parental o la tecnología de inteligencia artificial.
    player_drive_type:
      name: Tipo de unidad del reproductor
      description: Especifica el mecanismo que hace girar un tocadiscos, como una
        correa o un rodillo.
    player_position:
      name: Posición del jugador
      description: Especifica la posición de juego a la que está destinado el producto,
        como portero o centrocampista.
    player_specialized_features:
      name: Características especializadas del reproductor
      description: Identifica las capacidades únicas de los reproductores de video,
        como la compatibilidad con 4K o HDR.
    playhouse_design:
      name: Diseño de casa de juegos
      description: Especifica el tipo de casa de juegos, como casa en el árbol o casa
        de juegos de suelo.
    playset_features:
      name: Características del parque infantil
      description: Destaca aspectos especiales de un juego, por ejemplo, si es de
        edición limitada o resistente al agua.
    plug_type:
      name: Tipo de enchufe
      description: Identifica la compatibilidad regional de un enchufe, por ejemplo,
        EE. UU. o FR.
    plug_type_input:
      name: Tipo de enchufe (entrada)
      description: Especifica el enchufe que puede admitir un adaptador o convertidor
        de corriente, según el código de país o territorio, como, por ejemplo, EE.
        UU. o UE.
    plug_type_output:
      name: Tipo de enchufe (salida)
      description: Especifica el enchufe que puede admitir un adaptador o convertidor
        de corriente como salida, según el código de país o territorio, como, por
        ejemplo, EE. UU. o UE.
    plumbing_primer_application:
      name: Aplicación de imprimador para fontanería
      description: Especifica dónde se puede utilizar la imprimación para fontanería,
        por ejemplo, en tuberías o accesorios.
    plumbing_trap_design:
      name: Diseño de la trampa de fontanería
      description: Especifica el tipo de sifón de fontanería, como el bote sifónico
        o el sifón de botella.
    plunger_shape:
      name: Forma del destapacaños
      description: Especifica la forma de la cabeza del émbolo, como de copa o acordeón.
    plywood_grade:
      name: Grado de madera contrachapada
      description: Especifica la clasificación del contrachapado para materiales de
        construcción, como de grado C o D.
    pneumatic_conveyor_operation:
      name: Funcionamiento del transportador neumático
      description: Identifica el modo de funcionamiento de los transportadores neumáticos,
        como de fase diluida o fase densa.
    poe_standard:
      name: Estándar PoE
      description: Identifica el protocolo de alimentación a través de Ethernet (PoE)
        al que se adhiere un producto, por ejemplo, pasivo o IEEE 802.3af.
    point_design:
      name: Diseño de punta
      description: Describe el estilo de la punta de los suministros de oficina, como
        tachuelas o chinchetas, por ejemplo, afiladas o no afiladas.
    pointing_device:
      name: Dispositivo señalador
      description: Define el dispositivo utilizado para navegar en la pantalla de
        un equipo informático, como, por ejemplo, los botones del ratón o el panel
        táctil.
    polar_pattern:
      name: Patrón polar
      description: Indica la orientación de captación de sonido de un micrófono, como
        omnidireccional o cardioide.
    polarity_configuration:
      name: Configuración de polaridad
      description: Describe la disposición de polaridad interna relevante para LED,
        módulos de visualización y dispositivos similares.
    polarization:
      name: Polarización
      description: Define la dirección de onda de las antenas, como, por ejemplo,
        vertical o circular.
    pole/post_material:
      name: Material del poste
      description: Especifica el material de construcción de los palos de las sombrillas
        o parasoles, como fibra de vidrio o acero.
    pole_color:
      name: Color del poste
      description: Identifica el color del poste en productos como sombrillas, por
        ejemplo, negro, bronce
    pole_material:
      name: Material del poste
      description: Especifica el material utilizado en la construcción del poste,
        por ejemplo, el acero o la madera.
    pole_pattern:
      name: Patrón del poste
      description: Describe el diseño o motivo en el poste de una sombrilla, como
        floral o geométrico
    policy_sign_design:
      name: Diseño de letreros de políticas
      description: Describe el mensaje específico que se muestra en un letrero de
        norma, por ejemplo, no fumar o prohibido el uso de teléfonos móviles.
    polish_dry_form:
      name: Forma de secado del pulimento
      description: Identifica la formulación de productos para secar esmaltes de uñas,
        por ejemplo, a base de disolventes o de silicona.
    polish_remover_form:
      name: Forma del quitaesmalte
      description: Especifica el tipo de producto quitaesmalte, por ejemplo, líquido
        o envolturas de remoción.
    polish_remover_formulation:
      name: Formulación del removedor de esmalte
      description: Indica la composición química del removedor, especialmente el contenido
        de acetona o bases alternativas.
    polish_type:
      name: Tipo de pulido
      description: Identifica el tipo específico de pulimento utilizado para el cuidado
        de embarcaciones, como metálico o de vinilo.
    polyphony:
      name: Polifonía
      description: Especifica la capacidad de notas simultáneas de un sintetizador,
        por ejemplo, polifónico o multitímbrico.
    portability:
      name: Portabilidad
      description: Especifica la facilidad para mover o transportar un producto, normalmente
        sacaleches, como, por ejemplo, de tamaño compacto y portátil.
    post_material:
      name: Material del poste
      description: Especifica el tipo de material empleado en postes de varias categorías,
        por ejemplo, el aluminio o la fibra de vidrio.
    postage_stamp_features:
      name: Características del sello postal
      description: Identifica características especiales de los sellos postales, como
        la sobreimpresión o la marca de agua.
    postpartum_stage:
      name: Etapa posparto
      description: Especifica el período de tiempo después del parto para el cual
        está diseñada la almohadilla.
    potential_extract:
      name: Extracto potencial
      description: Indica el nivel potencial de extracto en granos y maltas para la
        elaboración de cerveza, como bajo o alto.
    pottery/sculpting_project_type:
      name: Tipo de proyecto de artesanía/escultura
      description: Identifica el tipo de proyecto de cerámica o escultura, como el
        modelado o la fabricación de máscaras.
    potty/toilet_seat_design:
      name: Diseño de bacinilla/asiento de inodoro
      description: Define el estilo o estructura del orinal o asiento para el inodoro,
        como plegable o estándar.
    potty_training_kit_components:
      name: Componentes del kit de entrenamiento para control de esfínteres
      description: Especifica los artículos incluidos en un kit de entrenamiento de
        baño, por ejemplo, pegatinas o un taburete.
    power_connector_type:
      name: Tipo de conector de alimentación
      description: Especifica los conectores de alimentación auxiliar requeridos o
        proporcionados por el elevador o adaptador.
    power_conversion_semiconductor_type:
      name: Tipo de semiconductor de conversión de energía
      description: Identifica el material semiconductor principal utilizado en la
        etapa de potencia del cargador, lo cual influye en el tamaño, la eficiencia
        y la generación de calor.
    power_source:
      name: Fuente de alimentación
      description: Especifica la fuente de energía que utiliza un producto para funcionar,
        como la energía solar o las pilas.
    power_supply_efficiency_rating:
      name: Calificación de eficiencia de la fuente de alimentación
      description: Indica el nivel de certificación de eficiencia 80 Plus de la fuente
        de alimentación (PSU) de escritorio.
    power_supply_form_factor:
      name: Factor de forma de la fuente de alimentación
      description: Especifica el tamaño físico y estándar de montaje de la PSU (p.
        ej., ATX, SFX).
    power_supply_modularity:
      name: Modularidad de la fuente de alimentación
      description: Indica si los cables de la PSU son no removibles, parcialmente
        removibles, o completamente removibles.
    pregnancy_test_sensitivity:
      name: Sensibilidad de la prueba de embarazo
      description: Especifica la capacidad de la prueba para identificar el embarazo,
        como, por ejemplo, detección temprana o estándar.
    prescription_status:
      name: Estado de prescripción
      description: Indica si las gotas para los oídos están disponibles sin receta
        o requieren una receta de un profesional de la salud.
    presentation_supply_features:
      name: Características del suministro de presentación
      description: Describe las características únicas de los accesorios para presentaciones,
        como la altura ajustable o la superficie borrable.
    preservation_type:
      name: Tipo de conservación
      description: Identifica el método utilizado para conservar muestras de laboratorio,
        como fijadas o secas.
    pretend_electronics_toy_type:
      name: Tipo de juguete electrónico de electricista
      description: Especifica la categoría de dispositivos electrónicos de simulación,
        por ejemplo, cámara, teléfono móvil
    pretend_housekeeping_toy_type:
      name: Tipo de juguete de ama de casa
      description: Identifica el tipo de juguete de simulación para hacer tareas domésticas,
        como un juego de limpieza o un electrodoméstico de cocina
    primary_pcie_slot_version:
      name: Versión de la ranura PCIe principal
      description: Indica la generación de PCI Express admitida por la ranura x16
        principal típicamente utilizada para tarjetas gráficas.
    primary_region:
      name: Región primaria
      description: Especifica el mercado o ubicación principal para un software o
        servicio en la nube, por ejemplo, América del Norte o Asia-Pacífico.
    primer_use:
      name: Uso de pintura de fondo
      description: Especifica la función de una imprimación, como de pintura base
        o sellador.
    print_orientation:
      name: Orientación de impresión
      description: Identifica en qué lado del material está impreso el gráfico.
    print_server_form_factor:
      name: Factor de forma del servidor de impresión
      description: Indica el diseño físico del servidor de impresión (p. ej., caja
        externa, tarjeta interna, dongle USB).
    print_technology:
      name: Tecnología de impresión
      description: Especifica el proceso utilizado por una impresora, como la inyección
        de tinta o el láser.
    printer/copier_specialized_features:
      name: Características especializadas de la impresora/copiadora
      description: Destaca características específicas de las impresoras/copiadoras,
        como la compatibilidad con la impresión móvil o el control por voz.
    printer_accessories_included:
      name: Accesorios para impresora incluidos
      description: Detalla los componentes complementarios incluidos con una impresora,
        fotocopiadora o fax, como, por ejemplo, la bandeja de papel o el fusor.
    printer_color_capability:
      name: Capacidad de color de la impresora
      description: Especifica si el dispositivo imprime solo en monocromo o admite
        impresión y copia a todo color.
    printer_connection_interface:
      name: Interfaz de conexión de la impresora
      description: Define el tipo de puerto que el servidor de impresión utiliza para
        conectarse a la impresora.
    printer_form_factor:
      name: Factor de forma de la impresora
      description: Clasifica el estilo físico o portabilidad del dispositivo.
    printer_functions:
      name: Funciones de la impresora
      description: Define las capacidades de las impresoras, fotocopiadoras y máquinas
        de fax, como, por ejemplo, escanear o la impresión de fotos.
    printing_color:
      name: Color de impresión
      description: Define la salida de color de los cartuchos de tóner e inyección
        de tinta, por ejemplo, negro o cian.
    printing_method:
      name: Método de impresión
      description: Especifica el proceso de impresión, como la impresión offset o
        el grabado.
    privacy_filtering_direction:
      name: Dirección del filtro de privacidad
      description: Indica desde qué direcciones de visualización el filtro bloquea
        la visibilidad (p. ej., bidireccional horizontal, cuatro direcciones).
    processor_cores:
      name: Núcleos del procesador
      description: Indica el número de núcleos del procesador informático, como, por
        ejemplo, dual.
    processor_family:
      name: Familia de procesadores
      description: Identifica la serie o marca de la CPU del dispositivo electrónico,
        por ejemplo Intel Core i7.
    processor_socket:
      name: Zócalo del procesador
      description: Especifica el tipo de zócalo de procesador compatible en electrónica,
        como LGA 1151 (zócalo H4) o zócalo AM4.
    processor_technology:
      name: Tecnología del procesador
      description: Define la tecnología de procesador, normalmente de equipos de audio,
        como, por ejemplo, basada en software o de tubo/válvula.
    product_benefits:
      name: Beneficios del producto
      description: Describe los beneficios que ofrece un producto, normalmente de
        salud y belleza, como, por ejemplo, suavizar o reafirmar.
    product_certifications_standards:
      name: Certificaciones y estándares del producto
      description: Indica las certificaciones o estándares que cumple un producto,
        como, por ejemplo, orgánico o no testado en animales.
    product_classification:
      name: Clasificación del producto
      description: Clasifica el tipo de material precioso, la divisa o el artículo
        valioso (por ejemplo, divisas, lingotes, piedras preciosas, tarjetas regalo,
        NFT)
    product_form:
      name: Forma del producto
      description: Define el formato o presentación de un producto de salud y belleza,
        como, por ejemplo, loción o suero.
    product_format:
      name: Formato del producto
      description: Indica si el artículo se entrega como un producto físico o una
        descarga digital.
    product_formulation:
      name: Formulación del producto
      description: Identifica la composición de los consumibles para construcción,
        por ejemplo, sustancia base o producto premezclado.
    product_manual_area:
      name: Área del manual del producto
      description: Especifica el tema de un manual de producto, por ejemplo, cámaras
        y ópticas o suministros de oficina.
    product_sterility:
      name: Esterilidad del producto
      description: Indica si un producto es estéril por motivos de salud y seguridad.
    product_use:
      name: Uso del producto
      description: Identifica el uso o propósito principal previsto de los materiales
        preciosos o de colección (por ejemplo, moneda/moneda de curso legal, objeto
        de colección, joyería, tarjeta de regalo)
    program_format:
      name: Formato del programa
      description: Describe el diseño de los programas de eventos, como de tipo folleto
        o de una sola hoja.
    projection_design:
      name: Diseño de la proyección
      description: Describe el patrón o la imagen que proyecta un filtro de iluminación
        o plantilla, como un texto o logotipo.
    projector_light_source:
      name: Fuente de luz del proyector
      description: Identifica el tipo de fuente de luz de un proyector, como LED o
        láser.
    prop_theme:
      name: Tema de utilería
      description: Identifica el estilo o género del atrezo de cine y televisión,
        como históricos o de ciencia ficción.
    propane_application:
      name: Aplicación de propano
      description: Especifica el propósito del propano, como, por ejemplo, para calefacción
        o asado.
    propeller_blade_design:
      name: Diseño de palas de hélice
      description: Describe la configuración de las hélices de propulsión de una embarcación,
        como de 3 o 4 palas.
    prophy_cup_design:
      name: Diseño de copa de pulido
      description: Describe el diseño de las copas para profilaxis que se usan en
        odontología, como de cepillo o acanalados.
    propulsion_type:
      name: Tipo de propulsión
      description: Especifica el método de movimiento de equipos exteriores, como,
        por ejemplo, empujar o tirar.
    protected_component:
      name: Componente protegido
      description: Identifica la parte de la máquina de pinball que protege la cubierta.
    protection_type:
      name: Tipo de protección
      description: Identifica el nivel de protección que ofrece el equipo de seguridad,
        como Tipo I o Tipo II.
    protective_gear_features:
      name: Características del equipamiento de protección
      description: Identifica las características únicas del equipo de protección,
        como a prueba de golpes o antivaho.
    protective_mask_design:
      name: Diseño de la máscara protectora
      description: Especifica el diseño de máscaras protectoras, como cara completa
        o media máscara
    protective_mask_features:
      name: Características de la máscara protectora
      description: Detalla las características únicas de las mascarillas protectoras,
        como la correa ajustable o la disponibilidad de válvula.
    protein_processing_type:
      name: Tipo de procesamiento de proteína
      description: Especifica cómo se refina o procesa la proteína (p. ej., aislado
        vs. concentrado), afectando la pureza, velocidad de digestión y preferencia
        del consumidor.
    protein_source:
      name: Fuente de proteína
      description: Identifica el origen principal de proteína usado en el suplemento.
    pstn_connectivity_options:
      name: Opciones de conectividad PSTN
      description: Especifica las interfaces de la red telefónica de conmutación pública
        (PSTN) que admite un producto, por ejemplo, FXO o POTS.
    publication_frequency:
      name: Frecuencia de publicación
      description: Indica la frecuencia con la que se publica una revista o periódico,
        como diaria o mensual.
    publication_type:
      name: Tipo de publicación
      description: Identifica el tipo de publicación académica o de investigación,
        como un artículo de revista o una tesis.
    pull_up_bar:
      name: Barra de dominadas
      description: Especifica el tipo de agarre de los equipos de fitness, como estándar
        o crudo.
    pump_accessories:
      name: Accesorios para extractores
      description: Identifica los artículos que se incluyen con los sacaleches, como
        el estuche de transporte o los biberones.
    pump_speed_settings:
      name: Configuración de velocidad del extractor
      description: Especifica las funciones de control de velocidad, normalmente en
        sacaleches, como, por ejemplo, la velocidad ajustable.
    punching/training_bag_material:
      name: Material del punching/saco de entrenamiento
      description: Identifica el material principal que se usa en un punching/saco
        de entrenamiento, como el cuero o la lona.
    puppet_theme:
      name: Tema de la marioneta
      description: Clasifica las marionetas según el tema de diseño, como seres humanos
        o fantásticos.
    puppet_type:
      name: Tipo de marioneta
      description: Identifica el estilo de la marioneta, como títere de mano o marioneta.
    push_button_terminal_type:
      name: Tipo de terminal del botón pulsador
      description: Especifica el estilo de conexión eléctrica en el botón, asegurando
        compatibilidad con arneses de cableado y pestañas de conexión rápida durante
        la instalación.
    puzzle_theme:
      name: Tema de rompecabezas
      description: Describe el tema o motivo principal de un puzzle, como de animales
        o del espacio.
    puzzle_type:
      name: Tipo de puzzle
      description: Identifica el tipo específico de puzzle, como 3D o rompecabezas
    quiver_style:
      name: Estilo de carcaj
      description: Especifica el estilo del portaflechas del tiro con arco, como,
        por ejemplo, de cadera o espalda.
    rack_design:
      name: Diseño del estante
      description: Describe el diseño o la estructura de un estante de vidrio, como
        abierto o de compartimentos.
    rack_format:
      name: Formato de rack
      description: Define el estándar de carcasa o tamaño físico del canal para colocación
        en rack o escritorio.
    rack_mounting_style:
      name: Estilo de montaje en rack
      description: Describe el estilo estructural del montaje en rack (p. ej., estante
        fijo, estante deslizante, rieles, panel en blanco).
    rack_type:
      name: Tipo de portaequipajes
      description: Identifica el estilo del portaequipajes de un vehículo, como el
        maletero o el techo.
    rack_width_standard:
      name: Estándar de ancho de rack
      description: Define el ancho de montaje horizontal estándar de la industria
        que sigue el producto.
    racket_balance:
      name: Equilibrio de raqueta
      description: Indica la distribución del peso de una raqueta, p. ej., de cabeza
        pesada, balance uniforme.
    racket_gauge:
      name: Calibre de raqueta
      description: Especifica el grosor de las cuerdas de la raqueta de tenis, por
        ejemplo, 16.
    racket_head_shape:
      name: Forma de la cabeza de la raqueta
      description: Define la forma de la cabeza de la raqueta, por ejemplo, ovalada,
        isométrica.
    racket_material:
      name: Material de la raqueta
      description: Especifica el tipo de material del que está hecha una raqueta deportiva,
        como la madera o la fibra de carbono.
    racket_string_design:
      name: Diseño de las cuerdas de la raqueta
      description: Identifica la construcción del cordaje de las raquetas de tenis,
        como monofilamento y multifilamento.
    racket_string_material:
      name: Material de las cuerdas de la raqueta
      description: Especifica la composición de las cuerdas de las raquetas de tenis,
        como Kevlar o Poliuretano (PU).
    radar_bands:
      name: Bandas de radar
      description: Especifica las bandas de frecuencia que un dispositivo de radar
        puede detectar, por ejemplo, X o K.
    radar_technology:
      name: Tecnología de radar
      description: Especifica la tecnología de radar utilizada en un producto, por
        ejemplo, de pulso, de estado sólido
    radio_case_design:
      name: Diseño de caja del radio
      description: Define el estilo o funcionalidad de los maletines de transporte
        de radio, como fijos o giratorios.
    radio_features:
      name: Características de la radio
      description: Especifica las capacidades únicas de una radio, como la compatibilidad
        con GPS o la reproducción de MP3.
    radio_form_factor:
      name: Factor de forma de radio
      description: Identifica la clase física del transceptor aficionado, influyendo
        en las opciones de montaje, los requisitos de energía y los escenarios de
        uso típicos.
    radio_scanner_form_factor:
      name: Factor de forma del escáner de radio
      description: Indica la configuración física o el estilo de montaje del escáner
        de radio (p. ej., portátil, base, escritorio, montado en vehículo).
    radiology_compatibility:
      name: Compatibilidad radiológica
      description: Indica si la órtesis puede permanecer en el paciente durante procedimientos
        de imagen (p. ej., RMN, TC, rayos X).
    raid_levels_supported:
      name: Niveles de RAID soportados
      description: Enumera todas las configuraciones RAID que la matriz de discos
        duros puede crear o gestionar.
    ramp_type:
      name: Tipo de rampa
      description: Especifica el diseño o estilo de las rampas de skateboard, como
        de medio tubo o diversión.
    range_type:
      name: Tipo de rango
      description: Define el área de cobertura de los dispositivos como monitores
        para bebés, como los de largo alcance.
    rarity:
      name: Rareza
      description: Especifica la singularidad de los artículos, generalmente de colección,
        como, por ejemplo, de edición limitada o exclusivos.
    razor_flexibility:
      name: Flexibilidad de la afeitadora
      description: Indica la flexibilidad de las maquinillas de afeitar y recortadoras,
        como, por ejemplo, flexibles o fijas.
    razor_head_design:
      name: Diseño del cabezal de la afeitadora
      description: Define el número de hojas de una maquinilla de afeitar, por ejemplo,
        sencilla o triple.
    razor_type:
      name: Tipo de navaja
      description: 'Especifica el diseño de la maquinilla de afeitar, como, por ejemplo,
        recta o sintética. '
    read/write_speed:
      name: Velocidad de lectura o escritura
      description: Indica la tasa o velocidad de transferencia de datos, generalmente
        de duplicadores de discos, como, por ejemplo, 4x o 52x.
    reading_toy_type:
      name: Tipo de juguete de lectura
      description: Especifica el tipo de juguete de lectura educativo, por ejemplo,
        juego de ortografía, tableta de lectura
    receipt_paper_features:
      name: Características del papel de recibo
      description: Identifica las características únicas del papel de recibos, como
        el indicador de fin de rollo o el logotipo preimpreso.
    reclining_function:
      name: Función de reclinado
      description: Describe características de reclinación específicas, como reclinación
        total o gravedad cero.
    recommended_age_group:
      name: Grupo de edad recomendado
      description: Identifica el rango de edad adecuado para un producto, normalmente
        juguetes y juegos, como, por ejemplo, bebés o adolescentes.
    recommended_skill_level:
      name: Nivel de habilidad recomendado
      description: Especifica el nivel de habilidad, como, por ejemplo, principiante
        o experto.
    recommended_use:
      name: Uso recomendado
      description: Identifica el uso o ámbito principal para el que se ha diseñado
        un producto de bricolaje, por ejemplo, industrial o residencial.
    record_cleaning_components_included:
      name: Componentes de limpieza de discos incluidos
      description: Enumera los artículos específicos suministrados en el kit para
        que los clientes puedan comparar paquetes de un vistazo (p. ej., cepillo,
        fluido, paño).
    recorder_fingering_system:
      name: Sistema de digitación de flauta dulce
      description: Especifica el tipo de sistema de digitación de la flauta dulce,
        por ejemplo, alemán o barroco.
    recorder_specialized_features:
      name: Características especializadas del grabador
      description: Identifica funciones avanzadas de las grabadoras de vídeo, por
        ejemplo, las funciones inteligentes o la compatibilidad con Dolby Atmos.
    recording_accessories_included:
      name: Accesorios para grabación incluidos
      description: Detalla los componentes adicionales que incluyen los paquetes de
        grabación, como auriculares o micrófono.
    recording_capability_type:
      name: Tipo de capacidad de grabación
      description: Indica si el receptor puede grabar contenido de TV y el método
        utilizado (p. ej., USB PVR, disco duro interno, nube).
    recording_functionality:
      name: Funcionalidad de grabación
      description: Indica si y cómo el receptor puede grabar contenido de TV (p. ej.,
        DVR en disco duro interno, USB externo).
    recording_mode:
      name: Modo de grabación
      description: Enumera los modos operativos que admite el grabador (p. ej., continuo,
        grabación temporizada).
    recording_quality:
      name: Calidad de grabación
      description: Describe la claridad de audio de los transcriptores y sistemas
        de dictado, como baja o alta.
    recording_speed_modes_supported:
      name: Modos de velocidad de grabación admitidos
      description: Enumera los modos de velocidad de cinta que el VCR puede grabar
        o reproducir, afectando el tiempo de grabación y la calidad de imagen.
    recreational_vehicle_type:
      name: Tipo de vehículo recreativo
      description: Identifica la categoría de un vehículo recreativo, como Clase A
        o remolque de viaje.
    reed_strength:
      name: Fuerza de la caña
      description: Indica la flexibilidad de las lengüetas de instrumentos de viento
        de madera, como suave, media o dura.
    reel_capacity:
      name: Capacidad del carrete
      description: Especifica la capacidad de un carrete en un tanque revelador, como
        simple o cuádruple.
    reflector_design:
      name: Diseño del reflector
      description: Describe el diseño de un reflector de flash, como de panal o paraguas.
    regenerative_braking_features:
      name: Características del freno regenerativo
      description: Describe las características de los módulos de frenado regenerativo
        de vehículos eléctricos, por ejemplo, la resistencia a la intemperie y la
        facilidad de instalación.
    region:
      name: Región
      description: Identifica la ubicación específica de procedencia del producto,
        normalmente de vinos y bebidas espirituosas, como, por ejemplo, California
        o Burdeos.
    region_code:
      name: Código de región
      description: Especifica la región donde se otorga licencia para el uso de un
        software de videojuego, como Asia (AS) o Global (GL).
    release_mechanism:
      name: Mecanismo de liberación
      description: Indica la tecnología de entrega o absorción de la vitamina (p.
        ej., liberación sostenida, liposomal, masticable).
    release_schedule:
      name: Programa de lanzamiento
      description: Especifica la frecuencia con la que se publican nuevos episodios
        o actualizaciones, por ejemplo, semanalmente o cada quince días.
    remote_control_functions:
      name: Funciones del control remoto
      description: Enumera las acciones específicas que puede activar el obturador
        remoto además de tomar fotografías.
    remote_shutter_form_factor:
      name: Factor de forma del obturador remoto
      description: Identifica el estilo físico o la carcasa del obturador remoto,
        como llavero/botón, controlador de anillo o palo para selfies con obturador
        integrado.
    remote_technology:
      name: Tecnología remota
      description: Identifica la tecnología que se usa en los controles remotos de
        la cámara, como Bluetooth o conectada.
    removable_storage_formats_supported:
      name: Formatos de almacenamiento extraíbles compatibles
      description: Define los formatos de almacenamiento extraíbles con los que un
        dispositivo es compatible, por ejemplo, SD o microUSB.
    removal_target:
      name: Objetivo de eliminación
      description: Especifica qué productos de uñas está diseñado el removedor para
        disolver (p. ej., esmalte en gel, uñas acrílicas, polvo dip).
    replacement_lamp_type:
      name: Tipo de lámpara de repuesto
      description: Clasifica el estilo de pieza de repuesto proporcionada (p. ej.,
        módulo de lámpara y carcasa, tira de retroiluminación LED, conjunto CCFL).
    reptile/amphibian_food_form:
      name: Forma del alimento para reptiles/anfibios
      description: Especifica la forma del alimento para reptiles/anfibios, por ejemplo,
        liofilizado o en gránulos
    reptile/amphibian_habitat_supply_type:
      name: Tipo de suministro de terrario para reptiles/anfibios
      description: Identifica el tipo de suministro de calefacción o iluminación para
        hábitats de reptiles/anfibios, como una lámpara de calor o una lámpara UVB
    research_focus:
      name: Enfoque de investigación
      description: Identifica el área principal de estudio de artículos académicos,
        como la biología o la economía.
    research_methodology:
      name: Metodología de investigación
      description: Identifica el tipo de métodos de investigación que se usan en artículos
        académicos, como de encuesta o cualitativos.
    resistance_level:
      name: Nivel de resistencia
      description: Indica el nivel de resistencia del producto, normalmente bandas
        elásticas, como, por ejemplo, extra fuertes.
    resistance_system:
      name: Sistema de resistencia
      description: Define el mecanismo utilizado para crear resistencia en equipos
        de fitness, como el agua o el aire.
    resistance_tolerance:
      name: Tolerancia de resistencia
      description: Define la desviación permisible de la resistencia real de su valor
        nominal, expresada como porcentaje (p. ej., ±1%).
    restrictor_gate_shape:
      name: Forma de compuerta restrictora
      description: Define la forma geométrica de la compuerta restrictora incluida
        con o requerida por el joystick.
    result_display:
      name: Pantalla de resultados
      description: Especifica el formato de la prueba de embarazo, por ejemplo, con
        líneas o digital.
    retail/sale_sign_design:
      name: Diseño de letreros de oferta
      description: Indica el tipo de mensaje de carteles de venta o venta minorista,
        por ejemplo, oferta u oferta especial.
    reticle_plane:
      name: Plano de retícula
      description: Especifica el plano focal de la retícula en visores y miras de
        armas, por ejemplo, primera o segunda
    reticle_type:
      name: Tipo de retícula
      description: Identifica el tipo de retícula de las miras de armas, como Duplex
        o Mildot.
    rewinder_operation_mode:
      name: Modo de operación del rebobinador
      description: Define los modos funcionales que admite el rebobinador (p. ej.,
        solo rebobinado, rebobinado y avance rápido).
    rf_output_standard:
      name: Estándar de salida RF
      description: Especifica el estándar de transmisión de televisión o radio que
        produce el modulador.
    rfid_frequency:
      name: Frecuencia RFID
      description: Especifica la frecuencia de funcionamiento de los productos de
        RFID, como, por ejemplo, baja o ultraalta.
    riding_style:
      name: Estilo de conducción
      description: Especifica el uso previsto o la disciplina del equipo de deportes
        de invierno, como, por ejemplo, el slalom o el estilo libre.
    riding_toy_propulsion_type:
      name: Tipo de propulsión de juguete para montar
      description: Identifica cómo se impulsa un juguete para montar, como mediante
        electricidad o pedales.
    rim/wheel_design:
      name: Diseño de llanta/rueda
      description: Describe el estilo o la construcción de llantas/ruedas de vehículos,
        como de aleación o con radios.
    ring_design:
      name: Diseño de anillo
      description: Describe el estilo de un anillo, como banda o individual
    ring_size:
      name: Tamaño del anillo
      description: Especifica la talla de un anillo, como L o 6,5
    rinse_requirement:
      name: Requisito de enjuague
      description: Aclara si el limpiador debe enjuagarse, puede dejarse puesto o
        no requiere enjuague (p. ej., agua micelar).
    rise_height_class:
      name: Clase de altura de elevación
      description: Categoriza cuánta altura adicional añade el agarre para pulgar
        relativa al stick original (p. ej., elevación baja, media, alta).
    riser_color:
      name: Color del cuerpo
      description: Identifica el color de la contrahuella en arcos de tiro, como negro
        o azul
    riser_material:
      name: Material del elevador
      description: Especifica el material de un cuerpo de arco o ballesta, como la
        fibra de carbono o la madera.
    riser_pattern:
      name: Patrón del cuerpo
      description: Describe el diseño o motivo en el cuerpo de arcos y ballestas,
        como camuflado o con textura
    rivet_form:
      name: Forma del remache
      description: Describe la forma de los remaches, como macizos o divididos.
    road_sign_design:
      name: Diseño de señales de tráfico
      description: Identifica el tipo de información que se muestra en una señal de
        tráfico, por ejemplo, un stop o un límite de velocidad.
    robe_style:
      name: Estilo de bata
      description: Especifica el tipo de diseño general o estilo de construcción de
        la bata, como bata de spa o bata cruzada.
    rock_composition:
      name: Composición de la roca
      description: Especifica la composición geológica de una roca, como mármol o
        piedra caliza.
    rock_formation:
      name: Formación de la roca
      description: Especifica la clasificación geológica de las rocas, como ígneas
        o sedimentarias.
    rocker_type:
      name: Tipo de rocker
      description: Especifica el estilo de curvatura de las tablas de snowboard o
        los esquís, como, por ejemplo, plana o con curvatura.
    rod_color:
      name: Color de la varilla
      description: Identifica el color de una caña de pescar, por ejemplo, negro o
        azul
    rod_material:
      name: Material de la caña
      description: Identifica el material que se utiliza en el equipamiento deportivo
        basado en varillas, como, por ejemplo, el grafito o la fibra de vidrio.
    rod_pattern:
      name: Patrón de la varilla
      description: Describe el diseño o impresión de una caña de pescar, como camuflado
        o a rayas
    rod_shape:
      name: Forma de la caña
      description: Define la forma o configuración de las barras de ducha, como, por
        ejemplo, rectas o en U.
    roller_head:
      name: Cabezal de rodillo
      description: Define el número de cabezales de los rodillos, normalmente de herramientas
        para el cuidado de la piel, como, por ejemplo, simple o doble.
    roller_material:
      name: Material del rodillo
      description: Especifica el material que se utiliza en un rodillo, normalmente
        para utensilios de cuidado de la piel, como, por ejemplo, el jade o la silicona.
    roller_type:
      name: Tipo de rodillo
      description: Identifica el tipo de rodillo, normalmente de utensilios de cuidado
        de la piel, como, por ejemplo, el hielo o las microagujas.
    roof_decor_shape:
      name: Forma de decoración del techo
      description: Define el diseño o la forma de las decoraciones del techo, como
        un caballo o un velero.
    room_correction_technology:
      name: Tecnología de corrección de sala
      description: Especifica la calibración acústica automática o el sistema de corrección
        de sala integrado en el receptor.
    rosin_form:
      name: Forma de la perrubia
      description: Describe la forma de la colofonia para arco para instrumentos de
        cuerda, como en bloque o con forma de pastel.
    rosin_grade:
      name: Grado de resina
      description: Especifica el tipo de colofonia que se usa con los instrumentos
        de cuerda, por ejemplo, oscura o media.
    rotating_direction:
      name: Dirección de rotación
      description: Especifica la dirección de giro de las puntas de taladro y destornillador,
        como a la izquierda o derecha.
    rotation_direction:
      name: Dirección de rotación
      description: Indica si el taladro de uñas admite rotación hacia adelante, rotación
        inversa, o ambas.
    rotator_control_technology:
      name: Tecnología de control de rotadores
      description: Define el mecanismo de control de los rotadores de antena, como
        manuales o motorizados.
    route_of_administration:
      name: Vía de administración
      description: Identifica cómo se aplica o consume el producto, influyendo en
        la eficacia y seguridad (p. ej., oral, tópico, parche transdérmico, sublingual,
        inyección intramuscular).
    rug/mat_features:
      name: Características del tapete/alfombra
      description: Describe características especiales de alfombras/tapetes, como
        la base antideslizante o el secado rápido.
    rug/mat_material:
      name: Material del tapete/alfombra
      description: Especifica el tipo de material utilizado en las colchonetas de
        ejercicio, como el caucho o la microfibra.
    rug/mat_shape:
      name: Forma del tapete/alfombra
      description: Especifica la forma de tapetes y alfombras, por ejemplo, corredor,
        cuadrada
    rug_features:
      name: Características del tapete
      description: Describe características específicas de los tapetes, como la base
        antideslizante o los colores resistentes a rayos UV.
    rug_material:
      name: Material del tapete
      description: Identifica el material principal de fabricación de un tapete, como
        la lana o el yute.
    rug_shape:
      name: Forma del tapete
      description: Identifica el diseño geométrico de los tapetes, como cuadrados
        o de corredor.
    rum_grade:
      name: Grado del ron
      description: Clasifica el ron según sus características o grados, por ejemplo,
        premium o especiado.
    saddle_base_color:
      name: Color de la base del sillín
      description: Identifica el color primario de la base de la silleta de una bicicleta,
        como negro o azul
    saddle_base_material:
      name: Material de la base del sillín
      description: Identifica el material utilizado en la base de un sillín de bicicleta,
        como el acero o la fibra de carbono.
    saddle_base_pattern:
      name: Patrón de la base del sillín
      description: Describe el diseño o la impresión en la base de una silleta de
        bicicleta, como abstracto o con un logo
    saddle_material:
      name: Material del sillín
      description: Especifica el material que se utiliza en los sillines de bicicleta,
        como el caucho o el cuero.
    saddle_seat_color:
      name: Color del sillín
      description: Especifica el color de la silleta de una bicicleta, como plateado
        o rojo
    saddle_seat_material:
      name: Material del sillín
      description: Identifica el material utilizado en la construcción de un sillín
        de bicicleta, como el cuero o nailon.
    saddle_seat_pattern:
      name: Patrón del sillín
      description: Describe el diseño o estampado de la silleta de una bicicleta,
        como floral o geométrico
    safety_certifications:
      name: Certificaciones de seguridad
      description: Indica el cumplimiento del producto de las normas de seguridad,
        normalmente para productos para bebés, como, por ejemplo, sin BPA.
    safety_device_installation:
      name: Instalación de dispositivo de seguridad
      description: Define cómo se montan o fijan los productos de seguridad, por ejemplo,
        mediante adhesivo o con tornillos.
    safety_equipment_material:
      name: Material del equipo de seguridad
      description: Especifica el tipo de material de los elementos de seguridad del
        vehículo, como el nailon o la fibra de vidrio.
    safety_rail_installation:
      name: Instalación de barandilla de seguridad
      description: Define cómo se instalan los rieles de seguridad, como ajustables
        o permanentes.
    sailboat_type:
      name: Tipo de bote
      description: Identifica el diseño o modelo específico de un velero, como un
        balandro o cúter.
    sandal_style:
      name: Estilo de sandalia
      description: Especifica el estilo de las sandalias, como correa al tobillo o
        con cordones
    sandblaster_application:
      name: Aplicación de arenadora
      description: Define la función prevista de las herramientas de chorro de arena,
        como el pulido o lijado.
    sander_type:
      name: Tipo de lijadora
      description: Clasifica el tipo de herramienta lijadora, por ejemplo, de cinta
        u orbital aleatoria.
    sanding_application:
      name: Aplicación de lijado
      description: Especifica el propósito de los accesorios de lijado, como el trabajo
        de acabado o la retirada de pintura.
    satellite_coverage_area:
      name: Área de cobertura satelital
      description: Define las regiones geográficas a las que puede acceder un teléfono
        satélite, como Australia o África.
    satellite_messaging_capability:
      name: Capacidad de mensajería satelital
      description: Indica si el producto admite mensajería satelital unidireccional
        (solo saliente) o bidireccional (enviar y recibir).
    satellite_navigation_systems_supported:
      name: Sistemas de navegación por satélite compatibles
      description: Especifica qué sistemas globales de navegación por satélite (GNSS)
        puede recibir el teléfono para posicionamiento y seguimiento.
    satellite_network_type:
      name: Tipo de red satelital
      description: Identifica el proveedor de servicios para teléfonos satélite, por
        ejemplo, Inmarsat o Iridium.
    sauna_accessories_included:
      name: Accesorios para sauna incluidos
      description: Identifica los elementos adicionales incluidos con una sauna, como
        un cucharón o piedras de sauna
    scaffolding_mounting_type:
      name: Tipo de montaje de andamio
      description: Especifica el estilo de instalación del andamio, por ejemplo, de
        marco o móvil.
    scale_material:
      name: Material de la escala
      description: Identifica el material utilizado en la escala de calibres forestales,
        como, por ejemplo, el acero inoxidable o el plástico.
    scale_model_accessory_type:
      name: Tipo de accesorio de modelo a escala
      description: Identifica el tipo de accesorio de maquetas, como edificios o figuras.
    scale_model_kit_type:
      name: Tipo de kit para modelismo
      description: Especifica la categoría del kit de modelo a escala, como un tanque
        o una nave espacial
    scale_model_material:
      name: Material de modelismo
      description: Identifica el material principal utilizado en las maquetas, como
        la madera o la cartulina.
    scale_model_theme:
      name: Tema de modelo a escala
      description: Identifica el tema de una maqueta, como fantasía o historia.
    scalp_concern:
      name: Preocupación del cuero cabelludo
      description: Especifica el problema principal del cuero cabelludo o cabello
        que el tratamiento está formulado para abordar.
    scalpel_blade_material:
      name: Material de la hoja de bisturí
      description: Identifica la composición de la hoja de bisturí, como el acero
        inoxidable o el titanio.
    scalpel_blade_number:
      name: Número de hoja de bisturí
      description: Identifica el número o tipo específico de hoja de bisturí, como
        10 o 15A.
    scalpel_blade_shape:
      name: Forma de la hoja de bisturí
      description: Describe la forma de la hoja del bisturí, como curvada o recta.
    scalpel_handle_number:
      name: Número de mango de bisturí
      description: Identifica el número de mango específico de bisturíes, como 4 o
        3L.
    scan_converter_features:
      name: Características del convertidor de escaneo
      description: Destaca las características únicas de un convertidor de escaneo,
        como la calibración automática de imágenes o el control remoto.
    scanner_features:
      name: Características del escáner
      description: Destaca las funciones especiales de un escáner, como el escaneo
        con tecnología de inteligencia artificial o el escaneo a la nube.
    scanner_grip_compatibility:
      name: Compatibilidad del agarre del escáner
      description: Indica si la funda es compatible con escáneres con mango de pistola/gatillo,
        forma portátil estándar o ambos.
    scanner_maintenance_kit_type:
      name: Tipo de kit de mantenimiento del escáner
      description: Clasifica la naturaleza del producto para que los compradores puedan
        distinguir rápidamente entre tarjetas de limpieza, kits completos, kits de
        calibración, conjuntos de rodillos, toallitas y soluciones.
    scanner_sensor_type:
      name: Tipo de sensor de escáner
      description: Especifica el tipo de sensor de los escáneres, como un generador
        de imágenes 2D o láser.
    scarf/shawl_style:
      name: Estilo de bufanda/chal
      description: Identifica el estilo de bufandas y chales, por ejemplo, manta,
        abrigo
    scene_modes:
      name: Modos de escena
      description: Define el modo de la cámara para capturar diferentes escenarios,
        como nocturno o bajo el agua.
    scent:
      name: Aroma
      description: Especifica la fragancia o el aroma de un producto, como la vainilla
        o los cítricos.
    scissor_blade_type:
      name: Tipo de hoja de tijera
      description: Describe la forma y el estilo de las hojas de las tijeras, como
        las curvas o dentadas.
    scooter_brake_type:
      name: Tipo de freno de scooter
      description: Especifica el mecanismo y diseño de los frenos del scooter, como
        los de disco o tambor
    scope/sight_design:
      name: Diseño de alcance/mira
      description: Describe el tipo de diseño de miras o miras para armas, por ejemplo,
        de visión nocturna o láser.
    scope/sight_features:
      name: Características de la mira
      description: Describe características especiales de miras o miras de armas,
        como con retícula iluminada o grabación de sonido.
    scope_design:
      name: Diseño de la mira
      description: Identifica el tipo de diseño de los visores ópticos, como angular
        o recto
    scope_lens_type:
      name: Tipo de lente de la mira
      description: Identifica el tipo de lente utilizada en los visores, como HD o
        gran angular
    scoreboard_features:
      name: Características del marcador
      description: Describe las características especiales de un marcador, como portátil
        o resistente a la intemperie.
    scrapbook_paper_type:
      name: Tipo de papel para álbumes de recortes
      description: Identifica el estilo o diseño del papel para álbumes de recortes,
        como especial o estampado.
    screen/display_design:
      name: Diseño de pantalla
      description: Especifica las características de diseño de la pantalla de un producto,
        normalmente para cámaras, como, por ejemplo, visor.
    screen_assembly_components_included:
      name: Componentes del ensamblaje de pantalla incluidos
      description: Aclara qué piezas vienen preensambladas con la pantalla.
    screen_curvature_rating:
      name: Clasificación de curvatura de la pantalla
      description: Especifica el radio de curvatura de los monitores curvos (p. ej.,
        1000R), indicando qué tan pronunciada es la curva.
    screen_material:
      name: Material de la pantalla
      description: Define el tipo de material que se usa para la pantalla de un producto,
        por ejemplo, vidrio o policarbonato.
    screen_operation_type:
      name: Tipo de operación de la pantalla
      description: Describe el estilo estructural o de despliegue de la pantalla (p.
        ej., marco fijo, desplegable manual, motorizada, trípode, inflable).
    screen_protection_features:
      name: Características de protección de pantalla
      description: Detalla cómo la funda protege la pantalla del teléfono más allá
        de la cobertura básica.
    screen_protector_adhesion_type:
      name: Tipo de adhesión del protector de pantalla
      description: Especifica el método adhesivo o de fijación utilizado para fijar
        el protector a la pantalla del teléfono.
    screen_protector_coverage_style:
      name: Estilo de cobertura del protector de pantalla
      description: Define el diseño de cobertura física o factor de forma del protector
        relativo a la pantalla del dispositivo.
    screen_protector_features:
      name: Características del protector de pantalla
      description: Destaca las características funcionales especiales ofrecidas por
        el protector más allá de la prevención básica de arañazos.
    screen_protector_finish:
      name: Acabado del protector de pantalla
      description: Identifica el acabado de superficie óptica del protector (p. ej.,
        brillante, mate, privacidad, antirreflejo).
    screen_specialized_features:
      name: Características especializadas de la pantalla
      description: Identifica capacidades únicas de la pantalla de un equipo informático,
        como antirreflejo o táctil.
    screen_surface_finish:
      name: Acabado de superficie de la pantalla
      description: Describe el tratamiento superficial del vidrio de la pantalla,
        influyendo en el reflejo y la sensación.
    seafood_type:
      name: Tipo de marisco
      description: Clasifica el pescado y el marisco por especies, como el atún o
        la langosta
    seal_stamp_design:
      name: Diseño de sello
      description: Especifica el estilo de un sello, por ejemplo, monograma o caligrafía.
    season:
      name: Estación
      description: Indica la temporada para la que el producto es más adecuado, como
        el verano o el otoño.
    seat_color:
      name: Color del asiento
      description: Especifica el color del área para sentarse de un producto, como
        el negro o el verde.
    seat_cushioning:
      name: Acolchado del asiento
      description: Describe el tipo de acolchado de los productos de asiento, como
        acolchado o no acolchado.
    seat_pattern:
      name: Patrón de asiento
      description: Especifica el motivo visual de los productos de asiento, como estrellas
        o puntos.
    seat_reservation:
      name: Reserva de asiento
      description: Especifica si el billete incluye una asignación de asiento o requiere
        reserva anticipada.
    seat_rotation:
      name: Rotación del asiento
      description: Indica si el asiento gira y las posiciones de bloqueo disponibles.
    seat_shape:
      name: Forma del asiento
      description: Describe la forma del área de asiento de un producto, como redonda
