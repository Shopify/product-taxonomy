        y el comportamiento térmico.
    sensation_effect:
      name: Efecto de sensación
      description: Describe cualquier efecto sensorial adicional que proporciona el
        lubricante (p. ej., calentamiento, hormigueo).
    sensor/measuring_tool_features:
      name: Características de la herramienta de sensor/medidor
      description: Describe las características únicas de un sensor o herramienta
        de medición, como portátil o inteligente.
    sensor_features:
      name: Características del sensor
      description: Describe las características específicas del sensor de un producto,
        como la retroiluminación o la cámara incorporada.
    sensor_type:
      name: Tipo de sensor
      description: Identifica el tipo de sensor que se usa en dispositivos de seguridad
        o protección, como, por ejemplo, infrarrojos o ultrasónicos.
    sensory_effect:
      name: Efecto sensorial
      description: Indica la sensación física inmediata que proporciona el producto
        cuando se aplica.
    sequin/glitter_shape:
      name: Forma de la lentejuela/purpurina
      description: Describe la forma de las lentejuelas o la brillantina, como redonda
