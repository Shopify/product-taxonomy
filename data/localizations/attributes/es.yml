    bat_material:
      name: Material del bate
      description: Especifica el tipo de material utilizado en un bate, como, por
        ejemplo, el aluminio o la fibra de carbono.
    bat_standard:
      name: Modelo de bate
      description: Define la certificación de los bates de béisbol o sóftbol, como
