    bed/frame_features:
      name: Características de la cama/estructura
      description: Destaca las características únicas de las camas y las estructura,
        como las opciones de almacenamiento o el cabecero incluido.
    bed_leveling_type:
      name: Tipo de nivelación de la cama
      description: Especifica el método que la impresora utiliza para nivelar su superficie
