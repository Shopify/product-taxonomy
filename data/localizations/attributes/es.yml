    shower_design:
      name: Diseño de la ducha
      description: Identifica la configuración de las cabinas y kits de ducha, como
        rinconera o de esquina.
    shower_features:
      name: Características de la ducha
      description: Describe los elementos únicos de una ducha, como un asiento incorporado
