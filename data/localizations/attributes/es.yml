    bag/case_closure:
      name: Cierre de bolsa/estuche
      description: Identifica el tipo de cierre utilizado en bolsas o estuches, por
        ejemplo, cerradura con llave o velcro.
    bag/case_features:
      name: Características de la bolsa/caja
      description: Describe las características únicas de un bolso o maletín, como
        la impermeabilidad o la ligereza.
    bag/case_material:
      name: Material de la bolsa/caja
      description: Identifica el material principal utilizado en un bolso o maletín,
        como el cuero o la lona.
    bag/case_storage_features:
      name: Características de almacenamiento de la bolsa/caja
      description: Identifica elementos de almacenamiento únicos en bolsas o cajas,
        como divisores regulables o bolsillos externos
    bag_closure:
      name: Cierre de la bolsa
      description: Describe cómo se asegura una bolsa, como con un cordón o con una
        hebilla.
    bag_strap_type:
      name: Tipo de correa de bolso
      description: Especifica el tipo de correa del bolso, por ejemplo, bandolera
        o al hombro.
    bag_style:
      name: Estilo de la bolsa
      description: Describe el diseño o la forma de una bolsa, como una mochila o
        un bolso de mano.
    bag_type:
      name: Tipo de maleta
      description: Especifica la categoría de bolsas y alforjas para motocicleta,
        como las bolsas traseras o de herramientas.
    bakery_items_included:
      name: Artículos de panadería incluidos
      description: Identifica los tipos de productos de panadería incluidos, por ejemplo,
        bagel o bollo.
    bakeware_features:
      name: Características de los utensilios para hornear
      description: Destaca las características especiales de los utensilios para hornear,
        como el revestimiento antiadherente o posibilidad de uso en el horno.
    bakeware_items_included:
      name: Artículos de utensilios para hornear incluidos
      description: Identifica las piezas específicas de utensilios para hornear, como
        una bandeja para hornear o un molde de tarta
    bakeware_pieces_included:
      name: Piezas para hornear incluidas
      description: Especifica los utensilios para hornear que se incluyen en el juego,
        como los moldes para magdalenas o los moldes para pasteles.
    bakeware_shape:
      name: Forma de los utensilios para hornear
      description: Identifica la forma de los utensilios para hornear, como Bundt
        o rectangular.
    baking_purpose:
      name: Uso en repostería
      description: Define para qué tipo de productos horneados se utiliza un producto,
        por ejemplo, galletas o magdalenas.
    baking_sheet_material:
      name: Material de la bandeja para hornear
      description: Identifica el tipo de material utilizado en las bandejas para hornear,
        como el acero inoxidable o la silicona.
    ball_material:
      name: Material de la pelota
      description: Identifica el material principal de fabricación de un balón, como
        el cuero o el caucho.
    ball_size:
      name: Tamaño de la pelota
      description: Define el tamaño de las pelotas deportivas, como, por ejemplo,
        5, juveniles.
    balloon_kit_items_included:
      name: Artículos del kit de globos incluidos
      description: Especifica los artículos que se incluyen en kit de globos, como
        las pinzas o las pesas.
    balloon_shape:
      name: Forma del globo
      description: Describe la forma o el diseño de un globo, como redondo o en forma
        de corazón.
    band_color:
      name: Color de la correa
      description: Especifica el color de la correa de un reloj, como, por ejemplo,
        multicolor u oro rosa.
    band_material:
      name: Material de la correa
      description: Especifica el material utilizado en la correa del reloj, como el
        cuero o el acero inoxidable.
    band_pattern:
      name: Patrón de banda
      description: Indica el tema visual en la banda de artículos como relojes, por
        ejemplo, rayas, logo
    band_strength:
      name: Fuerza de la banda
      description: Describe la durabilidad de las bandas elásticas, como estándar
        o resistentes.
    bandage_shape:
      name: Forma del vendaje
      description: Describe el factor de forma precortado de vendajes adhesivos o
        apósitos.
    banner_design:
      name: Diseño de la pancarta
      description: Especifica las características de diseño de las pancartas de fiesta,
        como borlas o guirnaldas.
    bar_mounting_type:
      name: Tipo de montaje de barra
      description: Especifica el método de instalación de las barras de ejercicios,
        como en puertas o vigas.
    barcode_scanner_form_factor:
      name: Factor de forma del escáner de código de barras
      description: Especifica el estilo de diseño físico del escáner de código de
        barras (p. ej., de mano, presentación, anillo).
    barcode_scanner_interface:
      name: Interfaz de escáner de códigos de barras
      description: Define el método de comunicación de lectores de códigos de barras,
        como USB o Bluetooth.
    barcode_supported:
      name: Código de barras compatible
      description: Especifica los tipos de códigos de barras que un escáner puede
        leer, por ejemplo, 1D, 2D.
    barrel_material:
      name: Material del barril
      description: Especifica el material utilizado en el cilindro del producto para
        el cabello, por ejemplo, titanio o cerámica.
    barrel_shape:
      name: Forma del barril
      description: Identifica la forma física o perfil del barril, que afecta directamente
        el estilo de rizo u onda producido.
    barware_items_included:
      name: Artículos de utensilios para bares incluidos
      description: Detalla los componentes de un juego de cócteles y utensilios de
        bar, por ejemplo, coctelera, cubos para enfriar
    barware_material:
      name: Material de los utensilios para bares
      description: Identifica el material principal utilizado en artículos de bar,
        como el vidrio o el acero inoxidable.
    base_oil:
      name: Aceite base
      description: Identifica el aceite principal de los artículos de cuidado personal,
        como el de coco u oliva.
    base_spirit:
      name: Alcohol base
      description: Define el alcohol primario que se usa en un producto, como el whisky
