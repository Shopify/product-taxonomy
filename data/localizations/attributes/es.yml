    battery_cell_type:
      name: Tipo de celda de la batería
      description: Especifica la composición química de una batería, como alcalina
        o de litio-aire.
    battery_charge_controller_type:
      name: Tipo de controlador de carga de batería
      description: Especifica la regulación subyacente o tecnología o topología de
        carga que utiliza el controlador.
    battery_connector_type:
      name: Tipo de conector de la batería
      description: Identifica el estilo principal del conector o terminal utilizado
