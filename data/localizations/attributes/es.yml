    soda_maker_accessories_included:
      name: Accesorios para máquina de refrescos incluidos
      description: Especifica los artículos adicionales que se incluyen la máquina
        para hacer bebidas con gas, como una botella reutilizable o un sirope.
    soda_variety:
      name: Variedad de gaseosa
      description: Clasifica los productos de refrescos por tipo o sabor, por ejemplo,
        lima limón o naranja.
    sofa_features:
      name: Características del sofá
      description: Describe características especiales de un sofá, como los reposabrazos
        ajustables o que son aptos para mascotas.
    softball_discipline:
      name: Disciplina de sóftbol
      description: 'Define el tipo específico de sóftbol, como de lanzamiento rápido
        o lento. '
    softbox_mounting_type:
      name: Tipo de montaje de softbox
      description: Especifica la compatibilidad del softbox con diferentes sistemas
        de iluminación, como Elinchrom o Profoto.
    softbox_shape:
      name: Forma de softbox
      description: Especifica la forma geométrica de los softbox, por ejemplo, rectangular
        u octogonal.
    software_features:
      name: Características del software
      description: Identifica las funcionalidades clave de un producto de software,
        como la protección de la privacidad o la copia de seguridad automática.
    software_tool_type:
      name: Tipo de herramienta de software
      description: Clasifica el tipo de herramientas de desarrollo de software, como
        el editor de código fuente o el sistema de control de versiones.
    softwood_lumber_grade:
      name: Grado de madera blanda
      description: Identifica la calidad de la madera blanda, como C o n.º 1.
    solar_cell_type:
      name: Tipo de celda solar
      description: Especifica la tecnología de las células solares, como el silicio
        monocristalino o de película fina.
    solar_panel_connections:
      name: Conexiones de paneles solares
      description: Especifica el conector que se usa con los paneles solares, por
        ejemplo, pinzas de cocodrilo o conector de CC.
    solar_panel_design:
      name: Diseño de paneles solares
      description: Describe el estilo de instalación de los paneles solares, como
        independientes o montados en el techo.
    solder/flux_application:
      name: Aplicación de soldadura/fundente
      description: Especifica el área de aplicación para productos de soldadura/flujo,
        por ejemplo, electrónica o fontanería.
    soleplate_type:
      name: Tipo de suela
      description: Define el tipo de suela que se usan en las planchas, como cerámica
        o de acero inoxidable.
    solubility:
      name: Solubilidad
      description: Define la capacidad de disolución del producto en un líquido, por
        ejemplo, insoluble o parcialmente soluble.
    solution_type:
      name: Tipo de solución
      description: Especifica el tipo de solución para productos de cuidado visual,
        como la solución salina o el peróxido de hidrógeno.
    solvent/thinner_application:
      name: Aplicación de disolvente/diluyente
      description: Especifica el recubrimiento o material adhesivo que un producto
        está diseñado para disolver o diluir, por ejemplo, epoxi o pintura.
    solvent_application:
      name: Aplicación de solvente
      description: Especifica el recubrimiento o material adhesivo que un producto
        está diseñado para disolver, por ejemplo, epoxi o pintura.
    sonar_imaging_modes:
      name: Modos de imagen del sonar
      description: Identifica las tecnologías de visualización del sonar que admite
        el buscador de peces.
    soothing_sounds:
      name: Sonidos relajantes
      description: Define la variedad de sonidos relajantes ofrecidos, por ejemplo,
        los latidos del corazón o el ruido blanco.
    sound_controls:
      name: Controles de sonido
      description: Identifica las funciones de control de sonido de instrumentos musicales
        o amplificadores, por ejemplo, la reverberación o el ecualizador.
    sound_effects:
      name: Efectos de sonido
      description: Identifica los tipos de efectos de sonido, normalmente de instrumentos
        y accesorios musicales, como, por ejemplo, la compresión o el retraso.
    sound_insulation:
      name: Aislamiento acústico
      description: Identifica las capacidades de insonorización de un producto, como
        acústico o sin aislamiento
    sound_options:
      name: Opciones de sonido
      description: Especifica las diferentes opciones de sonido disponibles, normalmente
        para metrónomos, como, por ejemplo, el recuento de voces o clics.
    speaker_configuration:
      name: Configuración de los altavoces
      description: Describe la configuración de los altavoces, generalmente muebles
        para amplificadores de instrumentos musicales, como, por ejemplo, cerrada.
    speaker_design:
      name: Diseño de altavoces
      description: Define el diseño físico y funcional de los altavoces, como subwoofer
        o de tipo torre.
    speaker_enclosure_type:
      name: Tipo de recinto del altavoz
      description: Describe el principio de recinto acústico utilizado por el gabinete
        del altavoz.
    speaker_features:
      name: Características del altavoz
      description: Identifica capacidades especiales de los altavoces, como la cancelación
        de ruido o el control por voz.
    speaker_position_in_laptop:
      name: Posición del altavoz en el portátil
      description: Indica dónde se instala el ensamblaje del altavoz dentro del portátil.
    speaker_technology:
      name: Tecnología de altavoces
      description: Define la tecnología que se usa en el diseño del altavoz, por ejemplo,
        dinámica o electrostática.
    speakerphone_type:
      name: Tipo de manos libres
      description: Especifica la funcionalidad de los altavoces de manos libres de
        vehículos, como inalámbricos o manos libres.
    speed_settings:
      name: Configuración de velocidad
      description: Define el rango de opciones de velocidad para un producto, por
        ejemplo, simple o variable.
    spf_level:
      name: Nivel de FPS
      description: Especifica el nivel de protección UVB que ofrece un producto, por
        ejemplo, SPF 50.
    spike_design:
      name: Diseño de estaca
      description: Identifica el estilo de las piquetas, como de tienda o para tela
        de paisajismo.
    spinner_type:
      name: Tipo de ruedas giratorias
      description: Describe el número de ruedas del equipaje o maleta, como de 2 o
        4 ruedas.
    spirit_dilution:
      name: Dilución de bebida alcohólica
      description: Indica el nivel de concentración de bebidas espirituosas, por ejemplo,
        diluidas o sin diluir.
    splint/stay_configuration:
      name: Configuración de férula/varilla
      description: Describe la presencia y tipo de varillas o férulas rígidas o semirrígidas
        usadas en la órtesis.
    splitter/switch_features:
      name: Características del divisor/interruptor
      description: Describe las capacidades de los divisores o conmutadores de audio/vídeo,
        como la compatibilidad 3D o la extracción de audio.
    splitter_use:
      name: Uso del duplicador
      description: Especifica los tipos de conexión que admite un divisor, como HDMI
        o Ethernet.
    sponge_shape:
      name: Forma de la esponja
      description: Describe la forma de las esponjas, normalmente para maquillaje,
        como, por ejemplo, contorneada o con forma de lágrima.
    spool_color:
      name: Color del carrete
      description: Identifica el color del carrete en carretes de pesca, como transparente
        o verde
    spool_material:
      name: Material del carrete
      description: Define el material utilizado en el carrete de pesca, como el plástico
        o el grafito.
    spool_pattern:
      name: Patrón del carrete
      description: Describe el diseño o motivo del carrete de un carrete de pesca,
        como camuflado o sólido
    sport:
      name: Deporte
      description: Especifica el deporte al que está destinado el producto, como el
        baloncesto o el esquí.
    sports_logo:
      name: Logotipo deportivo
      description: Especifica la marca o insignia de los artículos, como NBA, NFL
        o clubes de fútbol.
    sports_theme:
      name: Tema deportivo
      description: Identifica el deporte específico asociado con un producto, como
        el béisbol o el fútbol.
    spout_type:
      name: Tipo de boquilla
      description: Define el tipo de boca, normalmente de vasos de aprendizaje, como,
        por ejemplo, de tipo pajita o blanda.
    spray_purpose:
      name: Propósito del spray
      description: Identifica el uso previsto principal del rocío facial (p. ej.,
        fijador, prebase, hidratante).
    spreader_type:
      name: Tipo de separador
      description: Especifica la categoría del separador de trípode, como de suelo
        o nivel medio.
    sprinkler_head_type:
      name: Tipo de cabezal de aspersor
      description: Define el patrón de pulverización de agua, por ejemplo, cono o
        chorro.
    sprinkler_shape:
      name: Forma del aspersor
      description: Describe la forma de un aspersor de juego, como redonda o cuadrada.
    squeegee_blade_design:
      name: Diseño de hoja de escobilla de goma
      description: Describe la forma de la hoja de la espátula limpiacristales, como
        recta o redonda.
    stack_configuration:
      name: Configuración de pila
      description: Especifica el diseño de las pilas de combustible de dispositivos
        de alimentación, por ejemplo, en serie o en paralelo.
    stage:
      name: Etapa
      description: Define la idoneidad del producto para las etapas de desarrollo,
        normalmente de productos para bebés, como, por ejemplo, recién nacido o etapa
        1.
    stair_lifts_control_type:
      name: Tipo de control de salvaescaleras
      description: Define el tipo de control utilizado para salvaescaleras, por ejemplo,
        mediante control remoto portátil o interruptor montado en la pared.
    staircase_features:
      name: Características de las escaleras
      description: Destaca aspectos únicos de las escaleras, como con frentes abiertos
        o rellanos.
    staircase_type:
      name: Tipo de escaleras
      description: Define el diseño de las escaleras, por ejemplo, curvas o exteriores.
    stamp_theme:
      name: Tema de sellos
      description: Identifica el asunto o el tema del diseño de un sello, como animales
        o historia.
    stamp_type:
      name: Tipo de sello
      description: Identifica el tipo de sello de oficina, como tradicional o automático.
    stand/display_type:
      name: Tipo de soporte/pantalla
      description: Describe el estilo del soporte o expositor para objetos coleccionables,
        como montaje en pared o de sobremesa
    staple_wire_gauge:
      name: Calibre del alambre de grapas
      description: Identifica el grosor del alambre que se usa en grapas, como mediano
        o grueso.
    stapler_features:
      name: Características de la grapadora
      description: Describe las características especiales de las grapadoras, como
        el funcionamiento sin atascos.
    star_rating:
      name: Calificación por estrellas
      description: Indica la calificación por estrellas del producto, como, por ejemplo,
        1 o 5.
    start_type:
      name: Tipo de arranque
      description: Identifica el método utilizado para arrancar motores pequeños,
        como eléctrico o mediante tracción.
    station_type:
      name: Tipo de estación
      description: Identifica el tipo de estación de carga para vehículos eléctricos,
        como la carga doméstica o pública.
    stationery_binding_type:
      name: Tipo de encuadernación de papelería
      description: Especifica el método que se usa para proteger páginas, normalmente
        de álbumes de fotos, como, por ejemplo, el encuadernado.
    steam_inhaler_design:
      name: Diseño del inhalador de vapor
      description: Describe el estilo físico y formato de portabilidad del inhalador
        de vapor.
    stem_length:
      name: Longitud del tallo
      description: Indica la longitud del tallo de una flor, como corta, mediana o
        larga.
    stencil/cut_shape:
      name: Forma de plantilla/corte
      description: Describe la forma o el diseño de plantillas y troqueles, como redondos
        o de mariposa.
    step_type:
      name: Tipo de escalón
      description: Identifica el número de pasos de equipos de atraque y fondeo, como
        dobles o simples.
    sterilization_cycle_time:
      name: Tiempo del ciclo de esterilización
      description: Especifica cuánto tiempo tarda un esterilizador, normalmente de
        productos para bebés, como, por ejemplo, estándar o rápido.
    sterilization_instructions:
      name: Instrucciones de esterilización
      description: Describe cómo esterilizar un producto, por ejemplo, mediante hervor
        o uso en el microondas.
    sterilization_method:
      name: Método de esterilización
      description: Identifica el tipo de proceso de esterilización utilizado, normalmente
        con productos para bebés, como, por ejemplo, vapor o rayos UV.
    stethoscope_design:
      name: Diseño de estetoscopio
      description: Describe el tipo de estetoscopio, como de doble cabezal o de un
        solo cabezal.
    stethoscope_technology:
      name: Tecnología de estetoscopio
      description: Identifica el tipo de tecnología utilizada en los estetoscopios,
        como electrónica o acústica.
    stick_material:
      name: Material del palo
      description: Identifica la composición de los palos deportivos, como la madera
        o la fibra de carbono.
    stiffness:
      name: Rigidez
      description: Indica la rigidez de un producto, normalmente de botas de snowboard,
        como suave o rígido.
    stimulant_profile:
      name: Perfil de estimulantes
      description: Clasifica el suplemento según si depende de estimulantes y qué
        tipo principal contiene.
    stimulator_tip_shape:
      name: Forma de la punta del estimulador
      description: Describe la forma de la punta de los estimuladores de encías, como
        cónica.
    stone_material:
      name: Material de la piedra
      description: Identifica el tipo de piedra que se usa en los productos de masaje,
        como el basalto o el mármol.
    stone_name:
      name: Nombre de la piedra
      description: Especifica el tipo de piedra utilizada en productos de salud y
        belleza, como el cuarzo rosa o la obsidiana.
    stone_shape:
      name: Forma de la piedra
      description: Define la forma geométrica de una piedra, por ejemplo, hexagonal
        o con forma de corazón.
    stone_type:
      name: Tipo de piedra
      description: Distingue entre tipos de piedras de utensilios de relajación, como
        piedra fría o piedra caliente.
    stopband:
      name: Banda suprimida
      description: Especifica el rango de frecuencias que un filtro electrónico atenúa
        o reduce, por ejemplo, la alta frecuencia.
    stopwatch_features:
      name: Características del cronómetro
      description: Destaca las características de un cronómetro, por ejemplo, la iluminación
        o la función de memoria.
    storage_drive_interface_type:
      name: Tipo de interfaz de unidad de almacenamiento
      description: Especifica el tipo de conexión de los dispositivos de almacenamiento,
        por ejemplo, SATA o NVMe.
    storage_drive_interfaces_supported:
      name: Interfaces de unidad de almacenamiento compatibles
      description: Identifica las interfaces de las unidades de almacenamiento compatibles,
        como SATA o NVMe.
    storage_drive_type_installed:
      name: Tipo de unidad de almacenamiento instalada
      description: Identifica la tecnología de almacenamiento, normalmente de sistemas
        de almacenamiento en red, como, por ejemplo, la unidad de disco duro (HDD).
    storage_media_type:
      name: Tipo de medio de almacenamiento
      description: Identifica el tipo de medio de almacenamiento que puede acomodar
        una base de disco duro, por ejemplo, SATA o HDD.
    storage_tank_application:
      name: Aplicación del tanque de almacenamiento
      description: Especifica para qué está diseñado un depósito de almacenamiento,
        como el combustible o los desechos.
    storage_types_supported:
      name: Tipos de almacenamiento compatibles
      description: Define sistemas de almacenamiento compatibles para productos electrónicos,
        por ejemplo, unidad de disco duro (HDD).
    stove_airflow:
      name: Flujo de aire de la estufa
      description: Indica el caudal de aire de las estufas de leña, como primario
        o terciario.
    stove_top_type:
      name: Tipo de placa de cocina
      description: Identifica el tipo de placa de cocina de electrodomésticos de cocina,
        como de gas o cerámica.
    strap_design:
      name: Diseño de correa
      description: Describe la apariencia visual de la correa de un producto, como
        impresa o estampada.
    strap_wearing_style:
      name: Estilo de uso de la correa
      description: Identifica cómo está diseñada la correa para ser usada o llevada.
    straw/stirrer_design:
      name: Diseño de pajita/agitador
      description: Describe el diseño o estilo de una pajita o mezclador, como recto
        o flexible.
    stretcher/gurney_intended_use:
      name: Uso previsto de la camilla
      description: Identifica el propósito específico de las camillas o camillas médicas,
        como de ambulancia o resonancia magnética.
    string_color:
      name: Color de la cuerda
      description: Identifica el color de la cuerda en arcos y ballestas, como transparente
    string_instrument_size:
      name: Tamaño del instrumento de cuerda
      description: Indica el tamaño de un instrumento de cuerda, como 3/4 o tamaño
        completo.
    string_material:
      name: Material del hilo
      description: Identifica el material utilizado en el tiro con arco, como, por
        ejemplo, dacron o fastflight.
    string_pattern:
      name: Patrón de la cuerda
      description: Describe el diseño de la cuerda de tiro con arco, como a rayas
    strip/patch_technology:
      name: Tecnología de tira/parche
      description: Describe el material o tecnología principal utilizada para la tira
        o parche de poros.
    stripper_application:
      name: Aplicación de decapante
      description: Especifica el recubrimiento o material adhesivo que un producto
        es capaz de retirar o disolver, por ejemplo, epoxi o pintura.
    stroller_features:
      name: Características del cochecito
      description: Identifica características específicas de un cochecito, como el
        diseño plegable o las ruedas bloqueables.
    stroller_wheel_type:
      name: Tipo de rueda de cochecito
      description: Define el tipo de ruedas de un cochecito, como todoterreno o giratorias.
    style:
      name: Estilo
      description: Describe el estilo de un producto, normalmente para tratamientos
        de las ventanas, como, por ejemplo, persianas verticales o plisadas.
    stylus_holder_type:
      name: Tipo de soporte para stylus
      description: Indica si la funda proporciona almacenamiento para un stylus y
        qué forma toma ese almacenamiento.
    stylus_support:
      name: Soporte para stylus
      description: Indica si el lector electrónico soporta un stylus digital para
        tomar notas y si se incluye uno.
    stylus_support_type:
      name: Tipo de soporte para stylus
      description: Describe si y cómo la tableta soporta stylus de entrada (p. ej.,
        digitalizador activo, capacitivo pasivo).
    stylus_technology:
      name: Tecnología del stylus
      description: Define la tecnología subyacente o método de alimentación utilizado
        por el stylus.
    stylus_type:
      name: Tipo de aguja
      description: Especifica la forma de la aguja en accesorios para platos tocadiscos,
        como cónica o elíptica.
    subject_area:
      name: Área temática
      description: Identifica el área temática de trabajos o estudios académicos,
        como ciencias o artes.
    subscription_type:
      name: Tipo de suscripción
      description: Especifica el tipo de suscripción, normalmente de dispositivos
        móviles, como, por ejemplo, pago por uso o prepago.
    subsonic_filter:
      name: Filtro subsónico
      description: Especifica si la unidad incluye un filtro subsónico o de deformación
        para eliminar el retumbo de baja frecuencia causado por deformaciones del
        disco.
    substrate_features:
      name: Características del sustrato
      description: Describe las características de los sustratos del acuario, como
        el crecimiento de bacterias beneficiosas o el prelavado.
    subwoofer_configuration:
      name: Configuración del subwoofer
      description: Indica si se incluye un subwoofer y si está integrado, cableado
        o inalámbrico.
    suction_cup_color:
      name: Color de la ventosa
      description: Identifica el color de la ventosa, como negro o azul.
    suction_cup_material:
      name: Material de la ventosa
      description: Identifica el material utilizado en la ventosa, como la goma o
        silicona.
    suction_cup_pattern:
      name: Patrón de la ventosa
      description: Describe el diseño o motivo de la ventosa de herramientas como
        desatascadores, por ejemplo, florales, geométricos
    suction_levels:
      name: Niveles de succión
      description: Indica la fuerza de succión de los sacaleches, como ajustable o
        fija.
    suitable_for_angling_type:
      name: Adecuado para tipo de pesca con caña
      description: Especifica el tipo de pesca para el que está diseñado un producto,
        como de alta mar o con moscas.
    suitable_for_animal_type:
      name: Adecuado para tipo de animal
      description: Identifica el tipo de animal para el que está diseñado el producto,
        como el caballo o la cabra.
    suitable_for_art_technique:
      name: Adecuado para técnica artística
      description: Especifica los métodos artísticos para los que es adecuado un producto
        de papel, como la pintura con acuarela.
    suitable_for_bird_type:
      name: Adecuado para tipo de pájaro
      description: Empareja productos con especies de aves específicas, por ejemplo,
        canarios o loros.
    suitable_for_boat_type:
      name: Adecuado para tipo de bote
      description: Identifica el tipo de barco para el que está diseñado el producto,
        como kayak o balsa
    suitable_for_body/facial_hair:
      name: Adecuado para vello corporal/facial
      description: Identifica si un producto es apto para vello corporal o facial
    suitable_for_breed_size:
      name: Adecuado para el tamaño de la raza
      description: Identifica el tamaño de raza apropiado para productos para mascotas,
        como grande o mediano
    suitable_for_bug_type:
      name: Adecuado para tipo de insecto
      description: Especifica los insectos que repele el producto, como, por ejemplo,
        mosquitos o garrapatas.
    suitable_for_camera/optics_device:
      name: Adecuado para cámaras y dispositivos ópticos
      description: Identifica la cámara específica o el dispositivo óptico con el
        que el producto es compatible, por ejemplo, una cámara digital o un palo para
        selfies.
    suitable_for_camera_type:
      name: Adecuado para tipo de cámara
      description: Identifica los modelos de cámara con los que el producto es compatible,
        como SLR o videocámara.
    suitable_for_camping_activity:
      name: Adecuado para actividad de camping
      description: Especifica la compatibilidad con actividades de acampada específicas,
        normalmente de tiendas de campaña, como, por ejemplo, playa o turismo mochilero.
    suitable_for_chair_type:
      name: Adecuado para tipo de silla
      description: Especifica los tipos de silla para los que está diseñado el producto,
        como los bancos o taburetes.
    suitable_for_container_type:
      name: Adecuado para el tipo de contenedor
      description: Identifica el tipo de recipiente para el que está diseñado el producto,
        como, por ejemplo, una botella o una lata.
    suitable_for_crafting_material:
      name: Adecuado para material de manualidades
      description: Especifica los materiales de elaboración compatibles con un producto,
        como el metal o el vidrio.
    suitable_for_door_type:
      name: Adecuado para tipo de puerta
      description: Identifica el tipo de puerta para la que está diseñado el producto,
        por ejemplo, de dos hojas o de una hoja.
    suitable_for_egg_type:
      name: Adecuado para el tipo de huevo
      description: Identifica el tipo de huevos que puede acomodar una incubadora,
        como de pollo o de pato
    suitable_for_fabric_type:
      name: Adecuado para tipo de tela
      description: Identifica el tipo de tejido para el que es adecuado un producto,
        como el tejido sintético o natural.
    suitable_for_fire_class:
      name: Adecuado para clase de fuego
      description: Indica las clases de incendio que el producto puede extinguir,
        como, por ejemplo, A o D.
    suitable_for_fish_type:
      name: Adecuado para tipo de pez
      description: Especifica el tipo de pez al que está destinado un producto, por
        ejemplo, peces de estanque o tropicales.
    suitable_for_food_processor_type:
      name: Adecuado para de tipo procesador de alimentos
      description: Identifica el tipo de procesador de alimentos para el que está
        diseñado el producto, como, por ejemplo, una licuadora de alimentos.
    suitable_for_furniture_type:
      name: Adecuado para tipo de mueble
      description: Identifica el tipo de mueble para el que está diseñado el producto,
        normalmente fundas, como, por ejemplo, universal o chaise longue.
    suitable_for_gas_type:
      name: Adecuado para tipo de gas
      description: Identifica el tipo de gas con el que es compatible un producto,
        como el propano o el etanol.
    suitable_for_hair_type:
      name: Adecuado para tipo de cabello
      description: Especifica las necesidades del cabello para las que está diseñado
        el producto, por ejemplo, rizado o fino.
    suitable_for_material_type:
      name: Adecuado para tipo de material
      description: Identifica el material para el que es apto un producto, normalmente
        herramientas, como, por ejemplo, la cerámica o la piedra.
    suitable_for_pest_type:
      name: Adecuado para tipo de plaga
      description: Identifica los tipos de plagas que permite combatir el producto,
        por ejemplo, ratones o virus.
    suitable_for_pipe_type:
      name: Adecuado para tipo de plaga
      description: Identifica el tipo de tubería con la que se puede utilizar una
        herramienta, como de PVC o cobre.
    suitable_for_pool_type:
      name: Apto para tipo piscina
      description: Especifica el tipo de piscina para el que está diseñado el producto,
        por ejemplo, inflable o sobre el suelo.
    suitable_for_power_equipment_type:
      name: Adecuado para el tipo de equipo eléctrico
      description: Identifica el tipo de equipo eléctrico para exteriores para el
        que está diseñado el producto, como una cortadora de césped o un soplador
        de hojas.
    suitable_for_precious_material:
      name: Adecuado para materiales preciosos
      description: Identifica si un producto es apropiado para el uso con materiales
        preciosos, como el oro o la plata.
    suitable_for_printer_type:
      name: Adecuado para tipo de impresora
      description: Especifica el tipo de impresora con la que el producto es compatible,
        por ejemplo, impresora de etiquetas o máquina de fax.
    suitable_for_skin_tone:
      name: Adecuado para tono de piel
      description: Empareja los productos con tonos de piel específicos, como, por
        ejemplo, piel clara u oscura.
    suitable_for_skin_type:
      name: Adecuado para tipo de piel
      description: Especifica productos para estados específicos de la piel, como
        la piel seca, envejecida o sensible.
    suitable_for_snowshoeing_activity:
      name: Adecuado para actividad con raquetas de nieve
      description: Especifica la compatibilidad con los diferentes tipos de raquetas
        de nieve, como de carrera o trabajo.
    suitable_for_storage_type:
      name: Apto para tipo de almacenamiento
      description: Especifica los artículos que puede almacenar el producto, por ejemplo,
        basura o herramientas de jardín.
    suitable_for_toothbrush:
      name: Adecuado para cepillo de dientes
      description: Especifica con qué tipos de cepillos de dientes es compatible el
        producto, como los cabezales de cepillos de dientes eléctricos.
    suitable_for_user_sensitivity_level:
      name: Adecuado para el nivel de sensibilidad del usuario
      description: Indica si la fórmula está destinada para usuarios con dientes sensibles.
    suitable_for_vehicle_type:
      name: Adecuado para tipo de vehículo
      description: Identifica el tipo de vehículo con el que es compatible un producto,
        como un coche o una camioneta.
    suitable_for_water_feature_type:
      name: Adecuado para tipo de fuente de agua
      description: Identifica el tipo de instalación con agua para el que es adecuado
        el producto, como un estanque o una fuente.
    suitable_for_water_type:
      name: Adecuado para tipo de agua
      description: Especifica si un producto es adecuado para agua dulce, agua salada
        o ambas.
    suitable_for_weapon_type:
      name: Adecuado para tipo de arma
      description: Identifica el tipo de arma para la que está diseñada una mira,
        por ejemplo, una pistola o una escopeta.
    suitable_installation:
      name: Instalación adecuada
      description: Identifica el método de instalación adecuado de un producto, como
        sobre el suelo o bajo tierra.
    suitable_location:
      name: Ubicación adecuada
      description: 'Indica la ubicación ideal para el producto en el hogar, por ejemplo,
        el dormitorio o el patio. '
    suitable_space:
      name: Espacio adecuado
      description: Define la ubicación ideal para el uso del producto, como en interiores
        o en la superficie.
    suitcase_handle_type:
      name: Tipo de asa de maleta
      description: Especifica el estilo del asa de la maleta, por ejemplo, de transporte
        lateral o superior.
    sulfur_content:
      name: Contenido de azufre
      description: Especifica la concentración de azufre del combustible para calefacción
        doméstica, por ejemplo, ultrabaja o alta.
    sunlight:
      name: Luz solar
      description: Especifica la cantidad de luz solar que necesitan las plantas,
        como sombra o pleno sol.
    sunscreen_filter_type:
      name: Tipo de filtro de protector solar
      description: Identifica el tipo de filtros UV utilizados en la fórmula (químico,
        mineral o híbrido).
    supplement_health_focus:
      name: Enfoque de salud del suplemento
      description: Define el área principal de bienestar que el suplemento está destinado
        a apoyar.
    support/brace_material:
      name: Material del soporte/abrazadera
      description: Identifica el material utilizado en soportes o rodilleras/coderas,
        como el neopreno o la espuma.
    support_cushion_features:
      name: Características del cojín de soporte
      description: Destaca extras funcionales especiales o mejoras ofrecidas por el
        cojín.
    support_level:
      name: Nivel de soporte
      description: Indica la clasificación general de estabilidad o soporte ofrecida
        por la órtesis para diferentes severidades de lesión o niveles de actividad.
    support_rigidity_level:
      name: Nivel de rigidez del soporte
      description: Describe la firmeza general o soporte estructural proporcionado
        por la plantilla, desde amortiguación suave hasta soporte ortótico rígido.
    supported_audio_sources:
      name: Fuentes de audio compatibles
      description: Enumera las fuentes de reproducción o entrada que puede manejar
        la unidad.
    supported_countries:
      name: Países admitidos
      description: Enumera los países o territorios específicos donde la tarjeta SIM/eSIM
        o el plan prepago brindan servicio.
    supported_display_technologies:
      name: Tecnologías de visualización admitidas
      description: Enumera los tipos de pantallas o tecnologías de pantalla que el
        calibrador puede perfilar o medir.
    supported_dvi_link_type:
      name: Tipo de enlace DVI soportado
      description: Indica si el dispositivo maneja estándares de señal DVI de enlace
        simple, enlace dual o ambos.
    supported_erase_modes:
      name: Modos de borrado soportados
      description: Enumera los estándares de borrado seguro que un duplicador puede
        realizar en unidades objetivo.
    supported_input_types:
      name: Tipos de entrada admitidos
      description: Enumera los tipos de entradas de audio que acepta el canal (p.
        ej., micrófono, línea, instrumento Hi-Z).
    supported_language:
      name: Idioma compatible
      description: Especifica los idiomas que admite un producto de software, como
        el inglés o el español.
    supported_media_sources:
      name: Fuentes de medios admitidas
      description: Define las entradas de medios físicos o digitales desde las cuales
        la unidad puede reproducir música.
    supported_raid_levels:
      name: Niveles de RAID soportados
      description: Enumera las configuraciones de matriz de discos que el controlador
        de almacenamiento integrado puede utilizar.
    supported_scan_media_type:
      name: Tipo de medio de escaneo admitido
      description: Enumera los tipos de originales que el escáner puede manejar (p.
        ej., varios tipos de película, impresiones reflectantes).
    supported_sdi_standards:
      name: Estándares SDI admitidos
      description: Indica las tasas de datos/estándares SDI (SD-SDI, HD-SDI, 3G-SDI,
        etc.) que admite el dispositivo para la transmisión de señales.
    supported_usb_device_types:
      name: Tipos de dispositivos USB soportados
      description: Especifica los tipos de dispositivos de almacenamiento USB que
        el duplicador puede manejar.
    surface_sides:
      name: Lados de la superficie
      description: Indica si la cama de impresión puede utilizarse en uno o ambos
        lados.
    surface_texture:
      name: Textura de la superficie
      description: Describe la sensación o el patrón de la superficie de un producto,
        generalmente en condones, por ejemplo, liso o estriado.
    surfboard_features:
      name: Características de la tabla de surf
      description: Especifica características únicas de una tabla de surf, como inflable
        o de superficie dura.
    surveillance_camera_design:
      name: Diseño de cámara de vigilancia.
      description: Identifica el tipo de diseño de las cámaras de seguridad, por ejemplo,
        térmicas o panorámicas.
    surveillance_camera_mounting_type:
      name: Tipo de montaje de cámara de vigilancia
      description: Identifica cómo se puede instalar una cámara de vigilancia, por
        ejemplo, en la pared o en el techo.
    surverying_accessories_included:
      name: Accesorios de topografía incluidos
      description: Especifica componentes adicionales empaquetados con herramientas
        de agrimensura, como una abrazadera o una vara niveladora
    suspender_style:
      name: Estilo de tirantes
      description: 'Define el estilo de los tirantes, como x-back o y-back. '
    sustainability:
      name: Sostenibilidad
      description: Destaca productos que fomentan prácticas sostenibles, como, por
        ejemplo, el comercio justo o el empleo de fuentes responsables.
    swab_end_configuration:
      name: Configuración del extremo del hisopo
      description: Indica si el hisopo tiene un extremo utilizable o dos, y si los
        extremos difieren.
    swab_material:
      name: Material del hisopo
      description: Especifica el tejido de un hisopo de limpieza para instrumentos
        musicales, por ejemplo, la seda o el fieltro.
    swimwear_features:
      name: Características del traje de baño
      description: Identifica características especiales de los trajes de baño, como
        el secado rápido o la protección solar UPF.
    swing_style:
      name: Estilo de swing
      description: Clasifica la raqueta de tenis según la técnica del swing, como,
        por ejemplo, de swing largo.
    swing_weighting:
      name: Peso de swing
      description: Indica la distribución del peso de un bate de béisbol o sóftbol,
        como, por ejemplo, equilibrado o con carga en el extremo.
    switch_control_type:
      name: Tipo de control del interruptor
      description: Describe cómo se controla un interruptor de luz, como mediante
        botón o sensor.
    switch_management_type:
      name: Tipo de gestión del conmutador
      description: Clasifica el nivel o estilo de gestión y configuración que admite
        el conmutador (p. ej., no gestionado, inteligente, gestionado por web, completamente
        gestionado).
    switch_mechanism:
      name: Mecanismo del interruptor
      description: Identifica la tecnología de actuación interna del botón (p. ej.,
        microinterruptor, óptico), que afecta la sensación, la vida útil y la capacidad
        de respuesta.
    switch_stem_compatibility:
      name: Compatibilidad con vástago de interruptor
      description: Identifica los estilos de vástago mecánico u otros estilos de vástago
        de interruptor que la tecla o conjunto de teclas acepta.
    switching_layer:
      name: Capa de conmutación
      description: Indica la capa OSI más alta en la que opera nativamente el conmutador
        (p. ej., Capa 2, Capa 3, híbrida).
    switching_method:
      name: Método de conmutación
      description: Define el método utilizado para cambiar entre diferentes entradas
        en productos electrónicos, como, por ejemplo, control remoto.
    synthesis_method:
      name: Método de síntesis
      description: Especifica el método de síntesis de sonido de instrumentos electrónicos,
        como analógico virtual o modular.
    system/power_cable_connector_type_end_a:
      name: Tipo de conector del cable de sistema/alimentación (extremo A)
      description: Identifica el estándar de conector exacto presente en el primer
        extremo del cable (p. ej., IEC C14, NEMA 5-15P, USB-C).
    system/power_cable_connector_type_end_b:
      name: Tipo de conector del cable de sistema/alimentación (extremo B)
      description: Identifica el estándar de conector exacto presente en el segundo
        extremo del cable (p. ej., IEC C13, DC 5.5 × 2.1 mm, conector banana).
    system_components_included:
      name: Componentes del sistema incluidos
      description: Enumera las piezas clave de hardware enviadas con el sistema para
        que los compradores entiendan qué es o no es parte del paquete.
    system_of_measurement:
      name: Sistema de medición
      description: Identifica la unidad de medida que se usa en un producto, como
        de sistema imperial o métrico.
    system_range:
      name: Rango del sistema
      description: Define el área operativa de los sistemas de alarma médica, por
        ejemplo, domésticos o GPS.
    systems_supported:
      name: Sistemas compatibles
      description: Especifica las plataformas de juego con las que es compatible un
        producto; como, por ejemplo, Xbox o Nintendo Switch.
    tab_style:
      name: Estilo de pestaña
      description: Especifica el estilo de las pestañas de los accesorios de encuadernado,
        por ejemplo, preimpresas y numeradas.
    tablet_case_functional_features:
      name: Características funcionales de la funda para tableta
      description: Destaca los complementos funcionales clave incluidos con la funda
        para tableta.
    tabletop_color:
      name: Color del tope de la mesa
      description: Especifica el color de la superficie superior de una mesa, como
        el blanco o el negro.
    tabletop_material:
      name: Material del tope de la mesa
      description: Identifica la composición de la superficie de la mesa, por ejemplo,
        madera contrachapada o cemento.
    tabletop_pattern:
      name: Patrón del tope de la mesa
      description: Define el diseño o estampado de la superficie de la mesa, como
        Navidad o sólido.
    tabletop_shape:
      name: Forma del tope de la mesa
      description: Describe la forma geométrica del tablero de una mesa, por ejemplo,
        cuadrada o en forma de riñón.
    tableware_material:
      name: Material de vajilla
      description: Especifica la composición de la vajilla, como la porcelana china
        o loza.
    tack/pushpin_head_design:
      name: Diseño de cabeza de tachuela/chincheta
      description: Describe la forma de la cabeza de una tachuela o chincheta, como
        redonda o decorativa.
    tag_fastening:
      name: Fijación de etiquetas
      description: Describe el método utilizado para fijar una etiqueta al equipaje,
        como las hebillas o presillas.
    talc_content:
      name: Contenido de talco
      description: Indica si la formulación contiene talco, está libre de talco o
        utiliza niveles reducidos de talco.
    tampon_absorbency_level:
      name: Nivel de absorbencia del tampón
      description: Identifica la capacidad de absorbencia de los tampones, como leve
        o super
    tampon_features:
      name: Características del tampón
      description: Describe las características específicas de los tampones, como
        el diseño cómodo o la contención de fugas.
    tan_type:
      name: Tipo de bronceado
      description: Define la intensidad del color y el proceso de aplicación de productos
        bronceadores, por ejemplo, oscuros o instantáneos.
    tank_color:
      name: Color del tanque
      description: Identifica el color de un producto, normalmente cisternas de inodoro,
        como, por ejemplo, negro o blanco.
    tank_material:
      name: Material del tanque
      description: Especifica el material del depósito de un producto, generalmente
        de herramientas de jardinería, como, por ejemplo, metal o plástico.
    tank_pattern:
      name: Patrón del depósito
      description: Identifica el motivo visual en las cisternas de los inodoros, como
        sólido o abstracto
    tape_cartridge_format:
      name: Formato del cartucho de cinta
      description: Especifica las tecnologías de cartucho de cinta (p. ej., LTO, DAT,
        DLT) que la unidad puede leer o escribir.
    tape_cartridge_generation:
      name: Generación del cartucho de cinta
      description: Indica la generación o versión específica dentro de una familia
        de tecnología de cinta (más comúnmente generaciones LTO) que soporta la unidad.
    tape_material:
      name: Material de la cinta
      description: Especifica el tipo de material utilizado en los productos de cinta,
        como el vinilo o el plástico.
    tape_speed_supported:
      name: Velocidad de cinta admitida
      description: Enumera las velocidades de reproducción y grabación de cinta (pulgadas
        por segundo) a las que puede funcionar la unidad de bobina a bobina.
    target_audience:
      name: Público objetivo
      description: Especifica para quién es adecuado un producto, como para niños
        o personas de todas las edades.
    target_facial_zone:
      name: Zona facial objetivo
      description: Especifica la zona facial que la tira de poros está diseñada para
        tratar (p. ej., nariz, barbilla, zona T).
    target_gender:
      name: Sexo objetivo
      description: Identifica el sexo al que va destinado un producto, como femenino,
        masculino o unisex.
    targeted_pests:
      name: Plagas específicas
      description: Identifica el tipo de plaga contra la que un producto es eficaz,
        por ejemplo, el moho o las algas.
    targeted_skin_concern:
      name: Preocupación cutánea objetivo
      description: Indica la lesión o condición de la piel específica que el producto
        está formulado para tratar.
    targeted_stains:
      name: Manchas específicas
      description: Identifica los tipos de manchas para los que está diseñado un producto,
        como la comida o el barro.
    tea_input_type:
      name: Tipo de entrada de té
      description: Especifica el estilo de preparación del té, por ejemplo, en bolsas
        o cápsulas K-cup.
    technology_level:
      name: Nivel de tecnología
      description: Indica la complejidad de la tecnología de un producto, como, por
        ejemplo, básica o avanzada.
    teeth_material:
      name: Material de los dientes
      description: Identifica el material del que están fabricados los dientes, generalmente
        de herramientas de jardinería, como, por ejemplo, plástico o metal.
    telephone_cable_interface:
      name: Interfaz de cable de teléfono
      description: Define el tipo de enchufe utilizado en cables telefónicos, como
        RJ-10.
    telephone_cable_second_interface:
      name: Segunda interfaz del cable telefónico
      description: Define el tipo de conector en el extremo opuesto del cable cuando
        difiere de la interfaz principal (p. ej., RJ45 a RJ11).
    telephone_cord_style:
      name: Estilo de cable telefónico
      description: Especifica la forma física del cable telefónico, lo que ayuda a
        los clientes que necesitan un cable recto, enrollado o especial para teléfonos
        de reemplazo y soportes de pared.
    telephone_style:
      name: Estilo de teléfono
      description: Define el diseño o la estética de un teléfono, por ejemplo, vintage
        o novedoso.
    telescope_level:
      name: Nivel del telescopio
      description: Indica la complejidad o el nivel de habilidad requerido para un
        telescopio, como principiante o avanzado
    telescope_tracking_system:
      name: Sistema de seguimiento del telescopio
      description: Identifica el tipo de sistema de seguimiento en telescopios, por
        ejemplo, manual, motorizado
    television_circuit_board_type:
      name: Tipo de placa de circuito del televisor
      description: Identifica el papel funcional de la placa de circuito dentro de
        un televisor (p. ej., placa principal, placa de fuente de alimentación, placa
        T-Con).
    television_shape:
      name: Forma de la televisión
      description: Define el contorno físico de la pantalla del televisor, como curvo
        o plano.
    television_speaker_position:
      name: Posición del altavoz del televisor
      description: Identifica la ubicación física o el rol del altavoz dentro del
        conjunto del televisor (p. ej., izquierdo, derecho, central, subwoofer).
    television_specialized_features:
      name: Características especializadas de la televisión
      description: Identifica capacidades únicas de un televisor, como el control
        por voz o la barra de sonido integrada.
    temperature:
      name: Temperatura
      description: Especifica los ajustes de calor para dispositivos como pistolas
        de pegamento, por ejemplo, doble o alto.
    temperature_control:
      name: Control de temperatura
      description: 'Define la capacidad para ajustar la temperatura del producto,
        generalmente de calentadores de biberones, como, por ejemplo, ajustable o
        preestablecida. '
    temperature_measurement:
      name: Medición de temperatura
      description: Indica si el producto mide en grados Fahrenheit o Centígrados.
    template_type:
      name: Tipo de plantilla
      description: Especifica la categoría de las plantillas de documentos, por ejemplo,
        tarjetas de presentación o folletos.
    temple_color:
      name: Color de las varillas
      description: Especifica el color de las patillas de las gafas, como rojo o transparente.
    temple_pattern:
      name: Patrón del templo
      description: Describe el diseño o motivo en la patilla de las gafas, como con
        un logo o a cuadros
    tension:
      name: Tensión
      description: Describe el nivel de tensión de las cuerdas de instrumentos musicales,
        por ejemplo, muy alto.
    tensioning_system:
      name: Sistema de tensado
      description: Detalla el mecanismo utilizado para mantener la superficie de la
        pantalla plana y sin arrugas.
    tent_setup_style:
      name: Estilo de montaje de tienda
      description: Indica cómo se despliega o ensambla la tienda.
    tequila_variety:
      name: Variedad de tequila
      description: Especifica el tipo de tequila, por ejemplo, dorado o añejo.
    terminal_operation:
      name: Operación de terminales
      description: Especifica el tipo de funcionamiento de las cajas registradoras,
        como manual o electrónico.
    termination_method:
      name: Método de terminación
      description: Especifica la técnica utilizada para conectar conductores a los
        contactos del conector (p. ej., crimpado, soldadura, IDC).
    terrain:
      name: Terreno
      description: Especifica el tipo de terreno para el que está diseñado un producto,
        normalmente para equipos de exterior, como, por ejemplo, el terreno de montaña
        u ondulado.
    test_format:
      name: Formato de prueba
      description: Define el tipo de prueba de productos de salud y belleza, por ejemplo,
        digital o con tira reactiva.
    test_method:
      name: Método de prueba
      description: Define el procedimiento para realizar una prueba médica, como,
        por ejemplo, prueba en casa o análisis de laboratorio.
    test_sample:
      name: Muestra de prueba
      description: Especifica el tipo de muestra requerida para pruebas médicas y
        de salud, por ejemplo, hisopo o saliva.
    tetherball_equipment_included:
      name: Equipo de tetherball incluido
      description: Indica la inclusión de artículos esenciales en un juego de tetherball,
        como la cuerda o tetherball.
    tethering_policy:
      name: Política de compartición de conexión
      description: Aclara si el punto de acceso móvil o la compartición de conexión
        están permitidos según los términos del plan de eSIM.
    text_plate_material:
      name: Material de placa de texto
      description: Identifica el material de la placa de texto de los sellos de oficina,
        como el metal o el caucho.
    textile_craft_machine_features:
      name: Características de la máquina textil artesanal
      description: Describe características especiales de las máquinas textiles artesanales,
        como la tensión ajustable o la portabilidad.
    textile_craft_project_type:
      name: Tipo de proyecto de artesanía textil
      description: Identifica el tipo de proyecto de artesanía textil, como la tejeduría
        o la confección de colchas.
    texture:
      name: Textura
      description: Define la sensación o consistencia de un producto, como, por ejemplo,
        cremoso, mate o absorbente.
    texture_level:
      name: Nivel de textura
      description: Indica la suavidad o aspereza de un producto, normalmente purés
        de alimentos nutricionales, como, por ejemplo, nivel 1 (en puré), nivel 2
        (picado).
    theme:
      name: Tema
      description: Describe el tema o motivo principal del producto, como el deporte,
        la actividad al aire libre o las vacaciones.
    therapeutic_features:
      name: Características terapéuticas
      description: Enumera modalidades terapéuticas adicionales integradas en la órtesis
        de cuello.
    therapeutic_swing_accessories_included:
      name: Accesorios de columpio terapéutico incluidos
      description: Enumera hardware o accesorios adicionales suministrados con el
        columpio.
    therapy_mode_supported:
      name: Modo de terapia soportado
      description: Enumera los algoritmos de terapia respiratoria en los que el dispositivo
        puede operar, más allá del APAP estándar.
    therapy_temperature_type:
      name: Tipo de temperatura de terapia
      description: Indica si el producto proporciona terapia de calor, terapia de
        frío o ambas.
    thermal_detector_type:
      name: Tipo de detector térmico
      description: Especifica la tecnología utilizada para la detección térmica en
        dispositivos, como el detector de silicio amorfo (ASi).
    thermal_sensation:
      name: Sensación térmica
      description: Describe el efecto de temperatura percibido en la piel después
        de la aplicación.
    thermocouple_type:
      name: Tipo de termopar
      description: Especifica la categoría de termopar de los sensores, por ejemplo,
        Tipo J o S.
    thickness_type:
      name: Tipo de espesor
      description: Indica el nivel de grosor de los artículos, como fino, medio o
        grueso.
    thinner_application:
      name: Aplicación de diluyente
      description: Describe el tipo de sustancia para la que se utiliza un disolvente,
        como la pintura o el epoxi.
    thread_direction:
      name: Dirección del hilo
      description: Identifica la dirección de la rosca de artículos de bricolaje,
        como a la izquierda o derecha.
    threaded_rod_size:
      name: Tamaño de varilla roscada
      description: Especifica el diámetro de una varilla roscada, como, por ejemplo,
        M10 o M20.
    throw_pillow_shape:
      name: Forma de la almohada
      description: Identifica la forma de las almohadas decorativas, como de almohadón
        o rectangular.
    thumb_grip_profile:
      name: Perfil del agarre para pulgar
      description: Describe la superficie o estilo de forma de la parte superior del
        agarre para pulgar (p. ej., cóncavo, abovedado), lo cual afecta el agarre
        y la sensación de control.
    ticket_additional_features:
      name: Características adicionales del billete
      description: Destaca los beneficios adicionales que se ofrecen con las entradas,
        como los actos de bienvenida o las actividades posteriores al evento.
    ticket_class:
      name: Clase de billete
      description: Especifica el nivel de servicio o clase de asiento proporcionado
        con el billete.
    ticket_type:
      name: Tipo de billete
      description: Identifica la categoría de entradas para eventos, como la entrada
        general o los asientos reservados.
    tile_design:
      name: Diseño del azulejo
      description: Describe el patrón o estilo de los azulejos, como geométrico o
        en espiga.
    tile_game_type:
      name: Tipo de juego de fichas
      description: Identifica el tipo específico de juego de fichas, como dominó o
        mahjong
    tile_installation_method:
      name: Método de instalación de azulejos
      description: Describe cómo se instala un producto, normalmente azulejos de techo
        o de pared; por ejemplo, la instalación de colocación.
    tile_look:
      name: Aspecto del azulejo
      description: Describe la apariencia o el estilo de un azulejo, como mármol o
        3D.
    tile_material:
      name: Material de azulejo
      description: Identifica la composición de los azulejos, como la cerámica o piedra.
    tile_texture:
      name: Textura del azulejo
      description: Describe la sensación que ofrece la superficie de un azulejo, como
        suave o texturada.
    time_period:
      name: Periodo de tiempo
      description: Especifica el período de tiempo relacionado con trabajos o estudios
        académicos, como la revolución medieval o industrial.
    time_signatures:
      name: Firmas de tiempo
      description: Define la estructura del tiempo, normalmente para metrónomos, como,
        por ejemplo, 4/4 o 3/4.
    time_weighting:
      name: Ponderación del tiempo
      description: Se utiliza para especificar la rapidez con la que responde un sonómetro
        a las fluctuaciones del sonido, por ejemplo, lento o rápido.
    timepiece_features:
      name: Características del reloj
      description: Identifica características especiales de un reloj, como duración
        regulable o iluminación.
    timer_design:
      name: Diseño del temporizador
      description: Describe el tipo de temporizador utilizado en los equipos de cuarto
        oscuro, como digital o analógico.
    timer_features:
      name: Características del temporizador
      description: Describe las funciones especiales de un temporizador, como la duración
        ajustable o la pantalla incorporada.
    timer_type:
      name: Tipo de temporizador
      description: Especifica la configuración de frecuencia de los temporizadores,
        como, por ejemplo, diaria o semanal.
    tingle_intensity:
      name: Intensidad de hormigueo
      description: Describe el nivel de sensación de calor u hormigueo producido por
        el producto cuando se aplica.
    tip_design:
      name: Diseño de la punta
      description: Especifica el tipo de punta de las agujas y jeringas médicas, como
        de cierre Luer o Slip Tip.
    tip_material:
      name: Material de la punta
      description: Especifica el material utilizado en la punta del producto, como
        el algodón o la silicona.
    tip_opening:
      name: Apertura de punta
      description: Describe el ancho de la abertura de la boquilla de instrumentos
        de viento, como mediano o grande.
    tip_style:
      name: Estilo de punta
      description: Describe el diseño de la punta del producto, por ejemplo, en ángulo
        o curva.
    tip_type:
      name: Tipo de punta
      description: Define el tipo de punta de los arpones de pesca, como de cincel
        o doble púa.
    tire_bead_type:
      name: Tipo de talón de neumático
      description: Especifica el tipo de talón de los neumáticos para bicicletas,
        como plegables o rígidos.
    tobacco_type:
      name: Tipo de tabaco
      description: Especifica la variedad de tabaco, por ejemplo, turco o Virginia.
    toddler_bed_features:
      name: Características de la cama para niños pequeños
      description: Describe las características especiales de las camas para niños
        pequeños, como la altura ajustable o la luz nocturna incorporada.
    toe_spacer_design:
      name: Diseño de separador de dedos
      description: Describe el diseño de los separadores de dedos que se usan para
        el cuidado de los pies, por ejemplo, diseño de bucle o contorneado.
    toe_strap_type:
      name: Tipo de correa para dedo del pie
      description: Especifica el diseño de la correa de la puntera, normalmente de
        fijaciones de snowboard o raquetas de nieve, como, por ejemplo, toe cap o
        tradicional.
    toe_style:
      name: Estilo de punta del calzado
      description: Define la forma o el diseño de la punta de un zapato, como abierta
        o puntiaguda.
    toilet/bidet_mounting_type:
      name: Tipo de montaje de inodoro/bidé
      description: Especifica cómo se instala el bidé, por ejemplo, con montaje en
        piso o en la pared.
    toilet_cover_design:
      name: Diseño de la tapa del inodoro
      description: Describe la forma de las tapas de los inodoros, como redondas o
        alargadas.
    toilet_cover_features:
      name: Características de la tapa del inodoro
      description: Describe las características especiales de una tapa de inodoro,
        como de cierre rápido o cierre suave.
    toilet_mounting_type:
      name: Tipo de montaje del inodoro
      description: Especifica el método de instalación del inodoro, por ejemplo, montado
        en la pared o en el suelo.
    toilet_shape:
      name: Forma del inodoro
      description: Describe la forma de un inodoro, como redonda o rectangular.
    tom_tom_design:
      name: Diseño de tambor tom-tom
      description: Describe el tipo de tambor tom-tom, como de suelo o en bastidor.
    tonearm_type:
      name: Tipo de brazo
      description: Describe la geometría del brazo, que afecta el rendimiento de seguimiento
        y la usabilidad para DJ.
    tool/utensil_material:
      name: Material de la herramienta/utensilio
      description: Identifica el material principal que se usa en una herramienta
        o utensilio, como el acero inoxidable o la madera de teca.
    tool_key_tip:
      name: Punta de llave de herramienta
      description: Especifica el tipo de punta de llave de la herramienta, como Phillips
        o llave inglesa.
    tool_mobility:
      name: Movilidad de herramientas
      description: Describe si una herramienta tiene o no cable, generalmente para
        productos dentales.
    tool_operation:
      name: Operación de herramienta
      description: Describe el funcionamiento de una herramienta, como manual o con
        motor.
    toothbrush_head_size:
      name: Tamaño del cabezal del cepillo de dientes
      description: Define el tamaño relativo del cabezal de cepillado para adaptarse
        a diferentes tamaños de boca y necesidades de limpieza.
    toothbrush_head_type:
      name: Tipo de cabezal del cepillo de dientes
      description: Clasifica el estilo funcional del cabezal (p. ej., blanqueamiento,
        cuidado de las encías, niños).
    toothpaste_type:
      name: Tipo de pasta de dientes
      description: Define la función específica de la pasta de dientes, como anticaries
        o blanqueadora.
    toothpick_design:
      name: Diseño del palillo de dientes
      description: Especifica la forma de los palillos de dientes, como redondos o
        planos.
    top_color:
      name: Color del tope
      description: Especifica el color primario de la superficie superior de un producto,
        como, por ejemplo, transparente o bronce.
    top_length_type:
      name: Tipo de largo del top
      description: Define el largo de camisetas o blusas, como crop top o largas.
    top_material:
      name: Material del tope
      description: Define el material de la superficie superior de un producto, por
        ejemplo la madera o el vidrio.
    top_pattern:
      name: Patrón superior
      description: Describe el diseño o estampado en la superficie de un producto,
        como floral o a rayas
    top_surface_material:
      name: Material de la superficie del tope
      description: Especifica el material que se usa en la superficie superior del
        producto, como el acero inoxidable o el vidrio cerámico.
    top_up_method:
      name: Método de recarga
      description: Especifica las formas en que los clientes pueden agregar crédito
        adicional o renovar el plan en la tarjeta prepaga o SIM.
    tote_handle_type:
      name: Tipo de asa de bolso de tela
      description: Identifica el estilo de las asas de un bolso de mano, como cortas
        o largas.
    totem_design:
      name: Diseño de tótem
      description: Especifica el diseño de tótems publicitarios para ferias comerciales,
        como de uno o dos lados.
    touch_capabilities:
      name: Capacidades táctiles
      description: Indica el tipo de interacción táctil que admite un dispositivo
        electrónico, como simple o doble.
    touchpad_form_factor:
      name: Factor de forma del panel táctil
      description: Define el estilo de instalación o uso previsto del panel táctil.
    touchscreen_technology:
      name: Tecnología de pantalla táctil
      description: Identifica la tecnología de pantalla táctil de dispositivos interactivos,
        como capacitiva o resistiva.
    touchscreen_wire_configuration:
      name: Configuración de cables de la pantalla táctil
      description: Indica el número de cables o líneas utilizados por digitalizadores
        resistivos, afectando la compatibilidad con los controladores.
    toy/game_material:
      name: Material del juguete/juego
      description: Identifica el material principal que usa un juguete o juego, como
        el plástico o la madera.
    toy_figure_features:
      name: Características de la figura de juguete
      description: Describe características especiales de las figuras de juguetes,
        como las articulaciones o los detalles realistas.
    toy_figure_theme:
      name: Tema de la figura de juguete
      description: Identifica el tema o categoría de una figura de juguete, como animal
        o deportes
    toy_tool_type:
      name: Tipo de herramienta de juguete
      description: Identifica el tipo de herramienta de juguete en un juego de simulación,
        como un taladro o un martillo
    track_configuration:
      name: Configuración de pistas
      description: Indica el formato de pista de cinta y los canales que la máquina
        puede grabar o reproducir (p. ej., estéreo vs mono, número de pistas).
    tracker_form_factor:
      name: Factor de forma del rastreador
      description: Define el estilo físico y la forma del hardware del rastreador.
    tracking_metrics:
      name: Métricas de seguimiento
      description: Especifica los datos de salud y estado físico que supervisa el
        producto, por ejemplo, el sueño o los pasos.
    tracking_purpose:
      name: Uso de la localización
      description: Especifica el uso previsto de los localizadores GPS, como el seguimiento
        de activos o mascotas.
    tractor_accessories_included:
      name: Accesorios para el tractor incluidos
      description: Especifica características adicionales proporcionadas con el tractor,
        como un kit de mantillo o una hoja de nieve
    trade_show_display_features:
      name: Características del expositor para ferias
      description: Identifica características especiales de exhibidores de ferias
        comerciales, como la pantalla táctil o la iluminación.
    trading_card_packaging:
      name: Embalaje de tarjetas coleccionables
      description: Identifica el tipo de envasado de las tarjetas coleccionables,
        como en blíster o sobre.
    traffic_control_device_features:
      name: Características del dispositivo de control de tráfico
      description: Identifica características únicas de los artículos de control de
        tráfico, como la base apilable o con contrapeso.
    trail_camera_design:
      name: Diseño de cámara de seguimiento
      description: Describe el tipo de cámara de seguimiento, como estándar o celular.
    trailer_type:
      name: Tipo de remolque
      description: Identifica el diseño o estilo de un remolque de vehículo a motor,
        como abierto o cerrado.
    training_data_requirements:
      name: Requisitos de datos de entrenamiento
      description: Identifica el tipo de datos y la calidad que se necesitan para
        la formación efectiva del software de aprendizaje automático o IA, por ejemplo,
        los datos etiquetados.
    trampoline_design:
      name: Diseño de trampolín
      description: Describe la construcción del trampolín, como sin resortes o con
        resortes helicoidales.
    transceiver_form_factor:
      name: Factor de forma del transceptor
      description: Define el estándar del módulo físico del transceptor de red (p.
        ej., SFP, QSFP28).
    transcriber/dictation_system_features:
      name: Características del sistema de transcripción/dictado
      description: Identifica características especiales de transcriptores o sistemas
        de dictado, como la tecnología de inteligencia artificial o la reducción de
        ruido.
    transfer_aid_type:
      name: Tipo de ayuda para transferencia
      description: Clasifica el estilo de ayuda, distinguiendo tablas rígidas de láminas
        flexibles y colchones asistidos por aire.
    transfer_board_shape:
      name: Forma de la tabla de transferencia
      description: Define el perfil geométrico de la tabla o lámina, que influye en
        la trayectoria de transferencia y compatibilidad con diferentes alturas de
        asiento o cama.
    transfer_boards_surface_type:
      name: Tipo de superficie de tablas de traslado
      description: Especifica la textura de la superficie de las tablas de transferencia
        de movilidad, por ejemplo, acolchada o lisa.
    transfer_paper_technique:
      name: Técnica del papel de transferencia
      description: Identifica el método utilizado con papel de transferencia, como
        inyección de tinta o planchado
    transmission_type:
      name: Tipo de transmisión
      description: Identifica el tipo de transmisión de vehículos o piezas, como manual
        o automática.
    transmitter_form_factor:
      name: Factor de forma del transmisor
      description: Clasifica el estilo físico o carcasa de la unidad transmisora para
        ayudar a los compradores a encontrar rápidamente la forma que se adapte a
        su aplicación.
    transport_type:
      name: Tipo de transporte
      description: Especifica el modo de transporte público para el cual el billete
        o pase es válido.
    trash_can_features:
      name: Características del cubo de la basura
      description: Describe características especiales de los cubos de basura, como
        el control de olores o el pedal.
    travel_pillow_features:
      name: Características de almohada de viaje
      description: Enumera características funcionales especiales, accesorios o mejoras
        de diseño de la almohada de viaje.
    travel_pillow_shape:
      name: Forma de almohada de viaje
      description: 'Describe el contorno físico de las almohadas de viaje, como las
        que tienen forma de J. '
    tray_compatibility:
      name: Compatibilidad de la bandeja
      description: Identifica el estilo de bandeja blanqueadora o boquilla que el
        estuche está diseñado para ajustar.
    treatment_area:
      name: Área de tratamiento
      description: Especifica la parte del cuerpo a la que va dirigida el producto,
        normalmente en artículos de masaje, como, por ejemplo, la espalda o el cuello.
    treatment_method:
      name: Método de tratamiento
      description: Describe el mecanismo o tecnología de entrega que utiliza el producto
        para eliminar la lesión (p. ej., crioterapia, ácido químico, parche de microaguja).
    treatment_modes:
      name: Modos de tratamiento
      description: Enumera los modos funcionales que admite el dispositivo (p. ej.,
        HR, SHR, SR).
    treatment_objective:
      name: Objetivo de tratamiento
      description: Define el problema que aborda el producto, normalmente en artículos
        de cuidado personal, como, por ejemplo, los ronquidos o la fiebre.
    treatment_target_area:
      name: Área objetivo del tratamiento
      description: Indica si el producto está formulado para pestañas, cejas, o ambas.
    treatment_texture:
      name: Textura del tratamiento
      description: Define la consistencia de los productos de tratamiento, como la
        crema para la dermatitis del pañal, como espesa o en polvo.
    treatment_type:
      name: Tipo de tratamiento
      description: Especifica el método de tratamiento, normalmente de tratamientos
        contra la caída del cabello, como, por ejemplo, láser o tópico.
    tree_stand_material:
      name: Material del soporte para árboles
      description: Especifica de qué está hecho un soporte para árbol, como el plástico
        o el metal.
    trellis_design:
      name: Diseño de celosía
      description: Identifica el diseño de celosías de cercas o barreras, por ejemplo,
        cuadrado o de diamante.
    tricycle_design:
      name: Diseño del triciclo
      description: Describe el estilo de un triciclo, como vertical o reclinado.
    tricycle_propulsion_type:
      name: Tipo de propulsión del triciclo
      description: Especifica cómo se conduce un triciclo, como mediante empuje o
        de tracción delantera.
    trip_type:
      name: Tipo de disparo
      description: Especifica el tipo de disparo de un disyuntor, por ejemplo, no
        intercambiable.
    tripod/monopod_attachment_type:
      name: Tipo de accesorio para trípode/monopié
      description: Especifica el tipo de conexión de accesorios de trípode o monópode,
        como 3/8 o universal.
    tripod/monopod_head_type:
      name: Tipo de cabezal para trípode y monopié
      description: Especifica el mecanismo de los cabezales de trípodes/monópodes,
        como con engranajes o cardán.
    tripod_handle_type:
      name: Tipo de manivela para trípode
      description: Especifica la funcionalidad de las asas de un trípode, por ejemplo,
        multifunción o anatómicas.
    trophy_design:
      name: Diseño de trofeos
      description: Describe el estilo o la forma específica de un trofeo, como una
        copa o una estrella.
    truck_type:
      name: Tipo de camión
      description: Clasifica el tipo de camión, como de volquete o plataforma.
    tube_component:
      name: Componente de tubo
      description: Especifica el tipo de tubo de los amplificadores de música, por
        ejemplo, estuche o base.
    tube_configuration:
      name: Configuración de tubo
      description: Describe la disposición de las válvulas de un amplificador de instrumento
        musical, como de una sola válvula o de par emparejado.
    tuner_design:
      name: Diseño del sintonizador
      description: Describe el estilo de los sintonizadores electrónicos para instrumentos
        musicales, como con clip o con pedal
    tuner_type:
      name: Tipo de sintonizador
      description: Define el tipo de radiofrecuencia recibida, como AM/FM o radio
        por satélite.
    tuning_fork_design:
      name: Diseño del diapasón
      description: Describe el diseño específico de un diapasón, como ponderado o
        no ponderado.
    tuning_fork_frequency:
      name: Frecuencia del diapasón
      description: Especifica la frecuencia de un diapasón, como de 128 Hz o 256 Hz.
    tuning_modes:
      name: Modos de sintonización
      description: Identifica las configuraciones de instrumentos específicos de los
        afinadores electrónicos, como para guitarra o violín.
    tuning_pitch:
      name: Clavijas de afinación
      description: 'Especifica el tono de afinación de un instrumento, como do # o
        la b.'
    tuning_range:
      name: Rango de sintonización
      description: Especifica la gama de opciones de ajuste disponibles, como estándar
        o abierta.
    tv_broadcast_standards_supported:
      name: Estándares de transmisión de TV soportados
      description: Enumera los estándares específicos de transmisión de televisión
        o cable/satélite que la tarjeta o adaptador puede decodificar o recibir.
    uc_platform_certification:
      name: Certificación de plataforma UC
      description: Identifica plataformas de comunicaciones unificadas o de reuniones
        para las que el dispositivo está certificado oficialmente.
    ultrasound_probe_type:
      name: Tipo de sonda de ultrasonido
      description: Identifica las características de diseño de la sonda suministrada
        con el monitor (p. ej., impermeable, interna).
    undershirt_style:
      name: Estilo de camiseta
      description: Describe el diseño o corte de una camiseta interior, como cuello
        redondo o escote en V
    underwear_style:
      name: Estilo de ropa interior
      description: Define el diseño y el corte de la ropa interior, como el bikini
        o los slips.
    units_of_measurement:
      name: Unidades de medida
      description: Especifica el sistema de medición que se usa para el producto,
        por ejemplo, milímetros (mm) o los grados Fahrenheit (°F).
    update_frequency:
      name: Frecuencia de actualización
      description: Indica la regularidad de las actualizaciones de software o datos,
        por ejemplo, en tiempo real o anual.
    upholstery_color:
      name: Color de tapicería
      description: Especifica el color de la tapicería de un producto, como el rojo
        o el beige.
    upholstery_material:
      name: Material de la tapicería
      description: Identifica el tejido utilizado para tapizar, como el cuero o terciopelo.
    upholstery_pattern:
      name: Patrón de la tapicería
      description: Describe el diseño visual de la tela del mobiliario, por ejemplo,
        a rayas o a cuadros
    uplink_port_type:
      name: Tipo de puerto de enlace ascendente
      description: Define el conector de enlace ascendente de mayor velocidad presente
        en el conmutador (p. ej., SFP+, QSFP28, 10GBase-T).
    ups_topology:
      name: Topología del UPS
      description: Indica el enfoque de diseño interno que utiliza un UPS para acondicionar
        y suministrar energía (p. ej., en espera, interactivo de línea, en línea).
    urinal_mounting_type:
      name: Tipo de montaje del urinario
      description: Especifica cómo se instala el urinario, como, por ejemplo, montado
        en la pared o en el suelo.
    usage_conditions:
      name: Condiciones de uso
      description: Especifica si el producto es adecuado para el uso en condiciones
        secas o húmedas, normalmente para maquinillas de afeitar.
    usage_environment:
      name: Entorno de uso
      description: Especifica dónde está destinado a usarse el producto bronceador.
    usage_frequency:
      name: Frecuencia de uso
      description: Especifica la frecuencia recomendada de uso del producto, como
        diaria o semanal.
    usage_type:
      name: Tipo de uso
      description: Especifica el ciclo de uso previsto del producto, como, por ejemplo,
        reutilizable o recargable.
    usb_connector_type:
      name: Tipo de conector USB
      description: Identifica los conectores USB físicos provistos en el dispositivo
        para datos y/o energía.
    usb_standard:
      name: Estándar de USB
      description: Especifica la versión de USB de dispositivos electrónicos, como
        USB 2.0 o USB 3.1 Gen 1.
    user_type:
      name: Tipo de usuario
      description: Identifica al usuario previsto de un producto de software, como
        un individuo o una pequeña empresa.
    utility/maintenance_task_type:
      name: Tipo de tarea de utilidad/mantenimiento
      description: Clasifica la tarea que realiza un software, como la limpieza del
        disco o la optimización del sistema.
    uv_blocking_class:
      name: Clase de bloqueo UV
      description: Indica el nivel de protección UV incorporado en la lente de contacto
        según lo definido por los estándares ISO.
    uv_protection:
      name: Protección UV
      description: Especifica la capacidad del producto para bloquear los rayos UV,
        normalmente gafas de sol, como, por ejemplo, UV400.
    uva_protection_grade:
      name: Grado de protección UVA
      description: Indica la calificación de protección UVA del producto, comúnmente
        expresada como grados PA.
    vacuum_air_filtering_technology:
      name: Filtrado de aire por vacío
      description: Especifica el tipo de filtración de aire que se usa en las aspiradoras,
        como el sistema HEPA o PET.
    valve_type:
      name: Tipo de válvula
      description: Especifica el tipo de válvula de piezas de bicicleta, como Presta
        o Schrader.
    van_type:
      name: Tipo de furgoneta
      description: Distingue entre diferentes tipos de furgonetas, como furgoneta
        de pasajeros o furgoneta transformada.
    vaping_style:
      name: Estilo de vapeo
      description: 'Especifica la técnica de vapeo de los cigarrillos electrónicos,
        por ejemplo, directo al pulmón o boca a pulmón. '
    varnish/finish_application:
      name: Aplicación de barniz/acabado
      description: Especifica las áreas de aplicación adecuadas para un barniz o acabado,
        como las paredes o puertas.
    vase_shape:
      name: Forma de jarrón
      description: Describe la forma geométrica u orgánica de un jarrón, como redondo
        o de botella.
    vcr_configuration:
      name: Configuración del VCR
      description: Identifica si la unidad es un VCR independiente o un dispositivo
        combinado con unidades o sintonizadores adicionales.
    vdi_protocol_support:
      name: Compatibilidad del protocolo VDI
      description: Especifica los protocolos de infraestructura de escritorio virtual
        (VDI) admitidos, por ejemplo, PCoIP, RDP.
    vehicle_alarm/lock_features:
      name: Características de la alarma/bloqueo del vehículo
      description: Especifica las características únicas de los sistemas de seguridad
        del vehículo, por ejemplo, el arranque remoto o la resistencia a la intemperie.
    vehicle_application_area:
      name: Área de aplicación de vehículos
      description: Especifica la parte de un vehículo a la que se aplica el producto,
        como la tapicería o el exterior.
    vehicle_audio_system_features:
      name: Características del sistema de audio del vehículo
      description: Identifica características especiales del sistema de audio de un
        vehículo, como el refuerzo de graves o la pantalla LED.
    vehicle_braking_features:
      name: Características de los frenos del vehículo
      description: Describe las características específicas de las piezas de frenado
        del vehículo, como resistentes a la corrosión o perforadas.
    vehicle_cleaning_item_features:
      name: Características del artículo de limpieza de vehículos
      description: Destaca los beneficios de los artículos de limpieza de vehículos,
        como una mayor eficiencia del combustible o un alto brillo.
    vehicle_decor_features:
      name: Características de la decoración del vehículo
      description: Describe las características de los artículos de decoración del
        vehículo, como la resistencia a los rayos UV o la impermeabilidad.
    vehicle_drive/handling_features:
      name: Características de conducción/manejo del vehículo
      description: Describe las características de las piezas de vehículos de motor,
        normalmente de sistemas de transmisión, transmisión, remolque y ruedas, como,
        por ejemplo, piezas de alto rendimiento o resistentes al calor.
    vehicle_engine/part_features:
      name: Características del motor/piezas del vehículo
      description: Indica las características únicas de las piezas del motor de un
        vehículo a motor, como la eficiencia del combustible o la mejora del rendimiento.
    vehicle_engine_features:
      name: Características del motor del vehículo
      description: Describe características específicas del motor de un vehículo,
        como el alto rendimiento o la eficiencia de combustible.
    vehicle_exhaust_type:
      name: Tipo de escape del vehículo
      description: Identifica el tipo de sistema de escape de un vehículo, como eje
        trasero o turbo trasero
    vehicle_features:
      name: Características del vehículo
      description: Describe características o equipos especiales de un vehículo, como
        los asientos calefactados o el sistema de navegación.
    vehicle_floor_configuration:
      name: Configuración del piso del vehículo
      description: Especifica el diseño y la disposición del piso de un vehículo de
        uso diario, como piso bajo o semibajo
    vehicle_fluid_features:
      name: Características del líquido del vehículo
      description: Describe propiedades especiales de los fluidos de vehículos, como
        anticongelantes o biodegradables.
    vehicle_fluid_type:
      name: Tipo de líquido del vehículo
      description: Identifica el tipo de fluido utilizado en el mantenimiento del
        vehículo, como concentrado o prediluido
    vehicle_frame/body_features:
      name: Características del bastidor/carrocería del vehículo
      description: Describe características especiales de las piezas de la carrocería
        del vehículo, como el acabado pintado o cromado.
    vehicle_mirror_design:
      name: Diseño del espejo del vehículo
      description: Especifica las características de diseño de los espejos para vehículos
        motorizados, como extensibles o plegables
    vehicle_mirror_features:
      name: Características del espejo del vehículo
      description: Describe características especiales de los espejos de los vehículos,
        como la atenuación automática o la calefacción.
    vehicle_mirror_type:
      name: Tipo de espejo del vehículo
      description: Identifica el tipo específico de espejo de un vehículo, como de
        vista trasera o vista lateral
    vehicle_mounting_location:
      name: Ubicación de montaje en el vehículo
      description: Especifica el área en un vehículo donde está destinado a instalarse
        el soporte.
    vehicle_oil_features:
      name: Características del aceite del vehículo
      description: Describe propiedades únicas del aceite de motor, como la protección
        contra el desgaste o la alta eficiencia de filtración.
    vehicle_paint_type:
      name: Tipo de pintura de vehículos
      description: Especifica la categoría de la pintura del vehículo, como kit de
        pintura o pintura para carrocerías de vehículo de motor.
    vehicle_placement:
      name: Ubicación en el vehículo
      description: Especifica en qué parte de la bicicleta se puede colocar el producto,
        como el cuadro o la parte frontal.
    vehicle_seating_features:
      name: Características de los asientos del vehículo
      description: Describe las características especiales de los asientos del vehículo,
        como la calefacción o reclinación.
    vehicle_suspension_features:
      name: Características de la suspensión del vehículo
      description: Especifica las características únicas de las piezas de suspensión
        del vehículo, como ajustable o hidráulica.
    vehicle_tire_type:
      name: Tipo de neumático del vehículo
      description: Especifica la estación o el terreno para los que son aptos los
        neumáticos de vehículos, como los neumáticos de invierno o todoterreno.
    vehicle_type:
      name: Tipo de vehículo
      description: Clasifica el tipo de vehículo, por ejemplo, SUV o velero.
    ventilation_type:
      name: Tipo de ventilación
      description: Describe el estilo principal de ventilación o características de
        flujo de aire del gabinete que gestionan la temperatura interna.
    verification_technology:
      name: Tecnología de verificación
      description: Identifica la tecnología que se usa en los verificadores de billetes,
        como magnética o infrarroja.
    vesa_mounting_pattern:
      name: Patrón de montaje VESA
      description: Define el espaciado de los orificios VESA en la parte posterior
        del monitor para compatibilidad con soportes, brazos y bases.
    vg/pg_ratio:
      name: Relación VG/PG
      description: Indica la proporción de glicerina vegetal-propilenglicol de los
        líquidos para cigarrillos electrónicos, por ejemplo, 30:70.
    video_codecs/formats_supported:
      name: Códecs o formatos de video compatibles
      description: Define los códecs de vídeo y los formatos que admite un dispositivo,
        como MP4 o H.264.
    video_game_content_features:
      name: Características del contenido del videojuego
      description: Describe características especiales del software de videojuegos,
        como el contenido descargable (DLC) o el acceso anticipado.
    video_game_format:
      name: Formato de videojuegos
      description: Especifica el método de entrega y el tipo de multimedia para los
        videojuegos, como digital o físico.
    video_game_genre:
      name: Género de videojuegos
      description: Clasifica el tipo de videojuego, como familiar o de supervivencia.
    video_game_platform:
      name: Plataforma de videojuegos
      description: Especifica la plataforma con la que es compatible un videojuego,
        como PC o PlayStation 5
    video_game_sub_genre:
      name: Subgénero de videojuegos
      description: Identifica la subcategoría específica de un videojuego, como MMORPG
        o Battle Royale.
    video_port_type:
      name: Tipo de puerto del video
      description: Especifica el tipo de puerto de vídeo que admite un producto, por
        ejemplo, HDMI o puerto de pantalla.
    video_recorder_type:
      name: Tipo de grabador de video
      description: Especifica la tecnología de grabación fundamental del dispositivo
        (p. ej., DVR, NVR, XVR).
    video_region_code:
      name: Código de región de video
      description: Define la compatibilidad regional de los reproductores de DVD y
        Blu-ray, como región libre o región 1.
    video_resolution_supported:
      name: Resolución de video compatible
      description: Define la claridad o calidad de video que admite un dispositivo,
        como 1080p o ultra HD.
    video_signal_standard:
      name: Estándar de señal de video
      description: Especifica los estándares de transmisión de video analógico admitidos
        por el dispositivo (p. ej., NTSC, PAL, SECAM).
    viewing_area_height:
      name: Altura del área de visualización
      description: Especifica la altura del área de visualización de productos como
        caretas de soldar, por ejemplo, mediana o grande.
    viewing_area_width:
      name: Ancho del área de visualización
      description: Especifica el ancho del área de visualización de productos como
        caretas de soldar, por ejemplo, mediano o grande.
    vinegar_drink_variety:
      name: Variedad de bebida con vinagre
      description: Especifica el tipo de bebida a base de vinagre, por ejemplo, kombucha
        o shrubs.
    vinegar_variety:
      name: Variedad de vinagre
      description: Distingue entre diferentes tipos de vinagre, como, por ejemplo,
        de fruta o balsámico.
    viscosity:
      name: Viscosidad
      description: Especifica la resistencia al flujo de los aceites de motor, como
        10W-40 o 15W-50.
    vision_correction_type:
      name: Tipo de corrección de visión
      description: Indica el diseño óptico destinado a corregir condiciones de visión
        específicas.
    visual_effect:
      name: Efecto visual
      description: Define las características visuales de un producto, normalmente
        esmaltes artísticos, como, por ejemplo, moteado o texturizado.
    voice_recorder_form_factor:
      name: Factor de forma del grabador de voz
      description: Describe el estilo físico o disfraz del grabador para que los compradores
        puedan elegir el diseño que se ajuste a su caso de uso.
    voip_protocol_support:
      name: Compatibilidad del protocolo VoIP
      description: Especifica los protocolos de voz a través de Internet (VoIP) que
        un dispositivo puede admitir, como SIP o IAX.
    wader_type:
      name: Tipo de botas de vadeo
      description: Define el estilo específico de vadeadores para caza o pesca, como
        de cadera o cintura.
    waist_rise:
      name: Altura de cintura
      description: Indica en qué parte de la cintura se ajusta una prenda, como, por
        ejemplo, en la parte baja, media o alta.
    walker_brake_type:
      name: Tipo de freno del andador
      description: Describe el mecanismo de frenado incorporado en el andador.
    walker_seat_type:
      name: Tipo de asiento del andador
      description: Identifica si el andador incluye un asiento y el estilo del asiento.
    walker_type:
      name: Tipo de andador
      description: Clasifica el estilo estructural y uso previsto del andador.
    walking_aid_tip_type:
      name: Tipo de punta de ayuda para caminar
      description: Especifica el estilo o tecnología de la punta de contacto con el
        suelo del bastón.
    wall_material:
      name: Material de la pared
      description: Identifica el material utilizado para la pared del producto, normalmente
        de saunas, como, por ejemplo, el cedro.
    wall_patching_application:
      name: Aplicación de parche en pared
      description: Identifica la superficie adecuada para un compuesto de parcheo,
        como la madera o el yeso.
    wall_plate_style:
      name: Estilo de placa de pared
      description: Describe el diseño de las placas o cubiertas de pared, como convencionales
        o sin tornillos.
    wallet_features:
      name: Características de la cartera
      description: Describe características especiales de las carteras, como la protección
        RFID o el diseño compacto.
    wallpaper_application_method:
      name: Método de aplicación de papel tapiz
      description: Define el método de aplicación del papel pintado, como, por ejemplo,
        el método de pelar y pegar o mediante pasta.
    wallpaper_theme:
      name: Tema de fondo de pantalla
      description: Identifica el tema principal o el estilo de un fondo de escritorio,
        como naturaleza o abstracto.
    wan_interface_type:
      name: Tipo de interfaz WAN
      description: Especifica el tipo de conexión física utilizada para el enlace
        ascendente WAN/Internet del enrutador (p. ej., Ethernet, fibra, DSL, celular).
    warning_category:
      name: Categoría de advertencia
      description: Clasifica la categoría de las señales de seguridad o protección,
        por ejemplo, de prohibición o advertencia.
    washer/dryer_features:
      name: Características de la lavadora/secadora
      description: Destaca las características únicas de los electrodomésticos para
        cuidado de la ropa, como seguro para niños y limpieza automática.
    washer_form:
      name: Forma de la arandela
      description: Describe el tipo específico de arandela en accesorios de ferretería,
        como plana o de resorte.
    washing_machine_features:
      name: Características de la lavadora
      description: Identifica funciones especiales de una lavadora, como el bloqueo
        para niños o el temporizador de inicio retardado.
    washing_method:
      name: Método de lavado
      description: 'Especifica el proceso de limpieza recomendado para un producto,
        por ejemplo, el lavado a mano o a máquina. '
    washing_programs:
      name: Programas de lavado
      description: Define los diferentes ciclos de lavado que ofrece una lavadora,
        como el lavado en frío o delicado.
    waste_bag_features:
      name: Características de la bolsa de basura
      description: Describe las características especiales de las bolsas para excrementos
        de mascotas, como biodegradables o a prueba de fugas.
    waste_bag_material:
      name: Material de la bolsa de basura
      description: Identifica el material de las bolsas de basura, como el plástico
        o los materiales biodegradables.
    watch/band_material:
      name: Material del reloj/correa
      description: Especifica el tipo de material de las correas del reloj, como nailon
        o silicona.
    watch_accessory_style:
      name: Estilo de accesorio del reloj
      description: Define el estilo de los accesorios de loas relojes, como deportivo
        o moderno.
    watch_display:
      name: Pantalla de reloj
      description: Distingue las diferentes pantallas de reloj, como digital o analógica.
    watch_features:
      name: Características del reloj
      description: Identifica características especiales de un reloj, como el movimiento
        automático o las manecillas luminosas.
    watch_material:
      name: Material del reloj
      description: Especifica el tipo de material utilizado para el reloj, como el
        titanio o la silicona.
    water_filter_application:
      name: Aplicación de filtro de agua
      description: Identifica el uso previsto de un filtro de agua, normalmente para
        electrodomésticos, como, por ejemplo, cafetera o máquina de hielo.
    water_flosser_modes:
      name: Enumera los modos de limpieza disponibles en los que el dispositivo puede
        operar.
      description: Cobertura del arco de la dentadura
    water_sport:
      name: Deporte acuático
      description: Especifica el deporte acuático para el que está diseñado el producto,
        como el buceo o el kayak.
    watercraft_engine_control_type:
      name: Tipo de control para motor de embarcación
      description: Identifica el tipo de sistema de control del motor de una embarcación,
        como el acelerador o el cambio.
    watercraft_features:
      name: Características de la embarcación
      description: Describe las instalaciones o sistemas de una embarcación, como
        una cocina o un sistema de frenos.
    watercraft_motor_mounting_type:
      name: Tipo de montaje del motor de embarcación
      description: Identifica en qué parte de la embarcación está montado el motor,
        como proa o popa.
    watercraft_propulsion_type:
      name: Tipo de propulsión de la embarcación
      description: Especifica el tipo de propulsión de una embarcación, como manual
        o motorizada.
    watercraft_steering_wheel_type:
      name: Tipo de volante para moto acuática
      description: Especifica el tipo de timón de una embarcación, como eléctrico
        o estándar.
    watercraft_type:
      name: Tipo de embarcación
      description: Identifica la categoría de embarcación, como deportiva o de lujo.
    waveski_features:
      name: Características de waveski
      description: Describe las características únicas de un waveski, como de correa
        ajustable o antideslizante.
    wax_application_method:
      name: Método de aplicación de la cera
      description: Especifica la técnica utilizada para aplicar cera al equipo de
        deportes de invierno, como fría o caliente.
    wax_type:
      name: Tipo de cera
      description: Especifica el tipo de cera de los artículos como velas, como la
        soja o parafina.
    wear_schedule:
      name: Calendario de uso
      description: Especifica la duración máxima aprobada de uso consecutivo para
        la lente antes de retirarla.
    weather_alert_technology:
      name: Tecnología de alerta meteorológica
      description: Especifica el estándar de alerta o certificación admitido por la
        radio para advertencias de emergencia automatizadas.
    weather_strip_design:
      name: Diseño de burletes
      description: Describe la forma de los materiales de burletes, como redondos
        o planos.
    weather_supply_application_method:
      name: Método de aplicación del parche calentador
      description: Describe cómo se aplican los suministros de climatización, como
        autoadhesivos o no adhesivos
    weatherization_application:
      name: Aplicación de climatización
      description: Identifica dónde se aplica un producto de climatización, como en
        ventanas o puertas.
    webcam_design:
      name: Diseño de cámara web
      description: Identifica el tipo de cámara web, como de conferencia, equipo portátil
        o plug-and-play.
    weight_bar_activity:
      name: Actividad de la barra de pesas
      description: Especifica el uso previsto de las barras de levantamiento de pesas,
        como, por ejemplo, levantamiento de pesas o entrenamiento técnico.
    weight_bar_type:
      name: Tipo de barra de pesas
      description: Especifica el diseño de las barras de levantamiento de pesas, como
        hexagonal o Z.
    weight_loss_mechanism:
      name: Mecanismo de pérdida de peso
      description: Identifica el enfoque fisiológico principal que usa el suplemento
        para apoyar la pérdida de peso.
    weight_type:
      name: Tipo de peso
      description: Describe el peso de los artículos, como ligeros, medianos o pesados.
    weight_unit_supported:
      name: Unidad de peso admitida
      description: Define las unidades de peso que utiliza un producto para medir,
        por ejemplo, libras o piedras.
    welding_helmet_features:
      name: Características de la careta de soldar
      description: Identifica características especiales de caretas de soldar, como,
        por ejemplo, color verdadero o modo de rectificado.
    wet_bag_features:
      name: Características de la bolsa húmeda
      description: Describe las características especiales de las bolsas, como a prueba
        de fugas o ecológicas.
    wheel_hardness:
      name: Dureza de la rueda
      description: Especifica el nivel de dureza de las ruedas del monopatín, por
        ejemplo, 75A.
    wheel_hub_placement:
      name: Ubicación del cubo de rueda
      description: Especifica la posición del cubo de rueda de monopatines, como en
        el centro o desplazada.
    wheel_part_type:
      name: Tipo de pieza de rueda
      description: Identifica el componente específico del sistema de ruedas de un
        vehículo, como el cojinete de rueda o el buje.
    wheel_style:
      name: Estilo del volante
      description: Describe la forma física del aro o estilo de disciplina de conducción.
    wheel_type:
      name: Tipo de rueda
      description: Especifica el tipo de rueda para productos de ciclismo, como inflable
        o lenticular.
    wheelchair_type:
      name: Tipo de silla de ruedas
      description: Distingue entre diferentes tipos de sillas de ruedas, por ejemplo,
        eléctricas o manuales.
    whiskey_style:
      name: Estilo de whisky
      description: Define el tipo específico de whisky, por ejemplo, de malta pura
        o mezclada.
    whiskey_variety:
      name: Variedad de whisky
      description: Clasifica el whisky según el tipo o estilo de grano, por ejemplo,
        maíz o centeno.
    wi_fi_band:
      name: Banda Wi-Fi
      description: Especifica el rango de frecuencia inalámbrica de un dispositivo,
        como 2,4 GHz.
    wi_fi_standard:
      name: Estándar de Wi-Fi
      description: Especifica el protocolo de red inalámbrica, como 802.11ac.
    width_adjustment:
      name: Ajuste de anchura
      description: Indica si el ancho del equipo puede alterarse para adaptarse a
        diferentes accesorios, camas o usuarios.
    winder_features:
      name: Características de la bobinadora
      description: Describe las características especiales de las manivelas para apretar
        cuerdas de guitarra, como un extractor de clavijas de puente o cortador incorporado.
    windlass_design:
      name: Diseño de molinete
      description: Describe la orientación de un molinete de ancla, como horizontal
        o vertical.
    window_treatment_material:
      name: Material de tratamiento de ventanas
      description: Especifica la composición de las persianas o cortinas, como de
        aluminio o plástico.
    windsurfing_board_style:
      name: Estilo de tabla de windsurf
      description: Especifica el tipo de tabla de windsurf, como estilo de libre o
        slalom.
    wine_rack_design:
      name: Diseño del botellero
      description: Define el estilo o la estética de un botellero, por ejemplo, moderno
        o tradicional.
    wine_sweetness:
      name: Dulzura del vino
      description: Ayuda a clasificar los vinos por nivel de dulzor, por ejemplo,
        secos o dulces.
    wine_variety:
      name: Variedad de vino
      description: Ayuda a distinguir entre diferentes tipos de vinos, por ejemplo,
        blanco o rosado.
    wing_style:
      name: Estilo de alas
      description: Indica si la almohadilla incluye alas estabilizadoras y, de ser
        así, qué estilo.
    wipe_dispenser/warmer_features:
      name: Características del dispensador/calentador de toallitas
      description: Describe las características especiales de los dispensadores y
        calentadores de toallitas, como que sean aptos para viajes.
    wipe_dispenser_features:
      name: Características del dispensador de toallitas
      description: Describe las características especiales de los dispensadores de
        toallitas, como el mecanismo dispensador o el indicador LED.
    wipe_fragrance:
      name: Fragancia de toallita húmeda
      description: Identifica el aroma de productos de limpieza, como sin perfume
        o lavanda.
    wipe_packaging:
      name: Embalaje de toallitas húmedas
      description: Define el estilo de envase o embalaje de las toallitas, por ejemplo,
        paquete de recarga o tamaño de viaje.
    wipe_purpose:
      name: Propósito de la toallita
      description: Identifica el uso o beneficio principal previsto de las toallitas.
    wipe_warmer_features:
      name: Características del calentador de toallitas
      description: Detalla las características específicas de un calentador de toallitas,
        como la facilidad para viajar o la retención de humedad.
    wire/rope_material:
      name: Material del alambre/cuerda
      description: Especifica el material utilizado en productos de alambre o cuerda,
        como el cobre o poliéster.
    wire_thickness:
      name: Espesor del hilo
      description: Especifica el grosor de los cables, como grueso o fino.
    wireless_charging_standard:
      name: Estándar de carga inalámbrica
      description: Identifica los protocolos de carga inductiva compatibles con el
        teléfono.
    wireless_multi_room_platform:
      name: Plataforma multihabitación inalámbrica
      description: Define el ecosistema propietario o de terceros utilizado para la
        transmisión de audio multihabitación.
    wireless_streaming_protocols_supported:
      name: Protocolos de transmisión inalámbrica admitidos
      description: Identifica los estándares o servicios de transmisión inalámbrica
        que el estéreo puede recibir de forma nativa.
    wood_finish:
      name: Acabado de madera
      description: Describe el tratamiento de acabado o el método de construcción
        aplicado a los productos de madera (por ejemplo, madera maciza, chapada, de
        ingeniería, aceitada, lacada, pintada).
    woodwind_care_items_included:
      name: Artículos para el cuidado de instrumentos de viento incluidos
      description: Identifica los artículos de cuidado que se incluyen con un instrumento
        de viento de madera, como un cepillo de limpieza o grasa para corchos.
    work_capacity:
      name: Capacidad de trabajo
      description: Describe el nivel de rendimiento de un producto, como de intensidad
        alta o intensidad baja
    wreath_design:
      name: Diseño de corona
      description: Identifica el material principal o la forma de una corona, como
        el metal o con forma de aro.
    wrist_rest_features:
      name: Características del reposamuñecas
      description: Enumera las características funcionales o de diseño especiales
        que añaden valor.
    wrist_rest_type:
      name: Tipo de reposamuñecas
      description: Identifica el emparejamiento de dispositivo previsto o configuración
        del conjunto del reposamuñecas (p. ej., solo teclado, solo ratón, conjuntos
        combinados).
    xlr_pin_count:
      name: Cantidad de pines XLR
      description: Indica la configuración específica de pines (número de pines) de
        los conectores XLR.
    yacht_type:
      name: Tipo de yate
      description: Clasifica el tipo de yate, como de motor o explorador.
    yarn_weight_category:
      name: Categoría de peso de la lana
      description: Identifica el grosor del hilo, como súper voluminoso o artesanal.
    zipper_pull_style:
      name: Estilo de tirador de cremallera
      description: Describe el diseño o acabado del tirador de una cremallera, como
        texturizado o en relieve.
    zoom_type:
      name: Tipo de zoom
      description: Especifica el tipo de función de zoom de cámaras de documentos,
        como digital u óptica.
    air_fryer_accessory_type:
      name: Tipo de accesorio para freidora de aire
      description: Identifica el tipo específico de accesorio que se vende.
    air_purifier_filter_technology:
      name: Tecnología de filtro para purificador de aire
      description: Identifica el método de filtración o purificación principal empleado
        por el dispositivo.
    air_purifier_filtration_rating:
      name: Clasificación de filtración del purificador de aire
      description: Indica la clase de eficiencia certificada del medio filtrante.
    animal_care_set_components_included:
      name: Componentes del set de cuidado de animales incluidos
      description: Enumera los accesorios y complementos individuales para el aseo
        y la limpieza que se incluyen en el set, para que los compradores sepan exactamente
        lo que están adquiriendo.
    apron_features:
      name: Características del delantal
      description: Destaca las características funcionales especiales del delantal.
    apron_style:
      name: Estilo de delantal
      description: Define el corte o la confección general del delantal.
    aquatic_plant_growth_habit:
      name: Hábito de crecimiento de las plantas acuáticas
      description: Clasifica las plantas acuáticas según su posición típica y estilo
        de crecimiento dentro de la columna de agua.
    arbor_top_design:
      name: Diseño de la parte superior del cenador
      description: Especifica la forma o el estilo de la sección superior del cenador,
        lo que ayuda al cliente a adaptarlo a sus preferencias arquitectónicas.
    ashtray_type:
      name: Tipo de cenicero
      description: Clasifica el cenicero por su uso o contexto principal.
    attractant_type:
      name: Tipo de atrayente
      description: Especifica el mecanismo de cebo integrado en el pegamento, si lo
        hay, ayudando al cliente a elegir la trampa más efectiva para su situación.
    awning_operation_type:
      name: Tipo de funcionamiento del toldo
      description: Describe el mecanismo utilizado para extender y retraer el toldo.
    bag_clip_style:
      name: Estilo de clip para bolsa
      description: Describe el estilo mecánico del mecanismo de cierre del clip.
    bag_configuration:
      name: Configuración de la bolsa
      description: Describe el número y el estilo de las bolsas incluidas en el sistema
        de recogida de hierba.
    bag_insulation:
      name: Aislamiento de bolsas
      description: Indica si la bolsa para transportar vino está aislada térmicamente
        para ayudar a mantener la temperatura de la botella.
    baking_liner_size:
      name: Tamaño del papel para hornear
      description: Convención de clasificación por tamaños utilizada por los panaderos
        para describir la capacidad de los moldes en relación con los tamaños estándar
        de las magdalenas.
    baking_sheet_style:
      name: Estilo de bandeja para hornear
      description: Identifica el estilo de construcción de la bandeja, como, por ejemplo,
        con borde o perforada.
    ballast_material:
      name: Material de lastre
      description: Enumera los materiales que pueden utilizarse para lastrar (rellenar)
        el tambor del rodillo, ayudando al comprador a elegir modelos compatibles
        con sus medios de relleno preferidos.
    base_features:
      name: Características de la base
      description: Destaca las características de estabilidad o agarre de la base,
        ayudando a los usuarios que necesitan funcionalidad antideslizante o de succión
        en superficies de trabajo.
    baster_tip_type:
      name: Tipo de punta de pipeta para salsas
      description: Clasifica el estilo de la punta o accesorio de la pipeta para salsas,
        lo que permite al comprador filtrar entre pipetas de bulbo estándar, agujas
        inyectoras y puntas de cepillo.
    bathroom_accessories_included:
      name: Accesorios para el baño incluidos
      description: Enumera los artículos específicos que vienen en el juego de accesorios
        para el baño para que el comprador sepa exactamente qué piezas están incluidas.
    bathroom_accessory_compatibility:
      name: Compatibilidad de los accesorios para el baño
      description: Indica para qué accesorio o elemento fijo del cuarto de baño está
        diseñado el soporte.
    battery_backup_support:
      name: Compatibilidad con batería de respaldo
      description: Indica si se incluye una batería de respaldo de emergencia, si
        es opcional o si no es compatible.
    bedskirt_corner_style:
      name: Estilo de esquina del faldón de cama
      description: Especifica cómo se terminan las esquinas del faldón de cama, lo
        que afecta el ajuste en camas con pies de cama o postes.
    bedskirt_style:
      name: Estilo de faldón de cama
      description: Define la confección y el diseño visual del faldón de cama, ayudando
        al comprador a elegir entre estilos como fruncido o ajustado.
    beer_glass_type:
      name: Tipo de vaso de cerveza
      description: Identifica el estilo o la forma específicos del vaso de cerveza,
        lo que ayuda a los compradores a encontrar el recipiente ideal para su cerveza
        preferida (por ejemplo, pinta, pilsner o weizen).
    belt_profile:
      name: Perfil de la correa
      description: Identifica la sección transversal o el estilo de la correa para
        garantizar un ajuste adecuado con el diseño de la polea.
    beverage_tub_features:
      name: Características del recipiente para bebidas
      description: Resalta las características de diseño más destacadas o los componentes
        incluidos que aportan funcionalidad o comodidad al recipiente para bebidas.
    blade_construction_method:
      name: Método de construcción de la cuchilla
      description: Especifica cómo se fabricó la cuchilla.
    blade_finish:
      name: Acabado de la cuchilla
      description: Tratamiento superficial o acabado estético aplicado a la cuchilla.
    blade_shape:
      name: Forma de la cuchilla
      description: Describe la forma geométrica o el perfil de la pala.
    blade_sidedness:
      name: Lados de la cuchilla
      description: Indica si la cuchilla del cortasetos tiene dientes de corte en
        un solo lado o en ambos lados.
    bleach_formulation:
      name: Formulación del blanqueador
      description: Indica la base química del blanqueador (por ejemplo, a base de
        cloro o de oxígeno).
    bleach_type:
      name: Tipo de blanqueador
      description: Especifica la presencia y el tipo de agente blanqueador o quitamanchas
        utilizado en el quitamanchas.
    blender_jar_material:
      name: Material de la jarra de la licuadora
      description: Especifica el material utilizado para el recipiente o jarra principal
        de mezcla.
    blooming_season:
      name: Temporada de floración
      description: Indica las temporadas en las que la planta suele florecer.
    booster_pump_requirement:
      name: Requisito de bomba de refuerzo
      description: Aclara si se necesita una bomba de refuerzo independiente para
        que el barrido funcione.
    bore_type:
      name: Tipo de orificio
      description: Define el estilo de orificio o interfaz utilizado para montar la
        polea en el eje.
    bottle_cap_gasket_material:
      name: Material de la junta de la tapa de botella
      description: Identifica el material de la junta de sellado que entra en contacto
        con el borde de la botella.
    bottle_cap_liner_type:
      name: Tipo de revestimiento de la tapa de botella
      description: Especifica el tipo o material del revestimiento de sellado dentro
        de la tapa de la botella, lo que afecta a la estanqueidad y la compatibilidad
        del producto.
    bottle_fill_state:
      name: Estado de llenado de la botella
      description: Indica si la botella se vende vacía o llena con agua potable.
    bottle_stopper_mechanism:
      name: Mecanismo de tapón para botella
      description: Define el mecanismo o estilo de sellado utilizado por el tapón
        o el protector.
    bowl_type:
      name: Tipo de tazón
      description: Clasifica el uso o estilo principal previsto del recipiente.
    bread_storage_ventilation:
      name: Ventilación para el almacenamiento del pan
      description: Describe si el envase permite el flujo de aire para mantener el
        pan fresco y de qué manera lo hace.
    brew_strength_options:
      name: Opciones de intensidad de preparación
      description: Enumera los niveles de intensidad seleccionables que ajustan el
        tiempo de extracción o el flujo para producir un café más suave o más intenso.
    bridge_railing_style:
      name: Estilo de barandilla de puente
      description: Especifica la presencia y el estilo de las barandillas del puente,
        lo que influye en la seguridad y su apariencia.
    briquette_ignition_type:
      name: Tipo de encendido con briquetas
      description: Indica si las briquetas cuentan con ayudas para la ignición o son
        de tipo estándar, lo que ayuda al usuario entender lo fácil que es encenderlas.
    bristle_stiffness:
      name: Rigidez de las cerdas
      description: Indica la firmeza de las cerdas del cepillo, lo que afecta la capacidad
        de fregar y la idoneidad para diferentes acabados de inodoros.
    bristle_tip_type:
      name: Tipo de punta de la cerda
      description: También indica si las puntas de las cerdas están abiertas (abanderadas)
        para una recolección más fina del polvo o si permanecen cerradas para residuos
        más grandes.
    bucket_features:
      name: Características del cubo
      description: Resalta las características especiales o mejoras funcionales de
        un cubo, para que los compradores puedan encontrar rápidamente productos con
        las comodidades que necesitan.
    bulb_finish:
      name: Acabado de la bombilla
      description: Describe el revestimiento externo o acabado del cristal de la bombilla,
        que afecta a la difusión de la luz y al estilo.
    burner_shape:
      name: Forma del quemador
      description: Describe el diseño geométrico del quemador de la parrilla, que
        determina el ajuste y la distribución del calor dentro de la parrilla.
    burr_shape:
      name: Forma de la fresa
      description: Especifica la geometría de la fresa para los molinillos de fresa,
        lo que influye en la consistencia del molido y la generación de calor.
    butterfly_feeder_food_type:
      name: Tipo de alimento para comederos de mariposas
      description: Identifica el tipo de alimento o atrayente para el que está diseñado
        el comedero.
    cabinet_light_fixture_style:
      name: Estilo del aplique de armario
      description: Describe el estilo físico o el factor de forma de la luz del armario.
    candle_container_material:
      name: Material para contenedor de velas
      description: Identifica el material del recipiente o contendor de la vela (para
        velas en tarro o lata).
    canner_type:
      name: Tipo de envasadora
      description: Especifica el método o estilo de enlatado para el que está diseñada
        la envasadora.
    canopy_shape:
      name: Forma del toldo
      description: Especifica la forma geométrica del toildo abierto.
    canopy_venting:
      name: Ventilación del toldo
      description: Indica la configuración de ventilación del toldo que afecta la
        resistencia al viento y la disipación del calor.
    car_cleaning_kit_items_included:
      name: Artículos incluidos en el kit de limpieza para automóvil
      description: Enumera las herramientas y accesorios específicos incluidos en
        el kit, para que los compradores sepan exactamente qué están recibiendo y
        puedan comparar los paquetes.
    carbonation_level_adjustment:
      name: Ajuste del nivel de carbonatación
      description: Indica si la máquina de bebidas carbonatadas ofrece un nivel de
        carbonatación fijo o ajustable.
    catalytic_combustor_type:
      name: Tipo de cámara de combustión catalítica
      description: Indica si la estufa utiliza un sistema de combustión catalítico,
        no catalítico o híbrido, lo que afecta la eficiencia y las emisiones.
    ceiling_light_fixture_style:
      name: Estilo de aplique de techo
      description: Define el estilo o la configuración estructural principal de la
        lámpara de techo.
    center_hole_shape:
      name: Forma del orificio central
      description: Describe la forma geométrica del orificio de montaje/centro de
        la cuchilla, que determina la compatibilidad con los ejes específicos de la
        cortadora de césped.
    chainsaw_bar_mount_type:
      name: Tipo de montaje de barra para motosierra
      description: Especifica el patrón de montaje o el tipo de ranura de la barra
        de la motosierra para garantizar que se ajuste al cabezal de la sierra.
    chainsaw_bar_nose_type:
      name: Tipo de punta de la barra de la motosierra
      description: Identifica el estilo de la punta de la barra, lo que afecta el
        rendimiento de corte y el mantenimiento.
    chainsaw_bar_type:
      name: Tipo de barra de la motosierra
      description: Clasifica la construcción o la finalidad de la barra.
    chainsaw_cutter_type:
      name: Tipo de cortador de motosierra
      description: Identifica el perfil/diseño del cortador de la cadena, lo que afecta
        la velocidad de corte, la durabilidad y las características de contragolpe.
    champagne_glass_type:
      name: Tipo de corte de la motosierra
      description: Especifica el diseño particular de una copa de champán, lo que
        permite a los compradores diferenciar entre formas optimizadas para distintas
        experiencias de consumo.
    chandelier_shape:
      name: Cormas de lámparas de araña
      description: Define la forma estructural general de la lámpara de araña.
    charcoal_chimney_features:
      name: Características de la chimenea de carbón
      description: Enumera las características funcionales más destacadas de la chimenea
        de carbón.
    charcoal_ignition_type:
      name: Tipo de encendido con carbón
      description: Indica si el carbón ha sido tratado o diseñado para un encendido
        más fácil o una combustión más limpia.
    chopstick_style:
      name: Estilo de palillos
      description: Especifica el estilo regional o cultural de los palillos, que puede
        afectar su longitud, forma y decoración.
    chopstick_trainer_design:
      name: Diseño del entrenador de palillos
      description: Describe el diseño mecánico o el método de ayuda que utiliza el
        entrenador.
    cigar_cutter_type:
      name: Tipo de cortador de puros
      description: Especifica el mecanismo o estilo de corte utilizado para retirar
        la tapa del cigarro.
    cigar_punch_type:
      name: Tipo de punzón para cigarro
      description: Identifica el mecanismo o estilo del punzón para cigarro.
    clay_pot_material:
      name: Material de olla de barro
      description: Identifica la composición de la arcilla o el estilo utilizado en
        la olla, como gres o loza.
    cleaner_concentration:
      name: Concentración del producto de limpieza
      description: Indica si el producto de limpieza se vende listo para usar o como
        un concentrado que debe diluirse antes de su uso.
    cleaning_cloth_features:
      name: Características del paño de limpieza
      description: Destaca las características especiales de rendimiento de los paños
        de limpieza.
    cleaning_solution_concentration:
      name: Concentración de la solución de limpieza
      description: Indica si el producto se vende listo para usar, concentrado o en
        otros formatos de dilución.
    clock_chime_melody:
      name: Melodía del timbre del reloj
      description: Especifica la melodía o el patrón de sonido que el reloj reproduce
        a la hora o cada cuarto de hora.
    clock_display_type:
      name: Tipo de pantalla del reloj
      description: Especifica cómo se presenta la hora, lo que resulta útil para clientes
        que prefieren el formato digital, analógico, números giratorios, etc.
    clock_hand_mounting_type:
      name: Tipo de montaje de las manecillas del reloj
      description: Define el estilo de interfaz utilizado para fijar las manecillas
        al mecanismo del reloj.
    clock_hand_style:
      name: Estilo de manecilla de reloj
      description: Especifica el diseño visual de las manecillas, lo que permite a
        los compradores encontrar manecillas que combinen con la estética de su reloj.
    clock_movement_type:
      name: Tipo de movimiento del reloj
      description: Identifica el mecanismo interno de cronometraje del reloj.
    clothespin_type:
      name: Tipo pinza para la ropa
      description: Identifica el diseño/estilo estructural de la pinza de la ropa.
    co2_cylinder_compatibility:
      name: Compatibilidad de cilindros de CO2
      description: Define el tipo o tamaño de cilindro de CO2 que acepta la máquina
        de bebidas carbonatadas, garantizando que el comprador pueda encontrar cartuchos
        de recarga compatibles.
    co2_supplementation_requirement:
      name: Requisitos de suplementación de CO2
      description: Indica el nivel de suplementación de dióxido de carbono necesario
        para una salud óptima de las plantas en los acuarios.
    coaster_features:
      name: Características del posavasos
      description: Identifica características únicas de los posavasos, como la base
        absorbente o antideslizante.
    cocktail_strainer_type:
      name: Tipo colador para cócteles
      description: Especifica el diseño del colador de cócteles, lo que afecta a la
        compatibilidad con las cocteleras y al estilo de uso.
    code_technology:
      name: Tecnología de código
      description: Identifica el código o la tecnología de seguridad que utiliza el
        mando a distancia para comunicarse con el abridor de la puerta del garaje.
    coffee_decanter_warmer_features:
      name: Características del calentador para jarra de café
      description: Resalta las características funcionales o de seguridad más destacadas
        específicas de los calentadores para jarras de café.
    coffee_filter_basket_size:
      name: Tamaño del filtro de café
      description: Especifica la designación de tamaño estandarizada que admite la
        cesta, lo que garantiza la compatibilidad con filtros y máquinas.
    coffee_filter_shape:
      name: Forma del filtro de café
      description: Especifica la forma geométrica del filtro de café para garantizar
        la compatibilidad con diferentes cafeteras.
    coffee_filter_type:
      name: Tipo de filtro de café
      description: Especifica el tipo de filtro que admite o incluye una cafetera
        de goteo, lo que puede afectar al sabor y a los costes continuos de los consumibles.
    coffee_grinder_accessory_type:
      name: Tipo de accesorio para molinillo de café
      description: Clasifica el tipo específico de accesorio para facilitar el filtrado
        y la búsqueda.
    colander_style:
