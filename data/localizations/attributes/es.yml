    bed_pan_features:
      name: Características del orinal
      description: Destaca elementos de diseño especiales adicionales o mejoras funcionales.
    bed_pan_handle_style:
      name: Estilo del mango del orinal
      description: Describe el estilo de mango o agarre proporcionado para posicionamiento
        y remoción.
    bed_pan_type:
      name: Tipo de pato coprológico
      description: Especifica el diseño de los orinales, por ejemplo, estándar o bariátrico.
    bedding_pieces_included:
      name: Piezas de cama de mesa incluidas
      description: Especifica los componentes que incluye un juego de cama, por ejemplo,
        funda de almohada o sábana superior.
    bedding_size:
      name: Tamaño de la ropa de cama
      description: Define la categoría de tamaño de artículos de ropa de cama, como,
        por ejemplo, estándar o king.
    beer_style:
      name: Estilo de cerveza
      description: Ayuda a clasificar las cervezas por sus características distintivas,
        como, por ejemplo, amargas y turbias.
    beer_variety:
      name: Variedad de cerveza
      description: Clasifica las cervezas según su tipo o estilo específico, por ejemplo,
        stout o pilsner.
    bell_design:
      name: Diseño de timbre
      description: Describe el estilo de los timbres de mostrador, como, por ejemplo,
        pulsador o campanilla.
    bell_size:
      name: Tamaño de la campana
      description: Indica el tamaño de la campana de un instrumento musical, como
        grande (L) o mediana (M)
    bell_sound:
      name: Sonido del timbre
      description: Describe el tipo de sonido que hace una campana, como un sonido
