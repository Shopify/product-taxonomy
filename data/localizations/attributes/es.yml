    bathtub_skirt_shape:
      name: Forma de la falda de la bañera
      description: Describe la forma del faldón de la bañera, como recta o curva.
    baton_grip_design:
      name: Diseño de empuñadura de bastón
      description: Describe el tipo de agarre de la batuta de director, como de corcho
