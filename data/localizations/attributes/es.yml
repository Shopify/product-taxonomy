      description: Clasifica la resistencia o el grado del papel aluminio según su
        uso previsto.
    foliage_color:
      name: Color del follaje
      description: Especifica el color dominante de las hojas de la planta, lo que
        permite una selección ornamental más allá del color de las flores.
    fondue_pot_type:
      name: Tipo de olla para fondue
      description: Clasifica el estilo de calentamiento o el uso previsto del juego
        de fondue.
    fondue_set_pieces_included:
      name: Piezas incluidas en el juego de fondue
      description: Identifica los componentes incluidos en un juego de fondue, como,
        por ejemplo, una olla para fondue o tenedores.
    food_carrier_insulation_type:
      name: Tipo de aislamiento del transportador de alimentos
      description: Identifica si el producto está aislado y la tecnología de aislamiento
        utilizada.
    food_dehydrator_surface_type:
      name: Tipo de superficie del deshidratador de alimentos
      description: Describe el estilo de la superficie de las bandejas/planos, que
        afecta al flujo de aire y a la facilidad para despegar los alimentos.
    food_dehydrator_tray_type:
      name: Tipo de bandeja para deshidratador de alimentos
      description: Identifica el estilo específico o diseño funcional de la bandeja.
    food_grater_type:
      name: Tipo de rallador de alimentos
      description: Identifica el estilo estructural del rallador.
    food_processor_attachments_included:
      name: Accesorios de procesador de alimentos incluidos
      description: Enumera los tipos de accesorios específicos incluidos en el juego
        para que los clientes sepan exactamente qué funciones obtienen con su compra.
    food_storage_bag_features:
      name: Características de la bolsa para almacenar alimentos
      description: Destaca las características funcionales notables de la bolsa.
    food_storage_bag_type:
      name: Tipo de bolsa para almacenar alimentos
      description: Especifica el estilo principal o la clasificación de uso previsto
        de la bolsa para almacenar alimentos.
    food_storage_features:
      name: Características del almacenamiento de comida
      description: Destaca las características especiales que aportan funcionalidad
        o practicidad al producto de almacenamiento de alimentos.
    food_wrap_features:
      name: Características del envoltorio de comida
      description: Destaca las características especiales relacionadas con el uso
        y la sostenibilidad.
    footwear_type_compatibility:
      name: Compatibilidad de tipos de calzado
      description: Identifica el tipo de calzado para el que está diseñado el moldeador.
    formulation_concentration:
      name: Concentración de la formulación
      description: Identifica si el producto es un concentrado o una formulación lista
        para usar.
    fountain_design:
      name: Diseño de fuente
      description: Clasifica el estilo estructural o factor de forma de la fuente.
    fragrance_oil_application:
      name: Aplicación del aceite de fragancia
      description: Especifica el uso recomendado o habitual del aceite, ayudando a
        los clientes aficionados al bricolaje y las manualidades a seleccionar la
        fórmula adecuada.
    fragrance_oil_composition:
      name: Composición del aceite de fragancia
      description: Indica si la fórmula es aceite esencial natural puro, aceite de
        fragancia sintética o una mezcla de ambos.
    fragrance_refill_type:
      name: Tipo de recambio de fragancia
      description: Define el formato de recarga de fragancia que acepta el difusor.
    freezer_configuration:
      name: Configuración del congelador
      description: Identifica la orientación física/estilo de diseño de la unidad
        del congelador.
    freezing_method:
      name: Método de congelación
      description: Especifica la tecnología utilizada para congelar la mezcla en una
        heladera, ayudando a los compradores a distinguir entre modelos con compresor,
        unidades con recipiente precongelado, tipos manuales de manivela con sal y
        hielo, y otros diseños.
    fuel_compatibility:
      name: Compatibilidad de combustible
      description: Especifica los tipos de combustible para los que la parrilla ha
        sido diseñada.
    funnel_type:
      name: Tipo de embudo
      description: Clasifica el embudo según su diseño o uso previsto.
    furnace_configuration:
      name: Configuración del horno
      description: Especifica la orientación física del flujo de aire de la unidad
        del horno para su instalación.
    furniture_anchor_type:
      name: Tipo de anclaje para muebles
      description: Especifica el estilo estructural de un kit de anclaje para muebles,
        indicando su mecanismo de acción.
    garage_floor_mat_style:
      name: Estilo de alfombrilla para suelo de garaje
      description: Identifica el formato o estilo del producto de la alfombrilla para
        el suelo del garaje.
    garbage_disposal_feed_type:
      name: Tipo de carga del triturador de desechos
      description: 'Indica cómo se introducen los desperdicios de alimentos en el
        triturador: de forma continua mientras está en funcionamiento o en lotes separados.'
    garbage_disposal_stopper_style:
      name: Estilo de tapón para el triturador de desechos
      description: Indica el estilo funcional del tapón.
    garden_hose_design:
      name: Diseño de manguera de jardín
      description: Identifica el estilo estructural de la manguera, lo que determina
        el uso previsto y las características de manejo.
    garden_hose_fitting_type:
      name: Tipo de conexión para manguera de jardín
      description: Identifica el estilo o la función de un accesorio para manguera
        de jardín, como un adaptador o un divisor en Y, para facilitar la exploración
        y el filtrado.
    gardening_fork_type:
      name: Tipo de horquilla de jardinería
      description: Clasifica el estilo específico o el uso previsto del tenedor.
    garland_style:
      name: Estilo de guirnalda
      description: Clasifica el estilo estructural o decorativo de la guirnalda.
    gas_type:
      name: Tipo de gas
      description: Identifica el tipo de gas comprimido contenido en el cilindro del
        cargador.
    gasket_profile_type:
      name: Tipo de perfil de junta
      description: Especifica el perfil estándar del sector o el estilo de sección
        transversal de la junta.
    gazebo_roof_material:
      name: Material del techo del cenador
      description: Especifica el material de los paneles del techo del cenador o de
        la cubierta rígida.
    glass_and_surface_cleaner_features:
      name: Características del limpiador de cristales y superficies
      description: Destaca las características o beneficios especiales del limpiador
        de cristales y superficies.
    glass_cleaner_features:
      name: Características del limpiador de cristales
      description: Destaca las características especiales de rendimiento o formulación
        específicas de los limpiadores de cristales.
    glazing_material:
      name: Material de acristalamiento
      description: Identifica el material que cubre el área de la fotografía (por
        ejemplo, vidrio, acrílico o nada).
    globe_map_content:
      name: Contenido del mapa del globo
      description: Describe el contenido cartográfico principal que se muestra en
        el globo.
    glue_trap_design:
      name: Diseño de trampa adhesiva
      description: Identifica el estilo físico o formato de la trampa, lo que ayuda
        a determinar su compatibilidad con el lugar de colocación y el tipo de plaga.
    grab_bar_shape:
      name: Forma de la barra de apoyo
      description: Define el diseño estructural de la barra de apoyo, lo que afecta
        a la ubicación de la instalación y al estilo de apoyo del usuario.
    grass_discharge_type:
      name: Tipo de expulsión del césped
      description: Indica el modo en que el cortacésped expulsa el césped cortado
        (salida lateral, bolsa trasera, etc.).
    grate_design:
      name: Diseño de rejilla
      description: Identifica el estilo estructural de la rejilla.
    grater_design:
      name: Diseño del rallador
      description: Clasifica el diseño físico o el mecanismo de un rallador de uso
        general o para cítricos.
    grating_surface_coarseness:
      name: Grosor de la superficie de rallado
      description: Indica el tamaño/textura de los orificios de corte o estrías de
        la superficie de la rejilla.
    grill_grate_material:
      name: Material de la rejilla de la parrilla
      description: Especifica el material o revestimiento de la parrilla principal
        de cocción.
    grill_thermometer_type:
      name: Tipo de termómetro para parrilla
      description: Indica el diseño o la tecnología principal del termómetro para
        parrilla, lo que ayuda a los compradores a encontrar rápidamente el estilo
        que mejor se adapta a su parrilla.
    grinding_mechanism_material:
      name: Material del mecanismo de molienda
      description: Especifica el material del mecanismo de molienda interno/fresas
        que realmente trituran las especias.
    grinding_mechanism_type:
      name: Tipo de mecanismo de molienda
      description: Especifica el mecanismo interno responsable del molido o fresado.
    growing_media_buffering:
      name: Amortiguamiento del sustrato
      description: Indica si la fibra de coco ha sido procesada para reducir las sales,
        lo que influye en la nutrición de las plantas.
    growing_media_form:
      name: Formato del sustrato
      description: Especifica la presentación física de la fibra de coco, lo que ayuda
        a los productores a comprender las necesidades de manejo e hidratación.
    growing_medium_type:
      name: Tipo de medio de cultivo
      description: Identifica el sustrato suministrado para la germinación y el crecimiento
        de las semillas.
    growth_habit:
      name: Hábitat de crecimiento
      description: Describe la forma general de la planta, lo que ayuda a los clientes
        a tomar decisiones relacionadas con el espacio y el tipo de contenedor.
    hand_dryer_accessory_type:
      name: Tipo de accesorio para secador de manos
      description: Identifica el tipo específico de accesorio para secador de manos
        para que los compradores puedan comprender rápidamente qué es el producto.
    handle_connection_type:
      name: Tipo de conexión de asa
      description: Especifica el mecanismo utilizado para fijar el mango a la escoba,
        la fregona u otros cabezales de limpieza para garantizar la compatibilidad.
    handle_grip_style:
      name: Estilo de agarre
      description: Define la forma o la ergonomía del agarre de la horquilla.
    handle_length_adjustability:
      name: Ajustabilidad de la longitud del mango
      description: Describe si se puede ajustar la longitud del mango y cómo hacerlo,
        lo que permite a los compradores filtrar entre opciones fijas y telescópicas.
    handle_position:
      name: Posición del asa
      description: Describe la ubicación o el estilo del asa de la regadera, lo que
        influye en la ergonomía al verter y en su almacenamiento.
    handrail_configuration:
      name: Configuración del pasamanos
      description: Indica si el producto incluye pasamanos y su disposición.
    hanging_attachment_type:
      name: Tipo de fijación para colgar
      description: Indica los accesorios o el sistema incluido para colgar el cairel.
    hardiness_zone:
      name: Zona de rusticidad
      description: Especifica la zona climática del USDA (o equivalente) en la que
        la planta puede sobrevivir al aire libre.
    hazards_detected:
      name: Peligros detectados
      description: Enumera los peligros específicos que esta unidad puede detectar.
    heating_stages:
      name: Etapas de calentamiento
      description: Especifica el número de etapas de calentamiento o el nivel de modulación
        que admite la unidad.
    home_alarm_features:
      name: Funciones de alarma doméstica
      description: Identifica funciones especiales de un sistema de alarma doméstico,
        como batería de respaldo o vigilancia profesional.
    hook_style:
      name: Estilo de gancho
      description: Clasifica el diseño y las funciones del gancho para facilitar la
        correspondencia visual y funcional.
    humidifier_features:
      name: Características del humidificador
      description: Señala funciones adicionales destacadas diferencian los modelos
        de humidificador y facilitan su filtrado.
    humidifier_filter_type:
      name: Tipo de filtro del humidificador
      description: Identifica el estilo o la estructura del filtro para que los clientes
        puedan encontrar el recambio adecuado para su humidificador.
    humidor_accessory_type:
      name: Tipo de accesorio para humidor
      description: Clasifica el tipo específico de accesorio, lo que permite al comprador
        filtrar rápidamente dentro de la categoría general.
    hydroponic_nutrient_system:
      name: Sistema de nutrientes hidropónicos
      description: Indica el número de partes del sistema de nutrientes hidropónicos
        (por ejemplo, una parte, dos partes) que deben combinarse antes de su uso.
    hygrometer_type:
      name: Tipo de higrómetro
      description: Identifica el tipo de higrómetro incluido con el humidor, si lo
        hay.
    ice_bucket_accessories_included:
      name: Accesorios para cubiteras incluidos
      description: Enumera los artículos de bar adicionales que se suministran con
        la cubitera.
    ice_bucket_insulation:
      name: Aislamiento de la cubitera
      description: Indica la estructura de la pared o el nivel de aislamiento de la
        cubitera, lo que afecta al tiempo que el hielo permanece congelado.
    ice_cream_maker_accessories_included:
      name: Accesorios para heladera incluidos
      description: Identifica los artículos adicionales incluidos en un juego de accesorios
        de varias piezas para que los clientes sepan exactamente lo que recibirán.
    ice_shape:
      name: Forma del hielo
      description: Describe el tipo de hielo que produce la máquina, lo que ayuda
        a los usuarios a seleccionar las máquinas que crean su estilo de hielo preferido.
    incense_holder_style:
      name: Estilo de porta incienso
      description: Identifica el diseño estructural del soporte, lo que ayuda al comprador
        a elegir entre diferentes formatos funcionales y estéticos.
    infuser_type:
      name: Tipo de infusor
      description: Indica si se incluye un infusor de frutas o té y su estilo.
    inner_pot_coating:
      name: Recubrimiento interior de la olla
      description: Identifica el tipo de superficie del interior, indicando si es
        antiadherente y la facilidad de limpieza.
    insulation_capability:
      name: Capacidad de aislamiento
      description: Indica si la funda aísla las bebidas y de qué manera, distinguiendo
        entre fundas puramente decorativas y fundas que controlan la temperatura.
    insulation_status:
      name: Estado del aislamiento
      description: Indica si la cantimplora está aislada para ayudar a mantener la
        temperatura de la bebida.
    insulation_technology:
      name: Tecnología de aislamiento
      description: Identifica la estructura de aislamiento utilizada para mantener
        la temperatura.
    insulation_type:
      name: Tipo de aislamiento
      description: Especifica si la cubitera o el enfriador están aislados y de qué
        manera, lo que afecta al rendimiento de conservación del hielo y al control
        de la condensación.
    intended_beverage_type:
      name: Tipo de bebida prevista
      description: Indica la bebida principal para la que está diseñado el decantador
        o con la que se utiliza más habitualmente.
    internal_membrane_type:
      name: Tipo de membrana interna
      description: Identifica el diseño de separación interna que mantiene el agua
        y el aire separados dentro del depósito.
    iron_cleaner_purpose:
      name: Función del limpiador para plancha
      description: Especifica la aplicación principal prevista del limpiador.
    ironing_board_form_factor:
      name: Factor de forma de la tabla de planchar
      description: Clasifica el estilo general y la instalación de la tabla para ayudar
        a los compradores a encontrar el tipo adecuado.
    ironing_board_pad_shape:
      name: Forma de funda para la tabla de planchar
      description: Indica la forma o perfil general de la funda para tabla de planchar
        para garantizar que se adapta a distintos diseños de tabla.
    jar_shape:
      name: Forma del jarrón
      description: Describe la forma geométrica o tradicional general del jarrón decorativo.
    juicer_type:
      name: Tipo de exprimidor
      description: Clasifica el mecanismo que utiliza el exprimidor para extraer jugo.
    key_blade_type:
      name: Tipo de hoja de llave
      description: Clasifica el estilo físico de la hoja de la llave, como plana/con
        muesca, tubular o con hoyuelos.
    kitchen_layout:
      name: Distribución de la cocina
      description: Define la disposición general de la cocina prefabricada (por ejemplo,
        de una sola pared o en forma de L) para ayudar a los compradores a encontrar
        conjuntos que se adapten a la forma de su habitación y a sus preferencias
        de flujo de trabajo.
    kitchen_linen_items_included:
      name: Ropa de cocina incluida
      description: Enumera los componentes específicos de la ropa de cocina incluidos
        en el juego, lo que ayuda a los compradores a saber exactamente qué artículos
        están adquiriendo.
    label_content_type:
      name: Tipo de contenido de la etiqueta
      description: Describe si la superficie de la etiqueta está en blanco, impresa
        con plantillas o formateada de otra manera.
    lamp_arm_style:
      name: Estilo de brazo de lámpara
      description: Describe el diseño del brazo/cuello de la lámpara, que afecta a
        la capacidad de ajuste y la colocación (por ejemplo, cuello de cisne frente
        a brazo oscilante).
    lamp_post_base_mounting_type:
      name: Tipo de montaje en base de poste de luz
      description: Especifica cómo se instala o fija la base al suelo o a la superficie.
    lamp_shade_fitter_type:
      name: Tipo de soporte para pantalla de lámpara
      description: Define el mecanismo de fijación entre la pantalla y la lámpara,
        garantizando la compatibilidad sin dejar lugar a dudas.
    lamp_shade_shape:
      name: Forma de la pantalla de la lámpara
      description: Especifica la forma geométrica de la cortina, para que los clientes
        puedan encontrar rápidamente las siluetas que buscan.
    lamp_shade_translucency:
      name: Translucidez de la pantalla de la lámpara
      description: Describe la cantidad de luz que atraviesa la cortina, para que
        los usuarios puedan elegir el ambiente deseado.
    lampshade_shape:
      name: Forma de la pantalla de lámpara
      description: Describe la forma geométrica o el diseño de la pantalla de la lámpara.
    laundry_ball_texture:
      name: Textura de bola de lavandería
      description: Describe el tipo de superficie de la bola, que influye en la agitación
        de la tela y la eliminación de pelusas.
    laundry_wash_accessory_type:
      name: Tipo de accesorio para el lavado de ropa
      description: Identifica el tipo específico de bolsa o protector de lavado.
    lawn_aerator_type:
      name: Tipo de aireador de césped
      description: Clasifica los aireadores de césped según su diseño operativo básico
        o factor de forma.
    lawn_mower_belt_type:
      name: Tipo de correa para cortadora de césped
      description: Clasifica el diseño estructural o perfil de la correa.
    lawn_mower_blade_type:
      name: Tipo de cuchilla de cortacésped
      description: Especifica el diseño de corte o elevación de la cuchilla del cortacésped
        y su uso previsto.
    lawn_spreader_type:
      name: Tipo de esparcidor de césped
      description: Indica el tipo o diseño del esparcidor de césped, por ejemplo,
        de difusión o de caída.
    lawn_tractor_tread_type:
      name: Tipo de banda de rodadura del tractor cortacésped
      description: Describe el dibujo de la banda de rodadura diseñado para superficies
        o necesidades de tracción específicas.
    lid_features:
      name: Características de la tapa
      description: Destaca cualquier elemento funcional especial de la tapa que facilite
        la cocción o la limpieza.
    lid_vent_type:
      name: Tipo de ventilación de la tapa
      description: Indica si la tapa permite la salida de vapor y de qué manera lo
        hace.
    lift_mechanism:
      name: Mecanismo de elevación
      description: Indica el mecanismo de operación utilizado para subir, bajar o
        inclinar la persiana o cortina.
    light_exposure_requirement:
      name: Requisito de exposición a la luz
      description: Especifica el nivel de luz que necesita la ecosfera para mantenerse
        saludable sin sobrecalentar ni estresar a los organismos.
    liner_installation_method:
      name: Método de instalación del revestimiento
      description: Describe cómo el revestimiento permanece en su lugar sobre la superficie.
    lint_roller_type:
      name: Tipo de quitapelusas
      description: Indica el tipo de mecanismo de limpieza o diseño del quitapelusas.
    live_trap_design:
      name: Diseño de trampas vivas
      description: Indica el estilo estructural general de la trampa.
    lock_keying_option:
      name: Opción de llaves de la cerradura
      description: Especifica cómo está configurada la cerradura, para ayudar a los
        compradores que necesitan varias cerraduras operadas con una sola llave o
        llaves únicas para cada cerradura.
    lubricant_requirement:
      name: Requisitos de lubricación
      description: Especifica el tipo de lubricante recomendado o requerido durante
        el afilado.
    lunch_set_items_included:
      name: Artículos incluidos en el juego de fiambrera
      description: Enumera los componentes individuales que vienen en el juego de
        fiambrera.
    machete_blade_style:
      name: Estilo de hoja del machete
      description: Especifica el estilo tradicional regional o funcional de la hoja
        del machete.
    map_style:
      name: Estilo de mapa
      description: Define el estilo cartográfico o enfoque temático que se muestra
        en el globo.
    masher_head_design:
      name: Diseño del cabezal triturador
      description: Clasifica el diseño de la superficie de trituración, lo que influye
        en la textura y el esfuerzo necesario.
    mattress_protector_features:
      name: Características del protector de colchón
      description: Destaca las características funcionales o de protección específicas
        de los protectores de colchón, para que los compradores puedan filtrar según
        cualidades como impermeabilidad o materiales hipoalergénicos.
    measuring_spoon_features:
      name: Características de la cuchara medidora
      description: Destaca las características especiales de diseño o funcionales
        de las cucharas medidoras.
    meat_tenderizer_face_type:
      name: Tipo de superficie del ablandador de carne
      description: Describe la textura de trabajo de la cabeza del ablandador.
    meat_tenderizer_mechanism:
      name: Mecanismo del ablandador de carne
      description: Clasifica el mecanismo principal de funcionamiento del ablandador
        de carne.
    medical_specialty:
      name: Especialidad médica
      description: Especifica la especialidad médica o disciplina de atención médica
        para la que está diseñado el equipo.
    merv_rating:
      name: Clasificación MERV
      description: Define el valor mínimo de eficiencia reportada (MERV) que indica
        la capacidad del filtro para atrapar partículas de distintos tamaños.
    microwave_compatibility:
      name: Compatibilidad con microondas
      description: Especifica si el artículo se puede utilizar de forma segura en
        un microondas.
    microwave_oven_functions:
      name: Funciones del microondas
      description: Enumera los modos de cocción preestablecidos o avanzados disponibles,
        para que los clientes puedan encontrar modelos con convección, grill, cocción
        por sensor, etc.
    milk_frother_type:
      name: Tipo de espumador de leche
      description: Clasifica el producto por su mecanismo de formación de espuma o
        factor de forma.
    milk_frothing_method:
      name: Método de espumado de leche
      description: Especifica la tecnología o mecanismo utilizado para espumar la
        leche.
    milk_frothing_system:
      name: Sistema de espumado de leche
      description: Especifica el tipo de mecanismo de espumado o vaporización de leche
        que proporciona la máquina.
    mirror_curvature:
      name: Curvatura del espejo
      description: Especifica la curvatura de la superficie reflectante, lo que afecta
        el ángulo de visión y la distorsión.
    mirror_type:
      name: Tipo de espejo
      description: Clasifica el estilo general o categoría funcional del espejo.
    mist_output_mode:
      name: Modo de salida de niebla
      description: Indica los patrones de niebla o niveles de intensidad seleccionables
        disponibles en el difusor.
    mixing_bowl_features:
      name: Características del cuenco para mezclar
      description: Destaca las características funcionales especiales del cuenco que
        influyen en su uso y cuidado.
    mixing_mechanism:
      name: Mecanismo de mezcla
      description: Describe el mecanismo interno utilizado para mezclar los ingredientes
        del aderezo.
    mochi_maker_functions:
      name: Funciones de la máquina para hacer mochi
      description: Enumera los modos de funcionamiento o programas integrados que
        admite el aparato.
    mode_of_action:
      name: Mode de acción
      description: Indica cómo actúa el fungicida, diferenciando los productos de
        contacto de los sistémicos o translaminares.
    moisture_absorber_form:
      name: Formato del absorbente de humedad
      description: Describe la forma física del producto, lo que permite a los compradores
        elegir entre bolsas colgantes, envases, sobres, etc.
    money_retrieval_method:
      name: Método de recuperación de dinero
      description: Describe cómo se retira el dinero guardado de la alcancía.
    mop_head_type:
      name: Tipo de cabezal de la fregona
      description: Indica el diseño estructural del cabezal o recambio de la fregona,
        lo que ayuda a los compradores a encontrar el estilo adecuado para sus necesidades
        de limpieza.
    mop_wringing_mechanism:
      name: Mecanismo de escurrido de fregona
      description: Indica cómo se elimina el exceso de líquido de la fregona, lo que
        ayuda al comprador a elegir el tipo de escurrido preferido.
    mounting_bolt_pattern:
      name: Patrón de pernos de montaje
      description: Especifica el número y la disposición de los orificios para los
        pernos de montaje en la carcasa del husillo (por ejemplo, triangular con 3
        pernos, cuadrado con 4 pernos).
    mouthpiece_shape:
      name: Forma de la boquilla
      description: Especifica la forma del extremo de la boquilla del porta cigarrillos.
    mower_deck_material:
      name: Material de la carcasa del cortacésped
      description: Indica el material de construcción de la carcasa del cortacésped,
        lo que afecta a la durabilidad y al peso.
    mulch_form:
      name: Forma de mantillo
      description: Describe la forma física o consistencia del mantillo.
    nap_mat_items_included:
      name: Artículos incluidos con la colchoneta para siesta
      description: Detalla los componentes o accesorios específicos que vienen con
        la colchoneta para siesta.
    napkin_edge_finish:
      name: Acabado del borde de la servilleta
      description: Especifica el acabado decorativo o de costura a lo largo del borde
        o dobladillo de la servilleta.
    noodle_core_design:
      name: Tipo de núcleo de los fideos
      description: Describe si el núcleo de los fideos es sólido o hueco.
    nozzle_adjustability:
      name: Ajustabilidad de la boquilla
      description: Indica si la boquilla se puede ajustar para cambiar el patrón de
        pulverización o el caudal.
    nozzle_material:
      name: Material de la boquilla
      description: Especifica el material de las boquillas de nebulización por razones
        de durabilidad y resistencia a las obstrucciones.
    nozzle_style:
      name: Estilo de boquilla
      description: Especifica la forma funcional o el estilo del extremo de la boquilla
        del tubo.
    nozzle_types_included:
      name: Tipos de boquillas incluidas
      description: Enumera las formas o estilos de boquillas incluidas con la pistola
        para salchichas, para que los compradores sepan qué formas pueden crear.
    number_of_compartments:
      name: Número de compartimentos
      description: Indica el número de compartimentos separados que tiene el contenedor
        de residuos para clasificar los residuos o los materiales reciclables.
    numeral_style:
      name: Estilo numérico
      description: Define el estilo visual o la presencia de números en la esfera
        del reloj.
    oil_dispenser_spout_design:
      name: Diseño del pico dispensador de aceite
      description: Describe el estilo del pico o boquilla, lo que afecta el control
        del flujo y la prevención de goteo.
    organizer_application:
      name: Aplicación del organizador
      description: Especifica el tipo principal de artículos para los que está diseñado
        el organizador.
    ornament_hook_style:
      name: Estilo de gancho para adornos
      description: Identifica el estilo o la forma del gancho para adornos utilizado
        para colgar ornamentos.
    oscillation_mode:
      name: Modo de oscilación
      description: Describe si el ventilador oscila para distribuir el aire y cómo
        lo hace.
    oscillation_type:
      name: Tipo de oscilación
      description: Especifica si el ventilador oscila y cómo lo hace, para ayudar
        a los compradores que necesitan una circulación de aire generalizada.
    outdoor_grill_rack_type:
      name: Parrilla para exteriores tipo rejilla
      description: Especifica el estilo funcional de la rejilla para aclarar su uso
        previsto en la cocina.
    oxygen_indicator_type:
      name: Tipo de indicador de oxígeno
      description: Especifica si se incluye un indicador visual para mostrar si el
        sobre de absorción sigue activo y qué forma adopta.
    pad_cleaning_action:
      name: Acción de limpieza de la almohadilla
      description: Describe la función principal de limpieza de la almohadilla o el
        resultado del acabado.
    pan_bottom_type:
      name: Tipo de fondo del molde
      description: Indica si el fondo del molde es extraíble o fijo.
    pan_perforation_type:
      name: Tipo de perforación del molde
      description: Indica si el fondo y los laterales del molde son sólidos o perforados
        para permitir el drenaje de líquidos.
    parasol_opening_mechanism:
      name: Mecanismo de apertura de la sombrilla
      description: Describe cómo se abre y se cierra la capota de la sombrilla.
    parchment_paper_coating:
      name: Recubrimiento del papel de horno
      description: Identifica el tratamiento superficial aplicado al papel de horno
        para proporcionarle propiedades antiadherentes.
    particle_size_grade:
      name: Clasificación de tamañoa de las partículas
      description: Describe la clasificación del tamaño de grano de la vermiculita,
        lo que afecta sus características de aireación y retención de agua.
    patio_heater_safety_features:
      name: Características de seguridad de la estufa para exteriores
      description: Destaca los mecanismos de seguridad integrados diseñados para prevenir
        accidentes y garantizar un funcionamiento seguro.
    pattern_match_type:
      name: Tipo de coincidencia de patrones
      description: Especifica cómo se debe alinear el patrón entre tiras durante la
        instalación.
    pendulum_compatibility:
      name: Compatibilidad del péndulo
      description: Indica si el movimiento puede accionar un péndulo y si se incluye
        un péndulo.
    perch_design:
      name: Diseño del posadero
      description: Describe el estilo estructural o forma del posadero.
    perch_surface_texture:
      name: Textura de la superficie del posadero
      description: Define el tacto/acabado de la superficie del posadero, lo que influye
        en el agarre y el desgaste de las uñas.
    pet_safety:
      name: Seguridad para mascotas
      description: Indica si la planta es tóxica o no para las mascotas domésticas
        más comunes.
    pet_toxicity:
      name: Toxicidad para mascotas
      description: Indica si la planta es tóxica para las mascotas domésticas comunes,
        garantizando la seguridad de los clientes que tienen mascotas.
    ph_adjustment_direction:
      name: Dirección de ajuste del pH
      description: Indica si el producto está formulado para aumentar o disminuir
        el nivel de pH de la solución.
    pie_pan_edge_style:
      name: Estilo de borde de molde para tartas
      description: Describe el diseño del borde, lo que afecta la apariencia de la
        corteza y la facilidad para desmoldar.
    pin_shape:
      name: Forma del alfiler
      description: Describe la forma general del alfiler que sujeta la tela.
    pipe_connection_method:
      name: Método de conexión de tuberías
      description: Especifica el estilo de las conexiones en los extremos del codo
        de la tubería (por ejemplo, macho, hembra, a presión, roscado) para garantizar
        la compatibilidad durante la instalación.
    piping_tip_shape:
      name: Forma de la boquilla de repostería
      description: Define la forma o el diseño de la boquilla para decorar.
    pitcher_spout_style:
      name: Estilo de pico de la jarra
      description: Define el diseño de la boquilla, que afecta a la precisión de los
        diseños con espuma de leche y al control del vertido.
    pizza_cutter_design:
      name: Diseño del cortador de pizza
      description: Identifica el estilo estructural del cortador de pizza, para ayudar
        la cliente a elegir entre diferentes mecanismos de corte.
    pizza_pan_style:
      name: Estilo de molde para pizza
      description: Identifica el estilo de construcción o diseño del molde para pizza,
        indicando cómo hornea la masa y para qué tipo de pizza está destinado.
    plant_care_difficulty:
      name: Dificultad del cuidado de la planta
      description: Indica el nivel de cuidado necesario para el mantenimiento de la
        planta, para ayudar a principiantes y expertos a elegir adecuadamente.
    plant_container_type:
      name: Tipo de recipiente para planta
      description: Identifica el tipo de recipiente incluido con el arbusto artificial,
        si lo hay.
    plant_life_cycle:
      name: Ciclo de vida de la planta
      description: Indica si la planta es anual, bienal o perenne.
    planter_material:
      name: Material de jardinería
      description: Indica el material de la maceta o jardinera incluida, si se proporciona.
    plate_coupling_pattern:
      name: Patrón de acoplamiento del plato
      description: Especifica la configuración del encaje inferior que se adapta al
        acoplador del motor del plato giratorio del microondas, asegurando la rotación
        correcta.
    plate_purpose:
      name: Propósito del plato
      description: Define la función del plato dentro del sistema del cortacésped.
    plate_style:
      name: Estilo de plato
      description: Identifica el estilo específico o el uso previsto del plato de
        vajilla.
    pole_construction_type:
      name: Tipo de construcción del poste
      description: Define el estilo estructural del poste, lo que afecta a su configuración
        y portabilidad.
    pool_chemical_type:
      name: Tipo de producto químico para piscina
      description: Clasifica la función principal o la composición química del producto
        para el tratamiento de piscinas.
    pool_filter_type:
      name: Tipo de filtro de piscina
      description: Identifica la tecnología de filtración o el estilo de construcción
        utilizado por el filtro de la piscina o el spa.
    pool_game_type:
      name: Tipo de juego de billar
      description: Identifica el tipo específico de juego o deporte que el producto
        permite practicar en la piscina.
    pool_ladder_design:
      name: Diseño de escalera de piscina
      description: Clasifica el diseño estructural general de la escalera de la piscina.
    pool_liner_installation_style:
      name: Estilo de instalación del revestimiento de la piscina
      description: Identifica el método de fijación utilizado para sujetar el revestimiento
        a la pared de la piscina.
    pool_lounge_style:
      name: Estilo de tumbona de piscina
      description: Clasifica el estilo estructural de la tumbona de piscina para facilitar
        el filtrado visual o funcional.
    pool_lounger_features:
      name: Características de la tumbona de piscina
      description: Destaca las funciones especiales integradas que aportan funcionalidad
        o comodidad a la tumbona.
    pool_skimmer_type:
      name: Tipo de filtros y coladores para piscina
      description: Clasifica el diseño del skimmer, para ayudar a los compradores
        a comparar redes manuales con skimmers automáticos o flotantes.
    pool_toy_features:
      name: Características de los juguetes de piscina
      description: Destaca las características funcionales o de diseño más relevantes
        específicas de los juguetes para piscina.
    pool_type:
      name: Tipo de piscina
      description: Clasifica el estilo estructural de la piscina.
    pool_vacuum_type:
      name: Tipo de aspiradora de piscina
      description: Indica el estilo de funcionamiento o mecanismo de accionamiento
        de una aspiradora de piscina.
    popcorn_kernel_variety:
      name: Variedad del grano de maíz para palomitas
      description: Especifica la variedad natural o la forma del grano de maíz para
        palomitas.
    portafilter_type:
      name: Tipo de porta filtro
      description: Identifica el estilo estructural del portafiltro, lo que afecta
        el método de extracción y el flujo de trabajo.
    post_installation_method:
      name: Método de instalación de postes
      description: Define cómo se instala o fija el poste del buzón en su lugar.
    pour_spout_design:
      name: Diseño del pico vertedor
      description: Especifica las características especiales o el estilo del pico
        vertedor que influyen en el control del flujo.
    pour_spout_style:
      name: Estilo de pico vertedor
      description: Describe el diseño del pico vertedor del dispensador, lo que afecta
        el control del flujo y la resistencia a goteo.
    power_equipment_hitch_type:
      name: Tipo de enganche para equipo motorizado
      description: Identifica la interfaz de conexión que usa el accesorio para montarse
        en tractores o unidades motrices.
    predator_guard_style:
      name: Estilo de protector contra depredadores
      description: Clasifica el diseño estructural del protector, para que los compradores
        puedan identificar rápidamente soluciones de tipo cono, disco, jaula o placa
        perforada.
    preferred_soil_type:
      name: Tipo de suelo preferido
      description: Indica la composición del suelo en el que la planta prospera.
    preparation_type:
      name: Tipo de preparación
      description: Describe el método necesario para preparar el alimento para el
        consumo.
    preservation_method:
      name: Método de conservación
      description: Detalla la técnica utilizada para secar o conservar las flores.
    pressure_cooker_handle_type:
      name: Tipo de mango de olla a presión
      description: Indica el estilo o la ubicación del mango de la olla a presión
        que se va a reemplazar.
    pressure_cooker_safety_features:
      name: Características de seguridad de la olla a presión
      description: Enumera los mecanismos de seguridad incorporados que previenen
        accidentes, como tapas con cierre o válvulas de liberación de presión.
    pressure_settings:
      name: Ajustes de presión
      description: Especifica cuántos niveles de presión distintos ofrece la olla
        a presión.
    pressure_washer_outlet_connector_type:
      name: Tipo de conector de salida de la hidrolavadora
      description: Identifica las especificaciones del conector situado en la parte
        delantera del cabezal de la pistola que se utiliza para acoplar lanzas o boquillas.
    pressure_washer_spray_pattern:
      name: Patrón de rociado de la hidrolavadora
      description: Especifica el ángulo o patrón de pulverización producido por la
        boquilla de la hidrolavadora.
    print_edition_type:
      name: Tipo de edición de la impresión
      description: Clasifica el tipo de edición de la impresión, indicando su singularidad
        y valor.
    printed_sides:
      name: Caras impresas
      description: Indica si el producto está impreso en una cara o en ambas caras.
    procedure:
      name: Procedimiento
      description: Especifica el procedimiento médico o tipo de capacitación para
        la que está diseñado el equipo
    protected_item_type:
      name: Tipo de artículo protegido
      description: Especifica el tipo de documento u objeto que la funda RFID puede
        proteger.
    pulley_groove_profile:
      name: Perfil de ranura de la polea
      description: Define el estilo de interfaz de la correa de la polea tensora.
    pulp_ejection_type:
      name: Tipo de expulsión de pulpa
      description: Indica cómo se expulsa la pulpa de la máquina.
    pump_type:
      name: Tipo de bomba
      description: Especifica el diseño del mecanismo de la bomba de la hidrolavadora.
    punch_bowl_components_included:
      name: Componentes incluidos en la ponchera
      description: Enumera los artículos complementarios que vienen con la ponchera,
        para que los compradores puedan ver rápidamente qué contiene el juego.
    quilt_construction_type:
      name: Tipo de construcción de la colcha
      description: Describe el tipo de costura interna o el método de compartimentación
        utilizado en el edredón, que influye en la distribución del calor y la durabilidad.
    radiator_design_type:
      name: Tipo de diseño de radiador
      description: Identifica el estilo estructural del radiador.
    rain_barrel_design:
      name: Diseño de barril para recoger agua de lluvia
      description: Clasifica el estilo estructural del barril de lluvia.
    rain_chain_style:
      name: Estilo de cadena de lluvia
      description: Especifica el diseño estructural de la cadena de lluvia para que
        los clientes puedan filtrarla según su preferencia visual y el rendimiento
        del flujo de agua.
    range_hood_filter_type:
      name: Tipo de filtro de campana extractora
      description: Clasifica el estilo del filtro de recambio para garantizar un ajuste
        y un rendimiento correctos.
    range_installation_type:
      name: Tipo de instalación de la gama
      description: Describe la configuración de cómo se instala la campana extractora
        en la cocina
    recorder_type:
      name: Tipo de grabadora
      description: Identifica la tecnología de grabación utilizada (por ejemplo, DVR,
        NVR) para ayudar a comparar soluciones analógicas e IP.
    refrigerator_configuration:
      name: Configuración del frigorífico
      description: Describe el diseño general de las puertas y los compartimentos
        del frigorífico.
    release_type:
      name: Tipo de liberación
      description: Indica la rapidez con la que se liberan los nutrientes del fertilizante.
    relief_style:
      name: Estilo de relieve
      description: Indica si las elevaciones de la superficie son elevadas, hundidas
        o planas en el globo terráqueo.
    repellent_mechanism:
      name: Mecanismo de repulsión
      description: Especifica el mecanismo de repulsión principal empleado por el
        producto, como aroma químico, sonido ultrasónico o luz intermitente.
    replaceable_brush_head:
      name: Cabezal de cepillo reemplazable
      description: Especifica si el cabezal del cepillo se puede desmontar y reemplazar
        cuando se desgasta.
    rib_material:
      name: Material de las varillas
      description: Especifica el material utilizado para las varillas o radios del
        paraguas, como fibra de vidrio o aluminio.
    rice_cooker_functions:
      name: Funciones de la arrocera
      description: Enumera los programas o modos de cocción preestablecidos disponibles
        en la olla arrocera, lo que permite a los compradores comparar su versatilidad.
    roaster_oven_functions:
      name: Funciones del horno asador
      description: Enumera las functions de cocción preestablecidas o compatibles
        disponibles en un horno asador.
    roasting_rack_shape:
      name: Forma de la rejilla para asar
      description: Especifica la forma estructural o el diseño de la rejilla, lo que
        afecta al ajuste y a la eficiencia de la cocción.
    rockwool_form:
      name: Forma de lana de roca
      description: Especifica la forma física o configuración del producto de lana
        de roca.
    roof_style:
      name: Estilo de techo
      description: Define el estilo arquitectónico o la forma del techo.
    rose_attachment:
      name: Cabezal de rosa
      description: Indica si la regadera incluye un cabezal de rosa/rociado desmontable
        o fijo o si no tiene rociador.
    safety_mirror_features:
      name: Características del espejo de seguridad
      description: Destaca las características especiales de rendimiento que mejoran
        la durabilidad o la visibilidad.
    salad_spinner_mechanism:
      name: Mecanismo de centrifugadora de ensaladas
      description: Especifica el mecanismo de centrifugado utilizado para escurrir
        las verduras de hoja verde, para que los compradores puedan elegir el estilo
        que prefieran.
    sand_color:
      name: Color de la arena
      description: Indica el color de la arena o el relleno granular dentro del reloj
        de arena, independientemente del color de la estructura externa.
    sand_type:
      name: Tipo de arena
      description: Especifica el tipo de arena en función de su composición o aplicación
        común.
    saucer_functionality:
      name: Funcionalidad de la bandeja
      description: Especifica el estilo funcional de la bandeja o recipiente, como
        los diseños con riego automático o depósito.
    sauna_form_factor:
      name: Formato de la sauna
      description: Define el estilo estructural general de la unidad de sauna.
    sauna_heater_type:
      name: Tipo de calentador de sauna
      description: Indica el tipo de calentador incluido o compatible con el kit de
        sauna.
    scoop_release_mechanism:
      name: Mecanismo de liberación de la cuchara
      description: Describe el tipo el mecanismo de liberación del producto integrado
        en la cuchara.
    scoop_surface_design:
      name: Diseño de la superficie de la cuchara
      description: Describe si la superficie de la cuchara es sólida o perforada para
        permitir el drenaje del aceite.
    scoop_wall_design:
      name: Diseño de la superficie de la cuchara
      description: Describe si la superficie de la cuchara es sólida o perforada/ranurada
        para permitir el paso del aceite o de pequeños trozos.
    scrubber_head_type:
      name: Tipo de cabezal del depurador
      description: Describe la acción mecánica o el diseño del cabezal del depurador.
    scrubbing_strength:
      name: Fuerza de fregado
      description: Indica el nivel relativo de fregado/abrasividad que ofrece el producto.
    seafood_utensil_items_included:
      name: Utensilios para marisco incluidos
      description: Enumera las herramientas adicionales para marisco que se incluyen
        con las tenazas, para que los compradores puedan comparar las tenazas individuales
        con los kits completos.
    sealing_modes:
      name: Modos de sellado
      description: Enumera los programas de sellado operativos disponibles en el aparato.
    security_sensor_subtype:
      name: Subtipo de sensor de seguridad
      description: Define la función/tipo específico del sensor de seguridad.
    seed_treatment:
      name: Tratamiento de las semillas
      description: Especifica cualquier procesamiento especial aplicado a las semillas.
    self_cleaning_method:
      name: Método de autolimpieza
      description: Especifica el tipo de tecnología de autolimpieza que utiliza el
        horno.
    serveware_pieces_included:
      name: Utensilios de servir incluidos
      description: Enumera los diferentes componentes de la vajilla incluidos en un
        juego de varias piezas.
    shaker_set_pieces_included:
      name: Piezas del juego de coctelera incluidas
      description: Enumera los componentes individuales incluidos en el juego, además
        de los saleros y pimenteros básicos.
    sheath_material:
      name: Material de la funda
      description: Material de la funda de la sonda del termopar, que afecta a la
        resistencia a la corrosión y a la temperatura máxima de servicio.
    shelf_location_in_appliance:
      name: Ubicación en el estante del electrodoméstico
      description: Indica en qué parte del interior del electrodoméstico se debe instalar
        el estante.
    shoe_brush_type:
      name: Tipo de cepillo para zapatos
      description: Clasifica el estilo funcional del cepillo para zapatos, para que
        el comprador pueda localizar cepillos diseñados para tareas específicas.
    shoe_dryer_technology:
      name: Tecnología del secador de calzado
      description: Especifica la tecnología de secado principal utilizada por el secador
        de zapatos.
    shoe_organizer_design:
      name: Diseño del organizador de zapatos
      description: Identifica el estilo o formato general del organizador de zapatos
        para ayudar a los compradores a filtrar los artículos.
    shoe_polish_form:
      name: Forma del betún para zapatos
      description: Identifica la forma física o el método de aplicación del producto
        para pulir zapatos.
    shoe_treatment_purpose:
      name: Finalidad del tratamiento del calzado
      description: Identifica la función o el beneficio principal del producto para
        el tratamiento del calzado.
    shoe_tree_design:
      name: Diseño de hormas para zapatos
      description: Identifica el estilo estructural o el mecanismo de la horma, lo
        que influye en la capacidad de ajuste, el tipo de calzado previsto y la facilidad
        de uso.
    shot_glass_style:
      name: Estilo de vaso de chupito
      description: Clasifica el estilo o formato específico del vaso de chupito.
    shovel_handle_grip_type:
      name: Tipo de empuñadura del mango de la pala
      description: Especifica el estilo de empuñadura en el extremo del mango.
    shovel_head_type:
      name: Tipo de cabezal de la pala
      description: Clasifica la forma/estilo funcional del cabezal de la pala o la
        azada.
    shower_curtain_ring_type:
      name: Tipo de anilla para cortina de ducha
      description: Identifica el estilo funcional del anillo de la cortina de ducha.
    shrub_shape:
      name: Forma del arbusto
      description: Describe la forma general esculpida/topiaria del arbusto artificial.
    signature_presence:
      name: Presencia de firma
      description: Especifica si el cuadro está firmado por el artista y de qué manera.
    sink_caddy_features:
      name: Características del organizador para fregadero
      description: Destaca los elementos funcionales especiales de un organizador
        para fregadero.
    size_adjustability:
      name: Ajustabilidad del tamaño
      description: Indica si la longitud/anchura del producto se puede ajustar para
        adaptarse a varios números de zapato.
    skewer_tip_type:
      name: Tipo de punta de brocheta
      description: Define el tipo de punta de una brocheta, lo que afecta la facilidad
        de pinchar los alimentos y a la presentación general.
    sleeping_position_suitability:
      name: Adecuación de la posición para dormir
      description: Indica para qué posiciones para dormir está diseñada la almohada.
    sleeve_insulation:
      name: Aislamiento de la funda
      description: Indica si la funda proporciona aislamiento térmico para mantener
        las bebidas frías o calientes.
    slice_style:
      name: Estilo de rebanada
      description: Especifica el estilo de corte principal que produce la cortadora
        de cocina, como juliana o gofre.
    slipcover_stretch_type:
      name: Tipo de elasticidad de la funda
      description: Especifica el grado y la dirección de la elasticidad del tejido
        utilizado en la funda.
    smoker_type:
      name: Tipo de ahumador
      description: Clasifica el ahumador por su diseño estructural o método de ahumado.
    smoking_chip_size:
      name: Tamaño de las astillas para ahumar
      description: Indica el corte/tamaño físico de las astillas de madera para ahumar,
        lo que afecta a la velocidad de combustión y a la idoneidad para diferentes
        parrillas o ahumadores.
    snow_blower_stage_type:
      name: Tipo de etapa de la quitanieves
      description: Indica el número de etapas de la barrena o el impulsor utilizadas
        para mover y descargar la nieve, una especificación fundamental para diferenciar
        máquinas de una, dos o tres etapas.
    soap_dispenser_operation_type:
      name: Tipo de funcionamiento del dispensador de jabón
      description: Especifica el mecanismo de activación utilizado para dispensar
        jabón o loción.
    soil_texture:
      name: Textura del suelo
      description: Describe el tamaño y la composición predominantes de las partículas
        del suelo que afectan al drenaje y la aireación.
    spa_installation_type:
      name: Tipo de instalación del spa
      description: Clasifica el spa según cómo está instalado o configurado in situ.
    space_heater_safety_features:
      name: Características de seguridad de los calentadores portátiles
      description: Destaca los mecanismos de seguridad integrados que protegen a los
        usuarios y los bienes.
    spice_organizer_features:
      name: Características del especiero
      description: Destaca las características funcionales especiales de los especieros.
    spray_pattern:
      name: Patrón de pulverización
      description: Define el tipo de pulverización de aceite que produce la boquilla
        del pulverizador.
    sprayer_operation_mechanism:
      name: Mecanismo de funcionamiento del pulverizador
      description: Especifica cómo se genera la presión para dispensar aceite desde
        el pulverizador.
    spring_type:
      name: Tipo de resorte
      description: Identifica el tipo de resorte utilizado en el mecanismo de la desbrozadora.
    sprinkle_opening_style:
      name: Tipo de apertura de espolvoreado
      description: Define la textura o estilo de las perforaciones/rejilla utilizadas
        para dispensar cacao (rejilla fina vs. orificios grandes, etc.).
    sprinkler_orientation:
      name: Orientación de los rociadores
      description: Indica la orientación y el estilo de instalación del cabezal del
        rociador contra incendios.
    sprinkler_response_type:
      name: Tipo de respuesta del rociador
      description: Especifica la característica de respuesta térmica del cabezal del
        rociador.
    sprinkler_type:
      name: Tipo de aspersor
      description: Clasifica la acción mecánica o el estilo de distribución del rociador
        para facilitar la comparación y el filtrado.
    sprinkler_valve_type:
      name: Tipo de válvula del aspersor
      description: Define el tipo funcional o de actuación de la válvula rociadora.
    squirrel_feed_type:
      name: Tipo de alimento para ardillas
      description: Identifica los tipos de alimento que puede dispensar el comedero,
        lo que garantiza la compatibilidad con los alimentos preferidos de las ardillas.
    squirrel_resistance:
      name: Resistencia de las ardillas
      description: Indica si la jaula para sebo cuenta con elementos diseñados para
        disuadir a las ardillas de acceder al sebo.
    stackability:
      name: Apilabilidad
      description: Indica si se pueden apilar varias unidades de forma segura para
        ahorrar espacio de almacenamiento.
    stackable_design:
      name: Diseño apilable
      description: Indica si el contenedor está diseñado para apilarse de forma segura
        cuando está lleno o vacío.
    stacking_capability:
      name: Capacidad de apilamiento
      description: Especifica si el contenedor puede apilarse, encajarse, plegarse
        o no puede apilarse con otros contenedores.
    stainless_steel_cleaner_features:
      name: Características del limpiador para acero inoxidable
      description: Especifica características especiales de rendimiento del producto
        que son únicas o especialmente relevantes para el cuidado del acero inoxidable.
    staple/pin_shape:
      name: Forma de grapa/alfiler
      description: Define la forma general del elemento de fijación, lo que ayuda
        a los clientes a elegir entre grapas en forma de U, alfileres de cabeza redonda,
        etc.
    staple_coating:
      name: Recubrimiento de las grapas
      description: Describe el recubrimiento protector aplicado a la grapa o al alfiler
        para evitar la oxidación o mejorar su vida útil.
    steam_nozzle_type:
      name: Tipo de boquilla de vapor
      description: Identifica el estilo funcional del accesorio de la boquilla del
        limpiador a vapor.
    steam_table_pan_cover_features:
      name: Características de la tapa para bandeja de mesa de vapor
      description: Destaca las características funcionales especiales de las tapas
        para bandejas de mesa de vapor que facilitan las tareas de restauración.
    steam_table_pan_size:
      name: Tamaño de la bandeja de mesa de vapor
      description: Indica la fracción estandarizada de Gastronorm (por ejemplo, completa,
        1/2, 1/3) para la que está diseñada la bandeja o la tapa.
    steam_table_pan_size_compatibility:
      name: Compatibilidad del tamaño de las bandejas para mesas de vapor
      description: Enumera los tamaños de bandejas Gastronorm o estándar que se pueden
        utilizar en la unidad
    steam_table_pan_type:
      name: Tipo de cubeta para mesa de vapor
      description: Especifica el tipo de fabricación de la bandeja, lo que afecta
        al drenaje y al comportamiento térmico.
    stemware_design:
      name: Diseño de las copas
      description: Especifica si la copa tiene un tallo tradicional o no tiene tallo.
    stick_tip_style:
      name: Estilo de la punta del palillo
      description: Define el diseño del extremo del palillo, lo que influye en cómo
        perfora o sostiene los alimentos.
    stocking_toe_orientation:
      name: Orientación de la punta de la media
      description: Especifica la dirección en la que se orienta la punta de la media
        cuando se cuelga, lo que afecta a la simetría visual cuando se exponen varias
        medias.
    stopper_type:
      name: Tipo de tapón
      description: Especifica el tipo de cierre que incluye el decantador, si lo tiene.
    strainer_style:
      name: Estilo de colador
      description: Clasifica el diseño del colador o escurridor.
    strainer_type:
      name: Tipo de colador
      description: Especifica el estilo o diseño del colador, lo que indica su uso
        culinario previsto y la estructura de la malla.
    strap_end_fitting_type:
      name: Tipo de accesorio del extremo de la correa
      description: Especifica el herraje o accesorio situado en el extremo de la correa
        de tracción que facilita la conexión, el anclaje o el ajuste.
    straw_dispensing_mechanism:
      name: Mecanismo dispensador de pajitas
      description: Describe el método por el cual se dispensan las pajitas, para ayudar
        a los compradores que buscan características específicas de higiene o practicidad.
    sugar_dispenser_mechanism:
      name: Mecanismo dispensador de azúcar
      description: Detalla cómo se dispensa el azúcar del envase, lo que ayuda a los
        compradores a elegir el estilo de vertido preferido.
    suitable_for_pool_shape:
      name: Adecuado para la forma de la piscina
      description: Indica con qué formas de piscina se puede utilizar el accesorio,
        lo que ayuda a los usuarios a asegurarse de que se ajusta correctamente.
    suitable_pool_surface_type:
      name: Tipo de superficie de piscina adecuada
      description: Identifica los materiales de la superficie de la piscina para los
        que se ha diseñado la escoba o el cepillo, lo que evita daños en la superficie
        y garantiza una limpieza óptima.
    suitable_spread_material:
      name: Material adecuado para esparcir
      description: Identifica los tipos de materiales para los que está diseñado el
        esparcidor.
    sundial_type:
      name: Tipo de reloj solar
      description: Identifica el estilo de diseño o la configuración científica del
        reloj solar.
    supplement_function:
      name: Función de los suplementos
      description: Clasifica los suplementos según su finalidad principal, lo que
        ayuda a los cultivadores a elegir el aditivo adecuado para las necesidades
        específicas de las plantas.
    surface_reflectivity:
      name: Reflectividad de la superficie
      description: Indica si la superficie de la señal está diseñada para reflejar
        la luz y mejorar la visibilidad nocturna.
    sweetener_type:
      name: Tipo de edulcorante
      description: Identifica el edulcorante principal utilizado en el sirope.
    table_skirt_pleat_style:
      name: Estilo de plisado de la falda de mesa
      description: Define el estilo decorativo de plisado o fruncido de la falda,
        lo que ayuda a los compradores a encontrar la combinación perfecta.
    tablecloth_clip_design:
      name: Diseño de pinza para mantel
      description: Describe el mecanismo o estilo de la pinza para mantel.
    tablecloth_features:
      name: Características del mantel
      description: Destaca las características especiales de funcionalidad o diseño
        del mantel.
    tamper_evident_feature:
      name: Función de seguridad contra manipulaciones
      description: Indica la presencia y el estilo de la función de seguridad contra
        manipulaciones incorporada en la tapa.
    tang_type:
      name: Tipo de espiga
      description: Indica el diseño de la espiga de un cuchillo, especificando hasta
        qué punto el metal de la hoja se extiende hacia el mango.
    teapot_spout_style:
      name: Estilo de pico de la tetera
      description: Describe el diseño del pico de la tetera, lo que afecta el control
        del vertido y la estética.
    temperature_zones:
      name: Temperature zones
      description: Identifica cuántas zonas de temperatura controlables de forma independiente
        proporciona el refrigerador para vinos.
    thermocouple_junction_type:
      name: Tipo de unión del termopar
      description: Indica la construcción de la conexión del sensor, lo que afecta
        al tiempo de respuesta y al aislamiento eléctrico.
    thermometer_design:
      name: Diseño del termómetro
      description: Especifica el estilo de funcionamiento fundamental o la tecnología
        del termómetro doméstico.
    thermos_handle_type:
      name: Tipo de asa del termo
      description: Describe el estilo del asa o accesorio de transporte integrado
        en el termo.
    thread_standard:
      name: Estándar de rosca
      description: Identifica la especificación de rosca utilizada en las conexiones
        del accesorio para garantizar la compatibilidad cruzada con los componentes
        de fontanería.
    tilt_mechanism:
      name: Mecanismo de inclinación
      description: Especifica el mecanismo que permite inclinar el toldo para obtener
        una posición óptima de la sombra.
    time_format:
      name: Formato de hora
      description: Indica si el reloj puede mostrar la hora en formato de 12 horas,
        24 horas o ambos.
    timer_mechanism:
      name: Mecanismo temporizador
      description: Identifica el mecanismo subyacente utilizado para medir el tiempo.
    tine_position:
      name: Posición de los dientes
      description: Describe la configuración de los dientes en relación con las ruedas
        y el motor, lo que afecta a la maniobrabilidad y la penetración en el suelo.
    tire_construction:
      name: Construcción del neumático
      description: Identifica el método de construcción interna de la carcasa del
        neumático.
    tire_construction_type:
      name: Tipo de construcción del neumático
      description: Identifica si el neumático es de construcción diagonal o radial,
        lo que afecta a la flexibilidad, la capacidad de carga y la calidad de conducción.
    tire_tread_pattern:
      name: Dibujo de la banda de rodadura del neumático
      description: Describe el estilo de la banda de rodadura del neumático, indicando
        su idoneidad para diferentes condiciones de terreno y necesidades de tracción.
    tissue_lotion_content:
      name: Contenido de la loción del pañuelo
      description: Indica si los pañuelos están impregnados con loción u otros aditivos
        calmantes.
    toaster_features:
      name: Características de la tostadora
      description: Enumera las funciones especiales y los elementos de diseño disponibles
        en la tostadora.
    tong_type:
      name: Tipo de pinzas
      description: Especifica el estilo principal o el uso previsto de las pinzas.
    toothbrush_holder_features:
      name: Características del soporte para cepillo de dientes
      description: Destaca las funciones especiales o los elementos de diseño que
        hacen que el soporte sea diferente.
    toothpick_dispensing_mechanism:
      name: Mecanismo dispensador de mondadientes
      description: Identifica el mecanismo mediante el cual se dispensan los mondadientes.
    topographical_relief:
      name: Relieve topográfico
      description: Indica si la superficie del globo presenta una topografía elevada.
    towel_holder_design:
      name: Diseño de toallero
      description: Describe el estilo estructural de un toallero, como barra o anillo.
    towel_weave:
      name: Tejido de la toalla
      description: Describe la estructura o el tipo de tejido de la toalla, lo que
        influye en su textura, capacidad de absorción y tiempo de secado.
    track_lighting_rail_type:
      name: Tipo de riel de iluminación
      description: Define el estándar mecánico/eléctrico del riel, lo que determina
        qué accesorios y conectores son compatibles.
    track_lighting_system_compatibility:
      name: Compatibilidad del sistema de iluminación tipo riel
      description: Especifica el estándar eléctrico y mecánico del riel para el que
        está diseñado el accesorio o complemento.
    track_rail_circuit_configuration:
      name: Configuración del circuito del riel de iluminación
      description: Indica el número o tipo de circuitos eléctricos que admite el riel,
        lo que afecta al control independiente de los grupos de luminarias.
    track_system_standard:
      name: Estándar del sistema del riel de iluminación
      description: Identifica el estándar físico del riel al que se adapta la fuente
        de alimentación, lo que permite a los compradores combinar los componentes
        con su riel (por ejemplo, riel tipo H, J o L).
    tractor_tire_application:
      name: Uso de los neumáticos para tractores
      description: Indica el uso principal o el entorno para el que se ha diseñado
        el neumático.
    tractor_tire_tread_classification:
      name: Clasificación de la banda de rodadura de los neumáticos de tractor
      description: Clasifica el dibujo de la banda de rodadura de los neumáticos del
        tractor según los estándares agrícolas e industriales.
    tree_shape:
      name: Forma del árbol
      description: Describe la silueta o perfil general de un árbol artificial.
    trigger_type:
      name: Tipo de activador
      description: Especifica el mecanismo activador utilizado para controlar el flujo
        de agua en la boquilla.
    trimmer_line_feed_system:
      name: Sistema de alimentación de cable de la desbrozadora
      description: Identifica cómo avanza el cable de corte desde el cabezal durante
        la operación.
    trimmer_line_shape:
      name: Forma del cable de la desbrozadora
      description: Describe las forma transversal del cable de la desbrozadora, lo
        que influye en el rendimiento del corte y el ruido.
    turntable_type:
      name: Tipo de plato giratorio
      description: Identifica el estilo de la superficie de cocción, distinguiendo
        entre los platos giratorios tradicionales de cristal y los diseños planos
        o no giratorios.
    ultrasonic_cleaner_accessories_included:
      name: Accesorios de limpieza ultrasónica incluidos
      description: Enumera los componentes adicionales que se suministran con el limpiador
        para que los compradores sepan exactamente qué incluye la caja.
    umbrella_base_type:
      name: Tipo de base de la sombrilla
      description: Define el estilo estructural o el diseño de montaje de la base.
    umbrella_opening_mechanism:
      name: Mecanismo de apertura de la sombrilla
      description: Define cómo se despliega y se retrae la cubierta de la sombrilla.
    umbrella_type:
      name: Tipo de sombrilla
      description: Especifica el diseño general o factor de forma de la sombrilla.
    upf_rating:
      name: Clasificación UPF
      description: Indica el factor de protección ultravioleta (UPF) del tejido de
        la sombrilla, cuantificando su eficacia para bloquear los dañinos rayos UV.
    utensil_flexibility:
      name: Flexibilidad del utensilios
      description: Indica el grado de rigidez o flexibilidad del cuerpo del rascador,
        lo que influye en su idoneidad para recipientes curvos o masas duras.
    utensil_holder_features:
      name: Características del soporte para utensilios
      description: Describe las características funcionales especiales de un soporte
        para utensilios de cocina.
    utensil_tray_features:
      name: Características de la bandeja para utensilios
      description: Destaca las características especiales que mejoran la funcionalidad
        de la bandeja.
    vacuum_hose_connection_type:
      name: Tipo de conexión de la manguera de succión
      description: Describe el estilo del conector en los extremos de la manguera,
        asegurando el ajuste mecánico correcto con las aspiradoras o accesorios.
    valance_style:
      name: Estilo de cenefa
      description: Identifica el diseño decorativo de la cenefa, para ayudar a los
        clientes a elegir un estilo que combine con su decoración.
    valet_organizer_features:
      name: Características del organizador de guardarropa
      description: Destaca las características organizacionales específicas integradas
        en el organizador de carga.
    valve_configuration:
      name: Configuración de la válvula
      description: Define el estilo funcional de la válvula de la manguera de jardín,
        lo que ayuda al comprador a seleccionar rápidamente la solución correcta para
        su configuración de riego.
    valve_stem_angle:
      name: Ángulo del vástago de la válvula
      description: Especifica la orientación/ángulo de la válvula en relación con
        el tubo, lo que afecta a la facilidad de inflado y el ajuste del borde.
    vase_filler_type:
      name: Tipo de relleno para jarrón
      description: Clasifica el producto según el tipo específico de material de relleno
        o su forma.
    vent_pipe_type:
      name: Tipo de tubo de ventilación
      description: Clasifica el estilo de construcción de la pila o tubo de ventilación.
    vent_style:
      name: Estilo de ventilación
      description: Clasifica el estilo estructural o la finalidad del componente de
        ventilación.
    waffle_style:
      name: Estilo gofre
      description: Identifica la rejilla o patrón de gofre producido por las placas.
    wallpaper_removal_type:
      name: Tipo de eliminación de papel pintado
      description: Indica la facilidad con la que se puede retirar al redecorar.
    wallpaper_washability_rating:
      name: Clasificación del lavado del papel pintado
      description: Define cómo se puede limpiar la superficie del papel pintado una
        vez instalado.
    warmer_type:
      name: Tipo más cálido
      description: Especifica el mecanismo de calentamiento principal o el uso previsto
        del calentador de velas o de aceite.
    warmth_level:
      name: Nivel de calidez
      description: Clasifica el nivel general de calidez o la idoneidad estacional
        del edredón o la colcha.
    warmth_rating:
      name: Calificación de calidez
      description: Indica el nivel de aislamiento de una manta, similar a las clasificaciones
        TOG en ropa de cama.
    waste_container_lid_features:
      name: Características de la tapa del contenedor de residuos
      description: Destaca las funciones especiales o mejoras incorporadas en la tapa.
    waste_container_sign_message:
      name: Mensaje de la señal del contenedor de residuos
      description: Define el tipo específico de residuo o el texto de advertencia
        impreso en la etiqueta o señal.
    water_filtration_technology:
      name: Tecnología de filtración de agua
      description: Describe la tecnología principal o el mecanismo utilizado para
        purificar el agua.
    water_heater_element_connection_type:
      name: Tipo de conexión del elemento del calentador de agua
      description: Identifica el estilo de montaje del elemento, diferenciando entre
        tornillos y varios estilos de bridas.
    water_sensor_design:
      name: Diseño del sensor de agua
      description: Especifica el estilo físico del elemento sensor de agua.
    water_supply_type:
      name: Tipo de suministro de agua
      description: Identifica cómo el aparato recibe el agua, diferenciando entre
        depósitos de llenado manual y líneas de agua conectadas.
    watering_needs:
      name: Necesidades de riego
      description: Describe los requisitos de agua típicos de la planta.
    wax_paper_form:
      name: Forma del papel encerado
      description: Especifica si el papel encerado se vende en un rollo continuo o
        en hojas precortadas.
    weather_guard_mounting_method:
      name: Método de montaje del protector contra la intemperie
      description: Especifica cómo se fija el protector al alimentador o a la estructura
        de soporte.
    wheel_bearing_type:
      name: Tipo de cojinete de rueda
      description: Identifica la estructura interna del cojinete o casquillo de la
        rueda, lo que afecta a la suavidad de rodadura y a los requisitos de mantenimiento.
    wheel_tread_style:
      name: Estilo de la banda de rodadura de la rueda
      description: Especifica el diseño de la banda de rodadura de la rueda, que afecta
        a la tracción, al nivel de ruido y a las posibles marcas en el suelo.
    whistling:
      name: Silbido
      description: Especifica si la tetera emite un silbido cuando el agua alcanza
        el punto de ebullición.
    wick_material:
      name: Material de la mecha
      description: Identifica la composición de la mecha utilizada (p. ej. algodón,
        fibra de vidrio).
    window_film_installation_surface:
      name: Superficie de instalación de la película para ventanas
      description: Especifica si la película está diseñada para aplicación en interiores,
        exteriores o en superficies duales.
    window_film_type:
      name: Tipo de película para ventanas
      description: Categoriza el estilo funcional de la película (por ejemplo, privacidad
        frente a seguridad).
    window_rod_type:
      name: Tipo de varilla para ventana
      description: Clasifica el estilo funcional de la barra de la ventana.
    window_screen_type:
      name: Tipo de mosquitera para ventana
      description: Define el estilo estructural o el método de funcionamiento de la
        mosquitera.
    window_treatment_lining_type:
      name: Tipo de forro del tratamiento para ventana
      description: Indica si la cenefa o cornisa está forrada y qué tipo de forro
        se utiliza.
    wine_aerator_type:
      name: Tipo de oxigenador de vino
      description: Especifica el factor de forma o estilo de funcionamiento del aireador
        de vino.
    wine_glass_style:
      name: Estilo de copa de vino
      description: Especifica el tipo de vino o el diseño de copa adecuados para optimizar
        el aroma y el sabor.
    wok_bottom_type:
      name: Tipo de fondo del wok
      description: Define la forma de la base del wok, determinando la compatibilidad
        con diferentes placas de cocina y anillos para wok.
    wood_grain_orientation:
      name: Orientación de la veta de la madera
      description: Especifica la orientación de la veta de la madera en el producto,
        como veta transversal, veta longitudinal o veta frontal. Orientación del grano
        Influence la durabilidad y facilidad de uso del cuchillo.
    wood_seasoning_method:
      name: Método de curado de la madera
      description: Indica cómo se secó o curó la leña, lo que influye en el contenido
        de humedad y la calidad de la combustión.
    wrap_format:
      name: Formato del envoltorio
      description: Especifica la forma física en la que se suministra el envoltorio
        alimentario, como rollos u hojas precortadas.
    abacus_bead_material:
      name: Material de cuentas de ábaco
      description: Material principal de las cuentas de ábaco.
    abec_rating:
      name: Clasificación ABEC
      description: Especifica el grado de precisión de los rodamientos según la clasificación
        ABEC, e indica la suavidad y los niveles de tolerancia.
    abrasive_level:
      name: Nivel de abrasión
      description: Poder de corte relativo de un pulimento/compuesto sobre acabados
        automotrices.
    absinthe_accessories_included:
      name: Accesorios de absenta
      description: Detalla cualquier accesorio que venga empaquetado con el producto,
        como cucharas, vasos o terrones de azúcar.
    ac_compressor_mounting_style:
      name: Estilo de montaje del compresor de CA
      description: Describe el estilo de montaje/fijación mecánica o la interfaz del
        soporte del compresor al sistema de accionamiento del motor/accesorios.
    ac_compressor_oil_type:
      name: Tipo de aceite para compresor de CA
      description: Especifica la composición química del aceite lubricante requerido/utilizado
        por el compresor del aire acondicionado (los tipos comunes incluyen PAG y
        POE).
    accent_modes:
      name: Modos decorativos
      description: Especifica cómo el metrónomo puede acentuar los tiempos dentro
        de un compás (más allá del clic básico).
    access_mechanism:
      name: Mecanismo de acceso
      description: Describe cómo el usuario accede a la plataforma para dormir abuhardillada.
    accessibility_features:
      name: Funciones de accesibilidad
      description: Especifica el equipamiento y las configuraciones relacionadas con
        la accesibilidad en el minibús.
    accessories_included:
      name: Accesorios incluidos
      description: Enumera los artículos complementarios que incluye la silla (p. ej.,
        otomana, cojín lumbar), lo que le brinda al comprador una visión transparente
        del valor agregado.
    accessory_pieces_included:
      name: Piezas para accesorios incluidas
      description: Enumera los artículos accesorios incluidos en un conjunto o paquete
        de accesorios de ropa de varias piezas de regalo.
    acoustic_amplifier_feedback_control_features:
      name: Características de control de retroalimentación del amplificador acústico
      description: Indica herramientas antiretroalimentación integradas para instrumentos
        acústicos (p. ej., filtro de muesca, interruptor de fase, supresión automática
        de retroalimentación).
    acoustic_drum_kit_components_included:
      name: Componentes del kit de batería acústica incluidos
      description: Indica qué componentes principales se incluyen en el kit (solo
        el paquete de carcasas o el kit completo; platillos/hardware incluidos).
    acoustic_guitar_body_shape:
      name: Forma del cuerpo de la guitarra acústica
      description: Describe la forma/contorno del cuerpo de la guitarra acústica,
        lo que afecta al tono, la comodidad y el uso típico.
    acoustic_guitar_string_core_design:
      name: Diseño central de cadena para guitarra acústica
      description: La estructura central de la cuerda entorchada.
    acoustic_piano_key_material:
      name: Material de las teclas del piano acústico
      description: Especifica el material principal utilizado para las caras superiores
        o partes de marfil de las teclas de piano.
    acoustic_piano_lid_type:
      name: Tipo de tapa del piano acústico
      description: Especifica el estilo del mecanismo de tapa/cubierta utilizado en
        el piano acústico (para distinguir entre tapa superior y de teclado vertical).
    acoustic_piano_plate_frame_material:
      name: Material de la placa/marco del piano acústico
      description: Especifica el material principal de la placa/marco (arpa) del piano,
        generalmente hierro fundido.
    acoustic_piano_soundboard_material:
      name: Material de la caja de resonancia del piano acústico
      description: Especifica el material principal utilizado para la caja de resonancia
        del piano.
    action_figure_scale:
      name: Escala de la figura de acción
      description: Indica la relación de aspecto de escala del colector (p. ej., 1:12)
        para la que está diseñado el accesorio.
    action_type:
      name: Tipo de acción
      description: Describe el mecanismo de disparo o de amartillado del arma (p. ej.,
        acción de cerrojo, cañón basculante, acción de palanca).
    actuation_mechanism:
      name: Mecanismo de accionamiento
      description: 'Indica cómo la palanca acciona el sistema de frenos: cable puramente
        mecánico, totalmente hidráulico, hidráulico accionado por cable o electrónico/inalámbrico.'
    actuation_method:
      name: Método de actuación
      description: Cómo se activa o se desactiva el sistema de supresión.
    adapter_orientation:
      name: Orientación del adaptador
      description: Especifica el ángulo o la configuración de un adaptador de válvula
        de neumático de bicicleta, que afecta a la accesibilidad de la bomba (p. ej.,
        recto, 90°).
    additive_application_stage:
      name: Etapa de aplicación aditiva
      description: Indica para qué momento del proceso está diseñado el producto.
    adhesive_backing:
      name: Respaldo adhesivo
      description: Si la seda imprimible tiene un respaldo adhesivo para una aplicación
        de despegar y pegar.
    adhesive_formulation:
      name: Formulación adhesiva
      description: Indica la formulación o la base química del adhesivo, p. ej., cianoacrilato
        o epoxi.
    adhesive_sides:
      name: Laterales adhesivos
      description: Indica si el adhesivo fusible está en un lado o en ambos lados
        de la cinta/banda.
    adjunct_grain_processing_form:
      name: Forma de procesamiento de granos adjuntos
      description: Indica la forma física/de procesamiento del grano adjunto tal como
        se vende para la elaboración de cerveza (p. ej., en copos, tostado, malteado,
        crudo).
    adjustability_type:
      name: Tipo de capacidad de ajuste
      description: Especifica qué tipo de ajuste realiza el amortiguador, si es que
        realiza alguno.
    adjustable_cup_mutes:
      name: Sordina de copa ajustable
      description: Indica si la copa es ajustable/extraíble y el tipo de ajuste.
    adjustable_zones:
      name: Zonas ajustables
      description: Identifica qué secciones de la base se pueden ajustar de forma
        independiente.
    adjustment_type:
      name: Tipo de ajuste
      description: Indica si el regulador es ajustable y cómo se realiza el ajuste.
    administration_method:
      name: Método de administración
      description: Indica cómo se administra el desparasitante al caballo (p. ej.,
        por vía oral o mediante inyección), lo que ayuda a los compradores a cumplir
        con las indicaciones veterinarias y a elegir un método de aplicación manejable.
    advice_card_prompt_type:
      name: Tipo de prompt de tarjeta de consejos
      description: Tipo de prompt impreso en la tarjeta (o falta de prompt).
    aeration_method:
      name: Método de aireación
      description: Describe el tipo de aireación que proporciona o mantiene el contenedor,
        lo que garantiza un oxígeno adecuado para el cebo vivo.
    aero_package_components:
      name: Componentes del paquete aerodinámico
      description: Indica qué componentes aerodinámicos clave están instalados en
        el vehículo (selecciona todos los que correspondan).
    aerodynamic_elements_included:
      name: Elementos aerodinámicos incluidos
      description: Especifica qué componentes aerodinámicos se incluyen en el coche
        de fórmula (selecciona todos los que correspondan, si se admiten).
    aftertouch_support:
      name: Compatibilidad para aftertouch
      description: Si el controlador es compatible con aftertouch (canal o polifónico)
        en teclas/pads.
    agave_content_classification:
      name: Clasificación del contenido de agave
      description: Especifica si el tequila se produce con agave azul Weber 100% o
        si es un mixto que contiene un mínimo del 51% de azúcares de agave.
    aida_cloth_count:
      name: Número de puntos de la tela Aida
      description: Especifica el número de puntos de la tela Aida (cantidad de cuadrados/puntadas
        por pulgada), lo que determina el tamaño y la escala del diseño de la puntada.
    aida_cloth_pre_cut_format:
      name: Formato de precorte de la tela Aida
      description: Indica si la tela Aida se vende como pieza precortada, como pieza
        continua cortada de un rollo o en rollo.
    air_bag_material:
      name: Material de bolsa de aire
      description: Especifica el material de la bolsa o depósito de aire utilizado
        con la gaita irlandesa.
    air_bed_internal_construction:
      name: Construcción interna del colchón de aire
      description: Describe la tecnología o la estructura de soporte interna utilizada
        dentro del colchón de aire para brindar comodidad y estabilidad.
    air_dry_clay_color_form:
      name: Forma de color de arcilla de secado al aire
      description: Si la arcilla se vende precoloreada, blanca/neutra para pintar
        o como una mezcla/surtido.
    air_hockey_items_included:
      name: Artículos de hockey de aire incluidos
      description: Enumera las piezas accesorias específicas que contiene un conjunto
        para que los clientes sepan exactamente qué reciben (p. ej., 2 empujadores,
        4 discos, 2 almohadillas de fieltro).
    air_intake_temperature_sensor_mounting_style:
      name: Estilo de montaje del sensor de temperatura de admisión de aire
      description: El estilo de montaje físico del sensor IAT en el sistema de admisión.
    air_integration_capability:
      name: Capacidad de integración de aire
      description: Indica si la computadora de buceo admite transmisores inalámbricos
        de presión del tanque y de qué manera los admite.
    air_mattress_valve_type:
      name: Tipo de válvula para colchón de aire
      description: Especifica el tipo de válvula con la que se ajusta o que contiene
        un accesorio, lo que garantiza la compatibilidad entre bombas, válvulas y
        piezas de repuesto.
    air_water_rocket_kit_items_included:
      name: Artículos incluidos en el kit de cohete de aire y agua
      description: Componentes clave incluidos en el kit del cohete (lanzador, bomba,
        aletas, piezas de recarga).
    air_water_rocket_launch_method:
      name: Método de lanzamiento del cohete de aire y agua
      description: Cómo está presurizado/se lanza el cohete (la interacción del usuario
        y el estilo del equipo).
    airbag_position:
      name: Posición del airbag
      description: Especifica la posición/zona de sujeción prevista de la pieza del
        airbag.
    aircraft_ads_b_capability:
      name: Capacidad ADS-B de la aeronave
      description: Especifica si la aeronave está equipada para cumplir con la normativa
        ADS-B Out.
    aircraft_airframe_material:
      name: Material de la estructura del avión
      description: Material(es) principal(es) utilizado(s) en la construcción de la
        estructura del avión.
    aircraft_cabin_configuration:
      name: Configuración de la cabina de avión
      description: Especifica el diseño de la cabina del avión (p. ej., grupa tipo
        conferencia, diván, cabina de cuatro zonas).
    aircraft_documentation_included:
      name: Documentación del avión incluida
      description: Enumera los documentos que se proporcionan con la pieza (p. ej.,
        8130-3).
    aircraft_galley_configuration:
      name: Configuración del galley de avión
      description: Presencia y tipo de galley/instalaciones de servicio de comidas
        en la cabina.
    aircraft_installation_location:
      name: Sucursal de instalación de aviones
      description: En qué parte de la aeronave se instala o se utiliza la pieza o
        el accesorio.
    aircraft_internet_connection:
      name: Conexión a Internet del avión
      description: Indica la presencia/tipo de conexión a Internet en la cabina.
    aircraft_landing_gear_type:
      name: Tipo de tren de aterrizaje del avión
      description: Especifica la configuración del tren de aterrizaje del autogiro.
    aircraft_lavatory_configuration:
      name: Configuración del lavabo del avión
      description: Tipo de configuración del baño a bordo.
    aircraft_maintenance_program_enrollment:
      name: Inscripción al programa de mantenimiento de aviones
      description: Indica si el avión está inscrito en un programa de mantenimiento
        de motor y/o fuselaje y, en caso afirmativo, qué tipo de cobertura se aplica
        (motor, fuselaje o ambos).
    aircraft_operational_certification:
      name: Certificación operativa del avión
      description: Especifica la base de certificación reglamentaria u operativa bajo
        la cual se opera la aeronave (depende de la jurisdicción, p. ej., FAA Parte
        91/135/121, AOC de la EASA).
    aircraft_protective_gear_certification:
      name: Certificación de equipos de protección para aviones
      description: Especifica la norma aeronáutica, reglamentaria o industrial que
        el equipo de protección está certificado para cumplir.
    aircraft_system_application:
      name: Aplicación del sistema de aviones
      description: Identifica a qué sistema o área del avión pertenece la pieza/accesorio
        (se utiliza para buscar y filtrar entre diversas piezas de aviones).
    airflow_resistance_level:
      name: Nivel de resistencia al flujo de aire
      description: Indica el grado de restricción que se percibe al silenciar el silenciador
        en términos de contrapresión/resistencia al aire.
    airship_envelope_material:
      name: Material de la envoltura del dirigible
      description: Material principal de la envoltura (piel) del dirigible.
    airsoft_part_type:
      name: Tipo de pieza de airsoft
      description: Identifica el tipo de componente funcional o accesorio para pistolas
        de airsoft (p. ej., cargador, cañón, guardamanos).
    airworthiness_approval_basis:
      name: Base de aprobación de aeronavegabilidad
      description: Especifica la base de aprobación/certificación de la pieza, cuando
        corresponda (p. ej., PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Ajuste del volumen de la alarma
      description: Indica si el usuario puede ajustar el volumen de la alarma y cómo
        hacerlo.
    alcohol_ink_finish_effect:
      name: Efecto de acabado de tinta de alcohol
      description: Describe el efecto visual/acabado producido por la formulación
        de la tinta a base de alcohol (más allá de solo el color), p. ej., metálico
        o nacarado.
    alignment_aid_style:
      name: Estilo de ayuda para la alineación
      description: Describe el tipo de guías de alineación impresas o incrustadas
        en la superficie de la alfombrilla (p. ej., línea recta, marcadores de distancia).
    alternator_cooling_type:
      name: Tipo de refrigeración del alternador
      description: Describe cómo se enfría y se ventila el alternador.
    alternator_marine_ignition_protection_rating:
      name: Clasificación de protección de encendido marino del alternador
      description: Indica si el alternador está protegido contra ignición para compartimentos
        de motores marinos (p. ej., conforme a las normas SAE J1171/ISO 8846).
    alternator_mounting_configuration:
      name: Configuración de montaje del alternador
      description: Especifica la configuración de montaje físico utilizada para fijar
        el alternador a un soporte del motor.
    alternator_pulley_type:
      name: Tipo de polea del alternador
      description: Especifica el diseño de la polea/embrague del alternador (o indica
        que no incluye polea).
    alternator_regulator_type:
      name: Tipo de regulador del alternador
      description: Indica si el regulador de voltaje es interno al alternador o externo,
        y si está controlado por el fabricante (controlado por la computadora/PCM).
    alternator_terminal_connection_type:
      name: Tipo de conexión del terminal del alternador
      description: Conexión eléctrica primaria tipo terminal de salida/excitador del
        alternador para ayudar a garantizar la compatibilidad del arnés de cableado.
    altitude_suitability:
      name: Idoneidad para la altitud
      description: Indica si la pelota está diseñada para un estado de altitud específico,
        que afecta a la velocidad y al rebote.
    ambulance_stretcher_mount_type:
      name: Tipo de montaje de camilla de ambulancia
      description: Especifica el tipo de sistema de carga/montaje de camillas compatible
        con la ambulancia.
    american_football_safety_certification:
      name: Certificación de seguridad en fútbol americano
      description: Indica las certificaciones o normas de seguridad específicas para
        el fútbol americano que cumple el producto.
    amplifier_tube_function:
      name: Función del tubo amplificador
      description: Especifica la función del tubo dentro de un circuito amplificador
        de instrumentos (p. ej., preamplificador frente a amplificador de potencia).
    analog_synthesizer_cv_gate_i_o:
      name: Entrada/salida CV/Gate del sintetizador analógico
      description: Indica los tipos de conexiones de voltaje de control (CV) y gate
        que compatibles para integrarse con equipos modulares o analógicos.
    analog_synthesizer_keybed_configuration:
      name: Configuración del teclado del sintetizador analógico
      description: Describe si el sintetizador incluye un teclado incorporado y, en
        caso afirmativo, el número de teclas.
    anchor_configuration:
      name: Configuración de anclaje
      description: Indica si el sistema de suspensión utiliza un único punto de anclaje
        centralizado o varios puntos de anclaje independientes, lo que afecta a la
        variedad de ejercicios y a la complejidad de la configuración.
    animal_raising_method:
      name: Método de cría de animales
      description: Describe las prácticas agrícolas o ganaderas utilizadas para el
        animal de origen.
    animal_species:
      name: Especies animales
      description: Especifica el animal o criatura representada por el peluche (p. ej.,
        oso, conejo, dinosaurio).
    animal_trap_jaw_style:
      name: Estilo de mandíbula de trampa para animales
      description: La configuración de las mandíbulas de la trampa, lo que afecta
        la capacidad de sujeción y el bienestar animal.
    animal_trap_type:
      name: Tipo de trampa para animales
      description: Clasifica el estilo/diseño mecánico de la trampa, lo que permite
        a los compradores localizar rápidamente el método de captura exacto que necesita
        o que permiten las normativas.
    ankle_collar_style:
      name: Estilo de cuello del tobillo
      description: Describe el estilo o la construcción del cuello del tobillo de
        un zapato, como corte bajo, corte alto, cuello tipo calcetín o sin cordones,
        lo que afecta el apoyo, el ajuste y la estética.
    ankle_guard_protection_level:
      name: Nivel de protección del protector de tobillo
      description: Evalúa la cantidad general de protección contra impactos que proporciona
        la tobillera.
    ankle_strap_padding_type:
      name: Tipo de relleno de la correa del tobillo
      description: Describe el material de amortiguación o el tipo de relleno utilizado
        en el interior de la correa que afecta la comodidad.
    ankle_strap_type:
      name: Tipo de correa para tobillo
      description: Clasifica la construcción o el diseño de la correa del tobillo
        de una fijación de snowboard.
    ant_farm_habitat_medium_type:
      name: Tipo de medio del hábitat para hormiguero
      description: Especifica el medio principal de túneles/observación proporcionado
        o requerido por el hormiguero.
    ant_farm_kit_contents:
      name: Contenido del kit de hormiguero
      description: Indica qué componentes se incluyen en el kit de hormiguero (p. ej.,
        contenedor de hábitat , arena/gel, cupón para hormigas, herramientas de alimentación).
    ant_farm_lighting_type:
      name: Tipo de iluminación para hormiguero
      description: Especifica el tipo de iluminación integrada (si la hay) que se
        utiliza para la observación.
    antenna_fit_type:
      name: Tipo de ajuste de la antena
      description: Para qué factor de forma de la antena está diseñada la antena tipo
        bola.
    anti_caking_agent:
      name: Agente antiaglomerante
      description: Especifica el tipo de agente antiaglomerante añadido para evitar
        que se formen grumos, información importante para alergias y para la precisión
        de la receta.
    anti_g_suit_bladder_material:
      name: Material de vejiga para traje antigravedad
      description: Material utilizado para la(s) vejiga(s) inflable(s) interna(s)
        del traje antigravedad; enumera todos los que correspondan si se utilizan
        varios materiales.
    anti_g_suit_connector_type:
      name: Tipo de conector del traje antigravedad
      description: Especifica el estilo/estándar del conector de la manguera de aire/presión
        que se utiliza para la conexión con la aeronave o el regulador.
    anti_g_suit_inflation_method:
      name: Método de inflación del traje antigravedad
      description: Indica cómo se presurizan las vejigas del traje para proporcionar
        protección contra la gravedad.
    anti_g_suit_size_system:
      name: Sistema de tallas de trajes antigravedad
      description: Estándar de tallas utilizado para especificar el sistema de talla/ajuste
        del traje.
    anti_reverse_type:
      name: Tipo de antiretroceso
      description: Especifica el tipo de mecanismo antiretroceso proporcionado, que
        afecta la configuración del gancho y el retroceso.
    anti_theft_feature:
      name: Función antirrobo
      description: Indica si el soporte/montaje ofrece algún tipo de protección antirrobo,
        como cierres de seguridad o un diseño a prueba de manipulaciones.
    antique_gun_ignition_system:
      name: Sistema de encendido de armas antiguas
      description: Especifica el sistema histórico de disparo/ignición utilizado por
        el arma de fuego antigua.
    apple_variety:
      name: Variedad de manzana
      description: Especifica el cultivo o la variedad de la manzana (p. ej., Gala,
        Fuji, Granny Smith), lo que ayuda a los clientes a elegir en función del sabor,
        la textura y el uso culinario.
    applique_edge_finish:
      name: Acabado de borde de aplique
      description: Describe el acabado de los bordes, lo que adecta el aspecto y la
        resistencia al deshilachado.
    arbor_type:
      name: Tipo de árbol
      description: Clasifica el carrete según el diseño del eje de la bobina, lo que
        afecta la velocidad de recuperación del hilo, la capacidad de retroceso y
        la memoria de la línea.
    archery_accessory_type:
      name: Tipo de accesorio de tiro con arco
      description: Especifica el tipo de accesorio destinado a herramientas de tiro
        con arco para que los compradores puedan filtrar rápidamente los productos.
    archery_part_type:
      name: Tipo de pieza para arco
      description: Identifica el hardware específico o la pieza de repuesto que se
        vende (p. ej., cuerpo del arco, pala, cuerda), lo que permite un filtrado
        preciso sin desglosar el árbol de categorías.
    archery_range_accessory_type:
      name: Tipo de accesorio para tiro con arco
      description: Clasifica el tipo específico de accesorio utilizado en un campo
        de tiro con arco, lo que permite a los compradores filtrar rápidamente para
        encontrar el artículo exacto que necesitan.
    archery_target_features:
      name: Características del blanco de tiro con arco
      description: Enumera características de rendimiento o conveniencia especializadas
        no cubiertas por otros atributos (p. ej., espuma autorreparable, asa de transporte).
    archery_tool_type:
      name: Tipo de herramienta de tiro con arco
      description: Clasifica el tipo específico de herramienta o equipo de tiro con
        arco.
    armband_features:
      name: Características del brazalete
      description: Enumera las características funcionales o visuales especiales que
        mejoran el brazalete.
    armguard_style:
      name: Estilo de guardabrazos
      description: Define el estilo de construcción o el factor de forma del guardabrazos,
        lo que brinda información útil sobre la cobertura del diseño y la distinción
        entre estilos tradicionales y modernos.
    armor_protection_type:
      name: Tipo de protección de armadura
      description: Tipo de protección que proporciona el sistema de blindaje del vehículo.
    armrest_adjustability:
      name: Ajuste del reposabrazos
      description: Define la capacidad de ajuste dimensional y la configuración de
        los reposabrazos de la silla (p. ej., fijos, 2D, 3D, abatibles).
    armrest_type:
      name: Tipo de reposabrazos
      description: Describe la presencia y la posibilidad de ajuste de los reposabrazos
        en la silla (p. ej., sin reposabrazos, fijos, ajustables, extraíbles).
    arrow_bolt_point_type:
      name: Tipo de punta de flecha/perno
      description: Define el estilo de punta o extremo instalado en una flecha o perno.
    arrow_component_type:
      name: Tipo de componente de flecha
      description: Clasifica la pieza o accesorio específico para una flecha (insertado,
        envoltura, casquillo, pegamento, etc.) para que los clientes puedan filtrar
        artículos sin docenas de subcategorías adicionales.
    arrow_containment_level:
      name: Nivel de contención de la flecha
      description: Describe si el reposaflechas contiene la flecha completa o parcialmente
        o no la contiene.
    arrow_fletching_orientation:
      name: Orientación del emplumado de la flecha
      description: Especifica la orientación del ala o el desplazamiento del emplumado
        (p. ej., ala izquierda, ala derecha, helicoidal) que determina la dirección
        de giro de la flecha.
    arrow_nock_groove_size:
      name: Tamaño de la ranura del culatín de la flecha
      description: Especifica la clasificación de tamaño de la ranura/cuello del culatín,
        lo que determina su compatibilidad con distintos diámetros de cuerda del arco.
    arrow_nock_type:
      name: Tipo de culatín de la flecha
      description: Diseño/estilo del culatín de la flecha que interactúa con la cuerda
        del arco.
    arrow_rest_style:
      name: Estilo del reposaflechas
      description: Especifica el estilo/mecanismo funcional del reposaflechas (p. ej.,
        de caída, de lámina o tipo whisker biscuit). El estilo determina cómo el reposaflechas
        soporta, contiene y libera la flecha y es una de las principales formas en
        que los compradores diferencian los productos.
    arrow_shaft_compatibility:
      name: Compatibilidad del asta de la flecha
      description: Indica el estándar de asta/casquillo de flecha con el que es compatible
        el culatín luminoso (p. ej., X, H, S, GT)
    art_crafting_tool_tip_style:
      name: Estilo de punta de herramienta de arte/manualidades
      description: Describe la forma/perfil de la punta de trabajo (p. ej., punta
        afilada o bola redondeada) para indicar el tipo de marcas de relieve que produce.
    art_ink_lightfastness_rating:
      name: Clasificación de resistencia a la luz de la tinta artística
      description: Indica la resistencia de la tinta a la decoloración cuando se expone
        a la luz, expresada normalmente mediante clasificaciones estándar.
    art_ink_opacity:
      name: Opacidad de la tinta artística
      description: Especifica el nivel de cobertura de la tinta una vez aplicada.
    art_security_rating:
      name: Clasificación de seguridad ART
      description: Especifica la calificación de estrellas de ART neerlandesa (1 a
        5 estrellas) de la cerradura.
    artichoke_cut:
      name: Corte de alcachofa
      description: Indica qué parte o preparación de la alcachofa se ofrece (p. ej.,
        entera, corazón, parte inferior), para que el cliente entienda el rendimiento
        y la aplicación culinaria prevista.
    artichoke_variety:
      name: Variedad de alcachofa
      description: Especifica la variedad botánica o de cultivo de la alcachofa para
        ayudar a los compradores a distinguir entre tamaños, colores, sabores y usos
        culinarios.
    articulation_features:
      name: Características de articulación
      description: Indica si el modelo de dinosaurio tiene partes móviles (mandíbula,
        extremidades y cola articuladas) y si permite cierta articulación en general.
    artificial_bait_form:
      name: Forma de cebo artificial
      description: Indica la forma física o el estilo de presentación del cebo o señuelo
        de pesca.
    asa_mounting_type:
      name: Tipo de montaje de ASA
      description: Indica el estilo de interfaz o estándar de montaje del adaptador
        de fuente de aire (ASA) que utiliza Drop forward (p. ej., cola de milano,
        riel o montaje directo).
    ascender_descender_type:
      name: Tipo ascendente/descendente
      description: Clasifica el estilo de ascenso o descenso para un filtrado más
        preciso.
    aspiration_type:
      name: Tipo de aspiración
      description: Indica cómo se aspira/impulsa el motor.
    assembly_state:
      name: Estado de ensamblaje
      description: Indica si el gabinete se envía listo para ensamblar, preensamblado
        o en otra forma.
    assistance_mechanism:
      name: Mecanismo de asistencia
      description: Especifica cualquier sistema de asistencia o resistencia incorporado
        que la torre de ejercicios proporcione para dominadas, fondos u otros ejercicios.
    atemoya_cultivar:
      name: Cultivo de Atemoya
      description: Especifica el cultivo/variedad del fruto de atemoya, lo que permite
        a los compradores elegir frutos con el sabor, tamaño o características de
        semillas que prefieran.
    athletic_cup_size:
      name: Talla de copa atlética
      description: Indica la talla designada por el fabricante para la copa protectora,
        a fin de garantizar un ajuste adecuado para el atleta.
    attachment_position:
      name: Posición de sujeción
      description: Especifica en qué parte de la silla de montar o del jinete debe
        sujetarse la bolsa por diseño.
    attractant_scent_profile:
      name: Perfil de aroma atrayente
      description: Describe el olor o sabor específico que se utiliza para atraer
        a la fauna silvestre o enmascarar el olor humano.
    atv_utv_intended_use:
      name: Uso previsto para ATV/UTV
      description: Uso/estilo principal previsto del ATV/UTV.
    audio_channel_configuration:
      name: Configuración del canal de audio
      description: El número de canales de audio discretos que ayuda el ecualizador/DSP
        (p. ej., estéreo de 2 canales, frontal/trasero de 4 canales, 6 canales).
    audio_inputs:
      name: Entradas de audio
      description: Especifica los tipos de conexión de entrada de audio disponibles
        para muestreo/grabación (p. ej., entrada en línea de 1/4, XLR, 3,5 mm, preamplificador
        de micrófono, fono).
    audio_output:
      name: Salida de audio
      description: Indica si el juguete emite sonido y cómo se reproduce el audio.
    audio_outputs:
      name: Salidas de audio
      description: Especifica las conexiones de salida de audio disponibles, incluidas
        las salidas principales y cualquier salida asignable/auxiliar.
    audio_playback_source:
      name: Fuente de reproducción de audio
      description: Fuentes multimedia principales desde las que el equipo de karaoke
        puede reproducir música.
    autograph_authentication:
      name: Autenticación de autógrafos
      description: Indica el estado/tipo de autenticación de un autógrafo en la tarjeta.
    autograph_format:
      name: Formato del autógrafo
      description: Describe si la firma es un autógrafo original firmado a mano, una
        reproducción estampada/impresa o una inscripción/adición.
    autogyro_cockpit_enclosure:
      name: Cabina de autogiro
      description: Indica si la cabina de mando es abierta o cerrada.
    available_firing_modes:
      name: Modos de disparo disponibles
      description: Enumera los modos de disparo seleccionables que el marcador admite
        de fábrica.
    avocado_variety:
      name: Variedad de aguacate
      description: Especifica el cultivo o variedad del aguacate, lo que ayuda a los
        compradores a distinguir entre las diferencias de sabor, textura, tamaño y
        contenido de aceite.
    award_customization_included:
      name: Personalización del premio incluida
      description: Indica qué personalización se incluye con la compra del premio.
    award_material:
      name: Material del premio
      description: Identifica el/los material(es) principal(es) del artículo de premio
        (trofeo, placa, medalla, pin, listón).
    award_mounting_display_type:
      name: Tipo de montaje/exhibición del premio
      description: Especifica cómo se pretende exhibir o montar el premio (en la pared,
        sobre un escritorio o para usar).
    award_plaque_plate_material:
      name: Material de la placa del premio
      description: Especifica el material de la placa de identificación/grabado adherida
        a la placa (distinto del material de soporte).
    award_ribbon_attachment_type:
      name: Tipo de enganche del listón del premio
      description: Especifica cómo debe sujetarse o usarse el listón.
    award_ribbon_imprint_method:
      name: Método de impresión del listón de premio
      description: Especifica cómo se aplican el texto y los gráficos al listón.
    award_ribbon_material:
      name: Material del listón del premio
      description: Material principal de la tela del listón (p. ej., satén, poliéster).
    award_ribbon_placement_title:
      name: Ubicación/título del listón de premio
      description: La ubicación o título estándar que indica el listón (p. ej., primer
        lugar, participante).
    axle_compatibility:
      name: Compatibilidad del eje
      description: Indica el estándar de eje que admite la rueda, lo que garantiza
        la compatibilidad con el marco y la horquilla de la bicicleta.
    back_beam_type:
      name: Tipo de viga trasera
      description: Tipo/ajustabilidad de la viga trasera (p. ej., plana o regulable
        en altura).
    back_design:
      name: Diseño de la parte posterior
      description: Especifica las construcciones traseras notables en las prendas
        que afectan el estilo y soporte.
    back_panel_type:
      name: Tipo de panel trasero
      description: Especifica el estilo o el material del panel trasero del gabinete,
        lo que afecta la visibilidad de la pantalla y a la armonía con la decoración.
    back_sides_material:
      name: Material de la parte trasera y los laterales
      description: Especifica el material utilizado para la parte posterior y los
        laterales del cuerpo de la guitarra clásica.
    backing_type:
      name: Tipo de respaldo
      description: Describe el estilo de soporte/fijación de la pieza de diamantes
        de imitación que se vende (para productos autoadhesivos).
    backup_camera_mounting_location:
      name: Ubicación de montaje de la cámara de respaldo
      description: Indica la ubicación prevista para instalar la cámara de seguridad
        en el vehículo.
    backup_camera_video_interface:
      name: Interfaz de video de la cámara de respaldo
      description: Especifica la salida/interfaz/conector de video que utiliza la
        cámara de respaldo para conectarse a un monitor, DVR o unidad principal (p. ej.,
        RCA compuesto, LVDS OEM, IP por Ethernet).
    badminton_set_components_included:
      name: Componentes del juego de bádminton incluidos
      description: Enumera los artículos individuales incluidos en un juego de bádminton.
    bag_attachment_method:
      name: Método de sujeción de la bolsa
      description: Indica el método principal utilizado para sujetar la bolsa/soporte
        de hidratación a otros equipos (p. ej., correas MOLLE, trabilla para cinturón,
        mosquetón).
    bag_case_carrying_style:
      name: Estilo de transporte del bolso/caja
      description: Especifica el factor de forma general principal de transporte de
        la caja/funda (cómo está diseñada para ser transportada).
    bag_cover_material:
      name: Material de la funda de la bolsa
      description: Especifica el material de la funda del bolso (cubierta exterior),
        que afecta la durabilidad, el agarre y la apariencia.
    bag_embellishment:
      name: Adorno del bolso
      description: Describe los elementos decorativos más destacados en el exterior
        del bolso, como borlas, tachuelas o relleno.
    bag_fill_medium:
      name: Medio de relleno del bolso
      description: Identifica la sustancia utilizada para llenar o presurizar el bolso
        (p. ej., aire, agua, arena).
    bag_material:
      name: Material del bolso
      description: Material de la vejiga/bolsa de aire.
    bag_padding_level:
      name: Nivel de relleno del bolso
      description: Especifica el grado o estilo de relleno incorporado al bolso o
        funda.
    bag_size_descriptor:
      name: Descripción del tamaño del bolso
      description: Clase de talla de marketing para el bolso tipo cubo (p. ej., mini,
        grande) que complementa la dimensión exacta.
    bagel_size:
      name: Tamaño del bagel
      description: Especifica el tamaño general del bagel, p. ej., mini, delgado,
        estándar, grande, extragrande o jumbo.
    bagpipe_accessories_included:
      name: Accesorios de la gaita incluidos
      description: Enumera los principales componentes/accesorios incluidos con la
        gaita (más allá de los tubos principales), p. ej., estuche, puntero de práctica,
        funda, cuerdas, control de humedad.
    bagpipes_playing_mode:
      name: Modo de interpretación de la gaita
      description: Cómo se suministra aire al instrumento durante su interpretación.
    bait_compatibility:
      name: Compatibilidad con cebo
      description: Enumera los tipos de cebo con los que está diseñado el accesorio
        de pellets, lo que ayuda a los pescadores a asegurarse de que la herramienta
        elegida coincida con su cebo de preferencia.
    bait_species:
      name: Especies de cebo
      description: Identifica el organismo principal que se ofrece como cebo, lo que
        ayuda a los pescadores a garantizar la legalidad y la eficacia en la captura
        de las especies objetivo.
    baking_chip_form:
      name: Forma de virutas de horneado
      description: Describe la talla física o forma de las virutas de chocolate para
        hornear, lo que afecta su comportamiento al fundirse y en la apariencia de
        la receta.
    balance_board_style:
      name: Estilo del tablero de equilibrio
      description: Clasifica los tableros de equilibrio según su mecanismo o estilo
        de construcción para indicar cómo se mueve el tablero y el desafío de entrenamiento
        que ofrece.
    balance_cushion_accessories_included:
      name: Accesorios de cojín de equilibrio incluidos
      description: Enumera los accesorios que vienen incluidos con el cojín, lo que
        permite a los compradores comparar el valor del paquete.
    balance_type:
      name: Tipo de equilibrio
      description: Indica el estado/grado de equilibrio del eje de transmisión tal
        como se vende (p. ej., equilibrado de fábrica, equilibrado de alta velocidad,
        desequilibrado).
    ball_bladder_material:
      name: Material de la vejiga del balón
      description: Identifica el material utilizado para la vejiga interna del balonmano,
        lo que afecta la retención de aire, el rebote y la durabilidad general.
    ball_certification:
      name: Certificación de la pelota
      description: Indica certificaciones oficiales de rendimiento o aprobación que
        ha obtenido la pelota.
    ball_construction:
      name: Construcción de la bola
      description: Indica el método de fabricación utilizado para unir los paneles
        de la pelota, lo que afecta a la durabilidad, el tacto, la absorción de agua
        y el precio.
    ball_core_construction:
      name: Construcción del núcleo de la bola
      description: Información sobre la construcción interna de la pelota, lo que
        afecta el rebote y la sensación.
    ball_core_type:
      name: Tipo de núcleo de la bola
      description: Indica la construcción interna de la pelota, lo que afecta el rebote
        y la distribución del peso.
    ball_cup_game_included_pieces:
      name: Juego de pelota y copa incluido
      description: Identifica qué componentes se incluyen en el paquete del producto
        para un juego de pelota y copa.
    ball_drilling_state:
      name: Estado de perforación de la bola
      description: Indica si la bola tiene orificios para los dedos y, en caso afirmativo,
        en qué medida.
    ball_holder_type:
      name: Tipo de soporte para bola
      description: Identifica el estilo estructural o el factor de forma del soporte
        de la bola.
    ball_pit_ball_surface_finish:
      name: Acabado de la superficie de las bolas de la piscina de bolas
      description: Describe el acabado táctil/visual de la superficie de la bola,
        lo que afecta el agarre, la sensación de juego y la limpieza.
    ball_pit_safety_features:
      name: Características de seguridad de la piscina de bolas
      description: Características de diseño relacionadas con la seguridad relevantes
        para las piscinas de bolas.
    ball_pump_accessory_type:
      name: Tipo de accesorio para la bomba de bolas
      description: Define el tipo específico de accesorio la para bomba de bolas para
        que los comerciantes puedan etiquetar manómetros, mangueras, lubricantes y
        otros complementos dentro de una única categoría principal.
    ball_return_mechanism:
      name: Mecanismo de retorno de bolas
      description: Especifica el tipo de sistema de retorno de bolas incorporado en
        la alfombrilla, si lo hubiera.
    ball_return_type:
      name: Tipo de retorno de bolas
      description: Tipo de sistema de bolsillo/retorno que recoge las pelotas durante
        el juego.
    ball_speed_rating:
      name: Clasificación de velocidad de la bola
      description: Categoría de velocidad designada por el fabricante que indica la
        rapidez con la que se comporta la bola en condiciones estándar.
    ball_surface_texture:
      name: Textura de la superficie de bola
      description: Describe la textura exterior o el patrón de estrías de las bolas,
        lo que puede afectar el agarre y la estética.
    ball_surface_type:
      name: Tipo de superficie de la bola
      description: Describe el acabado exterior o la amortiguación de las bolas para
        indicar la sensación del impacto y el agarre.
    ballonet_configuration:
      name: Configuración del globo
      description: Tipo/configuración del sistema de balonet utilizado para el control
        de la presión y el trimado (para dirigibles no rígidos/semirrígidos).
    balloon_closure_valve_type:
      name: Tipo de cierre/válvula de globo
      description: Indica cómo se sella el globo después de inflarlo (p. ej., con
        atadura o válvula autosellante).
    balloon_kit_finish:
      name: Acabado del kit de globos
      description: Describe el acabado superficial/visual de los globos incluidos
        en el kit.
    balloon_kit_material:
      name: Material del kit de globos
      description: Especifica el material principal de los globos incluidos en el
        kit.
    banana_variety:
      name: Variedad de banana
      description: Especifica la variedad o el tipo de banana que se ofrece.
    banjo_head_type:
      name: Tipo de parche de banjo
      description: El tipo/material del parche del banjo, lo que afecta el brillo,
        el volumen y la sensación al tacto.
    banjo_neck_material:
      name: Material del cuello del banjo
      description: Material del mástil, lo que afecta la sensación, la estabilidad
        y el tono.
    banjo_pickup_configuration:
      name: Configuración de pastillas del banjo
      description: Indica si el banjo incluye una pastilla integrada y qué tecnología
        general de captación utiliza.
    banjo_rim_material:
      name: Material del aro del banjo
      description: El material del aro/caja (el cuerpo circular), lo que afecta notablemente
        el tono y el peso.
    banjo_tone_ring_type:
      name: Tipo de anillo de tono del banjo
      description: Especifica el diseño y la familia de materiales del aro de resonancia
        del banjo, lo que da forma al timbre y al volumen.
    banjo_tuning_machine_type:
      name: Tipo de máquina de afinación del banjo
      description: Tipo de clavijas de afinación utilizadas en el banjo.
    banknote_authentication_grading:
      name: Autenticación/clasificación de billetes
      description: Servicio externo (si lo hubiere) que autenticó/calificó el billete.
    banknote_grade:
      name: Grado de billete
      description: Clasificación estandarizada del billete según una escala de coleccionismo
        de billetes.
    banknote_holder_type:
      name: Tipo de portabilletes
      description: Indica el contexto del estado físico del billete (p. ej., suelto
        o en cápsula de certificación).
    banknote_material:
      name: Material del billete
      description: Sustrato/material principal del billete.
    banknote_security_features:
      name: Funciones de seguridad del billete
      description: Características de seguridad y diseño destacables presentes en
        el billete.
    banknote_serial_number_type:
      name: Tipo de número de serie del billete
      description: Indica si el número de serie está presente y/o tiene características
        especiales de coleccionismo (no el número en sí).
    banner_display_location:
      name: Exhibición de pancarta en la sucursal
      description: Especifica el contexto de ubicación previsto para la pancarta (p. ej.,
        puerta, pared, fondo de mesa).
    banner_hanging_hardware_type:
      name: Tipo hardware para colgar pancartas
      description: Especifica los hardware principales de sujeción/colgado integrados
        o incluidos con la pancarta (p. ej., ojales, funda para poste, cuerda).
    banner_message_type:
      name: Tipo de mensaje de la pancarta
      description: Indica si el mensaje/texto de la pancarta está preimpreso (fijo)
        o en blanco/personalizable.
    banner_shape:
      name: Forma de la pancarta
      description: Especifica la forma/corte general de la pancarta para aficionados
        al deporte.
    banquette_configuration:
      name: Configuración de la banqueta
      description: Forma general u orientación de la banqueta.
    bar_coating:
      name: Recubrimiento de la barra
      description: Identifica el recubrimiento comestible exterior aplicado a la barra,
        si lo hubiera.
    bar_pad_style:
      name: Estilo de la almohadilla de la barra
      description: Estilo de diseño de la almohadilla de la barra y la construcción
        de la cubierta.
    bar_texture:
      name: Textura de la barra
      description: Describe la textura o consistencia general de la barra.
    barb_type:
      name: Tipo de púa
      description: Indica si el anzuelo tiene una púa y su estilo.
    barbell_finish:
      name: Acabado de la barra olímpica
      description: Información de la variación/recubrimiento de superficie protectora
        o estética aplicada a la barra olímpica y/o manguitos, lo que afecta la resistencia
        a la corrosión, la sensación de agarre y el precio.
    barbell_knurling_pattern:
      name: Patrón de moleteado de la barra olímpica
      description: Información sobre el estilo y la agresividad de la sección de agarre
        moleteada en una barra olímpica, incluidas marcas específicas para levantamiento
        de pesas o halterofilia.
    barista_suitability:
      name: Aptitud para barista
      description: Describe si el producto está formulado para la preparación y espumado
        de café.
    barre_rail_configuration:
      name: Configuración del riel de barra de ballet
      description: Indica el número de barras horizontales suministradas con la barra
        de ballet.
    barrel_or_cask_type:
      name: Tipo barril o tonel
      description: Especifica el tipo de barrica o tonel utilizado para envejecer
        o terminar el tequila (p. ej., roble americano, barrica ex-bourbon, barrica
        de jerez).
    barrel_profile:
      name: Perfil de la barrica
      description: Describe la forma general o el equilibrio del cañón del dardo.
    barrel_thread_standard:
      name: Estándar de rosca del cañón
      description: Identifica el tipo de rosca del cañón del marcador para comprobar
        su compatibilidad con cañones de repuesto.
    base_anchoring_method:
      name: Método de anclaje de la base
      description: Indica cómo se fija la base al suelo, lo que indica su idoneidad
        para diferentes superficies y condiciones de juego.
    base_ballast_method:
      name: Método de lastre de la base
      description: Indica cómo (o si) la base del entrenador está lastrada para mayor
        estabilidad (p. ej., rellena de agua, rellena de arena).
    base_configuration:
      name: Configuración de la base
      description: Indica la configuración estructural de la base del panel.
    base_fill_material:
      name: Material de relleno de la base
      description: Especifica la sustancia utilizada para rellenar o lastrar la base
        del maniquí de baloncesto, lo que afecta la estabilidad y el esfuerzo de configuración.
    base_ingredient:
      name: Ingrediente base
      description: Identifica el ingrediente agrícola principal a partir del cual
        se destilan el shochu o el soju.
    base_oil_type:
      name: Tipo de aceite base
      description: Especifica la formulación del aceite base del fluido de transmisión
        (p. ej., totalmente sintético, mezcla sintética o convencional).
    base_storage_type:
      name: Tipo de almacenamiento de la base
      description: Especifica si la base incluye almacenamiento integrado y el mecanismo
        utilizado.
    baseball_glove_type:
      name: Tipo de guante de béisbol
      description: Clasifica el guante o la manopla según la posición del jugador
        o su función.
    baseball_softball_league_certification:
      name: Certificación de ligas de béisbol y sóftbol
      description: Especifica los estándares del organismo rector o de la liga que
        cumple el producto.
    baseball_softball_usage_role:
      name: Rol de uso del béisbol/softbol
      description: Especifica el rol o tipo de participante en el campo para el que
        está diseñada la protección para las piernas (p. ej., receptor, bateador,
        árbitro, jugador de campo).
    baseball_toy_set_components_included:
      name: Componentes del juego de juguetes de béisbol incluidos
      description: Especifica qué componentes para jugar al béisbol se incluyen en
        el producto (p. ej., bate, pelota, soporte, bases).
    baseplate_construction:
      name: Construcción de la placa base
      description: Indica el método de fabricación de la placa base del camión, que
        afecta su resistencia y peso.
    basketball_hoop_accessory_type:
      name: Tipo de accesorio para aro de baloncesto
      description: Clasifica el tipo específico de pieza o accesorio para aros de
        baloncesto para su filtrado y comparación.
    basketball_padding_location:
      name: Ubicación de la almohadilla en el balón de baloncesto
      description: Identifica la parte del sistema del balón de baloncesto que la
        almohadilla está diseñada para cubrir.
    basketball_rim_type:
      name: Tipo de aro de baloncesto
      description: Especifica el estilo estructural o de rendimiento del aro de baloncesto
        para que los compradores puedan elegir el diseño que se ajuste a su nivel
        de juego y necesidades de instalación.
    basketball_toy_features:
      name: Características del juguete de baloncesto
      description: Destaca las principales características funcionales/de juego de
        los juguetes de baloncesto más allá de las dimensiones básicas.
    bass_clarinet_body_material:
      name: Material del cuerpo del clarinete bajo
      description: Material principal del cuerpo del clarinete bajo (excluida la mecánica,
        los postes y otros componentes metálicos).
    bass_clarinet_lowest_written_note:
      name: Nota escrita más grave del clarinete bajo
      description: La nota más baja que puede tocar el clarinete bajo (a menudo, descrita
        por los músicos como extensión de Mi♭ grave, Re grave, Do grave o Si grave).
    bass_drum_beater_head_shape:
      name: Forma del cabezal del mazo del bombo
      description: Describe el perfil/la forma geométrica de la superficie de impacto
        del parche del bombo (la cara que entra en contacto con el parche del tambor).
    bass_drum_beater_shaft_material:
      name: Material del eje del mazo del bombo
      description: Especifica el material del eje/varilla del batidor (no del cabezal
        del batidor).
    bass_drum_head_built_in_muffling:
      name: Silenciador incorporado para el parche del bombo
      description: Tipo de amortiguación/silenciamiento integrado incluido en el diseño
        del cabezal.
    bass_drum_head_configuration:
      name: Configuración del parche del bombo
      description: Describe qué parches se incluyen/están instalados en el bombo al
        momento de la compra.
    bass_drum_head_surface_finish:
      name: Acabado superficial del parche del bombo
      description: Textura/acabado de la superficie del parche del bombo.
    bass_drum_head_type:
      name: Tipo de parche de bombo
      description: Tipo de diseño o construcción especial del parche del bombo.
    bass_drum_hoop_material:
      name: Material de los aros del bombo
      description: Identifica el material de los aros del bombo (contraaros), lo que
        afecta la durabilidad, la estética y el peso.
    bass_drum_mounting_style:
      name: Estilo de montaje del bombo
      description: Indica cómo está diseñado el bombo para ser sostenido o utilizado
        (soportes del set, cuna/soporte, arnés de marcha, etc.).
    bass_harmonica_comb_material:
      name: Material del peine para la armónica de bajo
      description: Material del peine/cuerpo (bloque de la cámara de aire) de la armónica
        de bajo.
    bass_harmonica_mouthpiece_style:
      name: Estilo de boquilla de la armónica de bajo
      description: Indica la configuración de la boquilla de la armónica de bajo.
    bass_harmonica_reed_material:
      name: Material de lengüetas para la armónica de bajo
      description: Material de las lengüetas utilizadas en la armónica de bajo.
    bass_harmonica_tuning_system:
      name: Sistema de afinación de la armónica de bajo
      description: Especifica el sistema de afinación/temperamento utilizado para
        la armónica de bajo.
    bass_recorder_bocal_type:
      name: Tipo de boquilla de flauta dulce bajo
      description: Especifica el tipo de tudel/conducto de aire que se utiliza para
        llegar a la boquilla en una flauta dulce bajo.
    bass_recorder_included_accessories:
      name: Accesorios incluidos con la flauta dulce bajo
      description: Enumera los accesorios incluidos con el paquete de la flauta dulce
        bajo.
    bass_recorder_keywork_material:
      name: Material didáctico para flauta dulce bajo
      description: Especifica el material del mecanismo de teclas de la flauta dulce
        (si lo tiene).
    bass_trombone_slide_material:
      name: Material para la vara del trombón bajo
      description: Especifica el material/recubrimiento principal de los tubos exteriores
        de la vara (o del conjunto de la vara) para el trombón bajo.
    bass_trombone_valve_wrap_style:
      name: Estilo de envoltura de la válvula del trombón bajo
      description: Especifica el diseño del revestimiento de la válvula utilizado
        en el instrumento.
    bass_ukulele_string_type:
      name: Tipo de cuerda del ukelele bajo
      description: Indica el tipo general de cadena que se utiliza en el ukelele bajo.
    bassinet_cradle_accessory_features:
      name: Funciones de accesorios para moisés y cunas
      description: Destaca las principales características funcionales o cualidades
        de los accesorios para moisés y cunas (p. ej., impermeables, con certificación
        orgánica, hipoalergénicos).
    bassoon_bell_material:
      name: Material de la campana del fagot
      description: Especifica el material de la campana del fagot.
    bassoon_bocal_system:
      name: Sistema de boquillas del fagot
      description: La variante/tipo de bocal utilizado para diferentes sistemas y
        casos de uso del fagot.
    bassoon_case_shell_type:
      name: Tipo de carcasa del estuche de fagot
      description: Indica la estructura de protección del estuche (blanda, dura o
        híbrida).
    bassoon_keywork_material:
      name: Material de las llaves del fagot
      description: Material o chapado utilizado para el mecanismo de llaves del fagot
        (llaves y herrajes).
    bassoon_model_level:
      name: Nivel de modelo de fagot
      description: Indica el nivel de intérprete previsto para el fagot.
    bassoon_performance_level:
      name: Nivel de rendimiento del fagot
      description: Indica el nivel previsto del instrumentista para el modelo de fagot.
    bassoon_reed_scrape_style:
      name: Estilo de raspado de caña del fagot
      description: Indica el estilo de raspado/perfil de la lengüeta del fagot.
    bassoon_reed_thread_color:
      name: Color del hilo de la caña del fagot
      description: Color del hilo de atado utilizado en la caña.
    bassoon_reed_type:
      name: Tipo de lengüeta del fagot
      description: Especifica el subtipo de lengüeta de fagot compatible con el producto
        (cuando corresponda).
    bassoon_system:
      name: Sistema del fagot
      description: Identifica el sistema de llaves/tradición de diseño del fagot que
        utiliza el instrumento.
    bat_construction:
      name: Construcción del bate
      description: Indica cuántas piezas distintas o secciones unidas componen el
        cuerpo del bate (p. ej., de una pieza, de dos piezas, híbrido), lo que afecta
        la flexibilidad, el control de vibraciones y el rendimiento general.
    bat_handle_size_compatibility:
      name: Compatibilidad de tamaño del mango del bate
      description: Indica los tamaños del mango de bate de críquet para los que está
        diseñado el agarre.
    bath_book_interactive_features:
      name: Características interactivas del libro de baño
      description: El libro de baño incluye funciones de juego y aprendizaje.
    bath_bubble_machine_features:
      name: Características de la máquina de burbujas de baño
      description: Características funcionales clave de la máquina de burbujas para
        baño más allá de la salida de burbujas básica.
    bath_crayon_features:
      name: Características del crayón de baño
      description: Características funcionales y de seguridad clave de los crayones
        de baño.
    bath_squirter_spray_pattern:
      name: Patrón de rociado del rociador de baño
      description: Describe cómo el rociador de baño dispensa agua (el patrón de salida)
        al apretarlo o activarlo.
    bath_toy_molded_drain_design:
      name: Diseño de drenaje moldeado para juguetes de baño
      description: Indica si el juguete está diseñado para drenar/secarse a fin de
        reducir la retención de agua del cliente.
    bath_toy_water_play_function:
      name: Función para jugar con agua del juguete de baño
      description: Identifica el mecanismo principal de interacción/juego con el agua
        del juguete.
    baton_size_standard:
      name: Estándar de tamaño del testimonio
      description: Clasificación del tamaño reglamentario del testimonio de relevo
        (juvenil o sénior).
    battery_case_certification_standard:
      name: Certificación/estándar de caja de batería
      description: Enumera las certificaciones de transporte/seguridad o las normas
        de ensayo pertinentes que cumple la caja para el transporte/almacenamiento
        de baterías.
    battery_case_interior_padding_material:
      name: Material de relleno interior de la caja de batería
      description: Especifica el material principal de amortiguación/revestimiento
        utilizado en el interior de la caja (si corresponde).
    battery_configuration:
      name: Configuración de la batería
      description: Indica el diseño físico/la forma del paquete de batería (factor
        de forma) para que los usuarios puedan adaptar la batería al espacio limitado
        del compartimento en réplicas específicas de airsoft.
    battery_group_size:
      name: Tamaño grupal de la batería
      description: Tamaño de la caja de batería estandarizada (p. ej., BCI Grupo 24F,
        H6) utilizada para la instalación en muchos vehículos.
    battery_polarity:
      name: Polaridad de la batería
      description: Especifica la polaridad/orientación los terminales (posición del
        terminal positivo), que es una restricción clave de compatibilidad para muchas
        baterías de automóviles y vehículos deportivos motorizados.
    battery_standards_supported:
      name: Estándares de baterías compatibles
      description: Especifica los estándares de clasificación de la batería que el
        probador admite al probar el rendimiento de arranque o el estado de la batería.
    battery_voltage_class:
      name: Clase de voltaje de la batería
      description: Clase de sistema de voltaje común para el paquete de baterías del
        vehículo eléctrico, utilizada para un filtrado rápido (p. ej., sistemas de
        400 V o 800 V).
    batting_cage_components_included:
      name: Componentes de la jaula de bateo incluidos
      description: Enumera las piezas individuales que se proporcionan con el producto
        para que los compradores pueda confirmar si se incluye un sistema completo
        o piezas de repuesto específicas.
    batting_helmet_accessories_included:
      name: Accesorios para casco de bateo incluidos
      description: Enumera los accesorios de protección o cosméticos que vienen con
        el casco de bateo.
    batting_stuffing_form_factor:
      name: Formato de guata y relleno
      description: Indica si el producto se vende como relleno suelto, láminas, rollos,
        piezas precortadas o en formas moldeadas.
    batting_stuffing_loft_level:
      name: Nivel de volumen de la guata y el relleno
      description: Indica el nivel de volumen o esponjosidad de la guata o el relleno
        (altura/volumen relativo), normalmente utilizado para la selección de rellenos
        y la confección de colchas.
    batting_stuffing_thermal_insulation_level:
      name: Nivel de aislamiento térmico de la guata y el relleno
      description: Rendimiento relativo de aislamiento térmico del relleno utilizado
        en edredones, chaquetas y mantas.
    batting_tee_base_design:
      name: Diseño de la base del soporte de bateo
      description: Describe el estilo o la construcción de la base del soporte, lo
        que afecta la estabilidad y los tipos de superficies de juego para las que
        es adecuada.
    battle_top_arena_stadium_compatibility:
      name: Compatibilidad con arena o estadio del trompo de batalla
      description: Indica con qué sistema de arena/estadio está diseñado para usarse
        el producto (especialmente, para escenarios o forma de arena especiales).
    battle_top_items_included:
      name: Artículos incluidos del trompo de batalla
      description: Especifica qué artículos de trompo de batalla se incluyen en el
        paquete (p. ej., parte superior, lanzador, estadio/arena, cuerda de lanzamiento,
        piezas de repuesto).
    battle_top_performance_type:
      name: Tipo de rendimiento del trompo de batalla
      description: Describe el estilo de rendimiento general del trompo de batalla,
        lo que suele reflejar cómo se comporta en la arena (agresivo o centrado en
        la resistencia, etc.).
    bayan_included_accessories:
      name: Accesorios incluidos con el bayán
      description: Accesorios incluidos con el bayan (en la caja).
    bayan_tuning_system_type:
      name: Tipo de sistema de sintonización del bayán
      description: Cómo se tensa/afina el bayán (estilo de construcción), lo que
        afecta la portabilidad y facilidad de afinación.
    bb_gun_action_type:
      name: Tipo de acción de la pistola de balines
      description: Indica el mecanismo de carga o de ciclo mecánico de la pistola
        de balines (p. ej., acción de palanca, bombeo, cañón basculante).
    bb_gun_caliber:
      name: Calibre de la pistola de balines
      description: Define el diámetro de las bolas de aire comprimido que la pistola
        está diseñada para disparar, lo que garantiza la compatibilidad de la munición.
    bb_gun_part_type:
      name: Tipo de pieza de la pistola de balines
      description: Clasifica el componente o accesorio específico diseñado para pistolas
        de balines, lo que permite a los compradores localizar rápidamente la pieza
        de repuesto, actualización o complemento exacto (p. ej., cañón, junta del
        pistón, cargador rápido).
    beach_ball_features:
      name: Características de la pelota de playa
      description: Características funcionales destacables específicas de las pelotas
        de playa.
    beach_bucket_features:
      name: Funciones del balde para playa
      description: Características funcionales del cubo de playa, lo que afecta su
        uso, durabilidad y comodidad.
    beach_sand_toy_items_included:
      name: Artículos de juguete para la playa y la arena incluidos
      description: Piezas adicionales incluidas para jugar en la playa o la arena
        con el cubo (si se vende como un conjunto).
    bead_breaker_type:
      name: Tipo de desmontador de talón
      description: Tipo/diseño del mecanismo desmontador de talones.
    bead_hole_style:
      name: Estilo de ojales de cuentas
      description: Especifica el estilo o la configuración del ojal/ranura en la cuenta,
        lo que afecta cómo se asienta en el anzuelo o la línea.
    bead_type:
      name: Tipo de cuenta
      description: Tipo(s) de cuentas principales requerido(s) por el patrón.
    bead_type_patch_embellishment:
      name: Tipo de cuentas (adorno de parche)
      description: Tipo principal de microesferas utilizadas en la superficie del
        parche.
    beaded_accessory_project_type:
      name: Tipo de proyecto de accesorio con cuentas
      description: Qué accesorio se puede hacer con el patrón.
    beading_needle_flexibility:
      name: Flexibilidad de la aguja de abalorios
      description: Flexibilidad relativa del vástago de la aguja para facilitar su
        uso en trazados intrincados con cuentas.
    beading_pattern_bead_size:
      name: Tamaño de las cuentas del patrón de abalorios
      description: Tamaño(s) de cuentas recomendado(s) especificado(s) en el patrón
        (generalmente, tamaños de cuentas pequeñas, p. ej., 11/0, 8/0).
    beading_pattern_chart_format:
      name: Formato de diagrama de patrones de cuentas
      description: Indica cómo se presenta visualmente el patrón (p. ej., mediante
        un gráfico o fotos paso a paso).
    beading_pattern_stitch_technique:
      name: Puntada/técnica de bordado con cuentas
      description: Puntada o técnica principal de tejido con cuentas utilizada en
        el patrón.
    beading_technique_stitch:
      name: Técnica o puntada de tejido con cuentas
      description: Identifica la técnica o puntada de tejido con cuentas principal
        utilizada en el patrón (p. ej., puntada peyote o puntada ladrillo).
    beading_thread_fiber_type:
      name: Tipo de fibra del hilo para tejido con cuentas
      description: Especifica el subtipo de fibra/material del hilo para el tejido
        con cuentas (más específico que el material genérico), lo cual es pertinente
        para el rendimiento.
    beading_thread_size:
      name: Tamaño del hilo de abalorios
      description: Indica la etiqueta de talla del fabricante/industria utilizada
        para el hilo de cuentas (marca/línea específica), p. ej., talla D o 00.
    beading_thread_use_case:
      name: Caso de uso del hilo para tejido con cuentas
      description: Identifica el uso principal recomendado para el hilo de tejido
        con cuentas, lo que ayuda al comprador a elegir el producto adecuado para
        su proyecto.
    beading_wire_coating_material:
      name: Material de recubrimiento de alambre para tejido con cuentas
      description: Especifica el material del revestimiento exterior del alambre para
        tejido con cuentas (si tiene), que afecta la sensación al tacto, la durabilidad
        y la resistencia a las torceduras.
    beading_wire_strand_count:
      name: Número de hebras de alambre para cuentas
      description: Indica la cantidad de hebras en el alambre multifilamento para
        tejido con cuentas (p. ej., 7 hebras, 19 hebras, 49 hebras), lo que influye
        en la flexibilidad y la caída.
    beadlock_type:
      name: Tipo de bloqueo de talón o beadlock
      description: Indica si la rueda usa el sistema de bloqueo de talón o beadlock
        y de qué estilo (útil para compradores de vehículos todoterreno/UTV).
    beam_material:
      name: Material de la viga
      description: Material principal de la viga/barra (a menudo, diferente al de
        los cabezales/accesorios).
    beam_pattern:
      name: Patrón del haz
      description: Patrón de distribución de la luz utilizado para iluminación de
        conducción u off-road.
    bean_bag_fabric_material:
      name: Material de la tela de la bolsa rellena
      description: Identifica la tela exterior utilizada para las bolsas rellenas
        que se incluyen en el set.
    bean_paste_variety:
      name: Variedad de pasta de frijoles
      description: Clasifica el tipo específico de pasta de frijoles según su método
        de producción o el ingrediente principal.
    bean_preparation:
      name: Preparación de frijoles
      description: Indica cómo se preparan o se procesan los granos antes de la venta
        (p. ej., vainas enteras, desgranadas, picadas o germinadas).
    bean_variety:
      name: Variedad de frijoles
      description: Especifica la variedad botánica o comercial de los frijoles (p.
        ej., judías verdes, edamame, frijoles largos).
    beanie_style:
      name: Estilo de gorro
      description: Especifica el diseño general, la confección o la silueta del gorro
        para que el comprador pueda elegir rápidamente entre las variaciones comunes.
    bearing_clearance:
      name: Holgura del rodamiento
      description: Indica la clase de juego radial interno del rodamiento (cantidad
        de holgura interna); la clase C0 también se denomina CN o juego normal.
    bearing_construction_type:
      name: Tipo de construcción del cojinete
      description: Identifica el diseño o tipo de estructura del rodamiento utilizado
        en el buje (p. ej., cartucho o bolas sueltas).
    bearing_edge_type:
      name: Tipo de borde de apoyo
      description: Tipo o perfil del borde de apoyo de la carcasa, que influye en
        el ataque y la resonancia.
    bearing_lubrication:
      name: Lubricación del rodamiento
      description: Indica el tipo de lubricante aplicado al rodamiento durante su
        fabricación, p. ej. grasa o aceite.
    bearing_material:
      name: Material del cojinete
      description: Identifica el material de construcción del rodamiento (p. ej.,
        acero, híbrido cerámico), lo que ayuda a los ciclistas a elegir entre opciones
        de durabilidad, coste y rendimiento.
    bearing_rating:
      name: Clasificación del rodamiento
      description: Especifica la tolerancia o la clase de rendimiento de los rodamientos
        utilizados en los patines (p. ej., ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Código del sello del cojinete
      description: Indica el tipo de sellado utilizado en el rodamiento, que influye
        en la durabilidad y a la resistencia a la rodadura.
    bearing_seal_type:
      name: Tipo de sello del cojinete
      description: Especifica el diseño del sello o blindaje que protege los componentes
        internos del rodamiento de los contaminantes y afecta la fricción (p. ej.,
        2RS, ZZ, LLU, abierto).
    bearing_shield_type:
      name: Tipo de protección de cojinete
      description: Tipo de blindaje o sellado que protege los componentes internos
        del rodamiento.
    bearing_size_code:
      name: Código de tamaño de rodamiento
      description: Designación estandarizada de rodamientos (p. ej., 608, 688) que
        combina los diámetros interior y exterior, y el ancho.
    bearing_type:
      name: Tipo de rodamiento
      description: Especifica el estilo de construcción de los rodamientos utilizados
        en la dirección.
    beater_head_material:
      name: Material del cabezal de batidora
      description: Especifica el material del cabezal/contacto del mazo del bombo
        (p. ej., fieltro, madera, goma).
    beaters_included:
      name: Batidoras incluidas
      description: Especifica cuántos mazos se incluyen con el pedal del tambor (p.
        ej., mazo simple o doble), o si no se incluye ningún mazo.
    bed_base_type:
      name: Tipo de base de la cama
      description: Define el estilo estructural de la base de la cama o del diván
        (p. ej., base plana, somier de láminas flexibles o ajustable).
    bed_storage_type:
      name: Tipo de almacenamiento de la cama
      description: Define el mecanismo de almacenamiento integrado del marco de la
        cama.
    bedroom_furniture_items_included:
      name: Artículos de muebles de habitación incluidos
      description: Especifica las piezas de mobiliario físico que vienen en el juego
        de dormitorio (p. ej., cama, cómoda, mesitas de noche), lo que permite a los
        compradores ver rápidamente lo que se incluye sin tener que leer largas descripciones.
    bedroom_vanity_items_included:
      name: Artículos incluidos en el tocador de dormitorio
      description: Enumera los elementos individuales incluidos con el set de tocador
        para que los clientes sepan exactamente qué se entrega (p. ej., espejo, banqueta
        o kit de iluminación).
    beer_based_cocktail_variety:
      name: Variedad de cócteles a base de cerveza
      description: Clasifica los cócteles a base de cerveza según su variedad específica,
        p. ej., Radler, Shandy, Michelada.
    beet_variety:
      name: Variedad de remolacha
      description: Especifica el cultivo o variedad de remolacha, lo que ayuda a los
        compradores a identificar el sabor, color y los usos culinarios (p. ej., roja,
        dorada, Chioggia).
    bell_actuation_mechanism:
      name: Mecanismo de accionamiento de la campana
      description: Especifica la acción que debe realizar el usuario para hacer sonar
        la campana, lo que ayuda a los compradores a elegir la ergonomía preferida.
    bell_guard_coverage_area:
      name: Área de cobertura del protector de campana
      description: Indica qué parte de la campana resguarda el protector.
    bell_material:
      name: Material de la campana
      description: Material del componente de la campana (si se especifica por separado
        del material general del instrumento).
    bellhousing_bolt_pattern:
      name: Patrón de pernos de la campana de transmisión
      description: Especifica el patrón de pernos estándar o la familia de patrones
        de la carcasa del embrague/lado del motor que utiliza la caja de la transmisión.
    bellows_material:
      name: Material del fuelle
      description: Material del cuerpo o revestimiento del fuelle (si se incluye).
    bellows_orientation:
      name: Orientación del fuelle
      description: Indica la configuración del fuelle utilizada para suministrar aire
        a los tubos.
    belly_panel_style:
      name: Estilo de panel abdominal
      description: Describe la confección de la cinturilla o panel abdominal que se
        adapta al crecimiento del vientre.
    belt_buckle_type:
      name: Tipo de hebilla del cinturón
      description: Describe el mecanismo o diseño específico de la hebilla utilizada
        en el cinturón.
    beret_style:
      name: Tipo de boina
      description: Identifica el diseño específico o la variante cultural de la boina.
    berry_species:
      name: Especie de baya
      description: Indica la especie de baya contenida en el producto para que los
        compradores puedan encontrar rápidamente la variedad que desean.
    beta_casein_variant:
      name: Variante de beta-caseína
      description: Especifica qué variante de proteína beta-caseína (p. ej., A2) está
        presente en la leche para consumidores con preocupaciones en cuanto a la digestibilidad.
    beverage_sweetness_level:
      name: Nivel de dulzura de la bebida
      description: Clasifica la bebida según el grado de dulzor o azúcar añadidos.
    bezel_graduation_units:
      name: Unidades de graduación del bisel
      description: Especifica las marcas de unidad del bisel giratorio (grados, mils
        o escala dual).
    bicycle_brake_set_components_included:
      name: Componentes del juego de frenos de bicicleta incluidos
      description: Enumera las piezas físicas del kit para que los compradores sepan
        exactamente qué se incluye y puedan comparar diferentes configuraciones.
    bicycle_cage_mounting_position:
      name: Posición de montaje del portabicicletas
      description: Especifica en qué parte de la bicicleta está diseñado para instalarse
        el portabidón.
    bicycle_computer_mount_placement:
      name: Ubicación del soporte del ciclocomputador
      description: Identifica dónde se instala el soporte del ciclocomputador en la
        bicicleta, p. ej., adelantado sobre el manillar o en la tapa superior de la
        potencia.
    bicycle_folding_mechanism:
      name: Mecanismo de plegado de la bicicleta
      description: Especifica el sistema de plegado mecánico utilizado en el cuadro
        de la bicicleta (p. ej., plegado a la mitad, plegado vertical).
    bicycle_frame_design:
      name: Diseño del cuadro de la bicicleta
      description: Especifica el estilo general del cuadro de la bicicleta, lo que
        influye en la accesibilidad, la capacidad de carga y el almacenamiento.
    bicycle_frame_style:
      name: Tipo de cuadro de bicicleta
      description: Describe el estilo estructural del cuadro de la bicicleta (de paso
        bajo, lowrider, chopper alargado, etc.), lo que afecta a la postura del ciclista
        y a la estética.
    bicycle_handlebar_type:
      name: Tipo de manillar para bicicleta
      description: Identifica el estilo o la geometría específica del manubrio, lo
        que ayuda a los ciclistas a seleccionar el adecuado según su posición de conducción
        y disciplina.
    bicycle_headset_configuration:
      name: Configuración de la dirección de la bicicleta
      description: Indica el tipo de estructura o estándar del conjunto de dirección
        según la disposición de sus cazoletas (p. ej., cazoleta externa, semintegrada
        o ZeroStack, integrada o roscada).
    bicycle_hub_type:
      name: Tipo de buje de bicicleta
      description: Describe el mecanismo del buje incluido en la rueda, que influye
        en la compatibilidad de la transmisión y el estilo de conducción.
    bicycle_lock_security_certification:
      name: Certificación de seguridad del candado de bicicleta
      description: Certificación externa independiente que valida el rendimiento antirrobo
        (p. ej., Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: Tipo de pedal de bicicleta
      description: Especifica el tipo de funcionamiento o el diseño general del pedal,
        como plataforma, variante sin calas o híbrido, lo que ayuda a los ciclistas
        a elegir la interfaz adecuada para su estilo de conducción.
    bicycle_propulsion_type:
      name: Tipo de propulsión del bicicleta
      description: Especifica cómo se impulsa la bicicleta, ya sea mediante pedaleo
        manual, asistencia eléctrica o motor de combustión interna.
    bicycle_pump_type:
      name: Tipo de bomba de bicicleta
      description: Identifica el estilo estructural de la bomba, lo que ayuda a los
        compradores a elegir el diseño que mejor se adapte a sus necesidades de conducción,
        almacenamiento o emergencia.
    bicycle_rack_mounting_type:
      name: Tipo de montaje del portabicicletas
      description: Describe el método principal o la vía de montaje utilizada para
        fijar el soporte a la bicicleta, lo que ayuda a los usuarios a confirmar la
        compatibilidad con su cuadro y hardware.
    bicycle_suspension_type:
      name: Tipo de suspensión de bicicleta
      description: Identifica la presencia y configuración de la suspensión en la
        bicicleta.
    bicycle_tire_tread_pattern:
      name: Patrón de la banda de rodadura del neumático para bicicleta
      description: Especifica el diseño de la banda de rodadura del neumático, lo
        que influye en la tracción y la resistencia a la rodadura en distintas superficies.
    bidirectional_charging_capability:
      name: Capacidad de carga bidireccional
      description: Indica si el vehículo eléctrico admite modos de carga bidireccional
        como V2G y/o V2H.
    bike_rack_mounting_style:
      name: Estilo de montaje de portabicicletas
      description: Indica cómo se fija la bicicleta en el portabicicletas.
    bike_rack_tilt_function:
      name: Función de inclinación del soporte de la bicicleta
      description: Indica si el portabicicletas cuenta con función de inclinación
        y qué tipo para permitir el acceso al área de carga trasera mientras está
        instalado.
    bikini_top_style:
      name: Tipo de parte superior del bikini
      description: Especifica el diseño o corte de la parte superior del bikini, lo
        que ayuda a los compradores a encontrar el ajuste y la silueta que prefieren.
    billiard_brush_type:
      name: Tipo de cepillo de billar
      description: Define el estilo específico de la herramienta de limpieza para
        mesa de billar (p. ej., cepillo para mesa, cepillo para bandas o bloque para
        paño).
    billiard_glove_finger_coverage:
      name: Cobertura de dedos del guante de billar
      description: Identifica qué dedos cubre el diseño del guante, lo que permite
        un filtrado preciso para los estilos de guantes específicos para billar.
    billiard_pocket_style:
      name: Estilo de tronera de billar
      description: Especifica el estilo estructural o estético del bolsillo, lo que
        afecta la compatibilidad y la decoración de la mesa.
    billiard_rack_style:
      name: Tipo de triángulo para billar
      description: Describe el estilo físico o el mecanismo del soporte (p. ej., marco
        tradicional, hoja de plantilla, plegable).
    billiard_table_type:
      name: Tipo de mesa de billar
      description: Especifica la modalidad de billar o el tipo de uso para el que
        está diseñada la mesa (p. ej., billar americano, snooker o carambola).
    billiards_discipline:
      name: Disciplina de billar
      description: Indica la modalidad específica de billar (tipo de juego) compatible
        con el diseño del producto.
    binding_compatibility_standard:
      name: Estándar de compatibilidad de la fijación
      description: Identifica la interfaz de fijación (norma de suela) para la cual
        está certificada la bota de esquí, lo que garantiza una compatibilidad segura
        y correcta con las fijaciones de esquí.
    binding_inclusion:
      name: Inclusión de fijaciones
      description: Especifica si los esquís se venden sin fijaciones, con un sistema
        integrado o con fijaciones incluidas por separado.
    binding_interface:
      name: Interfaz de fijación
      description: Indica la placa de fijación o el estándar de interfaz con el que
        los esquís vienen premontados o son compatibles, lo que garantiza la compatibilidad
        entre la bota y la fijación.
    binding_liner_type:
      name: Tipo de botín interior de la fijación o bota
      description: Describe el tipo de botín interior utilizado en la fijación/bota
        (p. ej., extraíble, apto para caminar, termomoldeable).
    binding_mounting_system:
      name: Sistema de montaje de la fijación
      description: Identifica la interfaz utilizada para fijar la fijación al esquí
        (montaje plano, riel/pista, placa, etc.).
    binding_position:
      name: Posición de encuadernado
      description: Indica la posición o configuración de montaje prevista para la
        fijación (p. ej., bota delantera, bota trasera o ARTP).
    binding_strap_position:
      name: Posición de la correa de fijación
      description: Especifica en qué punto de la fijación se debe instalar la correa.
    bingo_components_included:
      name: Componentes de bingo incluidos
      description: Enumera los componentes incluidos en el set de bingo, como bolas,
        cartones y marcadores.
    bingo_number_range:
      name: Rango de números de bingo
      description: Identifica el rango/variante de números de bingo que admite el
        conjunto.
    bingo_set_features:
      name: Características del juego de bingo
      description: Identifica el formato principal del juego de bingo (físico/manual
        o electrónico/interactivo).
    bipod_mounting_interface:
      name: Interfaz de montaje del bípode
      description: Especifica la interfaz de montaje utilizada para conectar el bípode
        al arma de fuego o al sistema de rieles.
    bit_attachment_type:
      name: Tipo de sujeción de broca
      description: Especifica cómo se conecta la cabezada al freno (p. ej., extremos
        con tiras, con hebilla o con tornillos Chicago).
    bit_mouthpiece_design:
      name: Diseño de la embocadura del freno
      description: Identifica el estilo estructural o la configuración de la articulación
        de la boquilla, lo que rige la distribución de la presión, el espacio libre
        para el paladar y el nivel de severidad general.
    bit_ring_style:
      name: Tipo de anilla del freno
      description: Define el estilo de la carrillera o anilla del bocado que se sujeta
        a la brida, lo que afecta la acción, la guía lateral y la sensación de las
        riendas.
    bladder_material:
      name: Material de la vejiga
      description: Identifica el material utilizado para la cámara interna que contiene
        el aire.
    blade_attachment_type:
      name: Tipo de sujeción de la hoja
      description: Identifica si el patín utiliza un mecanismo clap (articulado) o
        una fijación de cuchilla fija.
    blade_finish_coating:
      name: Acabado o recubrimiento de la hoja
      description: Tratamiento superficial aplicado a la hoja con fines estéticos
        o de protección contra la corrosión.
    blade_hosel_type:
      name: Tipo de unión entre la hoja y el hosel
      description: Especifica el tipo de conexión del hosel de la hoja que encaja
        en el eje, lo que influye en la compatibilidad (p. ej., estándar o cónico).
    blade_length_type:
      name: Tipo de longitud de la hoja
      description: Clasifica la longitud de la pala de la aleta como corta, mediana
        o larga, lo que influye en la cadencia de patada y los objetivos de entrenamiento.
    blade_lie:
      name: Ángulo de apoyo de la pala
      description: Especifica el número de lie de la pala del stick de hockey para
        indicar cómo se apoya la pala sobre el hielo en relación con el mango del
        palo.
    blade_sharpness:
      name: Filo de la cuchilla
      description: Indica el nivel de filo para fines de entrenamiento.
    blade_size_category:
      name: Categoría de tamaño de la cuchilla
      description: Código internacional estandarizado de tamaño de la cuchilla sable
        (de 0 a 5) utilizado para distinguir hojas de categorías infantil y adulta.
    blade_size_class:
      name: Clase de tamaño de la cuchilla
      description: Clasifica la pala según la categoría de tamaño del jugador y el
        tamaño del mango en categorías como Juvenil, Junior, Intermedio o Senior.
    blade_size_number:
      name: Tamaño de la cuchilla
      description: Código numérico estándar de tamaño (de 0 a 5) definido por las
        normas de esgrima que determina la longitud de la hoja y la categoría de edad.
    blaster_mechanism:
      name: Mecanismo de funcionamiento del lanzador
      description: Define el mecanismo de funcionamiento interno del lanzador de gel
        (p. ej., GBB, AEG, de resorte).
    block_edge_style:
      name: Estilo de borde de bloque
      description: Describe el acabado de los bordes/esquinas de los bloques de madera
        con fines de seguridad.
    blocking_mat_features:
      name: Funciones de la esterilla para ahormar
      description: Características funcionales específicas de las bases de bloqueo
        (almacenamiento, portabilidad, facilidad de uso).
    blocking_mat_grid_unit:
      name: Unidad de cuadrícula de la base de bloqueo
      description: Sistema de unidades utilizado en la cuadrícula impresa, que ayuda
        a los usuarios a ajustar patrones y medidas.
    blocking_mat_surface_markings:
      name: Marcas de superficie de la alfombrilla de bloqueo
      description: Tipo de marcas de medición/guía impresas o moldeadas en la superficie
        de la base de bloqueo.
    blocking_wire_coating:
      name: Recubrimiento de alambre de bloqueo
      description: Tratamiento o recubrimiento superficial del alambre de bloqueo
        que influye en la resistencia al óxido, la suavidad y el riesgo de enganches.
    blocking_wire_end_cap_type:
      name: Tipo de terminal del alambre de bloqueo
      description: Especifica el tipo de protección o acabado en los extremos del
        alambre de bloqueo para mayor seguridad y protección de la tela.
    blocking_wire_set_includes:
      name: Elementos incluidos en el set de alambres de bloqueo
      description: Especifica qué componentes se incluyen con el producto de alambre
        de bloqueo (p. ej., alfileres en T o tubo de almacenamiento).
    blocking_wire_usage:
      name: Uso de cables de bloqueo
      description: Indica el uso principal del alambre de bloqueo flexible.
    bloom_stage:
      name: Etapa de floración
      description: Indica qué tan abiertas están las flores de margarita en el momento
        de la entrega/envío.
    blower_motor_bearing_type:
      name: Tipo de cojinete/rodamiento del motor del soplador
      description: Especifica el diseño del cojinete/rodamiento del motor del soplador.
    blower_motor_mounting_position:
      name: Posición de montaje del motor del ventilador
      description: Dónde está instalado el motor del ventilador en el vehículo/módulo
        HVAC (p. ej., parte delantera o trasera).
    blowpipe_valve_type:
      name: Tipo de válvula del tubo de soplado
      description: Especifica el tipo de válvula de soplete incluida (si la hay).
    bo_staff_style:
      name: Tipo de bastón bo
      description: Define el tipo de estructura o construcción del bastón bo (p. ej.,
        recto, cónico, acolchado con espuma o desmontable).
    board_game_theme:
      name: Tema de juego de mesa
      description: Temática o ambientación narrativa del juego de mesa (utilizada
        para búsqueda y exploración).
    board_rail_shape:
      name: Forma del canto de la tabla
      description: Especifica el perfil de los cantos de la tabla (p. ej., suaves,
        duros o 50/50), lo que influye en el agarre y la propulsión sobre la ola.
    board_size_classification:
      name: Clasificación del tamaño de la tabla
      description: Clasifica la tabla o el juego de cornhole en tamaños estandarizados
        comunes.
    board_type_compatibility:
      name: Compatibilidad de tipo de tabla
      description: Especifica el tipo de tabla compatible con la correa.
    boat_construction_type:
      name: Tipo de construcción del bote
      description: Describe el formato o el estilo estructural del bote de remos (p.
        ej., inflable, rígido).
    boat_hook_flotation:
      name: Flotabilidad del bichero
      description: Indica si el bichero está diseñado para flotar en caso de caer
        al agua.
    boat_ladder_stowage_style:
      name: Estilo de almacenamiento de la escalera de embarcación
      description: Describe cómo se guarda la escalera cuando no está en uso (p. ej.,
        plegable, retráctil, extraíble).
    boat_trailer_construction_type:
      name: Tipo de estructura del remolque para embarcaciones
      description: Indica si el remolque sostiene la embarcación mediante soportes,
        rodillos o un sistema híbrido.
    boat_weaving_shuttle_weft_exit_type:
      name: Tipo de salida de trama de la lanzadera tipo bote
      description: Indica cómo sale el hilo de trama de la lanzadera durante el tejido.
    bobbin_loading_type:
      name: Tipo de carga de bobina
      description: Especifica cómo se inserta/carga la bobina en la máquina de coser.
    bobbin_system:
      name: Sistema de bobinas
      description: El sistema/tipo de carga de la bobina que utiliza la máquina de
        coser.
    bobbin_type:
      name: Tipo de bobina
      description: Especifica el formato de portahilo compatible o incluido con la
        lanzadera, lo que determina el uso habitual (p. ej., las lanzaderas tipo bote
        suelen usar bobinas, mientras que las lanzaderas para tiras de tela pueden
        ser abiertas).
    bobbin_winder_winding_direction:
      name: Dirección de bobinado del devanador de bobinas
      description: Especifica la dirección de bobinado o rotación compatible con el
        devanador de bobinas.
    bobble_mechanism:
      name: Mecanismo de cabeceo
      description: Especifica el estilo del mecanismo de rebote, lo que afecta el
        movimiento y la durabilidad.
    bocal_material:
      name: Material bocal
      description: Especifica el material de las boquillas incluidas.
    bodhr_n_head_material:
      name: Material del parche del bodhrán
      description: Es el material del parche (membrana) del tambor, que influye notablemente
        en el tono y los requisitos de mantenimiento.
    bodhr_n_tuning_system_type:
      name: Tipo de sistema de sintonización del bodhrán
      description: El tipo de mecanismo de afinación integrado utilizado para ajustar
        la tensión del parche (si admite afinación).
    body_armor_coverage_area:
      name: Área de cobertura de la protección corporal
      description: Indica qué zonas del cuerpo protege el producto.
    body_armor_intended_use:
      name: Uso previsto de la protección corporal
      description: Especifica el escenario principal de conducción o uso que admite
        el diseño de la protección corporal para ATV/UTV.
    body_cord_connector_style:
      name: Tipo de conector del cable corporal
      description: Describe la configuración del conector en los extremos del cable
        (p. ej., número de clavijas o tipo de bayoneta), lo que determina la compatibilidad
        con las armas y las cajas de puntuación.
    body_panel_finish_state:
      name: Estado de acabado del panel de la carrocería
      description: Describe el estado de preparación o acabado de la superficie del
        panel lateral tal como se vende, para su pintura o instalación.
    body_shape:
      name: Forma del cuerpo
      description: Especifica la forma o estilo general del cuerpo de la guitarra
        eléctrica.
    bodysuit_bottom_coverage:
      name: Cobertura inferior del body
      description: Define el corte y el nivel de cobertura de la parte inferior del
        body, lo que influye en la comodidad y la compatibilidad con distintas prendas.
    boilie_shape:
      name: Forma del cebo boilie
      description: Identifica la forma de los boilies producidos por la bandeja moldeadora,
        lo que permite a los pescadores elegir entre distintos perfiles de cebo.
    boilie_stop_buoyancy:
      name: Flotabilidad del tope para boilie
      description: Especifica si el tope para boilies está diseñado para flotar, hundirse
        o mantener una flotabilidad neutra, lo que influye en la presentación del
        cebo en la columna de agua.
    bok_choy_variety:
      name: Variedad de bok choy
      description: Especifica el cultivar, nombre comercial o variedad del bok choy
        (p. ej., Baby, Shanghai, Nai Bai, Tatsoi o Purple Lady), lo que permite a
        los compradores elegir el sabor, tamaño y apariencia deseados.
    bolt_drive_style:
      name: Tipo de accionamiento del perno
      description: Especifica el tipo de accionamiento de los pernos de montaje del
        skateboard, diferenciando entre tipos comunes de cabeza o herramienta, como
        Allen o Phillips.
    bone_content:
      name: Contenido de hueso
      description: Indica si la carne contiene huesos.
    bongo_center_block_material:
      name: Material del bloque central de los bongós
      description: Material del bloque central que conecta los dos cascos de los bongós
        (si corresponde).
    bongo_shell_material:
      name: Material de la concha del bongo
      description: Material de los cascos de los bongos (cuerpos de los tambores),
        excluidos los parches y la herrajería.
    bongo_tuning_system:
      name: Sistema de afinación del bongo
      description: Indica la estructura o el método de afinación de los bongós (p.
        ej., afinación tradicional con tensores o mediante cuerdas), lo que influye
        en el mantenimiento y la autenticidad.
    boning_type:
      name: Tipo de ballenas
      description: Identifica el sistema de soporte estructural interno del corsé
        reductor, incluido el material y el tipo o forma de las varillas utilizadas,
        lo que influye directamente en el nivel de soporte, la flexibilidad y la durabilidad.
    boot_liner_type:
      name: Tipo de botín interior
      description: Describe la estructura o la capacidad de personalización del botín
        interior de la bota de snowboard (p. ej., termoformable o extraíble).
    boot_sole_compatibility:
      name: Compatibilidad de suelas de botas
      description: Indica las normas de suela o sistemas de interfaz de bota compatibles
        con la fijación.
    boot_support_level:
      name: Nivel de soporte de la bota
      description: Describe el nivel general de rigidez o soporte del tobillo o la
        bota proporcionado por el patín.
    boot_width_code:
      name: Código de ancho de la bota
      description: Designación de ancho por letras utilizada por el fabricante específicamente
        para talles de patines artísticos (p. ej., AAA, AA, B, C o D).
    booth_configuration:
      name: Configuración de la cabina
      description: Identifica la configuración general de los asientos de la cabina
        (p. ej., de un solo lado, en esquina, modular).
    bootie_toe_design:
      name: Diseño de la puntera del botín
      description: Identifica el estilo de construcción de la puntera de los botines
        de surf y las botas de arrecife.
    border_type:
      name: Tipo de borde
      description: Acabado del borde o estilo del contorno del parche bordado, lo
        que influye en la apariencia, la resistencia al deshilachado y la calidad
        percibida.
    bore_cleaner_format:
      name: Formato del limpiador de cañones
      description: Indica el formato físico del producto de limpieza del cañón (herramienta
        o consumible).
    bore_cleaner_safe_for_finish:
      name: Limpiador de cañón seguro para el acabado
      description: Indica con qué acabados comunes de instrumentos de latón se puede
        utilizar de forma segura el limpiador de cañones.
    bottle_cage_loading_direction:
      name: Dirección de carga del portabotellas
      description: Describe la dirección desde la que se inserta o retira la botella
        del portabidón.
    bottle_neck_finish_closure_size:
      name: Acabado del cuello o tamaño del cierre de la botella
      description: Indica el tamaño estandarizado de la abertura o el acabado del
        cuello de la botella para garantizar la compatibilidad con tapas, corchos
        y tapadoras (p. ej., acabado corona de 26 mm).
    bottle_style:
      name: Tipo de botella
      description: Formatos comunes de botellas utilizados para embotellado casero
        de cerveza y elaboración de vino.
    bottom_bracket_interface:
      name: Interfaz del eje pedalier
      description: Identifica el estándar de eje o eje pedalier para el que está diseñado
        el juego de bielas, lo que garantiza la compatibilidad con el cuadro y el
        eje pedalier.
    bottom_bracket_standard:
      name: Estándar de pedalier
      description: La caja o interfaz del eje pedalier compatible con el cuadro determina
        la compatibilidad con el juego de bielas.
    bottom_type_suitability:
      name: Compatibilidad del tipo de fondo
      description: Especifica el estado del lecho/fondo marino en el que el ancla
        está diseñada para sujetarse mejor.
    bounce_level:
      name: Nivel de rebote
      description: Indica cuánto rebota la pelota al dejarla caer o lanzarla, lo que
        ayuda a los usuarios a elegir la pelota adecuada para ejercicios como lanzamientos
        contra la pared o slams.
    bouncy_ball_surface_finish:
      name: Acabado de la superficie de las pelotas saltarinas
      description: Especifica el acabado superficial táctil y/o visual de una pelota
        saltarina (p. ej., liso, con púas, con purpurina).
    boundary_marker_type:
      name: Tipo de marcador de límite
      description: Define el formato físico del marcador o producto de demarcación
        para campos o canchas (p. ej., cono, cinta, pintura, plantilla o máquina).
    bouquet_size_tier:
      name: Categoría de tamaño del ramo
      description: Categoría estandarizada de tamaño para el ramo o manojo, independientemente
        de la cantidad de tallos (útil cuando incluye tallos variados).
    bow_and_yo_yo_edge_finish:
      name: Acabado de borde del moño o yo-yo
      description: Describe el acabado del borde o ribete utilizado en el moño o yo-yo
        (especialmente en moños hechos con cinta).
    bow_case_shell_type:
      name: Tipo de carcasa del estuche del arco
      description: Describe la construcción estructural del exterior del estuche para
        arco (p. ej., carcasa rígida o funda blanda).
    bow_compatibility:
      name: Compatibilidad del arco
      description: Especifica el tipo de arco compatible con la punta de caza.
    bow_hair_color:
      name: Color del pelo del arco
      description: Identifica el color o apariencia de las cerdas utilizadas en el
        arco de un instrumento de cuerda orquestal (p. ej., blancas/decoloradas, blanco
        natural o negras).
    bow_stick_material:
      name: Material de la vara del arco
      description: Identifica el material utilizado para la vara del arco (el eje
        principal), lo que afecta notablemente en el peso, la sensación al tacto y
        el precio.
    bow_type:
      name: Tipo de arco
      description: Especifica el diseño estructural del arco juvenil (p. ej., compuesto,
        recurvo o longbow), lo que influye considerablemente en el estilo de tiro,
        los accesorios necesarios y los programas de entrenamiento.
    bow_winding_material:
      name: Material de bobinado del arco
      description: Especifica el material utilizado para el enrollado/envoltura del
        arco, lo que afecta el agarre y el equilibrio.
    bow_yo_yo_embellishment_style:
      name: Estilo de adorno de moño
      description: Identifica el estilo de confección del adorno (moño o yo-yo de
        tela).
    bowling_ball_core_type:
      name: Tipo de núcleo para para bolas de bolos
      description: Identifica el diseño interno del núcleo o la simetría de la bola
        de bolos, lo que influye en el movimiento y el potencial de gancho.
    bowling_ball_coverstock_type:
      name: Tipo de recubrimiento exterior de la bola de bolos
      description: Especifica el material o la tecnología del recubrimiento exterior
        de la bola de bolos, lo que determina la tracción y el potencial de gancho.
    bowling_set_style:
      name: Tipo de juego de bolos
      description: Define el estilo general o el caso de uso del juego de bolos.
    box_lid_type:
      name: Tipo de tapa de la caja
      description: Tipo de tapa o mecanismo de apertura de la caja o lata de regalo.
    box_spring_profile:
      name: Perfil del somier
      description: Clasifica la altura general del somier en categorías de perfil
        fáciles de identificar para el comprador (p. ej., perfil bajo, estándar o
        alto), de modo que los clientes puedan filtrar opciones rápidamente sin necesidad
        de conocer las medidas exactas.
    box_spring_requirement:
      name: Requisito de somier
      description: Indica si el colchón requiere una base adicional tipo somier o
        base.
    boxing_ring_style:
      name: Estilo de ring de boxeo
      description: Clasifica el tipo de construcción general o el escenario de uso
        previsto del ring (p. ej., competición o entrenamiento, elevado o de piso).
    bra_length_type:
      name: Tipo de longitud de sujetador
      description: Define la clasificación de largo de los sujetadores según la cobertura
        vertical como estándar, longline, midi o corto.
    bra_padding_type:
      name: Tipo de relleno del sujetador
      description: Describe el nivel o la presencia de relleno en las copas.
    braces_compatibility:
      name: Compatibilidad con soportes
      description: Especifica si el protector bucal se puede usar con aparatos de
        ortodoncia y en qué medida.
    brake_band_form:
      name: Forma de la banda de freno
      description: Indica si la banda de freno se suministra como un bucle continuo
        (sin fin) o como una longitud cortada que debe sujetarse.
    brake_band_material_type:
      name: Tipo de material de la banda de freno
      description: Especifica el material funcional de la banda de freno (p. ej.,
        cordón de algodón, línea de nailon o acero para resortes), lo que influye
        en la durabilidad, el agarre, la elasticidad y el ruido.
    brake_band_style:
      name: Tipo de banda de freno
      description: Especifica el sistema/estilo de tensión de la banda de freno utilizado
        en una rueca para aplicar tensión al volante/bobina.
    brake_bleeding_method:
      name: Método de purga de frenos
      description: Método de purga compatible con el kit.
    brake_booster_assist_type:
      name: Tipo de asistencia al servofreno
      description: Indica el mecanismo de asistencia utilizado por el servofreno.
    brake_booster_diaphragm_configuration:
      name: Configuración del diafragma del servofreno
      description: Indica la cantidad o el tipo de diafragmas utilizados en el servofreno.
    brake_caliper_bleeder_screw_position:
      name: Posición del tornillo de purga de la pinza de freno
      description: Especifica la posición del tornillo de purga en la pinza de freno
        una vez instalada (se utiliza para verificar que el tornillo de purga esté
        orientado en el punto más alto para una purga adecuada).
    brake_caliper_finish:
      name: Acabado de la pinza de freno
      description: Especifica el acabado superficial o el recubrimiento protector
        aplicado al cuerpo de la pinza de freno (p. ej., pintura, revestimiento metálico
        o anodizado).
    brake_caliper_included_hardware:
      name: Herrajes incluidos de la pinza de freno
      description: Especifica qué componentes se incluyen con el conjunto de la pinza
        de freno.
    brake_caliper_mount_type:
      name: Tipo de montaje de la pinza de freno
      description: Tipo de interfaz de montaje utilizada para fijar la pinza de freno
        al buje/soporte.
    brake_caliper_paint_base_chemistry:
      name: Química base de la pintura de la pinza de freno
      description: Sistema de pintura/resina o la familia química utilizada.
    brake_caliper_paint_kit_contents:
      name: Contenido del kit de pintura de la pinza de freno
      description: Indica qué se incluye en el paquete además de la pintura en sí.
    brake_circuit_type:
      name: Tipo de circuito de freno
      description: Configuración del circuito hidráulico compatible con el cilindro
        maestro.
    brake_clutch_fluid_base_chemistry:
      name: Química básica de líquido de frenos y embrague
      description: Base química principal del fluido hidráulico de freno/embrague,
        lo que influye en la compatibilidad y la miscibilidad.
    brake_clutch_fluid_dot_specification:
      name: Especificación DOT del fluido de freno/embrague
      description: Clasificación de rendimiento DOT para fluidos hidráulicos de freno/embrague
        (p. ej., DOT 3 o DOT 4).
    brake_drum_finish_coating:
      name: Acabado/revestimiento del tambor de freno
      description: Acabado superficial o recubrimiento protector aplicado al tambor
        de freno (p. ej., recubrimiento por electrodeposición, pintado, galvanizado).
    brake_drum_type:
      name: Tipo de tambor de freno
      description: Tipo de diseño del tambor de freno (con o sin cubo/rodamiento integrado).
    brake_fluid_base:
      name: Base de líquido de frenos
      description: Especifica la formulación del líquido de frenos hidráulico requerida
        o incluida.
    brake_fluid_base_chemistry:
      name: Base química del líquido de frenos
      description: Define la base química del líquido de frenos, lo que determina
        la compatibilidad y las reglas de mezcla.
    brake_fluid_dot_specification:
      name: Especificación de líquido de frenos del DOT
      description: Indica la clasificación o especificación DOT del líquido de frenos
        (p. ej., DOT 3 o DOT 4) para productos de líquido de frenos.
    brake_fluid_standards_compliance:
      name: Cumplimiento de normas del líquido de frenos
      description: Normas industriales que el líquido de frenos declara que cumple
        (además de la clasificación DOT).
    brake_fluid_type:
      name: Tipo de líquido de frenos
      description: Especifica el líquido de frenos requerido para las pinzas de freno
        hidráulicas de bicicleta.
    brake_hose_end_fitting_type:
      name: Tipo de conexión de los extremos de la manguera de freno
      description: Tipo de conexión en cada extremo de la manguera de freno (p. ej.,
        banjo, abocardada o rosca hembra/macho) utilizada para garantizar la compatibilidad
        con pinzas y líneas de freno.
    brake_lever_pull_type:
      name: Tipo de recorrido de la palanca de freno
      description: Define la relación de tiro o el mecanismo del cable para el que
        está diseñada la maneta, lo que garantiza la compatibilidad con pinzas de
        freno específicas (p. ej., frenos de llanta de tiro corto o frenos V-brake
        de tiro largo).
    brake_light_switch_actuation_type:
      name: Tipo de activación de interruptores de luces de freno
      description: Identifica qué evento físico acciona el interruptor (pedal/émbolo,
        presión hidráulica, etc.).
    brake_light_switch_connector_type:
      name: Tipo de conector de interruptores de luces de freno
      description: Especifica el tipo o formato de conector eléctrico que utiliza
        el interruptor de la luz de freno para conectarse al arnés del vehículo.
    brake_light_switch_contact_type:
      name: Tipo de conector de interruptores de luces de freno
      description: Configuración/comportamiento de los contactos eléctricos del interruptor
        de la luz de freno (p. ej., normalmente abierto/cerrado, conmutador o multicircuito).
    brake_light_switch_mounting_style:
      name: Estilo de montaje del interruptor de la luz de freno
      description: Indica se monta o instala el interruptor de la luz de freno en
        el vehículo o sistema de frenos (p. ej., roscado, a presión, con soporte o
        mediante tornillo banjo).
    brake_master_cylinder_mounting_type:
      name: Tipo de montaje del cilindro maestro de freno
      description: Cómo se monta el cilindro maestro en el vehículo/servofreno (patrón
        de pernos/tipo de brida).
    brake_master_cylinder_reservoir_type:
      name: Tipo de depósito de cilindros maestros del freno
      description: Tipo/configuración del líquido de frenos suministrado o que requiere
        el cilindro maestro.
    brake_mount_type:
      name: Tipo de montaje de freno
      description: Identifica la interfaz de frenado integrada en la horquilla para
        que los ciclistas puedan confirmar la compatibilidad del sistema de frenado.
    brake_mounting_flange_bolt_pattern:
      name: Patrón de pernos de la brida de montaje del freno
      description: Especifica el patrón de orificios/pernos de la brida de montaje
        que se utiliza para fijar la placa de soporte del freno o el soporte de la
        pinza al eje del remolque (p. ej., 4 pernos).
    brake_pad_backing_plate_material:
      name: Material de la placa de soporte de la pastilla de freno
      description: Especifica el material de la placa de soporte de la pastilla de
        freno, lo que afecta la disipación del calor y el peso.
    brake_pad_compatible_rotor_type:
      name: Tipo de rotor compatible con la pastilla de freno
      description: Especifica el tipo de superficie del rotor/disco con la que la
        pastilla está diseñada para funcionar.
    brake_pad_compound:
      name: Compuesto de la pastilla de freno
      description: Identifica la composición del material de fricción de la pastilla
        de freno.
    brake_pad_form_factor:
      name: Factor de forma de la pastilla de freno
      description: Especifica el sistema de freno o factor de forma para el que está
        diseñada la pastilla (p. ej., disco, tambor o freno de estacionamiento).
    brake_pad_material:
      name: Material de la pastilla de freno
      description: Especifica el compuesto/familia de materiales de fricción utilizados
        en el revestimiento de las pastillas de freno.
    brake_pad_shim_included:
      name: Lámina separadora pastillas de freno incluida
      description: Indica si se incluyen o están preinstaladas láminas reductoras
        de ruido.
    brake_pad_wear_indicator_type:
      name: Tipo de indicador de desgaste de la pastilla de freno
      description: Indica qué tipo de indicador de desgaste se incluye con las pastillas
        de freno (p. ej., lengüeta de aviso mecánica o sensor electrónico).
    brake_position:
      name: Posición del freno
      description: Indica en qué parte del vehículo se debe instalar el componente
        de frenado.
    brake_rotor_mount_type:
      name: Tipo de montaje de rotor de freno
      description: Define la interfaz utilizada para fijar un disco de freno al cubo
        (si corresponde).
    brake_service_kit_components_included:
      name: Componentes del kit de servicio de frenos incluidos
      description: Lista de las herramientas, adaptadores y consumibles incluidos
        en el kit de servicio de frenos.
    brake_shoe_friction_material:
      name: Material de fricción de las zapatas de freno
      description: El compuesto de fricción o revestimiento utilizado en la zapata
        de freno (el material que entra en contacto con el tambor).
    brake_shoe_set_contents:
      name: Contenido del juego de zapatas de freno
      description: Qué incluye el paquete (p. ej., solo zapatas o zapatas más herrajes/resortes).
    brake_system_type:
      name: Tipo de sistema de frenos
      description: Especifica la tecnología del mecanismo de frenado utilizada para
        controlar la rotación de la bobina durante el lanzamiento.
    brake_type:
      name: Tipo de freno
      description: Tipo de mecanismo de freno o tensado del plegador.
    brandy_age_classification:
      name: Clasificación de estacionamiento de brandy
      description: Categoriza el brandy según designaciones estándar de calidad o
        envejecimiento de la industria (p. ej., VS, VSOP o XO), que reflejan requisitos
        mínimos de añejamiento.
    brass_cleaning_tool_type:
      name: Tipo de herramienta de limpieza de latón
      description: Especifica el tipo de herramienta que se utiliza para limpiar o
        mantener los instrumentos de metal.
    brass_instrument_application_area:
      name: Área de aplicación del instrumento de viento-metal
      description: La(s) parte(s) del instrumento de viento-metal sobre la(s) que
        el aerosol desinfectante está diseñado para usarse.
    brass_instrument_care_kit_purpose:
      name: Propósito del kit de cuidado para instrumentos de viento-metal
      description: Describe el escenario de uso previsto del kit (mantenimiento de
        rutina, limpieza profunda, viajes o emergencias, kit inicial para estudiantes,
        etc.).
    brass_instrument_case_shell_material:
      name: Material de la carcasa de la funda del instrumento de viento-metal
      description: Material principal de la carcasa/marco rígido (cuando corresponda),
        separado del material general de la bolsa/funda.
    brass_instrument_lubricant_additives_features:
      name: Aditivos o características del lubricante para instrumentos de metal
      description: Características funcionales destacadas de la formulación del lubricante.
    brass_instrument_lubricant_base_composition:
      name: Composición base del lubricante para instrumentos de metal
      description: Base o composición química principal utilizada en lubricantes para
        instrumentos de metal.
    brass_instrument_lubricant_viscosity_grade:
      name: Grado de viscosidad del lubricante para instrumentos de metal
      description: Flujo/espesor relativo del lubricante destinado a instrumentos
        de viento-metal.
    brass_instrument_replacement_part_type:
      name: Tipo de pieza de repuesto de instrumentos de metal
      description: Especifica qué tipo de pieza de repuesto es para instrumentos de
        metal (componentes de válvula/corredera/llave de desagüe, corchos/fieltros,
        protectores, etc.).
    brass_instrument_valve_configuration:
      name: Configuración de la válvula para instrumentos de viento-metal
      description: Cómo cambia el tono del instrumento (mecanismo de válvula/corredera).
    brass_lubricant_application_area:
      name: Área de aplicación de lubricante para latón
      description: El mecanismo de instrumentos de viento-metal para el que está destinado
        el lubricante.
    brass_mouthpiece_backbore:
      name: Perforación posterior de la boquilla para instrumentos de metal
      description: Perfil o categoría de la perforación posterior o backbore de la
        boquilla (forma o tamaño), lo que influye en el tono y la afinación.
    brass_mouthpiece_cup_depth:
      name: Profundidad de la copa de la boquilla para instrumentos de metal
      description: Clasificación de la profundidad de la copa de la boquilla (qué
        tan profunda es), lo que influye en el tono y la respuesta.
    brass_polishing_cloth_abrasiveness_level:
      name: Nivel de abrasividad del paño para pulido de instrumentos de metal
      description: Indica qué tan agresivo es el paño para eliminar el deslustre frente
        a proporcionar un brillo suave.
    bread_crumb_base_ingredient:
      name: Ingrediente base del pan rallado
      description: Indica el ingrediente principal del que están hechas las migas,
        como trigo, arroz, chicharrón o almendra.
    bread_variety:
      name: Variedad de pan
      description: Especifica el estilo o la variedad de pan o bollos, lo que ayuda
        a los compradores a encontrar tipos específicos (p. ej., brioche, baguette
        o naan).
    breadstick_style:
      name: Tipo de palito de pan
      description: Identifica el estilo o formato tradicional específico del palito
        de pan.
    bridge_head_material:
      name: Material de cabezas para puentes
      description: Material utilizado exclusivamente para el cabezal del puente, lo
        que influye en el peso, la sensación y la durabilidad.
    bridge_head_type:
      name: Tipo de cabezal del puente
      description: Identifica el tipo de cabezal del puente, lo que ayuda a los compradores
        a elegir la forma de apoyo para taco que prefieren.
    bridle_part_type:
      name: Tipo de pieza de la brida
      description: Identifica el componente específico de la brida que representa
        el artículo de repuesto, lo que ayuda a los clientes a encontrar la pieza
        exacta que necesitan.
    bridle_style:
      name: Estilo de la brida
      description: Clasifica el estilo o la construcción general de la brida para
        que los jinetes puedan encontrar rápidamente el equipo adecuado a sus necesidades
        o disciplina.
    broadhead_field_point_attachment_style:
      name: Estilo de fijación de punta de caza/punta de campo
      description: Especifica cómo se fija la punta de caza o la punta de práctica
        al astil de la flecha.
    broadhead_thread_size:
      name: Tamaño de rosca de la punta de caza
      description: Enumera las especificaciones del hilo utilizadas para fijar la
        punta de caza o la punta de práctica al inserto o al astil de la flecha.
    broadhead_tip_type:
      name: Tipo de punta de caza
      description: Define el estilo de la punta/virola de la punta de caza que inicia
        la penetración, lo que afecta el rendimiento según el tipo de presa.
    broccoli_cut:
      name: Corte de brócoli
      description: Especifica cómo se cortó o se preparó el brócoli antes del envasado
        (p. ej., cabeza entera, floretes o triturado tipo arroz).
    broccoli_variety:
      name: Variedad de brócoli
      description: Identifica el cultivar específico o la variedad de mercado del
        brócoli (p. ej., Tenderstem, Romanesco).
    broom_head_material:
      name: Material de cepillos para escobas
      description: Especifica la composición del material del cabezal de la escoba,
        lo que afecta su durabilidad y características de juego.
    brush_format:
      name: Formato del cepillo
      description: Indica el formato físico del cepillo para esquís o snowboard, distinguiendo
        entre bloques manuales y formatos rotativos accionados por taladro, como cilindros
        rotativos de lana o fieltro.
    brush_shape:
      name: Forma del cepillo
      description: Especifica la forma físicas o el perfil del cuerpo o cabezal del
        cepillo, lo que afecta el área de contacto y el manejo.
    brussel_sprout_preparation:
      name: Preparación de las coles de Bruselas
      description: Describe la preparación física o el tipo de corte de las coles
        de Bruselas suministradas.
    brussels_sprout_variety:
      name: Variedad de coles de Bruselas
      description: Especifica el cultivo o la variedad de las coles de Bruselas para
        tener en cuenta las variedades actuales y futuras.
    bubble_blower_features:
      name: Características del soplador de burbujas
      description: Enumera las características funcionales comunes de los sopladores
        de burbujas.
    bubble_gun_bubble_output_modes:
      name: Modos de salida de burbujas de la pistola de burbujas
      description: Especifica los modos de funcionamiento de la pistola de burbujas,
        como burbuja única, modo continuo o velocidad múltiple.
    bubble_machine_features:
      name: Funciones de máquinas de burbujas
      description: Destaca las características funcionales comunes de las máquinas
        de burbujas más allá del funcionamiento básico.
    bubble_machine_items_included:
      name: Artículos incluidos con la máquina de burbujas
      description: Enumera los artículos principales incluidos en la caja (p. ej.,
        solución para burbujas, varitas adicionales, correa de transporte o control
        remoto).
    bubble_output_rate:
      name: Tasa de salida de burbujas
      description: Indica la tasa de producción de burbujas aproximada/cualitativa
        de un soplador de burbujas (p. ej., baja/media/alta), incluido si la producción
        es variable.
    bubble_solution_container_type:
      name: Tipo de contenedor para la solución de burbujas
      description: Especifica cómo se suministra/utiliza la solución para burbujas
        con la pistola de burbujas (p. ej., depósito interno, botella adjunta, bandeja/inmersión
        separada).
    bubble_toy_included_accessories:
      name: Accesorios incluidos con el juguete de burbujas
      description: Indica los artículos comunes incluidos con el juguete de burbujas
        (p. ej., botella de solución, bandeja o varitas de repuesto).
    buckwheat_processing_method:
      name: Método de procesamiento del trigo sarraceno
      description: Describe el procesamiento aplicado al trigo sarraceno antes de
        su oferta (p. ej., tostado, germinado, inflado).
    buckwheat_product_form:
      name: Formato de producto de trigo sarraceno
      description: Presentación física específica del trigo sarraceno que abarca formatos
        no incluidos en la lista genérica (p. ej., copos, inflados o sobres instantáneos).
    bug_collecting_kit_items_included:
      name: Artículos del kit para coleccionar insectos incluidos
      description: Herramientas y materiales educativos incluidos en un kit de recolección
        de insectos.
    built_in_storage_type:
      name: Tipo de almacenamiento incorporado
      description: Identifica los tipos de almacenamiento incorporados en la estructura
        de la cama cucheta (p. ej., cajones, estantes o almacenamiento en la escalera).
    bumper_finish:
      name: Acabado del parachoques
      description: Especifica el acabado superficial del paragolpes.
    bumper_sensor_cutouts:
      name: Recortes para sensores de parachoques
      description: Indica qué aberturas para sistemas de asistencia del OEM incluye
        o admite el paragolpes.
    bunk_bed_configuration:
      name: Configuración de la cama cucheta
      description: Indica la disposición estructural y la combinación de tamaños de
        colchón de la cama cucheta.
    buoyancy:
      name: Flotabilidad
      description: Indica el comportamiento de flotación del cebo o señuelo en la
        columna de agua como flotante, hundimiento o suspensión.
    burkini_pieces_included:
      name: Piezas de burkini incluidas
      description: Enumera los componentes de la prenda suministrados en el conjunto
        burkini para que los clientes sepan exactamente lo que están comprando.
    burn_rate:
      name: Tasa de combustión
      description: Describe la velocidad a la que se quema el papel para liar una
        vez encendido.
    bus_model_type:
      name: Tipo de modelo de autobús
      description: Identifica la configuración o el tipo de autobús real representado
        por el modelo a escala (carrocería/clase de uso).
    bust_design:
      name: Diseño de busto
      description: Describe la configuración de la zona del busto y la cobertura del
        escote del body moldeador (p. ej., busto abierto, sostén incorporado o escote
        profundo).
    butter_variety:
      name: Variedad de mantequilla
      description: Especifica el estilo de producción o el tipo distintivo de la mantequilla,
        como cultivada, de crema dulce, estilo europeo, clarificada (ghee) o de suero
        de leche.
    buttermilk_variety:
      name: Variedad de suero de mantequilla
      description: Identifica el estilo o formato específico de suero de leche que
        se vende (p. ej., cultivado, tradicional, en polvo).
    button_application:
      name: Aplicación del botón
      description: Indica la aplicación o el tipo de proyecto previsto para el botón
        (p. ej., indumentaria o tapicería).
    button_attachment_type:
      name: Tipo de sujeción de botón
      description: Especifica la forma de confección del botón para fijarlo a la tela
        (p. ej., agujeros pasantes frente a vástago), no el tipo de cierre.
    button_finish:
      name: Acabado del botón
      description: Describe el acabado/apariencia de la superficie del botón (p. ej.,
        mate o brillante).
    buttonhole_elastic_application:
      name: Aplicación de elástico para ojales
      description: Uso principal previsto para el elástico decorativo plegable.
    cab_type:
      name: Tipo de cabina
      description: Especifica la configuración de la cabina del camión.
    cabasa_construction_type:
      name: Tipo de construcción de la cabasa
      description: Especifica la estructura física o el tipo del cuerpo de la cabasa
        y del conjunto de cadenas o cuentas.
    cabbage_variety:
      name: Variedad de col
      description: Identifica la variedad o el tipo de col (por ejemplo, verde, napa
        o de Saboya) para que los compradores puedan filtrar según el sabor, la textura
        y el uso culinario.
    cabinet_door_style:
      name: Estilo de puerta del armario
      description: Identifica el diseño visual del panel de la puerta del gabinete,
        como estilo Shaker o panel elevado, para ayudar a combinarlo con la estética
        de la cocina.
    cabinet_overlay_type:
      name: Tipo de solapamiento de la puerta del gabinete
      description: Especifica cómo las puertas cubren o se alinean con el marco del
        gabinete.
    cable_end_type:
      name: Tipo de extremo del cable
      description: Describe la forma o el estilo del extremo del cable o del conector
        que se acopla a las palancas de freno o de cambio.
    cable_housing_construction:
      name: Estructura de la funda del cable
      description: Describe el diseño estructural de la funda (como enrollada en espiral,
        sin compresión o de eslabones segmentados), lo que influye en la resistencia
        a la compresión, la flexibilidad y la sensación de manejo.
    cable_housing_liner_type:
      name: Tipo de revestimiento interno de la funda del cable
      description: Indica si la carcasa incluye un revestimiento interno y/o una variación
        en la lubricación, así como el material o la tecnología utilizada, lo que
        afecta la reducción de la fricción y la resistencia a la intemperie.
    cable_management_type:
      name: Tipo de manejo del cable
      description: Especifica las funciones integradas de gestión de cables o energía
        que ofrece la mesa de conferencias.
    cable_surface_treatment:
      name: Tratamiento de la superficie del cable
      description: Identifica cualquier recubrimiento o acabado especial aplicado
        al cable para reducir la fricción o protegerlo de la corrosión.
    cabochon_back_type:
      name: Tipo de parte posterior del cabujón
      description: Indica el perfil o acabado de la parte posterior del cabujón, lo
        que afecta los métodos de engaste/pegado y la compatibilidad.
    cacao_bean_variety:
      name: Variedad de grano de cacao
      description: Especifica la variedad botánica o el cultivar del grano de cacao
        utilizado.
    cacao_roast_level:
      name: Nivel de tueste del cacao
      description: Describe el grado de tostado del cacao antes de la molienda.
    cage_package_type:
      name: Tipo de presentación de la jaula de bateo
      description: Define qué componentes se incluyen con la compra (p. ej., solo
        la red, kit de estructura o paquete completo).
    cajon_body_shell_material:
      name: Material del cuerpo o carcasa del cajón
      description: Identifica el material del cuerpo o la carcasa del cajón (excluyendo
        la tapa).
    cajon_corner_control_system:
      name: Sistema de control de esquinas del cajón
      description: Especifica si el cajón permite ajustar el sonido en las esquinas
        (p. ej., mediante tornillos en las esquinas) para variar la respuesta del
        golpe seco.
    cajon_corner_edge_design:
      name: Diseño de esquinas o bordes del cajón
      description: Describe la construcción de las esquinas/bordes, lo que afecta
        la comodidad y la facilidad de uso.
    cajon_feet_type:
      name: Tipo de apoyos del cajón
      description: Especifica el tipo de patas del cajón, lo que afecta la estabilidad
        y la resonancia.
    cajon_snare_adjustability:
      name: Ajuste de la bordonera del cajón
      description: Indica si el efecto de bordonera puede ajustarse y de qué manera
        (tensión, activación o ambas).
    cajon_snare_system_type:
      name: Tipo de sistema de bordonera del cajón
      description: Especifica el mecanismo interno de bordonera utilizado para crear
        el efecto de caja.
    cake_shape:
      name: Tipo de pastel
      description: Describe la forma física en la que se hornea el pastel de café.
    cake_topping:
      name: Decoración para pastel
      description: Identifica la cobertura o el acabado principal aplicado al coffee
        cake.
    cake_type:
      name: Tipo de pastel
      description: Describe el estilo o variedad de pastel (p. ej., bizcocho de manteca,
        bizcochuelo, cheesecake).
    caliper_mount_type:
      name: Tipo de montaje de la pinza de freno
      description: Define el estándar de interfaz del cuadro o la horquilla que utiliza
        la pinza de freno (p. ej., montaje tipo poste o montaje plano).
    caliper_mounting_standard:
      name: Estándar de montaje de la pinza de freno
      description: Especifica la interfaz o el estándar de montaje (p. ej., Flat Mount,
        Post Mount, IS, etc.) utilizado para fijar la pinza de freno al cuadro o a
        la horquilla de la bicicleta.
    camera_mounting_location_vehicle_exterior:
      name: Ubicación de montaje de la cámara (exterior del vehículo)
      description: Indica dónde deben instalarse las cámaras en el vehículo (p. ej.,
        en la parrilla delantera, en la parte trasera o en los espejos laterales).
    camouflage_environment_type:
      name: Tipo de entorno de camuflaje
      description: Indica el entorno principal para el que está diseñado el patrón
        de camuflaje, como bosque, desierto o pantano.
    camping_oil_application:
      name: Aplicación del aceite para camping
      description: Especifica el uso principal previsto del aceite en contextos de
        camping (p. ej., combustible para linternas o para estufas).
    camshaft_construction:
      name: Estructura del árbol de levas
      description: Tipo de fabricación o diseño base del árbol de levas.
    camshaft_material:
      name: Material del árbol de levas
      description: Material principal del núcleo o el eje del árbol de levas (material
        base).
    camshaft_position:
      name: Posición del árbol de levas
      description: Especifica la ubicación o el tipo previsto del árbol de levas dentro
        del motor (p. ej., admisión o escape, o una bancada o posición específica
        del motor).
    candle_container_type_included:
      name: Tipo de recipiente para vela incluido
      description: Especifica el tipo de recipiente o envase para vela incluido con
        el kit, si corresponde.
    candle_dye_form:
      name: Presentación del colorante para velas
      description: Especifica la presentación física del tinte o colorante utilizado
        en la fabricación de velas.
    candle_fragrance_form:
      name: Presentación de la fragancia para velas
      description: Especifica el tipo o la presentación del ingrediente aromático
        destinado a la fabricación de velas.
    candle_making_tool_type:
      name: Tipo de herramienta para hacer velas
      description: Identifica qué tipo de herramienta para fabricar velas es el producto
        (p. ej., jarra de vertido, herramienta para centrar mechas o termómetro).
    candy_texture:
      name: Textura del dulce
      description: Describe la textura o consistencia del dulce en boca, independientemente
        del sabor o la forma.
    candying_method:
      name: Método de confitado
      description: Describe cómo se ha confitado o conservado la fruta con azúcar
        (p. ej., cristalizada, glaseada, en almíbar).
    canned_meat_form:
      name: Presentación de la carne enlatada
      description: Clasifica la forma procesada o la presentación de la carne dentro
        del envase.
    canoe_construction_type:
      name: Tipo de construcción de la canoa
      description: Diferencia los tipos de construcción del casco de la canoa, como
        rígido, inflable o plegable.
    canoe_hull_shape:
      name: Forma del casco de la canoa
      description: Define la sección transversal principal o el perfil inferior del
        casco, lo que afecta la estabilidad y la maniobrabilidad.
    canoe_stern_design:
      name: Diseño de la popa de la canoa
      description: Define el estilo de la popa del casco, lo que afecta la compatibilidad
        con motores y la maniobrabilidad.
    canopy_type:
      name: Tipo de toldo
      description: Describe el estilo de la cubierta o toldo superior incluido con
        la cama tipo cabaña.
    canvas_compatible_media:
      name: Materiales compatibles con el lienzo
      description: Indica con qué materiales o técnicas artísticas/de manualidades
        está diseñado para usarse el lienzo.
    canvas_format:
      name: Presentación del lienzo
      description: Indica si el lienzo imprimible se vende en hojas, rollos o paneles
        precortados.
    canvas_mounting_format:
      name: Tipo de montaje o presentación del lienzo
      description: Describe la presentación física o el tipo de montaje del lienzo
        para pintura.
    canvas_stretcher_assembly_type:
      name: Tipo de montaje del bastidor de lona
      description: Indica si el bastidor tensor se vende ensamblado como estructura
        o como barras/kit que requiere montaje.
    canvas_stretcher_corner_joint_type:
      name: Tipo de unión de las esquinas del bastidor del lienzo
      description: Cómo se unen o construyen las esquinas del bastidor (p. ej., espiga
        y mortaja, unión dentada, grapado o con cuñas).
    canvas_surface_tone:
      name: Tono de la superficie del lienzo
      description: Color o tono base de la superficie imprimada del lienzo (base),
        no el de estampados o diseños impresos (p. ej., blanco, negro o entonado).
    canvas_weave_type:
      name: Tipo de tejido del lienzo
      description: Describe la estructura del tejido de la superficie del lienzo,
        lo que afecta la textura y el comportamiento de la pintura.
    cap_attachment_style:
      name: Tipo de sujeción de gorra
      description: Especifica el tipo de construcción o fijación de la tapa de la
        boquilla del saxofón, lo que puede afectar la protección y el ajuste en el
        estuche.
    cap_construction:
      name: Construcción de la gorra
      description: Especifica cómo está construida la base de la peluca (p. ej., encaje
        frontal, encaje completo o hecha a mano), lo que afecta el realismo, la comodidad
        y la versatilidad de peinado.
    cap_crown_structure:
      name: Estructura de la copa de la gorra
      description: Indica si la copa de la gorra es estructurada (rígida) o no estructurada
        (blanda).
    cap_fit_type:
      name: Tipo de calce de la gorra
      description: Define cómo se ajusta la gorra a la cabeza del usuario (p. ej.,
        ajustada o regulable).
    cap_seal_type:
      name: Tipo de sellado de la tapa
      description: Especifica el componente de sellado utilizado para evitar fugas
        de aceite y el escape de vapores (p. ej., junta tórica o junta).
    cap_size:
      name: Talla de la gorra
      description: Etiquetas de tamaño estándar que indican el ajuste del tamaño total
        de la cabeza para el gorro de peluca.
    cap_type:
      name: Tipo de cabina
      description: Tipo de tapa o sistema de cierre utilizado en el depósito de expansión.
    caper_size_grade:
      name: Clasificación por tamaño de las alcaparras
      description: Clasifica las alcaparras según calibres estándar de la industria
        basados en el diámetro del botón floral.
    capo_clamping_mechanism:
      name: Mecanismo de sujeción del capo
      description: Especifica el tipo de sujeción o mecanismo de accionamiento utilizado
        para aplicar presión sobre las cuerdas (cómo se opera el capotraste).
    capo_finish:
      name: Acabado del capotraste
      description: Acabado superficial del cuerpo del capo (aspecto visual/tacto),
        independientemente del color (p. ej., mate o brillante).
    capo_fit_type:
      name: Tipo de ajuste del capotraste
      description: Especifica el perfil de mástil para el que está diseñado el capotraste
        (incluida la curvatura o planitud), lo que influye en la presión uniforme
        sobre las cuerdas y la afinación.
    capo_pad_material:
      name: Material de las cejillas
      description: Especifica el material de la almohadilla de contacto que toca las
        cuerdas o el diapasón (afecta el agarre, la estabilidad de afinación y la
        posibilidad de marcar el acabado del instrumento).
    capo_tension_mechanism:
      name: Mecanismo de tensión del capotraste
      description: Especifica cómo se aplica y ajusta la presión o tensión sobre las
        cuerdas en el capotraste deslizante.
    capture_method:
      name: Método de captura
      description: Indica si la trampa está diseñada para captura viva o eliminación
        letal.
    car_ev_conversion_kit_motor_type:
      name: Tipo de motor del kit de conversión a vehículo eléctrico
      description: Especifica la tecnología de motor de tracción incluida o requerida
        por el kit de conversión (p. ej., inducción de CA o imán permanente).
    car_playset_items_included:
      name: Elementos incluidos en el set de juego de autos
      description: Enumera los componentes principales incluidos en el set de juego
        de autos además de la estructura base (por ejemplo, autos, figuras o señales).
    car_shampoo_application_method:
      name: Método de aplicación del shampoo para autos
      description: Cómo se debe aplicar el champú durante el lavado.
    car_wash_solution_form:
      name: Fórmula de solución para lavado de coches
      description: Especifica la forma física de la solución de lavado de autos (p. ej.,
        líquido, espuma, toallitas).
    car_wash_solution_scent:
      name: Fragancia de la solución para lavado de autos
      description: Especifica la fragancia o el aroma de la solución para lavado de
        autos (si tiene aroma).
    carbonated_water_variety:
      name: Tipo de agua carbonatada
      description: Clasifica el agua carbonatada según variedades y formulaciones
        comunes del mercado (p. ej., agua tónica, seltzer o agua con gas funcional).
    carbonation:
      name: Carbonatación
      description: Describe el nivel o el tipo de carbonatación de la bebida (p. ej.,
        sin gas, ligeramente gasificada, gasificada o nitro).
    carburetor_barrel_count:
      name: Cantidad de cuerpos del carburador
      description: Indica el número de orificios/barriles ralentizados en el carburador.
    carburetor_choke_type:
      name: Tipo de estrangulador de carburador
      description: Indica el tipo de accionamiento del estrangulador que utiliza el
        carburador.
    carburetor_mounting_flange_type:
      name: Tipo de brida de montaje del carburador
      description: Especifica el estilo de interfaz de montaje del carburador para
        asegurar la compatibilidad con el colector de admisión (p. ej., patrón de
        espiga o patrón de brida/pernos).
    card_binder_page_type:
      name: Tipo de páginas para guardar de cartas
      description: 'Para álbumes o carpetas: el tipo de páginas utilizadas para almacenar
        cartas.'
    card_box_holder_type:
      name: Tipo de caja o soporte para cartas
      description: Especifica el formato funcional del producto para recolectar o
        sostener tarjetas en un evento (p. ej., caja, buzón, canasta o soporte).
    card_game_accessory_features:
      name: Características del accesorio del juego de cartas
      description: Características funcionales destacadas de los accesorios para juegos
        de cartas.
    card_lot_type:
      name: Tipo de lote de cartas
      description: Indica si el producto es una sola carta o un lote/surtido de varias
        cartas.
    card_sleeve_size_format_compatibility:
      name: Tamaño/formato de compatibilidad de las fundas para cartas
      description: Especifica los tamaños de las cartas para los que están diseñadas
        las fundas/páginas/cajas para mazos.
    carding_surface_pin_material:
      name: Material de las púas de cardado
      description: Material de las púas o dientes utilizados para desenredar y abrir
        la fibra.
    care_durability:
      name: Durabilidad de la etiqueta
      description: Indica la resistencia de la etiqueta al lavado o al calor después
        de su aplicación.
    care_label_attachment_type:
      name: Tipo de fijación de la etiqueta de cuidado
      description: Cómo se debe aplicar la etiqueta de cuidado al producto (p. ej.,
        cosida, termoadhesiva/transferencia por calor o adhesiva).
    care_label_format:
      name: Presentación de la etiqueta de cuidado
      description: Describe el formato físico o de impresión del producto de etiquetas
        de cuidado.
    care_label_symbol_system:
      name: Sistema de símbolos de cuidado de la etiqueta
      description: Conjunto de normas/símbolos utilizados en la etiqueta (p. ej.,
        símbolos de cuidado ISO o símbolos estadounidenses ASTM).
    cargo_area_configuration:
      name: Configuración del área de carga
      description: Especifica el estilo estructural o la ubicación del área de carga
        en una bicicleta de carga (p. ej., de cola larga, de carga frontal, triciclo).
    cargo_net_adjustability:
      name: Ajustabilidad de la red de carga
      description: Indica si la red de carga puede ajustarse y de qué manera para
        modificar la tensión o el ajuste.
    cargo_net_position:
      name: Posición de la red de carga
      description: Indica dónde debe instalarse o utilizarse la red dentro del baúl
        o área de carga.
    cargo_net_stretch_type:
      name: Tipo de elasticidad de la red de carga
      description: Indica si la red de carga para baúl es elástica/extensible o fija/sin
        elasticidad.
    cargo_net_style:
      name: Tipo de red de carga
      description: Especifica el estilo de construcción o el factor de forma de la
        red de carga (p. ej., cuerda elástica, cincha, barrera, hamaca).
    cargo_rack_finish:
      name: Acabado del portacarga
      description: Acabado/revestimiento de la superficie exterior del estante de
        carga.
    carpet_cleaner_application_method:
      name: Método de aplicación del limpiador de alfombras
      description: Especifica la forma prevista de aplicar y trabajar el producto
        sobre la alfombra (más allá de su presentación general).
    carrier_style:
      name: Tipo de soporte para transporte
      description: Describe el mecanismo o estilo de soporte utilizado para transportar
        la embarcación en el vehículo.
    carrot_size:
      name: Tamaño de la zanahoria
      description: Clasifica el tamaño general del producto de zanahoria.
    carrot_variety:
      name: Variedad de zanahoria
      description: Identifica la variedad o el cultivar específico de zanahoria.
    carrying_capacity_pairs_boards:
      name: Capacidad de carga (pares/tablas)
      description: Indica cuántos esquís (pares) o tablas de snowboard permite transportar
        o puede admitir un accesorio cuando se utiliza con el soporte para transporte
        (p. ej., kits de extensión).
    cartridge_thread_compatibility:
      name: Compatibilidad de rosca del cartucho
      description: Indica el estándar de rosca compatible con el vaporizador o la
        batería, lo que garantiza la compatibilidad física entre cartuchos y baterías.
    case_capacity_butts_shafts:
      name: Capacidad del estuche (culatas × flechas)
      description: Define cuántas culatas y flechas de taco puede albergar la caja,
        expresado en formato culata por flecha (p. ej., 2x4 = 2 culatas y 4 flechas).
    case_features:
      name: Características del estuche
      description: Destaca las características funcionales del estuche para platillos/batería
        relacionadas con la protección y el transporte.
    case_humidifier_refill_type:
      name: Tipo de recarga del humidificador del estuche
      description: Indica si el humidificador utiliza un medio reutilizable (rehumectable/regenerable)
        o recargas desechables reemplazables.
    case_lining_material:
      name: Material de revestimiento del estuche
      description: Identifica el material principal del revestimiento interior del
        estuche o funda, que entra en contacto con el instrumento o contenido que
        protege.
    case_material:
      name: Material del estuche
      description: Identifica el material principal de la caja del reloj, lo que influye
        en la durabilidad, el peso y la estética.
    case_mounting_method:
      name: Método de montaje en el estuche
      description: Indica cómo se debe colocar o fijar el humidificador dentro del
        estuche del instrumento.
    case_structure:
      name: Estructura del estuche
      description: Indica la rigidez de la construcción de la funda.
    case_style_cymbal_drum:
      name: Estilo de la funda (platillo/tambor)
      description: Especifica si el producto es una funda blanda, un estuche rígido
        o un diseño híbrido para transportar platillos o baterías.
    casing_material:
      name: Material del estuche
      description: Identifica el tejido principal utilizado en la carcasa del neumático,
        lo que afecta el peso, la sensación de manejo y la protección contra pinchaduras.
    casino_set_chip_material:
      name: Material de las fichas del set de casino
      description: Material principal de las fichas incluidas (si corresponde).
    casino_set_layout_included:
      name: Superficie del juego de casino incluida
      description: Especifica qué tipo de superficie o diseño de juego incluye el
        set.
    cask_finish:
      name: Acabado del tonel
      description: Especifica el barril o la barrica utilizados para finalizar o madurar
        el licor, como barril de bourbon o barrica de jerez.
    cassava_variety:
      name: Variedad de yuca
      description: Identifica el cultivar o la variedad específica de yuca ofrecida,
        lo que influye en el sabor, el color y las propiedades de cocción.
    cassette_body_type:
      name: Tipo de cuerpo de casete
      description: Estándar de freehub o núcleo compatible con el buje o la rueda
        trasera (p. ej., HG 11, XDR o Microspline).
    cassette_deck_feature_set:
      name: Conjunto de funciones de la casetera
      description: Indica las funciones de transporte y reproducción de casetes comunes
        en los reproductores de casete integrados en el tablero.
    cassette_speed_compatibility:
      name: Compatibilidad con velocidades de casete
      description: Indica la cantidad de velocidades (p. ej., 7 u 12 velocidades)
        con las que el cassette o la rueda libre pueden funcionar, lo que garantiza
        la compatibilidad con la cadena, la palanca de cambios y el desviador.
    castanet_shell_size_class:
      name: Clasificación por tamaño de las castañuelas
      description: Clasificación estandarizada del tamaño de las castañuelas, utilizada
        habitualmente por intérpretes y profesores para seleccionar el ajuste y la
        tonalidad adecuados.
    castanets_included_pieces:
      name: Componentes incluidos de las castañuelas
      description: Indica qué se incluye en la oferta del producto (par o unidad,
        además de accesorios adicionales).
    castanets_pitch:
      name: Tono de las castañuelas
      description: Indica la etiqueta común de tono o tamaño utilizada por los fabricantes
        para describir el rango sonoro.
    castanets_type:
      name: Tipo de castañuelas
      description: Especifica el tipo de castañuelas o la categoría de uso prevista.
    caster_type:
      name: Tipo de rueda giratoria
      description: Indica el tipo de ruedas giratorias instaladas en el carrito (p.
        ej., giratorias o con freno), lo que influye en la maniobrabilidad y estabilidad.
    castle_playset_included_items:
      name: Elementos incluidos en el set de juego de castillo
      description: Indica los componentes principales incluidos en el set de juego
        de castillo para que los compradores puedan comparar distintos sets (p. ej.,
        figuras, muebles, vehículos o accesorios).
    catcher_equipment_included:
      name: Equipamiento para receptores incluido
      description: Especifica los componentes incluidos en un equipo de receptor,
        como casco de receptor o protector de pecho.
    catcher_helmet_style:
      name: Tipo de casco de receptor
      description: Indica el diseño general del casco de protección del receptor.
    cattle_breed:
      name: Ganado vacuno
      description: Identifica la raza de ganado de la que procede la carne (p. ej.,
        Angus, Wagyu, Hereford).
    cauliflower_variety:
      name: Variedad de coliflor
      description: Identifica el cultivo, el color o la variedad especial de la coliflor
        que se vende.
    celery_form:
      name: Forma del apio
      description: Especifica la presentación o el tipo de corte en que se vende el
        apio.
    celery_variety:
      name: Variedad de apio
      description: Registra el cultivar o la variedad específica del apio, lo que
        permite a los compradores seleccionar el producto según su perfil de sabor,
        color o uso culinario.
    cereal_bar_texture:
      name: Textura de la barra de cereales
      description: Describe la sensación en boca y la consistencia de la barra de
        cereal (p. ej., masticable o crujiente).
    cereal_type:
      name: Tipo de cereal
      description: Clasifica la forma o presentación del cereal o la granola (copos,
        inflados, racimos de granola, muesli, etc.) para ayudar a los compradores
        a encontrar la textura o el método de preparación que prefieren.
    certificate_border_style:
      name: Estilo de borde del certificado
      description: Describe el diseño del borde utilizado en el certificado.
    certificate_personalization_type:
      name: Tipo de personalización del certificado
      description: Especifica las opciones de personalización del certificado (en
        blanco para escribir a mano, plantilla imprimible, preimpreso con campos variables,
        etc.).
    certification_service:
      name: Servicio de certificación
      description: Empresa independiente de clasificación o certificación (si corresponde).
    certification_standard:
      name: Norma de certificación
      description: Especifica la certificación o norma de cumplimiento en materia
        de seguridad y resistencia al fuego que cumple la balaclava.
    chain_coating_finish:
      name: Recubrimiento o acabado de la cadena
      description: Especifica cualquier tratamiento superficial o acabado aplicado
        a la cadena para mejorar la durabilidad, reducir la fricción, prevenir la
        corrosión o alterar su apariencia (p. ej., nitruro de titanio, DLC, níquel,
        EPT anticorrosivo).
    chain_connection_type:
      name: Tipo de unión de la cadena
      description: Especifica el método de cierre proporcionado o requerido para unir
        los extremos de la cadena.
    chain_tier_configuration:
      name: Configuración de niveles de la cadena
      description: Especifica la cantidad o disposición de niveles de cadenas en el
        conjunto de captura (nivel simple, doble o triple).
    chain_tool_type:
      name: Tipo de herramienta de la cadena
      description: Clasifica el tipo específico de herramienta para cadenas de bicicleta,
        para que los compradores puedan encontrar rápidamente la herramienta adecuada.
    chainring_shape:
      name: Forma del plato
      description: Indica la forma del plato de la bicicleta, p. ej., redondo u ovalado/elíptico.
    chair_accessories_included:
      name: Accesorios para sillas incluidos
      description: Enumera los accesorios integrados o incluidos que mejoran la funcionalidad
        de la silla.
    chair_sash_care_instructions:
      name: Instrucciones de cuidado del lazo decorativo para sillas
      description: Describe el método recomendado de limpieza y mantenimiento del
        lazo decorativo para sillas.
    chair_sash_finish:
      name: Acabado del lazo decorativo para sillas
      description: Describe el brillo o acabado superficial de la tela del lazo decorativo
        para sillas.
    chair_storage_design:
      name: Diseño de almacenamiento de la silla
      description: Indica cómo se debe almacenar la silla tipo sling (p. ej., plegable,
        apilable o no plegable) para ayudar a los clientes a evaluar su almacenamiento
        y portabilidad.
    chaise_or_sectional_orientation:
      name: Orientación de la chaise longue o del sofá modular
      description: Especifica el lado en el que se encuentra la chaise integrada o
        la sección extendida al mirar el sofá de frente.
    chamber_size:
      name: Tamaño de la cámara
      description: Indica el tamaño/volumen de la cámara de la boquilla, lo que afecta
        la resistencia y color tonal.
    chanter_finger_spacing:
      name: Espaciado de los orificios para los dedos del puntero melódico
      description: Indica el espaciado de los orificios para los dedos o el perfil
        de tamaño del puntero melódico (normalmente descrito como estándar, para manos
        pequeñas o para manos grandes).
    chanter_type:
      name: Tipo de puntero
      description: Describe el estilo o la configuración del puntero melódico incluido
        con el instrumento (o utilizado por este), como abierto, cerrado, de práctica
        o con llaves.
    chard_variety:
      name: Variedad de acelga
      description: Identifica el cultivar o la variedad de color específica de la
        acelga ofrecida.
    charging_port_location:
      name: Ubicación del puerto de carga
      description: Ubicación física del puerto principal de carga externo del vehículo.
    chassis_construction_type:
      name: Tipo de construcción de chasis
      description: Describe el método principal de construcción del chasis utilizado
        en el vehículo.
    checkbook_loading_orientation:
      name: Orientación de la chequera
      description: Indica si la cubierta para chequera es compatible con chequeras
        de carga superior, carga lateral o de formato universal.
    cheekpiece_style:
      name: Tipo de laterales de la embocadura
      description: Define el tipo de configuración de los laterales o anillas de la
        embocadura, lo que determina la acción de las riendas y la estabilidad lateral.
    cheese_alternative_form:
      name: Presentación de la alternativa al queso
      description: Especifica la forma física o el corte en que se comercializa la
        alternativa al queso.
    cheese_form:
      name: Presentación del queso
      description: Describe la presentación física del producto de queso (p. ej.,
        rueda, bloque, en lonchas, rallado).
    cheese_texture:
      name: Textura del queso
      description: Clasifica el queso según su textura o firmeza generales.
    cheese_variety:
      name: Variedad de queso
      description: Identifica el tipo de queso utilizado como saborizante principal
        en el aperitivo.
    cherimoya_variety:
      name: Variedad de chirimoya
      description: Identifica el cultivar o la variedad específica de la chirimoya
        (p. ej., Fino de Jete o El Bumpo).
    cherry_variety:
      name: Variedad de cereza
      description: Especifica el cultivar o la variedad de las cerezas, lo que ayuda
        a los compradores a elegir tipos concretos conocidos por su sabor, color,
        tamaño o uso culinario previsto.
    chest_pocket_style:
      name: Estilo de bolsillo en el pecho
      description: Especifica si la camisa tiene bolsillos en el pecho y cómo están
        configurados.
    chewing_tobacco_form:
      name: Presentación del tabaco de mascar
      description: Identifica la forma física, el tipo de corte o el tamaño de la
        bolsita del producto de tabaco de mascar (p. ej., hoja suelta, corte largo
        o bolsita delgada).
    chicory_variety:
      name: Variedad de achicoria
      description: Identifica la variedad o el cultivar específico de la achicoria
        que se comercializa (p. ej., radicchio, endivia belga o escarola).
    chiffon_recommended_use:
      name: Uso recomendado del chifón
      description: Usos principales recomendados de la tela de gasa (chifón) en proyectos
        de costura o manualidades.
    child_seat_accessory_type:
      name: Tipo de accesorio para asiento infantil
      description: Define el tipo específico de accesorio o pieza de repuesto para
        asiento infantil (p. ej., cojín de asiento, reposapiés o adaptador de montaje),
        lo que permite a los compradores encontrar rápidamente el artículo que necesitan
        sin crear numerosas categorías específicas.
    child_seat_mounting_type:
      name: Tipo de montaje del asiento infantil
      description: Especifica cómo se fija el asiento infantil para bicicleta al cuadro,
        al portaequipajes o a la zona del manillar.
    chime_sound_character:
      name: Características del sonido del carillón
      description: Describe el timbre/caracterismo sonoro previsto de las campanas.
    chin_cup_type:
      name: Tipo de copa mentonera
      description: Especifica el diseño o la construcción de la copa mentonera, lo
        que influye en la comodidad y la protección contra impactos.
    chin_strap_type:
      name: Tipo de correa de barbilla
      description: Especifica el tipo de correa para la barbilla del sombrero o gorro
        (sin correa, fija, ajustable o desmontable) para ayudar a los compradores
        a elegir modelos que permanezcan bien sujetos en condiciones de viento o durante
        actividades dinámicas.
    china_cymbal_edge_shape:
      name: Tipo de borde del platillo china
      description: Describe el perfil del borde o reborde característico de los platillos
        china (el grado de curvatura hacia arriba del borde), lo que influye en la
        sensación al tocar y en el sonido.
    china_cymbal_sound_character:
      name: Carácter sonoro del platillo china
      description: Describe las principales características sonoras o tímbricas de
        un platillo china, lo que ayuda a los compradores en la búsqueda y el filtrado
        (p. ej., áspero o "trashy", oscuro o brillante). Pueden aplicarse varios valores.
    chinstrap_type:
      name: Tipo de correa para la barbilla
      description: Tipo de correa para la barbilla incluida con el casco.
    chip_cut_style:
      name: Estilo de corte de las papas fritas
      description: Especifica el tipo de corte o la textura física de las papas fritas
        (p. ej., onduladas, cocidas en caldera o expandidas).
    chip_denomination:
      name: Denominación de fichas
      description: Indica qué denominaciones (valores) de fichas se incluyen en el
        set (impresas o asignadas).
    chocolate_form:
      name: Presentación del chocolate
      description: Describe la forma física en que se comercializa el chocolate para
        repostería.
    choy_sum_variety:
      name: Variedad de choy sum
      description: Identifica la variedad comercial o botánica específica de choy
        sum que se comercializa.
    cigar_wrapper_color:
      name: Color de la capa del cigarro
      description: Clasificación estándar del color de la hoja de capa del cigarro.
    cigarette_filter_type:
      name: Tipo de filtro de cigarrillo
      description: Especifica si el cigarrillo tiene filtro y, en caso afirmativo,
        el tipo de construcción o característica especial de dicho filtro.
    cigarette_size:
      name: Tamaño del cigarrillo
      description: Clasifica los cigarrillos según la terminología estándar de la
        industria para su longitud o formato (p. ej., king size, 100s o slim).
    cigarette_strength_descriptor:
      name: Descripción de intensidad del cigarrillo
      description: Etiqueta comercial de intensidad utilizada tradicionalmente por
        las marcas para indicar la concentración de alquitrán y nicotina (p. ej.,
        suave, intenso, plata).
    cinch_liner_material:
      name: Material del forro ajustable
      description: Identifica el material utilizado para el forro o el relleno que
        queda en contacto con el caballo.
    circular_knitting_needle_cable_type:
      name: Tipo de cable de la aguja circular de tejer
      description: Material, comportamiento y construcción del cable (p. ej., acero
        revestido o nailon), que influyen en la memoria, la formación de dobleces
        y la capacidad de giro.
    circular_knitting_needles_tip_material:
      name: Material de la punta de las agujas de tejer circulares
      description: Material de las dos puntas de la aguja (a diferencia del material
        del cable).
    circumference_adjustment_mechanism:
      name: Mecanismo de ajuste de la circunferencia
      description: Mecanismo utilizado para ajustar o bloquear la circunferencia de
        la madeja.
    clamp_design:
      name: Diseño de la pinza
      description: Describe el estilo estructural o mecanismo de la abrazadera.
    clamp_sheet_music_clip_features:
      name: Características de la pinza para partituras
      description: Características funcionales y de protección de las pinzas para
        partituras, como acolchado, superficies antideslizantes o capacidad de giro.
    clamping_closure_type:
      name: Tipo de sujeción o cierre
      description: Especifica el mecanismo utilizado para tensar o asegurar el bastidor
        de bordado alrededor de la tela.
    clarinet_bell_acoustic_design:
      name: Diseño acústico de la campana del clarinete
      description: Describe el diseño acústico o de ventilación de la campana, concebido
        para influir en la respuesta y la afinación.
    clarinet_bell_adjustment_mechanism:
      name: Mecanismo de ajuste de la campana del clarinete
      description: Describe cómo se ajusta la longitud o la geometría de la campana.
    clarinet_bell_ring_material:
      name: Material del anillo de la campana del clarinete
      description: Especifica el material del anillo o la banda protectora en el borde
        de la campana del clarinete, si lo tiene.
    clarinet_bell_tuning_effect:
      name: Efecto de afinación de la campana del clarinete
      description: Indica cómo el diseño de la campana influye en la afinación o la
        entonación (especialmente los tonos guturales y el registro grave) en comparación
        con una campana estándar.
    clarinet_body_type:
      name: Tipo de cuerpo del clarinete
      description: Indica el tipo de estructura principal del cuerpo del clarinete
        en La.
    clarinet_bore_type:
      name: Tipo de perforación del clarinete
      description: Describe el diseño de la perforación interna del clarinete alto.
    clarinet_cap_style:
      name: Estilo de tapa del clarinete
      description: Estilo de diseño de la tapa incluida con una ligadura de clarinete
        y/o tapa de boquilla producto (p. ej., invertida o ventilada).
    clarinet_care_kit_intended_use:
      name: Uso previsto del kit de cuidado del clarinete
      description: Contexto de uso principal para el que está diseñado el kit (p. ej.,
        secado diario rápido o limpieza/mantenimiento profundo).
    clarinet_included_accessories:
      name: Accesorios incluidos del clarinete
      description: Indica qué incluye la caja del clarinete en Si bemol.
    clarinet_keywork_material:
      name: Material para el mecanismo de llaves del clarinete
      description: Especifica el material del mecanismo de llaves del clarinete (p.
        ej., bronce, alpaca o baño de plata).
    clarinet_keywork_plating:
      name: Baño de las llaves del clarinete
      description: Especifica el enchapado/acabado del material del mecanismo de las
        llaves del clarinete (llaves).
    clarinet_mouthpiece_baffle_profile:
      name: Perfil del deflector de la boquilla del clarinete
      description: Describe el perfil interno del deflector o techo de la boquilla
        del clarinete, lo que influye en el brillo y la proyección del sonido.
    clarinet_mouthpiece_beak_shape:
      name: Forma de la boquilla del clarinete
      description: Especifica el perfil o ángulo exterior del pico de la boquilla
        para mayor comodidad del músico y sensación de la embocadura.
    clarinet_mouthpiece_chamber_size:
      name: Tamaño de la cámara de la boquilla del clarinete
      description: Indica el tamaño relativo de la cámara de una boquilla de clarinete
        (según la especificación del fabricante), lo que puede influir en el color
        del sonido y la resistencia al tocar.
    clarinet_mouthpiece_intended_tone:
      name: Tono deseado de la boquilla del clarinete
      description: Describe el objetivo tonal general del mercado para la boquilla.
    clarinet_mouthpiece_player_level:
      name: Nivel de experiencia del intérprete compatible con la boquilla de clarinete
      description: Indica el nivel de usuario objetivo típico para el cual está diseñada
        la boquilla.
    clarinet_reed_cut:
      name: Corte de la caña del clarinete
      description: Especifica el corte o perfil de la caña (p. ej., con limado o sin
        limado, y otros estilos de corte comercializados), lo que influye en la respuesta
        y el timbre.
    clarinet_reed_material_type:
      name: Tipo de material de la caña del clarinete
      description: Indica de qué material está hecha la caña (caña natural, caña sintética
        y subtipos sintéticos comunes).
    clarinet_thumb_rest_type:
      name: Tipo de apoyo para el pulgar del clarinete
      description: Tipo o característica del apoyo para el pulgar de la mano derecha.
    classical_guitar_string_3rd_string_type:
      name: Tipo de tercera cuerda de guitarra clásica
      description: Indica si la cuerda G (3°) es lisa (monofilamento) o entorchada.
    classical_guitar_string_bass_winding_material:
      name: Material de entorchado de los bordones de la guitarra clásica
      description: Material de envoltura/enrollado utilizado en las cuerdas del bajo
        (normalmente, cuerdas 4 a 6).
    classical_guitar_string_set_configuration:
      name: Configuración del conjunto de cuerdas de guitarra clásica
      description: Especifica si el producto es un juego completo o cuerdas específicas
        (normalmente, agudas o graves) para una guitarra clásica.
    clay_modeling_dough_base_material:
      name: Material base de la arcilla y masa para modelar
      description: Formulación primaria o tipo de base del material para modelar.
    clay_modeling_dough_curing_method:
      name: Método de curado de la arcilla o masa para modelar
      description: Cómo se fija/endurece el material (o se mantiene reutilizable),
        lo que determina las herramientas necesarias y los casos de uso típicos.
    clay_paintability:
      name: Posibilidad de pintar la arcilla
      description: Indica si la superficie de la arcilla curada se puede pintar y
        qué tipos de pintura se recomiendan.
    clay_primary_composition:
      name: Composición primaria de la arcilla
      description: Material base/aglutinante principal de la arcilla de secado al
        aire (p. ej., a base de papel, a base de minerales).
    clay_shooting_discipline:
      name: Disciplina de tiro al plato
      description: Identifica la modalidad o disciplina de tiro al plato para la que
        está diseñado el producto.
    cleaner_format:
      name: Formato del limpiador
      description: El embalaje o formato del producto limpiador para correderas.
    cleaner_sanitizer_intended_area:
      name: Área de uso prevista para el limpiador o desinfectante
      description: La parte principal del instrumento de viento de metal que el producto
        está destinado a limpiar o desinfectar.
    cleaning_formula:
      name: Fórmula de limpieza
      description: Especifica la familia química principal de limpieza/desinfección
        del producto (no la marca) para facilitar la selección de seguridad, compatibilidad
        y uso.
    cleaning_task_focus:
      name: Enfoque de la tarea de limpieza
      description: Identifica los principales problemas de limpieza que el lavado
        sin agua pretende solucionar.
    cleanup_method:
      name: Método de limpieza
      description: Especifica cómo se debe limpiar el pegamento (mientras está húmedo)
        de las manos, herramientas y superficies.
    clear_glue_application_method:
      name: Método de aplicación del pegamento transparente
      description: Especifica el tipo de dispensador o aplicador incluido con el envase
        del pegamento transparente.
    clear_glue_finish_after_drying:
      name: Acabado de pegamento transparente (después del secado)
      description: Describe el aspecto del pegamento una vez seco/curado (p. ej.,
        transparente o translúcido, brillante o mate).
    cleat_bolt_pattern:
      name: Patrón de pernos de la cala
      description: Especifica la configuración de pernos del calzado utilizada para
        fijar la cala, lo que determina la compatibilidad con pedales y zapatillas
        (p. ej., 2 pernos para MTB o 3 pernos para ruta).
    cleat_compatibility:
      name: Compatibilidad del taco
      description: Especifica con qué sistemas de pedal o cala es compatible la cubierta
        para zapatillas.
    cleat_finish:
      name: Acabado de la cornamusa
      description: Especifica el acabado superficial o recubrimiento de la cornamusa
        de muelle, lo que influye en la resistencia a la corrosión y la apariencia.
    cleat_receptacle_system:
      name: Sistema de receptáculos de abrazadera
      description: Identifica la interfaz de fijación de tacos/clavos compatible que
        se utiliza en los zapatos de golf con tacos.
    cleat_release_mechanism:
      name: Mecanismo de liberación de la cala
      description: Especifica cómo se desacopla la cala del pedal (p. ej., liberación
        simple o multidireccional).
    cleat_stud_type:
      name: Tipo de taco de la cala
      description: Especifica el tipo de construcción o sistema de fijación de los
        tacos/calas en la suela exterior de los botines de fútbol americano.
    climate_control_module_function:
      name: Función del módulo de control climático
      description: Especifica la función principal del módulo del sistema HVAC incluido
        del vehículo.
    climbing_hold_mounting_type:
      name: Tipo de montaje de la presa de escalada
      description: Especifica cómo se fija la presa a la pared o al tablero de entrenamiento.
    climbing_hold_type:
      name: Tipo de presas de escalada
      description: Categoriza la forma o el estilo de la presa que define el agarre.
    climbing_protection_device_type:
      name: Tipo de dispositivo de protección para escalada
      description: Especifica el tipo de dispositivo de protección (p. ej., friend,
        empotrador o pitón), lo que ayuda a los escaladores a encontrar rápidamente
        el equipo adecuado para un determinado tipo de roca o estilo de escalada.
    climbing_rope_middle_marking:
      name: Marcado central de la cuerda de escalada
      description: Describe cómo se identifica el punto medio (o los extremos) de
        la cuerda para facilitar descensos y aseguramientos más seguros.
    climbing_rope_treatment:
      name: Tratamiento de la cuerda de escalada
      description: Indica cualquier tratamiento hidrófugo, seco o protector aplicado
        a la funda o al núcleo de la cuerda.
    climbing_rope_type:
      name: Tipo cuerda de escalada
      description: Clasifica la cuerda según la certificación UIAA y el uso previsto
        (p. ej., cuerda simple dinámica, media cuerda, cuerda doble, cuerda estática,
        cuerda auxiliar), lo que permite a los compradores localizar rápidamente la
        cuerda correcta para su actividad.
    climbing_safety_certifications:
      name: Certificaciones de seguridad para escalada
      description: Indica las normas de seguridad industrial y de escalada que cumple
        el dispositivo.
    clip_color:
      name: Color del clip
      description: Color principal del clip sujetador de partituras.
    clip_mechanism_type:
      name: Tipo de mecanismo de clip
      description: Define el mecanismo de sujeción utilizado por un clip para billetes
        o una cartera con clip, lo que ayuda a elegir entre estilos magnéticos, de
        resorte, de palanca y otros.
    clip_style:
      name: Tipo de clip
      description: Identifica el mecanismo de sujeción específico utilizado para fijar
        el soporte, lo que brinda información sobre compatibilidad (p. ej., pinza
        de cocodrilo, mosquetón).
    clipper_motor_technology:
      name: Tecnología de motor de la cortadora
      description: Identifica el diseño del motor utilizado en la cortadora, lo que
        influye en la potencia, el ruido, la durabilidad y el mantenimiento.
    closet_configuration:
      name: Configuración de armario
      description: Define la forma general o disposición del sistema de vestidor walk-in
        (p. ej., en L, en U o con isla).
    closing_mechanism:
      name: Mecanismo de cierre
      description: Especifica el mecanismo de cierre del cajón, p. ej., estándar,
        cierre suave, cierre automático o apertura por presión.
    cloth_construction:
      name: Confección de la tela
      description: Indica el tejido o acabado del paño, lo que influye en la velocidad
        y la durabilidad (p. ej., paño peinado o afelpado).
    cloth_thickness:
      name: Grosor de la tela
      description: Indica el grosor/peso del paño de pulido.
    club_head_material:
      name: Material de la cabeza del palo de golf
      description: Especifica el material principal utilizado en la cabeza del palo.
    clutch_hydraulic_system_type:
      name: Tipo de sistema hidráulico del embrague
      description: Indica la compatibilidad con el sistema de accionamiento o sistema
        hidráulico del embrague (p. ej., embrague hidráulico o aplicaciones de conversión
        de cable).
    clutch_line_connection_type:
      name: Tipo de conexión de la línea del embrague
      description: Especifica la interfaz de conexión/acoplamiento final utilizada
        por la línea del embrague (importante para la compatibilidad con cilindros
        maestro/esclavo y tuberías rígidas).
    clutch_pressure_plate_actuation_type:
      name: Tipo de accionamiento de los platos de presión del embrague
      description: Indica si el embrague se desacopla mediante un mecanismo de accionamiento
        de empuje o de tracción (accionamiento por resorte de diafragma).
    clutch_pressure_plate_release_mechanism_type:
      name: Tipo de mecanismo de liberación de la placa de presión del embrague
      description: Tipo de interfaz de liberación/accionamiento utilizado por la placa
        de presión.
    clutch_pressure_plate_surface_type:
      name: Tipo de superficie de la placa de presión del embrague
      description: Tipo de superficie de contacto por fricción de la placa de presión.
    clutch_slave_cylinder_connection_type:
      name: Tipo de conexión de los cilindros esclavos del embrague
      description: Interfaz de conexión de la línea hidráulica en el cilindro esclavo
        (puerto roscado, conexión rápida, banjo, etc.).
    clutch_slave_cylinder_mounting_type:
      name: Tipo de montaje del cilindro esclavo del embrague
      description: Cómo se monta el cilindro esclavo en la transmisión o campana de
        transmisión (p. ej., atornillado, a presión o concéntrico integrado).
    coating_type:
      name: Tipo de recubrimiento
      description: Identifica cualquier recubrimiento exterior, cobertura o glaseado
        aplicado a la barra de cereales (p. ej., chocolate, yogur).
    cocking_mechanism:
      name: Mecanismo de amartillado
      description: Especifica el método o dispositivo principal utilizado para tensar
        o destensar la cuerda de la ballesta.
    cocktail_garnish_form:
      name: Forma de presentación de la guarnición para cóctel
      description: Describe cómo se presenta o procesa la guarnición para su uso (p.
        ej., fresca o deshidratada).
    cocktail_mix_variety:
      name: Variedad de la mezcla para cóctel
      description: Indica el cóctel específico que se pretende crear con esta mezcla
        (p. ej., margarita, mojito, piña colada).
    cocktail_napkin_features:
      name: Características de la servilleta de cóctel
      description: Destaca las características funcionales, prácticas y ecológicas
        de las servilletas de cóctel.
    cocktail_pick_tip_style:
      name: Tipo de punta del pincho para cóctel
      description: Describe la forma o característica de la punta utilizada para pinchar
        o sostener las guarniciones.
    cocktail_pick_top_handle_style:
      name: Estilo de la parte superior o mango del pincho para cóctel
      description: Describe la forma decorativa de la parte superior o del asa utilizada
        para la sujeción o la presentación.
    cocktail_type:
      name: Tipo de cóctel
      description: Indica la receta o el estilo específico del cóctel que representa
        el producto premezclado (p. ej., margarita, negroni, piña colada).
    cocktail_umbrella_handle_pick_material:
      name: Material del asa/palillo de la sombrilla de cóctel
      description: Material del palillo o pincho del paraguas para cóctel (sin incluir
        la cubierta).
    cocoa_processing_method:
      name: Método de procesamiento de cacao
      description: Especifica cómo se procesó el cacao en polvo (p. ej., natural,
        alcalinizado o cacao negro).
    cocoa_product_form:
      name: Fórmula de producto de cacao
      description: Define la forma física en la que se vende el producto de cacao.
    coconut_husk_status:
      name: Estado de la cáscara de coco
      description: Indica en qué medida se ha retirado la cáscara exterior o fibra
        del coco, lo que influye en la facilidad de uso, el almacenamiento y la cantidad
        de residuos.
    coconut_maturity_stage:
      name: Etapa de madurez del coco
      description: Identifica la etapa de desarrollo del coco en el momento de la
        cosecha, lo que afecta notablemente su sabor, contenido de agua y uso culinario
        (p. ej., para beber o para cocinar).
    coconut_oil_refinement_type:
      name: Tipo de refinamiento del aceite de coco
      description: Especifica el grado o nivel de refinamiento del aceite de coco,
        p. ej., virgen, refinado, MCT, fraccionado.
    coconut_preparation_form:
      name: Forma de preparación del coco
      description: Especifica cómo se prepara o corta físicamente el coco (entero,
        en rodajas, rallado, hecho puré, etc.), lo que ayuda a los compradores a encontrar
        rápidamente el formato adecuado para recetas o consumo directo.
    coffee_bean_species:
      name: Especie de grano de café
      description: Especifica la especie de grano de café utilizada en el producto.
    coffee_beverage_variety:
      name: Variedad de la bebida de café
      description: Clasifica las bebidas de café listas para consumir o preparar según
        su tipo.
    coffee_processing_method:
      name: Método de procesamiento de café
      description: Indica la técnica de procesamiento posterior a la cosecha utilizada
        en los granos de café.
    coil_material:
      name: Material de la bobina
      description: Especifica el material principal o el tipo de malla utilizado en
        la resistencia de calentamiento, lo que influye en el sabor, la durabilidad
        y la compatibilidad con el control de temperatura.
    coil_spring_design:
      name: Diseño del resorte helicoidal
      description: Especifica el diseño de tasa/forma del resorte helicoidal que afecta
        las características de conducción.
    coil_spring_finish_coating:
      name: Acabado o recubrimiento del resorte helicoidal
      description: Acabado superficial o revestimiento aplicado para la protección
        contra la corrosión.
    coil_spring_material:
      name: Material del resorte helicoidal
      description: Material/composición principal del resorte helicoidal.
    coil_system_type:
      name: Tipo de sistema de resorte helicoidal
      description: Detalla el tipo específico de sistema de resortes utilizado en
        colchones compatibles, como resortes embolsados o resortes Bonnell.
    coil_type:
      name: Tipo de resistencia
      description: Describe la tecnología de la resistencia, lo que influye en la
        producción de vapor y el sabor.
    coin_grade_numismatic:
      name: Grado de conservación de la moneda (numismática)
      description: Grado estandarizado de la moneda (p. ej., escala Sheldon o grado
        adjetival).
    coin_strike_or_finish:
      name: Acuñación o acabado de la moneda
      description: Tipo de acuñación o acabado de la moneda (p. ej., acuñación estándar
        o espejo).
    coin_strike_type:
      name: Tipo de acuñación de la moneda
      description: Describe el tipo de acuñación o acabado de la moneda (p. ej., espejo
        o acuñación estándar).
    collar_style:
      name: Tipo de cuello
      description: Define el diseño del cuello o escote de la prenda.
    collectible_gun_accessories_included:
      name: Accesorios incluidos con el arma de colección
      description: Enumera los accesorios y la documentación incluidos con el arma
        de colección (p. ej., funda, estuche, bayoneta o documentación).
    collectible_gun_firing_mechanism:
      name: Mecanismo de disparo de arma de colección
      description: Especifica el tipo de mecanismo de disparo o ignición del arma
        de fuego de colección (especialmente en piezas antiguas e históricas).
    collectible_knife_blade_finish:
      name: Acabado de la hoja de cuchillo de colección
      description: Describe el tratamiento/acabado superficial de la hoja en cuanto
        a su apariencia (y, en algunos casos, resistencia a la corrosión).
    color_code_system:
      name: Sistema de código de colores
      description: Identifica el sistema de código de color utilizado como referencia
        numérica para el hilo (p. ej., DMC o Anchor), si corresponde.
    color_coding_standard:
      name: Estándar de código de colores
      description: Indica si el disco sigue un código de colores internacional (p.
        ej., IWF o IPF) u otro sistema.
    color_effect:
      name: Efecto de color
      description: Especifica las técnicas o efectos de color especiales aplicados
        a las extensiones de cabello.
    color_family:
      name: Familia de colores
      description: Familia de color general de la tinta sumi (útil cuando el color
        es demasiado específico, p. ej., negro cálido o negro azulado).
    color_finish:
      name: Acabado de color
      description: Especifica el acabado de los componentes visibles del guardamanos
        (p. ej., mate o brillante) cuando el color por sí solo no es suficiente.
    coloring_finish:
      name: Acabado del color
      description: Especifica el acabado visual o efecto especial producido por la
        coloración, como metálico o neón.
    comb_material:
      name: Material del peine
      description: Material del peine de la armónica (el cuerpo que forma las cámaras
        de aire).
    comb_type:
      name: Tipo de peine
      description: Clasifica los peines de aseo para caballos según su estilo funcional
        principal (p. ej., rasqueta, peine para crin o peine de arrancar crines),
        lo que ayuda a los compradores a encontrar rápidamente la herramienta adecuada
        para las necesidades específicas de aseo.
    combat_shorts_cut_style:
      name: Tipo de corte de los shorts de combate
      description: Indica el tipo de corte o ajuste específico de los shorts para
        deportes de combate (p. ej., corte alto, corte retro o compresión).
    comic_creator_role:
      name: Rol del creador del cómic
      description: Especifica el rol del creador acreditado relevante para la publicación
        (p. ej., guionista o ilustrador/artista).
    commemorative_coin_finish:
      name: Acabado de monedas conmemorativas
      description: Describe el tipo de acuñación o acabado de una moneda conmemorativa.
    commemorative_coin_mint_mark:
      name: Marca de ceca de la moneda conmemorativa
      description: Indica la marca de ceca (o la ausencia de ella) en la moneda.
    commemorative_subject:
      name: Tema conmemorativo
      description: Tema principal conmemorado (evento, persona, lugar, aniversario,
        organización, etc.).
    commercial_vehicle_class:
      name: Clase de vehículo comercial
      description: Clase regulatoria o industrial basada en el GVWR utilizada para
        describir la categoría de peso de un vehículo comercial con fines de búsqueda
        y filtrado.
    compass_damping_medium:
      name: Medio de amortiguación de la brújula
      description: Especifica el medio utilizado para estabilizar el movimiento de
        la aguja dentro de la cápsula de la brújula.
    compass_illumination_type:
      name: Tipo de iluminación de la brújula
      description: Especifica cómo se hacen visibles las marcas de la brújula en condiciones
        de poca luz (p. ej., pintura luminiscente, tritio o retroiluminación LED).
    compass_mounting_style:
      name: Estilo de montaje de la brújula
      description: Describe cómo se transporta, se lleva o se instala la brújula.
    compass_scale_units:
      name: Unidades de escala de la brújula
      description: Identifica las unidades de medida (grados, milésimas de pulgada
        o ambas) marcadas en la carcasa de la brújula.
    compatible_abs_system:
      name: Sistema ABS compatible
      description: Indica si el cilindro maestro está destinado a vehículos equipados
        con ABS.
    compatible_adapter_brand:
      name: Marca de adaptador compatible
      description: Identifica la marca de cabeza de palo de golf compatible con la
        vara.
    compatible_airbag_system_type:
      name: Tipo de sistema de airbag compatible
      description: Indica la generación o el conjunto de características del sistema
        de airbag con el que la pieza es compatible (p. ej., de una etapa o dos etapas).
    compatible_amplifier_fit_method:
      name: Sistema de ajuste compatible con el amplificador
      description: Indica cómo se define la compatibilidad para la cubierta/caja (ajuste
        universal, específico del modelo, por dimensión).
    compatible_apparatus:
      name: Aparato compatible
      description: Especifica el aparato de gimnasia o la actividad para la que están
        diseñadas las empuñaduras.
    compatible_archery_tool:
      name: Herramienta de tiro con arco compatible
      description: Indica la herramienta o el equipo principal de tiro con arco con
        el que el accesorio está diseñado para funcionar.
    compatible_axle_size:
      name: Tamaño de eje compatible
      description: Especifica el diámetro del buje/eje o el estándar de rosca para
        el que está diseñado el pedalín (p. ej., 10 mm/3/8 in, 14 mm o 3/8 in 26 TPI).
    compatible_axle_type:
      name: Tipo de eje compatible
      description: Identifica los estándares de fijación del eje trasero compatibles
        con el rodillo de entrenamiento, como cierre rápido o distintos tamaños de
        eje pasante.
    compatible_axle_weight_rating:
      name: Capacidad de carga del eje compatible
      description: Especifica la capacidad de carga por eje del remolque para la que
        está diseñado el conjunto de freno del remolque.
    compatible_bait_type:
      name: Tipo de cebo compatible
      description: Identifica los tipos de cebo de pesca compatibles con el taladro
        para cebos, lo que ayuda a los pescadores a elegir una herramienta adecuada
        para su cebo preferido.
    compatible_bass_scale_length:
      name: Longitud de escala de bajo compatible
      description: Indica las longitudes de escala de bajo para las que está diseñado
        el juego de cuerdas (importante para un ajuste correcto y una longitud adecuada
        del entorchado).
    compatible_battle_top_system:
      name: Sistema de trompos de combate compatible
      description: Identifica el ecosistema o la serie de trompos de combate para
        los que está diseñado el trompo, lo que garantiza la compatibilidad con piezas
        y arenas de combate.
    compatible_bb_size:
      name: Tamaño BB compatible
      description: Indica el diámetro de las municiones de airsoft compatibles con
        el producto.
    compatible_bed_frame_style:
      name: Tipo de estructura de cama compatible
      description: Especifica el tipo de cama o estructura para el que está diseñado
        el accesorio.
    compatible_bicycle_tire_type:
      name: Tipo de neumático de bicicleta compatible
      description: Especifica qué tipos de neumáticos de bicicleta puede reparar o
        sellar el producto.
    compatible_bike_component:
      name: Componente de bicicleta compatible
      description: Especifica para qué componente de la bicicleta está diseñada la
        herramienta o el producto de mantenimiento.
    compatible_billiard_game:
      name: Juego de billar compatible
      description: Identifica las modalidades de billar para las que está diseñado
        el triángulo, lo que garantiza que los clientes elijan uno compatible con
        su tipo de juego.
    compatible_billiard_table_size:
      name: Tamaño de mesa de billar compatible
      description: Especifica las longitudes estándar de mesa para las que está diseñada
        la cubierta, lo que garantiza que los compradores elijan una cubierta del
        tamaño adecuado para su mesa de billar.
    compatible_bit_type:
      name: Tipo de broca compatible
      description: Tipos de terminales con los que se puede utilizar la protección.
    compatible_blade_hosel:
      name: Hosel de hoja compatible
      description: Indica el tipo de casquillo/conicidad de la hoja que acepta el
        eje, lo que garantiza que el eje y la hoja encajen correctamente.
    compatible_blade_system:
      name: Sistema de hoja compatible
      description: Indica el sistema o formato de cuchillas de repuesto que acepta
        el cuchillo (p. ej., cuchillas estándar para aficionados n.° 11, cuchillas
        de segmentos desmontables).
    compatible_boat_weaving_shuttle_loom:
      name: Telar compatible con la lanzadera tipo bote
      description: Con qué tipos de telares está diseñado para usarse el mecanismo
        de lanzadera para barcos.
    compatible_bobbin_type:
      name: Tipo de bobina compatible
      description: Indica el tipo de bobina/carrete que el sistema de transporte de
        la embarcación está diseñado para usar.
    compatible_bottle_mouth:
      name: Boca de botella compatible
      description: Tipo o diámetro de la boca de la botella para la que está diseñada
        el sorbete o el tapón.
    compatible_bow_attachment_system:
      name: Sistema de fijación compatible del arco
      description: Indica la interfaz de las palas o accesorios para la que está diseñada
        la pieza (p. ej., ILF, ajuste por tornillo o desmontaje rápido).
    compatible_bow_crossbow_type:
      name: Tipo de arco o ballesta compatible
      description: Indica el estilo de arco o ballesta para el que el accesorio está
        diseñado.
    compatible_brake_fluid:
      name: Líquido de freno compatible
      description: Especificaciones DOT del líquido de frenos con las que los sellos/materiales
        del cilindro maestro están diseñados para ser compatibles.
    compatible_brake_pad:
      name: Pastilla de freno compatible
      description: Indica qué compuestos de pastillas de freno están aprobados para
        el rotor, lo que garantiza la seguridad y un desgaste óptimo.
    compatible_brake_service_system:
      name: Sistema de servicio de frenos compatible
      description: Especifica si la pieza está destinada a frenos de disco, frenos
        de tambor o ambos.
    compatible_brake_system:
      name: Sistema de frenos compatible
      description: Especifica las notas clave de compatibilidad del sistema para el
        uso del líquido de frenos.
    compatible_brake_type:
      name: Tipo de freno compatible
      description: Especifica el tipo de freno con el que es compatible el portabicicletas,
        como frenos de disco o de llanta.
    compatible_brass_instrument_finish:
      name: Acabado de instrumento de metal compatible
      description: Especifica para qué acabados de instrumentos de metal es seguro
        utilizar el limpiador sin dañar la superficie.
    compatible_building_toy_system:
      name: Sistema de juguetes de construcción compatible
      description: Indica con qué sistema o estándar de construcción es compatible
        el juguete (o con qué tamaño equivalente), como compatible con LEGO o con
        un sistema propio.
    compatible_capo_fretboard_radius:
      name: Radio del diapasón compatible con el cejillo
      description: Especifica el radio o perfil del diapasón para el que está diseñado
        el capotraste, a fin de lograr un contacto óptimo y una afinación estable.
    compatible_capo_number_of_strings:
      name: Cantidad de cuerdas compatibles con el capotraste
      description: Indica para cuántas cuerdas está diseñado el capotraste (útil para
        instrumentos de 6, 7, 8 o 12 cuerdas, y otros instrumentos especiales).
    compatible_cardio_machine_type:
      name: Tipo de máquina cardiovascular compatible
      description: Identifica el tipo de máquina cardiovascular con la que el accesorio
        o la pieza está diseñado para funcionar.
    compatible_chain_link_type:
      name: Tipo de eslabón de cadena compatible
      description: Identifica el tipo de eslabón de la cadena que admite la herramienta
        (estándar, medio eslabón, eslabón rápido, etc.).
    compatible_chain_size:
      name: Tamaño de cadena compatible
      description: Especifica los estándares de ancho o paso de cadena compatibles
        con la herramienta (p. ej., 1/8 pulgadas o 3/32 pulgadas).
    compatible_chain_width:
      name: Ancho de cadena compatible
      description: Indica con qué tamaño de cadena el piñón libre está diseñado para
        funcionar.
    compatible_chip_denomination:
      name: Denominación de ficha compatible
      description: Indica para qué denominaciones de fichas el estuche o bandeja incluye
        posiciones etiquetadas o dedicadas (o está diseñado para organizar).
    compatible_clarinet_mouthpiece_ligature:
      name: Ligadura compatible con la boquilla de clarinete
      description: Identifica el estándar de ajuste o las notas de compatibilidad
        de la ligadura para la boquilla.
    compatible_classical_guitar_string_scale_length:
      name: Longitud de escala compatible de las cuerdas para guitarra clásica
      description: Longitud de escala o compatibilidad de longitud de cuerdas prevista
        para el juego.
    compatible_clay_target_size:
      name: Tamaño de plato de arcilla compatible
      description: Indica los tamaños o formas de platos de arcilla que el lanzador
        admite para un ajuste y rendimiento adecuados.
    compatible_cleat_system:
      name: Sistema de tacos compatible
      description: Especifica la interfaz de cala o el patrón de pernos compatible
        con el pedal para que los ciclistas puedan combinar sus zapatillas con el
        sistema correcto.
    compatible_clipless_pedal_system:
      name: Sistema de pedales automáticos compatible
      description: Identifica el estándar específico de pedal automático o cala con
        el que el producto es compatible.
    compatible_clutch_type:
      name: Tipo de embrague compatible
      description: Compatibilidad de la interfaz del embrague para el volante (cuando
        corresponda).
    compatible_coffee_pod_system:
      name: Sistema de monodosis de café compatible
      description: Especifica la cafetera o el sistema de preparación compatibles
        con las cápsulas o monodosis de café.
    compatible_construction_set_system:
      name: Sistema de construcción compatible
      description: Indica con qué sistema de construcción o ecosistema de marca es
        compatible el set (p. ej., compatible con LEGO o compatible con DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Soporte/clavija compatible para clarinete contrabajo
      description: Indica el tipo de soporte, clavija o interfaz de montaje requerido.
    compatible_coolant_chemistry:
      name: Química del refrigerante compatible
      description: Especifica con qué tipos o tecnologías de refrigerante es compatible
        el aditivo.
    compatible_cooling_system_material:
      name: Compatibilidad con materiales del sistema de refrigeración
      description: Especifica con qué materiales o tipos de sistemas de refrigeración
        es compatible el limpiador de radiador (p. ej., radiadores de aluminio o sistemas
        con metales mixtos).
    compatible_crib_format:
      name: Formato de cuna compatible
      description: Define la categoría general de tamaño o forma del colchón o de
        la sábana para la que está diseñado el accesorio.
    compatible_cross_stitch_fabric_count:
      name: Compatibilidad con el recuento de la tela de punto de cruz
      description: Recuento de tela recomendado para bordar el diseño.
    compatible_cross_stitch_frame:
      name: Bastidor para punto de cruz compatible
      description: 'Indica para qué tipo de soporte está diseñado el bastidor: uso
        manual, soporte de mesa, soporte de suelo o uso universal.'
    compatible_crossbar:
      name: Compatibilidad con barras transversales
      description: Indica con qué barras transversales del portaequipajes de techo
        del vehículo es compatible el portaequipajes (cuando se monta en el techo),
        incluidos los distintos perfiles o formas de barra.
    compatible_cycling_cleat:
      name: Sistema de calas compatible
      description: Especifica el sistema de calas o pedales con el que están diseñadas
        para utilizarse las zapatillas de ciclismo.
    compatible_cymbal_size:
      name: Tamaño de platillos compatible
      description: Indica el diámetro de platillo que admite el estuche (o el diámetro
        máximo compatible); se refiere al tamaño del platillo y no al diámetro exterior
        del estuche.
    compatible_device_type:
      name: Tipo de dispositivo compatible
      description: Indica para qué tipo de dispositivo está diseñado el soporte (p.
        ej., monitor/televisor, tableta, teléfono inteligente o reproductor de DVD
        portátil).
    compatible_dock_structure_type:
      name: Tipo de estructura base compatible
      description: La estructura base sobre la que están diseñados para montarse los
        escalones.
    compatible_dough_type:
      name: Tipo de masa compatible
      description: Especifica con qué tipos o marcas de masa para modelar se pueden
        utilizar las herramientas (p. ej., masa de modelado estándar o arcilla para
        modelar).
    compatible_drawing_ink_surface:
      name: Superficie de tinta de dibujo compatible
      description: Indica las superficies o sustratos recomendados para obtener el
        mejor rendimiento.
    compatible_drivetrain_brand:
      name: Marca de transmisión compatible
      description: Indica las marcas de sistemas de transmisión o de frenos con las
        que el cable es compatible.
    compatible_drivetrain_speeds:
      name: Compatibilidad con velocidades de transmisión
      description: Indica la cantidad de velocidades del sistema de transmisión (p.
        ej., 10 velocidades) que admite la biela o el plato.
    compatible_equipment:
      name: Equipo compatible
      description: Especifica el tipo de equipo para deportes de invierno que la prensa
        de sujeción puede sostener.
    compatible_evap_system:
      name: Sistema EVAP compatible
      description: Indica si la tapa de combustible está diseñada para cumplir con
        los requisitos del sistema EVAP (p. ej., un sellado conforme a las especificaciones
        del fabricante) y ayuda a evitar la activación de la luz de avería del motor.
    compatible_exercise_bike_style:
      name: Tipo de bicicleta estática compatible
      description: Indica para qué tipos de bicicletas estáticas está diseñado el
        accesorio o la pieza de repuesto.
    compatible_fencing_weapon:
      name: Arma de esgrima compatible
      description: Especifica para qué arma o disciplina de esgrima está destinada
        la chaqueta o el lamé.
    compatible_fiber_type:
      name: Tipo de fibra compatible
      description: Indica los tipos principales de fibra que la cardadora de tambor
        puede procesar de manera efectiva.
    compatible_fin_box_system:
      name: Sistema de caja de aletas compatible
      description: Identifica el cajetín o sistema de montaje para el que está diseñada
        la quilla, lo que ayuda a los surfistas a adquirir quillas compatibles con
        su tabla de surf (p. ej., FCS II, Futures o US Box).
    compatible_fingerboard_radius:
      name: Radio del diapasón
      description: Especifica el radio del diapasón (plano, curvo o compuesto) para
        el que está diseñado el capotraste a fin de proporcionar una presión uniforme
        y reducir los zumbidos de las cuerdas.
    compatible_finish_type:
      name: Tipo de acabado compatible
      description: Indica para qué tipos de acabados de instrumentos se considera
        seguro el aerosol.
    compatible_fishing_reel_type:
      name: Tipo de carrete de pesca compatible
      description: Especifica el tipo de carrete de pesca para el que el accesorio
        está diseñado (p. ej., spinning, baitcasting, mosca).
    compatible_fly_line_weight:
      name: Peso de línea de pesca compatible
      description: Indica el peso máximo de la línea de pesca con mosca AFTMA que
        la bobina está diseñada para contener.
    compatible_flywheel_type:
      name: Tipo de volante compatible
      description: Especifica el tipo de volante motor con el que funciona la placa
        de presión del embrague.
    compatible_football_kick_type:
      name: Tipo de patada compatible
      description: Identifica las situaciones de pateo para las que está diseñado
        el producto (p. ej., saque de salida o gol de campo), lo que ayuda a los atletas
        a encontrar rápidamente el equipamiento adecuado.
    compatible_fuel_system_type:
      name: Tipo de sistema de combustible compatible
      description: Especifica el sistema de alimentación de combustible para el que
        está diseñado el limpiador.
    compatible_gas_type:
      name: Tipo de gas compatible
      description: Identifica el tipo de gas comprimido para el que está diseñado
        el tanque de aire de paintball.
    compatible_gel_wax_additives:
      name: Aditivos compatibles con la cera en gel
      description: Especifica qué tipos de aditivos son compatibles con esta cera
        en gel (p. ej., tipos de colorante o elementos decorativos encapsulados).
    compatible_glaze_layering:
      name: Compatibilidad con capas de esmalte
      description: Indica si el esmalte está diseñado para aplicarse en capas junto
        con otros esmaltes para crear efectos decorativos.
    compatible_golf_bag_type:
      name: Tipo de bolsa de golf compatible
      description: Indica con qué tipos de bolsas de golf es compatible la funda o
        el estuche.
    compatible_ground_polarity:
      name: Compatibilidad con polaridad de masa
      description: Indica si el regulador de voltaje está diseñado para sistemas eléctricos
        de vehículos con conexión a tierra negativa o positiva (o si no es sensible
        a la polaridad).
    compatible_guitar_body_shape:
      name: Forma de cuerpo de guitarra compatible
      description: Indica para qué forma de cuerpo de guitarra está diseñada la funda.
    compatible_guitar_case:
      name: Tipo de estuche para guitarra compatible
      description: Especifica con qué tipos de estuche para guitarra es compatible
        el humidificador.
    compatible_guitar_scale_length:
      name: Largo de escala de guitarra compatible
      description: Indica para qué longitud o longitudes de escala de guitarra está
        diseñado el juego de cuerdas (según la longitud del entorchado o la longitud
        total de las cuerdas).
    compatible_gun_platform:
      name: Sistema de funcionamiento compatible
      description: Especifica el sistema de funcionamiento o la fuente de energía
        con los que es compatible el producto (p. ej., AEG, GBB o HPA).
    compatible_hair_length:
      name: Largo de cabello compatible
      description: Especifica la longitud o el volumen máximo de cabello que el tocado
        puede acomodar cómodamente.
    compatible_head_and_neck_restraint_system:
      name: Sistema de sujeción de cabeza y cuello compatible
      description: Indica si el casco incluye puntos de anclaje y/o es compatible
        con sistemas de sujeción de cabeza y cuello (p. ej., HANS), incluido el estado
        de inclusión/instalación de los postes de anclaje.
    compatible_helmet_certification_standard:
      name: Estándar de certificación de cascos compatible
      description: Indica cualquier norma de seguridad o contexto de certificación
        del casco para el que está diseñado el accesorio (p. ej., las láminas desprendibles
        para uso en carreras a menudo hacen referencia a reglas de sanción específicas).
    compatible_helmet_shell_size:
      name: Talla de carcasa de casco compatible
      description: Indica para qué talla(s) de carcasa de casco encaja una pieza interior
        de repuesto (las tallas de carcasa suelen corresponder a rangos de tallas
        como XS-S, M, L-XL).
    compatible_helmet_size:
      name: Tamaño de casco compatible
      description: Indica las tallas de casco con las que es compatible la máscara
        facial.
    compatible_helmet_type:
      name: Tipo de casco compatible
      description: Categoría de cascos con la que el soporte para el cuello está diseñado
        para funcionar.
    compatible_hitch_receiver_size:
      name: Talla de receptor de enganche compatible
      description: Talla de abertura del receptor del enganche con el que es compatible
        el accesorio (para accesorios de estantería montados en el enganche).
    compatible_hook_size:
      name: Tamaño de gancho compatible
      description: Sistema(s) de tamaño de agujas de crochet y/o rango de tamaños
        para los que el organizador está diseñado (p. ej., tallas estadounidenses
        con letras/números, o rango métrico en mm).
    compatible_horse_coat_type:
      name: Tipo de pelaje de caballo compatible
      description: Especifica las características del pelaje del caballo para las
        que el dispositivo de eliminación de pelo muerto es más adecuado (p. ej.,
        pelaje grueso de invierno o pelaje sensible).
    compatible_host_platform:
      name: Plataforma de host compatible
      description: Especifica con qué plataforma alojada o tipos de dispositivos es
        compatible el controlador del pad (p. ej., Windows, macOS, iOS, Android) o
        si puede funcionar de forma independiente sin una computadora.
    compatible_inflation_gas:
      name: Gas de inflado compatible
      description: Especifica con qué se debe inflar el globo (aire, helio o ambos).
    compatible_injection_type:
      name: Tipo de inyección compatible
      description: Indica qué sistema de inyección de combustible el producto está
        diseñado para limpiar.
    compatible_instrument_surface_material:
      name: Superficie/material del instrumento compatible
      description: Indica sobre qué superficies/materiales del instrumento está diseñado
        para usarse el pulimento.
    compatible_intercom_system:
      name: Sistema de intercomunicador compatible
      description: Indica si el casco está preparado/es compatible para el montaje
        o la instalación de un sistema de intercomunicación/comunicación integrado.
    compatible_interior_material:
      name: Material interior compatible
      description: Indica para qué materiales del interior del vehículo es seguro/eficaz
        el quitamanchas (p. ej., moqueta, tapicería de tela, cuero, vinilo).
    compatible_kayak_type:
      name: Tipo de kayak compatible
      description: Enumera los estilos generales de kayak en los que está diseñado
        para montarse el kit de vela.
    compatible_license_plate_hole_pattern:
      name: Patrón de orificios de placa de identificación compatible
      description: Especifica la configuración de los orificios de montaje compatibles
        con el soporte (lado del vehículo y/o lado de la placa).
    compatible_license_plate_size:
      name: Talla de la placa de identificación compatible
      description: Indica la talla(s) de placa de identificación regional o dimensional
        para la que está diseñado el soporte/montaje.
    compatible_loom:
      name: Telar compatible
      description: Especifica los tipos de telar con los que debe utilizarse el batidor
        para tejido plano.
    compatible_loom_type:
      name: Tipo de telar compatible
      description: Indica la configuración de tejido con la que está diseñado para
        usarse el batidor (p. ej., telares de peine rígido o telares de tapicería).
    compatible_machine_type:
      name: Tipo de máquina compatible
      description: Indica con qué tipo de configuración de acolchado está diseñado
        para funcionar el marco (solo acolchado a mano, máquina de coser nacional,
        máquina de acolchado de brazo largo).
    compatible_mast_type:
      name: Tipo de mástil compatible
      description: 'Especifica para qué diámetros de mástil está diseñada la vela:
        diámetro reducido (RDM), diámetro estándar (SDM) o ambos.'
    compatible_model_system_train_scale:
      name: Sistema de modelos compatible (escala de tren)
      description: Especifica la escala/sistema del modelo de tren al que se adapta
        el accesorio, cuando corresponda (p. ej., HO, N, O).
    compatible_mounting_surface:
      name: Superficie de montaje compatible
      description: La superficie u objeto al que está diseñado para sujetarse el clip.
    compatible_mouthpiece_patch:
      name: Parche de boquilla compatible
      description: Indica si la boquilla está diseñada para usarse con almohadillas/parches
        para boquilla y el rango de grosor de parche sugerido.
    compatible_mouthpiece_type:
      name: Tipo de boquilla compatible
      description: Indica el tipo de boquilla/vástago para el que está diseñado el
        melófono (generalmente, receptores tipo trompa o trompeta, según el modelo).
    compatible_neck_profile_width:
      name: Perfil/ancho de cuello compatible
      description: Indica el perfil/ancho del mástil de la guitarra para el que está
        diseñado el capo (p. ej., guitarra eléctrica estrecha o guitarra clásica ancha).
    compatible_needle_size:
      name: Tamaño de aguja compatible
      description: Indica el tamaño de la aguja/tipos para los que está diseñada la
        funda (p. ej., longitudes de agujas para bordar, tapicería, costura a mano).
    compatible_needle_system:
      name: Sistema de aguja compatible
      description: Sistema(s) de agujas con los que la máquina es compatible (p. ej.,
        130/705H).
    compatible_parking_brake_mechanism:
      name: Mecanismo de freno de estacionamiento compatible
      description: Indica si la pinza de freno está diseñada para funcionar con un
        mecanismo de freno de estacionamiento integrado.
    compatible_pedal_instrument_type:
      name: Tipo de instrumento de pedal compatible
      description: Especifica con qué instrumento está diseñado para usarse el pedal
        (p. ej., piano digital, teclado/sintetizador, controlador MIDI).
    compatible_pedal_type:
      name: Tipo de pedal compatible
      description: Indica el estilo o sistema de pedal para el que está diseñada la
        correa o el clip (p. ej., plataforma, SPD, Look Keo).
    compatible_pin_type:
      name: Tipo de pasador compatible
      description: Con qué tipo de guardado está diseñada para usarse la estera (o
        si se puede guardar).
    compatible_pipe_filter_size:
      name: Tamaño de filtro de tubería compatible
      description: Indica el tamaño o estilo del filtro que la tubería está diseñada
        para aceptar (o que no se requiere filtro).
    compatible_plate_size:
      name: Tamaño de placa compatible
      description: Dimensiones de la placa balística o talla estandarizada que el
        chaleco puede aceptar.
    compatible_play_vehicle_scale:
      name: Escala de vehículo de juguete compatible
      description: Indica la escala del juguete para la que está diseñado el accesorio
        (p. ej., 1:64), lo que mejora el ajuste/compatibilidad para los coleccionistas
        y los sistemas de pistas.
    compatible_playing_surface:
      name: Superficie de juego compatible
      description: Indica el tipo de terreno de juego o superficie para la que están
        diseñadas las botas de fútbol americano.
    compatible_pole_dimensions:
      name: Dimensiones del poste compatible
      description: Especifica el tamaño de la sección transversal del poste al que
        se ajusta el accesorio.
    compatible_pole_shape:
      name: Forma de postes compatible
      description: Especifica la forma de la sección transversal del poste o columna
        para la que está diseñado el relleno.
    compatible_power_steering_system:
      name: Sistema de dirección asistida compatible
      description: Indica los tipos de sistema de dirección para los que está destinado
        el fluido.
    compatible_powerplant_type:
      name: Tipo de planta motriz compatible
      description: Indica el sistema de propulsión de la carabina de aire comprimido
        para la que está destinada la pieza (p. ej., pistón de resorte, CO2, PCP).
    compatible_presser_foot:
      name: Prensatelas compatible
      description: Especifica el sistema de montaje/compatibilidad del prensatelas
        compatible con la máquina de coser (p. ej., de presión o de rosca; vástago
        bajo/alto/inclinado). Utiliza "universal/múltiple" si se admiten varios sistemas
        o se incluyen adaptadores.
    compatible_protective_gear:
      name: Equipo de protección compatible
      description: Especifica con qué otros equipos de protección el collarín cervical
        está diseñado para funcionar.
    compatible_protective_gear_integration:
      name: Integración de equipo de protección compatible
      description: Describe cómo se supone que el protector debe usarse o integrarse
        con otros equipos (p. ej., bolsillo interior, correa independiente).
    compatible_punching_bag_type:
      name: Tipo de saco de boxeo compatible
      description: Especifica con qué estilos de sacos de boxeo o de entrenamiento
        es compatible el producto.
    compatible_racing_discipline:
      name: Disciplina de carreras compatible
      description: Disciplinas de automovilismo para las que está diseñado/certificado
        el casco.
    compatible_rc_scale:
      name: Escala RC compatible
      description: Indica la relación de escala RC (p. ej., 1:10) para la que el accesorio
        o la pieza está diseñado.
    compatible_recorder_size:
      name: Tamaño de grabador compatible
      description: Especifica para qué tamaños de grabadora está diseñada la funda.
    compatible_recorder_type:
      name: Tipo de grabador compatible
      description: Especifica el tipo de flauta dulce (familia/talla) con la que es
        compatible el accesorio (p. ej., soprano, alto).
    compatible_reed_cut:
      name: Corte de caña compatible
      description: Especifica con qué estilo de corte de caña es compatible la ligadura
        (p. ej., corte francés/archivo frente a corte americano/sin filetear).
    compatible_reed_type:
      name: Tipo de caña compatible
      description: Especifica el tipo de caña para la que está diseñada la boquilla.
    compatible_reel_type:
      name: Tipo de caña compatible
      description: Especifica el estilo de carrete de pesca para el que está diseñada
        la bolsa, caja o funda.
    compatible_refrigerant_type:
      name: Tipo de refrigerante compatible
      description: Indica con qué refrigerante está diseñado para usarse el evaporador
        del aire acondicionado.
    compatible_ride_equipment:
      name: Equipo de conducción compatible
      description: Tipos de equipos deportivos con ruedas para los que está diseñada
        la rampa.
    compatible_roof_height:
      name: Altura de techo compatible
      description: Indica para qué perfil de techo está diseñada la cubierta (techo
        estándar o alto/extendido).
    compatible_roof_rail_type:
      name: Tipo de riel de techo compatible
      description: Especifica a qué configuración de techo está diseñado para fijarse
        el sistema de estanterías base.
    compatible_rope_count:
      name: Número de cuerdas compatibles
      description: Especifica la configuración de las cuerdas del ring de boxeo para
        la que está diseñada la pieza, p. ej., rings de 3 cuerdas, rings de 4 cuerdas
        o ajuste universal.
    compatible_rope_type:
      name: Tipo de cuerda compatible
      description: Especifica qué tipos de cuerdas se pueden utilizar con el dispositivo.
    compatible_saddle_type:
      name: Tipo de montura compatible
      description: Especifica el estilo de silla de montar o la disciplina ecuestre
        para la que está diseñado el accesorio, lo que garantiza la compatibilidad
        correcta con sillas de montar inglesas, western y de otros tipos.
    compatible_saxophone_size:
      name: Tamaño de saxofón compatible
      description: Indica con qué talla de saxofón es compatible el producto (p. ej.,
        soprano, alto, tenor).
    compatible_saxophone_type:
      name: Tipo de saxofón compatible
      description: Especifica para qué saxofón está diseñada la abrazadera/tapa.
    compatible_scale_length:
      name: Largo de escala compatible
      description: Identifica el rango de longitud de escala de guitarra para el que
        están diseñadas las cuerdas (p. ej., escala corta, estándar, barítono).
    compatible_seat_airbag:
      name: Airbag de asiento compatible
      description: Indica si el asiento incluye airbags laterales o si es compatible
        con vehículos equipados con airbags integrados en los asientos.
    compatible_seating_capacity:
      name: Capacidad de asientos compatible
      description: Especifica el número de asientos o la configuración para la que
        está diseñado el accesorio.
    compatible_sensor_port_type:
      name: Tipo de puerto de sensor compatible
      description: Especifica si el cárter de aceite admite sensores de nivel de aceite
        y/o de temperatura de aceite, y el tipo de puerto si corresponde.
    compatible_shifter_type:
      name: Tipo de palanca de cambio
      description: Identifica el tipo o la configuración de la palanca de cambios
        para la que está diseñada la funda protectora.
    compatible_shis:
      name: SHIS compatible
      description: Enumera los códigos del Sistema de Identificación de Auriculares
        Estandarizado (SHIS) con los que se ajusta la pieza (p. ej., IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Disciplina de patinaje compatible
      description: Indica las disciplinas de patinaje para las que está diseñada la
        pieza o el accesorio.
    compatible_snowshoe_deck_type:
      name: Tipo de plataforma compatible para raquetas de nieve
      description: Especifica el tipo de armazón o plataforma de raqueta de nieve
        con el que la fijación es compatible.
    compatible_special_effects_lighting_features:
      name: Funciones de iluminación de efectos especiales compatibles
      description: Destaca las características comunes que influyen en las decisiones
        de compra de luces de efectos (más allá de color/patrón), como la conexión
        de unidades o la reacción al audio.
    compatible_spinning_wheel_drive_system:
      name: Sistema de transmisión de rueda giratoria compatible
      description: Especifica qué sistemas de transmisión de rueda giratoria admite
        el accesorio.
    compatible_spoke_gauge:
      name: Calibre de radios compatible
      description: Indica los tamaños del calibre del alambre del radio a los que
        se ajustan las roscas de la cabecilla, lo que permite a los compradores combinar
        correctamente los radios y las cabecillas.
    compatible_steering_wheel_airbag:
      name: Airbag del volante compatible
      description: Indica si el volante admite conservar un módulo de airbag OEM (o
        si está destinado a aplicaciones sin airbag).
    compatible_steering_wheel_control_button:
      name: Botón de control del volante compatible
      description: Indica compatibilidad con los controles instalados en el volante
        de fábrica (audio/control de crucero/teléfono) y el cableado correspondiente.
    compatible_stencil_material:
      name: Material de estarcido compatible
      description: Materiales con los que la máquina puede crear o procesar plantillas
        (p. ej., papel, película plástica, mylar).
    compatible_stencil_media_format:
      name: Formato multimedia de plantilla compatible
      description: 'Indica qué formatos de plantillas multimedia admite la máquina:
        hojas, rollos o ambos.'
    compatible_strap_retractor:
      name: Retractor de correa compatible
      description: Indica si la correa es compatible con sistemas retráctiles o si
        está diseñada para cinturones no retráctiles (estáticos).
    compatible_string_instrument_finish:
      name: Acabado de instrumentos de cuerdas compatible
      description: Especifica en qué tipos de acabado de instrumentos se puede utilizar
        el pulimento de forma segura.
    compatible_substrate_material:
      name: Material de sustrato compatible
      description: Materiales de la superficie para los que la pintura está formulada
        para adherirse.
    compatible_surface:
      name: Superficie compatible
      description: Especifica la superficie/material a los que el adhesivo de velcro
        está diseñado para adherirse.
    compatible_surface_material:
      name: Material de superficie compatible
      description: Materiales de la superficie del vehículo sobre los que el producto
        está diseñado para usarse.
    compatible_tear_off_system:
      name: Sistema desprendible compatible
      description: Indica si las gafas admiten láminas desprendibles y/o enrollables,
        incluido si tienen postes de montaje para láminas desprendibles.
    compatible_thermostat_type:
      name: Tipo de termostato compatible
      description: Si el cuello/carcasa de agua está diseñado para aceptar un termostato
        y, de ser así, qué tipo/talla.
    compatible_thread:
      name: Hilo compatible
      description: Indica qué tipos de hilo/lana la enhebradora está diseñada para
        manejar (por grosor/tipo).
    compatible_thread_spool_format:
      name: Formato de hilo/bobina compatible
      description: Indica qué formatos de hilo la caja está diseñada para almacenar
        (carretes, bobinas, bobinas de hilo/tarjeta, conos, etc.).
    compatible_thread_yarn_tool:
      name: Herramienta compatible para hilo y lana
      description: Compatibilidad de máquinas/sistemas para herramientas que se montan
        o se utilizan con otros equipos (p. ej., máquina de coser, remalladora/overlock,
        telar, rueca).
    compatible_tire_application:
      name: Aplicación de neumáticos compatible
      description: Indica el segmento de aplicación de neumáticos/ruedas para el que
        está diseñado el desmontador de talones (en función del neumático/rueda que
        se esté reparando, no del modelo del vehículo).
    compatible_tom_pad_mounting:
      name: Soporte compatible para almohadilla de tom
      description: Especifica a qué tipo de montaje se sujeta el tom-tom electrónico
        (p. ej., soporte de abrazadera/varilla, varilla en L, soporte de pie), lo
        que afecta si encaja en sistemas de estanterías existentes.
    compatible_toy_vehicle_scale:
      name: Escala de vehículo de juguete compatible
      description: Indica el modelo de vehículo de juguete o el modelo aproximado
        con el que el juego es compatible.
    compatible_tpms_sensor_type:
      name: Tipo de sensor TPMS compatible
      description: Especifica si la rueda ayuda a los sensores TPMS y/o a cualquier
        tipo de válvula/sensor requerido.
    compatible_training_equipment:
      name: Equipo de entrenamiento compatible
      description: Enumera los tipos de equipos de entrenamiento o fitness que se
        pueden acoplar al soporte.
    compatible_treadmill_design:
      name: Diseño de cinta de correr compatible
      description: Especifica el diseño de la cinta de correr con el que es compatible
        el accesorio, p. ej., modelos plegables o no plegables.
    compatible_tube:
      name: Tubo compatible
      description: Indica el tipo de cámara de aire o construcción del neumático para
        el que está diseñado el parche, p. ej. butilo, látex, TPU o sin cámara.
    compatible_valve_type:
      name: Tipo de válvula compatible
      description: Especifica con qué tipo de válvula de latón es compatible el lubricante.
    compatible_vaporizing_material:
      name: Material vaporizador compatible
      description: Indica los tipos de materiales que el dispositivo está diseñado
        para vaporizar.
    compatible_vehicle_windshield_fluid:
      name: Líquido limpiaparabrisas compatible con el vehículo
      description: Declaraciones de compatibilidad relacionadas con el equipamiento
        del vehículo o variaciones del cristal (p. ej., seguro para revestimientos
        repelentes de lluvia, seguro para lavafaros).
    compatible_visor_system:
      name: Sistema de visor compatible
      description: Indica con qué tipos de sistemas de visera/inserto el casco de
        motocicleta es compatible.
    compatible_water_board_type:
      name: Tipo de tabla de agua compatible
      description: Qué tablas para deportes acuáticos está diseñada para transportar
        el estante.
    compatible_water_sport_board_type:
      name: Tipo de tabla de deportes acuáticos compatible
      description: Enumera los tipos de tablas que la estantería está diseñada para
        transportar.
    compatible_watercraft_communication_standard:
      name: Estándar de comunicación para embarcaciones compatible
      description: Especifica los estándares de comunicación/red marítima compatibles
        o los protocolos de integración para la interoperabilidad con la electrónica
        a bordo.
    compatible_watercraft_engine_type:
      name: Tipo de motor de embarcación compatible
      description: Indica la configuración del sistema de propulsión al que se adapta
        la pieza (fueraborda/intraborda/fueraborda/propulsión a chorro).
    compatible_weight_plate_diameter:
      name: Diámetro de la placa de peso compatible
      description: Especifica qué diámetros de discos de peso acepta la máquina.
    compatible_wheel_finish:
      name: Acabado de rueda compatible
      description: Especifica los acabados/materiales de las ruedas sobre los que
        es seguro utilizar el limpiador (según lo indicado por el fabricante).
    compatible_whorl_drive_band_type:
      name: Tipo de banda de transmisión compatible para el torno
      description: Especifica con qué estilo de banda de transmisión está diseñado
        para funcionar el torno.
    compatible_wick_series:
      name: Serie de mechas compatibles
      description: Indica las series/tipos comunes de mechas para los que está diseñada
        la pestaña (nomenclatura del sector), si así lo especifica el vendedor.
    compatible_winder_head_bit:
      name: Cabezal/broca de bobinado compatible
      description: Especifica el estilo de interfaz de la llave/cabezal del afinador
        que admite el bobinador (p. ej., cabezal ranurado, puntas intercambiables,
        cabezal universal).
    compatible_windlass_rode:
      name: Cadena de molinete compatible
      description: Especifica el tipo de cabo/cadena de fondeo que el molinete está
        diseñado para manejar.
    compatible_windshield_type:
      name: Tipo de parabrisas compatible
      description: Especifica con qué tipo de configuración de parabrisas está diseñado
        para funcionar el cerramiento.
    compatible_wood:
      name: Madera compatible
      description: Especifica con qué tipos de madera de diapasón se recomienda/es
        seguro utilizar el pulimento.
    compatible_writing_surface:
      name: Superficie de escritura compatible
      description: Especifica las superficies/papeles sobre los que se espera que
        la tinta funcione mejor.
    compatible_zipper_size:
      name: Tamaño de cremallera compatible
      description: 'Indica el tamaño de cremallera para el que está diseñado el tirador
        (a menudo, expresado como #3, #5, #8, #10), lo que mejora el filtrado de compatibilidad.'
    compliance_certification:
      name: Certificación de cumplimiento
      description: La barra de luces cumple con las normas de conformidad/homologación
        para su uso en carretera y su compatibilidad electromagnética.
    component_position:
      name: Posición del componente
      description: Especifica la posición relativa de la pieza dentro del conjunto
        de distribución del motor (p. ej., tapa delantera o trasera, superior o inferior).
        No especifica la ubicación delantera/trasera del vehículo.
    concentration_level:
      name: Nivel de concentración
      description: Indicación cualitativa del grado de concentración de la pasta de
        tomate (simple, doble, triple), útil para adaptarla a los requisitos de recetas.
    concentration_type:
      name: Tipo de concentración
      description: Indica si el producto está listo para usar o es concentrado y (si
        es así) proporciona recomendaciones típicas de dilución.
    concert_bass_drum_mounting_stand_type:
      name: Tipo de soporte de montaje para bombo de concierto
      description: Cómo se apoya o se monta el bombo de concierto para un rendimiento
        óptimo.
    concert_pitch_standard:
      name: Estándar de afinación de concierto
      description: Especifica la referencia de tono de concierto (A4) a la que está
        afinado el piano en el momento de la oferta (p. ej., A440, A442, A444).
    condiment_form:
      name: Forma de condimento
      description: Indica la forma física o consistencia del producto de rábano picante
        (p. ej., pasta, polvo, crema).
    condiment_texture:
      name: Textura del condimento
      description: Describe la consistencia física del encurtido o chutney (p. ej.,
        grumoso, suave).
    confetti_format:
      name: Formato del confeti
      description: Especifica el formato del producto de confeti en función de cómo
        se empaqueta o se lanza el confeti (p. ej., confeti suelto o con cañones/disparadores).
    conga_head_tensioning_system:
      name: Sistema de tensado de cabezales de conga
      description: Tipo de hardware utilizado para tensar/afinar el parche de la conga
        (p. ej., afinación tradicional con tensores o mecanismos modernos de afinación
        rápida).
    conga_set_included_drum_types:
      name: El juego de congas incluyó diferentes tipos de tambores
      description: Qué tipos de conga se incluyen en un set de conga (p. ej., quinto
        + conga + tumba).
    connector_case_style:
      name: Estilo de estuche para conectores
      description: Clasifica el estilo de construcción general del estuche para conectores
        (p. ej., carcasa rígida o bolsa blanda) para reflejar el nivel de protección
        y la portabilidad.
    console_cover_installation_method:
      name: Método de instalación de la cubierta de la consola
      description: Especifica cómo se fija la cubierta de la consola a la consola/reposabrazos
        (p. ej., se desliza, con correas elásticas, con velcro, adhesiva o con clip).
    console_display_type:
      name: Tipo de pantalla de la consola
      description: Identifica el tipo de pantalla que ofrece la máquina (p. ej., LCD,
        LED, pantalla táctil).
    construction_design:
      name: Diseño de construcción
      description: Indica cuántas piezas articuladas componen la almohadilla, lo que
        afecta la movilidad (p. ej., una o tres piezas).
    contact_angle:
      name: Ángulo de contacto
      description: Especifica el ángulo de contacto de las pistas de rodadura, expresado
        como un ángulo único o un conjunto de ángulos emparejados (p. ej., 36°/45°).
    contact_juggling_ball_fill_type:
      name: Tipo de llenado de pelota de malabarismo de contacto
      description: Permite identificar si la pelota es maciza o rellena (y, para rellena,
        qué tipo de relleno), lo que afecta la distribución del peso y la durabilidad.
    contact_juggling_ball_transparency:
      name: Transparencia de la pelota de malabares de contacto
      description: Especifica la transparencia/aspecto óptico de la bola.
    contact_surface_material:
      name: Material de la superficie de contacto
      description: Identifica el material utilizado en los puntos de contacto que
        tocan el instrumento (p. ej., corcho/caucho) para evitar arañazos y mejorar
        el agarre.
    container_material:
      name: Material del contenedor
      description: Especifica el material principal del envase comercial del producto
        (p. ej., vidrio, tereftalato de polietileno, plástico, aluminio).
    contaminant_removal:
      name: Eliminación de contaminantes
      description: Enumera las clases de contaminantes que el producto está certificado
        para eliminar o reducir.
    contra_alto_clarinet_body_configuration:
      name: Configuración del cuerpo del clarinete contralto
      description: Describe el factor de forma de la construcción física del clarinete
        contralto (p. ej., diseños rectos o plegados).
    contra_alto_clarinet_lowest_note_extension:
      name: Extensión de la nota más grave del clarinete contralto
      description: Especifica la extensión de la nota más baja que puede tocar el
        instrumento (la nota más baja que permite el mecanismo de llaves), que se
        usa comúnmente para distinguir los modelos de Mi♭ bajo, Re bajo y Do bajo.
    contra_bass_clarinet_bell_type:
      name: Tipo de campana de clarinete contrabajo
      description: Configuración de campana utilizada en el clarinete contrabajo.
    contra_bass_clarinet_bore_type:
      name: Tipo de orificio de clarinete contrabajo
      description: Diseño del orificio del instrumento.
    contra_bass_clarinet_lowest_written_note:
      name: Nota escrita más baja de clarinete contrabajo
      description: La nota escrita más baja que puede tocar el instrumento (a menudo,
        depende de la extensión del Do grave frente al Mi bemol grave).
    control_arm_bushing_material:
      name: Material del buje del brazo de control
      description: Especifica el material de los casquillos incluidos/instalados,
        si los hubiera.
    control_arm_bushings_included:
      name: Bujes del brazo de control incluidos
      description: Indica si el brazo de control se envía con bujes instalados.
    control_arm_finish:
      name: Acabado del brazo de control
      description: Especifica el acabado protector aplicado al brazo de control (protección
        contra la corrosión y aspecto).
    control_arm_grease_fitting_type:
      name: Tipo de engrasador del brazo de control
      description: Especifica si el conjunto brazo de control/rótula incluye una boquilla
        de engrase (zerk) y si es reparable.
    control_arm_material:
      name: Material del brazo de control
      description: Especifica el material principal y la construcción de fabricación
        del cuerpo del brazo de control.
    control_arm_position:
      name: Posición del brazo de control
      description: Especifica la posición de la suspensión para la que está diseñado
        el brazo de control dentro del contexto de la esquina/lado del eje (p. ej.,
        superior/inferior, delantero/trasero, izquierdo/derecho).
    control_arm_style:
      name: Estilo de brazo de control
      description: Identifica el estilo geométrico/de diseño del brazo de control
        utilizado en el sistema de suspensión.
    control_cable_connector_type:
      name: Tipo de conector del cable de control
      description: Especifica el tipo de conector/terminal utilizado por los cables
        de control para interactuar con el sistema de control y el motor (p. ej.,
        conectores específicos del fabricante).
    control_voltage_or_gate_connectivity:
      name: Voltaje de control o conectividad de puerta
      description: Especifica los tipos de conexiones de voltaje de control (CV) y
        gate compatibles para la integración con equipos modulares o analógicos.
    controller_function:
      name: Función del controlador
      description: Define la función principal de la placa de control de la cinta
        de correr, como el control del motor, el suministro de alimentación o el variador
        de frecuencia.
    controller_type:
      name: Tipo de controlador
      description: Especifica el controlador/sistema de control del motor incluido
        en el kit de conversión a vehículo eléctrico para scooter (o necesario para
        su uso), con foco en las características del controlador relevantes para la
        compatibilidad y el rendimiento.
    conversion_kit_cooling_method:
      name: Método de refrigeración del kit de conversión
      description: Enfoque principal de gestión térmica utilizado para la integración
        motor/inversor/batería.
    conversion_kit_installation_complexity:
      name: Complejidad de la instalación del kit de conversión
      description: Nivel de esfuerzo de instalación previsto en función de las habilidades/herramientas
        del cliente típico.
    converted_bed_size:
      name: Tamaño de la cama convertida
      description: Indica el tamaño o la configuración de la cama que tendrá la cuna
        cuando se instale este kit.
    convertible_configuration:
      name: Configuración convertible
      description: Indica en cuántas configuraciones de cama diferentes se puede convertir
        el producto (p. ej., cuna 3 en 1 → cama para niños pequeños → sofá cama).
    convertible_high_chair_modes:
      name: Modos de silla alta convertible
      description: Especifica las configuraciones de asiento en las que se puede convertir
        la silla.
    cookie_decorating_kit_items_included:
      name: Artículos incluidos en el kit para decorar galletas
      description: Enumera los componentes de decoración proporcionados para que los
        clientes sepan exactamente qué suministros tiene la caja (p. ej., tubos de
        glaseado, chispas de colores, cortadores de galletas).
    cookie_variety:
      name: Variedad de galletas
      description: Identifica el estilo o la variedad específica de las galletas,
        lo que ayuda a los compradores a encontrar rápidamente su tipo preferido.
    cooking_state:
      name: Estado de cocción
      description: Indica el grado de preparación del producto de pollo en el momento
        de su venta (crudo, totalmente cocido, marinado, etc.).
    coolant_additive_purpose:
      name: Finalidad del aditivo refrigerante
      description: Función principal prevista del aditivo para refrigerante (no incluye
        productos limpiadores de radiador ni selladores específicos).
    coolant_base_fluid:
      name: Fluido base del refrigerante
      description: Identifica la base de glicol principal utilizada en la formulación
        del anticongelante/refrigerante.
    coolant_outlet_connection_style:
      name: Estilo de conexión de salida del refrigerante
      description: El tipo de interfaz de conexión de salida que se utiliza para conectar
        una manguera de radiador o una línea de refrigerante.
    coolant_outlet_neck_angle:
      name: Ángulo del cuello de salida del refrigerante
      description: El ángulo/orientación de la salida del cuello de agua con respecto
        a la brida de montaje/motor (útil para el enrutamiento de la manguera superior
        del radiador).
    coolant_technology:
      name: Tecnología de refrigeración
      description: Especifica la familia de química/tecnología del refrigerante utilizada
        por el anticongelante/refrigerante (como se indica comúnmente en la etiqueta
        del embalaje).
    coolant_temperature_sensor_port:
      name: Puerto del sensor de temperatura de refrigerante
      description: Si el cuello de agua incluye un puerto para un sensor o interruptor
        de temperatura del refrigerante y qué interfaz utiliza.
    coolant_temperature_sensor_seal_type:
      name: Tipo de sello del sensor de temperatura de refrigerante
      description: Tipo de método de sellado utilizado entre el sensor y el motor/conducto
        del refrigerante.
    cooling_system_component_included:
      name: Componente del sistema de refrigeración incluido
      description: Enumera los componentes adicionales del sistema de refrigeración
        que se incluyen con la bomba de agua.
    cooling_system_flush_application_step:
      name: Paso de aplicación de purga del sistema de refrigeración
      description: Indica en qué etapa del proceso de servicio se ubica el producto
        (p. ej., limpiador de prelavado o enjuague final/neutralizador).
    cooling_system_type:
      name: Tipo de sistema de refrigeración
      description: Especifica la configuración del sistema de refrigeración utilizado
        por un motor marino intraborda (p. ej., agua bruta/circuito abierto, circuito
        cerrado/agua dulce con intercambiador de calor, refrigeración por quilla).
    cord_material:
      name: Material del cable
      description: Especifica el material del cordón/cadena utilizado para pasar el
        hisopo a través del saxofón.
    core_type_bass_strings:
      name: Tipo de núcleo (cuerdas de bajo)
      description: Especifica la forma principal de la cuerda, lo que afecta la sensación
        y la flexibilidad.
    cork_grease_base_material:
      name: Material base de la grasa de corcho
      description: Base principal de formulación de la grasa de corcho (p. ej., a
        base de lanolina).
    cork_grease_form:
      name: Forma de grasa de corcho
      description: El factor de forma física del producto de grasa de corcho.
    corn_presentation:
      name: Presentación del maíz
      description: Especifica la presentación física o la forma del producto de maíz
        (p. ej., entero con cáscara, granos, en polvo).
    corn_syrup_variety:
      name: Variedad de jarabe de maíz
      description: Especifica el estilo o la variante de procesamiento particular
        del jarabe.
    corn_variety:
      name: Variedad de maíz
      description: Identifica la variedad botánica o de mercado específica del maíz
        que se vende, lo que permite a los compradores distinguir entre tipos que
        difieren en sabor, textura, color y uso culinario.
    corner_compatibility:
      name: Compatibilidad con esquinas
      description: Especifica la forma de las esquinas de la mesa (cuadrada o redonda)
        para la que está diseñada la funda.
    corner_flag_features:
      name: Características de la bandera de corner
      description: Destaca las características funcionales especiales o las mejoras
        de la bandera de corner (p. ej., mástil plegable, material reflectante).
    cornet_mouthpiece_shank_type:
      name: Tipo de vástago de boquilla de corneta
      description: Especifica el estándar del receptor/vástago de la boquilla compatible
        con la corneta.
    cornhole_league_certification:
      name: Certificación de la liga de juego de tiro
      description: Indica las aprobaciones de liga o certificaciones oficiales que
        cumple el producto.
    corrosion_resistance:
      name: Resistencia a la corrosión
      description: Especifica el tratamiento o la clasificación de la resistencia
        a la corrosión del soporte para la exposición en exteriores.
    corrosion_resistance_level:
      name: Nivel de resistencia a la corrosión
      description: Indica que ofrece protección contra la corrosión adecuada para
        entornos de agua dulce/salada.
    costume_components_included:
      name: Componentes del disfraz incluidos
      description: Enumera las prendas y accesorios incluidos en el vestuario y aclara
        qué forma parte del conjunto.
    cotton_weave_type:
      name: Tipo de tejido de algodón
      description: Describe la estructura del tejido/punto de la superficie de algodón
        imprimible que afecta a la textura y a la nitidez de la impresión.
    counter_type:
      name: Tipo de contador
      description: Indica la presencia y el estilo de la repetición integrada o el
        seguimiento de la fuerza.
    counterweight_fill_material:
      name: Material de relleno de contrapeso
      description: Indica la sustancia que se puede utilizar para incorporar lastre
        o prellenar el contrapeso.
    counterweight_type:
      name: Tipo de contrapeso
      description: Especifica el diseño o el estilo de construcción del contrapeso,
        p. ej., saco de arena o placa de acero, para facilitar la compatibilidad y
        la instalación.
    coupler_system:
      name: Sistema de acoplamiento
      description: Tipo/sistema de acoplamiento instalado en la locomotora modelo
        para garantizar la compatibilidad con el material rodante.
    court_surface_suitability:
      name: Idoneidad de la superficie de la cancha
      description: Indica la superficie de la cancha de baloncesto para la que está
        diseñada la suela del zapato, lo que ayuda a los compradores a elegir la tracción
        y durabilidad adecuadas para canchas de madera interiores, asfalto/hormigón
        exteriores o ambas.
    cover_fit_style:
      name: Estilo de calce de funda
      description: Describe cómo se ajusta la funda a la tabla, lo que afecta su apariencia
        y el nivel de protección.
    cover_fit_type:
      name: Tipo de ajuste de la funda
      description: Indica si la funda es a medida (personalizada/semipersonalizada)
        o universal, y si está diseñada para amarre en el agua o el almacenamiento/uso
        en remolques.
    cowbell_beater_type:
      name: Tipo de baqueta para cencerro
      description: Tipo de instrumento de percusión recomendado para el sonido/acabado
        del cencerro (si el producto lo especifica).
    cowbell_mounting_method:
      name: Método de montaje de cencerro
      description: Cómo se supone que se debe montar/utilizar el cencerro (de mano
        o montado en herrajes).
    cowbell_sound_character:
      name: Carácter de sonido del cencerro
      description: Carácter tonal general utilizado en publicaciones (admite el descubrimiento
        más allá de la talla).
    cradle_capacity:
      name: Capacidad de la cuna
      description: Indica si la cuna está diseñada para un solo bebé o para gemelos.
    craft_cutter_embosser_machine_operation:
      name: Funcionamiento de la máquina cortadora/grabadora para manualidades
      description: Especifica cómo funciona la cortadora/grabadora desde la perspectiva
        del flujo de trabajo del usuario (p. ej., manivela manual, botón eléctrico,
        controlada por app).
    craft_decoration_maker_accessories_included:
      name: Accesorios incluidos con la máquina de decoración para manualidades
      description: Enumera los accesorios clave incluidos con la máquina de decoración
        para manualidades (p. ej., cinta o película inicial, recargas de pegatinas,
        cartuchos de purpurina, herramientas de limpieza).
    craft_foil_application_method:
      name: Método de aplicación del papel metálico para manualidades
      description: Indica cómo se debe aplicar/activar el papel metálico para manualidades
        (adhesivo, calor, tóner/reactivo, etc.).
    craft_foil_format:
      name: Formato del papel metálico para manualidades
      description: Indica el formato físico del papel metálico para manualidades tal
        como se vende (p. ej., rollo o láminas).
    craft_glue_finish:
      name: Acabado de pegamento para manualidades
      description: Describe el aspecto del pegamento después del secado (p. ej., transparente,
        blanco/opaco, translúcido, brillante/mate).
    craft_magnet_application:
      name: Aplicación del imán para manualidades
      description: Caso de uso principal en manualidades o superficie de montaje prevista
        para el producto magnético.
    craft_magnet_holding_strength_level:
      name: Nivel de fuerza de sujeción del imán para manualidades
      description: Categoría de fuerza relativa de los imanes para manualidades para
        ayudar a los compradores a elegir la fuerza de sujeción adecuada para su proyecto.
    craft_organizer_storage_features:
      name: Características de almacenamiento del organizador para manualidades
      description: Describe las características de organización y los elementos de
        almacenamiento interno de los organizadores de manualidades (p. ej., divisores
        ajustables, cajones, bolsillos transparentes).
    craft_scoring_board_included_accessories:
      name: Accesorios incluidos con el tablero de marcado para manualidades
      description: Accesorios incluidos con el tablero de marcado (p. ej., punzón
        de marcado/plegadera de hueso, escuadra, herramienta para sobres).
    craft_scoring_board_measurement_system:
      name: Sistema de medición del tablero de marcado para manualidades
      description: Especifica el sistema de medición marcado en el tablero de marcado
        (imperial, métrico, dual o sin marcar).
    craft_wire_finish_coating:
      name: Acabado/revestimiento del alambre para manualidades
      description: Especifica el acabado superficial o el revestimiento aplicado al
        cable para detallar el color, la resistencia al deslustre o la protección.
    craft_wood_surface_preparation:
      name: Preparación de la superficie de madera para manualidades
      description: Indica si la superficie de madera está lista para el acabado/pintura
        o si requiere preparación (p. ej., lijado/imprimación).
    crank_spindle_interface:
      name: Interfaz del eje de la manivela
      description: Especifica el sistema de eje la manivela que admite al pedalier
        (p. ej., SRAM DUB, Square Taper), lo que asegura la compatibilidad entre el
        juego de manivelas y el pedalier.
    crankshaft_balance_type:
      name: Tipo de equilibrado del cigüeñal
      description: Indica si el cigüeñal está en equilibrio interno (neutral) o en
        equilibrio externo (requiere equilibrador armónico/contrapesos del volante).
    crankshaft_bolt_pattern:
      name: Patrón de pernos del cigüeñal
      description: Patrón de pernos en la brida trasera para la fijación del volante/placa
        flexible.
    crankshaft_sensor_reluctor_type:
      name: Tipo de reluctor del sensor del cigüeñal
      description: Configuración del sensor de posición del cigüeñal (activador/rueda
        de reluctancia) utilizada (cuando corresponda).
    craps_accessories_included:
      name: Accesorios de crap incluidos
      description: Identifica accesorios adicionales específicos para el craps incluidos,
        más allá de dados/fichas/tapete.
    crash_cymbal_profile:
      name: Perfil del platillo crash
      description: Curvatura/perfil general del platillo (qué tan pronunciada es la
        curvatura), lo que afecta el tono y la respuesta.
    crash_cymbal_sound_character:
      name: Carácter de sonido del platillo crash
      description: Descripción del carácter tonal principal del sonido del platillo
        crash.
    crash_pad_size_class:
      name: Clase de tamaño de la colchoneta de caída
      description: Indica la categoría de tamaño general de una colchoneta de escalada,
        lo que da a los compradores una idea rápida de la cobertura de la superficie
        sin necesidad de dimensiones exactas.
    crate_engine_assembly_level:
      name: Nivel de ensamblaje del motor en caja
      description: Qué tan completo es el motor en caja que se envía (qué componentes
        principales incluye).
    cream_base_ingredient:
      name: Ingrediente base de la crema
      description: Identifica la fuente principal de la crema, y abarca tanto las
        especies lácteas como las alternativas de origen vegetal.
    cream_cheese_base:
      name: Base del queso crema
      description: Identifica la principal fuente láctea o vegetal utilizada para
        elaborar el queso crema, lo que ayuda a los compradores con consideraciones
        dietéticas y sobre alérgenos y el sabor.
    cream_cheese_form:
      name: Fórmula de queso crema
      description: Describe la forma física o el estilo de textura del queso crema
        (p. ej., en bloque, batido, para untar), lo que afecta su untabilidad y uso
        previsto.
    cream_variety:
      name: Variedad de crema
      description: Identifica el tipo específico de crema según su contenido de grasa,
        método de elaboración o uso culinario previsto (p. ej., mitad y mitad, doble
        crema, crema para cocinar).
    crib_accessory_features:
      name: Características de accesorios de la cuna
      description: Enumera las características funcionales o que priorizan la comodidad,
        específicas de los accesorios para cunas y camas infantiles, p. ej., la transpirabilidad
        o los bordes elásticos.
    crib_bumper_features:
      name: Características del protector de cuna
      description: Destaca las características funcionales especiales de un protector
        para cuna.
    crib_conversion_kit_components:
      name: Componentes del kit de conversión de cuna
      description: Enumera las piezas principales incluidas en el kit para que los
        compradores puedan verificar que tienen todo lo necesario para la instalación.
    cricket_ball_grade:
      name: Grado de la pelota de cricket
      description: Especifica el nivel de calidad o el estándar de juego previsto
        para la pelota.
    cricket_ball_piece_construction:
      name: Construcción de la pieza de pelota de críquet
      description: Indica el número de piezas exteriores o secciones moldeadas utilizadas
        para construir la carcasa de la pelota, un indicador clave de calidad y precio.
    cricket_ball_type:
      name: Tipo de bola de críquet
      description: Especifica el tipo de pelota de críquet suministrada con el producto
        o indica si no se incluye ninguna pelota.
    cricket_bat_accessory_type:
      name: Tipo de accesorio para bate de críquet
      description: Especifica el tipo de accesorio o artículo de mantenimiento para
        bates de críquet para que los compradores puedan filtrar rápidamente el producto
        que necesitan.
    cricket_bat_size:
      name: Talla del bate de críquet
      description: Indica la clasificación estandarizada de talla del bate de críquet
        (de 0 a 6, Harrow, SH, LH), que normalmente se elige en función de la edad
        y la altura del jugador.
    cricket_bat_size_compatibility:
      name: Compatibilidad del tamaño del bate de críquet
      description: Enumera el tamaño del bate para el que está diseñado el accesorio,
        lo que garantiza una compatibilidad adecuada.
    cricket_helmet_role:
      name: Rol de casco de críquet
      description: Indica el rol para el que está diseñado el casco, como batear o
        ser receptor.
    cricket_leg_guard_type:
      name: Tipo de protector para piernas de críquet
      description: Indica el estilo específico de protección para las piernas en el
        críquet.
    cricket_player_role:
      name: Rol del jugador de críquet
      description: Especifica el rol principal de juego para el que está diseñado
        el calzado.
    cricket_protection_grade:
      name: Grado de protección para críquet
      description: Especifica la clasificación del grado de protección asignada por
        el fabricante del equipo de críquet.
    cricket_stump_base_type:
      name: Tipo de base de tocón de críquet
      description: Indica el estilo o material base suministrado con los postes, lo
        que afecta la estabilidad y la idoneidad de la superficie de juego.
    cricket_stump_target_features:
      name: Características del objetivo de los postes de críquet
      description: Destaca las características funcionales distintivas que mejoran
        la usabilidad, la visibilidad, la durabilidad o la estabilidad durante el
        entrenamiento.
    cricket_stump_type:
      name: Tipo de poste de críquet
      description: Categoriza el estilo o la construcción de los postes para ayudar
        a los compradores a elegir entre postes de partido tradicionales, variantes
        de entrenamiento o modelos modernos iluminados.
    cricket_training_focus:
      name: Foco de entrenamiento de críquet
      description: Habilidad o disciplina principal de críquet que la ayuda está diseñada
        para mejorar.
    croquet_set_components_included:
      name: Componentes del juego de cróquet incluidos
      description: Enumera todos los componentes clave suministrados con el conjunto
        (p. ej., wickets, estacas, bolsa de transporte) para que los clientes entiendan
        exactamente lo que están comprando.
    cross_country_binding_system:
      name: Sistema de fijación para esquí de fondo
      description: Especifica el estándar de fijación de esquí de fondo para el que
        el producto está perforado o con el que es compatible.
    cross_stitch_chart_symbol_type:
      name: Tipo de símbolos en el gráfico de punto de cruz
      description: Cómo se representa el gráfico (símbolos, colores o ambos).
    cross_stitch_finishing_type:
      name: Tipo de acabado de punto de cruz
      description: Tipo de acabado/presentación previsto para el proyecto de bordado.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Mecanismo de sujeción de la tela en el bastidor de punto de cruz
      description: Indica cómo se sujeta/tensa la tela en el marco (p. ej., con clips,
        abrazaderas o tachuelas), lo que afecta la facilidad de uso y la compatibilidad
        de la tela.
    cross_stitch_frame_included_components:
      name: Componentes incluidos en el bastidor de punto de cruz
      description: Enumera lo que incluye la caja (p. ej., solo bastidor o bastidor
        + abrazaderas + soporte), lo que reduce la ambigüedad y las devoluciones.
    cross_stitch_frame_type:
      name: Tipo de bastidor de punto de cruz
      description: Especifica la construcción/tipo de marco de punto de cruz (cómo
        se sujeta la tela), lo que afecta la usabilidad y la compatibilidad con el
        proyecto.
    cross_stitch_pattern_technique:
      name: Técnica de patrón de punto de cruz
      description: Técnica/estilo de punto de cruz que requiere el gráfico.
    crossbar_shape_profile:
      name: Forma/perfil de la barra transversal
      description: Especifica la forma aerodinámica/de perfil de la barra transversal.
    crossbar_style:
      name: Estilo de la barra transversal
      description: Identifica el estilo de construcción del travesaño, y distingue
        las barras rígidas de competición de las barras flexibles o híbridas de entrenamiento.
    crossbow_type:
      name: Tipo de ballesta
      description: Identifica el estilo de diseño fundamental de la ballesta, p. ej.,
        compuesta, recurva o de pistola. El estilo de construcción influye en el rendimiento,
        el tamaño y el uso de la caja, por lo que los compradores suelen usarlo como
        filtro.
    crossover_component_type:
      name: Tipo de componente de cruce
      description: Identifica la topología del componente principal utilizada en la
        red de cruce pasivo.
    crossover_configuration:
      name: Configuración de crossovers
      description: Indica si el cruce utiliza un único punto de cruce o varios puntos
        (p. ej., diseños de 2 vías o diseños de 3 vías).
    crossover_type:
      name: Tipo de cruce
      description: Tipo de red de cruce incluida en el conjunto de componentes.
    crown_profile:
      name: Perfil de la copa
      description: Especifica la altura/perfil de la copa por encima del borde.
    crown_style:
      name: Estilo de la copa
      description: Define la silueta o el perfil general de la copa de un sombrero
        bombín.
    crust_taste_profile:
      name: Perfil de sabor de la corteza
      description: Indica si el sabor inherente de la corteza es dulce, salado o neutro.
    crystal_finish:
      name: Acabado cristalino
      description: Describe el acabado superficial, el recubrimiento o el estado de
        procesamiento del cristal suelto (p. ej., en bruto, pulido, envejecido, facetado,
        esmerilado, con recubrimiento aura, teñido, tratado térmicamente).
    crystal_material:
      name: Material del cristal
      description: Especifica el material utilizado para el cristal del reloj que
        protege la esfera.
    crystalline_finish_style:
      name: Estilo de acabado del cristal
      description: El aspecto cristalino/de plumas característico que produce la cera
        de palma en las velas terminadas.
    cucumber_variety:
      name: Variedad de pepino
      description: Especifica el cultivo o la variedad comercial del pepino (p. ej.,
        inglés, persa, Kirby).
    cue_compatibility:
      name: Compatibilidad de taco
      description: Indica la configuración de la junta del taco para la que está diseñada
        la caja, p. ej., tacos de una sola pieza o con juntas de 3/4.
    cue_construction:
      name: Construcción de taco
      description: Indica cómo está construido el taco (número de piezas o si se trata
        de un componente parcial, p. ej., solo la culata o solo la vara), lo que afecta
        a la portabilidad y la compatibilidad.
    cue_head_material:
      name: Material de la cabeza del taco
      description: Identifica el material de la cabeza del taco (la parte que entra
        en contacto con el disco), lo que afecta la durabilidad y la protección de
        la superficie.
    cue_sport_compatibility:
      name: Compatibilidad con deportes de taco
      description: Indica para qué modalidad de taco está diseñado el accesorio.
    cue_thread_size:
      name: Tamaño de la rosca del taco
      description: Especifica la rosca utilizada en extensiones, protectores de juntas,
        pernos de peso y otros accesorios del taco para garantizar un ajuste adecuado.
    cue_tip_hardness:
      name: Dureza de la punta del taco
      description: Califica la firmeza de la punta del taco, lo que afecta el control
        de la bola blanca y la retroalimentación.
    cuff_height:
      name: Altura del puño
      description: Indica la altura de la caña de la bota (baja, media, alta, extraíble/ajustable),
        lo que afecta el soporte y la flexibilidad.
    cuff_position:
      name: Posición del manguito
      description: Indica en qué parte del cuerpo del jinete está diseñada para sujetarse
        la correa.
    cultivation_method:
      name: Método de cultivo
      description: Especifica cómo se cultivaron los vegetales, y abarca las técnicas
        de cultivo y las prácticas agrícolas.
    cup_type:
      name: Tipo de copa
      description: Indica el perfil de la superficie de la lentejuela (plana o cóncava)
        y la profundidad de la copa, factores que pueden afectar el brillo, la textura
        y la apariencia al coserla o pegarla.
    cupcake_size:
      name: Tamaño de cupcake
      description: Especifica la categoría de tamaño físico de los cupcakes que se
        venden (p. ej., mini, estándar, jumbo).
    curd_size:
      name: Tamaño del cuajo
      description: Especifica el tamaño o la textura del cuajo del requesón.
    cure_method:
      name: Método de curado
      description: Describe el proceso necesario para que el adhesivo se fije o cure
        (p. ej., luz ultravioleta, humedad del aire, calor).
    curing_or_preparation_method:
      name: Método de curado o preparación
      description: Especifica cómo se curaron o se prepararon las aceitunas (p. ej.,
        curadas en salmuera, curadas en aceite, asadas a la parrilla).
    curling_broom_head_material:
      name: Material del cabezal de la escoba de curling
      description: Identifica la composición principal del material del cabezal o
        la almohadilla de la escoba.
    curling_broom_head_type:
      name: Tipo de cabezal de la escoba de curling
      description: Especifica el estilo o la construcción del cabezal/almohadilla
        de barrido.
    curling_shoe_slider_material:
      name: Material del deslizador del zapato de curling
      description: Identifica el material principal de la suela deslizante utilizada
        en los zapatos de curling.
    curling_training_aid_type:
      name: Tipo de ayuda para el entrenamiento de curling
      description: Identifica el tipo de ayuda para el entrenamiento de curling.
    curry_variety:
      name: Variedad de curry
      description: Clasifica los productos de salsa de curry según el estilo o la
        receta específica de curry que pretenden crear, como Tikka Masala, Massaman
        o Thai verde, para permitir un filtrado preciso del sabor/estilo.
    cushion_rubber_profile:
      name: Perfil de la goma de la banda
      description: Código de forma o perfil de las piezas de goma de la banda.
    cushioning_level:
      name: Nivel de amortiguación
      description: Indica la cantidad de relleno que proporciona el calcetín en la
        planta del pie para brindar comodidad y protección ante impactos.
    custom_label_content_type:
      name: Tipo de contenido de la etiqueta personalizada
      description: Especifica qué información se personaliza en la etiqueta cosida
        (p. ej., nombre, logo, mensaje, talla, símbolos de cuidado, información de
        contacto).
    customization_type:
      name: Tipo de personalización
      description: Especifica si la camiseta es lisa, de uso exclusivo del jugador
        o personalizada con nombre y número.
    cut_or_preparation_style:
      name: Estilo de corte o preparación
      description: Especifica cómo están cortados o preparados los trozos de verdura
        dentro de la lata o el frasco (p. ej., enteros, en dados, en tiras).
    cut_resistance_rating:
      name: Clasificación de resistencia a cortes
      description: Especifica el nivel de resistencia a cortes del artículo en pruebas
        formales.
    cut_type:
      name: Tipo de corte
      description: Indica si la tela se vende por yarda/metro, precortada o en rollo.
    cutting_application:
      name: Aplicación de corte
      description: Caso de uso principal de corte previsto para las tijeras.
    cutting_mat_grid_style:
      name: Estilo de cuadrícula de la esterilla de corte
      description: El estilo de guía impreso en la superficie de la esterilla.
    cutting_mat_intended_use:
      name: Uso previsto de la esterilla de corte
      description: Uso principal de la superficie de trabajo/de manualidades para
        el que está diseñada la esterilla de corte.
    cv_boot_clamp_type:
      name: Tipo de abrazadera del fuelle de la junta homocinética
      description: Especifica el tipo de abrazadera/banda que se utiliza para asegurar
        el fuelle de la junta homocinética.
    cv_boot_kit_contents:
      name: Contenido del kit del fuelle de la junta homocinética
      description: Enumera lo que se incluye con el fuelle de la junta homocinética
        (p. ej., abrazaderas, paquete de grasa, bandas de retención).
    cv_boot_material:
      name: Material del fuelle de la junta homocinética
      description: Especifica el material principal de construcción del fuelle de
        la junta homocinética.
    cv_boot_position:
      name: Posición del fuelle de la junta homocinética
      description: Especifica si el fuelle de la junta homocinética se ajusta a la
        posición interior (hacia adentro) o exterior (hacia afuera) de la junta homocinética
        en el eje.
    cycling_apparel_fit:
      name: Ajuste de la prenda de ciclismo
      description: Describe el corte de la prenda, e indica el grado de ajuste y la
        aerodinámica previstos (p. ej., para carreras, relajado).
    cylinder_head_assembly:
      name: Conjunto de culata
      description: Especifica el nivel de completitud de la culata tal como se vende
        (p. ej., totalmente ensamblada con los componentes del tren de válvulas instalados
        o la pieza fundida sin ensamblar).
    cylinder_head_material_grade:
      name: Grado del material de la culata
      description: Especifica el material y el grado utilizados para la fundición
        de la culata.
    cylinder_head_position:
      name: Posición de la culata
      description: Indica en qué bancada/lado u orientación encaja la culata en los
        motores multibanda (p. ej., lado izquierdo/derecho o bancada 1/bancada 2).
    cymbal_alloy:
      name: Aleación del platillo
      description: Aleación/composición de los platillos del kit.
    cymbal_application:
      name: Aplicación del platillo
      description: Aplicación principal de ejecución para la que el platillo está
        diseñado o comercializado.
    cymbal_arm_mounting_interface:
      name: Interfaz de montaje del brazo del platillo
      description: Especifica cómo se fija el brazo del platillo al resto de los herrajes
        de la batería (p. ej., abrazadera, soporte, receptor del soporte).
    cymbal_arm_rotation_positioning_features:
      name: Características de rotación/posicionamiento del brazo del platillo
      description: Especifica las características de posicionamiento que afectan cómo
        se puede inclinar/rotar y bloquear el brazo.
    cymbal_arm_style:
      name: Estilo de brazo del platillo
      description: Especifica si el brazo del platillo es recto o articulado, para
        preferencias de alcance y posicionamiento.
    cymbal_drum_case_wheel_configuration:
      name: Configuración de la rueda de la caja de platillos y tambores
      description: Indica si la caja tiene ruedas y (si es así) la configuración de
        las ruedas para el transporte rodante.
    cymbal_hammering_style:
      name: Estilo de martillado del platillo
      description: Proceso de martillado/apariencia, lo que afecta la complejidad
        y la sensación.
    cymbal_kit_components_included:
      name: Componentes del kit de platillos incluidos
      description: Especifica qué tipos de platillos se incluyen en el kit/paquete
        de platillos ride (además del platillo ride en sí).
    cymbal_kit_items_included:
      name: Artículos del kit de platillos incluidos
      description: Identifica qué platillos se incluyen en el kit/paquete (por tipo
        de platillo).
    cymbal_lathing:
      name: Torneado del platillo
      description: Especifica si la superficie del platillo está torneada (ranurada)
        o sin tornear/en bruto, y en qué medida.
    cymbal_playing_style_genre:
      name: Estilo/género de interpretación del platillo
      description: Identifica el contexto de rendimiento típico para el que están
        diseñados los platillos (p. ej., platillos de danza del vientre o platillos
        de mano para marchas u orquestas).
    cymbal_set_configuration:
      name: Configuración del juego de platillos
      description: Indica si el producto se vende como un solo platillo, un par a
        juego o un conjunto de varios pares (p. ej., para instrucción de grupos).
    cymbal_sound_character:
      name: Carácter de sonido de los platillos
      description: Describe el perfil tonal/sonoridad general del platillo utilizado
        para el descubrimiento (p. ej., brillante u oscuro).
    cymbal_sustain:
      name: Sostenido del platillo
      description: Cuánto tiempo resuena el platillo después de ser golpeado.
    cymbal_type:
      name: Tipo de platillo
      description: Especifica el rol funcional de platillo que la almohadilla de platillo
        electrónico está diseñada para emular.
    cymbal_volume_level:
      name: Nivel de volumen del platillo
      description: Categoría de sonoridad/salida percibida del platillo.
    cymbal_weight_class:
      name: Clase de peso del platillo
      description: Indica la categoría de peso del platillo, lo que afecta el tono,
        el volumen y la respuesta.
    dairy_heat_treatment:
      name: Tratamiento del calor del lácteo.
      description: Indica el nivel de procesamiento o pasteurización aplicado a la
        crema (p. ej., cruda, pasteurizada, UHT), lo que afecta la vida útil, el sabor
        y el desempeño al batirla.
    damage_type:
      name: Tipo de daño
      description: Especifica los tipos de daños en el parabrisas que el kit está
        diseñado para reparar.
    damper_pedal_style:
      name: Estilo del pedal amortiguador
      description: Describe el estilo físico del pedal de resonancia utilizado en
        teclados/pianos digitales.
    damping_adjustability:
      name: Capacidad de ajuste de la amortiguación
      description: Indica qué parámetros de amortiguación y/o altura de la suspensión
        son ajustables en el amortiguador.
    damping_level:
      name: Nivel de amortiguación
      description: Indica la cantidad relativa de reducción de volumen y de sostenido
        que proporciona la sordina.
    dance_occasion:
      name: Ocasión de baile
      description: Indica el contexto de uso previsto de la prenda dentro de la práctica
        de danza o actuación.
    darbuka_accessories_included:
      name: Accesorios para derbakes incluidos
      description: Enumera los accesorios comunes que se incluyen con la darbuka.
    darbuka_body_finish_type:
      name: Tipo de acabado del cuerpo de la darbuka
      description: Describe el acabado exterior, el revestimiento o la variación decorativa
        del cuerpo de la darbuka.
    darbuka_head_material:
      name: Material de la cabeza de la darbuka
      description: Especifica el material de la membrana del parche del tambor en
        una darbuka.
    dart_barrel_material:
      name: Material del cañón del dardo
      description: Especifica el material principal del cañón del dardo, lo que afecta
        la distribución del peso, la durabilidad y el precio.
    dart_shaft_design:
      name: Diseño del eje del dardo
      description: Clasifica el diseño mecánico del eje, p. ej., si es fijo, giratorio,
        telescópico o si integra el ala, lo que afecta el rendimiento y el precio.
    dart_shaft_thread_type:
      name: Tipo de hilo del eje de dardo
      description: Indica el tipo de rosca que se utiliza para enroscar el eje en
        el cañón del dardo, lo que garantiza la compatibilidad entre ejes y cañones.
    dart_thread_size:
      name: Tamaño de rosca para dardos
      description: Especifica la talla/estándar del hilo con el que es compatible
        la pieza, lo que garantiza el ajuste entre ejes, puntas y barriles.
    dart_tip_compatibility:
      name: Compatibilidad de la punta del dardo
      description: Indica si la pieza del dardo está diseñada para dardos de punta
        de acero, de punta blanda o de ambos tipos.
    dart_tip_connection_type:
      name: Tipo de conexión de la punta del dardo
      description: Describe la especificación del hilo o el sistema de montaje que
        utiliza la punta para acoplarse al cañón o eje del dardo, lo que garantiza
        la compatibilidad.
    dartboard_tournament_approval:
      name: Aprobación para torneo de dardos
      description: Indica si la diana está homologada oficialmente por federaciones
        o ligas de dardos específicas.
    dartboard_type:
      name: Tipo de diana
      description: Clasifica la diana según su tecnología de construcción y compatibilidad
        con los dardos (p. ej., de cerdas, electrónica, magnética).
    dash_cover_construction_type:
      name: Tipo de construcción de cubierta de salpicadero
      description: Describe cómo se forma/estructura la cubierta del tablero (p. ej.,
        moldeada o cosida), lo que afecta la precisión del ajuste y la apariencia.
    dash_cover_cutout_configuration:
      name: Configuración del recorte de la cubierta del tablero
      description: Indica para qué aberturas/sensores del panel de control del fabricante
        original (OEM) está precortada o moldeada la cubierta.
    dashboard_accessory_position:
      name: Posición del accesorio en el panel de control
      description: Especifica dónde, en el panel de control o a su alrededor, se debe
        colocar o montar el accesorio.
    date_variety:
      name: Variedad de fecha
      description: Especifica el cultivo/variedad de los dátiles (p. ej., Medjool,
        Deglet Noor, Ajwa). La variedad influye fuertemente en el sabor, el tamaño,
        la textura y se destaca en la mayoría de los nombres y descripciones de productos,
        por lo que capturarla mejora el filtrado y el descubrimiento.
    dayan_head_material:
      name: Material del parche superior de la dahina
      description: Material de la superficie de juego (pudi), p. ej., piel natural
        o sintética.
    dayan_strap_material:
      name: Material de la correa de la dahina
      description: Material de las correas de tensión (baddhi) utilizadas para atar
        el dayan.
    dayan_syahi_type:
      name: Tipo de syahi de Dayan
      description: Tipo de aplicación del syahi (pasta negra de afinación) en el parche
        del dayan.
    decaffeination_method:
      name: Método de descafeinización
      description: Describe el proceso utilizado para eliminar la cafeína del café
        descafeinado.
    decal_installation_method:
      name: Método de instalación de la calcomanía
      description: Cómo se aplica la calcomanía a la superficie del vehículo (p. ej.,
        aplicación en seco, aplicación en húmedo). Debe incluirse información sobre
        las herramientas o los requisitos (p. ej., cinta de transferencia o pistola
        de calor) en las instrucciones o en el atributo de la herramienta relacionada,
        cuando corresponda.
    decal_orientation:
      name: Orientación de la calcomanía
      description: Si la calcomanía está destinada para su aplicación en el interior
        del vidrio o en la superficie exterior.
    decal_placement_type:
      name: Tipo de ubicación de la calcomanía
      description: Indica en qué parte del vehículo se debe aplicar la calcomanía
        (p. ej., en el panel de la carrocería, el parachoques o el capó).
    decal_visibility_property:
      name: Propiedad de visibilidad de la calcomanía
      description: Propiedades ópticas/de visibilidad de una calcomanía destinadas
        a mejorar la visibilidad o la respuesta a la luz (p. ej., características
        reflectantes, fluorescentes, que brillan en la oscuridad o de transparencia).
    deck_concave_level:
      name: Nivel cóncavo de la tabla
      description: Indica la profundidad o intensidad de la concavidad de la tabla
        (p. ej., suave, media, profunda).
    deck_flex_rating:
      name: Clasificación de flexibilidad de la tabla
      description: Valoración cualitativa de la flexibilidad/rigidez de la tabla.
    deck_material:
      name: Material del mazo
      description: Identifica el material de construcción principal de la tabla de
        skate.
    decoder_interface_socket_type:
      name: Tipo de interfaz/zócalo del decodificador
      description: Tipo de interfaz del decodificador digital o configuración del
        decodificador de incorporación para el modelo de locomotora.
    decoration_technique:
      name: Técnica de decoración
      description: Identifica el método principal utilizado para aplicar gráficos
        o adornos a la camiseta.
    decorative_stamp_form_factor:
      name: Factor de forma del sello decorativo
      description: Identifica el formato físico del sello y cómo imprime un diseño
        (sello individual, juego, rodillo, fondo, etc.).
    decorative_tape_application:
      name: Aplicación de cinta decorativa
      description: Caso de uso principal en manualidades para el que la cinta decorativa
        está diseñada o comercializada.
    decorative_tape_format:
      name: Formato de cinta decorativa
      description: Especifica cómo se suministra/empaqueta la cinta decorativa para
        su uso.
    decoy_buoyancy:
      name: Flotabilidad del señuelo
      description: Describe cómo se comporta el señuelo en la columna de agua (flota,
        está suspendido o se hunde).
    decoy_joint_type:
      name: Tipo de articulación de señuelo
      description: Indica si el cuerpo del señuelo es sólido o articulado, lo que
        afecta su acción de natación.
    decoy_motion_mechanism:
      name: Mecanismo de movimiento del señuelo
      description: Describe cómo el señuelo produce movimiento o perturbación del
        agua para atraer a la presa, si es que lo hace.
    decoy_posture:
      name: Postura del señuelo
      description: Indica la postura o actividad representada del animal modelado
        por el señuelo (p. ej., al alimentarse, al descansar, en estado de alerta).
    decoy_size_class:
      name: Clase de talla del señuelo
      description: Categoriza la escala relativa del señuelo en comparación con el
        animal real (p. ej., estándar, magnum, sobredimensionado).
    decoy_style:
      name: Estilo del señuelo
      description: Define el factor de forma física o la clase de diseño del señuelo
        para ayudar a los cazadores a elegir la configuración correcta.
    deli_meat_variety:
      name: Variedad del embutido
      description: Clasifica el estilo específico del embutido (p. ej., salami, mortadela,
        prosciutto, rosbif).
    delivery_form:
      name: Formulario de entrega
      description: Formato físico de entrega del limpiador de inyectores.
    denim_composition:
      name: Composición del vaquero
      description: Composición de la fibra primaria del tejido vaquero (fibras base,
        excluidos tintes y acabados).
    denim_finish:
      name: Acabado del vaquero
      description: Acabado superficial/de procesamiento aplicado a la tela vaquera.
    denim_intended_use:
      name: Uso previsto del vaquero
      description: Proyecto/uso típico para el que se comercializa el vaquero.
    denim_stretch_type:
      name: Tipo de elasticidad del vaquero
      description: Si la tela vaquera tiene elasticidad mecánica, elastano/spandex
        añadido o no tiene elasticidad.
    denim_wash:
      name: Lavado del vaquero
      description: Indica la variación de tono o lavado aplicada a la tela vaquera
        (p. ej., claro, oscuro, crudo, ácido).
    derailleur_cage_length:
      name: Longitud de la jaula del desviador
      description: Indica la longitud de la jaula del desviador, lo que determina
        la capacidad de la cadena (principalmente, para desviadores traseros).
    derailleur_mounting_style:
      name: Estilo de montaje del desviador
      description: Especifica cómo se fija el desviador al marco o al soporte de la
        bicicleta (p. ej., mediante soldadura fuerte, abrazadera, montaje directo
        o UDH).
    derailleur_type:
      name: Tipo de desviador
      description: Indica si el producto es un desviador delantero o trasero.
    deshedder_tool_type:
      name: Tipo de herramienta quitapelaje
      description: Clasifica el estilo estructural del cepillo para eliminar el pelo
        muerto para que los compradores puedan elegir su método de aseo preferido
        (p. ej., cuchilla, bloque, cepillo o guante).
    diabolo_axle_system:
      name: Sistema de eje del diábolo
      description: Especifica el sistema/configuración del eje del diábolo, lo que
        afecta los giros, la estabilidad y el desgaste de la cadena.
    diagnostic_functions_supported:
      name: Funciones de diagnóstico compatibles
      description: Especifica las funciones de diagnóstico/mantenimiento que puede
        realizar el lector.
    diagnostic_interface_type:
      name: Tipo de interfaz de diagnóstico
      description: Conexión/interfaz utilizada para comunicarse con el vehículo o
        dispositivo (p. ej., OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Grado de color del diamante
      description: Indica el grado color de los diamantes, desde D (incoloro) hasta
        Z ( color claro), o bien, indica diamantes color fantasía.
    diaper_cover_style:
      name: Estilo de la cubierta del pañal
      description: Define la silueta del diseño o el estilo decorativo de la cubierta
        del pañal para facilitar la búsqueda y el filtrado basados en el estilo.
    diastatic_power_unit:
      name: Unidad de potencia diastásica
      description: Especifica el sistema de unidades utilizado para informar el valor
        de potencia diastásica de un producto (p. ej., °Lintner o Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Sistema de afinación de armónica diatónica
      description: Especifica el diseño de notas/sistema de afinación utilizado por
        la armónica diatónica.
    dice_sides:
      name: Caras del dado
      description: Número de caras (lados) por dado para los dados incluidos en el
        producto (p. ej., d6, d20). Para conjuntos mixtos, utilice el valor predominante
        o la lista como valores múltiples cuando sea compatible.
    didgeridoo_construction_type:
      name: Tipo de construcción del didgeridoo
      description: Cómo se construye o se forma el didgeridoo (método de construcción
        tradicional o moderno).
    dietary_formulation_claim:
      name: Declaración sobre la formulación dietética
      description: Destaca los atributos clave de la formulación o las exclusiones
        relevantes para la nutrición equina (p. ej., sin cereales, bajo en almidón,
        orgánico).
    dinosaur_playset_scale_figure_size_class:
      name: Clase de tamaño de las figuras/escala del set de juego de dinosaurios
      description: Describe la escala general de los dinosaurios/figuras incluidos
        para facilitar la compatibilidad con otros sets.
    dinosaur_species_included:
      name: Especies de dinosaurios incluidas
      description: Identifica qué especies de dinosaurios están representadas en el
        juego (figuras o dinosaurios moldeados).
    dipsy_diver_size_designation:
      name: Designación de tamaño del Dipsy Diver
      description: Indica el código de talla definido por el fabricante del señuelo
        de pesca, LO que se correlaciona con el peso y la profundidad de inmersión.
    disc_brake_rotor_mount_type:
      name: Tipo de montaje de rotor de freno
      description: Indica cómo se fija un rotor de freno de disco al cubo (p. ej.,
        6 tornillos, bloqueo central).
    disc_lock_accessories_included:
      name: Accesorios para candado de disco incluidos
      description: Especifica el artículo adicional que se incluye con el candado
        de disco para bicicleta, p. ej., cable recordatorio, bolsa de transporte,
        soporte de montaje o baterías.
    disco_ball_mirror_tile_material:
      name: Material de azulejo de espejo de bola de discoteca
      description: Material de los mosaicos reflectantes de la bola de discoteca (si
        aplica).
    disco_ball_mirror_tile_size:
      name: Tamaño de los mosaicos de espejo de la bola de discoteca
      description: Talla aproximada de los cuadrados/mosaicos de espejo individuales
        de la bola de discoteca.
    display_backlight_color:
      name: Color de la retroiluminación de la pantalla
      description: Color de la retroiluminación/iluminación de la pantalla/esfera
        del medidor.
    disposable_compostable_claim:
      name: Afirmación de desechable/compostable
      description: Indica si el producto es compostable, biodegradable, reciclable
        o ninguna de las dos opciones (cuando corresponda).
    distillation_method:
      name: Método de destilación
      description: Identifica el método de destilación o el tipo de alambique utilizado
        para producir la bebida espirituosa.
    distilled_water_intended_use:
      name: Uso previsto del agua destilada
      description: Define la aplicación principal para el agua destilada (p. ej.,
        para beber, máquina CPAP, humidificador, plancha de vapor).
    distress_transmission_frequency:
      name: Frecuencia de transmisión de emergencia
      description: Frecuencia o frecuencias de radio principales utilizadas para alertar
        en situaciones de emergencia.
    distressing_level:
      name: Nivel de desgaste
      description: Especifica la cantidad de desgaste, rasgaduras o deshilachados
        intencionales aplicados a la tela.
    distressing_style:
      name: Estilo de desgaste
      description: Indica el tipo o grado de desgaste en los vaqueros, p. ej., efectos
        rasgados o “whiskering”.
    distributor_advance_mechanism:
      name: Mecanismo de avance del distribuidor
      description: Especifica el tipo de mecanismo de avance del encendido utilizado
        por el distribuidor.
    distributor_cap_terminal_type:
      name: Tipo de terminal de la tapa del distribuidor
      description: Especifica el estilo del terminal de la tapa del distribuidor.
    distributor_gear_material:
      name: Material del engranaje del distribuidor
      description: Especifica el material del engranaje de transmisión del distribuidor.
    distributor_ignition_type:
      name: Tipo de encendido por distribuidor
      description: Especifica si el distribuidor está diseñado para sistemas de encendido
        por platinos, encendido electrónico o sistemas tipo HEI.
    distributor_kit_contents:
      name: Contenido del kit de distribuidor
      description: Indica qué componentes se incluyen con el distribuidor (p. ej.,
        tapa, rotor, módulo de encendido, junta/junta tórica, engranaje de transmisión,
        cableado/conector).
    dive_computer_form_factor:
      name: Factor de forma de la computadora de buceo
      description: Especifica el diseño físico o el método de montaje de la computadora
        de buceo, p. ej., montaje en consola o estilo reloj.
    diving_mask_design:
      name: Diseño de máscara de buceo
      description: Define el estilo estructural general de la máscara de buceo, lo
        que influye en el ajuste, el campo de visión y el uso previsto.
    divot_tool_prong_configuration:
      name: Configuración de las puntas de la herramienta de reparación de divots
      description: Especifica el número y la disposición de las puntas de la herramienta
        para reparar divots que se utilizan para reparar los daños en el césped.
    divot_tool_style:
      name: Estilo de herramienta de divot
      description: Define el estilo estructural o de despliegue general de la herramienta
        para reparar divots, p. ej., fija, plegable/de navaja automática, multiherramienta
        o accesorios que se enganchan a un sombrero o palo.
    djembe_shell_construction:
      name: Construcción de la carcasa del djembé
      description: Describe el método de construcción de la carcasa/cuerpo del djembé.
    djembe_tuning_system:
      name: Sistema de afinación del djembé
      description: Especifica cómo se tensa/afina el djembé.
    dmx_output_connector_type:
      name: Tipo de conector de salida DMX
      description: Formato del conector físico utilizado para el/los puerto(s) de
        salida DMX del controlador.
    doctor_playset_items_included:
      name: Artículos del juego de doctor incluidos
      description: Especifica los instrumentos y los accesorios médicos de juguete
        para juegos de rol incluidos en el set de juego de médico (p. ej., estetoscopio,
        jeringa, martillo de reflejos).
    doctor_playset_role_play_setting:
      name: Configuración del juego de rol del juego de doctor
      description: Identifica el contexto principal del juego de rol que representa
        el conjunto de juego del médico.
    doctor_playset_wearable_items_included:
      name: Artículos para usar del juego de doctor incluidos
      description: Indica los componentes del disfraz que se pueden usar y que están
        incluidos en el juego.
    doll_accessory_type:
      name: Tipo de accesorio para muñecas
      description: Define qué tipo de accesorio para muñecas o figuras de acción es
        el producto (p. ej., ropa, zapatos, muebles, soportes de exhibición), lo que
        permite a los compradores navegar y filtrar dentro de esta categoría de accesorios.
    doll_eye_type:
      name: Tipo de ojo de la muñeca
      description: Especifica el estilo de construcción de los ojos de la muñeca (p. ej.,
        de acrílico incrustados, pintados, con luz LED).
    doll_hair_fiber_type:
      name: Tipo de fibra de cabello de la muñeca
      description: El tipo de cabello/fibra utilizado en la muñeca (o ninguno), que
        afecta al realismo, el estilo y el cuidado.
    doll_making_kit_components_included:
      name: Componentes del kit para hacer muñecas
      description: Enumera los materiales y herramientas clave incluidos en el kit
        para hacer muñecas para que los compradores puedan comparar los paquetes y
        saber qué no está incluido.
    dollhouse_installation_placement_type:
      name: Tipo de instalación/ubicación de la casa de muñecas
      description: Cómo está diseñada para usarse o colocarse la casa de muñecas (p. ej.,
        sobre una mesa, de pie o montada en la pared).
    dollhouse_items_included:
      name: Artículos incluidos de la casa de muñecas
      description: Indica qué incluye la caja con la casa de muñecas (muebles, muñecas,
        accesorios).
    dollhouse_lighting_type:
      name: Tipo de iluminación de la casa de muñecas
      description: Tipo de iluminación incluida o compatible con la casa de muñecas.
    dollhouse_room_type:
      name: Tipo de habitación de la casa de muñecas
      description: Especifica la habitación o zona dentro de la casa de muñecas donde
        se suele utilizar el accesorio.
    dollhouse_scale:
      name: Escala de la casa de muñecas
      description: Relación de escala de una casa de muñecas o sus accesorios (p. ej.,
        1:12) para garantizar la compatibilidad entre casas, muebles y figuras.
    dollhouse_style_theme:
      name: Estilo/tema de la casa de muñecas
      description: Tema o estilo general de la casa de muñecas para navegar y regalar(p. ej.,
        moderno o victoriano).
    donnos_playing_technique:
      name: Técnica de ejecución del Donnos
      description: Cómo se toca/acciona el Donnos (solo con la mano o con palo/percutor),
        para que se ajuste a las expectativas del comprador y a los accesorios incluidos.
    donnos_tuning_system:
      name: Sistema de afinación de donnos
      description: Método principal utilizado para afinar o cambiar el tono (p. ej.,
        cuerdas de tensión/mecanismo de presión).
    door_assembly_type:
      name: Tipo de montaje de puerta
      description: 'Indica qué se incluye: solo la carcasa, el revestimiento o el
        conjunto completo de la puerta.'
    door_closure_mechanism:
      name: Mecanismo de cierre de la puerta
      description: Define el mecanismo que controla el cierre de la puerta (p. ej.,
        cierre suave, pestillo magnético).
    door_handle_components_included:
      name: Componentes del picaporte de la puerta incluidos
      description: Indica qué piezas clave se incluyen con el picaporte de la puerta
        (p. ej., cilindro de cerradura, junta/sello, cubierta embellecedora, herraje
        de montaje, cable de conexión, pestillo/actuador).
    door_handle_operation:
      name: Funcionamiento del picaporte de la puerta
      description: Especifica el estilo de accionamiento/funcionamiento principal
        del conjunto del picaporte de la puerta del vehículo (p. ej., varillaje mecánico,
        cilindro de llave, botón/táctil sin llave, apertura eléctrica).
    door_lock_knob_attachment_method:
      name: Método de fijación del pomo de la cerradura de la puerta
      description: Especifica cómo se fija el pomo de la cerradura a la varilla de
        la cerradura (p. ej., tipo hilo, de presión).
    door_lock_position:
      name: Posición del bloqueo de la puerta
      description: Especifica para qué posición de puerta/abertura está diseñada la
        cerradura de puerta o la pieza de la cerradura en un vehículo.
    door_seal_feature_set:
      name: Conjunto de características del burlete de la puerta
      description: Características funcionales del burlete de la puerta.
    door_seal_material_type:
      name: Tipo de material del burlete de la puerta
      description: Familia principal de elastómeros/materiales utilizados para el
        burlete de la puerta (más allá del material genérico).
    door_seal_product_form:
      name: Forma del producto del burlete de la puerta
      description: Indica la forma de venta/embalaje del burlete de la puerta.
    door_window_operation:
      name: Funcionamiento de la ventana de la puerta
      description: Especifica si el sistema de ventanas de la puerta está diseñado
        para funcionamiento manual o eléctrico, o si la puerta no tiene ventana.
    double_decker_bus_deck_configuration:
      name: Configuración de la cubierta del autobús de dos pisos
      description: Especifica la configuración de acceso a la plataforma/techo de
        un autobús de dos pisos.
    double_drum_pedal_linkage_medium:
      name: Medio de engranaje de pedal de doble tambor
      description: Especifica el medio utilizado para conectar el pedal secundario
        con el pedal principal (p. ej., eje de transmisión, cadena, correa).
    double_end_bag_core_type:
      name: Tipo de núcleo de bolsa de doble extremo
      description: Identifica la construcción interna del núcleo de impacto, lo que
        determina la velocidad de rebote, la sensación y los requisitos de mantenimiento.
    double_pointed_needle_point_style:
      name: Estilo de punta de aguja de doble punta
      description: Describe la forma y el nivel de afilado de la punta, diseñado para
        distintos hilos y estilos de tejido.
    dough_extruder_accessories_included:
      name: Accesorios para extrusora de masa incluidos
      description: Componentes adicionales incluidos con la extrusora de masa.
    dough_extruder_operation_type:
      name: Tipo de funcionamiento de la extrusora de masa
      description: Cómo se empuja la masa a través de la extrusora para hacer formas.
    dough_extruder_shape_disc_included:
      name: Disco de forma incluido para extrusora de masa
      description: Formas que puede producir la extrusora mediante los discos/boquillas
        incluidos.
    dough_format:
      name: Formato de masa
      description: Identifica la forma/presentación física de la masa dentro del paquete
        (p. ej., bola, lámina, disco, hebras desmenuzadas).
    doumbek_accessories_included:
      name: Accesorios de doumbek incluidos
      description: Accesorios incluidos con el doumbek (p. ej., llave de afinación,
        caja).
    doumbek_head_material:
      name: Material del cabezal del doumbek
      description: Material del parche del tambor (membrana) del doumbek.
    doumbek_head_type:
      name: Tipo de cabeza del doumbek
      description: Construcción/tipo de la cabeza del doumbek (cómo está hecha o montada
        la membrana).
    doumbek_playing_style_technique:
      name: Estilo/técnica de interpretación del doumbek
      description: Contexto/estilo de interpretación previsto comúnmente asociado
        con el doumbek.
    doumbek_tuning_system:
      name: Sistema de afinación del doumbek
      description: Cómo se tensa/afina el doumbek (o si no se puede afinar).
    dowel_end_style:
      name: Estilo de extremo de espiga
      description: Describe el corte/forma de los extremos de las espigas, lo que
        afecta la facilidad de inserción, la seguridad y el uso previsto en manualidades.
    dowel_surface_texture:
      name: Textura de la superficie de la espiga
      description: Describe el estado de la superficie del pasador, p. ej., lisa o
        estriada, lo que afecta su apariencia y la adherencia del pegamento.
    drafting_compass_adjustment_mechanism:
      name: Mecanismo de ajuste del compás de dibujo
      description: Mecanismo de ajuste fino principal utilizado para fijar el radio
        con precisión.
    drafting_compass_fine_adjustment_mechanism:
      name: Mecanismo de ajuste fino del compás
      description: Tipo de ajuste fino utilizado para fijar el radio con precisión
        (si hay).
    drafting_compass_lead_holder_type:
      name: Tipo de portaminas del compás de dibujo
      description: Tipo de inserto/soporte de dibujo incluido o compatible con el
        compás.
    drag_system_material:
      name: Material del sistema de arrastre
      description: Identifica el material o la tecnología utilizada en el conjunto
        de arrastre, lo que influencia la resistencia al calor y la suavidad.
    drag_system_type:
      name: Tipo de sistema de arrastre
      description: Identifica el tipo de mecanismo de freno utilizado en el carrete,
        como freno delantero, trasero, de palanca, de estrella, magnético o de disco.
    drag_type:
      name: Tipo de arrastre
      description: Especifica el tipo de mecanismo de freno utilizado por el carrete
        (método de accionamiento o ubicación).
    drawer_features:
      name: Características del cajón
      description: Información sobre elementos o funcionalidades especiales de construcción
        del cajón (p. ej., cierre suave, forrado de fieltro).
    drawer_slide_type:
      name: Tipo de guía para cajones
      description: Especifica el estilo de montaje y extensión de las guías del cajón
        (p. ej., montaje inferior, extensión total).
    drawing_ink_compatible_tools:
      name: Herramientas compatibles con la tinta de dibujo
      description: Especifica las herramientas de la aplicación para las que está
        destinada la tinta (p. ej., pluma de inmersión o pincel).
    drawing_ink_permanence:
      name: Permanencia de la tinta de dibujo
      description: Indica las características de permanencia importantes para la obra
        de arte terminada y su reproducción.<br />
    dress_embellishment:
      name: Adorno para vestidos
      description: Resalta los elementos decorativos más destacados incorporados al
        diseño del vestido.
    dress_train_type:
      name: Tipo de cola de vestido
      description: Indica la presencia y la longitud o el estilo de la cola del vestido,
        lo que revela la formalidad y la idoneidad para el lugar.
    dried_surface_finish:
      name: Acabado de superficie seca
      description: Describe el aspecto típico de la superficie después del secado
        (brillo/textura).
    drink_tube_insulation:
      name: Aislamiento del tubo para bebida
      description: Indica si el tubo para bebida incluye aislamiento o una funda térmica
        para evitar que los líquidos se calienten o se congelen.
    drive_band_cross_section_shape:
      name: Forma de sección transversal de la correa de transmisión
      description: Forma del perfil de la correa de transmisión (redonda, plana, etc.).
    drive_band_join_type:
      name: Tipo de unión de la correa de transmisión
      description: Cómo se une/construye la correa de transmisión (sin fin o que necesita
        atado, etc.).
    drive_band_material_type:
      name: Tipo de material de la correa de transmisión
      description: Especifica el material o tipo de la correa de transmisión utilizada
        en las ruecas.
    drive_location:
      name: Ubicación de la transmisión
      description: Identifica la posición del volante/mecanismo de transmisión en
        la elíptica, influyendo en la sensación de movimiento y huella.
    drive_mechanism:
      name: Mecanismo de transmisión
      description: Identifica el tipo de sistema de transmisión utilizado para transferir
        la potencia de los pedales al volante.
    drive_shaft_material:
      name: Material del eje motriz
      description: Especifica el material de construcción principal del tubo del eje
        motriz o del conjunto completo.
    drive_system:
      name: Sistema de transmisión
      description: Especifica el mecanismo que transfiere la fuerza del pedal al sistema
        de resistencia.
    drivetrain_configuration:
      name: Configuración del tren de transmisión
      description: Especifica la configuración de la transmisión de la bicicleta e
        indica si el buje trasero es fijo, de rueda libre de una sola velocidad o
        reversible.
    drivetrain_speed_compatibility:
      name: Compatibilidad de velocidad del tren de transmisión
      description: Enumera las velocidades de casete de piñones para las que está
        diseñada la corona, lo que garantiza los perfiles y el espaciado adecuados
        de los dientes.
    drone_positioning_system:
      name: Sistema de posicionamiento de drones
      description: Tecnología de posicionamiento y espera integrado, compatible con
        el dron, para la navegación y el vuelo estacionario estable.
    drone_transmission_type:
      name: Tipo de transmisión del dron
      description: Método principal utilizado para el control o la conexión de video
        entre el dron y el controlador o dispositivo.
    drop_spindle_whorl_position:
      name: Posición del huso de caída
      description: Ubicación del torno en el eje.
    drum_carder_accessories_included:
      name: Accesorios de cardadora de tambor incluidos
      description: Artículos comunes incluidos con un kit de cardadora de tambor.
    drum_clamp_locking_mechanism:
      name: Mecanismo de bloqueo de la abrazadera del tambor
      description: Especifica cómo se bloquea o aprieta la abrazadera al tubo o aro
        (por ejemplo, perno de mariposa, perno de llave de tambor, liberación rápida).
    drum_clamp_mount_interface:
      name: Interfaz de montaje de abrazadera de tambor
      description: Especifica qué accesorios proporciona la abrazadera para su fijación
        (por ejemplo, receptor de varilla en L, rótula, inclinador de platillos).
    drum_clamp_type:
      name: Tipo de abrazadera para tambor
      description: Especifica el tipo de abrazadera funcional que se utiliza en el
        hardware de montaje del kit del tambor (por ejemplo, abrazadera de aro frente
        a abrazadera de estante o tubo).
    drum_head_application_batter_resonant:
      name: Aplicación para parches de tambor (superior/inferior)
      description: Especifica para qué lado o función está diseñado el parche en un
        tambor (superficie superior de percusión frente a superficie inferior resonante
        o del lado de la caja).
    drum_head_collar_type:
      name: Tipo de collar de parche de tambor
      description: Especifica si el parche tiene un collar estándar, un collar bajo
        o un perfil de collar especial para adaptarse a determinados bordes o carcasas
        de apoyo.
    drum_head_damping_control:
      name: Control de amortiguación del parche del tambor
      description: Características de control de armónicos o estilo de atenuación
        integrados en el diseño del parche.
    drum_head_film_material:
      name: Material de la película de los parches para tambor
      description: Material principal de la película para tambor (comúnmente tereftalato
        de polietileno/Mylar, pero puede incluir materiales especiales).
    drum_head_hoop_collar_type:
      name: Tipo de aro o collar de cabezal de tambor
      description: Identifica la construcción del aro y el collar del parche del tambor
        (por ejemplo, el perfil del collar y el material del aro), lo que puede afectar
        el ajuste y la estabilidad de la afinación en ciertos cascos y aros.
    drum_head_hoop_rim_material:
      name: Material del aro o borde del parche para tambor
      description: El material del aro o borde del parche (el aro incorporado en el
        interior del parche) puede afectar la durabilidad y la estabilidad de la afinación.
    drum_head_included:
      name: Parche de tambor incluido
      description: Indica si se incluyen parches superiores o inferiores con el tambor.
    drum_head_muffling_feature:
      name: Función de silenciador del cabezal del tambor
      description: Control de armónicos incorporado integrado en el parche del tambor.
    drum_head_muffling_type:
      name: Tipo de atenuación del parche del tambor
      description: Indica si el parche del tambor cuenta con elementos de control
        o atenuación de armónicos integrados.
    drum_head_ply_count:
      name: Número de capas del parche del tambor
      description: Número de capas de película utilizadas en la construcción del parche
        del tambor (por ejemplo, 1 capa, 2 capas).
    drum_head_position:
      name: Posición del parche del tambor
      description: Indica si el parche del tambor está diseñado para usarse como parche
        superior (de golpe), parche de resonancia (inferior), parche bordonero (inferior)
        o si puede usarse de ambas maneras.
    drum_head_reinforcement_type:
      name: Tipo de refuerzo del parche del tambor
      description: Especifica si el parche de la caja incluye elementos de refuerzo,
        como un punto central o un anillo de control, para aumentar la durabilidad
        y enfocar el tono.
    drum_head_surface_finish:
      name: Acabado de superficie del cabezal del tambor
      description: Textura o acabado de la superficie del parche que influye sobre
        el ataque y la respuesta de la escobilla.
    drum_head_type:
      name: Tipo de parche de tambor
      description: Especifica la construcción o el tipo de parche utilizado en el
        tambor (principalmente para parches de golpe y resonancia como los provistos).
    drum_key_design_type:
      name: Tipo de diseño de llaves de afinación para tambor
      description: Describe el diseño funcional de la llave de tensión del tambor
        (por ejemplo, estándar, de trinquete, en "T").
    drum_key_drive_type:
      name: Tipo de accionamiento por llave de tambor
      description: Especifica el tipo de accionamiento o interfaz de la llave de tambor
        utilizados para accionar a la varilla de tensión o los accesorios de montaje.
    drum_key_handle_style:
      name: Estilo de manijas de llaves de tambor
      description: Describe el estilo ergonómico o de identificación de la llave de
        tambor, que afecta a la comodidad y al apalancamiento durante la afinación.
    drum_kit_included_items:
      name: Artículos del kit de batería incluidos
      description: Enumera los artículos principales que se incluyen en el paquete
        del kit de batería aparte de los cascos o las almohadillas (por ejemplo, accesorios,
        platillos, taburete).
    drum_kit_portability:
      name: Portabilidad del kit de batería
      description: Indica si el kit está diseñado para el almacenamiento o transporte
        compacto (por ejemplo, para viaje/compacto/plegable).
    drum_kit_shell_construction_features:
      name: Características de construcción de los casos del kit de batería
      description: La forma en que están construidas las carcasas (número y tipo de
        capas) afecta al tono y a la durabilidad.
    drum_mount_clamp_type:
      name: Tipo de abrazadera de montaje de tambor
      description: Describe el factor de forma de la abrazadera utilizado en accesorios
        de montaje de tambores.
    drum_multi_clamp_clamp_type:
      name: Tipo de abrazadera múltiple para tambor
      description: El estilo o la configuración funcional de la abrazadera múltiple
        (cómo sujeta y qué conecta).
    drum_mute_material:
      name: Material de sordina de tambor
      description: Especifica el material principal de la sordina del tambor que entra
        en contacto con el parche o atenúa la vibración.
    drum_pad_triggering_zones:
      name: Zonas de activación de la almohadilla de tambor
      description: Indica el número o tipo de zonas de activación compatibles con
        la almohadilla del tom (por ejemplo, solo parche frente a parche + borde),
        lo que afecta la expresividad y la compatibilidad de módulo.
    drum_pedal_accessories_included:
      name: Accesorios de pedal de batería incluidos
      description: Enumera los accesorios y componentes claves incluidos con el pedal
        de la batería.
    drum_pedal_baseplate_type:
      name: Tipo de placa base del pedal de batería
      description: Indica si el pedal utiliza una placa base o un diseño flotante
        o sin marco.
    drum_pedal_bearing_type:
      name: Tipo de cojinete del pedal de batería
      description: Especifica el mecanismo de cojinete utilizado en los puntos de
        pivote principales (por ejemplo, balancín, talón, leva).
    drum_pedal_cam_type:
      name: Tipo de leva de pedal de batería
      description: Especifica la forma geometría de la leva de un pedal de batería
        que influye sobre la sensación y la respuesta (por ejemplo, lineal vs. acelerador).
    drum_pedal_chain_configuration:
      name: Configuración de la cadena del pedal de batería
      description: Especifica la disposición de la cadena de un pedal de batería con
        transmisión por cadena (por ejemplo, cadena simple, cadena doble o cadena
        desplazada).
    drum_pedal_chain_type:
      name: Tipo de cadena de pedal de batería
      description: Indica el tipo de cadena de la transmisión (por ejemplo, cadena
        de rodillos frente a cadena tipo bicicleta), lo que puede afectar a la suavidad
        y la durabilidad.
    drum_pedal_clamp_type:
      name: Tipo abrazadera para pedal de batería
      description: Especifica cómo se fija el pedal al aro del bombo.
    drum_pedal_intended_use:
      name: Uso previsto del pedal de batería
      description: Indica el contexto de ejecución principal para el que se diseña
        o comercializa el pedal de transmisión por correa.
    drum_pedal_spring_adjustment_method:
      name: Método de ajuste del resorte del pedal de batería
      description: Indica cómo se ajusta la tensión del resorte en el pedal.
    drum_pedal_spring_type:
      name: Tipo de resorte de pedal de batería
      description: Especifica el mecanismo de resorte utilizado para el retorno del
        pedal.
    drum_shell_material:
      name: Material de carcasa de tambor
      description: Especifica el material principal de construcción de la carcasa
        para tambores acústicos (por ejemplo, arce, abedul, acrílico).
    drum_shell_wood_species:
      name: Especies de madera para cascos de tambor
      description: Identifica la especie de madera utilizada para el casco de tambor,
        que influye sobre el tono y la resonancia.
    drumhead_type:
      name: Tipo de parche de tambor
      description: Configuración o tipo de parche utilizados en el octoban.
    drumstick_model:
      name: Modelo de baqueta
      description: Designación estandarizada del modelo o tamaño de baquetas utilizada
        por muchas marcas (por ejemplo, 5A, 7A).
    drumstick_taper:
      name: Conicidad de la baqueta
      description: Describe el perfil cónico desde el cuerpo hasta la punta, con influencia
        en el rebote y el equilibrio.
    drysuit_footwear_style:
      name: Estilo de calzado para traje de buceo
      description: Describe el acabado integrado de la parte inferior de las piernas
        del traje de buceo (por ejemplo, botas incorporadas, calcetines de neopreno,
        calcetines interiores o sellos en los tobillos).
    dumbbell_style:
      name: Estilo mancuerna
      description: Identifica el diseño básico de la mancuerna; así sea de unidad
        fija, sistema ajustable o asa sujetable, lo que influye fuertemente sobre
        las decisiones de compra y el uso del entrenamiento.
    dundun_playing_position:
      name: Posición de juego de Dununes
      description: Posición prevista para tocar o transportar el tambor.
    dye_status:
      name: Estado del tinte
      description: Indica si la fibra de vidrio está teñida, sin teñir o en estado
        natural, o si incluye varios colores o mezclas.
    dye_style:
      name: Estilo de tinte
      description: Especifica si el color del hilo es liso, jaspeado o teñido de forma
        especial.
    dye_technique:
      name: Técnica de teñido
      description: Método utilizado para color la fibra (por ejemplo, teñido a mano,
        teñido en caldera, teñido por secciones).
    dye_type_needlecraft_fabric:
      name: Tipo de tinte (tela para bordado)
      description: Indica si la tela de lino es lisa, teñida a mano o teñida de manera
        especial.
    dyeing_color_processing:
      name: Teñido o procesamiento de color
      description: Describe si la fibra fue teñida y cómo lo fue (por ejemplo, sin
        teñir, decolorada/blanca o con técnicas de teñido específicas).
    e_bike_certification_class:
      name: Curso de certificación para bicicletas eléctricas
      description: Especifica el índice de velocidad oficial del neumático para bicicletas
        eléctricas (por ejemplo, E-25, E-50).
    e_bike_speed_rating:
      name: Clasificación de velocidad de la bicicleta eléctrica
      description: Indica el nivel de certificación oficial para bicicletas eléctricas
        del neumático (por ejemplo, E25 para ≤25 km/h, E50 para ≤50 km/h).
    e_scooter_connector_type:
      name: Tipo de conector para patinete eléctrico
      description: Identifica el estilo de conector o enchufe eléctrico utilizado
        por el componente para la conexión de alimentación o señal.
    e_scooter_throttle_type:
      name: Tipo de acelerador de patinete eléctrico
      description: Especifica el tipo de acelerador que se utiliza para controlar
        la aceleración en un patinete eléctrico.
    ear_coverage:
      name: Cobertura para oídos
      description: Indica si el casco incluye protección auditiva y si esta es extraíble.
    ear_coverage_style:
      name: Estilo de cobertura para oídos
      description: Describe cómo, o si, las orejas están cubiertas por la mascarilla
        antimoscas.
    ear_coverage_type:
      name: Tipo de cobertura para oídos
      description: Especifica cómo el sombrero cubre o protege los oídos; incluidos
        la presencia y el estilo de las orejeras.
    ear_guard_type:
      name: Tipo de protector de orejas
      description: Describe el tipo de protección auditiva integrada en la gorra,
        como protectores de plástico rígido, acolchados o extraíbles.
    earmuff_style:
      name: Estilo de orejeras
      description: Indica cómo se usa la orejera o su estilo de diseño estructural
        (por ejemplo, por encima de la cabeza o por detrás de la cabeza).
    earring_closure_type:
      name: Tipo de cierre de pendientes
      description: Especifica el mecanismo utilizado para sujetar el pendiente a la
        oreja (por ejemplo, cierre a presión, cierre de palanca, cierre de clip).
    easel_art_desk_features:
      name: Características de caballetes y pupitres de arte
      description: Destaca las características funcionales comunes que incluye el
        caballete o el pupitre de arte.
    easel_art_desk_surface_type:
      name: Tipo de superficie del caballete y el pupitre de arte
      description: Identifica las superficies utilizables para dibujar o escribir
        (por ejemplo, pizarra, pizarra blanca, rollo de papel, pizarra magnética).
    eb_clarinet_body_type:
      name: Tipo de cuerpo del clarinete en Mib
      description: Indica si el clarinete en Mib es una variante soprano o alto.
    eco_material_type:
      name: Tipo de material ecológico
      description: Destaca la tecnología de espuma o material ecológicos de la almohadilla.
    edge_construction:
      name: Construcción de borde
      description: Indica si el esquí presenta un canto metálico en una parte, en
        toda su longitud o si no lo presenta.
    edge_tuner_type:
      name: Tipo de afinador de cantos
      description: Clasifica el estilo de afinador de cantos de esquís o tablas de
        snowboard, como una guía de archivo o una máquina eléctrica.
    edible_plant_part:
      name: Parte comestible de la planta
      description: Indica qué parte de la planta se vende para el consumo.
    educational_guide_included:
      name: Guía educativa incluida
      description: Indica qué materiales de aprendizaje se incluyen con el modelo.
    educational_topic:
      name: Tema educativo
      description: Tema de aprendizaje primario apoyado en el contenido educativo
        del hormiguero.
    egg_component:
      name: Componente del huevo
      description: Indica qué parte del huevo contiene el producto, como huevo entero,
        solo claras, yemas o mezclas/sustitutos.
    egg_component_replaced:
      name: Componente de huevo reemplazado
      description: Indica qué parte del huevo pretende sustituir el producto (por
        ejemplo, huevo entero, clara de huevo).
    egg_enrichment:
      name: Enriquecimiento de huevos
      description: Indica cualquier fortificación nutricional añadida a los huevos,
        como el enriquecimiento con omega-3 o vitamina D.
    egg_farming_method:
      name: Método de cultivo de huevos
      description: Indica el método de producción o cría utilizado para los huevos
        (por ejemplo, sin jaula, con acceso al aire libre, orgánicos).
    egg_grade:
      name: Grado de los huevos
      description: Indica el grado de calidad asignado por los organismos reguladores
        o de la industria.
    egg_processing_state:
      name: Estado de procesamiento de huevos
      description: Indica cualquier procesamiento aplicado a los huevos antes de la
        oferta (por ejemplo, frescos, curados en sal, preservados).
    egg_production_method:
      name: Método de producción de huevos
      description: Especifica el sistema de cría o alojamiento utilizado para producir
        los huevos (por ejemplo, sin jaula, cría en campo abierto, orgánicos).
    egg_replacer_main_ingredient:
      name: Ingrediente principal del sustituto de huevo
      description: Indica el ingrediente básico principal a partir del cual se elabora
        el sustituto del huevo, lo que ayuda a los consumidores con respecto a necesidades
        vinculadas a dietas o propiedades de horneado deseadas.
    egg_size:
      name: Tamaño de los huevos
      description: Clasifica los huevos según designaciones de tamaño estándares del
        mercado.
    egg_source_animal:
      name: Animal productor de los huevos
      description: Identifica la especie animal que produjo los huevos.
    egg_white_processing_method:
      name: Método de procesamiento de la clara de huevo
      description: Indica cómo se procesaron las claras de huevo después de la recolección
        (por ejemplo, pasteurizado, secado por pulverización), lo que afecta la seguridad
        alimentaria, la vida útil y los casos de uso.
    eggplant_variety:
      name: Variedad de berenjenas
      description: Especifica el cultivo o la variedad de mercado de la berenjena,
        lo que permite al comprador elegir tipos que difieren en tamaño, sabor, color
        y uso culinario.
    eggshell_color:
      name: Color de la cáscara de huevo
      description: Especifica el color predominante de la cáscara de los huevos.
    elastic_edge_finish_type:
      name: Acabado y tipo de borde elástico
      description: Especifica la construcción del borde del elástico tejido, que influye
        sobre la comodidad y la aplicación.
    elastic_intended_use:
      name: Uso previsto del elástico
      description: Aplicación principal para la que está diseñado el elástico (ayuda
        al descubrimiento y reduce las discrepancias).
    elastic_recovery_performance:
      name: Rendimiento de recuperación elástica
      description: Describe qué tan bien el elástico tejido recupera su longitud original
        después de estirarse.
    elastic_recovery_quality:
      name: Calidad de recuperación elástica
      description: Indica la capacidad de recuperación elástica del material; es decir,
        qué tan bien vuelve a su longitud original después del estiramiento.
    elastic_stretch_level:
      name: Nivel de elasticidad
      description: Cuánto puede estirarse el elástico bajo tensión (a menudo se expresa
        como niveles relativos cuando no se proporciona un porcentaje exacto).
    elastic_structure:
      name: Estructura elástica
      description: Especifica la construcción estructural del elástico para ojales
        (por ejemplo, tejido de punto, trenzado, de punto), que puede afectar a la
        elasticidad, la recuperación y el rendimiento de la costura.
    elastic_type:
      name: Tipo elástico
      description: Especifica el tipo de confección del elástico (por ejemplo, elástico
        plegable (FOE), trenzado, tejido de punto, tejido plano).
    electric_assist_type:
      name: Tipo de asistencia eléctrica
      description: Indica si la bicicleta tiene asistencia eléctrica y el tipo de
        asistencia que proporciona.
    electric_bicycle_motor_position:
      name: Posición del motor de la bicicleta eléctrica
      description: 'Ubicación del motor de tracción de la bicicleta eléctrica: central,
        delantero, trasero o doble.'
    electric_bike_class:
      name: Clase de bicicleta eléctrica
      description: Categorizamos la bicicleta eléctrica según las clases reglamentarias
        que definen los límites de velocidad y la asistencia de aceleración.
    electric_guitar_bridge_type:
      name: Tipo de puente de guitarra eléctrica
      description: Especifica el tipo de sistema de puente o vibrato de la guitarra
        eléctrica.
    electric_instrument_output_connection_type:
      name: Tipo de conexión de salida de instrumento eléctrico
      description: Especifica las conexiones físicas de salida de audio que incorpora
        el violonchelo eléctrico.
    electric_riding_vehicle_control_options:
      name: Opciones de control de vehículos eléctricos de juguete
      description: Opciones de control y funcionamiento disponibles para el usuario
        o padre (por ejemplo, pedal, volante, control remoto).
    electric_spinning_wheel_speed_control_type:
      name: Tipo de control de velocidad de la rueca eléctrica
      description: Describe cómo el usuario ajusta la velocidad de giro de la rueca
        eléctrica.
    electric_ukulele_output_jack_type:
      name: Tipo de conector de salida para ukelele eléctrico
      description: Especifica el conector de salida físico utilizado por el ukelele
        eléctrico.
    electric_van_body_length_class:
      name: Clase de longitudes de carrocería de furgonetas eléctricas
      description: Clasificación de tamaño de furgonetas común basada en la distancia
        entre ejes y la longitud utilizada en publicaciones.
    electric_van_roof_height_class:
      name: Clase de altura del techo de la furgoneta eléctrica
      description: Clasificación común de la altura del techo utilizada para furgonetas
        (especialmente furgonetas de carga).
    electric_vehicle_drivetrain_layout:
      name: Diseño de la transmisión de vehículos eléctricos.
      description: Configuración de motor y ejes que describe cuántos motores hay
        y dónde están ubicados (aparte de la tracción total, delantera y trasera).
    electric_winder_accessories_included:
      name: Accesorios para el bobinador eléctrico incluidos
      description: Enumera los accesorios incluidos con el bobinador eléctrico (por
        ejemplo, abrazaderas y adaptadores).
    electrical_connector_type:
      name: Tipo de conector eléctrico
      description: Especifica el tipo de conector utilizado por el sistema de cierre
        o bloqueo de la puerta para la integración eléctrica (si corresponde).
    electrical_system_voltage:
      name: Voltaje del sistema eléctrico
      description: Indica la tensión nominal del sistema eléctrico del vehículo para
        la que está diseñado el regulador.
    electronic_cymbal_trigger_zones:
      name: Zonas de activación de platillos electrónicos
      description: Especifica cuántas zonas de activación independientes proporciona
        la almohadilla del platillo (por ejemplo, cuerpo, borde y campana).
    electronic_drum_module_audio_interface_functionality:
      name: Funcionalidad de interfaz de módulo de audio de batería electrónica
      description: Indica si el módulo puede funcionar como una interfaz de audio
        USB para grabación o reproducción (además de MIDI).
    electronic_drum_module_metronome_features:
      name: Características del metrónomo de módulo de batería electrónica
      description: Especifica capacidades de práctica o metrónomo integradas.
    electronic_drum_module_power_source:
      name: Fuente de alimentación de módulo de batería electrónica
      description: Especifica la fuente de alimentación requerida o compatible para
        el módulo de control.
    electronic_drum_module_sample_import_support:
      name: Compatibilidad con importación de muestras de módulo de batería electrónica
      description: Indica si el módulo puede importar muestras de usuario y mediante
        qué método.
    electronic_drum_pad_playing_surface_type:
      name: Tipo de superficie de ejecución de almohadillas de batería electrónica
      description: Describe la construcción de la superficie de percusión de la almohadilla
        del tom (por ejemplo, parche de malla vs. parche de goma), lo que afecta al
        rebote, el ruido y la sensación.
    electronic_features:
      name: Características electrónicas
      description: Indica las funciones electrónicas e interactivas incluidas en el
        artículo de banco de ejecución (si existen).
    electronic_lights_and_sound:
      name: Luces y sonido electrónicos
      description: Indica si el juego de la casa de muñecas incluye luces electrónicas
        o funciones de sonido (por ejemplo, luces, timbre, música, efectos de sonido).
    electronics_power_source:
      name: Fuente de alimentación electrónica
      description: Especifica cómo se alimentan los dispositivos electrónicos activos
        (cuando corresponde).
    eligible_race_series:
      name: Serie de carreras elegibles
      description: Serie de carreras u organismo regulador conforme a los que se puede
        competir.
    elliptical_trainer_part_type:
      name: Tipo de pieza de la elíptica
      description: Clasifica el tipo específico de accesorio o pieza de repuesto para
        una maquina elíptica (por ejemplo, correa, consola, pedal) para que el comprador
        pueda filtrar rápidamente el artículo que necesita sin tener que navegar por
        muchas microcategorías.
    embellishment_technique:
      name: Técnica de embellecimiento
      description: Detalla el trabajo decorativo o superficial principal aplicado
        a la prenda, como bordados, estampados o abalorios.
    embellishment_type:
      name: Tipo de adorno
      description: Identifica el tipo de elemento decorativo aplicado a la liga, como
        encaje, lazos o perlas.
    embossing_pen_ink_color:
      name: Color de la tinta del bolígrafo para gofrado
      description: Especifica el color de la tinta depositada por el bolígrafo de
        relieve (puede ser transparente/pegajosa o pigmentada). Distinto del color
        del bolígrafo/cuerpo.
    embossing_stylus_tip_shape:
      name: Forma de la punta del lápiz para gofrado
      description: Describe la geometría de la punta de gofrado utilizada para crear
        diferentes efectos (por ejemplo, redonda o puntiaguda).
    embroidered_coverage_level:
      name: Nivel de cobertura bordado
      description: Cantidad aproximada de hilo bordado que cubre la superficie del
        parche.
    embroidered_patch_backing_type:
      name: Tipo de parche bordado
      description: La capa de soporte o apoyo en el reverso del parche bordado que
        afecta su durabilidad y la forma en la que se puede aplicar.
    embroidery_hoop_type:
      name: Tipo de aro de bordado
      description: Identifica el estilo de construcción del aro de bordado y su mecanismo
        principal de tensión.
    embroidery_machine_bobbin_type:
      name: Tipo de bobina para máquina de bordar
      description: Tipo/estilo de carga del sistema de bobina.
    emergency_lighting_configuration:
      name: Configuración de iluminación de emergencia
      description: Especifica la configuración principal de las luces de advertencia
        de emergencia instaladas en el vehículo (por ejemplo, barra de luces en el
        techo, luces en la parrilla).
    emergency_lighting_package:
      name: Paquete de iluminación de emergencia
      description: Especifica los tipos de luces de advertencia de emergencia instaladas.
    emissions_compliance_standard:
      name: Norma de cumplimiento de emisiones
      description: Indica la certificación o el cumplimiento de las normas de emisiones
        del motor, cuando corresponde.
    emissions_standard:
      name: Estándar de emisiones
      description: Estándar de cumplimiento de emisiones para el vehículo (varía según
        la región y el año).
    enclosure_panel_configuration:
      name: Configuración del panel del gabinete
      description: Especifica qué paneles o laterales del cerramiento se incluyen
        (configuración de cobertura), como cerramiento completo, solo cortinas laterales
        o de 3 lados (parte delantera o trasera abierta).
    enclosure_window_material:
      name: Material para ventanas de cerramiento
      description: Identifica el material utilizado para los paneles de ventana transparentes
        del cerramiento.
    end_fitting_type:
      name: Tipo de conexión final
      description: El tipo de conector utilizado en cada extremo del puntal (lado
        del vehículo y lado de la tapa) que determina la compatibilidad del montaje.
    end_type:
      name: Tipo de extremo
      description: Especifica el estilo de terminación o fijación en los extremos
        de la correa de remolque para la conexión a los puntos de recuperación.
    ends_style_blocking_wires:
      name: Estilo de terminación (hilos para ahormar)
      description: Cómo se rematan los extremos del hilo para ahormar para mayor seguridad
        y para facilitar su paso a través de los bordes del encaje.
    enduro_bike_suspension_adjustability:
      name: Capacidad de ajuste de la suspensión de la bicicleta de enduro
      description: Indica qué ajustes de suspensión están disponibles (normalmente
        para la horquilla delantera y el amortiguador trasero).
    engine_bay_mounting_location:
      name: Plataforma de montaje de la bahía del motor
      description: Dónde se prevé montar el depósito de rebose en la bahía del motor
        (posición relativa).
    engine_bearing_coating:
      name: Revestimiento de cojinetes de motor
      description: Especifica cualquier recubrimiento superficial del rodamiento (para
        resistencia al desgaste, capacidad de incrustación y reducción de la fricción).
    engine_bearing_position:
      name: Posición del cojinete del motor
      description: Especifica la ubicación/función del cojinete dentro del motor.
    engine_bearing_size:
      name: Tamaño del cojinete del motor
      description: Especifica si el cojinete es de tamaño estándar o una variante
        de tamaño inferior o superior (comúnmente relacionada con el rectificado y
        la holgura del cigüeñal).
    engine_configuration:
      name: Configuración del motor
      description: Describe el diseño y la configuración de los cilindros del motor
        (por ejemplo, en línea, en V, plano, bóxer).
    engine_cooling_type:
      name: Tipo de refrigeración del motor
      description: Especifica el método de refrigeración del motor.
    engine_degreaser_form:
      name: Desengrasante para motor
      description: Formato físico o forma de aplicación del desengrasante para motor.
    engine_degreaser_rinse_requirement:
      name: Requisito de enjuague del desengrasante para motor
      description: Si el desengrasante está diseñado para enjuagarse con agua después
        de la aplicación.
    engine_mount_type:
      name: Tipo de soporte del motor
      description: Especifica el diseño funcional del soporte del motor (por ejemplo,
        hidráulico, sólido o brazo de torque).
    engine_oil_formulation:
      name: Formulación del aceite de motor
      description: Indica el enfoque de formulación del aceite de motor, como uso
        estándar, acondicionamiento de alto kilometraje, intervalos de cambio extendidos
        o aplicaciones para flotas o uso intensivo.
    engine_oil_specification:
      name: Especificación del aceite del motor
      description: La especificación o el estándar que cumple el aceite (por ejemplo,
        API SP, API SN Shopify Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Contenido del kit de reconstrucción de motores
      description: Identifica los componentes principales que se incluyen en el kit
        de reconstrucción del motor.
    engine_rotation_direction:
      name: Dirección de giro del motor
      description: Especifica el sentido de giro del motor utilizado en la aplicaciones
        marinas.
    engine_timing_system_drive_type:
      name: Tipo de accionamiento del sistema de sincronización del motor
      description: Indica si el sistema de distribución del motor es accionado por
        correa, cadena o engranajes para garantizar la compatibilidad.
    engine_valve_coating:
      name: Revestimiento de válvulas del motor
      description: Identifica cualquier variación superficial o recubrimiento aplicado
        a la válvula para mejorar su resistencia al desgaste y al calor.
    engine_valve_position:
      name: Posición de la válvula del motor
      description: Indica si la válvula del motor está destinada al lado de admisión
        o al lado de escape del motor.
    engine_valve_stem_tip_type:
      name: Tipo de punta de vástago de válvula de motor
      description: Especifica el estilo o la construcción de la punta del vástago
        de la válvula en el punto de contacto con el balancín o el ajustador.
    engine_valvetrain_type:
      name: Tipo de tren de válvulas del motor
      description: Disposición del tren de válvulas o árbol de levas.
    enhancement_level:
      name: Nivel de mejora
      description: 'Aumento aproximado del volumen proporcionado por el inserto, expresado
        en talla de copa: sutil (hasta 1 copa), moderado (1–2 copas) y significativo
        (más de 2 copas).'
    entry_zipper_location:
      name: Ubicación de la cremallera de entrada
      description: Especifica dónde se encuentra la cremallera o abertura principal
        del traje (por ejemplo, delantera, trasera, hombro, diagonal).
    epee_point_type:
      name: Tipo de punta de espada
      description: Especifica la marca o el estándar de la punta instalada en la hoja,
        lo que afecta a la compatibilidad y al mantenimiento.
    equestrian_discipline:
      name: Disciplina ecuestre
      description: Especifica la disciplina ecuestre para la que está destinada o
        es más adecuada la espuela.
    equestrian_helmet_safety_certification:
      name: Certificación de seguridad para cascos ecuestres
      description: Especifica las normas de seguridad o certificaciones a las que
        responde el casco.
    equine_application_area:
      name: Área de aplicación equina
      description: Especifica la región del cuerpo o el material para el que está
        destinado el producto (por ejemplo, casco, crin, arreo).
    equipment_contact_material_brew_wine:
      name: Material en contacto con el equipo (cerveza/vino)
      description: Material principal del artículo que entra en contacto con el líquido
        (por ejemplo, vidrio, acero inoxidable, plástico).
    eu_children_clothing_size:
      name: Talla de ropa para niños de la UE
      description: Especifica la talla de ropa infantil de la UE según la altura;
        por ejemplo, 104 o 140.
    eu_clothing_size:
      name: Talla de ropa de la UE
      description: Especifica la talla de ropa de Estados Unidos; por ejemplo, 38
        o 46.
    eu_cup_size:
      name: Talla de copa de la UE
      description: Especifica la talla de copa de sujetadores de la UE, como C o E.
    eu_ring_size:
      name: Tamaño del anillo de la UE
      description: Especifica el tamaño del anillo de la UE según la circunferencia,
        como 52 o 63.
    eu_shoe_size:
      name: Número de zapato de la UE
      description: Especifica el número de zapato de la UE, como 42 o 42 ancho
    euphonium_included_accessories:
      name: Accesorios incluidos para el eufonio
      description: Las listas incluían artículos comúnmente incluidos en el paquete
        con un eufonio (por ejemplo, boquilla, caja).
    euphonium_valve_configuration:
      name: Configuración de válvulas del eufonio
      description: Especifica el número de válvulas y si la cuarta válvula se acciona
        manualmente o mediante un mecanismo de accionamiento lateral.
    european_sword_historical_period:
      name: Período histórico de espada europea
      description: Período histórico principal en el que se basa el diseño o la réplica
        de la espada (o época de la original).
    european_sword_pattern_type:
      name: Diseño o tipo de espada europea
      description: Diseño o tipo específico de espada europea (tipología) representado
        por la espada de colección.
    ev_connector_adapter_direction:
      name: Dirección del conector o adaptador del vehículo eléctrico
      description: Especifica el origen y destino de conversión del adaptador (lado
        de entrada del vehículo frente al lado del cargador o cable), lo que permite
        un filtrado de compatibilidad preciso.
    ev_conversion_kit_completeness_level:
      name: Nivel de completitud del kit de conversión de vehículos eléctricos
      description: Indica si el producto es un kit de conversión completo o un kit
        o paquete parcial (por ejemplo, motor y controlador).
    ev_conversion_kit_drivetrain_configuration:
      name: Configuración del sistema de transmisión del kit de conversión de vehículos
        eléctricos
      description: Especifica la arquitectura del sistema de transmisión de un kit
        de conversión de vehículo eléctrico, incluso la ubicación del motor y el diseño
        de la transmisión, y si conserva la transmisión existente.
    ev_conversion_kit_voltage_class:
      name: Clase de voltaje del kit de conversión de vehículos eléctricos
      description: Clase de voltaje nominal del sistema (categoría) para la que está
        diseñado el kit de conversión de vehículos eléctricos. Utilice esta función
        para filtrar por clases de voltaje comunes del sistema, además de la medición
        exacta del voltaje.
    evaporator_core_type:
      name: Tipo de núcleo del evaporador
      description: Especifica el diseño constructivo de un núcleo de evaporador del
        aire acondicionado para automóviles.
    evenweave_fabric_finish_treatment:
      name: Acabado/variación de la tela uniforme
      description: Indica cualquier preacabado o variación aplicados al tejido que
        afecte al manejo o al aspecto.
    evenweave_fabric_package_format:
      name: Formato de paquete de tela uniforme
      description: Cómo se vende la tela (pieza cortada frente a pieza continua por
        metro o yarda).
    exercise_bike_accessory_part_type:
      name: Tipo de accesorio o pieza para bicicleta estática
      description: Describe la función o el tipo de componente principal del artículo
        (por ejemplo, pedal, correa de transmisión, portabotellas, cubierta de pantalla,
        brazo de biela).
    exercise_bike_cushion_component:
      name: Componente de amortiguación de la bicicleta estática
      description: Especifica el componente relacionado con el asiento provisto, como
        una almohadilla, un sillín o una funda de asiento.
    exercise_bike_metrics_tracked:
      name: Métricas controladas de la bicicleta estática
      description: Enumera los campos de datos del entrenamiento que la computadora
        puede medir y mostrar en tiempo real.
    exercise_mat_accessories_included:
      name: Accesorios para colchoneta de ejercicios incluidos
      description: Enumera los componentes adicionales provistos con la colchoneta,
        como correas o rodilleras.
    exhaust_cooling_type:
      name: Tipo de refrigeración de escape
      description: Indica si el componente de escape está diseñado para sistemas de
        escape húmedo (refrigerados por agua/con inyección de agua) o para sistemas
        de escape seco.
    exhaust_installation_position:
      name: Posición de instalación del escape
      description: Indica en qué parte del vehículo está instalada la pieza.
    exhaust_outlet_configuration:
      name: Configuración de la salida de escape
      description: Especifica el diseño de la salida de escape en la parte trasera
        del vehículo.
    expansion_tank_cap_connection_type:
      name: Tipo de conexión de la tapa del tanque de expansión
      description: El tipo de conexión mecánica utilizada para fijar y sellar la tapa
        al cuello del depósito de expansión.
    expansion_tank_cap_pressure_relief_feature:
      name: Función de alivio de presión en la tapa del tanque de expansión
      description: Si la tapa proporciona dicha función de alivio de presión o vacío
        y cómo lo hace.
    expansion_tank_cap_seal_material:
      name: Material de sellado para la tapa del tanque de expansión
      description: Material de la junta o el sello que entra en contacto con el cuello
        del depósito de expansión.
    extension_attachment_method:
      name: Método de fijación de la extensión
      description: Indica cómo se fija la extensión al manillar de la bicicleta, lo
        que ayuda a los ciclistas a confirmar la compatibilidad con su configuración
        actual.
    extension_bend_type:
      name: Tipo de curva de extensión
      description: Describe el estilo geométrico o la curvatura de la extensión del
        manillar, que afecta a la ergonomía y la aerodinámica del conductor.
    extension_mechanism:
      name: Mecanismo de extensión
      description: Describe el método que utiliza una mesa para expandir su longitud
        o superficie, si corresponde.
    extension_table_features:
      name: Características de la mesa de extensión
      description: Destaca las características funcionales específicas de las mesas
        de extensión para máquinas de coser.
    eyelet_grommet_installation_method:
      name: Método de instalación de ojales y arandelas
      description: Especifica cómo se instala o fija el ojal en el material.
    eyewear_lens_shape:
      name: Forma de lentes de gafas
      description: Indica la forma geométricas de la lente, como cilíndrica o esférica,
        lo que que afecta al campo de visión, a la distorsión y al estilo.
    eyewear_strap_material:
      name: Material de la correa de las gafas
      description: Especifica el material de la correa ajustable que sujeta las gafas
        o lentes a la cabeza del usuario.
    fabric_backing_type:
      name: Tipo de respaldo de tela
      description: Especifica si el algodón imprimible incluye un soporte de papel
        estabilizador (y de qué tipo), lo que determina si se puede utilizar con impresoras
        estándares.
    fabric_cut_format:
      name: Formato de corte de tela
      description: Especifica el corte o formato de la pieza de lienzo para bordado.
    fabric_end_use:
      name: Uso final de la tela
      description: Identifica la aplicación principal prevista para la tela (para
        qué se utiliza mejor).
    fabric_finish:
      name: Acabado de la tela
      description: Acabado o tratamiento superficial aplicado a la tela de seda que
        tiene efecto sobre el brillo, el tacto y el rendimiento.
    fabric_intended_use:
      name: Uso previsto para la tela
      description: Aplicaciones o proyectos recomendados principalmente para tela
        de lino.
    fabric_opacity_level:
      name: Nivel de opacidad de la tela
      description: Indica el grado de transparencia de la tela, lo que influye sobre
        las necesidades vinculadas a las capas y al forro.
    fabric_patch_shape:
      name: Forma de parches de tela
      description: Describe la forma de los parches incluidos en el kit.
    fabric_repair_kit_application_method:
      name: Método de aplicación del kit de reparación de tela
      description: Especifica cómo se aplica la reparación a la tela (por ejemplo,
        mediante planchado, costura o adhesivo).
    fabric_repair_kit_components_included:
      name: Componentes del kit de reparación de telas incluidos
      description: Enumera los componentes específicos que se incluyen en el kit (por
        ejemplo, parches, hilo, aguja, adhesivo).
    fabric_repair_kit_intended_use:
      name: Uso previsto del kit de reparación de telas
      description: Especifica la tarea de reparación común para la que está diseñado
        el kit (por ejemplo, rasgaduras, agujeros, dobladillos).
    fabric_selling_format:
      name: Formato de venta de telas
      description: Especifica cómo se vende la tela (largo continuo, pieza precortada,
        rollo o pieza, o muestra).
    fabric_stretch_level:
      name: Nivel de estiramiento de la tela
      description: Describe el grado de elasticidad de la tela, lo que ayuda al comprador
        a elegir los tejidos adecuados para prendas entalladas o proyectos estructurados.
    fabric_stretch_type:
      name: Tipo de estiramiento de la tela
      description: Indica el grado de elasticidad del tejido de los pantalones cortos
        de surf, importante para la movilidad al practicar surf o natación.
    fabric_texture:
      name: Textura de la tela
      description: Describe la textura superficial o la estructura del tejido utilizado
        en la prenda superior cómoda.
    fabric_use_case:
      name: Caso de uso de tela
      description: Uso principal previsto para la pieza o el rollo de tela satinada.
    fabric_weight_class:
      name: Clase de peso de la tela
      description: Clasifica la franela por rangos de peso de uso típico para ayudar
        al comprador a filtrar sin conocer el GSM/oz exacto.
    face_mask_material:
      name: Material de la mascarilla facial
      description: Composición del material de la mascarilla facial incluida con el
        casco o compatible con él.
    face_mask_style:
      name: Estilo de la mascarilla facial
      description: Define la forma o el estilo de confección general de la mascarilla,
        lo que ayuda al comprador a encontrar el calce y la estética que prefiera.
    face_mask_style_code:
      name: Código de estilo de mascarilla facial
      description: Define el estilo de barra estructural o la familia de códigos industriales
        de la mascarilla facial (por ejemplo, ROPO, OPO, RJOP).
    face_protection_type:
      name: Tipo de protección facial
      description: Indica el tipo de protección facial provisto con el casco o que
        está integrado en él, como las rejillas o los visores.
    faceplate_security_features:
      name: Funciones de seguridad de la placa frontal
      description: Incorpora características de prevención de robos y acceso relacionadas
        con el diseño de la placa frontal, aparte del diseño básico.
    facing_length:
      name: Largo frontal
      description: Especifica el largo de la boquilla (largo de curva), lo que influye
        sobre la respuesta y la elección de la caña.
    fan_shroud_type:
      name: Tipo de cubierta del ventilador
      description: Especifica el estilo de cobertura y geometría de la cubierta del
        ventilador (por ejemplo, completa, media o tipo aro).
    farming_method:
      name: Método de cultivo
      description: Destaca las prácticas de bienestar o crianza animal utilizadas
        para criar animales, como la cría en libertad o la cría ecológica.
    farming_practice:
      name: Práctica agrícola
      description: Identifica el método de cultivo principal utilizado para el producto
        (por ejemplo, convencional, orgánico, hidropónico).
    fascinator_style:
      name: Estilo de tocados
      description: Describe el diseño o la forma estructural de los tocados para que
        el comprador pueda filtrar rápidamente por estilos de sombrerería populares.
    fastener_grade:
      name: Grado de fijación
      description: Indica el grado o la clase de resistencia del perno, como el grado
        8 o la clase 10.9, que determina la capacidad de carga.
    fat_rendering_state:
      name: Estado de representación de la grasa
      description: Especifica si la grasa está fundida, sin fundir (cruda) o parcialmente
        fundida, lo que afecta a la vida útil y a las aplicaciones culinarias.
    fat_source:
      name: Fuente de grasa
      description: Identifica la principal fuente de grasa utilizada para producir
        la mantequilla, la manteca clarificada o la margarina (animal o vegetal),
        lo que facilita la identificación de alergias y la selección de alimentos
        según la dieta.
    faucet_hole_configuration:
      name: Configuración del orificio del grifo
      description: Indica el número y la ubicación de los orificios previamente realizados
        para el grifo en la encimera del lavabo.
    feather_application:
      name: Aplicación de plumas
      description: Uso principal o aplicación prevista de las plumas de pavo para
        manualidades o fabricación.
    feather_attachment_format:
      name: Fijación o formato de plumas
      description: Cómo se preparan o venden las plumas sintéticas para su uso (sueltas,
        en cuerda, en cinta, etc.).
    feather_coloration_style:
      name: Estilo de coloración de las plumas
      description: Describe cómo se aplica o visualiza el color en las plumas (por
        ejemplo, sólido, teñido en la punta, degradado), independientemente del valor
        del color de base.
    feather_component:
      name: Componente de pluma
      description: Especifica qué parte o estilo de pluma de pavo real se vende (por
        ejemplo, pluma ocular vs. filamento de pluma).
    feather_curvature:
      name: Curvatura de la pluma
      description: Perfil de forma o curvatura general de la pluma.
    feather_finish:
      name: Acabado de las plumas
      description: Indica si las plumas de avestruz son naturales o se procesaron
        (por ejemplo, se tiñeron o blanquearon) para uso decorativo.
    feather_form:
      name: Forma de la pluma
      description: Especifica la forma física de las piezas de pluma de ganso que
        se venden.
    feather_grade:
      name: Grado de la pluma
      description: Calidad o selección general de la pluma para uso artesanal frente
        a uso decorativo.
    feather_part:
      name: Parte de pluma
      description: La parte o estructura de la pluma de pavo que se vende (común en
        listados de materiales para manualidades y atado de moscas).
    feather_processing_type:
      name: Tipo de procesamiento de plumas
      description: Cómo se procesaron o tratado las plumas para uso artesanal (por
        ejemplo, teñidas, blanqueadas y naturales o sin teñir).
    feather_product_form:
      name: Forma del producto de plumas
      description: La forma física o el corte del producto de plumas tal como se vende
        (por ejemplo, plumas sueltas, boas o flecos).
    feather_quantity_unit:
      name: Unidad de cantidad de plumas
      description: Define cómo se vende el producto (por ejemplo, por unidad, por
        peso, por manojo) para facilitar una comparación precisa entre publicaciones.
    feather_source:
      name: Fuente de plumas
      description: Especifica la procedencia animal de las plumas utilizadas en los
        volantes de bádminton.
    feather_stiffness:
      name: Rigidez de la pluma
      description: Rigidez relativa de las barbas o la estructura de la pluma.
    feed_mechanism:
      name: Mecanismo de alimentación
      description: Indica cómo se introducen las pelotas en la máquina de lanzamiento.
    feed_purpose:
      name: Propósito de alimentación
      description: Describe el objetivo nutricional o funcional principal del alimento
        o suplemento.
    feeder_mechanism_type:
      name: Tipo de mecanismo de alimentador
      description: Identifica el mecanismo dispensador que utiliza el alimentador
        para liberar el alimento.
    feijoa_cultivar:
      name: Cultivo de feijoa
      description: Identifica el cultivo o la variedad específica de feijoa, ya que
        los diferentes cultivos ofrecen distintos sabores, tamaños y épocas de cosecha.
    felt_duty:
      name: Fieltro
      description: Especifica la clasificación del fieltro de la pelota de tenis (por
        ejemplo, de uso intensivo, de uso regular), que afecta la durabilidad en diferentes
        superficies.
    felting_mold_intended_use:
      name: Uso deseado de moldes para enfurtido
      description: Para qué se supone que se debe crear o utilizar el molde en proyectos
        de aplicación de fieltro.
    felting_pad_surface_material:
      name: Material de la superficie de la almohadilla de fieltro
      description: Material utilizado en la superficie de trabajo de la almohadilla
        o esterilla para enfurtido que entra en contacto con la fibra y la aguja.
    fencing_certification:
      name: Certificación de esgrima
      description: Incluye una lista de las aprobaciones oficiales de organismos rectores
        con las que cumple el arma de esgrima (por ejemplo, FIE, USFA), lo que indica
        su legalidad en competición y los estándares de calidad que cumple.
    fencing_connector_type:
      name: Tipo de conector de cercado
      description: Especifica la configuración del conector que se utiliza para fijar
        cables, enchufes o carretes de esgrima (por ejemplo, de 2 clavijas, de 3 clavijas,
        de bayoneta), lo que garantiza la compatibilidad de los componentes.
    fencing_discipline:
      name: Disciplina de esgrima
      description: Especifica el arma o la disciplina de esgrima para la que está
        diseñado el producto o con la que es compatible.
    fencing_weapon_type:
      name: Tipo de arma de esgrima
      description: Especifica el estilo arma de esgrima o de práctica con el que es
        compatible se representa el accesorio de entrenamiento, lo que ayuda a los
        usuarios a encontrar el equipo adecuado.
    fender_finish_state:
      name: Estado de acabado del guardabarros
      description: Indica el estado de la superficie o del acabado provisto del guardabarros
        para pintura y preparación para instalación.
    fender_pieces_included:
      name: 'Piezas de guardabarros incluidas '
      description: Enumera los componentes provistos con el producto para aclarar
        si se trata de un guardabarros individual o de un juego completo con accesorios.
    fender_type:
      name: Tipo de guardabarros
      description: Clasifica el diseño o estilo general del guardabarros.
    fennel_trimming:
      name: Poda de hinojo
      description: Indica qué partes de la planta se incluyen con el bulbo de hinojo
        (por ejemplo, con hojas finas, parte superior recortada y raíz).
    fennel_variety:
      name: Variedad de hinojo
      description: Especifica el cultivo o la variedad de mercado de los bulbos de
        hinojo que se venden.
    fermentation_application:
      name: Aplicación de fermentación
      description: Identifica el alimento o la bebida principal que el cultivo está
        diseñado para generar por fermentación (por ejemplo, queso, yogur, kéfir de
        leche, masa madre).
    fermentation_method:
      name: Método de fermentación
      description: Especifica cómo se produjo o fermentó la salsa de soja (por ejemplo,
        naturalmente, mediante hidrolización química).
    fermentation_vessel_material:
      name: Material del recipiente de fermentación
      description: Material principal del recipiente de fermentación incluido en el
        kit (si lo hubiera).
    ferrule_material:
      name: Material de la férula
      description: Especifica el material utilizado para la virola de la vara (por
        ejemplo, Juma, resina fenólica, policarbonato, XTC o sin virola), lo que influye
        sobre la durabilidad y la sensación en el impacto.
    fia_homologation_certification:
      name: Homologación o certificación de la FIA
      description: Indica si el coche (o la célula de seguridad) está certificado/homologado
        y según qué estándar.
    fiber_animal_source_type:
      name: Tipo de la fibra según animal u origen
      description: La fuente animal o principal de la que procede la fibra (o sintética),
        como la lana merino, la alpaca o las fibras vegetales.
    fiber_luster_level:
      name: Nivel de brillo de la fibra
      description: Brillo visual de la fibra, que varía desde mate hasta muy brillante.
    fiber_preparation_processing_stage:
      name: Etapa de preparación o procesamiento de la fibra
      description: Indica cómo se ha preparado/procesado la mecha para su uso (por
        ejemplo, cardada o peinada, mezclada, superwash).
    fiber_preparation_type:
      name: Tipo de preparación de fibra
      description: Indica cómo se ha preparado la fibra para la uso artesanal (por
        ejemplo, manta cardada, cardada en tambor, lámina de prefieltro).
    field_hockey_ball_playing_surface:
      name: Superficie de juego de la pelota de hockey sobre césped
      description: Identifica la superficie de juego o el entorno para el que está
        diseñada la pelota.
    field_hockey_ball_type:
      name: Tipo de pelota de hockey sobre césped
      description: Clasifica la pelota de hockey sobre césped según su uso previsto
        o característica especial.
    field_hockey_goal_size_standard:
      name: Portería de hockey sobre césped de tamaño estándar
      description: Clasifica la portería según los estándares o dimensiones para entrenamiento
        comunes de hockey sobre césped (p. ej., reglamento de la FIH para exteriores,
        juvenil, mini).
    field_hockey_training_objective:
      name: Objetivo de entrenamiento de hockey sobre césped
      description: Define la habilidad principal o el área de enfoque que la herramienta
        de entrenamiento está diseñada para mejorar.
    field_point_attachment_method:
      name: Método de fijación de punta de práctica
      description: Indica cómo se fija la punta de práctica al astil o inserto de
        la flecha (por ejemplo, rosca, pegamento).
    field_point_tip_style:
      name: Estilo de punta de práctica
      description: Define el estilo geométrico o el perfil funcional de la punta de
        práctica, lo que afecta a la penetración, el esfuerzo de extracción y la legalidad.
    fielding_glove_position:
      name: Posición del guante de fildeo
      description: Identifica la posición defensiva o el uso en béisbol o sóftbol
        para el que está diseñado el guante.
    fielding_training_focus:
      name: Enfoque del entrenamiento de fildeo
      description: Especifica el área de habilidad principal a la que apunta la ayuda
        durante las sesiones de práctica.
    fig_variety:
      name: Variedad de higo
      description: Identifica el cultivo o la variedad de higo específicos que se
        venden.
    figure_8_device_design:
      name: 'Figura 8: diseño del dispositivo'
      description: Identifica la configuración específica del dispositivo tipo 8,
        que afecta a las características de manejo y al uso previsto.
    figure_finish_type:
      name: Tipo de acabado de figura
      description: Indica el acabado de superficie o pintura de la figura del caballo
        (cómo se ve o se percibe como objeto de colección).
    figurine_scale:
      name: Escala de la figura
      description: Escalao relación de la figurilla con respecto al sujeto real (cuando
        corresponda), por ejemplo, 1:6.
    fill_status:
      name: Estado de llenado
      description: Indica si el muñeco para entrenamiento se vende previamente lleno,
        vacío o parcialmente lleno, lo que determina el costo de envío y el esfuerzo
        del comprador.
    filling_consistency:
      name: Consistencia de llenado
      description: Describe la textura o viscosidad del relleno provisto (por ejemplo,
        crema suave, fruta en trozos, pasta).
    filling_type:
      name: Tipo de relleno
      description: Indica el relleno principal o la crema que llevan las galletas,
        si se proporciona.
    filtration_and_mother_status:
      name: Filtración y estado materno
      description: Indica si el vinagre está filtrado, sin filtrar o crudo, o si contiene
        la "madre", para satisfacer a los consumidores que buscan opciones probióticas
        o en crudo.
    filtration_method:
      name: Método de filtración
      description: Material o técnica utilizada para filtrar y purificar el vodka
        después de la destilación.
    fin_box_system:
      name: Sistema de caja de aletas
      description: Especifica la caja de aletas o la interfaz de montaje que utiliza
        la tabla, lo que determina la compatibilidad con aletas de repuesto.
    fin_buoyancy:
      name: Flotabilidad de la aleta
      description: Indica si la aleta tiene flotabilidad positiva, neutra o negativa
        en el agua, lo que impacta el trim del buceador y el saldo del equipo.
    fin_flex_rating:
      name: Calificación de la flexibilidad de aletas
      description: Indica el nivel de rigidez o flexibilidad relativa de la aleta,
        lo que afecta al rendimiento general.
    fin_mounting_system:
      name: Sistema de montaje de aletas
      description: Define la interfaz de fijación o el estándar utilizado para fijar
        la aleta a la tabla de kitesurf (por ejemplo, FCS II, atornillable, de 4 orificios),
        lo que garantiza la compatibilidad entre las aletas y las tablas.
    fin_position:
      name: Posición de la aleta
      description: Especifica la posición de montaje prevista de la aleta en la tabla.
    fin_strap_type:
      name: Tipo de correa de aleta
      description: Especifica el estilo de correa o sistema de retención utilizado
        para asegurar la aleta al talón o pie.
    fin_template:
      name: Plantilla de aleta
      description: Categoriza la plantilla o contorno hidrodinámicos de la aleta de
        la tabla de surf, lo que influye sobre el estilo de giro, la velocidad y la
        sensación general sobre la tabla.
    finger_count:
      name: Cantidad de dedos
      description: Indica el número de dedos para los que están diseñados el guante,
        la dactilera o el disparador.
    finger_coverage:
      name: Cobertura de dedos
      description: Indica qué parte de los dedos está cubierta.
    finger_grip_adjustability:
      name: Capacidad de ajuste de la empuñadura
      description: Indica cómo se fija o ajusta la empuñadura para adaptarse a diferentes
        tamaños de mano.
    finger_hole_configuration:
      name: Configuración de orificio para los dedos
      description: Especifica la orientación de los orificios para los dedos (diestro,
        zurdo o ambidiestro).
    finger_hole_count:
      name: Cantidad de orificios para los dedos
      description: Indica el número de orificios para los dedos en el cuero de la
        empuñadura, una diferencia de estilo clave entre los modelos sin dedos, de
        2 orificios, de 3 orificios y de 4 orificios.
    finger_pick_band_style:
      name: Estilo de banda de púa para dedo
      description: El estilo de la banda/bucle que se sujeta al dedo influye en la
        comodidad y la capacidad de ajuste.
    finger_pick_blade_length:
      name: Largo de la punta de la púa para dedo
      description: Largo de la punta de la púa que se extiende desde la banda.
    finger_pick_blade_shape:
      name: Forma de punta de púa para dedo
      description: Forma o perfil de la superficie de ejecución (punta) que entra
        en contacto con las cuerdas.
    finger_pick_size:
      name: Tamaño de púa para dedo
      description: El tamaño de la banda o el anillo de la púa se ajusta a dedos de
        diferentes circunferencias (no al tamaño del instrumento).
    finger_pick_wear_location:
      name: Posicionamiento de uso de la púa para dedo
      description: Indica en qué dedo se debe usar la púa o si el producto es un set
        de púa de pulgar y púas para dedo.
    finger_protection:
      name: Protección de dedos
      description: Indica si el guante incluye protección para el lomo de los dedos
        y si las nervaduras son extraíbles.
    fingerboard_bearing_type:
      name: Tipo de cojinete de minitabla
      description: Especifica el tipo de rodamiento utilizado en las ruedas de las
        minitablas.
    fingerboard_grip_type:
      name: Tipo de agarre de diapasón
      description: Especifica el material o tipo de superficie de agarre utilizado
        en la minitabla.
    fining_agent_active_ingredient:
      name: Ingrediente activo del agente clarificante
      description: Agente clarificante o depurativo principal utilizado en el producto.
    fining_agent_type:
      name: Tipo de agente clarificante
      description: Especifica la composición química o el material del agente clarificante
        para productos que clarifican vino tinto.
    finish_after_baking:
      name: Acabado después de hornear
      description: Describe el aspecto típico de la superficie después del curado
        u horneado.
    finish_effect:
      name: Efecto de acabado
      description: Describe los efectos especiales de superficie u ópticos aplicados
        a los diamantes de imitación.
    finish_type:
      name: Tipo de acabado
      description: Acabado superficial aplicado al cuerpo del ukelele.
    finished_product_format:
      name: Formato del producto terminado
      description: Especifica el tipo de producto de fragancia que se pretende elaborar
        con el kit.
    fire_pit_accessories_included:
      name: Accesorios para brasero incluidos
      description: Incluye una lista de accesorios importantes provistos con el brasero,
        como rejillas antichispas o piedras volcánicas, lo que aclara qué contiene
        la caja.
    firework_assortment_launch_type:
      name: Tipo de lanzamiento de surtido de fuegos artificiales
      description: Describe cómo se encienden o lanzan normalmente los fuegos artificiales
        incluidos.
    firework_assortment_types_included:
      name: Tipos de fuegos artificiales de surtido incluidos
      description: Identifica los principales tipos de fuegos artificiales incluidos
        en el surtido para ayudar al comprador a comparar el contenido del paquete
        (por ejemplo, fuentes, candelas romanas, petardos).
    firework_effect_types:
      name: Tipos de efectos de fuegos artificiales
      description: Familias de efectos visuales o sensoriales principales producidos
        por el surtido (seleccionar todos los que correspondan).
    firework_ignition_method:
      name: Método de encendido de fuegos artificiales
      description: Especifica cómo se enciende el fuego artificial (por ejemplo, con
        mecha o encendedor eléctrico).
    firework_visual_intensity_level:
      name: Nivel de intensidad visual de los fuegos artificiales
      description: Intensidad y volumen visual general de chispas para el efecto de
        fuente.
    firing_mode:
      name: Modo de disparo
      description: Enumera los modos de disparo seleccionable o principal de la pistola
        de airsoft.
    first_day_cover_cachet_type:
      name: Tipo de sello de autenticidad de sobre del primer día
      description: Tipo de sello de autenticidad de sobre del primer día (por ejemplo,
        impreso, pintado a mano).
    first_day_cover_cancellation_type:
      name: Tipo de cancelación de sobre de primer día
      description: Tipo o estilo de matasellos aplicado en el sobre de primer día
        (por ejemplo, matasellos a máquina, matasellos a mano).
    first_day_cover_set_type:
      name: Tipo de juego de sobres de primer día
      description: Indica si la portada representa una emisión individual, una colección
        completa, un subconjunto o una combinación.
    fishing_hook_size:
      name: Ttamaño del anzuelo
      description: Especifica la designación estandarizada de tamaño del anzuelo (por
        ejemplo, n.° 4, 1/0, 10/0), lo que ayuda a los pescadores a hacer coincidir
        las dimensiones del anzuelo con la especie objetivo y el cebo.
    fishing_hook_style:
      name: Estilo de anzuelo
      description: Identifica el diseño específico o el patrón de curvatura del anzuelo
        individual, que afecta a la presentación, la eficacia del enganche y las aplicaciones
        previstas.
    fishing_hook_type:
      name: Tipo de anzuelo
      description: Describe la configuración del anzuelo provisto con la cuchara de
        pesca (si la hay).
    fishing_line_application:
      name: Aplicación de sedal
      description: Identifica el uso previsto del sedal o del material del bajo de
        línea (por ejemplo, bajo de línea, línea principal, punta de líder).
    fishing_line_buoyancy_type:
      name: Tipo de flotabilidad de la línea de pesca
      description: Clasifica el comportamiento de la línea en la columna de agua (por
        ejemplo, flotante, intermedia, de hundimiento), lo que ayuda a los pescadores
        a elegir la profundidad adecuada de presentación.
    fishing_needle_purpose:
      name: Propósito de la aguja de pesca
      description: Identifica la aplicación principal de la aguja en las tareas de
        montaje de aparejos de pesca.
    fishing_needle_types_included:
      name: Tipos de de agujas de pesca incluidos
      description: Enumera los estilos específicos de agujas o herramientas de aparejo
        provistos en el conjunto para que el cliente pueda ver rápidamente el contenido
        del kit.
    fit_profile:
      name: Perfil de ajuste
      description: Describe el corte y la silueta general de la almohadilla, lo que
        influye sobre la movilidad y la cobertura.
    fit_volume_classification:
      name: Clasificación de volumen de calce
      description: Categoriza el volumen interno general de la bota según la denominación
        comercial de las marcasa (por ejemplo, LV para bajo volumen).
    fitting_angle:
      name: Ángulo de calce
      description: Especifica el ángulo de curvatura del cuerpo del accesorio (por
        ejemplo, recto, 45°, 90°). Utilizar “Ajustable/giratorio” para accesorios
        con ángulo variable y “Otro” para ángulos poco comunes.
    flag_base_type:
      name: Tipo de base de banderín
      description: Define el estilo de anclaje o base utilizado para fijar el banderín
        de esquina en diferentes superficies de juego.
    flag_design_theme:
      name: Tema de diseño de banderas
      description: Describe el tema de diseño principal representado en la bandera
        (por ejemplo, país/nación, equipo deportivo, festividad), lo que facilita
        el descubrimiento y el filtrado para compras basadas en la intención del usuario.
    flag_mounting_method:
      name: Método de montaje de bandera
      description: Especifica cómo se fija la bandera al vehículo (por ejemplo, mediante
        montaje en antena, en enganche o magnético).
    flag_type:
      name: Tipo de bandera
      description: Clasifica el propósito o estilo específico de la bandera de golf,
        como bandera de hoyo, bandera de carrito o bandera de práctica.
    flame_resistance_standard:
      name: Norma de resistencia al fuego
      description: Indica la norma o certificación específica de resistencia al fuego
        o al arco eléctrico que cumple la prenda.
    flamenco_cajon_snare_system:
      name: Sistema de bordona del cajón flamenco
      description: Especifica el mecanismo interno bordona utilizado para crear el
        característico zumbido flamenco (o nada).
    flammability_compliance:
      name: Cumplimiento de las normas de inflamabilidad
      description: Especifica las normas de inflamabilidad aplicables que cumple el
        tejido para interiores de vehículos.
    flannel_brushing_finish:
      name: Acabado cepillado de franela
      description: Indica si la franela está cepillada y en qué lados, lo que influye
        sobre la suavidad, la calidez y la apariencia.
    flannel_use_type:
      name: Tipo de uso de la franela
      description: Aplicación principal prevista para el corte o la pieza de franela.
    flap_configuration:
      name: Configuración de solapa
      description: Especifica el estilo de solapa de la montura; por ejemplo, una
        sola solapa o dos solapas.
    flare_color:
      name: Color de destello
      description: Color de la luz o llama emitida (o color de la lente en el caso
        de los destellos LED).
    flash_card_included_features:
      name: Características incluidas en la tarjeta de memoria
      description: Destaca las funciones de aprendizaje y uso incluidas con las tarjetas
        didácticas.
    flavor_intensity:
      name: Intensidad del sabor
      description: Indica la concentración del producto aromatizante, lo que ayuda
        a los usuarios a determinar la dosis adecuada (por ejemplo, concentración
        estándar, concentración extrafuerte).
    flavor_solvent_base:
      name: Base disolvente de sabor
      description: Identifica el vehículo o solvente principal utilizado en el aromatizante
        (por ejemplo, alcohol, propilenglicol, glicerina).
    fleece_fiber_animal_type:
      name: Tipo animal de fibra de vellón
      description: La fuente animal de la fibra de vellón (especie).
    fleece_finish_surface:
      name: Acabado o superficie de vellón
      description: Describe la superficie o el acabado del vellón (por ejemplo, resistente
        a las bolitas, cepillado), lo que influye sobre la formación de bolitas, la
        suavidad y la apariencia.
    fleece_preparation_method:
      name: Método de preparación del vellón
      description: Cómo se prepara o procesa el vellón para artesanía e hilado (estado
        de la fibra).
    flesh_color:
      name: Color de la pulpa
      description: Indica el color fresco de la pulpa interior del melón.
    fletching_orientation:
      name: Orientación del emplumado
      description: Especifica cómo están colocadas las plumas en el astil (por ejemplo,
        rectas, desplazadas, helicoidales), lo que afecta al giro y al vuelo de la
        flecha.
    fletching_profile:
      name: Perfil de emplumado
      description: Define las formas geométricas o el corte del emplumado, lo que
        afecta la resistencia, la liquidación, el ruido y las características generales
        del vuelo de la flecha.
    flight_system_type:
      name: Tipo de sistema de vuelo
      description: Identifica el estilo de construcción del ala, lo que distingue
        entre sistemas plegables, moldeados e integrados de aleta y caña.
    float_attachment_method:
      name: Método de sujeción de flotante
      description: Describe cómo se sujeta el flotador a la línea (por ejemplo, deslizante
        o fijo), lo que permite a los pescadores filtrar por estilo de montaje.
    float_design:
      name: Diseño de flotadores
      description: Clasifica el estilo o tipo general del flotador de pesca (por ejemplo,
        boya, flotador waggler, flotador tipo lápiz) para que los pescadores puedan
        elegir rápidamente un modelo que se adapte a su técnica y estado.
    float_raft_use_environment:
      name: Entorno de uso de flotadores o balsas inflables
      description: Configuración acuático principal previsto para el inflable (piscina,
        aguas abiertas tranquilas o surf), que refleja la durabilidad y las expectativas
        de diseño.
    floatation:
      name: Flotación
      description: Si la baliza está diseñada para flotar en el agua.
    floor_construction_type:
      name: Tipo de construcción de piso
      description: Especifica el diseño del fondo de la balsa (por ejemplo, autovaciante,
        con punto de caída), que afecta al drenaje, la rigidez y el rendimiento.
    floor_design:
      name: Diseño de piso
      description: El tipo de cobertura de piso provista con el recinto.
    floor_inclusion:
      name: Inclusión del suelo
      description: Indica si el vestíbulo incluye un piso y si dicho piso es desmontable.
    floor_mat_cleaning_method:
      name: Método de limpieza de alfombrillas
      description: Indica el método de limpieza principal recomendado por el fabricante
        para la alfombrilla.
    floor_mat_edge_style:
      name: Estilo de borde de alfombrilla
      description: Describe si la alfombrilla tiene bordes elevados para contener
        derrames y residuos.
    floor_mat_format:
      name: Formato de alfombrilla
      description: Define el formato físico o estilo del producto de protección de
        piso (por ejemplo, alfombrilla individual, baldosa encastrable, rollo).
    floor_mat_retention_system:
      name: Sistema de retención de alfombrilla
      description: Especifica el método utilizado para mantener la alfombrilla fija
        en su lugar.
    floor_mat_set_configuration:
      name: Configuración del juego de alfombrillas
      description: Indica qué posiciones están incluidas en el paquete (por ejemplo,
        solo el par delantero, el juego completo).
    floss_sugar_granulation_grade:
      name: Grado de granulación de azúcar para algodón
      description: Describe el tamaño de los cristales de la mezcla de azúcar (fino,
        medio, grueso), lo que puede afectar al rendimiento de la máquina y a la textura
        final.
    floss_sugar_product_form:
      name: Presentación del producto de azúcar para algodón
      description: Indica si el azúcar para algodón está listo para usar, si se trata
        de un concentrado de sabor que debe mezclarse con azúcar básico o si es un
        azúcar básico incoloro.
    flour_grind_texture:
      name: Textura de molienda de la harina
      description: Indica el tamaño o la textura de la molienda de la harina, como
        superfina, media, gruesa o molida a piedra, lo que puede afectar el rendimiento
        de la receta.
    flour_processing_method:
      name: Método de procesamiento de harina
      description: Describe los métodos de procesamiento o tratamiento relevantes
        aplicados a la harina (por ejemplo, molida a la piedra, blanqueada, germinada,
        enriquecida) lo que influye sobre el sabor, el color o el valor nutricional.
    flower_care_instructions:
      name: Instrucciones para el cuidado de las flores
      description: Proporciona pasos de cuidado recomendados específicos para el cuidado
        de flores cortadas (por ejemplo, recortar los tallos, cambiar la frecuencia
        del agua).
    flugelhorn_leadpipe_material:
      name: Material del tubo de entrada del fliscorno
      description: Material del componente del tudel (si se especifica por separado
        del material del instrumento).
    flugelhorn_trigger_type:
      name: Tipo de activador del fliscorno
      description: Indica si el fliscorno incluye un activador de afinación y qué
        corredera o válvula acciona.
    fluorescence_grade:
      name: Grado de fluorescencia
      description: Indica la intensidad de fluorescencia del diamante cuando se expone
        a la luz ultravioleta.
    fluorescence_under_uv:
      name: Fluorescencia bajo luz ultravioleta
      description: Indica si la muestra presenta fluorescencia bajo luz ultravioleta
        y, en caso afirmativo, de qué tipo.
    fluorocarbon_content:
      name: Contenido de fluorocarbono
      description: Indica si la cera contiene aditivos fluorocarbonados y en qué concentración.
    flute_case_capacity:
      name: Capacidad del estuche de la flauta
      description: Indica qué puede contener la caja por diseño, aparte del cuerpo
        principal de la flauta (por ejemplo, flauta y flautín, embocadura adicional).
    flute_cleaning_rod_tip_type:
      name: Tipo de punta de varilla de limpieza para flauta
      description: Describe el diseño la punta de la varilla que sujeta el paño o
        hisopo o que entra en contacto con el instrumento (por ejemplo, ranurado,
        roscado o con ojal).
    flute_footjoint_type:
      name: Tipo de pata de la flauta
      description: Especifica la configuración de la pata de la flauta.
    flute_headjoint_cork_type:
      name: Tipo de corcho de la cabeza de la flauta
      description: Especifica el material/tipo del conjunto de corcho/tapón de la
        cabeza. Supply con la cabeza.
    flute_key_system:
      name: Sistema de llaves de la flauta
      description: Identifica el sistema mecánico/de llaves utilizado por la flauta
        (por ejemplo, el sistema Boehm), cuando corresponda.
    flute_keywork_material:
      name: Material de las llaves de la flauta
      description: Material y/o chapado de las teclas (mecanismo de teclas), cuando
        se especifica por separado del material del cuerpo.
    flute_offset_g:
      name: Sol desplazado de la flauta
      description: Especifica si la flauta tiene un diseño de llave de sol desplazada.
    flute_wall_thickness:
      name: Espesor de la pared de la flauta
      description: Categoría de espesor de pared del tubo de la flauta (pared delgada,
        estándar, pared gruesa).
    fly_pattern_type:
      name: Tipo de patrón de vuelo
      description: Clasifica las moscas artificiales según su estilo de pesca con
        caña o imitación de insectos o alimentos para ayudar a los pescadores a definir
        rápidamente el estilo de mosca adecuado.
    fly_rod_style:
      name: Estilo de caña de pesca con mosca
      description: Clasifica la caña según la disciplina o aplicación de lanzamiento
        prevista (por ejemplo, caña de una mano, de dos manos, Spey).
    fly_style:
      name: Estilo de vuelo
      description: Especifica el tipo de cremallera o abertura frontal en la parte
        inferior de los calzoncillos largos.
    fly_tying_tools_included:
      name: Herramientas para atar moscas incluidas
      description: Enumera las herramientas específicas para atar moscas que se proporcionan
        en el conjunto para que el comprador sepa exactamente qué se incluye y pueda
        comparar paquetes.
    fly_type:
      name: Tipo de cremallera
      description: Especifica si la parte inferior del calzoncillo largo incluye una
        cremallera funcional y el estilo de dicha cremallera.
    flyer_hook_mounting_method:
      name: Método de montaje del gancho del folleto
      description: La forma en que el gancho se fija al volante (por ejemplo, mediante
        tornillos o a presión) tiene efecto sobre la inestabilidad y la compatibilidad.
    flyer_hook_orientation:
      name: Orientación del gancho del volante
      description: Si el gancho está previsto para el lado izquierdo o derecho del
        volante, o si es reversible o universal.
    flyer_kit_finish_coating:
      name: Acabado o recubrimiento del kit de volante
      description: Acabado superficial aplicado a los componentes del kit del volante.
    flyer_kit_included_components:
      name: Componentes incluidos del kit de volante
      description: Indica qué piezas se incluyen en el kit.
    flyer_orifice_type:
      name: Tipo de orificio del folleto
      description: Especifica el tipo de orificio utilizado en el folleto.
    flying_disc_feature_set:
      name: Conjunto de características del disco volador
      description: Características funcionales destacadas del disco volador.
    flysheet_material:
      name: Material del doble techo
      description: Identifica la tela principal utilizada para la tienda exterior
        o el doble techo, lo que influye sobre el peso, la durabilidad y la resistencia
        a la intemperie.
    flywheel_balance_type:
      name: Tipo de equilibrio del volante
      description: Indica si el volante de inercia está en equilibrio neutro o si
        utiliza un peso de desequilibrio externo.
    foam_blocks_size_class:
      name: Clase de tamaño de los bloques de espuma
      description: Indica la clase de tamaño general de los bloques del conjunto.
    foam_blocks_surface_texture:
      name: Textura superficial de los bloques de espuma
      description: Describe la textura o el acabado de la superficie exterior de los
        bloques de espuma.
    foam_surface_effect:
      name: Efecto de superficie de espuma
      description: Describe los efectos decorativos comunes que se aplican a la espuma
        para manualidades o al poliestireno expandido, como los acabados con purpurina,
        metálicos u holográficos.
    foil_color:
      name: Color de la lámina
      description: Especifica el color del detalle metalizado del certificado (si
        corresponde).
    foil_curtain_mounting_method:
      name: Método de montaje de cortinas de aluminio
      description: Cómo se supone que se debe instalar o colgar la cortina de aluminio
        (por ejemplo, tira adhesiva, ojales).
    foil_discipline:
      name: Disciplina del hidrofoil
      description: Identifica el estilo de navegación o la disciplina principal para
        la que está diseñado el hidrofoil.
    foil_mast_board_mounting_type:
      name: Tipo de montaje de la tabla del mástil del hidrofoil
      description: Define la interfaz en la parte superior del mástil que se fija
        a la tabla o al riel del hidrofoil.
    foil_mast_fuselage_connection_type:
      name: Tipo de conexión del fuselaje del mástil del hidrofoil
      description: Especifica cómo se conecta el mástil al fuselaje o al conjunto
        del ala delantera.
    foil_mounting_interface:
      name: Interfaz de montaje de aluminio
      description: Identifica el estándar de conexión que utiliza la pieza para fijarse
        a la placa u otros componentes del hidrofoil.
    foil_mounting_system:
      name: Sistema de montaje de aluminio
      description: Especifica la interfaz de montaje para los hidrofoils o las aletas
        de la tabla, lo que garantiza la compatibilidad con los accesorios que ya
        tiene el usuario.
    foil_mounting_type:
      name: Tipo de montaje de aluminio
      description: Identifica el sistema de interfaz utilizado para fijar la lámina
        a la placa, lo que garantiza la compatibilidad entre los componentes.
    fold_over_elastic_application:
      name: Aplicación elástica plegable
      description: Uso o aplicación principal previstos para el elástico con ojales.
    foldability:
      name: Plegable
      description: Describe si el separador se pliega o se contrae para su almacenamiento
        o reconfiguración, y cómo lo hace.
    foldability_stow:
      name: Plegabilidad (almacenaje)
      description: Si la estantería se pliega o almacena cuando no está en uso (por
        ejemplo, se pliega contra el vehículo).
    folding_style:
      name: Estilo plegable
      description: Indica cómo se pliega la colchoneta de caída para su transporte
        y almacenamiento, lo que influye sobre la uniformidad de la superficie de
        aterrizaje y la facilidad de embalaje.
    food_basket_items_included:
      name: Artículos incluidos de la cesta de comida
      description: Enumera los principales tipos de alimentos incluidos en la cesta
        para ayudar al comprador a elegir cestas que se adecuen a los gustos o las
        necesidades alimentarias de los destinatarios.
    food_coloring_form:
      name: Forma del colorante alimentario
      description: Especifica la forma física o el formato de entrega en el que se
        provee el colorante alimentario (por ejemplo, gel, líquido, polvo, aerosol).
    food_contact_material:
      name: Material en contacto con alimentos
      description: Material principal del equipo de vinificación (fermentadores, sifones,
        embudo) utilizado con el mosto y el vino.
    food_packing_medium:
      name: Medio de envasado de alimentos
      description: Especifica el medio en el que se envasan las frutas o verduras
        (por ejemplo, agua, salmuera, jarabe, aceite).
    foosball_rod_type:
      name: Tipo de varilla de futbolín
      description: Indica la configuración mecánica de la barra, con efecto en la
        sensación de juego y a la seguridad.
    foot_arch_type_compatibility:
      name: Compatibilidad con el tipo de arco del pie
      description: Identifica el perfil del arco del pie para el que está diseñada
        la plantilla.
    foot_arch_type_suitability:
      name: Adecuación del tipo de arco de pie
      description: Indica el perfil de arco plantar para el que está diseñada la plantilla.
    foot_coverage:
      name: Cobertura de pies
      description: Indica si la prenda para las piernas cubre el pie o no, tiene estribo
        o es de talón abierto.
    foot_guard_type:
      name: Tipo de protector de pies
      description: Indica si la protección para la pierna incluye una puntera o el
        tacón y especifica si la puntera es fija o extraíble.
    foot_support_level:
      name: Nivel de soporte para pie
      description: Indica el nivel de ayuda estructural o firmeza que proporciona
        una plantilla para zapatos; por ejemplo bajo, medio, alto o extraalto.
    footbag_play_style:
      name: Estilo de juego del footbag
      description: Estilo de juego principal previsto para el footbag.
    football_ball_type:
      name: Tipo de balón de fútbol americano
      description: Especifica el uso o contexto principal previsto para el balón de
        fútbol americano, como juego, práctica o objeto de exhibición coleccionable.
    football_dummy_type:
      name: Tipo de muñeco de fútbol americano
      description: Clasifica el estilo o el diseño funcional del maniquí para reflejar
        su propósito específico de entrenamiento.
    football_glove_certification:
      name: Certificación de guantes de fútbol americano
      description: Indica la certificación o el cumplimiento de las normas requeridas
        para la competición (por ejemplo, SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Tipo de montaje del reposapiés
      description: Especifica cómo se fija el reposapiés al armazón de la cama o al
        suelo, lo que ayuda al comprador a seleccionar hardware y métodos de instalación
        compatibles.
    footboard_style:
      name: Estilo de estribo
      description: Define el estilo de diseño estructural o estético del reposapiés.
    footrest_adjustability:
      name: Capacidad de ajuste del reposapíes
      description: Especifica si los reposapiés se pueden ajustar y cómo hacerlo para
        adaptarse a las diferentes longitudes de piernas de los niños.
    footrest_type:
      name: Tipo de reposapiés
      description: Identifica la presencia y el diseño de un reposapiés en el taburete.
    footstrap_configuration:
      name: Configuración de las correa para pies
      description: Especifica el patrón de inserción de correa para pies en la cubierta
        de la tabla.
    footswitch_action_style:
      name: Estilo de acción del interruptor de pedal
      description: Indica si la acción del interruptor es momentánea o de retención,
        y si se admiten ambas.
    footswitch_power_source:
      name: Fuente de alimentación del interruptor de pedal
      description: Especifica cómo se alimenta el interruptor de pedal, si corresponde
        (pasivo a través del conector del amplificador, batería, adaptador externo,
        USB, etc.).
    footwear_construction_method:
      name: Método de confección de calzado
      description: Define la técnica utilizada para unir la parte superior a la suela,
        lo que influye sobre la durabilidad, las posibilidades de reparación de la
        suela y el precio.
    footwear_cut:
      name: Corte de calzado
      description: Indica la altura del cuello en el tobillo (caña baja, media o alta),
        lo que ofrece un equilibrio entre movilidad y soporte.
    footwear_size_system:
      name: Sistema de tallas de calzado
      description: Identifica el estándar de tallas regional utilizado para el número
        de zapato indicado (por ejemplo, Estados Unidos, Unión Europea, Reino Unido).
    footwear_support_type:
      name: Tipo de soporte para calzado
      description: Especifica el nivel de soporte biomecánico o control de pronación
        que proporciona el calzado (por ejemplo, neutro, con estabilidad, con control
        de movimiento).
    fork_material:
      name: Material de la horquilla
      description: Especifica el material utilizado para la horquilla de una bicicleta,
        que influye sobre la rigidez, el peso y la calidad de manejo.
    form_factor:
      name: Factor de forma
      description: Factor de forma del equipo principal del controlador DMX.
    formula_car_series_class:
      name: Serie o clase de autos monoplaza
      description: Especifica la serie o categoría de competición para la que está
        diseñado el monoplaza.
    formulation_style:
      name: Estilo de formulación
      description: Destaca las fórmulas especializadas diseñadas para usos o preferencias
        particulares (por ejemplo, barista, extracremoso).
    formulation_type:
      name: Tipo de formulación
      description: El estilo de formulación del aerosol desinfectante.
    fossil_preparation_level:
      name: Nivel de preparación de fósiles
      description: Grado de preparación/limpieza realizada en la muestra (por ejemplo,
        sin preparar en matriz o totalmente preparada).
    fossil_preservation_type:
      name: Tipo de conservación del fósil
      description: Tipo de conservación del fósil (por ejemplo, permineralizado, molde
        positivo, molde negativo, impresión).
    fossil_restoration_status:
      name: Estado de restauración del fósil
      description: Si la muestra se reparó o restauró y cómo (por ejemplo, pegada,
        reconstruida, compuesta).
    foundation_configuration:
      name: Configuración de base
      description: Especifica si la base se fabrica como una sola pieza o un conjunto
        dividido o de dos piezas para colchones de mayor tamaño.
    foundation_profile:
      name: Perfil de base
      description: Clasifica la categoría de altura general de la base (por ejemplo,
        perfil ultrabajo, bajo, estándar o alto) para que el comprador pueda encontrar
        rápidamente la altura adecuada y la medida de sábanas para su colchón.
    frame_adjustability:
      name: Capacidad de ajuste del marco
      description: Indica si el marco se puede ajustar y cómo (por ejemplo, ajuste
        de ancho o alto y rotación o inclinación), lo que afecta la ergonomía y la
        adecuación al proyecto.
    frame_drum_jingle_configuration:
      name: Configuración de sonajas del tambor de marco
      description: Si el tambor de marco incluye sonajas y, en caso afirmativo, cuál
        es su configuración general.
    frame_drum_tuning_system:
      name: Sistema de afinación de tambores de marco
      description: Cómo se afina el tambor de marco o si es afinable.
    frame_finish:
      name: Acabado del marco
      description: Especifica el revestimiento protector o el acabado del material
        aplicado al marco, lo que influye sobre la durabilidad y la estética.
    frame_mounting_standard:
      name: Estándar de montaje del marco
      description: Define la especificación de la interfaz de la bota al chasis (por
        ejemplo, 195 mm de 2 puntos, Trinity de 3 puntos), fundamental para la compatibilidad
        del marco.
    frame_steel_gauge:
      name: Calibre del acero del marco
      description: Indica el grosor (calibre) de los tubos de acero utilizados en
        los montantes de la estantería, un indicador fundamental de resistencia y
        estabilidad.
    frame_suspension_type:
      name: Tipo de suspensión del cuadro
      description: Indica el diseño de la suspensión del cuadro de la bicicleta, como
        rígido, de cola dura o de doble suspensión, para ayudar al comprador a elegir
        el cuadro que se ajuste a su configuración prevista.
    free_reed_instrument_orientation:
      name: Orientación de los instrumentos de lengüeta libre
      description: Especifica cómo se sostiene o se toca el instrumento (con fuelle,
        con correa para el hombro, etc.) para evaluar la ergonomía y el tipo de uso.
    free_weight_rack_type:
      name: Tipo de estantería de peso libre
      description: Clasifica el estilo estructural o la función del soporte (por ejemplo,
        para barras, para pesas rusas, árbol para discos).
    freehub_body_type:
      name: Tipo de cuerpo de buje libre
      description: Especifica el estándar del cuerpo de rueda libre o del núcleo para
        casete compatible con el buje trasero de la bicicleta.
    freehub_driver_standard:
      name: Estándar del núcleo
      description: Identifica la interfaz de casete compatible con la pieza del buje
        (por ejemplo, Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Estándar de rosca de rueda libre
      description: Especifica el estándar o tamaño de rosca de buje con el que es
        compatible la rueda libre.
    french_horn_bell_construction:
      name: Construcción de la campana de la trompa francesa
      description: Especifica cómo está construida la campana y si se puede desmontar
        para su transporte o mantenimiento.
    french_horn_bell_material:
      name: Material de la campana de la trompa
      description: Especifica el material y la aleación de la campana (y a menudo
        el pabellón de la campana) utilizados en la trompa francesa.
    french_horn_bell_type:
      name: Tipo de campana de trompa francesa
      description: Estilo de construcción de la campana.
    french_horn_finish:
      name: Acabado de la trompa francesa
      description: Acabado y baño exterior del instrumento.
    french_horn_included_accessories:
      name: Accesorios incluidos de la trompa francesa
      description: Accesorios que acompañan la trompa (estuche, boquilla, etc.).
    french_horn_leadpipe_material:
      name: Material del tudel de la trompa
      description: Especifica el material y la aleación del tudel.
    french_horn_wrap_type:
      name: Tipo de envoltura de la trompa
      description: Configuración general de la forma de la trompa francesa.
    fretboard_radius_fit:
      name: Ajuste del radio del diapasón
      description: Indica si la curvatura de la almohadilla del capo está diseñada
        para diapasones planos o con radio, o si es ajustable para adaptarse a diferentes
        radios de diapasón.
    friction_surface_included:
      name: Superficie de fricción incluida
      description: Si el volante incluye una superficie de fricción reemplazable o
        instalada (por ejemplo, inserto, anillo) o si es una superficie de fricción
        de una sola pieza.
    fringe_curtain_finish:
      name: Acabado de cortina con flecos
      description: Describe el acabado visual de la superficie de los flecos (brillo/textura).
    fringe_curtain_material:
      name: Tela para cortinas con flecos
      description: Especifica el material principal de las tiras de cortina (por ejemplo,
        lámina de polietileno, plástico, papel, tela).
    fringe_curtain_use_location:
      name: Lugar de uso de la cortina con flecos
      description: Indica si la cortina con flecos está destinada a uso interior o
        exterior o a ambos.
    fringe_trim_style:
      name: Estilo de ribete con flecos
      description: Especifica la construcción o el estilo del fleco decorativo (cómo
        se forman y presentan los hilos o bucles).
    front_axle_standard:
      name: Estándar de eje delantero
      description: Indica el diámetro y el espaciado del eje que la horquilla está
        diseñada para aceptar (por ejemplo, Boost de 15 x 110 mm), lo que garantiza
        la compatibilidad con el buje.
    front_button_configuration:
      name: Configuración del botón delantero
      description: Indica el estilo de los botones delanteros de una chaqueta, y especifica
        si es de botonadura simple o doble y el número de botones delanteros.
    front_closure_style:
      name: Estilo de cierre frontal
      description: Indica el estilo de confección frontal de la gabardina; por ejemplo,
        de botonadura simple o doble, abierta, cruzada o con cierre.
    front_decoration_type:
      name: Tipo de decoración frontal
      description: Identifica el tipo de adorno o parche que aparece en la parte delantera
        del sombrero (por ejemplo, parche bordado, parche de cuero).
    front_point_configuration:
      name: Configuración del punto delantero
      description: Especifica el diseño de las puntas delanteras (simple, doble, modular,
        reemplazable), que influye la precisión de penetración sobre hielo y terreno
        mixto.
    front_seat_position:
      name: Posición del asiento delantero
      description: Para qué lado o posición de la primera fila está destinado el asiento.
    front_style:
      name: Estilo frontal
      description: Describe la confección de la parte delantera del pantalón chino,
        e indica si es de frente liso, con pinzas o si tiene algún otro tipo de detalle.
    frosting_or_icing_type:
      name: Tipo de glaseado o cobertura
      description: Especifica el tipo de glaseado o cobertura que se aplica al pastel
        o a la barra de postre.
    fruit_cultivar_or_variety:
      name: Cultivo o variedad de fruta
      description: Especifica el nombre del cultivo o de la variedad particular de
        la fruta (por ejemplo, Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Estilo de corte de fruta
      description: Describe cómo se prepara o se corta la fruta (por ejemplo, entera,
        en rodajas, en cubos).
    fruit_mix_variety:
      name: Variedad de mezcla de frutas
      description: Indica la mezcla temática o la variedad general de la mezcla de
        frutas (por ejemplo, Mezcla Tropical, Mezcla de Bayas).
    fruit_piece_form:
      name: Forma de trozo de fruta
      description: Describe el corte físico o la presentación de los trozos de fruta
        deshidratada; por ejemplo, enteros, en rodajas o en polvo.
    fruit_snack_form:
      name: Forma de la golosina de fruta
      description: Clasifica la forma física o el estilo en que se presenta la golosina
        de fruta.
    fruit_topping_format:
      name: Formato de cobertura de fruta
      description: Describe la forma física, la textura o el estilo del aderezo para
        que el comprador pueda seleccionar salsas, jarabes, trozos de fruta, perlas
        explosivas, etc.
    fruit_variety:
      name: Variedad de fruta
      description: Identifica la fruta principal utilizada para una receta, un kit
        o un insumo de vino de frutas (por ejemplo, manzana, cereza, mora).
    fuel_cap_gasket_seal_material:
      name: Material de la junta o del sello de la tapa de combustible
      description: Especifica el material utilizado para la junta o el anillo tórico
        de sellado de la tapa del depósito de combustible.
    fuel_cap_locking_mechanism:
      name: Mecanismo de bloqueo de la tapa de combustible
      description: Indica el sistema de bloqueo utilizado por la tapa de combustible
        con cierre.
    fuel_cap_type:
      name: Tipo de tapa de combustible
      description: Especifica el tipo o diseño funcional de la tapa de combustible
        utilizado para el cuello de llenado de combustible de un vehículo.
    fuel_cap_venting:
      name: Ventilación de la tapa de combustible
      description: Indica si la tapa del depósito de combustible tiene ventilación
        y, en caso afirmativo, el tipo de ventilación.
    fuel_filter_features:
      name: Características del filtro de combustible
      description: Enumera las características funcionales más destacadas del filtro
        de combustible (separación de agua, válvula de drenaje, puerto para sensor,
        etc.).
    fuel_filter_media_material:
      name: Material del medio filtrante del filtro de combustible
      description: Especifica el material filtrante principal utilizado dentro del
        elemento filtrante de combustible.
    fuel_filter_mounting_connection_type:
      name: Tipo de montaje o conexión del filtro de combustible
      description: Especifica cómo se conecta o se instala el filtro de combustible
        (roscado o tipo "spin on", de conexión rápida, de espiga para manguera, banjo,
        etc.).
    fuel_injection_cleaning_method:
      name: Método de limpieza para inyección de combustible
      description: Indica cómo se utiliza el kit para limpiar el sistema de inyección
        de combustible.
    fuel_injector_electrical_connector_type:
      name: Tipo de conector eléctrico del inyector de combustible
      description: Especifica el estándar/forma del conector eléctrico del inyector.
    fuel_injector_seat_type:
      name: Tipo de asiento del inyector de combustible
      description: Especifica el estilo de interfaz de la boquilla o el asiento del
        inyector que se utiliza para el sellado en el riel de admisión o combustible.
    fuel_injector_spray_pattern:
      name: Patrón de pulverización del inyector de combustible
      description: Identifica el patrón de pulverización o distribución de combustible
        del inyector con terminología del fabricante o del sector (por ejemplo, cono,
        abanico, chorro fino, orificios múltiples).
    fuel_level_sensor_mounting_type:
      name: Tipo de montaje del sensor de nivel de combustible
      description: Especifica la interfaz de montaje físico utilizada para conectar
        el sensor o transmisor de nivel de combustible al tanque de combustible o
        al módulo de la bomba.
    fuel_level_sensor_sensing_mechanism:
      name: Mecanismo de detección del sensor de nivel de combustible
      description: Especifica el mecanismo o la tecnología de detección para medir
        el nivel de combustible en un sensor o una unidad transmisora de nivel de
        combustible.
    fuel_line_compliance_standard:
      name: Estándar de cumplimiento del conducto de combustible
      description: Identifica la norma reglamentaria o industrial que cumple el conducto
        de combustible (común en aplicaciones marinas).
    fuel_line_connector_interface_type:
      name: Tipo de interfaz del conector de la línea de combustible
      description: Especifica el estilo de conexión o la interfaz en los extremos
        del conducto o conector de combustible.
    fuel_pressure_regulator_body_material:
      name: Material del cuerpo del regulador de presión de combustible
      description: Especifica el material de la carcasa o del cuerpo del regulador
        en términos de durabilidad y resistencia a la corrosión.
    fuel_pressure_regulator_mounting_type:
      name: Tipo de montaje del regulador de presión de combustible
      description: Especifica cómo se monta o instala el regulador de presión de combustible,
        lo que influye sobre el ajuste y la compatibilidad.
    fuel_pump_inlet_type:
      name: Tipo de entrada de la bomba de combustible
      description: Tipo de conexión en la entrada de la bomba.
    fuel_pump_mounting_location:
      name: Lugar de montaje de la bomba de combustible
      description: Lugar donde se instala la bomba de combustible en el sistema de
        combustible del vehículo.
    fuel_pump_outlet_connection_type:
      name: Tipo de conexión de salida de la bomba de combustible
      description: Especifica el tipo de conexión física en la salida de la bomba
        de combustible para garantizar la compatibilidad de montaje e instalación.
    fuel_system_application:
      name: Aplicación del sistema de combustible
      description: Arquitectura del sistema de suministro de combustible que la bomba
        de combustible está diseñada para admitir (por ejemplo, carburado, EFI, GDI,
        elevación o transferencia diésel).
    fuel_system_connection_type:
      name: Tipo de conexión del sistema de combustible
      description: Especifica los estándares de conexión del sistema de combustible
        o las interfaces del adaptadores compatibles con el kit.
    fuel_system_type:
      name: Tipo de sistema de combustible
      description: Especifica el sistema de suministro de combustible del motor (por
        ejemplo, carburador o sistema de inyección de combustible).
    fuel_tank_installation_position:
      name: Posición de instalación del depósito de combustible
      description: Especifica la posición de instalación típica del depósito de combustible
        en el vehículo.
    fuel_tank_orientation:
      name: Orientación del depósito de combustible
      description: Especifica si el depósito de combustible debe instalarse en sentido
        horizontal o vertical.
    fuel_tank_shape:
      name: Forma del depósito de combustible
      description: Describe el factor de forma o la forma general del depósito de
        combustible para facilitar el ajuste físico y la compatibilidad en caso de
        reemplazo.
    fur_type:
      name: Tipo de piel
      description: Identifica la especie o el material sintético de cualquier piel
        en el exterior del bolso de mano o de la cartera.
    furniture_finish:
      name: Acabado de muebles
      description: Describe el tratamiento superficial o el acabado aplicado al mueble,
        que influye sobre su apariencia y los requisitos de mantenimiento.
    fuse_form_factor:
      name: Factor de forma del fusible
      description: Especifica el formato físico o la huella del fusible para garantizar
        que encaje en el portafusibles o bloque de fusibles previsto (por ejemplo,
        tipo cuchilla o tipo cartucho).
    fuse_terminal_or_mount_style:
      name: Terminal o tipo de montaje de fusible
      description: Especifica cómo se conecta el fusible de forma mecánica o eléctrica
        (enchufable, atornillado o en línea).
    fusible_application_method:
      name: Método de aplicación del fusible
      description: Especifica cómo se activa o aplica el adhesivo termofusible; por
        ejemplo, con calor de plancha, prensa o refuerzo con costura.
    fusible_hem_tape_application_method:
      name: Método de aplicación de cinta termoadhesiva para dobladillos
      description: Describe cómo se activa o aplica la cinta (por ejemplo, mediante
        planchado o prensado térmico).
    fusible_seam_tape_activation_method:
      name: Método de activación de la cinta para costuras del fusible
      description: Indica cómo se activa el adhesivo durante la aplicación.
    fusible_seam_tape_application:
      name: Aplicación de cinta termoadhesiva para costuras
      description: Especifica el uso principal previsto para la cinta termoadhesiva.
    fusible_seam_tape_material:
      name: Material de cinta termoadhesiva para costuras
      description: Material o composición de la cinta, la malla o el soporte (no la
        tela a la que se adhiere).
    fusible_seam_tape_washability:
      name: Capacidad de lavado de la cinta termoadhesiva
      description: Indica si la costura fusionada permanece intacta después del lavado
        o la limpieza.
    fusible_seam_tape_waterproof_rating:
      name: Clasificación de impermeabilidad de la cinta termoadhesiva para costuras
      description: Indica si la cinta de costura está destinada a crear una costura
        impermeable o resistente al agua después de la aplicación.
    fusible_tape_backing_type:
      name: Tipo de respaldo de cinta fusible
      description: Especifica si la cinta tiene un papel protector o recubrimiento
        desprendible y qué forma adopta, lo que influye sobre el manejo y la aplicación.
    futon_frame_conversion_mechanism:
      name: Mecanismo de conversión del armazón del futón.
      description: Define el mecanismo o estilo estructural utilizado para convertir
        el armazón entre las posiciones de sofá, reposera y cama.
    gaiter_height_type:
      name: Tipo de altura de polainas
      description: Clasifica las polainas según la altura de cobertura que proporcionan
        en la pierna, como tobillo, número de identificación de comerciante-pantorrilla,
        rodilla o muslo.
    game_variation:
      name: Variación del juego
      description: Especifica el estilo de juego para el que está diseñado el conjunto
        (por ejemplo, tetherball clásico, tenis con cuerda, speedball).
    garlic_preparation_style:
      name: Estilo de preparación de ajo
      description: Especifica cómo se prepara o procesa el ajo antes de su comercialización
        (por ejemplo, entero, picado, en polvo).
    garlic_variety:
      name: Variedad de ajo
      description: Identifica la variedad o el cultivo botánico o comercial de ajo
        que se ofrece.
    garment_back_style:
      name: Estilo de la parte posterior de la prenda
      description: Identifica el diseño o la confección de la parte posterior de la
        prenda (por ejemplo, espalda abierta, espalda deportiva, espalda cruzada).
    garment_pattern_type:
      name: Tipo de patrón de prenda
      description: Especifica el tipo de prenda de vestir para la que está diseñado
        el patrón de costura.
    garnish_type:
      name: Tipo de guarnición
      description: Indica qué tipo de guarnición (ingrediente o estilo de guarnición)
        se utiliza para terminar un cóctel.
    gas_lift_class:
      name: Clase de elevación a gas
      description: Especifica la clasificación de seguridad y resistencia del cilindro
        de gas utilizado para el ajuste de la altura del asiento.
    gas_propellant_type:
      name: Tipo de propulsor de gas
      description: Especifica el tipo de propulsor de gas recomendado o compatible
        cuando el lanzador funciona con gas.
    gatta_tabla_tuning_block_material:
      name: Material de los bloques de afinación (bloque de afinación de tabla)
      description: Material de los bloques de afinación utilizados entre la correa
        de afinación y la caja de resonancia.
    gauge_mounting_type:
      name: Tipo de montaje del calibre
      description: Cómo se monta o instala el medidor de combustible en la embarcación.
    gauge_style:
      name: Estilo de calibre
      description: Especifica el tipo de manómetro que utiliza la bomba, como un dial
        analógico, una pantalla digital o ninguno de estos.
    gear_oil_api_classification:
      name: Clasificación API del aceite para engranajes
      description: Clasificación API GL para aceites de engranajes utilizados en diferenciales
        y transmisiones manuales.
    gel_wax_density_grade:
      name: Grado de densidad de cera en gel
      description: Indica el grado de densidad de la cera en gel, que afecta la claridad,
        la cantidad de fragancia y la idoneidad para incrustar.
    gel_wax_transparency_level:
      name: Nivel de transparencia de la cera en gel
      description: Describe la claridad u opacidad de la cera en gel cuando se utiliza
        según lo previsto.
    gelatin_form:
      name: Forma de gelatina
      description: Detalla la presentación física de la gelatina para que los usuarios
        puedan elegir el formato correcto para recetas y aplicaciones industriales.
    gelatin_or_gelling_agent_source:
      name: Fuente de gelatina o agente gelificante
      description: Indica el origen o el tipo de agente gelificante utilizado en el
        producto, información importante por motivos dietéticos y religiosos.
    gelatin_source:
      name: Fuente de gelatina
      description: Indica el origen animal, vegetal o sintético de la gelatina para
        que el comprador pueda verificar su compatibilidad con requisitos dietéticos,
        éticos o religiosos.
    gelling_agent:
      name: Agente gelificante
      description: Identifica la sustancia principal utilizada para cuajar o espesar
        el postre, lo cual es importante para su idoneidad dietética y su textura.
    gemstone_clarity_grade:
      name: Grado de claridad de la piedra preciosa
      description: Grado de claridad de la piedra preciosa (cuando está clasificada).
    gemstone_creation_method:
      name: Método de creación de piedras preciosas
      description: Indica si la piedra preciosa es natural, creada en laboratorio
        o imitación.
    gemstone_cut_style:
      name: Estilo de corte de piedras preciosas
      description: Describe el estilo de tallado o acabado de la piedra preciosa.
    gemstone_treatment_status:
      name: Estado de variación de piedras preciosas
      description: Indica si la piedra preciosa se trató o mejoró y de qué manera.
    geological_period:
      name: Período geológico
      description: Período geológico (y, opcionalmente, época) del fósil cuando se
        conoce (por ejemplo, Jurásico, Cretácico, Eoceno).
    gift_box_tin_insert_type:
      name: Tipo de inserto de caja o lata de regalo
      description: Configuración del inserto interior para organizar o proteger los
        artículos dentro de la caja o la lata.
    gift_box_tin_sustainability_features:
      name: Características de sustentabilidad de la caja o lata de regalo
      description: Características relacionadas con la sostenibilidad del embalaje
        de la caja o lata de regalo.
    gift_box_tin_window_type:
      name: tipo de ventana de la caja o lata de regalo
      description: Si la caja de regalo tiene una ventana de visualización y de qué
        estilo es.
    gift_message_option:
      name: Opción de mensaje para regalo
      description: Especifica si se puede incluir, y de qué manera, un mensaje o una
        nota para regalo (ninguno, incluido, personalizable).
    ginger_maturity:
      name: Madurez del jengibre
      description: Indica la etapa de cosecha del jengibre, como joven o maduro, lo
        que afecta la intensidad del sabor y la aplicación culinaria preferida.
    ginger_variety:
      name: Variedad de jengibre
      description: Especifica el cultivar, el tipo o el rizoma relacionado dentro
        de la familia del jengibre para diferenciar los perfiles de sabor y los usos
        culinarios.
    glass_kiln_controller_type:
      name: Tipo de controlador de horno de vidrio
      description: Tipo de controlador de temperatura y cocción incluido con el horno.
    glass_kiln_firing_application:
      name: Aplicación para la cocción de vidrio en horno
      description: Aplicaciones principales para trabajo en vidrio para las que está
        diseñado el horno.
    glass_stone_application_method:
      name: Método de aplicación de piedras de vidrio
      description: Especifica cómo se deben fijar o aplicar las piedras de vidrio
        en los proyectos (por ejemplo, con pegamento, termoadhesivas o cosidas).
    glass_tint:
      name: Tinte de vidrio
      description: El tinte de vidrio o plástico de la botella que se usa para para
        controlar la exposición a la luz (común en la elaboración de cerveza y vino).
    glaze_firing_atmosphere:
      name: Atmósfera de cocción del esmalte
      description: Atmósfera de cocción para la que está diseñado el esmalte.
    glaze_opacity:
      name: Opacidad del esmalte
      description: Grado de transparencia del esmalte después de la cocción.
    glaze_product_form:
      name: Formato del esmalte cerámico
      description: La forma física en la que se provee el producto de glaseado (por
        ejemplo, líquido, polvo seco, concentrado, aerosol).
    glider_avionics_package:
      name: Paquete de aviónica para planeadores
      description: Indica el nivel general de instrumentación de navegación y vuelo
        instalada en el planeador.
    glider_certification_rating:
      name: Calificación de certificación del planeador
      description: Clase de certificación oficial que indica el nivel de seguridad
        y rendimiento del planeador (por ejemplo, EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Configuración del tren de aterrizaje del planeador
      description: Especifica la configuración del tren de aterrizaje utilizada por
        el planeador.
    glider_launch_method:
      name: Método de lanzamiento del planeador
      description: Especifica cómo se lanza normalmente el planeador con ayuda o por
        sí mismo.
    glider_performance_class:
      name: Clase de rendimiento del planeador
      description: Clase o categoría de competición o rendimiento comúnmente utilizada
        para planeadores.
    glitter_application_method:
      name: Método de aplicación de brillantina
      description: Indica la técnica prevista para aplicar o utilizar la brillantina
        de manualidades (por ejemplo, espolvorear o esparcir, mezclar, frotar, aplicar
        sobre adhesivo, aplicar con pincel, rociar, fijar con calor).
    glitter_eco_friendly_claim:
      name: Declaración ecológica sobre la brillantina
      description: Declaración medioambiental/ecológica específica para formulaciones
        de brillantina suelta.
    glitter_effect_type:
      name: Tipo de efecto de la brillantina
      description: Describe el efecto visual de la brillantina o las lentejuelas,
        aparte de la base de color (por ejemplo, holográfico, iridiscente).
    glitter_glue_base_solvent_type:
      name: Tipo de base/solvente del pegamento con purpurina
      description: Describe la base principal del pegamento con brillantina (preocupación
        común de los compradores en cuanto a la limpieza y la compatibilidad de los
        materiales).
    glitter_opacity_coverage:
      name: Opacidad o cobertura de la brillantina
      description: Indica la opacidad del efecto de la brillantina una vez aplicado.
    glitter_use_suitability:
      name: Idoneidad del uso de brillantina
      description: Indica el Context de uso principal previsto o aprobado para el
        polvo de brillantina (por ejemplo, solo para manualidades, de tipo cosmético
        o seguro para el cuerpo o seguro para alimentos).
    glove_armor_placement:
      name: Ubicación de la protección del guante
      description: Indica dónde se encuentra la protección en el guante.
    glove_cuff_length:
      name: Largo del puño del guante
      description: Indica el estilo de cobertura del puño o guantelete de un guante
        de carreras en la muñeca y el antebrazo.
    glove_finger_coverage:
      name: Cobertura de los dedos del guante
      description: Describe el grado de cobertura de los dedos que proporciona el
        guante, desde diseños que cubren todos los dedos hasta diseños sin dedos.
    glove_finger_design:
      name: Diseño de los dedos del guante
      description: Especifica la configuración de los dedos del guante; por ejemplo,
        de cinco dedos o tipo manopla.
    glove_fit_profile:
      name: Perfil de calce del guante
      description: Describe la forma interna y la silueta general del guante para
        que los jugadores puedan elegir la sensación que prefieran.
    glove_insulation:
      name: Aislamiento del guante
      description: Especifica el aislamiento o la construcción térmica del guante
        (por ejemplo, nivel de aislamiento, tecnología de revestimiento o aislamiento,
        o tipo de calefacción).
    glove_palm_material:
      name: Material de la palma del guante
      description: Especifica el material principal utilizado en la palma del guante
        (la superficie de contacto o agarre), que puede diferir del dorso.
    glove_size:
      name: Talla del guante
      description: Indica la talla general de la mano para la que están diseñados
        los guantes para bolsa, a menudo expresada con códigos de talla de ropa o
        tallas juveniles.
    glove_webbing_style:
      name: Estilo de correas de guante
      description: Define el diseño de la red o bolsillo del guante, lo que afecta
        el control del balón, la adecuación de la posición y las preferencias del
        jugador.
    glow_effect:
      name: Efecto de brillo
      description: Indica si las bolas de gel tienen propiedades fosforescentes o
        trazadoras para jugar en condiciones de poca luz.
    glow_plug_connector_type:
      name: Tipo de conector de bujía incandescente
      description: Tipo de terminal o conector eléctrico de la bujía incandescente
        que se utiliza para la conexión al arnés de cableado del vehículo.
    glow_plug_heating_element_type:
      name: Tipo de elemento calefactor de la bujía incandescente
      description: Tipo o tecnología del elemento calefactor utilizado por la bujía
        incandescente.
    glue_application_format:
      name: Formato de aplicación de pegamento
      description: Especifica el formato de aplicador o dosificador utilizado para
        aplicar el pegamento escolar.
    glue_applicator_type:
      name: Tipo de aplicador de pegamento
      description: Especifica el tipo de aplicador o punta dosificadora integrada
        que se utiliza para aplicar el pegamento líquido.
    glue_base_formulation:
      name: Formulación de la base del pegamento
      description: Identifica la formulación química o base principal del pegamento
        líquido para manualidades (para garantizar el rendimiento, la seguridad y
        la limpieza).
    glue_gun_nozzle_style:
      name: Estilo de boquilla de pistola de pegamento
      description: Especifica el estilo físico de la boquilla de una pistola de pegamento,
        lo que afecta la precisión de la aplicación y la cobertura del pegamento.
    glue_safety_standard:
      name: Norma de seguridad del pegamento
      description: Indica si el pegamento no es tóxico y es seguro para los niños
        según el etiquetado y los estándares comunes.
    goal_frame_material:
      name: Material del armazón del arco
      description: Identifica el material de los postes y el armazón del arco, lo
        que afecta al peso, la portabilidad y la resistencia a la intemperie.
    goal_size:
      name: Tamaño del arco
      description: Clasifica un arco de fútbol en grupos comunes de tamaño reglamentario
        o de entrenamiento para una selección más rápida sin depender de las dimensiones
        exactas.
    goal_size_classification:
      name: Clasificación del tamaño del arco
      description: Indica la clase de tamaño estandarizado del arco (p. ej., talla
        reglamentaria completa, juvenil, mini) para que los usuarios puedan seleccionar
        rápidamente el equipo adecuado a su nivel de juego.
    goal_size_standard:
      name: Estándar de tamaño del arco
      description: Indica el estándar oficial o de categoría por edad con el que cumple
        el arco (por ejemplo, reglamento de World Aquatics, 12U).
    goalie_configuration:
      name: Configuración del portero
      description: Indica el número de porteros por equipo configurados en la mesa
        (estilo americano de 3 porteros frente al estilo europeo de 1 portero).
    goalie_playing_surface:
      name: Superficie de juego del portero
      description: Especifica la superficie o el entorno de juego principal para el
        que está diseñado el conjunto de equipamiento del portero de hockey.
    goalkeeper_glove_cut:
      name: Corte de guante de portero
      description: Indica el estilo de confección (corte) de la palma o los dedos
        de los guantes para portero, que influye sobre el calce, la sensación del
        balón y el control.
    goalkeeper_training_aid_type:
      name: Tipo de ayuda para el entrenamiento de porteros
      description: Identifica el estilo de ayuda para el entrenamiento de porteros,
        lo que permite un filtrado preciso.
    goblet_drum_playing_style:
      name: Estilo de ejecución del tambor de copa
      description: Si el instrumento está diseñado principalmente para tocarlo con
        las manos o para usarlo con baquetas o mazos.
    gobo_format:
      name: Formato de gobo
      description: Especifica el tamaño o estándar del gobo que acepta el proyector
        (diámetro y grosor), lo que garantiza la compatibilidad con gobos de repuesto
        o personalizados.
    gobo_root_variety:
      name: Variedad de raíz de gobo
      description: Identifica el cultivo o la variedad específica de raíz de bardana
        (gobo).
    gobo_rotation:
      name: Rotación de gobo
      description: Especifica si el gobo puede girar y qué direccionalidad admite.
    goggle_accessory_type:
      name: Tipo de accesorio para gafas
      description: Clasifica el tipo de accesorio (por ejemplo, funda, caja, correa)
        para que el comprador pueda filtrar el conjunto diverso de productos dentro
        de esta categoría general.
    goggle_features:
      name: Características de las gafas
      description: Enumera las características funcionales o de diseño especiales
        que ofrecen las gafas.
    goggle_fit_design:
      name: Diseño de calce de gafas
      description: Describe cómo deben ajustarse o usarse las gafas, incluida la compatibilidad
        con el uso sobre gafas graduadas (OTG).
    goggle_gasket_material:
      name: Material de la junta de las gafas
      description: Material del sello que se ajusta al rostro, lo que influye sobre
        la comodidad, posibles alergias y la prevención de fugas.
    goggle_integration:
      name: Integración de gafas
      description: Si el casco está diseñado para usarse con gafas o incluye características
        integradas para la sujeción de gafas.
    goggle_lens_shape:
      name: Forma de lentes de gafas
      description: Define el perfil de curvatura de la lente de repuesto, que afecta
        a la distorsión y al campo de visión (por ejemplo, cilíndrica, esférica, tórica).
    goggle_lens_tint:
      name: Tinte de las lentes de las gafas
      description: Define el tono o acabado de las lentes, que afecta la transmisión
        de la luz, la percepción del color y la apariencia estética.
    goggle_strap_material:
      name: Material de la correa de las gafas
      description: Material principal utilizado para la correa de la cabeza, que influye
        sobre la durabilidad y la comodidad.
    golf_accessory_set_purpose:
      name: Conjunto de accesorios de golf
      description: Identifica la utilización o la temática principal prevista del
        conjunto de accesorios de golf.
    golf_bag_style:
      name: Estilo de la bolsa de golf
      description: Indica el diseño principal o el estilo de aplicación de la bolsa
        de golf (por ejemplo, soporte, carrito o tipo staff).
    golf_ball_alignment_design:
      name: Diseño de alineación de la pelota de golf
      description: Especifica cualquier elemento de ayuda visual para alineación integrado,
        impreso o moldeado en la superficie de la bola.
    golf_ball_construction:
      name: Construcción de pelotas de golf
      description: Especifica el número de capas o piezas utilizadas en la construcción
        de la pelota de golf, lo que afecta al efecto, la sensación y la distancia.
    golf_ball_cover_material:
      name: Material de la cubierta de la pelota de golf
      description: Identifica el material de la cubierta exterior de la pelota de
        golf, que influye sobre el efecto, la durabilidad y la sensación al golpearla.
    golf_cart_cover_climate_use:
      name: Uso climático de la funda para carrito de golf
      description: Indica las condiciones climáticas o estacionales principales que
        la funda de almacenamiento está diseñada para soportar.
    golf_cart_enclosure_fit_type:
      name: Tipo de calce de la cubierta del carrito de golf
      description: Especifica si el cerramiento está diseñado para un número de asientos/factor
        de forma específico o si ofrece un ajuste universal/ajustable.
    golf_cart_intended_use:
      name: Uso previsto del carrito de golf
      description: 'Uso principal previsto: caso de uso para el que está diseñado
        o configurado el carrito de golf.'
    golf_club_number:
      name: Número del palo de golf
      description: Identifica el número o la designación específica impresos en el
        palo (por ejemplo, 5, PW, GW).
    golf_club_part_type:
      name: Tipo de pieza de palo de golf
      description: Clasifica los accesorios o componentes del palo de golf en subtipos
        comunes (por ejemplo, adaptador de varilla, casquillo, peso).
    golf_grip_size:
      name: Tamaño de empuñadura de golf
      description: Especifica la categoría de tamaño externo general de la empuñadura
        de golf, lo que indica qué tan gruesa se siente la empuñadura en la mano.
    golf_shoe_spike_type:
      name: Tipo de tacos para zapatos de golf
      description: Identifica el tipo de sistema de tracción utilizado en la suela
        exterior de los zapatos de golf (por ejemplo, con o sin tacos).
    golf_tee_style:
      name: Estilo de tees de golf
      description: Describe el estilo o diseño estructural o funcional del tee de
        golf, que afecta a la altura de la bola, la durabilidad o la reducción del
        efecto.
    golf_training_focus:
      name: Enfoque del entrenamiento de golf
      description: Clasifica el aspecto o la habilidad principal que el producto pretende
        mejorar.
    golf_training_objective:
      name: Objetivo del entrenamiento de golf
      description: Identifica la habilidad o el aspecto principal de golf que la herramienta
        de entrenamiento está diseñada para mejorar.
    gong_profile_type:
      name: Tipo de perfil Gong
      description: Describe el perfil físico del gong de ópera (por ejemplo, centro
        plano vs. centro elevado), lo que influye notablemente en el tono y el estilo
        de interpretación.
    grading_scale:
      name: Escala de calificación
      description: La escala de calificación utilizada en una moneda de inversión
        clasificada (por ejemplo, Sheldon de 1 a 70).
    grading_service:
      name: Servicio de calificación
      description: Servicio externo de calificación o certificación de monedas o billetes
        (por ejemplo, PCGS, NGC).
    graduation_increment:
      name: Incremento de graduación
      description: Especifica la división impresa o grabada más pequeña en la escala
        de calibre de costura (la resolución de las marcas).
    grain_processing_method:
      name: Método de procesamiento de granos
      description: Identifica el método de procesamiento principal aplicado al grano
        (por ejemplo, precocido, laminado, germinado), que afecta al tiempo de cocción,
        a la textura y al valor nutricional.
    grand_piano_soundboard_material:
      name: Material de la caja de resonancia del piano de cola
      description: Material principal utilizado para la caja de resonancia del piano,
        que impacta el sonido y la durabilidad.
    grappling_dummy_pose:
      name: Pose del muñeco de grappling
      description: Describe la posición o postura corporal predeterminada del maniquí,
        que define para qué ejercicios y técnicas es útil.
    grease_application:
      name: Aplicación de grasa
      description: Especifica el componente principal del vehículo o la aplicación
        para la que está destinada la grasa.
    grease_consistency_grade_nlgi:
      name: Grado de consistencia de la grasa (NLGI)
      description: Especifica el número de consistencia NLGI que indica la firmeza
        de la grasa (por ejemplo, NLGI 2 es común para usos múltiples).
    grease_thickener_type:
      name: Tipo de espesante de la grasa
      description: Identifica el sistema espesante o jabonoso utilizado en la formulación
        de la grasa.
    great_highland_bagpipes_blowpipe_valve_type:
      name: Válvula de soplete para gaita escocesa de gran tamaño
      description: Especifica el sistema de válvula antirretorno utilizado en el tubo
        de soplado.
    great_highland_bagpipes_drone_configuration:
      name: Configuración de bordones de la gran gaita de las Highlands
      description: Especifica los tipos de bordones incluidos en el conjunto.
    great_highland_bagpipes_mounting_material:
      name: Material de montaje para la gran gaita de las Highlands
      description: Especifica el material de los adornos de la gaita (por ejemplo,
        níquel plata, imitación de marfil).
    greens_maturity_stage:
      name: Estado de madurez de las hojas verdes
      description: Indica el estado de desarrollo de las hojas verdes en el momento
        de la cosecha.
    greens_preparation_state:
      name: Estado de preparación de las hojas verdes
      description: Describe cómo se procesan o envasan las hojas verdes (por ejemplo,
        prelavadas, picadas, listas para consumir).
    grenade_effect_type:
      name: Tipo de efecto granada
      description: Indica el efecto funcional principal que produce la granada de
        paintball una vez activada (por ejemplo, humo, pintura, aturdimiento).
    grid_unit:
      name: Unidad de cuadrícula
      description: El sistema de medición principal impreso en la alfombrilla (si
        hay una rejilla/escala presente).
    grille_emblem_provision:
      name: Disposición del emblema de la parrilla
      description: Especifica si la parrilla admite un emblema o una insignia OEM
        y cómo.
    grille_mounting_method:
      name: Método de montaje de parrilla
      description: Especifica cómo se instala la parrilla en el vehículo (por ejemplo,
        reemplazo directo vs. inserción o superposición; atornillado frente a clip
        o encaje; perforación vs. ausencia de perforación).
    grille_style:
      name: Estilo de parrilla
      description: Especifica el estilo visual/de diseño de la parrilla del vehículo.
    grip_chalk_form:
      name: Forma de tiza de agarre
      description: Identifica la forma física de la tiza provista o utilizada con
        la bolsa.
    grip_coverage:
      name: Cobertura de agarre
      description: Identifica la presencia y ubicación de elementos de agarre de silicona
        o caucho en el calcetín.
    grip_design:
      name: Diseño de agarre
      description: Especifica la configuración del identificador o de los orificios
        de la placa para facilitar su transporte y ofrecer mayor versatilidad en los
        ejercicios.
    grip_enhancer_effect:
      name: Efecto potenciador del agarre
      description: Describe la principal característica de rendimiento que ofrece
        el producto (por ejemplo, absorción de humedad o acabado de resina adhesiva).
    grip_enhancer_form:
      name: Forma del potenciador de agarre
      description: Identifica la forma física o el formato del producto para mejorar
        el agarre, de modo que los atletas puedan seleccionar el método de aplicación
        adecuado.
    grip_features:
      name: Características de agarre
      description: Indica características de agarre o manipulación incorporadas para
        mejorar el agarre, la comodidad o el control durante el juego.
    grip_material:
      name: Material de agarre
      description: Identifica el material utilizado para la superficie de agarre de
        los pantalones.
    grip_shape:
      name: Forma de empuñadura
      description: Describe la forma o el estilo de la sección transversal de la empuñadura,
        particularmente relevante para las empuñaduras de los putters.
    grip_surface_type:
      name: Tipo de superficie de agarre
      description: Describe el diseño de la superficie de tracción o agarre del pedal,
        que afecta el agarre y la sensación de uso.
    grip_tackiness_level:
      name: Nivel de adherencia de agarre
      description: Evalúa el grado de adherencia de la superficie de agarre, que ayuda
        a los jugadores a elegir entre una sensación seca y un control ultraadherente.
    grip_tape_form:
      name: Forma de la cinta de agarre
      description: Indica la forma de entrega del producto de cinta antideslizante
        (por ejemplo, lámina, rollo, kit de pulverización).
    grip_wax_form:
      name: Forma de cera de agarre
      description: Clasifica la forma física en la que se vende la cera para agarre.
    gripper_coverage:
      name: Cobertura del fortalecedor de agarre
      description: Especifica el tipo de agarre del zapato antideslizante, indicando
        la cobertura de la superficie y la facilidad de extracción.
    grommet_application_material:
      name: Material de aplicación de ojales
      description: Materiales principales en los que se pretenden instalar los ojales
        (por ejemplo, tela, cuero, vinilo, lona).
    grommet_duty_rating:
      name: Clasificación de resistencia de ojales
      description: Indica la resistencia o el tipo de uso previstos del ojal.
    grommet_style:
      name: Estilo de ojales
      description: Estilo de construcción del set de ojales (cómo se ensambla o utiliza).
    grooming_glove_texture_type:
      name: Tipo de textura del guante de aseo
      description: Identifica la textura de superficie principal utilizada para limpieza,
        lo que indica la finalidad, como fregar, pulir o lavar.
    groove_orientation:
      name: Orientación de la ranura
      description: Describe la dirección/diseño de las ranuras o crestas en el instrumento.
    groove_sampler_onboard_effects:
      name: Efectos de incorporación del secuenciador de ritmos
      description: Indica las categorías de efectos de procesamiento integrados disponibles
        en el secuenciador de ritmos (inserción o master), como reverberación, retardo,
        compresión, distorsión, ecualización y filtrado.
    groove_sampler_storage_expansion_type:
      name: Tipo de expansión de almacenamiento del secuenciador de ritmos
      description: Especifica las opciones de almacenamiento extraíbles o expandibles
        compatibles con el secuenciador de ritmos.
    ground_attachment_method:
      name: Método de sujeción al suelo
      description: Describe cómo se fija el arco de pase a la superficie de juego,
        lo que afecta a la estabilidad y la compatibilidad con el tipo de superficie.
    groupset_components_included:
      name: Componentes del grupo incluidos
      description: Enumera los componentes específicos de la transmisión incluidos
        en el grupo para que el cliente entienda el contenido del paquete.
    gt_racing_class:
      name: Clase de carreras GT
      description: Especifica la categoría o clase GT para la que se ha fabricado
        u homologado el coche.
    guard_construction_type:
      name: Tipo de construcción del protector
      description: Ya sea que la protección sea de carcasa rígida, inserto de armadura
        blanda o diseño tipo manga o correa.
    guard_size_measurement_basis:
      name: Base de medición de talla de protección
      description: En qué medida se basa la talla (por ejemplo, circunferencia del
        codo, circunferencia de la muñeca, circunferencia del antebrazo).
    guard_style:
      name: Estilo de protección
      description: Clasifica la construcción o el tipo de protección de cuchillas
        de patines para ayudar al comprador a diferenciar rápidamente entre protectores
        rígidos para caminar, protectores blandos, protectores con resorte y otros
        diseños.
    guava_flesh_color:
      name: Color de la pulpa de la guayaba
      description: Indica el color de la pulpa interna de la guayaba.
    guava_variety:
      name: Variedad de guayaba
      description: Identifica el cultivo o la variedad particular de mercado de la
        guayaba que se vende (por ejemplo, guayaba Apple, Mexican Cream, Thai, rosada,
        sin semillas, blanca).
    guide_material:
      name: Material de la guía
      description: Material utilizado para las guías o inserciones de la línea de
        la caña.
    guide_type:
      name: Tipo de guía
      description: Especifica el tipo de guías instaladas en una caña de pescar; por
        ejemplo, de una sola pata, de rodillo o tipo serpiente.
    guideline_markings:
      name: Marcas de referencia
      description: Tipo de marcas de alineación visual impresas o incrustadas en la
        superficie de la alfombra de lanzamiento para facilitar los ejercicios de
        lanzamiento.
    guiro_scraper_material:
      name: Material del raspador de güiro
      description: Material del raspador o percutor incluido o recomendado para usar
        con el güiro.
    guiro_surface_style:
      name: Estilo de superficie del güiro
      description: Describe el patrón o la geometría de la superficie de reproducción
        que se raspa para producir sonido.
    guitar_body_finish_type:
      name: Tipo de acabado del cuerpo de la guitarra
      description: Especifica el acabado utilizado en el cuerpo de la guitarra.
    guitar_bridge_system_type:
      name: Tipo de sistema de puente de la guitarra
      description: Familia de diseños de sistemas puente/cordal para compatibilidad
        y búsqueda.
    guitar_case_style:
      name: Estilo de estuche de guitarra
      description: Especifica el estilo general de protección o estructura del estuche
        o de la funda para guitarra.
    guitar_humidifier_placement:
      name: Ubicación del humidificador para guitarra
      description: Especifica dónde se debe utilizar o situar el humidificador en
        relación con el instrumento o el entorno.
    guitar_pedal_i_o_configuration:
      name: Configuración de entrada y salida del pedal de guitarra
      description: Indica si el pedal admite enrutamiento de entrada y salida mono
        o estéreo.
    guitar_pedal_output_connector_type:
      name: Tipo de conector de salida del pedal de guitarra
      description: Especifica el tipo de conector de salida de audio que utiliza el
        pedal.
    guitar_slide_finish:
      name: Acabado slide de guitarra
      description: Acabado superficial del slide que afecta el tacto y la fricción
        contra las cuerdas.
    guitar_slide_style:
      name: Estilo de slide para guitarra
      description: Especifica el formato del slide o la barra de acero de la guitarra
        y cómo se lleva o utiliza.
    guitar_stand_type:
      name: Tipo de base para guitarra
      description: Especifica el factor de forma principal de la base para guitarra
        (cómo sostiene o guarda la guitarra).
    guitar_strap_attachment_type:
      name: Tipo de sujeción de la correa de guitarra
      description: Especifica cómo se sujeta la correa a la guitarra (o botones de
        la correa), incluso si utiliza extremos tradicionales o sistemas de liberación
        rápida.
    guitar_strap_end_material:
      name: Material para el extremo de la correa de guitarra
      description: Material utilizado en los extremos o las pestañas de la correa
        (las partes que se fijan a los botones de la correa o a los sistemas de bloqueo
        de la correa).
    guitar_strap_features:
      name: Características de la cuerda para guitarra
      description: Características funcionales destacadas de la correa de guitarra
        aparte del tamaño o material básico (selección múltiple).
    guitar_string_coating:
      name: Recubrimiento de las cuerdas de guitarra
      description: Indica si las cuerdas tienen un recubrimiento protector y, si corresponde,
        el tipo de recubrimiento.
    guitar_string_gauge_type:
      name: Tipo de calibre de cuerdas de guitarra
      description: La categoría de calibre de mercado de un juego de cuerdas de guitarra
        acústica (por ejemplo, extraligero, ligero, medio). A menudo se aproxima por
        el espesor de la primera cuerda; los rangos de calibre exactos pueden variar
        según el fabricante.
    guitar_string_set_gauge_category:
      name: Categoría de calibre del juego de cuerdas de guitarra
      description: Familias de calibres de comercialización comunes para un juego
        de cuerdas de guitarra (normalmente derivadas de la cuerda Mi aguda, o primera
        cuerda).
    guitar_string_winding_type:
      name: Tipo de entorchado de las cuerdas de guitarra
      description: Especifica el estilo de recubrimiento exterior de las cuerdas recubiertas
        del juego.
    guitar_tuning_peg_button_shape:
      name: Forma de botón de las clavijas de la guitarra
      description: La forma o el estilo de la clavija de afinación.
    guitar_tuning_peg_configuration:
      name: Configuración de las clavijas de afinación de la guitarra
      description: Disposición del juego de clavijas en el clavijero.
    guitar_tuning_peg_mounting_style:
      name: Estilo de montaje de las clavijas de la guitarra
      description: Cómo se monta una clavija de afinación en el clavijero (tipo de
        casquillo y método antirrotación).
    guitar_tuning_peg_shaft_type:
      name: Tipo de eje de clavija de afinación de guitarra
      description: Si el eje de la clavija es sólido o dividido y cómo se asegura
        la cuerda.
    guitar_tuning_peg_style:
      name: Estilo de las clavijas de la guitarra
      description: El estilo físico de la clavija o máquina de afinación y el formato
        de montaje utilizados en el clavijero de un instrumento (por ejemplo, engranaje
        sellado vs.engranaje abierto, con bloqueo, eje dividido).
    gum_condition:
      name: Estado de la goma
      description: Condición o estado de la goma del sello en el reverso (por ejemplo,
        nunca con bisagra, con bisagra, sin goma).
    gun_action_type:
      name: Tipo de acción de la pistola
      description: Tipo de mecanismo utilizado para cargar o disparar (por ejemplo,
        acción de cerrojo, acción de palanca).
    gun_operational_status:
      name: Estado de funcionamiento del arma
      description: Indica si el arma de colección está desactivada o no dispara (y
        cómo se presenta).
    gun_type:
      name: Tipo de arma
      description: Identifica el factor de forma general del arma de fuego antigua.
    gusset_material:
      name: Material del refuerzo
      description: Especifica el material utilizado en el forro de la entrepierna
        o refuerzo, que afecta a la transpirabilidad, la higiene y la comodidad.
    gymnastics_discipline:
      name: Disciplina de gimnasia
      description: Especifica la rama de la gimnasia a la que está destinado el producto
        (por ejemplo, artística, rítmica, acrobática).
    hair_extension_texture:
      name: Textura de extensiones de cabello
      description: Describe el patrón de bucle, onda o textura de las extensiones.
    hair_net_style:
      name: Estilo de red para el cabello
      description: Identifica el diseño o estilo de confección de la redecilla para
        el cabello (por ejemplo, bouffant, snood, cubrerrodete).
    hair_quality_grade:
      name: Grado de calidad del pelo
      description: Indica designaciones de calidad u origen del sector para el cabello.
    halter_style:
      name: Estilo de cabestro
      description: Identifica el estilo funcional o de diseño del cabestro (por ejemplo,
        de cuerda, de seguridad, de exhibición), lo que ayuda al comprador a elegir
        un cabestro adecuado para el uso previsto.
    hammock_style:
      name: Estilo de hamaca
      description: Describe el estilo estructural o la construcción de la hamaca.
    hand_and_foot_coverage:
      name: Cobertura para manos y pies
      description: Describe manoplas y botines integrados o desmontables que cubren
        las manos o los pies.
    hand_cymbal_set_configuration:
      name: Configuración del conjunto de platillos de manos
      description: Indica si el producto se vende como un juego de platillos emparejados,
        un solo platillo o un conjunto más grande.
    hand_drum_head_material:
      name: Material para parches de tambores de mano
      description: Material del parche (membrana) utilizado en el tambor de copa.
    hand_exerciser_style:
      name: Estilo de ejercitador para manos
      description: Clasifica el estilo o mecanismo general del ejercitador paar manos.
    hand_guard_backbone_material:
      name: Material de la estructura principal del protector de manos
      description: Material de la columna estructural o estructura principal (si la
        hay), que determina la resistencia y la protección.
    hand_guard_coverage_style:
      name: Estilo de cobertura del protector de manos
      description: Describe la cobertura o el perfil del protector de manos, que afecta
        a la protección contra el viento o los impactos.
    hand_guard_mounting_type:
      name: Tipo de montaje del protector de manos
      description: Especifica cómo se fijan los protectores de manos a la motocicleta
        (por ejemplo, en el extremo del manillar con abrazadera interior vs. solo
        con abrazadera).
    hand_guard_set_configuration:
      name: Configuración del conjunto del protector de manos
      description: Si el producto se vende como un par izquierdo/derecho o para un
        solo lado.
    hand_guard_style:
      name: Estilo de protector de mano
      description: Describe el diseño o estilo de cobertura del protector (por ejemplo,
        cerrado, abierto, completo, ligero, estándar).
    hand_guard_weather_protection:
      name: Protector de manos contra la intemperie
      description: Indica la protección contra la intemperie que ofrecen los protectores
        de manos.
    hand_paddle_strap_type:
      name: Tipo de correa de remo de mano
      description: Especifica el tipo de correa, o la ausencia de correa, que se utiliza
        para sujetar el remo a la mano del usuario.
    hand_percussion_mount_attachment_mechanism:
      name: Mecanismo de fijación del soporte de percusión manual
      description: Especifica cómo se fija el soporte a un pedestal, estante u otro
        accesorio (por ejemplo, mediante abrazadera o montaje en varilla).
    hand_percussion_mounting_handling:
      name: Montaje o manejo de percusión manual
      description: Si el instrumento se sostiene con la mano, se lleva puesto, va
        montado o se dispone sobre una mesa o en el suelo durante su uso habitual.
    hand_percussion_pitch_type:
      name: Tipo de tono de percusión manual
      description: Indica si el instrumento produce un tono definido (afinable, con
        notas) o un tono indefinido.
    hand_percussion_playing_method:
      name: Método para tocar percusión manual
      description: Cómo se suele tocar el instrumento para producir sonido (por ejemplo,
        agitándolo vs. raspándolo).
    hand_percussion_set_configuration:
      name: Configuración del conjunto de percusión manual
      description: Si el producto es un solo instrumento, un par o un conjunto de
        varias piezas.
    hand_percussion_size_class:
      name: Clase de tamaño para percusión manual
      description: Categoría de tamaño general del instrumento cuando no se proporciona
        una medición precisa o para facilitar el filtrado.
    hand_sewing_needle_point_type:
      name: Tipo de punta de aguja para coser a mano
      description: Forma y estilo de la punta de la aguja de coser a mano que se utiliza
        para penetrar diferentes materiales (por ejemplo, tela tejida, punto, cuero)
        o hilados.
    hand_support_level:
      name: Nivel de soporte de la mano
      description: Especifica el grado de ayuda o compresión que proporciona el guante,
        la venda o la correa.
    hand_support_size:
      name: Tipo de soporte de la mano
      description: Talla declarada por el fabricante del guante, de la correa o del
        vendaje (XS-XXL o talla única).
    handball_ball_type:
      name: Tipo de pelota de balonmano
      description: Indica la categoría de uso prevista de la pelota de balonmano,
        como partido, entrenamiento o playa.
    handball_playing_surface:
      name: Superficie de juego de balonmano
      description: Indica las superficies de juego para las que está optimizada la
        pelota de balonmano.
    handball_target_type:
      name: Tipo de objetivo del balonmano
      description: Especifica el estilo o diseño del blanco de tiro destinado a la
        práctica de balonmano en equipo.
    handbrake_actuation_type:
      name: Tipo de accionamiento del freno de mano
      description: Especifica cómo se acciona el freno de estacionamiento.
    handbrake_orientation:
      name: Orientación del freno de mano
      description: Indica si el freno de mano está diseñado para vehículos con volante
        a la izquierda o a la derecha, o si es universal.
    handgun_grip_material:
      name: Material de la empuñadura de la pistola
      description: Material principal de la empuñadura o las cachas de la pistola.
    handle_configuration:
      name: Configuración del mango
      description: Describe el estilo estructural del asa de wakeboard (por ejemplo,
        simple, doble, Deep-V, T-wrap) para que el comprador pueda relacionarlo con
        la habilidad, los trucos o el tipo de tabla.
    handle_ergonomics:
      name: Ergonomía del asa
      description: Describe las características ergonómicas del asa destinadas a mejorar
        la comodidad y el control.
    handle_grip_material:
      name: Material de la empuñadura del mango
      description: Especifica el material utilizado en la superficie de agarre del
        asa, que afecta a la comodidad y la tracción, especialmente en condiciones
        de humedad.
    handle_grip_type:
      name: Tipo de empuñadura del mango
      description: Especifica el revestimiento, material o estilo de superficie de
        la empuñadura del asa diseñado para mejorar la comodidad y el control.
    handle_shape:
      name: Forma del asa
      description: Forma o perfil transversal del asa.
    handlebar_design:
      name: Diseño del manillar
      description: Especifica el tipo de manillares de la escaladora de pedales; por
        ejemplo, ninguno, fijo, de altura ajustable, plegable o con manijas de banda
        de resistencia.
    handlebar_type:
      name: Tipo de manillar
      description: Identifica el estilo de manillares instalados en la bicicleta,
        lo que influye sobre la postura de conducción, el control y la comodidad.
    handslide_bore_type:
      name: Tipo de orificio de la vara deslizante
      description: Especifica si el trombón bajo utiliza una vara de un solo orificio
        o de doble orificio.
    handwear_cuff_style:
      name: Estilo de puño para guantes
      description: Describe el estilo de confección del puño o de la muñeca de los
        guantes o manoplas, que afecta la cobertura y el ajuste.
    handwear_insulation_material:
      name: Material aislante para guantes
      description: Identifica el material aislante o de revestimiento utilizado en
        el interior de los guantes o las manoplas.
    handwear_size:
      name: Tamaño de las prendas de manos
      description: Especifica la talla de los guantes u otros accesorios para las
        manos para garantizar un ajuste adecuado.
    hang_glider_design:
      name: Diseño de ala delta
      description: Clasifica el estilo estructural del ala delta (por ejemplo, ala
        flexible, ala rígida, motorizado).
    hanger_thread_size:
      name: Tamaño de rosca del indicador colgante de pique
      description: Indica el estándar o tamaño de rosca de rosca utilizado para montar
        el indicador colgante de pique en soportes de banco o alarmas de pique, lo
        que garantiza la compatibilidad.
    hanging_suspension_method:
      name: Método de suspensión colgante
      description: Define los accesorios o el sistema principales utilizados para
        suspender el columpio (por ejemplo, cuerda, cadena, armazón).
    hardtop_finish_type:
      name: Tipo de acabado de techo rígido
      description: Especifica el estado del acabado exterior del techo rígido (por
        ejemplo, imprimado o pintado), lo que influye sobre la facilidad de instalación
        y la apariencia.
    hardtop_shell_material:
      name: Material de la carcasa del techo rígido
      description: Especifica el material principal de la carcasa rígida del techo
        de un vehículo (no cualquier tela de cubierta); por ejemplo, fibra de vidrio
        o aluminio.
    hardtop_window_configuration:
      name: Configuración de ventanas de techo rígido
      description: Describe qué ventanas se incluyen con el techo rígido y su configuración.
    harmonica_comb_material:
      name: Material del peine para la armónica
      description: Material utilizado para el peine de la armónica (cuerpo de la cámara
        de aire).
    harmonica_cover_plate_finish:
      name: Acabado de las placas de cubierta de la armónica
      description: Especifica el acabado o recubrimiento de las placas de cubierta
        de la armónica.
    harmonica_cover_plate_material:
      name: Material de las placas de cubierta de la armónica
      description: Material utilizado para las placas de cubierta exteriores.
    harmonica_finish:
      name: Acabado de la armónica
      description: Acabado superficial de las placas de cubierta y cuerpo de la armónica.
    harmonica_included_accessories:
      name: Accesorios incluidos de la armónica
      description: Indica qué accesorios se incluyen con la armónica.
    harmonica_note_range:
      name: Rango de notas de la armónica
      description: Clasificación del registro instrumental utilizado en contextos
        de orquesta (p. ej., bajo, barítono, tenor).
    harmonica_reed_plate_material:
      name: Material de las placas de lengüeta de la armónica
      description: Material utilizado para las placas de lengüeta (p. ej., latón,
        acero inoxidable, aluminio).
    harmonica_system_type:
      name: Sistema o tipo de armónica
      description: Identifica el sistema o factor de forma de la armónica orquestal
        (p. ej., acorde, bajo, barítono, polifonía).
    harmonica_tuning_system:
      name: Sistema de afinación de la armónica
      description: Especifica el diseño o sistema de afinación utilizado por la armónica
        (por ejemplo, afinación Richter, Solo u Orchestra).
    harness_shell_type:
      name: Tipo de carcasa de arnés
      description: Describe la rigidez de la estructura de la carcasa del arnés (por
        ejemplo, blanda, rígida, híbrida).
    harness_style:
      name: Estilo del arnés
      description: Define el estilo o diseño estructural del arnés; por ejemplo, de
        cintura, de asiento, de pecho o chaleco, tipo cinturón, tipo pantalones cortos
        de surf o híbrido.
    harness_type:
      name: Tipo de arnés
      description: Clasifica el estilo estructural del arnés de escalada; por ejemplo,
        de asiento, de cuerpo completo o de pecho.
    harp_action_type:
      name: Tipo de acción del arpa
      description: Mecanismo principal utilizado para cambiar el tono o las alteraciones
        en el arpa.
    harp_finish:
      name: Acabado del arpa
      description: Acabado superficial del cuerpo del arpa (por ejemplo, natural,
        teñido, pintado, lacado).
    harp_included_accessories:
      name: Accesorios incluidos del arpa
      description: Enumera los accesorios incluidos con la compra del arpa de pedales.
    harvest_method:
      name: Método de cosecha
      description: Indica si el marisco fue capturado en estado salvaje, criado en
        piscifactoría u obtenido mediante otro método.
    harvest_stage:
      name: Etapa de cosecha
      description: Indica la etapa de crecimiento en la que se cosechó la rúcula,
        p. ej., microbrote, hoja tierna o manojo maduro.
    hat_style:
      name: Estilo del sombrero
      description: La construcción o el estilo del sombrero de fiesta (por ejemplo,
        sombrero cónico, corona, sombrero de copa, visera) para reflejar cómo se ve
        el artículo en su esencia.
    hazard_signal_mode:
      name: Modo de señal de peligro
      description: Patrones o modos de iluminación seleccionables para bengalas de
        carretera LED o electrónicas.
    head_configuration:
      name: Configuración de la cabeza
      description: Especifica si la cabeza del hacha incluye pala, martillo, ambos
        o ninguno, lo que afecta directamente a su funcionalidad en hielo y terrenos
        mixtos.
    head_material:
      name: Material del parche
      description: Material del parche incluido con el quinto.
    head_movement_type:
      name: Tipo de movimiento del cabezal
      description: Capacidad de movimiento direccional del cabezal del bípode o soporte
        (por ejemplo, giro panorámico, inclinación, nivelación lateral).
    head_side:
      name: Lado de la cabeza
      description: Especifica si el parche del tambor está destinado al lado de golpeo,
        al lado resonante (frontal) o a cualquiera de los dos.
    head_weight_style:
      name: Estilo de peso en la cabeza
      description: Identifica la distribución del peso en la cabeza de la mosca, lo
        que afecta la velocidad de hundimiento y la presentación.
    headband_embellishment:
      name: Adorno para diadema
      description: Identifica los elementos decorativos que lleva la diadema (por
        ejemplo, lazos, perlas, cristales, orejas de animales).
    headboard_style:
      name: Estilo de cabecero
      description: Describe el diseño o estilo de construcción del cabecero que viene
        con la cama.
    headgear_strap_configuration:
      name: Configuración de correas del casco
      description: Indica el número de correas utilizadas para sujetar el casco de
        lucha libre.
    headjoint_crown_style:
      name: Estilo de corona de la cabeza de la flauta
      description: Especifica el estilo o diseño de la corona (tapa de extremo) de
        la cabeza de la flauta, lo que puede afectar la estética y el peso o equilibrio.
    headjoint_pitch_standard:
      name: Estándar de afinación de la cabeza de la flauta
      description: Indica el estándar de ajuste de diseño de la cabeza del instrumento
        (por ejemplo, La=440 vs. La=442).
    headliner_product_form:
      name: Forma del revestimiento de techo
      description: Especifica si el producto es un conjunto completo de revestimiento
        de techo moldeado, una tela de repuesto o un componente de reparación o acabado.
    headrest_mount_attachment_method:
      name: Método de fijación del soporte del reposacabezas
      description: Especifica cómo se fija el soporte al reposacabezas o a los postes
        del asiento.
    headrest_provision:
      name: Provisión de reposacabezas
      description: Indica si se incluyen los reposacabezas o si existen puntos de
        montaje para ellos.
    headset_standard:
      name: Estándar de auriculares
      description: Tipo de interfaz entre el tubo de dirección y dirección utilizada
        por el cuadro.
    headstall_style:
      name: Estilo de cabezada
      description: Clasifica el diseño estructural o la configuración de oreja y frontalera
        de la cabezada.
    headwear_intended_use:
      name: Uso previsto de los sombreros
      description: Indica el propósito o contexto principal para usar el turbante
        (por ejemplo, pérdida de cabello por quimioterapia, natación, motivos religiosos).
    hearing_enhancer_style:
      name: Estilo amplificador de audición
      description: Describe el formato físico del dispositivo para que los usuarios
        puedan elegir entre diseños supraaurales, intraaurales y detrás de la cabeza,
        entre otros.
    heart_rate_monitoring_method:
      name: Método de monitorización del ritmo cardíaco
      description: Describe cómo la máquina registra los datos de ritmo cardíaco durante
        los entrenamientos.
    heart_rate_sensing_technology:
      name: Tecnología de detección de ritmo cardíaco
      description: Especifica el método de medición fisiológica que utiliza el monitor
        para detectar el ritmo cardíaco (por ejemplo, ECG eléctrico frente a PPG óptico).
    heart_rate_sensor_placement:
      name: Ubicación del sensor de ritmo cardíaco
      description: Indica dónde se lleva o se coloca el sensor (en el cuerpo o en
        la bicicleta), lo que afecta la comodidad y la precisión de la medición.
    heat_retention_technology:
      name: Tecnología de retención del calor
      description: Describe cualquier tecnología, recubrimiento o material que mejore
        la sudoración o la actividad térmica en los ceñidores diseñados para el entrenamiento
        (por ejemplo, el efecto sauna del neopreno).
    heated_glass_feature:
      name: Función de vidrio térmico
      description: Indica si el vidrio de la ventana incluye elementos eléctricos
        integrados como una rejilla de desempañado trasero o una antena integrada.
    heater_control_actuation_method:
      name: Método de accionamiento del control del calentador
      description: Especifica cómo el control del calefactor o sistema de climatización
        acciona la unidad de climatización del vehículo (por ejemplo, mediante cable,
        vacío o señalización electrónica).
    heater_control_electrical_connector_type:
      name: Tipo de conector eléctrico para el control del calentador
      description: Especifica el tipo de conector o interfaz eléctrica que utiliza
        el conjunto de control del calentador (por ejemplo, tipo de cable flexible
        vs. tipo de enchufe).
    heating_technology:
      name: Tecnología de calefacción
      description: Identifica el mecanismo de calentamiento principal que utiliza
        el vaporizador para convertir el material en vapor.
    heel_shape:
      name: Forma del tacón
      description: Especifica el estilo geométrico o la silueta del tacón, lo que
        ayuda al comprador a filtrar según sus preferencias de aspecto estructural
        y estabilidad (por ejemplo, tacón de aguja frente a tacón de bloque).
    helicopter_mission_type:
      name: Tipo de misión del helicóptero
      description: Uso o función principal previstos del helicóptero.
    helicopter_rotor_configuration:
      name: Configuración del rotor del helicóptero
      description: Especifica el diseño del sistema de rotor del helicóptero (disposición
        del rotor principal y rotor de cola); por ejemplo, rotor principal único con
        rotor de cola, coaxial, en tándem, o rotores entrelazados.
    helmet_accessory_type:
      name: Tipo de accesorio del casco
      description: Identifica el tipo específico de pieza o accesorio para casco de
        bicicleta para que el comprador pueda localizar inmediatamente el artículo
        correcto.
    helmet_audio_connector_type:
      name: Tipo de conector de audio para casco
      description: Especifica el tipo de conector de audio de la aeronave utilizado
        por el cable de comunicaciones del casco, si lo tiene.
    helmet_communication_system_readiness:
      name: Preparación del sistema de comunicación del casco
      description: Si el casco está diseñado para aceptar un sistema de comunicación
        por intercomunicación o Bluetooth.
    helmet_construction_type:
      name: Tipo de construcción del casco
      description: Describe el estilo de construcción de la carcasa y el forro del
        casco (por ejemplo, espuma, carcasa rígida, híbrido).
    helmet_fit_head_shape:
      name: Calce del casco (forma de la cabeza)
      description: El perfil de ajuste interno está diseñado para diferentes formas
        de cabezas.
    helmet_interior_liner_type:
      name: Tipo de revestimiento interior del casco
      description: Tipo de forro de confort y si es extraíble o lavable.
    helmet_liner_material:
      name: Material del forro del casco
      description: Especifica el material del forro o revestimiento interior que proporciona
        comodidad y absorción de impactos.
    helmet_retention_closure_type:
      name: Tipo de cierre de retención del casco
      description: Especifica el mecanismo de cierre o retención de la correa de barbilla
        del casco (por ejemplo, doble anilla en D, trinquete micrométrico).
    helmet_safety_certification:
      name: Certificación de seguridad del casco
      description: Enumera las normas de seguridad o certificaciones que cumple el
        casco.
    helmet_safety_certification_standard:
      name: Estándar de certificación de seguridad del casco
      description: Normas de seguridad y homologación que el casco de motocicleta
        está certificado para cumplir.
    helmet_shell_material:
      name: Material de la carcasa del casco
      description: Material o construcción principal de la carcasa exterior del casco.
    helmet_size_system:
      name: Sistema de tamaños de cascos
      description: Sistema de tallas para expresar el tamaño del casco.
    helmet_sun_visor_type:
      name: Tipo de visor solar para casco
      description: Especifica si el casco incluye un visor solar desplegable interno,
        un escudo externo tintado, ambos o ninguno.
    helmet_vehicle_fit:
      name: Compatibilidad del casco con el vehículo
      description: Tipo de vehículo/uso para el que está diseñado el casco.
    helmet_ventilation_adjustability:
      name: Capacidad de ajuste de la ventilación del casco
      description: Especifica cómo el conductor puede controlar la ventilación del
        casco.
    helmet_ventilation_configuration:
      name: Configuración de ventilación del casco
      description: Describe el diseño de ventilación del casco y su capacidad de ajuste
        (p. ej., ventilación en barbilla, ventilaciones frontales o superiores, ventilaciones
        que se pueden cerrar).
    helmet_visor_peak_adjustability:
      name: Ajuste del visor del casco
      description: Si el visor del casco para todo terreno es ajustable o extraíble.
    helmet_visor_shield_optical_features:
      name: Características ópticas del visor (protector) del casco
      description: Características ópticas y de compatibilidad de la pantalla facial
        o el visor principal.
    helmet_visor_shield_type:
      name: Tipo de visor o pantalla del casco
      description: El casco incluye una configuración de pantalla facial y visor principal.
    hem_style:
      name: Estilo de dobladillo
      description: Identifica el estilo de acabado de la abertura de la pierna, como
        prolijo, enrollado o sin rematar, que influye notablemente sobre el aspecto
        de la prenda.
    hemisphere_compatibility:
      name: Compatibilidad hemisférica
      description: Especifica para qué hemisferio está diseñado el mapa estelar basándose
        en las constelaciones visibles.
    hemline_style:
      name: Estilo de dobladillo
      description: Define el corte o diseño del borde inferior del vestido.
    herbal_infusion_function:
      name: Funciones de la infusión de hierbas
      description: Indica el principal beneficio funcional o de bienestar para el
        cual se comercializa la infusión.
    hex_size:
      name: Tamaño hexagonal
      description: Tamaño hexagonal de la llave necesaria para instalar o retirar
        la bujía incandescente.
    hi_hat_pair_type:
      name: Tipo de par de platillos hi-hat
      description: Indica si la publicación es para un componente de platillo superior
        e inferior coincidente o un componente de platillo individual.
    hi_hat_sound_character:
      name: Carácter de sonido de los platillos hi-hat
      description: Describe el perfil tonal general para ayudar a los compradores
        a filtrar según el sonido que desean.
    high_visibility_class:
      name: Clase de alta visibilidad
      description: Especifica el nivel de clasificación de visibilidad ANSI/ISEA 107
        de la prenda.
    highback_style:
      name: Estilo de respaldo alto
      description: Describe el estilo/diseño estructural del respaldo alto que influye
        en las características de la conducción.
    hitch_ball_diameter:
      name: Diámetro de la bola de enganche
      description: Diámetro de la cabeza de la bola de enganche (esfera) que se engancha
        con un acoplador de remolque (por ejemplo, 1 7/8 pulg., 2 pulg., 2 5/16 pulg.,
        50 mm).
    hitch_ball_mounting_style:
      name: Estilo de montaje de la bola de enganche
      description: Si la bola de enganche es una bola estándar montada con tuerca
        o de estilo fijo o prensado para cabezales de enganche específicos, o si cuenta
        con accesorios integrados.
    hobby_horse_handle_type:
      name: Tipo de mango del caballito
      description: Especifica la construcción de la empuñadura o el mango utilizados
        para sujetar o dirigir el caballito.
    hobby_horse_sound_features:
      name: Características de sonido del caballo
      description: Indica si el caballito incluye efectos de sonido y de qué tipo.
    hockey_goal_type:
      name: Arco de hockey
      description: Especifica el estilo o caso de uso previsto del arco de hockey
        (p. ej., hielo reglamentario, calle, mini).
    hockey_size_category:
      name: Categoría de tamaño de hockey
      description: Indica el segmento de tamaño de equipamiento estandarizado al que
        se ajusta la pieza (juvenil, júnior, intermedio, sénior).
    hockey_size_segment:
      name: Segmento de tamaño de hockey
      description: Especifica el segmento de talla estandarizado del equipo de hockey
        que determina la dimensión general y el ajuste de la protección.
    hold_surface_texture:
      name: Textura de la superficie de sujeción
      description: Describe la aspereza o el acabado táctil de la superficie de agarre.
    home_decor_sewing_pattern_project_type:
      name: Tipo de proyecto de patrón de costura para decoración del hogar
      description: Indica el tipo de artículo de decoración para el hogar que se puede
        confeccionar con el patrón de costura (por ejemplo, funda de almohada, cortina,
        camino de mesa).
    homologation_rule_set:
      name: Homologación o reglamento
      description: Especifica el organismo regulador o el conjunto de normas con las
        que cumple el auto (cuando corresponda).
    honey_form:
      name: Forma de la miel
      description: Especifica la forma física o la presentación del producto de miel.
    honey_processing_method:
      name: Método de procesamiento de miel
      description: Indica cómo se trató o procesó la miel antes del embalaje.
    honey_variety:
      name: Variedad de miel
      description: Identifica el origen botánico o floral de la miel, ya sea monofloral
        o polifloral, lo cual afecta directamente el sabor, el color y el precio.
    hood_configuration:
      name: Configuración de la capucha
      description: Describe el diseño de la capucha y sus características de ajuste.
    hood_design:
      name: Diseño de la capucha
      description: Identifica la presencia y el estilo de la capucha en la prenda.
    hood_style:
      name: Estilo de capucha
      description: Indica la presencia y el estilo de una capucha en la prenda.
    hood_type:
      name: Tipo de capucha
      description: Indica las características de diseño especiales de la capucha de
        la prenda.
    hook_and_eye_size_hook_number:
      name: Tamaño del broche de gancho y ojo (número de gancho)
      description: El tamaño o la numeración estandarizados de los ganchos y ojos
        (cuando corresponda) que se utilizan en el embalaje para indicar el tamaño
        general de los ganchos y ojos.
    hook_and_loop_fastener_duty_rating:
      name: Clasificación de resistencia de los sujetadores de velcro
      description: Indica el nivel de fuerza o resistencia previsto del sujetador
        de velcro.
    hook_and_loop_fastener_format:
      name: Formato del sujetador de velcro
      description: Especifica la forma física o el formato de embalaje del producto
        de sujetador de velcro (por ejemplo, rollo o cinta, puntos, tiras).
    hook_and_loop_fastener_side:
      name: Lado del cierre de velcro
      description: Especifica si el producto incluye solo el lado del gancho, solo
        el lado del lazo o un conjunto que contiene ambos lados.
    hook_coating_finish:
      name: Recubrimiento o acabado del anzuelo
      description: Variación de superficie o revestimiento aplicado al anzuelo para
        la resistencia a la corrosión, discreción visual o color (por ejemplo, níquel
        negro, estaño brillante).
    hook_configuration:
      name: Configuración del anzuelo
      description: Describe la presencia y el estilo de los anzuelos provistos con
        el señuelo.
    hook_eye_style:
      name: Estilo del ojo del anzuelo
      description: Especifica la forma o la orientación del ojo del anzuelo, lo que
        afecta a la forma en que se ata o se sujeta el anzuelo.
    hook_eye_type:
      name: Tipo de ojo del anzuelo
      description: Especifica el diseño del ojo del anzuelo, lo que influye en la
        elección del nudo y el montaje.
    hook_loop_format:
      name: Formato de velcro
      description: Especifica el factor de forma física del cierre de velcro para
        coser.
    hook_loop_side:
      name: Lado de cierre de gancho y bucle
      description: Especifica si el producto es del lado del gancho, del lado del
        bucle o un conjunto de gancho y bucle combinado.
    hook_material:
      name: Material del gancho
      description: Identifica el material utilizado específicamente para el garfio
        o la cabeza, un factor clave para la resistencia y la protección contra la
        corrosión al utilizarse en agua salada.
    hook_organizer_style:
      name: Estilo de organizador de anzuelo
      description: El estilo físico o formato del organizador de anzuelos (por ejemplo,
        caja, rollo o bolsa), utilizado para facilitar la búsqueda y el filtrado por
        tipo de organizador.
    hook_point_configuration:
      name: Configuración de la punta del anzuelo
      description: Indica si el anzuelo tiene dos puntas (doble) o tres puntas (triple).
    hook_point_type:
      name: Tipo de punta del anzuelo
      description: Describe el afilado o la forma de un anzuelo de pesca, que afecta
        la penetración y la capacidad de sujeción.
    hook_shank_length:
      name: Largo del vástago del anzuelo
      description: Indica la clasificación de longitud relativa del vástago del anzuelo
        (por ejemplo, corto, largo) para una comparación visual y funcional rápida.
    hooks_eyes_attachment_method:
      name: Método de fijación con ganchos y ojos
      description: Cómo se fijan los ganchos y ojos a la prenda o al proyecto.
    hop_up_type:
      name: Tipo hop-up
      description: Define el sistema de efecto hop-up utilizado para impartir efecto
        de retroceso a las bolas de airsoft y así lograr mayor alcance y precisión.
    horse_blanket_type:
      name: Tipo manta de caballo
      description: Especifica el estilo principal o el uso previsto de la manta o
        sábana para caballos.
    horse_brush_type:
      name: Tipo cepillo para caballos
      description: Clasifica el cepillo según su estilo de aseo específico o su propósito
        previsto, lo que permite al cliente filtrar sin fragmentar la jerarquía de
        categorías.
    horse_care_purpose:
      name: Propósito del cuidado del caballo
      description: La función principal del producto reside en el cuidado de los caballos,
        abarcando la salud, el aseo y las necesidades de manejo.
    horse_feed_stage:
      name: Etapa de alimentación del caballo
      description: Indica la etapa de vida o el estado fisiológico del caballo para
        el que se formula el pienso.
    horse_groomer_type:
      name: Tipo de recortadora para caballos
      description: Clasifica el estilo de la recortadora para que el comprador pueda
        localizar rápidamente la herramienta específica que necesita.
    horse_leg_protection_type:
      name: Tipo de protección para patas de caballo
      description: Clasifica el estilo o la función particulares de la bota, la venda
        o el vendaje equino.
    horse_model_breed:
      name: Raza de modelo de caballo
      description: Especifica la raza de caballo representada por el modelo a escala
        (si corresponde).
    hosiery_toe_style:
      name: Estilo de puntera de medias
      description: Define la confección de la zona de la puntera de las medias, importante
        para su durabilidad y la compatibilidad con el calzado de puntera abierta.
    hot_air_balloon_basket_type:
      name: Tipo de canasta de globo aerostático
      description: Especifica la configuración o el estilo principal de la canasta
        (por ejemplo, deportiva estándar, comercial de alta capacidad, compartimentada,
        accesible o con puerta) que se utiliza para el embarque y el funcionamiento
        previsto.
    hot_air_balloon_burner_type:
      name: Tipo de quemador del globo aerostático
      description: Tipo o configuración del sistema de quemador instalado en el globo.
    hot_air_balloon_envelope_material:
      name: Material para la envoltura de globos aerostáticos
      description: Tejido o material principal utilizado para la envoltura del globo
        (vela).
    hotfix_application_tool:
      name: Herramienta de aplicación de termoadhesivos
      description: Herramienta o fuente de calor recomendada para aplicar diamantes
        de imitación termoadhesivos.
    hub_axle_type:
      name: Tipo de eje de cubo
      description: Identifica el sistema de interfaz o sujeción de eje para el que
        está diseñado el buje (liberación rápida, eje pasante, etc.).
    hub_motor_type:
      name: Tipo de motor de cubo
      description: Describe el estilo de construcción del motor de cubo (con engranajes,
        de transmisión directa, con escobillas, sin escobillas) para informar al comprador
        sobre las características de par, peso y eficiencia.
    hula_hoop_construction_type:
      name: Tipo de construcción del aro de hula-hula
      description: Describe cómo se construye o ensambla el aro.
    hula_hoop_features:
      name: Características del aro de hula-hula
      description: Destaca las características funcionales o de diseño más relevantes
        del aro de hula-hula.
    hull_design:
      name: Diseño del casco
      description: Describe la forma del casco que afecta las características de rendimiento
        y manipulación.
    hull_type:
      name: Tipo de casco
      description: Describe la forma del casco que influye sobre el rendimiento y
        la estabilidad.
    humidifier_refill_medium_type:
      name: Tipo de medio de recarga del humidificador
      description: Identifica el medio de retención de humedad y recarga utilizado
        por el humidificador de estuche (lo que se humedece o se reemplaza).
    humidifier_refill_method:
      name: Método de recarga del humidificador
      description: Describe cómo se recarga el humidificador con humedad o cómo se
        reemplaza.
    humidifying_medium:
      name: Medio humidificador
      description: Identifica el elemento o medio humidificador utilizado por el producto
        (lo que se humedece o activa).
    hummus_base_ingredient:
      name: Ingrediente base del hummus
      description: Identifica la legumbre o verdura principal que se utiliza para
        elaborar el hummus.
    hunting_call_type:
      name: Llamador de caza
      description: Clasifica el estilo o mecanismo de funcionamiento principal del
        llamado (por ejemplo, de soplado, electrónico, tipo caja) para que los cazadores
        puedan elegir rápidamente el formato que mejor se adapte a sus necesidades
        y su nivel de habilidad.
    hunting_dog_collar_function:
      name: Función del collar para perros de caza
      description: Clasifica el estilo funcional o propósito principal del collar,
        lo que ayuda al comprador a filtrar el producto para funciones como seguimiento,
        entrenamiento, visibilidad o uso estándar.
    hvac_control_functions:
      name: Funciones de control de climatización
      description: Indica qué funciones de climatización, descongelación o flujo de
        aire controla la unidad (mecánica o electrónica).
    hybrid_drivetrain_configuration:
      name: Configuración de transmisión híbrida
      description: Indica la arquitectura del sistema PHEV y describe cómo el o los
        motores eléctricos y el motor de combustión proporcionan la propulsión.
    hybrid_system_type:
      name: Tipo de sistema híbrido
      description: Clasifica la arquitectura de hibridación utilizada por el vehículo.
    hybrid_truck_cab_type:
      name: Tipo de cabina de camión híbrido
      description: Especifica la configuración de la cabina del camión, que afecta
        la capacidad de asientos y el espacio interior.
    hydration_bag_features:
      name: Características de las bolsas de hidratación
      description: Destaca las características de diseño o funcionales más destacadas,
        específicas de las bolsas de hidratación.
    hydration_belt_features:
      name: Características del cinturón de hidratación
      description: Enumera las funciones integradas más destacadas que mejoran la
        usabilidad, seguridad o comodidad del cinturón de hidratación.
    hydration_bladder_compatibility:
      name: Compatibilidad con bolsas de hidratación
      description: Indica si el chaleco incluye o ayuda a un sistema de bolsa de hidratación.
    hydration_mouthpiece_style:
      name: Estilo de boquilla de hidratación
      description: Especifica el diseño o el estilo funcional de la boquilla o válvula
        de un sistema de hidratación, lo que ayuda al comprador a elegir su interfaz
        de bebida preferida y garantizar la compatibilidad.
    hydration_pack_style:
      name: Estilo de paquete de hidratación
      description: Especifica el estilo estructural del paquete de hidratación (por
        ejemplo, mochila o chaleco) para facilitar la elección según el calce y el
        uso previsto.
    hydration_system_insulation:
      name: Aislamiento del sistema de hidratación
      description: Indica si el depósito o el tubo para beber están aislados para
        ayudar a mantener el líquido caliente o frío.
    hydration_valve_type:
      name: Tipo de válvula de hidratación
      description: Identifica el estilo de válvula o boquilla para beber provista
        con el sistema o la botella, y abarca los diseños comunes de válvulas de mordida
        y boquillas de alto flujo.
    hydraulic_fluid_type:
      name: Tipo de fluido hidráulico
      description: Especifica el tipo de líquido de frenos que debe utilizar la palanca
        de freno hidráulica de una bicicleta. Esta información es fundamental para
        el mantenimiento y la seguridad.
    hydrogenation_level:
      name: Nivel de hidrogenación
      description: Indica si la grasa no está hidrogenada, está parcialmente hidrogenada
        o está totalmente hidrogenada, lo que influye sobre el contenido de grasas
        trans y el rendimiento de la cocción.
    hydrophobicity_level:
      name: Nivel de hidrofobicidad
      description: Indica el grado de repelencia o rendimiento de formación de gotas
        de agua promocionado por el producto.
    ice_cream_format:
      name: Formato de helado
      description: Describe la forma física o presentación del producto de helado
        (por ejemplo, pote, barra, mochi).
    ice_skate_sharpener_type:
      name: Tipo de afilador de patines de hielo
      description: Clasifica el diseño o formato general del afilador (piedra de mano,
        máquina eléctrica, plantilla, etc.).
    ice_temperature_suitability:
      name: Idoneidad de la temperatura del hielo
      description: Indica el rango de temperatura del hielo para el que está formulada
        la cera para palos de hockey, lo que afecta el rendimiento y las propiedades
        repelentes de nieve.
    icing_sugar_variety:
      name: Variedad de azúcar en polvo
      description: Clasifica la formulación o el tipo funcional del azúcar en polvo
        (por ejemplo, fondant, azúcar antihumedad no fundente, coloreado, saborizado).
    ignition_coil_configuration:
      name: Configuración de la bobina de encendido
      description: Especifica el formato de la bobina de encendido (bobina simple
        o bobina sobre bujía, paquete de bobinas multiterminal según la cantidad de
        cilindros, riel o casete de bobinas o estilo distribuidor).
    ignition_lead_compliance_standard:
      name: Estándar de cumplimiento potencial de los cables de encendido
      description: Norma o certificación industrial formal que cumplen cables de encendido,
        según lo afirma el fabricante (por ejemplo, SAE J2031, ISO 3808).
    ignition_lead_insulation_material:
      name: Material aislante potencial de los cables de encendido
      description: Material de aislamiento o cubierta principal utilizado en el cable
        de encendido (aislamiento del cable exterior).
    ignition_lead_set_type:
      name: Tipo de conjunto de cables de encendido
      description: Si el producto es un solo cable de encendido o un conjunto completo,
        y para qué está destinado el conjunto.
    ignition_lead_terminal_type:
      name: Tipo de terminal de los cables de encendido
      description: Estilo de terminal o conector utilizado en los extremos del cable
        de encendido (por ejemplo, estilo de terminal de bujía incandescente y bobina
        o distribuidor).
    illumination_type:
      name: Tipo de iluminación
      description: Especifica si la pelota está iluminada, y cómo, para jugar de noche
        (por ejemplo, brillo fosforescente, LED activado por impacto).
    immobilizer_installation_type:
      name: Tipo de instalación del inmobilizador
      description: Indica cómo está instalado o conectado el inmovilizador al vehículo.
    immobilizer_unlock_method:
      name: Método de desbloqueo del inmovilizador
      description: Especifica cómo se activa, desactiva o desbloquea el inmovilizador.
    impact_protection_certifications:
      name: Certificaciones de protección contra impactos
      description: Indica los estándares de seguridad específicos que cumple o supera
        la almohadilla protectora.
    impact_protection_level:
      name: Nivel de protección contra impactos
      description: Especifica el nivel o la tecnología de protección contra impactos
        que ofrece la coquilla deportiva.
    impact_protection_rating:
      name: Clasificación de protección contra impactos
      description: Especifica el nivel de certificación de de protección contra impactos
        según los estándares (por ejemplo, EN 1621-1 Nivel 1, EN 14120 Nivel 2), lo
        que ayuda a los conductores a filtrar para obtener una protección de grado
        más alto.
    impact_surface_material:
      name: Material de la superficie de impacto
      description: Describe el material principal de la superficie de impacto para
        garantizar la seguridad y la sensación al tacto (por ejemplo, espuma, plástico).
    incense_base_material:
      name: Material base para incienso
      description: Material base o aglutinante principal utilizado para elaborar el
        incienso (base en polvo) del kit.
    incense_making_method:
      name: Método para hacer incienso
      description: El proceso artesanal previsto es compatible con el kit.
    incense_tool_type:
      name: Tipo de herramienta para incienso
      description: Especifica qué tipo de herramienta para hacer incienso es este
        producto (se utiliza para moldear, medir, prensar, mezclar o secar incienso).
    incline_adjustment_type:
      name: Tipo de ajuste de inclinación
      description: Describe cómo (o si) se puede cambiar la inclinación durante los
        entrenamientos.
    included_accessories:
      name: Accesorios incluidos
      description: Las listas incluían complementos como cabezales o puntas de repuesto,
        caja de almacenamiento, cable de carga o adaptador de CA.
    included_case_type:
      name: Tipo de carcasa incluido
      description: Tipo de caja de transporte o almacenamiento incluida con el saxofón
        bajo (si la hubiera).
    included_components:
      name: Componentes incluidos
      description: Enumera lo que incluye el paquete (útil para conjuntos y paquetes
        de herramientas).
    included_fastener_components:
      name: Componentes de fijación incluidos
      description: Especifica si el producto es un conjunto de gancho y ojal, solo
        ganchos, solo ojales o una variante de cierre para prendas relacionada.
    included_hydration_vessel_type:
      name: Tipo de recipiente de hidratación incluido
      description: Identifica el estilo del contenedor de hidratación provisto o compatible
        con el cinturón.
    included_items_woodwind_instrument:
      name: Artículos incluidos (instrumento de viento de madera)
      description: Listas que comúnmente se incluyen en el paquete de saxofón bajo.
    included_materials:
      name: Materiales incluidos
      description: Indica qué componentes se incluyen con la compra del patrón (solo
        el patrón vs. el patrón y materiales).
    included_mounting_accessories:
      name: Accesorios de montaje incluidos
      description: Enumera los accesorios de montaje o fijación que se incluyen con
        el altavoz.
    included_pump_type:
      name: Tipo de bomba incluida
      description: Identifica el tipo de bomba provista o integrada con el colchón
        de aire.
    included_scraper_implement_type:
      name: Tipo de implemento raspador incluido
      description: Indica qué implementos de juego se incluyen con el raspador musical
        (por ejemplo, palo o varilla raspadores, cepillo de alambre).
    indicator_design:
      name: Diseño de indicadores
      description: Clasifica la forma física o el estilo del indicador de picada de
        pesca.
    indicator_functions_tracked:
      name: Funciones controladas del indicador
      description: Enumera las métricas de juevo específicas que indican el seguimiento,
        como bolas, strikes, salidas, entradas, conteo de lanzamientos, overs, wickets,
        marcador o downs.
    indoor_outdoor_use:
      name: Uso en interiores y exteriores
      description: Indica si el juguete de bolos está destinado a uso en interiores
        o exteriores, o a ambos.
    inflatable_decoration_items_included:
      name: Artículos de decoración inflables incluidos
      description: Enumera los accesorios claves incluidos con la decoración inflable
        (por ejemplo, ventilador, estacas, cuerdas de sujeción).
    inflatable_decoration_type:
      name: Tipo de decoración inflable
      description: Especifica el tipo de decoración inflable para fiestas (forma o
        factor de forma) para facilitar la búsqueda y el filtrado.
    inflatable_raft_float_features:
      name: Características de la balsa o el flotador inflable
      description: Características funcionales presentes en la balsa o el flotador
        inflable.
    inflation_method_included:
      name: Método de inflación incluido
      description: Especifica el tipo de solución de inflación de neumáticos incluida
        en el kit de reparación, si la hubiera.
    infused_scent:
      name: Aroma infusionado
      description: Identifica los aditivos de aroma o sabor impregnados en el material
        del cebo.
    ingredient_base_type:
      name: Tipo de base del ingrediente
      description: Identifica la base principal que se proporciona para la fermentación
        (por ejemplo, concentrado de jugo de uva, jugo fresco, concentrado de fruta).
    ingredient_physical_form:
      name: Forma física del ingrediente
      description: Especifica la forma física en la que se proporciona el ingrediente
        de la fragancia (se utiliza para la manipulación, la medición y la formulación).
    ingredient_processing_method:
      name: Método de procesamiento de ingredientes
      description: Especifica la técnica de procesamiento principal aplicada al ingrediente
        (por ejemplo, liofilizado, tostado, fermentado).
    ink_colors_included:
      name: Colores de tinta incluidos
      description: Especifica los colores de tinta incluidos en las almohadillas para
        sellos del juego.
    ink_pad_application_method:
      name: Método de aplicación de almohadilla de tinta
      description: Cómo se dispensa o utiliza la tinta de la almohadilla (almohadilla
        de sello tradicional, aplicador tipo dauber, almohadilla con punta pincel).
    ink_pad_permanence:
      name: Permanencia de la almohadilla de tinta
      description: Si la tinta estampada es permanente o de archivo (resistencia a
        la decoloración y al agua una vez seca).
    ink_pad_size:
      name: Tamaño de la almohadilla de tinta
      description: Tamaño o factor de forma estandarizado de la superficie de la almohadilla
        de tinta o su estuche.
    ink_pad_special_effects:
      name: Efectos especiales de la almohadilla de tinta
      description: Efectos visuales o funcionales especiales de la tinta al estamparla
        (por ejemplo, metálicos, con brillantina).
    ink_permanence:
      name: Permanencia de la tinta
      description: Indica si la tinta sumi seca está pensada para ser permanente o
        de archivo o bien lavable o no permanente.
    ink_preparation_required:
      name: Requisito de preparación de la tinta
      description: Indica si la tinta sumi está lista para usar o si requiere dilución
        con agua o molienda antes de su uso.
    inline_skate_brake_type:
      name: Tipo de freno de patines en línea
      description: Especifica la configuración de freno incluida en los patines en
        línea, como un freno de talón extraíble o la ausencia de freno.
    inner_tent_configuration:
      name: Configuración de la tienda interior
      description: Especifica la configuración o el estilo de la tienda interior;
        por ejemplo, inserto completo, inserto de malla o forro térmico.
    innerspring_coil_type:
      name: Tipo de resortes internos
      description: Especifica el estilo de construcción del sistema de resortes internos
        del colchón, lo que afecta la comodidad, el aislamiento de movimiento y el
        precio.
    input_connector_type:
      name: Tipo de conector de entrada
      description: Especifica el tipo de conector de entrada de audio utilizado por
        el pedal (normalmente, TS de 1/4 de pulgada).
    input_valve_type:
      name: Tipo de válvula de entrada
      description: Indica el estándar de válvula presente en la cámara o rueda de
        la bicicleta desde la que se conecta el adaptador.
    insecticide_treatment:
      name: Variación de insecticida
      description: Indica si la malla se trató con insecticida en fábrica y, en caso
        afirmativo, el tipo de variación utilizada para una protección adicional.
    insert_coverage_area:
      name: Insertar área de cobertura
      description: Especifica qué parte del pie está diseñada para cubrir la plantilla
        (por ejemplo, de longitud completa, solo del talón).
    insert_length_type:
      name: Tipo de longitud de inserto
      description: Indica qué parte de la plantilla cubre el soporte para el arco
        plantar.
    inside_message_type:
      name: Tipo de mensaje interno
      description: Indica si la tarjeta incluye un mensaje previamente impreso en
        el interior y si es personalizable.
    insole_attachment_method:
      name: Método de sujeción de la plantilla
      description: Especifica cómo se mantiene la plantilla de soporte del arco dentro
        del zapato (suelto, con adhesivo, con velcro, etc.).
    insole_material:
      name: Material de la plantilla
      description: Describe el material de la plantilla sobre la que se apoya el pie,
        lo que influye sobre la amortiguación y el soporte.
    installation_fabrication_level:
      name: Nivel de fabricación de la instalación
      description: Indica la cantidad típica de fabricación o modificación personalizada
        necesaria para instalar el kit.
    installation_location:
      name: Lugar de instalación
      description: Especifica el punto de instalación típico para el sensor de presión
        de aceite en el sistema de aceite del motor (por ejemplo, puerto del conducto
        de aceite del bloque, carcasa del filtro, placa intermedia o montaje en línea
        remota).
    installation_method:
      name: Método de instalación
      description: Especifica cómo se fija o instala la estera o el recuadro en el
        suelo.
    instant_coffee_form:
      name: Forma de café instantáneo
      description: Describe la forma física en la que se provee el café instantáneo,
        lo que afecta el método de preparación y la vida útil.
    instep_coverage:
      name: Cobertura del empeine
      description: Especifica si el producto protege solo la espinilla o tanto la
        espinilla como el empeine/pie.
    instruction_format:
      name: Formato de instrucciones
      description: Formato de las instrucciones incluidas en el kit.
    instrument_cleaning_swab_form_factor:
      name: Factor de forma del hisopo de limpieza de instrumentos
      description: Especifica el estilo físico del hisopo (por ejemplo, paño de arrastre
        vs. sistema de varilla o cepillo) para que coincida con las preferencias del
        músico y las limitaciones del instrumento.
    instrument_dimensions_unit_context:
      name: Contexto de unidades de medida del instrumento
      description: Aclara a qué se refieren las medidas de alto, ancho y largo proporcionadas
        (p. ej., instrumento completo, largo de un solo tubo, alto del soporte).
    instrument_electronics_type:
      name: Tipo de sistema electrónico de los instrumentos
      description: Indica si el sistema de micrófonos o preamplificación del instrumento
        es activo o pasivo.
    instrument_key:
      name: Llave del instrumento
      description: Especifica la designación de la tonalidad del instrumento que se
        utiliza en los catálogos (normalmente Do o Fa para las flautas más grandes).
    instrument_level:
      name: Nivel del instrumento
      description: Nivel de músico al que va dirigido el instrumento.
    instrument_part_mounting_method:
      name: Método de montaje de la pieza del instrumento
      description: Especifica cómo se fija o instala la pieza (por ejemplo, abrazadera,
        adhesivo o rosca).
    instrument_parts_included:
      name: Piezas del instrumento incluidas
      description: Enumera los componentes o las piezas principales incluidos en la
        caja de un clarinete en La.
    instrument_playing_technique:
      name: Técnica de interpretación instrumental
      description: Cómo se toca o acciona normalmente el instrumento (por ejemplo,
        agitación, golpe, castañeteo).
    instrument_size_class:
      name: Clase de tamaño del instrumento
      description: Tamaño general del instrumento expresado como una clase amigable
        para el comprador en lugar de dimensiones exactas.
    insulation_fill_material:
      name: Material de relleno de aislamiento
      description: Identifica el material principal utilizado para aislar la chaqueta
        o el chaleco.
    integrated_bottom_type:
      name: Tipo de base integrada
      description: Indica si la prenda incluye calzoncillos, pantalones cortos, leotardo
        u otra capa interior incorporada para brindar cobertura durante el movimiento.
    integrated_charging_options:
      name: Opciones integradas de carga
      description: Enumera las interfaces de alimentación o carga integradas disponibles
        en la mesita de noche.
    integrated_furniture_function:
      name: Función de los muebles integrados
      description: Identifica los elementos de mobiliario adicionales integrados que
        se incluyen con la cama abatible o su estructura (por ejemplo, escritorio,
        sofá, estantes).
    integrated_locking:
      name: Bloqueo integrado
      description: Si el portabicicletas incluye un bloqueo integrado para asegurar
        el portabicicletas al vehículo o la bicicleta al portabicicletas.
    integrated_power_options:
      name: Opciones de alimentación integradas
      description: Indica el tipo de características de alimentación o de carga integradas
        que ofrece el tocador.
    integrated_storage_features:
      name: Características de almacenamiento integradas
      description: Identifica características adicionales de almacenamiento o accesorios
        que incluye el estante para tacos de billar, aparte de las ranuras para tacos.
    integrated_tool_functions:
      name: Funciones de la herramienta integradas
      description: Funciones adicionales integradas en la palanca (por ejemplo, gancho
        para radios, extractor de núcleos de válvulas, extractor de talón).
    intended_board_type:
      name: Tipo de placa previsto
      description: Especifica el estilo de tabla de kitesurf para el que está diseñada
        la aleta (por ejemplo, twin tip, surf direccional, hydrofoil).
    intended_consumption:
      name: Consumo previsto
      description: Especifica cómo debe consumirse el producto, e indica si es seguro
        comerlo crudo, si requiere horneado o si está parcialmente horneado.
    intended_craft:
      name: Manualidad prevista
      description: Contexto artesanal principal para el que está diseñada la guía
        de lana.
    intended_culinary_use:
      name: Uso culinario previsto
      description: Indica la aplicación culinaria principal de la salsa; por ejemplo
        para mojar, cocinar o glasear.
    intended_handlebar_style:
      name: Estilo de manillar previsto
      description: Describe el tipo de manillar o uso previsto de la palanca (por
        ejemplo, manubrio plano, de ruta, aero). Esto reduce rápidamente la compatibilidad
        sin necesidad de crear subcategorías adicionales.
    intended_player_role:
      name: Rol del jugador previsto
      description: Especifica la función en el campo para la que está diseñado el
        casco (por ejemplo, receptor, árbitro).
    intended_playing_surface:
      name: Superficie de juego prevista
      description: Superficie para la que se diseña el disco, la pelota o el aro,
        como hielo, asfalto, suelos de gimnasio o hielo sintético.
    intended_repair_location:
      name: Lugar de reparación previsto
      description: Qué parte del neumático se pretende reparar con este kit.
    intended_seating_position:
      name: Posición de asiento prevista
      description: Especifica la posición del asiento del vehículo en la que se debe
        instalar o utilizar la correa del cinturón de seguridad.
    intended_sewing_application:
      name: Aplicación de costura prevista
      description: Aplicación de costura prevista para la que está diseñado el hilo
        (p. ej., costura de prendas de vestir de uso general, acolchado, tapicería).
    intended_technique:
      name: Técnica prevista
      description: Técnica principal de enfurtido para la que está diseñada la almohadilla
        o el tapete.
    intended_use:
      name: Uso previsto
      description: Contexto de uso principal del instrumento.
    intended_use_fleece_fabric:
      name: Uso previsto (tela polar)
      description: Proyecto o aplicación principal para los que se comercializa la
        tela polar.
    intended_user:
      name: Usuario previsto
      description: Indica para quién está diseñado el equipo de protección de la aeronave.
    intended_yarn_form:
      name: Forma de hilo prevista
      description: Especifica la presentación del hilo que mejor se adapta al cuenco
        para ovillos.
    interaction_mode:
      name: Modo de interacción
      description: Método de interacción principal utilizado para activar sonidos
        o actividades.
    interactive_effects:
      name: Efectos interactivos
      description: Identifica los efectos electrónicos o mecánicos interactivos incluidos
        en un juego de cocina.
    interfacing_application_area:
      name: Área de aplicación de interfaz
      description: Identifica las áreas comunes de costura o manualidades que la entretela
        está pensada para reforzar.
    interfacing_color_family:
      name: Familia de colores de la entretela
      description: Indica el color base típico de la entretela que se utiliza debajo
        de telas claras u oscuras.
    interfacing_selling_format:
      name: Formato de venta de la interfaz
      description: Describe el formato de venta de entretelas (por ejemplo, corte
        continuo vendido por longitud, piezas precortadas, rollos o muestrario).
    interfacing_stiffness_level:
      name: Nivel de rigidez de la entretela
      description: Describe el grado de rigidez o firmeza que proporciona la entretela.
    interior_padding_type:
      name: Tipo de relleno interior
      description: Tipo de relleno interior o sistema de inserción utilizado dentro
        de la caja para proteger y organizar el contenido.
    interior_stall_configuration:
      name: Configuración del puesto interior
      description: Especifica el diseño lo la configuración interior para el transporte
        de animales (orientación de los boxes y estilo de los compartimentos).
    invitation_printing_coverage:
      name: Cobertura de impresión de invitaciones
      description: Indica qué lados de la invitación se imprimen (solo frente, o frente
        y dorso).
    iodization:
      name: Yodación
      description: Indica si se ha añadido yodo a la sal y en qué cantidad.
    iridescence_level:
      name: Nivel de iridiscencia
      description: Describe la intensidad del brillo iridiscente natural o tratado,
        típico de las plumas de pavo real.
    irish_warpipe_set_configuration:
      name: Configuración de la gaita irlandesa
      description: Indica qué configuración se vende (instrumento completo o piezas/conjunto
        incompleto) específicamente para las gaitas irlandesas.
    iron_on_applique_application_method:
      name: Método de aplicación de apliques termoadhesivos
      description: Especifica cómo se debe aplicar el aplique termoadhesivo al sustrato.
    ironing_center_features:
      name: Características del centro de planchado
      description: Enumera las características especializadas de los centros de planchado
        que mejoran su usabilidad y practicidad.
    jacket_breast_style:
      name: Estilo de la parte frontal del saco
      description: Indica si el saco del traje es de botonadura simple o doble.
    jacket_vent_style:
      name: Estilo de abertura de la chaqueta
      description: Indica el tipo de abertura (ventilación) en la parte posterior
        del saco del traje.
    jam_and_jelly_consistency:
      name: Consistencia de mermelada y jalea
      description: Describe la textura de la pasta, indicando la presencia de trozos
        de fruta o semillas.
    jaw_shape:
      name: Forma de las mordazas
      description: La geometría de las mordazas o las puntas (por ejemplo, recta,
        curva, de punta alargada) influye en la precisión y el alcance.
    jerky_form:
      name: Carne seca
      description: Describe la forma o el corte de las piezas de carne seca (por ejemplo,
        tiras, palitos, bocados).
    jersey_style:
      name: Estilo de camiseta
      description: Especifica el formato o el estilo de uso de las camisetas para
        aficionados.
    jew_harp_accessories_included:
      name: Accesorios incluidos del arpa de boca
      description: Las listas incluyen los artículos que vienen con el arpa de boca
        (p. ej., caja, estuche, instrucciones).
    jew_s_harp_frame_style:
      name: Tipo de marco del arpa de boca
      description: Describe el tipo de diseño del marco/cuerpo del arpa de boca, que
        influye en la sensación al tocar, la durabilidad y la ergonomía.
    jew_s_harp_tongue_profile:
      name: Perfil de la lengüeta de arpa de boca
      description: Describe el perfil y la geometría de la lengüeta del arpa de boca,
        que influye en la capacidad de respuesta y el timbre.
    jewelry_pieces_included:
      name: Piezas de joyería incluidas
      description: Enumera las joyas específicas incluidas en el conjunto para que
        el comprador sepa exactamente qué piezas está comprando.
    jigsaw_puzzle_piece_shape:
      name: Forma de las piezas del rompecabezas
      description: Estilo o forma general de corte de las piezas y perfil del borde.
    jockstrap_design_features:
      name: Características de diseño del suspensorio
      description: Indica los elementos de diseño especiales, exclusivos de los suspensorios,
        que influyen en su funcionalidad o su estética.
    juggling_club_construction_type:
      name: Tipo de construcción de la maza de malabarismo
      description: Especifica el tipo de construcción general de una maza de malabarismo
        (p. ej., moldeada en una sola pieza o ensamble de varias piezas), lo que puede
        afectar a la durabilidad, la sensación y el mantenimiento.
    juggling_club_core_material:
      name: Material central de la maza de malabarismo
      description: El material principal del núcleo utilizado en el interior de la
        maza (distinto del revestimiento o la cinta exterior).
    juggling_prop_set_size:
      name: Juego de accesorios de malabarismo talla
      description: Cantidad de accesorios principales incluidos en el set (p. ej.,
        conjunto de 3 bolas, par de poi).
    juggling_ring_edge_style:
      name: Tipo de borde del aro de malabarismo
      description: Perfil del borde del anillo, que influye en la comodidad y el agarre.
    juice_form:
      name: Formato del jugo
      description: Especifica la forma física o la etapa de procesamiento del producto
        (p. ej., líquido listo para consumir, concentrado, polvo).
    juice_processing_method:
      name: Método de procesamiento de jugo
      description: Especifica la técnica de procesamiento principal aplicada al jugo
        o la bebida, lo que afecta el sabor, la retención de nutrientes y la vida
        útil.
    jump_rope_style:
      name: Tipo de soga de saltar
      description: Clasifica el estilo de construcción de la cuerda o cable (p. ej.,
        con cuentas, de tela, cable de alta velocidad), lo que influye considerablemente
        en su uso previsto y rendimiento.
    kale_variety:
      name: Variedad de kale
      description: Identifica el cultivar o la variedad específica de col rizada (p.
        ej., rizada, lacinato o rusa roja). Esto ayuda a los compradores a elegir
        en función del sabor, la textura y el uso culinario.
    kaleidoscope_viewing_type:
      name: Tipo de visualización del caleidoscopio
      description: Identifica el formato de visualización o el tipo de funcionamiento
        del caleidoscopio (p. ej., tubo ocular clásico, teleidoscopio con lente, accionado
        por rueda, proyección).
    kayak_construction_type:
      name: Tipo de construcción del kayak
      description: Especifica el tipo de construcción principal del kayak, p. ej.,
        de casco rígido o inflable.
    kayak_design_type:
      name: Tipo de diseño de kayak
      description: Clasifica la finalidad principal del diseño del kayak (p. ej.,
        surfski, de maniobras o de travesía).
    kayak_hull_design:
      name: Diseño del casco de kayak
      description: Identifica la forma primaria del casco, que influye en la manipulación,
        como la estabilidad y la maniobrabilidad en estado de oleaje.
    kayak_storage_bag_type:
      name: Tipo de bolsa de almacenamiento del kayak
      description: Indica el estilo o formato de la bolsa de almacenamiento para kayak,
        como bolsa impermeable o una para remos.
    kayak_style:
      name: Estilo de kayak
      description: Especifica el diseño principal o el tipo de uso del kayak (p. ej.,
        recreativo, de travesía, inflable).
    keel_type:
      name: Tipo de quilla
      description: Identifica la configuración de la quilla del velero.
    kettlebell_style:
      name: Tipo de pesa rusa
      description: Identifica la variante de construcción o estilo de la pesa rusa
        (p. ej., de competición, ajustable, blanda), lo que ayuda al comprador a elegir
        la opción más adecuada para sus necesidades de entrenamiento.
    key_attachment_mechanism:
      name: Mecanismo de fijación clave
      description: Especifica el hardware utilizado para asegurar las llaves dentro
        de la caja, como anillas, clips o postes roscados.
    key_retention_when_unlocked:
      name: Retención de llave durante en posición de desbloqueo
      description: Indica si la llave se puede retirar de la cerradura cuando está
        en la posición de desbloqueo.
    keyboard_amplifier_inputs:
      name: Entradas del amplificador del teclado
      description: Enumera las conexiones de entrada que admite el amplificador del
        teclado (p. ej., TRS de 1/4", MIDI, Bluetooth).
    keyboard_amplifier_output_types:
      name: Salidas del amplificador de teclado
      description: Especifica los tipos de conectores de salida principales que admite
        el amplificador del teclado para enrutar el audio a otros sistemas.
    keyboard_case_handle_type:
      name: Tipo de manija del estuche para teclado
      description: Sistema de manija principal utilizado para mover/transportar el
        estuche del teclado (además de las correas).
    keyboard_case_interior_padding_type:
      name: Tipo de relleno del interior del estuche para teclado
      description: Tipo de acolchado/revestimiento interior del interior del estuche
        rígido.
    keyboard_case_protection_level:
      name: Nivel de protección del estuche para teclado
      description: Tipo de protección/rigidez general del estuche rígido, p. ej.,
        estuche de carcasa moldeada o estuche tipo flight/ATA de alta resistencia.
    keyboard_case_wheel_type:
      name: Tipo de rueda del estuche para teclado
      description: Configuración de ruedas para estuches rígidos.
    keyboard_pedal_connector_type:
      name: Tipo de conector del pedal del teclado
      description: Especifica el tipo de conector/enchufe que se utiliza para conectar
        el pedal de sustain a un teclado o piano digital.
    keyboard_power_supply_type:
      name: Tipo de alimentación del teclado
      description: Método de alimentación principal del teclado (batería, adaptador
        de CA, alimentación por USB).
    keyboard_stand_tier_type:
      name: Soporte para teclado de varios niveles
      description: Indica si el soporte se vende solo o si incluye un accesorio de
        segundo nivel.
    keyboard_stand_tiers:
      name: Niveles del soporte para teclado
      description: Cantidad de niveles que admite el soporte en forma de Z (p. ej.,
        uno o dos niveles).
    keychain_attachment_type:
      name: Tipo de enganche para llavero
      description: Especifica el hardware de fijación principal que se utiliza para
        sujetar el llavero a las llaves, bolsos o cinturones.
    keychain_style:
      name: Estilo de llavero
      description: Describe el formato general del llavero (cómo es físicamente).
    keywork_finish:
      name: Acabado de la llave
      description: Describe el acabado o recubrimiento de las llaves, independientemente
        del acabado del cuerpo.
    kick_point:
      name: Punto de flexión
      description: Especifica la ubicación del punto de flexión en el eje del palo
        de hockey, lo que afecta la velocidad de liberación del disparo y la sensación.
    kick_zone_grip_system:
      name: Sistema de agarre de la zona de flexión
      description: Identifica la tecnología utilizada en la zona de impulso del esquí
        para la tracción.
    kickboard_features:
      name: Características de la tabla de natación
      description: Destaca las características especiales de la tabla de natación
        que mejoran el entrenamiento o la comodidad, incluida la textura de la superficie
        y las opciones de agarre.
    kickboard_handle_style:
      name: Estilo de agarre de la tabla de natación
      description: Identifica si la tabla de natación incluye agarres para las manos
        o tratamientos de superficie, y de qué manera estos influyen en el manejo
        y la comodidad.
    kickstand_mounting_position:
      name: Posición de montaje del caballete
      description: Indica en qué parte del cuadro de la bicicleta se fija el caballete
        (p. ej., montaje central, en la vaina trasera o en el eje trasero).
    kickstand_type:
      name: Tipo caballete
      description: Describe el tipo de estructura o mecanismo del caballete (p. ej.,
        lateral de una pata, central de dos patas, telescópico).
    kidney_belt_support_level:
      name: Nivel de soporte del cinturón lumbar
      description: Nivel general de soporte del cinturón lumbar para estabilización
        lumbar y abdominal según el fabricante.
    kiln_firing_atmosphere:
      name: Atmósfera de cocción del horno
      description: Especifica las atmósferas de cocción que el horno puede admitir
        durante su funcionamiento (p. ej., oxidación o reducción).
    kiln_heating_element_type:
      name: Tipo de elemento calefactor del horno
      description: Tipo o material de los elementos de calefacción utilizados en el
        horno.
    kingpin_design:
      name: Diseño del kingpin
      description: Describe el tipo de construcción del kingpin, que influye en el
        peso y la holgura para el deslizamiento sobre ejes (grind).
    kingpin_orientation:
      name: Orientación del kingpin
      description: Identifica la orientación del kingpin del eje, que influye en las
        características de conducción y la compatibilidad con la tabla.
    kit_components_included:
      name: Componentes incluidos en el kit
      description: Indica las piezas individuales incluidas en el kit (p. ej., estacas,
        tornillos, correas, herramienta de instalación) para que el comprador sepa
        exactamente qué está adquiriendo.
    kit_format:
      name: Formato del kit
      description: Especifica cómo se empaqueta y transporta el kit (p. ej., bolsa,
        estuche, caja).
    kit_items_included:
      name: Artículos incluidos en el kit
      description: Indica los artículos y los suministros principales incluidos en
        el kit de elaboración de vino para que el comprador pueda distinguir entre
        kits iniciales y kits de reposición de ingredientes.
    kit_pouch_case_type:
      name: Tipo de bolsa/estuche del kit
      description: Especifica el tipo de solución de almacenamiento incluida para
        el kit de cuidado (si hay).
    kit_tools_included:
      name: Herramientas incluidas en el kit
      description: Indica las herramientas principales que se incluyen en el kit (si
        hay) necesarias para completar el proyecto.
    kite_inflation_system:
      name: Sistema de inflado del kite
      description: Indica cómo se inflan el borde de ataque y las costillas del kite.
    kite_line_configuration:
      name: Configuración de líneas del kite
      description: Indica la cantidad de líneas de vuelo/control para las que está
        diseñada el ala del kite, una especificación clave para combinar correctamente
        la barra y las líneas.
    kite_type:
      name: Tipo de kite
      description: Define la categoría de diseño estructural del kite (forma y tipo
        de bridaje).
    kiteboard_bag_style:
      name: Tipo de bolsa para la tabla de kitesurf
      description: Tipo o subtipo específico de funda para la tabla de kitesurf (p.
        ej., funda para tabla, bolsa tipo golf, bolsa de viaje, funda para foil).
    kiwifruit_variety:
      name: Variedad de kiwi
      description: Identifica la variedad específica de cultivar o color del kiwi
        (verde, amarillo, rojo, etc.).
    knee_pad_pocket_type:
      name: Tipo de bolsillo para rodillera
      description: Indica si la prenda admite rodilleras protectoras y, si es así,
        cómo.
    knee_pad_style:
      name: Estilo de rodillera
      description: Describe el tipo de construcción o el formato de la rodillera (p.
        ej., manga, soporte, protector).
    knee_protection_design:
      name: Diseño de rodillera
      description: Indica la cantidad de secciones articuladas que conforman la rodillera.
    kneeboard_construction:
      name: Tipo de construcción de la tabla de kneeboard
      description: Identifica la técnica de construcción principal o la composición
        del material de la tabla (p. ej., plástico rotomoldeado, moldeado por compresión,
        fibra de carbono).
    kneeboard_strap_type:
      name: Tipo de correa de la tabla de kneeboard
      description: Describe el tipo de sistema de correas para las rodillas que se
        utiliza para sujetar al rider a la tabla.
    knife_lock_mechanism:
      name: Mecanismo de bloqueo de la navaja
      description: Especifica el mecanismo utilizado para asegurar la hoja de la navaja
        plegable en posición abierta, o indica si se trata de un diseño sin bloqueo.
    knife_locking_mechanism:
      name: Mecanismo de bloqueo de la navaja
      description: Indica el tipo de mecanismo de bloqueo de la hoja en posición abierta,
        que determina la seguridad, la resistencia y la facilidad de uso.
    knife_opening_mechanism:
      name: Mecanismo de apertura de la navaja
      description: Describe el sistema de apertura de la hoja, distinguiendo entre
        apertura manual, asistida, automática y otros mecanismos especiales.
    knife_system:
      name: Sistema de la navaja
      description: Indica si la cuchilla de la remalladora está activa y cómo funciona.
    knit_elastic_application:
      name: Aplicación de elástico de punto
      description: Especifica el uso previsto del elástico de punto en costuras o
        manualidades.
    knit_pattern:
      name: Patrón de punto
      description: Identifica el patrón o la textura principal del tejido del cárdigan
        (p. ej., trenzado, acanalado o tipo waffle), lo que permite a los compradores
        encontrar texturas y propiedades térmicas específicas.
    knit_style:
      name: Tipo de punto
      description: Especifica la confección principal, la textura o el patrón decorativo
        del tejido del suéter.
    knitting_marker_counter_type:
      name: Tipo de marcador/contador de tejido
      description: Especifica el tipo de producto funcional dentro de los marcadores
        y contadores de tejido.
    knitting_needle_tip_style:
      name: Tipo de punta de la aguja de tejer
      description: Forma o nivel de afilado de la punta, y optimización para distintos
        tipos de hilo y técnicas.
    knock_sensor_technology:
      name: Tecnología del sensor de detonación
      description: La tecnología de detección utilizada en el sensor de detonación.
    knurl_aggressiveness:
      name: Agresividad del moleteado
      description: Describe la nitidez o textura del moleteado en la barra, lo que
        influye en la comodidad y la firmeza del agarre.
    knurl_marking_standard:
      name: Estándar de marcado del moleteado
      description: Especifica la posición de los anillos de referencia del moleteado
        utilizados para la colocación de las manos (p. ej., marcas IPF o IWF).
    kohlrabi_variety:
      name: Variedad de colinabo
      description: Especifica el cultivar o la variedad comercial del bulbo de colinabo,
        lo que permite a los clientes elegir entre distintos perfiles de sabor, tamaños
        y colores.
    koji_mold_type:
      name: Tipo de cultivo de koji
      description: Indica el tipo o la cepa de moho koji utilizados durante la fermentación,
        lo que influye en el aroma y el sabor.
    kumquat_variety:
      name: Variedad de kumquat
      description: Identifica el cultivar o la variedad del kumquat ofrecido, lo que
        permite a los clientes elegir según el perfil de sabor, tamaño o uso culinario.
    label_edge_type:
      name: Tipo de borde de la etiqueta
      description: Especifica el acabado del borde utilizado para evitar el deshilachado
        y definir la estética.
    label_finish:
      name: Acabado de la etiqueta
      description: Especifica el acabado superficial, la textura o el recubrimiento/variación
        protectora aplicados a la etiqueta.
    label_finish_edge_style:
      name: Tipo de acabado o borde de la etiqueta
      description: El acabado de los bordes influye en la comodidad y la durabilidad
        (p. ej., borde tejido o borde cortado con láser).
    label_fold_type:
      name: Tipo de pliegue de la etiqueta
      description: Especifica cómo está diseñada la etiqueta para coserse a un artículo
        (p. ej., pliegue en los extremos o pliegue central), lo que influye en la
        forma y el lugar de colocación.
    label_text_type:
      name: Tipo de texto de la etiqueta
      description: Indica si la etiqueta se encuentra en blanco, preimpresa o si está
        diseñada para personalizarse.
    lace_area_size:
      name: Tamaño del área de encaje
      description: Define el tamaño o la configuración de la sección de encaje (p.
        ej., cierre 4×4, frontal 13×6), lo que determina el espacio disponible para
        la raya.
    lace_tightener_style:
      name: Tipo de tensor de cordones
      description: Identifica el diseño mecánico o formato del dispositivo de ajuste
        de los cordones.
    lace_type:
      name: Tipo de encaje
      description: Describe el material o acabado del encaje en la línea del cabello
        o la base, lo que influye en el realismo y la adaptación al tono de piel.
    lacrosse_ball_certification:
      name: Certificación de pelotas de lacrosse
      description: Especifica las aprobaciones o normas de los organismos rectores
        del deporte que cumple la pelota.
    lacrosse_goal_regulation_certification:
      name: Certificación de reglamentación de la portería de lacrosse
      description: Indica si la portería o la red cumple con las especificaciones
        de un organismo rector (p. ej., NCAA o NFHS).
    lacrosse_pocket_type:
      name: Tipo de bolsillo del palo de lacrosse
      description: Identifica el tipo de bolsillo o malla montada en la cabeza del
        palo de lacrosse, lo que influye en el control y la liberación de la pelota.
    lacrosse_string_type:
      name: Tipo de cordaje de lacrosse
      description: Clasifica la forma exacta o el uso previsto del cordaje o la malla
        para que los clientes puedan diferenciar entre piezas de malla, kits y funciones
        específicas de las cuerdas dentro del bolsillo.
    ladder_position:
      name: Posición de la escalera
      description: Indica dónde se ubica la escalera o el acceso en la cama infantil
        elevada.
    lanyard_attachment_hardware:
      name: Tipo de herraje de sujeción del cordón
      description: Indica el tipo de herraje en el extremo del cordón que se utiliza
        para sujetar llaves, credenciales, teléfonos u otros accesorios.
    lanyard_style:
      name: Estilo de cordón
      description: Especifica cómo se lleva o se transporta el cordón.
    lanyard_type:
      name: Tipo de cordón
      description: Describe el estilo del cordón incluido o compatible con el silbato.
    lap_hand_loom_accessories_included:
      name: Accesorios para telar de regazo incluidos
      description: Accesorios incluidos en el paquete del telar de regazo.
    lapel_style:
      name: Tipo de solapa
      description: Especifica el diseño de la solapa de la chaqueta (p. ej., muesca,
        pico, chal).
    laser_safety_class:
      name: Clase de seguridad láser
      description: Clasificación de seguridad láser del producto (p. ej., Clase 2,
        3R, 3B, 4) según se indica en la documentación o el etiquetado del dispositivo.
    latex_processing_method:
      name: Método de procesamiento de látex
      description: Especifica el proceso de fabricación utilizado para producir la
        espuma de látex (normalmente Dunlop o Talalay), lo que influye en la sensación,
        la capacidad de respuesta y el precio.
    latex_type:
      name: Tipo de látex
      description: Indica el origen y la composición del látex utilizado en el colchón
        (natural, orgánico, sintético o mezcla), lo que brinda información a los compradores
        sobre la durabilidad, el impacto ambiental y posibles alérgenos.
    launch_profile:
      name: Perfil de lanzamiento
      description: Indica la trayectoria de lanzamiento típica (baja, media o alta)
        que la varilla del palo de golf está diseñada para producir.
    launcher_mounting_configuration:
      name: Configuración de montaje del lanzador
      description: Indica el tipo de montaje o configuración del lanzador (p. ej.,
        independiente, bajo el cañón o montado en riel).
    layer_construction:
      name: Construcción por capas
      description: Especifica la construcción del laminado del tejido (p. ej., de
        2 capas, 2,5 capas o 3 capas), que afecta al peso, la facilidad de embalaje
        y la durabilidad.
    layer_design:
      name: Diseño de capas
      description: Describe la confección de la redecilla para el cabello en términos
        de capas o reversibilidad.
    lazy_kate_tension_control_type:
      name: Tipo de control de tensión del soporte para bobinas (lazy kate)
      description: Indica cómo el soporte para bobinas aplica fricción/tensión a las
        bobinas durante el torcido o el devanado.
    lead_hardware_type:
      name: Tipo de herraje de la correa
      description: Define el tipo de enganche o cierre en el extremo de la correa
        (p. ej., broche, clip, lazo, cadena), lo que influye en la facilidad de uso,
        la seguridad y su adecuación para distintos tipos de adiestramiento.
    leaf_gelatin_grade:
      name: Grado de gelatina en hojas
      description: Especifica el grado de resistencia estandarizado de las láminas
        de gelatina.
    leaf_preparation:
      name: Preparación de la hoja
      description: Describe cómo se preparan las hojas antes de envasarlas, por ejemplo,
        picándolas, desmenuzándolas o cortándolas en juliana.
    leaf_spring_material:
      name: Material del resorte de lámina
      description: Material de construcción principal del paquete de ballestas.
    leak_protection_layer:
      name: Capa de protección contra fugas
      description: Indica si el sistema de pañal incorporado del bañador tipo jammer
        utiliza un diseño de una o dos capas para la protección contra fugas.
    leash_clip_type:
      name: Tipo de clip para correa
      description: Especifica el tipo de clip o herraje utilizado para sujetar la
        correa a un collar o arnés (p. ej., gancho con gatillo, mosquetón, clip giratorio).
    leash_style:
      name: Tipo de correa
      description: Describe la configuración del cordón o el tipo de enrollado de
        la correa.
    leash_type:
      name: Tipo de correa
      description: Clasifica el estilo general o la configuración de la correa según
        su uso previsto, lo que facilita la selección según la aplicación.
    leavening_action_type:
      name: Tipo de acción leudante
      description: Identifica la formulación química o el tipo de leudado del polvo
        de hornear (p. ej., de acción simple, de doble acción, sin aluminio). Esto
        influye directamente en el rendimiento del horneado y la adecuación para la
        receta.
    leavening_agent:
      name: Agente leudante
      description: Especifica el mecanismo principal de fermentación utilizado en
        la masa.
    led_color_options:
      name: Opciones de color de luces LED
      description: Muestra los colores de LED disponibles en la alarma para la indicación
        visual de la picada.
    led_indicator_color:
      name: Color del indicador LED
      description: Identifica el color del indicador LED del producto, lo que ayuda
        a los pescadores a distinguir entre varias alarmas o a ajustarlo a sus preferencias.
    led_light_color:
      name: color de la luz LED
      description: Especifica el color de cualquier iluminación LED integrada.
    leek_variety:
      name: Variedad de puerro
      description: Especifica la variedad del puerro, lo que permite distinguirlo
        por sabor, tamaño y época de cultivo.
    leg_coverage:
      name: Cobertura para pierna
      description: Especifica qué parte de la pierna cubre la prenda de neopreno (p.
        ej., corto, largo completo).
    leg_cuff_style:
      name: Estilo de puño de pierna
      description: Especifica el estilo de acabado en la abertura del tobillo del
        pantalón.
    leg_cut_height:
      name: Altura del corte de pierna
      description: Indica qué tan alto está el corte de la abertura de la pierna en
        la parte inferior del bikini.
    leg_cut_style:
      name: Estilo de corte de pierna
      description: Describe la forma de la apertura de la pierna, lo que influye en
        la apariencia, la comodidad y las líneas de bronceado.
    leg_length:
      name: Largo de pierna
      description: Clasifica los bañadores según la longitud relativa de la pierna
        (corto, medio, largo) para ayudar a los compradores a elegir la cobertura
        preferida sin dividir la categoría.
    leg_loop_type:
      name: Tipo de pernera
      description: Describe el diseño de las perneras.
    leg_opening_style:
      name: Tipo de corte de pierna
      description: Especifica el tipo de terminación de las aberturas de pierna del
        pantalón deportivo (p. ej., puños elásticos, con cremallera o abiertos).
    leg_style:
      name: Tipo de patas
      description: Define el diseño o la construcción de las patas o la base del banco.
    legging_foot_design:
      name: Diseño de pie de calzas
      description: Especifica si las calzas son sin pie, con pie o convertibles entre
        ambos estilos.
    leggings_waistband_style:
      name: Tipo de cintura de las calzas
      description: Especifica el diseño estructural de la cintura de las calzas, lo
        que influye en la comodidad, el soporte y la estética.
    lei_closure_style:
      name: Estilo de cierre del collar
      description: Describe si el collar es continuo o si tiene extremos abiertos
        que se atan o se cierran con cinta.
    lemon_variety:
      name: Variedad de limón
      description: Identifica el cultivar o la variedad específica de los limones
        (p. ej., Eureka, Meyer, Amalfi).
    length_adjustment_method:
      name: Método de ajuste de longitud
      description: Indica si la longitud de la cuerda de saltar se puede ajustar y
        cómo.
    lens_color_tint:
      name: Color/tono del lente
      description: Color o tonalidad de los lentes de protección incluidos con el
        producto.
    lens_construction:
      name: Construcción de lentes
      description: Especifica la estructura del lente (p. ej., lente simple o doble
        lente térmico), lo que indica la resistencia al empañamiento y el rendimiento
        óptico.
    lens_tint_category:
      name: Categoría de tinte de lentes
      description: Clasifica la oscuridad del lente según categorías internacionales
        de tintado, lo que ayuda a los clientes elegir lentes adecuados para distintas
        condiciones lumínicas.
    lettuce_variety:
      name: Variedad de lechuga
      description: Identifica la variedad hortícola específica de la lechuga (p. ej.,
        iceberg, romana, mantecosa), lo que permite un filtrado y una comparación
        precisos.
    level_of_play:
      name: Nivel de juego
      description: Nivel de rendimiento indicado por el fabricante que se ajusta a
        la competitividad del jugador y a su presupuesto.
    lever_configuration:
      name: Configuración de la palanca
      description: Indica la configuración de las palancas/manetas del control del
        motor de la embarcación (p. ej., de una sola palanca o de doble palanca).
    lever_type:
      name: Tipo de palanca
      description: Tipo/mecanismo de las palancas de ajuste de tono instaladas en
        la cadena del arpa.
    license_plate_cover_style:
      name: Tipo de cubierta de la placa de identificación
      description: Especifica el tipo de construcción de la cubierta de la placa de
        identificación (p. ej., cubierta completa o tapas para tornillos).
    license_plate_personalization_type:
      name: Tipo de personalización de la placa de identificación
      description: Especifica si la placa de identificación está en blanco, preimpresa
        o si admite personalización proporcionada por el comprador (texto o gráficos).
    license_usage_terms:
      name: Términos de licencia/uso
      description: Derechos de uso del patrón (p. ej., solo para uso personal o a
        uso comercial limitado).
    licensed_sports_property:
      name: Licencia deportiva oficial
      description: Indica si el producto cuenta con licencia oficial de una liga,
        equipo u organización.
    lid_hinge_mechanism:
      name: Mecanismo de bisagra de la tapa
      description: Especifica el mecanismo de bisagra de la tapa, lo que influye en
        la seguridad y la facilidad de uso.
    lid_support_positions:
      name: Posiciones de soporte de la tapa
      description: Especifica las posiciones de la varilla de la tapa del piano de
        cola (qué tan abierta puede quedar la tapa).
    lie_angle_color_code:
      name: Código de color del ángulo de posición
      description: Indica el sistema de codificación por colores del fabricante para
        el ángulo de lie en algunos palos (p. ej., Black Dot, Green Dot).
    life_jacket_certification_standard:
      name: Estándar de certificación del chaleco salvavidas
      description: Clasificación o estándar de seguridad oficial que cumple el producto,
        p. ej., USCG Type o niveles ISO/AS.
    life_raft_certification_standard:
      name: Estándar de certificación de la balsa salvavidas
      description: La norma/certificación de seguridad que la balsa cumple en su fabricación
        y mantenimiento.
    life_raft_container_type:
      name: Tipo de contenedor de la balsa salvavidas
      description: Indica cómo se empaqueta la balsa para su almacenamiento y despliegue.
    life_vest_approval_standard:
      name: Estándar de aprobación del chaleco salvavidas
      description: Especifica la norma de certificación o aprobación que cumple el
        chaleco salvavidas.
    life_vest_intended_user:
      name: Usuario previsto del chaleco salvavidas
      description: Indica la categoría de usuario prevista para garantizar un ajuste
        adecuado.
    lifebuoy_approval_standard:
      name: Estándar de aprobación del salvavidas
      description: Norma o certificación de seguridad que cumple el aro salvavidas
        (p. ej., USCG/SOLAS).
    lifebuoy_features:
      name: Características del aro salvavidas
      description: Seguridad funcional, montaje/manipulación y accesorios incluidos
        para los salvavidas.
    lift_mechanism_type:
      name: Tipo de mecanismo de elevador
      description: Especifica el mecanismo que ayuda a subir/bajar o abrir/cerrar
        la cama abatible.
    lift_stand_support_point:
      name: Punto de apoyo del elevador o soporte
      description: Indica el punto del vehículo donde se apoya el elevador o soporte.
    lifting_gas_type:
      name: Tipo de gas de elevación
      description: Especifica el gas de elevación o medio de flotabilidad principal
        utilizado por el dirigible.
    lifting_support_type:
      name: Tipo de soporte de elevación
      description: Indica si el elevador se utiliza mediante rampas de acceso o si
        eleva el vehículo mediante brazos o apoyos que contactan el chasis o los puntos
        de elevación.
    ligature_and_cap_component_type:
      name: Tipo de componente de abrazadera/tapa
      description: Indica si el producto es una abrazadera, una tapa o un conjunto
        que incluye ambos.
    ligature_material:
      name: Material de la abrazadera
      description: Material principal de la abrazadera que entra en contacto con la
        caña y la sujeta (p. ej., metal, cuero, tela).
    ligature_plating_or_finish:
      name: Baño o acabado de la abrazadera
      description: Especifica el baño o acabado superficial aplicado a la abrazadera
        metálica del clarinete o a la tapa.
    ligature_reed_contact_style:
      name: Tipo de contacto con la caña de la abrazadera
      description: Especifica cómo la abrazadera entra en contacto con la caña (p.
        ej., contacto mínimo, multipunto o envolvente).
    ligature_screw_position_relative_to_reed:
      name: Posición de los tornillos de la abrazadera (en relación con la caña)
      description: Indica la posición de los tornillos de ajuste de la abrazadera
        con respecto a la caña o al lado orientado hacia el músico cuando está instalada
        en la boquilla.
    ligature_tension_adjustment_mechanism:
      name: Mecanismo de ajuste de la tensión de la abrazadera
      description: Describe cómo la abrazadera aplica o ajusta la presión sobre la
        caña (diseño de sujeción).
    ligature_tightening_mechanism_type:
      name: Tipo de mecanismo de ajuste de la abrazadera
      description: Especifica el mecanismo mediante el cual la abrazadera se ajusta
        alrededor de la boquilla y la caña (p. ej., tornillo simple, tornillo doble
        o palanca/liberación rápida).
    light_bar_housing_material:
      name: Material de la carcasa de la barra de luces
      description: Material principal de la carcasa o cuerpo de la barra de luces,
        lo que influye en la durabilidad y la disipación del calor.
    light_bar_lens_material:
      name: Material de la lente de la barra de luces
      description: Material principal de la lente/cubierta de la barra de luces, lo
        que puede afectar la resistencia a impactos y la claridad óptica.
    light_bar_mounting_location:
      name: Ubicación de montaje de la barra de luces
      description: Posición principal de montaje en el vehículo.
    light_stand_style:
      name: Tipo de soporte de iluminación
      description: Especifica el tipo de estructura o formato del soporte utilizado
        para sostener luces de efectos especiales (p. ej., trípode, barra en T, elevable
        por manivela), y no la superficie de instalación (pared/techo), que se contempla
        en el tipo de montaje.
    light_switch_function:
      name: Función del interruptor de luces
      description: Identifica qué circuitos o funciones de iluminación controla el
        interruptor.
    lighting_control_protocols_supported:
      name: Protocolos de control de iluminación compatibles
      description: Protocolos de control/red compatibles con el controlador además
        de, o en lugar de, DMX512.
    lighting_effects:
      name: Efectos de iluminación
      description: Especifica las funciones de iluminación integradas que mejoran
        la experiencia de juego o la estética.
    lighting_mode:
      name: Modo de iluminación
      description: Enumera los patrones de iluminación operativos disponibles, como
        luz fija, intermitente, estroboscópica o SOS.
    lily_variety:
      name: Variedad de lirio
      description: Especifica la variedad comercial o botánica del lirio vendido como
        flor cortada fresca (p. ej., asiático u oriental).
    limb_articulation:
      name: Articulación de las extremidades
      description: Indica el grado de flexibilidad o articulación de las extremidades
        del maniquí (ninguna, fija, semirrígida o totalmente articulada).
    limb_material:
      name: Material de las palas
      description: Material principal utilizado en las palas de un arco o una ballesta,
        lo que influye en el peso, la durabilidad, la vibración y el rendimiento general.
    lime_variety:
      name: Variedad de lima
      description: Identifica la variedad botánica o comercial específica de lima
        que se vende.
    line_buoyancy:
      name: Flotabilidad de la línea
      description: Describe si la línea trenzada flota o se hunde de forma natural
        y a qué velocidad, lo que influye en la presentación del señuelo y el manejo
        de la línea.
    line_purpose:
      name: Propósito de la línea
      description: Define la función prevista de la línea dentro del sistema del kite
        (p. ej., línea delantera de vuelo, línea de reducción de potencia o línea
        de bridaje).
    linen_finish_treatment:
      name: Acabado o tratamiento del lino
      description: Cualquier proceso de acabado aplicado al tejido de lino que modifique
        el tacto, la apariencia o el rendimiento.
    linen_weave_type:
      name: Tipo de tejido del lino
      description: Especifica la estructura del tejido de lino, lo que afecta a la
        textura, la transpirabilidad y la caída de la tela.
    liner_padding_type:
      name: Tipo de acolchado del forro
      description: Indica el tipo de construcción o acolchado del forro (p. ej., de
        malla, ligeramente acolchado o matelaseado).
    liner_shape:
      name: Forma del forro
      description: Describe la forma general del forro para saco de dormir, lo que
        ayuda a los clientes a elegir uno compatible con su saco y sus preferencias
        de comodidad.
    liner_type:
      name: Tipo de forro
      description: Indica si los pantalones cortos incluyen un forro interno y, si
        es así, de qué tipo.
    lining:
      name: Forro
      description: Indica si el bañador tiene forro y cómo está confeccionado, incluida
        la cobertura del forro en el interior de la prenda.
    lining_material:
      name: Material del forro
      description: Especifica el material utilizado en el forro interior del calzado,
        lo que influye en la comodidad, la transpirabilidad y la calidez.
    lining_type:
      name: Tipo de forro
      description: Especifica si la prenda de baño tiene forro y en qué medida está
        forrada.
    link_connection_style:
      name: Tipo de conexión del eslabón
      description: Clasifica cómo el eslabón se une a la cadena (p. ej., eslabón rápido
        o pasador de unión), lo que permite a los ciclistas elegir el método de instalación
        o el repuesto correctos.
    live_bait_form:
      name: Forma del cebo vivo
      description: Especifica la forma física o el estado de conservación del cebo,
        como vivo, congelado o seco.
    living_room_furniture_items_included:
      name: Muebles de sala de estar incluidos
      description: Especifica las piezas de mobiliario que forman parte del juego
        de sala, lo que ayuda a los compradores a comprender rápidamente qué componentes
        (p. ej., sofá, sofá de dos plazas o mesa de centro) se incluyen.
    load_mechanism:
      name: Mecanismo de carga
      description: Especifica el método principal mediante el cual se genera o añade
        resistencia a la máquina (p. ej., pila de pesas con selector, carga por discos
        o carga por bandas elásticas).
    lock_cylinder_type:
      name: Tipo de cilindro de cerradura
      description: Especifica el tipo de cilindro o núcleo de llave utilizado (relevante
        para la resistencia al ganzuado y las llaves de reemplazo).
    lock_security_level:
      name: Nivel de seguridad de la cerradura
      description: Describe las características de resistencia de la cerradura o el
        cilindro frente al ganzuado y la perforación.
    lock_system:
      name: Sistema de bloqueo
      description: Tipo de sistema de seguridad utilizado para mantener el elevador
        en altura.
    locker_bench_configuration:
      name: Configuración del banco para vestuario
      description: Describe la orientación o configuración estructural del banco para
        vestuario (p. ej., de un solo lado, isla de doble cara o montado en pared).
    locomotive_prototype_power_type:
      name: Tipo de propulsión de la locomotora prototipo
      description: Especifica el tipo de propulsión de la locomotora real representada
        por el modelo.
    locomotive_wheel_arrangement_whyte_notation:
      name: Disposición de las ruedas de la locomotora (notación Whyte)
      description: Disposición de ruedas de la locomotora prototipo (p. ej., 4-6-2
        Pacific).
    loft_bed_height_classification:
      name: Clasificación de altura de la cama alta
      description: Indica el tipo de altura general de la cama alta (baja, media,
        alta o extraalta), lo que ayuda a los compradores a adaptarla a la altura
        del techo y al espacio requerido debajo de la cama.
    logo_application_method:
      name: Método de aplicación del logo
      description: Describe cómo se aplica el escudo o logotipo escolar a la prenda
        (p. ej., bordado o estampado).
    logo_label_compatible_fabric_weight:
      name: Peso de tejido compatible con la etiqueta del logotipo
      description: Indica el gramaje recomendado del tejido para aplicar la etiqueta
        sin que se deforme o genere exceso de volumen.
    logo_label_edge_finish:
      name: Acabado del borde de la etiqueta con logotipo
      description: Especifica la construcción o el acabado del borde de la etiqueta,
        lo que influye en la resistencia al deshilachado y la comodidad en contacto
        con la piel.
    logo_label_print_production_method:
      name: Método de impresión/producción de la etiqueta con logotipo
      description: Indica cómo se aplica o se forma el logotipo sobre la superficie
        de la etiqueta.
    long_block_completeness:
      name: Integridad del bloque largo
      description: Especifica qué componentes principales se incluyen en el conjunto
        del bloque largo.
    long_john_pieces_included:
      name: Piezas de ropa interior térmica incluidas
      description: Aclara si el producto incluye solo la parte inferior, solo la superior
        o ambas piezas del conjunto.
    longan_variety:
      name: Variedad de longan
      description: Especifica el cultivar o la variedad comercial del fruto longan
        (p. ej., Kohala, Biew Kiew), lo que ayuda a los compradores a identificar
        las características deseadas de sabor, tamaño y dulzura.
    loom_accessories_included:
      name: Accesorios del telar incluidos
      description: Accesorios principales incluidos con el telar en la caja o el paquete.
    loom_finish:
      name: Acabado del telar
      description: El acabado superficial del telar (principalmente en telares de
        madera).
    loom_folding_portability_design_type:
      name: Tipo de diseño plegable/portátil del telar
      description: Indica si el telar se pliega o colapsa para facilitar el transporte
        o el almacenamiento compacto, y de qué manera.
    loom_frame_folding_design:
      name: Diseño plegable del bastidor del telar
      description: Especifica si el bastidor del telar de mesa se pliega, colapsa
        o desmonta para su almacenamiento o transporte, y de qué manera.”
    loom_tension_adjustment_method:
      name: Método de ajuste de tensión del telar
      description: Método principal utilizado para ajustar la tensión de la urdimbre
        en el telar.
    loom_tie_up_system:
      name: Sistema de amarre del telar
      description: Tipo de sistema de amarre o conexión utilizado entre los pedales,
        lizos y marcos (p. ej., Texsolv o cadena metálica).
    loquat_variety:
      name: Variedad de níspero
      description: Especifica el cultivar o la variedad del níspero, reflejando sus
        diferencias de tamaño, sabor, época de maduración y apariencia.
    lubricant_features:
      name: Características del lubricante
      description: Destaca las características de rendimiento, los aditivos o los
        beneficios especiales del lubricante.
    lubrication_requirement:
      name: Requisito de lubricación
      description: Indica si la banda de la cinta de correr viene pretratada/no requiere
        mantenimiento, o si necesita lubricación o encerado periódicos.
    lubrication_type:
      name: Tipo de lubricación
      description: Especifica el sistema de lubricación o engrase del buje y si está
        diseñado para recibir mantenimiento con grasa (p. ej., ranuras o grasera).
    lug_nut_seat_profile:
      name: Perfil de asiento de la tuerca de rueda
      description: Especifica el perfil de asiento de la tuerca requerido por la rueda
        para garantizar la compatibilidad correcta de las tuercas y una instalación
        segura.
    lumbar_support_type:
      name: Tipo de soporte lumbar
      description: Describe el tipo de soporte lumbar que incluye la silla (p. ej.,
        almohada desmontable, mecanismo ajustable o masaje).
    lunge_trainer_style:
      name: Tipo de entrenador respiratorio
      description: Define el diseño estructural de un entrenador respiratorio.
    lure_buoyancy:
      name: Flotabilidad del cebo
      description: Especifica cómo se comporta el señuelo en la columna de agua cuando
        está en reposo o durante la recogida (p. ej., flotando en la superficie, suspendido
        a media agua o hundiéndose).
    luster:
      name: Brillo
      description: Describe la forma en que la luz interactúa con la superficie del
        espécimen (p. ej., vítrea o metálica).
    lychee_cultivar:
      name: Cultivar de lichi
      description: Identifica la variedad o cultivar específico de lichi, como Brewster,
        Hak Ip o Mauritius, que pueden diferir en sabor, tamaño de la semilla, temporada
        de cosecha y precio.
    lyre_flip_folder_mounting_location:
      name: Ubicación de montaje de la lira/porta partituras abatible
      description: Indica en qué parte del instrumento o accesorio se monta la lira
        o el porta partituras abatible (p. ej., campana, tudel o soporte).
    lyrics_display_type:
      name: Tipo de visualización de la letra
      description: Indica cómo se muestran las letras de las canciones (si es compatible)
        durante el karaoke.
    magazine_compatibility:
      name: Compatibilidad de cargadores
      description: Identifica los calibres o tipos de cargador principales para los
        que están diseñados los bolsillos integrados del chaleco.
    magnet_requirement:
      name: Requisito de imán
      description: Indica si el sensor necesita un imán externo para funcionar.
    magnet_toy_storage_included:
      name: Incluye almacenamiento magnético para juguetes
      description: Tipo de almacenamiento o estuche incluido con el juguete magnético
        para organización de escritorio y transporte.
    malanga_variety:
      name: Variedad de malanga
      description: Identifica la variedad específica de malanga o raíz de taro que
        se vende para ayudar a los compradores a elegir el sabor, color o uso culinario
        deseados.
    malt_color_rating_system:
      name: Sistema de clasificación del color de la malta
      description: Especifica a qué escala de color corresponde el color indicado
        (Lovibond, SRM o EBC).
    malt_crush:
      name: Molienda de la malta
      description: Indica si la malta base se vende entera/sin moler o previamente
        triturada, y en este último caso, el tipo de molienda.
    malt_form:
      name: Forma de la malta
      description: Indica si el producto se vende en grano entero o procesado para
        hacer puré (p. ej., triturado).
    malt_intended_use:
      name: Uso previsto de la malta
      description: Uso principal previsto para la malta (elaboración de cerveza, destilación
        o uso dual).
    malt_treatment:
      name: Tratamiento de la malta
      description: Describe cómo se procesó el grano o la malta más allá del secado
        estándar en horno (procesos especiales comunes).
    malt_usage_purpose:
      name: Propósito de uso de la malta
      description: Describe la principal contribución funcional de una malta especial
        a una receta de cerveza.
    man_overboard_system_type:
      name: Tipo de sistema de hombre al agua
      description: Especifica la categoría principal de solución hombre al agua (MOB)
        proporcionada por el producto.
    mandolin_back_sides_wood:
      name: Madera de las tapas trasera y laterales de la mandolina
      description: Especifica la especie de madera utilizada para el fondo y los aros
        de la mandolina.
    mandolin_body_top_wood:
      name: Madera de la tapa superior de la mandolina
      description: Madera o material principal utilizado para la tapa armónica de
        la mandolina.
    mandolin_bridge_type:
      name: Tipo de puente de la mandolina
      description: Especifica el estilo de puente utilizado en la mandolina.
    mandolin_pickup_configuration:
      name: Configuración de micrófonos de la mandolina
      description: Indica si la mandolina incluye electrónica y qué tipo de sistema
        de captación tiene instalado.
    mandolin_string_configuration:
      name: Configuración de cuerdas de la mandolina
      description: Especifica la configuración de cuerdas de la mandolina según el
        número total de cuerdas y el número de órdenes (p. ej., 8 cuerdas y 4 órdenes).
    mangosteen_variety:
      name: Variedad de mangostán
      description: Identifica la especie o el cultivo específico del mangostán, o
        de una fruta Garcinia estrechamente relacionada, que se vende.
    mannequin_style:
      name: Tipo de maniquí
      description: Describe el diseño estructural o el estilo de construcción del
        maniquí de entrenamiento.
    manufacturing_process:
      name: Proceso de fabricación
      description: Método de producción principal del cuerpo o la bobina del carrete
        (p. ej., mecanizado por CNC o fundición a presión).
    map_coverage_sky_planet_body:
      name: Cobertura cartográfica (cielo/cuerpo planetario)
      description: 'Indica lo que representa el mapa: el cielo nocturno (constelaciones)
        o un cuerpo planetario específico.'
    map_format:
      name: Formato de mapa
      description: Define la presentación física o digital de los mapas y guías de
        caza.
    map_sensor_output_signal_type:
      name: Tipo de señal de salida del sensor MAP
      description: Especifica el tipo de señal de salida que el sensor MAP proporciona
        a la unidad de control del motor (ECU).
    map_size_sheet:
      name: Tamaño del mapa (hoja)
      description: Especifica el tamaño final de la hoja de la lámina de mapa, póster
        o planisferio para ayudar con la exhibición y la compatibilidad (tamaño del
        marco, espacio en la pared).
    marabou_feather_form:
      name: Forma de la pluma marabú
      description: Indica el formato en el que se vende el producto de pluma de marabú.
    marabou_feather_treatment:
      name: Tratamiento de la pluma de marabú
      description: Describe cómo se procesó o acabó la pluma marabú para su uso en
        manualidades.
    marble_track_set_feature_modules:
      name: Módulos funcionales del set de pista de canicas
      description: Destaca los módulos funcionales especiales incluidos en el set
        (p. ej., elevador, lanzador o interruptores).
    marine_flare_certification_standard:
      name: Certificación o estándar de la bengala marina
      description: Indica qué certificaciones o normas de seguridad marítima declara
        cumplir la bengala.
    marine_safety_standard_compliance:
      name: Cumplimiento de normas de seguridad marítima
      description: Indica qué normas o certificaciones formales de seguridad acuática
        cumple el accesorio.
    marine_transmission_type:
      name: Tipo de transmisión marina
      description: Especifica el tipo de transmisión marina acoplada al motor interno
        (p. ej., transmisión directa o transmisión en V).
    marker_action_type:
      name: Tipo de acción del marcador
      description: Describe el mecanismo fundamental de disparo/funcionamiento del
        marcador.
    marker_caliber:
      name: Calibre del marcador
      description: Especifica el diámetro de las bolas de pintura que el marcador
        está diseñado para disparar.
    marking_durability:
      name: Durabilidad del marcado
      description: Indica cuánto tiempo se espera que la línea pintada permanezca
        visible en condiciones normales, como temporal (hasta 3 semanas), semipermanente
        (hasta 6 meses) o permanente (más de 6 meses).
    marking_tip_type:
      name: Tipo de inserto de marcado
      description: Tipo de inserto que el compás utiliza para dibujar (p. ej., portaminas,
        tinta o punta de trazado).
    marshmallow_processing_method:
      name: Método de procesamiento del malvavisco
      description: Describe cualquier procesamiento especial aplicado a los malvaviscos
        que afecte la textura, la vida útil o el sabor.
    marshmallow_size:
      name: Tamaño del malvavisco
      description: Clasifica el tamaño relativo de las unidades de malvavisco.
    martial_arts_belt_rank:
      name: Rango de cinturón de artes marciales
      description: Indica el nivel de habilidad o rango representado por el color
        del cinturón o una combinación especial de colores.
    mask_bib_type:
      name: Tipo de babero de la máscara
      description: Especifica el tipo de babero de la máscara de esgrima, como tela
        estándar, conductor, desmontable o sin babero.
    mask_cage_material:
      name: Material de la jaula de la máscara
      description: Material utilizado específicamente para la jaula facial o el armazón
        de la máscara.
    mask_goggle_design:
      name: Diseño de máscara/gafas
      description: Define el diseño estructural general o el estilo de cobertura del
        equipo de protección.
    mask_skirt_material:
      name: Material del faldón de la máscara
      description: Identifica el material de la falda flexible que brinda el sellado
        hermético entre la máscara y el rostro.
    mask_strap_material:
      name: Material de la correa de la máscara
      description: Especifica el material de la correa que sujeta la máscara a la
        cabeza.
    mass_air_flow_sensor_measurement_type:
      name: Tipo de medición del sensor de flujo de masa de aire
      description: Especifica la tecnología de detección o el estilo de salida que
        utiliza el sensor MAF.
    mass_air_flow_sensor_mounting_type:
      name: Tipo de montaje del sensor de flujo de masa de aire
      description: Describe cómo se monta o instala el sensor MAF o el conjunto del
        sensor en el sistema de admisión.
    massage_feature:
      name: Función de masaje
      description: Indica si la base ajustable incluye una función de masaje integrada
        y, si es así, cuántas zonas de masaje proporciona.
    mast_attachment_interface:
      name: Interfaz de fijación del mástil
      description: Especifica el estándar de conexión entre el fuselaje y el mástil,
        lo que ayuda a los compradores a garantizar la compatibilidad entre componentes.
    mast_base_type:
      name: Tipo de base del mástil
      description: Identifica la interfaz de montaje que conecta el mástil a la tabla
        o el adaptador.
    mast_bend_curve:
      name: Curva de flexión del mástil
      description: Patrón de flexión del mástil que determina la compatibilidad con
        la vela y el comportamiento de manejo.
    mast_diameter_type:
      name: Tipo de diámetro del mástil
      description: Clasificación estandarizada del diámetro del mástil de windsurf
        (p. ej., RDM, SDM o MDM) utilizada para verificar la compatibilidad.
    mat_backing_type:
      name: Tipo de base de la alfombrilla
      description: Especifica el tipo de soporte en la parte inferior de la alfombrilla
        que ayuda a mantenerla en su lugar sobre distintas superficies.
    mat_installation_method:
      name: Método de instalación de la alfombra
      description: Indica cómo se instala o se fija la alfombrilla en su lugar.
    mat_style:
      name: Tipo de alfombrilla
      description: Define el estilo estructural o formato de la alfombrilla (p. ej.,
        alfombrilla plegable, loseta encastrable o colchoneta de caída).
    maternity_panel_type:
      name: Tipo de panel de maternidad
      description: Indica el tipo de panel elástico o pretina diseñado para adaptarse
        al crecimiento durante el embarazo.
    maternity_waistband_style:
      name: Estilo de cintura de maternidad
      description: Indica el diseño y la ubicación de la cintura o panel abdominal
        específico de los pantalones de maternidad, y describe cómo la prenda brinda
        soporte al vientre en crecimiento.
    mattress_top_type:
      name: Tipo de cubierta de colchón
      description: Especifica el tipo de cubierta o la construcción de la superficie
        del colchón, como la capa adicional "pillow" o la superficie lisa "tight".
    maturation_vessel_material:
      name: Material del recipiente de maduración
      description: Especifica el material principal del recipiente o barril utilizado
        para el añejamiento del shochu.
    maximum_quilt_size_supported:
      name: Tamaño máximo de acolchado compatible
      description: Tamaño máximo de acolchado o proyecto que puede admitir el bastidor
        (normalmente en términos de tamaño de cama o ancho máximo).
    meal_course:
      name: Tipo de comida
      description: Identifica la ocasión típica para el consumo del producto.
    meal_preparation_state:
      name: Estado de preparación de comida
      description: Indica cuánta preparación se requiere antes del consumo (p. ej.,
        listo para comer, kit de comida).
    meat_processing_state:
      name: Estado de procesamiento de carne
      description: Indica el grado de cocción o curado aplicado al producto de carne
        antes de comercializarse.
    meat_quality_grade:
      name: Grado de calidad de la carne
      description: Indica el grado o la clasificación de calidad asignados a la carne
        por una autoridad de clasificación reconocida (p. ej., USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Declaración sobre el método de cría del animal
      description: Destaca las afirmaciones comunes relacionadas con el bienestar
        animal o las prácticas de crianza asociadas con la carne (p. ej., alimentado
        con pasto o de libre pastoreo).
    mechanical_loom_assembly_status:
      name: Estado del ensamblaje del telar mecánico
      description: Indica cómo se envía o se entrega el telar en términos del montaje
        requerido.
    mechanical_loom_weaving_type:
      name: Tipo de tejido de telar mecánico
      description: Mecanismo o tipo principal de tejido compatible con el telar.
    mechanical_puzzle_primary_mechanism:
      name: Mecanismo principal de rompecabezas mecánico
      description: Interacción o mecanismo principal utilizado para resolver el rompecabezas
        mecánico.
    mechanical_puzzle_solution_format:
      name: Formato de solución de rompecabezas mecánicos
      description: Formato en el que se proporcionan las pistas o soluciones cuando
        se incluyen.
    medal_attachment_style:
      name: Tipo de sujeción de la medalla
      description: Especifica cómo se debe usar o exhibir la medalla (p. ej., con
        cinta para el cuello, con broche trasero).
    medal_award_level:
      name: Nivel de premiación de la medalla
      description: Especifica el nivel de premiación que representa la medalla (p.
        ej., 1er lugar, participante).
    medal_finish:
      name: Acabado de la medalla
      description: Especifica el acabado superficial de la medalla (brillo/textura
        visual), independientemente del material.
    medal_packaging:
      name: Embalaje de medallas
      description: Indica el tipo de embalaje de presentación incluido con la medalla.
    melodica_accessory_set_included:
      name: Juego de accesorios para melódica incluidos
      description: Indica qué accesorios comunes se incluyen en el paquete de la melódica.
    melodica_air_chamber_material:
      name: Material de la cámara de aire de la melódica
      description: Material de la cámara de aire/cuerpo de la melódica (ABS, madera,
        etc.) cuando los vendedores lo distinguen de otras partes.
    melodica_included_accessories:
      name: Accesorios incluidos con la melódica
      description: Accesorios incluidos con el telar en la caja.
    melodica_key_color_scheme:
      name: Esquema de colores de las teclas de la melódica
      description: Esquema de color de las teclas (no del cuerpo), lo cual influye
        en la legibilidad (especialmente para niños/principiantes).
    melodica_mouthpiece_configuration:
      name: Configuración de la boquilla de la melódica
      description: Indica qué interfaces de soplado se incluyen/utilizan para tocar
        la melódica.
    melodica_mouthpiece_type:
      name: Boquilla de la melódica
      description: Tipo de interfaz de soplado incluida con la melódica (boquilla
        y/o tubo flexible).
    melodica_reed_plate_material:
      name: Material de las placas de lengüeta de la melódica
      description: Material de la placa de lengüetas (distinto del material del cuerpo
        general del instrumento), que puede afectar la durabilidad y el tono.
    melodica_size_class:
      name: Clase de tamaño de la melódica
      description: Clase general de tamaño/portabilidad de una melódica, normalmente
        basada en la cantidad de teclas y el formato (p. ej., modelos mini/estudiante
        vs. estándar vs. de rango extendido).
    melon_variety:
      name: Variedad de melón
      description: Especifica el tipo específico de melón para ayudar a los compradores
        a identificar rápidamente su variedad preferida.
    memory_foam_infusion_material:
      name: Material de infusión de espuma viscoelástica
      description: Identifica las sustancias especiales infusionadas en la espuma
        viscoelástica para refrigeración, control de olores o control antimicrobiano.
    memory_wire_gauge:
      name: Calibre del alambre con memoria
      description: Especifica el tamaño AWG (American Wire Gauge) del alambre con
        memoria.
    memory_wire_project_size:
      name: Tamaño del proyecto para alambre con memoria
      description: Especifica el tipo de pieza o el diámetro de espiral para los cuales
        está diseñado el alambre con memoria (p. ej., pulsera, collar, anillo).
    metal_purity:
      name: Pureza del metal
      description: Indica la fineza o grado de pureza del metal utilizado en la joyería,
        normalmente expresado en quilates (K) o partes por mil.
    metrics_counted:
      name: Métricas contabilizadas
      description: Enumera las estadísticas o eventos individuales que el contador
        está diseñado para registrar.
    metronome_display_style:
      name: Tipo de visualización del metrónomo
      description: Especifica cómo se muestra o se indica el tempo al usuario (aguja/péndulo,
        LED/LCD numérico, luz intermitente).
    metronome_output_method:
      name: Método de salida del metrónomo
      description: Especifica los métodos de salida disponibles para la señal de sonido/ritmo
        del metrónomo.
    microphone_toy_feature_set:
      name: Conjunto de características del micrófono de juguete
      description: Funciones principales de juego del micrófono de juguete, (efectos
        de voz, amplificación, grabación, etc.).
    midi_output_type:
      name: Tipo de salida MIDI
      description: Especifica los tipos de salida MIDI que proporcionan los módulos
        de disparo.
    military_branch:
      name: Rama militar
      description: Identifica la rama militar que inspira la creación del uniforme.
    milk_base_type:
      name: Tipo de base de leche
      description: Especifica el tipo de leche principal o alternativa utilizado en
        la bebida, si la hubiera.
    milk_feeding_method:
      name: Método de alimentación de la leche
      description: Indica cómo fueron alimentados los animales de origen (p. ej.,
        con pasto o con granos), lo que puede influir en el sabor y el perfil nutricional
        de la leche.
    milk_processing_method:
      name: Método de procesamiento de la leche
      description: Especifica el tratamiento o la técnica de procesamiento a la que
        ha sido sometida la leche, lo que influye en su seguridad, vida útil y propiedades
        nutricionales.
    milk_source_animal:
      name: Animal de origen de la leche
      description: Identifica al animal del que se obtuvo la leche, lo que ayuda a
        los consumidores a seleccionar productos lácteos de origen animal, ya sean
        de vaca, cabra, búfala u otros.
    millet_processing_method:
      name: Método de procesamiento del mijo
      description: Indica el método de procesamiento principal o el estado del grano
        de mijo (p. ej., sin pulir, descascarillado, germinado).
    millet_variety:
      name: Variedad de mijo
      description: Identifica el tipo específico de grano de mijo contenido en el
        producto (p. ej., perla, cola de zorro, dedo).
    milling_process:
      name: Proceso de molienda
      description: Indica el método de producción utilizado para moler la harina,
        lo que puede influir en el sabor, la exposición al calor y el perfil nutricional.
    mint_mark:
      name: Marca de ceca
      description: Marca de ceca tal como aparece en la moneda (si corresponde).
    mirror_configuration:
      name: Configuración del espejo
      description: Especifica el estilo o la estructura del espejo incluido con el
        juego de tocador.
    mirror_coverage:
      name: Cobertura del espejo
      description: Describe la extensión de los paneles con espejo en las puertas
        corredizas.
    mirror_curvature_type:
      name: Tipo de curvatura de espejo
      description: Especifica si la superficie del espejo es convexa, plana o cóncava,
        lo que afecta el campo de visión.
    mirror_mounting_location:
      name: Ubicación de montaje del espejo
      description: Especifica en qué parte de la bicicleta o del ciclista debe colocarse
        el espejo.
    mirror_shape:
      name: Forma del espejo
      description: Indica la forma geométrica o el estilo del espejo principal incluido
        con el juego de tocador.
    mix_ratio:
      name: Proporción de mezcla
      description: Especifica la proporción recomendada de dilución entre refrigerante
        y agua (para concentrados) o confirma la proporción fija de premezcla para
        productos prediluidos.
    mma_glove_type:
      name: Tipo de guante de MMA
      description: Indica el uso o estilo principal del guante para entrenamiento
        o competición de MMA.
    mobility_features:
      name: Características de movilidad
      description: Indica los elementos integrados de movimiento o portabilidad, como
        ruedas o patas plegables.
    model_aircraft_assembly_level:
      name: Nivel de ensamblaje de la maqueta de avión
      description: Indica cuánto ensamblaje se requiere para poder usar la aeronave.
    model_making_kit_items_included:
      name: Artículos incluidos en el kit de modelismo
      description: Indica lo que incluye el kit o paquete de modelismo (p. ej., pintura,
        pegamento, pincel).
    model_making_product_type:
      name: Tipo de producto de modelismo
      description: Identifica la categoría principal del artículo de modelismo (kit,
        accesorio, herramienta o material) para facilitar la navegación y el filtrado
        entre distintos tipos de productos.
    model_rocket_kit_contents:
      name: Contenido del kit de cohete de modelismo
      description: Indica si el producto es un kit completo de cohete de modelismo
        multietapa o un kit de complementos, módulos o piezas (p. ej., componentes
        de etapa de impulso o de sustentación).
    model_rocket_kit_format:
      name: Formato del kit de cohete de modelismo
      description: Especifica si el cohete se vende como un kit y su nivel de preparación
        para el montaje.
    model_rocket_motor_impulse_class:
      name: Clase de impulso del motor del cohete de modelismo
      description: Indica la clase estandarizada de impulso total del motor del cohete
        de modelismo (p. ej., A, B, C...).
    model_rocket_motor_mount_size:
      name: Tamaño del soporte del motor del cohete de modelismo
      description: Especifica el diámetro de la carcasa del motor compatible con el
        soporte del motor del cohete.
    model_rocket_power_source_required:
      name: Requisito de una fuente de alimentación para el cohete de modelismo
      description: Indica si el producto requiere baterías o alimentación externa
        y de qué tipo.
    model_rocket_propellant_type:
      name: Tipo de propulsor del cohete de modelismo
      description: Identifica el tipo de propulsor o sistema de motor utilizado en
        el cohete.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Se recomienda Launch un cohete modelo con una varilla o riel de tamaño
      description: Especifica el diámetro de la varilla de lanzamiento o el tamaño
        del riel que admite el cohete (p. ej., varilla de 1/8 pulg., riel de lanzamiento
        1010).
    model_rocket_recovery_method:
      name: Método de recuperación del cohetes de modelismo
      description: Sistema principal de recuperación utilizado para que el cohete
        regrese de forma segura después del vuelo.
    model_rocket_recovery_system_type:
      name: Tipo de sistema de recuperación del cohete de modelismo
      description: Especifica el método principal de recuperación utilizado para que
        el cohete regrese de forma segura después del vuelo.
    model_rocket_staging:
      name: Etapas del cohete de modelismo
      description: Indica cuántas etapas propulsadas tiene el cohete para el vuelo.
    model_train_accessory_electrical_connection_type:
      name: Tipo de conexión eléctrica de accesorios para trenes de modelismo
      description: Especifica el tipo de conector o terminal utilizados para conectar
        accesorios eléctricos de trenes de modelismo a un diseño (cuando corresponda).
    model_train_coupler_type:
      name: Tipo de acoplamiento para trenes de modelismo
      description: Especifica el estándar de acoplamiento instalado en el material
        rodante o la locomotora del tren de modelismo.
    model_train_gauge:
      name: Escala de vía del tren de modelismo
      description: Especifica el sistema de escala/ancho de vía ferroviaria para el
        que está diseñado el accesorio (cuando corresponda), lo que ayuda a garantizar
        la compatibilidad física con las vías y la maqueta del usuario.
    model_train_lighting_features:
      name: Funciones de iluminación del tren de modelismo
      description: Especifica la funcionalidad de iluminación incluida en el tren
        o la locomotora de modelismo.
    model_train_power_pickup_method:
      name: Método de alimentación del tren de modelismo
      description: Especifica cómo el modelo recibe energía para su funcionamiento
        (seguimiento de energía, batería, etc.).
    model_train_scale:
      name: Escala del tren de modelismo
      description: Especifica cómo recibe energía el modelo para su funcionamiento
        (alimentación por vía, batería, etc.).
    model_train_sound_features:
      name: Funciones de sonido del tren de modelismo
      description: Indica si el modelo incluye efectos de sonido y de qué tipo.
    model_train_track_gauge:
      name: Ancho de vía del tren de modelismo
      description: Especifica el estándar de ancho de vía o sistema de vías sobre
        el cual funciona el modelo (p. ej., vía estándar, variantes de vía estrecha
        o anchos específicos por marca o sistema, según corresponda).
    modeling_dough_base_material:
      name: Material base de la para modelar
      description: Composición o material principal de la masa para modelar (p. ej.,
        a base de trigo/harina o de polímeros).
    modeling_dough_features:
      name: Características de la masa para modelar
      description: Características funcionales clave de la masa para modelar que los
        compradores usan para filtrar.
    modification_level:
      name: Nivel de modificación
      description: Indica el grado de modificación de la malta (qué tan descompuestos
        están el endospermo y las proteínas de la cebada), lo que normalmente se indica
        como poco modificada, modificada o sobremodificada.
    molasses_base_ingredient:
      name: Ingrediente base de la melaza
      description: Identifica la fuente vegetal o frutal principal a partir de la
        cual se produce la melaza.
    molasses_grade:
      name: Grado de melaza
      description: Clasifica la melaza según su etapa de extracción o refinamiento,
        lo que afecta directamente la intensidad del sabor, el color y el perfil nutricional.
    mold_material:
      name: Material del molde
      description: Composición principal del molde (p. ej., silicona, plástico, metal).
    molle_compatibility:
      name: Compatibilidad con MOLLE
      description: Indica si el chaleco cuenta con correas MOLLE/PALS para acoplar
        bolsillos y accesorios modulares.
    motor_belt_type:
      name: Tipo de correa del motor
      description: Define el diseño o perfil de la correa utilizada en el sistema
        de transmisión de la cinta de correr.
    motor_configuration:
      name: Configuración del motor
      description: Indica cuántos motores de tracción independientes utiliza el scooter.
    motor_mounting_configuration:
      name: Configuración de montaje del motor
      description: Describe cómo se encuentra montado o implementado el motor en el
        kit de conversión para un scooter.
    motor_mounting_position:
      name: Posición de montaje del motor
      description: Indica en qué parte del scooter eléctrico está montado el motor,
        como en el buje de la rueda delantera, el buje de la rueda trasera, doble
        buje o transmisión central.
    motor_position:
      name: Posición del motor
      description: Indica en qué parte de la bicicleta eléctrica se encuentra el motor,
        lo que influye en la manipulación y el mantenimiento.
    motor_vehicle_a_v_integration_features:
      name: Funciones de integración de A/V para vehículos
      description: Funciones de integración con smartphones y sistemas del vehículo
        compatibles con la unidad principal (p. ej., Apple CarPlay, Android Auto,
        MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Aplicación/posición de la bombilla para vehículos
      description: Especifica la posición o función de iluminación del vehículo para
        la que está diseñada la bombilla (p. ej., luz baja, luz de freno).
    motor_vehicle_bulb_approval_standard:
      name: Norma de homologación de la bombilla para vehículos
      description: Indica la certificación o aprobación reglamentaria para uso vial
        en el mercado de destino.
    motor_vehicle_oxygen_sensor_bank:
      name: Banco del sensor de oxígeno del vehículo a motor
      description: Indica con qué bancada de cilindros del motor es compatible el
        sensor de oxígeno (p. ej., bancada 1 o bancada 2) en motores en V o bóxer;
        usar “No aplica” para motores en línea.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Cantidad de cables del sensor de oxígeno del vehículo
      description: Cantidad de cables en el arnés del sensor de oxígeno.
    motor_vehicle_oxygen_sensor_position:
      name: Posición del sensor de oxígeno del vehículo a motor
      description: Especifica en qué parte del sistema de escape está instalado el
        sensor de oxígeno (O2) en relación con el convertidor catalítico.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Número del sensor de oxígeno para vehículos
      description: Indica el número de sensor (p. ej., Sensor 1 o Sensor 2) en una
        determinada bancada o posición.
    motor_vehicle_oxygen_sensor_type:
      name: Tipo de sensor de oxígeno del vehículo a motor
      description: Especifica el diseño o la tecnología del sensor de oxígeno.
    motor_vehicle_paint_application_method:
      name: Método de aplicación de pintura para vehículos a motor
      description: Indica cómo se debe aplicar la pintura en la superficie del vehículo.
    motor_vehicle_paint_system_step:
      name: Etapa del sistema de pintura para vehículos
      description: Indica para qué etapa o componente de un sistema de repintado automotriz
        está destinado el producto (p. ej., imprimación, capa base, barniz transparente).
    motor_vehicle_speaker_mounting_type:
      name: Tipo de montaje de altavoz para vehículos
      description: Indica cómo se debe instalar el altavoz en el vehículo (factor
        de forma de montaje).
    motor_vehicle_subwoofer_size:
      name: Tamaño del subwoofers del vehículo a motor
      description: Diámetro nominal del subwoofer (p. ej., 8, 10 o 12 pulgadas), lo
        que permite garantizar la compatibilidad con el espacio del vehículo y la
        caja acústica.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Configuración de bobina móvil del subwoofer para vehículos a motor
      description: Cantidad o configuración de bobinas móviles utilizadas para adaptarse
        a las opciones de cableado del amplificador (p. ej., SVC vs. DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedancia de la bobina móvil del subwoofer del vehículo a motor (por
        bobina)
      description: Valor de impedancia de cada bobina móvil (no de la carga final
        cableada), que se utiliza para cálculos de cableado.
    motor_vehicle_voltage_regulator_type:
      name: Tipo regulador de voltaje para vehículos de motor
      description: Indica la tecnología o el formato del regulador utilizado en vehículos
        a motor.
    motorcycle_armor_certification_standard:
      name: Estándar de certificación de la protección para motocicleta
      description: Indica las normas de seguridad oficiales con las que el protector
        se encuentra certificado (p. ej., EN 1621-2 para protectores de espalda, EN
        1621-3 para protectores de pecho).
    motorcycle_cover_size_class:
      name: Tamaño de funda para motocicleta
      description: Categoría de tamaño estandarizada según el tipo o la longitud de
        motocicleta para la que está diseñada la funda.
    motorcycle_glove_certification_standard:
      name: Norma de certificación de guantes para motocicleta
      description: Especifica la certificación o norma de protección que cumplen los
        guantes (p. ej., niveles EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Confección impermeable de los guantes para motocicleta
      description: Especifica el tipo de sistema impermeable utilizado en los guantes
        (si corresponde).
    motorcycle_guard_coverage_area:
      name: Zona de cobertura del protector para motocicleta
      description: Indica el área de cobertura principal del producto (codo, muñeca,
        antebrazo, combinación).
    motorcycle_kidney_belt_construction_type:
      name: Tipo de diseño de la faja lumbar para motocicleta
      description: Indica el tipo de diseño de la faja, lo que afecta la rigidez,
        la ventilación y la protección.
    motorcycle_kidney_belt_purpose:
      name: Uso de la faja lumbar para motocicleta
      description: Identifica el tipo de conducción o situación principal para la
        que está diseñada la faja lumbar.
    motorcycle_luggage_capacity_class:
      name: Capacidad de equipaje para motocicleta
      description: Indica la capacidad del equipaje mediante un rango de litros.
    motorcycle_luggage_mounting_system:
      name: Sistema de fijación de equipaje para motocicletas
      description: Sistema utilizado para sujetar la bolsa o alforja a la motocicleta
        (p. ej., correas de sujeción o sistema de liberación rápida montado en soporte).
    motorcycle_luggage_side:
      name: Lado del equipaje para motocicleta
      description: En alforjas o maletas laterales, indica si el artículo corresponde
        al lado izquierdo, al lado derecho o ambos.
    motorcycle_protective_gear_size_system:
      name: Sistema de tamaños de equipamiento de protección para motocicleta
      description: Indica el sistema de tallas utilizado en el producto (p. ej., tallas
        alfabéticas, numéricas o talla única).
    motorcycle_rack_carrier_style:
      name: Tipo de soporte para motocicleta
      description: Describe el tipo de soporte utilizado para transportar una motocicleta
        o scooter (plataforma, riel, con asistencia de elevación, etc.).
    motorcycle_riding_discipline:
      name: Tipo de conducción de motocicletas
      description: Identifica la disciplina de manejo o uso principal para el que
        está diseñado el protector cervical.
    motorcycle_tire_speed_rating:
      name: Índice de velocidad de los neumáticos de motocicleta
      description: Identifica la velocidad máxima sostenida para la que está homologado
        el neumático, utilizando el código estándar de letras (p. ej., H, V, W).
    motorsport_window_net_certification:
      name: Certificación de red de ventana para automovilismo
      description: Certificación u homologación de seguridad para competición que
        cumple la red de ventana (p. ej., SFI o FIA), incluida la especificación correspondiente
        cuando corresponda.
    mound_usage_type:
      name: Tipo de uso del montículo
      description: Identifica el entorno de uso previsto del montículo, como práctica,
        juego, zona de calentamiento o multipropósito.
    mount_attachment_method:
      name: Método de sujeción de montaje
      description: Especifica cómo se fija el soporte a la superficie o estructura
        del vehículo.
    mountainboard_truck_type:
      name: Tipo de eje de mountainboard
      description: Clasifica el tipo de ejes incluidos en la tabla, lo que afecta
        la respuesta de giro y la durabilidad.
    mounting_attachment_method:
      name: Método de montaje o fijación
      description: Indica cómo está diseñado el soporte o la bolsa para fijarse a
        un tambor, soporte, cinturón u otra superficie.
    mounting_attachment_type:
      name: Tipo de montaje o sujeción
      description: Indica cómo el accesorio de transmisión se conecta o se integra
        con la rueda de hilar.
    mounting_hardware_included_for_installation:
      name: Incluye hardware de montaje (para la instalación)
      description: Indica si el producto incluye los accesorios de montaje necesarios
        para instalar el asiento trasero (p. ej., soportes, tornillos, rieles).
    mounting_location:
      name: Ubicación de montaje
      description: Especifica el lugar previsto en el equipo o el cuerpo donde se
        debe colocar la luz o el reflector (p. ej., horquilla delantera, casco, radios
        de la rueda).
    mounting_method:
      name: Método de montaje
      description: Indica cómo se monta o se fija el soporte para baquetas o escobillas
        (p. ej., con abrazadera, correa, adhesivo).
    mounting_position:
      name: Posición de montaje
      description: Especifica dónde se debe montar o instalar el freno de mano dentro
        del habitáculo del vehículo.
    mounting_rail_type:
      name: Tipo de riel de montaje
      description: Especifica el estándar de riel o interfaz al que se acopla el accesorio,
        como Picatinny o M-LOK.
    mounting_receiver_size:
      name: Tamaño del receptor de enganche
      description: Tamaño del receptor de enganche requerido para portaequipajes montados
        en enganche.
    mounting_storage_type:
      name: Tipo de montaje o almacenamiento
      description: Indica cómo se debe colocar o guardar el dispositivo en la embarcación
        o en la persona.
    mouth_grip_type:
      name: Tipo de boquilla
      description: Describe el tipo de agarre o protector bucal del silbato para mayor
        comodidad e higiene.
    mouthguard_mold_type:
      name: Tipo de moldeado del protector bucal
      description: Describe cómo se ajusta el protector bucal a los dientes del atleta
        (p. ej., hervir y morder, ajuste dental personalizado).
    mouthpiece_facing_length:
      name: Longitud de apertura de la boquilla
      description: Indica la categoría de longitud de la curva de apertura (“lay”)
        de la boquilla (no la longitud total de la boquilla), lo que influye en la
        respuesta, la resistencia y la compatibilidad con la caña.
    mouthpiece_material:
      name: Material de la boquilla
      description: Especifica el material de la boquilla o punta en contacto con la
        boca del silbato enrollable , que puede diferir del material del cuerpo principal.
    mouthpiece_shank_receiver_size:
      name: Tamaño del vástago/receptor de la boquilla
      description: Especifica el estándar de receptor o vástago de boquilla compatible
        con el fliscorno.
    mouthpiece_shank_size:
      name: Tamaño del vástago de la boquilla
      description: Especifica el estándar de ajuste del vástago o receptor de la boquilla
        para garantizar la compatibilidad con el instrumento de viento correspondiente.
    mouthpiece_shank_type:
      name: Tipo del vástago de la boquilla
      description: Especifica el estándar de receptor o vástago de la boquilla para
        garantizar la compatibilidad (cuando corresponda).
    mouthpiece_style:
      name: Estilo de boquilla
      description: Clasifica el diseño o la forma de la boquilla del freno, lo que
        influye en los puntos de presión, la firmeza y la preferencia del caballo.
    mouthpiece_type:
      name: Tipo de boquilla
      description: Tipo de boquilla en el extremo de soplado (integrada, desmontable
        o de acople).
    movement_mechanism:
      name: Mecanismo de movimiento
      description: Define cómo se mueve el asiento durante el uso (balanceo, deslizamiento,
        mecedora, etc.).
    muffin_size:
      name: Tamaño de la magdalena
      description: Clasifica el formato de tamaño físico del muffin (p. ej., mini,
        estándar, grande).
    mushroom_variety:
      name: Variedad de hongo
      description: Identifica la especie o variedad específica de hongo o trufa contenida
        en el producto (p. ej., shiitake, seta de cardo, trufa negra).
    music_stand_desk_tilt_adjustment:
      name: Ajuste de inclinación del atril
      description: Indica si se puede ajustar el ángulo del escritorio y cómo hacerlo.
    music_stand_intended_use:
      name: Uso previsto del atril
      description: Indica el entorno o uso principal previsto para el soporte.
    musical_block_pitch_type:
      name: Tipo de tono de bloque musical
      description: Describe si el bloque musical produce una altura definida (afinada)
        o indefinida.
    musical_box_mechanism_type:
      name: Tipo de mecanismo de caja musical
      description: Indica cómo la caja musical produce o reproduce el sonido (p. ej.,
        mecanismo a cuerda o reproducción electrónica).
    musical_keyboard_case_fit_type:
      name: Tipo de ajuste de la funda para teclado musical
      description: Describe cómo se adapta la funda al instrumento (p. ej., tamaño
        universal/genérico o ajuste específico para un modelo).
    musical_ratchet_sound_character:
      name: Carácter de sonido de la carraca musical
      description: Descripción general del timbre o la intensidad sonora de la carraca.
    musical_scraper_groove_surface_material:
      name: Material de la superficie ranurada del raspador musical
      description: Especifica el material de la superficie estriada o ranurada que
        se raspa (puede diferir del material del cuerpo).
    musical_scraper_type:
      name: Tipo raspador musical
      description: Especifica el estilo o diseño del instrumento de raspado musical
        (p. ej., güiro o reco-reco), lo que afecta el sonido y la técnica de ejecución.
    mute_attachment_method:
      name: Método de sujeción de la sordina
      description: Especifica cómo se fija o se sostiene la sordina sobre el platillo
        (p. ej., gel, adherencia estática, imán, clip).
    mute_attenuation_level:
      name: Nivel de atenuación del silenciador
      description: Indica cuánto reduce el silenciador el volumen percibido, especialmente
        en sordinas de práctica.
    mute_cork_padding_material:
      name: Material del corcho o acolchado de la sordina
      description: Especifica el material de la almohadilla de contacto de la sordina
        (p. ej., tiras o almohadillas de corcho) utilizado para el ajuste, la sujeción
        y la protección de la campana.
    mute_coverage_type:
      name: Tipo de cobertura de la sordina
      description: Indica el estilo o nivel de cobertura del silenciador sobre la
        superficie de ejecución, desde pequeños amortiguadores puntuales hasta silenciadores
        de práctica de cobertura total.
    mute_finish:
      name: Acabado del silenciador
      description: Acabado superficial de la sordina que puede afectar la durabilidad
        y la estética (p. ej., pulido o satinado).
    name_label_text_template:
      name: Plantilla de texto de la etiqueta de identificación
      description: Especifica el texto o diseño predefinido impreso en la etiqueta
        de identificación (p. ej., “Pertenece a” o “Hecho por”).
    napkin_ply:
      name: Capas de la servilleta
      description: Indica el grosor de la servilleta para cóctel según el número de
        capas.
    neck_brace_fit_system:
      name: Sistema de ajuste de la protección cervical
      description: Indica el método principal utilizado para ajustar y asegurar la
        protección cervical al piloto.
    neck_brace_size_basis:
      name: Criterio de tamaño de la protección cervical
      description: Indica la referencia utilizada para elegir el tamaño correcto de
        la protección cervical.
    neck_configuration:
      name: Configuración para el cuello
      description: Especifica el tipo o configuración del tudel incluido con el saxofón,
        que influye en la ergonomía y la ejecución.
    neck_coverage_type:
      name: Tipo de cobertura para el cuello
      description: Especifica el tipo de cobertura para el cuello incluida con la
        manta.
    neck_support_size_system:
      name: Sistema de tamaño del soporte cervical
      description: Indica el sistema de tallas utilizado para el soporte o collarín
        de protección para competición (p. ej., adulto, juvenil o talla única).
    necklace_length_type:
      name: Tipo de longitud del collar
      description: Especifica la categoría convencional de largo del collar, como
        gargantilla u ópera, para facilitar la búsqueda por estilo.
    needle_balance_zone:
      name: Zona de equilibrio de la aguja
      description: Indica la zona magnética o el hemisferio para los que está calibrada
        la aguja de la brújula, lo que garantiza lecturas precisas en distintas partes
        del mundo.
    needle_case_format:
      name: Formato del estuche para agujas
      description: Indica el formato general del organizador de agujas.
    needle_damping_type:
      name: Tipo de amortiguación de la aguja
      description: Describe cómo se estabiliza la aguja de la brújula (p. ej., con
        líquido, en seco o mediante estabilización electrónica), lo que influye en
        el tiempo de ajuste y la durabilidad.
    needle_felting_needle_profile:
      name: Perfil de la aguja de enfurtido
      description: Sección transversal o perfil de la aguja, lo que afecta cómo se
        desplazan las fibras y el acabado obtenido.
    needle_holder_features:
      name: Características del portaagujas
      description: Características funcionales destacables del portaagujas.
    needle_holder_mounting_attachment_method:
      name: Método de montaje o fijación del portaagujas.
      description: Indica cómo está diseñado el portaagujas para sujetarse o utilizarse
        durante el almacenamiento (por ejemplo, magnético, con clip o con correa).
    needle_holder_style:
      name: Estilo del portaagujas
      description: Es el formato o diseño físico de almacenamiento o transporte del
        portaagujas.
    needle_pushing_surface_type:
      name: Tipo de superficie de empuje para aguja
      description: Tipo o diseño de la superficie de empuje de la aguja en la palma
        de costura (p. ej., hendidura metálica, moneda o parche reforzado).
    needle_requirement_beading_pattern:
      name: Aguja recomendada (patrón de abalorios)
      description: Tipo o tamaño de aguja recomendado según el patrón.
    needle_size_system:
      name: Sistema de numeración de agujas
      description: Estándar de numeración utilizado para el etiquetado del tamaño
        de agujas.
    needle_threader_compatible_needle_type:
      name: Tipo de aguja compatible con el enhebrador
      description: Especifica con qué tipos de agujas se puede usar el enhebrador
        (según la categoría o el uso de la aguja).
    needle_threader_mechanism_type:
      name: Tipo de mecanismo del enhebrador de agujas
      description: Describe cómo el enhebrador engancha o pasa el hilo a través del
        ojo de la aguja.
    needle_threader_packaging_type:
      name: Tipo de empaque del enhebrador de agujas
      description: Indica cómo se vende o presenta el producto (unidad individual,
        multipack o set).
    needlecraft_fabric_color_family:
      name: Familia de colores de la tela para labores de aguja
      description: Familia de color normalizada para tela uniforme (utilizada junto
        con el atributo “Color” para facilitar el filtrado).
    needlecraft_fabric_composition:
      name: Composición de la tela para bordado y costura
      description: Especifica la composición o mezcla de fibras de la tela para costura
        y bordado (por ejemplo, 100% algodón, mezcla de lino y algodón).
    needlecraft_fabric_weave_type:
      name: Tipo de tejido de tela para costura y bordado
      description: Especifica la composición o mezcla de fibras de la tela para costura
        y bordado (p. ej., 100 % algodón o mezcla de lino y algodón).
    needlecraft_kit_items_included:
      name: Artículos incluidos en el kit de costura y bordado
      description: Enumera los principales componentes incluidos en el kit de costura
        y bordado (herramientas y materiales consumibles).
    needlecraft_kit_project_type:
      name: Tipo de proyectos del kit de costura y bordado
      description: Identifica los artículos finales que permite realizar el kit (resultado
        del proyecto).
    needlecraft_stitching_coverage:
      name: Cobertura de la puntada para bordado
      description: Indica si la tela se borda sobre 1 hilo o cuadro, o sobre 2 hilos
        (algo habitual en telas de 100% algodón y lino).
    needlepoint_canvas_mesh_count:
      name: Número de malla del lienzo para bordado
      description: Indica el conteo o densidad de la malla del lienzo (hilos por pulgada)
        para el que está diseñado el patrón.
    needlepoint_frame_canvas_attachment_method:
      name: Método de fijación del lienzo al bastidor de bordado
      description: Describe cómo se sujeta el lienzo al bastidor de bordado
    needlepoint_frame_compatible_stand_type:
      name: Tipo de soporte compatible con el bastidor de bordado
      description: Si el bastidor está diseñado para montarse en un soporte, especifica
        con qué tipo(s) de soporte es compatible.
    needlepoint_frame_contents:
      name: Contenido del bastidor de bordado
      description: Especifica qué componentes y accesorios se incluyen con el bastidor
        (p. ej., bastidor, barras o varillas adicionales, tachuelas o alfileres, tiras
        de sujeción, bolsa de transporte).
    needlepoint_frame_tension_adjustment_type:
      name: Tipo de ajuste de tensión del bastidor de bordado
      description: Indica si se puede ajustar la tensión del bastidor y cómo hacerlo.
    needlepoint_pattern_chart_format:
      name: Formato de diagrama de patrones de bordado
      description: Cómo se presenta el diseño para el bordado (patrón gráfico o guía
        impresa/pintada).
    needlepoint_project_type:
      name: Tipo de proyecto de bordado
      description: Indica el artículo o la categoría final para el que está diseñado
        el proyecto de bordado.
    net_design:
      name: Diseño de red
      description: Identifica el tipo de diseño de la red e indica si se puede retraer
        o plegar para facilitar el transporte.
    net_mesh_pattern:
      name: Patrón de malla de red
      description: Especifica la forma geométrica de las aberturas de la red, lo que
        puede influir en la visibilidad y la resistencia.
    net_twine_gauge:
      name: Calibre del hilo de la red
      description: Indica el grosor o la resistencia del hilo de la red, normalmente
        expresado mediante un número de calibre (p. ej., 18, 36).
    nicotine_source:
      name: Fuente de nicotina
      description: Indica si la nicotina del producto es derivada del tabaco, sintética
        o si el producto no contiene nicotina.
    nipple_drive_interface:
      name: Interfaz de accionamiento de la cabecilla
      description: Identifica el tipo o estándar de la interfaz o cabeza de accionamiento
        de la cabecilla (externa o interna), lo que determina la herramienta necesaria
        y el método de armado de la rueda.
    nock_activation_method:
      name: Método de activación del culatín
      description: Especifica el mecanismo mediante el cual se enciende o apaga el
        LED del culatín luminoso (p. ej., presión de la cuerda del arco, sensor de
        movimiento, interruptor manual).
    nock_fitment_code:
      name: Código de compatibilidad del culatín
      description: Código del fabricante o de la industria que identifica la familia
        o serie a la que pertenece el culatín.
    nock_throat_size:
      name: Tamaño de la garganta del culatín
      description: Especifica el tamaño de la garganta (ranura) del culatín que encaja
        en la cuerda del arco.
    nock_transparency_level:
      name: Nivel de transparencia del culatín
      description: Describe el grado de transparencia del material del culatín (transparente,
        translúcido, opaco o fosforescente), lo que influye en la visibilidad y la
        estética.
    nock_type:
      name: Tipo de culatín
      description: Especifica el diseño de culatín utilizado en una flecha o virote,
        tipo pin, media luna o iluminado.
    noise_reduction_type:
      name: Tipo de reducción de ruido
      description: Especifica la tecnología de reducción de ruido utilizada (o no
        utilizada) en el sistema de audio integrado del casco, si corresponde.
    noise_suppression_technology:
      name: Tecnología de supresión de ruido
      description: Especifica si el producto utiliza amortiguación pasiva o circuitos
        electrónicos activos que comprimen los sonidos fuertes y/o amplifican el sonido
        ambiente.
    non_slip_base_features:
      name: Características de la base antideslizante
      description: Indica las funciones antideslizantes incluidas para evitar que
        el pedal se desplace durante la ejecución.
    nose_bridge_type:
      name: Tipo de puente nasal
      description: Indica el diseño del puente nasal, lo que influye en el ajuste
        en distintos tamaños de rostro.
    nose_clip_accessories_included:
      name: Accesorios de pinza nasal incluidos
      description: Enumera los accesorios adicionales incluidos con la pinza nasal
        para natación (p. ej., tapones para los oídos o estuche de almacenamiento).
    nose_clip_features:
      name: Características de la pinza nasal
      description: Destaca las funciones o características de comodidad de la pinza
        nasal.
    nose_coverage_style:
      name: Estilo de cobertura para la nariz
      description: Indica la presencia y el tipo de panel de protección para la nariz
        o el hocico en la máscara antimoscas.
    noseband_type:
      name: Tipo de muserola
      description: Especifica el diseño de la muserola (si corresponde) incluida con
        la brida.
    number_of_canvas_meshes:
      name: Número de mallas del lienzo
      description: Tamaño de la malla de la lámina de lienzo plástico, expresado como
        cantidad de orificios por pulgada (HPI) o conteo, lo que determina el tamaño
        de las puntadas y el nivel de detalle del proyecto.
    number_of_chainrings:
      name: Número de coronas
      description: Indica cuántos platos admite o incluye el juego de bielas.
    number_of_control_stations:
      name: Cantidad de puestos de control
      description: Indica la cantidad de puestos de mando compatibles con el sistema
        de control (puesto único, doble puesto, etc.).
    number_of_digits:
      name: Cantidad de dígitos
      description: Indica cuántos dígitos muestra el contador (p. ej., 1 dígito, 2
        dígitos, 3 dígitos).
    number_of_guitar_slots:
      name: Cantidad de guitarras
      description: Indica cuántas guitarras puede alojar la funda o estuche.
    number_of_needlecraft_fabrics:
      name: Cantidad de telas para bordado
      description: Especifica el conteo de la tela o el lenzo para bordado, normalmente
        expresado como cuadrados o hilos por pulgada (p. ej., 14).
    number_of_plastic_canvas_meshes:
      name: Densidad de malla del lienzo plástico
      description: Especifica la cantidad de orificios por pulgada de la malla plástica,
        lo que determina el tamaño de las puntadas y el nivel de detalle del proyecto.
    number_of_quilting_frame_rails:
      name: Cantidad de rieles del bastidor acolchado
      description: Indica cuántos rieles o rodillos incluye el bastidor de acolchado
        (p. ej., sistemas de 2 o 3 rieles).
    number_of_rope_slots:
      name: Cantidad de ranuras para cuerda
      description: Indica si el dispositivo de aseguramiento está diseñado para usarse
        con una sola cuerda o con doble cuerda.
    number_of_switch_poles:
      name: Número de polos del interruptor
      description: Indica el número de circuitos independientes (polos) controlados
        por el interruptor (p. ej., SPST, DPST).
    number_of_switch_throws:
      name: Cantidad de posiciones del interruptor
      description: Indica la cantidad de salidas o posiciones de conmutación por polo
        (p. ej., SPDT).
    number_of_timing_chain_rows:
      name: Cantidad de filas de la cadena de distribución
      description: Indica si la cadena de distribución es de una o varias filas.
    number_of_trailer_axles:
      name: Cantidad de ejes del remolque
      description: Indica la cantidad de ejes del remolque.
    number_of_wheel_pieces:
      name: Cantidad de piezas de la rueda
      description: Especifica si la rueda es de una, dos o tres piezas.
    numbering_style:
      name: Tipo de numeración
      description: Indica si las pecheras incluyen numeración y de qué tipo (p. ej.,
        sin numeración, del 1 al 10 o personalizados) para la identificación de los
        equipos.
    nunchuck_connector_type:
      name: Tipo de conexión del nunchaku
      description: Tipo de unión entre las dos empuñaduras del nunchaku (p. ej., cuerda,
        cadena o cadena giratoria).
    nursing_access:
      name: Acceso para lactancia
      description: Identifica el método de acceso de lactancia integrado en el traje
        de baño, si corresponde.
    nursing_access_type:
      name: Tipo de acceso de lactancia
      description: Especifica cómo la prenda facilita el acceso al pecho para la lactancia
        o la extracción de leche.
    nut_butter_texture:
      name: Textura de la mantequilla de frutos secos
      description: Describe la consistencia de la mantequilla de frutos secos para
        que los compradores puedan elegir fácilmente entre opciones como suave, crocante,
        etc.
    nutrient_fortification:
      name: Fortificación nutricional
      description: Identifica los nutrientes clave con los que está fortificado el
        alimento o la bebida.
    oak_product_form:
      name: Forma del producto de roble
      description: Identifica la forma física del roble utilizada para el añejamiento
        o aromatización de productos.
    oak_toast_level:
      name: Nivel de tostado del roble
      description: Especifica el nivel de tostado de los productos de roble.
    oboe_case_capacity:
      name: Capacidad del estuche del oboe
      description: Indica qué instrumentos y componentes principales puede transportar
        el estuche.
    oboe_case_carry_configuration:
      name: Configuración de transporte del estuche para oboe
      description: Indica la principal forma de transporte que ofrece el estuche o
        funda.
    oboe_case_design:
      name: Diseño del estuche para oboe
      description: Clasifica el nivel de rigidez o estructura del estuche o funda
        para oboe (p. ej., rígido, semirrígido o blando) para indicar el nivel de
        protección.
    oboe_case_internal_fit_type:
      name: Tipo de ajuste interno del estuche para oboe
      description: Indica si el interior está moldeado para una configuración específica
        del instrumento o si utiliza compartimentos ajustables.
    oboe_keywork_plating:
      name: Baño de las llaves del oboe
      description: Especifica el baño o acabado de las llaves del oboe, independientemente
        del material del cuerpo.
    oboe_strap_padding:
      name: Acolchado de la correa para oboe
      description: Describe la presencia o el tipo de acolchado en la zona de contacto
        de la correa o del soporte para mayor comodidad (p. ej., área acolchada para
        hombro o cuello).
    oboe_swab_style:
      name: Tipo de limpiador para oboe
      description: Especifica el estilo o diseño funcional del limpiador para oboe
        (p. ej., pasante o seda con peso).
    observation_window_material:
      name: Material de las ventanas de observación
      description: Especifica el material de los paneles o ventanas de visualización
        (lo que suele influir en la claridad y la durabilidad).
    ocarina_accessories_included:
      name: Accesorios de ocarina incluidos
      description: Accesorios incluidos con la ocarina, como estuche, correa para
        el cuello o guía de digitación.
    ocarina_chamber_count:
      name: Cantidad de cámaras de la ocarina
      description: Indica cuántas cámaras tiene la ocarina, lo que influye en el rango
        tonal y la complejidad de ejecución (simple, doble, triple, etc.).
    ocarina_fingering_system:
      name: Sistema de digitación de la ocarina
      description: Especifica el sistema o estándar de digitación de la ocarina colgante
        (si corresponde).
    ocarina_finish_type:
      name: Tipo de acabado de la ocarina
      description: Acabado superficial del cuerpo de la ocarina, que influye en la
        textura al tacto y la estética.
    occupant_classification_sensor_support:
      name: Compatibilidad con sensor de clasificación de ocupante
      description: Indica si el asiento incluye un sensor de clasificación o peso
        del ocupante, o si permite transferir/instalar el sensor OEM (habitualmente
        en los asientos delanteros del acompañante).
    octave_harmonica_cover_plate_material:
      name: Material de las placas de cubierta de la armónica de octavas
      description: Material de las placas de cubierta exteriores de la armónica de
        octavas.
    octave_harmonica_tuning_system:
      name: Sistema de afinación de la armónica de octavas
      description: La afinación utilizada en la armónica de octavas.
    octoban_mounting_system_type:
      name: Tipo de sistema de montaje del octoban
      description: Indica cómo se monta o posiciona el octoban durante la ejecución
        (soporte, abrazadera o montaje en pie).
    odor_control_features:
      name: Características de control de olores
      description: Indica si el producto ofrece neutralización o control de olores
        y mediante qué método.
    office_furniture_items_included:
      name: Artículos de muebles de oficina incluidos
      description: Indica los muebles de oficina específicos incluidos en el set,
        como escritorio o archivador.
    oil_cooler_core_type:
      name: Tipo de núcleo del enfriador de aceite
      description: Especifica la estructura interna del núcleo del enfriador de aceite,
        lo que influye en la eficiencia de refrigeración, la pérdida de presión y
        la durabilidad.
    oil_cooler_mounting_style:
      name: Tipo de montaje del enfriador de aceite
      description: Describe cómo debe montarse o instalarse el enfriador de aceite
        en el vehículo.
    oil_dipstick_component_type:
      name: Tipo de componente de la varilla medidora de aceite
      description: Especifica qué componente de medición del nivel de aceite se vende
        (p. ej., solo la varilla, solo el mango, conjunto completo, tubo de la varilla
        medidora, etc.).
    oil_dipstick_measurement_markings:
      name: Marcas de medición de la varilla de aceite
      description: Especifica qué marcas o escala se incluyen en la varilla para leer
        el nivel de aceite.
    oil_dipstick_tube_mounting_type:
      name: Tipo de montaje del tubo de la varilla medidora de aceite
      description: Especifica cómo se fija o monta el tubo de la varilla de aceite
        en el motor o el bloque del motor.
    oil_drain_plug_head_drive_type:
      name: Tipo de accionamiento de la cabeza del tapón de drenaje de aceite
      description: Especifica el tipo de encastre de la cabeza del tapón utilizada
        para la instalación y extracción.
    oil_drain_plug_magnet_type:
      name: Tipo de imán del tapón de drenaje de aceite
      description: Especifica si el tapón de drenaje es magnético y, si es así, de
        qué tipo.
    oil_fill_cap_type:
      name: Tipo de tapa de llenado de aceite
      description: Indica el tipo o sistema de cierre de la tapa de llenado de aceite
        utilizado en la tapa de válvulas (si corresponde).
    oil_filler_cap_attachment_type:
      name: Tipo de fijación de la tapa de llenado de aceite
      description: Especifica cómo se sujeta la tapa de llenado de aceite al motor
        o al cuello de llenado (p. ej., roscada, tipo bayoneta/de cuarto de vuelta
        o a presión).
    oil_filler_cap_installation_position:
      name: Posición de instalación de la tapa de llenado de aceite
      description: Especifica dónde se utiliza la tapa cuando existen varios puntos
        de llenado de aceite (p. ej., cubierta de válvulas o tubo de llenado remoto).
    oil_filler_cap_locking_type:
      name: Tipo de bloqueo de la tapa de llenado de aceite
      description: Especifica si la tapa de llenado de aceite es sin bloqueo o si
        utiliza un sistema de cierre o extracción asegurado (p. ej., con llave o mediante
        herramienta) para ayudar a prevenir manipulaciones, robos o aperturas accidentales.
    oil_filler_cap_tether_type:
      name: Tipo de sujeción de la tapa de llenado de aceite
      description: Especifica si la tapa de llenado de aceite cuenta con un sistema
        de retención para evitar pérdidas y qué tipo de sujeción utiliza.
    oil_filler_cap_venting_type:
      name: Tip de ventilación de la tapa de llenado de aceite
      description: Especifica si la tapa cuenta con ventilación y qué mecanismo de
        ventilación utiliza (si corresponde).
    oil_filter_style:
      name: Tipo de filtro de aceite
      description: Especifica el formato y el tipo de montaje o instalación del filtro
        de aceite para garantizar la compatibilidad con el soporte del filtro del
        motor.
    oil_pan_baffle_windage_features:
      name: Características del deflector/control de aceite del cárter
      description: Indica las características internas de control de aceite del cárter.
    oil_pan_finish_coating:
      name: Acabado o recubrimiento del cárter de aceite
      description: Describe el acabado superficial o revestimiento del cárter de aceite
        (pintado, con recubrimiento en polvo, galvanizado, sin tratar, etc.).
    oil_pressure_sensor_function_type:
      name: Tipo de función del sensor de presión de aceite
      description: Indica si la pieza es un transmisor de presión de aceite de salida
        variable para un medidor, una ECU o un interruptor de presión de aceite de
        encendido y apagado que activa una luz de advertencia.
    oil_pressure_sensor_signal_output_type:
      name: Tipo de señal de salida del sensor de presión de aceite
      description: Especifica el tipo de salida o señal eléctrica generada por el
        sensor o transmisor de presión de aceite.
    oil_processing_method:
      name: Método de procesamiento de aceite
      description: Especifica el método de producción o refinamiento del aceite (p.
        ej., prensado en frío, virgen, refinado), lo que influye en el sabor, el valor
        nutricional y las aplicaciones culinarias adecuadas.
    oil_pump_drive_method:
      name: Método de accionamiento de la bomba de aceite
      description: Indica qué impulsa la bomba de aceite dentro del motor.
    oil_pump_mounting_style:
      name: Estilo de montaje de la bomba de aceite
      description: Especifica dónde y cómo se monta la bomba de aceite en el motor
        (por ejemplo, interna o externa/remota, montada en la tapa o en el cárter
        de aceite).
    oil_system_connection_thread_standard:
      name: Sistema de aceite conexión hilo estándar
      description: Especifica el estándar de rosca o conexión utilizado en la interfaz
        del sistema de aceite de la pieza para su instalación y compatibilidad (p.
        ej., M12x1.5, 1/8-27 NPT, BSPP).
    oil_viscosity_grade:
      name: Grado de viscosidad del aceite
      description: Describe la viscosidad relativa del aceite para equipos de hilado
        o manualidades (no se refiere a grados SAE automotrices).
    okra_variety:
      name: Variedad de okra
      description: Identifica el cultivar o variedad comercial específica de okra
        ofrecida, como Clemson Spineless, Red Burgundy o baby okra.
    olfactory_arts_material_form:
      name: Forma del material para artes olfativas
      description: Especifica el formato físico en el que se vende el material.
    olfactory_arts_tool_kit_content:
      name: Contenido del kit de herramientas para artes olfativas
      description: Enumera los componentes incluidos cuando el producto se vende como
        kit o conjunto para la elaboración de velas, incienso o perfumes.
    olive_variety:
      name: Variedad de aceituna
      description: Especifica el cultivo de aceituna utilizado, lo que influye en
        el sabor, la textura, el color y la autenticidad regional.
    onion_variety:
      name: Variedad de cebolla
      description: Especifica el tipo de cebolla para que los compradores puedan identificar
        rápidamente el color, sabor y uso que prefieren, y para que los vendedores
        puedan clasificar correctamente los productos.
    opacity_level:
      name: Nivel de opacidad
      description: Indica el nivel de transparencia u opacidad de la tela.
    operating_modes:
      name: Modos operativos
      description: Principales efectos o modos de movimiento integrados compatibles
        con la luz láser.
    operating_voltage:
      name: Voltaje de funcionamiento
      description: Especifica el voltaje nominal del sistema que admite el inyector.
    optical_toy_features:
      name: Características del juguete óptico
      description: Destaca el principal efecto visual u óptico que produce el juguete.
    orchestral_string_core_material:
      name: Material principal la cuerda orquestal
      description: Especifica el material principal del núcleo de la cuerda, lo que
        influye notablemente en la sensación al tocar, la respuesta y el tono.
    orchestral_string_end_type:
      name: Tipo de terminación de la cuerda orquestal
      description: Especifica el tipo de sujeción en el extremo de la cuerda que se
        fija al cordal.
    orchestral_string_included_strings:
      name: Cuerdas incluidas para instrumentos de cuerdas de orquesta
      description: Enumera qué cuerdas específicas se incluyen en el paquete (según
        el instrumento).
    orchestral_string_instrument_fitting_part_type:
      name: Tipo de pieza o accesorio para instrumento de cuerda orquestal
      description: Especifica qué tipo de pieza o accesorio es el producto (p. ej.,
        puente, cordal o mentonera).
    orchestral_string_instrument_mute_type:
      name: Tipo de sordina para instrumentos de cuerdas de orquesta
      description: Especifica el tipo de uso de la sordina para instrumento de cuerda
        orquestal (p. ej., práctica/hotel o interpretación/concierto) y su diseño
        más habitual.
    orchestral_string_instrument_part_position:
      name: Posición de la pieza para instrumento de cuerda orquestal
      description: Indica dónde se coloca la pieza en el instrumento (útil cuando
        las piezas tienen variantes superior/inferior o izquierda/derecha).
    orchestral_string_winding_material:
      name: Material del entorchado para instrumentos de cuerdas de orquesta
      description: Especifica el material del entorchado exterior utilizado en la
        cuerda.
    organza_finish_sheen:
      name: Acabado o brillo de la organza
      description: Describe el aspecto superficial de la organza (mate o brillante/iridiscente).
    organza_ribbon_transparency_level:
      name: Nivel de transparencia de la cinta de organza
      description: Describe qué tan translúcida o transparente es la cinta de organza.
    organza_transparency_level:
      name: Nivel de transparencia de la organza
      description: Describe la transparencia de la tela de organza en una sola capa.
    origami_paper_shape:
      name: Forma del papel para origami
      description: Especifica la forma de la hoja utilizada para el plegado.
    origami_paper_sidedness:
      name: Lados del papel para origami
      description: Indica si el papel de origami tiene el mismo color o patrón en
        ambos lados o si son diferentes.
    ostrich_feather_part:
      name: Parte de la pluma de avestruz
      description: Identifica el tipo o la parte de la pluma de avestruz utilizada
        (p. ej., pluma de ala vs pluma de cuerpo), lo que influye sobre la suavidad,
        la densidad y las aplicaciones artesanales más habituales.
    outboard_motor_shaft_type:
      name: Tipo de eje del motor fuera de borda
      description: Clase estándar de longitud del eje utilizada en motores fuera de
        borda (según la denominación usada en el sector náutico).
    outboard_motor_steering_type:
      name: Tipo de dirección del motor fueraborda
      description: Especifica el sistema o mecanismo de dirección utilizado por el
        motor fuera de borda (p. ej., timón de mando o sistema de dirección remota).
    outdoor_table_functionality:
      name: Funcionalidad de mesa para exteriores
      description: Identifica las funciones especiales integradas que van más allá
        de una simple superficie de apoyo (p. ej., compartimento refrigerante, estante
        de almacenamiento, cubierta para tanque de gas, base para sombrilla, conector
        para sillas, diseño plegable, apta para piscina, altura ajustable, ruedas
        integradas o iluminación LED).
    outerwear_length_type:
      name: Tipo de largo de prenda exterior
      description: Clasifica la longitud total de una prenda de abrigo en categorías
        descriptivas estándares.
    outerwear_pieces_included:
      name: Piezas de abrigo incluidas
      description: Numera las prendas incluidas cuando el producto se vende como conjunto.
    outfit_attachment_mechanism:
      name: Mecanismo de sujeción del conjunto
      description: Especifica cómo se fijan las prendas o accesorios a la muñeca (p.
        ej., pestañas, adhesivo o imanes).
    outfit_items_included:
      name: Artículos del conjunto incluidos
      description: Enumera las prendas específicas incluidas en el conjunto (p. ej.,
        bodi, pantalones cortos o diadema).
    outlet_thread_type:
      name: Tipo de rosca de salida
      description: Estándar de rosca utilizado en los puertos de salida de la línea
        de freno del cilindro principal (p. ej., abocardado métrico tipo burbuja o
        abocardado invertido SAE).
    output_jack_type_instrument:
      name: Tipo de conector de salida (instrumento)
      description: Especifica el tipo de conector de salida de audio de la mandolina
        eléctrica.
    output_signal_type:
      name: Tipo de señal de salida
      description: Tipo de salida eléctrica producida por el sensor (p. ej., resistencia
        analógica de termistor NTC).
    outsole_marking_type:
      name: Tipo de marcado de la suela
      description: Indica si la suela del calzado deja marcas en superficies de canchas,
        un aspecto importante en deportes de raqueta de interior.
    outsole_material:
      name: Material de la suela exterior
      description: Indica el material de la suela del calzado que entra en contacto
        con el suelo, lo que influye en el agarre, la flexibilidad y la durabilidad.
    outsole_stud_type:
      name: Tipo de tapones de la suela
      description: Describe la configuración de la suela o los tapones (p. ej., tapones
        moldeados, tapones de goma o minitapones para césped artificial) que proporciona
        tracción en la superficie de juego correspondiente.
    oven_bake_clay_formulation:
      name: Formulación de arcilla para hornear
      description: Identifica la familia de formulación de la arcilla para hornear
        (p. ej., arcilla polimérica o arcilla de resina), lo que influye en la manipulación,
        el comportamiento durante el curado y las propiedades finales.
    oven_housing_configuration:
      name: Disposición de la carcasa para horno
      description: Define la disposición de electrodomésticos que admite el mueble
        (p. ej., horno simple, horno doble o combinación de horno y microondas).
    overhead_mount_installation_method:
      name: Método de instalación del soporte superior
      description: Indica cómo se fija el soporte superior al vehículo (tipo de herraje
        o sistema de fijación).
    oversize_or_undersize_grade:
      name: Grado de sobremedida o submedida
      description: Especifica la clasificación dimensional del kit (pistones/anillos
        de tamaño mayor al estándar o cojinetes de tamaño inferior al estándar) en
        relación con el tamaño estándar OEM.
    p_tex_application_method:
      name: Método de aplicación de P-Tex
      description: Describe cómo se aplica el material P-Tex a la base del esquí o
        snowboard.
    p_tex_form:
      name: Formato del P-Tex
      description: Identifica el formato físico en el que se suministra el material
        de reparación.
    packability:
      name: Capacidad de plegado
      description: Indica si el chaleco puede plegarse o guardarse cuando no está
        en uso y de qué manera.
    packaging_format:
      name: Formato del embalaje
      description: Indica cómo se empaquetan o venden las cuerdas (sobres individuales,
        a granel, etc.).
    packaging_material:
      name: Material de embalaje
      description: Especifica el material principal de la botella o recipiente que
        contiene el agua.
    packaging_type:
      name: Tipo de embalaje
      description: Describe cómo está empaquetado el muñeco cabezón (bobblehead) para
        venta, exhibición o almacenamiento de colección.
    packing_medium:
      name: Medio de conservación
      description: Indica el líquido o medio (como agua, distintos tipos de jarabe,
        jugo o salmuera) utilizado para conservar la fruta dentro del envase.
    pad_components_included:
      name: Componentes incluidos de la almohadilla
      description: Especifica qué piezas se incluyen cuando el producto se vende como
        conjunto (p. ej., rodilleras y coderas, solo muñequeras, etc.).
    pad_controller_additional_control:
      name: Controles adicionales del controlador tipo pad
      description: Tipos de controles físicos adicionales presentes en la unidad más
        allá de los pads (perillas, faders, botones).
    pad_controller_performance_features:
      name: Características de rendimiento del controlador tipo almohadilla
      description: Principales funciones de las almohadillas relacionadas con la interpretación
        y el control expresivo.
    pad_coverage_area:
      name: Área de cobertura de las almohadillas
      description: Especifica las zonas del cuerpo que protegen las almohadillas integradas
        de la calza protectora.
    pad_material_or_technology:
      name: Material o tecnología de la almohadilla
      description: Especifica la tecnología de absorción de impactos o el material
        patentados utilizados en la almohadilla.
    pad_mounting_or_holding_style:
      name: Tipo de montaje o sujeción de la almohadilla
      description: Indica cómo se fija, se usa o se instala la almohadilla.
    pad_saver_style:
      name: Tipo de secador de la almohadilla
      description: Indica el diseño o formato del accesorio utilizado para secar las
        almohadillas y el interior del instrumento.
    pad_shape:
      name: Forma de la almohadilla
      description: Define la forma geométrica o curvatura de la superficie de impacto
        o del cuerpo general de la almohadilla (p. ej., redonda, curva, rectangular
        o plana), lo que ayuda a adaptar las almohadillas a los objetivos de práctica
        y tipos de golpe.
    pad_shell_type:
      name: Tipo de carcasa de la almohadilla
      description: Clasifica el tipo de estructura de la superficie exterior de la
        almohadilla (p. ej., rígida, blanda o inserto interno).
    pad_style:
      name: Tipo de almohadilla
      description: Especifica el tipo o diseño de almohadilla incluido con el trineo.
    padding_layers:
      name: Capas de acolchado
      description: Indica la cantidad de capas de espuma utilizadas para absorber
        impactos.
    padding_level:
      name: Nivel de relleno
      description: Indica la cantidad de acolchado integrado en las zonas de contacto
        de la correa o soporte (cuello, hombros o espalda).
    padding_material:
      name: Material del acolchado
      description: Especifica el material interno de relleno o acolchado que absorbe
        impactos dentro de bolsas, escudos, manoplas y dummies de entrenamiento.
    paddle_ball_attachment_type:
      name: Tipo de unión de la pelota a la paleta
      description: Especifica cómo está conectada la pelota a la paleta (o si no está
        unida mediante una cuerda).
    paddle_leash_style:
      name: Tipo de correa de remo
      description: Identifica el estilo o diseño del cordón de sujeción del remo.
    paddle_shape:
      name: Forma de la pala
      description: Define la forma general de la cabeza o cuerpo de la paleta (p.
        ej., estándar, alargada o ancha), lo que influye en el alcance, el tamaño
        del punto dulce y la maniobrabilidad.
    paddleboard_intended_use:
      name: Uso previsto de la tabla de paddleboard
      description: Clasifica el propósito o la actividad principal para la que está
        diseñada la tabla (p. ej., travesía, yoga o competición).
    paint_application_method:
      name: Método de aplicación de la pintura
      description: Método principal de aplicación del producto sobre la pinza de freno.
    paint_by_number_surface_type:
      name: Tipo de superficie para pintar por números
      description: Superficie sobre la que está impreso el diseño numerado (p. ej.,
        canvas, papel o panel de madera).
    paint_medium_application_method:
      name: Método de aplicación de la pintura
      description: Indica la forma recomendada de aplicar la pintura.
    paint_medium_intended_effect:
      name: Efecto previsto de la pintura
      description: Describe el principal resultado que se busca obtener con la pintura
        (textura, brillo, veladura, fluidez, etc.).
    paint_safe_bristles:
      name: Cerdas seguras para pintura
      description: Indica si las cerdas del cepillo están diseñadas para usarse de
        forma segura sobre pintura o barniz automotriz (sin rayar).
    paintable_surface:
      name: Superficie apta para pintar
      description: Indica si la figura de papel maché está lista para pintarse tal
        como viene (p. ej., imprimada o sellada) o si requiere preparación previa.
    paintball_caliber:
      name: Calibre de paintball
      description: Especifica el diámetro o calibre de las bolas de pintura o del
        equipo compatible.
    paintball_feed_system:
      name: Sistema de alimentación de bolas de pintura
      description: Define cómo se introducen las bolas de pintura en la marcadora.
    paintball_fill_color:
      name: colorde relleno de paintball
      description: Indica el color del relleno de la marca interior, que puede diferir
        de la carcasa exterior y determina el color que queda tras el impacto.
    paintball_fill_type:
      name: Tipo de relleno de las bolas de paintball
      description: Describe cualquier formulación o propiedad especial del relleno
        (p. ej., lavable, con brillo en la oscuridad, polvo).
    paintball_grade:
      name: Grado de Paintball
      description: Describe la clase de rendimiento o el nivel de uso previsto (por
        ejemplo, principiante, campo, competición, invierno).
    paintball_mask_coverage_level:
      name: Nivel de cobertura de la máscara de paintball
      description: Indica qué partes de la cara o la cabeza protegen las gafas o la
        máscara de paintball (solo gafas, media cara, cara completa o cabeza completa).
    paintball_tank_valve_type:
      name: tipo de válvula del tanque de paintball
      description: Describe la interfaz de la válvula o reguladora presente en el
        tanque.
    painting_surface_priming_type:
      name: Tipo de imprimación de superficie para pintura
      description: Especifica la imprimación/recubrimiento de la superficie a pintar
        (Beyond simplemente imprimada/sin imprimar), lo que afecta a la adherencia
        de la pintura y a la compatibilidad de la técnica.
    palette_knife_blade_edge_profile:
      name: Perfil del filo de la espátula
      description: Describe el perfil del filo de trabajo de la hoja de una espátula
        (no su afiladumbre), que afecta a la creación de marcas y a la mezcla de colores.
    palette_knife_flexibility:
      name: Flexibilidad de la espátula
      description: Describe la rigidez o flexibilidad de la hoja de la espátula.
    palette_surface_finish:
      name: Acabado de la superficie de la paleta
      description: Describe el acabado/recubrimiento superficial de la mezcla que
        afecta a la resistencia a las manchas y a la facilidad de limpieza.
    palm_padding_level:
      name: Nivel de acolchado en la palma
      description: Describe la cantidad de amortiguación en la zona de la palma del
        guante o de la almohadilla de agarre.
    palm_padding_type:
      name: Tipo de acolchado en la palma
      description: Indica el material o la construcción utilizada para el acolchado
        de la palma (por ejemplo, gel, espuma, doble capa).
    palm_wax_blend_readiness:
      name: Disponibilidad de mezcla de cera de palma
      description: Si el producto es cera de palma pura o una fórmula premezclada
        destinada a características de rendimiento específicas.
    palm_wax_form:
      name: Forma de cera de palma
      description: Forma física de la cera de palma tal como se vende, lo que afecta
        la facilidad de medición, la velocidad de fusión y la gestión.
    pan_flute_tuning_standard:
      name: Estándar de afinación de la flauta de Pan
      description: Frecuencia de referencia utilizada para la afinación (por ejemplo,
        La 4=440 Hz), importante para tocar con otros instrumentos.
    pannier_configuration:
      name: Configuración de las alforjas
      description: Indica si el producto se vende como una sola bolsa, una bolsa doble
        conectada o un juego de alforjas triples.
    pannier_mounting_system:
      name: Sistema de montaje de las alforjas
      description: Define el mecanismo utilizado para fijar la alforja al portaequipajes
        o Frame de la bicicleta, garantizando la compatibilidad con diferentes configuraciones.
    pant_cuff_style:
      name: Estilo de puño del pantalón
      description: Indica el acabado o ajuste en el tobillo del pantalón (por ejemplo,
        puños elásticos, tobillo con código postal, dobladillo abierto).
    pant_leg_conversion_type:
      name: Tipo de conversión de pernera de pantalón
      description: Indica si las perneras del pantalón se pueden convertir o ajustar
        a diferentes longitudes, y cómo hacerlo.
    pantyhose_crotch_style:
      name: Estilo de entrepierna de pantimedias
      description: Define el diseño de la zona de la entrepierna, distinguiendo entre
        las versiones estándar con entrepierna cerrada, sin entrepierna o con refuerzo
        en la entrepierna.
    papaya_variety:
      name: Variedad de papaya
      description: Especifica el cultivar o la variedad de mercado de una papaya (por
        ejemplo, Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Formato de muñeca de papel y magnética
      description: Especifica si el producto es un juego de muñecas de papel tradicional,
        un juego de muñecas magnéticas o un formato híbrido.
    paper_color_family:
      name: Familia color Paper
      description: Especifica si el paquete es de un solocolor, Colors surtidos o
        de mezclas especiales (útil cuando el color es por artículo pero el paquete
        está mezclado).
    paper_magnetic_doll_set_contents:
      name: Set muñecos Paper y magnéticos contenido
      description: Indica cuáles son los componentes principales que se incluyen en
        el conjunto.
    paper_opacity:
      name: Opacidad Paper
      description: Indica el grado de transparencia del Paper , desde muy transparente
        hasta opaco (útil para calcar).
    paraglider_certification_rating:
      name: Calificación de certificación de parapente
      description: Indica la clasificación oficial de aptitud para el vuelo asignada
        a un ala de parapente (por ejemplo, clases EN o LTF).
    parasite_types_controlled:
      name: Tipos de parásitos controlados
      description: Enumera los parásitos internos contra los que el producto es eficaz
        para que el comprador pueda Tailor los programas de desparasitación a infestaciones
        específicas.
    parking_camera_mounting_location:
      name: Ubicación de montaje de la cámara de estacionamiento
      description: Dónde del vehículo se pretende instalar la cámara (por ejemplo,
        en la placa de identificación, montaje en superficie en la parte trasera,
        montaje empotrado).
    parking_camera_night_vision_technology:
      name: Tecnología Vision nocturna para cámaras de estacionamiento
      description: El método de asistencia para condiciones de poca luz utilizado
        por la cámara.
    parking_camera_orientation:
      name: Orientación de la cámara de estacionamiento
      description: Ya sea que la cámara esté diseñada para visualización trasera (copia
        de seguridad), visualización frontal o uso seleccionable/reflejado.
    parking_sensor_finish:
      name: Acabado del sensor de estacionamiento
      description: Indica el acabado superficial de la carcasa o tapa del sensor de
        estacionamiento (por ejemplo, pintable o imprimado, mate, brillante) para
        ayudar a que combine con la estética del paragolpes.
    parking_sensor_type:
      name: Tipo de sensor de estacionamiento
      description: Especifica la tecnología de detección utilizada por el sensor de
        estacionamiento (por ejemplo, ultrasónica, electromagnética, de radar, óptica).
    parsley_root_variety:
      name: Variedad de raíz de perejil
      description: Indica el cultivar o la variedad de la raíz de perejil cuando la
        proporciona el distribuidor.
    parsnip_variety:
      name: Variedad de chirivías
      description: Identifica la variedad o cultivar específico de chirivía, como
        Hollow Crown o blanco Gem, lo que permite al comprador seleccionar en función
        del sabor, el dulzor o las diferencias de tamaño.
    part_condition:
      name: Estado de la pieza
      description: Indica si la pieza es nueva, usada, reacondicionada, etc.
    part_placement:
      name: Ubicación de la pieza
      description: Indica en qué parte de la máquina (por ejemplo, en una máquina
        de subir escaleras o un escalador) está instalada la pieza, como por ejemplo
        a la izquierda, a la derecha, adelante o detrás.
    partial_capo_covered_strings:
      name: Capo parcial cubierto cadena
      description: Especifica el rango de cadenas que cubre el capo parcial utilizando
        la numeración estándar de guitarra de 6 cadenas (1 = Mi agudo, 6 = Mi grave).
    parting_style:
      name: Estilo de despedida
      description: Indica cómo se peina o se puede peinar la peluca (por ejemplo,
        raya al centro, a un lado, raya libre), lo que afecta a la flexibilidad del
        peinado.
    party_favor_type:
      name: tipo de obsequio para fiestas
      description: Especifica qué tipo de artículo para fiestas es (por ejemplo, pegatinas,
        juguetes Shop Mini , pompas de jabón), para permitir la búsqueda/filtrado
        dentro de la sección de Artículos para Fiestas.
    party_game_format:
      name: Formato de juego de fiesta
      description: Formato físico principal del juego de mesa.
    party_horn_mouthpiece_type:
      name: Boquilla de trompeta de fiesta
      description: Especifica la construcción de la boquilla, que afecta a la higiene
        y la comodidad.
    party_horn_style:
      name: estilo bocina de fiesta
      description: Describe el estilo de construcción o comportamiento de la bocina
        de fiesta (cómo se extiende o produce el sonido).
    passenger_car_type:
      name: tipo coche de pasajeros
      description: Identifica el tipo específico de material rodante de pasajeros
        (vagón de pasajeros) para el modelo (por ejemplo, coche de pasajeros, coche
        cama), utilizado para la búsqueda y la creación de conjuntos.
    passion_fruit_variety:
      name: Variedad de fruta de la pasión
      description: Identifica/especifica la variedad botánica o comercial de maracuyá
        que se ofrece (por ejemplo, morado, amarillo, granadilla).
    pasta_sauce_texture:
      name: Textura de salsa para pasta
      description: Describe la consistencia de la salsa (por ejemplo, suave, con trozos,
        cremosa) para que coincida con las preferencias de los consumidores en cuanto
        a la sensación en boca.
    pasta_sauce_variety:
      name: Variedad de salsas para pasta
      description: Clasifica las salsas para pasta por receta o estilo, para que el
        comprador pueda encontrar rápidamente clásicos como la marinara o salsas especiales
        como la de vodka o la de pesto.
    pastry_crust_state:
      name: Estado de la corteza de hojaldre
      description: Describe el estado de preparación o horneado de la corteza al momento
        de la compra.
    pastry_crust_style:
      name: Estilo de masa de pastelería
      description: Identifica el estilo específico de masa o el tipo de corteza.
    pastry_filling_type:
      name: Tipo de relleno de pastelería
      description: Especifica el relleno principal del interior del pastel o bollo.
    patch_adhesion_method:
      name: Método de adhesión de parches
      description: Especifica cómo se adhiere el parche a la cámara o al neumático
        (por ejemplo, autoadhesivo, vulcanizado con cemento o activado por calor).
    patch_backing_material:
      name: Material de soporte del parche
      description: Material utilizado en la parte posterior o base del parche (por
        ejemplo, fieltro, sarga) que está en contacto con el artículo que se está
        decorando.
    patch_backing_type:
      name: Tipo de respaldo del soporte
      description: El tipo de soporte utilizado en el parche (por ejemplo, termoadhesivo/planchado,
        adhesivo despegable, velcro, ninguno).
    patch_base_material:
      name: Material de base del parche
      description: Material textil base/de soporte principal del parche con motivo
        (no los adornos decorativos).
    patch_border_edge_finish:
      name: Acabado de borde o borde de parche
      description: El método de acabado de los bordes del parche (por ejemplo, borde
        remallado/sobrehilado, borde cortado con láser) afecta la durabilidad y la
        apariencia.
    patch_placement_area:
      name: Área de ubicación del parche
      description: Área de ubicación común prevista para el parche en ropa y accesorios.
    pathogen_removal_capability:
      name: Capacidad de eliminación de patógenos
      description: Especifica qué clases de microorganismos (bacterias, protozoos,
        virus) la bomba puede eliminar por certificación.
    pattern_sizing_system:
      name: Sistema de tallas de patrones
      description: Especifica el sistema de tamaños regional o estándar utilizado
        para la tabla de tallas del patrón (por ejemplo, EE. UU., Reino Unido, UE).
    peak_style:
      name: Estilo de correa
      description: Especifica el estilo del visor o de la cúpula del casco, lo que
        afecta a la cobertura, la estética y las normas de disciplina.
    pear_variety:
      name: Variedad de pera
      description: Identifica el cultivo o la variedad de peras (por ejemplo, Bartlett,
        Bosc, Conference), lo que permite al comprador elegir el sabor, la textura
        y el uso culinario que prefiera.
    pearl_luster_grade:
      name: Grado de brillo perlado
      description: Grado cualitativo de brillo y luminosidad de la superficie de la
        perla.
    pearl_matching_level:
      name: Nivel de coincidencia de perlas
      description: Indica el grado de coincidencia entre las perlas de un lote o collar
        (por ejemplo, por color, tamaño y brillo).
    pearl_shape:
      name: Forma de las perlas
      description: La categoría general de forma de las perlas.
    pearl_surface_condition:
      name: Estado de la superficie de la perla
      description: Indica el estado visible de la superficie de una perla, en función
        de la presencia y la gravedad de imperfecciones o manchas.
    pearl_treatment:
      name: Tratamiento de la perla
      description: Describe cualquier variación aplicada a la perla que afecte el
        color o la apariencia.
    pearl_type:
      name: Tipo de perla
      description: Especifica la variedad o el origen de la perla (por ejemplo, de
        agua dulce, Akoya, tahitiana, del Mar del Sur) para las perlas sueltas.
    peat_level:
      name: Nivel de turba
      description: Describe la intensidad de la influencia del humo de turba en el
        whisky; desde la ausencia hasta la presencia abundante de turba.
    pedal_and_cleat_system_compatibility:
      name: Compatibilidad con sistemas de pedales y calas
      description: Especifica con qué estándares de pedal o cala está diseñado para
        funcionar el calce o la cuña, lo que garantiza que el comprador elija un producto
        que se ajuste a sus pedales y su calzado.
    pedal_configuration:
      name: Configuración del pedal
      description: Indica si la silla cuenta con un solo pedal, pedales divididos
        o independientes, o un diseño convertible.
    pedal_mounting_style:
      name: Estilo de montaje del pedal
      description: Especifica cómo se fija el pedal o la cubierta o almohadilla de
        este al vehículo (método de instalación o fijación).
    pedal_set_components:
      name: Componentes del juego de pedales
      description: Especifica qué pedales están incluidos en el conjunto.
    pedal_spindle_material:
      name: Material del eje del pedal
      description: El material utilizado para el eje o husillo del pedal, que influye
        sobre su resistencia, peso y resistencia a la corrosión.
    pedal_spindle_thread_size:
      name: Tamaño de rosca del eje del pedal
      description: Especifica el estándar de rosca del eje del pedal que se enrosca
        en la biela.
    pedal_type:
      name: Tipo de pedales
      description: Describe el estilo de pedales provistos con la bicicleta, e indica
        la compatibilidad con el calzado y el estilo de conducción.
    pellet_accessory_type:
      name: Tipo de accesorio para pellets
      description: Permite identificar el tipo específico de accesorio para pellets,
        de modo que los pescadores puedan localizar rápidamente perforadores, colocadores
        de bandas o topes según las necesidades de montaje de sus aparejos.
    pellet_grade:
      name: Clase de municiones
      description: Indica la precisión de fabricación o el grado de rendimiento de
        las municiones de airsoft.
    pen_ink_color:
      name: Color de la tinta del bolígrafo
      description: Indica el color real de la tinta que dispensa el bolígrafo, que
        puede diferir del color exterior del cuerpo.
    penalty_card_accessories_included:
      name: Accesorios para tarjeta de penalización incluidos
      description: Enumera los accesorios adicionales para el arbitraje que se incluyen
        con la tarjeta de penalización, como la billetera digital, el bloc de anotaciones,
        el lápiz, la moneda, el silbato o la bolsa.
    penalty_card_colors_included:
      name: Colores de tarjetas de penalización incluidas
      description: Enumera los colores de la tarjeta de penalización que contiene
        el conjunto del producto.
    penalty_flag_throw_distance:
      name: Distancia de lanzamiento del banderín de penalti
      description: Clasificación del diseño que indica el alcance previsto del lanzamiento
        del banderín.
    pendant_cutter_safety_features:
      name: Características de seguridad del cortador colgante
      description: Identifica elementos de seguridad integrados que reducen los cortes
        accidentales durante el transporte o el uso.
    pendant_cutter_wear_method:
      name: Método de uso del cortador colgante
      description: Especifica cómo se debe llevar o usar el cortador colgante.
    pepper_variety:
      name: Variedad de pimiento
      description: Especifica la variedad o especie de pimiento utilizada en el producto,
        lo que permite al comprador distinguir entre diferentes perfiles de sabor
        y niveles de picante.
    percussion_case_style:
      name: Estilo de estuche de percusión
      description: Clasifica el estilo o la construcción general del estuche (bolsa
        blanda, caja dura o rígida o configuración híbrida).
    percussion_instruments_included:
      name: Instrumentos de percusión incluidos
      description: Enumera los tipos de instrumentos de percusión incluidos cuando
        el producto es un conjunto de juguetes con varios instrumentos.
    percussion_mallet_handle_grip_style:
      name: Estilo de agarre de la empuñadura del mazo de percusión
      description: Identifica el tipo de variación de agarre de la empuñadura (aparte
        de la textura), como madera sin tratar, lacada, con revestimiento de goma
        o envuelta.
    percussion_mallet_head_construction:
      name: Construcción de la cabeza del mazo de percusión
      description: Describe el estilo de construcción de la cabeza del mazo (por ejemplo,
        hilo envuelto, fieltro envuelto, goma, madera sin tratar), que influye en
        el sonido y la durabilidad.
    perfumery_base_carrier_type:
      name: Tipo de base portadora en perfumería
      description: Especifica el sistema solvente/portador de una base de perfumería
        (de qué está compuesta principalmente la base para dilución y rendimiento).
    perfumery_base_intended_application:
      name: Aplicación prevista de base portadora en perfumería
      description: Indica el formato de uso final para el que está diseñada la base
        (por ejemplo, espray de fragancia fina vs. con bolilla).
    perfumery_ingredient_carrier_solvent:
      name: Vehículo o solvente del Ingredientes de perfumería
      description: Identifica al vehículo o solvente en el que se provee el ingrediente,
        si está diluido (por ejemplo, etanol, DPG, aceite de jojoba).
    perfumery_ingredient_form:
      name: Forma de ingredientes de perfumería
      description: Especifica la forma o el estado físico del ingrediente de perfumería
        tal como se provee.
    perfumery_ingredient_type:
      name: Tipo de ingredientes de perfumería
      description: Clasifica los ingredientes de perfumería según su función en la
        práctica perfumística (por ejemplo, aceite esencial, sustancia química aromática).
    perfumery_ingredient_usage_note:
      name: Nota sobre el uso de ingredientes de perfumería
      description: Indica el papel típico en la estructura de una fragancia (notas
        de salida, corazón o partes de fondo), reconociendo que los materiales pueden
        abarcar varias notas.
    perfumery_ingredients:
      name: Ingredientes de perfumería
      description: Enumera los tipos de materiales de fragancia consumibles incluidos
        en el kit (por ejemplo, aceites esenciales, aceites aromáticos, base de alcohol).
    perfumery_note_position:
      name: Posición de la nota de perfumería
      description: Indica la función típica del ingrediente en la estructura de una
        fragancia (notas de salida, corazón o fondo).
    persimmon_variety:
      name: Variedad de caqui
      description: Identifica el cultivo o la variedad del caqui, ya que las diferentes
        variedades, como Fuyu o Hachiya, difieren en textura, sabor, astringencia
        y uso culinario.
    personalization_type:
      name: Tipo de personalización
      description: Especifica si el producto se puede personalizar para un evento
        y cómo hacerlo (por ejemplo, monograma, nombre/fecha, inserción de foto).
    phonics_focus:
      name: Enfoque en la fonética
      description: Especifica qué habilidad fonética y de lectura de palabras desarrolla
        el juguete de lectura.
    physalis_variety:
      name: Variedad Physalis
      description: Identifica la especie botánica específica, el cultivo o la variedad
        común de physalis que se vende.
    pi_ata_filler_type_included:
      name: Tipo de relleno de piñata incluido
      description: Si se incluye material de relleno, se debe indicar el tipo de contenido
        provisto.
    pi_ata_hanging_method:
      name: Método para colgar piñatas
      description: Cómo está diseñada la piñata para colgarla o sostenerla (si incluye
        lazo, gancho, cadena, etc.).
    pi_ata_opening_type:
      name: Tipo de apertura de piñata
      description: Cómo se accede a la abertura de llenado y cómo se cierra (solapa,
        velcro, cremallera, presellado, etc.).
    piccolo_key_system:
      name: Sistema de teclas del piccolo
      description: Identifica el sistema o diseño de teclas utilizado en el piccolo
        (normalmente, el sistema Boehm para los piccolos modernos).
    piccolo_keywork_features:
      name: Características de los mecanismos de llaves del piccolo
      description: Especifica los mecanismos de teclas y las opciones más destacadas
        del piccolo.
    pick_grip_aid:
      name: Ayuda de agarre de la púa
      description: Indica la ayuda de agarre principal incorporada en la púa, aparte
        de la sensación o textura general de la superficie (por ejemplo, agujeros
        de agarre, logo en relieve, incrustación de goma).
    pickleball_construction_type:
      name: Tipo de construcción de la pelota de pickleball
      description: La construcción de fabricación de la pelota, como por ejemplo de
        una sola pieza sin costuras o de dos piezas soldadas, que influye la durabilidad
        y la consistencia del vuelo.
    pickling_method:
      name: Método de encurtido
      description: Especifica el medio o la técnica de conservación utilizada para
        el encurtido, como la salmuera de vinagre o la fermentación láctica.
    pickup_and_preamp_configuration:
      name: Configuración de los micrófonos y el preamplificador
      description: Indica si la viola incluye un micrófono integrado y/o un preamplificador
        activo para rendimiento amplificado o grabación.
    pickup_configuration:
      name: Configuración de micrófonos
      description: Describe el diseño general de los micrófonos de una guitarra eléctrica
        utilizando abreviaturas comunes (por ejemplo, SSS, HSS, HH).
    pickup_cover_material:
      name: Material de la cubierta de los micrófonos
      description: Especifica el material principal de la cubierta de los micrófonos
        (si la hay), incluidos los acabados chapados comunes cuando lo especifica
        el fabricante.
    pickup_cover_type:
      name: Tipo de cubierta de retiro
      description: Especifica si el micrófono de una guitarra eléctrica tiene una
        cubierta y el material o estilo de este (por ejemplo, metal vs. plástico).
    pickup_string_spacing:
      name: Espaciamiento entre el micrófono y las cuerdas
      description: El estándar de espaciado entre los polos y las cuerdas para el
        que está hecho el micrófono (por ejemplo, Fender y espaciado F vs. Gibson
        o espaciado estándar), que afecta a la alineación en guitarras equipadas con
        trémolo.
    pie_crust_type:
      name: Tipo de masa de tarta
      description: Especifica el estilo o tipo de masa utilizada para el pastel o
        la tarta, como la masa hojaldrada, la masa de galleta Graham o la masa sin
        gluten.
    piece_configuration:
      name: Configuración de piezas
      description: Indica de cuántas piezas separadas se componen el taco, la flecha
        o el puente, lo que afecta a la portabilidad y al estilo de juego.
    pillow_form_size:
      name: Tamaño del relleno de almohadón
      description: Designación de tamaño estandarizado para rellenos o colchones de
        almohada (p. ej., 18" x 18").
    pilot_helmet_communications_integration:
      name: Integración de comunicaciones en el casco del piloto
      description: Indica si el casco incluye componentes de comunicaciones aeronáuticas
        o está preconfigurado para ellos.
    pilot_helmet_visor_configuration:
      name: Configuración del visor del casco de piloto
      description: Especifica la configuración del visor o protector facial incluido
        con el casco de piloto.
    pin_attachment_type:
      name: Tipo de sujeción del prendedor
      description: Especifica el mecanismo de sujeción trasero utilizado para fijar
        el broche a la ropa o a una superficie (por ejemplo, cierre de mariposa, cierre
        magnético).
    pin_backing_type:
      name: Tipo de respaldo del prendedor
      description: Especifica el mecanismo de sujeción o refuerzo utilizado para fijar
        el broche a la ropa o a los accesorios.
    pin_cushion_attachment_style:
      name: Estilo de sujeción del alfiletero
      description: Cómo se lleva, sujeta o sitúa el alfiletero durante su uso.
    pin_cushion_features:
      name: Características del alfiletero
      description: Características funcionales aparte del guardado de alfileres.
    pin_face_customization_method:
      name: Método de personalización de caras de prendedores
      description: Especifica cómo se produce el diseño frontal (por ejemplo, esmalte
        duro, esmalte blando, impreso).
    pin_type:
      name: Tipo de prendedor
      description: Especifica el estilo o formato del producto de prendedor utilizado
        para artículos coleccionables de aficionados a los deportes.
    ping_pong_certification:
      name: Certificación de ping pong
      description: Declara el estándar oficial o el nivel de aprobación del organismo
        regulador del producto.
    ping_pong_competition_certification:
      name: Certificación para competiciones de ping pong
      description: Indica el estado de certificación oficial de la pelota de ping
        pong para su uso en competiciones autorizadas (por ejemplo, aprobada por la
        ITTF).
    ping_pong_paddle_handle_style:
      name: Estilo de mango de paletas de ping pong
      description: Define la forma o el estilo del identificador de la pala, que influye
        sobre la comodidad del agarre y la técnica de juego.
    ping_pong_robot_accessory_type:
      name: Tipo de accesorio para robot lanzapelotas de ping pong
      description: Identifica el subtipo funcional del accesorio para que el comprador
        pueda acotar rápidamente los resultados (por ejemplo, redes vs. adaptadores
        de corriente).
    ping_pong_rubber_surface_type:
      name: Tipo de superficie de goma de ping pong
      description: Identifica el estilo o la textura de la superficie de goma aplicada
        a la pala, lo que afecta a las características de giro y velocidad.
    ping_pong_rubber_type:
      name: Tipo de goma de Ping pong
      description: Especifica el estilo de construcción de la superficie de una lámina
        de goma de ping pong, que influye sobre las características de juego.
    ping_pong_table_type:
      name: Tipo de mesa de ping pong
      description: Clasifica el estilo o formato general de la mesa para facilitar
        la comparación (p. ej., competición, tapa convertible, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Método de afinación y producción sonora de instrumentos de viento
      description: Especifica cómo el instrumento produce sonido (mecanismo de flujo
        de aire), lo que ayuda a distinguir flautas de pan, tubos de lengüeta y familias
        de tubos de órgano entre los filtros.
    piston_application_type:
      name: Tipo de aplicación de pistón
      description: Resistencia y uso previstos del pistón (repuesto, rendimiento o
        competición, uso intensivo).
    piston_crown_dish_style:
      name: Estilo de corona y cavidad del pistón
      description: Forma de la corona del pistón que influye sobre el volumen y la
        compresión de la cámara de combustión (por ejemplo, parte superior plana,
        abombada, cóncava).
    piston_pin_retention_type:
      name: Tipo de retención del perno del pistón
      description: Especifica cómo se retiene el perno del pistón en el conjunto de
        pistón y biela.
    pit_configuration:
      name: Configuración del foso
      description: Define el formato estructural del área de aterrizaje (una pieza
        vs. varios módulos) y, por extensión, el número de secciones o módulos provistos.
    pit_cover_type:
      name: Tipo de la cubierta del foso
      description: Especifica la superficie o lámina protectora provista con el foso,
        lo que afecta la resistencia a los clavos, la protección contra la intemperie
        y las preferencias del atleta.
    pitahaya_flesh_color:
      name: Color de la pulpa de pitahaya
      description: Especifica el color de la pulpa interior de la pitahaya (fruta
        del dragón) (por ejemplo, blanco, rojo, magenta), un factor diferenciador
        clave que influye sobre el sabor, el aspecto y la percepción nutricional.
    pitch_mat_coverage_length:
      name: Longitud de cobertura de la alfombra de juego
      description: Clasifica la alfombra del campo de críquet según la porción del
        wicket que cubre (por ejemplo, campo completo o medio campo).
    pitch_range:
      name: Rango de tono
      description: Describe el rango de tono/brillo percibido del sonido del shaker.
    pitch_standard:
      name: Estándar de tono
      description: Especifica el estándar de tono (afinación de referencia) para el
        que está construida la flauta dulce (por ejemplo, La=440, La=442, La=415).
    pitching_rubber_size_designation:
      name: Designación de tamaño de la goma de lanzamiento
      description: Indica la clasificación estándar de tamaño de campo para la goma
        de lanzamiento, lo que simplifica la selección sin que el comprador tenga
        que conocer las medidas exactas.
    pitching_screen_style:
      name: Estilo de pantalla protectora para lanzamiento
      description: Define el diseño estructural de la pantalla protectora para que
        el comprador pueda seleccionar rápidamente el diseño de protección adecuado
        para su situación de entrenamiento.
    pitching_target_design:
      name: Diseño de objetivos de lanzamiento
      description: Clasifica el estilo o la configuración general del objetivo de
        lanzamiento.
    pitching_wheel_count:
      name: Número de ruedas de lanzamiento
      description: Indica el número de ruedas de propulsión que utiliza una máquina
        de lanzamiento.
    pivot_adjustability:
      name: Ajustabilidad del pivote
      description: Indica si las tijeras tienen un tornillo de pivote ajustable para
        regular la tensión de corte.
    pivot_piece_type:
      name: Tipo de pieza pivotante
      description: Distingue entre diferentes formas de interfaz de pivote provistas,
        como las copas tradicionales o el estilo de tubo.
    place_card_holder_closure_mechanism:
      name: Mecanismo de cierre del portatarjetas de lugar
      description: Especifica cómo el portatarjetas de lugar sujeta o asegura una
        tarjeta.
    place_card_orientation:
      name: Orientación de la tarjeta de lugar
      description: Especifica la orientación de la tarjeta de lugar cuando se utiliza
        o se muestra.
    place_card_printing_status:
      name: Estado de impresión de la tarjeta
      description: Indica si la tarjeta de lugar está en blanco para escribir a mano
        o imprimir, preimpresa (nombres sin personalizar) o bien personalizada o impresa
        a medida.
    placket_type:
      name: Tipo de tapeta
      description: Especifica el estilo de la abertura frontal del polo, lo que incluye
        el número de botones o cierres alternativos.
    planetarium_content_theme:
      name: Tema de contenido del proyector de planetario
      description: Contenido principal mostrado por el proyector de planetario.
    planetarium_projection_content_format:
      name: Formato de contenido de proyección del planetario
      description: Especifica el mecanismo de proyección de contenido que utiliza
        el planetario (discos o diapositivas físicas vs. efectos digitales y LED).
    plant_fiber_type:
      name: Tipo de fibra vegetal
      description: Tipo específico de fibra vegetal cuando el tipo de fuente de fibra
        discontinua es vegetal.
    plaster_gauze_finish:
      name: Acabado de gasa de yeso
      description: Tendencia del acabado superficial resultante tras la aplicación
        y el alisado.
    plaster_gauze_grade:
      name: Grado de gasa para yeso
      description: Grado de uso previsto de la gasa de yeso (por ejemplo, uso en manualidades
        o estudiantil vs. uso profesional).
    plaster_gauze_weave_density:
      name: Densidad del tejido de gasa de yeso
      description: Apertura o estrechez relativa del tejido de la gasa, que afecta
        la resistencia y la adherencia del yeso.
    plastic_canvas_finish:
      name: Acabado de malla plástica
      description: Tratamiento de superficie o acabado del rollo de malla plástica.
    plastic_canvas_sheet_finish:
      name: Acabado de la lámina de malla plástica
      description: Tratamiento de superficie o borde de la lámina de malla plástica.
    plastic_canvas_transparency:
      name: Transparencia de la malla plástica
      description: Qué tan transparente u opaca es la malla plástica.
    plate_bottom_design:
      name: Diseño de fondo de placa
      description: Describe la construcción de la parte inferior de la placa, que
        afecta la tracción, la estabilidad y la seguridad en diferentes superficies
        de juego.
    plate_compatibility_standard:
      name: Estándar de compatibilidad de la placa
      description: Indica el estándar de discos de peso para el que está diseñada
        la barra (por ejemplo, olímpico de 50 mm, estándar de 25 mm).
    plate_installation_type:
      name: Tipo de instalación de placa
      description: Especifica cómo se fija o coloca la placa en el campo (por ejemplo,
        enterrada, con estacas, lanzada al suelo), lo que permite al comprador elegir
        entre opciones permanentes y portátiles.
    plate_size_category:
      name: Categoría de tamaño de la placa
      description: Clasifica el plato por nivel de juego o norma reglamentaria para
        que el comprador pueda localizar rápidamente el equipo que cumple con las
        normas de la liga.
    play_dough_putty_kit_contents:
      name: Contenido del kit de plastilina y masilla
      description: Identifica los principales componentes incluidos aparte del compuesto
        en sí (por ejemplo, herramientas, moldes, extrusora, almacenamiento).
    play_dough_tool_set_items_included:
      name: Artículos incluidos del juego de herramientas para plastilina
      description: Identifica los tipos de herramientas y accesorios incluidos en
        un juego de herramientas para plastilina (por ejemplo, rodillos, cortadores,
        moldes).
    play_environment_suitability:
      name: Idoneidad del entorno de juego
      description: Identifica el entorno de juego previsto para el conjunto (por ejemplo,
        interior, exterior, agua).
    play_food_features:
      name: Características de la comida de juguete
      description: Características funcionales o de realismo especiales de los artículos
        de comida de juguete.
    play_food_items_included:
      name: Artículos de comida de juguete incluidos
      description: Indica los tipos de comida de juguete incluidos en el juego de
        cocina.
    play_food_size_scale:
      name: Escala de tamaño de la comida de juguete
      description: Indica la escala aproximada de las piezas de comida de juguete
        para que sean compatibles con cocinas de juguete, muñecas y conjuntos de juego.
    play_money_set_components_included:
      name: Componentes del juego de dinero de juguete incluidos
      description: Especifica qué tipos de componentes se incluyen en el conjunto
        de dinero y banco de juguete.
    play_pattern:
      name: Patrón de juego
      description: La principal forma en que se pretende utilizar el juguete (por
        ejemplo, para aliviar el estrés, como escultura o elemento artístico de escritorio,
        para construir o como rompecabezas).
    play_sprinkler_mounting_type:
      name: Tipo de montaje del aspersor de juguete
      description: Cómo se coloca o fija el aspersor de juguete durante su uso.
    play_vehicle_lights_and_sounds:
      name: Luces y sonidos del vehículo de juguete
      description: Indica si el vehículo de juguete incluye efectos de juego electrónicos,
        como luces o sonidos.
    play_vehicle_scale:
      name: Escala del vehículo de juguete
      description: Indica la escala del vehículo de juguete (se usa comúnmente para
        vehículos de juguete de fundición y de modelos).
    player_size_category:
      name: Categoría de talla del jugador
      description: Define la categoría de tamaño y edad del jugador al que está destinado
        el conjunto de equipamiento de cácher (por ejemplo, tee ball, juvenil, intermedio,
        adulto).
    player_size_range:
      name: Rango de tallas del jugador
      description: Especifica el rango de tallas previsto para la correa o el soporte
        (por ejemplo, niño, adulto, universal).
    playing_environment:
      name: Entorno de juego
      description: Especifica la superficie o el contexto de juego principal para
        el que está diseñada la pelota de hockey.
    playing_method:
      name: Método de juego
      description: Forma principal en que se supone que se debe tocar o accionar el
        instrumento.
    playing_surface_material:
      name: Material de la superficie de juego
      description: Identifica el material de la superficie frontal del cajón (tapa),
        que influye notablemente sobre el tono y la sensación al tocar.
    playing_surface_type:
      name: Tipo de superficie de juego
      description: Describe la construcción y la sensación de la superficie de juego
        de la alfombrilla de práctica.
    playset_activities_included:
      name: Se incluyen actividades del juego
      description: Identifica las actividades y los componentes de juego principales
        integrados en el columpio o juego infantil para ayudar al comprador a filtrar
        según lo que los niños pueden hacer en la estructura.
    playset_installation_type:
      name: Tipo de instalación del set de juego
      description: Especifica cómo se instala o se asegura el columpio o juego infantil.
    playset_items_included:
      name: Elementos incluidos del set de juego
      description: Identifica los tipos de artículos de juego incluidos en el set
        de picnic (comida, vajilla, manta, cesta, etc.).
    pliers_jaw_style:
      name: Estilo de mandíbula de los alicates
      description: Describe la configuración principal de las mandíbulas o el estilo
        funcional de los alicates.
    plum_variety:
      name: Variedad de ciruela
      description: Identifica la variedad o el cultivo específico de ciruela, lo que
        permite al comprador elegir en función del sabor, el color y el uso culinario
        previsto.
    plumcot_variety:
      name: Variedad de ciruelo-damasco
      description: Identifica el cultivo específico o la variedad comercial del ciruelo-damasco
        (por ejemplo, Flavor King, Dapple Dandy), que puede influir sobre el sabor,
        el color y la estacionalidad.
    plunger_mute_handle_type:
      name: Tipo de identificador de silencio del émbolo
      description: Especifica el identificador o el estilo de agarre que se utiliza
        para sujetar y manipular una sordina plunger para efectos wah-wah.
    pocket_closure_type:
      name: Tipo de cierre de bolsillo
      description: Define cómo se asegura cada bolsillo, lo que ayuda a los usuarios
        a encontrar pantalones con almacenamiento seguro durante la actividad.
    pocket_knife_opening_mechanism:
      name: Mecanismo de apertura de la navaja de bolsillo
      description: Cómo se despliega o abre la hoja (muesca para la uña, perno para
        el pulgar, aleta, apertura asistida, apertura automática, etc.).
    pocket_style:
      name: Estilo de bolsillo
      description: Especifica la confección de bolsillos principal de los pantalones.
    pocket_type:
      name: Tipo de bolsillo
      description: Indica el estilo o la presencia de bolsillos en la prenda.
    pod_retention_system:
      name: Sistema de retención de los cartuchos
      description: Describe cómo se sujetan los cartuchos de paintball y cómo se liberan
        del arnés o paquete.
    pogo_stick_footrest_type:
      name: Tipo reposapiés de estilo palo saltarín
      description: Describe el diseño de la plataforma o el apoyo para los pies que
        se utiliza para mantenerse de pie sobre el palo saltarín.
    pogo_stick_suspension_type:
      name: Tipo de suspensión de estilo palo saltarín
      description: Especifica el mecanismo de rebote del palo saltarín, que influye
        sobre la sensación, la durabilidad y el mantenimiento.
    poi_handle_type:
      name: Tipo de mango del poi
      description: Especifica el estilo de mango, agarre o sujeción para sostener
        el poi.
    poi_light_source:
      name: Fuente de luz del poi
      description: Para poi iluminados, especifica la tecnología de iluminación.
    poi_tether_type:
      name: Tipo de atadura del poi
      description: Indica el tipo de sujeción que conecta la cabeza del poi con el
        mango, la perilla o la presilla de la muñeca (por ejemplo, cordón, cuerda,
        cadena).
    poi_type:
      name: Tipo de poi
      description: Especifica el tipo principal de construcción o uso del poi (por
        ejemplo, práctica, LED, fuego).
    point_type:
      name: Tipo de punto
      description: Forma o estilo de la punta utilizada en la aguja de bordar.
    pointe_shoe_shank_length:
      name: Largo del cambrillón de la zapatilla de punta
      description: Parte del tramo del calzado que el cambrillón sostiene; por ejemplo,
        largo completo o 3/4 de largo.
    pointe_shoe_shank_strength:
      name: Resistencia del cambrillón de la zapatilla de punta
      description: Nivel de rigidez del cambrillón de la zapatilla de punta, que afecta
        el soporte y el tiempo de adaptación.
    poker_accessory_storage_included:
      name: Almacenamiento para guardar accesorios de póker incluido
      description: Indica para qué artículos adicionale de póquer ofrece almacenamiento
        específico el accesorio.
    poker_chip_tray_rack_configuration:
      name: Configuración de la bandeja para fichas de póquer
      description: Describe el estilo de organización interna de una bandeja para
        fichas (filas y capacidad por fila).
    pole_anchoring_method:
      name: Método de anclaje del bastón
      description: Define cómo se fija el poste al suelo o a la superficie de juego.
    pole_basket_type:
      name: Tipo de roseta del bastón
      description: Clasifica el estilo o tamaño de la roseta colocada cerca de la
        punta del bastón de esquí e indica las condiciones de nieve previstas.
    pole_connection_system:
      name: Sistema de conexión de postes
      description: Identifica el mecanismo que une las secciones del poste, como los
        sistemas de cordón elástico, roscado o con conectores tipo nodo, lo que ayuda
        a los usuarios a evaluar la velocidad y compatibilidad de la configuración.
    pole_system_type:
      name: Tipo de sistema del bastón
      description: Describe el sistema de ayuda estructural o el estilo de montaje
        de la tienda de campaña (por ejemplo, postes de aluminio, tubos de aire inflables,
        montaje con bastones de senderismo).
    police_equipment_fitment:
      name: Admisión de equipamiento policial
      description: Especifica para qué equipamiento policial está configurado o precableado
        el vehículo.
    police_vehicle_equipment_package:
      name: Paquete de equipamiento para vehículos policiales
      description: Indica el equipamiento o la adaptación específicos para uso policial
        que se incluyen con el vehículo tal como se vende.
    police_vehicle_light_siren_equipment:
      name: Equipo de luces y sirenas para vehículos policiales
      description: Especifica qué dispositivos de alerta de emergencia están instalados
        en el patrullero.
    police_vehicle_upfit_level:
      name: Nivel de equipamiento de vehículos policiales
      description: Describe qué equipo o adaptación específicos para la policía están
        instalados en el vehículo.
    polish_formulation:
      name: Formulación del pulimento
      description: Indica la base o química de la formulación del pulimento para diapasón
        (no el método de aplicación).
    polish_purpose:
      name: Propósito del pulimento
      description: Resultado principal previsto del pulimento sobre la superficie
        del instrumento.
    pollen_level:
      name: Nivel de polen
      description: Indica la cantidad o probabilidad de tinción por polen de la variedad
        de lirio.
    polymer_clay_firmness_level:
      name: Nivel de firmeza de la arcilla polimérica
      description: Firmeza o suavidad relativa de la arcilla polimérica antes del
        horneado (maleabilidad).
    polymer_clay_translucency:
      name: Translucidez de la arcilla polimérica
      description: Opacidad o transparencia visual de la arcilla polimérica una vez
        curada.
    pom_pom_handle_style:
      name: Estilo de mango del pompón
      description: Describe el estilo o la construcción del mango utilizado para sujetar
        el pompón.
    pom_pom_trim_backing_tape_material:
      name: Material de la tira o cinta de pompones
      description: Identifica el material de la cinta o trenza cosida a la que se
        unen los pompones (la base de la tira).
    pom_pom_type:
      name: Tipo de pompones
      description: Indica la presencia y el tipo específico de pompón o borla en el
        sombrero.
    pomegranate_product_form:
      name: Formato de producto de granada
      description: Describe la forma física disponible (fruta entera, arilos pelados,
        semillas, arilos congelados).
    pomegranate_variety:
      name: Variedad de granada
      description: Identifica el cultivo o la variedad específica del fruto de la
        granada (por ejemplo, Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Estilo de sujetador de cola de caballo
      description: Describe la confección o el formato específico del sujetador para
        el pelo, para que el comprador pueda elegir su estilo preferido.
    popcorn_form:
      name: Forma de las palomitas de maíz
      description: Indica la forma física o de preparación del producto de palomitas
        de maíz, tales como listas para comer, en granos, en paquete para microondas,
        en kit con condimento o en lata de regalo.
    pork_rind_form:
      name: Forma del chicharrón de cerdo
      description: Clasifica la forma física o el estilo de los aperitivos de chicharrón
        de cerdo (por ejemplo, tipo corteza, crujiente, inflado, tipo pellet, etc.).
    portability_features:
      name: Características de portabilidad
      description: Enumera los elementos incorporados que ayudan a mover, transportar
        o guardar la reposera.
    portability_frame_type:
      name: Tipo de portabilidad o bastidor
      description: Si las campanas tubulares de orquesta son de portátiles o con bastidor
        de campo, o bien fijas o con bastidor de concierto.
    portable_electronic_game_features:
      name: Características de los juegos electrónicos portátiles
      description: Características principales de juego y hardware compatibles con
        el dispositivo.
    post_surgery_stage_suitability:
      name: Idoneidad para etapa postoperatoria
      description: Indica para qué etapa de recuperación (si la hay) está diseñado
        el bodi, importante para el comprador de fajas médicas.
    postage_stamp_format:
      name: Formato de sello postal
      description: Cómo se ofrece o empaqueta la estampilla definitiva (individual,
        par, tira, bloque, hoja, panel de libreta, rollo, etc.).
    postmark_type:
      name: Tipo de matasellos
      description: Tipo de matasellos o cancelación presente en sellos postales usados.
    potato_cut_style:
      name: Estilo de corte de las papas
      description: Indica el tipo de corte o preparación de las papas cuando no se
        venden enteras.
    potato_intended_use:
      name: Uso previsto de las papas
      description: Diferencia las patatas destinadas al consumo inmediato de aquellas
        destinadas a la siembra o al consumo de productos congelados procesados.
    potato_variety:
      name: Variedad de patata
      description: Especifica el cultivo o la variedad de las papas, lo que permite
        al comprador encontrar tipos específicos como “Yukon oro”, “Maris Piper” o
        “Purple Majesty”.
    pottery_clay_firing_required:
      name: Requisito de cocción de arcilla de cerámica
      description: Si el material requiere cocción en horno para alcanzar la dureza
        o terminación final deseada.
    pottery_slip_application_method:
      name: Método de aplicación de la barbotina para cerámica
      description: Especifica la técnica de aplicación prevista para la barbotina.
    pottery_slip_compatible_clay_body:
      name: Pasta cerámica compatible con la barbotina
      description: Indica el tipo o tipos de arcilla con los que está diseñado para
        combinar o trabajar el engobe.
    pottery_slip_form:
      name: Forma de barbotina para cerámica
      description: Indica si el producto se vende como líquido listo para usar o como
        mezcla seca o polvo que requiera mezcla.
    pouch_design:
      name: Diseño de bolsillos
      description: Información sobre las características de confección o mejora del
        área de los bolsillos frontales.
    pouch_style:
      name: Estilo de bolsillos
      description: Especifica el diseño de la zona de los bolsillos frontales y apunta
        a la comodidad, el soporte y las preferencias estéticas.
    powdered_beverage_variety:
      name: Variedad de bebida en polvo
      description: Clasifica el producto según el tipo de bebida que prepara (por
        ejemplo, limonada, bebida deportiva, batido de proteínas).
    power_rack_style:
      name: Estilo de jaula de entrenamiento
      description: Especifica el diseño o la configuración general de la jaula, lo
        que ayuda al comprador a distinguir entre jaulas completas, medias jaulas
        y variantes que ahorran espacio.
    power_steering_fluid_formulation:
      name: Formulación del fluido de dirección asistida
      description: La familia de formulaciones generales de fluido (a base de ATF,
        fluidos hidráulicos/CHF específicos, fluidos universales), utilizada para
        filtración de alta compatibilidad.
    practice_mute_audio_output:
      name: Salida de audio de la sordina de práctica
      description: Especifica el tipo de conexión de salida de audio disponible en
        la sordina de práctica para monitorización o grabación (común en sordinas
        de práctica silenciosas o electrónicas).
    practice_mute_intonation_impact:
      name: Impacto de entonación de la sordina de práctica
      description: Describe el efecto de afinación y entonación esperado al usar la
        sordina de práctica.
    practice_mute_venting_valve_type:
      name: Tipo de ventilación o válvula de la sordina de práctica
      description: Especifica si la sordina de práctica tiene ventilación o incluye
        una válvula ajustable para cambiar la resistencia o el volumen, y cómo se
        realiza dicha ventilación.
    practice_pad_features:
      name: Características de la almohadilla de práctica
      description: Destaca las características funcionales de la almohadilla de práctica
        aparte del tamaño y el material.
    practice_pad_mounting_style:
      name: Estilo de montaje de la almohadilla de práctica
      description: Indica cómo se debe colocar o fijar la almohadilla de práctica
        durante el uso.
    practice_pad_rebound_level:
      name: Nivel de rebote de la almohadilla de práctica
      description: Indica el rebote o la respuesta relativo de la almohadilla de práctica
        en comparación con los parches de batería típicos.
    practice_pad_surface_configuration:
      name: Configuración de la superficie de la almohadilla de práctica
      description: Describe si la almohadilla tiene una o varias superficies para
        tocar y si estas difieren en el tacto.
    pregnancy_stage_suitability:
      name: Adecuación según la etapa del embarazo
      description: Indica para qué etapas del embarazo o del posparto está diseñada
        la prenda.
    preparation_state:
      name: Estado de preparación
      description: Indica el nivel de preparación o cocción necesario antes del consumo.
    preparation_style:
      name: Estilo de preparación
      description: Define el estado de corte o procesamiento de las castañas de agua
        en el momento de la venta (por ejemplo, enteras, en rodajas, asadas, congeladas).
    preservation_medium:
      name: Medio de conservación
      description: Especifica el líquido o medio principal en el que se conservan
        las aceitunas o las alcaparras (por ejemplo, salmuera, aceite de oliva, vinagre).
    presser_foot_attachment_method:
      name: Método de fijación del prensatelas
      description: Indica cómo se fija el prensatelas de la máquina de coser al soporte
        o vástago del prensatelas (por ejemplo, a presión o a rosca), lo que afecta
        a la compatibilidad.
    pressure_gauge_type:
      name: Tipo de manómetro
      description: Indica el tipo de manómetro incluido con la bomba de bicicleta,
        si lo hubiera.
    pressure_measurement_unit:
      name: Unidad de medición de presión
      description: Indica la unidad utilizada para la lectura o calibración del sensor
        de presión, útil para comparar productos y garantizar la compatibilidad entre
        el manómetro y la ECU.
    pressure_plate_balance_type:
      name: Tipo de balanceo del plato de presión
      description: Indica si el plato de presión está balanceado internamente o si
        requiere o prevé un balanceo externo que coincida con la configuración del
        motor o volante.
    pressure_plate_components_included:
      name: Componentes del plato de presión incluidos
      description: Qué se incluye con el listado del plato de presión.
    pressure_sensor_application:
      name: Aplicación del sensor de presión
      description: Identifica el sistema o el punto de medición del vehículo para
        el que está diseñado el sensor de presión.
    pressure_sensor_port_thread_standard:
      name: Estándar puerto y rosca del sensor de presión
      description: Especifica el estándar mecánico de puerto y rosca utilizado para
        instalar el sensor en el sistema del vehículo.
    pressurization_method:
      name: Método de presurización
      description: Indica cómo se genera o se mantiene la presión dentro del dispositivo.
    pretend_housekeeping_set_items_included:
      name: Artículos incluidos del set de tareas domésticas de juguete
      description: Enumera los accesorios de limpieza que se incluyen en el set (por
        ejemplo, trapeador, escoba, pala recogedora, pulverizador).
    pretend_play_electronic_features:
      name: Características electrónicas del juego
      description: Funciones electrónicas e interactivas incluidas en el producto
        del juego.
    pretend_play_set_pieces_included:
      name: Piezas del juego incluidas
      description: Elementos/componentes clave incluidos en el set de juego de simulación
        (por ejemplo, caja registradora, comida de juguete, herramientas).
    pretend_play_set_theme:
      name: Juego de simulación tema
      description: Escenario o tema principal del juego representado por el producto
        (útil para el aprendizaje transversal en todos los niños que participan en
        el juego).
    pretzel_coating:
      name: Recubrimiento de pretzel
      description: Identifica cualquier condimento o recubrimiento exterior aplicado
        al pretzel, que abarca tanto las opciones saladas (con sal, sazonadas) como
        las dulces (con chocolate, yogur, caramelo).
    pretzel_shape:
      name: Forma del pretzel
      description: Especifica la forma física del pretzel (por ejemplo, retorcido,
        en palitos, en trocitos), un factor diferenciador clave que los clientes utilizan
        al buscar o filtrar.
    primary_component_material:
      name: Material del componente principal
      description: Material principal del bloque del motor.
    primary_dish_application:
      name: Aplicación de plato principal
      description: Indica el plato principal o la preparación para la que está destinada
        la masa.
    primary_plant_base:
      name: Base vegetal principal
      description: Indica los ingredientes principales no lácteos utilizados para
        crear la alternativa al queso.
    primary_plant_protein_source:
      name: Fuente principal de proteínas vegetales
      description: Identifica el principal ingrediente vegetal que aporta proteínas
        al producto.
    primary_sweetener_source:
      name: Fuente principal de edulcorante
      description: Identifica la planta o materia prima de la que se obtiene el jarabe.
    print_placement:
      name: Ubicación de la impresión
      description: Indica dónde se ubica el gráfico o logo principal en la camiseta.
    print_technique:
      name: Técnica de impresión
      description: Especifica el método de decoración o impresión utilizado en el
        diseño de la camiseta.
    printable_canvas_intended_use:
      name: Uso previsto del lienzo imprimible
      description: Aplicación principal para la que está optimizado el lienzo imprimible.
    printable_fabric_format:
      name: Formato de tela imprimible
      description: Especifica cómo se provee el algodón imprimible (hojas individuales
        vs. rollo continuo), lo que afecta la alimentación de la impresora y el flujo
        de trabajo del proyecto.
    prism_material:
      name: Material del prisma
      description: Especifica el material del elemento óptico en sí (el prisma), que
        afecta la claridad, la durabilidad y la resistencia a las rayas.
    prisoner_transport_configuration:
      name: Configuración del transporte de prisioneros
      description: Especifica si la furgoneta está configurada para el transporte
        de detenidos o prisioneros y, en caso afirmativo, de qué manera.
    prisoner_transport_partition_type:
      name: Tipo de mampara para el transporte de prisioneros
      description: Tipo de mampara o jaula interior que separa los compartimentos
        delantero y trasero.
    privacy_or_acoustic_feature:
      name: Función de privacidad o acústica
      description: Especifica elementos integrados de privacidad o acústicos, como
        paneles divisores, pantallas acústicas o cerramientos completos.
    processing_state:
      name: Estado de procesamiento
      description: Si las plumas están esterilizadas, lavadas o preparadas de alguna
        otra manera para su uso en artesanias.
    produce_grade:
      name: Grado del producto
      description: Clasifica el grado de calidad asignado al kiwi en función de su
        tamaño, aspecto y estado.
    produce_growth_stage:
      name: Etapa de desarrollo del producto
      description: Especifica la etapa de desarrollo en la que se vende el producto
        (por ejemplo, microvegetal, hoja tierna, hoja madura, planta viva, semilla).
    produce_washing_state:
      name: Estado de lavado del producto
      description: Indica si las verduras se lavaron y están listas para consumir.
    profile_shape:
      name: Perfil/forma
      description: Curvatura o perfil general del platillo (cuán pronunciada es su
        pendiente desde el borde hasta la campana).
    projectile_ammunition_type:
      name: Tipo de proyectil o munición
      description: Especifica el tipo de proyectiles o insumos que utiliza el arma
        de juguete, si corresponde.
    projectile_finish:
      name: Acabado del proyectil
      description: Especifica cualquier recubrimiento superficial aplicado a la BB
        que mejore su resistencia a la corrosión o su visibilidad (por ejemplo, recubrimiento
        de cobre, zincado, pintado).
    projectile_type:
      name: Tipo de proyectil
      description: Identifica el tipo de proyectil para el que está diseñado el producto.
    pronation_support:
      name: Soporte de pronación
      description: Indica el tipo de marcha o patrón de pronación para el que está
        diseñada la zapatilla.
    propellant_type:
      name: Tipo de propulsor
      description: Especifica el propulsor contemplado en el diseño de la pieza o
        el accesorio.
    propeller_blade_cup:
      name: Concavidad de las palas de la hélice
      description: Indica la concavidad (curvatura del borde posterior) de las palas.
    propeller_hub_type:
      name: Tipo de buje de la hélice
      description: Especifica el sistema de buje y casquillo utilizado por la hélice
        (kit de buje reemplazable vs. buje a presión).
    propeller_rotation:
      name: Rotación de la hélice
      description: Especifica el sentido de giro de una hélice.
    protectant_formula_base:
      name: Base de fórmula protectora
      description: Especifica la formulación básica del protector, que afecta el brillo,
        la textura y la limpieza (por ejemplo, a base de agua vs. a base de disolvente).
    protection_coverage_area:
      name: Área de cobertura de protección
      description: Indica qué partes del reloj cubre el accesorio protector.
    protection_level:
      name: Nivel de protección
      description: Indica el nivel de protección previsto del estuche para el transporte
        y almacenamiento del instrumento.
    protective_case_interior_protection_type:
      name: Tipo de protección interior del estuche protector
      description: Describe el principal método de protección interior utilizado para
        proteger y amortiguar el contenido.
    protective_case_shell_type:
      name: Tipo de carcasa protectora
      description: Identifica el estilo de construcción general del exterior del estuche
        (rigidez) que afecta la protección contra aplastamiento y la portabilidad.
    protective_contact_padding_material:
      name: Material de relleno del contacto protector
      description: Material utilizado en los puntos de contacto del instrumento (yugo
        o inserto para la campana) para evitar rayas (por ejemplo, fieltro, goma).
    protective_cup_configuration:
      name: Configuración de la coquilla protectora
      description: Especifica si la prenda incluye una coquilla protectora, si es
        extraíble o si solo cuenta con un bolsillo para colocarla.
    protective_eyewear_standard_compliance:
      name: Cumplimiento del estándar de uso de gafas de protección
      description: Especifica los estándares o las certificaciones de seguridad o
        resistencia al impacto que las gafas cumplen o superan para uso deportivo.
    protective_gear_certification_standard:
      name: Estándar de certificación de equipos de protección
      description: 'Indica el estándar de seguridad o certificación que cumple el
        equipo (varía según el tipo de artículo: estándares para cascos, estándares
        para trajes, estándares para protecciones contra impactos).'
    protective_gear_items_included:
      name: Artículos del equipo de protección incluidos
      description: Enumera las piezas de protección física que contiene un conjunto
        de equipo de protección de varias piezas.
    protective_gear_padding_type:
      name: Equipo de protección tipo relleno
      description: Especifica el tipo de relleno utilizado en los equipos de protección
        para la protección contra impactos.
    protective_gear_safety_certifications:
      name: Certificaciones de seguridad para equipos de protección
      description: Incluye una lista de los estándares de seguridad o rendimiento
        específicos para cada deporte con los que el producto cumple, como las normas
        NOCSAE o ASTM para cascos de hockey sobre césped.
    protective_pad_components_included:
      name: Componentes incluidos de la almohadilla protectora
      description: Especifica qué artículos de protección específicos se incluyen
        en un conjunto de varias piezas para que el comprador sepa exactamente qué
        partes del cuerpo están cubiertas.
    protective_shorts_intended_use:
      name: Uso previsto de los pantalones cortos protectores
      description: Disciplina principal de ciclismo o carrera para la que están diseñados
        estos pantalones cortos protectores.
    protective_shorts_padding_type:
      name: Material de relleno de los pantalones cortos de protección
      description: Especifica la confección o el formato de los elementos de protección
        utilizados en los pantalones cortos.
    protective_shorts_padding_zones:
      name: Zonas de relleno de los pantalones cortos de protección
      description: Identifica las zonas del cuerpo con relleno o protección integrados
        en los pantalones cortos protectores.
    protective_treatment:
      name: Variación protectora
      description: Especifica cualquier acabado o tratamiento de protección aplicado
        para resistencia a manchas, agua o rayos UV (por ejemplo, teflón).
    protector_coverage_area:
      name: Área de cobertura del protector
      description: Especifica las zonas del torso que el protector está diseñado para
        cubrir (por ejemplo, pecho, espalda, costados).
    puck_bottom_style:
      name: Estilo de fondo del tejo
      description: Describe el perfil de la parte inferior del tejo, que influye sobre
        la velocidad y el control en diferentes superficies de tejo de mesa.
    puck_type:
      name: Tipo de disco
      description: Clasifica el estilo funcional o el uso previsto del disco de hockey,
        desde su uso en partidos oficiales hasta su conservación como objeto de colección.
    pull_buoy_style:
      name: Estilo del flotador
      description: Indica el estilo o la configuración funcional del flotador; por
        ejemplo, estándar, de tobillo o combinada para tracción y patada.
    pull_through_weight_material:
      name: Material de peso pasante
      description: En el caso de los hisopos pasantes, se identifica el material del
        peso utilizado para guiar el hisopo a través del instrumento.
    pulp_content:
      name: Contenido de pulpa
      description: Indica la cantidad de pulpa de fruta o verdura presente en la bebida.
    pump_accessories_included:
      name: Accesorios de la bomba incluidos
      description: Listas de artículos adicionales provistos con la bomba de balón
        para que el comprador pueda entender el contenido del paquete.
    pumping_compatibility:
      name: Compatibilidad de bombeo
      description: Indica si el sujetador de lactancia está diseñado para la extracción
        de leche con manos libres, además de para la lactancia materna.
    punch_pad_type:
      name: Tipo de almohadilla perforada
      description: Especifica el diseño o estilo de un saco de boxeo o entrenamiento
        para que el comprador pueda elegir la almohadilla adecuada a sus necesidades
        de entrenamiento.
    punching_training_bag_shape:
      name: Formas de sacos de boxeo/entrenamiento
      description: Especifica el estilo geométrico de la bolsa de boxeo, lo que ayuda
        al comprador a elegir modelos adecuados para ejercicios de golpeo específicos
        (por ejemplo, uppercuts, golpes al cuerpo).
    puncture_protection_technology:
      name: Tecnología de protección contra pinchazos
      description: Enumera las capas antipinchazos patentadas o genéricas, o las tecnologías
        de refuerzo de pared lateral o cubierta incorporadas en el neumático (por
        ejemplo, EXO, SnakeSkin, cinturón Kevlar).
    puppet_features:
      name: Características de la marioneta
      description: Destaca las características funcionales o de rendimiento de la
        marioneta (por ejemplo, boca móvil, efectos de sonido, reversibilidad).
    puppet_puppet_theater_accessory_type:
      name: Tipo de accesorios para teatro de títeres y marionetas
      description: Especifica qué tipo de accesorio es el producto (por ejemplo, utilería
        de escenario, disfraz de títere, barra de control, cadena de repuesto).
    purity_unit:
      name: Unidad de pureza
      description: Cómo se expresa la pureza de la moneda (ley vs. quilates).
    push_up_bar_design:
      name: Diseño de las barras para flexiones
      description: Indica el estilo de diseño funcional de las barras para flexiones
        (por ejemplo, fijas, giratorias, paralelas).
    pushrod_end_type:
      name: Tipo de extremo de la varilla de empuje
      description: Especifica el estilo del extremo o accesorio de la varilla de empuje
        que se utiliza en la interfaz del pedal o del cilindro maestro.
    putty_glow_activation_method:
      name: Método de activación del brillo de la masilla
      description: Cómo se carga o activa la masilla para que brille (por ejemplo,
        con luz solar, luz ultravioleta o luz negra).
    putty_glow_color:
      name: Color del brillo de la masilla
      description: Identifica el color que emite la masilla cuando brilla en la oscuridad.
    putty_inclusions:
      name: Aditivos de la masilla
      description: Ingredientes adicionales destacados que se incluyen en la masilla
        (por ejemplo, brillantina, confeti, bolitas de espuma).
    putty_texture:
      name: Textura de la masilla
      description: Comportamiento principal de la masilla en la manipulación (por
        ejemplo, elástica, flexible, similar a un líquido).
    puzzle_accessory_features:
      name: Características de los accesorios para rompecabezas
      description: Características funcionales y elementos de diseño de los accesorios
        para rompecabezas (varían según el tipo de accesorio).
    pyrometric_cone_range:
      name: Rango de conos pirométricos
      description: Los conos pirométricos recomendados para los que está formulado
        el esmalte (por ejemplo, cono 06-04, cono 5-6).
    quarter_panel_coverage_type:
      name: Tipo de cobertura del panel de cuarto
      description: Especifica qué porcentaje del área del panel de cuarto el producto
        reemplaza o repara.
    quarter_panel_set_contents:
      name: Contenido del conjunto de paneles de cuarto
      description: Especifica la configuración del paquete de paneles de cuarto incluida
        en la lista (un solo lado, par o con secciones de reparación adicionales).
    quilting_ruler_markings:
      name: Marcas de la regla para acolchado
      description: Especifica los tipos de marcas impresas en la regla de acolchado
        que se utilizan para cortar/alinear.
    quilting_ruler_non_slip_feature:
      name: Función antideslizante de la regla para acolchado
      description: Indica si la regla incluye una base o tratamiento antideslizante
        para reducir el desplazamiento sobre la tela.
    quilting_ruler_transparency:
      name: Transparencia de la regla para acolchado
      description: Indica la transparencia o visibilidad del material de la regla
        para ver la tela y las marcas que hay debajo.
    quilting_thread_usage:
      name: Uso de acolchado para el hilo
      description: Indica la aplicación de acolchado prevista para el hilo (cómo se
        supone que debe usarse).
    quilting_thread_weight_system:
      name: Sistema de peso del hilo para acolchado
      description: Especifica el sistema de clasificación de grosor o peso del hilo
        utilizado para expresar el grosor de este (por ejemplo, wt, Tex, Denier),
        para que el valor numérico del grosor se pueda interpretar correctamente.
    quince_variety:
      name: Variedad de membrillo
      description: Identifica el cultivo o la variedad específica de membrillo, ya
        que el sabor, el aroma y la idoneidad culinaria pueden diferir según la variedad.
    quinoa_variety:
      name: Variedad de quinoa
      description: Permite identificar el color o la variedad específica de la quinoa,
        ya que las diferentes variedades tienen sabores, texturas y tiempos de cocción
        distintos.
    quinto_tuning_system:
      name: Sistema de afinación del quinto
      description: Cómo se afina o tensa el quinto.
    race_car_class:
      name: Clase de coches de carreras
      description: Clase o categoría de competición para la que está construido el
        coche (conjunto de reglas o agrupación de homologaciones).
    racing_balaclava_face_opening_style:
      name: Pasamontañas de carreras con abertura facial
      description: La configuración de la abertura facial del pasamontañas, que afecta
        el ajuste, el sellado y la comodidad del casco.
    racing_balaclava_neck_coverage_length:
      name: Longitud de cobertura del cuello del pasamontañas de carreras
      description: La longitud de cobertura de la falda o cubierta del cuello diseñada
        para meterse dentro del traje o sistema de restricción del cuello para sellado
        y protección.
    racing_balaclava_ventilation_zones:
      name: Zonas de ventilación del pasamontañas de carreras
      description: Zonas transpirables, de malla o ventiladas designadas para mejorar
        el flujo de aire debajo del casco.
    racing_chest_guard_intended_use:
      name: Uso previsto del protector de pecho para carreras
      description: Disciplina o contexto principal del automovilismo para los que
        está diseñado el protector de pecho.
    racing_chest_guard_size_type:
      name: Tipo de tamaño del protector de pecho para carreras
      description: Indica si el producto está diseñado para jóvenes o adultos, o bien
        si es universal o ajustable.
    racing_glove_certification_standard:
      name: Estándar de certificación de guantes de carreras
      description: Especifica la certificación el estándar de seguridad con los que
        cumplen los guantes de competición (por ejemplo, FIA, SFI, CE) y, opcionalmente,
        la clasificación o el nivel cuando corresponda.
    racing_goggles_lens_system:
      name: Sistema de lentes para gafas de carreras
      description: Especifica el sistema de intercambio de lentes o preparación para
        lentes desprendibles compatible con las gafas.
    racing_helmet_certification_standard:
      name: Estándar de certificación de cascos de carreras
      description: Las certificaciones de seguridad con las que cumple el casco de
        competición.
    racing_kart_brake_type:
      name: Tipo de freno de kart de carreras
      description: Tipo de sistema de frenado principal instalado en el kart.
    racing_kart_class:
      name: Clase de kart de carreras
      description: Clase de competición o conjunto de reglas que el kart debe cumplir.
    racing_kart_frame_material:
      name: Material del chasis del kart de carreras
      description: Material principal del chasis para el kart.
    racing_kart_seat_size:
      name: Talla de asiento del kart de carreras
      description: Designación de tamaño del asiento del kart utilizada para el ajuste.
    racing_neck_support_style:
      name: Estilo de soporte cervical de carreras
      description: Estilo estructural del soporte o collarín cervical de carreras
        y cómo interactúa con el torso o casco del piloto.
    racing_suit_certification_standard:
      name: Estándar de certificación de trajes de carreras
      description: Especifica la certificación u homologación de seguridad para competición
        con la que cumple el traje (por ejemplo, estándares FIA o SFI).
    racing_suit_cuff_design:
      name: Diseño de puños para traje de carreras
      description: Tipo de tobillera o muñequera que se utiliza para combinar con
        guantes o botas y mejorar el cierre y la comodidad.
    racing_suit_size_system:
      name: Sistema de tallas de trajes de carreras
      description: Sistema de tallas utilizado para el traje (por ejemplo, S-XXL alfabético,
        numérico de la UE y EE. UU., juvenil).
    racing_truck_discipline:
      name: Disciplina de camiones de carreras
      description: Especifica la disciplina o el formato de carrera principal para
        el que está diseñado el camión.
    rack_side_configuration:
      name: Configuración de los laterales del soporte
      description: Indica si el soporte tiene alfombrillas en uno o ambos lados, lo
        que afecta la eficiencia del espacio y el acceso.
    rack_system_configuration:
      name: Configuración del sistema de soporte
      description: Describe el diseño o la forma general del soporte del sistema de
        soporte de batería.
    racket_dampener_type:
      name: Tipo de amortiguador de vibración de la raqueta
      description: Especifica el mecanismo de instalación o el estilo funcional del
        amortiguador de vibración de la raqueta.
    racket_grip_size:
      name: Tamaño de la empuñadura de la raqueta
      description: Especifica la clasificación de talla basada en la circunferencia
        del mango de la raqueta (por ejemplo, G1–G6) para garantizar un calce y una
        comodidad adecuados en la mano.
    racket_sport_shoe_court_surface:
      name: Superficie de cancha para calzado de deportes de raqueta.
      description: Especifica la superficie de la cancha de tenis para la que está
        diseñado u optimizado el calzado, lo que ayuda a los jugadores a seleccionar
        un calzado con el dibujo de suela y compuesto de caucho adecuados para su
        superficie de juego habitual.
    racket_string_pattern:
      name: Patrón de las cuerdas de la raqueta
      description: Especifica la cantidad de cuerdas principales y transversales en
        el encordado (por ejemplo, 16 x 18), lo que influye sobre el control, el efecto
        y la durabilidad.
    racket_stringing_status:
      name: Estado del encordado de la raqueta
      description: Indica si la raqueta se vende encordada, sin encordar o preencordada.
    racket_weight_class:
      name: Clase de peso de la raqueta
      description: Proporciona las categorías de peso estándar "U" para bádminton,
        lo que permite a los jugadores seleccionar raquetas dentro de su rango de
        masa preferido.
    racquet_toy_set_equipment_included:
      name: Equipo incluido del juego de raquetas de juguete
      description: Enumera los artículos que se incluyen en el juguete o conjunto
        (por ejemplo, red, pelotas, palas o raquetas).
    racquetball_squash_training_aid_type:
      name: Tipo de ayudas para el entrenamiento de ráquetbol y squash
      description: Clasifica el tipo específico de ayuda o accesorio de entrenamiento
        para que el comprador pueda localizar rápidamente el artículo que necesita.
    radiator_cap_gasket_material:
      name: Material de la junta de la tapa del radiador
      description: Material de las juntas de sellado utilizadas en el tapón del radiador.
    radiator_cap_pressure_relief_style:
      name: Tapa de radiador con válvula de alivio de presión
      description: Especifica el estilo de alivio de presión, ventilación o accionamiento
        de la tapa del radiador, lo que puede afectar la gestión, la seguridad y la
        aplicación prevista.
    radiator_expansion_tank_cap_application:
      name: Aplicación para la tapa del radiador o depósito de expansión
      description: Indica si la tapa es para el cuello de llenado del radiador o el
        depósito de expansión o desbordamiento de refrigerante.
    radiator_fan_control_type:
      name: Tipo de control del ventilador del radiador
      description: Especifica cómo se controla o activa el ventilador del radiador.
    radiator_fan_mounting_pattern:
      name: Patrón de montaje del ventilador del radiador
      description: Especifica el estilo o patrón de montaje utilizado para fijar el
        ventilador o el conjunto del ventilador.
    radiator_fan_type:
      name: Tipo de ventilador del radiador
      description: Especifica el tipo o la configuración funcional del conjunto del
        ventilador del radiador.
    radiator_hose_end_type:
      name: Tipo de extremo de manguera del radiador
      description: Especifica el tipo de conexión o sellado principal utilizado en
        los extremos de manguera del radiador para conectarse con los puertos del
        radiador y motor.
    radiator_hose_position:
      name: Posición de las mangueras del radiador
      description: Posición funcional/tipo de manguera del radiador dentro del sistema
        de refrigeración.
    radiator_hose_shape:
      name: Forma de las mangueras del radiador
      description: La geometría o forma general de la manguera se utiliza para el
        trazado y el ajuste durante la instalación.
    radiator_overflow_tank_level_sensor_provision:
      name: Incorporación de sensor de nivel del depósito de expansión del radiador
      description: Indica si el depósito incluye o admite un sensor de nivel de refrigerante.
    radiator_overflow_tank_shape:
      name: Forma del depósito de desbordamiento del radiador
      description: Factor de forma general del cuerpo del depósito de desbordamiento.
    radish_variety:
      name: Variedad de rábano
      description: Especifica el cultivo o tipo de rábano para que el comprador pueda
        elegir características específicas de sabor, color o tamaño (por ejemplo,
        Daikon, Watermelon o French Breakfast).
    radius_of_hollow:
      name: Radio del hueco del filo
      description: Especifica el perfil hueco de la hoja producido por el afilador,
        expresado en tamaños comunes o como plano.
    rail_coverage_configuration:
      name: Configuración de cobertura ferroviaria
      description: Indica qué partes de la cuna protege el juego de fundas y aclara
        si la compra corresponde a un solo panel frontal o a un juego perimetral de
        varias piezas.
    rail_mount_standard:
      name: Estándar de montaje en riel
      description: Identifica el riel o la interfaz de montaje estándar que se utiliza
        para acoplar un accesorio (por ejemplo, mira, linterna) a una pistola de balines.
    rail_side:
      name: Lado del ferrocarril
      description: Indica si el riel de repuesto es para el lado izquierdo, el lado
        derecho o si se vende como par.
    rail_style:
      name: Estilo de riel
      description: Categoriza el diseño o la configuración general del riel (por ejemplo,
        tipo A, en arco, con quiebre), lo que determina las posibilidades de realizar
        trucos y el espacio necesario.
    rail_system:
      name: Ristema de riel
      description: Identifica la interfaz de montaje de accesorios presente en el
        arma (por ejemplo, Picatinny, M-LOK).
    rain_sensor_technology:
      name: Tecnología del sensor de lluvia
      description: El principio de detección utilizado para detectar agua en el parabrisas.
    rain_suit_configuration:
      name: Configuración del traje de lluvia
      description: Indica si el producto es de una sola pieza o un conjunto de varias
        o si tiene otra configuración.
    rainstick_construction_type:
      name: Tipo de construcción de palo de lluvia
      description: Describe cómo se construye el palo de lluvia (tubo tradicional
        de cactus/madera o alternativas modernas).
    rainstick_fill_material:
      name: Material de relleno para palos de lluvia
      description: Especifica el relleno interno utilizado para crear el sonido cascada
        (por ejemplo, semillas, cuentas).
    rainstick_playing_technique:
      name: Técnica para tocar el palo de lluvia
      description: Indica las técnicas de ejecución recomendadas o el estilo de gestión
        utilizado para producir el efecto deseado en un palo de lluvia.
    rainstick_sound_character:
      name: Carácter sonoro del palo de lluvia
      description: Describe el carácter sonoro general producido por el palo de lluvia.
    raising_method:
      name: Método de cría
      description: Describe cómo se criaron y terminaron los animales antes de su
        procesamiento (por ejemplo, alimentados a pasto, criados en pastura, finalizados
        a grano).
    rally_competition_class:
      name: Clase de competición de rally
      description: Clase de ente regulador o reglamento conforme a la cual se fabrica
        el auto de rally (cuando se conoce).
    rally_surface_setup:
      name: Configuración de la superficie de rally
      description: Superficie o terreno principal que la configuración o construcción
        del coche de rally tiene como objetivo.
    ramp_surface_texture:
      name: Textura de la superficie de la rampa
      description: Describe el acabado o el nivel de agarre de la superficie de la
        rampa.
    ratchet_mounting_style:
      name: Estilo de montaje del trinquete
      description: Indica cómo se sostiene o se monta la carraca musical durante la
        ejecución o la configuración.
    rattle_element_material:
      name: Material del elemento de sonajero
      description: Material de los elementos vibrantes o sonoros (por ejemplo, dientes,
        sonajas o cuentas) que generan el zumbido o traqueteo característico.
    rattle_type:
      name: Tipo de sonajero
      description: Indica si el señuelo contiene un sonajero o una cámara de sonido
        interna y, en caso afirmativo, el tipo de sonajero utilizado.
    rc_airship_lifting_gas_type:
      name: Tipo de gas de elevación del dirigible a control remoto
      description: Indica con qué gas se pretende llenar el cuerpo inflable del dirigible
        (si procede).
    rc_helicopter_control_frequency:
      name: Frecuencia de control del helicóptero a control remoto
      description: La banda de radiofrecuencia utilizada entre el controlador y el
        helicóptero, que afecta la resistencia a las interferencias y la compatibilidad
        (por ejemplo, 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Características de estabilización del helicóptero RC
      description: Enumera las funciones de asistencia a la estabilidad y el control
        que facilitan el vuelo o aumentan la capacidad.
    rc_motorcycle_controller_type:
      name: Tipo de controlador de motocicleta a control remoto
      description: Factor de forma del controlador incluido.
    rc_plane_takeoff_launch_method:
      name: Método de despegue o lanzamiento del avión a control remoto
      description: Cómo se lanza o despega normalmente el avión, lo que influye sobre
        dónde y cómo se puede utilizar.
    rc_vehicle_controller_type:
      name: Tipo de controlador de vehículo a control remoto
      description: Especifica el formato del controlador utilizado para operar el
        vehículo RC.
    rc_vehicle_scale:
      name: Escala del vehículo a control remoto
      description: Especifica la relación de escala (clase de tamaño) del coche o
        camión teledirigido (por ejemplo, 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Tipo de terreno para vehículos a control remoto
      description: Indica el terreno principal para el que está diseñado el coche
        o camión a control remoto.
    reach_adjustment_type:
      name: Tipo de ajuste de alcance
      description: Indica si la distancia entre la palanca y el manillar es ajustable
        y, en caso afirmativo, si el ajuste se realiza sin herramientas o si requiere
        alguna.
    rear_axle_spacing:
      name: Espacio entre ejes traseros
      description: El tamaño de puntera o eje que la parte trasera del chasis está
        diseñada para aceptar, lo que afecta la compatibilidad de las ruedas.
    rear_axle_standard:
      name: Estándar de eje trasero
      description: Define la interfaz o el formato del eje utilizado por la rueda
        trasera (por ejemplo, liberación rápida, varios tamaños de eje pasante).
    rear_axle_type:
      name: Tipo de eje trasero
      description: Especifica el sistema de fijación y el diámetro del eje utilizados
        para asegurar la rueda trasera al chasis.
    rear_coverage:
      name: Cobertura trasera
      description: Especifica la cobertura que la parte baja del bikini ofrece para
        los glúteos (por ejemplo, atrevida, completa).
    rear_opening_type:
      name: Tipo de apertura trasera
      description: Describe el estilo de acceso trasero o solapa posterior para facilitar
        el uso del baño; por ejemplo, asiento abatible o cierre trasero completo.
    rear_seat_configuration:
      name: Configuración de asientos traseros
      description: Especifica la configuración del conjunto del asientos traseros
        para facilitar el ajuste y la selección del diseño interior.
    rear_view_mirror_ornament_attachment_type:
      name: Tipo de fijación del adorno para espejo retrovisor
      description: Especifica cómo se fija el adorno al soporte o la carcasa del espejo
        retrovisor (por ejemplo, lazo de cadena, clip, gancho).
    rearview_mirror_mount_attachment_type:
      name: Tipo de fijación del montaje para espejo retrovisor
      description: Define cómo se fija físicamente el soporte al conjunto del espejo
        retrovisor (cuerpo o vástago del espejo); por ejemplo, mediante una abrazadera,
        un clip, una correa, una almohadilla adhesiva o un soporte atornillable.
    rebound_board_face_type:
      name: Tipo de cara del tablero de rebote
      description: Describe la configuración de la superficie que determina el comportamiento
        de rebote; por ejemplo, diseños planos, angulares o multifacéticos.
    rebound_level:
      name: Nivel de rebote
      description: Indica cuánto rebota la pelota contra la pared después del impacto,
        lo que ayuda a los usuarios a elegir entre diseños sin rebote y con rebote
        moderado.
    rebound_surface_configuration:
      name: Configuración de la superficie de rebote
      description: Especifica el diseño de las superficies de rebote y la previsibilidad
        de los rebotes (unilaterales, bilaterales o multilaterales; predecibles vs.
        impredecibles).
    rebounder_design:
      name: Diseño del mecanismo de rebote
      description: Define el estilo estructural o la configuración de la superficie
        de rebote del producto.
    rebounder_design_type:
      name: Tipo de diseño del mecanismo de rebote
      description: Especifica el mecanismo de rebote principal o el estilo de construcción
        del dispositivo de entrenamiento (por ejemplo, base de cordón elástico, red
        Frame, objetivos temporales).
    rebounder_sides:
      name: Lados de rebote
      description: Indica si el mecanismo de rebote puede devolver los balones desde
        un lado o desde ambos.
    rebounding_mechanism_type:
      name: Tipo de mecanismo de rebote
      description: Especifica la tecnología utilizada para devolver el disco o la
        pelota (por ejemplo, parachoques de goma, cuerda elástica).
    recipient_relationship:
      name: Relación con el destinatario
      description: Parentesco con el destinatario previsto (por ejemplo, madre, padre,
        amigo) de la tarjeta de felicitación.
    recliner_control_type:
      name: Tipo de control del sillón reclinable reclinable
      description: Especifica cómo se acciona el mecanismo de reclinación (por ejemplo,
        palanca manual, panel de botones eléctrico, mando a distancia).
    recliner_motion_type:
      name: Tipo de movimiento del sillón reclinable
      description: Define la capacidad de movimiento principal del sillón reclinable
        (por ejemplo, mecedor, deslizante, giratorio, de pared, elevador).
    reclining_mechanism:
      name: Mecanismo reclinable
      description: Especifica el mecanismo utilizado para operar las functions de
        reclinación del sofá.
    recommended_candle_format:
      name: Formato de vela recomendado
      description: Indica los formatos de vela recomendados para los que están diseñadas
        estas bases autoadhesivas para mecha.
    recommended_container_type:
      name: Tipo de contenedor recomendado
      description: Materiales de contenedores recomendados o seguros para velas de
        cera en gel.
    recommended_fabric_type:
      name: Tipo de tela recomendado
      description: Telas recomendadas para obtener los mejores resultados con este
        patrón de costura.
    recommended_fabric_weight:
      name: Peso recomendado de la tela
      description: Indica la categoría de peso de tela recomendada para el patrón.
    recommended_food_pairing:
      name: Maridaje recomendado
      description: Identifica las proteínas o platos principales para los que está
        destinada la salsa (por ejemplo, pollo, cerdo, ternera, pescado, verduras).
    recommended_lane_condition:
      name: Condición de pista recomendada
      description: Indica el patrón de aceite o la condición de la pista para la que
        está diseñada la bola.
    recommended_motor_impulse_class:
      name: Clase de impulso recomendada para el motor
      description: Especifica la clase impulso total recomendada para el motor del
        cohete modelo para un vuelo seguro y óptimo.
    recommended_reading_level:
      name: Nivel de lectura recomendado
      description: Indica la etapa o capacidad de lectura recomendada para el producto,
        para ayudar al comprador a adaptarlo al desarrollo lector actual del niño.
    recommended_sleep_position:
      name: Posición recomendada para dormir
      description: Indica para qué posiciones de descanso está diseñado el colchón
        para brindar comodidad (por ejemplo, para quienes duermen de lado o boca arriba).
    recommended_storage:
      name: Almacenamiento recomendado
      description: Indica cómo debe almacenarse el producto para mantener su frescura.
    recommended_surfaces:
      name: Superficies recomendadas
      description: Especifica las superficies de unión o categorías de materiales
        para las que está diseñado el pegamento, aparte de la compatibilidad general
        con manualidades (por ejemplo, solo papel vs. múltiples superficies).
    recommended_use_case:
      name: Caso de uso recomendado
      description: Situación de uso principal prevista para el sellador (reparación
        temporal o de emergencia frente a reparación a largo plazo).
    recommended_use_location:
      name: Ubicación recomendada para uso
      description: Entorno previsto para el balancín (patio trasero de una casa frente
        a un parque infantil comercial, etc.).
    recommended_vehicle_surfaces:
      name: Superficies recomendadas para vehículos
      description: Especifica las superficies o los acabados de vehículos para los
        que el cepillo es seguro (por ejemplo, pintura transparente, pintura mate
        o satinada, vinilo o PPF, vidrio, ruedas).
    recorder_accessories_included:
      name: Accesorios para de flauta dulce incluidos
      description: Enumera los accesorios incluidos en el paquete con la gran flauta
        dulce bajo.
    recorder_bore_design:
      name: Diseño de orificio de la flauta dulce
      description: Diseño del perfil del orificio interno del cuerpo de la flauta
        dulce.
    recorder_bore_type:
      name: Tipo de agujero de la flauta dulce
      description: Especifica el tipo de perforación de la flauta dulce.
    recorder_case_shell_type:
      name: Tipo de carcasa del estuche para flauta dulce
      description: Describe la rigidez estructural de la caja.
    recorder_finish:
      name: Acabado de la flauta dulce
      description: Acabado o tratamiento superficial del cuerpo de la flauta dulce
        (especialmente relevante para las flautas dulces alto de madera).
    recorder_hole_type:
      name: Tipo de orificio de flauta
      description: Si los orificios tonales son simples, sin orificios dobles, o si
        incluyen orificios dobles para mejorar las digitaciones cromáticas.
    recorder_joint_configuration:
      name: Configuración conjunta de la flauta dulce
      description: Describe cuántas secciones tiene la flauta dulce, lo que afecta
        a la portabilidad, la limpieza y la sustitución de piezas.
    recorder_joint_style:
      name: Estilo de unión de la flauta dulce
      description: El tipo de unión o conexión entre las secciones de la flauta dulce,
        si corresponde.
    recorder_keywork:
      name: Mecanismo de teclas de flauta dulce
      description: Indica si la flauta dulce cuenta con llaves (mecanismos de metal
        o plástico) para las notas graves, típicas de las flautas dulces tenor, bajo
        o grandes.
    recorder_mouthpiece_type:
      name: Tipo de boquilla de la flauta dulce
      description: Describe si la boquilla o la cabeza de la flauta dulce es integrada
        (de una sola pieza), o bien extraíble o intercambiable.
    recorder_pitch_standard_a4:
      name: Estándar de afinación La4 de la flauta dulce
      description: Indica la referencia de afinación para la que está construida la
        flauta dulce (por ejemplo, afinación moderna La=440 Hz vs. afinación barroca
        La=415 Hz).
    recorder_thumb_hole_type:
      name: Tipo de orificio para el pulgar de la flauta dulce
      description: Indica si la grabadora tiene un diseño de uno o dos orificios para
        el pulgar.
    recreational_vehicle_holding_tank_type:
      name: Tipo de depósito de retención para vehículos recreativos
      description: Indica los depósitos de retención de aguas residuales de la autocaravana.
    recreational_vehicle_leveling_system:
      name: Sistema de nivelación para vehículos recreativos
      description: Tipo de sistema de nivelación o estabilización instalado.
    recycled_material_content:
      name: Contenido de material reciclado
      description: Indica la proporción de la prenda fabricada con fibras o hilos
        reciclados.
    reed_dent_material:
      name: Material de los dientes del peine
      description: Material de los dientes del peine (los elementos que separan los
        hilos de urdimbre), que afecta la durabilidad y la abrasión del hilo.
    reed_type:
      name: Tipo de lengüeta
      description: Especifica el tipo de construcción de la lengüeta utilizada por
        el puntero y los bordones de la gaita.
    reeds_included:
      name: Lengüetas incluidas
      description: Especifica qué lengüetas están incluidas con el set de gaita Great
        Highland (puntero o bordones), y si son de caña o sintéticas.
    reefing_method:
      name: Método de rizado
      description: Indica el mecanismo (si lo hay) para arriar o guardar la vela durante
        la permanencia en el agua.
    reel_profile:
      name: Perfil del carrete
      description: Clasifica el estilo o perfil estructural del cuerpo del carrete
        de pesca con señuelo.
    reel_seat_material:
      name: Material del asiento del carrete
      description: Especifica el material de construcción del soporte del carrete,
        lo que afecta el peso, la sensibilidad y la resistencia a la corrosión.
    reel_seat_type:
      name: Tipo de asiento del carrete
      description: Especifica el tipo de mecanismo de bloqueo que sujeta el carrete
        de pesca a la caña.
    reel_size_class:
      name: Clase de tamaño del carrete
      description: Clasificación talla designada por el fabricante (por ejemplo, 1000,
        3000, 5000) que indica la capacidad de la bobina y la construcción general
        del carrete.
    referee_wallet_accessories_included:
      name: Accesorios para tarjetero de árbitro incluidos
      description: Enumera los artículos adicionales del paquete de un tarjetero de
        árbitro, como las tarjetas roja y amarilla, hojas de puntuación o elementos
        de escritura, para que el comprador sepa si el tarjetero se vende como un
        kit completo.
    refinement_level:
      name: Nivel de refinamiento
      description: Indica el grado de refinamiento al que se ha sometido el aceite,
        lo que afecta el sabor, el color, el valor nutricional y el punto de humeo.
    reflective_finish:
      name: Acabado reflectante
      description: Especifica el tratamiento de la superficie reflectante de una bola
        de discoteca (por ejemplo, mosaicos de espejo vs. efectos holográficos o iridiscentes).
    reflective_or_glow_effect:
      name: Efecto reflectante o luminoso
      description: Indica si la bola para antena tiene efectos de visibilidad, como
        material reflectante, elementos que brillan en la oscuridad o elementos luminososo
        de LED.
    reflective_tape_pattern:
      name: Patrón de cinta reflectante
      description: Describe la configuración de la cinta reflectante en la prenda
        utilizada para cumplir con los requisitos de visibilidad.
    regulation_standard:
      name: Estándar reglamentario
      description: Especifica el estándar oficial o las dimensiones o certificaciones
        del ente regulador con el que cumple la red.
    regulator_diaphragm_material:
      name: Material del diafragma del regulador
      description: Especifica el material del diafragma, que afecta la compatibilidad
        con combustible y etanol (por ejemplo, E85) y la durabilidad.
    regulator_port_thread_standard:
      name: Estándar de rosca del puerto del regulador
      description: Especifica el estándar de rosca o conexión de los puertos utilizado
        en el cuerpo del regulador para los puertos de entrada, salida y retorno.
    rein_features:
      name: Características de las riendas
      description: Destaca características funcionales o de seguridad especiales presentes
        en las riendas.
    rein_style:
      name: Estilo de rienda
      description: Permite identificar el diseño estructural o la configuración de
        las riendas, lo que posibilita a los jinetes elegir el tipo correcto para
        su disciplina y preferencia personal.
    reinforced_areas:
      name: Áreas reforzadas
      description: Indica qué partes de la prenda están reforzadas para mayor durabilidad
        frente a la abrasión.
    reinforcement_type:
      name: Tipo de refuerzo
      description: Refuerzo estructural utilizado en la manguera del radiador para
        mayor resistencia y tolerancia a la temperatura y la presión.
    release_activation_method:
      name: Método de activación de liberación
      description: Especifica cómo el arquero activa un disparador de tiro con arco.
    release_bearing_material:
      name: Material del cojinete de liberación
      description: Material principal de los componentes del cojinete o de la cara
        de contacto (cuando lo especifica el fabricante).
    release_jaw_style:
      name: Estilo de mordaza de liberación
      description: Describe el diseño de las mordazas o del gancho del cabezal de
        liberación.
    release_strap_type:
      name: Tipo de correa de liberación
      description: Identifica la correa o el sistema de conexión provisto con el disparador
        de tiro con arco.
    remote_control_airship_envelope_material:
      name: Material de la sección inflable del dirigible a control remoto
      description: Especifica el material principal de la sección inflable del dirigible
        (bolsa de gas), distinto del material general del juguete.
    remote_control_motorcycle_scale:
      name: Escala de la motocicleta a control remoto
      description: Escala de la motocicleta a control remoto en relación con una motocicleta
        real (si se modela como un vehículo a escala).
    remote_control_motorcycle_terrain_suitability:
      name: Adecuación del terreno para la motocicleta a control remoto
      description: Terreno principal para el que está diseñada la motocicleta RC.
    remote_control_motorcycle_water_resistance:
      name: Resistencia al agua de la motocicleta a control remoto
      description: Nivel de protección contra el agua para el sistema electrónico
        de la motocicleta a control remoto.
    remote_control_plane_kit_completion_level:
      name: Nivel de finalización del kit de avión a control remoto
      description: Indica qué incluye el kit y cuán completo está (por ejemplo, listo
        para volar vs. se requiere transmisor, receptor o batería por separado).
    remote_control_plane_landing_gear_type:
      name: Tren de aterrizaje de avión a control remoto
      description: Indica la configuración del tren de aterrizaje, que afecta la durabilidad
        y las superficies de despegue y aterrizaje.
    remote_control_plane_power_type:
      name: Tipo de propulsión del avión de control remoto
      description: Especifica cómo se propulsa el avión (electricidad vs. mezcla glow,
        gasolina, nitro), lo que afecta el mantenimiento, el ruido y los lugares donde
        se puede volar.
    remote_control_watercraft_features:
      name: Características del barco a control remoto
      description: Destaca las características claves específicas de las embarcaciones
        de radiocontrol que influyen sobre la usabilidad y la durabilidad.
    remote_control_watercraft_propulsion_drive_type:
      name: Tipo de propulsión o accionamiento del barco a control remoto
      description: Especifica cómo se maneja el barco a control remoto en el agua.
    remote_control_watercraft_water_environment:
      name: Entorno acuático del barco a control remoto
      description: Indica el estado del agua en el que la embarcación RC ofrece el
        mejor rendimiento.
    remote_keyless_system_programming_method:
      name: Método de programación del sistema de acceso remoto sin llave
      description: Cómo se programa o conecta el control remoto o sistema con el vehículo
        (por ejemplo, procedimiento a bordo vs. herramienta profesional).
    repair_compound_type:
      name: Tipo de compuesto de reparación
      description: Tipo o formulación del material de reparación utilizable incluido
        (por ejemplo, tipo de masilla para carrocería, tipo de resina para parabrisas,
        tipo de cemento/sellador para reparación de neumáticos).
    repair_kit_components:
      name: Componentes del kit de reparación
      description: Enumera el artículo específico incluido en el kit de reparación,
        lo que permite al comprador comprender el contenido y comparar paquetes.
    repair_method:
      name: Método de reparación
      description: Especifica el método de reparación principal del kit, como parches
        adhesivos autoadhesivos o sustitución de válvulas.
    replacement_part_purpose:
      name: Propósito de las piezas repuesto
      description: Indica si el artículo es una pieza de repuesto OEM, una pieza de
        actualización o rendimiento, o un accesorio complementario.
    replacement_part_type:
      name: Tipo de pieza de repuesto
      description: Identifica la categoría funcional de la pieza de la elíptica, lo
        que permite al comprador filtrar el componente que necesita.
    replacement_parts_availability:
      name: Disponibilidad de repuestos
      description: Indica si la enhebradora admite piezas consumibles o reemplazables
        (por ejemplo, ganchos o cables de repuesto).
    replica_gun_action_type:
      name: Tipo de acción de la réplica de arma
      description: Especifica el tipo de funcionamiento o acción de la réplica del
        arma de fuego (tal como se representa); por ejemplo, acción de cerrojo o acción
        de palanca.
    replica_gun_firing_mechanism:
      name: Mecanismo de disparo de la réplica de arma
      description: Indica si la réplica simula disparos o funcionamiento (no letales)
        y cómo lo hace; por ejemplo, con disparo de cápsulas o sin disparos.
    replica_gun_moving_parts:
      name: Piezas móviles de la réplica de arma
      description: Indica qué partes de la réplica son funcionales o móviles.
    reservoir_orientation:
      name: Orientación del depósito
      description: Especifica la orientación o el perfil previsto de la bolsa dentro
        del paquete.
    reservoir_type:
      name: Tipo de depósito
      description: Tipo de configuración del depósito para el cilindro maestro del
        embrague.
    resin_suitability:
      name: Idoneidad de la resina
      description: Indica si el balón de balonmano está diseñado para usarse con resina
        (pegamento) o si no contiene resina.
    resistance_adjustability:
      name: Capacidad de ajuste de resistencia
      description: Indica si el usuario puede modificar la resistencia respiratoria.
    resistance_band_design:
      name: Diseño de la banda de resistencia
      description: Describe la forma física o el estilo de una banda de resistencia
        (por ejemplo circular, tubular con manijas o en forma de 8), lo que ayuda
        al comprador a elegir el diseño adecuado para su rutina de ejercicios.
    resistance_loading_type:
      name: Tipo de carga de resistencia
      description: Indica cómo se proporciona o se carga la resistencia o el peso
        en la máquina Smith (por ejemplo, con discos o mediante una pila de pesas
        selectorizada).
    response_fields_included:
      name: Campos de respuesta incluidos
      description: Especifica qué campos/opciones de respuesta estándar están presentes
        en la tarjeta de respuesta (por ejemplo, aceptar/rechazar, elección de comida).
    restoration_status:
      name: Estado de restauración
      description: Indica si la furgoneta es original, restaurada o restaurada y modernizada,
        o si requiere restauración.
    rhinestone_base_color_family:
      name: Familia de colores de base de los diamantes de imitación
      description: Identifica la familia colores de base de los diamantes de imitación
        (por ejemplo, transparente o cristal, dorado o amarillo, azul).
    rhinestone_facet_style:
      name: Estilo de facetado de los diamantes de imitación
      description: El patrón de cara o facetado del diamante de imitación, lo que
        afecta su brillo y aspecto (por ejemplo, Xilion rose, corte brillante, facetado
        vs. liso).
    rhinestone_hole_reinforcement_material:
      name: Material de refuerzo para agujeros de diamantes de imitación
      description: Material que rodea los orificios (por ejemplo, ojales metálicos,
        plástico moldeado), que influye sobre la durabilidad durante la costura.
    rhinestone_setting_type:
      name: Tipo de engaste de diamantes de imitación
      description: Cómo se monta o bordea la piedra para coserla (por ejemplo, con
        engaste de garras, engaste biselado o borde reforzado).
    rhubarb_product_cut_type:
      name: Tipo de corte del producto de ruibarbo
      description: Describe la preparación física o el corte del producto de ruibarbo.
    ribbon_construction:
      name: Construcción de cintas
      description: Describe características clave de la confección de la cinta grosgrain,
        como si es alambrada o elástica, lo cual modifica su uso (p. ej., moños vs.
        costura).
    ribbon_packaging_type:
      name: Tipo de embalaje de la cinta
      description: Indica cómo se provee o vende la cinta.
    ribbon_pattern_style:
      name: Estilo de estampado de cinta
      description: Clasifica el método de aplicación de estampado comúnmente utilizado
        en cinta grosgrain.
    ribbon_sheen_level:
      name: Nivel de brillo de la cinta
      description: Indica el brillo/luminosidad visual de la superficie de la cinta
        satinada.
    ribbon_style:
      name: Estilo de cinta
      description: Especifica el diseño estilo visual de la cinta (por ejemplo, lisa,
        a rayas, tricolor).
    ribbon_trim_backing_type:
      name: Tipo de respaldo de la cinta o galón
      description: Indica si la cinta/ribete tiene un soporte y de qué tipo (para
        facilitar su aplicación).
    ribbon_trim_edge_finish:
      name: Acabado de borde de la cinta o galón
      description: Describe la confección o el acabado de la cinta o el galón (útil
        para conocer el comportamiento de deshilachado y el uso previsto).
    ric_rac_wave_size:
      name: Tamaño de onda de la cinta ric-rac
      description: Describe la amplitud o escala de la onda de la cinta ric-rac (qué
        tan grandes son las ondas o el zigzag).
    rice_grain_length:
      name: Longitud del grano de arroz
      description: Clasifica los productos de arroz según la longitud del grano, como
        el grano corto, mediano o largo, lo que influye sobre las características
        de cocción y el uso culinario.
    rice_processing_method:
      name: Método de procesamiento de arroz
      description: Describe cómo se ha procesado o preparado el arroz (por ejemplo,
        precocido, germinado, en copos), lo que influye sobre el tiempo de cocción,
        el valor nutricional y el uso.
    rice_variety:
      name: Variedad de arroz
      description: Especifica la variedad o el cultivo específico de arroz, lo que
        permite al comprador elegir los granos con el sabor, el aroma, la textura
        y la preparación culinaria que prefiera.
    riding_toy_features:
      name: Características del juguete para montar
      description: Destaca las características funcionales y de seguridad comunes
        específicas de los juguetes para montar.
    rifle_action_type:
      name: Tipo de acción del rifle
      description: El mecanismo de funcionamiento del rifle (cómo se carga, dispara
        y expulsa), importante para su identificación y de interés para los coleccionistas.
    rifle_finish:
      name: Acabado de rifle
      description: Acabado o recubrimiento externo principal del cuerpo metálico.
    rifle_magazine_type:
      name: Tipo de cargador del rifle
      description: Tipo de sistema de carga para el rifle.
    rifle_stock_material:
      name: Material de la culata del rifle
      description: Material principal utilizado para la culata o armadura del rifle
        (p. ej., nogal, polímero).
    rim_clamping_method:
      name: Método de sujeción de llanta
      description: Cómo la máquina asegura la rueda/llanta durante el montaje y desmontaje.
    rim_strip_type:
      name: Tipo de tira de llanta
      description: Clasifica la cinta o tira según su estilo, construcción o aplicación
        específica, (p. ej., cinta de llanta para rueda sin cámara vs. banda protectora
        de goma).
    rim_tubeless_compatibility:
      name: Compatibilidad con llantas sin cámara
      description: Indica si la llanta, la cinta o la rueda están diseñadas para configuraciones
        de neumáticos sin cámara.
    ripeness_stage:
      name: Etapa de madurez
      description: Indica el grado de madurez de la fruta en el momento de la venta
        (por ejemplo, verde, madura, lista para consumir).
    riser_pad_type:
      name: Tipo de almohadilla elevadora
      description: Clasifica el estilo funcional de la almohadilla (p. ej., espaciador
        estándar, amortiguador, cuña angular).
    roasted_malt_processing_type:
      name: Tipo de procesamiento de malta tostada
      description: El método de procesamiento específico o la variante utilizada para
        crear la malta tostada o el grano tostado (por ejemplo, cebada tostada sin
        maltear, malta negra, variante desamasada o descascarillada).
    robotic_toy_interaction_mode:
      name: Modo de interacción del juguete robótico
      description: Describe la forma principal en que el robot interactúa o se mueve
        durante el juego.
    robotic_toy_light_features:
      name: Características de las luces del juguete robótico
      description: Indica si el juguete utiliza luces como parte del juego y de qué
        manera (p. ej., LED, proyección).
    robotic_toy_programming_supported:
      name: Se admite la programación de juguetes robóticos
      description: Especifica el enfoque de programación que utiliza el juguete, si
        lo hay.
    robotic_toy_skill_level:
      name: Nivel de habilidad para el juguete robótico
      description: Indica el nivel de complejidad de manejo o programación que se
        espera del usuario.
    robotic_toy_sound_features:
      name: Características de sonido del juguete robótico
      description: Indica las capacidades sonoras del juguete robótico.
    rod_butt_style:
      name: Estilo de talón de la caña
      description: Define la configuración del extremo del talón de la caña utilizado
        en la aplicación de pesca de arrastre.
    rod_construction_type:
      name: Tipo de construcción de la caña
      description: Indica el estilo de construcción general de la caña en términos
        de piezas y capacidad de plegado.
    rod_guide_material:
      name: Material guía de la caña
      description: Especifica el material utilizado para las guías o los insertos
        de la línea de la caña de pescar, lo que afecta la durabilidad, el peso y
        la fricción de la línea.
    rod_guide_type:
      name: Tipo de guías de la caña
      description: Especifica el estilo principal de las guías de línea instaladas
        en la caña.
    rod_handle_type:
      name: Tipo de mango de la caña
      description: Especifica la configuración de la empuñadura de una caña de pescar,
        lo que facilita la comodidad y la selección de la técnica.
    roll_cage_tubing_material:
      name: Material de los tubos de la jaula antivuelco
      description: Especifica el material o la aleación de los tubos utilizados para
        la jaula antivuelco (p. ej., acero DOM vs. cromomolibdeno 4130).
    roller_skate_brake_shape:
      name: Forma del freno del patín de ruedas
      description: Describe la forma o el perfil geométricos del cabezal del freno
        en función del rendimiento o de la preferencia estética.
    roller_skate_brake_type:
      name: Tipo de freno del patín
      description: Especifica el sistema de frenado utilizado en los patines de ruedas.
    roller_ski_technique:
      name: Técnica de esquí sobre ruedas
      description: Identifica la técnica de esquí de fondo para la que están diseñados
        los esquís sobre ruedas.
    roller_technology:
      name: Tecnología de rodillos
      description: Hace referencia a tecnología integrada que mejora el rendimiento
        del masaje, como la vibración o el calor.
    rolling_case_wheel_configuration:
      name: Configuración de la rueda de la caja rodante
      description: Especifica la configuración de ruedas utilizada en estuches de
        teclados musicales rodantes.
    rolling_paper_format:
      name: Formato de papel para armar
      description: Identifica la presentación física del producto (por ejemplo, láminas
        planas, conos preenrollados, envoltorios).
    rolling_paper_gum_type:
      name: Tipo de pegamento de papel para armar
      description: Especifica el adhesivo (goma) utilizado en el borde del papel para
        sellarlo, que puede afectar el sabor y el rendimiento.
    rolling_paper_size:
      name: Tamaño del papel para armar
      description: Indica la clasificación de tamaño estándar del papel para armar
        o cono, para que los compradores puedan elegir rápidamente el ancho o largo
        adecuado según sus necesidades.
    rolling_stock_type:
      name: Tipo de material rodante
      description: Especifica el tipo de tren o vehículo ferroviario del modelo (locomotora
        vs. vagones de pasajeros o carga y subtipos comunes de vagones).
    roof_cargo_net_hook_fastener_style:
      name: Estilo de gancho o sujetador de la red de carga para techo
      description: Especifica el tipo de accesorio o pieza terminal utilizada para
        conectar la red a los puntos de anclaje (p. ej., gancho en S, mosquetón o
        gancho en J).
    roof_height_class:
      name: Clase de altura del techo
      description: Clasifica la altura del techo común en furgonetas (especialmente
        relevante para conversiones o autocaravanas).
    roof_type:
      name: Tipo de techo
      description: Configuración de la sección del techo o cielo raso del recinto.
    root_variety:
      name: Variedad de raíz
      description: Identifica la variedad o el tipo común de la raíz (por ejemplo,
        rábano picante vs. variedades de wasabi auténtico).
    rope_buoyancy:
      name: Flotabilidad de la cuerda
      description: Indica si la cuerda está diseñada para flotar en la superficie
        del agua, lo que ayuda a los usuarios a evitar enredos y simplifica la recuperación.
    rope_construction:
      name: Construcción de la cuerda
      description: Especifica información sobre la construcción de la fibra, aparte
        del del estilo de trenzado (por ejemplo, núcleo o camisa torcidos vs. trenzados)
        y si la cuerda es de núcleo y funda.
    rope_material:
      name: Material de la cuerda
      description: Identifica el material de la cuerda o el cordón de afinación.
    rope_strand_compatibility:
      name: Compatibilidad de los hilos de la cuerda
      description: Indica qué configuraciones de cuerda admite el dispositivo de aseguramiento
        (por ejemplo, cuerda simple, media o doble, gemela o combinaciones de estas).
    rope_stretch_type:
      name: Tipo de estiramiento de la cuerda
      description: Describe las características de elasticidad de la cuerda y distingue
        entre estilos no elásticos, de baja elasticidad, estándar o tipo bungee.
    rose_bloom_stage:
      name: Etapa de floración de la rosa
      description: Indica el grado de apertura de las rosas en el momento de la entrega/llegada
        (desde el capullo hasta que estén completamente abiertas).
    rose_grade:
      name: Grado de rosas
      description: Grado de calidad comercial de rosas cortadas.
    rosette_center_type:
      name: Tipo de centro de la roseta
      description: Especifica el tipo de detalle central o inserto en frente de la
        roseta.
    rosin_dust_level:
      name: Nivel de polvo de resina
      description: Indica la cantidad esperada de polvo de resina que se produce durante
        el uso normal.
    rosin_formula_additives:
      name: Fórmula y aditivios de la resina
      description: Identifica características destacables de la formulación, como
        mezclas hipoalergénicas, con bajo contenido de polvo o con infusión de metales.
    rosin_hardness:
      name: Dureza de la resina
      description: Indica la dureza o suavidad relativa de la resina para arco, lo
        que puede afectar el agarre y el desprendimiento de polvo en diferentes climas
        y estilos de interpretación.
    rotation_mechanism_type:
      name: Tipo de mecanismo de rotación
      description: Especifica el mecanismo que permite que la cuerda gire, lo que
        influye sobre la suavidad y la velocidad alcanzable (por ejemplo, rodamientos
        de bolas vs. bujes).
    rotation_motion_features:
      name: Características de rotación o movimiento
      description: Indica si los planetas o las órbitas gira o se trasladan y cómo
        lo hacen.
    rotor_configuration_type:
      name: Tipo de configuración del rotor
      description: Identifica la configuración del rotor y el estilo de control del
        helicóptero a control remoto (por ejemplo, coaxial, rotor único de paso fijo,
        paso colectivo o multirrotor), lo que afecta significativamente las características
        de vuelo y la adecuación para diferentes niveles de habilidad.
    rotor_construction_type:
      name: Tipo de construcción del rotor
      description: Especifica el estilo de construcción del rotor, que influye sobre
        el peso, la rigidez y la gestión térmica.
    rotor_mounting_interface:
      name: Interfaz de montaje del rotor
      description: Define el estándar de interfaz del buje utilizado para fijar el
        rotor a la rueda.
    rotor_mounting_standard:
      name: Estándar de montaje del rotor
      description: Especifica el estándar de interfaz utilizado para fijar el rotor
        al cubo (p. ej., de 6 pernos o con cierre central).
    roulette_set_components_included:
      name: Componentes del juego de ruleta incluidos
      description: Componentes claves relacionados con la ruleta incluidos con la
        rueda o el juego.
    roulette_wheel_ball_track_type:
      name: "“Tipo de pista de la bola de la rueda de ruleta."
      description: Describe el estilo de seguimiento de la bola utilizado en la rueda,
        que afecta al realismo y a la sensación de juego.
    roulette_wheel_numbering_system:
      name: Sistema de numeración de la ruleta
      description: Indica la numeración de la ruleta y la configuración del cero para
        la compatibilidad del juego y las probabilidades.
    rounders_equipment_included:
      name: Equipo de rounders incluido
      description: Enumera los artículos o accesorios específicos de rounders incluidos
        en el set o paquete de ayuda para entrenamiento, para que los compradores
        sepan exactamente qué viene en la caja.
    rounders_governing_body_approval:
      name: Aprobación del órgano rector de rounders
      description: Indica certificación o aprobación por parte de un organismo rector
        oficial de rounders u otros deportes.
    row_counter_format:
      name: Formato del contador de hileras
      description: Especifica el formato o estilo de un contador de hileras para tejido
        (por ejemplo, anillo, cadena, clic, digital).
    row_counter_mechanism:
      name: Mecanismo del contador de hileras
      description: Especifica cómo se avanza o registra el número de hileras en la
        herramienta.
    row_counter_mounting_method:
      name: Método de montaje del contador de hileras
      description: Cómo se fija el contador o marcador durante el uso (a la aguja,
        al dedo, al proyecto, etc.).
    rowel_type:
      name: Tipo de rodaja de la espuela
      description: Describe la forma o el perfil del borde de la rodaja de la espuela,
        según la preferencia del jinete y la sensibilidad del caballo.
    rowing_machine_part_type:
      name: Tipo de pieza de la máquina de remo
      description: Identifica el componente específico que el producto está destinado
        a reemplazar en una máquina de remo para que el comprador pueda encontrar
        rápidamente la pieza exacta que necesita sin crear demasiadas microcategorías.
    rubber_ducky_character_theme:
      name: Personaje o tema del patito de goma
      description: Tema o estilo de personaje del patito de goma (útil para patitos
        de colección o novedosos).
    rubber_ducky_features:
      name: Características del patito de goma
      description: Características funcionales y de diseño específicas de los patitos
        de goma para el baño.
    rubber_ducky_size_class:
      name: Clase de tamaño del patito de goma
      description: Clasificación por tamaños de patitos de goma práctica para compradores,
        basada en su uso típico (juguete para el baño, adorno para pastel, tamaño
        gigante).
    ruffle_style:
      name: Estilo de volante
      description: Describe la construcción o el estilo visual del volante del lazo
        para sillas.
    rugby_headgear_safety_certification:
      name: Certificación de seguridad para cascos de rugby
      description: Indica si el casco cumple con los estándares oficiales de seguridad
        para rugby o para deportes en general.
    rugby_size:
      name: Talla para rugby
      description: Categoriza equipos por etiquetas de tamaño específicas de rugby
        utilizadas en nombres de productos.
    rugby_variant:
      name: Variante de rugby
      description: Especifica la variante de rugby (código o formato) para la que
        está destinado el producto.
    ruler_edge_type:
      name: Tipo de borde de la regla
      description: Identifica el perfil o la función del borde que se usa para medir
        o marcar (por ejemplo, borde recto, biselado o con labio).
    ruler_marking_style:
      name: Estilo de marcado de regla
      description: Describe el diseño de marcado o guía impreso en la regla, aparte
        de las graduaciones básicas.
    runner_configuration:
      name: Configuración de los patines
      description: Describe el número y la disposición de los patines del trineo.
    runner_material:
      name: Material de los patines
      description: Especifica el material utilizado para los patines o las bandas
        deslizantes del trineo.
    saddle_cover_style:
      name: Estilo de funda de montura
      description: Clasifica el diseño general o el estilo de uso del producto (p.
        ej., funda de almacenamiento, funda para ride , bolsa de transporte).
    saddle_design:
      name: Diseño de la montura
      description: Clasifica el diseño o estilo ergonómico o de alivio general de
        la montura (por ejemplo, con recorte, sin punta, con punta dividida, con resortes).
    saddle_discipline:
      name: Disciplina de la montura
      description: Especifica la disciplina ecuestre principal o el uso y estilo previsto
        de la montura.
    saddle_mounting_type:
      name: Tipo de montaje de la montura
      description: Especifica la interfaz entre el sillín y la tija del sillín para
        garantizar la compatibilidad (por ejemplo, con raíles, pivotante, de viga
        en I).
    saddle_pad_shape:
      name: Forma de la manta de montar
      description: Describe el corte o contorno físico de la manta, que afecta la
        compatibilidad con el sillín y las preferencias estéticas.
    saddle_pad_style:
      name: Estilo de manta de montar
      description: Identifica el estilo funcional o la disciplina para la que está
        diseñada la manta, lo que permite a los jinetes elegir el diseño adecuado
        para su actividad o tipo de montura.
    saddle_padding_material:
      name: Material de relleno para la montura
      description: Indica el material o la tecnología de amortiguación principal dentro
        de la montura que influye sobre la comodidad y la sensación al montar.
    saddle_rail_material:
      name: Material de rieles de la montura
      description: Especifica el material utilizado en los rieles debajo de un sillín
        de bicicleta, lo cual afecta la resistencia, la comodidad, el peso y el precio.
    saddle_tree_material:
      name: Material del armazón de la montura
      description: Especifica el material utilizado para el armazón de la montura,
        la estructura interna de esta.
    saddle_tree_width:
      name: Ancho del armazón de la montura
      description: Describe la clasificación del ancho del armazón de montura, que
        determina el ajuste sobre la cruz del caballo.
    safety_documentation_available:
      name: Documentación de seguridad disponible
      description: Indica qué documentos de cumplimiento o seguridad se proporcionan
        para el ingrediente (p . ej., ficha de datos de seguridad, certificado o declaración
        de la IFRA, declaración o información sobre alérgenos).
    safety_equipment_included:
      name: Equipo de seguridad incluido
      description: Artículo de seguridad y protección incluido en el kit.
    safety_features:
      name: Características de seguridad
      description: Indica las características de seguridad integradas destinadas a
        reducir los cortes accidentales o a proteger la hoja durante el almacenamiento.
    safety_harness_type:
      name: Tipo de arnés de seguridad
      description: Indica el estilo y la configuración del arnés de sujeción para
        niños provisto con el asiento.
    safety_mechanism_type:
      name: Tipo de mecanismo de seguridad
      description: Describe el tipo de sistema de seguridad incorporado que se utiliza
        para sujetar la barra en caso de que el levantamiento falle.
    safety_restraint_type:
      name: Tipo de sujeción de seguridad
      description: Tipo de sistema de contención para niños integrado en el asiento
        del columpio, si lo hubiera.
    safety_warning:
      name: Advertencia de seguridad
      description: Indica si el producto incluye advertencias comunes de seguridad
        para juguetes relacionadas con canicas (por ejemplo, riesgo de asfixia).
    sail_shape:
      name: Forma de la vela
      description: Describe el estilo geométrico de la vela del kayak, que influye
        sobre la eficiencia, el manejo y el montaje.
    salad_dressing_type:
      name: Tipo de aderezo para ensaladas
      description: Identifica el estilo o la textura fundamental del aderezo (por
        ejemplo, cremoso, vinagreta, a base de yogur), lo que ayuda al comprador a
        distinguir entre diferentes bases y consistencias.
    salad_topping_base_ingredient:
      name: Ingrediente base para aderezo de ensalada
      description: Especifica el grupo de ingredientes principales que componen la
        cobertura, lo que ayuda al cliente a filtrar según sus preferencias nutricionales,
        preocupaciones sobre alérgenos o la textura deseada.
    salt_level:
      name: Nivel de sal
      description: Indica la cantidad de sal o sodio añadida a los frutos secos o
        las semillas.
    sand_cup_features:
      name: Características del pudin de arena
      description: Características funcionales/físicas de los areneros que afectan
        al juego y al uso.
    sand_shovel_handle_style:
      name: Estilo de empuñadura de la pala de arena
      description: Describe la forma del mango o la empuñadura en el extremo del cabo
        de la pala.
    sand_toy_set_pieces_included:
      name: Piezas del conjunto de juguetes para arena incluidas
      description: Enumera los tipos de componentes de juguetes de arena incluidos
        en el conjunto (por ejemplo, balde, pala, moldes), para ayudar al comprador
        a comparar los kits según su contenido.
    sand_water_mill_items_included:
      name: Artículos de molino de arena y agua incluidos
      description: Enumera los principales componentes accesorios incluidos del juguete
        del molino (baldes, palas, moldes, etc.).
    sandbag_style:
      name: Estilo de bolsa de arena
      description: Identifica el diseño específico y el uso previsto de la bolsa de
        arena para entrenamiento (por ejemplo, búlgara, Strongman, Power), lo que
        ayuda al comprador a elegir entre diferentes modalidades de entrenamiento.
    sandbox_bottom_type:
      name: Tipo de base del arenero
      description: El tipo de construcción de la base o el fondo utilizada bajo la
        arena.
    sandbox_drainage_type:
      name: Tipo de drenaje del arenero
      description: Cómo drena el agua el arenero (si corresponde); por ejemplo, mediante
        orificios de drenaje o un tapón extraíble.
    sandbox_seating_type:
      name: Tipo de asiento del arenero
      description: Si el arenero incluye asientos integrados y de qué tipo.
    sapodillo_variety:
      name: Variedad de sapodillo
      description: Identifica el cultivo o la variedad específica de sapodilla o chikoo
        (p. ej., “Alano” o “Prolific”), para que los aficionados puedan elegir según
        el sabor, la textura y otras características de la fruta.
    sapote_variety:
      name: Variedad de sapote
      description: Especifica la especie o el tipo particular de sapote que se ofrece
        (p. ej., negro, blanco, mamey), lo que permite al comprador distinguir entre
        diferentes tipos.
    satin_ribbon_face_type:
      name: Tipo de cara de cinta satinada
      description: Especifica si la cinta tiene un acabado satinado en una cara o
        en ambas.
    sauce_consistency:
      name: Consistencia de la salsa
      description: Describe la textura o el espesor de la salsa de pizza.
    sauce_product_form:
      name: Forma de producto de salsa
      description: Indica la forma física del producto, como líquido, aceite, pasta,
        polvo, hojuelas o jarabe.
    sauce_variety:
      name: Variedad de salsas
      description: Identifica el estilo específico o la familia de recetas de la salsa
        blanca o de crema (por ejemplo, Alfredo, bechamel, holandesa).
    saxophone_body_finish:
      name: Acabado del cuerpo del saxofón
      description: Describe el acabado o chapado principal del cuerpo del saxofón
        (aparte del mecanismo de las llaves).
    saxophone_body_type:
      name: Tipo de cuerpo del saxofón
      description: Describe la configuración física general del cuerpo del saxofón
        bajo y la orientación de la campana.
    saxophone_construction_style:
      name: Estilo de construcción de saxofones
      description: Indica las características comunes de construcción de saxofones
        que afectan a su durabilidad, resonancia y mantenimiento.
    saxophone_included_accessories:
      name: Accesorios incluidos del saxofón
      description: Accesorios incluidos en listas que se suelen enviar con un paquete
        de saxofón alto.
    saxophone_key_system:
      name: Sistema de llaves del saxofón
      description: Identifica el sistema de llaves (diseño o mecanismo estándar) del
        saxofón utilizado en el instrumento.
    saxophone_key_touch_material:
      name: Material táctil de las teclas del saxofón
      description: Especifica el material utilizado para los botones de las llaves
        del saxofón (p. ej., botones de nácar).
    saxophone_mouthpiece_baffle_type:
      name: Tipo de deflector de la boquilla del saxofón
      description: Describe el diseño del deflector que modifica el flujo de aire
        y el brillo del sonido.
    saxophone_neck_type:
      name: Tipo de cuello del saxofón
      description: Especifica la configuración del cuello del saxofón bajo.
    saxophone_package_contents:
      name: Contenido del paquete del saxofón
      description: Enumera los accesorios clave que se incluyen con el saxofón (por
        ejemplo, caja, boquilla, abrazadera, correa para el cuello, kit de limpieza).
    saxophone_reed_cut:
      name: Corte de la caña del saxofón
      description: Especifica el corte o estilo de la caña del saxofón, lo que influye
        sobre la respuesta, el tono y la sensación al tocar.
    saxophone_reed_material_type:
      name: Tipo de material de la caña del saxofón
      description: Especifica la categoría del material de la caña (p. ej., caña de
        bambú vs. sintético).
    saxophone_reed_strength_scale:
      name: Escala de resistencia de la caña del saxofón
      description: Especifica el sistema o la escala de numeración de fuerza utilizados
        para la caña (a menudo dependiente de la marca), lo que permite una comparación
        más clara entre publicaciones.
    saxophone_small_part_thread_size:
      name: Tamaño de rosca de las piezas pequeñas del saxofón
      description: Especifica la talla o el estándar de rosca para las piezas pequeñas
        del saxofón hilo (principalmente, tornillos), lo que permite seleccionar el
        ajuste correcto.
    saxophone_swab_application_area:
      name: Área de aplicación de hisopos para saxofón
      description: Indica qué parte del saxofón se pretende limpiar o secar con el
        hisopo.
    scabbard_material:
      name: Material de la vaina
      description: Especifica el material principal de la vaina o funda incluida (si
        está presente).
    scale_model_assembly_status:
      name: Estado de ensamblaje del modelo a escala
      description: Indica si el modelo a escala está listo para exhibirse, o si requiere
        montaje o pintura.
    scale_model_car_features:
      name: Características del auto a escala
      description: Características destacables del auto a escala, como puertas y capó
        que se abren, ruedas orientables, suspensión, etc.
    scale_model_kit_assembly_requirements:
      name: Requisitos de montaje del kit del modelo a escala
      description: Especifica qué pasos o elementos de montaje adicionales se requieren
        normalmente aparte del montaje básico de encastre.
    scale_model_kit_components_included:
      name: Componentes del kit del modelo a escala incluidos
      description: Enumera lo que se incluye con el modelo o kit del tanque a escala
        (p. ej., calcomanías, figuras, piezas fotograbadas).
    scale_model_paint_status:
      name: Estado de la pintura del modelo a escala
      description: Indica si el modelo de helicóptero viene previamente pintado o
        acabado, o si requiere pintura.
    scale_model_pose:
      name: Pose del modelo a escala
      description: Especifica la pose representada del modelo de caballo para que
        coincida con exhibiciones o dioramas.
    scale_model_rotor_configuration:
      name: Configuración del rotor del modelo a escala
      description: Especifica la configuración del rotor del helicóptero representada
        por el modelo.
    scale_model_truck_era:
      name: Era de los camiones a escala
      description: Indica la época o el período de tiempo del camión real que representa
        el modelo (útil para coleccionistas que buscan camiones antiguos frente a
        camiones modernos).
    scale_model_truck_propulsion_type:
      name: Tipo de propulsión de camión a escala
      description: Especifica si el camión representado utiliza propulsión diésel,
        de gasolina, eléctrica, híbrida o de otro tipo (según lo representado o promocionado
        por el modelo).
    scale_units:
      name: Unidades de escala
      description: Las unidades de medida impresas/grabadas en la viga para la configuración
        del radio/diámetro.
    scent_function:
      name: Función del aroma
      description: Define la función principal de un producto aromático para que los
        cazadores puedan encontrar rápidamente la herramienta adecuada (por ejemplo,
        atrayente vs. eliminador de olores).
    scent_source:
      name: Fuente de aroma
      description: Enumera la principal fuente biológica o aromática utilizada en
        la formulación del producto, incluidos tipos de orina, aromas derivados de
        alimentos, aromas de plantas, etc.
    school_bus_body_type:
      name: Tipo de carrocería de autobús escolar
      description: Clasifica los autobuses escolares según los formatos de carrocería
        o clase más comunes utilizados en el mercado (por ejemplo, tipo A-D).
    school_bus_safety_feature:
      name: Característica de seguridad del autobús escolar
      description: Equipo de seguridad destacable instalado en el autobús escolar.
    school_glue_washability:
      name: Lavabilidad del pegamento escolar
      description: Indica la facilidad con la que se puede limpiar el pegamento seco
        o húmedo de la piel, la ropa o superficies.
    scissors_application:
      name: Aplicación de tijeras
      description: Aplicación o material principal de corte para el que están diseñadas
        las tijeras.
    scooter_brake_pad_material:
      name: Material de las pastillas de freno del scooter
      description: Especifica el compuesto utilizado en las pastillas de freno, lo
        que afecta el rendimiento, el ruido y la vida útil.
    scoring_method:
      name: Método de puntuación
      description: Especifica cómo se registran las puntuaciones en la mesa de futbolín,
        ya sea mediante contadores de cuentas manuales o marcadores electrónicos.
    scoring_pattern:
      name: Patrón de puntuación
      description: Diseño de zonas de puntuación impresas en el campo de juego.
    scoring_system_type:
      name: Tipo de sistema de puntuación
      description: Describe el tipo de mecanismo de puntuación incluido con la mesa,
        como deslizadores manuales o diversas pantallas electrónicas.
    scottish_smallpipes_bag_material:
      name: Material para bolsas de gaitas pequeñas escocesas
      description: Especifica el material de la bolsa (depósito de aire) provisto
        con las gaitas pequeñas.
    scottish_smallpipes_drone_tuning_configuration:
      name: Configuración de ajuste del zumbido de la gaita pequeña escocesa
      description: Especifica la configuración de afinación del bordón provisto con
        el instrumento (los tonos o roles de los bordones en relación con la tónica).
    scottish_smallpipes_reed_type:
      name: Tipo de lengüeta para gaita pequeña escocesa
      description: Identifica el tipo de lengüeta utilizada para el tubo melódico
        (o si las lengüetas son sintéticas o de caña).
    scraping_surface_type:
      name: Tipo de superficie de raspado
      description: Especifica la construcción o geometría de la superficie de raspado
        que produce el sonido (p. ej., ranurada, con dientes o en forma de peine,
        corrugada).
    screw_drive_type:
      name: Tipo de accionamiento por tornillo
      description: Especifica el tipo de ranura de accionamiento en la cabeza del
        tornillo o perno, e indica la herramienta necesaria para apretarlo o aflojarlo
        (por ejemplo, hexagonal o Allen, Torx).
    screw_thread_size:
      name: Tamaño de la rosca del tornillo
      description: Especifica el estándar de rosca de los tornillos incluidos o compatibles
        (p. ej., M4, M5, M6).
    sculpting_clay_base_type:
      name: Tipo de base de arcilla para esculpir
      description: Describe la formulación o base subyacente de la arcilla para esculpir.
    seafood_cut:
      name: Corte de mariscos
      description: Describe el corte físico o la presentación del producto del mar
        (por ejemplo, entero, en filete, en bistec).
    seafood_processing_method:
      name: Método de procesamiento de mariscos
      description: Especifica la técnica principal de conservación o procesamiento
        aplicada al marisco; por ejemplo, ahumado, salado o liofilizado.
    seafood_source:
      name: Fuente de mariscos
      description: Indica si el marisco es de pesca salvaje, de piscifactoría, de
        origen vegetal o de otra procedencia, lo que ayuda al comprador a evaluar
        la sostenibilidad y la calidad.
    seal_material:
      name: Material de sellado
      description: Material utilizado para los sellos o las juntas del cuello, las
        muñecas y los tobillos que mantienen la impermeabilidad del traje.
    seal_type:
      name: Tipo de sello
      description: Especifica el método de sellado utilizado por el racor para evitar
        fugas de refrigerante.
    sealant_formulation:
      name: Formulación del sellador
      description: Indica la formulación química principal o la tecnología de aditivos
        del sellador de neumáticos para bicicletas (por ejemplo, a base de látex,
        reforzado con fibra, de acrílico).
    seals_leak_type:
      name: Tipo de fuga de sellos
      description: Tipo ubicación de una fuga del sistema de refrigeración que el
        producto está diseñado para sellar.
    seam_construction:
      name: Confección de costuras
      description: Describe cómo se crea la costura de la pelota, lo que afecta el
        swing, la durabilidad y la sensación al golpearla.
    seam_design:
      name: Diseño de la costura
      description: Especifica la construcción de la costura o las características
        decorativas de la costura en la calcetería.
    seam_gauge_scale_type:
      name: Tipo de escala de calibre de costura
      description: Indica qué escala/marcas se incluyen en el medidor de costura aparte
        de la escala de la regla base.
    seam_gauge_slider_material:
      name: Material del deslizador del calibre de costura
      description: Identifica el material del componente ajustable tipo deslizador
        o puntero, si lo hay.
    seam_ripper_tip_style:
      name: Estilo de punta de descosedor
      description: Describe el diseño funcional de la punta utilizada para deslizarse
        debajo de las puntadas y cortar el hilo de forma segura.
    seam_sealing_type:
      name: Tipo de sellado de costura
      description: Describe el método utilizado para evitar la entrada de agua por
        las costuras del traje de lluvia (p. ej., sellado completo con cinta adhesiva
        o soldadura).
    seam_type:
      name: Tipo de costura
      description: Describe el estilo de costura de la pelota de béisbol, que afecta
        al agarre, la aerodinámica y el nivel de juego previsto.
    season_condition_protection:
      name: Protección contra estacionalidad o condiciones
      description: Indica el clima o las condiciones principales contra los que brinda
        protección la funda del parabrisas.
    season_rating:
      name: Calificación de estacionalidad
      description: Especifica la clasificación de estacionalidad de la tienda al indicar
        su idoneidad para diferentes condiciones climáticas (p. ej., 3 estaciones,
        4 estaciones, 5 estaciones o expedición).
    seasoning_variety:
      name: Variedad de condimento
      description: Clasifica el condimento según su método de preparación o uso culinario
        tradicional.
    seat_adjustment_power_type:
      name: Tipo eléctrico de ajuste del asiento
      description: Especifica cómo se accionan los mecanismos de ajuste del asiento
        (palancas manuales vs. motores eléctricos), lo que puede afectar el cableado
        o la compatibilidad.
    seat_belt_attachment_type:
      name: Tipo de fijación del cinturón de seguridad
      description: Especifica cómo se fija la correa a los accesorios del vehículo
        o del cinturón.
    seat_belt_buckle_electrical_connector_type:
      name: Tipo de conector eléctrico de la hebilla del cinturón de seguridad
      description: Especifica el conector o la interfaz utilizados para el cableado
        del interruptor o pretensor de hebilla, cuando corresponde.
    seat_belt_buckle_mounting_type:
      name: Tipo de montaje de la hebilla del cinturón de seguridad
      description: Describe cómo se fija la hebilla o el receptor al vehículo, al
        asiento o al soporte del cinturón (p. ej., mediante pernos o clips).
    seat_belt_buckle_release_button_color:
      name: Color del botón de liberación de la hebilla del cinturón de seguridad
      description: Especifica el color del botón de liberación de la hebilla.
    seat_belt_cover_placement:
      name: Ubicación de la funda para cinturón de seguridad
      description: Especifica en qué parte del cinturón de seguridad está pensada
        para utilizarse la cubierta.
    seat_belt_integration:
      name: Integración del cinturón de seguridad
      description: Especifica si el asiento incluye un receptáculo integrado para
        el cinturón de seguridad o la hebilla, o si es necesario transferir el receptáculo
        de la hebilla OEM del vehículo para su instalación.
    seat_belt_provision:
      name: Disposición de cinturones de seguridad
      description: Indica si los cinturones de seguridad o sus accesorios (por ejemplo,
        hebillas) están incluidos en el conjunto del asiento trasero o si se deben
        transferir del asiento original.
    seat_belt_strap_installation_location:
      name: Lugar de instalación de la correa del cinturón de seguridad
      description: Indica dónde está instalada la correa dentro del sistema del cinturón.
    seat_cover_placement:
      name: Ubicación de la funda del asiento
      description: Indica para qué posiciones de asiento del vehículo está destinada
        la funda.
    seat_cover_securement_method:
      name: Método de sujeción de la funda del asiento
      description: Indica la forma principal en que la funda para asiento se sujeta
        a este. Si se utilizan varios métodos, seleccione el principal/primario.
    seat_cover_set_contents:
      name: Contenido del juego de fundas para asientos
      description: Describe qué piezas se incluyen en el paquete (por ejemplo, solo
        la base del asiento o el asiento completo y el reposacabezas).
    seat_fabric:
      name: Tela del asiento
      description: Tejido principal utilizado para el asiento y el respaldo de la
        silla.
    seat_height_category:
      name: Categoría de altura del asiento
      description: Clasifica el taburete según el rango típico de altura del asiento
        (p. ej., altura de mostrador o de barra) para simplificar la selección.
    seat_material:
      name: Material del asiento
      description: Identifica el material principal de la superficie del asiento del
        banco.
    seat_mounting_type:
      name: Tipo de montaje del asiento
      description: Configuración de montaje o riels utilizada para fijar el asiento
        al piso del vehículo.
    seating_surface_material:
      name: Material de la superficie de asiento
      description: Especifica el material de la zona donde se recuesta la persona
        (por ejemplo, malla Textilene, tela tipo sling, mimbre, tapicería acolchada).
    seatpost_clamp_mechanism:
      name: Mecanismo de abrazadera de la tija del asiento
      description: Tipo de sistema de sujeción o cierre que asegura la tija del asiento.
    section_orientation_compatibility:
      name: Compatibilidad de orientación de secciones
      description: Indica si el accesorio se ajusta a una sección orientada hacia
        el brazo izquierdo, hacia el brazo derecho o a una sección de orientación
        universal.
    sectional_configuration:
      name: Configuración seccional
      description: Define el módulo específico o la orientación de la unidad seccional
        (p ej., esquina, extremo con brazo izquierdo, chaise), para que los compradores
        puedan armar la configuración deseada.
    sectional_shape:
      name: Forma seccional
      description: Define la configuración geométrica o el diseño general del sofá
        seccional.
    secured_components:
      name: Componentes protegidos
      description: Enumera las partes específicas de la bicicleta que protegen el
        cierre rápido o las tuercas de seguridad (por ejemplo, rueda delantera, rueda
        trasera, tija del asiento).
    seed_content:
      name: Contenido de semillas
      description: Indica si el cítrico no tiene, tiene pocas o tiene muchas semillas.
    seed_size_classification:
      name: Clasificación del tamaño de la semilla
      description: Indica el tamaño relativo de la semilla no comestible que hay dentro
        del lichi, lo que afecta a la cantidad de pulpa comestible.
    self_adhesive_backing_format:
      name: Formato de respaldo autoadhesivo
      description: Formato físico del soporte adhesivo provisto con la pestaña de
        mecha (almohadilla preaplicada frente a pegatinas separadas, etc.).
    self_adhesive_hook_loop_backing_type:
      name: Tipo de soporte autoadhesivo de velcro.
      description: Especifica la construcción de soporte o forro y el sistema adhesivo
        utilizados en el lado autoadhesivo.
    self_adhesive_hook_loop_fastener_shape:
      name: Forma del cierre de velcro autoadhesivo
      description: Especifica el corte o la forma de las piezas de fijación provistas.
    self_hardening_clay_finish:
      name: Acabado de arcilla autoendurecible
      description: Describe el aspecto o brillo de la superficie una vez curada por
        completo (útil para elegir entre acabado mate natural, satinado, etc.).
    self_hardening_clay_water_resistance_after_curing:
      name: Resistencia al agua de la arcilla autoendurecible después del curado.
      description: Indica resistencia a la exposición al agua una vez curado por completo
        (sin sellador adicional).
    sensor_functions:
      name: Funciones del sensor
      description: Indica qué métrica de ciclismo mide el sensor.
    sensor_measurement_mode:
      name: Modo de medición del sensor
      description: Indica qué métrica puede capturar el sensor (p. ej., solo cadencia,
        solo velocidad, velocidad y cadencia duales).
    sensor_mounting_position:
      name: Posición de montaje del sensor
      description: Especifica la ubicación en la bicicleta o en el ciclista donde
        está instalado el sensor; por ejemplo, la biela, el buje de la rueda o el
        calzado. Esto afecta a la compatibilidad con diferentes configuraciones de
        bicicleta.
    sensor_mounting_type:
      name: Tipo de montaje de sensor
      description: Especifica cómo se monta el sensor MAP en el colector de admisión
        o el motor (p. ej., brida atornillada vs. arandela de presión).
    sensor_or_gauge_mounting_location:
      name: Ubicación de montaje del sensor o indicador
      description: Especifica en qué parte del vehículo se debe instalar el sensor
        o indicador (a nivel de ubicación general, no del lado  izquierdo o derecho).
    sensory_modality:
      name: Modalidad sensorial
      description: Experiencias sensoriales principales que el juguete está diseñado
        para proporcionar (pueden ser multisensoriales).
    sensory_toy_fidget_mechanism:
      name: Mecanismo antiestrés de juguete sensorial
      description: Interacción o mecanismo principal utilizados para la inquietud
        y la autorregulación.
    sensory_toy_light_features:
      name: Características de la luz del juguete sensorial
      description: Comportamientos o efectos de iluminación proporcionados por el
        juguete.
    sensory_toy_texture_type:
      name: Tipo de textura del juguete sensorial
      description: Elementos superficiales dominantes que se utilizan para la estimulación
        táctil.
    sequin_application_method:
      name: Método de aplicación de las lentejuelas
      description: Cómo se supone que se debe aplicar o utilizar la lentejuela (costura,
        pegado, fijación con calor, etc.).
    sequin_finish:
      name: Acabado de lentejuelas
      description: Describe el acabado superficial o visual y el efecto reflectante
        de las lentejuelas utilizadas en el parche (por ejemplo, mate, metálico, holográfico),
        no el método de soporte o fijación del parche.
    serger_stitch_functions:
      name: Funciones de puntada de la remalladora
      description: Las functions de la puntada que admite la remalladora (variaciones
        de sobrehilado y puntadas especiales).
    serger_thread_count:
      name: Cantidad de hilos de la remalladora
      description: Número de hilos que la remalladora puede usar para coser (por ejemplo,
        capacidad para 2, 3, 4 y 5 hilos).
    service_interval:
      name: Intervalo de servicio
      description: Tiempo máximo recomendado entre inspecciones o mantenimiento requeridos
        por parte de un taller autorizado.
    serving_temperature:
      name: Temperatura de servido
      description: Indica la temperatura de consumo recomendada o el estado del producto
        al momento de su consumo.
    sesame_seed_hull_status:
      name: Estado de la cáscara de la semilla de sésamo
      description: Indica si el tahini está hecho de semillas de sésamo peladas o
        sin pelar, lo que afecta el color, el sabor y el valor nutricional.
    sesame_seed_roast_level:
      name: Nivel de tostado de las semillas de sésamo
      description: Indica el grado de tostado de las semillas de sésamo antes de molerlas,
        lo que ayuda al comprador a elegir la intensidad de sabor que prefiera.
    sesame_seed_variety:
      name: Variedad de semillas de sésamo
      description: Indica el color o la variedad de las semillas de sésamo utilizadas
        para elaborar el aceite.
    set_classification:
      name: Clasificación del set
      description: Define el nivel o estilo de juego previsto para el set de cróquet
        (p. ej., torneo, recreativo, viaje).
    set_components:
      name: Componentes del set
      description: Indica qué artículos se incluyen con el producto (p. ej., solo
        la varilla central vs. juego completo).
    set_items_included:
      name: Artículos del set incluidos
      description: Especifica las prendas o accesorios incluidos en el conjunto, como
        la tela para sari, dupatta o cinturón.
    setup_mechanism:
      name: Mecanismo de configuración
      description: Describe el método principal de despliegue de la carpa (p. ej.,
        automático, inflable o con vigas de aire, o de techo con apertura tipo almeja).
    setup_type:
      name: Tipo de configuración
      description: Cómo se monta o despliega la tienda o el túnel de juegos.
    sew_in_interfacing_elasticity:
      name: Elasticidad de la entretela cosida
      description: Indica si la entretela cosida es elástica y, en caso afirmativo,
        en qué direcciones, para que coincida con los proyectos de tejido de punto
        o tela tejida.
    sew_in_label_placement:
      name: Ubicación de la etiqueta cosida
      description: Indica la ubicación prevista en el artículo terminado.
    sew_on_edge_finish:
      name: Acabado de borde cosido
      description: Indica si los bordes del cierre de velcro están sin rematar o cortados,
        o acabados para evitar que se deshilachen.
    sew_on_rhinestone_hole_orientation:
      name: Orientación de los orificios de los diamantes de imitación para coser
      description: Disposición u orientación de los orificios en relación con la piedra
        (p. ej., uno al lado del otro, opuestos, en cruz) para facilitar diferentes
        estilos de puntada.
    sewing_kit_components_included:
      name: Componentes incluidos en el kit de limpieza
      description: Enumera los accesorios o las herramientas de costura incluidos
        en un kit de costura para que el comprador pueda comparar lo que incluye cada
        kit.
    sewing_machine_bobbin_class:
      name: Clase sobre bobinas de máquinas de coser
      description: Especifica la clase o el sistema de bobina compatible con la máquina
        de coser para bobinas y cajas de bobinas.
    sewing_machine_buttonhole_type:
      name: Tipo de ojal de la máquina de coser
      description: Método de creación de ojales compatible con la máquina.
    sewing_machine_display_type:
      name: Tipo de pantalla de la máquina de coser
      description: Tipo de interfaz de control y visualización de la máquina de coser.
    sewing_machine_needle_point_type:
      name: Tipo de punta de aguja de la máquina de coser
      description: Define la geometría o familia de la punta de la aguja que determina
        cómo penetra en diferentes tejidos (por ejemplo, punta afilada, punta redonda
        o punta de cuña).
    sewing_machine_needle_system:
      name: Sistema de agujas para máquinas de coser
      description: El sistema de agujas estandarizado o número de modelo que determina
        la compatibilidad de la máquina (a menudo se escribe como 130/705 H, HAx1,
        DBx1, 15x1, etc.).
    sewing_machine_needle_type:
      name: Tipo de aguja para máquinas de coser
      description: Especifica la aplicación o el estilo previsto de la aguja (por
        ejemplo, universal, de punta redonda, para vaqueros o tela vaquera), lo que
        afecta la calidad de la puntada y la idoneidad del tejido.
    sewing_machine_shank_type:
      name: Tipo de vástago de la máquina de coser
      description: Especifica el estándar de interfaz entre el vástago y el tobillo
        del prensatelas para el que está diseñado, lo que garantiza la compatibilidad
        con la máquina de coser (p . ej., vástago bajo, vástago alto, vástago inclinado).
    sewing_pattern_accessory_type:
      name: Tipo de accesorio para patrones de costura
      description: Especifica qué accesorio se puede confeccionar con el patrón de
        costura.
    sewing_pattern_notions_required:
      name: Nociones obligatorias sobre el patrón de costura
      description: Enumera los materiales o accesorios adicionales importantes que
        se necesitan para completar el proyecto (aparte de la tela y el hilo).
    sewing_pattern_recommended_fabric:
      name: Patrón de costura recomendado para la tela
      description: Enumera los tipos y gramajes de tela recomendados para el patrón
        de costura (según lo proporcionado por el diseñador del patrón).
    sewing_pattern_size_range:
      name: Rango de tamaño del patrón de costura
      description: Especifica el rango de tallas previsto para el patrón (p. ej.,
        de bebé a adulto, talles grandes).
    sewing_thread_size_system:
      name: Sistema de tamaño hilo de coser
      description: El estándar de tamaño utilizado para expresar el tamaño del hilo
        (por ejemplo, Tex, Denier, Ticket, número de peso, tamaño V).
    shaft_curvature:
      name: Curvatura de la vara
      description: Describe la forma general de la vara, que Influye sobre el espacio
        libre, el swing y la ergonomía.
    shaft_kick_point:
      name: Punto de flexión de la vara
      description: Identifica la posición a lo largo de la vara donde se dobla más
        durante un el swing, lo que afecta la trayectoria de vuelo de la bola.
    shaft_length_type:
      name: Tipo de largo de eje
      description: Designación de talla categórica estándar de la industria para los
        ejes de los dardos (por ejemplo, corto, mediano) que se utiliza cuando no
        se proporcionan medidas exactas en milímetros.
    shaft_shape:
      name: Forma de la vara
      description: Define el perfil de la sección transversal de la vara de la tonfa
        (p. ej., redonda, cuadrada, octogonal).
    shaker_fill_material:
      name: Material de relleno del sonajero
      description: Especifica el relleno interno principal utilizado para crear el
        sonido de la maraca (cuando corresponde); por ejemplo, bolitas, semillas o
        perdigones.
    shaker_shell_material:
      name: Material de la carcasa del sonajero
      description: Especifica el material principal del cuerpo o la carcasa del huevo
        sonajero (la estructura exterior).
    shallot_variety:
      name: Variedad de chalota
      description: Identifica el cultivo específico, el tipo comercial o la variedad
        del producto de chalota.
    shank_style:
      name: Estilo de vástago
      description: Describe la forma o configuración general de los ejes del freno
        de palanca (p. ej., rectos, curvos, de roce).
    shapewear_enhancement_feature:
      name: Función de realce de fajas
      description: Destaca la mejora funcional principal que ofrece la prenda (p.
        ej., control de abdomen, realce de glúteos, forro impermeable).
    sheath_type:
      name: Tipo de vaina
      description: Tipo de funda o vaina incluida con el cuchillo de colección.
    sheet_music_clip_padding_material:
      name: Material de relleno para clips de partituras
      description: Material de cualquier acolchado de la mordaza o zona de agarre
        que entra en contacto con el papel o el borde del soporte para evitar desgarros
        y deslizamientos.
    sheet_music_clip_spring_tension_level:
      name: Nivel de tensión del resorte del gancho para partitura
      description: Fuerza relativa del resorte del gancho o la fuerza de sujeción.
    sheet_music_clip_use_environment:
      name: Entorno de uso de ganchos para partituras musicales
      description: Configuración principal prevista donde el gancho está diseñado
        para funcionar de manera óptima.
    shell_construction:
      name: Construcción de la carcasa
      description: Especifica cómo está construida la carcasa del bombo, lo que influye
        notablemente en el tono y el peso.
    shell_finish:
      name: Acabado de la carcasa
      description: Variación del tratamiento de acabado exterior de la carcasa del
        doumbek.
    shell_hull_status:
      name: Estado de la cáscara o corteza
      description: Especifica si los frutos secos o las semillas se venden con la
        cáscara intacta o retirada.
    shift_boot_attachment_method:
      name: Método de fijación de la funda de la palanca de cambios
      description: Especifica cómo se fija la funda de la palanca de cambios a la
        consola o al embellecedor de la palanca de cambios del vehículo (p. ej., embellecedor
        con clip, anillo de retención, adhesivo).
    shift_boot_installation_hardware_included:
      name: Accesorios de instalación incluidos de la funda de la palanca de cambios
      description: Enumera los accesorios y componentes de instalación incluidos con
        la funda de la palanca de cambios.
    shift_knob_illumination:
      name: Iluminación de la palanca de cambios
      description: Especifica si la palanca de cambios incluye iluminación y el método
        o tipo de iluminación (p. ej., fotoluminiscencia, LED, fibra óptica, patrón
        retroiluminado).
    shift_knob_installation_method:
      name: Método de instalación de la palanca de cambios
      description: Especifica cómo se fija el pomo de la palanca de cambios a la palanca.
    shift_knob_shape:
      name: Forma de la palanca de cambios
      description: Describe el factor de forma ergonómico general de la palanca de
        cambios.
    shift_pattern_type:
      name: Tipo de patrón de cambio
      description: Especifica el estilo de marcado de la marcha en la palanca de cambios
        (si lo hay).
    shifter_compatibility:
      name: Compatibilidad del mando de cambios
      description: Indica si la extensión del manubrio es compatible con cambios electrónicos,
        cambios mecánicos, ambos o si no es compatible con cambios.
    shifter_mounting_interface:
      name: Interfaz de montaje del mando de cambios
      description: Describe cómo se fija la palanca de cambios a la bicicleta (p.
        ej., tamaño de abrazadera discreto, I-Spec, MatchMaker, MatchMaker, montaje
        en extremo de manubrio, en tubo diagonal o inalámbrico).
    shifting_actuation_type:
      name: Tipo de accionamiento de cambios
      description: Identifica el mecanismo utilizado para cambiar las marchas en el
        grupo de componentes (mecánico, electrónico con cable, electrónico inalámbrico,
        hidráulico).
    shifting_mechanism:
      name: Mecanismo de cambio
      description: Indica si la palanca de cambios funciona de forma mecánica o electrónica,
        y si es indexada o basada en fricción.
    shim_purpose:
      name: Propósito de la cuña
      description: Define el tipo funcional del producto (por ejemplo, calce, cuña,
        espaciador) para que los ciclistas puedan encontrar rápidamente la solución
        de ajuste adecuada sin necesidad de subcategorías separadas.
    shin_guard_attachment_method:
      name: Método de fijación de las canilleras
      description: Clasifica el formato de diseño general de la canillera, incluida
        la integración de la protección del tobillo o la confección tipo calcetín.
    shirt_cuff_style:
      name: Estilo de puño para camisa
      description: Describe la confección del puño de la manga, lo que influye sobre
        la formalidad, la combinación con gemelos y la comodidad.
    shochu_base_ingredient:
      name: Ingrediente base del shochu
      description: Identifica la principal fuente de almidón o azúcar utilizada para
        producir el shochu.
    shochu_soju_variety:
      name: Variedades de shochu y soju
      description: Clasifica el producto según su estilo reconocido o tipo de producción.
    shock_absorber_bushing_material:
      name: Material del buje del amortiguador
      description: Material de los casquillos o aisladores de montaje provistos con
        el amortiguador o integrados a él.
    shock_absorber_charge_type:
      name: Tipo de carga del amortiguador
      description: Especifica la tecnología de carga y amortiguación del amortiguador
        (p. ej., hidráulico o de aceite, de gas, de aire) o el diseño del tubo relacionado,
        cuando corresponde.
    shock_absorber_mount_type_lower:
      name: Tipo de montaje del amortiguador (inferior)
      description: Estilo de interfaz de montaje inferior del amortiguador para verificar
        la compatibilidad de instalación.
    shock_absorber_mount_type_upper:
      name: Tipo de montaje del amortiguador (superior)
      description: Especifica el estilo de interfaz de montaje superior de un amortiguador
        de vehículo a motor para garantizar la compatibilidad y el ajuste.
    shock_absorber_position:
      name: Posición del amortiguador
      description: Especifica si el amortiguador está destinado a la posición delantera,
        trasera, izquierda o derecha del vehículo (más preciso que la ubicación solo
        en el eje).
    shock_absorption_system:
      name: Sistema de amortiguación
      description: Define el mecanismo utilizado para reducir la vibración y el ruido
        durante el rebote.
    shoe_collar_height:
      name: Aaltura del cuello del calzado
      description: Clasifica los zapatos por altura de cuello o corte (bajo, medio
        o alto) para indicar la cobertura y el soporte del tobillo..
    shoe_cover_height:
      name: Altura del cubrecalzado
      description: Especifica el nivel de cobertura de la funda para zapatillas de
        ciclismo, y distingue entre las cubrepunteras y los cubrecalzados completos
        de caña alta.
    shoe_sizing_system:
      name: Sistema de tallas de calzado
      description: Identifica el estándar de tallas (EE. UU., Reino Unido, UE, JP,
        Mondopoint, etc.) utilizado para el número de zapato indicado.
    shoelace_aglet_material:
      name: Material de las punteras de los cordones
      description: Identifica el material utilizado para las punteras en los extremos
        de los cordones, que influye sobre la durabilidad y el estilo.
    shooting_rest_design:
      name: Diseño del apoyo de tiro
      description: Clasifica el estilo estructural del apoyo de tiro (apoyo tipo bolsa,
        trineo, trípode, prensa para arma, etc).
    shooting_stick_yoke_design:
      name: Diseño de la horquilla del bastón de tiro
      description: Especifica el estilo de cuna u horquilla que entra en contacto
        con el arma de fuego o la mira óptica.
    shooting_target_style:
      name: Estilo de diana
      description: Clasifica el estilo o diseño de las dianas para patinaje artístico
        y hockey, para que los clientes puedan seleccionar el enfoque de entrenamiento
        que necesitan.
    shooting_target_type:
      name: Tipo de objetivo de tiro
      description: Clasifica las dianas según su estilo estructural, material o diseño
        (p. ej., gong, silueta, diana de papel o blanco giratorio), para que los tiradores
        puedan encontrar rápidamente el blanco adecuado para su disciplina y tipo
        de arma.
    short_block_assembly_balance_type:
      name: Tipo de balanceo del conjunto de bloque corto
      description: Indica si el conjunto giratorio está balanceado interna o externamente.
    short_block_intended_use:
      name: Uso previsto del bloque corto
      description: Uso principal previsto del bloque corto.
    short_block_rotating_assembly_included:
      name: Conjunto giratorio del bloque corto incluido
      description: Especifica qué componentes principales del conjunto giratorio se
        incluyen con el bloque corto.
    shot_size:
      name: Tamaño del perdigón
      description: Especifica la designación del tamaño del perdigón para perdigones
        sueltos o componentes de munición.
    shotgun_action_type:
      name: Tipo de acción de la escopeta
      description: Especifica el mecanismo de funcionamiento o tipo de acción de la
        escopeta.
    shotgun_choke_type:
      name: Tipo de estrangulador de escopeta
      description: Especifica la configuración del estrangulador de los cañones de
        la escopeta.
    shotgun_gauge:
      name: Calibre de escopeta
      description: Especifica el calibre del cañón de una escopeta (y .410 cuando
        corresponda) para identificación y filtrado en listados de coleccionables.
    shotgun_stock_material:
      name: Material para la culata de la escopeta
      description: Especifica el material principal de la culata/parte delantera (mueble).
    shuffleboard_speed_rating:
      name: Clasificación de velocidad del tejo
      description: Indica la velocidad relativa de deslizamiento que el polvo para
        tejo u otro producto de mantenimiento proporciona sobre la mesa, lo que permite
        a los jugadores elegir la velocidad adecuada según su nivel de habilidad y
        la longitud de la mesa.
    shuffleboard_table_length_compatibility:
      name: Compatibilidad de longitud de la mesa de tejo
      description: Longitud estándar de una mesa de tejo con la que el producto es
        compatible
    shuttlecock_base_material:
      name: Material de la base del volante de bádminton
      description: Identifica el material utilizado para la punta/base del volante,
        lo que afecta a la durabilidad, la sensación al tacto y el rebote.
    shuttlecock_feather_material:
      name: Material de plumas del volante de bádminton
      description: Identifica la clase de plumas o el tipo de construcción principal
        que se utilizan en la falda del volante de bádminton, lo que influye sobre
        su durabilidad, la consistencia y el precio.
    shuttlecock_grade:
      name: Grado del volante de bádminton
      description: Especifica el nivel de juego o la clasificación de calidad previstos
        (p. ej., entrenamiento, club, competición).
    shuttlecock_speed_rating:
      name: Clasificación de velocidad del volante de bádminton
      description: Especifica la velocidad o clasificación del volante de bádminton
        según lo designado por el fabricante, lo que permite a los jugadores seleccionar
        la velocidad de vuelo correcta para sus condiciones de juego, temperatura
        y altitud.
    side_panel_installation_state:
      name: Estado de instalación del panel lateral
      description: Especifica si el panel lateral se provee sin recubrimiento, imprimado,
        pintado, o bien recubierto o preparado de alguna otra manera para su instalación.
    side_wall_mechanism:
      name: Mecanismo de pared lateral
      description: Describe cómo se abre o se baja la pared lateral de la cuna para
        tener acceso al bebé.
    signal_source:
      name: Fuente de señal
      description: Indica cómo el odómetro recibe/deriva la información de distancia
        o tiempo.
    silk_fiber_type:
      name: Tipo de fibra de seda
      description: Tipo/origen de la fibra de seda utilizada para fabricar la tela
        (por ejemplo, morera o tussah), lo que influye en la textura, la uniformidad
        y el precio.
    simulated_game_species:
      name: Especies de caza simuladas
      description: Indica el ave de caza o animal específico que el maniquí imita
        para un entrenamiento realista.
    singlet_cut_style:
      name: Estilo de corte de camiseta sin mangas
      description: Especifica el corte/estilo del traje de lucha libre, considerando
        la altura de las correas, el estilo de la espalda y las variaciones de sexo/edad.
    sink_material:
      name: Material del lavabo
      description: Especifica el material de los lavabos integrados que se incluyen
        con el mueble de baño.
    sinker_attachment_style:
      name: Estilo de sujeción del plomo
      description: Describe el mecanismo provisto en el plomo de orilla para sujetarlo
        a la línea de pesca o al aparejo.
    sinker_finish:
      name: Acabado del plomo
      description: Especifica el revestimiento exterior o la variación de la superficie
        del plomo.
    sinker_shape:
      name: Forma de la plomada
      description: Define la forma geométrica del plomo (por ejemplo, bala, cilindro,
        gota) para que los pescadores puedan seleccionar la presentación óptima y
        la resistencia a los enganches.
    siren_system_included:
      name: Sistema de sirena incluido
      description: Indica si hay instalado un sistema de sirena/PA y de qué tipo.
    siren_system_type:
      name: Tipo de sistema de sirena
      description: Especifica la configuración de la sirena/PA instalada en el camión
        de policía.
    size_designation:
      name: Designación de talla
      description: Etiqueta de talla estandarizada para el instrumento triangular.
    size_system:
      name: Sistema de tallas
      description: Especifica el sistema de tallas o estándar regional al que corresponde
        la etiqueta de talla (por ejemplo, EE. UU., Reino Unido, UE, internacional).
    sizzle_mechanism:
      name: Mecanismo de chisporroteo
      description: Especifica cómo el platillo produce el efecto de chisporroteo (por
        ejemplo, remaches instalados en el platillo, cadena/chisporroteador acoplable
        o sin hardware incluidos).
    skate_blade_discipline:
      name: Disciplina de la cuchilla de patín
      description: Identifica la disciplina o aplicación de patinaje para la que está
        diseñada la cuchilla, como hockey o patinaje artístico, lo que permite al
        comprador filtrar para encontrar las cuchillas relevantes.
    skate_brake_type:
      name: Tipo de freno del skate
      description: Identifica el tipo de mecanismo de frenado que incluyen los patines.
    skateboard_nut_thread_size:
      name: Tamaño del hilo de la tuerca de monopatín
      description: Especifica el tamaño del hilo (diámetro y paso) de la tuerca para
        garantizar la compatibilidad con ejes de patineta, pivotes o hardware de montaje.
    skein_winder_bearing_bushing_type:
      name: Tipo de cojinete/casquillo del devanador de bobinas
      description: Especifica el tipo de cojinete o casquillo utilizado en el conjunto
        giratorio de la bobinadora.
    skein_winder_drive_type:
      name: Tipo de accionamiento del devanador de madejas
      description: Cómo se acciona/hace girar la bobinadora durante su uso.
    ski_binding_mechanism:
      name: Mecanismo de fijación de esquís
      description: Define el diseño mecánico fundamental o la disciplina de la fijación
        (por ejemplo, alpina, técnica/guardado, telemark).
    ski_binding_part_type:
      name: Tipo de pieza de fijación de esquí
      description: Identifica el componente o accesorio específico para las fijaciones
        de esquí, lo que permite un filtrado rápido entre muchos tipos de piezas.
    ski_boot_sole_standard:
      name: Estándar de suela de bota de esquí
      description: Identifica la única norma o estándar de compatibilidad de fijaciones
        para el que está certificada la bota de esquí.
    skill_focus:
      name: Enfoque de habilidades
      description: Identifica la habilidad principal de baloncesto que se pretende
        desarrollar con esta herramienta de entrenamiento.
    skimboard_construction:
      name: Construcción de la tabla de skimboard
      description: Describe la construcción principal de la tabla, centrándose en
        el núcleo y la técnica de laminado (por ejemplo, núcleo de espuma, núcleo
        de madera).
    skin_presence:
      name: Presencia de piel
      description: Especifica si el pollo se vende con la piel, sin piel o parcialmente
        sin piel.
    slapstick_handle_type:
      name: Tipo de mango del slapstick
      description: Describe el estilo de agarre/identificador integrado en el slapstick,
        que afecta la ergonomía y la comodidad al utilizarlo.
    slapstick_playing_surface_material:
      name: Material de superficie para el uso del slapstick
      description: Especifica el material de los elementos de percusión/golpeteo que
        entran en contacto entre sí para producir el sonido.
    sled_brake_type:
      name: Tipo de freno del trineo
      description: Especifica el mecanismo de frenado que incluye el trineo, si lo
        hubiera.
    sled_towing_method:
      name: Método de remolque de trineos
      description: Indica la forma principal en que se tira o se remolca el trineo.
    sleep_position_suitability:
      name: Adecuación de la posición para dormir
      description: Indica qué posición(es) para dormir son más compatibles con el
        diseño del colchón.
    sleeping_bag_shape:
      name: Formas de sacos de dormir
      description: El corte general del saco de dormir, que afecta a la calidez, el
        peso y la amplitud.
    sleeping_pad_type:
      name: Tipo de colchoneta para dormir
      description: Identifica el estilo de construcción de la colchoneta, como espuma
        de celda cerrada o aire inflable, que influye directamente en la comodidad,
        el peso y el aislamiento.
    sleepwear_set_pieces_included:
      name: Piezas incluidas en el conjunto de ropa de dormir
      description: Enumera los componentes individuales que se incluyen en un conjunto
        de ropa de dormir o de ropa cómoda.
    sleeve_bearing_type:
      name: Tipo de cojinete de la manga
      description: Identifica la tecnología que permite la rotación de la manga, lo
        que afecta la calidad del giro en los levantamientos olímpicos.
    sleeve_style:
      name: Estilo de funda
      description: Especifica el estilo de manga además del largo (por ejemplo, raglán).
    slide_board_accessories_included:
      name: Accesorios para la tabla deslizante incluidos
      description: Enumera los artículos complementarios empaquetados con la tabla
        deslizante para que el comprador sepa exactamente qué se incluye y pueda comparar
        diferentes paquetes.
    slide_installation_type:
      name: Tipo de instalación del tobogán
      description: Cómo se debe instalar o montar el tobogán (de forma independiente,
        acoplado a un juego infantil, etc.).
    slide_intended_finger:
      name: Deslice el dedo deseado
      description: Indica en qué dedo se debe usar el deslizador o si no es aplicable
        (por ejemplo, una barra de tono).
    slide_safety_features:
      name: Características de seguridad del tobogán
      description: Elementos de diseño relacionados con la seguridad incluidos en
        el tobogán.
    slide_type:
      name: Tipo de tobogán
      description: Especifica qué tipo de mecanismo del tobogán de latón está diseñado
        para limpiar el producto.
    slide_water_use_capability:
      name: Capacidad de uso de agua del tobogán
      description: Si el tobogán está diseñado para usarse con agua (por ejemplo,
        conexión de manguera) y cómo.
    slime_putty_kit_components_included:
      name: Componentes del kit de slime y masilla incluidos
      description: Enumera las herramientas y complementos incluidos con el producto
        de slime/masilla (especialmente para kits/paquetes).
    sling_material:
      name: Material de la eslinga
      description: Especifica la fibra/tejido utilizado en la cinta del bucle expreso
        (tipo hueso).
    smith_machine_bar_path:
      name: Trayectoria de la barra de la máquina Smith
      description: Describe la trayectoria de movimiento fija de la barra, informando
        a los usuarios sobre la biomecánica y los requisitos de espacio.
    smoke_color:
      name: Color del humo
      description: Color del humo producido por la bengala/señal de humo (distinto
        del color del cuerpo del producto).
    smoked_malt_smoking_material:
      name: Material para ahumar malta ahumada
      description: En el caso de las maltas ahumadas, se identifica el material utilizado
        durante el proceso de ahumado (por ejemplo, turba o especies de madera específicas).
    snack_mix_variety:
      name: Variedad de snacks
      description: Clasifica el producto según el tipo de mezcla (por ejemplo, para
        senderismo, de frutos secos, namkeen, sev).
    snack_processing_method:
      name: Método de procesamiento de aperitivos
      description: Indica la técnica principal de procesamiento o conservación utilizada
        para crear el snack (por ejemplo, liofilizado, horneado, tostado).
    snack_texture:
      name: Textura del snack
      description: Indica la textura o sensación en boca que producen los palitos
        de sésamo.
    snap_installation_method:
      name: Método de instalación del broche a presión
      description: Cómo se instala/fija el broche al material del proyecto.
    snare_drum_bearing_edge_profile:
      name: Perfil del borde de apoyo de la caja
      description: Corte/perfil del borde de apoyo del casco de la caja.
    snare_drum_finish_type:
      name: Tipo de acabado del redoblante
      description: Acabado de alta calidad/tipo de construcción utilizado en el casco
        de la caja.
    snare_drum_hoop_type:
      name: Tipo de aro del redoblante
      description: Tipo de aros o bordes utilizados en el redoblante.
    snare_drum_mounting_type:
      name: Tipo de montaje del redoblante
      description: Cómo se supone que debe montarse/utilizarse la caja.
    snare_drum_shell_material:
      name: Material de la carcasa del redoblante
      description: Especifica el metal o la aleación utilizada para el casco de la
        caja (el cuerpo principal), lo que influye notablemente en el tono, el peso
        y la durabilidad.
    snare_drum_strainer_mechanism:
      name: Mecanismo de tensión de la caja
      description: Tipo de bordonera o mecanismo utilizado para activar o desactivar
        la bordona.
    snare_drum_strainer_type:
      name: Tipo de mecanismo de tensión de la caja
      description: Tipo de bordonera o mecanismo utilizado para activar o desactivar
        la bordona.
    snare_hoop_type:
      name: Tipo de aro de la caja
      description: Tipo de aros/bordes en la caja.
    snare_throw_off_type:
      name: Tipo de liberación de la caja
      description: Tipo de mecanismo de tensión/desbloqueo utilizado para enganchar/desenganchar
        los alambres de la caja.
    snip_cutter_spring_mechanism:
      name: Mecanismo de resorte de la cuchilla de las tijeras
      description: Indica si la cuchilla de las tiras utiliza un mecanismo de resorte/retorno
        y su estilo.
    snorkel_mount_position:
      name: Posición del soporte del esnórquel
      description: Describe la posición del tubo de esnórquel en la cabeza del usuario
        durante su uso.
    snorkel_top_type:
      name: Tipo de tubo superior del esnórquel
      description: Describe el estilo de protección contra la entrada de agua en la
        parte superior del tubo de esnórquel incluido en el set.
    snow_condition_suitability:
      name: Adecuación según el nivel de nieve
      description: Describe el nivel principal de la nieve para el que está destinada
        la cera.
    snow_sports_helmet_safety_certification:
      name: Certificación de seguridad para cascos de deportes de nieve
      description: Identifica las normas de seguridad que cumple el casco para su
        uso en esquí y snowboard.
    snowboard_base_material:
      name: Material base para snowboard
      description: Identifica la composición base o el acabado (grados extruidos,
        sinterizados, fórmulas patentadas) que afecta a la velocidad, la durabilidad
        y el mantenimiento.
    snowboard_width_class:
      name: Clase de ancho de tabla de snowboard
      description: Categoriza el ancho general de la tabla en relación con la talla
        de la bota (por ejemplo, regular, ancho).
    soccer_ball_compartment_type:
      name: Tipo compartimento para balones de fútbol
      description: Especifica si la mochila tiene capacidad para un balón de fútbol.
    soccer_ball_type:
      name: Tipo de pelota de fútbol
      description: Especifica el uso previsto o el estilo del balón de fútbol (por
        ejemplo, partido, entrenamiento, fútbol sala) para que el comprador pueda
        encontrar rápidamente la variante adecuada sin necesidad de muchas subcategorías.
    soccer_dummy_base_type:
      name: Tipo base del maniquí de fútbol
      description: Describe el tipo de base o mecanismo de anclaje que utiliza el
        maniquí.
    soccer_dummy_design:
      name: Diseño del maniquí de fútbol
      description: Especifica el estilo de construcción de un maniquí de portería
        de fútbol, como por ejemplo rígido o inflable.
    soccer_goal_target_style:
      name: Estilo del objetivo de portería de fútbol
      description: Define el factor de forma física o el diseño del objetivo de entrenamiento
        para que el comprador pueda elegir el estilo que mejor se adapte a sus ejercicios.
    soccer_goal_type:
      name: Tipo de arco de fútbol
      description: Indica el estilo estructural o el uso previsto de la portería (por
        ejemplo, puestos temporales, reboteador, calle).
    sock_cushioning:
      name: Amortiguación del calcetín
      description: Indica la cantidad y el estilo de amortiguación o relleno incorporado
        en la planta del pie dentro del calcetín.
    sock_cushioning_level:
      name: Nivel de amortiguación del calcetín
      description: Especifica la cantidad de amortiguación integrada en el calcetín
        que se encuentra bajo el pie.
    sock_grip_type:
      name: Tipo de agarre del calcetín
      description: Describe cualquier característica de tracción o antideslizante
        aplicada a la suela del calcetín.
    sock_toe_style:
      name: Estilo de la punta del calcetín
      description: Describe el estilo de confección de la zona de los dedos del calcetín.
    soft_bait_style:
      name: Estilo de señuelo blando
      description: Clasifica el diseño o perfil del cuerpo del señuelo de plástico
        blando (por ejemplo, gusano, cebo, larva).
    soft_top_attachment_type:
      name: Tipo de sujeción de la capota blanda.
      description: Indica cómo se fija la capota blanda al vehículo (canales, broches,
        velcro, etc.).
    soft_top_includes_frame_hardware:
      name: La capota blanda incluye marco/hardware
      description: Indica si el producto incluye marco/arcos de la capota blanda y/o
        hardware de montaje.
    soft_top_installation_type:
      name: Tipo de instalación de techo blando
      description: Especifica cómo se instala/fija la capota blanda del vehículo,
        indicando el método de instalación previsto y el esfuerzo necesario.
    soft_top_window_configuration:
      name: Configuración de ventanas de la capota blanda.
      description: Indica cuántas ventanas tiene la capota de lona y en qué posiciones
        se encuentran.
    softball_certification:
      name: Certificación de sóftbol
      description: Enumera los sellos o aprobaciones del organismo rector impresos
        en la pelota que determinan la elegibilidad para la liga o el partido.
    softness_level:
      name: Nivel de suavidad
      description: Indica cuán suave/de perfil bajo es el lado del bucle, lo cual
        es relevante para la comodidad en contacto con la piel y para aplicaciones
        de bajo volumen.
    solar_system_model_included_bodies:
      name: Cuerpos incluidos en el modelo del sistema solar
      description: Indica qué cuerpos celestes están representados en el set del modelo.
    solar_system_model_scaling:
      name: Escalado del modelo del sistema solar
      description: Indica si los tamaños de los planetas, las distancias/órbitas,
        o ambos del modelo del sistema solar están a escala, o si es una representación
        esquemática/no a escala.
    sold_secure_certification_level:
      name: Nivel de certificación Sold Secure
      description: Indica la clasificación Sold Secure otorgada a la cerradura por
        el organismo de pruebas independiente del Reino Unido (bronce, plata, oro,
        diamante).
    sold_secure_rating:
      name: Calificación Sold Secure
      description: Indica el nivel de certificación Sold Secure asignado a la cerradura.
    sole_construction:
      name: Construcción de la suela
      description: Indica cómo está construida la suela del zapato (completa, separada,
        de dos piezas, etc.), lo que afecta directamente a la flexibilidad, el contacto
        con el suelo y la idoneidad para técnicas de baile específicas.
    sole_type:
      name: Tipo de suela
      description: Describe el estilo estructural de la suela, indicando su flexibilidad
        y el uso previsto.
    soprano_saxophone_body_style:
      name: Estilo de cuerpo del saxofón soprano
      description: Describe la configuración física del cuerpo del saxofón soprano.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Tipo de deflector de la boquilla para saxofón soprano
      description: Describe el diseño del deflector/techo de la boquilla (el contorno
        detrás de la punta), que afecta al brillo, la proyección y la respuesta.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Tamaño de la cámara de la boquilla para saxofón soprano
      description: Describe el tamaño de la cámara interna de la boquilla del saxofón
        soprano, que Influence la resistencia y color tonal.
    soprano_saxophone_mouthpiece_finish:
      name: Acabado de la boquilla para saxofón soprano
      description: Acabado superficial/recubrimiento aplicado a la boquilla (si corresponde).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Accesorios incluidos con la boquilla del saxofón soprano
      description: Indica qué accesorios se incluyen con la boquilla.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Carácter tonal de la boquilla del saxofón soprano
      description: Perfil tonal de alto nivel comúnmente asociado con el diseño de
        la boquilla.
    sound_character:
      name: Carácter de sonido
      description: Describe el timbre general producido por el slapstick.
    sound_expansion_method:
      name: Método de expansión del sonido
      description: Especifica cómo el módulo puede agregar o expandir su biblioteca
        de sonidos interna más allá de los sonidos de fábrica (por ejemplo, paquete
        de contenido, importación de muestras, tarjeta de expansión).
    sound_module_sound_library_focus:
      name: Biblioteca de sonidos enfoque del módulo de sonido
      description: El énfasis principal del set de sonido de fábrica es ayudar al
        comprador a encontrar el módulo adecuado para su estilo/caso de uso.
    sound_port_type:
      name: Tipo de puerto sonoro
      description: Describe el diseño del orificio/puerto de sonido en la parte posterior
        del cajón que influye en la proyección y la respuesta de las frecuencias bajas.
    sound_sensitivity_control:
      name: Control de sensibilidad del sonido
      description: Indica si se puede ajustar la sensibilidad del sonido y cómo hacerlo.
    sound_synthesizer_patch_memory:
      name: Memoria de parche del sintetizador de sonido
      description: Indica si el sintetizador puede almacenar y recuperar preajustes
        (parches).
    sound_type:
      name: Tipo de sonido
      description: Tipos de sonido principales o salidas de audio que produce la alfombrilla
        (por ejemplo, instrumentos, canciones, indicaciones de voz) para guiar el
        juego.
    soundboard_material:
      name: Material de la caja de resonancia
      description: Material utilizado para la caja de resonancia (tapa) del arpa,
        que determina la resonancia y el tono.
    soup_or_broth_variety:
      name: Variedad de sopa o caldo
      description: Especifica el estilo, la receta o la preparación culinaria de la
        sopa o el caldo para que el comprador pueda encontrar rápidamente el tipo
        que prefiera.
    sour_cream_variety:
      name: Variedad de crema agria
      description: Clasifica los productos de crema agria según su variedad específica
        o estilo cultural, como la crème fraîche o la crema mexicana.
    soy_sauce_variety:
      name: Variedad de salsa de soja
      description: Identifica el estilo o la formulación específica de la salsa de
        soja (por ejemplo, clara, oscura, tamari, ponzu), lo que permite al comprador
        filtrar rápidamente por perfil de sabor y uso culinario.
    spark_plug_electrode_material:
      name: Material del electrodo de la bujía
      description: Material/tecnología de la punta del electrodo de encendido de la
        bujía (central y/o de masa), según la denominación comercial (por ejemplo,
        cobre, platino, iridio).
    spark_plug_seat_type:
      name: Tipo de asiento de la bujía
      description: Tipo de sellado/asiento utilizado por la bujía en la interfaz con
        la culata.
    spark_plug_terminal_type:
      name: Tipo de terminal de la bujía
      description: Estilo terminal superior utilizado para conectar el cable/funda
        de encendido.
    sparkler_shape:
      name: Formas de bengalas
      description: Diseño/forma novedosa general de la bengala.
    speaker_cone_material:
      name: Material del cono del altavoz
      description: Material primario del cono del altavoz (woofer/medio cono).
    speaker_size:
      name: Tamaño del altavoz
      description: Tamaño nominal del controlador / tamaño de montaje para el altavoz
        de componentes (por ejemplo, 6,5 pulgadas, 6x9 pulgadas), utilizado para que
        la sucursal de fábrica y los adaptadores de altavoz coincidan.
    special_effects_output_interface:
      name: Interfaz de salida de efectos especiales
      description: Especifica el conector/interfaz de salida utilizado para controlar
        el dispositivo de efectos especiales.
    special_effects_stand_stability_features:
      name: Características de estabilidad del soporte de efectos especiales
      description: Especifica las características de estabilidad y seguridad incorporadas
        destinadas a evitar vuelcos o resbalones durante eventos.
    specialty_malt_name_type:
      name: Nombre/tipo de malta especial
      description: Identifica el tipo específico de malta especial (que a menudo se
        utiliza como nombre comercial del estilo).
    specimen_presentation:
      name: Presentación de la muestra
      description: Indica cómo se prepara o presenta el ejemplar coleccionable (por
        ejemplo, en bruto/sin preparar, pulido, cortado o montado).
    speed_bag_accessories_included:
      name: Accesorios incluidos para la pera de boxeo
      description: Lista de artículos adicionales que vienen con el saco de velocidad,
        como guantes, bombas de aire, eslabones giratorios, cadenas o soportes.
    speed_rating:
      name: Clasificación de velocidad
      description: Indica la velocidad de la superficie de juego que proporciona el
        paño de la mesa de billar (por ejemplo, lenta, media o rápida).
    speedometer_backlight_type:
      name: Tipo de retroiluminación del velocímetro
      description: Especifica si el velocímetro tiene retroiluminación para una mejor
        visibilidad nocturna y, en caso afirmativo, cómo la tiene.
    speedometer_display_type:
      name: Tipo de visualización del velocímetro
      description: 'Indica el estilo de visualización de la velocidad del velocímetro:
        aguja/esfera analógica, lectura numérica digital o una combinación de elementos
        analógicos y digitales.'
    speedometer_unit_of_measure:
      name: Unidad de medida del velocímetro
      description: Especifica las unidades de velocidad que se muestran en el dial/pantalla.
    spike_replaceability:
      name: Reemplazabilidad de los tapones
      description: Indica si los tapones del zapato son reemplazables, fijos o si
        el zapato no tiene tapones.
    spike_shape:
      name: Forma del tapón
      description: Identifica el estilo geométrico de la punta del tapón, que influye
        en el agarre y la idoneidad para diferentes superficies.
    spike_thread_size:
      name: Tamaño de la rosca de la punta
      description: Especifica el tamaño o estándar de la base roscada que se atornilla
        al zapato (por ejemplo, 1/4-20).
    spin_classification:
      name: Clasificación de giro
      description: Indica el perfil de giro para el que está diseñado el disco (giro
        bajo, medio, alto, hipergiro).
    spin_profile:
      name: Perfil de giro
      description: Especifica las características de giro relativas que favorece el
        eje.
    spin_types_supported:
      name: Tipos de giro admitidos
      description: Enumera los tipos de efecto que la máquina puede imprimir a las
        pelotas para que los jugadores puedan practicar contra diferentes estilos
        de tiros.
    spinach_preparation_style:
      name: Estilo de preparación de la espinaca
      description: Describe la preparación física de las hojas de espinaca o el formato
        del producto (por ejemplo, hoja entera, picada, en cubos).
    spinach_variety:
      name: Variedad de espinacas
      description: Identifica la variedad botánica o de mercado de la espinaca (por
        ejemplo, baby, saboya, kangkong, roja), lo que permite al comprador seleccionar
        el tipo exacto que desea.
    spindle_bearing_surface_material:
      name: Material de la superficie de apoyo del huso
      description: Material de la punta/superficie de apoyo utilizada en los husos
        de soporte (punta/fondo), que afecta a la suavidad y al desgaste.
    spindle_bearing_type:
      name: Tipo de rodamiento de husillo
      description: Tipo de interfaz de apoyo/punta de huso que reduce la fricción
        contra el recipiente/copa de soporte.
    spindle_finish:
      name: Acabado del huso
      description: Acabado/recubrimiento de la superficie del huso que afecta a la
        sensación al tacto, la durabilidad y la estética.
    spindle_hook_type:
      name: Tipo de gancho del huso
      description: El mecanismo de sujeción del hilo situado en la parte superior
        del huso se utiliza para asegurar el hilo guía/hilo.
    spindle_support_method:
      name: Método de soporte del huso
      description: Cómo se supone que debe sujetarse el huso durante el hilado.
    spindle_tip_style:
      name: Estilo de punta del huso
      description: Forma/diseño del punto que descansa en el recipiente/copa (la superficie
        de apoyo), que afectan la fricción y la suavidad del giro.
    spindle_whorl_position:
      name: Posición del huso
      description: Donde se asienta el volante en el eje del huso.
    spinner_blade_shape:
      name: Forma de la paleta del señuelo
      description: Identifica la forma de la paleta principal utilizada en el señuelo,
        que influye en la vibración, el destello y la profundidad de funcionamiento.
    spinner_control_card_design_type:
      name: Diseño/tipo de la tarjeta de control del señuelo
      description: Describe el tipo de tarjeta de control del señuelo en términos
        de cómo presenta la información de control (por ejemplo, referencia de relación,
        referencia de tensión, tabla de conversión).
    spinner_subtype:
      name: Subtipo de ruedas giratorias
      description: Clasifica el diseño o la familia general del señuelo (por ejemplo,
        giratorio en línea, tipo spinnerbait).
    spinning_oil_application_area:
      name: Área de la aplicación de aceite giratorio
      description: Especifica los puntos de aplicación previstos en una rueca para
        el aceite.
    spinning_oil_application_tool:
      name: Herramienta de aplicación de aceite para hilado
      description: Indica el tipo de punta del aplicador/embalaje que se utiliza para
        aplicar aceite a las piezas de la rueca para una dosificación controlada.
    spinning_oil_features:
      name: Características del aceite giratorio
      description: Destaca las propiedades funcionales relevantes para los aceites
        de ruecas (residuos, manchas, oxidación y lavabilidad).
    spinning_top_features:
      name: Características del trompo.
      description: Características de juego especiales incluidas en la peonza además
        del giro básico.
    spinning_top_launch_mechanism:
      name: Mecanismo de lanzamiento de la peonza
      description: Cómo se inicia/impulsa la peonza para que gire.
    spinning_wheel_brake_tension_system_type:
      name: Tipo de sistema de freno/tensión de rueda giratoria
      description: Especifica el sistema de tensión de frenado/recogida utilizado
        para controlar la recogida del hilo.
    spinning_wheel_drive_system:
      name: Sistema de transmisión para la rueca
      description: Indica el sistema de accionamiento para el que está diseñada la
        bobina.
    spinning_wheel_hook_system:
      name: Sistema de gancho para la rueca
      description: Especifica cómo se guía el hilo a lo largo de los brazos del volante.
    spinning_wheel_part_application:
      name: Aplicación de piezas de la rueca
      description: Especifica para qué componentes de la rueca está destinado el aceite.
    spinning_wheel_portability_foldability:
      name: Portabilidad/plegabilidad de la rueca
      description: Indica si la rueca está diseñada para plegarse/contraerse para
        su transporte.
    spinning_wheel_tension_adjustment_type:
      name: Tipo de ajuste de tensión de la rueca
      description: Cómo se ajusta la tensión en la rueca para el control de la tensión.
    splice_termination_type:
      name: Tipo de empalme/resección
      description: Especifica la resección del extremo que se proporciona en la línea
        de anclaje (por ejemplo, ojo empalmado, guardacabos, gancho de cadena).
    split_shot_cut_type:
      name: Tipo de corte de plomo dividido
      description: Especifica el tipo de ranura o abertura que permite la fijación
        a la línea.
    split_shot_shape:
      name: Forma del plomo partido
      description: Describe la forma física del plomo dividido, que afecta a la hidrodinámica
        y a la resistencia a los enganches.
    split_shot_size:
      name: Tamaño del plomo partido
      description: Código alfanumérico estandarizado de tamaño (por ejemplo, SSG,
        AAA, BB, 1) utilizados por fabricantes y pescadores para clasificar los plomos
        divididos de pesca. Complementa las medidas de peso exactas.
    spoiler_adjustability:
      name: Ajuste del alerón
      description: Indica si el ángulo/altura del alerón es ajustable.
    spoke_accessory_function:
      name: Función del accesorio de radios
      description: Clasifica la función principal del accesorio en la rueda, como
        decorativas, reflectantes o iluminadas.
    spoke_butting_profile:
      name: Perfil de unión de radios
      description: Describe cómo cambia el diámetro de los radios a lo largo de su
        longitud (liso, simple, doble, triple o cuádruple), lo que afecta al peso
        y la resistencia.
    spoke_gauge:
      name: Calibre de radios
      description: Especifica el calibre (grosor del alambre) de los radios con los
        que es compatible la boquilla.
    spoke_interface_type:
      name: Tipo de interfaz de radios
      description: Indica el estilo de cabeza de radio para el que está diseñado el
        buje (curva en J, recto, cabeza en T).
    spoke_shape:
      name: Forma de los radios
      description: Especifica la sección transversal externa del cable del radio,
        que influye en la aerodinámica y la estética.
    spool_form_factor:
      name: Foctor de forma del carrete
      description: El estilo físico del cuerpo de la bobina y cómo se sujeta el hilo
        (por ejemplo, con bridas o cónico).
    spoon_style:
      name: Estilos de cucharas
      description: Indica el subtipo funcional o el estilo de la cuchara, como por
        ejemplo de lanzamiento, de aleteo o de arrastre.
    sports_bra_padding_type:
      name: Tipo de relleno del sujetador deportivo
      description: Especifica el tipo de relleno que incluye el sujetador deportivo.
    sports_cap_style:
      name: Estilo de la gorra deportiva
      description: Identifica la construcción/estilo general de la gorra (por ejemplo,
        gorra de béisbol, snapback), independientemente de la promoción de marca del
        equipo.
    sports_governing_body_certification:
      name: Certificación del organismo rector del deporte
      description: Indica las certificaciones o aprobaciones oficiales de organismos
        deportivos reconocidos, que confirman que el producto cumple con los estándares
        de competición.
    sports_surface_compatibility:
      name: Compatibilidad con la superficie de deporte
      description: Enumera los tipos de superficies o juegos sobre los que se puede
        aplicar la pintura de forma segura.
    sports_toy_set_contents:
      name: Contenido del set de juguetes deportivos
      description: Indica qué componentes se incluyen en el set de juguetes deportivos
        (por ejemplo, pelota, bate, red, objetivos).
    spray_string_cleanup_method:
      name: Método de limpieza por pulverización de cadena
      description: Método recomendado para eliminar/limpiar los residuos de aerosoles
        de serpentinas.
    spray_string_finish_effect:
      name: Acabado/efecto del aerosol de serpentinas
      description: Efecto visual del aerosol de serpentinas una vez aplicada (brillo/reflectividad
        y efectos especiales).
    spray_string_formulation_type:
      name: Tipo de formulación del aerosol de serpentinas
      description: Cómo se comporta el producto durante y después de la pulverización
        (por ejemplo, lavable frente a permanente).
    spray_string_recommended_surface:
      name: Superficie recomendada para aerosoles de serpentinas
      description: Tipos de superficies sobre las que se pretende utilizar el aerosol
        de serpentinas (y que probablemente podrán limpiarse).
    spray_string_scent:
      name: Arome del aerosol de serpentinas
      description: Perfil de aroma u olor, si lo hubiera, del aerosol de serpentinas.
    spray_string_suitable_age_group:
      name: Edad adecuada para el uso del aerosol de serpentinas
      description: Edad mínima/grupo de edad recomendado para un uso seguro.
    spread_consistency:
      name: Consistencia de la crema para untar
      description: Describe la textura/consistencia de la salsa o crema para untar
        para establecer expectativas sobre la sensación en la boca y el uso (por ejemplo,
        suave, con trozos, batida).
    spread_variety:
      name: Variedad de la crema para untar
      description: Clasifica el tipo específico de la crema para untar (por ejemplo,
        confitura, jalea, mermelada, cuajada) para que el comprador pueda distinguir
        entre diferentes estilos de preparación y texturas.
    spreader_bar_type:
      name: Tipo de barra separadora
      description: Indica el tipo de barra separadora o sistema de gancho que viene
        o que es compatible con el arnés.
    sprint_canoe_class:
      name: Clase de canoas de velocidad
      description: Especifica la designación oficial de clase de carreras de las canoas
        de velocidad.
    sprout_presentation:
      name: Presentación del brote
      description: Identifica la presentación física del producto (por ejemplo, brotes
        frescos, microvegetales, maceta de cultivo vivo, polvo).
    squash_and_gourd_variety:
      name: Variedades de calabaza y calabacín
      description: Identifica el cultivar específico o la variedad de mercado de la
        calabaza o calabacín, lo que ayuda al comprador a localizar rápidamente el
        tipo deseado.
    stability_class:
      name: Clase de estabilidad
      description: Categorización de estabilidad general derivada de las calificaciones
        de vuelo o de las afirmaciones de marketing.
    stabilizer_thread_size:
      name: Tamaño de hilo del estabilizador
      description: Especificación de hilo utilizada para fijar un estabilizador o
        accesorio a un arco o ballesta.
    stabilizer_type:
      name: Tipo de estabilizador
      description: Identifica el estilo o la clasificación posicional del estabilizador
        del arco o la ballesta.
    stages_supported:
      name: Etapas compatibles
      description: Indica con cuántas etapas está diseñado para volar un cohete o
        kit.
    stain_remover_format:
      name: Formato del quitamanchas
      description: Especifica el producto/formato utilizado para tratar las manchas
        del vehículo (botella pulverizadora, aerosol, espuma, gel, polvo, toallitas,
        bolígrafo/marcador).
    stake_shape:
      name: Forma de la estaca
      description: Define la sección transversal o el estilo de diseño de una estaca
        para tienda de campaña, lo que afecta a su capacidad de sujeción en diferentes
        tipos de terreno.
    stamp_block_features:
      name: Características del bloque de sellos
      description: Destaca las características funcionales de los bloques de sellos,
        como las cuadrículas de medición, las asas o las superficies antideslizantes.
    stamp_block_type:
      name: Tipo de bloque de sello
      description: Especifica la construcción/estilo del bloque de sello utilizado
        para montar los sellos para el estampado (por ejemplo, bloque de acrílico
        transparente, bloque montado en madera o bloque de posicionamiento).
    stamp_set_pieces_included:
      name: Piezas incluidas en el set de sellos
      description: Indica qué componentes se incluyen en el set de sellos y almohadillas
        de tinta (por ejemplo, sellos, almohadillas de tinta, marcadores).
    stand_padding_material:
      name: Material del acolchado del soporte
      description: Material utilizado en los puntos de contacto para proteger el acabado
        del instrumento (por ejemplo, espuma, caucho, silicona).
    staple_fiber_animal_fiber_type:
      name: Fibra discontinua tipo fibra animal
      description: Tipo específico de fibra animal cuando el tipo de fuente de fibra
        discontinua es animal.
    staple_fiber_crimp_level:
      name: Nivel de ondulación de la fibra discontinua
      description: Grado de ondulación natural de la fibra.
    staple_fiber_preparation_type:
      name: Tipo de preparación de la fibra discontinua
      description: El estado de preparación/procesamiento de la fibra tal como se
        vende (cómo está alineada/manipulada), lo cual influye fuertemente en el método
        de hilado, la facilidad de estirado y el resultado final.
    staple_fiber_source_type:
      name: Tipo de fuente de la fibra discontinua
      description: Categoría de origen amplia para el contenido de fibra.
    starch_processing_type:
      name: Tipo de procesamiento del almidón
      description: Indica si el almidón es nativo o si ha sido modificado física o
        químicamente (por ejemplo, instantáneo, pregelatinizado) para proporcionar
        propiedades funcionales específicas, como la velocidad de espesamiento o la
        tolerancia a la temperatura.
    starch_source:
      name: Fuente del almidón
      description: Especifica la fuente botánica de la que se obtiene el almidón o
        espesante para cocinar (por ejemplo, maíz, patata, tapioca). El origen es
        el principal factor diferenciador de los almidones para cocinar e influye
        directamente en la idoneidad de las recetas, las consideraciones sobre alérgenos
        y el comportamiento de búsqueda del consumidor.
    starfruit_variety:
      name: Variedad de la carambola
      description: Identifica el cultivar o variedad específica de carambola (por
        ejemplo, Arkin, Fwang Tung).
    starter_drive_type:
      name: Tipo de accionamiento del motor de arranque
      description: El tipo de mecanismo de accionamiento/enganche que se utiliza para
        acoplar el piñón con la corona dentada.
    starter_pistol_action_type:
      name: Tipo de acción de la pistola de arranque
      description: Identifica el mecanismo de disparo/acción de la pistola de arranque
        (por ejemplo, acción simple, acción doble, semiautomática).
    starter_pistol_caliber:
      name: Calibre de la pistola de arranque
      description: Especifica el calibre de la munición de fogueo o del cartucho para
        el que está diseñada la pistola de arranque.
    starter_terminal_type:
      name: Tipo de terminal del motor de arranque
      description: Especifica el tipo de terminal/conector utilizado para la conexión
        eléctrica en el arranque o el solenoide de arranque (por ejemplo, espárrago,
        pala, conector de enchufe).
    starting_block_anchoring_method:
      name: Método de anclaje para tacos de salida
      description: Describe cómo se fijan los tacos a la superficie de seguimiento
        (por ejemplo, púas, ventosas, almohadillas de goma).
    steerer_tube_design:
      name: Diseño del tubo de dirección
      description: Describe el diseño estructural del tubo de dirección (recto, cónico,
        roscado, etc.), que determina la compatibilidad entre la dirección y el marco.
    steering_cable_end_fitting_type:
      name: Tipo de conexión del extremo del cable de dirección
      description: Identifica el estilo de resección/fijación en los extremos del
        cable de dirección de una embarcación (extremo del timón y extremo del motor/caña)
        para garantizar la compatibilidad con los puntos de conexión del timón y del
        motor. Utiliza la designación estándar o del fabricante cuando corresponda.
    steering_column_adjustability_features:
      name: Características de ajuste de la columna de dirección
      description: Indica qué funciones de ajuste están integradas en la columna de
        dirección.
    steering_column_ignition_provision:
      name: Disposición de encendido en la columna de dirección
      description: Indica si la columna de dirección está diseñada para aceptar un
        cilindro/interruptor de bloqueo de encendido y/o un bloqueo de dirección.
    steering_column_shaft_end_interface_type:
      name: Tipo de interfaz final del eje de la columna de dirección
      description: Identifica el estilo de interfaz del extremo del eje de la columna
        de dirección (por ejemplo, estriado, doble D, con chaveta).
    steering_column_shift_type:
      name: Tipo de cambio de la columna de dirección
      description: Especifica si la columna de dirección incluye un mecanismo de cambio
        montado en la columna y su tipo de transmisión.
    steering_component_drive_type:
      name: Tipo de accionamiento del componente de dirección
      description: Especifica el mecanismo de accionamiento/asistencia relevante para
        los componentes de dirección (en particular, bombas y sistemas de poliestireno
        expandido).
    steering_position:
      name: Posición de dirección
      description: Indica si la furgoneta tiene el volante a la izquierda o a la derecha.
    steering_pump_pulley_type:
      name: Tipo de polea de la bomba de dirección
      description: Especifica el tipo/interfaz de accionamiento de la polea que se
        utiliza con la bomba de dirección.
    steering_rack_finish_coating:
      name: Acabado/recubrimiento del soporte de dirección
      description: Especifica el acabado/revestimiento exterior para la protección
        contra la corrosión.
    steering_rack_position:
      name: Posición de la cremallera de dirección
      description: Especifica dónde se monta/utiliza el soporte en el sistema de dirección
        del vehículo.
    steering_wheel_cover_installation_type:
      name: Tipo de instalación de la funda del volante
      description: Cómo se instala/fija la funda del volante en el volante.
    steering_wheel_grip_material:
      name: Material de la empuñadura del volante
      description: Especifica el material de la empuñadura del volante (donde las
        manos hacen contacto), que puede ser diferente al del núcleo/radios.
    steering_wheel_mounting_pattern:
      name: Patrón de montaje del volante
      description: Especifica el patrón de montaje de pernos/agujeros utilizado para
        fijar el volante a un cubo o adaptador (por ejemplo, 3 pernos, 5 pernos).
    steering_wheel_rim_material_grip_surface:
      name: Material del aro del volante (superficie de agarre)
      description: Especifica el material principal de revestimiento del agarre/borde
        (distinto del material de construcción general).
    stem_material:
      name: Material del tallo
      description: Especifica el material utilizado específicamente para el tallo
        o la boquilla de la pipa (por ejemplo, acrílico, ebonita, lucita).
    stencil_machine_consumable_type:
      name: Tipo de consumible para la máquina de estarcido
      description: Especifica los consumibles necesarios para su funcionamiento (si
        los hubiera).
    step_surface_texture:
      name: Textura de la superficie del escalón
      description: Especifica el diseño/material de la superficie o la banda de rodadura
        destinado a mejorar el agarre y la comodidad en condiciones de humedad.
    stepper_motion_type:
      name: Tipo de movimiento paso a paso
      description: Define el movimiento paso a paso principal que ofrece la máquina.
    stick_bow_profile:
      name: Perfil de arco del palo
      description: Especifica el perfil de curvatura (o "tipo de arco") del mango
        del palo de hockey sobre césped, un factor crítico que influye en el control
        de la bocha, el rendimiento en los golpes de arrastre y el estilo de juego.
    stick_construction:
      name: Construcción del bastón
      description: Especifica el estilo de construcción del palo de hockey, como por
        ejemplo de una pieza compuesta, de dos piezas compuestas o de madera.
    stick_curvature_type:
      name: Tipo de curvatura del palo
      description: Describe el perfil de curvatura del palo de lanzamiento, que afecta
        a la distancia y la precisión del lanzamiento.
    stick_head_shape:
      name: Formas de cabeza del palo
      description: Define la forma de la cabeza del palo, lo que afecta al control
        de la bocha, al control cercano de la misma y al estilo de golpe.
    stick_size_compatibility:
      name: Compatibilidad de tamaño del bastón
      description: Identifica el grupo de tamaño del palo de hockey con el que el
        producto es compatible (por ejemplo, juvenil, junior, intermedio, senior,
        portero, universal).
    sticker_decal_features:
      name: Características de la pegatina/calcomanía
      description: Captura las características de aplicación y rendimiento específicas
        de las pegatinas/calcomanías (por ejemplo, sin burbujas, reposicionables).
    sticker_finish:
      name: Acabado de la pegatina
      description: Describe el acabado superficial/efecto visual de las pegatinas.
    sticker_format:
      name: Formato de la pegatina
      description: Especifica el formato de venta al por menor de las pegatinas decorativas
        (por ejemplo, hoja, rollo, individual, libro).
    sticker_material_type:
      name: Tipo de material adhesivo
      description: Especifica el sustrato/material principal de la pegatina decorativa
        (no los adornos).
    stilt_foot_attachment_type:
      name: Tipo de sujeción del pie de zanco
      description: Especifica cómo se sujeta el pie del usuario al zanco (por ejemplo,
        correa con hebilla, velcro, cordones).
    stirrup_style:
      name: Estilo del estribo
      description: Clasifica el estilo de los estribos según su diseño o disciplina,
        abarcando variaciones en cuanto a seguridad, disciplina y construcción.
    stirrup_tread_material:
      name: Material de la banda de rodadura del estribo
      description: Especifica el material utilizado para la almohadilla o la superficie
        de apoyo del estribo, lo que afecta al agarre, la comodidad y la durabilidad.
    stitch_marker_and_counter_style:
      name: Marcador de puntadas y estilo de contador
      description: Especifica el estilo o el formato de un marcador de puntadas o
        un contador de puntadas/filas (por ejemplo, marcador con bloqueo, marcador
        de anillo partido, contador de anillo, contador digital).
    stitch_types:
      name: Tipos de puntadas
      description: Tipos de puntadas (funcionales y decorativas) que puede producir
        la máquina.
    stitching_method:
      name: Método de costura
      description: Indica cómo se unen los paneles del balón.
    stitching_state:
      name: Estado de la costura
      description: Indica si las piezas de la prenda se suministran sin coser, semi-cosidas,
        cosidas o listas para usar.
    stock_car_race_series:
      name: Serie de carreras de autos de serie
      description: Especifica el organismo regulador o la serie/categoría de carreras
        en la que está diseñado para competir el auto de serie.
    stone_adhesion:
      name: Adhesión del carozo
      description: Indica si el carozo del melocotón o de la nectarina es de carozo
        suelto, adherido o semi-suelto.
    stone_creation_method:
      name: Método de creación de piedras
      description: Especifica si la piedra es natural, cultivada en laboratorio, sintética
        o reciclada.
    stone_cut_grade:
      name: Grado de corte de la piedra
      description: Indica la evaluación general de la calidad del tallado de la piedra.
    stone_cut_style:
      name: Estilo de corte de piedras
      description: Estilo de talla/facetas de la piedra de vidrio (por ejemplo, facetas
        frente a cabujón).
    stone_fruit_cultivar:
      name: Cultivar de fruta de carozo
      description: Identifica la variedad o cultivar específico del melocotón o la
        nectarina.
    stone_fruit_variety:
      name: Variedad de la fruta de carozo
      description: Distingue el subtipo dentro de la categoría (por ejemplo, melocotón,
        nectarina, melocotón plano/en forma de rosquilla).
    stone_setting_type:
      name: Tipo de configuración de la piedra
      description: Especifica cómo se fija cada piedra a la pieza (bisel, garra, pavé,
        etc.).
    stone_transparency:
      name: Transparencia de la piedra
      description: Transparencia/opacidad óptica de la piedra de vidrio.
    storage_case_type:
      name: Tipo de caja de almacenamiento
      description: Indica el tipo de contenedor en el que viene el set para su almacenamiento
        y transporte (por ejemplo, caja, estuche, bolsa).
    storage_compartment_type:
      name: Tipo de compartimento de almacenamiento
      description: Especifica el tipo de compartimento de almacenamiento que ofrece
        la boya de natación para guardar objetos personales.
    storage_media_and_transfer_methods_supported:
      name: Métodos de almacenamiento y transferencia multimedia compatibles
      description: Métodos multimedia o de conexión compatibles para importar/exportar
        muestras y guardar/cargar proyectos.
    storage_requirements:
      name: Requisitos de almacenamiento
      description: Especifica cómo debe conservarse el producto en la tienda antes
        y/o después de abrirlo para mantener su calidad y seguridad.
    stove_jack_compatibility:
      name: Compatibilidad con el conducto de la estufa
      description: Indica si la tienda de campaña incluye una abertura ignífuga para
        el tubo de la estufa.
    straight_pin_application:
      name: Aplicación del alfiler recto
      description: Especifica el uso previsto caja para los alfileres rectos.
    straight_pin_finish:
      name: Acabado del alfiler recto
      description: Describe el acabado superficial o recubrimiento del alfiler (por
        ejemplo, niquelado) que afecta a la resistencia a la corrosión y al deslizamiento.
    straight_pin_head_material:
      name: Material de la cabeza del alfiler recto
      description: Especifica el material de la cabeza del alfiler (si la tiene),
        como plástico o vidrio.
    straight_pin_head_shape:
      name: Formas de cabeza del alfiler recto
      description: Describe la forma/estilo de la cabeza del alfiler para facilitar
        su uso y visibilidad.
    strand_configuration:
      name: Configuración de las hebras
      description: Indica cuántas filas o hebras separadas componen la cadena de la
        billetera (simple, doble, triple).
    strand_material:
      name: Material de la hebra
      description: Especifica el material utilizado para las hebras/tiras individuales.
    strap_attachment_hardware:
      name: Accesorio de sujeción de la correa
      description: Especifica el tipo/diseño del hardware utilizado para fijar la
        correa al instrumento/punto de apoyo.
    strap_configuration:
      name: Configuración de la correa
      description: Indica el número de puntos de sujeción del casco en la correa (por
        ejemplo, 2 puntos, 4 puntos), lo cual es fundamental para el ajuste, la seguridad
        y los requisitos de la liga.
    strap_functionality:
      name: Funcionalidad de la correa
      description: Especifica el uso principal o el diseño previsto de la correa para
        la esterilla de yoga.
    strap_padding:
      name: Relleno de la correa
      description: Indica el nivel de acolchado de la correa, diseñado para mejorar
        la comodidad y distribuir el peso.
    strap_side:
      name: Lado de la correa
      description: Indica si la correa está diseñada para la fijación izquierda, la
        fijación derecha o si se vende como un par.
    strap_width:
      name: Ancho de la correa
      description: Indica el ancho relativo de las correas de los hombros (delgadas,
        medianas, anchas) para guiar al comprador que busca una cobertura o soporte
        específico.
    strength_classification:
      name: Clasificación de fuerza
      description: Etiqueta de potencia de marketing comúnmente utilizada por la marca
        (por ejemplo, ligera, fuerte, extra fuerte).
    strength_grade:
      name: Grado de resistencia
      description: Describe la fuerza de sujeción/nivel de resistencia previsto del
        cierre de velcro.
    stretch_level:
      name: Nivel de estiramiento
      description: Indica cuánto se estira el tejido durante su uso.
    stretch_type:
      name: Tipo de elástico
      description: Indica si el tejido tiene elasticidad mecánica o elástica y en
        qué dirección(es).
    stretcher_bar_material:
      name: Material del bastidor
      description: Material utilizado para los bastidores/marcos (por ejemplo, pino,
        abeto, álamo, abedul, MDF/madera de ingeniería).
    strike_shield_shape:
      name: Forma del escudo de impacto
      description: Especifica el factor de forma general de la superficie de impacto
        de un escudo de impacto.
    string_core_shape:
      name: Forma del centro de la cuerda
      description: Especifica la forma del alambre central utilizado en las cuerdas
        entorchadas, que afectan a la sensación y la estabilidad.
    string_coverage:
      name: Cobertura de la cuerda
      description: Especifica qué cuerdas están diseñadas para pisar/cubrir el capo
        parcial (por conteo o conjunto común).
    string_end_type:
      name: Tipo de extremo de la cuerda
      description: Especifica cómo termina la cuerda en el puente/cordal para garantizar
        la compatibilidad (especialmente importante para bajos acústicos/eléctricos
        y algunos bajos).
    string_set_type:
      name: Tipo de configuración de cuerda
      description: Especifica si el producto es un conjunto completo o una cuerda(s)
        de reemplazo de individual.
    strung_status:
      name: Estado de la cuerda
      description: Indica si la cabeza del palo de lacrosse viene con la red preinstalada
        y con bolsillo, o si se vende sin encordar.
    strut_placement:
      name: Ubicación del puntal
      description: Especifica la posición de instalación prevista en el vehículo (delantera/trasera
        e izquierda/derecha) para el amortiguador.
    stud_attachment_type:
      name: Tipo de sujeción del taco
      description: Especifica cómo se fijan o configuran los tacos en la suela, lo
        que influye en la tracción, el mantenimiento y el cumplimiento de las normas
        de la liga.
    stud_configuration:
      name: Configuración del taco
      description: Define la forma y la disposición de los tacos en la suela, lo que
        afecta a la tracción y al rendimiento en diversas superficies.
    stud_material:
      name: Material del taco
      description: Identifica el material principal de los tacos, informando sobre
        su durabilidad, peso y cumplimiento de las normas de seguridad.
    stuffed_animal_features:
      name: Características de los animales de peluche
      description: Destaca las características de juego y comodidad integradas en
        el peluche.
    stump_base_type:
      name: Tipo de base del tocón
      description: Define el estilo de base o sistema de montaje que utiliza el tocón
        de cricket (punta, retorno por resorte, goma lastrada, etc.).
    stump_mechanism:
      name: Mecanismo del poste
      description: Especifica el mecanismo de retorno o montaje de los tocones de
        críquet (por ejemplo, con resorte, fijo).
    stump_size:
      name: Tamaño del tocón
      description: Etiqueta de tamaño categórica utilizada para los tocones de cricket,
        que indica la altura típica y la edad adecuada del jugador.
    subwoofer_installation_type:
      name: Tipo de instalación del subwoofer
      description: Cómo se debe instalar el subwoofer en un sistema de audio para
        vehículos.
    sugar_cane_variety:
      name: Variedad de la caña de azúcar
      description: Identifica el cultivar específico o la variedad de mercado de la
        caña de azúcar, lo que puede afectar color, la dulzura y el contenido de fibra.
    sugar_content_level:
      name: Nivel de contenido de azúcar
      description: Clasifica el nivel general de azúcar o la formulación del concentrado
        de la bebida, lo que permite al comprador encontrar rápidamente opciones normales,
        reducidas en azúcar o sin azúcar.
    sugar_refinement_level:
      name: Nivel de refinamiento del azúcar
      description: Indica el grado o estilo de refinamiento (color, contenido de melaza
        o nivel de procesamiento).
    sugar_source:
      name: Fuente de azúcar
      description: Identifica el origen botánico o material del que se obtiene el
        azúcar.
    suit_fit:
      name: Ajuste del traje
      description: Corte general del traje, que indica qué tan ajustado se ajusta
        al cuerpo.
    suit_pieces:
      name: Piezas del traje
      description: Especifica cuántas prendas coordinadas se incluyen en el conjunto
        del traje (por ejemplo, de 2 piezas, de 3 piezas, de 4 piezas).
    suitable_for_anchoring_use:
      name: Adecuado para uso de anclaje
      description: Indica el uso previsto relacionado con el anclaje para la cuerda/línea.
    suitable_for_craft_type:
      name: Adecuado para tipo de artesanía
      description: El uso principal de costura para el que está diseñado el alambre
        de bloqueo.
    suitable_for_paint_type:
      name: Adecuado para tipo de pintura
      description: Indica con qué tipos de pintura se puede utilizar el lienzo de
        forma segura.
    suitable_for_swim_stroke:
      name: Adecuado para el estilo de natación
      description: Indica para qué estilo(s) de natación está diseñada u optimizada
        la pala de mano.
    suitable_mounting_surface_material:
      name: Material adecuado para la superficie de montaje
      description: Especifica la superficie/material de montaje al que está diseñado
        para adherirse el soporte adhesivo.
    suitable_play_location:
      name: Ubicación de juego adecuada
      description: Entornos de juego principales previstos para el molino de arena
        y agua de juguete.
    suitable_riding_conditions:
      name: Condiciones de conducción adecuadas
      description: Indica el estado de conducción (por ejemplo, seco, húmedo, invierno)
        para el que está formulado un lubricante o limpiador para bicicletas.
    suitable_snow_conditions:
      name: Condiciones de nieve adecuadas
      description: Indica las condiciones de nieve adecuadas para los que está formulada
        la cera antideslizante.
    suitable_surface_type:
      name: Tipo de superficie adecuada
      description: Especifica las superficies para las que está diseñado el agarre.
    suitable_table_size:
      name: Tamaño de mesa adecuado
      description: Indica la longitud de la mesa de billar/snooker que la luz está
        diseñada para iluminar.
    sun_protection_rating_upf:
      name: Índice de protección solar (UPF)
      description: Indica el nivel de protección solar UPF certificado de la prenda.
    sun_shade_attachment_method:
      name: Método de sujeción del parasol
      description: Cómo se fija el parasol a la ventana/parabrisas.
    sun_shade_style:
      name: Estilo del parasol
      description: Construcción/formato del producto para desplegar y guardar el parasol.
    sunchoke_variety:
      name: Variedad de alcachofa de Jerusalén
      description: Indica la variedad o cultivar específico de la alcachofa de Jerusalén,
        proporcionando información detallada para jardineros, chefs y compradores
        exigentes.
    sunflower_oil_variety:
      name: Variedad de aceite de girasol
      description: Clasifica el perfil de ácidos grasos o cultivar del aceite de girasol
        (por ejemplo, alto en ácido oleico, medio en ácido oleico, linoleico).
    sunflower_variety:
      name: Variedad de girasol
      description: Cultivar/variedad de girasol (variedades comunes en el mercado
        para uso como flor cortada).
    support_brace_features:
      name: Características de la muñequera
      description: Enumera las características funcionales más destacadas de la muñequera,
        como el tejido transpirable, la férula extraíble o la placa metálica ajustable.
    support_leg_count:
      name: Cantidad de patas del bastón
      description: Número de patas que hacen contacto con el suelo cuando se utiliza
        el bastón de tiro (por ejemplo, monopie, bípode, trípode).
    support_padding:
      name: Relleno del soporte
      description: Indica si la correa/soporte incluye relleno integrado en los puntos
        de contacto (cuello/hombro/pulgar).
    support_structure_type:
      name: Tipo de estructura del soporte
      description: Indica el método de construcción utilizado para mantener el cortavientos
        en posición vertical.
    supported_bowling_delivery_types:
      name: Tipos de lanzamientos compatibles
      description: Especifica las variaciones de lanzamiento de críquet que la máquina
        puede simular, como los tipos de swing hacia adentro, swing hacia afuera y
        giro.
    supported_dive_modes:
      name: Modos de inmersión compatibles
      description: Especifica los modos de inmersión operativos que utiliza el ordenador
        de buceo, como aire, nitrox o manómetro.
    supported_equipment_type:
      name: Tipo de equipo compatible
      description: Indica el tipo de equipo para deportes de invierno que la estantería
        está diseñada para guardar (por ejemplo, esquís, tablas de snowboard, bastones
        de esquí).
    supported_spin_types:
      name: Tipos de giro admitidos
      description: Especifica las variaciones de efecto de la bola que puede aplicar
        el lanzador.
    supported_spool_bobbin_types:
      name: Tipos de bobina/carrete compatibles
      description: Especifica qué formatos de bobina/carrete está diseñado para aceptar
        el devanador eléctrico.
    surf_wax_temperature_rating:
      name: Clasificación de temperatura de la cera para surf
      description: Especifica el rango de temperatura del agua para el que está formulada
        la cera, garantizando un agarre óptimo en diferentes climas.
    surface_coating_or_finish:
      name: Recubrimiento o acabado de la superficie
      description: Especifica cualquier variación de la superficie aplicada a los
        alicates que sea protectora o que mejore su rendimiento.
    surface_coating_or_wrap:
      name: Recubrimiento o envoltura de superficie
      description: La variación de la superficie exterior se utiliza para el agarre/control
        en el palo central (y a veces en los palos de mano).
    surface_finish:
      name: Acabado de la superficie
      description: Describe la sensación/textura de la superficie de la pelota que
        influye en el agarre y el movimiento durante el malabarismo de contacto.
    surface_finish_prep:
      name: Acabado/preparación de la superficie
      description: Indica el estado de la superficie de fricción (por ejemplo, reacondicionada,
        mecanizada, fundida) en el momento de la venta.
    surface_types_included:
      name: Tipos de superficie incluidos
      description: Especifica qué superficie incluye el kit para dibujar/pintar (si
        la incluye), como lienzo, bloc de papel , paneles de madera o ninguna.
    surfboard_construction:
      name: Construcción de la tabla de surf
      description: Especifica la tecnología de construcción principal o el tipo de
        laminado de la tabla de surf.
    surfboard_tail_shape:
      name: Formas de la cola de las tablas de surf
      description: Define el contorno de la cola de la tabla, lo que influye en la
        maniobrabilidad y el agarre.
    suspension_bushing_type:
      name: Tipo de buje de suspensión
      description: Especifica el estilo funcional/de instalación del buje de la suspensión.
    suspension_configuration:
      name: Configuración de la suspensión
      description: Describe si el triciclo tiene suspensión y dónde está ubicada.
    suspension_material:
      name: Material de la suspensión
      description: Especifica el material de las cadenas, cuerdas o cables utilizados
        para colgar el columpio.
    suspension_trainer_accessories_included:
      name: Accesorios de entrenamiento de suspensión incluidos
      description: Enumera artículos adicionales que vienen con el kit de entrenamiento
        (por ejemplo, anclaje de puerta, correa de extensión, bolsa de almacenamiento),
        lo que ayuda al comprador a entender qué hay en la caja y comparar el valor
        del paquete.
    suspension_trainer_anchor_type:
      name: Tipo de anclaje del entrenador de suspensión
      description: Define el estilo de montaje o el punto de anclaje para el que están
        diseñadas las correas (por ejemplo, puerta, techo, árbol), lo que indica la
        compatibilidad con el entorno del usuario.
    suspension_type:
      name: Tipo de suspensión
      description: Especifica si la horquilla es rígida o utiliza un sistema de suspensión
        particular (aire, muelle, híbrido, elastómero, etc.), lo que ayuda a los ciclistas
        a adaptar la horquilla a su estilo de conducción.
    sustain_pedal_form_factor:
      name: Factor de forma del pedal de sostenido
      description: Describe el estilo físico del pedal de sostenido (por ejemplo,
        pedal de pie estilo piano o interruptor de pie compacto), lo que influye en
        la sensación y el uso previsto.
    sustain_pedal_switch_type:
      name: Tipo de interruptor del pedal de sostenido
      description: Indica si el pedal envía una señal momentánea (mantiene el sonido
        mientras se presiona) o una señal de retención (activación).
    sustainability_certification:
      name: Certificación de sostenibilidad
      description: Certificación ambiental o de origen del material de madera.
    swab_intended_bassoon_section:
      name: Sección de fagot prevista para hisopo
      description: Indica qué parte del fagot está diseñada para limpiar el hisopo
        (los diferentes orificios/partes requieren diferentes formas de hisopos).
    swab_style:
      name: Estilo del hisopo
      description: Describe el diseño físico/formato del hisopo utilizado para pasar
        a través o alcanzar ciertas áreas del saxofón.
    swab_weight_material:
      name: Material de peso del hisopo
      description: Material del plomo/guía de arrastre (si lo hay), que afecta al
        riesgo de arañazos y a la durabilidad.
    swab_weight_style:
      name: Estilo de peso del hisopo
      description: Especifica cómo se ajusta el peso del hisopo para que pase a través
        del orificio del fagot.
    sway_bar_adjustability:
      name: Ajuste de la barra estabilizadora
      description: Si la rigidez de la barra estabilizadora es ajustable y cómo se
        ajusta (normalmente mediante múltiples orificios de montaje en los extremos).
    sway_bar_coating:
      name: Recubrimiento de la barra estabilizadora
      description: Variación superficial o recubrimiento en la barra estabilizadora
        para mayor resistencia a la corrosión y mejor apariencia.
    sway_bar_fitment_front_rear_kit:
      name: Instalación de la barra estabilizadora (delantera/trasera/kit)
      description: Indica si la barra estabilizadora está destinada al eje delantero,
        al eje trasero o si se vende como un kit para ambos ejes.
    sweatshirt_pocket_type:
      name: Tipo de bolsillo de la sudadera
      description: Describe el estilo de los bolsillos que tiene la sudadera.
    sweet_potato_variety:
      name: Variedad de batata
      description: Identifica el cultivar específico o la variedad de mercado de la
        batata.
    sweet_spot_position:
      name: Posición del punto óptimo
      description: Identifica dónde se encuentra el punto óptimo del bate a lo largo
        del mismo, lo que afecta al estilo de juego y al estado del lanzamiento.
    sweetener_presence:
      name: Presencia de edulcorante
      description: Indica si la manteca de frutos secos contiene edulcorantes añadidos
        y en qué cantidad.
    sweetening_type:
      name: Tipo de edulcorante
      description: Describe cómo se endulza el producto o su nivel de dulzor.
    swim_armband_construction_type:
      name: Tipo de construcción del brazalete de natación
      description: Define el estilo estructural o el mecanismo de flotación de los
        brazaletes (inflables, de espuma sólida, híbridos, etc.).
    swim_belt_purpose:
      name: Propósito del cinturón de natación
      description: Clasificación funcional del cinturón de natación (por ejemplo,
        ayuda a la flotación, aquajogging, entrenamiento de resistencia, sujeción
        estática, accesorio de paracaídas de arrastre, lastre, vadeo de seguridad).
    swim_board_features:
      name: Características de la tabla de natación
      description: Destaca las características especiales o las mejoras de la tabla
        de natación que optimizan su usabilidad o seguridad.
    swim_bottom_length:
      name: Largo de la parte inferior del traje de baño
      description: Clasifica la cobertura general de las piernas de los trajes de
        baño tipo bóxer (por ejemplo, cortos o hasta la rodilla).
    swim_buoy_features:
      name: Características de la boya de natación
      description: Captura características adicionales destacables o complementos
        que mejoran la visibilidad, la seguridad o la utilidad de una boya de natación.
    swim_cap_style:
      name: Estilo del gorro de natación
      description: Define el estilo de construcción o diseño del gorro de natación
        (por ejemplo, para cabello largo, tipo cúpula/de competición, tipo burbuja/turbante).
    swim_diaper_feature:
      name: Característica del pañal de natación
      description: Indica si el traje de baño tiene un pañal a prueba de fugas integrado
        o si se requiere/no se requiere un pañal de natación por separado.
    swim_trainer_features:
      name: Características del entrenador de natación
      description: Destaca las características funcionales o de comodidad adicionales
        del entrenador de natación.
    swim_trainer_type:
      name: Tipo de dispositivo de aprendizaje de natación
      description: Define el estilo estructural o el formato del entrenador de natación
        para facilitar la selección según el diseño y el propósito del entrenamiento.
    swim_training_focus:
      name: Foco de entrenamiento de natación
      description: Identifica el objetivo principal del entrenamiento al que apunta
        la pala (por ejemplo, técnica, fuerza, aislamiento muscular).
    swim_weight_style:
      name: Estilo de peso de natación
      description: Clasifica el factor de forma del peso de natación, ayudando al
        comprador a diferenciar entre tipos de productos fundamentalmente diferentes
        sin salirse de la misma categoría.
    swimbait_buoyancy:
      name: Flotabilidad del señuelo
      description: Indica cómo se comporta el señuelo en la columna de agua (flotando,
        suspendido, hundiéndose, etc.), lo que permite a los pescadores seleccionar
        el señuelo adecuado para la profundidad deseada y el estilo de recuperación.
    swimbait_style:
      name: Estilo de señuelo
      description: Clasifica la construcción o el diseño de acción del señuelo, como
        por ejemplo, un señuelo con cola de pala o un señuelo deslizante.
    swimwear_pieces_included:
      name: Piezas de traje de baño incluidas
      description: Enumera los componentes individuales de la prenda de vestir que
        vienen en el set burkini para que el comprador sepa exactamente lo que viene
        en el paquete.
    swimwear_set_pieces_included:
      name: Piezas incluidas en el conjunto de traje de baño
      description: Enumera los componentes de la prenda que se incluyen en el set
        burkini para que el comprador sepa exactamente lo que recibirá (por ejemplo,
        top, leggings, hiyab/gorro).
    swing_attachment_connection_type:
      name: Tipo de fijación/conexión del columpio
      description: El tipo de conexión utilizada para colgar el columpio de su soporte
        (por ejemplo, cuerda, cadena, correas).
    swing_trainer_type:
      name: Tipo de dispositivo de aprendizaje de swing
      description: Clasifica el estilo o mecanismo del entrenador de swing para que
        el comprador pueda localizar rápidamente el dispositivo que se ajuste a sus
        objetivos de entrenamiento.
    swing_training_objective:
      name: Objetivo de entrenamiento de swing
      description: Clasifica el enfoque principal del entrenamiento, el mecanismo
        o el objetivo del entrenador de swing (por ejemplo, ritmo, velocidad, agarre).
    switch_electrical_positions:
      name: Posiciones eléctricas del interruptor
      description: Especifica el número y el comportamiento de las posiciones eléctricas
        del interruptor (por ejemplo, 3 posiciones, encendido momentáneo).
    swivel_type:
      name: Tipo de giro
      description: Especifica la configuración giratoria utilizada para reducir los
        enredos de la correa.
    sword_scabbard_material:
      name: Material para la vaina de la espada
      description: Especifica el material principal de la vaina o funda incluida (si
        está presente).
    synthesizer_form_factor:
      name: Factor de forma del sintetizador
      description: Describe el formato de la interfaz física/de reproducción del sintetizador.
    synthetic_feather_style:
      name: Estilo de la pluma sintética
      description: Estilo/corte de la pluma sintética utilizada para diferentes estilos
        y técnicas de manualidades.
    synthetic_formulation_type:
      name: Tipo de formulación sintética
      description: Especifica el tipo de base sintética/formulación (por ejemplo,
        PAO, éster, hidrocraqueo del grupo III).
    syrup_base_ingredient:
      name: Ingrediente base del jarabe
      description: Identifica la planta principal o la fuente de azúcar de la que
        se obtiene el jarabe o néctar (por ejemplo, arce, agave, azúcar de caña).
    syrup_variety:
      name: Variedad de jarabe
      description: Define el estilo general o la categoría del jarabe en función de
        su formulación o uso tradicional (por ejemplo, de arce, con sabor a café,
        de frutas, medicinal).
    t_shirt_fit:
      name: Ajuste de la camiseta
      description: Describe el ajuste/corte general previsto de la camiseta.
    tabla_included_components:
      name: Componentes incluidos con la tabla
      description: Indica qué artículos claves se incluyen con la tabla de publicación
        de productos (batería individual o en conjunto, fundas/estuches, martillo
        de afinación, etc.).
    tabla_set_pieces_included:
      name: Piezas incluidas en el set de tabla
      description: Indica qué componentes se incluyen con el set de tabla (por ejemplo,
        dayan, bayan, anillos, fundas, herramientas de afinación, bolsa).
    tabla_tonal_pitch_range_bayan:
      name: Tabla tonal/rango de tono (bayan)
      description: Describe la categoría típica de tono/rango tonal para los tambores
        bayan (bajos) según el tamaño y la construcción.
    table_base_material:
      name: Material de la base de la mesa
      description: Identifica el material principal de la base o pedestal de la mesa
        (distinto del de las patas o la superficie), lo que facilita el filtrado específico
        por material.
    table_base_type:
      name: Tipo de base de la mesa
      description: Identifica el diseño estructural que ayuda a la superficie de la
        mesa (por ejemplo, pedestal, caballete, base en X).
    table_coverage_position:
      name: Posición de cobertura de la mesa
      description: 'Indica para qué posición(es) de la mesa de ping-pong está diseñada
        la funda: plegada, en juego o ambas.'
    table_hockey_part_type:
      name: Tipo de pieza de hockey de mesa
      description: Identifica el tipo de componente específico dentro de los sistemas
        de hockey de mesa/aire/barra/burbuja.
    table_leg_design:
      name: Diseño de las patas de mesa
      description: Identifica el estilo estructural o la geometría de la pata, lo
        que permite al comprador adaptarla a las necesidades estéticas y de ayuda
        específicas.
    table_size:
      name: Tamaño de la mesa
      description: Tamaño total de la mesa de billar indicado comercialmente (en pies),
        lo que permite al comprador elegir rápidamente opciones comunes como mesas
        de bar de 7 pies o mesas de torneo de 9 pies.
    table_size_category:
      name: Categoría de tamaño de la mesa
      description: Clasifica la mesa de futbolín según su tamaño total para ayudar
        al comprador a encontrar la que mejor se adapte al espacio disponible sin
        necesidad de calcular medidas.
    table_tennis_certification:
      name: Certificación de tenis de mesa
      description: Enumera las normas oficiales o la aprobación del organismo regulador
        que cumple el producto (por ejemplo, ITTF, clases EN 14468-2).
    tabletop_tilt_function:
      name: Función de inclinación de la mesa
      description: Especifica si la superficie de la mesa se puede inclinar, voltear
        o girar en diferentes ángulos.
    tackle_components_included:
      name: Componentes de aparejos de pesca incluidos
      description: Enumera los componentes específicos del aparejo de pesca incluidos
        en el kit para que el comprador sepa exactamente lo que se proporciona.
    talking_drum_accessories_included:
      name: Accesorios para el tambor parlante incluidos
      description: Enumera los accesorios incluidos con el tambor parlante (en la
        caja).
    talking_drum_cord_material:
      name: Material para cuerdas del tambor parlante
      description: Material utilizado para los cordones/cuerdas de tensión que conectan
        los parches del tambor.
    talking_drum_tuning_mechanism:
      name: Mecanismo de afinación del tambor parlante
      description: Cómo se cambia el tono del tambor/se aplica la tensión durante
        la ejecución (o durante la configuración).
    tam_tam_construction_style:
      name: Estilo de construcción del tam-tam
      description: Estilo de construcción/martilleo del tam-tam.
    tam_tam_items_included:
      name: Artículos incluidos con el tam-tam
      description: Accesorios incluidos con el tam-tam (por ejemplo, mazo, soporte,
        funda).
    tamarillo_variety:
      name: Variedad de tamarillo
      description: Identifica la variedad específica o la variante de color del fruto
        del tamarillo.
    tamarind_variety:
      name: Variedad de tamarindo
      description: Especifica la variedad botánica o comercial del tamarindo, que
        puede influir en el sabor, la textura y el uso culinario.
    tambourine_frame_style:
      name: Estilo de marco de la pandereta
      description: Describe la configuración física del marco manual utilizado para
        sujetar y tocar la pandereta.
    tambourine_head_material:
      name: Material para parches de la pandereta
      description: Especifica el material del parche (membrana) de las panderetas
        con parche.
    tambourine_jingle_configuration:
      name: Configuración de la sonaja de la pandereta
      description: Cómo se organizan o construyen las melodías en la pandereta.
    tambourine_jingle_material:
      name: Material para sonajas de la pandereta
      description: Especifica el material de las sonajas de la pandereta (los discos
        de metal), lo que afecta al tono y a la durabilidad.
    tambourine_mounting_type:
      name: Tipo de montaje de la pandereta
      description: Cómo se supone que se debe sujetar o montar la pandereta mientras
        se toca.
    tambourine_tuning_mechanism:
      name: Mecanismo de afinación de la pandereta
      description: Especifica el sistema de afinación utilizado en las panderetas
        de mano afinables (si corresponde).
    tank_model_scale:
      name: Escala del modelo de tanque
      description: Especifica la relación de escala del modelo a escala del tanque
        (por ejemplo, 1:35, 1:72).
    tank_top_back_style:
      name: Estilo de camiseta sin mangas
      description: Especifica la forma o el corte de la parte trasera de la camiseta
        sin mangas, lo que influye en el soporte, la movilidad y la estética.
    tape_application_area:
      name: Área de aplicación de la cinta
      description: Especifica la parte del equipo o reproductor donde se pretende
        aplicar la cinta, lo que ayuda al comprador a elegir el estilo correcto.
    tape_finish:
      name: Acabado de la cinta
      description: Acabado superficial/visual (brillo o textura) de la cinta.
    tape_purpose:
      name: Propósito de la cinta
      description: Especifica el uso funcional principal de la cinta dentro del mantenimiento
        o la personalización de la raqueta.
    tape_type:
      name: Tipo de cinta
      description: Clasifica el estilo funcional o la construcción de la cinta de
        hockey, como tela, polietileno transparente, agarre, cohesiva elástica, espinillera
        o gamuza.
    tapenade_main_ingredients:
      name: Ingredientes principales de la tapenade
      description: Especifica el ingrediente base principal que define la tapenade
        (aceituna, tomate, berenjena, pimiento, etc.), útil para compradores con preferencias
        o restricciones basadas en los ingredientes.
    tapestry_loom_loom_format:
      name: Formato del telar de tapicería
      description: Diseño general y estilo del soporte del telar manual para tapices.
    tapestry_loom_shedding_method:
      name: Método de formación de caladas en telar de tapicería
      description: Cómo el telar crea una calada (separa los hilos de la urdimbre)
        para pasar la trama.
    tapestry_loom_tensioning_system:
      name: Sistema de tensado del telar de tapices
      description: Método utilizado para tensar y asegurar la urdimbre en el telar
        de tapices.
    tar_head_material:
      name: Material del cabezal del tar
      description: Identifica el material del parche (membrana) del tambor de alquitrán,
        que influye notablemente en la sensación, la durabilidad y el tono.
    tar_playing_style:
      name: Estilo de tocar el tar
      description: Especifica la posición/técnica principal de tocar para la que está
        diseñado el tar.
    tar_tuning_system:
      name: Sistema de ajuste del tar
      description: Especifica cómo se ajusta el tar (cómo se regula la tensión del
        cabezal).
    target_components:
      name: Componentes del objetivo
      description: Especifica qué componentes del sistema de admisión de combustible/aire
        está diseñado para limpiar el producto.
    target_relative_humidity_rh:
      name: Humedad relativa (HR) del objetivo
      description: La humedad relativa objetivo que el producto está diseñado para
        mantener dentro del entorno del instrumento/caja.
    target_resetting_mechanism:
      name: Mecanismo de restablecimiento del objetivo
      description: Describe cómo, o si, un objetivo regresa a su posición original
        después de ser alcanzado.
    target_trainer_type:
      name: Tipo de dispositivo de entrenamiento de puntería
      description: Clasifica el estilo o formato general del entrenador de tiro al
        blanco para ráquetbol o squash.
    targeted_contaminants:
      name: Contaminantes específicos
      description: Tipos de microbios o parásitos que el producto está certificado
        para eliminar.
    targeted_muscle_group:
      name: Grupo muscular específico
      description: Grupo muscular primario que el accesorio está destinado a entrenar
        o ayudar.
    taro_variety:
      name: Variedad de taro
      description: Especifica el cultivar, especie o nombre comercial de la raíz de
        taro que se ofrece (por ejemplo, morado, Eddoe, Dasheen).
    tassel_trim_header_type:
      name: Tipo de encabezado con adorno de borla
      description: Especifica la construcción de la parte superior del cabezal/montaje
        que se utiliza para fijar el adorno de borlas a una superficie (por ejemplo,
        cinta, trenza, cordón).
    tassel_trim_use_case:
      name: Caso de uso del adorno de borla
      description: Área principal de aplicación prevista para el adorno de borla.
    taste_profile:
      name: Perfil de sabor
      description: Describe las características de sabor predominantes de la variedad
        de manzana.
    tea_variety:
      name: Variedad de té
      description: Clasifica el tipo o estilo específico de té o infusión (por ejemplo,
        negro, verde, matcha, rooibos) para que el comprador pueda filtrar por sus
        variedades preferidas.
    teasing_tool_style:
      name: Estilo de herramienta para dar forma
      description: El estilo físico o el formato de la herramienta utilizada para
        separar y mezclar las fibras (por ejemplo, cepillo, rastrillo, peine).
    tee_base_style:
      name: Estilo base de la camiseta
      description: Identifica el diseño estructural de la base de un soporte para
        patear en el rugby que ayuda a que la pelota salga bien.
    temper_hardness:
      name: Temple / dureza
      description: Indica cuán blando o duro es el alambre (qué tan bien mantiene
        la forma).
    temperature_control_type:
      name: Tipo de control de temperatura
      description: Cómo se controla/ajusta la temperatura de la herramienta.
    tenkara_action_ratio:
      name: Relación de acción Tenkara
      description: Indica la relación de flexión tradicional de Tenkara que describe
        dónde se dobla la caña bajo carga (por ejemplo, 6:4).
    tennis_ball_court_surface:
      name: Superficie de la cancha de tenis
      description: Especifica la superficie de la cancha para la que está diseñada
        la pelota, a fin de garantizar un rendimiento y una durabilidad óptimos.
    tennis_ball_pressure_type:
      name: Tipo de presión de la pelota de tenis
      description: Identifica la presión interna o la construcción de la pelota (presurizada,
        sin presión, de baja compresión, de espuma) que afecta al rebote y la durabilidad.
    tennis_racket_grip_size:
      name: Tamaño de la empuñadura de la raqueta de tenis
      description: Especifica la circunferencia estandarizada del mango de la raqueta
        (L0–L5 o su equivalente en pulgadas) para garantizar un ajuste y una comodidad
        adecuados en la mano.
    tenor_flutophone_fingering_system:
      name: Sistema de digitación para flautín tenor
      description: Especifica el sistema de digitación utilizado por la flauta tenor
        (convención curricular/de notación).
    tenor_recorder_joint_type:
      name: Tipo de junta de flauta dulce tenor
      description: Especifica el tipo de unión/conexión entre las secciones de la
        flauta dulce tenor.
    tenor_saxophone_key_system:
      name: Sistema de llaves del saxofón tenor
      description: Especifica el sistema/estándar de llaves utilizado (a menudo denominado
        estilo francés/Boehm para saxofones).
    tenor_saxophone_pad_material:
      name: Material para almohadillas de saxofón tenor
      description: Especifica el material principal utilizado para las almohadillas
        del instrumento.
    tenor_trombone_slide_type:
      name: Trombón tenor de tipo deslizante
      description: Tipo de vara utilizada en el trombón tenor (por ejemplo, estándar/recta
        frente a activador/flujo axial).
    tenor_trombone_valve_configuration:
      name: Configuración de la válvula del trombón tenor
      description: Indica si el trombón tenor tiene un sistema de válvulas/rotor y
        qué configuración utiliza.
    tension_control_type:
      name: Tipo de control de tensión
      description: Indica cómo (o si) la lanzadera proporciona una resistencia/tensión
        ajustable en la bobina/pistola durante la alimentación.
    tension_mechanism:
      name: Mecanismo de tensión
      description: El tipo de tensión que se utiliza para controlar la alimentación
        de la trama desde la bobina durante el tejido.
    tension_pitch_modulation_system:
      name: Sistema de modulación de tensión/tono
      description: Cómo cambia el tono/tensión del tambor parlante durante su reproducción
        (por ejemplo, al apretar las cuerdas de tensión).
    tension_system:
      name: Sistema de tensado
      description: El sistema de recogida/tensión de la rueca para el que está diseñado
        el kit de volante.
    tent_fabric_material:
      name: Material de la tela de la tienda
      description: Identifica el tejido principal utilizado en el doble techo o en
        el cuerpo de la tienda de campaña, lo que afecta al peso, la transpirabilidad
        y la resistencia a la intemperie.
    tent_season_rating:
      name: Calificación de la temporada de tiendas de campaña
      description: Clasifica la tienda de campaña según el número de estaciones o
        condiciones climáticas para las que está diseñada (por ejemplo, de 3 estaciones,
        de 4 estaciones, de expedición).
    tent_setup_type:
      name: Tipo de montaje de tienda
      description: Indica el estilo de montaje estructural de la tienda, como autoportante,
        semiautoportante, no autoportante, inflable/con estructura de aire o puestos
        temporales.
    tent_style:
      name: Estilo de la tienda de campaña
      description: Describe el diseño estructural de la tienda de campaña (por ejemplo,
        cúpula, túnel, forma de A).
    test_result_output_method:
      name: Método de presentación de los resultados de las pruebas
      description: Especifica cómo el comprobador de baterías del vehículo presenta
        o entrega los resultados de la prueba al usuario (por ejemplo, indicador,
        pantalla, impresión, app o informe de software).
    tether_strap_system:
      name: Sistema de sujeción/correa
      description: Tipo de sistema de sujeción o correa utilizado para conectar el
        collarín cervical al casco/arnés (si corresponde).
    text_color:
      name: Color del texto
      description: Color del texto impreso o bordado en la etiqueta, distinto del
        color de fondo de la etiqueta.
    textile_craft_machine_operation_type:
      name: Tipo de funcionamiento de la máquina de artesanía textil
      description: Cómo se opera la máquina (manualmente, con los pies o motorizada/eléctrica).
    textile_finish_treatment:
      name: Acabado textil / tratamiento
      description: Especifica los tratamientos superficiales notables aplicados al
        material textil.
    texture_inclusions:
      name: Inclusiones de la textura
      description: Especifica componentes texturales añadidos, como pulpa de aloe,
        semillas de albahaca, nata de coco, perlas de tapioca explosivas o trozos
        de fruta.
    therapeutic_technology:
      name: Tecnología terapéutica
      description: Especifica cualquier función terapéutica integrada, como gel refrigerante,
        tiras magnéticas o cerámica infrarroja.
    thermal_set_components:
      name: Componentes del conjunto térmico
      description: Identifica si el producto incluye solo la parte inferior, solo
        la superior o ambas piezas como un conjunto.
    thermal_weight:
      name: Peso térmico
      description: Indica la categoría de calidez del tejido del pasamontañas.
    thermostat_type:
      name: Tipo de termostato
      description: El diseño funcional o el estilo de control del termostato del sistema
        de refrigeración de un vehículo de motor.
    thimble_guide_size:
      name: Tamaño de la guía del dedal
      description: Indicación del tamaño de la guía del dedal (talla/tamaño de cobertura),
        que normalmente se vende como talla pequeña/mediana/grande en lugar de con
        medidas exactas.
    thread_connection_size:
      name: Tamaño de la conexión de hilo
      description: Define la especificación del hilo que conecta ejes, puntas y adaptadores
        (por ejemplo, 6 mm, 5/16"-24).
    thread_construction:
      name: Construcción del hilo
      description: Cómo está construido o tratado el hilo (por ejemplo, hilo de bordar
        trenzado o hilo unido).
    thread_cord_type_beading_pattern:
      name: Tipo de hilo/cordón (patrón de abalorios)
      description: Tipo de hilo o cordón recomendado para completar el patrón.
    thread_cutter_form_factor:
      name: Factor de forma del cortador de hilo
      description: Identifica el estilo físico del cortador de hilo, como por ejemplo,
        tijeras de mano, de estilo colgante o de estilo anillo.
    thread_cutter_mechanism:
      name: Mecanismo del cortador de hilo
      description: Describe la acción o el mecanismo de corte utilizado por el cortador
        de hilo.
    thread_cutter_safety_features:
      name: Características de seguridad del cortador de hilo
      description: Indica las funciones de seguridad incorporadas que reducen el riesgo
        de cortes accidentales o protegen las hojas durante el almacenamiento.
    thread_cutter_usage_application:
      name: Uso/aplicación del cortador de hilo
      description: Indica el uso artesanal principal previsto para el cortador de
        hilo.
    thread_finish_treatment:
      name: Acabado o tratamiento de la rosca
      description: Acabado superficial o variación aplicada al hilo que afecta la
        gestión y el rendimiento (por ejemplo, encerado, aglomerado, mercerizado).
    thread_material:
      name: Material del hilo
      description: Composición principal de la fibra/material del hilo (no de la tela).
    thread_material_fiber:
      name: Material del hilo (fibra)
      description: Especifica la fibra/material principal del hilo (no de la tela).
    thread_package_format:
      name: Formato de paquete del hilo
      description: Factor de forma del embalaje del hilo de coser (por ejemplo, carrete,
        cono, bobina).
    thread_rack_compatible_spool_type:
      name: Tipo de soporte compatible con el portabobinas
      description: Tipo de paquete de hilo para el que está diseñado el soporte (bobinas
        o conos, etc.).
    thread_standard_size:
      name: Tamaño estándar de rosca
      description: Identifica el tamaño/peso del hilo estándar utilizado en la etiqueta
        del producto (por ejemplo, wt, Tex, denier).
    thread_type:
      name: Tipo de hilo
      description: Especifica la construcción/tipo de hilo de punto de cruz.
    thread_weight_system:
      name: Sistema de peso del hilo
      description: El estándar utilizado para expresar el grosor/peso del hilo.
    thread_yarn_guide_mounting_attachment_style:
      name: Estilo de montaje/fijación de la guía de hilo y lana
      description: Describe cómo se lleva o se monta la guía durante su uso.
    thread_yarn_guide_tension_control:
      name: Control de tensión de la guía de hilo y lana
      description: Indica si la guía proporciona tensión/arrastre ajustable en el
        hilo o la lana, y cómo lo hace.
    thread_yarn_organizer_features:
      name: Características del organizador de hilo y lana
      description: Destaca las características funcionales de organización y portabilidad
        específicas para el almacenamiento de hilo/lana.
    threader_intended_use:
      name: Uso previsto del enhebrador
      description: Indica el contexto artesanal principal para el que está diseñado
        el enhebrador de agujas manual.
    threading_system:
      name: Sistema de roscar
      description: Indica el método y los accesorios utilizados para enhebrar la remalladora
        (por ejemplo, manual, por color, guiado, neumático).
    threading_type:
      name: Tipo de roscado
      description: Indica si la pieza utiliza hilos internos, hilos externos, no tiene
        hilos o no aplica.
    throttle_type_scooter_conversion:
      name: Tipo de ralentizado (conversión scooter)
      description: Especifica el factor de forma/interfaz de ralentizado incluido
        o requerido por el kit de conversión.
    throw_rope_end_attachment:
      name: Accesorio de extremo de la cuerda de lanzamiento
      description: El hardware de resección/sujeción o lazo que se encuentran en el
        extremo de trabajo de la cuerda de lanzamiento.
    throw_rope_storage_packaging_type:
      name: Tipo de almacenamiento/embalaje de la cuerda de lanzamiento
      description: Cómo se guarda o despliega la cuerda de lanzamiento (por ejemplo,
        bolsa o carrete).
    throw_rope_visibility_features:
      name: Características de visibilidad de la cuerda de lanzamiento
      description: Elementos de visibilidad e identificación diseñados para que la
        cuerda sea más fácil de ver en el agua o con poca luz.
    thrower_operation_type:
      name: Tipo de funcionamiento del lanzador
      description: Clasifica el estilo mecánico/de funcionamiento del lanzador para
        filtrar rápidamente entre mecanismos manuales y automáticos.
    thumb_design:
      name: Diseño del pulgar
      description: Describe cómo se integra el pulgar en el guante, lo que afecta
        a la seguridad y al agarre.
    tiara_design:
      name: Diseño de la tiara
      description: Especifica el estilo estructural general o la silueta de la tiara.
    tie_down_points_straps_included:
      name: Puntos de sujeción/correas incluidos
      description: Indica si el estante incluye puntos de sujeción integrados y/o
        correas para asegurar la motocicleta o el scooter.
    tiling_format:
      name: Formato del mosaico
      description: Especifica el estilo de diseño del PDF para el ensamblaje de las
        páginas impresas.
    time_current_characteristic:
      name: Característica tiempo-corriente
      description: Indica el comportamiento del fusible en función del tiempo y la
        corriente (por ejemplo, de acción rápida o a retardo), lo que afecta a su
        idoneidad para circuitos con corriente de irrupción.
    timer_count_mode:
      name: Modo de conteo del temporizador
      description: Especifica el modo de conteo del temporizador, como por ejemplo,
        conteo regresivo, conteo ascendente (cronómetro), ambos o intervalo/repetición.
    timer_display_type:
      name: Tipo de visualización del temporizador
      description: Indica cómo el cronómetro del juego muestra el tiempo restante
        (por ejemplo, pantalla digital, dial analógico, reloj de arena o sin pantalla
        visual).
    timer_operating_modes:
      name: Modos de funcionamiento del temporizador
      description: Comportamientos del temporizador compatibles para activar efectos.
    timing_belt_construction_material_rubber_compound:
      name: Material de fabricación de la correa de distribución (compuesto de caucho)
      description: Compuesto de caucho principal para la correa (por ejemplo, HNBR),
        que influye en la resistencia al calor y al aceite, así como en la durabilidad.
    timing_belt_profile:
      name: Perfil de la correa de distribución
      description: Perfil/forma estándar de los dientes de la correa de distribución
        (por ejemplo, trapezoidal o curvilínea).
    timing_belt_reinforcement_cord_material:
      name: Material del cordón de refuerzo de la correa de distribución
      description: Especifica el material del cordón de refuerzo interno dentro de
        la correa de distribución (por ejemplo, fibra de vidrio, aramida), que afecta
        a la resistencia y la elasticidad.
    timing_component_material:
      name: Material de los componentes de sincronización
      description: Material principal del componente de sincronización (compuesto
        de la correa, metal de la cadena/engranaje, material de la cubierta).
    tin_whistle_body_material:
      name: Material del cuerpo de la flauta irlandesa
      description: Captura los materiales comunes del cuerpo de la flauta irlandesa
        de forma más específica que la lista general de materiales del instrumento
        cuando sea necesario.
    tin_whistle_bore_type:
      name: Tipo de orificio de la flauta irlandesa
      description: Especifica el diseño del orificio de la flauta irlandesa.
    tin_whistle_included_accessories:
      name: Accesorios incluidos con la flauta irlandesa
      description: Accesorios incluidos con la flauta irlandesa (por ejemplo, caja,
        baqueta de limpieza).
    tip_finish_coating:
      name: Acabado o recubrimiento de la punta
      description: Especifica la variación de la superficie en el extremo de trabajo
        (por ejemplo, cromado, con recubrimiento en polvo) que afecta a la resistencia
        a la corrosión y a los daños en el borde.
    tip_shape:
      name: Forma de la punta
      description: Describe la forma o el filo de la punta de la púa de guitarra,
        lo que afecta a la articulación y a la sensación al tocar.
    tippet_rating:
      name: Calificación del tippet
      description: Resistencia máxima recomendada del tippet expresada en designaciones
        X para pesca con mosca (por ejemplo, 4X).
    tire_changer_operation_type:
      name: Tipo de funcionamiento del cambiador de neumáticos
      description: Especifica cómo se acciona/opera una máquina de cambio de neumáticos
        (por ejemplo, manual, neumática, hidráulica). Distinto del atributo general
        "Fuente de alimentación"; se utiliza para describir el método de accionamiento
        de la máquina.
    tire_changer_type:
      name: Tipo de cambiador de neumáticos
      description: El estilo de funcionamiento general, el diseño o el nivel de automatización
        de una máquina cambiadora de neumáticos.
    tire_compound_type:
      name: Tipo de compuesto del neumático
      description: Especifica la clasificación del compuesto de caucho utilizado en
        los neumáticos (por ejemplo, blando, lluvia, liso), que influye en la tracción
        y la durabilidad en diferentes condiciones.
    tire_load_range:
      name: Rango de carga de neumáticos
      description: Indica la designación del rango de carga/clasificación de capas
        del neumático (comúnmente para neumáticos LT) que refleja la capacidad de
        carga.
    tire_position:
      name: Posición del neumático
      description: Posición de montaje recomendada en el vehículo.
    tire_repair_kit_components:
      name: Componentes del kits de reparación de neumáticos
      description: Especifica los artículos incluidos en el kit, lo que permite al
        cliente comparar la integridad del paquete.
    tire_sidewall_type:
      name: Tipo de flanco del neumático
      description: Especifica el estilo o las características de construcción del
        flanco.
    tire_speed_rating:
      name: Clasificación de velocidad de los neumáticos
      description: Letra de clasificación de velocidad del neumático (por ejemplo,
        H, V, W) que indica la capacidad de velocidad máxima sostenida.
    tire_spoon_type:
      name: Tipo de cuchara para neumático
      description: Clasifica la cuchara para neumáticos según la forma de sus extremos
        y su uso previsto.
    tire_system_compatibility:
      name: Compatibilidad del sistema de neumáticos
      description: Indica si el sellador está diseñado para configuraciones sin cámara,
        neumáticos con cámara o ambos.
    tire_temperature_rating_utqg:
      name: Índice de temperatura de los neumáticos (UTQG)
      description: Grado de resistencia a la temperatura UTQG para neumáticos de automóviles
        (por ejemplo, A, B, C).
    tire_traction_rating_utqg:
      name: Índice de tracción de los neumáticos (UTQG)
      description: Clasificación de tracción UTQG para el rendimiento de frenado sobre
        superficies mojadas.
    tire_tread_style:
      name: Estilo de banda de rodadura del neumático
      description: Describe el dibujo general del patrón de la banda de rodadura del
        neumático tubular, reflejando el terreno para el que está diseñado y sus características
        de tracción.
    tire_tube_type:
      name: Tipo de cámara del neumático
      description: Si el neumático está diseñado para uso sin cámara o con cámara.
    title_status:
      name: Estado del título
      description: Estado legal/de matriculación del vehículo.
    tobacco_application:
      name: Uso del tabaco
      description: Indica el método de consumo o el aparato para fumar para el que
        está diseñado el tabaco suelto.
    tobacco_cut_type:
      name: Tipo de corte de tabaco
      description: Especifica el corte físico o el estilo de preparación del tabaco
        suelto, lo que afecta a la velocidad de combustión, el método de empaquetado
        y la experiencia general al fumar.
    tobacco_strength:
      name: Intensidad del tabaco
      description: Indica la sensación corporal o el golpe de nicotina que produce
        el tabaco al consumirlo, lo que ayuda al comprador a seleccionar una intensidad
        que se ajuste a sus preferencias.
    toe_construction:
      name: Construcción de la puntera
      description: Especifica la configuración de la zona de los dedos de las botas
        de neopreno, lo que afecta al balance, la sensación sobre la tabla y la calidez.
    toe_coverage:
      name: Cobertura de la puntera
      description: Indica el tipo de cobertura que ofrece el calcetín para los dedos
        del pie.
    toe_pick_style:
      name: Estilo de la puntera
      description: Describe el diseño de la puntera de los patines de patinaje artístico.
    toe_protection_type:
      name: Tipo de protección de la puntera
      description: Indica si la zona de los dedos está reforzada por motivos de seguridad
        y de qué manera (por ejemplo, puntera de acero, puntera blanda).
    toe_reinforcement_type:
      name: Tipo de refuerzo de la puntera
      description: Comparte información sobre la construcción de la zona de los dedos,
        que influye en la durabilidad y la compatibilidad con el calzado.
    toe_stop_stem_thread_size:
      name: Tamaño de la rosca del vástago del toe stop
      description: Especifica el tamaño de la rosca de los vástagos del toe stop para
        garantizar la compatibilidad de la placa.
    tofu_preparation_style:
      name: Estilo de preparación de tofu
      description: Categoriza el estilo tradicional o subtipo de tofu, más allá de
        la firmeza (por ejemplo, sedoso, en bloque, inflado, con piel, en nudos, fermentado).
    tom_mount_adjustment_features:
      name: Características de ajuste del soporte del tom
      description: Especifica qué ajustes permite el soporte del tom para posicionar
        el tambor (por ejemplo, inclinación, rotación, altura).
    tom_mount_components_included:
      name: Componentes incluidos del soporte para tom
      description: Especifica qué piezas se incluyen con el soporte del tom (receptor,
        brazo, rótula, abrazaderas, bloqueos de memoria, etc.).
    tom_mount_mounting_position:
      name: Posición de montaje del soporte del tom
      description: Especifica dónde se debe fijar el soporte del tom (por ejemplo,
        bombo, soporte de platillos, estante).
    tonneau_cover_mounting_style:
      name: Estilo de montaje de la cubierta tonneau
      description: Indica cómo se instala/fija la cubierta de la caja de la camioneta
        a los rieles de la caja.
    tool_case_form_factor:
      name: Factor de forma de la caja de herramientas
      description: Identifica el estilo físico de la caja de herramientas, lo que
        influye en la portabilidad y el almacenamiento (por ejemplo, maletín, estuche
        rígido).
    tool_functions_included:
      name: Funciones de la herramienta incluidas
      description: Enumera las funciones específicas de reparación o mantenimiento
        que puede realizar una multiherramienta o un juego de herramientas.
    top_bunk_access_method:
      name: Método de acceso a la litera superior
      description: Indica cómo los ocupantes acceden a la litera superior de la cama,
        lo que facilita la consideración de la seguridad y el aprovechamiento del
        espacio.
    top_fit:
      name: Ajuste del top
      description: Especifica la silueta o el ajuste general de la prenda sobre el
        cuerpo (por ejemplo, ajustada o extragrande).
    top_hat_style:
      name: Estilo del sombrero de copa
      description: Identifica la variación de estilo específica de un sombrero de
        copa.
    top_soundboard_material:
      name: Material de la tapa (caja de resonancia)
      description: Especifica el material de la tapa/caja de resonancia de la guitarra
        (la placa principal que produce el sonido).
    topping_form:
      name: Forma de cobertura
      description: Define la forma física o consistencia de la cobertura del postre
        para ayudar al comprador a encontrar rápidamente el uso deseado.
    topping_type:
      name: Tipo de cobertura
      description: Indica el recubrimiento o cobertura exterior principal que se aplica
        a la donut.
    tow_hook_type:
      name: Tipo de gancho de remolque
      description: Indica si la tabla de kneeboard incluye un gancho de remolque integrado
        y especifica el tipo de mecanismo que utiliza.
    tow_point_configuration:
      name: Configuración del punto de remolque
      description: Especifica la configuración del punto de remolque (simple, doble,
        múltiple) que ofrece el tubo remolcable para diferentes posiciones de uso.
    tow_strap_protective_features:
      name: Características de protección de la correa de remolque
      description: La correa de remolque incorpora características de seguridad y
        durabilidad destacables.
    tow_strap_type:
      name: Tipo de correa de remolque
      description: Indica la construcción funcional de la correa de remolque, como
        por ejemplo, correa de remolque estática o correa de recuperación cinética.
    towable_tube_style:
      name: Estilo de tubo remolcable
      description: Identifica el diseño general o el factor de forma del tubo remolcable,
        que determina la posición del usuario y la experiencia de uso.
    towed_water_sport_discipline:
      name: Disciplina de deportes acuáticos remolcados
      description: Especifica la principal actividad acuática remolcada para la que
        está diseñado el guante.
    towel_features:
      name: Características de la toalla
      description: Enumera las características especiales o adicionales incluidos
        con la toalla.
    towel_style:
      name: Estilo de toalla
      description: Clasifica el diseño funcional o el formato de la toalla de golf.
    toy_airplane_control_type:
      name: Tipo de control de avión de juguete
      description: Especifica cómo el usuario controla el avión de juguete.
    toy_airplane_features:
      name: Características del avión de juguete
      description: Destaca las características de juego más destacadas que presenta
        el avión de juguete.
    toy_airplane_flight_capability:
      name: Capacidad de vuelo del avión de juguete
      description: Indica si el avión de juguete está diseñado para volar/planear
        de verdad o si es principalmente para jugar en tierra o para exhibirlo.
    toy_audio_features:
      name: Características de audio del juguete
      description: Enumera las capacidades de audio y los efectos de sonido integrados
        en el juguete.
    toy_boat_play_features:
      name: Características de juego del barco de juguete
      description: Destaca las características interactivas más destacadas de los
        barcos de juguete para su descubrimiento y filtrado.
    toy_boat_recommended_play_environment:
      name: Entorno de juego recomendado para barcos de juguete
      description: Especifica la configuración de juego prevista para el barco de
        juguete para ayudar a los compradores a comprender las expectativas y garantizar
        su seguridad (por ejemplo, en la bañera o en aguas abiertas).
    toy_bowling_equipment_included:
      name: Equipo de bowling de juguete incluido
      description: Especifica qué componentes de bowling se incluyen en el set de
        bowling de juguete (por ejemplo, estuche, bola, pista/alfombrilla, bolsa de
        transporte).
    toy_car_features:
      name: Características del auto de juguete
      description: Destaca las características de juego integradas en el auto de juguete
        (independientemente de la propulsión), como luces, sonidos o partes que se
        abren.
    toy_drawing_tablet_accessories_included:
      name: Accesorios incluidos de la tableta de dibujo de juguete
      description: Accesorios adicionales incluidos más allá de la propia tableta
        (por ejemplo, lápiz óptico adicional, sellos).
    toy_drawing_tablet_erase_method:
      name: Método de borrado de la tableta de dibujo de juguete
      description: Cómo se limpia/borra la superficie de dibujo.
    toy_drawing_tablet_screen_type:
      name: Tipo de pantalla de la tableta de dibujo de juguete
      description: El tipo de superficie de dibujo/visualización utilizada (por ejemplo,
        tableta de escritura LCD o magnética).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Instrumento de escritura/dibujo de la tableta de dibujo de juguete
      description: Herramienta principal utilizada para dibujar en la tableta (tipo
        lápiz óptico).
    toy_figure_sound_feature:
      name: Función de sonido de la figura de juguete
      description: Indica si la figura del animal produce sonidos y de qué tipo (por
        ejemplo, rugido, sonido realista de animal).
    toy_game_features:
      name: Características juguete o juego
      description: Destaca las características de juego o construcción más destacadas
        relevantes para los juguetes de playa y arena.
    toy_gift_basket_items_included:
      name: Artículos incluidos en la canasta de regalo de juguetes
      description: 'Enumera los principales tipos de juguetes incluidos en la cesta
        de regalo (por ejemplo: peluche, set de construcción, rompecabezas).'
    toy_glider_launch_method:
      name: Método de lanzamiento del planeador de juguete
      description: Especifica cómo se lanza el planeador de juguete, lo que afecta
        al estilo de juego y a las expectativas del comprador.
    toy_helicopter_control_type:
      name: Tipo de control de helicóptero de juguete
      description: Cómo se controla/opera el helicóptero de juguete (independientemente
        de la propulsión), por ejemplo, mediante un control remoto de mano, app o
        sin control (vuelo libre).
    toy_helicopter_features:
      name: Características del helicóptero de juguete
      description: Características funcionales clave de un helicóptero de juguete
        (especialmente los modelos de radiocontrol) que influyen en su usabilidad
        y valor lúdico.
    toy_jacks_set_items_included:
      name: Artículos incluidos en el set matatenas
      description: Especifica qué artículos básicos se incluyen en el set de matatenas
        (por ejemplo, canicas, pelota, bolsa).
    toy_keyboard_learning_mode:
      name: Modo de aprendizaje del teclado de juguete
      description: Indica el enfoque educativo/de aprendizaje que admite el teclado
        de juguete (por ejemplo, teclas luminosas, canciones para seguir paso a paso,
        lecciones guiadas, aprendizaje asistido por app).
    toy_keyboard_sound_theme:
      name: Tema de sonido del teclado de juguete
      description: Tipos de voces de instrumentos/temas de sonido integrados que se
        ofrecen (más allá del piano simple).
    toy_kitchen_appliances_included:
      name: Electrodomésticos de juguete incluidos
      description: Especifica los electrodomésticos representados en el set de juego
        cuando el producto es un electrodoméstico o un set centrado en electrodomésticos.
    toy_kitchen_assembly_requirement:
      name: Requisitos de montaje de la cocina de juguete
      description: Indica si se requiere ensamblaje y la complejidad aproximada del
        mismo.
    toy_kitchen_interactive_features:
      name: Características interactivas de la cocina de juguete
      description: Destaca los elementos interactivos que se encuentran habitualmente
        en las cocinitas de juguete y sus accesorios.
    toy_motorcycle_feature_set:
      name: Características de la motocicleta de juguete
      description: Características clave de la motocicleta de juguete (seleccionar
        todas las que correspondan).
    toy_motorcycle_scale:
      name: Escala de la motocicleta de juguete
      description: Relación de escala para motocicletas de juguete/coleccionables
        (por ejemplo, 1:12).
    toy_parachute_launch_method:
      name: Método de lanzamiento del paracaídas de juguete
      description: Cómo se supone que se lanza el juguete para el vuelo.
    toy_piano_and_keyboard_accessories_included:
      name: Piano de juguete y accesorios para teclado incluidos
      description: Accesorios incluidos con el piano de juguete o el teclado de juguete.
    toy_playset_assembly_required:
      name: Montaje requerido del set de juguetes
      description: Indica si se requiere montaje por parte de un adulto antes de jugar
        (más allá del simple ensamblaje a presión).
    toy_playset_items_included:
      name: Artículos incluidos en el set de juguetes
      description: Enumera los principales componentes incluidos en el set de juego
        (lo que viene en la caja).
    toy_safety_certification:
      name: Certificación de seguridad de juguetes
      description: Normas/marcas de seguridad y cumplimiento aplicables a los juguetes
        en el mercado del comprador (por ejemplo, EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Características de la nave espacial de juguete
      description: Indica las características interactivas/de juego comunes incorporadas
        en la nave espacial de juguete.
    toy_spaceship_size_class:
      name: Clase de tamaño de nave espacial de juguete
      description: Indica una clase de tamaño aproximada para la nave espacial de
        juguete para facilitar el filtrado rápido, separada de las dimensiones exactas
        (largo/ancho/alto) y que no es una relación de escala numérica del modelo
        (por ejemplo, 1:72).
    toy_tableware_pieces_included:
      name: Piezas de vajilla de juguete incluidas
      description: Especifica qué artículos de vajilla de juguete se incluyen (platos,
        tazas, cubiertos, piezas para servir).
    toy_tool_electronic_features:
      name: Características electrónicas de la herramienta de juguete
      description: Describe funciones interactivas/electrónicas del juguete (luces,
        sonidos, acción giratoria, etc.).
    toy_tool_set_components_included:
      name: Componentes incluidos en el set de herramientas de juguete
      description: Enumera los artículos específicos de herramientas para juegos de
        simulación incluidos en el paquete (especialmente en el caso de los sets de
        herramientas).
    toy_train_scale:
      name: Escala del tren de juguete
      description: Especifica el estándar de escala de tren de juguete/modelo (o el
        tamaño del sistema de vías) para garantizar la compatibilidad con los trenes
        y vías existentes.
    toy_train_track_layout_type:
      name: Tipo de diseño de vías para trenes de juguete
      description: Describe el diseño o la forma de las vías incluidas en un set de
        tren o en un paquete de ampliación de vías.
    toy_weapon_gadget_features:
      name: Características de las armas y dispositivos de juguete
      description: Destaca las características interactivas y funcionales comunes
        propias de las armas y los dispositivos de espionaje de juguete.
    tpms_sensor_frequency_band:
      name: Banda de frecuencia del sensor TPMS
      description: Banda de radiofrecuencia compatible con los accesorios relacionados
        con TPMS (cuando corresponda).
    track_and_field_discipline:
      name: Disciplina de atletismo
      description: Identifica los eventos o disciplinas atléticas específicas para
        las que está destinado el producto (por ejemplo, lanzamiento de peso, salto
        con pértiga, carreras de velocidad).
    track_event_specialization:
      name: Especialización de evento atlético
      description: Indica el tipo de evento para los que están optimizadas las zapatillas
        de picos.
    track_field_event_suitability:
      name: Compatibilidad del evento de atletismo
      description: Identifica los eventos de atletismo específicos para los que está
        destinada la herramienta de entrenamiento.
    track_set_special_features:
      name: Características especiales del set de vías
      description: Destaca las características de juego más destacadas que incluye
        el set de vías, además de las vías y los vagones básicos.
    track_surface_compatibility:
      name: Compatibilidad con superficie de pista
      description: Indica la superficie de carrera para la que está diseñado el clavo
        o calzado.
    tracking_aid_type:
      name: Tipo de asistencia de seguimiento
      description: Indica si el kayak incluye dispositivos que mejoran el seguimiento
        en línea recta.
    traction_pattern_type:
      name: Tipo de patrón de tracción
      description: Describe la ranura superficial principal o el patrón de la banda
        de rodadura que proporciona agarre a la pastilla.
    trading_card_league:
      name: Liga de tarjetas coleccionables
      description: Identifica la liga deportiva asociada con la tarjeta o sujeto (cuando
        corresponda).
    trailer_construction:
      name: Construcción de remolques
      description: Identifica el material de construcción principal del remolque para
        el marco/carrocería (por ejemplo, aluminio, acero o construcción mixta).
    trailer_coupler_size:
      name: Tamaño de acoplador del remolque
      description: Especifica el tamaño de la bola del acoplador del remolque del
        balón necesario para remolcar.
    trailer_hitch_mounting_location_method:
      name: Ubicación/método de montaje del enganche del remolque
      description: Especifica dónde y cómo se monta el enganche del remolque en el
        vehículo (por ejemplo, receptor trasero, receptor delantero, montado en el
        marco, montado en el parachoques, montado en la caja).
    trailer_light_function:
      name: Funciones de las luces del remolque
      description: Funciones principales/posición de la luz del remolque.
    trailer_suspension_type:
      name: Tipo de suspensión del remolque
      description: Especifica el tipo de sistema de suspensión utilizado en el remolque
        para bicicletas, como muelles helicoidales o ballestas, para mejorar la comodidad
        de conducción y la protección de la carga.
    trailer_wiring_circuit:
      name: Circuito de cableado del remolque
      description: Enumera los circuitos/señales de iluminación, freno y auxiliares
        que lleva el cableado del remolque (es decir, qué cables de alimentación/tierra
        y de señal están presentes).
    trailer_wiring_connector_type:
      name: Tipo de conector de cableado del remolque
      description: Especifica el estándar de conector del lado del remolque/vehículo
        utilizado para los arneses y adaptadores de cableado del remolque.
    train_whistle_intended_use:
      name: Uso previsto del silbato de tren
      description: Contexto de uso principal previsto para el silbato.
    train_whistle_sound_character:
      name: Sonido del silbato de tren
      description: Describe el carácter tonal percibido del sonido del silbato (timbre).
    trainer_mounting_type:
      name: Tipo de montaje del dispositivo de entrenamiento
      description: Describe cómo se conecta la bicicleta al rodillo de entrenamiento
        (por ejemplo, mediante el sistema de montaje en la rueda o de transmisión
        directa).
    training_dummy_shape:
      name: Formas de maniquíes de entrenamiento
      description: Especifica el diseño general o la silueta del maniquí, lo que afecta
        a la forma en que el perro lo sujeta y al realismo del entrenamiento.
    training_focus:
      name: Enfoque del entrenamiento
      description: Describe la área de habilidad principal a la que se dirige la asistencia
        (por ejemplo, reflejos, juego de pies, coordinación mano-ojo).
    training_focus_area:
      name: Área de enfoque del entrenamiento
      description: Especifica la habilidad principal de lacrosse que la asistencia
        está diseñada para desarrollar.
    training_objective:
      name: Objetivo del entrenamiento
      description: Especifica la habilidad o técnica principal que el producto está
        diseñado para mejorar.
    training_surface_suitability:
      name: Compatibilidad de la superficie de entrenamiento
      description: Especifica sobre qué superficies se puede utilizar productor de
        entrenamiento.
    training_surface_usage:
      name: Uso de la superficie de entrenamiento
      description: Especifica las actividades principales para las que sirve la superficie
        de entrenamiento, distinguiendo los paneles de hielo sintético patinables
        de las colchonetas para tierra firme o multideporte.
    training_usage_type:
      name: Tipo de uso del entrenamiento
      description: Especifica el período de uso principal previsto o contexto para
        el que se utilizarán los pantalones de entrenamiento, como por ejemplo, entrenamiento
        diurno o nocturno.
    trampoline_enclosure_type:
      name: Tipo de cerramiento para trampolín
      description: Especifica la configuración del cerramiento utilizado en el trampolín,
        incluyendo cómo y dónde está montada la red.
    trampoline_safety_certifications:
      name: Certificaciones de seguridad de la cama elástica
      description: Indica con qué normas/certificaciones de seguridad relevantes para
        trampolines afirma cumplir el producto.
    transfer_application_method:
      name: Método de aplicación de transferencia
      description: Especifica cómo se aplica la transferencia a la tela (por ejemplo,
        mediante planchado o prensado térmico).
    transfer_method:
      name: Método de transferencia
      description: Especifica cómo se pretende transferir el diseño a la tela.
    transfer_peel_temperature:
      name: Temperatura de despegado
      description: Especifica el estado de temperatura recomendado (caliente, tibio
        o frío) al que se debe despegar la lámina de soporte luego del prensado.
    transmission_cooler_construction:
      name: Construcción del enfriador de transmisión
      description: Especifica el diseño de construcción del núcleo del enfriador de
        la transmisión.
    transmission_fluid_specification:
      name: Especificación del fluido de transmisión
      description: Norma OEM/especificación que cumple el fluido de transmisión (por
        ejemplo, familias Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Material del casquillo de montaje de la transmisión
      description: Especifica el material elastomérico o aislante utilizado en el
        casquillo/aislador de montaje (el elemento de amortiguación de vibraciones).
    transmission_mount_type:
      name: Tipo de montaje de la transmisión
      description: Especifica la construcción/diseño de un montaje de transmisión
        (por ejemplo, hidráulico o sólido) para ayudar a determinar el ajuste, las
        características NVH y el uso previsto.
    transparency_level:
      name: Nivel de transparencia
      description: Describe el grado de transparencia de las paredes del contenedor,
        ayudando al comprador a decidir entre visibilidad transparente y almacenamiento
        oculto.
    transport_case_type:
      name: Tipo de caja de transporte
      description: Clasifica el estilo estructural/rigidez de la solución de transporte,
        reflejando el nivel de protección y el método de embalaje.
    transposition_modes:
      name: Modos de transposición
      description: Especifica los modos de transposición/tono de concierto que utiliza
        el afinador (por ejemplo, tono de concierto y teclas de transposición como
        B♭ o E♭).
    trap_design:
      name: Diseño de la trampa
      description: Identifica el estilo estructural o el mecanismo de la trampa, lo
        que determina el método de despliegue y las especies o entornos para los que
        es más adecuada.
    trap_spring_configuration:
      name: Configuración del resorte de la trampa
      description: Indica el número o la disposición de los resortes que impulsan
        la trampa, lo cual afecta su resistencia y legalidad.
    travel_bassinet_accessories_included:
      name: Accesorios incluidos con el moisés de viaje
      description: Lista de artículos complementarios que vienen con el moisés de
        viaje.
    travel_spinning_wheel_assembly_required:
      name: Montaje requerido de la rueca de viaje
      description: Si la rueca requiere montaje/configuración además del despliegue
        (por ejemplo, colocar volante, tensión, pedales) antes de su uso.
    travel_spinning_wheel_portability_features:
      name: Características de portabilidad de la rueca de viaje
      description: Elementos de diseño relacionados con la portabilidad para ruecas
        de viaje, como la construcción plegable y las soluciones de transporte incluidas.
    travel_trailer_appliances_fuel_type:
      name: Tipo de combustible de los electrodomésticos del remolque de viaje
      description: Combustible principal utilizado para los electrodomésticos/calefacción/cocina
        a bordo (no para el vehículo de remolque).
    travel_trailer_holding_tank_type:
      name: Tipo de tanque de retención para remolques de viaje
      description: Indica qué tanques de retención están presentes en el remolque
        de viaje (seleccionar todos los que correspondan).
    travel_trailer_power_hookup_shore_power:
      name: Conexión eléctrica para remolques de viaje (conexión a la red eléctrica)
      description: Estándares de conexión eléctrica compatibles para conexiones de
        alimentación desde tierra.
    tread_pattern_type:
      name: Tipo de dibujo de la banda de rodadura
      description: Clasifica el diseño general de la banda de rodadura del neumático,
        como liso, semiliso o con tacos, lo que afecta a la tracción, la resistencia
        a la rodadura y la superficie prevista.
    treadmill_key_type:
      name: Tipo de llave de la cinta de correr
      description: Describe el estilo físico o el mecanismo de funcionamiento/conexión
        de la llave de seguridad (por ejemplo, redonda magnética, inserto de plástico,
        de clip).
    treadmill_part_type:
      name: Tipo de pieza para cinta de correr
      description: Identifica el componente específico de la cinta de correr que el
        producto pretende reemplazar para que el comprador pueda confirmar rápidamente
        la compatibilidad (por ejemplo, correa o motor).
    treadmill_position:
      name: Posición de la cinta de correr
      description: Indica la posición de instalación de la pieza en la cinta de correr
        (delantera, trasera, superior, inferior, central).
    triangle_striker_material:
      name: Material del percutor triangular
      description: Material del percutor/batidor incluido.
    trigger_input_connector:
      name: Conector de entrada del activador
      description: Especifica el estándar físico del conector utilizado para las entradas
        del activador.
    trigger_input_connector_type:
      name: Tipo de conector de entrada del activador
      description: Especifica el tipo de conector físico utilizado para las entradas
        del activador.
    trigger_input_zone_support:
      name: Compatibilidad con zona de entrada del activador
      description: Indica si las entradas del activador ayudan a un activador de zona
        única y/o de doble zona (por ejemplo, cabeza/borde) e implementaciones multizonas
        similares.
    trim_application_method:
      name: Método de aplicación de ribete
      description: Indica cómo se pretende fijar el ribete a un proyecto (por ejemplo,
        cosido, termoadhesivo, adhesivo).
    trim_detail:
      name: Detalle del ribete
      description: Identifica los bordes o acabados decorativos más destacados de
        la prenda (por ejemplo, adornos de borlas, flecos, encajes).
    trim_elasticity:
      name: Elasticidad del ribete
      description: Indica si el ribete de zigzag tiene elasticidad para su uso en
        prendas de punto/deportivas.
    trim_finish:
      name: Acabado del ribete
      description: Variaciones en el acabado superficial aplicado a los ribetes (por
        ejemplo, metálico, brillante, reflectante).
    trim_tilt_type:
      name: Tipo de ribete e inclinación
      description: Si el motor ayuda al ajuste de inclinación/trimado y de qué manera.
    trolleybus_power_supply_type:
      name: Tipo de alimentación del trolebús
      description: Especifica cómo el trolebús recibe la energía de tracción de la
        red eléctrica.
    truck_bed_body_type:
      name: Tpo de caja/carrocería del camión
      description: Configuración de la caja de carga o carrocería detrás de la cabina.
    truck_bed_length_class:
      name: Clase de longitud de la caja del camión
      description: Indica la clase de longitud de la caja del camión para la que está
        diseñada la red de carga (comúnmente denominada caja corta/estándar/larga).
    truck_mounting_hole_pattern:
      name: Patrón de orificios de montaje del camión
      description: Especifica el diseño de los orificios utilizados para montar los
        ejes en la plataforma (por ejemplo, Old school, New school, Universal).
    truck_mounting_style:
      name: Estilo de montaje en camiones
      description: La forma en que los ejes están fijados a la tabla (montaje superior,
        drop-through, etc.) influye en la altura de conducción y la estabilidad.
    truck_profile:
      name: Perfil del camión
      description: Indica la clasificación de altura de conducción del eje de la patineta
        en relación con la tabla, lo que afecta la distancia entre las ruedas y la
        sensación de la tabla.
    trumpet_bell_material:
      name: Material para campanas de trompeta
      description: El material utilizado para la sección de la campana (a veces difiere
        del resto del instrumento).
    trumpet_leadpipe_material:
      name: Material del tudel de la trompeta
      description: Material o variación utilizado para el tubo principal (tubo principal
        desde la boquilla hasta las válvulas).
    trundle_mechanism:
      name: Mecanismo de despliegue
      description: Describe cómo se despliega el componente de la cama secundaria
        desde el marco principal.
    trunk_part_type:
      name: Tipo de pieza del maletero
      description: Especifica qué componente de la carrocería relacionado con el maletero
        se está vendiendo (por ejemplo, tapa del maletero, bisagra, pestillo).
    tuba_leadpipe_material:
      name: Material para el tubo de plomo de la tuba
      description: Identifica el material utilizado para la sección del tubo principal
        (tubo de embocadura) de la tuba.
    tube_base_type:
      name: Tipo de base del tubo
      description: Especifica la familia de base/zócalo del tubo utilizada para el
        ajuste físico/eléctrico (por ejemplo, Octal, Noval/9-pin).
    tube_matching_grade:
      name: Grado de correspondencia de tubos
      description: Indica si los tubos se prueban/emparejan como un conjunto y el
        tipo de correspondencia proporcionada.
    tube_weight_category:
      name: Categoría de peso del tubo
      description: Clasifica el tubo por construcción/peso (por ejemplo, ultraligero,
        estándar, pesado) para una rápida comparación de durabilidad versus rendimiento.
    tubeless_compatible:
      name: Compatible con sistemas sin cámara
      description: Indica si la rueda está diseñada para usarse sin cámara de aire
        cuando se combina con neumáticos sin cámara.
    tubing_shape:
      name: Formas de tubos
      description: Especifica las formas de la sección transversal de los tubos de
        soporte.
    tubular_construction_type:
      name: Tipo de construcción tubular
      description: Especifica el estilo de construcción de los neumáticos tubulares
        para bicicletas, distinguiendo entre los tubulares tradicionales pegados y
        las variantes más recientes.
    tulip_type_flower_form:
      name: Tipo de tulipán (forma de la flor)
      description: Especifica el tipo hortícola/forma de la flor de los tulipanes
        del ramo (por ejemplo, simple, doble, loro).
    tuner_input_method:
      name: Método de entrada del sintonizador
      description: Especifica cómo el afinador detecta el tono (micrófono, sensor
        de vibración/clip, entrada de cable de instrumento, micrófono de contacto).
    tuning_mechanism:
      name: Mecanismo de afinación
      description: Cómo se tensan/afinan los parches de los bongos.
    tuning_system:
      name: Sistema de afinación
      description: Cómo se afina el tambor de copa o si es afinable.
    turn_signal_lens_color:
      name: Color de la lente del intermitente
      description: Color de la lente/cubierta visible en la carcasa del intermitente
        (no el color de la luz emitida).
    turn_signal_lighting_style:
      name: Estilo de iluminación del intermitente
      description: El estilo/animación de señalización visual que proporciona el intermitente.
    turnip_and_rutabaga_variety:
      name: Variedades de nabo y colinabo
      description: Identifica el cultivar o variedad específica del nabo o colinabo.
    tweeter_crossover_type:
      name: Tipo de cruzado del tweeter
      description: Indica el tipo de cruzado de paso alto y/o componente de protección
        incluido con el tweeter, si lo hay.
    tweeter_material:
      name: Material del tweeter
      description: Material principal del diafragma/cúpula del tweeter.
    tweeter_mount_type:
      name: Tipo de montaje del tweeter
      description: Especifica cómo se debe instalar el tweeter en el vehículo (método
        de montaje/hardware).
    twill_direction:
      name: Dirección de la sarga
      description: Indica la dirección de la línea de sarga de un tejido vaquero.
    twist_direction:
      name: Dirección de torsión
      description: Dirección de torsión de las hebras utilizada en el hilo (torsión
        en S o torsión en Z).
    u_joint_series_size:
      name: Serie de juntas universales/tamaño
      description: Especifica la serie de la junta universal o el tamaño estándar
        utilizado (por ejemplo, las series 1310).
    uilleann_pipes_bag_material:
      name: Material de las bolsas para cornamusas irlandesas
      description: Material del componente de la bolsa de aire (si está incluida),
        que influye en la sensación , la durabilidad y el mantenimiento.
    uilleann_pipes_handedness:
      name: Lateralidad de las cornamusas irlandesas
      description: Indica si el set está configurado para tocarse con la mano derecha
        o con la izquierda.
    uilleann_pipes_set_configuration:
      name: Configuración del set de cornamusas irlandesas
      description: Especifica qué configuración de cornamusas irlandesas se incluye,
        en función de la presencia de reguladores y drones.
    uk_childrens_shoe_size:
      name: Número de zapato de niños del Reino Unido
      description: Especifica el número de zapato infantil del Reino Unido, como 4
        o 4 ancho
    uk_clothing_size:
      name: Talla de ropa del Reino Unido
      description: Especifica la talla de ropa del Reino Unido; por ejemplo, 12 o
        38.
    uk_cup_size:
      name: Talla de copa del Reino Unido
      description: Especifica la talla de copa de sujetadores del Reino Unido, como
        C o FF.
    uk_mens_shoe_size:
      name: Número de zapato de hombre del Reino Unido
      description: Especifica el número de zapato de hombre del Reino Unido, como
        9 o 9 ancho
    uk_womens_shoe_size:
      name: Número de zapato de mujer del Reino Unido
      description: Especifica el número de zapato de mujer del Reino Unido, como 6
        o 6 ancho
    ukulele_back_and_sides_wood:
      name: Tapa trasera y laterales de madera para ukelele
      description: Identifica la madera/material utilizado para la parte trasera y
        los laterales del ukelele.
    ukulele_body_cutaway:
      name: Corte transversal del cuerpo del ukelele
      description: Indica si el cuerpo del ukelele de concierto tiene un recorte para
        facilitar el acceso a los trastes superiores.
    ukulele_body_shape:
      name: Forma del cuerpo del ukelele
      description: Estilo general del cuerpo/forma utilizadas para el ukelele.
    ukulele_bridge_material:
      name: Material para el puente del ukelele
      description: Especifica el material utilizado para el puente del ukelele.
    ukulele_construction_type:
      name: Tipo de construcción del ukelele
      description: Cómo están construidas la tapa, la parte trasera y los laterales
        del instrumento (material sólido o laminado).
    ukulele_electronics_configuration:
      name: Configuración electrónica del ukelele
      description: Indica si el ukelele es solo acústico o incluye electrónica incorporada
        (micrófono y/o preamplificador) para amplificación.
    ukulele_string_re_entrant_tuning:
      name: Afinación reentrante del ukelele
      description: Si el ukelele está configurado con afinación reentrante (sol agudo)
        o lineal/sol bajo; preferencia común del comprador y que afecta al sonido.
    ukulele_top_wood:
      name: Tapa de madera para el ukelele
      description: Identifica la madera/material utilizado para la tapa/caja de resonancia
        del ukelele.
    ukulele_tuner_mechanism:
      name: Mecanismo de afinación del ukelele
      description: Especifica el tipo/mecanismo de afinación utilizado en el ukelele.
    ukulele_tuner_type:
      name: Tipo de afinador del ukelele
      description: Tipo de clavija de afinación utilizada en el clavijero del ukelele.
    ukulele_tuning:
      name: Afinación del ukelele
      description: Especifica la afinación estándar prevista para el ukelele de bolsillo.
    ultralight_aircraft_wing_configuration:
      name: Configuración de alas de aeronaves ultraligeras
      description: Ubicación y configuración del ala principal en relación con el
        fuselaje/estructura.
    under_bed_features:
      name: Características del espacio bajo la cama
      description: Identifica el elemento funcional principal ubicado debajo de la
        plataforma de la cama.
    underfoot_strap_type:
      name: Tipo de correa debajo del calzado
      description: Identifica el material o diseño utilizado para la correa que se
        coloca debajo del calzado.
    underwear_fit:
      name: Ajuste de la ropa interior
      description: Indica el perfil de ajuste general de los calzoncillos bóxer (por
        ejemplo, ajustado, holgado, de compresión).
    underwear_pieces_included:
      name: Piezas de ropa interior incluidas
      description: Identifica qué piezas de la prenda se proporcionan (parte superior,
        parte inferior, ambas o un mono de una sola pieza) para que el cliente sepa
        si está comprando un conjunto completo o un artículo individual.
    uniform_pieces_included:
      name: Piezas del uniforme incluidas
      description: Identifica qué componentes de la prenda están incluidos (por ejemplo,
        camisa, pantalón, chaleco), aclarando el contenido del paquete para compra
        al por mayor o de kits.
    uniform_role:
      name: Función del uniforme
      description: Especifica la función profesional o la agencia a la que está destinado
        el artículo del uniforme (por ejemplo, policía, sheriff, servicios médicos
        de emergencia).
    update_method:
      name: Método de actualización
      description: Cómo se entregan las actualizaciones de firmware/software para
        el lector.
    upholstery_fabric_backing_type:
      name: Tipo de respaldo de tela de tapicería
      description: Especifica el tipo de revestimiento/laminado de la tela de tapicería
        que afecta a la instalación y al tacto.
    upholstery_fabric_water_resistance:
      name: Resistencia al agua del tejido de tapicería
      description: Indica la resistencia al agua y a los derrames de la superficie
        de la tela de tapicería.
    upper_material:
      name: Material superior
      description: Especifica el material principal utilizado en la parte superior
        de la zapatilla, lo que afecta a la transpirabilidad, la durabilidad y la
        estética.
    upright_bass_pickup_system:
      name: Sistema de micrófonos del contrabajo
      description: Indica si el contrabajo incluye un sistema de micrófono/preamplificación
        instalado, destinado a la amplificación.
    upright_piano_power_source:
      name: Fuente de alimentación para piano vertical
      description: Cómo se alimenta el piano vertical, aplicable tanto a pianos verticales
        acústicos sin alimentación eléctrica como a pianos verticales con sistemas
        silenciosos/híbridos que requieren electricidad.
    urination_device_features:
      name: Características del dispositivo de micción
      description: Destaca las características de diseño especiales que mejoran la
        funcionalidad o la comodidad.
    us_childrens_shoe_size:
      name: Número de zapato de niños de EE. UU.
      description: Especifica la talla de calzado infantil de EE. UU., como 5 o 5
        ancho
    us_clothing_size:
      name: Talla de ropa de EE. UU.
      description: Especifica la talla de ropa de EE. UU.; por ejemplo, 8 o 14.
    us_cup_size:
      name: Talla de copa de EE. UU.
      description: Especifica la talla de copa de sujetadores de EE. UU., como C o
        DDD.
    us_mens_shoe_size:
      name: Número de zapato de hombres de EE. UU.
      description: Especifica el número de zapato de hombre de EE. UU., como 10 o
        10 ancho
    us_ring_size:
      name: Tamaño del anillo de EE. UU.
      description: Especifica el tamaño del anillo de EE. UU., como 7 o 9.5
    us_womens_shoe_size:
      name: Número de zapato de mujeres de EE. UU.
      description: Especifica el número de zapato de mujer de EE. UU., como 8 u 8
        ancho
    usage:
      name: Uso
      description: Describe el uso previsto de la caja/ajuste del árbol de levas.
    usda_honey_grade:
      name: Clasificación del USDA de la miel
      description: Indica la calificación oficial del Departamento de Agricultura
        de los Estados Unidos (USDA) asignada a la miel.
    user_control_method:
      name: Método de control del usuario
      description: Indica cómo interactúa el usuario con la máquina (por ejemplo,
        panel de control integrado, control remoto, app, voz), lo que permite tener
        en cuenta la facilidad de uso.
    vacuum_boost_reference_port:
      name: Puerto de referencia de vacío/sobrealimentación
      description: Indica si el regulador incluye un puerto de referencia del colector
        para vacío/sobrealimentación y de qué tipo es.
    valve_base_shape:
      name: Forma de la base de la válvula
      description: Identifica la geometría de la interfaz entre la base de la válvula
        y el borde (redonda, cónica, con puerto lateral, en forma de T, etc.), que
        afecta al sellado y a la compatibilidad con el inserto de espuma.
    valve_core_type:
      name: Tipo de núcleo de la válvula
      description: Indica si el núcleo de la válvula es extraíble, fijo o sin núcleo,
        información que afecta a los procedimientos de mantenimiento y a la compatibilidad
        con las herramientas de inyección de sellador.
    valve_cover_gasket_material:
      name: Material de la junta de la tapa de la válvula
      description: Especifica el material de la junta de la tapa de la válvula incluida
        con la tapa, o el material de junta recomendado cuando se vende sin junta
        (si corresponde).
    valve_cover_material:
      name: Material de la cubierta de la válvula
      description: Material de construcción principal de la tapa de la válvula.
    valve_design:
      name: Diseño de la válvula
      description: Identifica la construcción/diseño de la válvula del motor.
    valve_guard_coverage_area:
      name: Área de cobertura del protector de la válvula
      description: Indica qué partes de la sección de la válvula protege el protector.
    valvetrain_configuration:
      name: Configuración del tren de válvulas
      description: Especifica el diseño del árbol de levas/tren de válvulas.
    varnish_formulation_base:
      name: Base de formulación del barniz
      description: Especifica la formulación/química principal del barniz para instrumentos
        de cuerda, que afecta a la apariencia, la reversibilidad y la compatibilidad
        con los acabados existentes.
    varnish_transparency_tint:
      name: Transparencia/tono del barniz
      description: Describe si el barniz es transparente o tintado y, en caso de ser
        tintado, la gama general de tonos.
    vegetable_matter_vm_content:
      name: Contenido de materia vegetal (MV)
      description: Cantidad de restos vegetales/impurezas presentes en la fibra.
    vegetable_preparation_style:
      name: Estilo de preparación de verduras
      description: Describe cómo se presenta, corta o prepara la verdura antes de
        ofrecerla (por ejemplo, entera, en cubos, en ramilletes).
    vehicle_audio_dsp_form_factor:
      name: Factor de forma del DSP de audio del vehículo
      description: Especifica el formato físico/de instalación de la unidad DSP.
    vehicle_battery_charger_features:
      name: Características del cargador de batería del vehículo
      description: Enumera los modos de funcionamiento y la función integrada del
        cargador de batería del vehículo (por ejemplo, modo de flotación, desulfatación).
    vehicle_body_filler_form:
      name: Formato de masilla para carrocería
      description: La forma física/estilo de embalaje del producto de masilla para
        carrocería.
    vehicle_coaxial_speaker_nominal_size:
      name: Tamaño nominal del altavoz coaxial para vehículos
      description: Tamaño nominal del altavoz utilizado en la instalación (por ejemplo,
        6,5 pulgadas, 6x9 pulgadas).
    vehicle_cover_size_class:
      name: Clase de tamaño de la funda para el vehículo
      description: Agrupación general de tamaños que indica para qué tamaño de vehículo
        está diseñada la funda.
    vehicle_decor_set_items_included:
      name: Artículos incluidos en el set de decoración para vehículos
      description: Enumera los tipos de artículos de decoración incluidos en el set
        de accesorios (visibilidad a nivel de componente para el comprador).
    vehicle_door_lock_actuation_method:
      name: Método de accionamiento del cierre de la puerta del vehículo
      description: Indica cómo se acciona o controla el cierre de la puerta del vehículo.
    vehicle_door_lock_actuator_kit_contents:
      name: Contenido del kit actuador de cerradura de puerta del vehículo
      description: Indica qué se incluye con el actuador (solo el actuador o hardware/varillas/soportes/arnés).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Configuración del cableado del actuador de la cerradura de la puerta del
        vehículo
      description: Especifica el tipo de cableado se necesita para la instalación
        (número de cables y función).
    vehicle_door_lock_included_components:
      name: Componentes incluidos en la cerradura de la puerta del vehículo
      description: Enumera los componentes incluidos en el paquete (útil para kits/ensamblajes).
    vehicle_electrical_connector_type:
      name: Tipo de conector eléctrico del vehículo
      description: Especifica el tipo de conector o enchufe eléctrico del regulador/campo
        del alternador (excluyendo el borne principal de salida B+).
    vehicle_equipment_fit_out_level:
      name: Nivel de equipamiento del vehículo
      description: Indica el nivel de equipamiento policial incluido en la furgoneta.
    vehicle_glass_cleaner_form:
      name: Formato del limpiador de cristales para vehículos
      description: Formato físico del producto limpiador de cristales para vehículos
        (por ejemplo, aerosol, espuma, toallitas, gel, concentrado).
    vehicle_hitch_cover_illumination_type:
      name: Tipo de iluminación de la cubierta del enganche del vehículo
      description: Especifica si la tapa del enganche tiene iluminación y de qué tipo.
    vehicle_hitch_cover_mounting_type:
      name: Tipo de montaje de la cubierta del enganche del vehículo
      description: Indica el método utilizado para sujetar/fijar la tapa del enganche
        en el receptor del enganche.
    vehicle_license_plate_finish:
      name: Acabado de la placa de identificación del vehículo
      description: Acabado superficial de la placa.
    vehicle_license_plate_frame_anti_theft_design:
      name: Diseño antirrobo del marco de la placa de identificación del vehículo
      description: Elementos de diseño relacionados con la seguridad, destinados a
        disuadir su extracción o manipulación.
    vehicle_license_plate_frame_plate_standard:
      name: Marco estándar para la placa de identificación del vehículo
      description: Estándar/región de la placa de identificación a la que se adapta
        el tamaño del marco.
    vehicle_license_plate_frame_profile:
      name: Perfil del marco de la placa de identificación del vehículo
      description: Cómo el marco bordea la placa (cobertura/forma), lo que influyen
        en la legibilidad y el cumplimiento de normativas.
    vehicle_license_plate_mounting_hole_count:
      name: Número de orificios de montaje de la placa de identificación del vehículo
      description: Número de orificios de montaje en la placa.
    vehicle_license_plate_mounting_hole_pattern:
      name: Patrón de orificios de la placa de identificación del vehículo
      description: Patrón de ubicación de los orificios de montaje en la placa.
    vehicle_license_plate_reflectivity:
      name: Reflectividad de la placa de identificación del vehículo
      description: Si la superficie de la placa refleja la luz y cómo lo hace (importante
        para la visibilidad y el cumplimiento de la normativa en algunas placas novedosas).
    vehicle_license_plate_size_standard:
      name: Estándar de tamaño de la placa de identificación del vehículo
      description: Indica el estándar regional/vehicular para el que está diseñada
        la placa (distancia entre orificios de montaje y dimensión general).
    vehicle_license_plate_text_style:
      name: Estilo de texto de la placa de identificación del vehículo
      description: Estilo de los caracteres de la placa (si los hay), incluyendo si
        están en relieve o impresos.
    vehicle_license_plate_theme:
      name: Tema de la placa de identificación del vehículo
      description: Tema de diseño de alto nivel para la ilustración de la placa.
    vehicle_lift_actuation_method:
      name: Método de accionamiento del elevador de vehículos
      description: Cómo se alimenta/acciona el elevador/gato para levantar el vehículo.
    vehicle_lift_mounting_type:
      name: Tipo de montaje del elevador del vehículo
      description: Indica cómo se instala o ancla el elevador en el espacio de trabajo.
    vehicle_lift_type:
      name: Tipo de elevador de vehículos
      description: Especifica el estilo estructural del elevador de vehículos utilizado
        para servicio o almacenamiento (por ejemplo, de 2 postes, de 4 postes, de
        tijera).
    vehicle_magnet_attachment_type:
      name: Tipo de fijación magnética para vehículos
      description: Especifica el método principal de fijación/montaje para los productos
        vendidos como imanes para vehículos (por ejemplo, solo magnético o magnético
        con adhesivo).
    vehicle_magnet_intended_use:
      name: Uso previsto del imán del vehículo
      description: Indica el uso principal previsto del imán del vehículo.
    vehicle_mirror_adjustment_type:
      name: Tipo de ajuste del espejo del vehículo
      description: Especifica cómo se ajusta/controla el espejo.
    vehicle_mirror_glass_type:
      name: Tipo de espejo del vehículo
      description: Especifica el tipo óptico/forma de la superficie del cristal del
        espejo.
    vehicle_organizer_features:
      name: Características del organizador de vehículos
      description: Características funcionales clave de los organizadores para vehículos,
        como la posibilidad de plegarlos, el forro impermeable, los bolsillos aislantes
        o la base antideslizante.
    vehicle_paint_chemistry_base:
      name: Química/base de la pintura del vehículo
      description: Indica la formulación/química de la pintura utilizada en la pintura
        del vehículo.
    vehicle_polish_application_method:
      name: Método de aplicación para pulir vehículos
      description: Especifica el método o la herramienta recomendada para aplicar
        el pulimento para vehículos.
    vehicle_pursuit_package:
      name: Paquete de persecución de vehículos
      description: Indica si el vehículo está equipado con un paquete de rendimiento
        para persecuciones destinado al uso policial (por ejemplo, sistema de refrigeración,
        frenos, suspensión y calibración mejorados).
    vehicle_safety_equipment_position:
      name: Posición del equipo de seguridad del vehículo
      description: Especifica en qué parte del vehículo se debe utilizar o instalar
        el equipo de seguridad.
    vehicle_safety_equipment_visibility_features:
      name: Características de visibilidad del equipo de seguridad del vehículo
      description: Indica elementos que mejoran la visibilidad y que están diseñados
        para aumentar la conspicuidad.
    vehicle_seat_row:
      name: Fila de asientos del vehículo
      description: Indica para qué fila trasera es el asiento (segunda o tercera fila),
        incluidas los usos de asientos plegables traseros.
    vehicle_steering_assist_type:
      name: Tipo de asistencia a la dirección del vehículo
      description: Especifica el sistema de asistencia a la dirección para el que
        está diseñado el componente.
    vehicle_steering_wheel_lock_form_factor:
      name: Factor de forma del bloqueo del volante del vehículo
      description: Describe el diseño físico del cierre y cómo interactúa con el volante
        (y, opcionalmente, con otros controles).
    vehicle_wax_polish_product_form:
      name: Formato de producto de la cera/abrillantador para vehículos
      description: La forma física/formato de dispensación de la cera, pulimento,
        protector o sellador.
    vehicle_wheel_valve_stem_type:
      name: Tipo de vástago de válvula de rueda del vehículo
      description: Especifica el tipo de vástago de válvula compatible o incluido.
    vehicle_windshield_fluid_formula:
      name: Fórmula del líquido limpiaparabrisas para vehículos
      description: El objetivo principal de limpieza/eliminación de la formulación
        del líquido limpiaparabrisas.
    veil_length_type:
      name: Tipo de largo del velo
      description: Clasifica un velo utilizando terminología de longitud estándar
        en lugar de medidas numéricas.
    vellum_opacity_level:
      name: Nivel de opacidad de la hoja de vitela
      description: Indica el grado de translucidez u opacidad de la hoja de vitela.
    ventilation_configuration:
      name: Configuración de ventilación
      description: Configuración principal de ventilación/entrada y salida de aire
        del casco.
    ventilation_control_type:
      name: Tipo de control de ventilación
      description: Especifica el estilo de gestión del flujo de aire integrado en
        el casco.
    ventilation_level:
      name: Nivel de ventilación
      description: Indica el diseño relativo de flujo de aire/ventilación de la armadura.
    venting_design:
      name: Diseño de ventilación
      description: Especifica si la cubierta está ventilada y cómo lo está para reducir
        la condensación y el moho durante el almacenamiento.
    vestibule_type:
      name: Tipo de vestíbulo
      description: Clasifica el diseño del vestíbulo en relación con la tienda de
        campaña.
    vibraphone_bar_material:
      name: Material de la barra del vibráfono
      description: Material de las barras/teclas del vibráfono (las barras que producen
        el sonido).
    vibraphone_motor_type:
      name: Tipo de motor del vibráfono
      description: Tipo de motor utilizado para accionar los ventiladores resonadores
        giratorios para el vibrato (si están equipados).
    vibraphone_range_octaves:
      name: Rango del vibráfono (octavas)
      description: El rango de tonos del vibráfono se expresa en octavas (por ejemplo,
        3 octavas, 3,5 octavas).
    vibraphone_resonator_tube_material:
      name: Material del tubo resonador del vibráfono
      description: Material de los tubos resonadores del vibráfono situados bajo las
        barras.
    vibraphone_tuning_standard:
      name: Estándar de afinación del vibráfono
      description: Tono de referencia utilizado para la afinación (A=440 Hz, etc.).
    viewing_sides:
      name: Lados visibles
      description: Especifica en cuántos lados del marcador se muestra información
        (un lado, dos lados, cuatro lados, etc.).
    vintage_advertisement_decade:
      name: Década de la publicidad vintage
      description: Especifica la década en la que se imprimió o produjo originalmente
        la publicidad (aproximado si se desconoce el año exacto).
    vintage_advertisement_format:
      name: Formato de anuncio publicitario clásico
      description: Especifica el formato físico o el soporte de la publicidad vintage
        de colección.
    vintage_advertisement_subject_category:
      name: Categoría temática de la publicidad vintage
      description: Identifica la categoría del producto/servicio que se anuncia (para
        qué sirve la publicidad).
    vintage_classic_truck_cab_type:
      name: Tipo de cabina de camión clásica y vintage
      description: Configuración de la cabina/estilo de carrocería del compartimento
        de pasajeros del camión.
    virginia_tech_helmet_star_rating:
      name: Calificación de estrellas de cascos de Virginia Tech
      description: Clasificación de seguridad asignada por el Laboratorio de Cascos
        de Virginia Tech (0–5 estrellas).
    virtual_analog_synthesizer_form_factor:
      name: Factor de forma del sintetizador analógico virtual
      description: Especifica el formato físico del chasis del sintetizador (teclado
        vs. módulo/rack).
    viscosity_thickness:
      name: Viscosidad/espesor
      description: Describe la viscosidad o fluidez del producto tal como se vende
        o con la consistencia de trabajo recomendada.
    vise_configuration:
      name: Configuración del tornillo de banco
      description: Especifica el diseño estructural o el número de piezas del juego
        de tornillos de banco, lo que afecta a la portabilidad y a la complejidad
        de la instalación.
    visibility_features:
      name: Características de visibilidad
      description: Destaca los elementos de diseño que mejoran la visibilidad del
        ciclista en el tráfico.
    visor_brim_type:
      name: Tipo de visera/ala
      description: Indica la presencia y el estilo de un visor o un borde en el casco.
    visor_configuration:
      name: Configuración del visor
      description: Describe la presencia y el estilo de cualquier visera o protector
        facial incorporado.
    visor_lens_finish:
      name: Acabado de la lente de la visera
      description: Especifica el tinte, el acabado óptico o el estilo gráfico aplicado
        a la lente de la visera.
    visor_style:
      name: Estilo de visera
      description: Indica si la capucha incluye un borde/visera y su configuración.
    voc_compliance_standard:
      name: Norma de cumplimiento COV
      description: Declaración de cumplimiento normativo COV para el producto (cuando
        corresponda).
    voc_regulatory_class:
      name: Clase regulatoria COV
      description: Clase de conformidad/regulación COV declarada para el producto
        (según la etiqueta/ficha de datos de seguridad), utilizada para las restricciones
        medioambientales y normativas regionales.
    vodka_base_ingredient:
      name: Ingrediente base del vodka
      description: Ingrediente agrícola principal a partir del cual se destila el
        vodka (por ejemplo, trigo, patata, maíz).
    voice_coil_configuration:
      name: Configuración de la bobina móvil
      description: Número y disposición de las bobinas móviles para mayor flexibilidad
        en el cableado y opciones de impedancia.
    voice_effects:
      name: Efectos vocales
      description: Tipos de efectos vocales integrados compatibles con el equipo de
        karaoke.
    voltage_rating_type:
      name: Tipo de clasificación de tensión
      description: Especifica si la tensión nominal del fusible se aplica a corriente
        alterna (CA), corriente continua (CC) o a ambas.
    voltage_regulator_connector_type:
      name: Tipo de conector del regulador de voltaje
      description: Especifica el tipo de conexión/terminal que se utiliza para conectar
        el regulador al cableado/alternador/generador del vehículo.
    wader_foot_type:
      name: Tipo de pie del vadeador
      description: Especifica si los vadeadores tienen botas integradas o calcetines
        separados.
    wader_sole_type:
      name: Tipo de suela del vadeador
      description: Especifica el material de la suela o el tipo de tracción utilizado
        en las botas de vadeo o en los vadeadores con bota integrada.
    waistband_style:
      name: Estilo de la cintura
      description: Describe la confección de la cintura y cómo se sujeta o ajusta
        para lograr un calce y una comodidad óptimos.
    wakeboard_binding_mounting_pattern:
      name: Patrón de montaje de fijaciones para la tabla de wakeboard
      description: Especifica el patrón de inserción/placa de la tabla de wakeboard
        con el que son compatibles las fijaciones.
    wakeboard_riding_style:
      name: Estilo de uso de la tabla de wakeboard
      description: Clasifica el entorno o estilo de uso previsto para la tabla de
        wakeboard.
    wall_decal_style:
      name: Estilo de vinilo decorativo de pared
      description: Especifica cómo se produce/aplica el vinilo decorativo (por ejemplo,
        troquelado, de transferencia, en hoja de pegatinas).
    wallyball_equipment_included:
      name: Equipo de wallyball incluido
      description: Enumera las piezas específicas que vienen en el set de wallyball
        para que el comprador sepa exactamente lo que está comprando y pueda comparar
        diferentes paquetes.
    warp_beam_type:
      name: Tipo de viga de urdimbre
      description: Especifica la configuración del urdimbre incluida o instalada en
        el telar (la configuración del urdimbre que se proporciona con el telar).
    washability:
      name: Lavabilidad
      description: Indica si el pegamento se limpia con agua y/o es lavable después
        de la aplicación.
    watch_band_design:
      name: Diseño de la correa de reloj
      description: Describe el estilo de construcción o el patrón de diseño de una
        correa de reloj (por ejemplo, NATO, milanesa, de eslabones).
    watch_movement:
      name: Movimiento del reloj
      description: Especifica el mecanismo que impulsa el reloj, un factor clave que
        los compradores utilizan para diferenciar entre modelos.
    water_activation:
      name: Activación en agua
      description: Si la baliza se puede activar automáticamente al sumergirse en
        agua (algo común en las EPIRB de categoría I/II).
    water_chamber_configuration:
      name: Configuración de la cámara de agua
      description: Describe el diseño interno de la cámara del colchón, como cámaras
        simples o dobles, lo que influyen en el soporte, el control de la temperatura
        y las molestias de pareja.
    water_dispensing_mechanism:
      name: Mecanismo dispensador de agua
      description: Define cómo se libera el agua de la unidad, por ejemplo, mediante
        grifos, boquillas pulverizadoras o vertido por gravedad.
    water_exposure_protection_level:
      name: Nivel de protección contra la exposición al agua
      description: Indica el nivel de protección del producto cuando se expone al
        agua (por ejemplo, salpicaduras o inmersión temporal). Utiliza la clasificación
        de protección IP (Ingress Protection) cuando haya un código IP oficial disponible.
    water_fed_design:
      name: Diseño con suministro de agua
      description: Indica si el cepillo está diseñado para usarse con agua corriente
        a través de un mango con flujo continuo o una conexión para manguera.
    water_gun_features:
      name: Características de la pistola de agua
      description: Características funcionales destacadas y capacidades incluidas
        de la pistola de agua.
    water_gun_operating_mechanism:
      name: Mecanismo de funcionamiento de la pistola de agua
      description: Cómo la pistola de agua presuriza y expulsa el agua durante su
        uso.
    water_gun_spray_pattern:
      name: Patrón de pulverización de la pistola de agua
      description: El tipo de chorro de agua que produce la boquilla durante el disparo.
    water_heating_method:
      name: Método de calentamiento del agua
      description: Describe cómo, o si, se calienta el agua antes de su uso; por ejemplo,
        mediante absorción solar, quemadores de propano, elementos eléctricos, calefacción
        a batería, aislamiento térmico o sin calentar.
    water_mattress_construction:
      name: Construcción del colchón de agua
      description: Especifica el estilo de construcción del colchón de agua (por ejemplo,
        de lados rígidos o de lados blandos), lo que determina la compatibilidad del
        marco y la sensación general.
    water_play_features:
      name: Características del juego con agua
      description: Componentes de actividades acuáticas incluidos en el parque acuático/tobogán.
    water_polo_competition_approval:
      name: Aprobación para competición de waterpolo
      description: Identifica el organismo rector o el nivel de competición para el
        que el balón está oficialmente aprobado o certificado.
    water_polo_goal_type:
      name: Tipo de portería de waterpolo
      description: Clasifica la configuración estructural o de montaje de la portería
        (por ejemplo, flotante, montada sobre cubierta, portátil).
    water_pump_drive_type:
      name: Tipo de accionamiento de la bomba de agua
      description: Especifica cómo se acciona/activa la bomba de agua en el sistema
        de refrigeración del vehículo.
    water_pump_housing_material:
      name: Material de la carcasa de la bomba de agua
      description: Material de la carcasa/cuerpo de la bomba de agua.
    water_pump_impeller_material:
      name: Material del impulsor de la bomba de agua
      description: Especifica el material del impulsor de la bomba de agua (rotor/álabes
        internos que mueven el refrigerante).
    water_pump_mounting_type:
      name: Tipo de montaje de la bomba de agua
      description: Especifica el estilo de montaje/factor de forma de la bomba de
        agua para su instalación en el motor (por ejemplo, carcasa atornillada frente
        a cartucho/inserto).
    water_purification_method:
      name: Método de purificación de agua
      description: Identifica el mecanismo principal mediante el cual el producto
        potabiliza el agua en el campo (por ejemplo, bombeo frente a alimentación
        por gravedad frente a luz ultravioleta).
    water_resistance:
      name: Resistencia al agua
      description: Comunica el grado de protección contra la intemperie que proporciona,
        como por ejemplo si es impermeable o resistente al agua.
    water_resistance_level:
      name: Nivel de resistencia al agua
      description: Indica si el tejido repele el agua y a qué nivel.
    water_resistance_rating_case_protection_level:
      name: Clasificación de resistencia al agua (nivel de protección de la caja)
      description: Indica el nivel de resistencia/protección al agua que proporciona
        la caja enrollable (nivel de comercialización, no la certificación electrónica
        IP), por ejemplo, resistente al agua o impermeable.
    water_rocket_kit_items_included:
      name: Artículos incluidos en el kit de cohete de agua
      description: Componentes principales incluidos en el paquete del producto.
    water_rocket_propulsion_type:
      name: Tipo de propulsión del cohete de agua
      description: Fuente principal de propulsión/energía utilizada para lanzar el
        cohete.
    water_rocket_recovery_system:
      name: Sistema de recuperación del cohete de agua
      description: Método utilizado para recuperar el cohete después del lanzamiento.
    water_ski_base_design:
      name: Diseño de la base del esquí acuático
      description: Especifica el perfil del casco inferior de los esquís acuáticos,
        que influye en las características de manejo.
    water_ski_fin_type:
      name: Tipo de aleta del esquí acuático
      description: Especifica la configuración de las aletas de un esquí acuático,
        que afecta a la estabilidad direccional y la maniobrabilidad.
    water_source:
      name: Fuente de agua
      description: Identifica el origen del agua antes de la carbonatación.
    water_sports_safety_standard:
      name: Norma de seguridad para deportes acuáticos
      description: Enumera las normas formales de seguridad o flotabilidad que cumple
        el producto (por ejemplo, CE EN 1385 para cascos, ISO 12402-5 para dispositivos
        de flotación, USCG Tipo III).
    water_table_feature_set:
      name: Características de la mesa de agua
      description: Destaca las características de juego integradas en la mesa de agua,
        como cascadas, aspersores, bombas o estanques de varios niveles.
    water_table_items_included:
      name: Artículos incluido en la mesa de agua
      description: Especifica qué accesorios vienen con el set de mesa de agua (por
        ejemplo, barcos, tazas, embudo, figuras).
    water_table_water_source_type:
      name: Tipo de fuente de agua de la mesa de agua
      description: Especifica cómo se llena o se abastece de agua la mesa de agua.
    waterbed_stabilization_level:
      name: Nivel de estabilización del colchón de agua
      description: Indica el grado de reducción de olas o control de movimiento que
        proporciona el colchón de agua.
    watercolor_ink_water_resistance_after_drying:
      name: Resistencia al agua de la tinta de acuarela (después del secado)
      description: Indica si la tinta de acuarela se vuelve resistente al agua/impermeable
        después de secarse (según las especificaciones del fabricante).
    watercraft_care_application_area:
      name: Área de aplicación para el cuidado de la embarcación
      description: Indica la zona o componente principal de la embarcación en el que
        está previsto su uso.
    watercraft_drive_mechanism:
      name: Mecanismo de propulsión de la embarcación
      description: Describe el mecanismo de propulsión específico a bordo instalado
        o compatible.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Patrón de montaje de los sensores de nivel del tanque de combustible de
        la embarcación
      description: Especifica el patrón/estándar de montaje de los sensores del tanque
        combustible y los indicadores compatibles (por ejemplo, patrones de pernos
        marinos comunes).
    watercraft_fuel_tank_shape:
      name: Forma de los tanques de combustible de las embarcaciones
      description: Describe el factor de forma física general del tanque de combustible
        para facilitar la planificación del espacio y la adaptación.
    watercraft_hull_material:
      name: Material del casco de la embarcación
      description: Especifica el material principal de la construcción del casco.
    watercraft_ignition_part_voltage:
      name: Voltaje parcial del sistema de encendido de la embarcación
      description: Tensión nominal/requisito para la parte de encendido (cuando corresponda),
        como por ejemplo sistemas de 12 V.
    watercraft_impeller_material_grade:
      name: Grado del material del impulsor de la embarcación
      description: Especifica el material del impulsor de la embarcación (por ejemplo,
        caucho de neopreno, nitrilo, bronce).
    watercraft_lighting_certification_compliance:
      name: Certificación/cumplimiento de la normativa sobre iluminación de embarcaciones
      description: Indica el grado de conformidad con las normas y reglamentos que
        la luz cumple para uso marítimo (por ejemplo, cumple con las normas USCG/ABYC/COLREG).
    watercraft_motor_mount_adjustment_features:
      name: Características de montaje del soporte del motor de la embarcación
      description: Capacidades de montaje del soporte (por ejemplo, inclinación, elevación,
        deslizamiento) que afecta a la usabilidad y al ajuste.
    watercraft_piston_part_type:
      name: Tipo de pieza de pistón para embarcaciones
      description: Identifica a qué componente relacionado con el pistón se refiere
        la publicación.
    watercraft_propeller_blade_rake:
      name: Inclinación de la pala de la hélice de la embarcación
      description: Especifica el ángulo de inclinación de la pala (ángulo de la pala
        con respecto al cubo), que afecta a la elevación de la proa y al rendimiento.
    watercraft_propeller_rotation_direction:
      name: Dirección de rotación de la hélice de la embarcación
      description: Indica la dirección de rotación/lateralidad requerida de la hélice
        para la compatibilidad con el sistema de transmisión (por ejemplo, derecha/estándar
        frente a izquierda/contrarrotación).
    watercraft_pump_stage_impeller_role:
      name: Función de la bomba de la embarcación / impulsor
      description: Indica si el impulsor está diseñado para una función específica
        de la bomba (por ejemplo, bomba de agua bruta/mar, circulación de refrigerante,
        bomba de chorro).
    watercraft_registration_status:
      name: Estado de registro de la embarcación
      description: Indica si el velero incluye documentación de titularidad y/o matriculación.
    watercraft_safety_equipment_activation_type:
      name: Tipo de activación del equipo de seguridad para embarcaciones
      description: Método primario de activación del dispositivo de seguridad (para
        balizas/alarmas MOB/PLBs), distinto de inflación.
    watercraft_steering_cable_core_material:
      name: Material del núcleo del cable de dirección de la embarcación
      description: Especifica el material del cable/núcleo interno que transmite la
        fuerza.
    watercraft_steering_cable_hardware_included:
      name: Incluye hardware del cable de dirección de la embarcación
      description: Especifica qué hardware y componentes de instalación se incluyen
        con el cable de dirección.
    watercraft_steering_cable_system_type:
      name: Tipo de sistema de cable de dirección de la embarcación
      description: Especifica la arquitectura del sistema de dirección para la que
        está diseñado el cable (por ejemplo, rotativo, rack).
    watercraft_steering_wheel_hub_bore_type:
      name: Tipo de cubo u orificio central del volante de la embarcación.
      description: Especifica el estilo de interfaz de montaje/orificio central (por
        ejemplo, cónico, estriado) donde la rueda se acopla a un cubo o adaptador.
    watercress_variety:
      name: Variedad de berro
      description: Identifica la variedad o tipo específico de berro que se vende.
    waterproof_level:
      name: Nivel de impermeabilidad
      description: Indica el nivel de protección contra el agua del calzado, incluyendo
        cualquier afirmación de impermeabilidad respaldada por la garantía.
    wax_blend_composition:
      name: Composición de la mezcla de cera
      description: Enumera los materiales de cera mezclados en el producto y/o el
        tipo de mezcla comercializada.
    wax_coat_type:
      name: Tipo de recubrimiento de cera
      description: Indica si la cera está destinada a ser una capa base, una capa
        superior o una fórmula multiuso/de una sola capa.
    wax_hardness:
      name: Dureza de la cera
      description: Indica la dureza relativa de la cera, que afecta a la durabilidad
        y al deslizamiento sobre diferentes tipos de nieve.
    wax_physical_form:
      name: Forma física de la cera
      description: Indica la forma física en la que viene la cera cruda para velas.
    wax_recommended_candle_application:
      name: Aplicación recomendada de velas de cera
      description: Indica los estilos principales de vela para los que está formulada
        la cera.
    wax_tackiness_level:
      name: Nivel de adherencia de la cera
      description: Describe el nivel de adherencia/agarre que proporciona la cera
        a la hoja.
    weapon_system_integration:
      name: Integración con sistema de armas
      description: Indica si el vehículo incluye sistemas de armas integrados o soportes
        para armas.
    weather_suitability:
      name: Compatibilidad climática
      description: Indica las condiciones ambientales para las que están diseñados
        los guantes, como por ejemplo, para jugar en climas fríos o húmedos.
    weave_finish:
      name: Tejido/acabado
      description: Describe el tipo de tejido principal o el acabado superficial que
        afecta la textura y el brillo de la corbata.
    weave_style:
      name: Estilo de tejido
      description: Especifica el patrón de tejido tradicional utilizado en la creación
        del sombrero Panamá, que influye en la transpirabilidad, la flexibilidad,
        la apariencia y el precio.
    weave_type:
      name: Tipo de tejido
      description: Identifica el tipo de tejido/confección (nombre comercial del tejido)
        que influye en la textura, el brillo y la caída de la tela.
    weaving_beater_edge_type:
      name: Tipo de borde de batidor de tejido
      description: Describe el perfil del borde de trabajo del batidor plano que entra
        en contacto con la trama (por ejemplo, recto o dentado).
    weaving_beater_style:
      name: Estilo de peine de tejer
      description: Identifica el estilo/formato funcional del batidor de tejido plano.
    weaving_shuttle_tip_style:
      name: Estilo de punta de la lanzadera de tejido
      description: Especifica el diseño de la punta/nariz frontal de la lanzadera,
        que influye en cómo pasa a través de la calada y a la probabilidad de engancharse
        con el hilo de la urdimbre.
    weaving_shuttle_use_case:
      name: Caso de uso de la lanzadera de tejido
      description: Especifica la aplicación de tejido para la que está diseñada u
        optimizada la lanzadera.
    webbing_construction_type:
      name: Tipo de construcción de cinta tejida
      description: Describe el tipo de tejido o trenzado físico de la cinta, que afecta
        a la gestión, la resistencia y el uso previsto.
    webbing_design:
      name: Diseño de membrana
      description: Describe el tipo de membrana interdigital, que afecta al entrenamiento
        de resistencia y a la propulsión.
    weight_adjustability:
      name: Capacidad de ajuste de peso
      description: Describe si la resistencia del producto puede ser modificada por
        el usuario (por ejemplo, seleccionable o con carga) o si está fija en un único
        peso.
    weight_integration_system:
      name: Sistema de integración de peso
      description: Describe si los lastres están integrados en el BCD y cómo lo están
        (por ejemplo, bolsillos para lastres desmontables, ninguno, complemento opcional).
    weight_plate_compatibility:
      name: Compatibilidad de las placas de peso
      description: Define el diámetro de las placas de peso que acepta la máquina
        (olímpica, estándar o ambas).
    weight_plate_style:
      name: Estilo de la placa de peso
      description: Clasifica el diseño/tipo de la placa de peso (por ejemplo, olímpica,
        de parachoques, con selector) para un filtrado rápido de compatibilidad.
    weightlifting_belt_style:
      name: Estilo del cinturón de levantamiento de pesas
      description: Categoriza el diseño general o la configuración específica del
        cinturón (por ejemplo, de palanca, de inmersión, cónico).
    weightlifting_federation_certification:
      name: Certificación de la federación de levantamiento de pesas
      description: Aprobación oficial o conformidad del producto por parte de federaciones
        de deportes de fuerza, como la IPF o la IWF.
    wetsuit_boot_height:
      name: Altura de la bota del traje de neopreno
      description: Clasifica la altura/corte de la bota en la pierna, que influye
        en la cobertura, la movilidad y la entrada de agua.
    wetsuit_entry_system:
      name: Sistema de entrada para trajes de neopreno
      description: Describe el tipo y ubicación del sistema de apertura/cremallera
        utilizado para acceder al traje de neopreno.
    wetsuit_seam_construction:
      name: Construcción de las costuras del trajes de neopreno
      description: Especifica cómo están construidas y selladas las costuras, lo que
        afecta a la calidez, la flexibilidad y la durabilidad.
    wheat_product_form:
      name: Forma de producto de trigo
      description: Especifica la forma física o procesada del producto de trigo.
    wheel_arrangement:
      name: Disposición de las ruedas
      description: Especifica la disposición de las ruedas de la locomotora de vapor
        (notación Whyte), que es una característica definitoria y un término de búsqueda
        habitual.
    wheel_brake_type:
      name: Tipo de freno de ruedas
      description: Detalla la configuración de frenado proporcionada en las ruedas
        o ruedecillas del carrito.
    wheel_chock_grip_features:
      name: Características del agarre del calzo para ruedas
      description: Características de diseño que proporcionan tracción y agarre, mejorando
        la capacidad de sujeción en superficies y frente a los neumáticos.
    wheel_cleaner_acidity_ph_category:
      name: Categoría de acidez/pH del limpiador de ruedas
      description: Indica si el limpiador de ruedas es ácido, neutro o alcalino (y
        opcionalmente si se comercializa como un producto con pH equilibrado).
    wheel_cleaner_formula_type:
      name: Tipo de fórmula del limpiador de ruedas
      description: Para limpiadores de ruedas y soluciones de lavado relacionadas,
        indica la categoría de fórmula principal del producto (por ejemplo, a base
        de ácido, no ácido, pH neutro/equilibrado o reactivo al hierro).
    wheel_construction_type:
      name: Tipo de construcción de ruedas
      description: Especifica el método de fabricación/construcción de la rueda.
    wheel_contaminant_target:
      name: Objetivo de eliminación de contaminantes de la rueda
      description: Especifica los principales tipos de contaminación que el limpiador
        está diseñado para eliminar.
    wheel_core_type:
      name: Tipo de núcleo de ruedas
      description: Describe el estilo de construcción del núcleo de la rueda, que
        influye en el peso, la rigidez y la transferencia de energía.
    wheel_cylinder_inlet_port_thread_standard:
      name: Estándar de rosca del puerto de entrada del cilindro de rueda
      description: Especifica el estándar de rosca del puerto de entrada de la línea
        de freno en el cilindro de la rueda (por ejemplo, abocardado de burbuja métrica
        o abocardado invertido SAE).
    wheel_fastener_seat_type:
      name: Tipo de asiento de fijación de la rueda
      description: Especifica el estilo de asiento de la tuerca/tornillo que se acopla
        a la rueda (por ejemplo, cónico, esférico/radiado, plano, magnético/con vástago).
    wheel_illumination:
      name: Iluminación de la rueda
      description: Indica si la rueda tiene iluminación incorporada o funciones luminiscentes.
    wheel_material:
      name: Material de la rueda
      description: Identifica la composición principal de las ruedas, que afecta a
        la durabilidad, el agarre y la amortiguación de vibraciones.
    wheel_profile:
      name: Perfil de rueda
      description: Describe la forma de la sección transversal de la rueda que afecta
        a la velocidad, el agarre y la agilidad.
    wheel_setup_type:
      name: Tipo de configuración de rueda
      description: Define el estilo de configuración de las ruedas que se utiliza
        en los patines.
    wheel_system_finish:
      name: Acabado del sistema de ruedas
      description: Acabado/recubrimiento superficial de llantas/ruedas y ciertas piezas/accesorios
        de las ruedas.
    whip_style:
      name: Estilo de látigo
      description: Clasifica el producto según su estilo específico de fusta o látigo
        ecuestre o la disciplina para la que está destinado.
    whipped_cream_base:
      name: Base de crema batida
      description: Identifica el ingrediente base principal utilizado para elaborar
        la nata montada, como por ejemplo la nata de vaca o el coco.
    whipped_cream_form:
      name: Forma de la nata montada
      description: Indica el formato físico en el que se vende la nata montada.
    whistle_head_material:
      name: Material de la cabeza del silbato
      description: Especifica el material de la cabeza/boquilla del silbato (bloque/cabezal
        de la boquilla).
    whistle_light_features:
      name: Características de la luz del silbato
      description: Indica si el silbato incluye efectos de luz integrados para fiestas
        (por ejemplo, LED).
    whistle_purpose:
      name: Propósito del silbato
      description: Identifica el uso principal previsto del silbato (entrenamiento
        deportivo, seguridad marítima, adiestramiento canino, etc.).
    whistle_sound_style:
      name: Estilo de sonido del silbato
      description: Describe el estilo/carácter del sonido emitido por el silbato (por
        ejemplo, tono único frente a tono múltiple).
    white_glue_finish_appearance_when_dry:
      name: Acabado/aspecto del pegamento blanco una vez seco
      description: Especifica el aspecto que tiene el pegamento después de secarse
        para uso en manualidades/oficina (por ejemplo, transparente u opaco).
    white_glue_washability:
      name: Lavabilidad de la cola blanca
      description: Indica si el pegamento seco se puede lavar/limpiar de las telas
        o la piel.
    whitewater_kayak_style:
      name: Estilo de kayak de aguas bravas
      description: Intención de diseño principal dentro del segmento de aguas bravas
        (por ejemplo, Creekboat, River Runner, Playboat).
    whitewater_rating_class:
      name: Clasificación de aguas bravas (clase)
      description: El nivel más alto de la escala internacional de dificultad del
        río para el que la balsa se puede utilizar.
    whorl_mounting_interface:
      name: Interfaz de montaje del huso
      description: Cómo se une el volante a la rueca (tipo de eje/conexión).
    wick_construction_type:
      name: Tipo de construcción de la mecha
      description: La construcción/estilo de la mecha (trenzada, plana, trenza cuadrada,
        con núcleo, de madera, etc.).
    wick_core_type:
      name: Tipo de núcleo de la mecha
      description: Si la mecha es sin núcleo o incluye un material de núcleo (por
        ejemplo, de papel o de zinc) afecta a la rigidez y a las características de
        combustión.
    wick_tab_crimp_type:
      name: Tipo de engarce de la pestaña de la mecha
      description: Cómo la pestaña de la mecha asegura la mecha (construcción/estilo
        de engarce).
    wick_tab_material:
      name: Material de la base de la mecha
      description: Material de la pestaña/soporte adjunto (generalmente hojalata),
        relevante para la resistencia a la corrosión y las preferencias normativas
        (por ejemplo, evitar el potencial de corrosión).
    wick_tab_shape:
      name: Forma de la pestaña de la mecha
      description: Forma/factor de forma de la placa de la pestaña de la mecha.
    wick_type_included:
      name: Tipo de mecha incluido
      description: Especifica el material/tipo de mecha incluido en el kit.
    wig_fiber_material:
      name: Material de fibra de la peluca
      description: Identifica la fibra principal utilizada para el cabello de la peluca,
        para que el comprador pueda elegir fácilmente entre variedades de cabello
        humano y opciones sintéticas con diferentes características de peinado y durabilidad.
    wildlife_attractant_scent:
      name: Aroma atrayente para animales
      description: Identifica el principal aroma utilizado para atraer a la fauna
        silvestre, abarcando los olores naturales de los alimentos y los olores de
        tipo feromona.
    willow_grade:
      name: Grado del sauce
      description: Especifica el grado de calidad del sauce utilizado, indicando la
        estructura de la fibra y el nivel de rendimiento general.
    willow_type:
      name: Tipo de sauce
      description: Indica el tipo de sauce o material alternativo utilizado para la
        pala del bate, lo cual tiene gran influencia en el rendimiento, la durabilidad
        y el precio.
    wind_up_mechanism_type:
      name: Tipo de mecanismo de cuerda
      description: Especifica cómo se da cuerda o se activa el juguete.
    wind_up_toy_movement_pattern:
      name: Patrón de movimiento del juguete de cuerda
      description: Describe el movimiento principal que se produce al darle cuerda.
    windbreak_purpose:
      name: Propósito del cortavientos
      description: Define el uso principal previsto del cortavientos.
    windfoil_board_mounting_system:
      name: Sistema de montaje de la tabla de windfoil
      description: Especifica la caja de la lámina o la interfaz de montaje integrada
        en la tabla de windfoil.
    windfoil_sail_style:
      name: Estilo de vela de windfoil
      description: Clasifica la vela según el estilo o la disciplina de navegación
        prevista.
    winding_direction:
      name: Dirección de rotación
      description: Indica el patrón de rotación que admite el remontador de relojes
        (en el sentido de las agujas del reloj, en sentido contrario a las agujas
        del reloj o bidireccional).
    winding_method:
      name: Método de rotación
      description: Cómo se debe rotar/cargar la trama para su uso en la lanzadera.
    winding_speed_control_type:
      name: Tipo de control de velocidad de rotación
      description: Indica el método utilizado para controlar la velocidad de rotación
        durante el uso.
    winding_type:
      name: Tipo de rotación
      description: Especifica la construcción de rotación de las cuerdas del bajo
        (perfil de envoltura exterior).
    windlass_control_station_type:
      name: Tipo de estación del control de molinete
      description: Tipo de interfaz de control incluida o compatible para el funcionamiento
        del molinete.
    windlass_mount_type:
      name: Tipo de montaje del cabrestante
      description: Dónde y cómo se prevé montar el molinete en la embarcación.
    window_component_location:
      name: Ubicación de los componentes de la ventana
      description: Especifica a qué ventana/abertura dentro del vehículo se aplica
        la pieza (por ejemplo, parabrisas, cristal de la puerta, luneta trasera o
        cristal del cuarto delantero).
    window_configuration:
      name: Configuración de ventanas
      description: Indica la presencia y el tamaño relativo de ventanas de visibilidad
        transparentes en el perfil aerodinámico del ala.
    window_glass_construction:
      name: Construcción de vidrio de la ventana
      description: Especifica la construcción de seguridad/laminación del vidrio de
        las ventanas de los vehículos automotores.
    window_glass_features:
      name: Características del vidrio de la ventana
      description: Indica si el cristal ayuda a integrar tecnologías del vehículo
        (por ejemplo, sensor de lluvia, soporte para cámara).
    window_glass_finish:
      name: Acabado del vidrio de la ventana
      description: Especifica la variación de acabado/tono/privacidad del vidrio de
        las ventanas de los vehículos automotores.
    window_glass_tint_color:
      name: Color de tinte de vidrio para ventana
      description: Especifica el color del tinte presente en el vidrio (no el color
        general del producto).
    window_glass_tint_level:
      name: Nivel de tintado del cristal de la ventana
      description: Indica el grado aproximado de oscurecimiento de fábrica/tintado
        de privacidad del cristal de la ventana (no se refiere a láminas instaladas
        postventa). Utiliza los niveles descriptivos cuando no se conozca el VLT exacto.
    window_net_latch_mechanism:
      name: Mecanismo de cierre de la red de la ventana
      description: Especifica el mecanismo de cierre/liberación utilizado para la
        red de la ventana (por ejemplo, botón pulsador, palanca, hebilla tipo cinturón
        de seguridad).
    window_net_mounting_hardware:
      name: Hardware de montaje de la red para ventana
      description: Indica el tipo de hardware de montaje o método de fijación utilizado
        para instalar la red (por ejemplo, con clip, tornillos, gancho o varilla),
        o si se incluyen hardware.
    window_net_opening_direction:
      name: Dirección de apertura de la red de la ventana
      description: Especifica cómo se abre/libera la red de la ventana con respecto
        al ocupante para facilitar la salida y el cumplimiento de las normas.
    window_regulator_operation:
      name: Funcionamiento del regulador de la ventana
      description: Especifica cómo se acciona el regulador de la ventana (manivela
        manual o eléctrico).
    windshield_coverage_area:
      name: Área de cobertura del parabrisas
      description: Especifica qué partes del exterior delantero del vehículo está
        diseñado para proteger la cubierta del parabrisas (por ejemplo, solo el parabrisas
        o incluye limpiaparabrisas, espejos, ventanas laterales o el borde del capó).
    windshield_mount_attachment_method:
      name: Método de sujeción del soporte al parabrisas
      description: Especifica cómo el soporte se adhiere o se sujeta a la superficie
        del parabrisas.
    windshield_washer_fluid_seasonality:
      name: Estacionalidad del líquido limpiaparabrisas
      description: Indica la estación/clima previsto o el uso principal de la formulación
        del líquido limpiaparabrisas (por ejemplo, descongelante de invierno, lavado
        de emergencia de verano, para todas las estaciones).
    windsurf_fin_style:
      name: Estilo de la aleta de windsurf
      description: Clasifica la aleta según la disciplina de navegación o el estilo
        de uso previsto (por ejemplo, olas, eslalon, algas).
    windsurfing_connection_standard:
      name: Estándar de conexión para windsurf
      description: Interfaz mecánica o tipo de caja utilizada para fijar la pieza
        a la placa o al soporte.
    windsurfing_sail_style:
      name: Estilo de vela de windsurf
      description: Clasifica la disciplina o el uso previsto de la vela, como por
        ejemplo olas, freeride o foil.
    wine_additive_type:
      name: Tipo de aditivo de vino
      description: Especifica de qué tipo de producto para la elaboración de vino
        tinto se trata (ingrediente, aditivo, levadura, agente clarificante, kit,
        etc.).
    wine_body:
      name: Cuerpo del vino
      description: Describe el peso percibido y la sensación en boca del vino.
    wine_carbonation:
      name: Carbonatación del vino
      description: Indica si el vino es no espumoso, semiespumoso o espumoso y, en
        su caso, la intensidad de la efervescencia.
    wine_making_ingredient_type:
      name: Tipo de ingrediente para la elaboración del vino
      description: Especifica la categoría de ingredientes funcionales para los aditivos
        e ingredientes consumibles en la elaboración del vino.
    wine_making_stage:
      name: Etapa de elaboración del vino
      description: Indica para qué etapa del proceso de elaboración del vino está
        destinado el producto.
    wine_style:
      name: Estilo de vino
      description: Clasifica el estilo general de producción del vino, además del
        color, como por ejemplo no espumoso, espumoso o fortificado.
    winemaking_process_stage:
      name: Etapa del proceso de elaboración del vino
      description: Indica la etapa principal del proceso de elaboración del vino para
        la que está destinada el suministro.
    wing_count:
      name: Cantidad de aletas
      description: Número de alas/brazos del bumerán.
    wing_handle_type:
      name: Tipo de asa para wingfoil
      description: Especifica el estilo del sistema de agarre de la mano en el ala
        del wingfoil.
    wing_part_type:
      name: Tipo de pieza del ala
      description: Identifica el componente específico o la pieza de repuesto para
        un ala de wingfoil.
    wingfoiling_style:
      name: Estilo de wingfoil
      description: Indica la disciplina específica de wingfoil o el estilo de navegación
        al que se dirige el producto.
    wiper_arm_finish:
      name: Acabado del brazo del limpiaparabrisas
      description: Acabado superficial o revestimiento protector aplicado al brazo
        del limpiaparabrisas, lo que influye en la resistencia a la corrosión y el
        aspecto estético.
    wiper_arm_pivot_mount_type:
      name: Tipo de montaje del pivote del brazo del limpiaparabrisas
      description: Especifica cómo se monta el brazo del limpiaparabrisas en el mecanismo
        o pivote del limpiaparabrisas del vehículo.
    wiper_blade_attachment_type:
      name: Tipo de fijación de la escobilla del limpiaparabrisas
      description: Especifica el tipo de conector/sistema de fijación utilizado para
        montar la escobilla del limpiaparabrisas en el brazo del mismo.
    wiper_blade_rubber_material:
      name: Material de la goma de las escobillas del limpiaparabrisas
      description: Material del elemento de limpieza (inserto/recambio) que entra
        en contacto con el cristal.
    wiper_system_position:
      name: Posición del sistema de limpiaparabrisas
      description: Indica la posición de montaje del sistema de limpiaparabrisas en
        el vehículo.
    wire_coating_material:
      name: Material de recubrimiento del alambre
      description: Especifica el material del revestimiento exterior aplicado al alambre
        (no el material del núcleo del alambre), que puede afectar a la resistencia
        a la abrasión y a la facilidad con la que pasa a través de los orificios de
        las cuentas.
    wire_coating_type:
      name: Tipo de recubrimiento del alambre
      description: Especifica si el alambre está recubierto o revestido, y de qué
        manera (en cuanto a color, protección y textura).
    wire_construction_type:
      name: Tipo de construcción del cable
      description: Especifica la construcción física del alambre para bisutería, como
        por ejemplo si es trenzado o sólido y si está recubierto.
    wire_finish:
      name: Acabado del alambre
      description: Especifica el acabado superficial, el recubrimiento o el chapado
        aplicado al alambre (por ejemplo, pulido, esmaltado, galvanizado, chapado),
        que afecta a la apariencia y a la resistencia al deslustre y la corrosión.
    wire_gauge_awg:
      name: Calibre del alambre (AWG)
      description: Tamaño AWG (American Wire Gauge) de los conductores utilizados
        en el arnés de cableado.
    wire_insulation_material:
      name: Material de aislamiento del cable
      description: Material del aislamiento/revestimiento del alambre utilizado en
        el arnés (influye en la temperatura/resistencia química).
    wire_packaging_type:
      name: Tipo de embalaje del cable
      description: Especifica la forma en que se vende/empaqueta el alambre.
    wire_shape_profile:
      name: Forma/perfil del alambre
      description: Describe la forma de la sección transversal del alambre.
    wiring_configuration:
      name: Configuración del cableado
      description: Indica si la espada de esgrima de valla se suministra precableada
        para el sistema de puntuación eléctrica, sin cable, inalámbrica o destinada
        a la práctica sin electricidad.
    wobbler_style:
      name: Estilo del wobbler
      description: Define el diseño/estilo de acción específico del wobbler oscilante,
        como por ejemplo un crankbait o un jerkbait.
    wood_block_surface_preparation:
      name: Preparación de la superficie del bloque de madera
      description: Indica el estado de la superficie del bloque de madera, lista para
        su uso, para acabados y manualidades.
    wood_grain_direction:
      name: Dirección de la veta de la madera
      description: Dirección de la veta de la madera en relación con la dimensión
        más larga del producto (importante para la resistencia, el comportamiento
        de corte y la apariencia).
    wood_slice_edge_style:
      name: Estilo de borde de rebanada de madera
      description: Estado del borde de la rebanada, como por ejemplo borde de corteza
        natural frente a borde liso/lijado.
    wooden_block_special_features:
      name: Características especiales del bloque de madera
      description: Funcionales destacables incluidas en el set de bloques de madera.
    woodwind_body_construction:
      name: Construcción del cuerpo del instrumento de viento de madera
      description: Indica si el instrumento está fabricado en una sola pieza o en
        varias secciones (por ejemplo, de 2 o 3 piezas), lo que afecta a la limpieza,
        el almacenamiento y la portabilidad.
    woodwind_polishing_cloth_intended_use:
      name: Uso previsto del paño de pulido para instrumentos de viento de madera
      description: Especifica para qué está diseñado principalmente el paño para limpiar/pulir
        en un instrumento de viento de madera.
    woodwind_small_part_type:
      name: Piezas pequeñas de instrumentos de viento de madera
      description: Especifica de qué tipo de pieza de repuesto pequeña para clarinete
        se trata (por ejemplo, hardware de las llaves, almohadillas/corcho/fieltros,
        anillos).
    woofer_mounting_type:
      name: Tipo de montaje del woofer
      description: Cómo se supone que se debe montar/utilizar el woofer (al aire libre
        o en caja) y formas comunes de montaje en automóviles.
    woofer_surround_material:
      name: Material de la envoltura del woofer
      description: Material utilizado para el borde del woofer (anillo de suspensión
        exterior).
    worn_on_finger:
      name: Dedo en el que se lleva
      description: Especifica en qué dedo se debe usar la guía del dedal.
    wrap_style:
      name: Estilo de envoltura
      description: Indica cuántas vueltas debe dar el cinturón alrededor de la cintura.
    wrapping_occasion:
      name: Ocasión del envoltorio
      description: Ocasión principal de la celebración/del regalo para la que está
        destinado el papel de regalo.
    wrapping_paper_features:
      name: Características del papel de regalo
      description: Propiedades funcionales y relacionadas con la sostenibilidad del
        papel de regalo, como la resistencia al desgarro, el contenido reciclado o
        los formatos de hojas precortadas.
    wrestling_dummy_design:
      name: Diseño del maniquí de lucha libre
      description: Forma general del cuerpo o la postura del maniquí, como forma de
        una persona de pie o la de un saco de lanzar, determina los ejercicios de
        entrenamiento aplicables.
    wrestling_mat_safety_certifications:
      name: Certificaciones de seguridad para colchonetas de lucha libre
      description: Enumera las certificaciones o normas de seguridad de la industria
        o de cualquier organismo deportivo que cumple la colchoneta.
    wrist_strap_style:
      name: Estilo de correa para muñeca
      description: Describe el estilo de la correa de la muñeca (o la ausencia de
        ella) que afecta a la ayuda y al ajuste.
    wrist_support_style:
      name: Estilo de muñequera
      description: Identifica la construcción o el estilo de la muñequera, como una
        férula, un guante, una cinta o una venda, para ayudar al usuario a elegir
        la opción que mejor se adapte a sus preferencias y rendimiento.
    xylophone_range_octaves:
      name: Rango de xilofón (octavas)
      description: El rango total del xilófono expresado en octavas (por ejemplo,
        2,5 octavas, 3 octavas, 4 octavas).
    xylophone_resonator_type:
      name: Tipo de resonador del xilófono
      description: Tipo de sistema de resonador utilizado para amplificar el tono
        (si lo hay).
    yam_variety:
      name: Variedad de ñame
      description: Especifica el cultivar o la variedad común de ñame que se vende
        (por ejemplo, morado, amarillo, pata de elefante).
    yarn_cutter_physical_style:
      name: Estilo físico del cortador de hilo
      description: Identifica el estilo físico de un cortador de hilo (por ejemplo,
        colgante, anillo, tijeras) para facilitar la búsqueda y el filtrado dentro
        de esta categoría.
    yarn_finish_or_effect:
      name: Acabado o efecto del hilo
      description: Destaca las variaciones visuales o funcionales especiales aplicadas
        al hilo, como la fluorescencia o el brillo metálico.
    yarn_guide_style:
      name: Estilo de guía del hilo
      description: El estilo físico del componente de guía del hilo.
    yarn_swift_adjustability:
      name: Ajustabilidad del carrete de hilo
      description: Indica si el carrete se puede ajustar y cómo (expandible, plegable/desplegable),
        lo que afecta al almacenamiento y al rango de tamaño de madeja que puede manejar.
    yarn_swift_bearing_type:
      name: Tipo de cojinete del carrete de hilo
      description: Describe el mecanismo de rotación (por ejemplo, rodamiento de bolas)
        que afecta la suavidad y la velocidad de bobinado.
    yeast_application:
      name: Aplicación de levadura
      description: Indica el uso principal previsto, ya sea culinario o de fermentación,
        del producto de levadura.
    yo_yo_accessory_part_type:
      name: Tipo de accesorio/pieza de yo-yo
      description: Identifica qué tipo de pieza de repuesto o accesorio para yo-yo
        es el producto (por ejemplo, cuerda, rodamiento, almohadillas de respuesta).
    yo_yo_axle_system_type:
      name: Sistema de eje del yo-yo
      description: Enfoque de construcción para el eje del yo-yo (por ejemplo, eje
        fijo frente a transeje), que influye en la sensación de juego y mantenimiento.
    yo_yo_bearing_size_class:
      name: Clase de tamaño del rodamiento yo-yo
      description: Clase de tamaño del rodamiento estandarizado utilizado por el yo-yo,
        cuando corresponda.
    yo_yo_bearing_type:
      name: Tipo de rodamiento del yo-yo
      description: Configuración de los rodamientos que impactan en la capacidad de
        respuesta y las características de giro.
    yo_yo_play_style:
      name: Estilo de juego del yo-yo
      description: Estilo de juego principal previsto para el yo-yo, que refleja la
        disciplina de cadena/truco para la que está diseñado el producto.
    yo_yo_response_system:
      name: Sistema de respuesta del yo-yo
      description: Especifica el mecanismo de respuesta del yo-yo para el que está
        diseñada esta pieza (compatibilidad).
    yo_yo_responsiveness:
      name: Capacidad de respuesta del yo-yo
      description: Si el yo-yo regresa a la mano con un tirón (reactivo) o requiere
        un agarre (no reactivo).
    yo_yo_string_material:
      name: Material de la cadena del yo-yo
      description: Composición material de la cadena yo-yo.
    yogurt_base_ingredient:
      name: Ingrediente base del yogur
      description: Identifica la principal fuente de leche o de origen vegetal utilizada
        para elaborar el yogur, dato fundamental para tener en cuenta las preferencias
        dietéticas y las alergias.
    yoke_type:
      name: Tipo de horquilla
      description: Identifica el tipo de soporte o horquilla que ayuda a colocar el
        arma de fuego en el monopie.
    zill_playing_style:
      name: Estilo de ejecución de los crótalos
      description: Contexto/estilo de interpretación previsto (comúnmente danza del
        vientre o variantes orquestales/culturales).
    zill_strap_material:
      name: Material de la correa de los crótalos
      description: Material de la correa para el dedo/elástico utilizado para sujetar
        los címbalos (si se incluyen), influye en la comodidad, la durabilidad y el
        agarre.
    zills_strap_adjustability:
      name: Ajuste de la correa los címbalos
      description: Si la correa/elástico incluido se puede ajustar para un mejor ajuste
        y cómo hacerlo.
    zipper_application:
      name: Uso de la cremallera
      description: Especifica el proyecto o el uso para el que está diseñada la cremallera.
    zipper_chain_type:
      name: Tipo de cadena de la cremallera
      description: Especifica la construcción/tipo de la cadena/dientes de la cremallera.
    zipper_end_type:
      name: Tipo de acabado de la cremallera
      description: Indica cómo termina la cremallera y si es de extremo abierto (separable)
        o de extremo cerrado (no separable), incluyendo hardware común de extremo
        separador utilizado en las cremalleras para manualidades.
    zipper_gauge:
      name: Calibre de la cremallera
      description: 'Indica el calibre/tamaño de la cadena de la cremallera, que normalmente
        se expresa como un número con un # (por ejemplo, #3 o #5), que se correlaciona
        con el ancho del diente/bobina y el uso previsto.'
    zipper_opening_length:
      name: longitud de apertura de la cremallera
      description: Define qué parte de la abertura frontal tiene cremallera, distinguiendo
        entre los estilos con cremallera completa, de media cremallera o de cuarto
        de cremallera.
    zipper_pull_material:
      name: Material del tirador de la cremallera
      description: Especifica el material del tirador o lengüeta de la cremallera
        (la parte que se agarra), a diferencia de los dientes/cadena y la cinta de
        la cremallera.
    zipper_pull_side:
      name: Lado del tirador de la cremallera
      description: Especifica desde qué lado de la cremallera se puede acceder a la
        lengüeta de apertura.
    zipper_pull_strap_cord_tab_material:
      name: Material de la correa/cordón/pestaña de la cremallera
      description: Material de la correa/cordón/pestaña/borla que se adjunta al tirador
        de la cremallera (si lo hay), excluyendo el cuerpo/hardware principal del
        tirador de la cremallera.
    zipper_reversibility_mechanism:
      name: Mecanismo de reversibilidad de la cremallera
      description: Especifica cómo es reversible la cremallera (por ejemplo, cursor
        de doble cara o cursor reversible/de bloqueo automático diseñado para prendas
        reversibles).
    zipper_separating_type:
      name: Tipo de separación de la cremallera
      description: Indica si la cremallera se separa en la parte inferior/superior
        o si es de extremo cerrado, para que sea compatible con chaquetas, sacos de
        dormir, mochilas, etc.
    zipper_side:
      name: Lado de la cremallera
      description: Indica el lado en el que se encuentra la cremallera principal cuando
        el saco de dormir está colocado boca arriba.
    zipper_slider_material:
      name: Material del deslizador de la cremallera
      description: Especifica el material del deslizador de la cremallera (el mecanismo
        móvil), que puede influir en la resistencia y la corrosión.
    zipper_slider_pull_configuration:
      name: Configuración del deslizador/tirador de la cremallera
      description: Indica si la cremallera tiene uno o dos tiradores/deslizadores,
        y si los tiradores están a uno o ambos lados del deslizador.
    zipper_style:
      name: Estilo de cremallera
      description: Indica el largo de la cremallera o su presencia en la prenda (por
        ejemplo, sin cremallera, con cremallera de tres cuartos, con media cremallera,
        con cremallera completa).
    zipper_tape_material:
