    shaving_cream_formulation:
      name: Formulación de la crema de afeitar
      description: Especifica la textura de las cremas de afeitar, como gel o espuma.
    shaving_kit_components:
      name: Componentes del kit de afeitado
      description: Especifica los artículos que incluye un kit de afeitado, como una
