    base_type:
      name: Tipo de base
      description: Define el tipo de base, normalmente de micrófonos, como, por ejemplo,
        abrazadera o trípode.
    baseball/softball_ball_type:
      name: Tipo de pelota de béisbol/sóftbol
      description: Especifica si una pelota está diseñada para sóftbol o béisbol.
    basket_material:
      name: Material de la cesta
      description: Especifica el tipo de material utilizado en una cesta, como el
        mimbre o el metal.
    basketball_equipment_included:
      name: Equipo de baloncesto incluido
      description: Especifica el equipo de baloncesto que incluye el producto, como
        la red y el poste.
    bass_button_configuration:
      name: Configuración del botón del bajo
      description: Especifica el número de botones de bajos de los acordeones, como
