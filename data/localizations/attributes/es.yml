    battery_features:
      name: Características de la batería
      description: Describe las características especiales de una batería, como la
        carga rápida o la resistencia al calor.
    battery_management_features:
      name: Características de gestión de la batería
      description: Identifica las capacidades de un sistema de gestión de baterías,
        como la detección de fallos o la supervisión remota.
    battery_mounting_type:
      name: Tipo de montaje de la batería
      description: Identifica el estándar de montaje o conexión física del paquete
        de batería.
    battery_size:
      name: Tamaño de la batería
      description: Indica las pilas que admite el producto, como AAA o de 9 V.
    battery_technology:
      name: Tecnología de la batería
      description: Especifica el tipo de batería que se usa en electrónica, como alcalina
        o de iones de litio.
    battery_terminal_type:
      name: Tipo de terminal de la batería
      description: Especifica el estilo físico del conector en los terminales de la
        batería.
    battery_type:
      name: Tipo de batería
      description: 'Distingue entre tipos de pilas, como desechables o recargables. '
    bead_shape:
      name: Forma de la cuenta
      description: Describe la forma o el diseño de las cuentas, como redondas o en
        forma de corazón.
    beard_care_benefits:
      name: Beneficios del cuidado de la barba
      description: Enumera los beneficios funcionales principales ofrecidos por el
        producto para la barba y la piel subyacente.
    beat_subdivisions:
      name: Subdivisiones de ritmo
      description: Especifica la división rítmica de tiempos de los metrónomos, como
