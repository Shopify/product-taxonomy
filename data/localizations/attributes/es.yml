---
es:
  attributes:
    3d_glasses_fit_design:
      name: Diseño de ajuste de gafas 3D
      description: Indica cómo se usan o se colocan las gafas (p. ej., clip-on, envolvente,
        sobrepuestas).
    3d_glasses_material:
      name: Material de gafas 3D
      description: Especifica el material utilizado para las gafas 3D, como el bambú
        o el acero inoxidable.
    3d_glasses_technology:
      name: Tecnología de gafas 3D
      description: Especifica la tecnología de imagen/sincronización 3D para la que
        están diseñadas las gafas, determinando la compatibilidad con pantallas o
        proyectores específicos.
    3d_printer_case_style:
      name: Estilo de funda para impresora 3D
      description: Clasifica el tipo de producto general para que los compradores
        puedan diferenciar entre bolsas de transporte blandas, estuches de carcasa
        dura, recintos estacionarios y simples cubiertas antipolvo.
    3d_printer_cleaning_kit_components_included:
      name: Componentes incluidos en el kit de limpieza para impresora 3D
      description: Enumera las herramientas y consumibles individuales proporcionados
        en el kit para que los compradores sepan exactamente qué están comprando.
    3d_printing_resin_type:
      name: Tipo de resina para impresión 3D
      description: Especifica la formulación o aplicación prevista de la resina, ayudando
        a los compradores a identificar rápidamente si la resina es estándar, de grado
        de ingeniería, moldeable u otros tipos especializados.
    80_plus_efficiency_rating:
      name: Calificación de eficiencia 80 Plus
      description: Denota el nivel de certificación oficial de eficiencia energética
        80 Plus que la PSU ha alcanzado.
    abrasive_material:
      name: Material abrasivo
      description: Identifica el tipo de abrasivo que se utiliza en las herramientas
        de lijado, como el diamante o el carburo de silicio.
    absinthe_style:
      name: Estilo de absenta
      description: Define el estilo de absenta, por ejemplo, mezclada o destilada.
    absinthe_variety:
      name: Variedad de absenta
      description: Diferencia los productos de absenta por sus variedades únicas,
        por ejemplo, roja o verde.
    absorbency_level:
      name: Nivel de absorbencia
      description: Define la capacidad de absorción de los artículos de higiene personal,
        como, por ejemplo, noche o ligera.
    absorbent_hygiene_product_features:
      name: Características del producto de higiene absorbente
      description: Identifica las características especiales de los productos de higiene,
        como a prueba de fugas o hipoalergénicos.
    academic_level:
      name: Nivel académico
      description: Especifica el nivel académico del contenido multimedia, como licenciatura
        o doctorado.
    accessibility_design_features:
      name: Características del diseño de accesibilidad
      description: Enumera elementos de diseño especiales que ayuden a los usuarios
        con problemas de audición, visión o destreza.
    accessory_material:
      name: Material de accesorios
      description: Especifica el tipo de material de los accesorios, normalmente para
        suministros de envío, como plástico o cartón.
    accessory_size:
      name: Tamaño de accesorio
      description: Define el tamaño de un producto accesorio, como de talla única
        o compacto.
    accordion_tuning:
      name: Afinación de acordeón
      description: Especifica el tipo de afinación que se utiliza en un acordeón,
        como de tono o de concierto.
    activation_mechanism:
      name: Mecanismo de activación
      description: Especifica el método principal que activa la alarma.
    activation_method:
      name: Método de activación
      description: Describe cómo se activa el crédito prepago o SIM por parte del
        usuario.
    active_ingredient:
      name: Principio activo
      description: Identifica sustancias primarias de los artículos de cuidado personal,
        por ejemplo, la vitamina A o el retinol.
    activewear_clothing_features:
      name: Características de la ropa deportiva
      description: Identifica características únicas de la ropa deportiva, como el
        diseño elástico 4-Way Stretch o transpirable.
    activity:
      name: Actividad
      description: Especifica el deporte o la actividad para los que está diseñado
        el producto, como el tenis o el pilates.
    activity_tracker_design:
      name: Diseño de rastreador de actividad
      description: Especifica la fijación del dispositivo de seguimiento de actividad,
        por ejemplo, mediante clip o brazalete.
    acupuncture_model_format:
      name: Formato de modelo de acupuntura
      description: Define el tamaño y la escala de los modelos de acupuntura, por
        ejemplo, de tamaño natural o miniatura.
    acupuncture_model_type:
      name: Tipo de modelo de acupuntura
      description: 'Especifica la parte del cuerpo o especie que representa el modelo
        de acupuntura, por ejemplo, cabeza, mano o animal. '
    adapter_directionality:
      name: Direccionalidad del adaptador
      description: Indica si el adaptador soporta flujo de señal en ambas direcciones
        o solo en una dirección especificada.
    adapter_operating_modes:
      name: Modos de operación del adaptador
      description: Especifica si el adaptador funciona como receptor Bluetooth, transmisor
        o ambos.
    adaptive_sync_technology:
      name: Tecnología de sincronización adaptativa
      description: Especifica la tecnología de frecuencia de actualización variable
        (VRR) compatible con el monitor para imágenes sin desgarros.
    adc_resolution:
      name: Resolución del ADC
      description: Especifica la resolución (en bits) del convertidor analógico-digital
        integrado, definiendo la precisión de medición.
    additional_animation_software_features:
      name: Características adicionales del software de animación
      description: Especifica características únicas en software de edición de animación,
        como animación de personajes o efectos visuales
    additional_cleaning_technology:
      name: Tecnología de limpieza adicional
      description: Enumera cualquier tecnología de limpieza incluida además del vapor
        (p. ej., ultrasónica, UV, ozono).
    additional_design_software_type:
      name: Tipo de software de diseño adicional
      description: Especifica capacidades adicionales del software de diseño, como
        visitas virtuales o diseño de paisajes
    additional_financial_software_features:
      name: Características adicionales del software de finanzas
      description: Identifica capacidades adicionales del software financiero, como
        gestión de activos o auditoría y cumplimiento
    additional_graphic_software_features:
      name: Características adicionales del software de gráficos
      description: Destaca capacidades adicionales del software gráfico, como ilustración
        digital o diseño de maquetación
    additional_publishing_software_features:
      name: Características adicionales del software de publicación
      description: Destaca funcionalidades adicionales en el software de publicación,
        como diseño de impresión o publicación digital
    additional_security_software_features:
      name: Características adicionales del software de seguridad
      description: Identifica capacidades adicionales del software de seguridad, por
        ejemplo, encriptación de disco, detección de intrusiones
    adhesive_application_type:
      name: Tipo de aplicación del adhesivo
      description: Define el servicio de pestañas o caso de uso previsto para el adhesivo.
    adhesive_features:
      name: Características adhesivas
      description: Destaca propiedades especiales del adhesivo usado en parches o
        cintas.
    adhesive_format:
      name: Formato del adhesivo
      description: Indica la forma física en la que se suministra el adhesivo para
        uso en reparaciones.
    adhesive_strength:
      name: Fuerza adhesiva
      description: Especifica el nivel de fuerza de unión o levantamiento del adhesivo
        de la tira nasal (p. ej., original, fuerza extra).
    adhesive_type:
      name: Tipo de adhesivo
      description: Identifica el tipo de adhesivo que se usa en un producto, como
        extraíble o permanente.
    aftershave_product_form:
      name: Forma del producto de loción para después del afeitado
      description: Identifica la consistencia de un producto para después del afeitado,
        como un bálsamo o una crema
    age_group:
      name: Grupo de edad
      description: Define el rango de edad objetivo de un producto, como los adultos
        o los niños.
    age_restrictions:
      name: Restricciones de edad
      description: Indica el requisito de edad mínima para un producto o evento, como
        18 años o más.
    ai_application:
      name: Aplicación de IA
      description: Especifica la función de la IA en el software, como el análisis
        predictivo o el reconocimiento de voz.
    air_freshener_form:
      name: Forma de ambientador
      description: Define el tipo de ambientador de coche, por ejemplo, de aceite
        o clip para difusores de aire.
    air_fryer_functions:
      name: Funciones de la freidora de aire
      description: Enumera los distintos modos de cocción disponibles en una freidora
        de aire o un aparato similar, por ejemplo, freír con aire, hornear.
    air_mattress_features:
      name: Características del colchón de aire
      description: Describe las características únicas de un colchón de aire, como
        la facilidad de inflado o la resistencia a pinchazos.
    air_tube_configuration:
      name: Configuración del tubo de aire
      description: Indica el número o estilo de tubos de inflado de aire integrados
        con el brazalete.
    airbrush_feed_type:
      name: Tipo de alimentación del aerógrafo
      description: Identifica el método de suministro de pintura de los aerógrafos,
        como mediante gravedad o sifón.
    airbrush_operation_method:
      name: Método de funcionamiento del aerógrafo
      description: Especifica el estilo de operación de los aerógrafos, por ejemplo,
        acción doble o acción simple
    aircraft_engine_configuration:
      name: Configuración del motor del avión
      description: Especifica el número de motores que propulsan el avión, como mono
        o bimotor
    aircraft_engine_type:
      name: Tipo de motor del avión
      description: Especifica el tipo de motor que propulsa el avión, como reactor
        o turbohélice
    airflow_opening_design:
      name: Diseño de apertura de flujo de aire
      description: Describe la configuración de respiración o ventilación incorporada
        en la boquilla.
    airsoft_equipment_included:
      name: Equipo de Airsoft incluido
      description: Especifica el equipo adicional que se incluye con los productos
        de Airsoft, como las gafas protectoras o el chaleco táctico.
    album_type:
      name: Tipo de álbum
      description: Describe el estilo de encuadernación de los kits de álbumes de
        recortes o estampados, por ejemplo, como la encuadernación con espiral o el
        álbum de recortes.
    alcohol/solvent_content:
      name: Contenido de “”Alcohol/Disolvente”
      description: Clasifica el producto en función de su contenido de alcohol o disolvente
        para fines de envío y reglamentarios (por ejemplo, “alcohol ≤24%”, “alcohol
        >24%”, “disolvente envase pequeño”).
    alcohol_content:
      name: Contenido de alcohol
      description: Indica si el tónico no contiene alcohol o, si está presente, aproximadamente
        cuánto alcohol contiene la fórmula.
    alert_type:
      name: Tipo de alerta
      description: Especifica el tipo de alerta que proporciona un producto, como
        las alarmas de sonido o las notificaciones de teléfonos inteligentes.
    allergen_information:
      name: Información sobre alérgenos
      description: Indica posibles alérgenos presentes en alimentos o bebidas, como
        el trigo o el maní.
    allergen_test_type:
      name: Tipo de prueba de alérgenos
      description: Especifica el tipo de alérgeno que el kit de prueba puede detectar,
        como alimentarios o ambientales.
    allergens:
      name: Alérgenos
      description: Indica posibles alérgenos en productos de salud y belleza, por
        ejemplo, el linalol o limoneno.
    allergy_friendly_features:
      name: Características aptas para personas alérgicas
      description: Identifica si un producto tiene propiedades hipoalergénicas, como
        sin látex o resistente al moho.
    amino_acid_subtype:
      name: Subtipo de aminoácido
      description: Especifica el tipo o perfil principal de aminoácidos contenidos
        en el suplemento.
    amplifier/booster_suitable_location:
      name: Ubicación adecuada del amplificador
      description: Especifica las mejores ubicaciones para el amplificador o amplificador
        de señal, como un vehículo o un lugar grande.
    amplifier_class:
      name: Clase de amplificador
      description: Define el tipo de amplificador, como AB o D.
    amplifier_configuration:
      name: Configuración del amplificador
      description: Especifica la configuración de los amplificadores para vehículos,
        como de dos o cuatro canales.
    amputation_level:
      name: Nivel de amputación
      description: Denota el nivel de amputación para el que está diseñado el reductor.
    analyte_measured:
      name: Analito medido
      description: Identifica el o los biomarcadores para los cuales la solución de
        control proporciona calibración.
    anamorphic_squeeze_ratio:
      name: Relación de compresión anamórfica
      description: Indica el factor de compresión horizontal de una lente anamórfica,
        lo que permite a los usuarios combinar las lentes con la salida de compresión
        deseada.
    anatomical_detail_displayed:
      name: Detalle anatómico mostrado
      description: Indica qué características anatómicas o de meridianos se resaltan
        en el modelo.
    anchor_type:
      name: Tipo de ancla
      description: Define el ancla utilizada en equipos de deportes acuáticos remolcados,
        como, por ejemplo de mapa o arado.
    anemometer_application:
      name: Aplicación del anemómetro
      description: Identifica el uso previsto de un anemómetro, como industrial o
        meteorológico.
    angles_supported:
      name: Ángulos admitidos
      description: Especifica el rango de ángulos que un producto puede acomodar,
        normalmente para electrónica, como, por ejemplo, ajustable, de 0° a 180°.
    angling_style:
      name: Estilo de pesca con caña
      description: Define la técnica de pesca para la que está diseñado el producto,
        como la pesca en la costa o la pesca con mosca.
    animal_feed_form:
      name: Forma de alimentación animal
      description: Especifica la forma del alimento para animales, como líquido o
        en gránulos.
    animal_type:
      name: Tipo de animal
      description: Especifica el tipo de animal al que está destinado un producto,
        como patos, ciervos o perros.
    answering_machine_type:
      name: Tipo de contestador automático
      description: Especifica la presencia y tecnología de un contestador automático
        integrado.
    antenna_connector_type:
      name: Tipo de conector de antena
      description: Especifica el conector de RF utilizado para conectar antenas externas.
    antenna_rf_connector_type:
      name: Tipo de conector RF de la antena
      description: Identifica el conector RF utilizado por la antena.
    antenna_type:
      name: Tipo de antena
      description: Especifica el tipo de antena de dispositivos electrónicos, como,
        por ejemplo, omnidireccional o de red.
    anti_agin_skin_care_type:
      name: Tipo de cuidado de la piel anti-edad
      description: Clasifica el tipo de producto antienvejecimiento para el cuidado
        de la piel, por ejemplo, mascarilla, tónico
    anti_perspirant_strength_level:
      name: Nivel de fuerza del antitranspirante
      description: Denota la clasificación de eficacia del antitranspirante (p. ej.,
        fuerza clínica, fuerza deportiva).
    antibody_class_tested:
      name: Clase de anticuerpo analizada
      description: Especifica la inmunoglobulina o biomarcador que detecta el kit
        (p. ej., IgE, IgG4).
    antifreeze_type:
      name: Tipo de anticongelante
      description: Especifica el tipo de anticongelante para el mantenimiento del
        vehículo, como, por ejemplo, concentrado o previamente diluido.
    antique_car_design:
      name: Diseño de autos antiguos
      description: Describe el estilo de diseño principal de un auto antiguo, como
        un T-bucket o un gran turismo.
    antique_vehicle_era:
      name: Era de los vehículos antiguos
      description: Describe el período histórico de un vehículo antiguo, como la Era
        del Latón o la Era Vintage.
    appliance_board_function:
      name: Función de la placa del electrodoméstico
      description: Especifica el papel funcional de la placa dentro del electrodoméstico.
    appliance_unit_location:
      name: Ubicación de la unidad del electrodoméstico
      description: Indica la sección física del electrodoméstico para la cual está
        destinada la placa (p. ej., unidad interior o exterior).
    application_area:
      name: Área de aplicación
      description: Especifica la parte del cuerpo o área donde se aplica el producto,
        por ejemplo, labios o cuerpo completo.
    application_method:
      name: Método de aplicación
      description: Define cómo se aplica o utiliza un producto, por ejemplo, gel,
        líquido o aerosol.
    application_type:
      name: Tipo de aplicación
      description: Indica si el tratamiento se deja puesto o se enjuaga y cualquier
        modo de uso especial.
    applicator_format:
      name: Formato del aplicador
      description: Describe la forma física o estilo del aplicador de loción o protector
        solar.
    applicator_material:
      name: Material del aplicador
      description: Especifica el material utilizado en el aplicador, normalmente de
        tampones, como, por ejemplo, el plástico o el cartón.
    applicator_type:
      name: Tipo de aplicador
      description: Identifica el tipo de aplicador incluido con los tampones, por
        ejemplo, con aplicador, sin aplicador
    applique/patch_shape:
      name: Forma de aplique/parche
      description: Describe la forma de apliques o parches, como de animales o geométricos.
    applique_shape:
      name: Forma de aplique
      description: Describe la forma de los artículos de aplique, como florales o
        animales.
    aquarium_filter_features:
      name: Características del filtro de acuario
      description: Describe las características especiales de los filtros de acuario,
        como, por ejemplo, la rapidez de cambio de los cartuchos o la filtración en
        varias etapas.
    aquarium_light_spectrum:
      name: Espectro de luz para acuario
      description: Especifica el tipo de espectro de luz para la iluminación del acuario,
        por ejemplo, azul o luz diurna.
    aquarium_overflow_box_design:
      name: Diseño del rebosadero para acuarios
      description: Describe el estilo de configuración de una caja de desbordamiento
        para acuario, como externa o colgante
    archery_activity:
      name: Actividad de tiro con arco
      description: Especifica el tipo de actividad de tiro con arco, como, por ejemplo,
        la caza al aire libre o la práctica de tiro.
    archery_equipment_included:
      name: Equipo de tiro con arco incluido
      description: Especifica los accesorios de tiro con arco incluidos, como, por
        ejemplo, el soporte estabilizador o las flechas de cristal de seguridad.
    archery_style:
      name: Estilo de tiro con arco
      description: Define el tipo específico de tiro con arco para el que está diseñado
        el producto, como, por ejemplo, el tiro con arco 3D o la caza con arco.
    archery_target_type:
      name: Tipo de objetivo de tiro con arco
      description: Especifica el tipo de objetivo de tiro con arco diseñado para diferentes
        prácticas de tiro, por ejemplo, objetivo 3D, objetivo de bolsa.
    aromatherapy:
      name: Aromaterapia
      description: Especifica el aroma o aceite esencial utilizado, por ejemplo, eucalipto
        o lavanda.
    arrangement:
      name: Arreglo
      description: Especifica cómo se organizan o presentan las flores, por ejemplo,
        en jarrón o cesta.
    arrow/bolt_material:
      name: Material de flecha/perno
      description: Identifica el material de construcción de flechas o pernos, como
        aluminio o bambú.
    arrow_fletching_material:
      name: Material para el emplumado de flechas
      description: Identifica el tipo de material utilizado para el emplumado de flechas,
        como sintético o plástico.
    arrow_material:
      name: Material de la flecha
      description: Identifica la composición de las flechas, como el bambú o la fibra
        de vidrio.
    art/crafting_tool_material:
      name: Material para manualidades
      description: Identifica el material principal de las herramientas de artesanía,
        como la madera o el metal.
    art_fixative_application_method:
      name: Método de aplicación del fijador artístico.
      description: Describe cómo se aplica un fijador, como mediante aerosol o brocha.
    art_movement:
      name: Movimiento artístico
      description: Define el enfoque estilístico o el movimiento artístico de una
        pintura, por ejemplo, impresionismo, expresionismo.
    art_style:
      name: Estilo artístico
      description: Describe el estilo estético de un producto, como Art Nouveau o
        tipografía.
    artwork_authenticity:
      name: Autenticidad de la obra de arte
      description: Indica la autenticidad de la obra de arte, especificando si se
        trata de una creación original o una reproducción.
    artwork_frame_material:
      name: Material del marco de obras de arte
      description: Identifica el material utilizado en los marcos para cuadros, como
        la madera o los materiales chapados en oro.
    artwork_type:
      name: Tipo de material gráfico
      description: Especifica el estilo de la obra de arte digital, como tipografía
        o pintura digital.
    assisted_braking_technology:
      name: Tecnología de frenado asistido
      description: Indica el tipo de frenado asistido en dispositivos de seguridad,
        por ejemplo, activo, pasivo
    attachment_method:
      name: Método de sujeción
      description: Define el método utilizado para sujetar o fijar el producto, por
        ejemplo, velcro o mediante clip.
    attachment_options:
      name: Opciones de sujeción
      description: Especifica los métodos para sujetar o atar un producto, por ejemplo,
        los cordones.
    attachment_type:
      name: Tipo de sujeción
      description: Define el método de fijación o conexión del producto, como encajable
        o velcro.
    atv/off_road_tire_type:
      name: Tipo de neumático ATV/todoterreno
      description: Identifica el uso específico de neumáticos de vehículos todoterreno,
        como arena o barro.
    audio/scan_converter_features:
      name: Características del convertidor de audio/escaneo
      description: Describe las capacidades de un convertidor de audio/escaneo, como
        la conversión automática o el control remoto.
    audio/video_cable_connector_type_end_a:
      name: Tipo de conector del cable de audio/video (extremo A)
      description: Especifica el conector o interfaz exacta presente en el primer
        extremo (Extremo A) del cable.
    audio/video_cable_connector_type_end_b:
      name: Tipo de conector del cable de audio/video (extremo B)
      description: Especifica el conector o interfaz exacta presente en el segundo
        extremo (Extremo B) del cable.
    audio_bypass_type:
      name: Tipo de bypass de audio
      description: Especifica cómo se enruta la señal de audio cuando el efecto está
        desactivado (p. ej., bypass verdadero, buffer, relé).
    audio_cassette_tape_type:
      name: Tipo de cinta de casete de audio
      description: Especifica la formulación de cinta IEC (polarización) para casetes
        de audio.
    audio_codecs/formats_supported:
      name: Códecs o formatos de audio compatibles
      description: Especifica los tipos de archivos de audio que un producto puede
        reproducir, como WAVE o MP3.
    audio_component_form_factor:
      name: Factor de forma del componente de audio
      description: Define el estilo físico o formato de instalación del componente.
    audio_connectivity:
      name: Conectividad de audio
      description: Define los tipos de conexión de audio que admite un producto, como
        HDMI o USB.
    audio_conversion_direction:
      name: Dirección de conversión de audio
      description: Especifica el flujo de señal que soporta el convertidor (p. ej.,
        analógico a digital, digital a analógico, bidireccional).
    audio_converter_features:
      name: Características del convertidor de audio
      description: Describe las características principales de un convertidor de audio,
        como la compatibilidad analógica o la tecnología de IA incluida.
    audio_d/a_converter_dac:
      name: Convertidor de audio D/A (DAC)
      description: Especifica el tipo de convertidor digital a analógico (DAC) de
        dispositivos de audio, por ejemplo, USB u óptico.
    audio_duplex_capability:
      name: Capacidad de dúplex de audio
      description: Especifica si el dispositivo admite comunicación de audio dúplex
        completo (bidireccional simultáneo) o semidúplex.
    audio_mixer_type:
      name: Tipo de mesa de mezclas
      description: Identifica el tipo de mezclador de audio, como analógico o de transmisión
    audio_output_channel:
      name: Canal de salida de audio
      description: Indica la cantidad de canales o la configuración de altavoces en
        los que puede emitir un sistema de sonido, como 2 o 5.1
    audio_output_format:
      name: Formato de salida de audio
      description: Define la calidad y el tipo de sonido que produce el dispositivo
        de audio, como digital o analógico.
    audio_player/recorder_features:
      name: Características del reproductor/grabador de audio
      description: Identifica capacidades únicas de reproductores o grabadoras de
        audio, como la reproducción de MP3 o el control por voz.
    audio_purpose:
      name: Uso del audio
      description: Especifica el uso o la ubicación previstos para los productos de
        audio, como el audio para automóviles o el cine en casa.
    audio_return_channel_support:
      name: Soporte de canal de retorno de audio
      description: Indica si el dispositivo soporta paso a través de ARC o eARC para
        enrutar audio desde una pantalla de vuelta a un AVR o barra de sonido.
    audio_signal_configuration:
      name: Configuración de señal de audio
      description: Especifica si el cable transporta audio mono, estéreo, balanceado
        o multicanal (p. ej., TRRS, digital).
    audio_system:
      name: Sistema de audio
      description: Define el sistema de reproducción/grabación de audio que admite
        el VCR (p. ej., estéreo Hi-Fi, mono).
    audio_technology:
      name: Tecnología de audio
      description: Especifica la tecnología que se usa en dispositivos de audio, como
        AAC o Dolby Atmos.
    authentication_technology:
      name: Tecnología de autenticación
      description: Especifica el método de seguridad utilizado en la tecnología de
        autenticación, por ejemplo, biométrico, basada en tarjeta
    authenticity:
      name: Autenticidad
      description: Especifica la originalidad de los artículos, como, por ejemplo,
        productos genuinos o réplicas.
    auto_focusing_modes:
      name: Modos de enfoque automático
      description: Identifica el tipo de enfoque automático de las cámaras, como de
        puntos o de seguimiento.
    autoclave_sterilization_method:
      name: Método de esterilización en autoclave
      description: Identifica la técnica de esterilización que se usa en autoclaves,
        como el vapor o el calor seco.
    autograph_type:
      name: Tipo de autógrafo
      description: Identifica la categoría del artículo con autógrafo, como deportes
        o música.
    automation:
      name: Automatización
      description: Describe el nivel de automatización de las máquinas de embalaje,
        como manual o automático.
    award_design:
      name: Diseño de premios
      description: Describe el estilo o tema de un premio o certificado, como moderno
        o formal.
    award_occasion:
      name: Ocasión de premios
      description: Especifica el propósito de un premio, como el reconocimiento de
        empleados o los logros académicos.
    awning_construction_type:
      name: Tipo de construcción del toldo
      description: Define el estilo de instalación de un toldo, como retráctil o fijo.
    awning_design:
      name: Diseño de toldo
      description: Describe la forma o el estilo de un toldo, como plano o curvo.
    baby/toddler_car_seat_features:
      name: Características de sillas de coche para niños pequeños/bebés
      description: Destaca las características clave de los asientos de seguridad
        para bebés y niños pequeños, como el arnés de 5 puntos o la protección contra
        impactos laterales.
    baby/toddler_clothing_features:
      name: Características de la ropa para niños pequeños/bebés
      description: Destaca características especiales de la ropa para bebés y niños
        pequeños, como la cintura ajustable o la protección UV.
    baby/toddler_equipment_safety_features:
      name: Características de seguridad del equipo para niños pequeños/bebés
      description: Especifica características de protección en artículos para bebés
        o niños pequeños, como una base antideslizante.
    baby/toddler_furniture_features:
      name: Características del mobiliario para niños pequeños/bebés
      description: Identifica características especiales de muebles para bebés/niños
        pequeños, como la altura ajustable o la capacidad de plegado.
    baby/toddler_furniture_items_included:
      name: Características de los artículos de muebles para niños pequeños/bebés
      description: Especifica los tipos de mobiliario para bebés o niños pequeños
        en un conjunto, por ejemplo, trona, baúl para juguetes
    baby/toddler_hat_style:
      name: Estilo de gorro para niños pequeños/bebés
      description: Describe el estilo de sombreros para bebés o niños pequeños, como
        sombrero de pescador o sombrero para el sol
    baby/toddler_hosiery_style:
      name: Estilo de las medias para niños pequeños/bebés
      description: Describe el estilo de calcetines o medias para bebés o niños pequeños,
        como calcetines de tobillo o medias tobilleras
    baby/toddler_seat_features:
      name: Características de sillas para niños pequeños/bebés
      description: Destaca aspectos clave de los asientos para bebés y niños pequeños,
        como la capacidad de reclinación o la bandeja.
    baby/toddler_sleepwear_style:
      name: Estilo de la ropa para dormir para niños pequeños/bebés
      description: Describe el diseño de ropa de dormir para bebés o niños pequeños,
        como pijamas con pies o monos
    baby_drink_packaging:
      name: Embalaje de bebidas para bebés
      description: Identifica el tipo de recipiente para bebidas de bebés, por ejemplo,
        cartón o biberón.
    baby_equipment_safety_features:
      name: Características de seguridad del equipo para bebés
      description: Identifica aspectos de seguridad del equipamiento para bebés, como
        el arnés de 3 puntos o la base antideslizante.
    baby_food_flavor:
      name: Sabor de comida para bebés
      description: Especifica el perfil de sabor de los productos alimenticios para
        bebés, como las judías verdes o el plátano.
    baby_formula_format:
      name: Formato de fórmula para bebés
      description: Especifica el estado de preparación de la fórmula infantil, como
        polvo seco o lista para consumir.
    baby_gift_items_included:
      name: Artículos de regalo para bebé incluidos
      description: Detalla los componentes de un paquete de regalo para bebé, como
        libros o mordedores.
    baby_health_items_included:
      name: Artículos de salud para bebés incluidos
      description: Especifica los artículos incluidos en los kits de aseo para bebés,
        como los cortaúñas o el termómetro.
    baby_monitor_features:
      name: Características del vigilabebés
      description: Describe las capacidades de un vigilabebés, como la comunicación
        bidireccional o la supervisión de temperatura.
    baby_snack_flavor:
      name: Sabor de merienda para bebés
      description: Define el perfil de sabor de los aperitivos para bebés, por ejemplo,
        frutas y verduras.
    baby_snack_texture:
      name: Textura de merienda para bebés
      description: Describe la sensación o consistencia de los aperitivos para bebés,
        por ejemplo, bocados suaves o almohadillas.
    back_type:
      name: Tipo de respaldo
      description: Define el estilo del respaldo del asiento, como sin respaldo o
        con respaldo bajo.
    backboard_material:
      name: Material del tablero
      description: Especifica el material de construcción del tablero del juego, afectando
        el rendimiento del rebote, la durabilidad y el costo.
    background_design:
      name: Diseño de fondo
      description: Describe el diseño visual o patrón de un fondo de estudio, como
        la clave impresa o cromática.
    backing_color:
      name: Color del material de soporte
      description: Identifica el color del respaldo o la parte inferior de un producto,
        como beige o negro
    backing_material:
      name: Material del soporte
      description: Identifica el material que se usa en la parte posterior de los
        accesorios de lijado, como, por ejemplo, el poliéster o el PVC.
    backing_pattern:
      name: Patrón del material de soporte
      description: Identifica el patrón en el reverso de un producto, normalmente
        para accesorios de lijar, por ejemplo, resumen, texto
    backlighting_type:
      name: Tipo de retroiluminación
      description: Describe el estilo de iluminación proporcionado en cualquier teclado
        o ratón incluido.
    backrest_type:
      name: Tipo de espaldar
      description: Especifica el material o estilo del respaldo de una silla, como,
        por ejemplo, malla o acolchado.
    backrest_upholstery_color:
      name: Color de la tapicería del respaldo
      description: Identifica el color de la tapicería del respaldo del mobiliario,
        como el beige o el azul
    backrest_upholstery_material:
      name: Material de tapicería del respaldo
      description: Identifica el tipo de tejido del respaldo del mueble, como el terciopelo
