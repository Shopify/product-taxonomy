    dispenser_type:
      name: Tipo di erogatore
      description: Specifica il formato per l'erogazione del prodotto, in genere in
        salute e bellezza; ad es. bastone, barattolo
    dispensing_operation_type:
      name: Tipo di operazione di erogazione
      description: Descrive se il dentifricio viene erogato manualmente, semi-automaticamente,
