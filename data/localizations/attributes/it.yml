    cleanser_type:
      name: Tipo di detergente
      description: Descrive la texture o il formato specifico del detergente
    cleat_type:
      name: Tipo di bitta
      description: Specifica lo stile dei tacchetti utilizzati nell'ancoraggio, ad
        esempio ribaltabili o con base aperta
    climbing_activity:
      name: Arrampicata
      description: Specifica il tipo di arrampicata per cui è progettato il prodotto,
        ad esempio alpinismo o arrampicata su ghiaccio
    clip_type:
      name: Tipo di clip
      description: Specifica lo stile della clip su elementi ad esempio gli appunti,
        ad es. ad alta capacità
    clipper/trimmer_type:
      name: Tipo di tagliacapelli
      description: Identifica la fonte di alimentazione di tosatrici o tagliacapelli,
