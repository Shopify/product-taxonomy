    chemical_product_form:
      name: Formato del prodotto chimico
      description: Specifica la forma dei prodotti chimici, ad es. gel o granuli
    chemical_purity:
      name: Purezza chimica
      description: Indica il livello di purezza di un prodotto chimico, ad esempio
