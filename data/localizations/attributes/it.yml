    cam_system:
      name: Sistema a camme
      description: Specifica il sistema di camme utilizzato nelle attrezzature per
        il tiro con l'arco, ad esempio ibrido, singolo
    camera_attachment:
      name: Fissaggio della fotocamera
      description: Specifica la parte o l'accessorio della fotocamera, ad esempio
        mirino angolare o adattatore per oculare
    camera_button/knob_type:
      name: Tipo di pulsante e manopola della fotocamera
      description: Identifica il pulsante o la manopola su una fotocamera, ad es.
        il pulsante di scatto, la manopola della modalità
    camera_control_type:
      name: Tipo di controllo della fotocamera
      description: Specifica il tipo di controllo remoto della fotocamera, ad es.
        interruttore remoto, pulsante di scatto
    camera_display_technology:
      name: Tecnologia del display della fotocamera
      description: Specifica la tecnologia dello schermo di una fotocamera, ad es.
        OLED, Super AMOLED
    camera_features:
      name: Funzionalità della fotocamera
      description: Identifica le funzionalità speciali di una fotocamera, come stabilizzazione
        dell'immagine o rilevamento del volto
    camera_gear_type:
      name: Tipo di attrezzatura della fotocamera
      description: Identifica il tipo specifico di attrezzatura della fotocamera,
        ad esempio azionamento della fotocamera o messa a fuoco automatica
    camera_hd_type:
      name: Tipo di fotocamera HD
      description: Specifica la qualità video della fotocamera, ad esempio Quad HD
        o 8K ultra HD
    camera_lens_material:
      name: Materiale dell'obiettivo della fotocamera
      description: Specifica la composizione degli obiettivi della fotocamera o della
        videocamera, ad esempio vetro o plastica
    camera_lens_type:
      name: Tipo di obiettivo per fotocamera
      description: Identifica il tipo di obiettivo della fotocamera, ad esempio macro
        o teleobiettivo
    camera_mounting_type:
      name: Tipo di montaggio della fotocamera
      description: Specifica il metodo di fissaggio della fotocamera, ad es. treppiede,
        clip-on
    camera_sensor_type:
      name: Tipo di sensore della fotocamera
      description: Identifica il tipo di sensore nelle fotocamere o nell'ottica, ad
        es. CMOS, CCD
    camera_shape:
      name: Forma della telecamera
      description: Descrive lo stile di design delle telecamere di sicurezza, ad esempio
        bullet o box
    candle_kit_items_included:
      name: Articoli del kit di candele inclusi
      description: Specifica gli articoli forniti in un kit di candele, ad esempio
        stoppini per candele o crogiolo di cera
    candle_material:
      name: Materiale della candela
      description: Specifica il tipo di cera o materiale utilizzato in una candela,
        ad esempio cera di paraffina o cera d'api
    candle_shape:
      name: Forma di candela
      description: Descrive la forma di una candela, ad esempio cilindrica o quadrata
    candle_type:
      name: Tipo di candela
      description: Specifica il design delle candele, ad esempio candele coniche o
        tea light
    cane_base_design:
      name: Design della base del bastone
      description: Identifica la configurazione della base di supporto del bastone
    canned_meat_variety:
      name: Varietà di carne in scatola
      description: Distingue tra le varietà di carne in scatola, ad esempio il tacchino
