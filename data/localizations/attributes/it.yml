    cbd_ingredients:
      name: Ingredienti del CBD
      description: Identifica i componenti specifici correlati al CBD in un prodotto,
        come il CBD a spettro completo o gli edulcoranti
    celebration_type:
      name: Tipo di celebrazione
      description: Specifica l'occasione per la quale il prodotto è adatto, come Natale
