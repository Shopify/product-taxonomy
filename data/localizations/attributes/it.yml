    canvas_material:
      name: Materiale della tela
      description: Identifica il tipo di tessuto utilizzato nella lavorazione della
        tela, come cotone o lino
    canvas_texture:
      name: Trama delle tele
      description: Descrive la sensazione della superficie di una tela, ad esempio
        grana liscia o media
    capacitance_tolerance:
      name: Tolleranza della capacità
      description: Indica la deviazione consentita della capacità effettiva dal valore
        nominale, espressa come percentuale
    capacitor_application:
      name: Applicazione del condensatore
      description: Denota l'uso o la classe di applicazione primaria prevista del
        condensatore (ad es., avvio motore, audio, smorzatore)
    capacitor_polarity:
      name: Polarità del condensatore
      description: Indica se il condensatore è polarizzato, non polarizzato o bipolare,
        influenzando l'orientamento di installazione e le posizioni del circuito adatte
    car_freshener_fragrance:
      name: Fragranza del deodorante per auto
      description: Specifica l'aroma dei deodoranti per veicoli, ad esempio lavanda
        o auto nuova
    car_seat_installation:
      name: Installazione del seggiolino auto
      description: Specifica il metodo per installare un seggiolino per auto per bambini,
