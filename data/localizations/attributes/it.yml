    diaper_bag_style:
      name: Stile borsa per pannolini
      description: Descrive il design o la forma di una borsa per pannolini, come
        uno zaino o una borsa a tracolla
    diaper_features:
      name: Funzionalità del pannolino
      description: Descrive le caratteristiche speciali dei pannolini, ad esempio
        a prova di perdite o ipoallergenici
    diaper_kit_components:
      name: Componenti del kit per pannolini
      description: Specifica gli articoli inclusi in un kit di pannolini, ad esempio
        salviette o fasciatoio
    diaper_organizer_features:
      name: Funzionalità dell'organizzatore per pannolini
      description: Evidenzia le caratteristiche uniche degli organizzatori per pannolini,
        ad esempio scomparti multipli o rivestimento impermeabile
    diaper_size:
      name: Taglia del pannolino
      description: Specifica la taglia dei pannolini, ad esempio neonato o bambino
