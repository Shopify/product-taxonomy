    digestive_supplement_type:
      name: Tipo di integratore digestivo
      description: Classifica il tipo specifico di integratore digestivo (ad es.,
        probiotico, enzima, fibra)
    digital_sound_processing:
      name: Elaborazione digitale del suono
      description: Specifica le tecniche di modifica del suono nei componenti audio,
