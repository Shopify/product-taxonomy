    suitcase_handle_type:
      name: Tipo di manico della valigia
      description: Specifica lo stile della maniglia della valigia, ad esempio trasporto
        laterale o superiore
    sulfur_content:
      name: Contenuto di zolfo
      description: Specifica la concentrazione di zolfo nell'olio da riscaldamento
        domestico, ad es. ultra-bassa o alta
    sunlight:
      name: Luce del sole
      description: Specifica la quantità di luce solare necessaria per le piante,
        ad esempio ombra o pieno sole
    sunscreen_filter_type:
      name: Tipo di filtro solare
      description: Identifica il tipo di filtri UV utilizzati nella formula (chimico,
        minerale o ibrido)
    supplement_health_focus:
      name: Focus salutare dell'integratore
      description: Definisce l'area di benessere primaria che l'integratore è destinato
        a supportare
    support/brace_material:
      name: Materiale di supporto/rinforzo
      description: Identifica il materiale utilizzato nei supporti o nei tutori, come
        neoprene o schiuma
    support_cushion_features:
      name: Caratteristiche del cuscino di supporto
      description: Evidenzia extra funzionali speciali o miglioramenti offerti dal
        cuscino
    support_level:
      name: Livello di supporto
      description: Indica il grado complessivo di stabilità o supporto offerto dal
        tutore per diverse gravità di lesioni o livelli di attività
    support_rigidity_level:
      name: Livello di rigidità del supporto
      description: Descrive la rigidità complessiva o il supporto strutturale fornito
        dalla soletta, dall'ammortizzazione morbida al supporto ortopedico rigido
    supported_audio_sources:
      name: Sorgenti audio supportate
      description: Elenca le sorgenti di riproduzione o input che l'unità può gestire
    supported_countries:
      name: Paesi supportati
      description: Elenca i paesi o i territori specifici in cui la SIM/eSIM o il
        piano prepagato fornisce il servizio
    supported_display_technologies:
      name: Elenca i tipi di display o tecnologie di schermo che il calibratore può
        profilare o misurare
      description: Sistema di tensionamento
    supported_dvi_link_type:
      name: Tipo di collegamento DVI supportato
      description: Indica se il dispositivo gestisce standard di segnale DVI single-link,
        dual-link o entrambi
    supported_erase_modes:
      name: Modalità di cancellazione supportate
      description: Elenca gli standard di cancellazione sicura che un duplicatore
        può eseguire su unità di destinazione
    supported_input_types:
      name: Tipi di input supportati
      description: Elenca i tipi di input audio accettati dalla striscia di canale
        (ad es., Mic, Line, Instrument Hi-Z)
    supported_language:
      name: Lingua supportata
      description: Specifica le lingue supportate da un prodotto software, ad esempio
        inglese o spagnolo
    supported_media_sources:
      name: Sorgenti multimediali supportate
      description: Definisce gli input multimediali fisici o digitali da cui l'unità
        può riprodurre musica
    supported_raid_levels:
      name: Livelli RAID supportati
      description: Elenca le configurazioni di array di dischi che il controller di
        archiviazione integrato può utilizzare
    supported_scan_media_type:
      name: Tipo di supporto di scansione supportato
      description: Elenca i tipi di originali che lo scanner può gestire (ad es.,
        vari tipi di pellicola, stampe riflettenti)
    supported_sdi_standards:
      name: Standard SDI supportati
      description: Indica le velocità di trasmissione/standard SDI (SD-SDI, HD-SDI,
        3G-SDI, ecc.) supportati dal dispositivo per la trasmissione del segnale
    supported_usb_device_types:
      name: Tipi di dispositivi USB supportati
      description: Specifica i tipi di dispositivi di archiviazione USB che il duplicatore
        può gestire
    surface_sides:
      name: Lati della superficie
      description: Indica se il piano di stampa può essere utilizzato su uno o entrambi
        i lati
    surface_texture:
      name: Struttura della superficie
      description: Descrive la sensazione o il motivo sulla superficie di un prodotto,
        in genere per i preservativi; ad es. liscio, rigato
    surfboard_features:
      name: Funzionalità della tavola da surf
      description: Specifica le caratteristiche uniche di una tavola da surf, come
        gonfiabile o hard top
    surveillance_camera_design:
      name: Design della telecamera di sorveglianza
      description: Identifica il tipo di progettazione delle telecamere di sicurezza,
        ad esempio termica o panoramica
    surveillance_camera_mounting_type:
      name: Tipo di montaggio della telecamera di sorveglianza
      description: Identifica come può essere installata una telecamera di sorveglianza,
        ad es. a parete, a soffitto
    surverying_accessories_included:
      name: Accessori di rilevamento inclusi
      description: Specifica i componenti extra forniti con gli strumenti di rilevamento,
        come una pinza o un'asta di livellamento
    suspender_style:
      name: Stile della bretella
      description: 'Definisce lo stile della bretella, ad es. X-back, Y-back '
    sustainability:
      name: Sostenibilità
      description: Evidenzia i prodotti che supportano pratiche sostenibili, ad es.
        il commercio equo e solidale, provenienti da fonti responsabili
    swab_end_configuration:
      name: Configurazione dell'estremità del bastoncino
      description: Indica se il bastoncino ha un'estremità utilizzabile o due, e se
        le estremità differiscono
    swab_material:
      name: Materiale del tampone
      description: Specifica il tessuto di un tampone per la pulizia di uno strumento
        musicale, ad es. seta, feltro
    swimwear_features:
      name: Funzionalità del costume da bagno
      description: Identifica le caratteristiche speciali dei costumi da bagno, come
        asciugatura rapida o protezione solare UPF
    swing_style:
      name: Stile dello swing
      description: Classifica in base alla tecnica dello swing, in genere per le racchette
        da tennis; ad es. corse lunghe
    swing_weighting:
      name: Ponderazione dello swing
      description: Indica la distribuzione del peso di una mazza da baseball o softball,
        ad es. bilanciata, carico finale
    switch_control_type:
      name: Tipo di controllo dell’interruttore
      description: Descrive come viene controllato un interruttore della luce, ad
        esempio con pulsante o a sensore
    switch_management_type:
      name: Tipo di gestione dello switch
      description: Classifica il livello o lo stile di gestione e configurazione supportato
        dallo switch (ad es., non gestito, intelligente, gestito via web, completamente
        gestito)
    switch_mechanism:
      name: Meccanismo dell'interruttore
      description: Identifica la tecnologia di attuazione interna del pulsante (ad
        es., microinterruttore, ottico), che influisce su sensazione, durata e reattività
    switch_stem_compatibility:
      name: Compatibilità dello stelo dell'interruttore
      description: Identifica gli stili di stelo degli interruttori meccanici o di
        altro tipo che il copritasto o il set di tasti si adatta
    switching_layer:
      name: Livello di switching
      description: Indica il livello OSI più alto a cui lo switch opera nativamente
        (ad es., Livello 2, Livello 3, ibridi)
    switching_method:
      name: Metodo di commutazione
      description: Definisce il metodo utilizzato per passare da un ingresso all'altro
        nei prodotti elettronici; ad es. il telecomando
    synthesis_method:
      name: Metodo di sintetizzazione
      description: Specifica il metodo di sintesi del suono negli strumenti elettronici,
        ad esempio analogico virtuale o modulare
    system/power_cable_connector_type_end_a:
      name: Tipo di connettore del cavo di sistema/alimentazione (estremità A)
      description: Identifica lo standard del connettore esatto presente sulla prima
        estremità del cavo (ad es., IEC C14, NEMA 5-15P, USB-C)
    system/power_cable_connector_type_end_b:
      name: Tipo di connettore del cavo di sistema/alimentazione (estremità B)
      description: Identifica lo standard del connettore esatto presente sulla seconda
        estremità del cavo (ad es., IEC C13, DC 5,5 × 2,1 mm, banana plug)
    system_components_included:
      name: Componenti del sistema inclusi
      description: Elenca i pezzi hardware chiave spediti con il sistema in modo che
        l'utenza comprenda cosa è o non è parte del bundle
    system_of_measurement:
      name: Sistema di misura
      description: Identifica l'unità di misura utilizzata in un prodotto, ad esempio
        imperiale o metrico
    system_range:
      name: Campo del sistema
      description: Definisce l'area operativa dei sistemi di allarme medico, ad es.
        quelli domiciliari, GPS
    systems_supported:
      name: Sistemi supportati
      description: Specifica le piattaforme di gioco con cui è compatibile un prodotto;
        ad esempio Xbox, Nintendo Switch
    tab_style:
      name: Stile della scheda
      description: Specifica lo stile delle linguette sugli accessori del raccoglitore,
        ad es. prestampate, numerate
    tablet_case_functional_features:
      name: Caratteristiche funzionali della custodia per tablet
      description: Evidenzia i principali componenti funzionali aggiuntivi inclusi
        con la custodia per tablet
    tabletop_color:
      name: Colore del piano del tavolo
      description: Specifica il colore della superficie superiore di un tavolo, ad
        esempio nero o bianco
    tabletop_material:
      name: Materiale del piano del tavolo
      description: Identifica la composizione della superficie del tavolo, ad es.
        compensato, cemento
    tabletop_pattern:
      name: Motivo del piano del tavolo
      description: Definisce il disegno o la stampa su una superficie da tavolo, ad
        esempio natalizia o solida
    tabletop_shape:
      name: Forma del piano del tavolo
      description: Descrive la forma geometrica del piano di un tavolo, ad es. quadrato,
        a forma di rene
    tableware_material:
      name: Materiale per stoviglie
      description: Specifica la composizione delle stoviglie, ad esempio bone china
        o terracotta
    tack/pushpin_head_design:
      name: Design della testa del chiodino/puntina
      description: Descrive la forma della testa di una puntina o di una puntina da
        disegno, come rotonda o decorativa
    tag_fastening:
      name: Chiusura con etichetta
      description: Descrive il metodo utilizzato per fissare un'etichetta al bagaglio,
        ad esempio fibbie o anelli
    talc_content:
      name: Contenuto di talco
      description: Indica se la formulazione contiene talco, è priva di talco o utilizza
        livelli ridotti di talco
    tampon_absorbency_level:
      name: Livello di assorbenza del tampone
      description: Identifica la capacità di assorbenza degli assorbenti, ad esempio
        leggera o pesante
    tampon_features:
      name: Funzionalità del tampone
      description: Descrive le caratteristiche specifiche dei tamponi, ad esempio
        design confortevole o tenuta stagna
    tan_type:
      name: Tipo di abbronzatura
      description: Definisce l'intensità del colore e il processo di applicazione
        degli articoli abbronzanti, ad es. fondente, istantaneo
    tank_color:
      name: Colore del serbatoio
      description: Identifica il colore di un prodotto, in genere i serbatoi dei WC;
        ad es. nero, bianco
    tank_material:
      name: Materiale del serbatoio
      description: Specifica il materiale del serbatoio di un prodotto, in genere
        per attrezzi da giardinaggio; ad es. metallo, plastica
    tank_pattern:
      name: Modello di serbatoio
      description: Identifica il motivo visivo sui serbatoi della toilette, ad esempio
        tinta unita o astratto
    tape_cartridge_format:
      name: Formato della cartuccia a nastro
      description: Specifica le tecnologie delle cartucce a nastro (ad es., LTO, DAT,
        DLT) che l'unità può leggere o scrivere
    tape_cartridge_generation:
      name: Generazione della cartuccia a nastro
      description: Indica la generazione o versione specifica all'interno di una famiglia
        di tecnologie a nastro (più comunemente generazioni LTO) supportata dall'unità
    tape_material:
      name: Materiale del nastro
      description: Specifica il tipo di materiale utilizzato nei prodotti su nastro,
        come vinile o plastica
    tape_speed_supported:
      name: Velocità del nastro supportata
      description: Elenca le velocità di riproduzione e registrazione del nastro (pollici
        al secondo) a cui l'unità bobina a bobina può funzionare
    target_audience:
      name: Pubblico di destinazione
      description: Specifica a chi è adatto un prodotto, ad esempio bambini o tutte
        le età
    target_facial_zone:
      name: Zona facciale target
      description: Specifica la zona facciale che la striscia per i pori è progettata
        per trattare (ad es., naso, mento, zona T)
    target_gender:
      name: Genere di destinazione
      description: Identifica il genere previsto per un prodotto, ad esempio femminile,
        maschile o unisex
    targeted_pests:
      name: Parassiti specifici
      description: Identifica il tipo di parassiti contro cui un prodotto è efficace,
        ad es. muffe e alghe
    targeted_skin_concern:
      name: Problema cutaneo target
      description: Indica la lesione specifica o la condizione della pelle che il
        prodotto è formulato per trattare
    targeted_stains:
      name: Macchie specifiche
      description: Identifica i tipi di macchie che tratta un prodotto, ad esempio
        cibo o fango
    tea_input_type:
      name: Tipo di preparazione tè
      description: Specifica lo stile di preparazione del tè, ad es. bustine, tazze
        K
    technology_level:
      name: Livello di tecnologia
      description: Indica la complessità della tecnologia di un prodotto, ad es. di
        base, avanzata
    teeth_material:
      name: Materiale dei denti
      description: Identifica il materiale utilizzato nei denti, di solito per gli
        attrezzi da giardinaggio; ad es. plastica, metallo
    telephone_cable_interface:
      name: Interfaccia cavo telefonico
      description: Definisce il tipo di spina utilizzato nei cavi telefonici, ad esempio
        RJ-10
    telephone_cable_second_interface:
      name: Seconda interfaccia del cavo telefonico
      description: Definisce il tipo di connettore sull'estremità opposta del cavo
        quando differisce dall'interfaccia principale (ad es., RJ45 a RJ11)
    telephone_cord_style:
      name: Stile del cavo telefonico
      description: Specifica la forma fisica del cavo telefonico, supportando le esigenze
        di chi necessita di un cavo dritto, a spirale o speciale per apparecchi sostitutivi
        e supporti a parete
    telephone_style:
      name: Modello di telefono
      description: Definisce il design o l'estetica di un telefono, ad es. vintage,
        novità
    telescope_level:
      name: Livello del telescopio
      description: Indica la complessità o il livello di abilità richiesto per un
        telescopio, ad esempio principiante o avanzato
    telescope_tracking_system:
      name: Sistema di tracciamento del telescopio
      description: Identifica il tipo di sistema di inseguimento dei telescopi, ad
        esempio manuale o motorizzato
    television_circuit_board_type:
      name: Tipo di scheda circuitale televisione
      description: Identifica il ruolo funzionale della scheda circuitale all'interno
        di un televisore (ad es., scheda principale, scheda alimentatore, scheda T-Con)
    television_shape:
      name: Forma del televisore
      description: Definisce il contorno fisico dello schermo televisivo, ad esempio
        curvo o piatto
    television_speaker_position:
      name: Posizione altoparlante televisione
      description: Identifica la posizione fisica o il ruolo dell'altoparlante nell'assemblaggio
        TV (ad es., sinistro, destro, centrale, subwoofer)
    television_specialized_features:
      name: Funzionalità specializzate televisive
      description: Identifica le funzionalità uniche di un televisore, come controllo
        vocale o soundbar integrata
    temperature:
      name: Temperatura
      description: Specifica le impostazioni di calore per dispositivi come pistole
        per colla, ad es. doppia, alta
    temperature_control:
      name: Controllo della temperatura
      description: 'Definisce la possibilità di regolare la temperatura del prodotto,
        di solito per gli scaldabiberon; ad es. regolabile, preimpostato '
    temperature_measurement:
      name: Misurazione della temperatura
      description: Indica se il prodotto misura in Fahrenheit o Celsius
    template_type:
      name: Tipo di modello
      description: Specifica la categoria dei modelli di documento, ad es. biglietto
        da visita, volantino
    temple_color:
      name: Colore delle aste
      description: Specifica il colore dell'asta o dell'asta degli occhiali, ad esempio
        rosso o trasparente
    temple_pattern:
      name: Modello del tempio
      description: Descrive il design o il motivo sulle aste degli occhiali, come
        il logo o a scacchi
    tension:
      name: Tensione corde
      description: Descrive il livello di tensione delle corde per strumenti musicali,
        ad es. extra pesanti
    tensioning_system:
      name: Sistema di tensionamento
      description: Tipo di funzionamento dello schermo
    tent_setup_style:
      name: Stile di montaggio della tenda
      description: Indica come la tenda viene dispiegata o assemblata
    tequila_variety:
      name: Varietà di tequila
      description: Specifica il tipo di tequila, ad es. dorata, invecchiata
    terminal_operation:
      name: Funzionamento del terminale
      description: Specifica il tipo di funzionamento dei registratori di cassa, ad
        esempio manuale o elettronico
    termination_method:
      name: Metodo di terminazione
      description: Specifica la tecnica utilizzata per collegare i conduttori ai contatti
        del connettore (ad es., crimpatura, saldatura, IDC)
    terrain:
      name: Terreno
      description: Specifica il tipo di terreno per cui è progettato un prodotto,
        in genere per attrezzature da esterno; ad es. montagna, rotolamento
    test_format:
      name: Formato del test
      description: Definisce il tipo di test dei prodotti di salute e bellezza, ad
        es. digitale, striscia reattiva
    test_method:
      name: Metodo del test
      description: Definisce la procedura per condurre un test medico, ad es. test
        a domicilio, analisi di laboratorio
    test_sample:
      name: Campione per il test
      description: Specifica il tipo di campione richiesto per test sanitari e medici,
        ad es. tampone, saliva
    tetherball_equipment_included:
      name: Attrezzatura da tetherball inclusa
      description: Indica l'inclusione di elementi essenziali in un set di tetherball,
        ad esempio corda o tetherball
    tethering_policy:
      name: Politica di tethering
      description: Chiarisce se l'hotspot mobile o il tethering è consentito secondo
        i termini del piano eSIM
    text_plate_material:
      name: Materiale della piastra di testo
      description: Identifica il materiale della piastra di testo sui timbri da ufficio,
        ad esempio metallo o gomma
    textile_craft_machine_features:
      name: Funzionalità della macchina tessile artigianale
      description: Descrive le caratteristiche speciali delle macchine tessili artigianali,
        come tensione regolabile o portatile
    textile_craft_project_type:
      name: Tipo di progetto dell’attività tessile
      description: Identifica il tipo di progetto artigianale tessile, come il lavoro
        a maglia o il quilting
    texture:
      name: Tramato
      description: Definisce la sensazione o la consistenza di un prodotto, ad esempio
        cremoso, opaco o assorbente
    texture_level:
      name: Livello di consistenza
      description: Indica la morbidezza o la grossolanità di un prodotto, in genere
        per puree alimentari nutrizionali; es. Livello 1 (purea), Livello 2 (tritato)
    theme:
      name: Tema
      description: Descrive il tema o il motivo principale del prodotto, ad esempio
        lo sport, lo spazio o le vacanze
    therapeutic_features:
      name: Caratteristiche terapeutiche
      description: Elenca modalità terapeutiche aggiuntive integrate nel tutore per
        il collo
    therapeutic_swing_accessories_included:
      name: Accessori per altalena terapeutica inclusi
      description: Elenca hardware o accessori aggiuntivi forniti con l'altalena
    therapy_mode_supported:
      name: Modalità di terapia supportata
      description: Elenca gli algoritmi di terapia respiratoria in cui il dispositivo
        può operare, oltre all'APAP standard
    therapy_temperature_type:
      name: Tipo di temperatura terapeutica
      description: Indica se il prodotto fornisce terapia del calore, terapia del
        freddo, o entrambe
    thermal_detector_type:
      name: Tipo di rilevatore termico
      description: Specifica la tecnologia utilizzata per il rilevamento termico nei
        dispositivi, ad esempio rilevatore di silicio amorfo (a Si).
    thermal_sensation:
      name: Sensazione termica
      description: Descrive l'effetto di temperatura percepito sulla pelle dopo l'applicazione
    thermocouple_type:
      name: Tipo di termocoppia
      description: Specifica la categoria della termocoppia nei sensori, ad es. Tipo
        J, Tipo S
    thickness_type:
      name: Tipo di spessore
      description: Indica il livello di spessore degli elementi, ad esempio sottile,
        medio o spesso
    thinner_application:
      name: Applicazione del diluente
      description: Descrive il tipo di sostanza per cui viene utilizzato un diluente,
        come vernice o resina epossidica
    thread_direction:
      name: Direzione del filo
      description: Identifica la direzione della filettatura sugli elementi hardware,
        come sinistra o destra
    threaded_rod_size:
      name: Dimensione della barra filettata
      description: Specifica il diametro di una barra filettata, ad es. M10, M20
    throw_pillow_shape:
      name: Forma di cuscino
      description: Identifica la forma dei cuscini decorativi, ad esempio a rullo
        o rettangolare
    thumb_grip_profile:
      name: Profilo dell'impugnatura per pollice
      description: Descrive la superficie o lo stile della forma della parte superiore
        dell'impugnatura per pollice (ad es., concava, a cupola), che influenza la
        presa e la sensazione di controllo
    ticket_additional_features:
      name: Funzionalità aggiuntive del biglietto
      description: Evidenzia i vantaggi extra offerti con i biglietti, ad esempio
        incontri di benvenuto o attività post-evento
    ticket_class:
      name: Classe del biglietto
      description: Specifica il livello di servizio o la classe di posto fornita con
        il biglietto
    ticket_type:
      name: Tipo di biglietto
      description: Identifica la categoria dei biglietti per eventi, come ingresso
        generale o posti riservati
    tile_design:
      name: Design delle piastrelle
      description: Descrive il motivo o lo stile di una piastrella, ad esempio geometrico
        o a spina di pesce
    tile_game_type:
      name: Tipo di gioco a tessere
      description: Identifica il tipo specifico di gioco con le tessere, come il domino
        o il mahjong
    tile_installation_method:
      name: Metodo di installazione delle piastrelle
      description: Descrive come viene installato un prodotto, in genere pannelli
        a soffitto o a parete; ad es. installazione in appoggio
    tile_look:
      name: Aspetto delle piastrelle
      description: Descrive l'aspetto o lo stile di una piastrella, ad esempio marmo
        o 3D
    tile_material:
      name: Materiale delle piastrelle
      description: Identifica la composizione delle piastrelle, ad esempio ceramica
        o pietra
    tile_texture:
      name: Trama delle piastrelle
      description: Descrive la sensazione della superficie di una piastrella, ad esempio
        liscia o strutturata
    time_period:
      name: Periodo di tempo
      description: Specifica l'arco temporale relativo a documenti o studi accademici,
        ad esempio rivoluzione medievale o industriale
    time_signatures:
      name: Indicazioni di tempo
      description: Definisce la struttura del battito, in genere per i metronomi;
        ad es. 4/4, 3/4
    time_weighting:
      name: Tempo di ponderazione
      description: Utilizzato per specificare la rapidità con cui un fonometro risponde
        alle fluttuazioni del suono, ad es. lento, veloce
    timepiece_features:
      name: Funzionalità dell'orologio
      description: Identifica le caratteristiche speciali di un orologio, come la
        durata regolabile o l'illuminazione
    timer_design:
      name: Design del temporizzatore
      description: Descrive il tipo di timer utilizzato nelle apparecchiature per
        camera oscura, ad esempio digitale o analogico
    timer_features:
      name: Funzionalità del timer
      description: Descrive le funzioni speciali di un timer, come durata regolabile
        o display integrato
    timer_type:
      name: Tipo di timer
      description: Specifica l'impostazione della frequenza dei timer, ad es. giornaliera,
        settimanale
    tingle_intensity:
      name: Intensità del formicolio
      description: Descrive il livello di sensazione di calore o formicolio prodotto
        dal prodotto quando applicato
    tip_design:
      name: Forma della punta
      description: Specifica il tipo di punta degli aghi e delle siringhe medicali,
        ad esempio luer lock o slip tip
    tip_material:
      name: Materiale della punta
      description: Specifica il materiale utilizzato nel manico del prodotto, ad es.
        bambù o plastica
    tip_opening:
      name: Apertura della punta
      description: Descrive la larghezza dell'apertura del bocchino sugli strumenti
        a fiato, come medio o grande
    tip_style:
      name: Stile della punta
      description: Descrive il design della punta del prodotto, ad es. angolata, curva
    tip_type:
      name: Tipo di punta
      description: Definisce il tipo di punta delle lance da pesca, come a scalpello
        o doppia ardiglione
    tire_bead_type:
      name: Tipo di tallone dello pneumatico
      description: Specifica il tipo di tallone nei pneumatici della bicicletta, ad
        esempio pieghevole o rigido
    tobacco_type:
      name: Tipo di tabacco
      description: Specifica la varietà di tabacco, ad es. turco, Virginia
    toddler_bed_features:
      name: Funzionalità del lettino
      description: Descrive le caratteristiche speciali dei lettini per bambini, come
        altezza regolabile o luce notturna incorporata
    toe_spacer_design:
      name: Modello di distanziatore di alluci
      description: Descrive il design dei separatori delle dita dei piedi utilizzati
        nella cura dei piedi, ad es. design sagomato e ad anello
    toe_strap_type:
      name: Tipo di strap anteriore
      description: Specifica il design del cinturino in punta, in genere per attacchi
        da snowboard o racchette da neve; ad es. puntale o tradizionale
    toe_style:
      name: Punta della scarpa
      description: Definisce la forma o il design della punta di una scarpa, ad esempio
        aperta o appuntita
    toilet/bidet_mounting_type:
      name: Tipologia di montaggio WC/Bidet
      description: Specifica la modalità di installazione del bidet, ad esempio a
        parete o a pavimento
    toilet_cover_design:
      name: Design del copriwater
      description: Descrive la forma dei copriwater, ad esempio rotondi o allungati
    toilet_cover_features:
      name: Funzionalità del copriwater
      description: Descrive le caratteristiche speciali di un copriwater, come sgancio
        rapido o chiusura ammortizzata
    toilet_mounting_type:
      name: Tipo di montaggio del water
      description: Specifica il metodo di installazione della toilette, ad es. a parete,
        a pavimento
    toilet_shape:
      name: Forma del water
      description: Descrive la forma di una toilette, ad esempio rotonda o rettangolare
    tom_tom_design:
      name: Design del tam-tam
      description: Descrive il tipo di tamburo tom-tom, ad esempio da pavimento o
        a rack
    tonearm_type:
      name: Tipo di braccio
      description: Descrive la geometria del braccio, che influisce sulle prestazioni
        di tracciamento e sull'usabilità per DJ
    tool/utensil_material:
      name: Materiale dello strumento/utensile
      description: Identifica il materiale principale utilizzato in uno strumento
        o utensile, come acciaio inossidabile o legno di teak
    tool_key_tip:
      name: Suggerimento per l’attrezzo
      description: Specifica il tipo di punta della chiave dell'utensile, ad esempio
        Phillips o chiave inglese
    tool_mobility:
      name: Mobilità degli strumenti
      description: Descrive se uno strumento è con o senza filo, in genere per prodotti
        dentali
    tool_operation:
      name: Funzionamento dell’attrezzo
      description: Descrive come viene utilizzato uno strumento, ad esempio manualmente
        o alimentato
    toothbrush_head_size:
      name: Taglia della testina dello spazzolino
      description: Definisce la dimensione relativa della testina di spazzolamento
        per adattarsi a diverse dimensioni della bocca e esigenze di pulizia
    toothbrush_head_type:
      name: Tipo di testina dello spazzolino
      description: Classifica lo stile funzionale della testina (ad es., sbiancante,
        cura delle gengive, bambini)
    toothpaste_type:
      name: Tipo di dentifricio
      description: Definisce la funzione specifica del dentifricio, ad esempio anti-carie
        o sbiancante
    toothpick_design:
      name: Modello di stuzzicadenti
      description: Specifica la forma degli stuzzicadenti, ad esempio rotondi o piatti
    top_color:
      name: Colore del piano
      description: Definisce il colore primario della superficie superiore di un prodotto,
        ad es. trasparente, bronzo
    top_length_type:
      name: Tipo di lunghezza della parte superiore
      description: Definisce la lunghezza di top o camicie, come crop top o lunghe
    top_material:
      name: Materiale del piano
      description: Definisce il materiale della superficie superiore di un prodotto,
        ad es. legno, vetro
    top_pattern:
      name: Modello superiore
      description: Descrive il design o la stampa sulla superficie di un prodotto,
        ad esempio floreale o a righe
    top_surface_material:
      name: Materiale della superficie del piano
      description: Specifica il materiale utilizzato sulla superficie superiore del
        prodotto, ad esempio acciaio inossidabile o vetro ceramico
    top_up_method:
      name: Metodo di ricarica
      description: Specifica le modalità con cui chi utilizza il servizio può aggiungere
        credito o rinnovare il piano sulla carta prepagata o sulla SIM.
    tote_handle_type:
      name: Tipo di manico della sporta
      description: Identifica lo stile dei manici di una borsa tote, ad esempio corti
        o lunghi
    totem_design:
      name: Design della cassetta
      description: Specifica il design dei totem per fiere, ad esempio monofacciali
        o bifacciali
    touch_capabilities:
      name: Funzionalità touch
      description: Indica il tipo di interazione tattile supportata da un dispositivo
        elettronico, ad esempio singola o doppia
    touchpad_form_factor:
      name: Fattore di forma del touchpad
      description: Definisce lo stile di installazione o utilizzo previsto del touchpad
    touchscreen_technology:
      name: Tecnologia touchscreen
      description: Identifica la tecnologia touchscreen per dispositivi interattivi,
        ad esempio capacitivi o resistivi
    touchscreen_wire_configuration:
      name: Configurazione dei fili del touchscreen
      description: Indica il numero di fili o linee utilizzati dai digitalizzatori
        resistivi, influenzando la compatibilità con i controller
    toy/game_material:
      name: Materiale giocattolo/gioco
      description: Identifica il materiale principale utilizzato in un giocattolo
        o gioco, ad esempio plastica o legno
    toy_figure_features:
      name: Funzionalità del personaggio giocattolo
      description: Evidenzia le caratteristiche speciali delle figure giocattolo,
        come giunti articolati o dettagli realistici
    toy_figure_theme:
      name: Tema delle figure giocattolo
      description: Identifica il tema o la categoria di una figura giocattolo, ad
        esempio animale o sport
    toy_tool_type:
      name: Tipo di strumento giocattolo
      description: Identifica il tipo di strumento giocattolo in un set di giochi
        di finzione, come un trapano o un martello
    track_configuration:
      name: Configurazione delle tracce
      description: Indica il formato delle tracce del nastro e i canali che la macchina
        può registrare o riprodurre (ad es., stereo vs mono, numero di tracce)
    tracker_form_factor:
      name: Fattore di forma del tracker
      description: Definisce lo stile fisico e la forma dell'hardware del tracker
    tracking_metrics:
      name: Parametri di monitoraggio
      description: Specifica i dati di salute e fitness monitorati dal prodotto, ad
        es. sonno, passi
    tracking_purpose:
      name: Finalità del monitoraggio
      description: Specifica l'uso previsto dei dispositivi di localizzazione GPS,
        ad esempio il monitoraggio delle risorse o il monitoraggio degli animali domestici
    tractor_accessories_included:
      name: Accessori per trattore inclusi
      description: Specifica le caratteristiche extra fornite con il trattore, come
        il kit mulching o la lama da neve
    trade_show_display_features:
      name: Funzionalità di visualizzazione della fiera
      description: Identifica le caratteristiche speciali dei display delle fiere,
        come touchscreen o illuminazione
    trading_card_packaging:
      name: Imballaggio delle figurine
      description: Identifica il modo in cui sono confezionate le carte collezionabili,
        ad esempio blister o buste
    traffic_control_device_features:
      name: Funzionalità del dispositivo di controllo del traffico
      description: Identifica le caratteristiche uniche degli articoli di controllo
        del traffico, ad esempio base impilabile o ponderata
    trail_camera_design:
      name: Design della fototrappola
      description: Descrive il tipo di fotocamera da trail, ad esempio standard o
        cellulare
    trailer_type:
      name: Tipo di rimorchio
      description: Identifica il design o lo stile di un rimorchio per autoveicoli,
        ad esempio aperto o chiuso
    training_data_requirements:
      name: Requisiti dei dati di addestramento
      description: Identifica il tipo e la qualità dei dati necessari per un'efficace
        formazione sul software di intelligenza artificiale o apprendimento automatico,
        ad es. dati etichettati
    trampoline_design:
      name: Design del trampolino
      description: Descrive la costruzione del trampolino, ad esempio senza molle
        o con molle elicoidali
    transceiver_form_factor:
      name: Fattore di forma del ricetrasmettitore
      description: Definisce lo standard del modulo fisico del ricetrasmettitore di
        rete (ad es., SFP, QSFP28)
    transcriber/dictation_system_features:
      name: Funzionalità del sistema di trascrizione/dettatura
      description: Identifica le caratteristiche speciali dei trascrittori o dei sistemi
        di dettatura, come basato sull'intelligenza artificiale o  riduzione del rumore
    transfer_aid_type:
      name: Tipo di ausilio per il trasferimento
      description: Classifica lo stile dell'ausilio, distinguendo le tavole rigide
        dai fogli flessibili e dai tappetini ad aria assistita
    transfer_board_shape:
      name: Forma della tavola di trasferimento
      description: Definisce il profilo geometrico della tavola o del foglio, che
        influenza il percorso di trasferimento e la compatibilità con diverse altezze
        di seduta o letto
    transfer_boards_surface_type:
      name: Tipo di superficie delle tavole di trasferimento
      description: Specifica la struttura della superficie delle assi di trasferimento
        per la mobilità, ad es. imbottita, liscia
    transfer_paper_technique:
      name: Tecnica della carta transfer
      description: Identifica il metodo utilizzato per la carta transfer, come il
        getto d'inchiostro o il ferro da stiro
    transmission_type:
      name: Tipo di trasmissione
      description: Identifica il tipo di trasmissione nei veicoli o nelle parti, come
        manuale o automatica
    transmitter_form_factor:
      name: Fattore di forma del trasmettitore
      description: Classifica lo stile fisico o l'alloggiamento dell'unità trasmettitore
        per aiutare chi acquista a trovare rapidamente la forma adatta alla propria
        applicazione
    transport_type:
      name: Tipo di trasporto
      description: Specifica la modalità di trasporto pubblico per la quale il biglietto
        o l'abbonamento è valido
    trash_can_features:
      name: Funzionalità del cestino
      description: Descrive le caratteristiche speciali dei bidoni della spazzatura,
        come controllo degli odori o pedale
    travel_pillow_features:
      name: Caratteristiche del cuscino da viaggio
      description: Elenca le caratteristiche funzionali speciali, gli accessori o
        i miglioramenti di design del cuscino da viaggio
    travel_pillow_shape:
      name: Forma del cuscino da viaggio
      description: 'Descrive il contorno fisico dei cuscini da viaggio, ad esempio
        a forma di J '
    tray_compatibility:
      name: Compatibilità della mascherina
      description: Identifica lo stile di mascherina sbiancante o paradenti che la
        custodia è progettata per contenere
    treatment_area:
      name: Zona da trattare
      description: Specifica la parte del corpo interessata da un prodotto, in genere
        per gli articoli per massaggi; ad es. schiena, collo
    treatment_method:
      name: Metodo di trattamento
      description: Descrive il meccanismo o la tecnologia di somministrazione che
        il prodotto utilizza per eliminare la lesione (ad es., crioterapia, acido
        chimico, cerotto con microaghi)
    treatment_modes:
      name: Modalità di trattamento
      description: Elenca le modalità funzionali supportate dal dispositivo (ad es.,
        HR, SHR, SR)
    treatment_objective:
      name: Funzione del trattamento
      description: Definisce il problema affrontato dal prodotto, in genere per gli
        articoli per la cura personale; ad es. russare, febbre
    treatment_target_area:
      name: Area di trattamento target
      description: Indica se il prodotto è formulato per ciglia, sopracciglia o entrambe
    treatment_texture:
      name: Texture del trattamento
      description: Definisce la consistenza dei prodotti per il trattamento, come
        la crema per dermatite da pannolino; ad es. denso, polvere
    treatment_type:
      name: Tipo di trattamento
      description: Specifica il metodo di trattamento, in genere per i trattamenti
        contro la caduta dei capelli; ad es. laser, topico
    tree_stand_material:
      name: Materiale per il sostegno dell'albero
      description: Specifica il materiale di cui è fatto il supporto per albero, ad
        esempio plastica o metallo
    trellis_design:
      name: Design del graticcio
      description: Identifica il disegno del reticolo nelle recinzioni o nelle barriere,
        ad es. quadrato, diamante
    tricycle_design:
      name: Design del triciclo
      description: Descrive lo stile di un triciclo, ad esempio verticale o reclinato
    tricycle_propulsion_type:
      name: Tipo di propulsione triciclo
      description: Specifica la modalità di guida del triciclo, ad esempio a spinta
        o con trazione anteriore
    trip_type:
      name: Tipo di salto
      description: Specifica il tipo di intervento in un interruttore automatico,
        ad es. non intercambiabile
    tripod/monopod_attachment_type:
      name: Tipo di attacco treppiede/monopiede
      description: Specifica il tipo di connessione per gli accessori del treppiede
        o del monopiede, ad esempio 3/8 o universale
    tripod/monopod_head_type:
      name: Tipo di testa del treppiede/monopiede
      description: Specifica il meccanismo delle teste del treppiede/monopiede, come
        ingranaggio o gimbal
    tripod_handle_type:
      name: Tipo di impugnatura per treppiede
      description: Specifica la funzionalità delle impugnature del treppiede, ad es.
        multifunzione, impugnatura a pistola
    trophy_design:
      name: Design del trofeo
      description: Descrive lo stile o la forma specifica di un trofeo, ad esempio
        una coppa o una stella
    truck_type:
      name: Tipo di camion
      description: Classifica il tipo di camion, ad esempio autocarro con cassone
        ribaltabile o camion con pianale
    tube_component:
      name: Componente del tubo
      description: Specifica il tipo di tubo negli amplificatori musicali, ad es.
        custodia, supporto
    tube_configuration:
      name: Configurazione del tubo
      description: Descrive la disposizione delle valvole in un amplificatore per
        strumenti musicali, come valvola singola o coppia abbinata
    tuner_design:
      name: Progettazione del sintonizzatore
      description: Descrive lo stile degli accordatori elettronici per strumenti musicali,
        come quelli a clip o a pedale
    tuner_type:
      name: Tipo di sintonizzatore
      description: Definisce il tipo di frequenza radio ricevuta, ad esempio AM/FM
        o radio satellitare
    tuning_fork_design:
      name: Design del diapason
      description: Descrive il design specifico di un diapason, ad esempio ponderato
        o non ponderato
    tuning_fork_frequency:
      name: Frequenza del diapason
      description: Specifica la frequenza di un diapason, ad esempio 128 Hz o 256
        Hz
    tuning_modes:
      name: Modalità di accordatura
      description: Identifica le impostazioni specifiche dello strumento per accordatori
        elettronici, come chitarra o violino
    tuning_pitch:
      name: Intonazione dell'accordatura
      description: Specifica l'altezza dell'accordatura di uno strumento, ad esempio
        Do diesis o La bemolle
    tuning_range:
      name: Gamma di accordatura
      description: Specifica la gamma di opzioni di ottimizzazione disponibili, come
        standard o aperta
    tv_broadcast_standards_supported:
      name: Standard di trasmissione TV supportati
      description: Elenca gli standard specifici di trasmissione televisiva o via
        cavo/satellite che la scheda o l'adattatore può decodificare o ricevere
    uc_platform_certification:
      name: Certificazione della piattaforma UC
      description: Identifica le piattaforme di comunicazione unificata o di riunione
        per le quali il dispositivo è ufficialmente certificato.
    ultrasound_probe_type:
      name: Tipo di sonda ecografica
      description: Identifica le caratteristiche di design della sonda fornita con
        il monitor (ad es., impermeabile, interno)
    undershirt_style:
      name: Stile canottiera
      description: Descrive il design o il taglio di una maglietta intima, come il
        girocollo o lo scollo a V
    underwear_style:
      name: Stile della biancheria intima
      description: Definisce il design e il taglio della biancheria intima, ad esempio
        bikini o slip contenitivi
    units_of_measurement:
      name: Unità di misurazione
      description: Specifica il sistema di misurazione utilizzato per il prodotto,
        ad es. millimetri (mm), Fahrenheit (°F)
    update_frequency:
      name: Frequenza di aggiornamento
      description: Indica la regolarità degli aggiornamenti per software o dati, ad
        es. in tempo reale, ogni anno
    upholstery_color:
      name: Colore della tappezzeria
      description: Identifica il colore del rivestimento di un prodotto, ad esempio
        rosso o beige
    upholstery_material:
      name: Materiale di rivestimento
      description: Identifica il tessuto utilizzato per il rivestimento, ad esempio
        pelle o velluto
    upholstery_pattern:
      name: Modello di tappezzeria
      description: Descrive il design visivo sul tessuto di un mobile, ad esempio
        a strisce o a scacchi
    uplink_port_type:
      name: Tipo di porta uplink
      description: Definisce il connettore uplink a velocità più alta presente sullo
        switch (ad es., SFP+, QSFP28, 10GBase-T)
    ups_topology:
      name: Topologia UPS
      description: Indica l'approccio di progettazione interna che un UPS utilizza
        per condizionare e fornire energia (ad es., standby, line-interactive, online)
    urinal_mounting_type:
      name: Tipo di montaggio dell’orinatoio
      description: Specifica la modalità di installazione dell'orinatoio, ad esempio
        a parete o a pavimento
    usage_conditions:
      name: Condizioni di utilizzo
      description: Specifica se il prodotto è adatto all'uso in condizioni asciutte
        o bagnate, in genere per i rasoi
    usage_environment:
      name: Ambiente di utilizzo
      description: Specifica dove il prodotto abbronzante è destinato a essere utilizzato
    usage_frequency:
      name: Frequenza di utilizzo
      description: Specifica la frequenza consigliata per l'uso del prodotto, ad esempio
        giornaliera o settimanale
    usage_type:
      name: Tipo di utilizzo
      description: Specifica il ciclo di utilizzo previsto del prodotto, ad es. riutilizzabile,
        ricaricabile
    usb_connector_type:
      name: Tipo di connettore USB
      description: Identifica il/i connettore/connettori USB fisici forniti sul dispositivo
        per i dati e/o l'alimentazione.
    usb_standard:
      name: Standard USB
      description: Specifica la versione USB per dispositivi elettronici, ad esempio
        USB 2.0 o USB 3.1 Gen 1
    user_type:
      name: Tipo di utente
      description: Identifica l'utenza prevista di un prodotto software, ad esempio
        individuo o piccola impresa
    utility/maintenance_task_type:
      name: Tipo di attività di utenza/manutenzione
      description: Classifica l'attività eseguita da un software, ad esempio pulizia
        del disco o ottimizzazione del sistema
    uv_blocking_class:
      name: Classe di protezione UV
      description: Indica il livello di protezione UV integrato nella lente a contatto
        come definito dagli standard ISO
    uv_protection:
      name: Protezione UV
      description: Specifica la capacità del prodotto di bloccare i raggi UV, in genere
        per gli occhiali da sole; ad es. UV400
    uva_protection_grade:
      name: Grado di protezione UVA
      description: Indica il grado di protezione UVA del prodotto, comunemente espresso
        come gradi PA
    vacuum_air_filtering_technology:
      name: Tecnologia di filtraggio dell’aria dell’aspirapolvere
      description: Specifica il tipo di filtraggio dell'aria utilizzato negli aspirapolvere,
        ad esempio HEPA o animali domestici
    valve_type:
      name: Tipo di valvola
      description: Specifica il tipo di valvola nelle parti della bicicletta, ad es.
        Presta, Schrader
    van_type:
      name: Tipo di furgone
      description: Distingue tra diversi tipi di furgone, ad esempio furgone passeggeri
        o furgone convertito
    vaping_style:
      name: Stile di svapo
      description: 'Specifica la tecnica di svapo delle sigarette elettroniche, ad
        es. direttamente al polmone, bocca a polmone '
    varnish/finish_application:
      name: Applicazione della vernice/finitura
      description: Specifica le aree di applicazione adatte per una vernice o finitura,
        ad esempio pareti o porte
    vase_shape:
      name: Forma del vaso
      description: Descrive la forma geometrica o organica di un vaso, ad esempio
        rotondo o bottiglia
    vcr_configuration:
      name: Configurazione VCR
      description: Identifica se l'unità è un VCR autonomo o un dispositivo combinato
        con unità o sintonizzatori aggiuntivi
    vdi_protocol_support:
      name: Supporto del protocollo VDI
      description: Specifica i protocolli Virtual Desktop Infrastructure (VDI) supportati,
        ad es. PCoIP, RDP
    vehicle_alarm/lock_features:
      name: Funzionalità di allarme/blocco del veicolo
      description: Specifica le caratteristiche uniche dei sistemi di sicurezza del
        veicolo, ad esempio avvio remoto o resistenza agli agenti atmosferici
    vehicle_application_area:
      name: Area di applicazione del veicolo
      description: Specifica la parte di un veicolo a cui si applica il prodotto,
        ad esempio rivestimento o esterno
    vehicle_audio_system_features:
      name: Funzionalità del sistema audio del veicolo
      description: Identifica le caratteristiche speciali del sistema audio di un
        veicolo, come amplificazione dei bassi o display LED
    vehicle_braking_features:
      name: Funzionalità di frenata del veicolo
      description: Descrive le caratteristiche specifiche degli organi frenanti del
        veicolo, come resistenti alla corrosione o forati
    vehicle_cleaning_item_features:
      name: Funzionalità degli articoli per la pulizia del veicolo
      description: Evidenzia i vantaggi degli articoli per la pulizia del veicolo,
        ad esempio migliore efficienza del carburante o elevata brillantezza
    vehicle_decor_features:
      name: Funzionalità dell'arredamento del veicolo
      description: Descrive le caratteristiche degli elementi decorativi del veicolo,
        ad esempio resistenza ai raggi UV o impermeabile
    vehicle_drive/handling_features:
      name: Funzionalità di guida/gestione del veicolo
      description: Descrive le caratteristiche delle parti dei veicoli a motore, in
        genere nei sistemi di trasmissione, trasmissione, traino e ruote; ad es.,
        ad alte prestazioni, resistente al calore
    vehicle_engine/part_features:
      name: Funzionalità del motore/parte del veicolo
