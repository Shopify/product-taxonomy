    cleaning_surfaces:
      name: Superfici di pulizia
      description: Identifica le superfici adatte per un prodotto di pulizia, ad esempio
        superfici in vetro o piani cottura
    cleaning_technology:
      name: Tecnologia di pulizia
      description: Descrive il movimento o meccanismo primario che lo spazzolino utilizza
        per pulire i denti
    cleanse_focus:
      name: Focus della depurazione
      description: Identifica il sistema corporeo o lo scopo primario mirato dal prodotto
