    direction_detection_capability:
      name: Capacità di rilevamento della direzione
      description: Indica se il radar può segnalare la direzione dell'oggetto (ad
        es., in avvicinamento, in partenza o entrambi)
    dirt_separating_method:
      name: Metodo di separazione dello sporco
      description: Descrive la tecnica utilizzata da un aspirapolvere per la separazione
