      description: Specifica il tipo di trasduttore utilizzato per produrre il suono
        (ad es., dinamico, armatura bilanciata, magnetico planare, ibrido)
    drone_board_function:
      name: Funzione della scheda drone
      description: Descrive lo scopo principale della scheda circuitale all'interno
