    cleaning_instructions:
      name: Istruzioni di pulizia
      description: Fornisce una guida sul metodo di pulizia consigliato, ad esempio
        lavabile in lavastoviglie o solo a mano
    cleaning_kit_components_included:
      name: Componenti del kit di pulizia inclusi
      description: Elenca gli articoli specifici contenuti nel kit in modo che chi
        acquista comprenda quali strumenti e materiali di consumo sono inclusi
    cleaning_mode:
      name: Modalità di pulizia
      description: Elenca le modalità specifiche di pulizia o filo interdentale disponibili
