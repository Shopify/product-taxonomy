        dal dispositivo.
    air_purifier_filtration_rating:
      name: Valutazione della filtrazione del purificatore d'aria
      description: Indica la classe di efficienza certificata del materiale del filtro.
    animal_care_set_components_included:
      name: Componenti del set per la cura degli animali inclusi
      description: Elenca gli accessori e i prodotti individuali per la cura o la
        pulizia forniti nel set, in modo che l'acquirente sappia esattamente cosa
        riceverà.
    apron_features:
      name: Caratteristiche del grembiule
      description: Evidenzia le caratteristiche funzionali speciali del grembiule.
    apron_style:
      name: Stile del grembiule
      description: Definisce il taglio o la struttura complessiva del grembiule.
    aquatic_plant_growth_habit:
      name: Portamento delle piante acquatiche
      description: Classifica le piante acquatiche in base alla loro posizione tipica
        e al loro portamento nella colonna d'acqua.
    arbor_top_design:
      name: Design della parte alta del pergolato
      description: Specifica la forma o lo stile della sezione superiore del pergolato,
        aiutando i clienti a scegliere in base alle preferenze architettoniche.
    ashtray_type:
      name: Tipo di posacenere
      description: Classifica il posacenere in base al suo utilizzo o contesto principale.
    attractant_type:
      name: Tipo di attrattivo
      description: Specifica il meccanismo di richiamo integrato nella colla, se presente,
        aiutando a scegliere la trappola più efficace per la situazione specifica.
    awning_operation_type:
      name: Tipo di funzionamento della tenda
      description: Descrive il meccanismo utilizzato per estendere e ritrarre la tenda
        da sole.
    bag_clip_style:
      name: Stile della clip per sacchetti
      description: Descrive il tipo meccanico del meccanismo di chiusura della clip.
    bag_configuration:
      name: Configurazione sacchi
      description: Descrive il numero e lo stile dei sacchi inclusi nel sistema di
        raccolta dell'erba.
    bag_insulation:
      name: Isolamento della borsa
      description: Indica se la borsa portabottiglie è isolata termicamente per aiutare
        a mantenere la temperatura del vino.
    baking_liner_size:
      name: Taglia pirottini
      description: Convenzione della taglia utilizzata dai pasticceri per indicarne
        la capacità rispetto alle dimensioni standard dei cupcake.
    baking_sheet_style:
      name: Stile teglia da forno
      description: Indica il tipo di teglia, ad esempio con bordo o perforata.
    ballast_material:
      name: Materiale di zavorra
      description: Elenca i materiali che possono essere utilizzati per zavorrare
        (riempire) il tamburo del rullo, aiutando gli acquirenti a scegliere modelli
        compatibili con il materiale di riempimento preferito.
    base_features:
      name: Caratteristiche della base
      description: Evidenzia le caratteristiche di stabilità o presa della base, aiutando
        gli utenti che necessitano di funzionalità antiscivolo o di aspirazione sulle
        superfici di lavoro.
    baster_tip_type:
      name: Tipo di punte per siringa
      description: Classifica il tipo di punta o accessorio della siringa da cucina,
        permettendo agli acquirenti di filtrare tra siringhe a bulbo standard, aghi
        iniettori e punte a spazzola.
    bathroom_accessories_included:
      name: Accessori da bagno inclusi
      description: Elenca gli articoli specifici inclusi nel set di accessori da bagno,
        in modo che gli acquirenti sappiano esattamente quali pezzi sono inclusi.
    bathroom_accessory_compatibility:
      name: Compatibilità degli accessori da bagno
      description: Indica quale accessorio o elemento di arredo per il bagno può sostenere
        il supporto.
    battery_backup_support:
      name: Supporto batteria di riserva
      description: Indica se una batteria di emergenza è inclusa, opzionale o non
        prevista.
    bedskirt_corner_style:
      name: Tipo di angoli della gonna per letto
      description: Specifica come sono rifiniti gli angoli della gonna per letto,
        influenzando la compatibilità su letti con pediera o montanti.
    bedskirt_style:
      name: Stile gonna da letto
      description: Definisce la struttura e il design della gonna da letto, aiutando
        gli acquirenti a scegliere tra look come arricciato o su misura.
    beer_glass_type:
      name: Tipo di bicchiere da birra
      description: Indica lo stile specifico o la forma del bicchiere da birra, aiutando
        gli acquirenti a trovare il contenitore ideale per la birra che preferiscono
        (ad esempio, pinta, pilsner, weizen).
    belt_profile:
      name: Profilo della cinghia
      description: Indica la sezione trasversale o lo stile della cinghia, per garantire
        la corretta compatibilità con il design della puleggia.
    beverage_tub_features:
      name: Caratteristiche del contenitore per bevande
      description: Evidenzia gli elementi di design o i componenti inclusi di rilievo
        che aggiungono funzionalità o praticità al contenitore per bevande.
    blade_construction_method:
      name: Metodo di realizzazione della pala
      description: Specifica come è stata realizzata la pala.
    blade_finish:
      name: Finitura della pala
      description: Variante superficiale o finitura estetica applicata alla pala.
    blade_shape:
      name: Forma della pala
      description: Descrive la forma geometrica/il profilo della pala.
    blade_sidedness:
      name: Lato della lama
      description: Indica se la lama del tagliasiepi presenta denti da taglio su un
        solo lato o su entrambi i lati.
    bleach_formulation:
      name: Formulazione sbiancante
      description: Indica la base chimica del prodotto sbiancante (ad esempio cloro
        o ossigeno).
    bleach_type:
      name: Tipo di candeggina
      description: Specifica la presenza e il tipo di agente sbiancante o schiarente
        utilizzato nello smacchiatore.
    blender_jar_material:
      name: Materiale del bicchiere del frullatore
      description: Specifica il materiale utilizzato per il contenitore di miscelazione/brocca
        principale.
    blooming_season:
      name: Stagione di fioritura
      description: Indica le stagioni in cui la pianta solitamente fiorisce.
    booster_pump_requirement:
      name: Necessità di pompa booster
      description: Specifica se è necessaria una pompa booster separata per far funzionare
        il braccio spazzante.
    bore_type:
      name: Tipo di alesaggio
      description: Definisce il tipo di alesaggio o l'interfaccia utilizzata per montare
        la puleggia sull'albero.
    bottle_cap_gasket_material:
      name: Materiale della guarnizione sul tappo della bottiglia
      description: Indica il materiale della guarnizione di tenuta a contatto con
        il bordo della bottiglia.
    bottle_cap_liner_type:
      name: Tipo di rivestimento del tappo della bottiglia
      description: Specifica il tipo o il materiale del rivestimento sigillante all'interno
        del tappo della bottiglia, che influisce sulla tenuta stagna e sulla compatibilità
        del prodotto.
    bottle_fill_state:
      name: Stato di riempimento della bottiglia
      description: Indica se la bottiglia viene venduta vuota o pre-riempita con acqua
        potabile.
    bottle_stopper_mechanism:
      name: Meccanismo di chiusura della bottiglia
      description: Definisce il meccanismo o il tipo di sigillatura utilizzato dal
        tappo o dal tappo di sicurezza.
    bowl_type:
      name: Tipo di scodella
      description: Classifica l'uso principale previsto o lo stile della ciotola.
    bread_storage_ventilation:
      name: Ventilazione per la conservazione del pane
      description: Descrive se e come il contenitore consente il flusso d'aria per
        mantenere il pane fresco.
    brew_strength_options:
      name: Opzioni di intensità dell'infusione
      description: Elenca i livelli di intensità selezionabili che regolano il tempo
        di estrazione o il flusso per ottenere un caffè più leggero o più corposo.
    bridge_railing_style:
      name: Stile ringhiera del ponte
      description: Specifica la presenza e il tipo di ringhiera, influenzando sicurezza
        e aspetto.
    briquette_ignition_type:
      name: Tipo di accensione a bricchetti
      description: Indica se i bricchetti includono accendifuoco o sono standard,
        aiutando gli utenti a valutare la facilità di accensione.
    bristle_stiffness:
      name: Rigidità delle setole
      description: Indica la rigidità delle setole dello spazzolone, che influisce
        sulla potenza di lavaggio e sull'idoneità alle diverse finiture del water.
    bristle_tip_type:
      name: Tipo di punta delle setole
      description: Indica se le punte delle setole sono divise (a ventaglio) per raccogliere
        polveri fini oppure integre per residui più pesanti.
    bucket_features:
      name: Caratteristiche del secchio
      description: Evidenzia le caratteristiche speciali o i miglioramenti funzionali
        di un secchio, in modo che gli acquirenti possano individuare rapidamente
        i prodotti con le qualità desiderate.
    bulb_finish:
      name: Finitura della lampadina
      description: Descrive il rivestimento esterno o la finitura del vetro della
        lampadina, che influisce sulla diffusione della luce e sullo stile.
    burner_shape:
      name: Forma del bruciatore
      description: Descrive il design geometrico del bruciatore della griglia, che
        determina l'adattamento e la distribuzione del calore all'interno della griglia.
    burr_shape:
      name: Forma della macina
      description: Specifica la geometria della macina per macinacaffè a macine, che
        influisce sulla consistenza della macinatura e sulla generazione di calore.
    butterfly_feeder_food_type:
      name: Tipo di alimento per mangiatoia per farfalle
      description: Identifica il tipo di alimento o attrattivo che può contenere la
        mangiatoia.
    cabinet_light_fixture_style:
      name: Stile apparecchio di illuminazione per mobili
      description: Descrive lo stile o la forma dell'apparecchio di illuminazione
        per mobili.
    candle_container_material:
      name: Materiale del contenitore della candela
      description: Indica il materiale del vaso o del contenitore della candela (per
        candele in barattolo o latta).
    canner_type:
      name: Tipo di sterilizzatore
      description: Specifica il metodo o lo stile di conservazione per cui è progettato
        lo sterilizzatore.
    canopy_shape:
      name: Forma della tenda
      description: Specifica le forme geometriche della tenda aperta.
    canopy_venting:
      name: Ventilazione della tenda
      description: Indica la configurazione di ventilazione della tenda, che influisce
        sulla resistenza al vento e sulla dissipazione del calore.
    car_cleaning_kit_items_included:
      name: Articoli inclusi nel kit per la pulizia dell'auto
      description: Elenca gli strumenti e gli accessori specifici forniti nel kit
        in modo che gli acquirenti sappiano esattamente cosa riceveranno e confrontare
        i pacchetti.
    carbonation_level_adjustment:
      name: Regolazione del livello di carbonatazione
      description: Indica se il gasatore offre un livello di carbonatazione fisso
        o regolabile.
    catalytic_combustor_type:
      name: Tipo di combustore catalitico
      description: Indica se la stufa utilizza un sistema di combustione catalitico,
        non catalitico o ibrido, influendo su efficienza ed emissioni.
    ceiling_light_fixture_style:
      name: Stile dell'apparecchio di illuminazione a soffitto
      description: Definisce lo stile/la configurazione strutturale principale dell'apparecchio
        di illuminazione a soffitto.
    center_hole_shape:
      name: Forma del foro centrale
      description: Descrive le forme geometriche del foro centrale/di montaggio della
        lama, che determinano la compatibilità con specifici mandrini del tosaerba.
    chainsaw_bar_mount_type:
      name: Tipo di fissaggio della barra del motosega
      description: Specifica il modello di fissaggio o lo stile della scanalatura
        della barra per garantire la compatibilità con il gruppo motore della motosega.
    chainsaw_bar_nose_type:
      name: Tipo di puntale della barra di motosega
      description: Identifica lo stile della punta della barra, che influenza le prestazioni
        di taglio e la manutenzione.
    chainsaw_bar_type:
      name: Tipo di barra di motosega
      description: Classifica la struttura o lo scopo della barra.
    chainsaw_cutter_type:
      name: Tipo di tagliente per motosega
      description: Indica il profilo o il design del dente della catena, che influenzano
        velocità di taglio, durata e caratteristiche di contraccolpo.
    champagne_glass_type:
      name: Tipo di bicchiere da champagne
      description: Specifica il design particolare di un bicchiere da champagne, consentendo
        agli acquirenti di distinguere tra forme ottimizzate per diverse esperienze
        di degustazione.
    chandelier_shape:
      name: Forma del lampadario
      description: Definisce la forma strutturale complessiva del lampadario.
    charcoal_chimney_features:
      name: Caratteristiche del camino per carbone
      description: Elenca le caratteristiche funzionali più importanti del camino
        per carbone.
    charcoal_ignition_type:
      name: Tipo di accensione a carbone
      description: Indica se il carbone è stato trattato o progettato per un'accensione
        più facile o una combustione più pulita.
    chopstick_style:
      name: Stile bacchette
      description: Specifica lo stile regionale o culturale delle bacchette, che può
        influenzarne la lunghezza, la forma e la decorazione.
    chopstick_trainer_design:
      name: Design dell'ausilio per bacchette
      description: Descrive la progettazione meccanica o il metodo di ausilio utilizzato.
    cigar_cutter_type:
      name: Tipo di tagliasigari
      description: Specifica il meccanismo di taglio o lo stile utilizzato per rimuovere
        il cappuccio del sigaro.
    cigar_punch_type:
      name: Tipo di punzone per sigari
      description: Identifica il meccanismo o lo stile del punzone per sigari.
    clay_pot_material:
      name: Materiale della pentola in terracotta
      description: Identifica la composizione dell'argilla o lo stile utilizzato nella
        pentola, ad esempio terracotta o grès.
    cleaner_concentration:
      name: Concentrazione di detergente
      description: Indica se il detergente viene venduto in una formula pronta all'uso
        o concentrata da diluire prima dell'uso.
    cleaning_cloth_features:
      name: Caratteristiche del panno per la pulizia
      description: Evidenzia le caratteristiche prestazionali speciali dei tessuti.
    cleaning_solution_concentration:
      name: Concentrazione della soluzione detergente
      description: Indica se il prodotto è venduto in una formula pronta all'uso,
        concentrata o in altri formati diluiti.
    clock_chime_melody:
      name: Melodia della suoneria dell'orologio
      description: Specifica la melodia o il ritmo riprodotto dall'orologio allo scoccare
        dell'ora o del quarto d'ora.
    clock_display_type:
      name: Tipo di display dell'orologio
      description: Specifica come viene mostrata l'ora, utile per i clienti che preferiscono
        il formato digitale, analogico, flip, ecc.
    clock_hand_mounting_type:
      name: Tipo di montaggio delle lancette dell'orologio
      description: Definisce lo stile dell'interfaccia utilizzato per collegare le
        lancette dell'orologio al movimento.
    clock_hand_style:
      name: Stile delle lancette dell'orologio
      description: Specifica l'aspetto delle lancette, consentendo agli acquirenti
        di trovare lancette che si adattino all'estetica del proprio orologio.
    clock_movement_type:
      name: Tipo di movimento dell'orologio
      description: Identifica il meccanismo interno di misurazione dell'ora dell'orologio.
    clothespin_type:
      name: Tipo di molletta
      description: Identifica il design/lo stile strutturale della molletta.
    co2_cylinder_compatibility:
      name: Compatibilità con bombole di CO2
      description: Definisce il tipo o la taglia della bombola di CO2 supportata dal
        gasatore, garantendo che gli acquirenti possano trovare cartucce di ricarica
        compatibili.
    co2_supplementation_requirement:
      name: Requisito di integrazione di CO2
      description: Indica il livello di integrazione di anidride carbonica necessario
        per una salute ottimale delle piante negli acquari.
    coaster_features:
      name: Caratteristiche dei sottobicchieri
      description: Identifica le caratteristiche esclusive dei sottobicchieri, come
        la base assorbente o antiscivolo.
    cocktail_strainer_type:
      name: Tipo di colino da cocktail
      description: Indica il design del colino, che ne influenza la compatibilità
        con shaker e la modalità d'uso.
    code_technology:
      name: Tecnologia del codice
      description: Identifica il codice o la tecnologia di sicurezza utilizzata dal
        telecomando per comunicare con l'apriporta del garage.
    coffee_decanter_warmer_features:
      name: Caratteristiche dello scaldatazzine per caffè
      description: Evidenzia funzioni di rilievo e caratteristiche di sicurezza dello
        scaldatazzine per caffè.
    coffee_filter_basket_size:
      name: Dimensione del cestello per filtro da caffè
      description: Specifica la designazione della taglia standard supportata dal
        cestello, garantendo la compatibilità con filtri e macchine.
    coffee_filter_shape:
      name: Forme del filtro da caffè
      description: Specifica la forma geometrica del filtro da caffè per garantire
        la compatibilità con diverse macchine da caffè.
    coffee_filter_type:
      name: Tipo di filtro da caffè
      description: Specifica il tipo di filtro accettato o incluso per una macchina
        da caffè a goccia, che può influire sul sapore e sul costo dei materiali di
        consumo.
    coffee_grinder_accessory_type:
      name: Tipo di accessorio per macinacaffè
      description: Classifica il tipo specifico di accessorio per facilitare il filtraggio
        e la ricerca.
    colander_style:
      name: Stile dello scolapasta
      description: Classifica il design strutturale dello scolapasta, ad esempio ciotola
        con piedini o da posizionare sul lavandino.
    compatible_air_conditioner_type:
      name: Tipo di condizionatore compatibile
      description: Identifica il tipo di condizionatore con cui l'accessorio può funzionare.
    compatible_awning_rail_type:
      name: Tipo di binario per tenda da sole compatibile
      description: Specifica il binario della tenda da sole o il sistema di tubazioni
        per cui è progettato il gancio.
    compatible_beverage_type:
      name: Tipo di bevanda compatibile
      description: Specifica il tipo di bevanda che il tappo o il contenitore può
        conservare.
    compatible_can_size:
      name: Dimensioni di lattina compatibili
      description: Elenca la taglia delle lattine che è possibile inserire nel tritatore.
    compatible_cigarette_size:
      name: Taglia di sigarette compatibile
      description: Elenca le lunghezze o i formati standard di sigaretta che si adattano
        al portacenere.
    compatible_coffee_capsule_system:
      name: Sistema di capsule da caffè compatibile
      description: Specifica il sistema di capsule o cialde che l'adattatore può supportare,
        assicurando che gli acquirenti scelgano un adattatore adatto al formato di
        caffè preferito.
    compatible_coffee_maker_type:
      name: Tipo di macchina da caffè compatibile
      description: Indica il tipo di macchina da caffè o macchina per espresso per
        cui è progettato l'accessorio.
    compatible_cooking_thermometer_type:
      name: Tipo di termometro da cucina compatibile
      description: Specifica i tipi di termometri da cucina che questo strumento di
        calibrazione può regolare o verificare.
    compatible_coupler_size:
      name: Dimensioni di attacco compatibili
      description: Specifica la dimensione del beccuccio a cui la sac-à-poche si adatta
        senza bisogno di tagli.
    compatible_dehumidifier_technology:
      name: Tecnologia di deumidificazione compatibile
      description: Indica la tecnologia del deumidificatore con cui è compatibile
        il filtro, ad esempio compressore o essiccante.
    compatible_feeder_type:
      name: Tipo di mangiatoia compatibile
      description: Identifica i tipi di dispenser a cui è possibile installare il
        vassoio.
    compatible_footwear_material:
      name: Materiale della calzatura compatibile
      description: Elenca i tipi di materiali delle calzature su cui è possibile applicare
        la crema o la cera.
    compatible_fuel_type:
      name: Tipo di combustibile compatibile
      description: Specifica il tipo di combustibile con cui l'accessorio è compatibile,
        garantendo un abbinamento corretto con riscaldatori da esterno alimentati
        a propano, gas naturale, elettrici o altri combustibili.
    compatible_garment_steamer_design:
      name: Design compatibile con il vaporizzatore per indumenti
      description: Specifica i modelli di vaporizzatore per indumenti con cui è compatibile
        il portacavo.
    compatible_grill_type:
      name: Tipo di griglia compatibile
      description: Specifica i tipi di griglie con cui l'accessorio è compatibile.
    compatible_hazardous_waste_type:
      name: Tipo di rifiuto pericoloso compatibile
      description: Specifica il tipo di rifiuti pericolosi che il contenitore può
        contenere.
    compatible_ironing_board_type:
      name: Tipo di asse da stiro compatibile
      description: Indica lo stile dell'asse da stiro a cui si adatta il pezzo, aiutando
        gli acquirenti a determinarne la compatibilità.
    compatible_lawn_mower_type:
      name: Tipo di tosaerba compatibile
      description: Indica il tipo di tosaerba su cui può essere installato il kit
        per strisce.
    compatible_leaf_blower_style:
      name: Stile del soffiatore per foglie compatibile
      description: Specifica la forma del soffiatore per foglie con cui l'accessorio
        è compatibile.
    compatible_mailbox_size:
      name: Dimensioni di cassetta postale compatibili
      description: Indica le taglie della cassetta postale per cui è progettato l'accessorio,
        secondo le comuni classificazioni USPS/di settore.
    compatible_mailbox_type:
      name: Tipo di cassetta postale compatibile
      description: Specifica lo stile di cassetta postale che si adatta all'interno
        o al contenitore, aiutando gli acquirenti a confermare la corretta compatibilità.
    compatible_napkin_size:
      name: Dimensioni di tovagliolo compatibili
      description: Specifica la dimensione o il formato del tovagliolo per cui è progettato
        il supporto/dispenser.
    compatible_outdoor_grill_style:
      name: Stile della griglia da esterno compatibile
      description: Specifica lo stile o la configurazione della griglia da esterno
        per cui è progettata la copertura.
    compatible_radiator_style:
      name: Stile del radiatore compatibile
      description: Elenca gli stili di radiatore per cui è progettato l'accessorio,
        ad esempio radiatore a pannello, radiatore a colonna, radiatore porta-asciugamani
        o radiatore a battiscopa.
    compatible_refrigerator_compartment:
      name: Scomparto frigorifero compatibile
      description: Specifica in quale punto del frigorifero può essere utilizzato
        l'accessorio.
    compatible_stove_fuel_type:
      name: Tipo di combustibile da fornello compatibile
      description: Identifica i tipi di combustibile con cui è compatibile un accessorio
        per fornello portatile, aiutando i clienti ad abbinare l'articolo al loro
        fornello (ad esempio, bomboletta di gas o alcol).
    compatible_stove_type:
      name: Tipo di fornello compatibile
      description: Identifica i tipi di fornelli da cucina portatili con cui può essere
        abbinata questa base.
    compatible_tissue_box_type:
      name: Tipo di porta-fazzoletti compatibile
      description: Identifica lo stile/la taglia del porta-fazzoletti che può ospitare
        il supporto.
    compatible_tractor_type:
      name: Tipo di trattore compatibile
      description: Specifica la categoria di trattore per cui è progettato il pezzo/accessorio.
    compatible_umbrella_type:
      name: Tipo di ombrellone compatibile
      description: Specifica lo stile dell'ombrellone da esterno a cui è destinata
        la copertura.
    compatible_washing_machine_type:
      name: Tipo di lavatrice compatibile
      description: Specifica per quali modelli di lavatrice è adatto il detergente
        (ad esempio, a carica frontale, a carica dall'alto, ad alta efficienza).
    compatible_waste_container_type:
      name: Tipo di contenitore dei rifiuti compatibile
      description: Specifica il tipo di contenitore per rifiuti al quale l'accessorio
        si adatta o con il quale funziona.
    compatible_water_cooler_type:
      name: Tipo di distributore d'acqua compatibile
      description: Indica con quali modelli di erogatore d'acqua è compatibile l'accessorio,
        aiutando i clienti a scegliere i pezzi giusti per la loro unità.
    compatible_water_heater_type:
      name: Tipo di scaldabagno compatibile
      description: Specifica il tipo di scaldabagno con cui è compatibile il prodotto.
    compatible_wrap_material:
      name: Materiali per alimenti compatibili
      description: Elenca i tipi di pellicola alimentare che il dispenser può contenere.
    compost_aerator_design:
      name: Design dell'aeratore per compost
      description: Identifica il design meccanico o lo stile dell'aeratore, descrivendo
        il modo in cui smuove il compost.
    compost_form:
      name: Forma del compost
      description: Descrive la presentazione fisica o il tipo di confezionamento del
        prodotto per compost.
    compost_source_material:
      name: Materiale di origine del compost
      description: Identifica i materiali organici primarii da cui deriva il compost.
    compression_method:
      name: Metodo di compressione
      description: Indica la tecnica utilizzata per espellere l'aria o risparmiare
        spazio nel sacco.
    cooking_gel_fuel_base:
      name: Base gel combustibile da cucina
      description: Indica la base chimica principale del gel combustibile, permettendo
        agli utenti di scegliere tra formulazioni a base di etanolo, metanolo, glicole
        o di altro tipo, che differiscono per odore, resa termica e idoneità per uso
        interno o esterno.
    cooking_surface_texture:
      name: Finitura della superficie di cottura
      description: Specifica la finitura della superficie di cottura, ad esempio liscia,
        rigata o a doppio uso.
    cooking_thermometer_design:
      name: Design del termometro da cucina
      description: Identifica lo stile operativo di un termometro da cucina, ad esempio
        analogico o digitale.
    cookware_coating_material:
      name: Materiale di rivestimento delle pentole
      description: Identifica il tipo di rivestimento interno o esterno applicato
        all'articolo da cucina, fornendo informazioni sulle prestazioni antiaderenti,
        sulla durata e sui requisiti di manutenzione.
    cookware_coating_type:
      name: Tipo di rivestimento delle pentole
      description: Specifica il rivestimento interno o superficiale delle pentole.
    cookware_lid_style:
      name: Stile del coperchio della pentola
      description: Descrive lo stile generale o la struttura funzionale del coperchio.
    cooler_style:
      name: Stile del frigorifero
      description: Identifica il design strutturale del frigorifero portatile per
        cibi e bevande, aiutando gli acquirenti a scegliere tra casse rigide, borse
        morbide, zaini, ecc.
    corkscrew_accessories_included:
      name: Accessori del cavatappi inclusi
      description: Specifica i componenti aggiuntivi confezionati insieme al cavatappi.
    corkscrew_hinge_type:
      name: Tipo di cerniera del cavatappi
      description: Specifica se il cavatappi utilizza un meccanismo a leva con cerniera
        singola o doppia.
    corkscrew_tools_included:
      name: Strumenti inclusi con il cavatappi
      description: Elenca gli utensili e gli accessori forniti con il cavatappi (ad
        esempio taglia-capsule, apribottiglie, lama) in modo che gli acquirenti possano
        sapere cosa è incluso.
    crushing_method:
      name: Metodo di compressione
      description: Descrive il meccanismo utilizzato per comprimere la lattina.
    crust_browning_level:
      name: Livello di doratura della crosta
      description: Identifica le opzioni selezionabili di colore/doratura della crosta
        offerte dalla macchina per il pane.
    cultivar_type:
      name: Tipo di cultivar
      description: Specifica il tipo di coltivazione della cultivar, indicando se
        si tratta di una varietà antica, ibrida, a impollinazione libera o geneticamente
        modificata.
    cultivator_type:
      name: Tipo di motozappa
      description: Classifica il design strutturale del motozappa, come a denti anteriori
        o posteriori.
    cup_warmer_features:
      name: Caratteristiche degli scaldatazze
      description: Evidenzia il design o le caratteristiche di praticità specifiche
        degli scaldatazze.
    curtain_heading_style:
      name: Stile del bordo superiore della tenda
      description: Specifica lo stile del bordo superiore utilizzato per appendere
        la tenda o il drappeggio, che determina la ferramenta necessaria e l'aspetto
        complessivo.
    curtain_lining_type:
      name: Tipo di fodera della tenda
      description: Indica se la tenda è foderata e il tipo di fodera utilizzata, che
        influenza isolamento, privacy e caduta del tessuto.
    curtain_rod_type:
      name: Tipo di bastone per tende
      description: Classifica lo stile strutturale del bastone, aiutando gli acquirenti
        a individuare rapidamente i battoni adatti alle loro esigenze di installazione.
    cutting_disc_function:
      name: Funzione del disco da taglio
      description: Definisce l'azione specifica eseguita dal disco nella preparazione
        degli alimenti.
    cutting_head_type:
      name: Tipo di testa di taglio
      description: Specifica lo stile dell'elemento di taglio utilizzato dall'accessorio.
    cutting_mechanism_type:
      name: Tipo di meccanismo di taglio
      description: Descrive lo stile del taglierino integrato nel dispenser.
    cylinder_connector_type:
      name: Tipo di connettore del cilindro
      description: Indica il tipo di connessione o interfaccia del filetto del cilindro,
        determinando la compatibilità con specifici modelli di gasatori.
    decorating_bag_features:
      name: Caratteristiche della borsa per decorare
      description: Evidenzia il design speciale o le caratteristiche funzionali della
        borsa per decorare.
    dehumidifier_refill_form:
      name: Forma della ricarica del deumidificatore
      description: Definisce la forma/il formato fisico della ricarica in modo che
        i Clienti possano selezionare stili compatibili.
    desiccant_material:
      name: Materiale essiccante
      description: Specifica la sostanza assorbente per l'umidità utilizzata, importante
        per le prestazioni, il potenziale riutilizzo e le considerazioni sulla sicurezza.
    dial_finish:
      name: Finitura del quadrante
      description: Descrive la finitura superficiale del quadrante, influenzando riflessi
        e stile.
    dinnerware_features:
      name: Caratteristiche delle stoviglie
      description: Evidenzia le caratteristiche funzionali speciali delle stoviglie.
    dish_detergent_features:
      name: Caratteristiche del detersivo per piatti
      description: Elenca le proprietà della formulazione o ecologiche degne di nota
        che aiutano l'acquirente a filtrare e confrontare i prodotti.
    dishwasher_accessory_type:
      name: Tipo di accessorio per lavastoviglie
      description: Classifica il tipo specifico di accessorio, consentendo all'acquirente
        di filtrare rapidamente.
    dishwasher_wash_programs:
      name: Programmi di lavaggio della lavastoviglie
      description: Elenca i cicli di lavaggio preimpostati disponibili sulla lavastoviglie,
        consentendo ai clienti di filtrare in base alla versatilità dei programmi.
    dispensing_mechanism:
      name: Meccanismo di erogazione
      description: Descrive come la bevanda viene erogata dall'airpot, influenzando
        l'usabilità in diverse impostazioni.
    dispensing_temperature_options:
      name: Opzioni di temperatura di erogazione
      description: Indica le opzioni di temperatura che il refrigeratore d'acqua può
        erogare.
    displayed_character:
      name: Carattere visualizzato
      description: Identifica il carattere alfanumerico rappresentato dal pezzo specifico.
    diving_board_surface_texture:
      name: Finitura della superficie del trampolino
      description: Descrive la finitura della superficie superiore della tavola, che
        influisce sulla presa e sulla resistenza allo scivolamento.
    door_configuration:
      name: Configurazione delle porte
      description: Indica il numero di porte di accesso della trappola
    door_hinge_orientation:
      name: Orientamento della cerniera della porta
      description: Specifica la posizione della cerniera o la direzione di apertura
        della porta o del coperchio del congelatore.
    door_hinge_position:
      name: Posizione della cerniera della porta
      description: Specifica il lato della porta su cui si trova la cerniera o se
        è reversibile, influenzando l'installazione e la pianificazione dello spazio.
    draft_gas_type:
      name: Tipo di gas di spillatura
      description: Specifica il tipo di sistema di gas utilizzato per l'erogazione,
        importante per la carbonatazione e il tipo di bevanda.
    drainage_design:
      name: Progettazione del drenaggio
      description: Indica come il portasapone gestisce lo scolo dell'acqua per mantenere
        asciutto il sapone.
    drainage_method:
      name: Metodo di drenaggio
      description: Descrive come viene espulsa l'acqua raccolta, indicando se è necessario
        uno svuotamento manuale.
    drawer_organizer_features:
      name: Caratteristiche di un organizzatore per cassetti
      description: Evidenzia le funzioni più importanti di un inserto organizzatore
        per cassetti.
    drinkware_crystal_composition:
      name: Composizione di cristalli per bicchieri
      description: Identifica la specifica formulazione di vetro/cristallo utilizzata,
        evidenzia il contenuto in piombo e le caratteristiche di purezza.
    drinkware_holder_style:
      name: Stile porta bicchieri
      description: Classifica il design generale o la configurazione di un portabicchieri.
    drinkware_insulation:
      name: Isolamento per bicchieri
      description: Identifica l'isolamento costruttivo dei bicchieri, che influenza
        il mantenimento della temperatura.
    dripper_design:
      name: Progettazione del gocciolatoio
      description: Specifica la forma generale del gocciolatoio o lo stile di drenaggio,
        che influiscono sulle caratteristiche della preparazione.
    drum_grating_styles_included:
      name: Stili di grattugia a tamburo inclusi
      description: Elenca i diversi stili di grattugia o affettatura forniti nel set,
        in modo che gli utenti possano vedere rapidamente le funzioni offerte.
    dryer_drum_material:
      name: Materiale del tamburo dell'asciugatrice
      description: Indica il materiale di costruzione del tamburo interno, che influisce
        sulla durata, sull'accumulo di elettricità statica e sul rumore.
    dryer_sheet_features:
      name: Caratteristiche del foglio per asciugatrice
      description: Evidenzia le caratteristiche o i vantaggi speciali dei fogli per
        asciugatrice.
    dryer_venting_type:
      name: Tipo di ventilazione dell'essiccatore
      description: Classifica il metodo di ventilazione utilizzato da un'asciugatrice,
        che influisce sui requisiti di installazione e sull'efficienza energetica.
    drying_system:
      name: Sistema di asciugatura
      description: Indica la tecnologia utilizzata dalla lavastoviglie per asciugare
        le stoviglie alla fine del ciclo.
    duster_head_material:
      name: Materiale della testa del piumino da spolvero
      description: Specifica il materiale della testina di raccolta della polvere
        per considerazioni relative a prestazioni e allergie.
    dustpan_type:
      name: Tipo paletta
      description: Classifica lo stile/forma generale della paletta.
    edge_finish:
      name: Finitura del bordo
      description: Descrive la tecnica di finitura utilizzata sui bordi, che influenza
        l'estetica e la durata.
    egg_cooker_functions:
      name: Funzioni dell dispositivo per la cottura delle uova
      description: Elenca le modalità di cottura supportate dal dispositivo per la
        cottura delle uova.
    egg_cup_design:
      name: Design del portauovo
      description: Specifica lo stile strutturale del portauovo, ad esempio con piedini
        o piedistallo.
    electric_kettle_features:
      name: Caratteristiche del bollitore elettrico
      description: Elenca le caratteristiche di praticità e sicurezza più importanti
        del bollitore.
    emergency_blanket_features:
      name: Caratteristiche della coperta di emergenza
      description: Evidenzia le caratteristiche funzionali speciali della coperta.
    emergency_lighting_operating_mode:
      name: Modalità di funzionamento dell'illuminazione di emergenza
      description: Specifica il comportamento dell'apparecchio di illuminazione di
        emergenza durante le normali condizioni di alimentazione e le interruzioni
        di corrente.
    entrance_slot_design:
      name: Progettazione della fessura di ingresso
      description: Descrive lo stile delle aperture che consentono alle farfalle di
        entrare in casa.
    espresso_boiler_type:
      name: Tipo di caldaia per caffè espresso
      description: Descrive la configurazione del sistema di riscaldamento utilizzato
        per produrre infuso e vapore.
    fabric_care_product_form:
      name: Forma del prodotto per la cura dei tessuti
      description: Specifica la forma fisica di un prodotto per la cura dei tessuti,
        come un ammorbidente o un additivo per asciugatrice.
    fabric_softener_features:
      name: Caratteristiche dell'ammorbidente
      description: Evidenzia le caratteristiche o i vantaggi speciali degli ammorbidenti.
    fabric_stiffness_level:
      name: Livello di rigidità del tessuto
      description: Indica il livello di rigidità o freschezza conferito al tessuto
        dall'amido una volta stirato.
    fabric_weave:
      name: Trama del tessuto
      description: Indica la specifica struttura della trama del tessuto, che ne influenza
        la sensazione al tatto e l'aspetto.
    feeder_design:
      name: Progettazione dell'alimentatore
      description: Specifica lo stile strutturale dell'alimentatore.
    fermentation_crock_type:
      name: Tipo di barattolo da fermentazione
      description: Identifica il design fondamentale della pentola.
    filament_style:
      name: Aspetto del filamento
      description: Definisce la configurazione interna del filamento che influenza
        l'estetica e la distribuzione della luce.
    film_reusability:
      name: Possibile riutilizzo della pellicola
      description: Indica se la pellicola è monouso o può essere rimossa, conservata
        e riapplicata.
    filter_bleaching_method:
      name: Metodo di sbiancamento del filtro
      description: Identifica lo stato di sbiancamento e il processo utilizzato per
        il filtro, fornendo informazioni sulle preferenze di gusto e sostenibilità.
    filter_technology:
      name: Tecnologia di filtraggio
      description: Identifica la tecnologia di controllo degli odori o di filtrazione
        impiegata.
    fire_alarm_panel_type:
      name: Tipo di pannello di allarme antincendio
      description: Identifica l'architettura di sistema del pannello.
    fire_protection_class:
      name: Classe di resistenza al fuoco
      description: Indica la classe di certificazione che definisce la temperatura
        interna massima consentita durante la prova antincendio (ad esempio, UL Classe
        350).
    fire_starter_type:
      name: Tipo di accendifuoco
      description: Specifica la forma principale o il meccanismo del prodotto di accensione
        del fuoco, aiutando l'acquirente a trovare esattamente lo stile di accensione
        di cui ha bisogno.
    fireplace_fuel_form:
      name: Forma del combustibile per caminetti
      description: Specifica la forma fisica o la presentazione del combustibile,
        consentendo all'acquirente di scegliere tra ceppi, pellet, bricchette, bombolette
        di gel e altre opzioni adatte al proprio apparecchio.
    fireplace_tool_items_included:
      name: Attrezzi per camino inclusi
      description: Elenca gli specifici strumenti o accessori da camino forniti con
        il prodotto in modo che gli acquirenti sappiano esattamente cosa riceveranno
        e possano confrontare i pacchetti con facilità.
    firewood_seasoning:
      name: Stagionatura della legna da ardere
      description: Indica lo stato di essiccazione della legna da ardere, che influisce
        sul contenuto di umidità, sulla facilità di accensione e sull'efficienza termica.
    flag_attachment_style:
      name: Stile di attacco della bandiera
      description: Descrive il modo in cui la bandiera o la manica a vento viene fissata
        a un palo o a un punto di montaggio.
    flame_adjustment:
      name: Regolazione della fiamma
      description: Indica se e come è possibile regolare l'intensità della fiamma.
    flask_insulation_type:
      name: Tipo di isolamento del thermos
      description: Indica la costruzione dell'isolamento termico del thermos, che
        influenza il mantenimento della temperatura.
    flatware_finish:
      name: Finitura delle posate
      description: Descrive la variante superficiale o la lucentezza delle posate,
        che ne influenzano l'estetica e la visibilità dei graffi.
    floor_protection_transparency_level:
      name: Livello di trasparenza della protezione del pavimento
      description: Indica il grado di trasparenza della pellicola o del tappeto, da
        trasparente a opaco.
    floor_scrubber_brush_type:
      name: Tipo di spazzola per lavapavimenti
      description: Definisce la configurazione primaria della spazzola o del tampone
        utilizzata dal lavapavimenti.
    floor_surface_compatibility:
      name: Compatibilità con la superficie del pavimento
      description: Specifica i materiali della superficie del pavimento per i quali
        il protettore è sicuro e per i quali è progettato.
    flow_control_type:
      name: Tipo di controllo del flusso
      description: Descrive se l'irrigatore include un meccanismo regolabile per variare
        la portata d'acqua.
    flue_outlet_position:
      name: Posizione di uscita della canna fumaria
      description: Specifica il punto in cui la canna fumaria esce dal corpo della
        stufa, influenzando il layout dell'installazione e il collegamento con il
        camino.
    flue_pipe_connection_type:
      name: Tipo di relazione del tubo di scarico
      description: Descrive il meccanismo di giunzione utilizzato per collegare l'estensione
        ad altri componenti di gestione del pennacchio.
    fluorescent_tube_output_type:
      name: Tipo di uscita del tubo fluorescente
      description: Specifica il sottotipo di uscita del tubo fluorescente, importante
        per la compatibilità con l'alimentatore e la luminosità.
    fly_swatter_type:
      name: Tipo di scacciamosche
      description: Indica lo stile o il meccanismo operativo dello scacciamosche.
    foil_duty_rating:
      name: Valutazione della resistenza della lamina
      description: Classifica la resistenza o il grado della lamina in base all'uso
        previsto.
    foliage_color:
      name: Colore del fogliame
      description: Specifica il colore dominante delle foglie della pianta, supportando
        la selezione ornamentale al di là del colore dei fiori.
    fondue_pot_type:
      name: Tipo di pentola per fonduta
      description: Classifica lo stile di riscaldamento o l'uso previsto del set per
        fonduta.
    fondue_set_pieces_included:
      name: Pezzi del set per fonduta inclusi
      description: Identifica i componenti inclusi in un set per fonduta, come la
        pentola o le forchette.
    food_carrier_insulation_type:
      name: Tipo di isolamento del portavivande
      description: Identifica se il prodotto è isolato e la tecnologia di isolamento
        utilizzata.
    food_dehydrator_surface_type:
      name: Tipo di superficie dell'essiccatore alimentare
      description: Descrive lo stile della superficie di fogli/vassoi, che influenza
        il flusso d'aria e il rilascio del cibo.
    food_dehydrator_tray_type:
      name: Tipo di vassoio per disidratatore alimentare
      description: Identifica lo stile specifico o il design funzionale del vassoio.
    food_grater_type:
      name: Tipo di grattugia per alimenti
      description: Indica la struttura della grattugia.
    food_processor_attachments_included:
      name: Accessori per robot da cucina inclusi
      description: Elenca i tipi specifici di accessori forniti nel set, in modo che
        i clienti sappiano esattamente quali funzioni acquisiscono con il loro acquisto.
    food_storage_bag_features:
      name: Caratteristiche della borsa per la conservazione degli alimenti
      description: Evidenzia caratteristiche funzionali degne di nota del sacchetto.
    food_storage_bag_type:
      name: Tipo di sacchetto per conservazione di alimenti
      description: Specifica lo stile principale o la classificazione dell'uso previsto
        della borsa per la conservazione degli alimenti.
    food_storage_features:
      name: Caratteristiche di conservazione degli alimenti
      description: Evidenzia le caratteristiche speciali che aggiungono funzionalità
        o praticità al prodotto per la conservazione degli alimenti.
    food_wrap_features:
      name: Caratteristiche della pellicola per alimenti
      description: Evidenzia le caratteristiche speciali che influenzano l'utilizzo
        e la sostenibilità.
    footwear_type_compatibility:
      name: Compatibilità del tipo di calzatura
      description: Identifica il tipo di calzatura a cui è destinato il modellatore.
    formulation_concentration:
      name: Concentrazione della formulazione
      description: Identifica se il prodotto è un concentrato o una formulazione pronta
        all'uso.
    fountain_design:
      name: Design della fontana
      description: Classifica lo stile strutturale o il fattore di forma della fontana.
    fragrance_oil_application:
      name: Applicazione dell'olio profumato
      description: Indica l'uso consigliato o più comune dell'olio, assistendo i clienti
        appassionati di fai da te e hobbisti nella scelta della formulazione più adatta.
    fragrance_oil_composition:
      name: Composizione dell'olio profumato
      description: Indica se la formulazione è composta da solo olio essenziale naturale,
        olio profumato sintetico o una miscela di entrambi.
    fragrance_refill_type:
      name: Tipo di ricarica della fragranza
      description: Definisce il formato delle ricariche di fragranza accettate dal
        diffusore.
    freezer_configuration:
      name: Configurazione del congelatore
      description: Identifica l'orientamento fisico/lo stile di progettazione dell'unità
        congelatore.
    freezing_method:
      name: Metodo di congelamento
      description: Specifica la tecnologia impiegata per congelare la miscela in una
        gelatiera, aiutando gli acquirenti a distinguere tra modelli con compressore,
        unità con vasca pre-congelante, modelli a manovella con sale e ghiaccio e
        altri modelli.
    fuel_compatibility:
      name: Compatibilità del carburante
      description: Specifica i tipi di combustibile che la griglia è progettata per
        contenere in modo sicuro.
    funnel_type:
      name: Tipo di imbuto
      description: Classifica l'imbuto in base al design o all'uso previsto.
    furnace_configuration:
      name: Configurazione del forno
      description: Specifica l'orientamento fisico del flusso d'aria dell'armadio
        del forno per l'installazione.
    furniture_anchor_type:
      name: Tipo di ancoraggio per mobili
      description: Specifica lo stile strutturale di un kit di ancoraggio per mobili,
        indicandone il meccanismo di azione.
    garage_floor_mat_style:
      name: Stile tappetino per garage
      description: Identifica il formato o lo stile del prodotto tappetino per garage.
    garbage_disposal_feed_type:
      name: Tipo di alimentazione per lo smaltimento dei rifiuti
      description: Identifica il modo in cui i rifiuti alimentari vengono immessi
        nello smaltimento, vale a dire in modo continuo durante il funzionamento o
        in raggruppamenti separati.
    garbage_disposal_stopper_style:
      name: Stile del tappo dello smaltitore dei rifiuti
      description: Indica lo stile funzionale del tappo.
    garden_hose_design:
      name: Progettazione del tubo da giardino
      description: Identifica lo stile strutturale del tubo, che determina l'uso previsto
        e le caratteristiche di gestione.
    garden_hose_fitting_type:
      name: Tipo di raccordo per tubo da giardino
      description: Identifica lo stile o la funzione di un raccordo per tubo da giardino,
        come un adattatore o uno sdoppiatore a Y, per facilitare la navigazione e
        il filtraggio.
    gardening_fork_type:
      name: Tipo di forchetta da giardinaggio
      description: Indica lo stile specifico o l'uso previsto del forcone.
    garland_style:
      name: Stile della ghirlanda
      description: Classifica lo stile costruttivo o decorativo della ghirlanda.
    gas_type:
      name: Tipo di gas
      description: Identifica il tipo di gas compresso contenuto nella bombola del
        caricatore.
    gasket_profile_type:
      name: Tipo di profilo della guarnizione
      description: Specifica il profilo standard del settore o lo stile della sezione
        trasversale della guarnizione.
    gazebo_roof_material:
      name: Materiale del tetto del gazebo
      description: Specifica il materiale dei pannelli del tetto del gazebo o della
        copertura rigida.
    glass_and_surface_cleaner_features:
      name: Caratteristiche del detergente per vetri e superfici
      description: Evidenzia le caratteristiche speciali o i vantaggi del detergente
        per vetri e superfici.
    glass_cleaner_features:
      name: Caratteristiche del detergente per vetri
      description: Evidenzia le caratteristiche specifiche delle prestazioni o della
        formulazione dei detergenti per vetri.
    glazing_material:
      name: Materiale della lastra
      description: Identifica il materiale che ricopre l'area della foto (ad esempio,
        vetro, acrilico o nessuno).
    globe_map_content:
      name: Contenuto della mappa del globo
      description: Descrive il contenuto cartografico primario visualizzato sul globo.
    glue_trap_design:
      name: Progettazione della trappola con colla
      description: Identifica lo stile fisico o il formato della trappola, favorendo
        la compatibilità con le aree di posizionamento e il tipo di parassita.
    grab_bar_shape:
      name: Forma del maniglione
      description: Definisce la progettazione strutturale del maniglione, influenzando
        il posizionamento dell'installazione e lo stile di assistenza dell'utente.
    grass_discharge_type:
      name: Tipo di scarico dell'erba
      description: Specifica il modo in cui il tosaerba espelle l'erba tagliata (ad
        esempio, scarico laterale, insacchettamento sul retro).
    grate_design:
      name: Progettazione della grattugia
      description: Indica la struttura della grata.
    grater_design:
      name: Design della grattugia
      description: Classifica la progettazione fisica o il meccanismo di una grattugia
        o di uno zester.
    grating_surface_coarseness:
      name: Granularità della superficie della grattugia
      description: Indica la taglia/trama dei fori di taglio o delle creste sulla
        superficie della grattugia.
    grill_grate_material:
      name: Materiale della griglia della grattugia
      description: Specifica il materiale o il rivestimento della griglia di cottura
        principale.
    grill_thermometer_type:
      name: Tipo di termometro per griglia
      description: Indica il design principale o la tecnologia del termometro per
        griglia, aiutando l'acquirente a trovare rapidamente lo stile più adatto alla
        propria configurazione di cottura.
    grinding_mechanism_material:
      name: Materiale del meccanismo di macinazione
      description: Specifica il materiale del meccanismo di macinazione interno/delle
        macine che effettivamente frantumano le spezie.
    grinding_mechanism_type:
      name: Tipo di meccanismo di macinazione
      description: Specifica il meccanismo interno responsabile della macinazione
        o della frantumazione.
    growing_media_buffering:
      name: Buffering dei substrati di coltura
      description: Indica se la fibra di cocco è stata tamponata per rimuovere i sali
        in eccesso, influenzando la gestione dei nutrienti.
    growing_media_form:
      name: Forma dei substrati di coltura
      description: Specifica la presentazione fisica della fibra di cocco, aiutando
        i coltivatori a comprenderne le esigenze di gestione e idratazione.
    growing_medium_type:
      name: Tipo di substrato di coltura
      description: Identifica il substrato necessario alla germinazione e alla crescita
        dei semi.
    growth_habit:
      name: Portamento di crescita
      description: Descrive la forma complessiva della pianta, aiutando i clienti
        a decidere la spaziatura e i contenitori.
    hand_dryer_accessory_type:
      name: Tipo di accessorio per asciugamani elettrico
      description: Identifica il tipo specifico di accessorio per asciugamani elettrici
        in modo che l'acquirente possa capire rapidamente di cosa si tratta.
    handle_connection_type:
      name: Tipo di attacco del manico
      description: Indica il meccanismo utilizzato per fissare il manico alla scopa,
        al mocio o ad altre spazzole di pulizia per garantirne la compatibilità.
    handle_grip_style:
      name: Stile dell'impugnatura
      description: Definisce le forme o l'ergonomia dell'impugnatura della forchetta.
    handle_length_adjustability:
      name: Regolazione della lunghezza del manico
      description: Descrive se e come è possibile regolare la lunghezza del manico,
        consentendo all'acquirente di filtrare tra opzioni fisse e telescopiche.
    handle_position:
      name: Posizione del manico
      description: Descrive la posizione o lo stile del manico sull'annaffiatoio,
        che influenza l'ergonomia di versamento e lo stoccaggio.
    handrail_configuration:
      name: Configurazione del corrimano
      description: Indica se il prodotto include corrimani e la loro disposizione.
    hanging_attachment_type:
      name: Tipo di attacco di sospensione
      description: Specifica l'hardware o il metodo fornito per appendere l'acchiappasole.
    hardiness_zone:
      name: Zona di tolleranza
      description: Specifica la zona climatica USDA (o comparabile) in cui la pianta
        può sopravvivere all'aperto.
    hazards_detected:
      name: Pericoli rilevati
      description: Elenca i pericoli specifici che questa unità è in grado di avvertire.
    heating_stages:
      name: Fasi di riscaldamento
      description: Specifica il numero di stadi di riscaldamento o il livello di modulazione
        supportati dall'unità.
    home_alarm_features:
      name: Caratteristiche dell'allarme domestico
      description: Identifica le funzioni speciali di un sistema di allarme domestico,
        come il backup a batteria o il monitoraggio professionale.
    hook_style:
      name: Stile del gancio
      description: Classifica il design/le funzioni del gancio per un abbinamento
        visivo e funzionale più semplice.
    humidifier_features:
      name: Caratteristiche dell'umidificatore
      description: Evidenzia le funzioni o le opzioni extra degne di nota che distinguono
        i modelli di umidificatori e facilitano il filtraggio.
    humidifier_filter_type:
      name: Tipo di filtro dell'umidificatore
      description: Identifica lo stile o la struttura del filtro in modo che i clienti
        possano trovare il ricambio corretto per il loro umidificatore.
    humidor_accessory_type:
      name: Tipo di accessorio per humidor
      description: Classifica il tipo specifico di accessorio, consentendo all'acquirente
        di filtrare rapidamente all'interno della categoria generale.
    hydroponic_nutrient_system:
      name: Sistema di nutrienti idroponici
      description: Indica il numero di parti del sistema nutritivo idroponico (ad
        esempio, una parte, due parti) che devono essere combinate prima dell'uso.
    hygrometer_type:
      name: Tipo di igrometro
      description: Identifica il tipo di igrometro incluso nell'humidor, se presente.
    ice_bucket_accessories_included:
      name: Accessori per secchiello del ghiaccio inclusi
      description: Elenca l'articolo supplementare per bar fornito con il secchiello
        del ghiaccio.
    ice_bucket_insulation:
      name: Isolamento del secchiello del ghiaccio
      description: Indica la struttura della parete o il livello di isolamento del
        secchiello del ghiaccio, che incide sulla durata del periodo di congelamento
        del ghiaccio.
    ice_cream_maker_accessories_included:
      name: Accessori per macchina da gelato inclusi
      description: Identifica gli articoli aggiuntivi inclusi in un set di accessori
        composto da più pezzi, in modo che i clienti sappiano esattamente cosa riceveranno.
    ice_shape:
      name: Forma del ghiaccio
      description: Descrive la forma di ghiaccio prodotto dalla macchina, aiutando
        gli utenti a selezionare le macchine che creano il loro stile di ghiaccio
        preferito.
    incense_holder_style:
      name: Stile del bruciaincenso
      description: Identifica il design strutturale del supporto, aiutando l'acquirente
        a scegliere tra diversi formati funzionali ed estetici.
    infuser_type:
      name: Tipo di infusore
      description: Indica se è incluso un infusore per frutta o tè e il suo stile.
    inner_pot_coating:
      name: Rivestimento interno della pentola
      description: Identifica il tipo di rivestimento superficiale interno della pentola,
        indicandone le proprietà antiaderenti e la facilità di pulizia.
    insulation_capability:
      name: Capacità di isolamento
      description: Indica se e in che modo il manicotto isola le bevande, distinguendo
        i manicotti puramente decorativi da quelli che controllano la temperatura.
    insulation_status:
      name: Stato dell'isolamento
      description: Indica se la borraccia è isolata per contribuire a mantenere la
        temperatura delle bevande.
    insulation_technology:
      name: Tecnologia di isolamento
      description: Identifica la struttura isolante utilizzata per mantenere la temperatura.
    insulation_type:
      name: Tipo di isolamento
      description: Specifica se e come la vasca per bevande o il refrigeratore sono
        isolati, influenzando le prestazioni del ghiaccio e il controllo della condensazione.
    intended_beverage_type:
      name: Tipo di bevanda prevista
      description: Indica la bevanda principale per cui è stato progettato il decanter
        o con cui è più comunemente utilizzato.
    internal_membrane_type:
      name: Tipo di membrana interna
      description: Identifica il design della separazione interna che mantiene separate
        acqua e aria all'interno del serbatoio.
    iron_cleaner_purpose:
      name: Scopo del pulitore del ferro
      description: Specifica l'applicazione principale a cui è destinato il pulitore.
    ironing_board_form_factor:
      name: Fattore di forma dell'asse da stiro
      description: Classifica lo stile/l'installazione generale dell'asse per aiutare
        l'acquirente a trovare il tipo corretto.
    ironing_board_pad_shape:
      name: Forma del cuscinetto per asse da stiro
      description: Indica le forme/il profilo complessivi del cuscinetto per garantire
        che si adatti ai diversi modelli di asse da stiro.
    jar_shape:
      name: Forme del barattolo
      description: Descrive la forma geometrica o tradizionale complessiva del barattolo
        decorativo.
    juicer_type:
      name: Tipo di spremitore
      description: Classifica il meccanismo utilizzato dallo spremitore per estrarre
        il succo.
    key_blade_type:
      name: Tipo di lama della chiave
      description: Classifica lo stile fisico della lama della chiave, ad esempio
        piatta/a mappa, tubolare o con fossetta.
    kitchen_layout:
      name: Layout della cucina
      description: Definisce la configurazione complessiva della cucina prefabbricata
        (ad esempio, a parete singola o a L) per aiutare l'acquirente a trovare set
        che corrispondano alla forma della propria stanza e alle preferenze nel flusso
        di lavoro.
    kitchen_linen_items_included:
      name: Articoli di biancheria da cucina inclusi
      description: Elenca i componenti specifici della biancheria da cucina forniti
        nel set, aiutando l'acquirente a capire esattamente quale articolo sta acquistando.
    label_content_type:
      name: Tipo del contenuto dell'etichetta
      description: Descrive se la superficie dell'etichetta è vuota, prestampata con
        modello o altrimenti formattata.
    lamp_arm_style:
      name: Stile del braccio della lampada
      description: Descrive il design del braccio/collo della lampada, che influisce
        sulla possibilità di regolazione e posizionamento (ad esempio, collo d'oca
        rispetto a braccio girevole).
    lamp_post_base_mounting_type:
      name: Tipo di montaggio della base della lampada
      description: Specifica come la base è installata o fissata al terreno o alla
        superficie.
    lamp_shade_fitter_type:
      name: Tipo di montatore del paralumi
      description: Definisce il meccanismo di fissaggio tra paralume e lampada, garantendo
        la compatibilità senza problemi.
    lamp_shade_shape:
      name: Forma del paralume
      description: Specifica la forma geometrica del paralume, consentendo ai clienti
        di individuare rapidamente le sagome desiderate.
    lamp_shade_translucency:
      name: Trasparenza del paralume
      description: Descrive la quantità di luce che passa attraverso il paralume,
        aiutando gli utenti a scegliere l'atmosfera desiderata.
    lampshade_shape:
      name: Forma del paralume
      description: Descrive la forma geometrica o la forma del paralume.
    laundry_ball_texture:
      name: Finitura della palla da bucato
      description: Descrive lo stile della superficie della palla, che influisce sull'agitazione
        del tessuto e la rimozione dei pelucchi.
    laundry_wash_accessory_type:
      name: Tipo di accessorio per il lavaggio della biancheria
      description: Identifica il tipo specifico di retina o telaio da bucato.
    lawn_aerator_type:
      name: Tipo di aeratore per prato
      description: Classifica gli aeratori per prato in base al loro design operativo
        o al fattore di forma di base.
    lawn_mower_belt_type:
      name: Tipo di cinghia per tagliaerba
      description: Classifica la progettazione strutturale o il profilo della cinghia.
    lawn_mower_blade_type:
      name: Tipo di lama del tagliaerba
      description: Specifica il design di taglio o sollevamento della lama del tagliaerba
        e l'uso previsto.
    lawn_spreader_type:
      name: Tipo di spandiconcime per prato
      description: Specifica lo stile meccanico o di configurazione di uno spandiconcime
        per prato/giardino, ad esempio a spaglio o a caduta.
    lawn_tractor_tread_type:
      name: Tipo di battistrada del trattorino rasaerba
      description: Descrive il disegno del battistrada pensato per superfici specifiche
        o esigenze di trazione.
    lid_features:
      name: Caratteristiche del coperchio
      description: Evidenzia eventuali elementi funzionali speciali del coperchio
        che facilitano la cottura o la pulizia.
    lid_vent_type:
      name: Tipo di sfiato del coperchio
      description: Indica se e come il coperchio consente la fuoriuscita del vapore.
    lift_mechanism:
      name: Meccanismo di sollevamento
      description: Indica il meccanismo di azionamento utilizzato per sollevare, abbassare
        o inclinare la tenda o la veneziana.
    light_exposure_requirement:
      name: Requisito di esposizione alla luce
      description: Specifica il livello di luce di cui l'ecosfera ha bisogno per rimanere
        in condizioni ottimali senza surriscaldare o stressare gli organismi.
    liner_installation_method:
      name: Metodo di installazione del rivestimento
      description: Descrive in che modo il rivestimento rimane in posizione sulla
        superficie.
    lint_roller_type:
      name: Tipo di spazzola adesiva
      description: Classifica il meccanismo o il design della spazzola adesiva.
    live_trap_design:
      name: Design della trappola per animali
      description: Classifica lo stile strutturale complessivo della trappola
    lock_keying_option:
      name: Opzione di blocco con chiave
      description: Specifica il tipo di chiave della serratura, in modo da agevolare
        gli acquirenti che necessitano di più serrature azionate da una sola chiave
        o da chiavi uniche per serratura.
    lubricant_requirement:
      name: Requisiti del lubrificante
      description: Specifica il tipo di lubrificante consigliato o richiesto durante
        l'affilatura.
    lunch_set_items_included:
      name: Articoli inclusi nel set pranzo
      description: Elenca i componenti singoli inclusi nel set per il pranzo.
    machete_blade_style:
      name: Stile lama machete
      description: Specifica lo stile tradizionale regionale o funzionale della lama
        del machete.
    map_style:
      name: Stile della mappa
      description: Definisce lo stile cartografico o il focus tematico visualizzato
        sul globo.
    masher_head_design:
      name: Modello della testa dello schiacciapatate
      description: Classifica il design della superficie di schiacciamento, che influisce
        sulla consistenza e sullo sforzo richiesto.
    mattress_protector_features:
      name: Caratteristiche del coprimaterasso
      description: Evidenzia le caratteristiche funzionali o protettive specifiche
        dei coprimaterassi, in modo da consentire agli acquirenti di filtrare in base
        a qualità come l'impermeabilità o i materiali ipoallergenici.
    measuring_spoon_features:
      name: Caratteristiche del cucchiaio dosatore
      description: Evidenzia le caratteristiche di design speciali o gli attributi
        funzionali dei cucchiai dosatori.
    meat_tenderizer_face_type:
      name: Tipo di superficie dell'inteneritore per carne
      description: Descrive la consistenza della superficie di lavoro della testa
        dell'inteneritore per carne.
    meat_tenderizer_mechanism:
      name: Meccanismo di intenerimento della carne
      description: Classifica il meccanismo di funzionamento principale del batticarne.
    medical_specialty:
      name: specialità medica
      description: Specifica la specialità medica o la disciplina sanitaria per cui
        è progettata l'apparecchiatura
    merv_rating:
      name: Valutazione MERV
      description: Definisce il valore minimo di segnalazione dell'efficienza (MERV)
        che indica la capacità del filtro di intrappolare particelle di varie dimensioni.
    microwave_compatibility:
      name: Compatibilità con microonde
      description: Specifica se l'articolo può essere utilizzato in sicurezza nel
        forno a microonde.
    microwave_oven_functions:
      name: Funzioni del forno a microonde
      description: Elenca modalità di cottura preimpostate o avanzate disponibili,
        in modo da consentire ai clienti di trovare modelli di tipo ventilato, grill,
        cottura con sensore, ecc.
    milk_frother_type:
      name: Tipo di montalatte
      description: Classifica il prodotto in base al meccanismo di formazione della
        schiuma o al fattore di forma.
    milk_frothing_method:
      name: Metodo di montaggio del latte
      description: Specifica la tecnologia o il meccanismo utilizzato per montare
        il latte.
    milk_frothing_system:
      name: Sistema di montaggio del latte
      description: Specifica il tipo di meccanismo di montaggio o di vapore del latte
        fornito dalla macchina.
    mirror_curvature:
      name: Curvatura dello specchio
      description: Specifica la curvatura della superficie riflettente, che influisce
        sull'angolo di visuale e sulla distorsione dell'immagine.
    mirror_type:
      name: Tipo di specchio
      description: Classifica lo stile generale o la categoria funzionale dello specchio.
    mist_output_mode:
      name: Modalità di nebulizzazione
      description: Indica le modalità o le impostazioni di intensità di nebulizzazione
        selezionabili disponibili sul diffusore.
    mixing_bowl_features:
      name: Caratteristiche della ciotola da miscelazione
      description: Evidenzia le caratteristiche funzionali speciali della ciotola
        che ne influenzano l'usabilità e la manutenzione.
    mixing_mechanism:
      name: Meccanismo di miscelazione
      description: Descrive il meccanismo interno utilizzato per miscelare gli ingredienti
        del condimento.
    mochi_maker_functions:
      name: Funzioni della macchina per mochi
      description: Elenca la modalità di funzionamento integrate o i programmi supportati
        dall'apparecchio.
    mode_of_action:
      name: Modalità d'azione
      description: Indica il modo d'azione del fungicida, distinguendo i prodotti
        di contatto da quelli sistemici o translaminari.
    moisture_absorber_form:
      name: Forma dell'assorbitore di umidità
      description: Descrive il formato fisico del prodotto, consentendo agli acquirenti
        di selezionare sacchetti da appendere, vaschette, bustine, ecc.
    money_retrieval_method:
      name: Metodo di recupero del denaro
      description: Descrive come il denaro risparmiato viene rimosso dal salvadanaio.
    mop_head_type:
      name: Tipo di testa del mocio
      description: Indica il design strutturale della testa o della ricarica del mocio,
        in modo da agevolare gli acquirenti a trovare lo stile corretto per le proprie
        esigenze di pulizia.
    mop_wringing_mechanism:
      name: Meccanismo di strizzatura del mocio
      description: Indica come il liquido in eccesso viene rimosso dal mocio, in modo
        da agevolare gli acquirenti a scegliere lo stile di strizzatura che preferiscono.
    mounting_bolt_pattern:
      name: Schema dei bulloni di montaggio
      description: Specifica il numero e layout dei fori dei bulloni di montaggio
        sull'alloggiamento del mandrino (ad esempio, triangolare a 3 bulloni, quadrato
        a 4 bulloni).
    mouthpiece_shape:
      name: Forme del bocchino
      description: Specifica le forme dell'estremità del bocchino del portasigarette.
    mower_deck_material:
      name: Materiale del piatto di taglio
      description: Indica il materiale di costruzione del piatto di taglio, che influisce
        sulla durata e sul peso.
    mulch_form:
      name: Forma di pacciame
      description: Descrive la forma fisica o la consistenza del pacciame.
    nap_mat_items_included:
      name: Articoli inclusi nel tappetino per il riposino
      description: Descrive dettagliatamente i componenti o gli accessori specifici
        forniti con il tappetino.
    napkin_edge_finish:
      name: Finitura del bordo del tovagliolo
      description: Specifica la cucitura o la finitura decorativa lungo il bordo o
        l'orlo del tovagliolo.
    noodle_core_design:
      name: Struttura interna della pasta
      description: Descrive se la struttura interna della pasta è piena o vuota.
    nozzle_adjustability:
      name: Regolazione dell'ugello
      description: Indica se l'ugello è regolabile per modificare il tipo di spruzzo
        o la portata.
    nozzle_material:
      name: Materiale dell'ugello
      description: Specifica il materiale degli ugelli di nebulizzazione, rilevante
        per durata e resistenza all'ostruzione.
    nozzle_style:
      name: Modello di ugello
      description: Specifica le forme funzionali o lo stile dell'estremità dell'ugello
        del tubo.
    nozzle_types_included:
      name: Tipi di ugelli inclusi
      description: Elenca le forme o gli stili degli ugelli forniti con la pistola
        per jerky, in modo da consentire agli acquirenti di scoprire quali forme di
        prodotto possono creare.
    number_of_compartments:
      name: Numero di scomparti
      description: Indica quante sezioni separate ha il contenitore rifiuti per la
        raccolta differenziata dei rifiuti o dei materiali riciclabili.
    numeral_style:
      name: Stile numerico
      description: Definisce lo stile visivo o la presenza di numeri sul quadrante
        dell'orologio.
    oil_dispenser_spout_design:
      name: Design del beccuccio dell'erogatore di olio
      description: Descrive lo stile del beccuccio o dell'ugello, che influisce sul
        controllo della portata e sul sistema antigoccia.
    organizer_application:
      name: Applicazione dell'organizzatore
      description: Specifica il principale tipo di articolo che l'inserto è progettato
        per contenere.
    ornament_hook_style:
      name: Stile gancio ornamentale
      description: Identifica lo stile o la forma del gancio ornamentale utilizzato
        per appendere le decorazioni.
    oscillation_mode:
      name: Modalità di oscillazione
      description: Descrive se e come la ventola oscilla per distribuire l'aria.
    oscillation_type:
      name: Tipo di oscillazione
      description: Specifica se e come la ventola oscilla, in modo da agevolare gli
        acquirenti che necessitano di una circolazione d'aria diffusa.
    outdoor_grill_rack_type:
      name: Tipo di griglia per barbecue da esterno
      description: Specifica lo stile funzionale della griglia per chiarire l'uso
        di cottura previsto.
    oxygen_indicator_type:
      name: Tipo di indicatore dell'ossigeno
      description: Specifica se è incluso un indicatore visivo per mostrare se il
        pacchetto assorbitore è ancora attivo e quale forma assume.
    pad_cleaning_action:
      name: Azione di pulizia del pad
      description: Descrive le funzioni di pulizia principali del pad o il risultato
        finale.
    pan_bottom_type:
      name: Tipo di fondo della padella
      description: Indica se la pentola ha un fondo rimovibile o un fondo pino fisso.
    pan_perforation_type:
      name: Tipo di perforazione della padella
      description: Indica se il fondo o i lati della padella sono pieni o perforati
        per consentire il drenaggio dei liquidi.
    parasol_opening_mechanism:
      name: Meccanismo di apertura del parasole
      description: Descrive il sistema di apertura e chiusura della copertura del
        parasole.
    parchment_paper_coating:
      name: Rivestimento della carta da forno
      description: Identifica il trattamento applicato alla superficie della carta
        da forno per fornire proprietà antiaderenti.
    particle_size_grade:
      name: Dimensione delle particelle
      description: Descrive la classificazione della granulometria della vermiculite,
        che influisce sull'aerazione e sulla ritenzione idrica.
    patio_heater_safety_features:
      name: Caratteristiche di sicurezza del riscaldatore da esterno
      description: Evidenzia i meccanismi di sicurezza integrati progettati per prevenire
        incidenti e garantire un funzionamento sicuro.
    pattern_match_type:
      name: Tipo di corrispondenza del modello
      description: Specifica come deve essere allineato il motivo tra le strisce durante
        l'installazione.
    pendulum_compatibility:
      name: Compatibilità del pendolo
      description: Indica se il movimento può azionare un pendolo e se un pendolo
        è incluso.
    perch_design:
      name: Design del posatoio
      description: Descrive lo stile strutturale o la forma del posatoio.
    perch_surface_texture:
      name: Texture della superficie del posatoio
      description: Definisce la sensazione/finitura della superficie del posatoio
        che influisce sulla presa e sull'usura degli artigli.
    pet_safety:
      name: Sicuro per animali domestici
      description: Indica se la pianta è tossica o non tossica per gli animali domestici
        comuni.
    pet_toxicity:
      name: Tossico per animali domestici
      description: Indica se la pianta è tossica per gli animali domestici comuni,
        in modo da garantirne la sicurezza ai clienti proprietari di animali.
    ph_adjustment_direction:
      name: Direzione di regolazione del pH
      description: Indica se il prodotto è formulato per aumentare (pH Up) o diminuire
        (pH Down) il livello di pH della soluzione.
    pie_pan_edge_style:
      name: Stile bordo teglia per torta
      description: Descrive il design del bordo, che influisce sull'aspetto della
        crosta e sulla facilità di rimozione.
    pin_shape:
      name: Forma dello spillo
      description: Descrive la forma complessiva dello spillo che fissa il tessuto.
    pipe_connection_method:
      name: Metodo di collegamento del tubo
      description: Specifica lo stile di collegamento alle estremità del tubo (ad
        esempio, maschio, femmina, a pressione, filettato) per garantire la compatibilità
        dell'installazione.
    piping_tip_shape:
      name: Forma della bocchetta da pasticceria
      description: Definisce le forme o il design di una bocchetta per decorare/da
        sac à poche.
    pitcher_spout_style:
      name: Stile del beccuccio della caraffa
      description: Definisce il design del beccuccio, che influisce sulla precisione
        della latte art e sul controllo dell'erogazione.
    pizza_cutter_design:
      name: Design del taglia pizza
      description: Identifica lo stile strutturale del taglia pizza, in modo da aiutare
        i clienti a scegliere tra diversi meccanismi di taglio.
    pizza_pan_style:
      name: Stile teglia per pizza
      description: Identifica lo stile di costruzione/design della teglia per pizza
        e indica come cuoce la crosta e la varietà di pizza a cui è destinata.
    plant_care_difficulty:
      name: Difficoltà nella cura della pianta
      description: Indica il livello di cura richiesto per mantenere la pianta, aiutando
        principianti ed esperti a scegliere in modo appropriato.
    plant_container_type:
      name: Tipo di contenitore della pianta
      description: Identifica il tipo di contenitore incluso con l'arbusto artificiale,
        se presente.
    plant_life_cycle:
      name: Ciclo di vita delle piante
      description: Indica se la pianta è annuale, biennale o perenne.
    planter_material:
      name: Materiale del vaso
      description: Indica il materiale del vaso/fioriera incluso, se fornito.
    plate_coupling_pattern:
      name: Schema di accoppiamento dei piatti
      description: Specifica la configurazione del mozzo inferiore che si innesta
        con l'accoppiatore del motore del piatto girevole del microonde, garantendo
        la corretta rotazione.
    plate_purpose:
      name: Scopo del piatto
      description: Definisce il ruolo funzionale del piatto all'interno del sistema
        di taglio.
    plate_style:
      name: Stile del piatto
      description: Identifica lo stile specifico o l'uso previsto del piatto da portata.
    pole_construction_type:
      name: Tipo di costruzione del palo
      description: Definisce lo stile strutturale del palo, che ne influenza la configurazione
        e la portabilità.
    pool_chemical_type:
      name: Tipo di prodotto chimico per piscina
      description: Classifica la funzione principale o la tipologia chimica del prodotto
        per il trattamento della piscina.
    pool_filter_type:
      name: Tipo di filtro per piscina
      description: Identifica la tecnologia di filtrazione o lo stile di costruzione
        utilizzato dal filtro della piscina o della spa.
    pool_game_type:
      name: Tipo di gioco per piscina
      description: Identifica il tipo specifico di gioco o sport che il prodotto consente
        di praticare in piscina.
    pool_ladder_design:
      name: Design della scala per piscina
      description: Classifica il design strutturale complessivo della scaletta per
        piscina.
    pool_liner_installation_style:
      name: Stile di installazione del rivestimento della piscina
      description: Identifica il metodo di fissaggio utilizzato per fissare il rivestimento
        alla parete della piscina.
    pool_lounge_style:
      name: Stile del lettino della piscina
      description: Classifica lo stile strutturale del lettino della piscina per filtraggio
        visivo o funzionale.
    pool_lounger_features:
      name: Caratteristiche del lettino da piscina
      description: Evidenzia le funzionalità integrate speciali che aggiungono funzionalità
        o comfort al lettino.
    pool_skimmer_type:
      name: Tipo di skimmer da piscina
      description: Classifica il design dello skimmer, aiutando a confrontare retini
        manuali, skimmer automatici o galleggianti.
    pool_toy_features:
      name: Caratteristiche dei giocattoli da piscina
      description: Evidenzia le caratteristiche funzionali o di design più rilevanti
        specifiche dei giochi da piscina.
    pool_type:
      name: Tipo di piscina
      description: Classifica lo stile strutturale della piscina.
    pool_vacuum_type:
      name: Tipo di aspirapolvere per piscina
      description: Indica lo stile di funzionamento o il meccanismo di azionamento
        di un aspirapolvere per piscina.
    popcorn_kernel_variety:
      name: Varietà di chicchi di popcorn
      description: Specifica la varietà naturale o le forme del chicco di popcorn.
    portafilter_type:
      name: Tipo di portafiltro
      description: Identifica lo stile strutturale del portafiltro, che influenza
        il metodo di estrazione e il flusso di lavoro.
    post_installation_method:
      name: Metodo di montaggio del palo
      description: Definisce come il palo della cassetta postale viene installato
        o fissato in posizione.
    pour_spout_design:
      name: Design del beccuccio di versamento
      description: Specifica le caratteristiche speciali o lo stile del beccuccio
        di versamento che influisce sul controllo del flusso.
    pour_spout_style:
      name: Stile beccuccio di versamento
      description: Descrive il design del beccuccio del dispenser, che influisce sul
        controllo del flusso e sulla resistenza alle gocce.
    power_equipment_hitch_type:
      name: Tipo di attacco per attrezzatura elettrica
      description: Identifica l'interfaccia di collegamento utilizzata dall'accessorio
        per il montaggio su trattori o unità di potenza.
    predator_guard_style:
      name: Tipo di protezione antipredatori
      description: Categorizza il design strutturale della protezione, in modo da
        aiutare gli acquirenti a trovare rapidamente soluzioni con cono, disco, gabbia
        o piastra forata.
    preferred_soil_type:
      name: Tipo di terreno preferito
      description: Indica la composizione del terreno in cui la pianta prospera.
    preparation_type:
      name: Tipo di preparazione
      description: Descrive il metodo necessario per preparare il cibo pronto per
        il consumo.
    preservation_method:
      name: Metodo di conservazione
      description: Descrive dettagliatamente la tecnica utilizzata per essiccare o
        conservare i fiori.
    pressure_cooker_handle_type:
      name: Tipo di manico della pentola a pressione
      description: Indica lo stile o la sede del manico della pentola a pressione
        da sostituire.
    pressure_cooker_safety_features:
      name: Caratteristiche di sicurezza della pentola a pressione
      description: Elenca i meccanismi di sicurezza integrati che prevengono gli incidenti,
        come i coperchi di bloccaggio o le valvole di rilascio della pressione.
    pressure_settings:
      name: Impostazioni di pressione
      description: Specifica quanti livelli di pressione distinti la pentola a pressione
        offre all'utente.
    pressure_washer_outlet_connector_type:
      name: Tipo di connettore di uscita dell'idropulitrice
      description: Identifica le specifiche del connettore sulla parte anteriore della
        testa della pistola utilizzato per collegare lance o ugelli.
    pressure_washer_spray_pattern:
      name: Modello di getto dell'idropulitrice
      description: Specifica l'angolo o il modello di getto prodotto dall'ugello dell'idropulitrice.
    print_edition_type:
      name: Tipo di edizione cartacea
      description: Classifica il tipo di edizione della stampa, indicandone la rarità
        e il valore.
    printed_sides:
      name: Lati stampati
      description: Indica se il prodotto è stampato su un lato o su entrambi i lati.
    procedure:
      name: Procedura
      description: Specifica la procedura medica o il tipo di formazione per cui è
        progettata l'attrezzatura
    protected_item_type:
      name: Tipo di articolo protetto
      description: Specifica il tipo di documento o oggetto che la custodia RFID è
        progettata per proteggere.
    pulley_groove_profile:
      name: Profilo della gola della puleggia
      description: Definisce lo stile di interfaccia con la cinghia della puleggia
        folle.
    pulp_ejection_type:
      name: Tipo di espulsione della polpa
      description: Indica il modo in cui la polpa viene espulsa dalla macchina.
    pump_type:
      name: Tipo di pompa
      description: Specifica il design del meccanismo della pompa dell'idropulitrice.
    punch_bowl_components_included:
      name: Componenti inclusi nella bowl per punch
      description: Elenca gli articoli supplementari forniti con la ciotola del punch,
        consentendo all'acquirente di comprenderne il contenuto a colpo d'occhio.
    quilt_construction_type:
      name: Tipo di struttura del piumino
      description: Descrive il tipo di cucitura interna o sistema di compartimentazione
        del piumino, che influisce sulla distribuzione del calore e sulla durata.
    radiator_design_type:
      name: Tipo di design del radiatore
      description: Indica la struttura del radiatore.
    rain_barrel_design:
      name: Design di barili per la raccolta pioggia
      description: Indica la struttura del serbatoio per acqua piovana.
    rain_chain_style:
      name: Stile catena pluviale
      description: Specifica il design strutturale della catena pluviale in modo che
        i clienti possano filtrare in base alle preferenze visive e alle prestazioni
        del flusso idrico.
    range_hood_filter_type:
      name: Tipo di filtro della cappa
      description: Classifica lo stile del filtro sostitutivo per garantire la vestibilità
        e le prestazioni corrette.
    range_installation_type:
      name: Tipo di montaggio della cucina
      description: Descrive la configurazione di installazione della cucina all'interno
        dell'ambiente.
    recorder_type:
      name: Tipo di registratore
      description: Identifica la tecnologia di registrazione utilizzata (ad esempio,
        DVR, NVR) per facilitare il confronto tra soluzioni analogiche e IP.
    refrigerator_configuration:
      name: Configurazione del frigorifero
      description: Identifica lo stile layout complessivo delle porte e degli scompartimenti
        del frigorifero.
    release_type:
      name: Tipo di rilascio
      description: Indica la velocità con cui i nutrienti vengono rilasciati dal fertilizzante.
    relief_style:
      name: Stile del rilievo
      description: Indica se le elevazioni della superficie del globo sono in rilievo,
        incavate o piatte.
    repellent_mechanism:
      name: Meccanismo repellente
      description: Specifica il meccanismo di deterrenza primario impiegato dal prodotto,
        ad esempio odore chimico, ultrasuoni o luce lampeggiante.
    replaceable_brush_head:
      name: Testina sostituibile
      description: Specifica se la testina della spazzola può essere staccata e sostituita
        quando è usurata.
    rib_material:
      name: Materiale delle stecche
      description: Specifica il materiale utilizzato per le stecche o i raggi dell'ombrello,
        ad esempio fibra di vetro o alluminio.
    rice_cooker_functions:
      name: Funzioni della risottiera
      description: Elenca i programmi o le modalità di cottura preimpostati disponibili
        sulla cuociriso, in modo che gli acquirenti ne possano confrontare la versatilità.
    roaster_oven_functions:
      name: Funzioni del forno elettrico per arrosti
      description: Elenca le funzioni di cottura preimpostate o supportate disponibili
        su un forno per arrosti.
    roasting_rack_shape:
      name: Forma della griglia per arrosti
      description: Specifica la forma o il design strutturale della griglia, che influiscono
        sull'adattamento e sulle prestazioni di cottura.
    rockwool_form:
      name: Forma di lana di roccia
      description: Specifica la forma fisica o la configurazione del prodotto in lana
        di roccia.
    roof_style:
      name: Stile del tetto
      description: Definisce lo stile architettonico o la forma del tetto.
    rose_attachment:
      name: Accessorio a rosa
      description: Indica se l'annaffiatoio include una rosa/testina spray rimovibile,
        se è fissa oppure se ne è privo.
    safety_mirror_features:
      name: Caratteristiche dello specchio di sicurezza
      description: Evidenzia le caratteristiche prestazionali speciali che migliorano
        la durata o la visibilità.
    salad_spinner_mechanism:
      name: Meccanismo centrifuga per insalata
      description: Specifica il meccanismo di centrifuga utilizzato per asciugare
        le verdure a foglia, in modo da aiutare gli acquirenti a scegliere il proprio
        stile di funzionamento preferito.
    sand_color:
      name: Colore della sabbia
      description: Indica il colore della sabbia o del riempimento granulare all'interno
        della clessidra, indipendentemente dal colore della montatura esterna.
    sand_type:
      name: Tipo di sabbia
      description: Specifica il tipo di sabbia in base alla sua composizione o all'applicazione
        comune.
    saucer_functionality:
      name: Funzionalità del sottovaso
      description: Specifica lo stile funzionale del sottovaso o del vassoio, ad esempio
        con auto-irrigazione o con serbatoio.
    sauna_form_factor:
      name: Fattore di forma della sauna
      description: Definisce lo stile strutturale generale dell'unità sauna.
    sauna_heater_type:
      name: Tipo di stufa per sauna
      description: Indica il tipo di stufa incluso o supportato dal kit sauna.
    scoop_release_mechanism:
      name: Meccanismo di rilascio della paletta
      description: Descrive lo stile del meccanismo di rilascio del prodotto integrato
        nella paletta.
    scoop_surface_design:
      name: Design della superficie della paletta
      description: Descrive se la superficie della paletta è piena o perforata per
        consentire il drenaggio dell'olio.
    scoop_wall_design:
      name: Design delle pareti della paletta
      description: Descrive se la superficie della paletta è piena o perforata/scanalata
        per consentire la fuoriuscita di piccoli pezzi o di olio.
    scrubber_head_type:
      name: Tipo di testina di lavaggio
      description: Descrive l'azione meccanica o il design della testina di lavaggio.
    scrubbing_strength:
      name: Forza di sfregamento
      description: Indica il livello relativo di sfregamento/abrasività fornito dal
        prodotto.
    seafood_utensil_items_included:
      name: Utensili per frutti di mare inclusi
      description: Elenca gli utensili aggiuntivi per crostacei inclusi con lo schiaccianoci,
        permettendo di confrontare i modelli singoli con i kit completi.
    sealing_modes:
      name: Modalità di sigillatura
      description: Elenca i programmi di sigillatura operativi disponibili sull'apparecchio.
    security_sensor_subtype:
      name: Sottotipo di sensore di sicurezza
      description: Definisce la funzione /il tipo specifico del sensore di sicurezza.
    seed_treatment:
      name: Variante di semi
      description: Specifica qualsiasi lavorazione speciale applicata ai semi.
    self_cleaning_method:
      name: Metodo autopulente
      description: Specifica il tipo di tecnologia autopulente utilizzata dal forno.
    serveware_pieces_included:
      name: Piatti da portata inclusi
      description: Elenca i diversi componenti per stoviglie contenuti in un set composto
        da più pezzi.
    shaker_set_pieces_included:
      name: Articoli da shaker inclusi
      description: Elenca i componenti singoli inclusi nel set, oltre ai classici
        sale e pepe.
    sheath_material:
      name: Materiale della guaina
      description: Materiale della guaina della sonda della termocoppia, che influisce
        sulla resistenza alla corrosione e sulla temperatura massima di servizio.
    shelf_location_in_appliance:
      name: Posizione del ripiano nell'elettrodomestico
      description: Indica il luogo all'interno dell'elettrodomestico dove è prevista
        l'installazione del ripiano.
    shoe_brush_type:
      name: Tipo di spazzola per scarpe
      description: Classifica lo stile funzionale della spazzola per scarpe, consentendo
        agli acquirenti di individuare le spazzole progettate per compiti specifici.
    shoe_dryer_technology:
      name: Tecnologia asciugascarpe
      description: Specifica la tecnologia di asciugatura primaria utilizzata dall'asciugascarpe.
    shoe_organizer_design:
      name: Design dell'organizzatore per scarpe
      description: Identifica lo stile o il formato generale dell'organizzatore di
        scarpe per aiutare l'acquirente a filtrare gli articoli.
    shoe_polish_form:
      name: Forma di lucido da scarpe
      description: Identifica la forma fisica o il metodo di consegna del lucido da
        scarpe.
    shoe_treatment_purpose:
      name: Scopo del trattamento della scarpa
      description: Indica la funzione principale o il vantaggio del prodotto per la
        cura delle scarpe.
    shoe_tree_design:
      name: Design del tendiscarpe
      description: Identifica lo stile strutturale o il meccanismo del tendiscarpe,
        che influisce su regolabilità, tipo di calzatura prevista e facilità d'uso.
    shot_glass_style:
      name: Stile del bicchiere da shot
      description: Categorizza lo stile o il formato specifico del bicchierino.
    shovel_handle_grip_type:
      name: Tipo di impugnatura della pala
      description: Specifica lo stile di presa all'estremità dell'impugnatura.
    shovel_head_type:
      name: Tipo di testa della pala
      description: Classifica la forma/lo stile funzionale della testa della pala
        o della vanga.
    shower_curtain_ring_type:
      name: Tipo di anello della tenda da doccia
      description: Identifica lo stile funzionale dell'anello della tenda della doccia.
    shrub_shape:
      name: Forma dell'arbusto
      description: Descrive la forma complessiva scolpita/topiaria dell'arbusto artificiale.
    signature_presence:
      name: Presenza della firma
      description: Specifica se e come il dipinto è firmato dall'artista.
    sink_caddy_features:
      name: Caratteristiche del contenitore per lavello
      description: Mette in evidenza gli elementi funzionali speciali di un portaoggetti
        per lavello.
    size_adjustability:
      name: Regolabilità in base al numero
      description: Indica se la lunghezza/larghezza del prodotto può essere regolata
        per adattarsi a più numeri di scarpa.
    skewer_tip_type:
      name: Tipo di punta dello spiedino
      description: Definisce il tipo di punta di uno spiedino, influenzando la facilità
        di infilzare il cibo e la presentazione complessiva.
    sleeping_position_suitability:
      name: Idoneità della posizione di sonno
      description: Indica per quali posizioni di sonno è progettato il cuscino.
    sleeve_insulation:
      name: Isolamento della custodia
      description: Indica se la custodia fornisce isolamento termico per mantenere
        le bevande fredde o calde.
    slice_style:
      name: Stile di taglio
      description: Specifica lo stile di taglio principale prodotto dall'affettatrice
        da cucina, ad esempio julienne o waffle.
    slipcover_stretch_type:
      name: Copridivano tipo elasticizzato
      description: Specifica il grado e la direzione dell'elasticità del tessuto utilizzato
        nella fodera.
    smoker_type:
      name: Tipo di affumicatore
      description: Classifica l'affumicatore in base alla sua progettazione strutturale
        o al metodo di affumicatura.
    smoking_chip_size:
      name: Dimensioni trucioli affumicatura
      description: Indica il taglio fisico dei trucioli di legno per affumicatura,
        che influisce sulla velocità di combustione e sull'idoneità per diverse griglie
        o affumicatori.
    snow_blower_stage_type:
      name: Tipo di stadio dello spazzaneve
      description: Indica il numero di stadi della coclea/girante utilizzati per spostare
        e scaricare la neve, una specifica primaria utilizzata per differenziare le
        macchine a uno, due e tre stadi.
    soap_dispenser_operation_type:
      name: Tipo di funzionamento del distributore di sapone
      description: Specifica il meccanismo di attivazione utilizzato per erogare sapone
        o lozione.
    soil_texture:
      name: Composizione del terreno
      description: Descrive la composizione delle particelle predominanti del terreno
        che influenzano il drenaggio e l'aerazione.
    spa_installation_type:
      name: Tipo di montaggio dell'idromassaggio
      description: Classifica la spa in base al modo in cui è installata o configurata
        in loco.
    space_heater_safety_features:
      name: Caratteristiche di sicurezza della stufa
      description: Mette in evidenza i meccanismi di sicurezza integrati che proteggono
        gli utenti e le proprietà.
    spice_organizer_features:
      name: Caratteristiche dei portaspezie
      description: Evidenzia le caratteristiche funzionali speciali dei portaspezie.
    spray_pattern:
      name: Schema di spruzzo
      description: Definisce il tipo di dispersione di olio prodotta dall'ugello spruzzatore.
    sprayer_operation_mechanism:
      name: Meccanismo di azionamento dello spruzzatore
      description: Specifica come viene generata la pressione per erogare l'olio dallo
        spruzzatore.
    spring_type:
      name: Tipo di molla
      description: Identifica il tipo di molla utilizzata nel meccanismo della bordatrice.
    sprinkle_opening_style:
      name: Stile di apertura a cospargere
      description: Definisce la grossolanità o lo stile delle perforazioni/maglie
        utilizzate per erogare il cacao (maglie fini o fori grandi, ecc.).
    sprinkler_orientation:
      name: Orientamento dell'irrigatore
      description: Indica l'orientamento e lo stile di installazione della testina
        dell'irrigatore antincendio.
    sprinkler_response_type:
      name: Tipo di risposta dell'irrigatore
      description: Specifica la caratteristica di risposta termica della testina dell'irrigatore.
    sprinkler_type:
      name: Tipo di irrigatore
      description: Classifica l'azione meccanica o lo stile di distribuzione dell'irrigatore
        per facilitare il confronto e il filtraggio.
    sprinkler_valve_type:
      name: Tipo di valvola dell'irrigatore
      description: Definisce il tipo di funzionamento o di attuazione della valvola
        sprinkler.
    squirrel_feed_type:
      name: Tipo di mangime per scoiattoli
      description: Identifica i tipi di mangime che la mangiatoia è progettata per
        erogare, garantendo la compatibilità con gli alimenti preferiti dagli scoiattoli.
    squirrel_resistance:
      name: Resistenza agli scoiattoli
      description: Indica se la gabbia per il sego è dotata di caratteristiche studiate
        per impedire agli scoiattoli di accedere al sego.
    stackability:
      name: Impilabilità
      description: Indica se più unità possono essere impilate in modo sicuro per
        uno stoccaggio che consente di risparmiare spazio.
    stackable_design:
      name: Design impilabile
      description: Indica se la cassa è progettata per essere impilata in modo sicuro
        quando è piena o vuota.
    stacking_capability:
      name: Capacità di impilamento
      description: Specifica se la cassa può essere impilata, annidata, compressa
        o non può essere impilata con altre casse.
    stainless_steel_cleaner_features:
      name: Caratteristiche del detergente per acciaio inossidabile
      description: Specifica le caratteristiche prestazionali speciali del prodotto
        che sono uniche o particolarmente rilevanti per la cura dell'acciaio inossidabile.
    staple/pin_shape:
      name: Forma di spilli/puntine
      description: Definisce la forma complessiva del dispositivo di fissaggio, aiutando
        i clienti a scegliere tra punti metallici a U, perni con testa arrotondata,
        ecc.
    staple_coating:
      name: Rivestimento delle graffette
      description: Descrive qualsiasi rivestimento protettivo applicato alla graffetta
        o al perno per prevenire la ruggine o aumentarne la longevità.
    steam_nozzle_type:
      name: Tipo di ugello per vapore
      description: Identifica lo stile funzionale dell'accessorio ugello del pulitore
        a vapore.
    steam_table_pan_cover_features:
      name: Caratteristiche del coperchio della pentola per cottura a vapore
      description: Mette in evidenza le caratteristiche funzionali speciali delle
        coperture per teglie da tavolo a vapore che agevolano le operazioni di ristorazione.
    steam_table_pan_size:
      name: Dimensioni della pentola a vapore
      description: Indica la frazione standardizzata Gastronorm/hotel-pan (ad esempio,
        intero, 1/2, 1/3) per cui la padella o il coperchio sono stati progettati.
    steam_table_pan_size_compatibility:
      name: Compatibilità taglia per tavolo vapore
      description: Compatibilità delle dimensioni delle teglie per tavoli a vapore.
    steam_table_pan_type:
      name: Tipo di vaschetta per scaldavivande
      description: Specifica lo stile di costruzione della teglia, che influisce sulle
        prestazioni di drenaggio e riscaldamento.
    stemware_design:
      name: Design del bicchiere da vino
      description: Specifica se il bicchiere ha uno stelo tradizionale o è senza stelo.
    stick_tip_style:
      name: Stile dell'estremità del bastoncino
      description: Definisce il design dell'estremità del bastoncino, influenzando
        il modo in cui perfora o assistenza alimentare articolo.
    stocking_toe_orientation:
      name: Orientamento della punta della calza
      description: Specifica la direzione in cui punta la punta della calza quando
        è appesa, influenzando la simmetria visiva quando vengono esposte più calze.
    stopper_type:
      name: Tipo di chiusura
      description: Specifica il tipo di chiusura fornito con il decanter, se presente.
    strainer_style:
      name: Modello di colino
      description: Classifica il design del colino o dello scolapasta.
    strainer_type:
      name: Tipo di colino
      description: Specifica lo stile o il design del colino, indicandone l'uso culinario
        previsto e la struttura della maglia.
    strap_end_fitting_type:
      name: Tipo di raccordo terminale della cinghia
      description: Indica l'hardware o il raccordo situato all'estremità della cinghia
        di trazione che facilita il collegamento, l'ancoraggio o la regolazione.
    straw_dispensing_mechanism:
      name: Meccanismo di distribuzione della cannuccia
      description: Descrive il metodo con cui vengono distribuite le cannucce, aiutando
        l'acquirente a ricercare specifiche caratteristiche igieniche o di praticità.
    sugar_dispenser_mechanism:
      name: Meccanismo di erogazione dello zucchero
      description: Descrive in dettaglio come lo zucchero viene erogato dal contenitore,
        aiutando gli acquirenti a scegliere il loro stile di versamento preferito.
    suitable_for_pool_shape:
      name: Forma di piscina per cui è idoneo
      description: Indica con quali forme di piscina è possibile utilizzare l'accessorio,
        aiutando gli utenti a garantire un corretto montaggio.
    suitable_pool_surface_type:
      name: Tipo di superficie della piscina adatta
      description: Identifica i materiali della superficie della piscina per i quali
        è progettata la spazzola/scopa, prevenendo danni alla superficie e garantendo
        una pulizia ottimale.
    suitable_spread_material:
      name: Materiale di diffusione adatto
      description: Identifica i tipi di materiali che lo spanditore è progettato per
        distribuire.
    sundial_type:
      name: Tipo di meridiana
      description: Identifica lo stile di progettazione o la configurazione scientifica
        della meridiana.
    supplement_function:
      name: Funzione dell'integratore
      description: Classifica gli integratori in base al loro scopo principale, aiutando
        i coltivatori a scegliere l'additivo più adatto alle esigenze specifiche delle
        piante.
    surface_reflectivity:
      name: Riflettività superficiale
      description: Indica se la superficie del cartello è progettata per riflettere
        la luce e migliorare la visibilità notturna.
    sweetener_type:
      name: Tipo di dolcificante
      description: Identifica il principale agente dolcificante utilizzato nello sciroppo.
    table_skirt_pleat_style:
      name: Gonna da tavolo in stile plissettato
      description: Definisce lo stile decorativo delle pieghe o delle arricciature
        della gonna, aiutando l'acquirente ad abbinare i temi estetici.
    tablecloth_clip_design:
      name: Design della clip per tovaglia
      description: Descrive il meccanismo o lo stile della clip per tovaglia.
    tablecloth_features:
      name: Caratteristiche della tovaglia
      description: Mette in evidenza le caratteristiche speciali di prestazione o
        di design della tovaglia.
    tamper_evident_feature:
      name: Funzione antimanomissione
      description: Indica la presenza e lo stile della funzionalità antimanomissione
        incorporata nel tappo.
    tang_type:
      name: Tipo di codolo
      description: Indica il design del codolo di un coltello, specificando fino a
        che punto il metallo della lama si estende handle.
    teapot_spout_style:
      name: Stile beccuccio teiera
      description: Descrive il design del beccuccio di versamento della teiera, che
        influisce sul controllo del versamento e sull'estetica.
    temperature_zones:
      name: Zone di temperatura
      description: Identifica quante zone di temperatura controllabili in modo indipendente
        sono fornite dal frigorifero per vino.
    thermocouple_junction_type:
      name: Tipo di giunzione della termocoppia
      description: Indica la costruzione della giunzione di rilevamento, che influisce
        sul tempo di risposta e sull'isolamento elettrico.
    thermometer_design:
      name: Design del termometro
      description: Specifica lo stile operativo fondamentale o la tecnologia del termometro
        domestico.
    thermos_handle_type:
      name: Tipo di manico del thermos
      description: Descrive lo stile del manico o del supporto per il trasporto integrato
        nel thermos.
    thread_standard:
      name: Standard di filettatura
      description: Identifica le specifiche del filetto utilizzato sui raccordi dell'accessorio
        per garantire la compatibilità incrociata con i componenti idraulici.
    tilt_mechanism:
      name: Meccanismo di inclinazione
      description: Specifica il meccanismo che consente all'ombrinale di inclinarsi
        per un posizionamento ottimale dell'ombra.
    time_format:
      name: Formato dell'ora
      description: Indica se l'orologio può visualizzare l'ora nel formato 12 ore,
        24 ore o entrambi.
    timer_mechanism:
      name: Meccanismo del timer
      description: Identifica il meccanismo sottostante utilizzato per misurare il
        tempo.
    tine_position:
      name: Posizione dei rebbi
      description: Descrive la configurazione dei rebbi rispetto alle ruote/motore,
        che influisce sulla manovrabilità e sulla penetrazione nel terreno.
    tire_construction:
      name: Costruzione dello pneumatico
      description: Identifica il metodo di costruzione interna della carcassa del
        pneumatico.
    tire_construction_type:
      name: Tipo di costruzione dello pneumatico
      description: Identifica se il pneumatico è a struttura diagonale o radiale,
        il che influisce sulla flessibilità, sulla capacità di carico e sulla qualità
        Ride .
    tire_tread_pattern:
      name: Motivo del battistrada del pneumatico
      description: Descrive lo stile del battistrada dello pneumatico, indicandone
        l'idoneità alle diverse condizioni del manto erboso e alle diverse esigenze
        di trazione.
    tissue_lotion_content:
      name: Contenuto della lozione per tessuti
      description: Indica se i tessuti sono imbevuti di lozione o di altri additivi
        lenitivi.
    toaster_features:
      name: Caratteristiche del tostapane
      description: Indica le funzioni speciali e gli elementi di design disponibili
        sul tostapane.
    tong_type:
      name: Tipo di pinza
      description: Specifica lo stile principale o l'uso previsto delle pinze.
    toothbrush_holder_features:
      name: Caratteristiche del portaspazzolino
      description: Mette in evidenza le funzioni speciali o gli elementi di design
        che differenziano il supporto.
    toothpick_dispensing_mechanism:
      name: Meccanismo di erogazione degli stuzzicadenti
      description: Identifica il meccanismo mediante il quale vengono distribuiti
        gli stuzzicadenti.
    topographical_relief:
      name: Rilievo topografico
      description: Indica se la superficie del globo presenta una topografia rialzata.
    towel_holder_design:
      name: Design del portasciugamani
      description: Descrive lo stile strutturale di un portasciugamani, come una barra
        o un anello.
    towel_weave:
      name: Tessuto dell'asciugamano
      description: Descrive la costruzione o lo stile di tessitura del tessuto dell'asciugamano,
        che influisce sulla consistenza, sull'assorbenza e sul tempo di asciugatura.
    track_lighting_rail_type:
      name: Sistema di illuminazione a binario
      description: Definisce lo standard meccanico/elettrico della rotaia, determinando
        quali dispositivi di fissaggio e connettori sono compatibili.
    track_lighting_system_compatibility:
      name: Compatibilità del sistema di illuminazione a binario
      description: Specifica lo standard elettrico e meccanico del binario per cui
        è stato progettato il dispositivo o l'accessorio.
    track_rail_circuit_configuration:
      name: Configurazione del circuito
      description: Indica il numero o il tipo di circuiti elettrici supportati dalla
        guida, che influiscono sul controllo indipendente dei gruppi di apparecchi.
    track_system_standard:
      name: Standard del sistema di tracciamento
      description: Identifica lo standard di tracciamento fisico a cui si adatta l'alimentazione,
        consentendo all'acquirente di abbinare i componenti al loro tracciamento (ad
        esempio, tracciamento H, J o L).
    tractor_tire_application:
      name: Applicazione dei pneumatici da trattore
      description: Indica l'applicazione o l'ambiente principale per cui è progettato
        lo pneumatico.
    tractor_tire_tread_classification:
      name: Classificazione del battistrada degli pneumatici del trattore
      description: Classifica il disegno del battistrada degli pneumatici dei trattori
        in base agli standard agricoli e industriali.
    tree_shape:
      name: Forma dell'albero
      description: Descrive la sagoma o il profilo complessivo di un albero artificiale.
    trigger_type:
      name: Tipo di grilletto
      description: Specifica il meccanismo del grilletto utilizzato per controllare
        il flusso dell'acqua sull'ugello.
    trimmer_line_feed_system:
      name: Sistema di alimentazione del filo del decespugliatore
      description: Identifica come la linea di taglio viene fatta avanzare dalla testa
        durante il funzionamento.
    trimmer_line_shape:
      name: Forma del filo del tagliaerba
      description: Descrive la forma trasversale del filo del tagliaerba, che influenza
        le prestazioni di taglio e il rumore.
    turntable_type:
      name: Tipo di piatto girevole
      description: Identifica lo stile della superficie di cottura, distinguendo tra
        i tradizionali piatti girevoli in vetro e i modelli piatti o non girevoli.
    ultrasonic_cleaner_accessories_included:
      name: Accessori per la pulizia ad ultrasuoni inclusi
      description: Elenca i componenti aggiuntivi forniti con il detergente in modo
        che l'acquirente sappia esattamente cosa c'è nella scatola.
    umbrella_base_type:
      name: Tipo di base dell'ombrello
      description: Definisce lo stile strutturale o il design di montaggio della base.
    umbrella_opening_mechanism:
      name: Meccanismo di apertura dell'ombrello
      description: Definisce come viene aperto e chiuso il telo dell'ombrello.
    umbrella_type:
      name: Tipo di ombrello
      description: Specifica il design complessivo o il fattore di forma dell'ombrello.
    upf_rating:
      name: Classificazione UPF
      description: Indica il fattore di protezione dai raggi ultravioletti (UPF) del
        tessuto del telo parasole, quantificandone l'efficacia nel bloccare i dannosi
        raggi UV.
    utensil_flexibility:
      name: Flessibilità degli utensili
      description: Indica quanto è rigido o flessibile il corpo del raschietto, influendo
        sull'idoneità per ciotole curve o impasti consistenti.
    utensil_holder_features:
      name: Caratteristiche del portautensili
      description: Descrive le caratteristiche funzionali speciali di un portautensili
        da cucina.
    utensil_tray_features:
      name: Caratteristiche del vassoio portautensili
      description: Mette in evidenza le caratteristiche speciali che migliorano la
        funzionalità del vassoio.
    vacuum_hose_connection_type:
      name: Tipo di connessione del tubo flessibile del vuoto
      description: Descrive lo stile del connettore alle estremità del tubo flessibile,
        garantendo il corretto adattamento meccanico con aspirapolvere o accessori.
    valance_style:
      name: Stile della mantovana
      description: Identifica il design decorativo della mantovana, aiutando i clienti
        a scegliere uno stile che si abbini al loro arredamento.
    valet_organizer_features:
      name: Caratteristiche del vassoio caricabatterie
      description: Evidenzia le caratteristiche organizzative specifiche integrate
        nella presa di ricarica.
    valve_configuration:
      name: Configurazione della valvola
      description: Definisce lo stile funzionale della valvola per tubo da giardino,
        aiutando gli acquirenti a scegliere rapidamente la soluzione più adatta alla
        loro configurazione di irrigazione.
    valve_stem_angle:
      name: Angolo dello stelo della valvola
      description: Specifica l'orientamento/angolo dello stelo della valvola rispetto
        al tubo, influendo sulla facilità di gonfiaggio e sull'adattamento al cerchio.
    vase_filler_type:
      name: Tipo di riempitivo per vasi
      description: Categorizza il prodotto in base al tipo specifico di materiale
        di riempimento o alla forma.
    vent_pipe_type:
      name: Tipo di tubo di sfiato
      description: Classifica lo stile costruttivo del camino o del tubo di sfiato.
    vent_style:
      name: Stile di sfiato
      description: Classifica lo stile strutturale o lo scopo del componente di sfiato.
    waffle_style:
      name: Stile a nido d'ape
      description: Identifica la griglia o il motivo a nido d'ape prodotto dalle piastre.
    wallpaper_removal_type:
      name: Tipo di rimozione della carta da parati
      description: Indica la facilità di rimozione in caso di ristrutturazione.
    wallpaper_washability_rating:
      name: Valutazione della lavabilità della carta da parati
      description: Definisce come pulire la superficie della carta da parati una volta
        installata.
    warmer_type:
      name: Tipo più caldo
      description: Specifica il meccanismo di riscaldamento principale o l'uso previsto
        dello scaldacandele o dello scaldaolio.
    warmth_level:
      name: Livello di calore
      description: Classifica il livello di calore complessivo o l'idoneità stagionale
        della trapunta o del piumone.
    warmth_rating:
      name: Valutazione del calore
      description: Indica il livello di isolamento di una coperta, simile ai valori
        TOG nella biancheria da letto.
    waste_container_lid_features:
      name: Caratteristiche del coperchio della cassa dei rifiuti
      description: Mette in evidenza le funzionalità speciali o i miglioramenti integrati
        nel coperchio.
    waste_container_sign_message:
      name: Messaggio del cartello "Cassa dei rifiuti"
      description: Definisce il flusso specifico di rifiuti o il testo di avvertenza
        stampato sull'etichetta o sul cartello.
    water_filtration_technology:
      name: Tecnologia di filtrazione dell'acqua
      description: Descrive la tecnologia o il meccanismo di base utilizzato per purificare
        l'acqua.
    water_heater_element_connection_type:
      name: Tipo di collegamento dell'elemento riscaldante dell'acqua
      description: Identifica lo stile di montaggio dell'elemento, distinguendo tra
        quelli a vite e quelli con flangia.
    water_sensor_design:
      name: Design del sensore dell'acqua
      description: Specifica lo stile fisico dell'elemento di rilevamento dell'acqua.
    water_supply_type:
      name: Tipo di approvvigionamento idrico
      description: Identifica il modo in cui l'apparecchio riceve l'acqua, distinguendo
        tra serbatoi a riempimento manuale e tubature dell'acqua collegate all'impianto
        idraulico.
    watering_needs:
      name: Necessità di irrigazione
      description: Descrive i tipici requisiti di irrigazione della pianta.
    wax_paper_form:
      name: Modulo in carta cerata
      description: Specifica se la carta cerata è venduta in rotoli continui o in
        fogli pretagliati.
    weather_guard_mounting_method:
      name: Metodo di montaggio della protezione contro le intemperie
      description: Specifica come la protezione si fissa all'alimentatore o alla struttura
        di supporto.
    wheel_bearing_type:
      name: Tipo di cuscinetto ruota
      description: Identifica la struttura interna del cuscinetto o della boccola
        della ruota, che influisce sulla scorrevolezza e sui requisiti di manutenzione.
    wheel_tread_style:
      name: Stile del battistrada della ruota
      description: Specifica il disegno del battistrada della ruota, che influisce
        sulla trazione, sul livello di rumore e sulla potenziale marcatura del pavimento.
    whistling:
      name: Fischio
      description: Specifica se il bollitore emette un fischio quando l'acqua raggiunge
        il punto di ebollizione.
    wick_material:
      name: Materiale dello stoppino
      description: Identifica la composizione dello stoppino utilizzato (ad esempio
        cotone, fibra di vetro).
    window_film_installation_surface:
      name: Superficie di installazione della pellicola per finestre
      description: Specifica se la pellicola è progettata per applicazioni interne,
        esterne o su doppia superficie.
    window_film_type:
      name: Tipo di pellicola per finestre
      description: Categorizza lo stile funzionale della finestra (ad esempio, privacy
        o sicurezza).
    window_rod_type:
      name: Tipo di asta da finestra
      description: Classifica lo stile funzionale dell'asta della finestra.
    window_screen_type:
      name: Tipo di schermo per finestra
      description: Definisce lo stile strutturale o il metodo operativo dello schermo.
    window_treatment_lining_type:
      name: Tipo di rivestimento per finestre
      description: Indica se la mantovana o il cornicione sono foderati e che tipo
        di fodera è stata utilizzata.
    wine_aerator_type:
      name: Tipo di aeratore per vino
      description: Specifica il fattore di forma o lo stile di funzionamento dell'aeratore
        per vino.
    wine_glass_style:
      name: Stile del bicchiere da vino
      description: Specifica il tipo di vino o il design del bicchiere desiderato
        per ottimizzare l'aroma e il sapore.
    wok_bottom_type:
      name: Tipo di base del wok
      description: Definisce la forma della base del wok, determinando la compatibilità
        con diversi piani cottura e anelli per wok.
    wood_grain_orientation:
      name: Orientamento delle venature del legno
      description: Specifica l'orientamento delleevenatura del legno nel prodotto,
        ad esempio venatura di testa, venatura di bordo o venatura di superficie.
        L'orientamento della grana Influence la durata e la facilità di taglio del
        coltello.
    wood_seasoning_method:
      name: Metodo di stagionatura del legno
      description: Indica come è stato essiccato o stagionato il combustibile legnoso,
        Influence il contenuto di umidità e la qualità della combustione.
    wrap_format:
      name: Formato dell'involucro
      description: Specifica la forma fisica in cui viene fornito l'involucro alimentare,
        ad esempio rotoli o fogli pretagliati.
    abacus_bead_material:
      name: Materiale per perline dell'abaco
      description: Materiale principale delle perline dell'abaco.
    abec_rating:
      name: Classificazione ABEC
      description: Specifica il grado di precisione dei cuscinetti in base alle classificazioni
        ABEC, indicando i livelli di scorrevolezza e tolleranza.
    abrasive_level:
      name: Livello di abrasività
      description: Potere abrasivo relativo di un lucidante/pasta abrasiva su superfici
        automobilistiche.
    absinthe_accessories_included:
      name: Accessori per assenzio inclusi
      description: Dettaglia tutti gli accessori inclusi nella confezione del prodotto,
        come cucchiai, bicchieri o zollette di zucchero.
    ac_compressor_mounting_style:
      name: Stile di montaggio del compressore AC
      description: Descrive il tipo di montaggio/fissaggio meccanico o l'interfaccia
        della staffa del compressore al sistema di azionamento del motore/accessori.
    ac_compressor_oil_type:
      name: Tipo di olio per compressore AC
      description: Specifica la composizione chimica dell'olio lubrificante richiesto/utilizzato
        dal compressore del climatizzatore (i tipi più comuni includono PAG e POE).
    accent_modes:
      name: Modalità di accento
      description: Specifica come il metronomo può accentuare i battiti all'interno
        di una misura (Beyond Basic click).
    access_mechanism:
      name: Meccanismo di accesso
      description: Descrive come l'utente raggiunge la piattaforma Loft per dormire.
    accessibility_features:
      name: Funzionalità di accessibilità
      description: Specifica le dotazioni e le configurazioni relative all'accessibilità
        presenti sul minibus.
    accessories_included:
      name: Accessori inclusi
      description: Elenca gli articoli supplementari in pacchetto con la sedia (ad
        esempio, poggiapiedi, cuscino lombare), offrendo all'acquirente una visione
        chiara del valore aggiunto.
    accessory_pieces_included:
      name: Pezzi accessori inclusi
      description: Elenca gli articoli accessori inclusi in un set di regali o pacchetto
        di accessori per abbigliamento composto da più pezzi.
    acoustic_amplifier_feedback_control_features:
      name: Funzioni di controllo del feedback dell'amplificatore acustico
      description: Indica la presenza di strumenti anti-feedback integrati per strumenti
        acustici (ad esempio, filtro notch, invertitore di fase, soppressione automatica
        del feedback).
    acoustic_drum_kit_components_included:
      name: Componenti del kit di batteria acustica inclusi
      description: Indica quali componenti principali sono inclusi nel kit (solo imballaggio
        shell o kit completo; piatti/hardware inclusi).
    acoustic_guitar_body_shape:
      name: Shapes del corpo della chitarra acustica
      description: Descrive la Shapes/il profilo del corpo della chitarra acustica,
        che influenza il suono, il comfort e l'utilizzo tipico.
    acoustic_guitar_string_core_design:
      name: Design del nucleo della stringa per chitarra acustica
      description: La struttura centrale della stringa avvolta.
    acoustic_piano_key_material:
      name: Materiale per tasti di pianoforte acustico
      description: Indica il materiale principale utilizzato per i tasti superiori/avori
        del pianoforte.
    acoustic_piano_lid_type:
      name: Tipo di coperchio per pianoforte acustico
      description: Specifica il tipo di meccanismo di chiusura del coperchio utilizzato
        sul pianoforte acustico (per distinguere tra pianoforte a coda, pianoforte
        verticale e pianoforte acustico con coperchio superiore).
    acoustic_piano_plate_frame_material:
      name: Materiale della piastra/Frame del pianoforte acustico
      description: Specifica il materiale principale della piastra/Frame del pianoforte
        (arpa), comunemente ghisa.
    acoustic_piano_soundboard_material:
      name: Materiale per la tavola armonica di un pianoforte acustico
      description: Specifica il materiale principale utilizzato per la tavola armonica
        del pianoforte.
    action_figure_scale:
      name: Scala delle action figure
      description: Indica il rapporto di scala del collettore (ad esempio, 1:12) per
        cui l'accessorio è progettato.
    action_type:
      name: Tipo di azione
      description: Descrive il meccanismo di sparo o di caricamento dell'arma (ad
        esempio, otturatore a ripetizione, canna basculante, leva).
    actuation_mechanism:
      name: Meccanismo di attuazione
      description: 'Indica come la leva aziona il sistema frenante: puramente meccanico
        a cavo, completamente idraulico, idraulico azionato da cavo o elettronico/wireless.'
    actuation_method:
      name: Metodo di azionamento
      description: Come viene attivato o scaricato il sistema di soppressione.
    adapter_orientation:
      name: Orientamento dell'adattatore
      description: Specifica l'angolo o la configurazione di un adattatore per valvola
        di pneumatico da bicicletta, che influisce sull'accessibilità alla pompa (ad
        esempio, dritto, 90°).
    additive_application_stage:
      name: Fase di applicazione dell'additivo
      description: Indica in quale fase del processo il prodotto è destinato ad essere
        utilizzato.
    adhesive_backing:
      name: Supporto adesivo
      description: Se la seta stampabile ha un retro adesivo per l'applicazione "stacca
        e incolla".
    adhesive_formulation:
      name: Formulazione adesiva
      description: Indica la base chimica o la formulazione dell'adesivo, come ad
        esempio cianoacrilato o epossidico.
    adhesive_sides:
      name: Lati adesivi
      description: Indica se l'adesivo termofusibile è presente su un solo lato o
        su entrambi i lati del nastro/della pellicola.
    adjunct_grain_processing_form:
      name: Forma di lavorazione del cereale ausiliario
      description: Indica la forma fisica/di lavorazione del cereale ausiliario venduto
        per la produzione di birra (ad esempio, in fiocchi, torrefatto, maltato, crudo).
    adjustability_type:
      name: Tipo di regolabilità
      description: Specifica il tipo di regolazione, se presente, fornita dall'assistenza
        all'ammortizzatore.
    adjustable_cup_mutes:
      name: Sordina regolabile per la coppa
      description: Indica se la coppa è regolabile/rimovibile e il tipo di regolazione.
    adjustable_zones:
      name: Zone regolabili
      description: Identifica quali sezioni della base possono essere regolate indipendentemente.
    adjustment_type:
      name: Tipo di regolazione
      description: Indica se il regolatore è regolabile e come viene effettuata la
        regolazione.
    administration_method:
      name: Metodo di amministrazione
      description: Indica come viene somministrato il vermifugo al cavallo (ad esempio,
        per via orale o tramite iniezione), aiutando l'acquirente a seguire le indicazioni
        del veterinario e a scegliere un metodo di somministrazione gestibile.
    advice_card_prompt_type:
      name: Tipo prompt della scheda di consulenza
      description: Tipo di prompt stampato sulla carta (o assenza di prompt).
    aeration_method:
      name: Metodo di aerazione
      description: Descrive il tipo di aerazione fornita o supportata dalla cassa,
        garantendo un'adeguata ossigenazione per le esche vive.
    aero_package_components:
      name: Componenti del pacchetto Aero
      description: Indica quali componenti aerodinamici chiave sono installati sul
        veicolo (selezionare tutti quelli pertinenti).
    aerodynamic_elements_included:
      name: Elementi aerodinamici inclusi
      description: Specifica quali componenti aerodinamici sono inclusi nella vettura
        di Formula (selezionare tutti quelli applicabili, se supportati).
    aftertouch_support:
      name: Assistenza Aftertouch
      description: Indica se il controller fornisce assistenza aftertouch (canale
        o polifonico) su tasti/pad.
    agave_content_classification:
      name: Classificazione del contenuto dell'Agave
      description: Specifica se la tequila è prodotta al 100% con agave blu Weber
        o se è un mixto che contiene un minimo del 51% di zuccheri di agave.
    aida_cloth_count:
      name: Conteggio del tessuto Aida
      description: Specifica la densità del tessuto Aida (numero di quadrati/punti
        per pollice), che determina la taglia dei punti e la scala del disegno.
    aida_cloth_pre_cut_format:
      name: Tessuto Aida pretagliato
      description: Indica se la tela Aida viene venduta in un pezzo pretagliato, in
        un pezzo continuo tagliato da un rotolo o in un rotolo.
    air_bag_material:
      name: Materiale dell'airbag
      description: Specifica il materiale del sacco/serbatoio d'aria utilizzato con
        la pipa da guerra irlandese.
    air_bed_internal_construction:
      name: Costruzione interna del materasso ad aria
      description: Descrive la struttura interna di assistenza o la tecnologia utilizzata
        all'interno del materasso ad aria per garantire comfort e stabilità.
    air_dry_clay_color_form:
      name: Forma di colore dell'argilla ad asciugatura all'aria
      description: Indica se l'argilla viene venduta precolorata, di colore bianco/neutro
        per la pittura o in assortimento misto.
    air_hockey_items_included:
      name: Articolo sull'air hockey incluso
      description: Elenca gli accessori specifici contenuti in un set, in modo che
        i clienti sappiano esattamente cosa riceveranno (ad esempio, 2 spingitori,
        4 dischi, 2 feltrini).
    air_intake_temperature_sensor_mounting_style:
      name: Stile di montaggio del sensore di temperatura dell'aria aspirata
      description: Modalità di montaggio fisico del sensore IAT nel sistema di aspirazione.
    air_integration_capability:
      name: Integrazione dell'aria
      description: Indica se e come l'assistenza del computer subacqueo utilizza trasmettitori
        wireless di pressione della bombola.
    air_mattress_valve_type:
      name: Tipo di valvola per materasso ad aria
      description: Specifica il tipo di valvola con cui un accessorio si adatta o
        che contiene, garantendo la compatibilità tra pompe, valvole e ricambi.
    air_water_rocket_kit_items_included:
      name: Kit per razzi ad aria e acqua incluso
      description: Componenti chiave inclusi nel set del razzo (lanciatore, pompa,
        alette, parti di ricarica).
    air_water_rocket_launch_method:
      name: Metodo Launch del razzo ad aria e ad acqua
      description: Come viene pressurizzato il razzo/Launch (interazione con l'utente
        e tipologia di attrezzatura).
    airbag_position:
      name: Posizione dell'airbag
      description: Specifica la posizione/zona di ritenuta prevista per la parte airbag
        assistenza.
    aircraft_ads_b_capability:
      name: Capacità ADS-B del velivolo
      description: Specifica se l'aeromobile è dotato di equipaggiamento per la conformità
        all'ADS-B Out.
    aircraft_airframe_material:
      name: Materiale della struttura dell'aereo
      description: Materiale/i principale/i utilizzato/i nella costruzione della cellula
        dell'aeromobile.
    aircraft_cabin_configuration:
      name: Configurazione della cabina dell'aereo
      description: Specifica il layout della cabina dell'aeromobile (ad esempio, gruppo
        conferenze, divano, cabina a quattro zone).
    aircraft_documentation_included:
      name: Documentazione dell'aeromobile inclusa
      description: Indica i documenti forniti con il componente (ad esempio, 8130-3).
    aircraft_galley_configuration:
      name: Configurazione del galley dell'aereo
      description: Presenza e tipologia di angolo cottura/attrezzature per la ristorazione
        in cabina.
    aircraft_installation_location:
      name: Posizione di installazione dell'aeromobile
      description: Punto dell'aeromobile in cui il componente o l'accessorio è installato
        o utilizzato.
    aircraft_internet_connection:
      name: Connessione internet dell'aeromobile
      description: Indica la presenza/il tipo di connettività internet in cabina.
    aircraft_landing_gear_type:
      name: Tipo di carrello di atterraggio dell'aeromobile
      description: Specifica la configurazione del carrello di atterraggio dell'autogiro.
    aircraft_lavatory_configuration:
      name: Configurazione della toilette dell'aereo
      description: Tipologia di configurazione della toilette di bordo.
    aircraft_maintenance_program_enrollment:
      name: Iscrizione al programma di manutenzione degli aeromobili
      description: Indica se l'aeromobile è iscritto a un programma di manutenzione
        del motore e/o della cellula e, in tal caso, quale tipo di copertura si applica
        (motore, cellula o entrambi).
    aircraft_operational_certification:
      name: Certificazione operativa degli aeromobili
      description: Specifica la base di certificazione normativa o operativa in base
        alla quale l'aeromobile viene utilizzato (dipendente dalla giurisdizione,
        ad esempio FAA Parte 91/135/121, EASA AOC).
    aircraft_protective_gear_certification:
      name: Certificazione dei dispositivi di protezione per aeromobili
      description: Specifica lo standard aeronautico/normativo o di settore per il
        quale l'equipaggiamento di protezione è certificato.
    aircraft_system_application:
      name: Applicazione per sistemi aeronautici
      description: Identifica il sistema o l'area dell'aeromobile a cui appartiene
        il componente/accessorio (utilizzato per la navigazione e il filtraggio tra
        diversi componenti dell'aeromobile).
    airflow_resistance_level:
      name: Livello di resistenza al flusso d'aria
      description: Indica quanto restrittiva risulti la sordina in termini di contropressione/resistenza
        all'aria.
    airship_envelope_material:
      name: materiale di rivestimento del dirigibile
      description: Materiale principale dell'involucro (rivestimento) del dirigibile.
    airsoft_part_type:
      name: Tipo di parte Airsoft
      description: Identifica il componente funzionale o il tipo di accessorio per
        le pistole softair (ad esempio, caricatore, canna, paramano).
    airworthiness_approval_basis:
      name: base di approvazione dell'aeronavigabilità
      description: Specifica la base di approvazione/certificazione per la parte,
        ove applicabile (ad esempio, PMA, TSO, STC).
    alarm_volume_adjustability:
      name: Regolazione del volume dell'allarme
      description: Indica se e come l'utente può regolare il volume dell'allarme.
    alcohol_ink_finish_effect:
      name: uomo con finitura a inchiostro alcolico
      description: Descrive l'effetto visivo/la finitura prodotta dalla formulazione
        dell'inchiostro a base alcolica (Beyond al semplice colore), come ad esempio
        l'effetto metallico o perlescente.
    alignment_aid_style:
      name: Stile di ausilio per l'allineamento
      description: Descrive il tipo di guide di allineamento stampate o incorporate
        sulla superficie del tappetino (ad esempio, linea retta, indicatori di distanza).
    alternator_cooling_type:
      name: Tipo di raffreddamento dell'alternatore
      description: Descrive il sistema di raffreddamento e ventilazione dell'alternatore.
    alternator_marine_ignition_protection_rating:
      name: Valutazione della protezione dall'accensione marina dell'alternatore
      description: Indica se l'alternatore è protetto contro l'accensione per i vani
        motore marini (ad esempio, conforme a SAE J1171 / ISO 8846).
    alternator_mounting_configuration:
      name: Configurazione di montaggio dell'alternatore
      description: Specifica la configurazione di montaggio fisica utilizzata per
        fissare l'alternatore a una staffa del motore.
    alternator_pulley_type:
      name: Tipo di puleggia dell'alternatore
      description: Specifica il tipo di puleggia/frizione dell'alternatore (oppure
        indica che non è inclusa alcuna puleggia).
    alternator_regulator_type:
      name: Tipo di regolatore dell'alternatore
      description: Indica se il regolatore di tensione è interno all'alternatore o
        esterno e se è controllato dal produttore (centralina/PCM).
    alternator_terminal_connection_type:
      name: Tipo di relazione terminale alternatore
      description: Schema di relazione elettrica primaria per l'uscita dell'alternatore/terminale
        dell'eccitatore per garantire la compatibilità del cablaggio.
    altitude_suitability:
      name: Idoneità all'altitudine
      description: Indica se la palla è progettata per specifiche condizioni di altitudine,
        che influenzano velocità e rimbalzo.
    ambulance_stretcher_mount_type:
      name: Tipo di montaggio per barella ambulanza
      description: Specifica il tipo di sistema di carico/montaggio della barella
        supportato dall'ambulanza.
    american_football_safety_certification:
      name: certificazione di sicurezza nel football americano
      description: Indica le certificazioni o gli standard di sicurezza specifici
        per il football americano che il prodotto soddisfa.
    amplifier_tube_function:
      name: Functions del tubo amplificatore
      description: Specifica il ruolo funzionale della valvola all'interno di un circuito
        di amplificazione per strumenti musicali (ad esempio, preamplificatore o finale
        di potenza).
    analog_synthesizer_cv_gate_i_o:
      name: Sintetizzatore analogico CV/Gate I/O
      description: Indica i tipi di tensione di controllo e di relazione di gate supportati
        per l'integrazione con apparecchiature Modular/analogiche.
    analog_synthesizer_keybed_configuration:
      name: Configurazione della tastiera del sintetizzatore analogico
      description: Descrive se il sintetizzatore include una tastiera integrata e,
        in tal caso, il numero di tasti.
    anchor_configuration:
      name: Configurazione dell'ancora
      description: Indica se il sistema di sospensione utilizza un singolo punto di
        ancoraggio centralizzato o più punti di ancoraggio indipendenti, influenzando
        la varietà degli esercizi e la complessità della configurazione.
    animal_raising_method:
      name: Metodo di allevamento degli animali
      description: Descrive le pratiche di allevamento o di coltivazione utilizzate
        per l'animale da cui proviene.
    animal_species:
      name: Specie animali
      description: Specifica l'animale o la creatura rappresentata dal peluche (ad
        esempio, orso, coniglio, dinosauro).
    animal_trap_jaw_style:
      name: Trappola per animali a ganasce
      description: Configurazione delle ganasce della trappola, Influence sulla forza
        di tenuta e sul benessere degli animali.
    animal_trap_type:
      name: Tipo di trappola per animali
      description: Classifica lo stile/design meccanico della trappola, consentendo
        all'acquirente di individuare rapidamente il metodo di cattura esatto di cui
        ha bisogno o che è consentito dalle normative.
    ankle_collar_style:
      name: stile collo alla caviglia
      description: Descrive lo stile o la costruzione del collo della caviglia di
        una scarpa, come taglio basso, taglio medio, taglio alto, collo a calzino
        o senza lacci, che Influence l'assistenza, la vestibilità e l'estetica.
    ankle_guard_protection_level:
      name: Livello di protezione della cavigliera
      description: Valuta il livello complessivo di protezione Impact offerto dalla
        cavigliera.
    ankle_strap_padding_type:
      name: Cinturino alla caviglia tipo spaziatura interna
      description: Descrive il materiale di imbottitura o l'approccio spaziatura interna
        utilizzato all'interno del cinturino che influisce sul comfort.
    ankle_strap_type:
      name: Tipo di cinturino alla caviglia
      description: Classifica la costruzione o il design del cinturino alla caviglia
        di un attacco da snowboard.
    ant_farm_habitat_medium_type:
      name: Habitat per formicaio di tipo medio
      description: Specifica il mezzo principale di scavo/osservazione fornito o richiesto
        dall'allevamento di formiche.
    ant_farm_kit_contents:
      name: Contenuto del kit per l'allevamento di formiche
      description: Indica quali componenti sono inclusi nel kit per l'allevamento
        di formiche (ad esempio, cassa Habitat , sabbia/gel, campione di formiche,
        strumenti per l'alimentazione).
    ant_farm_lighting_type:
      name: Tipo di illuminazione per formicaio
      description: Specifica il tipo di illuminazione integrata (se presente) utilizzata
        per l'osservazione.
    antenna_fit_type:
      name: Tipo di adattamento antenna
      description: A quale fattore di forma dell'antenna è destinata ad adattarsi
        la sfera dell'antenna.
    anti_caking_agent:
      name: Agente antiagglomerante
      description: Specifica il tipo di agente antiagglomerante aggiunto per prevenire
        la formazione di grumi, un'informazione importante per chi soffre di allergie
        e per la precisione della ricetta.
    anti_g_suit_bladder_material:
      name: Materiale della sacca della tuta anti-G
      description: Materiale utilizzato per la/le camera/e gonfiabile/i interna/e
        della tuta anti-G; elencare tutti i materiali applicabili se ne vengono utilizzati
        più di uno.
    anti_g_suit_connector_type:
      name: Tipo di connettore della tuta anti-G
      description: Specifica lo stile/standard del connettore del tubo flessibile
        per aria/pressione utilizzato per l'interfacciamento con l'aeromobile o il
        regolatore.
    anti_g_suit_inflation_method:
      name: Metodo di gonfiaggio della tuta anti-G
      description: Indica come vengono pressurizzate le camere d'aria della tuta per
        fornire protezione dalle forze G.
    anti_g_suit_size_system:
      name: Sistema taglia tuta anti-G
      description: Standard di misurazione utilizzato per specificare la taglia/vestibilità
        dell'abito.
    anti_reverse_type:
      name: Tipo anti-inversione
      description: Specifica il tipo di meccanismo anti-ritorno fornito, che influenza
        la regolazione del gancio e il gioco all'indietro.
    anti_theft_feature:
      name: Antifurto
      description: Indica se il supporto/la staffa offre sistemi antifurto come elementi
        di fissaggio con blocco o un design antimanomissione.
    antique_gun_ignition_system:
      name: Sistema di accensione per armi antiche
      description: Specifica il sistema di sparo/accensione storico utilizzato dall'arma
        da fuoco antica.
    apple_variety:
      name: Varietà di mele
      description: Specifica la cultivar o varietà di mela (ad esempio, Gala, Fuji,
        Granny Smith), aiutando i clienti a scegliere in base al Taste, alla consistenza
        e all'utilizzo in cucina.
    applique_edge_finish:
      name: Finitura del bordo con applicazione
      description: Descrive la finitura dei bordi, l'aspetto d'impatto e la resistenza
        allo sfilacciamento.
    arbor_type:
      name: Tipo di albero
      description: Classifica i mulinelli in base al design dell'albero della bobina,
        che influisce sulla velocità di recupero del filo, sulla capacità di avvolgimento
        del filo di supporto e sulla memoria del filo stesso.
    archery_accessory_type:
      name: Accessorio per tiro con l'arco
      description: Specifica il tipo di accessorio destinato agli strumenti per il
        tiro con l'arco, in modo che l'acquirente possa filtrare rapidamente i prodotti.
    archery_part_type:
      name: Tipo di componente per tiro con l'arco
      description: Identifica lo specifico componente hardware o la parte di ricambio
        in vendita (ad esempio, riser, flettente, corda dell'arco), consentendo un
        filtraggio preciso senza espandere eccessivamente la struttura delle categorie.
    archery_range_accessory_type:
      name: Tipo di accessorio per campo di tiro con l'arco
      description: Classifica la tipologia specifica di accessorio utilizzato in un
        campo di tiro con l'arco, consentendo all'acquirente di filtrare rapidamente
        l'articolo esatto di cui ha bisogno.
    archery_target_features:
      name: Bersagli per il tiro con l'arco
      description: Elenca caratteristiche specializzate in termini di prestazioni
        o praticità non coperte da altri attributi (ad esempio, schiuma autoriparante,
        maniglia per il trasporto).
    archery_tool_type:
      name: Tipo di strumento per tiro con l'arco
      description: Classifica lo specifico tipo di strumento o equipaggiamento per
        il tiro con l'arco.
    armband_features:
      name: Caratteristiche del bracciale
      description: Elenca le caratteristiche funzionali o visive speciali che migliorano
        il bracciale.
    armguard_style:
      name: Stile parabraccia
      description: Definisce lo stile costruttivo o il fattore di forma del parabraccia,
        fornendo informazioni sulla copertura del design e sull'aspetto tradizionale
        rispetto a quello moderno.
    armor_protection_type:
      name: Tipo di protezione corazzata
      description: Tipo di protezione fornita dal sistema di blindatura del veicolo.
    armrest_adjustability:
      name: Regolazione del bracciolo
      description: Definisce la regolabilità dimensionale e la configurazione dei
        braccioli della sedia (ad esempio, fissi, 2D, 3D, ribaltabili).
    armrest_type:
      name: Tipo di bracciolo
      description: Descrive la presenza e la regolabilità dei braccioli sulla sedia
        (ad esempio, senza braccioli, fissi, regolabili, rimovibili).
    arrow_bolt_point_type:
      name: Tipo di freccia/punta di bullone
      description: Definisce il tipo di punta installata su una freccia o un dardo.
    arrow_component_type:
      name: Tipo di componente freccia
      description: Classifica la parte o l'accessorio specifico per una freccia (inserto,
        avvolgimento, boccola, colla, ecc.) in modo che i clienti possano filtrare
        l'articolo senza bisogno di decine di sottocategorie aggiuntive.
    arrow_containment_level:
      name: Livello di contenimento della freccia
      description: Descrive se il REST contiene completamente, parzialmente o non
        contiene la freccia.
    arrow_fletching_orientation:
      name: Orientamento delle alette della freccia
      description: Specifica l'orientamento dell'ala o dell'offset dell'impennaggio
        (ad esempio, ala sinistra, ala destra, elicoidale) che determina la direzione
        di rotazione della freccia.
    arrow_nock_groove_size:
      name: Dimensione della scanalatura per incavo della freccia
      description: Specifica la classificazione della taglia della scanalatura/gola
        della corda dell'incavo, determinando la compatibilità con diversi diametri
        di corda.
    arrow_nock_type:
      name: Tipo di cocca per freccia
      description: Design/stile dell'incavo della freccia che si interfaccia con la
        corda dell'arco.
    arrow_rest_style:
      name: Stile del REST per freccia
      description: Specifica lo stile/meccanismo funzionale del REST (ad esempio,
        Drop , a lama, a biscotto). Lo stile determina come l'assistenza REST , contiene
        e rilascia la freccia ed è un modo primario in cui l'acquirente differenzia
        i prodotti.
    arrow_shaft_compatibility:
      name: Compatibilità dell'albero Arrow
      description: Indica lo standard dell'asta/boccola della freccia a cui si adatta
        la cocca luminosa (ad esempio, X, H, S, GT).
    art_crafting_tool_tip_style:
      name: Stile di punta per strumenti artistici/Craft
      description: Descrive la Shapes/il profilo della punta di lavoro (ad esempio,
        appuntita o sferica) per indicare il tipo di segni di goffratura che produce.
    art_ink_lightfastness_rating:
      name: Valutazione della resistenza alla luce degli inchiostri artistici
      description: Indica la resistenza dell'inchiostro allo sbiadimento se esposto
        alla luce, generalmente espressa tramite valori standard.
    art_ink_opacity:
      name: opacità dell'inchiostro artistico
      description: Specifica il livello di copertura dell'inchiostro una volta applicato.
    art_security_rating:
      name: Valutazione di sicurezza ART
      description: Specifica la valutazione ART olandese in stelle (da 1 a 5 stelle)
        ricevuta dalla serratura.
    artichoke_cut:
      name: Taglio di carciofo
      description: Indica quale parte o preparazione del carciofo viene offerta (ad
        esempio, intero, cuore, base), in modo che i clienti possano comprendere la
        resa e l'utilizzo culinario previsto.
    artichoke_variety:
      name: Varietà di carciofo
      description: Specifica la cultivar o varietà botanica del carciofo per aiutare
        l'acquirente a distinguere tra taglia, Colors, sapori e usi culinari.
    articulation_features:
      name: Caratteristiche di articolazione
      description: Indica se il modello del dinosauro ha parti mobili (mandibola,
        arti, coda snodabili) e una posabilità generale.
    artificial_bait_form:
      name: Forma di esca artificiale
      description: Indica la forma fisica o lo stile di presentazione dell'esca o
        dell'artificiale da pesca.
    asa_mounting_type:
      name: Tipo di montaggio ASA
      description: Indica il tipo di interfaccia dell'adattatore per la fonte d'aria
        (ASA) o lo standard di montaggio utilizzato dal Drop forward (ad esempio,
        a coda di rondine, su guida, a montaggio diretto).
    ascender_descender_type:
      name: Tipo di salita/discesa
      description: Classifica lo stile di arrampicata (discendente o discendente)
        per un filtraggio più preciso.
    aspiration_type:
      name: Tipo di aspirazione
      description: Indica come viene aspirato il motore/Boost.
    assembly_state:
      name: Stato di assemblaggio
      description: Indica se il mobile viene spedito da assemblare, già assemblato
        o in un'altra configurazione.
    assistance_mechanism:
      name: Meccanismo di assistenza
      description: Specifica qualsiasi sistema di assistenza o resistenza integrato
        che la power tower offre per trazioni, dip o altri esercizi.
    atemoya_cultivar:
      name: Cultivar di Atemoya
      description: Specifica la cultivar/varietà del frutto di atemoya, consentendo
        all'acquirente di scegliere frutti con le caratteristiche di sapore, dimensione
        o seme che preferisce.
    athletic_cup_size:
      name: Taglia della coppa atletica
      description: Indica la taglia della conchiglia protettiva indicata dal produttore
        per garantire una vestibilità adeguata all'atleta.
    attachment_position:
      name: Posizione di fissaggio
      description: Specifica il punto della sella o del cavaliere in cui la borsa
        deve essere fissata.
    attractant_scent_profile:
      name: Profilo olfattivo attraente
      description: Descrive l'odore o il sapore specifico utilizzato per attirare
        la fauna selvatica o mascherare l'odore umano.
    atv_utv_intended_use:
      name: Uso previsto per ATV/UTV
      description: Uso principale previsto/tipologia del quad/UTV.
    audio_channel_configuration:
      name: Configurazione del canale audio
      description: Il numero di canali audio discreti dell'equalizzatore/assistenza
        DSP (ad esempio, stereo a 2 canali, 4 canali anteriore/posteriore, 6 canali).
    audio_inputs:
      name: Ingressi audio
      description: Specifica i tipi di connessioni di ingresso audio disponibili per
        il campionamento/la registrazione (ad esempio, ingresso linea da 1/4", XLR,
        3,5 mm, preamplificatore microfonico, phono).
    audio_output:
      name: Uscita audio
      description: Indica se il giocattolo emette suoni e in che modo l'audio viene
        riprodotto.
    audio_outputs:
      name: Uscite audio
      description: Specifica le connessioni di uscita audio disponibili, comprese
        le uscite principali e le eventuali uscite assegnabili/ausiliarie.
    audio_playback_source:
      name: Sorgente di riproduzione audio
      description: Contenuti primari fonti multimediali il set karaoke può riprodurre
        musica da.
    autograph_authentication:
      name: Autenticazione dell'autografo
      description: Indica lo stato/tipo di autenticazione di un autografo sulla carta.
    autograph_format:
      name: Formato autografo
      description: Descrive se la firma è un autografo originale scritto a mano, una
        riproduzione stampata/timbrata o un'iscrizione/componente aggiuntivo.
    autogyro_cockpit_enclosure:
      name: Cabina di pilotaggio dell'autogiro
      description: Specifica se la cabina di pilotaggio è aperta o chiusa.
    available_firing_modes:
      name: Mode di fuoco disponibili
      description: Elenca la Mode di sparo selezionabile dell'assistenza del marcatore
        fuori dalla scatola.
    avocado_variety:
      name: Varietà di avocado
      description: Specifica la cultivar o varietà dell'avocado, aiutando l'acquirente
        a distinguere tra le differenze di gusto, consistenza, dimensione e contenuto
        di olio.
    award_customization_included:
      name: Personalizzazione premio inclusa
      description: Indica quale personalizzazione/personalizzazione è inclusa con
        l'acquisto del premio.
    award_material:
      name: Materiale del premio
      description: Identifica il/i materiale/i principale/i dell'oggetto premiato
        (trofeo, targa, medaglia, spilla, hardware).
    award_mounting_display_type:
      name: Tipo di montaggio/esposizione del premio
      description: Specifica come il premio deve essere esposto o montato (a parete,
        su un tavolo o indossabile).
    award_plaque_plate_material:
      name: Materiale per targhe premio
      description: Specifica il materiale della targhetta/placca incisa fissata alla
        placca (distinto dal materiale di supporto).
    award_ribbon_attachment_type:
      name: Tipo di attacco del nastro premio
      description: Specifica come il nastro deve essere attaccato o indossato.
    award_ribbon_imprint_method:
      name: Metodo di imprinting del nastro premio
      description: Specifica come vengono applicati testo e grafica alla barra multifunzione.
    award_ribbon_material:
      name: Materiale per nastri premio
      description: Materiale principale del tessuto del nastro (ad esempio, raso,
        poliestere).
    award_ribbon_placement_title:
      name: Posizionamento/titolo del nastro premio
      description: La posizione o il titolo standard conferito dal nastro (ad esempio,
        1° posto, partecipante).
    axle_compatibility:
      name: Compatibilità dell'asse
      description: Indica lo standard dell'asse che la ruota può ospitare, garantendo
        la compatibilità con il Frame e la forcella della bicicletta.
    back_beam_type:
      name: Tipo di trave posteriore
      description: Tipo/regolabilità della trave posteriore (ad esempio, fissa o regolabile
        in altezza).
    back_design:
      name: Design posteriore
      description: Specifica le principali caratteristiche costruttive della parte
        posteriore dei capi che influiscono sullo stile e sulla vestibilità.
    back_panel_type:
      name: Tipo di pannello posteriore
      description: Specifica lo stile o il materiale del pannello posteriore del mobile,
        che influisce sulla visibilità degli elementi esposti e sull'abbinamento con
        l'arredamento.
    back_sides_material:
      name: Materiale per retro e lati
      description: Specifica il materiale utilizzato per il fondo e le fasce della
        cassa armonica della chitarra classica.
    backing_type:
      name: Tipo di supporto
      description: Descrive il tipo di supporto/attacco dell'elemento in strass in
        vendita (per i prodotti autoadesivi).
    backup_camera_mounting_location:
      name: sede di montaggio della telecamera di retromarcia
      description: Indica la posizione di installazione prevista sul veicolo per la
        telecamera backup.
    backup_camera_video_interface:
      name: Interfaccia video della telecamera backup
      description: Specifica l'uscita/interfaccia/connettore video utilizzato dalla
        telecamera backup per connettersi a un monitor, un DVR o un'unità principale
        (ad esempio, RCA composito, LVDS OEM, IP su Ethernet).
    badminton_set_components_included:
      name: Componenti del set da badminton inclusi
      description: Elenca i singoli articoli Supply in un set da badminton.
    bag_attachment_method:
      name: Metodo di fissaggio della borsa
      description: Indica il metodo principale utilizzato per fissare la sacca/il
        supporto per l'idratazione ad altri accessori (ad esempio, fettuccia MOLLE,
        passante per cintura, moschettone).
    bag_case_carrying_style:
      name: Stile di trasporto a borsa/cassa
      description: Specifica la forma principale di trasporto complessiva della custodia/borsa
        (come è progettata per essere trasportata).
    bag_cover_material:
      name: Materiale della copertura della borsa
      description: Specifica il materiale del rivestimento esterno della borsa, che
        Impact durata, presa e aspetto.
    bag_embellishment:
      name: Decorazione per borsa
      description: Descrive gli elementi decorativi più evidenti applicati all'esterno
        della borsa, come nappe, borchie o trapuntature.
    bag_fill_medium:
      name: Riempimento sacco medio
      description: Identifica la sostanza utilizzata per riempire o pressurizzare
        il sacco (ad esempio, aria, acqua, sabbia).
    bag_material:
      name: Materiale della borsa
      description: Materiale dell'airbag/camera d'aria.
    bag_padding_level:
      name: Livello di imbottitura della borsa
      description: Specifica il grado o lo stile di spaziatura interna incorporata
        nella borsa o nella fodera.
    bag_size_descriptor:
      name: Descrittore della dimensione della borsa
      description: Marketing taglia classe per la borsa a secchiello (es. Shop Mini,
        grande) che integra la dimensione esatta.
    bagel_size:
      name: Bagel taglia
      description: Specifica la taglia generale del bagel, ad esempio Shop Mini, sottile,
        standard, grande, extra large o jumbo.
    bagpipe_accessories_included:
      name: Accessori per cornamusa inclusi
      description: Elenca i principali componenti/accessori inclusi con la cornamusa
        (Beyond le canne principali), ad esempio cassa, chanter per esercitarsi, custodia,
        corde, sistema di controllo dell'umidità.
    bagpipes_playing_mode:
      name: Mode di suonare la cornamusa
      description: Come viene Supply l'aria allo strumento durante l'esecuzione.
    bait_compatibility:
      name: Compatibilità dell'esca
      description: Questo elenco mostra i tipi di esche con cui l'accessorio per pellet
        è progettato per funzionare, aiutando i pescatori a verificare che lo strumento
        scelto sia compatibile con l'esca che preferiscono.
    bait_species:
      name: Specie di esca
      description: Identifica l'organismo principale utilizzato come esca, aiutando
        i pescatori a verificare la legalità dell'attività e l'efficacia nella cattura
        della specie bersaglio.
    baking_chip_form:
      name: Forma di chip da forno
      description: Descrive le dimensioni fisiche o Shapes delle gocce di cioccolato,
        che Influence il comportamento di fusione e l'aspetto della ricetta.
    balance_board_style:
      name: Stile della tavola di equilibrio
      description: Classifica le tavole da equilibrio in base al loro meccanismo o
        stile di costruzione per indicare come si muovono e il livello di difficoltà
        di allenamento che offrono.
    balance_cushion_accessories_included:
      name: Accessori inclusi per il cuscino da equilibrio
      description: Elenca tutti gli accessori inclusi nella confezione del cuscino,
        consentendo all'acquirente di confrontare il valore del pacchetto.
    balance_type:
      name: Tipo di bilanciamento
      description: Indica lo stato/grado di squilibrio dell'albero di trasmissione
        al momento della vendita (ad esempio, squilibrio di fabbrica, squilibrio ad
        alta velocità, sbilanciato).
    ball_bladder_material:
      name: Materiale della vescica
      description: Identifica il materiale utilizzato per la camera d'aria interna
        del pallone da pallamano, che influenza la fidelizzazione dell'aria dei clienti,
        il rimbalzo e la durata complessiva.
    ball_certification:
      name: Certificazione del pallone
      description: Indica le certificazioni ufficiali di prestazione o l'approvazione
        che la palla ha ottenuto.
    ball_construction:
      name: Costruzione del pallone
      description: Indica il metodo di fabbricazione utilizzato per unire i pannelli
        della palla, che influisce su durata, tocco, assorbimento d'acqua e prezzo.
    ball_core_construction:
      name: Costruzione del nucleo del pallone
      description: Descrive in dettaglio la struttura interna del pallone, Influence
        il rimbalzo e la sensazione al tatto.
    ball_core_type:
      name: Tipo di nucleo del pallone
      description: Indica la struttura interna del pallone, che influisce sul rimbalzo
        e sulla distribuzione del peso.
    ball_cup_game_included_pieces:
      name: Gioco con palla e tazza, pezzi inclusi
      description: Indica quali componenti sono inclusi nella confezione del prodotto
        per un gioco con palla e bicchiere.
    ball_drilling_state:
      name: Stato di foratura del pallone
      description: Indica se nella palla sono presenti dei fori per le dita e, in
        caso affermativo, in che misura.
    ball_holder_type:
      name: Tipo di porta-palle
      description: Identifica lo stile strutturale o il fattore di forma del supporto
        per la sfera.
    ball_pit_ball_surface_finish:
      name: Finitura superficiale della palla da piscina
      description: Descrive la finitura tattile/visiva della superficie della palla,
        che influisce sulla presa, sulla sensazione di gioco e sulla pulizia.
    ball_pit_safety_features:
      name: Caratteristiche di sicurezza della piscina di palline
      description: Caratteristiche di progettazione relative alla sicurezza, specifiche
        per le piscine di palline.
    ball_pump_accessory_type:
      name: Accessorio per pompa a sfera
      description: Definisce il tipo specifico di accessorio per pompe a sfera, consentendo
        ai commercianti di Label manometri, tubi flessibili, lubrificanti e altri
        accessori all'interno di un'unica categoria principale.
    ball_return_mechanism:
      name: Meccanismo di ritorno della sfera
      description: Specifica il tipo di sistema di ritorno della palla integrato nel
        tappetino, se presente.
    ball_return_type:
      name: Tipo di ritorno della palla
      description: Tipo di sistema di recupero/ritorno che fa rimbalzare le palline
        durante il gioco.
    ball_speed_rating:
      name: Valutazione della velocità della palla
      description: Categoria di velocità designata dal produttore che indica la velocità
        di gioco della palla in condizioni standard.
    ball_surface_texture:
      name: Texture della superficie del pallone
      description: Descrive la consistenza esterna o il disegno delle striature delle
        palline, che può influenzare la presa e l'estetica.
    ball_surface_type:
      name: Tipo di superficie del pallone
      description: Descrive la finitura esterna o l'ammortizzazione del pallone per
        indicare la sensazione Impact e la presa.
    ballonet_configuration:
      name: Configurazione del pallone
      description: Tipo/configurazione del sistema di palloncini utilizzato per la
        gestione dell'assetto e della pressione (per dirigibili non rigidi/semirigidi).
    balloon_closure_valve_type:
      name: Tipo di chiusura/valvola a palloncino
      description: Indica come viene sigillato il palloncino dopo il gonfiaggio (ad
        esempio, con un nodo o una valvola autosigillante).
    balloon_kit_finish:
      name: kit di finitura per palloncini
      description: Descrive la finitura superficiale/visiva dei palloncini inclusi
        nel kit.
    balloon_kit_material:
      name: materiale per kit di palloncini
      description: Specifica il materiale principale dei palloncini inclusi nel kit.
    banana_variety:
      name: Varietà di banana
      description: Specifica la cultivar o il tipo di banana offerto.
    banjo_head_type:
      name: Tipo di pelle Banjo
      description: Il tipo/materiale della pelle Banjo Influence la brillantezza,
        il volume e la sensazione al tatto.
    banjo_neck_material:
      name: Materiale del manico del banjo
      description: Il materiale del manico influisce sulla sensazione al tatto, sulla
        stabilità e sul suono.
    banjo_pickup_configuration:
      name: Configurazione Banjo libero
      description: Se il Banjo include un pickup integrato e quale tecnologia di pickup
        utilizza in generale.
    banjo_rim_material:
      name: Materiale per cerchi Banjo
      description: Il materiale del bordo/vaso (il corpo circolare) Influence fortemente
        il suono e il peso.
    banjo_tone_ring_type:
      name: Anello di risonanza tipo Banjo
      description: Specifica il tipo di anello di risonanza Banjo e la famiglia di
        materiali che Shapes il timbro e il volume.
    banjo_tuning_machine_type:
      name: Tipo di accordatore Banjo
      description: Tipo di meccaniche utilizzate sul Banjo.
    banknote_authentication_grading:
      name: Autenticazione/classificazione delle banconote
      description: Servizio di terze parti (se presente) che ha autenticato/classificato
        la banconota.
    banknote_grade:
      name: Grado di banconota
      description: Classificazione standardizzata delle banconote secondo una scala
        di valutazione per collezionisti.
    banknote_holder_type:
      name: Tipo di detentore di banconote
      description: Indica lo Context fisico della banconota (ad esempio, sfusa o in
        custodia gradata).
    banknote_material:
      name: Materiale per banconote
      description: Materiale/substrato primario della banconota.
    banknote_security_features:
      name: Caratteristiche di sicurezza delle banconote
      description: Caratteristiche di sicurezza/design degne di nota presenti sulla
        banconota.
    banknote_serial_number_type:
      name: Tipo di numero di serie della banconota
      description: Indica se il numero di serie è presente e/o possiede particolari
        caratteristiche di collezionismo (non il numero effettivo).
    banner_display_location:
      name: Posizione di visualizzazione del banner
      description: Specifica il Context di posizionamento previsto per il banner (ad
        esempio, porta, muro, sfondo del tavolo).
    banner_hanging_hardware_type:
      name: Tipo di hardware per appendere striscioni
      description: Specifica i principali hardware di fissaggio/appendere integrati
        o inclusi con lo striscione (ad esempio, occhielli, passante per asta, corda).
    banner_message_type:
      name: Tipo di messaggio banner
      description: Indica se il testo/messaggio del banner è prestampato (fisso) o
        vuoto/personalizzabile.
    banner_shape:
      name: Shapes dello striscione
      description: Specifica le Shapes/il taglio complessivi dello striscione per
        i tifosi sportivi.
    banquette_configuration:
      name: Configurazione della panca
      description: Shapes generale o orientamento della panca.
    bar_coating:
      name: Rivestimenti per barre
      description: Indica l'eventuale rivestimento esterno commestibile applicato
        alla barretta.
    bar_pad_style:
      name: Stile paracolpi per manubrio
      description: Stile di design del cuscinetto e della copertura del manubrio.
    bar_texture:
      name: Texture della barra
      description: Descrive la consistenza generale o la masticabilità della barretta.
    barb_type:
      name: Tipo di barbo
      description: Indica se l'amo è dotato di ardiglione e il suo tipo.
    barbell_finish:
      name: Finitura a bilanciere
      description: Dettagli sulla variante/rivestimento superficiale protettivo o
        estetico applicato alla barra e/o ai manicotti, che influisce sulla resistenza
        alla corrosione, sulla sensazione al tatto e sul prezzo.
    barbell_knurling_pattern:
      name: Schema di zigrinatura del bilanciere
      description: Descrive in dettaglio lo stile e l'aggressività della sezione zigrinata
        dell'impugnatura di un bilanciere, comprese le marcature specifiche per il
        powerlifting o il sollevamento pesi.
    barista_suitability:
      name: Idoneità al ruolo di barista
      description: Descrive se il prodotto è formulato per la preparazione e la schiumatura
        del caffè.
    barre_rail_configuration:
      name: Configurazione della barra
      description: Indica il numero di barre orizzontali Supply con la sbarra da balletto.
    barrel_or_cask_type:
      name: Tipo di botte o barile
      description: Specifica il tipo di botte o contenitore utilizzato per l'invecchiamento
        o la finitura della tequila (ad esempio, rovere americano, ex-bourbon, botte
        di sherry).
    barrel_profile:
      name: Profilo della canna
      description: Descrive la Shapes generale o il bilanciamento del corpo della
        freccetta.
    barrel_thread_standard:
      name: thread standard del barilotto
      description: Identifica la filettatura della canna utilizzata sul marcatore
        per la compatibilità con canne aftermarket.
    base_anchoring_method:
      name: Metodo di ancoraggio di base
      description: Indica come la base è fissata al terreno, specificandone l'idoneità
        a diverse superfici e condizioni di gioco.
    base_ballast_method:
      name: Metodo di zavorra di base
      description: Indica come (o se) la base dell'attrezzo di allenamento è zavorrata
        per garantirne la stabilità (ad esempio, con acqua o sabbia).
    base_configuration:
      name: Configurazione della base
      description: Indica la configurazione strutturale della base del pannello.
    base_fill_material:
      name: Materiale di riempimento di base
      description: Specifica la sostanza utilizzata per riempire o appesantire la
        base del manichino da basket, influenzandone la stabilità e lo sforzo di configurazione.
    base_ingredient:
      name: Ingrediente base
      description: Identifica l'ingrediente agricolo principale da cui viene distillato
        lo shochu o il soju.
    base_oil_type:
      name: tipo di olio base
      description: Specifica la formulazione dell'olio base del fluido di trasmissione
        (ad esempio, completamente sintetico, miscela sintetica o convenzionale).
    base_storage_type:
      name: Tipo di vano di archiviazione della base
      description: Specifica se la base fornisce un vano di archiviazione integrato
        e il meccanismo utilizzato.
    baseball_glove_type:
      name: Guanto da baseball tipo
      description: Classifica il guanto o il guantone in base alla posizione del giocatore
        o alla funzione.
    baseball_softball_league_certification:
      name: Certificazione per leghe di baseball e softball
      description: Specifica gli standard dell'ente governativo o della lega a cui
        il prodotto è soggetto.
    baseball_softball_usage_role:
      name: ruolo di utilizzo nel baseball/softball
      description: Specifica il ruolo in campo o il tipo di partecipante per cui è
        destinata la protezione per la gamba (ad esempio, ricevitore, battitore, arbitro,
        giocatore di difesa).
    baseball_toy_set_components_included:
      name: Componenti del set giocattolo da baseball inclusi
      description: Specifica quali componenti del gioco del baseball sono inclusi
        nel prodotto (ad esempio, mazza, palla, supporto, basi).
    baseplate_construction:
      name: Costruzione della piastra di base
      description: Indica il metodo di fabbricazione della piastra di base del camion,
        che Influence resistenza e peso.
    basketball_hoop_accessory_type:
      name: Tipo di accessorio per canestro da basket
      description: Classifica le specifiche tipologie di componenti o accessori per
        canestri da basket, consentendo il filtraggio e il confronto.
    basketball_padding_location:
      name: Basket spaziatura interna sede
      description: Identifica la parte del sistema di gioco del basket che il cuscinetto
        è destinato a coprire.
    basketball_rim_type:
      name: Tipo di canestro da basket
      description: Specifica lo stile strutturale o prestazionale del canestro da
        basket in modo che l'acquirente possa scegliere il modello più adatto al proprio
        livello di gioco e alle proprie esigenze di installazione.
    basketball_toy_features:
      name: Caratteristiche del giocattolo da basket
      description: Highlight le caratteristiche di gioco/funzionali più importanti
        dei giocattoli da basket Beyond Basic Shopify dimensione.
    bass_clarinet_body_material:
      name: Materiale per il corpo del clarinetto basso
      description: Materiale principale del corpo del clarinetto basso (esclusi meccanismi,
        supporti e altri hardware metallici).
    bass_clarinet_lowest_written_note:
      name: clarinetto basso nota scritta più bassa
      description: La nota più bassa che il clarinetto basso può suonare (spesso descritta
        dai musicisti come Mi♭ basso, Re basso, Do basso o Si basso in estensione).
    bass_drum_beater_head_shape:
      name: Shapesdella pelle battente della grancassa
      description: Descrive le Shapes geometriche/il profilo della superficie di battuta
        della pelle del battente della grancassa (la faccia che entra in contatto
        con la pelle del tamburo).
    bass_drum_beater_shaft_material:
      name: materiale dell'asta del battente della grancassa
      description: Specifica il materiale dell'asta/manicotto della frusta (non della
        testa della frusta).
    bass_drum_head_built_in_muffling:
      name: Pelle della grancassa con smorzamento incorporato
      description: Tipo di smorzamento/smorzamento integrato incluso nella progettazione
        della testa.
    bass_drum_head_configuration:
      name: configurazione della pelle del tamburo della grancassa
      description: Descrive quali pelli sono incluse/installate sulla grancassa al
        momento dell'acquisto.
    bass_drum_head_surface_finish:
      name: finitura superficiale della pelle della grancassa
      description: Texture/finitura della superficie della pelle della grancassa.
    bass_drum_head_type:
      name: tipo di pelle per grancassa
      description: Tipo di design o costruzione speciale della pelle della grancassa.
    bass_drum_hoop_material:
      name: materiale per cerchi di grancassa
      description: Identifica il materiale dei cerchi della grancassa (controcerchi),
        che influisce su durata, estetica e peso.
    bass_drum_mounting_style:
      name: stile di montaggio della grancassa
      description: Indica come è progettato il supporto/l'utilizzo della grancassa
        (supporti kit , culla/supporto, carrello da marcia, ecc.).
    bass_harmonica_comb_material:
      name: Materiale del pettine dell'armonica bassa
      description: Materiale del pettine/corpo (blocco della camera d'aria) dell'armonica
        basso.
    bass_harmonica_mouthpiece_style:
      name: Bocchino per armonica basso
      description: Indica la configurazione del bocchino dell'armonica basso.
    bass_harmonica_reed_material:
      name: materiale per ance per armonica a bocca basso
      description: Materiale delle ance utilizzate nell'armonica a bocca basso.
    bass_harmonica_tuning_system:
      name: sistema di accordatura per armonica basso
      description: Specifica il sistema di accordatura/temperamento utilizzato per
        l'armonica basso.
    bass_recorder_bocal_type:
      name: flauto dolce basso tipo bocal
      description: Specifica il tipo di bocchino/condotto dell'aria utilizzato per
        raggiungere il bocchino di un flauto dolce basso.
    bass_recorder_included_accessories:
      name: Flauto basso con accessori inclusi
      description: Elenco degli accessori inclusi nella confezione del flauto dolce
        basso.
    bass_recorder_keywork_material:
      name: materiale sulla tastiera del flauto dolce basso
      description: Specifica il materiale della meccanica della tastiera del registratore
        (se presente).
    bass_trombone_slide_material:
      name: Materiale per coulisse del trombone basso
      description: Specifica il materiale/rivestimento principale dei tubi esterni
        della coulisse (e/o del gruppo coulisse) per il trombone basso.
    bass_trombone_valve_wrap_style:
      name: Stile di avvolgimento delle valvole del trombone basso
      description: Specifica il design dell'avvolgimento della valvola utilizzato
        sullo strumento.
    bass_ukulele_string_type:
      name: Ukulele basso tipo a stringa
      description: Indica il tipo generale di corda utilizzata sull'ukulele basso.
    bassinet_cradle_accessory_features:
      name: Funzionalità degli accessori per culle e culle portatili
      description: Highlight le caratteristiche funzionali o le qualità più rilevanti
        degli accessori per culle e lettini (ad esempio, impermeabili, certificati
        biologici, ipoallergenici).
    bassoon_bell_material:
      name: Materiale per campana di fagotto
      description: Specifica il materiale della campana del fagotto.
    bassoon_bocal_system:
      name: Sistema di bocchino per fagotto
      description: La variante/tipologia del bocchino utilizzata per i diversi sistemi
        di fagotto e l'uso della cassa.
    bassoon_case_shell_type:
      name: Tipo di conchiglia per fagotto cassa
      description: Indica la struttura di protezione della cassa (morbida, dura o
        ibrida).
    bassoon_keywork_material:
      name: Materiale della meccanica del fagotto
      description: Materiale e/o placcatura utilizzati per la meccanica del fagotto
        (tasti e hardware meccanici).
    bassoon_model_level:
      name: Livello del modello di fagotto
      description: Indica il livello di esecuzione previsto per il fagotto.
    bassoon_performance_level:
      name: Livello di esecuzione del fagotto
      description: Indica il livello del suonatore previsto per il modello di fagotto.
    bassoon_reed_scrape_style:
      name: Stile raschiato dell'ancia del fagotto
      description: Indica il tipo di raschiatura/profilo dell'ancia del fagotto.
    bassoon_reed_thread_color:
      name: Ancia per fagotto, thread colorato
      description: colore del thread di legatura utilizzato sull'ancia.
    bassoon_reed_type:
      name: Ancia tipo fagotto
      description: Specifica il sottotipo di ancia per fagotto a cui il prodotto è
        adatto (ove applicabile).
    bassoon_system:
      name: Sistema Fagotto
      description: Identifica il sistema di chiavi/la tradizione progettuale del fagotto
        utilizzata per questo strumento.
    bat_construction:
      name: Costruzione della mazza
      description: Indica da quanti pezzi distinti o sezioni unite è composto il corpo
        della mazza (ad esempio, monoblocco, in due pezzi, ibrida), influenzando la
        flessibilità, il controllo delle vibrazioni e le prestazioni complessive.
    bat_handle_size_compatibility:
      name: Compatibilità handle impugnature di mazze
      description: Indica la/le taglia/e handle della mazza da cricket per cui l'impugnatura
        è progettata per adattarsi.
    bath_book_interactive_features:
      name: libro da bagno con funzionalità interattive
      description: Il libro da bagno integra elementi di gioco e apprendimento.
    bath_bubble_machine_features:
      name: Caratteristiche della macchina per bolle da bagno
      description: Caratteristiche funzionali principali della macchina per bolle
        da bagno Beyond la produzione di bolle Basic Shopify .
    bath_crayon_features:
      name: Caratteristiche del pastello da bagno
      description: Principali caratteristiche funzionali e di sicurezza dei pastelli
        da bagno.
    bath_squirter_spray_pattern:
      name: modello di spruzzo del doccino da bagno
      description: Descrive il modo in cui lo spruzzatore da bagno eroga l'acqua (il
        modello di erogazione) quando viene premuto o azionato.
    bath_toy_molded_drain_design:
      name: Giocattolo da bagno con design di scarico sagomato
      description: Indica se il giocattolo è progettato per drenare/asciugare per
        ridurre l'acqua fidelizzazione dei clienti.
    bath_toy_water_play_function:
      name: Giocattolo da bagno per giochi d'acqua Functions
      description: Identifica il principale meccanismo di interazione/gioco con l'acqua
        del giocattolo.
    baton_size_standard:
      name: Baton taglia standard
      description: Classificazione delle taglie da competizione per la staffetta (junior
        o senior).
    battery_case_certification_standard:
      name: Certificazione/standard della batteria Cassa
      description: Elenca le certificazioni di trasporto/sicurezza o gli standard
        di prova pertinenti a cui la cassa si conforma per il trasporto/stoccaggio
        delle batterie.
    battery_case_interior_padding_material:
      name: Batteria cassa interna spaziatura interna materiale
      description: Specifica il materiale principale di imbottitura/rivestimento utilizzato
        all'interno della cassa (se applicabile).
    battery_configuration:
      name: Configurazione della batteria
      description: Indica la layout/Shapes fisica dell'involucro (fattore di forma)
        in modo che gli utenti possano adattare la batteria allo spazio limitato del
        vano in specifiche repliche Airsoft.
    battery_group_size:
      name: Batteria Manuale taglia
      description: Batteria standardizzata cassa taglia (ad es. BCI gruppo 24F, H6)
        utilizzata per il montaggio in molti veicoli.
    battery_polarity:
      name: Polarità della batteria
      description: Specifica la polarità/orientamento del terminale (posizione del
        terminale positivo), che rappresenta un vincolo fondamentale per il montaggio
        di molte batterie per autoveicoli e veicoli sportivi.
    battery_standards_supported:
      name: Standard delle batterie supportati
      description: Specifica gli standard di valutazione della batteria che il tester
        assiste durante il test delle prestazioni di avviamento o dello stato di salute.
    battery_voltage_class:
      name: Classe di tensione della batteria
      description: Classe di tensione comune per il rivestimento delle batterie dei
        veicoli elettrici, utilizzata per un filtraggio rapido (ad esempio, sistemi
        a 400 V rispetto a sistemi a 800 V).
    batting_cage_components_included:
      name: Componenti della gabbia di battuta inclusi
      description: Elenca le parti fisiche fornite con il prodotto in modo che l'acquirente
        possa verificare se è incluso un sistema completo o parti di ricambio specifiche.
    batting_helmet_accessories_included:
      name: Accessori per casco da battitore inclusi
      description: Elenca gli accessori protettivi o estetici inclusi nel pacchetto
        del casco da battitore.
    batting_stuffing_form_factor:
      name: Fattore di forma dell'imbottitura e del ripieno
      description: Indica se il prodotto viene venduto come imbottitura sfusa, fogli,
        rotoli, pezzi pretagliati o forme sagomate.
    batting_stuffing_loft_level:
      name: Imbottitura e Loft Livello soppalco
      description: Indica la Loft dell'imbottitura (sofficità/altezza relativa), tipicamente
        utilizzata per la trapuntura e la selezione della spaziatura interna.
    batting_stuffing_thermal_insulation_level:
      name: Livello di isolamento termico dell'imbottitura
      description: Prestazioni relative di isolamento termico/calore dell'imbottitura
        utilizzata in trapunte, giacche e coperte.
    batting_tee_base_design:
      name: Design della base del supporto per battuta
      description: Descrive lo stile o la costruzione della base del tee, che Influence
        la stabilità e i tipi di superfici di gioco per cui è adatto.
    battle_top_arena_stadium_compatibility:
      name: Compatibilità tra arena e stadio di Battle Top
      description: Indica con quale sistema di arena/stadio è progettato per essere
        utilizzato il prodotto (in particolare per set o Shapes di arena speciali).
    battle_top_items_included:
      name: Articolo di punta della battaglia incluso
      description: Specifica quali articoli della trottola da battaglia sono inclusi
        nella confezione (ad esempio, trottola, lanciatore, stadio/arena, corda di
        lancio, pezzi di ricambio).
    battle_top_performance_type:
      name: Tipo di prestazione di alto livello da battaglia
      description: Descrive lo stile di prestazione generale della trottola, che in
        genere riflette il suo comportamento nell'arena (aggressivo o incentrato sulla
        resistenza, ecc.).
    bayan_included_accessories:
      name: Bayan include accessori
      description: Accessori inclusi con il bayan (nella scatola).
    bayan_tuning_system_type:
      name: Tipo di sistema di sintonizzazione Bayan
      description: Come viene tensionato/accordato il bayan (stile di costruzione),
        Impact , portabilità e facilità di accordatura.
    bb_gun_action_type:
      name: tipo di azione pistola ad aria compressa
      description: Indica il meccanismo Charge o di funzionamento meccanico della
        pistola ad aria compressa (ad esempio, a leva, a pompa, a canna basculante).
    bb_gun_caliber:
      name: calibro pistola ad aria compressa
      description: Definisce il diametro dei pallini che la pistola è progettata per
        sparare, garantendo la compatibilità delle munizioni.
    bb_gun_part_type:
      name: tipo di parte per pistola ad aria compressa
      description: Classifica il componente o l'accessorio specifico progettato per
        le pistole a pallini, consentendo all'acquirente di individuare rapidamente
        il ricambio esatto, effettuare l'upgrade o il componente aggiuntivo (ad esempio,
        canna, guarnizione del pistone, caricatore rapido).
    beach_ball_features:
      name: Caratteristiche del pallone da spiaggia
      description: Caratteristiche funzionali degne di nota, specifiche dei palloni
        da spiaggia.
    beach_bucket_features:
      name: Funzionalità del secchiello da spiaggia
      description: Caratteristiche funzionali del secchiello da spiaggia che ne influenzano
        l'utilizzo, la durata e la praticità.
    beach_sand_toy_items_included:
      name: Articolo per giochi da spiaggia e da sabbia incluso
      description: Ulteriori accessori per giocare in spiaggia/sabbia inclusi nel
        secchiello (se venduto in set).
    bead_breaker_type:
      name: tipo rompi-perline
      description: Tipo/design del meccanismo rompi-palline.
    bead_hole_style:
      name: stile foro per perline
      description: Specifica lo stile o la configurazione del foro/fessura nella perlina,
        che influisce sul modo in cui si posiziona sull'amo o sulla lenza.
    bead_type:
      name: Tipo di perlina
      description: Tipologia/e di perline principali richieste dal modello.
    bead_type_patch_embellishment:
      name: Tipo di perline (decorazione a toppa)
      description: Tipologia principale di perline utilizzate sulla superficie della
        toppa.
    beaded_accessory_project_type:
      name: Progetto di accessorio con perline
      description: Quale accessorio si può realizzare con questo modello?
    beading_needle_flexibility:
      name: Flessibilità dell'ago per perline
      description: Relativa flessibilità del fusto dell'ago per seguire percorsi stretti
        nella lavorazione delle perline.
    beading_pattern_bead_size:
      name: Modello di perline taglia perline
      description: Dimensioni delle perline consigliate, specificate dal modello (generalmente
        dimensioni delle perline, ad esempio 11/0, 8/0).
    beading_pattern_chart_format:
      name: Formato dello schema per la lavorazione delle perline
      description: Come viene rappresentato visivamente il modello (ad esempio, tramite
        un grafico o foto passo passo).
    beading_pattern_stitch_technique:
      name: Motivo di perline punto/tecnica
      description: Punto o tecnica principale di tessitura di perline utilizzata nel
        modello.
    beading_technique_stitch:
      name: Tecnica di lavorazione delle perline / punto
      description: Indica la principale tecnica di lavorazione o il punto utilizzato
        nel modello (ad esempio, punto peyote, punto mattone).
    beading_thread_fiber_type:
      name: Tipo di fibra thread per perline
      description: Specifica il sottotipo di fibra/materiale del thread per bordatura
        (più specifico rispetto al generico Materiale) rilevante ai fini delle prestazioni.
    beading_thread_size:
      name: Taglia del filo per perline
      description: Indica l' Label taglia del produttore/settore utilizzata per thread
        per perline (specifico brand/linea), come taglia D o 00.
    beading_thread_use_case:
      name: thread per perline cassa d'uso
      description: Identifica l'utilizzo principale raccomandato per il thread per
        perline, aiutando l'acquirente a scegliere il prodotto giusto per il proprio
        progetto.
    beading_wire_coating_material:
      name: Materiale di rivestimento per filo perline
      description: Specifica il materiale di rivestimento esterno del filo per perline
        (se presente), che influisce sulla sensazione al tatto, sulla durata e sulla
        resistenza alle pieghe.
    beading_wire_strand_count:
      name: Conteggio dei fili del filo per perline
      description: Indica il numero di fili nel filo per perline multifilare (ad esempio,
        7 fili, 19 fili, 49 fili), che influisce sulla flessibilità e sulla caduta.
    beadlock_type:
      name: Tipo Beadlock
      description: Indica se la ruota è beadlock e di che tipo (utile per gli acquirenti
        di fuoristrada/UTV).
    beam_material:
      name: Materiale della trave
      description: Materiale principale della trave/asta (spesso diverso da quello
        delle teste/attacchi).
    beam_pattern:
      name: Schema di trave
      description: Schema di distribuzione del flusso luminoso utilizzato per l'illuminazione
        di guida/fuoristrada.
    bean_bag_fabric_material:
      name: Tessuto per pouf
      description: Identifica il tessuto esterno utilizzato per i pouf. Supply con
        il set.
    bean_paste_variety:
      name: Varietà di pasta di fagioli
      description: Classifica le specifiche tipologie di pasta di fagioli in base
        al metodo di produzione o all'ingrediente principale.
    bean_preparation:
      name: Preparazione dei fagioli
      description: Indica come i fagioli vengono preparati o lavorati prima della
        vendita (ad esempio, baccelli interi, sgusciati, tritati, germogliati).
    bean_variety:
      name: Varietà di fagiolo
      description: Specifica la varietà botanica o commerciale dei fagioli (ad esempio,
        fagiolini verdi, edamame, fagiolini lunghi un metro).
    beanie_style:
      name: Stile berretto
      description: Specifica il design generale, la costruzione o la silhouette del
        berretto in modo che l'acquirente possa scegliere rapidamente tra le varianti
        più comuni.
    bearing_clearance:
      name: Liquidazione del cuscinetto
      description: Indica la classe di liquidazione radiale interna del cuscinetto
        (quantità di gioco interno); la classe C0 è anche detta CN o liquidazione
        normale.
    bearing_construction_type:
      name: Tipo di costruzione del cuscinetto
      description: Identifica il tipo di cuscinetto o lo stile costruttivo utilizzato
        nel mozzo (ad esempio, a cartuccia, a sfere libere).
    bearing_edge_type:
      name: Tipo di bordo di appoggio
      description: Tipo/profilo del bordo di appoggio del proiettile, che Influence
        l'attacco e la tenuta.
    bearing_lubrication:
      name: Lubrificazione dei cuscinetti
      description: Indica il tipo di lubrificante applicato al cuscinetto durante
        la produzione, ad esempio grasso o olio.
    bearing_material:
      name: Materiale del cuscinetto
      description: Identifica il materiale di costruzione del cuscinetto (ad esempio,
        acciaio, ibrido ceramico), aiutando i ciclisti a scegliere tra le opzioni
        che meglio si adattano a durata, costo e prestazioni.
    bearing_rating:
      name: Valutazione del cuscinetto
      description: Specifica la tolleranza del cuscinetto o la classe di prestazione
        utilizzata nei pattini (ad esempio, ABEC 7, ILQ 9, Swiss).
    bearing_seal_code:
      name: Codice di tenuta del cuscinetto
      description: Indica il tipo di tenuta utilizzato sul cuscinetto, che influisce
        sulla durata e sulla resistenza al rotolamento.
    bearing_seal_type:
      name: Tipo di tenuta del cuscinetto
      description: Specifica il tipo di tenuta o di schermatura che protegge le parti
        interne del cuscinetto dai contaminanti e influisce sulla resistenza (ad esempio,
        2RS, ZZ, LLU, aperto).
    bearing_shield_type:
      name: Tipo di scudo del cuscinetto
      description: Tipo di schermatura o sigillatura che protegge le parti interne
        del cuscinetto.
    bearing_size_code:
      name: Codice taglia cuscinetto
      description: Designazione standardizzata dei cuscinetti (ad esempio, 608, 688)
        che Combine diametro interno, diametro esterno e larghezza.
    bearing_type:
      name: Tipo di cuscinetto
      description: Specifica lo stile costruttivo dei cuscinetti utilizzati nella
        serie sterzo.
    beater_head_material:
      name: Materiale della testa del battitore
      description: Specifica il materiale di contatto/della testa di una bacchetta
        per grancassa (ad esempio, feltro, legno, gomma).
    beaters_included:
      name: Battitori inclusi
      description: Specifica quanti battenti sono inclusi/installati con il pedale
        per batteria (ad esempio, battente singolo o doppio) oppure se non è incluso
        alcun battente.
    bed_base_type:
      name: Tipo di base del letto
      description: Definisce lo stile strutturale della base del letto o del divano
        (ad esempio, piano a piattaforma, a doghe elastiche, regolabile).
    bed_storage_type:
      name: Tipo di vano di archiviazione del letto
      description: Definisce il meccanismo di stoccaggio integrato del Frame del letto.
    bedroom_furniture_items_included:
      name: Articoli di arredamento per camera da letto inclusi
      description: Specifica i pezzi d'arredamento fisici che compongono il set da
        camera da letto (ad esempio, letto, comò, comodini), consentendo all'acquirente
        di vedere rapidamente cosa è incluso senza dover leggere lunghe descrizioni.
    bedroom_vanity_items_included:
      name: Articolo incluso per la toeletta da camera da letto
      description: Elenca la persona fisica articolo Supply con un set da toeletta
        per camera da letto in modo che i Clienti sappiano esattamente cosa viene
        consegnato (ad esempio, specchio, sgabello, kit di illuminazione).
    beer_based_cocktail_variety:
      name: Varietà di cocktail a base di birra
      description: Classifica i cocktail a base di birra in base alla loro specifica
        varietà, ad esempio Radler, Shandy, Michelada.
    beet_variety:
      name: Varietà di barbabietola
      description: Specifica la cultivar o varietà di barbabietola, aiutando l'acquirente
        a identificarne sapore, colore e usi culinari (ad esempio, rosso, dorato,
        Chioggia).
    bell_actuation_mechanism:
      name: Meccanismo di azionamento del campanello
      description: Specifica l'azione richiesta all'utente per suonare il campanello,
        aiutando l'acquirente a scegliere l'ergonomia preferita.
    bell_guard_coverage_area:
      name: area di copertura della guardia campanaria
      description: Indica quale parte della campana la protezione è progettata per
        salvaguardare.
    bell_material:
      name: Materiale del campanello
      description: Materiale della campana (se specificato separatamente dal materiale
        complessivo dello strumento).
    bellhousing_bolt_pattern:
      name: Schema di foratura della campana della frizione
      description: Specifica lo standard o la famiglia di modelli di bulloni per la
        campana della trasmissione/lato motore utilizzati dalla cassa della trasmissione.
    bellows_material:
      name: Materiale del soffietto
      description: Materiale del corpo/rivestimento del mantice (se presente).
    bellows_orientation:
      name: Orientamento del soffietto
      description: Indica la configurazione del soffietto utilizzata per Supply aria
        ai tubi.
    belly_panel_style:
      name: Stile del pannello inferiore
      description: Descrive la struttura della fascia in vita o del pannello addominale
        che si adatta alla crescita della pancia.
    belt_buckle_type:
      name: Tipo di fibbia della cintura
      description: Descrive lo specifico meccanismo o design della fibbia utilizzato
        sulla cintura.
    beret_style:
      name: stile berretto
      description: Identifica lo specifico modello di berretto o la variante culturale.
    berry_species:
      name: Specie di bacche
      description: Indica la specie di bacca contenuta nel prodotto, consentendo all'acquirente
        di filtrare rapidamente la bacca desiderata.
    beta_casein_variant:
      name: variante della beta-caseina
      description: Specifica quale variante della proteina beta-caseina (ad esempio,
        A2) è presente nel latte per i consumatori con problemi di digeribilità.
    beverage_sweetness_level:
      name: Livello di dolcezza della bevanda
      description: Classifica la bevanda in base al grado di dolcezza o zucchero aggiunto.
    bezel_graduation_units:
      name: Unità di graduazione della lunetta
      description: Specifica le unità di misura sulla lunetta girevole (gradi, millesimi
        o doppia scala).
    bicycle_brake_set_components_included:
      name: Componenti del set freni per bicicletta inclusi
      description: Elenca le parti fisiche Supply nel kit in modo che l'acquirente
        sappia esattamente cosa è incluso e possa confrontare diverse configurazioni
        di pacchetto.
    bicycle_cage_mounting_position:
      name: posizione di montaggio del portabici
      description: Specifica il punto della bicicletta in cui è previsto il montaggio
        del portaborraccia.
    bicycle_computer_mount_placement:
      name: Posizionamento supporto computer da bicicletta
      description: Indica la posizione in cui installare il supporto per il ciclocomputer
        sulla bicicletta, ad esempio sulla parte anteriore del manubrio o sul tappo
        superiore dell'attacco manubrio.
    bicycle_folding_mechanism:
      name: meccanismo di piegatura della bicicletta
      description: Specifica il sistema meccanico di piegatura utilizzato sul Frame
        della bicicletta (ad esempio, piegatura a metà, piegatura verticale).
    bicycle_frame_design:
      name: Design Frame della bicicletta
      description: Specifica lo stile generale del Frame di una bicicletta, influenzando
        la portabilità, la capacità di carico e lo spazio di stoccaggio.
    bicycle_frame_style:
      name: Stile Frame della bicicletta
      description: Descrive lo stile strutturale del Frame della bicicletta (step-through,
        lowrider, chopper stretch, ecc.) che influenza la postura del ciclista e l'estetica.
    bicycle_handlebar_type:
      name: Tipo di manubrio per bicicletta
      description: Identifica lo stile o la geometria specifica del manubrio, aiutando
        i ciclisti a scegliere il manubrio più adatto alla loro posizione di guida
        e alla disciplina praticata.
    bicycle_headset_configuration:
      name: Configurazione della serie sterzo per bicicletta
      description: Indica lo stile strutturale o lo standard della serie sterzo della
        bicicletta in base alla disposizione delle calotte (ad esempio, calotta esterna,
        ZeroStack, integrata, filettatura).
    bicycle_hub_type:
      name: Tipo di mozzo per bicicletta
      description: Descrive il meccanismo del mozzo Supply con la ruota, che influisce
        sulla compatibilità della trasmissione e sullo stile di guida.
    bicycle_lock_security_certification:
      name: certificazione di sicurezza per lucchetto per bicicletta
      description: Certificazione indipendente di terze parti che convalida le prestazioni
        antifurto (ad esempio, Sold Secure, ART, Varefakta).
    bicycle_pedal_type:
      name: tipo di pedale per bicicletta
      description: Specifica lo stile di funzionamento o il design generale del pedale,
        come ad esempio la versione a piattaforma, a sgancio rapido o ibrida, aiutando
        i ciclisti a scegliere l'interfaccia più adatta al loro stile di guida.
    bicycle_propulsion_type:
      name: Tipo di propulsione della bicicletta
      description: Specifica il tipo di propulsione della bicicletta, ad esempio tramite
        pedalata manuale, assistenza elettrica o motore a combustione interna.
    bicycle_pump_type:
      name: Tipo di pompa per bicicletta
      description: Identifica lo stile strutturale della pompa, aiutando l'acquirente
        a scegliere il modello più adatto alle proprie esigenze di guida, stoccaggio
        o emergenza.
    bicycle_rack_mounting_type:
      name: Tipo di montaggio per bicicletta
      description: Descrive il metodo principale o la sede utilizzata per fissare
        il portapacchi alla bicicletta, aiutando gli utenti a verificare la compatibilità
        con il Frame e hardware.
    bicycle_suspension_type:
      name: Tipo di sospensione della bicicletta
      description: Identifica la presenza e la configurazione delle sospensioni sulla
        bicicletta.
    bicycle_tire_tread_pattern:
      name: Disegno del battistrada di uno pneumatico da bicicletta
      description: Specifica il tipo di battistrada del pneumatico, Influence la trazione
        e la resistenza al rotolamento su diverse superfici.
    bidirectional_charging_capability:
      name: Capacità Charge bidirezionale
      description: Indica se l'assistenza EV supporta Mode Charge bidirezionale, ad
        esempio V2G e/o V2H.
    bike_rack_mounting_style:
      name: Stile di montaggio del portabiciclette
      description: Come la bicicletta viene sostenuta/fissata dal ripiano.
    bike_rack_tilt_function:
      name: Functionsdi inclinazione del portabici
      description: Quali Functions di inclinazione sono presenti per accedere al vano
        di carico posteriore mentre il rimorchiatore è installato?
    bikini_top_style:
      name: Top bikini
      description: Specifica il design o il taglio della parte superiore del bikini,
        aiutando l'acquirente a trovare la vestibilità e la silhouette preferite.
    billiard_brush_type:
      name: tipo di spazzola da biliardo
      description: Definisce lo specifico tipo di strumento per la pulizia del tavolo
        da biliardo (ad esempio, spazzola per il tavolo, spazzola per le sponde, blocco
        per la pulizia).
    billiard_glove_finger_coverage:
      name: Copertura delle dita del guanto da biliardo
      description: Identifica quali dita sono coperte dal design del guanto, fornendo
        un filtraggio preciso per i modelli di guanti specifici per il biliardo.
    billiard_pocket_style:
      name: Stile della buca da biliardo
      description: Specifica lo stile strutturale o estetico della tasca, che influisce
        sulla compatibilità Impact e sull'arredamento della tavola.
    billiard_rack_style:
      name: Stile biliardo a tavolo
      description: Descrive lo stile fisico o il meccanismo dello scaffale (ad esempio,
        Frame tradizionale, modello a foglio, pieghevole).
    billiard_table_type:
      name: tipo di tavolo da biliardo
      description: Specifica la disciplina sportiva di biliardo o lo stile di utilizzo
        per cui il tavolo è progettato (ad esempio, biliardo all'italiana, snooker,
        carambola).
    billiards_discipline:
      name: Disciplina del biliardo
      description: Indica la specifica variante di sport con la stecca (tipo di gioco)
        per cui il prodotto è destinato o con cui è compatibile.
    binding_compatibility_standard:
      name: Standard di compatibilità vincolante
      description: Identifica l'interfaccia di aggancio (norma della suola) per cui
        lo scarpone da sci è certificato, garantendo un accoppiamento sicuro e corretto
        con gli attacchi da sci.
    binding_inclusion:
      name: Inclusione vincolante
      description: Specifica se gli sci vengono venduti sfusi, con sistema integrato
        o con attacchi separati inclusi.
    binding_interface:
      name: Interfaccia di collegamento
      description: Indica lo standard della piastra di fissaggio o dell'interfaccia
        con cui gli sci sono preassemblati o compatibili, garantendo la compatibilità
        tra scarpone e attacco.
    binding_liner_type:
      name: Tipo di fodera di rilegatura
      description: Descrive il tipo di fodera interna utilizzata nell'attacco/scarpone
        (ad esempio, rimovibile, calpestabile, termoformabile).
    binding_mounting_system:
      name: sistema di montaggio per rilegatura
      description: Identifica l'interfaccia utilizzata per fissare l'attacco allo
        sci (attacco piatto, binario/tracciare, piastra, ecc.).
    binding_position:
      name: Posizione dell'attacco
      description: Indica la posizione o la configurazione di montaggio prevista per
        l'attacco (ad esempio, scarpone anteriore, scarpone posteriore, ARTP).
    binding_strap_position:
      name: Posizione della cinghia di fissaggio
      description: Specifica il punto dell'attacco in cui la cinghia deve essere installata.
    bingo_components_included:
      name: Componenti del bingo inclusi
      description: Elenca i componenti inclusi nella confezione del set da bingo,
        come palline, cartelle e segnalini.
    bingo_number_range:
      name: Intervallo di numeri del Bingo
      description: Identifica l'intervallo/variante di numeri del bingo supportati
        dal set.
    bingo_set_features:
      name: Caratteristiche del set Bingo
      description: Identifica il formato principale del set di bingo (fisico/manuale
        o elettronico/interattivo).
    bipod_mounting_interface:
      name: Interfaccia per montaggio bipiede
      description: Specifica l'interfaccia di fissaggio utilizzata per collegare il
        bipiede all'arma da fuoco o al sistema di binari.
    bit_attachment_type:
      name: Tipo di fissaggio del bit
      description: Specifica come la testiera si collega al morso (ad esempio, estremità
        a legatura, estremità a fibbia, estremità a vite Chicago).
    bit_mouthpiece_design:
      name: Design del bocchino del morso
      description: Identifica lo stile strutturale o la configurazione delle giunture
        del bocchino, che regola la distribuzione della pressione, la liquidazione
        del palato e la severità complessiva.
    bit_ring_style:
      name: Stile anello di morso
      description: Definisce lo stile della guancia o dell'anello del morso che si
        attacca alla briglia, Influence l'azione, la guida laterale e la sensibilità
        delle redini.
    bladder_material:
      name: Materiale della camera d'aria
      description: Identifica il materiale utilizzato per la camera d'aria interna
        che contiene l'aria.
    blade_attachment_type:
      name: Tipo di fissaggio della lama
      description: Indica se il pattino utilizza un meccanismo a cerniera o un attacco
        fisso per la lama.
    blade_finish_coating:
      name: Finitura/rivestimento della lama
      description: Variazione superficiale applicata alla lama per motivi estetici
        o di protezione dalla corrosione.
    blade_hosel_type:
      name: Tipo di tubo della lama
      description: Specifica lo stile di relazione del collo della lama che si innesta
        nell'albero, influenzando la compatibilità (ad esempio, Standard o Conico).
    blade_length_type:
      name: Tipo di lunghezza della lama
      description: Classifica la lunghezza della pala della pinna come corta, media
        o lunga, ognuna delle quali Influence la cadenza della bracciata e gli obiettivi
        di allenamento.
    blade_lie:
      name: Lama bugiarda
      description: Specifica il numero di inclinazione della lama del bastone da hockey,
        indicando come la lama si posiziona sul ghiaccio rispetto all'asta.
    blade_sharpness:
      name: affilatura della lama
      description: Indica se il filo della lama dell'arma è affilato o smussato per
        l'addestramento.
    blade_size_category:
      name: Categoria di dimensioni della lama
      description: Codice internazionale standardizzato delle dimensioni della lama
        per le sciabole (0-5) utilizzato per distinguere le lame dei giovani da quelle
        degli adulti.
    blade_size_class:
      name: Classe di dimensioni della lama
      description: Classifica la lama in base alla convenzione di dimensionamento
        del giocatore, abbinando la taglia dell'asta come Youth, Junior, Intermediate
        o Senior.
    blade_size_number:
      name: Numero di dimensioni della lama
      description: Codice numerico standard per la taglia (0-5) definito dai regolamenti
        di scherma che determina la lunghezza della lama e l'età di ammissibilità.
    blaster_mechanism:
      name: Meccanismo del blaster
      description: Definisce il meccanismo di funzionamento interno del gel blaster
        (ad esempio, GBB, AEG, a molla).
    block_edge_style:
      name: Stile a bordo squadrato
      description: Descrive come vengono rifiniti i bordi/angoli dei blocchi di legno
        per migliorarne la sensazione al tatto e la sicurezza.
    blocking_mat_features:
      name: Funzionalità del tappetino di bloccaggio
      description: Caratteristiche funzionali specifiche dei tappetini da bloccaggio
        (stoccaggio, portabilità, usabilità).
    blocking_mat_grid_unit:
      name: Tappetino di bloccaggio Unità Grid
      description: Il sistema di unità utilizzato sulla Grid stampata, che aiuta gli
        utenti a confrontare modelli e misure.
    blocking_mat_surface_markings:
      name: Marcature di superficie del tappetino di bloccaggio
      description: Tipo di marcature di misurazione/guida stampate o incise sulla
        superficie del tappetino.
    blocking_wire_coating:
      name: Rivestimento del filo di bloccaggio
      description: Variazione/rivestimento superficiale sul filo di bloccaggio che
        influisce sulla resistenza alla ruggine, sulla scorrevolezza e sul rischio
        di impigliamento.
    blocking_wire_end_cap_type:
      name: Tipo di cappuccio terminale per filo di bloccaggio
      description: Specifica il tipo di protezione/finitura terminale utilizzata per
        bloccare le estremità dei fili, a fini di sicurezza e protezione del tessuto.
    blocking_wire_set_includes:
      name: Il set di fili di bloccaggio include
      description: Specifica quali componenti sono inclusi nel prodotto del filo di
        bloccaggio (ad esempio, connettore T-con, tubo di stoccaggio).
    blocking_wire_usage:
      name: Blocco dell'utilizzo dei cavi
      description: Uso primario per cui è progettato il filo di bloccaggio flessibile.
    bloom_stage:
      name: fase di fioritura
      description: Indica il grado di apertura dei fiori di margherita al momento
        della consegna/spedizione.
    blower_motor_bearing_type:
      name: Tipo di cuscinetto del motore del ventilatore
      description: Specifica il tipo di cuscinetto utilizzato nel motore del ventilatore.
    blower_motor_mounting_position:
      name: Posizione di montaggio del motore del ventilatore
      description: Dove è installato il motore del ventilatore nei Modules HVAC/veicolo
        (ad esempio, anteriore, posteriore).
    blowpipe_valve_type:
      name: Tipo di valvola a soffiaggio
      description: Specifica il tipo di valvola del tubo di soffiaggio inclusa (se
        presente).
    bo_staff_style:
      name: Stile Bo Staff
      description: Definisce lo stile strutturale o la costruzione del Staff (ad esempio,
        dritto, affusolato, imbottito in schiuma, pieghevole).
    board_game_theme:
      name: Tema del gioco da tavolo
      description: Tema Narrative/di impostazione del gioco da tavolo (utilizzato
        per la scoperta e la consultazione).
    board_rail_shape:
      name: Shapes delle rotaie
      description: Specifica il profilo dei bordi della tavola (ad esempio, morbidi,
        duri, 50/50) che Influence la tenuta e la spinta su un'onda.
    board_size_classification:
      name: Classificazione per dimensione della tavola
      description: Classifica il set o la tavola da cornhole in taglie standardizzate
        comuni.
    board_type_compatibility:
      name: Compatibilità del tipo di scheda
      description: Specifica il tipo di tavola per cui è progettato il guinzaglio.
    boat_construction_type:
      name: Tipo di costruzione dell'imbarcazione
      description: Descrive lo stile o il formato strutturale della barca a remi (ad
        esempio, gonfiabile, rigida).
    boat_hook_flotation:
      name: galleggiante a gancio per barca
      description: Indica se il gancio per barca è progettato per galleggiare in caso
        Drop in acqua.
    boat_ladder_stowage_style:
      name: stile di stivaggio della scala per barca
      description: Descrive come si presenta la scala del negozio quando non è in
        uso (ad esempio, pieghevole, retrattile, rimovibile).
    boat_trailer_construction_type:
      name: tipo di costruzione del rimorchio per barche
      description: Indica se il rimorchio supporta l'imbarcazione con supporti a rulli,
        rulli o un sistema ibrido.
    boat_weaving_shuttle_weft_exit_type:
      name: Tipo di uscita della trama della navetta per la tessitura di barche
      description: Come il filo di trama esce dalla navetta durante la tessitura.
    bobbin_loading_type:
      name: Tipo di caricamento della bobina
      description: Specifica come la bobina viene inserita/caricata nella macchina
        da cucire.
    bobbin_system:
      name: Sistema a bobina
      description: Il sistema/tipo di caricamento della bobina utilizzato dalla macchina
        da cucire.
    bobbin_type:
      name: Tipo di bobina
      description: Specifica il formato del contenitore per filati che la navetta
        è progettata per utilizzare (o include), il che determina la compatibilità
        e l'uso tipico (ad esempio, le navette per barche spesso utilizzano bobine;
        le navette per stracci possono essere aperte per strisce).
    bobbin_winder_winding_direction:
      name: direzione di avvolgimento dell'avvolgitore della bobina
      description: Specifica la direzione di avvolgimento/rotazione supportata dall'avvolgitore
        della bobina.
    bobble_mechanism:
      name: Meccanismo a molla
      description: Specifica lo stile del meccanismo a pendolo, che Impact sul movimento
        e sulla durata.
    bocal_material:
      name: Materiale del bocal
      description: Specifica il materiale del/dei bocal/i incluso/i.
    bodhr_n_head_material:
      name: Materiale per la testa di Bodhrán
      description: Il materiale della testina di riproduzione (membrana), che influenza
        notevolmente il suono e le esigenze di manutenzione.
    bodhr_n_tuning_system_type:
      name: Tipo di sistema di accordatura del bodhrán
      description: Il tipo di meccanismo di accordatura integrato utilizzato per regolare
        la tensione della pelle (se regolabile).
    body_armor_coverage_area:
      name: Area di copertura del giubbotto antiproiettile
      description: Indica quali zone del corpo il prodotto protegge.
    body_armor_intended_use:
      name: Uso previsto del giubbotto antiproiettile
      description: Specifica lo scenario di guida o di utilizzo principale per cui
        è progettata la protezione per il corpo di ATV/UTV.
    body_cord_connector_style:
      name: Cordino per il corpo
      description: Descrive la configurazione del connettore alle estremità del cavo
        (ad esempio, numero di spinotti o tipo a baionetta) che determina la compatibilità
        con armi e centraline di punteggio.
    body_panel_finish_state:
      name: stato di finitura del pannello della carrozzeria
      description: Descrive lo stato di preparazione/finitura della superficie del
        pannello quarto, così come venduto, per la verniciatura/installazione.
    body_shape:
      name: Shapesdel corpo
      description: Specifica le Shapes/lo stile generale del corpo della chitarra
        elettrica.
    bodysuit_bottom_coverage:
      name: Copertura inferiore del body
      description: Definisce il taglio e la copertura della parte inferiore del body,
        Impact comfort e compatibilità con gli altri indumenti.
    boilie_shape:
      name: Shapesdi boilies
      description: Identifica le Shapes delle boilies prodotte dal tavolo rotante,
        consentendo ai pescatori di scegliere tra diversi profili di esca.
    boilie_stop_buoyancy:
      name: arresto di galleggiamento della boilie
      description: Specifica se il fermo per boilies è progettato per galleggiare,
        affondare o rimanere a galleggiamento neutro, influenzando la presentazione
        dell'esca nella colonna d'acqua.
    bok_choy_variety:
      name: varietà di bok choy
      description: Specifica la cultivar, il nome commerciale o la varietà del bok
        choy (ad esempio, Baby, Shanghai, Nai Bai, Tatsoi, Viola Lady), consentendo
        all'acquirente di selezionare il sapore, il taglio e l'aspetto desiderati.
    bolt_drive_style:
      name: Stile di azionamento a bulloni
      description: Specifica il tipo di azionamento delle viti di montaggio dello
        skateboard, distinguendo tra i tipi di testa/cacciavite più comuni come Allen
        o Phillips.
    bone_content:
      name: Contenuto osseo
      description: Specifica se la carne contiene lische.
    bongo_center_block_material:
      name: Materiale del blocco centrale Bongo
      description: Materiale del blocco centrale che collega i due gusci di bongo
        (se presente).
    bongo_shell_material:
      name: materiale del guscio di bongo
      description: Materiale dei fusti dei bonghi (corpi dei tamburi), escluse le
        pelli e hardware.
    bongo_tuning_system:
      name: Sistema di accordatura Bongo
      description: Come vengono accordati/costruiti i bonghi (ad esempio, accordatura
        tradizionale con tiranti rispetto all'accordatura con corde), Impact manutenzione
        e autenticità.
    boning_type:
      name: Tipo di stecca
      description: Identifica il sistema di supporto strutturale all'interno del corsetto.
        Combina il materiale e lo stile/le Shapes delle stecche utilizzate, che influenzano
        direttamente il livello di supporto, la flessibilità e la durata.
    boot_liner_type:
      name: tipo di rivestimento del bagagliaio
      description: Descrive la costruzione o la capacità di personalizzazione della
        scarpetta interna dello scarpone da snowboard (ad esempio, termoformabile,
        rimovibile).
    boot_sole_compatibility:
      name: Compatibilità della suola dello stivale
      description: Elenca le norme relative alla suola dello scarpone o i sistemi
        di interfaccia accettati dall'attacco.
    boot_support_level:
      name: Livello di assistenza Boot
      description: Descrive il livello generale di rigidità/supporto fornito dal pattino
        alla caviglia o allo scarpone.
    boot_width_code:
      name: Codice larghezza stivale
      description: Designazione della larghezza basata su lettere del produttore,
        utilizzata specificamente nella misurazione dei pattini da figura (ad esempio,
        AAA, AA, B, C, D).
    booth_configuration:
      name: Configurazione della cabina
      description: Identifica la configurazione generale dei posti a sedere della
        cabina (ad esempio, su un solo lato, ad angolo, Modular).
    bootie_toe_design:
      name: Design della punta dello stivaletto
      description: Identifica lo stile di costruzione della punta degli stivaletti
        da surf e degli stivali da barriera corallina.
    border_type:
      name: Tipo di bordo
      description: Finitura/stile del bordo della toppa ricamata (influisce sull'aspetto,
        sulla resistenza allo sfilacciamento e sulla qualità percepita).
    bore_cleaner_format:
      name: Formato pulitore per fori
      description: Indica la forma fisica del prodotto per la pulizia dei fori (utensile
        o materiale di consumo).
    bore_cleaner_safe_for_finish:
      name: Detergente per fori sicuro per la finitura
      description: Indica con quali finiture comuni degli strumenti in ottone il detergente
        per canne può essere utilizzato in sicurezza.
    bottle_cage_loading_direction:
      name: Direzione di carico del portabottiglie
      description: Descrive la direzione da cui la bottiglia viene inserita o rimossa
        dalla gabbia.
    bottle_neck_finish_closure_size:
      name: Finitura del collo della bottiglia / chiusura taglia
      description: La forma standardizzata dell'apertura/finitura della bottiglia
        garantisce la compatibilità con tappi, sugheri e tappatrici (ad esempio, corona
        da 26 mm).
    bottle_style:
      name: Stile della bottiglia
      description: Formati di bottiglia comunemente utilizzati nella produzione casalinga
        di birra e vino.
    bottom_bracket_interface:
      name: Interfaccia del movimento centrale
      description: Identifica lo standard del perno/movimento centrale per cui la
        guarnitura è progettata, garantendo la compatibilità Frame e il movimento
        centrale.
    bottom_bracket_standard:
      name: Movimento centrale standard
      description: La scatola/interfaccia del movimento centrale supportata dal Frame
        determina la compatibilità con la guarnitura.
    bottom_type_suitability:
      name: Idoneità del tipo di fondo
      description: Specifica le condizioni del fondale marino in cui l'ancora è progettata
        per garantire la migliore tenuta.
    bounce_level:
      name: Livello di rimbalzo
      description: Indica quanto rimbalza la palla quando Drop o lanciata, aiutando
        gli utenti a scegliere la palla corretta per esercizi come lanci al muro o
        schiacciate.
    bouncy_ball_surface_finish:
      name: Finitura della superficie della pallina rimbalzante
      description: Specifica la finitura superficiale tattile e/o visiva di una palla
        rimbalzante (ad esempio, liscia, ruvida, con brillantini).
    boundary_marker_type:
      name: Tipo di marcatore di confine
      description: Definisce la forma fisica del marcatore o del prodotto di marcatura
        del confine del campo o del campo da gioco (ad esempio, cono, nastro, vernice,
        stencil, macchina).
    bouquet_size_tier:
      name: Bouquet taglia tier
      description: Taglia standardizzata per il bouquet/mazzo, indipendentemente dal
        numero di steli (utile quando si utilizzano steli misti).
    bow_and_yo_yo_edge_finish:
      name: Finitura del bordo a fiocco e yo-yo
      description: Descrive la finitura del bordo/rifinitura utilizzata sul fiocco/yo-yo
        (specialmente per i fiocchi realizzati con nastro).
    bow_case_shell_type:
      name: Tipo di guscio della cassa per arco
      description: Descrive la costruzione strutturale dell'esterno della cassa ad
        arco (ad esempio, guscio rigido vs cassa morbida).
    bow_compatibility:
      name: Compatibilità dell'arco
      description: Specifica il tipo di arco per cui la punta da caccia è progettata
        o che è in grado di handle.
    bow_hair_color:
      name: colore dei capelli del fiocco
      description: Identifica il colore/aspetto dei crini utilizzati per l'archetto
        di uno strumento a corda orchestrale (ad esempio, bianco/decolorato, bianco
        naturale, nero).
    bow_stick_material:
      name: Materiale dell'archetto
      description: Indica il materiale utilizzato per l'asta dell'arco (l'albero principale),
        che Influence notevolmente il peso, la sensazione al tatto e il prezzo.
    bow_type:
      name: Tipo di arco
      description: Specifica il design strutturale dell'arco per giovani (ad esempio,
        compound, ricurvo, longbow), che Influence fortemente lo stile di tiro, gli
        accessori necessari e i programmi di allenamento.
    bow_winding_material:
      name: materiale per avvolgimento dell'arco
      description: Specifica il materiale utilizzato per l'avvolgimento/avvolgimento
        dell'arco, l'impugnatura Impact e il supporto.
    bow_yo_yo_embellishment_style:
      name: Stile di decorazione a fiocco/yo-yo
      description: Identifica lo stile di costruzione dell'abbellimento (fiocco o
        struttura a yo-yo in tessuto).
    bowling_ball_core_type:
      name: Tipo di nucleo della palla da bowling
      description: Identifica il design interno del nucleo o Symmetry della palla
        da bowling, che Influence Motion della palla e il potenziale di effetto.
    bowling_ball_coverstock_type:
      name: Tipo di rivestimento per palla da bowling
      description: Specifica il materiale o la tecnologia del rivestimento esterno
        della palla da bowling, che ne determina la trazione e il potenziale di effetto.
    bowling_set_style:
      name: Stile del set da bowling
      description: Definisce lo stile generale o l'uso della cassa del set da bowling.
    box_lid_type:
      name: tipo di coperchio della scatola
      description: Tipo di coperchio/meccanismo di apertura utilizzato dalla scatola
        regali o dal codice fiscale.
    box_spring_profile:
      name: Profilo della molla a molle
      description: Classifica l'altezza complessiva della rete a molle in categorie
        di profilo intuitive per l'acquirente (ad esempio, profilo basso, standard,
        profilo alto) in modo che i clienti possano filtrare rapidamente senza conoscere
        le misure esatte.
    box_spring_requirement:
      name: Requisiti della rete a doghe
      description: Indica se è necessario un sommier o Foundations aggiuntiva per
        il materasso.
    boxing_ring_style:
      name: Stile del ring da boxe
      description: Classifica lo stile costruttivo generale o lo scenario di utilizzo
        previsto del ring (ad esempio, competizione o allenamento, sopraelevato o
        a pavimento).
    bra_length_type:
      name: Tipo di lunghezza del reggiseno
      description: Definisce la classificazione della lunghezza dei reggiseni in base
        alla copertura verticale, come standard, longline, midi o cropped.
    bra_padding_type:
      name: Bra spaziatura interna tipo
      description: Descrive il livello o la presenza di spaziatura interna nelle coppe.
    braces_compatibility:
      name: Compatibilità dei tutori
      description: Specifica se il paradenti può essere indossato con l'apparecchio
        ortodontico e in che misura.
    brake_band_form:
      name: Forma della fascia del freno
      description: Indica se la fascia frenante viene Supply come un anello continuo
        (senza fine) o come un pezzo tagliato che deve essere fissato.
    brake_band_material_type:
      name: tipo di materiale della fascia del freno
      description: Specifica il materiale funzionale della fascia del freno (ad esempio,
        corda di cotone, linea di nylon o acciaio armonico), che Impact durata, aderenza,
        elasticità e rumorosità.
    brake_band_style:
      name: Stile fascia freno
      description: Specifica il sistema/tipo di tensione della cinghia del freno utilizzato
        su un filatoio per applicare la tensione al volano/alla bobina.
    brake_bleeding_method:
      name: Metodo di spurgo dei freni
      description: Approccio al prelievo di sangue supportato dal kit.
    brake_booster_assist_type:
      name: tipo di servofreno
      description: Indica il meccanismo di assistenza utilizzato dal servofreno.
    brake_booster_diaphragm_configuration:
      name: Configurazione del diaframma del servofreno
      description: Indica il numero/tipo di diaframmi utilizzati nell'amplificatore.
    brake_caliper_bleeder_screw_position:
      name: Posizione della vite di spurgo della pinza freno
      description: Specifica la posizione della vite di spurgo sulla pinza quando
        installata (utilizzata per verificare che lo spurgo sia orientato nel punto
        più alto per uno spurgo corretto).
    brake_caliper_finish:
      name: finitura pinza freno
      description: Specifica la finitura superficiale o il rivestimento protettivo
        applicato al corpo della pinza freno (ad esempio, vernice, placcatura, anodizzazione).
    brake_caliper_included_hardware:
      name: Pinza freno hardwareinclusa
      description: Specifica cosa è incluso nel gruppo pinza.
    brake_caliper_mount_type:
      name: tipo di montaggio pinza freno
      description: Tipo di interfaccia di montaggio utilizzata per fissare il calibro
        al mozzo/staffa.
    brake_caliper_paint_base_chemistry:
      name: Composizione chimica della vernice di base per pinze freno
      description: Il sistema di vernici/resine o la famiglia chimica utilizzata.
    brake_caliper_paint_kit_contents:
      name: Contenuto del kit di verniciatura per pinze freno
      description: Indica cosa è incluso nella confezione Beyond alla vernice stessa.
    brake_circuit_type:
      name: Tipo di circuito frenante
      description: Configurazione del circuito idraulico supportata dalla pompa principale.
    brake_clutch_fluid_base_chemistry:
      name: Chimica di base del fluido per freni/frizione
      description: Base chimica primaria del fluido idraulico freni/frizione, che
        influisce sulla compatibilità e sulla miscibilità.
    brake_clutch_fluid_dot_specification:
      name: Fluido freni/frizione conforme alle specifiche DOT
      description: Classificazione delle prestazioni DOT per fluidi idraulici per
        freni/frizioni (ad esempio, DOT 3, DOT 4).
    brake_drum_finish_coating:
      name: Finitura/rivestimento del tamburo del freno
      description: Finitura superficiale o rivestimento protettivo applicato al tamburo
        del freno (ad esempio, verniciatura elettroforetica, verniciatura, zincatura).
    brake_drum_type:
      name: Tipo di tamburo del freno
      description: Tipo di design del tamburo del freno (con o senza mozzo/cuscinetto
        integrato).
    brake_fluid_base:
      name: Base del liquido freni
      description: Specifica la formulazione del fluido per freni idraulici richiesto
        o incluso.
    brake_fluid_base_chemistry:
      name: Composizione chimica di base del liquido freni
      description: Definisce la base chimica del liquido freni, che determina la compatibilità
        e le regole di miscelazione.
    brake_fluid_dot_specification:
      name: Specifica DOT del liquido freni
      description: Indica la classificazione/specifica DOT del liquido freni (ad esempio,
        DOT 3, DOT 4) per Prodotti.
    brake_fluid_standards_compliance:
      name: Conformità agli standard del liquido freni
      description: Il liquido freni dichiara di rispettare gli standard di settore
        (Beyond la classificazione DOT).
    brake_fluid_type:
      name: Tipo di liquido freni
      description: Specifica il liquido freni necessario per le pinze freno idrauliche
        delle biciclette.
    brake_hose_end_fitting_type:
      name: Tipo di raccordo terminale del tubo freno
      description: Tipo di raccordo a ciascuna estremità del tubo freno (ad esempio,
        Banjo, svasato, filettatura femmina/maschio), utilizzato per garantire la
        compatibilità con pinze/tubi.
    brake_lever_pull_type:
      name: Leva del freno a tirante
      description: Definisce il rapporto di trazione/meccanica del cavo per cui la
        leva è progettata, garantendo la compatibilità con specifiche pinze freno
        (ad esempio, freni a cerchio a trazione corta rispetto a freni V-brake a trazione
        lunga).
    brake_light_switch_actuation_type:
      name: Tipo di azionamento dell'interruttore della luce freno
      description: Identifica quali Events fisici azionano l'interruttore (pedale/pistone
        rispetto alla pressione idraulica, ecc.).
    brake_light_switch_connector_type:
      name: Tipo di connettore dell'interruttore della luce freno
      description: Specifica lo stile/formato del connettore elettrico utilizzato
        dall'interruttore delle luci dei freni per collegarsi al cablaggio del veicolo.
    brake_light_switch_contact_type:
      name: Tipo di contatto dell'interruttore della luce freno
      description: Configurazione/comportamento dei contatti elettrici dell'interruttore
        delle luci dei freni (ad esempio, normalmente aperto/chiuso, commutabile o
        multicircuito).
    brake_light_switch_mounting_style:
      name: stile di montaggio dell'interruttore della luce del freno
      description: Modalità di montaggio/installazione dell'interruttore della luce
        del freno sul veicolo o sull'impianto frenante (ad esempio, tramite filettatura,
        clip, staffa di montaggio, bullone Banjo ).
    brake_master_cylinder_mounting_type:
      name: tipo di montaggio della pompa freno
      description: Modalità di montaggio della pompa freno sul veicolo/servofreno
        (schema di foratura/tipo di flangia).
    brake_master_cylinder_reservoir_type:
      name: Tipo di serbatoio del cilindro maestro del freno
      description: Tipo/configurazione del serbatoio del liquido freni. Supply o richiesto
        dalla pompa freno.
    brake_mount_type:
      name: Tipo di montaggio del freno
      description: Identifica l'interfaccia di frenata integrata nella forcella, consentendo
        ai ciclisti di verificare la compatibilità del sistema frenante.
    brake_mounting_flange_bolt_pattern:
      name: schema di foratura della flangia di montaggio del freno
      description: Specifica la configurazione dei fori/bulloni della flangia di montaggio
        utilizzata per fissare la piastra di supporto del freno o la staffa della
        pinza all'asse del rimorchio (ad esempio, 4 bulloni).
    brake_pad_backing_plate_material:
      name: Materiale della piastra di supporto delle pastiglie dei freni
      description: Specifica il materiale della piastra di supporto della pastiglia
        del freno, che influisce sulla dissipazione del calore e sul peso.
    brake_pad_compatible_rotor_type:
      name: Tipo di rotore compatibile con pastiglie freno
      description: Specifica il tipo di superficie del rotore/disco con cui la pastiglia
        è progettata per funzionare.
    brake_pad_compound:
      name: mescola delle pastiglie freno
      description: Identifica la formula del materiale d'attrito di una pastiglia
        freno.
    brake_pad_form_factor:
      name: fattore di forma della pastiglia del freno
      description: Specifica il sistema frenante/formato per cui la pastiglia è progettata
        (ad esempio, disco, tamburo, freno di stazionamento).
    brake_pad_material:
      name: Materiale delle pastiglie dei freni
      description: Specifica la mescola/famiglia di materiali d'attrito utilizzata
        nel rivestimento delle pastiglie dei freni.
    brake_pad_shim_included:
      name: Spessore per pastiglie freno incluso
      description: Indica se gli spessori per la riduzione del rumore sono inclusi
        o preinstallati.
    brake_pad_wear_indicator_type:
      name: Indicatore di usura delle pastiglie dei freni
      description: Indica il tipo di indicatore di usura incluso con le pastiglie
        dei freni (ad esempio, scheda cigolante meccanica o sensore elettronico).
    brake_position:
      name: Posizione del freno
      description: Indica la posizione in cui il componente frenante deve essere installato
        sul veicolo.
    brake_rotor_mount_type:
      name: Tipo di montaggio del disco freno
      description: Definisce l'interfaccia utilizzata per fissare un rotore del freno
        al mozzo (se applicabile).
    brake_service_kit_components_included:
      name: Componenti del kit di manutenzione freni inclusi
      description: Elenco degli attrezzi/adattatori/materiali di consumo inclusi nel
        kit per la manutenzione dei freni.
    brake_shoe_friction_material:
      name: materiale d'attrito delle ganasce dei freni
      description: La mescola di attrito/rivestimento utilizzata sulle ganasce dei
        freni (il materiale che entra in contatto con il tamburo).
    brake_shoe_set_contents:
      name: Contenuto del set di ganasce freno
      description: Cosa è incluso nella confezione (ad esempio, solo scarpe vs scarpe
        Shopify Plus hardware/molle).
    brake_system_type:
      name: Tipo di sistema frenante
      description: Specifica la tecnologia del meccanismo di frenatura utilizzato
        per controllare la rotazione della bobina durante il lancio.
    brake_type:
      name: Tipo di freno
      description: Tipo di meccanismo di freno/tensionamento del trave di orditura.
    brandy_age_classification:
      name: Classificazione dell'invecchiamento del brandy
      description: Classifica il brandy utilizzando designazioni di qualità/età standard
        del settore (ad esempio, VS, VSOP, XO) che riflettono i requisiti minimi di
        invecchiamento.
    brass_cleaning_tool_type:
      name: Strumento di pulizia in ottone
      description: Specifica il tipo di strumento utilizzato per pulire o manutenere
        gli strumenti in ottone.
    brass_instrument_application_area:
      name: area app per strumenti a fiato
      description: La/le parte/i dello strumento in ottone su cui si intende utilizzare
        lo spray disinfettante.
    brass_instrument_care_kit_purpose:
      name: Scopo del kit di cura per strumenti in ottone
      description: Descrive lo scenario di utilizzo previsto per il kit (manutenzione
        ordinaria, pulizia approfondita, viaggi/emergenze, kit Shopify Starter per
        studenti, ecc.).
    brass_instrument_case_shell_material:
      name: Materiale per conchiglia di cassa in ottone per strumenti musicali
      description: Materiale primario del guscio/Frame rigido (ove applicabile), separato
        dal materiale generale della borsa/cassa.
    brass_instrument_lubricant_additives_features:
      name: Additivi/caratteristiche per lubrificanti di strumenti in ottone
      description: Caratteristiche funzionali principali della formulazione del lubrificante.
    brass_instrument_lubricant_base_composition:
      name: Composizione base lubrificante per strumenti in ottone
      description: Base/componente chimico lubrificante primario utilizzato per i
        lubrificanti degli strumenti in ottone.
    brass_instrument_lubricant_viscosity_grade:
      name: Grado di viscosità del lubrificante per strumenti in ottone
      description: Spessore relativo/Flow del lubrificante destinato agli strumenti
        in ottone.
    brass_instrument_replacement_part_type:
      name: Tipo di parte di ricambio per strumenti a ottone
      description: Specifica di che tipo di pezzo di ricambio si tratta per strumenti
        in ottone (componenti di valvole/coulisse/chiave dell'acqua, tappi di sughero/feltro,
        protezioni, ecc.).
    brass_instrument_valve_configuration:
      name: Configurazione della valvola strumentale in ottone
      description: Come lo strumento cambia l'intonazione (meccanismo a valvola/coulisse).
    brass_lubricant_application_area:
      name: Area di applicazione del lubrificante per ottoni
      description: Il meccanismo in ottone dello strumento per cui è destinato il
        lubrificante.
    brass_mouthpiece_backbore:
      name: foro posteriore del bocchino in ottone
      description: Profilo/categoria del foro posteriore del bocchino (Shapes/taglia
        del foro posteriore), Influence il timbro e l'intonazione.
    brass_mouthpiece_cup_depth:
      name: profondità della coppa del bocchino in ottone
      description: Classificazione della profondità della coppa del bocchino (quanto
        è profonda la coppa), che influisce sul suono e sulla risposta.
    brass_polishing_cloth_abrasiveness_level:
      name: Livello di abrasività del panno per lucidare l'ottone
      description: Indica quanto il panno sia aggressivo nel rimuovere l'ossidazione
        rispetto a quanto sia efficace nel fornire una lucidatura delicata.
    bread_crumb_base_ingredient:
      name: ingrediente base di pangrattato
      description: Indica l'ingrediente principale da cui è ricavata la panatura,
        come grano, riso, cotenna di maiale o mandorle.
    bread_variety:
      name: Varietà di pane
      description: Specifica lo stile o la varietà di pane o panini, aiutando l'acquirente
        a individuare tipi specifici (ad esempio, brioche, baguette, naan).
    breadstick_style:
      name: Stile grissino
      description: Identifica lo specifico stile o formato tradizionale del grissino.
    bridge_head_material:
      name: Materiale della testa del Bridge
      description: Il materiale utilizzato esclusivamente per la testa del ponte Influence
        il peso, la sensazione al tatto e la durata.
    bridge_head_type:
      name: Tipo di testa Bridge
      description: Identifica lo stile della testa del ponte, aiutando l'acquirente
        a scegliere Shapes REST della stecca preferite.
    bridle_part_type:
      name: Tipo di parte della briglia
      description: Identifica il componente specifico della briglia che l'articolo
        di ricambio rappresenta, aiutando i clienti a trovare il pezzo esatto di cui
        hanno bisogno.
    bridle_style:
      name: stile di briglia
      description: Classifica lo stile o la costruzione generale della briglia, consentendo
        ai cavalieri di trovare rapidamente l'attrezzatura più adatta alle proprie
        esigenze o alla disciplina praticata.
    broadhead_field_point_attachment_style:
      name: Attacco per punta da caccia/punta da campo
      description: Specifica come la punta da caccia o la punta da campo si fissa
        all'asta della freccia.
    broadhead_thread_size:
      name: thread di freccia taglia
      description: Elenca le specifiche della thread utilizzate per fissare la punta
        da caccia o la punta da campo all'inserto o all'asta della freccia.
    broadhead_tip_type:
      name: Tipo di punta larga
      description: Definisce lo stile della punta/ghiera della freccia che avvia la
        penetrazione, Influence le prestazioni su diverse prede.
    broccoli_cut:
      name: Broccoli tagliati
      description: Specifica come il broccolo è stato tagliato o preparato prima di
        essere incartato (ad esempio, intero, cimette, tritato).
    broccoli_variety:
      name: Varietà di broccoli
      description: Identifica la specifica cultivar o varietà commerciale di broccoli
        (ad esempio, Tenderstem, Romanesco).
    broom_head_material:
      name: Materiale della testa della scopa
      description: Specifica la composizione del materiale della testa della scopa,
        che Influence la durata e le caratteristiche di gioco.
    brush_format:
      name: Formato pennello
      description: Indica il formato fisico di una spazzola per sci o snowboard, distinguendo
        tra blocchi manuali e formati rotanti azionati da trapano, come i cilindri
        in lana o in feltro.
    brush_shape:
      name: Shapes
      description: Specifica le Shapes fisiche o il profilo del corpo o della testina
        della spazzola, che determinano l'area di contatto e la gestione Impact .
    brussel_sprout_preparation:
      name: preparazione dei cavoletti di Bruxelles
      description: Descrive la preparazione fisica o lo stile di taglio dei cavoletti
        di Bruxelles. Supply.
    brussels_sprout_variety:
      name: varietà di cavolini di Bruxelles
      description: Specifica la cultivar o varietà dei cavolini di Bruxelles, includendo
        le varietà attuali e future.
    bubble_blower_features:
      name: Caratteristiche del soffiatore di bolle
      description: Elenca le caratteristiche funzionali comuni delle macchine per
        fare le bolle di sapone.
    bubble_gun_bubble_output_modes:
      name: Modedi uscita delle bolle della pistola per bolle
      description: Specifica la Mode operativa della pistola per bolle, ad esempio
        bolla singola, continua o impostazioni a velocità multiple.
    bubble_machine_features:
      name: Funzionalità della macchina per bolle
      description: Highlight le caratteristiche funzionali comuni delle macchine per
        bolle di sapone, Beyond al funzionamento Basic Shopify .
    bubble_machine_items_included:
      name: Articolo macchina per bolle incluso
      description: Elenca gli articoli principali inclusi nella confezione (ad esempio,
        soluzione per bolle di sapone, bacchette di ricambio, tracolla, telecomando).
    bubble_output_rate:
      name: Tasso di produzione delle bolle
      description: Indica la velocità di produzione approssimativa/qualitativa delle
        bolle per un soffiatore di bolle (ad esempio, bassa/media/alta), specificando
        se la produzione è variabile.
    bubble_solution_container_type:
      name: Soluzione a bolle tipo cassa
      description: Specifica come viene Supply/utilizzata la soluzione per bolle con
        la pistola per bolle (ad esempio, serbatoio interno, flacone collegato, vassoio/immersione
        separato).
    bubble_toy_included_accessories:
      name: Giocattolo per bolle di sapone con accessori inclusi
      description: Elenca gli articoli comuni inclusi con il giocattolo per bolle
        di sapone (ad esempio, flacone della soluzione, vassoio, bacchette di ricambio).
    buckwheat_processing_method:
      name: Metodo di lavorazione del grano saraceno
      description: Descrive la lavorazione a cui viene sottoposto il grano saraceno
        prima della vendita (ad esempio, tostato, germogliato, soffiato).
    buckwheat_product_form:
      name: forma del prodotto del grano saraceno
      description: Presentazione fisica specifica del grano saraceno che comprende
        forme non contemplate dall'elenco generico (ad esempio, fiocchi, snack soffiati,
        bustine istantanee).
    bug_collecting_kit_items_included:
      name: Articoli inclusi nel kit di raccolta insetti
      description: Strumenti e materiali didattici inclusi in un kit per la raccolta
        bug .
    built_in_storage_type:
      name: Tipo di archiviazione integrato
      description: Identifica le tipologie di vani portaoggetti integrati nella Frame
        del letto a castello (ad esempio, cassetti, ripiani, vani portaoggetti sotto
        la scala).
    bumper_finish:
      name: Finitura paraurti
      description: Specifica il rivestimento o la finitura superficiale applicata
        al paraurti.
    bumper_sensor_cutouts:
      name: Ritagli per sensori paraurti
      description: Indica quali aperture/ritagli di assistenza OEM sono inclusi nel
        paraurti o assistenza.
    bunk_bed_configuration:
      name: Configurazione con letto a castello
      description: Indica la layout strutturale e la combinazione delle dimensioni
        del materasso del letto a castello.
    buoyancy:
      name: Galleggiabilità
      description: Indica il comportamento di galleggiamento dell'esca o dell'artificiale
        nella colonna d'acqua, ad esempio se galleggia, affonda o rimane sospeso.
    burkini_pieces_included:
      name: Pezzi del burkini inclusi
      description: Elenca i componenti del capo Supply nel set burkini, in modo che
        i clienti sappiano esattamente cosa stanno acquistando.
    burn_rate:
      name: Velocità di combustione
      description: Descrive la velocità con cui la Paper brucia una volta accesa.
    bus_model_type:
      name: Tipo di modello di autobus
      description: Identifica la configurazione/tipologia reale dell'autobus rappresentata
        dal modello in scala (carrozzeria/classe di utilizzo).
    bust_design:
      name: Design del busto
      description: Descrive la configurazione della zona del busto e la copertura
        della scollatura del body (ad esempio, busto scoperto, reggiseno incorporato,
        scollatura profonda).
    butter_variety:
      name: Varietà di burro
      description: Specifica lo stile di produzione o la tipologia distintiva del
        burro, come ad esempio burro fermentato, burro di panna dolce, burro in stile
        europeo, burro chiarificato (ghee) o burro di siero di latte.
    buttermilk_variety:
      name: Varietà di latticello
      description: Indica lo stile o la forma specifica di latticello venduto (ad
        esempio, fermentato, tradizionale, in polvere).
    button_application:
      name: app di prenotazione
      description: Indica l'applicazione o il tipo di progetto previsto per il pulsante
        (ad esempio, abbigliamento, tappezzeria).
    button_attachment_type:
      name: Tipo di fissaggio del bottone
      description: Specifica la struttura del bottone a pressione per il fissaggio
        al tessuto (ad esempio, fori passanti o gambo), non il tipo di chiusura.
    button_finish:
      name: fine pulsante
      description: Descrive la finitura/l'aspetto della superficie del pulsante (ad
        esempio, opaco o lucido).
    buttonhole_elastic_application:
      name: Applicazione elastica per asole
      description: Uso/applicazione principale previsto per l'elastico decorativo
        ripiegabile.
    cab_type:
      name: Tipo di cabina
      description: Specifica la configurazione della cabina del camion.
    cabasa_construction_type:
      name: Tipo di costruzione del cabasa
      description: Specifica la costruzione/lo stile fisico del corpo della cabasa
        e del relativo assemblaggio di catene e perline.
    cabbage_variety:
      name: Varietà di cavolo
      description: Identifica la cultivar o il tipo di cavolo (ad esempio, verde,
        napa, savoiardo) in modo che l'acquirente possa filtrare per sapore, consistenza
        e utilizzo in cucina.
    cabinet_door_style:
      name: Stile anta mobile
      description: Identifica il design visivo del pannello dell'anta del mobile,
        come ad esempio lo stile Shaker o il pannello a rilievo, per facilitare l'abbinamento
        con l'estetica della cucina.
    cabinet_overlay_type:
      name: Tipo di sovrapposizione del mobile
      description: Specifica come le ante si sovrappongono o si posizionano rispetto
        al Frame del mobile.
    cable_end_type:
      name: Tipo di estremità del cavo
      description: Descrive la Shapes o lo stile del nipplo terminale o del raccordo
        del cavo che si interfaccia con le leve del freno o del cambio.
    cable_housing_construction:
      name: costruzione di alloggiamenti per cavi
      description: Descrive il design strutturale dell'alloggiamento, come ad esempio
        a spirale, senza compressione o a collegamento segmentato, che Influence la
        resistenza alla compressione, la flessibilità e la sensazione Ride .
    cable_housing_liner_type:
      name: tipo di rivestimento dell'alloggiamento del cavo
      description: Indica se l'alloggiamento include un rivestimento interno e/o una
        variante di lubrificazione, e il materiale o la tecnologia utilizzati, che
        influiscono sulla riduzione dell'attrito e sulla resistenza agli agenti atmosferici.
    cable_management_type:
      name: Tipo di gestione dei cavi
      description: Specifica il tipo di funzioni integrate di gestione dei cavi o
        dell'alimentazione offerte dal tavolo da conferenza.
    cable_surface_treatment:
      name: variante di superficie del cavo
      description: Identifica eventuali rivestimenti o finiture speciali applicati
        al cavo per ridurre l'attrito o proteggerlo dalla corrosione.
    cabochon_back_type:
      name: tipo di retro cabochon
      description: Indica il profilo/finitura posteriore del cabochon, che influisce
        sulle impostazioni/metodi di incollaggio e sulla compatibilità.
    cacao_bean_variety:
      name: varietà di fave di cacao
      description: Specifica la varietà botanica o cultivar del seme di cacao utilizzato.
    cacao_roast_level:
      name: Livello di tostatura del cacao
      description: Descrive il grado di tostatura del cacao prima della macinazione.
    cage_package_type:
      name: Cage tipo di gabbia
      description: Definisce quali componenti sono inclusi nell'acquisto (ad esempio,
        solo rete, kit Frame , pacchetto completo).
    cajon_body_shell_material:
      name: Materiale del corpo/guscio del Cajon
      description: Indica il materiale del corpo/guscio del cajón (escluso il tapa).
    cajon_corner_control_system:
      name: sistema di controllo angolare Cajon
      description: Specifica se la regolazione del suono dell'angolo del cajon assistenza
        (ad esempio, viti angolari) varia la risposta allo slap.
    cajon_corner_edge_design:
      name: Design angolare/di bordo Cajon
      description: Descrive la costruzione degli angoli/bordi che influisce sul comfort
        e sulla giocabilità.
    cajon_feet_type:
      name: Tipo di piedi Cajon
      description: Specifica il tipo di piedini sul cajón, la stabilità Impact e la
        risonanza.
    cajon_snare_adjustability:
      name: Regolabilità del rullante del cajón
      description: Indica se e come è possibile regolare l'effetto rullante (tensione,
        innesto o entrambi).
    cajon_snare_system_type:
      name: sistema di rullante cajon
      description: Specifica il meccanismo interno del rullante utilizzato per creare
        l'effetto rullante.
    cake_shape:
      name: Shapesper torte
      description: Descrive la forma fisica in cui viene cotta la torta al caffè.
    cake_topping:
      name: Guarnizione per torta
      description: Indica la guarnizione o la finitura principale applicata alla torta
        al caffè.
    cake_type:
      name: Tipo di torta
      description: Descrive lo stile o la varietà di torta (ad esempio, torta quattro
        quarti, pan di Spagna, cheesecake).
    caliper_mount_type:
      name: Tipo di montaggio calibro
      description: Definisce lo standard di interfaccia Frame o della forcella utilizzato
        dalla pinza freno (ad esempio, Post Mount, Flat Mount).
    caliper_mounting_standard:
      name: Standard di montaggio della pinza
      description: Specifica l'interfaccia/standard di montaggio (ad esempio, Flat
        Mount, Post Mount, IS, ecc.) utilizzato per fissare la pinza freno al Frame
        o alla forcella della bicicletta.
    camera_mounting_location_vehicle_exterior:
      name: Sede di montaggio della telecamera (esterno del veicolo)
      description: Dove si intende montare la/le telecamera/e sul veicolo (ad esempio,
        griglia anteriore, specchietti posteriori, specchietti laterali).
    camouflage_environment_type:
      name: Tipo di ambiente mimetico
      description: Indica l'ambiente principale per cui è stato progettato il modello
        mimetico, come ad esempio boschi, deserti o paludi.
    camping_oil_application:
      name: Applicazione dell'olio da campeggio
      description: Specifica l'uso principale previsto dell'olio nel Context del campeggio
        (ad esempio, combustibile per lanterne rispetto a combustibile per fornelli).
    camshaft_construction:
      name: Costruzione dell'albero a camme
      description: Stile di fabbricazione/grezzo dell'albero a camme.
    camshaft_material:
      name: materiale dell'albero a camme
      description: Materiale primario del nucleo/albero a camme (materiale di base).
    camshaft_position:
      name: posizione dell'albero a camme
      description: Specifica la sede/tipologia prevista per l'albero a camme all'interno
        del motore (ad esempio, aspirazione o scarico, oppure una specifica bancata/posizione
        del motore).
    candle_container_type_included:
      name: Tipo di candela incluso
      description: Specifica il tipo di contenitore/i per candele incluso/i nel kit,
        se presente/i.
    candle_dye_form:
      name: forma di colorante per candele
      description: Specifica la forma fisica del colorante/tintura per candele utilizzato
        nella produzione di candele.
    candle_fragrance_form:
      name: Forma di fragranza della candela
      description: Specifica il tipo/la forma dell'ingrediente profumante destinato
        alla produzione di candele.
    candle_making_tool_type:
      name: tipo di strumento per la fabbricazione di candele
      description: Identifica il tipo di strumento per la produzione di candele che
        è il prodotto (ad esempio, recipiente per versare la cera, strumento per centrare
        lo stoppino, termometro).
    candy_texture:
      name: consistenza caramellata
      description: Descrive la sensazione al palato o la consistenza della caramella,
        indipendentemente dal sapore o Shapes.
    candying_method:
      name: Metodo di caramellatura
      description: Descrive come la frutta è stata candita o conservata con lo zucchero
        (ad esempio, cristallizzata, glassata, in sciroppo).
    canned_meat_form:
      name: forma di carne in scatola
      description: Classifica la forma o la presentazione della carne lavorata all'interno
        della confezione.
    canoe_construction_type:
      name: Tipo di costruzione della canoa
      description: Descrive le differenze tra i vari stili di costruzione dello scafo
        delle canoe, come quelle rigide, gonfiabili e pieghevoli.
    canoe_hull_shape:
      name: Shapesdello scafo della canoa
      description: Definisce la sezione trasversale primaria dello scafo o profilo
        del fondo, che influisce sulla stabilità e sulla manovrabilità.
    canoe_stern_design:
      name: Progettazione della poppa della canoa
      description: Definisce lo stile della poppa dello scafo, che influisce sulla
        compatibilità e sulla gestione del motore.
    canopy_type:
      name: Tipo di canopy
      description: Descrive lo stile del Canopy o della copertura superiore inclusa
        con il letto a baldacchino.
    canvas_compatible_media:
      name: Contenuti multimediali compatibili con Canvas
      description: Indica con quali contenuti artistici/Craft /multimediali è destinata
        la tela.
    canvas_format:
      name: Formato Canvas
      description: Indica se la tela stampabile viene venduta in fogli, rotoli o pannelli
        pretagliati.
    canvas_mounting_format:
      name: Montaggio/formato della tela
      description: Formato fisico/tipologia di montaggio del dipinto su tela.
    canvas_stretcher_assembly_type:
      name: Tipo di assemblaggio del telaio per telai
      description: Sia che la barella venga venduta già assemblata come Frame , sia
        come barre/kit da assemblare.
    canvas_stretcher_corner_joint_type:
      name: Tipo di giunzione angolare per telaio di tela
      description: Modalità di giunzione/costruzione degli angoli del telaio (ad esempio,
        incastro a tenone e mortasa, giunzione a pettine, graffettatura, incastro
        a chiave).
    canvas_surface_tone:
      name: Tonalità della superficie della tela
      description: Tonalità/colore di base della superficie della tela preparata (fondo),
        non di alcun disegno o motivo stampato (ad esempio, bianco, nero, tonalizzato).
    canvas_weave_type:
      name: Tipo di tessitura della tela
      description: Descrive la struttura della trama della superficie della tela,
        che influisce sulla consistenza e sulla gestione del colore.
    cap_attachment_style:
      name: Stile di attacco del cappellino
      description: Specifica il tipo di costruzione/attacco del cappuccio del bocchino
        del sassofono, che può influire sulla protezione e sull'aderenza alla cassa.
    cap_construction:
      name: Costruzione del cappellino
      description: Specifica come è realizzata la calotta della parrucca (ad esempio,
        con frontale in pizzo, pizzo integrale, annodata a mano), il che influisce
        sul realismo, sul comfort e sulla versatilità di styling.
    cap_crown_structure:
      name: Struttura della corona del cappello
      description: Indica se la calotta del cappuccio è strutturata (irrigidita) o
        non strutturata (morbida).
    cap_fit_type:
      name: Tipo di vestibilità del cappellino
      description: Definisce come il berretto si adatta o si regola sulla testa di
        chi lo indossa (ad esempio, aderente o regolabile).
    cap_seal_type:
      name: Tipo di guarnizione del tappo
      description: Specifica il componente di tenuta utilizzato per prevenire perdite
        di olio e fuoriuscite di vapore (ad esempio, O-ring, guarnizione).
    cap_size:
      name: Cap taglia
      description: Label taglia standard che indica la misura complessiva della testa
        adatta alla cuffia per parrucca.
    cap_type:
      name: Tipo di cappellino
      description: Tipo di interfaccia tappo/chiusura utilizzata sul serbatoio di
        troppo pieno.
    caper_size_grade:
      name: Caper taglia grade
      description: Classifica i capperi secondo le denominazioni di grado standard
        del settore, corrispondenti al diametro del bocciolo.
    capo_clamping_mechanism:
      name: meccanismo di bloccaggio del capotasto
      description: Specifica il tipo di morsetto/azionamento utilizzato per applicare
        pressione alla corda (come viene azionato il capotasto).
    capo_finish:
      name: finitura capotasto
      description: Finitura superficiale del corpo del capotasto (visiva/tattile),
        indipendente dal colore (ad esempio, opaco o lucido).
    capo_fit_type:
      name: Tipo di vestibilità Capo
      description: Specifica il profilo del manico per cui il capotasto è progettato
        (inclusi raggio/piattezza), che influisce sul serraggio senza ronzii e sull'intonazione.
    capo_pad_material:
      name: Materiale del pad del capo
      description: Specifica il materiale del pad di contatto che tocca la tastiera/la
        cordiera (influisce sulla presa, sulla stabilità dell'accordatura e su eventuali
        segni di finitura).
    capo_tension_mechanism:
      name: meccanismo di tensione del capo
      description: Specifica come viene applicata e regolata la pressione/tensione
        sulla striscia per il capotasto scorrevole.
    capture_method:
      name: Metodo di acquisizione
      description: Indica se la trappola è destinata alla cattura di animali vivi
        o all'abbattimento letale.
    car_ev_conversion_kit_motor_type:
      name: kit di conversione auto EV tipo di motore
      description: Specifica la tecnologia del motore di trazione inclusa o richiesta
        dal kit di conversione (ad esempio, induzione CA o magneti permanenti).
    car_playset_items_included:
      name: articolo del playset dell'auto incluso
      description: Elenca i componenti principali inclusi nel playset dell'auto, Beyond
        alla struttura di base (ad esempio, auto, personaggi, segnali).
    car_shampoo_application_method:
      name: Metodo dell'app per shampoo per auto
      description: Modalità di applicazione dello shampoo durante il lavaggio.
    car_wash_solution_form:
      name: Forma della soluzione per autolavaggio
      description: Specifica la forma fisica della soluzione per il lavaggio dell'auto
        (ad esempio, liquido, schiuma, salviette).
    car_wash_solution_scent:
      name: Profumo di soluzione per autolavaggio
      description: Specifica la fragranza/il profumo della soluzione per il lavaggio
        dell'auto (se profumata).
    carbonated_water_variety:
      name: Varietà di acqua gassata
      description: Classifica l'acqua gassata in base alle varietà e alla formulazione
        più comuni sul mercato (ad esempio, acqua tonica, acqua frizzante, acqua funzionale).
    carbonation:
      name: Carbonatazione
      description: Descrive il livello o lo stile di carbonazione della bevanda (ad
        esempio, naturale, leggermente frizzante, frizzante, nitro).
    carburetor_barrel_count:
      name: Numero di cilindri del carburatore
      description: Indica il numero di corpi/cilindri del carburatore.
    carburetor_choke_type:
      name: Tipo di starter del carburatore
      description: Indica il tipo di azionamento dello starter utilizzato dal carburatore.
    carburetor_mounting_flange_type:
      name: Flangia di montaggio del carburatore tipo
      description: Specifica lo stile dell'interfaccia di montaggio del carburatore
        per garantire la compatibilità con il collettore di aspirazione (ad esempio,
        attacco a spina o flangia/bulloni).
    card_binder_page_type:
      name: Tipo di pagina del raccoglitore di schede
      description: 'Per raccoglitori/portfolio: lo stile delle Pagine utilizzate per
        i cataloghi di schede.'
    card_box_holder_type:
      name: Tipo di scatola/portacarte
      description: Specifica il fattore di forma funzionale del prodotto per la raccolta
        o la conservazione delle carte durante un Events (ad esempio, scatola, scatola
        tipo cassetta postale, cestino, supporto).
    card_game_accessory_features:
      name: Caratteristiche degli accessori per giochi di carte
      description: Caratteristiche funzionali principali degli accessori per giochi
        di carte.
    card_lot_type:
      name: Tipo di lotto della carta
      description: Indica se il prodotto è una singola carta o un lotto/assortimento
        di più carte.
    card_sleeve_size_format_compatibility:
      name: Compatibilità formato/formato della custodia per carte
      description: Specifica il/i formato/i delle carte per cui sono progettate le
        bustine/pagine/scatole per mazzi.
    carding_surface_pin_material:
      name: Superficie cardata con materiale Pin
      description: Materiale del perno/denti utilizzato per sfilacciare e aprire la
        fibra.
    care_durability:
      name: Durata della cura
      description: Indica le aspettative di resistenza al lavaggio/calore per l' Label
        dopo l'applicazione.
    care_label_attachment_type:
      name: Tipo di attacco Label di cura
      description: Modalità di applicazione Label di cura sull'articolo (es. cucitura,
        applicazione a caldo/con ferro da stiro, adesivo).
    care_label_format:
      name: Formato Label di manutenzione
      description: Il formato fisico/cartaceo Label di cura del prodotto.
    care_label_symbol_system:
      name: Sistema di simboli Label di cura
      description: L'insieme di standard/simboli utilizzati Label (ad esempio, simboli
        di cura ISO, simboli ASTM/USA).
    cargo_area_configuration:
      name: Configurazione dell'area di carico
      description: Specifica lo stile strutturale o la sede del vano di carico su
        una bicicletta da carico (ad esempio, a coda lunga, a caricamento frontale,
        a triciclo).
    cargo_net_adjustability:
      name: Regolabilità della rete di carico
      description: Indica se e come la rete di carico può essere regolata in termini
        di tensione/aderenza.
    cargo_net_position:
      name: Posizione della rete di carico
      description: Dove nel bagagliaio/vano di carico è previsto il montaggio della
        rete o Functions.
    cargo_net_stretch_type:
      name: Rete elastica per carico
      description: Se la rete di carico del bagagliaio è elastica/estensibile o fissa/non
        estensibile.
    cargo_net_style:
      name: Stile rete da carico
      description: Specifica lo stile di costruzione o il fattore di forma della rete
        di carico (ad esempio, corda elastica, fettuccia, barriera, amaca).
    cargo_rack_finish:
      name: Finitura del carico vuoto
      description: Finitura/rivestimento della superficie esterna del cassone di carico.
    carpet_cleaner_application_method:
      name: metodo con app per la pulizia dei tappeti
      description: Specifica la modalità di applicazione e lavorazione prevista del
        prodotto nel tappeto (Beyond la forma generale).
    carrier_style:
      name: Stile del portabebè
      description: Il meccanismo/sistema di trasporto utilizzato per agevolare il
        trasporto dell'imbarcazione sul veicolo.
    carrot_size:
      name: Carota taglia
      description: Classifica le dimensioni generali del prodotto a base di carota.
    carrot_variety:
      name: Varietà di carota
      description: Identifica la specifica varietà o cultivar di carota.
    carrying_capacity_pairs_boards:
      name: Capacità di carico (associato/tavole)
      description: Indica quanti sci (associati) o snowboard un accessorio consente
        o è destinato ad aiutare se utilizzato con lo scaffale (es. kit di estensione).
    cartridge_thread_compatibility:
      name: Compatibilità thread della cartuccia
      description: Indica lo standard thread di un vaporizzatore o di un'assistenza
        per batterie, garantendo la compatibilità fisica tra cartucce e batterie.
    case_capacity_butts_shafts:
      name: capacità cassa (coppie × aste)
      description: Definisce il numero di impugnature e puntali delle stecche che
        la cassa può ospitare, espresso nel formato impugnatura per puntale (ad esempio,
        2x4 = 2 impugnature e 4 puntali).
    case_features:
      name: Funzionalità della cassa
      description: Highlight le caratteristiche funzionali della custodia per piatti/batteria
        relative alla protezione e al trasporto.
    case_humidifier_refill_type:
      name: tipo di ricarica per umidificatore Cassa
      description: Indica se l'umidificatore utilizza contenuti multimediali riutilizzabili
        (riumidificabili/rigenerabili) o ricariche monouso sostituibili.
    case_lining_material:
      name: Materiale della fodera della cassa
      description: Identifica il materiale principale che riveste l'interno di una
        custodia o di una borsa morbida che entra in contatto con lo strumento e lo
        protegge.
    case_material:
      name: Materiale della cassa
      description: Identifica il materiale principale della cassa dell'orologio, Influence
        la durata, il peso e l'estetica.
    case_mounting_method:
      name: metodo di montaggio cassa
      description: Modalità di posizionamento o fissaggio dell'umidificatore all'interno
        della custodia dello strumento.
    case_structure:
      name: struttura cassa
      description: Indica la rigidità della costruzione della cassa.
    case_style_cymbal_drum:
      name: stile cassa (piatto/tamburo)
      description: Specifica se il prodotto è una borsa morbida, una custodia rigida
        o un modello ibrido per il trasporto di piatti o batterie.
    casing_material:
      name: Materiale del rivestimento
      description: Indica il tessuto principale utilizzato nella carcassa del pneumatico,
        il peso Impact , il comfort Ride e la protezione contro le forature.
    casino_set_chip_material:
      name: materiale chip da casinò
      description: Materiale principale dei chip inclusi (se applicabile).
    casino_set_layout_included:
      name: layout del casinò incluso
      description: Specifica il tipo di superficie/layout di gioco inclusa nel set.
    cask_finish:
      name: Finitura della botte
      description: Specifica il tipo di botte o barile utilizzato per l'affinamento
        o la maturazione del distillato, come ad esempio una botte di bourbon o una
        botte di sherry.
    cassava_variety:
      name: Varietà di manioca
      description: Identifica la specifica cultivar o varietà di manioca offerta,
        che influisce Taste, sul colore e sulle proprietà di cottura.
    cassette_body_type:
      name: Tipo di corpo della cassetta
      description: Ruota libera o standard di azionamento che il mozzo posteriore
        o la ruota accetta (ad esempio, HG 11, XDR, Microspline).
    cassette_deck_feature_set:
      name: Set di funzioni del registratore a cassette
      description: Indica le funzioni di trasporto e riproduzione delle cassette comuni
        ai lettori di cassette integrati nel cruscotto.
    cassette_speed_compatibility:
      name: Compatibilità della velocità della cassetta
      description: Indica il numero di velocità (ad esempio, 7 velocità, 12 velocità)
        con cui la cassetta o la ruota libera sono progettate per funzionare, garantendo
        la compatibilità con catena, cambio e deragliatore.
    castanet_shell_size_class:
      name: Castagnette conchiglia taglia classe
      description: Classe di taglia standardizzata per le nacchere, comunemente utilizzata
        da musicisti e insegnanti per selezionare la misura e il suono.
    castanets_included_pieces:
      name: Le nacchere includevano pezzi
      description: Indica cosa è incluso nell'offerta del prodotto (associato vs singolo,
        extra Shopify Plus ).
    castanets_pitch:
      name: Campo di nacchere
      description: Indica l' Label comune di tono/taglia utilizzata dal Maker per
        descrivere la gamma sonora.
    castanets_type:
      name: Nacchere tipo
      description: Specifica lo stile delle nacchere o la categoria di utilizzo prevista.
    caster_type:
      name: Tipo di ruota
      description: Identifica il tipo di ruote o rotelle montate sul carrello (ad
        esempio, girevoli, con freno), fornendo informazioni su manovrabilità e stabilità.
    castle_playset_included_items:
      name: Set da gioco del castello incluso articolo
      description: Cattura i componenti principali inclusi nel playset del castello
        in modo che l'acquirente possa confrontare i set (ad esempio, personaggi,
        mobili, veicoli, accessori).
    catcher_equipment_included:
      name: Attrezzatura del ricevitore inclusa
      description: Specifica i componenti inclusi in un set di equipaggiamento da
        ricevitore, come ad esempio il casco o la protezione per il petto.
    catcher_helmet_style:
      name: Casco da ricevitore
      description: Indica lo stile generale del design del casco protettivo del ricevitore.
    cattle_breed:
      name: Razza bovina
      description: Indica la razza bovina da cui proviene la carne (ad esempio, Angus,
        Wagyu, Hereford).
    cauliflower_variety:
      name: varietà di cavolfiore
      description: Indica la cultivar, il colore o la varietà speciale del cavolfiore
        in vendita.
    celery_form:
      name: Forma di sedano
      description: Specifica la forma fisica o il taglio in cui il sedano viene venduto.
    celery_variety:
      name: Varietà di sedano
      description: Registra la specifica cultivar o varietà di sedano, consentendo
        all'acquirente di selezionare in base al profilo aromatico, al colore o all'uso
        culinario.
    cereal_bar_texture:
      name: struttura della barretta di cereali
      description: Descrive la sensazione al palato e la consistenza della barretta
        di cereali (ad esempio, gommosa, croccante).
    cereal_type:
      name: Tipo di cereale
      description: Classifica le Shapes o i formati di cereali o granola (fiocchi,
        soffietti, grappoli di granola, muesli, ecc.) per aiutare l'acquirente a trovare
        la consistenza o il metodo di preparazione preferito.
    certificate_border_style:
      name: Stile del bordo del certificato
      description: Descrive la variante del bordo decorativo utilizzata sul certificato.
    certificate_personalization_type:
      name: Tipo di personalizzazione del certificato
      description: Specifica come il certificato può essere personalizzato (vuoto
        per la scrittura a mano, modello stampabile, prestampato con campi variabili,
        ecc.).
    certification_service:
      name: Servizio di certificazione
      description: di terze parti grading/certification azienda (se applicabile).
    certification_standard:
      name: Standard di certificazione
      description: Specifica la certificazione di sicurezza e resistenza al fuoco
        o lo standard di conformità che il passamontagna è tenuto a soddisfare.
    chain_coating_finish:
      name: Rivestimento/finitura della catena
      description: Specifica qualsiasi variante o finitura superficiale applicata
        alla catena per migliorarne la durata, ridurre l'attrito, prevenire la corrosione
        o modificarne l'aspetto (ad esempio, nitruro di titanio, DLC, nichel, EPT
        antiruggine).
    chain_connection_type:
      name: Tipo di catena
      description: Specifica il metodo di chiusura previsto o richiesto per unire
        le estremità della catena.
    chain_tier_configuration:
      name: Configurazione a livelli della catena
      description: Specifica il numero/la disposizione dei livelli di catena nel gruppo
        di aggancio (livello singolo, doppio o triplo).
    chain_tool_type:
      name: Tipo di utensile a catena
      description: Classifica le specifiche tipologie di attrezzi per catene di bicicletta,
        consentendo all'acquirente di trovare rapidamente il dispositivo corretto.
    chainring_shape:
      name: Shapesdelle corone
      description: Indica la Shapes della corona, ad esempio rotonda o ovale/ellittica.
    chair_accessories_included:
      name: Accessori per sedia inclusi
      description: Elenca gli accessori integrati o inclusi che migliorano la funzionalità
        di una sedia.
    chair_sash_care_instructions:
      name: Istruzioni per la cura del rivestimento della sedia
      description: Descrive il metodo di pulizia/manutenzione raccomandato per la
        fascia della sedia.
    chair_sash_finish:
      name: finitura del telaio della sedia
      description: Descrive la lucentezza/finitura superficiale del tessuto del telaio.
    chair_storage_design:
      name: Design per riporre le sedie
      description: Indica come la sedia a sdraio è destinata a essere riposta (ad
        esempio, pieghevole, impilabile, non ripiegabile) per aiutare i clienti a
        valutare la facilità di stoccaggio e trasporto.
    chaise_or_sectional_orientation:
      name: Orientamento a chaise longue o componibile
      description: Specifica il lato su cui si trova la chaise longue integrata o
        la sezione estensibile, guardando il divano frontalmente.
    chamber_size:
      name: Camera taglia
      description: Indica la dimensione/volume della camera del bocchino, che influisce
        sulla resistenza e sul timbro.
    chanter_finger_spacing:
      name: Spaziatura delle dita del cantore
      description: Indica la spaziatura delle dita/il profilo della taglia del chanter
        (spesso descritto come standard, mani piccole o mani grandi).
    chanter_type:
      name: Tipo di chanter
      description: Il tipo/configurazione del chanter incluso con lo strumento (o
        utilizzato dallo strumento), come ad esempio aperto, chiuso, per esercitarsi
        o con chiavi.
    chard_variety:
      name: Varietà di bietola
      description: Indica la specifica cultivar o varietà di colore della bietola
        in vendita.
    charging_port_location:
      name: Porta Charge sede
      description: Sede fisica della principale presa Charge esterna del veicolo (porta
        Charge ).
    chassis_construction_type:
      name: Tipo di costruzione del telaio
      description: Descrive il principale metodo di costruzione del telaio utilizzato
        per il veicolo.
    checkbook_loading_orientation:
      name: Orientamento per il caricamento del libretto degli assegni
      description: Indica se la copertina del libretto degli assegni è compatibile
        con i formati di assegni a caricamento dall'alto, a caricamento laterale o
        universali.
    cheekpiece_style:
      name: Stile guanciale
      description: Definisce il tipo di configurazione delle guance/anelli sul morso
        a filetto, che determina l'azione delle redini e la stabilità laterale.
    cheese_alternative_form:
      name: Forma alternativa al formaggio
      description: Specifica la forma fisica o il taglio in cui viene venduto il prodotto
        alternativo al formaggio.
    cheese_form:
      name: Forma di formaggio
      description: Descrive la presentazione fisica del prodotto caseario (ad esempio,
        forma intera, blocco, affettato, grattugiato).
    cheese_texture:
      name: consistenza del formaggio
      description: Classifica il formaggio in base alla sua consistenza o fermezza
        generale.
    cheese_variety:
      name: Varietà di formaggio
      description: Indica il tipo di formaggio utilizzato come aroma principale nello
        snack.
    cherimoya_variety:
      name: varietà di cherimoya
      description: Identifica la specifica cultivar/varietà di cherimoya (ad esempio,
        Fino de Jete, El Bumpo).
    cherry_variety:
      name: Varietà di ciliegia
      description: Specifica la cultivar o varietà delle ciliegie, aiutando l'acquirente
        a scegliere tipi specifici noti per il loro sapore, colore, dimensione o uso
        culinario previsto.
    chest_pocket_style:
      name: Stile Chestcake
      description: Specifica la presenza e la configurazione delle tasche sul petto
        della camicia.
    chewing_tobacco_form:
      name: Forma di tabacco da masticare
      description: Identifica la forma fisica, il tipo di taglio o la dimensione della
        bustina del prodotto di tabacco da masticare (ad esempio, foglie sfuse, taglio
        lungo, bustina sottile).
    chicory_variety:
      name: Varietà di cicoria
      description: Identifica la specifica varietà o cultivar di cicoria venduta (ad
        esempio, Radicchio, Indivia belga, Scarola).
    chiffon_recommended_use:
      name: Utilizzo consigliato del chiffon
      description: Applicazione di cucito/Craft principalmente consigliata per il
        tessuto chiffon.
    child_seat_accessory_type:
      name: Tipo di accessorio per seggiolino auto
      description: Definisce la tipologia specifica di accessorio o ricambio per seggiolino
        auto (ad esempio, cuscino, poggiapiedi, adattatore di montaggio), consentendo
        all'acquirente di individuare rapidamente l'articolo di cui ha bisogno senza
        creare numerose micro-categorie.
    child_seat_mounting_type:
      name: Tipo di montaggio del seggiolino per bambini
      description: Specifica come il seggiolino per bambini si fissa al Frame, al
        portapacchi o al cockpit della bicicletta.
    chime_sound_character:
      name: carattere sonoro del campanello
      description: Descrive il carattere sonoro/il timbro desiderato dei campanelli.
    chin_cup_type:
      name: Tipo di mentoniera
      description: Specifica lo stile o la costruzione della mentoniera, che influisce
        sul comfort e sulla protezione Impact .
    chin_strap_type:
      name: Tipo di cinturino per il mento
      description: Specifica il tipo di sottogola di un cappello (nessuno, fisso,
        regolabile o rimovibile) per aiutare l'acquirente a scegliere modelli che
        rimangano ben saldi in ambienti ventosi o durante attività all'aperto.
    china_cymbal_edge_shape:
      name: Shapes del bordo del piatto cinese
      description: Descrive il profilo del bordo/flangia tipico dei piatti china (quanto
        è rialzato il bordo), che influisce sulla sensazione al tatto e sul suono.
    china_cymbal_sound_character:
      name: carattere sonoro del piatto cinese
      description: Caratteristica sonora/tonale primaria descritta per un piatto china
        utilizzato per la scoperta e il filtraggio (ad esempio, sporco, scuro, brillante).
        È possibile applicare più valori.
    chinstrap_type:
      name: Tipo sottogola
      description: Tipo di sottogola fornito con il casco.
    chip_cut_style:
      name: stile taglio a scaglie
      description: Specifica il tipo di taglio o la consistenza delle patatine (ad
        esempio, rigate, cotte in pentola, soffiate).
    chip_denomination:
      name: denominazione del chip
      description: Quali denominazioni (valori) chip sono incluse nel set (stampate
        o assegnate).
    chocolate_form:
      name: Forma di cioccolato
      description: Descrive la forma fisica in cui viene venduto il cioccolato da
        forno.
    choy_sum_variety:
      name: Varietà di Choy sum
      description: Identifica la specifica varietà di mercato o botanica di choy sum
        venduta.
    cigar_wrapper_color:
      name: fascia di sigaro colorata
      description: Classificazione standard del colore della foglia di fascia del
        sigaro.
    cigarette_filter_type:
      name: Tipo di filtro per sigaretta
      description: Specifica se la sigaretta è dotata di filtro e, in caso affermativo,
        la sua struttura o le sue caratteristiche particolari.
    cigarette_size:
      name: Patatina di sigaretta
      description: Classifica le sigarette in base alla lunghezza o al formato standard
        del settore (ad esempio, king taglia, 100s, slim).
    cigarette_strength_descriptor:
      name: Descrittore della forza della sigaretta
      description: Forza Marketing Label tradizionalmente utilizzata dal marchio per
        indicare l'intensità di catrame/nicotina (ad esempio, Leggero, Intenso, Argento).
    cinch_liner_material:
      name: Materiale della fodera con coulisse
      description: Identifica il materiale utilizzato per la fodera o spaziatura interna
        che poggia a contatto con il cavallo.
    circular_knitting_needle_cable_type:
      name: Ago circolare per maglieria a cavo
      description: Materiale/comportamento e costruzione del cavo (ad es. acciaio
        rivestito, nylon), memoria Impact /attorcigliamento e comportamento di rotazione.
    circular_knitting_needles_tip_material:
      name: materiale per la punta dei ferri da maglia circolari
      description: Materiale delle due punte degli aghi (diverso dal materiale del
        cavo).
    circumference_adjustment_mechanism:
      name: Meccanismo di regolazione della circonferenza
      description: Meccanismo utilizzato per regolare o bloccare la circonferenza
        della matassa.
    clamp_design:
      name: Design a morsetto
      description: Descrive lo stile strutturale o il meccanismo del morsetto.
    clamp_sheet_music_clip_features:
      name: Caratteristiche della clip per spartiti musicali a morsetto
      description: Caratteristiche funzionali e di protezione delle clip per spartiti
        (ad es. spaziatura interna, antiscivolo, girevole).
    clamping_closure_type:
      name: Tipo di serraggio/chiusura
      description: Specifica il meccanismo utilizzato per tendere o fissare il telaio
        da ricamo attorno al tessuto.
    clarinet_bell_acoustic_design:
      name: progettazione acustica della campana del clarinetto
      description: Descrive il design del suono/ventilazione della campana, concepito
        per Influence la risposta e l'intonazione.
    clarinet_bell_adjustment_mechanism:
      name: Meccanismo di regolazione della campana del clarinetto
      description: Descrive come viene regolata la lunghezza/geometria della campana.
    clarinet_bell_ring_material:
      name: Materiale per anello della campana del clarinetto
      description: Specifica il materiale dell'anello/fascia protettiva sul bordo
        della campana del clarinetto, se presente.
    clarinet_bell_tuning_effect:
      name: effetto di accordatura della campana del clarinetto
      description: Indica in che modo la campana è progettata per influenzare l'accordatura/intonazione
        (in particolare i toni gutturali e il registro grave) rispetto a una campana
        standard.
    clarinet_body_type:
      name: Tipo di corpo del clarinetto
      description: Indica la tipologia di costruzione principale del corpo del clarinetto
        in La.
    clarinet_bore_type:
      name: Tipo di foro del clarinetto
      description: Descrive il design del foro interno del clarinetto contralto.
    clarinet_cap_style:
      name: Cappello stile clarinetto
      description: Stile di design del cappuccio incluso con la legatura per clarinetto
        e/o il cappuccio del bocchino (ad esempio, invertito o ventilato).
    clarinet_care_kit_intended_use:
      name: Uso previsto del kit per la cura del clarinetto
      description: Utilizzo principale Context per cui il kit è progettato (ad esempio,
        asciugatura rapida quotidiana rispetto a pulizia/manutenzione approfondita).
    clarinet_included_accessories:
      name: Accessori inclusi per clarinetto
      description: Indica il contenuto della confezione del clarinetto in Si bemolle.
    clarinet_keywork_material:
      name: Materiale chiave per clarinetto
      description: Specifica il materiale del meccanismo delle chiavi del clarinetto
        (ad esempio, ottone, nichel argento, argento placcato).
    clarinet_keywork_plating:
      name: Placcatura della meccanica del clarinetto
      description: Specifica la finitura della placcatura/del materiale della meccanica
        (chiavi) del clarinetto.
    clarinet_mouthpiece_baffle_profile:
      name: Profilo del deflettore del bocchino per clarinetto
      description: Descrive il profilo interno del deflettore/tetto del bocchino del
        clarinetto che Influence la brillantezza e la proiezione del suono.
    clarinet_mouthpiece_beak_shape:
      name: Shapesdel becco del bocchino per clarinetto
      description: Specifica il profilo/angolo esterno del becco per il comfort del
        musicista e la sensazione dell'imboccatura.
    clarinet_mouthpiece_chamber_size:
      name: Taglia della camera del bocchino del clarinetto
      description: Descrive la dimensione relativa della camera di un bocchino per
        clarinetto (come specificato dal Maker), che può Influence il timbro e la
        resistenza all'esecuzione.
    clarinet_mouthpiece_intended_tone:
      name: Bocchino per clarinetto, suono previsto
      description: Descrive l'obiettivo sonoro generale del mercato per il bocchino.
    clarinet_mouthpiece_player_level:
      name: Livello del suonatore di bocchino per clarinetto
      description: Indica il livello tipico di utente a cui è destinato il bocchino.
    clarinet_reed_cut:
      name: Ancia per clarinetto tagliata
      description: Specifica il taglio/profilo dell'ancia (ad esempio, limata o non
        limata e altri stili di taglio di mercato), che Impact sulla risposta e sul
        timbro.
    clarinet_reed_material_type:
      name: Tipo di materiale dell'ancia del clarinetto
      description: Indica il materiale di cui è fatta l'ancia (canna, materiale sintetico
        e sottotipi sintetici comuni).
    clarinet_thumb_rest_type:
      name: Tipo REST per clarinetto
      description: Tipo/caratteristica del REST della mano destra.
    classical_guitar_string_3rd_string_type:
      name: Chitarra classica Stringa 3a stringa tipo
      description: Se la G (3a) stringa è liscia (monofilamento) o avvolta.
    classical_guitar_string_bass_winding_material:
      name: Materiale per avvolgimento del basso in corda per chitarra classica
      description: Il materiale di avvolgimento utilizzato per le corde basse (tipicamente
        le corde da 4 a 6).
    classical_guitar_string_set_configuration:
      name: Configurazione del set di tasti per chitarra classica
      description: Specifica se il prodotto è un set completo o una singola corda
        (in genere per la parte acuta o per quella grave) per chitarra classica.
    clay_modeling_dough_base_material:
      name: Materiale di base in argilla e pasta modellabile
      description: Formulazione primaria/tipologia di base del materiale modellabile.
    clay_modeling_dough_curing_method:
      name: Metodo di stagionatura dell'argilla e della pasta modellabile
      description: Il modo in cui il materiale si solidifica (o rimane riutilizzabile)
        determina gli strumenti necessari e l'uso tipico della cassa.
    clay_paintability:
      name: Verniciabilità dell'argilla
      description: Indica se la superficie di argilla indurita può essere verniciata
        e i tipi di vernice consigliati.
    clay_primary_composition:
      name: Composizione primaria dell'argilla
      description: Materiale di base/legante primario dell'argilla ad asciugatura
        all'aria (ad esempio, a base Paper , a base minerale).
    clay_shooting_discipline:
      name: disciplina del tiro al piattello
      description: Identifica la disciplina o Events di tiro al piattello per cui
        il prodotto è destinato.
    cleaner_format:
      name: Formato più pulito
      description: L'imballaggio/formato del prodotto pulisci vetrini.
    cleaner_sanitizer_intended_area:
      name: Area destinata alla pulizia/disinfezione
      description: La parte principale dello strumento in ottone che il prodotto è
        destinato a pulire/igienizzare.
    cleaning_formula:
      name: Formula detergente
      description: Specifica la principale famiglia chimica di pulizia/disinfezione
        del prodotto (non brand) per facilitare la sicurezza, la compatibilità e il
        filtraggio d'uso.
    cleaning_task_focus:
      name: Obiettivo dell'attività di pulizia
      description: Identifica i principali problemi di pulizia che il lavaggio a secco
        intende risolvere.
    cleanup_method:
      name: Metodo di pulizia
      description: Specifica come la colla deve essere rimossa (mentre è ancora umida)
        da mani, attrezzi e superfici.
    clear_glue_application_method:
      name: metodo di applicazione della colla trasparente
      description: Specifica il tipo di erogatore/applicatore incluso nelle confezioni
        di colla trasparente.
    clear_glue_finish_after_drying:
      name: Finitura trasparente della colla (dopo l'asciugatura)
      description: Descrive l'aspetto della colla una volta asciutta/indurita (ad
        esempio, trasparente come il cristallo o traslucida, lucida o opaca).
    cleat_bolt_pattern:
      name: Schema di fissaggio del bullone di fissaggio
      description: Specifica la configurazione dei bulloni della scarpa utilizzati
        per fissare la tacchetta, che determina la compatibilità tra pedale e scarpa
        (ad esempio, 2 bulloni per MTB contro 3 bulloni per bici da strada).
    cleat_compatibility:
      name: Compatibilità dei tacchetti
      description: Specifica a quali sistemi di pedali o tacchette è compatibile il
        copriscarpe.
    cleat_finish:
      name: Finitura a tacchetto
      description: Specifica la finitura/il rivestimento superficiale del tassello
        di base, che influisce sulla resistenza alla corrosione e sull'aspetto.
    cleat_receptacle_system:
      name: Sistema di aggancio per tacchetti
      description: Identifica l'interfaccia di fissaggio compatibile per tacchetti/tacchetti
        utilizzata sulle scarpe da golf con tacchetti.
    cleat_release_mechanism:
      name: Meccanismo di sgancio del tacchetto
      description: Specifica come una tacchetta da bicicletta si sgancia dal pedale
        (ad esempio, sgancio singolo o sgancio multidirezionale).
    cleat_stud_type:
      name: Tacchetto tipo
      description: Specifica il tipo di costruzione o di fissaggio dei tacchetti/tacchetti
        sulla suola delle scarpe da football americano.
    climate_control_module_function:
      name: Functions Modules di controllo climatico
      description: Specifica il ruolo principale dei Modules nel sistema HVAC del
        veicolo.
    climbing_hold_mounting_type:
      name: Tipo di montaggio per presa da arrampicata
      description: Specifica come la presa viene fissata alla parete o alla tavola
        di allenamento.
    climbing_hold_type:
      name: Tipo di presa da arrampicata
      description: Classifica le Shapes o lo stile dell'impugnatura che definiscono
        il modo in cui viene afferrata.
    climbing_protection_device_type:
      name: Tipo di dispositivo di protezione da arrampicata
      description: Specifica il tipo di dispositivo di protezione (ad esempio, friend,
        nut, chiodo da roccia), aiutando gli scalatori a individuare rapidamente l'attrezzatura
        corretta per una determinata caratteristica della roccia o stile di arrampicata.
    climbing_rope_middle_marking:
      name: Segnaletica centrale della corda da arrampicata
      description: Descrive come vengono identificati il punto medio (e/o le estremità)
        della corda per facilitare le calate in corda doppia in sicurezza.
    climbing_rope_treatment:
      name: variante della corda da arrampicata
      description: Indica qualsiasi finitura idrorepellente, asciutta o protettiva
        applicata alla guaina e/o all'anima della corda.
    climbing_rope_type:
      name: Tipo di corda da arrampicata
      description: Classifica la corda in base alla certificazione UIAA e all'uso
        previsto (ad esempio, corda singola dinamica, mezza corda, corda doppia, corda
        statica, corda accessoria), consentendo all'acquirente di individuare rapidamente
        la corda corretta per la propria attività.
    climbing_safety_certifications:
      name: Certificazioni di sicurezza per l'arrampicata
      description: Elenca gli standard di sicurezza per l'arrampicata e l'uso industriale
        soddisfatti dal dispositivo.
    clip_color:
      name: Clip colore
      description: Colore primario della clip per spartiti musicali.
    clip_mechanism_type:
      name: Tipo di meccanismo a clip
      description: Definisce il meccanismo di chiusura utilizzato da una clip Denaro
        o da un portafoglio digitale Denaro-clip, aiutando l'acquirente a scegliere
        tra le tipologie magnetica, a molla, a leva e altre.
    clip_style:
      name: Stile clip
      description: Identifica lo specifico meccanismo di aggancio utilizzato per fissare
        il supporto, fornendo informazioni sulla compatibilità (ad esempio, morsetto
        a coccodrillo, moschettone).
    clipper_motor_technology:
      name: Tecnologia del motore Clipper
      description: Identifica il tipo di motore utilizzato nel tagliacapelli, la potenza
        Impact , la rumorosità, la durata e la manutenzione.
    closet_configuration:
      name: Configurazione dell'armadio
      description: Definisce la Shapes o layout generale del sistema di cabina armadio
        (ad esempio, a L, a U, a isola).
    closing_mechanism:
      name: Meccanismo di chiusura
      description: Specifica il meccanismo di chiusura del cassetto, ad esempio standard,
        chiusura ammortizzata, chiusura automatica o apertura a pressione.
    cloth_construction:
      name: Costruzione del tessuto
      description: Indica la trama o la finitura del tessuto, che influisce sulla
        velocità e sulla durata (ad esempio, pettinato o lanoso).
    cloth_thickness:
      name: spessore del tessuto
      description: Indica la classe di spessore/peso del panno per lucidatura.
    club_head_material:
      name: Materiale per la testa della mazza
      description: Specifica il materiale principale utilizzato nella costruzione
        della testa della mazza da golf.
    clutch_hydraulic_system_type:
      name: Tipo di sistema idraulico della frizione
      description: Indica la compatibilità dell'azionamento della frizione/sistema
        idraulico (ad esempio, applicazione di conversione frizione idraulica vs frizione
        a cavo).
    clutch_line_connection_type:
      name: Tipo di connessione della linea frizione
      description: Specifica la relazione terminale/interfaccia di raccordo utilizzata
        dalla linea della frizione (importante per la compatibilità con i cilindri
        maestro/secondario e le tubazioni rigide).
    clutch_pressure_plate_actuation_type:
      name: Tipo di attuazione della piastra di pressione della frizione
      description: Indica se la frizione viene disinnestata tramite un meccanismo
        di spinta o di trazione (azionamento a molla a diaframma).
    clutch_pressure_plate_release_mechanism_type:
      name: Tipo di meccanismo di rilascio della piastra di pressione della frizione
      description: Il tipo di interfaccia di rilascio/azionamento utilizzata dalla
        piastra di pressione.
    clutch_pressure_plate_surface_type:
      name: Tipo di superficie della piastra di pressione della frizione
      description: Tipo di superficie di contatto ad attrito della piastra di pressione.
    clutch_slave_cylinder_connection_type:
      name: Tipo di connessione del cilindro secondario della frizione
      description: Interfaccia di relazione della linea idraulica sul cilindro secondario
        (porta filettata, attacco rapido, Banjo, ecc.).
    clutch_slave_cylinder_mounting_type:
      name: Tipo di montaggio del cilindro secondario della frizione
      description: Modalità di montaggio del cilindro secondario sulla trasmissione/campana
        (ad esempio, imbullonato, a clip, concentrico integrato).
    coating_type:
      name: Tipo di rivestimento
      description: Identifica qualsiasi rivestimento esterno, glassa o copertura applicata
        alla barretta di cereali (ad esempio, cioccolato, yogurt).
    cocking_mechanism:
      name: Meccanismo di armamento
      description: Specifica il metodo o dispositivo principale utilizzato per armare
        o disarmare la freccia della balestra.
    cocktail_garnish_form:
      name: Forma per guarnizione cocktail
      description: Descrive come la guarnizione viene presentata/lavorata per l'uso
        (ad esempio, Fresh o disidratata).
    cocktail_mix_variety:
      name: Varietà di miscele per cocktail
      description: Indica il cocktail specifico che si intende creare con questa miscela
        (ad esempio, Margarita, Mojito, Piña Colada).
    cocktail_napkin_features:
      name: Caratteristiche del tovagliolo da cocktail
      description: Highlight le caratteristiche funzionali, pratiche ed ecocompatibili
        dei tovaglioli da cocktail.
    cocktail_pick_tip_style:
      name: stile di punta per cocktail
      description: Descrive la punta. Shapes/caratteristiche utilizzate per forare
        o trattenere le guarnizioni.
    cocktail_pick_top_handle_style:
      name: Stile di stuzzicadenti da cocktail conhandle
      description: Descrive la parte superiore decorativa o la forma handle utilizzata
        per la presa o la presentazione.
    cocktail_type:
      name: Tipo di cocktail
      description: Indica la ricetta o lo stile specifico del cocktail rappresentato
        dal prodotto premiscelato (ad esempio, Margarita, Negroni, Piña Colada).
    cocktail_umbrella_handle_pick_material:
      name: handle/materiale per ombrellino da cocktail
      description: Materiale della parte a bastoncino/stelo (esclusa Canopy) dell'ombrellino
        da cocktail.
    cocoa_processing_method:
      name: Metodo di lavorazione del cacao
      description: Specifica il metodo di lavorazione della polvere di cacao (ad esempio,
        naturale, olandese, nero).
    cocoa_product_form:
      name: Formato del prodotto cacao
      description: Definisce la forma fisica in cui viene venduto il prodotto a base
        di cacao.
    coconut_husk_status:
      name: stato del guscio di cocco
      description: Indica il grado di rimozione del guscio esterno della noce di cocco,
        con conseguenti ripercussioni su utilizzo, conservazione e spreco.
    coconut_maturity_stage:
      name: stadio di maturazione della noce di cocco
      description: Identifica lo stadio di sviluppo della noce di cocco al momento
        della raccolta, che Influence fortemente il sapore, il contenuto di acqua
        e l'uso culinario (ad esempio, se consumata come bevanda o per cucinare).
    coconut_oil_refinement_type:
      name: tipo di raffinazione dell'olio di cocco
      description: Specifica il grado di raffinazione o di qualità dell'olio di cocco,
        ad esempio vergine, raffinato, MCT, frazionato.
    coconut_preparation_form:
      name: Forma di preparazione del cocco
      description: Specifica come la noce di cocco viene fisicamente preparata o tagliata
        (intera, a fette, grattugiata, in purea, ecc.), aiutando l'acquirente a trovare
        rapidamente il formato necessario per le ricette o per uno spuntino.
    coffee_bean_species:
      name: Specie di chicchi di caffè
      description: Specifica la specie di chicchi di caffè utilizzati nel prodotto.
    coffee_beverage_variety:
      name: varietà di bevande al caffè
      description: Classifica le bevande a base di caffè pronte da consumare o da
        miscelare in base alla tipologia.
    coffee_processing_method:
      name: Metodo di lavorazione del caffè
      description: Indica la tecnica di lavorazione post-raccolta utilizzata sui chicchi
        di caffè.
    coil_material:
      name: Materiale della bobina
      description: Specifica il materiale principale o il tipo di rete utilizzato
        nella serpentina di riscaldamento, Influence sapore, durata e compatibilità
        con il controllo della temperatura.
    coil_spring_design:
      name: Design della molla elicoidale
      description: Specifica la rigidità/Shapes della molla elicoidale che influenza
        le caratteristiche Ride .
    coil_spring_finish_coating:
      name: Finitura/rivestimento della molla elicoidale
      description: Finitura superficiale o rivestimento applicato per la protezione
        dalla corrosione.
    coil_spring_material:
      name: Materiale per molle elicoidali
      description: Materiale/composizione principale della molla elicoidale.
    coil_system_type:
      name: Tipo di sistema a bobina
      description: Descrive in dettaglio lo specifico sistema di molle o spirali utilizzato
        nei materassi applicabili, come ad esempio le molle insacchettate o le molle
        Bonnell.
    coil_type:
      name: Tipo di bobina
      description: Descrive la struttura o la tecnologia della bobina utilizzata,
        Impact sulla produzione di vapore e sull'aroma.
    coin_grade_numismatic:
      name: Grado di conservazione delle monete (numismatica)
      description: Grado standardizzato della moneta (ad esempio, scala Sheldon o
        grado aggettivale).
    coin_strike_or_finish:
      name: conio o finitura della moneta
      description: Il tipo di conio o la finitura della moneta (ad esempio, conio
        di circolazione, proof).
    coin_strike_type:
      name: tipo di conio della moneta
      description: Descrive il tipo di conio/finitura della moneta (ad esempio, proof,
        conio per la circolazione).
    collar_style:
      name: Stile del colletto
      description: Definisce il design del colletto o della scollatura del capo.
    collectible_gun_accessories_included:
      name: Accessori per armi da collezione inclusi
      description: Elenca gli accessori e la documentazione inclusi con l'arma da
        collezione (ad esempio, fondina, custodia, baionetta, documenti).
    collectible_gun_firing_mechanism:
      name: Meccanismo di sparo da collezione
      description: Specifica il tipo di meccanismo di sparo/accensione dell'arma da
        fuoco per le armi da collezione (in particolare pezzi antichi e storici).
    collectible_knife_blade_finish:
      name: Finitura della lama del coltello da collezione
      description: Descrive la finitura/variante superficiale della lama in termini
        di aspetto (e talvolta di resistenza alla corrosione).
    color_code_system:
      name: sistema di codici colore
      description: Identifica il sistema di codifica a colori utilizzato per il riferimento
        numerico del colore della thread (ad esempio, DMC, Anchor), se applicabile.
    color_coding_standard:
      name: standard di codifica a colori
      description: Indica se la targa segue un codice colore internazionale (ad esempio,
        IWF o IPF) o un altro schema.
    color_effect:
      name: Effetti di colore
      description: Specifica tecniche o effetti di colorazione speciali applicati
        alle extension per capelli.
    color_family:
      name: famiglia Colore
      description: Famiglia di colori di alto livello per inchiostro sumi (utile quando
        il colore è troppo granuloso, ad esempio, nero caldo rispetto al blu-nero).
    color_finish:
      name: Finitura del colore
      description: Specifica la finitura dei componenti visibili della protezione
        per le mani (ad esempio, opaca o lucida) quando il solo colore non è sufficiente.
    coloring_finish:
      name: Finitura colorante
      description: Specifica la finitura visiva o l'effetto speciale prodotto dalla
        colorazione, come ad esempio l'effetto metallico o neon.
    comb_material:
      name: Materiale del pettine
      description: Materiale del pettine dell'armonica (il corpo che forma le camere
        d'aria).
    comb_type:
      name: Tipo di pettine
      description: Classifica i pettini per la cura dei cavalli in base alla loro
        funzione principale (ad esempio, striglia, pettine per la criniera, pettine
        per tirare), aiutando l'acquirente a trovare rapidamente lo strumento giusto
        per specifiche esigenze di toelettatura.
    combat_shorts_cut_style:
      name: pantaloncini da combattimento stile taglio
      description: Indica il taglio o la vestibilità specifica per i pantaloncini
        da sport da combattimento (ad esempio, taglio alto, taglio retrò, compressione).
    comic_creator_role:
      name: Comic Creator ruolo
      description: Specifica il ruolo Creator accreditato in relazione all'inserzione
        (ad esempio, scrittore, artista).
    commemorative_coin_finish:
      name: Finitura della moneta commemorativa
      description: Descrive il tipo di coniazione/finitura di una moneta commemorativa.
    commemorative_coin_mint_mark:
      name: Marchio di zecca della moneta commemorativa
      description: Indica la presenza (o l'assenza) del marchio di zecca sulla moneta.
    commemorative_subject:
      name: soggetto commemorativo
      description: Oggetto commemorativo primario (Events, persona, luogo, anniversario,
        organizzazione, ecc.).
    commercial_vehicle_class:
      name: Classe del veicolo commerciale
      description: Classe normativa/industriale basata sul GVWR (peso lordo del veicolo)
        utilizzata per descrivere la classe di peso di un veicolo commerciale ai fini
        della navigazione e del filtraggio.
    compass_damping_medium:
      name: Compass della bussola medio
      description: Specifica il mezzo utilizzato per stabilizzare il movimento dell'ago
        all'interno della capsula della bussola.
    compass_illumination_type:
      name: Tipo di illuminazione Compass
      description: Specifica come vengono rese visibili le indicazioni della bussola
        in condizioni di scarsa illuminazione (ad esempio, vernice luminescente, trizio,
        retroilluminazione a LED).
    compass_mounting_style:
      name: Stile di montaggio Compass
      description: Descrive come la bussola viene trasportata, indossata o installata.
    compass_scale_units:
      name: Unità Compass della bussola
      description: Identifica le unità di misura (gradi, millesimi o entrambe) indicate
        sull'involucro della bussola.
    compatible_abs_system:
      name: Sistema stirene acrilonitrile butadiene compatibile
      description: Indica se la pompa freno è destinata a veicoli dotati di sistema
        di iniezione di acrilonitrile butadiene stirene.
    compatible_adapter_brand:
      name: branddell'adattatore compatibile
      description: Identifica la brand della testa della mazza da golf per la quale
        l'adattatore è preconfigurato per adattarsi all'asta.
    compatible_airbag_system_type:
      name: Tipo di sistema airbag compatibile
      description: Indica la generazione/le caratteristiche del sistema airbag con
        cui il componente è compatibile (ad esempio, monostadio o bistadio).
    compatible_amplifier_fit_method:
      name: Metodo di montaggio dell'amplificatore compatibile
      description: Indica come viene definita la compatibilità per la cover/cassa
        (adattamento universale, specifico per modello o per dimensione).
    compatible_apparatus:
      name: Apparecchiature portatili
      description: Specifica l'attrezzo o l'attività ginnica per cui sono progettate
        le impugnature.
    compatible_archery_tool:
      name: Attrezzo da tiro con l'arco compatibile
      description: Indica lo strumento o l'attrezzatura principale per il tiro con
        l'arco con cui l'accessorio è progettato per funzionare.
    compatible_axle_size:
      name: Dimensioni dell'asse compatibili
      description: Specifica il diametro del mozzo/asse o lo standard thread per cui
        è progettato il poggiapiedi (ad esempio, 10 mm/3⁄8 pollici, 14 mm, 3/8 pollici
        26 TPI).
    compatible_axle_type:
      name: Tipo di asse compatibile
      description: Identifica lo standard o gli standard di fissaggio dell'asse posteriore
        dell'assistenza del trainer, come ad esempio il bloccaggio rapido o il passante
        taglia.
    compatible_axle_weight_rating:
      name: Portata massima dell'asse compatibile
      description: Specifica la portata massima per asse del rimorchio (capacità per
        asse) per cui è progettato il gruppo freno del rimorchio.
    compatible_bait_type:
      name: Tipo di esca compatibile
      description: Consente di identificare i tipi di esche da pesca con cui il trapano
        per esche è compatibile, in modo che i pescatori possano scegliere uno strumento
        adatto alla loro esca preferita.
    compatible_bass_scale_length:
      name: lunghezza della scala del basso compatibile
      description: Indica la/le lunghezza/e della/e scala/e bassa/e per cui è destinato
        il set di corde (importante per la corretta lunghezza di avvolgimento e l'adattamento).
    compatible_battle_top_system:
      name: Sistema di top da battaglia compatibile
      description: Identifica l'ecosistema o la serie di prodotti di punta per cui
        è progettato il top (utilizzato per garantire la compatibilità tra componenti
        e arena).
    compatible_bb_size:
      name: Taglia BB compatibile
      description: Indica il diametro dei pallini da softair del prodotto assistenza.
    compatible_bed_frame_style:
      name: Frame letto compatibile
      description: Specifica il tipo di letto o Frame per cui l'accessorio è progettato
        per adattarsi.
    compatible_bicycle_tire_type:
      name: Tipo di pneumatico per bicicletta compatibile
      description: Specifica quali tipi di pneumatici per bicicletta il prodotto può
        riparare o sigillare.
    compatible_bike_component:
      name: Componente compatibile per bicicletta
      description: Specifica quale componente della bicicletta è progettato per essere
        riparato dall'utensile o dal prodotto.
    compatible_billiard_game:
      name: Gioco di biliardo compatibile
      description: Identifica il/i formato/i di gioco del biliardo per cui è stato
        progettato il tavolo, garantendo che i clienti scelgano un tavolo adatto al
        loro gioco.
    compatible_billiard_table_size:
      name: Piatto da biliardo compatibile
      description: Specifica la/le lunghezza/e standard del tavolo per cui la copertura
        è progettata per adattarsi, garantendo all'acquirente di scegliere una copertura
        della misura corretta per il proprio tavolo da biliardo.
    compatible_bit_type:
      name: Tipo di punta compatibile
      description: Tipi di punte con cui è possibile utilizzare la protezione.
    compatible_blade_hosel:
      name: Calice della lama compatibile
      description: Indica il tipo di attacco/cono della lama che l'albero accetta,
        garantendo che l'albero e la lama si adattino correttamente.
    compatible_blade_system:
      name: Sistema della lama compatibile
      description: Indica il sistema/formato di lame di ricambio che il coltello accetta
        (ad esempio, lame standard per hobbisti n. 11, lame Segmenti a spezzare).
    compatible_boat_weaving_shuttle_loom:
      name: Telaio per navetta per tessitura di barche compatibile
      description: Con quali tipi di telaio è previsto l'utilizzo della navetta per
        barche?
    compatible_bobbin_type:
      name: Tipo di bobina compatibile
      description: Indica il tipo di bobina/rocchetto che la navetta per barche è
        progettata per utilizzare.
    compatible_bottle_mouth:
      name: Bocca di bottiglia compatibile
      description: Tipo di collo della bottiglia o diametro a cui è progettato per
        adattarsi la cannuccia o il tappo.
    compatible_bow_attachment_system:
      name: Sistema di fissaggio dell'arco compatibile
      description: Indica l'interfaccia dell'arto o dell'accessorio per cui il componente
        è progettato (ad esempio, ILF, attacco a vite, sgancio rapido).
    compatible_bow_crossbow_type:
      name: Tipo di arco/balestra compatibile
      description: Indica il tipo di arco o balestra per cui l'accessorio è progettato.
    compatible_brake_fluid:
      name: Liquido freni compatibile
      description: Specifiche DOT del liquido freni con cui sono progettati per essere
        compatibili le guarnizioni/i materiali del cilindro principale.
    compatible_brake_pad:
      name: Pastiglia freno compatibile
      description: Indica per quali mescole di pastiglie freno è omologato il disco,
        garantendo sicurezza e usura ottimale.
    compatible_brake_service_system:
      name: Sistema di manutenzione freni compatibile
      description: Specifica se il componente è destinato a freni a disco, freni a
        tamburo o entrambi.
    compatible_brake_system:
      name: Sistema frenante compatibile
      description: Specifica le principali note di compatibilità del sistema relative
        all'utilizzo del liquido freni.
    compatible_brake_type:
      name: Tipo di freno compatibile
      description: Specifica il tipo di freno con cui il ripiano è compatibile, ad
        esempio a disco o a cerchio.
    compatible_brass_instrument_finish:
      name: Finitura dello strumento in ottone compatibile
      description: Specifica su quali finiture di strumenti in ottone il detergente
        può essere utilizzato in sicurezza senza danneggiare la finitura.
    compatible_building_toy_system:
      name: Sistema di costruzioni compatibile
      description: Indica con quale sistema/standard di costruzione il giocattolo
        è compatibile (o dimensioni equivalenti), ad esempio compatibile con LEGO
        o proprietario.
    compatible_capo_fretboard_radius:
      name: Raggio della tastiera del capotasto compatibile
      description: Specifica il raggio/profilo della tastiera per cui il capotasto
        è progettato per garantire un contatto ottimale e una stabilità dell'accordatura.
    compatible_capo_number_of_strings:
      name: Numero di capo compatibile della stringa
      description: Indica quante corde il capotasto è progettato per bloccare (utile
        per chitarre a 6, 7, 8, 12 corde e strumenti speciali).
    compatible_cardio_machine_type:
      name: Tipo di macchina cardio compatibile
      description: Indica il tipo di macchina cardio con cui l'accessorio o il componente
        è progettato per funzionare.
    compatible_chain_link_type:
      name: Tipo di maglia compatibile
      description: Identifica lo stile della maglia della catena dell'attrezzo di
        assistenza (standard, mezza maglia, maglia rapida, ecc.).
    compatible_chain_size:
      name: Taglia della catena compatibile
      description: Specifica la larghezza della catena o gli standard di passo (ad
        esempio, 1/8 di pollice, 3/32 di pollice) dell'utensile assistenza.
    compatible_chain_width:
      name: Larghezza della catena compatibile
      description: Indica con quale taglia di catena è progettata la ruota libera.
    compatible_chip_denomination:
      name: denominazione del chip compatibile
      description: Indica quali denominazioni chip sono incluse nel vassoio/cassa
        Label o posizioni dedicate per (o destinate a organizzare).
    compatible_clarinet_mouthpiece_ligature:
      name: Legatura compatibile per bocchino di clarinetto
      description: Indica lo standard di adattamento della legatura o le note di compatibilità
        per il bocchino.
    compatible_classical_guitar_string_scale_length:
      name: Compatibile chitarra classica, lunghezza della scala
      description: Compatibilità tra la lunghezza della scala e la lunghezza della
        tastiera della chitarra per il set.
    compatible_clay_target_size:
      name: Compatibile bersaglio in argilla taglia
      description: Elenca le dimensioni o Shapes dei bersagli in argilla che il tornitore
        può accettare per una vestibilità e prestazioni ottimali.
    compatible_cleat_system:
      name: Sistema della tacchetta compatibile
      description: Specifica l'interfaccia della tacchetta o lo schema di foratura
        dell'assistenza pedali in modo che i ciclisti possano abbinare le proprie
        scarpe al sistema corretto.
    compatible_clipless_pedal_system:
      name: Sistema di pedali a sgancio rapido compatibile
      description: Identifica lo specifico standard di pedale/tacchetta a sgancio
        rapido con cui il prodotto è progettato per interfacciarsi.
    compatible_clutch_type:
      name: Tipo di frizione compatibile
      description: Compatibilità dell'interfaccia della frizione per il volano (ove
        applicabile).
    compatible_coffee_pod_system:
      name: Sistema di capsule da caffè compatibile
      description: Specifica la macchina da caffè o il sistema di preparazione per
        cui sono progettate le cialde o le capsule.
    compatible_construction_set_system:
      name: Sistema di costruzioni compatibile
      description: Indica con quale sistema di costruzione/ecosistemabrand il set
        è compatibile (ad esempio, compatibile con LEGO, compatibile con DUPLO).
    compatible_contra_bass_clarinet_peg_stand:
      name: Supporto/piolo compatibile per clarinetto contrabbasso
      description: Indica il tipo di interfaccia supporto/perno o lo stile di assistenza
        richiesto.
    compatible_coolant_chemistry:
      name: Composizione chimica del liquido di raffreddamento compatibile
      description: Specifica con quali famiglie di composti chimici del liquido di
        raffreddamento l'additivo è stato formulato per essere compatibile.
    compatible_cooling_system_material:
      name: Materiale compatibile con il sistema di raffreddamento
      description: Specifica per quali sistemi/materiali di raffreddamento è sicuro
        il lavaggio del radiatore (ad esempio, radiatori in alluminio, sistemi con
        componenti in metalli misti).
    compatible_crib_format:
      name: Formato del lettino compatibile
      description: Definisce la categoria generale di taglie o Shapes del materasso
        o del lenzuolo per cui l'accessorio è progettato.
    compatible_cross_stitch_fabric_count:
      name: Conteggio del tessuto per punto croce compatibile
      description: Quantità di tessuto consigliata per ricamare il disegno.
    compatible_cross_stitch_frame:
      name: Framecompatibile per punto croce
      description: Indica per cosa è progettato il Frame per essere utilizzato (uso
        a mano, su supporto da tavolo, su supporto da pavimento o universale).
    compatible_crossbar:
      name: Traversa compatibile
      description: Compatibilità del portapacchi con le barre trasversali del portapacchi
        da tetto del veicolo (se montato sul tetto), comprese Shapes/profili standard
        delle barre trasversali.
    compatible_cycling_cleat:
      name: Tacchetta da ciclismo compatibile
      description: Specifica il sistema di tacchette o pedali con cui le scarpe da
        ciclismo sono progettate per funzionare.
    compatible_cymbal_size:
      name: Taglia del piatto compatibile
      description: Specifica il diametro del piatto previsto (o massimo) per cui la
        cassa è progettata; si tratta di compatibilità con la taglia del piatto, non
        con il diametro esterno della cassa.
    compatible_device_type:
      name: Tipo di dispositivo compatibile
      description: Indica il tipo di dispositivo che il supporto è progettato per
        sostenere (ad esempio, monitor/TV, tablet, smartphone, lettore DVD portatile).
    compatible_dock_structure_type:
      name: Tipo di struttura di base compatibile
      description: La struttura di base su cui sono progettati i gradini.
    compatible_dough_type:
      name: Tipo di impasto compatibile
      description: Specifica per quali tipi/marche di pasta sono progettati gli strumenti
        (ad esempio, pasta modellabile standard, argilla da modellare).
    compatible_drawing_ink_surface:
      name: Superficie compatibile con inchiostro da disegno
      description: Indica le superfici/i substrati consigliati per ottenere le migliori
        prestazioni.
    compatible_drivetrain_brand:
      name: Brand del gruppo trasmissione compatibile
      description: Indica la marca della trasmissione o del sistema frenante con cui
        il cavo è progettato per funzionare.
    compatible_drivetrain_speeds:
      name: Velocità della trasmissione compatibili
      description: Specifica il numero di velocità della trasmissione (ad esempio,
        10 velocità) della guarnitura o della corona.
    compatible_equipment:
      name: Attrezzatura compatibile
      description: Specifica il tipo di attrezzatura per sport invernali che la morsa
        è progettata per sostenere.
    compatible_evap_system:
      name: Sistema EVAP compatibile
      description: Indica se il tappo del serbatoio è progettato per soddisfare i
        requisiti del sistema EVAP (ad esempio, la tenuta secondo le specifiche OEM)
        e ridurre l'accensione della spia di controllo del motore.
    compatible_exercise_bike_style:
      name: Compatibile con cyclette
      description: Indica per quali modelli di cyclette è progettato l'accessorio
        o il pezzo di ricambio.
    compatible_fencing_weapon:
      name: arma da scherma compatibile
      description: Specifica per quale arma o disciplina di scherma è destinata la
        giacca o il lamé.
    compatible_fiber_type:
      name: Tipo di fibra compatibile
      description: Tipi principali di fibre che la cardatrice a tamburo è progettata
        per lavorare efficacemente.
    compatible_fin_box_system:
      name: Sistema del box pinna compatibile
      description: Identifica la scatola o il sistema di montaggio per cui la pinna
        è progettata, aiutando i surfisti ad acquistare pinne compatibili con la loro
        tavola da surf (ad esempio, FCS II, Futures, US Box).
    compatible_fingerboard_radius:
      name: Raggio della tastiera compatibile
      description: Specifica il raggio della tastiera (piatto, curvo o composto) per
        cui il capotasto è progettato per garantire una pressione uniforme e ridurre
        il ronzio.
    compatible_finish_type:
      name: Tipo di finitura compatibile
      description: Indica per quali tipi di finitura dello strumento lo spray è considerato
        sicuro.
    compatible_fishing_reel_type:
      name: Tipo di mulinello da pesca compatibile
      description: Specifica il tipo di mulinello da pesca per cui l'accessorio è
        progettato per essere utilizzato (ad esempio, spinning, baitcasting, mosca).
    compatible_fly_line_weight:
      name: Peso della lenza compatibile
      description: Indica i pesi delle code da mosca AFTMA che la bobina è progettata
        per contenere.
    compatible_flywheel_type:
      name: Tipo di volano compatibile
      description: Specifica il tipo di volano con cui è destinata ad essere utilizzata
        la piastra di pressione della frizione.
    compatible_football_kick_type:
      name: Tipo di calcio compatibile
      description: Identifica le situazioni di calcio per le quali il prodotto è stato
        progettato (ad esempio, calcio d'inizio, field goal), aiutando gli atleti
        a trovare rapidamente l'attrezzatura appropriata.
    compatible_fuel_system_type:
      name: Tipo di sistema di alimentazione compatibile
      description: Specifica il sistema di alimentazione del carburante per cui è
        progettato il pulitore.
    compatible_gas_type:
      name: Tipo di gas compatibile
      description: Identifica il tipo di gas compresso per cui è progettato il serbatoio
        d'aria per paintball.
    compatible_gel_wax_additives:
      name: Additivi compatibili per cera in gel
      description: Specifica quali tipi di additivi sono compatibili con questa cera
        in gel (ad esempio, tipo di colorante, componente).
    compatible_glaze_layering:
      name: Stratificazione di smalto compatibile
      description: Se lo smalto è destinato ad essere sovrapposto ad altri smalti
        per ottenere effetti particolari.
    compatible_golf_bag_type:
      name: Tipo di borsa da golf compatibile
      description: Indica per quali formati di sacca da golf si adatta la custodia
        o la cassa.
    compatible_ground_polarity:
      name: Polarità di terra compatibile
      description: Indica se il regolatore di tensione è destinato a sistemi elettrici
        per veicoli con massa negativa o positiva (oppure se non è sensibile alla
        polarità).
    compatible_guitar_body_shape:
      name: Shapesdel corpo della chitarra compatibili
      description: Indica per quale tipo di corpo/Shapes di chitarra è progettata
        la cassa.
    compatible_guitar_case:
      name: Custodia per chitarra compatibile
      description: Specifica in quali modelli di cassa per chitarra l'umidificatore
        è progettato per adattarsi e funzionare correttamente.
    compatible_guitar_scale_length:
      name: Lunghezza della scala della chitarra compatibile
      description: Indica a quale/i lunghezza/i di scala di chitarra è destinato il
        set di corde (in base alla lunghezza dell'avvolgimento/lunghezza totale).
    compatible_gun_platform:
      name: Piattaforma per armi compatibile
      description: Specifica la piattaforma operativa o la fonte di alimentazione
        con cui il prodotto è compatibile (ad esempio, AEG, GBB, HPA).
    compatible_hair_length:
      name: Lunghezza dei capelli compatibile
      description: Specifica la lunghezza o il volume massimo dei capelli che il copricapo
        può ospitare comodamente.
    compatible_head_and_neck_restraint_system:
      name: Sistema di ritenuta per testa e collo compatibile
      description: Indica se il casco include punti di ancoraggio e/o è compatibile
        con i sistemi di ritenuta per testa e collo (ad es. HANS), specificando lo
        stato di inclusione/installazione dei punti di ancoraggio.
    compatible_helmet_certification_standard:
      name: Standard di certificazione del casco compatibile
      description: Indica eventuali standard di sicurezza o certificazioni per il
        casco Context l'accessorio è progettato per l'assistenza (ad esempio, le pellicole
        a strappo per uso agonistico spesso fanno riferimento a specifiche regole
        di omologazione).
    compatible_helmet_shell_size:
      name: Calotta per casco compatibile
      description: Indica a quale/i taglia/e di calotta del casco si adatta il componente
        interno di ricambio (le taglie della calotta corrispondono spesso a intervalli
        di taglie come XS–S, M, L–XL).
    compatible_helmet_size:
      name: Taglia del casco compatibile
      description: Indica la taglia del casco con cui la maschera facciale è compatibile.
    compatible_helmet_type:
      name: Tipo di casco compatibile
      description: Categoria casco per cui è progettato l'assistenza al collo.
    compatible_hitch_receiver_size:
      name: Compatibile gancio di traino piatto
      description: L'apertura del ricevitore del gancio di traino misura l'accessorio
        è progettato per adattarsi (per accessori da gancio di traino).
    compatible_hook_size:
      name: Dimensioni dell'uncinetto compatibili
      description: Dimensioni dell'uncinetto system(s) and/or taglia range the organizer
        is designed to fit (eg., US letter/number taglia, metrica mm range).
    compatible_horse_coat_type:
      name: Tipo di mantello del cavallo compatibile
      description: Specifica le caratteristiche del mantello del cavallo per cui il
        dispositivo di rimozione del pelo morto è più adatto (ad esempio, mantello
        invernale folto o mantello sensibile).
    compatible_host_platform:
      name: Piattaforma ospitata compatibile
      description: Specifica con quali piattaforme ospitata o dispositivi il pad titolare
        del trattamento è compatibile (ad es. Windows, macOS, iOS, Android) o se può
        funzionare autonomamente senza un computer.
    compatible_inflation_gas:
      name: gas di protezione compatibile
      description: Specifica con cosa deve essere gonfiato il palloncino (aria, elio
        o entrambi).
    compatible_injection_type:
      name: Tipo di iniezione compatibile
      description: Indica per quale sistema di iniezione del carburante il prodotto
        è progettato per la pulizia.
    compatible_instrument_surface_material:
      name: Superficie/materiale dello strumento compatibile
      description: Indica su quali superfici/materiali dello strumento è destinato
        l'uso del lucidante.
    compatible_intercom_system:
      name: Sistema intercom compatibile
      description: Indica la predisposizione/compatibilità del casco per il montaggio
        o l'installazione di un sistema di interfono/comunicazione.
    compatible_interior_material:
      name: Materiale interno compatibile
      description: Indica per quali materiali degli interni del veicolo lo smacchiatore
        è sicuro/efficace (ad esempio, moquette, rivestimenti in tessuto, pelle, vinile).
    compatible_kayak_type:
      name: Tipo di kayak compatibile
      description: Elenca i principali modelli di kayak su cui è progettato il kit
        per la vela.
    compatible_license_plate_hole_pattern:
      name: Schema di fori compatibile per targhe identificative
      description: Specifica la configurazione dei fori di montaggio supportati dal
        supporto (lato veicolo e/o lato piastra).
    compatible_license_plate_size:
      name: Targa identificativa compatibile taglia
      description: Indica la/le targa/e regionale/i o dimensionale/e identificata/e
        per cui è progettato il supporto/supporto.
    compatible_loom:
      name: Telaio compatibile
      description: Specifica il tipo o i tipi di telaio con cui è destinato ad essere
        utilizzato il battente per tessitura piana.
    compatible_loom_type:
      name: Tipo di telaio compatibile
      description: Indica la configurazione di tessitura con cui il battente è destinato
        ad essere utilizzato (ad esempio, telai a pettine rigido rispetto a telai
        per arazzi).
    compatible_machine_type:
      name: Tipo di macchina compatibile
      description: Indica con quale tipo di configurazione di trapuntatura è progettato
        il Frame (solo trapuntatura a mano, macchina da cucire nazionale, macchina
        per trapuntatura a braccio lungo).
    compatible_mast_type:
      name: Tipo di albero compatibile
      description: 'Specifica per quali diametri dell''albero è progettata la vela:
        diametro ridotto (RDM), diametro standard (SDM) o entrambi.'
    compatible_model_system_train_scale:
      name: Sistema di modellismo compatibile (scala ferroviaria)
      description: Specifica la scala/il sistema di modellismo ferroviario per cui
        l'accessorio è compatibile, ove applicabile (ad esempio, HO, N, O).
    compatible_mounting_surface:
      name: Superficie di montaggio compatibile
      description: La superficie o l'oggetto su cui la clip è progettata per agganciarsi.
    compatible_mouthpiece_patch:
      name: Patch per boccaglio compatibile
      description: Indica se il bocchino è progettato per l'uso con cuscinetti/tamponi
        e l'intervallo di spessore consigliato per i cuscinetti.
    compatible_mouthpiece_type:
      name: Tipo di bocchino compatibile
      description: Indica il tipo di bocchino/attacco per cui è progettato il mellofono
        (generalmente attacchi a corno francese o a tromba, a seconda del modello).
    compatible_neck_profile_width:
      name: Profilo/larghezza del collo compatibile
      description: Indica il profilo/larghezza del manico della chitarra per cui il
        capotasto è progettato (ad esempio, manico stretto per chitarra elettrica
        vs manico largo per chitarra classica).
    compatible_needle_size:
      name: Dimensioni dell'ago compatibili
      description: Indica le dimensioni dell'ago/tipi per cui la cassa è destinata
        ad adattarsi (ad esempio, lunghezze di aghi da ricamo, arazzo, cucito a mano).
    compatible_needle_system:
      name: Sistema degli aghi compatibile
      description: Sistemi di aghi con cui la macchina è compatibile (ad esempio,
        130/705H).
    compatible_parking_brake_mechanism:
      name: Meccanismo del freno di stazionamento compatibile
      description: Indica se la pinza è progettata per funzionare con un meccanismo
        di freno di stazionamento integrato.
    compatible_pedal_instrument_type:
      name: Tipo di strumento a pedale compatibile
      description: Specifica con cosa è destinato ad essere utilizzato il pedale (es.
        pianoforte digitale, tastiera/sintetizzatore, MIDI titolare del trattamento).
    compatible_pedal_type:
      name: Tipo di pedale compatibile
      description: Indica il tipo di pedale o il sistema per cui la cinghia o la clip
        sono progettate per adattarsi (ad esempio, piattaforma, SPD, Look Keo).
    compatible_pin_type:
      name: Tipo di spillo compatibile
      description: Con che tipo di spillo è progettato per essere utilizzato il tappetino
        (o se è compatibile con gli spilli).
    compatible_pipe_filter_size:
      name: Filtro per tubi compatibile
      description: Indica la dimensione o il tipo di filtro che la tubatura è progettata
        per accettare (oppure che non è necessario alcun filtro).
    compatible_plate_size:
      name: Taglia del piatto compatibile
      description: Dimensioni della piastra balistica o taglia standardizzata che
        il giubbotto può accettare.
    compatible_play_vehicle_scale:
      name: Scala del veicolo giocattolo compatibile
      description: Indica la scala del giocattolo per cui l'accessorio è progettato
        (ad esempio, 1:64), migliorando l'adattamento/compatibilità per i collezionisti
        e i sistemi di tracciamento.
    compatible_playing_surface:
      name: Superficie di gioco compatibile
      description: Indica il tipo di campo o superficie di gioco per cui sono progettate
        le scarpe da football americano.
    compatible_pole_dimensions:
      name: Dimensioni del palo compatibile
      description: Specifica la dimensione della sezione trasversale del palo per
        cui l'accessorio si adatta.
    compatible_pole_shape:
      name: Shapesdi pali compatibili
      description: Specifica le Shapes della sezione trasversale del palo o del colonnato
        per cui è progettata la spaziatura interna.
    compatible_power_steering_system:
      name: Sistema servosterzo compatibile
      description: Indica il tipo o i tipi di sistema di sterzo per cui il fluido
        è destinato.
    compatible_powerplant_type:
      name: Tipo di motore compatibile
      description: Indica il sistema di propulsione della pistola ad aria compressa
        per cui il componente è destinato (ad esempio, a molla e pistone, a CO2, PCP).
    compatible_presser_foot:
      name: Piedino compatibile
      description: Specifica il sistema di montaggio/compatibilità del piedino premistoffa
        supportato dalla macchina da cucire (ad esempio, a scatto o a vite; gambo
        basso/alto/inclinato). Utilizzare "Universale/Multiplo" se sono supportati
        più sistemi o se sono inclusi degli adattatori.
    compatible_protective_gear:
      name: Dispositivi di protezione compatibili
      description: Specifica con quali altri dispositivi di protezione individuale
        è progettato per funzionare il collare ortopedico.
    compatible_protective_gear_integration:
      name: Integrazione compatibile con dispositivi di protezione individuale
      description: Descrive come la protezione è pensata per essere indossata o integrata
        con altri accessori (ad esempio, tasca interna, cinghia di fissaggio indipendente).
    compatible_punching_bag_type:
      name: Tipo di sacco da boxe compatibile
      description: Specifica con quali modelli di sacco da boxe o da allenamento il
        prodotto è compatibile.
    compatible_racing_discipline:
      name: disciplina di gara compatibile
      description: La/le disciplina/e del motorsport per cui il casco è progettato/certificato.
    compatible_rc_scale:
      name: Compatibile RC scala
      description: Indica il rapporto di scala RC (ad esempio, 1:10) per cui l'accessorio
        o il componente è progettato per adattarsi.
    compatible_recorder_size:
      name: Taglia del flauto dolce compatibile
      description: Specifica per quale/i taglia/e di flauto dolce è progettata la
        cassa.
    compatible_recorder_type:
      name: Tipo di flauto dolce compatibile
      description: Specifica il tipo di flauto dolce (famiglia/taglia) con cui l'accessorio
        è compatibile (ad esempio, soprano, contralto).
    compatible_reed_cut:
      name: Taglio dell'ancia compatibile
      description: Specifica con quale stile di taglio dell'ancia la legatura è destinata
        ad essere compatibile (ad esempio, taglio francese/limato rispetto a taglio
        americano/non limato).
    compatible_reed_type:
      name: Tipo di ancia compatibile
      description: Specifica il taglio/tipo di ancia per cui è progettato il bocchino.
    compatible_reel_type:
      name: Tipo di mulinello compatibile
      description: Specifica il tipo di mulinello da pesca per cui la borsa, la custodia
        o la copertura sono progettate per adattarsi.
    compatible_refrigerant_type:
      name: Tipo di refrigerante compatibile
      description: Indica con quale refrigerante è progettato per essere utilizzato
        l'evaporatore del condizionatore.
    compatible_ride_equipment:
      name: Attrezzatura ride compatibile
      description: Tipologie di attrezzature sportive a ruote per cui è progettata
        la rampa.
    compatible_roof_height:
      name: Altezza del tetto compatibile
      description: Indica per quale profilo del tetto è progettata la copertura (standard
        o tetto esteso/alto).
    compatible_roof_rail_type:
      name: Tipo di barra portatutto compatibile
      description: Specifica a quale configurazione del tetto è progettato per essere
        fissato il sistema di base Panchina.
    compatible_rope_count:
      name: Numero di corde compatibili
      description: Specifica la configurazione delle corde del ring per cui il componente
        è progettato, ad esempio ring a 3 corde, ring a 4 corde o compatibilità universale.
    compatible_rope_type:
      name: Tipo di corda compatibile
      description: Specifica quali tipi di funi possono essere utilizzate con il dispositivo.
    compatible_saddle_type:
      name: Tipo di sella compatibile
      description: Specifica lo stile di sella o la disciplina equestre per cui l'accessorio
        è progettato, garantendo la corretta compatibilità con selle inglesi, western
        e di altro tipo.
    compatible_saxophone_size:
      name: Taglia del sassofono compatibile
      description: Indica con quale taglia di sassofono il prodotto è compatibile
        (ad esempio, soprano, contralto, tenore).
    compatible_saxophone_type:
      name: Tipo di sassofono compatibile
      description: Specifica per quale sassofono è progettata la legatura/il cappuccio.
    compatible_scale_length:
      name: Lunghezza della scala compatibile
      description: Indica la gamma di lunghezze della scala della chitarra per cui
        sono destinate le corde (ad esempio, scala corta, standard, baritono).
    compatible_seat_airbag:
      name: Airbag per sedile compatibile
      description: Indica se il sedile è dotato di airbag laterali o se è compatibile
        con veicoli equipaggiati con airbag integrati nei sedili.
    compatible_seating_capacity:
      name: Capacità di posti a sedere compatibile
      description: Specifica il numero di posti o la configurazione per cui l'accessorio
        è progettato.
    compatible_sensor_port_type:
      name: Tipo di porta sensore compatibile
      description: Specifica se sono presenti i sensori di livello e/o temperatura
        dell'olio della coppa dell'olio e, se applicabile, il tipo di porta.
    compatible_shifter_type:
      name: Tipo di cambio compatibile
      description: Indica il tipo o la configurazione del cambio per cui è progettato
        il soffietto del cambio.
    compatible_shis:
      name: SHIS compatibile
      description: Elenca i codici SHIS (Standardized Headset Identification System)
        a cui il componente è compatibile (ad esempio, IS42, EC34, ZS44/28.6).
    compatible_skating_discipline:
      name: Disciplina di pattinaggio compatibile
      description: Indica la/le disciplina/e di pattinaggio per cui il componente
        o l'accessorio è progettato.
    compatible_snowshoe_deck_type:
      name: Tipo di piattaforma per racchette da neve compatibile
      description: Specifica il tipo Frame o di piattaforma della ciaspola con cui
        l'attacco è compatibile.
    compatible_special_effects_lighting_features:
      name: Illuminazione per effetti speciali compatibile
      description: Highlight le caratteristiche più comuni che influenzano le decisioni
        di acquisto delle luci ad effetto (Beyond al colore/modello), come il collegamento
        tra unità o la reazione all'audio.
    compatible_spinning_wheel_drive_system:
      name: Sistema di trasmissione a ruota girevole compatibile
      description: Specifica quale/i sistema/i di azionamento della ruota rotante
        l'assistenza accessoria.
    compatible_spoke_gauge:
      name: Calibro per raggi compatibile
      description: Indica il calibro del filo del raggio taglia(e) la filettatura
        del nipplo, consentendo all'acquirente di abbinare correttamente raggi e nippli.
    compatible_steering_wheel_airbag:
      name: Airbag per volante compatibile
      description: Indica se l'assistenza al volante mantiene i Modules airbag OEM
        (o è destinata ad applicazioni senza airbag).
    compatible_steering_wheel_control_button:
      name: Comando al volante compatibile
      description: Indica la compatibilità con i comandi al volante di serie (audio/cruise
        control/telefono) e il relativo cablaggio.
    compatible_stencil_material:
      name: Materiale dello stencil compatibile
      description: Materiali che la macchina può ricavare o lavorare per creare stencil
        (ad esempio, Paper, pellicola di plastica, mylar).
    compatible_stencil_media_format:
      name: Formato compatibile stencil contenuti multimediali
      description: 'Indica quali fattori di forma multimediale per i contenuti dello
        stencil sono supportati dalla macchina: fogli, rotoli o entrambi.'
    compatible_strap_retractor:
      name: Retrattore per cinturino compatibile
      description: Indica se il cinturino è compatibile con i sistemi retrattili o
        è progettato per cinture non retrattili (statiche).
    compatible_string_instrument_finish:
      name: Finitura dello strumento a corde compatibile
      description: Specifica su quali tipi di finitura degli strumenti è sicuro utilizzare
        il lucidante.
    compatible_substrate_material:
      name: Materiale del substrato compatibile
      description: Il/i materiale/i superficiale/i a cui la vernice è formulata per
        aderire.
    compatible_surface:
      name: superficie compatibile
      description: Specifica la superficie/il materiale a cui l'adesivo a strappo
        è destinato ad aderire.
    compatible_surface_material:
      name: Materiale della superficie compatibile
      description: Materiali della superficie del veicolo su cui il prodotto è progettato
        per essere utilizzato.
    compatible_tear_off_system:
      name: Sistema tear-off compatibile
      description: Indica se gli occhiali sono compatibili con le pellicole a strappo
        e/o con il sistema roll-off, specificando anche se sono dotati di perni di
        montaggio per le pellicole a strappo.
    compatible_thermostat_type:
      name: Termostato compatibile di tipo
      description: Se il raccordo/alloggiamento dell'acqua è progettato per accettare
        un termostato e, in caso affermativo, di che tipo/taglia.
    compatible_thread:
      name: threadelettrico
      description: Indica quali tipi di thread/filato è progettato per handle l'infilatrice
        (in base allo spessore/tipo).
    compatible_thread_spool_format:
      name: Formato thread/bobina compatibile
      description: Indica quali formati thread la scatola è progettata per contenere
        (rocchetti, spolette, rocchetti/cartoncini di filo, coni, ecc.).
    compatible_thread_yarn_tool:
      name: Strumento compatibile thread e filato
      description: Compatibilità con macchine/sistemi per utensili che si montano
        su altre apparecchiature o che vengono utilizzati con esse (ad esempio, macchina
        da cucire, tagliacuci/cucitrice, telaio, filatoio).
    compatible_tire_application:
      name: App compatibile con pneumatici
      description: Indica il segmento di applicazione pneumatico/cerchio per cui è
        progettato lo stallonatore (in base al pneumatico/cerchio in fase di manutenzione,
        non al modello del veicolo).
    compatible_tom_pad_mounting:
      name: Montaggio compatibile per tom pad
      description: Specifica il tipo di supporto a cui si fissa il tom-tom elettronico
        (ad esempio, morsetto/asta, asta a L, supporto per stativo), il che influisce
        sulla sua compatibilità con i sistemi di scaffalatura esistenti.
    compatible_toy_vehicle_scale:
      name: Scala del veicolo giocattolo compatibile
      description: Indica la scala del veicolo giocattolo o la taglia approssimativa
        del veicolo con cui il playset è compatibile.
    compatible_tpms_sensor_type:
      name: Tipo di sensore TPMS compatibile
      description: Specifica se la ruota è dotata di sensori TPMS e/o di qualsiasi
        tipo di valvola/sensore richiesto.
    compatible_training_equipment:
      name: Attrezzatura di allenamento compatibile
      description: Elenca i tipi di attrezzature per l'allenamento o il fitness che
        possono essere fissate al supporto.
    compatible_treadmill_design:
      name: Design del tapis roulant compatibile
      description: Specifica il tipo di tapis roulant con cui l'accessorio è compatibile,
        ad esempio modelli pieghevoli o non pieghevoli.
    compatible_tube:
      name: Tubo compatibile
      description: Indica il tipo di camera d'aria o di pneumatico per cui è progettata
        la toppa, ad esempio butile, lattice, TPU o tubeless.
    compatible_valve_type:
      name: Tipo di valvola compatibile
      description: Specifica con quale tipo di valvola in ottone il lubrificante è
        compatibile.
    compatible_vaporizing_material:
      name: Materiale vaporizzabile compatibile
      description: Indica i tipi di materiale che il dispositivo è progettato per
        vaporizzare.
    compatible_vehicle_windshield_fluid:
      name: Liquido lavavetri compatibile
      description: Dichiarazioni di compatibilità relative all'equipaggiamento del
        veicolo o alla variante del vetro (ad esempio, compatibile con i rivestimenti
        idrorepellenti, compatibile con i lavafari).
    compatible_visor_system:
      name: Sistema della visiera compatibile
      description: Indica con quali tipi di visiera/inserto il casco da moto è compatibile.
    compatible_water_board_type:
      name: Tipo di tavola acquatica compatibile
      description: Quali tavole per sport acquatici è previsto che il negozio possa
        trasportare.
    compatible_water_sport_board_type:
      name: Tipo di tavola per sport acquatici compatibile
      description: Elenca le tipologie di tavole che il carrello è progettato per
        trasportare.
    compatible_watercraft_communication_standard:
      name: Standard di comunicazione per imbarcazioni compatibile
      description: Specifica gli standard di comunicazione/rete marina supportati
        o i protocolli di integrazione per l'interoperabilità con l'elettronica di
        bordo.
    compatible_watercraft_engine_type:
      name: Tipo di motore per moto d'acqua compatibile
      description: Indica la configurazione del gruppo propulsore di destinazione
        per cui il componente è compatibile (fuoribordo/entrobordo/entrofuoribordo/a
        idrogetto).
    compatible_weight_plate_diameter:
      name: diametro della piastra di peso compatibile
      description: Specifica i diametri dei dischi di peso accettati dalla macchina.
    compatible_wheel_finish:
      name: Finitura del cerchio compatibile
      description: Specifica le finiture/materiali dei cerchi su cui il detergente
        è sicuro da usare (come dichiarato dal produttore).
    compatible_whorl_drive_band_type:
      name: Tipo di fascia di trasmissione compatibile
      description: Specifica con quale tipo di cinghia di trasmissione è progettata
        per funzionare la ruota dentata.
    compatible_wick_series:
      name: Serie di stoppini compatibili
      description: Indica le serie/tipologie di stoppino comuni con cui la scheda
        è progettata per essere compatibile (nomenclatura industriale), se specificate
        dal venditore.
    compatible_winder_head_bit:
      name: Testa/punta di avvolgimento compatibile
      description: Specifica lo stile di interfaccia tra la chiave/testina dell'accordatore
        e l'avvolgitore (ad esempio, testina scanalata, punte intercambiabili, testina
        universale).
    compatible_windlass_rode:
      name: cima del verricello compatibile
      description: Specifica il tipo di cima d'ancora che il verricello è progettato
        per handle.
    compatible_windshield_type:
      name: Tipo di parabrezza compatibile
      description: Specifica con quale configurazione del parabrezza è progettato
        per funzionare l'involucro.
    compatible_wood:
      name: Legno compatibile
      description: Specifica per quali tipi di legno della tastiera è consigliato/sicuro
        l'utilizzo del lucidante.
    compatible_writing_surface:
      name: Superficie di scrittura compatibile
      description: Specifica le superfici/Paper l'inchiostro è progettato per funzionare
        al meglio.
    compatible_zipper_size:
      name: Taglia della cerniera compatibile
      description: 'Indica la taglia della cerniera per cui il cursore è progettato
        (spesso espressa come #3, #5, #8, #10), migliorando il filtraggio di compatibilità.'
    compliance_certification:
      name: Certificazioni di conformità
      description: La barra luminosa soddisfa gli standard di conformità/approvazione
        per l'uso su strada e la compatibilità elettromagnetica.
    component_position:
      name: Posizione del componente
      description: Specifica la posizione relativa del componente all'interno del
        gruppo di distribuzione del motore (ad esempio, coperchio anteriore rispetto
        a quello posteriore, superiore rispetto a quello inferiore). Non si tratta
        del posizionamento anteriore/posteriore del veicolo.
    concentration_level:
      name: Livello di concentrazione
      description: Indicazione qualitativa del grado di concentrazione del concentrato
        di pomodoro (singolo, doppio, triplo), utile per adattarlo alle esigenze della
        ricetta.
    concentration_type:
      name: Tipo di concentrazione
      description: Indica se il prodotto è pronto all'uso o concentrato e (in quest'ultimo
        caso) fornisce le tipiche indicazioni per la diluizione.
    concert_bass_drum_mounting_stand_type:
      name: Supporto per grancassa da concerto
      description: Come viene supportata o montata la grancassa da concerto durante
        l'esecuzione.
    concert_pitch_standard:
      name: standard di intonazione da concerto
      description: Specifica la frequenza di riferimento (La4) a cui il pianoforte
        è accordato al momento della vendita (ad esempio, La440, La442, La444).
    condiment_form:
      name: Forma di condimento
      description: Indica la forma fisica o la consistenza del prodotto a base di
        rafano (ad esempio pasta, polvere, crema).
    condiment_texture:
      name: Consistenza del condimento
      description: Descrive la consistenza fisica della salsa o del chutney (ad esempio,
        grumoso, liscio).
    confetti_format:
      name: Formato coriandoli
      description: Specifica il formato del prodotto coriandoli in base a come vengono
        confezionati o Launch (ad esempio, coriandoli sfusi rispetto a coriandoli
        a scoppio/cannoni).
    conga_head_tensioning_system:
      name: Sistema di tensionamento della testa della conga
      description: Tipo di hardware utilizzato per tendere/accordare la pelle delle
        conga (ad esempio, accordatura tradizionale con tiranti rispetto ai moderni
        meccanismi di accordatura rapida).
    conga_set_included_drum_types:
      name: Il set di conga includeva diversi tipi di tamburi
      description: Quali tipi di conga sono inclusi in un set di conga (ad esempio,
        quinto + conga + tumba).
    connector_case_style:
      name: stile cassa
      description: Classifica lo stile costruttivo generale della custodia rigida
        (ad esempio, guscio rigido o custodia morbida) per riflettere il livello di
        protezione e la portabilità.
    console_cover_installation_method:
      name: Metodo di installazione del coperchio della console
      description: Specifica come la copertura della console si fissa alla console/bracciolo
        (ad esempio, a incastro, con cinghie elastiche, con velcro, con adesivo, con
        clip).
    console_display_type:
      name: Tipo di visualizzazione della console
      description: Identifica il tipo di display utente presente sulla macchina (ad
        esempio, LCD, LED, touchscreen).
    construction_design:
      name: Design costruttivo
      description: Indica da quanti elementi articolati è composto il cuscinetto,
        mobilità Impact (ad esempio, monoblocco o triblocco).
    contact_angle:
      name: angolo di contatto
      description: Specifica l'angolo di contatto delle piste del cuscinetto, espresso
        come un singolo angolo o come una coppia di angoli (ad esempio, 36°/45°).
    contact_juggling_ball_fill_type:
      name: Tipo di riempimento della palla da giocoleria di contatto
      description: Identifica se la palla è piena o riempita (e, in caso affermativo,
        di che tipo), il che influisce sulla distribuzione del peso e sulla durata.
    contact_juggling_ball_transparency:
      name: Trasparenza della palla da giocoleria a contatto
      description: Specifica la trasparenza/l'aspetto ottico della sfera.
    contact_surface_material:
      name: Materiale della superficie di contatto
      description: Identifica il materiale utilizzato nei punti di contatto con lo
        strumento (ad esempio, sughero/gomma) per prevenire graffi e migliorare la
        presa.
    container_material:
      name: materiale di patata
      description: Specifica il materiale primario della cassa Retail del prodotto
        (es. vetro, plastica termoplastica, alluminio).
    contaminant_removal:
      name: Rimozione dei contaminanti
      description: Elenca le classi di contaminanti che il prodotto è certificato
        per rimuovere o ridurre.
    contra_alto_clarinet_body_configuration:
      name: Configurazione del corpo del clarinetto contralto
      description: Descrive la forma e la struttura fisica del clarinetto contrabbasso
        (ad esempio, modelli dritti rispetto a modelli pieghevoli).
    contra_alto_clarinet_lowest_note_extension:
      name: Estensione della nota più bassa del clarinetto contralto
      description: Specifica l'estensione della nota più bassa suonabile dello strumento
        (la nota più bassa consentita dalla meccanica), comunemente utilizzata per
        distinguere i modelli con Mi♭ basso, Re basso e Do basso.
    contra_bass_clarinet_bell_type:
      name: clarinetto contrabbasso tipo campana
      description: Configurazione della campana utilizzata sul clarinetto contrabbasso.
    contra_bass_clarinet_bore_type:
      name: Tipo di alesaggio del clarinetto contrabbasso
      description: Progettazione del foro dello strumento.
    contra_bass_clarinet_lowest_written_note:
      name: Nota scritta più grave del clarinetto contrabbasso
      description: La nota scritta più bassa che lo strumento può suonare (spesso
        dipende dall'estensione del Do basso rispetto al Mi bemolle basso).
    control_arm_bushing_material:
      name: Materiale della boccola del braccio di controllo
      description: Specifica il materiale delle boccole incluse/installate, se presenti.
    control_arm_bushings_included:
      name: Boccole del braccio di controllo incluse
      description: Indica se il braccio di controllo viene fornito con le boccole
        già installate.
    control_arm_finish:
      name: Finitura del braccio di controllo
      description: Specifica la finitura protettiva applicata al braccio di controllo
        (protezione dalla corrosione e aspetto estetico).
    control_arm_grease_fitting_type:
      name: Tipo di raccordo per grasso del braccio di controllo
      description: Specifica se il gruppo braccio di controllo/snodo sferico include
        un ingrassatore (zerk) e se è riparabile.
    control_arm_material:
      name: Materiale del braccio di controllo
      description: Specifica il materiale principale e la tecnica di fabbricazione
        del corpo del braccio di controllo.
    control_arm_position:
      name: Posizione del braccio di controllo
      description: Specifica la posizione della sospensione per cui è progettato il
        braccio di controllo all'interno del Context angolare/laterale dell'asse (ad
        esempio, superiore/inferiore, anteriore/posteriore, sinistra/destra).
    control_arm_style:
      name: Stile del braccio di controllo
      description: Identifica lo stile geometrico/di design del braccio di controllo
        utilizzato nella layout delle sospensioni.
    control_cable_connector_type:
      name: Tipo di connettore del cavo di controllo
      description: Specifica il tipo di terminale/connettore utilizzato dal/dai cavo/i
        di controllo per interfacciarsi con il controllo e il motore (ad esempio,
        raccordi terminali specifici del produttore).
    control_voltage_or_gate_connectivity:
      name: Tensione di controllo o connettività del gate
      description: Specifica il supporto alla connessione tensione di controllo/gate
        per l'integrazione con apparecchiature modulari/analogiche.
    controller_function:
      name: Funzione del controller
      description: Definisce il ruolo principale della scheda di controllo del tapis
        roulant, come il controllo del motore, l' Supply o l'azionamento dell'inverter.
    controller_type:
      name: Tipo di controller
      description: Specifica il motore titolare del trattamento/sistema di controllo
        incluso nel kit di conversione EV dello scooter (o richiesto per l'uso), concentrandosi
        sulle caratteristiche del titolare del trattamento rilevanti per la compatibilità
        e le prestazioni.
    conversion_kit_cooling_method:
      name: Metodo di raffreddamento del kit di conversione
      description: Approccio primario di gestione termica utilizzato per l'integrazione
        motore/inverter/batteria.
    conversion_kit_installation_complexity:
      name: complessità di installazione del kit di conversione
      description: Livello di difficoltà di installazione previsto in base alle skille
        agli strumenti tipicamente richiesti dal cliente.
    converted_bed_size:
      name: Taglia letto convertita
      description: Indica la dimensione o la configurazione del letto in cui si trasformerà
        la culla una volta installato questo kit .
    convertible_configuration:
      name: Configurazione convertibile
      description: Indica in quante diverse configurazioni di letto si può suddividere
        il prodotto (ad esempio, culla 3 in 1 → lettino per bambini → divano letto).
    convertible_high_chair_modes:
      name: Mode del seggiolone convertibile
      description: Specifica le configurazioni di seduta in cui la sedia può essere
        ripiegata.
    cookie_decorating_kit_items_included:
      name: articolo incluso kit per decorare i biscotti
      description: Elenca i componenti decorativi personali forniti in modo che i
        clienti sappiano esattamente cosa Supply (ad esempio, tubetti di glassa, zuccherini,
        formine cookie ).
    cookie_variety:
      name: varietà di biscotti
      description: Identifica lo stile o la varietà specifica di cookie, aiutando
        l'acquirente a trovare rapidamente il tipo preferito.
    cooking_state:
      name: Stato di cottura
      description: Indica il livello di preparazione del prodotto a base di pollo
        al momento della vendita (crudo, completamente cotto, marinato, ecc.).
    coolant_additive_purpose:
      name: Scopo dell'additivo per liquido di raffreddamento
      description: Functions principali previste per l'additivo del liquido di raffreddamento
        (non si tratta di un prodotto per la pulizia del radiatore o di un sigillante
        specifico).
    coolant_base_fluid:
      name: fluido base refrigerante
      description: Identifica la principale base glicolica utilizzata nella formulazione
        dell'antigelo/liquido refrigerante.
    coolant_outlet_connection_style:
      name: Stile relazione uscita liquido refrigerante
      description: Interfaccia di collegamento in uscita utilizzata per collegare
        un tubo del radiatore o una linea del liquido di raffreddamento.
    coolant_outlet_neck_angle:
      name: angolo del collo di uscita del liquido di raffreddamento
      description: L'angolo/orientamento dell'uscita del raccordo dell'acqua rispetto
        alla flangia di montaggio/motore (utile per il passaggio del tubo superiore
        del radiatore).
    coolant_technology:
      name: Tecnologia dei refrigeranti
      description: Specifica la famiglia di chimica/tecnologia del liquido di raffreddamento
        utilizzato dall'antigelo/liquido di raffreddamento (come comunemente indicato
        Label della confezione).
    coolant_temperature_sensor_port:
      name: Porta del sensore temperatura del liquido di raffreddamento
      description: Se il raccordo dell'acqua include una porta per un sensore o un
        interruttore di temperatura del liquido di raffreddamento e quale interfaccia
        utilizza.
    coolant_temperature_sensor_seal_type:
      name: Tipo di guarnizione del sensore temperatura del liquido di raffreddamento
      description: Tipo di metodo di tenuta utilizzato tra il sensore e il condotto
        del motore/liquido di raffreddamento.
    cooling_system_component_included:
      name: Componente del sistema di raffreddamento incluso
      description: Elenca i componenti aggiuntivi del sistema di raffreddamento inclusi
        con la pompa dell'acqua.
    cooling_system_flush_application_step:
      name: Passaggio dell'app per il lavaggio del sistema di raffreddamento
      description: Indica la posizione del prodotto nel processo di manutenzione (ad
        esempio, detergente pre-risciacquo rispetto al risciacquo finale/neutralizzante).
    cooling_system_type:
      name: Tipo di sistema di raffreddamento
      description: Specifica la configurazione del sistema di raffreddamento utilizzato
        da un motore marino entrobordo (ad esempio, acqua di mare/circuito aperto,
        circuito chiuso/acqua dolce con scambiatore di calore, raffreddamento a chiglia).
    cord_material:
      name: Materiale del cavo
      description: Specifica il materiale del cordino/spago utilizzato per far passare
        lo scovolino attraverso il sassofono.
    core_type_bass_strings:
      name: Tipo di nucleo (corda di basso)
      description: Specifica le Shapes principali della maglia, che Influence la sensazione
        al tatto e la flessibilità.
    cork_grease_base_material:
      name: Materiale base per grasso di sughero
      description: Base primaria della formulazione del grasso per sughero (ad esempio,
        a base di lanolina).
    cork_grease_form:
      name: Forma di grasso di sughero
      description: La forma fisica del prodotto a base di grasso per sughero.
    corn_presentation:
      name: Presentazione del mais
      description: Specifica la presentazione fisica o la forma del prodotto a base
        di mais (ad esempio, intero con la buccia, chicchi, polvere).
    corn_syrup_variety:
      name: varietà di sciroppo di mais
      description: Specifica lo stile particolare o la variante di lavorazione dello
        sciroppo.
    corn_variety:
      name: Varietà di mais
      description: Identifica la specifica varietà botanica o commerciale di mais
        venduta, consentendo all'acquirente di distinguere tra tipi che differiscono
        per Taste, consistenza, colore e utilizzo culinario.
    corner_compatibility:
      name: Compatibilità degli angoli
      description: Specifica la Shapes degli angoli del tavolo (quadrata o rotonda)
        per cui è progettata la copertura.
    corner_flag_features:
      name: Caratteristiche della bandiera angolare
      description: Highlight le caratteristiche funzionali speciali o i miglioramenti
        della bandiera d'angolo (ad esempio, asta pieghevole, materiale riflettente).
    cornet_mouthpiece_shank_type:
      name: tipo di gambo del bocchino per cornetta
      description: Specifica lo standard di attacco/innesto del bocchino supportato
        dalla cornetta per garantirne la compatibilità.
    cornhole_league_certification:
      name: certificazione della lega di cornhole
      description: Indica le certificazioni ufficiali o le approvazioni di lega che
        il prodotto soddisfa.
    corrosion_resistance:
      name: Anticorrosione
      description: Specifica la variante o la classificazione di resistenza alla corrosione
        del supporto/supporto per l'esposizione agli agenti atmosferici.
    corrosion_resistance_level:
      name: Livello di resistenza alla corrosione
      description: Indica una protezione dalla corrosione adatta ad ambienti di acqua
        dolce/salata.
    costume_components_included:
      name: Componenti del costume inclusi
      description: Elenca i capi di abbigliamento e gli accessori inclusi nel costume,
        specificando cosa fa parte del set.
    cotton_weave_type:
      name: Tipo di tessitura del cotone
      description: Descrive la struttura di tessitura/lavorazione a maglia della superficie
        di cotone stampabile che influisce sulla consistenza e sulla nitidezza della
        stampa.
    counter_type:
      name: Tipo di bancone
      description: Indica la presenza e lo stile della ripetizione integrata o del
        tracciamento della forza.
    counterweight_fill_material:
      name: Materiale di riempimento del contrappeso
      description: Indica la sostanza che può essere utilizzata per aggiungere zavorra
        o pre-riempire il contrappeso.
    counterweight_type:
      name: Tipo di contrappeso
      description: Specifica il design o lo stile costruttivo del contrappeso, ad
        esempio sacco di sabbia o piastra d'acciaio, per facilitare la compatibilità
        e l'installazione.
    coupler_system:
      name: Sistema di accoppiamento
      description: Tipo/sistema di accoppiamento montato sulla locomotiva modello
        per la compatibilità con il materiale rotabile.
    court_surface_suitability:
      name: Idoneità della superficie del campo
      description: Indica la superficie del campo da basket per cui è progettata la
        suola della scarpa, aiutando l'acquirente a scegliere la trazione e la durata
        ideali per campi in legno al coperto, asfalto/cemento all'aperto o entrambi.
    cover_fit_style:
      name: Stile di vestibilità della cover
      description: Descrive come la copertura si adatta al tavolo, influenzandone
        l'aspetto e il livello di protezione.
    cover_fit_type:
      name: Tipo di copertura
      description: Indica se la copertura è realizzata su misura (personalizzata/semi-personalizzata)
        o universale, e se è destinata all'ormeggio in acqua o all'uso su rimorchio/stoccaggio.
    cowbell_beater_type:
      name: Battente per campanaccio tipo
      description: Tipo di strumento di percussione consigliato per ottenere il suono/la
        finitura del campanaccio (se specificato dal prodotto).
    cowbell_mounting_method:
      name: Metodo di montaggio del campanaccio
      description: Modalità di montaggio/utilizzo prevista per il campanaccio (a mano
        o fissato a hardware).
    cowbell_sound_character:
      name: Carattere sonoro del campanaccio
      description: Carattere tonale generale utilizzato in inserimento (assistenza
        scoperta Beyond taglia).
    cradle_capacity:
      name: Capacità della culla
      description: Indica se la culla è progettata per ospitare un singolo neonato
        o dei gemelli.
    craft_cutter_embosser_machine_operation:
      name: Funzionamento della macchina da taglio/goffratura Craft
      description: Specifica come funziona la macchina da taglio/goffratura dal punto
        di vista del flusso di lavoro dell'utente (ad esempio, manovella manuale,
        pulsante elettrico, controllo tramite app).
    craft_decoration_maker_accessories_included:
      name: Accessori Maker di decorazioni Craft inclusi
      description: Elenca gli accessori principali inclusi con la Craft Decoration
        Maker (ad esempio, nastro/pellicola Shopify Starter , ricariche di adesivi,
        cartucce di glitter, strumenti di pulizia).
    craft_foil_application_method:
      name: Metodo di applicazione della lamina Craft
      description: Indica la modalità di applicazione/attivazione prevista per la
        lamina Craft (adesivo, calore, toner/reattivo, ecc.).
    craft_foil_format:
      name: Formato lamina Craft
      description: Indica il formato fisico della lamina Craft al momento della vendita
        (ad esempio, rotolo o fogli).
    craft_glue_finish:
      name: Finitura con colla Craft
      description: Descrive l'aspetto della colla dopo l'asciugatura (ad esempio,
        trasparente, bianco/opaco, traslucido, lucido/opaco).
    craft_magnet_application:
      name: App per magneti Craft
      description: 'Craft principale previsto: superficie di montaggio o supporto
        per il prodotto magnetico.'
    craft_magnet_holding_strength_level:
      name: livello di forza di tenuta del magnete Craft
      description: Categoria di forza relativa per i magneti per Craft , per aiutare
        l'acquirente a scegliere la forza di tenuta più adatta al proprio progetto.
    craft_organizer_storage_features:
      name: Organizzatore Craft con funzioni di stoccaggio
      description: Descrive le caratteristiche organizzative e gli elementi di stoccaggio
        interni degli organizer Craft (ad esempio, divisori regolabili, cassetti,
        tasche trasparenti).
    craft_scoring_board_included_accessories:
      name: Accessori inclusi per la tavoletta segnapunti Craft
      description: Accessori inclusi con la tavoletta per cordonatura (ad esempio,
        stilo/piegacarte, squadra, strumento per buste).
    craft_scoring_board_measurement_system:
      name: Sistema di misurazione per la tabella di valutazione dei Craft
      description: Specifica il sistema di misura indicato sul tabellone di punteggio
        (imperiale, metrico, duale o non contrassegnato).
    craft_wire_finish_coating:
      name: Finitura/rivestimento per filo metallico Craft
      description: Specifica la finitura superficiale o il rivestimento applicato
        al filo per quanto riguarda colore, resistenza all'ossidazione o protezione.
    craft_wood_surface_preparation:
      name: Preparazione della superficie del legno Craft
      description: Indica se la superficie del legno è pronta per la finitura/verniciatura
        o se richiede una preparazione (ad esempio, levigatura/applicazione del primer).
    crank_spindle_interface:
      name: Interfaccia perno manovella
      description: Specifica il sistema del perno della guarnitura e l'assistenza
        del movimento centrale (ad es. SRAM DUB, Square quadro), garantendo la compatibilità
        tra guarnitura e movimento centrale.
    crankshaft_balance_type:
      name: Tipo di blocco albero motore
      description: Indica se l'albero motore è bilanciato internamente (neutro) o
        esternamente (richiede smorzatore di vibrazioni/contrappesi al volano).
    crankshaft_bolt_pattern:
      name: Schema di foratura dell'albero motore
      description: Schema di foratura sulla flangia posteriore per il fissaggio del
        volano/piastra flessibile.
    crankshaft_sensor_reluctor_type:
      name: Sensore di posizione dell'albero motore tipo reluttore
      description: triggerdel sensore di posizione dell'albero motore/ruota di rilevamento
        utilizzata (ove applicabile).
    craps_accessories_included:
      name: Accessori per craps inclusi
      description: Identifica gli accessori aggiuntivi specifici per il craps inclusi
        Beyond a dadi/fiches/layout.
    crash_cymbal_profile:
      name: Profilo del piatto crash
      description: Curvatura/profilo generale del piatto (quanto è pronunciata la
        curvatura), tono Impact e risposta.
    crash_cymbal_sound_character:
      name: Carattere sonoro del piatto crash
      description: Carattere tonale primario descritto per il suono del piatto crash.
    crash_pad_size_class:
      name: Crash pad taglia class
      description: Indica la categoria generale di taglia di un crash pad da arrampicata,
        dando all'acquirente un rapido Sense della superficie coperta senza bisogno
        di dimensioni esatte.
    crate_engine_assembly_level:
      name: Livello di assemblaggio del motore in cassa
      description: Quanto è completo il motore nella cassa al momento della spedizione
        (quali componenti principali sono inclusi).
    cream_base_ingredient:
      name: ingrediente base della crema
      description: Identifica la fonte primaria della panna, includendo sia le specie
        casearie che le alternative di origine vegetale.
    cream_cheese_base:
      name: base di formaggio cremoso
      description: Indica la principale fonte, di origine lattiero-casearia o vegetale,
        utilizzata per la produzione del formaggio spalmabile, aiutando l'acquirente
        a valutare esigenze dietetiche, allergie e Taste .
    cream_cheese_form:
      name: Forma della crema di formaggio
      description: Descrive la forma fisica o la consistenza del formaggio spalmabile
        (ad esempio, a blocchi, montato, da spalmare), che Influence la spalmabilità
        e l'uso previsto.
    cream_variety:
      name: Varietà di crema
      description: Identifica lo specifico tipo di panna in base al contenuto di grassi,
        al metodo di lavorazione o all'uso culinario previsto (ad esempio, panna da
        cucina, panna doppia, panna da cucina).
    crib_accessory_features:
      name: Caratteristiche degli accessori per la culla
      description: Elenca le caratteristiche funzionali o orientate al comfort specifiche
        degli accessori per culle e lettini per bambini, come la traspirabilità o
        i bordi elastici.
    crib_bumper_features:
      name: Caratteristiche del paracolpi per culla
      description: Evidenzia le caratteristiche funzionali speciali del paraspigoli
        della culla.
    crib_conversion_kit_components:
      name: Componenti del kit di conversione per la culla
      description: Elenca le parti principali incluse nel kit , in modo che l'acquirente
        possa verificare di avere tutto il necessario per l'installazione.
    cricket_ball_grade:
      name: Grado della palla da cricket
      description: Specifica il livello di qualità o lo standard di gioco previsto
        per il pallone.
    cricket_ball_piece_construction:
      name: costruzione del pezzo della palla da cricket
      description: Indica il numero di pezzi esterni o sezioni stampate utilizzate
        per costruire il guscio della palla, un indicatore chiave di qualità e prezzo.
    cricket_ball_type:
      name: Tipo di palla da cricket
      description: Specifica il tipo di palla da cricket Supply con il prodotto o
        indica se non è inclusa alcuna palla.
    cricket_bat_accessory_type:
      name: Accessorio per mazza da cricket
      description: Specifica il tipo di accessorio o articolo per la manutenzione
        della mazza da cricket, in modo che l'acquirente possa filtrare rapidamente
        il prodotto di cui ha bisogno.
    cricket_bat_size:
      name: Taglia del pipistrello da cricket
      description: Indica la classificazione standardizzata della taglia della mazza
        da cricket (0–6, Harrow, SH, LH), generalmente scelta in base all'età e all'altezza
        del giocatore.
    cricket_bat_size_compatibility:
      name: Compatibilità della taglia della mazza da cricket
      description: Elenca le taglie di mazza per cui l'accessorio è progettato per
        adattarsi, garantendo la corretta compatibilità.
    cricket_helmet_role:
      name: Casco da cricket
      description: Indica il ruolo di gioco per cui è progettato il casco, come ad
        esempio battitore o wicket-keeper.
    cricket_leg_guard_type:
      name: Paragambe tipo cricket
      description: Indica lo specifico stile di protezione per le gambe nel cricket.
    cricket_player_role:
      name: Giocatore di cricket figura
      description: Specifica il ruolo principale per cui la scarpa è stata progettata.
    cricket_protection_grade:
      name: Grado di protezione Cricket
      description: Specifica la classificazione del grado di protezione assegnata
        dal produttore dell'attrezzatura da cricket.
    cricket_stump_base_type:
      name: Tipo di base del piolo da cricket
      description: Indica lo stile o il materiale di base Supply con i pali, che influisce
        sulla stabilità e sull'idoneità della superficie di gioco.
    cricket_stump_target_features:
      name: Caratteristiche del bersaglio a forma di ceppo da cricket
      description: Highlight le caratteristiche funzionali distintive che migliorano
        l'usabilità, la visibilità, la durata o la stabilità della formazione.
    cricket_stump_type:
      name: Tipo di ceppo da cricket
      description: Classifica lo stile o la costruzione dei ceppi per aiutare l'acquirente
        a scegliere tra ceppi da partita tradizionali, varianti da allenamento o modelli
        moderni illuminati.
    cricket_training_focus:
      name: Focus dell'allenamento da cricket
      description: L'ausilio è progettato per migliorare la principale skill o disciplina
        del cricket.
    croquet_set_components_included:
      name: Componenti del set da croquet inclusi
      description: Elenca tutti i componenti chiave Supply con il set (ad esempio,
        paletti, picchetti, borsa per il trasporto) in modo che i clienti sappiano
        esattamente cosa stanno acquistando.
    cross_country_binding_system:
      name: sistema di legame a croce
      description: Specifica lo standard di attacco da sci cross-paese per cui il
        prodotto è predisposto o con cui è compatibile.
    cross_stitch_chart_symbol_type:
      name: tipo di simbolo dello schema del punto croce
      description: Modalità di rappresentazione del grafico (simboli, Colors o entrambi).
    cross_stitch_finishing_type:
      name: tipo di finitura a punto croce
      description: Tipo di finitura/esposizione previsto per il progetto ricamato.
    cross_stitch_frame_fabric_holding_mechanism:
      name: Meccanismo di fissaggio del tessuto Frame a punto croce
      description: Indica come il tessuto viene fissato/tensionato nel Frame (ad esempio,
        clip, morsetti, chiodini), il che Impact facilità d'uso e sulla compatibilità
        del tessuto.
    cross_stitch_frame_included_components:
      name: Frame per punto croce con componenti inclusi
      description: Elenca il contenuto della confezione (ad esempio, solo Frame o
        Frame + morsetti + supporto), riducendo ambiguità e resi.
    cross_stitch_frame_type:
      name: Frame per punto croce
      description: Specifica la costruzione/tipologia del Frame per punto croce (come
        viene tenuto il tessuto), influenzando l'usabilità e la compatibilità del
        progetto.
    cross_stitch_pattern_technique:
      name: tecnica del punto croce
      description: La tecnica/lo stile di punto croce richiesto dallo schema.
    crossbar_shape_profile:
      name: Shapes/profili delle barre trasversali
      description: Specifica le Shapes aerodinamiche/del profilo della barra trasversale.
    crossbar_style:
      name: Stile traversa
      description: Identifica lo stile costruttivo della traversa, distinguendo le
        traverse rigide da competizione da quelle flessibili o ibride da allenamento.
    crossbow_type:
      name: Tipo di balestra
      description: Identifica lo stile di progettazione fondamentale della balestra,
        come ad esempio la balestra compound, la balestra ricurva o la balestra a
        pistola. Lo stile costruttivo influenza le prestazioni, taglia e usa cassa,
        quindi gli acquirenti spesso filtrano in base ad esso.
    crossover_component_type:
      name: Tipo di componente crossover
      description: Identifica la topologia del componente primario utilizzata nella
        rete crossover passiva.
    crossover_configuration:
      name: Configurazione crossover
      description: Indica se il crossover utilizza un singolo punto di incrocio o
        più punti (ad esempio, design a 2 vie o a 3 vie).
    crossover_type:
      name: Tipo crossover
      description: Tipo di crossover rete incluso nel set di componenti.
    crown_profile:
      name: Profilo della corona
      description: Specifica l'altezza/il profilo della calotta del cappello rispetto
        alla tesa.
    crown_style:
      name: Stile principe
      description: Definisce la silhouette o il profilo complessivo della calotta
        di una bombetta.
    crust_taste_profile:
      name: Profilo Taste della crosta
      description: Indica se la caratteristica principale del sapore della crosta
        è dolce, salata o neutra.
    crystal_finish:
      name: Finitura cristallina
      description: Descrive la finitura superficiale, il rivestimento o lo stato di
        lavorazione del cristallo sfuso (ad esempio, grezzo, lucidato, burattato,
        filtrato, satinato, con rivestimento aura, tinto, trattato termicamente).
    crystal_material:
      name: Materiale cristallino
      description: Specifica il materiale utilizzato per il vetro dell'orologio che
        protegge il quadrante.
    crystalline_finish_style:
      name: Stile con finitura cristallina
      description: L'aspetto cristallino/sfumato caratteristico prodotto dalla cera
        di palma nelle candele finite.
    cucumber_variety:
      name: Varietà di cetriolo
      description: Specifica la cultivar o varietà commerciale del cetriolo (ad esempio,
        inglese, persiano, Kirby).
    cue_compatibility:
      name: Compatibilità della stecca
      description: Indica la configurazione dell'attacco della stecca che la cassa
        è progettata per ospitare, ad esempio stecche monoblocco o con attacco a 3/4.
    cue_construction:
      name: Costruzione della stecca
      description: 'Indica come è costruita la stecca: se è composta da più pezzi
        o se si tratta di un componente parziale, come ad esempio solo il calcio o
        solo l''asta, influenzando la portabilità e la compatibilità.'
    cue_head_material:
      name: Materiale della testa della stecca
      description: Identifica il materiale della testa della stecca (la parte che
        entra in contatto con il disco), che influisce sulla durata e sulla protezione
        della superficie.
    cue_sport_compatibility:
      name: Compatibilità con lo sport della stecca
      description: Indica per quale sport di biliardo è progettato l'accessorio.
    cue_thread_size:
      name: Tagliata thread di cue
      description: Specifica la thread utilizzata su prolunghe, protezioni per giunti,
        bulloni di fissaggio e altri accessori per stecche da biliardo per garantire
        un montaggio corretto.
    cue_tip_hardness:
      name: Durezza della punta della stecca
      description: Valuta la fermezza della punta della stecca, che Influence il controllo
        e feedback della bilia bianca.
    cuff_height:
      name: Altezza del polsino
      description: Indica l'altezza del gambale dello stivale (basso, medio, alto,
        rimovibile/regolabile), l'assistenza Impact e la flessibilità.
    cuff_position:
      name: Posizione del polsino
      description: Indica il punto del corpo del cavaliere in cui è previsto il fissaggio
        del guinzaglio.
    cultivation_method:
      name: Metodo di coltivazione
      description: Specifica come venivano coltivate le piante di verde, illustrando
        le tecniche di coltivazione e le pratiche agricole.
    cup_type:
      name: Tipo di tazza
      description: Indica il profilo della superficie della paillette (piatta o concava)
        e la profondità della concavità, che possono influenzare la brillantezza,
        la consistenza e il modo in cui si posiziona quando viene cucita o incollata.
    cupcake_size:
      name: Cupcake o
      description: Specifica la categoria di dimensione fisica dei cupcake venduti
        (ad esempio, Shop Mini, standard, jumbo).
    curd_size:
      name: Taglia della cagliata
      description: Specifica la taglia o la consistenza della cagliata di ricotta.
    cure_method:
      name: Metodo di stagionatura
      description: Descrive il processo necessario affinché l'adesivo si indurisca
        o polimerizzi (ad esempio, luce UV, umidità dell'aria, calore).
    curing_or_preparation_method:
      name: Metodo di stagionatura o preparazione
      description: Specifica come le olive sono state conservate o altrimenti preparate
        (ad esempio, in salamoia, sott'olio, grigliate).
    curling_broom_head_material:
      name: Materiale per la testa della scopa arricciacapelli
      description: Identifica la composizione principale del materiale della testina
        o della spazzola della scopa.
    curling_broom_head_type:
      name: Tipo di testina per arricciacapelli
      description: Specifica lo stile o la struttura della testina/tampone di pulizia.
    curling_shoe_slider_material:
      name: Materiale per pattini da curling
      description: Identifica il materiale principale della suola scorrevole utilizzata
        nelle scarpe da curling.
    curling_training_aid_type:
      name: Tipo di ausilio per l'allenamento di curling
      description: Identifica il tipo di ausilio per l'allenamento di curling.
    curry_variety:
      name: Varietà di curry
      description: Classifica i prodotti a base di salsa al curry in base allo specifico
        stile o ricetta per cui sono pensati, come Tikka Masala, Massaman o Thai verde,
        per consentire un filtraggio preciso in base al sapore/stile.
    cushion_rubber_profile:
      name: Profilo in gomma ammortizzante
      description: Shapes o codice profilo dei pezzi di gomma per ammortizzatori ferroviari.
    cushioning_level:
      name: Livello di ammortizzazione
      description: Indica la quantità di spaziatura interna sotto il piede fornita
        dalla calza per la protezione Impact e il comfort.
    custom_label_content_type:
      name: Label personalizzata tipo
      description: Specifica quali informazioni vengono personalizzate Label da cucire
        (ad esempio, nome, logo, messaggio, taglia, simboli di cura, informazioni
        di contatto).
    customization_type:
      name: Tipo di personalizzazione
      description: Specifica se la maglia è neutra, fornita al giocatore o personalizzata
        con nome e numero.
    cut_or_preparation_style:
      name: Stile di taglio o preparazione
      description: Specifica come i pezzi di verdura sono tagliati o preparati all'interno
        della lattina o del barattolo (ad esempio, interi, a cubetti, a bastoncini).
    cut_resistance_rating:
      name: Grado di resistenza al taglio
      description: Specifica il livello di resistenza al taglio formalmente testato
        dell'articolo.
    cut_type:
      name: Tipo di taglio
      description: Indica se il tessuto viene venduto al metro/iarda, pretagliato
        o in rotolo/bobina.
    cutting_application:
      name: Applicazione di taglio
      description: 'Uso principale previsto per il taglio: cassa per le forbici.'
    cutting_mat_grid_style:
      name: Tappetino da taglio Grid
      description: La guida stampata è presente sulla superficie del tappetino.
    cutting_mat_intended_use:
      name: Utilizzo previsto del tappetino da taglio
      description: L'uso principale del tappetino da taglio è quello di superficie
        di lavoro/ Craft .
    cv_boot_clamp_type:
      name: Tipo di morsetto per cuffia CV
      description: Specifica il tipo di morsetto/fascetta utilizzato per fissare la
        cuffia del giunto omocinetico.
    cv_boot_kit_contents:
      name: Contenuto del kit di avvio CV
      description: Elenca gli elementi inclusi nella confezione della cuffia del giunto
        omocinetico (ad esempio, fascette, bustina di grasso, fascette di fissaggio).
    cv_boot_material:
      name: materiale per stivali CV
      description: Specifica la composizione principale del materiale di costruzione
        della cuffia del giunto omocinetico.
    cv_boot_position:
      name: posizione del tappo CV
      description: Specifica se la cuffia del giunto omocinetico si adatta alla posizione
        interna (insider) o esterna (outsider) del giunto omocinetico sull'asse.
    cycling_apparel_fit:
      name: vestibilità dell'abbigliamento da ciclismo
      description: Descrive il taglio del capo, indicando la vestibilità e l'aerodinamica
        desiderate (ad esempio, Race, Relaxed).
    cylinder_head_assembly:
      name: Gruppo testata del cilindro
      description: Specifica il livello di completezza della testata del cilindro
        al momento della vendita (ad esempio, completamente assemblata con i componenti
        del sistema di distribuzione installati rispetto a fusione nuda/non assemblata).
    cylinder_head_material_grade:
      name: Grado del materiale della testata del cilindro
      description: Specifica il materiale e la qualità utilizzati per la fusione della
        testata del cilindro.
    cylinder_head_position:
      name: Posizione della testa del cilindro
      description: Indica su quale bancata/lato o orientamento si monta la testata
        del cilindro nei motori a più bancate (ad esempio, lato sinistro/destro o
        bancata 1/bancata 2).
    cymbal_alloy:
      name: Lega per piatti
      description: Lega/composizione del/dei piatto/i nel kit.
    cymbal_application:
      name: App per piatti
      description: Applicazione principale di utilizzo per cui il piatto è progettato/commercializzato.
    cymbal_arm_mounting_interface:
      name: Interfaccia di montaggio del braccio del piatto
      description: Specifica come il braccio del piatto si fissa al REST hardware
        della batteria (ad esempio, morsetto, supporto, attacco del supporto).
    cymbal_arm_rotation_positioning_features:
      name: Funzioni di rotazione/posizionamento del braccio del piatto
      description: Specifica le caratteristiche di posizionamento che influenzano
        l'angolazione, la rotazione e il bloccaggio del braccio.
    cymbal_arm_style:
      name: Stile del braccio del piatto
      description: Specifica se il braccio del piatto è dritto o a sbalzo, per la
        portata e il posizionamento Preferenze.
    cymbal_drum_case_wheel_configuration:
      name: Configurazione della ruota cassa per piatti e tamburi
      description: Indica se la cassa è dotata di ruote e (se applicabile) la configurazione
        delle ruote per il trasporto su ruote.
    cymbal_hammering_style:
      name: Stile di martellamento dei piatti
      description: Processo/aspetto della martellatura. Impact , complessità e sensazione
        al tatto.
    cymbal_kit_components_included:
      name: Componenti del kit di piatti inclusi
      description: Specifica quali tipi di piatti sono inclusi nel kitdi piatti Ride
        (oltre al piatto Ride stesso).
    cymbal_kit_items_included:
      name: Articoli del kit di piatti inclusi
      description: Indica quali piatti sono inclusi nel kit/imballaggio (per tipologia
        di piatto).
    cymbal_lathing:
      name: Tornitura dei piatti
      description: Specifica se e in che misura la superficie del piatto è tornita
        (scanalata) rispetto a quella non tornita/grezza.
    cymbal_playing_style_genre:
      name: Stile/genere di esecuzione dei piatti
      description: Identifica il Context di esecuzione tipico per cui i piatti sono
        progettati (ad esempio, cembali per la danza del ventre rispetto ai cembali
        a mano per banda/orchestra).
    cymbal_set_configuration:
      name: Configurazione del set di piatti
      description: Indica se il prodotto è venduto come piatto singolo, in abbinamento
        o in un set multi-abbinamento (ad esempio, per lezioni di gruppo).
    cymbal_sound_character:
      name: Carattere sonoro del piatto
      description: Descrive il profilo tonale/la sonorità complessiva del piatto utilizzato
        per la scoperta (ad esempio, brillante o scuro).
    cymbal_sustain:
      name: Piatto sustain
      description: Per quanto tempo risuona il piatto dopo essere stato colpito.
    cymbal_type:
      name: Tipo di piatto
      description: Specifica la funzione del piatto che il pad elettronico per piatti
        è destinato a emulare.
    cymbal_volume_level:
      name: Livello del volume dei piatti
      description: Categoria di volume/uscita percepita del piatto.
    cymbal_weight_class:
      name: Classe di peso dei piatti
      description: Indica la classe di peso del piatto, che influisce su timbro, volume
        e risposta.
    dairy_heat_treatment:
      name: Regolazione del calore dei latticini.
      description: Indica il livello di lavorazione o pastorizzazione applicato alla
        panna (ad esempio, cruda, pastorizzata, UHT), che influisce sulla durata della
        mensola, sul sapore e sulla capacità di montare.
    damage_type:
      name: Tipo di danno
      description: Specifica i tipi di danni al parabrezza che il kit è destinato
        a riparare.
    damper_pedal_style:
      name: Pedale smorzatore
      description: Descrive la forma fisica del pedale del sordino utilizzato nelle
        tastiere/pianoforti digitali.
    damping_adjustability:
      name: Regolazione dell'ammortizzazione
      description: Indica quali parametri di smorzamento e/o altezza Ridesono regolabili
        sull'ammortizzatore.
    damping_level:
      name: Livello di smorzamento
      description: Indica la quantità relativa di riduzione del volume e del sustain
        fornita dalla funzione mute.
    dance_occasion:
      name: Evento di ballo
      description: Indica l'uso previsto. Context dell'indumento nell'ambito della
        pratica o dell'esecuzione della danza.
    darbuka_accessories_included:
      name: Accessori per darbuka inclusi
      description: Elenco degli accessori comunemente inclusi con la darbuka.
    darbuka_body_finish_type:
      name: Tipo di finitura del corpo Darbuka
      description: Descrive la finitura esterna, il rivestimento o la variante decorativa
        del corpo della darbuka.
    darbuka_head_material:
      name: Materiale per la testa della darbuka
      description: Specifica il materiale della membrana della pelle del tamburo di
        una darbuka.
    dart_barrel_material:
      name: Materiale del fusto della freccetta
      description: Specifica il materiale principale del corpo della freccetta, che
        influisce sulla distribuzione del peso, sulla durata e sul prezzo.
    dart_shaft_design:
      name: Design dell'asta della freccia
      description: Classifica il design meccanico dell'albero, ad esempio se è fisso,
        rotante, telescopico o integrato nella spira, il che influisce sulle prestazioni
        e sul prezzo.
    dart_shaft_thread_type:
      name: Tipo thread dell'asta del dardo
      description: Indica la taglia/tipo thread utilizzata per avvitare l'asta nel
        corpo della freccetta, garantendo la compatibilità tra aste e corpi.
    dart_thread_size:
      name: Taglia del thread del dardo
      description: Specifica la taglia/standard thread con cui il componente è compatibile,
        garantendo l'accoppiamento tra alberi, punte e cilindri.
    dart_tip_compatibility:
      name: Compatibilità della punta della freccetta
      description: Indica se la parte della freccetta è destinata a freccette con
        punta in acciaio, con punta morbida o a entrambi i tipi.
    dart_tip_connection_type:
      name: Tipo di relazione della punta della freccetta
      description: Descrive le specifiche thread o il sistema di montaggio che la
        punta utilizza per fissarsi al corpo o all'asta della freccetta, garantendone
        la compatibilità.
    dartboard_tournament_approval:
      name: Approvazione del torneo di freccette
      description: Indica se il bersaglio per freccette è ufficialmente approvato
        da specifiche federazioni o leghe di freccette.
    dartboard_type:
      name: Tipo di bersaglio per freccette
      description: Classifica i bersagli per freccette in base alla tecnologia di
        costruzione e alla compatibilità con le freccette (ad esempio, in setole,
        elettroniche, magnetiche).
    dash_cover_construction_type:
      name: Tipo di costruzione della copertura del cruscotto
      description: Descrive come è formato/strutturato il rivestimento del cruscotto
        (ad esempio, stampato o cucito), che Impact sulla precisione di montaggio
        e sull'aspetto.
    dash_cover_cutout_configuration:
      name: Configurazione del ritaglio del coperchio del cruscotto
      description: Indica per quali aperture/sensori dashboard OEM la copertura è
        pretagliata o sagomata.
    dashboard_accessory_position:
      name: posizione accessori cruscotto
      description: Specifica dove, sul dashboard o nelle sue immediate vicinanze,
        l'accessorio deve essere posizionato o montato.
    date_variety:
      name: Varietà di datteri
      description: Specifica la cultivar/varietà dei datteri (ad esempio, Medjool,
        Deglet Noor, Ajwa). La varietà Influence fortemente il sapore, la consistenza
        e la forma, ed è Highlight nella maggior parte dei titoli e delle descrizioni
        dei prodotti; pertanto, evidenziarla migliora la ricerca e la visibilità.
    dayan_head_material:
      name: Materiale della testa del dayan
      description: Materiale della superficie di gioco (pudi), come ad esempio un
        dispositivo di interfaccia umana di tipo o sintetico.
    dayan_strap_material:
      name: Materiale del cinturino del dayan
      description: Materiale delle cinghie di tensione (baddhi) utilizzate per allacciare
        il dayan.
    dayan_syahi_type:
      name: Tipo Dayan syahi
      description: Tipo di applicazione di syahi (pasta di accordatura nero) sulla
        testa del dayan.
    decaffeination_method:
      name: Metodo di decaffeinizzazione
      description: Descrive il processo utilizzato per rimuovere la caffeina dal caffè
        decaffeinato.
    decal_installation_method:
      name: Metodo di installazione dell'adesivo
      description: Modalità di applicazione dell'adesivo sulla superficie del veicolo
        (ad esempio, applicazione a secco, applicazione a umido). I dettagli relativi
        agli strumenti/requisiti (ad esempio, nastro adesivo o pistola termica) devono
        essere specificati nelle istruzioni o nella documentazione relativa agli strumenti,
        ove applicabile.
    decal_orientation:
      name: Orientamento adesivo
      description: Sia che l'adesivo sia destinato all'applicazione su superfici interne
        in vetro o esterne.
    decal_placement_type:
      name: Tipo di posizionamento dell'adesivo
      description: Indica la zona del veicolo in cui l'adesivo deve essere applicato
        (ad esempio, pannello della carrozzeria, paraurti, cofano).
    decal_visibility_property:
      name: proprietà di visibilità decalcomania
      description: Proprietà ottiche/di visibilità di un adesivo destinate a migliorare
        la visibilità o la risposta alla luce (ad esempio, caratteristiche riflettenti,
        fluorescenti, fosforescenti o di trasparenza).
    deck_concave_level:
      name: Livello concavo del ponte
      description: Indica la profondità o l'intensità della concavità della tavola
        (ad esempio, lieve, media, profonda).
    deck_flex_rating:
      name: Valutazione della flessibilità del ponte
      description: Valutazione qualitativa della flessibilità/rigidità del ponte.
    deck_material:
      name: Materiale del deck
      description: Identifica il materiale di costruzione principale della tavola
        da skateboard.
    decoder_interface_socket_type:
      name: Interfaccia decodificatore / tipo di socket
      description: Tipo di interfaccia del decoder digitale o configurazione del decoder
        di bordo per il modello di locomotiva.
    decoration_technique:
      name: Tecnico decoratore
      description: Identifica il metodo principale utilizzato per applicare grafiche
        o decorazioni alla t-shirt.
    decorative_stamp_form_factor:
      name: Fattore di forma del timbro decorativo
      description: Identifica il formato fisico del timbro e il modo in cui stampa
        un disegno (timbro singolo, set, rullo, sfondo, ecc.).
    decorative_tape_application:
      name: Applicazione per nastro decorativo
      description: L'uso principale Craft è quello del nastro decorativo progettato
        o del mercato per.
    decorative_tape_format:
      name: Formato del nastro decorativo
      description: Specifica le modalità Supply/confezionamento del nastro decorativo
        per l'uso.
    decoy_buoyancy:
      name: Galleggiabilità dell'esca
      description: Descrive il comportamento dell'esca nella colonna d'acqua (galleggiante,
        sospesa o affondante).
    decoy_joint_type:
      name: Tipo di giunto di richiamo
      description: Indica se il corpo dell'esca è solido o articolato, influenzandone
        l'azione di nuoto.
    decoy_motion_mechanism:
      name: Meccanismo Motion dell'esca
      description: Descrive in che modo, se del caso, l'esca produce movimento o increspatura
        dell'acqua per attirare la selvaggina.
    decoy_posture:
      name: postura da esca
      description: Indica la postura o l'attività raffigurata dell'animale riprodotto
        dal manichino (ad esempio, mentre si nutre, riposa, è in allerta).
    decoy_size_class:
      name: Decoy taglia classe
      description: Classifica la scala relativa dell'esca rispetto all'animale reale
        (ad esempio, Standard, Magnum, Sovradimensionata).
    decoy_style:
      name: Stile esca
      description: Definisce il fattore di forma fisica o la classe di progettazione
        dell'esca per aiutare i cacciatori a scegliere la configurazione corretta.
    deli_meat_variety:
      name: Varietà di salumi
      description: Classifica lo specifico tipo di salume (ad esempio, salame, mortadella,
        prosciutto crudo, roast beef).
    delivery_form:
      name: Formato di consegna
      description: Formato di consegna fisico del detergente per iniettori.
    denim_composition:
      name: Composizione denim
      description: Composizione primaria delle fibre del denim (fibre di base escluse
        tinture/finiture).
    denim_finish:
      name: Finitura denim
      description: Finitura superficiale/di processo applicata al tessuto denim.
    denim_intended_use:
      name: Uso previsto del denim
      description: Progetto/utilizzo tipico per cui il denim è commercializzato.
    denim_stretch_type:
      name: Denim elasticizzato
      description: Sia che il denim abbia elasticità meccanica, aggiunta di elastan/spandex
        o che non sia elasticizzato.
    denim_wash:
      name: Lavaggio denim
      description: Indica la tonalità o la variante di lavaggio applicata al tessuto
        denim (ad esempio, chiaro, scuro, grezzo, acido).
    derailleur_cage_length:
      name: lunghezza della gabbia del deragliatore
      description: Indica la lunghezza della gabbia del deragliatore che determina
        la capacità della catena (principalmente per i deragliatori posteriori).
    derailleur_mounting_style:
      name: Stile di montaggio del deragliatore
      description: Specifica come il deragliatore si fissa al Frame o al forcellino
        della bicicletta (ad esempio, brasatura, morsetto, montaggio diretto, UDH).
    derailleur_type:
      name: Tipo di deragliatore
      description: Indica se il prodotto è un deragliatore anteriore o posteriore.
    deshedder_tool_type:
      name: Tipo di strumento Deshedder
      description: Classifica lo stile strutturale del dispositivo di rimozione della
        muta in modo che l'acquirente possa scegliere il metodo di toelettatura preferito
        (ad esempio, lama, blocco, spazzola o guanto).
    diabolo_axle_system:
      name: Sistema di assi Diabolo
      description: Specifica il sistema/configurazione dell'asse del diabolo che influisce
        su grind, stabilità e usura della striscia.
    diagnostic_functions_supported:
      name: Functions diagnostiche supportate
      description: Specifica le Functions di diagnostica/manutenzione che lo scanner
        è in grado di eseguire.
    diagnostic_interface_type:
      name: Tipo di interfaccia diagnostica
      description: relazione/interfaccia utilizzata per comunicare con il veicolo
        o il dispositivo (ad esempio, OBD-II, Bluetooth, Wi-Fi, USB).
    diamond_color_grade:
      name: Grado di colore del diamante
      description: Indica il grado di colore dei diamanti, da D (incolore) a Z (colore
        chiaro), oppure denota diamanti di colore fantasia.
    diaper_cover_style:
      name: Copripannolino
      description: Definisce la silhouette o lo stile decorativo del copripannolino
        per facilitare la navigazione e il filtraggio in base allo stile.
    diastatic_power_unit:
      name: unità di potenza diastasica
      description: Specifica il sistema di unità utilizzato per riportare sulle vendite
        il valore di potenza diastasica di un prodotto (ad esempio, °Lintner vs Windisch-Kolbach).
    diatonic_harmonica_tuning_system:
      name: Sistema di accordatura dell'armonica diatonica
      description: Specifica la layoutdelle note/il sistema di accordatura utilizzato
        dall'armonica diatonica.
    dice_sides:
      name: lati dei dadi
      description: Numero di lati (facce) per dado per i dadi inclusi nel prodotto
        (ad esempio, d6, d20). Per i set misti, utilizzare il valore predominante
        o elencare come valori multipli, se supportato.
    didgeridoo_construction_type:
      name: Tipo di costruzione del didgeridoo
      description: Come viene costruito o formato il didgeridoo (approccio costruttivo
        tradizionale o moderno).
    dietary_formulation_claim:
      name: Dichiarazione relativa alla formulazione dietetica
      description: Highlight gli attributi o le esclusioni chiave della formulazione
        rilevanti per la nutrizione equina (ad esempio, senza cereali, a basso contenuto
        di amido, biologico).
    dinosaur_playset_scale_figure_size_class:
      name: Dinosauro playset scala/figure taglia class
      description: Descrive la scala generale dei dinosauri/figure inclusi per facilitare
        la compatibilità con altri set.
    dinosaur_species_included:
      name: Specie di dinosauri incluse
      description: Indica quali specie di dinosauri sono rappresentate nel playset
        (figure o dinosauri in plastica).
    dipsy_diver_size_designation:
      name: Designazione della taglia del subacqueo Dipsy
      description: Indica il codice di taglia del sommergibile da pesca, definito
        dal produttore, che è correlato al peso e alla profondità di immersione.
    disc_brake_rotor_mount_type:
      name: Tipo di montaggio del rotore del freno a disco
      description: Indica come il rotore del freno a disco si fissa al mozzo (ad esempio,
        6 bulloni, Center Lock).
    disc_lock_accessories_included:
      name: Accessori per il lucchetto a disco inclusi
      description: Specifica gli articoli aggiuntivi inclusi nella confezione del
        lucchetto a disco per bicicletta, come ad esempio un cavo di promemoria, una
        custodia, una staffa di montaggio o delle batterie.
    disco_ball_mirror_tile_material:
      name: Materiale dei riquadri a specchio della palla da discoteca
      description: Il materiale del rivestimento riflettente sulla palla da discoteca
        (se presente).
    disco_ball_mirror_tile_size:
      name: Specchio palla da discoteca riquadro taglia
      description: Taglia approssimativa della persona fisica mirrorriquadro/squares
        on the disco ball.
    display_backlight_color:
      name: retroilluminazione a colori del display
      description: Colore della retroilluminazione/illuminazione del display/quadrante
        del misuratore.
    disposable_compostable_claim:
      name: Richiesta di reso per prodotti monouso/compostabili
      description: Indica se il prodotto è compostabile, biodegradabile, riciclabile
        o nessuna di queste caratteristiche (ove applicabile).
    distillation_method:
      name: Metodo di distillazione
      description: Indica il metodo di distillazione o il tipo di alambicco utilizzato
        per produrre il distillato.
    distilled_water_intended_use:
      name: Uso previsto dell'acqua distillata
      description: Definisce l'applicazione principale per l'acqua distillata (ad
        esempio, bere, apparecchio CPAP, umidificatore, ferro da stiro a vapore).
    distress_transmission_frequency:
      name: Frequenza di trasmissione del soccorso
      description: Frequenza/frequenze radio principali utilizzate per l'allerta di
        soccorso.
    distressing_level:
      name: Livello di disagio
      description: Specifica la quantità di usura, strappi o sfilacciamenti intenzionali
        applicati al tessuto.
    distressing_style:
      name: Stile angosciante
      description: Indica il tipo o il livello di usura sui jeans, come ad esempio
        strappi o effetto baffi.
    distributor_advance_mechanism:
      name: Meccanismo di anticipo del distributore
      description: Specifica il tipo di meccanismo di anticipo dell'accensione utilizzato
        dal distributore.
    distributor_cap_terminal_type:
      name: Tipo di terminale del tappo del distributore
      description: Specifica lo stile del terminale del coperchio del distributore.
    distributor_gear_material:
      name: materiale degli ingranaggi del distributore
      description: Specifica il materiale dell'ingranaggio di trasmissione del distributore.
    distributor_ignition_type:
      name: Tipo di accensione del distributore
      description: Specifica se il distributore è progettato per sistemi a puntine,
        accensione elettronica o sistemi di tipo HEI.
    distributor_kit_contents:
      name: Contenuto del kit del distributore
      description: Indica quali componenti sono inclusi con il distributore (ad esempio,
        calotta, rotore, Modules di accensione, guarnizione/O-ring, ingranaggio di
        trasmissione, cablaggio/connettore).
    dive_computer_form_factor:
      name: Fattore di forma del computer subacqueo
      description: Specifica il design fisico o il metodo di montaggio del computer
        subacqueo, ad esempio montaggio a console o a orologio.
    diving_mask_design:
      name: Design della maschera subacquea
      description: Definisce lo stile strutturale generale della maschera subacquea,
        Influence la vestibilità, il campo visivo e l'uso previsto.
    divot_tool_prong_configuration:
      name: Configurazione dei rebbi dell'attrezzo per scavare zolle
      description: Specifica il numero e la disposizione dei rebbi dell'attrezzo per
        riparare le zolle danneggiate del manto erboso.
    divot_tool_style:
      name: Stile attrezzo per scavare zolle
      description: Definisce lo stile strutturale o di utilizzo complessivo dell'attrezzo
        per riparare le zolle, come ad esempio fisso, a serramanico/pieghevole, multiuso
        o accessori che si agganciano a un cappello o a una mazza.
    djembe_shell_construction:
      name: costruzione della conchiglia Djembe
      description: Descrive il metodo di costruzione della cassa/corpo del djembe.
    djembe_tuning_system:
      name: Sistema di accordatura del djembe
      description: Specifica come viene tensionato/accordato il djembe.
    dmx_output_connector_type:
      name: tipo di connettore di uscita DMX
      description: Formato di connessione fisica utilizzato per la/le porta/e di uscita
        DMX del titolare del trattamento.
    doctor_playset_items_included:
      name: Articoli del kit del dottore inclusi
      description: Specifica gli strumenti medici giocattolo e gli accessori per il
        gioco di ruolo inclusi nel set da dottore (ad esempio, stetoscopio, siringa,
        martelletto per i riflessi).
    doctor_playset_role_play_setting:
      name: Dottore playset gioco di ruolo Impostazioni
      description: Identifica il Context gioco di ruolo primario rappresentato dal
        set di gioco del dottore.
    doctor_playset_wearable_items_included:
      name: Articoli indossabili del kit del dottore inclusi
      description: Indica i componenti del costume indossabili inclusi nel playset.
    doll_accessory_type:
      name: Tipo di accessorio per bambole
      description: Definisce il tipo di accessorio per bambole o action figure (ad
        esempio, abbigliamento, scarpe, mobili, supporti per l'esposizione), consentendo
        all'acquirente di navigare e filtrare all'interno di questa categoria di accessori.
    doll_eye_type:
      name: tipo occhi da bambola
      description: Specifica lo stile di costruzione degli occhi della bambola (ad
        esempio, in acrilico incastonato, dipinti, con illuminazione a LED).
    doll_hair_fiber_type:
      name: Tipo di fibra per capelli da bambola
      description: Tipo di capelli/fibra utilizzati sulla bambola (o assenza di essi),
        che influiscono sul realismo, sullo styling e sulla cura.
    doll_making_kit_components_included:
      name: Componenti del kit di creazione bambola inclusi
      description: Elenca i materiali e gli strumenti principali inclusi nel kit per
        la creazione di bambole, in modo che l'acquirente possa confrontare i pacchetti
        e sapere di cosa ha bisogno per Supply autonomamente.
    dollhouse_installation_placement_type:
      name: Tipo di installazione/posizionamento della casa delle bambole
      description: Come si intende utilizzare o posizionare la casa delle bambole
        (ad esempio, su un tavolo, a terra o a parete).
    dollhouse_items_included:
      name: Articolo sulla casa delle bambole incluso
      description: Indica cosa è incluso nella confezione della casa delle bambole
        (mobili, bambole, accessori).
    dollhouse_lighting_type:
      name: tipo di illuminazione per casa delle bambole
      description: Tipo di illuminazione inclusa o supportata dalla casa delle bambole.
    dollhouse_room_type:
      name: tipo di stanza a casa delle bambole
      description: Specifica la stanza/area all'interno di una casa delle bambole
        in cui l'accessorio viene tipicamente utilizzato.
    dollhouse_scale:
      name: Scala per casa delle bambole
      description: Rapporto di scala di una casa delle bambole o dei suoi accessori
        (ad esempio, 1:12) per garantire la compatibilità tra case, mobili e personaggi.
    dollhouse_style_theme:
      name: Stile/tema casa delle bambole
      description: Stile generale o tema della casa delle bambole per la visualizzazione
        e la decorazione (ad esempio, moderno vs vittoriano).
    donnos_playing_technique:
      name: tecnica di gioco di Donnos
      description: Modalità di utilizzo/azionamento del Donnos (solo con le mani o
        con bastone/battitore), per soddisfare le aspettative dell'acquirente e accessori
        inclusi.
    donnos_tuning_system:
      name: Sistema di accordatura del donnos
      description: Metodo principale utilizzato per accordare o modificare l'intonazione
        (ad esempio, corde di tensione/meccanismo a pressione).
    door_assembly_type:
      name: Tipo di assemblaggio della porta
      description: 'Indica cosa è incluso: solo il guscio della porta, il rivestimento
        della porta o l''intero gruppo porta.'
    door_closure_mechanism:
      name: Meccanismo di chiusura della porta
      description: Definisce il meccanismo che controlla la chiusura della porta (ad
        esempio, chiusura ammortizzata, chiusura magnetica).
    door_handle_components_included:
      name: Componenti handle della porta inclusi
      description: Indica quali componenti chiave sono inclusi con la handle della
        porta (ad esempio, cilindro della serratura, guarnizione/tenuta, copertura
        di finitura, hardware di montaggio, cavo di collegamento, fermo/attuatore).
    door_handle_operation:
      name: Funzionamento handle della porta
      description: Specifica la modalità di azionamento/funzionamento principale del
        gruppo handle della portiera del veicolo (ad esempio, collegamento meccanico,
        cilindro della chiave, sistema a sfioramento/pulsante senza chiave, apertura
        elettrica a scomparsa).
    door_lock_knob_attachment_method:
      name: Metodo di fissaggio della manopola della serratura della porta
      description: Specifica come la manopola della serratura della porta si fissa
        all'asta di bloccaggio (ad esempio, tramite filettatura o a pressione).
    door_lock_position:
      name: Posizione della serratura della porta
      description: Specifica per quale posizione della porta/apertura la serratura
        o la parte della serratura è progettata per essere installata su un veicolo.
    door_seal_feature_set:
      name: Set di guarnizioni per porte
      description: Caratteristiche funzionali della guarnizione della porta.
    door_seal_material_type:
      name: tipo di materiale per la guarnizione della porta
      description: Famiglia di elastomeri/materiali principali utilizzati per la guarnizione
        della porta (Beyond al materiale generico).
    door_seal_product_form:
      name: Forma del prodotto per la guarnizione della porta
      description: Indica la forma di vendita/installazione del sigillo della porta.
    door_window_operation:
      name: Funzionamento del finestrino della porta
      description: Specifica se il sistema di finestre della porta è progettato per
        un funzionamento manuale o motorizzato, oppure se la porta non ha finestre.
    double_decker_bus_deck_configuration:
      name: Configurazione del piano autobus a due piani
      description: Specifica la configurazione di accesso al ponte/tetto di un autobus
        a due piani.
    double_drum_pedal_linkage_medium:
      name: Collegamento a doppio pedale per batteria medio
      description: Specifica il mezzo utilizzato per collegare il pedale secondario
        al pedale primario (ad esempio, albero di trasmissione, catena, cinghia).
    double_end_bag_core_type:
      name: tipo di nucleo del sacco a doppia estremità
      description: Identifica la struttura interna del nucleo di impatto, che determina
        la velocità di rimbalzo, la sensazione al tatto e i requisiti di manutenzione.
    double_pointed_needle_point_style:
      name: Stile a punto ago a doppia punta
      description: Descrive l'affilatura della punta/Shapes adatte a diversi filati
        e stili di lavorazione a maglia.
    dough_extruder_accessories_included:
      name: Accessori per estrusore per impasti inclusi
      description: Componenti aggiuntivi inclusi con l'estrusore per impasti.
    dough_extruder_operation_type:
      name: Tipo di funzionamento dell'estrusore per impasti
      description: Come l'impasto viene spinto attraverso l'estrusore per formare
        Shapes.
    dough_extruder_shape_disc_included:
      name: Estrusore per impasti. Disco Shapes incluso.
      description: Le Shapesche l'estrusore può produrre tramite i dischi/ugelli inclusi.
    dough_format:
      name: Formato dell'impasto
      description: Identifica la presentazione fisica/Shapes dell'impasto all'interno
        della confezione (ad esempio, palla, sfoglia, disco, fili sminuzzati).
    doumbek_accessories_included:
      name: Accessori per doumbek inclusi
      description: Accessori inclusi con il doumbek (ad esempio, chiave di accordatura,
        cassa).
    doumbek_head_material:
      name: Materiale della testa del doumbek
      description: Materiale della membrana del tamburo (doumbek).
    doumbek_head_type:
      name: Tipo di testa Doumbek
      description: Costruzione/tipologia della testa del doumbek (come viene realizzata
        o montata la membrana).
    doumbek_playing_style_technique:
      name: Stile/tecnica di gioco di Doumbek
      description: Context/stile di esecuzione previsto, comunemente associato al
        doumbek.
    doumbek_tuning_system:
      name: Sistema di accordatura del doumbek
      description: Come viene tensionato/accordato il doumbek (o se non è accordabile).
    dowel_end_style:
      name: Stile terminale a tassello
      description: Descrive il taglio/Shapes delle estremità dei Impact , la facilità
        di inserimento, la sicurezza e l'uso Craft previsto.
    dowel_surface_texture:
      name: Texture della superficie del tassello
      description: Descrive la condizione della superficie del tassello, ad esempio
        liscia o scanalata, che influisce sull'aspetto e sull'adesione della colla.
    drafting_compass_adjustment_mechanism:
      name: Meccanismo di regolazione del compasso da disegno
      description: Meccanismo di regolazione fine primario utilizzato per impostare
        il raggio con precisione.
    drafting_compass_fine_adjustment_mechanism:
      name: Meccanismo di regolazione fine del compasso tecnico
      description: Tipo di regolazione fine utilizzata per impostare con precisione
        il raggio (se presente).
    drafting_compass_lead_holder_type:
      name: Portamine per compasso lead disegno
      description: Tipo di inserto/supporto per il disegno incluso o supportato dal
        compasso.
    drag_system_material:
      name: Materiale del sistema di trascinamento
      description: Identifica il materiale o la tecnologia utilizzati nel pacco di
        trascinamento, Influence la resistenza al calore e la scorrevolezza.
    drag_system_type:
      name: Tipo di sistema di frizione
      description: Indica il tipo di meccanismo di frizione utilizzato nel mulinello,
        come frizione anteriore, posteriore, a leva, a stella, magnetica o a disco.
    drag_type:
      name: Tipo trascinamento
      description: Specifica il tipo di meccanismo di frizione utilizzato dal mulinello
        (a frizione o ad azionamento).
    drawer_features:
      name: Caratteristiche del cassetto
      description: Dettagli relativi a elementi costruttivi o funzionalità speciali
        dei cassetti (ad esempio, chiusura ammortizzata, rivestimento in feltro).
    drawer_slide_type:
      name: Tipo di scorrimento del cassetto
      description: Specifica il tipo di montaggio e di estensione delle guide del
        cassetto (ad esempio, montaggio inferiore, estrazione totale).
    drawing_ink_compatible_tools:
      name: Strumenti compatibili con l'inchiostro da disegno
      description: Specifica gli strumenti dell'app per cui l'inchiostro è destinato
        (ad esempio, penna a immersione o pennello).
    drawing_ink_permanence:
      name: Inchiostro da disegno permanente
      description: Indica le caratteristiche di permanenza importanti per l'opera
        d'arte finita e la riproduzione.
    dress_embellishment:
      name: Decorazione dell'abito
      description: Highlight gli elementi decorativi più importanti incorporati nel
        design dell'abito.
    dress_train_type:
      name: Tipo di strascico
      description: Indica la presenza e la lunghezza/stile dello strascico dell'abito,
        fornendo informazioni sul grado di formalità e sull'idoneità Venue .
    dried_surface_finish:
      name: Finitura della superficie essiccata
      description: Descrive l'aspetto tipico della superficie dopo l'asciugatura (lucentezza/struttura).
    drink_tube_insulation:
      name: Isolamento del tubo per bere
      description: Indica se il tubo per bere include un isolamento o una guaina termica
        per impedire che i liquidi si riscaldino o si congelino.
    drive_band_cross_section_shape:
      name: Shapesdella sezione trasversale della banda di trasmissione
      description: Il Shapes della fascia di trasmissione (rotonda, piatta, ecc.).
    drive_band_join_type:
      name: Tipo di giunzione della fascia di trasmissione
      description: Modalità di giunzione/costruzione della cinghia di trasmissione
        (continua o con necessità di legature, ecc.).
    drive_band_material_type:
      name: Tipo di materiale della cinghia di trasmissione
      description: Specifica il materiale/tipo della cinghia di trasmissione utilizzata
        sui filatoi.
    drive_location:
      name: Drive sede
      description: Identifica la posizione del volano/meccanismo di trasmissione sull'ellittica,
        Influence l'ingombro e la sensazione Motion .
    drive_mechanism:
      name: meccanismo di azionamento
      description: Identifica il tipo di trasmissione utilizzato per trasferire la
        potenza dai pedali al volano.
    drive_shaft_material:
      name: Materiale dell'albero di trasmissione
      description: Specifica il materiale di costruzione principale del tubo dell'albero
        di trasmissione o dell'intero gruppo.
    drive_system:
      name: Sistema di azionamento
      description: Specifica il meccanismo che trasferisce la forza del pedale al
        sistema di resistenza.
    drivetrain_configuration:
      name: Configurazione della trasmissione
      description: Specifica la configurazione della trasmissione della bicicletta,
        indicando se il mozzo posteriore è fisso, a ruota libera a velocità singola
        o flip-flop.
    drivetrain_speed_compatibility:
      name: compatibilità della velocità della trasmissione
      description: Indica le velocità del pacco pignoni con cui la corona è progettata
        per funzionare, garantendo profili e spaziatura dei denti adeguati.
    drone_positioning_system:
      name: Sistema di posizionamento del drone
      description: Tecnologia di posizionamento/mantenimento integrata, supportata
        dal drone per la navigazione e il volo stazionario stabile.
    drone_transmission_type:
      name: Tipo di trasmissione del drone
      description: Metodo primario utilizzato per il controllo e/o il collegamento
        video tra il drone e il titolare del trattamento/dispositivo.
    drop_spindle_whorl_position:
      name: Posizione della vite Drop
      description: sede della spira sull'albero.
    drum_carder_accessories_included:
      name: Accessori per carda a tamburo inclusi
      description: Articolo comunemente incluso in un kit di cardatrice a tamburo.
    drum_clamp_locking_mechanism:
      name: Meccanismo di bloccaggio del morsetto del tamburo
      description: Specifica come il morsetto si blocca/stringe al tubo/cerchio (ad
        esempio, bullone ad alette, bullone a chiavetta del tamburo, sgancio rapido).
    drum_clamp_mount_interface:
      name: Interfaccia di montaggio a morsetto per tamburo
      description: Specifica cosa offre il morsetto per il fissaggio di accessori
        (ad esempio, ricevitore a L, snodo sferico, inclinatore per piatti).
    drum_clamp_type:
      name: Tipo di morsetto a tamburo
      description: Specifica il tipo di morsetto funzionale utilizzato hardware di
        montaggio della kit (ad esempio, morsetto per cerchio rispetto a morsetto
        per tubo/pannello).
    drum_head_application_batter_resonant:
      name: Applicazione per pelli di tamburo (battente/risonante)
      description: Specifica per quale lato/ruolo è progettata la pelle su un tamburo
        (superficie di percussione superiore rispetto al lato inferiore risonante/rullante).
    drum_head_collar_type:
      name: tipo di collare per testata a tamburo
      description: Specifica se la testa ha un collare standard, un collare basso
        o un profilo del collare speciale per adattarsi a determinati bordi/gusci
        dei cuscinetti.
    drum_head_damping_control:
      name: Controllo di smorzamento della pelle del tamburo
      description: Funzioni di controllo degli armonici integrate o stile di smorzamento
        incluso nel design della pelle.
    drum_head_film_material:
      name: materiale per pellicole per pellicole di tamburo
      description: Materiale primario della pellicola per la testa (comunemente tereftalato/Mylar,
        ma possono essere inclusi materiali speciali).
    drum_head_hoop_collar_type:
      name: Tipo di cerchio/collarino della pelle del tamburo
      description: Identifica la struttura del cerchio e del collarino della pelle
        del tamburo (ad esempio, profilo del collarino e materiale del cerchio), che
        può influire sull'adattamento e sulla stabilità dell'accordatura su determinati
        fusti e cerchi.
    drum_head_hoop_rim_material:
      name: Materiale per cerchio/bordi della pelle del tamburo
      description: Il materiale del cerchio interno (il cerchio incorporato nella
        pelle) può influire sulla durata e sulla stabilità dell'accordatura.
    drum_head_included:
      name: Pelle del tamburo inclusa
      description: Indica se la pelle battente e/o la pelle risonante sono incluse
        con il tamburo.
    drum_head_muffling_feature:
      name: Funzionalità di attutimento della pelle del tamburo
      description: Funzioni di controllo degli armonici integrate nella pelle del
        tamburo.
    drum_head_muffling_type:
      name: Tipo di smorzamento della testa del tamburo
      description: Indica se la pelle del tamburo include elementi integrati per il
        controllo/smorzamento degli armonici.
    drum_head_ply_count:
      name: Numero di strati della pelle del tamburo
      description: Numero di strati di pellicola utilizzati nella costruzione della
        pelle del tamburo (ad esempio, 1 strato, 2 strati).
    drum_head_position:
      name: Posizione della testa del tamburo
      description: Indica se la pelle del tamburo è destinata ad essere utilizzata
        come pelle battente (superiore/di impatto), come pelle risonante (inferiore),
        come pelle per rullante (inferiore) o se può essere utilizzata in entrambi
        i modi.
    drum_head_reinforcement_type:
      name: Tipo di rinforzo della testa del tamburo
      description: Specifica se la pelle del rullante include elementi di rinforzo
        come un punto centrale o un anello di controllo per aumentarne la durata e
        focalizzare il suono.
    drum_head_surface_finish:
      name: Finitura della superficie della pelle del tamburo
      description: La texture/finitura della superficie della testina Influence l'attacco
        e la risposta del pennello.
    drum_head_type:
      name: Tipo di testina a tamburo
      description: Specifica la costruzione/il tipo di pelle utilizzata sul tamburo
        (principalmente per pelli battenti/risonanti come Supply).
    drum_key_design_type:
      name: Tipo di design della chiave per tamburo
      description: Descrive il design funzionale della chiave del tamburo di tensione
        (ad esempio, standard, a cricchetto, handle a T).
    drum_key_drive_type:
      name: Tipo di azionamento della chiave del tamburo
      description: Specifica il tipo di azionamento/interfaccia della chiave del tamburo
        utilizzata per innestare l'asta di tensione o hardware di montaggio.
    drum_key_handle_style:
      name: stile handle a chiave di tamburo
      description: Descrive l' handle/lo stile ergonomico della chiave per batteria,
        che influisce sul comfort e sulla leva durante l'accordatura.
    drum_kit_included_items:
      name: kit inclusa articolo
      description: Elenca i principali articoli inclusi nel pacchetto della kit ,
        Beyond ai fusti/pad (ad esempio, hardware, piatti, sgabello).
    drum_kit_portability:
      name: Portabilità della kit
      description: Indica se il kit è progettato per un ingombro minimo durante lo
        stoccaggio/trasporto (ad esempio, viaggio/compatto/pieghevole).
    drum_kit_shell_construction_features:
      name: Caratteristiche costruttive kit fusto della batteria
      description: La struttura dei fusti (numero di strati/tipologia) influisce sul
        suono e sulla durata.
    drum_mount_clamp_type:
      name: Tipo di morsetto di montaggio del tamburo
      description: Descrive il fattore di forma del morsetto utilizzato nei hardware
        di montaggio dei tamburi.
    drum_multi_clamp_clamp_type:
      name: Morsetto a tamburo multi-morsetto tipo
      description: Lo stile/la configurazione funzionale del morsetto multiplo (come
        si blocca e a cosa si collega).
    drum_mute_material:
      name: Materiale per sordina per batteria
      description: Specifica il materiale principale del silenziatore per batteria
        che entra in contatto con la pelle del tamburo e/o smorza le vibrazioni.
    drum_pad_triggering_zones:
      name: Zone trigger del pad della batteria
      description: Indica il numero/tipo di zone trigger supportate dal pad del tom
        (ad esempio, solo pelle o pelle + bordo), che influisce sull'espressività
        e sulla compatibilità Modules .
    drum_pedal_accessories_included:
      name: Accessori per pedale del tamburo inclusi
      description: Elenca gli accessori e i componenti principali inclusi nella confezione
        del pedale per batteria.
    drum_pedal_baseplate_type:
      name: tipo di piastra di base del pedale della batteria
      description: Indica se il pedale utilizza una piastra di base o un design flottante/senza
        telaio.
    drum_pedal_bearing_type:
      name: tipo di cuscinetto del pedale del tamburo
      description: Specifica il meccanismo di cuscinetto utilizzato nei punti di snodo
        principali (ad esempio, bilanciere, tallone, camma).
    drum_pedal_cam_type:
      name: Tipo di camma del pedale del tamburo
      description: Specifica la Shapes/geometria della camma di un pedale per batteria
        che Influence la sensazione e la risposta (ad esempio, lineare o acceleratore).
    drum_pedal_chain_configuration:
      name: Configurazione della catena del pedale della batteria
      description: Specifica la disposizione della catena utilizzata da un pedale
        per batteria a trasmissione a catena (ad esempio, catena singola, catena doppia
        o catena sfalsata).
    drum_pedal_chain_type:
      name: Tipo di catena del pedale del tamburo
      description: Indica il tipo di catena utilizzata nella trasmissione (ad esempio,
        catena a rulli o catena tipo bicicletta), che può influire sulla fluidità
        e sulla durata.
    drum_pedal_clamp_type:
      name: Tipo di morsetto per pedale tamburo
      description: Specifica come il pedale si fissa al cerchio della grancassa.
    drum_pedal_intended_use:
      name: Uso previsto del pedale della batteria
      description: Indica il Context di utilizzo principale per cui è progettato/commercializzato
        il pedale a trasmissione a cinghia.
    drum_pedal_spring_adjustment_method:
      name: Metodo di regolazione della molla del pedale della batteria
      description: Indica come viene regolata la tensione della molla sul pedale.
    drum_pedal_spring_type:
      name: Tipo di molla del pedale del tamburo
      description: Specifica il meccanismo a molla utilizzato per il ritorno del pedale.
    drum_shell_material:
      name: Materiale della cassa del tamburo
      description: Specifica il materiale principale di costruzione del fusto per
        le batterie acustiche (ad esempio, acero, betulla, acrilico).
    drum_shell_wood_species:
      name: Specie legnose di conchiglie di tamburo
      description: Identifica la specie di legno utilizzata per il fusto del tamburo,
        Influence il timbro e la risonanza.
    drumhead_type:
      name: Tipo di testina a tamburo
      description: Configurazione/tipo di testina utilizzata sull'octoban.
    drumstick_model:
      name: Modello di bacchetta da batteria
      description: Designazione standardizzata del modello/taglia delle bacchette
        utilizzata da molti marchi (ad esempio, 5A, 7A).
    drumstick_taper:
      name: Conicità della bacchetta
      description: Descrive il profilo conico dall'asta alla punta, il rimbalzo Impact
        e il bilanciamento.
    drysuit_footwear_style:
      name: stile di calzatura per muta stagna
      description: Descrive la finitura integrata della parte inferiore della gamba
        della muta stagna (ad esempio, stivali incorporati, calze in neoprene, calzari
        integrati o guarnizioni alla caviglia senza ferretto).
    dumbbell_style:
      name: Stile manubri
      description: Identifica il design fondamentale del manubrio, che sia un'unità
        fissa, un sistema regolabile o handle caricabile, che Influence fortemente
        le decisioni di acquisto e l'utilizzo durante l'allenamento.
    dundun_playing_position:
      name: Posizione da giocatore del Dundun
      description: Posizione prevista per suonare/trasportare il tamburo.
    dye_status:
      name: stati di tintura
      description: Indica se l'ovatta è tinta, non tinta/naturale o contiene più Colors/miscele.
    dye_style:
      name: Stile di tintura
      description: Specifica se il colore thread è uniforme, variegato o tinto con
        coloranti speciali.
    dye_technique:
      name: tecnica di tintura
      description: Metodo utilizzato per colorare la fibra (ad esempio, tintura a
        mano, tintura in pentola, tintura a zone).
    dye_type_needlecraft_fabric:
      name: Tipo di tintura (tessuto per ricamo)
      description: Indica se il tessuto di lino è in tinta unita, tinto a mano o tinto
        con tecniche speciali.
    dyeing_color_processing:
      name: Tintura / processo di colorazione
      description: Descrive se e come la fibra è stata colorata (ad esempio, non tinta,
        sbiancata/bianca o con tecniche di tintura specifiche).
    e_bike_certification_class:
      name: Corso di certificazione per e-bike
      description: Specifica l'indice di velocità ufficiale del pneumatico per biciclette
        elettriche (ad esempio, E-25, E-50).
    e_bike_speed_rating:
      name: Valutazione della velocità della bici elettrica
      description: Indica il livello di certificazione ufficiale per e-bike del pneumatico
        (ad esempio, E25 per ≤25 km/h, E50 per ≤50 km/h).
    e_scooter_connector_type:
      name: tipo di connettore per monopattino elettrico
      description: Identifica il tipo di connettore o spina elettrica utilizzata dal
        componente per l'alimentazione o la trasmissione del segnale.
    e_scooter_throttle_type:
      name: Monopattino elettrico limitato tipo
      description: Specifica il tipo di limitatore utilizzato per controllare l'accelerazione
        su un monopattino elettrico.
    ear_coverage:
      name: Copertura per le orecchie
      description: Specifica se il casco include protezioni per le orecchie e se queste
        sono rimovibili.
    ear_coverage_style:
      name: Stile di copertura dell'orecchio
      description: Descrive come, o se, le orecchie vengono coperte dalla maschera
        antimosche.
    ear_coverage_type:
      name: Tipo di copertura dell'orecchio
      description: Specifica come il cappello copre o protegge le orecchie, inclusa
        la presenza e lo stile dei paraorecchie.
    ear_guard_type:
      name: Tipo di protezione per le orecchie
      description: Descrive il tipo di protezione per le orecchie integrata nel berretto,
        come ad esempio protezioni in plastica rigida, imbottite o rimovibili.
    earmuff_style:
      name: stile paraorecchie
      description: Indica come vengono indossate le cuffie antirumore o il loro stile
        di progettazione strutturale (ad esempio, sopra la testa o avvolgenti dietro
        la testa).
    earring_closure_type:
      name: Tipo di chiusura dell'orecchino
      description: Specifica il meccanismo utilizzato per fissare l'orecchino all'orecchio
        (ad esempio, a pressione, a leva, a clip).
    easel_art_desk_features:
      name: Cavalletto e scrivania per artisti
      description: Highlight le caratteristiche funzionali comuni incluse nel cavalletto
        o nella scrivania da artista.
    easel_art_desk_surface_type:
      name: Tipo di superficie del cavalletto e del tavolo da disegno
      description: Identifica le superfici di disegno/scrittura utilizzabili (ad esempio,
        lavagna, lavagna bianca, rotolo Paper , lavagna magnetica).
    eb_clarinet_body_type:
      name: Tipo di corpo del clarinetto
      description: Specifica se il clarinetto in Mi bemolle è una variante soprano
        o contralto.
    eco_material_type:
      name: Tipo di materiale ecologico
      description: Highlight la tecnologia dei materiali o delle schiume ecocompatibili
        utilizzate nell'imbottitura.
    edge_construction:
      name: Costruzione del bordo
      description: Indica se lo sci presenta una lamina metallica lungo tutta, in
        parte o per tutta la sua lunghezza.
    edge_tuner_type:
      name: Tipo di sintonizzatore Edge
      description: Classifica il tipo di affilatore per lamine di sci o snowboard,
        come ad esempio una file o una macchina elettrica.
    edible_plant_part:
      name: Parte commestibile della pianta
      description: Indica quale parte della pianta viene venduta per il consumo.
    educational_guide_included:
      name: Guida didattica inclusa
      description: Indica quali materiali didattici sono inclusi nel modello.
    educational_topic:
      name: Argomento educativo
      description: Tema di apprendimento principale supportato dal contenuto educativo
        dell'allevamento di formiche.
    egg_component:
      name: Componente dell'uovo
      description: Indica quale parte dell'uovo è contenuta nel prodotto, ad esempio
        uovo intero, solo uovo bianco, tuorli o miscele/sostituti.
    egg_component_replaced:
      name: Componente dell'uovo sostituito
      description: Indica quale parte dell'uovo il prodotto è destinato a sostituire
        (ad esempio, uovo intero, uovo bianco).
    egg_enrichment:
      name: Arricchimento delle uova
      description: Indica eventuali fortificazioni nutrizionali aggiunte alle uova,
        come l'arricchimento con Omega-3 o vitamina D.
    egg_farming_method:
      name: Metodo di allevamento delle uova
      description: Indica il metodo di produzione o di allevamento utilizzato per
        le uova (ad esempio, da galline allevate a terra, all'aperto, biologiche).
    egg_grade:
      name: Grado uova
      description: Indica il grado di qualità assegnato dagli enti regolatori o di
        settore.
    egg_processing_state:
      name: stato di lavorazione delle uova
      description: Indica eventuali trattamenti applicati alle uova prima della vendita
        (ad esempio, Fresh, salate, uova Secolo).
    egg_production_method:
      name: Metodo di produzione delle uova
      description: Specifica il sistema di allevamento o di stabulazione utilizzato
        per la produzione delle uova (ad esempio, allevamento a terra, allevamento
        al pascolo, biologico).
    egg_replacer_main_ingredient:
      name: Ingrediente principale del sostituto dell'uovo
      description: Indica l'ingrediente base principale da cui è ricavato il sostituto
        dell'uovo, aiutando gli utenti con esigenze dietetiche o con le proprietà
        di cottura desiderate.
    egg_size:
      name: Uovo aperto
      description: Classifica le uova secondo le denominazioni standard di mercato
        taglia.
    egg_source_animal:
      name: fonte di uova animale
      description: Identifica la specie animale che ha prodotto le uova.
    egg_white_processing_method:
      name: Metodo di lavorazione dell'uovo bianco
      description: Indica come le uova bianche sono state trattate dopo la raccolta
        (es. pastorizzate, essiccate a spruzzo), influenzando la sicurezza alimentare,
        la durata di conservazione e l'utilizzo in cassa.
    eggplant_variety:
      name: Varietà di melanzane
      description: Specifica la cultivar o varietà di mercato della melanzana, consentendo
        all'acquirente di scegliere tipologie che differiscono per taglia, sapore,
        colore e utilizzo culinario.
    eggshell_color:
      name: Colore guscio d'uovo
      description: Specifica il colore predominante del guscio delle uova.
    elastic_edge_finish_type:
      name: Finitura/tipo del bordo elastico
      description: Specifica la costruzione del bordo dell'elastico intrecciato che
        Impact comfort e app.
    elastic_intended_use:
      name: Uso previsto dell'elastico
      description: Applicazione principale per cui è stato progettato Elastic (facilita
        la scoperta e riduce le incongruenze).
    elastic_recovery_performance:
      name: Prestazioni di recupero elastico
      description: Descrive la capacità dell'elastico intrecciato di ritornare alla
        sua lunghezza originale dopo essere stato allungato.
    elastic_recovery_quality:
      name: qualità di recupero elastico
      description: Indica la capacità di recupero dell'elastico dopo essere stato
        allungato, ovvero la sua capacità di ritornare alla lunghezza originale.
    elastic_stretch_level:
      name: livello di allungamento elastico
      description: Quanto può allungarsi l'elastico sotto tensione (spesso espresso
        in livelli relativi quando non viene fornita una percentuale esatta).
    elastic_structure:
      name: Struttura elastica
      description: Specifica la struttura dell'elastico per asole (ad esempio, a maglia,
        tessuto, intrecciato), che può influenzare l'elasticità, il recupero della
        forma e le prestazioni di cucitura.
    elastic_type:
      name: Tipo di elastico
      description: Specifica il tipo di costruzione dell'elastico (ad esempio, elastico
        ripiegabile (FOE), intrecciato, a maglia, tessuto).
    electric_assist_type:
      name: Tipo di assistenza elettrica
      description: Indica se la bicicletta è dotata di assistenza motorizzata e il
        tipo di assistenza fornita.
    electric_bicycle_motor_position:
      name: posizione del motore della bicicletta elettrica
      description: sede del motore di trazione sulla bicicletta elettrica, come motore
        centrale, mozzo anteriore, mozzo posteriore o doppio mozzo.
    electric_bike_class:
      name: corso di biciclette elettriche
      description: Classifica le e-bike in base a classi normative che definiscono
        i limiti di velocità e limitano l'assistenza.
    electric_guitar_bridge_type:
      name: Chitarra elettrica con ponte
      description: Specifica il tipo di sistema ponte/vibrato sulla chitarra elettrica.
    electric_instrument_output_connection_type:
      name: tipo di rapporto di uscita dello strumento elettrico
      description: Specifica le relazioni di uscita audio fisiche fornite dal violoncello
        elettrico.
    electric_riding_vehicle_control_options:
      name: Opzioni di controllo del veicolo elettrico
      description: Opzioni di controllo/funzionamento disponibili per il ciclista/genitore
        (ad esempio, pedale, volante, comando a distanza).
    electric_spinning_wheel_speed_control_type:
      name: Tipo di controllo della velocità del filatoio elettrico
      description: Descrive come l'utente regola la velocità di rotazione sulla ruota
        elettrica.
    electric_ukulele_output_jack_type:
      name: jack di uscita per ukulele elettrico
      description: Specifica il connettore di uscita fisico utilizzato dall'ukulele
        elettrico.
    electric_van_body_length_class:
      name: Classe di lunghezza della carrozzeria del furgone elettrico
      description: Classe di dimensionamento furgoni basata su passo/lunghezza comune
        utilizzata nell'inserzione.
    electric_van_roof_height_class:
      name: Classe di altezza del tetto del furgone elettrico
      description: Classificazione comune dell'altezza del tetto utilizzata per i
        furgoni (in particolare i furgoni per il trasporto merci).
    electric_vehicle_drivetrain_layout:
      name: layoutdella trasmissione del veicolo elettrico
      description: Configurazione motore/asse che descrive il numero di motori e la
        loro posizione (Beyond la semplice trazione integrale/anteriore/posteriore).
    electric_winder_accessories_included:
      name: Accessori per avvolgitore elettrico inclusi
      description: Elenca gli accessori inclusi con l'avvolgitore elettrico (ad esempio,
        morsetti, adattatori).
    electrical_connector_type:
      name: Tipo di connettore elettrico
      description: Specifica il tipo di connettore utilizzato dalla serratura/sistema
        di chiusura della porta per l'integrazione elettrica (se applicabile).
    electrical_system_voltage:
      name: Tensione del sistema elettrico
      description: Indica la tensione nominale del sistema elettrico del veicolo per
        cui il regolatore è progettato.
    electronic_cymbal_trigger_zones:
      name: Zone trigger dei piatti elettronici
      description: Specifica quante zone trigger indipendenti fornisce il pad del
        piatto (ad esempio, bordo/coda/campana).
    electronic_drum_module_audio_interface_functionality:
      name: Funzionalità di interfaccia audio Modules di batteria elettronica
      description: Indica se i Modules possono fungere da interfaccia audio USB per
        la registrazione/riproduzione (oltre al MIDI).
    electronic_drum_module_metronome_features:
      name: Caratteristiche del metronomo Modules per batteria elettronica
      description: Specifica la capacità integrata di metronomo/esercizio.
    electronic_drum_module_power_source:
      name: Alimentazione Modules per batteria elettronica
      description: Specifica la fonte di alimentazione richiesta o supportata per
        i Modules di controllo.
    electronic_drum_module_sample_import_support:
      name: Modules di batteria elettronica sample import impostazione
      description: Indica se i Modules possono importare esempi utente e con quale
        metodo.
    electronic_drum_pad_playing_surface_type:
      name: superficie di gioco del pad per batteria elettronica
      description: Descrive la struttura della superficie di battuta del pad del tom
        (ad esempio, pelle a rete o in gomma), che influisce sul rimbalzo, sul rumore
        e sulla sensazione al tatto.
    electronic_features:
      name: Caratteristiche elettroniche
      description: Indica le funzionalità elettroniche/interattive incluse nell'articolo
        di gioco bancario (se presenti).
    electronic_lights_and_sound:
      name: Luci e suoni elettronici
      description: Indica se il set da gioco della casa delle bambole include luci
        elettroniche e/o funzioni sonore (ad esempio, luci, campanello, musica, effetti
        sonori).
    electronics_power_source:
      name: alimentatore elettronico
      description: Specifica come vengono alimentati i dispositivi elettronici attivi
        (ove applicabile).
    eligible_race_series:
      name: Serie di gare ammissibili
      description: Serie di gare o ente sanzionatorio a cui la vettura è idonea a
        partecipare.
    elliptical_trainer_part_type:
      name: Tipo di parte per ellittiche
      description: Indica il tipo specifico di accessorio o ricambio per un'ellittica
        (ad esempio, cinghia, console, pedali) in modo che l'acquirente possa filtrare
        rapidamente l'articolo di cui ha bisogno senza dover navigare tra numerose
        microcategorie.
    embellishment_technique:
      name: Tecnica di decorazione
      description: Descrive in dettaglio le principali decorazioni o lavorazioni di
        superficie applicate al capo, come ricami, stampe o perline.
    embellishment_type:
      name: Tipo di decorazione
      description: Indica il tipo di elemento decorativo applicato alla giarrettiera,
        come pizzi, fiocchi o perle.
    embossing_pen_ink_color:
      name: Colore dell'inchiostro della penna per goffratura
      description: Indica il colore dell'inchiostro del pennarello per embossing (trasparente/appiccicoso
        o pigmentato). Diverso dal colore della penna/del corpo.
    embossing_stylus_tip_shape:
      name: Forma della punta dello stilo per goffratura
      description: Descrive la geometria della punta per goffratura utilizzata per
        creare diversi effetti (ad esempio, sferica o appuntita).
    embroidered_coverage_level:
      name: Livello di copertura ricamata
      description: Copertura approssimativa del filo da ricamo sulla superficie della
        toppa.
    embroidered_patch_backing_type:
      name: Tipo di supporto per toppa ricamata
      description: La fodera/Lo strato di supporto sul retro della toppa ricamata
        che influisce sulla sua durata e sulla modalità di applicazione.
    embroidery_hoop_type:
      name: Tipo di telaio da ricamo
      description: Identifica lo stile costruttivo del telaio da ricamo e il suo principale
        meccanismo di tensionamento.
    embroidery_machine_bobbin_type:
      name: Tipo di bobina per macchina da ricamo
      description: Tipo/sistema di caricamento della bobina.
    emergency_lighting_configuration:
      name: Configurazione delle luci di emergenza
      description: Specifica la configurazione principale delle luci di emergenza
        installata sul veicolo (ad esempio, barra luminosa sul tetto, luci sulla griglia).
    emergency_lighting_package:
      name: Pacchetto di luci di emergenza
      description: Specifica le tipologie di luci di segnalazione di emergenza installate.
    emissions_compliance_standard:
      name: Norma di conformità alle emissioni
      description: Indica la certificazione/conformità alle normative sulle emissioni
        del motore, ove applicabile.
    emissions_standard:
      name: Standard sulle emissioni
      description: Standard di conformità alle emissioni per il veicolo (varia in
        base all'area geografica e all'anno).
    enclosure_panel_configuration:
      name: Configurazione del pannello del contenitore
      description: Specifica quali pannelli o lati dell'involucro sono inclusi (configurazione
        di copertura), ad esempio chiusura completa, solo tende laterali o 3 lati
        (aperto sul davanti/sul retro).
    enclosure_window_material:
      name: Materiale delle finestre dell'involucro
      description: Identifica il materiale utilizzato per i pannelli trasparenti delle
        finestre dell'involucro.
    end_fitting_type:
      name: Tipo di raccordo terminale
      description: Il tipo di connettore utilizzato a ciascuna estremità del puntone
        (lato veicolo e lato coperchio), che determina la compatibilità di montaggio.
    end_type:
      name: Tipo di estremità
      description: Specifica il tipo di terminale/attacco alle estremità della cinghia
        di traino per il collegamento ai punti di aggancio.
    ends_style_blocking_wires:
      name: Stile dei terminali (fili di blocco bobina)
      description: Come vengono rifinite le estremità del filo di blocco bobina per
        garantire sicurezza e facilità di infilatura attraverso i bordi del pizzo.
    enduro_bike_suspension_adjustability:
      name: Regolazione delle sospensioni della bici da enduro
      description: Indica quali regolazioni delle sospensioni sono disponibili (in
        genere per la forcella anteriore e l'ammortizzatore posteriore).
    engine_bay_mounting_location:
      name: Punto di montaggio nel vano motore
      description: Punto in cui il serbatoio di espansione è destinato a essere montato
        nel vano motore (posizione relativa).
    engine_bearing_coating:
      name: Rivestimento del cuscinetto del motore
      description: Specifica qualsiasi rivestimento superficiale sul cuscinetto (per
        resistenza all'usura, integrabilità, riduzione dell'attrito).
    engine_bearing_position:
      name: Posizione del cuscinetto del motore
      description: Indica la posizione e la funzione del cuscinetto nel motore.
    engine_bearing_size:
      name: Dimensioni del cuscinetto del motore
      description: Specifica se il cuscinetto è di taglia standard o di una variante
        sottodimensionata/sovradimensionata (comunemente legata alla rettifica e liquidazione
        dell'albero motore).
    engine_configuration:
      name: Configurazione del motore
      description: Descrive la disposizione/configurazione dei cilindri del motore
        (ad esempio, in linea, a V, boxer/a cilindri contrapposti).
    engine_cooling_type:
      name: Tipo di raffreddamento del motore
      description: Specifica il metodo di raffreddamento del motore.
    engine_degreaser_form:
      name: Forma dello sgrassatore per motori
      description: Formato fisico/forma di consegna dello sgrassatore per motori.
    engine_degreaser_rinse_requirement:
      name: Requisiti di risciacquo dello sgrassatore per motori
      description: Se lo sgrassatore deve essere risciacquato con acqua dopo l'applicazione.
    engine_mount_type:
      name: Tipo di montaggio del motore
      description: Specifica il design funzionale del supporto motore (ad esempio,
        idraulico, rigido, a puntone di torsione).
    engine_oil_formulation:
      name: Formulazione dell'olio motore
      description: Indica la formulazione specifica dell'olio motore, ad esempio per
        uso standard, per veicoli con elevato chilometraggio, per intervalli di cambio
        olio prolungati o per applicazioni in parco macchine/veicoli pesanti.
    engine_oil_specification:
      name: Specifiche dell'olio motore
      description: La specifica/standard che l'olio soddisfa (ad esempio, API SP,
        API SN Shopify Plus, API CK-4, ACEA C3, ILSAC GF-6A).
    engine_rebuild_kit_contents:
      name: Contenuto del kit di revisione del motore
      description: Identifica i componenti principali inclusi nel kit di revisione
        del motore.
    engine_rotation_direction:
      name: Direzione di rotazione del motore
      description: Specifica la direzione di rotazione del motore utilizzata nelle
        applicazioni marine.
    engine_timing_system_drive_type:
      name: Tipo di azionamento del sistema di fasatura del motore
      description: Indica se il sistema di distribuzione del motore è a cinghia, a
        catena o a ingranaggi, ai fini della compatibilità.
    engine_valve_coating:
      name: Rivestimento della valvola del motore
      description: Identifica eventuali varianti di superficie o rivestimenti applicati
        alla valvola per la resistenza all'usura/al calore.
    engine_valve_position:
      name: Posizione della valvola del motore
      description: Specifica se la valvola del motore è destinata al lato di aspirazione
        o al lato di scarico del motore.
    engine_valve_stem_tip_type:
      name: Tipo di punta dello stelo della valvola del motore
      description: Specifica lo stile o la costruzione della punta dello stelo della
        valvola nel punto di contatto con il bilanciere o il regolatore.
    engine_valvetrain_type:
      name: Tipo di distribuzione del motore
      description: Disposizione del sistema di distribuzione/albero a camme.
    enhancement_level:
      name: Livello di accrescimento
      description: 'Aumento approssimativo del volume fornito dall''inserto, espresso
        in taglia della coppa: Lieve (fino a 1 coppa), Moderato (1–2 coppe), Significativo
        (2+ coppe).'
    entry_zipper_location:
      name: Cerniera di ingresso
      description: Specifica la posizione della cerniera o dell'apertura principale
        della tuta (ad esempio, anteriore, posteriore, sulla spalla, in diagonale).
    epee_point_type:
      name: Tipo di punta della spada
      description: Specifica la marca o lo standard della punta installata sulla lama,
        che influisce sulla compatibilità e sulla manutenzione.
    equestrian_discipline:
      name: Disciplina equestre
      description: Specifica la disciplina equestre per la quale lo sperone è destinato
        o più adatto.
    equestrian_helmet_safety_certification:
      name: Certificazione di sicurezza per il casco da equitazione
      description: Specifica gli standard di sicurezza o le certificazioni a cui il
        casco è conforme.
    equine_application_area:
      name: Area di applicazione equina
      description: Indica la zona del corpo o il materiale per cui è destinato il
        prodotto (es. zoccolo, criniera, selleria).
    equipment_contact_material_brew_wine:
      name: Materiale a contatto con le attrezzature (birra/vino)
      description: Materiale principale dell'oggetto che entra in contatto con il
        liquido (ad esempio, vetro, acciaio inossidabile, plastica).
    eu_children_clothing_size:
      name: Taglia dei vestiti per bambini UE
      description: Specifica la taglia dei vestiti per bambini UE in base all'altezza,
        ad esempio 104 o 140
    eu_clothing_size:
      name: Taglia abbigliamento UE
      description: Specifica la taglia UE dell'abbigliamento, ad esempio 38 o 46
    eu_cup_size:
      name: Taglia della coppa UE
      description: Specifica la taglia della coppa del reggiseno secondo la classificazione
        europea, ad esempio C o E.
    eu_ring_size:
      name: Misura dell'anello UE
      description: Specifica la misura dell'anello UE in base alla circonferenza,
        ad esempio 52 o 63
    eu_shoe_size:
      name: Numero di scarpa UE
      description: Specifica il numero di scarpa EU, ad esempio 42 o 42 Wide
    euphonium_included_accessories:
      name: Accessori inclusi per l'eufonio
      description: Gli elenchi includono articoli comunemente confezionati con un
        eufonio (ad esempio, bocchino, cassa).
    euphonium_valve_configuration:
      name: Configurazione della valvola dell'eufonio
      description: Specifica il numero di valvole e se la quarta valvola è azionata
        manualmente o tramite un meccanismo ad azione laterale.
    european_sword_historical_period:
      name: Periodo storico della spada europea
      description: Periodo storico principale a cui si ispira il modello/la replica
        della spada (o l'epoca dell'originale).
    european_sword_pattern_type:
      name: Modelli/tipologie di spade europee
      description: Modello/tipologia specifica di spada europea rappresentata dalla
        spada da collezione.
    ev_connector_adapter_direction:
      name: Direzione del connettore/adattatore EV
      description: Specifica FROM cosa e TO l'adattatore collega (lato ingresso veicolo
        vs lato caricabatterie/cavo), consentendo un filtraggio di compatibilità accurato.
    ev_conversion_kit_completeness_level:
      name: livello di completezza del kit di conversione EV
      description: Indica se il prodotto è un kit di conversione completo oppure un
        kit/pacchetto parziale (es. solo motore+titolare del trattamento).
    ev_conversion_kit_drivetrain_configuration:
      name: configurazione del sistema di trasmissione del kit di conversione EV
      description: Specifica l'architettura della trasmissione di un kit di conversione
        per veicoli elettrici, inclusi il posizionamento del motore/ layout della
        trasmissione e se mantiene la trasmissione esistente.
    ev_conversion_kit_voltage_class:
      name: classe di tensione del kit di conversione EV
      description: Classe di tensione nominale del sistema (bucket) per cui è stato
        progettato il kit di conversione EV. Utilizzare questa funzione per filtrare
        in base alle classi di tensione di sistema più comuni, oltre che in base alla
        misurazione esatta della tensione.
    evaporator_core_type:
      name: Tipo di nucleo dell'evaporatore
      description: Specifica la progettazione costruttiva del nucleo dell'evaporatore
        di un sistema di climatizzazione per autoveicoli.
    evenweave_fabric_finish_treatment:
      name: Finitura/variante del tessuto Evenweave
      description: Indica qualsiasi pre-finitura o variante applicata al tessuto che
        ne influisca sulla gestione o sull'aspetto.
    evenweave_fabric_package_format:
      name: Formato confezione del tessuto Evenweave
      description: Modalità di vendita del tessuto (taglio singolo o vendita continua
        al metro/iarda).
    exercise_bike_accessory_part_type:
      name: Accessorio/parte per cyclette
      description: Descrive le Functions principali o il tipo di componente dell'articolo
        (ad esempio, pedale, cinghia di trasmissione, portaborraccia, copertura del
        parabrezza, pedivella).
    exercise_bike_cushion_component:
      name: Componente imbottito per cyclette
      description: Specifica il componente relativo al sedile Supply, come ad esempio
        un cuscino, una sella o un rivestimento per il sedile.
    exercise_bike_metrics_tracked:
      name: cyclette metrica tracciata
      description: Elenca i campi dati relativi all'allenamento che il computer può
        misurare e visualizzare in tempo reale.
    exercise_mat_accessories_included:
      name: Accessori per il tappetino da ginnastica inclusi
      description: Elenca i componenti aggiuntivi Supply con il tappetino, come cinghie
        o ginocchiere.
    exhaust_cooling_type:
      name: Tipo di raffreddamento di scarico
      description: Indica se il componente di scarico è destinato a sistemi di scarico
        a umido (raffreddamento ad acqua/iniezione d'acqua) o a sistemi di scarico
        a secco.
    exhaust_installation_position:
      name: Posizione di installazione dello scarico
      description: Indica la posizione in cui il componente è installato sul veicolo.
    exhaust_outlet_configuration:
      name: Configurazione dell'uscita di scarico
      description: Specifica la layout dello scarico nella parte posteriore del veicolo.
    expansion_tank_cap_connection_type:
      name: Tappo del serbatoio di espansione tipo relazione
      description: Il sistema di fissaggio meccanico utilizzato per collegare e sigillare
        il tappo al collo del vaso di espansione.
    expansion_tank_cap_pressure_relief_feature:
      name: Dispositivo di sfogo della pressione del tappo del vaso di espansione
      description: Se e in che modo il tappo fornisce una funzionalità di sfogo della
        pressione/depressione.
    expansion_tank_cap_seal_material:
      name: materiale di tenuta del tappo del vaso di espansione
      description: Materiale della guarnizione/tenuta che entra in contatto con il
        collo del vaso di espansione.
    extension_attachment_method:
      name: Metodo di fissaggio dell'estensione
      description: Indica come l'estensione si fissa al manubrio/manubrio della bicicletta,
        aiutando i ciclisti a verificare la compatibilità con la loro configurazione
        attuale.
    extension_bend_type:
      name: Tipo di curvatura di estensione
      description: Descrive lo stile geometrico o la curvatura dell'estensione del
        manubrio, che influisce sull'ergonomia e sull'aerodinamica del ciclista.
    extension_mechanism:
      name: meccanismo di estensione
      description: Descrive il metodo utilizzato da un tavolo per calcolare la sua
        lunghezza o la sua superficie, se applicabile.
    extension_table_features:
      name: Caratteristiche del tavolo estensibile
      description: Highlight le caratteristiche funzionali specifiche dei tavoli allungabili
        per macchine da cucire.
    eyelet_grommet_installation_method:
      name: Metodo di installazione di occhielli e passacavi
      description: Specifica come l'occhiello/passacavo viene installato/fissato nel
        materiale.
    eyewear_lens_shape:
      name: Shapesdelle lenti degli occhiali
      description: Indica la Shapes geometrica dell'obiettivo, come cilindrica o sferica,
        che influisce sul campo visivo, sulla distorsione e sullo stile.
    eyewear_strap_material:
      name: Materiale del cinturino degli occhiali
      description: Specifica il materiale del cinturino regolabile che fissa gli occhiali
        o le maschere alla testa dell'utente.
    fabric_backing_type:
      name: Tipo di supporto in tessuto
      description: Specifica se il cotone stampabile include un supporto Paper stabilizzante
        (e di che tipo), il che determina se può essere utilizzato con le stampanti
        standard.
    fabric_cut_format:
      name: formato di taglio del tessuto
      description: Specifica il taglio/formato del pezzo di tela per il ricamo.
    fabric_end_use:
      name: Utilizzo finale del tessuto
      description: Identifica l'applicazione principale prevista per il tessuto (per
        cosa è più indicato utilizzarlo).
    fabric_finish:
      name: Finitura del tessuto
      description: Finitura/variante superficiale applicata al tessuto di seta che
        ne influenza la lucentezza, la sensazione al tatto e le prestazioni.
    fabric_intended_use:
      name: Uso previsto del tessuto
      description: Principali applicazioni/progetti consigliati per il tessuto di
        lino.
    fabric_opacity_level:
      name: Livello di opacità del tessuto
      description: Indica il grado di trasparenza del tessuto, influenzando le necessità
        di stratificazione e fodera.
    fabric_patch_shape:
      name: Shapesdi toppe in tessuto
      description: Descrive le Shapes delle toppe incluse nel kit.
    fabric_repair_kit_application_method:
      name: metodo dell'app per kit di riparazione dei tessuti
      description: Specifica come viene applicata la riparazione al tessuto (ad esempio,
        tramite termoadesivo, cucitura, adesivo).
    fabric_repair_kit_components_included:
      name: Componenti del kit di riparazione tessuti inclusi
      description: Elenca i componenti specifici forniti nel kit (ad esempio, toppe,
        thread, ago, adesivo).
    fabric_repair_kit_intended_use:
      name: kit di riparazione tessuti - Uso previsto
      description: Specifica il tipo di riparazione più comune per cui è progettato
        il kit (ad esempio, strappi, fori, orli).
    fabric_selling_format:
      name: Formato di vendita dei tessuti
      description: Specifica la modalità di vendita del tessuto (lunghezza continua,
        pezzo pretagliato, rotolo/pacchetto o campione).
    fabric_stretch_level:
      name: Livello di elasticità del tessuto
      description: Descrive il grado di elasticità del tessuto, aiutando l'acquirente
        a scegliere i tessuti più adatti per capi aderenti o progetti strutturati.
    fabric_stretch_type:
      name: Tipo di elasticità del tessuto
      description: Indica l'elasticità del tessuto del costume da bagno, un fattore
        importante per la mobilità durante il surf o il nuoto.
    fabric_texture:
      name: trama del tessuto
      description: Descrive la consistenza o la struttura a maglia del tessuto utilizzato
        per la maglia da casa.
    fabric_use_case:
      name: Tessuto usato cassa
      description: Uso principale previsto per il pezzo/rotolo di tessuto di raso.
    fabric_weight_class:
      name: Classe di peso del tessuto
      description: Classifica la flanella in base alle fasce di peso tipiche di utilizzo
        per aiutare l'acquirente a filtrare senza conoscere l'esatto GSM/oz.
    face_mask_material:
      name: Materiale della mascherina
      description: Composizione dei materiali della maschera facciale inclusa o compatibile
        con il casco.
    face_mask_style:
      name: Stile della mascherina
      description: Definisce la Shapes generale o lo stile costruttivo della mascherina
        alla moda, aiutando l'acquirente a trovare la vestibilità e l'estetica preferite.
    face_mask_style_code:
      name: codice stile mascherina
      description: Definisce lo stile della barra strutturale o la famiglia di codici
        industriali della maschera facciale (ad esempio, ROPO, OPO, RJOP).
    face_protection_type:
      name: Tipo di protezione del viso
      description: Indica il tipo di protezione per il viso Supply con il casco o
        integrata in esso, come ad esempio griglie o visiere.
    faceplate_security_features:
      name: Caratteristiche di sicurezza del frontale
      description: Cattura le funzionalità antifurto e di controllo degli accessi
        relative al design Beyond Basic Shopify .
    facing_length:
      name: Lunghezza di rivestimento
      description: Specifica la lunghezza della curvatura del bocchino, influenzando
        la risposta e la scelta dell'ancia.
    fan_shroud_type:
      name: Tipo di convogliatore della ventola
      description: Specifica lo stile di copertura/geometria del convogliatore della
        ventola (ad esempio, completo, a metà o ad anello).
    farming_method:
      name: Metodo di coltivazione
      description: Highlight le pratiche di benessere animale o di allevamento utilizzate
        per allevare gli animali, come ad esempio l'allevamento all'aperto o biologico.
    farming_practice:
      name: pratica agricola
      description: Indica il metodo di coltivazione principale utilizzato per il prodotto
        (ad esempio, convenzionale, biologico, idroponico).
    fascinator_style:
      name: Stile fascinator
      description: Descrive il design strutturale o Shapes del fascinator in modo
        che l'acquirente possa filtrare rapidamente in base agli stili di cappelli
        più popolari.
    fastener_grade:
      name: Grado di fissaggio
      description: Indica il grado/classe di resistenza del bullone, ad esempio Grado
        8 o Classe 10.9, che determina la capacità di carico.
    fat_rendering_state:
      name: stato di rendering grasso
      description: Specifica se il grasso è fuso, non fuso (crudo) o parzialmente
        fuso, influenzando la durata della mensola e l'applicazione culinaria.
    fat_source:
      name: fonte di grassi
      description: Identifica la principale fonte di grasso utilizzata per produrre
        burro, ghee o margarina (animale o vegetale), facilitando il filtraggio di
        allergie e informazioni dietetiche.
    faucet_hole_configuration:
      name: Configurazione dei fori per il rubinetto
      description: Indica il numero e la posizione dei fori predisposti per il rubinetto
        sul piano del mobile bagno.
    feather_application:
      name: Applicazione delle pium
      description: Uso o applicazione principale delle piume di tacchino per lavori
        manuali artigianali o industriali.
    feather_attachment_format:
      name: Attacco/formato della piuma
      description: Modalità di preparazione/vendita delle piume sintetiche (sfuse,
        su stringa, su nastro, ecc.).
    feather_coloration_style:
      name: Stile di colorazione delle piume
      description: Descrive come il colore viene applicato/appare sulle piume (ad
        esempio, tinta unita, tinta in punta, sfumatura), indipendentemente dal valore
        del colore di base.
    feather_component:
      name: Componente della piuma
      description: Specifica quale parte/tipo di piuma di pavone viene venduta (ad
        esempio, piuma dell'occhio o piuma del petto).
    feather_curvature:
      name: Curvatura della piuma
      description: Forma / profilo generale di curvatura della piuma.
    feather_finish:
      name: Finitura della piuma
      description: Indica se le piume di struzzo sono naturali o sono state trattate
        (ad esempio, tinte o sbiancate) per uso decorativo.
    feather_form:
      name: Forma della piuma
      description: Specifica la forma fisica dei pezzi di piume d'oca venduti.
    feather_grade:
      name: Grado della piuma
      description: Grado di qualità/selezione generale della piuma per uso artigianale
        rispetto a uso espositivo.
    feather_part:
      name: Parte della piuma
      description: La parte o la struttura della piuma di tacchino venduta (tipico
        nelle schede prodotto per artigianato e costruzione di mosche artificiali).
    feather_processing_type:
      name: Tipo di lavorazione della piuma
      description: Come le piume sono state lavorate/trattate per l'uso artigianale
        (ad esempio, tinte, sbiancate, naturali/non tinte).
    feather_product_form:
      name: Forma del prodotto in piuma
      description: La forma/il taglio fisico del prodotto in piuma al momento della
        vendita (ad esempio, piume sfuse, boa o frange).
    feather_quantity_unit:
      name: Unità di quantità delle piume
      description: Indica l'unità di vendita del prodotto (es. al pezzo, a peso, a
        mazzo) per confrontare le schede prodotto in modo accurato.
    feather_source:
      name: Fonte delle piume
      description: Specifica la provenienza animale delle piume utilizzate nei volani
        di piume.
    feather_stiffness:
      name: Rigidità della piuma
      description: Rigidità relativa delle barbe/struttura delle piume.
    feed_mechanism:
      name: Meccanismo di alimentazione
      description: Indica come le palle vengono alimentate nella macchina lancia-palle.
    feed_purpose:
      name: Scopo del mangime
      description: Descrive l'obiettivo nutrizionale o funzionale primario del mangime
        o dell'integratore.
    feeder_mechanism_type:
      name: Tipo di meccanismo di alimentazione
      description: Identifica il meccanismo di erogazione utilizzato dall'alimentatore
        per rilasciare il mangime.
    feijoa_cultivar:
      name: Cultivar di feijoa
      description: Identifica la specifica cultivar o varietà di feijoa, poiché le
        diverse cultivar offrono sapori, tagli e periodi di raccolta distinti.
    felt_duty:
      name: Categoria del feltro
      description: Specifica la classificazione della categoria del feltro della pallina
        da tennis (ad esempio, feltro extra, feltro normale) che influisce sulla sua
        durata su diverse superfici.
    felting_mold_intended_use:
      name: Uso previsto dello stampo per feltro
      description: Finalità creative dello stampo o suo utilizzo in lavorazioni con
        feltro.
    felting_pad_surface_material:
      name: Materiale di superficie del pannello per feltratura
      description: Materiale utilizzato sulla superficie di lavoro del pannello/tappetino
        per feltratura a contatto con la fibra/l'ago
    fencing_certification:
      name: Certificazione di scherma
      description: Elenca gli enti ufficiali di controllo a cui l'arma da scherma
        è soggetta (ad es. FIE, USFA), indicandone la legalità in gara e gli standard
        di qualità.
    fencing_connector_type:
      name: Tipo di connettore per recinzione
      description: Specifica la configurazione del connettore utilizzato per fissare
        cavi, prese o avvolgicavo per recinzioni (ad esempio, connettore a 2 conduttori,
        connettore a 3 conduttori, baionetta), garantendo la compatibilità dei componenti.
    fencing_discipline:
      name: Scherma
      description: Specifica l'arma o la disciplina di scherma per cui il prodotto
        è progettato o con cui è compatibile.
    fencing_weapon_type:
      name: Tipo di arma da scherma
      description: Specifica lo stile di scherma o di arma da allenamento con cui
        l'attrezzo è compatibile o che rappresenta, per aiutare gli utenti a trovare
        l'attrezzatura corretta.
    fender_finish_state:
      name: Stato di finitura del parafango
      description: Indica lo stato della superficie/finitura del paraurti fornito,
        per verificarne l'idoneità alla verniciatura e all'installazione.
    fender_pieces_included:
      name: Pezzi del parafango inclusi
      description: Elenca i componenti forniti con il prodotto per chiarire se si
        tratta di un singolo parafango o di un set completo con accessori.
    fender_type:
      name: Tipo di parafango
      description: Classifica il design o lo stile generale del parafango.
    fennel_trimming:
      name: Presentazione del finocchio
      description: Indica quali parti della pianta sono incluse con il bulbo di finocchio
        (ad esempio, con le fronde, la parte superiore tagliata e la radice).
    fennel_variety:
      name: Varietà di finocchio
      description: Specifica la cultivar o varietà commerciale dei bulbi di finocchio
        in vendita.
    fermentation_application:
      name: Applicazione della fermentazione
      description: Indica l'alimento o la bevanda principale che la coltura è destinata
        a fermentare (ad esempio, formaggio, yogurt, kefir di latte, pasta madre).
    fermentation_method:
      name: Metodo di fermentazione
      description: Specifica come è stata prodotta o fermentata la salsa di soia (ad
        esempio, fermentazione naturale, idrolizzazione chimica).
    fermentation_vessel_material:
      name: Materiale del recipiente di fermentazione
      description: Materiale principale del recipiente di fermentazione incluso nel
        kit (se presente).
    ferrule_material:
      name: Materiale del puntale
      description: Indica il materiale utilizzato per il puntale dell'asta (ad esempio,
        Juma, fenolico, policarbonato, XTC o nessuno), che influisce sulla durata
        e sulla sensazione al momento dell'impatto.
    fia_homologation_certification:
      name: Omologazione/certificazione FIA
      description: Indica se la vettura (o la cellula di sicurezza) è omologata e
        secondo quale standard.
    fiber_animal_source_type:
      name: Tipo di animale/fonte della fibra
      description: L'animale o la fonte primaria da cui proviene la lana cardata (o
        sintetica), come la lana merino, l'alpaca o le fibre vegetali.
    fiber_luster_level:
      name: Livello di lucentezza della fibra
      description: Lucentezza visiva della fibra, che varia da opaca a estremamente
        brillante.
    fiber_preparation_processing_stage:
      name: Fase di preparazione/lavorazione della fibra
      description: Indica come il nastro di fibre è stato preparato/lavorato per l'uso
        (ad esempio, cardato o pettinato, miscelato, superwash).
    fiber_preparation_type:
      name: Tipo di preparazione della fibra
      description: Indica come la fibra è stata preparata per uso artigianale (ad
        esempio, ovatta cardata, cardatura a tamburo, foglio pre-infeltrito).
    field_hockey_ball_playing_surface:
      name: Superficie di gioco per la palla da hockey su prato
      description: Indica la superficie di gioco o l'ambiente per cui la palla è stata
        progettata.
    field_hockey_ball_type:
      name: Tipo di palla da hockey su prato
      description: Classifica le palle da hockey su prato in base al loro utilizzo
        previsto o alle loro caratteristiche speciali.
    field_hockey_goal_size_standard:
      name: Standard relativi alle dimensioni della porta nell'hockey su prato
      description: Classifica le porte in base agli standard comuni dell'hockey su
        prato o alle dimensioni utilizzate negli allenamenti (ad es. regolamento FIH
        per il gioco all'aperto, categorie giovanili, mini).
    field_hockey_training_objective:
      name: Obiettivo dell'allenamento di hockey su prato
      description: Definisce la competenza o l'area di interesse principale che l'ausilio
        per l'allenamento è progettato a migliorare.
    field_point_attachment_method:
      name: Metodo di fissaggio della punta da campo
      description: Indica in che modo la punta da campo viene fissata all'asta della
        freccia o all'inserto (ad es. avvitata, incollata).
    field_point_tip_style:
      name: Tipo di punta da campo
      description: Definisce lo stile geometrico o il profilo funzionale della punta
        da campo, influenzando la penetrazione, lo sforzo di rimozione e la legalità.
    fielding_glove_position:
      name: Posizione del guanto da campo
      description: Indica la posizione difensiva o l'utilizzo per cui il guanto è
        progettato nel baseball o nel softball.
    fielding_training_focus:
      name: Focus sull'allenamento in campo
      description: Indica l'area di competenza principale su cui si concentra l'ausilio
        durante le sessioni di allenamento.
    fig_variety:
      name: Varietà di fico
      description: Indica il cultivar o la varietà specifica di fico in vendita.
    figure_8_device_design:
      name: Schema del dispositivo a 8
      description: Identifica la configurazione specifica del dispositivo a forma
        di otto, che influisce sulle caratteristiche di gestione e sull'uso previsto.
    figure_finish_type:
      name: Tipo di finitura della statuetta
      description: Indica la finitura superficiale/di verniciatura della statuetta
        del cavallo (come appare e come si presenta al tatto come oggetto da collezione).
    figurine_scale:
      name: Scala della statuetta
      description: Scala/rapporto della statuetta rispetto all'oggetto reale (ove
        applicabile), ad esempio 1:6.
    fill_status:
      name: Stato di riempimento
      description: Indica se il manichino da allenamento viene venduto già riempito,
        vuoto o parzialmente riempito, determinando così i costi di spedizione e l'impegno
        richiesto all'acquirente.
    filling_consistency:
      name: Consistenza del riempimento
      description: Descrive la consistenza o la viscosità del ripieno come Supply
        (ad esempio, crema liscia, frutta a pezzi, pasta).
    filling_type:
      name: Tipo di riempimento
      description: Specifica il ripieno principale o la crema all'interno del cookie,
        se presente.
    filtration_and_mother_status:
      name: Stato di filtrazione e stato della madre
      description: Indica se l'aceto è filtrato, non filtrato, crudo o contiene la
        "madre", per venire incontro alle esigenze dei consumatori che cercano opzioni
        probiotiche o crude.
    filtration_method:
      name: Metodo di filtrazione
      description: Materiale o tecnica utilizzata per filtrare e purificare la vodka
        dopo la distillazione.
    fin_box_system:
      name: Sistema di scatole per pinne
      description: Specifica la scatola delle pinne o l'interfaccia di montaggio utilizzata
        dalla tavola, determinando la compatibilità con le pinne aftermarket.
    fin_buoyancy:
      name: galleggiabilità delle pinne
      description: Indica se la pinna ha galleggiabilità positiva, neutra o negativa
        in acqua, trim subacqueo Impact e bilanciamento dell'attrezzatura.
    fin_flex_rating:
      name: Valutazione della flessibilità della pinna
      description: Indica il livello di rigidità o flessibilità relativa della pinna,
        che influisce sulle prestazioni complessive.
    fin_mounting_system:
      name: Sistema di montaggio della pinna
      description: Definisce l'interfaccia o lo standard di fissaggio utilizzato per
        fissare la pinna alla tavola da kitesurf (ad esempio, FCS II, a vite, a 4
        fori), garantendo la compatibilità tra pinne e tavole.
    fin_position:
      name: Posizione finale
      description: Specifica la posizione di montaggio prevista dell'aletta sulla
        tavola.
    fin_strap_type:
      name: Tipo di cinturino per pinna
      description: Specifica lo stile del cinturino o della fidelizzazione dei clienti
        sistema utilizzato per fissare la pinna al tallone/piede.
    fin_template:
      name: Fin nero
      description: Classifica il modello o il profilo idrodinamico della pinna della
        tavola da surf, Influence lo stile di virata, la velocità e la sensazione
        generale della tavola.
    finger_count:
      name: Conteggio delle dita
      description: Indica il numero di dita per cui il guanto, la scheda o handle
        di rilascio sono progettati per l'assistenza.
    finger_coverage:
      name: Copertura delle dita
      description: Indica quanta parte delle dita è coperta.
    finger_grip_adjustability:
      name: Regolazione dell'impugnatura con le dita
      description: Indica come l'impugnatura per le dita si fissa o si regola per
        adattarsi a diverse taglie di mano.
    finger_hole_configuration:
      name: Configurazione del foro per le dita
      description: Specifica l'orientamento della mano per i fori delle dita (destrorsa,
        mancina o ambidestra).
    finger_hole_count:
      name: Conteggio dei fori per le dita
      description: Indica il numero di fori per le dita nell'impugnatura in pelle,
        una differenza stilistica fondamentale tra i modelli senza dita, a 2 fori,
        a 3 fori e a 4 fori.
    finger_pick_band_style:
      name: stile band fingerpicking
      description: Stile del cinturino/anello che si fissa al dito, che influisce
        sul comfort e sulla regolabilità.
    finger_pick_blade_length:
      name: Lunghezza della lama del plettro da dito
      description: Lunghezza della lama di prelievo che si estende dalla fascia.
    finger_pick_blade_shape:
      name: Forma della lama del plettro a dito
      description: Shapes/profilo della superficie di presa (lama) che entra in contatto
        con la stringa.
    finger_pick_size:
      name: Finger pick v
      description: Regolazione della misura dell'anello/fascetta del plettro per adattarsi
        a diverse circonferenze di dita o pollici (non alle dimensioni dello strumento).
    finger_pick_wear_location:
      name: Finger pick wear sede
      description: Indica su quale dito è destinato l'inserto per pollice o se il
        prodotto è un set per pollice e indice.
    finger_protection:
      name: Protezione delle dita
      description: Indica se il guanto include una protezione per il dorso delle dita
        e se le punte sono rimovibili.
    fingerboard_bearing_type:
      name: Tipo di cuscinetto della tastiera
      description: Specifica il tipo di cuscinetto utilizzato nelle ruote del fingerboard.
    fingerboard_grip_type:
      name: Tipo di impugnatura della tastiera
      description: Specifica il materiale/tipo di superficie di presa utilizzato sulla
        tastiera.
    fining_agent_active_ingredient:
      name: Principio attivo dell'agente chiarificante
      description: Agente chiarificante o di chiarificazione primario utilizzato nel
        prodotto.
    fining_agent_type:
      name: Tipo di agente di multa
      description: Specifica la composizione chimica o il materiale dell'agente chiarificante/di
        chiarificazione per i prodotti che chiarificano il vino rosso.
    finish_after_baking:
      name: Completare dopo la cottura
      description: Descrive l'aspetto tipico della superficie dopo la polimerizzazione/cottura.
    finish_effect:
      name: Effetto finale
      description: Descrive gli effetti speciali di superficie/ottici applicati allo
        strass.
    finish_type:
      name: Tipo di finitura
      description: Finitura superficiale applicata al corpo dell'ukulele.
    finished_product_format:
      name: Formato del prodotto finito
      description: Specifica il tipo di prodotto profumato che il kit è destinato
        a realizzare.
    fire_pit_accessories_included:
      name: Accessori per braciere inclusi
      description: Elenca gli accessori principali Supply con il braciere, come Spark
        o le pietre laviche, chiarendo cosa è incluso nella confezione.
    firework_assortment_launch_type:
      name: Assortimento di fuochi d'artificio Tipo Launch
      description: Descrive come vengono tipicamente accesi/Launch i fuochi d'artificio
        inclusi.
    firework_assortment_types_included:
      name: Tipi di assortimento di fuochi d'artificio inclusi
      description: Identifica le principali tipologie di fuochi d'artificio incluse
        nell'assortimento per aiutare l'acquirente a confrontare il pacchetto Contenuto
        (ad esempio, fontane, candele romane, petardi).
    firework_effect_types:
      name: Tipi di effetti pirotecnici
      description: Famiglie di effetti visivi e/o sensoriali primari prodotti dall'assortimento
        (selezionare tutte le opzioni pertinenti).
    firework_ignition_method:
      name: Metodo di accensione dei fuochi d'artificio
      description: Specifica come viene acceso o innescato il fuoco d'artificio (ad
        esempio, miccia o innesco elettrico).
    firework_visual_intensity_level:
      name: livello di intensità visiva dei fuochi d'artificio
      description: Intensità visiva/volume complessivo delle Spark per l'effetto fontana.
    firing_mode:
      name: Modedi sparo
      description: Elenca la Mode di sparo selezionabile o primaria dell'assistenza
        per la pistola softair.
    first_day_cover_cachet_type:
      name: Tipo di cachet della busta primo giorno di emissione
      description: Tipo di timbro sulla busta del primo giorno di emissione (ad esempio,
        stampato, dipinto a mano).
    first_day_cover_cancellation_type:
      name: Tipo di cancellazione della copertura del primo giorno
      description: Tipo/stile di annullo postale applicato sulla busta del primo giorno
        di emissione (ad es. annullo meccanico, annullo manuale).
    first_day_cover_set_type:
      name: tipo di set di buste del primo giorno
      description: Indica se la copertina rappresenta un singolo numero, una serie
        completa o una sottoserie/combinazione.
    fishing_hook_size:
      name: dimensioni dell'amo da pesca
      description: 'Specifica la designazione standardizzata della taglia dell''amo
        da pesca (ad esempio, #4, 1/0, 10/0), aiutando i pescatori ad abbinare la
        dimensione dell''amo alla specie di pesce e all''esca da utilizzare.'
    fishing_hook_style:
      name: Stile dell'amo da pesca
      description: Identifica il design specifico o il modello di curvatura del singolo
        gancio, che influisce sulla presentazione, sull'efficienza di aggancio e sull'applicazione
        prevista.
    fishing_hook_type:
      name: Tipo di amo da pesca
      description: Descrive la configurazione dell'amo. Supply con il cucchiaino da
        pesca (se presente).
    fishing_line_application:
      name: App per la lenza da pesca
      description: Indica l'uso previsto della lenza o del terminale (ad esempio,
        terminale, lenza principale, finale).
    fishing_line_buoyancy_type:
      name: tipo di galleggiamento della lenza da pesca
      description: Classifica il comportamento della lenza nella colonna d'acqua (ad
        esempio, galleggiante, intermedia, affondante), aiutando i pescatori a scegliere
        la profondità di presentazione più appropriata.
    fishing_needle_purpose:
      name: Scopo dell'ago da pesca
      description: Identifica l'applicazione principale dell'ago nelle operazioni
        di montaggio delle lenze da pesca.
    fishing_needle_types_included:
      name: Tipi di aghi da pesca inclusi
      description: Elenca gli specifici tipi di ago o strumento di rigging Supply
        nel set, in modo che i clienti possano vedere rapidamente il contenuto kit
        .
    fit_profile:
      name: Profilo di adattamento
      description: Descrive il taglio e la silhouette complessivi dell'imbottitura,
        che influiscono sulla mobilità e sulla copertura.
    fit_volume_classification:
      name: Classificazione del volume di vestibilità
      description: Classifica il volume interno complessivo dello stivale in base
        al mercato per marca (ad esempio, LV per basso volume).
    fitting_angle:
      name: Angolo di raccordo
      description: Specifica l'angolo di piegatura del corpo del raccordo (ad esempio,
        dritto, 45°, 90°). Utilizzare "Regolabile/orientabile" per i raccordi con
        angolo variabile e "Altro" per angoli non comuni.
    flag_base_type:
      name: Tipo di base della bandiera
      description: Definisce il tipo di ancoraggio o base utilizzato per fissare la
        bandierina d'angolo su diverse superfici di gioco.
    flag_design_theme:
      name: Tema di design delle bandiere
      description: Descrive il tema principale del design rappresentato sulla bandiera
        (ad esempio, paese/nazione, squadra sportiva, festività), facilitando la scoperta
        e il filtraggio per gli acquisti basati sull'intento.
    flag_mounting_method:
      name: Metodo di montaggio della bandiera
      description: Specifica come la bandiera si fissa al veicolo (ad esempio, tramite
        supporto per antenna, gancio di traino, magnetico).
    flag_type:
      name: Tipo di bandiera
      description: Classifica lo scopo o lo stile specifico della bandierina da golf,
        come bandierina da buca, bandierina da carrello o bandierina da allenamento.
    flame_resistance_standard:
      name: standard di resistenza alla fiamma
      description: Indica lo specifico standard/certificazione di resistenza alla
        fiamma o all'arco elettrico che il capo soddisfa.
    flamenco_cajon_snare_system:
      name: Sistema di rullante cajon flamenco
      description: Specifica il meccanismo interno del rullante utilizzato per creare
        il caratteristico ronzio del flamenco (o la sua assenza).
    flammability_compliance:
      name: Conformità in materia di infiammabilità
      description: Specifica gli standard di infiammabilità applicabili che il tessuto
        soddisfa per gli interni dei veicoli.
    flannel_brushing_finish:
      name: Finitura in flanella spazzolata
      description: Indica se la flanella è spazzolata e su quale/i lato/i, fattori
        che influiscono su morbidezza, calore e aspetto.
    flannel_use_type:
      name: Tipo di utilizzo della flanella
      description: Applicazione principale prevista per il taglio/bullone in flanella.
    flap_configuration:
      name: Configurazione del lembo
      description: Indica il tipo di patta della sella, ad esempio a patta singola
        o a doppia patta.
    flare_color:
      name: Colore del bagliore
      description: Colore della luce/fiamma emessa (o colore della lente per i bagliori
        a LED).
    flash_card_included_features:
      name: Caratteristiche incluse della scheda flash
      description: Evidenzia le funzionalità di apprendimento e utilizzo incluse nelle
        flashcard.
    flavor_intensity:
      name: Intensità del sapore
      description: Indica il grado di concentrazione dell'aroma, aiutando gli utenti
        a determinare il dosaggio appropriato (ad esempio, concentrazione standard,
        concentrazione elevata).
    flavor_solvent_base:
      name: Base di solvente aromatizzante
      description: Identifica il principale agente aromatizzante o solvente utilizzato
        nell'aromatizzazione (ad esempio, alcol, glicole propilenico, glicerina).
    fleece_fiber_animal_type:
      name: Tipo di animale da cui proviene la fibra di lana
      description: La fonte animale della fibra di lana (specie).
    fleece_finish_surface:
      name: Finitura/superficie della lana
      description: Descrive la superficie/finitura della lana (ad esempio, anti-pilling,
        spazzolato) che influisce sulla resistenza al pilling, sulla morbidezza e
        sull'aspetto.
    fleece_preparation_method:
      name: Metodo di preparazione della lana
      description: Come viene preparata/lavorata la lana per la lavorazione artigianale
        e la filatura (stato della fibra)
    flesh_color:
      name: Color carne
      description: Specifica il colore della polpa interna del melone.
    fletching_orientation:
      name: Orientamento dell'impennaggio
      description: Specifica come le alette sono disposte sull'asta (ad esempio, dritte,
        sfalsate, elicoidali), influenzando la rotazione e la traiettoria della freccia.
    fletching_profile:
      name: Profilo dell'impennaggio
      description: Definisce le forme geometriche o il taglio delle alette, che influiscono
        sulla resistenza aerodinamica, sul gioco, sul rumore e sulle caratteristiche
        generali di volo della freccia.
    flight_system_type:
      name: Tipo di sistema di volo
      description: 'Sistema di pale: identifica lo stile costruttivo delle pale, distinguendo
        tra sistemi pieghevoli, stampati e sistemi integrati di pale e albero.'
    float_attachment_method:
      name: Metodo di fissaggio del galleggiante
      description: Descrive come il galleggiante è fissato alla lenza (ad esempio,
        scorrevole o fisso), consentendo ai pescatori di filtrare in base al tipo
        di montaggio.
    float_design:
      name: Progettazione del galleggiante
      description: Classifica lo stile o il tipo generale del galleggiante da pesca
        (ad es. bobber, waggler, pencil), in modo che i pescatori possano scegliere
        rapidamente un modello adatto alla loro tecnica e alle condizioni del momento.
    float_raft_use_environment:
      name: Ambiente di utilizzo di galleggianti/zattere
      description: Principali condizioni acquatiche previste per il gonfiabile (piscina,
        acque calme o onde), che riflettono le aspettative in termini di durata e
        progettazione.
    floatation:
      name: Galleggiamento
      description: Se il segnalatore è progettato per galleggiare in acqua.
    floor_construction_type:
      name: Tipo di costruzione del pavimento
      description: Specifica il design del fondo della zattera (ad esempio, autosvuotante,
        Drop-stitch) che influisce sul drenaggio, sulla rigidità e sulle prestazioni.
    floor_design:
      name: Design del pavimento
      description: Stile di copertura del terreno inclusa con la recinzione.
    floor_inclusion:
      name: Inclusione del pavimento
      description: Indica se il vestibolo comprende un pavimento e se tale pavimento
        è rimovibile.
    floor_mat_cleaning_method:
      name: Metodo di pulizia dei tappetini
      description: Indica il metodo di pulizia principale consigliato dal produttore
        per il tappeto.
    floor_mat_edge_style:
      name: Tappetino con bordo
      description: Descrive se il tappetino ha bordi rialzati per contenere eventuali
        fuoriuscite di liquidi e detriti.
    floor_mat_format:
      name: Formato tappetino da pavimento
      description: Definisce il formato fisico o lo stile del prodotto di protezione
        per pavimenti (ad esempio, tappetino singolo, piastrelle a incastro, rotolo).
    floor_mat_retention_system:
      name: Sistema di ritenzione del tappetino
      description: Specifica il metodo utilizzato per mantenere il tappetino saldamente
        in posizione.
    floor_mat_set_configuration:
      name: Configurazione del set di tappetini
      description: Indica quali posizioni sono incluse nel pacchetto (ad esempio,
        solo coppia frontale, set completo).
    floss_sugar_granulation_grade:
      name: Granulometria dello zucchero per zucchero filato
      description: Indica la dimensione dei cristalli della miscela di zucchero (fine,
        media, grossa), che può influire sulle prestazioni della macchina e sulla
        consistenza finale.
    floss_sugar_product_form:
      name: Forma del prodotto di zucchero filato
      description: Indica se lo zucchero per lo zucchero filato è pronto all'uso,
        un concentrato di aroma da miscelare con zucchero base, oppure uno zucchero
        base incolore.
    flour_grind_texture:
      name: Consistenza della macinatura della farina
      description: Indica la granulometria o la consistenza della farina, ad esempio
        finissima, media, grossolana o macinata a pietra, che può influenzare la riuscita
        della ricetta.
    flour_processing_method:
      name: Metodo di lavorazione della farina
      description: Indica i metodi di lavorazione o le varianti più rilevanti applicati
        alla farina (ad esempio, macinazione a pietra, sbiancamento, germinazione,
        arricchimento) che influenzano il sapore, il colore o le proprietà nutritive.
    flower_care_instructions:
      name: Istruzioni per la cura dei fiori
      description: Fornisce consigli specifici per la cura dei fiori recisi (ad esempio,
        tagliare gli steli, cambiare l'acqua spesso).
    flugelhorn_leadpipe_material:
      name: Materiale del canneggio del flicorno
      description: Materiale del bocchino (se specificato separatamente dal materiale
        complessivo dello strumento).
    flugelhorn_trigger_type:
      name: Tipo di trigger del flicorno
      description: Indica se il flicorno è dotato di un trigger di intonazione e quale
        coulisse/valvola aziona.
    fluorescence_grade:
      name: Grado di fluorescenza
      description: Indica l'intensità di fluorescenza del diamante esposto alla luce
        UV.
    fluorescence_under_uv:
      name: Fluorescenza sotto luce UV
      description: Indica se e quale tipo di fluorescenza viene emessa dal campione
        sotto luce ultravioletta.
    fluorocarbon_content:
      name: Contenuto di fluorocarbonio
      description: Indica se la cera contiene additivi al fluorocarbonio e in quale
        quantità.
    flute_case_capacity:
      name: Capacità della cassa del flauto
      description: Indica cosa dovrebbe contenere la cassa, oltre al corpo principale
        del flauto (ad esempio, flauto + ottavino, testata aggiuntiva).
    flute_cleaning_rod_tip_type:
      name: Punta dell'asta di pulizia del flauto
      description: Descrive il design dell'estremità dell'asta che trattiene il panno/tampone
        o che entra a contatto con lo strumento (ad esempio, scanalata, filettata,
        con occhiello).
    flute_footjoint_type:
      name: Tipo di piede del flauto
      description: Specifica la configurazione del piede del flauto.
    flute_headjoint_cork_type:
      name: Tipo di testata per flauto in sughero
      description: Specifica il materiale/tipo del gruppo tappo/tappo in sughero fornito
        con la testata.
    flute_key_system:
      name: Sistema di chiavi del flauto
      description: Indica il sistema meccanico/chiavi utilizzato dal flauto (ad esempio,
        sistema Boehm), ove applicabile.
    flute_keywork_material:
      name: Materiale della meccanica del flauto
      description: Materiale e/o placcatura dei tasti (meccanica), qualora specificati
        separatamente dal materiale del corpo dello strumento.
    flute_offset_g:
      name: Flauto con sol fuori linea
      description: Specifica se il flauto ha una layout dei tasti del Sol fuori linea.
    flute_wall_thickness:
      name: Spessore della parete del flauto
      description: Categoria di spessore della parete del tubo scanalato (parete sottile,
        standard, parete spessa).
    fly_pattern_type:
      name: Tipo di pattern per mosche artificiali
      description: Classifica le mosche artificiali in base al loro stile di pesca
        o all'imitazione di insetti/prede, aiutando i pescatori a individuare rapidamente
        il tipo di mosca più adatto alle loro esigenze.
    fly_rod_style:
      name: Stile canna da mosca
      description: Classifica la canna in base alla disciplina di lancio o all'applicazione
        prevista (ad esempio, canna a una mano, switch, spey).
    fly_style:
      name: Stile della mosca artificiale
      description: Indica il tipo di patta o di apertura frontale presente sui pantaloni
        stile long-john.
    fly_tying_tools_included:
      name: Attrezzi per la costruzione di mosche artificiali inclusi
      description: Elenca gli strumenti specifici per la costruzione di mosche artificiali
        forniti nel kit in modo che gli acquirenti sappiano esattamente cosa è incluso
        e possano confrontare i pacchetti.
    fly_type:
      name: Tipo di mosca
      description: Specifica se i pantaloni lunghi includono una patta funzionale
        e, in tal caso, il tipo di patta.
    flyer_hook_mounting_method:
      name: Metodo di montaggio del gancio per volantino
      description: Il modo in cui il gancio si fissa al volantino (ad esempio, a vite
        o a pressione) influisce sulla facilità di installazione e sulla compatibilità.
    flyer_hook_orientation:
      name: Orientamento del gancio del volantino
      description: Se il gancio è destinato al lato sinistro o destro del volantino,
        oppure se è reversibile/universale.
    flyer_kit_finish_coating:
      name: Kit di finitura/rivestimento per volantini
      description: Finitura superficiale applicata ai componenti del kit del volantino.
    flyer_kit_included_components:
      name: Il kit di volantini include i componenti
      description: Indica i componenti inclusi nel kit.
    flyer_orifice_type:
      name: Tipo di orifizio del volantino
      description: Specifica il tipo di orifizio utilizzato sul volantino.
    flying_disc_feature_set:
      name: Funzionalità del disco volante
      description: Caratteristiche funzionali principali del disco volante.
    flysheet_material:
      name: Materiale del telo di copertura
      description: Indica il tessuto principale utilizzato per il telo esterno della
        tenda/telo di copertura, il peso Impact , la durata e la resistenza agli agenti
        atmosferici.
    flywheel_balance_type:
      name: Tipo di rivendita del volano
      description: Indica se il volano è in posizione neutra o se utilizza un contrappeso
        esterno.
    foam_blocks_size_class:
      name: Blocchi di schiuma taglia classe
      description: Indica la classe generale taglia dei blocchi nell'insieme.
    foam_blocks_surface_texture:
      name: Blocchi di schiuma con texture superficiale
      description: Descrive la consistenza/finitura della superficie esterna dei blocchi
        di schiuma.
    foam_surface_effect:
      name: effetto superficie schiuma
      description: Descrive i comuni effetti decorativi di superficie applicati alla
        Craft o al polistirolo, come finiture glitterate, metalliche o olografiche.
    foil_color:
      name: colore della lamina
      description: Specifica il colore della lamina metallica utilizzata sul certificato
        (se applicabile).
    foil_curtain_mounting_method:
      name: Metodo di montaggio della tenda di alluminio
      description: Modalità di installazione o sospensione della tenda in lamina (ad
        esempio, striscia adesiva, occhielli).
    foil_discipline:
      name: Disciplina del fioretto
      description: Indica lo stile di navigazione o la disciplina principale per cui
        è progettato il foil.
    foil_mast_board_mounting_type:
      name: Tipo di montaggio dell'albero in lamina
      description: Definisce l'interfaccia nella parte superiore dell'albero che si
        collega alla tavola o al tracciatore in foil.
    foil_mast_fuselage_connection_type:
      name: Tipo di relazione fusoliera albero foil
      description: Specifica come l'albero si collega alla fusoliera o all'ala anteriore.
    foil_mounting_interface:
      name: Interfaccia di montaggio del foil
      description: Identifica lo standard di relazione che il componente utilizza
        per fissarsi alla scheda o ad altri componenti in lamina.
    foil_mounting_system:
      name: Sistema di montaggio del foil
      description: Specifica l'interfaccia di montaggio per foil o pinne sulla tavola,
        garantendo la compatibilità con l'hardware già in uso dal rider.
    foil_mounting_type:
      name: Tipo di montaggio del foil
      description: Identifica il sistema di interfaccia utilizzato per fissare la
        lamina al circuito stampato, garantendo la compatibilità tra i componenti.
    fold_over_elastic_application:
      name: Applicazione elastica ripiegabile
      description: Uso/applicazione principale previsto per l'elastico per asole.
    foldability:
      name: Pieghevolezza
      description: Descrive se e come il divisorio si piega o si comprime per essere
        riposto o riconfigurato.
    foldability_stow:
      name: Pieghevolezza (stoccaggio)
      description: Se lo scaffale si piega/stacca quando non in uso (ad esempio, si
        ripiega contro il veicolo).
    folding_style:
      name: Stile pieghevole
      description: Indica come il materassino di sicurezza si ripiega per il trasporto
        e lo stoccaggio, influenzando l'uniformità della superficie di atterraggio
        e l'ingombro.
    food_basket_items_included:
      name: Articolo del cesto alimentare incluso
      description: Elenca le principali tipologie di prodotti alimentari inclusi nel
        cesto per aiutare l'acquirente a scegliere cesti che corrispondano Taste o
        alle esigenze dietetiche del destinatario.
    food_coloring_form:
      name: forma di colorante alimentare
      description: Specifica la forma fisica o il formato di consegna in cui il colorante
        alimentare viene Supply (ad esempio, gel, liquido, polvere, spray).
    food_contact_material:
      name: materiale a contatto con gli alimenti
      description: Materiale primario dell'attrezzatura per la vinificazione (fermentatori,
        sifoni, imbuti) utilizzato con il mosto/vino.
    food_packing_medium:
      name: Confezionamento alimentare medio
      description: Specifica il mezzo in cui vengono confezionati frutta o verdura
        (ad esempio, acqua, salamoia, sciroppo, olio).
    foosball_rod_type:
      name: tipo di asta da calcio balilla
      description: Indica la configurazione meccanica dell'asta che influisce sulla
        sensazione di gioco e sulla sicurezza.
    foot_arch_type_compatibility:
      name: compatibilità del tipo di arco plantare
      description: Identifica il profilo dell'arco plantare per cui è progettato il
        plantare.
    foot_arch_type_suitability:
      name: Idoneità per tipo di arco plantare
      description: Identifica il profilo dell'arco plantare a cui è destinato l'inserto.
    foot_coverage:
      name: Copertura del piede
      description: Indica se la calzatura è con piede, senza piede, con staffa o con
        tallone aperto.
    foot_guard_type:
      name: tipo di protezione per il piede
      description: Indica se la protezione per la gamba include una protezione per
        la punta/il piede e specifica se tale protezione è fissa o rimovibile.
    foot_support_level:
      name: Livello di supporto plantare
      description: Indica il livello di supporto strutturale o di rigidità fornito
        da una soletta per scarpe, ad esempio basso, medio, alto o extra alto.
    footbag_play_style:
      name: stile di gioco del calcio
      description: Stile di gioco principale previsto per il footbag.
    football_ball_type:
      name: tipo pallone da calcio
      description: Specifica l'uso principale previsto o Context per il pallone da
        calcio, come ad esempio il gioco, l'allenamento o l'esposizione come oggetto
        da collezione.
    football_dummy_type:
      name: Tipo di manichino da calcio
      description: Classifica lo stile o il design funzionale del manichino in base
        al suo specifico scopo di addestramento.
    football_glove_certification:
      name: Certificazione guanto da calcio
      description: Indica la certificazione o la conformità agli standard richiesti
        per le competizioni (ad esempio, SFIA, NFHS, NCAA).
    footboard_mounting_type:
      name: Tipo di montaggio della pediera
      description: Specifica come la pediera si fissa al Frame del letto o al pavimento,
        aiutando l'acquirente a selezionare hardware e i metodi di installazione compatibili.
    footboard_style:
      name: Stile della pedana
      description: Definisce lo stile di design strutturale o estetico della pediera.
    footrest_adjustability:
      name: Regolabilità del poggiapiedi
      description: Specifica se e come i poggiapiedi possono essere regolati per adattarsi
        alle diverse lunghezze delle gambe dei bambini.
    footrest_type:
      name: Tipo di poggiapiedi
      description: Identifica la presenza e il design di un poggiapiedi sullo sgabello.
    footstrap_configuration:
      name: Configurazione del cinturino per i piedi
      description: Specifica lo schema di inserimento delle cinghie per i piedi sul
        ponte della tavola.
    footswitch_action_style:
      name: stile di azionamento a pedale
      description: Indica se l'azione dell'interruttore è momentanea o a ritenuta
        e se supporta entrambe.
    footswitch_power_source:
      name: Alimentazione tramite interruttore a pedale
      description: Specifica come viene alimentato il footswitch, se applicabile (passivo
        tramite jack dell'amplificatore, batteria, adattatore esterno, USB, ecc.).
    footwear_construction_method:
      name: Metodo di costruzione delle calzature
      description: Definisce la tecnica utilizzata per fissare la tomaia alla suola,
        Influence la durata, le possibilità di risuolatura e il prezzo.
    footwear_cut:
      name: Calzature tagliate
      description: Indica l'altezza del collare alla caviglia (taglio basso, taglio
        medio, taglio alto), la mobilità del supporto e gli accessori.
    footwear_size_system:
      name: Calzature sistema
      description: Indica lo standard di misurazione regionale utilizzato per il numero
        di scarpa indicato (es. US, EU, UK).
    footwear_support_type:
      name: Calzature tipo assistenza
      description: Specifica il livello di assistenza biomeccanica o di controllo
        della pronazione fornito dalla scarpa (ad esempio, Neutro, Stabilità, Controllo
        Motion ).
    fork_material:
      name: Materiale della forchetta
      description: Specifica il materiale utilizzato per la forcella anteriore di
        una bicicletta, Influence la rigidità, il peso e la qualità Ride .
    form_factor:
      name: Fattore di forma
      description: Fattore di forma hardware primario del titolare del trattamento
        DMX.
    formula_car_series_class:
      name: Serie/classe di Formula Car
      description: Specifica la serie o la classe di gara per cui la monoposto di
        Formula è stata progettata per competere.
    formulation_style:
      name: Stile di formulazione
      description: Highlight le formulazioni specializzate pensate per usi o preferenze
        particolari (ad esempio, Barista, Extra Cremoso).
    formulation_type:
      name: Tipo di formulazione
      description: La tipologia di formulazione dello spray disinfettante.
    fossil_preparation_level:
      name: Livello di preparazione dei fossili
      description: Grado di preparazione/pulizia effettuato sul campione (ad esempio,
        non preparato in matrice rispetto a completamente preparato).
    fossil_preservation_type:
      name: Tipo di conservazione dei fossili
      description: Tipo di conservazione del fossile (ad esempio, permineralizzato,
        calco, stampo, visibile).
    fossil_restoration_status:
      name: Stato di restauro dei fossili
      description: Se e come il campione è stato riparato/restaurato (ad esempio,
        incollato, ricostruito, ricomposto).
    foundation_configuration:
      name: Configurazione Foundations
      description: Specifica se la Foundations è realizzata in un unico pezzo o in
        un set Split/in due pezzi per materassi di dimensioni maggiori.
    foundation_profile:
      name: Profilo Foundations
      description: Classifica la categoria di altezza generale delle Foundations(ad
        esempio, ultra-bassa, bassa, standard o alta) in modo che l'acquirente possa
        abbinare rapidamente l'altezza del materasso e la misura delle lenzuola.
    frame_adjustability:
      name: Regolabilità del Frame
      description: Indica se e come il Frame può essere regolato (ad esempio, regolazione
        in larghezza/altezza, rotazione/inclinazione), il che influisce sull'ergonomia
        e sull'adattamento al progetto.
    frame_drum_jingle_configuration:
      name: Configurazione del sonagli del tamburo Frame
      description: Se il tamburo Frame include sonagli e, in caso affermativo, la
        configurazione generale.
    frame_drum_tuning_system:
      name: Sistema di accordatura del tamburo Frame
      description: Come viene accordato il tamburo Frame o se è accordabile.
    frame_finish:
      name: Finitura del telaio
      description: Specifica il rivestimento protettivo o la finitura del materiale
        applicati al telaio, che influiscono sulla durata e sull'estetica.
    frame_mounting_standard:
      name: Standard di montaggio del Frame
      description: Definisce le specifiche dell'interfaccia tra la scarpa e la telaio
        (ad es. 195 mm a 2 punti, Trinity a 3 punti), fondamentali per la compatibilità
        del telaio.
    frame_steel_gauge:
      name: Spessore dell'acciaio del telaio
      description: Indica lo spessore (calibro) dei tubi d'acciaio utilizzati nei
        montanti del mobile, un indicatore fondamentale di resistenza e stabilità.
    frame_suspension_type:
      name: Tipo di sospensione del telaio
      description: Indica il tipo di sospensione del telaio della bicicletta, ad esempio
        rigido, hardtail o full suspension, per aiutare l'acquirente a scegliere il
        telaio più adatto alla propria corporatura.
    free_reed_instrument_orientation:
      name: Orientamento dello strumento ad ancia libera
      description: Specifica come viene impugnato/suonato lo strumento (a mano con
        mantice, a tracolla, ecc.) ai fini dell'ergonomia e del filtraggio della cassa.
    free_weight_rack_type:
      name: Tipo di rastrelliera per pesi liberi
      description: Classifica lo stile strutturale o la funzione del supporto (ad
        esempio, supporto per bilancieri, supporto per kettlebell, portadischi).
    freehub_body_type:
      name: Tipo di corpo ruota libera
      description: Specifica lo standard del corpo ruota libera o del sistema di innesto
        della cassetta supportato dal mozzo posteriore della bicicletta.
    freehub_driver_standard:
      name: Standard del sistema di innesto della ruota libera
      description: Identifica l'interfaccia cassetta/sistema di innesto supportata
        dal mozzo (ad es. Shimano HG, SRAM XD).
    freewheel_thread_standard:
      name: Standard della filettatura della ruota libera
      description: Specifica lo standard o la misura della filettatura del mozzo con
        cui la ruota libera è compatibile
    french_horn_bell_construction:
      name: Struttura della campana del corno francese
      description: Specifica come è costruita la campana e se può essere rimossa per
        il trasporto/la manutenzione.
    french_horn_bell_material:
      name: Materiale del padiglione del corno francese
      description: Specifica il materiale/lega della campana (e spesso anche della
        svasatura della campana) utilizzata nel corno francese.
    french_horn_bell_type:
      name: Tipo di campana del corno francese
      description: Stile costruttivo della campana.
    french_horn_finish:
      name: Finitura del corno francese
      description: Finitura/placcatura esterna dello strumento.
    french_horn_included_accessories:
      name: Corno francese con accessori inclusi
      description: Accessori inclusi con il corno francese (cassa, bocchino, ecc.).
    french_horn_leadpipe_material:
      name: Materiale del bocchino del corno francese
      description: Specifica il materiale/lega del tubo di piombo.
    french_horn_wrap_type:
      name: Tipo di avvolgimento del corno francese
      description: Configurazione generale della forma/curvatura del corno francese.
    fretboard_radius_fit:
      name: Adattamento del raggio della tastiera
      description: Indica se la curvatura del cuscinetto del capotasto è progettata
        per tastiere piatte o curve, oppure se è regolabile per adattarsi a diversi
        raggi di curvatura della tastiera.
    friction_surface_included:
      name: Superficie di attrito inclusa
      description: Se il volano è dotato di una superficie di attrito sostituibile/installata
        (ad es. un inserto o un anello) oppure presenta una superficie di attrito
        monoblocco.
    fringe_curtain_finish:
      name: Finitura per tenda a frange
      description: Descrive l'aspetto visivo della superficie della frangia (lucentezza/texture).
    fringe_curtain_material:
      name: Materiale per tende a frange
      description: Specifica il materiale principale delle strisce della tenda (es.
        pellicola termoretraibile, plastica, Paper, tessuto).
    fringe_curtain_use_location:
      name: Uso delle tende a frange
      description: Indica se la tenda a frange è destinata all'uso interno, all'uso
        esterno o a entrambi.
    fringe_trim_style:
      name: Stile di rifinitura con frange
      description: Specifica la struttura/lo stile della passamaneria con frange (come
        vengono formati e presentati i fili o gli anelli).
    front_axle_standard:
      name: Assale anteriore standard
      description: Indica il diametro e la distanza tra i fori dell'asse per cui la
        forcella è stata progettata (ad es. 15 x 110 mm Boost), garantendo la compatibilità
        con i mozzi.
    front_button_configuration:
      name: Configurazione dei pulsanti anteriori
      description: Indica lo stile dei bottoni frontali di una giacca, specificando
        se è monopetto o doppiopetto e il numero di bottoni frontali.
    front_closure_style:
      name: Stile di chiusura frontale
      description: Indica lo stile di costruzione frontale dell'impermeabile, ad esempio
        monopetto o doppiopetto, aperto, a portafoglio o CAP.
    front_decoration_type:
      name: Tipo di decorazione frontale
      description: Indica il tipo di decorazione o toppa presente sulla parte anteriore
        del cappello (ad esempio, toppa ricamata, toppa in pelle).
    front_point_configuration:
      name: Configurazione della punta anteriore
      description: Specifica il design delle punte anteriori (Mono, doppia punta,
        Modular, sostituibili), influisce sulla precisione di penetrazione su ghiaccio
        e terreni misti.
    front_seat_position:
      name: Posizione del sedile anteriore
      description: Lato/posizione nella prima fila previsto per il sedile.
    front_style:
      name: Stile della parte anteriore
      description: Descrive la struttura della parte anteriore dei pantaloni chino,
        indicando se si tratta di un modello a vita piatta, con pinces o con altri
        dettagli.
    frosting_or_icing_type:
      name: Tipo di glassa o copertura
      description: Specifica il tipo di glassa o copertura applicata alla torta o
        al dolce.
    fruit_cultivar_or_variety:
      name: Cultivar o varietà di frutto
      description: Specifica la particolare cultivar o varietà del frutto (ad esempio,
        Gala, Granny Smith, Monthong, Cavendish).
    fruit_cut_style:
      name: Stile di taglio della frutta
      description: Descrive come viene preparato o tagliato il frutto (ad esempio,
        intero, a fette, a cubetti).
    fruit_mix_variety:
      name: Varietà di mix di frutta
      description: Indica la miscela a tema o la varietà generica del mix di frutta
        (ad es., Mix tropicale, Assortimento di frutti di bosco).
    fruit_piece_form:
      name: Forma del pezzo di frutta
      description: Descrive il taglio o la presentazione fisica dei pezzi di frutta
        secca, ad esempio, interi, a fette, in polvere.
    fruit_snack_form:
      name: Formato dello snack di frutta
      description: Classifica la forma fisica o lo stile in cui viene presentato lo
        snack a base di frutta.
    fruit_topping_format:
      name: Formato della guarnizione in frutta
      description: Descrive l'aspetto, la consistenza o lo stile della guarnizione
        in modo che i clienti possano scegliere tra salse, sciroppi, pezzi di frutta
        a pezzetti, perle croccanti, ecc.
    fruit_variety:
      name: Varietà di frutta
      description: Indica il frutto principale utilizzato per una ricetta, un kit
        o un prodotto per la produzione di vino di frutta (ad es. mela, ciliegia,
        mora).
    fuel_cap_gasket_seal_material:
      name: Materiale per guarnizione/sigillante del tappo del serbatoio
      description: Specifica il materiale utilizzato per la guarnizione/O-ring di
        tenuta del tappo del serbatoio.
    fuel_cap_locking_mechanism:
      name: Meccanismo di chiusura del tappo del carburante
      description: Indica il metodo di chiusura utilizzato da un tappo del serbatoio
        con serratura.
    fuel_cap_type:
      name: Tipo di tappo del carburante
      description: Specifica il tipo/design funzionale del tappo del serbatoio utilizzato
        per il bocchettone di rifornimento di un veicolo.
    fuel_cap_venting:
      name: Sfiato del tappo del serbatoio
      description: Indica se il tappo del serbatoio è dotato di sfiato e, se applicabile,
        il tipo di sfiato.
    fuel_filter_features:
      name: Caratteristiche del filtro del carburante
      description: Elenca le principali caratteristiche funzionali del filtro del
        carburante (separazione dell'acqua, valvola di scarico, porta per sensore,
        ecc.).
    fuel_filter_media_material:
      name: Materiale del filtro del carburante
      description: Specifica i principali materiali filtranti utilizzati all'interno
        dell'elemento filtrante del carburante.
    fuel_filter_mounting_connection_type:
      name: Tipo di montaggio/connessione del filtro carburante
      description: Specifica come si collega/installa il filtro del carburante (filettatura/a
        vite, attacco rapido, raccordo a barb, Banjo, ecc.).
    fuel_injection_cleaning_method:
      name: Metodo di pulizia dell'impianto di iniezione
      description: Indica come utilizzare il kit per pulire l'impianto di iniezione
        del carburante.
    fuel_injector_electrical_connector_type:
      name: Tipo di connettore elettrico dell'iniettore di carburante
      description: Specifica lo standard/forma del connettore elettrico dell'iniettore.
    fuel_injector_seat_type:
      name: Tipo di sede dell'iniettore di carburante
      description: Specifica lo stile di interfaccia punta/sede dell'iniettore utilizzato
        per la tenuta sul collettore di aspirazione/carburante.
    fuel_injector_spray_pattern:
      name: Schema di spruzzo dell'iniettore di carburante
      description: Identifica lo schema di spruzzo/distribuzione del carburante dell'iniettore
        utilizzando la terminologia del produttore o del settore (ad esempio, cono,
        ventaglio, getto a matita, fori multipli).
    fuel_level_sensor_mounting_type:
      name: Tipo di montaggio del sensore di livello del carburante
      description: Specifica l'interfaccia di montaggio fisica utilizzata per fissare
        il sensore/trasmettitore del livello del carburante al serbatoio o o al modulo
        della pompa.
    fuel_level_sensor_sensing_mechanism:
      name: Meccanismo di rilevamento del sensore di livello del carburante
      description: Specifica il meccanismo/la tecnologia di rilevamento utilizzata
        per misurare il livello del carburante in un sensore o trasmettitore di livello
        del carburante.
    fuel_line_compliance_standard:
      name: Standard di conformità della linea del carburante
      description: Identifica lo standard normativo o di settore a cui la linea del
        carburante è conforme (comune nelle applicazioni marine).
    fuel_line_connector_interface_type:
      name: Tipo di interfaccia del connettore della linea del carburante
      description: Specifica lo stile di relazione/interfaccia alle estremità della
        linea del carburante o del raccordo.
    fuel_pressure_regulator_body_material:
      name: Materiale del corpo del regolatore di pressione del carburante
      description: Specifica il materiale dell'alloggiamento/corpo del regolatore
        in termini di durata e resistenza alla corrosione.
    fuel_pressure_regulator_mounting_type:
      name: Tipo di montaggio del regolatore di pressione del carburante
      description: Specifica le modalità di montaggio o installazione del regolatore
        di pressione del carburante, influenzando la compatibilità e l'adattabilità.
    fuel_pump_inlet_type:
      name: Tipo di ingresso della pompa del carburante
      description: Tipo di raccordo in corrispondenza dell'ingresso della pompa.
    fuel_pump_mounting_location:
      name: sede di montaggio della pompa del carburante
      description: Dove è installata la pompa del carburante sul/nel sistema di alimentazione
        del veicolo.
    fuel_pump_outlet_connection_type:
      name: Tipo di relazione uscita pompa carburante
      description: Specifica lo stile di relazione fisica all'uscita della pompa del
        carburante per la compatibilità di montaggio/installazione.
    fuel_system_application:
      name: Applicazione per il sistema di alimentazione
      description: 'Architettura del sistema di consegna del carburante: la pompa
        del carburante è progettata per l''assistenza (ad esempio, carburatore, EFI,
        GDI, sollevatore/Trasferimenti diesel).'
    fuel_system_connection_type:
      name: Sistema di alimentazione tipo Rap
      description: Specifica gli standard di relazione del sistema di alimentazione
        o le interfacce adattatrici supportate dal kit.
    fuel_system_type:
      name: Tipo di sistema di alimentazione del carburante
      description: Specifica il sistema di alimentazione del carburante del motore
        (ad esempio, carburatore o iniezione elettronica).
    fuel_tank_installation_position:
      name: Posizione di installazione del serbatoio del carburante
      description: Specifica la posizione di installazione tipica del serbatoio del
        carburante sul veicolo.
    fuel_tank_orientation:
      name: Orientamento del serbatoio del carburante
      description: Specifica se il serbatoio del carburante è destinato ad essere
        installato orizzontalmente o verticalmente.
    fuel_tank_shape:
      name: Shapesdei serbatoi di carburante
      description: Descrive la forma complessiva/Shapes del serbatoio del carburante
        per facilitare il montaggio fisico e la compatibilità di sostituzione.
    fur_type:
      name: Tipo di pelliccia
      description: Identifica la specie o il materiale sintetico di qualsiasi pelliccia
        presente sulla parte esterna del manicotto, della pochette o della borsa.
    furniture_finish:
      name: Finitura dei mobili
      description: Descrive la variante di superficie o la finitura applicata all'articolo
        di arredamento, che ne influenza l'aspetto e le esigenze di manutenzione.
    fuse_form_factor:
      name: Fattore di forma del fusibile
      description: Specifica il tipo/ingombro fisico del fusibile per garantire la
        compatibilità con il portafusibili o il blocco fusibili previsto (ad esempio,
        a lama o a cartuccia).
    fuse_terminal_or_mount_style:
      name: Fusibile terminale o stile di montaggio
      description: Specifica come il fusibile si collega meccanicamente/elettricamente
        (a spina, fissato con bulloni o in linea).
    fusible_application_method:
      name: Metodo di applicazione della termoadesiva
      description: Specifica come viene attivato/applicato un adesivo termofusibile
        (ad esempio, tramite calore da stirare, pressatura, rinforzo con cucitura).
    fusible_hem_tape_application_method:
      name: Metodo di applicazione del nastro termoadesivo per orli
      description: Descrive come il nastro viene attivato/applicato (ad esempio, tramite
        ferro da stiro o pressa a caldo).
    fusible_seam_tape_activation_method:
      name: Metodo di attivazione del nastro termoadesivo per cuciture
      description: Indica come viene attivato l'adesivo durante l'applicazione.
    fusible_seam_tape_application:
      name: Applicazione per nastro termoadesivo
      description: Specifica l'uso principale previsto per il nastro termoadesivo
        per cuciture.
    fusible_seam_tape_material:
      name: Materiale per nastro termoadesivo per cuciture
      description: Materiale o composizione del nastro/fettuccia/corriere (non del
        tessuto a cui è incollato).
    fusible_seam_tape_washability:
      name: lavabilità del nastro termoadesivo
      description: Indica se la cucitura termosaldata rimane intatta dopo il lavaggio
        o la pulizia.
    fusible_seam_tape_waterproof_rating:
      name: Grado di impermeabilità del nastro termoadesivo per cuciture
      description: Indica se il nastro di giunzione è destinato a creare una giunzione
        impermeabile o resistente all'acqua dopo l'applicazione.
    fusible_tape_backing_type:
      name: Tipo di supporto del nastro termoadesivo
      description: Specifica se il nastro ha una Paper/liner di rilascio e quale forma
        assume, il che influisce sulla gestione e sull'app.
    futon_frame_conversion_mechanism:
      name: Meccanismo di conversione Frame del futon
      description: Definisce il meccanismo o lo stile strutturale utilizzato per ruotare
        il Frame tra le posizioni divano, chaise longue e letto.
    gaiter_height_type:
      name: Tipo di altezza della ghetta
      description: Classifica le ghette in base all'altezza della copertura che offrono
        sulla gamba, ad esempio alla caviglia, a metà polpaccio, al ginocchio o alla
        coscia.
    game_variation:
      name: Variante del gioco
      description: Specifica lo stile di gioco per cui il set è progettato (ad esempio,
        tetherball classico, tether tennis, speedball).
    garlic_preparation_style:
      name: Stile di preparazione dell'aglio
      description: Specifica come l'aglio viene preparato o lavorato prima della vendita
        (ad esempio, intero, tritato, in polvere).
    garlic_variety:
      name: Varietà di aglio
      description: Indica la varietà/cultivar botanica o commerciale dell'aglio offerto.
    garment_back_style:
      name: Stile del retro del capo
      description: Identifica il design o la costruzione della parte posteriore del
        capo (ad esempio, schiena scoperta, schiena a vogatore, schiena incrociata).
    garment_pattern_type:
      name: Tipo di modello di abbigliamento
      description: Specifica il tipo di capo di abbigliamento che il cartamodello
        è destinato a realizzare.
    garnish_type:
      name: tipo di guarnizione
      description: Indica di che tipo di guarnizione si tratta (ingrediente o stile
        di guarnizione) utilizzata per completare un cocktail.
    gas_lift_class:
      name: classe di sollevamento a gas
      description: Specifica i livelli di sicurezza e resistenza del cilindro a gas
        utilizzato per la regolazione dell'altezza del sedile.
    gas_propellant_type:
      name: Tipo di propellente gassoso
      description: Specifica il tipo di propellente gassoso raccomandato o compatibile
        quando il blaster è alimentato a gas.
    gatta_tabla_tuning_block_material:
      name: Materiale Gatta (blocco di accordatura per tabla)
      description: Materiale dei blocchi di accordatura (gatta) utilizzati tra la
        cinghia di accordatura e il guscio.
    gauge_mounting_type:
      name: Tipo di montaggio dello strumento di misura
      description: Modalità di montaggio/installazione dell'indicatore del carburante
        sull'imbarcazione.
    gauge_style:
      name: Stile dello strumento di misura
      description: Specifica il tipo di manometro utilizzato dalla pompa, ad esempio
        un quadrante analogico, un display digitale o nessuno.
    gear_oil_api_classification:
      name: Classificazione API dell'olio per ingranaggi
      description: Classificazione API GL per oli per ingranaggi utilizzati in differenziali/trasmissioni
        manuali.
    gel_wax_density_grade:
      name: grado di densità della cera gel
      description: Indica il grado di densità della cera in gel, che influisce sulla
        trasparenza, sulla concentrazione di fragranza e sull'idoneità all'incorporazione.
    gel_wax_transparency_level:
      name: Livello di trasparenza della cera gel
      description: Descrive la trasparenza/opacità della cera in gel quando utilizzata
        secondo le istruzioni.
    gelatin_form:
      name: Forma gelatinosa
      description: Descrive in dettaglio la presentazione fisica della gelatina, in
        modo che gli utenti possano scegliere il formato corretto per le ricette e
        le applicazioni industriali.
    gelatin_or_gelling_agent_source:
      name: Fonte di gelatina o agente gelificante
      description: Indica l' Origin o il tipo di agente gelificante utilizzato nel
        prodotto, informazione importante per considerazioni dietetiche e religiose.
    gelatin_source:
      name: Fonte di gelatina
      description: Indica l' Origin animale, vegetale o sintetica della gelatina,
        in modo che l'acquirente possa verificarne la compatibilità con esigenze dietetiche,
        etiche o religiose.
    gelling_agent:
      name: Agente gelificante
      description: Identifica la sostanza principale utilizzata per addensare o dare
        consistenza al dessert, elemento importante per l'idoneità dietetica e la
        consistenza stessa.
    gemstone_clarity_grade:
      name: Grado di purezza della gemma
      description: Grado di purezza della gemma (quando classificata).
    gemstone_creation_method:
      name: Metodo di creazione delle pietre preziose
      description: Indica se la gemma è naturale, creata in laboratorio o un'imitazione/simulante.
    gemstone_cut_style:
      name: stile di taglio della gemma
      description: Descrive lo stile di taglio/finitura del campione di gemma.
    gemstone_treatment_status:
      name: stato di variazione della gemma
      description: Indica se e come la gemma è stata trattata/migliorata.
    geological_period:
      name: Periodo geologico
      description: Periodo geologico (ed eventualmente epoca) del fossile, se noto
        (ad esempio, Giurassico, Cretaceo, Eocene).
    gift_box_tin_insert_type:
      name: tipo di scatola regali/codice fiscale
      description: Configurazione inserto interno per organizzare/proteggere l'articolo
        all'interno della scatola/codice fiscale.
    gift_box_tin_sustainability_features:
      name: caratteristiche di sostenibilità della regali box/codice fiscale
      description: Caratteristiche di sostenibilità della regali box/codice fiscale
        imballaggio.
    gift_box_tin_window_type:
      name: Tipo di finestra della scatola/latta regalo
      description: Se il cofanetto regali ha una finestra espositiva e di che stile
        è.
    gift_message_option:
      name: opzione di messaggio ai clienti
      description: Specifica se è possibile includere un messaggio/nota di ringraziamento
        e in che modo (nessuno, incluso, personalizzabile).
    ginger_maturity:
      name: Maturazione dello zenzero
      description: Indica lo stadio di raccolta dello zenzero, ad esempio giovane
        o maturo, che influisce sull'intensità del sapore e sull'utilizzo culinario
        preferito.
    ginger_variety:
      name: Varietà di zenzero
      description: Specifica la cultivar, il tipo o il rizoma correlato all'interno
        della famiglia dello zenzero per differenziare i profili aromatici e gli usi
        culinari.
    glass_kiln_controller_type:
      name: Forno per vetro titolare del trattamento tipo
      description: Type of temperature/fired titolare del trattamento included with
        the kiln.
    glass_kiln_firing_application:
      name: Applicazione per la cottura del vetro in forno
      description: Applicazione(i) principale(i) di lavorazione del vetro per cui
        è progettato il forno.
    glass_stone_application_method:
      name: Metodo dell'app per pietra di vetro
      description: Specifica come le pietre di vetro devono essere fissate/applicate
        nei progetti (ad esempio, incollate, termoadesive, cucite).
    glass_tint:
      name: Tinta del vetro
      description: La colorazione del vetro/plastica utilizzata per la bottiglia serve
        a controllare l'esposizione alla luce (comune nella produzione di birra e
        vino).
    glaze_firing_atmosphere:
      name: Atmosfera di cottura dello smalto
      description: L'atmosfera o le atmosfere di cottura per cui è stato progettato
        lo smalto.
    glaze_opacity:
      name: Opacità dello smalto
      description: Trasparenza dello smalto dopo la cottura.
    glaze_product_form:
      name: Formato del prodotto glassa
      description: La forma fisica in cui viene fornito il prodotto per smalti (ad
        es. liquido, polvere secca, concentrato, spray).
    glider_avionics_package:
      name: Pacchetto avionico per aliante
      description: Indica il livello complessivo di strumentazione di navigazione
        e di volo installata nell'aliante.
    glider_certification_rating:
      name: Valutazione della certificazione per aliante
      description: Classe di certificazione ufficiale che indica il livello di sicurezza
        e prestazioni dell'aliante (ad esempio, EN-A, EN-B).
    glider_landing_gear_configuration:
      name: Configurazione del carrello di atterraggio dell'aliante
      description: Specifica la configurazione del carrello di atterraggio utilizzata
        dall'aliante.
    glider_launch_method:
      name: Metodo di lancio dell'aliante
      description: Specifica come viene tipicamente lanciato o autolanciato l'aliante.
    glider_performance_class:
      name: Classe di prestazioni per aliante
      description: Classe o categoria agonistica/prestazionale comunemente utilizzata
        per gli alianti.
    glitter_application_method:
      name: Metodo di applicazione del glitter
      description: Indica la tecnica prevista per l'applicazione o l'utilizzo dei
        glitter artigianali (ad es. spargere/utilizzare uno shaker, mescolare, strofinare,
        applicare su adesivo, stendere con un pennello, spruzzare, fissare a caldo/goffrare).
    glitter_eco_friendly_claim:
      name: Dichiarazione ecologica sul glitter
      description: Affermazioni ambientali/eco specifiche per le formulazioni di glitter
        sfuso.
    glitter_effect_type:
      name: Tipo di effetto glitter
      description: Descrive l'effetto visivo dei glitter/paillettes oltre il colore
        di base (ad esempio, olografico, iridescente).
    glitter_glue_base_solvent_type:
      name: Base di colla glitterata/tipo solvente
      description: Descrive la base principale della colla glitterata (una preoccupazione
        comune dell'acquirente per la pulizia e la compatibilità dei materiali).
    glitter_opacity_coverage:
      name: Opacità/copertura dei glitter
      description: Indica il grado di opacità dell'effetto glitter una volta applicato.
    glitter_use_suitability:
      name: Idoneità all'uso dei glitter
      description: Indica il principale contesto d'uso previsto o approvato per la
        polvere glitterata (ad esempio, solo per uso artigianale, per uso cosmetico/sicuro
        per il corpo o per uso alimentare).
    glove_armor_placement:
      name: Posizionamento dell'armatura del guanto
      description: Identifica la posizione della protezione balistica sul guanto.
    glove_cuff_length:
      name: Lunghezza del polsino del guanto
      description: Indica la copertura, lunghezza e stile del polsino/guanto da da
        corsa a livello del polso/avambraccio.
    glove_finger_coverage:
      name: Copertura delle dita del guanto
      description: Descrive il livello di copertura delle dita offerto dal guanto,
        che varia dai modelli a dita intere a quelli senza dita.
    glove_finger_design:
      name: Design delle dita del guanto
      description: Specifica la configurazione delle dita del guanto, ad esempio a
        cinque dita o a muffola.
    glove_fit_profile:
      name: Profilo di vestibilità del guanto
      description: Descrive le fome interne e la silhouette generale del guanto, in
        modo che i giocatori possano scegliere la sensazione che preferiscono.
    glove_insulation:
      name: Isolamento dei guanti
      description: Specifica la struttura isolante/termica o il sistema di riscaldamento
        del guanto (ad esempio, livello di isolamento, tecnologia di rivestimento/isolamento
        o tipo di riscaldamento).
    glove_palm_material:
      name: Materiale del palmo del guanto
      description: Specifica il materiale principale utilizzato sul palmo del guanto
        (la principale superficie di contatto/presa), che può essere diverso da quello
        del dorso.
    glove_size:
      name: Taglia dei guanti
      description: Indica la taglia generale della mano per cui sono progettati i
        guanti da sacco, spesso espressa con i codici delle taglie dell'abbigliamento
        o con le taglie per bambini.
    glove_webbing_style:
      name: Stile della rete del guanto
      description: Definisce il design della rete o della tasca del guanto, che influisce
        sul controllo della palla, sull'idoneità al ruolo e sulle preferenze del giocatore.
    glow_effect:
      name: Effetto luminoso
      description: Indica se le sfere di gel sono dotate di proprietà fosforescenti
        o traccianti per il gioco in condizioni di scarsa illuminazione.
    glow_plug_connector_type:
      name: Tipo di connettore per candeletta di preriscaldamento
      description: Terminale/connettore elettrico sulla candeletta di preriscaldamento
        utilizzato per il collegamento al cablaggio del veicolo.
    glow_plug_heating_element_type:
      name: Tipo di elemento riscaldante della candeletta di preriscaldamento
      description: Tipo/tecnologia dell'elemento riscaldante utilizzato dalla candeletta.
    glue_application_format:
      name: Modalità di applicazione della colla
      description: Specifica la modalità di applicazione/erogazione utilizzata per
        applicare la colla scolastica.
    glue_applicator_type:
      name: Tipo di applicatore di colla
      description: Specifica il tipo di applicatore/punta di erogazione integrata
        utilizzato per applicare la colla liquida.
    glue_base_formulation:
      name: Formulazione a base di colla
      description: Identifica la formulazione chimica/di base principale della colla
        liquida per lavori artigianali (ai fini di prestazioni, sicurezza e pulizia).
    glue_gun_nozzle_style:
      name: Ugello per pistola per colla a caldo
      description: Specifica lo stile fisico della punta dell'ugello di una pistola
        per colla a caldo, che influisce sulla precisione dell'applicazione e sulla
        copertura della colla.
    glue_safety_standard:
      name: Standard di sicurezza per la colla
      description: Indica se la colla è atossica / adatta ai bambini secondo l'etichettatura
        e le norme vigenti.
    goal_frame_material:
      name: Materiale del telaio della porta
      description: Identifica il materiale dei pali/telaio della porta, che influisce
        sul peso, sulla trasportabilità e sulla resistenza agli agenti atmosferici.
    goal_size:
      name: Misura della porta
      description: Classifica le porte da calcio in base alle dimensioni standard
        o a quelle da allenamento, consentendo una selezione più rapida rispetto al
        solo utilizzo delle misure grezze.
    goal_size_classification:
      name: Classificazione della dimensione del goal
      description: Indica la classe di dimensioni standardizzata della porta (ad es.
        regolamentare, giovanile, mini) in modo che gli utenti possano selezionare
        rapidamente l'attrezzatura appropriata al loro livello di gioco.
    goal_size_standard:
      name: Standard relativi alle dimensioni della porta
      description: Indica a quale standard ufficiale o di fascia d'età corrisponde
        la porta (ad esempio, regolamento World Aquatics, 12U).
    goalie_configuration:
      name: Configurazione del portiere
      description: Indica il numero di portieri per squadra configurati sul tavolo
        (stile americano a 3 portieri rispetto allo stile europeo a 1 portiere).
    goalie_playing_surface:
      name: Superficie di gioco del portiere
      description: Specifica la superficie di gioco o il contesto principale per cui
        è progettato il kit di attrezzatura da portiere di hockey.
    goalkeeper_glove_cut:
      name: Taglio del guanto da portiere
      description: Indica lo stile di costruzione del palmo/delle dita (taglio) dei
        guanti da portiere, che influenza la vestibilità, la sensibilità al pallone
        e il controllo.
    goalkeeper_training_aid_type:
      name: Tipo di ausilio per l'allenamento del portiere
      description: Identifica lo stile dell'ausilio per l'allenamento dei portieri,
        consentendo un filtraggio preciso.
    goblet_drum_playing_style:
      name: Stile di esecuzione del tamburo a calice
      description: se lo strumento è progettato principalmente per essere suonato
        a mano o con bacchette/mazzuole.
    gobo_format:
      name: Formato del gobo
      description: Specifica le dimensioni/lo standard del gobo accettato dal proiettore
        (diametro e famiglia di spessore), garantendo la compatibilità con gobo di
        ricambio/personalizzati.
    gobo_root_variety:
      name: Varietà di radice del gobo
      description: Indica il cultivar o la varietà specifica della radice del gobo
        (bardana).
    gobo_rotation:
      name: Rotazione del gobo
      description: Specifica se il gobo può ruotare e quali direzioni sono supportate.
    goggle_accessory_type:
      name: Tipo di accessorio per occhiali protettivi
      description: Classifica il tipo di accessorio (es. cover, custodia, tracolla)
        in modo che l'acquirente possa filtrare la variegata gamma di prodotti all'interno
        di questa categoria generale.
    goggle_features:
      name: Caratteristiche degli occhialini
      description: Elenca le caratteristiche funzionali o di design speciali offerte
        dagli occhialini
    goggle_fit_design:
      name: Design di vestibilità della maschera
      description: Descrive come le maschere devono essere indossate, inclusa la compatibilità
        con gli occhiali da vista (OTG).
    goggle_gasket_material:
      name: Materiale della guarnizione della maschera
      description: Il materiale della guarnizione a contatto con il viso, che influisce
        sul comfort, sui rischi di allergia e sulla prevenzione delle perdite.
    goggle_integration:
      name: Integrazione con la maschera
      description: Se il casco è progettato per essere utilizzato con la maschera
        e/o include caratteristiche integrate per la ritenzione della maschera.
    goggle_lens_shape:
      name: Forma delle lenti della maschera
      description: Definisce il profilo di curvatura della lente di ricambio, influenzando
        la distorsione e il campo visivo (ad esempio, cilindrica, sferica, torica).
    goggle_lens_tint:
      name: Tinta delle lenti della maschera
      description: Definisce la tinta o la finitura della lente, che influisce sulla
        trasmissione della luce, sulla percezione del colore e sull'aspetto estetico.
    goggle_strap_material:
      name: Materiale del cinturino della maschera
      description: Il materiale principale utilizzato per la fascia per la testa che
        influisce sulla durata e sul comfort.
    golf_accessory_set_purpose:
      name: Scopo del set di accessori da golf
      description: Identifica l'uso principale previsto o il tema del set di accessori
        da golf.
    golf_bag_style:
      name: Stile della sacca da golf
      description: Indica il design principale o lo stile di utilizzo della sacca
        da golf (ad es. da appoggio, da carrello, da staff).
    golf_ball_alignment_design:
      name: Progettazione dell'allineamento delle palline da golf
      description: Specifica qualsiasi ausilio visivo per l'allineamento integrato,
        stampato o modellato sulla superficie della pallina.
    golf_ball_construction:
      name: Costruzione della pallina da golf
      description: Specifica il numero di strati/pezzi utilizzati nella costruzione
        della pallina da golf, che influisce su spin, sensazione e distanza.
    golf_ball_cover_material:
      name: Materiale di copertura per palline da golf
      description: Identifica il materiale del rivestimento esterno della pallina
        da golf, che influisce su spin, durata e sensazione al tatto.
    golf_cart_cover_climate_use:
      name: Copertura per carrello da golf clima utilizzo
      description: Indica le principali condizioni climatiche/stagionali per cui la
        copertura di protezione è progettata.
    golf_cart_enclosure_fit_type:
      name: Tipo di copertura per carrello da golf
      description: Specifica se la cabina è progettata per un numero/formato di posti
        a sedere specifico oppure se offre una soluzione universale/regolabile.
    golf_cart_intended_use:
      name: Uso previsto del carrello da golf
      description: 'Uso principale previsto: il carrello da golf è progettato o configurato
        per questo scopo.'
    golf_club_number:
      name: numero del golf club
      description: Identifica il numero specifico o la designazione del wedge stampata
        sulla mazza (ad esempio, 5, PW, GW).
    golf_club_part_type:
      name: Tipo di parte della mazza da golf
      description: Classifica gli accessori o i componenti delle mazze da golf in
        sottotipi comuni (ad esempio, manicotto adattatore, ghiera, peso).
    golf_grip_size:
      name: Impugnatura da golf girevole
      description: Specifica la categoria di dimensioni esterne complessive dell'impugnatura
        da golf, indicando quanto spessa risulta al tatto.
    golf_shoe_spike_type:
      name: tipo di scarpa da golf con tacchetti
      description: Identifica il tipo di sistema di trazione utilizzato sulla suola
        delle scarpe da golf (ad esempio, con tacchetti o senza tacchetti).
    golf_tee_style:
      name: Stile del tee da golf
      description: Descrive lo stile/design strutturale o funzionale del tee da golf,
        che influisce sull'altezza della palla, sulla durata o sulla riduzione dello
        spin.
    golf_training_focus:
      name: Focus sull'allenamento di golf
      description: Classifica l' skill o l'aspetto principale che il prodotto intende
        migliorare.
    golf_training_objective:
      name: Obiettivo dell'allenamento di golf
      description: Identifica la competenza golfistica o l'aspetto principale che
        l'ausilio per l'allenamento è progettato a migliorare.
    gong_profile_type:
      name: Tipo di profilo del gong
      description: Descrive il profilo fisico del gong dell'opera (ad esempio, centro
        piatto o rialzato), che influenza notevolmente il suono e lo stile di esecuzione.
    grading_scale:
      name: Scala di valutazione
      description: La scala di valutazione utilizzata per le monete d'oro da investimento
        classificate (ad esempio, Sheldon 1–70).
    grading_service:
      name: Servizio di valutazione
      description: Servizio di classificazione/certificazione di terze parti per la
        moneta o la banconota (ad esempio, PCGS, NGC).
    graduation_increment:
      name: Incremento di laurea
      description: Specifica la divisione più piccola stampata/incisa sulla scala
        del calibro di cucitura (la risoluzione delle marcature).
    grain_processing_method:
      name: Metodo di lavorazione dei cereali
      description: Identifica il metodo di lavorazione principale applicato al cereale
        (ad esempio, parboiled, laminato, germogliato), che influisce sul tempo di
        cottura, sulla consistenza e sul valore nutrizionale.
    grand_piano_soundboard_material:
      name: Materiale della tavola armonica del pianoforte a coda
      description: Materiale principale utilizzato per la tavola armonica del pianoforte
        (la tavola di risonanza), per la qualità Impact e la durata.
    grappling_dummy_pose:
      name: Posizione del manichino da grappling
      description: Descrive la posizione/postura predefinita del manichino, determinando
        quali esercizi e tecniche può facilitare.
    grease_application:
      name: App Grease
      description: Specifica il componente principale del veicolo o l'uso specifico
        per cui è destinato il grasso.
    grease_consistency_grade_nlgi:
      name: Grado di consistenza del grasso (NLGI)
      description: Specifica il numero di consistenza NLGI che indica la fermezza
        del grasso (ad esempio, NLGI 2 è un grasso multiuso comune).
    grease_thickener_type:
      name: Tipo di addensante per grasso
      description: Identifica il sistema addensante/sapone utilizzato nella formulazione
        del grasso.
    great_highland_bagpipes_blowpipe_valve_type:
      name: tipo di valvola per cannello della cornamusa scozzese Great Highland
      description: Specifica il sistema di valvole di non ritorno utilizzato nel tubo
        di soffiaggio.
    great_highland_bagpipes_drone_configuration:
      name: Configurazione del bordone della cornamusa scozzese
      description: Specifica i tipi di droni inclusi nel set.
    great_highland_bagpipes_mounting_material:
      name: materiale di montaggio per cornamuse scozzesi
      description: Specifica il materiale delle montature decorative della cornamusa
        (ad esempio, nichel argento, avorio sintetico).
    greens_maturity_stage:
      name: stadio di maturità verde
      description: Indica lo stadio di sviluppo del cavolo al momento della raccolta.
    greens_preparation_state:
      name: stato di preparazione verde
      description: Descrive come le verdure a foglia verde vengono lavorate o confezionate
        (ad esempio, prelavate, tritate, pronte al consumo).
    grenade_effect_type:
      name: Tipo di effetto granata
      description: Indica l'effetto funzionale primario prodotto dalla granata da
        paintball una volta attivata (ad esempio, fumo, vernice, granata stordente).
    grid_unit:
      name: Unità Grid
      description: Il sistema di misurazione principale stampato sul tappetino (se
        è presente una Grid/scala).
    grille_emblem_provision:
      name: fornitura dell'emblema della griglia
      description: Specifica se la griglia accessoria è un emblema/badge OEM e in
        che modo.
    grille_mounting_method:
      name: Metodo di montaggio della griglia
      description: Specifica come la griglia si installa sul veicolo (ad esempio,
        sostituzione diretta o inserimento/sovrapposizione; fissaggio con bulloni
        o a clip/a scatto; foratura necessaria o non necessaria).
    grille_style:
      name: Stile della griglia
      description: Specifica lo stile visivo/di design della griglia del veicolo.
    grip_chalk_form:
      name: Forma di gesso per impugnare
      description: Identifica la forma fisica del gesso. Supply o utilizzo con la
        sacca.
    grip_coverage:
      name: Coperture di presa
      description: Identifica la presenza e la posizione di elementi di presa in silicone
        o gomma sulla calza.
    grip_design:
      name: Design dell'impugnatura
      description: Specifica la configurazione della handle o dei fori della piastra
        per facilitarne il trasporto e aumentarne la versatilità durante gli esercizi.
    grip_enhancer_effect:
      name: Effetto di miglioramento della presa
      description: Descrive la principale caratteristica prestazionale offerta dal
        prodotto (ad esempio, assorbimento dell'umidità o finitura in resina appiccicosa).
    grip_enhancer_form:
      name: Formato del potenziatore dell'aderenza
      description: Identifica la forma fisica o il formato del prodotto per migliorare
        la presa, in modo che gli atleti possano selezionare il metodo di applicazione
        appropriato.
    grip_features:
      name: Caratteristiche dell'impugnatura
      description: Indica la presenza di impugnature/handle integrate, progettate
        per migliorare la presa, il comfort o il controllo durante il gioco.
    grip_material:
      name: Materiale fissato
      description: Identifica il materiale utilizzato per la superficie antiscivolo
        dei pantaloni.
    grip_shape:
      name: Shapesdell'impugnatura
      description: Descrive la Shapes trasversale, la forma o lo stile dell'impugnatura,
        particolarmente rilevante per le impugnature dei putter.
    grip_surface_type:
      name: Tipo di superficie dell'impugnatura
      description: Descrive il disegno della superficie di battistrada/trazione del
        pedale che influisce sull'aderenza e sulla sensibilità.
    grip_tackiness_level:
      name: Livello di aderenza
      description: Valuta quanto la superficie di presa sia appiccicosa o ruvida,
        aiutando i giocatori a scegliere tra una sensazione asciutta e un controllo
        estremamente appiccicoso.
    grip_tape_form:
      name: Formato del nastro per l'impugnatura
      description: Indica la forma di consegna del prodotto grip tape (es. foglio,
        rotolo, kit spray).
    grip_wax_form:
      name: Forma in cera per impugnature
      description: Classifica la forma fisica in cui viene venduta la cera per impugnature.
    gripper_coverage:
      name: Copertura del gripper
      description: Specifica il tipo di aderenza sulla scarpa antiscivolo, indicando
        la superficie di copertura e la possibilità di rimozione.
    grommet_application_material:
      name: Materiale per l'applicazione dell'occhiello
      description: Materiale(i) principale(i) su cui sono destinati ad essere installati
        gli occhielli (ad esempio, tessuto, pelle, vinile, telone/tela).
    grommet_duty_rating:
      name: Valutazione Grommet dazi
      description: Indica la classe di resistenza/utilizzo prevista per l'occhiello.
    grommet_style:
      name: Stile occhiello
      description: Stile costruttivo del set di occhielli (come viene assemblato/utilizzato).
    grooming_glove_texture_type:
      name: Tipo di consistenza del guanto per la cura della persona
      description: Identifica la texture superficiale principale utilizzata per la
        cura, indicando lo scopo previsto, come strofinare, lucidare o lavare.
    groove_orientation:
      name: Orientamento della scanalatura
      description: Descrive la direzione/layout delle scanalature o delle creste sullo
        strumento.
    groove_sampler_onboard_effects:
      name: campionatore Groove con effetti integrati
      description: Indica le categorie di effetti integrati disponibili sul campionatore
        groove (insert/master), come riverbero, delay, compressione, distorsione,
        equalizzazione e filtraggio.
    groove_sampler_storage_expansion_type:
      name: Tipo di espansione di archiviazione per campionatore a scanalature
      description: Specifica le opzioni di archiviazione rimovibili/espandibili supportate
        dal campionatore a scanalature.
    ground_attachment_method:
      name: Metodo di fissaggio a terra
      description: Descrive come l'arco di passaggio viene fissato alla superficie
        di gioco, influenzando la stabilità e la compatibilità con la superficie stessa.
    groupset_components_included:
      name: Componenti del groupset inclusi
      description: Elenca i componenti specifici della trasmissione inclusi nel gruppo
        in modo che i clienti comprendano il contenuto del pacchetto.
    gt_racing_class:
      name: classe di corse GT
      description: Specifica la categoria/classe GT per cui l'auto è stata costruita
        o omologata.
    guard_construction_type:
      name: Tipo di costruzione della protezione
      description: Sia che la protezione sia un guscio rigido, un inserto in armatura
        morbida o un design a manica/cinghia.
    guard_size_measurement_basis:
      name: Base di misurazione della taglia della guardia
      description: Quale misura è utilizzata per determinare la taglia (ad esempio,
        circonferenza del gomito, circonferenza del polso, circonferenza dell'avambraccio).
    guard_style:
      name: Stile di guardia
      description: Classifica la struttura o il tipo di protezione per lame da pattinaggio
        per aiutare gli acquirenti a distinguere rapidamente tra protezioni rigide
        per la camminata, protezioni morbide, protezioni a molla e altri modelli.
    guava_flesh_color:
      name: Colore della polpa di guava
      description: Indica il colore della polpa interna del frutto di guava.
    guava_variety:
      name: Varietà di guava
      description: Identifica la specifica cultivar o varietà commerciale di guava
        venduta (ad esempio, guava mela, crema messicana, tailandese, rosa, senza
        semi, bianca).
    guide_material:
      name: Materiale della guida
      description: Materiale utilizzato per gli anelli o gli inserti della canna da
        pesca.
    guide_type:
      name: Tipo di anelli
      description: Specifica il tipo di anelli installati su una canna da pesca, ad
        esempio a piede singolo, a rullo o a serpente.
    guideline_markings:
      name: Segnaletica di riferimento
      description: Tipo di marcature di allineamento visivo stampate o intarsiate
        sulla superficie del tappetino di lancio per facilitare gli esercizi di lancio.
    guiro_scraper_material:
      name: Materiale del raschietto per guiro
      description: Materiale del raschietto/della bacchetta incluso o consigliato
        per l'uso con il guiro.
    guiro_surface_style:
      name: Tipo di superficie del guiro
      description: Descrive il disegno o la geometria della superficie dello strumento
        che viene sfregata per produrre il suono.
    guitar_body_finish_type:
      name: Tipo di finitura del corpo della chitarra
      description: Specifica la finitura utilizzata per il corpo della chitarra.
    guitar_bridge_system_type:
      name: Tipo di sistema di ponte per chitarra
      description: Famiglia di design per sistemi Bridge/cordiera per compatibilità
        e consultazione.
    guitar_case_style:
      name: Tipo di cassa della chitarra
      description: Specifica il tipo di protezione e la struttura generale della custodia
        o della borsa da trasporto della chitarra.
    guitar_humidifier_placement:
      name: Posizionamento dell'umidificatore per chitarra
      description: Specifica dove utilizzare/posizionare l'umidificatore rispetto
        allo strumento o al contesto.
    guitar_pedal_i_o_configuration:
      name: Configurazione I/O del pedale per chitarra
      description: Indica se l'assistenza al pedale prevede un routing di ingresso/uscita
        mono o stereo.
    guitar_pedal_output_connector_type:
      name: Tipo di connettore di uscita del pedale per chitarra
      description: Specifica il tipo di connettore di uscita audio utilizzato dal
        pedale.
    guitar_slide_finish:
      name: Finitura dello slide per chitarra
      description: Finitura superficiale dello slide che influisce sulla sensazione
        al tatto e sull'attrito con le corde.
    guitar_slide_style:
      name: Stile dello slide per chitarra
      description: Specifica il fattore di forma dello slide o della steel bar della
        chitarra e come si indossa/utilizza.
    guitar_stand_type:
      name: Tipo di supporto per chitarra
      description: Specifica il fattore di forma primario del supporto per chitarra
        (come aiuta a supportare/riporre la chitarra).
    guitar_strap_attachment_type:
      name: Tipo di attacco per tracolla per chitarra
      description: Specifica in che modo la tracolla si aggancia alla chitarra (o
        ai bottoni di fissaggio), indicando se utilizza terminali tradizionali o sistemi
        a sgancio rapido.
    guitar_strap_end_material:
      name: Materiale per le estremità della tracolla della chitarra
      description: Materiale utilizzato alle estremità della tracolla (le parti che
        si agganciano ai bottoni o ai sistemi di fissaggio).
    guitar_strap_features:
      name: Caratteristiche della tracolla per chitarra
      description: Caratteristiche funzionali significative della tracolla per chitarra
        oltre le informazioni di base su dimensioni/materiale (selezione multipla).
    guitar_string_coating:
      name: Rivestimento per le corde della chitarra
      description: Indica se le corde hanno un rivestimento protettivo e, se applicabile,
        il tipo di rivestimento.
    guitar_string_gauge_type:
      name: Tipo di calibro delle corde della chitarra
      description: La categoria di calibro indicata in commercio per un set di corde
        per chitarra acustica (ad esempio, extra light, light, medium). Spesso indicata
        in modo approssimativo dallo spessore della corda del Mi cantino; gli intervalli
        esatti di calibro possono variare a seconda del produttore.
    guitar_string_set_gauge_category:
      name: Categoria di calibro dei set di corde per chitarra
      description: Famiglie di calibri comunemente utilizzate nel commercio per i
        set di corde per chitarra (in genere determinate in base alla corda del Mi
        cantino / 1ª corda).
    guitar_string_winding_type:
      name: Tipo di avvolgimento delle corde per chitarra
      description: Specifica lo stile di avvolgimento esterno delle corde avvolte
        presenti nel set.
    guitar_tuning_peg_button_shape:
      name: Forma del bottone della meccanica della chitarra
      description: La forma o lo stile della bottone/chiavetta della meccanica.
    guitar_tuning_peg_configuration:
      name: Configurazione della meccanica della chitarra
      description: La configurazione della meccanica per la paletta.
    guitar_tuning_peg_mounting_style:
      name: Stile di montaggio della meccanica della chitarra
      description: Come si monta una meccanica di accordatura sulla paletta (tipo
        di boccola e metodo antirotazione).
    guitar_tuning_peg_shaft_type:
      name: Tipo di perno della meccanica della chitarra
      description: Se il perno delle corde è pieno o diviso e come è fissata la corda.
    guitar_tuning_peg_style:
      name: Stile della meccanica della chitarra
      description: Il tipo di meccanismo/pirolo di accordatura fisico e il formato
        di montaggio utilizzato sulla paletta di uno strumento (ad esempio, ingranaggi
        sigillati o aperti, bloccanti, a perno diviso).
    gum_condition:
      name: Condizione della gomma
      description: Condizioni/stato della gomma del francobollo sul retro (ad esempio,
        gomma originale, gomma integra, senza gomma).
    gun_action_type:
      name: Tipo di azione dell'arma
      description: Tipo di meccanismo di funzionamento utilizzato per caricare/sparare
        (ad esempio, a otturatore girevole-scorrevole, a leva).
    gun_operational_status:
      name: Stato operativo dell'arma
      description: Indica se l'arma da collezione è disattivata/non funzionante (e
        come viene presentata).
    gun_type:
      name: Tipo di arma
      description: Identifica la forma generale dell'arma da fuoco antica.
    gusset_material:
      name: Materiale del rinforzo angolare
      description: Specifica il materiale utilizzato nella fodera del cavallo/tassello,
        che influisce su traspirabilità, igiene e comfort.
    gymnastics_discipline:
      name: Disciplina ginnica
      description: Specifica la branca della ginnastica per cui è destinato il prodotto
        (ad esempio, artistica, ritmica, acrobatica).
    hair_extension_texture:
      name: Texture delle extension per capelli
      description: Descrive il tipo di riccio, onda o trama delle ciocche di extension.
    hair_net_style:
      name: Tipo di retina per capelli
      description: Identifica il design o lo stile di costruzione della retina per
        capelli (ad esempio, bouffant, snood, copri-chignon).
    hair_quality_grade:
      name: Grado di qualità dei capelli
      description: Indica le denominazioni di qualità/origine relative al capello.
    halter_style:
      name: Stile all'americana
      description: Identifica lo stile funzionale o di design della cavezza (ad esempio,
        in corda, con sgancio di sicurezza, da esposizione), aiutando gli acquirenti
        a scegliere una cavezza adatta all'uso previsto.
    hammock_style:
      name: Stile dell'amaca
      description: Descrive lo stile strutturale o la costruzione dell'amaca.
    hand_and_foot_coverage:
      name: Copertura per mani e piedi
      description: Descrive guanti e calzari integrati o staccabili che coprono mani
        e/o piedi.
    hand_cymbal_set_configuration:
      name: Configurazione del set di piatti a mano
      description: Indica se il prodotto viene venduto come set di due piatti, come
        singolo piatto o in un set più ampio.
    hand_drum_head_material:
      name: Materiale della pelle dei tamburi a mano
      description: Materiale della membrana (pelle) utilizzata sul tamburo a calice.
    hand_exerciser_style:
      name: Tipo di rinforzatore per le mani
      description: Classifica lo stile o il meccanismo generale dell'attrezzo rinforzatore
        per le mani
    hand_guard_backbone_material:
      name: Materiale della struttura portante del paramano
      description: Materiale della struttura portante (se presente), che ne determina
        la resistenza e la capacità protettiva.
    hand_guard_coverage_style:
      name: Tipo di copertura del paramano
      description: Descrive la copertura/il profilo del paramano, che influisce sulla
        protezione dal vento/dall'impatto.
    hand_guard_mounting_type:
      name: Tipo di fissaggio del paramano
      description: Specifica come i paramani si fissano alla motocicletta (ad esempio,
        all'estremità del manubrio con morsetto interno o solo con morsetto).
    hand_guard_set_configuration:
      name: Configurazione del set di protezioni per le mani
      description: Se il prodotto è venduto come coppia sinistra/destra o come paramano
        singolo.
    hand_guard_style:
      name: Tipo di paramano
      description: Descrive il tipo o lo stile di copertura della protezione (ad esempio,
        Chiusa, Aperta, Completa, Leggera, Standard).
    hand_guard_weather_protection:
      name: Protezione del paramano dagli agenti atmosferici
      description: Indica il livello di protezione dagli agenti atmosferici previsto
        per i paramani.
    hand_paddle_strap_type:
      name: Tipo di cinturino per paletta
      description: Specifica il tipo di cinturino, o l'assenza dello stesso, utilizzato
        per fissare la paletta alla mano dell'utente.
    hand_percussion_mount_attachment_mechanism:
      name: Meccanismo di fissaggio per percussione manuale
      description: Indica in che modo il supporto si fissa a una staffa, a uno stand
        multiplo o ad altro componente (ad esempio, supporto a morsetto o supporto
        su asta).
    hand_percussion_mounting_handling:
      name: Montaggio/uso degli strumenti a percussione a mano
      description: Se, durante il normale utilizzo, lo strumento viene tenuto in mano,
        indossato, montato su un supporto o appoggiato su un tavolo o sul pavimento.
    hand_percussion_pitch_type:
      name: Tipo di intonazione delle percussioni a mano
      description: Indica se lo strumento produce un'intonazione definita (accordabile/note)
        o un'intonazione indefinita.
    hand_percussion_playing_method:
      name: Metodo di esecuzione delle percussioni a mano
      description: Il modo in cui lo strumento viene tipicamente suonato per produrre
        il suono (ad esempio, scosso o raschiato).
    hand_percussion_set_configuration:
      name: Configurazione del set di percussioni a mano
      description: Sia che il prodotto sia uno strumento singolo, un set abbinato
        o un insieme di più pezzi.
    hand_percussion_size_class:
      name: Percussioni a mano classe ta
      description: Categoria generale di taglia dello strumento quando non è disponibile
        una misurazione precisa o per facilitare il filtraggio.
    hand_sewing_needle_point_type:
      name: ago da cucito a mano
      description: Shapes/stili della punta dell'ago da cucito a mano utilizzata per
        penetrare diversi materiali (ad esempio, tessuti a trama, maglieria, pelle)
        o filati.
    hand_support_level:
      name: Livello di supporto per la mano
      description: Specifica il grado di assistenza o compressione fornito dal guanto,
        dalla fascia o dalla cinghia.
    hand_support_size:
      name: Taglia del supporto per la mano
      description: Taglia dichiarata dal produttore per guanto, cinturino o fascia
        (XS-XXL o taglia unica).
    handball_ball_type:
      name: Tipo di pallone da handball
      description: Indica la categoria di utilizzo prevista per la pallamano, come
        partita, allenamento o beach volley.
    handball_playing_surface:
      name: campo da gioco per pallamano
      description: Indica la/le superficie/i di gioco per cui la pallamano è ottimizzata.
    handball_target_type:
      name: Tipo di bersaglio della pallamano
      description: Specifica lo stile o il design del bersaglio di tiro destinato
        agli allenamenti di pallamano di squadra.
    handbrake_actuation_type:
      name: Tipo di azionamento del freno a mano
      description: Specifica le modalità di azionamento del freno di stazionamento.
    handbrake_orientation:
      name: Orientamento del freno a mano
      description: Specifica se il freno a mano è progettato per veicoli con guida
        a sinistra o a destra, oppure se è universale.
    handgun_grip_material:
      name: materiale dell'impugnatura della pistola
      description: Materiale principale delle impugnature/pannelli della pistola.
    handle_configuration:
      name: Configurazione del handle
      description: Descrive lo stile strutturale del handle della tavola da wakeboard
        (ad esempio, singolo, doppio, a V profonda, a T) in modo che l'acquirente
        possa scegliere quello più adatto al proprio livello di abilità, ai trick
        o al tipo di tavola.
    handle_ergonomics:
      name: ergonomia della maniglia
      description: Descrive le caratteristiche ergonomiche handle , pensate per migliorare
        il comfort e il controllo.
    handle_grip_material:
      name: Materiale dell'impugnatura del handle
      description: Specifica il materiale utilizzato sulla superficie di presa del
        handle , che influisce sul comfort e sulla presa, soprattutto in condizioni
        di bagnato.
    handle_grip_type:
      name: Tipo di impugnatura del handle
      description: Specifica il rivestimento/materiale o lo stile della superficie
        handle , progettato per migliorare il comfort e il controllo.
    handle_shape:
      name: maniglie Shapes
      description: Shapes della sezione trasversale o profilo handle.
    handlebar_design:
      name: Design del manubrio
      description: Specifica il tipo di manubrio presente sullo stepper, ad esempio
        assente, fisso, regolabile in altezza, pieghevole o con elastico di resistenza.
    handlebar_type:
      name: Tipo di manubrio
      description: Identifica lo stile del manubrio montato sulla bicicletta, Influence
        la postura di guida, il controllo e il comfort.
    handslide_bore_type:
      name: Tipo di foro scorrevole
      description: Specifica se il trombone basso utilizza una coulisse a foro singolo
        o a doppio foro.
    handwear_cuff_style:
      name: Bracciale da polso stile
      description: Descrive lo stile di costruzione del polsino o del manicotto di
        guanti o muffole, che influisce sulla copertura e sulla vestibilità.
    handwear_insulation_material:
      name: Materiale isolante per guanti
      description: Identifica il materiale isolante o di rivestimento utilizzato all'interno
        di guanti o muffole.
    handwear_size:
      name: Taglia della guanteria
      description: Specifica la taglia dei guanti o di altri indumenti per le mani
        per garantire una vestibilità adeguata.
    hang_glider_design:
      name: design deltaplano
      description: Classifica lo stile strutturale dell'aliante (ad esempio, ala flessibile,
        ala rigida, a motore).
    hanger_thread_size:
      name: Taglia thread dell'appendiabiti
      description: Indica la taglia/standard thread della vite utilizzata per montare
        il gancio su picchetti o avvisatori acustici, garantendo la compatibilità.
    hanging_suspension_method:
      name: Metodo di sospensione
      description: Definisce l' hardware o il sistema principale utilizzato per sospendere
        l'altalena (ad esempio, corda, catena, Frame di supporto).
    hardtop_finish_type:
      name: Finitura tipo Hardtop
      description: Specifica lo stato di finitura esterna del tettuccio rigido (ad
        esempio, primerizzato o verniciato), che Impact sulla predisposizione all'installazione
        e sull'aspetto.
    hardtop_shell_material:
      name: Materiale della scocca rigida
      description: Specifica il materiale principale del guscio rigido del tetto rigido
        di un veicolo (non un eventuale tessuto di rivestimento), come ad esempio
        fibra di vetro o alluminio.
    hardtop_window_configuration:
      name: Configurazione dei finestrini del tetto rigido
      description: Descrive quali finestre sono incluse con l'hardtop e la loro configurazione.
    harmonica_comb_material:
      name: Materiale del pettine dell'armonica
      description: Materiale utilizzato per il pettine dell'armonica (corpo della
        camera d'aria).
    harmonica_cover_plate_finish:
      name: finitura della piastra di copertura dell'armonica
      description: Specifica la finitura o il rivestimento delle placche di copertura
        dell'armonica.
    harmonica_cover_plate_material:
      name: Materiale della piastra di copertura dell'armonica
      description: Materiale utilizzato per le piastre di copertura esterne.
    harmonica_finish:
      name: Finitura dell'armonica
      description: Finitura superficiale delle placche di copertura/corpo dell'armonica.
    harmonica_included_accessories:
      name: Accessori inclusi per l'armonica
      description: Indica quali accessori sono inclusi con l'armonica.
    harmonica_note_range:
      name: Gamma di note dell'armonica
      description: Classificazione della gamma strumentale utilizzata in Context orchestrale
        (ad esempio, basso, baritono, tenore).
    harmonica_reed_plate_material:
      name: materiale per la piastra dell'ancia dell'armonica
      description: Materiali utilizzati per le lamelle delle ance (ad esempio, ottone,
        acciaio inossidabile, alluminio).
    harmonica_system_type:
      name: Sistema/tipo di armonica a bocca
      description: Identifica il sistema o il formato dell'armonica orchestrale (ad
        esempio, Chord, basso, baritono, polifonia).
    harmonica_tuning_system:
      name: Sistema di accordatura dell'armonica
      description: Specifica il sistema di layoututilizzato dall'armonica (ad esempio,
        accordatura Richter, Solo, Orchestra).
    harness_shell_type:
      name: tipo di guscio per imbracatura
      description: Descrive la rigidità della struttura esterna dell'imbracatura (ad
        esempio, Softshell, Hardshell, Hybrid).
    harness_style:
      name: Stile imbracatura
      description: Definisce lo stile/design strutturale dell'imbracatura, ad esempio,
        vita, seduta, pettorale/gilet, cintura ad ala, pantaloncini da surf o ibrida.
    harness_type:
      name: Tipo di imbracatura
      description: Classifica lo stile strutturale dell'imbracatura da arrampicata,
        ad esempio da seduta, integrale o pettorale.
    harp_action_type:
      name: Tipo di meccanismo dell'arpa
      description: Meccanismo principale utilizzato per modificare l'intonazione/le
        alterazioni sull'arpa.
    harp_finish:
      name: Finitura dell'arpa
      description: Finitura superficiale del corpo dell'arpa (ad esempio, naturale,
        tinta, verniciata, laccata).
    harp_included_accessories:
      name: Accessori inclusi per l'arpa
      description: Elenco degli accessori inclusi con l'acquisto dell'arpa a pedali.
    harvest_method:
      name: Metodo di raccolta
      description: Indica se i frutti di mare sono stati pescati in natura, allevati
        in acquacoltura o ottenuti con altri metodi.
    harvest_stage:
      name: Fase di raccolta
      description: Specifica la fase di crescita in cui la rucola è stata raccolta,
        ad esempio microgreens, foglie giovani o cespo maturo.
    hat_style:
      name: Stile del cappello
      description: La costruzione/lo stile del cappello da festa (ad esempio, cappello
        a cono, corona, cilindro, visiera) per rispecchiare l'aspetto fondamentale
        dell'articolo.
    hazard_signal_mode:
      name: Modesegnale di pericolo
      description: Schemi luminosi/Mode selezionabili per razzi segnaletici a LED/elettronici.
    head_configuration:
      name: Configurazione della testa
      description: Specifica se la testa dell'ascia è dotata di sgorbia, martello,
        entrambi o nessuno dei due, influenzando direttamente la funzionalità su ghiaccio
        e terreni misti.
    head_material:
      name: Materiale della testa
      description: Materiale della testina di gioco Supply con il quinto.
    head_movement_type:
      name: Tipo di movimento della testa
      description: Capacità di movimento direzionale del bipiede o della testa del
        bastone (ad esempio, panoramica, inclinazione, basculamento).
    head_side:
      name: Lato della testa
      description: Specifica se la pelle del tamburo è destinata al lato battente
        (battente), al lato risonante (anteriore) o a entrambi.
    head_weight_style:
      name: Stile di peso della testa
      description: Identifica la configurazione del peso nella testa della mosca artificiale,
        che influisce sulla velocità di affondamento e sulla presentazione.
    headband_embellishment:
      name: Decorazione per fascia per capelli
      description: Identifica gli elementi decorativi applicati alla fascia per capelli
        (ad esempio, fiocchi, perle, cristalli, orecchie di animali).
    headboard_style:
      name: Stile della testiera
      description: Descrive il design o lo stile costruttivo della testiera Supply
        con il letto.
    headgear_strap_configuration:
      name: Configurazione del cinturino del copricapo
      description: Indica il numero di cinghie utilizzate per fissare il casco da
        wrestling.
    headjoint_crown_style:
      name: Stile della corona del giunto superiore
      description: Specifica lo stile o il design della calotta terminale della testata
        del flauto, che può influire sull'estetica e sul peso/saldo.
    headjoint_pitch_standard:
      name: standard di passo della testata
      description: Indica lo standard di accordatura di progetto della testata (ad
        esempio, A=440 vs A=442).
    headliner_product_form:
      name: Formato del prodotto copriparafango
      description: Specifica se il prodotto è un rivestimento del tetto completo preformato,
        un tessuto di ricambio o un componente di riparazione/rifinitura.
    headrest_mount_attachment_method:
      name: metodo di fissaggio del supporto poggiatesta
      description: Specifica come il supporto si fissa al poggiatesta/ai montanti
        del sedile.
    headrest_provision:
      name: predisposizione per poggiatesta
      description: Indica se i poggiatesta sono inclusi e/o se sono presenti i punti
        di fissaggio per i poggiatesta.
    headset_standard:
      name: Standard delle cuffie
      description: Tipo di interfaccia tra il tubo sterzo e la serie sterzo utilizzata
        dal telaio.
    headstall_style:
      name: Tipo di testiera
      description: Classifica il design strutturale o la configurazione della testiera
        con frontalino.
    headwear_intended_use:
      name: Uso previsto del copricapo
      description: Indica lo scopo principale o il contesto in cui si indossa il turbante
        (ad esempio, chemioterapia, perdita di capelli, nuoto, motivi religiosi).
    hearing_enhancer_style:
      name: Stile di potenziatore acustico
      description: Descrive la forma fisica del dispositivo in modo che gli utenti
        possano scegliere tra modelli sopra l'orecchio, nell'orecchio, dietro la testa
        e altri.
    heart_rate_monitoring_method:
      name: Metodo di monitoraggio della frequenza cardiaca
      description: Descrive come il dispositivo acquisisce i dati relativi alla frequenza
        cardiaca durante gli allenamenti.
    heart_rate_sensing_technology:
      name: Tecnologia di rilevamento della frequenza cardiaca
      description: Specifica il metodo di misurazione fisiologica utilizzato dal monitor
        per rilevare la frequenza cardiaca (ad esempio, ECG elettrico o PPG ottico).
    heart_rate_sensor_placement:
      name: Posizionamento del sensore di frequenza cardiaca
      description: Indica dove viene indossato o posizionato il sensore (sul corpo
        o sulla bicicletta), fattore che influisce sul comfort e sulla precisione
        della misurazione.
    heat_retention_technology:
      name: Tecnologia di isolamento termico
      description: Descrive qualsiasi tecnologia, rivestimento o materiale che migliori
        la sudorazione o l'attività termica nei corsetti pensati per l'allenamento
        (ad esempio, effetto sauna in neoprene).
    heated_glass_feature:
      name: Caratteristiche del vetro riscaldato
      description: Indica se il vetro del finestrino include elementi elettrici integrati,
        quali una griglia di sbrinamento posteriore e/o un'antenna incorporata nel
        vetro.
    heater_control_actuation_method:
      name: Metodo di azionamento del comando del riscaldatore
      description: Specifica le modalità di azionamento l'unità di climatizzazione
        del veicolo tramite il comando del riscaldamento/climatizzazione (ad es. azionamento
        a cavo, azionamento a depressione o segnalazione elettronica).
    heater_control_electrical_connector_type:
      name: Tipo di connettore elettrico per il controllo del riscaldatore
      description: Specifica il tipo/interfaccia del connettore elettrico utilizzato
        dal gruppo di controllo del riscaldatore (ad esempio, connettore a treccia
        o connettore a spina).
    heating_technology:
      name: Tecnologia di riscaldamento
      description: Identifica il principale meccanismo di riscaldamento utilizzato
        dal vaporizzatore per convertire il materiale in vapore.
    heel_shape:
      name: Forma del tacco
      description: Specifica lo stile geometrico o la forma del tacco stesso, aiutando
        gli acquirenti a filtrare i risultati in base all'aspetto strutturale e alle
        preferenze in termini di stabilità (ad esempio, tacco a spillo o tacco largo).
    helicopter_mission_type:
      name: Tipo di missione dell'elicottero
      description: Utilizzo/ruolo principale previsto per l'elicottero.
    helicopter_rotor_configuration:
      name: Configurazione del rotore dell'elicottero
      description: Specifica la configurazione del sistema rotore dell'elicottero
        (disposizione del rotore principale e del rotore di coda), ad esempio rotore
        principale singolo + rotore di coda, coassiale, in tandem o ad ingranaggio.
    helmet_accessory_type:
      name: Tipo di accessorio per casco
      description: Identifica il tipo specifico di parte o accessorio per casco da
        bicicletta, consentendo all'acquirente di individuare immediatamente l'articolo
        corretto.
    helmet_audio_connector_type:
      name: Tipo di connettore audio per casco
      description: Specifica il tipo di connettore audio dell'aeromobile utilizzato
        dal lead di comunicazione del casco, se presente.
    helmet_communication_system_readiness:
      name: Stato di preparazione del sistema di comunicazione integrato nel casco
      description: Se il casco è progettato per ospitare un sistema di comunicazione
        interfono/Bluetooth.
    helmet_construction_type:
      name: Tipo di costruzione del casco
      description: Descrive lo stile costruttivo della calotta e dell'imbottitura
        del casco (ad esempio, in schiuma, a guscio rigido, ibrido).
    helmet_fit_head_shape:
      name: Vestibilità del casco (forma della testa)
      description: Il profilo interno è studiato per adattarsi a diverse forme della
        testa.
    helmet_interior_liner_type:
      name: Tipo di rivestimento interno del casco
      description: Tipo di rivestimento interno e se è rimovibile/lavabile.
    helmet_liner_material:
      name: Materiale dell'imbottitura del casco
      description: Specifica il materiale del rivestimento interno o imbottitura che
        garantisce comfort e assorbimento degli urti.
    helmet_retention_closure_type:
      name: Fidelizzazione del casco tipo di chiusura dei clienti
      description: Specifica il meccanismo di chiusura/fissaggio del sottogola del
        casco (ad es. doppio D-ring, cricchetto micrometrico).
    helmet_safety_certification:
      name: Certificazione di sicurezza del casco
      description: Elenca gli standard di sicurezza o le certificazioni a cui il casco
        è conforme.
    helmet_safety_certification_standard:
      name: Standard di certificazione di sicurezza del casco
      description: Standard di sicurezza/omologazione soddisfatti al casco da moto.
    helmet_shell_material:
      name: Materiale della calotta del casco
      description: Materiale o struttura principale del guscio esterno utilizzato
        per il casco.
    helmet_size_system:
      name: Sistema di misurazione del casco
      description: Il sistema di misurazione utilizzato per esprimere la taglia del
        casco.
    helmet_sun_visor_type:
      name: Tipo di visiera parasole per casco
      description: Specifica se il casco è dotato di una visiera parasole interna
        a scomparsa, di una visiera esterna oscurata, di entrambe o di nessuna delle
        due.
    helmet_vehicle_fit:
      name: Adatto per casco da veicolo
      description: Tipo di veicolo/utilizzo di guida per cui è destinato il casco.
    helmet_ventilation_adjustability:
      name: Regolazione della ventilazione del casco
      description: Specifica come il motociclista può controllare la ventilazione
        del casco.
    helmet_ventilation_configuration:
      name: Configurazione della ventilazione del casco
      description: Descrive la disposizione dei sistemi di ventilazione del casco
        e le possibilità di regolazione (ad es. presa d'aria sul mento, prese d'aria
        sulla fronte/di aspirazione, prese d'aria chiudibili)
    helmet_visor_peak_adjustability:
      name: Regolabilità della visiera/del frontino del casco
      description: Se la visiera/il frontino del casco da fuoristrada è regolabile
        e/o rimovibile.
    helmet_visor_shield_optical_features:
      name: Caratteristiche ottiche della visiera (schermo) del casco
      description: Caratteristiche ottiche e di compatibilità della visiera principale.
    helmet_visor_shield_type:
      name: Tipo di visiera per casco
      description: Configurazione della visiera principale inclusa con il casco.
    hem_style:
      name: Stile dell'orlo
      description: Indica il tipo di finitura del bordo del pantalone (ad esempio
        liscio, arrotolato o grezzo) che influisce notevolmente sull'aspetto del capo
    hemisphere_compatibility:
      name: Compatibilità emisferica
      description: Specifica per quale emisfero è stata progettata la mappa stellare,
        in base alle costellazioni visibili.
    hemline_style:
      name: Stile dell'orlo
      description: Definisce il taglio o il design dell'orlo inferiore dell'abito.
    herbal_infusion_function:
      name: Funzione dell'infuso di erbe
      description: Indica il beneficio principale per il benessere o la funzionalità
        per cui l'infusione è commercializzata.
    hex_size:
      name: Chiave esagonale
      description: Per installare/rimuovere la candeletta è necessaria una chiave
        esagonale.
    hi_hat_pair_type:
      name: Tipo di piatti charleston
      description: Indica se l'annuncio riguarda una coppia abbinata di piatto superiore
        e inferiore o un singolo piatto.
    hi_hat_sound_character:
      name: Carattere sonoro dell'hi-hat
      description: Descrive il profilo tonale generale per aiutare gli acquirenti
        a filtrare in base al suono desiderato.
    high_visibility_class:
      name: Classe ad alta visibilità
      description: Specifica il livello di classificazione di visibilità ANSI/ISEA
        107 del capo.
    highback_style:
      name: Stile con schienale alto
      description: Descrive lo stile/design strutturale dello schienale che influisce
        sulle caratteristiche di guida.
    hitch_ball_diameter:
      name: Diametro della sfera di traino
      description: Diametro della testa a sfera del gancio di traino che si accoppia
        con il giunto del rimorchio (ad esempio, 1 7/8 pollici, 2 pollici, 2 5/16
        pollici, 50 mm).
    hitch_ball_mounting_style:
      name: Stile di montaggio della sfera di traino
      description: Se si tratta di una sfera di traino standard fissata con dadi,
        di un modello fisso/a pressione per specifiche teste di traino oppure che
        includa la bulloneria integrata.
    hobby_horse_handle_type:
      name: Tipo di impugnatura del cavallo a dondolo
      description: Specifica la struttura dell'impugnatura/del manubrio utilizzata
        per tenere o guidare il cavallo a dondolo.
    hobby_horse_sound_features:
      name: Caratteristiche sonore del cavallo a dondolo
      description: Indica se il cavallo a dondolo include effetti sonori e di quale
        tipo.
    hockey_goal_type:
      name: Tipo di porta da hockey
      description: Indica lo stile o l'uso previsto della porta da hockey (ad es.
        regolamentare da ghiaccio, da strada, mini).
    hockey_size_category:
      name: Categoria di taglia dell'hockey
      description: Indica la categoria di taglia standard a cui appartiene il capo
        (Youth, Junior, Intermediate, Senior).
    hockey_size_segment:
      name: Segmento di taglia per hockey
      description: Specifica le taglie segmentate standardizzate dell'equipaggiamento
        da hockey che determinano la dimensione complessiva e la vestibilità del pad.
    hold_surface_texture:
      name: Texture della superficie di presa
      description: Descrive la ruvidezza o la finitura tattile della superficie di
        presa dell'impugnatura.
    home_decor_sewing_pattern_project_type:
      name: Tipo di progetto di cartamodello per arredo della casa
      description: Indica il tipo di articolo di arredamento per la casa che il cartamodello
        permette di realizzare (ad esempio, federa per cuscino, tenda, runner da tavola).
    homologation_rule_set:
      name: Omologazione/regolamento
      description: Specifica l'ente sanzionatorio o il regolamento a cui la vettura
        è conforme (ove applicabile).
    honey_form:
      name: Forma del miele
      description: Specifica la forma fisica o la presentazione del miele.
    honey_processing_method:
      name: Metodo di lavorazione del Honey
      description: Indica come il miele è stato trattato o lavorato prima del confezionamento.
    honey_variety:
      name: Varietà di miele
      description: Identifica l'origine botanica o floreale del miele, se monofloreale
        o poliflorale, che influisce direttamente sul sapore, sul colore e sul prezzo.
    hood_configuration:
      name: Configurazione del cappuccio
      description: Descrive il design del cappuccio e le sue caratteristiche di regolazione.
    hood_design:
      name: Design del cappuccio
      description: Indica la presenza e lo stile del cappuccio sul capo d'abbigliamento.
    hood_style:
      name: Stile del cappuccio
      description: Indica la presenza e lo stile di un cappuccio sul capo.
    hood_type:
      name: Tipo di cappuccio
      description: Indica le caratteristiche di design specifiche della parte del
        cappuccio del capo.
    hook_and_eye_size_hook_number:
      name: Misura di gancio e occhiello (numero di gancio)
      description: La numerazione/dimensione standardizzata di gancio e occhiello
        (ove applicabile) utilizzata sulla confezione per indicare la misura complessiva.
    hook_and_loop_fastener_duty_rating:
      name: Livello di resistenza della chiusura a strappo
      description: Indica il livello di resistenza previsto per la chiusura a strappo.
    hook_and_loop_fastener_format:
      name: Formato della chiusura a strappo
      description: Specifica la forma fisica o il formato di confezionamento del prodotto
        di fissaggio a strappo (ad esempio, rotolo/nastro, punti, strisce).
    hook_and_loop_fastener_side:
      name: Lato del fissaggio in velcro
      description: Specifica se il prodotto include solo il lato con gancio, solo
        il lato con anello o un set contenente entrambi i lati.
    hook_coating_finish:
      name: Rivestimento/finitura del gancio
      description: Trattamento superficiale o placcatura applicata al gancio per resistenza
        alla corrosione, mimetizzazione o colorazione (ad es. nichel nero, stagno
        lucido).
    hook_configuration:
      name: Configurazione degli ami
      description: Descrive la presenza e lo stile degli ami forniti con l'esca.
    hook_eye_style:
      name: Stile dell'occhiello del gancio
      description: Specifica la forma o l'orientamento dell'occhiello dell'amo, che
        influisce sul modo in cui l'amo viene legato o fissato.
    hook_eye_type:
      name: Tipo di occhiello del gancio
      description: Specifica il design dell'occhiello dell'amo, che influisce sulla
        scelta del nodo e sul fissaggio.
    hook_loop_format:
      name: Formato della chiusura a strappo
      description: Specifica il fattore di forma fisico della chiusura a strappo da
        cucire.
    hook_loop_side:
      name: Lato gancio e anello
      description: Specifica se il prodotto si riferisce al lato uncino, al lato asola
        oppure a un set completo uncino e asola abbinati.
    hook_material:
      name: Materiale per ganci
      description: Identifica il materiale utilizzato specificamente per il gancio/testa
        del raffio, un fattore fondamentale per la resistenza e la protezione dalla
        corrosione nell'uso in acqua salata.
    hook_organizer_style:
      name: Stile dell'organizer per ami
      description: Indica lo stile o il formato dell'organizer per ami (ad esempio
        custodia, rotolo o pochette), utilizzato per facilitare la navigazione e il
        filtraggio per tipo di organizer.
    hook_point_configuration:
      name: Configurazione della punta del gancio
      description: Indica se l'amo ha due punte (doppio) o tre punte (triplo).
    hook_point_type:
      name: Tipo di punta dell'amo
      description: Descrive l'affilatura o la forma della punta dell'amo da pesca,
        che influisce sulla capacità di penetrazione e di tenuta.
    hook_shank_length:
      name: Lunghezza del gambo dell'amo
      description: Indica la classificazione della lunghezza relativa del gambo dell'amo
        (ad esempio, corto, lungo) per un rapido confronto visivo e funzionale.
    hooks_eyes_attachment_method:
      name: Metodo di fissaggio di ganci e occhielli
      description: Come i ganci e gli occhielli vengono fissati al capo o al progetto.
    hop_up_type:
      name: Tipo di hop-up
      description: Definisce il sistema hop-up utilizzato per imprimere il backspin
        ai pallini BB, migliorando gittata e precisione.
    horse_blanket_type:
      name: Tipo di coperta per cavalli
      description: Specifica lo stile principale o l'uso previsto della coperta o
        del telo per cavalli.
    horse_brush_type:
      name: Tipo di spazzola per cavalli
      description: Classifica le spazzole in base al loro specifico stile di cura
        o alla loro destinazione d'uso, consentendo ai clienti di filtrare i risultati
        senza frammentare la gerarchia delle categorie.
    horse_care_purpose:
      name: Scopo di cura dei cavalli
      description: La funzione principale del prodotto nell'ambito della cura del
        cavallo comprende la salute, la toelettatura e la gestione delle esigenze.
    horse_feed_stage:
      name: Fase di alimentazione del cavallo
      description: Indica la fase di vita o lo stato fisiologico del cavallo per cui
        è formulato il mangime.
    horse_groomer_type:
      name: Tipo di strumento per la toelettatura di cavalli
      description: Classifica lo stile dello strumento per la toelettatura in modo
        che gli acquirenti possano individuare rapidamente quello di cui hanno bisogno.
    horse_leg_protection_type:
      name: Tipo di protezione per le zampe di cavallo
      description: Classifica lo stile specifico o la funzione dello stivale, della
        fasciatura o della benda per cavalli.
    horse_model_breed:
      name: Razza equina del modellino
      description: Specifica la razza equina rappresentata dal modellino in scala
        (se applicabile).
    hosiery_toe_style:
      name: Stile della punta della calzetteria
      description: Definisce la struttura della punta della calzetteria, importante
        per la durata e la compatibilità con le calzature a punta aperta.
    hot_air_balloon_basket_type:
      name: Tipo di cesto per mongolfiera
      description: Specifica la configurazione/lo stile principale del cesto (ad esempio,
        sportivo standard, commerciale ad alta capacità, diviso, accessibile/con porta)
        utilizzato per l'accesso e il funzionamento previsto.
    hot_air_balloon_burner_type:
      name: Tipo di bruciatore della mongolfiera
      description: Tipologia/configurazione del sistema di bruciatori installato sul
        pallone aerostatico.
    hot_air_balloon_envelope_material:
      name: Materiale di rivestimento della mongolfiera
      description: Tessuto/materiale principale utilizzato per l'involucro del pallone
        (tessuto).
    hotfix_application_tool:
      name: Strumento per applicazione di decorazioni termoadesive
      description: Strumento o fonte di calore consigliata per l'applicazione di strass
        termoadesivi.
    hub_axle_type:
      name: Tipo di asse del mozzo
      description: Identifica il sistema di interfaccia/fissaggio per cui è progettato
        il mozzo (a sgancio rapido, perno passante, ecc.).
    hub_motor_type:
      name: Tipo di motore del mozzo
      description: Descrive lo stile costruttivo del motore nel mozzo (con ingranaggi,
        a trasmissione diretta, con spazzole, senza spazzole) per informare gli acquirenti
        sulle caratteristiche di coppia, peso ed efficienza.
    hula_hoop_construction_type:
      name: Tipo di costruzione dell'hula hoop
      description: Descrive come viene costruito/assemblato il cerchio.
    hula_hoop_features:
      name: Caratteristiche dell'hula hoop
      description: Evidenzia le caratteristiche funzionali o di design notevoli del
        cerchio hula hoop.
    hull_design:
      name: Design dello scafo
      description: Descrive la forma dello scafo che influisce su prestazioni e caratteristiche
        di manovrabilità.
    hull_type:
      name: Tipo di scafo
      description: Descrive la forma dello scafo che influisce su prestazioni e stabilità.
    humidifier_refill_medium_type:
      name: Tipo di sostanza per la ricarica di umidificatori
      description: Identifica il mezzo di assorbimento dell'umidità/ricarica utilizzato
        per l'umidificatore (ciò che viene inumidito o sostituito).
    humidifier_refill_method:
      name: Metodo di ricarica dell'umidificatore
      description: Descrive come ricaricare o sostituire il materiale di diffusione
        dell'umidità per l'umidificatore.
    humidifying_medium:
      name: Mezzo umidificante
      description: Identifica l'elemento/mezzo umidificante utilizzato dal prodotto
        (ciò che viene inumidito/attivato).
    hummus_base_ingredient:
      name: Ingrediente base dell'hummus
      description: Indica il legume o l'ortaggio principale utilizzato per preparare
        l'hummus.
    hunting_call_type:
      name: Tipo di richiamo di caccia
      description: Classifica il principale stile o meccanismo di funzionamento del
        richiamo (ad esempio a fiato, elettronico o a scatola), così da consentire
        ai cacciatori di scegliere rapidamente il formato più adatto alle proprie
        esigenze e al proprio livello di abilità.
    hunting_dog_collar_function:
      name: Funzione del collare per cani da caccia
      description: Classifica lo stile o lo scopo funzionale principale del collare,
        aiutando gli acquirenti a filtrare i prodotti in base a funzioni quali tracciamento,
        addestramento, visibilità o utilizzo standard.
    hvac_control_functions:
      name: Funzioni di controllo HVAC
      description: Indica quali funzioni di climatizzazione/sbrinamento/flusso d'aria
        sono controllate dall'unità (meccanica o elettronica).
    hybrid_drivetrain_configuration:
      name: Configurazione del sistema di propulsione ibrido
      description: Indica l'architettura del sistema PHEV, descrivendo come i motori
        elettrici e il motore a combustione interna forniscono la propulsione.
    hybrid_system_type:
      name: Tipo di sistema ibrido
      description: Classifica l'architettura di ibridazione utilizzata dal veicolo.
    hybrid_truck_cab_type:
      name: Tipo di cabina del camion ibrido
      description: Specifica la configurazione della cabina del camion, che influisce
        sulla capacità di posti a sedere e sullo spazio interno.
    hydration_bag_features:
      name: Caratteristiche della sacca per l'idratazione
      description: Evidenzia le caratteristiche di design o funzionali più rilevanti,
        specifiche delle sacche per l'idratazione.
    hydration_belt_features:
      name: Caratteristiche della cintura per l'idratazione
      description: Elenca le caratteristiche principali integrate che migliorano l'usabilità,
        la sicurezza o la praticità della cintura per l'idratazione.
    hydration_bladder_compatibility:
      name: Compatibilità con la sacca per l'idratazione
      description: Indica se il gilet include o è predisposto per un sistema di sacca
        per l'idratazione.
    hydration_mouthpiece_style:
      name: Stile del boccaglio per l'idratazione
      description: Specifica il design o lo stile funzionale di un boccaglio o di
        una valvola per sistemi di idratazione, aiutando gli acquirenti a scegliere
        l'interfaccia preferita e a garantirne la compatibilità.
    hydration_pack_style:
      name: Stile del set per l'idratazione
      description: Specifica lo stile strutturale del sistema di idratazione, come
        zaino o gilet, per facilitare la vestibilità e filtrare il caso d'uso.
    hydration_system_insulation:
      name: Isolamento del sistema di idratazione
      description: Indica se il serbatoio e/o il tubo per bere sono isolati per contribuire
        a mantenere la temperatura del liquido in condizioni di caldo o freddo.
    hydration_valve_type:
      name: Tipo di valvola per l'idratazione
      description: Identifica il tipo di valvola o boccaglio per bere fornito con
        il sistema o la borraccia, coprendo i modelli più comuni di valvola a morso
        e ugello ad alto flusso.
    hydraulic_fluid_type:
      name: Tipo di fluido idraulico
      description: Specifica il tipo di liquido freni che utilizza la leva del freno
        idraulico per bicicletta. Queste informazioni sono fondamentali per la manutenzione
        e la sicurezza.
    hydrogenation_level:
      name: Livello di idrogenazione
      description: Indica se il grasso è non idrogenato, parzialmente idrogenato o
        completamente idrogenato, che influisce sul contenuto di grassi trans e sulle
        prestazioni di cottura.
    hydrophobicity_level:
      name: Livello di idrofobicità
      description: Indica il grado di prestazioni idrorepellenti/scivolose commercializzate
        dal prodotto.
    ice_cream_format:
      name: Formato del gelato
      description: Descrive la forma fisica o la presentazione del gelato (ad esempio,
        vaschetta, barretta, mochi).
    ice_skate_sharpener_type:
      name: Tipo di affilatore per pattini da ghiaccio
      description: Classifica il design o il formato generale dell'affilatore (pietra
        manuale, macchina elettrica, supporto, ecc.).
    ice_temperature_suitability:
      name: Idoneità alla temperatura del ghiaccio
      description: Indica l'intervallo di temperatura del ghiaccio per il quale è
        formulata la cera per mazze da hockey, che influisce sulle prestazioni e sulle
        proprietà antineve.
    icing_sugar_variety:
      name: Varietà di zucchero a velo
      description: Classifica la formulazione o il tipo funzionale dello zucchero
        a velo (ad esempio, fondente, polvere effetto neve non fondente, colorato,
        aromatizzato).
    ignition_coil_configuration:
      name: Configurazione della bobina di accensione
      description: Specifica il fattore di forma della bobina di accensione (bobina
        singola/bobina sulla candela, avvolgimento bobina multitorre in base al numero
        di cilindri, bobina a binario/cassetta o tipo distributore).
    ignition_lead_compliance_standard:
      name: Standard di conformità dei cavi di accensione
      description: Standard o certificazione industriale formale a cui sono conformi
        i cavi di accensione, come dichiarato dal produttore (ad esempio, SAE J2031,
        ISO 3808).
    ignition_lead_insulation_material:
      name: Materiale isolante del cavo di accensione
      description: Materiale isolante/guaina primaria utilizzata sul cavo di accensione
        (isolamento del cavo esterno).
    ignition_lead_set_type:
      name: Tipo di set di cavi di accensione
      description: Se il prodotto comprende un singolo cavo di accensione o un set
        completo e a cosa è destinato il set.
    ignition_lead_terminal_type:
      name: Tipo di terminale del cavo di accensione
      description: Stile del terminale/connettore utilizzato alle estremità del cavo
        di accensione (ad esempio, candela e bobina/distributore).
    illumination_type:
      name: Tipo di illuminazione
      description: Specifica se e come la palla viene illuminata per il gioco notturno
        (ad esempio, luce fosforescente, LED attivato da impatto).
    immobilizer_installation_type:
      name: Tipo di installazione dell'immobilizzatore
      description: Indica come è installato o collegato l'immobilizzatore al veicolo.
    immobilizer_unlock_method:
      name: Metodo di sblocco dell'immobilizzatore
      description: Specifica come viene attivato/disattivato o sbloccato l'immobilizzatore.
    impact_protection_certifications:
      name: Certificazioni di protezione dall'impatto
      description: Indica gli standard di sicurezza specifici che il cuscinetto protettivo
        soddisfa o supera.
    impact_protection_level:
      name: Livello di protezione Impact
      description: Specifica il livello di protezione dagli impatti o la tecnologia
        offerta dalla conchiglia protettiva.
    impact_protection_rating:
      name: Grado di protezione adgli impatti
      description: Specifica il livello di protezione dagli impatti certificato secondo
        gli standard (ad esempio, EN 1621-1 Livello 1, EN 14120 Livello 2), aiutando
        gli utenti a individuare la protezione di livello superiore.
    impact_surface_material:
      name: Materiale della superficie Impact
      description: Descrive il materiale principale della superficie di impatto/urto
        per garantire sicurezza e sensazione (ad esempio, schiuma, plastica).
    incense_base_material:
      name: Materiale di base dell'incenso
      description: Materiale base/legante principale utilizzato per realizzare l'incenso
        (base in polvere) contenuto nel kit.
    incense_making_method:
      name: Metodo di produzione dell'incenso
      description: Il processo artigianale previsto supportato dal kit.
    incense_tool_type:
      name: Tipo di strumento per l'incenso
      description: Specifica il tipo di strumento per la produzione di incenso utilizzato
        in questo prodotto (per formare, misurare, pressare, mescolare o essiccare
        l'incenso).
    incline_adjustment_type:
      name: Tipo di regolazione dell'inclinazione
      description: Descrive come (o se) l'inclinazione può essere modificata durante
        gli allenamenti.
    included_accessories:
      name: Accessori inclusi
      description: L'elenco includeva accessori come punte/teste di ricambio, custodia
        per la conservazione, cavo di ricarica o adattatore CA.
    included_case_type:
      name: Tipo di custodia inclusa
      description: Tipo di custodia/borsa inclusa con il sassofono basso (se presente).
    included_components:
      name: Componenti inclusi
      description: Elenca ciò che è incluso nella confezione (utile per set di attrezzi
        e pacchetti).
    included_fastener_components:
      name: Componenti di fissaggio inclusi
      description: Specifica se il prodotto è un set di ganci e occhielli, solo ganci,
        solo occhielli o una variante di chiusura per indumenti correlata.
    included_hydration_vessel_type:
      name: Tipo di contenitore per l'idratazione incluso
      description: Identifica lo stile del contenitore per l'idratazione incluso o
        supportato dalla cintura.
    included_items_woodwind_instrument:
      name: Articoli inclusi (strumento a fiato)
      description: Elenchi che comunemente includono articoli del pacchetto inclusi
        nel set del sassofono basso.
    included_materials:
      name: Materiali inclusi
      description: Indica quali componenti sono inclusi nell'acquisto del cartamodello
        (solo cartamodello o cartamodello + materiali).
    included_mounting_accessories:
      name: Accessori di montaggio inclusi
      description: Elenca gli accessori di montaggio/fissaggio inclusi con il vivavoce.
    included_pump_type:
      name: Tipo di pompa incluso
      description: Identifica il tipo di pompa fornito o integrato con il materasso
        ad aria.
    included_scraper_implement_type:
      name: Tipo di strumento raschiatore incluso
      description: Indica quali strumenti di esecuzione sono inclusi con lo strumento
        a raschiamento musicale (ad esempio bacchetta/asta raschiante, spazzola metallica).
    indicator_design:
      name: Design dell'indicatore
      description: Classifica la forma fisica o lo stile dell'indicatore di abboccata
        per la pesca.
    indicator_functions_tracked:
      name: Funzioni monitorate dell'indicatore
      description: Elenca le specifiche statistiche di gioco che l’indicatore monitora,
        come palle, strike, out, inning, conteggio dei lanci, over, wicket, punteggio
        o down.
    indoor_outdoor_use:
      name: Uso interno/esterno
      description: Indica se il giocattolo da bowling è destinato all'uso interno,
        all'uso esterno, o entrambi.
    inflatable_decoration_items_included:
      name: Articoli sulla decorazione gonfiabile inclusi
      description: Elenca gli accessori principali inclusi con la decorazione gonfiabile
        (ad esempio, ventola, picchetti, corde di fissaggio).
    inflatable_decoration_type:
      name: Tipo di decorazione gonfiabile
      description: Specifica il tipo di decorazione gonfiabile per feste (forma/fattore
        di forma) per facilitare la navigazione e il filtraggio.
    inflatable_raft_float_features:
      name: Caratteristiche del gommone/galleggiante gonfiabile
      description: Caratteristiche funzionali presenti sul gommone/galleggiante gonfiabile.
    inflation_method_included:
      name: Metodo di gonfiaggio incluso
      description: Specifica il tipo di soluzione per il gonfiaggio degli pneumatici
        incluso nel kit di riparazione, se presente.
    infused_scent:
      name: Profumo infuso
      description: Identifica gli additivi odorosi o aromatizzanti impregnati nel
        materiale dell'esca.
    ingredient_base_type:
      name: Tipo di base dell'ingrediente
      description: Identifica la base primaria utilizzata per la fermentazione (ad
        esempio, concentrato di succo d'uva, succo fresco o concentrato di frutta).
    ingredient_physical_form:
      name: Forma fisica dell'ingrediente
      description: Specifica la forma fisica in cui viene fornito l'aroma (utilizzato
        per la gestione, la misurazione e la formulazione).
    ingredient_processing_method:
      name: Metodo di lavorazione degli ingredienti
      description: Specifica la principale tecnica di lavorazione applicata all'ingrediente
        (ad esempio, liofilizzazione, tostatura, fermentazione).
    ink_colors_included:
      name: Colori dell'inchiostro inclusi
      description: Specifica i colori di inchiostro inclusi nei tamponi per timbri
        del set.
    ink_pad_application_method:
      name: Metodo di applicazione del tampone d'inchiostro
      description: Modalità di erogazione/utilizzo dell'inchiostro dal tampone (tampone
        per timbri tradizionale, applicatore a spugnetta o tampone con punta a pennello).
    ink_pad_permanence:
      name: Permanenza del tampone per inchiostro
      description: Se l'inchiostro utilizzato per il timbro è permanente e/o a lunga
        conservazione (resistente allo sbiadimento e all'acqua una volta asciutto).
    ink_pad_size:
      name: Dimensione del tampone d'inchiostro
      description: Taglia/fattore di forma standardizzato della superficie/involucro
        del tampone d'inchiostro.
    ink_pad_special_effects:
      name: Effetti speciali del tampone d'inchiostro
      description: Effetti visivi/funzionali speciali dell'inchiostro quando viene
        utilizzato (ad esempio, metallico, glitterato).
    ink_permanence:
      name: Permanenza dell'inchiostro
      description: Indica se l'inchiostro sumi asciutto è destinato ad essere permanente/a
        lunga durata oppure lavabile/non permanente.
    ink_preparation_required:
      name: Preparazione dell'inchiostro necessaria
      description: Indica se l'inchiostro sumi è pronto all'uso o se necessita di
        diluizione con acqua o macinazione prima dell'utilizzo.
    inline_skate_brake_type:
      name: Tipo di freno per pattini in linea
      description: Specifica la configurazione del freno inclusa nei pattini in linea,
        come ad esempio un freno a tallone rimovibile o l'assenza di freno.
    inner_tent_configuration:
      name: Configurazione della tenda interna
      description: Specifica la configurazione o lo stile della tenda interna, ad
        esempio inserto completo, inserto in rete o fodera termica.
    innerspring_coil_type:
      name: Tipo di molla interna
      description: Specifica lo stile costruttivo del sistema di molle interne del
        materasso, che influisce su supporto, isolamento del movimento e prezzo.
    input_connector_type:
      name: Tipo di connettore di ingresso
      description: Specifica il tipo di connettore di ingresso audio utilizzato dal
        pedale (in genere TS da 1/4 di pollice).
    input_valve_type:
      name: Tipo di valvola di ingresso
      description: Indica lo standard della valvola presente sulla camera d'aria/ruota
        della bicicletta a cui si collega l'adattatore FROM.
    insecticide_treatment:
      name: Trattamento con insetticida
      description: Indica se la rete è stata trattata in fabbrica con insetticida
        e, in tal caso, il tipo di trattamento utilizzato per protezione aggiuntiva.
    insert_coverage_area:
      name: Inserire l'area di copertura
      description: Specifica quale parte del piede è progettata per essere coperta
        dalla soletta (ad esempio, a tutta lunghezza, solo tallone).
    insert_length_type:
      name: Tipo di lunghezza dell'inserto
      description: Indica la zona della soletta coperta dal supporto plantare.
    inside_message_type:
      name: Tipo di messaggio interno
      description: Indica se il biglietto include un messaggio prestampato all'interno
        e se è personalizzabile.
    insole_attachment_method:
      name: Metodo di fissaggio della soletta
      description: Specifica come il supporto plantare rimane in posizione all'interno
        della scarpa (inserto libero, con retro adesivo, con velcro, ecc.).
    insole_material:
      name: Materiale della soletta
      description: Descrive il materiale del plantare o della soletta su cui poggia
        il piede, influendo su ammortizzazione e supporto.
    installation_fabrication_level:
      name: Livello di fabbricazione dell'installazione
      description: Indica la quantità tipica di lavorazioni personalizzate o modifiche
        necessarie per installare il kit.
    installation_location:
      name: Sede dell'installazione
      description: Specifica il punto di installazione tipico per il sensore di pressione
        dell'olio nel sistema di lubrificazione del motore (ad esempio, apertura del
        condotto dell'olio del blocco motore, alloggiamento del filtro, piastra di
        raccordo o montaggio remoto sulla linea).
    installation_method:
      name: Metodo di installazione
      description: Specifica come il tappetino o lo strato isolante vengono fissati
        o installati sul pavimento.
    instant_coffee_form:
      name: Forma del caffè istantaneo
      description: Descrive la forma fisica in cui viene fornito il caffè istantaneo,
        influenzando il metodo di preparazione e la durata di conservazione.
    instep_coverage:
      name: Copertura del collo del piede
      description: Specifica se il prodotto protegge solo la tibia o sia la tibia
        che il collo del piede.
    instruction_format:
      name: Formato delle istruzioni
      description: Formato delle istruzioni incluse nel kit.
    instrument_cleaning_swab_form_factor:
      name: Fattore di forma del tampone per la pulizia degli strumenti
      description: Specifica lo stile fisico del tampone (ad esempio, panno a scorrimento
        rispetto al sistema a bacchetta/spazzolino) per adattarsi alle preferenze
        del musicista e ai vincoli dello strumento.
    instrument_dimensions_unit_context:
      name: Contesto dell'unità di misurazione dello strumento
      description: Chiarisce a cosa si riferiscono le misure di altezza, larghezza
        e lunghezza fornite (ad esempio, strumento nel suo complesso, lunghezza del
        singolo tubo, altezza del supporto).
    instrument_electronics_type:
      name: Tipo di elettronica dello strumento
      description: Indica se il sistema di pickup/preamplificazione dello strumento
        è attivo o passivo.
    instrument_key:
      name: Tonalità dello strumento
      description: Specifica la tonalità dello strumento utilizzata nei cataloghi
        (generalmente Do o Fa per i flauti dolci più grandi).
    instrument_level:
      name: Livello dello strumento
      description: Livello del musicista per lo strumento offerto.
    instrument_part_mounting_method:
      name: Metodo di montaggio della parte dello strumento
      description: Specifica come il componente si fissa o viene installato (ad esempio,
        tramite morsetto, adesivo o vite).
    instrument_parts_included:
      name: Parti dello strumento incluse
      description: Elenca i principali componenti/parti inclusi nella confezione di
        un clarinetto in La.
    instrument_playing_technique:
      name: Tecnica esecutiva dello strumento
      description: Modalità di utilizzo/esecuzione tipica dello strumento (ad esempio,
        scosso, percosso, battuto).
    instrument_size_class:
      name: Classe di misura dello strumento
      description: Dimensioni generali dello strumento espresse come classe di facile
        comprensione per l'acquirente, piuttosto che come dimensioni esatte.
    insulation_fill_material:
      name: Materiale isolante di imbottitura
      description: Identifica il materiale principale utilizzato per isolare la giacca
        o il gilet.
    integrated_bottom_type:
      name: Tipo di fondo integrato
      description: Indica se il capo include slip, pantaloncini, body o indumenti
        intimi simili incorporati per la copertura durante il movimento.
    integrated_charging_options:
      name: Opzioni integrate di alimentazione/ricarica
      description: Elenca le interfacce di alimentazione o ricarica integrate disponibili
        sul comodino.
    integrated_furniture_function:
      name: Funzione integrata degli arredi
      description: Identifica gli elementi dell'arredo aggiuntivi integrati nel letto
        a scomparsa o nella struttura (ad esempio, scrivania, divano, mensole).
    integrated_locking:
      name: Lucchetto integrato
      description: Se il portapacchi include un lucchetto integrato per il collegamento
        al veicolo e/o tra bicicletta e portapacchi.
    integrated_power_options:
      name: Opzioni di alimentazione integrate
      description: Indica il tipo di alimentazione integrata o le funzioni di ricarica
        di cui è dotato il mobiletto.
    integrated_storage_features:
      name: Funzionalità di stoccaggio integrate
      description: Identifica le funzionalità aggiuntive di stoccaggio o gli accessori
        inclusi nel portastecche da biliardo, oltre agli slot per le stecche.
    integrated_tool_functions:
      name: Funzioni dello strumento integrate
      description: Ulteriori funzionalità integrate nella leva (ad esempio, uncino
        per raggi, estrattore del nucleo valvola, sgancia copertoni).
    intended_board_type:
      name: Tipo di tavola previsto
      description: Specifica il tipo di kiteboard per cui è progettata la pinna (ad
        esempio, twin tip, surf directional, hydrofoil).
    intended_consumption:
      name: Consumo previsto
      description: Specifica come il prodotto è destinato a essere consumato, indicando
        se può essere mangiato crudo, se richiede cottura al forno o se è parzialmente
        cotto.
    intended_craft:
      name: Ambito di utilizzo
      description: Contesto principale di utilizzo per cui la guida del filo è progettata.
    intended_culinary_use:
      name: Uso culinario previsto
      description: Indica l'utilizzo culinario principale della salsa, come ad esempio
        intingere, cucinare o glassare.
    intended_handlebar_style:
      name: Stile del manubrio previsto
      description: Descrive il tipo di manubrio o lo stile di leva previsto per l'uso
        (ad esempio, manubrio dritto, da corsa, aerodinamico). Questo riduce rapidamente
        la compatibilità senza imporre ulteriori sottocategorie.
    intended_player_role:
      name: Ruolo del giocatore previsto
      description: Specifica il ruolo in campo per cui è destinato il copricapo (ad
        esempio, ricevitore, arbitro).
    intended_playing_surface:
      name: Superficie di gioco prevista
      description: Superficie per cui è progettato il disco, la palla o l'anello,
        come ghiaccio, asfalto, pavimenti di palestre o ghiaccio sintetico.
    intended_repair_location:
      name: Sede di riparazione prevista
      description: Indica il punto dello pneumatico che il kit deve riparare.
    intended_seating_position:
      name: Posizione di seduta prevista
      description: Specifica la posizione del sedile del veicolo in cui la cintura
        di sicurezza deve essere installata o utilizzata.
    intended_sewing_application:
      name: Applicazione di cucito prevista
      description: Applicazione di cucito prevista per cui il filo è stato progettato
        (ad esempio, uso generico per indumenti, trapuntatura, tappezzeria).
    intended_technique:
      name: Tecnica prevista
      description: Tecnica di infeltrimento principale per cui è progettato il tappetino/cuscino.
    intended_use:
      name: Uso previsto
      description: Contesto d'uso principale dello strumento.
    intended_use_fleece_fabric:
      name: Uso previsto (tessuto in pile)
      description: Progetto/applicazione principale per cui è commercializzato il
        tessuto in pile.
    intended_user:
      name: Utente previsto
      description: Indica per chi è progettato l'equipaggiamento di protezione aeronautico.
    intended_yarn_form:
      name: Forma del filato prevista
      description: Specifica la modalità di presentazione del filato più adatta al
        portafilato.
    interaction_mode:
      name: Modi di interazione
      description: Metodo di interazione principale utilizzato per attivare suoni
        o attività.
    interactive_effects:
      name: Effetti interattivi
      description: Identifica gli effetti interattivi elettronici o meccanici inclusi
        in un set da gioco da cucina.
    interfacing_application_area:
      name: Area di applicazione dell'interfodera
      description: Identifica le aree comuni di cucito a cui l'interfodera è destinata
        a fornire supporto.
    interfacing_color_family:
      name: Famiglia di colore dell'interfodera
      description: Indica il colore di base tipico dell'interfodera utilizzata sotto
        tessuti chiari o scuri.
    interfacing_selling_format:
      name: Formato di vendita dell'interfodera
      description: Descrive il formato di vendita dell'interfodera (ad esempio, taglio
        continuo venduto a lunghezza, pezzi pretagliati, rotoli o campioni).
    interfacing_stiffness_level:
      name: Livello di rigidità dell'interfodera
      description: Descrive il grado di rigidità/solidità fornito dall'interfodera.
    interior_padding_type:
      name: Imbottitura interna
      description: Tipo di imbottitura interna o sistema di inserti utilizzato all'interno
        dell'involucro per proteggere e organizzare il contenuto.
    interior_stall_configuration:
      name: Configurazione interna del box
      description: Specifica il layout/la configurazione interna per il trasporto
        degli animali (orientamento dei box e tipologia dei compartimenti).
    invitation_printing_coverage:
      name: Copertura per la stampa degli inviti
      description: Quali lati degli inviti sono stampati (solo fronte o fronte-retro).
    iodization:
      name: Iodizzazione
      description: Indica se e in che misura è stato aggiunto iodio al sale.
    iridescence_level:
      name: Livello di iridescenza
      description: Descrive l'intensità della lucentezza iridescente naturale/trattata
        tipica delle piume di pavone.
    irish_warpipe_set_configuration:
      name: Configurazione del set di cornamuse irlandesi
      description: Indica la configurazione venduta (strumento completo o parti/set
        parziale) nello specifico per le cornamuse irlandesi.
    iron_on_applique_application_method:
      name: Metodo di applicazione dell'applique termoadesiva
      description: Specifica come l'applicazione termoadesiva deve essere applicata
        al supporto.
    ironing_center_features:
      name: Caratteristiche del centro stiro
      description: Elenca le caratteristiche specifiche dei centri di stiratura che
        ne migliorano l'usabilità e la praticità.
    jacket_breast_style:
      name: Stile del petto della giacca
      description: Specifica se la giacca dell'abito è monopetto o doppiopetto.
    jacket_vent_style:
      name: Stile dello spacco della giacca
      description: Indica il tipo di apertura (ventilazione) presente sul retro della
        giacca.
    jam_and_jelly_consistency:
      name: Consistenza di marmellata e gelatina
      description: Descrive la consistenza della crema spalmabile, indicando la presenza
        di pezzi di frutta o semi.
    jaw_shape:
      name: Forma delle ganasce
      description: Geometria delle ganasce o della punta (ad esempio, dritta, curva,
        a naso lungo) che influisce sulla precisione e sulla portata.
    jerky_form:
      name: Forma della carne secca
      description: Descrive la forma fisica o il taglio dei pezzi di carne essiccata
        (ad esempio, strisce, bastoncini, bocconcini).
    jersey_style:
      name: Stile jersey
      description: Specifica il formato o lo stile di utilizzo della maglia per tifosi.
    jew_harp_accessories_included:
      name: Accessori inclusi per lo scacciapensieri
      description: L'elenco comprendeva gli articoli confezionati insieme allo scacciapensieri
        (ad esempio, custodia, sacchetto, istruzioni).
    jew_s_harp_frame_style:
      name: Stile della struttura dello scacciapensieri
      description: Descrive lo stile costruttivo della struttura/corpo dello scacciapensieri,
        che influisce su sensazione, durata ed ergonomia del suono.
    jew_s_harp_tongue_profile:
      name: Profilo della linguetta dello scacciapensieri
      description: Descrive il profilo/la geometria della linguetta (ancia) dello
        scacciapensieri, che influisce sulla risposta e sul timbro.
    jewelry_pieces_included:
      name: Pezzi di gioielleria inclusi
      description: Elenca i singoli gioielli inclusi nel set, in modo che gli acquirenti
        sappiano esattamente quali pezzi stanno acquistando.
    jigsaw_puzzle_piece_shape:
      name: Forma dei pezzi del puzzle
      description: Taglio generale/stile dei pezzi e profilo del bordo.
    jockstrap_design_features:
      name: Caratteristiche di design del sospensorio
      description: Cattura elementi di design speciali, unici per i sospensori, che
        influenza le funzioni o l'estetica.
    juggling_club_construction_type:
      name: Tipo di costruzione della clava da giocoliere
      description: Specifica il tipo di costruzione generale della clava da giocoleria
        (ad esempio, monoblocco stampato o assemblato in più pezzi), che può influire
        su durata, sensazione di utilizzo e manutenzione.
    juggling_club_core_material:
      name: Materiale del nucleo della clava da giocoleria
      description: Materiale principale utilizzato all'interno della clava (distinto
        dal rivestimento/nastro esterno).
    juggling_prop_set_size:
      name: Set di accessori per giocoleria taglia
      description: Numero di oggetti di scena principali inclusi nel set (es. set
        da 3 palline, coppia di poi).
    juggling_ring_edge_style:
      name: Stile del bordo dell'anello da giocoleria
      description: Profilo del bordo dell'anello che influisce su comfort e presa.
    juice_form:
      name: Forma del succo
      description: Specifica la forma fisica o la fase di lavorazione del prodotto
        (ad esempio, liquido a concentrazione singola, concentrato, polvere).
    juice_processing_method:
      name: Metodo di lavorazione del succo
      description: Specifica la tecnica di lavorazione primaria applicata al succo
        o alla bevanda, che influisce su sapore, conservazione dei nutrienti e durata
        di conservazione.
    jump_rope_style:
      name: Stile della corda per saltare
      description: Classifica lo stile di costruzione della corda/del cavo (ad esempio,
        con perline, in tessuto, speed cable), che influisce notevolmente sull'uso
        previsto e sulle prestazioni.
    kale_variety:
      name: Varietà di cavolo riccio
      description: Identifica la specifica cultivar o varietà di cavolo nero (ad esempio,
        riccio, lacinato/nero, riccio rosso. Questo aiuta l'acquirente a scegliere
        in base al sapore, alla consistenza e all'utilizzo in cucina.
    kaleidoscope_viewing_type:
      name: Tipo di visualizzazione del caleidoscopio
      description: Identifica il formato di visualizzazione o lo stile di funzionamento
        del caleidoscopio (ad esempio, tubo oculare classico, teleidoscopio con lenti,
        azionato da una rotella, proiezione).
    kayak_construction_type:
      name: Tipo di costruzione del kayak
      description: Specifica il principale stile di costruzione del kayak, ad esempio
        rigido o gonfiabile.
    kayak_design_type:
      name: Tipo di design del kayak
      description: Classifica la destinazione d'uso principale del kayak (ad esempio,
        surfski, kayak da freestyle, kayak da turismo).
    kayak_hull_design:
      name: Progettazione dello scafo del kayak
      description: Identifica la principale forma dello scafo, che influisce sulle
        caratteristiche di utilizzo come stabilità e manovrabilità in condizioni di
        mare mosso.
    kayak_storage_bag_type:
      name: Tipo di borsa portaoggetti per kayak
      description: Indica lo stile o il formato di una sacca per riporre il kayak,
        come ad esempio una borsa impermeabile o una borsa per la pagaia.
    kayak_style:
      name: Stile del kayak
      description: Specifica il design principale o lo stile di utilizzo del kayak
        (ad esempio, ricreativo, da turismo, gonfiabile).
    keel_type:
      name: Tipo di chiglia
      description: Identifica la configurazione della chiglia della barca a vela.
    kettlebell_style:
      name: Stile della kettlebell
      description: Identifica la variante di costruzione o stile della kettlebell
        (ad esempio, da competizione, regolabile, morbida), aiutando gli acquirenti
        a scegliere quella giusta per le proprie esigenze di allenamento.
    key_attachment_mechanism:
      name: Meccanismo di fissaggio delle chiavi
      description: Specifica la ferramenta utilizzata per fissare le chiavi all'interno
        della cassetta, come anelli, clip o perni a vite.
    key_retention_when_unlocked:
      name: Fissaggio della chiave quando sbloccata
      description: Indica se la chiave può essere estratta dalla serratura quando
        questa è in posizione di sblocco.
    keyboard_amplifier_inputs:
      name: Ingressi dell'amplificatore per tastiera
      description: Elenca le tipologie di ingresso supportate dall'amplificatore per
        tastiera (ad esempio, jack TRS da 1/4", ingresso MIDI, Bluetooth).
    keyboard_amplifier_output_types:
      name: Tipi di uscita dell'amplificatore per tastiera
      description: Specifica i tipi di connettore di uscita principali supportati
        dall'amplificatore per tastiera per l'instradamento dell'audio verso altri
        sistemi.
    keyboard_case_handle_type:
      name: Tipo di impugnatura della custodia per tastiera
      description: Sistema principale di impugnatura utilizzato per spostare/trasportare
        la custodia per tastiera (oltre alle cinghie).
    keyboard_case_interior_padding_type:
      name: Tipo di imbottitura interna della custodia per tastiera
      description: Metodo di imbottitura/rivestimento interno primario utilizzato
        all'interno della custodia rigida.
    keyboard_case_protection_level:
      name: Livello di protezione della custodia per tastiera
      description: Classe di protezione/rigidità complessiva della custodia rigida,
        che distingue la custodia rigida stampata dalla custodia ad alta resistenza
        da volo/in stile ATA.
    keyboard_case_wheel_type:
      name: Tipo di rotelle della custodia per tastiera
      description: Configurazione delle ruote per custodie rigide che includono le
        ruote.
    keyboard_pedal_connector_type:
      name: Tipo di connettore del pedale della tastiera
      description: Specifica il tipo di connettore/spina utilizzato per collegare
        il pedale sustain a una tastiera o a un pianoforte digitale.
    keyboard_power_supply_type:
      name: Tipo di alimentazione della tastiera
      description: Metodo di alimentazione principale per la tastiera (batteria, adattatore
        CA, alimentazione tramite USB).
    keyboard_stand_tier_type:
      name: Tipo di livello del supporto per tastiera
      description: Indica se il supporto viene venduto solo come base o se include/aggiunge
        un accessorio per un secondo livello.
    keyboard_stand_tiers:
      name: Livelli dello stand per tastiera
      description: Numero di livelli di suono supportati dal supporto a Z (ad esempio,
        a un livello o a due livelli).
    keychain_attachment_type:
      name: Tipo di attacco del portachiavi
      description: Specifica la ferramenta di fissaggio principale utilizzata per
        fissare il portachiavi a chiavi, borse o cinture.
    keychain_style:
      name: Stile del portachiavi
      description: Descrive l'aspetto generale del portachiavi (com'è fisicamente).
    keywork_finish:
      name: Finitura dei tasti
      description: Descrive la finitura/placcatura specificatamente applicata alla
        meccanica (tasti), separatamente dalla finitura del corpo.
    kick_point:
      name: Punto di flessione
      description: Specifica il punto di flessione dell'asta di una mazza da hockey,
        influenzando la velocità di rilascio del tiro e la sensazione di utilizzo.
    kick_zone_grip_system:
      name: Sistema di grip nella zona di spinta
      description: Identifica la tecnologia utilizzata nella zona di spinta dello
        sci per garantire la trazione.
    kickboard_features:
      name: Caratteristiche del kickboard
      description: Evidenzia le caratteristiche speciali del kickboard che migliorano
        l'allenamento o il comfort, inclusi la texture della superficie e le opzioni
        di impugnatura.
    kickboard_handle_style:
      name: Stile di impugnatura del kickboard
      description: Identifica se e in che modo il kickboard offre impugnature o trattamenti
        superficiali che influiscono su manovrabilità e comfort.
    kickstand_mounting_position:
      name: Posizione di montaggio del cavalletto
      description: Indica il punto sul telaio della bicicletta in cui si fissa il
        cavalletto (ad esempio, punto di fissaggio centrale, sul fodero orizzontale,
        sull'asse posteriore).
    kickstand_type:
      name: Tipo di cavalletto
      description: Descrive lo stile strutturale o il meccanismo del cavalletto (ad
        esempio, cavalletto laterale a una gamba, cavalletto centrale a due gambe,
        telescopico).
    kidney_belt_support_level:
      name: Livello di supporto della fascia lombare
      description: Livello di supporto generale designato dal produttore, fornito
        da una fascia lombare per la stabilizzazione della parte bassa della schiena
        e dell'addome.
    kiln_firing_atmosphere:
      name: Atmosfera di cottura in forno
      description: Specifica le atmosfere di cottura che il forno può gestire durante
        il funzionamento (ad esempio, ossidazione o riduzione).
    kiln_heating_element_type:
      name: Tipo di elemento riscaldante del forno
      description: Tipo/materiale degli elementi riscaldanti utilizzati nel forno.
    kingpin_design:
      name: Design del perno
      description: Descrive lo stile costruttivo del perno, che influisce su peso
        e spazio libero per il grind.
    kingpin_orientation:
      name: Orientamento del perno
      description: Identifica l'orientamento del perno del carrello, che influisce
        sulle caratteristiche di guida e sulla compatibilità con il pianale.
    kit_components_included:
      name: Componenti del kit inclusi
      description: Elenca i pezzi singoli forniti nel kit (ad es. picchetti, bulloni,
        cinghie, attrezzo di installazione) in modo che gli acquirenti sappiano esattamente
        cosa stanno acquistando.
    kit_format:
      name: Formato del kit
      description: Specifica come il kit viene imballato e trasportato (ad esempio,
        sacchetto, custodia, scatola).
    kit_items_included:
      name: Articoli del Kit inclusi
      description: Elenca le principali attrezzature e forniture incluse nel kit per
        la produzione di vino, in modo che gli acquirenti possano distinguere il kit
        iniziale dalle ricariche contenenti solo ingredienti.
    kit_pouch_case_type:
      name: Tipo di custodia/cassa del kit
      description: Specifica il tipo di soluzione di stoccaggio inclusa per il kit
        di cura (se presente).
    kit_tools_included:
      name: Attrezzi del kit inclusi
      description: Elenca gli strumenti principali forniti nel kit (se presenti) per
        completare il progetto.
    kite_inflation_system:
      name: Sistema di gonfiaggio dell'aquilone
      description: Indica come vengono gonfiati il bordo d'attacco e i montanti dell'aquilone.
    kite_line_configuration:
      name: Configurazione del filo dell'aquilone
      description: Indica il numero di linee di volo/controllo per cui è progettata
        la vela dell'aquilone, una specifica comune per abbinare correttamente barre
        e linee.
    kite_type:
      name: Tipo di aquilone
      description: Definisce la categoria di progettazione strutturale dell'aquilone
        (forma e tipo di brigliaggio).
    kiteboard_bag_style:
      name: Stile della borsa per tavola da kitesurf
      description: Stile o sottotipo specifico di borsa per tavola da kitesurf ad
        esempio, borsa da tavola, borsa da golf, borsa da viaggio, borsa foil).
    kiwifruit_variety:
      name: Varietà di kiwi
      description: Identifica la specifica cultivar o varietà di colore del kiwi (verde,
        oro, rosso, ecc.).
    knee_pad_pocket_type:
      name: Tipo tasca ginocchiera
      description: Indica se e come il capo è predisposto per l'inserimento di ginocchiere
        protettive.
    knee_pad_style:
      name: Stile della ginocchiera
      description: Descrive lo stile costruttivo o la forma della protezione per il
        ginocchio (ad esempio, manicotto, tutore, protezione).
    knee_protection_design:
      name: Protezione per il ginocchio
      description: Indica il numero di sezioni del ginocchio incernierate integrate
        nella protezione per la gamba.
    kneeboard_construction:
      name: Costruzione del kneeboard
      description: Identifica la tecnica di costruzione principale o il materiale
        composito utilizzato per la realizzazione della tavola (ad esempio, plastica
        stampata a rotazione, stampaggio a compressione, fibra di carbonio).
    kneeboard_strap_type:
      name: Tipo di cinghia della ginocchiera
      description: Descrive il tipo di sistema di cinghie per le ginocchia utilizzato
        per fissare l'utente alla tavola.
    knife_lock_mechanism:
      name: Meccanismo di blocco del coltello
      description: Specifica il meccanismo utilizzato per bloccare la lama di un coltello
        pieghevole in posizione aperta, oppure indica i modelli senza meccanismo di
        bloccaggio.
    knife_locking_mechanism:
      name: Meccanismo di bloccaggio del coltello
      description: Specifica il tipo di meccanismo che blocca la lama in posizione
        aperta, definendo direttamente la sicurezza, la robustezza e la facilità d'uso
        dei coltelli con lama bloccabile.
    knife_opening_mechanism:
      name: Meccanismo di apertura del coltello
      description: Descrive come la lama viene estratta dal manico, distinguendo tra
        apertura manuale, assistita, automatica e speciale.
    knife_system:
      name: Sistema del coltello
      description: Se e come funziona la lama di taglio sulla tagliacuci.
    knit_elastic_application:
      name: Applicazione elastico in maglia
      description: Specifica l'uso previsto per cucito per il bordo elastico in maglia.
    knit_pattern:
      name: Modello della maglia
      description: Identifica il punto o la trama principale della maglia utilizzata
        nel tessuto del cardigan, come trecce, coste o waffle, consentendo all'acquirente
        di trovare trame e proprietà termiche specifiche.
    knit_style:
      name: Stile della maglia
      description: Specifica la principale struttura della maglia, la trama o il motivo
        decorativo presenti sul tessuto del maglione.
    knitting_marker_counter_type:
      name: Tipo di marcatore/contatore per maglieria
      description: Specifica il tipo funzionale di prodotto all'interno di marcatori
        e contatori per maglieria.
    knitting_needle_tip_style:
      name: Stile della punta dell'ago da maglia
      description: Affilatura/forma della punta ottimizzata per diversi filati e tecniche.
    knock_sensor_technology:
      name: Tecnologia del sensore knock
      description: Tecnologia di rilevamento utilizzata nel sensore di detonazione.
    knurl_aggressiveness:
      name: Grado di zigrinatura
      description: Descrive l'incisività o la texture del motivo di zigrinatura sull'asta
        del manubrio, influenzando il comfort e la sicurezza della presa.
    knurl_marking_standard:
      name: Standard di marcatura della zigrinatura
      description: Specifica la posizione degli anelli di riferimento zigrinati utilizzati
        per il posizionamento manuale (ad esempio, marcature IPF o IWF).
    kohlrabi_variety:
      name: Varietà di cavolo rapa
      description: Specifica la cultivar o varietà di mercato del bulbo di cavolo
        rapa, consentendo ai clienti di scegliere tra diversi profili di sapore, taglia
        e colori.
    koji_mold_type:
      name: Tipo di muffa koji
      description: Indica il tipo o ceppo di muffa koji utilizzato durante la fermentazione,
        che influisce su aroma e sapore.
    kumquat_variety:
      name: Varietà di kumquat
      description: Identifica la cultivar o varietà di kumquat offerta, consentendo
        agli acquirenti di selezionare il frutto in base al profilo aromatico, alla
        misura o all'applicazione in cucina.
    label_edge_type:
      name: Tipo di bordo dell'etichetta
      description: Specifica lo stile di finitura del bordo utilizzato per prevenire
        lo sfilacciamento e definire l'estetica.
    label_finish:
      name: Finitura dell'etichetta
      description: Specifica la finitura superficiale, la texture o il rivestimento/trattamento
        protettivo applicato all'etichetta.
    label_finish_edge_style:
      name: Finitura/stile del bordo dell'etichetta
      description: Modo in cui vengono rifiniti i bordi, che influisce sul comfort
        e sulla durata (ad esempio, bordo intrecciato rispetto a bordo tagliato al
        laser).
    label_fold_type:
      name: Tipo di piegatura dell'etichetta
      description: Specifica come è realizzata l'etichetta da cucire a un articolo
        (ad esempio, piega terminale o piega centrale), influenzando il modo in cui
        viene applicata e la sua posizione.
    label_text_type:
      name: Tipo di testo dell'etichetta
      description: Indica se l'etichetta è vuota, prestampata o destinata ad essere
        personalizzata/personalizzata.
    lace_area_size:
      name: Misura dell'area in pizzo
      description: Definisce la taglia o la configurazione della sezione del pizzo
        (ad esempio chiusura 4×4, frontale 13×6), che determina lo spazio di separazione
        disponibile.
    lace_tightener_style:
      name: Stile del sistema tendi-lacci
      description: Identifica il design meccanico o il fattore di forma del dispositivo
        di chiusura dei lacci.
    lace_type:
      name: Tipo di intreccio
      description: Descrive il materiale o la finitura del pizzo all'attaccatura/alla
        cuffia, che influisce sul realismo e sulla corrispondenza con il tono della
        pelle.
    lacrosse_ball_certification:
      name: Certificazione della palla da lacrosse
      description: Specifica l'approvazione o gli standard dell'organismo di governo
        dello sport che la palla da lacrosse soddisfa.
    lacrosse_goal_regulation_certification:
      name: Certificazione per la regolamentazione della rete da lacrosse
      description: Indica se la porta o la rete da lacrosse soddisfano le specifiche
        di un ente di controllo specifico (ad esempio, NCAA o NFHS).
    lacrosse_pocket_type:
      name: Tipo di tasca da lacrosse
      description: Identifica lo stile generale della tasca o della rete montata nella
        testa, influenzando il controllo della palla e il rilascio.
    lacrosse_string_type:
      name: Tipo di stringa per lacrosse
      description: Classifica la forma esatta o l'uso previsto della stringa o del
        mesh, per permettere di distinguere tra pezzi di mesh, kit e ruoli specifici
        delle stringhe all'interno di un pocket.
    ladder_position:
      name: Posizione della scaletta
      description: Indica la posizione della scaletta di accesso al letto a castello.
    lanyard_attachment_hardware:
      name: Aggancio del laccetto
      description: Indica lo stile dell'aggancio all'estremità del laccetto, che si
        collega a chiavi, badge, telefoni o altri accessori.
    lanyard_style:
      name: Stile del cordino
      description: Specifica come il laccetto viene indossato o portato.
    lanyard_type:
      name: Tipo di laccetto
      description: Descrive lo stile del laccetto fornito con il fischietto o compatibile
        con esso.
    lap_hand_loom_accessories_included:
      name: Accessori inclusi con il telaio manuale da grembo
      description: Accessori inclusi nella confezione del telaio manuale da grembo.
    lapel_style:
      name: Stile del risvolto
      description: Specifica il design del risvolto della giacca (ad esempio, a V,
        a punta, a scialle).
    laser_safety_class:
      name: Classe di sicurezza laser
      description: Classificazione di sicurezza laser del prodotto (ad esempio, Classe
        2, 3R, 3B, 4) come indicato nella documentazione/sull'etichettatura del dispositivo.
    latex_processing_method:
      name: Metodo di lavorazione del lattice
      description: Specifica il processo di produzione utilizzato per il lattice in
        schiuma (in genere Dunlop o Talalay) che influisce sulla sensazione al tatto,
        sulla reattività e sul prezzo.
    latex_type:
      name: Tipo di lattice
      description: Indica l'origine e la composizione del lattice utilizzato nel materasso
        (naturale, biologico, sintetico o misto), fornendo informazioni su durata,
        sostenibilità ambientale e potenziali allergeni.
    launch_profile:
      name: Profilo di lancio
      description: Indica la traiettoria di lancio tipica (bassa, media, alta) che
        l'astina della mazza da golf è progettata per produrre.
    launcher_mounting_configuration:
      name: Configurazione di montaggio del lanciatore
      description: Indica come il lanciatore è montato o configurato per l'uso, per
        chi cerca opzioni standalone, sotto la canna o montate su slitta.
    layer_construction:
      name: Costruzione degli strati
      description: Specifica la costruzione laminata del tessuto (ad esempio, 2 strati,
        2,5 strati, 3 strati), che influisce su peso, comprimibilità e durata.
    layer_design:
      name: Struttura a strati
      description: Descrive la costruzione della retina per capelli in termini di
        strati o reversibilità.
    lazy_kate_tension_control_type:
      name: Tipo di controllo della tensione del lazy kate
      description: Indica come il lazy kate applica attrito/tensione ai rocchetti
        durante la ritorcitura o l'avvolgimento.
    lead_hardware_type:
      name: Tipo di hardware del guinzaglio
      description: Definisce lo stile di attacco o chiusura all'estremità del guinzaglio
        (moschettone, clip, anello, catena, ecc.), con impatto su facilità d'uso,
        sicurezza e adeguatezza all'uso previsto.
    leaf_gelatin_grade:
      name: Grado della gelatina in fogli
      description: Specifica il grado di resistenza standardizzato utilizzato per
        i fogli di gelatina.
    leaf_preparation:
      name: Preparazione delle foglie
      description: Descrive come vengono preparati i fogli prima di essere confezionati,
        ad esempio tritati, sminuzzati o tagliati a julienne.
    leaf_spring_material:
      name: Materiale della molla a balestra
      description: Materiale di costruzione principale del pacco di molle a balestra.
    leak_protection_layer:
      name: Strato di protezione dalle perdite
      description: Indica se il sistema di pannolino integrato nello slip da nuoto
        utilizza una struttura a singolo o doppio strato per la protezione dalle perdite.
    leash_clip_type:
      name: Tipo di clip per guinzaglio
      description: Specifica lo stile di clip o hardware utilizzato per agganciare
        il guinzaglio a un collare o pettorina (ad esempio, moschettone a scatto,
        moschettone a vite, clip girevole).
    leash_style:
      name: Stile del guinzaglio
      description: Descrive la configurazione del cavo o lo stile di avvolgimento
        del guinzaglio.
    leash_type:
      name: Tipo di guinzaglio
      description: Classifica lo stile generale o la configurazione funzionale del
        guinzaglio per un rapido filtraggio in base all'uso previsto.
    leavening_action_type:
      name: Tipo di agente lievitante
      description: Indica la formulazione chimica o la tipologia dell'agente lievitante
        del lievito chimico in polvere (ad esempio, a semplice azione, a doppia azione,
        senza alluminio). Questo influisce direttamente sulle prestazioni in cottura
        e sull'idoneità alla ricetta.
    leavening_agent:
      name: Agente lievitante
      description: Specifica il principale meccanismo di lievitazione utilizzato nell'impasto.
    led_color_options:
      name: Opzioni di colore LED
      description: Elenca i colori LED selezionabili disponibili sull'allarme per
        l'indicazione visiva dell'abboccata.
    led_indicator_color:
      name: Colore dell'indicatore LED
      description: Indica il colore dell'indicatore LED del prodotto, consentendo
        agli appassionati di pesca di abbinare più allarmi o di soddisfare le preferenze
        personali.
    led_light_color:
      name: Colore della luce LED
      description: Specifica il colore dell'eventuale illuminazione LED integrata.
    leek_variety:
      name: Varietà di porro
      description: Specifica la cultivar o la varietà del porro, consentendo di distinguere
        per sapore, dimensioni e stagione di coltivazione.
    leg_coverage:
      name: Copertura della gamba
      description: Specifica la lunghezza della gamba della muta (ad esempio, corta,
        intera).
    leg_cuff_style:
      name: Stile del fondo gamba
      description: Specifica lo stile di finitura dell'apertura alla caviglia.
    leg_cut_height:
      name: Altezza del taglio della gamba
      description: Indica l'altezza del taglio dell'apertura della gamba sul pezzo
        inferiore del bikini.
    leg_cut_style:
      name: Stile del taglio della gamba
      description: Descrive la forma dell'apertura della gamba, che influisce sull'aspetto,
        sul comfort e sulle linee di abbronzatura.
    leg_length:
      name: Lunghezza della gamba
      description: Categorizza i boxer da bagno in base alla lunghezza relativa della
        gamba (corta, media, lunga), per consentire la scelta della copertura preferita
        senza frammentare la categoria.
    leg_loop_type:
      name: Tipo di asola per le gambe
      description: Descrive il design dei passanti per le gambe.
    leg_opening_style:
      name: Stile dell'apertura della gamba
      description: Specifica come vengono rifinite le aperture delle gambe dei pantaloni
        da jogging, ad esempio con fondo elasticizzato, orlo a coste o aperto.
    leg_style:
      name: Stile gamba
      description: Definisce il design o lo stile costruttivo delle gambe o della
        base della panca.
    legging_foot_design:
      name: Design del piede dei leggings
      description: Specifica se i leggings sono senza piede, con piede o convertibili
        tra i due modelli.
    leggings_waistband_style:
      name: Leggings con elastico in vita
      description: Specifica il design strutturale della fascia in vita dei leggings,
        con impatto su comfort, sostegno ed estetica.
    lei_closure_style:
      name: Stile di chiusura del lei
      description: Descrive se il lei è un anello continuo o ha le estremità aperte
        da annodare o fissare con un nastro.
    lemon_variety:
      name: Varietà di limone
      description: Specifica la cultivar o la varietà di limone (ad esempio, Eureka,
        Meyer, Amalfi).
    length_adjustment_method:
      name: Metodo di regolazione della lunghezza
      description: Indica se e come la lunghezza della corda per saltare può essere
        regolata in base all'utente.
    lens_color_tint:
      name: Colore/tinta delle lenti
      description: Colore o tinta delle lenti degli occhiali protettivi forniti con
        il prodotto.
    lens_construction:
      name: Costruzione della lente
      description: Specifica la struttura della lente (ad esempio, monostrato, doppio
        strato termico) per indicare la resistenza all'appannamento e le prestazioni
        ottiche.
    lens_tint_category:
      name: Categoria della tinta della lente
      description: Classifica l'oscuramento della lente in base alle categorie di
        tinta internazionali, per facilitare la scelta delle lenti adatte alle diverse
        condizioni di luce.
    lettuce_variety:
      name: Varietà di lattuga
      description: Specifica la varietà orticola di lattuga (ad esempio, Iceberg,
        Romana, Cappuccina), per un filtraggio e un confronto precisi.
    level_of_play:
      name: Livello di gioco
      description: Fascia di prestazione dichiarata dal produttore, in linea con il
        livello competitivo e il budget del giocatore.
    lever_configuration:
      name: Configurazione della leva
      description: Indica la configurazione della leva/maniglia del controllo motore
        dell'imbarcazione (ad esempio, monoleva o doppia leva).
    lever_type:
      name: Tipo di leva
      description: Tipo/meccanismo delle leve di variazione dell'intonazione installate
        sulle corde dell'arpa.
    license_plate_cover_style:
      name: Stile della cover per targa
      description: Specifica lo stile costruttivo della cover per targa (ad esempio,
        copertura integrale o cappucci per viti).
    license_plate_personalization_type:
      name: Tipo di personalizzazione della targa
      description: Specifica se la targa è vuota, prestampata o supporta la personalizzazione
        da parte dell'acquirente (testo e/o grafica).
    license_usage_terms:
      name: Termini di licenza/utilizzo
      description: Diritti di utilizzo del modello (ad esempio, solo per uso personale
        o uso commerciale limitato).
    licensed_sports_property:
      name: Proprietà sportiva sotto licenza ufficiale
      description: Indica se il prodotto è realizzato sotto licenza ufficiale di una
        lega, una squadra o un'organizzazione.
    lid_hinge_mechanism:
      name: Meccanismo della cerniera del coperchio
      description: Specifica il meccanismo di cerniera utilizzato per il coperchio,
        con impatto sulla sicurezza e sulla facilità d'uso.
    lid_support_positions:
      name: Posizioni di supporto del coperchio
      description: Specifica le posizioni di supporto dell'asta del coperchio per
        il pianoforte a coda (l'ampiezza di apertura del coperchio).
    lie_angle_color_code:
      name: Codice colore dell'angolo di lie
      description: Indica il sistema cromatico del produttore per la codifica dell'angolo
        di lie su alcune mazze (ad esempio, punto nero, punto verde).
    life_jacket_certification_standard:
      name: Standard di certificazione del giubbotto di salvataggio
      description: Classificazione o standard di sicurezza ufficiale soddisfatto dal
        prodotto, ad esempio le tipologie USCG o i livelli ISO/AS.
    life_raft_certification_standard:
      name: Standard di certificazione della zattera di salvataggio
      description: Standard di sicurezza/certificazione a cui il canotto è costruito
        e revisionato per conformarsi.
    life_raft_container_type:
      name: Tipo di contenitore del canotto di salvataggio
      description: Indica come il canotto di salvataggio è imballato per lo stivaggio
        e il dispiegamento.
    life_vest_approval_standard:
      name: Standard di approvazione del giubbotto di salvataggio
      description: Specifica lo standard di certificazione/omologazione a cui il giubbotto
        di salvataggio è conforme.
    life_vest_intended_user:
      name: Categoria di destinatari del giubbotto di salvataggio
      description: Indica la categoria di destinatari prevista per vestibilità e dotazione.
    lifebuoy_approval_standard:
      name: Standard di omologazione del salvagente anulare
      description: Standard o omologazione di sicurezza a cui il salvagente anulare
        è conforme (ad esempio, USCG/SOLAS).
    lifebuoy_features:
      name: Caratteristiche del salvagente anulare
      description: Caratteristiche di sicurezza funzionale, montaggio/maneggevolezza
        e accessori inclusi per i salvagente anulari.
    lift_mechanism_type:
      name: Tipo di meccanismo di sollevamento
      description: Specifica il meccanismo che assiste nel sollevamento/abbassamento
        o nell'apertura/chiusura del letto a muro.
    lift_stand_support_point:
      name: Punto di appoggio del sollevatore/cavalletto
      description: Indica il punto in cui il sollevatore o il cavalletto entra in
        contatto con il veicolo e lo sostiene.
    lifting_gas_type:
      name: Tipo di gas di sollevamento
      description: Specifica il principale gas di sollevamento o mezzo di galleggiamento
        utilizzato dal dirigibile.
    lifting_support_type:
      name: Tipo di supporto di sollevamento
      description: Indica se il sollevatore prevede l'accesso tramite rampe di salita
        o il sollevamento tramite bracci/pattini a contatto con il telaio o i punti
        di sollevamento.
    ligature_and_cap_component_type:
      name: 'Tipo di componente: legatura e/o cappuccio'
      description: Indica se il prodotto è una legatura, un cappuccio o un set che
        include entrambi.
    ligature_material:
      name: Materiale di legatura
      description: Materiale principale del corpo della legatura a contatto con l'ancia
        e che la mantiene in posizione (ad esempio, metallo, pelle, tessuto).
    ligature_plating_or_finish:
      name: Placcatura o finitura della legatura
      description: Specifica la placcatura e/o la finitura superficiale applicata
        alla legatura in metallo per clarinetto e/o al cappuccio.
    ligature_reed_contact_style:
      name: Stile di contatto della legatura con l'ancia
      description: Specifica come la legatura entra in contatto con l'ancia (ad esempio,
        contatto minimo, multipunto, avvolgente).
    ligature_screw_position_relative_to_reed:
      name: Posizione della vite di legatura (rispetto all'ancia)
      description: Indica la posizione della/e vite/i di serraggio della legatura
        rispetto all'ancia/al lato rivolto verso il musicista quando è installata
        sul bocchino.
    ligature_tension_adjustment_mechanism:
      name: Meccanismo di regolazione della tensione della legatura
      description: Descrive come la legatura applica e regola la pressione sull'ancia
        (design di fissaggio).
    ligature_tightening_mechanism_type:
      name: Tipo di meccanismo di serraggio della legatura
      description: Specifica il meccanismo con cui la legatura si stringe attorno
        al bocchino e all'ancia (ad esempio, vite singola, doppia vite, leva/sgancio
        rapido).
    light_bar_housing_material:
      name: Materiale della scocca della barra luminosa
      description: Materiale principale della scocca/corpo della barra luminosa, con
        impatto sulla durata e sulla dissipazione del calore.
    light_bar_lens_material:
      name: Materiale della lente della barra luminosa
      description: Materiale principale della lente/copertura della barra luminosa,
        che può influire sulla resistenza agli urti e sulla nitidezza ottica.
    light_bar_mounting_location:
      name: Posizione di montaggio della barra luminosa
      description: Posizione di montaggio principale prevista sul veicolo.
    light_stand_style:
      name: Stile del supporto per luci
      description: Specifica lo stile strutturale o il fattore di forma del supporto
        per luci da effetto speciale (ad esempio, treppiede, barra a T, con manovella),
        escludendo la superficie di installazione (parete/soffitto), acquisita dal
        tipo di montaggio.
    light_switch_function:
      name: Funzione dell'interruttore luci
      description: Indica quale circuito o funzione di illuminazione viene controllato
        dall'interruttore.
    lighting_control_protocols_supported:
      name: Protocolli di controllo dell'illuminazione supportati
      description: Protocolli di controllo/rete supportati dal controller in aggiunta
        o in alternativa al DMX512.
    lighting_effects:
      name: Effetti di illuminazione
      description: Specifica eventuali funzionalità di illuminazione integrate che
        migliorano l'esperienza o l'estetica di gioco.
    lighting_mode:
      name: Modalità di illuminazione
      description: Elenca le modalità operative di illuminazione disponibili, ad esempio
        luce fissa, lampeggiante, strobo o SOS.
    lily_variety:
      name: Varietà di giglio
      description: Specifica la varietà commerciale/botanica di giglio venduto come
        fiore reciso fresco (ad esempio, Asiatico, Orientale).
    limb_articulation:
      name: Articolazione degli arti
      description: Indica il grado di flessibilità o articolazione degli arti del
        manichino (nessuna, fissi, semiflessibili, completamente articolati).
    limb_material:
      name: Materiale del braccio
      description: Materiale principale utilizzato nelle lame di un arco o di una
        balestra, con impatto su peso, durata, vibrazione e prestazioni complessive.
    lime_variety:
      name: Varietà di lime
      description: Specifica la varietà botanica o commerciale di lime in vendita.
    line_buoyancy:
      name: Galleggiabilità della lenza
      description: Descrive se il trecciato galleggia o affonda naturalmente e a quale
        velocità, influenzando la presentazione delle esche e la gestione del filo.
    line_purpose:
      name: Scopo della lenza
      description: Definisce la funzione prevista del cavo all'interno del sistema
        dell'aquilone (ad esempio, cavo di volo anteriore, cavo di depotenza, briglia).
    linen_finish_treatment:
      name: Finitura/trattamento del lino
      description: Qualsiasi processo di finitura applicato al tessuto di lino che
        ne modifica la mano, l'aspetto o le prestazioni.
    linen_weave_type:
      name: Tipo di armatura del lino
      description: Specifica la costruzione dell'armatura del tessuto di lino, che
        influisce su texture, traspirabilità e caduta.
    liner_padding_type:
      name: Tipo di imbottitura del paracolpi
      description: Indica lo stile costruttivo o di imbottitura del paracolpi (ad
        esempio, in rete, leggermente imbottito, trapuntato).
    liner_shape:
      name: Forma del sacco interno
      description: Descrive la forma generale del sacco interno per consentire di
        abbinarlo al sacco a pelo e alle preferenze di comfort.
    liner_type:
      name: Tipo di fodera interna
      description: Indica se i pantaloncini includono una fodera interna e, in caso
        affermativo, il tipo.
    lining:
      name: Fodera
      description: Indica se e come lo slip da bagno è foderato, inclusa l'estensione
        della copertura interna del capo.
    lining_material:
      name: Materiale del rivestimento
      description: Specifica il materiale utilizzato per la fodera interna della scarpa,
        con impatto su comfort, traspirabilità e calore.
    lining_type:
      name: Tipo di fodera
      description: Specifica se il capo da bagno è foderato e in quale misura.
    link_connection_style:
      name: Stile di collegamento delle maglie
      description: Classifica il modo in cui la maglia si unisce alla catena (ad esempio,
        maglia rapida, perno di collegamento), per consentire la scelta del metodo
        di installazione o del ricambio corretto.
    live_bait_form:
      name: Forma di esca viva
      description: Specifica la forma fisica o lo stato di conservazione dell'esca,
        ad esempio viva, congelata o essiccata.
    living_room_furniture_items_included:
      name: Articoli di arredo per soggiorno inclusi
      description: Specifica i singoli elementi di arredo che compongono il set per
        soggiorno, per una rapida comprensione dei componenti inclusi (ad esempio,
        divano, divano a due posti, tavolino).
    load_mechanism:
      name: Meccanismo di carica
      description: Specifica il metodo principale con cui la resistenza viene generata
        o aggiunta alla macchina (ad esempio, selettore a peso, con dischi, con elastici).
    lock_cylinder_type:
      name: Tipo di cilindro della serratura
      description: Specifica il tipo di cilindro/nucleo della serratura utilizzato
        (rilevante per la resistenza allo scasso e alle chiavi di riserva).
    lock_security_level:
      name: Livello di sicurezza della serratura
      description: Descrive le caratteristiche di resistenza della serratura/cilindro
        contro lo scasso e la foratura.
    lock_system:
      name: Sistema di bloccaggio
      description: Tipo di sistema di bloccaggio di sicurezza utilizzato per mantenere
        il sollevatore in quota.
    locker_bench_configuration:
      name: Configurazione della panchina spogliatoio
      description: Descrive l'orientamento o la configurazione strutturale della panchina
        spogliatoio (ad esempio, monolaterale, isola bilaterale, bilaterale, a parete).
    locomotive_prototype_power_type:
      name: Tipo di propulsione del prototipo di locomotiva
      description: Specifica il tipo di propulsione della locomotiva reale rappresentata
        dal modello.
    locomotive_wheel_arrangement_whyte_notation:
      name: Disposizione delle ruote della locomotiva (notazione Whyte)
      description: Disposizione delle ruote del prototipo di locomotiva (ad esempio,
        Pacific 4-6-2).
    loft_bed_height_classification:
      name: Classificazione dell'altezza del letto a soppalco
      description: Indica lo stile di altezza generale del letto a soppalco (bassa,
        media, alta, extra-alta), per abbinarlo all'altezza del soffitto e allo spazio
        disponibile sotto il letto.
    logo_application_method:
      name: Metodo di applicazione del logo
      description: Descrive come lo stemma o il logo della scuola vengono applicati
        al capo di abbigliamento (ad esempio, ricamato o stampato).
    logo_label_compatible_fabric_weight:
      name: Grammatura del tessuto compatibile con l'etichetta logo
      description: GCategoria di grammatura del tessuto consigliata per applicare
        l'etichetta senza deformazioni o rigonfiamenti.
    logo_label_edge_finish:
      name: Finitura del bordo dell'etichetta logo
      description: Specifica la costruzione/finitura del bordo dell'etichetta, con
        impatto sulla resistenza allo sfilacciamento e sul comfort a contatto con
        la pelle.
    logo_label_print_production_method:
      name: Metodo di stampa/produzione dell'etichetta logo
      description: Modalità di applicazione/formazione del logo sulla superficie dell'etichetta.
    long_block_completeness:
      name: Completezza del long block
      description: Specifica i principali componenti inclusi nel gruppo long block.
    long_john_pieces_included:
      name: Pezzi del long john inclusi
      description: Indica se il prodotto include solo il pantalone, solo la maglia
        o entrambi i pezzi del set long john.
    longan_variety:
      name: Varietà di longan
      description: Specifica la cultivar o la varietà commerciale del frutto di longan
        (ad esempio, Kohala, Biew Kiew) per identificare le caratteristiche di gusto,
        dimensione e dolcezza desiderate.
    loom_accessories_included:
      name: Accessori per telaio inclusi
      description: Accessori principali inclusi con il telaio nella confezione.
    loom_finish:
      name: Finitura del telaio
      description: La finitura superficiale del telaio (principalmente per i telai
        in legno).
    loom_folding_portability_design_type:
      name: Tipo di design pieghevole/portabilità del telaio
      description: Indica se e come il telaio si piega o si compatta per il trasporto
        o la conservazione in spazi ridotti.
    loom_frame_folding_design:
      name: Design di piegatura del telaio
      description: Specifica se e come il telaio da tavolo si piega, si compatta o
        si smonta per la conservazione o il trasporto.
    loom_tension_adjustment_method:
      name: Metodo di regolazione della tensione del telaio
      description: Metodo principale utilizzato per regolare la tensione dell'ordito
        sul telaio.
    loom_tie_up_system:
      name: Sistema di collegamento del telaio
      description: Tipo di sistema di collegamento utilizzato tra pedali, lamme e
        licci (ad esempio, Texsolv o catena metallica).
    loquat_variety:
      name: Varietà di nespola
      description: Specifica la cultivar o varietà di nespola, indicando le differenze
        di dimensione, sapore, periodo di maturazione e aspetto.
    lubricant_features:
      name: Caratteristiche del lubrificante
      description: Evidenzia le caratteristiche prestazionali speciali, gli additivi
        o i vantaggi del lubrificante.
    lubrication_requirement:
      name: Requisiti di lubrificazione
      description: Indica se il nastro del tapis roulant è pretrattato/esente da manutenzione
        o richiede una lubrificazione o ceratura periodica.
    lubrication_type:
      name: Tipo di lubrificazione
      description: Specifica le caratteristiche di lubrificazione/ingrassabilità del
        cuscinetto e se è progettato per la manutenzione con grasso (ad esempio, scanalature
        o raccordo zerk).
    lug_nut_seat_profile:
      name: Profilo della sede del dado ruota
      description: Specifica il profilo della sede del dado ruota richiesto dal cerchio
        per garantire la corretta compatibilità e un'installazione sicura.
    lumbar_support_type:
      name: Tipo di supporto lombare
      description: Descrive lo stile di supporto lombare fornito con la sedia (ad
        esempio, cuscino rimovibile, meccanismo regolabile, massaggio).
    lunge_trainer_style:
      name: Stile del lunge trainer
      description: Definisce il design strutturale del lunge trainer.
    lure_buoyancy:
      name: Galleggiabilità dell'esca
      description: Specifica il comportamento dell'esca nella colonna d'acqua a riposo
        o durante il recupero (ad esempio, galleggiante in superficie, sospesa a mezza
        acqua o affondante).
    luster:
      name: Lucido
      description: Descrive il modo in cui la luce interagisce con la superficie del
        campione (ad esempio, vitreo, metallico).
    lychee_cultivar:
      name: Cultivar di litchi
      description: Identifica la varietà o cultivar specifica del litchi (ad esempio
        Brewster, Hak Ip o Mauritius) che può differire per sapore, dimensione del
        seme, stagione di raccolta e prezzo.
    lyre_flip_folder_mounting_location:
      name: Posizione di montaggio della lira/portafogli
      description: Indica dove la lira o il portafogli è destinato a essere montato
        sullo strumento o sull'accessorio (ad esempio, campana, bocchino, leggio).
    lyrics_display_type:
      name: Tipo di visualizzazione del testo
      description: Indica come vengono visualizzati i testi (se supportati) durante
        il karaoke.
    magazine_compatibility:
      name: Compatibilità con il caricatore
      description: Identifica i calibri o i tipi di caricatore principali che le tasche
        integrate nel gilet sono progettate per contenere.
    magnet_requirement:
      name: Requisiti del magnete
      description: Indica se il sensore necessita di un magnete esterno per funzionare.
    magnet_toy_storage_included:
      name: Custodia inclusa per il giocattolo magnetico
      description: Tipo di custodia/contenitore incluso con il giocattolo magnetico
        per l'organizzazione sulla scrivania e il trasporto.
    malanga_variety:
      name: Varietà di malanga
      description: Identifica la varietà specifica di malanga/taro in vendita, per
        scegliere il sapore, il colore o l'utilizzo culinario desiderato.
    malt_color_rating_system:
      name: Sistema di classificazione del colore del malto
      description: Specifica a quale scala cromatica si riferisce il colore indicato
        (Lovibond, SRM o EBC).
    malt_crush:
      name: Macinazione del malto
      description: Indica se il malto base è venduto integro/non macinato o pre-macinato
        e, in quest'ultimo caso, lo stile di macinazione.
    malt_form:
      name: Forma di malto
      description: Indica se il prodotto viene venduto in chicchi interi o lavorato
        per l'ammostamento (ad esempio, macinato).
    malt_intended_use:
      name: Uso previsto del malto
      description: Utilizzo principale previsto per il malto (birrificazione, distillazione
        o uso duale).
    malt_treatment:
      name: Variante di malto
      description: Descrive come il cereale/malto è stato lavorato oltre la tostatura
        standard (processi speciali comuni).
    malt_usage_purpose:
      name: Scopo di utilizzo del malto
      description: Descrive il contributo funzionale principale di un malto speciale
        a una ricetta di birra.
    man_overboard_system_type:
      name: Tipo di sistema uomo a mare
      description: Specifica la categoria principale di soluzione uomo a mare (MOB)
        fornita dal prodotto.
    mandolin_back_sides_wood:
      name: Legno di fondo e fasce del mandolino
      description: Specifica il legno utilizzato per il fondo e le fasce del mandolino.
    mandolin_body_top_wood:
      name: Legno della tavola armonica del mandolino
      description: Materiale/legno principale utilizzato per la tavola armonica del
        mandolino.
    mandolin_bridge_type:
      name: Tipo di ponticello del mandolino
      description: Specifica lo stile del ponte utilizzato sul mandolino.
    mandolin_pickup_configuration:
      name: Configurazione del pickup del mandolino
      description: Indica se il mandolino include componenti elettronici e che tipo
        di sistema di pick-up è installato.
    mandolin_string_configuration:
      name: Configurazione delle corde del mandolino
      description: Specifica la configurazione delle corde del mandolino in termini
        di numero totale di corde e cori (ad esempio, 8 corde/4 cori).
    mangosteen_variety:
      name: Varietà di mangostano
      description: Identifica la specie o cultivar specifica di mangostano o del frutto
        Garcinia strettamente correlato in vendita.
    mannequin_style:
      name: Stile del manichino
      description: Descrive il design strutturale o lo stile costruttivo del manichino
        da allenamento.
    manufacturing_process:
      name: Processo di produzione
      description: Metodo di produzione principale del corpo del mulinello o della
        bobina (ad esempio, lavorazione CNC, pressofusione).
    map_coverage_sky_planet_body:
      name: Copertura della mappa (cielo/corpo planetario)
      description: 'Indica cosa rappresenta la mappa: il cielo notturno (costellazioni)
        o uno specifico corpo planetario.o.'
    map_format:
      name: Formato della mappa
      description: Definisce la presentazione fisica o digitale di mappe e guide di
        caccia.
    map_sensor_output_signal_type:
      name: Tipo di segnale di uscita del sensore MAP
      description: Specifica il tipo di segnale di uscita che il sensore MAP fornisce
        all'unità di controllo del motore (ECU).
    map_size_sheet:
      name: Dimensioni della mappa (foglio)
      description: Specifica le dimensioni finite del foglio mappa/poster/planisfero
        per facilitare l'esposizione e la compatibilità (dimensioni della cornice,
        spazio a parete).
    marabou_feather_form:
      name: Forma della piuma di marabù
      description: Il formato del prodotto in piume di marabù così come venduto.
    marabou_feather_treatment:
      name: Trattamento della piuma di marabù
      description: Indica come la piuma di marabù è stata lavorata o rifinita per
        uso creativo.
    marble_track_set_feature_modules:
      name: Moduli speciali del set pista per biglie
      description: Evidenzia i moduli funzionali speciali inclusi nel set (ad esempio,
        elevatore, lanciatore, deviazioni).
    marine_flare_certification_standard:
      name: Certificazione/standard del razzo di segnalazione marino
      description: Indica le certificazioni o gli standard di sicurezza marittima
        che il razzo di segnalazione dichiara di soddisfare.
    marine_safety_standard_compliance:
      name: Conformità agli standard di sicurezza marittima
      description: Indica gli standard formali di sicurezza in acqua o le omologazioni
        soddisfatte dall'accessorio.
    marine_transmission_type:
      name: Tipo di trasmissione marina
      description: Specifica il tipo di trasmissione marina abbinata al motore entrobordo
        (ad esempio, trasmissione diretta o V-drive).
    marker_action_type:
      name: Tipo di azione del marcatore
      description: Descrive il meccanismo di sparo/funzionamento fondamentale del
        marker.
    marker_caliber:
      name: Calibro del marker
      description: Specifica il diametro delle pallottole di vernice che il marker
        è progettato per sparare.
    marking_durability:
      name: Durata della marcatura
      description: Indica per quanto tempo la linea tracciata dovrebbe rimanere visibile
        in condizioni normali, ad esempio temporanea (fino a 3 settimane), semipermanente
        (fino a 6 mesi) o permanente (oltre 6 mesi).
    marking_tip_type:
      name: Tipo di punta di marcatura
      description: Tipo di inserto di marcatura utilizzato dal compasso per disegnare
        (ad esempio, portamine, inchiostro o punta da tracciatura).
    marshmallow_processing_method:
      name: Metodo di lavorazione del marshmallow
      description: Descrive eventuali lavorazioni speciali applicate ai marshmallow
        che influiscono su consistenza, durata o sapore.
    marshmallow_size:
      name: Dimensione del marshmallow
      description: Classifica la dimensione relativa dei singoli pezzi di marshmallow.
    martial_arts_belt_rank:
      name: Grado della cintura di arti marziali
      description: Indica il livello di abilità/grado rappresentato dal colore o dalla
        combinazione di colori speciale della cintura.
    mask_bib_type:
      name: Tipo di bavaglino della maschera
      description: Specifica il tipo di bavaglino della maschera da scherma, ad esempio
        in tessuto standard, conduttivo, rimovibile o assente.
    mask_cage_material:
      name: Materiale della griglia della maschera
      description: Materiale utilizzato specificamente per la griglia facciale o il
        telaio della maschera.
    mask_goggle_design:
      name: Design della maschera/occhiali protettivi
      description: Definisce il design strutturale generale o lo stile di copertura
        del dispositivo di protezione.
    mask_skirt_material:
      name: Materiale della gonna della maschera
      description: Identifica il materiale della guarnizione morbida che garantisce
        la tenuta stagna tra la maschera e il viso.
    mask_strap_material:
      name: Materiale del cinturino della maschera
      description: Specifica il materiale del cinturino che fissa la maschera alla
        testa.
    mass_air_flow_sensor_measurement_type:
      name: Tipo di misurazione del sensore di flusso d'aria
      description: Specifica la tecnologia di rilevamento/lo stile di uscita del sensore
        MAF.
    mass_air_flow_sensor_mounting_type:
      name: Tipo di montaggio del sensore di portata d'aria
      description: Indica come il sensore MAF o il gruppo sensore è montato/installato
        nel sistema di aspirazione.
    massage_feature:
      name: Funzione massaggio
      description: Indica se la base regolabile include una funzione massaggio integrata
        e, in caso affermativo, quante zone di massaggio offre.
    mast_attachment_interface:
      name: Interfaccia di collegamento dell'albero
      description: Specifica lo standard di connessione tra la fusoliera e l'albero,
        per verificare la compatibilità dei componenti.
    mast_base_type:
      name: Tipo di base dell'albero
      description: Identifica l'interfaccia di montaggio che collega l'albero alla
        tavola o all'adattatore.
    mast_bend_curve:
      name: Curva di flessione dell'albero
      description: Schema di flessione dell'albero che determina la compatibilità
        con la vela e la manovrabilità.
    mast_diameter_type:
      name: Tipo di diametro dell'albero
      description: Classificazione standardizzata del diametro dell'albero da windsurf
        (ad esempio, RDM, SDM, MDM) utilizzata per le verifiche di compatibilità.
    mat_backing_type:
      name: Tipo di supporto del tappetino
      description: Specifica il tipo di supporto presente sul lato inferiore del tappetino,
        che contribuisce a mantenerlo in posizione su diverse superfici.
    mat_installation_method:
      name: Metodo di installazione del tappeto
      description: Indica come il tappetino viene installato o fissato in posizione.
    mat_style:
      name: Stile del tappetino
      description: Definisce lo stile strutturale o il formato del tappetino (ad esempio,
        tappetino pieghevole, piastrella a incastro, crash pad).
    maternity_panel_type:
      name: Tipo di pannello premaman
      description: Indica lo stile del pannello elasticizzato o del elastico vita
        progettato per adattarsi alla pancia in crescita durante la gravidanza.
    maternity_waistband_style:
      name: Modello della fascia in vita premaman
      description: Indica il design e il posizionamento dell'elastico vita o del pannello
        per il pancione specifico dei pantaloni premaman, descrivendo come il capo
        sostiene il ventre in crescita.
    mattress_top_type:
      name: Tipo di superficie del materasso
      description: Specifica lo stile dello strato superiore o della costruzione superficiale
        del materasso, ad esempio pillow top o top liscio.
    maturation_vessel_material:
      name: Materiale del contenitore di maturazione
      description: Specifica il materiale principale del recipiente o della botte
        utilizzata per l'invecchiamento dello shōchū.
    maximum_quilt_size_supported:
      name: Dimensione massima del quilt supportata
      description: La dimensione massima del quilt o del progetto che il telaio può
        ospitare (generalmente descritta in termini di dimensioni del letto o larghezza
        massima).
    meal_course:
      name: Portata
      description: Identifica la tipica occasione di consumo del prodotto.
    meal_preparation_state:
      name: Stato di preparazione del pasto
      description: Indica il grado di preparazione necessario prima del consumo (ad
        esempio, pronto al consumo, kit pasto).
    meat_processing_state:
      name: Stato di lavorazione della carne
      description: Indica il grado di cottura o stagionatura applicato al prodotto
        a base di carne prima della vendita.
    meat_quality_grade:
      name: Grado di qualità della carne
      description: Indica il grado di qualità o la classificazione assegnata alla
        carne da un ente di certificazione riconosciuto (ad esempio, USDA, MSA, Wagyu).
    meat_raising_claim:
      name: Dichiarazione sull'allevamento
      description: Evidenzia le principali dichiarazioni relative al benessere animale
        o alle pratiche di allevamento (ad esempio, allevato al pascolo o all'aperto).
    mechanical_loom_assembly_status:
      name: Stato di assemblaggio del telaio meccanico
      description: Indica in quale stato il telaio viene spedito o consegnato in termini
        di montaggio necessario.
    mechanical_loom_weaving_type:
      name: Tipo di tessitura del telaio meccanico
      description: Meccanismo/tipo di tessitura principale supportato dal telaio.
    mechanical_puzzle_primary_mechanism:
      name: Meccanismo primario del puzzle meccanico
      description: Interazione/meccanismo principale utilizzato per risolvere il puzzle
        meccanico.
    mechanical_puzzle_solution_format:
      name: Formato della soluzione del puzzle meccanico
      description: Formato in cui vengono forniti suggerimenti/soluzioni, se disponibili.
    medal_attachment_style:
      name: Stile di attacco della medaglia
      description: Specifica come la medaglia è destinata a essere indossata o esposta
        (ad esempio, nastro da collo, spilla).
    medal_award_level:
      name: Livello del premio della medaglia
      description: Specifica il livello del premio rappresentato dalla medaglia (ad
        esempio, 1° posto, partecipante).
    medal_finish:
      name: Finitura della medaglia
      description: Specifica la finitura superficiale della medaglia (lucentezza/texture
        visiva), indipendentemente dal materiale.
    medal_packaging:
      name: Confezione della medaglia
      description: Indica il tipo di confezione di presentazione inclusa con la medaglia.
    melodica_accessory_set_included:
      name: Accessori inclusi con la melodica
      description: Indica quali accessori comuni sono inclusi nella confezione della
        melodica.
    melodica_air_chamber_material:
      name: Materiale della camera d'aria della melodica
      description: Il materiale della camera d'aria/corpo della melodica (ABS, legno,
        ecc.) quando i venditori lo distinguono dalle altre parti.
    melodica_included_accessories:
      name: Accessori inclusi della melodica
      description: Accessori inclusi nella confezione della melodica.
    melodica_key_color_scheme:
      name: Schema cromatico dei tasti della melodica
      description: Schema cromatico dei tasti (non del corpo), che influisce sulla
        leggibilità (in particolare per bambini e principianti).
    melodica_mouthpiece_configuration:
      name: Configurazione del bocchino della melodica
      description: Indica le interfacce di soffiaggio incluse o utilizzate per suonare
        la melodica.
    melodica_mouthpiece_type:
      name: Tipo di bocchino della melodica
      description: Stile di interfaccia di soffiaggio incluso con la melodica (bocchino
        e/o tubo flessibile).
    melodica_reed_plate_material:
      name: Materiale della piastra delle ance della melodica
      description: Il materiale della piastra delle ance (distinto dal materiale generale
        del corpo dello strumento), che può influire sulla durata e sul timbro.
    melodica_size_class:
      name: Classe di dimensione della melodica
      description: Classe generale di dimensione/portabilità della melodica, tipicamente
        basata sul numero di tasti e sul fattore di forma (ad esempio, mini/per studenti,
        standard o a gamma estesa).
    melon_variety:
      name: Varietà di melone
      description: Specifica il tipo specifico di melone nel prodotto per identificare
        rapidamente la varietà preferita.
    memory_foam_infusion_material:
      name: Materiale di infusione della memory foam
      description: Identifica le sostanze speciali infuse nella memory foam per il
        raffreddamento, il controllo degli odori o scopi antimicrobici.
    memory_wire_gauge:
      name: Calibro del memory wire
      description: Specifica la dimensione in American Wire Gauge (AWG) del memory
        wire.
    memory_wire_project_size:
      name: Dimensione del progetto in memory wire
      description: Specifica la forma di gioiello/dimensione della spirale per cui
        il memory wire è sagomato (ad esempio, bracciale, collana, anello).
    metal_purity:
      name: Purezza del metallo
      description: Indica il titolo o il grado di purezza del metallo utilizzato nel
        gioiello, generalmente espresso in carati (K) o in millesimi.
    metrics_counted:
      name: Metriche rilevate
      description: Elenca le singole statistiche o gli eventi che il contatore è progettato
        per monitorare.
    metronome_display_style:
      name: Stile del display del metronomo
      description: Specifica come il tempo viene visualizzato o indicato (ago/pendolo,
        LED/LCD numerico o luce lampeggiante).
    metronome_output_method:
      name: Metodo di uscita del metronomo
      description: Specifica i metodi di uscita disponibili per il segnale sonoro/battito
        del metronomo.
    microphone_toy_feature_set:
      name: Funzionalità del microfono giocattolo
      description: Principali funzionalità di gioco del microfono giocattolo (effetti
        vocali, amplificazione, registrazione, ecc.).
    midi_output_type:
      name: Tipo di uscita MIDI
      description: Specifica i tipi di uscita MIDI forniti dal modulo trigger.
    military_branch:
      name: Corpo militare
      description: Identifica il corpo militare per cui l'uniforme è emessa o a cui
        è ispirata.
    milk_base_type:
      name: Tipo di base di latte
      description: Specifica il latte principale o l'alternativa al latte utilizzata
        nella bevanda, se presente.
    milk_feeding_method:
      name: Metodo di somministrazione del latte
      description: Indica come sono stati alimentati gli animali di provenienza (ad
        esempio, allevati al pascolo o nutriti a cereali), il che può influire sul
        sapore e sul profilo nutrizionale.
    milk_processing_method:
      name: Metodo di lavorazione del latte
      description: Specifica il trattamento o la tecnica di lavorazione a cui il latte
        è stato sottoposto, con impatto sulla sicurezza, la durata e le proprietà
        nutrizionali.
    milk_source_animal:
      name: Animale di origine del latte
      description: Identifica l'animale da cui è stato ottenuto il latte, per scegliere
        tra latte vaccino, di capra, di bufala o altri latticini di origine animale.
    millet_processing_method:
      name: Metodo di lavorazione del miglio
      description: Indica il principale metodo di lavorazione o lo stato del grano
        di miglio (ad esempio, non lucidato, decorticato, germogliato).
    millet_variety:
      name: Varietà di miglio
      description: Identifica il tipo specifico di miglio contenuto nel prodotto (ad
        esempio, miglio perlato, miglio codino, miglio africano).
    milling_process:
      name: Processo di macinazione
      description: Indica il metodo di produzione utilizzato per macinare la farina,
        che può influenzare il sapore, l'esposizione al calore e il profilo nutrizionale.
    mint_mark:
      name: Segno di zecca
      description: Segno di zecca riportato sulla moneta (se applicabile).
    mirror_configuration:
      name: Configurazione dello specchio
      description: Specifica lo stile o la struttura dello specchio incluso nel set
        da toeletta.
    mirror_coverage:
      name: Copertura a specchio
      description: Descrive l'estensione dei pannelli a specchio sulle porte scorrevoli.
    mirror_curvature_type:
      name: Tipo di curvatura dello specchio
      description: Specifica se la superficie dello specchio è convessa, piana o concava,
        con impatto sul campo visivo.
    mirror_mounting_location:
      name: Sede di montaggio dello specchietto
      description: Specifica il punto della bicicletta o del ciclista in cui lo specchietto
        deve essere montato.
    mirror_shape:
      name: Forma dello specchio
      description: Indica la forma geometrica o lo stile dello specchio principale
        incluso nel set da toeletta.
    mix_ratio:
      name: Rapporto di miscelazione
      description: Specifica il rapporto di diluizione consigliato refrigerante/acqua
        (per i concentrati) o conferma il rapporto fisso di premiscelazione per i
        prodotti prediluiti.
    mma_glove_type:
      name: Guanto tipo MMA
      description: Indica l'uso principale o lo stile previsto per il guanto nell'ambito
        dell'allenamento o della competizione di MMA.
    mobility_features:
      name: Caratteristiche di mobilità
      description: Indica gli elementi di movimento o portabilità integrati, come
        rotelle o gambe pieghevoli.
    model_aircraft_assembly_level:
      name: Livello di assemblaggio del modello di aereo
      description: Indica il grado di costruzione necessario prima che il modello
        possa essere utilizzato.
    model_making_kit_items_included:
      name: Contenuto del kit di modellismo
      description: Elenca cosa è incluso nel kit o nel bundle di modellismo (ad esempio,
        vernice, colla, pennello).
    model_making_product_type:
      name: Tipo di prodotto per modellismo
      description: Identifica la natura dell'articolo (kit, accessorio, attrezzo o
        materiale) per migliorare la navigazione e il filtraggio tra le diverse tipologie
        di prodotto nel modellismo.
    model_rocket_kit_contents:
      name: Contenuto del kit per razzomodellismo
      description: Indica se il prodotto è un kit completo per razzo modellistico
        multistadio o un kit di componenti/moduli aggiuntivi (es. stadio booster o
        sustainer).
    model_rocket_kit_format:
      name: Formato del kit del razzo modello
      description: Specifica se il razzo è venduto in kit e il livello di assemblaggio.
    model_rocket_motor_impulse_class:
      name: Classe di impulso del motore per razzomodellismo
      description: Indica la classe di impulso totale standardizzata del motore (es.
        A, B, C...).
    model_rocket_motor_mount_size:
      name: Dimensione del supporto motore per razzomodellismo
      description: Indica il diametro del motore compatibile con il supporto motore
        del razzo.
    model_rocket_power_source_required:
      name: Alimentazione richiesta per razzomodellismo
      description: Indica se il prodotto necessita di batterie o alimentazione esterna
        e di quale tipo.
    model_rocket_propellant_type:
      name: Tipo di propellente per razzomodellismo
      description: Indica il propellente o il sistema motore utilizzato per la propulsione
        nei prodotti per razzomodellismo.
    model_rocket_recommended_launch_rod_or_rail_size:
      name: Dimensione consigliata di asta o rotaia di lancio per razzomodellismo
      description: Indica il diametro dell'asta o la dimensione della rotaia di lancio
        per cui il razzo è progettato (es. asta da 1/8 di pollice, rotaia 1010).
    model_rocket_recovery_method:
      name: Metodo di recupero per razzomodellismo
      description: Sistema di recupero primario utilizzato per riportare il razzo
        in sicurezza dopo il volo.
    model_rocket_recovery_system_type:
      name: Tipo di sistema di recupero per razzomodellismo
      description: Indica il metodo di recupero principale per riportare il razzo
        a terra in sicurezza dopo il volo.
    model_rocket_staging:
      name: Stadi del razzo modellistico
      description: Indica il numero di stadi motorizzati con cui il razzo modellistico
        è progettato per volare.
    model_train_accessory_electrical_connection_type:
      name: Tipo di connessione elettrica per accessori di modellismo ferroviario
      description: Indica il tipo di connettore o morsetto per collegare gli accessori
        alimentati al plastico (se applicabile).
    model_train_coupler_type:
      name: Tipo di gancio per modellismo ferroviario
      description: Indica lo standard del gancio installato sul materiale rotabile
        o sulla locomotiva.
    model_train_gauge:
      name: Scartamento del treno modello
      description: Indica il sistema di scartamento per cui l'accessorio è progettato
        (se applicabile), per garantire la compatibilità con binari e plastico.
    model_train_lighting_features:
      name: Caratteristiche di illuminazione del treno modello
      description: Specifica le funzionalità di illuminazione incluse nel modello
        di treno/locomotiva.
    model_train_power_pickup_method:
      name: Metodo di captazione della corrente per modellismo ferroviario
      description: Indica come il modello riceve alimentazione (corrente dal binario,
        batteria, ecc.).
    model_train_scale:
      name: Scala del treno modello
      description: Indica la scala del modello ferroviario (rapporto tra le dimensioni
        del modello e quelle del treno reale).
    model_train_sound_features:
      name: Caratteristiche sonore dei treni in miniatura
      description: Indica se il modello include effetti sonori integrati e di che
        tipo.
    model_train_track_gauge:
      name: Scartamento dei binari per modellismo ferroviario
      description: Specifica lo standard di scartamento/sistema di binari per cui
        il modello è progettato (ad esempio scartamento standard, varianti a scartamento
        ridotto o scartamenti specifici di brand/sistemi, ove applicabile).
    modeling_dough_base_material:
      name: Materiale di base della pasta modellabile
      description: Composizione/base principale della pasta modellabile (ad esempio
        a base di grano/farina o a base polimerica).
    modeling_dough_features:
      name: Caratteristiche della pasta modellabile
      description: Caratteristiche funzionali principali della pasta modellabile comunemente
        utilizzate dagli acquirenti durante la ricerca dei prodotti.
    modification_level:
      name: Livello di modifica
      description: Indica il grado di modifica del malto (ovvero quanto l'endosperma/le
        proteine dell'orzo sono stati scomposti), spesso classificato come poco modificato,
        modificato o molto modificato.
    molasses_base_ingredient:
      name: Ingrediente base della melassa
      description: Identifica la principale fonte vegetale o il frutto da cui viene
        prodotta la melassa.
    molasses_grade:
      name: Grado della melassa
      description: Classifica la melassa in base alla fase di estrazione/raffinazione,
        che influisce direttamente sull'intensità del sapore, sul colore e sul profilo
        nutrizionale.
    mold_material:
      name: Materiale dello stampo
      description: Composizione principale del materiale dello stampo stesso (ad esempio
        silicone, plastica o metallo).
    molle_compatibility:
      name: Compatibilità MOLLE
      description: Indica se il gilet dispone di passanti MOLLE/PALS per fissare tasche
        modulari e accessori.
    motor_belt_type:
      name: Tipo di cinghia del motore
      description: Definisce il design/profilo della cinghia utilizzata nel sistema
        di trasmissione del tapis roulant.
    motor_configuration:
      name: Configurazione del motore
      description: Indica quanti motori di trazione indipendenti utilizza lo scooter.
    motor_mounting_configuration:
      name: Configurazione di montaggio del motore
      description: Descrive come il motore è montato/implementato nel kit di conversione
        per scooter.
    motor_mounting_position:
      name: Posizione di montaggio del motore
      description: Indica dove è montato il motore sul monopattino elettrico, ad esempio
        nel mozzo della ruota anteriore, nel mozzo della ruota posteriore, nel doppio
        mozzo ruota o in posizione centrale.
    motor_position:
      name: Posizione del motore
      description: Indica la posizione del motore sulla bici elettrica, che influisce
        su maneggevolezza e manutenzione.
    motor_vehicle_a_v_integration_features:
      name: Funzionalità di integrazione audio/video per autoveicoli
      description: Funzionalità di integrazione con smartphone e sistemi di bordo
        supportate dall'unità principale (ad esempio Apple CarPlay, Android Auto o
        MirrorLink).
    motor_vehicle_bulb_application_position:
      name: Applicazione/posizione della lampadina per veicoli a motore
      description: Specifica la posizione o la funzione dell'illuminazione del veicolo
        per cui la lampadina è progettata (ad esempio anabbaglianti o luce freno).
    motor_vehicle_bulb_approval_standard:
      name: Standard di omologazione della lampadina per veicoli a motore
      description: Indica la conformità normativa/omologazione per l'uso su strada
        nel mercato di destinazione.
    motor_vehicle_oxygen_sensor_bank:
      name: Bancata del sensore di ossigeno del veicolo a motore
      description: Indica per quale bancata del motore è compatibile il sensore di
        ossigeno (ad esempio Bancata 1 o Bancata 2) per motori a V o boxer; usare
        Non applicabile per i motori in linea.
    motor_vehicle_oxygen_sensor_number_of_wires:
      name: Numero di fili del sensore di ossigeno per veicoli a motore
      description: Numero di fili nel cablaggio del sensore di ossigeno.
    motor_vehicle_oxygen_sensor_position:
      name: Posizione del sensore di ossigeno per veicoli a motore
      description: Specifica dove è installato il sensore di ossigeno (O2) nel sistema
        di scarico rispetto al convertitore catalitico.
    motor_vehicle_oxygen_sensor_sensor_number:
      name: Numero del sensore di ossigeno per veicoli a motore
      description: Indica il numero del sensore (ad esempio Sensore 1 o Sensore 2)
        all'interno di una determinata bancata/posizione.
    motor_vehicle_oxygen_sensor_type:
      name: Tipo di sensore di ossigeno del veicolo a motore
      description: Specifica il design/la tecnologia del sensore di ossigeno.
    motor_vehicle_paint_application_method:
      name: Metodo di applicazione della vernice per veicoli a motore
      description: Modalità di applicazione della vernice sulla superficie del veicolo.
    motor_vehicle_paint_system_step:
      name: Fase del sistema di verniciatura per veicoli a motore
      description: Indica a quale fase o componente di un sistema di verniciatura
        per ritocchi automobilistici è destinato il prodotto (ad esempio primer, basecoat
        o clearcoat).
    motor_vehicle_speaker_mounting_type:
      name: Tipo di montaggio degli altoparlanti per autoveicoli
      description: Modalità di installazione prevista dell'altoparlante nel veicolo
        (fattore di forma di montaggio).
    motor_vehicle_subwoofer_size:
      name: Dimensione del subwoofer per veicolo a motore
      description: Diametro nominale del driver del subwoofer (ad esempio 8 in, 10
        in o 12 pollici), utilizzato per garantire la compatibilità con lo spazio
        disponibile nel veicolo e con il box del subwoofer.
    motor_vehicle_subwoofer_voice_coil_configuration:
      name: Configurazione della bobina mobile del subwoofer per veicoli a motore
      description: Numero/configurazione delle bobine mobili utilizzati per la compatibilità
        con le opzioni di cablaggio dell'amplificatore (ad esempio SVC o DVC).
    motor_vehicle_subwoofer_voice_coil_impedance_per_coil:
      name: Impedenza della bobina mobile del subwoofer per veicoli a motore (per
        bobina)
      description: Valore di impedenza di ciascuna bobina mobile (non del carico finale
        cablato), utilizzato per i calcoli di cablaggio.
    motor_vehicle_voltage_regulator_type:
      name: Tipo di regolatore di tensione per veicoli a motore
      description: Indica la tecnologia/la tipologia di regolatore utilizzata nei
        veicoli a motore.
    motorcycle_armor_certification_standard:
      name: Standard di certificazione dell'armatura per moto
      description: Indica gli standard di sicurezza ufficiali a cui il protettore
        è certificato (ad esempio EN 1621-2 per i paraschiena o EN 1621-3 per le protezioni
        toraciche).
    motorcycle_cover_size_class:
      name: Classe di dimensioni del telo coprimoto
      description: Classe dimensionale standardizzata per i teli coprimoto basata
        sulla categoria/sull'intervallo di lunghezza tipici della moto per cui sono
        progettati.
    motorcycle_glove_certification_standard:
      name: Standard di certificazione dei guanti da moto
      description: Specifica la certificazione/lo standard di protezione a cui i guanti
        sono conformi (ad esempio i livelli EN 13594).
    motorcycle_glove_waterproof_construction:
      name: Tipo di impermeabilizzazione dei guanti da moto
      description: Specifica il tipo di impermeabilizzazione utilizzato nel guanto,
        se presente.
    motorcycle_guard_coverage_area:
      name: Area di copertura della protezione da moto
      description: Area principale coperta dal prodotto (gomito, polso, avambraccio
        o combinata).
    motorcycle_kidney_belt_construction_type:
      name: Tipo di struttura della fascia lombare da moto
      description: Struttura della fascia lombare che influisce su rigidità, traspirabilità
        e protezione.
    motorcycle_kidney_belt_purpose:
      name: Funzione della fascia lombare da moto
      description: Identifica lo stile di guida o l'utilizzo principale per cui è
        progettata la fascia lombare da moto.
    motorcycle_luggage_capacity_class:
      name: Classe di capacità del bagaglio da moto
      description: Indica la capacità di volume del bagaglio da moto, espressa come
        intervallo in litri.
    motorcycle_luggage_mounting_system:
      name: Sistema di montaggio del bagaglio per moto
      description: Sistema di fissaggio/montaggio utilizzato per assicurare la borsa
        o la valigia laterale alla moto (ad esempio cinghie throw-over o sgancio rapido
        su portapacchi).
    motorcycle_luggage_side:
      name: Lato della borsa laterale da moto
      description: Per valigie laterali e borse laterali, indica se l'articolo è destinato
        al lato sinistro, al lato destro oppure a una coppia/un set.
    motorcycle_protective_gear_size_system:
      name: Sistema di taglie dell'abbigliamento protettivo da moto
      description: Indica il sistema di taglie utilizzato per il prodotto (ad esempio
        taglie alfabetiche, numeriche o taglia unica).
    motorcycle_rack_carrier_style:
      name: Stile del portapacchi da moto
      description: Descrive la tipologia funzionale del supporto per il trasporto
        di moto o scooter (ad esempio a piattaforma, a binario o con sollevamento
        assistito).
    motorcycle_riding_discipline:
      name: Disciplina di guida motociclistica
      description: Identifica la disciplina di guida/utilizzo primaria per cui il
        sostegno cervicale è progettato.
    motorcycle_tire_speed_rating:
      name: Indice di velocità del pneumatico da moto
      description: Indica la velocità massima continuativa per cui il pneumatico è
        omologato, utilizzando il codice alfabetico standard (ad esempio H, V o W).
    motorsport_window_net_certification:
      name: Certificazione della rete finestrino per sport motoristici
      description: Certificazione di sicurezza o omologazione per competizioni a cui
        la rete finestrino è conforme (ad esempio SFI o FIA), inclusa l'eventuale
        specifica numerica.
    mound_usage_type:
      name: Tipo di utilizzo del monte di lancio
      description: Identifica l'ambito di utilizzo previsto del monte di lancio, ad
        esempio allenamento, partita, bullpen o multiuso.
    mount_attachment_method:
      name: Metodo di fissaggio del supporto
      description: Specifica come il supporto si fissa alla superficie/alla struttura
        del veicolo.
    mountainboard_truck_type:
      name: Tipo di truck del mountainboard
      description: Classifica la tipologia di truck inclusi nella tavola, che influisce
        su risposta in curva e resistenza.
    mounting_attachment_method:
      name: Metodo di montaggio/fissaggio
      description: Modalità di fissaggio del supporto/della borsa a un tamburo, un
        supporto, una cintura o un'altra superficie.
    mounting_attachment_type:
      name: Tipo di montaggio/fissaggio
      description: Modalità di fissaggio o collegamento dell'accessorio per rapporti
        alla ruota filatrice.
    mounting_hardware_included_for_installation:
      name: Ferramenta di montaggio inclusa (per l'installazione)
      description: Indica se la ferramenta di montaggio necessaria per installare
        il sedile posteriore (ad esempio staffe, bulloni o guide) è inclusa con il
        prodotto.
    mounting_location:
      name: Posizione di montaggio
      description: Specifica l'area di montaggio prevista sull'attrezzatura o sul
        corpo per la luce/il riflettore (ad esempio forcella anteriore, casco o raggi
        della ruota).
    mounting_method:
      name: Metodo di montaggio
      description: Modalità di montaggio o fissaggio del supporto per bacchette/spazzole
        (ad esempio a morsetto, con cinghia o adesivo).
    mounting_position:
      name: Posizione di montaggio
      description: Specifica dove è previsto il montaggio/l'installazione del comando
        del freno a mano nell'abitacolo del veicolo.
    mounting_rail_type:
      name: Tipo di guida di montaggio
      description: Specifica la guida o lo standard di interfaccia a cui si collega
        l'accessorio, ad esempio Picatinny o M-LOK.
    mounting_receiver_size:
      name: Dimensione del ricevitore del gancio traino
      description: Dimensione del ricevitore del gancio traino richiesta per i portabagagli
        montati su gancio traino.
    mounting_storage_type:
      name: Tipo di montaggio/stoccaggio
      description: Modalità di montaggio o stivaggio prevista del dispositivo sull'imbarcazione
        o sulla persona.
    mouth_grip_type:
      name: Tipo di presa e protezione boccale
      description: Descrive il tipo di presa o protezione boccale del fischietto per
        comfort e igiene.
    mouthguard_mold_type:
      name: Tipo di modellatura del paradenti
      description: Descrive come il paradenti viene adattato ai denti dell'atleta
        (ad esempio termoformabile o realizzato su misura dal dentista).
    mouthpiece_facing_length:
      name: Lunghezza dell'apertura del bocchino
      description: Indica la categoria di lunghezza della curva di apertura del bocchino
        (non la lunghezza complessiva del bocchino), che influisce su risposta, resistenza
        e compatibilità con l'ancia.
    mouthpiece_material:
      name: Materiale del bocchino
      description: Specifica il materiale della parte del bocchino/punta a contatto
        con la bocca di una trombetta (trombetta da festa), che può differire dal
        materiale del corpo principale.
    mouthpiece_shank_receiver_size:
      name: Gambo del bocchino/ricevitore taglia
      description: Specifica lo standard di aggancio/attacco del bocchino compatibile
        con il flicorno.
    mouthpiece_shank_size:
      name: Bocchino gambo taglia
      description: Specifica lo standard di accoppiamento tra gambo e ricevitore del
        bocchino per garantire la compatibilità con lo strumento in ottone previsto.
    mouthpiece_shank_type:
      name: Tipo di gambo del bocchino
      description: Specifica lo standard di compatibilità tra il ricevitore e il gambo
        del bocchino (ove applicabile).
    mouthpiece_style:
      name: Stile del bocchino
      description: Classifica il design/Shapes della parte boccale del morso a leva,
        che Influence i punti di pressione, la severità e la preferenza del cavallo.
    mouthpiece_type:
      name: Tipo di bocchino
      description: Tipo di bocchino all'estremità di soffiaggio (integrato, rimovibile
        o componente aggiuntivo).
    movement_mechanism:
      name: Meccanismo di movimento
      description: Definisce come si muove la panca durante l'uso (oscillazione, scorrimento,
        dondolio, ecc.).
    muffin_size:
      name: Taglia Muffin
      description: Classifica il formato fisico della taglia del prodotto muffin (es.
        Shop Mini, standard, jumbo).
    mushroom_variety:
      name: Varietà di funghi
      description: Indica la specie o la varietà specifica di fungo o tartufo contenuta
        nel prodotto (ad esempio, Shiitake, Pleurotus eryngii, Tartufo nero).
    music_stand_desk_tilt_adjustment:
      name: Regolazione dell'inclinazione del leggio.
      description: Indica se e come è possibile regolare l'inclinazione della scrivania.
    music_stand_intended_use:
      name: Utilizzo previsto del leggio
      description: Indica l'impostazione/uso-cassa primaria prevista per lo stand.
    musical_block_pitch_type:
      name: Tipo di intonazione del blocco sonoro
      description: Descrive se il blocco sonoro produce un'intonazione definita (intonato)
        o indefinita.
    musical_box_mechanism_type:
      name: Tipo di meccanismo del carillon
      description: Modalità con cui il carillon produce/riproduce il suono (ad esempio
        meccanismo a carica manuale o riproduzione elettronica).
    musical_keyboard_case_fit_type:
      name: Tipo di vestibilità della custodia per tastiera musicale
      description: Descrive come la custodia è dimensionata rispetto allo strumento
        (ad esempio universale/per intervallo di dimensioni oppure specifica per modello/su
        misura).
    musical_ratchet_sound_character:
      name: Caratteristiche sonore della raganella musicale
      description: Descrizione generale del timbro/del volume sonoro della raganella.
    musical_scraper_groove_surface_material:
      name: Materiale della superficie scanalata del raschiatore musicale
      description: Specifica il materiale della superficie scanalata/zigrinata da
        raschiare (che può differire dal materiale del corpo).
    musical_scraper_type:
      name: Tipo di raschiatore musicale
      description: Specifica lo stile/il design dello strumento musicale a raschiamento
        (ad esempio guiro o reco-reco), che influisce sul suono e sulla tecnica esecutiva.
    mute_attachment_method:
      name: Metodo di fissaggio della sordina
      description: Specifica come il sordino per piatti viene fissato o mantenuto
        in posizione sul piatto (ad esempio gel, adesione statica, magnete o clip).
    mute_attenuation_level:
      name: Livello di attenuazione del sordino
      description: Indica quanto il sordino riduce il volume percepito, particolarmente
        rilevante per i sordini da studio.
    mute_cork_padding_material:
      name: Sughero/materiale dell'imbottitura del sordino
      description: Specifica il materiale dell'imbottitura di contatto del sordino
        (ad esempio strisce o cuscinetti in sughero) utilizzata per presa, adattamento
        e protezione della campana.
    mute_coverage_type:
      name: Tipo di copertura della sordina
      description: Indica lo stile/l'area di copertura del sordino sulla superficie
        di esecuzione, dai piccoli smorzatori localizzati ai sordini da studio a copertura
        totale.
    mute_finish:
      name: Finitura del sordino
      description: Finitura superficiale del sordino che può influire su durata ed
        estetica (ad esempio lucida o satinata).
    name_label_text_template:
      name: Modello di testo per etichetta con nome
      description: Specifica il testo predefinito o il modello stampato sull'etichetta
        con nome (ad esempio Appartiene a o Realizzato da).
    napkin_ply:
      name: Numero di veli del tovagliolo
      description: Indica lo spessore del tovagliolo da cocktail in base al numero
        di veli.
    neck_brace_fit_system:
      name: Sistema di regolazione del collare protettivo
      description: Indica il metodo principale utilizzato per regolare e fissare il
        collare protettivo al pilota.
    neck_brace_size_basis:
      name: Criterio di taglia del collare protettivo
      description: Indica il criterio di taglia utilizzato per scegliere la misura
        corretta del collare protettivo.
    neck_configuration:
      name: Configurazione del collo
      description: Specifica lo stile/la configurazione del collo inclusi con il sassofono,
        che influiscono su ergonomia e suonabilità.
    neck_coverage_type:
      name: Tipo di copertura del collo
      description: Specifica lo stile di copertura del collo fornito con la coperta.
    neck_support_size_system:
      name: Sistema di taglie del supporto per il collo
      description: Indica il sistema di taglie utilizzato per il supporto/collare
        protettivo da corsa (ad esempio adulto, junior o taglia unica).
    necklace_length_type:
      name: Tipo di lunghezza della collana
      description: Specifica la categoria di lunghezza convenzionale della collana,
        ad esempio girocollo o opera, per facilitare la ricerca in base allo stile.
    needle_balance_zone:
      name: Zona di bilanciamento dell'ago
      description: Indica la zona di bilanciamento magnetico o l'emisfero per cui
        l'ago della bussola è calibrato, garantendo letture accurate in tutto il mondo.
    needle_case_format:
      name: Formato del portaghi
      description: Formato generale dell'organizzatore del portaghi.
    needle_damping_type:
      name: Tipo di smorzamento dell'ago
      description: Descrive come l'ago della bussola viene stabilizzato (ad esempio
        con liquido, a secco o con stabilizzazione elettronica), fattori che influiscono
        sul tempo di assestamento e sulla resistenza.
    needle_felting_needle_profile:
      name: Profilo dell'ago per infeltrimento ad ago
      description: Sezione/profilo dell'ago da infeltrimento, che influisce sul modo
        in cui le fibre vengono spostate e sulla finitura ottenuta.
    needle_holder_features:
      name: Caratteristiche del portaaghi
      description: Caratteristiche funzionali notevoli del portaago.
    needle_holder_mounting_attachment_method:
      name: Metodo di montaggio/fissaggio del portaaghi
      description: Modalità di fissaggio o utilizzo del portaaghi durante la conservazione
        (ad esempio magnetico, con clip o con cinghia).
    needle_holder_style:
      name: Stile del porta aghi
      description: Stile/design fisico di conservazione o trasporto del portaaghi.
    needle_pushing_surface_type:
      name: Tipo di superficie di spinta dell'ago
      description: Tipo/design della superficie di spinta dell'ago sul palmo da cucito
        (ad esempio impronta metallica, disco metallico o toppa rinforzata).
    needle_requirement_beading_pattern:
      name: Ago richiesto (schema per perline)
      description: Tipo/dimensione dell'ago consigliati dallo schema.
    needle_size_system:
      name: Sistema di misura degli aghi
      description: Standard di misura utilizzato per l'etichettatura della dimensione
        degli aghi.
    needle_threader_compatible_needle_type:
      name: Tipo di ago compatibile con l'infila-ago
      description: Specifica i tipi di ago compatibili con l'infila-ago, in base alla
        categoria/all'utilizzo dell'ago.
    needle_threader_mechanism_type:
      name: Tipo di meccanismo dell'infilatore dell'ago
      description: Descrive come l'infila-ago aggancia/tira il filo attraverso la
        cruna dell'ago.
    needle_threader_packaging_type:
      name: Tipo di confezione dell'infila-ago
      description: Modalità di vendita/confezionamento del prodotto (singolo, multipack
        o set).
    needlecraft_fabric_color_family:
      name: Famiglia di colore del tessuto per ricamo e lavori ad ago
      description: Famiglia di colore normalizzata per il tessuto a trama uniforme
        (utilizzata insieme a Colore per la navigazione a faccette).
    needlecraft_fabric_composition:
      name: Composizione del tessuto per ricamo e lavori ad ago
      description: Specifica la composizione/miscela di fibre del tessuto per ricamo
        e lavori ad ago (ad esempio 100% cotone o misto lino/cotone).
    needlecraft_fabric_weave_type:
      name: Tipo di trama del tessuto per ricamo e lavori ad ago
      description: Specifica la trama/la struttura del lino per ricamo e lavori ad
        ago (ad esempio a trama uniforme o lino tradizionale), che influisce sul comportamento
        e sull'aspetto dei punti.
    needlecraft_kit_items_included:
      name: Articoli inclusi nel kit per ricamo e lavori ad ago
      description: Elenca i componenti principali inclusi nel kit per ricamo e lavori
        ad ago (strumenti e materiali di consumo).
    needlecraft_kit_project_type:
      name: Tipo di progetto del kit per ricamo e lavori ad ago
      description: Identifica l'oggetto finito che il kit consente di realizzare (risultato
        del progetto).
    needlecraft_stitching_coverage:
      name: Copertura dei punti per ricamo e lavori ad ago
      description: Indica se il tessuto viene ricamato su 1 filo/quadratino o su 2
        fili, come avviene comunemente con i tessuti a trama uniforme e il lino.
    needlepoint_canvas_mesh_count:
      name: Numero di trame della tela per mezzo punto
      description: Numero di maglie della tela per mezzo punto (fili per pollice)
        previsto dal disegno.
    needlepoint_frame_canvas_attachment_method:
      name: Metodo di fissaggio della tela al telaio per mezzo punto
      description: Descrive come la tela per mezzo punto viene fissata al telaio.
    needlepoint_frame_compatible_stand_type:
      name: Tipo di supporto compatibile con il telaio per mezzo punto
      description: Se il telaio è progettato per essere montato su un supporto, specifica
        i tipi di supporto compatibili.
    needlepoint_frame_contents:
      name: Contenuto del telaio per mezzo punto
      description: Specifica i componenti e gli accessori inclusi con il telaio per
        mezzo punto (ad esempio telaio, barre/aste aggiuntive, puntine/spilli, strisce
        di presa o custodia per il trasporto).
    needlepoint_frame_tension_adjustment_type:
      name: Tipo di regolazione della tensione del telaio per mezzo punto
      description: Indica come o se è possibile regolare la tensione del telaio durante
        l'uso.
    needlepoint_pattern_chart_format:
      name: Formato del grafico del pattern per ricamo a tela
      description: Modalità di rappresentazione del disegno per mezzo punto durante
        il ricamo (schema o guida stampata/dipinta).
    needlepoint_project_type:
      name: Tipo di progetto per mezzo punto
      description: Categoria/oggetto finito a cui è destinato il disegno per mezzo
        punto.
    net_design:
      name: Tipo di struttura della rete
      description: Identifica il tipo di struttura della rete, indicando se può rientrare
        o piegarsi per facilitarne il trasporto.
    net_mesh_pattern:
      name: Trama delle maglie della rete
      description: Specifica la forma geometrica delle aperture della rete, che può
        influire su visibilità e resistenza.
    net_twine_gauge:
      name: Calibro del filo della rete
      description: Indica lo spessore o la resistenza del filo della rete, tradizionalmente
        espressi come numero di calibro (ad esempio 18 o 36).
    nicotine_source:
      name: Fonte della nicotina
      description: Indica se la nicotina presente nel prodotto è derivata dal tabacco,
        sintetica oppure se il prodotto non contiene nicotina.
    nipple_drive_interface:
      name: Interfaccia di serraggio del nipplo
      description: Identifica il tipo/standard dell'interfaccia di serraggio o della
        testa del nipplo (esterna o interna), determinando l'utensile richiesto e
        il metodo di assemblaggio della ruota.
    nock_activation_method:
      name: Metodo di attivazione della cocca
      description: Specifica il meccanismo con cui il LED della cocca luminosa della
        freccia viene acceso o spento (ad esempio pressione della corda, sensore di
        movimento o interruttore manuale).
    nock_fitment_code:
      name: Codice di compatibilità della cocca
      description: Codice del produttore o del settore che identifica la famiglia/serie
        della cocca a cui appartiene.
    nock_throat_size:
      name: Dimensione della gola della cocca
      description: Descrive il grado di trasparenza del materiale della cocca, ovvero
        trasparente, traslucido, opaco o fosforescente, che influisce su visibilità
        ed estetica.
    nock_transparency_level:
      name: Livello di trasparenza dell'incoccatura
      description: Descrive il grado di trasparenza del materiale dell'incavo della
        freccia (trasparente, traslucido, opaco o fosforescente), che influisce su
        visibilità ed estetica.
    nock_type:
      name: Tipo di cocca
      description: Specifica il design della cocca utilizzata su una freccia o un
        dardo, ad esempio a perno, a mezzaluna o luminosa.
    noise_reduction_type:
      name: Tipo di riduzione del rumore
      description: Specifica la tecnologia di riduzione del rumore utilizzata (o non
        utilizzata) nelle cuffie integrate del casco, se applicabile.
    noise_suppression_technology:
      name: Tecnologia di riduzione del rumore
      description: Specifica se il prodotto utilizza smorzamento passivo o circuiti
        elettronici attivi che comprimono i suoni forti e/o amplificano i suoni ambientali.
    non_slip_base_features:
      name: Caratteristiche della base antiscivolo
      description: Indica le caratteristiche antiscivolo incluse per evitare che il
        pedale si sposti durante l'esecuzione.
    nose_bridge_type:
      name: Tipo di ponte nasale
      description: Indica il design del ponte nasale, che influisce sulla vestibilità
        per diverse dimensioni del viso.
    nose_clip_accessories_included:
      name: Accessori inclusi con la clip nasale
      description: Elenca eventuali accessori aggiuntivi forniti con la clip nasale
        per nuoto (ad esempio tappi per le orecchie o custodia).
    nose_clip_features:
      name: Caratteristiche della clip nasale
      description: Evidenzia le caratteristiche generali della clip nasale in termini
        di funzionalità o comfort.
    nose_coverage_style:
      name: Stile di copertura del naso
      description: Indica la presenza e il tipo di pannello di protezione per naso
        o muso sulla maschera antimosche.
    noseband_type:
      name: Tipo di capezzina
      description: Specifica il design della capezzina, se presente, fornita con la
        briglia.
    number_of_canvas_meshes:
      name: Numero di maglie della tela
      description: Dimensione delle maglie del foglio di tela plastificata, espressa
        in fori per pollice (HPI) o numero di maglie, che determina la dimensione
        dei punti e il livello di dettaglio del progetto.
    number_of_chainrings:
      name: Numero di corone
      description: Indica quante corone la guarnitura è progettata per montare o con
        quante corone viene fornita.
    number_of_control_stations:
      name: Numero di postazioni di comando
      description: Indica il numero di postazioni di timoneria/comando supportate
        dal set di comandi (ad esempio postazione singola o doppia postazione).
    number_of_digits:
      name: Numero di cifre
      description: Numero di cifre visualizzate dal contatore (ad esempio 1 cifra,
        2 cifre o 3 cifre).
    number_of_guitar_slots:
      name: Numero di vani per chitarra
      description: Indica quante chitarre può contenere la custodia/gig bag.
    number_of_needlecraft_fabrics:
      name: Numero di tessuti per ricamo
      description: Specifica il count del tessuto o della tela per ricamo e lavori
        ad ago, generalmente espresso in quadretti/fili per pollice (ad esempio 14
        count).
    number_of_plastic_canvas_meshes:
      name: Numero di maglie della tela plastificata
      description: Specifica il numero di maglie della tela plastificata, espresso
        in fori per pollice, che determina la dimensione dei punti e il livello di
        dettaglio del progetto.
    number_of_quilting_frame_rails:
      name: Numero di binari del telaio per quilting
      description: Numero di binari/rulli inclusi nel telaio per quilting (ad esempio
        sistemi a 2 binari o a 3 binari).
    number_of_rope_slots:
      name: Numero di alloggiamenti per corda
      description: Indica se il dispositivo di assicurazione è progettato per l'uso
        con corda singola o doppia.
    number_of_switch_poles:
      name: Numero di poli dell'interruttore
      description: Numero di circuiti separati (poli) controllati dall'interruttore
        (ad esempio SPST o DPST).
    number_of_switch_throws:
      name: Numero di vie del commutatore
      description: Numero di percorsi di uscita per polo (ad esempio SPDT).
    number_of_timing_chain_rows:
      name: Numero di file della catena di distribuzione
      description: Indica se la catena di distribuzione è a fila singola o a più file.
    number_of_trailer_axles:
      name: Numero di assi del rimorchio
      description: Numero di assi del rimorchio.
    number_of_wheel_pieces:
      name: Numero di pezzi del cerchio
      description: Specifica se il cerchio ha una struttura monoblocco, a 2 pezzi
        o a 3 pezzi.
    numbering_style:
      name: Stile di numerazione
      description: Indica se e come le pettorine sono prenumerate per l'identificazione
        della squadra (ad esempio senza numero, 1-10 o personalizzate).
    nunchuck_connector_type:
      name: Tipo di collegamento del nunchaku
      description: Tipo di collegamento tra le due impugnature del nunchaku (ad esempio
        corda, catena o catena girevole).
    nursing_access:
      name: Accesso per l'allattamento
      description: Identifica il metodo di accesso per l'allattamento integrato nel
        costume da bagno, se applicabile.
    nursing_access_type:
      name: Tipo di accesso per l'allattamento
      description: Specifica in che modo il capo consente l'accesso al seno per allattare
        o usare il tiralatte.
    nut_butter_texture:
      name: Consistenza del burro di frutta secca
      description: Descrive la consistenza fisica del burro di frutta secca, per aiutare
        gli acquirenti a scegliere facilmente tra cremoso, croccante e altre varianti.
    nutrient_fortification:
      name: Fortificazione nutrizionale
      description: Identifica i principali nutrienti con cui è arricchito il prodotto
        alimentare o la bevanda.
    oak_product_form:
      name: Forma del prodotto di quercia
      description: Identifica la forma fisica del rovere utilizzato per l'invecchiamento
        o l'aromatizzazione dei prodotti.
    oak_toast_level:
      name: Livello di tostatura del rovere
      description: Specifica il livello di tostatura dei prodotti in rovere.
    oboe_case_capacity:
      name: Capacità della custodia per oboe
      description: Indica lo strumento o gli strumenti e i componenti principali che
        la custodia è progettata per trasportare.
    oboe_case_carry_configuration:
      name: Configurazione di trasporto della custodia per oboe
      description: Indica la configurazione di trasporto principale offerta dalla
        custodia/gig bag.
    oboe_case_design:
      name: Design della custodia per oboe
      description: Classifica la struttura/rigidità di una custodia per oboe o gig
        bag (ad esempio rigida, semirigida o morbida), per indicarne il livello di
        protezione.
    oboe_case_internal_fit_type:
      name: Tipo di adattamento interno della custodia per oboe
      description: Indica se l'interno è sagomato per una configurazione specifica
        dello strumento o utilizza scomparti regolabili.
    oboe_keywork_plating:
      name: Placcatura della meccanica dell'oboe
      description: Specifica la placcatura/finitura della meccanica dell'oboe (chiavi),
        distinta dal materiale del corpo.
    oboe_strap_padding:
      name: Imbottitura della tracolla per oboe
      description: Descrive la presenza/il tipo di imbottitura nell'area di contatto
        della tracolla/del supporto per garantire comfort (ad esempio area spalla/collo
        imbottita).
    oboe_swab_style:
      name: Stile dello scovolino per oboe
      description: Specifica lo stile funzionale/la struttura dello scovolino per
        oboe (ad esempio passante o in seta con pesetto).
    observation_window_material:
      name: Materiale della finestra di osservazione
      description: Specifica il materiale dei pannelli/della finestra di osservazione,
        che spesso influisce su nitidezza e resistenza.
    ocarina_accessories_included:
      name: Accessori per ocarina inclusi
      description: Accessori inclusi con l'ocarina, ad esempio custodia, cordino da
        collo o tabella delle diteggiature.
    ocarina_chamber_count:
      name: Numero di camere dell'ocarina
      description: Indica quante camere ha l'ocarina inline, che influiscono sull'estensione
        e sulla complessità di esecuzione (singola, doppia, tripla e così via).
    ocarina_fingering_system:
      name: Sistema di diteggiatura dell'ocarina
      description: Specifica il sistema/standard di diteggiatura seguito dall'ocarina
        pendente, se applicabile.
    ocarina_finish_type:
      name: Tipo di finitura dell'ocarina
      description: Finitura superficiale del corpo dell'ocarina, che influisce su
        sensazione al tatto ed estetica.
    occupant_classification_sensor_support:
      name: Supporto per sensore di classificazione dell'occupante
      description: Indica se il sedile include un sensore di classificazione/peso
        dell'occupante o se è predisposto per trasferire/installare il sensore OEM,
        generalmente per i sedili del passeggero anteriore.
    octave_harmonica_cover_plate_material:
      name: Materiale della piastra di copertura dell'armonica a ottave
      description: Materiale delle placche di copertura esterne dell'armonica a ottave.
    octave_harmonica_tuning_system:
      name: Sistema di accordatura dell'armonica a ottave
      description: Accordatura/temperamento utilizzati per l'armonica a ottave.
    octoban_mounting_system_type:
      name: Tipo di sistema di montaggio dell'octoban
      description: Modalità di montaggio/posizionamento dell'octoban durante l'esecuzione
        (configurazione con supporto, staffa o asta).
    odor_control_features:
      name: Funzionalità di controllo degli odori
      description: Indica se il prodotto offre funzionalità di neutralizzazione/deodorizzazione
        degli odori e con quale metodo.
    office_furniture_items_included:
      name: Articoli di arredo per ufficio inclusi
      description: Identifica gli specifici mobili per ufficio inclusi nel set, ad
        esempio scrivania o schedario.
    oil_cooler_core_type:
      name: Tipo di massa radiante del radiatore dell'olio
      description: Specifica la struttura interna della massa radiante del radiatore
        dell'olio, che influisce su efficienza di raffreddamento, perdita di carico
        e resistenza.
    oil_cooler_mounting_style:
      name: Stile di montaggio del radiatore dell'olio
      description: Descrive come è previsto il montaggio/l'installazione del radiatore
        dell'olio sul veicolo.
    oil_dipstick_component_type:
      name: Tipo di componente dell'astina dell'olio
      description: Specifica quale componente per la misurazione del livello dell'olio
        viene venduto (ad esempio solo lama/asta dell'astina, solo impugnatura, gruppo
        completo, tubo dell'astina e così via).
    oil_dipstick_measurement_markings:
      name: Tacche di misurazione dell'astina di livello dell'olio
      description: Specifica quali tacche/scale sono presenti sull'astina per leggere
        il livello dell'olio.
    oil_dipstick_tube_mounting_type:
      name: Tipo di montaggio del tubo dell'astina dell'olio
      description: Specifica come il tubo dell'astina dell'olio viene fissato o montato
        sul motore o sul blocco motore.
    oil_drain_plug_head_drive_type:
      name: Tipo di attacco della testa del tappo di scarico dell'olio
      description: Specifica l'interfaccia di innesto dell'utensile sulla testa del
        tappo di scarico dell'olio, utilizzata per l'installazione e la rimozione.
    oil_drain_plug_magnet_type:
      name: Tipo di magnete del tappo di scarico dell'olio
      description: Specifica se il tappo di scarico è magnetico e, in caso affermativo,
        di quale tipo.
    oil_fill_cap_type:
      name: Tipo di tappo di riempimento dell'olio
      description: Tipo/stile di interfaccia del tappo di riempimento dell'olio utilizzato
        dal coperchio punterie, se applicabile.
    oil_filler_cap_attachment_type:
      name: Tipo di fissaggio del tappo di riempimento dell'olio
      description: Specifica come il tappo di riempimento dell'olio viene fissato
        al motore/al bocchettone di riempimento dell'olio (ad esempio filettato, a
        baionetta/a quarto di giro o a pressione).
    oil_filler_cap_installation_position:
      name: Posizione di installazione del tappo di riempimento dell'olio
      description: Specifica dove viene utilizzato il tappo quando sono presenti più
        punti di riempimento dell'olio (ad esempio coperchio punterie o tubo di riempimento
        remoto).
    oil_filler_cap_locking_type:
      name: Tipo di blocco del tappo del filtro dell'olio
      description: Specifica se il tappo di riempimento dell'olio è senza serratura
        oppure utilizza un sistema di rimozione con blocco/sicurezza (ad esempio con
        chiave o utensile richiesto), per aiutare a prevenire manomissioni, furti
        o aperture accidentali.
    oil_filler_cap_tether_type:
      name: Tipo di cavo del tappo del filtro dell'olio
      description: Specifica se il tappo di riempimento dell'olio è trattenuto per
        evitarne la perdita e quale tipo di sistema di trattenuta viene utilizzato.
    oil_filler_cap_venting_type:
      name: Tipo di ventilazione del tappo di riempimento dell'olio
      description: Specifica se il tappo è ventilato e il relativo sistema di ventilazione,
        se applicabile.
    oil_filter_style:
      name: Tipo di filtro dell'olio
      description: Specifica il formato e il tipo di montaggio/installazione del filtro
        dell'olio per garantire la compatibilità con l'attacco del filtro del motore.
    oil_pan_baffle_windage_features:
      name: Caratteristiche del deflettore/paraschiuma della coppa dell'olio
      description: Indica le caratteristiche interne di controllo dell'olio incluse
        nella coppa.
    oil_pan_finish_coating:
      name: Finitura/rivestimento della coppa dell'olio
      description: Descrive la finitura superficiale o il rivestimento della coppa
        dell'olio (verniciata, verniciata a polvere, placcata, grezza e così via).
    oil_pressure_sensor_function_type:
      name: Tipo di funzione del sensore di pressione dell'olio
      description: Indica se il componente è un trasmettitore di pressione dell'olio
        a uscita variabile per indicatore/centralina ECU oppure un interruttore on/off
        della pressione dell'olio che attiva una spia di avviso.
    oil_pressure_sensor_signal_output_type:
      name: Tipo di segnale di uscita del sensore di pressione dell'olio
      description: Specifica il tipo di uscita/segnale elettrico prodotto dal sensore/trasmettitore
        di pressione dell'olio.
    oil_processing_method:
      name: Metodo di lavorazione dell'olio
      description: Specifica il metodo di produzione o raffinazione dell'olio (ad
        esempio spremuto a freddo, vergine o raffinato), che influisce su sapore,
        valori nutrizionali e modalità di utilizzo in cucina.
    oil_pump_drive_method:
      name: Metodo di azionamento della pompa dell'olio
      description: Indica cosa aziona la pompa dell'olio all'interno del motore.
    oil_pump_mounting_style:
      name: Stile di montaggio della pompa dell'olio
      description: Specifica dove e come la pompa dell'olio viene montata nel motore
        (ad esempio interna o esterna/remota, montata sul coperchio o sulla coppa
        dell'olio).
    oil_system_connection_thread_standard:
      name: Standard della filettatura del collegamento del sistema dell'olio
      description: Specifica lo standard di filettatura/collegamento utilizzato dall'interfaccia
        del sistema dell'olio del componente per installazione e compatibilità (ad
        esempio M12x1.5, 1/8-27 NPT o BSPP).
    oil_viscosity_grade:
      name: Grado di viscosità dell'olio
      description: Descrive la viscosità relativa dell'olio per attrezzature da filatura
        artigianale (non i gradi SAE per uso automobilistico).
    okra_variety:
      name: Varietà di gombo
      description: Identifica la cultivar specifica o la varietà commerciale di gombo
        proposta, ad esempio Clemson Spineless, Red Burgundy o Baby Okra.
    olfactory_arts_material_form:
      name: Forma del materiale per le arti olfattive
      description: Specifica la forma fisica del materiale così come viene venduto.
    olfactory_arts_tool_kit_content:
      name: Contenuto del kit di strumenti per arti olfattive
      description: Elenca i componenti inclusi quando il prodotto viene venduto come
        kit o set per la realizzazione di candele, incensi o profumi.
    olive_variety:
      name: Varietà di olive
      description: Specifica la cultivar di oliva utilizzata, che influisce su sapore,
        consistenza, colore e autenticità regionale.
    onion_variety:
      name: Varietà di cipolla
      description: Specifica il tipo specifico di cipolla, per consentire agli acquirenti
        di trovare rapidamente il colore, il sapore e gli utilizzi preferiti, permettendo
        al tempo stesso ai merchant di inserire i prodotti in modo accurato.
    opacity_level:
      name: Livello di opacità
      description: Indica quanto il tessuto sia trasparente o opaco.
    operating_modes:
      name: Modalità di funzionamento
      description: Effetti/modalità di movimento principali integrati supportati dalla
        luce laser.
    operating_voltage:
      name: Tensione di esercizio
      description: Specifica la tensione nominale del sistema per cui l'iniettore
        è progettato.
    optical_toy_features:
      name: Caratteristiche del gioco ottico
      description: Evidenzia il principale effetto visivo/ottico prodotto dal gioco.
    orchestral_string_core_material:
      name: Materiale dell'anima delle corde orchestrali
      description: Specifica il materiale di costruzione dell'anima della corda, che
        influisce notevolmente su sensazione al tatto, risposta e timbro.
    orchestral_string_end_type:
      name: Tipo di terminale delle corde orchestrali
      description: Specifica il tipo di fissaggio all'estremità della corda lato cordiera.
    orchestral_string_included_strings:
      name: Corde incluse per strumenti ad arco
      description: Elenca le specifiche corde incluse nella confezione, che variano
        in base allo strumento.
    orchestral_string_instrument_fitting_part_type:
      name: Tipo di componente/accessorio per strumenti ad arco
      description: Specifica il tipo di componente/accessorio del prodotto (ad esempio
        ponticello, cordiera o mentoniera).
    orchestral_string_instrument_mute_type:
      name: Tipo di sordina per strumenti ad arco
      description: Specifica il tipo funzionale della sordina per strumenti ad arco
        (ad esempio da studio/hotel o da esecuzione/concerto) e/o il design più comune.
    orchestral_string_instrument_part_position:
      name: Posizione del componente per strumenti ad arco
      description: Indica dove deve essere posizionato il componente sullo strumento,
        utile quando i componenti sono disponibili in varianti superiore/inferiore
        o sinistra/destra.
    orchestral_string_winding_material:
      name: Materiale dell'avvolgimento delle corde per strumenti ad arco
      description: Specifica il materiale dell'avvolgimento esterno utilizzato sulla
        corda.
    organza_finish_sheen:
      name: Finitura/lucentezza dell'organza
      description: Descrive l'aspetto superficiale dell'organza (opaco o lucido/iridescente).
    organza_ribbon_transparency_level:
      name: Livello di trasparenza del nastro in organza
      description: Descrive il grado di trasparenza del nastro in organza.
    organza_transparency_level:
      name: Livello di trasparenza dell'organza
      description: Descrive il grado di trasparenza del tessuto in organza quando
        viene utilizzato in un solo strato.
    origami_paper_shape:
      name: Forma della carta origami
      description: Specifica la forma del foglio utilizzato per le piegature.
    origami_paper_sidedness:
      name: Lati della carta origami
      description: Indica se la carta origami presenta lo stesso colore/motivo su
        entrambi i lati oppure lati a contrasto.
    ostrich_feather_part:
      name: Parte della piuma di struzzo
      description: Identifica il tipo/la parte della piuma di struzzo utilizzata (ad
        esempio plume o drab), che influisce su morbidezza, densità e applicazioni
        artigianali tipiche.
    outboard_motor_shaft_type:
      name: Tipo di albero del motore fuoribordo
      description: Classe standard di lunghezza dell'albero utilizzata dai motori
        fuoribordo (denominazione utilizzata nel settore nautico).
    outboard_motor_steering_type:
      name: Tipo di sterzo del motore fuoribordo
      description: Specifica l'interfaccia/il meccanismo di sterzo utilizzato dal
        motore fuoribordo (ad esempio barra del timone o sistema di sterzo remoto).
    outdoor_table_functionality:
      name: Funzionalità del tavolo da esterno
      description: Identifica le funzioni integrate specializzate che vanno oltre
        un semplice piano d'appoggio (ad esempio scomparto refrigerante, ripiano portaoggetti,
        copertura per bombola del gas, base per ombrellone, collegamento per sedie,
        design pieghevole, utilizzo sicuro in piscina, altezza regolabile, ruote integrate
        o illuminazione LED).
    outerwear_length_type:
      name: Tipo di lunghezza del capo spalla
      description: Classifica la lunghezza complessiva di un capo spalla in intervalli
        descrittivi standard.
    outerwear_pieces_included:
      name: Capi di abbigliamento esterno inclusi
      description: Elenca i capi inclusi quando il prodotto viene venduto come set.
    outfit_attachment_mechanism:
      name: Meccanismo di attacco del costume
      description: Specifica come i capi o gli accessori si fissano alla bambola (ad
        esempio linguette, adesivo o magneti).
    outfit_items_included:
      name: Articoli del costume inclusi
      description: Elenca gli specifici capi inclusi nel set (ad esempio body, pantaloncini
        o fascia per capelli).
    outlet_thread_type:
      name: Tipo di filettatura dell'uscita
      description: Standard di filettatura utilizzato nelle porte di uscita delle
        linee freno del cilindro maestro (ad esempio flare metrico a bolla o flare
        invertito SAE).
    output_jack_type_instrument:
      name: Tipo di jack di uscita (strumento)
      description: Specifica il tipo di jack di uscita audio del mandolino elettrico.
    output_signal_type:
      name: Tipo di segnale di uscita
      description: Comportamento/tipo di uscita elettrica prodotta dal sensore (ad
        esempio, resistenza analogica del termistore NTC).
    outsole_marking_type:
      name: Tipo di marcatura della suola
      description: Indica se la suola della scarpa lascia segni sulle superfici del
        campo, un aspetto fondamentale per gli sport con racchetta indoor.
    outsole_material:
      name: Materiale della suola esterna
      description: Indica il materiale della suola della scarpa che entra in contatto
        con il terreno, influenzando l'aderenza, la flessibilità e la durata.
    outsole_stud_type:
      name: Tipo di tacchetto della suola
      description: Descrive la configurazione della suola/dei tacchetti (ad esempio,
        tacchetti stampati, tasselli in gomma, rilievi per erba sintetica) che offre
        la trazione sulla superficie di gioco prescelta.
    oven_bake_clay_formulation:
      name: Formula di argilla da cuocere in forno
      description: Identifica la famiglia di formulazione dell'argilla da cuocere
        in forno (ad esempio, argilla polimerica rispetto ad argilla resinosa), che
        influenza la gestione, il comportamento di indurimento e le proprietà del
        prodotto finito.
    oven_housing_configuration:
      name: Configurazione dell'alloggiamento del forno
      description: Definisce la disposizione prevista degli elettrodomestici che possono
        essere alloggiati nel mobile (ad esempio, forno singolo, forno doppio o forno
        combinato con microonde).
    overhead_mount_installation_method:
      name: Metodo di installazione a montaggio sopraelevato
      description: Modalità di fissaggio del supporto superiore al veicolo (tipo di
        fissaggio/bulloneria).
    oversize_or_undersize_grade:
      name: Grado sovradimensionato o sottodimensionato
      description: Specifica il grado di taglia del kit (pistoni/fasce elastiche maggiorate
        e/o cuscinetti sottodimensionati) rispetto allo standard di taglia OEM.
    p_tex_application_method:
      name: Metodo di applicazione del P-Tex
      description: Descrive come il materiale P-Tex viene applicato alla soletta dello
        sci o dello snowboard.
    p_tex_form:
      name: Forma P-Tex
      description: Identifica la forma fisica in cui viene fornito il materiale di
        riparazione.
    packability:
      name: Portabilità
      description: Indica se e come il gilet può essere ripiegato o riposto quando
        non in uso.
    packaging_format:
      name: Formato di confezionamento
      description: Come vengono confezionate/vendute le strisce (buste personali,
        sfuse, ecc.).
    packaging_material:
      name: Materiale di imballaggio
      description: Specifica il materiale principale della bottiglia o della cassa
        che contiene l'acqua.
    packaging_type:
      name: Tipo di imballaggio
      description: Spiega come viene confezionato il bobblehead per la vendita al
        dettaglio, l'esposizione o la conservazione da parte dei collezionisti.
    packing_medium:
      name: Mezzo di imballaggio
      description: Indica il liquido o il mezzo (come acqua, vari sciroppi, succo
        o salamoia) utilizzato per conservare la frutta all'interno del contenitore.
    pad_components_included:
      name: Componenti del pad inclusi
      description: Specifica quali pezzi sono inclusi quando il prodotto viene venduto
        in set (ad esempio, ginocchiere e gomitiere, solo protezioni per i polsi).
    pad_controller_additional_control:
      name: Comandi aggiuntivi del controller del pad
      description: Tipi di comandi fisici aggiuntivi oltre ai pad (manopole, fader,
        pulsanti) presenti sull'unità.
    pad_controller_performance_features:
      name: Caratteristiche prestazionali del controller del pad
      description: Caratteristiche chiave del pad legate alle prestazioni, per il
        gioco e il controllo espressivo.
    pad_coverage_area:
      name: Area di copertura del pad
      description: Indica le zone del corpo protette dai pad integrati nella fascia.
    pad_material_or_technology:
      name: Materiale o tecnologia del pad
      description: Indica la tecnologia proprietaria di assorbimento degli urti o
        il materiale di marca utilizzato nell'imbottitura.
    pad_mounting_or_holding_style:
      name: Stile di montaggio o fissaggio del pad
      description: Indica come il pad viene tenuto, indossato o installato durante
        l'uso.
    pad_saver_style:
      name: Modello di protezione del pad
      description: Indica il tipo di struttura/design della protezione del pad utilizzato
        per asciugare il pad e la cavità.
    pad_shape:
      name: Forma del pad
      description: Definisce la forma geometrica o la curvatura della superficie di
        impatto del guantone o del corpo complessivo (ad es. rotonda, curva, rettangolare,
        piatta), per aiutare gli utenti ad abbinare i pad agli obiettivi di allenamento
        e ai tipi di colpo.
    pad_shell_type:
      name: Tipo di guscio del pad
      description: Classifica lo stile di costruzione della superficie esterna del
        pad (ad esempio, guscio rigido, guscio morbido, inserto interno).
    pad_style:
      name: Stile del pad
      description: Indica il tipo o il modello di pad fornito con la slitta.
    padding_layers:
      name: Strati di imbottitura
      description: Indica il numero di strati di schiuma utilizzati per l'assorbimento
        degli urti.
    padding_level:
      name: Livello di imbottitura
      description: Indica la quantità di imbottitura integrata nelle zone di contatto
        della fascia/del supporto (collo/spalle/schiena).
    padding_material:
      name: Materiale dell'imbottitura
      description: Indica il materiale di imbottitura interno che assorbe gli urti
        all'interno di borse, protezioni, guantoni e manichini.
    paddle_ball_attachment_type:
      name: Tipo di attacco per pallina da racchetta
      description: Indica come la pallina è collegata alla racchetta (o se non è fissata).
    paddle_leash_style:
      name: Tipo di cordino della pagaia
      description: Identifica lo stile o il design del cordino di sicurezza della
        pagaia.
    paddle_shape:
      name: Forma della pagaia
      description: Definisce la forma generale della testa/del corpo della pagaia
        (ad es. standard, allungata, a corpo largo), che influisce sulla portata,
        sulle dimensioni dello sweet spot e sulla manovrabilità.
    paddleboard_intended_use:
      name: Uso previsto del paddleboard
      description: Indica lo scopo o l'attività principale per cui è stata progettata
        la tavola (ad es. escursioni, yoga, gare).
    paint_application_method:
      name: Metodo di applicazione della vernice
      description: Modalità principale di applicazione del prodotto al calibro.
    paint_by_number_surface_type:
      name: Tipo di superficie del disegno numerato
      description: La superficie su cui è stampato il disegno numerato (ad esempio,
        tela, carta, pannello di legno).
    paint_medium_application_method:
      name: Metodo di applicazione del mezzo per vernici
      description: Indica il modo consigliato per applicare il mezzo.
    paint_medium_intended_effect:
      name: Effetto desiderato del mezzo per pittura
      description: Descrive l'effetto principale che il prodotto è destinato a creare
        (consistenza, lucentezza, velatura, fluidità, ecc.).
    paint_safe_bristles:
      name: Setole sicure su vernici
      description: Indica se le setole della spazzola sono commercializzate come sicure
        per l'uso su vernici e trasparenti per auto (senza graffi).
    paintable_surface:
      name: Superficie verniciabile
      description: Indica se la figura in cartapesta è pronta per essere dipinta così
        com'è (ad es. già trattata con primer/vernice) o se richiede una preparazione
        preliminare.
    paintball_caliber:
      name: Calibro da paintball
      description: Indica il diametro/calibro delle palline da paintball o delle attrezzature
        compatibili.
    paintball_feed_system:
      name: Sistema di alimentazione per paintball
      description: Spiega come vengono caricate le palline nel marcatore.
    paintball_fill_color:
      name: Colore del riempimento delle palline da paintball
      description: Indica il colore del riempimento della marcatura interna, che può
        differire da quello del guscio esterno e determina il colore che rimane dopo
        l'impatto.
    paintball_fill_type:
      name: Tipo di riempimento del paintball
      description: Descrive qualsiasi formulazione o proprietà speciale del riempimento
        (ad esempio lavabile, fosforescente, in polvere).
    paintball_grade:
      name: Grado dei pallini da paintball
      description: Descrive la classe di prestazione o il livello di utilizzo previsto
        (ad es. per principianti, campo, competizione, invernale).
    paintball_mask_coverage_level:
      name: Livello di copertura della maschera da paintball
      description: Indica quali parti del viso o della testa sono protette dagli occhiali
        o dalla maschera da paintball (solo occhiali, metà viso, viso intero o testa
        intera).
    paintball_tank_valve_type:
      name: Tipo di valvola per serbatoio da paintball
      description: Descrive l'interfaccia della valvola o del regolatore presente
        sul serbatoio.
    painting_surface_priming_type:
      name: Tipo di primer per superfici di pittura
      description: Specifica il trattamento di fondo/rivestimento della superficie
        da dipingere (oltre alla semplice distinzione tra trattata e non trattata),
        che influisce sull'adesione della pittura e sulla compatibilità delle tecniche.
    palette_knife_blade_edge_profile:
      name: Profilo del bordo della lama della spatola
      description: Descrive il profilo del bordo operativo della lama della spatola
        (non l'affilatura), che influisce sulla creazione dei segni e sulla miscelazione.
    palette_knife_flexibility:
      name: Flessibilità della spatola
      description: Descrive la rigidità/flessibilità della lama della spatola.
    palette_surface_finish:
      name: Finitura della superficie della tavolozza
      description: Descrive la finitura/il rivestimento della superficie di miscelazione
        che influisce sulla resistenza alle macchie e sulla facilità di pulizia.
    palm_padding_level:
      name: Livello di imbottitura del palmo
      description: Descrive il grado di imbottitura nell'area del palmo del guanto
        o del cuscinetto di presa.
    palm_padding_type:
      name: Tipo di imbottitura del palmo
      description: Indica il materiale o la struttura utilizzati per l'imbottitura
        del palmo (ad es. gel, schiuma, doppio strato).
    palm_wax_blend_readiness:
      name: Prontezza della miscela di cera di palma
      description: Se il prodotto è cera di palma pura o una formulazione premiscelata
        destinata a specifiche caratteristiche prestazionali.
    palm_wax_form:
      name: Forma della cera per palmo
      description: Forma fisica della cera per palmo così come venduta, che influisce
        sulla facilità di dosaggio, sulla velocità di fusione e sulla maneggevolezza.
    pan_flute_tuning_standard:
      name: Standard di accordatura del flauto di Pan
      description: Frequenza di riferimento utilizzata per l'accordatura (ad es. A4=440
        Hz), importante per suonare con altri strumenti.
    pannier_configuration:
      name: Configurazione del borsone
      description: Indica se il prodotto è venduto come borsa singola, doppia collegata
        o set di borse laterali in coppia/triplo.
    pannier_mounting_system:
      name: Sistema di montaggio del borsone
      description: Definisce il meccanismo utilizzato per fissare la borsa laterale
        al portapacchi o al telaio della bicicletta, garantendo la compatibilità con
        diverse configurazioni.
    pant_cuff_style:
      name: Stile del risvolto dei pantaloni
      description: Indica la finitura o la regolazione alla caviglia dei pantaloni
        (ad es. polsini elastici, cerniere alla caviglia, orlo aperto).
    pant_leg_conversion_type:
      name: Tipo di conversione della gamba dei pantaloni
      description: Indica se e come le gambe dei pantaloni possono essere convertite
        o regolate per diverse lunghezze.
    pantyhose_crotch_style:
      name: Stile del cavallo dei collant
      description: Definisce il design della zona del cavallo, distinguendo tra versioni
        standard a cavallo chiuso, senza cavallo o con tassello rinforzato.
    papaya_variety:
      name: Varietà di papaya
      description: Specifica la cultivar o la varietà commerciale di una papaya (ad
        es. Solo, Maradol).
    paper_and_magnetic_doll_format:
      name: Formato delle bambole di carta e magnetiche
      description: Specifica se il prodotto è un set tradizionale di bambole di carta,
        un set di bambole magnetiche o un formato ibrido.
    paper_color_family:
      name: Famiglia di colori della carta
      description: Specifica se la confezione è monocolore, in colori assortiti o
        in miscele speciali (utile quando il colore è per singolo articolo ma le confezioni
        sono miste).
    paper_magnetic_doll_set_contents:
      name: Contenuto del set di bambole di carta e magnetiche
      description: Indica quali componenti principali sono inclusi nel set.
    paper_opacity:
      name: Opacità della carta
      description: Indica il grado di trasparenza della carta, da molto trasparente
        a opaca (utile per il ricalco).
    paraglider_certification_rating:
      name: Valutazione di certificazione del parapendio
      description: Indica la classificazione ufficiale di idoneità al volo assegnata
        a un'ala da parapendio (ad es. classi EN o LTF).
    parasite_types_controlled:
      name: Tipi di parassiti controllati
      description: Elenca i parassiti interni contro cui il prodotto è efficace, in
        modo che gli acquirenti possano adattare i programmi di sverminazione a specifiche
        infestazioni.
    parking_camera_mounting_location:
      name: Posizione di montaggio della telecamera di parcheggio
      description: Punto del veicolo in cui è prevista l'installazione della telecamera
        (ad es. zona della targa, montaggio a superficie sul retro, montaggio a filo).
    parking_camera_night_vision_technology:
      name: Tecnologia di visione notturna della telecamera di parcheggio
      description: Il metodo di assistenza in condizioni di scarsa illuminazione utilizzato
        dalla telecamera.
    parking_camera_orientation:
      name: Orientamento della telecamera di parcheggio
      description: Se la telecamera è progettata per la visione posteriore (in retromarcia),
        anteriore o per un uso selezionabile/speculare.
    parking_sensor_finish:
      name: Finitura del sensore di parcheggio
      description: Indica la finitura superficiale della faccia/del cappuccio del
        sensore di parcheggio (ad es. verniciabile/primerizzato, opaco, lucido) per
        aiutare ad abbinarlo all'estetica del paraurti.
    parking_sensor_type:
      name: Tipo di sensore di parcheggio
      description: Specifica la tecnologia di rilevamento utilizzata dal sensore di
        parcheggio (ad es. a ultrasuoni, elettromagnetica, radar, ottica).
    parsley_root_variety:
      name: Varietà di radice di prezzemolo
      description: Specifica la cultivar o la varietà della radice di prezzemolo,
        se fornita dal fornitore.
    parsnip_variety:
      name: Varietà di pastinaca
      description: Identifica la varietà o la cultivar specifica di pastinaca, come
        Hollow Crown o White Gem, consentendo agli acquirenti di scegliere in base
        alle differenze di sapore, dolcezza o dimensioni.
    part_condition:
      name: Condizione del pezzo
      description: Indica se il pezzo è nuovo, usato, revisionato, ecc.
    part_placement:
      name: Posizionamento del pezzo
      description: Indica in quale punto della macchina (ad es. stair climber o stepper)
        è installato il pezzo, ad esempio a sinistra, a destra, davanti o dietro.
    partial_capo_covered_strings:
      name: Corde coperte dal capotasto parziale
      description: Specifica l'intervallo di corde coperto dal capotasto parziale
        utilizzando la numerazione standard della chitarra a 6 corde (1 = Mi acuto,
        6 = Mi grave).
    parting_style:
      name: Stile della riga
      description: Indica come la parrucca è o può essere divisa (ad es. al centro,
        di lato, senza riga), influenzando la flessibilità dello styling.
    party_favor_type:
      name: Tipo di gadget per feste
      description: Specifica di che tipo di gadget per feste si tratta (ad es. adesivi,
        mini giocattoli, bolle di sapone), per consentire la navigazione/il filtraggio
        all'interno dei Gadget per feste.
    party_game_format:
      name: Formato del gioco di società
      description: Formato fisico principale del gioco di società.
    party_horn_mouthpiece_type:
      name: Tipo di bocchino della trombetta da festa
      description: Specifica la struttura del bocchino, che influisce sull'igiene
        e sul comfort.
    party_horn_style:
      name: Stile della tromba da festa
      description: Descrive lo stile di costruzione/funzionamento della tromba da
        festa (come si estende o produce il suono).
    passenger_car_type:
      name: Tipo di carrozza passeggeri
      description: Identifica il tipo specifico di materiale rotabile passeggeri (carrozza
        passeggeri) per il modello (ad es. carrozza, carrozza letto), utilizzato per
        la navigazione e la creazione di set.
    passion_fruit_variety:
      name: Varietà di frutto della passione
      description: Identifica/specifica la varietà botanica o commerciale del frutto
        della passione offerto (ad es. viola, giallo, granadilla).
    pasta_sauce_texture:
      name: Consistenza del sugo per la pasta
      description: Descrive la consistenza del sugo (ad es. liscio, a pezzetti, cremoso)
        per soddisfare le preferenze di consistenza in bocca dei consumatori.
    pasta_sauce_variety:
      name: Varietà di sugo per la pasta
      description: Classifica i sughi per la pasta in base alla ricetta o allo stile,
        in modo che gli acquirenti possano individuare rapidamente i classici come
        la marinara o i sughi speciali come quello alla vodka o al pesto.
    pastry_crust_state:
      name: Stato della pasta per dolci
      description: Descrive lo stato di preparazione o di cottura della pasta al momento
        dell'acquisto.
    pastry_crust_style:
      name: Stile della crosta per pasticceria
      description: Identifica lo stile specifico della pasta o il tipo di impasto.
    pastry_filling_type:
      name: Tipo di ripieno
      description: Specifica il ripieno principale della pasta o dello scone.
    patch_adhesion_method:
      name: Metodo di adesione della toppa
      description: Specifica come la toppa aderisce al tubo o allo pneumatico (ad
        es. autoadesiva, vulcanizzata con cemento o attivata dal calore).
    patch_backing_material:
      name: Materiale del supporto della toppa
      description: Materiale utilizzato sul retro/base della toppa (ad es. feltro,
        twill) a contatto con l'oggetto da decorare.
    patch_backing_type:
      name: Tipo di supporto della toppa
      description: Il supporto utilizzato sulla toppa (ad es. termosaldabile/da stirare,
        adesivo peel-and-stick, velcro, nessuno).
    patch_base_material:
      name: Materiale base della toppa
      description: Materiale tessile di base/supporto principale della toppa con motivo
        (non le decorazioni).
    patch_border_edge_finish:
      name: Finitura del bordo/del bordo della toppa
      description: Il metodo di finitura del bordo della toppa (ad es. bordo merrow/overlock,
        bordo tagliato al laser) che influisce sulla durata e sull'aspetto.
    patch_placement_area:
      name: Area di posizionamento della toppa
      description: Area di posizionamento comune prevista per la toppa su abbigliamento/accessori.
    pathogen_removal_capability:
      name: Capacità di rimozione dei patogeni
      description: Specifica quali classi di microrganismi (batteri, protozoi, virus)
        la pompa è certificata per rimuovere.
    pattern_sizing_system:
      name: Sistema di taglie del modello
      description: Specifica il sistema di taglie regionale o lo standard utilizzato
        per la tabella delle taglie del modello (ad es. USA, Regno Unito, UE).
    peak_style:
      name: Stile del risvolto a punta
      description: Specifica lo stile della visiera o della punta del casco, che influisce
        sulla copertura, sull'estetica e sulle regole della disciplina.
    pear_variety:
      name: Varietà di pera
      description: Identifica la cultivar o la varietà di pere (ad es. Bartlett, Bosc,
        Conference), consentendo agli acquirenti di scegliere il gusto, la consistenza
        e l'uso culinario preferiti.
    pearl_luster_grade:
      name: Grado di lucentezza della perla
      description: Grado qualitativo di lucentezza/brillantezza della superficie della
        perla.
    pearl_matching_level:
      name: Livello di abbinamento delle perle
      description: Indica quanto le perle siano ben abbinate all'interno di un lotto
        o di un filo (ad es. per colore, dimensione e lucentezza).
    pearl_shape:
      name: Forma della perla
      description: La categoria di forma complessiva della perla.
    pearl_surface_condition:
      name: Condizione della superficie della perla
      description: Indica la condizione visibile della superficie di una perla, in
        base alla presenza e alla gravità di imperfezioni o macchie.
    pearl_treatment:
      name: Trattamento della perla
      description: Indica eventuali trattamenti applicati alla perla che ne influenzano
        il colore o l'aspetto.
    pearl_type:
      name: Tipo di perla
      description: Specifica la varietà o l'origine della perla (ad es. d'acqua dolce,
        Akoya, tahitiana, dei Mari del Sud) per le perle sfuse.
    peat_level:
      name: Livello di torba
      description: Descrive l'intensità dell'influenza del fumo di torba nel whisky,
        da non torbato a fortemente torbato.
    pedal_and_cleat_system_compatibility:
      name: Compatibilità del sistema di pedali e tacchetti
      description: Specifica con quali standard di pedali o tacchetti è progettato
        per funzionare lo spessore o il cuneo, garantendo che gli acquirenti scelgano
        un prodotto adatto ai propri pedali e alle proprie scarpe.
    pedal_configuration:
      name: Configurazione dei pedali
      description: Indica se la sedia è dotata di un pedale singolo, di pedali separati/indipendenti
        o di un design convertibile.
    pedal_mounting_style:
      name: Stile di montaggio del pedale
      description: Specifica come il pedale o il copripedale/cuscinetto si fissa al
        veicolo (metodo di installazione/fissaggio).
    pedal_set_components:
      name: Componenti del set di pedali
      description: Specifica quali pedali sono inclusi nel set.
    pedal_spindle_material:
      name: Materiale del perno del pedale
      description: Materiale utilizzato per l'asse/perno del pedale, che influenza
        la resistenza, il peso e la resistenza alla corrosione.
    pedal_spindle_thread_size:
      name: Dimensione della filettatura del perno del pedale
      description: Specifica lo standard di filettatura del perno del pedale che si
        avvita al braccio della pedivella.
    pedal_type:
      name: Tipo di pedale
      description: Descrive lo stile dei pedali forniti con la bicicletta, indicando
        la compatibilità delle scarpe e lo stile di guida.
    pellet_accessory_type:
      name: Tipo di accessorio per pellet
      description: Identifica il tipo specifico di accessorio per pallini in modo
        che i pescatori possano individuare rapidamente trapani, bandatori o fermi
        in base alle loro esigenze di costruzione dell'attrezzatura.
    pellet_grade:
      name: Grado dei pallini
      description: Indica la precisione di fabbricazione o il grado di prestazione
        dei pallini da softair.
    pen_ink_color:
      name: Colore dell'inchiostro della penna
      description: Indica il colore effettivo dell'inchiostro erogato dalla penna,
        che può differire dal colore esterno del corpo.
    penalty_card_accessories_included:
      name: Accessori per cartellini inclusi
      description: Elenca gli accessori arbitrali aggiuntivi inclusi con i cartellini,
        come portafoglio, blocco segnapunti, matita, moneta, fischietto o custodia.
    penalty_card_colors_included:
      name: Colori dei cartellini di penalità inclusi
      description: Elenca i colori dei cartellini contenuti nel set di prodotti.
    penalty_flag_throw_distance:
      name: Distanza di lancio della bandierina
      description: Classificazione di progettazione che indica la distanza di lancio
        prevista della bandierina.
    pendant_cutter_safety_features:
      name: Caratteristiche di sicurezza del tagliafilo a ciondolo
      description: Identifica gli elementi di sicurezza integrati che riducono i tagli
        accidentali durante il trasporto/l'uso.
    pendant_cutter_wear_method:
      name: Metodo di utilizzo del tagliafilo a ciondolo
      description: Specifica come il tagliafilo a ciondolo deve essere trasportato
        o indossato.
    pepper_variety:
      name: Varietà di peperoncino
      description: Specifica la varietà o la specie di peperoncino utilizzata nel
        prodotto, consentendo agli acquirenti di distinguere tra diversi profili di
        sapore e livelli di piccantezza.
    percussion_case_style:
      name: Stile della custodia per percussioni
      description: Classifica lo stile/la struttura complessiva della custodia (borsa
        morbida vs custodia rigida rispetto a ibrida).
    percussion_instruments_included:
      name: Strumenti a percussione inclusi
      description: Elenca i tipi di strumenti a percussione inclusi quando il prodotto
        è un set di giocattoli multi-strumento.
    percussion_mallet_handle_grip_style:
      name: Stile dell'impugnatura del martello per percussioni
      description: Identifica il tipo di trattamento dell'impugnatura (oltre alla
        texture), come legno grezzo, laccato, gommato o rivestito.
    percussion_mallet_head_construction:
      name: Struttura della testa del martello per percussioni
      description: Descrive lo stile di costruzione della testa del martello (ad es.
        filato avvolto, feltro avvolto, gomma, legno grezzo), che influisce sul suono
        e sulla durata.
    perfumery_base_carrier_type:
      name: Tipo di solvente della base di profumeria
      description: Specifica il sistema di veicoli/solventi di una base di profumeria
        (di cosa è composta principalmente la base per la diluizione e le prestazioni).
    perfumery_base_intended_application:
      name: Applicazione prevista della base di profumeria
      description: Indica il formato di utilizzo finale per cui la base è progettata
        (ad es. profumo spray o roll-on).
    perfumery_ingredient_carrier_solvent:
      name: Veicolo/solvente dell'ingrediente di profumeria
      description: Identifica il vettore/solvente in cui l'ingrediente viene fornito,
        se diluito (ad es. etanolo, DPG, olio di jojoba).
    perfumery_ingredient_form:
      name: Forma dell'ingrediente per profumeria
      description: Specifica la forma/lo stato fisico dell'ingrediente di profumeria
        così come viene fornito.
    perfumery_ingredient_type:
      name: Tipo di ingrediente per profumeria
      description: Classifica l'ingrediente di profumeria in base a ciò che è nella
        pratica della profumeria (ad es. olio essenziale, sostanza chimica aromatica).
    perfumery_ingredient_usage_note:
      name: Nota sull'uso dell'ingrediente di profumeria
      description: Indica il ruolo tipico nella struttura di una fragranza (nota di
        testa, di cuore, di fondo), tenendo conto che i materiali possono abbracciare
        più note.
    perfumery_ingredients:
      name: Ingredienti per profumeria
      description: Elenca i tipi di materiali profumati consumabili inclusi nel kit
        (ad es. oli essenziali, oli profumati, base alcolica).
    perfumery_note_position:
      name: Posizione della nota di profumeria
      description: Indica il ruolo tipico dell'ingrediente nella struttura di una
        fragranza (testa/cuore/fondo).Indica il ruolo tipico dell'ingrediente nella
        struttura di una fragranza (nota di testa/di cuore/di fondo).
    persimmon_variety:
      name: Varietà di cachi
      description: Identifica la cultivar o la varietà del cachi, poiché varietà diverse
        come Fuyu o Hachiya differiscono per consistenza, sapore, astringenza e uso
        culinario.
    personalization_type:
      name: Tipo di personalizzazione
      description: Specifica se e come il prodotto può essere personalizzato per un
        evento (ad es. monogramma, nome/data, inserimento di foto).
    phonics_focus:
      name: Focus fonetico
      description: Specifica quali competenze fonetiche e di lettura delle parole
        sono oggetto del giocattolo di lettura.
    physalis_variety:
      name: Varietà di Physalis
      description: Identifica la specifica specie botanica, cultivar o varietà comune
        di physalis in vendita.
    pi_ata_filler_type_included:
      name: Tipo di riempimento della piñata incluso
      description: Se il riempimento è incluso, il tipo di contenuto fornito.
    pi_ata_hanging_method:
      name: Metodo di sospensione della piñata
      description: Modalità di fissaggio o supporto della piñata (con anello, gancio,
        cordino, ecc.).
    pi_ata_opening_type:
      name: Metodo di apertura della piñata
      description: Modalità di accesso/chiusura dell'apertura di riempimento (sportello,
        velcro, cerniera, pre-sigillata, ecc.).
    piccolo_key_system:
      name: Sistema di chiavi del piccolo
      description: Identifica il sistema/design delle chiavi utilizzato sul piccolo
        (tipicamente il sistema Boehm per i piccoli moderni).
    piccolo_keywork_features:
      name: Caratteristiche delle chiavi del piccolo
      description: Specifica i meccanismi e le opzioni degni di nota delle chiavi
        del piccolo.
    pick_grip_aid:
      name: Ausilio per la presa del plettro
      description: Indica il principale ausilio di presa integrato nel plettro oltre
        alla sensazione/texture generale della superficie (ad es. fori di presa, logo
        in rilievo, intarsio in gomma).
    pickleball_construction_type:
      name: Tipo di costruzione del pickleball
      description: Struttura di fabbricazione della palla, ad esempio monopezzo senza
        cuciture o in due pezzi saldati, che influisce sulla durata e sulla costanza
        di volo.
    pickling_method:
      name: Metodo di conservazione in salamoia
      description: Specifica il mezzo o la tecnica di conservazione utilizzati per
        la conservazione in salamoia, come la salamoia all'aceto o la fermentazione
        lattica.
    pickup_and_preamp_configuration:
      name: Configurazione del pickup e del preamplificatore
      description: Indica se la viola include un pickup integrato e/o un preamplificatore
        attivo per l'amplificazione dal vivo o la registrazione.
    pickup_configuration:
      name: Configurazione del pickup
      description: Descrive la disposizione complessiva dei pickup di una chitarra
        elettrica utilizzando le abbreviazioni comuni (ad es. SSS, HSS, HH).
    pickup_cover_material:
      name: Materiale della copertura del pickup
      description: Specifica il materiale principale del coperchio del pickup (se
        presente), comprese le finiture placcate comuni quando il produttore lo specifica
        in questo modo.
    pickup_cover_type:
      name: Tipo di copertura del pickup
      description: Specifica se un pickup per chitarra elettrica ha una copertura
        e il materiale/stile della copertura (ad es. metallo o plastica).
    pickup_string_spacing:
      name: Distanza tra le corde del pickup
      description: Lo standard di spaziatura tra i poli e le corde per cui il pickup
        è realizzato (ad es. Fender/spaziatura F vs Gibson/standard), che influisce
        sull'allineamento sulle chitarre dotate di tremolo.
    pie_crust_type:
      name: Tipo di crosta per torta
      description: Specifica lo stile o il tipo di crosta utilizzata per la torta
        o la crostata, come pasta sfoglia, cracker Graham o crosta senza glutine.
    piece_configuration:
      name: Configurazione del pezzo
      description: Indica in quanti pezzi separati è composto il que, l'asta o il
        ponte, influenzando la trasportabilità e lo stile di esecuzione.
    pillow_form_size:
      name: Dimensioni della forma del cuscino
      description: Designazione standardizzata delle dimensioni finite per le forme/gli
        inserti dei cuscini (ad es. 18" x 18").
    pilot_helmet_communications_integration:
      name: Integrazione delle comunicazioni nel casco da pilota
      description: Indica se il casco include o è preconfigurato per componenti di
        comunicazione aeronautica.
    pilot_helmet_visor_configuration:
      name: Configurazione della visiera del casco da pilota
      description: Specifica la configurazione della visiera/schermatura facciale
        inclusa con il casco da pilota.
    pin_attachment_type:
      name: Tipo di fissaggio dello spillo
      description: Specifica il meccanismo di fissaggio/retro utilizzato per attaccare
        la spilla all'abbigliamento o a una superficie (ad es. chiusura a farfalla,
        retro magnetico).
    pin_backing_type:
      name: Tipo di supporto dello spillo
      description: Specifica il meccanismo di fissaggio/supporto utilizzato per fissare
        la spilla all'abbigliamento o agli accessori.
    pin_cushion_attachment_style:
      name: Stile di fissaggio del cuscinetto per spille
      description: Come viene indossato, fissato o posizionato il cuscinetto per spille
        durante l'uso.
    pin_cushion_features:
      name: Caratteristiche del cuscinetto per spille
      description: Caratteristiche funzionali oltre alla semplice tenuta delle spille.
    pin_face_customization_method:
      name: Metodo di personalizzazione della faccia della spilla
      description: Specifica come viene realizzato il disegno frontale (ad es. smalto
        duro, smalto morbido, stampato).
    pin_type:
      name: Tipo di spilla
      description: Specifica lo stile o il formato della spilla utilizzata per i collezionabili
        dedicati agli appassionati di sport.
    ping_pong_certification:
      name: Certificazione ping pong
      description: Dichiara lo standard ufficiale o il livello di approvazione da
        parte dell'ente di governo del prodotto.
    ping_pong_competition_certification:
      name: Certificazione da competizione ping pong
      description: Indica lo stato di certificazione ufficiale della pallina da ping
        pong per il gioco regolamentato (ad es. approvata dall'ITTF).
    ping_pong_paddle_handle_style:
      name: Stile del manico della racchetta da ping pong
      description: Definisce la forma/lo stile del manico della racchetta, che influenza
        il comfort dell'impugnatura e la tecnica di gioco.
    ping_pong_robot_accessory_type:
      name: Tipo di accessorio per robot da ping pong
      description: Identifica il sottotipo funzionale dell'accessorio in modo che
        gli acquirenti possano restringere rapidamente i risultati (ad es. reti vs.
        alimentatori).
    ping_pong_rubber_surface_type:
      name: Tipo di superficie della gomma da ping pong
      description: Identifica lo stile/la trama della superficie della gomma applicata
        alla racchetta, che influisce sulle caratteristiche di rotazione e velocità.
    ping_pong_rubber_type:
      name: Tipo di gomma da ping pong
      description: Specifica lo stile di costruzione della superficie di un foglio
        di gomma da ping pong, che influenza le caratteristiche di gioco.
    ping_pong_table_type:
      name: Tipo di tavolo da ping pong
      description: Classifica lo stile o il formato generale del tavolo per facilitare
        il confronto (ad es. da competizione, con parte superiore convertibile, mini).
    pipe_instrument_voicing_sound_production_method:
      name: Intonazione dello strumento a canne / metodo di produzione del suono
      description: Specifica il modo in cui lo strumento produce il suono (meccanismo
        di flusso d'aria), aiutando a distinguere le famiglie dei flauti di Pan, degli
        strumenti a ancia e delle canne d'organo nei filtri.
    piston_application_type:
      name: Tipo di applicazione del pistone
      description: Destinazione d'uso/caso d'uso del pistone (sostituzione vs prestazioni/competizione
        vs impieghi gravosi).
    piston_crown_dish_style:
      name: Stile della corona/del piatto del pistone
      description: Forma della corona del pistone che influenza il volume della camera
        di combustione e la compressione (ad es. flat top, cupola, piatto).
    piston_pin_retention_type:
      name: Tipo di fissaggio del perno del pistone
      description: Specifica come il perno del polso (pistone) è fissato nel gruppo
        pistone/biella.
    pit_configuration:
      name: Configurazione del pit
      description: Definisce il formato strutturale dell'area di atterraggio (monopezzo
        o multimodulo) e, per estensione, il numero di sezioni o moduli forniti.
    pit_cover_type:
      name: Tipo di copertura del pit
      description: Specifica la superficie protettiva o il rivestimento fornito con
        la fossa, che influisce sulla resistenza alle punture, sulla protezione dagli
        agenti atmosferici e sulle preferenze dell'atleta.
    pitahaya_flesh_color:
      name: Colore della polpa del pitahaya
      description: Specifica il colore della polpa interna del pitahaya (frutto del
        drago) (ad es. bianco, rosso, magenta), un fattore chiave di differenziazione
        che influisce sul gusto, sull'aspetto e sul valore nutrizionale percepito.
    pitch_mat_coverage_length:
      name: Lunghezza di copertura del tappeto del campo da cricket
      description: Classifica il tappeto del campo da cricket in base alla porzione
        di wicket che copre (ad es. campo intero o mezzo campo).
    pitch_range:
      name: Gamma di tonalità
      description: Descrive l'intervallo di tonalità/luminosità percepito del suono
        dello shaker.
    pitch_standard:
      name: Standard di tonalità
      description: Specifica lo standard di tonalità (accordatura di riferimento)
        per cui è stato progettato il registratore (ad es. La=440, La=442, La=415).
    pitching_rubber_size_designation:
      name: Designazione delle dimensioni del tappetino di lancio
      description: Indica la classificazione standard delle dimensioni del campo per
        il tappetino di lancio, semplificando la selezione senza richiedere agli acquirenti
        di conoscere le misure esatte.
    pitching_screen_style:
      name: Stile dello schermo di lancio
      description: Definisce il design strutturale dello schermo in modo che gli acquirenti
        possano selezionare rapidamente la disposizione protettiva corretta per il
        loro scenario di allenamento.
    pitching_target_design:
      name: Design del bersaglio di lancio
      description: Classifica lo stile o la configurazione complessiva del bersaglio
        di lancio.
    pitching_wheel_count:
      name: Numero di ruote di lancio
      description: Indica il numero di ruote di propulsione utilizzate da una macchina
        lanciapalle.
    pivot_adjustability:
      name: Regolabilità del perno
      description: Indica se le forbici dispongono di una vite di regolazione del
        perno per regolare la tensione di taglio.
    pivot_piece_type:
      name: Tipo di perno
      description: Distingue tra le diverse forme di interfaccia del perno fornite,
        come le coppe tradizionali o lo stile a tubo.
    place_card_holder_closure_mechanism:
      name: Meccanismo di chiusura del segnaposto
      description: Specifica come il supporto afferra o fissa il segnaposto.
    place_card_orientation:
      name: Orientamento del segnaposto
      description: Specifica l'orientamento del segnaposto quando viene utilizzato/esposto.
    place_card_printing_status:
      name: Stato di stampa del segnaposto
      description: Indica se il segnaposto è vuoto per essere scritto a mano/stampato,
        prestampato (nomi non personalizzati) o personalizzato/stampato su misura.
    placket_type:
      name: Tipo di abbottonatura
      description: Specifica lo stile dell'apertura frontale della polo, compreso
        il numero di bottoni o chiusure alternative.
    planetarium_content_theme:
      name: Tema dei contenuti del planetario
      description: Contenuto principale visualizzato dal proiettore del planetario.
    planetarium_projection_content_format:
      name: Formato dei contenuti di proiezione del planetario
      description: Specifica il meccanismo di proiezione utilizzato dal planetario
        (dischi fisici/diapositive vs effetto digitale/LED).
    plant_fiber_type:
      name: Tipo di fibra vegetale
      description: Tipo specifico di fibra di origine vegetale quando il tipo di fonte
        della fibra in fiocco è "Vegetale".
    plaster_gauze_finish:
      name: Finitura della garza per gesso
      description: Tendenza della finitura superficiale risultante dopo l'applicazione
        e la lisciatura.
    plaster_gauze_grade:
      name: Grado della garza per gesso
      description: Grado di utilizzo previsto della garza per gesso (ad es. artigianato/studenti
        vs professionale).
    plaster_gauze_weave_density:
      name: Densità dell'intreccio della garza per gesso
      description: Relativa apertura/compattezza dell'intreccio della garza, che influisce
        sulla resistenza e sull'assorbimento del gesso.
    plastic_canvas_finish:
      name: Finitura della tela plastica
      description: Trattamento della superficie/finitura del rotolo di tela plastica.
    plastic_canvas_sheet_finish:
      name: Finitura del foglio di tela di plastica
      description: Trattamento della superficie/bordo del foglio di tela di plastica.
    plastic_canvas_transparency:
      name: Trasparenza della tela plastica
      description: Grado di trasparenza/opacità della tela plastica.
    plate_bottom_design:
      name: Design del fondo del disco
      description: Descrive la struttura della parte inferiore del disco, che influisce
        sulla trazione, la stabilità e la sicurezza su diverse superfici di gioco.
    plate_compatibility_standard:
      name: Standard di compatibilità della piastra
      description: Indica lo standard del disco per cui il bilanciere è progettato
        (ad es. Olimpico 50 mm, Standard 25 mm).
    plate_installation_type:
      name: Tipo di installazione della piastra
      description: Specifica come la piastra viene fissata o posizionata sul campo
        (ad es. interrata, con picchetti, a posare), consentendo agli acquirenti di
        scegliere tra opzioni permanenti e portatili.
    plate_size_category:
      name: Categoria di taglia della piastra
      description: Classifica la piastra in base al livello di gioco o allo standard
        regolamentare, in modo che gli acquirenti possano individuare rapidamente
        l'attrezzatura conforme al campionato.
    play_dough_putty_kit_contents:
      name: Contenuto del kit per plastilina e mastice
      description: Identifica i principali componenti inclusi oltre al composto stesso
        (ad es. strumenti, stampi, estrusore, contenitore).
    play_dough_tool_set_items_included:
      name: Articoli inclusi nel set di strumenti per la pasta modellabile
      description: Identifica i tipi di strumenti e accessori inclusi in un set di
        strumenti per la pasta modellabile (ad es. rulli, taglierine, stampi).
    play_environment_suitability:
      name: Idoneità all'ambiente di gioco
      description: Identifica l'ambiente di gioco previsto per il set (ad es. interno,
        esterno, acqua).
    play_food_features:
      name: Caratteristiche del cibo giocattolo
      description: Caratteristiche funzionali o di realismo speciali degli articoli
        di cibo giocattolo.
    play_food_items_included:
      name: Articoli di cibo giocattolo inclusi
      description: Indica i tipi di cibo giocattolo inclusi nel set da cucina.
    play_food_size_scale:
      name: Scala di dimensioni del cibo giocattolo
      description: Indica la scala di dimensioni approssimativa dei pezzi di cibo
        finto per la compatibilità con cucine giocattolo, bambole e set da gioco.
    play_money_set_components_included:
      name: Componenti del set di denaro di gioco inclusi
      description: Specifica quali tipi di componenti sono inclusi nel set di denaro
        finto/banca giocattolo.
    play_pattern:
      name: Fantasia di gioco
      description: Il modo principale in cui il giocattolo è destinato ad essere utilizzato
        (ad es. antistress, scultura da scrivania/arte, costruzione/edilizia o puzzle).
    play_sprinkler_mounting_type:
      name: Tipo di montaggio dell'irrigatore giocattolo
      description: Come l'irrigatore giocattolo viene posizionato/fissato durante
        l'uso.
    play_vehicle_lights_and_sounds:
      name: Luci e suoni del veicolo giocattolo
      description: Indica se il veicolo giocattolo include effetti elettronici come
        luci e/o suoni.
    play_vehicle_scale:
      name: Scala del veicolo giocattolo
      description: Indica il rapporto di scala del veicolo giocattolo (comunemente
        usato per veicoli giocattolo pressofusi e simili a modellini).
    player_size_category:
      name: Categoria di taglia del giocatore
      description: Definisce la fascia di età/taglia del giocatore a cui è destinato
        il set di attrezzatura da ricevitore (ad es. Tee Ball, Giovani, Intermedio,
        Adulti).
    player_size_range:
      name: Fascia di taglie del giocatore
      description: Specifica la fascia di taglie a cui è destinata la cinghia/il supporto
        (ad es. bambino, adulto, universale).
    playing_environment:
      name: Ambiente di gioco
      description: Specifica la superficie di gioco principale o il contesto per cui
        è progettata la palla da hockey.
    playing_method:
      name: Modalità di gioco
      description: Modalità principale di utilizzo/attivazione dello strumento.
    playing_surface_material:
      name: Materiale della superficie di gioco
      description: Identifica il materiale della superficie di esecuzione frontale
        del cajon (tapa), che influisce fortemente sul tono e sul suono.
    playing_surface_type:
      name: Tipo di superficie di gioco
      description: Descrive la struttura/sensazione della superficie di gioco del
        tappetino da allenamento.
    playset_activities_included:
      name: Attività del parco giochi incluse
      description: Identifica le principali attività/componenti di gioco integrate
        nell'altalena/parco giochi per aiutare gli acquirenti a filtrare in base a
        ciò che i bambini possono fare sulla struttura.
    playset_installation_type:
      name: Tipo di installazione del playset
      description: Specifica come l'altalena/il parco giochi viene installato o fissato.
    playset_items_included:
      name: Articoli del playset inclusi
      description: Identifica i tipi di oggetti per il gioco di finzione inclusi nel
        parco giochi da picnic (cibo, stoviglie, coperta, cestino, ecc.).
    pliers_jaw_style:
      name: Stile delle ganasce delle pinze
      description: Descrive la configurazione primaria delle ganasce o lo stile funzionale
        delle pinze.
    plum_variety:
      name: Varietà di prugna
      description: Identifica la cultivar o la varietà specifica di prugna, consentendo
        agli acquirenti di scegliere in base al sapore, al colore e all'uso culinario
        previsto.
    plumcot_variety:
      name: Varietà di plumcot
      description: Identifica la cultivar specifica o la varietà commerciale del susino
        (ad es. Flavor King, Dapple Dandy), che può influenzare il sapore, il colore
        e la stagionalità.
    plunger_mute_handle_type:
      name: Tipo di impugnatura del silenziatore a stantuffo
      description: Specifica lo stile dell'impugnatura o della presa utilizzata per
        tenere e manovrare un silenziatore a stantuffo per ottenere effetti wa-wa.
    pocket_closure_type:
      name: Tipo di chiusura delle tasche
      description: Definisce come ogni tasca è fissata, aiutando gli utenti a trovare
        pantaloni con uno spazio di stivaggio sicuro durante l'attività.
    pocket_knife_opening_mechanism:
      name: Meccanismo di apertura del coltello tascabile
      description: Come la lama viene estesa/aperta (tacca manuale per l'unghia, perno
        per il pollice, flipper, assistita, automatica, ecc.).
    pocket_style:
      name: Stile delle tasche
      description: Specifica la struttura principale delle tasche presenti sui pantaloni.
    pocket_type:
      name: Tipo di tasca
      description: Identifica lo stile o la presenza di tasche sul capo.
    pod_retention_system:
      name: Sistema di ritenzione dei pod
      description: Descrive come i pod da paintball vengono tenuti in posizione e
        rilasciati dall'imbracatura o dallo zaino.
    pogo_stick_footrest_type:
      name: Tipo di poggiapiedi del trampolo a molla
      description: Descrive il design della piattaforma/pedana utilizzata per stare
        in piedi sul trampolo a molla.
    pogo_stick_suspension_type:
      name: Tipo di sospensione del trampolo a molla
      description: Specifica il meccanismo di rimbalzo del trampolo a molla, che influisce
        sulla sensazione, sulla durata e sulla manutenzione.
    poi_handle_type:
      name: Tipo di manico del poi
      description: Specifica il tipo di impugnatura/attacco utilizzato per tenere
        il poi.
    poi_light_source:
      name: Sorgente di luce del poi
      description: Per i poi illuminati, specifica la tecnologia di illuminazione.
    poi_tether_type:
      name: Tipo di cordino del poi
      description: Indica il tipo di cordino che collega la testa del poi all'impugnatura,
        al pomello o al passante da polso (ad es. cordino, corda, catena).
    poi_type:
      name: Tipo di poi
      description: Specifica il tipo principale di costruzione/utilizzo del poi (ad
        es. da allenamento, LED, da fuoco).
    point_type:
      name: Tipo di punta
      description: Forma/stile della punta utilizzata sull'ago da ricamo.
    pointe_shoe_shank_length:
      name: Lunghezza della suola della scarpa da punta
      description: Porzione della lunghezza della scarpa supportata dal gambo, ad
        esempio a lunghezza intera o a 3/4.
    pointe_shoe_shank_strength:
      name: Rigidità del gambo della scarpa da punta
      description: Livello di rigidità del gambo di una scarpa da punta, che influisce
        sul sostegno e sul tempo di rodaggio.
    poker_accessory_storage_included:
      name: Vano porta accessori per poker incluso
      description: Indica per quali articoli aggiuntivi per il poker l'accessorio
        offre uno spazio di stivaggio dedicato.
    poker_chip_tray_rack_configuration:
      name: Configurazione vassoio/portachip da poker
      description: Descrive lo stile di organizzazione interna di un vassoio/portachip
        (numero di file e capacità per fila).
    pole_anchoring_method:
      name: Metodo di ancoraggio del palo
      description: Definisce come il palo viene fissato al suolo o alla superficie
        di gioco.
    pole_basket_type:
      name: Tipo di cestello del palo
      description: Classifica lo stile o la dimensione del cestino montato vicino
        alla punta del bastoncino da sci, indicando le condizioni di neve previste.
    pole_connection_system:
      name: Sistema di connessione dei bastoncini
      description: Identifica il meccanismo che unisce le sezioni dei bastoncini,
        come i sistemi a cordino elastico, filettati o a mozzo, aiutando gli utenti
        a valutare la velocità di montaggio e la compatibilità.
    pole_system_type:
      name: Tipo di sistema del palo
      description: Descrive il sistema di supporto strutturale o lo stile di montaggio
        utilizzato dalla tenda (ad esempio, pali in alluminio, tubi gonfiabili, montaggio
        con bastoncini da trekking).
    police_equipment_fitment:
      name: Allestimento per attrezzature delle forze dell'ordine
      description: Specifica quali attrezzature delle forze dell'ordine il veicolo
        è configurato o precablato per supportare.
    police_vehicle_equipment_package:
      name: Pacchetto di equipaggiamento per veicoli delle forze dell'ordine
      description: Indica gli allestimenti/equipaggiamenti specifici per le forze
        dell'ordine inclusi nel veicolo al momento della vendita.
    police_vehicle_light_siren_equipment:
      name: Apparecchiature di illuminazione/sirena per veicoli delle forze dell'ordine
      description: Specifica quali dispositivi di segnalazione di emergenza sono installati
        sull'auto delle forze dell'ordine.
    police_vehicle_upfit_level:
      name: Livello di allestimento dei veicoli delle forze dell'ordine
      description: Descrive quali attrezzature/allestimenti specifici per forze dell'ordine
        sono installati sul furgone.
    polish_formulation:
      name: Formulazione del lucido
      description: Indica la base/composizione chimica della formulazione del lucido
        per tastiera (non il metodo di applicazione).
    polish_purpose:
      name: Finalità del lucido
      description: Risultato primario previsto del lucido sulla superficie dello strumento.
    pollen_level:
      name: Livello di polline
      description: Indica la quantità/probabilità di macchie di polline della varietà
        di giglio.
    polymer_clay_firmness_level:
      name: Livello di consistenza dell'argilla polimerica
      description: Consistenza/morbidezza relativa dell'argilla polimerica prima della
        cottura (lavorabilità).
    polymer_clay_translucency:
      name: Traslucenza dell'argilla polimerica
      description: Opacità/trasparenza visiva dell'argilla polimerica una volta indurita.
    pom_pom_handle_style:
      name: Stile dell'handle del pom pom
      description: Descrive lo stile o la struttura dell'impugnatura/manico utilizzato
        per tenere il pompon.
    pom_pom_trim_backing_tape_material:
      name: Materiale del nastro/del supporto del pompon
      description: Identifica il materiale del nastro cucito o della treccia a cui
        sono fissati i pompon (la base del pompon).
    pom_pom_type:
      name: Tipo di pompon
      description: Indica la presenza e il tipo specifico di pompon o nappina sul
        cappello.
    pomegranate_product_form:
      name: Forma del prodotto a base di melograno
      description: Descrive la forma fisica offerta (frutto intero, arilli sbucciati,
        chicchi, arilli congelati).
    pomegranate_variety:
      name: Varietà di melograno
      description: Identifica la cultivar o la varietà specifica del frutto del melograno
        (ad es. Wonderful, Bhagwa, Kandhari).
    ponytail_holder_style:
      name: Stile dell'elastico per coda di cavallo
      description: Descrive la struttura specifica o il fattore di forma dell'elastico
        per coda di cavallo in modo che gli acquirenti possano scegliere il loro stile
        preferito.
    popcorn_form:
      name: Forma dei popcorn
      description: Indica la forma fisica o di preparazione del prodotto popcorn,
        come pronto da mangiare, chicchi, confezione per microonde, kit di condimento
        o barattolo regalo.
    pork_rind_form:
      name: Forma di cotenna di maiale
      description: Classifica la forma fisica o lo stile degli snack a base di cotenna
        di maiale (ad esempio, cotenna, ciccioli, snack soffiati, pellet, ecc.).
    portability_features:
      name: Caratteristiche di portabilità
      description: Elenca gli elementi integrati che facilitano lo spostamento, il
        trasporto o lo stoccaggio del lettino.
    portability_frame_type:
      name: Portabilità/tipo di telaio
      description: Specifica se le campane tubolari sono portatili (da campo) o fisse
        (da concerto)
    portable_electronic_game_features:
      name: Caratteristiche del gioco elettronico portatile
      description: Caratteristiche chiave di gioco/hardware supportate dal dispositivo.
    post_surgery_stage_suitability:
      name: Idoneità della fase post-operatoria
      description: Indica per quale fase di recupero (se presente) è progettato il
        body, importante per l'acquirente di indumenti modellanti medicali.
    postage_stamp_format:
      name: Formato del francobollo
      description: Modalità di offerta/confezionamento del francobollo definitivo
        (singolo, coppia, striscia, blocco, foglio, libretto, rotolo, ecc.).
    postmark_type:
      name: Tipo di timbro postale
      description: Tipo di annullamento/timbro postale presente sui francobolli definitivi
        usati.
    potato_cut_style:
      name: Stile di taglio delle patate
      description: Indica il taglio fisico o lo stile di preparazione delle patate
        quando non vengono vendute intere.
    potato_intended_use:
      name: Uso previsto della patata
      description: Distingue le patate destinate al consumo immediato da quelle destinate
        a essere utilizzate come patate da semina o prodotti trasformati surgelati.
    potato_variety:
      name: Varietà di patate
      description: Specifica la cultivar/varietà delle patate, consentendo agli acquirenti
        di trovare tipi specifici come "Yukon Gold", "Maris Piper" o "Purple Majesty".
    pottery_clay_firing_required:
      name: Cottura dell'argilla per ceramica richiesta
      description: Se il materiale richiede la cottura in forno per raggiungere la
        durezza/finitura finale prevista.
    pottery_slip_application_method:
      name: Metodo di applicazione dell'ingobbio
      description: Specifica la tecnica di applicazione prevista per l'ingobbio.
    pottery_slip_compatible_clay_body:
      name: Corpo argilloso compatibile con l'ingobbio
      description: Indica il tipo o i tipi di corpo argilloso con cui l'ingobbio è
        progettato per essere abbinato o funzionare.
    pottery_slip_form:
      name: Forma dell'ingobbio
      description: Indica se l'ingobbio è venduto come liquido pronto all'uso o come
        miscela secca/polvere che richiede miscelazione.
    pouch_design:
      name: Design della busta
      description: Descrive in dettaglio le caratteristiche costruttive o di valorizzazione
        dell'area frontale della busta.
    pouch_style:
      name: Stile della tasca
      description: Specifica il design dell'area della tasca frontale, tenendo conto
        del comfort, del sostegno e delle preferenze estetiche.
    powdered_beverage_variety:
      name: Varietà di bevande in polvere
      description: Classifica il prodotto in base al tipo di bevanda che permette
        di preparare (ad es. limonata, bevanda sportiva, frullato proteico).
    power_rack_style:
      name: Stile del portabottiglie
      description: Specifica il design/la configurazione complessiva del portabottiglie,
        aiutando gli acquirenti a distinguere tra gabbie complete, portabottiglie
        a metà e varianti salvaspazio.
    power_steering_fluid_formulation:
      name: Formulazione del fluido per servosterzo
      description: La famiglia di formulazione generale del fluido (a base di ATF
        vs idraulico dedicato/CHF vs universale), utilizzata per il filtraggio di
        compatibilità di alto livello.
    practice_mute_audio_output:
      name: Uscita audio del silenziatore da esercitazione
      description: Specifica il tipo di connessione di uscita audio disponibile sul
        silenziatore da esercitazione per il monitoraggio e/o la registrazione (comune
        nei silenziatori da esercitazione silenziosi/elettronici).
    practice_mute_intonation_impact:
      name: Impatto sull'intonazione del silenziatore da esercitazione
      description: Descrive l'effetto di accordatura/intonazione previsto quando si
        utilizza il silenziatore da esercitazione.
    practice_mute_venting_valve_type:
      name: Tipo di sfiato/valvola del silenziatore da esercitazione
      description: Specifica se e come il silenziatore da esercitazione è sfiatato
        o include una valvola regolabile per modificare la resistenza/il volume.
    practice_pad_features:
      name: Caratteristiche del pad da pratica
      description: Evidenzia le caratteristiche funzionali del pad da esercitazione
        oltre alle dimensioni e al materiale.
    practice_pad_mounting_style:
      name: Stile di montaggio del pad da esercitazione
      description: Indica come il pad da esercitazione deve essere posizionato o fissato
        durante l'uso.
    practice_pad_rebound_level:
      name: Livello di rimbalzo del pad da esercitazione
      description: Indica il rimbalzo/la risposta relativa del pad da esercitazione
        rispetto alle tipiche pelli da batteria.
    practice_pad_surface_configuration:
      name: Configurazione della superficie del pad da esercitazione
      description: Descrive se il pad ha una o più superfici di gioco e se differiscono
        nella sensazione.
    pregnancy_stage_suitability:
      name: Idoneità per fase della gravidanza
      description: Indica per quale fase della gravidanza o del post-parto è progettato
        l'indumento.
    preparation_state:
      name: Stato di preparazione
      description: Indica il livello di preparazione o cottura necessario prima del
        consumo.
    preparation_style:
      name: Stile di preparazione
      description: Definisce il taglio o lo stato di lavorazione delle castagne d'acqua
        al momento della vendita (ad es. intere, affettate, arrostite, congelate).
    preservation_medium:
      name: Mezzo di conservazione
      description: Specifica il liquido o il mezzo principale in cui sono conservate
        le olive o i capperi (ad es. salamoia, olio d'oliva, aceto).
    presser_foot_attachment_method:
      name: Metodo di fissaggio del piedino per macchina da cucire
      description: Indica come il piedino della macchina da cucire si fissa al supporto/gambo
        del piedino (ad es. a scatto o a vite), il che influisce sulla compatibilità.
    pressure_gauge_type:
      name: Tipo di manometro
      description: Indica il tipo di manometro incluso nella pompa da bicicletta,
        se presente.
    pressure_measurement_unit:
      name: Unità di misura della pressione
      description: Indica l'unità utilizzata per la lettura o la calibrazione del
        sensore di pressione, utile per confrontare i prodotti e garantire la compatibilità
        tra manometro ed ECU.
    pressure_plate_balance_type:
      name: Tipo di bilanciamento della piastra di pressione
      description: Indica se la piastra di pressione è bilanciata internamente o se
        richiede/presuppone un bilanciamento esterno in linea con la configurazione
        del motore/volano.
    pressure_plate_components_included:
      name: Componenti della piastra di pressione inclusi
      description: Cosa è incluso nella scheda tecnica della piastra di pressione.
    pressure_sensor_application:
      name: Applicazione del sensore di pressione
      description: Identifica il sistema del veicolo/punto di misurazione per cui
        è progettato il sensore di pressione.
    pressure_sensor_port_thread_standard:
      name: Standard della porta/filettatura del sensore di pressione
      description: Specifica lo standard meccanico della porta/filettatura utilizzato
        per installare il sensore nel sistema del veicolo.
    pressurization_method:
      name: Metodo di pressurizzazione
      description: Identifica come viene generata o mantenuta la pressione all'interno
        del dispositivo.
    pretend_housekeeping_set_items_included:
      name: Articoli inclusi nel set per le pulizie
      description: Elenca quali accessori per le pulizie sono inclusi nel set (ad
        es. mocio, scopa, paletta, flacone spray).
    pretend_play_electronic_features:
      name: Funzioni elettroniche del gioco di finzione
      description: Funzioni elettroniche/interattive incluse nel prodotto per il gioco
        di finzione.
    pretend_play_set_pieces_included:
      name: Elementi del set per il gioco di finzione inclusi
      description: Oggetti di scena/componenti chiave inclusi nel set per il gioco
        di finzione (ad es. registratore di cassa, cibo giocattolo, attrezzi).
    pretend_play_set_theme:
      name: Tema del set per il gioco di finzione
      description: Scenario/tema principale del gioco di finzione rappresentato dal
        prodotto (utile per la scoperta trasversale tra tutti i bambini che praticano
        il gioco di finzione).
    pretzel_coating:
      name: Rivestimento del pretzel
      description: Identifica qualsiasi condimento o rivestimento esterno applicato
        al pretzel, coprendo sia le opzioni salate (salato, condito) che quelle dolci
        (cioccolato, yogurt, caramello).
    pretzel_shape:
      name: Forma del pretzel
      description: Specifica la forma fisica del pretzel (ad es. a spirale, a bastoncino,
        a morso), un fattore chiave di differenziazione che i clienti utilizzano durante
        la ricerca o il filtraggio.
    primary_component_material:
      name: Materiale principale del componente
      description: Materiale principale del blocco motore.
    primary_dish_application:
      name: Applicazione principale del piatto
      description: Identifica il piatto principale o la preparazione a cui è destinato
        l'impasto.
    primary_plant_base:
      name: Base vegetale principale
      description: Indica gli ingredienti vegetali principali utilizzati per creare
        l'alternativa al formaggio.
    primary_plant_protein_source:
      name: Fonte proteica vegetale principale
      description: Identifica l'ingrediente vegetale principale che fornisce proteine
        nel prodotto.
    primary_sweetener_source:
      name: Fonte di dolcificante principale
      description: Identifica la pianta o la materia prima da cui deriva lo sciroppo.
    print_placement:
      name: Posizionamento della stampa
      description: Indica dove è posizionata la grafica/il logo principale sulla maglietta.
    print_technique:
      name: Tecnica di stampa
      description: Specifica il metodo di decorazione/stampa utilizzato per la grafica
        della t-shirt.
    printable_canvas_intended_use:
      name: Utilizzo previsto della tela stampabile
      description: Applicazione principale per cui la tela stampabile è ottimizzata.
    printable_fabric_format:
      name: Formato del tessuto stampabile
      description: Specifica come viene fornito il cotone stampabile (fogli singoli
        o rotolo continuo), il che influisce sull'alimentazione della stampante e
        sul flusso di lavoro del progetto.
    prism_material:
      name: Materiale del prisma
      description: Specifica il materiale dell'elemento ottico stesso (il prisma),
        che influisce su chiarezza, durata e resistenza ai graffi.
    prisoner_transport_configuration:
      name: Configurazione del trasporto dei detenuti
      description: Specifica se e come il furgone è configurato per il trasporto di
        detenuti.
    prisoner_transport_partition_type:
      name: Tipo di divisorio per il trasporto dei detenuti
      description: Tipo di divisorio interno/gabbia che separa i compartimenti anteriore
        e posteriore.
    privacy_or_acoustic_feature:
      name: Caratteristiche di privacy o acustiche
      description: Specifica gli elementi di privacy o acustici integrati, come pannelli
        divisori, schermi acustici o recinzioni complete.
    processing_state:
      name: Stato di elaborazione
      description: Se le piume sono sterilizzate/lavate o altrimenti preparate per
        l'uso artigianale.
    produce_grade:
      name: Grado del prodotto
      description: Classifica il grado di qualità assegnato al kiwi in base a dimensioni,
        aspetto e condizioni.
    produce_growth_stage:
      name: Fase di crescita del prodotto
      description: Specifica la fase di crescita in cui il prodotto viene venduto
        (ad es. microverdure, foglie giovani, foglie mature, pianta viva, seme).
    produce_washing_state:
      name: Stato di lavaggio del prodotto
      description: Indica se le verdure sono state lavate e sono pronte per il consumo.
    profile_shape:
      name: Profilo/forma
      description: Curvatura/profilo complessivo del piatto (quanto ripidamente sale
        dal bordo alla campana).
    projectile_ammunition_type:
      name: Tipo di proiettile/munizione
      description: Specifica il tipo di proiettili o materiali di consumo utilizzati
        dall'arma giocattolo, se applicabile.
    projectile_finish:
      name: Finitura del proiettile
      description: Specifica qualsiasi rivestimento superficiale applicato al pallino,
        che ne favorisce la resistenza alla corrosione o la visibilità (ad es. rivestito
        in rame, zincato, verniciato).
    projectile_type:
      name: Tipo di proiettile
      description: Identifica il tipo di proiettile che il prodotto utilizza o per
        cui è destinato.
    pronation_support:
      name: Supporto alla pronazione
      description: Indica il tipo di andatura o il modello di pronazione per cui la
        scarpa da ginnastica è progettata.
    propellant_type:
      name: Tipo di propellente
      description: Specifica il propellente che la parte o l'accessorio è progettato
        per utilizzare.
    propeller_blade_cup:
      name: Coppa delle pale dell'elica
      description: Indica la quantità di coppa (arrotondamento del bordo d'uscita)
        sulle pale.
    propeller_hub_type:
      name: Tipo di mozzo dell'elica
      description: Specifica il sistema mozzo/boccola utilizzato dall'elica (kit mozzo
        sostituibile o pressato).
    propeller_rotation:
      name: Rotazione dell'elica
      description: Specifica il senso di rotazione di un'elica.
    protectant_formula_base:
      name: Base della formula protettiva
      description: Specifica la formulazione di base del protettivo, che influisce
        sulla brillantezza, sulla consistenza e sulla facilità di pulizia (ad esempio,
        a base d'acqua o a base di solvente).
    protection_coverage_area:
      name: Area di copertura della protezione
      description: Indica quali parti dell'orologio sono coperte dall'accessorio protettivo.
    protection_level:
      name: Livello di protezione
      description: Indica il livello di protezione previsto dalla cassa per il trasporto
        e la conservazione dello strumento.
    protective_case_interior_protection_type:
      name: Tipo di protezione interna protettiva per la cassa
      description: Descrive il principale metodo di protezione interna utilizzato
        per proteggere e ammortizzare i contenuti.
    protective_case_shell_type:
      name: Tipo guscio protettivo per la cassa
      description: Identifica lo stile costruttivo generale dell'esterno della cassa
        (rigidità) che influisce sulla protezione dagli urti e sulla trasportabilità.
    protective_contact_padding_material:
      name: Materiale imbottitura protettiva per contatti
      description: Materiale utilizzato nei punti di contatto dello strumento (inserto
        giogo/campana) per prevenire graffi (ad esempio, feltro, gomma).
    protective_cup_configuration:
      name: Configurazione della coppa protettiva
      description: Specifica se la coppa protettiva è inclusa, rimovibile o se il
        capo è dotato solo di una tasca per inserirla.
    protective_eyewear_standard_compliance:
      name: Conformità agli standard per gli occhiali di protezione
      description: Specifica gli standard o le certificazioni di sicurezza o di resistenza
        agli urti che gli occhiali soddisfano o superano per l'uso sportivo.
    protective_gear_certification_standard:
      name: Standard di certificazione dei dispositivi di protezione
      description: 'Indica lo standard di sicurezza/certificazione a cui l''equipaggiamento
        è conforme (varia a seconda del tipo di articolo: standard per caschi, standard
        per tute, standard per protezioni da impatto).'
    protective_gear_items_included:
      name: Articoli sui dispositivi di protezione inclusi
      description: Elenca i dispositivi di individuali contenuti in un set di dispositivi
        di protezione composto da più pezzi.
    protective_gear_padding_type:
      name: Tipo di imbottitura protettiva per dispositivi
      description: Specifica il tipo di imbottitura utilizzata nei dispositivi di
        protezione per la protezione da impatto
    protective_gear_safety_certifications:
      name: Certificazioni di sicurezza per i dispositivi di protezione
      description: Elenca gli standard di sicurezza o di prestazione specifici per
        lo sport riconosciuti e soddisfatti dal prodotto, come ad esempio gli standard
        NOCSAE o ASTM per i caschi da hockey su prato.
    protective_pad_components_included:
      name: Componenti del cuscinetto protettivo inclusi
      description: Specifica quali articoli di protezione sono inclusi in un set multi-pezzo
        in modo che l'acquirente sappia esattamente quali parti del corpo sono coperte.
    protective_shorts_intended_use:
      name: Uso previsto dei pantaloncini protettivi
      description: Disciplina principale di equitazione/gare per cui sono progettati
        questi pantaloncini protettivi.
    protective_shorts_padding_type:
      name: Tipo di imbottitura dei pantaloncini protettivi
      description: Specifica la struttura/il formato degli elementi protettivi utilizzati
        nei pantaloncini.
    protective_shorts_padding_zones:
      name: Zone di spaziatura interna dei pantaloncini protettivi
      description: Identifica le aree del corpo dotate di imbottitura interna/armatura
        integrata nei pantaloncini protettivi.
    protective_treatment:
      name: Trattamento protettivo
      description: Specifica qualsiasi finitura protettiva o variante applicata per
        la resistenza alle macchie, all'acqua o ai raggi UV (ad esempio, Teflon).
    protector_coverage_area:
      name: Area di copertura del protettore
      description: Specifica quale/i area/e del torso la protezione è progettata per
        coprire (ad esempio, petto, schiena, fianchi).
    puck_bottom_style:
      name: Stile con fondo a disco
      description: Descrive il profilo della parte inferiore del disco, che Influence
        la velocità e il controllo su diverse superfici del campo da shuffleboard.
    puck_type:
      name: Tipo di disco
      description: Classifica lo stile funzionale o l'uso previsto del disco da hockey,
        dal gioco ufficiale alle partite come souvenir da collezione.
    pull_buoy_style:
      name: stile pull buy
      description: Indica lo stile funzionale o la configurazione del pull buoy, ad
        esempio standard, alla caviglia o con combinazione pullkick.
    pull_through_weight_material:
      name: Materiale di peso da tirare
      description: Per i tamponi a trazione, identifica il materiale del peso utilizzato
        per guidare il tampone attraverso lo strumento.
    pulp_content:
      name: Contenuto di polpa
      description: Indica la quantità di polpa di frutta o verdura presente nella
        bevanda.
    pump_accessories_included:
      name: Accessori per la pompa inclusi
      description: Elenca gli articoli aggiuntivi Supply con la pompa a sfera in modo
        che l'acquirente possa comprendere il pacchetto Contenuto.
    pumping_compatibility:
      name: Compatibilità di pompaggio
      description: Indica se il reggiseno per l'allattamento è progettato sia per
        l'allattamento al seno che per l'estrazione del latte a mani libere.
    punch_pad_type:
      name: Tipo di perforatore
      description: Specifica il design o lo stile di un sacco da boxe/allenamento
        in modo che l'acquirente possa scegliere il sacco corretto per le proprie
        esigenze di allenamento.
    punching_training_bag_shape:
      name: Shape del sacco da boxe/allenamento
      description: Specifica lo stile geometrico del sacco da boxe, aiutando l'acquirente
        a scegliere modelli adatti a particolari esercizi di percussione (ad esempio,
        uppercut, colpi al corpo).
    puncture_protection_technology:
      name: Tecnologia di protezione contro le forature
      description: Elenca eventuali strati antiforatura proprietari o generici o tecnologie
        di rinforzo del fianco/carcassa incorporate nel pneumatico (ad esempio, EXO,
        SnakeSkin, cintura Kevlar ).
    puppet_features:
      name: Caratteristiche del burattino
      description: Highlight le caratteristiche funzionali o performative del pupazzo
        (ad esempio, bocca mobile, effetti sonori, reversibilità).
    puppet_puppet_theater_accessory_type:
      name: Tipo di accessorio per burattini e teatro dei burattini
      description: Specifica il tipo di accessorio del prodotto (ad esempio, oggetto
        di scena, costume da burattino, barra di controllo, corda di ricambio).
    purity_unit:
      name: Unità di purezza
      description: Come viene espressa la purezza della moneta (finezza rispetto ai
        carati).
    push_up_bar_design:
      name: design della barra per flessioni
      description: Indica lo stile di progettazione funzionale delle barre per flessioni
        (ad esempio, fisse, rotanti, parallele).
    pushrod_end_type:
      name: Tipo di estremità dell'asta di spinta
      description: Specifica il tipo di estremità/attacco dell'asta di spinta utilizzata
        nell'interfaccia pedale o pompa freno.
    putty_glow_activation_method:
      name: Metodo di attivazione della luminescenza del mastice
      description: Come la pasta viene caricata/attivata per brillare (ad esempio,
        luce solare, luce UV/luce nera).
    putty_glow_color:
      name: Colore fosforescente
      description: Identifica il colore che la pasta modellabile emette quando si
        illumina al buio.
    putty_inclusions:
      name: Inclusioni di stucco
      description: Tra gli ingredienti aggiuntivi degni di nota presenti all'interno
        della pasta modellabile (ad esempio, brillantini, coriandoli, perline di gommapiuma).
    putty_texture:
      name: Consistenza di stucco
      description: Comportamento di manipolazione primario dello stucco (ad esempio,
        elastico, flessibile, simile a un liquido).
    puzzle_accessory_features:
      name: Caratteristiche degli accessori del puzzle
      description: Caratteristiche funzionali ed elementi di design degli accessori
        per puzzle (variano a seconda del tipo di accessorio).
    pyrometric_cone_range:
      name: Intervallo del cono pirometrico
      description: Il cono pirometrico raccomandato per la cottura dello smalto (ad
        esempio, cono 06–04, cono 5–6).
    quarter_panel_coverage_type:
      name: Tipo di copertura del pannello laterale
      description: Specifica quanta parte del pannello laterale viene sostituita/riparata
        dal prodotto.
    quarter_panel_set_contents:
      name: Contenuti del set del pannello laterale
      description: Specifica la configurazione del pacchetto di pannelli laterale
        incluso nell'inserzione (singolo lato, associato o con sezioni di riparazione
        aggiuntive).
    quilting_ruler_markings:
      name: Segni del righello per il quilting
      description: Specifica i tipi di marcature stampate sul righello per quilting
        utilizzato per il taglio/allineamento.
    quilting_ruler_non_slip_feature:
      name: Righello per quilting con funzione antiscivolo
      description: Indica se il righello è dotato di un trattamento di rivestimento/superficie
        antiscivolo per evitare che si sposti sul tessuto.
    quilting_ruler_transparency:
      name: Trasparenza del righello per quilting
      description: Indica la trasparenza/visibilità del materiale del righello per
        visualizzare il tessuto e i segni sottostanti.
    quilting_thread_usage:
      name: Utilizzo thread per trapuntatura
      description: Indica l'applicazione di quilting prevista per il thread (come
        deve essere utilizzato).
    quilting_thread_weight_system:
      name: Sistema di pesi thread da quilting
      description: Specifica il sistema di classificazione taglia/peso thread utilizzato
        per esprimere lo spessore thread (ad esempio, wt, Tex, Denier), in modo che
        il valore numerico taglia possa essere interpretato correttamente.
    quince_variety:
      name: Varietà di cotogno
      description: Identifica la specifica cultivar o varietà di mela cotogna, poiché
        sapore, aroma e idoneità culinaria possono variare a seconda della varietà.
    quinoa_variety:
      name: varietà di quinoa
      description: Consente di identificare il colore o la varietà specifica di quinoa,
        poiché le diverse varietà presentano sapori, consistenze e tempi di cottura
        differenti.
    quinto_tuning_system:
      name: Sistema di accordatura del quinto
      description: Come viene accordato/tensionato il quinto.
    race_car_class:
      name: Classe auto da corsa
      description: Classe/categoria di competizione per cui è stata costruita la vettura
        (regolamento/gruppo di omologazione).
    racing_balaclava_face_opening_style:
      name: passamontagna da corsa con apertura sul viso
      description: La configurazione dell'apertura per il viso del passamontagna,
        che influisce sulla vestibilità del casco, sulla tenuta e sul comfort.
    racing_balaclava_neck_coverage_length:
      name: lunghezza di copertura del collo del passamontagna da corsa
      description: La lunghezza della gonna/drappeggio per il collo è progettata per
        essere infilata nella tuta/sistema di contenimento del collo per garantire
        tenuta e protezione.
    racing_balaclava_ventilation_zones:
      name: Zone di ventilazione del passamontagna da corsa
      description: Zone designate traspiranti/in rete o ventilate posizionate per
        migliorare il flusso d'aria sotto il casco.
    racing_chest_guard_intended_use:
      name: Protezione toracica da corsa, uso previsto
      description: Disciplina principale degli sport motoristici o Context per cui
        è progettata la protezione per il petto.
    racing_chest_guard_size_type:
      name: Tipo di taglia della protezione toracica da corsa
      description: Indica se il prodotto è disponibile in taglie per ragazzi, per
        adulti o se è universale/regolabile.
    racing_glove_certification_standard:
      name: Standard di certificazione del guanto da corsa
      description: Specifica la certificazione/standard di sicurezza a cui i guanti
        da corsa sono conformi (ad esempio, FIA, SFI, CE) e, facoltativamente, il
        livello/la classificazione, ove applicabile.
    racing_goggles_lens_system:
      name: Sistema di lenti per occhiali da corsa
      description: Specifica il sistema di intercambiabilità/compatibilità con le
        lenti a strappo supportato dalla maschera.
    racing_helmet_certification_standard:
      name: Standard di certificazione del casco da corsa
      description: Le certificazioni di sicurezza soddisfatte dal casco da corsa.
    racing_kart_brake_type:
      name: Tipo di freno per kart da corsa
      description: Tipo di sistema frenante primario installato sul kart.
    racing_kart_class:
      name: Classe di kart da corsa
      description: Classe di competizione o regolamento a cui il kart è destinato
        a conformarsi.
    racing_kart_frame_material:
      name: Materiale del frame del kart da corsa
      description: Materiale principale frame/struttura del kart.
    racing_kart_seat_size:
      name: Taglia sedile da kart da corsa
      description: La denominazione della taglia del sedile del kart viene utilizzata
        per il montaggio.
    racing_neck_support_style:
      name: Stile di assistenza per il collo da corsa
      description: Stile strutturale del supporto/tutore per il collo da gara e modalità
        di interazione con il busto/casco del pilota.
    racing_suit_certification_standard:
      name: Standard di certificazione della tuta da corsa
      description: Specifica la certificazione/omologazione di sicurezza per le competizioni
        a cui la tuta è soggetta (ad esempio, standard FIA o SFI).
    racing_suit_cuff_design:
      name: Design del polsino della tuta da corsa
      description: Tipo di polsino/caviglia utilizzato per interfacciarsi con guanti/stivali
        e migliorare la tenuta/il comfort.
    racing_suit_size_system:
      name: Sistema di taglia della tuta da corsa
      description: Sistema di taglie utilizzato per l'abito (ad esempio, Alfabetico
        S-XXL, Numerico UE/USA, Giovani).
    racing_truck_discipline:
      name: Disciplina dei camion da corsa
      description: Specifica la principale disciplina/formato di gara per cui il camion
        è stato progettato per competere.
    rack_side_configuration:
      name: Configurazione del lato dello scaffale
      description: Indica se lo scaffale conserva i tappetini su un solo lato o su
        entrambi i lati, influenzando l'efficienza dello spazio e l'accessibilità.
    rack_system_configuration:
      name: Configurazione del sistema di scaffali
      description: Descrive il layout/shape generale del sistema di scaffali per fusti.
    racket_dampener_type:
      name: Tipo di smorzatore per racchetta
      description: Specifica il meccanismo di installazione o lo stile funzionale
        dell'ammortizzatore di vibrazioni della racchetta.
    racket_grip_size:
      name: Impugnatura della racchetta
      description: Specifica la classificazione taglia della circonferenza del handle
        della racchetta (ad esempio, G1–G6) per garantire una corretta impugnatura
        e il massimo comfort.
    racket_sport_shoe_court_surface:
      name: Superficie del campo da gioco per scarpe da racchetta
      description: Specifica la superficie del campo da tennis per cui la scarpa è
        stata progettata o ottimizzata, aiutando i giocatori a scegliere la calzatura
        con il disegno della suola e la mescola di gomma più adatti alla superficie
        di gioco abituale.
    racket_string_pattern:
      name: Modello della stringa della racchetta
      description: Specifica il numero di maglie principali e trasversali nel letto
        di maglie (ad esempio, 16 x 18), che Influenza il controllo, la rotazione
        e la durata.
    racket_stringing_status:
      name: Stato dell'incordatura della racchetta
      description: Indica se la racchetta viene venduta con corde, senza corde o pre-incordata.
    racket_weight_class:
      name: Classe di peso della racchetta
      description: Fornisce le categorie di peso standard "U" del badminton, consentendo
        ai giocatori di selezionare racchette all'interno del loro intervallo di massa
        preferito.
    racquet_toy_set_equipment_included:
      name: Set di giocattoli con racchetta incluso
      description: Elenca gli articoli inclusi nel giocattolo o nel set (ad esempio,
        rete, palline, racchette).
    racquetball_squash_training_aid_type:
      name: Tipo di ausilio per l'allenamento di racquetball e squash
      description: Classifica la tipologia specifica di ausilio o accessorio per l'allenamento,
        consentendo all'acquirente di individuare rapidamente l'articolo di cui ha
        bisogno.
    radiator_cap_gasket_material:
      name: Materiale della guarnizione del tappo del radiatore
      description: Materiale della/e guarnizione/i di tenuta utilizzata/e sul tappo
        del radiatore.
    radiator_cap_pressure_relief_style:
      name: Tappo del radiatore con valvola di sicurezza
      description: Specifica lo stile di sfiato/scarico della pressione/azionamento
        del tappo del radiatore, che può influire sulla gestione, sulla sicurezza
        e sull'applicazione prevista.
    radiator_expansion_tank_cap_application:
      name: Applicazione per tappo radiatore/vaschetta di espansione
      description: Indica se il tappo è destinato al bocchettone di riempimento del
        radiatore o al serbatoio di espansione/troppo pieno del liquido di raffreddamento.
    radiator_fan_control_type:
      name: Tipo di controllo della ventola del radiatore
      description: Specifica come viene controllata/attivata la ventola del radiatore.
    radiator_fan_mounting_pattern:
      name: Schema di montaggio della ventola del radiatore
      description: Specifica lo stile/schema di montaggio utilizzato per fissare la
        ventola o il gruppo ventola.
    radiator_fan_type:
      name: Tipo di ventola del radiatore
      description: Specifica il tipo/configurazione funzionale del gruppo ventola
        del radiatore.
    radiator_hose_end_type:
      name: Tipo di raccordo per tubo flessibile del radiatore
      description: Specifica il tipo di relazione/tenuta principale utilizzato all'estremità
        del tubo flessibile del radiatore per l'interfacciamento con le porte del
        radiatore/motore.
    radiator_hose_position:
      name: Posizione del tubo flessibile del radiatore
      description: Posizione/tipologia funzionale del tubo del radiatore all'interno
        del sistema di raffreddamento.
    radiator_hose_shape:
      name: Shape dei tubi del radiatore
      description: Geometria/forma complessiva del tubo flessibile utilizzata per
        il percorso di installazione e il montaggio.
    radiator_overflow_tank_level_sensor_provision:
      name: Predisposizione per sensore di livello del serbatoio di troppo pieno del
        radiatore
      description: Indica se il serbatoio include o meno un sensore di livello del
        liquido di raffreddamento.
    radiator_overflow_tank_shape:
      name: Shape del serbatoio di traboccamento del radiatore
      description: Forma complessiva del corpo del serbatoio di troppo pieno.
    radish_variety:
      name: Varietà di ravanello
      description: Specifica la cultivar o il tipo di ravanello in modo che l'acquirente
        possa scegliere caratteristiche specifiche di sapore, colore o taglia (ad
        esempio, Daikon, Anguria, French Breakfast).
    radius_of_hollow:
      name: Raggio della cavità
      description: Specifica il profilo concavo della lama prodotto dall'affilatore,
        espresso come comune taglia discreta o piatta.
    rail_coverage_configuration:
      name: Configurazione della copertura della ringhiera
      description: Indica quale/i parte/i della culla viene/vengono protetta/e dal
        set di coperture, chiarendo se l'acquisto riguarda un singolo pannello frontale
        o un set perimetrale composto da più pezzi.
    rail_mount_standard:
      name: Standard di montaggio su ringhiera
      description: Identifica lo standard di ringhiera o interfaccia di montaggio
        utilizzato per fissare un accessorio (ad esempio, mirino, torcia) a una pistola
        ad aria compressa.
    rail_side:
      name: lato ringhiera
      description: Indica se la rotaia di ricambio è per il lato sinistro, per il
        lato destro o se viene venduta come accessorio.
    rail_style:
      name: Stile ringhiera
      description: Classifica il design o la configurazione generale della ringhiera
        (ad esempio, Frame di A, arcobaleno, a gomito), che determina le possibilità
        di eseguire trick e lo spazio necessario.
    rail_system:
      name: Sistema ringhiera
      description: Identifica l'interfaccia di montaggio degli accessori presente
        sull'arma (ad esempio, Picatinny, M-LOK).
    rain_sensor_technology:
      name: Tecnologia del sensore di pioggia
      description: Il principio di rilevamento utilizzato per individuare la presenza
        di acqua sul parabrezza.
    rain_suit_configuration:
      name: Configurazione della tuta antipioggia
      description: Indica se il prodotto è una tuta intera, un set composto da più
        pezzi o un'altra configurazione.
    rainstick_construction_type:
      name: Tipo di costruzione del bastone della pioggia
      description: Descrive come viene costruito il bastone della pioggia (tradizionale,
        in cactus/tubo di legno, rispetto alle alternative moderne).
    rainstick_fill_material:
      name: Materiale di riempimento per bastoni della pioggia
      description: Specifica il riempimento interno utilizzato per creare il suono
        Cascade (ad esempio, semi, perline).
    rainstick_playing_technique:
      name: Tecnica di gioco del bastone della pioggia
      description: Indica la/le tecnica/e di esecuzione o lo stile di gestione consigliati
        per produrre l'effetto desiderato su un bastone della pioggia.
    rainstick_sound_character:
      name: Carattere del suono del bastone della pioggia
      description: Descrive le caratteristiche sonore complessive prodotte dal bastone
        della pioggia.
    raising_method:
      name: Metodo di allevamento
      description: Descrive come gli animali sono stati allevati e rifiniti prima
        della lavorazione (ad esempio, alimentazione a base di erba, allevamento al
        pascolo, rifinitura con cereali).
    rally_competition_class:
      name: Classe di competizione rally
      description: Classificazione dell'ente sanzionatorio o del regolamento a cui
        è soggetta la vettura da rally (ove nota).
    rally_surface_setup:
      name: Configurazione della superficie da rally
      description: Superficie/terreno primario, configurazione dell'auto da rally
        o obiettivi di costruzione.
    ramp_surface_texture:
      name: Texture della superficie della rampa
      description: Descrive la finitura o il livello di aderenza della superficie
        di scorrimento della rampa.
    ratchet_mounting_style:
      name: Stile di montaggio con cricchetto
      description: Come si impugna o si monta il meccanismo a cricchetto musicale
        durante l'esecuzione o la configurazione.
    rattle_element_material:
      name: Materiale dell'elemento sonaglio
      description: Materiale degli elementi sonori (ad esempio, denti/sonaglioni/perline)
        che creano il caratteristico ronzio/tintinnio.
    rattle_type:
      name: Tipo di sonaglio
      description: Indica se l'esca contiene un sonaglio interno o una camera sonora
        e, in tal caso, il tipo di sonaglio utilizzato.
    rc_airship_lifting_gas_type:
      name: Dirigibile radiocomandato a gas di sollevamento
      description: Indica con quale gas è previsto il riempimento dell'involucro del
        dirigibile/pallone aerostatico (se applicabile).
    rc_helicopter_control_frequency:
      name: Frequenza di controllo dell'elicottero radiocomandato
      description: La banda di frequenza radio utilizzata tra il controller e l'elicottero,
        che influisce sulla resistenza alle interferenze e sulla compatibilità (ad
        esempio, 2,4 GHz).
    rc_helicopter_stabilization_features:
      name: Caratteristiche di stabilizzazione dell'elicottero radiocomandato
      description: Elenca le funzioni di assistenza alla stabilità/controllo che facilitano
        il volo o ne aumentano le capacità.
    rc_motorcycle_controller_type:
      name: Tipo di controller del motociclo RC
      description: Fattore di forma del controller incluso.
    rc_plane_takeoff_launch_method:
      name: Metodo di decollo/lancio di un aeromodello radiocomandato
      description: Come avviene tipicamente il lancio dell'aereo, che impatta dove
        e come può essere utilizzato.
    rc_vehicle_controller_type:
      name: Tipo di controller del veicolo RC
      description: Specifica il fattore di forma del controller utilizzato per azionare
        il veicolo RC.
    rc_vehicle_scale:
      name: Scala del veicolo RC
      description: Specifica il rapporto di scala (classe di taglia) dell'auto/camion
        telecomandato (ad esempio, 1:10, 1:16).
    rc_vehicle_terrain_type:
      name: Tipo di terreno del veicolo RC
      description: Indica il terreno principale per cui è progettato il veicolo radiocomandato
        (auto/camion).
    reach_adjustment_type:
      name: Tipo di regolazione della portata
      description: Indica se la distanza tra la leva e il manubrio è regolabile e,
        in caso affermativo, se la regolazione avviene senza attrezzi o se richiede
        l'utilizzo di un attrezzo.
    rear_axle_spacing:
      name: Interasse posteriore
      description: Il forcellino/tasca dell'asse posteriore del frame è progettato
        per accettare, influenzando la compatibilità della ruota.
    rear_axle_standard:
      name: Assale posteriore standard
      description: Definisce l'interfaccia/il formato dell'asse utilizzato dalla ruota
        posteriore (ad esempio, sgancio rapido, vari tipi di perno passante).
    rear_axle_type:
      name: Tipo di assale posteriore
      description: Specifica il sistema di fissaggio e il diametro dell'asse utilizzati
        per fissare la ruota posteriore al frame.
    rear_coverage:
      name: Copertura posteriore
      description: Specifica quanta parte dei glutei copre lo slip del bikini (ad
        esempio, sgambato, completo).
    rear_opening_type:
      name: Tipo di apertura posteriore
      description: Descrive il tipo di accesso posteriore o la caratteristica "sportello
        posteriore" per un comodo utilizzo del bagno, come sedile drop o cerniera
        posteriore completa.
    rear_seat_configuration:
      name: Configurazione dei sedili posteriori
      description: Specifica la configurazione del gruppo sedile posteriore in base
        al montaggio degli accessori e alla selezione layout interna.
    rear_view_mirror_ornament_attachment_type:
      name: Tipo di fissaggio dell'ornamento dello specchietto retrovisore
      description: Specifica come l'ornamento si fissa allo stelo o all'alloggiamento
        dello specchietto retrovisore (ad esempio, anello, clip, gancio).
    rearview_mirror_mount_attachment_type:
      name: Tipo di attacco del supporto dello specchietto retrovisore
      description: Definisce come il supporto si fissa fisicamente al gruppo dello
        specchietto retrovisore (corpo dello specchietto o stelo), ad esempio tramite
        morsetto, clip, cinghia, cuscinetto adesivo o staffa imbullonata.
    rebound_board_face_type:
      name: Tipo di superficie del tabellone di rimbalzo
      description: Descrive la configurazione della superficie che determina il comportamento
        di rimbalzo, come ad esempio superfici piane, angolate o multifacciali.
    rebound_level:
      name: Livello di rimbalzo
      description: Indica quanto rimbalza la wall ball dopo Impact, aiutando gli utenti
        a scegliere tra modelli senza rimbalzo e modelli con rimbalzo moderato.
    rebound_surface_configuration:
      name: Configurazione della superficie di rimbalzo
      description: Specifica la layout delle superfici di rimbalzo e la prevedibilità
        dei rimbalzi (monolaterali, bilaterali o multilaterali; prevedibili o imprevedibili).
    rebounder_design:
      name: Design del rimbalzatore
      description: Definisce lo stile strutturale o la configurazione della superficie
        di rimbalzo del prodotto.
    rebounder_design_type:
      name: Tipo di design del rimbalzatore
      description: Specifica il meccanismo di rimbalzo principale o lo stile costruttivo
        dell'attrezzo (ad esempio, base con corda elastica, rete Frame , bersaglio
        a scomparsa).
    rebounder_sides:
      name: Lati del rimbalzatore
      description: Indica se il giocatore addetto al rimbalzo può restituire la palla
        da un lato o da entrambi i lati.
    rebounding_mechanism_type:
      name: Tipo di meccanismo di rimbalzo
      description: Specifica la tecnologia utilizzata per restituire il disco o la
        palla (ad esempio, paraurti in gomma, corda elastica).
    recipient_relationship:
      name: Relazione del destinatario
      description: Relazione con il destinatario previsto (ad esempio, mamma, papà,
        amico) per il biglietto di auguri.
    recliner_control_type:
      name: Tipo di comando reclinabile
      description: Specifica come viene azionato il meccanismo di reclinazione (ad
        esempio, leva manuale, pannello di controllo elettrico, telecomando).
    recliner_motion_type:
      name: Tipo di motion del recliner
      description: Definisce la principale capacità di movimento della poltrona reclinabile
        (ad esempio, dondolo, scorrevole, girevole, salvaspazio, sollevabile).
    reclining_mechanism:
      name: Meccanismo reclinabile
      description: Specifica il meccanismo utilizzato per azionare le Functions reclinabili
        del divano.
    recommended_candle_format:
      name: Formato candela consigliato
      description: Indica il/i formato/i di candela consigliato/i per cui sono destinate
        queste schede autoadesive per stoppini.
    recommended_container_type:
      name: Tipo di cassa consigliato
      description: Materiali Cassa consigliati/sicuri per candele in cera gel.
    recommended_fabric_type:
      name: Tipo di tessuto consigliato
      description: Tessuto(i) consigliato(i) per ottenere i migliori risultati con
        il cartamodello.
    recommended_fabric_weight:
      name: Peso del tessuto consigliato
      description: Indica la categoria di peso del tessuto consigliata per il modello.
    recommended_food_pairing:
      name: Abbinamenti gastronomici consigliati
      description: Indica le proteine o i piatti principali per cui la salsa è pensata
        (ad esempio, pollo, maiale, manzo, pesce, verdure).
    recommended_lane_condition:
      name: Condizioni di corsia consigliate
      description: Indica il tipo di lubrificazione o la condizione della pista per
        cui la palla è progettata.
    recommended_motor_impulse_class:
      name: Classe Impulse del motore consigliata
      description: Specifica la classe Impulse totale del motore a razzo raccomandata
        per un volo sicuro/ottimale.
    recommended_reading_level:
      name: Livello di lettura consigliato
      description: Indica il livello/abilità di lettura consigliato per il prodotto,
        per aiutare l'acquirente a sceglierlo in base allo sviluppo attuale della
        lettura del bambino.
    recommended_sleep_position:
      name: Posizione consigliata per dormire
      description: Indica per quali posizioni di sonno il materasso è progettato per
        agevolare il comfort (ad esempio, per chi dorme su un fianco o sulla schiena).
    recommended_storage:
      name: Conservazione consigliata
      description: Indica come conservare il prodotto in negozio per mantenerne la
        freschezza.
    recommended_surfaces:
      name: Superfici consigliate
      description: Specifica le superfici/categorie di materiali di incollaggio previste
        per la colla, Beyond alla compatibilità generale Craft (ad esempio, solo Papero
        superfici multiple).
    recommended_use_case:
      name: Caso d'uso consigliato
      description: Scenario di utilizzo principale previsto per il sigillante (riparazione
        temporanea/di emergenza o riparazione a lungo termine).
    recommended_use_location:
      name: Uso consigliato sede
      description: Ambiente previsto per l'altalena (giardino di casa vs parco giochi
        commerciale, ecc.).
    recommended_vehicle_surfaces:
      name: Superfici del veicolo consigliate
      description: Specifica le superfici/finiture del veicolo per cui la spazzola
        è progettata per essere sicura (ad esempio, vernice trasparente, vernice opaca/satinata,
        pellicola vinilica/PPF, vetro, cerchi).
    recorder_accessories_included:
      name: Accessori di registrazione inclusi
      description: Elenca gli accessori inclusi nella confezione del flauto dolce
        per basso.
    recorder_bore_design:
      name: Progettazione del foro del registratore
      description: Progettazione del profilo interno del corpo del registratore.
    recorder_bore_type:
      name: Tipo di foro del registratore
      description: Specifica il tipo di foro del registratore.
    recorder_case_shell_type:
      name: Flauto dolce tipo cassa
      description: Descrive la rigidità strutturale della cassa.
    recorder_finish:
      name: Finale del registratore
      description: Finitura/variante della superficie del corpo del flauto dolce (particolarmente
        rilevante per i flauti dolci contralto in legno).
    recorder_hole_type:
      name: Tipo di foro del registratore
      description: Sia che i fori tonali siano singoli (senza doppi fori) sia che
        includano doppi fori per una migliore diteggiatura cromatica.
    recorder_joint_configuration:
      name: Configurazione congiunta del registratore
      description: Descrive il numero di sezioni del corpo del registratore, il che
        influisce sulla portabilità, sulla pulizia e sulla sostituzione dei componenti.
    recorder_joint_style:
      name: Stile di giunzione del registratore
      description: Lo stile di congiunzione/relazione tra le sezioni di flauti dolci,
        se applicabile.
    recorder_keywork:
      name: Tasti del registratore
      description: Indica se il flauto dolce include tasti (meccanismi in metallo/plastica)
        per le note basse, tipici dei flauti dolci tenore/basso/grandi.
    recorder_mouthpiece_type:
      name: Tipo di bocchino del registratore
      description: Descrive se il bocchino/la testata del flauto dolce è integrato
        (in un unico pezzo) o rimovibile/intercambiabile.
    recorder_pitch_standard_a4:
      name: Tonalità standard del flauto dolce (A4)
      description: Indica la frequenza di riferimento per cui è stato costruito il
        flauto dolce (ad esempio, La = 440 Hz, frequenza moderna, rispetto a La =
        415 Hz, frequenza barocca).
    recorder_thumb_hole_type:
      name: Tipo di foro per il pollice del registratore
      description: Specifica se il registratore è dotato di un singolo foro per il
        pollice o di un doppio foro per il pollice.
    recreational_vehicle_holding_tank_type:
      name: Serbatoio di raccolta per veicoli ricreazionali
      description: Indica quali serbatoi di raccolta delle acque reflue sono presenti
        nel camper.
    recreational_vehicle_leveling_system:
      name: Sistema di livellamento per veicoli ricreazionali
      description: Tipo di sistema di livellamento/stabilizzazione installato.
    recycled_material_content:
      name: Contenuto di materiale riciclato
      description: Indica la percentuale del capo realizzata con fibre o filati riciclati.
    reed_dent_material:
      name: Materiale per incavi di canna
      description: Materiale dei denti/dentature del pettine (gli elementi che separano
        i fili dell'ordito), che influisce sulla durata e sull'abrasione del filato.
    reed_type:
      name: Tipo a canna
      description: Specifica il tipo di costruzione dell'ancia utilizzata dal chanter
        e dai bordoni della cornamusa.
    reeds_included:
      name: Canne incluse
      description: Specifica quali ance sono incluse nel set di cornamusa Great Highland
        (chanter e/o bordone) e se sono in canna o sintetiche.
    reefing_method:
      name: Metodo di terzarolo
      description: Indica il meccanismo (se presente) per ridurre o riporre la vela
        durante la navigazione.
    reel_profile:
      name: Profilo del mulinello
      description: Classifica lo stile/profilo strutturale del corpo del mulinello
        da casting.
    reel_seat_material:
      name: Materiale del portamulinello
      description: Specifica il materiale di costruzione del portamulinello, che influisce
        su peso, sensibilità e resistenza alla corrosione.
    reel_seat_type:
      name: Tipo di portamulinello
      description: Specifica il tipo di meccanismo di bloccaggio che fissa il mulinello
        da pesca alla canna.
    reel_size_class:
      name: Classe di taglia del mulinello
      description: Classificazione taglia designata dal produttore (ad esempio, 1000,
        3000, 5000) che indica la capacità della bobina e la costruzione generale
        del mulinello.
    referee_wallet_accessories_included:
      name: Accessori portafoglio digitale dell'arbitro inclusi
      description: Elenca gli articoli extra inclusi nel pacchetto del portafoglio
        digitale dell'arbitro, come ad esempio cartellini rossi/gialli, fogli segnapunti
        o strumenti di scrittura, in modo che l'acquirente sappia se il portafoglio
        digitale è venduto come kit completo.
    refinement_level:
      name: Livello di raffinatezza
      description: Indica il grado di raffinazione a cui è stato sottoposto l'olio,
        influenzandone taste, colore, valore nutrizionale e punto di fumo.
    reflective_finish:
      name: Finitura riflettente
      description: Specifica la variante della superficie riflettente di una palla
        da discoteca (ad esempio, effetto specchio o effetto olografico/iridescente).
    reflective_or_glow_effect:
      name: Effetto riflettente o luminoso
      description: Indica se la sfera dell'antenna presenta effetti di visibilità
        come materiale riflettente, fosforescente o elementi luminosi/LED.
    reflective_tape_pattern:
      name: Motivo a nastro riflettente
      description: Descrive la configurazione del nastro riflettente sull'indumento
        utilizzato per soddisfare i requisiti di visibilità.
    regulation_standard:
      name: Norma regolamentare
      description: Specifica lo standard ufficiale o la dimensione/certificazione
        dell'ente di controllo a cui la rete è conforme.
    regulator_diaphragm_material:
      name: Materiale del diaframma del regolatore
      description: Specifica il materiale del diaframma che influisce sulla compatibilità
        con carburanti/etanolo (ad esempio, E85) e sulla durata.
    regulator_port_thread_standard:
      name: Thread standard della porta del regolatore
      description: Specifica lo standard di thread/relazione utilizzato sul corpo
        del regolatore per le porte di ingresso/uscita/ritorno.
    rein_features:
      name: Caratteristiche delle redini
      description: Highlight le caratteristiche funzionali o di sicurezza particolari
        presenti sulle redini.
    rein_style:
      name: Stile delle redini
      description: Identifica il design strutturale o la configurazione delle redini,
        consentendo ai cavalieri di scegliere il tipo corretto per la loro disciplina
        e le loro preferenze personali.
    reinforced_areas:
      name: Zone rinforzate
      description: Identifica le parti del capo rinforzate per una maggiore resistenza
        all'abrasione.
    reinforcement_type:
      name: Tipo di rinforzo
      description: Rinforzo strutturale utilizzato nel tubo del radiatore per aumentarne
        la resistenza e la capacità di sopportare temperature e pressioni elevate.
    release_activation_method:
      name: Metodo di attivazione del rilascio
      description: Specifica come l'arciere aziona un dispositivo di sgancio per il
        tiro con l'arco.
    release_bearing_material:
      name: Materiale di rilascio del cuscinetto
      description: Materiale primario dei componenti del cuscinetto/della superficie
        di appoggio (ove specificato dal produttore).
    release_jaw_style:
      name: Stile di rilascio della ganascia
      description: Descrive il design delle ganasce o del gancio della testa di rilascio.
    release_strap_type:
      name: Tipo di cinturino di rilascio
      description: Identifica il sistema di cinghie o di collegamento supply con il
        dispositivo di rilascio per il tiro con l'arco.
    remote_control_airship_envelope_material:
      name: Materiale di rivestimento per dirigibile telecomandato
      description: Specifica il materiale principale dell'involucro del dirigibile
        (sacca del gas), distinto dal materiale complessivo del giocattolo.
    remote_control_motorcycle_scale:
      name: Scala del motociclo telecomandato
      description: Scala della moto RC rispetto a una moto reale (se modellata come
        un veicolo in scala).
    remote_control_motorcycle_terrain_suitability:
      name: Motocicletta telecomandata adatta al terreno
      description: Terreno principale su cui la moto telecomandata è progettata per
        funzionare.
    remote_control_motorcycle_water_resistance:
      name: Motocicletta telecomandata resistente all'acqua
      description: Livello di protezione dall'acqua per l'elettronica della moto telecomandata.
    remote_control_plane_kit_completion_level:
      name: Livello di completamento del kit per aereo telecomandato
      description: Indica cosa è incluso e quanto è completo il set (ad esempio, pronto
        al volo o richiede trasmettitore/ricevitore/batteria separati).
    remote_control_plane_landing_gear_type:
      name: Tipo di carrello di atterraggio per aereo telecomandato
      description: Indica la configurazione del carrello di atterraggio che influisce
        sulla durata e sulle superfici di decollo/atterraggio.
    remote_control_plane_power_type:
      name: Tipo di alimentazione del piano di controllo remoto
      description: Specifica come l'aereo è alimentato/propulso (elettrico o a incandescenza/benzina/nitro),
        il che influisce sulla manutenzione, sul rumore e sulle aree in cui può volare.
    remote_control_watercraft_features:
      name: Caratteristiche delle imbarcazioni con telecomando
      description: Highlight le caratteristiche chiave specifiche delle imbarcazioni
        radiocomandate che influiscono sull'usabilità e sulla durata.
    remote_control_watercraft_propulsion_drive_type:
      name: Tipo di propulsione/guida per imbarcazioni telecomandato
      description: Specifica come viene guidata in acqua l'imbarcazione telecomandata.
    remote_control_watercraft_water_environment:
      name: Motoscafo telecomandato in ambiente acquatico
      description: Indica le condizioni dell'acqua ideali in cui l'imbarcazione telecomandata
        offre le migliori prestazioni.
    remote_keyless_system_programming_method:
      name: Metodo di programmazione del sistema senza chiave a distanza
      description: Modalità di programmazione o abbinamento del telecomando/sistema
        al veicolo (ad esempio, procedura di bordo rispetto a strumento professionale).
    repair_compound_type:
      name: Tipo di composto di riparazione
      description: Tipo/formulazione del materiale di riparazione consumabile incluso
        (ad esempio, tipo di stucco per carrozzeria, tipo di resina per parabrezza,
        tipo di cemento/sigillante per tappi pneumatici).
    repair_kit_components:
      name: Componenti del kit di riparazione
      description: Elenca gli articoli specifici inclusi nel kit di riparazione, consentendo
        all'acquirente di comprendere il contenuto e confrontare il pacchetto.
    repair_method:
      name: Metodo di riparazione
      description: Specifica il principale metodo di riparazione utilizzato dal kit,
        come ad esempio le toppe adesive o la sostituzione della valvola.
    replacement_part_purpose:
      name: Scopo del pezzo di ricambio
      description: Indica se l'articolo è una parte di ricambio OEM, una parte che
        effettua l'aggiornamento/prestazioni, oppure un componente accessorio aggiuntivo.
    replacement_part_type:
      name: Tipo di parte di ricambio
      description: Identifica la categoria funzionale del componente dell'ellittica,
        consentendo all'acquirente di filtrare i risultati in base al componente di
        cui ha bisogno.
    replacement_parts_availability:
      name: Disponibilità pezzi di ricambio
      description: Indica se sono supportati componenti di consumo/parti di ricambio
        per l'infilatrice (ad esempio, ganci/fili di ricambio).
    replica_gun_action_type:
      name: Tipo di azione della replica
      description: Specifica il tipo di funzionamento/azione della replica dell'arma
        da fuoco (come rappresentata), ad esempio a otturatore girevole-scorrevole
        o a leva.
    replica_gun_firing_mechanism:
      name: Meccanismo di sparo della replica
      description: Indica se e come la replica simula lo sparo/functions (non letali),
        come lo sparo a capsula o il non sparo.
    replica_gun_moving_parts:
      name: Parti mobili della replica
      description: Indica quali parti sono funzionali/mobili sulla replica.
    reservoir_orientation:
      name: Orientamento del serbatoio
      description: Specifica l'orientamento o il profilo previsto della vescica all'interno
        dell'imballaggio.
    reservoir_type:
      name: Tipo di serbatoio
      description: Tipo di configurazione del serbatoio per la pompa frizione.
    resin_suitability:
      name: Idoneità della resina
      description: Specifica se il pallone da pallamano è progettato per l'uso con
        resina (colla) o se è privo di resina.
    resistance_adjustability:
      name: Regolazione della resistenza
      description: Specifica se la resistenza respiratoria può essere modificata dall'utente.
    resistance_band_design:
      name: Progettazione di fasce di resistenza
      description: Descrive la forma fisica o lo stile di una fascia di resistenza
        (ad esempio, ad anello, tubo con maniglia, a forma di otto), aiutando l'acquirente
        a scegliere il modello più adatto alla propria routine di allenamento.
    resistance_loading_type:
      name: Tipo di carico di resistenza
      description: Indica come viene fornita o caricata la resistenza/il peso sulla
        macchina Smith (ad esempio, con piastre o con pacco pesi selezionabile).
    response_fields_included:
      name: Campi di risposta inclusi
      description: Specifica quali campi/opzioni di risposta standard sono presenti
        sulla scheda di risposta (ad esempio, accetta/rifiuta, scelta del pasto).
    restoration_status:
      name: Stato del restauro
      description: Indica se il furgone è originale, restaurato, restomod o in condizioni
        da progetto.
    rhinestone_base_color_family:
      name: Famiglia di colori base strass
      description: Identifica la famiglia di colori della base dello strass (ad esempio,
        trasparente/cristallo, oro/giallo, blu).
    rhinestone_facet_style:
      name: Stile di strass a filtro
      description: Il motivo della superficie/filtro dello strass influisce sulla
        brillantezza e sull'aspetto (ad esempio, Xilion rose, taglio brillante, filtri
        vs liscio).
    rhinestone_hole_reinforcement_material:
      name: Materiale di rinforzo per fori di strass
      description: Il materiale intorno/in corrispondenza dei fori (ad esempio, occhiello
        metallico, plastica stampata) influenzando sulla durata durante la cucitura.
    rhinestone_setting_type:
      name: Tipo di impostazioni dello strass
      description: Come viene montata/bordata la pietra per la cucitura (ad esempio,
        impostazioni a griffe, impostazioni a castone, impostazioni con bordo).
    rhubarb_product_cut_type:
      name: Tipo di prodotto tagliato del rabarbaro
      description: Descrive la preparazione fisica o il taglio del prodotto a base
        di rabarbaro.
    ribbon_construction:
      name: Costruzione a nastro
      description: Descrive le principali caratteristiche costruttive del nastro grosgrain,
        come la presenza di filo metallico o l'elasticità che ne influenzano l'utilizzo
        (ad esempio, fiocchi rispetto al cucito).
    ribbon_packaging_type:
      name: Tipo di imballaggio a nastro
      description: Indica come il nastro viene fornito/venduto.
    ribbon_pattern_style:
      name: Stile a motivo di nastro
      description: Classifica il metodo di applicazione del motivo comunemente utilizzato
        sui nastri grosgrain.
    ribbon_sheen_level:
      name: Livello di lucentezza del nastro
      description: Indica la lucentezza/brillantezza visiva della superficie del nastro
        di raso.
    ribbon_style:
      name: Stile del nastro
      description: Specifica il motivo/stile visivo del nastro (ad esempio, tinta
        unita, a righe, tricolore).
    ribbon_trim_backing_type:
      name: Tipo di supporto del nastro/rifinitura
      description: Indica se il nastro/rifinitura ha un supporto e di che tipo (per
        una facile applicazione).
    ribbon_trim_edge_finish:
      name: Finitura del bordo con nastro/rifinitura
      description: Descrive la struttura/finitura del bordo del nastro/rifinitura
        utile per valutare il comportamento allo sfilacciamento e l'uso previsto).
    ric_rac_wave_size:
      name: Taglia onda a zig-zag
      description: Descrive l'ampiezza/scala dell'onda del motivo a zig-zag (quanto
        sono grandi le onde).
    rice_grain_length:
      name: Lunghezza del chicco di riso
      description: Classifica i prodotti a base di riso in base alla lunghezza del
        chicco, ad esempio corto, medio o lungo, che influenza le caratteristiche
        di cottura e l'uso culinario.
    rice_processing_method:
      name: Metodo di lavorazione del riso
      description: Descrive come il riso è stato lavorato o preparato (ad esempio,
        parboiled, germogliato, in fiocchi), impattando sui tempi di cottura, i valori
        nutrizionali e l'utilizzo.
    rice_variety:
      name: Varietà di riso
      description: Specifica la varietà o cultivar di riso, consentendo all'acquirente
        di scegliere i chicchi con il sapore, l'aroma, la consistenza e la cucina
        desiderati.
    riding_toy_features:
      name: Caratteristiche del giocattolo cavalcabile
      description: Highlight le caratteristiche funzionali e di sicurezza comuni specifiche
        dei giocattoli cavalcabili.
    rifle_action_type:
      name: Tipo di azione del fucile
      description: Il meccanismo di funzionamento del fucile (come si carica, spara
        ed espelle), importante ai fini dell'identificazione e per l'interesse dei
        collezionisti.
    rifle_finish:
      name: Finitura del fucile
      description: Finitura/rivestimento esterno primario della struttura metallica.
    rifle_magazine_type:
      name: Tipo di caricatore per fucile
      description: Tipo di sistema di alimentazione per il fucile.
    rifle_stock_material:
      name: Materiale per il calcio del fucile
      description: Materiale principale utilizzato per il calcio/le parti metalliche
        del fucile (ad esempio, noce, polimero).
    rim_clamping_method:
      name: Metodo di fissaggio del cerchione
      description: Modalità di fissaggio della ruota/cerchio da parte della macchina
        durante le operazioni di montaggio e smontaggio.
    rim_strip_type:
      name: Tipo di striscia per cerchioni
      description: Classifica il nastro/la striscia in base allo stile, alla costruzione
        o alla specifica applicazione (ad esempio, nastro per cerchioni tubeless rispetto
        a striscia protettiva in gomma).
    rim_tubeless_compatibility:
      name: Compatibilità tubeless del cerchione
      description: Indica se il cerchione, il nastro o la ruota sono progettati per
        pneumatici tubeless.
    ripeness_stage:
      name: Stadio di maturazione
      description: Indica il livello di maturazione del frutto al momento della vendita
        (ad esempio, acerbo, maturo, pronto per il consumo).
    riser_pad_type:
      name: Tipo di cuscinetto rialzato
      description: Classifica lo stile funzionale del cuscinetto (ad esempio, distanziatore
        standard, ammortizzante, cuneo angolato).
    roasted_malt_processing_type:
      name: Tipo di lavorazione del malto tostato
      description: Il metodo di lavorazione specifico o la variante utilizzata per
        creare il malto tostato o il cereale tostato (ad esempio, orzo tostato non
        maltato, malto nero, variante deamarizzata o decorticata).
    robotic_toy_interaction_mode:
      name: Modi di interazione con il giocattolo robotico
      description: Descrive la modalità principale con cui il robot interagisce o
        si muove durante il gioco.
    robotic_toy_light_features:
      name: Caratteristiche delle luci del giocattolo robotico
      description: Indica se e come il giocattolo utilizza luci durante il gioco (ad
        esempio, LED, proiezione).
    robotic_toy_programming_supported:
      name: Programmazione di giocattoli robotici supportata
      description: Specifica quale approccio di programmazione, se presente, viene
        utilizzato per l'assistenza al giocattolo.
    robotic_toy_skill_level:
      name: Livello skill del giocattolo robotico
      description: Indica il livello di complessità delle operazioni/programmazione
        richiesto all'utente.
    robotic_toy_sound_features:
      name: Caratteristiche sonore del giocattolo robotico
      description: Indica le capacità sonore del giocattolo robotico.
    rod_butt_style:
      name: Stile impugnatura canna
      description: Definisce la configurazione dell'estremità inferiore della canna
        da pesca utilizzata nell'app per la pesca a traina.
    rod_construction_type:
      name: Tipo di costruzione della canna
      description: Indica lo stile costruttivo generale della canna da pesca in termini
        di componenti e possibilità di ripiegamento.
    rod_guide_material:
      name: Materiale guida della canna
      description: Specifica il materiale utilizzato per gli anelli o gli inserti
        della canna da pesca, influenzandone la durata, il peso e l'attrito della
        lenza.
    rod_guide_type:
      name: Tipo di guida della canna
      description: Specifica il tipo principale di anelli guida per la lenza installati
        sulla canna.
    rod_handle_type:
      name: Tipo di handle della canna
      description: Specifica la configurazione dell'impugnatura di una canna da pesca,
        contribuendo al comfort e alla scelta della tecnica.
    roll_cage_tubing_material:
      name: Materiale tubolare per roll-bar
      description: Specifica il materiale/lega dei tubi utilizzati per la gabbia di
        sicurezza/roll-bar (ad esempio, acciaio DOM o acciaio al cromo-molibdeno 4130).
    roller_skate_brake_shape:
      name: Shape dei freni dei pattini a rotelle
      description: Descrive le shape geometriche/il profilo della testa del freno
        in base a preferenze prestazionali o estetiche.
    roller_skate_brake_type:
      name: Tipo di freno per pattini a rotelle
      description: Specifica il sistema frenante utilizzato sui pattini a rotelle.
    roller_ski_technique:
      name: Tecnica degli sci a rotelle
      description: Identifica la tecnica di sci incrociato per cui sono progettati
        gli sci a rotelle.
    roller_technology:
      name: Tecnologia a rulli
      description: Indica la tecnologia integrata che migliora le prestazioni del
        massaggio, come la vibrazione o il calore.
    rolling_case_wheel_configuration:
      name: Configurazione delle ruote della custodia con rotelle
      description: Specifica la configurazione delle ruote utilizzata sulle custodie
        con rotelle per tastiere musicali.
    rolling_paper_format:
      name: Formato della cartina
      description: Identifica la presentazione fisica del prodotto (ad es. fogli piatti,
        coni pre-arrotolati, involucri).
    rolling_paper_gum_type:
      name: Tipo di colla della cartina
      description: Specifica l'adesivo (colla) utilizzato sul bordo della cartina
        per la sigillatura, che può influire sul gusto e sulle prestazioni.
    rolling_paper_size:
      name: Dimensioni della cartina
      description: Indica la classificazione delle dimensioni standard della cartina
        o del cono, consentendo agli acquirenti di selezionare rapidamente la larghezza/lunghezza
        corretta per le loro esigenze.
    rolling_stock_type:
      name: Tipo di materiale rotabile
      description: Specifica il tipo di treno/veicolo ferroviario del modello (locomotiva
        vs vagoni passeggeri/merci e sottotipi di vagoni comuni).
    roof_cargo_net_hook_fastener_style:
      name: Stile del gancio/fissaggio della rete da carico sul tetto
      description: Specifica lo stile dell'elemento terminale utilizzato per collegare
        la rete ai punti di ancoraggio (ad es. gancio a S, moschettone, gancio a J).
    roof_height_class:
      name: Classe di altezza del tetto
      description: Classifica l'altezza del tetto comunemente utilizzata per i furgoni
        (particolarmente rilevante per le conversioni/costruzioni di camper).
    roof_type:
      name: Tipo di tetto
      description: Configurazione della sezione del tetto o del soffitto dell'abitacolo.
    root_variety:
      name: Varietà di radice
      description: Identifica la varietà o il tipo comune di radice (ad es. varietà
        di rafano rispetto a quelle di vero wasabi).
    rope_buoyancy:
      name: Galleggiabilità della corda
      description: Indica se la corda è progettata per galleggiare sulla superficie
        dell'acqua, aiutando i cavalieri a evitare di impigliarsi e semplificando
        il recupero.
    rope_construction:
      name: Costruzione della corda
      description: Specifica i dettagli della struttura in fibra oltre allo stile
        di trecciatura, come ad esempio anima/guaina ritorta rispetto a intrecciata
        e se la corda è di tipo kernmantle.
    rope_material:
      name: Materiale della corda
      description: Identifica il materiale della corda/cordino di regolazione.
    rope_strand_compatibility:
      name: Compatibilità dei trefoli della corda
      description: Indica quali configurazioni di trefoli della corda il dispositivo
        di assicurazione è in grado di gestire (singolo, mezzo/doppio, gemellato o
        combinazioni).
    rope_stretch_type:
      name: Tipo di allungamento della corda
      description: Descrive le caratteristiche di allungamento della corda, distinguendo
        tra stili non elastici, a basso allungamento, standard o elastici.
    rose_bloom_stage:
      name: Stadio di fioritura delle rose
      description: Indica quanto sono aperte le rose al momento della consegna/arrivo
        (da bocciolo a completamente aperte).
    rose_grade:
      name: Grado delle rose
      description: Grado di qualità commerciale delle rose recise.
    rosette_center_type:
      name: Tipo di centro della coccarda
      description: Specifica il tipo di dettaglio centrale o inserto sulla parte anteriore
        della coccarda.
    rosin_dust_level:
      name: Livello di polvere di colofonia
      description: Indica la quantità prevista di polvere di colofonia prodotta durante
        il normale utilizzo.
    rosin_formula_additives:
      name: Formula della colofonia / additivi
      description: Identifica caratteristiche di formulazione degne di nota, come
        miscele ipoallergeniche, a bassa emissione di polvere o arricchite con metalli.
    rosin_hardness:
      name: Durezza della colofonia
      description: Indica la relativa durezza/morbidezza della colofonia dell'archetto,
        che può influire sulla presa e sulla produzione di polvere a seconda del clima
        e dello stile di esecuzione.
    rotation_mechanism_type:
      name: Tipo di meccanismo di rotazione
      description: Specifica il meccanismo che permette alla corda di ruotare, influenzando
        la fluidità e la velocità raggiungibile (ad es. cuscinetti a sfera o boccole).
    rotation_motion_features:
      name: Caratteristiche di rotazione/movimento
      description: Indica se i pianeti/le orbite ruotano o si muovono e in che modo.
    rotor_configuration_type:
      name: Tipo di configurazione del rotore
      description: Identifica la configurazione del rotore dell'elicottero RC e lo
        stile di controllo (ad es. coassiale, rotore singolo a passo fisso vs passo
        collettivo, multirotore), che influisce in modo significativo sulle caratteristiche
        di volo e sull'idoneità per diversi livelli di abilità.
    rotor_construction_type:
      name: Tipo di costruzione del rotore
      description: Specifica lo stile di costruzione del rotore, che influenza il
        peso, la rigidità e la gestione del calore.
    rotor_mounting_interface:
      name: Interfaccia di montaggio del rotore
      description: Definisce lo standard di interfaccia del mozzo utilizzato per fissare
        il rotore alla ruota.
    rotor_mounting_standard:
      name: Standard di montaggio del rotore
      description: Specifica lo standard di interfaccia utilizzato per fissare il
        rotore al mozzo (ad es. a 6 bulloni o Center Lock).
    roulette_set_components_included:
      name: Componenti del set da roulette inclusi
      description: Componenti chiave relativi alla roulette inclusi nella ruota/nel
        set.
    roulette_wheel_ball_track_type:
      name: Tipo di pista delle palline della ruota della roulette
      description: Descrive lo stile della pista delle palline utilizzata sulla ruota,
        che influisce sul realismo e sulla sensazione di gioco.
    roulette_wheel_numbering_system:
      name: Sistema di numerazione della ruota della roulette
      description: Indica la configurazione della numerazione e dello zero della ruota
        della roulette per la compatibilità con il gameplay e le probabilità.
    rounders_equipment_included:
      name: Attrezzatura da rounders inclusa
      description: Elenca gli articoli o gli accessori specifici forniti con il set
        o il pacchetto di ausili didattici, in modo che gli acquirenti sappiano esattamente
        cosa c'è nella confezione.
    rounders_governing_body_approval:
      name: Approvazione da parte dell'ente di governo del rounders
      description: Indica la certificazione o l'approvazione da parte di un ente ufficiale
        di governo del rounders o di altri sport.
    row_counter_format:
      name: Formato del contatore di ferri
      description: Specifica il formato/stile di un contatore di ferri per maglieria
        (ad es. anello, catena, clic, digitale).
    row_counter_mechanism:
      name: Meccanismo del contatore di ferri
      description: Specifica come il conteggio dei ferri viene fatto avanzare/registrato
        sullo strumento.
    row_counter_mounting_method:
      name: Metodo di montaggio del contatore di ferri
      description: Come si fissa il contatore/indicatore durante l'uso (all'ago, al
        dito, al lavoro, ecc.).
    rowel_type:
      name: Tipo di rotella
      description: Descrive la forma o il profilo del bordo della rotella in base
        alle preferenze del cavaliere e alla sensibilità del cavallo.
    rowing_machine_part_type:
      name: Tipo di componente per vogatore
      description: Identifica il componente specifico che il prodotto è destinato
        a sostituire su un vogatore, in modo che gli acquirenti possano trovare rapidamente
        il pezzo esatto di cui hanno bisogno senza creare un'esplosione di micro-categorie.
    rubber_ducky_character_theme:
      name: Personaggio/tema della paperella di gomma
      description: Tema o stile del personaggio della paperella di gomma (utile per
        paperelle da collezione o di fantasia).
    rubber_ducky_features:
      name: Caratteristiche della paperella di gomma
      description: Caratteristiche funzionali/di design specifiche dei giocattoli
        da bagno a forma di paperella di gomma.
    rubber_ducky_size_class:
      name: Classe di dimensioni della paperella di gomma
      description: Un raggruppamento delle dimensioni delle paperelle di gomma di
        facile consultazione per l'acquirente, basato sull'uso tipico (giocattolo
        da vasca vs decorazione per torte vs formato gigante).
    ruffle_style:
      name: Stile delle balze
      description: Descrive la struttura o lo stile visivo delle balze su una fascia
        per sedia.
    rugby_headgear_safety_certification:
      name: Certificazione di sicurezza dei caschi da rugby
      description: Indica se il casco soddisfa gli standard di sicurezza ufficiali
        del rugby o dello sport in generale.
    rugby_size:
      name: Taglia da rugby
      description: Classifica l'attrezzatura in base alle comuni etichette di taglia
        specifiche per il rugby utilizzate nei titoli dei prodotti.
    rugby_variant:
      name: Variante di rugby
      description: Specifica la variante di rugby (codice o formato) a cui è destinato
        il prodotto.
    ruler_edge_type:
      name: Tipo di bordo del righello
      description: Identifica il profilo/la funzione del bordo utilizzato per misurare
        o tracciare segni (ad es. bordo dritto, smussato, a labbro).
    ruler_marking_style:
      name: Stile di marcatura del righello
      description: Descrive la disposizione delle linee di riferimento/guida stampate
        sul righello oltre ai segni di graduazione di base.
    runner_configuration:
      name: Configurazione del runner
      description: Descrive il numero e la disposizione dei pattini sulla slitta.
    runner_material:
      name: Materiale dei pattini
      description: Specifica il materiale utilizzato per i pattini o le strisce di
        scorrimento della slitta.
    saddle_cover_style:
      name: Stile del coprisella
      description: Classifica il design complessivo o lo stile di utilizzo del prodotto
        (ad es. coprisella da rimessaggio, coprisella da corsa, borsa da trasporto).
    saddle_design:
      name: Design della sella
      description: Classifica il design/stile ergonomico o di scarico complessivo
        della sella (ad es. con intaglio, senza punta, con punta divisa, a molle).
    saddle_discipline:
      name: Disciplina per la sella
      description: Specifica la disciplina equestre principale o l'uso/stile previsto
        per la sella.
    saddle_mounting_type:
      name: Tipo di montaggio della sella
      description: Specifica l'interfaccia tra la sella e il reggisella per la compatibilità
        (ad es. con binario, a perno, a I).
    saddle_pad_shape:
      name: Forma del cuscinetto della sella
      description: Descrive il taglio/profilo fisico del cuscinetto, che influisce
        sulla compatibilità della sella e sulle preferenze estetiche.
    saddle_pad_style:
      name: Stile del sottosella
      description: Identifica lo stile funzionale del sottosella o la disciplina prevista,
        consentendo ai ciclisti di scegliere il design giusto per la loro attività
        o il tipo di sella.
    saddle_padding_material:
      name: Materiale di imbottitura della sella
      description: Indica il materiale o la tecnologia di imbottitura principale all'interno
        della sella che influenza il comfort e la sensazione di guida.
    saddle_rail_material:
      name: Materiale del binario della sella
      description: Specifica il materiale utilizzato per le guide sotto una sella
        da bicicletta, che influisce su resistenza, comfort, peso e prezzo.
    saddle_tree_material:
      name: Materiale dell'arcione della sella
      description: Specifica il materiale utilizzato per il telaio della sella, la
        struttura interna della sella.
    saddle_tree_width:
      name: Larghezza del telaio della sella
      description: Descrive la classificazione della larghezza del telaio della sella,
        che determina l'adattamento al garrese del cavallo.
    safety_documentation_available:
      name: Documentazione di sicurezza disponibile
      description: Indica quali documenti di conformità/sicurezza sono forniti per
        l'ingrediente (ad es. scheda di sicurezza, certificato/dichiarazione IFRA,
        dichiarazione sugli allergeni).
    safety_equipment_included:
      name: Attrezzatura di sicurezza inclusa
      description: Articoli di sicurezza/protezione inclusi nel kit.
    safety_features:
      name: Caratteristiche di sicurezza
      description: Indica le caratteristiche di sicurezza integrate volte a ridurre
        i tagli accidentali o a proteggere la lama durante lo stoccaggio.
    safety_harness_type:
      name: Tipo di imbracatura di sicurezza
      description: Indica lo stile e la configurazione dell'imbracatura di ritenzione
        per bambini fornita con il seggiolino.
    safety_mechanism_type:
      name: Tipo di meccanismo di sicurezza
      description: Descrive lo stile del sistema di sicurezza integrato utilizzato
        per bloccare il bilanciere in caso di sollevamenti falliti.
    safety_restraint_type:
      name: Tipo di sistema di ritenzione di sicurezza
      description: Tipo di sistema di ritenzione per bambini integrato sul seggiolino
        altalena, se presente.
    safety_warning:
      name: Avvertenza di sicurezza
      description: Indica se il prodotto riporta le comuni avvertenze di sicurezza
        relative ai giocattoli, in particolare alle biglie (ad es. rischio di soffocamento).
    sail_shape:
      name: Forma della vela
      description: Descrive lo stile geometrico della vela del kayak, che influenza
        l'efficienza, la manovrabilità e il montaggio.
    salad_dressing_type:
      name: Tipo di condimento per insalata
      description: Identifica lo stile o la consistenza fondamentale del condimento
        (ad es. cremoso, vinaigrette, a base di yogurt), aiutando gli acquirenti a
        distinguere tra diverse basi e consistenze.
    salad_topping_base_ingredient:
      name: Ingrediente base del condimento per insalata
      description: Specifica il gruppo di ingredienti principali che compongono il
        condimento, aiutando i clienti a filtrare in base alle preferenze nutrizionali,
        alle preoccupazioni relative agli allergeni o alla consistenza desiderata.
    salt_level:
      name: Livello del sale
      description: Indica la quantità di sale o sodio aggiunta alle noci o ai semi.
    sand_cup_features:
      name: Caratteristiche della tazza per la sabbia
      description: Caratteristiche funzionali/fisiche della/e tazza/e per la sabbia
        che influenzano il gioco e l'uso.
    sand_shovel_handle_style:
      name: Stile del manico della paletta da sabbia
      description: Descrive la forma dell'impugnatura/manico all'estremità del manico
        della paletta/pala
    sand_toy_set_pieces_included:
      name: Pezzi del set di giocattoli di sabbia inclusi
      description: Elenca i tipi di componenti dei giochi da sabbia inclusi nel set
        (ad es. secchiello, paletta, stampi), per aiutare gli acquirenti a confrontare
        i kit in base al loro contenuto.
    sand_water_mill_items_included:
      name: Articoli inclusi nel mulino da sabbia e acqua
      description: Elenca i principali accessori inclusi con il mulino giocattolo
        (secchielli, palette, stampi, ecc.).
    sandbag_style:
      name: Stile del sacco da sabbia
      description: Identifica il design specifico e l'uso previsto per l'allenamento
        del sacco da sabbia (ad es. bulgaro, strongman, power), aiutando gli acquirenti
        a scegliere tra diverse modalità di allenamento.
    sandbox_bottom_type:
      name: Tipo di fondo della sabbiera
      description: Il tipo di struttura di base/fondo utilizzata sotto la sabbia.
    sandbox_drainage_type:
      name: Tipo di drenaggio della sabbiera
      description: Come la sabbiera drena l'acqua (se applicabile), ad esempio tramite
        fori di drenaggio o un tappo rimovibile.
    sandbox_seating_type:
      name: Tipo di seduta della sandbox
      description: Se la sabbiera include sedute integrate e di che tipo.
    sapodillo_variety:
      name: Varietà di sapodillo
      description: Identifica la cultivar o la varietà specifica di sapodillo/chikoo
        (ad es. "Alano", "Prolific"), consentendo agli appassionati di selezionare
        i profili di sapore e le caratteristiche preferite.
    sapote_variety:
      name: Varietà di sapote
      description: Specifica la particolare specie/tipo di sapote offerto (ad es.
        nero, bianco, mamey), consentendo agli acquirenti di distinguere tra i diversi
        tipi.
    satin_ribbon_face_type:
      name: Tipo di finitura del nastro di raso
      description: Specifica se il nastro ha una finitura satinata su un lato o su
        entrambi i lati.
    sauce_consistency:
      name: Consistenza della salsa
      description: Descrive la consistenza o la densità della salsa per pizza.
    sauce_product_form:
      name: Forma del prodotto salsa
      description: Indica la forma fisica del prodotto a base di salsa, come liquido,
        olio, pasta, polvere, fiocchi o sciroppo.
    sauce_variety:
      name: Varietà di salsa
      description: Identifica lo stile specifico o la famiglia di ricette della salsa
        bianca o alla panna (ad es. Alfredo, Besciamella, Olandese).
    saxophone_body_finish:
      name: Finitura del corpo del sassofono
      description: Descrive la finitura/placcatura principale sul corpo del sassofono
        (separata dalla meccanica).
    saxophone_body_type:
      name: Tipo di corpo del sassofono
      description: Descrive la configurazione fisica complessiva del corpo del sassofono
        basso e l'orientamento della campana.
    saxophone_construction_style:
      name: Stile di costruzione del sassofono
      description: Indica le caratteristiche costruttive comuni dei sassofoni che
        influiscono su durata, risonanza e manutenzione.
    saxophone_included_accessories:
      name: Accessori inclusi del sassofono
      description: L'elenco comprendeva gli accessori che vengono comunemente forniti
        con un sassofono contralto.
    saxophone_key_system:
      name: Sistema di tasti del sassofono
      description: Identifica il sistema di tasti del sassofono (layout/meccanismo
        standard) utilizzato sullo strumento.
    saxophone_key_touch_material:
      name: Materiale al tatto dei tasti del sassofono
      description: Specifica il materiale utilizzato per i tasti del sassofono (ad
        esempio, tasti in madreperla).
    saxophone_mouthpiece_baffle_type:
      name: Tipo di deflettore per bocchino del sassofono
      description: Descrive il design del deflettore che regola il flusso d'aria e
        la luminosità.
    saxophone_neck_type:
      name: Tipo di collo del sassofono
      description: Specifica la configurazione del collo fornito con il sassofono
        basso.
    saxophone_package_contents:
      name: Contenuto della confezione del sassofono
      description: Elenca gli accessori principali inclusi con il sassofono (ad esempio,
        cassa, bocchino, legatura, tracolla, kit di pulizia).
    saxophone_reed_cut:
      name: Taglio dell'ancia del sassofono
      description: Specifica il taglio/stile dell'ancia del sassofono, che influisce
        su risposta, timbro e sensazione di suonabilità.
    saxophone_reed_material_type:
      name: Tipo di materiale dell'ancia del sassofono
      description: Specifica la categoria del materiale dell'ancia (ad esempio, canna
        o materiale sintetico).
    saxophone_reed_strength_scale:
      name: Scala di durezza dell'ancia del sassofono
      description: Specifica il sistema di numerazione/scala di durezza utilizzato
        per l'ancia (spesso in base alla marca), consentendo un confronto più chiaro
        tra le inserzioni.
    saxophone_small_part_thread_size:
      name: Dimensione filettatura piccole parti del sassofono
      description: Specifica la filettatura/standard di misura per le piccole parti
        filettate del sassofono (principalmente viti), consentendo la selezione della
        misura corretta.
    saxophone_swab_application_area:
      name: Area di applicazione scovolino del sassofono
      description: Indica quale parte del sassofono deve pulire/asciugare lo scovolino.
    scabbard_material:
      name: Materiale del fodero
      description: Specifica il materiale principale del fodero/guaina incluso (se
        presente).
    scale_model_assembly_status:
      name: Stato di assemblaggio del modellino in scala
      description: Indica se il modello in scala è pronto per essere esposto o se
        richiede assemblaggio/verniciatura.
    scale_model_car_features:
      name: Caratteristiche del modellino di auto in scala
      description: Caratteristiche principali del modellino di auto in scala come
        portiere/cofano apribili, ruote sterzanti, sospensioni, ecc.
    scale_model_kit_assembly_requirements:
      name: Requisiti per l'assemblaggio del kit del modellino in scala
      description: Specifica quali passaggi di assemblaggio/dotazioni aggiuntive sono
        in genere necessari oltre al montaggio a incastro.
    scale_model_kit_components_included:
      name: Componenti del kit di modellino in scala inclusi
      description: Elenca gli elementi inclusi nel kit/modellino in scala del carro
        armato (ad esempio, decalcomanie, figurini, parti fotoincise).
    scale_model_paint_status:
      name: Stato della verniciatura del modellino in scala
      description: Indica se il modello di elicottero è preverniciato/rifinito o se
        necessita di verniciatura.
    scale_model_pose:
      name: Posa del modello in scala
      description: Specifica la posa raffigurata del modellino di cavallo per l'abbinamento
        con esposizioni/diorama.
    scale_model_rotor_configuration:
      name: Configurazione del rotore in scala
      description: Specifica la configurazione del rotore dell'elicottero raffigurata
        nel modello.
    scale_model_truck_era:
      name: Periodo del camion in scala
      description: Indica l'epoca/il periodo storico del camion reale che il modello
        rappresenta (utile per i collezionisti che cercano camion d'epoca o moderni).
    scale_model_truck_propulsion_type:
      name: Tipo di propulsione del camion in scala
      description: Specifica se il camion raffigurato è alimentato a diesel, benzina,
        elettrico, ibrido o con altro tipo di propulsione (come rappresentato/commercializzato
        dal modello).
    scale_units:
      name: Unità di scala
      description: Unità di misura stampate/incise sulla trave per le impostazioni
        di raggio/diametro.
    scent_function:
      name: Funzione del profumo
      description: Definisce le funzioni principali di un prodotto olfattivo, consentendo
        ai cacciatori di individuare rapidamente lo strumento più adatto (ad esempio,
        attrattivo o eliminatore di odori).
    scent_source:
      name: Fonte del profumo
      description: Elenca la principale fonte biologica o aromatica utilizzata nella
        formulazione del prodotto, includendo tipi di urina, profumi a base alimentare,
        aromi vegetali, ecc.
    school_bus_body_type:
      name: Tipo di carrozzeria dello scuolabus
      description: Classifica gli scuolabus in base ai formati/classi di carrozzeria
        più comuni utilizzati sul mercato (ad esempio, tipo A–D).
    school_bus_safety_feature:
      name: Dispositivo di sicurezza dello scuolabus
      description: Dotazioni di sicurezza rilevanti installate sullo scuolabus.
    school_glue_washability:
      name: Lavabilità della colla scolastica
      description: Indica con quanta facilità la colla secca/umida può essere rimossa
        da pelle/vestiti/superfici.
    scissors_application:
      name: Applicazione delle forbici
      description: Applicazione/materiale di taglio principale previsto per le forbici.
    scooter_brake_pad_material:
      name: Materiale delle pastiglie dei freni dello scooter
      description: Specifica la mescola utilizzata nelle pastiglie dei freni, che
        influisce su prestazioni, rumorosità e durata.
    scoring_method:
      name: Metodo di punteggio
      description: Specifica come vengono conteggiati i punteggi sul tavolo da calcio
        balilla, ad esempio tramite contatori manuali a perline o tabelloni segnapunti
        elettronici.
    scoring_pattern:
      name: Schema di punteggio
      description: Schema delle zone di punteggio stampato sul piano di gioco.
    scoring_system_type:
      name: Tipo di sistema di punteggio
      description: Descrive il tipo di meccanismo di conteggio dei punteggi incluso
        nel tavolo, come ad esempio cursori manuali o vari display elettronici.
    scottish_smallpipes_bag_material:
      name: Materiale della sacca di cornamusa scozzese
      description: Specifica il materiale della sacca (serbatoio d'aria) fornito con
        la cornamusa.
    scottish_smallpipes_drone_tuning_configuration:
      name: Configurazione di accordatura del bordone della cornamusa scozzese
      description: Specifica la configurazione di accordatura dei bordoni fornita
        con lo strumento (intonazioni/funzioni dei bordoni rispetto alla tonica).
    scottish_smallpipes_reed_type:
      name: Tipo di ancia della cornamusa scozzese
      description: Indica il tipo di ancia utilizzata per il chanter (e/o se le ance
        sono sintetiche o in canna).
    scraping_surface_type:
      name: Tipo di superficie di raschiatura
      description: Specifica la struttura/geometria della superficie di raschiamento
        che produce il suono (ad esempio, scanalata, a pettine/denti, ondulata).
    screw_drive_type:
      name: Tipo di azionamento a vite
      description: Specifica il tipo di incavo di azionamento sulla testa della vite
        o del bullone, indicando l'utensile necessario per serrarlo o rimuoverlo (ad
        esempio, esagonale/Allen, Torx).
    screw_thread_size:
      name: Taglia del thread della vite
      description: Specifica lo standard di misura della filettatura delle viti incluse
        o compatibili (ad esempio, M4, M5, M6).
    sculpting_clay_base_type:
      name: Tipo di base dell'argilla modellabile
      description: Descrive la formulazione/base di base dell'argilla da modellare.
    seafood_cut:
      name: Taglio dei frutti di mare
      description: Descrive il taglio fisico o la presentazione del prodotto ittico
        (ad esempio, intero, filetto, bistecca).
    seafood_processing_method:
      name: Metodo di lavorazione del pesce
      description: Specifica la principale tecnica di conservazione o lavorazione
        applicata ai prodotti ittici, come ad esempio affumicatura, salatura o liofilizzazione.
    seafood_source:
      name: Fonte dei frutti di mare
      description: Indica se i prodotti ittici sono pescati in natura, allevati, di
        origine vegetale o provenienti da un'altra fonte, aiutando l'acquirente a
        valutare la sostenibilità e la qualità.
    seal_material:
      name: Materiale della tenuta
      description: Materiale utilizzato per le guarnizioni o le tenute all'altezza
        del collo, dei polsi e delle caviglie che mantengono la muta impermeabile.
    seal_type:
      name: Tipo di tenuta
      description: Specifica il metodo di tenuta utilizzato dal raccordo per prevenire
        perdite di liquido refrigerante.
    sealant_formulation:
      name: Formulazione del sigillante
      description: Indica la formulazione chimica principale o la tecnologia degli
        additivi del sigillante per pneumatici da bicicletta (ad esempio, a base di
        lattice, rinforzato con fibre, acrilico).
    seals_leak_type:
      name: Tipo di perdita delle guarnizioni
      description: Tipo/sezione della perdita del sistema di raffreddamento che il
        prodotto è destinato a sigillare.
    seam_construction:
      name: Realizzazione della cucitura
      description: Descrive come viene creata la cucitura della palla, influenzandone
        l'oscillazione, la durata e l'utilizzo.
    seam_design:
      name: Design della cucitura
      description: Specifica la struttura della cucitura o le caratteristiche decorative
        della cucitura della calza.
    seam_gauge_scale_type:
      name: Tipo di scala di misurazione della cucitura
      description: Indica quali scale/marcature sono presenti sul calibro per cuciture
        oltre alla scala base del righello.
    seam_gauge_slider_material:
      name: Materiale del cursore del calibro per cuciture
      description: Indica il materiale del cursore/puntatore regolabile, se presente.
    seam_ripper_tip_style:
      name: Stile della punta per taglia-cuciture
      description: Descrive il design funzionale della punta, che si infila sotto
        le cuciture e taglia i fili in sicurezza.
    seam_sealing_type:
      name: Tipo di sigillatura delle cuciture
      description: Descrive il metodo utilizzato per impedire l'ingresso dell'acqua
        nelle cuciture della tuta antipioggia (ad esempio, completamente nastrate,
        saldate).
    seam_type:
      name: Tipo di cucitura
      description: Descrive lo stile di cucitura della palla da baseball, che influisce
        sulla presa, sull'aerodinamica e sul livello di gioco previsto.
    season_condition_protection:
      name: Protezione stagione/condizione
      description: Indica la principale condizione meteorologica/difficoltà che il
        copriparabrezza può proteggere.
    season_rating:
      name: Classificazione stagionale
      description: Specifica la classificazione stagionale della tenda, indicandone
        l'idoneità a diverse condizioni meteorologiche (ad esempio, 3 stagioni, 4
        stagioni, 5 stagioni/expedition).
    seasoning_variety:
      name: Varietà del condimento
      description: Classifica il condimento in base al metodo di preparazione o all'uso
        culinario tradizionale.
    seat_adjustment_power_type:
      name: Tipo di regolazione elettrica del sedile
      description: Specifica come vengono azionati i meccanismi di regolazione del
        sedile (leve manuali o motori elettrici), che potrebbe influire sul cablaggio
        e sulla compatibilità.
    seat_belt_attachment_type:
      name: Tipo di attacco della cintura di sicurezza
      description: Specifica come la fibbia si fissa al veicolo/alla struttura della
        cintura.
    seat_belt_buckle_electrical_connector_type:
      name: Tipo di connettore elettrico della fibbia della cintura di sicurezza
      description: Specifica il connettore/l'interfaccia utilizzato per il cablaggio
        dell'interruttore della fibbia/pretensionatore, ove applicabile.
    seat_belt_buckle_mounting_type:
      name: Tipo di montaggio della fibbia della cintura di sicurezza
      description: Descrive come la fibbia/l'aggancio si fissa al veicolo, al sedile
        o al supporto della cintura (ad esempio, con bulloni o clip).
    seat_belt_buckle_release_button_color:
      name: Colore del pulsante di rilascio della fibbia della cintura di sicurezza
      description: Specifica il colore del pulsante di sgancio della fibbia.
    seat_belt_cover_placement:
      name: Posizionamento della copertura della cintura di sicurezza
      description: Specifica dove sulla cintura di sicurezza è destinato a essere
        utilizzato il coperchio.
    seat_belt_integration:
      name: Integrazione della cintura di sicurezza
      description: Specifica se il sedile include una cintura di sicurezza integrata
        e/o un aggancio per la fibbia, oppure se è necessario rimuovere l'aggancio
        per la fibbia originale del veicolo per l'installazione.
    seat_belt_provision:
      name: Predisposizione delle cinture di sicurezza
      description: Indica se le cinture di sicurezza e/o i relativi componenti (ad
        esempio, le fibbie) sono inclusi nel montaggio del sedile posteriore o devono
        essere rimossi dal sedile originale.
    seat_belt_strap_installation_location:
      name: Sede di installazione della cintura di sicurezza
      description: Indica il punto in cui la cintura è installata all'interno del
        sistema di cinture.
    seat_cover_placement:
      name: Posizionamento del coprisedile
      description: Indica per quale posizione di seduta è destinata la copertura sul
        veicolo.
    seat_cover_securement_method:
      name: Metodo di fissaggio del coprisedile
      description: Indica il metodo principale con cui il rivestimento del sedile
        viene fissato al sedile. Se si utilizzano più metodi, selezionare quello principale/primario.
    seat_cover_set_contents:
      name: Contenuto del set di coprisedili
      description: Descrive quali componenti sono inclusi nella confezione (ad esempio,
        solo la parte inferiore del sedile o sedile completo + poggiatesta).
    seat_fabric:
      name: Tessuto del sedile
      description: Tessuto principale utilizzato per l'imbottitura della seduta e
        dello schienale della sedia.
    seat_height_category:
      name: Categoria di altezza della seduta
      description: Classifica gli sgabelli in base all'altezza tipica della seduta
        (ad esempio, altezza da bancone o da bar) per semplificarne la selezione.
    seat_material:
      name: Materiale della seduta
      description: Identifica il materiale principale della superficie di seduta della
        panchina.
    seat_mounting_type:
      name: Tipo di montaggio del sedile
      description: Configurazione di montaggio/traccia utilizzata per fissare il sedile
        al pianale del veicolo.
    seating_surface_material:
      name: Materiale della superficie del sedile
      description: Specifica il materiale della zona su cui una persona si sdraia
        (ad esempio, rete Textilene, tessuto a rete, vimini, rivestimento imbottito).
    seatpost_clamp_mechanism:
      name: Meccanismo di fissaggio del reggisella
      description: Tipo di sistema di bloccaggio/chiusura che fissa il reggisella.
    section_orientation_compatibility:
      name: Compatibilità dell'orientamento della sezione
      description: Indica se l'accessorio è adatto a una sezione con orientamento
        a sinistra, a destra o universale.
    sectional_configuration:
      name: Configurazione componibile
      description: Definisce il modulo specifico o l'orientamento dell'unità componibile
        (ad esempio, angolo, estremità bracciolo sinistro, chaise longue) in modo
        che l'acquirente possa assemblare la configurazione desiderata.
    sectional_shape:
      name: Forma componibile
      description: Definisce la configurazione geometrica/layout complessiva del divano
        componibile.
    secured_components:
      name: Componenti di sicurezza
      description: Elenca le parti specifiche della bicicletta protette dal perno
        di bloccaggio o dai dadi di sicurezza (ad esempio, ruota anteriore, ruota
        posteriore, reggisella).
    seed_content:
      name: Presenza di semi
      description: Indica se l'agrume è senza semi, ha pochi semi o è completamente
        ricco di semi.
    seed_size_classification:
      name: Classificazione della taglia del seme
      description: Indica la quantità relativa di semi non commestibili all'interno
        del litchi, che influisce sulla quantità di polpa commestibile.
    self_adhesive_backing_format:
      name: Formato del supporto autoadesivo
      description: Formato fisico dell'adesivo fornito con il supporto dello stoppino
        (cuscinetto pre-applicato o fogli adesivi separati, ecc.).
    self_adhesive_hook_loop_backing_type:
      name: Tipo di supporto del velcro autoadesivo
      description: Specifica la struttura del supporto/liner e il sistema adesivo
        utilizzato sul lato autoadesivo.
    self_adhesive_hook_loop_fastener_shape:
      name: Shape del dispositivo di fissaggio autoadesivo con gancio e cappio
      description: Specifica il taglio/la forma dei pezzi dell'elemento di fissaggio
        forniti.
    self_hardening_clay_finish:
      name: Finitura dell'argilla autoindurente
      description: Descrive l'aspetto/lucentezza della superficie una volta completamente
        indurita (utile per scegliere tra finitura opaca naturale, satinata, ecc.).
    self_hardening_clay_water_resistance_after_curing:
      name: Argilla autoindurente resistente all'acqua dopo la stagionatura
      description: Indica resistenza all'esposizione all'acqua una volta completamente
        indurita (senza sigillante aggiuntivo).
    sensor_functions:
      name: Funzioni del sensore
      description: Indica quale parametro ciclistico viene misurato dal sensore.
    sensor_measurement_mode:
      name: Modalità di misurazione del sensore
      description: Indica quali parametri il sensore è in grado di rilevare (ad esempio,
        solo cadenza, solo velocità, velocità e cadenza combinate).
    sensor_mounting_position:
      name: Posizione di montaggio del sensore
      description: Specifica la posizione sulla bicicletta o sul ciclista in cui è
        installato il sensore, ad esempio sulla pedivella, sul mozzo della ruota o
        sulla scarpa. Ciò influisce sulla compatibilità con diverse configurazioni
        di biciclette.
    sensor_mounting_type:
      name: Tipo di montaggio del sensore
      description: Specifica come il sensore MAP si monta sul collettore di aspirazione/motore
        (ad esempio, flangia imbullonata o passacavo a innesto).
    sensor_or_gauge_mounting_location:
      name: Sede di montaggio del sensore o dell'indicatore
      description: Specifica la posizione in cui il sensore o l'indicatore deve essere
        installato sul veicolo (a livello di sistema/sedile, non a sinistra/destra).
    sensory_modality:
      name: Modalità sensoriale
      description: Esperienza sensoriale primaria che il giocattolo può offrire (può
        essere multisensoriale).
    sensory_toy_fidget_mechanism:
      name: Meccanismo antistress del giocattolo sensoriale
      description: Interazione/meccanismo primario utilizzato per l'irrequietezza
        e l'autoregolazione.
    sensory_toy_light_features:
      name: Caratteristiche luminose del giocattolo sensoriale
      description: Effetti/comportamenti luminosi forniti dal giocattolo.
    sensory_toy_texture_type:
      name: Tipo di consistenza del giocattolo sensoriale
      description: Elementi predominanti della superficie, relativi alla sensazione
        tattile e alla consistenza, utilizzati per la stimolazione tattile.
    sequin_application_method:
      name: Metodo di applicazione del paillette
      description: Modalità di applicazione/utilizzo prevista per le paillettes (cucitura,
        incollaggio, termofissaggio, ecc.).
    sequin_finish:
      name: Finitura delle paillettes
      description: Descrive la finitura superficiale/visiva e l'effetto riflettente
        delle paillettes utilizzate sulla toppa (ad esempio, opaca, metallizzata,
        olografica), non il supporto della toppa o il metodo di fissaggio.
    serger_stitch_functions:
      name: Funzioni di cucitura della tagliacuci
      description: Funzioni di cucitura supportate dalla tagliacuci (varianti di overlock/overedge
        e punti speciali della tagliacuci).
    serger_thread_count:
      name: Numero di fili della tagliacuci
      description: Numero di fili che la tagliacuci può utilizzare per cucire (ad
        esempio, 2/3/4/5).
    service_interval:
      name: Intervallo di servizio
      description: Tempo massimo raccomandato tra le ispezioni/manutenzioni richieste
        da un'officina autorizzata.
    serving_temperature:
      name: Temperatura di servizio
      description: Indica la temperatura di servizio o lo stato previsto del prodotto
        al momento del consumo.
    sesame_seed_hull_status:
      name: Stato del guscio del seme di sesamo
      description: Specifica se la tahina è prodotta con semi di sesamo decorticati
        o non decorticati, il che influisce su colore, sapore e valore nutrizionale.
    sesame_seed_roast_level:
      name: Livello di tostatura dei semi di sesamo
      description: Indica il grado di tostatura dei semi di sesamo prima della macinazione,
        aiutando l'acquirente a scegliere l'intensità di sapore preferita.
    sesame_seed_variety:
      name: Varietà di semi di sesamo
      description: Indica il colore o la varietà dei semi di sesamo utilizzati per
        produrre l'olio.
    set_classification:
      name: Classificazione del set
      description: Definisce il livello o lo stile di gioco previsto per il set da
        croquet (ad esempio, torneo, ricreativo, da viaggio).
    set_components:
      name: Componenti del set
      description: Indica quali articoli sono inclusi con il prodotto (ad esempio,
        solo il bastoncino centrale o il set completo).
    set_items_included:
      name: Articoli del set inclusi
      description: Specifica gli indumenti o gli accessori inclusi nel set, come il
        tessuto del sari, il dupatta o la cintura.
    setup_mechanism:
      name: Meccanismo di configurazione
      description: Descrive il metodo principale di installazione della tenda (ad
        esempio, tenda pop-up, tenda gonfiabile/ad aria, tenda a conchiglia da tetto).
    setup_type:
      name: Tipo di configurazione
      description: Come si assembla o utilizza la tenda/tunnel da gioco.
    sew_in_interfacing_elasticity:
      name: Elasticità del rinforzo da cucire
      description: Indica se il rinforzo da cucire è elastico e, in tal caso, in quale/i
        direzione/i, per adattarsi a progetti a maglia o a trama.
    sew_in_label_placement:
      name: Posizionamento dell'etichetta da cucire
      description: Indica il posizionamento previsto sull'articolo finito.
    sew_on_edge_finish:
      name: Finitura del bordo da cucire
      description: Indica se i bordi in velcro sono grezzi/tagliati o rifiniti per
        resistere allo sfilacciamento.
    sew_on_rhinestone_hole_orientation:
      name: Orientamento del foro dello strass da cucire
      description: Disposizione/orientamento dei fori rispetto alla pietra (ad esempio,
        affiancati, opposti, incrociati) per facilitare diversi stili di cucitura.
    sewing_kit_components_included:
      name: Componenti del kit da cucito inclusi
      description: Elenca gli accessori/strumenti per il cucito inclusi in un kit
        da cucito, in modo che l'acquirente possa confrontare il contenuto di ciascun
        kit.
    sewing_machine_bobbin_class:
      name: Classe rocchetti della macchina da cucire
      description: Specifica la classe/il sistema di rocchetti compatibile con la
        macchina da cucire per rocchetti e porta-rocchetti.
    sewing_machine_buttonhole_type:
      name: Tipo di asola della macchina da cucire
      description: Metodo di creazione dell'asola supportato dalla macchina.
    sewing_machine_display_type:
      name: Tipo di display della macchina da cucire
      description: Tipo di interfaccia di controllo/display della macchina da cucire.
    sewing_machine_needle_point_type:
      name: Tipo di ago della macchina da cucire
      description: Definisce la geometria della punta/la famiglia di punte dell'ago
        che determina come penetra nei diversi tessuti (ad esempio, punta affilata,
        punta a sfera o punta a cuneo).
    sewing_machine_needle_system:
      name: Sistema aghi per macchina da cucire
      description: Sistema/numero di modello standardizzato dell'ago che determina
        la compatibilità con la macchina (spesso indicato come 130/705 H, HAx1, DBx1,
        15x1, ecc.).
    sewing_machine_needle_type:
      name: Tipo di ago per macchina da cucire
      description: Specifica l'applicazione/lo stile per cui è destinato l'ago (ad
        esempio, universale, a sfera, per jeans/denim), che influisce sulla qualità
        del punto e sull'idoneità del tessuto.
    sewing_machine_shank_type:
      name: Tipo di gambale per macchina da cucire
      description: Specifica lo standard di interfaccia gambo/caviglia del piedino
        per cui il piedino è progettato, garantendo la compatibilità con la macchina
        da cucire (ad esempio, gambo basso, gambo alto, gambo inclinato).
    sewing_pattern_accessory_type:
      name: Tipo di accessorio del cartamodello
      description: Specifica quale accessorio si può realizzare con il cartamodello.
    sewing_pattern_notions_required:
      name: Accessori necessari per il cartamodello
      description: Elenca i materiali/strumenti aggiuntivi necessari per completare
        il progetto (oltre al tessuto e al filo).
    sewing_pattern_recommended_fabric:
      name: Tessuto consigliato per il cartamodello
      description: Elenca i tipi/le grammature di tessuto consigliati per il cartamodello
        (come indicato dalla stilista).
    sewing_pattern_size_range:
      name: Intervallo di taglie del cartamodello
      description: Specifica l'intervallo di taglie previsto per il modello (ad esempio,
        da neonato ad adulto, taglie comode).
    sewing_thread_size_system:
      name: Sistema di titolazione del filo da cucito
      description: Indica lo standard usato per esprimere la dimensione/titolo del
        filo (es. Tex, Denier, Ticket, numero di titolo, misura V).
    shaft_curvature:
      name: Curvatura dell'asta
      description: Descrive le forme generali dell'asta, che influisce su spazio di
        manovra, swing ed ergonomia.
    shaft_kick_point:
      name: Punto di flessione dell'asta
      description: Identifica il punto lungo l'asta in cui si flette maggiormente
        durante lo swing, influenzando la traiettoria della pallina.
    shaft_length_type:
      name: Tipo di lunghezza del fusto
      description: Designazione di categoria standard di settore per le dimensioni
        delle aste delle freccette (ad esempio, corte, medie) utilizzata quando non
        vengono fornite misure esatte in millimetri.
    shaft_shape:
      name: Forme dell'asta
      description: Definisce il profilo della sezione trasversale dell'asta del tonfa
        (es. rotonda, quadrata, ottagonale).
    shaker_fill_material:
      name: Materiale di riempimento dello shaker
      description: Specifica il materiale di riempimento interno principale utilizzato
        per creare il suono dello shaker (ove applicabile), come perline, semi o pallini.
    shaker_shell_material:
      name: Materiale del guscio dello shaker
      description: Specifica il materiale principale del corpo/involucro dello shaker
        a forma di uovo (alloggiamento esterno).
    shallot_variety:
      name: Varietà di scalogno
      description: Identifica la specifica cultivar, il tipo di mercato o la varietà
        dello scalogno.
    shank_style:
      name: Stile delle branche
      description: Descrive la forma/configurazione generale delle branche del morso
        a leva (ad esempio, dritte, curve, radenti).
    shapewear_enhancement_feature:
      name: Funzione di miglioramento dell'intimo modellante
      description: Sottolinea il principale vantaggio funzionale offerto dal capo
        (ad esempio, contenimento dell'addome, effetto push-up sui glutei, fodera
        impermeabile).
    sheath_type:
      name: Tipo di fodero
      description: Tipo di fodero incluso con il coltello da collezione.
    sheet_music_clip_padding_material:
      name: Materiale dell’imbottitura del fermapagine per spartiti
      description: Materiale dell'eventuale imbottitura delle ganasce/impugnature
        a contatto con la carta o con il bordo del leggio, per evitare strappi e scivolamenti.
    sheet_music_clip_spring_tension_level:
      name: Livello di tensione della molla del fermapagine per spartiti
      description: Forza relativa/di serraggio della molla del fermapagine.
    sheet_music_clip_use_environment:
      name: Ambiente di utilizzo del fermapagine per spartiti
      description: Principali configurazioni di utilizzo in cui il fermapagine può
        offrire le migliori prestazioni.
    shell_construction:
      name: Struttura della cassa
      description: Specifica come è costruita la cassa del grancassa, un fattore che
        influisce in modo significativo su timbro e peso.
    shell_finish:
      name: Finitura del corpo
      description: Trattamento di finitura esterno del corpo del doumbek.
    shell_hull_status:
      name: Stato del guscio/buccia
      description: Specifica se noci o semi sono venduti con guscio o buccia intatti
        oppure rimossi
    shift_boot_attachment_method:
      name: Metodo di collegamento del soffietto del cambio
      description: Specifica il modo in cui il soffietto del cambio si fissa alla
        console del veicolo o alla cornice del pomello (es. incastro a clip nella
        cornice, anello di ritenzione, adesivo).
    shift_boot_installation_hardware_included:
      name: Elementi di installazione del soffietto del cambio inclusi
      description: Elenca gli elementi e i componenti di installazione inclusi con
        il soffietto del cambio.
    shift_knob_illumination:
      name: Illuminazione del pomello del cambio
      description: Specifica se il pomello del cambio è dotato di illuminazione e
        il metodo/tipo di illuminazione (ad esempio, fotoluminescente, LED, fibra
        ottica, retroilluminazione a motivi).
    shift_knob_installation_method:
      name: Metodo di installazione del pomello del cambio
      description: Specifica come il pomello del cambio si fissa alla leva del cambio.
    shift_knob_shape:
      name: Forma del pomello del cambio
      description: Descrive il fattore di forma ergonomico complessivo del pomello
        del cambio.
    shift_pattern_type:
      name: Tipo di incisione del cambio
      description: Specifica lo stile di marcatura delle marce sul pomello del cambio
        (se presente).
    shifter_compatibility:
      name: Compatibilità del cambio
      description: Indica se l'estensione del manubrio è compatibile con i cambi elettronici,
        meccanici, entrambi, oppure non è compatibile con i cambi.
    shifter_mounting_interface:
      name: Interfaccia di montaggio del cambio
      description: Descrive come il cambio si fissa alla bicicletta (ad esempio, collarino
        separato, I-Spec, MatchMaker, terminale del manubrio, tubo obliquo, senza
        cavi).
    shifting_actuation_type:
      name: Tipo di attivazione del cambio
      description: Identifica il meccanismo utilizzato per cambiare marcia nel gruppo
        (meccanico, elettronico con cavo, elettronico senza fili, idraulico).
    shifting_mechanism:
      name: Meccanismo del cambio
      description: Indica se il cambio funziona meccanicamente o elettronicamente
        e se è indicizzato o a frizione.
    shim_purpose:
      name: Scopo dello spessore
      description: Definisce la tipologia funzionale del prodotto (ad esempio, spessore,
        cuneo, distanziale) in modo che i ciclisti possano trovare rapidamente la
        soluzione di regolazione più adatta senza bisogno di sottocategorie separate.
    shin_guard_attachment_method:
      name: Metodo di fissaggio del parastinchi
      description: Classifica il formato generale del parastinchi, inclusa l'integrazione
        con la protezione per la caviglia o la struttura a calza.
    shirt_cuff_style:
      name: Stile del polsino della camicia
      description: Identifica la struttura del polsino della manica, che influisce
        sul grado di formalità, sull'abbinamento con i gemelli e sul comfort.
    shochu_base_ingredient:
      name: Ingrediente base dello shochu
      description: Identifica la principale fonte di amido o zucchero utilizzata per
        produrre lo shochu.
    shochu_soju_variety:
      name: Varietà di shochu e soju
      description: Classifica il prodotto in base al suo stile riconosciuto o al tipo
        di produzione.
    shock_absorber_bushing_material:
      name: Materiale delle boccole degli ammortizzatori
      description: Materiale delle boccole/isolatori di montaggio forniti insieme
        all'ammortizzatore o integrati nello stesso.
    shock_absorber_charge_type:
      name: Tipo di carica dell'ammortizzatore
      description: Specifica la tecnologia di carica/smorzamento dell'ammortizzatore
        (es. idraulica/olio, a gas, ad aria) e/o l'eventuale configurazione del tubo,
        se applicabile.
    shock_absorber_mount_type_lower:
      name: Tipo di montaggio dell'ammortizzatore (inferiore)
      description: Tipo di interfaccia di montaggio inferiore dell'ammortizzatore
        per un corretto adattamento.
    shock_absorber_mount_type_upper:
      name: Tipo di attacco dell'ammortizzatore (superiore)
      description: Specifica lo stile dell'interfaccia di montaggio superiore di un
        ammortizzatore per autoveicoli ai fini della verifica della compatibilità.
    shock_absorber_position:
      name: Posizione dell'ammortizzatore
      description: Specifica se l'ammortizzatore è destinato alla posizione anteriore,
        posteriore, sinistra o destra del veicolo (più dettagliato rispetto al posizionamento
        solo sull'asse).
    shock_absorption_system:
      name: Sistema di assorbimento degli urti
      description: Definisce il meccanismo utilizzato per ridurre le vibrazioni e
        il rumore in fase di rimbalzo.
    shoe_collar_height:
      name: Altezza del collarino della scarpa
      description: Classifica le scarpe in base all'altezza del collarino (bassa,
        media, alta) per indicare la copertura della caviglia e il supporto.
    shoe_cover_height:
      name: Altezza del copriscarpa
      description: Specifica il livello di copertura del copriscarpe da bicicletta,
        distinguendo i copripunta dai copriscarpe alti integrali.
    shoe_sizing_system:
      name: Sistema di misurazione delle scarpe
      description: Identifica lo standard di misurazione (US, UK, EU, JP, Mondopoint,
        ecc.) utilizzato per il numero di scarpa indicato.
    shoelace_aglet_material:
      name: Materiale del puntale dei lacci delle scarpe
      description: Identifica il materiale utilizzato per le punte (aghetto) alle
        estremità dei lacci delle scarpe, che Influenza la durata e lo stile.
    shooting_rest_design:
      name: Progettazione del supporto per il tiro
      description: Classifica la tipologia strutturale del supporto (es. supporto
        a sacco, slitta, treppiede, morsa per arma, ecc.).
    shooting_stick_yoke_design:
      name: Design del supporto per bastone da tiro
      description: Specifica il tipo di supporto o attacco che si interfaccia con
        l'arma da fuoco o l'ottica.
    shooting_target_style:
      name: Tipo di bersagli da tiro
      description: Classifica lo stile o il design dei bersagli per il pattinaggio
        artistico e il tiro a segno nell'hockey, in modo che i clienti possano selezionare
        l'ambito di allenamento più adatto alle proprie esigenze.
    shooting_target_type:
      name: Tipo di bersaglio per tiro
      description: Classifica i bersagli per il tiro a segno in base allo stile strutturale,
        al materiale o al design (ad esempio, gong, sagoma, bersaglio in carta, spinner),
        consentendo ai tiratori di individuare rapidamente il bersaglio corretto per
        la loro disciplina e il tipo di arma da fuoco.
    short_block_assembly_balance_type:
      name: Tipo di bilanciamento del gruppo short block
      description: Indica se il gruppo rotante è bilanciato internamente o esternamente.
    short_block_intended_use:
      name: Uso previsto dello short block
      description: Caso d'uso principale previsto per lo short block.
    short_block_rotating_assembly_included:
      name: Gruppo rotante dello short block incluso
      description: Specifica quali componenti principali del gruppo rotante sono inclusi
        nello short block.
    shot_size:
      name: Dimensione dei pallini
      description: Specifica la designazione della taglia dei pallini per munizioni
        o cartucce sfuse.
    shotgun_action_type:
      name: Tipo di azione del fucile a pompa
      description: Specifica il meccanismo di funzionamento/l'azione del fucile.
    shotgun_choke_type:
      name: Tipo di strozzatore del fucile
      description: Specifica la configurazione dello strozzatore della canna del fucile.
    shotgun_gauge:
      name: Calibro del fucile
      description: Specifica il calibro della canna del fucile (incluso il foro 0,410
        dove applicabile), per l'identificazione e il filtraggio nelle inserzioni
        di articoli da collezione.
    shotgun_stock_material:
      name: Materiale del calcio del fucile
      description: Specifica il materiale principale del calcio e dell’astina (parti
        esterne).
    shuffleboard_speed_rating:
      name: Valutazione della velocità dello shuffleboard
      description: Indica la velocità di scorrimento relativa che la polvere per shuffleboard
        o altri prodotti per la manutenzione forniscono sul tavolo, consentendo ai
        giocatori di scegliere la velocità appropriata al loro livello di competenza
        e alla lunghezza del tavolo.
    shuffleboard_table_length_compatibility:
      name: Compatibilità della lunghezza del tavolo da shuffleboard
      description: Lunghezza standard del tavolo da shuffleboard a cui il prodotto
        può adattarsi o integrarsi.
    shuttlecock_base_material:
      name: Materiale della base del volano
      description: Indica il materiale utilizzato per la punta/base del volano, che
        influisce su durata, sensazione di utilizzo e rimbalzo.
    shuttlecock_feather_material:
      name: Materiale delle piume del volano
      description: Identifica la principale fonte di piume o il tipo di struttura
        utilizzato per la gonna del volano, influenzando la durata, la consistenza
        e il prezzo.
    shuttlecock_grade:
      name: Grado del volano
      description: Specifica il livello di gioco previsto o la classificazione di
        qualità (ad esempio allenamento, club, competizione).
    shuttlecock_speed_rating:
      name: Valutazione della velocità del volano
      description: Specifica la velocità o la classificazione del volano indicata
        dal produttore, consentendo ai giocatori di selezionare la velocità di volo
        corretta in base alle condizioni di gioco, alla temperatura e all'altitudine.
    side_panel_installation_state:
      name: Stato di installazione del pannello laterale
      description: Specifica se il pannello laterale viene fornito grezzo, con primer,
        verniciato o altrimenti rivestito/preparato per l'installazione.
    side_wall_mechanism:
      name: Meccanismo della sponda laterale
      description: Descrive come si apre o si abbassa la sponda laterale della culla
        per accedere al bambino.
    signal_source:
      name: Sorgente del segnale
      description: Indica come il contachilometri riceve/ricava le informazioni relative
        alla distanza o al tempo.
    silk_fiber_type:
      name: Tipo di fibra di seta
      description: Tipo/origine della fibra di seta utilizzata per realizzare il tessuto
        (ad esempio, gelso o tussah), influendo su texture, uniformità e prezzo.
    simulated_game_species:
      name: Specie di selvaggina simulata
      description: Indica lo specifico uccello o animale da caccia che il manichino
        riproduce per un addestramento realistico.
    singlet_cut_style:
      name: Stile del body da lotta
      description: Specifica il taglio/stile del body da wrestling, tenendo conto
        dell'altezza delle spalline, dello stile della schiena e delle varianti per
        genere/giovani.
    sink_material:
      name: Materiale del lavello
      description: Specifica il materiale dei lavabo integrati inclusi nel mobile
        bagno.
    sinker_attachment_style:
      name: Tipo di attacco del piombo
      description: Descrive il meccanismo presente nel piombo da fondo per il fissaggio
        alla lenza o al terminale da pesca.
    sinker_finish:
      name: Finitura del piombo
      description: Specifica il rivestimento esterno o la variante di superficie del
        piombo.
    sinker_shape:
      name: Shape del piombino
      description: Definisce la forma geometrica del piombo (ad esempio, a proiettile,
        a cilindro, a goccia) in modo che i pescatori possano selezionare la presentazione
        ottimale e la maggiore resistenza agli incagli.
    siren_system_included:
      name: Sistema di sirena incluso
      description: Indica se è installato un sistema di sirena/PA e di che tipo.
    siren_system_type:
      name: Tipo di sistema della sirena
      description: Specifica la configurazione della sirena/PA installata sul veicolo
        della polizia.
    size_designation:
      name: Designazione della taglia
      description: Denominazione standardizzata della misura del triangolo.
    size_system:
      name: sistema di ventilazione
      description: Specifica il sistema di taglie o lo standard regionale a cui corrisponde
        l'etichetta della taglia (es. US, UK, EU, internazionale a lettere).
    sizzle_mechanism:
      name: Meccanismo sizzle
      description: Specifica il modo in cui il piatto produce l’effetto sizzle (es.
        rivetti installati nel piatto, catena/sizzler applicabile, oppure nessun accessorio
        incluso).
    skate_blade_discipline:
      name: Disciplina delle lame da pattinaggio
      description: Identifica la disciplina o l'applicazione di pattinaggio per cui
        la lama è progettata, come l'hockey o il pattinaggio artistico, consentendo
        all'acquirente di filtrare le lame pertinenti.
    skate_brake_type:
      name: Tipo di freno del pattino
      description: Indica il tipo di meccanismo di arresto incluso con i pattini.
    skateboard_nut_thread_size:
      name: Misura del filetto del dado da skateboard
      description: Specifica la misura del filetto (diametro e passo) del dado per
        garantire la compatibilità con assi, perni o bulloneria di montaggio dello
        skateboard.
    skein_winder_bearing_bushing_type:
      name: Tipo di cuscinetto/boccola per avvolgitore di matasse
      description: Specifica il tipo di cuscinetto o boccola utilizzato nel gruppo
        rotante dell'avvolgitore di matasse.
    skein_winder_drive_type:
      name: Tipo di azionamento dell'avvolgitore di matasse
      description: Modalità di azionamento/rotazione dell'avvolgitore di matasse.
    ski_binding_mechanism:
      name: Meccanismo di aggancio sci
      description: Definisce il design meccanico fondamentale o la disciplina dell'attacco
        (ad esempio, alpino, tech/pin, telemark).
    ski_binding_part_type:
      name: Tipo dell'attacco da sci
      description: Consente di identificare il componente o l'accessorio specifico
        per gli attacchi da sci, permettendo un rapido filtraggio tra diverse tipologie
        di ricambi.
    ski_boot_sole_standard:
      name: Standard della suola degli scarponi da sci
      description: Indica l'unica norma o standard di compatibilità degli attacchi
        per cui è certificato lo scarpone da sci.
    skill_focus:
      name: Focus sulla competenza
      description: Identifica la principale abilità cestistica che l'ausilio didattico
        è progettato per sviluppare.
    skimboard_construction:
      name: Costruzione dello skimboard
      description: Descrive la struttura principale della tavola, con particolare
        attenzione al nucleo e alla tecnica di lay-up (es. anima in schiuma, anima
        in legno).
    skin_presence:
      name: Presenza della pelle
      description: Specifica se il pollo viene venduto con la pelle, senza pelle o
        parzialmente senza pelle.
    slapstick_handle_type:
      name: Tipo di impugnatura slapstick
      description: Descrive lo stile dell'impugnatura integrato nello slapstick, che
        influisce sull'ergonomia e sul comfort di utilizzo.
    slapstick_playing_surface_material:
      name: Materiale della superficie dello slapstick
      description: Specifica il materiale degli elementi che, percuotendosi, entrano
        in contatto tra loro per produrre il suono.
    sled_brake_type:
      name: Tipo di freno della slitta
      description: Specifica il meccanismo frenante presente sulla slitta, se presente.
    sled_towing_method:
      name: Metodo di traino della slitta
      description: Indica la modalità principale con cui la slitta viene trainata
        o tirata.
    sleep_position_suitability:
      name: Idoneità della posizione per dormire
      description: Indica le posizioni di riposo per cui il materasso può fornire
        il supporto più efficace.
    sleeping_bag_shape:
      name: Forma del sacco a pelo
      description: Taglio generale del sacco a pelo, che influisce su calore, grammatura
        e spazio interno.
    sleeping_pad_type:
      name: Tipo di materassino da notte
      description: Identifica il tipo di realizzazione del materassino, ad esempio
        in schiuma a celle chiuse o gonfiabile, che influisce direttamente su comfort,
        grammatura e isolamento.
    sleepwear_set_pieces_included:
      name: Pezzi del set di abbigliamento da notte inclusi
      description: Elenca i componenti individuali forniti in un set di pigiami o
        abbigliamento da casa composto da più pezzi.
    sleeve_bearing_type:
      name: Tipo di cuscinetto del manicotto
      description: Identifica la tecnologia che consente la rotazione del manicotto,
        influenzando la qualità della rotazione nei sollevamenti olimpici.
    sleeve_style:
      name: Stile della manica
      description: Specifica lo stile della manica oltre alla lunghezza (ad esempio,
        raglan).
    slide_board_accessories_included:
      name: Accessori della slideboard inclusi
      description: Elenca gli articoli supplementari inclusi nella confezione della
        slideboard in modo che l'acquirente sappia esattamente cosa è incluso e possa
        confrontare i pacchetti.
    slide_installation_type:
      name: Tipo di installazione dello scivolo
      description: Modalità di installazione o montaggio prevista per lo scivolo (indipendente,
        fissato a un'area giochi, ecc.).
    slide_intended_finger:
      name: Dito previsto per lo slide
      description: Indica il dito di utilizzo dello slide, oppure se non previsto
        (es. tone bar).
    slide_safety_features:
      name: Dispositivi di sicurezza dello scivolo
      description: Elementi di design relativi alla sicurezza inclusi nello scivolo.
    slide_type:
      name: Tipo di scivolo
      description: Specifica i tipi di meccanismi a scorrimento in ottone che il prodotto
        è destinato a pulire.
    slide_water_use_capability:
      name: Possibilità di utilizzo dell'acqua con lo scivolo
      description: Se lo scivolo è progettato per essere utilizzato con l'acqua (ad
        esempio, tramite un tubo da giardino) e in che modo.
    slime_putty_kit_components_included:
      name: Componenti del kit per slime e pasta modellabile inclusi
      description: Elenca gli strumenti e gli accessori inclusi con lo slime/la pasta
        modellabile (specialmente per kit/pacchetti).
    sling_material:
      name: Materiale della fascia
      description: Specifica la fibra/il tessuto utilizzato nella fettuccia del rinvio
        (dogbone).
    smith_machine_bar_path:
      name: Traiettoria del bilanciere della Smith machine
      description: Descrive la traiettoria fissa del movimento del bilanciere, fornendo
        agli utenti informazioni sulla biomeccanica e sui requisiti di ingombro.
    smoke_color:
      name: Colore del fumo
      description: Colore del fumo prodotto dal segnale di fiamma/fumo (distinto dal
        colore del corpo del prodotto).
    smoked_malt_smoking_material:
      name: Materiale di affumicatura del malto
      description: Nel caso dei malto affumicato, identifica il materiale utilizzato
        durante l'affumicatura (ad esempio, varietà di legno specifiche o torba).
    snack_mix_variety:
      name: Varietà mix di snack
      description: Classifica il prodotto in base al tipo di mix (ad esempio, mix
        di frutta secca, mix di noci, namkeen, sev).
    snack_processing_method:
      name: Metodo di lavorazione dello snack
      description: Indica la principale tecnica di lavorazione o conservazione utilizzata
        per creare lo snack (ad esempio, liofilizzato, cotto al forno, tostato).
    snack_texture:
      name: Texture dello snack
      description: Indica la consistenza o la sensazione al palato dei bastoncini
        di sesamo.
    snap_installation_method:
      name: Metodo di installazione del bottone automatico
      description: Modalità di installazione/fissaggio del bottone a pressione al
        materiale del progetto.
    snare_drum_bearing_edge_profile:
      name: Profilo del bordo di appoggio del fusto del rullante
      description: Taglio/profilo del bordo di appoggio del fusto del rullante.
    snare_drum_finish_type:
      name: Tipo di finitura del rullante
      description: Struttura/tipologia di finitura utilizzata per il fusto del rullante.
    snare_drum_hoop_type:
      name: Tipo di cerchio del rullante
      description: Tipo di cerchi/anelli utilizzati sul rullante.
    snare_drum_mounting_type:
      name: Tipo di montaggio del rullante
      description: Modalità di montaggio e utilizzo previste per il rullante.
    snare_drum_shell_material:
      name: Materiale del fusto del rullante
      description: Specifica il metallo/lega utilizzato per il fusto del rullante
        (corpo principale), che influisce notevolmente su suono, peso e durata.
    snare_drum_strainer_mechanism:
      name: Meccanismo tenditore del fusto del rullante
      description: Tipo di meccanismo di sgancio/tendine del laccio utilizzato per
        agganciare/sganciare le corde del rullante.
    snare_drum_strainer_type:
      name: Tipo di tenditore del fusto del rullante
      description: Tipo di meccanismo di sgancio/tendina del laccio utilizzato per
        agganciare/sganciare le corde del rullante.
    snare_hoop_type:
      name: Tipo di cerchio del rullante
      description: Tipo di cerchi/bordi del fusto del rullante.
    snare_throw_off_type:
      name: Tipo di lancio del rullante
      description: Tipo di meccanismo di tensionamento/sgancio utilizzato per agganciare/sganciare
        i fili del rullante.
    snip_cutter_spring_mechanism:
      name: Meccanismo a molla del tagliaunghie
      description: Indica se il tagliaunghie utilizza un meccanismo a molla/ritorno
        e il relativo tipo.
    snorkel_mount_position:
      name: Posizione di montaggio del boccaglio
      description: Descrive la posizione del boccaglio sulla testa dell'utente durante
        l'uso.
    snorkel_top_type:
      name: Tipo di sommità del boccaglio
      description: Descrive il tipo di protezione contro l'ingresso dell'acqua presente
        nella parte superiore del boccaglio incluso nel set.
    snow_condition_suitability:
      name: Idoneità in base alle condizioni della neve
      description: Descrive le principali condizioni della neve per cui è pensata
        la cera.
    snow_sports_helmet_safety_certification:
      name: Certificazione di sicurezza del casco per sport invernali
      description: Indica gli standard di sicurezza che il casco soddisfa per l'utilizzo
        nello sci e nello snowboard.
    snowboard_base_material:
      name: Materiale di base snowboard
      description: Identifica la composizione di base o la finitura (gradi estrusi,
        sinterizzati, formule proprietarie) che influisce su velocità, durata e manutenzione.
    snowboard_width_class:
      name: Classe di larghezza snowboard
      description: Classifica la larghezza complessiva della tavola in relazione alla
        taglia dello scarpone (ad esempio, Regular, Wide).
    soccer_ball_compartment_type:
      name: Tipo di scomparto per pallone da calcio
      description: Specifica come (o se) lo zaino può contenere un pallone da calcio.
    soccer_ball_type:
      name: Tipo di pallone da calcio
      description: Specifica l'uso previsto o lo stile del pallone da calcio (ad esempio,
        partita, allenamento, futsal) in modo che l'acquirente possa trovare rapidamente
        la variante giusta senza bisogno di molte sottocategorie.
    soccer_dummy_base_type:
      name: Tipo di base del manichino da calcio
      description: Descrive il tipo di base o meccanismo di ancoraggio utilizzato
        dal manichino.
    soccer_dummy_design:
      name: Design del manichino da calcio
      description: Specifica il tipo di costruzione di un manichino da calcio, ad
        esempio rigido o gonfiabile.
    soccer_goal_target_style:
      name: Stile del bersaglio per porta da calcio
      description: Definisce la forma fisica o il design del bersaglio di allenamento
        in modo che l'acquirente possa scegliere lo stile più adatto ai propri esercizi.
    soccer_goal_type:
      name: Tipo di porta da calcio
      description: Indica lo stile strutturale o l'uso previsto della porta (ad esempio,
        pop-up, rebounder, street).
    sock_cushioning:
      name: Imbottitura della calza
      description: Indica la quantità e il tipo di ammortizzazione o imbottitura interna
        incorporata nella calza.
    sock_cushioning_level:
      name: Livello di imbottitura della calza
      description: Specifica la quantità di imbottitura integrata nella calza.
    sock_grip_type:
      name: Tipo di trazione della calza
      description: Descrive eventuali caratteristiche di trazione o antiscivolo applicate
        alla suola del calzino.
    sock_toe_style:
      name: Stile della punta della calza
      description: Descrive lo stile di costruzione della punta della calza
    soft_bait_style:
      name: Stile di esca morbida
      description: Classifica il design o il profilo del corpo dell'esca morbida in
        plastica (ad esempio, verme, swimbait, larva).
    soft_top_attachment_type:
      name: Tipo di fissaggio della capote morbida
      description: Indica come la capote si fissa al veicolo (incastro, bottoni a
        pressione, velcro, ecc.).
    soft_top_includes_frame_hardware:
      name: La capote morbida include telaio/componenti di fissaggio
      description: Indica se il prodotto include la capote, il telaio/gli archi e/o
        gli elementi di fissaggio.
    soft_top_installation_type:
      name: Tipo di installazione della capote morbida
      description: Specifica come viene installata/fissata la capote del veicolo,
        indicando il metodo di installazione previsto e l'impegno richiesto.
    soft_top_window_configuration:
      name: Configurazione dei finestrini della capote morbida
      description: Indica il numero di finestrini presenti sulla capote e le relative
        posizioni.
    softball_certification:
      name: Certificazione softball
      description: Elenca i timbri o le approvazioni dell'organo di governo stampati
        sul pallone che ne determinano l'idoneità al campionato/partita.
    softness_level:
      name: Livello di morbidezza
      description: Indica quanto è morbido/ribassato il lato ad anello, un fattore
        rilevante per il comfort a contatto con la pelle e per un'applicazione poco
        ingombrante.
    solar_system_model_included_bodies:
      name: Il modello del sistema solare includeva i corpi
      description: Indica quali corpi celesti sono rappresentati nel set.
    solar_system_model_scaling:
      name: Scala del modello del sistema solare
      description: Indica se il modello del sistema solare è in scala per le dimensioni
        dei pianeti, le distanze/orbite, entrambi, oppure è una rappresentazione schematica/non
        in scala.
    sold_secure_certification_level:
      name: Livello di certificazione Sold Secure
      description: Indica la classificazione Sold Secure assegnata alla serratura
        dall'ente di certificazione indipendente del Regno Unito (Bronze, Silver,
        Gold, Diamond).
    sold_secure_rating:
      name: Classificazione Sold Secure
      description: Indica il livello di certificazione Sold Secure assegnato alla
        serratura.
    sole_construction:
      name: Costruzione della suola
      description: Indica come è realizzata la suola della scarpa (intera, divisa,
        in due pezzi, ecc.), influenzando direttamente la flessibilità, il contatto
        con il pavimento e l'idoneità per specifiche tecniche di danza.
    sole_type:
      name: Tipo di suola
      description: Descrive lo stile strutturale della suola, indicandone la flessibilità
        e l'utilizzo previsto.
    soprano_saxophone_body_style:
      name: Tipo di corpo del sassofono soprano
      description: Descrive la configurazione fisica del corpo del sassofono soprano.
    soprano_saxophone_mouthpiece_baffle_type:
      name: Tipo di deflettore del bocchino del sassofono soprano
      description: Descrive il design del deflettore/tetto del bocchino (la sagoma
        dietro la punta), che influisce su brillantezza, proiezione e risposta.
    soprano_saxophone_mouthpiece_chamber_size:
      name: Taglia della camera del bocchino del sassofono soprano
      description: Descrive la dimensione della camera interna del bocchino per sassofono
        soprano, che influisce su resistenza e colore timbrico.
    soprano_saxophone_mouthpiece_finish:
      name: Finitura del bocchino del sassofono soprano
      description: Finitura/placcatura superficiale applicata al bocchino (se presente).
    soprano_saxophone_mouthpiece_included_accessories:
      name: Bocchino del sassofono soprano con accessori inclusi
      description: Indica quali accessori sono inclusi con il bocchino.
    soprano_saxophone_mouthpiece_tonal_character:
      name: Carattere timbrico del bocchino del sassofono soprano
      description: Profilo sonoro di alto livello comunemente associato al design
        del bocchino.
    sound_character:
      name: Carattere sonoro
      description: Descrive il timbro generale prodotto dallo slapstick.
    sound_expansion_method:
      name: Metodo di espansione del suono
      description: Specifica come i moduli possono aggiungere o espandere la libreria
        di suoni interna oltre ai suoni predefiniti (ad esempio, pacchetti di contenuti,
        importazione di campioni, schede di espansione).
    sound_module_sound_library_focus:
      name: Focalizzazione sulla libreria di suoni del modulo sonoro
      description: L'obiettivo principale del set di suoni di fabbrica è aiutare l'acquirente
        a trovare i moduli giusti per il proprio stile/caso di utilizzo.
    sound_port_type:
      name: Tipo di porta audio
      description: Descrive il design del foro/porta sonora sul retro del cajón che
        influenza la proiezione del suono e la risposta alle basse frequenze.
    sound_sensitivity_control:
      name: Controllo della sensibilità del suono
      description: Indica se e come è possibile regolare la sensibilità del suono.
    sound_synthesizer_patch_memory:
      name: Memoria patch del sintetizzatore sonoro
      description: Indica se il sintetizzatore può memorizzare e richiamare preset
        (patch).
    sound_type:
      name: Tipo di suono
      description: Tipi principali di suoni o output audio prodotti dal tappetino
        (ad esempio, strumenti, canzoni, messaggi vocali) per guidare il gioco.
    soundboard_material:
      name: Materiale per la tavola armonica
      description: Materiale utilizzato per la tavola armonica (parte superiore) dell'arpa
        che determina la risonanza e il timbro sonoro.
    soup_or_broth_variety:
      name: Varietà di zuppa o brodo
      description: Specifica lo stile, la ricetta o la preparazione culinaria della
        zuppa o del brodo, in modo che l'acquirente possa individuare rapidamente
        il tipo preferito.
    sour_cream_variety:
      name: Varietà di panna acida
      description: Classifica i prodotti a base di panna acida in base alla loro specifica
        varietà o stile culturale, come la crème fraîche o la crema messicana.
    soy_sauce_variety:
      name: Varietà di salsa di soia
      description: Identifica lo stile o la formulazione specifica della salsa di
        soia (ad esempio, chiara, scura, tamari, ponzu), consentendo all'acquirente
        di filtrare rapidamente in base al profilo aromatico e all'uso culinario.
    spark_plug_electrode_material:
      name: Materiale dell'elettrodo della candela di accensione
      description: Materiale/tecnologia della punta dell'elettrodo (centrale e/o di
        massa) della candela di accensione, come commercializzata (ad esempio, rame,
        platino, iridio).
    spark_plug_seat_type:
      name: Tipo di sede della candela di accensione
      description: Tipo di tenuta/sede utilizzata dalla candela di accensione nell'interfaccia
        con la testata del cilindro.
    spark_plug_terminal_type:
      name: Tipo di terminale della candela Spark
      description: Il terminale superiore viene utilizzato per collegare il cavo/cappuccio
        di accensione.
    sparkler_shape:
      name: Forma stellina scintillante
      description: Forma/design originale complessivo della stellina scintillante.
    speaker_cone_material:
      name: Materiale del cono dell'altoparlante
      description: Materiale principale del cono dell'altoparlante (cono del woofer/midrange).
    speaker_size:
      name: Taglia dell'altoparlante
      description: Dimensioni nominali del driver/dimensioni di montaggio per l'altoparlante
        (ad esempio, 6,5 pollici, 6x9 pollici), utilizzate per adattarsi alla sedi
        di fabbrica e agli adattatori per altoparlanti.
    special_effects_output_interface:
      name: Interfaccia di uscita per effetti speciali
      description: Specifica l'uscita del connettore/interfaccia utilizzata per controllare
        il dispositivo di effetti speciali.
    special_effects_stand_stability_features:
      name: Caratteristiche di stabilità del supporto per effetti speciali
      description: Specifica le caratteristiche di stabilità e sicurezza integrate,
        progettate per prevenire il ribaltamento o lo scivolamento durante gli eventi.
    specialty_malt_name_type:
      name: Nome/tipo di malto speciale
      description: Identifica lo specifico tipo di malto speciale denominato (spesso
        utilizzato come nome commerciale dello stile).
    specimen_presentation:
      name: Presentazione del campione
      description: Indica come il campione da collezione è preparato o presentato
        (ad esempio, grezzo/non preparato, lucidato, tagliato o montato).
    speed_bag_accessories_included:
      name: Accessori del speed bag inclusi
      description: L'elenco include gli articoli aggiuntivi forniti per il sacco da
        boxe, come guanti, pompe ad aria, girelle, catene o supporti.
    speed_rating:
      name: Valore nominale di velocità
      description: Indica la velocità della superficie di gioco fornita dal panno
        del tavolo da biliardo (ad esempio, lenta, media o rapida).
    speedometer_backlight_type:
      name: Tipo di retroilluminazione del tachimetro
      description: Specifica se e come il tachimetro è retroilluminato per la visibilità
        notturna.
    speedometer_display_type:
      name: Tipo di display del tachimetro
      description: 'Indica la modalità di visualizzazione della velocità sul tachimetro:
        lancetta/quadrante analogico, display numerico digitale o combinazione di
        elementi analogici e digitali.'
    speedometer_unit_of_measure:
      name: Unità di misura del tachimetro
      description: Specifica le unità di velocità visualizzate sul quadrante/display.
    spike_replaceability:
      name: Sostituibilità dei tacchetti
      description: Indica se i tacchetti della scarpa sono sostituibili, fissi o se
        la scarpa è priva di tacchetti.
    spike_shape:
      name: Forma dei tacchetti
      description: Identifica lo stile geometrico della punta del tacchetto, che influisce
        sull'aderenza e sull'idoneità a diverse superfici.
    spike_thread_size:
      name: Taglia della filettatura a punta
      description: Specifica la taglia o lo standard della base della filettatura
        che si avvita nella scarpa (ad esempio, 1/4-20).
    spin_classification:
      name: Classificazione dello spin
      description: Indica il profilo di rotazione per cui è progettato il disco (rotazione
        bassa, media, alta, iper-rotazione).
    spin_profile:
      name: Profilo di spin
      description: Specifica le caratteristiche di rotazione relative che l'albero
        favorisce.
    spin_types_supported:
      name: Tipi di rotazione supportati
      description: Elenca i tipi di rotazione che la macchina può imprimere alle palline,
        in modo che i giocatori possano allenarsi contro diversi stili di tiro.
    spinach_preparation_style:
      name: Stile di preparazione degli spinaci
      description: Descrive la preparazione fisica delle foglie di spinaci o il formato
        del prodotto (ad esempio, foglie intere, tritate, a cubetti).
    spinach_variety:
      name: Varietà di spinaci
      description: Identifica la varietà botanica o commerciale degli spinaci (ad
        esempio, baby, savoy, acquatici, rossi), consentendo all'acquirente di selezionare
        il tipo esatto che desidera.
    spindle_bearing_surface_material:
      name: Materiale della superficie di appoggio del fuso
      description: Materiale della superficie di appoggio/punta utilizzata nei fusi
        di supporto (punta/base), che influisce sulla scorrevolezza e sull'usura.
    spindle_bearing_type:
      name: Tipo di cuscinetto del mandrino
      description: Tipo di punta del fuso/interfaccia del cuscinetto che riduce l'attrito
        contro la coppa di supporto.
    spindle_finish:
      name: Finitura del fuso
      description: Finitura/rivestimento superficiale del fuso e influisce sulla sensazione
        di utilizzo, sulla durata e sull'estetica.
    spindle_hook_type:
      name: Tipo di gancio del fuso
      description: Il meccanismo ferma-filo nella parte superiore del fuso utilizzato
        per fissare il filo.
    spindle_support_method:
      name: Metodo di automazione del fuso
      description: Modalità di supporto del fuso durante la filatura.
    spindle_tip_style:
      name: Stile della punta del fuso
      description: Forma/design della punta che si appoggia nella coppa (superficie
        di appoggio), che influisce sull’attrito e sulla fluidità della rotazione.
    spindle_whorl_position:
      name: Posizione del rocchetto del mandrino
      description: Punto in cui la puleggia si innesta sull'albero del fuso.
    spinner_blade_shape:
      name: Forma paletta dello spinner
      description: Identifica la forma principale della paletta utilizzata nello spinner,
        che influisce su vibrazione, riflessi e profondità di utilizzo.
    spinner_control_card_design_type:
      name: Progettazione/tipo della scheda di controllo dello spinner
      description: Descrive la tipologia di scheda di controllo dello spinner in termini
        di come presenta le informazioni di controllo (ad esempio, riferimento di
        rapporto, riferimento di tensione, tabella di conversione).
    spinner_subtype:
      name: Sottotipo di spinner
      description: Classifica il design o la famiglia generale della rotellina (ad
        esempio, spinner in linea, spinnerbait).
    spinning_oil_application_area:
      name: Area di applicazione dell'olio di filatura
      description: Specifica i punti di applicazione previsti sulla ruota di filatura
        per l'olio.
    spinning_oil_application_tool:
      name: Strumento di applicazione dell'olio da spinning
      description: Indica il tipo di applicatore/punta utilizzato per applicare l'olio
        alle parti della ruota di filatura per un dosaggio controllato.
    spinning_oil_features:
      name: Caratteristiche dell'olio di filatura
      description: Evidenzia le proprietà funzionali rilevanti per gli oli per filatoi
        (residui, macchie, ossidazione e lavabilità).
    spinning_top_features:
      name: Caratteristiche della trottola
      description: Funzionalità di gioco speciali incluse nella trottola oltre alla
        rotazione di base.
    spinning_top_launch_mechanism:
      name: Meccanismo di lancio della trottola
      description: Come si avvia/mette in moto la trottola.
    spinning_wheel_brake_tension_system_type:
      name: Tipo di sistema di freno/tensione dell’arcolaio
      description: Specifica il sistema di frenatura/avvolgimento utilizzato per controllare
        la raccolta del filo.
    spinning_wheel_drive_system:
      name: Sistema di trasmissione del filatoio
      description: Indica il sistema di azionamento per cui è destinato il rocchetto.
    spinning_wheel_hook_system:
      name: Sistema di gancio per ruota di filatura
      description: Specifica come il filo viene guidato lungo i bracci del volantino.
    spinning_wheel_part_application:
      name: Applicazione della ruota di filatura
      description: Specifica per quali componenti della ruota di filatura è destinato
        l'olio.
    spinning_wheel_portability_foldability:
      name: Portabilità/ripiegabilità della ruota di filatura
      description: Indica se la ruota è progettata per essere piegata/compressa per
        il trasporto.
    spinning_wheel_tension_adjustment_type:
      name: Tipo di regolazione della tensione della ruota di filatura
      description: Come viene regolata la tensione sulla ruota per il controllo dell'avvolgimento.
    splice_termination_type:
      name: Tipo di impiombatura/terminale
      description: Specifica il tipo di terminale fornito sull’estremità della cima
        di ancoraggio (ad es. asola impiombata, redancia, gancio per catena).
    split_shot_cut_type:
      name: Tipo di taglio del piombo spaccato
      description: Specifica la scanalatura o il tipo di apertura che consente il
        fissaggio alla lenza.
    split_shot_shape:
      name: Forma Split shot
      description: Descrive la forma fisica del piombo spaccato, che influenza l’idrodinamica
        e la resistenza agli incagli.
    split_shot_size:
      name: Dimensione del piombo spaccato
      description: Codice alfanumerico standardizzato (ad es. SSG, AAA, BB, 1) utilizzato
        da produttori e pescatori per classificare i piombi spaccati. Integra le misurazioni
        precise del peso.
    spoiler_adjustability:
      name: Regolabilità dello spoiler
      description: Indica se l'angolo/altezza dello spoiler è regolabile.
    spoke_accessory_function:
      name: Funzione degli accessori sui raggi
      description: Classifica le funzioni principali dell'accessorio sulla ruota,
        come ad esempio decorativa, riflettente o illuminata.
    spoke_butting_profile:
      name: Profilo di rastremazione dei raggi
      description: Descrive come il diametro dei raggi varia lungo la loro lunghezza
        (liscio, a spessore singolo, doppio, triplo o quadruplo), influenzando peso
        e resistenza.
    spoke_gauge:
      name: Calibro dei raggi
      description: Specifica il calibro (spessore del filo) dei raggi con cui il nipplo
        è compatibile.
    spoke_interface_type:
      name: Tipo di interfaccia spoke
      description: Indica il tipo di testa del raggio per cui è progettato il mozzo
        (a J, a trazione dritta, a T).
    spoke_shape:
      name: Forma dei raggi
      description: Specifica la sezione trasversale esterna del filo del raggio, che
        influenza l'aerodinamica e l'estetica.
    spool_form_factor:
      name: Fattore di forma della bobina
      description: Lo stile fisico del corpo della bobina e il modo in cui il filo/filato
        viene trattenuto (ad esempio, flangiato o conico).
    spoon_style:
      name: Stile del cucchiaio
      description: Indica il sottotipo funzionale o lo stile del cucchiaino, ad esempio
        da lancio, flutter o da traina.
    sports_bra_padding_type:
      name: Tipo di imbottitura interna del reggiseno sportivo
      description: Specifica il tipo di imbottitura interna fornita nel reggiseno
        sportivo.
    sports_cap_style:
      name: Stile del cappellino sportivo
      description: Identifica la struttura/lo stile generale del cappellino (ad esempio,
        berretto da baseball, snapback), indipendentemente dal branding della squadra.
    sports_governing_body_certification:
      name: Certificazione dell'ente sportivo governativo
      description: Indica le certificazioni ufficiali o l'approvazione da parte di
        enti sportivi governativi riconosciuti, che confermano che il prodotto soddisfa
        gli standard di competizione.
    sports_surface_compatibility:
      name: Compatibilità con le superfici sportive
      description: Elenca i tipi di superfici o giochi su cui la vernice può essere
        applicata in sicurezza.
    sports_toy_set_contents:
      name: Contenuto del set di giocattoli sportivi
      description: Indica quali componenti sono inclusi nel set di giocattoli sportivi
        (ad esempio, palla, mazza, rete, bersagli).
    spray_string_cleanup_method:
      name: Metodo di pulizia della schiuma filante spray
      description: Metodo consigliato per rimuovere/pulire i residui di spray.
    spray_string_finish_effect:
      name: Finitura/effetto della schiuma filante spray
      description: Effetto visivo della schiuma filante spruzzata una volta applicata
        (lucentezza/riflettività ed effetti speciali).
    spray_string_formulation_type:
      name: Formulazione della schiuma filante spray
      description: Come si comporta il prodotto durante e dopo l'applicazione a spruzzo
        (ad esempio, lavabile o permanente).
    spray_string_recommended_surface:
      name: Superficie consigliata per la schiuma filante spray
      description: Tipi di superfici su cui è previsto l'uso (e che probabilmente
        si puliranno) della schiuma filante spray.
    spray_string_scent:
      name: Profumo della schiuma filante spray
      description: Profilo della fragranza o dell’odore, se presente, della schiuma
        filante spray.
    spray_string_suitable_age_group:
      name: Fascia d'età adeguata per la schiuma filante spray
      description: Età minima/fascia d'età consigliata per un utilizzo sicuro.
    spread_consistency:
      name: Coerenza della crema
      description: Descrive la consistenza della salsa o della crema spalmabile per
        definire le aspettative in termini di sensazione al palato e modalità d'uso
        (ad esempio, liscia, densa, spumosa).
    spread_variety:
      name: Varietà di confettura
      description: Classifica le tipologie specifiche di confettura di frutta (ad
        esempio, marmellata, gelatina, marmellata con scorze, crema spalmabile) in
        modo che l'acquirente possa distinguere tra diversi stili di preparazione
        e consistenze.
    spreader_bar_type:
      name: Tipo di barra di diffusione
      description: Indica il tipo di barra divaricatrice o sistema di ganci fornito
        o compatibile con l'imbracatura.
    sprint_canoe_class:
      name: Classe di canoa sprint
      description: Specifica la denominazione ufficiale della classe di gara di canoa
        sprint.
    sprout_presentation:
      name: Presentazione dei germogli
      description: Identifica la presentazione fisica del prodotto (ad es. germogli
        freschi, microgreens, vaso di coltivazione vivo, polvere).
    squash_and_gourd_variety:
      name: Varietà di zucca e cucurbitacea
      description: Identifica la specifica cultivar o varietà commerciale della zucca
        o cucurbitacea, aiutando l'acquirente a trovare rapidamente il tipo desiderato.
    stability_class:
      name: Classe di stabilità
      description: Classificazione generale della stabilità derivata dalle valutazioni
        di volo o dalle dichiarazioni di commerciabilità.
    stabilizer_thread_size:
      name: Misura della filettatura dello stabilizzatore
      description: Specifiche della filettatura utilizzate per fissare uno stabilizzatore
        o un accessorio a un arco o a una balestra.
    stabilizer_type:
      name: Tipo di stabilizzatore
      description: Identifica lo stile o la classificazione posizionale dello stabilizzatore
        dell'arco o della balestra.
    stages_supported:
      name: Stadi supportati
      description: Indica il numero di stadi con cui è progettato per volare un razzo
        o un kit.
    stain_remover_format:
      name: Formato dello smacchiatore
      description: Specifica il prodotto/formato di erogazione utilizzato per il trattamento
        delle macchie sui veicoli (flacone spray, aerosol, schiuma, gel, polvere,
        salviette, penna/pennarello).
    stake_shape:
      name: Forma del picchetto
      description: Definisce la sezione trasversale o il design del picchetto da tenda,
        che influisce sulla capacità di tenuta nei diversi tipi di terreno.
    stamp_block_features:
      name: Caratteristiche del blocco per timbri
      description: Evidenzia le caratteristiche funzionali dei blocchi per timbri,
        come griglie di misurazione, maniglie o superfici antiscivolo.
    stamp_block_type:
      name: Tipo di blocco per timbri
      description: Specifica la struttura/lo stile del blocco per timbri utilizzato
        per montare i timbri per la timbratura (ad esempio, blocco in acrilico trasparente,
        blocco montato su legno o blocco di posizionamento).
    stamp_set_pieces_included:
      name: Pezzi del set di timbri inclusi
      description: Indica quali componenti sono inclusi nel set di timbro e tampone
        d'inchiostro (ad esempio, timbri, tamponi d'inchiostro, pennarelli).
    stand_padding_material:
      name: Materiale dell'imbottitura dello stand
      description: Materiali utilizzati nei punti di contatto per proteggere la finitura
        dello strumento (ad esempio, schiuma, gomma, silicone).
    staple_fiber_animal_fiber_type:
      name: Tipo di fibra animale in fiocco
      description: Tipo di fibra di origine animale specifica quando il tipo di fonte
        della fibra a fiocco è Animale.
    staple_fiber_crimp_level:
      name: Livello di arricciatura della fibra a fiocco
      description: Grado di arricciatura/increspatura naturale della fibra.
    staple_fiber_preparation_type:
      name: Tipo di preparazione della fibra a fiocco
      description: Stato di preparazione/lavorazione della fibra al momento della
        vendita (come viene allineata/manipolata), che ha un forte impatto sul metodo
        di filatura, sulla facilità di stiratura e sul risultato finale.
    staple_fiber_source_type:
      name: Tipo di origine della fibra a fiocco
      description: Ampia categoria di origine per il contenuto della fibra.
    starch_processing_type:
      name: Tipo di lavorazione dell'amido
      description: Indica se l'amido è nativo o è stato modificato fisicamente o chimicamente
        (ad esempio, istantaneo, pregelatinizzato) per conferire specifiche proprietà
        funzionali come la velocità di addensamento o la tolleranza alla temperatura.
    starch_source:
      name: Fonte dell'amido
      description: Specifica la fonte botanica da cui deriva l'amido o l'addensante
        da cucina (ad esempio, mais, patata, tapioca). La provenienza è il principale
        fattore di differenziazione per gli amidi da cucina e influisce direttamente
        sull'idoneità nelle ricette, sulle considerazioni relative agli allergeni
        e sul comportamento di ricerca dei consumatori.
    starfruit_variety:
      name: Varietà di carambola
      description: Identifica la specifica cultivar o varietà di carambola (ad esempio,
        Arkin, Fwang Tung).
    starter_drive_type:
      name: Tipo di trasmissione Starter
      description: Il meccanismo di azionamento/innesto utilizzato per innestare il
        pignone nella corona dentata.
    starter_pistol_action_type:
      name: Tipo di azione della pistola di partenza
      description: Identifica il meccanismo di sparo/azione della pistola di partenza
        (ad esempio, azione singola, doppia azione, semi-automatica).
    starter_pistol_caliber:
      name: Calibro della pistola di partenza
      description: Specifica il calibro delle munizioni a salve o delle cartucce per
        cui è camerata la pistola di partenza.
    starter_terminal_type:
      name: Tipo di terminale Starter
      description: Specifica il tipo di terminale/connettore utilizzato per i collegamenti
        elettrici sul motorino di avviamento o sul solenoide (ad es. a perno, a linguetta,
        con connettore a innesto).
    starting_block_anchoring_method:
      name: Metodo di ancoraggio del blocco di partenza
      description: Descrive come i blocchi si fissano alla superficie della pista
        (ad esempio, punte, ventose, cuscinetti in gomma).
    steerer_tube_design:
      name: Design del tubo sterzo
      description: Descrive il design strutturale del tubo sterzo (dritto, conico,
        filettato, ecc.) che determina la compatibilità tra serie sterzo e telaio.
    steering_cable_end_fitting_type:
      name: Tipo di raccordo terminale del cavo dello sterzo
      description: Identifica il tipo di risoluzione/attacco alle estremità del cavo
        di governo di un'imbarcazione (lato timone e motore/barra) per garantire la
        compatibilità con i punti di collegamento del timone e del motore. Utilizzare
        la denominazione standard o del produttore, ove applicabile.
    steering_column_adjustability_features:
      name: Caratteristiche di regolazione del piantone dello sterzo
      description: Indica quali funzioni di regolazione sono integrate nel piantone
        dello sterzo.
    steering_column_ignition_provision:
      name: Predisposizione per l’accensione sul piantone dello sterzo
      description: Indica se il piantone dello sterzo è progettato per alloggiare
        un cilindro/interruttore di blocco dell'accensione e/o un bloccasterzo.
    steering_column_shaft_end_interface_type:
      name: Tipo di interfaccia terminale dell'albero del piantone dello sterzo
      description: Identifica lo stile di interfaccia dell'estremità dell'albero del
        piantone dello sterzo (ad esempio, scanalato, a doppia D, con chiavetta).
    steering_column_shift_type:
      name: Tipo di cambio del piantone dello sterzo
      description: Specifica se il piantone dello sterzo include un meccanismo di
        cambio montato sul piantone e il tipo di trasmissione.
    steering_component_drive_type:
      name: Tipo di azionamento dello sterzo
      description: Specifica il meccanismo di azionamento/assistenza relativo ai componenti
        dello sterzo (in particolare pompe e sistemi in polistirene espanso).
    steering_position:
      name: Posizione dello sterzo
      description: Specifica se il furgone ha la guida a sinistra o a destra.
    steering_pump_pulley_type:
      name: Tipo di puleggia della pompa dello sterzo
      description: Specifica il tipo/interfaccia di azionamento della puleggia utilizzato
        con la pompa dello sterzo.
    steering_rack_finish_coating:
      name: Finitura/rivestimento del pannello dello sterzo
      description: Specifica la finitura/il rivestimento esterno per la protezione
        dalla corrosione.
    steering_rack_position:
      name: Posizione della cremagliera dello sterzo
      description: Specifica dove il pannello è montato/utilizzato nel sistema di
        sterzo del veicolo.
    steering_wheel_cover_installation_type:
      name: Tipo di installazione del coprivolante
      description: Come si installa/fissa il coprivolante sul volante.
    steering_wheel_grip_material:
      name: Materiale dell'impugnatura del volante
      description: Specifica il materiale della corona/impugnatura (la parte a contatto
        con le mani), che può essere diverso da quello del centro/dei raggi.
    steering_wheel_mounting_pattern:
      name: Schema di montaggio del volante
      description: Specifica lo schema di foratura/bulloni utilizzato per fissare
        il volante a un mozzo o a un adattatore (ad esempio, 3 bulloni, 5 bulloni).
    steering_wheel_rim_material_grip_surface:
      name: Materiale della corona del volante (superficie di presa)
      description: Specifica il materiale principale di rivestimento dell'impugnatura/della
        corona (distinto dal materiale generale).
    stem_material:
      name: Materiale del cannello
      description: Specifica il materiale utilizzato per il cannello o il bocchino
        (ad es. acrilico, ebanite, lucite).
    stencil_machine_consumable_type:
      name: Tipo di materiale di consumo della macchina per stencil
      description: Specifica i materiali di consumo necessari per il funzionamento
        (se presenti).
    step_surface_texture:
      name: Texture della superficie del gradino
      description: Specifica il disegno/materiale del battistrada o della superficie,
        progettato per migliorare l'aderenza e il comfort in condizioni di bagnato.
    stepper_motion_type:
      name: Tipo di movimento a scatti
      description: Definisce il movimento a scatti primario offerto dalla macchina.
    stick_bow_profile:
      name: Profilo dell'arco della mazza
      description: Specifica il profilo di curvatura (o "tipo di arco") dell’asta
        della mazza da hockey su prato, un fattore critico che influisce sul controllo
        della palla, sulla prestazione nel drag-flick e sullo stile di gioco.
    stick_construction:
      name: Costruzione dello stick
      description: Specifica il tipo di realizzazione della mazza da hockey, ad esempio
        monoblocco in materiale composito, in due pezzi in materiale composito o in
        legno.
    stick_curvature_type:
      name: Tipo di curvatura del bastone da lancio
      description: Descrive il profilo di curvatura del bastone da lancio, che influisce
        sulla distanza e sulla precisione del lancio.
    stick_head_shape:
      name: Forma della testa della mazza
      description: Definisce la forma della testa della mazza, che influenza sulla
        capacità di fermare la palla, sullo stile di tiro e sul controllo ravvicinato
        della palla.
    stick_size_compatibility:
      name: Compatibilità delle dimensioni del bastoncino
      description: Indica il gruppo di misure per mazze da hockey con cui il prodotto
        è compatibile (es. Youth, Junior, Intermediate, Senior, Goalie, Universal).
    sticker_decal_features:
      name: Caratteristiche dell'adesivo/decalcomania
      description: Cattura le caratteristiche di applicazione e prestazioni specifiche
        su adesivi/decalcomanie (ad esempio, senza bolle, riposizionabili).
    sticker_finish:
      name: Finitura dell'adesivo
      description: Descrive la finitura superficiale/l'effetto visivo degli adesivi.
    sticker_format:
      name: Formato dell'adesivo
      description: Specifica il formato retail degli adesivi decorativi (ad esempio,
        foglio, rotolo, individuale, libro).
    sticker_material_type:
      name: Tipo di materiale dell'adesivo
      description: Specifica il substrato/materiale principale dell'adesivo decorativo
        (non gli abbellimenti).
    stilt_foot_attachment_type:
      name: Tipo di attacco per trampoli
      description: Specifica come il piede dell'utente si fissa al trampolo (ad esempio,
        cinturino con fibbia, velcro, lacci).
    stirrup_style:
      name: Stile della staffa
      description: Classifica lo stile della staffa in base al design o alla disciplina,
        includendo varianti di sicurezza, di utilizzo sportivo e costruttive.
    stirrup_tread_material:
      name: Materiale della pedana della staffa
      description: Specifica il materiale utilizzato per il poggiapiede o la pedana
        della staffa, che influisce su aderenza, comfort e resistenza all’usura.
    stitch_marker_and_counter_style:
      name: Stile del segnapunti e del contatore
      description: Specifica lo stile o il fattore di forma di un segnapunti o contatore
        di punti/righe (ad es. segnapunti a chiusura, anello aperto, contatore ad
        anello, contatore digitale).
    stitch_types:
      name: Tipi di punti
      description: Tipi di punti (funzionali e decorativi) che la macchina può realizzare.
    stitching_method:
      name: Metodo di cucitura
      description: Indica come sono uniti i pannelli sferici.
    stitching_state:
      name: Stato della cucitura
      description: Indica se i capi di abbigliamento vengono forniti non cuciti, semi-cuciti,
        cuciti o pronti da indossare.
    stock_car_race_series:
      name: Serie di gare di stock car
      description: Specifica l’ente organizzatore o la serie/classe di competizione
        per cui la stock car può competere.
    stone_adhesion:
      name: Adesione del nocciolo
      description: Indica se il nocciolo della pesca o della nettarina è a polpa staccabile,
        aderente o semi-staccabile.
    stone_creation_method:
      name: Metodo di creazione della pietra
      description: Specifica la pietra è naturale, creata in laboratorio, simulata
        o riciclata.
    stone_cut_grade:
      name: Grado di taglio della pietra
      description: Indica la valutazione complessiva della qualità del taglio della
        pietra.
    stone_cut_style:
      name: Stile di taglio della pietra
      description: Stile di taglio/lavorazione della pietra in vetro (ad es. sfaccettata
        o cabochon).
    stone_fruit_cultivar:
      name: Cultivar della frutta a nocciolo
      description: Identifica la specifica cultivar/varietà della pesca o della nettarina.
    stone_fruit_variety:
      name: Varietà della frutta a nocciolo
      description: Indica il sottotipo all'interno della categoria (ad esempio, pesca,
        nettarina, pesca tabacchiera/piatta).
    stone_setting_type:
      name: Tipo di posizionamento della pietra
      description: Specifica come ogni pietra viene fissata al gioiello (a castone,
        a griffe, a pavé, ecc.).
    stone_transparency:
      name: Trasparenza della pietra
      description: Trasparenza/opacità ottica della pietra in vetro.
    storage_case_type:
      name: Tipo di custodia di stoccaggio
      description: Indica il tipo di custodia in cui viene fornito il set per la conservazione
        e il trasporto (ad esempio, scatola, custodia, borsa).
    storage_compartment_type:
      name: Tipo di vano portaoggetti
      description: Specifica il tipo di vano portaoggetti che la boa da nuoto offre
        per gli effetti personali.
    storage_media_and_transfer_methods_supported:
      name: Supporto di archiviazione e modalità di trasferimento supportati
      description: Supporti multimediali o metodi di collegamento supportati per l'importazione/esportazione
        di campioni e il salvataggio/caricamento di progetti.
    storage_requirements:
      name: Requisiti di archiviazione
      description: Specifica le modalità di conservazione del prodotto prima e/o dopo
        l'apertura per preservarne la qualità e la sicurezza.
    stove_jack_compatibility:
      name: Compatibilità con il passaggio del tubo della stufa
      description: Indica se la tenda è dotata di un'apertura ignifuga per il tubo
        della stufa.
    straight_pin_application:
      name: Applicazione degli spilli dritti
      description: Specifica l’uso previsto degli spilli dritti.
    straight_pin_finish:
      name: Finitura dello spillo dritto
      description: Descrive la finitura superficiale o il rivestimento dello spillo
        (ad esempio, nichelato) che influisce sulla resistenza alla corrosione e sullo
        scorrimento.
    straight_pin_head_material:
      name: Materiale della testa dello spillo dritto
      description: Specifica il materiale della testa dello spillo dritto (se presente),
        ad esempio plastica o vetro.
    straight_pin_head_shape:
      name: Forma della testa dello spillo dritto
      description: Descrive la forma/lo stile della testa dello spillo dritto per
        usabilità e visibilità.
    strand_configuration:
      name: Configurazione del filo
      description: Indica quante file o fili separati compongono la catena da portafoglio
        (singola, doppia, tripla).
    strand_material:
      name: Materiale del filo
      description: Specifica il materiale utilizzato per i singoli fili/strisce.
    strap_attachment_hardware:
      name: Hardware di fissaggio del cinturino
      description: Specifica il tipo/design dei materiali utilizzati per fissare la
        cinghia allo strumento/punto supporto.
    strap_configuration:
      name: Configurazione del cinturino
      description: Indica il numero di punti di fissaggio del casco sul cinturino
        (ad esempio, 2 punti, 4 punti), un elemento fondamentale per la vestibilità,
        la sicurezza e il rispetto dei requisiti della lega.
    strap_functionality:
      name: Funzionalità della cinghia
      description: Specifica l'uso principale previsto o il design della cinghia per
        il tappetino da yoga.
    strap_padding:
      name: Imbottitura della cinghia
      description: Indica il livello di imbottitura della cinghia, pensata per migliorare
        il comfort e distribuire il peso.
    strap_side:
      name: Lato del cinturino
      description: Indica se il cinturino è progettato per l'attacco a sinistra, a
        destra o se viene venduto in coppia.
    strap_width:
      name: Larghezza degli spallacci
      description: Indica la larghezza relativa degli spallacci (sottili, medi, larghi)
        per guidare l'acquirente nella ricerca di una copertura o un supporto specifici.
    strength_classification:
      name: Classificazione della resistenza
      description: Etichetta di resistenza commerciale comunemente utilizzata dai
        brand (ad es. Leggera, Forte, Extra Forte).
    strength_grade:
      name: Grado di resistenza
      description: Descrive la forza di tenuta/il livello di resistenza previsto per
        la chiusura a strappo.
    stretch_level:
      name: Livello di allungamento
      description: Indica quanto si allunga il tessuto durante l'utilizzo.
    stretch_type:
      name: Tipo di allungamento
      description: Indica se il tessuto presenta elasticità meccanica o elastica e
        in quale/i direzione/i.
    stretcher_bar_material:
      name: Materiale delle barre del telaio di tensionamento
      description: Materiale utilizzato per la struttura/le barre del telaio di tensionamento
        (ad es. pino, abete, pioppo, betulla, MDF/legno ingegnerizzato).
    strike_shield_shape:
      name: Forma dello scudo da colpi
      description: Specifica il fattore di forma complessivo della superficie di impatto
        di uno scudo da colpi.
    string_core_shape:
      name: Forma del nucleo delle corde
      description: Specifica la forma del filo centrale utilizzato nelle corde avvolte,
        che influisce su sensazione e stabilità.
    string_coverage:
      name: Copertura delle corde
      description: Specifica quali corde il capotasto parziale è progettato per premere/coprirе
        (in base al numero o a un set comune).
    string_end_type:
      name: Tipo di terminazione della corda
      description: Specifica il tipo di terminazione della corda al ponte/cordiera
        per garantirne la compatibilità (particolarmente importante per chitarre acustiche/elettriche
        e alcuni bassi).
    string_set_type:
      name: Tipo di set di corde
      description: Specifica se il prodotto è un set completo o una singola corda
        di ricambio.
    strung_status:
      name: Stato delle corde
      description: Indica se la testa da lacrosse è già incordata con il pocket oppure
        venduta non incordata.
    strut_placement:
      name: Posizionamento del montante
      description: Specifica la posizione di installazione prevista sul veicolo (anteriore/posteriore
        e sinistra/destra) per il montante.
    stud_attachment_type:
      name: Tipo di fissaggio del borchia
      description: Specifica il modo in cui tacchetti o chiodi sono fissati o configurati
        sulla suola, influenzando trazione, manutenzione e conformità alle normative
        delle leghe.
    stud_configuration:
      name: Configurazione delle borchie
      description: Definisce la forma e la disposizione dei tacchetti/chiodi sulla
        suola, influenzando la trazione e le prestazioni su diverse superfici.
    stud_material:
      name: Materiale della borchia
      description: Identifica il materiale principale di chiodi/tacchetti, fornendo
        informazioni su durata, peso e conformità alle normative di sicurezza.
    stuffed_animal_features:
      name: Caratteristiche del peluche
      description: Evidenzia le caratteristiche di gioco e comfort integrate nel peluche.
    stump_base_type:
      name: Tipo di base del ceppo
      description: Definisce lo stile della base o del sistema di montaggio del paletto
        da cricket (ad es. a punta, a ritorno a molla, in gomma zavorrata, ecc.).
    stump_mechanism:
      name: Meccanismo del moncone
      description: Specifica il meccanismo di ritorno o di montaggio dei paletti da
        cricket (ad esempio, a molla, fisso).
    stump_size:
      name: Dimensione del paletto
      description: Etichetta con la dimensione di categoria utilizzata per i paletti
        da cricket, che indica l'altezza tipica e la fascia d'età adatta del giocatore.
    subwoofer_installation_type:
      name: Tipo di installazione del subwoofer
      description: Modalità di installazione prevista per il subwoofer in un impianto
        audio per veicoli.
    sugar_cane_variety:
      name: Varietà di canna da zucchero
      description: Identifica la specifica cultivar o varietà commerciale di canna
        da zucchero, che può influenzare il colore, la dolcezza e il contenuto di
        fibre.
    sugar_content_level:
      name: Livello di zucchero minimo
      description: Classifica il livello complessivo di zucchero o la formulazione
        del concentrato per bevande, consentendo all'acquirente di trovare rapidamente
        le opzioni normali, a ridotto contenuto di zucchero o senza zucchero.
    sugar_refinement_level:
      name: Livello di raffinazione dello zucchero
      description: Indica il grado o lo stile di raffinazione (colore, contenuto di
        melassa o livello di lavorazione).
    sugar_source:
      name: Fonte di zucchero
      description: Identifica l'origine botanica o materiale da cui deriva lo zucchero.
    suit_fit:
      name: Vestibilità del completo
      description: Taglio complessivo del completo, che indica l'aderenza al corpo.
    suit_pieces:
      name: Pezzi del completo
      description: Specifica quanti capi coordinati sono inclusi nel completo (ad
        esempio, 2 pezzi, 3 pezzi, 4 pezzi).
    suitable_for_anchoring_use:
      name: Adatto per l'uso come ancoraggio
      description: Indica il caso d'uso previsto per la fune/corda in relazione all'ancoraggio.
    suitable_for_craft_type:
      name: Adatto per tipo di Craft
      description: Uso principale nel lavoro a maglia o all'uncinetto per cui il filo
        di bloccaggio è destinato.
    suitable_for_paint_type:
      name: Adatto per tipo di vernice
      description: Indica con quali tipi di vernice la tela è destinata/sicura da
        utilizzare.
    suitable_for_swim_stroke:
      name: Adatto allo stile di nuoto
      description: Indica per quale/i stile/i di nuoto la paletta è progettata o ottimizzata.
    suitable_mounting_surface_material:
      name: Materiale adatto della superficie di montaggio
      description: Specifica la superficie/il materiale di montaggio previsto a cui
        il supporto adesivo può aderire.
    suitable_play_location:
      name: Posizione di gioco adatta
      description: Principali ambienti di gioco previsti per il mulino giocattolo
        per acqua e sabbia.
    suitable_riding_conditions:
      name: Condizioni di equitazione adatte
      description: Indica le condizioni (ad esempio, asciutto, bagnato, inverno) per
        cui è formulato un lubrificante o un detergente per biciclette.
    suitable_snow_conditions:
      name: Condizioni di neve adatte
      description: Indica le principali condizioni della neve per cui è stata formulata
        la cera antiscivolo.
    suitable_surface_type:
      name: Tipo di superficie adatto
      description: Specifica le superfici di camminata per cui l'impugnatura è progettata.
    suitable_table_size:
      name: Misura adatta del tavolo
      description: Indica la lunghezza del tavolo da biliardo/snooker che la luce
        può illuminare.
    sun_protection_rating_upf:
      name: Indice di protezione solare (UPF)
      description: Fornisce il livello di protezione solare UPF certificato del capo.
    sun_shade_attachment_method:
      name: Metodo di fissaggio della tenda parasole
      description: Modalità di fissaggio della tendina parasole al finestrino/parabrezza.
    sun_shade_style:
      name: Stile della tendina parasole
      description: Struttura/formato del prodotto per l'apertura e la conservazione
        della tendina parasole.
    sunchoke_variety:
      name: Varietà di topinambur
      description: Indica la specifica cultivar o varietà di topinambur (carciofo
        di Gerusalemme), fornendo informazioni dettagliate per giardinieri, chef e
        acquirenti esigenti.
    sunflower_oil_variety:
      name: Varietà di olio di girasole
      description: Classifica il profilo degli acidi grassi o la cultivar dell'olio
        di girasole (ad esempio, ad alto contenuto di acido oleico, a medio contenuto
        di acido oleico, linoleico).
    sunflower_variety:
      name: Varietà di girasole
      description: Cultivar/varietà di girasole (varietà comuni in commercio per uso
        come fiori recisi).
    support_brace_features:
      name: Caratteristiche del supporto rinforzato
      description: Elenca le caratteristiche funzionali del supporto per il polso,
        come tessuto traspirante, stecca rimovibile o placca metallica regolabile.
    support_leg_count:
      name: Numero di gambe di supporto
      description: Numero di gambe che entrano a contatto con il terreno quando si
        utilizza il supporto per le riprese (ad esempio, monopiede, bipiede, treppiede).
    support_padding:
      name: Imbottitura di supporto
      description: Indica se il cinturino/supporto include un'imbottitura interna
        integrata nei punti di contatto (collo/spalla/pollice).
    support_structure_type:
      name: Tipo di struttura di supporto
      description: Indica il metodo costruttivo utilizzato per mantenere la barriera
        frangivento in posizione verticale.
    supported_bowling_delivery_types:
      name: Tipi di lancio di bowling supportati
      description: Specifica le varianti di lancio del cricket che la macchina può
        simulare, come inswing, outswing e tipi di spin.
    supported_dive_modes:
      name: Modalità di immersione supportate
      description: Specifica le modalità operative di immersione supportate dal computer
        subacqueo, ad esempio Air, Nitrox o Gauge.
    supported_equipment_type:
      name: Tipo di equipaggiamento supportato
      description: Indica l'equipaggiamento per sport invernali che lo scaffale può
        contenere (ad esempio, sci, snowboard, bastoncini da sci).
    supported_spin_types:
      name: Tipi di rotazione supportati
      description: Specifica le variazioni di rotazione della palla che il lanciatore
        può applicare.
    supported_spool_bobbin_types:
      name: Tipi di bobina/rocchetto supportati
      description: Specifica quali formati di bobina/rocchetto sono compatibili con
        l'avvolgitore elettrico.
    surf_wax_temperature_rating:
      name: Temperatura nominale della cera per surf
      description: Specifica l'intervallo di temperatura dell'acqua per cui la cera
        è formulata, garantendo un'aderenza ottimale in diversi climi.
    surface_coating_or_finish:
      name: Rivestimento o finitura della superficie
      description: Specifica eventuali trattamenti superficiali protettivi o in grado
        di migliorare le prestazioni applicati alle pinze.
    surface_coating_or_wrap:
      name: Rivestimento o avvolgimento della superficie
      description: Trattamento della superficie esterna utilizzato per la presa/il
        controllo sulla mazza centrale (e talvolta sulle mazze manuali).
    surface_finish:
      name: Finitura superficiale
      description: Descrive l'effetto/la consistenza della superficie della palla
        che influisce sulla presa e sul movimento durante il contact juggling.
    surface_finish_prep:
      name: Finitura/preparazione della superficie
      description: Indica le condizioni della superficie di attrito (ad esempio, ripristinata,
        lavorata, fusa) al momento della vendita.
    surface_types_included:
      name: Tipi di superficie inclusi
      description: Specifica quale superficie è inclusa nel kit per disegnare/dipingere
        (se presente), come tela, blocco di carta, pannelli di legno o nessuna.
    surfboard_construction:
      name: Costruzione della tavola da surf
      description: Specifica la tecnologia di realizzazione principale o la stratificazione
        della tavola da surf.
    surfboard_tail_shape:
      name: Forma della coda della tavola da surf
      description: Definisce il profilo della coda della tavola, che influisce su
        manovrabilità e tenuta.
    suspension_bushing_type:
      name: Tipo di boccola di sospensione
      description: Specifica lo stile funzionale/di installazione della boccola della
        sospensione.
    suspension_configuration:
      name: Configurazione della sospensione
      description: Descrive se il triciclo è dotato di sospensioni e dove si trovano.
    suspension_material:
      name: Materiale della sospensione
      description: Specifica il materiale delle catene, delle corde o dei cavi utilizzati
        per appendere l'altalena.
    suspension_trainer_accessories_included:
      name: Accessori del sistema di allenamento in sospensione inclusi
      description: Elenca gli articoli aggiuntivi forniti con il kit di allenamento
        (ad es. ancoraggio per porta, cinghia di estensione, borsa per il trasporto),
        aiutando l'acquirente a capire cosa è incluso nella confezione e a confrontare
        il valore del set.
    suspension_trainer_anchor_type:
      name: Tipo di ancoraggio del sistema di allenamento in sospensione
      description: Definisce lo stile di montaggio o il punto di ancoraggio per cui
        sono progettate le cinghie (ad esempio, porta, soffitto, albero), informando
        sulla compatibilità con l'ambiente dell'utente.
    suspension_type:
      name: Tipo di sospensione
      description: Specifica se la forcella è rigida o utilizza un particolare sistema
        di sospensione (aria, molla, ibrida, elastomerica, ecc.), aiutando i ciclisti
        ad abbinare la forcella al proprio stile di guida.
    sustain_pedal_form_factor:
      name: Fattore di forma del pedale sustain
      description: Descrive lo stile fisico del pedale sustain (ad esempio, pedale
        stile pianoforte rispetto a un interruttore a pedale compatto), che influisce
        sulla sensazione d'uso e sull'uso previsto.
    sustain_pedal_switch_type:
      name: Tipo di interruttore del pedale sustain
      description: Indica se il pedale invia un segnale momentaneo (sustain attivo
        durante la pressione) o a scatto (a interruttore).
    sustainability_certification:
      name: Certificazione di sostenibilità
      description: Certificazione ambientale o di provenienza del materiale ligneo.
    swab_intended_bassoon_section:
      name: Sezione del fagotto prevista per il panno
      description: Specifica la parte del fagotto per cui è progettato il panno di
        pulizia (diversi condotti richiedono forme e dimensioni differenti).
    swab_style:
      name: Stile del panno
      description: Descrive il design/formato fisico del panno utilizzato per attraversare
        o raggiungere le aree del sassofono.
    swab_weight_material:
      name: Materiale della zavorra del panno
      description: Materiale della zavorra/terminale di trascinamento (se presente),
        che influisce sul rischio di graffi e sulla durata.
    swab_weight_style:
      name: Stile del peso del tampone
      description: Specifica come viene zavorrato il tampone per farlo passare attraverso
        la canna del fagotto.
    sway_bar_adjustability:
      name: Regolazione della barra stabilizzatrice
      description: Indica se e in che modo è regolabile la rigidità della barra stabilizzatrice
        (tipicamente tramite diversi punti di fissaggio dei leveraggi alle estremità).
    sway_bar_coating:
      name: Rivestimento della barra stabilizzatrice
      description: Trattamento o rivestimento superficiale sulla barra stabilizzatrice
        offrire resistenza alla corrosione e migliorarne l'aspetto.
    sway_bar_fitment_front_rear_kit:
      name: Montaggio della barra stabilizzatrice (anteriore/posteriore/kit)
      description: Indica se la barra stabilizzatrice è destinata all'asse anteriore,
        all'asse posteriore o se viene venduta come kit anteriore-posteriore.
    sweatshirt_pocket_type:
      name: Tipo di tasca della felpa
      description: Descrive lo stile delle tasche presenti sulla felpa.
    sweet_potato_variety:
      name: Varietà di patata dolce
      description: Identifica la specifica cultivar o varietà commerciale della patata
        dolce.
    sweet_spot_position:
      name: Posizione dello sweet spot
      description: Identifica lo sweet spot della mazza lungo la superficie, che influenza
        lo stile di gioco e le condizioni di battuta.
    sweetener_presence:
      name: Presenza di dolcificante
      description: Specifica se nel burro di frutta secca sono presenti dolcificanti
        aggiunti e in quale quantità.
    sweetening_type:
      name: Tipo di dolcificante
      description: Descrive come viene dolcificato il prodotto o il suo livello di
        dolcezza.
    swim_armband_construction_type:
      name: Tipo di realizzazione del bracciolo per il nuoto
      description: Definisce lo stile strutturale o il meccanismo di galleggiamento
        dei braccioli (gonfiabili, in schiuma solida, ibridi, ecc.).
    swim_belt_purpose:
      name: Scopo della cintura da nuoto
      description: Classificazione funzionale della cintura da nuoto (ad es. assistenza
        al galleggiamento, acquagym, allenamento di resistenza, fune statica, attacco
        per paracadute di frenata, zavorra, sicurezza in acque basse).
    swim_board_features:
      name: Funzionalità della tavola da nuoto
      description: Evidenzia le caratteristiche speciali o i miglioramenti della tavola
        da nuoto che ne aumentano l'usabilità o la sicurezza.
    swim_bottom_length:
      name: Lunghezza dei pantaloncini da bagno
      description: Classifica la copertura complessiva delle gambe dei boxer da bagno
        (ad esempio, pantaloncini corti o fino al ginocchio).
    swim_buoy_features:
      name: Caratteristiche della boa da nuoto
      description: Cattura ulteriori caratteristiche degne di nota o accessori che
        migliorano la visibilità, la sicurezza o l'utilità di una boa da nuoto.
    swim_cap_style:
      name: Stile della cuffia da nuoto
      description: Definisce lo stile di realizzazione o design della cuffia da nuoto
        (ad esempio, per capelli lunghi, a cupola/da gara, a bolla/a turbante).
    swim_diaper_feature:
      name: Caratteristiche del pannolino da bagno
      description: Indica se lo slip da nuoto integra un pannolino a tenuta oppure
        se richiede o non include un pannolino da bagno separato.
    swim_trainer_features:
      name: Caratteristiche dell'ausilio per il nuoto
      description: Evidenzia le caratteristiche aggiuntive relative a funzionalità
        o comfort dell'ausilio per il nuoto.
    swim_trainer_type:
      name: Tipo di attrezzo per nuoto
      description: Definisce lo stile strutturale o il formato dell'ausilio per il
        nuoto, al fine di facilitare il filtraggio in base al design e allo scopo
        dell'allenamento.
    swim_training_focus:
      name: Focus dell'allenamento per il nuoto
      description: Identifica l'obiettivo di allenamento principale a cui è destinata
        la paletta (ad esempio, tecnica, forza, isolamento muscolare).
    swim_weight_style:
      name: Stile dei pesi da nuoto
      description: Classifica il fattore di forma del peso da nuoto, aiutando l'acquirente
        a differenziare tra tipi di prodotto fondamentalmente diversi pur rimanendo
        nella stessa categoria.
    swimbait_buoyancy:
      name: Galleggiabilità dello swimbait
      description: Indica come si comporta lo swimbait nella colonna d'acqua (galleggiante,
        sospeso, affondante, ecc.), permettendo ai pescatori di selezionare l'esca
        corretta in base alla profondità desiderata e allo stile di recupero.
    swimbait_style:
      name: Stile dello swimbait
      description: Classifica la realizzazione o il design di azione dello swimbait,
        come ad esempio coda a paletta o glide bait.
    swimwear_pieces_included:
      name: Pezzi del costume da bagno inclusi
      description: Elenca i singoli capi forniti nel set di burkini in modo che l'acquirente
        sappia esattamente cosa è incluso nella confezione.
    swimwear_set_pieces_included:
      name: Pezzi del set di costumi da bagno inclusi
      description: Elenca i capi inclusi nel set di burkini, in modo che l'acquirente
        sappia esattamente cosa riceverà (ad esempio, top, leggings, hijab/cappello).
    swing_attachment_connection_type:
      name: Tipo di aggancio/collegamento dell'altalena
      description: Il tipo di sistema utilizzato per appendere l'altalena ai suoi
        accessori (ad esempio, corda, catena, cinghie).
    swing_trainer_type:
      name: Tipo di allenatore per l'altalena
      description: Classifica lo stile o il meccanismo dell'attrezzo di allenamento
        dello swing, in modo che l'acquirente possa individuare rapidamente il dispositivo
        più adatto ai propri obiettivi di allenamento.
    swing_training_objective:
      name: Obiettivo dell'allenamento swing
      description: Classifica l'obiettivo, il meccanismo o il focus di allenamento
        principale dell'attrezzo di allenamento dello swing (ad esempio, tempo, velocità,
        impugnatura).
    switch_electrical_positions:
      name: Posizioni elettriche dell'interruttore
      description: Specifica il numero e il comportamento delle posizioni elettriche
        sull'interruttore (ad esempio, 3 posizioni, accensione momentanea).
    swivel_type:
      name: Tipo di girella
      description: Specifica la configurazione della girella utilizzata per ridurre
        l'aggrovigliamento del cordino.
    sword_scabbard_material:
      name: Materiale del fodero della spada
      description: Specifica il materiale principale del fodero/guaina incluso (se
        presente).
    synthesizer_form_factor:
      name: Fattore di forma del sintetizzatore
      description: Descrive il formato dell'interfaccia fisica/di controllo del sintetizzatore.
    synthetic_feather_style:
      name: Stile della piuma sintetica
      description: Stile/taglio della piuma sintetica utilizzata per ottenere diversi
        effetti e tecniche di lavorazione.
    synthetic_formulation_type:
      name: Tipo di formulazione sintetica
      description: Specifica il tipo di base sintetica/formulazione (ad esempio, PAO,
        estere, Gruppo III con hydrocracking).
    syrup_base_ingredient:
      name: Ingrediente base dello sciroppo
      description: Identifica la pianta o la fonte di zucchero principale da cui si
        ricava lo sciroppo o il nettare (ad esempio, acero, agave, zucchero di canna).
    syrup_variety:
      name: Varietà di sciroppo
      description: Definisce lo stile o la categoria generale di sciroppo in base
        alla sua formulazione o al suo utilizzo tradizionale (ad esempio, sciroppo
        d'acero, aroma di caffè, frutta, medicinale).
    t_shirt_fit:
      name: Vestibilità della t-shirt
      description: Descrive la vestibilità/il taglio generale previsto per la t-shirt.
    tabla_included_components:
      name: Componenti inclusi nella tabla
      description: Indica quali articoli principali sono inclusi nell'inserzione della
        tabla (tamburo singolo o set, coperture/custodie, chiave di accordatura, ecc.).
    tabla_set_pieces_included:
      name: Pezzi del set di tabla inclusi
      description: Indica quali componenti sono inclusi nel set di tabla (ad esempio,
        dayan, bayan, anelli, coperture, strumenti di accordatura, borsa).
    tabla_tonal_pitch_range_bayan:
      name: Gamma tonale/intonazione della tabla (bayan)
      description: Descrive la tipica categoria di gamma tonale/intonazione per i
        tamburi bayan (bassi) in base alla taglia e alla realizzazione.
    table_base_material:
      name: Materiale della base del tavolo
      description: Identifica il materiale principale della base o del piedistallo
        del tavolo (distinto dalle gambe o dal piano del tavolo), facilitando il filtraggio
        in base al materiale.
    table_base_type:
      name: Tipo di base del tavolo
      description: Identifica il design strutturale che supporta il piano del tavolo
        (ad esempio, piedistallo, cavalletto, base a X).
    table_coverage_position:
      name: Posizione della copertura del tavolo
      description: 'Indica per quale/i posizione/i del tavolo da ping-pong è progettata
        la copertura: piegato, in posizione di gioco o in entrambe.'
    table_hockey_part_type:
      name: Tipo di parte dell'hockey da tavolo
      description: Identifica il tipo specifico di componente all'interno dei sistemi
        di hockey da tavolo/ad aria/con aste/a bolle.
    table_leg_design:
      name: Design delle gambe del tavolo
      description: Identifica lo stile strutturale o la geometria della gamba, consentendo
        all'acquirente di soddisfare specifiche esigenze estetiche e di supporto.
    table_size:
      name: Misura del tavolo
      description: Dimensioni commerciali generali del tavolo da biliardo (in piedi),
        che consentono all'acquirente di scegliere rapidamente opzioni comuni come
        tavoli da bar da 7 piedi o tavoli da torneo da 9 piedi.
    table_size_category:
      name: Categoria di dimensione del tavolo
      description: Classifica i tavoli da calcio balilla in base all'ingombro complessivo
        per aiutare l'acquirente a trovare il modello più adatto allo spazio disponibile,
        senza dover effettuare calcoli.
    table_tennis_certification:
      name: Certificazione tennistavolo
      description: Elenca gli standard ufficiali o le approvazioni degli enti di controllo
        che il prodotto soddisfa (ad esempio, ITTF, classi EN 14468-2).
    tabletop_tilt_function:
      name: Funzione di inclinazione del piano del tavolo
      description: Specifica se il piano del tavolo può inclinarsi, ribaltarsi o ruotare
        in diverse angolazioni.
    tackle_components_included:
      name: Componenti della pesca inclusi
      description: Elenca i componenti specifici dell'attrezzatura da pesca inclusi
        nel kit, in modo che l'acquirente sappia esattamente cosa è incluso.
    talking_drum_accessories_included:
      name: Accessori del tamburo parlante inclusi
      description: Elenca gli accessori inclusi con il tamburo parlante (nella confezione).
    talking_drum_cord_material:
      name: Materiale delle corde del tamburo parlante
      description: Materiale utilizzato per i cavi/le corde di tensione che collegano
        le teste del tamburo.
    talking_drum_tuning_mechanism:
      name: Meccanismo di accordatura del tamburo parlante
      description: Modalità con cui si modifica l'intonazione del tamburo o si applica
        la tensione durante l'esecuzione (o in fase di preparazione).
    tam_tam_construction_style:
      name: Stile di realizzazione del tam-tam
      description: Stile di realizzazione/martellatura del tam-tam.
    tam_tam_items_included:
      name: Articoli del tam-tam inclusi
      description: Accessori inclusi con il tam-tam (ad esempio, martelletto, supporto,
        custodia).
    tamarillo_variety:
      name: Varietà di tamarillo
      description: Identifica la specifica cultivar o variante di colore del frutto
        di tamarillo.
    tamarind_variety:
      name: Varietà di tamarindo
      description: Specifica la varietà botanica o commerciale del tamarindo, che
        può Influenzare il sapore, la consistenza e l'uso in cucina.
    tambourine_frame_style:
      name: Stile del telaio del tamburello
      description: Descrive la configurazione fisica del telaio manuale utilizzato
        per impugnare e suonare il tamburello.
    tambourine_head_material:
      name: Materiale della membrana del tamburello
      description: Specifica il materiale della testa (membrana) dei tamburelli con
        pelle.
    tambourine_jingle_configuration:
      name: Configurazione del sonagli del tamburello
      description: Modo in cui sono disposti o realizzati i sonagli sul tamburello.
    tambourine_jingle_material:
      name: Materiale dei sonagli del tamburello
      description: Specifica il materiale dei sonagli (dischi in metallo) del tamburello,
        che influisce sul suono e sulla durata.
    tambourine_mounting_type:
      name: Tipo di utilizzo del tamburello
      description: Modalità di impugnatura o fissaggio del tamburello durante l'uso.
    tambourine_tuning_mechanism:
      name: Meccanismo di accordatura del tamburello
      description: Specifica il sistema di accordatura utilizzato sui tamburelli portatili
        accordabili (se applicabile).
    tank_model_scale:
      name: Scala del modellino di carro armato
      description: Specifica il rapporto di scala del modellino del carro armato (ad
        esempio, 1:35, 1:72).
    tank_top_back_style:
      name: Stile della schiena della canotta
      description: Specifica la forma o il taglio della parte posteriore della canotta,
        che influenza supporto, mobilità e aspetto.
    tape_application_area:
      name: Area di applicazione del nastro
      description: Specifica la parte dell'apparecchiatura o del lettore in cui il
        nastro deve essere applicato, aiutando l'acquirente a scegliere il tipo corretto.
    tape_finish:
      name: Finitura del nastro
      description: Finitura superficiale/visiva (lucentezza o texture) del nastro.
    tape_purpose:
      name: Scopo del nastro
      description: Specifica l'utilizzo funzionale principale del nastro nella manutenzione
        o personalizzazione delle racchette.
    tape_type:
      name: Tipo di nastro
      description: Classifica lo stile funzionale o la struttura del nastro da hockey,
        ad esempio in tessuto, polietilene trasparente, antiscivolo, elastico coesivo,
        per parastinchi o in pelle di camoscio.
    tapenade_main_ingredients:
      name: Ingredienti principali della tapenade
      description: Specifica l'ingrediente base principale che definisce la tapenade
        (oliva, pomodoro, melanzana, peperone, ecc.), utile per gli acquirenti con
        preferenze o restrizioni basate sugli ingredienti.
    tapestry_loom_loom_format:
      name: Formato del telaio per arazzo
      description: Fattore di forma complessivo/stile del supporto del telaio a mano
        per arazzi.
    tapestry_loom_shedding_method:
      name: Metodo di apertura del passo del telaio per arazzi
      description: Modalità con cui il telaio crea il passo (separazione dei fili
        d'ordito) per il passaggio della trama.
    tapestry_loom_tensioning_system:
      name: Sistema di tensionamento del telaio per arazzo
      description: Il metodo utilizzato per tendere e fissare l'ordito sul telaio
        per arazzo.
    tar_head_material:
      name: Materiale della testa del tamburo
      description: Identifica il materiale della pelle (membrana) del tar, che influisce
        fortemente su sensazione, durata e timbro.
    tar_playing_style:
      name: Stile di utilizzo del tar
      description: Specifica la posizione/tecnica di utilizzo principale per cui è
        progettato il tar.
    tar_tuning_system:
      name: Sistema di regolazione del tar
      description: Specifica come viene regolato il tar (come viene regolata la tensione
        della testa).
    target_components:
      name: Componenti interessati
      description: Specifica quali componenti del sistema di alimentazione/aspirazione
        dell'aria il prodotto è destinato a pulire.
    target_relative_humidity_rh:
      name: Umidità relativa (UR) target
      description: L'umidità relativa target prevista che il prodotto è progettato
        per mantenere all'interno dell'ambiente dello strumento/cassa.
    target_resetting_mechanism:
      name: Meccanismo di ripristino del bersaglio
      description: Descrive come, o se, un bersaglio ritorna alla sua posizione originale
        dopo essere stato colpito.
    target_trainer_type:
      name: Tipo di attrezzo target
      description: Classifica lo stile o il formato generale del sistema di allenamento
        per racquetball o squash.
    targeted_contaminants:
      name: Contaminanti interessati
      description: Tipi di microbi o parassiti che il prodotto è certificato per eliminare.
    targeted_muscle_group:
      name: Gruppo muscolare interessato
      description: Gruppo muscolare primario che l'accessorio è destinato ad allenare
        o supportare.
    taro_variety:
      name: Varietà di taro
      description: Specifica la cultivar, la specie o il nome commerciale della radice
        di taro offerta (ad esempio, Purple Taro, Eddoe, Dasheen).
    tassel_trim_header_type:
      name: Tipo di parte superiore per il bordo con frange decorative
      description: Specifica la realizzazione della parte superiore/di fissaggio utilizzata
        per applicare il bordo con frange a una superficie (ad es. nastro, treccia,
        cordoncino).
    tassel_trim_use_case:
      name: Caso d'uso del bordo con frange
      description: Area di applicazione principale prevista per il bordo con frange.
    taste_profile:
      name: Profilo gustativo
      description: Descrive le caratteristiche di sapore predominanti della varietà
        di mela.
    tea_variety:
      name: Varietà di tè
      description: Classifica il tipo o lo stile specifico di tè o infuso (ad esempio,
        nero, verde, matcha, rooibos) in modo che l'acquirente possa filtrare in base
        alle proprie varietà preferite.
    teasing_tool_style:
      name: Stile dello strumento di cardatura
      description: Indica lo stile o il fattore di forma dello strumento di cardatura
        utilizzato per aprire e miscelare le fibre (ad es. spazzola, rastrello, pettine
    tee_base_style:
      name: Stile del supporto a T
      description: Identifica il design strutturale del supporto a T per rugby che
        facilita il calcio della palla.
    temper_hardness:
      name: Rigidità/durezza
      description: Indica il livello di morbidezza o rigidità del filo (quanto mantiene
        la forma).
    temperature_control_type:
      name: Tipo di controllo della temperatura
      description: Modalità di controllo/regolazione della temperatura dell'utensile.
    tenkara_action_ratio:
      name: Rapporto di azione del Tenkara
      description: Indica il rapporto di flessione tradizionale del Tenkara, che descrive
        in quale punto la canna si flette sotto carico (ad es. 6:4).
    tennis_ball_court_surface:
      name: Superficie del campo della pallina da tennis
      description: Specifica le superfici di gioco per cui è progettata la pallina,
        per garantire prestazioni e durata ottimali.
    tennis_ball_pressure_type:
      name: Tipo di pressione della pallina da tennis
      description: Identifica la pressione interna o la struttura della pallina (pressurizzata,
        senza pressione, a bassa compressione, in schiuma) che influisce su rimbalzo
        e durata.
    tennis_racket_grip_size:
      name: Misura dell'impugnatura della racchetta da tennis
      description: Specifica la circonferenza standardizzata dell'impugnatura della
        racchetta (L0–L5 o equivalenti in pollici) per garantire una corretta impugnatura
        e il massimo comfort.
    tenor_flutophone_fingering_system:
      name: Sistema di diteggiatura del flauto tenore
      description: Specifica il sistema di diteggiatura utilizzato dal flauto tenore
        (convenzione didattica/di notazione).
    tenor_recorder_joint_type:
      name: Tipo di giunzione del flauto dolce tenore
      description: Specifica il tipo di giunzione/collegamento tra le sezioni del
        flauto dolce tenore.
    tenor_saxophone_key_system:
      name: Sistema di tasti del sassofono tenore
      description: Specifica il sistema/standard di meccanica utilizzato (spesso indicato
        come stile francese/Boehm per i sassofoni).
    tenor_saxophone_pad_material:
      name: Materiale dei cuscinetti del sassofono tenore
      description: Specifica il materiale principale utilizzato per le piattine degli
        strumenti.
    tenor_trombone_slide_type:
      name: Tipo di coulisse del trombone tenore
      description: Tipo di coulisse utilizzata nel trombone tenore (ad es. standard/diritta
        oppure con trigger/valvola rotativa a flusso assiale).
    tenor_trombone_valve_configuration:
      name: Configurazione della valvola del trombone tenore
      description: Indica se il trombone tenore è dotato di un sistema di valvole/rotore
        e quale configurazione utilizza.
    tension_control_type:
      name: Tipo di controllo della tensione
      description: Indica se e in che modo la navetta consente la regolazione del
        trascinamento/tensione sulla bobina o sul rocchetto durante l’alimentazione
        del filo.
    tension_mechanism:
      name: Meccanismo di tensione
      description: Sistema di tensionamento utilizzato per controllare l'alimentazione
        della trama dalla bobina/rocchetto durante la tessitura.
    tension_pitch_modulation_system:
      name: Sistema di modulazione tensione/intonazione
      description: Modalità con cui il tamburo parlante cambia tono/tensione durante
        l'uso (ad esempio, stringendo le corde di tensione).
    tension_system:
      name: Sistema di tensionamento
      description: Sistema di tensionamento/avvolgimento del filatoio per cui è destinato
        il kit dell'archetto.
    tent_fabric_material:
      name: Materiale del tessuto della tenda
      description: Indica il tessuto principale utilizzato per il telo esterno o per
        il corpo della tenda, influenzandone peso, traspirabilità e resistenza agli
        agenti atmosferici.
    tent_season_rating:
      name: Valutazione della stagione della tenda
      description: Classifica la tenda in base al numero di stagioni o condizioni
        meteorologiche per cui è progettata (ad esempio, 3 stagioni, 4 stagioni, estreme).
    tent_setup_type:
      name: Tipo di montaggio della tenda
      description: Indica il tipo di montaggio strutturale della tenda, ad esempio
        autoportante, semi-autoportante, non autoportante, gonfiabile/a struttura
        pneumatica o pop-up).
    tent_style:
      name: Stile della tenda
      description: Descrive il design strutturale della tenda (ad esempio, a cupola,
        a tunnel, con telaio ad A).
    test_result_output_method:
      name: Metodo di output dei risultati del test
      description: Specifica il modo in cui il tester per batterie di veicoli presenta
        o fornisce i risultati del test all'utente (ad esempio, indicatore, schermo,
        stampa, app o report su software).
    tether_strap_system:
      name: Sistema di imbracatura/cinghia
      description: Tipo di sistema di fissaggio o cinghia utilizzato per collegare
        il supporto del collo al casco/imbracatura (se applicabile).
    text_color:
      name: Colore del testo
      description: Colore del testo stampato o ricamato sull'etichetta, diverso dal
        colore di sfondo dell'etichetta.
    textile_craft_machine_operation_type:
      name: Tipo di funzionamento della macchina di lavorazione tessile
      description: Modalità di funzionamento della macchina (manuale, a pedale o motorizzata/elettrica).
    textile_finish_treatment:
      name: Finitura tessile/trattamento
      description: Specifica trattamenti superficiali rilevanti applicati al materiale
        tessile.
    texture_inclusions:
      name: Ingredienti per la texture
      description: Specifica i componenti aggiunti che conferiscono texture, come
        polpa di aloe, semi di basilico, nata de coco, perle scoppiettanti o pezzi
        di frutta.
    therapeutic_technology:
      name: Tecnologia terapeutica
      description: Specifica eventuali funzioni terapeutiche integrate, come gel refrigerante,
        strisce magnetiche o ceramica a infrarossi.
    thermal_set_components:
      name: Componenti del set termico
      description: Indica se il prodotto include solo la parte inferiore, solo quella
        superiore o entrambi i pezzi come set.
    thermal_weight:
      name: Grado di isolamento termico
      description: Indica la categoria di isolamento termico del tessuto del passamontagna.
    thermostat_type:
      name: Tipo di termostato
      description: Design funzionale o stile di controllo del termostato di un sistema
        di raffreddamento di un veicolo a motore.
    thimble_guide_size:
      name: Taglia della guida per ditale
      description: Indica la taglia della guida per ditale (vestibilità/copertura),
        generalmente venduta come piccola/media/grande anziché tramite misure dimensionali.
    thread_connection_size:
      name: Misura del filetto di collegamento
      description: Definisce la filettatura specifica che collega alberi, punte e
        adattatori (ad esempio, 6 mm, 5/16"-24).
    thread_construction:
      name: Realizzazione del filo
      description: Modo in cui è realizzato o trattato il filo (ad esempio, filo da
        ricamo a più capi oppure resinato).
    thread_cord_type_beading_pattern:
      name: Tipo di filo/cordoncino (schema di perline)
      description: Tipo di filo o cordoncino consigliato da utilizzare per completare
        lo schema.
    thread_cutter_form_factor:
      name: Fattore di forma del tagliafilo
      description: Identifica lo stile fisico del tagliafilo, ad esempio forbicine
        manuali, modello a pendente oppure ad anello.
    thread_cutter_mechanism:
      name: Meccanismo del tagliafilo
      description: Descrive l'azione o il meccanismo di taglio utilizzato dal tagliafilo.
    thread_cutter_safety_features:
      name: Funzionalità di sicurezza del tagliafile
      description: Indica le funzionalità di sicurezza integrate che riducono il rischio
        di tagli accidentali o proteggono le lame durante la conservazione.
    thread_cutter_usage_application:
      name: Utilizzo/applicazione del tagliafilo
      description: Indica l'utilizzo principale previsto per il tagliafilo.
    thread_finish_treatment:
      name: Finitura/trattamento del filo
      description: Finitura superficiale o trattamento applicato al filo che ne influenza
        la lavorazione e le prestazioni (ad es. cerato, resinato, mercerizzato).
    thread_material:
      name: Materiale del filo
      description: Contenuto di fibra/materiale primario del filo (non del tessuto).
    thread_material_fiber:
      name: Materiale del filo (fibra)
      description: Specifica la fibra/il materiale principale del filo stesso (non
        del tessuto).
    thread_package_format:
      name: Formato del pacchetto di fili
      description: Formato di confezionamento del filo da cucito (ad es. rocchetto,
        cono, bobina).
    thread_rack_compatible_spool_type:
      name: Tipo di rocchetto compatibile con il portafili
      description: Tipo di confezione di filo che il portafili può contenere (rocchetti,
        coni, ecc.).
    thread_standard_size:
      name: Taglia standard del filo
      description: Indica lo standard di taglia/grammatura del filo utilizzato sull'etichetta
        del prodotto (ad esempio, wt, Tex, denier).
    thread_type:
      name: Tipo di filo
      description: Specifica la realizzazione/tipologia del filo da ricamo a punto
        croce.
    thread_weight_system:
      name: Sistema di titolazione del filo
      description: Standard utilizzato per esprimere lo spessore/la grammatura del
        filo.
    thread_yarn_guide_mounting_attachment_style:
      name: Stile di montaggio/fissaggio della guida per filo e filato
      description: Descrive come la guida viene indossata o montata durante l'uso.
    thread_yarn_guide_tension_control:
      name: Controllo della tensione della guida per filo e filato
      description: Indica se e come la guida fornisce una tensione/attrito regolabile
        sul filo o sul filato.
    thread_yarn_organizer_features:
      name: Caratteristiche dell'organizer per fili e filati
      description: Evidenzia le caratteristiche funzionali di organizzazione e portabilità
        specifiche per lo stoccaggio di fili/filati.
    threader_intended_use:
      name: Uso previsto dell'infilafilo
      description: Indica il contesto creativo principale per cui è progettato l'infila-ago
        manuale.
    threading_system:
      name: Sistema di infilatura
      description: Indica il metodo e gli ausili utilizzati per l'infilatura della
        tagliacuci (ad es. manuale, con codifica a colori, guidata, a getto d'aria).
    threading_type:
      name: Tipo di filettatura
      description: Indica se il gioiello utilizza una filettatura interna, una filettatura
        esterna, è senza filettatura o non applicabile.
    throttle_type_scooter_conversion:
      name: Tipo di acceleratore (conversione scooter)
      description: Specifica il fattore di forma/l'interfaccia dell'acceleratore incluso
        o richiesto dal kit di conversione.
    throw_rope_end_attachment:
      name: Attacco terminale della cima da lancio
      description: Elemento di terminazione/attacco o asola presente all'estremità
        operativa della cima da lancio.
    throw_rope_storage_packaging_type:
      name: Tipo di stoccaggio/imballaggio della cima da lancio
      description: Come viene conservata la cima da lancio (ad esempio, in una borsa
        o su un avvolgitore).
    throw_rope_visibility_features:
      name: Caratteristiche di visibilità della cima da lancio
      description: Caratteristiche di visibilità e identificazione pensate per rendere
        la cima più visibile in acqua o in condizioni di scarsa illuminazione.
    thrower_operation_type:
      name: Tipo di operazione del dispensatore
      description: Classifica lo stile meccanico/di funzionamento del dispositivo
        di lancio per filtrare rapidamente i meccanismi manuali da quelli automatici.
    thumb_design:
      name: Design del pollice
      description: Descrive come il pollice è integrato nel guanto, influenzando la
        sicurezza e la presa.
    tiara_design:
      name: Design della tiara
      description: Specifica lo stile strutturale generale o la sagoma della tiara.
    tie_down_points_straps_included:
      name: Punti di ancoraggio/cinghie inclusi
      description: Specifica se il supporto include punti di ancoraggio integrati
        e/o cinghie in dotazione per il fissaggio della moto/scooter.
    tiling_format:
      name: Formato di affiancamento
      description: Specifica lo stile di impaginazione del PDF per l'assemblaggio
        delle pagine stampate.
    time_current_characteristic:
      name: Caratteristica tempo-corrente
      description: Indica il comportamento tempo-corrente del fusibile (ad esempio,
        ad azione rapida o con ritardo), che influisce sull'idoneità per circuiti
        con corrente di spunto.
    timer_count_mode:
      name: Modalità di conteggio del timer
      description: Specifica la modalità di conteggio del timer, ad esempio conto
        alla rovescia, conteggio progressivo (cronometro), entrambi o a intervalli/ripetuto.
    timer_display_type:
      name: Tipo di display del timer
      description: Indica come il timer di gioco visualizza il tempo rimanente (ad
        esempio, schermo digitale, quadrante analogico, clessidra o nessun display).
    timer_operating_modes:
      name: Modalità operative del timer
      description: Comportamenti del timer supportati per gli effetti di attivazione.
    timing_belt_construction_material_rubber_compound:
      name: Materiale di costruzione della cinghia di distribuzione (mescola di gomma)
      description: Mescola di gomma primaria della cinghia utilizzata (ad esempio,
        HNBR), che influisce su resistenza al calore/olio e durata.
    timing_belt_profile:
      name: Profilo della cinghia di distribuzione
      description: Profilo/forma standard dei denti della cinghia di distribuzione
        (ad esempio, trapezoidale o curvilinea).
    timing_belt_reinforcement_cord_material:
      name: Materiale del cordino di rinforzo della cinghia di distribuzione
      description: Specifica il materiale del cordino di rinforzo interno della cinghia
        di distribuzione (ad esempio, fibra di vetro, aramide), che ne influenza la
        resistenza e l'elasticità.
    timing_component_material:
      name: Materiale del componente di temporizzazione
      description: Materiale principale del componente di distribuzione (mescola della
        cinghia, metallo di catena/ingranaggio, materiale della copertura).
    tin_whistle_body_material:
      name: Materiale del corpo del tin whistle
      description: Specifica in modo più dettagliato i materiali del corpo del tin
        whistle rispetto all'elenco generale dei materiali dello strumento.
    tin_whistle_bore_type:
      name: Tipo di foro del tin whistle
      description: Specifica il disegno del foro del tin whistle.
    tin_whistle_included_accessories:
      name: Accessori inclusi con il tin whistle
      description: Accessori inclusi con il tin whistle (ad es. custodia, asta di
        pulizia).
    tip_finish_coating:
      name: Finitura/rivestimento della punta
      description: Specifica il trattamento superficiale sul lato di lavoro (ad esempio,
        cromata, verniciata a polvere) che influisce sulla resistenza alla corrosione
        e sui graffi del bordo.
    tip_shape:
      name: Forme della punta
      description: Descrive la forma o l'affilatura della punta del plettro per chitarra,
        che influisce sull'articolazione e sulla sensazione di esecuzione.
    tippet_rating:
      name: Classe del tippet
      description: Indica la resistenza massima consigliata del tippet, espressa nelle
        designazioni X della pesca a mosca (ad es. 4X).
    tire_changer_operation_type:
      name: Tipo di funzionamento dello smontagomme
      description: Specifica come viene azionata/usata la macchina smontagomme (ad
        esempio, manuale, pneumatica, idraulica). Da distinguere dall'attributo generico
        "Fonte di alimentazione". Serve per descrivere il metodo di azionamento della
        macchina.
    tire_changer_type:
      name: Tipo di smontagomme
      description: Stile operativo generale, design o livello di automazione dello
        smontagomme.
    tire_compound_type:
      name: Tipo di mescola dello pneumatico
      description: Specifica la classificazione della mescola di gomma utilizzata
        negli pneumatici (ad esempio, morbida, da pioggia, slick), che influisce su
        trazione e durata in diverse condizioni.
    tire_load_range:
      name: Intervallo di carico degli pneumatici
      description: Indica l'indice di carico/la classificazione della tela dello pneumatico
        (comunemente per pneumatici LT) che riflette la capacità di carico.
    tire_position:
      name: Posizione dello pneumatico
      description: Posizione di montaggio consigliata sul veicolo.
    tire_repair_kit_components:
      name: Componenti del kit di riparazione pneumatici
      description: Specifica gli articoli inclusi nel kit, consentendo ai clienti
        di confrontare la completezza della confezione.
    tire_sidewall_type:
      name: Tipo di fianco dello pneumatico
      description: Specifica lo stile o le caratteristiche costruttive del fianco
        dello pneumatico.
    tire_speed_rating:
      name: Indice di velocità del pneumatico
      description: Lettera che indica l'indice di velocità del pneumatico (ad es.,
        H, V, W) e che rappresenta la velocità massima sostenibile.
    tire_spoon_type:
      name: Tipo di leva per pneumatici
      description: Classifica le leve per pneumatici in base alla forma delle estremità
        e all'uso previsto.
    tire_system_compatibility:
      name: Compatibilità in base al sistema di pneumatici
      description: Indica se il sigillante è destinato a pneumatici tubeless, con
        camera d'aria o a entrambi.
    tire_temperature_rating_utqg:
      name: Indice di temperatura degli pneumatici (UTQG)
      description: Classificazione UTQG della resistenza alla temperatura degli pneumatici
        automobilistici (ad es. A, B, C).
    tire_traction_rating_utqg:
      name: Indice di trazione degli pneumatici (UTQG)
      description: Classificazione di trazione UTQG per le prestazioni di frenata
        sul bagnato.
    tire_tread_style:
      name: Stile del battistrada dello pneumatico
      description: Descrive il disegno generale del battistrada dello pneumatico tubolare,
        che riflette il terreno per cui è stato progettato e le caratteristiche di
        trazione.
    tire_tube_type:
      name: Tipo di camera d'aria
      description: Sia che lo pneumatico sia progettato per l'uso con o senza camera
        d'aria.
    title_status:
      name: Stato del titolo
      description: Stato legale/di immatricolazione del veicolo.
    tobacco_application:
      name: Applicazione del tabacco
      description: Indica il metodo di consumo previsto o l'apparecchio per fumare
        per cui il tabacco sfuso è destinato.
    tobacco_cut_type:
      name: Tipo di taglio del tabacco
      description: Specifica il taglio fisico o il metodo di preparazione del tabacco
        sfuso, che influisce sulla velocità di combustione, sul metodo di confezionamento
        e sull'esperienza di fumo complessiva.
    tobacco_strength:
      name: Intensità del tabacco
      description: Indica la sensazione corporea o l'effetto della nicotina sul corpo
        quando il tabacco viene consumato, aiutando l'acquirente a selezionare un'intensità
        che corrisponda alle sue preferenze.
    toe_construction:
      name: Costruzione della punta della scarpa
      description: Specifica la configurazione della zona della punta degli stivali
        da muta, che influisce su stabilità, sensibilità alla tavola e calore.
    toe_coverage:
      name: Copertura delle dita del piede
      description: Indica il tipo di copertura della punta del piede offerta dalla
        calza.
    toe_pick_style:
      name: Stile del puntale seghettato
      description: Descrive il design del puntale seghettato della lama dei pattini
        da figura.
    toe_protection_type:
      name: Tipo di protezione delle dita del piede
      description: Indica se e come l'area della punta è rinforzata per motivi di
        sicurezza (ad esempio, puntale in acciaio, puntale morbido).
    toe_reinforcement_type:
      name: Tipo di rinforzo delle dita del piede
      description: Descrive in dettaglio la realizzazione dell'area della punta, che
        influisce su durata e compatibilità con le altre calzature.
    toe_stop_stem_thread_size:
      name: Misura della filettatura dello stelo del fermapunta
      description: Specifica la dimensione della filettatura dello stelo del fermapunta
        per garantire la compatibilità con la piastra.
    tofu_preparation_style:
      name: Stile di preparazione del tofu
      description: Classifica lo stile tradizionale o il sottotipo di tofu oltre alla
        consistenza (ad esempio, silken, a blocchi, soffiato, con la pelle, a nodi,
        fermentato).
    tom_mount_adjustment_features:
      name: Caratteristiche di regolazione del supporto del tom
      description: Specifica quali regolazioni offre il supporto del tom per il posizionamento
        del tamburo (ad es. inclinazione, rotazione, altezza).
    tom_mount_components_included:
      name: Componenti del supporto per tom inclusi
      description: Specifica quali parti sono incluse con il supporto del tom (ricevitore,
        braccio, sfera, morsetti, blocchi, ecc.).
    tom_mount_mounting_position:
      name: Posizione di montaggio del supporto del tom
      description: Specifica dove è previsto il fissaggio del supporto del tom (ad
        esempio, grancassa, asta per piatto, rack).
    tonneau_cover_mounting_style:
      name: Stile di montaggio del Tonneau cover
      description: Indica come si installa/fissa la copertura del cassone alle sponde
        del cassone del camion.
    tool_case_form_factor:
      name: Fattore di forma della cassetta degli attrezzi
      description: Identifica lo stile fisico della cassetta degli attrezzi, che influisce
        sulla portabilità e sullo stoccaggio (ad esempio, valigetta, custodia rigida).
    tool_functions_included:
      name: Funzioni dello strumento incluse
      description: Elenca le funzioni di riparazione o manutenzione specifiche che
        un utensile multifunzione o un set di utensili possono eseguire.
    top_bunk_access_method:
      name: Metodo di accesso al letto superiore
      description: Indica come gli occupanti raggiungono il letto superiore, contribuendo
        alla sicurezza e alla gestione dello spazio.
    top_fit:
      name: Vestibilità del top
      description: Specifica l'aderenza generale o la vestibilità del top sul corpo
        (ad esempio, aderente o oversize).
    top_hat_style:
      name: Stile del cappello a cilindro
      description: Identifica la specifica variante di stile di un cappello a cilindro.
    top_soundboard_material:
      name: Materiale della parte superiore (tavola armonica)
      description: Specifica il materiale della parte superiore della tavola armonica/chitarra
        (la superficie principale che produce il suono).
    topping_form:
      name: Forma del topping
      description: Definisce la forma fisica o la consistenza del topping per dessert,
        aiutando gli acquirenti a individuare rapidamente il prodotto più adatto all’uso
        desiderato.
    topping_type:
      name: Tipo di topping
      description: Indica il topping o la decorazione esterna principale applicata
        alla ciambella.
    tow_hook_type:
      name: Tipo di gancio di traino
      description: Indica se la kneeboard include un gancio di traino integrato e
        ne specifica il tipo di meccanismo.
    tow_point_configuration:
      name: Configurazione del punto di traino
      description: Specifica la configurazione dei punti di traino (singolo, doppio,
        multiplo) offerto dal gonfiabile trainabile per le diverse posizioni di utilizzo.
    tow_strap_protective_features:
      name: Caratteristiche di protezione della cinghia di traino
      description: Caratteristiche strutturali di sicurezza e durata pertinenti integrate
        nella cinghia di traino.
    tow_strap_type:
      name: Tipo di cinghia di traino
      description: Indica la tipologia di cinghia di traino, ad esempio cinghia di
        traino statica o cinghia di recupero cinetica.
    towable_tube_style:
      name: Tipo del trainabile
      description: Identifica il design generale o il fattore di forma del gonfiabile
        trainabile, che determina la posizione dell'utente e l'esperienza di utilizzo.
    towed_water_sport_discipline:
      name: Disciplina sportiva acquatica trainata
      description: Specifica l'attività principale acquatica trainata per cui il guanto
        è progettato.
    towel_features:
      name: Caratteristiche dell'asciugamano
      description: Elenca le caratteristiche speciali o gli extra inclusi con l'asciugamano.
    towel_style:
      name: Stile dell'asciugamano
      description: Classifica il design funzionale o il formato dell'asciugamano da
        golf.
    toy_airplane_control_type:
      name: Tipo di comandi dell'aeroplano giocattolo
      description: Specifica come l'aeroplano giocattolo viene controllato dall'utente.
    toy_airplane_features:
      name: Caratteristiche dell'aeroplano giocattolo
      description: Evidenzia le caratteristiche di gioco più importanti presenti sull'aeroplano
        giocattolo.
    toy_airplane_flight_capability:
      name: Capacità di volo dell'aeroplano giocattolo
      description: Indica se l'aeroplano giocattolo è progettato per volare/planare
        realmente o è destinato principalmente al gioco/all'esposizione a terra.
    toy_audio_features:
      name: Caratteristiche audio del giocattolo
      description: Elenca le capacità audio e gli effetti sonori integrati nel giocattolo.
    toy_boat_play_features:
      name: Caratteristiche di gioco della barca giocattolo
      description: Evidenzia le caratteristiche interattive più rilevanti della barca
        giocattolo per facilitarne la scoperta e il filtraggio.
    toy_boat_recommended_play_environment:
      name: Ambiente di gioco consigliato della barca giocattolo
      description: Specifica l'ambiente di gioco previsto per la barca giocattolo
        per supportare le aspettative e la sicurezza dell'acquirente (ad es. vasca
        da bagno o acque aperte).
    toy_bowling_equipment_included:
      name: Attrezzatura da bowling giocattolo inclusa
      description: Specifica quali componenti del bowling sono inclusi nel set da
        bowling giocattolo (ad esempio, birilli, palla, pista/tappetino, borsa per
        il trasporto).
    toy_car_features:
      name: Caratteristiche dell'auto giocattolo
      description: Evidenzia le caratteristiche integrate nell'automobile giocattolo
        (separate dal sistema di propulsione), come luci, suoni o parti apribili.
    toy_drawing_tablet_accessories_included:
      name: Accessori per tavoletta grafica per bambini inclusi
      description: Accessori aggiuntivi inclusi oltre al tablet stesso (ad esempio,
        pennino aggiuntivo, timbri).
    toy_drawing_tablet_erase_method:
      name: Metodo di cancellazione della tavoletta da disegno giocattolo
      description: Come si pulisce/cancella la superficie di disegno.
    toy_drawing_tablet_screen_type:
      name: Tipo di schermo della tavoletta da disegno giocattolo
      description: Tipo di superficie di disegno/visualizzazione utilizzata (ad esempio,
        tavoletta grafica LCD o magnetica).
    toy_drawing_tablet_writing_drawing_instrument:
      name: Strumento per scrivere/disegnare della tavoletta da disegno giocattolo
      description: Strumento principale utilizzato per disegnare sulla tavoletta (tipo
        di pennino).
    toy_figure_sound_feature:
      name: Funzione sonora della figura giocattolo
      description: Indica se la figura animale emette suoni e di che tipo (ad esempio,
        ruggito, verso realistico di un animale).
    toy_game_features:
      name: Funzionalità del gioco/giocattolo
      description: Evidenzia le caratteristiche di gioco o costruttive più rilevanti
        per i giocattoli da spiaggia e da sabbia.
    toy_gift_basket_items_included:
      name: Articoli del cesto regalo per giocattoli inclusi
      description: 'Elenca le principali tipologie di articoli giocattolo inclusi
        nel cesto regalo (ad esempio: peluche, set di costruzioni, puzzle).'
    toy_glider_launch_method:
      name: Metodo di lancio dell'aliante giocattolo
      description: Specifica le modalità di lancio dell'aliante giocattolo, che influenzano
        lo stile di gioco e le aspettative dell'acquirente.
    toy_helicopter_control_type:
      name: Tipo di controllo dell'elicottero giocattolo
      description: Modalità di controllo/utilizzo dell'elicottero giocattolo (indipendentemente
        dalla propulsione), ad esempio tramite telecomando, app o senza controllo
        (volo libero).
    toy_helicopter_features:
      name: Caratteristiche dell'elicottero giocattolo
      description: Caratteristiche funzionali chiave dell'elicottero giocattolo (soprattutto
        modelli radiocomandati) che influiscono sull'usabilità e sul valore ludico.
    toy_jacks_set_items_included:
      name: Articoli inclusi nel set di jack giocattolo
      description: Specifica quali articoli principali sono inclusi nel set di jack
        giocattolo (ad esempio, jack, palla, sacchetto).
    toy_keyboard_learning_mode:
      name: Modalità di apprendimento della tastiera giocattolo
      description: Indica l'approccio educativo/di apprendimento supportato dalla
        tastiera giocattolo (ad esempio, tasti luminosi, canzoni da seguire, lezioni
        guidate, apprendimento assistito da app).
    toy_keyboard_sound_theme:
      name: Tema sonoro della tastiera giocattolo
      description: Tipi di voci/suoni di strumenti integrati offerti da (oltre al
        semplice pianoforte).
    toy_kitchen_appliances_included:
      name: Utensili della cucina giocattolo inclusi
      description: Specifica gli elettrodomestici da cucina rappresentati nel playset
        quando il prodotto è un set dedicato agli elettrodomestici.
    toy_kitchen_assembly_requirement:
      name: Assemblaggio della cucina giocattolo necessario
      description: Indica se è necessario il montaggio e la complessità approssimativa.
    toy_kitchen_interactive_features:
      name: Caratteristiche interattive della cucina giocattolo
      description: Evidenzia gli elementi interattivi comunemente presenti nelle cucine
        giocattolo e nei relativi accessori.
    toy_motorcycle_feature_set:
      name: Set di caratteristiche della motocicletta giocattolo
      description: Caratteristiche principali della moto giocattolo (selezionare tutte
        quelle pertinenti).
    toy_motorcycle_scale:
      name: Scala della moto giocattolo
      description: Rapporto di scala per moto giocattolo/da collezione (ad esempio,
        1:12).
    toy_parachute_launch_method:
      name: Metodo di lancio del paracadute giocattolo
      description: Modalità di lancio/utilizzo previsto del giocattolo per il volo.
    toy_piano_and_keyboard_accessories_included:
      name: Pianoforte giocattolo e accessori per tastiera inclusi
      description: Accessori inclusi con il pianoforte giocattolo o la tastiera giocattolo.
    toy_playset_assembly_required:
      name: Necessità di assemblare il playset
      description: Indica se è richiesto il montaggio da parte di un adulto prima
        dell'utilizzo (oltre al semplice incastro).
    toy_playset_items_included:
      name: Articoli del playset inclusi
      description: Elenca i principali componenti inclusi nel playset (cosa contiene
        la scatola).
    toy_safety_certification:
      name: Certificazione di sicurezza dei giocattoli
      description: Norme/marchi di sicurezza e conformità applicabili ai giocattoli
        nel mercato dell'acquirente (ad es. EN 71, ASTM F963, UKCA).
    toy_spaceship_features:
      name: Caratteristiche dell'astronave giocattolo
      description: Indica le caratteristiche interattive/di gioco comuni integrate
        nell'astronave giocattolo.
    toy_spaceship_size_class:
      name: Classe di taglia dell'astronave giocattolo
      description: Indica una classe di taglia approssimativa per l'astronave giocattolo
        per facilitare il filtraggio rapido, separata dalle dimensioni esatte (lunghezza/larghezza/altezza),
        senza indicare un rapporto di scala numerico del modello (ad es. 1:72).
    toy_tableware_pieces_included:
      name: Pezzi di stoviglie giocattolo inclusi
      description: Specifica quali articoli di stoviglie giocattolo sono inclusi (piatti,
        tazze, posate, pezzi da portata).
    toy_tool_electronic_features:
      name: Caratteristiche elettroniche dello strumento giocattolo
      description: Descrive le funzioni interattive/elettroniche dello strumento giocattolo
        (luci, suoni, rotazione, ecc.).
    toy_tool_set_components_included:
      name: Componenti del set di strumenti giocattolo inclusi
      description: Elenca gli articoli specifici per il gioco di finzione inclusi
        nella confezione (in particolare per i set di attrezzi).
    toy_train_scale:
      name: Scala del treno giocattolo
      description: Specifica lo standard di scala per trenini giocattolo/modellini
        (o del sistema di binari) per garantire la compatibilità con treni e binari
        esistenti.
    toy_train_track_layout_type:
      name: Tipo di disposizione dei binari del trenino giocattolo
      description: Descrive la disposizione/la forma dei binari inclusi per un set
        di treni o di binari di espansione.
    toy_weapon_gadget_features:
      name: Caratteristiche delle armi e dei gadget giocattolo
      description: Evidenzia le caratteristiche interattive e funzionali comuni specifiche
        delle armi giocattolo e dei gadget da spia.
    tpms_sensor_frequency_band:
      name: Banda di frequenza del sensore TPMS
      description: Banda di frequenza radio supportata dagli accessori relativi al
        TPMS (ove applicabile).
    track_and_field_discipline:
      name: Disciplina dell'atletica leggera
      description: Identifica la specifica specialità o disciplina atletica per cui
        il prodotto è destinato (ad es. getto del peso, salto con l’asta, sprint).
    track_event_specialization:
      name: Specializzazione della gara su pista
      description: Indica il tipo di specialità per cui è ottimizzata la scarpa chiodata.
    track_field_event_suitability:
      name: Adattamento per le specialità di atletica leggera
      description: Identifica le specialità di atletica leggeri specifici per i quali
        è destinato l'ausilio per l'allenamento.
    track_set_special_features:
      name: Caratteristiche speciali del set della pista
      description: Evidenzia le caratteristiche di gioco più importanti incluse nel
        set della pista oltre alle macchinine e alla pista di base.
    track_surface_compatibility:
      name: Compatibilità con il tipo di superficie della pista
      description: Indica le superfici di corsa per cui è progettata la scarpa o il
        tacchetto.
    tracking_aid_type:
      name: Tipo di ausilio alla direzionalità
      description: Indica se il kayak include dispositivi che migliorano la tenuta
        della direzione in linea retta.
    traction_pattern_type:
      name: Tipo di schema di trazione
      description: Descrive la scanalatura o il disegno del battistrada principale
        che garantisce l'aderenza sul cuscinetto.
    trading_card_league:
      name: Lega delle carte collezionabili
      description: Identifica la lega sportiva associata al set di carte o al soggetto
        (ove applicabile).
    trailer_construction:
      name: Struttura del rimorchio
      description: Identifica il materiale di realizzazione principale del rimorchio
        per quanto riguarda telaio/carrozzeria (ad esempio, alluminio, acciaio o materiali
        misti).
    trailer_coupler_size:
      name: Misura dell'attacco del rimorchio
      description: Specifica le dimensioni della sfera del gancio di traino necessarie
        per il traino.
    trailer_hitch_mounting_location_method:
      name: Posizione/metodo di montaggio del gancio di traino
      description: Specifica dove e come il gancio di traino è montato sul veicolo
        (ad esempio, ricevitore posteriore, ricevitore anteriore, montaggio su telaio,
        su paraurti o su pianale).
    trailer_light_function:
      name: Funzione della luce del rimorchio
      description: Funzione principale/posizione della luce del rimorchio.
    trailer_suspension_type:
      name: Tipo di sospensione del rimorchio
      description: Specifica il tipo di sistema di sospensione utilizzato nel rimorchio
        per biciclette, come molle elicoidali o balestre, per migliorare il comfort
        di utilizzo e la protezione del carico.
    trailer_wiring_circuit:
      name: Circuito di cablaggio del rimorchio
      description: Elenca circuiti/segnali di illuminazione, freno e ausiliari trasportati
        dal cablaggio del rimorchio (ovvero, quali linee di alimentazione/massa e
        di segnale sono presenti).
    trailer_wiring_connector_type:
      name: Tipo di connettore del cablaggio del rimorchio
      description: Specifica lo standard della spina lato rimorchio/lato veicolo utilizzato
        per i cablaggi e gli adattatori del rimorchio.
    train_whistle_intended_use:
      name: Uso previsto del fischietto per treno
      description: Contesto di utilizzo principale previsto per il fischietto.
    train_whistle_sound_character:
      name: Carattere del suono del fischietto per treno
      description: Descrive le caratteristiche tonali percepite del suono del fischietto
        (timbro).
    trainer_mounting_type:
      name: Tipo di montaggio del trainer
      description: Descrive il tipo di interfaccia tra la bicicletta e il rullo (ad
        es. a contatto con la ruota o a trasmissione diretta).
    training_dummy_shape:
      name: Forma del manichino da addestramento
      description: Specifica il design o la forma generale del manichino, che influisce
        sulla presa del cane e sul realismo dell'addestramento.
    training_focus:
      name: Focus dell'allenamento
      description: Descrive l'area di competenza principale a cui l'ausilio si rivolge
        (ad esempio, riflessi, gioco di gambe, coordinazione occhio-mano).
    training_focus_area:
      name: Area di specializzazione dell'allenamento
      description: Specifica la competenza principale di lacrosse che l'ausilio è
        progettato per sviluppare.
    training_objective:
      name: Obiettivo di allenamento
      description: Specifica la competenza o la tecnica principale che il prodotto
        è progettato per migliorare.
    training_surface_suitability:
      name: Idoneità della superficie di allenamento
      description: Specifica su quali superfici è possibile utilizzare il dispositivo
        di allenamento.
    training_surface_usage:
      name: Utilizzo della superficie di allenamento
      description: Specifica le attività principali supportate dalla superficie di
        allenamento, distinguendo tra pannelli di ghiaccio sintetico pattinabile e
        tappeti per uso a terra o multisport.
    training_usage_type:
      name: Tipo di utilizzo per l'allenamento
      description: Specifica il periodo o contesto principale di utilizzo previsto
        per i pantaloni da allenamento, ad esempio uso diurno o notturno.
    trampoline_enclosure_type:
      name: Tipo di protezione del trampolino
      description: Specifica la configurazione della rete di protezione utilizzata
        sul trampolino, inclusi il modo e la posizione di montaggio della rete.
    trampoline_safety_certifications:
      name: Certificazioni di sicurezza del trampolino
      description: Indica a quali standard/certificazioni di sicurezza in materia
        di trampolini il prodotto dichiara di essere conforme.
    transfer_application_method:
      name: Metodo di applicazione del trasferimento
      description: Specifica come viene applicato il transfer al tessuto (ad esempio,
        tramite ferro da stiro o pressa a caldo).
    transfer_method:
      name: Metodo di applicazione
      description: Specifica come il disegno deve essere trasferito sul tessuto.
    transfer_peel_temperature:
      name: Temperatura di applicazione del transfer
      description: Specifica lo stato di temperatura consigliato (a caldo, tiepido
        o freddo) al quale il foglio di supporto deve essere rimosso dopo la pressatura.
    transmission_cooler_construction:
      name: Costruzione del radiatore della trasmissione
      description: Specifica il progetto costruttivo del nucleo del radiatore della
        trasmissione.
    transmission_fluid_specification:
      name: Specifiche del fluido della trasmissione
      description: Standard OEM/specifiche che il fluido della trasmissione soddisfa
        (ad esempio, famiglie Dexron/Mercon, ATF+4, JWS 3309).
    transmission_mount_bushing_material:
      name: Materiale della boccola del supporto della trasmissione
      description: Specifica il materiale elastomerico o isolante utilizzato nella
        boccola del supporto/isolatore (elemento di smorzamento delle vibrazioni).
    transmission_mount_type:
      name: Tipo di montaggio della trasmissione
      description: Specifica la costruzione/progettazione del supporto per la trasmissione
        (ad esempio, idraulico o rigido) per contribuire a determinarne l'adattamento,
        le caratteristiche NVH e l'uso previsto.
    transparency_level:
      name: Livello di trasparenza
      description: Descrive il grado di trasparenza delle pareti del contenitore,
        aiutando l'acquirente a scegliere tra una chiara visibilità e uno spazio di
        archiviazione nascosto.
    transport_case_type:
      name: Tipo di contenitore per il trasporto
      description: Classifica lo stile/la rigidità strutturale della soluzione di
        trasporto, riflettendo il livello di protezione e il metodo di imballaggio.
    transposition_modes:
      name: Modalità di trasposizione
      description: Specifica le modalità di trasposizione/intonazione da concerto
        supportate dall'accordatore (ad es. intonazione da concerto e tonalità traspositrici
        come Si♭ o Mi♭).
    trap_design:
      name: Design della trappola
      description: Identifica lo stile strutturale o il meccanismo della trappola,
        che determina il metodo di installazione e le specie o gli ambienti per i
        quali è più adatta.
    trap_spring_configuration:
      name: Configurazione della molla della trappola
      description: Indica il numero o la disposizione delle molle che azionano la
        trappola, che influisce sulla sua resistenza e sulla sua legalità.
    travel_bassinet_accessories_included:
      name: Accessori della culla da viaggio inclusi
      description: Elenco degli articoli supplementari forniti con la culla da viaggio.
    travel_spinning_wheel_assembly_required:
      name: Necessità di montaggio della ruota di filatura da viaggio
      description: Se la ruota richiede montaggio/configurazione oltre all'apertura
        (ad esempio, fissaggio del volantino, tensione, pedali) prima dell'uso.
    travel_spinning_wheel_portability_features:
      name: Caratteristiche di portabilità della ruota di filatura da viaggio
      description: Elementi di design legati alla portabilità per la ruota di filatura
        da viaggio, come la struttura pieghevole e le soluzioni di trasporto incluse.
    travel_trailer_appliances_fuel_type:
      name: Tipo di carburante degli elettrodomestici della roulotte
      description: Carburante principale utilizzato per gli elettrodomestici a bordo/il
        riscaldamento/la cottura (non per il veicolo trainante).
    travel_trailer_holding_tank_type:
      name: Serbatoio di raccolta per roulotte
      description: Indica quali serbatoi di raccolta sono presenti nella roulotte
        (selezionare tutti quelli pertinenti).
    travel_trailer_power_hookup_shore_power:
      name: Attacco per l'alimentazione elettrica della roulotte (corrente di terra)
      description: Standard di collegamento elettrico supportati per la connessione
        all'alimentazione da terra.
    tread_pattern_type:
      name: Tipo di pattern del battistrada
      description: Classifica il disegno complessivo del battistrada dello pneumatico,
        ad esempio liscio, semi-slick o tassellato, che influisce sulla trazione,
        sulla resistenza al rotolamento e sulla superficie di utilizzo prevista.
    treadmill_key_type:
      name: Tipo di chiave del tapis roulant
      description: Descrive lo stile fisico o il meccanismo di funzionamento/rilascio
        della chiave di sicurezza (ad esempio, rotonda magnetica, con inserto in plastica,
        a clip).
    treadmill_part_type:
      name: Tipo di parte del tapis roulant
      description: Identifica il componente specifico del tapis roulant che il prodotto
        è destinato a sostituire, consentendo all'acquirente di verificarne rapidamente
        la compatibilità (ad esempio, nastro o motore).
    treadmill_position:
      name: Posizione sul tapis roulant
      description: Indica la posizione di installazione del componente sul tapis roulant
        (anteriore, posteriore, superiore, inferiore, centrale).
    triangle_striker_material:
      name: Materiale del battente per triangolo
      description: Materiale del battente/percussore incluso.
    trigger_input_connector:
      name: Connettore di ingresso trigger
      description: Specifica lo standard del connettore fisico utilizzato per gli
        input trigger.
    trigger_input_connector_type:
      name: Tipo di connettore di input trigger
      description: Specifica il tipo di connettore fisico utilizzato per gli ingressi
        trigger.
    trigger_input_zone_support:
      name: Supporto della zona degli ingressi trigger
      description: Indica se gli ingressi trigger supportano trigger a zona singola
        e/o a doppia (ad es. testa/cerchio) e implementazioni multizona simili.
    trim_application_method:
      name: Metodo di applicazione del rivestimento
      description: Indica come il bordo decorativo deve essere fissato al progetto
        (ad esempio, da cucire, termoadesivo, con adesivo).
    trim_detail:
      name: Dettaglio del bordo decorativo
      description: Identifica i bordi o le finiture decorative più evidenti del capo
        (ad esempio, nappe, frange, bordi in pizzo).
    trim_elasticity:
      name: Elasticità della rifinitura
      description: Indica se il bordo a zig-zag è elastico e quindi adatto all'utilizzo
        su capi in maglia/abbigliamento sportivo.
    trim_finish:
      name: Finitura del bordo decorativo
      description: Variante della finitura superficiale applicata al profilo (ad esempio,
        metallizzata, glitterata, riflettente).
    trim_tilt_type:
      name: Tipo di assetto e inclinazione
      description: Indica se e in che modo il motore supporta la regolazione di assetto/inclinazione.
    trolleybus_power_supply_type:
      name: Tipo di alimentazione del filobus
      description: Specifica come il filobus riceve la potenza di trazione dalla rete
        elettrica.
    truck_bed_body_type:
      name: Tipo di cassone/carrozzeria del furgone
      description: Configurazione del pianale di carico o della carrozzeria dietro
        la cabina.
    truck_bed_length_class:
      name: Classe di lunghezza del cassone del furgone
      description: Indica la classe di lunghezza del cassone del furgone per cui la
        rete di carico è progettata (comunemente indicata come cassone corto/standard/lungo).
    truck_mounting_hole_pattern:
      name: Schema dei fori di fissaggio del truck
      description: Specifica il layout dei fori utilizzato per montare i truck sul
        deck (ad esempio, Old school, New school, universale).
    truck_mounting_style:
      name: Stile di montaggio del truck
      description: Modo in cui i truck sono fissati al deck (top mount, drop-through,
        ecc.), che influisce sull'altezza e sulla stabilità.
    truck_profile:
      name: Profilo del truck
      description: Indica la classificazione dell’altezza del truck dello skateboard
        rispetto al deck, influenzando il passaggio ruota e la sensazione di utilizzo
    trumpet_bell_material:
      name: Materiale della campana della tromba
      description: Materiale della campana (talvolta diverso dal resto dello strumento).
    trumpet_leadpipe_material:
      name: Materiale della bocchetta della tromba
      description: Materiale o trattamento utilizzato per il tubo principale (tubo
        che va dal bocchino alle valvole).
    trundle_mechanism:
      name: Meccanismo di scorrimento
      description: Descrive come il secondo letto viene estratto dal telaio principale.
    trunk_part_type:
      name: Tipo di parte del bagagliaio
      description: Specifica quale componente della carrozzeria relativo al bagagliaio
        viene venduto (ad esempio, cofano, cerniera, chiusura).
    tuba_leadpipe_material:
      name: Materiale per canneggio della tuba
      description: Indica il materiale utilizzato per la sezione del canneggio (bocchino)
        della tuba.
    tube_base_type:
      name: Tipo di base del tubo
      description: Specifica la famiglia di base/zoccolo del tubo utilizzata per l'innesto
        fisico/elettrico (ad es. Octal, Noval/9 pin).
    tube_matching_grade:
      name: Grado di accoppiamento dei tubi
      description: Indica se i tubi sono testati/accoppiati come set e il tipo di
        accoppiamento fornito.
    tube_weight_category:
      name: Categoria di peso del tubo
      description: Classifica il tubo in base alla costruzione/al peso (ad esempio,
        ultraleggero, standard, pesante) per un rapido confronto tra durata e prestazioni.
    tubeless_compatible:
      name: Compatibilità con tubeless
      description: Indica se la ruota è progettata per essere utilizzata senza camera
        d'aria quando abbinata a pneumatici tubeless.
    tubing_shape:
      name: Forma dei tubi
      description: Specifica la forma della sezione trasversale dei tubi del supporto.
    tubular_construction_type:
      name: Tipo di costruzione tubolare
      description: Specifica lo stile costruttivo degli pneumatici tubolari per bicicletta,
        distinguendo tra i tubolari tradizionali incollati e le varianti più recenti.
    tulip_type_flower_form:
      name: Tipo di tulipano (forma del fiore)
      description: Specifica il tipo orticolo/la forma dei tulipani nel mazzo (ad
        esempio, singolo, doppio, pappagallo).
    tuner_input_method:
      name: Metodo di ingresso del sintonizzatore
      description: Specifica come l'accordatore rileva l'intonazione (microfono, sensore
        di vibrazione/clip, ingresso cavo strumento, pickup a contatto).
    tuning_mechanism:
      name: Meccanismo di regolazione
      description: Come vengono tese/accordate le pelli dei bonghi.
    tuning_system:
      name: Sistema di accordatura
      description: Come il tamburo a calice viene accordato o se è accordabile.
    turn_signal_lens_color:
      name: Colore della lente dell'indicatore di direzione
      description: Colore della lente/copertura visibile sull'alloggiamento dell'indicatore
        di direzione (non il colore della luce emessa).
    turn_signal_lighting_style:
      name: Stile di illuminazione degli indicatori di direzione
      description: Stile/animazione della segnalazione visiva fornita dall'indicatore
        di direzione.
    turnip_and_rutabaga_variety:
      name: Varietà di rapa e rutabaga
      description: Identifica la specifica cultivar o varietà di rapa o rutabaga.
    tweeter_crossover_type:
      name: Tipo di filtro del tweeter
      description: Indica il tipo di filtro passa-alto e/o componente di protezione
        incluso con il tweeter, se presente.
    tweeter_material:
      name: Materiale del tweeter
      description: Materiale principale del diaframma/cupola del tweeter.
    tweeter_mount_type:
      name: Tipo di fissaggio del tweeter
      description: Specifica come il tweeter deve essere installato nel veicolo (metodo
        di montaggio/bulloneria).
    twill_direction:
      name: Direzione del twill
      description: Indica la direzione della diagonale del tessuto twill nel denim.
    twist_direction:
      name: Direzione della torsione
      description: Direzione della torsione del filato utilizzata nel filo (torsione
        S o torsione Z).
    u_joint_series_size:
      name: Serie/misura del giunto cardanico
      description: Specifica la serie del giunto cardanico o lo standard di misura
        utilizzato (ad esempio, serie 1310).
    uilleann_pipes_bag_material:
      name: Materiale per la sacca delle uilleann pipes
      description: Materiale della sacca (se presente), che influisce sulla sensazione,
        sulla durata e sulla manutenzione.
    uilleann_pipes_handedness:
      name: Mano dominante delle uilleann pipes
      description: Indica se il set è configurato per destrorsi o sinistrorsi.
    uilleann_pipes_set_configuration:
      name: Configurazione del set di uilleann pipes
      description: Specifica quale configurazione di uilleann pipes è inclusa, in
        base alla presenza di regolatori e droni.
    uk_childrens_shoe_size:
      name: Numero di scarpe per bambini nel Regno Unito
      description: Specifica il numero di scarpa per bambini UK, ad esempio 4 o 4
        Wide.
    uk_clothing_size:
      name: Taglia dei vestiti UK
      description: Specifica la taglia dei vestiti UK, ad esempio 12 o 18.
    uk_cup_size:
      name: Taglia della coppa UK
      description: Specifica la taglia della coppa del reggiseno UK, ad esempio C
        o FF.
    uk_mens_shoe_size:
      name: Numero di scarpa da uomo UK
      description: Specifica il numero di scarpa da uomo UK, ad esempio 9 o 9 Wide.
    uk_womens_shoe_size:
      name: Numero di scarpe per donne nel Regno Unito
      description: Specifica il numero di scarpe da donna nel Regno Unito, come 6
        o 6 Wide.
    ukulele_back_and_sides_wood:
      name: Legno di fondo e fasce dell'ukulele
      description: Indica il tipo di legno/materiale utilizzato per il fondo e le
        fasce dell'ukulele.
    ukulele_body_cutaway:
      name: Scasso sul corpo dell'ukulele
      description: Indica se il corpo dell'ukulele da concerto presenta una spalla
        mancante per facilitare l'accesso ai tasti superiori.
    ukulele_body_shape:
      name: Forma del corpo dell'ukulele
      description: Stile generale del corpo/forma utilizzata per l'ukulele.
    ukulele_bridge_material:
      name: Materiale del ponte dell'ukulele
      description: Specifica il materiale utilizzato per il ponte dell'ukulele.
    ukulele_construction_type:
      name: Tipo di costruzione dell'ukulele
      description: Modalità di realizzazione della tavola armonica, del fondo e delle
        fasce dello strumento (materiale pieno o laminato).
    ukulele_electronics_configuration:
      name: Configurazione elettronica dell'ukulele
      description: Indica se l'ukulele è solo acustico o include un'elettronica integrata
        (pickup e/o preamplificatore) per l'amplificazione.
    ukulele_string_re_entrant_tuning:
      name: Accordatura re-entrant dell'ukulele
      description: Indica se l'ukulele è configurato con accordatura re-entrant (Sol
        acuto) oppure lineare (Sol grave), una preferenza comune dell'acquirente che
        influenza il suono.
    ukulele_top_wood:
      name: Legno della tavola armonica dell'ukulele
      description: Identifica il tipo di legno/materiale utilizzato per la tavola
        armonica dell'ukulele.
    ukulele_tuner_mechanism:
      name: Meccanismo di accordatura dell'ukulele
      description: Specifica il tipo/meccanismo di accordatura utilizzato sull'ukulele.
    ukulele_tuner_type:
      name: Tipo di accordatore dell'ukulele
      description: Tipo di meccanica di accordatura utilizzata sulla paletta dell'ukulele.
    ukulele_tuning:
      name: Accordatura dell'ukulele
      description: Specifica l'accordatura standard prevista per l'ukulele tascabile.
    ultralight_aircraft_wing_configuration:
      name: Configurazione alare di un velivolo ultraleggero
      description: Posizione e configurazione dell'ala primaria rispetto alla fusoliera/struttura.
    under_bed_features:
      name: Funzionalità sotto il letto
      description: Identifica l'elemento funzionale principale situato sotto la base
        del letto.
    underfoot_strap_type:
      name: Tipo di cinturino sotto il piede
      description: Identifica il materiale o il design utilizzato per il cinturino
        che passa sotto la calzatura.
    underwear_fit:
      name: Vestibilità della biancheria intima
      description: Indica il profilo di vestibilità generale dei boxer (ad esempio,
        aderenti, larghi, a compressione).
    underwear_pieces_included:
      name: Pezzi dell'intimo inclusi
      description: Indica quali capi di abbigliamento sono forniti (parte superiore,
        parte inferiore, entrambi o intero) in modo che i clienti sappiano se stanno
        acquistando un set completo o un articolo individuale.
    uniform_pieces_included:
      name: Capi dell'uniforme inclusi
      description: Identifica quali parti del capo sono incluse (ad esempio, camicia,
        pantaloni, gilet), specificando il pacchetto prodotto per l'acquisto all'ingrosso
        o in kit.
    uniform_role:
      name: Ruolo dell'uniforme
      description: Specifica il ruolo professionale o l'ente per cui è destinata l'uniforme
        (ad esempio, Polizia, Sceriffo, Servizi di emergenza medica).
    update_method:
      name: Modalità di aggiornamento
      description: Modalità di distribuzione degli aggiornamenti del firmware/software
        per lo scanner.
    upholstery_fabric_backing_type:
      name: Tipo di supporto del tessuto di rivestimento
      description: Specifica il tipo di supporto/laminazione del tessuto di rivestimento
        che influisce sull'installazione e sulla sensazione.
    upholstery_fabric_water_resistance:
      name: Impermeabilità del tessuto di rivestimento
      description: Indica la resistenza all'acqua e alle macchie della superficie
        del tessuto di rivestimento.
    upper_material:
      name: Materiale superiore
      description: Specifica il materiale principale utilizzato nella parte superiore
        della scarpa da ginnastica, che influisce su traspirabilità, resistenza e
        aspetto.
    upright_bass_pickup_system:
      name: Sistema di pickup del contrabbasso
      description: Indica se il contrabbasso include un sistema di pickup/preamplificatore
        installato, destinato all'amplificazione.
    upright_piano_power_source:
      name: Alimentatore per pianoforte a muro
      description: Modalità di alimentazione di un pianoforte a muro, sia acustico
        senza alimentazione elettrica, sia a muro con sistemi silenziosi/ibridi che
        richiedono l'elettricità.
    urination_device_features:
      name: Caratteristiche del dispositivo per la minzione
      description: Evidenzia le caratteristiche di design particolari che migliorano
        la funzionalità o la praticità.
    us_childrens_shoe_size:
      name: Numero di scarpa per bambini US
      description: Specifica il numero di scarpa per bambini US, ad esempio 5 o 5
        Wide.
    us_clothing_size:
      name: Taglia dei vestiti US
      description: Specifica la taglia dei vestiti US, ad esempio 8 o 14.
    us_cup_size:
      name: Taglia della coppa US
      description: Specifica la taglia della coppa del reggiseno US, ad esempio C
        o DDD.
    us_mens_shoe_size:
      name: Numero di scarpa da uomo US
      description: Specifica il numero di scarpa da uomo US, ad esempio 10 o 10 Wide.
    us_ring_size:
      name: Misura dell'anello US
      description: Specifica la misura dell'anello US, ad esempio 7 o 9,5.
    us_womens_shoe_size:
      name: Numero di scarpa da donna US
      description: Specifica il numero di scarpa da donna US, ad esempio 8 o 8 Wide.
    usage:
      name: Utilizzo
      description: Descrive il caso d'uso previsto/la messa a punto dell'albero a
        camme.
    usda_honey_grade:
      name: Grado USDA del miele
      description: Indica il grado ufficiale assegnato al miele dal Dipartimento dell'Agricoltura
        degli Stati Uniti (USDA).
    user_control_method:
      name: Metodo di controllo dell'utente
      description: Indica come l'utente interagisce con la macchina (ad esempio, pannello
        di controllo integrato, telecomando, app, comandi vocali), informando sulla
        facilità d'uso.
    vacuum_boost_reference_port:
      name: Porta di riferimento del vuoto/pressione di sovralimentazione
      description: Indica se il regolatore include una porta di riferimento del vuoto/pressione
        di sovralimentazione e di che tipo è.
    valve_base_shape:
      name: Forma della base della valvola
      description: Identifica la geometria dell'interfaccia tra la base della valvola
        e il bordo (rotonda, conica, con passaggio laterale, a T, ecc.) che influisce
        sulla tenuta e sulla compatibilità con gli inserti in schiuma.
    valve_core_type:
      name: Tipo di nucleo della valvola
      description: Indica se il nucleo della valvola è rimovibile, fisso o senza nucleo,
        informazione che influisce sulle procedure di manutenzione e sulla compatibilità
        con gli strumenti di iniezione del sigillante.
    valve_cover_gasket_material:
      name: Materiale della guarnizione del coperchio delle valvole
      description: Specifica il materiale della guarnizione del coperchio delle valvole
        inclusa con il coperchio stesso, oppure il materiale della guarnizione consigliato
        nel caso in cui il coperchio venga venduto senza guarnizione (se applicabile).
    valve_cover_material:
      name: Materiale della copertura della valvola
      description: Materiale di realizzazione principale del coperchio della valvola.
    valve_design:
      name: Design della valvola
      description: Identifica la struttura/il design della valvola del motore.
    valve_guard_coverage_area:
      name: Area di copertura della protezione della valvola
      description: Indica quali parti della sezione della valvola sono protette dalla
        protezione.
    valvetrain_configuration:
      name: Configurazione del sistema di distribuzione
      description: Specifica il layout dell'albero a camme e del sistema di distribuzione.
    varnish_formulation_base:
      name: Base di formulazione della vernice
      description: Specifica la formulazione/chimica primaria della vernice per strumenti
        a corda, che influisce sull'aspetto, sulla reversibilità e sulla compatibilità
        con le finiture esistenti.
    varnish_transparency_tint:
      name: Trasparenza/tinta della vernice
      description: Descrive se la vernice è trasparente o colorata e, in caso di colorazione,
        la famiglia di tonalità generale.
    vegetable_matter_vm_content:
      name: Contenuto di materia vegetale (MV)
      description: Quantità di detriti vegetali/impurità presenti nella fibra.
    vegetable_preparation_style:
      name: Stile di preparazione della verdura
      description: Descrive come l'ortaggio viene presentato, tagliato o altrimenti
        preparato prima della vendita (ad esempio, intero, a cubetti, a cimette).
    vehicle_audio_dsp_form_factor:
      name: Fattore di forma DSP per l'audio nel veicolo
      description: Specifica il formato fisico/di installazione dell'unità DSP.
    vehicle_battery_charger_features:
      name: Caratteristiche del caricabatterie per veicoli
      description: Elenca la modalità operativa e le funzionalità integrate del caricabatterie
        per veicoli (ad esempio, modalità di mantenimento, desolfatazione).
    vehicle_body_filler_form:
      name: Formato del riempitivo per carrozzeria del veicolo
      description: Forma fisica/stile di imballaggio del riempitivo per carrozzeria.
    vehicle_coaxial_speaker_nominal_size:
      name: Dimensioni nominali dell'altoparlante coassiale del veicolo
      description: Dimensioni nominali degli altoparlanti utilizzata per la compatibilità
        di montaggio (ad esempio, 6,5 pollici, 6x9 pollici).
    vehicle_cover_size_class:
      name: Classe di dimensione della copertura del veicolo
      description: Raggruppamento generale delle dimensioni che indica per quale taglia
        di veicolo è progettata la copertura.
    vehicle_decor_set_items_included:
      name: Articoli inclusi nel set di decorazioni per veicoli
      description: Elenca le tipologie di articoli decorativi inclusi nel set di accessori
        (visibilità a livello di componente per gli acquirenti).
    vehicle_door_lock_actuation_method:
      name: Metodo di azionamento della serratura della portiera del veicolo
      description: Indica come viene azionato o controllato il blocco della portiera
        del veicolo.
    vehicle_door_lock_actuator_kit_contents:
      name: Contenuto del kit attuatore della serratura per portiera del veicolo
      description: Indica cosa è incluso con l'attuatore (solo l'attuatore o anche
        bulloneria/aste/staffe/cablaggio).
    vehicle_door_lock_actuator_wiring_configuration:
      name: Schema di cablaggio dell'attuatore della serratura per portiera del veicolo
      description: Specifica lo stile di cablaggio necessario per l'installazione
        (numero di fili e ruolo).
    vehicle_door_lock_included_components:
      name: Componenti inclusi nella serratura per portiera del veicolo
      description: Elenca i componenti inclusi nella confezione (utile per kit/assemblaggi).
    vehicle_electrical_connector_type:
      name: Tipo di connettore elettrico del veicolo
      description: Specifica il tipo di connettore o spina elettrica del regolatore/campo
        dell'alternatore (escluso il perno di uscita principale B+).
    vehicle_equipment_fit_out_level:
      name: Livello di allestimento dell'equipaggiamento del veicolo
      description: Indica il livello di allestimento per le forze dell'ordine incluso
        nel furgone.
    vehicle_glass_cleaner_form:
      name: Formato del detergente per vetri dell'auto
      description: Formato fisico del prodotto detergente per vetri dell'auto (ad
        esempio, spray, schiuma, salviette, gel, concentrato).
    vehicle_hitch_cover_illumination_type:
      name: Tipo di illuminazione del coprigancio del veicolo
      description: Specifica se il coprigancio di traino è dotato di illuminazione
        e di che tipo.
    vehicle_hitch_cover_mounting_type:
      name: Tipo di montaggio della copertura per il gancio traino del veicolo
      description: Indica il metodo utilizzato per fissare/bloccare il coprigancio
        nel ricevitore del gancio di traino.
    vehicle_license_plate_finish:
      name: Finitura della targa del veicolo
      description: Finitura superficiale della targa.
    vehicle_license_plate_frame_anti_theft_design:
      name: Design antifurto del telaio della targa del veicolo
      description: Elementi di design legati alla sicurezza, pensati per scoraggiare
        la rimozione o la manomissione.
    vehicle_license_plate_frame_plate_standard:
      name: Standard della piastra del telaio della targa del veicolo
      description: Standard/area geografica della targa per cui è adatto il telaio.
    vehicle_license_plate_frame_profile:
      name: Profilo del telaio della targa del veicolo
      description: Modo in cui il telaio delimita la targa (copertura/forma), influendo
        sulla leggibilità e sulla conformità.
    vehicle_license_plate_mounting_hole_count:
      name: Numero di fori di montaggio della targa del veicolo
      description: Numero di fori di montaggio sulla targa.
    vehicle_license_plate_mounting_hole_pattern:
      name: Disposizione dei fori di montaggio della targa identificativa del veicolo
      description: Schema di posizionamento dei fori di montaggio sulla targa.
    vehicle_license_plate_reflectivity:
      name: Riflettività della targa del veicolo
      description: Se e come la superficie della targa riflette la luce (importante
        per la visibilità e la conformità in alcune targhe speciali).
    vehicle_license_plate_size_standard:
      name: Standard di taglia della targa identificativa del veicolo
      description: Indica lo standard regionale/del veicolo per cui la targa è dimensionata
        (distanza tra i fori di montaggio e dimensioni complessive).
    vehicle_license_plate_text_style:
      name: Stile del testo della targa identificativa del veicolo
      description: Stile dei caratteri sulla targa(se presenti), inclusi rilievo e
        stampa.
    vehicle_license_plate_theme:
      name: Tema della targa identificativa del veicolo
      description: Tema di design generale della grafica della targa.
    vehicle_lift_actuation_method:
      name: Metodo di azionamento del sollevatore del veicolo
      description: Modo in cui viene azionato il sollevatore/martinetto per sollevare
        il veicolo.
    vehicle_lift_mounting_type:
      name: Tipo di installazione del sollevatore per veicoli
      description: Indica come è installato o ancorato il sollevatore nell'area di
        lavoro.
    vehicle_lift_type:
      name: Tipo di sollevatore del veicolo
      description: Specifica lo stile strutturale del sollevatore per veicoli utilizzato
        per la manutenzione o il rimessaggio (ad esempio, a 2 colonne, a 4 colonne,
        a forbice).
    vehicle_magnet_attachment_type:
      name: Tipo di attacco magnetico per veicoli
      description: Specifica il metodo di fissaggio/montaggio principale per i prodotti
        venduti come magneti per veicoli (ad esempio, solo magnetico o magnetico con
        supporto adesivo).
    vehicle_magnet_intended_use:
      name: Uso previsto del magnete per veicoli
      description: Indica l'uso principale previsto del magnete per il veicolo.
    vehicle_mirror_adjustment_type:
      name: Tipo di regolazione dello specchietto del veicolo
      description: Specifica come viene regolato/controllato lo specchietto.
    vehicle_mirror_glass_type:
      name: Tipo di vetro dello specchietto del veicolo
      description: Specifica il tipo ottico/la forma della superficie del vetro dello
        specchietto.
    vehicle_organizer_features:
      name: Funzionalità dell'organizer per veicoli
      description: Caratteristiche funzionali chiave degli organizer per veicolo,
        come la possibilità di essere piegati, la presenza di una fodera impermeabile,
        tasche termiche o base antiscivolo.
    vehicle_paint_chemistry_base:
      name: Chimica/base della vernice per veicoli
      description: Indica la formulazione/la composizione chimica della vernice utilizzata
        nella verniciatura dei veicoli.
    vehicle_polish_application_method:
      name: Metodo di applicazione del lucidante per veicoli
      description: Specifica il metodo o lo strumento raccomandato per l'applicazione
        del lucidante per veicoli.
    vehicle_pursuit_package:
      name: Pacchetto per inseguimento per veicoli
      description: Indica se il veicolo è dotato di un pacchetto prestazionale per
        uso in inseguimento destinato alle forze di polizia (ad esempio raffreddamento
        potenziato, freni, sospensioni e calibrazione specifica).
    vehicle_safety_equipment_position:
      name: Posizione delle attrezzature di sicurezza del veicolo
      description: Specifica in quale punto sopra o dentro il veicolo è previsto l'utilizzo
        o l'installazione delle attrezzature di sicurezza.
    vehicle_safety_equipment_visibility_features:
      name: Caratteristiche di visibilità delle attrezzature di sicurezza del veicolo
      description: Indica funzionalità che migliorano la visibilità, progettate per
        aumentarne la riconoscibilità.
    vehicle_seat_row:
      name: Fila di sedili del veicolo
      description: Indica a quale fila posteriore è destinato il sedile (seconda fila
        o terza fila), inclusa l'applicazione per sedili posteriori ribaltabili.
    vehicle_steering_assist_type:
      name: Tipo di assistenza alla sterzata del veicolo
      description: Specifica il sistema di assistenza alla sterzata per cui il componente
        è progettato.
    vehicle_steering_wheel_lock_form_factor:
      name: Fattore di forma del bloccasterzo del veicolo
      description: Descrive lo stile fisico del blocco e il modo in cui interagisce
        con il volante (e, facoltativamente, con altri comandi).
    vehicle_wax_polish_product_form:
      name: Forma della cera/lucidante per veicoli
      description: Forma fisica/formato di erogazione della cera, del lucidante, del
        protettivo o del sigillante.
    vehicle_wheel_valve_stem_type:
      name: Tipo di stelo della valvola della ruota del veicolo
      description: Specifica il tipo di stelo della valvola supportato o incluso.
    vehicle_windshield_fluid_formula:
      name: Formulazione del liquido lavavetri per veicoli
      description: Obiettivo di pulizia/rimozione principale della formulazione del
        liquido lavavetri.
    veil_length_type:
      name: Tipo di lunghezza del velo
      description: Classifica un velo utilizzando una terminologia standard basata
        sulla lunghezza anziché su misurazioni numeriche.
    vellum_opacity_level:
      name: Livello di opacità della velina
      description: Indica il grado di trasparenza o opacità della velina.
    ventilation_configuration:
      name: Configurazione della ventilazione
      description: Configurazione principale di ventilazione/aspirazione ed espulsione
        dell'aria del casco.
    ventilation_control_type:
      name: Tipo di controllo della ventilazione
      description: Specifica il tipo di gestione del flusso d'aria integrato nel casco.
    ventilation_level:
      name: Livello di ventilazione
      description: Indica il design relativo del flusso d'aria/ventilazione dell'armatura.
    venting_design:
      name: Presenza di ventilazione
      description: Specifica se e come il coperchio è ventilato per ridurre la condensa
        e la formazione di muffa durante lo stoccaggio.
    vestibule_type:
      name: Tipo di vestibolo
      description: Classifica la disposizione del vestibolo in relazione alla tenda.
    vibraphone_bar_material:
      name: Materiale della barra del vibrafono
      description: Materiale delle barre/tasti (che producono il suono) del vibrafono.
    vibraphone_motor_type:
      name: Tipo di motore del vibrafono
      description: Tipo di motore utilizzato per azionare le ventole rotanti del risonatore
        per il vibrato (se presente).
    vibraphone_range_octaves:
      name: Estensione del vibrafono (ottave)
      description: L'estensione del vibrafono espressa in ottave (ad esempio, 3 ottave,
        3,5 ottave).
    vibraphone_resonator_tube_material:
      name: Materiale del tubi risonatori del vibrafono
      description: Materiale dei tubi risonatori del vibrafono sotto le barre.
    vibraphone_tuning_standard:
      name: Standard di accordatura del vibrafono
      description: Tonalità di riferimento utilizzata per l'accordatura (A=440 Hz,
        ecc.).
    viewing_sides:
      name: Lati di visualizzazione
      description: Specifica quante facce del tabellone segnapunti visualizzano le
        informazioni (faccia singola, faccia doppia, faccia quadrupla, ecc.).
    vintage_advertisement_decade:
      name: Decennio della pubblicità vintage
      description: Specifica il decennio in cui l'annuncio è stato originariamente
        stampato o prodotto (approssimativo se l'anno esatto non è noto).
    vintage_advertisement_format:
      name: Formato dell'annuncio vintage
      description: Specifica il formato fisico o il supporto della pubblicità d'epoca
        da collezione.
    vintage_advertisement_subject_category:
      name: Categoria del soggetto della pubblicità d'epoca
      description: Identifica la categoria di prodotto/servizio pubblicizzata (di
        cosa si tratta nell'annuncio).
    vintage_classic_truck_cab_type:
      name: Tipo di cabina per camion vintage e classica
      description: Configurazione della cabina/tipologia della carrozzeria dell'abitacolo
        del camion.
    virginia_tech_helmet_star_rating:
      name: Valutazione in stelle del casco secondo Virginia Tech
      description: Valutazione di sicurezza assegnata dal Virginia Tech Helmet Lab
        (da 0 a 5 stelle).
    virtual_analog_synthesizer_form_factor:
      name: Fattore di forma del sintetizzatore analogico virtuale
      description: Specifica il formato fisico dello chassis del sintetizzatore (tastiera
        o modulo/rack).
    viscosity_thickness:
      name: Viscosità/spessore
      description: Descrive la consistenza, densa o fluida, della barbottina allo
        stato di vendita o alla consistenza di lavorazione raccomandata.
    vise_configuration:
      name: Configurazione della morsa
      description: Specifica il layout strutturale o il numero di pezzi del set di
        morse, che influisce sulla trasportabilità e sulla complessità di installazione.
    visibility_features:
      name: Funzionalità di visibilità
      description: Evidenzia gli elementi di design che migliorano la visibilità dell'utilizzatore
        nel traffico.
    visor_brim_type:
      name: Tipo di visiera/tesa
      description: Indica la presenza e lo stile della visiera o della tesa sul casco.
    visor_configuration:
      name: Configurazione della visiera
      description: Descrive la presenza e lo stile di eventuali visiere o schermi
        facciali integrati.
    visor_lens_finish:
      name: Finitura della lente della visiera
      description: Specifica la tinta, la finitura ottica o lo stile grafico applicati
        alla lente della visiera.
    visor_style:
      name: Stile della visiera
      description: Indica se il cappuccio è dotato di visiera/tesa e la sua configurazione.
    voc_compliance_standard:
      name: Standard di conformità COV
      description: Dichiarazione di conformità normativa in materia di COV per il
        prodotto (ove applicabile).
    voc_regulatory_class:
      name: Classe regolamentare dei COV
      description: Classe di conformità/regolamentazione dei COV dichiarata per il
        prodotto (secondo etichetta/scheda di sicurezza), utilizzata per le restrizioni
        normative e ambientali regionali.
    vodka_base_ingredient:
      name: Ingrediente base della vodka
      description: Ingrediente agricolo principale da cui viene distillata la vodka
        (ad esempio, grano, patate, mais).
    voice_coil_configuration:
      name: Configurazione della bobina mobile
      description: Numero/disposizione delle bobine mobili per flessibilità di cablaggio
        e opzioni di impedenza.
    voice_effects:
      name: Effetti vocali
      description: Effetti vocali integrati supportati dal kit karaoke.
    voltage_rating_type:
      name: Tipo di tensione nominale
      description: Specifica se la tensione nominale del fusibile si applica alla
        corrente alternata, alla corrente continua o a entrambe.
    voltage_regulator_connector_type:
      name: Tipo di connettore del regolatore di tensione
      description: Specifica il tipo di collegamento/terminale utilizzato per collegare
        il regolatore al cablaggio del veicolo/alternatore/generatore.
    wader_foot_type:
      name: Tipo di piede degli stivali da pesca
      description: Specifica se i waders hanno stivali integrati o calzari separati.
    wader_sole_type:
      name: Tipo di suola dei waders
      description: Specifica il materiale della suola o il tipo di trazione utilizzato
        negli stivali da wading o nei waders con calzari integrati.
    waistband_style:
      name: Stile della cintura
      description: Descrive la struttura della cintura e come viene fissata o regolata
        per garantire vestibilità e comfort.
    wakeboard_binding_mounting_pattern:
      name: Schema di montaggio degli attacchi sul wakeboard
      description: Specifica il modello di inserto/piastra sulla tavola da wakeboard
        con cui gli attacchi sono compatibili.
    wakeboard_riding_style:
      name: Stile di utilizzo del wakeboard
      description: Classifica l'ambiente o lo stile di utilizzo previsto per la tavola
        da wakeboard.
    wall_decal_style:
      name: Stile dell'adesivo da parete
      description: Specifica come viene prodotto/applicato l'adesivo (ad esempio,
        fustellato, trasferimento, foglio di adesivi).
    wallyball_equipment_included:
      name: Attrezzatura da wallyball inclusa
      description: Elenca i pezzi specifici forniti nel set di wallyball in modo che
        gli acquirenti sappiano esattamente cosa stanno acquistando e possano confrontare
        la confezione.
    warp_beam_type:
      name: Tipo di navetta dell'ordito
      description: Specifica la configurazione del subbio di ordito inclusa o installata
        nel telaio (configurazione del subbio fornita con il telaio).
    washability:
      name: Lavabilità
      description: Indica se la colla si pulisce con acqua e/o è lavabile dopo l'applicazione.
    watch_band_design:
      name: Design del cinturino dell'orologio
      description: Descrive lo stile di realizzazione o il modello di design di un
        cinturino per orologio (ad esempio, NATO, milanese, a maglie).
    watch_movement:
      name: Movimento dell'orologio
      description: Specifica il meccanismo che alimenta l'orologio, un fattore chiave
        che gli acquirenti utilizzano per differenziare i modelli.
    water_activation:
      name: Attivazione in acqua
      description: Se il segnalatore si attiva automaticamente in caso di immersione
        in acqua (caratteristica comune per EPIRB di categoria I/II).
    water_chamber_configuration:
      name: Configurazione della camera d'acqua
      description: Descrive il layout interno della camera d'aria del materasso, ad
        esempio a camera singola o doppia, che influisce su comfort, controllo della
        temperatura e disturbo del partner.
    water_dispensing_mechanism:
      name: Meccanismo di erogazione dell'acqua
      description: Definisce la modalità di erogazione dell'acqua dall'unità, ad esempio
        tramite rubinetti, ugelli a spruzzo o erogazione per gravità.
    water_exposure_protection_level:
      name: Livello di protezione dall'esposizione all'acqua
      description: Indica il livello di protezione del prodotto in caso di esposizione
        all'acqua (ad esempio, schizzi rispetto a immersione temporanea). Utilizzare
        il grado di protezione IP (Ingress Protection) quando è disponibile un codice
        IP ufficiale.
    water_fed_design:
      name: Design con alimentazione ad acqua
      description: Indica se la spazzola è progettata per l'uso con acqua corrente
        tramite impugnatura a passaggio d'acqua o collegamento a tubo.
    water_gun_features:
      name: Funzionalità della pistola ad acqua
      description: Caratteristiche funzionali rilevanti e accessori inclusi nella
        pistola ad acqua.
    water_gun_operating_mechanism:
      name: Meccanismo di funzionamento della pistola ad acqua
      description: Modo in cui la pistola ad acqua pressurizza ed espelle l'acqua
        durante l'uso.
    water_gun_spray_pattern:
      name: Getto della pistola ad acqua
      description: Il tipo di getto d'acqua prodotto dall'ugello durante l'uso.
    water_heating_method:
      name: Metodo di riscaldamento dell'acqua
      description: Descrive come, o se, l'acqua viene riscaldata prima dell'uso, ad
        esempio tramite assorbimento solare, bruciatori a propano, resistenze elettriche,
        riscaldamento a batteria, isolamento termico o senza riscaldamento.
    water_mattress_construction:
      name: Realizzazione del materasso ad acqua
      description: Specifica il tipo di realizzazione del materasso ad acqua (ad esempio,
        rigido o morbido), che determina la compatibilità con la struttura e la sensazione
        generale.
    water_play_features:
      name: Funzionalità di gioco con l'acqua
      description: Componenti per attività acquatiche incluse nel parco acquatico/scivolo.
    water_polo_competition_approval:
      name: Omologazione per competizione di pallanuoto
      description: Indica l'organismo di governo o il livello di competizione per
        cui il pallone è ufficialmente approvato o certificato.
    water_polo_goal_type:
      name: Tipo di porta da pallanuoto
      description: Classifica la configurazione strutturale o di montaggio della porta
        (ad esempio, galleggiante, fissata su ponte, portatile).
    water_pump_drive_type:
      name: Tipo di azionamento della pompa dell'acqua
      description: Specifica come viene azionata la pompa dell'acqua nel sistema di
        raffreddamento del veicolo.
    water_pump_housing_material:
      name: Materiale dell'alloggiamento della pompa dell'acqua
      description: Materiale dell'alloggiamento/corpo della pompa dell'acqua.
    water_pump_impeller_material:
      name: Materiale della girante della pompa dell'acqua
      description: Specifica il materiale della girante della pompa dell'acqua (rotore/paletta
        interna che muove il liquido di raffreddamento).
    water_pump_mounting_type:
      name: Tipo di montaggio della pompa dell'acqua
      description: Specifica il tipo di montaggio/formato della pompa dell'acqua per
        l'installazione sul motore (ad esempio, alloggiamento imbullonato o cartuccia/inserto).
    water_purification_method:
      name: Metodo di purificazione dell'acqua
      description: Identifica il meccanismo principale con cui il prodotto rende l'acqua
        potabile sul campo (ad esempio, pompa, alimentazione per gravità o luce UV).
    water_resistance:
      name: Resistenza all'acqua
      description: Indica il grado di protezione dagli agenti atmosferici fornito,
        ad esempio impermeabile o resistente all'acqua.
    water_resistance_level:
      name: Livello di resistenza all'acqua
      description: Indica se il tessuto è idrorepellente e a quale livello.
    water_resistance_rating_case_protection_level:
      name: Grado di resistenza all'acqua (livello di protezione involucro)
      description: Indica il livello di resistenza/protezione all'acqua offerto dal
        trolley/custodia rigida con ruote (valore dichiarato a livello commerciale,
        non classificazione IP per dispositivi elettronici), ad es. resistente all'acqua
        o impermeabile.
    water_rocket_kit_items_included:
      name: Articoli inclusi nel kit del razzo ad acqua
      description: Principali componenti inclusi nella confezione del prodotto.
    water_rocket_propulsion_type:
      name: Tipo di propulsione del razzo ad acqua
      description: Propulsione primaria/fonte di energia utilizzata per il lancio
        del razzo.
    water_rocket_recovery_system:
      name: Sistema di recupero del razzo ad acqua
      description: Metodo utilizzato per recuperare il razzo dopo il lancio.
    water_ski_base_design:
      name: Design della base per lo sci nautico
      description: Specifica il profilo dello scafo inferiore degli sci nautici, che
        influisce sulle caratteristiche di gestione.
    water_ski_fin_type:
      name: Tipo di pinna da sci nautico
      description: Specifica la configurazione delle pinne da sci nautico, che influisce
        sulla direzionalità e sulla manovrabilità.
    water_source:
      name: Fonte dell'acqua
      description: Consente di identificare l'origine dell'acqua prima della carbonatazione.
    water_sports_safety_standard:
      name: Standard di sicurezza per gli sport acquatici
      description: Elenca gli standard formali di sicurezza o di galleggiamento che
        il prodotto soddisfa (ad esempio, CE EN 1385 per i caschi, ISO 12402-5 per
        i giubbotti di salvataggio, USCG Tipo III).
    water_table_feature_set:
      name: Set di caratteristiche del tavolo gioco con acqua
      description: Evidenzia le caratteristiche di gioco integrate nel tavolo gioco
        con acqua, come cascate, spruzzi, pompe o vasche a più livelli.
    water_table_items_included:
      name: Articoli inclusi con il tavolo gioco con acqua
      description: Specifica quali accessori sono inclusi nel set del tavolo da gioco
        con acqua (ad esempio, barchette, bicchieri, imbuto, personaggi).
    water_table_water_source_type:
      name: Tipo di alimentazione dell'acqua del tavolo gioco con acqua
      description: Specifica come viene riempito o rifornito d'acqua il tavolo gioco
        con acqua.
    waterbed_stabilization_level:
      name: Livello di stabilizzazione del materasso ad acqua
      description: Indica il grado di riduzione delle onde o il controllo del movimento
        fornito dal materasso ad acqua.
    watercolor_ink_water_resistance_after_drying:
      name: Resistenza all'acqua dell'inchiostro acquerellabile (dopo l'asciugatura)
      description: Indica se l'inchiostro acquerellabile diventa resistente all'acqua/impermeabile
        dopo l'asciugatura (secondo quanto dichiarato dal produttore).
    watercraft_care_application_area:
      name: Area di applicazione per la manutenzione del natante
      description: Indica l'area o il componente principale di un natante su cui il
        prodotto è destinato ad essere utilizzato.
    watercraft_drive_mechanism:
      name: Meccanismo di azionamento del natante
      description: Descrive lo specifico meccanismo di propulsione di bordo installato
        o supportato.
    watercraft_fuel_tank_sending_unit_pattern:
      name: Schema del sensore di livello del carburante del serbatoio del natante
      description: Specifica lo schema/standard di montaggio per i sensori di livello
        del carburante e gli indicatori compatibili (ad esempio, gli schemi di foratura
        comuni in ambito nautico).
    watercraft_fuel_tank_shape:
      name: Forma del serbatoio di carburante del natante
      description: Descrive la forma fisica complessiva del serbatoio del carburante
        ai fini della pianificazione dello spazio/ingombro.
    watercraft_hull_material:
      name: Materiale dello scafo del natante
      description: Specifica il materiale principale di costruzione dello scafo.
    watercraft_ignition_part_voltage:
      name: Tensione della parte di accensione del natante
      description: Tensione nominale/requisito di tensione per la parte di accensione
        (ove applicabile), ad esempio sistemi a 12 V.
    watercraft_impeller_material_grade:
      name: Grado del materiale della girante del natante
      description: Specifica il materiale della girante del natante (ad esempio, gomma
        neoprene, nitrile, bronzo).
    watercraft_lighting_certification_compliance:
      name: Certificazione/conformità dell'illuminazione del natante
      description: Indica la conformità normativa/agli standard per cui la luce è
        certificata per l'uso nautico (ad esempio, conforme a USCG/ABYC/COLREGs).
    watercraft_motor_mount_adjustment_features:
      name: Caratteristiche di regolazione del supporto motore del natante
      description: Capacità di regolazione del supporto (ad esempio, inclinazione,
        sollevamento, scorrimento) che influiscono sull'usabilità e sull'adattamento.
    watercraft_piston_part_type:
      name: Tipo di componente del pistone del natante
      description: Identifica quale componente relativo al pistone rappresenta l'inserzione.
    watercraft_propeller_blade_rake:
      name: Rake delle pale dell'elica del natante
      description: Specifica il rake della pala (angolo della pala rispetto al mozzo),
        che influisce sul sollevamento della prua e sulle prestazioni.
    watercraft_propeller_rotation_direction:
      name: Direzione di rotazione dell'elica del natante
      description: Indica il senso di rotazione/orientamento dell'elica richiesto
        per la compatibilità con la trasmissione (ad esempio, destrorsa/standard o
        sinistrorsa/controrotazione).
    watercraft_pump_stage_impeller_role:
      name: Stadio/ruolo della girante della pompa del natante
      description: Indica se la girante è destinata a una specifica funzione di pompaggio
        (ad esempio, pompa per acqua grezza/mare, circolazione del liquido di raffreddamento,
        pompa a getto).
    watercraft_registration_status:
      name: Stato di immatricolazione del natante
      description: Indica se la barca a vela è dotata di documentazione di proprietà
        e/o di immatricolazione.
    watercraft_safety_equipment_activation_type:
      name: Tipo di attivazione delle attrezzature di sicurezza del natante
      description: Metodo primario di attivazione del dispositivo di sicurezza (per
        segnalatori luminosi/allarmi MOB/PLB), differente dall'illuminazione.
    watercraft_steering_cable_core_material:
      name: Materiale dell'anima del cavo di sterzo del natante
      description: Specifica il materiale del cavo/anima interna che trasmette la
        forza.
    watercraft_steering_cable_hardware_included:
      name: Bulloneria per il cavo di sterzo del natante inclusa
      description: Specifica quali componenti e accessori per l'installazione sono
        inclusi con il cavo dello sterzo.
    watercraft_steering_cable_system_type:
      name: Tipo di sistema di cavi di sterzo del natante
      description: Specifica l'architettura del sistema di sterzo per cui è progettato
        il cavo (ad esempio, rotativo, a palette).
    watercraft_steering_wheel_hub_bore_type:
      name: Tipo di mozzo/foro del volante delle imbarcazioni
      description: Specifica lo stile dell'interfaccia di montaggio/foro centrale
        (ad esempio, conico, scanalato) in cui la ruota si accoppia a un mozzo o a
        un adattatore.
    watercress_variety:
      name: Varietà di crescione
      description: Indica la varietà o il tipo specifico di crescione in vendita.
    waterproof_level:
      name: Livello di impermeabilità
      description: Indica il livello di protezione dall'acqua della calzatura, comprese
        eventuali dichiarazioni di impermeabilità supportate dalla garanzia.
    wax_blend_composition:
      name: Composizione della miscela di cera
      description: Elenca i materiali cerosi miscelati nel prodotto e/o la tipologia
        di miscela commercializzata.
    wax_coat_type:
      name: Tipo di rivestimento in cera
      description: Indica se la cera è destinata ad essere utilizzata come base, come
        finitura o come formula multiuso/monostrato.
    wax_hardness:
      name: Durezza della cera
      description: Indica la durezza relativa della cera, che influisce sulla durata
        e sullo scorrimento su diversi tipi di neve.
    wax_physical_form:
      name: Forma fisica della cera
      description: Indica la forma fisica in cui viene fornita la cera grezza per
        candele.
    wax_recommended_candle_application:
      name: Applicazione consigliata della cera per le candele
      description: Indica i principali stili di candela per cui la cera è formulata.
    wax_tackiness_level:
      name: Livello di appiccicolosità della cera
      description: Descrive il livello di aderenza/presa che la cera offre alla lama.
    weapon_system_integration:
      name: Integrazione del sistema d'arma
      description: Indica se il veicolo include sistemi d'arma integrati o supporti
        per armi.
    weather_suitability:
      name: Idoneità alle condizioni ambientali
      description: Indica le condizioni ambientali per cui i guanti sono progettati,
        come ad esempio il gioco in condizioni di freddo o pioggia.
    weave_finish:
      name: Tessitura/finitura
      description: Descrive la trama principale del tessuto o la finitura superficiale
        che influenza la consistenza e la lucentezza della cravatta.
    weave_style:
      name: Stile di tessitura
      description: Specifica il tradizionale motivo di tessitura utilizzato nella
        realizzazione del cappello Panama, che influisce su traspirabilità, flessibilità,
        aspetto e prezzo.
    weave_type:
      name: Tipo di tessitura
      description: Identifica lo stile di tessitura/realizzazione del tessuto (nome
        commerciale della tessitura) che influisce consistenza, lucentezza e caduta.
    weaving_beater_edge_type:
      name: Tipo di bordo del battente del telaio da tessitura
      description: Descrive il profilo del bordo di lavoro del battente piatto che
        entra in contatto con la trama (ad esempio, dritto o dentellato).
    weaving_beater_style:
      name: Stile del battente del telaio
      description: Identifica lo stile/formato funzionale del battente per tessitura
        piatta.
    weaving_shuttle_tip_style:
      name: Stile della punta della navetta per tessitura
      description: Specifica il design della punta/naso anteriore della navetta, che
        influisce sul modo in cui attraversa il passo dell'ordito e sulla probabilità
        di impigliarsi nei fili dell'ordito.
    weaving_shuttle_use_case:
      name: Caso d'uso della navetta per tessitura
      description: Specifica l'applicazione di tessitura prevista per la quale la
        navetta è stata progettata o ottimizzata.
    webbing_construction_type:
      name: Tipo di costruzione delle cinghie
      description: Descrive la struttura fisica dell'intreccio o della treccia della
        fettuccia, che influisce sulla maneggevolezza, sulla resistenza e sull'uso
        previsto.
    webbing_design:
      name: Design della membrana
      description: Descrive lo stile della membrana tra le dita, che influisce sull'allenamento
        contro resistenza e sulla propulsione.
    weight_adjustability:
      name: Regolabilità del peso
      description: Descrive se la resistenza del prodotto può essere modificata dall'utente
        (ad esempio, tramite selezione o carico variabile) oppure se è fissa a un
        singolo peso.
    weight_integration_system:
      name: Sistema di integrazione del peso
      description: Descrive se e come i pesi di zavorra sono integrati nel BCD (ad
        esempio, tasche per pesi rimovibili, nessuno, componente aggiuntivo opzionale).
    weight_plate_compatibility:
      name: Compatibilità con i dischi da pesi
      description: Definisce il diametro dei dischi da pesi accettati dalla macchina
        (olimpico, standard o entrambi).
    weight_plate_style:
      name: Stile del disco da pesi
      description: Classifica il design/tipo del disco da pesi (ad esempio, olimpico,
        bumper, a selezione) per un rapido filtraggio della compatibilità.
    weightlifting_belt_style:
      name: Stile della cintura da sollevamento pesi
      description: Classifica il design generale o la configurazione specifica della
        cintura in base allo scopo (ad esempio, cintura a leva, cintura da dip, cintura
        sagomata).
    weightlifting_federation_certification:
      name: Certificazione della federazione di sollevamento pesi
      description: Omologazione ufficiale o conformità del prodotto da parte di federazioni
        di sport di forza, come IPF o IWF.
    wetsuit_boot_height:
      name: Altezza dello stivale della muta
      description: Classifica l'altezza/il taglio dello stivale sulla gamba, che influisce
        sulla copertura, sulla mobilità e sull'ingresso dell'acqua.
    wetsuit_entry_system:
      name: Sistema di utilizzo della muta
      description: Descrive il tipo e la sede del sistema di apertura/cerniera utilizzato
        per indossare la muta.
    wetsuit_seam_construction:
      name: Realizzazione delle cuciture della muta
      description: Specifica come vengono realizzate e sigillate le cuciture, influendo
        su calore, flessibilità e durata.
    wheat_product_form:
      name: Forma del prodotto a base di grano
      description: Specifica la forma fisica o trasformata del prodotto a base di
        grano.
    wheel_arrangement:
      name: Disposizione delle ruote
      description: Specifica la disposizione delle ruote della locomotiva a vapore
        (notazione Whyte), che è una caratteristica distintiva e un termine comune
        tra i collezionisti e nelle ricerche.
    wheel_brake_type:
      name: Tipo di freno della ruota
      description: Descrive in dettaglio la configurazione del sistema frenante presente
        sulle ruote o sulle rotelle del carrello.
    wheel_chock_grip_features:
      name: Caratteristiche del bloccaruota
      description: Caratteristiche di design relative a trazione e aderenza su diverse
        superfici e contro gli pneumatici.
    wheel_cleaner_acidity_ph_category:
      name: Categoria di acidità/pH del detergente per cerchi
      description: Indica se il detergente per cerchi è acido, neutro o alcalino (e
        facoltativamente se è commercializzato come pH bilanciato).
    wheel_cleaner_formula_type:
      name: Tipo di formula del detergente per cerchi
      description: Per i detergenti per cerchi e le relative soluzioni di lavaggio,
        indica la categoria di formulazione principale del prodotto (ad esempio, a
        base acida, non acida, a pH neutro/bilanciato o reattiva al ferro).
    wheel_construction_type:
      name: Tipo di costruzione della ruota
      description: Specifica il metodo di fabbricazione/costruzione della ruota.
    wheel_contaminant_target:
      name: Contaminazione target delle ruote
      description: Specifica le principali tipologie di contaminazione che il detergente
        è progettato per rimuovere.
    wheel_core_type:
      name: Tipo di nucleo della ruota
      description: Descrive lo stile costruttivo del nucleo della ruota, che influisce
        su peso, rigidità e trasferimento di energia.
    wheel_cylinder_inlet_port_thread_standard:
      name: Standard di filettatura della porta di ingresso del cilindro della ruota
      description: Specifica lo standard della filettatura della porta di ingresso
        del tubo del freno sul cilindro della ruota (ad esempio, flangia metrica a
        bolla rispetto a flangia invertita SAE).
    wheel_fastener_seat_type:
      name: Tipo di sede del fissaggio della ruota
      description: Specifica il tipo di sede del dado/bullone che si accoppia con
        la ruota (ad esempio, conica/rastremata, sferica/a raggio, piatta, in lega/con
        gambo).
    wheel_illumination:
      name: Illuminazione della ruota
      description: Indica se la ruota è dotata di illuminazione integrata o di effetti
        luminosi.
    wheel_material:
      name: Materiale delle ruote
      description: Identifica la composizione primaria delle ruote, che influisce
        su durata, aderenza e smorzamento delle vibrazioni.
    wheel_profile:
      name: Profilo della ruota
      description: Descrive le forme della sezione trasversale della ruota che influenzano
        velocità, aderenza e agilità.
    wheel_setup_type:
      name: Tipo di configurazione della ruota
      description: Definisce lo stile di configurazione delle ruote utilizzato sui
        pattini.
    wheel_system_finish:
      name: Finitura del sistema di ruote
      description: Finitura/rivestimento superficiale di cerchi/ruote e di alcune
        parti/accessori delle ruote.
    whip_style:
      name: Stile della frusta
      description: Classifica il prodotto in base allo specifico stile di frusta o
        frustino da equitazione o alla disciplina per cui è destinato.
    whipped_cream_base:
      name: Base di panna montata
      description: Identifica l'ingrediente base principale utilizzato per preparare
        la panna montata, come la panna da cucina o il cocco.
    whipped_cream_form:
      name: Formato della panna montata
      description: Indica il formato fisico in cui viene venduta la panna montata.
    whistle_head_material:
      name: Materiale della testa del fischietto
      description: Specifica il materiale della testa/bocchino del fischietto (blocco/testa).
    whistle_light_features:
      name: Caratteristiche luminose del fischietto
      description: Indica se il fischietto include effetti luminosi integrati per
        feste (ad esempio, LED).
    whistle_purpose:
      name: Scopo del fischietto
      description: Identifica l'applicazione principale prevista per il fischietto
        (allenamento sportivo, sicurezza marittima, addestramento cani, ecc.).
    whistle_sound_style:
      name: Stile sonoro del fischietto
      description: Descrive lo stile/caratteristica del suono emesso dal fischietto
        (ad esempio, monotono o multitono).
    white_glue_finish_appearance_when_dry:
      name: Finitura/aspetto della colla ìuna volta asciutta
      description: Specifica l'aspetto della colla dopo l'asciugatura per progetti
        creativi/uso ufficio (ad esempio, trasparente o opaca).
    white_glue_washability:
      name: Lavabilità della colla bianca
      description: Indica se la colla secca può essere lavata via/rimossa da tessuti
        o pelle.
    whitewater_kayak_style:
      name: Stile del kayak per rapide
      description: Intento progettuale principale all'interno del segmento delle rapide
        (ad esempio, Creekboat, River Runner, Playboat).
    whitewater_rating_class:
      name: Classificazione delle rapide (classe)
      description: Livello di difficoltà fluviale più alto della scala internazionale
        che il gommone è in grado di gestire.
    whorl_mounting_interface:
      name: Interfaccia di montaggio del fusaiolo
      description: Modalità di collegamento del rocchetto alla ruota da filatura (tipo
        di albero/relazione).
    wick_construction_type:
      name: Tipo di costruzione dello stoppino
      description: Struttura/stile dello stoppino (intrecciato, piatto, a treccia
        quadrata, con anima, in legno, ecc.).
    wick_core_type:
      name: Tipo di nucleo dello stoppino
      description: Indica se lo stoppino è privo di anima oppure include un materiale
        di supporto (ad es. con anima in carta o in zinco), influenzando rigidità
        e caratteristiche di combustione.
    wick_tab_crimp_type:
      name: Tipo di crimpatura per stoppino
      description: Modalità di fissaggio della linguetta dello stoppino (costruzione/stile
        di crimpatura).
    wick_tab_material:
      name: Materiale della linguetta dello stoppino
      description: Materiale della scheda/supporto allegato (comunemente banda stagnata),
        rilevante per la resistenza alla corrosione e le preferenze normative (ad
        esempio, per evitare il piombo).
    wick_tab_shape:
      name: Forma della linguetta dello stoppino
      description: Forma/fattore di forma della piastra della linguetta dello stoppino.
    wick_type_included:
      name: Tipo di stoppino incluso
      description: Specifica il materiale/tipo di stoppino incluso nel kit.
    wig_fiber_material:
      name: Materiale della fibra della parrucca
      description: Identifica la fibra principale utilizzata per i capelli della parrucca,
        in modo che l'acquirente possa scegliere facilmente tra varietà di capelli
        umani e opzioni sintetiche con diverse caratteristiche di styling e durata.
    wildlife_attractant_scent:
      name: Profumo attrattivo per animali selvatici
      description: Identifica l'odore principale utilizzato per attirare la fauna
        selvatica, comprendendo sia gli odori naturali del cibo che quelli di tipo
        feromonale.
    willow_grade:
      name: Grado Willow
      description: Specifica il grado di qualità del salice utilizzato, indicando
        la struttura delle venature e il livello di prestazioni complessive.
    willow_type:
      name: Tipo di salice
      description: Indica il tipo di salice o materiale alternativo utilizzato per
        la lama della mazza, fattore che influisce notevolmente su prestazioni, durata
        e prezzo.
    wind_up_mechanism_type:
      name: Tipo di meccanismo a carica
      description: Specifica come il giocattolo viene caricato o attivato.
    wind_up_toy_movement_pattern:
      name: Schema di movimento del giocattolo a carica manuale
      description: Descrive il movimento principale prodotto durante la carica.
    windbreak_purpose:
      name: Scopo del frangivento
      description: Definisce l'uso primario previsto del frangivento.
    windfoil_board_mounting_system:
      name: Sistema di montaggio della tavola da windfoil
      description: Specifica la scatola della pinna foil o l'interfaccia di montaggio
        integrata nella tavola da windfoil.
    windfoil_sail_style:
      name: Stile della vela windfoil
      description: Classifica la vela in base allo stile di navigazione o alla disciplina
        per cui è destinata.
    winding_direction:
      name: Direzione di avvolgimento
      description: Indica il senso di rotazione supportato dal carica orologi (orario,
        antiorario o bidirezionale).
    winding_method:
      name: Metodo di avvolgimento
      description: Modalità di avvolgimento/caricamento della trama per l'utilizzo
        nella navetta.
    winding_speed_control_type:
      name: Tipo di controllo della velocità di carica
      description: Indica il metodo utilizzato per controllare la velocità di avvolgimento
        durante l'uso.
    winding_type:
      name: Tipo di avvolgimento
      description: Specifica la struttura di avvolgimento delle corde del basso (profilo
        di avvolgimento esterno).
    windlass_control_station_type:
      name: Tipo di stazione di controllo del verricello
      description: Tipo di interfaccia di controllo inclusa o supportata per il funzionamento
        del verricello.
    windlass_mount_type:
      name: Tipo di montaggio del verricello
      description: Dove/come si intende montare il verricello sull'imbarcazione.
    window_component_location:
      name: Posizione del componente del finestrino
      description: Specifica a quale finestrino/apertura si applica il componente
        all'interno del veicolo (ad esempio, parabrezza, vetro della portiera, lunotto
        posteriore o vetro laterale).
    window_configuration:
      name: Configurazione della finestra
      description: Indica la presenza e le dimensioni relative delle finestre di visibilità
        trasparenti sull'ala da wingfoil.
    window_glass_construction:
      name: Realizzazione del vetro dei finestrini
      description: Specifica la struttura di sicurezza/laminazione del vetro dei finestrini
        degli autoveicoli.
    window_glass_features:
      name: Caratteristiche del vetro dei finestrini
      description: Indica se gli accessori per il vetro integrano tecnologie del veicolo
        (ad es. sensore pioggia, supporto per telecamera).
    window_glass_finish:
      name: Finitura del vetro dei finestrini
      description: Specifica la variante di finitura/tinta/privacy del vetro dei finestrini
        degli autoveicoli.
    window_glass_tint_color:
      name: Tinta del vetro della finestra
      description: Specifica la tonalità di colore della tinta presente nel vetro
        (non il colore generale del prodotto).
    window_glass_tint_level:
      name: Livello di tinta del vetro dei finestrini
      description: Indica il livello approssimativo di oscuramento di fabbrica/privacy
        del vetro del finestrino (non una pellicola applicata successivamente). Utilizzare
        livelli descrittivi quando non si conosce il valore esatto del VLT.
    window_net_latch_mechanism:
      name: Meccanismo di chiusura della zanzariera per finestre
      description: Specifica il meccanismo di bloccaggio/sblocco utilizzato per la
        rete di protezione per finestrino (ad esempio, pulsante, leva, fibbia tipo
        cintura di sicurezza).
    window_net_mounting_hardware:
      name: Ferramenta per il montaggio di reti per finestrino
      description: Identifica il tipo di ferramenta di montaggio o il metodo di fissaggio
        utilizzato per installare la rete del finestrino (ad es. a clip, a viti, a
        gancio/asta), oppure se la ferramenta è inclusa.
    window_net_opening_direction:
      name: Direzione di apertura della rete
      description: Specifica come la rete del finestrino si apre/si sblocca in relazione
        all'occupante per consentire l'uscita e garantire il rispetto delle normative.
    window_regulator_operation:
      name: Funzionamento dell'alzacristallo
      description: Specifica la modalità di azionamento del meccanismo alzacristalli
        (manuale a manovella o elettrico).
    windshield_coverage_area:
      name: Area di copertura del parabrezza
      description: Specifica quali parti della parte anteriore esterna del veicolo
        la copertura del parabrezza è progettata per proteggere (ad esempio, solo
        il parabrezza o include tergicristalli, specchietti, finestrini laterali o
        bordo del cofano).
    windshield_mount_attachment_method:
      name: Metodo di fissaggio del parabrezza
      description: Specifica come il supporto aderisce o si fissa alla superficie
        del parabrezza.
    windshield_washer_fluid_seasonality:
      name: Stagionalità del liquido lavavetri
      description: Indica la stagione/il clima o l'uso principale previsto per la
        formulazione del liquido lavavetri (ad esempio, sbrinatore invernale, detergente
        per insetti durante la stagione estiva, per tutte le stagioni).
    windsurf_fin_style:
      name: Stile della pinna da windsurf
      description: Classifica la pinna in base alla disciplina velica o allo stile
        di utilizzo previsto (ad esempio, wave, slalom, weed).
    windsurfing_connection_standard:
      name: Standard di collegamento windsurf
      description: Interfaccia meccanica o tipo di scatola utilizzata per fissare
        il componente alla tavola o al supporto.
    windsurfing_sail_style:
      name: Stile della vela da windsurf
      description: Classifica la vela in base alla disciplina o all'utilizzo previsto,
        ad esempio wave, freeride o foil.
    wine_additive_type:
      name: Tipo di additivo per il vino
      description: Specifica di che tipo di prodotto per la vinificazione del vino
        rosso si tratta (ingrediente, additivo, lievito, agente chiarificante, kit,
        ecc.).
    wine_body:
      name: Corpo del vino
      description: Descrive la corposità percepita e la sensazione al palato del vino.
    wine_carbonation:
      name: Carbonazione del vino
      description: Indica se il vino è fermo, semi-frizzante o spumante e, se del
        caso, l'intensità dell'effervescenza.
    wine_making_ingredient_type:
      name: Tipo di ingrediente per la produzione del vino
      description: Specifica la categoria di ingredienti funzionali per additivi e
        ingredienti di consumo utilizzati nella vinificazione.
    wine_making_stage:
      name: Fase della vinificazione
      description: Indica la fase del processo di vinificazione per cui il prodotto
        è destinato.
    wine_style:
      name: Stile del vino
      description: Classifica le principali tipologie di produzione del vino, oltre
        al colore, come fermo, spumante o liquoroso.
    winemaking_process_stage:
      name: Fase del processo di vinificazione
      description: Indica la fase principale del processo di vinificazione per cui
        il prodotto è destinato.
    wing_count:
      name: Numero di ali
      description: Numero di ali/bracci del boomerang.
    wing_handle_type:
      name: Tipo di maniglia dell'ala
      description: Specifica il tipo di sistema di impugnatura sull'ala wingfoil.
    wing_part_type:
      name: Tipo di parte dell'ala
      description: Identifica il componente specifico o il pezzo di ricambio per un'ala
        wingfoil.
    wingfoiling_style:
      name: Stile di wingfoiling
      description: Indica la specifica disciplina di wingfoiling o lo stile di navigazione
        a cui il prodotto è destinato.
    wiper_arm_finish:
      name: Finitura del braccio del tergicristallo
      description: Finitura superficiale o rivestimento protettivo applicato al braccio
        del tergicristallo, che influisce su resistenza alla corrosione e aspetto
        estetico.
    wiper_arm_pivot_mount_type:
      name: Tipo di montaggio sul perno del braccio del tergicristallo
      description: Specifica come il braccio del tergicristallo si fissa al leveraggio
        o al perno del tergicristallo del veicolo.
    wiper_blade_attachment_type:
      name: Tipo di attacco della spazzola tergicristallo
      description: Specifica il tipo di connettore/attacco utilizzato per montare
        la spazzola tergicristallo sul braccio del tergicristallo.
    wiper_blade_rubber_material:
      name: Materiale in gomma della spazzola tergicristallo
      description: Materiale dell'elemento tergicristallo (inserto/ricambio) che entra
        in contatto con il vetro.
    wiper_system_position:
      name: Posizione del sistema tergicristallo
      description: Indica la posizione di montaggio del sistema tergicristallo sul
        veicolo.
    wire_coating_material:
      name: Materiale di rivestimento del filo
      description: Specifica il materiale del rivestimento esterno/guaina applicato
        al filo (non il materiale del nucleo del filo), che può influire sulla resistenza
        all'abrasione e sulla scorrevolezza del passaggio attraverso i fori delle
        perline.
    wire_coating_type:
      name: Tipo di rivestimento del filo
      description: Specifica se e come il filo è rivestito/coperto (per colore, protezione
        e consistenza).
    wire_construction_type:
      name: Tipo di costruzione dello pneumatico
      description: Specifica la struttura fisica del filo per perline, ad esempio
        se è a trefoli o solido e se è rivestito.
    wire_finish:
      name: Finitura del filo
      description: Specifica la finitura superficiale, il rivestimento o la placcatura
        applicati al filo (ad esempio, lucidato, smaltato, zincato, placcato), che
        influiscono sull'aspetto e sulla resistenza all'ossidazione/corrosione.
    wire_gauge_awg:
      name: Calibro del filo (AWG)
      description: Calibro del filo americano (AWG) per i conduttori utilizzati nel
        cablaggio.
    wire_insulation_material:
      name: Materiale isolante del filo
      description: Materiale dell'isolamento/guaina del filo utilizzato nel cablaggio
        (che influisce su resistenza alla temperatura/resistenza chimica).
    wire_packaging_type:
      name: Tipo di imballaggio del filo
      description: Specifica le modalità di vendita/confezionamento del filo.
    wire_shape_profile:
      name: Forma/profilo del filo
      description: Descrive la forma della sezione trasversale del filo.
    wiring_configuration:
      name: Configurazione del cablaggio
      description: Indica se la spada da scherma è fornita pre-cablata per il punteggio
        elettrico, non cablata, wireless o destinata all'allenamento senza elettricità.
    wobbler_style:
      name: Stile Wobbler
      description: Definisce lo specifico design/stile di azione del wobbler, come
        ad esempio crankbait o jerkbait.
    wood_block_surface_preparation:
      name: Preparazione della superficie del blocco di legno
      description: Indica lo stato della superficie del blocco di legno pronta all'uso
        per la finitura e progetti creativi.
    wood_grain_direction:
      name: Direzione delle venature del legno
      description: Direzione delle venature del legno rispetto alla dimensione maggiore
        del prodotto (importante per resistenza, comportamento al taglio e aspetto).
    wood_slice_edge_style:
      name: Stile del bordo del disco di legno
      description: Condizione del bordo del disco, ad esempio con corteccia naturale
        rispetto a bordo liscio/levigato.
    wooden_block_special_features:
      name: Caratteristiche speciali del blocco di legno
      description: Caratteristiche funzionali rilevanti incluse nel set di blocchi
        di legno.
    woodwind_body_construction:
      name: Realizzazione della cassa degli strumenti a fiato
      description: Indica se lo strumento è realizzato in un unico pezzo o in più
        sezioni (ad esempio, 2 pezzi/3 pezzi), il che influisce sulla pulizia, sulla
        conservazione e sul trasporto.
    woodwind_polishing_cloth_intended_use:
      name: Uso previsto del panno per la lucidatura degli strumenti a fiato
      description: Specifica quale strumento a fiato il panno per pulire/lucidare
        è principalmente progettato.
    woodwind_small_part_type:
      name: Tipo di piccolo componente per strumento a fiato
      description: Specifica di che tipo di piccolo ricambio per clarinetto si tratta
        (ad esempio, meccanica delle chiavi, tamponi/sughero/feltri, anelli).
    woofer_mounting_type:
      name: Tipo di montaggio del woofer
      description: Modalità di montaggio/utilizzo previste per il woofer (a sospensione
        libera o in cassa) e tipologie di montaggio più comuni in ambito automobilistico.
    woofer_surround_material:
      name: Materiale per la sospensione del woofer
      description: Materiale utilizzato per il bordo del woofer (anello di sospensione
        esterno).
    worn_on_finger:
      name: Dito di utilizzo
      description: Specifica su quale dito deve essere indossata la guida per il ditale.
    wrap_style:
      name: Stile di avvolgimento
      description: Indica quante volte la cintura deve essere avvolta intorno alla
        vita.
    wrapping_occasion:
      name: Occasione della carta regalo
      description: Principale occasione di festa/celebrazione per cui è destinata
        la carta da regalo.
    wrapping_paper_features:
      name: Caratteristiche della carta da regalo
      description: Proprietà funzionali e legate alla sostenibilità della carta da
        regalo, come la resistenza allo strappo, il materiale riciclato o i formati
        di fogli pretagliati.
    wrestling_dummy_design:
      name: Design del manichino da wrestling
      description: Forma generale del corpo o postura del manichino, come ad esempio
        una persona in piedi o un sacco da boxe, che determina gli esercizi di allenamento
        applicabili.
    wrestling_mat_safety_certifications:
      name: Certificazioni di sicurezza per i tappeti da wrestling
      description: Elenca eventuali certificazioni o standard di sicurezza di settore
        o di enti sportivi che il tappetino soddisfa.
    wrist_strap_style:
      name: Stile del cinturino da polso
      description: Descrive il tipo di cinturino (o la sua assenza) che influisce
        su supporto e vestibilità.
    wrist_support_style:
      name: Stile dell'ausilio per il polso
      description: Identifica la struttura o lo stile dell'ausilio per il polso, come
        tutore, guanto, nastro adesivo o fasciatura, per aiutare l'utente a scegliere
        in base alle proprie preferenze e prestazioni.
    xylophone_range_octaves:
      name: Estensione dello xilofono (ottave)
      description: Estensione totale dello xilofono espressa in ottave (ad esempio,
        2,5 ottave, 3 ottave, 4 ottave).
    xylophone_resonator_type:
      name: Tipo di risonatore dello xilofono
      description: Tipo di sistema di risonatori utilizzato per amplificare il tono
        (se presente).
    yam_variety:
      name: Varietà di igname
      description: Specifica la cultivar o la varietà comune di igname venduta (ad
        esempio, viola, giallo, a piede d'elefante).
    yarn_cutter_physical_style:
      name: Stile fisico del taglia-filato
      description: Identifica lo stile fisico del taglia-filato (ad esempio, pendente,
        anello, forbici) per facilitare la navigazione e il filtraggio all'interno
        di questa categoria.
    yarn_finish_or_effect:
      name: Finitura o effetto del filato
      description: Evidenzia i particolari trattamenti visivi o funzionali applicati
        al filato, come la fluorescenza o la brillantezza metallica.
    yarn_guide_style:
      name: Stile della guida per filato
      description: Stile fisico del componente di guida del filato.
    yarn_swift_adjustability:
      name: Regolabilità del cavalletto avvolgifilo
      description: Indica se e come il dispositivo di avvolgimento può essere regolato
        (espandibile, ripiegabile/comprimibile), influenzando lo stoccaggio e la gamma
        di matasse di filo che può ospitare.
    yarn_swift_bearing_type:
      name: Tipo di cuscinetto del cavalletto avvolgifilo
      description: Descrive il meccanismo di assistenza alla rotazione (ad esempio,
        cuscinetto a sfere) che influisce sulla fluidità e sulla velocità di avvolgimento.
    yeast_application:
      name: Applicazione del lievito
      description: Indica l'uso culinario o di fermentazione principale previsto per
        il prodotto a base di lievito.
    yo_yo_accessory_part_type:
      name: Tipo di accessorio/parte per yo-yo
      description: Identifica il tipo di ricambio o accessorio per yo-yo di cui si
        tratta (ad esempio, cordino, cuscinetto, cuscinetti di risposta).
    yo_yo_axle_system_type:
      name: Tipo di sistema dell'asse per yo-yo
      description: Approccio costruttivo dell'asse per yo-yo (ad esempio, asse fisso
        vs transaxle), che influisce su sensazione durante l'uso e manutenzione.
    yo_yo_bearing_size_class:
      name: Classe di misura del cuscinetto dello yo-yo
      description: Classe di misura del cuscinetto standardizzata utilizzata dallo
        yo-yo, ove applicabile.
    yo_yo_bearing_type:
      name: Tipo di cuscinetto per yo-yo
      description: Configurazione dei cuscinetti che influisce su reattività e caratteristiche
        di rotazione.
    yo_yo_play_style:
      name: Stile di gioco dello yo-yo
      description: Principale stile di gioco previsto per lo yo-yo, che riflette la
        disciplina del lancio di yo-yo e dei trick per cui il prodotto è stato progettato.
    yo_yo_response_system:
      name: Sistema di risposta dello yo-yo
      description: Specifica il meccanismo di risposta dello yo-yo per cui questo
        componente è progettato (compatibilità).
    yo_yo_responsiveness:
      name: Reattività dello yo-yo
      description: Se lo yo-yo ritorna in mano con uno strattone (responsivo) o richiede
        una manovra di bind (non responsivo).
    yo_yo_string_material:
      name: Materiale del cordino dello yo-yo
      description: Composizione dei materiali del cordino dello yo-yo.
    yogurt_base_ingredient:
      name: Ingrediente base dello yogurt
      description: Indica la principale fonte di latte o vegetale utilizzata per la
        produzione dello yogurt, informazione fondamentale per valutare le preferenze
        dietetiche e le eventuali allergie.
    yoke_type:
      name: Tipo di giogo
      description: Identifica il tipo di culla o forcella che fissa l'arma da fuoco
        sul monopiede.
    zill_playing_style:
      name: Stile di suonare le zill
      description: Contesto di gioco/stile previsto (comunemente danza del ventre
        rispetto a variante orchestrale/culturale).
    zill_strap_material:
      name: Materiale del cinturino delle zill
      description: Materiale del cinturino/elastico utilizzato per tenere i cimbali
        (se presente), che influisce su comfort, durata e presa.
    zills_strap_adjustability:
      name: Regolazione del cinturino dei cimbali
      description: Se e come il cinturino/elastico incluso può essere regolato per
        una vestibilità ottimale.
    zipper_application:
      name: Applicazione della cerniera
      description: Specifica il progetto o l'applicazione per cui è stata progettata
        la cerniera.
    zipper_chain_type:
      name: Tipo di catena della cerniera
      description: Specifica la struttura/il tipo di catena/denti della cerniera.
    zipper_end_type:
      name: Tipo di chiusura della cerniera
      description: Indica come termina la cerniera e se è divisibile (a separazione)
        o a fondo chiuso (non divisibile), includendo le comuni tipologie di terminale
        nei lavori artigianali.
    zipper_gauge:
      name: Calibro della cerniera
      description: 'Indica la denominazione del calibro/taglia della catena della
        cerniera, in genere espressa con un numero preceduto da # (ad esempio, #3
        o #5), che corrisponde alla larghezza dei denti/spirali e all''uso previsto.'
    zipper_opening_length:
      name: Lunghezza di apertura della cerniera
      description: Definisce quanta parte dell'apertura frontale è chiusa dalla cerniera,
        distinguendo i modelli a copertura totale da quelli a mezza copertura o a
        un quarto di copertura.
    zipper_pull_material:
      name: Materiale del cursore della cerniera
      description: Specifica il materiale del cursore o della linguetta della cerniera
        (parte che si impugna), distinguendolo dai dentini/catena e dal nastro della
        cerniera.
    zipper_pull_side:
      name: Lato del cursore della cerniera
      description: Specifica da quali lati della cerniera è possibile accedere al
        cursore.
    zipper_pull_strap_cord_tab_material:
      name: Materiale di cursore/cordino/cinghia per tirare la cerniera
      description: Materiale della cinghia/cordino/linguetta/pompon attaccato al cursore
        della cerniera (se presente), esclusa la struttura principale del cursore
        della cerniera.
    zipper_reversibility_mechanism:
      name: Meccanismo di reversibilità della cerniera
      description: Specifica come la cerniera è reversibile (ad esempio, cursore a
        doppio lato rispetto a cursore ribaltabile/autobloccante progettato per capi
        reversibili).
    zipper_separating_type:
      name: Tipo di separazione della cerniera
      description: Indica se la cerniera si apre in basso/in alto oppure è chiusa,
        per adattarsi a giacche, sacchi a pelo, borse, ecc.
    zipper_side:
      name: Lato della cerniera
      description: Specifica il lato su cui si trova la cerniera principale quando
        il sacco a pelo è disteso a faccia in su.
    zipper_slider_material:
      name: Materiale del cursore della cerniera
      description: Specifica il materiale del cursore della cerniera (il meccanismo
        mobile), che può influire su resistenza agli urti e corrosione.
    zipper_slider_pull_configuration:
      name: Configurazione del cursore/tirante della cerniera
      description: Indica se la cerniera ha uno o due cursori e se i cursori si trovano
        su uno o entrambi i lati del cursore.
    zipper_style:
      name: Stile della cerniera
      description: Indica la lunghezza o la presenza della cerniera sul capo (ad esempio,
        senza cerniera, a un quarto, a metà, intera).
    zipper_tape_material:
      name: Materiale del nastro della cerniera
      description: Specifica il materiale principale del nastro della cerniera (bande
        laterali in tessuto) che viene cucito nel progetto.
    zipper_teeth_type:
      name: Tipo di denti della cerniera
      description: Specifica lo stile di costruzione della catena/dei denti della
        cerniera (ad esempio, a spirale, in plastica stampata, in metallo, invisibile),
        che influisce sulla flessibilità, sulla resistenza e sull'applicazione tipica.
