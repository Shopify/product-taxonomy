    diving_regulator_style:
      name: Stile erogatore da immersione
      description: Specifica lo stile dell'erogatore subacqueo, ad esempio pistone
        o membrana sbilanciati
    dj_equipment_features:
      name: Funzionalità dell'attrezzatura per DJ
      description: Specifica le caratteristiche uniche dell'attrezzatura DJ, ad esempio
        controllo MIDI o funzionamento autonomo
    dj_software_compatibility:
      name: Compatibilità con il software DJ
      description: Identifica il software per DJ con cui il prodotto è compatibile,
        ad esempio Rekordbox, Serato DJ
    docking_compatibility:
      name: Compatibilità docking
      description: Indica se la console può essere agganciata o caricata senza rimuovere
        la custodia
    docsis_standard:
