    disposable_glove_features:
      name: Funzionalità dei guanti monouso
      description: Identifica le caratteristiche speciali dei guanti monouso, come
        polsino lungo o senza polvere
    disposable_tableware_material:
      name: Materiale per stoviglie usa e getta
      description: Identifica il materiale utilizzato nelle stoviglie usa e getta,
        ad esempio plastica o carta
    dive_computer_items_included:
      name: Articoli per computer subacqueo inclusi
      description: Specifica quali sono gli articoli inclusi in un computer per immersioni,
