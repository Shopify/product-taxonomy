    din_size:
      name: Taglia DIN
      description: Specifica la dimensione standardizzata dell'apertura del cruscotto
        in cui si inserisce il ricevitore (ad es., DIN singolo, DIN doppio)
    dinnerware_pieces_included:
      name: Stoviglie incluse
      description: Definisce i componenti di una collezione di stoviglie, ad esempio
        piatti piani o ciotole
    direct_box_type:
      name: Tipo di direct box
      description: Specifica la configurazione del circuito della direct box (DI),
