---
it:
  attributes:
    3d_glasses_fit_design:
      name: Design di vestibilità degli occhiali 3D
      description: Indica come gli occhiali vengono indossati o attaccati (ad es.,
        chiusura a scatto, avvolgenti, sovrapponibili)
    3d_glasses_material:
      name: Materiale degli occhiali 3D
      description: Specifica il materiale utilizzato per gli occhiali 3D, come bambù
        o acciaio inossidabile
    3d_glasses_technology:
      name: Tecnologia occhiali 3D
      description: Specifica la tecnologia di immagine/sincronizzazione 3D per cui
        gli occhiali sono progettati, determinando la compatibilità con display o
        proiettori specifici
    3d_printer_case_style:
      name: Stile della custodia per stampante 3D
      description: Classifica il tipo di prodotto per permettere a chi acquista di
        distinguere tra borse morbide, custodie rigide, involucri stazionari e semplici
        coperture antipolvere
    3d_printer_cleaning_kit_components_included:
      name: Componenti del kit di pulizia per stampante 3D inclusi
      description: Elenca i singoli strumenti e materiali di consumo forniti nel kit
        in modo che chi acquista sappia esattamente cosa riceverà.
    3d_printing_resin_type:
      name: Tipo di resina per stampa 3D
      description: Specifica la formulazione o l'applicazione prevista della resina,
        aiutando la clientela a identificare rapidamente se la resina è standard,
        di grado ingegneristico, colabile o di altri tipi specializzati
    80_plus_efficiency_rating:
      name: Classificazione di efficienza 80 Plus
      description: Indica il livello ufficiale di certificazione di efficienza energetica
        80 Plus raggiunto dall'alimentatore
    abrasive_material:
      name: Materiale abrasivo
      description: Identifica il tipo di abrasivo utilizzato negli utensili per levigatura,
        come diamante o carburo di silicio
    absinthe_style:
      name: Stile di assenzio
      description: Definisce lo stile dell'assenzio, ad es. misto, distillato
    absinthe_variety:
      name: Varietà di assenzio
      description: Differenzia i prodotti di assenzio in base alle loro varietà uniche,
        ad es. rouge, verte
    absorbency_level:
      name: Livello di assorbenza
      description: Definisce la capacità di assorbenza, in genere per articoli per
        la cura personale; ad es. durante la notte, leggero
    absorbent_hygiene_product_features:
      name: Funzionalità del prodotto assorbente per l'igiene
      description: Identifica le caratteristiche speciali dei prodotti per l'igiene,
        come impermeabili o ipoallergenici
    academic_level:
      name: Livello accademico
      description: Specifica il livello accademico dei contenuti multimediali, ad
        esempio laurea o dottorato
    accessibility_design_features:
      name: Funzionalità di design per l’accessibilità
      description: Elenca gli elementi di design speciali che aiutano utenti con difficoltà
        uditive, visive o motorie.
    accessory_material:
      name: Materiale accessorio
      description: Specifica il tipo di materiale negli accessori, di norma per le
        forniture di spedizione, ovvero plastica, cartone
    accessory_size:
      name: Dimensioni dell'accessorio
      description: Definisce la dimensione di un prodotto accessorio, ad esempio taglia
        unica o compatto
    accordion_tuning:
      name: Accordatura della fisarmonica
      description: Specifica il tipo di accordatura utilizzata in una fisarmonica,
        ad esempio tono secco o da concerto
    activation_mechanism:
      name: Meccanismo di attivazione
      description: Specifica il metodo principale che attiva l'allarme
    activation_method:
      name: Metodo di attivazione
      description: Descrive come l'utente attiva il credito prepagato o la SIM.
    active_ingredient:
      name: Ingrediente attivo
      description: Identifica le sostanze primarie negli articoli per la cura personale,
        ad es. vitamina A, retinolo
    activewear_clothing_features:
      name: Funzionalità dell'abbigliamento Activewear
      description: Identifica le caratteristiche uniche dell'abbigliamento sportivo,
        ad esempio l'elasticità in quattro direzioni o il design traspirante
    activity:
      name: Attività
      description: Specifica lo sport o l'attività a cui è destinato il prodotto,
        ad esempio tennis o pilates
    activity_tracker_design:
      name: Modello del rilevatore di attività
      description: Specifica come viene indossato il rilevatore di attività, ad es.
        clip, fascia da braccio
    acupuncture_model_format:
      name: Formato del modello di agopuntura
      description: Definisce le dimensioni e la scala dei modelli di agopuntura, ad
        es. a grandezza naturale, in miniatura
    acupuncture_model_type:
      name: Tipo del modello di agopuntura
      description: 'Specifica la parte del corpo o la specie rappresentata dal modello
        di agopuntura, ad es. testa, mano, animale '
    adapter_directionality:
      name: Direzionalità dell'adattatore
      description: Indica se l'adattatore supporta il flusso di segnale in entrambe
        le direzioni o solo in una direzione specificata
    adapter_operating_modes:
      name: Modalità operative dell'adattatore
      description: Specifica se l'adattatore funziona come ricevitore Bluetooth, trasmettitore
        o entrambi
    adaptive_sync_technology:
      name: Tecnologia di sincronizzazione adattiva
      description: Specifica la tecnologia di frequenza di aggiornamento variabile
        (VRR) supportata dal monitor per immagini senza tearing
    adc_resolution:
      name: Risoluzione ADC
      description: Specifica la risoluzione (in bit) del convertitore analogico-digitale
        integrato, definendo la precisione della misurazione
    additional_animation_software_features:
      name: Funzionalità aggiuntive del software di animazione
      description: Specifica le caratteristiche uniche del software di animazione,
        come l'animazione dei personaggi o gli effetti visivi
    additional_cleaning_technology:
      name: Tecnologia di pulizia aggiuntiva
      description: Elenca eventuali tecnologie di pulizia incluse oltre il vapore
        (ad es., ultrasuoni, UV, ozono)
    additional_design_software_type:
      name: Tipo di software di progettazione aggiuntivo
      description: Specifica le funzionalità aggiuntive di un software di progettazione,
        come i tour virtuali o la progettazione del paesaggio
    additional_financial_software_features:
      name: Funzionalità aggiuntive del software finanziario
      description: Identifica le funzionalità aggiuntive di un software finanziario,
        come la gestione delle risorse o la revisione contabile e la conformità
    additional_graphic_software_features:
      name: Funzionalità aggiuntive del software grafico
      description: Evidenzia le funzionalità aggiuntive del software di grafica, come
        l'illustrazione digitale o il design del layout
    additional_publishing_software_features:
      name: Funzionalità aggiuntive del software di pubblicazione
      description: Evidenzia le funzionalità aggiuntive dei software editoriali, come
        la progettazione di stampe o l'editoria digitale
    additional_security_software_features:
      name: Funzionalità aggiuntive del software di sicurezza
      description: Identifica le funzionalità aggiuntive dei software di sicurezza,
        ad esempio la crittografia dei dischi e il rilevamento delle intrusioni
    adhesive_application_type:
      name: Tipo di applicazione dell'adesivo
      description: Definisce il servizio di ciglia previsto o il caso d'uso per l'adesivo
    adhesive_features:
      name: Caratteristiche adesive
      description: Evidenzia proprietà speciali dell'adesivo utilizzato su cerotti
        o nastri
    adhesive_format:
      name: Formato dell'adesivo
      description: Indica la forma fisica in cui l'adesivo viene fornito per l'uso
        nelle riparazioni
    adhesive_strength:
      name: Forza adesiva
      description: Specifica il livello di forza di adesione o sollevamento dell'adesivo
        del cerotto nasale (ad es., originale, extra forte)
    adhesive_type:
      name: Tipo di adesivo
      description: Identifica il tipo di adesivo utilizzato in un prodotto, ad esempio
        rimovibile o permanente
    aftershave_product_form:
      name: Forma del prodotto dopobarba
      description: Identifica la consistenza di un prodotto dopobarba, come balsamo
        o crema
    age_group:
      name: Età
      description: Definisce la fascia di età target di un prodotto, ad esempio adulti
        o bambini
    age_restrictions:
      name: Limiti di età
      description: Indica l'età minima richiesta per un prodotto o un evento, ad esempio
        18 anni o più
    ai_application:
      name: Applicazione dell’IA
      description: Specifica la funzione dell'intelligenza artificiale nel software,
        come analisi predittiva o riconoscimento vocale
    air_freshener_form:
      name: Formato del deodorante per ambienti
      description: Definisce il tipo di deodoranti per auto, ad es. olio, clip di
        sfiato
    air_fryer_functions:
      name: Funzioni della friggitrice ad aria
      description: Elenca le varie modalità di cottura disponibili in una friggitrice
        ad aria o in un elettrodomestico simile, ad esempio frittura ad aria, cottura
        al forno
    air_mattress_features:
      name: Funzionalità del materasso ad aria
      description: Descrive le caratteristiche uniche di un materasso ad aria, come
        facile da gonfiare o resistente alla perforazione
    air_tube_configuration:
      name: Configurazione del tubo dell'aria
      description: Indica il numero o lo stile dei tubi di gonfiaggio dell'aria integrati
        con il bracciale
    airbrush_feed_type:
      name: Tipo di alimentazione dell'aerografo
      description: Identifica il metodo di erogazione della vernice negli aerografi,
        come gravità o sifone
    airbrush_operation_method:
      name: Metodo di funzionamento dell'aerografo
      description: Specifica il tipo di funzionamento degli aerografi, ad esempio
        a doppia azione o a azione singola
    aircraft_engine_configuration:
      name: Configurazione del motore dell'aereo
      description: Specifica il numero di motori che alimentano l'aereo, ad esempio
        singolo o doppio
    aircraft_engine_type:
      name: Tipo di motore dell’aereo
      description: Specifica il tipo di motore che alimenta l'aereo, ad esempio jet
        o turboelica
    airflow_opening_design:
      name: Design dell'apertura per il flusso d'aria
      description: Descrive la configurazione di respirazione o ventilazione integrata
        nel boccaglio
    airsoft_equipment_included:
      name: Attrezzatura da softair inclusa
      description: Specifica l'equipaggiamento extra fornito con i prodotti softair,
        ad esempio occhiali protettivi o gilet tattico
    album_type:
      name: Tipo di album
      description: Descrive lo stile di rilegatura dei kit per scrapbooking o stampaggio,
        ad es. rilegatura a spirale, scrapbook
    alcohol/solvent_content:
      name: Contenuto di alcol/solvente
      description: Classifica il prodotto in base al contenuto di alcol o solvente
        per scopi di spedizione e normativi (ad esempio, alcol ≤24%, alcol >24%, solvente
        in piccoli contenitori)
    alcohol_content:
      name: Contenuto di alcol
      description: Indica se il tonico è privo di alcol o, se presente, approssimativamente
        quanto alcol contiene la formula
    alert_type:
      name: Tipo di allarme
      description: Specifica il tipo di avviso fornito da un prodotto, ad esempio
        allarmi sonori o notifiche dello smartphone
    allergen_information:
      name: Informazioni sugli allergeni
      description: Indica potenziali allergeni presenti in alimenti o bevande, ad
        esempio grano o arachidi
    allergen_test_type:
      name: Tipo di test allergico
      description: Specifica il tipo di allergene che il kit del test è progettato
        per rilevare, ad esempio alimentare o ambientale
    allergens:
      name: Allergeni
      description: Indica potenziali allergeni nei prodotti per la salute e la bellezza,
        ad es. linalolo o limonene
    allergy_friendly_features:
      name: Funzionalità antiallergiche
      description: Identifica se un prodotto ha proprietà anallergiche, ad esempio
        privo di lattice o resistente alla muffa
    amino_acid_subtype:
      name: Sottotipo di aminoacido
      description: Specifica il tipo o profilo primario di aminoacidi contenuti nell'integratore
    amplifier/booster_suitable_location:
      name: Posizionamento ideale amplificatore/booster
      description: Specifica le posizioni migliori per l'amplificatore o il ripetitore
        di segnale, ad esempio un veicolo o un luogo di grandi dimensioni
    amplifier_class:
      name: Classe dell'amplificatore
      description: Definisce il tipo di amplificatore, ad esempio AB o D
    amplifier_configuration:
      name: Configurazione dell’amplificatore
      description: Specifica la configurazione degli amplificatori per veicoli a motore,
        ad esempio a due o quattro canali
    amputation_level:
      name: Livello di amputazione
      description: Indica il livello di amputazione per cui è progettato il riduttore
    analyte_measured:
      name: Analita misurato
      description: Identifica i biomarcatori per i quali la soluzione di controllo
        fornisce calibrazione
    anamorphic_squeeze_ratio:
      name: Rapporto di compressione anamorfica
      description: Indica il fattore di compressione orizzontale di un obiettivo anamorfico,
        consentendo a chi lo utilizza di abbinarlo al rapporto di desqueeze desiderato.
    anatomical_detail_displayed:
      name: Dettaglio anatomico visualizzato
      description: Indica quali caratteristiche anatomiche o meridiane sono evidenziate
        sul modello
    anchor_type:
      name: Tipo di ancora
      description: Definisce l'ancora utilizzata nelle attrezzature per sport acquatici
        trainati, ad esempio passera o aratro
    anemometer_application:
      name: Applicazione dell’anemometro
      description: Identifica la destinazione d'uso di un anemometro, ad esempio industriale
        o meteorologico
    angles_supported:
      name: Angoli supportati
      description: Specifica l'intervallo di angoli che può accogliere un prodotto,
        in genere per l'elettronica; ad es. regolabile, da 0° a 180°
    angling_style:
      name: Stile di pesca
      description: Definisce la tecnica di pesca a cui è destinato il prodotto, ad
        esempio surfcasting o pesca a mosca
    animal_feed_form:
      name: Formato del mangime per animali
      description: Specifica la forma del mangime per animali, ad esempio liquido
        o granuli
    animal_type:
      name: Tipo di animale
      description: Specifica il tipo di animale a cui è destinato un prodotto, ad
        esempio anatre, cervi o cani
    answering_machine_type:
      name: Tipo di segreteria telefonica
      description: Specifica la presenza e la tecnologia di una segreteria telefonica
        integrata
    antenna_connector_type:
      name: Tipo di connettore antenna
      description: Specifica il connettore RF utilizzato per collegare antenne esterne
    antenna_rf_connector_type:
      name: Tipo di connettore RF dell'antenna
      description: Identifica il connettore RF utilizzato dall'antenna
    antenna_type:
      name: Tipo di antenna
      description: Specifica il tipo di antenna per dispositivi elettronici, ad es.
        omnidirezionale, a griglia
    anti_agin_skin_care_type:
      name: Tipo di cura della pelle anti-età
      description: Classifica il tipo di prodotto per la cura della pelle anti-invecchiamento,
        ad esempio maschera, toner
    anti_perspirant_strength_level:
      name: Livello di forza dell'antitraspirante
      description: Indica la classificazione di efficacia dell'antitraspirante (ad
        es., forza clinica, forza sportiva)
    antibody_class_tested:
      name: Classe di anticorpi testata
      description: Specifica l'immunoglobulina o il biomarcatore che il kit rileva
        (ad es., IgE, IgG4)
    antifreeze_type:
      name: Tipo di antigelo
      description: Specifica il tipo di antigelo per la manutenzione del veicolo,
        ad es. concentrato, prediluito
    antique_car_design:
      name: Design di auto d'epoca
      description: Descrive lo stile principale del design di un’auto d'epoca, come
        la t-bucket o la gran turismo
    antique_vehicle_era:
      name: Epoca del veicolo
      description: Descrive il periodo storico di un veicolo d’epoca, come ad esempio
        Brass Era o Vintage Era
    appliance_board_function:
      name: Funzione della scheda dell'elettrodomestico
      description: Specifica il ruolo funzionale della scheda all'interno dell'elettrodomestico
    appliance_unit_location:
      name: Posizione dell'unità dell'elettrodomestico
      description: Indica la sezione fisica dell'elettrodomestico per cui è destinata
        la scheda (ad es., unità interna o esterna)
    application_area:
      name: Area di applicazione
      description: Specifica la parte o l'area del corpo in cui viene applicato il
        prodotto, ad es. labbra, tutto il corpo
    application_method:
      name: Metodo di applicazione
      description: Definisce come viene applicato o utilizzato un prodotto, ad es.
        gel, liquido, spray
    application_type:
      name: Tipo di applicazione
      description: Indica se il trattamento viene lasciato in posa o risciacquato
        e qualsiasi modalità d'uso speciale
    applicator_format:
      name: Formato dell'applicatore
      description: Descrive la forma fisica o lo stile dell'applicatore di lozione
        o crema solare
    applicator_material:
      name: Materiale dell’applicatore
      description: Specifica il materiale utilizzato nell'applicatore, in genere per
        i tamponi; ad es. plastica, cartone
    applicator_type:
      name: Tipo di applicatore
      description: Identifica il tipo di applicatore incluso negli assorbenti, ad
        esempio applicatore o senza applicatore
    applique/patch_shape:
      name: Forma dell’applique/toppa
      description: Descrive la forma di applicazioni o toppe, ad esempio animali o
        geometriche
    applique_shape:
      name: Forma dell'applique
      description: Descrive la forma degli elementi applicati, ad esempio floreali
        o animali
    aquarium_filter_features:
      name: Funzionalità del filtro dell'acquario
      description: Descrive le caratteristiche speciali dei filtri dell'acquario,
        ad es. il cambio rapido della cartuccia, la filtrazione a più stadi
    aquarium_light_spectrum:
      name: Spettro delle luci per acquari
      description: Specifica il tipo di spettro luminoso per l'illuminazione dell'acquario,
        ad es. blu, luce diurna
    aquarium_overflow_box_design:
      name: Design della scatola di troppo pieno dell'acquario
      description: Descrive lo stile di installazione di una cassetta di troppopieno
        per acquari, ad esempio esterna o sospesa
    archery_activity:
      name: Tiro con l’arco
      description: Specifica il tipo di attività di tiro con l'arco, ad es. caccia
        all'aperto, tiro al bersaglio
    archery_equipment_included:
      name: Attrezzatura per tiro con l'arco inclusa
      description: Specifica gli accessori per tiro con l'arco inclusi, ad es. supporto
        stabilizzatore, frecce in vetro di sicurezza
    archery_style:
      name: Stile di tiro con l'arco
      description: Definisce il tipo specifico di tiro con l'arco per il quale il
        prodotto è progettato, ad es. tiro con l'arco 3D, caccia con l'arco
    archery_target_type:
      name: Tipo di bersaglio per tiro con l’arco
      description: Specifica il tipo di bersaglio per tiro con l’arco progettato per
        diverse pratiche di tiro, ad esempio bersaglio 3D, bersaglio a sacco
    aromatherapy:
      name: Aromaterapia
      description: Specifica il profumo o l'olio essenziale utilizzato, ad es. eucalipto,
        lavanda
    arrangement:
      name: Disposizione
      description: Specifica come sono disposti o presentati i fiori, ad es. vaso,
        cestino
    arrow/bolt_material:
      name: Materiale freccia/bullone
      description: Identifica il materiale di costruzione di frecce o bulloni, come
        alluminio o bambù
    arrow_fletching_material:
      name: Materiale per l'impennaggio delle frecce
      description: Identifica il materiale utilizzato nell'impennaggio delle frecce,
        ad esempio sintetico o plastica
    arrow_material:
      name: Materiale della freccia
      description: Identifica la composizione delle frecce, ad esempio bambù o fibra
        di vetro
    art/crafting_tool_material:
      name: Materiale per strumenti artistici/artigianali
      description: Identifica il materiale principale degli strumenti artistici o
        artigianali, ad esempio legno o metallo
    art_fixative_application_method:
      name: Metodo di applicazione del fissativo artistico
      description: Descrive ad esempio viene applicato un fissativo artistico, ad
        esempio aerosol o pennello
    art_movement:
      name: Movimento artistico
      description: Definisce l’approccio stilistico o il movimento artistico di un
        dipinto, ad esempio impressionismo, espressionismo
    art_style:
      name: Stile artistico
      description: Descrive lo stile estetico di un prodotto, ad esempio art nouveau
        o tipografia
    artwork_authenticity:
      name: Autenticità dell’opera d’arte
      description: Indica l’autenticità dell'opera d'arte, specificando se si tratta
        di una creazione originale o di una riproduzione
    artwork_frame_material:
      name: Materiale della cornice dell'opera d'arte
      description: Identifica il materiale utilizzato nelle cornici artistiche, ad
        esempio legno o placcato oro
    artwork_type:
      name: Tipo di grafica
      description: Specifica lo stile della grafica digitale, ad esempio la tipografia
        o la pittura digitale
    assisted_braking_technology:
      name: Tecnologia di frenata assistita
      description: Indica il tipo di frenata assistita nei dispositivi di freno, ad
        esempio attiva o passiva
    attachment_method:
      name: Metodo di fissaggio
      description: Definisce il metodo utilizzato per attaccare o fissare il prodotto,
        ad es. velcro, clip-on
    attachment_options:
      name: Opzioni di fissaggio
      description: Specifica i metodi per attaccare o fissare un prodotto, ad es.
        un cordino
    attachment_type:
      name: Tipo di fissaggio
      description: Definisce il metodo di fissaggio o connessione del prodotto, ad
        esempio a scatto o con gancio e anello
    atv/off_road_tire_type:
      name: Tipo di pneumatico dell’ATV/fuoristrada
      description: Identifica l'uso specifico di pneumatici ATV o fuoristrada, ad
        esempio sabbia o fango
    audio/scan_converter_features:
      name: Funzionalità del convertitore audio/scansione
      description: Descrive le funzionalità di un convertitore audio/scansione, ad
        esempio la conversione automatica o il controllo remoto
    audio/video_cable_connector_type_end_a:
      name: Tipo di connettore del cavo audio/video (estremità A)
      description: Specifica il connettore o l'interfaccia esatta presente sulla prima
        estremità (estremità A) del cavo
    audio/video_cable_connector_type_end_b:
      name: Tipo di connettore del cavo audio/video (estremità B)
      description: Specifica il connettore o l'interfaccia esatta presente sulla seconda
        estremità (estremità B) del cavo
    audio_bypass_type:
      name: Tipo di bypass audio
      description: Specifica come il segnale audio viene instradato quando l'effetto
        è disattivato (ad es., true bypass, bufferizzato, relè)
    audio_cassette_tape_type:
      name: Tipo di nastro audiocassetta
      description: Specifica la formulazione del nastro IEC (bias) per le audiocassette
    audio_codecs/formats_supported:
      name: Codec/formati audio supportati
      description: Specifica i tipi di file audio che un prodotto può riprodurre,
        ad esempio WAVE o MP3
    audio_component_form_factor:
      name: Fattore di forma del componente audio
      description: Definisce lo stile fisico o il formato di installazione del componente
    audio_connectivity:
      name: Connettività audio
      description: Definisce i tipi di connessione audio supportati da un prodotto,
        ad esempio HDMI o USB
    audio_conversion_direction:
      name: Direzione di conversione audio
      description: Specifica il flusso di segnale supportato dal convertitore (ad
        es., analogico-digitale, digitale-analogico, bidirezionale)
    audio_converter_features:
      name: Funzionalità del convertitore audio
      description: Descrive le caratteristiche principali di un convertitore audio,
        ad esempio il supporto analogico o basato sull'intelligenza artificiale
    audio_d/a_converter_dac:
      name: Convertitore audio D/A (DAC)
      description: Specifica il tipo di convertitore da digitale ad analogico (DAC)
