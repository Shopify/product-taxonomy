    coaxial_cable_series:
      name: Serie del cavo coassiale
      description: Identifica la serie o la designazione standard del settore del
        cavo (ad es., RG-6, RG-58, LMR-400), che determina le dimensioni fisiche e
        le prestazioni elettriche
    cockpit_type:
      name: Tipo di cabina di guida
      description: Specifica il design e la tecnologia utilizzati nella cabina di
        pilotaggio di un aereo, come analogica o ibrida
    cocktail_decoration_design:
      name: Design della decorazione per cocktail
      description: Identifica il modello o lo stile delle forniture per cocktail party,
