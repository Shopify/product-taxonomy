    cellular_capability:
      name: Capacità cellulare
      description: Indica se il modello supporta le reti mobili oltre al Wi-Fi
    cervix_height_suitability:
      name: Idoneità per l'altezza della cervice
      description: Indica per quale altezza della cervice (ad es., bassa, media, alta)
