    dietary_preferences:
      name: Esigenze alimentari
      description: Aiuta a identificare i prodotti adatti a diete specifiche, ad es.
        vegana, senza frutta a guscio
    dietary_supplements:
      name: Supplementi dietetici
      description: Identifica i nutrienti aggiunti in un prodotto, come calcio o probiotici
    dietary_use:
      name: Utilizzo alimentare
      description: Classifica i prodotti in base ai benefici dietetici, ad es. costruzione
        muscolare, basso contenuto di carboidrati
    difficulty_level:
      name: Livello di difficoltà
      description: Indica la complessità o il livello di sfida di un puzzle o di un
        gioco, ad esempio facile o esperto
    diffuser_design:
      name: Design del diffusore
      description: Descrive la struttura di un diffusore flash, ad esempio anello
