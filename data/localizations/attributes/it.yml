      description: Definisce il tipo di leva sui moschettoni da arrampicata, ad esempio
        leva a vite o leva a scatto
    carabiner_shape:
      name: Forma a moschettone
      description: Identifica la forma dei moschettoni utilizzati nell'arrampicata,
        come HMS o a pera
    card/adapter_installation:
      name: Installazione scheda/adattatore
      description: Identifica il modo in cui sono installate le schede o gli adattatori
