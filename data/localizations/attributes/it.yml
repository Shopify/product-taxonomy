    drinkware_material:
      name: Materiale per bicchieri
      description: Specifica la composizione dei bicchieri, ad esempio vetro o plastica
    drinkware_pieces_included:
      name: Bicchieri inclusi
      description: Identifica la varietà di componenti di bicchieri inclusi in un
