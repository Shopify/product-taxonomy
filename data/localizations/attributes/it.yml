    crutch_type:
      name: Tipo di stampella
      description: Distingue tra diversi stili di stampelle, ad es. avambraccio, ascellare,
    crystal_system:
      name: Sistema cristallino
      description: Identifica la struttura geometrica di un cristallo, ad esempio
        esagonale o cubica
    cue_style:
      name: Stile della stecca
      description: Specifica lo stile di un'asta da biliardo, ad es. dritta, conica
    cue_type:
      name: Tipo di stecca
      description: Specifica il tipo di stecca di un'asta da biliardo, ad es. break,
        jump
    cue_wrap:
      name: Impugnatura della stecca
      description: Identifica il tipo di rivestimento su una stecca da biliardo, ad
        esempio lino irlandese o senza rivestimento
    cuff_connector_type:
      name: Tipo di connettore del bracciale
      description: Definisce l'interfaccia meccanica che collega il tubo del bracciale
        al monitor della pressione sanguigna
    cuff_size_category:
      name: Categoria di dimensione del bracciale
      description: Specifica la classe di dimensione standardizzata del bracciale
        (ad es., neonato, adulto, adulto grande)
    cuff_style:
      name: Stile del bracciale
      description: Descrive il design del bracciale per l'avambraccio sulle stampelle
        antibrachiali
    cuisine:
      name: Cucina
      description: Classifica i prodotti per stile culinario o regione, ad es. Stati
        Uniti sudoccidentali, Mediterraneo
    culinary_botanical_name:
      name: Nome botanico culinario
      description: Specifica il nome scientifico di erbe o piante culinarie, ad es.
        capsicum annuum, mentha
    cup_size:
      name: Taglia della coppa
      description: Specifica la dimensione del busto dei reggiseni, ad esempio AA
        o L
    curing_method:
      name: Metodo di asciugatura
      description: Indica come la colla si fissa o asciuga (ad es., asciugatura all'aria,
        lampada UV/LED, calore)
    curler_pad_material:
      name: Materiale del cuscinetto del piegaciglia
      description: Identifica il materiale del cuscinetto sostituibile che preme contro
        le ciglia, influenzando comfort, durabilità e considerazioni allergiche
    curler_size_compatibility:
      name: Compatibilità di dimensioni del piegaciglia
      description: Specifica la dimensione o lo stile del cuscinetto del piegaciglia
        che le ricariche adattano (ad es., standard, mini, parziale)
    curler_type:
      name: Tipo di bigodino
      description: Specifica il tipo di bigodino, ad esempio aste flessibili o rulli
        caldi
    currencies_supported:
      name: Valute supportate
      description: Identifica i tipi di valuta accettati da un prodotto, ad es. dollaro
        canadese (CAD), yuan cinese (CNY)
    currency:
      name: Valuta
      description: Definisce il tipo di valuta supportata da un prodotto, ad esempio
        Yuan cinese (CNY) o Dollaro statunitense (USD)
    currency_type:
      name: Tipo di valuta
      description: Identifica il tipo di valuta gestita da un prodotto, ad esempio
        monete o gettoni
    cushion_design:
      name: Design del cuscinetto
      description: Descrive il fattore di forma complessivo o lo stile del cuscinetto
        metatarsale (ad es., cuscinetto, manicotto, cupola)
    customer_support_channels:
      name: Canali di assistenza clienti
      description: Specifica le modalità con cui è possibile ottenere assistenza,
        ad esempio tramite supporto telefonico o tutorial video
    customization:
      name: Personalizzazione
      description: Identifica il tipo di personalizzazione disponibile sui timbri
        da ufficio, come l'incisione di un testo personalizzato o di un logo
    cutter_options:
      name: Opzioni taglierina
      description: Identifica la funzione di taglio delle sigillatrici a impulsi,
        ad esempio la taglierina incorporata
    cutting_method:
      name: Metodo di taglio
      description: Specifica la tecnica di taglio, in genere utilizzata per gli attrezzi
        da giardinaggio; ad es. bypass, incudine
    cycling_style:
      name: Stile di ciclismo
      description: Definisce l'uso previsto o lo stile di guida dei prodotti ciclistici,
        come le corse su strada o le gare BMX
    cylinder_size_designation:
      name: Designazione della dimensione della bombola
      description: Identifica il codice di lettere o numeri standard utilizzato per
        identificare le dimensioni e la capacità di una bombola di ossigeno (ad es.,
        M6, D, E)
    daisy_chain_capability:
      name: Capacità di concatenazione
      description: Indica se più unità di conferenza possono essere collegate insieme
        (concatenate) per espandere la copertura di microfoni e altoparlanti e il
        metodo di connessione utilizzato
    dance_style:
      name: Stile di danza
      description: Indica il genere o i tipi specifici di danza, ad esempio flamenco,
        balletto
    data_network:
      name: Rete di dati
      description: Specifica la compatibilità della rete dati dei dispositivi mobili,
        come LTE o 3G
    data_network_generation:
      name: Generazione di reti dati
      description: Indica la tecnologia di rete mobile più avanzata supportata dalla
        carta prepagata o dalla SIM (ad esempio, 3G, 4G LTE, 5G).
    data_rollover_policy:
      name: Politica di rollover dei dati
      description: Indica se i dati ad alta velocità non utilizzati vengono riportati
        al successivo periodo di validità o scadono.
    decoder/encoder_function:
      name: Funzione decoder/encoder
      description: Specifica la funzione logica implementata dall'IC
    decoration_material:
      name: Materiale per la decorazione
      description: Identifica il materiale utilizzato per la decorazione, ad esempio
        paillettes o piume
    decorative_stamp_design:
      name: Design del timbro decorativo
      description: Descrive il design dei timbri decorativi, ad esempio fiabeschi
        o retrò/vintage
    denomination:
      name: Taglio
      description: Identifica il valore nominale di oggetti da collezione ad esempio
        monete e francobolli, ad es. 1.000 dollari, 1 centesimo
    dental_appliance_compatibility:
      name: Compatibilità con apparecchi dentali
      description: Specifica per quali apparecchi dentali o lavori di restauro la
        schiuma è sicura o destinata (ad es., allineatori, apparecchi ortodontici,
        faccette)
    dental_floss_format:
      name: Formato del filo interdentale
      description: Identifica il formato complessivo del prodotto o lo stile di erogazione
        del filo interdentale
    dental_floss_shape:
      name: Forma del filo interdentale
      description: Identifica la forma o lo stile del filo interdentale, come il nastro
        o la striscia
    dental_floss_thickness_level:
      name: Spessore del filo interdentale
      description: Differenzia il filo interdentale in base al livello di spessore,
        come ad esempio sottile o normale
    dental_floss_type:
      name: Tipo di filo interdentale
      description: Identifica il tipo di filo interdentale, ad esempio non cerato
        o cerato
    dental_mouthgard_recommended_use:
      name: Uso consigliato del paradenti dentale
      description: Identifica lo scopo dei paradenti dentali, ad esempio riduzione
        del russamento, protezione ortodontica
    dental_mouthguard_arch_coverage:
      name: Copertura dell'arcata del paradenti dentale
      description: Specifica quale/i arcata/e dentale/i il paradenti è progettato
        per coprire
    dental_mouthguard_certifications:
      name: Certificazioni del bite antibruxismo
      description: Indica le certificazioni di sicurezza e qualità dei paradenti dentali,
        ad esempio BPA-free o certificato CE
    dental_paste_flavor:
      name: Aroma della pasta dentale
      description: Identifica il sapore della pasta odontoiatrica, ad esempio non
        aromatizzata o gomma da masticare
    dental_repair_kit_certifications:
      name: Certificazioni kit di riparazione dentale
      description: Identifica le certificazioni di un kit di riparazione dentale,
        come l'approvazione della FDA o l'assenza di BPA
    dental_water_jet_operation:
      name: Funzionamento dell'idropropulsore dentale
      description: Specifica la fonte di alimentazione di un idropulsore dentale,
        ad esempio a filo o senza filo
    dentistry_items_included:
      name: Articoli di odontoiatria inclusi
      description: Identifica gli strumenti dentali inclusi in un set, come specchietto
        dentale o strumento per la rimozione della placca
    denture_arch_coverage:
      name: Copertura dell'arcata della dentiera
      description: Identifica quale arcata dentale la dentiera (o faccetta a scatto)
        è destinata a coprire
    denture_base_color:
      name: Colore della base della protesi
      description: Definisce la tonalità della gomma artificiale nelle protesi, ad
        esempio la gomma rosa o naturale
    denture_coverage:
      name: Copertura della protesi
      description: Identifica l'estensione della copertura della protesi, ad esempio
        totale o parziale
    denture_design:
      name: Progettazione di protesi
      description: Descrive il tipo di protesi, ad esempio flessibile o immediata
    denture_retention_mechanism:
      name: Meccanismo di ritenzione della dentiera
      description: Specifica come la dentiera rimane in posizione sui denti o sulle
        gengive
    denture_teeth_color:
      name: Colore dei denti della protesi
      description: Specifica la tonalità di colore dei denti della protesi, ad esempio
        bianco sporco o giallo chiaro
    deployment_type:
      name: Tipo di distribuzione
      description: Descrive come viene implementato il software AI, ad esempio ibrido
        o basato su cloud
    desk_organizer_features:
      name: Funzionalità dell'organizzatore da scrivania
      description: Descrive le caratteristiche specifiche di un organizer da scrivania,
        ad esempio divisori regolabili o scomparti integrati
    desk_size:
      name: Dimensioni della scrivania
      description: Indica la categoria dimensionale di una scrivania, ad esempio piccola
        (S) o grande (L)
    detailed_ingredients:
      name: Ingredienti nel dettaglio
      description: Elenca componenti specifici utilizzati in salute e bellezza, ad
        es. vitamina C, probiotici
    detectable_drugs:
      name: Droghe rilevabili
      description: Specifica i tipi di droghe che un test può identificare, ad es.
        marijuana, oppiacei
    detection_technology:
      name: Tecnologia di rilevamento
      description: Specifica il principio scientifico o il marcatore biologico che
        il test HIV rileva (ad es., anticorpo, combo antigene/anticorpo, RNA PCR)
    detector_operation_mode:
      name: Modalità operativa del rilevatore
      description: Descrive il funzionamento di un rilevatore di sicurezza, ad esempio
        interconnesso o indipendente
    detector_sensitivity:
      name: Sensibilità del rilevatore
      description: Descrive la possibilità di regolazione della sensibilità di un
        metal detector, ad esempio regolabile o fissa
    detector_type:
      name: Tipo di rilevatore
      description: Specifica il metodo di rilevamento utilizzato nei dispositivi di
        sicurezza, ad es. ionizzazione ottica, campionamento dell'aria
    developer_strength:
      name: Forza dell'ossidante
      description: Specifica la concentrazione di perossido o il volume di ossidanti
        o kit per corrispondere al sollevamento desiderato
    developmental_features:
      name: Funzionalità dello sviluppo
      description: Evidenzia i vantaggi di sviluppo di un prodotto, ad esempio lo
        sviluppo del linguaggio o la crescita emotiva e sociale
    device_interface:
      name: Interfaccia del dispositivo
      description: Specifica il metodo di connessione tra dispositivi elettronici,
