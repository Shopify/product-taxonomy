    circuit_breaker_type:
      name: Tipo di interruttore
      description: Identifica il tipo di interruttore, ad esempio standard o AFCI
    clarinet_key_system:
      name: Sistema tonale del clarinetto
      description: Identifica il sistema di tonalità per un clarinetto, ad esempio
