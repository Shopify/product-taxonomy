    drum_hardware_material:
      name: Materiale hardware del tamburo
      description: Identifica il materiale utilizzato nell'hardware del tamburo, come
        acciaio o alluminio
    dry/wet_cleaning:
      name: Pulizia a umido/secco
      description: Specifica se i prodotti sono adatti al lavaggio a secco o ad umido
    dry_bean_variety:
      name: Varietà di legumi secchi
      description: Identifica la varietà di fagioli secchi utilizzati, ad es. ceci,
