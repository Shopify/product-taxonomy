    card_design:
      name: Progettazione del biglietto
      description: Specifica la forma di una scheda di luogo o di risposta, ad esempio
        piegata o piatta
    card_format:
      name: Formato del biglietto
      description: Descrive lo stile degli inviti o dei biglietti, ad esempio biglietti
        piatti o biglietti piegati
    card_holder_design:
      name: Design del portabiglietti
      description: Descrive lo stile o la forma di un segnaposto, ad esempio a clip
        o verticale
    card_interface_type:
      name: Tipo di interfaccia della scheda
      description: Descrive se il lettore comunica tramite contatti fisici, RF senza
        contatto o entrambi
    card_rechargeability:
      name: Possibilità di ricaricare la carta
      description: Indica se il saldo della carta può essere ricaricato dopo aver
        utilizzato il credito iniziale e il metodo principale di ricarica.
    card_size:
      name: Dimensione del biglietto
      description: Utilizzato per indicare la dimensione dei biglietti d'auguri o
        per appunti, ad es. A4, lettera
    card_usage_status:
      name: Stato di utilizzo della scheda
      description: Indica se il credito della scheda telefonica è stato utilizzato
        o rimane intatto
    care_instructions:
      name: Istruzioni per la cura
      description: Fornisce indicazioni per la manutenzione del prodotto, ad esempio
        il lavaggio a mano o esclusivamente a secco
    carry_options:
      name: Opzioni di trasporto
      description: Specifica i metodi di trasporto disponibili per gli articoli, ad
        esempio una maniglia o una tracolla
    carrying_positions:
      name: Posizioni di trasporto
      description: Specifica i diversi modi in cui può essere indossato un marsupio,
        sul fianco o rivolto all'indietro
    carrying_type:
      name: Tipo di trasporto
      description: Descrive il metodo di trasporto di un prodotto, ad esempio a mano
        o a tracolla
    cart_design:
      name: Modello del carrello
      description: Descrive il layout o la struttura di un carrello sanitario, ad
        esempio a doppio gancio o con base
    cart_type:
      name: Tipo di carrello
      description: Identifica la fonte di alimentazione di un carrello da golf, ad
        esempio elettrica o gas
    cartridge_authenticity:
      name: Autenticità della cartuccia
      description: Identifica se il materiale di consumo è del produttore originale,
        compatibile, rigenerato o ricaricato
    cartridge_mounting_style:
      name: Stile di montaggio della testina
      description: Specifica come la testina si attacca al braccio o al portatestina
        (ad es., montaggio mezzo pollice, montaggio P), garantendo la compatibilità
        meccanica
    cartridge_type:
      name: Tipo di cartuccia
      description: Identifica la tecnologia delle cartucce nei giradischi, ad esempio
        ceramica o magnetica
    cartridge_yield_type:
      name: Tipo di resa della cartuccia
      description: Indica la classe di capacità definita dal produttore della cartuccia
        (ad es., standard, alta resa)
    case_color:
      name: Colore della cassa
      description: Specifica il colore della custodia di un prodotto, ad esempio trasparente
        o bianco
    case_pattern:
      name: Modello della cassa
      description: Descrive il design o il motivo sulla custodia di un prodotto, ad
        esempio floreale o geometrico
    case_transparency_level:
      name: Livello di trasparenza della custodia
      description: Indica quanto è trasparente la custodia.
    case_type:
      name: Tipo di custodia
      description: Specifica il tipo di custodia per dispositivi elettronici e accessori,
        ad esempio a portafoglio o a libro
    cassette_adapter_type:
      name: Tipo di adattatore per cassetta
      description: Identifica il tipo di adattatore per cassette, ad es. da 3,5 mm
