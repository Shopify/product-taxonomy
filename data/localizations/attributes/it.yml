    dexterity_skills:
      name: Abilità di destrezza
      description: Identifica le abilità specifiche di destrezza richieste per un
        gioco, come l'equilibrio o la precisione
    dial_color:
      name: Colore del quadrante
      description: Specifica il colore del quadrante di un orologio, ad esempio oro
