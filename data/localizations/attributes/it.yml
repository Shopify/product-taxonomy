    call_blocking_method:
      name: Metodo di blocco delle chiamate
      description: Specifica come il dispositivo identifica e blocca le chiamate indesiderate
    caller_id_compatibility:
      name: Compatibilità ID chiamante
      description: Indica se il telefono supporta i servizi ID chiamante forniti dalla
