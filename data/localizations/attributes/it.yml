    plunger_shape:
      name: Forma dello sturalavandini
      description: Specifica la forma della testa dello stantuffo, ad esempio tazza
        o fisarmonica
    plywood_grade:
      name: Classificazione del compensato
      description: Specifica la classificazione del compensato per materiali da costruzione,
        come grado C o D
    pneumatic_conveyor_operation:
      name: Funzionamento del trasportatore pneumatico
      description: Identifica la modalità di funzionamento dei trasportatori pneumatici,
        ad esempio fase eco o fase densa
    poe_standard:
      name: Standard PoE
      description: Identifica il protocollo Power over Ethernet (PoE) a cui aderisce
        un prodotto; ad es. passivo, IEEE 802.3af
    point_design:
      name: Forma della puntina
      description: Descrive lo stile della punta delle forniture per ufficio come
        puntine o puntine da disegno, ad es. affilata, smussata
    pointing_device:
      name: Dispositivo di puntamento
      description: Definisce il dispositivo utilizzato per la navigazione sullo schermo
        di un computer, ad es. i pulsanti del mouse, il touchpad
    polar_pattern:
      name: Figura polare
      description: Indica l'orientamento di captazione del suono di un microfono,
        ad esempio omnidirezionale o cardioide
    polarity_configuration:
      name: Configurazione della polarità
      description: Descrive la disposizione della polarità interna rilevante per LED,
        moduli display e dispositivi simili
    polarization:
      name: Polarizzazione
      description: Definisce la direzione dell'onda delle antenne, ad es. verticale,
        circolare
    pole/post_material:
      name: Materiale palo/palo
      description: Specifica il materiale con cui è realizzato un ombrellone o il
        suo palo, come fibra di vetro o acciaio
    pole_color:
      name: Colore del palo
      description: Identifica il colore dell'asta di prodotti come gli ombrelli, ad
        esempio nero o bronzo
    pole_material:
      name: Materiale dell’asta
      description: Specifica il materiale utilizzato nella costruzione dei pali, ad
        es. acciaio, legno
    pole_pattern:
      name: Modello del polo
      description: Descrive il design o il motivo sull'asta di un ombrello, ad esempio
        floreale o geometrico
    policy_sign_design:
      name: Design del cartello dell’informativa
      description: Descrive il messaggio specifico visualizzato su un cartello stradale,
        ad es. vietato fumare, nessun cellulare
    polish_dry_form:
      name: Forma di pulitura a secco
      description: Identifica la formulazione dei prodotti per l'asciugatura dello
        smalto, es. a base solvente, a base siliconica
    polish_remover_form:
      name: Formato del solvente unghie
      description: Specifica il tipo di prodotto solvente per unghie, ad es. liquido,
        pellicole per rimozione
    polish_remover_formulation:
      name: Formulazione del rimuovi smalto
      description: Indica la composizione chimica del rimuovi, specialmente il contenuto
        di acetone o basi alternative
    polish_type:
      name: Tipo di lucidante
      description: Identifica il tipo specifico di lucidante utilizzato per la cura
        delle imbarcazioni, come metallo o vinile
    polyphony:
      name: Polifonia
      description: Specifica la capacità di nota simultanea di un sintetizzatore,
        ad es. polifonico, multitimbrico
    portability:
      name: Trasportabilità
      description: Specifica la facilità di spostamento o trasporto di un prodotto,
        in genere per i tiralatte; ad es. portatile, dimensioni compatte
    post_material:
      name: Materiale del palo
      description: Specifica il tipo di materiale per i pali di varie categorie, ad
        es. alluminio o fibra di vetro
    postage_stamp_features:
      name: Funzionalità del francobollo
      description: Identifica le caratteristiche speciali dei francobolli, come sovrastampa
        o filigrana
    postpartum_stage:
      name: Fase post-parto
      description: Specifica il periodo di tempo dopo il parto per cui l'assorbente
        è progettato
    potential_extract:
      name: Estratto potenziale
      description: Indica il potenziale livello di estratto nella produzione di cereali
        e malti, ad esempio basso o alto
    pottery/sculpting_project_type:
      name: Tipo di progetto di ceramica/scultura
      description: Identifica il tipo specifico di progetto di ceramica o scultura,
        come la modellazione o la realizzazione di maschere
    potty/toilet_seat_design:
      name: Modello del sedile del vasino/WC
      description: Definisce lo stile o la struttura dei sedili per vasino o WC, ad
        esempio pieghevole o standard
    potty_training_kit_components:
      name: Componenti del kit di addestramento al vasino
      description: Specifica gli articoli inclusi in un kit per usare il vasino, ad
        es. adesivi, sgabello
    power_connector_type:
      name: Tipo di connettore di alimentazione
      description: Specifica i connettori di alimentazione ausiliari richiesti o forniti
        dal riser o dall'adattatore
    power_conversion_semiconductor_type:
      name: Tipo di semiconduttore per conversione di potenza
      description: Identifica il materiale semiconduttore principale utilizzato nello
        stadio di potenza del caricabatterie, che influenza dimensioni, efficienza
        e generazione di calore
    power_source:
      name: Fonte di alimentazione
      description: Specifica la fonte di alimentazione utilizzata da un prodotto,
        ad esempio energia solare o batterie
    power_supply_efficiency_rating:
      name: Classificazione di efficienza dell'alimentatore
      description: Indica il livello di certificazione di efficienza 80 Plus dell'alimentatore
        del desktop
    power_supply_form_factor:
      name: Fattore di forma dell'alimentatore
      description: Specifica la dimensione fisica e lo standard di montaggio dell'alimentatore
        (ad es., ATX, SFX)
    power_supply_modularity:
      name: Modularità dell'alimentatore
      description: Indica se i cavi dell'alimentatore sono non rimovibili, parzialmente
        rimovibili o completamente rimovibili
    pregnancy_test_sensitivity:
      name: Sensibilità del test di gravidanza
      description: Specifica la capacità del test di identificare la gravidanza, ad
        es. rilevamento precoce, rilevamento standard
    prescription_status:
      name: Stato di prescrizione
      description: Indica se le gocce per le orecchie sono disponibili da banco o
        richiedono una prescrizione da un professionista sanitario
    presentation_supply_features:
      name: Funzionalità della fornitura di presentazione
      description: Descrive le caratteristiche uniche dei materiali di consumo per
        presentazioni, ad esempio altezza regolabile o superficie cancellabile
    preservation_type:
      name: Tipo di conservazione
      description: Identifica il metodo utilizzato per conservare i campioni di laboratorio,
        come fissati o essiccati
    pretend_electronics_toy_type:
      name: Tipo di giocattolo elettronico finto
      description: Specifica la categoria dell'elettronica di finzione, ad esempio
        macchina fotografica, telefono cellulare
    pretend_housekeeping_toy_type:
      name: Tipo di elettrodomestico giocattolo finto
      description: Identifica il tipo di giocattolo per la pulizia della casa, come
        un set di pulizia o un elettrodomestico da cucina
    primary_pcie_slot_version:
      name: Versione dello slot PCIe primario
      description: Indica la generazione PCI Express supportata dallo slot x16 principale
        tipicamente utilizzato per le schede grafiche
    primary_region:
      name: Area geografica primaria
      description: Specifica il mercato o l'ubicazione principale di un software o
        un servizio cloud, ad es. Nord America, Asia-Pacifico
    primer_use:
      name: Utilizzo della mestica
      description: Specifica la funzione di un primer, ad esempio vernice di base
        o sigillante
    print_orientation:
      name: Orientamento di stampa
      description: Identifica su quale lato del materiale è stampato il grafico
    print_server_form_factor:
      name: Fattore di forma del server di stampa
      description: Indica il design fisico del server di stampa (ad es., box esterno,
        scheda interna, dongle USB)
    print_technology:
      name: Tecnologia di stampa
      description: Specifica il processo utilizzato da una stampante, ad esempio a
        getto d'inchiostro o laser
    printer/copier_specialized_features:
      name: Funzionalità specializzate per stampante/fotocopiatrice
      description: Evidenzia le funzionalità specifiche di stampanti/fotocopiatrici,
        ad esempio supporto della stampa mobile o controllo vocale
    printer_accessories_included:
      name: Accessori per stampante inclusi
      description: Fornisce i dettagli sui componenti supplementari inclusi con una
        stampante, una fotocopiatrice o un fax; ad es. vassoio carta, fusore
    printer_color_capability:
      name: Capacità colore stampante
      description: Specifica se il dispositivo stampa solo in monocromatico o supporta
        la stampa e la copia a colori
    printer_connection_interface:
      name: Interfaccia di connessione stampante
      description: Definisce il tipo di porta che il server di stampa utilizza per
        connettersi alla stampante stessa
    printer_form_factor:
      name: Fattore di forma della stampante
      description: Classifica lo stile fisico o la portabilità del dispositivo
    printer_functions:
      name: Funzionalità della stampante
      description: Definisce le capacità di stampanti, fotocopiatrici e fax; ad es.
        scansione, stampa di foto
    printing_color:
      name: Colori di stampa
      description: Definisce l'output cromatico del toner e delle cartucce a getto
        d'inchiostro, ad es. nero, ciano
    printing_method:
      name: Metodo di stampa
      description: Specifica il processo di stampa, ad esempio stampa offset o incisione
    privacy_filtering_direction:
      name: Direzione del filtro privacy
      description: Indica da quali direzioni di visione il filtro blocca la visibilità
        (ad es., orizzontale a due vie, quattro vie)
    processor_cores:
      name: Core del processore
      description: Indica il numero di core nel processore di un computer, ad es.
        duale
    processor_family:
      name: Famiglia del processore
      description: Identifica la serie o la marca della CPU del dispositivo elettronico,
        ad es. Intel Core i7
    processor_socket:
      name: Presa del processore
      description: Specifica il tipo di socket del processore compatibile nell'elettronica,
        ad esempio LGA 1151 (socket H4) o Socket AM4
    processor_technology:
      name: Tecnologia del processore
      description: Definisce la tecnologia del processore, in genere per le apparecchiature
        audio; ad es. basato su software, tubo/valvola
    product_benefits:
      name: Benefici del prodotto
      description: Descrive i vantaggi offerti da un prodotto, in genere per la salute
        e la bellezza; ad es. levigante, rassodante
    product_certifications_standards:
      name: Certificazioni e standard di prodotto
      description: Indica le certificazioni o gli standard che un prodotto soddisfa,
        ad esempio biologico o senza crudeltà
    product_classification:
      name: Classificazione del prodotto
      description: Categorizza il tipo di materiale prezioso, valuta o oggetto di
        valore (ad esempio, valuta, lingotti, pietre preziose, carte regalo, NFT)
    product_form:
      name: Forma del prodotto
      description: Definisce il formato o la presentazione di un prodotto, in genere
        per la salute e la bellezza; ad es. lozione, siero
    product_format:
      name: Formato del prodotto
      description: Indica se l'articolo viene fornito come prodotto fisico o download
        digitale
    product_formulation:
      name: Formulazione del prodotto
      description: Identifica la composizione dei materiali di consumo per l'edilizia,
        ad es. la sostanza base, già miscelata
    product_manual_area:
      name: Area del manuale prodotti
      description: Specifica l'argomento del manuale di un prodotto, ad es. fotocamera
        e ottica, forniture per ufficio
    product_sterility:
      name: Sterilità del prodotto
      description: Indica se un prodotto è sterile per la salute e la sicurezza
    product_use:
      name: Utilizzo del prodotto
      description: Identifica l'uso o lo scopo principale previsto di materiali preziosi
        o oggetti da collezione (ad esempio, valuta/moneta a corso legale, oggetto
        da collezione, gioielli, carta regalo)
    program_format:
      name: Formato del programma
      description: Descrive il layout dei programmi degli eventi, ad esempio a libretto
        o a foglio singolo
    projection_design:
      name: Design della proiezione
      description: Descrive il motivo o l'immagine proiettata da un filtro di illuminazione
        o da un gobo, ad esempio testo o logo
    projector_light_source:
      name: Sorgente luminosa del proiettore
      description: Identifica il tipo di sorgente luminosa in un proiettore, ad esempio
        LED o laser
    prop_theme:
      name: Tema dell'oggetto di scena
      description: Identifica lo stile o il genere degli oggetti di scena cinematografici
        e televisivi, ad esempio storici o fantascientifici
    propane_application:
      name: Applicazione del propano
      description: Specifica lo scopo del propano, ad esempio riscaldamento o grill
    propeller_blade_design:
      name: Design della pala dell'elica
      description: Descrive la configurazione delle pale dell'elica di un'imbarcazione,
        come a 3 o 4 pale
    prophy_cup_design:
      name: Forma della coppetta per profilassi
      description: Descrive il design delle coppette per profilassi utilizzate in
        odontoiatria, come a pennello o scanalate
    propulsion_type:
      name: Tipo di propulsione
      description: Specifica il metodo di movimento dell'attrezzatura esterna, ad
        es. spinta, traino
    protected_component:
      name: Componente protetto
      description: Identifica la parte della macchina flipper che la copertura protegge
    protection_type:
      name: Tipo di protezione
      description: Identifica il livello di protezione offerto dai dispositivi di
        sicurezza, come Tipo I o Tipo II
    protective_gear_features:
      name: Funzionalità dell'equipaggiamento protettivo
      description: Identifica le caratteristiche uniche dei dispositivi di protezione,
        ad esempio antiurto o antiappannamento
    protective_mask_design:
      name: Design della maschera protettiva
      description: Specifica il design delle maschere protettive, ad esempio maschera
        intera o mezza maschera
    protective_mask_features:
      name: Funzionalità della maschera protettiva
      description: Descrive in dettaglio le caratteristiche uniche delle maschere
        protettive, ad esempio cinturino regolabile o valvola
    protein_processing_type:
      name: Tipo di lavorazione delle proteine
      description: Specifica come la proteina viene raffinata o lavorata (ad es.,
        isolato vs. concentrato), influenzando purezza, velocità di digestione e preferenza
        del consumatore
    protein_source:
      name: Fonte di proteine
      description: Identifica l'origine proteica primaria utilizzata nell'integratore
    pstn_connectivity_options:
      name: Opzioni di connettività PSTN
      description: Specifica le interfacce della rete telefonica pubblica commutata
        (PSTN) supportate da un prodotto, ad es. FXO, POTS
    publication_frequency:
      name: Frequenza di pubblicazione
      description: Indica la frequenza con cui viene pubblicata una rivista o un giornale,
        ad esempio quotidiano o mensile
    publication_type:
      name: Tipo di pubblicazione
      description: Identifica il tipo di pubblicazione accademica o di ricerca, ad
        esempio articolo di giornale o tesi
    pull_up_bar:
      name: Barra per trazioni
      description: Specifica il tipo di presa sull'attrezzatura per il fitness, ad
        esempio standard o grezza
    pump_accessories:
      name: Accessori per tiralatte
      description: Identifica gli articoli inclusi con i tiralatte, ad esempio custodia
        o biberon
    pump_speed_settings:
      name: Impostazioni di velocità tiralatte
      description: Specifica le funzioni di controllo della velocità, in genere per
        i tiralatte; ad es. velocità regolabile
    punching/training_bag_material:
      name: Materiale del sacco da boxe/allenamento
      description: Identifica il materiale principale utilizzato in un sacco da boxe/allenamento,
        ad esempio pelle o tela
    puppet_theme:
      name: Tema del burattino
      description: Classifica le marionette in base al tema del design, come umane
        o fantastiche
    puppet_type:
      name: Tipo di burattino
      description: Identifica lo stile del burattino, ad esempio burattino a mano
        o marionetta
    push_button_terminal_type:
      name: Tipo di terminale del pulsante
      description: Specifica lo stile di connessione elettrica sul pulsante, garantendo
        compatibilità con cablaggi e linguette di connessione rapida durante l'installazione
    puzzle_theme:
      name: Tema del puzzle
      description: Descrive il soggetto o il motivo principale di un puzzle, ad esempio
        animali o spazio
    puzzle_type:
      name: Tipo puzzle
      description: Identifica il tipo specifico di puzzle, ad esempio 3D o rompicapo
    quiver_style:
      name: Modello di faretra
      description: Specifica lo stile della faretra nel tiro con l'arco, ad es. anca,
        schiena
    rack_design:
      name: Modello di scaffale
      description: Descrive il layout o la struttura di un portabicchieri, ad esempio
        aperto o a scomparto
    rack_format:
      name: Formato rack
      description: Definisce l'alloggiamento fisico o lo standard di dimensione della
        striscia di canale per il posizionamento su rack o desktop
    rack_mounting_style:
      name: Stile di montaggio a rack
      description: Descrive lo stile strutturale del montaggio a rack (ad es., ripiano
        fisso, ripiano scorrevole, binari, pannello vuoto)
    rack_type:
      name: Tipo di scaffale
      description: Identifica lo stile del portaoggetti di un veicolo, come bagagliaio
        o tetto
    rack_width_standard:
      name: Standard di larghezza del rack
      description: Definisce lo standard del settore per la larghezza di montaggio
        orizzontale seguito dal prodotto
    racket_balance:
      name: Equilibrio della racchetta
      description: Indica la distribuzione del peso di una racchetta, ad esempio testa
        pesante, equilibrio uniforme
    racket_gauge:
      name: Gauge della racchetta
      description: Specifica lo spessore delle corde della racchetta da tennis, ad
        es. 16
    racket_head_shape:
      name: Forma della testa della racchetta
      description: Definisce la forma della testa della racchetta, ad esempio ovale,
        isometrica
    racket_material:
      name: Materiale della racchetta
      description: Specifica il tipo di materiale con cui è realizzata una racchetta
        sportiva, ad esempio legno o fibra di carbonio
    racket_string_design:
      name: Design delle corde della racchetta
      description: Identifica la costruzione delle corde nelle racchette da tennis,
        ad esempio monofilamento e multifilamento
    racket_string_material:
      name: Materiale delle corde della racchetta
      description: Specifica la composizione delle corde della racchetta da tennis,
        ad esempio Kevlar o Poliuretano (PU)
    radar_bands:
      name: Bande radar
      description: Specifica le bande di frequenza che un dispositivo radar può rilevare,
        ad es. X, K
    radar_technology:
      name: Tecnologia radar
      description: Specifica la tecnologia radar utilizzata in un prodotto, ad esempio
        a impulsi o a stato solido
    radio_case_design:
      name: Modello di custodia della radio
      description: Definisce lo stile o la funzionalità delle custodie per il trasporto
        della radio, ad esempio fisse o girevoli
    radio_features:
      name: Funzionalità radiofoniche
      description: Specifica le funzionalità uniche di una radio, ad esempio supporto
        GPS o riproduzione MP3
    radio_form_factor:
      name: Fattore di forma della radio
      description: Identifica la classe fisica del ricetrasmettitore amatoriale, influenzando
        le opzioni di montaggio, i requisiti di alimentazione e gli scenari di utilizzo
        tipici
    radio_scanner_form_factor:
      name: Fattore di forma dello scanner radio
      description: Indica la configurazione fisica o lo stile di montaggio dello scanner
        radio (ad es., portatile, base, desktop, montato su veicolo)
    radiology_compatibility:
      name: Compatibilità radiologica
      description: Indica se il tutore può rimanere sul paziente durante le procedure
        di imaging (ad es., RM, TC, radiografia)
    raid_levels_supported:
      name: Livelli RAID supportati
      description: Elenca tutte le configurazioni RAID che l'array di dischi rigidi
        può creare o gestire
    ramp_type:
      name: Tipo di rampa
      description: Specifica il design o lo stile delle rampe da skateboard, ad esempio
        half-pipe o fun box
    range_type:
      name: Tipo di portata
      description: Definisce l'area di copertura di dispositivi come baby monitor,
        ad esempio quelli a lungo raggio
    rarity:
      name: Rarità
      description: Specifica l'unicità degli articoli, in genere per oggetti da collezione;
        ad es., edizione limitata, ultra rara
    razor_flexibility:
      name: Flessibilità del rasoio
      description: Indica la flessibilità di rasoi e rifinitori, ad es. flessibili
        o fissi
    razor_head_design:
      name: Modello della testina del rasoio
      description: Definisce il numero di lame in un rasoio, ad es. singola, tripla
    razor_type:
      name: Tipo di rasoio
      description: 'Specifica il design del rasoio, ad es. dritto o sintetico '
    read/write_speed:
      name: Velocità di lettura/scrittura
      description: Indica la velocità o la velocità di trasferimento dei dati, in
        genere per i duplicatori di dischi; ad es. 4x, 52x
    reading_toy_type:
      name: Tipo di giocattolo da lettura
      description: Specifica il tipo di giocattolo educativo per la lettura, ad esempio
        gioco di spelling, tavoletta per la lettura
    receipt_paper_features:
      name: Funzionalità della carta per ricevute
      description: Identifica le caratteristiche uniche della carta per ricevute come
        indicatore di fine rotolo o logo prestampato
    reclining_function:
      name: Funzione reclinabile
      description: Descrive le caratteristiche specifiche della reclinazione, ad esempio
        la reclinazione completa o la gravità zero
    recommended_age_group:
      name: Fascia d'età consigliata
      description: Identifica la fascia d'età adatta per un prodotto, in genere giocattoli
        e giochi; ad es. neonati, adolescenti
    recommended_skill_level:
      name: Livello di abilità
      description: Specifica il livello di abilità, ad es. principiante, esperto
    recommended_use:
      name: Uso consigliato
      description: Identifica l'uso o il dominio principale per cui è stato progettato
        un prodotto hardware, ad es. industriale, residenziale
    record_cleaning_components_included:
      name: Componenti per la pulizia dei dischi inclusi
      description: Elenca gli articoli specifici forniti nel kit per permettere a
        chi acquista di confrontare i bundle a colpo d'occhio (ad es., spazzola, fluido,
        panno)
    recorder_fingering_system:
      name: Sistema di diteggiatura del flauto dolce
      description: Specifica il tipo di sistema di diteggiatura del flauto dolce,
        ad es. tedesco, barocco
    recorder_specialized_features:
      name: Funzionalità specializzate del registratore
      description: Identifica le funzionalità avanzate dei videoregistratori, ad es.
        il supporto intelligente e Dolby Atmos
    recording_accessories_included:
      name: Accessori di registrazione inclusi
      description: Fornisce dettagli sui componenti extra inclusi nei pacchetti di
        registrazione, ad esempio cuffie o microfono
    recording_capability_type:
      name: Tipo di capacità di registrazione
      description: Indica se il ricevitore può registrare contenuti TV e il metodo
        utilizzato (ad es., USB PVR, HDD interno, cloud)
    recording_functionality:
      name: Funzionalità di registrazione
      description: Indica se e come il ricevitore può registrare contenuti TV (ad
        es., DVR su HDD interno, USB esterno)
    recording_mode:
      name: Modalità di registrazione
      description: Elenca le modalità operative supportate dal registratore (ad es.,
        continuo, registrazione temporizzata)
    recording_quality:
      name: Qualità di registrazione
      description: Descrive la chiarezza audio dei trascrittori e dei sistemi di dettatura,
        ad esempio basso o alto
    recording_speed_modes_supported:
      name: Modalità di velocità di registrazione supportate
      description: Elenca le modalità di velocità del nastro che il VCR può registrare
        o riprodurre, influenzando il tempo di registrazione e la qualità dell'immagine
    recreational_vehicle_type:
      name: Tipo di camper
      description: Identifica la categoria di un veicolo ricreativo, ad esempio Classe
        A o rimorchio da viaggio
    reed_strength:
      name: Resistenza dell’ancia
      description: Indica la flessibilità delle ance dei legni, ad esempio morbida,
        media o dura
    reel_capacity:
      name: Capacità della bobina
      description: Specifica la capacità di una bobina in un serbatoio di sviluppo,
        ad esempio singola o quadrupla
    reflector_design:
      name: Design del riflettore
      description: Descrive il design di un riflettore flash, ad esempio a nido d'ape
        o a ombrello
    regenerative_braking_features:
      name: Funzionalità di frenata rigenerativa
      description: Descrive le caratteristiche dei moduli di frenata rigenerativa
        dei veicoli elettrici, ad es. resistenza agli agenti atmosferici, facile da
        installare
    region:
      name: Area geografica
      description: Identifica la località specifica da cui proviene il prodotto, in
        genere per vino e liquori; ad es. California, Bordeaux
    region_code:
      name: Codice dell’area geografica
      description: Specifica la regione in cui viene concesso in licenza l'uso di
        un software per videogiochi, ad esempio Asia (AS) o Globale (GL)
    release_mechanism:
      name: Meccanismo di rilascio
      description: Indica la tecnologia di rilascio o assorbimento della vitamina
        (ad es., rilascio prolungato, liposomiale, masticabile)
    release_schedule:
      name: Programma di rilascio
      description: Specifica la frequenza con cui vengono rilasciati nuovi episodi
        o aggiornamenti, ad es. settimanale, bisettimanale
    remote_control_functions:
      name: Funzioni del telecomando
      description: Elenca le azioni specifiche che l'otturatore remoto può attivare
        oltre a scattare foto.
    remote_shutter_form_factor:
      name: Fattore di forma dell'otturatore remoto
      description: Identifica lo stile fisico o l'alloggiamento dell'otturatore remoto,
        ad esempio un telecomando/pulsante, un controller ad anello o un selfie stick
        con otturatore integrato.
    remote_technology:
      name: Tecnologia remota
      description: Identifica la tecnologia utilizzata nei controlli remoti della
        fotocamera, ad esempio Bluetooth o cablato
    removable_storage_formats_supported:
      name: Formati di storage rimovibili supportati
      description: Definisce i formati di archiviazione rimovibili con cui un dispositivo
        è compatibile, ad es. SD, microUSB
    removal_target:
      name: Obiettivo di rimozione
      description: Specifica quali prodotti per unghie il rimuovi è progettato per
        dissolvere (ad es., smalto gel, unghie acriliche, polvere dip)
    replacement_lamp_type:
      name: Tipo di lampada di ricambio
      description: Classifica lo stile di parte di ricambio fornita (ad es., modulo
        lampada e alloggiamento, striscia LED retroilluminata, assemblaggio CCFL)
    reptile/amphibian_food_form:
      name: Forma alimentare per rettili/anfibi
      description: Specifica la forma di cibo per rettili/anfibi, ad esempio liofilizzato
        o in pellet
    reptile/amphibian_habitat_supply_type:
      name: Tipo di fornitura di habitat per rettili/anfibi
      description: Identifica il tipo di riscaldamento o di illuminazione per gli
        habitat dei rettili/anfibi, come una lampada termica o una lampada UVB
    research_focus:
      name: Focus della ricerca
      description: Identifica l'area di studio principale negli articoli accademici,
        come biologia o economia
    research_methodology:
      name: Metodologia di ricerca
      description: Identifica il tipo di metodi di ricerca utilizzati negli articoli
        accademici, come sondaggio o qualitativo
    resistance_level:
      name: Livello di resistenza
      description: Indica il livello di resistenza del prodotto, in genere per le
        fasce da allenamento; ad es. molto pesante
    resistance_system:
      name: Sistema di resistenza
      description: Definisce il meccanismo utilizzato per creare resistenza nelle
        attrezzature per il fitness, ad es. acqua, aria
    resistance_tolerance:
      name: Tolleranza della resistenza
      description: Definisce la deviazione consentita della resistenza effettiva dal
        suo valore nominale, espressa come percentuale (ad es., ±1%)
    restrictor_gate_shape:
      name: Forma del gate restrittore
      description: Definisce la forma geometrica del gate restrittore incluso o richiesto
        dal joystick
    result_display:
      name: Visualizzazione del risultato
      description: Specifica il formato del test di gravidanza, ad es. basato su linee,
        digitale
    retail/sale_sign_design:
      name: Design dell’insegna del punto vendita al dettaglio/negozio
      description: Indica il tipo di messaggio sui cartelli di vendita al dettaglio
        o di vendita, ad es. vendita, offerta speciale
    reticle_plane:
      name: Piano del reticolo
      description: Specifica il piano focale del reticolo nei cannocchiali da puntamento
        e nei mirini, ad esempio primo o secondo
    reticle_type:
      name: Tipo di reticolo
      description: Identifica il tipo di reticolo nei mirini delle armi, come Duplex
        o Mildot
    rewinder_operation_mode:
      name: Modalità di funzionamento del riavvolgitore
      description: Definisce le modalità funzionali supportate dal riavvolgitore (ad
        es., solo riavvolgimento, riavvolgimento e avanzamento rapido)
    rf_output_standard:
      name: Standard di uscita RF
      description: Specifica lo standard di trasmissione televisiva o radiofonica
        che il modulatore emette
    rfid_frequency:
      name: Frequenza RFID
      description: Specifica la frequenza operativa dei prodotti RFID, ad es. bassa,
        ultra alta
    riding_style:
      name: Stile di guida
      description: Specifica l'uso previsto o lo stile di guida dell'attrezzatura
        per gli sport invernali, ad es. slalom, freestyle
    riding_toy_propulsion_type:
      name: Tipo di propulsione del gioco cavalcabile
      description: Identifica il modo in cui viene azionato un giocattolo da cavalcare,
        ad esempio elettrico o a pedali
    rim/wheel_design:
      name: Design del cerchione/ruota
      description: Descrive lo stile o la costruzione dei cerchioni/ruote del veicolo,
        come lega o a raggi
    ring_design:
      name: Modello ad anello
      description: Descrive lo stile di un anello, ad esempio a fascia o con solitario
    ring_size:
      name: Misura dell'anello
      description: Specifica la dimensione di un anello, ad esempio L o 6,5
    rinse_requirement:
      name: Requisito di risciacquo
      description: Chiarisce se il detergente deve essere risciacquato, può essere
        lasciato in posa o non richiede risciacquo (ad es., acqua micellare)
    rise_height_class:
      name: Classe di altezza di rialzo
      description: Categorizza quanta altezza aggiuntiva l'impugnatura per pollice
        aggiunge rispetto allo stick standard (ad es., rialzo basso, medio, alto)
    riser_color:
      name: Colore alzata
      description: Identifica il colore del riser negli archi da tiro con l'arco,
        ad esempio nero o blu
    riser_material:
      name: Materiale del riser
      description: Specifica il materiale del riser dell'arco o della balestra, ad
        esempio fibra di carbonio o legno
    riser_pattern:
      name: Modello di alzata
      description: Descrive il design o il motivo sull'asta di archi e balestre, come
        camouflage o texture
    rivet_form:
      name: Forma del rivetto
      description: Descrive la forma dei bulloni dell'hardware, ad es. solida, split
    road_sign_design:
      name: Design del cartello stradale
      description: Identifica il tipo di informazioni visualizzate su un segnale stradale,
        ad es. stop, limite di velocità
    robe_style:
      name: Stile della vestaglia
      description: Specifica il tipo di design complessivo o lo stile di costruzione
        della vestaglia, come accappatoio spa o avvolgente.
    rock_composition:
      name: Composizione della roccia
      description: Specifica la composizione geologica di una roccia, come marmo o
        calcare
    rock_formation:
      name: Formazione della roccia
      description: Specifica la classificazione geologica delle rocce, ad esempio
        ignee o sedimentarie
    rocker_type:
      name: Tipo di rocker
      description: Specifica lo stile di curvatura degli snowboard o degli sci, ad
        es. flat, rocker
    rod_color:
      name: Colore asta
      description: Identifica il colore di una canna da pesca, ad esempio nero o blu
    rod_material:
      name: Materiale della canna
      description: Identifica il materiale utilizzato negli articoli sportivi basati
        su aste, ad esempio grafite o fibra di vetro
    rod_pattern:
      name: Modello asta
      description: Descrive il design o la stampa su una canna da pesca, come mimetico
        o a righe
    rod_shape:
      name: Forma dell’asta
      description: Definisce la forma o la configurazione delle aste doccia, ad es.
        diritte, a forma di U
    roller_head:
      name: Testina del rullo
      description: Definisce il numero di testine sui rulli, in genere per gli strumenti
        per la cura della pelle; ad es. singolo, doppio
    roller_material:
      name: Materiale del rullo
      description: Specifica il materiale utilizzato in un rullo, in genere per strumenti
        per la cura della pelle; ad es. giada, silicone
    roller_type:
      name: Tipo di rullo
      description: Identifica il tipo di rullo, in genere per gli strumenti per la
        cura della pelle; ad es. ghiaccio, microago
    roof_decor_shape:
      name: Forma della decorazione per il tetto
      description: Definisce il disegno o la forma delle decorazioni del tetto, ad
        esempio un cavallo o una barca a vela
    room_correction_technology:
      name: Tecnologia di correzione della stanza
      description: Specifica il sistema di calibrazione acustica automatica o di correzione
        della stanza integrato nel ricevitore
    rosin_form:
      name: Forma della colofonia
      description: Descrive la forma della colofonia dell'arco per strumenti a corda,
        come blocco o torta
    rosin_grade:
      name: Gradazione della colofonia
      description: Specifica il tipo di colofonia utilizzata per gli strumenti a corda,
        ad es. scura, media
    rotating_direction:
      name: Senso di rotazione
      description: Specifica la direzione di rotazione delle punte di trapano e cacciavite,
        come sinistra o destra
    rotation_direction:
      name: Direzione di rotazione
      description: Indica se il trapano per unghie supporta la rotazione in avanti,
        la rotazione inversa o entrambe
    rotator_control_technology:
      name: Tecnologia di controllo dei rotori
      description: Definisce il meccanismo di controllo dei rotatori dell'antenna,
        ad esempio manuale o motorizzato
    route_of_administration:
      name: Via di somministrazione
      description: Identifica come il prodotto viene applicato o consumato, influenzando
        efficacia e sicurezza (ad es., orale, topico, cerotto transdermico, sublinguale,
        iniezione intramuscolare)
    rug/mat_features:
      name: Funzionalità del tappetino/stuoia
      description: Descrive le caratteristiche speciali dei tappeti/stuoie, come base
        antiscivolo o asciugatura rapida
    rug/mat_material:
      name: Materiale del tappetino/stuoia
      description: Specifica il tipo di materiale utilizzato in tappeti o stuoie,
        ad esempio gomma o microfibra
    rug/mat_shape:
      name: Forma di tappetino/stuoia
      description: Specifica la forma di tappeti e stuoie, ad esempio runner, quadrato
    rug_features:
      name: Funzionalità del tappetino
      description: Descrive le caratteristiche specifiche dei tappeti, ad esempio
        base antiscivolo o colori resistenti ai raggi UV
    rug_material:
      name: Materiale del tappetino
      description: Identifica il materiale utilizzato nella costruzione di un tappeto,
        ad esempio lana o iuta
    rug_shape:
      name: Forma del tappetino
      description: Identifica il disegno geometrico dei tappeti, ad esempio quadrato
        o runner
    rum_grade:
      name: Qualità di rum
      description: Classifica il rum in base alle caratteristiche o al grado, ad es.
        premium, speziato
    saddle_base_color:
      name: Colore base sella
      description: Identifica il colore primario della base di una sella di bicicletta,
        ad esempio nero o blu
    saddle_base_material:
      name: Materiale base sella
      description: Identifica il materiale utilizzato nella base della sella di una
        bicicletta, come acciaio o fibra di carbonio
    saddle_base_pattern:
      name: Modello base sella
      description: Descrive il design o la stampa sulla base di una sella di bicicletta,
        ad esempio astratto o con logo
    saddle_material:
      name: Materiale del sellino
      description: Specifica il materiale utilizzato nelle selle delle biciclette,
        ad esempio gomma o pelle
    saddle_seat_color:
      name: Colore della seduta della sella
      description: Specifica il colore della sella di una bicicletta, ad esempio argento
        o rosso
    saddle_seat_material:
      name: Materiale della seduta della sella
      description: Identifica il materiale utilizzato nella costruzione di una sella
        per bicicletta, ad esempio pelle o nylon
    saddle_seat_pattern:
      name: Modello della seduta della sella
      description: Descrive il design o la stampa sul sellino di una bicicletta, ad
        esempio floreale o geometrico
    safety_certifications:
      name: Certificazioni di sicurezza
      description: Indica la conformità del prodotto agli standard di sicurezza, in
        genere per i prodotti per bambini; ad es. senza BPA
    safety_device_installation:
      name: Installazione del dispositivo di sicurezza
      description: Definisce la modalità di montaggio o fissaggio dei prodotti di
        sicurezza, ad es. adesivo, montaggio a vite
    safety_equipment_material:
      name: Materiale dell'attrezzatura di sicurezza
      description: Specifica il tipo di materiale negli articoli di sicurezza del
        veicolo, ad esempio nylon o fibra di vetro
    safety_rail_installation:
      name: Installazione della ringhiera di sicurezza
      description: Definisce la modalità di installazione delle barriere di sicurezza,
        ad esempio regolabili o permanenti
    sailboat_type:
      name: Tipo di barca a vela
      description: Identifica il design o il modello specifico di una barca a vela,
        ad esempio sloop o cutter
    sandal_style:
      name: Stile sandalo
      description: Specifica lo stile dei sandali, ad esempio con cinturino alla caviglia
        o con laccetti
    sandblaster_application:
      name: Applicazione della sabbiatrice
      description: Definisce la funzione prevista degli strumenti di sabbiatura, come
        lucidatura o levigatura
    sander_type:
      name: Tipo di levigatrice
      description: Classifica il tipo di utensile levigatore, ad es. nastro, orbitale
        casuale
    sanding_application:
      name: Applicazione della levigatura
      description: Specifica lo scopo degli accessori di levigatura, come lavori di
        finitura o rimozione di vernice
    satellite_coverage_area:
      name: Area di copertura satellitare
      description: Definisce le regioni geografiche a cui può accedere un telefono
        satellitare, ad esempio Australia o Africa
    satellite_messaging_capability:
      name: Capacità di messaggistica satellitare
      description: Indica se il prodotto supporta la messaggistica satellitare unidirezionale
        (solo invio) o bidirezionale (invio e ricezione)
    satellite_navigation_systems_supported:
      name: Sistemi di navigazione satellitare supportati
      description: Specifica quali sistemi satellitari di navigazione globale (GNSS)
        il telefono può ricevere per il posizionamento e il tracciamento.
    satellite_network_type:
      name: Tipo di rete satellitare
      description: Identifica il fornitore di servizi di telefoni satellitari, ad
        es. Inmarsat, Iridium
    sauna_accessories_included:
      name: Accessori sauna inclusi
      description: Identifica gli articoli aggiuntivi inclusi in una sauna, come il
        mestolo o le pietre per sauna
    scaffolding_mounting_type:
      name: Tipo di montaggio del ponteggio
      description: Specifica lo stile di installazione dell'impalcatura, ad es. telaio,
        mobile
    scale_material:
      name: Materiale della scala
      description: Identifica il materiale utilizzato in una bilancia, in genere calibri
        ad albero; ad es. acciaio inossidabile, plastica
    scale_model_accessory_type:
      name: Tipi di accessorio per modellini
      description: Identifica il tipo di accessorio per modelli in scala, ad esempio
        edifici o figure
    scale_model_kit_type:
      name: Tipo di kit per modellino in scala
      description: Specifica la categoria del kit di modellini in scala, ad esempio
        un carro armato o un'astronave
    scale_model_material:
      name: Materiale del modello in scala
      description: Identifica il materiale principale utilizzato nei modelli in scala,
        ad esempio legno o cartoncino
    scale_model_theme:
      name: Tema del modellino
      description: Identifica il tema di un modello in scala, ad esempio fantasy o
        storia
    scalp_concern:
      name: Problema del cuoio capelluto
      description: Specifica il problema primario del cuoio capelluto o dei capelli
        che il trattamento è formulato per affrontare
    scalpel_blade_material:
      name: Materiale della lama del bisturi
      description: Identifica la composizione delle lame del bisturi, ad esempio acciaio
        inossidabile o titanio
    scalpel_blade_number:
      name: Numero della lama del bisturi
      description: Identifica il numero o il tipo specifico di lama del bisturi, ad
        esempio 10 o 15A
    scalpel_blade_shape:
      name: Forma della lama di bisturi
      description: Descrive la forma della lama del bisturi, ad esempio curva o diritta
    scalpel_handle_number:
      name: Numero del manico del bisturi
      description: Identifica il numero di manico specifico per bisturi, ad esempio
        4 o 3L
    scan_converter_features:
      name: Funzionalità del convertitore di scansione
      description: Evidenzia le caratteristiche uniche di un convertitore di scansione,
        come calibrazione automatica delle immagini o controllo remoto
    scanner_features:
      name: Funzionalità dello scanner
      description: Evidenzia le funzioni speciali di uno scanner, ad esempio basato
        sull'intelligenza artificiale o scansione su cloud
    scanner_grip_compatibility:
      name: Compatibilità impugnatura scanner
      description: Indica se la custodia si adatta a scanner con impugnatura a pistola/grilletto,
        forma portatile standard o entrambi
    scanner_maintenance_kit_type:
      name: Tipo di kit di manutenzione scanner
      description: Classifica la natura del prodotto in modo da distinguere rapidamente
        tra schede di pulizia, kit completi, kit di calibrazione, set di rulli, salviettine
        e soluzioni
    scanner_sensor_type:
      name: Tipo di sensore scanner
      description: Specifica il tipo di sensore negli scanner, ad esempio imager 2D
        o laser
    scarf/shawl_style:
      name: Stile sciarpa/scialle
      description: Identifica lo stile delle sciarpe e degli scialli, ad esempio coperta,
        involucro
    scene_modes:
      name: Modalità di scena
      description: Definisce la modalità della fotocamera per acquisire diversi scenari,
        ad esempio notturno o sott'acqua
    scent:
      name: Profumo
      description: Specifica la fragranza o l'aroma di un prodotto, ad esempio vaniglia
        o agrumi
    scissor_blade_type:
      name: Tipo di lama della forbice
      description: Descrive la forma e lo stile delle lame delle forbici, ad esempio
        curve o smerlate
    scooter_brake_type:
      name: Tipo di freno dello scooter
      description: Specifica il meccanismo e la progettazione dei freni dello scooter,
        come a disco o a tamburo
    scope/sight_design:
      name: Design del mirino/puntatore
      description: Descrive il tipo di progettazione per mirini o mirini per armi,
        ad es. visione notturna, laser
    scope/sight_features:
      name: Funzionalità del mirino/ambito
      description: Descrive le caratteristiche speciali dei mirini o dei mirini delle
        armi, come reticolo illuminato o registrazione del suono
    scope_design:
      name: Design del mirino
      description: Identifica il tipo di design dei cannocchiali ottici, ad esempio
        angolato o dritto
    scope_lens_type:
      name: Tipo di obiettivo del mirino
      description: Identifica il tipo di lente utilizzata nei cannocchiali, ad esempio
        HD o grandangolare
    scoreboard_features:
      name: Funzionalità del tabellone segnapunti
      description: Descrive le caratteristiche speciali di un tabellone segnapunti,
        ad esempio portatile o resistente agli agenti atmosferici
    scrapbook_paper_type:
      name: Tipo di carta dell’album di ritagli
      description: Identifica lo stile o il design della carta per album, ad esempio
        speciale o con motivi
    screen/display_design:
      name: Design dello schermo/display
      description: Specifica le caratteristiche di progettazione dello schermo di
        un prodotto, in genere per le fotocamere; ad es. mirino
    screen_assembly_components_included:
      name: Componenti dell'assemblaggio schermo inclusi
      description: Chiarisce quali parti sono pre-assemblate con lo schermo
    screen_curvature_rating:
      name: Valutazione della curvatura dello schermo
      description: Specifica il raggio di curvatura dei monitor curvi (ad es., 1000R),
        indicando quanto è pronunciata la curva
    screen_material:
      name: Materiale del vetro
      description: Definisce il tipo di materiale utilizzato per lo schermo di un
        prodotto, ad es. vetro, policarbonato
    screen_operation_type:
      name: Descrive lo stile strutturale o di distribuzione dello schermo (ad es.,
        telaio fisso, discesa manuale, motorizzato, treppiede, gonfiabile)
      description: Tipo di reiezione della luce
    screen_protection_features:
      name: Caratteristiche di protezione dello schermo
      description: Descrive come la custodia protegge lo schermo del telefono oltre
        alla copertura di base
    screen_protector_adhesion_type:
      name: Tipo di adesione del protettore schermo
      description: Specifica l'adesivo o il metodo di attacco utilizzato per fissare
        il protettore allo schermo del telefono
    screen_protector_coverage_style:
      name: Stile di copertura della protezione schermo
      description: Definisce il design di copertura fisica o il fattore di forma della
        protezione rispetto allo schermo del dispositivo
    screen_protector_features:
      name: Caratteristiche della protezione schermo
      description: Evidenzia le caratteristiche funzionali speciali offerte dalla
        protezione oltre alla prevenzione dei graffi di base
    screen_protector_finish:
      name: Finitura protettore schermo
      description: Identifica la finitura superficiale ottica del protettore (ad es.,
        lucido, opaco, privacy, antiriflesso)
    screen_specialized_features:
      name: Funzionalità specializzate dello schermo
      description: Identifica le funzionalità uniche dello schermo di un computer,
        come antiriflesso o touchscreen
    screen_surface_finish:
      name: Finitura superficiale dello schermo
      description: Descrive il trattamento superficiale del vetro dello schermo, influenzando
        riflessi e sensazione al tatto
    seafood_type:
      name: Tipo di prodotto ittico
      description: Classifica i prodotti ittici per specie, ad esempio tonno o aragosta
    seal_stamp_design:
      name: Design del timbro con sigillo
      description: Specifica lo stile di un timbro sigillo, ad esempio monogramma
        o calligrafia
    season:
      name: Stagione
      description: Indica la stagione per la quale il prodotto è più adatto, ad esempio
        estate o autunno
    seat_color:
      name: Colore della seduta
      description: Specifica il colore dell'area salotto di un prodotto, ad esempio
        nero o verde
    seat_cushioning:
      name: Imbottitura della seduta
      description: Descrive il tipo di imbottitura nei prodotti per la seduta, ad
        esempio imbottiti o non imbottiti
    seat_pattern:
      name: Fantasia della seduta
      description: Specifica il motivo visivo sui prodotti per la seduta, ad esempio
        stelle o punti
    seat_reservation:
      name: Prenotazione del posto
      description: Specifica se il biglietto include l'assegnazione del posto o richiede
        la prenotazione anticipata.
    seat_rotation:
