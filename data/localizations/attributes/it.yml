    closure_style:
      name: Stile di chiusura
      description: Specifica il metodo utilizzato per chiudere un oggetto, in genere
        nella biancheria da letto; ad es. tradizionale, nascosto
    closure_type:
      name: Tipo di chiusura
      description: Definisce il metodo utilizzato per allacciare o fissare un prodotto,
        ad esempio cerniera o fibbie
    cloth_treatment:
      name: Trattamento del panno
      description: Identifica se il panno è pretrattato e, in caso affermativo, la
