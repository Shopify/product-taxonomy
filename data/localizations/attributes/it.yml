    cocktail_decoration_material:
      name: Materiale per la decorazione dei cocktail
      description: Specifica la sostanza di cui sono fatte le decorazioni per i cocktail,
        come plastica o carta
    coffee/tea_set_pieces_included:
      name: Pezzi del set da caffè/tè inclusi
      description: Fornisce dettagli sui singoli articoli all'interno di un set da
        caffè o da tè, come tazze e piattini
    coffee_creamer_variety:
      name: Varietà di preparato per crema caffè
      description: Distingue tra diversi tipi di crema per caffè, ad es. in polvere,
        non casearia
    coffee_input_type:
      name: Tipo di ingresso caffè
      description: Identifica il formato del caffè, ad es. cialde, chicchi
    coffee_product_form:
      name: Formato del prodotto caffé
      description: Specifica il tipo di prodotto caffè, ad esempio macinato o in grani
    coffee_roast:
      name: Tostatura del caffè
      description: Definisce il livello di tostatura dei prodotti a base di caffè,
        ad es. chiaro, medio, scuro
    coil_connection:
      name: Collegamento della resistenza
      description: Definisce la sostituibilità della bobina nei dispositivi di svapo,
        ad es. fissa, modificabile
    coin_material:
      name: Materiale delle monete
      description: Specifica il tipo di materiale di cui è composta una moneta da
        collezione, ad es. bronzo, rame
    collagen_source:
      name: Fonte di collagene
      description: Identifica l'origine primaria del collagene utilizzato nell'integratore
        (ad es., bovino, marino, di origine vegetale)
    collagen_type:
      name: Tipo di collagene
      description: Specifica il/i tipo/i molecolare/i di collagene fornito/i dal prodotto
        (ad es., Tipo I, II, III)
    collar/mount_compatible_device:
      name: Dispositivo compatibile con collare/staffa
      description: Specifica il dispositivo compatibile per collari o supporti per
        treppiede, ad es. obiettivo, fotocamera
    collar/mount_design:
      name: Design collare/staffa
      description: Descrive il design dei collari o dei supporti per treppiedi, ad
        esempio sgancio rapido o anello
    collar_lock_type:
      name: Tipo con chiusura a collare
      description: Specifica il tipo di bloccaggio del collare sull'attrezzatura per
        il sollevamento pesi, come spinlock o morsetto a molla
    color:
      name: Color
      description: Definisce il colore o il motivo primario, ad esempio blu o rigato
    color_accuracy_standards:
      name: Standard di precisione del colore
      description: Definisce gli standard di calibrazione del colore, in genere per
        i monitor; ad es. sRGB, Adobe RGB
    color_depth:
      name: Profondità colore
      description: Indica la profondità di bit ottica/output dello scanner (numero
        di bit per pixel), che determina l'accuratezza del colore, la gradazione e
        la latitudine di editing
    color_saturation:
      name: Saturazione del colore
      description: Indica l'intensità del colore nella pellicola della fotocamera,
        ad es. alto, basso
    comb/brush_size:
      name: Taglia del pettine/spazzola
      description: Classifica la dimensione fisica complessiva della spazzola o del
        pettine
    comb_features:
      name: Caratteristiche del pettine
      description: Elenca caratteristiche prestazionali o di design notevoli del pettine
    comb_tooth_spacing:
      name: Spaziatura dei denti del pettine
      description: Descrive la spaziatura o densità dei denti del pettine
    comic_edition:
      name: Edizione del fumetto
      description: Indica la versione di rilascio specifica o l’edizione di un fumetto,
        che può influenzare la sua rarità e il suo valore da collezione, ad esempio
        prima edizione, copertina alternativa
    comic_tradition:
      name: Tradizione del fumetto
      description: Indica la tradizione culturale o regionale da cui ha origine il
        fumetto, come i fumetti cinesi o i manga
    commode_opening_type:
      name: Tipo di apertura del sedia comoda
      description: Identifica la presenza e lo stile di qualsiasi apertura o compatibilità
        con il secchio nel sedile
    communication_device_features:
      name: Funzionalità del dispositivo di comunicazione
      description: Identifica caratteristiche uniche nei dispositivi di comunicazione,
        ad esempio touchscreen o controllo vocale
    communication_protocols:
      name: Protocolli di comunicazione
      description: Specifica il protocollo di rete utilizzato, ad esempio Modbus o
        Profibus
    compass_style:
      name: Stile bussola
      description: Specifica lo stile delle bussole di navigazione, come bussola per
        immersione o girobussola
    compatible_accessibility_equipment_type:
      name: Tipo di attrezzatura per l'accessibilità compatibile
      description: Specifica il tipo di attrezzatura per l'accessibilità o la mobilità
        con cui l'accessorio è progettato per funzionare
    compatible_aircraft_type:
      name: Tipo di aereo compatibile
      description: Identifica il tipo di aereo a cui è adatto il prodotto, come aereo
        o elicottero
    compatible_amplifier:
      name: Amplificatore compatibile
      description: Identifica il tipo di amplificatore con cui è compatibile un prodotto,
        come basso o tastiera
    compatible_aquarium:
      name: Acquario compatibile
      description: Specifica per quali tipi di acquari è adatto un prodotto, ad es.
        tutti gli acquari, acqua salata
    compatible_baby_bottle_design:
      name: Modello di biberon compatibile
      description: Indica gli stili di biberon con cui il prodotto è compatibile,
        ad esempio a collo largo
    compatible_baby_carrier_type:
      name: Tipo di marsupio compatibile
      description: Specifica il tipo di marsupio con cui il prodotto è compatibile,
        come fascia portabebè o zaino portabebè
    compatible_baby_chair_type:
      name: Tipo di seggiolone compatibile
      description: Specifica il tipo di seggiolone adatto al prodotto, ad esempio
        carrello della spesa o ristorante
    compatible_baby_transport_type:
      name: Tipo di trasporto bebè compatibile
      description: Identifica gli articoli compatibili per il trasporto del bambino,
        come passeggino o seggiolino per auto
    compatible_ball_type:
      name: Tipo di palla compatibile
      description: Identifica i tipi di palline adatte all'uso con il prodotto, ad
        es. tennis, wiffle
    compatible_battery_size:
      name: Capacità della batteria compatibile
      description: Identifica le dimensioni della batteria con cui un prodotto è compatibile,
        ad es. AAA, CR2032
    compatible_battery_technology:
      name: Tecnologia della batteria compatibile
      description: Specifica il tipo di tecnologia della batteria con cui è compatibile
        un prodotto, come agli ioni di litio o alcaline
    compatible_bench_positions:
      name: Posizioni compatibili con la panca
      description: Specifica la gamma di posizioni, in genere per una panca da allenamento;
        ad es. piatto o in declino
    compatible_bike_type:
      name: Tipo di bicicletta compatibile
      description: Specifica il tipo di bicicletta per cui è progettato il prodotto,
        ad esempio elettrica o da strada
    compatible_brass_instrument:
      name: Strumento in ottone compatibile
      description: Specifica lo strumento in ottone con cui si può utilizzare il prodotto,
        ad esempio tromba o tuba
    compatible_cable_tie_material:
      name: Materiale della fascetta compatibile
      description: Identifica il tipo di fascetta (ad es., acciaio inossidabile, nylon)
        che la pistola è progettata per installare o rimuovere
    compatible_chemical_treatment_strength_level:
      name: Livello di forza del trattamento chimico compatibile
      description: Indica la forza o potenza raccomandata dal produttore (ad es.,
        delicato, normale, super) del trattamento chimico
    compatible_clarinet_type:
      name: Tipo di clarinetto compatibile
      description: Identifica il tipo di clarinetto con cui è compatibile un prodotto,
        ad esempio clarinetto A o universale
    compatible_contact_lens_type:
      name: Tipo di lenti a contatto compatibili
      description: Identifica quali categorie di lenti a contatto possono essere conservate
        o pulite nella custodia
    compatible_contact_lenses:
      name: Lenti a contatto compatibili
      description: Indica i tipi o i materiali delle lenti a contatto con cui la soluzione
        può essere utilizzata in sicurezza
    compatible_cosmetic_tools:
      name: Utensili cosmetici compatibili
      description: Specifica con quali strumenti di bellezza può essere utilizzato
        il prodotto, ad es. spugnette, pinzette
    compatible_device:
      name: Dispositivo compatibile
      description: Specifica quali dispositivi funzionano con un dispositivo elettronico,
        ad esempio smartwatch o auricolari wireless
    compatible_drum_configuration:
      name: Configurazione della batteria compatibile
      description: Identifica la configurazione della batteria per cui è progettato
        il prodotto, ad esempio contrabbasso o charleston
    compatible_electric/acoustic_instrument:
      name: Strumento elettrico/acustico compatibile
      description: Identifica lo strumento elettrico o acustico per il quale è progettato
        il prodotto, ad esempio chitarra elettrica o sintetizzatore
    compatible_electronic_card_type:
      name: Tipo di scheda elettronica compatibile
      description: Specifica i tipi di schede elettroniche con cui può interagire
        il prodotto, ad esempio banda magnetica o libreria
    compatible_equipment_type:
      name: Tipo di attrezzatura compatibile
      description: Specifica la categoria di attrezzature per piscina o spa per cui
        la scheda circuitale è progettata (ad es., riscaldatore, pompa, clorinatore)
    compatible_exercise_machine_type:
      name: Tipo di macchina per esercizi compatibile
      description: Identifica il tipo di macchina per esercizi per cui la scheda è
        destinata (ad es., tapis roulant, ellittica)
    compatible_exercises:
      name: Esercizi compatibili
      description: Specifica gli esercizi che si possono eseguire con il prodotto,
        ad esempio trazioni o dip
    compatible_eyewear_type:
      name: Tipo di occhiali compatibili
      description: Identifica il tipo di occhiali con cui l'accessorio è progettato
        per adattarsi o funzionare
    compatible_filament:
      name: Filamento compatibile
      description: Specifica i tipi di filamento che può utilizzare una stampante
        3D, come acido polilattico (PLA) o nylon
    compatible_film_type:
      name: Tipo di pellicola compatibile
      description: Identifica il tipo di pellicola che può utilizzare una fotocamera,
        come pellicola negativa o pellicola a colori
    compatible_flute_type:
      name: Tipo di flauto compatibile
      description: Identifica il tipo di flauto con cui è compatibile un prodotto,
        ad es. universale, piccolo
    compatible_game_format:
      name: Formato di gioco compatibile
      description: Specifica il tipo di formato di gioco supportato, ad esempio solo
        download digitale o disco fisico
    compatible_gardening_tool:
      name: Attrezzo da giardinaggio compatibile
      description: Specifica con quali attrezzi da giardinaggio è possibile utilizzare
        un prodotto, ad esempio un rastrello o una pala
    compatible_hair_color:
      name: Colore di capelli compatibile
      description: Abbina i prodotti a specifici colori di capelli, ad es. argento,
        biondo
    compatible_hammock_design:
      name: Design dell’amaca compatibile
      description: Specifica il tipo di amaca con cui è compatibile un prodotto, ad
        es. sospensione, telaio
    compatible_harmonica_type:
      name: Tipo di armonica compatibile
      description: Identifica il tipo di armonica per cui è progettato un prodotto,
        come diatonica o cromatica
    compatible_hdcp:
      name: HDCP compatibile
      description: Specifica la compatibilità HDCP dei dispositivi elettronici, ad
        esempio HDCP 2.2 o non compatibile
    compatible_instrument:
      name: Strumento compatibile
      description: Identifica lo strumento musicale per cui è progettato il prodotto,
        ad esempio una chitarra o un pianoforte
    compatible_keyboard_configuration:
      name: Configurazione della tastiera compatibile
      description: Identifica il layout della tastiera compatibile con un prodotto,
        come 61 tasti o 76 tasti
    compatible_lock_type:
      name: Tipo di serratura compatibile
      description: Identifica i tipi di lucchetto che utilizza un prodotto, ad esempio
        lucchetto a combinazione o elettronico
    compatible_makeup:
      name: Trucco compatibile
      description: Specifica i prodotti compatibili per il trucco, ad es. rossetto,
        ombretto
    compatible_mattress_size:
      name: Misura del materasso compatibile
      description: Specifica la dimensione del materasso adatta al prodotto; cioè
        re, gemello
    compatible_memory_cards:
      name: Schede di memoria compatibili
      description: Identifica i tipi di schede di memoria che può utilizzare un prodotto,
        in genere per le fotocamere; ad es. SD, microSDHC
    compatible_microphone_thread:
      name: Filettatura del microfono compatibile
      description: Specifica la dimensione della filettatura compatibile per i prodotti
        microfonici, ad es. 5/8"-27
    compatible_motherboard_form_factor:
      name: Fattore di forma della scheda madre compatibile
      description: Specifica le dimensioni della scheda madre che può supportare il
        prodotto, ad esempio ATX
    compatible_oboe_type:
      name: Tipo di oboe compatibile
      description: Identifica il tipo di oboe per cui è progettato un prodotto, ad
        esempio corno universale o inglese
    compatible_operating_system:
      name: Sistema operativo compatibile
      description: Definisce la compatibilità software di un prodotto, ad es. Windows,
        macOS
    compatible_orchestral_string_instrument:
      name: Strumento ad arco compatibile
      description: Identifica lo strumento a corda orchestrale specifico per cui è
        progettato il prodotto, ad esempio violino o violoncello
    compatible_paper_size:
      name: Formato della carta compatibile
      description: Specifica i formati carta che può supportare un dispositivo, in
        genere per le stampanti; ad es. A4, cartolina
    compatible_patient_profile:
      name: Profilo del paziente compatibile
      description: Identifica il gruppo di pazienti adatto a un prodotto medico, ad
        esempio pediatrico o geriatrico
    compatible_percussion_instrument:
      name: Strumento a percussione compatibile
      description: Identifica con quali strumenti a percussione è possibile utilizzare
        un prodotto, come un tamburo o un bongo
    compatible_pinball_machine_edition:
      name: Edizione compatibile della macchina flipper
      description: Specifica quale edizione o livello di allestimento della macchina
        flipper l'accessorio si adatta (ad es., Pro, Premium, LE)
    compatible_play_vehicle_type:
      name: Tipo di veicolo da gioco compatibile
      description: Identifica il tipo di veicolo da gioco a cui è adatto il prodotto,
        ad esempio auto o barca
    compatible_player:
      name: Lettore compatibile
      description: Identifica i dispositivi che si possono utilizzare con un adattatore
        per cassette, ad es. iPad, laptop
    compatible_polish_thinner_type:
      name: Tipo di diluente per smalto compatibile
      description: Indica i sistemi di rivestimento per unghie con cui il diluente
        è progettato per funzionare
    compatible_power_supply_form_factor:
      name: Fattore di forma dell'alimentatore compatibile
      description: Specifica la dimensione o lo standard dell'unità di alimentazione
        (PSU) che l'involucro è progettato per ospitare
    compatible_printer:
      name: Stampante compatibile
      description: Identifica il tipo di stampante con cui è compatibile un prodotto,
        ad esempio laser o getto d'inchiostro
    compatible_processor_series:
      name: Serie di processori compatibili
      description: Specifica la serie di processori con cui è compatibile il prodotto,
        ad esempio AMD Ryzen o Intel core solo
    compatible_programming_languages:
      name: Linguaggi di programmazione compatibili
      description: Identifica i linguaggi di programmazione con cui può funzionare
        un prodotto software, come Python o Java
    compatible_recipes:
      name: Ricette compatibili
      description: Specifica le ricette adatte al prodotto, in genere per gelatieri;
        ad es. sorbetto, gelato
    compatible_resin_type:
      name: Tipo di resina compatibile
      description: Specifica le categorie di resina UV che una stampante SLA/MSLA
        può utilizzare
    compatible_resolution:
      name: Risoluzione compatibile
      description: Definisce la risoluzione del display supportata, ad es. 1080p,
        full HD
    compatible_satellite_radio_service:
      name: Servizio radio satellitare compatibile
      description: Identifica i servizi radio satellitari con cui il ricevitore è
        progettato per funzionare, garantendo la compatibilità con abbonamenti esistenti
        o previsti
    compatible_seat_type:
      name: Tipo di seggiolino compatibile
      description: Specifica il tipo di seggiolino per auto adatto al prodotto, ad
        esempio rialzo o seggiolino per auto
    compatible_shoe_size:
      name: Numero di scarpa compatibile
      description: Abbina i prodotti a taglie di scarpe specifiche, ad es. 12, 42
    compatible_software_platform:
      name: Piattaforma software compatibile
      description: Identifica le piattaforme software con cui è compatibile un prodotto,
        ad esempio Adobe Creative o Canva
    compatible_special_effects_device:
      name: Dispositivo per effetti speciali compatibile
      description: Identifica i dispositivi per effetti speciali con cui può funzionare
        un prodotto, come luci a LED o macchine del fumo
    compatible_stove_top_type:
      name: Tipo di piano cottura compatibile
      description: Identifica la tipologia di piani cottura con cui è possibile utilizzare
        il prodotto, ad esempio gas o induzione
    compatible_string_instrument:
      name: Strumento a corde compatibile
      description: Identifica per quale strumento a corda è progettato il prodotto,
        come un ukulele o un basso
    compatible_stroller_type:
      name: Tipo di passeggino compatibile
      description: Specifica il tipo di passeggino a cui è adatto il prodotto, come
        ombrello o jogging
    compatible_vacuum_type:
      name: Tipo di aspirapolvere compatibile
      description: Specifica il tipo di aspirapolvere con cui è compatibile il prodotto,
        ad esempio manuale o a vapore
    compatible_vehicle:
      name: Veicolo compatibile
      description: Specifica il tipo di veicolo per cui è progettato un prodotto,
        ad esempio auto o SUV
    compatible_voice_assistant:
      name: Assistente vocale compatibile
      description: Identifica le piattaforme di controllo vocale che possono azionare
        il ricevitore
    compatible_walking_aid_equipment:
      name: Attrezzatura compatibile per ausili per la deambulazione
      description: Specifica per quali ausili per la deambulazione è progettato il
        prodotto, ad es. stampelle, deambulatori
    compatible_wax_container_size:
      name: Taglia del contenitore di cera compatibile
      description: Elenca le dimensioni standard di cartucce, lattine o pentole che
        possono essere posizionate direttamente nello scaldacera senza travaso
    compatible_wax_form:
      name: Forma di cera compatibile
      description: Specifica le forme di cera depilatoria che lo scaldacera è progettato
        per sciogliere
    compatible_weight_lifting_accessory:
      name: Accessorio compatibile per il sollevamento pesi
      description: Specifica l'attrezzatura per il sollevamento pesi con cui è compatibile
        il prodotto, ad esempio bilanciere o manubri
    compliance_certifications:
      name: Certificazioni di conformità
      description: Specifica le certificazioni di conformità di un prodotto, ad esempio
        HIPAA o FedRAMP
    component_mounting_style:
      name: Stile di montaggio del componente
      description: Definisce il metodo primario con cui un componente elettronico
        o una scheda è collegata a un circuito stampato, pannello, chassis o binario
    component_output_type:
      name: Tipo di uscita per componenti
      description: Specifica il tipo di segnale di uscita dei componenti elettronici,
        ad esempio UART o analogico
    component_package_type:
      name: Tipo di imballaggio del componente
      description: Definisce il fattore di forma o l'imballaggio dei componenti elettronici,
        ad es. SDM (Surface Mount Device), DIP (Dual In-line Package)
    component_size_code:
      name: Codice dimensione del componente
      description: Specifica la designazione di dimensione SMD o a foro passante standardizzata
        (ad es., 0603, 0805) utilizzata per il package del condensatore
    component_tolerance:
      name: Tolleranza del componente
      description: Definisce la deviazione consentita dal valore nominale (resistenza,
        capacità, induttanza, frequenza, ecc.) espressa come percentuale
    components_included:
      name: Componenti inclusi
      description: Elenca le parti hardware fornite nel kit di avviamento
    compression_circuit_type:
      name: Tipo di circuito di compressione
      description: Descrive la tecnologia sottostante di riduzione del guadagno (ad
        es., VCA, FET, ottica) che modella il suono e la risposta del processore
    compression_format:
      name: Formato di compressione
      description: Definisce il tipo di compressione dei file video utilizzata, ad
        es. MPEG-4, AVI
    compression_level:
      name: Livello di compressione
      description: Indica l'intensità della pressione nei prodotti a compressione,
        ad es. leggeri, consistenti
    computer_accessories_included:
      name: Accessori per computer inclusi
      description: Identifica gli accessori informatici supplementari forniti, ad
        esempio mouse o borsa per laptop
    computer_form:
      name: Forma del computer
      description: Definisce la progettazione fisica o il layout di un computer, ad
        esempio un dispositivo all-in-one o un notebook
    computer_server_features:
      name: Funzionalità del server informatico
      description: Descrive le caratteristiche speciali di un server, ad esempio alimentazione
        ridondante o supporto della virtualizzazione
    computer_specialized_features:
      name: Funzionalità specializzate del computer
      description: Evidenzia le funzionalità specifiche del computer, come sistema
        di raffreddamento a liquido o illuminazione RGB
    concertina_button_configuration:
      name: Configurazione dei pulsanti della concertina
      description: Specifica il numero e la disposizione dei pulsanti su una concertina,
        ad esempio la concertina anglo a 20 pulsanti
    condition:
      name: Condizione
      description: Descrive lo stato o la qualità di un prodotto, ad es. nuovo (M),
        scadente (P)
    conditioner_effect:
      name: Effetto del balsamo
      description: Definisce i benefici di un balsamo per capelli, ad esempio lisciante
        o antiforfora
    condom_compatibility:
      name: Compatibilità con i preservativi
      description: Specifica con quali materiali di preservativi il lubrificante è
        sicuro da usare
    condom_fit_type:
      name: Tipo di vestibilità del preservativo
      description: Descrive la dimensione complessiva o il contorno anatomico progettato
        per migliorare comfort e sensazione
    condom_type:
      name: Tipo di preservativo
      description: Distingue se un preservativo è destinato a maschi o femmine
    conductivity_gel_application:
      name: Applicazione del gel conduttivo
      description: Specifica la procedura medica o diagnostica per cui il gel o la
        lozione conduttiva è destinata
    conductor_core_type:
      name: Tipo di nucleo conduttore
      description: Indica se il conduttore interno è a trefoli o a nucleo solido
    connecting_thread:
      name: Filettatura di collegamento
      description: Specifica il tipo di filettatura per unire le parti idrauliche,
        ad es. IPS da 1/2 pollice
    connection_method:
      name: Metodo di connessione
      description: Specifica il tipo di connessione utilizzata da un prodotto, ad
        esempio wireless o cablata
    connection_type:
      name: Tipo di connessione
      description: Specifica il tipo di connessione utilizzata dai dispositivi elettronici,
        ad esempio cablata o Bluetooth
    connectivity_technology:
      name: Tecnologia di connettività
      description: Definisce il metodo di trasferimento dei dati in un prodotto, ad
        es. Bluetooth, USB
    connectivity_type:
      name: Tipo di connettività
      description: Chiarisce se la scheda è senza saldatura (stile breadboard) o progettata
        per la saldatura
    connector_1_type:
      name: Tipo di connettore 1
      description: Specifica il connettore o l'interfaccia presente sulla prima estremità
        dell'adattatore o dell'accoppiatore
    connector_2_type:
      name: Tipo di connettore 2
      description: Specifica il connettore o l'interfaccia presente sulla seconda
        estremità dell'adattatore o dell'accoppiatore
    connector_contact_plating:
      name: Placcatura dei contatti del connettore
      description: Specifica la placcatura o il rivestimento superficiale applicato
        ai contatti elettrici per migliorare la conduttività e la resistenza alla
        corrosione
    connector_design:
      name: Design del connettore
      description: Identifica il design dei connettori o delle maglie della catena,
        ad esempio estremità aperte o snap
    connector_gender:
      name: Genere del connettore
      description: Specifica il genere delle estremità del connettore nell'elettronica,
        ad es. maschio, da maschio a femmina
    connector_mounting_style:
      name: Stile di montaggio del connettore
      description: Indica come il connettore viene montato meccanicamente o integrato
        in un assemblaggio (ad es., PCB, pannello, chassis, cavo, accoppiatore)
    connector_orientation:
      name: Orientamento del connettore
      description: Descrive l'orientamento fisico dell'interfaccia di accoppiamento
        rispetto alla superficie di montaggio o al cavo (ad es., dritto, ad angolo
        retto, verticale)
    connector_position:
      name: Posizione del connettore
      description: Descrive la posizione del connettore video quando lo schermo viene
        visualizzato dalla parte anteriore (ad es., in basso a destra, in alto a sinistra)
    connector_type:
      name: Tipo di connettore
      description: Specifica lo stile o lo standard del connettore presente alle estremità
        del cavo jumper
    console_accessories_included:
      name: Accessori console inclusi
      description: Elenca gli accessori o componenti chiave confezionati con la console
        (ad es., controller, cavi, dock, giochi)
    console_system:
      name: Sistema di console
      description: Definisce la marca specifica di una console per videogiochi, ad
        esempio Atari 2600 o Playstation
    console_type:
      name: Tipo di console
      description: Classifica il fattore di forma fisico della console e l'ambiente
        di utilizzo previsto
    constitutive_ingredients:
      name: Ingredienti costituenti
      description: Specifica i componenti principali utilizzati nella formulazione
        di un prodotto, ad es. cera d'api, olio di rosa canina
    construction:
      name: Costruzione
      description: Indica il metodo o la tecnica di lavorazione dei metalli utilizzati
        nella produzione di gioielli (ad esempio, placcato, argento dorato, riempito,
        solido)
    construction_set_theme:
      name: Tema del set da costruzione
      description: Identifica il tema di un set di costruzioni, ad esempio pirati
        o animali
    contact_lens_case_accessories_included:
      name: Accessori per custodia lenti a contatto inclusi
      description: Elenca gli articoli supplementari confezionati con la custodia
        per lenti a contatto
    contact_lens_case_features:
      name: Caratteristiche della custodia per lenti a contatto
      description: Evidenzia caratteristiche funzionali notevoli o inclusioni della
        custodia
    contact_lens_material:
      name: Materiale delle lenti a contatto
      description: Specifica la formulazione polimerica o famiglia di materiali (ad
        es., idrogel, idrogel siliconico) di cui è fatta la lente
    contact_material:
      name: Materiale dei contatti
      description: Identifica il metallo o la placcatura utilizzata per i contatti
        della batteria all'interno del supporto
    contrast:
      name: Contrasto
      description: Utilizzato per specificare il livello di contrasto nella pellicola
        della fotocamera, ad es. normale o alto
    contrast_ratio_typical:
      name: Rapporto di contrasto (tipico)
      description: Indica il rapporto di contrasto del display, ad es. 3000:1
    control_functions:
      name: Funzioni di controllo
      description: Specifica le capacità di controllo degli interruttori a pedale
        dell'amplificatore, ad esempio commutazione dei canali
    control_interface:
      name: Interfaccia di controllo
      description: Identifica come l'unità può essere configurata o controllata (ad
        es., software PC, app mobile, LCD sul dispositivo, telecomando)
    control_method:
      name: Metodo di controllo
      description: Descrive la tecnica di controllo dei componenti di automazione,
        come coppia diretta o scalare (V/f)
    control_solution_level:
      name: Livello della soluzione di controllo
      description: Indica il livello di concentrazione di glucosio della soluzione
        di controllo
    control_technology:
      name: Tecnologia di controllo
      description: Specifica il metodo di funzionamento, in genere per i trattamenti
        per finestre; ad es. manuale, motorizzato
    control_type:
      name: Tipo di controllo
      description: Specifica il tipo di meccanismo di controllo, ad esempio sensore
        o pulsante
    controller_design:
      name: Modello del controller
      description: Descrive il fattore di forma dei controller di automazione, ad
        esempio compatto o montato su rack
    controller_drive_type:
      name: Tipo di azionamento del controller
      description: Identifica il tipo di alimentazione utilizzata negli azionamenti
        di controllo dell'automazione, come alimentazione CA o CC
    conversion_direction:
      name: Direzione di conversione
      description: Descrive il tipo e la direzione di conversione che il dispositivo
        esegue
    converter_functionality:
      name: Funzionalità del convertitore
      description: Identifica la funzione specifica dei convertitori di lenti, ad
        esempio acceleratore o grandangolo
    conveyor_operation:
      name: Funzionamento del trasportatore
      description: Identifica il funzionamento di un sistema di trasporto, ad esempio
        alimentato o a gravità
    cooking_compartments:
      name: Compartimenti di cottura
      description: Specifica il numero di aree di cottura negli elettrodomestici da
        cucina come le friggitrici ad aria, ad esempio singola o doppia
    cooking_method:
      name: Metodo di cottura
      description: Specifica la tecnica di cottura consigliata, ad es. grigliare,
        friggere
    cooking_wine_variety:
      name: Varietà di vini da cucina
      description: Distingue tra diverse varietà di vino da cucina, ad es. riso, sherry
    cookware/bakeware_features:
      name: Funzionalità delle pentole/teglie da forno
      description: Identifica le caratteristiche speciali delle pentole o dei tegami
        da forno, come il rivestimento antiaderente o la sicurezza nel forno
    cookware/bakeware_material:
      name: Materiale per pentole/teglie da forno
      description: Identifica il materiale principale utilizzato nelle pentole o nei
        prodotti da forno, come acciaio inossidabile o ceramica
    cookware_features:
      name: Funzionalità delle pentole
      description: Evidenzia le caratteristiche uniche delle pentole, ad esempio sicurezza
        nel forno o maniglia stay cool
    cookware_items_included:
      name: Articoli di pentole inclusi
      description: Specifica i componenti di un set da cucina, ad esempio la casseruola
        in ghisa o la padella
    cooling_technology:
      name: Tecnologia di raffreddamento
      description: Specifica il metodo utilizzato per raffreddare i componenti elettronici,
        ad esempio l'aria o il dissipatore di calore
    cord_fastening_system:
      name: Sistema di fissaggio del cavo
      description: Specifica il tipo di sistema di fissaggio delle corde elastiche,
        ad es. sfera di ginocchiera, gancio
    cordless_phone_frequency_band:
      name: Banda di frequenza del telefono senza fili
      description: Specifica la/le banda/e di frequenza radio su cui opera il sistema
        telefonico senza fili, facilitando la verifica della compatibilità regionale
        e la prevenzione di interferenze.
    core_color:
      name: Colore base
      description: Identifica il colore primario dell'anima di un arco o di una balestra,
        come il nero o il blu
    core_material:
      name: Materiale del nucleo
      description: Specifica il materiale principale utilizzato, in genere per archi
        e balestre; ad es. fibra di vetro, legno
    core_pattern:
      name: Modello base
      description: Descrive il design principale sull'anima di un arco o di una balestra,
        ad esempio mimetico o uccelli
    corrector_features:
      name: Funzionalità del correttore
      description: Descrive le caratteristiche uniche dei liquidi correttivi, delle
        penne e dei nastri, ad es. nessun tempo di asciugatura, punta di precisione
    corsage/boutonniere_design:
      name: Design del bouquet/fiore all’occhiello
      description: Descrive lo stile del corpetto o della boutonnière, ad esempio
        a mano o con spilla
    cosmetic_condition:
      name: Condizioni estetiche
      description: Definisce l'usura e le condizioni dei componenti elettronici, ad
        es. nuovi, aperti, mai usati
    cosmetic_finish:
      name: Finish cosmetico
      description: Definisce la finitura cosmetica di un prodotto, ad es. opaca, naturale
    cosmetic_function:
      name: Funzione cosmetica
      description: Definisce il beneficio o l'effetto previsto di un prodotto cosmetico,
        ad es. lenitivo, curativo
    cosmetic_set_type:
      name: Tipo di set cosmetico
      description: Classifica il set in base al suo focus o tema principale
    costume_theme:
      name: Tema del costume
      description: Identifica il tema o il concetto principale di un costume, ad esempio
        horror o fantasy
    cotton_ball_size:
      name: Taglia del batuffolo di cotone
      description: Indica la categoria di dimensione relativa di ogni batuffolo di
        cotone (ad es., piccolo, grande, jumbo)
    counter_shape:
      name: Forma del bancone
      description: Descrive la forma di un bancone o di una scrivania, ad esempio
        dritto o curvo
    country:
      name: Country
      description: Specifica il Paese associato al prodotto, ad esempio Giappone o
        Germania
    country_of_issue:
      name: Paese di emissione
      description: Indica il Paese in cui è stata emessa la scheda telefonica o in
        cui è destinata all'uso
    cover_closure_design:
      name: Modello di chiusura della copertura
      description: Specifica il design della chiusura, in genere per le fodere dei
        cuscini; ad es. busta, cerniera
    cover_color:
      name: Colore del rivestimento
      description: Specifica il colore principale della copertina di un prodotto,
        ad es. trasparente, blu scuro
    cover_features:
      name: Funzionalità della copertina
      description: Descrive le caratteristiche speciali della copertura di un prodotto,
        come impermeabilità o resistenza al calore
    cover_material:
      name: Materiale del rivestimento
      description: Identifica il tipo di tessuto o materiale utilizzato nella copertura
        del prodotto, ad esempio seta o cotone
    cover_pattern:
      name: Motivo del rivestimento
      description: Specifica il motivo visivo o il disegno sulla copertina di un articolo,
        ad esempio floreale o tie-dye
    cover_type:
      name: Tipo di copertura
      description: Descrive lo stile o la funzionalità di una copertura per veicolo,
        ad esempio copertura totale o retrattile
    coverage_area:
      name: Area di copertura
      description: Indica i Paesi o territori di copertura geografica del software
        GPS, ad esempio Stati Uniti o Canada
    coverage_country:
      name: Paese di copertura
      description: Specifica il Paese principale in cui può essere utilizzato il credito
        prepagato.
    coverage_level:
      name: Livello di copertura
      description: Indica l'opacità o l'intensità di copertura che il prodotto fornisce
        una volta applicato (ad es., trasparente, media, completa)
    coverage_region:
      name: Area geografica della copertura
      description: Indica l'ampia regione di copertura geografica del software GPS,
        ad esempio Nord America o Oceania
    craft/sculpting_project_type:
      name: Tipo di progetto di artigianato/scultura
      description: Identifica il tipo di progetto artigianale o di scultura, ad esempio
        modellazione o creazione di maschere
    craft_cutter/embosser_type:
      name: Tipo di taglierina/rilievo artigianale
      description: Specifica il tipo di taglierina o goffratrice artigianale, ad esempio
        fustellatrice, stencil
    craft_decoration_maker_type:
      name: Tipo di creatore di decorazioni artigianali
      description: Specifica il tipo di macchina per decorazioni artigianali, come
        una timbratrice o una macchina per adesivi
    craft_knife_design:
      name: Design del taglierino
      description: Descrive lo stile specifico di un coltello artigianale, ad esempio
        dritto o di precisione
    craft_pipe_cleaner_design:
      name: Design artigianale per scovolino
      description: Descrive il design o lo stile degli scovolini artigianali, come
        lo stelo di ciniglia o il bastoncino di gomma
    craft_project_type:
      name: Tipo di progetto artigianale
      description: Identifica il tipo di progetto artigianale, ad esempio scrapbooking
        o creazione di gioielli
    crafting_frame/stretcher_features:
      name: Funzionalità del telaio/barella di lavorazione
      description: Descrive le caratteristiche uniche della lavorazione di telai/barelle,
        come presa sicura o superficie liscia
    crafting_frame_features:
      name: Funzionalità del telaio di lavorazione
      description: Descrive le caratteristiche uniche della lavorazione dei telai,
        come tensione regolabile o leggerezza
    crafting_hoop_features:
      name: Funzionalità del cerchio di lavorazione
      description: Evidenzia le caratteristiche dei telai da ricamo, ad es. presa
        sicura, superficie liscia
    crafting_mat/pad_features:
      name: Funzionalità del tappetino/pad di lavorazione
      description: Descrive le caratteristiche uniche dei tappetini o dei cuscinetti
        per la lavorazione, ad esempio supporto facile da pulire o antiscivolo
    crafting_stretcher_features:
      name: Funzionalità della barella di lavorazione
      description: Descrive le caratteristiche principali di una barella da lavorazione,
        come la tensione regolabile o la leggerezza
    crampon_attachment_type:
      name: Tipo di attacco per ramponi
      description: Identifica il modo in cui i ramponi si attaccano alle calzature,
        ad esempio ibridi o step-in
    creatine_type:
      name: Tipo di creatina
      description: Specifica la forma chimica o la formulazione specializzata di creatina
        utilizzata nell'integratore
    creative_art_project_type:
      name: Tipo di progetto di arte creativa
      description: Identifica il tipo di progetto artistico creativo, ad esempio disegno
        o scrapbooking
    crib/toddler_bed_features:
      name: Funzionalità della culla/letto per bambini
      description: Descrive gli aspetti unici dei lettini per neonati e bambini piccoli,
        ad esempio design convertibile o meccanismo a dondolo
    crib_features:
      name: Funzionalità della culla
      description: Evidenzia le caratteristiche uniche delle culle per bambini, ad
        esempio opzioni convertibili o di stoccaggio
    cricket_equipment_included:
      name: Attrezzatura da cricket inclusa
      description: Identifica gli articoli specifici da cricket inclusi in un set,
